name: _DB 트림 수동 패치 (일회성)

on:
  workflow_dispatch:
    inputs:
      slug:
        description: 'DB portfolio_links를 트림할 slug'
        required: true

jobs:
  trim:
    runs-on: ubuntu-latest
    steps:
      - name: portfolio_links 트림 (portfolio-1만 유지)
        run: |
          SLUG="${{ github.event.inputs.slug }}"
          LINKS=$(curl -s \
            "${SUPABASE_URL}/rest/v1/wishket_projects?slug=eq.${SLUG}&select=portfolio_links" \
            -H "apikey: ${SUPABASE_SR}" \
            -H "Authorization: Bearer ${SUPABASE_SR}" | \
            jq '.[0].portfolio_links')

          LEN=$(echo "$LINKS" | jq 'length')
          echo "현재 링크 수: $LEN"
          echo "현재 링크: $LINKS"

          if [ "$LEN" -le 1 ]; then
            echo "이미 1개 이하 — 종료"
            exit 0
          fi

          TRIMMED=$(echo "$LINKS" | jq -c '.[0:1]')
          HTTP=$(curl -s -o /dev/null -w "%{http_code}" -X PATCH \
            "${SUPABASE_URL}/rest/v1/wishket_projects?slug=eq.${SLUG}" \
            -H "apikey: ${SUPABASE_SR}" \
            -H "Authorization: Bearer ${SUPABASE_SR}" \
            -H "Content-Type: application/json" \
            -H "Prefer: return=minimal" \
            -d "{\"portfolio_links\": ${TRIMMED}}")

          echo "PATCH 결과 HTTP: $HTTP"
          if [ "$HTTP" = "204" ]; then
            echo "트림 완료: $SLUG ($LEN → 1)"
          else
            echo "::error::트림 실패 HTTP $HTTP"
            exit 1
          fi
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SR: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
