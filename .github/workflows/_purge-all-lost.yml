name: _미선정 프로젝트 전량 삭제 (일회성 마이그레이션)

on:
  workflow_dispatch:

jobs:
  purge:
    runs-on: ubuntu-latest
    steps:
      - name: 모든 lost 프로젝트 삭제
        run: |
          PROJECTS=$(curl -s \
            "$SUPABASE_URL/rest/v1/wishket_projects?current_status=eq.lost&select=slug,title" \
            -H "apikey: $SUPABASE_SERVICE_ROLE_KEY" \
            -H "Authorization: Bearer $SUPABASE_SERVICE_ROLE_KEY")

          COUNT=$(echo "$PROJECTS" | jq length)
          echo "삭제 대상: $COUNT 건"
          echo "$PROJECTS" | jq -r '.[] | "  - \(.slug)  [\(.title)]"'

          if [ "$COUNT" = "0" ]; then
            exit 0
          fi

          SLUGS=$(echo "$PROJECTS" | jq -r '.[].slug')
          FAIL=0
          for SLUG in $SLUGS; do
            echo ""
            echo "▶ 처리 중: $SLUG"
            HTTP=$(curl -s -o /dev/null -w "%{http_code}" -X DELETE \
              "$SUPABASE_URL/rest/v1/wishket_projects?slug=eq.$SLUG" \
              -H "apikey: $SUPABASE_SERVICE_ROLE_KEY" \
              -H "Authorization: Bearer $SUPABASE_SERVICE_ROLE_KEY")
            echo "  DB 삭제: HTTP $HTTP"
            if [ "$HTTP" != "204" ] && [ "$HTTP" != "200" ]; then
              FAIL=$((FAIL+1))
              continue
            fi
            GH_RESULT=$(curl -s -X POST \
              "$SUPABASE_URL/functions/v1/delete-portfolios" \
              -H "apikey: $SUPABASE_SERVICE_ROLE_KEY" \
              -H "Authorization: Bearer $SUPABASE_SERVICE_ROLE_KEY" \
              -H "Content-Type: application/json" \
              -d "{\"slug\": \"$SLUG\", \"all\": true}")
            echo "  GitHub 파일: $GH_RESULT"
          done

          if [ "$FAIL" -gt "0" ]; then
            echo "⚠️  $FAIL건 실패"
            exit 1
          fi
          echo "✅ 전량 삭제 완료"
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
