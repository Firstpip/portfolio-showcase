name: 미선정 프로젝트 정리

on:
  schedule:
    - cron: '0 2 * * 1'   # 매주 월요일 새벽 2시 (UTC) = 오전 11시 KST
  workflow_dispatch:

jobs:
  cleanup:
    runs-on: ubuntu-latest

    steps:
      - name: 미선정 후 30일 지난 프로젝트 조회
        id: query
        run: |
          # updated_at 기준: '미선정'으로 바꾼 시점에서 30일 경과한 프로젝트 대상
          CUTOFF=$(date -u -d '30 days ago' '+%Y-%m-%d')
          echo "기준 날짜: $CUTOFF"

          PROJECTS=$(curl -s \
            "$SUPABASE_URL/rest/v1/wishket_projects?current_status=eq.lost&updated_at=lt.$CUTOFF&select=slug,title,updated_at" \
            -H "apikey: $SUPABASE_SERVICE_ROLE_KEY" \
            -H "Authorization: Bearer $SUPABASE_SERVICE_ROLE_KEY")

          COUNT=$(echo "$PROJECTS" | jq length)
          echo "삭제 대상: $COUNT 건"
          echo "projects=$PROJECTS" >> $GITHUB_OUTPUT
          echo "count=$COUNT" >> $GITHUB_OUTPUT
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

      - name: 대상 없음
        if: steps.query.outputs.count == '0'
        run: echo "삭제 대상 없음"

      - name: 삭제 실행
        if: steps.query.outputs.count != '0'
        run: |
          echo "🗑️ 삭제 시작 — ${{ steps.query.outputs.count }}건"
          PROJECTS='${{ steps.query.outputs.projects }}'
          SLUGS=$(echo "$PROJECTS" | jq -r '.[].slug')

          echo "$PROJECTS" | jq -r '.[] | "  - \(.slug)  [\(.title)]"'

          FAIL=0
          for SLUG in $SLUGS; do
            echo ""
            echo "▶ 처리 중: $SLUG"

            # 1. DB 먼저 삭제 (CASCADE로 milestones도 함께 삭제됨)
            HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" -X DELETE \
              "$SUPABASE_URL/rest/v1/wishket_projects?slug=eq.$SLUG" \
              -H "apikey: $SUPABASE_SERVICE_ROLE_KEY" \
              -H "Authorization: Bearer $SUPABASE_SERVICE_ROLE_KEY")
            echo "  DB 삭제: HTTP $HTTP_STATUS"

            if [ "$HTTP_STATUS" != "204" ] && [ "$HTTP_STATUS" != "200" ]; then
              echo "  ⚠️  DB 삭제 실패 — GitHub 파일 삭제 건너뜀 (정합성 유지)"
              FAIL=$((FAIL+1))
              continue
            fi

            # 2. DB 삭제 성공 후 GitHub 파일 삭제
            GH_RESULT=$(curl -s -X POST \
              "$SUPABASE_URL/functions/v1/delete-portfolios" \
              -H "apikey: $SUPABASE_SERVICE_ROLE_KEY" \
              -H "Authorization: Bearer $SUPABASE_SERVICE_ROLE_KEY" \
              -H "Content-Type: application/json" \
              -d "{\"slug\": \"$SLUG\", \"all\": true}")
            echo "  GitHub 파일: $GH_RESULT"
          done

          if [ "$FAIL" -gt "0" ]; then
            echo ""
            echo "⚠️  $FAIL건 실패. 위 로그를 확인하세요."
            exit 1
          fi
          echo ""
          echo "✅ 삭제 완료"
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

