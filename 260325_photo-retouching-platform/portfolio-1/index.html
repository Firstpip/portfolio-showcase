// ── Shared UI ──
function Badge({children,color,bg}){
  return <span style={{display:'inline-flex',alignItems:'center',padding:'3px 10px',borderRadius:12,fontSize:11,fontWeight:700,color,background:bg,whiteSpace:'nowrap'}}>{children}</span>;
}

function StatusBadge({status}){
  const m={접수:{bg:C.ib,c:C.info},보정중:{bg:C.wb,c:C.warning},완료:{bg:C.sb,c:C.success},전달:{bg:C.pl,c:C.primary}};
  const s=m[status]||{bg:'#F1F5F9',c:'#475569'};
  return <Badge color={s.c} bg={s.bg}>{status}</Badge>;
}

function StatCard({icon,label,value,sub,color=C.primary,trend}){
  return <div className="card" style={{animation:'fadeIn .4s'}}>
    <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:12}}>
      <div style={{width:40,height:40,borderRadius:10,background:color+'18',display:'flex',alignItems:'center',justifyContent:'center',fontSize:20}}>{icon}</div>
      {trend && <span style={{fontSize:11,fontWeight:600,color:trend>0?C.success:C.danger,background:trend>0?C.sb:C.db,padding:'2px 8px',borderRadius:10}}>{trend>0?'↑':'↓'}{Math.abs(trend)}%</span>}
    </div>
    <div style={{fontSize:24,fontWeight:800,color,marginBottom:4}}>{value}</div>
    <div style={{fontSize:12,color:C.sec}}>{label}</div>
    {sub && <div style={{fontSize:11,color:C.muted,marginTop:2}}>{sub}</div>}
  </div>;
}

function Table({columns,rows,onRowClick,compact}){
  const [hov,setHov]=useState(-1);
  return <div className="card" style={{padding:0,overflow:'hidden'}}>
    <div style={{overflowX:'auto'}}>
      <table style={{width:'100%',borderCollapse:'collapse'}}>
        <thead>
          <tr style={{borderBottom:`2px solid ${C.border}`,background:'#FAFBFC'}}>
            {columns.map((c,i)=><th key={i} style={{padding:compact?'10px 14px':'13px 16px',textAlign:'left',fontSize:11,fontWeight:700,color:C.sec,textTransform:'uppercase',letterSpacing:.5,whiteSpace:'nowrap'}}>{c.label}</th>)}
          </tr>
        </thead>
        <tbody>
          {rows.map((r,ri)=><tr key={ri} onClick={()=>onRowClick&&onRowClick(r)}
            onMouseEnter={()=>setHov(ri)} onMouseLeave={()=>setHov(-1)}
            style={{borderBottom:`1px solid ${C.border}`,cursor:onRowClick?'pointer':'default',background:hov===ri?C.ps:'transparent',transition:'background .12s'}}>
            {columns.map((c,ci)=><td key={ci} style={{padding:compact?'9px 14px':'12px 16px',fontSize:13,whiteSpace:'nowrap'}}>{c.render?c.render(r):r[c.key]}</td>)}
          </tr>)}
        </tbody>
      </table>
    </div>
  </div>;
}

function Drawer({open,onClose,title,width=520,children}){
  if(!open)return null;
  return <div onClick={onClose} style={{position:'fixed',inset:0,background:'rgba(15,23,42,.4)',zIndex:1000,animation:'fadeIn .15s'}}>
    <div onClick={e=>e.stopPropagation()} style={{position:'absolute',right:0,top:0,bottom:0,width,background:C.surface,boxShadow:'-12px 0 40px rgba(0,0,0,.12)',overflow:'auto',animation:'slideRight .2s'}}>
      <div style={{padding:'20px 24px',borderBottom:`1px solid ${C.border}`,display:'flex',justifyContent:'space-between',alignItems:'center',position:'sticky',top:0,background:C.surface,zIndex:1}}>
        <h3 style={{fontSize:17,fontWeight:700}}>{title}</h3>
        <button onClick={onClose} style={{background:'none',border:'none',fontSize:20,cursor:'pointer',color:C.muted,padding:'2px 6px',borderRadius:6}} onMouseEnter={e=>e.target.style.color=C.text} onMouseLeave={e=>e.target.style.color=C.muted}>✕</button>
      </div>
      <div style={{padding:24}}>{children}</div>
    </div>
  </div>;
}

function Modal({open,onClose,title,children,width=480}){
  if(!open)return null;
  return <div onClick={onClose} style={{position:'fixed',inset:0,background:'rgba(15,23,42,.5)',zIndex:2000,display:'flex',alignItems:'center',justifyContent:'center',animation:'fadeIn .15s'}}>
    <div onClick={e=>e.stopPropagation()} style={{background:C.surface,borderRadius:16,width,maxHeight:'90vh',overflow:'auto',boxShadow:'0 20px 60px rgba(0,0,0,.2)',animation:'kakaoSlide .2s'}}>
      <div style={{padding:'20px 24px',borderBottom:`1px solid ${C.border}`,display:'flex',justifyContent:'space-between',alignItems:'center'}}>
        <h3 style={{fontSize:17,fontWeight:700}}>{title}</h3>
        <button onClick={onClose} style={{background:'none',border:'none',fontSize:20,cursor:'pointer',color:C.muted}}>✕</button>
      </div>
      <div style={{padding:24}}>{children}</div>
    </div>
  </div>;
}

function ProgressBar({percent,color=C.primary,animated=true,height=8}){
  return <div style={{background:'#E2E8F0',borderRadius:99,height,overflow:'hidden'}}>
    <div style={{'--w':`${percent}%`,width:`${percent}%`,height:'100%',background:`linear-gradient(90deg,${color},${color}cc)`,borderRadius:99,transition:'width .3s',animation:animated&&percent<100?'pulse 1.5s infinite':''}}/>
  </div>;
}

function Spinner(){
  return <div style={{width:20,height:20,border:`3px solid ${C.pl}`,borderTop:`3px solid ${C.primary}`,borderRadius:'50%',animation:'spin .7s linear infinite',display:'inline-block'}}/>
}

        </div> : <>
          <div style={{padding:'16px 28px',borderBottom:`1px solid ${C.border}`,display:'flex',alignItems:'center',gap:10}}>
            <span onClick={()=>{setView('login');setError('');}} style={{cursor:'pointer',fontSize:18,color:C.sec}}>←</span>

              <div><label style={{fontSize:12,fontWeight:700,color:C.sec,marginBottom:6,display:'block'}}>가맹점명 *</label><input className="input" value={regName} onChange={e=>setRegName(e.target.value)} placeholder="예: 서초점"/></div>
              <div><label style={{fontSize:12,fontWeight:700,color:C.sec,marginBottom:6,display:'block'}}>대표자명 *</label><input className="input" value={regOwner} onChange={e=>setRegOwner(e.target.value)} placeholder="예: 홍길동"/></div>
            </div>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:14,marginBottom:14}}>
              <div><label style={{fontSize:12,fontWeight:700,color:C.sec,marginBottom:6,display:'block'}}>연락처 *</label><input className="input" value={regPhone} onChange={e=>setRegPhone(e.target.value)} placeholder="02-000-0000"/></div>

            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:14,marginBottom:20}}>
              <div><label style={{fontSize:12,fontWeight:700,color:C.sec,marginBottom:6,display:'block'}}>비밀번호 *</label><input className="input" type="password" value={regPw} onChange={e=>setRegPw(e.target.value)} placeholder="8자 이상"/></div>
              <div><label style={{fontSize:12,fontWeight:700,color:C.sec,marginBottom:6,display:'block'}}>비밀번호 확인 *</label><input className="input" type="password" value={regPw2} onChange={e=>setRegPw2(e.target.value)} placeholder="비밀번호 확인"/></div>
            </div>
            {error && <div style={{background:C.db,color:C.danger,padding:'8px 12px',borderRadius:8,fontSize:12,marginBottom:16,fontWeight:600}}>{error}</div>}
            <button type="submit" disabled={logging} className="btn btn-primary" style={{width:'100%',padding:14,fontSize:15,display:'flex',alignItems:'center',justifyContent:'center',gap:8}}>
              {logging ? <><Spinner/> 가입 신청 중...</> : '가맹점 가입 신청'}
            </button>
            <div style={{marginTop:12,textAlign:'center',fontSize:11,color:C.muted}}>가입 신청 후 관리자 승인이 필요합니다</div>

        </>}
        <div style={{padding:'12px 28px 20px',borderTop:`1px solid ${C.border}`,display:'flex',justifyContent:'center',gap:16}}>
          {['JWT 토큰 인증','역할 기반 접근 제어','세션 자동 갱신'].map(t=><span key={t} style={{fontSize:10,color:C.muted,display:'flex',alignItems:'center',gap:4}}><span style={{color:C.success}}>✓</span>{t}</span>)}
        </div>
      </div>
    </div>
  </div>;
}

  const rev=orders.reduce((s,o)=>s+o.total,0);
  return <div style={{animation:'fadeIn .4s'}}>
    <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:24}}>

      <div style={{display:'flex',gap:8,alignItems:'center'}}>
        <span style={{fontSize:12,color:C.muted}}>2025년 1월 20일 기준</span>
        <span style={{background:C.sb,color:C.success,padding:'5px 12px',borderRadius:20,fontSize:12,fontWeight:700}}>● 시스템 정상</span>

    </div>
    <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:16,marginBottom:24}}>

      <StatCard icon="🖌️" label="보정 진행중" value={`${proc}건`} sub="작업자 배정 완료" color={C.warning}/>
      <StatCard icon="✅" label="이번 주 완료" value={`${done}건`} sub="전달 포함" color={C.success} trend={8}/>
      <StatCard icon="💰" label="이번 달 매출" value={`${(rev/10000).toFixed(0)}만원`} sub={`주문 ${orders.length}건`} color={C.primary} trend={15}/>

            <CartesianGrid strokeDasharray="3 3" stroke={C.border}/>

            <YAxis yAxisId="r" orientation="right" tick={{fontSize:11}} stroke={C.border} width={40}/>
            <Tooltip contentStyle={{borderRadius:8,border:`1px solid ${C.border}`,fontSize:12}}/>
            <Area yAxisId="l" type="monotone" dataKey="orders" name="주문 수" fill="url(#ordersGrad)" stroke={C.primary} strokeWidth={2}/>
            <Line yAxisId="r" type="monotone" dataKey="revenue" name="매출(만원)" stroke={C.accent} strokeWidth={2} dot={{r:3,fill:C.accent}}/>

        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:14}}>
          <h3 style={{fontSize:14,fontWeight:700}}>카카오 알림톡 현황</h3>
          <span style={{background:C.kakao,color:'#3C1E1E',padding:'3px 10px',borderRadius:8,fontSize:11,fontWeight:700}}>🗨 카카오</span>
        </div>
        {alimtalkLogs.slice(0,5).map(l=><div key={l.id} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'9px 0',borderBottom:`1px solid ${C.border}`}}>
          <div style={{flex:1}}>
            <div style={{fontSize:13,fontWeight:600}}>{l.branch} <span style={{fontWeight:400,color:C.sec}}>— {l.template}</span></div>
            <div style={{fontSize:11,color:C.muted,marginTop:2}}>{l.sentAt}</div>
          </div>
          <Badge color={l.status==='발송성공'?C.success:C.danger} bg={l.status==='발송성공'?C.sb:C.db}>{l.status}</Badge>
        </div>)}
        <div style={{marginTop:12,padding:12,background:'#FFFBEB',borderRadius:8,border:'1px solid #FEF08A'}}>
          <div style={{fontSize:12,color:'#854D0E',fontWeight:600}}>📊 이번 달 발송 통계</div>
          <div style={{display:'flex',gap:16,marginTop:8}}>

              <div style={{fontSize:11,color:'#92400E'}}>{k}</div>
              <div style={{fontSize:15,fontWeight:700,color:'#78350F'}}>{v}</div>

    </div>

}

// ── Admin: Order Management ──
function OrderPage({orders,setOrders}){
  const [filter,setFilter]=useState('전체');
  const [selected,setSelected]=useState(null);
  const [statusModal,setStatusModal]=useState(false);
  const [alimtalkModal,setAlimtalkModal]=useState(false);
  const [nextStatus,setNextStatus]=useState('');
  const [sending,setSending]=useState(false);
  const [sent,setSent]=useState(false);
  const [uploadModal,setUploadModal]=useState(false);
  const [uploadProgress,setUploadProgress]=useState(0);
  const [uploading,setUploading]=useState(false);
  const [uploadDone,setUploadDone]=useState(false);
  const [dlProg,setDlProg]=useState(0);
  const [dlDone,setDlDone]=useState(false);
  const [assignModal,setAssignModal]=useState(false);
  const [assignWorker,setAssignWorker]=useState(null);

  const tabs=['전체','접수','보정중','완료','전달'];
  const filtered=filter==='전체'?orders:orders.filter(o=>o.status===filter);

  const statusFlow=['접수','보정중','완료','전달'];

  const handleStatusChange=()=>{
    setOrders(orders.map(o=>o.id===selected.id?{...o,status:nextStatus}:o));
    setSelected({...selected,status:nextStatus});
    setStatusModal(false);
    setAlimtalkModal(true);
    setSent(false);
  };

  const handleSendAlimtalk=()=>{
    setSending(true);
    setTimeout(()=>{setSending(false);setSent(true);},1800);
  };

  const handleUploadResult=()=>{
    setUploadDone(false);
    setUploadProgress(0);
    setUploading(true);
    setUploadModal(true);
    let p=0;
    const iv=setInterval(()=>{
      p+=Math.random()*18+5;
      if(p>=100){p=100;clearInterval(iv);setUploading(false);setUploadDone(true);}
      setUploadProgress(Math.min(p,100));
    },200);
  };

  return <div style={{animation:'fadeIn .4s'}}>
    <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:20}}>
      <div><h2 style={{fontSize:22,fontWeight:800}}>주문 관리</h2><p style={{color:C.sec,fontSize:13,marginTop:3}}>사진 보정 주문 접수부터 전달까지 관리합니다</p></div>
    </div>
    <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:12,marginBottom:18}}>
      {tabs.slice(1).map(t=><StatCard key={t} icon={{접수:'📥',보정중:'🖌️',완료:'✅',전달:'📦'}[t]} label={t} value={`${orders.filter(o=>o.status===t).length}건`} color={{접수:C.info,보정중:C.warning,완료:C.success,전달:C.primary}[t]}/>)}
    </div>
    <div style={{display:'flex',gap:8,marginBottom:14}}>
      {tabs.map(t=><button key={t} onClick={()=>setFilter(t)} className="btn" style={{padding:'7px 16px',borderRadius:20,border:`1px solid ${filter===t?C.primary:C.border}`,background:filter===t?C.primary:'transparent',color:filter===t?'#fff':C.sec,fontSize:12}}>
        {t}{t!=='전체'&&` (${orders.filter(o=>o.status===t).length})`}
      </button>)}
    </div>
    <Table columns={[
      {label:'주문번호',render:r=><span style={{fontWeight:700,color:C.primary,fontSize:13}}>{r.id}</span>},
      {label:'가맹점',key:'branch'},
      {label:'사진',render:r=>`${r.photos}장`},
      {label:'규격',key:'size'},
      {label:'금액',render:r=><span style={{fontWeight:600}}>{r.total.toLocaleString()}원</span>},
      {label:'상태',render:r=><StatusBadge status={r.status}/>},
      {label:'보정사',render:r=>r.worker?<span style={{fontSize:12,fontWeight:600}}>{r.worker}</span>:<span style={{fontSize:11,color:C.muted}}>미배정</span>},
      {label:'접수일',key:'date'},
      {label:'마감',key:'deadline'},
    ]} rows={filtered} onRowClick={r=>{setSelected(r);setSent(false);setDlProg(0);setDlDone(false);}}/>

    {/* Order Detail Drawer */}
    <Drawer open={!!selected} onClose={()=>setSelected(null)} title={`주문 상세 — ${selected?.id||''}`}>
      {selected && <div>
        <div style={{background:C.ps,borderRadius:10,padding:16,marginBottom:20}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:8}}>
            <span style={{fontSize:13,fontWeight:700}}>{selected.id}</span>
            <StatusBadge status={selected.status}/>
          </div>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
            {[['가맹점',selected.branch],['사진 수',`${selected.photos}장`],['규격',selected.size],['결제금액',`${selected.total.toLocaleString()}원`],['접수일',selected.date],['마감일',selected.deadline]].map(([k,v])=><div key={k}>
              <div style={{fontSize:11,color:C.sec}}>{k}</div>
              <div style={{fontSize:13,fontWeight:600,marginTop:2}}>{v}</div>
            </div>)}
          </div>
        </div>

        {/* Status Timeline */}
        <div style={{marginBottom:20}}>
          <div style={{fontSize:13,fontWeight:700,marginBottom:12}}>진행 상태</div>
          <div style={{display:'flex',alignItems:'center',position:'relative'}}>
            <div style={{position:'absolute',left:14,right:14,top:'50%',height:2,background:C.border,zIndex:0}}/>
            {statusFlow.map((s,i)=>{
              const idx=statusFlow.indexOf(selected.status);
              const done=i<=idx;
              return <div key={i} style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',gap:6,position:'relative',zIndex:1}}>
                <div style={{width:28,height:28,borderRadius:'50%',background:done?C.primary:C.border,color:done?'#fff':C.sec,display:'flex',alignItems:'center',justifyContent:'center',fontSize:11,fontWeight:700,border:`2px solid ${done?C.primary:C.border}`}}>{done?'✓':i+1}</div>
                <span style={{fontSize:10,color:done?C.primary:C.muted,fontWeight:done?700:400,textAlign:'center'}}>{s}</span>
              </div>;
            })}
          </div>
        </div>

        {/* Worker Assignment */}
        <div style={{marginBottom:20}}>
          <div style={{fontSize:13,fontWeight:700,marginBottom:10}}>보정사 배정</div>
          {selected.worker
          ? <div style={{display:'flex',alignItems:'center',gap:12,padding:14,background:C.ps,borderRadius:10}}>
              <div style={{width:40,height:40,borderRadius:10,background:C.pl,display:'flex',alignItems:'center',justifyContent:'center',fontSize:20}}>{(workers.find(w=>w.name===selected.worker)||{}).avatar||'👤'}</div>
              <div style={{flex:1}}>
                <div style={{fontSize:14,fontWeight:700}}>{selected.worker}</div>
                <div style={{fontSize:11,color:C.sec}}>전문: {(workers.find(w=>w.name===selected.worker)||{}).specialty||'-'} · 완료 {(workers.find(w=>w.name===selected.worker)||{}).done||0}건</div>
              </div>
              <button className="btn btn-ghost" onClick={()=>{setAssignWorker(null);setAssignModal(true);}} style={{padding:'6px 12px',fontSize:11}}>변경</button>
            </div>
          : <button className="btn btn-outline" onClick={()=>{setAssignWorker(null);setAssignModal(true);}} style={{width:'100%',padding:12}}>
              👨‍🎨 보정사 배정하기
            </button>}
        </div>

        {/* Actions */}
        <div style={{display:'flex',flexDirection:'column',gap:10}}>
          {selected.status!=='전달' && <button className="btn btn-primary" onClick={()=>{
            const next=statusFlow[statusFlow.indexOf(selected.status)+1];
            setNextStatus(next);
            setStatusModal(true);
          }} style={{width:'100%',padding:12}}>
            다음 단계로 변경 → {statusFlow[statusFlow.indexOf(selected.status)+1]}
          </button>}
          {selected.status==='완료' && <button className="btn btn-ghost" onClick={handleUploadResult} style={{width:'100%',padding:12}}>

              📥 결과물 다운로드
            </button>
          )}
          <button className="btn" onClick={()=>setAlimtalkModal(true)} style={{width:'100%',padding:12,background:C.kakao,color:'#3C1E1E',fontWeight:700}}>

        </div>

          <Badge color={C.primary} bg={C.pl}>{nextStatus}</Badge>
        </div>

      </div>
      <div style={{display:'flex',gap:10}}>
        <button className="btn btn-ghost" onClick={()=>setStatusModal(false)} style={{flex:1,padding:12}}>취소</button>

      </div>
    </Modal>

    {/* Alimtalk Modal */}
    <Modal open={alimtalkModal} onClose={()=>{setAlimtalkModal(false);setSent(false);setSending(false);}} title="카카오 알림톡 발송">
      {selected && <div>
        {/* Kakao preview */}
        <div style={{background:'#B2C7D9',borderRadius:16,padding:16,marginBottom:20}}>
          <div style={{background:'#fff',borderRadius:12,padding:16,boxShadow:'0 2px 8px rgba(0,0,0,.08)'}}>
            <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:12,paddingBottom:12,borderBottom:`1px solid ${C.border}`}}>
              <div style={{width:36,height:36,borderRadius:'50%',background:C.kakao,display:'flex',alignItems:'center',justifyContent:'center',fontSize:18}}>🗨</div>
              <div>
                <div style={{fontSize:13,fontWeight:700}}>PhotoFlow</div>
                <div style={{fontSize:10,color:C.sec}}>공식 채널</div>
              </div>

            <div style={{fontSize:12,lineHeight:1.7,color:C.text,whiteSpace:'pre-wrap'}}>

// ── Admin: Branch Management ──
function BranchPage(){
  const [search,setSearch]=useState('');

    <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:12,marginBottom:18}}>
      <StatCard icon="🏪" label="전체 가맹점" value={`${branchList.length}개`} color={C.primary}/>
      <StatCard icon="✅" label="활성" value={`${branchList.filter(b=>b.status==='활성').length}개`} color={C.success}/>
      <StatCard icon="⏳" label="승인 대기" value={`${branchList.filter(b=>b.status==='승인대기').length}개`} color={C.warning}/>

    </div>

      {label:'가맹점명',render:r=><span style={{fontWeight:700}}>{r.name}</span>},
      {label:'대표자',key:'owner'},
      {label:'연락처',key:'phone'},
      {label:'등급',render:r=>{const g=gradeStyle[r.grade]||{};return <Badge color={g.c} bg={g.bg}>{r.grade}</Badge>}},
      {label:'상태',render:r=>{const s=stStyle[r.status]||{};return <Badge color={s.c} bg={s.bg}>{r.status}</Badge>}},
      {label:'총 주문',render:r=>`${r.orders}건`},
      {label:'월 매출',render:r=>`${r.monthly.toLocaleString()}원`},

        </> : <>

      <button className="btn btn-primary" onClick={()=>{

      }} style={{width:'100%',padding:12}}>등급 변경</button>
    </Modal>
  </div>;
}

// ── Admin: File Management ──
function FilePage(){
  const [tab,setTab]=useState('전체');
  const [files,setFiles]=useState(initFiles);
  const [uploadId,setUploadId]=useState(null);
  const [progress,setProgress]=useState({});
  const [done,setDone]=useState({});
  const [deliverProgress,setDeliverProgress]=useState({});
  const [deliverDone,setDeliverDone]=useState({});
  const [checked,setChecked]=useState(new Set());
  const [batchProg,setBatchProg]=useState(null);
  const [batchDone,setBatchDone]=useState(false);

  const filtered=tab==='전체'?files:files.filter(f=>f.type===(tab==='원본'?'original':'result'));
  const allChecked=filtered.length>0&&filtered.every(f=>checked.has(f.id));
  const someChecked=checked.size>0;
  const toggleCheck=(id)=>setChecked(prev=>{const s=new Set(prev);s.has(id)?s.delete(id):s.add(id);return s;});
  const toggleAll=()=>{if(allChecked){setChecked(new Set());}else{setChecked(new Set(filtered.map(f=>f.id)));}};
  const startBatch=(label)=>{
    setBatchProg(0);setBatchDone(false);
    let p=0;
    const iv=setInterval(()=>{
      p+=Math.random()*8+4;
      if(p>=100){p=100;clearInterval(iv);setBatchDone(true);}
      setBatchProg(Math.min(p,100));
    },120);
  };
  const tLabel={original:'원본',result:'결과물'};
  const tColor={original:{bg:C.ib,c:C.info},result:{bg:C.sb,c:C.success}};

  const startUpload=(id)=>{
    setUploadId(id);
    setDone({...done,[id]:false});
    let p=0;
    const iv=setInterval(()=>{
      p+=Math.random()*15+8;
      if(p>=100){p=100;clearInterval(iv);setDone(prev=>({...prev,[id]:true}));}
      setProgress(prev=>({...prev,[id]:Math.min(p,100)}));
    },180);
  };

  const startDownload=(id)=>{
    setProgress(prev=>({...prev,[`dl_${id}`]:0}));
    let p=0;
    const iv=setInterval(()=>{
      p+=Math.random()*20+10;
      if(p>=100){p=100;clearInterval(iv);}
      setProgress(prev=>({...prev,[`dl_${id}`]:Math.min(p,100)}));
    },150);
  };

  const startDeliver=(id)=>{
    setDeliverProgress(prev=>({...prev,[id]:0}));
    let p=0;
    const iv=setInterval(()=>{
      p+=Math.random()*18+10;
      if(p>=100){p=100;clearInterval(iv);setDeliverDone(prev=>({...prev,[id]:true}));}
      setDeliverProgress(prev=>({...prev,[id]:Math.min(p,100)}));
    },160);
  };

  return <div style={{animation:'fadeIn .4s'}}>
    <div style={{marginBottom:20}}>
      <h2 style={{fontSize:22,fontWeight:800}}>파일 관리</h2>
      <p style={{color:C.sec,fontSize:13,marginTop:3}}>S3 원본 다운로드 및 보정 결과물 업로드 관리</p>
    </div>
    <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:12,marginBottom:18}}>
      <StatCard icon="📁" label="전체 파일" value={`${files.length}건`} color={C.primary}/>
      <StatCard icon="📸" label="원본 파일" value={`${files.filter(f=>f.type==='original').length}건`} color={C.info}/>
      <StatCard icon="🖼️" label="결과물" value={`${files.filter(f=>f.type==='result').length}건`} color={C.success}/>
      <StatCard icon="💾" label="전체 용량" value="2.1 GB" sub="AWS S3 버킷" color={C.warning}/>
    </div>

    <div style={{display:'flex',gap:8,marginBottom:14}}>
      {['전체','원본','결과물'].map(t=><button key={t} onClick={()=>setTab(t)} className="btn" style={{padding:'7px 16px',borderRadius:20,border:`1px solid ${tab===t?C.primary:C.border}`,background:tab===t?C.primary:'transparent',color:tab===t?'#fff':C.sec,fontSize:12}}>{t}</button>)}
    </div>

    {/* Batch Action Bar */}
    {someChecked && <div style={{display:'flex',alignItems:'center',gap:12,padding:'12px 20px',background:C.primary,borderRadius:10,marginBottom:14,animation:'fadeIn .2s'}}>
      <span style={{color:'#fff',fontSize:13,fontWeight:700}}>{checked.size}건 선택</span>
      <div style={{flex:1}}/>
      <button className="btn" onClick={()=>startBatch('download')} style={{background:'rgba(255,255,255,.2)',color:'#fff',padding:'7px 16px',fontSize:12}}>📥 일괄 다운로드</button>
      <button className="btn" onClick={()=>startBatch('upload')} style={{background:'rgba(255,255,255,.2)',color:'#fff',padding:'7px 16px',fontSize:12}}>📤 일괄 업로드</button>
      <button className="btn" onClick={()=>startBatch('deliver')} style={{background:'rgba(255,255,255,.2)',color:'#fff',padding:'7px 16px',fontSize:12}}>📨 일괄 전달</button>
      <button className="btn" onClick={()=>setChecked(new Set())} style={{background:'rgba(255,255,255,.1)',color:'rgba(255,255,255,.7)',padding:'7px 12px',fontSize:12}}>✕</button>
    </div>}

    {/* Batch Progress Modal */}
    <Modal open={batchProg!==null} onClose={()=>{if(batchDone){setBatchProg(null);setChecked(new Set());}}} title="일괄 처리">
      <div style={{marginBottom:16}}>
        <div style={{display:'flex',justifyContent:'space-between',marginBottom:6}}>
          <span style={{fontSize:13,fontWeight:600}}>일괄 처리 진행 중</span>
          <span style={{fontSize:13,fontWeight:700,color:C.primary}}>{Math.round(batchProg||0)}%</span>
        </div>
        <ProgressBar percent={batchProg||0} animated/>
        <div style={{fontSize:12,color:C.sec,marginTop:8}}>{batchDone?`${checked.size}건 처리 완료`:`${checked.size}건 중 ${Math.ceil((batchProg||0)/100*checked.size)}건 처리 중...`}</div>
      </div>
      <div style={{display:'flex',flexDirection:'column',gap:4,maxHeight:200,overflow:'auto',marginBottom:16}}>
        {[...checked].map((id,i)=>{const f=files.find(x=>x.id===id);if(!f)return null;const fp=Math.max(0,Math.min((batchProg||0)-i*8,100));return <div key={id} style={{display:'flex',alignItems:'center',gap:8,padding:'6px 10px',background:'#FAFBFC',borderRadius:6,fontSize:12}}>
          <span>{fp>=100?'✅':'⏳'}</span>
          <span style={{flex:1,fontWeight:600}}>{f.order} — {f.branch}</span>
          <span style={{color:fp>=100?C.success:C.sec,fontWeight:600}}>{Math.round(fp)}%</span>
        </div>;})}
      </div>
      {batchDone && <button className="btn btn-primary" onClick={()=>{setBatchProg(null);setChecked(new Set());}} style={{width:'100%',padding:12}}>완료</button>}
    </Modal>

    <Table columns={[
      {label:<input type="checkbox" checked={allChecked} onChange={toggleAll} style={{width:16,height:16,cursor:'pointer',accentColor:C.primary}}/>,render:r=><input type="checkbox" checked={checked.has(r.id)} onChange={()=>toggleCheck(r.id)} onClick={e=>e.stopPropagation()} style={{width:16,height:16,cursor:'pointer',accentColor:C.primary}}/>},
      {label:'주문번호',render:r=><span style={{fontWeight:700,color:C.primary}}>{r.order}</span>},
      {label:'가맹점',key:'branch'},
      {label:'유형',render:r=>{const tc=tColor[r.type];return <Badge color={tc.c} bg={tc.bg}>{tLabel[r.type]}</Badge>}},
      {label:'파일 수',render:r=>`${r.count}장`},
      {label:'용량',key:'size'},
      {label:'업로드',key:'uploaded'},
      {label:'상태',render:r=><span style={{fontSize:12,color:r.status==='전달완료'?C.success:r.status==='처리중'?C.warning:C.sec}}>{r.status}</span>},
      {label:'액션',render:r=><div style={{display:'flex',gap:6,flexDirection:'column'}}>
        {r.type==='original' && <div>
          {progress[`dl_${r.id}`]!=null && progress[`dl_${r.id}`]<100
            ? <div style={{width:120}}><ProgressBar percent={progress[`dl_${r.id}`]} color={C.info} animated/><span style={{fontSize:10,color:C.sec}}>{Math.round(progress[`dl_${r.id}`])}%</span></div>
            : progress[`dl_${r.id}`]===100
            ? <Badge color={C.success} bg={C.sb}>다운완료 ✓</Badge>
            : <button className="btn" onClick={()=>startDownload(r.id)} style={{padding:'5px 12px',fontSize:11,background:C.info,color:'#fff'}}>📥 다운로드</button>}
        </div>}
        {r.type==='original' && <div>
          {uploadId===r.id && !done[r.id]
            ? <div style={{width:120}}><ProgressBar percent={progress[r.id]||0} animated/><span style={{fontSize:10,color:C.sec}}>{Math.round(progress[r.id]||0)}% 업로드중</span></div>
            : done[r.id]
            ? <Badge color={C.success} bg={C.sb}>업로드완료 ✓</Badge>
            : <button className="btn" onClick={()=>startUpload(r.id)} style={{padding:'5px 12px',fontSize:11,background:C.surface,color:C.primary,border:`1px solid ${C.primary}`}}>📤 결과업로드</button>}
        </div>}
        {r.type==='result' && (
          deliverDone[r.id]
          ? <Badge color={C.success} bg={C.sb}>전달완료 ✓</Badge>
          : deliverProgress[r.id]!=null && deliverProgress[r.id]<100
          ? <div style={{width:120}}><ProgressBar percent={deliverProgress[r.id]} color={C.primary} animated/><span style={{fontSize:10,color:C.sec}}>{Math.round(deliverProgress[r.id])}% 전달중</span></div>
          : <button className="btn" onClick={()=>startDeliver(r.id)} style={{padding:'5px 12px',fontSize:11,background:C.primary,color:'#fff'}}>📨 가맹점 전달</button>
        )}
      </div>},
    ]} rows={filtered}/>

    <div className="card" style={{marginTop:16}}>
      <h3 style={{fontSize:14,fontWeight:700,marginBottom:14}}>AWS S3 파이프라인 구조</h3>
      <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:12}}>
        {[
          {icon:'📤',title:'S3 Multipart Upload',color:'#EFF6FF',border:'#BFDBFE',tc:C.primary,desc:'대용량 원본을 5MB 청크로 분할하여 병렬 업로드. 실패 청크만 재시도 가능'},
          {icon:'🔒',title:'Presigned URL',color:'#F0FDF4',border:'#BBF7D0',tc:C.success,desc:'서명된 임시 URL(유효 24시간)로 S3 직접 전송. 백엔드 프록시 없이 보안 다운로드'},
          {icon:'📦',title:'ZIP 스트리밍',color:'#FFF7ED',border:'#FED7AA',tc:C.warning,desc:'다중 파일을 서버 메모리 없이 ZIP 스트림으로 묶어 클라이언트에 전송'},
        ].map((g,i)=><div key={i} style={{background:g.color,borderRadius:10,padding:16,border:`1px solid ${g.border}`}}>
          <div style={{fontSize:24,marginBottom:8}}>{g.icon}</div>
          <div style={{fontSize:13,fontWeight:700,color:g.tc,marginBottom:4}}>{g.title}</div>
          <div style={{fontSize:12,color:C.sec,lineHeight:1.6}}>{g.desc}</div>
        </div>)}
      </div>
    </div>
  </div>;
}

// ── Branch Portal ──
function BranchPortal({orders,setOrders}){
  const [page,setPage]=useState('내 대시보드');
  const [step,setStep]=useState(1);
  const [order,setOrder]=useState({size:sizeOptions[0].name,photos:1,note:''});
  const [uploadedFiles,setUploadedFiles]=useState([
    {name:'photo_001.jpg',size:'2.8MB'},{name:'photo_002.jpg',size:'3.1MB'},{name:'photo_003.jpg',size:'2.6MB'},
  ]);
  const [dragging,setDragging]=useState(false);
  const [uploadProgress,setUploadProgress]=useState({});
  const [allUploaded,setAllUploaded]=useState(false);
  const [paying,setPaying]=useState(false);
  const [paidDone,setPaidDone]=useState(false);
  const [newOrderId,setNewOrderId]=useState('');
  const [downloadProgress,setDownloadProgress]=useState({});
  const [payMethod,setPayMethod]=useState('신용카드');
  const [cardNum,setCardNum]=useState('4242  4242  4242  4242');
  const [cardExp,setCardExp]=useState('12 / 27');

  const myOrders=orders.filter(o=>o.branch==='강남점');

  const menuItems=[
    {name:'내 대시보드',icon:'📊'},
    {name:'주문 신청',icon:'➕'},
    {name:'내 주문',icon:'📋'},
    {name:'알림 내역',icon:'🗨'},
    {name:'내 정보',icon:'⚙️'},
  ];
  const [profile,setProfile]=useState({name:'강남점',owner:'김민준',phone:'02-555-1234',email:'gangnam@photoflow.kr',addr:'서울 강남구 테헤란로 123',bizNo:'123-45-67890'});
  const [profileSaved,setProfileSaved]=useState(false);

  const sizeObj=sizeOptions.find(s=>s.name===order.size)||sizeOptions[0];
  const total=sizeObj.price*(order.photos||1);

  const startUploadSim=()=>{
    const upd={};
    uploadedFiles.forEach((f,i)=>{
      upd[i]=0;
      let p=0;
      const iv=setInterval(()=>{
        p+=Math.random()*15+8;
        if(p>=100){p=100;clearInterval(iv);}
        setUploadProgress(prev=>({...prev,[i]:Math.min(p,100)}));
      },150+(i*80));
    });
    setTimeout(()=>setAllUploaded(true),Math.max(2800,uploadedFiles.length*600+1200));
  };

  const handleFileDrop=(e)=>{
    e.preventDefault();
    setDragging(false);
    const dropped=[...e.dataTransfer.files];
    if(dropped.length>0){
      setUploadedFiles(dropped.map(f=>({name:f.name,size:`${(f.size/1024/1024).toFixed(1)}MB`})));
      setUploadProgress({});
      setAllUploaded(false);
    }
  };

  const handleFileSelect=(e)=>{
    const selected=[...e.target.files];
    if(selected.length>0){
      setUploadedFiles(selected.map(f=>({name:f.name,size:`${(f.size/1024/1024).toFixed(1)}MB`})));
      setUploadProgress({});
      setAllUploaded(false);
    }
  };

  const startDownload=(id)=>{
    setDownloadProgress(prev=>({...prev,[id]:0}));
    let p=0;
    const iv=setInterval(()=>{
      p+=Math.random()*15+10;
      if(p>=100){p=100;clearInterval(iv);}
      setDownloadProgress(prev=>({...prev,[id]:Math.min(p,100)}));
    },150);
  };

  const handlePay=()=>{
    setPaying(true);
    setTimeout(()=>{
      setPaying(false);
      setPaidDone(true);
      const id=`PH-2025-0${String(orders.length+1).padStart(2,'0')}`;
      setNewOrderId(id);
      const today=new Date();
      const fmt=d=>`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
      const dlDate=new Date(today);
      dlDate.setDate(dlDate.getDate()+sizeObj.days+1);
      setOrders(prev=>[{id,branch:'강남점',photos:order.photos,size:order.size,total:sizeObj.price*order.photos,status:'접수',date:fmt(today),deadline:fmt(dlDate),note:order.note},...prev]);
    },2200);
  };

  const resetWizard=()=>{
    setStep(1);setAllUploaded(false);setPaidDone(false);setPaying(false);
    setOrder({size:sizeOptions[0].name,photos:1,note:''});
    setUploadProgress({});
    setUploadedFiles([{name:'photo_001.jpg',size:'2.8MB'},{name:'photo_002.jpg',size:'3.1MB'},{name:'photo_003.jpg',size:'2.6MB'}]);
    setCardNum('4242  4242  4242  4242');setCardExp('12 / 27');setPayMethod('신용카드');
  };

  const alimtalkHistory=[
    {id:1,type:'주문접수',msg:'주문 PH-2025-001 접수 완료. 작업 시작 시 알림 드립니다.',time:'2025-01-20 14:32',read:true},
    {id:2,type:'보정시작',msg:'주문 PH-2025-002 보정 작업이 시작되었습니다. 완료일: 2025-01-21',time:'2025-01-19 11:00',read:true},
    {id:3,type:'결과전달',msg:'주문 PH-2025-005 결과물이 전달되었습니다. 포털에서 다운로드하세요.',time:'2025-01-19 15:30',read:false},
  ];

  const renderPage=()=>{
    if(page==='내 대시보드') return <BranchDashboard myOrders={myOrders} alimtalkHistory={alimtalkHistory} onNewOrder={()=>{resetWizard();setPage('주문 신청');}}/>;
    if(page==='주문 신청') return <div style={{animation:'fadeIn .4s'}}>
      <div style={{marginBottom:24}}>
        <h2 style={{fontSize:22,fontWeight:800}}>주문 신청</h2>
        <p style={{color:C.sec,fontSize:13,marginTop:3}}>사진 업로드부터 결제까지 간편하게</p>
      </div>
      {/* Step Indicator */}
      <div className="card" style={{marginBottom:20}}>
        <div style={{display:'flex',alignItems:'center'}}>
          {[['1','사진 업로드'],['2','규격 선택'],['3','결제'],['4','완료']].map(([n,label],i)=><React.Fragment key={i}>
            <div style={{display:'flex',flexDirection:'column',alignItems:'center',gap:6}}>
              <div style={{width:32,height:32,borderRadius:'50%',background:step>i+1?C.success:step===i+1?C.primary:C.border,color:step>=i+1?'#fff':C.muted,display:'flex',alignItems:'center',justifyContent:'center',fontSize:13,fontWeight:700}}>
                {step>i+1?'✓':n}
              </div>
              <span style={{fontSize:11,fontWeight:step===i+1?700:400,color:step===i+1?C.primary:C.muted,whiteSpace:'nowrap'}}>{label}</span>
            </div>
            {i<3 && <div style={{flex:1,height:2,background:step>i+1?C.success:C.border,margin:'0 8px',marginBottom:20}}/>}
          </React.Fragment>)}
        </div>
      </div>

      {/* Step 1: Upload */}
      {step===1 && <div className="card" style={{animation:'fadeIn .3s'}}>
        <h3 style={{fontSize:16,fontWeight:700,marginBottom:4}}>원본 사진 업로드</h3>
        <p style={{fontSize:13,color:C.sec,marginBottom:20}}>JPG, PNG 형식 지원 · 장당 최대 20MB · S3 Multipart 업로드</p>
        <div onDragOver={e=>{e.preventDefault();setDragging(true);}} onDragLeave={()=>setDragging(false)} onDrop={handleFileDrop}
          style={{border:`2px dashed ${dragging?C.primary:C.border}`,borderRadius:12,padding:40,textAlign:'center',background:dragging?C.ps:C.bg,transition:'all .2s',cursor:'pointer',marginBottom:20}}
          onClick={()=>document.getElementById('fileInput').click()}>
          <div style={{fontSize:40,marginBottom:12}}>{dragging?'📂':'📸'}</div>
          <div style={{fontSize:15,fontWeight:600,color:dragging?C.primary:C.text,marginBottom:4}}>{dragging?'여기에 놓으세요':'사진을 드래그하거나 클릭하여 선택'}</div>
          <div style={{fontSize:12,color:C.muted}}>JPG, PNG · 장당 최대 20MB</div>
          <input id="fileInput" type="file" multiple accept="image/*" style={{display:'none'}} onChange={handleFileSelect}/>
        </div>

        {/* File list */}
        <div style={{marginBottom:20}}>
          <div style={{fontSize:13,fontWeight:700,marginBottom:10}}>📁 업로드 파일 ({uploadedFiles.length}장)</div>
          {uploadedFiles.map((f,i)=><div key={i} style={{display:'flex',alignItems:'center',gap:12,padding:'10px 14px',background:'#FAFBFC',borderRadius:8,border:`1px solid ${C.border}`,marginBottom:8}}>
            <span style={{fontSize:20}}>🖼️</span>
            <div style={{flex:1}}>
              <div style={{fontSize:13,fontWeight:600}}>{f.name}</div>
              <div style={{fontSize:11,color:C.sec,marginTop:2}}>{f.size}</div>
              {uploadProgress[i]!=null && <div style={{marginTop:6}}>
                <ProgressBar percent={uploadProgress[i]||0} animated height={5}/>
                <span style={{fontSize:10,color:C.sec}}>{Math.round(uploadProgress[i]||0)}%</span>
              </div>}
            </div>
            {(uploadProgress[i]||0)>=100 && <span style={{color:C.success,fontWeight:700,fontSize:14}}>✓</span>}
          </div>)}
        </div>

        {!allUploaded ? <button className="btn btn-primary" onClick={startUploadSim} style={{width:'100%',padding:14,fontSize:14}}>
          📤 S3 업로드 시작
        </button>
        : <div>
          <div style={{background:C.sb,borderRadius:10,padding:12,textAlign:'center',marginBottom:16}}>
            <span style={{fontSize:13,fontWeight:700,color:C.success}}>✅ 업로드 완료 — Presigned URL 생성됨</span>
          </div>
          <button className="btn btn-primary" onClick={()=>setStep(2)} style={{width:'100%',padding:14,fontSize:14}}>다음 단계: 규격 선택 →</button>
        </div>}
      </div>}

      {/* Step 2: Size */}
      {step===2 && <div className="card" style={{animation:'fadeIn .3s'}}>
        <h3 style={{fontSize:16,fontWeight:700,marginBottom:4}}>사진 규격 및 수량 선택</h3>
        <p style={{fontSize:13,color:C.sec,marginBottom:20}}>필요한 규격을 선택하고 수량을 입력해 주세요</p>
        <div style={{display:'flex',flexDirection:'column',gap:10,marginBottom:20}}>
          {sizeOptions.map(s=><label key={s.name} style={{display:'flex',alignItems:'center',gap:14,padding:16,borderRadius:10,border:`2px solid ${order.size===s.name?C.primary:C.border}`,background:order.size===s.name?C.ps:'transparent',cursor:'pointer',transition:'all .15s'}}>
            <input type="radio" checked={order.size===s.name} onChange={()=>setOrder({...order,size:s.name})} style={{display:'none'}}/>
            <div style={{width:20,height:20,borderRadius:'50%',border:`2px solid ${order.size===s.name?C.primary:C.border}`,display:'flex',alignItems:'center',justifyContent:'center'}}>
              {order.size===s.name && <div style={{width:10,height:10,borderRadius:'50%',background:C.primary}}/>}
            </div>
            <span style={{fontSize:22}}>{s.icon}</span>
            <div style={{flex:1}}>
              <div style={{fontSize:14,fontWeight:700}}>{s.name}</div>
              <div style={{fontSize:12,color:C.sec,marginTop:2}}>{s.desc} · 납기 {s.days}일</div>
            </div>
            <div style={{fontSize:16,fontWeight:800,color:order.size===s.name?C.primary:C.sec}}>{s.price.toLocaleString()}원<span style={{fontSize:11,fontWeight:400}}>/장</span></div>
          </label>)}
        </div>
        <div style={{marginBottom:20}}>
          <label style={{fontSize:13,fontWeight:700,marginBottom:8,display:'block'}}>사진 수량</label>
          <input className="input" type="number" min="1" max="100" value={order.photos} onChange={e=>setOrder({...order,photos:Math.max(1,parseInt(e.target.value)||1)}) } style={{width:160}}/>
        </div>
        <div style={{marginBottom:20}}>
          <label style={{fontSize:13,fontWeight:700,marginBottom:8,display:'block'}}>요청사항 (선택)</label>
          <textarea className="input" value={order.note} onChange={e=>setOrder({...order,note:e.target.value})} rows={3} placeholder="특별 요청사항을 입력하세요..." style={{resize:'none'}}/>
        </div>
        <div style={{background:C.ps,borderRadius:10,padding:16,marginBottom:20}}>
          <div style={{display:'flex',justifyContent:'space-between',marginBottom:6,fontSize:13}}><span style={{color:C.sec}}>단가</span><span style={{fontWeight:600}}>{sizeObj.price.toLocaleString()}원/장</span></div>
          <div style={{display:'flex',justifyContent:'space-between',marginBottom:10,fontSize:13}}><span style={{color:C.sec}}>수량</span><span style={{fontWeight:600}}>{order.photos}장</span></div>
          <div style={{borderTop:`1px solid ${C.border}`,paddingTop:10,display:'flex',justifyContent:'space-between'}}>
            <span style={{fontSize:15,fontWeight:700}}>합계</span>
            <span style={{fontSize:20,fontWeight:800,color:C.primary}}>{total.toLocaleString()}원</span>
          </div>
        </div>
        <div style={{display:'flex',gap:10}}>
          <button className="btn btn-ghost" onClick={()=>setStep(1)} style={{flex:1,padding:14}}>← 이전</button>
          <button className="btn btn-primary" onClick={()=>setStep(3)} style={{flex:2,padding:14}}>결제하기 →</button>
        </div>
      </div>}

      {/* Step 3: Payment */}
      {step===3 && <div className="card" style={{animation:'fadeIn .3s'}}>
        <h3 style={{fontSize:16,fontWeight:700,marginBottom:4}}>결제</h3>
        <p style={{fontSize:13,color:C.sec,marginBottom:20}}>토스페이먼츠 PG 연동 — 안전결제</p>
        <div style={{padding:16,background:C.ps,borderRadius:10,marginBottom:20}}>
          <div style={{display:'flex',justifyContent:'space-between',fontSize:13,marginBottom:4}}><span style={{color:C.sec}}>{order.size}</span><span>{sizeObj.price.toLocaleString()}원 × {order.photos}장</span></div>
          <div style={{borderTop:`1px solid ${C.border}`,paddingTop:10,display:'flex',justifyContent:'space-between'}}><span style={{fontWeight:700}}>결제 금액</span><span style={{fontSize:20,fontWeight:800,color:C.primary}}>{total.toLocaleString()}원</span></div>
        </div>

        {/* Toss Payments mockup */}
        <div style={{border:`2px solid ${C.toss}`,borderRadius:14,overflow:'hidden',marginBottom:20}}>
          <div style={{background:C.toss,padding:'14px 18px',display:'flex',alignItems:'center',gap:10}}>
            <span style={{color:'#fff',fontWeight:800,fontSize:15}}>toss</span>
            <span style={{color:'rgba(255,255,255,.7)',fontSize:12}}>payments</span>
            <span style={{marginLeft:'auto',color:'rgba(255,255,255,.8)',fontSize:12}}>🔒 SSL 보안결제</span>
          </div>
          <div style={{padding:18}}>
            <div style={{marginBottom:14}}>
              <div style={{fontSize:12,color:C.sec,marginBottom:6,fontWeight:600}}>결제 수단</div>
              <div style={{display:'flex',gap:8}}>
                {['신용카드','계좌이체','간편결제'].map((m)=><button key={m} className="btn" onClick={()=>setPayMethod(m)} style={{padding:'8px 14px',fontSize:12,background:payMethod===m?C.toss:'#F8FAFC',color:payMethod===m?'#fff':C.sec,border:`1px solid ${payMethod===m?C.toss:C.border}`,transition:'all .15s'}}>{m}</button>)}
              </div>
            </div>
            {payMethod==='신용카드' && <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginBottom:14}}>
              <div>
                <div style={{fontSize:11,color:C.sec,marginBottom:4,fontWeight:600}}>카드 번호</div>
                <input value={cardNum} onChange={e=>setCardNum(e.target.value)} placeholder="1234  5678  9012  3456" style={{width:'100%',padding:'10px 12px',background:'#F8FAFC',borderRadius:8,border:`1px solid ${C.border}`,fontSize:13,color:C.text,letterSpacing:1,fontFamily:'monospace',outline:'none'}}/>
              </div>
              <div>
                <div style={{fontSize:11,color:C.sec,marginBottom:4,fontWeight:600}}>유효기간</div>
                <input value={cardExp} onChange={e=>setCardExp(e.target.value)} placeholder="MM / YY" style={{width:'100%',padding:'10px 12px',background:'#F8FAFC',borderRadius:8,border:`1px solid ${C.border}`,fontSize:13,color:C.text,outline:'none'}}/>
              </div>
            </div>}
            {payMethod==='계좌이체' && <div style={{padding:14,background:'#F0F9FF',borderRadius:8,marginBottom:14,border:'1px solid #BAE6FD'}}>
              <div style={{fontSize:12,color:'#0369A1',fontWeight:600,marginBottom:4}}>계좌 정보</div>
              <div style={{fontSize:13,color:C.text}}>신한은행 110-123-456789 (PhotoFlow)</div>
              <div style={{fontSize:11,color:C.sec,marginTop:4}}>입금자명: 강남점 / 입금 확인 후 주문 처리됩니다</div>
            </div>}
            {payMethod==='간편결제' && <div style={{display:'flex',gap:8,marginBottom:14}}>
              {['카카오페이','네이버페이','토스'].map((p,i)=><div key={i} style={{flex:1,padding:'12px 8px',textAlign:'center',borderRadius:8,border:`1px solid ${C.border}`,background:'#FAFBFC',cursor:'pointer',fontSize:12,fontWeight:600}}>{p}</div>)}
            </div>}
            {!paidDone ? <button className="btn" onClick={handlePay} disabled={paying} style={{width:'100%',padding:14,background:C.toss,color:'#fff',fontWeight:700,fontSize:14,display:'flex',alignItems:'center',justifyContent:'center',gap:8}}>
              {paying ? <><Spinner/> 결제 처리 중...</> : `${total.toLocaleString()}원 결제하기`}
            </button>
            : <div style={{textAlign:'center',padding:'16px 0'}}>
              <div style={{fontSize:32,animation:'checkPop .4s',display:'inline-block'}}>✅</div>
              <div style={{fontSize:15,fontWeight:700,color:C.success,marginTop:8}}>결제 완료</div>
              <div style={{fontSize:12,color:C.sec,marginTop:4}}>결제 승인: {total.toLocaleString()}원</div>
            </div>}
          </div>
        </div>
        {!paidDone ? <div style={{display:'flex',gap:10}}>
          <button className="btn btn-ghost" onClick={()=>setStep(2)} style={{flex:1,padding:14}}>← 이전</button>
        </div>
        : <button className="btn btn-primary" onClick={()=>setStep(4)} style={{width:'100%',padding:14,fontSize:14}}>주문 완료 →</button>}
      </div>}

      {/* Step 4: Complete */}
      {step===4 && <div className="card" style={{textAlign:'center',padding:'48px 40px',animation:'fadeIn .4s'}}>
        <div style={{width:80,height:80,borderRadius:'50%',background:C.sb,display:'flex',alignItems:'center',justifyContent:'center',fontSize:40,margin:'0 auto 20px',animation:'checkPop .5s'}}>✅</div>
        <h3 style={{fontSize:22,fontWeight:800,marginBottom:8}}>주문 접수 완료!</h3>
        <p style={{fontSize:14,color:C.sec,marginBottom:20}}>카카오 알림톡으로 진행 상황을 안내해 드립니다</p>
        <div style={{background:C.ps,borderRadius:12,padding:20,marginBottom:28,display:'inline-block',width:'100%',maxWidth:320}}>
          <div style={{fontSize:13,color:C.sec,marginBottom:4}}>주문번호</div>
          <div style={{fontSize:20,fontWeight:800,color:C.primary}}>{newOrderId}</div>
          <div style={{marginTop:10,fontSize:12,color:C.sec}}>예상 납기: {sizeObj.days}일 이내</div>
        </div>
        <div style={{background:'#FFFBEB',border:'1px solid #FEF08A',borderRadius:10,padding:14,marginBottom:24,textAlign:'left'}}>
          <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:6}}>
            <span style={{background:C.kakao,borderRadius:6,padding:'2px 8px',fontSize:11,fontWeight:700,color:'#3C1E1E'}}>카카오</span>
            <span style={{fontSize:12,color:C.sec}}>알림톡 발송됨</span>
          </div>
          <div style={{fontSize:12,color:C.text,lineHeight:1.7}}>
            [PhotoFlow] 주문이 접수되었습니다.<br/>
            주문번호: {newOrderId}<br/>
            보정 규격: {order.size}<br/>
            작업 시작 시 알림을 보내드립니다.
          </div>
        </div>
        <div style={{display:'flex',gap:10}}>
          <button className="btn btn-ghost" onClick={()=>setPage('내 주문')} style={{flex:1,padding:12}}>내 주문 확인</button>
          <button className="btn btn-primary" onClick={resetWizard} style={{flex:1,padding:12}}>새 주문 신청</button>
        </div>
      </div>}
    </div>;

    if(page==='내 주문') return <MyOrdersPage myOrders={myOrders} downloadProgress={downloadProgress} startDownload={startDownload}/>;

    if(page==='내 정보') return <div style={{animation:'fadeIn .4s'}}>
      <div style={{marginBottom:24}}>
        <h2 style={{fontSize:22,fontWeight:800}}>내 정보 수정</h2>
        <p style={{color:C.sec,fontSize:13,marginTop:3}}>가맹점 기본 정보를 수정합니다</p>
      </div>
      <div className="card">
        <div style={{display:'flex',alignItems:'center',gap:16,marginBottom:24,paddingBottom:20,borderBottom:`1px solid ${C.border}`}}>
          <div style={{width:64,height:64,borderRadius:14,background:C.pl,display:'flex',alignItems:'center',justifyContent:'center',fontSize:28}}>🏪</div>
          <div>
            <div style={{fontSize:20,fontWeight:800}}>{profile.name}</div>
            <div style={{fontSize:13,color:C.sec}}>프리미엄 등급 · 가입일 2024-05-12</div>
          </div>
        </div>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:16,marginBottom:20}}>
          <div><label style={{fontSize:12,fontWeight:700,color:C.sec,marginBottom:6,display:'block'}}>가맹점명</label><input className="input" value={profile.name} onChange={e=>setProfile({...profile,name:e.target.value})}/></div>
          <div><label style={{fontSize:12,fontWeight:700,color:C.sec,marginBottom:6,display:'block'}}>대표자명</label><input className="input" value={profile.owner} onChange={e=>setProfile({...profile,owner:e.target.value})}/></div>
        </div>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:16,marginBottom:20}}>
          <div><label style={{fontSize:12,fontWeight:700,color:C.sec,marginBottom:6,display:'block'}}>연락처</label><input className="input" value={profile.phone} onChange={e=>setProfile({...profile,phone:e.target.value})}/></div>
          <div><label style={{fontSize:12,fontWeight:700,color:C.sec,marginBottom:6,display:'block'}}>이메일</label><input className="input" value={profile.email} onChange={e=>setProfile({...profile,email:e.target.value})}/></div>
        </div>
        <div style={{marginBottom:20}}>
          <label style={{fontSize:12,fontWeight:700,color:C.sec,marginBottom:6,display:'block'}}>주소</label>
          <input className="input" value={profile.addr} onChange={e=>setProfile({...profile,addr:e.target.value})}/>
        </div>
        <div style={{marginBottom:24}}>
          <label style={{fontSize:12,fontWeight:700,color:C.sec,marginBottom:6,display:'block'}}>사업자등록번호</label>
          <input className="input" value={profile.bizNo} onChange={e=>setProfile({...profile,bizNo:e.target.value})}/>
        </div>
        {profileSaved && <div style={{background:C.sb,borderRadius:8,padding:'10px 14px',marginBottom:16,fontSize:13,fontWeight:700,color:C.success,textAlign:'center',animation:'fadeIn .3s'}}>✅ 정보가 저장되었습니다</div>}
        <button className="btn btn-primary" onClick={()=>{setProfileSaved(true);setTimeout(()=>setProfileSaved(false),3000);}} style={{width:'100%',padding:14,fontSize:14}}>변경사항 저장</button>
      </div>
      <div className="card" style={{marginTop:16}}>
        <h3 style={{fontSize:14,fontWeight:700,marginBottom:16}}>비밀번호 변경</h3>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:14,marginBottom:16}}>
          <div><label style={{fontSize:12,fontWeight:700,color:C.sec,marginBottom:6,display:'block'}}>현재 비밀번호</label><input className="input" type="password" placeholder="현재 비밀번호"/></div>
          <div><label style={{fontSize:12,fontWeight:700,color:C.sec,marginBottom:6,display:'block'}}>새 비밀번호</label><input className="input" type="password" placeholder="8자 이상"/></div>
          <div><label style={{fontSize:12,fontWeight:700,color:C.sec,marginBottom:6,display:'block'}}>비밀번호 확인</label><input className="input" type="password" placeholder="비밀번호 확인"/></div>
        </div>
        <button className="btn btn-ghost" style={{padding:'10px 24px'}}>비밀번호 변경</button>
      </div>
    </div>;

    if(page==='알림 내역') return <div style={{animation:'fadeIn .4s'}}>
      <div style={{marginBottom:20}}>
        <h2 style={{fontSize:22,fontWeight:800}}>알림 내역</h2>
        <p style={{color:C.sec,fontSize:13,marginTop:3}}>카카오 알림톡 수신 내역</p>
      </div>
      <div style={{display:'flex',flexDirection:'column',gap:10}}>
        {alimtalkHistory.map(a=><div key={a.id} className="card" style={{display:'flex',gap:14,padding:'16px 20px',borderLeft:`4px solid ${a.read?C.border:C.kakao}`}}>
          <div style={{width:40,height:40,borderRadius:10,background:C.kakao,display:'flex',alignItems:'center',justifyContent:'center',fontSize:20,flexShrink:0}}>🗨</div>
          <div style={{flex:1}}>
            <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:4}}>
              <Badge color='#3C1E1E' bg={C.kakao}>{a.type}</Badge>
              {!a.read && <span style={{fontSize:10,fontWeight:700,color:C.danger}}>NEW</span>}
            </div>
            <div style={{fontSize:13,color:C.text,lineHeight:1.6}}>{a.msg}</div>
            <div style={{fontSize:11,color:C.muted,marginTop:4}}>{a.time}</div>
          </div>
        </div>)}
      </div>
    </div>;
    return null;
  };

  return <div style={{display:'flex',minHeight:'calc(100vh - 52px)'}}>
    <div style={{width:220,background:'#1E3A5F',flexShrink:0,padding:'16px 12px',display:'flex',flexDirection:'column'}}>
      <div style={{padding:'12px 8px',marginBottom:8}}>
        <div style={{color:'rgba(255,255,255,.5)',fontSize:10,fontWeight:700,letterSpacing:1,marginBottom:6}}>BRANCH PORTAL</div>
        <div style={{color:'#fff',fontWeight:800,fontSize:14}}>📸 강남점</div>
        <div style={{color:'rgba(255,255,255,.5)',fontSize:11,marginTop:2}}>김민준 대표</div>
      </div>
      {menuItems.map(item=><button key={item.name} onClick={()=>{setPage(item.name);if(item.name==='주문 신청'&&step===4)resetWizard();}} className="btn" style={{width:'100%',textAlign:'left',display:'flex',alignItems:'center',gap:10,padding:'10px 14px',borderRadius:8,background:page===item.name?'rgba(255,255,255,.15)':'transparent',color:page===item.name?'#fff':'rgba(255,255,255,.6)',fontSize:13,fontWeight:page===item.name?600:400,marginBottom:2}}>
        <span>{item.icon}</span>{item.name}
        {item.name==='알림 내역' && <span style={{marginLeft:'auto',background:C.danger,color:'#fff',borderRadius:10,padding:'1px 6px',fontSize:10,fontWeight:700}}>1</span>}
      </button>)}
    </div>
    <div style={{flex:1,padding:'28px 32px',background:C.bg,overflowY:'auto'}}>
      {renderPage()}
    </div>
  </div>;
}

function MyOrdersPage({myOrders,downloadProgress,startDownload}){
  const [filter,setFilter]=useState('전체');
  const [search,setSearch]=useState('');
  const tabs=['전체','접수','보정중','완료','전달'];
  const filtered=myOrders.filter(o=>{
    if(filter!=='전체'&&o.status!==filter)return false;
    if(search&&!o.id.includes(search)&&!o.size.includes(search))return false;
    return true;
  });
  return <div style={{animation:'fadeIn .4s'}}>
    <div style={{marginBottom:20}}>
      <h2 style={{fontSize:22,fontWeight:800}}>내 주문</h2>
      <p style={{color:C.sec,fontSize:13,marginTop:3}}>강남점 주문 내역 및 결과물 다운로드</p>
    </div>
    <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:12,marginBottom:18}}>
      <StatCard icon="📥" label="접수/보정중" value={`${myOrders.filter(o=>['접수','보정중'].includes(o.status)).length}건`} color={C.warning}/>
      <StatCard icon="✅" label="완료/전달" value={`${myOrders.filter(o=>['완료','전달'].includes(o.status)).length}건`} color={C.success}/>
      <StatCard icon="💰" label="이번 달 결제" value={`${(myOrders.reduce((s,o)=>s+o.total,0)/10000).toFixed(0)}만원`} color={C.primary}/>
    </div>
    <div style={{display:'flex',gap:8,marginBottom:14,flexWrap:'wrap'}}>
      {tabs.map(t=><button key={t} onClick={()=>setFilter(t)} className="btn" style={{padding:'6px 14px',borderRadius:20,border:`1px solid ${filter===t?C.primary:C.border}`,background:filter===t?C.primary:'transparent',color:filter===t?'#fff':C.sec,fontSize:12}}>{t}{t!=='전체'&&` (${myOrders.filter(o=>o.status===t).length})`}</button>)}
      <div style={{marginLeft:'auto'}}>
        <input className="input" value={search} onChange={e=>setSearch(e.target.value)} placeholder="🔍 주문번호/규격 검색..." style={{width:200,padding:'6px 12px',fontSize:12}}/>
      </div>
    </div>
    <div style={{display:'flex',flexDirection:'column',gap:10}}>
      {filtered.length===0 && <div className="card" style={{textAlign:'center',padding:32,color:C.muted,fontSize:13}}>검색 결과가 없습니다</div>}
      {filtered.map(o=><div key={o.id} className="card" style={{display:'flex',alignItems:'center',gap:16,padding:'16px 20px'}}>
        <div style={{width:48,height:48,borderRadius:10,background:{접수:C.ib,보정중:C.wb,완료:C.sb,전달:C.pl}[o.status]||C.bg,display:'flex',alignItems:'center',justifyContent:'center',fontSize:22}}>
          {{접수:'📥',보정중:'🖌️',완료:'✅',전달:'📦'}[o.status]}
        </div>
        <div style={{flex:1}}>
          <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:4}}>
            <span style={{fontSize:14,fontWeight:700,color:C.primary}}>{o.id}</span>
            <StatusBadge status={o.status}/>
          </div>
          <div style={{fontSize:12,color:C.sec}}>{o.size} · {o.photos}장 · {o.total.toLocaleString()}원</div>
          <div style={{fontSize:11,color:C.muted,marginTop:2}}>접수 {o.date} · 마감 {o.deadline}</div>
        </div>
        {['완료','전달'].includes(o.status) && (
          downloadProgress[o.id]!=null && downloadProgress[o.id]<100
          ? <div style={{width:120}}>
              <ProgressBar percent={downloadProgress[o.id]} color={C.success} animated/>
              <span style={{fontSize:10,color:C.sec}}>{Math.round(downloadProgress[o.id])}%</span>
            </div>
          : downloadProgress[o.id]===100
          ? <Badge color={C.success} bg={C.sb}>다운완료 ✓</Badge>
          : <button className="btn btn-success" onClick={()=>startDownload(o.id)} style={{padding:'8px 16px',fontSize:12}}>📥 다운로드</button>
        )}
        {o.status==='보정중' && <span style={{fontSize:12,color:C.warning,fontWeight:600,animation:'pulse 2s infinite'}}>⏳ 작업중</span>}
        {o.status==='접수' && <span style={{fontSize:12,color:C.info,fontWeight:600}}>대기 중</span>}
      </div>)}
    </div>
  </div>;
}

function BranchDashboard({myOrders,alimtalkHistory,onNewOrder}){
  const pending=myOrders.filter(o=>o.status==='접수').length;
  const proc=myOrders.filter(o=>o.status==='보정중').length;
  const done=myOrders.filter(o=>['완료','전달'].includes(o.status)).length;
  return <div style={{animation:'fadeIn .4s'}}>
    <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:24}}>
      <div><h2 style={{fontSize:22,fontWeight:800}}>내 대시보드</h2><p style={{color:C.sec,fontSize:13,marginTop:3}}>강남점 주문 현황</p></div>
      <button className="btn btn-primary" onClick={onNewOrder} style={{padding:'10px 20px'}}>+ 새 주문 신청</button>
    </div>
    <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:16,marginBottom:20}}>
      <StatCard icon="📥" label="접수 대기" value={`${pending}건`} color={C.info}/>
      <StatCard icon="🖌️" label="보정 진행중" value={`${proc}건`} color={C.warning}/>
      <StatCard icon="✅" label="완료/다운가능" value={`${done}건`} color={C.success}/>
    </div>
    <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:16}}>
      <div className="card">
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:14}}>
          <h3 style={{fontSize:14,fontWeight:700}}>최근 주문</h3>
        </div>
        {myOrders.slice(0,4).map(o=><div key={o.id} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'10px 0',borderBottom:`1px solid ${C.border}`}}>
          <div>
            <div style={{fontSize:13,fontWeight:600,color:C.primary}}>{o.id}</div>
            <div style={{fontSize:11,color:C.sec,marginTop:2}}>{o.size} · {o.photos}장</div>
          </div>
          <StatusBadge status={o.status}/>
        </div>)}
      </div>
      <div className="card">
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:14}}>
          <h3 style={{fontSize:14,fontWeight:700}}>카카오 알림톡</h3>
          <Badge color='#3C1E1E' bg={C.kakao}>🗨 카카오</Badge>
        </div>
        {alimtalkHistory.map(a=><div key={a.id} style={{display:'flex',gap:10,padding:'10px 0',borderBottom:`1px solid ${C.border}`}}>
          <div style={{width:8,height:8,borderRadius:'50%',background:a.read?C.border:C.kakao,flexShrink:0,marginTop:4}}/>
          <div style={{flex:1}}>
            <div style={{fontSize:12,fontWeight:a.read?400:700,color:a.read?C.sec:C.text}}>{a.msg}</div>
            <div style={{fontSize:10,color:C.muted,marginTop:3}}>{a.time}</div>
          </div>
        </div>)}
      </div>
    </div>
  </div>;
}

// ── Main App ──
function App(){
  const [auth,setAuth]=useState(null);
  const [mode,setMode]=useState('admin');
  const [page,setPage]=useState('대시보드');
  const [orders,setOrders]=useState(initOrders);
  const [loading,setLoading]=useState(false);
  const [showNotif,setShowNotif]=useState(false);
  const [readNotifs,setReadNotifs]=useState(new Set());
  const handleLogin=(m)=>{setMode(m);setLoading(true);setTimeout(()=>{setAuth(m);setLoading(false);},600);};
  useEffect(()=>{
    if(!showNotif)return;
    const close=()=>setShowNotif(false);
    const t=setTimeout(()=>document.addEventListener('click',close),0);
    return()=>{clearTimeout(t);document.removeEventListener('click',close);};
  },[showNotif]);

  const notifList=[
    {id:1,icon:'📥',text:'강남점 신규 주문 12건 접수',time:'10분 전',link:'주문 관리'},
    {id:2,icon:'⏳',text:'수원점 가맹점 가입 승인 대기',time:'42분 전',link:'가맹점 관리'},
    {id:3,icon:'🗨',text:'대구중앙점 알림톡 발송 실패 1건',time:'2시간 전',link:'주문 관리'},
    {id:4,icon:'✅',text:'부산서면점 PH-2025-003 전달 완료',time:'3시간 전',link:'파일 관리'},
  ];
  const unread=notifList.filter(n=>!readNotifs.has(n.id)).length;

  const adminMenu=[
    {name:'대시보드',icon:'📊'},
    {name:'주문 관리',icon:'📋'},
    {name:'가맹점 관리',icon:'🏪'},
    {name:'파일 관리',icon:'📁'},
  ];

  if(!auth && !loading) return <LoginPage onLogin={handleLogin}/>;
  if(loading) return <div style={{display:'flex',minHeight:'100vh',background:C.sidebar}}>
    <div style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:16}}>
      <div style={{width:64,height:64,borderRadius:16,background:'linear-gradient(135deg,#2563EB,#0EA5E9)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:32,boxShadow:'0 8px 32px rgba(37,99,235,.4)'}}>📸</div>
      <div style={{color:'#fff',fontSize:20,fontWeight:800}}>PhotoFlow</div>
      <Spinner/>
    </div>
  </div>;

  return <div style={{display:'flex',flexDirection:'column',minHeight:'100vh'}}>
    {/* Top bar with mode toggle */}
    <div style={{background:C.sidebar,borderBottom:'1px solid rgba(255,255,255,.08)',padding:'0 24px',display:'flex',alignItems:'center',gap:16,height:52,flexShrink:0,zIndex:200,position:'sticky',top:0}}>
      <div style={{display:'flex',alignItems:'center',gap:10,marginRight:16}}>
        <div style={{width:28,height:28,borderRadius:8,background:'linear-gradient(135deg,#2563EB,#0EA5E9)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:16}}>📸</div>
        <span style={{color:'#fff',fontWeight:800,fontSize:15}}>PhotoFlow</span>
      </div>
      <div style={{display:'flex',background:'rgba(255,255,255,.08)',borderRadius:8,padding:3,gap:2}}>
        {[['admin','🔧 관리자'],['branch','🏪 가맹점 포털']].map(([m,label])=><button key={m} onClick={()=>{setMode(m);setPage('대시보드');}} className="btn" style={{padding:'6px 16px',borderRadius:6,background:mode===m?C.primary:'transparent',color:mode===m?'#fff':'rgba(255,255,255,.6)',fontSize:12,fontWeight:mode===m?700:400,border:'none'}}>
          {label}
        </button>)}
      </div>
      <div style={{marginLeft:'auto',display:'flex',alignItems:'center',gap:12}}>
        <span style={{fontSize:12,color:'rgba(255,255,255,.4)'}}>사진 보정 주문 관리 플랫폼 데모</span>
        {mode==='admin' && <div style={{display:'flex',alignItems:'center',gap:6,background:'rgba(255,255,255,.08)',borderRadius:8,padding:'5px 12px'}}>
          <div style={{width:7,height:7,borderRadius:'50%',background:C.success}}/>
          <span style={{color:'rgba(255,255,255,.7)',fontSize:11}}>관리자</span>
        </div>}
      </div>
    </div>

    {mode==='branch' ? <BranchPortal orders={orders} setOrders={setOrders}/> :
    <div style={{display:'flex',flex:1}}>
      {/* Admin Sidebar */}
      <div style={{width:240,background:C.sidebar,padding:'16px 12px',display:'flex',flexDirection:'column',position:'fixed',top:52,bottom:0,overflowY:'auto',zIndex:100}}>
        <div style={{padding:'8px',marginBottom:12}}>
          <div style={{color:'rgba(255,255,255,.35)',fontSize:10,fontWeight:700,letterSpacing:1.5,marginBottom:8}}>NAVIGATION</div>
          {adminMenu.map(item=><button key={item.name} title={item.name} onClick={()=>setPage(item.name)} className="btn"
            style={{width:'100%',textAlign:'left',display:'flex',alignItems:'center',gap:12,padding:'11px 14px',borderRadius:8,background:page===item.name?C.primary:'transparent',color:page===item.name?'#fff':'rgba(255,255,255,.55)',fontSize:13,fontWeight:page===item.name?600:400,marginBottom:3,border:'none',transition:'all .15s'}}
            onMouseEnter={e=>{if(page!==item.name)e.currentTarget.style.background='rgba(255,255,255,.07)';}} onMouseLeave={e=>{if(page!==item.name)e.currentTarget.style.background='transparent';}}>
            <span style={{fontSize:16}}>{item.icon}</span>{item.name}
            {item.name==='주문 관리' && <span style={{marginLeft:'auto',background:C.danger,color:'#fff',borderRadius:10,padding:'1px 7px',fontSize:10,fontWeight:700}}>{orders.filter(o=>o.status==='접수').length}</span>}
          </button>)}
        </div>
        <div style={{marginTop:'auto',padding:'12px 8px',borderTop:'1px solid rgba(255,255,255,.08)'}}>
          <div style={{display:'flex',alignItems:'center',gap:10,padding:'8px 10px',borderRadius:8}}>
            <div style={{width:32,height:32,borderRadius:'50%',background:'linear-gradient(135deg,#2563EB,#0EA5E9)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:14}}>👤</div>
            <div><div style={{color:'#fff',fontSize:12,fontWeight:600}}>관리자</div><div style={{color:'rgba(255,255,255,.35)',fontSize:10}}>admin@photoflow.kr</div></div>
          </div>
        </div>
      </div>

      {/* Main content */}
      <div style={{flex:1,marginLeft:240}}>
        <div style={{background:C.surface,borderBottom:`1px solid ${C.border}`,padding:'0 28px',height:56,display:'flex',alignItems:'center',justifyContent:'space-between',position:'sticky',top:52,zIndex:50}}>
          <div style={{display:'flex',alignItems:'center',gap:6,fontSize:13,color:C.muted}}>
            <span>PhotoFlow</span><span>›</span><span style={{color:C.text,fontWeight:600}}>{page}</span>
          </div>
          <div style={{display:'flex',alignItems:'center',gap:14}}>
            <div style={{position:'relative'}}>
              <div onClick={()=>setShowNotif(!showNotif)} style={{cursor:'pointer',padding:'4px 6px',borderRadius:8,background:showNotif?C.ps:'transparent'}}>
                <span style={{fontSize:18}}>🔔</span>
                {unread>0 && <span style={{position:'absolute',top:0,right:2,width:15,height:15,borderRadius:'50%',background:C.danger,color:'#fff',fontSize:9,fontWeight:700,display:'flex',alignItems:'center',justifyContent:'center'}}>{unread}</span>}
              </div>
              {showNotif && <div onClick={e=>e.stopPropagation()} style={{position:'absolute',right:0,top:'calc(100% + 8px)',width:320,background:C.surface,border:`1px solid ${C.border}`,borderRadius:14,boxShadow:'0 8px 30px rgba(0,0,0,.12)',zIndex:300,animation:'fadeIn .15s'}}>
                <div style={{padding:'14px 16px',borderBottom:`1px solid ${C.border}`,display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                  <span style={{fontSize:14,fontWeight:700}}>알림</span>
                  <span style={{fontSize:11,color:C.primary,cursor:'pointer',fontWeight:600}} onClick={()=>setShowNotif(false)}>닫기</span>
                </div>
                {notifList.map(n=><div key={n.id} onClick={()=>{setReadNotifs(prev=>{const s=new Set(prev);s.add(n.id);return s;});setPage(n.link);setShowNotif(false);}} style={{display:'flex',gap:10,padding:'12px 16px',borderBottom:`1px solid ${C.border}`,cursor:'pointer',background:readNotifs.has(n.id)?'transparent':C.ps,transition:'background .1s'}} onMouseEnter={e=>e.currentTarget.style.background='#F8FAFC'} onMouseLeave={e=>e.currentTarget.style.background=readNotifs.has(n.id)?'transparent':C.ps}>
                  <span style={{fontSize:18,flexShrink:0}}>{n.icon}</span>
                  <div style={{flex:1}}>
                    <div style={{fontSize:13,fontWeight:readNotifs.has(n.id)?400:600,color:C.text}}>{n.text}</div>
                    <div style={{fontSize:11,color:C.muted,marginTop:2}}>{n.time}</div>
                  </div>
                  {!readNotifs.has(n.id) && <div style={{width:7,height:7,borderRadius:'50%',background:C.primary,flexShrink:0,marginTop:4}}/>}
                </div>)}
                {unread===0 && <div style={{padding:'10px 16px',textAlign:'center',fontSize:12,color:C.muted}}>모든 알림을 읽었습니다</div>}
              </div>}
            </div>
            <div style={{width:1,height:20,background:C.border}}/>
            <span style={{fontSize:12,color:C.sec}}>2025.01.20</span>
          </div>
        </div>
        <div style={{padding:'28px 32px',minHeight:'calc(100vh - 108px)',background:C.bg}}>
          {page==='대시보드' && <DashboardPage orders={orders} onViewOrders={()=>setPage('주문 관리')}/>}
          {page==='주문 관리' && <OrderPage orders={orders} setOrders={setOrders}/>}
          {page==='가맹점 관리' && <BranchPage/>}
          {page==='파일 관리' && <FilePage/>}
        </div>
      </div>
    </div>}
  </div>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
