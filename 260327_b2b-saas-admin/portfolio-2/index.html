function CountUpNum({end,suffix='',duration=1200}){
  const [val,setVal]=useState(0);
  useEffect(()=>{let s=0;const step=end/(duration/16);const t=setInterval(()=>{s+=step;if(s>=end){setVal(end);clearInterval(t);}else setVal(Math.floor(s));},16);return()=>clearInterval(t);},[end]);
  return <span style={{animation:'countUp 400ms ease'}}>{val.toLocaleString()}{suffix}</span>;
}

function Toast({message,onClose}){
  useEffect(()=>{const t=setTimeout(onClose,3000);return()=>clearTimeout(t);},[]);
  return <div style={{position:'fixed',bottom:24,right:24,zIndex:9999,background:C.secondary,color:'#fff',padding:'12px 24px',borderRadius:10,animation:'slideUp 300ms ease',boxShadow:'0 4px 16px rgba(0,0,0,0.2)',fontSize:14}}>{message}</div>;
}

              <div key={f.l}><div style={{fontSize:12,color:C.textMuted,marginBottom:4}}>{f.l}</div><div style={{fontSize:14,fontWeight:500}}>{f.v}</div></div>

          </div>

        <Modal title="신규 임직원 등록" onClose={()=>setModal(null)}>
          <FormField label="이름" value=""/>
          <FormField label="이메일" value="" type="email"/>

          <FormField label="직책" value=""/>

          <div style={{display:'flex',gap:8,justifyContent:'flex-end',marginTop:8}}>

            <button onClick={()=>{setModal(null);onToast('임직원이 등록되었습니다.')}} style={{padding:'8px 20px',borderRadius:10,border:'none',background:C.accent,color:'#fff',cursor:'pointer',fontSize:13,fontWeight:600,fontFamily:'inherit'}}>등록</button>
          </div>
        </Modal>
      )}
    </div>
  );
}

// ─── Permission ───
function PermissionPage({onToast}){
  const allPerms=['대시보드','임직원관리','근태관리','채용관리','권한설정','조직관리','급여관리'];
  const roles=Object.keys(PERMISSIONS);
  const [selectedRole,setSelectedRole]=useState(null);

  return(
    <div style={{animation:'fadeIn 300ms ease'}}>
      <div style={{background:C.surface,borderRadius:16,boxShadow:'0 4px 16px rgba(0,0,0,0.10)',overflow:'hidden'}}>
        <div style={{padding:'16px 20px',borderBottom:'1px solid '+C.border,display:'flex',justifyContent:'space-between',alignItems:'center'}}>
          <h3 style={{fontSize:15,fontWeight:700}}>역할별 권한 매트릭스</h3>
          <button onClick={()=>onToast('권한 설정이 저장되었습니다.')} style={{padding:'6px 16px',borderRadius:8,border:'none',background:C.accent,color:'#fff',cursor:'pointer',fontSize:13,fontWeight:600,fontFamily:'inherit'}}>저장</button>
        </div>
        <table style={{width:'100%',borderCollapse:'collapse'}}>
          <thead><tr style={{borderBottom:'2px solid '+C.border}}>
            <th style={{padding:'12px 16px',textAlign:'left',fontSize:11,fontWeight:700,color:C.textLight,textTransform:'uppercase',letterSpacing:'0.05em',width:160}}>역할</th>
            {allPerms.map(p=><th key={p} style={{padding:'12px 8px',textAlign:'center',fontSize:11,fontWeight:700,color:C.textLight,letterSpacing:'0.02em'}}>{p}</th>)}
            <th style={{padding:'12px 16px',textAlign:'center',fontSize:11,fontWeight:700,color:C.textLight,width:80}}>상세</th>
          </tr></thead>
          <tbody>
            {roles.map((role,i)=>(
              <tr key={role} style={{borderBottom:'1px solid '+C.border,animation:'slideUp 300ms ease '+(i*60)+'ms both'}}>
                <td style={{padding:'14px 16px',fontSize:14,fontWeight:600}}>{role}</td>
                {allPerms.map(p=>(
                  <td key={p} style={{padding:'14px 8px',textAlign:'center'}}>
                    <div style={{width:20,height:20,borderRadius:4,border:'2px solid '+(PERMISSIONS[role].includes(p)?C.accent:C.border),background:PERMISSIONS[role].includes(p)?C.accent:'#fff',display:'inline-flex',alignItems:'center',justifyContent:'center',cursor:'pointer',transition:'all 150ms'}}>
                      {PERMISSIONS[role].includes(p)&&<span style={{color:'#fff',fontSize:12,fontWeight:700}}>✓</span>}
                    </div>
                  </td>
                ))}
                <td style={{padding:'14px 16px',textAlign:'center'}}>
                  <button onClick={()=>setSelectedRole(role)} style={{background:'none',border:'1px solid '+C.border,borderRadius:6,padding:'4px 10px',cursor:'pointer',fontSize:12,fontFamily:'inherit',color:C.textLight}}>보기</button>
                </td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>

      {selectedRole&&(
        <Drawer item={{name:selectedRole+' 권한 상세'}} onClose={()=>setSelectedRole(null)}>
          <div style={{marginBottom:16}}>
            <div style={{fontSize:12,color:C.textMuted,marginBottom:8}}>활성 권한 ({PERMISSIONS[selectedRole].length}개)</div>
            <div style={{display:'flex',flexWrap:'wrap',gap:6}}>
              {PERMISSIONS[selectedRole].map(p=>(
                <span key={p} style={{padding:'4px 12px',borderRadius:20,background:C.accent+'15',color:C.accent,fontSize:13,fontWeight:500}}>{p}</span>
              ))}
            </div>
          </div>
          <div>
            <div style={{fontSize:12,color:C.textMuted,marginBottom:8}}>비활성 권한</div>
            <div style={{display:'flex',flexWrap:'wrap',gap:6}}>
              {allPerms.filter(p=>!PERMISSIONS[selectedRole].includes(p)).map(p=>(
                <span key={p} style={{padding:'4px 12px',borderRadius:20,background:'#F1F5F9',color:C.textMuted,fontSize:13}}>{p}</span>
              ))}
            </div>
          </div>
          <div style={{borderTop:'1px solid '+C.border,paddingTop:16,marginTop:20}}>
            <div style={{fontSize:12,color:C.textMuted,marginBottom:8}}>역할 설명</div>
            <textarea placeholder="이 역할에 대한 설명을 입력하세요..." style={{width:'100%',padding:10,border:'1px solid '+C.border,borderRadius:10,fontSize:13,minHeight:60,fontFamily:'inherit',resize:'vertical',outline:'none'}}/>
          </div>
          <div style={{display:'flex',gap:8,marginTop:16}}>
            <button onClick={()=>{setSelectedRole(null);onToast('권한 설정이 저장되었습니다.')}} style={{padding:'8px 18px',borderRadius:8,border:'none',background:C.accent,color:'#fff',cursor:'pointer',fontSize:13,fontWeight:600,fontFamily:'inherit'}}>저장</button>
          </div>
        </Drawer>
      )}
    </div>
  );
}

// ─── App ───
function App(){
  const [tab,setTab]=useState('dashboard');
  const [toast,setToast]=useState(null);
  const [loading,setLoading]=useState(true);
  useEffect(()=>{setTimeout(()=>setLoading(false),1200)},[]);

  if(loading) return(
    <div>
      <div style={{height:56,background:C.surface,borderBottom:'1px solid '+C.border}}/>
      <div style={{height:100,background:'linear-gradient(135deg,'+C.secondary+','+C.accent+')'}}/>
      <div style={{padding:'24px 32px',display:'grid',gridTemplateColumns:'1fr 1fr',gap:16}}>
        {[...Array(4)].map((_,i)=><div key={i} style={{height:180,borderRadius:16,background:'linear-gradient(90deg,#F1F5F9 25%,#E2E8F0 50%,#F1F5F9 75%)',backgroundSize:'200% 100%',animation:'shimmer 1.5s infinite'}}/>)}
      </div>
    </div>
  );

  return(
    <div style={{minHeight:'100vh',background:C.bg}}>
      <Header tab={tab} setTab={setTab}/>
      <HeroBanner tab={tab}/>
      <main style={{padding:'24px 32px'}}>
        {tab==='dashboard'&&<DashboardPage/>}
        {tab==='employee'&&<EmployeePage onToast={setToast}/>}
        {tab==='attendance'&&<AttendancePage onToast={setToast}/>}
        {tab==='permission'&&<PermissionPage onToast={setToast}/>}
      </main>
      {toast&&<Toast message={toast} onClose={()=>setToast(null)}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
