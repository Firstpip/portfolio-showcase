// ─── Components ───
function CountUpNum({end,suffix=''}){
  const [val,setVal]=useState(0);
  useEffect(()=>{let s=0;const step=end/(1200/16);const t=setInterval(()=>{s+=step;if(s>=end){setVal(end);clearInterval(t);}else setVal(Math.floor(s));},16);return()=>clearInterval(t);},[end]);
  return <span style={{animation:'countUp 400ms ease'}}>{val.toLocaleString()}{suffix}</span>;
}

function Toast({message,onClose}){
  useEffect(()=>{const t=setTimeout(onClose,3000);return()=>clearTimeout(t);},[]);
  return <div style={{position:'fixed',bottom:24,right:24,zIndex:9999,background:C.secondary,color:'#fff',padding:'12px 24px',borderRadius:12,animation:'slideUp 300ms ease',boxShadow:'0 4px 16px rgba(0,0,0,0.2)',fontSize:14}}>{message}</div>;
}

function Modal({title,onClose,children,width=560}){
  return(
    <div style={{position:'fixed',inset:0,zIndex:500,display:'flex',alignItems:'center',justifyContent:'center'}}>
      <div onClick={onClose} style={{position:'absolute',inset:0,background:'rgba(0,0,0,0.35)',animation:'fadeIn 200ms ease'}}/>
      <div style={{position:'relative',width,maxHeight:'85vh',background:'#fff',borderRadius:20,zIndex:501,animation:'fadeInScale 200ms ease',display:'flex',flexDirection:'column',boxShadow:'0 20px 60px rgba(0,0,0,0.12)'}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'20px 24px',borderBottom:'1px solid '+C.border}}>
          <h3 style={{fontSize:18,fontWeight:700}}>{title}</h3>
          <button onClick={onClose} style={{background:'none',border:'none',fontSize:20,cursor:'pointer',color:C.textLight}}>✕</button>
        </div>
        <div style={{padding:24,overflowY:'auto',flex:1}}>{children}</div>
      </div>
    </div>
  );
}

function Badge({text}){
  const colors={'활성':{bg:'#DCFCE7',fg:'#059669'},'정지':{bg:'#FEE2E2',fg:'#DC2626'},'비활성':{bg:'#FEF3C7',fg:'#D97706'},
    'Enterprise':{bg:'#EDE9FE',fg:'#7C3AED'},'Business':{bg:'#DBEAFE',fg:'#2563EB'},'Starter':{bg:'#F1F5F9',fg:'#64748B'},
    'warning':{bg:'#FEF3C7',fg:'#D97706'},'danger':{bg:'#FEE2E2',fg:'#DC2626'},
  };
  const c=colors[text]||{bg:'#F1F5F9',fg:'#64748B'};
  return <span style={{display:'inline-block',padding:'2px 10px',borderRadius:20,fontSize:12,fontWeight:600,background:c.bg,color:c.fg}}>{text}</span>;
}

function FormField({label,value,type='text',options}){
  const base={width:'100%',padding:'8px 12px',border:'1px solid '+C.border,borderRadius:12,fontSize:14,fontFamily:'inherit',outline:'none'};
  return(
    <div style={{marginBottom:16}}>
      <label style={{display:'block',fontSize:13,fontWeight:600,color:C.textLight,marginBottom:6}}>{label}</label>
      {type==='select'?<select style={base} defaultValue={value}>{options?.map(o=><option key={o}>{o}</option>)}</select>
      :type==='textarea'?<textarea style={{...base,minHeight:80,resize:'vertical'}} defaultValue={value}/>
      :<input style={base} type={type} defaultValue={value}/>}
    </div>
  );
}

// ─── Workflow ───
function WorkflowPage({onToast}){
  const [selected,setSelected]=useState(null);
  const [modal,setModal]=useState(null);

  return(
    <div style={{display:'flex',flex:1,overflow:'hidden'}}>
      <div style={{width:'42%',borderRight:'1px solid '+C.border,overflowY:'auto'}}>
        <div style={{padding:'12px 16px',borderBottom:'1px solid '+C.border,display:'flex',justifyContent:'space-between',alignItems:'center'}}>
          <span style={{fontSize:13,fontWeight:700,color:C.textLight}}>워크플로우 {WORKFLOWS.length}개</span>
          <button onClick={()=>setModal({type:'create'})} style={{padding:'4px 12px',borderRadius:8,border:'none',background:C.primary,color:'#fff',cursor:'pointer',fontSize:12,fontWeight:600,fontFamily:'inherit'}}>+ 추가</button>
        </div>
        {WORKFLOWS.map((w,i)=>(
          <div key={w.id} onClick={()=>setSelected(w)} style={{
            padding:'12px 16px',cursor:'pointer',borderBottom:'1px solid '+C.border,
            borderLeft:selected?.id===w.id?'3px solid '+C.primary:'3px solid transparent',
            background:selected?.id===w.id?C.primary+'08':'transparent',transition:'all 150ms',
            animation:'slideUp 300ms ease '+(i*40)+'ms both',
          }}
            onMouseEnter={e=>{if(selected?.id!==w.id)e.currentTarget.style.background=C.primary+'04'}}
            onMouseLeave={e=>{if(selected?.id!==w.id)e.currentTarget.style.background='transparent'}}
          >
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:4}}>
              <span style={{fontSize:14,fontWeight:600}}>{w.name}</span>
              <Badge text={w.status}/>

            <div style={{fontSize:12,color:C.textMuted}}>트리거: {w.trigger} · 실행 {w.runs}회</div>

      </div>
      <div style={{flex:1,overflowY:'auto',padding:20}}>
        {selected?(
          <div style={{animation:'slideInRight 250ms ease'}}>
            <h3 style={{fontSize:17,fontWeight:700,marginBottom:16}}>{selected.name}</h3>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:16,marginBottom:20}}>
              {[{l:'트리거',v:selected.trigger},{l:'상태',v:selected.status},{l:'실행 횟수',v:selected.runs+'회'},{l:'마지막 실행',v:selected.lastRun}].map(f=>(
                <div key={f.l}><div style={{fontSize:12,color:C.textMuted,marginBottom:4}}>{f.l}</div><div style={{fontSize:14,fontWeight:500}}>{f.v}</div></div>

            <div style={{marginBottom:16}}>
              <div style={{fontSize:13,fontWeight:700,marginBottom:8,textTransform:'uppercase',letterSpacing:'0.06em',color:C.textLight}}>액션 플로우</div>
              {selected.actions.map((a,i)=>(
                <div key={i} style={{display:'flex',alignItems:'center',gap:10,marginBottom:8}}>
                  <div style={{width:28,height:28,borderRadius:'50%',background:C.primary+'15',display:'flex',alignItems:'center',justifyContent:'center',fontSize:12,fontWeight:700,color:C.primary}}>{i+1}</div>
                  <div style={{flex:1,padding:'8px 14px',background:C.bg,borderRadius:10,border:'1px solid '+C.border,fontSize:13}}>{a}</div>
                </div>
              ))}
            </div>
            <div style={{borderTop:'1px solid '+C.border,paddingTop:12}}>
              <div style={{fontSize:12,color:C.textMuted,marginBottom:6}}>메모</div>
              <textarea placeholder="워크플로우 메모..." style={{width:'100%',padding:10,border:'1px solid '+C.border,borderRadius:12,fontSize:13,minHeight:50,fontFamily:'inherit',resize:'vertical',outline:'none'}}/>
            </div>
            <div style={{display:'flex',gap:8,marginTop:12}}>
              <button onClick={()=>onToast(selected.name+' 워크플로우가 실행되었습니다.')} style={{padding:'6px 16px',borderRadius:8,border:'none',background:C.success,color:'#fff',cursor:'pointer',fontSize:13,fontWeight:600,fontFamily:'inherit'}}>수동 실행</button>
              <button onClick={()=>onToast('설정이 저장되었습니다.')} style={{padding:'6px 16px',borderRadius:8,border:'none',background:C.primary,color:'#fff',cursor:'pointer',fontSize:13,fontWeight:600,fontFamily:'inherit'}}>저장</button>
            </div>
          </div>
        ):(
          <div style={{flex:1,display:'flex',alignItems:'center',justifyContent:'center',color:C.textMuted,fontSize:14,height:'100%'}}>좌측에서 워크플로우를 선택하세요</div>

      {modal?.type==='create'&&(
        <Modal title="신규 워크플로우 생성" onClose={()=>setModal(null)}>

          <div style={{display:'flex',gap:8,justifyContent:'flex-end',marginTop:8}}>
            <button onClick={()=>setModal(null)} style={{padding:'8px 20px',borderRadius:10,border:'1px solid '+C.border,background:'#fff',color:C.textLight,cursor:'pointer',fontSize:13,fontFamily:'inherit'}}>취소</button>
            <button onClick={()=>{setModal(null);onToast('워크플로우가 생성되었습니다.')}} style={{padding:'8px 20px',borderRadius:10,border:'none',background:C.primary,color:'#fff',cursor:'pointer',fontSize:13,fontWeight:600,fontFamily:'inherit'}}>생성</button>
          </div>
        </Modal>
      )}
    </div>
  );
}

// ─── App ───
function App(){
  const [section,setSection]=useState('dashboard');
  const [toast,setToast]=useState(null);
  const [loading,setLoading]=useState(true);
  useEffect(()=>{setTimeout(()=>setLoading(false),1200)},[]);

  if(loading) return(
    <div style={{display:'flex',minHeight:'100vh'}}>
      <div style={{width:240,background:'#fff',borderRight:'1px solid '+C.border}}/>
      <div style={{flex:1,padding:20}}>
        {[...Array(6)].map((_,i)=><div key={i} style={{height:100,borderRadius:20,marginBottom:16,background:'linear-gradient(90deg,#F1F5F9 25%,#E2E8F0 50%,#F1F5F9 75%)',backgroundSize:'200% 100%',animation:'shimmer 1.5s infinite'}}/>)}
      </div>
    </div>
  );

  return(
    <div style={{display:'flex',minHeight:'100vh',background:C.bg}}>
      <SideNav section={section} setSection={setSection}/>
      <div style={{flex:1,display:'flex',flexDirection:'column',overflow:'hidden'}}>
        <AppBar section={section}/>
        {section==='dashboard'?(
          <DashboardPage/>
        ):section==='tenant'?(
          <TenantPage onToast={setToast}/>
        ):section==='workflow'?(
          <WorkflowPage onToast={setToast}/>
        ):(
          <WhitelabelPage onToast={setToast}/>
        )}
      </div>
      {toast&&<Toast message={toast} onClose={()=>setToast(null)}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
