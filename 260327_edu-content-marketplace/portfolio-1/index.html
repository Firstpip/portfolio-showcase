<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=1920"/>
<title>디지털 교육 콘텐츠 마켓플레이스 — 맞춤 구현 데모</title>
<link rel="preconnect" href="https://cdn.jsdelivr.net"/>
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" rel="stylesheet"/>
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://unpkg.com/prop-types/prop-types.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/recharts@2.15.0/umd/Recharts.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Pretendard',sans-serif;background:#F8FAFC;color:#0F172A;-webkit-font-smoothing:antialiased}
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-thumb{background:#CBD5E1;border-radius:3px}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideIn{from{opacity:0;transform:translateX(20px)}to{opacity:1;transform:translateX(0)}}
@keyframes countUp{from{opacity:0;transform:scale(0.8)}to{opacity:1;transform:scale(1)}}
@keyframes modalIn{from{opacity:0;transform:scale(0.95)}to{opacity:1;transform:scale(1)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.6}}
.fade-in{animation:fadeIn 0.35s ease-out both}
.slide-in{animation:slideIn 0.3s ease-out both}
.count-up{animation:countUp 0.4s ease-out both}
.modal-in{animation:modalIn 0.2s ease-out both}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useRef,useCallback,useMemo} = React;
const {AreaChart,Area,BarChart,Bar,PieChart,Pie,Cell,LineChart,Line,XAxis,YAxis,CartesianGrid,Tooltip,ResponsiveContainer,Legend} = Recharts;

/* ─── 디자인 토큰 ─── */
const C={
  primary:'#4F46E5',primaryLight:'#EEF2FF',primaryDark:'#3730A3',
  accent:'#F59E0B',accentLight:'#FEF3C7',
  success:'#10B981',successLight:'#D1FAE5',
  danger:'#EF4444',dangerLight:'#FEE2E2',
  warning:'#F59E0B',warningLight:'#FEF3C7',
  bg:'#F8FAFC',surface:'#FFFFFF',
  sidebar:'#1E1B4B',sidebarHover:'#312E81',sidebarText:'#C7D2FE',
  text:'#0F172A',textSec:'#64748B',
  border:'#E2E8F0',borderLight:'#F1F5F9'
};

/* ─── 더미 데이터 ─── */
const SUBJECTS=['국어','사회','과학','수학','영어','한국사'];
const GRADES=['고1','고2','고3','중1','중2','중3'];
const STATUS_MAP={pending:{label:'검토 대기',color:C.warning,bg:C.warningLight},approved:{label:'승인',color:C.success,bg:C.successLight},rejected:{label:'반려',color:C.danger,bg:C.dangerLight},published:{label:'게시 중',color:C.primary,bg:C.primaryLight}};

const salesData=[
  {month:'10월',매출:2840000,건수:142},{month:'11월',매출:3210000,건수:161},
  {month:'12월',매출:3850000,건수:193},{month:'1월',매출:4120000,건수:206},
  {month:'2월',매출:3980000,건수:199},{month:'3월',매출:4560000,건수:228}
];
const subjectDist=[
  {name:'국어',value:35,color:'#4F46E5'},{name:'사회',value:25,color:'#F59E0B'},
  {name:'과학',value:22,color:'#10B981'},{name:'수학',value:12,color:'#EF4444'},
  {name:'영어',value:6,color:'#8B5CF6'}
];

const contentItems=Array.from({length:20},(_, i)=>{
  const s=['pending','approved','rejected','published'][i%4];
  return {
    id:i+1,title:['현대시 분석 핵심 문제','한국 근현대사 서술형','세포 분열 실험 문제','삼각함수 응용','영어 독해 지문 분석','동아시아 문화권 비교','화학 반응식 정리','국어 문법 종합','지구과학 천체 관측','사회문화 통계 분석','생물 유전 법칙','수능 국어 모의고사','한국지리 기후 분석','물리 역학 기본','중3 과학 총정리','고1 사회 중간고사','시 감상문 작성법','세계사 핵심 연표','화학 원소 주기율','영문법 정리 노트'][i],
    subject:SUBJECTS[i%6],grade:GRADES[i%6],
    author:['김선영','이재훈','박수민','최도윤','한지원','정하늘','윤서연','강태현'][i%8],
    price:Math.floor(Math.random()*5+3)*1000,
    sales:Math.floor(Math.random()*200+20),
    status:s,
    date:'2026-03-'+(10+i).toString().padStart(2,'0'),
    pages:Math.floor(Math.random()*15+5),
    rejectReason:s==='rejected'?'문제 난이도 표기가 누락되었습니다. 수정 후 재등록 바랍니다.':null,
    preview:'본 문제집은 교육과정 핵심 개념을 중심으로 구성되었습니다. 기출 변형 문제와 서술형 문항을 포함하여 실전 감각을 키울 수 있도록 설계되었습니다.'
  };
});

const userList=Array.from({length:15},(_, i)=>({
  id:i+1,name:['김선영','이재훈','박수민','최도윤','한지원','정하늘','윤서연','강태현','오민지','송유나','임채원','배지호','신다은','문정훈','조하린'][i],
  email:['sunyoung','jaehoon','sumin','doyoon','jiwon','haneul','seoyeon','taehyun','minji','yuna','chaewon','jiho','daeun','junghoon','harin'][i]+'@email.com',
  role:i<3?'출제자':'학생',joinDate:'2026-'+(1+i%3).toString().padStart(2,'0')+'-'+((i*3+5)%28+1).toString().padStart(2,'0'),
  purchases:Math.floor(Math.random()*30+1),spent:Math.floor(Math.random()*150+10)*1000
}));

const paymentList=Array.from({length:12},(_, i)=>({
  id:'PAY-2026-'+String(i+1001),buyer:userList[i%15].name,
  item:contentItems[i%20].title,amount:contentItems[i%20].price,
  method:['카드','계좌이체','카카오페이'][i%3],
  status:i===3?'취소':'완료',
  date:'2026-03-'+(15+i).toString().padStart(2,'0')+' '+((9+i)%12+1).toString().padStart(2,'0')+':'+((i*17)%60).toString().padStart(2,'0')
}));

const categories=[
  {id:1,name:'국어',sub:['현대문학','고전문학','문법','화법과 작문','독서']},
  {id:2,name:'사회',sub:['한국사','세계사','사회문화','한국지리','세계지리','정치와 법','경제']},
  {id:3,name:'과학',sub:['물리','화학','생물','지구과학']},
  {id:4,name:'수학',sub:['수학 I','수학 II','미적분','확률과 통계','기하']},
  {id:5,name:'영어',sub:['독해','문법','듣기','어휘']}
];

/* ─── 공통 컴포넌트 ─── */
function Badge({children,color,bg}){
  return <span style={{display:'inline-block',padding:'3px 10px',borderRadius:20,fontSize:12,fontWeight:600,color:color,background:bg}}>{children}</span>;
}

function KpiCard({icon,label,value,sub,color,delay=0}){
  return (
    <div className="count-up" style={{background:C.surface,borderRadius:12,padding:'20px 24px',boxShadow:'0 1px 3px rgba(0,0,0,0.06)',display:'flex',alignItems:'center',gap:16,animationDelay:delay+'ms'}}>
      <div style={{width:48,height:48,borderRadius:12,background:color+'18',display:'flex',alignItems:'center',justifyContent:'center',fontSize:22}}>{icon}</div>
      <div style={{flex:1}}>
        <div style={{fontSize:13,color:C.textSec,marginBottom:4}}>{label}</div>
        <div style={{fontSize:22,fontWeight:700,color:C.text}}>{value}</div>
      </div>
      {sub && <div style={{fontSize:12,color:C.success,fontWeight:600}}>{sub}</div>}
    </div>
  );
}

function Modal({open,onClose,title,width=560,children}){
  if(!open) return null;
  return (
    <div onClick={onClose} style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.4)',display:'flex',alignItems:'center',justifyContent:'center',zIndex:1000}}>
      <div className="modal-in" onClick={e=>e.stopPropagation()} style={{background:C.surface,borderRadius:16,width,maxHeight:'85vh',overflow:'auto',boxShadow:'0 20px 60px rgba(0,0,0,0.15)'}}>
        <div style={{padding:'20px 24px',borderBottom:'1px solid '+C.border,display:'flex',justifyContent:'space-between',alignItems:'center'}}>
          <h3 style={{fontSize:17,fontWeight:700}}>{title}</h3>
          <button onClick={onClose} style={{background:'none',border:'none',fontSize:20,cursor:'pointer',color:C.textSec}}>✕</button>
        </div>
        <div style={{padding:24}}>{children}</div>
      </div>
    </div>
  );
}

function Toast({msg,onClose}){
  useEffect(()=>{const t=setTimeout(onClose,2500);return()=>clearTimeout(t)},[]);
  return <div className="slide-in" style={{position:'fixed',bottom:32,right:32,background:'#1E293B',color:'#fff',padding:'14px 24px',borderRadius:12,fontSize:14,fontWeight:500,zIndex:2000,boxShadow:'0 8px 24px rgba(0,0,0,0.2)'}}>{msg}</div>;
}

function DataTable({columns,data,onRowClick}){
  const [search,setSearch]=useState('');
  const [sortCol,setSortCol]=useState(null);
  const [sortDir,setSortDir]=useState('asc');
  const filtered=useMemo(()=>{
    let d=data;
    if(search) d=d.filter(r=>columns.some(c=>String(r[c.key]||'').toLowerCase().includes(search.toLowerCase())));
    if(sortCol){d=[...d].sort((a,b)=>{const va=a[sortCol]||'',vb=b[sortCol]||'';return sortDir==='asc'?(va>vb?1:-1):(va<vb?1:-1)})}
    return d;
  },[data,search,sortCol,sortDir]);
  return (
    <div style={{background:C.surface,borderRadius:12,boxShadow:'0 1px 3px rgba(0,0,0,0.06)',overflow:'hidden'}}>
      <div style={{padding:'16px 20px',borderBottom:'1px solid '+C.border,display:'flex',alignItems:'center',gap:12}}>
        <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="검색..." style={{flex:1,maxWidth:280,padding:'8px 14px',borderRadius:8,border:'1px solid '+C.border,fontSize:13,outline:'none',fontFamily:'inherit'}}/>
        <span style={{fontSize:13,color:C.textSec}}>{filtered.length}건</span>
      </div>
      <table style={{width:'100%',borderCollapse:'collapse'}}>
        <thead>
          <tr>{columns.map(c=><th key={c.key} onClick={()=>{setSortCol(c.key);setSortDir(d=>d==='asc'?'desc':'asc')}} style={{padding:'10px 16px',textAlign:'left',fontSize:12,fontWeight:600,color:C.textSec,borderBottom:'1px solid '+C.border,cursor:'pointer',userSelect:'none',background:'#FAFBFC'}}>{c.label}{sortCol===c.key?(sortDir==='asc'?' ↑':' ↓'):''}</th>)}</tr>
        </thead>
        <tbody>
          {filtered.slice(0,10).map((r,i)=><tr key={i} onClick={()=>onRowClick&&onRowClick(r)} style={{cursor:onRowClick?'pointer':'default',transition:'background 0.15s'}} onMouseEnter={e=>{if(onRowClick) e.currentTarget.style.background=C.primaryLight}} onMouseLeave={e=>e.currentTarget.style.background='transparent'}>
            {columns.map(c=><td key={c.key} style={{padding:'12px 16px',fontSize:13,borderBottom:'1px solid '+C.borderLight,color:C.text}}>{c.render?c.render(r[c.key],r):r[c.key]}</td>)}
          </tr>)}
        </tbody>
      </table>
    </div>
  );
}

function TabBar({tabs,active,onChange}){
  return (
    <div style={{display:'flex',gap:4,borderBottom:'2px solid '+C.border,marginBottom:20}}>
      {tabs.map(t=><button key={t} onClick={()=>onChange(t)} style={{padding:'10px 20px',fontSize:14,fontWeight:active===t?600:400,color:active===t?C.primary:C.textSec,background:'none',border:'none',borderBottom:active===t?'2px solid '+C.primary:'2px solid transparent',cursor:'pointer',marginBottom:-2,fontFamily:'inherit',transition:'all 0.15s'}}>{t}</button>)}
    </div>
  );
}

/* ─── 페이지: 대시보드 ─── */
function DashboardPage({onToast}){
  return (
    <div className="fade-in">
      <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:16,marginBottom:24}}>
        <KpiCard icon="📚" label="등록 콘텐츠" value="1,847건" sub="이번 달 +124" color={C.primary} delay={0}/>
        <KpiCard icon="💰" label="월 매출" value="4,560,000원" sub="+14.6%" color={C.accent} delay={100}/>
        <KpiCard icon="👥" label="가입 회원" value="3,256명" sub="+87명" color={C.success} delay={200}/>
        <KpiCard icon="⏳" label="승인 대기" value="23건" color={C.danger} delay={300}/>
      </div>
      <div style={{display:'grid',gridTemplateColumns:'2fr 1fr',gap:16,marginBottom:24}}>
        <div style={{background:C.surface,borderRadius:12,padding:20,boxShadow:'0 1px 3px rgba(0,0,0,0.06)'}}>
          <div style={{fontSize:15,fontWeight:600,marginBottom:16}}>월별 매출 추이</div>
          <ResponsiveContainer width="100%" height={240}>
            <AreaChart data={salesData}><defs><linearGradient id="g1" x1="0" y1="0" x2="0" y2="1"><stop offset="5%" stopColor={C.primary} stopOpacity={0.2}/><stop offset="95%" stopColor={C.primary} stopOpacity={0}/></linearGradient></defs>
              <CartesianGrid strokeDasharray="3 3" stroke={C.border}/><XAxis dataKey="month" tick={{fontSize:12}} stroke={C.textSec}/><YAxis tick={{fontSize:12}} stroke={C.textSec} tickFormatter={v=>(v/10000).toFixed(0)+'만'}/>
              <Tooltip formatter={v=>v.toLocaleString()+'원'}/><Area type="monotone" dataKey="매출" stroke={C.primary} fill="url(#g1)" strokeWidth={2}/>
            </AreaChart>
          </ResponsiveContainer>
        </div>
        <div style={{background:C.surface,borderRadius:12,padding:20,boxShadow:'0 1px 3px rgba(0,0,0,0.06)'}}>
          <div style={{fontSize:15,fontWeight:600,marginBottom:16}}>과목별 판매 분포</div>
          <ResponsiveContainer width="100%" height={240}>
            <PieChart><Pie data={subjectDist} cx="50%" cy="50%" innerRadius={50} outerRadius={80} paddingAngle={3} dataKey="value">
              {subjectDist.map((e,i)=><Cell key={i} fill={e.color}/>)}
            </Pie><Tooltip formatter={v=>v+'%'}/></PieChart>
          </ResponsiveContainer>
          <div style={{display:'flex',flexWrap:'wrap',gap:8,justifyContent:'center'}}>
            {subjectDist.map(s=><span key={s.name} style={{fontSize:11,display:'flex',alignItems:'center',gap:4}}><span style={{width:8,height:8,borderRadius:4,background:s.color,display:'inline-block'}}/>{s.name} {s.value}%</span>)}
          </div>
        </div>
      </div>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:16}}>
        <div style={{background:C.surface,borderRadius:12,padding:20,boxShadow:'0 1px 3px rgba(0,0,0,0.06)'}}>
          <div style={{fontSize:15,fontWeight:600,marginBottom:16}}>최근 승인 대기 콘텐츠</div>
          {contentItems.filter(c=>c.status==='pending').slice(0,5).map((c,i)=>(
            <div key={i} style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'10px 0',borderBottom:i<4?'1px solid '+C.borderLight:'none'}}>
              <div><div style={{fontSize:13,fontWeight:500}}>{c.title}</div><div style={{fontSize:12,color:C.textSec}}>{c.author} · {c.subject} · {c.grade}</div></div>
              <Badge color={C.warning} bg={C.warningLight}>검토 대기</Badge>
            </div>
          ))}
        </div>
        <div style={{background:C.surface,borderRadius:12,padding:20,boxShadow:'0 1px 3px rgba(0,0,0,0.06)'}}>
          <div style={{fontSize:15,fontWeight:600,marginBottom:16}}>최근 결제 내역</div>
          {paymentList.slice(0,5).map((p,i)=>(
            <div key={i} style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'10px 0',borderBottom:i<4?'1px solid '+C.borderLight:'none'}}>
              <div><div style={{fontSize:13,fontWeight:500}}>{p.item}</div><div style={{fontSize:12,color:C.textSec}}>{p.buyer} · {p.date}</div></div>
              <div style={{fontSize:14,fontWeight:600,color:C.primary}}>{p.amount.toLocaleString()}원</div>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

/* ─── 페이지: 콘텐츠 검색/탐색 ─── */
function SearchPage({onToast}){
  const [subject,setSubject]=useState('전체');
  const [grade,setGrade]=useState('전체');
  const [modal,setModal]=useState(null);
  const [cart,setCart]=useState([]);
  const filtered=contentItems.filter(c=>c.status==='published').filter(c=>subject==='전체'||c.subject===subject).filter(c=>grade==='전체'||c.grade===grade);
  const addCart=(item)=>{if(!cart.find(c=>c.id===item.id)){setCart([...cart,item]);onToast(item.title+' 장바구니에 추가되었습니다.')}};
  return (
    <div className="fade-in">
      <div style={{display:'flex',gap:12,marginBottom:20,flexWrap:'wrap',alignItems:'center'}}>
        <select value={subject} onChange={e=>setSubject(e.target.value)} style={{padding:'8px 14px',borderRadius:8,border:'1px solid '+C.border,fontSize:13,fontFamily:'inherit',cursor:'pointer'}}>
          <option>전체</option>{SUBJECTS.map(s=><option key={s}>{s}</option>)}
        </select>
        <select value={grade} onChange={e=>setGrade(e.target.value)} style={{padding:'8px 14px',borderRadius:8,border:'1px solid '+C.border,fontSize:13,fontFamily:'inherit',cursor:'pointer'}}>
          <option>전체</option>{GRADES.map(g=><option key={g}>{g}</option>)}
        </select>
        <div style={{marginLeft:'auto',display:'flex',alignItems:'center',gap:8}}>
          <span style={{fontSize:13,color:C.textSec}}>🛒 장바구니 {cart.length}건</span>
          {cart.length>0 && <button onClick={()=>onToast('결제 페이지로 이동합니다. (Toss Payments 연동)')} style={{padding:'8px 16px',background:C.primary,color:'#fff',border:'none',borderRadius:8,fontSize:13,fontWeight:600,cursor:'pointer',fontFamily:'inherit'}}>결제하기</button>}
        </div>
      </div>
      <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:16}}>
        {filtered.map((item,i)=>(
          <div key={item.id} className="fade-in" style={{background:C.surface,borderRadius:12,padding:20,boxShadow:'0 1px 3px rgba(0,0,0,0.06)',cursor:'pointer',transition:'all 0.2s',animationDelay:(i*50)+'ms'}} onClick={()=>setModal(item)} onMouseEnter={e=>{e.currentTarget.style.transform='translateY(-3px)';e.currentTarget.style.boxShadow='0 8px 24px rgba(79,70,229,0.12)'}} onMouseLeave={e=>{e.currentTarget.style.transform='';e.currentTarget.style.boxShadow='0 1px 3px rgba(0,0,0,0.06)'}}>
            <div style={{height:120,borderRadius:8,background:'linear-gradient(135deg,'+C.primaryLight+','+C.accentLight+')',display:'flex',alignItems:'center',justifyContent:'center',fontSize:28,marginBottom:12}}>📄</div>
            <Badge color={C.primary} bg={C.primaryLight}>{item.subject}</Badge>
            <div style={{fontSize:14,fontWeight:600,marginTop:8,lineHeight:1.4}}>{item.title}</div>
            <div style={{fontSize:12,color:C.textSec,marginTop:4}}>{item.author} · {item.grade} · {item.pages}페이지</div>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginTop:12}}>
              <span style={{fontSize:16,fontWeight:700,color:C.primary}}>{item.price.toLocaleString()}원</span>
              <button onClick={e=>{e.stopPropagation();addCart(item)}} style={{padding:'6px 12px',background:C.primary,color:'#fff',border:'none',borderRadius:6,fontSize:12,fontWeight:600,cursor:'pointer',fontFamily:'inherit'}}>담기</button>
            </div>
          </div>
        ))}
      </div>
      <Modal open={!!modal} onClose={()=>setModal(null)} title="콘텐츠 상세" width={640}>
        {modal && (
          <div>
            <div style={{display:'flex',gap:12,marginBottom:16}}>
              <Badge color={C.primary} bg={C.primaryLight}>{modal.subject}</Badge>
              <Badge color={C.accent} bg={C.accentLight}>{modal.grade}</Badge>
            </div>
            <h3 style={{fontSize:18,fontWeight:700,marginBottom:8}}>{modal.title}</h3>
            <div style={{fontSize:13,color:C.textSec,marginBottom:16}}>출제자: {modal.author} · {modal.pages}페이지 · 판매 {modal.sales}건</div>
            <div style={{background:C.borderLight,borderRadius:8,padding:16,fontSize:13,lineHeight:1.8,marginBottom:16,color:C.textSec}}>

            </div>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
              <span style={{fontSize:22,fontWeight:700,color:C.primary}}>{modal.price.toLocaleString()}원</span>
              <div style={{display:'flex',gap:8}}>
                <button onClick={()=>{addCart(modal);setModal(null)}} style={{padding:'10px 20px',background:C.primary,color:'#fff',border:'none',borderRadius:8,fontSize:14,fontWeight:600,cursor:'pointer',fontFamily:'inherit'}}>장바구니 담기</button>
                <button onClick={()=>{onToast('결제 진행 중... (Toss Payments)');setModal(null)}} style={{padding:'10px 20px',background:C.accent,color:'#fff',border:'none',borderRadius:8,fontSize:14,fontWeight:600,cursor:'pointer',fontFamily:'inherit'}}>바로 구매</button>

/* ─── 페이지: 콘텐츠 관리 ─── */

  return (
    <div className="fade-in">
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16}}>
        <TabBar tabs={tabs} active={tab} onChange={setTab}/>

      </div>

        columns={[

          {key:'grade',label:'학년'},
          {key:'author',label:'출제자'},
          {key:'price',label:'가격',render:v=>v.toLocaleString()+'원'},
          {key:'sales',label:'판매',render:v=>v+'건'},
          {key:'status',label:'상태',render:v=>{const s=STATUS_MAP[v];return <Badge color={s.color} bg={s.bg}>{s.label}</Badge>}},

          <div>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12,marginBottom:16}}>
              <div style={{fontSize:13,color:C.textSec}}>과목: <span style={{color:C.text,fontWeight:500}}>{modal.subject}</span></div>
              <div style={{fontSize:13,color:C.textSec}}>학년: <span style={{color:C.text,fontWeight:500}}>{modal.grade}</span></div>
              <div style={{fontSize:13,color:C.textSec}}>출제자: <span style={{color:C.text,fontWeight:500}}>{modal.author}</span></div>
              <div style={{fontSize:13,color:C.textSec}}>페이지: <span style={{color:C.text,fontWeight:500}}>{modal.pages}p</span></div>
              <div style={{fontSize:13,color:C.textSec}}>가격: <span style={{color:C.text,fontWeight:500}}>{modal.price.toLocaleString()}원</span></div>
              <div style={{fontSize:13,color:C.textSec}}>상태: {(()=>{const s=STATUS_MAP[modal.status];return <Badge color={s.color} bg={s.bg}>{s.label}</Badge>})()}</div>
            </div>
            <div style={{background:C.borderLight,borderRadius:8,padding:16,fontSize:13,lineHeight:1.8,marginBottom:16}}>
              <div style={{fontWeight:600,marginBottom:8}}>📄 콘텐츠 미리보기</div>
              {modal.preview}
            </div>
            {modal.rejectReason && <div style={{background:C.dangerLight,borderRadius:8,padding:12,fontSize:13,color:C.danger,marginBottom:16}}>반려 사유: {modal.rejectReason}</div>}

                <button onClick={()=>{onToast(modal.title+' 승인 완료');setModal(null)}} style={{padding:'10px 20px',background:C.success,color:'#fff',border:'none',borderRadius:8,fontSize:13,fontWeight:600,cursor:'pointer',fontFamily:'inherit'}}>승인</button>

        )}

            <button onClick={()=>{onToast('반려 처리 완료');setRejectModal(null)}} style={{padding:'10px 20px',background:C.danger,color:'#fff',border:'none',borderRadius:8,fontSize:13,fontWeight:600,cursor:'pointer',fontFamily:'inherit'}}>반려 처리</button>

          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>
            <div><label style={{fontSize:13,fontWeight:600,display:'block',marginBottom:6}}>과목</label><select style={{width:'100%',padding:'10px 14px',borderRadius:8,border:'1px solid '+C.border,fontSize:13,fontFamily:'inherit'}}>{SUBJECTS.map(s=><option key={s}>{s}</option>)}</select></div>
            <div><label style={{fontSize:13,fontWeight:600,display:'block',marginBottom:6}}>학년</label><select style={{width:'100%',padding:'10px 14px',borderRadius:8,border:'1px solid '+C.border,fontSize:13,fontFamily:'inherit'}}>{GRADES.map(g=><option key={g}>{g}</option>)}</select></div>

          <div><label style={{fontSize:13,fontWeight:600,display:'block',marginBottom:6}}>가격 (원)</label><input type="number" placeholder="5000" style={{width:'100%',padding:'10px 14px',borderRadius:8,border:'1px solid '+C.border,fontSize:13,fontFamily:'inherit'}}/></div>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>
            <div style={{border:'2px dashed '+C.border,borderRadius:8,padding:24,textAlign:'center',cursor:'pointer'}} onClick={()=>onToast('문제지 PDF 선택')}>
              <div style={{fontSize:28,marginBottom:8}}>📄</div>
              <div style={{fontSize:13,fontWeight:600}}>문제지 PDF 업로드</div>
              <div style={{fontSize:12,color:C.textSec}}>클릭하여 파일 선택</div>
            </div>
            <div style={{border:'2px dashed '+C.border,borderRadius:8,padding:24,textAlign:'center',cursor:'pointer'}} onClick={()=>onToast('답지 PDF 선택')}>
              <div style={{fontSize:28,marginBottom:8}}>📋</div>
              <div style={{fontSize:13,fontWeight:600}}>답지 PDF 업로드</div>
              <div style={{fontSize:12,color:C.textSec}}>클릭하여 파일 선택</div>
            </div>
          </div>
          <div><label style={{fontSize:13,fontWeight:600,display:'block',marginBottom:6}}>키워드 태그</label><input placeholder="쉼표로 구분 (예: 현대시, 수능, 기출변형)" style={{width:'100%',padding:'10px 14px',borderRadius:8,border:'1px solid '+C.border,fontSize:13,fontFamily:'inherit'}}/></div>
          <button onClick={()=>{onToast('콘텐츠 등록 완료. 승인 검토 후 게시됩니다.');setUploadModal(false)}} style={{padding:'12px 0',background:C.primary,color:'#fff',border:'none',borderRadius:8,fontSize:14,fontWeight:600,cursor:'pointer',fontFamily:'inherit'}}>등록하기</button>
        </div>
      </Modal>
    </div>
  );
}

}

/* ─── 메인 앱 ─── */
function App(){
  const [page,setPage]=useState('대시보드');
  const [toast,setToast]=useState(null);
  const onToast=(msg)=>setToast(msg);
  const pages=['대시보드','콘텐츠 검색/탐색','콘텐츠 관리','결제/정산 관리'];

  return (
    <div style={{display:'flex',minHeight:'100vh'}}>
      {/* 사이드바 */}
      <nav style={{width:260,background:C.sidebar,display:'flex',flexDirection:'column',flexShrink:0,paddingTop:16}}>

          <div style={{width:36,height:36,borderRadius:10,background:'linear-gradient(135deg,'+C.primary+','+C.accent+')',display:'flex',alignItems:'center',justifyContent:'center',color:'#fff',fontWeight:800,fontSize:15}}>E</div>
          <span style={{color:'#fff',fontWeight:700,fontSize:16}}>EduMarket</span>
        </div>
        <div style={{flex:1,display:'flex',flexDirection:'column',gap:2,padding:'0 12px'}}>
          {pages.map(p=>(
            <button key={p} title={p} onClick={()=>setPage(p)} style={{display:'flex',alignItems:'center',gap:10,width:'100%',padding:'10px 14px',borderRadius:8,border:'none',borderLeft:page===p?'3px solid '+C.accent:'3px solid transparent',cursor:'pointer',background:page===p?'rgba(255,255,255,0.1)':'transparent',color:page===p?'#fff':C.sidebarText,fontSize:14,fontWeight:page===p?600:400,transition:'all 0.15s',fontFamily:'inherit',textAlign:'left'}}>
              <span style={{fontSize:18}}>{icons[p]}</span>{p}

          ))}
        </div>
        <div style={{padding:'16px 20px',borderTop:'1px solid rgba(255,255,255,0.1)',display:'flex',alignItems:'center',gap:10}}>
          <div style={{width:32,height:32,borderRadius:8,background:C.primary,display:'flex',alignItems:'center',justifyContent:'center',color:'#fff',fontSize:13,fontWeight:700}}>관</div>
          <div><div style={{color:'#fff',fontSize:13,fontWeight:500}}>관리자</div><div style={{color:C.sidebarText,fontSize:11}}>admin@edumarket.kr</div></div>
        </div>
      </nav>

      {/* 메인 영역 */}
      <div style={{flex:1,display:'flex',flexDirection:'column'}}>
        <header style={{height:56,background:C.surface,borderBottom:'1px solid '+C.border,display:'flex',alignItems:'center',justifyContent:'space-between',padding:'0 24px',flexShrink:0}}>
          <div style={{display:'flex',alignItems:'center',gap:8}}>
            <span style={{fontSize:12,color:C.textSec}}>EduMarket</span>
            <span style={{color:C.textSec}}>/</span>
            <span style={{fontSize:14,fontWeight:600}}>{page}</span>
          </div>
          <div style={{display:'flex',alignItems:'center',gap:12}}>
            <input placeholder="검색..." style={{padding:'7px 14px',borderRadius:8,border:'1px solid '+C.border,fontSize:13,width:200,fontFamily:'inherit'}}/>
            <div style={{position:'relative',cursor:'pointer'}} onClick={()=>onToast('알림 3건')}>
              <span style={{fontSize:18}}>🔔</span>
              <span style={{position:'absolute',top:-4,right:-6,width:16,height:16,borderRadius:8,background:C.danger,color:'#fff',fontSize:10,fontWeight:700,display:'flex',alignItems:'center',justifyContent:'center'}}>3</span>
            </div>
          </div>
        </header>
        <main style={{flex:1,overflow:'auto',padding:24}}>
          {page==='대시보드' && <DashboardPage onToast={onToast}/>}
          {page==='콘텐츠 검색/탐색' && <SearchPage onToast={onToast}/>}
          {page==='콘텐츠 관리' && <ContentManagePage onToast={onToast}/>}
          {page==='결제/정산 관리' && <SettlementPage onToast={onToast}/>}

      {toast && <Toast msg={toast} onClose={()=>setToast(null)}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
