/* ─── 공통 컴포넌트 ─── */
function Badge({children,color,bg}){
  return <span style={{display:'inline-block',padding:'3px 10px',borderRadius:20,fontSize:11,fontWeight:600,color,background:bg}}>{children}</span>;
}

function Toast({msg,onClose}){
  useEffect(()=>{const t=setTimeout(onClose,2500);return()=>clearTimeout(t)},[]);
  return <div className="slide-in" style={{position:'fixed',bottom:32,right:32,background:'#0F172A',color:'#fff',padding:'14px 24px',borderRadius:12,fontSize:14,fontWeight:500,zIndex:2000,boxShadow:'0 8px 24px rgba(0,0,0,0.2)'}}>{msg}</div>;
}

function Modal({open,onClose,title,width=560,children}){
  if(!open) return null;
  return (
    <div onClick={onClose} style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.4)',display:'flex',alignItems:'center',justifyContent:'center',zIndex:1000}}>
      <div onClick={e=>e.stopPropagation()} style={{background:C.surface,borderRadius:16,width,maxHeight:'85vh',overflow:'auto',boxShadow:'0 20px 60px rgba(0,0,0,0.15)',animation:'modalIn 0.2s ease-out'}}>
        <div style={{padding:'18px 24px',borderBottom:'1px solid '+C.border,display:'flex',justifyContent:'space-between',alignItems:'center'}}>
          <h3 style={{fontSize:16,fontWeight:700}}>{title}</h3>
          <button onClick={onClose} style={{background:'none',border:'none',fontSize:18,cursor:'pointer',color:C.textSec}}>✕</button>
        </div>
        <div style={{padding:24}}>{children}</div>
      </div>
    </div>
  );
}

                  {node.progress>0 && <div style={{height:4,background:'rgba(0,0,0,0.1)',borderRadius:2,marginTop:8}}><div style={{height:4,background:node.status==='완료'?C.accent:C.primary,borderRadius:2,width:node.progress+'%'}}/></div>}
                </div>
                {i<learningPath.length-1 && <div style={{color:C.textSec,fontSize:18}}>→</div>}
              </div>
            ))}
          </div>
          <div style={{textAlign:'center',marginTop:16,fontSize:13,color:C.textSec}}>* React Flow 기반 노드-엣지 학습 경로 그래프로 구현 예정</div>
        </div>
      )}
    </div>
  );
}

      </nav>

      <div style={{flex:1,display:'flex',flexDirection:'column'}}>
        <header style={{height:52,background:C.surface,borderBottom:'1px solid '+C.border,display:'flex',alignItems:'center',justifyContent:'space-between',padding:'0 24px',flexShrink:0}}>
          <div style={{display:'flex',alignItems:'center',gap:8}}>
            <span style={{fontSize:12,color:C.textSec}}>EduAI</span><span style={{color:C.textSec}}>/</span>
            <span style={{fontSize:14,fontWeight:600}}>{page}</span>
          </div>
          <div style={{display:'flex',alignItems:'center',gap:12}}>
            <input placeholder="콘텐츠 검색..." style={{padding:'7px 14px',borderRadius:8,border:'1px solid '+C.border,fontSize:13,width:200,fontFamily:'inherit'}}/>
            <div style={{position:'relative',cursor:'pointer'}} onClick={()=>onToast('새 알림 2건')}>
              <span style={{fontSize:16}}>🔔</span>
              <span style={{position:'absolute',top:-4,right:-6,width:14,height:14,borderRadius:7,background:C.danger,color:'#fff',fontSize:9,fontWeight:700,display:'flex',alignItems:'center',justifyContent:'center'}}>2</span>
            </div>
          </div>
        </header>
        <main style={{flex:1,overflow:'auto',padding:20}}>
          {page==='AI 콘텐츠 추천 대시보드' && <RecommendDashboard onToast={onToast}/>}
          {page==='학습 분석 센터' && <AnalyticsPage onToast={onToast}/>}
          {page==='콘텐츠 제작 스튜디오' && <StudioPage onToast={onToast}/>}
          {page==='구독/라이선스 관리' && <SubscriptionPage onToast={onToast}/>}
        </main>
      </div>
      {toast && <Toast msg={toast} onClose={()=>setToast(null)}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
