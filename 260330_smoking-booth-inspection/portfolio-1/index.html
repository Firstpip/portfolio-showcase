function Badge({ label, color }) {
  return (
    <span style={{
      display: 'inline-flex', alignItems: 'center', padding: '2px 10px',
      borderRadius: 99, fontSize: 12, fontWeight: 600,
      background: color + '18', color: color,
    }}>{label}</span>
  );
}

function KpiCard({ label, value, sub, color, icon }) {
  return (
    <div style={{
      background: C.surface, border: `1px solid ${C.border}`,
      borderRadius: 12, padding: '20px 24px',
      display: 'flex', alignItems: 'center', gap: 16,
      boxShadow: '0 1px 4px rgba(0,0,0,0.06)',
    }}>
      <div style={{ fontSize: 32, width: 52, height: 52, borderRadius: 12, background: color + '18', display: 'flex', alignItems: 'center', justifyContent: 'center' }}>{icon}</div>
      <div>
        <div style={{ fontSize: 13, color: C.textSec, marginBottom: 4 }}>{label}</div>
        <div style={{ fontSize: 28, fontWeight: 700, color: C.text }}>{value}</div>
        {sub && <div style={{ fontSize: 12, color: C.textSec, marginTop: 2 }}>{sub}</div>}
      </div>
    </div>
  );
}

function Sidebar({ active, onNav }) {

        <div style={{ background: C.surface, border: `1px solid ${C.border}`, borderRadius: 12, padding: 24, boxShadow: '0 1px 4px rgba(0,0,0,0.06)' }}>
          <div style={{ fontSize: 15, fontWeight: 600, marginBottom: 16 }}>부스 상태 현황</div>
          <ResponsiveContainer width="100%" height={160}>

            <button key={f} onClick={() => setFilter(f)} style={{
              padding: '7px 16px', borderRadius: 8, border: `1px solid ${filter === f ? C.accent : C.border}`,
              background: filter === f ? C.accent : C.surface, color: filter === f ? '#fff' : C.text,
              fontSize: 13, cursor: 'pointer', fontWeight: filter === f ? 600 : 400,
            }}>{f}</button>
          ))}
        </div>
      </div>

      <div style={{ background: C.surface, border: `1px solid ${C.border}`, borderRadius: 12, overflow: 'hidden', boxShadow: '0 1px 4px rgba(0,0,0,0.06)' }}>
        <table style={{ width: '100%', borderCollapse: 'collapse' }}>
          <thead>
            <tr style={{ background: '#F8FAFC', borderBottom: `1px solid ${C.border}` }}>
              {['부스 ID', '위치명', '지역', '상태', '담당 작업자', '최근 점검일', '다음 점검일', ''].map(h => (
                <th key={h} style={{ padding: '12px 16px', textAlign: 'left', fontSize: 12, fontWeight: 600, color: C.textSec }}>{h}</th>
              ))}
            </tr>
          </thead>
          <tbody>
            {filtered.map((b, i) => (
              <tr key={b.id} style={{ borderBottom: `1px solid ${C.border}`, background: selected === b.id ? '#F0FDFE' : i % 2 === 0 ? C.surface : '#FAFAFA' }}>
                <td style={{ padding: '14px 16px', fontSize: 13, fontWeight: 600, color: C.accent }}>{b.id}</td>
                <td style={{ padding: '14px 16px', fontSize: 13 }}>{b.name}</td>
                <td style={{ padding: '14px 16px', fontSize: 13, color: C.textSec }}>{b.region}</td>
                <td style={{ padding: '14px 16px' }}><Badge label={b.status} color={statusColors[b.status]} /></td>
                <td style={{ padding: '14px 16px', fontSize: 13 }}>{b.worker}</td>
                <td style={{ padding: '14px 16px', fontSize: 13, color: C.textSec }}>{b.lastInspect}</td>
                <td style={{ padding: '14px 16px', fontSize: 13, color: C.textSec }}>{b.nextInspect}</td>
                <td style={{ padding: '14px 16px' }}>
                  <button onClick={() => setSelected(selected === b.id ? null : b.id)} style={{
                    padding: '5px 12px', borderRadius: 6, border: `1px solid ${C.border}`,
                    background: C.surface, fontSize: 12, cursor: 'pointer', color: C.text,
                  }}>상세</button>
                </td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>

      {selected && (() => {
        const b = boothData.find(b => b.id === selected);
        return (
          <div style={{
            position: 'fixed', right: 0, top: 0, bottom: 0, width: 360,
            background: C.surface, borderLeft: `1px solid ${C.border}`,
            padding: 28, overflowY: 'auto', boxShadow: '-4px 0 20px rgba(0,0,0,0.1)',
          }}>
            <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 24 }}>
              <div style={{ fontSize: 16, fontWeight: 700 }}>부스 상세</div>
              <button onClick={() => setSelected(null)} style={{ background: 'none', border: 'none', fontSize: 20, cursor: 'pointer', color: C.textSec }}>✕</button>
            </div>
            <div style={{ marginBottom: 20 }}>
              <Badge label={b.status} color={statusColors[b.status]} />
              <div style={{ fontSize: 20, fontWeight: 700, marginTop: 10 }}>{b.name}</div>
              <div style={{ fontSize: 13, color: C.textSec }}>{b.id} · {b.region}</div>
            </div>
            {[['담당 작업자', b.worker], ['최근 점검', b.lastInspect], ['다음 점검', b.nextInspect]].map(([label, val]) => (

                <span style={{ fontSize: 13, color: C.textSec }}>{label}</span>
                <span style={{ fontSize: 13, fontWeight: 600 }}>{val}</span>
              </div>
            ))}
            <div style={{ marginTop: 20, display: 'flex', gap: 8 }}>
              <button style={{ flex: 1, padding: '10px', borderRadius: 8, border: 'none', background: C.accent, color: '#fff', fontWeight: 600, cursor: 'pointer', fontSize: 13 }}>작업자 재배정</button>
              <button style={{ flex: 1, padding: '10px', borderRadius: 8, border: `1px solid ${C.border}`, background: C.surface, fontWeight: 600, cursor: 'pointer', fontSize: 13 }}>점검 이력 보기</button>
            </div>
          </div>
        );
      })()}
    </div>
  );
}

            <button key={f} onClick={() => setFilterStatus(f)} style={{
              padding: '7px 16px', borderRadius: 8, border: `1px solid ${filterStatus === f ? C.accent : C.border}`,
              background: filterStatus === f ? C.accent : C.surface, color: filterStatus === f ? '#fff' : C.text,
              fontSize: 13, cursor: 'pointer', fontWeight: filterStatus === f ? 600 : 400,
            }}>{f}</button>
          ))}
        </div>
      </div>

      <div style={{ display: 'grid', gridTemplateColumns: '1fr', gap: 12 }}>
        {filtered.map(h => (
          <div
            key={h.id}
            onClick={() => setSelectedInsp(selectedInsp === h.id ? null : h.id)}
            style={{
              background: C.surface, border: `1px solid ${selectedInsp === h.id ? C.accent : C.border}`,
              borderRadius: 12, padding: '18px 24px', cursor: 'pointer',
              boxShadow: '0 1px 4px rgba(0,0,0,0.06)', transition: 'border-color 0.15s',
            }}
          >
            <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: selectedInsp === h.id ? 16 : 0 }}>
              <div style={{ display: 'flex', alignItems: 'center', gap: 16 }}>
                <span style={{ fontSize: 12, fontWeight: 700, color: C.accent }}>{h.id}</span>
                <span style={{ fontSize: 14, fontWeight: 600 }}>{h.boothName}</span>
                <Badge label={h.status} color={histStatusColors[h.status] || C.textSec} />
              </div>
              <div style={{ display: 'flex', alignItems: 'center', gap: 16 }}>
                <span style={{ fontSize: 12, color: C.textSec }}>작업자: {h.worker}</span>
                <span style={{ fontSize: 12, color: C.textSec }}>{h.date}</span>
                <span style={{ fontSize: 12, color: C.textSec }}>사진 {h.photos}장</span>
                <span style={{ fontSize: 14, color: C.textSec }}>{selectedInsp === h.id ? '▲' : '▼'}</span>
              </div>
            </div>
            {selectedInsp === h.id && (
              <div>
                <div style={{ padding: '14px 0', borderTop: `1px solid ${C.border}`, marginBottom: 16 }}>
                  <div style={{ fontSize: 13, color: C.textSec, marginBottom: 4 }}>점검 내역</div>
                  <div style={{ fontSize: 14 }}>{h.items}</div>
                </div>
                <div>
                  <div style={{ fontSize: 13, color: C.textSec, marginBottom: 10 }}>현장 사진 ({h.photos}장)</div>
                  <div style={{ display: 'flex', gap: 10, flexWrap: 'wrap' }}>
                    {Array.from({ length: h.photos }).map((_, i) => (
                      <div key={i} style={{
                        width: 140, height: 90, borderRadius: 8, overflow: 'hidden',
                        background: [C.accent, C.primary, C.success, C.warning, C.danger][i % 5] + '30',
                        border: `1px solid ${C.border}`, display: 'flex', alignItems: 'center', justifyContent: 'center', flexDirection: 'column', gap: 4,
                      }}>
                        <div style={{ fontSize: 20 }}>📷</div>
                        <div style={{ fontSize: 11, color: C.textSec }}>사진 {i + 1}</div>
                      </div>
                    ))}
                  </div>
                </div>
              </div>
            )}
          </div>
        ))}
      </div>
    </div>
  );
}

function WorkerManagement() {
  const [showModal, setShowModal] = useState(false);

  return (
    <div style={{ padding: 32 }}>
      <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 28 }}>
        <div>
          <h1 style={{ fontSize: 22, fontWeight: 700 }}>작업자 관리</h1>
          <p style={{ fontSize: 13, color: C.textSec, marginTop: 4 }}>현장 작업자 계정 및 배정 현황</p>
        </div>
        <button onClick={() => setShowModal(true)} style={{
          padding: '9px 20px', borderRadius: 8, border: 'none',
          background: C.accent, color: '#fff', fontWeight: 600, cursor: 'pointer', fontSize: 13,
        }}>+ 작업자 추가</button>
      </div>

      <div style={{ display: 'grid', gridTemplateColumns: 'repeat(2, 1fr)', gap: 16 }}>
        {workers.map(w => (
          <div key={w.id} style={{
            background: C.surface, border: `1px solid ${C.border}`, borderRadius: 12, padding: '20px 24px',
            boxShadow: '0 1px 4px rgba(0,0,0,0.06)',
          }}>
            <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 16 }}>
              <div style={{ display: 'flex', alignItems: 'center', gap: 12 }}>
                <div style={{
                  width: 44, height: 44, borderRadius: 99, background: C.primary,
                  display: 'flex', alignItems: 'center', justifyContent: 'center',
                  fontSize: 16, color: '#fff', fontWeight: 700,
                }}>
                  {w.name[0]}
                </div>
                <div>
                  <div style={{ fontSize: 15, fontWeight: 700 }}>{w.name}</div>
                  <div style={{ fontSize: 12, color: C.textSec }}>{w.phone}</div>
                </div>
              </div>
              <Badge label={w.status} color={workerStatusColors[w.status]} />
            </div>
            <div style={{ display: 'grid', gridTemplateColumns: 'repeat(3, 1fr)', gap: 12 }}>
              {[['담당 지역', w.region], ['담당 부스', `${w.assignedBooths}개`], ['오늘 완료', `${w.completedToday}건`]].map(([label, val]) => (
                <div key={label} style={{ background: C.bg, borderRadius: 8, padding: '10px 12px', textAlign: 'center' }}>
                  <div style={{ fontSize: 11, color: C.textSec, marginBottom: 4 }}>{label}</div>
                  <div style={{ fontSize: 14, fontWeight: 700, color: C.text }}>{val}</div>
                </div>
              ))}
            </div>
            <div style={{ display: 'flex', gap: 8, marginTop: 14 }}>
              <button style={{ flex: 1, padding: '7px', borderRadius: 8, border: `1px solid ${C.border}`, background: C.surface, fontSize: 12, cursor: 'pointer' }}>부스 배정</button>
              <button style={{ flex: 1, padding: '7px', borderRadius: 8, border: `1px solid ${C.border}`, background: C.surface, fontSize: 12, cursor: 'pointer' }}>정보 수정</button>
            </div>
          </div>
        ))}
      </div>

      {showModal && (
        <div style={{ position: 'fixed', inset: 0, background: 'rgba(0,0,0,0.4)', display: 'flex', alignItems: 'center', justifyContent: 'center', zIndex: 999 }}>
          <div style={{ background: C.surface, borderRadius: 16, padding: 32, width: 440, boxShadow: '0 20px 60px rgba(0,0,0,0.2)' }}>
            <div style={{ fontSize: 18, fontWeight: 700, marginBottom: 24 }}>새 작업자 추가</div>
            {[['이름', '이름 입력'], ['연락처', '010-0000-0000'], ['담당 지역', '지역 선택']].map(([label, ph]) => (
              <div key={label} style={{ marginBottom: 16 }}>
                <div style={{ fontSize: 13, fontWeight: 600, marginBottom: 6 }}>{label}</div>
                <input placeholder={ph} style={{ width: '100%', padding: '10px 14px', borderRadius: 8, border: `1px solid ${C.border}`, fontSize: 14, outline: 'none', fontFamily: 'inherit' }} />
              </div>
            ))}
            <div style={{ display: 'flex', gap: 10, marginTop: 24 }}>
              <button onClick={() => setShowModal(false)} style={{ flex: 1, padding: '11px', borderRadius: 8, border: `1px solid ${C.border}`, background: C.surface, cursor: 'pointer', fontWeight: 600, fontSize: 14 }}>취소</button>
              <button onClick={() => setShowModal(false)} style={{ flex: 1, padding: '11px', borderRadius: 8, border: 'none', background: C.accent, color: '#fff', cursor: 'pointer', fontWeight: 600, fontSize: 14 }}>추가</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

function App() {
  const [page, setPage] = useState('main');

  const renderPage = () => {
    switch (page) {
      case 'main': return <Dashboard />;
      case 'booth-management': return <BoothManagement />;
      case 'inspection-history': return <InspectionHistory />;
      case 'worker-management': return <WorkerManagement />;
      default: return <Dashboard />;
    }
  };

  return (
    <div style={{ display: 'flex', height: '100vh', overflow: 'hidden' }}>
      <Sidebar active={page} onNav={setPage} />
      <main style={{ flex: 1, overflowY: 'auto', background: C.bg }}>
        {renderPage()}
      </main>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
