<!DOCTYPE html>
<html lang="ko">
<head>

<style>

<body>
<div id="root"></div>
<script type="text/babel">

  { type: '냉난방', complete: 68, count: 14 },
  { type: '위생', complete: 78, count: 9 },

  name: d.type, value: d.complete,
  fill: ['#0066CC', '#38BDF8', '#059669', '#D97706', '#7C3AED'][i],

const historyItems = [

  { id: 'F2023', building: '여의도 센터', facility: '엘리베이터', worker: '박서연', date: '2026-03-29', status: '완료', items: '정기 안전 점검, 와이어 상태 확인', photos: 3 },
  { id: 'F2022', building: '판교 오피스 1', facility: '냉난방 설비', worker: '김태영', date: '2026-03-28', status: '수리접수', items: '냉각탑 이상 소음 발생, AS 요청', photos: 5 },
  { id: 'F2021', building: '성수 복합몰', facility: '전기 설비', worker: '최유진', date: '2026-03-28', status: '완료', items: '분전반 점검, 접지 저항 측정', photos: 2 },
  { id: 'F2020', building: '광화문 빌딩', facility: '위생 설비', worker: '정민석', date: '2026-03-27', status: '점검요청', items: '급수 배관 누수 의심', photos: 3 },
  { id: 'F2019', building: '강남 타워 A동', facility: '전기 설비', worker: '이준호', date: '2026-03-26', status: '완료', items: 'UPS 배터리 점검, 조명 교체', photos: 2 },
];

const scheduleData = [
  { worker: '이준호', date: '04-01', building: '강남 A동', type: '전기', status: '예정' },
  { worker: '이준호', date: '04-03', building: '여의도', type: '소방', status: '예정' },
  { worker: '박서연', date: '04-02', building: '판교 1', type: '엘리베이터', status: '예정' },
  { worker: '박서연', date: '04-04', building: '성수몰', type: '엘리베이터', status: '예정' },
  { worker: '김태영', date: '04-01', building: '광화문', type: '냉난방', status: '긴급' },
  { worker: '김태영', date: '04-05', building: '강남 A동', type: '냉난방', status: '예정' },
  { worker: '최유진', date: '04-02', building: '여의도', type: '전기', status: '예정' },
  { worker: '정민석', date: '04-03', building: '판교 1', type: '위생', status: '예정' },
];

const typeColors = { '소방 설비': '#DC2626', '전기 설비': '#D97706', '엘리베이터': '#0066CC', '냉난방 설비': '#059669', '위생 설비': '#7C3AED' };
const statusColors = { '완료': C.success, '수리접수': C.danger, '점검요청': C.warning, '예정': C.primary, '긴급': C.danger };

function Topnav({ active, onNav }) {
  const items = [
    { key: 'main', label: '대시보드' },
    { key: 'inspection-form', label: '점검 입력' },
    { key: 'maintenance-history', label: '점검 이력' },
    { key: 'schedule-management', label: '스케줄 관리' },
  ];
  return (
    <header style={{ background: C.secondary, position: 'sticky', top: 0, zIndex: 100, boxShadow: '0 2px 8px rgba(0,0,0,0.15)' }}>
      <div style={{ maxWidth: 1200, margin: '0 auto', padding: '0 32px', display: 'flex', alignItems: 'center', height: 60 }}>
        <div style={{ marginRight: 48 }}>
          <span style={{ fontSize: 10, color: 'rgba(255,255,255,0.5)', letterSpacing: 2 }}>FACILITYCHECK</span>
          <div style={{ fontSize: 14, fontWeight: 700, color: '#fff' }}>시설 점검 플랫폼</div>
        </div>
        <nav style={{ display: 'flex', gap: 4 }}>
          {items.map(item => (
            <button key={item.key} onClick={() => onNav(item.key)} style={{
              padding: '8px 18px', borderRadius: 6, border: 'none', cursor: 'pointer',
              background: active === item.key ? C.primary : 'transparent',
              color: active === item.key ? '#fff' : 'rgba(255,255,255,0.7)',
              fontSize: 13, fontWeight: active === item.key ? 600 : 400,
              transition: 'all 0.15s',
            }}>{item.label}</button>
          ))}
        </nav>
        <div style={{ marginLeft: 'auto', display: 'flex', alignItems: 'center', gap: 12 }}>
          <div style={{ width: 8, height: 8, borderRadius: 99, background: C.success }} />
          <span style={{ fontSize: 13, color: 'rgba(255,255,255,0.8)' }}>시스템 정상</span>
        </div>
      </div>
    </header>
  );
}

function Badge({ label, color }) {
  return (
    <span style={{
      display: 'inline-flex', alignItems: 'center', padding: '2px 10px',
      borderRadius: 99, fontSize: 12, fontWeight: 600,
      background: color + '20', color,
    }}>{label}</span>
  );
}

function HeroDashboard() {
  return (
    <div>
      {/* Hero Banner */}
      <div style={{
        background: `linear-gradient(135deg, ${C.secondary} 0%, ${C.primary} 100%)`,
        padding: '40px 0',
      }}>
        <div style={{ maxWidth: 1200, margin: '0 auto', padding: '0 32px' }}>
          <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between' }}>
            <div>
              <div style={{ fontSize: 13, color: 'rgba(255,255,255,0.6)', marginBottom: 8 }}>2026년 3월 30일 기준</div>
              <h1 style={{ fontSize: 28, fontWeight: 700, color: '#fff', marginBottom: 12 }}>건물 시설 점검 현황</h1>
              <div style={{ display: 'flex', gap: 32 }}>
                {[['관리 건물', '5동'], ['총 설비', '70건'], ['이번 달 점검', '82건'], ['긴급 알림', '2건']].map(([label, val]) => (
                  <div key={label}>
                    <div style={{ fontSize: 12, color: 'rgba(255,255,255,0.6)' }}>{label}</div>
                    <div style={{ fontSize: 24, fontWeight: 700, color: '#fff' }}>{val}</div>
                  </div>
                ))}
              </div>
            </div>
            <div style={{ display: 'flex', gap: 16 }}>
              {inspData.map((d, i) => (
                <div key={i} style={{ textAlign: 'center', background: 'rgba(255,255,255,0.1)', borderRadius: 12, padding: '16px 12px', minWidth: 90 }}>
                  <div style={{ fontSize: 22, fontWeight: 700, color: d.complete >= 90 ? '#34D399' : d.complete >= 70 ? '#FCD34D' : '#FCA5A5' }}>{d.complete}%</div>
                  <div style={{ fontSize: 11, color: 'rgba(255,255,255,0.7)', marginTop: 4 }}>{d.type}</div>
                </div>
              ))}
            </div>
          </div>
        </div>
      </div>

      {/* Content */}
      <div style={{ maxWidth: 1200, margin: '0 auto', padding: '32px 32px' }}>
        {/* Alert Banner */}
        <div style={{ background: '#FEF3C7', border: '1px solid #FCD34D', borderRadius: 10, padding: '12px 20px', marginBottom: 24, display: 'flex', alignItems: 'center', gap: 12 }}>
          <span style={{ fontSize: 16 }}>⚠️</span>
          <span style={{ fontSize: 13, color: '#92400E' }}><strong>긴급 알림 2건:</strong> 판교 오피스 1 냉난방 설비 이상 소음 · 광화문 빌딩 위생 배관 누수 의심 — 즉시 조치 필요</span>
        </div>

        <div style={{ display: 'grid', gridTemplateColumns: '1fr 380px', gap: 24 }}>
          <div style={{ background: C.surface, border: `1px solid ${C.border}`, borderRadius: 12, padding: 24, boxShadow: '0 1px 4px rgba(0,0,0,0.06)' }}>
            <div style={{ fontSize: 15, fontWeight: 600, marginBottom: 20 }}>설비 유형별 점검 완료율</div>
            <ResponsiveContainer width="100%" height={220}>
              <BarChart data={inspData} layout="vertical" barSize={20}>
                <CartesianGrid strokeDasharray="3 3" stroke={C.border} />
                <XAxis type="number" domain={[0, 100]} tick={{ fontSize: 12, fill: C.textSec }} tickFormatter={v => v + '%'} />
                <YAxis type="category" dataKey="type" width={80} tick={{ fontSize: 12, fill: C.textSec }} />
                <Tooltip formatter={v => v + '%'} />
                <Bar dataKey="complete" fill={C.primary} radius={[0,4,4,0]} name="완료율" />
              </BarChart>
            </ResponsiveContainer>
          </div>

          <div style={{ background: C.surface, border: `1px solid ${C.border}`, borderRadius: 12, padding: 24, boxShadow: '0 1px 4px rgba(0,0,0,0.06)' }}>
            <div style={{ fontSize: 15, fontWeight: 600, marginBottom: 16 }}>긴급 점검 알림</div>
            {[
              { bld: '판교 오피스 1', type: '냉난방 설비', lvl: '긴급', time: '09:42' },
              { bld: '광화문 빌딩', type: '위생 설비', lvl: '긴급', time: '11:15' },
              { bld: '강남 타워 A동', type: '소방 설비', lvl: '주의', time: '13:30' },
              { bld: '여의도 센터', type: '전기 설비', lvl: '정보', time: '14:20' },
            ].map((n, i) => (
              <div key={i} style={{ display: 'flex', alignItems: 'center', gap: 12, padding: '10px 0', borderBottom: i < 3 ? `1px solid ${C.border}` : 'none' }}>
                <div style={{ width: 8, height: 8, borderRadius: 99, background: n.lvl === '긴급' ? C.danger : n.lvl === '주의' ? C.warning : C.accent, flexShrink: 0 }} />
                <div style={{ flex: 1 }}>
                  <div style={{ fontSize: 13, fontWeight: 600 }}>{n.bld}</div>
                  <div style={{ fontSize: 12, color: C.textSec }}>{n.type}</div>

                <div style={{ textAlign: 'right' }}>
                  <Badge label={n.lvl} color={n.lvl === '긴급' ? C.danger : n.lvl === '주의' ? C.warning : C.accent} />

                </div>

}

function InspectionForm() {
  const [facilityType, setFacilityType] = useState('소방 설비');
  const [building, setBuilding] = useState('강남 타워 A동');
  const [checklist, setChecklist] = useState({});
  const [uploaded, setUploaded] = useState(0);

  const checkItems = {
    '소방 설비': ['스프링클러 작동 상태 확인', '소화기 압력 게이지 정상 범위 여부', '화재 감지기 오작동 이력 확인', '비상구 램프 점등 상태', '배관 누수 여부 육안 점검'],
    '전기 설비': ['분전반 과열 여부 점검', '접지 저항 측정 (1Ω 이하)', '조명 노후화 및 점멸 여부', 'UPS 배터리 충전 상태', '누전 차단기 작동 테스트'],
    '엘리베이터': ['와이어 로프 마모도 점검', '도어 개폐 동작 정상 여부', '비상 인터폰 작동 확인', '하중 표시 센서 정상 여부', '기계실 온도 및 오일 점검'],
    '냉난방 설비': ['필터 청소 및 교체 여부', '냉매 압력 정상 범위', '팬 코일 소음 여부', '배수 트레이 청결 상태', '온도 설정 및 실제 온도 오차'],
    '위생 설비': ['급수 배관 누수 여부', '배수구 막힘 및 악취', '위생기구 파손 여부', '온수 온도 정상 여부', '정수기 필터 교체 주기 확인'],
  };

  const items = checkItems[facilityType] || [];
  const checked = items.filter(it => checklist[it]).length;

  return (
    <div style={{ maxWidth: 1200, margin: '0 auto', padding: '32px 32px' }}>
      <div style={{ marginBottom: 28 }}>
        <h1 style={{ fontSize: 22, fontWeight: 700 }}>점검 입력</h1>
        <p style={{ fontSize: 13, color: C.textSec, marginTop: 4 }}>현장 점검 내역 및 사진 업로드</p>
      </div>

      <div style={{ display: 'grid', gridTemplateColumns: '1fr 360px', gap: 24 }}>
        <div>
          <div style={{ background: C.surface, border: `1px solid ${C.border}`, borderRadius: 12, padding: 24, boxShadow: '0 1px 4px rgba(0,0,0,0.06)', marginBottom: 20 }}>
            <div style={{ fontSize: 15, fontWeight: 600, marginBottom: 20 }}>점검 기본 정보</div>
            <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 16 }}>
              <div>
                <label style={{ fontSize: 13, fontWeight: 600, display: 'block', marginBottom: 6 }}>건물 선택</label>
                <select value={building} onChange={e => setBuilding(e.target.value)} style={{ width: '100%', padding: '10px 14px', borderRadius: 8, border: `1px solid ${C.border}`, fontSize: 14, fontFamily: 'inherit', color: C.text, outline: 'none' }}>
                  {buildings.map(b => <option key={b}>{b}</option>)}
                </select>
              </div>
              <div>
                <label style={{ fontSize: 13, fontWeight: 600, display: 'block', marginBottom: 6 }}>설비 유형</label>
                <select value={facilityType} onChange={e => setFacilityType(e.target.value)} style={{ width: '100%', padding: '10px 14px', borderRadius: 8, border: `1px solid ${C.border}`, fontSize: 14, fontFamily: 'inherit', color: C.text, outline: 'none' }}>
                  {facilityTypes.map(f => <option key={f}>{f}</option>)}
                </select>
              </div>
            </div>
          </div>

          <div style={{ background: C.surface, border: `1px solid ${C.border}`, borderRadius: 12, padding: 24, boxShadow: '0 1px 4px rgba(0,0,0,0.06)', marginBottom: 20 }}>
            <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 16 }}>
              <div style={{ fontSize: 15, fontWeight: 600 }}>{facilityType} 점검 체크리스트</div>
              <span style={{ fontSize: 13, color: C.primary, fontWeight: 600 }}>{checked}/{items.length} 완료</span>
            </div>
            <div style={{ background: C.bg, borderRadius: 8, padding: '4px 0', marginBottom: 12 }}>
              <div style={{ height: 6, background: C.primary, borderRadius: 99, width: `${(checked / items.length) * 100}%`, transition: 'width 0.3s' }} />
            </div>
            {items.map(item => (
              <label key={item} style={{ display: 'flex', alignItems: 'center', gap: 12, padding: '10px 0', borderBottom: `1px solid ${C.border}`, cursor: 'pointer' }}>
                <input
                  type="checkbox"
                  checked={!!checklist[item]}
                  onChange={e => setChecklist(prev => ({ ...prev, [item]: e.target.checked }))}
                  style={{ width: 18, height: 18, accentColor: C.primary }}
                />
                <span style={{ fontSize: 14, color: checklist[item] ? C.textSec : C.text, textDecoration: checklist[item] ? 'line-through' : 'none' }}>{item}</span>
              </label>
            ))}
          </div>

          <div style={{ background: C.surface, border: `1px solid ${C.border}`, borderRadius: 12, padding: 24, boxShadow: '0 1px 4px rgba(0,0,0,0.06)' }}>
            <div style={{ fontSize: 15, fontWeight: 600, marginBottom: 12 }}>점검 특이사항</div>
            <textarea placeholder="특이사항이 있으면 입력해 주세요" rows={4} style={{ width: '100%', padding: '12px 14px', borderRadius: 8, border: `1px solid ${C.border}`, fontSize: 14, fontFamily: 'inherit', resize: 'none', outline: 'none', color: C.text }} />
          </div>
        </div>

        <div>
          <div style={{ background: C.surface, border: `1px solid ${C.border}`, borderRadius: 12, padding: 24, boxShadow: '0 1px 4px rgba(0,0,0,0.06)', marginBottom: 20 }}>
            <div style={{ fontSize: 15, fontWeight: 600, marginBottom: 16 }}>현장 사진 업로드</div>
            <div
              style={{
                border: `2px dashed ${C.border}`, borderRadius: 10, padding: '32px 20px',
                textAlign: 'center', cursor: 'pointer', background: C.bg,
              }}
              onClick={() => setUploaded(prev => Math.min(prev + 1, 5))}
            >
              <div style={{ fontSize: 32, marginBottom: 8 }}>📷</div>
              <div style={{ fontSize: 14, fontWeight: 600, color: C.text, marginBottom: 4 }}>사진 클릭하여 추가</div>
              <div style={{ fontSize: 12, color: C.textSec }}>GCS 자동 업로드 · 최대 800px 리사이징</div>
            </div>
            {uploaded > 0 && (
              <div style={{ display: 'grid', gridTemplateColumns: 'repeat(3, 1fr)', gap: 8, marginTop: 16 }}>
                {Array.from({ length: uploaded }).map((_, i) => (
                  <div key={i} style={{ aspectRatio: '1', borderRadius: 8, background: [C.primary, C.accent, C.success, C.warning, C.danger][i % 5] + '25', border: `1px solid ${C.border}`, display: 'flex', alignItems: 'center', justifyContent: 'center', flexDirection: 'column', gap: 4 }}>
                    <div style={{ fontSize: 20 }}>🖼</div>
                    <div style={{ fontSize: 10, color: C.textSec }}>사진 {i + 1}</div>
                  </div>
                ))}
              </div>
            )}
            <div style={{ marginTop: 12, fontSize: 12, color: C.textSec, textAlign: 'center' }}>
              {uploaded}/5 업로드됨
            </div>
          </div>

          <div style={{ background: C.surface, border: `1px solid ${C.border}`, borderRadius: 12, padding: 24, boxShadow: '0 1px 4px rgba(0,0,0,0.06)', marginBottom: 16 }}>
            <div style={{ fontSize: 14, fontWeight: 600, marginBottom: 12 }}>점검 요약</div>
            {[['건물', building], ['설비 유형', facilityType], ['점검 진행률', `${checked}/${items.length} (${items.length ? Math.round(checked/items.length*100) : 0}%)`], ['첨부 사진', `${uploaded}장`]].map(([l, v]) => (
              <div key={l} style={{ display: 'flex', justifyContent: 'space-between', padding: '8px 0', borderBottom: `1px solid ${C.border}` }}>
                <span style={{ fontSize: 13, color: C.textSec }}>{l}</span>
                <span style={{ fontSize: 13, fontWeight: 600 }}>{v}</span>
              </div>
            ))}
          </div>

          <button style={{ width: '100%', padding: '14px', borderRadius: 10, border: 'none', background: C.primary, color: '#fff', fontWeight: 700, cursor: 'pointer', fontSize: 15 }}>
            점검 결과 제출
          </button>
        </div>
      </div>
    </div>
  );
}

function MaintenanceHistory() {
  const [expanded, setExpanded] = useState(null);

  const statusColors2 = { '완료': C.success, '수리접수': C.danger, '점검요청': C.warning };

  return (
    <div style={{ maxWidth: 1200, margin: '0 auto', padding: '32px 32px' }}>
      <div style={{ marginBottom: 28 }}>
        <h1 style={{ fontSize: 22, fontWeight: 700 }}>점검 이력</h1>
        <p style={{ fontSize: 13, color: C.textSec, marginTop: 4 }}>설비별 점검 및 보수 이력 타임라인</p>
      </div>

      <div style={{ display: 'grid', gridTemplateColumns: '1fr 320px', gap: 24 }}>
        <div>
          {historyItems.map(item => (
            <div key={item.id}>
              <div style={{ display: 'flex', gap: 16, marginBottom: 4 }}>
                <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 0 }}>
                  <div style={{ width: 14, height: 14, borderRadius: 99, background: statusColors2[item.status] || C.primary, marginTop: 20, flexShrink: 0 }} />
                  <div style={{ width: 2, flex: 1, background: C.border, minHeight: 32 }} />
                </div>
                <div
                  onClick={() => setExpanded(expanded === item.id ? null : item.id)}
                  style={{
                    flex: 1, background: C.surface, border: `1px solid ${expanded === item.id ? C.primary : C.border}`,
                    borderRadius: 10, padding: '16px 20px', cursor: 'pointer', marginBottom: 8,
                    boxShadow: '0 1px 4px rgba(0,0,0,0.06)', transition: 'border-color 0.15s',
                  }}
                >
                  <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: expanded === item.id ? 14 : 0 }}>
                    <div style={{ display: 'flex', alignItems: 'center', gap: 12 }}>
                      <div style={{ width: 10, height: 10, borderRadius: 3, background: typeColors[item.facility] || C.primary }} />
                      <span style={{ fontSize: 14, fontWeight: 600 }}>{item.building}</span>
                      <Badge label={item.facility} color={typeColors[item.facility] || C.primary} />
                      <Badge label={item.status} color={statusColors2[item.status]} />
                    </div>
                    <div style={{ display: 'flex', gap: 12, alignItems: 'center' }}>
                      <span style={{ fontSize: 12, color: C.textSec }}>{item.worker}</span>
                      <span style={{ fontSize: 12, color: C.textSec }}>{item.date}</span>
                    </div>
                  </div>
                  {expanded === item.id && (
                    <div>
                      <div style={{ fontSize: 13, color: C.textSec, marginBottom: 12 }}>{item.items}</div>
                      <div>
                        <div style={{ fontSize: 12, color: C.textSec, marginBottom: 8 }}>첨부 사진 ({item.photos}장)</div>
                        <div style={{ display: 'flex', gap: 8 }}>
                          {Array.from({ length: item.photos }).map((_, i) => (
                            <div key={i} style={{ width: 80, height: 60, borderRadius: 6, background: [C.primary, C.accent, C.success, C.warning, C.danger][i % 5] + '25', border: `1px solid ${C.border}`, display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 18 }}>🖼</div>
                          ))}
                        </div>
                      </div>
                    </div>
                  )}
                </div>
              </div>
            </div>
          ))}
        </div>

        <div>
          <div style={{ background: C.surface, border: `1px solid ${C.border}`, borderRadius: 12, padding: 20, boxShadow: '0 1px 4px rgba(0,0,0,0.06)', marginBottom: 16 }}>
            <div style={{ fontSize: 14, fontWeight: 600, marginBottom: 14 }}>설비 유형별 현황</div>
            {inspData.map(d => (
              <div key={d.type} style={{ marginBottom: 12 }}>
                <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: 4 }}>
                  <span style={{ fontSize: 13 }}>{d.type}</span>
                  <span style={{ fontSize: 13, fontWeight: 600, color: typeColors[d.type] || C.primary }}>{d.complete}%</span>
                </div>
                <div style={{ height: 6, background: C.bg, borderRadius: 99, overflow: 'hidden' }}>
                  <div style={{ height: '100%', width: `${d.complete}%`, background: typeColors[d.type] || C.primary, borderRadius: 99 }} />
                </div>
              </div>
            ))}
          </div>
          <div style={{ background: C.surface, border: `1px solid ${C.border}`, borderRadius: 12, padding: 20, boxShadow: '0 1px 4px rgba(0,0,0,0.06)' }}>
            <div style={{ fontSize: 14, fontWeight: 600, marginBottom: 12 }}>최근 수리 접수</div>
            {historyItems.filter(h => h.status !== '완료').map(h => (
              <div key={h.id} style={{ padding: '10px 0', borderBottom: `1px solid ${C.border}` }}>
                <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: 2 }}>
                  <span style={{ fontSize: 13, fontWeight: 600 }}>{h.building}</span>
                  <Badge label={h.status} color={statusColors2[h.status]} />
                </div>
                <div style={{ fontSize: 12, color: C.textSec }}>{h.facility} · {h.date}</div>
              </div>
            ))}
          </div>
        </div>
      </div>
    </div>
  );
}

function ScheduleManagement() {
  const workers2 = ['이준호', '박서연', '김태영', '최유진', '정민석'];
  const dates = ['04-01', '04-02', '04-03', '04-04', '04-05', '04-06', '04-07'];

  return (
    <div style={{ maxWidth: 1200, margin: '0 auto', padding: '32px 32px' }}>
      <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 28 }}>
        <div>
          <h1 style={{ fontSize: 22, fontWeight: 700 }}>스케줄 관리</h1>
          <p style={{ fontSize: 13, color: C.textSec, marginTop: 4 }}>작업자별 점검 스케줄 관리 및 배정</p>
        </div>
        <div style={{ display: 'flex', gap: 8 }}>
          <button style={{ padding: '8px 16px', borderRadius: 8, border: `1px solid ${C.border}`, background: C.surface, fontSize: 13, cursor: 'pointer' }}>← 이전 주</button>
          <button style={{ padding: '8px 20px', borderRadius: 8, border: 'none', background: C.primary, color: '#fff', fontSize: 13, cursor: 'pointer', fontWeight: 600 }}>이번 주</button>
          <button style={{ padding: '8px 16px', borderRadius: 8, border: `1px solid ${C.border}`, background: C.surface, fontSize: 13, cursor: 'pointer' }}>다음 주 →</button>
        </div>
      </div>

      <div style={{ background: C.surface, border: `1px solid ${C.border}`, borderRadius: 12, overflow: 'hidden', boxShadow: '0 1px 4px rgba(0,0,0,0.06)' }}>
        <table style={{ width: '100%', borderCollapse: 'collapse' }}>
          <thead>
            <tr style={{ background: C.secondary }}>
              <th style={{ padding: '12px 16px', textAlign: 'left', fontSize: 12, fontWeight: 600, color: 'rgba(255,255,255,0.7)', width: 110 }}>작업자</th>
              {dates.map(d => (
                <th key={d} style={{ padding: '12px 8px', textAlign: 'center', fontSize: 12, fontWeight: 600, color: 'rgba(255,255,255,0.7)' }}>{d}</th>
              ))}
            </tr>
          </thead>
          <tbody>
            {workers2.map((w, wi) => (
              <tr key={w} style={{ borderBottom: `1px solid ${C.border}`, background: wi % 2 === 0 ? C.surface : '#F9FEFF' }}>
                <td style={{ padding: '12px 16px', fontSize: 13, fontWeight: 600 }}>{w}</td>
                {dates.map(d => {
                  const events = scheduleData.filter(s => s.worker === w && s.date === d);
                  return (
                    <td key={d} style={{ padding: '6px 4px', verticalAlign: 'top' }}>
                      {events.map((ev, ei) => (
                        <div key={ei} style={{
                          background: typeColors[ev.type + ' 설비'] || C.primary,
                          borderRadius: 6, padding: '4px 8px', marginBottom: 2,
                          fontSize: 11, color: '#fff', fontWeight: 500,
                          borderLeft: ev.status === '긴급' ? '3px solid #FFD700' : 'none',
                        }}>
                          {ev.building}
                          {ev.status === '긴급' && <span style={{ marginLeft: 4 }}>⚡</span>}
                        </div>
                      ))}
                    </td>
                  );
                })}
              </tr>
            ))}
          </tbody>
        </table>
      </div>

      <div style={{ display: 'flex', gap: 12, marginTop: 16, flexWrap: 'wrap' }}>
        {Object.entries(typeColors).map(([type, color]) => (
          <div key={type} style={{ display: 'flex', alignItems: 'center', gap: 6, fontSize: 12, color: C.textSec }}>
            <div style={{ width: 12, height: 12, borderRadius: 3, background: color }} />
            {type}
          </div>
        ))}
      </div>
    </div>
  );
}

function App() {
  const [page, setPage] = useState('main');

  const renderPage = () => {
    switch (page) {
      case 'main': return <HeroDashboard />;
      case 'inspection-form': return <InspectionForm />;
      case 'maintenance-history': return <MaintenanceHistory />;
      case 'schedule-management': return <ScheduleManagement />;
      default: return <HeroDashboard />;
    }
  };

  return (
    <div>
      <Topnav active={page} onNav={setPage} />
      <div style={{ background: C.bg, minHeight: 'calc(100vh - 60px)' }}>
        {renderPage()}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
