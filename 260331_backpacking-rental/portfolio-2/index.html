<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>캠핑카 렌탈 예약 플랫폼 — 구현 데모</title>
<link rel="preconnect" href="https://cdn.jsdelivr.net">
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" rel="stylesheet">
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://unpkg.com/prop-types@15/prop-types.min.js"></script>
<script src="https://unpkg.com/recharts@2.10.3/umd/Recharts.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Pretendard',sans-serif;background:#F0FDF4;color:#111827;min-height:100vh;}
/* Topnav */
.topnav{background:#fff;border-bottom:1px solid #D1FAE5;position:sticky;top:0;z-index:100;box-shadow:0 1px 8px rgba(5,150,105,0.08);}
.topnav-inner{max-width:1200px;margin:0 auto;display:flex;align-items:center;height:64px;padding:0 24px;gap:0;}
.logo{font-size:18px;font-weight:800;color:#059669;margin-right:40px;display:flex;align-items:center;gap:8px;white-space:nowrap;}
.logo-sub{font-size:11px;color:#6B7280;font-weight:400;}
.nav-tabs{display:flex;align-items:center;gap:2px;flex:1;}
.nav-tab{padding:10px 18px;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;color:#6B7280;transition:all 0.15s;white-space:nowrap;}
.nav-tab:hover{color:#059669;background:#F0FDF4;}
.nav-tab.active{color:#059669;background:#DCFCE7;}
.topnav-right{display:flex;align-items:center;gap:10px;margin-left:auto;}
.btn{padding:8px 16px;border-radius:10px;font-size:13px;font-weight:600;cursor:pointer;border:none;transition:all 0.15s;}
.btn-primary{background:#059669;color:#fff;}
.btn-primary:hover{background:#047857;}
.btn-outline{background:#fff;color:#374151;border:1.5px solid #D1FAE5;}
.btn-outline:hover{background:#F0FDF4;border-color:#059669;}
.btn-amber{background:#F59E0B;color:#fff;}
.btn-amber:hover{background:#D97706;}
/* Hero */
.hero{background:linear-gradient(135deg,#064E3B 0%,#065F46 40%,#059669 100%);padding:64px 24px;text-align:center;position:relative;overflow:hidden;}
.hero::before{content:'';position:absolute;top:-50px;right:-80px;width:300px;height:300px;border-radius:50%;background:rgba(255,255,255,0.04);}
.hero::after{content:'';position:absolute;bottom:-60px;left:-40px;width:200px;height:200px;border-radius:50%;background:rgba(245,158,11,0.12);}
.hero-tag{display:inline-block;background:rgba(245,158,11,0.2);color:#FCD34D;font-size:12px;font-weight:700;padding:5px 14px;border-radius:20px;margin-bottom:16px;letter-spacing:0.05em;}
.hero-title{font-size:38px;font-weight:900;color:#fff;line-height:1.2;margin-bottom:12px;}
.hero-title span{color:#F59E0B;}
.hero-sub{font-size:16px;color:#A7F3D0;margin-bottom:32px;}
.search-box{background:#fff;border-radius:16px;padding:20px 24px;max-width:760px;margin:0 auto;display:grid;grid-template-columns:1fr 1fr 120px 140px;gap:12px;align-items:end;box-shadow:0 8px 32px rgba(0,0,0,0.15);}
.search-field{display:flex;flex-direction:column;gap:6px;}
.search-label{font-size:11px;font-weight:700;color:#064E3B;text-transform:uppercase;letter-spacing:0.06em;}
.search-input{padding:10px 14px;border-radius:10px;border:1.5px solid #D1FAE5;font-size:13px;font-family:'Pretendard',sans-serif;color:#111827;outline:none;}
.search-input:focus{border-color:#059669;}
.search-btn{background:#059669;color:#fff;padding:11px;border-radius:10px;border:none;cursor:pointer;font-size:14px;font-weight:700;font-family:'Pretendard',sans-serif;}
.search-btn:hover{background:#047857;}
/* Main content */
.main-wrap{max-width:1200px;margin:0 auto;padding:32px 24px;}
.section-title{font-size:20px;font-weight:800;color:#111827;margin-bottom:4px;}
.section-sub{font-size:13px;color:#6B7280;margin-bottom:20px;}
/* Vehicle grid */
.filter-bar{display:flex;align-items:center;gap:10px;margin-bottom:20px;flex-wrap:wrap;}
.filter-chip{padding:7px 16px;border-radius:20px;font-size:12px;font-weight:600;cursor:pointer;border:1.5px solid #D1FAE5;background:#fff;color:#374151;transition:all 0.15s;}
.filter-chip.active{background:#DCFCE7;border-color:#059669;color:#065F46;}
.vehicle-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:20px;margin-bottom:32px;}
.vehicle-card{background:#fff;border-radius:16px;overflow:hidden;border:1.5px solid #D1FAE5;transition:all 0.2s;cursor:pointer;}
.vehicle-card:hover{transform:translateY(-3px);box-shadow:0 8px 24px rgba(5,150,105,0.12);border-color:#059669;}
.vehicle-img{width:100%;height:160px;object-fit:cover;background:linear-gradient(135deg,#D1FAE5,#A7F3D0);display:flex;align-items:center;justify-content:center;font-size:48px;}
.vehicle-body{padding:16px;}
.vehicle-name{font-size:15px;font-weight:800;color:#111827;margin-bottom:4px;}
.vehicle-spec{font-size:12px;color:#6B7280;margin-bottom:10px;}
.vehicle-price{font-size:18px;font-weight:800;color:#059669;}
.vehicle-price span{font-size:12px;font-weight:400;color:#6B7280;}
.vehicle-tags{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px;}
.tag{padding:3px 8px;border-radius:6px;font-size:10px;font-weight:600;}
.tag-green{background:#DCFCE7;color:#065F46;}
.tag-amber{background:#FEF3C7;color:#92400E;}
.tag-blue{background:#DBEAFE;color:#1E40AF;}
.avail-badge{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:600;padding:4px 10px;border-radius:8px;}
.avail-ok{background:#DCFCE7;color:#065F46;}
.avail-low{background:#FEF3C7;color:#92400E;}
.avail-none{background:#FEE2E2;color:#991B1B;}
/* Reservation flow */
.res-layout{display:grid;grid-template-columns:1fr 320px;gap:24px;}
.res-main{display:flex;flex-direction:column;gap:16px;}
.res-card{background:#fff;border-radius:16px;padding:22px;border:1.5px solid #D1FAE5;}
.res-card-title{font-size:15px;font-weight:800;color:#111827;margin-bottom:16px;display:flex;align-items:center;gap:8px;}
.res-card-num{width:22px;height:22px;border-radius:50%;background:#059669;color:#fff;font-size:11px;font-weight:700;display:inline-flex;align-items:center;justify-content:center;flex-shrink:0;}
.mini-cal{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;}
.mini-day-hdr{text-align:center;font-size:10px;color:#9CA3AF;padding:4px 0;font-weight:600;}
.mini-day{aspect-ratio:1;display:flex;align-items:center;justify-content:center;border-radius:6px;font-size:12px;cursor:pointer;font-weight:500;}
.mini-day.available:hover{background:#DCFCE7;color:#059669;}
.mini-day.selected-start{background:#059669;color:#fff;font-weight:700;}
.mini-day.selected-end{background:#065F46;color:#fff;font-weight:700;}
.mini-day.in-range{background:#DCFCE7;color:#065F46;}
.mini-day.blocked{color:#D1D5DB;cursor:not-allowed;text-decoration:line-through;}
.mini-day.unavail{background:#FEF2F2;color:#FCA5A5;cursor:not-allowed;}
.mini-day.empty{opacity:0;}
.option-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;}
.option-item{border:1.5px solid #E5E7EB;border-radius:10px;padding:12px;cursor:pointer;transition:all 0.15s;}
.option-item:hover{border-color:#059669;background:#F0FDF4;}
.option-item.selected{border-color:#059669;background:#DCFCE7;}
.option-name{font-size:13px;font-weight:700;color:#111827;}
.option-price{font-size:12px;color:#059669;font-weight:600;margin-top:3px;}
/* Summary sidebar */
.summary-card{background:#fff;border-radius:16px;padding:20px;border:1.5px solid #D1FAE5;position:sticky;top:80px;}
.summary-title{font-size:15px;font-weight:800;color:#111827;margin-bottom:16px;}
.summary-item{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid #F0FDF4;font-size:13px;}
.summary-item:last-of-type{border-bottom:none;}
.summary-label{color:#6B7280;}
.summary-value{font-weight:700;color:#111827;}
.summary-total{display:flex;justify-content:space-between;padding:14px 0 0;font-size:16px;font-weight:800;border-top:2px solid #DCFCE7;margin-top:4px;}
.summary-total .value{color:#059669;}
/* Mypage */
.my-layout{display:grid;grid-template-columns:200px 1fr;gap:20px;}
.my-nav{background:#fff;border-radius:16px;padding:16px;border:1.5px solid #D1FAE5;height:fit-content;}
.my-nav-item{padding:10px 14px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;color:#6B7280;transition:all 0.15s;margin-bottom:3px;}
.my-nav-item.active{background:#DCFCE7;color:#059669;}
.my-nav-item:hover{background:#F0FDF4;}
.booking-card{background:#fff;border-radius:16px;padding:20px;border:1.5px solid #D1FAE5;margin-bottom:14px;}
.booking-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:14px;}
.booking-id{font-size:12px;color:#9CA3AF;margin-bottom:4px;}
.booking-title{font-size:15px;font-weight:800;color:#111827;}
.steps{display:flex;align-items:center;margin-top:14px;}
.step{display:flex;flex-direction:column;align-items:center;flex:1;position:relative;}
.step::after{content:'';position:absolute;top:11px;left:50%;width:100%;height:2px;z-index:0;}
.step:last-child::after{display:none;}
.step.done::after{background:#059669;}
.step.current::after{background:linear-gradient(to right,#059669,#D1FAE5);}
.step.future::after{background:#E5E7EB;}
.step-dot{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;z-index:1;flex-shrink:0;}
.step-dot.done{background:#059669;color:#fff;}
.step-dot.current{background:#F59E0B;color:#fff;box-shadow:0 0 0 4px rgba(245,158,11,0.2);}
.step-dot.future{background:#E5E7EB;color:#9CA3AF;}
.step-label{font-size:10px;color:#6B7280;margin-top:6px;font-weight:500;text-align:center;}
/* Host management */
.host-layout{display:grid;grid-template-columns:1fr 1fr;gap:20px;}
.form-card{background:#fff;border-radius:16px;padding:22px;border:1.5px solid #D1FAE5;}
.form-title{font-size:15px;font-weight:800;color:#111827;margin-bottom:16px;}
.step-indicator{display:flex;gap:6px;margin-bottom:20px;}
.step-chip{padding:6px 14px;border-radius:20px;font-size:11px;font-weight:700;border:1.5px solid #E5E7EB;color:#9CA3AF;}
.step-chip.active{background:#059669;color:#fff;border-color:#059669;}
.step-chip.done{background:#DCFCE7;color:#059669;border-color:#059669;}
.form-group{margin-bottom:14px;}
.form-label{font-size:12px;font-weight:700;color:#374151;margin-bottom:6px;}
.form-input{width:100%;padding:10px 14px;border:1.5px solid #E5E7EB;border-radius:10px;font-size:13px;font-family:'Pretendard',sans-serif;color:#111827;outline:none;}
.form-input:focus{border-color:#059669;}
.requests-list{display:flex;flex-direction:column;gap:10px;}
.request-item{border:1.5px solid #D1FAE5;border-radius:12px;padding:14px;display:flex;justify-content:space-between;align-items:center;}
.req-info .req-dates{font-size:12px;color:#6B7280;margin-top:3px;}
.req-info .req-name{font-size:14px;font-weight:700;color:#111827;}
.req-actions{display:flex;gap:8px;}
/* Price calendar */
.price-wrap{display:grid;grid-template-columns:1fr 280px;gap:20px;}
.price-cal{background:#fff;border-radius:16px;padding:22px;border:1.5px solid #D1FAE5;}
.pcal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-top:14px;}
.pcal-day{border-radius:8px;padding:6px 4px;text-align:center;cursor:pointer;transition:all 0.15s;border:1px solid transparent;}
.pcal-day:hover{border-color:#059669;background:#F0FDF4;}
.pcal-day.selected{background:#059669;color:#fff;}
.pcal-day.in-range{background:#DCFCE7;}
.pcal-day.weekend{opacity:0.5;}
.pcal-day-num{font-size:12px;font-weight:700;display:block;}
.pcal-day-price{font-size:9px;display:block;margin-top:2px;}
.pcal-day.low-price .pcal-day-price{color:#059669;}
.pcal-day.mid-price .pcal-day-price{color:#D97706;}
.pcal-day.high-price .pcal-day-price{color:#DC2626;}
.badge{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:600;}
.badge-green{background:#DCFCE7;color:#15803D;}
.badge-blue{background:#DBEAFE;color:#1D4ED8;}
.badge-amber{background:#FEF3C7;color:#B45309;}
.badge-gray{background:#F3F4F6;color:#374151;}
.badge-red{background:#FEE2E2;color:#B91C1C;}
::-webkit-scrollbar{width:4px;height:4px;}
::-webkit-scrollbar-track{background:#F0FDF4;}
::-webkit-scrollbar-thumb{background:#A7F3D0;border-radius:4px;}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState } = React;
const { BarChart, Bar, XAxis, YAxis, CartesianGrid, Tooltip, ResponsiveContainer, LineChart, Line } = Recharts;

const VEHICLES = [
  { id: 'V01', name: '트레블메이트 S', type: '소형', sleeps: 2, price: '89,000', emoji: '🚐', tags: ['2인', '소형', '연비좋음'], avail: 3 },
  { id: 'V02', name: '캠프마스터 M', type: '중형', sleeps: 4, price: '145,000', emoji: '🚌', tags: ['4인', '중형', '풀옵션'], avail: 1 },
  { id: 'V03', name: '하이로드 L', type: '대형', sleeps: 6, price: '215,000', emoji: '🚎', tags: ['6인', '대형', '가족추천'], avail: 0 },
  { id: 'V04', name: '어드벤처 미니', type: '소형', sleeps: 2, price: '79,000', emoji: '🚐', tags: ['2인', '소형', '초보적합'], avail: 2 },
  { id: 'V05', name: '와일드크래프트 XL', type: '대형', sleeps: 8, price: '285,000', emoji: '🚌', tags: ['8인', '럭셔리', '그룹'], avail: 1 },
  { id: 'V06', name: '프리덤 캠퍼', type: '중형', sleeps: 4, price: '165,000', emoji: '🚐', tags: ['4인', '중형', '수동변속'], avail: 2 },
];

const DAYS_KO = ['일','월','화','수','목','금','토'];

function VehicleSearchPage() {
  const [typeFilter, setTypeFilter] = useState('전체');
  const filters = ['전체','소형','중형','대형'];
  const filtered = typeFilter === '전체' ? VEHICLES : VEHICLES.filter(v => v.type === typeFilter);
  return (
    <div>
      <div className="hero">
        <div className="hero-tag">📅 날짜 기반 실시간 재고 검색</div>
        <h1 className="hero-title">캠핑카로 떠나는<br/><span>자유로운 여행</span></h1>
        <p className="hero-sub">원하는 날짜를 입력하면 가용 차량을 즉시 확인합니다</p>
        <div className="search-box">
          <div className="search-field">
            <div className="search-label">출발일</div>
            <input className="search-input" type="text" defaultValue="2026-04-10" />
          </div>
          <div className="search-field">
            <div className="search-label">반납일</div>
            <input className="search-input" type="text" defaultValue="2026-04-13" />
          </div>
          <div className="search-field">
            <div className="search-label">탑승 인원</div>
            <input className="search-input" type="text" defaultValue="4명" />
          </div>
          <button className="search-btn">🔍 검색</button>
        </div>
      </div>
      <div className="main-wrap">
        <div className="section-title">가용 차량 목록</div>
        <div className="section-sub">4월 10일 ~ 13일 기준 · 즉시 예약 가능한 차량만 표시</div>
        <div className="filter-bar">
          {filters.map(f => <div key={f} className={`filter-chip ${typeFilter===f?'active':''}`} onClick={() => setTypeFilter(f)}>{f}</div>)}
          <div className="filter-chip">침대 수</div>
          <div className="filter-chip">가격순</div>
        </div>
        <div className="vehicle-grid">
          {filtered.map(v => (
            <div key={v.id} className="vehicle-card">
              <div className="vehicle-img">{v.emoji}</div>
              <div className="vehicle-body">
                <div className="vehicle-name">{v.name}</div>
                <div className="vehicle-spec">{v.type} · 최대 {v.sleeps}인 · {v.type==='소형'?'가솔린':'디젤'}</div>
                <div style={{display:'flex',alignItems:'center',justifyContent:'space-between'}}>
                  <div className="vehicle-price">{v.price}원<span>/1박</span></div>
                  {v.avail > 1 ? <span className="avail-badge avail-ok">잔여 {v.avail}대</span>
                    : v.avail === 1 ? <span className="avail-badge avail-low">잔여 1대</span>
                    : <span className="avail-badge avail-none">예약 마감</span>}
                </div>
                <div className="vehicle-tags">
                  {v.tags.map(t => <span key={t} className="tag tag-green">{t}</span>)}
                </div>
                <button className="btn btn-primary" style={{width:'100%',marginTop:12,opacity:v.avail===0?0.4:1}} disabled={v.avail===0}>
                  {v.avail===0 ? '예약 마감' : '예약하기'}
                </button>
              </div>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

function ReservationPage() {
  const [optSel, setOptSel] = useState([0]);
  const OPTIONS = [
    { name: '침구 세트', price: '12,000' }, { name: '캠핑 의자 2개', price: '8,000' },
    { name: '바베큐 그릴', price: '15,000' }, { name: 'GPS 네비', price: '10,000' },
  ];
  const toggleOpt = (i) => setOptSel(s => s.includes(i) ? s.filter(x=>x!==i) : [...s,i]);
  const blocked = [1,2,6,7,8,14,15];
  const selected_s = 10, selected_e = 13;
  return (
    <div className="main-wrap">
      <div style={{marginBottom:24}}>
        <div className="section-title">캠프마스터 M 예약</div>
        <div className="section-sub">4인 중형 · 풀옵션 · 1박 145,000원</div>
      </div>
      <div className="res-layout">
        <div className="res-main">
          <div className="res-card">
            <div className="res-card-title"><span className="res-card-num">1</span> 날짜 선택</div>
            <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:14}}>
              <span style={{fontSize:'14px',fontWeight:700,color:'#065F46'}}>2026년 4월</span>
              <div style={{display:'flex',gap:6}}>
                <button className="btn btn-outline" style={{padding:'4px 10px',fontSize:'12px'}}>‹</button>
                <button className="btn btn-outline" style={{padding:'4px 10px',fontSize:'12px'}}>›</button>
              </div>
            </div>
            <div className="mini-cal">
              {DAYS_KO.map(d => <div key={d} className="mini-day-hdr">{d}</div>)}
              {Array.from({length:3}).map((_,i) => <div key={`e${i}`} className="mini-day empty" />)}
              {Array.from({length:30}).map((_,i) => {
                const d = i+1;
                const cls = blocked.includes(d) ? 'mini-day unavail'
                  : d === selected_s ? 'mini-day selected-start'
                  : d === selected_e ? 'mini-day selected-end'
                  : (d > selected_s && d < selected_e) ? 'mini-day in-range'
                  : 'mini-day available';
                return <div key={d} className={cls}>{d}</div>;
              })}
            </div>
            <div style={{display:'flex',gap:20,marginTop:12,padding:'10px 14px',background:'#F0FDF4',borderRadius:'8px',fontSize:'12px'}}>
              <div><span style={{color:'#6B7280'}}>출발 </span><strong>4월 10일 (금)</strong></div>
              <div>→</div>
              <div><span style={{color:'#6B7280'}}>반납 </span><strong>4월 13일 (월)</strong></div>
              <div style={{marginLeft:'auto'}}><span className="badge badge-green">2박3일</span></div>
            </div>
          </div>
          <div className="res-card">
            <div className="res-card-title"><span className="res-card-num">2</span> 추가 옵션 선택</div>
            <div className="option-grid">
              {OPTIONS.map((o,i) => (
                <div key={i} className={`option-item ${optSel.includes(i)?'selected':''}`} onClick={() => toggleOpt(i)}>
                  <div className="option-name">{optSel.includes(i)?'✓ ':''}{o.name}</div>
                  <div className="option-price">+{o.price}원/박</div>
                </div>
