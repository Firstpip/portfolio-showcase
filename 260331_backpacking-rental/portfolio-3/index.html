<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>아웃도어 장비 렌탈 통합 플랫폼 — 구현 데모</title>
<link rel="preconnect" href="https://cdn.jsdelivr.net">
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" rel="stylesheet">
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://unpkg.com/prop-types@15/prop-types.min.js"></script>
<script src="https://unpkg.com/recharts@2.10.3/umd/Recharts.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Pretendard',sans-serif;background:#FFFBEB;color:#1C1917;min-height:100vh;display:flex;}
/* Bright sidebar */
.sidebar{width:240px;min-height:100vh;background:#fff;border-right:2px solid #FDE68A;display:flex;flex-direction:column;position:fixed;left:0;top:0;bottom:0;z-index:100;}
.sidebar-logo{padding:22px 18px;border-bottom:2px solid #FDE68A;}
.logo-icon{font-size:28px;margin-bottom:4px;}
.logo-brand{font-size:16px;font-weight:900;color:#92400E;}
.logo-sub{font-size:10px;color:#D97706;font-weight:600;margin-top:2px;}
.sidebar-nav{padding:12px 0;flex:1;}
.nav-section{padding:10px 18px 4px;font-size:10px;font-weight:700;color:#D97706;letter-spacing:0.08em;text-transform:uppercase;}
.nav-item{display:flex;align-items:center;gap:10px;padding:11px 18px;cursor:pointer;transition:all 0.15s;color:#92400E;font-size:13.5px;font-weight:600;border-radius:0;margin:1px 10px;border-radius:10px;}
.nav-item:hover{background:#FEF3C7;color:#92400E;}
.nav-item.active{background:linear-gradient(135deg,#D97706,#B45309);color:#fff;box-shadow:0 4px 12px rgba(217,119,6,0.3);}
.nav-item .nav-icon{font-size:16px;flex-shrink:0;}
.sidebar-bottom{padding:14px 16px;border-top:2px solid #FDE68A;}
.user-card{background:linear-gradient(135deg,#FFFBEB,#FEF3C7);border-radius:12px;padding:12px;border:1px solid #FDE68A;}
.user-name{font-size:13px;font-weight:700;color:#92400E;}
.user-badge{font-size:10px;color:#D97706;font-weight:600;margin-top:2px;}
.main{margin-left:240px;min-height:100vh;display:flex;flex-direction:column;flex:1;}
.topbar{background:#fff;border-bottom:2px solid #FDE68A;padding:0 28px;height:58px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;}
.topbar-title{font-size:17px;font-weight:800;color:#92400E;display:flex;align-items:center;gap:8px;}
.topbar-right{display:flex;align-items:center;gap:10px;}
.content{padding:24px 28px;flex:1;}
/* Buttons */
.btn{padding:8px 16px;border-radius:10px;font-size:13px;font-weight:700;cursor:pointer;border:none;transition:all 0.15s;font-family:'Pretendard',sans-serif;}
.btn-primary{background:linear-gradient(135deg,#D97706,#B45309);color:#fff;box-shadow:0 2px 8px rgba(217,119,6,0.3);}
.btn-primary:hover{background:linear-gradient(135deg,#B45309,#92400E);}
.btn-outline{background:#fff;color:#92400E;border:2px solid #FDE68A;}
.btn-outline:hover{background:#FEF3C7;border-color:#D97706;}
.btn-accent{background:#0EA5E9;color:#fff;}
.btn-accent:hover{background:#0284C7;}
.btn-sm{padding:5px 12px;font-size:11px;}
/* Badges */
.badge{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:700;}
.badge-amber{background:#FEF3C7;color:#92400E;}
.badge-green{background:#DCFCE7;color:#15803D;}
.badge-blue{background:#DBEAFE;color:#1D4ED8;}
.badge-cyan{background:#CFFAFE;color:#0E7490;}
.badge-red{background:#FEE2E2;color:#B91C1C;}
.badge-gray{background:#F3F4F6;color:#374151;}
.badge-orange{background:#FED7AA;color:#C2410C;}
/* Page structure */
.page-header{margin-bottom:22px;display:flex;align-items:flex-start;justify-content:space-between;}
.page-title{font-size:20px;font-weight:900;color:#92400E;}
.page-sub{font-size:12px;color:#B45309;margin-top:4px;font-weight:500;}
/* Category explore */
.cat-tabs{display:flex;gap:6px;margin-bottom:20px;}
.cat-tab{display:flex;align-items:center;gap:8px;padding:10px 18px;border-radius:12px;cursor:pointer;font-size:13px;font-weight:700;border:2px solid #FDE68A;background:#fff;color:#92400E;transition:all 0.15s;}
.cat-tab.active{background:linear-gradient(135deg,#D97706,#B45309);color:#fff;border-color:transparent;box-shadow:0 4px 12px rgba(217,119,6,0.3);}
.cat-tab:hover:not(.active){background:#FEF3C7;}
.equipment-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;}
.eq-card{background:#fff;border-radius:14px;padding:18px;border:2px solid #FDE68A;transition:all 0.2s;cursor:pointer;position:relative;}
.eq-card:hover{border-color:#D97706;transform:translateY(-2px);box-shadow:0 6px 20px rgba(217,119,6,0.15);}
.eq-emoji{font-size:32px;margin-bottom:10px;}
.eq-name{font-size:14px;font-weight:800;color:#1C1917;margin-bottom:4px;}
.eq-spec{font-size:11px;color:#92400E;margin-bottom:8px;}
.eq-avail{display:flex;align-items:center;justify-content:space-between;}
.avail-bar{flex:1;height:4px;border-radius:2px;background:#FEE3B0;margin-right:8px;overflow:hidden;}
.avail-fill{height:100%;border-radius:2px;background:#D97706;}
.avail-txt{font-size:10px;font-weight:700;color:#D97706;}
.compare-btn{position:absolute;top:12px;right:12px;background:#FEF3C7;border:none;border-radius:6px;padding:3px 7px;font-size:10px;font-weight:700;color:#B45309;cursor:pointer;}
/* Place recommend */
.place-layout{display:grid;grid-template-columns:1fr 280px;gap:20px;}
.places-list{display:flex;flex-direction:column;gap:14px;}
.place-card{background:#fff;border-radius:14px;padding:18px;border:2px solid #FDE68A;display:flex;gap:16px;cursor:pointer;transition:all 0.15s;}
.place-card:hover{border-color:#D97706;box-shadow:0 4px 16px rgba(217,119,6,0.12);}
.place-img{width:80px;height:80px;border-radius:10px;background:linear-gradient(135deg,#D97706,#92400E);display:flex;align-items:center;justify-content:center;font-size:32px;flex-shrink:0;}
.place-info{flex:1;}
.place-name{font-size:15px;font-weight:800;color:#1C1917;margin-bottom:4px;}
.place-loc{font-size:12px;color:#92400E;margin-bottom:6px;}
.place-tags{display:flex;gap:5px;flex-wrap:wrap;}
.map-preview{background:linear-gradient(135deg,#FEF3C7,#FDE68A);border-radius:14px;padding:16px;border:2px solid #FDE68A;display:flex;align-items:center;justify-content:center;min-height:200px;font-size:14px;font-weight:700;color:#92400E;text-align:center;flex-direction:column;gap:10px;}
.map-pin{font-size:32px;}
/* Checklist */
.cl-layout{display:grid;grid-template-columns:1fr 240px;gap:20px;}
.cl-tabs{display:flex;gap:4px;margin-bottom:16px;background:#FEF3C7;padding:4px;border-radius:10px;width:fit-content;}
.cl-tab{padding:7px 16px;border-radius:7px;font-size:12px;font-weight:700;cursor:pointer;color:#B45309;transition:all 0.15s;}
.cl-tab.active{background:#fff;color:#92400E;box-shadow:0 1px 4px rgba(0,0,0,0.1);}
.cl-item{display:flex;align-items:center;gap:12px;padding:12px 14px;border-radius:10px;background:#fff;border:1.5px solid #FDE68A;margin-bottom:8px;cursor:pointer;transition:all 0.15s;}
.cl-item:hover{border-color:#D97706;}
.cl-item.done{opacity:0.6;}
.cl-check{width:20px;height:20px;border-radius:6px;border:2px solid #D97706;display:flex;align-items:center;justify-content:center;flex-shrink:0;background:#fff;}
.cl-check.checked{background:#D97706;border-color:#D97706;color:#fff;font-size:12px;}
.cl-name{font-size:13px;font-weight:700;color:#1C1917;}
.cl-source{font-size:11px;color:#B45309;}
.cl-drag{color:#D1D5DB;font-size:16px;cursor:grab;margin-left:auto;}
.template-card{background:#fff;border-radius:12px;padding:14px;border:2px solid #FDE68A;margin-bottom:10px;cursor:pointer;transition:all 0.15s;}
.template-card:hover{border-color:#D97706;background:#FFFBEB;}
.template-name{font-size:13px;font-weight:800;color:#92400E;}
.template-items{font-size:11px;color:#B45309;margin-top:4px;}
/* Package */
.pkg-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:20px;}
.pkg-card{background:#fff;border-radius:14px;padding:18px;border:2px solid #FDE68A;cursor:pointer;transition:all 0.2s;}
.pkg-card:hover{border-color:#D97706;box-shadow:0 6px 20px rgba(217,119,6,0.12);}
.pkg-card.featured{border-color:#D97706;background:linear-gradient(135deg,#FFFBEB,#FEF3C7);}
.pkg-emoji{font-size:28px;margin-bottom:10px;}
.pkg-name{font-size:15px;font-weight:800;color:#1C1917;margin-bottom:6px;}
.pkg-items{font-size:12px;color:#92400E;margin-bottom:10px;line-height:1.5;}
.pkg-price{font-size:18px;font-weight:900;color:#D97706;}
.pkg-original{font-size:12px;color:#9CA3AF;text-decoration:line-through;margin-left:6px;}
.pkg-discount{font-size:11px;font-weight:700;color:#DC2626;background:#FEE2E2;padding:2px 7px;border-radius:6px;margin-left:4px;}
/* Rental status */
.status-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:20px;}
.status-card{background:#fff;border-radius:14px;padding:18px;border:2px solid #FDE68A;}
.status-label{font-size:12px;color:#92400E;font-weight:600;margin-bottom:6px;}
.status-value{font-size:24px;font-weight:900;color:#D97706;}
.status-sub{font-size:11px;color:#B45309;margin-top:4px;}
.heatmap-wrap{background:#fff;border-radius:14px;padding:20px;border:2px solid #FDE68A;margin-bottom:16px;}
.hm-title{font-size:14px;font-weight:800;color:#92400E;margin-bottom:12px;}
.hm-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;}
.hm-label{font-size:10px;color:#B45309;font-weight:600;text-align:center;padding:4px 0;}
.hm-cell{aspect-ratio:1;border-radius:6px;cursor:pointer;position:relative;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;}
.hm-cell:hover::after{content:attr(data-tip);position:absolute;top:-28px;left:50%;transform:translateX(-50%);background:#1C1917;color:#fff;padding:3px 7px;border-radius:4px;font-size:10px;white-space:nowrap;z-index:5;}
/* Review */
.review-list{display:flex;flex-direction:column;gap:14px;}
.review-card{background:#fff;border-radius:14px;padding:20px;border:2px solid #FDE68A;}
.review-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:12px;}
.reviewer{display:flex;gap:10px;align-items:center;}
.reviewer-avatar{width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,#D97706,#92400E);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:#fff;flex-shrink:0;}
.reviewer-name{font-size:13px;font-weight:700;color:#1C1917;}
.reviewer-meta{font-size:11px;color:#B45309;margin-top:2px;}
.stars{color:#F59E0B;font-size:14px;letter-spacing:1px;}
.review-text{font-size:13px;color:#374151;line-height:1.6;margin-bottom:10px;}
.score-row{display:flex;gap:12px;}
.score-item{text-align:center;}
.score-label{font-size:10px;color:#B45309;font-weight:600;}
.score-val{font-size:13px;font-weight:800;color:#D97706;}
.admin-reply{background:#FEF3C7;border-radius:10px;padding:12px;margin-top:10px;border-left:3px solid #D97706;}
.reply-label{font-size:10px;font-weight:700;color:#92400E;margin-bottom:4px;}
.reply-text{font-size:12px;color:#78350F;}
table{width:100%;border-collapse:collapse;}
th{padding:9px 14px;text-align:left;font-size:11px;font-weight:700;color:#92400E;background:#FEF3C7;border-bottom:1px solid #FDE68A;text-transform:uppercase;letter-spacing:0.04em;}
td{padding:11px 14px;font-size:13px;color:#374151;border-bottom:1px solid #FEF3C7;}
tr:last-child td{border-bottom:none;}
tr:hover td{background:#FFFBEB;}
::-webkit-scrollbar{width:4px;height:4px;}
::-webkit-scrollbar-track{background:#FEF3C7;}
::-webkit-scrollbar-thumb{background:#FDE68A;border-radius:4px;}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState } = React;
const { LineChart, Line, XAxis, YAxis, CartesianGrid, Tooltip, ResponsiveContainer, BarChart, Bar, Treemap } = Recharts;

const NAV_ITEMS = [
  { id: 'category', label: '카테고리 탐색', icon: '🏔' },
  { id: 'place', label: '장소 추천', icon: '📍' },
  { id: 'checklist', label: '체크리스트', icon: '✅' },
  { id: 'package', label: '패키지 구성', icon: '📦' },
  { id: 'status', label: '렌탈 현황', icon: '📊' },
  { id: 'review', label: '리뷰·평점', icon: '⭐' },
];

const PAGE_ICONS = { category:'🏔', place:'📍', checklist:'✅', package:'📦', status:'📊', review:'⭐' };

function CategoryPage() {
  const [catTab, setCatTab] = useState('등산');
  const CATS = ['등산','캠핑','수상스포츠'];
  const EQUIP = {
    '등산': [
      { emoji:'🎒', name:'등산 배낭 65L', spec:'성인용 · 알파인', avail:70 },
      { emoji:'⛺', name:'1인 텐트', spec:'비박용 · 초경량', avail:50 },
      { emoji:'🥾', name:'등산화 (M)', spec:'미들컷 · 방수', avail:30 },
      { emoji:'🧣', name:'고어텍스 재킷', spec:'레이어3 · 방수방풍', avail:85 },
      { emoji:'🔦', name:'헤드랜턴', spec:'LED 300루멘', avail:90 },
      { emoji:'🧊', name:'보온 물통', spec:'500ml 스테인리스', avail:95 },
      { emoji:'🗺', name:'등산 스틱 (쌍)', spec:'카본 · 조절가능', avail:60 },
      { emoji:'🩹', name:'응급 구급함', spec:'기본형 18종', avail:100 },
    ],
    '캠핑': [
      { emoji:'⛺', name:'4인 캠핑 텐트', spec:'돔형 · 2룸', avail:40 },
      { emoji:'🛏', name:'에어 매트리스', spec:'더블 · 자충식', avail:65 },
      { emoji:'🔥', name:'캠핑 버너', spec:'가스 · 풍방형', avail:80 },
      { emoji:'🪑', name:'캠핑 의자 4개', spec:'로우타입 · 폴딩', avail:55 },
      { emoji:'🏮', name:'LED 랜턴', spec:'충전식 · 디밍', avail:75 },
      { emoji:'🍳', name:'코펠 세트', spec:'알루미늄 4종', avail:70 },
      { emoji:'🧳', name:'쿨러 박스 50L', spec:'아이스 유지 48h', avail:35 },
      { emoji:'🌡', name:'침낭 -5°C', spec:'다운 700FP', avail:60 },
    ],
    '수상스포츠': [
      { emoji:'🏄', name:'서프보드 7ft', spec:'소프트 · 초보용', avail:50 },
      { emoji:'🚣', name:'카약 (1인)', spec:'시팅온탑 · 안정형', avail:40 },
      { emoji:'🏊', name:'습식 슈트 3mm', spec:'M/L/XL 선택', avail:70 },
      { emoji:'🤿', name:'스노클 세트', spec:'마스크+핀+튜브', avail:85 },
      { emoji:'💪', name:'구명조끼', spec:'ISO 인증 · 성인', avail:100 },
      { emoji:'🎣', name:'스탠드업 패들', spec:'조절가능 170~215', avail:60 },
    ],
  };
  const items = EQUIP[catTab] || [];
  return (
    <div>
      <div className="page-header">
        <div>
          <div className="page-title">카테고리 탐색</div>
          <div className="page-sub">등산 · 캠핑 · 수상스포츠 · 계층형 재고 통합 관리</div>
        </div>
        <div style={{display:'flex',gap:8}}>
          <input style={{padding:'8px 14px',borderRadius:'10px',border:'2px solid #FDE68A',fontSize:'13px',fontFamily:'Pretendard',outline:'none',background:'#fff'}} placeholder="날짜 입력 시 가용 수 실시간 업데이트" defaultValue="2026-04-10" />
          <button className="btn btn-primary">조회</button>
        </div>
      </div>
      <div className="cat-tabs">
        {CATS.map(c => (
          <div key={c} className={`cat-tab ${catTab===c?'active':''}`} onClick={() => setCatTab(c)}>
            <span>{c==='등산'?'🏔':c==='캠핑'?'⛺':'🏄'}</span>{c}
            <span className="badge badge-amber" style={{marginLeft:4,fontSize:'10px'}}>{EQUIP[c]?.length}종</span>
          </div>
        ))}
      </div>
      <div className="equipment-grid">
        {items.map((e,i) => (
          <div key={i} className="eq-card">
            <button className="compare-btn">비교+</button>
            <div className="eq-emoji">{e.emoji}</div>
            <div className="eq-name">{e.name}</div>
            <div className="eq-spec">{e.spec}</div>
            <div className="eq-avail">
              <div className="avail-bar"><div className="avail-fill" style={{width:`${e.avail}%`}} /></div>
              <div className="avail-txt">{e.avail}%</div>
            </div>
            <button className="btn btn-primary" style={{width:'100%',marginTop:10,padding:'7px',fontSize:'12px'}}>
              예약 담기
            </button>
          </div>
        ))}
      </div>
    </div>
  );
}

function PlacePage() {
  const PLACES = [
    { emoji:'🏔', name:'설악산 대청봉 코스', loc:'강원 속초시', diff:'어려움', km:'16.2km', season:'봄·가을 최적', tags:['등산','침낭필수','야영가능'] },
    { emoji:'🌲', name:'덕유산 향적봉 트레일', loc:'경남 거창군', diff:'보통', km:'9.5km', season:'사계절', tags:['등산','초보가능','설경명소'] },
    { emoji:'⛺', name:'봉평 메밀꽃 캠핑장', loc:'강원 평창군', diff:'쉬움', km:'5km 내', season:'봄·여름 최적', tags:['캠핑','가족추천','반려동물가능'] },
    { emoji:'🏄', name:'제주 중문 해수욕장', loc:'제주 서귀포시', diff:'보통', km:'수상', season:'여름 최적', tags:['수상스포츠','서핑','스노클링'] },
    { emoji:'🌊', name:'강릉 경포 해변', loc:'강원 강릉시', diff:'쉬움', km:'수상', season:'여름', tags:['수상스포츠','카약','가족'] },
  ];
  return (
    <div>
      <div className="page-header">
        <div>
          <div className="page-title">장소 추천</div>
          <div className="page-sub">장비 카테고리 기반 맞춤 장소 추천 · Kakao Maps 연동</div>
        </div>
        <div style={{display:'flex',gap:8}}>
          <div className="btn btn-outline">난이도 ▾</div>
          <div className="btn btn-outline">거리 ▾</div>
          <div className="btn btn-outline">계절 ▾</div>
        </div>
      </div>
      <div className="place-layout">
        <div className="places-list">
          {PLACES.map((p,i) => (
            <div key={i} className="place-card">
              <div className="place-img">{p.emoji}</div>
              <div className="place-info">
                <div className="place-name">{p.name}</div>
                <div className="place-loc">📍 {p.loc}</div>
                <div style={{display:'flex',gap:10,marginBottom:8,fontSize:'12px',color:'#92400E'}}>
                  <span>난이도: <strong>{p.diff}</strong></span>
                  <span>거리: <strong>{p.km}</strong></span>
                  <span>계절: <strong>{p.season}</strong></span>
                </div>
                <div className="place-tags">
                  {p.tags.map(t => <span key={t} className="badge badge-amber">{t}</span>)}
                </div>

  const STATS = [{label:'전체 평점',val:'4.8'},{label:'장비 상태',val:'4.7'},{label:'편의성',val:'4.9'},{label:'패킹',val:'4.8'}];
  return (
    <div>
      <div className="page-header">
        <div>
          <div className="page-title">리뷰·평점</div>
          <div className="page-sub">이용 완료 이벤트 기반 자동 리뷰 요청 · 항목별 평점</div>
        </div>
        <div style={{display:'flex',gap:8}}>
          {['전체','5⭐','4⭐','3⭐이하','사진리뷰'].map(f => (
            <button key={f} className="btn btn-outline btn-sm">{f}</button>
          ))}
        </div>
      </div>
      <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:14,marginBottom:20}}>
        {STATS.map(s => (
          <div key={s.label} style={{background:'#fff',borderRadius:'14px',padding:'16px',border:'2px solid #FDE68A',textAlign:'center'}}>
            <div style={{fontSize:'28px',fontWeight:900,color:'#D97706'}}>{s.val}</div>
            <div style={{fontSize:'11px',color:'#92400E',fontWeight:600,marginTop:4}}>{s.label}</div>
            <div style={{color:'#F59E0B',fontSize:'13px',marginTop:4}}>{'⭐'.repeat(Math.floor(parseFloat(s.val)))}</div>
          </div>
        ))}
      </div>
      <div className="review-list">
        {REVIEWS.map((r,i) => (
          <div key={i} className="review-card">
            <div className="review-header">
              <div className="reviewer">
                <div className="reviewer-avatar">{r.avatar}</div>
                <div>
                  <div className="reviewer-name">{r.name}</div>
                  <div className="reviewer-meta">{r.equipment} · {r.date}</div>
                </div>
              </div>
              <div>
                <div className="stars">{'⭐'.repeat(r.stars)}</div>
              </div>
            </div>
            <div className="review-text">{r.text}</div>
            <div className="score-row">
              {Object.entries(r.scores).map(([k,v]) => (
                <div key={k} className="score-item" style={{background:'#FEF3C7',borderRadius:'8px',padding:'6px 12px'}}>
                  <div className="score-label">{k}</div>
                  <div className="score-val">{v}</div>
                </div>
              ))}
            </div>
            {r.reply && (
              <div className="admin-reply">
                <div className="reply-label">🎒 아웃도어렌탈 운영팀 답변</div>
                <div className="reply-text">{r.reply}</div>
              </div>
            )}
            {!r.reply && (
              <button className="btn btn-outline btn-sm" style={{marginTop:10}}>답글 작성</button>
            )}
          </div>
        ))}
      </div>
    </div>
  );
}

const PAGES = { category: CategoryPage, place: PlacePage, checklist: ChecklistPage, package: PackagePage, status: RentalStatusPage, review: ReviewPage };

function App() {
  const [page, setPage] = useState('category');
  const PageComp = PAGES[page] || CategoryPage;
  const currentNav = NAV_ITEMS.find(n => n.id === page);
  return (
    <React.Fragment>
      <div className="sidebar">
        <div className="sidebar-logo">
          <div className="logo-icon">🏕</div>
          <div className="logo-brand">아웃도어렌탈</div>
          <div className="logo-sub">통합 아웃도어 장비 플랫폼</div>
        </div>
        <nav className="sidebar-nav">
          <div className="nav-section">플랫폼 기능</div>
          {NAV_ITEMS.map(item => (
            <div key={item.id} className={`nav-item ${page===item.id?'active':''}`} onClick={() => setPage(item.id)}>
              <span className="nav-icon">{item.icon}</span>
              <span>{item.label}</span>
            </div>
          ))}
        </nav>
        <div className="sidebar-bottom">
          <div className="user-card">
            <div className="user-name">🧗 김등산 회원</div>
            <div className="user-badge">레벨 4 · 렌탈 12회</div>
          </div>
        </div>
      </div>
      <div className="main">
        <div className="topbar">
          <div className="topbar-title">
            <span>{currentNav?.icon}</span>
            <span>{currentNav?.label}</span>
          </div>
          <div className="topbar-right">
            <span className="badge badge-amber">📅 4/10~13 예약 진행중</span>
            <button className="btn btn-outline">🔔</button>
          </div>
        </div>
        <div className="content">
          <PageComp />
        </div>
      </div>
    </React.Fragment>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
