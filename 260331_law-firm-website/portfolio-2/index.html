<style>

    --teal-light: #4A9D9E;
    --amber: #F6AD55;

    --green: #38A169;
    --bg: #F0FFF4;
    --bg2: #E6FFFA;
    --surface: #FFFFFF;

  /* Topnav */
  .topnav { height: var(--topnav-h); background: var(--surface); border-bottom: 1px solid var(--border); display: flex; align-items: center; padding: 0 32px; gap: 0; position: sticky; top: 0; z-index: 100; box-shadow: 0 1px 8px rgba(0,0,0,0.05); }

  .logo-name { font-size: 16px; font-weight: 800; color: var(--teal-dark); letter-spacing: -0.5px; }
  .logo-tag { font-size: 10px; color: var(--text-3); }

  .nav-right { display: flex; align-items: center; gap: 10px; margin-left: auto; }

  .nav-user:hover { background: var(--bg); }
  .user-avatar { width: 32px; height: 32px; border-radius: 50%; background: var(--teal); display: flex; align-items: center; justify-content: center; color: #fff; font-size: 13px; font-weight: 700; }
  .nav-cta { padding: 8px 18px; background: var(--teal); color: #fff; border-radius: 8px; font-size: 13px; font-weight: 700; cursor: pointer; border: none; transition: background 0.15s; }

  /* Hero banner */
  .hero { height: var(--hero-h); display: flex; align-items: center; padding: 0 32px; position: relative; overflow: hidden; }
  .hero-bg { position: absolute; inset: 0; z-index: 0; }
  .hero-content { position: relative; z-index: 1; max-width: 600px; }
  .hero-eyebrow { font-size: 12px; font-weight: 700; color: rgba(255,255,255,0.8); letter-spacing: 1px; text-transform: uppercase; margin-bottom: 8px; }
  .hero-title { font-size: 30px; font-weight: 800; color: #fff; line-height: 1.2; letter-spacing: -0.8px; margin-bottom: 12px; }
  .hero-sub { font-size: 14px; color: rgba(255,255,255,0.85); line-height: 1.6; margin-bottom: 20px; }
  .hero-btn { display: inline-flex; align-items: center; gap: 8px; padding: 11px 22px; background: #fff; color: var(--teal-dark); border-radius: 8px; font-size: 14px; font-weight: 700; cursor: pointer; border: none; transition: transform 0.15s; }
  .hero-btn:hover { transform: translateY(-1px); }
  .hero-stats { position: absolute; right: 32px; top: 50%; transform: translateY(-50%); z-index: 1; display: flex; gap: 16px; }
  .hero-stat { background: rgba(255,255,255,0.15); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.25); border-radius: 12px; padding: 16px 20px; text-align: center; }
  .hero-stat-val { font-size: 24px; font-weight: 800; color: #fff; }

  /* Page content */

  .section-sub { font-size: 13px; color: var(--text-3); margin-bottom: 20px; }

  .card { background: var(--surface); border-radius: 14px; border: 1.5px solid var(--border); box-shadow: 0 2px 8px rgba(0,0,0,0.04); overflow: hidden; }
  .card-header { display: flex; align-items: center; justify-content: space-between; padding: 18px 22px 14px; border-bottom: 1px solid var(--border); }
  .card-title { font-size: 14px; font-weight: 700; color: var(--text); }
  .card-action { font-size: 12px; color: var(--teal); cursor: pointer; font-weight: 600; }
  .card-body { padding: 20px 22px; }

  /* Counselor cards */
  .counselor-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 16px; margin-bottom: 28px; }
  .counselor-card { background: var(--surface); border-radius: 14px; border: 1.5px solid var(--border); padding: 20px; transition: all 0.15s; cursor: pointer; }

  .c-btn { width: 100%; padding: 9px; border-radius: 8px; border: none; font-size: 13px; font-weight: 700; cursor: pointer; transition: all 0.15s; }
  .c-btn.primary { background: var(--teal); color: #fff; }

  .c-btn.outline { background: transparent; border: 1.5px solid var(--border); color: var(--text-2); }

  .cat-filter { display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; }
  .cat-chip { padding: 8px 16px; border-radius: 20px; border: 1.5px solid var(--border); font-size: 13px; font-weight: 600; cursor: pointer; transition: all 0.15s; color: var(--text-2); background: var(--surface); white-space: nowrap; }
  .cat-chip:hover { border-color: var(--teal-light); color: var(--teal); }
  .cat-chip.active { background: var(--teal); border-color: var(--teal); color: #fff; }

  /* Booking calendar */
  .booking-container { display: grid; grid-template-columns: 1fr 320px; gap: 20px; }
  .slot-calendar { }
  .week-header { display: grid; grid-template-columns: 60px repeat(5, 1fr); gap: 4px; margin-bottom: 4px; }
  .week-day-label { text-align: center; font-size: 12px; font-weight: 700; color: var(--text-3); padding: 6px; }
  .week-day-label.today { color: var(--teal); }
  .slot-row { display: grid; grid-template-columns: 60px repeat(5, 1fr); gap: 4px; margin-bottom: 4px; }
  .slot-time { font-size: 11px; color: var(--text-3); display: flex; align-items: center; justify-content: flex-end; padding-right: 8px; }
  .slot-cell { height: 44px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 600; cursor: pointer; transition: all 0.15s; border: 1.5px solid transparent; }
  .slot-cell.available { background: #E6FFFA; color: var(--teal); border-color: var(--teal-light); }
  .slot-cell.available:hover { background: var(--teal); color: #fff; }
  .slot-cell.booked { background: #F7FAFC; color: #CBD5E0; cursor: not-allowed; }
  .slot-cell.selected { background: var(--teal); color: #fff; border-color: var(--teal-dark); }
  .slot-cell.empty { background: #F7FAFC; border-color: transparent; cursor: default; }

  /* Booking summary */
  .booking-summary { background: var(--surface); border-radius: 14px; border: 1.5px solid var(--border); padding: 22px; }
  .summary-title { font-size: 15px; font-weight: 800; margin-bottom: 16px; }
  .summary-row { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid var(--border); font-size: 13px; }
  .summary-row:last-child { border-bottom: none; }
  .summary-label { color: var(--text-3); }
  .summary-value { font-weight: 700; color: var(--text); }
  .method-btns { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; margin: 12px 0; }
  .method-btn { padding: 8px 4px; border-radius: 8px; border: 1.5px solid var(--border); font-size: 11px; font-weight: 700; cursor: pointer; text-align: center; transition: all 0.15s; color: var(--text-2); }
  .method-btn.selected { border-color: var(--teal); background: #E6FFFA; color: var(--teal); }
  .confirm-btn { width: 100%; padding: 13px; background: var(--teal); color: #fff; border: none; border-radius: 10px; font-size: 14px; font-weight: 800; cursor: pointer; margin-top: 16px; }
  .confirm-btn:hover { background: var(--teal-dark); }

  /* My page */
  .my-header { background: linear-gradient(135deg, var(--teal) 0%, var(--teal-light) 100%); border-radius: 14px; padding: 24px; color: #fff; margin-bottom: 20px; }
  .my-name { font-size: 20px; font-weight: 800; margin-bottom: 4px; }
  .my-sub { font-size: 13px; opacity: 0.8; }
  .my-stats { display: flex; gap: 20px; margin-top: 16px; }
  .my-stat { text-align: center; }
  .my-stat-val { font-size: 22px; font-weight: 800; }
  .my-stat-label { font-size: 11px; opacity: 0.75; margin-top: 2px; }
  .booking-history { }
  .history-item { display: flex; align-items: center; gap: 14px; padding: 16px 22px; border-bottom: 1px solid var(--border); transition: background 0.1s; }
  .history-item:hover { background: #FAFAF8; }
  .history-item:last-child { border-bottom: none; }
  .history-icon { width: 42px; height: 42px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; }
  .history-info { flex: 1; }
  .history-title { font-size: 13px; font-weight: 700; color: var(--text); }
  .history-detail { font-size: 11px; color: var(--text-3); margin-top: 2px; }
  .history-status { font-size: 11px; font-weight: 700; padding: 3px 9px; border-radius: 20px; }
  .hs-upcoming { background: #E6FFFA; color: #2C7A7B; }
  .hs-done { background: #EBF8FF; color: #2B6CB0; }
  .hs-cancelled { background: #FED7D7; color: #C53030; }
  .countdown { font-size: 13px; font-weight: 800; color: var(--amber-dark); }

  /* Counselor admin */
  .admin-layout { display: grid; grid-template-columns: 1fr 340px; gap: 20px; }
  .stat-pills { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 20px; }
  .stat-pill { background: var(--surface); border-radius: 12px; border: 1.5px solid var(--border); padding: 16px 18px; }
  .stat-pill-label { font-size: 11px; color: var(--text-3); margin-bottom: 6px; }
  .stat-pill-val { font-size: 22px; font-weight: 800; color: var(--text); }
  .note-editor { }
  .note-toolbar { display: flex; gap: 4px; padding: 8px 12px; border-bottom: 1px solid var(--border); flex-wrap: wrap; }
  .note-tool-btn { padding: 4px 8px; border-radius: 5px; border: 1px solid var(--border); background: transparent; font-size: 12px; cursor: pointer; color: var(--text-2); }
  .note-tool-btn:hover { background: var(--bg); }
  .note-textarea { width: 100%; padding: 14px 16px; border: none; outline: none; font-size: 13px; color: var(--text); line-height: 1.8; font-family: inherit; resize: vertical; min-height: 160px; }
  .note-footer { display: flex; justify-content: space-between; align-items: center; padding: 8px 16px; border-top: 1px solid var(--border); }
  .visibility-toggle { display: flex; gap: 6px; }
  .vis-btn { padding: 4px 10px; border-radius: 5px; border: 1.5px solid var(--border); font-size: 11px; font-weight: 600; cursor: pointer; }
  .vis-btn.active { background: var(--teal); border-color: var(--teal); color: #fff; }
  .save-note-btn { padding: 6px 14px; background: var(--teal); color: #fff; border: none; border-radius: 6px; font-size: 12px; font-weight: 700; cursor: pointer; }

  /* Table */
  .table-wrap { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; }
  th { font-size: 11px; font-weight: 700; color: var(--text-3); text-transform: uppercase; padding: 10px 14px; background: #F7FAFC; border-bottom: 1px solid var(--border); text-align: left; }
  td { font-size: 13px; padding: 13px 14px; border-bottom: 1px solid var(--border); vertical-align: middle; }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: #F7FAFC; }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 5px; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }
  ::-webkit-scrollbar-track { background: transparent; }

  .page { display: none; }
  .page.active { display: block; }
</style>
</head>

/* ═══════════ BOOKING CALENDAR ═══════════ */
function BookingPage() {
  const [selectedSlot, setSelectedSlot] = useState(null);
  const [selectedMethod, setSelectedMethod] = useState('화상');
  const times = ['10:00', '11:00', '13:00', '14:00', '15:00', '16:00'];
  const days = ['월 3/30', '화 3/31', '수 4/1', '목 4/2', '금 4/3'];
  const available = { '10:00_0': true, '10:00_2': true, '11:00_1': true, '11:00_4': true, '13:00_0': true, '13:00_3': true, '14:00_2': true, '14:00_4': true, '15:00_1': true, '16:00_0': true, '16:00_3': true };
  const booked = { '10:00_1': true, '11:00_3': true, '13:00_2': true, '15:00_4': true };

  return (
    <div className="page-body">
      <div className="section-title">예약 캘린더</div>
      <div className="section-sub">가능한 시간 슬롯을 선택하고 상담 방식을 정해주세요</div>

      {/* Counselor selector */}
      <div className="card" style={{ marginBottom: 20 }}>
        <div className="card-body" style={{ display: 'flex', gap: 16, alignItems: 'center' }}>
          {counselors.slice(0, 3).map((c, i) => (
            <div key={c.id} style={{ display: 'flex', alignItems: 'center', gap: 10, padding: '8px 16px', border: `2px solid ${i === 0 ? '#2C7A7B' : '#E2E8F0'}`, borderRadius: 10, cursor: 'pointer', transition: 'all 0.15s' }}>
              <div style={{ width: 34, height: 34, borderRadius: 10, background: c.bg, color: c.color, display: 'flex', alignItems: 'center', justifyContent: 'center', fontWeight: 800 }}>{c.initials}</div>
              <div>
                <div style={{ fontSize: 13, fontWeight: 700 }}>{c.name}</div>
                <div style={{ fontSize: 11, color: '#718096' }}>{c.tags[0]}</div>
              </div>
            </div>
          ))}
        </div>
      </div>

      <div className="booking-container">
        {/* Slot calendar */}
        <div className="card">
          <div className="card-header"><span className="card-title">📅 2026년 3월 30일 — 4월 3일</span><span className="card-action">← 이전 | 다음 →</span></div>
          <div className="card-body">
            <div className="week-header">
              <div />
              {days.map(d => <div key={d} className="week-day-label" style={{ color: d.includes('3/31') ? '#2C7A7B' : '' }}>{d}</div>)}
            </div>
            {times.map(t => (
              <div key={t} className="slot-row">
                <div className="slot-time">{t}</div>
                {[0,1,2,3,4].map(di => {
                  const key = `${t}_${di}`;
                  const isAvail = available[key];
                  const isBooked = booked[key];
                  const isSel = selectedSlot === key;
                  return (
                    <div key={di}
                      className={`slot-cell ${isSel ? 'selected' : isBooked ? 'booked' : isAvail ? 'available' : 'empty'}`}
                      onClick={() => isAvail && !isBooked && setSelectedSlot(isSel ? null : key)}
                    >
                      {isBooked ? '마감' : isAvail ? (isSel ? '✓' : '가능') : ''}
                    </div>
                  );
                })}
              </div>
            ))}
            <div style={{ display: 'flex', gap: 16, marginTop: 12 }}>
              {[['가능', '#E6FFFA', '#2C7A7B'], ['마감', '#F7FAFC', '#CBD5E0'], ['선택됨', '#2C7A7B', '#fff']].map(([label, bg, color]) => (
                <div key={label} style={{ display: 'flex', alignItems: 'center', gap: 6 }}>
                  <div style={{ width: 20, height: 16, borderRadius: 4, background: bg, border: `1.5px solid ${color}` }} />
                  <span style={{ fontSize: 11, color: '#718096' }}>{label}</span>
                </div>
              ))}
            </div>
          </div>
        </div>

        {/* Booking summary */}
        <div className="booking-summary">
          <div className="summary-title">예약 정보 확인</div>
          <div className="summary-row"><span className="summary-label">상담사</span><span className="summary-value">김소연 상담사</span></div>
          <div className="summary-row"><span className="summary-label">일시</span><span className="summary-value">{selectedSlot ? selectedSlot.split('_')[0] + ' (화 3/31)' : '시간 선택 필요'}</span></div>
          <div className="summary-row"><span className="summary-label">상담 시간</span><span className="summary-value">50분</span></div>
          <div style={{ fontSize: 12, color: '#718096', margin: '12px 0 6px' }}>상담 방식 선택</div>
          <div className="method-btns">
            {['대면', '화상', '전화'].map(m => (
              <div key={m} className={`method-btn ${selectedMethod === m ? 'selected' : ''}`} onClick={() => setSelectedMethod(m)}>
                {m === '대면' ? '🏢' : m === '화상' ? '💻' : '📞'}<br/>{m}
              </div>
            ))}
          </div>
          <div className="summary-row"><span className="summary-label">상담료</span><span className="summary-value" style={{ color: '#C05621' }}>70,000원</span></div>
          <div style={{ fontSize: 11, color: '#718096', marginTop: 8, padding: '8px 12px', background: '#F0FFF4', borderRadius: 6 }}>
            💡 화상 상담 예약 시 Whereby 전용 룸 링크가 자동 발송됩니다.
          </div>
          <button className="confirm-btn" disabled={!selectedSlot} style={{ opacity: selectedSlot ? 1 : 0.5 }}>
            {selectedSlot ? '예약 확정 및 결제하기' : '시간을 선택해주세요'}
          </button>
        </div>
      </div>
    </div>
  );
}

/* ═══════════ APP ROOT ═══════════ */
function App() {
  const [tab, setTab] = useState('main');
  window.__setTab = setTab;

  return (
    <div style={{ minHeight: 'calc(100vh - 64px)', overflow: 'auto' }}>
      {tab === 'main' && <MainPage onBook={() => setTab('booking-calendar')} />}
      {tab === 'booking-calendar' && <BookingPage />}
      {tab === 'my-counseling' && <MyCounselingPage />}
      {tab === 'counselor-admin' && <CounselorAdminPage />}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('app-root')).render(<App />);
</script>

<script>
function setTab(tabId, el) {
  document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
  if (el) el.classList.add('active');
  if (window.__setTab) window.__setTab(tabId);
}
</script>
