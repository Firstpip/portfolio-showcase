<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --purple: #7C3AED;
    --purple-light: #A78BFA;
    --purple-dark: #5B21B6;
    --emerald: #10B981;
    --emerald-dark: #059669;
    --bg: #0F0F1A;
    --bg2: #141420;
    --surface: #1A1A2E;
    --surface2: #212136;
    --border: #2D2D4A;
    --border2: #3A3A5C;
    --text: #F1F0F5;
    --text-2: #A0A0C0;
    --text-3: #6B6B8A;
    --sidebar-w: 240px;
    --topbar-h: 56px;
    --glow-purple: rgba(124,58,237,0.2);
    --glow-emerald: rgba(16,185,129,0.2);
  }
  body { font-family: 'Pretendard', -apple-system, sans-serif; background: var(--bg); color: var(--text); font-size: 14px; line-height: 1.5; display: flex; height: 100vh; overflow: hidden; }

  /* Sidebar */
  .sidebar { width: var(--sidebar-w); background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; flex-shrink: 0; height: 100vh; overflow-y: auto; }
  .logo-area { padding: 20px 16px 16px; border-bottom: 1px solid var(--border); }
  .logo-row { display: flex; align-items: center; gap: 10px; }
  .logo-gem { width: 36px; height: 36px; border-radius: 10px; background: linear-gradient(135deg, var(--purple), var(--purple-light)); display: flex; align-items: center; justify-content: center; font-size: 18px; box-shadow: 0 4px 12px var(--glow-purple); }
  .logo-text { font-size: 14px; font-weight: 800; color: var(--text); letter-spacing: -0.4px; }
  .logo-ver { font-size: 10px; color: var(--text-3); margin-top: 1px; }
  .branch-selector { margin-top: 12px; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 8px 12px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; }
  .branch-name { font-size: 12px; font-weight: 600; color: var(--text-2); }
  .branch-arrow { font-size: 10px; color: var(--text-3); }
  .nav-section { padding: 12px 8px 4px; }
  .nav-section-label { font-size: 9px; font-weight: 700; color: var(--text-3); letter-spacing: 1px; text-transform: uppercase; padding: 0 8px; margin-bottom: 3px; }
  .nav-item { display: flex; align-items: center; gap: 10px; padding: 9px 12px; border-radius: 8px; cursor: pointer; color: var(--text-2); font-size: 13px; font-weight: 500; transition: all 0.15s; margin-bottom: 1px; }
  .nav-item:hover { background: var(--surface2); color: var(--text); }
  .nav-item.active { background: linear-gradient(90deg, rgba(124,58,237,0.2), rgba(124,58,237,0.05)); color: var(--purple-light); font-weight: 700; border-right: 2px solid var(--purple); }
  .nav-icon { font-size: 15px; width: 20px; text-align: center; flex-shrink: 0; }
  .nav-badge { margin-left: auto; background: var(--purple); color: #fff; font-size: 10px; font-weight: 700; padding: 1px 6px; border-radius: 8px; }
  .sidebar-footer { margin-top: auto; padding: 12px 8px; border-top: 1px solid var(--border); }
  .user-row { display: flex; align-items: center; gap: 10px; padding: 8px 12px; border-radius: 8px; cursor: pointer; }
  .user-row:hover { background: var(--surface2); }
  .u-avatar { width: 30px; height: 30px; border-radius: 8px; background: linear-gradient(135deg, var(--purple), var(--emerald)); display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; color: #fff; flex-shrink: 0; }
  .u-name { font-size: 12px; font-weight: 600; color: var(--text); }
  .u-role { font-size: 10px; color: var(--text-3); }

  /* Main */
  .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
  .topbar { height: var(--topbar-h); background: var(--surface); border-bottom: 1px solid var(--border); display: flex; align-items: center; padding: 0 24px; gap: 12px; flex-shrink: 0; }
  .topbar-title { font-size: 16px; font-weight: 800; color: var(--text); letter-spacing: -0.4px; }
  .topbar-breadcrumb { font-size: 12px; color: var(--text-3); }
  .topbar-right { margin-left: auto; display: flex; align-items: center; gap: 10px; }
  .tb-btn { display: flex; align-items: center; gap: 6px; padding: 6px 14px; border-radius: 7px; font-size: 12px; font-weight: 700; cursor: pointer; border: none; transition: all 0.15s; }
  .tb-btn.primary { background: var(--purple); color: #fff; }
  .tb-btn.primary:hover { background: var(--purple-dark); }
  .tb-btn.ghost { background: var(--surface2); color: var(--text-2); border: 1px solid var(--border); }
  .tb-btn.ghost:hover { color: var(--text); border-color: var(--border2); }
  .notif-orb { width: 32px; height: 32px; border-radius: 8px; background: var(--surface2); border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; cursor: pointer; position: relative; font-size: 14px; }
  .notif-pip { position: absolute; top: 5px; right: 5px; width: 7px; height: 7px; border-radius: 50%; background: var(--purple); border: 1.5px solid var(--surface); }

  /* Content */
  .content { flex: 1; overflow-y: auto; padding: 24px; }

  /* Stat cards */
  .stats-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; margin-bottom: 22px; }
  .stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 18px 20px; position: relative; overflow: hidden; }
  .stat-card .glow { position: absolute; top: -20px; right: -20px; width: 80px; height: 80px; border-radius: 50%; filter: blur(30px); opacity: 0.25; }
  .stat-label { font-size: 11px; color: var(--text-3); font-weight: 500; margin-bottom: 8px; }
  .stat-val { font-size: 26px; font-weight: 800; color: var(--text); letter-spacing: -1px; }
  .stat-sub { font-size: 11px; color: var(--text-3); margin-top: 4px; }
  .stat-tag { display: inline-flex; align-items: center; gap: 3px; font-size: 10px; font-weight: 700; padding: 2px 7px; border-radius: 8px; margin-top: 6px; }
  .tag-purple { background: rgba(124,58,237,0.15); color: var(--purple-light); }
  .tag-emerald { background: rgba(16,185,129,0.15); color: var(--emerald); }
  .tag-amber { background: rgba(245,158,11,0.15); color: #FCD34D; }

  /* Card */
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; }
  .card-header { display: flex; align-items: center; justify-content: space-between; padding: 16px 20px 12px; border-bottom: 1px solid var(--border); }
  .card-title { font-size: 13px; font-weight: 700; color: var(--text); }
  .card-action { font-size: 11px; color: var(--purple-light); cursor: pointer; font-weight: 600; }
  .card-body { padding: 18px 20px; }

  /* Grid layouts */
  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 20px; }
  .grid-3-1 { display: grid; grid-template-columns: 1fr 300px; gap: 16px; }

  /* Branch heatmap */
  .branch-list { }
  .branch-row { display: flex; align-items: center; gap: 12px; padding: 12px 20px; border-bottom: 1px solid var(--border); transition: background 0.1s; cursor: pointer; }
  .branch-row:hover { background: var(--surface2); }
  .branch-row:last-child { border-bottom: none; }
  .branch-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  .branch-name-cell { flex: 1; font-size: 13px; font-weight: 600; color: var(--text); }
  .branch-city { font-size: 11px; color: var(--text-3); }
  .branch-bar-wrap { width: 120px; }
  .branch-bar-bg { height: 6px; background: var(--surface2); border-radius: 3px; }
  .branch-bar-fill { height: 6px; border-radius: 3px; transition: width 0.3s; }
  .branch-count { font-size: 12px; font-weight: 700; color: var(--text-2); width: 36px; text-align: right; }

  /* AI matching */
  .ai-input-box { width: 100%; background: var(--surface2); border: 1px solid var(--border2); border-radius: 10px; padding: 14px 16px; font-size: 14px; color: var(--text); outline: none; font-family: inherit; resize: vertical; min-height: 90px; transition: border-color 0.15s; }
  .ai-input-box:focus { border-color: var(--purple); }
  .ai-analyze-btn { display: flex; align-items: center; gap: 8px; padding: 10px 20px; background: linear-gradient(135deg, var(--purple), var(--purple-dark)); color: #fff; border: none; border-radius: 8px; font-size: 13px; font-weight: 700; cursor: pointer; margin-top: 10px; transition: opacity 0.15s; }
  .ai-analyze-btn:hover { opacity: 0.9; }
  .ai-tag-row { display: flex; gap: 6px; flex-wrap: wrap; margin: 12px 0; }
  .ai-tag { font-size: 11px; font-weight: 700; padding: 4px 10px; border-radius: 6px; }
  .ai-tag-main { background: rgba(124,58,237,0.2); color: var(--purple-light); border: 1px solid rgba(124,58,237,0.3); }
  .ai-tag-sub { background: rgba(16,185,129,0.1); color: var(--emerald); }
  .match-card { background: var(--surface2); border: 1px solid var(--border2); border-radius: 10px; padding: 16px; margin-bottom: 10px; transition: border-color 0.15s; cursor: pointer; }
  .match-card:hover { border-color: var(--purple); }
  .match-card.top { border-color: rgba(124,58,237,0.5); background: rgba(124,58,237,0.05); }
  .match-head { display: flex; align-items: center; gap: 12px; margin-bottom: 10px; }
  .match-score-ring { width: 44px; height: 44px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 800; flex-shrink: 0; }
  .match-name { font-size: 14px; font-weight: 800; color: var(--text); }
  .match-branch { font-size: 11px; color: var(--text-3); margin-top: 1px; }
  .match-reason { font-size: 12px; color: var(--text-2); line-height: 1.6; padding: 8px 10px; background: rgba(0,0,0,0.2); border-radius: 6px; }
  .typing-cursor::after { content: '▌'; animation: blink 0.8s infinite; color: var(--purple-light); }
  @keyframes blink { 0%, 100% { opacity: 1 } 50% { opacity: 0 } }

  /* Branch SEO */
  .seo-panel-list { }
  .seo-branch-item { padding: 14px 20px; border-bottom: 1px solid var(--border); cursor: pointer; transition: background 0.1s; }
  .seo-branch-item:hover { background: var(--surface2); }
  .seo-branch-item:last-child { border-bottom: none; }
  .seo-branch-item.selected { background: rgba(124,58,237,0.08); border-left: 3px solid var(--purple); }
  .seo-branch-title { font-size: 13px; font-weight: 700; color: var(--text); }
  .seo-schema-label { font-size: 10px; color: var(--text-3); margin-top: 2px; }
  .schema-status { display: flex; gap: 6px; margin-top: 6px; }
  .schema-chip { font-size: 9px; font-weight: 700; padding: 2px 6px; border-radius: 4px; }
  .sc-ok { background: rgba(16,185,129,0.15); color: var(--emerald); }
  .sc-warn { background: rgba(245,158,11,0.15); color: #FCD34D; }
  .sc-none { background: rgba(107,107,138,0.2); color: var(--text-3); }
  .code-block { background: #080812; border: 1px solid var(--border); border-radius: 8px; padding: 14px 16px; font-family: 'Courier New', monospace; font-size: 11px; color: #A0A0C0; line-height: 1.7; overflow: auto; max-height: 240px; }
  .kw { color: #A78BFA; }
  .str { color: #6EE7B7; }
  .url { color: #93C5FD; }

  /* Branch management */
  .branch-mgmt-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; }
  .branch-mgmt-card { background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; padding: 16px; transition: all 0.15s; cursor: pointer; }
  .branch-mgmt-card:hover { border-color: var(--border2); transform: translateY(-1px); }
  .branch-mgmt-card.active { border-color: var(--purple); background: rgba(124,58,237,0.05); }
  .bmc-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px; }
  .bmc-icon { width: 36px; height: 36px; border-radius: 9px; display: flex; align-items: center; justify-content: center; font-size: 16px; }
  .bmc-status { font-size: 10px; font-weight: 700; padding: 2px 7px; border-radius: 4px; }
  .bmc-active { background: rgba(16,185,129,0.15); color: var(--emerald); }
  .bmc-inactive { background: rgba(107,107,138,0.2); color: var(--text-3); }
  .bmc-name { font-size: 14px; font-weight: 800; color: var(--text); }
  .bmc-city { font-size: 11px; color: var(--text-3); margin-top: 1px; }
  .bmc-stats { display: flex; gap: 12px; margin-top: 12px; }
  .bmc-stat { text-align: center; }
  .bmc-stat-val { font-size: 15px; font-weight: 800; color: var(--text); }
  .bmc-stat-label { font-size: 9px; color: var(--text-3); margin-top: 1px; }
  .rls-badge { display: flex; align-items: center; gap: 4px; margin-top: 10px; font-size: 10px; color: var(--text-3); }
  .rls-icon { width: 14px; height: 14px; border-radius: 3px; background: rgba(16,185,129,0.15); display: flex; align-items: center; justify-content: center; font-size: 8px; }

  /* Table */
  table { width: 100%; border-collapse: collapse; }
  th { font-size: 10px; font-weight: 700; color: var(--text-3); text-transform: uppercase; padding: 10px 14px; background: var(--surface2); border-bottom: 1px solid var(--border); text-align: left; letter-spacing: 0.4px; }
  td { font-size: 13px; color: var(--text-2); padding: 12px 14px; border-bottom: 1px solid var(--border); vertical-align: middle; }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: rgba(255,255,255,0.02); }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 10px; }

  /* Inline tabs */
  .inline-tabs { display: flex; gap: 4px; margin-bottom: 18px; }
  .inline-tab { padding: 6px 14px; border-radius: 6px; font-size: 12px; font-weight: 600; cursor: pointer; color: var(--text-3); transition: all 0.15s; border: 1px solid transparent; }
  .inline-tab:hover { color: var(--text-2); background: var(--surface2); }
  .inline-tab.active { background: var(--surface2); color: var(--purple-light); border-color: rgba(124,58,237,0.3); }
</style>
</head>

/* ═════════ DASHBOARD ═════════ */

  return (
    <div>
      <div className="stats-row">
        {[
          { label: '전체 지점', val: '5', sub: '활성 4 · 준비중 1', tag: '멀티 테넌트', tagType: 'tag-purple' },

/* ═════════ AI MATCHING ═════════ */
function AiMatchingPage() {
  const [query, setQuery] = useState('');
  const [stage, setStage] = useState(0); // 0=idle, 1=analyzing, 2=result
  const [streamText, setStreamText] = useState('');

  const sampleQuery = '2년 전 투자한 부동산 개발 사업에서 시행사가 잠적했습니다. 공사대금 약 3억원을 받지 못한 상황이며 담보 설정도 제대로 안 된 것 같아서 어떻게 해야 할지 모르겠습니다.';

  const handleAnalyze = () => {
    if (!query.trim()) return;
    setStage(1);
    setTimeout(() => {
      setStage(2);
      const reason = '투자 사기 및 공사대금 미지급 사건으로, 민사 소송(손해배상) 및 형사 고소(사기죄) 병행 전략이 필요합니다. 담보 설정 현황 확인 후 가압류 신청을 선행 ';
      let i = 0;
      const timer = setInterval(() => {
        setStreamText(reason.slice(0, i));
        i++;
        if (i > reason.length) clearInterval(timer);
      }, 30);
    }, 1200);
  };

  const matches = [
    { score: 97, name: '박준영', branch: '서울 강남점', specialties: ['민사', '형사', '부동산'], reason: streamText },
    { score: 89, name: '김성훈', branch: '서울 종로점', specialties: ['부동산', '민사'], reason: '부동산 담보 설정 분쟁 및 공사대금 청구 소송 경험 다수 보유. 가압류 선행 전략 전문.' },
    { score: 76, name: '이재원', branch: '부산 서면점', specialties: ['형사', '민사'], reason: '형사 고소 병행 전략을 통한 협박적 포지션 확보 전문.' },
  ];

  return (
    <div>
      <div className="inline-tabs">
        {['매칭 요청', '매칭 이력', '벡터 인덱스 현황'].map((t, i) => (
          <div key={t} className={`inline-tab ${i === 0 ? 'active' : ''}`}>{t}</div>
        ))}
      </div>

      <div className="grid-3-1">
        <div>
          {/* Input */}
          <div className="card" style={{ marginBottom: 16 }}>
            <div className="card-header"><span className="card-title">🔤 의뢰인 고민 입력</span><span style={{ fontSize: 10, color: '#A78BFA', fontWeight: 700 }}>OpenAI text-embedding-3-small</span></div>
            <div className="card-body">
              <textarea className="ai-input-box" placeholder="법률 고민을 자유롭게 입력해주세요..." value={query} onChange={e => setQuery(e.target.value)} rows={4} defaultValue={stage === 0 && !query ? sampleQuery : undefined} />
              {!query && <div style={{ fontSize: 11, color: '#6B6B8A', marginTop: 6 }}>예시: "{sampleQuery.slice(0, 40)}..."</div>}
              <button className="ai-analyze-btn" onClick={() => { setQuery(sampleQuery); setTimeout(handleAnalyze, 100); }}>
                <span>✨</span> AI 분석 및 매칭 실행
              </button>
            </div>
          </div>

          {/* Classification result */}
          {stage >= 1 && (
            <div className="card" style={{ marginBottom: 16 }}>
              <div className="card-header"><span className="card-title">🏷️ 분야 자동 분류</span><span style={{ fontSize: 10, color: stage === 1 ? '#F9C74F' : '#10B981', fontWeight: 700 }}>{stage === 1 ? '분석 중...' : '분류 완료'}</span></div>
              <div className="card-body">
                <div className="ai-tag-row">
                  <span className="ai-tag ai-tag-main">🎯 민사 (95%)</span>
                  <span className="ai-tag ai-tag-main">🚨 형사 (82%)</span>
                  <span className="ai-tag ai-tag-sub">🏘️ 부동산</span>
                  <span className="ai-tag ai-tag-sub">💰 투자분쟁</span>
                </div>
                <div style={{ fontSize: 12, color: '#A0A0C0', lineHeight: 1.7 }}>
                  pgvector IVFFlat 코사인 유사도 검색 완료<br/>
                  상위 3개 변호사 매칭 완료 (Redis 시맨틱 캐시 미적중)
                </div>
              </div>
            </div>
          )}

          {/* Match results */}
          {stage >= 2 && matches.map((m, i) => (
            <div key={i} className={`match-card ${i === 0 ? 'top' : ''}`}>
              {i === 0 && <div style={{ fontSize: 10, fontWeight: 800, color: '#A78BFA', marginBottom: 8 }}>🥇 최적 매칭</div>}
              <div className="match-head">
                <div className="match-score-ring" style={{ background: `rgba(${i === 0 ? '124,58,237' : i === 1 ? '16,185,129' : '107,107,138'},0.15)`, border: `2px solid ${i === 0 ? '#7C3AED' : i === 1 ? '#10B981' : '#6B6B8A'}`, color: i === 0 ? '#A78BFA' : i === 1 ? '#10B981' : '#9CA3AF' }}>{m.score}%</div>
                <div>
                  <div className="match-name">{m.name} 변호사</div>
                  <div className="match-branch">{m.branch} · {m.specialties.join(' / ')}</div>
                </div>
                <button style={{ marginLeft: 'auto', padding: '5px 12px', background: i === 0 ? '#7C3AED' : 'transparent', color: i === 0 ? '#fff' : '#A0A0C0', border: `1px solid ${i === 0 ? '#7C3AED' : '#2D2D4A'}`, borderRadius: 6, fontSize: 11, fontWeight: 700, cursor: 'pointer' }}>예약 연결</button>
              </div>
              <div className={`match-reason ${i === 0 && streamText.length < 60 ? 'typing-cursor' : ''}`}>
                {i === 0 ? (streamText || '분석 중...') : m.reason}
              </div>
            </div>
          ))}
        </div>

        {/* Right: vector stats */}
        <div>
          <div className="card" style={{ marginBottom: 14 }}>
            <div className="card-header"><span className="card-title">🧮 벡터 인덱스 현황</span></div>
            <div className="card-body">
              {[
                { label: '인덱싱된 변호사', val: '26개' },
                { label: '벡터 차원', val: '1,536 (text-embedding-3-small)' },
                { label: '인덱스 타입', val: 'IVFFlat (nlist=32)' },
                { label: '평균 쿼리 시간', val: '~8ms' },
                { label: '시맨틱 캐시 (Redis)', val: '오늘 61% 적중' },
              ].map((r, i) => (
                <div key={i} style={{ display: 'flex', justifyContent: 'space-between', padding: '8px 0', borderBottom: i < 4 ? '1px solid var(--border)' : 'none', fontSize: 12 }}>
                  <span style={{ color: '#6B6B8A' }}>{r.label}</span>
                  <span style={{ fontWeight: 600, color: '#A0A0C0' }}>{r.val}</span>
                </div>
              ))}
            </div>
          </div>
          <div className="card">
            <div className="card-header"><span className="card-title">📋 최근 매칭 이력</span></div>
            <div>
              {[
                { query: '이혼 재산분할 상담', top: '최유진 변호사', score: 94, time: '14:21' },
                { query: '전세사기 법적 대응', top: '김성훈 변호사', score: 91, time: '14:18' },
                { query: '근로계약서 없이 해고', top: '이재원 변호사', score: 88, time: '14:12' },
              ].map((h, i) => (
                <div key={i} style={{ padding: '11px 20px', borderBottom: i < 2 ? '1px solid var(--border)' : 'none' }}>
                  <div style={{ fontSize: 12, fontWeight: 600, color: '#D1D5DB', marginBottom: 3 }}>{h.query}</div>
                  <div style={{ fontSize: 11, color: '#6B6B8A' }}>{h.top} · {h.score}% · {h.time}</div>
                </div>
              ))}
            </div>
          </div>
        </div>
      </div>
    </div>
  );
}

                      <span style={{ fontSize: 12, fontWeight: 600, color: '#D1D5DB' }}>{name}</span>
                    </div>
                  ))}
                </div>
              ))}
            </div>
          </div>
        </div>
      )}

      {activeTab === 'policy' && (
        <div className="card">
          <div className="card-header"><span className="card-title">⚙️ 지점별 운영 정책 (JSON Schema 편집기)</span></div>
          <div className="card-body">
            <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 16 }}>
              <div>
                <div style={{ fontSize: 11, fontWeight: 700, color: '#6B6B8A', marginBottom: 8 }}>JSON Schema 편집</div>
                <div className="code-block" style={{ minHeight: 200 }}>
{`{
  "branch_id": 1,
  "name": "서울 강남점",
  "consultation_fee": {
    "min": 50000,
    "max": 150000,
    "currency": "KRW"
  },
  "operating_hours": {
    "weekday": ["09:00", "18:00"],
    "saturday": ["10:00", "14:00"]
  },
  "max_daily_reservations": 20,
  "version": 4
}`}
                </div>
                <button style={{ marginTop: 10, width: '100%', padding: '9px', background: '#7C3AED', color: '#fff', border: 'none', borderRadius: 7, fontSize: 12, fontWeight: 700, cursor: 'pointer' }}>정책 저장 (버전 이력 기록)</button>
              </div>
              <div>
                <div style={{ fontSize: 11, fontWeight: 700, color: '#6B6B8A', marginBottom: 8 }}>변경 이력</div>
                {[
                  { ver: 'v4', date: '2026-03-31', change: 'max_daily_reservations: 18 → 20' },
                  { ver: 'v3', date: '2026-03-15', change: 'saturday 운영 시간 추가' },
                  { ver: 'v2', date: '2026-02-28', change: 'consultation_fee.max: 120000 → 150000' },
                  { ver: 'v1', date: '2026-01-10', change: '초기 정책 등록' },
                ].map((h, i) => (
                  <div key={i} style={{ display: 'flex', gap: 10, padding: '10px 0', borderBottom: i < 3 ? '1px solid var(--border)' : 'none' }}>
                    <span style={{ fontFamily: 'monospace', fontSize: 11, color: '#A78BFA', width: 24 }}>{h.ver}</span>
                    <div style={{ flex: 1 }}>
                      <div style={{ fontSize: 12, fontWeight: 600, color: '#D1D5DB' }}>{h.change}</div>
                      <div style={{ fontSize: 10, color: '#6B6B8A', marginTop: 1 }}>{h.date}</div>
                    </div>
                    <button style={{ fontSize: 10, padding: '2px 7px', border: '1px solid var(--border)', borderRadius: 4, background: 'transparent', color: '#6B6B8A', cursor: 'pointer' }}>롤백</button>
                  </div>
                ))}
              </div>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

/* ═════════ APP ═════════ */
function App() {
  const [page, setPage] = useState('main');
  window.__setPage3 = setPage;
  return (
    <div>
      {page === 'main' && <DashboardPage />}
      {page === 'ai-matching' && <AiMatchingPage />}
      {page === 'branch-seo' && <BranchSeoPage />}
      {page === 'branch-management' && <BranchManagementPage />}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('app-root')).render(<App />);
</script>

<script>
const pageConfig = {
  main: { title: '통합 대시보드', sub: '전체 5개 지점 · 실시간 현황' },
  'ai-matching': { title: 'AI 상담 매칭', sub: 'pgvector 코사인 유사도 · GPT-4o-mini SSE 스트리밍' },
  'branch-seo': { title: '지점 SEO 관리', sub: 'Schema.org 자동화 · Sitemap · GSC Ping' },
  'branch-management': { title: '지점 관리', sub: 'PostgreSQL RLS 멀티 테넌트 격리' },
};
function setPage(pageId, el) {
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  if (el) el.classList.add('active');
  const c = pageConfig[pageId];
  if (c) {
    document.getElementById('page-title').textContent = c.title;
    document.getElementById('page-sub').textContent = c.sub;
  }
  if (window.__setPage3) window.__setPage3(pageId);
}
</script>
</body>
</html>
