const Btn = ({children, variant='primary', size='md', onClick, style={}}) => {
  const [hover, setHover] = useState(false);
  const base = {
    display:'inline-flex', alignItems:'center', gap:6, border:'none', cursor:'pointer',
    fontFamily:'Pretendard', fontWeight:600, borderRadius:10, transition:'all 150ms',
    fontSize: size==='sm'?13:size==='lg'?15:14,
    padding: size==='sm'?'6px 12px':size==='lg'?'12px 24px':'8px 16px',
  };
  const variants = {
    primary: { background: hover? C.primaryDark : C.primary, color:'#fff', boxShadow: hover?'0 4px 12px rgba(255,107,53,0.35)':'none' },
    secondary: { background: hover? '#E8F5FA' : '#F0F9FF', color: C.secondary, border:`1px solid ${C.border}` },
    ghost: { background: hover? '#F3F4F6' : 'transparent', color: C.textSub },
    danger: { background: hover? '#DC2626' : '#EF4444', color:'#fff' },
    accent: { background: hover? '#1E8A79' : C.accent, color:'#fff' },
  };
  return <button style={{...base,...(variants[variant]||variants.primary),...style}} onMouseEnter={()=>setHover(true)} onMouseLeave={()=>setHover(false)} onClick={onClick}>{children}</button>;
};

          <div style={{display:'flex',gap:10,marginTop:16}}>
            <Btn variant="secondary" style={{flex:1}} onClick={()=>setModal(null)}>닫기</Btn>
            {modal.r.status!=='취소'&&<Btn variant="danger" style={{flex:1}} onClick={()=>{setModal(null);showToast('환불 처리되었습니다.');}}>취소·환불 처리</Btn>}
          </div>
        </Modal>
      )}
      {toast && <Toast msg={toast}/>}
    </div>
  );
}

// ─── Main App ─────────────────────────────────────────────
const PAGE_TITLES = {
  'main': '강습 검색 & 예약',
  'partner-dashboard': '파트너 대시보드',
  'checkout-mypage': '결제 & 마이페이지',
  'admin-console': '관리자 콘솔',
};

function App() {
  const [page, setPage] = useState('main');
  return (
    <div style={{display:'flex',minHeight:'100vh',background:C.bg}}>
      <Sidebar page={page} onNav={setPage}/>
      <div style={{flex:1,display:'flex',flexDirection:'column',minWidth:0,overflow:'hidden'}}>
        <TopBar title={PAGE_TITLES[page]}/>
        <main style={{flex:1,overflowY:'auto',padding:24}}>
          {page==='main' && <SearchPage/>}
          {page==='partner-dashboard' && <PartnerDashboard/>}
          {page==='checkout-mypage' && <CheckoutMypage/>}
          {page==='admin-console' && <AdminConsole/>}
        </main>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
