const Badge = ({label, color='primary'}) => {
  const colors = {
    primary: {bg:'rgba(14,165,233,0.15)', text:C.primary},
    success: {bg:'rgba(16,185,129,0.15)', text:'#10B981'},
    warning: {bg:'rgba(245,158,11,0.15)', text:'#F59E0B'},
    danger:  {bg:'rgba(244,63,94,0.15)',  text:'#F43F5E'},
    gray:    {bg:'rgba(100,116,139,0.2)', text:C.textSub},
    purple:  {bg:'rgba(139,92,246,0.15)', text:'#A78BFA'},
  };
  const col = colors[color]||colors.gray;
  return <span style={{display:'inline-flex',alignItems:'center',padding:'2px 10px',borderRadius:20,fontSize:12,fontWeight:600,background:col.bg,color:col.text}}>{label}</span>;

const Btn = ({children, variant='primary', size='md', onClick, style={}}) => {
  const [hover, setHover] = useState(false);
  const base = {display:'inline-flex',alignItems:'center',gap:6,border:'none',cursor:'pointer',fontFamily:'Pretendard',fontWeight:600,borderRadius:10,transition:'all 150ms',fontSize:size==='sm'?13:14,padding:size==='sm'?'6px 12px':'9px 18px'};
  const variants = {
    primary: {background:hover?'#0284C7':C.primary, color:'#fff', boxShadow:hover?`0 4px 16px rgba(14,165,233,0.4)`:C.primary},
    ghost: {background:hover?C.surface2:'transparent', color:C.textSub, border:`1px solid ${hover?C.borderLight:C.border}`},
    danger: {background:hover?'#E11D48':C.danger, color:'#fff'},
    success: {background:hover?'#059669':C.success, color:'#fff'},
  };
  return <button style={{...base,...(variants[variant]||variants.primary),...style}} onMouseEnter={()=>setHover(true)} onMouseLeave={()=>setHover(false)} onClick={onClick}>{children}</button>;
};

            <thead>
              <tr style={{background:`${C.bg}88`}}>
                {['ID','장비명','종목','수용 인원','상태','최근 점검','다음 점검','관리'].map(h=>(
                  <th key={h} style={{padding:'10px 14px',fontSize:12,fontWeight:600,color:C.textSub,textAlign:'left',borderBottom:`1px solid ${C.border}`}}>{h}</th>
                ))}
              </tr>
            </thead>
            <tbody>
              {EQUIPMENT_LIST.map(eq=>(
                <tr key={eq.id} onClick={()=>setModal({type:'equipDetail',eq})} style={{cursor:'pointer',transition:'background 150ms'}} onMouseEnter={e=>e.currentTarget.style.background=`${C.bg}88`} onMouseLeave={e=>e.currentTarget.style.background=''}>
                  <td style={{padding:'12px 14px',fontSize:12,color:C.textLight,borderBottom:`1px solid ${C.border}22`}}>{eq.id}</td>
                  <td style={{padding:'12px 14px',fontWeight:600,color:C.text,borderBottom:`1px solid ${C.border}22`}}>{eq.name}</td>
                  <td style={{padding:'12px 14px',color:C.textSub,borderBottom:`1px solid ${C.border}22`}}>{eq.type}</td>
                  <td style={{padding:'12px 14px',color:C.text,borderBottom:`1px solid ${C.border}22`}}>{eq.capacity}인</td>
                  <td style={{padding:'12px 14px',borderBottom:`1px solid ${C.border}22`}}><Badge label={eq.status} color={equipStatusColor(eq.status)}/></td>
                  <td style={{padding:'12px 14px',fontSize:13,color:C.textSub,borderBottom:`1px solid ${C.border}22`}}>{eq.lastMaint}</td>
                  <td style={{padding:'12px 14px',fontSize:13,color:C.textSub,borderBottom:`1px solid ${C.border}22`}}>{eq.nextMaint}</td>
                  <td style={{padding:'12px 14px',borderBottom:`1px solid ${C.border}22`}}>
                    <div style={{display:'flex',gap:4}}>
                      <Btn variant="ghost" size="sm" onClick={e=>{e.stopPropagation();setModal({type:'equipDetail',eq});}}>상세</Btn>
                      {eq.status==='수리중'&&<Btn variant="success" size="sm" onClick={e=>{e.stopPropagation();showToast(`${eq.name} 수리 완료 처리했습니다.`);}}>수리완료</Btn>}
                    </div>
                  </td>
                </tr>
              ))}
            </tbody>
          </table>
        </Card>
      )}

      {tab==='partners' && (
        <Card>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16}}>
            <div style={{fontWeight:700,fontSize:14,color:C.text}}>파트너 승인 대기 (5건)</div>
          </div>
          {[
            {name:'이정우', sport:'요트', cert:'KSA 1급', applied:'2026-04-01', status:'대기'},
            {name:'김소희', sport:'세일링', cert:'ISA 레벨2', applied:'2026-04-02', status:'대기'},
            {name:'박현준', sport:'수상스키', cert:'레저보트운전면허', applied:'2026-04-03', status:'검토중'},
          ].map((p,i)=>(
            <div key={i} onClick={()=>setModal({type:'partnerDetail',p})} style={{display:'flex',alignItems:'center',gap:16,padding:'16px',borderRadius:12,border:`1px solid ${C.border}`,marginBottom:10,cursor:'pointer',transition:'all 150ms'}} onMouseEnter={e=>e.currentTarget.style.borderColor=C.primary} onMouseLeave={e=>e.currentTarget.style.borderColor=C.border}>
              <div style={{width:42,height:42,borderRadius:12,background:`${C.primary}22`,display:'flex',alignItems:'center',justifyContent:'center',fontSize:20}}>⚓</div>
              <div style={{flex:1}}>
                <div style={{fontWeight:700,color:C.text}}>{p.name}</div>
                <div style={{fontSize:12,color:C.textSub,marginTop:2}}>{p.sport} · {p.cert} · {p.applied}</div>
              </div>
              <Badge label={p.status} color={p.status==='대기'?'warning':'primary'}/>
              <div style={{display:'flex',gap:6}}>
                <Btn variant="success" size="sm" onClick={e=>{e.stopPropagation();showToast(`${p.name} 파트너가 승인되었습니다.`);}}>승인</Btn>
                <Btn variant="danger" size="sm" onClick={e=>{e.stopPropagation();showToast(`${p.name} 파트너가 거절되었습니다.`);}}>거절</Btn>
              </div>
            </div>
          ))}
        </Card>
      )}

      {tab==='commission' && (
        <Card>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:20}}>
            <div style={{fontWeight:700,fontSize:14,color:C.text}}>수수료율 설정 (버전 관리)</div>
            <Btn variant="primary" size="sm" onClick={()=>showToast('수수료율 변경이 저장되었습니다. v2.3으로 기록됩니다.')}>변경 저장</Btn>
          </div>
          <div style={{background:`${C.warning}15`,border:`1px solid ${C.warning}44`,borderRadius:10,padding:'10px 14px',marginBottom:16,fontSize:12,color:C.warning}}>
            ⚠️ 수수료율 변경 시 기존 예약에 소급 적용되지 않습니다. 변경 이력은 자동으로 버전 관리됩니다.
          </div>
          {[
            {category:'요트 강습', partners:8, rate:15, version:'v2.2', lastChanged:'2026-03-01'},
            {category:'세일링 강습', partners:5, rate:12, version:'v2.1', lastChanged:'2026-02-15'},
            {category:'수상스키 강습', partners:4, rate:10, version:'v2.2', lastChanged:'2026-03-01'},
            {category:'마리나 시설 이용', partners:3, rate:8, version:'v1.5', lastChanged:'2025-12-01'},
          ].map(item=>(
            <div key={item.category} style={{display:'flex',alignItems:'center',gap:20,padding:'14px 16px',borderRadius:12,border:`1px solid ${C.border}`,marginBottom:10,background:`${C.bg}88`}}>
              <div style={{flex:1}}>
                <div style={{fontWeight:700,color:C.text,fontSize:14}}>{item.category}</div>
                <div style={{fontSize:12,color:C.textLight,marginTop:2}}>파트너 {item.partners}개 · {item.version} · 최종변경 {item.lastChanged}</div>
              </div>
              <div style={{display:'flex',alignItems:'center',gap:10}}>
                <input type="number" defaultValue={item.rate} style={{width:64,padding:'7px 10px',border:`1px solid ${C.border}`,borderRadius:8,fontFamily:'Pretendard',fontSize:14,fontWeight:700,color:C.primary,background:C.surface,outline:'none',textAlign:'center'}}/>
                <span style={{color:C.textSub,fontWeight:600}}>%</span>
              </div>
              <Btn variant="ghost" size="sm" onClick={()=>showToast(`${item.category} 변경 이력을 확인합니다.`)}>이력 보기</Btn>
            </div>
          ))}
        </Card>
      )}

      {modal?.type==='addEquip' && (
        <Modal title="장비 추가" onClose={()=>setModal(null)}>
          {[['장비명','text',''],['종목','select',['요트','세일링','수상스키']],['수용 인원','number','4']].map(([l,t,v])=>(
            <div key={l} style={{marginBottom:14}}>
              <div style={{fontSize:13,fontWeight:600,color:C.text,marginBottom:6}}>{l}</div>
              {t==='select'
                ? <select style={{width:'100%',padding:'9px 12px',border:`1px solid ${C.border}`,borderRadius:10,fontFamily:'Pretendard',fontSize:13,background:C.bg,color:C.text,outline:'none'}}>{v.map(o=><option key={o}>{o}</option>)}</select>
                : <input type={t} defaultValue={v} style={{width:'100%',padding:'9px 12px',border:`1px solid ${C.border}`,borderRadius:10,fontFamily:'Pretendard',fontSize:13,background:C.bg,color:C.text,outline:'none'}}/>
              }
            </div>
          ))}
          <div style={{display:'flex',gap:10,marginTop:8}}>
            <Btn variant="ghost" style={{flex:1}} onClick={()=>setModal(null)}>취소</Btn>
            <Btn variant="primary" style={{flex:1}} onClick={()=>{setModal(null);showToast('장비가 추가되었습니다.');}}>추가</Btn>
          </div>
        </Modal>
      )}
      {modal?.type==='equipDetail' && (
        <Modal title="장비 상세" onClose={()=>setModal(null)} width={440}>
          {[['ID',modal.eq.id],['장비명',modal.eq.name],['종목',modal.eq.type],['수용인원',`${modal.eq.capacity}인`],['상태',modal.eq.status],['최근 점검',modal.eq.lastMaint],['다음 점검',modal.eq.nextMaint]].map(([k,v])=>(
            <div key={k} style={{display:'flex',justifyContent:'space-between',padding:'10px 0',borderBottom:`1px solid ${C.border}`}}>
              <span style={{fontSize:13,color:C.textSub}}>{k}</span><span style={{fontSize:13,fontWeight:600,color:C.text}}>{v}</span>
            </div>
          ))}
          <div style={{marginTop:14}}>
            <div style={{fontSize:13,fontWeight:600,color:C.text,marginBottom:6}}>정비 메모</div>
            <textarea rows={3} placeholder="정비 내용 또는 특이사항" style={{width:'100%',padding:'9px 12px',border:`1px solid ${C.border}`,borderRadius:10,fontFamily:'Pretendard',fontSize:13,background:C.bg,color:C.text,outline:'none',resize:'none'}}/>
          </div>
          <div style={{display:'flex',gap:10,marginTop:16}}>
            <Btn variant="ghost" style={{flex:1}} onClick={()=>setModal(null)}>닫기</Btn>
            <Btn variant="primary" style={{flex:1}} onClick={()=>{setModal(null);showToast('저장되었습니다.');}}>저장</Btn>
          </div>
        </Modal>
      )}
      {modal?.type==='partnerDetail' && (
        <Modal title="파트너 심사" onClose={()=>setModal(null)} width={440}>
          {[['이름',modal.p.name],['종목',modal.p.sport],['자격증',modal.p.cert],['신청일',modal.p.applied],['상태',modal.p.status]].map(([k,v])=>(
            <div key={k} style={{display:'flex',justifyContent:'space-between',padding:'10px 0',borderBottom:`1px solid ${C.border}`}}>
              <span style={{fontSize:13,color:C.textSub}}>{k}</span><span style={{fontSize:13,fontWeight:600,color:C.text}}>{v}</span>
            </div>
          ))}
          <div style={{marginTop:14}}>
            <div style={{fontSize:13,fontWeight:600,color:C.text,marginBottom:6}}>심사 메모</div>
            <textarea rows={3} placeholder="심사 의견을 입력하세요" style={{width:'100%',padding:'9px 12px',border:`1px solid ${C.border}`,borderRadius:10,fontFamily:'Pretendard',fontSize:13,background:C.bg,color:C.text,outline:'none',resize:'none'}}/>
          </div>
          <div style={{display:'flex',gap:10,marginTop:16}}>
            <Btn variant="danger" style={{flex:1}} onClick={()=>{setModal(null);showToast('거절 처리되었습니다.');}}>거절</Btn>
            <Btn variant="success" style={{flex:1}} onClick={()=>{setModal(null);showToast('승인 처리되었습니다.');}}>승인</Btn>
          </div>
        </Modal>
      )}
      {toast && <Toast msg={toast}/>}
    </div>
  );
}

// ─── Main App ─────────────────────────────────────────────
function App() {
  const [tab, setTab] = useState('main');
  return (
    <div style={{minHeight:'100vh',background:C.bg}}>
      <TopNav tab={tab} setTab={setTab}/>
      <HeroBanner tab={tab}/>
      {tab==='main' && <CalendarPage/>}
      {tab==='instructor-matching' && <InstructorMatching/>}
      {tab==='settlement-dashboard' && <SettlementDashboard/>}
      {tab==='admin-panel' && <AdminPanel/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
