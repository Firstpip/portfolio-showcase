const Badge = ({label, color='primary', size='sm'}) => {

    primary: {bg:`${C.primary}18`, text:C.primary},
    secondary: {bg:`${C.secondary}18`, text:C.secondary},
    success: {bg:'rgba(16,185,129,0.12)', text:'#059669'},
    warning: {bg:'rgba(245,158,11,0.12)', text:'#D97706'},
    danger:  {bg:'rgba(239,68,68,0.12)',  text:'#DC2626'},
    gray:    {bg:'#F3F4F6', text:'#6B7280'},
    teal:    {bg:'rgba(13,148,136,0.12)', text:C.teal},
    accent:  {bg:'rgba(245,158,11,0.12)', text:C.accent},
  };
  const col = colors[color]||colors.gray;
  return <span style={{display:'inline-flex',alignItems:'center',padding:'2px 10px',borderRadius:20,fontSize:size==='xs'?10:12,fontWeight:600,background:col.bg,color:col.text}}>{label}</span>;

const Btn = ({children,variant='primary',size='md',onClick,style={}}) => {
  const [hov, setHov] = useState(false);
  const base = {display:'inline-flex',alignItems:'center',gap:6,border:'none',cursor:'pointer',fontFamily:'Pretendard',fontWeight:600,borderRadius:10,transition:'all 150ms',fontSize:size==='sm'?13:size==='lg'?15:14,padding:size==='sm'?'6px 14px':size==='lg'?'12px 24px':'8px 18px'};
  const V = {
    primary: {background:hov?'#6D28D9':C.primary, color:'#fff', boxShadow:hov?`0 4px 14px ${C.primary}44`:'none'},
    secondary: {background:hov?`${C.secondary}22`:`${C.secondary}18`, color:C.secondary, border:`1px solid ${C.secondary}44`},
    ghost: {background:hov?C.surface2:'transparent', color:C.textSub, border:`1px solid ${hov?C.border:C.borderGray}`},
    gradient: {background:C.primaryGrad, color:'#fff', boxShadow:hov?`0 6px 20px ${C.primary}44`:'none'},
    success: {background:hov?'#059669':C.success, color:'#fff'},
    danger: {background:hov?'#DC2626':C.danger, color:'#fff'},
  };
  return <button style={{...base,...(V[variant]||V.primary),...style}} onMouseEnter={()=>setHov(true)} onMouseLeave={()=>setHov(false)} onClick={onClick}>{children}</button>;
};

          <div style={{fontSize:13,opacity:.85}}>예약 이력과 찜 목록을 분석하여 94%의 정확도로 최적화된 추천을 제공합니다.</div>

              <div key={l} style={{padding:'8px 14px',background:'rgba(255,255,255,0.15)',borderRadius:10,backdropFilter:'blur(4px)'}}>

        </div>

        <div style={{display:'flex',gap:8,marginBottom:20,overflowX:'auto',paddingBottom:4}}>
          {catNames.map(c=>(

  const [selected, setSelected] = useState(PARTNERS[0]);
  const [modal, setModal] = useState(null);
  const [toast, setToast] = useState('');
  const showToast = msg => { setToast(msg); setTimeout(()=>setToast(''),2500); };
  const statusColor = s => s==='활성'?'success':s==='심사중'?'warning':'danger';
  const tierColor = t => t==='골드'?'accent':t==='실버'?'gray':'warning';

  return (
    <div style={{display:'flex',flex:1,minHeight:0}}>
      {/* Tenant List */}
      <div style={{width:280,borderRight:`1px solid ${C.borderGray}`,background:C.surface,overflowY:'auto',flexShrink:0,padding:16}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12}}>
          <div style={{fontSize:13,fontWeight:700,color:C.text}}>파트너 테넌트</div>
          <Btn variant="primary" size="sm" onClick={()=>setModal({type:'addPartner'})}>+</Btn>
        </div>
        {PARTNERS.map(p=>(
          <div key={p.id} onClick={()=>setSelected(p)} style={{padding:'12px',borderRadius:12,border:`1.5px solid ${selected?.id===p.id?C.primary:C.borderGray}`,cursor:'pointer',marginBottom:8,transition:'all 150ms',background:selected?.id===p.id?C.surface2:C.surface}}
            onMouseEnter={e=>{if(selected?.id!==p.id)e.currentTarget.style.borderColor=`${C.primary}66`;}}
            onMouseLeave={e=>{if(selected?.id!==p.id)e.currentTarget.style.borderColor=C.borderGray;}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:4}}>
              <div style={{fontWeight:700,fontSize:13,color:C.text}}>{p.name}</div>
              <Badge label={p.status} color={statusColor(p.status)} size="xs"/>
            </div>
            <div style={{fontSize:11,color:C.textLight,marginBottom:4}}>tenant: {p.tenant}</div>
            <div style={{display:'flex',gap:4}}><Badge label={p.cat} color="primary" size="xs"/><Badge label={`${p.tier} 등급`} color={tierColor(p.tier)} size="xs"/></div>
          </div>
        ))}
      </div>

      {/* Detail Panel */}
      {selected && (
        <div style={{flex:1,overflowY:'auto',padding:24,animation:'slideDetail 200ms ease'}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:20}}>
            <div>
              <div style={{fontWeight:800,fontSize:20,color:C.text,marginBottom:4}}>{selected.name}</div>
              <div style={{fontSize:12,color:C.textLight,fontFamily:'monospace',background:C.surface2,display:'inline-block',padding:'3px 10px',borderRadius:6}}>tenant_id: {selected.tenant}</div>
            </div>
            <div style={{display:'flex',gap:8}}>
              <Btn variant="ghost" size="sm" onClick={()=>setModal({type:'editPartner',p:selected})}>수정</Btn>
              {selected.status==='심사중'&&<Btn variant="success" size="sm" onClick={()=>showToast(`${selected.name} 파트너가 승인되었습니다.`)}>승인</Btn>}
            </div>
          </div>

          {/* Info Cards */}
          <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:12,marginBottom:20}}>
            {[
              {l:'카테고리',v:selected.cat,icon:'📂'},
              {l:'등록 상품',v:`${selected.products}개`,icon:'📦'},
              {l:'이번달 매출',v:`${(selected.revenue/1000000).toFixed(1)}M원`,icon:'💰'},
              {l:'수수료율',v:`${selected.commission}%`,icon:'💳'},
            ].map(k=>(
              <Card key={k.l} style={{padding:14,textAlign:'center'}}>
                <div style={{fontSize:22,marginBottom:8}}>{k.icon}</div>
                <div style={{fontWeight:700,fontSize:17,color:C.primary,marginBottom:2}}>{k.v}</div>
                <div style={{fontSize:11,color:C.textSub}}>{k.l}</div>
              </Card>
            ))}
          </div>

          {/* RLS Info */}
          <Card style={{padding:18,marginBottom:16,background:`${C.primary}08`,border:`1px solid ${C.primary}22`}}>
            <div style={{display:'flex',gap:12,alignItems:'flex-start'}}>
              <span style={{fontSize:22}}>🔒</span>
              <div>
                <div style={{fontWeight:700,fontSize:14,color:C.primary,marginBottom:4}}>Row-Level Security (RLS) 격리 적용</div>
                <div style={{fontSize:13,color:C.text,lineHeight:1.6}}>이 파트너의 모든 데이터는 <code style={{background:`${C.primary}18`,padding:'1px 6px',borderRadius:4,fontFamily:'monospace',fontSize:12}}>tenant_id = '{selected.tenant}'</code> 정책으로 격리됩니다. 다른 파트너의 데이터에 접근할 수 없습니다.</div>
              </div>
            </div>
          </Card>

          {/* Bundle Products */}
          <Card style={{padding:20,marginBottom:16}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16}}>
              <div style={{fontWeight:700,fontSize:14,color:C.text}}>번들 상품 관리</div>
              <Btn variant="primary" size="sm" onClick={()=>setModal({type:'addBundle',p:selected})}>번들 생성</Btn>
            </div>
            {[
              {name:'스쿠버+숙박 패키지', partners:['블루오션 다이브','오션뷰 리조트'], price:285000, split:'75% / 25%', status:'활성'},
              {name:'서핑+웰니스 데이', partners:['웨이브 라이더','힐링 스파'], price:195000, split:'60% / 40%', status:'검토중'},
            ].map((b,i)=>(
              <div key={i} style={{padding:'14px',borderRadius:12,border:`1px solid ${C.borderGray}`,marginBottom:10,background:C.bg}}>
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:8}}>
                  <div style={{fontWeight:700,fontSize:14,color:C.text}}>{b.name}</div>
                  <Badge label={b.status} color={b.status==='활성'?'success':'warning'}/>
                </div>
                <div style={{fontSize:12,color:C.textSub,marginBottom:6}}>참여 파트너: {b.partners.join(' + ')}</div>
                <div style={{display:'flex',gap:16}}>
                  <div><span style={{fontSize:11,color:C.textLight}}>가격: </span><span style={{fontWeight:700,fontSize:13,color:C.primary}}>{b.price.toLocaleString()}원</span></div>
                  <div><span style={{fontSize:11,color:C.textLight}}>정산 분배: </span><span style={{fontWeight:600,fontSize:13,color:C.text}}>{b.split}</span></div>
                </div>
              </div>
            ))}
          </Card>

          {/* Commission Audit Log */}
          <Card style={{padding:20}}>
            <div style={{fontWeight:700,fontSize:14,color:C.text,marginBottom:14}}>수수료율 변경 이력</div>
            {[
              {date:'2026-03-01',before:'13%',after:'15%',reason:'플래티넘 등급 상향',admin:'관리자A'},
              {date:'2026-01-15',before:'10%',after:'13%',reason:'실버→골드 등급 전환',admin:'관리자B'},
              {date:'2025-11-20',before:'10%',after:'10%',reason:'초기 계약 수수료',admin:'관리자A'},
            ].map((l,i)=>(
              <div key={i} style={{display:'flex',gap:12,padding:'10px 0',borderBottom:`1px solid ${C.borderGray}`,alignItems:'flex-start'}}>
                <div style={{fontSize:11,color:C.textLight,fontFamily:'monospace',width:80,flexShrink:0,paddingTop:2}}>{l.date}</div>
                <div style={{flex:1}}>
                  <div style={{fontSize:13,color:C.text,marginBottom:2}}>{l.reason}</div>
                  <div style={{fontSize:11,color:C.textLight}}>처리자: {l.admin}</div>
                </div>
                <div style={{fontSize:13,fontWeight:700,flexShrink:0}}>
                  <span style={{color:C.textLight}}>{l.before}</span>
                  <span style={{color:C.textLight,margin:'0 4px'}}>→</span>
                  <span style={{color:C.primary}}>{l.after}</span>
                </div>
              </div>
            ))}
          </Card>
        </div>
      )}

      {modal?.type==='addPartner' && (
        <Modal title="파트너 추가" onClose={()=>setModal(null)} width={440}>
          {[['파트너명','text',''],['카테고리','select',['다이빙','스키/스노보드','서핑','요트/보트','캠핑','웰니스']],['테넌트 ID (영문)','text',''],['수수료율','number','10']].map(([l,t,v])=>(
            <div key={l} style={{marginBottom:14}}>
              <div style={{fontSize:13,fontWeight:600,color:C.text,marginBottom:6}}>{l}</div>
              {t==='select'
                ? <select style={{width:'100%',padding:'9px 12px',border:`1px solid ${C.borderGray}`,borderRadius:10,fontFamily:'Pretendard',fontSize:13,background:C.bg,outline:'none'}}>{v.map(o=><option key={o}>{o}</option>)}</select>
                : <input type={t} defaultValue={v} placeholder={l} style={{width:'100%',padding:'9px 12px',border:`1px solid ${C.borderGray}`,borderRadius:10,fontFamily:'Pretendard',fontSize:13,background:C.bg,outline:'none'}}/>
              }
            </div>
          ))}
          <div style={{display:'flex',gap:10,marginTop:8}}>
            <Btn variant="ghost" style={{flex:1}} onClick={()=>setModal(null)}>취소</Btn>
            <Btn variant="gradient" style={{flex:1,justifyContent:'center'}} onClick={()=>{setModal(null);showToast('파트너가 등록되었습니다.');}}>등록</Btn>
          </div>
        </Modal>
      )}
      {modal?.type==='editPartner' && (
        <Modal title="파트너 정보 수정" onClose={()=>setModal(null)} width={440}>
          {[['파트너명',modal.p.name],['카테고리',modal.p.cat],['수수료율',`${modal.p.commission}`]].map(([l,v])=>(
            <div key={l} style={{marginBottom:14}}>
              <div style={{fontSize:13,fontWeight:600,color:C.text,marginBottom:6}}>{l}</div>
              <input defaultValue={v} style={{width:'100%',padding:'9px 12px',border:`1px solid ${C.borderGray}`,borderRadius:10,fontFamily:'Pretendard',fontSize:13,background:C.bg,outline:'none'}}/>
            </div>
          ))}
          <div style={{background:`${C.warning}10`,border:`1px solid ${C.warning}44`,borderRadius:10,padding:'10px 14px',marginBottom:14,fontSize:12,color:C.warning}}>수수료율 변경 시 감사 로그에 자동 기록됩니다.</div>
          <div style={{display:'flex',gap:10}}>
            <Btn variant="ghost" style={{flex:1}} onClick={()=>setModal(null)}>취소</Btn>
            <Btn variant="gradient" style={{flex:1,justifyContent:'center'}} onClick={()=>{setModal(null);showToast('파트너 정보가 수정되었습니다.');}}>저장</Btn>
          </div>
        </Modal>
      )}
      {modal?.type==='addBundle' && (
        <Modal title="번들 상품 생성" onClose={()=>setModal(null)} width={480}>
          <div style={{background:C.surface2,borderRadius:10,padding:'10px 14px',marginBottom:16,fontSize:13,color:C.text}}>
            기준 파트너: <strong>{modal.p.name}</strong>
          </div>
          {[['번들 상품명','text',''],['참여 파트너','select',['블루오션 다이브','웨이브 라이더','마리나 투어','힐링 스파']],['총 판매가','number','250000'],['정산 비율 (기준/협력)','text','70/30']].map(([l,t,v])=>(
            <div key={l} style={{marginBottom:14}}>
              <div style={{fontSize:13,fontWeight:600,color:C.text,marginBottom:6}}>{l}</div>
              {t==='select'
                ? <select style={{width:'100%',padding:'9px 12px',border:`1px solid ${C.borderGray}`,borderRadius:10,fontFamily:'Pretendard',fontSize:13,background:C.bg,outline:'none'}}>{v.map(o=><option key={o}>{o}</option>)}</select>
                : <input type={t} defaultValue={v} placeholder={l} style={{width:'100%',padding:'9px 12px',border:`1px solid ${C.borderGray}`,borderRadius:10,fontFamily:'Pretendard',fontSize:13,background:C.bg,outline:'none'}}/>
              }
            </div>
          ))}
          <div style={{background:`${C.primary}08`,border:`1px solid ${C.primary}22`,borderRadius:10,padding:'10px 14px',marginBottom:14,fontSize:12,color:C.textSub}}>N-way 정산 분배: 참여 비율에 따라 수수료 차감 후 자동 분배됩니다.</div>
          <div style={{display:'flex',gap:10}}>
            <Btn variant="ghost" style={{flex:1}} onClick={()=>setModal(null)}>취소</Btn>
            <Btn variant="gradient" style={{flex:1,justifyContent:'center'}} onClick={()=>{setModal(null);showToast('번들 상품이 생성되었습니다.');}}>생성</Btn>
          </div>
        </Modal>
      )}
      {toast && <Toast msg={toast}/>}
    </div>
  );
}

// ─── Main App ─────────────────────────────────────────────
const PAGE_META_TOP = {
  'main': {title:'AI 추천 & 탐색', sub:'협업 필터링 기반 개인화 추천 엔진'},
  'partner-insights': {title:'파트너 인사이트', sub:'TimescaleDB 시계열 집계 & 분위수 비교 분석'},
  'membership-subscription': {title:'멤버십 & 구독', sub:'Feature Flag 기반 플랜별 권한 분기 시스템'},
  'multi-tenant-partner': {title:'멀티테넌트 파트너 관리', sub:'PostgreSQL RLS 기반 테넌트 격리 & N-way 정산'},
};

function App() {
  const [page, setPage] = useState('main');
  const meta = PAGE_META_TOP[page];

  return (
    <div style={{display:'flex',minHeight:'100vh',background:C.bg}}>
      <Sidebar page={page} onNav={setPage}/>
      <div style={{flex:1,display:'flex',flexDirection:'column',minWidth:0,overflow:'hidden'}}>
        <TopBar title={meta.title} subtitle={meta.sub}/>
        <div style={{flex:1,display:'flex',overflow:'hidden'}}>
          {page==='main' && <AIRecommendPage/>}
          {page==='partner-insights' && <PartnerInsights/>}
          {page==='membership-subscription' && <MembershipSubscription/>}
          {page==='multi-tenant-partner' && <MultiTenantPartner/>}
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
