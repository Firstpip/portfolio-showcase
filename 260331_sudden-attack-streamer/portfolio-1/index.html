  const getRankChange = (s) => {

  const renderContent = () => {

      case '스트리머 전적 조회': return <StreamerStats />;
      case '랭킹 시스템': return <RankingView rankFilter={rankFilter} setRankFilter={setRankFilter} getRankChange={getRankChange} />;

                  <span>{item.name.replace(' (관리자)', '')}</span>
