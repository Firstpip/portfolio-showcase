        <span className="alert-action" style={{color:'#059669'}}>보고서 보기 →</span>
      </div>
      <div className="kpi-grid">
        {[
          {label:'이번 달 경기', val:'52', sub:'전월 대비 +16%', color:'#1E3A5F'},
          {label:'참가 팀', val:'26', sub:'신규 +4팀', color:'#2563EB'},
          {label:'등록 선수', val:'412', sub:'신규 +38명', color:'#10B981'},
          {label:'커뮤니티 게시글', val:'387', sub:'이번 달 +89', color:'#F59E0B'},
        ].map((kpi, i) => (
          <div className="kpi-card" key={i} style={{borderLeftColor:kpi.color}}>
            <div className="kpi-label">{kpi.label}</div>
            <div className="kpi-value" style={{color:kpi.color}}>{kpi.val}</div>
            <div className="kpi-sub">{kpi.sub}</div>
          </div>
        ))}
      </div>
      <div className="two-col" style={{marginBottom:20}}>
        <div className="card">
          <div className="card-header"><div className="card-title">월별 경기 수 추이</div></div>
          <div className="card-body">
            <ResponsiveContainer width="100%" height={180}>
              <BarChart data={CHART_DATA} margin={{top:0, right:0, bottom:0, left:-20}}>
                <CartesianGrid strokeDasharray="3 3" stroke="#F1F5F9" />
                <XAxis dataKey="month" tick={{fill:'#94A3B8', fontSize:11}} axisLine={false} tickLine={false} />
                <YAxis tick={{fill:'#94A3B8', fontSize:11}} axisLine={false} tickLine={false} />
                <Tooltip contentStyle={{background:'#fff', border:'1px solid #E2E8F0', borderRadius:'8px'}} />
                <Bar dataKey="경기수" fill="#1E3A5F" radius={[4,4,0,0]} />
              </BarChart>
            </ResponsiveContainer>
          </div>
        </div>
        <div className="card">
          <div className="card-header"><div className="card-title">신규 회원 추이</div></div>
          <div className="card-body">
            <ResponsiveContainer width="100%" height={180}>
              <AreaChart data={CHART_DATA} margin={{top:0, right:0, bottom:0, left:-20}}>
                <defs>
                  <linearGradient id="colorMem" x1="0" y1="0" x2="0" y2="1">
                    <stop offset="5%" stopColor="#10B981" stopOpacity={0.2}/>
                    <stop offset="95%" stopColor="#10B981" stopOpacity={0}/>
                  </linearGradient>
                </defs>
                <CartesianGrid strokeDasharray="3 3" stroke="#F1F5F9" />
                <XAxis dataKey="month" tick={{fill:'#94A3B8', fontSize:11}} axisLine={false} tickLine={false} />
                <YAxis tick={{fill:'#94A3B8', fontSize:11}} axisLine={false} tickLine={false} />
                <Tooltip contentStyle={{background:'#fff', border:'1px solid #E2E8F0', borderRadius:'8px'}} />
                <Area type="monotone" dataKey="신규회원" stroke="#10B981" strokeWidth={2.5} fill="url(#colorMem)" />
              </AreaChart>
            </ResponsiveContainer>
          </div>
        </div>
      </div>
    </div>
  );
}
