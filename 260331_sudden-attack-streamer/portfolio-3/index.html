  const [selectedPred, setSelectedPred] = useState({});

  const navItems = [
    { section: '팬 활동', items: [
      { name: '전적 & 랭킹 조회', icon: '🏆' },

      { name: '통합 커뮤니티', icon: '💬', badge: '9' },
    ]},
  ];

  const toggleSub = (id) => setSubs(s => s.map(item => item.id===id ? {...item, subscribed: !item.subscribed} : item));
  const togglePred = (matchId, choice) => setSelectedPred(p => ({...p, [matchId]: p[matchId]===choice ? null : choice}));

  const renderContent = () => {
    switch(active) {
      case '전적 & 랭킹 조회': return <RankingView />;
      case '매치 결과 예측': return <PredictionView selectedPred={selectedPred} togglePred={togglePred} />;

      case '통합 커뮤니티': return <CommunityView />;
      default: return <RankingView />;
    }
  };

  return (
    <div className="app">

  );
}

          <div className="card">
            <div className="card-header"><div className="card-title">🏆 팬 포인트 랭킹</div></div>
            <div className="card-body" style={{padding:'8px 20px'}}>
              {FAN_RANKING.map((fan, i) => (
                <div className="fan-rank-row" key={i}>
                  <div className="fan-rank-num" style={{color:i===0?'#F97316':i===1?'#9CA3AF':i===2?'#B45309':'#D1D5DB'}}>{fan.rank}</div>
                  <div className="fan-avatar">{fan.emoji}</div>
                  <div className="fan-info">
                    <div className="fan-name">{fan.name}</div>
                    <div className="fan-title-tag">{fan.title}</div>
                  </div>
                  <div className="fan-pts">{fan.pts.toLocaleString()}</div>
                </div>
              ))}
            </div>
          </div>
        </div>
      </div>
    </div>
  );
}

function CommunityView() {
  const [cat, setCat] = useState('전체');
  const cats = ['전체', '경기 후기', '팬아트', '예측토론', '굿즈위시', '자유'];
  return (
    <div className="page-in">
      <div style={{display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:14}}>
        <div className="cat-tabs" style={{marginBottom:0}}>
          {cats.map(c => <button key={c} className={`cat-tab ${cat===c?'active':''}`} onClick={()=>setCat(c)}>{c}</button>)}
        </div>
        <button className="btn btn-primary" style={{flexShrink:0}}>✏️ 글쓰기</button>
      </div>
      <div className="master-detail">
        <div>
          {COMMUNITY_POSTS.map(post => (
            <div className="post-card" key={post.id}>
              <div className="post-top">
                <span className={`post-cat-badge cat-${post.cat}`}>{post.cat}</span>
                <span className="post-author">{post.author}</span>
                <span className="post-time-text">{post.time}</span>
              </div>
              <div className="post-title">{post.title}</div>
              <div className="post-preview">{post.preview}</div>
              <div className="post-footer">
                <div className="pf-stat">❤️ {post.likes}</div>
                <div className="pf-stat">💬 {post.comments}</div>
              </div>
            </div>
          ))}
        </div>
        <div>
          <div className="card" style={{marginBottom:14}}>
            <div className="card-header"><div className="card-title">🌟 이번 주 베스트</div></div>
            <div className="card-body">
              {COMMUNITY_POSTS.map((p, i) => (
                <div key={i} style={{display:'flex', gap:8, padding:'8px 0', borderBottom: i<3?'1.5px solid #FFF3EC':'', cursor:'pointer'}}>
                  <div style={{width:20, height:20, background:'linear-gradient(135deg, #F97316, #EC4899)', borderRadius:5, display:'flex', alignItems:'center', justifyContent:'center', fontSize:10, fontWeight:800, color:'#fff', flexShrink:0}}>{i+1}</div>
                  <div style={{fontSize:12, color:'#1A1A2E', lineHeight:1.4}}>{p.title}</div>
                </div>
              ))}
            </div>
          </div>
          <div className="card">
            <div className="card-header"><div className="card-title">🔥 활성 해시태그</div></div>
            <div className="card-body">
              <div style={{display:'flex', flexWrap:'wrap', gap:6}}>
                {['#킬러킹', '#스나이퍼Z', '#별풍선매치', '#서든어택', '#전적분석', '#팬아트', '#예측', '#명경기'].map((tag, i) => (
                  <span key={i} style={{padding:'4px 10px', background:'#FFF7F0', border:'1.5px solid #FFE8D6', borderRadius:20, fontSize:11, fontWeight:600, color:'#F97316', cursor:'pointer'}}>{tag}</span>
                ))}
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
