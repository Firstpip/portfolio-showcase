function Badge({ status }) {
  const cfg = {
    '문의': ['#EFF6FF','#1D4ED8'], '견적': ['#FFFBEB','#D97706'],
    '계약': ['#F0FDF4','#15803D'], '서류접수': ['#FFF7ED','#C2410C'],
    '심사': ['#FAF5FF','#6D28D9'], '완료': ['#F0F9FF','#0369A1'],
    '발송완료': ['#F0FDF4','#15803D'], '열람': ['#FFFBEB','#D97706'],
    '수락': ['#F0FDF4','#15803D'], '거절': ['#FEF2F2','#B91C1C'],
    'active': ['#F0FDF4','#15803D'], 'paused': ['#F8FAFC','#64748B'],
    'connected': ['#F0FDF4','#15803D'], 'error': ['#FEF2F2','#B91C1C'],
  };
  const [bg, clr] = cfg[status] || ['#F8FAFC','#64748B'];
  return <span style={{background:bg,color:clr,padding:'2px 10px',borderRadius:20,fontSize:12,fontWeight:600}}>{status}</span>;
}

function Modal({ open, title, onClose, children, width=560 }) {
  if (!open) return null;
  return (
    <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.4)',zIndex:1000,display:'flex',alignItems:'center',justifyContent:'center'}}
      onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div style={{background:'#fff',borderRadius:12,padding:28,width,maxWidth:'90vw',maxHeight:'85vh',overflow:'auto',boxShadow:'0 20px 60px rgba(0,0,0,0.15)'}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:20}}>
          <h3 style={{fontSize:18,fontWeight:700}}>{title}</h3>
          <button onClick={onClose} style={{background:'none',border:'none',fontSize:22,cursor:'pointer',color:'#94A3B8'}}>×</button>
        </div>
        {children}
      </div>
    </div>
  );
}

function Toast({ msg }) {
  if (!msg) return null;
  return (
    <div style={{position:'fixed',bottom:28,right:28,background:'#1E293B',color:'#fff',padding:'12px 20px',borderRadius:8,zIndex:2000,fontSize:14,fontWeight:500,boxShadow:'0 4px 20px rgba(0,0,0,0.3)'}}>
      ✓ {msg}

  );
}

// ── 메인 앱 ─────────────────────────────────────────────────
function App() {
  const [nav, setNav] = useState('CRM 파이프라인');

  const showToast = msg => {
    setToast(msg);
    setTimeout(()=>setToast(''), 2200);
  };

  const pages = {
    'CRM 파이프라인': <CRMPipeline showToast={showToast} />,
    '견적서·인보이스 자동화': <InvoiceAuto showToast={showToast} />,
    '워크플로우 빌더': <WorkflowBuilder showToast={showToast} />,
    '리마인더 규칙': <ReminderRules showToast={showToast} />,
    '운영 통계': <Analytics showToast={showToast} />,
    'SaaS 연동': <SaaSIntegrations showToast={showToast} />,
  };

  return (
    <div style={{display:'flex',minHeight:'100vh',width:'100%'}}>
      <Sidebar active={nav} onNav={setNav} />
      <div style={{flex:1,display:'flex',flexDirection:'column',overflow:'hidden'}}>
        {pages[nav]}
      </div>
      <Toast msg={toast} />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
