function Badge({ status }) {
  const cfg = {
    '접수':['#EFF6FF','#1D4ED8'], '처리중':['#FFFBEB','#D97706'],
    '검토':['#FAF5FF','#6D28D9'], '완료':['#F0FDF4','#15803D'],
    'active':['#F0FDF4','#15803D'], 'paused':['#F8FAFC','#64748B'],
    'danger':['#FEF2F2','#B91C1C'], 'warning':['#FFFBEB','#D97706'], 'normal':['#F0FDF4','#15803D'],
    '법인':['#EFF6FF','#1D4ED8'], '개인':['#F5F3FF','#6D28D9'],
  };
  const [bg, clr] = cfg[status] || ['#F8FAFC','#64748B'];
  return <span style={{background:bg,color:clr,padding:'2px 10px',borderRadius:20,fontSize:12,fontWeight:600}}>{status}</span>;
}

function Modal({ open, title, onClose, children, width=560 }) {
  if (!open) return null;
  return (
    <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.4)',zIndex:1000,display:'flex',alignItems:'center',justifyContent:'center'}}
      onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div style={{background:'#fff',borderRadius:10,padding:28,width,maxWidth:'90vw',maxHeight:'85vh',overflow:'auto',boxShadow:'0 20px 60px rgba(0,0,0,0.2)'}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:20}}>
          <h3 style={{fontSize:17,fontWeight:700}}>{title}</h3>
          <button onClick={onClose} style={{background:'none',border:'none',fontSize:22,cursor:'pointer',color:'#94A3B8'}}>×</button>
        </div>
        {children}
      </div>
    </div>
  );
}

function Drawer({ open, title, onClose, children }) {
  if (!open) return null;
  return (
    <>
      <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.3)',zIndex:900}} onClick={onClose} />

        <div style={{padding:24}}>{children}</div>
      </div>
    </>
  );
}

function Toast({ msg }) {
  if (!msg) return null;
  return (
    <div style={{position:'fixed',bottom:28,right:28,background:'#0F172A',color:'#fff',padding:'12px 20px',borderRadius:8,zIndex:2000,fontSize:14,fontWeight:500,boxShadow:'0 4px 20px rgba(0,0,0,0.3)'}}>
      ✓ {msg}
    </div>
  );
}

function Input({ label, value, onChange, type='text', placeholder='' }) {
  return (
    <div style={{marginBottom:14}}>
      {label && <label style={{fontSize:12,fontWeight:600,color:'#374151',display:'block',marginBottom:5}}>{label}</label>}
      <input type={type} value={value} onChange={e=>onChange(e.target.value)} placeholder={placeholder}
        style={{width:'100%',padding:'8px 12px',border:'1px solid #E2E8F0',borderRadius:6,fontSize:13,outline:'none',color:'#1E293B',background:'#FAFAFA'}} />
    </div>
  );
}

function Select({ label, value, onChange, options }) {
  return (
    <div style={{marginBottom:14}}>
      {label && <label style={{fontSize:12,fontWeight:600,color:'#374151',display:'block',marginBottom:5}}>{label}</label>}
      <select value={value} onChange={e=>onChange(e.target.value)}
        style={{width:'100%',padding:'8px 12px',border:'1px solid #E2E8F0',borderRadius:6,fontSize:13,background:'#FAFAFA',color:'#1E293B'}}>
        {options.map(o=><option key={o} value={o}>{o}</option>)}
      </select>
    </div>
  );
}

            </button>
          ))}
          <button onClick={()=>setShowAdd(true)} style={{marginLeft:'auto',background:C.accent,color:'#fff',border:'none',borderRadius:6,padding:'8px 16px',fontSize:13,fontWeight:600,cursor:'pointer'}}>+ 의뢰인 등록</button>
        </div>

        <div style={{background:'#fff',borderRadius:8,border:'1px solid #E2E8F0',overflow:'hidden'}}>
          <table style={{width:'100%',borderCollapse:'collapse'}}>
            <thead><tr style={{background:'#F8FAFC'}}>
              {['의뢰인명','담당자','이메일','업종','담당 컨설턴트','의뢰 건수','최근 연락일'].map(h=>(
                <th key={h} style={{padding:'10px 14px',fontSize:11,fontWeight:600,color:C.muted,textAlign:'left',borderBottom:'1px solid #F1F5F9'}}>{h}</th>
              ))}
            </tr></thead>
            <tbody>
              {filtered.map(c=>(
                <tr key={c.id} onClick={()=>{setDrawer(c);setTab('cases')}} style={{cursor:'pointer',transition:'background 0.1s'}}
                  onMouseEnter={e=>e.currentTarget.style.background='#F8FAFC'}
                  onMouseLeave={e=>e.currentTarget.style.background='transparent'}>
                  <td style={{padding:'12px 14px'}}>
                    <div style={{fontSize:13,fontWeight:600}}>{c.name}</div>
                    <Badge status={c.type} />
                  </td>
                  <td style={{padding:'12px 14px',fontSize:13}}>{c.rep}</td>
                  <td style={{padding:'12px 14px',fontSize:12,color:C.muted}}>{c.email}</td>
                  <td style={{padding:'12px 14px',fontSize:12}}>{c.industry}</td>
                  <td style={{padding:'12px 14px',fontSize:12}}>{c.assignee}</td>
                  <td style={{padding:'12px 14px',fontSize:13,fontWeight:600,color:C.accent}}>{c.cases}건</td>
                  <td style={{padding:'12px 14px',fontSize:12,color:C.muted}}>{c.lastContact}</td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      </div>

      {/* 상세 드로어 */}
      <Drawer open={!!drawer} title={drawer?.name||''} onClose={()=>setDrawer(null)}>
        {drawer && (
          <div>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginBottom:16}}>
              {[['담당자',drawer.rep],['이메일',drawer.email],['업종',drawer.industry],['담당 컨설턴트',drawer.assignee],['최근 연락',drawer.lastContact]].map(([k,v])=>(
                <div key={k} style={{background:'#F8FAFC',borderRadius:7,padding:'10px 12px'}}>
                  <div style={{fontSize:11,color:C.muted,marginBottom:2}}>{k}</div>
                  <div style={{fontSize:12,fontWeight:600}}>{v}</div>
                </div>
              ))}
              <div style={{background:'#F8FAFC',borderRadius:7,padding:'10px 12px'}}>
                <div style={{fontSize:11,color:C.muted,marginBottom:2}}>구분</div>
                <Badge status={drawer.type} />
              </div>
            </div>
            {/* 탭 */}
            <div style={{display:'flex',gap:4,marginBottom:14,borderBottom:'1px solid #E2E8F0'}}>
              {['cases','docs','memo'].map(t=>(
                <button key={t} onClick={()=>setTab(t)}
                  style={{padding:'7px 14px',background:'none',border:'none',cursor:'pointer',fontSize:12,fontWeight:tab===t?700:400,
                    color:tab===t?C.accent:'#64748B',borderBottom:tab===t?`2px solid ${C.accent}`:'2px solid transparent'}}>
                  {t==='cases'?'의뢰 이력':t==='docs'?'문서 이력':'메모'}
                </button>
              ))}
            </div>
            {tab==='cases' && (
              <div style={{display:'flex',flexDirection:'column',gap:8}}>
                {CASES.filter(c=>c.client===drawer.name).map(c=>(
                  <div key={c.id} style={{background:'#F8FAFC',borderRadius:7,padding:'10px 12px'}}>
                    <div style={{fontSize:12,fontWeight:600,color:C.accent}}>{c.id}</div>
                    <div style={{fontSize:12,color:'#374151',marginTop:2}}>{c.type} · {c.deadline}</div>
                    <Badge status={c.status} />
                  </div>
                ))}
                {CASES.filter(c=>c.client===drawer.name).length===0 && (
                  <div style={{fontSize:12,color:C.muted,textAlign:'center',padding:20}}>의뢰 내역이 없습니다</div>
                )}
              </div>
            )}
            {tab==='docs' && (
              <div style={{fontSize:12,color:C.muted,textAlign:'center',padding:20}}>문서 이력이 없습니다</div>
            )}
            {tab==='memo' && (
              <textarea style={{width:'100%',border:'1px solid #E2E8F0',borderRadius:6,padding:'9px 12px',fontSize:12,resize:'vertical',minHeight:100,fontFamily:'Pretendard',background:'#FAFAFA'}} placeholder="메모 입력..." />
            )}
            <button onClick={()=>{setDrawer(null);showToast('저장되었습니다')}} style={{marginTop:16,width:'100%',background:C.accent,color:'#fff',border:'none',borderRadius:7,padding:'10px',fontSize:13,fontWeight:600,cursor:'pointer'}}>저장</button>
          </div>
        )}
      </Drawer>

      <Modal open={showAdd} title="의뢰인 등록" onClose={()=>setShowAdd(false)}>
        <Input label="의뢰인명 (법인 또는 개인)" value="" onChange={()=>{}} placeholder="(주)예시코퍼레이션" />
        <Input label="담당자" value="" onChange={()=>{}} placeholder="홍길동" />
        <Input label="이메일" value="" onChange={()=>{}} type="email" placeholder="example@corp.co.kr" />
        <Select label="구분" value="법인" onChange={()=>{}} options={['법인','개인']} />
        <Select label="담당 컨설턴트" value="김태양" onChange={()=>{}} options={['김태양','박서연','최민준']} />
        <div style={{display:'flex',gap:10,justifyContent:'flex-end',marginTop:4}}>
          <button onClick={()=>{setShowAdd(false);showToast('의뢰인이 등록되었습니다')}}
            style={{background:C.accent,color:'#fff',border:'none',borderRadius:7,padding:'9px 22px',fontSize:13,fontWeight:600,cursor:'pointer'}}>등록</button>
          <button onClick={()=>setShowAdd(false)}
            style={{background:'#F1F5F9',color:'#374151',border:'none',borderRadius:7,padding:'9px 22px',fontSize:13,cursor:'pointer'}}>취소</button>
        </div>
      </Modal>
    </div>
  );
}

// ── 5. 업무 통계 ──────────────────────────────────────────
function WorkAnalytics({ showToast }) {
  return (
    <div style={{flex:1}}>
      <HeroBanner title="업무 통계" subtitle="월별 수임 트렌드 · 의뢰 유형 분포 · 처리 기간 분석" />
      <div style={{padding:'24px 32px'}}>
        {/* KPI */}
        <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:14,marginBottom:24}}>
          {[
            { label:'이번달 수임', value:'14건', color:C.accent },
            { label:'이번달 완료', value:'10건', color:'#10B981' },
            { label:'평균 처리일', value:'21일', color:'#F59E0B' },
            { label:'자동 발송', value:'94건', color:'#8B5CF6' },
          ].map(k=>(
            <div key={k.label} style={{background:'#fff',borderRadius:8,padding:'16px 18px',border:'1px solid #E2E8F0',borderTop:`3px solid ${k.color}`}}>
              <div style={{fontSize:11,color:C.muted,marginBottom:4}}>{k.label}</div>
              <div style={{fontSize:24,fontWeight:700,color:k.color}}>{k.value}</div>
            </div>
          ))}
        </div>

        <div style={{display:'grid',gridTemplateColumns:'1.5fr 1fr',gap:20,marginBottom:20}}>
          <div style={{background:'#fff',borderRadius:8,border:'1px solid #E2E8F0',padding:20}}>
            <h3 style={{fontSize:13,fontWeight:700,marginBottom:14}}>월별 수임·완료 트렌드</h3>
            <ResponsiveContainer width="100%" height={210}>
              <ComposedChart data={MONTHLY}>
                <CartesianGrid strokeDasharray="3 3" stroke="#F1F5F9" />
                <XAxis dataKey="month" tick={{fontSize:11}} />
                <YAxis tick={{fontSize:11}} />
                <Tooltip contentStyle={{fontSize:11,borderRadius:8}} />
                <Legend wrapperStyle={{fontSize:11}} />
                <Bar dataKey="수임" fill={C.accent} opacity={0.8} radius={[3,3,0,0]} />
                <Bar dataKey="완료" fill="#10B981" opacity={0.8} radius={[3,3,0,0]} />
                <Line type="monotone" dataKey="취소" stroke="#EF4444" strokeWidth={2} dot={{fill:'#EF4444',r:4}} />
              </ComposedChart>
            </ResponsiveContainer>
          </div>
          <div style={{background:'#fff',borderRadius:8,border:'1px solid #E2E8F0',padding:20}}>
            <h3 style={{fontSize:13,fontWeight:700,marginBottom:14}}>의뢰 유형별 비중 (Treemap)</h3>
            <ResponsiveContainer width="100%" height={210}>
              <Treemap data={TYPE_DATA} dataKey="size" aspectRatio={4/3} stroke="#fff">
                {TYPE_DATA.map((entry,i)=><Cell key={i} fill={entry.fill} />)}
              </Treemap>
            </ResponsiveContainer>
          </div>
        </div>

        <div style={{background:'#fff',borderRadius:8,border:'1px solid #E2E8F0',padding:20}}>
          <h3 style={{fontSize:13,fontWeight:700,marginBottom:14}}>처리 기간 분포</h3>
          <ResponsiveContainer width="100%" height={180}>
            <BarChart data={DURATION_DATA}>
              <CartesianGrid strokeDasharray="3 3" stroke="#F1F5F9" />
              <XAxis dataKey="range" tick={{fontSize:11}} />
              <YAxis tick={{fontSize:11}} />
              <Tooltip contentStyle={{fontSize:11,borderRadius:8}} />
              <Bar dataKey="count" fill={C.accent} radius={[4,4,0,0]} name="건수" />
            </BarChart>
          </ResponsiveContainer>
        </div>
      </div>
    </div>
  );
}

// ── 메인 앱 ─────────────────────────────────────────────────
function App() {
  const [nav, setNav] = useState('의뢰 현황');
  const [toast, setToast] = useState('');

  const showToast = msg => {
    setToast(msg);
    setTimeout(()=>setToast(''), 2200);
  };

  const pages = {
    '의뢰 현황': <CaseOverview showToast={showToast} />,
    '문서 자동 생성': <DocGenerator showToast={showToast} />,
    '기한 알림 자동화': <DeadlineAlerts showToast={showToast} />,
    '의뢰인 관리': <ClientManagement showToast={showToast} />,
    '업무 통계': <WorkAnalytics showToast={showToast} />,
  };

  return (
    <div style={{minHeight:'100vh',display:'flex',flexDirection:'column'}}>
      <TopNav active={nav} onNav={setNav} />
      <div style={{flex:1}}>
        {pages[nav]}
      </div>
      <Toast msg={toast} />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
