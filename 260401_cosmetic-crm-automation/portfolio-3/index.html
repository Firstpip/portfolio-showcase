function Badge({ severity }) {
  const cfg = {
    'high': ['#EF444422','#EF4444'], 'medium': ['#F59E0B22','#F59E0B'],
    'low': ['#10B98122','#10B981'],
    '완료': ['#10B98122','#10B981'], '시행 중': ['#A78BFA22','#A78BFA'],
    '적용 중': ['#06B6D422','#06B6D4'],
  };
  const [bg, clr] = cfg[severity] || ['#94A3B822','#94A3B8'];
  return <span style={{background:bg,color:clr,padding:'2px 10px',borderRadius:20,fontSize:11,fontWeight:700,border:`1px solid ${clr}44`}}>{severity}</span>;
}

function Modal({ open, title, onClose, children, width=560 }) {
  if (!open) return null;
  return (
    <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.7)',zIndex:1000,display:'flex',alignItems:'center',justifyContent:'center'}}
      onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div style={{background:D.surface,borderRadius:12,padding:28,width,maxWidth:'90vw',maxHeight:'85vh',overflow:'auto',boxShadow:'0 24px 80px rgba(124,58,237,0.3)',border:`1px solid ${D.border}`}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:20}}>
          <h3 style={{fontSize:17,fontWeight:700,color:D.text}}>{title}</h3>
          <button onClick={onClose} style={{background:'none',border:'none',fontSize:22,cursor:'pointer',color:D.muted}}>×</button>
        </div>
        {children}
      </div>
    </div>
  );
}

function DetailPanel({ item, onClose, children, title }) {
  if (!item) return null;
  return (
    <div style={{width:380,background:D.surface,borderLeft:`1px solid ${D.border}`,display:'flex',flexDirection:'column',flexShrink:0}}>
      <div style={{padding:'16px 20px',borderBottom:`1px solid ${D.border}`,display:'flex',justifyContent:'space-between',alignItems:'center'}}>
        <h3 style={{fontSize:14,fontWeight:700,color:D.text}}>{title}</h3>

      </div>
      <div style={{flex:1,overflow:'auto',padding:20}}>{children}</div>
    </div>
  );
}

function Toast({ msg }) {
  if (!msg) return null;
  return (
    <div style={{position:'fixed',bottom:28,right:28,background:'linear-gradient(135deg,#7C3AED,#A78BFA)',color:'#fff',padding:'12px 20px',borderRadius:10,zIndex:2000,fontSize:14,fontWeight:600,boxShadow:'0 8px 30px rgba(124,58,237,0.4)'}}>
      ✓ {msg}
    </div>
  );
}

    </div>
  );
}

function DarkSelect({ label, value, onChange, options }) {

}

// ── 3. AI 서류 검토 ──────────────────────────────────────────
function AiDocReview({ showToast }) {
  const [step, setStep] = useState(0);
  const [file, setFile] = useState('');
  const [country, setCountry] = useState('EU CPNP');
  const [reviewing, setReviewing] = useState(false);
  const [showResult, setShowResult] = useState(false);

  const runReview = () => {
    setReviewing(true);
    setStep(1);
    setTimeout(()=>setStep(2), 800);
    setTimeout(()=>setStep(3), 1600);
    setTimeout(()=>{setStep(4);setReviewing(false);setShowResult(true);}, 2400);
  };

  const STEPS = ['서류 업로드','텍스트 추출','규정 대조','리포트 생성'];
  const severityColor = { high: D.danger, medium: D.warning, low: D.success };

  return (
    <div style={{flex:1,overflow:'auto',padding:'24px'}}>
      <div style={{display:'grid',gridTemplateColumns:'400px 1fr',gap:20}}>
        {/* 업로드 패널 */}
        <div>
          <div style={{background:D.surface,borderRadius:12,padding:24,border:`1px solid ${D.border}`,marginBottom:16}}>
            <h3 style={{fontSize:14,fontWeight:700,color:D.text,marginBottom:16}}>🤖 AI 서류 검토 (Claude API)</h3>
            <div style={{background:D.surface2,border:`2px dashed ${D.border}`,borderRadius:10,padding:24,textAlign:'center',marginBottom:16,cursor:'pointer'}}
              onClick={()=>setFile('루미에르뷰티_EU_성분표_v3.xlsx')}>
              {file ? (
                <div>
                  <div style={{fontSize:22,marginBottom:8}}>📊</div>
                  <div style={{fontSize:13,fontWeight:600,color:D.secondary}}>{file}</div>
                  <div style={{fontSize:11,color:D.muted,marginTop:4}}>클릭하여 다른 파일 선택</div>
                </div>
              ) : (
                <div>
                  <div style={{fontSize:32,marginBottom:8}}>⬆️</div>
                  <div style={{fontSize:13,color:D.muted}}>성분표·라벨 초안·안전성 자료 업로드</div>
                  <div style={{fontSize:11,color:'#4B5563',marginTop:4}}>.xlsx .pdf .csv 지원</div>
                </div>
              )}
            </div>
            <DarkSelect label="검토 대상 국가 규정" value={country} onChange={setCountry} options={['EU CPNP','중국 NMPA','미국 FDA MoCRA','일본 후생성','ASEAN ACD']} />
            <button onClick={()=>{if(!file){setFile('루미에르뷰티_EU_성분표_v3.xlsx');return}runReview()}}
              disabled={reviewing}
              style={{width:'100%',background:reviewing?'rgba(124,58,237,0.4)':`linear-gradient(135deg,${D.primary},${D.accent})`,color:'#fff',border:'none',borderRadius:8,padding:'11px',fontSize:13,fontWeight:600,cursor:reviewing?'not-allowed':'pointer'}}>
              {reviewing?'검토 중...':'🤖 AI 규정 검토 시작'}
            </button>
          </div>

          {/* 진행 스텝퍼 */}
          {(step>0||showResult) && (
            <div style={{background:D.surface,borderRadius:12,padding:20,border:`1px solid ${D.border}`}}>
              <div style={{fontSize:13,fontWeight:700,color:D.text,marginBottom:14}}>진행 상태</div>
              {STEPS.map((s,i)=>(
                <div key={i} style={{display:'flex',alignItems:'center',gap:12,marginBottom:10}}>
                  <div style={{width:24,height:24,borderRadius:'50%',display:'flex',alignItems:'center',justifyContent:'center',fontSize:11,fontWeight:700,flexShrink:0,
                    background:step>i?`linear-gradient(135deg,${D.primary},${D.accent})`:step===i?D.surface2:D.surface2,
                    color:step>i?'#fff':step===i?D.secondary:D.muted,
                    border:`2px solid ${step>i?'transparent':step===i?D.primary:D.border}`}}>
                    {step>i?'✓':i+1}
                  </div>
                  <div style={{flex:1}}>
                    <div style={{fontSize:12,fontWeight:600,color:step>i?D.text:step===i?D.secondary:D.muted}}>{s}</div>
                    {step===i+1 && <div style={{fontSize:10,color:D.success}}>처리 중...</div>}
                    {step>i && <div style={{fontSize:10,color:D.success}}>완료</div>}
                  </div>
                </div>
              ))}
            </div>
          )}
        </div>

        {/* 검토 결과 */}
        <div>
          {showResult ? (
            <div style={{background:D.surface,borderRadius:12,padding:24,border:`1px solid ${D.border}`}}>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:20}}>
                <h3 style={{fontSize:14,fontWeight:700,color:D.text}}>검토 결과 리포트</h3>
                <div style={{display:'flex',gap:8}}>
                  <span style={{background:'rgba(239,68,68,0.1)',color:D.danger,padding:'4px 12px',borderRadius:4,fontSize:12,fontWeight:700}}>위반 1건</span>
                  <span style={{background:'rgba(245,158,11,0.1)',color:D.warning,padding:'4px 12px',borderRadius:4,fontSize:12,fontWeight:700}}>주의 1건</span>
                  <span style={{background:'rgba(16,185,129,0.1)',color:D.success,padding:'4px 12px',borderRadius:4,fontSize:12,fontWeight:700}}>정보 1건</span>
                </div>
              </div>
              <div style={{background:D.surface2,borderRadius:8,padding:'10px 14px',marginBottom:16,fontSize:11,color:D.muted}}>
                파일: {AI_REVIEW_RESULT.file} · 규정: {AI_REVIEW_RESULT.country} · Claude API 스트리밍 분석 완료
              </div>
              {AI_REVIEW_RESULT.issues.map((issue,i)=>(
                <div key={i} style={{borderRadius:10,padding:18,marginBottom:12,background:D.surface2,border:`1px solid ${severityColor[issue.severity]}44`,borderLeft:`4px solid ${severityColor[issue.severity]}`}}>
                  <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10}}>
                    <div style={{fontSize:13,fontWeight:700,color:D.text}}>{issue.item}</div>
                    <Badge severity={issue.severity} />
                  </div>
                  <div style={{fontSize:11,color:D.muted,marginBottom:6}}>근거 규정: {issue.rule}</div>
                  <div style={{fontSize:12,color:'#CBD5E1',marginBottom:10,lineHeight:1.6}}>{issue.desc}</div>
                  <div style={{background:`${severityColor[issue.severity]}11`,borderRadius:7,padding:'8px 12px',fontSize:12,color:severityColor[issue.severity]}}>
                    💡 권고: {issue.recommendation}
                  </div>
                </div>
              ))}
              <button onClick={()=>showToast('검토 리포트 PDF가 생성되었습니다')}
                style={{width:'100%',background:`linear-gradient(135deg,${D.primary},${D.accent})`,color:'#fff',border:'none',borderRadius:8,padding:'10px',fontSize:13,fontWeight:600,cursor:'pointer',marginTop:4}}>
                📄 리포트 PDF 다운로드
              </button>
            </div>
          ) : (
            <div style={{background:D.surface,borderRadius:12,padding:40,border:`1px solid ${D.border}`,textAlign:'center',minHeight:400,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center'}}>
              <div style={{fontSize:48,marginBottom:16}}>🤖</div>
              <div style={{fontSize:15,fontWeight:700,color:D.text,marginBottom:8}}>AI 규정 검토 대기 중</div>
              <div style={{fontSize:12,color:D.muted,lineHeight:1.8}}>성분표 또는 라벨 초안을 업로드하고<br/>대상 국가를 선택한 후 검토를 시작하세요.<br/><br/>Claude API가 국가별 규정 DB와 대조하여<br/>위반 항목과 수정 권고사항을 분석합니다.</div>
            </div>
          )}
        </div>
      </div>
    </div>
  );
}
