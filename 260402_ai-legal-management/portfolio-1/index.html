function Badge({text,type}){
  const map={활성:{bg:'#DCFCE7',color:'#15803D'},검토중:{bg:'#FEF3C7',color:'#B45309'},만료예정:{bg:'#FFE4E6',color:'#BE123C'},결재대기:{bg:'#EDE9FE',color:'#6D28D9'},미확인:{bg:'#FEF3C7',color:'#B45309'},확인완료:{bg:'#DCFCE7',color:'#15803D'},high:{bg:'#FFE4E6',color:'#DC2626'},med:{bg:'#FEF3C7',color:'#D97706'},low:{bg:'#DCFCE7',color:'#16A34A'}};
  const s=map[type||text]||{bg:'#F1F5F9',color:'#475569'};
  return <span style={{background:s.bg,color:s.color,padding:'2px 8px',borderRadius:'4px',fontSize:'11px',fontWeight:600,whiteSpace:'nowrap'}}>{text}</span>;
}

function Modal({title,onClose,children,width=640}){
  return(
    <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.45)',display:'flex',alignItems:'center',justifyContent:'center',zIndex:1000}} onClick={onClose}>
      <div style={{background:C.surface,borderRadius:'8px',width,maxHeight:'85vh',overflowY:'auto',boxShadow:'0 20px 60px rgba(0,0,0,0.2)'}} onClick={e=>e.stopPropagation()}>

          <button onClick={onClose} style={{border:'none',background:'none',cursor:'pointer',fontSize:'18px',color:C.textSm,lineHeight:1}}>✕</button>
        </div>
        <div style={{padding:'24px'}}>{children}</div>
      </div>
    </div>
  );
}

function Toast({msg,onClose}){
  useEffect(()=>{const t=setTimeout(onClose,2500);return()=>clearTimeout(t);},[]);
  return <div style={{position:'fixed',bottom:24,right:24,background:'#0F172A',color:'#fff',padding:'12px 20px',borderRadius:'8px',fontSize:'13px',zIndex:9999,boxShadow:'0 4px 20px rgba(0,0,0,0.3)'}}>{msg}</div>;
}

function Upload(){
  const [phase,setPhase]=useState('idle');
  const [progress,setProgress]=useState(0);
  const [editModal,setEditModal]=useState(false);
  const [toast,setToast]=useState('');
  const meta={계약명:'클라우드 인프라 서비스 공급 계약서',계약유형:'서비스 계약',갑:'(주)코리아플렉스',을:'(유)넥서스 인프라',계약기간:'2024.04.01 ~ 2026.03.31',계약금액:'₩480,000,000',이행보증:'계약금액의 10%',위약금:'계약금액의 20%',주요조항:'서비스 수준 협약(SLA) 99.5% 가용성 보장, 월 정기 점검 1회 포함'};
  const fields=Object.entries(meta);

  function startUpload(){
    setPhase('uploading');
    let p=0;
    const t=setInterval(()=>{p+=Math.random()*18;if(p>=100){p=100;clearInterval(t);setPhase('extracting');startExtract();}setProgress(Math.min(p,100));},120);
  }
  function startExtract(){
    setPhase('extracting');
    setTimeout(()=>setPhase('done'),2200);
  }

  return(
    <div style={{maxWidth:900,margin:'0 auto'}}>
      {toast&&<Toast msg={toast} onClose={()=>setToast('')}/>}
      {editModal&&(
        <Modal title="메타데이터 편집" onClose={()=>setEditModal(false)}>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:16}}>
            {fields.map(([k,v])=>(
              <div key={k}>
                <label style={{fontSize:'12px',color:C.textSm,fontWeight:600,display:'block',marginBottom:4}}>{k}</label>

// ─── AI 리뷰 ───
function AIReview(){
  const [selected,setSelected]=useState(null);
  const [items,setItems]=useState(AI_REVIEW_ITEMS);
  const [playbook,setPlaybook]=useState('IT 서비스 계약 표준 플레이북 v2.1');

          <div style={{fontSize:'22px',fontWeight:800,color:'#16A34A'}}>{items.length-highCount-medCount}</div>
          <div style={{fontSize:'12px',color:'#166534',fontWeight:600}}>Low Risk</div>
        </div>
        <div style={{background:'#F0F9FF',border:'1px solid #BAE6FD',borderRadius:'8px',padding:'14px 20px',flex:1,textAlign:'center'}}>
          <div style={{fontSize:'22px',fontWeight:800,color:C.accent}}>{doneCount}/{items.length}</div>
          <div style={{fontSize:'12px',color:'#0369A1',fontWeight:600}}>검토 완료</div>

        <select value={playbook} onChange={e=>setPlaybook(e.target.value)} style={{padding:'5px 10px',border:`1px solid ${C.border}`,borderRadius:'5px',fontSize:'12px',color:C.text,cursor:'pointer',outline:'none',background:C.surface}}>

        </select>
        <span style={{marginLeft:'auto',fontSize:'12px',color:C.textSm}}>분석 완료: 2024-03-29 14:32</span>
        <button style={{padding:'5px 14px',border:'none',borderRadius:'5px',background:C.accent,color:'#fff',fontSize:'12px',fontWeight:600,cursor:'pointer'}}>리뷰 재실행</button>

      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:16}}>
        <div style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:'8px',overflow:'hidden'}}>

            <div key={item.id} onClick={()=>setSelected(item)} style={{padding:'14px 20px',borderBottom:`1px solid ${C.border}`,cursor:'pointer',background:selected?.id===item.id?'#F0F9FF':'transparent',transition:'background .1s'}}
              onMouseEnter={e=>{if(selected?.id!==item.id)e.currentTarget.style.background='#F8FAFC'}}
              onMouseLeave={e=>{if(selected?.id!==item.id)e.currentTarget.style.background='transparent'}}>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:4}}>
                <span style={{fontSize:'12px',fontWeight:700,color:C.text}}>{item.clause}</span>

              <div style={{fontSize:'11px',color:C.textSm,lineHeight:1.4}}>{item.summary}</div>
              <div style={{marginTop:6}}><Badge text={item.status}/></div>

          {selected?(

              <div style={{padding:'14px 20px',borderBottom:`1px solid ${C.border}`}}>

                <div style={{display:'flex',gap:8}}><Badge text={selected.risk}/><Badge text={selected.status}/></div>

                  <div style={{padding:'10px 14px',background:{high:'#FFF1F2',med:'#FFFBEB',low:'#F0FDF4'}[selected.risk],borderRadius:'6px',fontSize:'13px',color:C.text,lineHeight:1.6,borderLeft:`3px solid ${{high:C.high,med:C.med,low:C.low}[selected.risk]}`}}>{selected.summary}</div>
                </div>
                <div style={{marginBottom:16}}>
                  <div style={{fontSize:'11px',fontWeight:700,color:C.textSm,textTransform:'uppercase',letterSpacing:'0.5px',marginBottom:6}}>수정 권고 문안</div>
                  <div style={{padding:'10px 14px',background:'#F8FAFC',borderRadius:'6px',fontSize:'13px',color:C.text,lineHeight:1.6,border:`1px solid ${C.border}`}}>{selected.suggestion}</div>

                <div style={{marginBottom:20}}>
                  <div style={{fontSize:'11px',fontWeight:700,color:C.textSm,textTransform:'uppercase',letterSpacing:'0.5px',marginBottom:6}}>적용 체크리스트 항목</div>
                  <div style={{padding:'8px 12px',background:'#F0F9FF',borderRadius:'6px',fontSize:'12px',color:'#0369A1',border:'1px solid #BAE6FD'}}>📋 {selected.checklist}</div>
                </div>
                <div style={{display:'flex',gap:10}}>
                  <button onClick={()=>{const c=prompt('코멘트를 입력하세요');if(c)setToast('코멘트가 저장되었습니다.');}} style={{flex:1,padding:'8px',border:`1px solid ${C.border}`,borderRadius:'6px',cursor:'pointer',fontSize:'12px',background:'transparent',color:C.text}}>코멘트 추가</button>

              <div style={{fontSize:'36px',marginBottom:12}}>📋</div>
              좌측 조항을 클릭하면<br/>상세 리뷰 내용이 표시됩니다.
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

// ─── 결재 프로세스 빌더 ───
function WorkflowBuilder(){
  const [nodes,setNodes]=useState(WORKFLOW_NODES);
  const [selected,setSelected]=useState(null);
  const [toast,setToast]=useState('');
  const [showAddModal,setShowAddModal]=useState(false);
  const [newNodeName,setNewNodeName]=useState('');
  const [newNodeRole,setNewNodeRole]=useState('');

  const EDGES=[{from:'n1',to:'n2'},{from:'n1',to:'n3'},{from:'n2',to:'n4'},{from:'n3',to:'n4'},{from:'n4',to:'n5'},{from:'n5',to:'n6'}];

  function addNode(){
    if(!newNodeName.trim()){setToast('단계명을 입력하세요.');return;}
    const newId=`n${nodes.length+1}`;
    setNodes(prev=>[...prev,{id:newId,type:'review',label:newNodeName,role:newNodeRole||'미지정',x:400+(nodes.length-4)*80,y:350,color:'#8B5CF6'}]);
    setShowAddModal(false);setNewNodeName('');setNewNodeRole('');
    setToast('새 결재 단계가 추가되었습니다.');
  }

  const typeLabels={start:'시작',review:'검토',approve:'승인',end:'완료'};
  const templateOptions=['IT 서비스 계약 결재선','일반 구매 계약 결재선','중요 계약 결재선 (이사회)'];

  return(
    <div>
      {toast&&<Toast msg={toast} onClose={()=>setToast('')}/>}
      {showAddModal&&(
        <Modal title="결재 단계 추가" onClose={()=>setShowAddModal(false)} width={480}>
          <div style={{display:'flex',flexDirection:'column',gap:14}}>
            <div>
              <label style={{fontSize:'12px',color:C.textSm,fontWeight:600,display:'block',marginBottom:4}}>단계명 *</label>
              <input value={newNodeName} onChange={e=>setNewNodeName(e.target.value)} placeholder="예: 법무담당 1차 검토" style={{width:'100%',padding:'8px 10px',border:`1px solid ${C.border}`,borderRadius:'6px',fontSize:'13px',outline:'none'}}/>
            </div>
            <div>
              <label style={{fontSize:'12px',color:C.textSm,fontWeight:600,display:'block',marginBottom:4}}>담당 역할</label>
              <select value={newNodeRole} onChange={e=>setNewNodeRole(e.target.value)} style={{width:'100%',padding:'8px 10px',border:`1px solid ${C.border}`,borderRadius:'6px',fontSize:'13px',cursor:'pointer',outline:'none',color:C.text}}>
                <option value="">역할 선택</option>
                <option>법무 담당자</option><option>법무팀장</option><option>재무이사</option><option>대표이사</option>
              </select>
            </div>
            <div>
              <label style={{fontSize:'12px',color:C.textSm,fontWeight:600,display:'block',marginBottom:4}}>노드 유형</label>
              <div style={{display:'flex',gap:8}}>
                {['검토','승인','조건 분기','알림 발송'].map(t=>(
                  <button key={t} style={{flex:1,padding:'6px',border:`1px solid ${C.border}`,borderRadius:'5px',fontSize:'11px',cursor:'pointer',background:'transparent',color:C.textSm}}>{t}</button>
                ))}
              </div>
            </div>
          </div>
          <div style={{display:'flex',gap:10,marginTop:20,justifyContent:'flex-end'}}>
            <button onClick={()=>setShowAddModal(false)} style={{padding:'8px 20px',border:`1px solid ${C.border}`,borderRadius:'6px',cursor:'pointer',fontSize:'13px',background:'transparent'}}>취소</button>
            <button onClick={addNode} style={{padding:'8px 20px',border:'none',borderRadius:'6px',cursor:'pointer',fontSize:'13px',background:C.accent,color:'#fff',fontWeight:600}}>추가</button>
          </div>
        </Modal>
      )}

      <div style={{display:'grid',gridTemplateColumns:'1fr 280px',gap:16}}>
        <div>
          <div style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:'8px',padding:20,marginBottom:16}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16}}>
              <div>
                <div style={{fontSize:'13px',fontWeight:700,color:C.text,marginBottom:4}}>결재 프로세스 설계</div>
                <div style={{fontSize:'11px',color:C.textSm}}>노드를 클릭하여 상세 설정을 변경할 수 있습니다</div>
              </div>
              <div style={{display:'flex',gap:8}}>
                <select style={{padding:'6px 10px',border:`1px solid ${C.border}`,borderRadius:'5px',fontSize:'12px',cursor:'pointer',outline:'none',color:C.text,background:C.surface}}>
                  {templateOptions.map(t=><option key={t}>{t}</option>)}
                </select>
                <button onClick={()=>setShowAddModal(true)} style={{padding:'6px 14px',border:'none',borderRadius:'5px',background:C.accent,color:'#fff',fontSize:'12px',fontWeight:600,cursor:'pointer'}}>+ 단계 추가</button>
              </div>
            </div>
            <div style={{position:'relative',height:420,background:'#FAFBFC',borderRadius:'8px',border:`1px solid ${C.border}`,overflow:'hidden'}}>
              <svg style={{position:'absolute',inset:0,width:'100%',height:'100%'}} xmlns="http://www.w3.org/2000/svg">
                <defs><marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="#CBD5E1"/></marker></defs>
                {EDGES.map((e,i)=>{
                  const f=nodes.find(n=>n.id===e.from),t=nodes.find(n=>n.id===e.to);
                  if(!f||!t)return null;
                  return <path key={i} d={`M ${f.x+70} ${f.y+20} C ${(f.x+t.x)/2+70} ${f.y+20} ${(f.x+t.x)/2+70} ${t.y+20} ${t.x} ${t.y+20}`} stroke="#CBD5E1" strokeWidth="1.5" fill="none" markerEnd="url(#arrow)"/>;
                })}
              </svg>
              {nodes.map(node=>(
                <div key={node.id} onClick={()=>setSelected(node)} style={{position:'absolute',left:node.x,top:node.y,width:140,cursor:'pointer',userSelect:'none',transition:'transform .1s'}}
                  onMouseEnter={e=>{e.currentTarget.style.transform='scale(1.05)'}}
                  onMouseLeave={e=>{e.currentTarget.style.transform='scale(1)'}}>
                  <div style={{background:selected?.id===node.id?node.color:C.surface,border:`2px solid ${selected?.id===node.id?node.color:C.border}`,borderRadius:'8px',padding:'10px 14px',boxShadow:'0 2px 8px rgba(0,0,0,0.08)'}}>
                    <div style={{fontSize:'10px',color:selected?.id===node.id?'rgba(255,255,255,0.7)':C.textSm,fontWeight:600,textTransform:'uppercase',marginBottom:4}}>{typeLabels[node.type]}</div>
                    <div style={{fontSize:'12px',fontWeight:700,color:selected?.id===node.id?'#fff':C.text,marginBottom:2}}>{node.label}</div>
                    <div style={{fontSize:'10px',color:selected?.id===node.id?'rgba(255,255,255,0.8)':C.textSm}}>{node.role}</div>
                  </div>
                </div>
              ))}
            </div>

// ─── 자연어 검색 ───
function SearchPage(){
  const [query,setQuery]=useState('');
  const [chips,setChips]=useState([]);
  const [results,setResults]=useState([]);
  const [searching,setSearching]=useState(false);
  const [selected,setSelected]=useState(null);

  function runSearch(q){
    if(!q.trim())return;
    setSearching(true);
    setTimeout(()=>{
      const lower=q.toLowerCase();
      let filtered=CONTRACTS;
      if(lower.includes('it')||lower.includes('서비스'))filtered=filtered.filter(c=>c.type.includes('서비스'));
      if(lower.includes('만료'))filtered=filtered.filter(c=>c.status==='만료예정'||c.status==='활성');
      if(lower.includes('high')||lower.includes('리스크'))filtered=filtered.filter(c=>c.risk==='high');
      if(lower.includes('대기'))filtered=filtered.filter(c=>c.status==='결재대기');
      if(lower.includes('김'))filtered=filtered.filter(c=>c.assignee.includes('김'));
      setResults(filtered.length?filtered:CONTRACTS.slice(0,4));
      setChips(parseChips(q));
      setSearching(false);
    },800);
  }

  function parseChips(q){
    const chips=[];
    if(q.includes('30일'))chips.push({label:'만료: 30일 이내',color:C.med});
    if(q.toLowerCase().includes('it')||q.includes('서비스'))chips.push({label:'유형: IT 서비스',color:C.accent});
    if(q.includes('리스크')||q.includes('high'))chips.push({label:'리스크: High',color:'#DC2626'});
    if(q.includes('결재'))chips.push({label:'상태: 결재대기',color:'#7C3AED'});
    if(q.includes('김'))chips.push({label:'담당: 김법무',color:C.primary});
    if(chips.length===0)chips.push({label:`키워드: ${q}`,color:C.primary});
    return chips;
  }

  return(
    <div>
      {selected&&(
        <Modal title="계약 상세" onClose={()=>setSelected(null)}>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>
            {[['계약번호',selected.id],['계약명',selected.name],['계약유형',selected.type],['계약 상대방',selected.party],['계약 시작일',selected.start],['계약 종료일',selected.end],['계약금액',selected.amount],['담당자',selected.assignee],['결재자',selected.approver]].map(([k,v])=>(
              <div key={k} style={{padding:'10px',background:'#F8FAFC',borderRadius:'6px',border:`1px solid ${C.border}`}}>
                <div style={{fontSize:'11px',color:C.textSm,fontWeight:600,marginBottom:3}}>{k}</div>
                <div style={{fontSize:'13px',color:C.text,fontWeight:k==='계약금액'?700:400}}>{v}</div>
              </div>
            ))}
          </div>
          <div style={{display:'flex',gap:10,marginTop:16}}>
            <div style={{flex:1}}><Badge text={selected.status}/></div>
            <div><Badge text={selected.risk}/></div>
          </div>
          <div style={{display:'flex',gap:10,marginTop:16,justifyContent:'flex-end'}}>
            <button onClick={()=>setSelected(null)} style={{padding:'8px 20px',border:`1px solid ${C.border}`,borderRadius:'6px',cursor:'pointer',fontSize:'13px',background:'transparent'}}>닫기</button>
            <button style={{padding:'8px 20px',border:'none',borderRadius:'6px',cursor:'pointer',fontSize:'13px',background:C.accent,color:'#fff',fontWeight:600}}>AI 리뷰 실행</button>
          </div>
        </Modal>
      )}

      <div style={{maxWidth:700,margin:'0 auto 24px'}}>
        <div style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:'10px',padding:'6px 16px 6px 6px',display:'flex',alignItems:'center',gap:10,boxShadow:'0 2px 12px rgba(0,0,0,0.06)'}}>
          <div style={{padding:'8px 12px',background:C.accent,borderRadius:'7px',fontSize:'16px',lineHeight:1}}>🔍</div>
          <input value={query} onChange={e=>setQuery(e.target.value)} onKeyDown={e=>{if(e.key==='Enter')runSearch(query);}} placeholder="자연어로 계약을 검색하세요 — 예: 만료 30일 이내 IT 서비스 계약" style={{flex:1,border:'none',outline:'none',fontSize:'14px',color:C.text,background:'transparent'}}/>
          <button onClick={()=>runSearch(query)} style={{padding:'8px 20px',border:'none',borderRadius:'7px',background:C.primary,color:'#fff',fontWeight:600,fontSize:'13px',cursor:'pointer',flexShrink:0}}>검색</button>
        </div>
        {chips.length>0&&(
          <div style={{display:'flex',gap:6,flexWrap:'wrap',marginTop:10,paddingLeft:4}}>
            <span style={{fontSize:'11px',color:C.textSm}}>파싱된 필터:</span>
            {chips.map((c,i)=>(
              <span key={i} style={{padding:'3px 10px',borderRadius:'12px',fontSize:'11px',fontWeight:600,color:c.color,background:`${c.color}15`,border:`1px solid ${c.color}30`}}>✓ {c.label}</span>

        )}
      </div>

      {!results.length&&(
        <div>
          <div style={{fontSize:'13px',fontWeight:700,color:C.text,marginBottom:12}}>자주 사용하는 검색</div>
          <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:10}}>
            {SEARCH_SUGGESTIONS.map(s=>(
              <button key={s} onClick={()=>{setQuery(s);runSearch(s);}} style={{padding:'12px 16px',background:C.surface,border:`1px solid ${C.border}`,borderRadius:'8px',cursor:'pointer',fontSize:'12px',color:C.text,textAlign:'left',transition:'all .1s'}}
                onMouseEnter={e=>{e.currentTarget.style.background='#F0F9FF';e.currentTarget.style.borderColor=C.accent}}
                onMouseLeave={e=>{e.currentTarget.style.background=C.surface;e.currentTarget.style.borderColor=C.border}}>
                🔍 {s}
              </button>
            ))}
          </div>
        </div>
      )}

      {searching&&(
        <div style={{textAlign:'center',padding:'40px',color:C.textSm,fontSize:'13px'}}>
          <div style={{fontSize:'24px',marginBottom:12}}>🤖</div>
          AI가 쿼리를 분석하고 검색 중입니다...
        </div>
      )}

      {results.length>0&&!searching&&(
        <div>
          <div style={{fontSize:'13px',color:C.textSm,marginBottom:12}}>검색 결과 <strong style={{color:C.text}}>{results.length}건</strong></div>
          <div style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:'8px',overflow:'hidden'}}>
            <table style={{width:'100%',borderCollapse:'collapse',fontSize:'12px'}}>
              <thead>
                <tr style={{background:'#F8FAFC'}}>
                  {['계약번호','계약명','유형','계약 상대방','계약금액','상태','리스크','담당자',''].map(h=><th key={h} style={{padding:'10px 14px',textAlign:'left',color:C.textSm,fontWeight:600,borderBottom:`1px solid ${C.border}`}}>{h}</th>)}
                </tr>
              </thead>
              <tbody>
                {results.map((c,i)=>(
                  <tr key={c.id} onClick={()=>setSelected(c)} style={{borderBottom:`1px solid ${C.border}`,background:i%2===0?C.surface:'#FAFBFC',cursor:'pointer',transition:'background .1s'}}
                    onMouseEnter={e=>{e.currentTarget.style.background='#EFF6FF'}}
                    onMouseLeave={e=>{e.currentTarget.style.background=i%2===0?C.surface:'#FAFBFC'}}>
                    <td style={{padding:'10px 14px',color:C.accent,fontWeight:600}}>{c.id}</td>
                    <td style={{padding:'10px 14px',color:C.text,maxWidth:180,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{c.name}</td>
                    <td style={{padding:'10px 14px',color:C.textSm}}>{c.type}</td>
                    <td style={{padding:'10px 14px',color:C.textSm}}>{c.party}</td>
                    <td style={{padding:'10px 14px',fontWeight:600}}>{c.amount}</td>
                    <td style={{padding:'10px 14px'}}><Badge text={c.status}/></td>
                    <td style={{padding:'10px 14px'}}><Badge text={c.risk}/></td>
                    <td style={{padding:'10px 14px',color:C.textSm}}>{c.assignee}</td>
                    <td style={{padding:'10px 14px'}}><button style={{padding:'4px 10px',border:'none',borderRadius:'4px',background:C.accent,color:'#fff',fontSize:'11px',cursor:'pointer',fontWeight:600}}>상세</button></td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        </div>
      )}
    </div>
  );
}

// ─── 메인 앱 ───
const NAV_ITEMS=[
  {key:'dashboard',label:'권한별 대시보드',icon:'📊'},
  {key:'upload',label:'계약서 업로드 & AI 메타데이터 추출',icon:'📤'},
  {key:'ai-review',label:'AI 계약 리뷰 & 체크리스트',icon:'🤖'},
  {key:'workflow-builder',label:'결재 프로세스 빌더',icon:'⚙️'},
  {key:'org-management',label:'조직도 & 권한 관리',icon:'🏢'},
  {key:'search',label:'자연어 계약 검색',icon:'🔍'},
];

function App(){
  const [page,setPage]=useState('dashboard');
  const current=NAV_ITEMS.find(n=>n.key===page);

  function renderPage(){
    switch(page){
      case 'dashboard':return <Dashboard/>;
      case 'upload':return <Upload/>;
      case 'ai-review':return <AIReview/>;
      case 'workflow-builder':return <WorkflowBuilder/>;
      case 'org-management':return <OrgManagement/>;
      case 'search':return <SearchPage/>;
      default:return <Dashboard/>;
    }
  }

  return(
    <div style={{display:'flex',minHeight:'100vh',fontFamily:'Pretendard, sans-serif'}}>
      {/* 사이드바 */}
      <aside style={{width:260,background:C.sidebar,flexShrink:0,display:'flex',flexDirection:'column',position:'fixed',top:0,left:0,bottom:0,zIndex:100}}>
        <div style={{padding:'20px 16px',borderBottom:`1px solid ${C.sidebarBorder}`}}>
          <div style={{display:'flex',alignItems:'center',gap:10}}>
            <div style={{width:32,height:32,borderRadius:'7px',background:C.accent,display:'flex',alignItems:'center',justifyContent:'center',fontSize:'14px',fontWeight:900,color:'#fff',flexShrink:0}}>L</div>
            <div>
              <div style={{fontWeight:800,fontSize:'15px',color:'#F8FAFC',letterSpacing:'-0.3px'}}>LexCore</div>
              <div style={{fontSize:'10px',color:C.sidebarText}}>AI 법무관리시스템</div>
            </div>
          </div>
        </div>

        <div style={{padding:'12px 10px',borderBottom:`1px solid ${C.sidebarBorder}`}}>
          <div style={{background:'rgba(255,255,255,0.06)',borderRadius:'6px',padding:'7px 10px',display:'flex',alignItems:'center',gap:8}}>
            <span style={{fontSize:'12px'}}>🏢</span>
            <select style={{background:'transparent',border:'none',color:C.sidebarText,fontSize:'12px',cursor:'pointer',outline:'none',flex:1}}>
              <option>코리아플렉스 (주) — 법무팀</option>
              <option>넥서스 인프라 (유)</option>
            </select>
          </div>
        </div>

        <nav style={{flex:1,padding:'8px 10px',overflow:'auto'}}>
          <div style={{fontSize:'10px',color:'rgba(255,255,255,0.35)',fontWeight:700,textTransform:'uppercase',letterSpacing:'1px',padding:'10px 6px 6px'}}>주요 기능</div>
          {NAV_ITEMS.map(item=>{
            const active=page===item.key;
            return(
              <button key={item.key} onClick={()=>setPage(item.key)} title={item.label} style={{display:'flex',alignItems:'center',gap:10,width:'100%',padding:'9px 10px',borderRadius:'7px',border:'none',cursor:'pointer',background:active?C.accent:'transparent',color:active?'#fff':C.sidebarText,fontSize:'12px',fontWeight:active?700:400,textAlign:'left',marginBottom:2,transition:'all .15s',whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}
                onMouseEnter={e=>{if(!active){e.currentTarget.style.background='rgba(255,255,255,0.08)';e.currentTarget.style.color='#F8FAFC';}}}
                onMouseLeave={e=>{if(!active){e.currentTarget.style.background='transparent';e.currentTarget.style.color=C.sidebarText;}}}>
                <span style={{fontSize:'14px',flexShrink:0}}>{item.icon}</span>
                <span style={{overflow:'hidden',textOverflow:'ellipsis'}}>{item.label}</span>
              </button>
            );
          })}
        </nav>

        <div style={{padding:'12px 16px',borderTop:`1px solid ${C.sidebarBorder}`}}>
          <div style={{display:'flex',alignItems:'center',gap:10}}>
            <div style={{width:30,height:30,borderRadius:'50%',background:C.primary,color:'#fff',display:'flex',alignItems:'center',justifyContent:'center',fontSize:'12px',fontWeight:700,flexShrink:0}}>이</div>
            <div style={{overflow:'hidden'}}>
              <div style={{fontSize:'12px',fontWeight:600,color:'#F8FAFC',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>이재원 팀장</div>
              <div style={{fontSize:'10px',color:C.sidebarText}}>법무팀 · 관리자</div>
            </div>
            <span style={{marginLeft:'auto',fontSize:'14px',cursor:'pointer',color:C.sidebarText}}>⋮</span>
          </div>
        </div>
      </aside>

      {/* 메인 */}
      <div style={{flex:1,display:'flex',flexDirection:'column',marginLeft:260}}>
        <header style={{background:C.surface,borderBottom:`1px solid ${C.border}`,padding:'0 24px',height:56,display:'flex',alignItems:'center',gap:16,position:'sticky',top:0,zIndex:90}}>
          <div style={{flex:1}}>
            <div style={{fontSize:'14px',fontWeight:700,color:C.text}}>{current?.label}</div>
          </div>
          <div style={{display:'flex',alignItems:'center',gap:12}}>
            <div style={{background:'#F1F5F9',borderRadius:'6px',padding:'6px 12px',display:'flex',alignItems:'center',gap:8,width:200}}>
              <span style={{fontSize:'12px',color:C.textSm}}>🔍</span>
              <input placeholder="빠른 검색..." style={{border:'none',outline:'none',fontSize:'12px',color:C.text,background:'transparent',width:'100%'}}/>
            </div>
            <button style={{position:'relative',background:'none',border:'none',cursor:'pointer',fontSize:'18px',color:C.textSm,padding:4}}>
              🔔
              <span style={{position:'absolute',top:0,right:0,width:8,height:8,background:'#EF4444',borderRadius:'50%'}}/>
            </button>
            <div style={{width:30,height:30,borderRadius:'50%',background:C.primary,color:'#fff',display:'flex',alignItems:'center',justifyContent:'center',fontSize:'12px',fontWeight:700,cursor:'pointer'}}>이</div>
          </div>
        </header>
        <main style={{flex:1,overflow:'auto',padding:24,background:C.bg}}>
          {renderPage()}
        </main>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
