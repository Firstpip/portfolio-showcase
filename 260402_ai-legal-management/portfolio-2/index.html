function Badge({text,type}){
  const map={현행:{bg:'#DCFCE7',c:'#15803D'},검토중:{bg:'#FEF3C7',c:'#B45309'},개정중:{bg:'#EDE9FE',c:'#6D28D9'},검토요청:{bg:'#FFE4E6',c:'#BE123C'},즉시조치:{bg:'#FFE4E6',c:'#DC2626'},검토권고:{bg:'#FEF3C7',c:'#D97706'},참고:{bg:'#F0FDF4',c:'#16A34A'},high:{bg:'#FFE4E6',c:'#DC2626'},med:{bg:'#FEF3C7',c:'#D97706'},low:{bg:'#DCFCE7',c:'#15803D'}};
  const s=map[type||text]||{bg:'#F1F5F9',c:'#475569'};
  return <span style={{background:s.bg,color:s.c,padding:'2px 8px',borderRadius:'4px',fontSize:'11px',fontWeight:600,whiteSpace:'nowrap'}}>{text}</span>;
}

function Drawer({item,onClose}){
  const [activeTab,setActiveTab]=useState('info');
  return(
    <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.3)',zIndex:1000,display:'flex',justifyContent:'flex-end'}} onClick={onClose}>
      <div style={{width:480,background:C.surface,height:'100%',overflowY:'auto',boxShadow:'-4px 0 20px rgba(0,0,0,0.12)'}} onClick={e=>e.stopPropagation()}>
        <div style={{padding:'20px 24px',borderBottom:`1px solid ${C.borderGray}`,display:'flex',justifyContent:'space-between',alignItems:'center',background:'linear-gradient(135deg,#0066CC,#0284C7)',color:'#fff'}}>
          <div>
            <div style={{fontWeight:800,fontSize:'16px',marginBottom:2}}>{item.name}</div>
            <div style={{fontSize:'12px',opacity:0.8}}>{item.version} · {item.dept}</div>
          </div>
          <button onClick={onClose} style={{border:'none',background:'rgba(255,255,255,0.2)',cursor:'pointer',color:'#fff',width:28,height:28,borderRadius:'50%',fontSize:'14px',display:'flex',alignItems:'center',justifyContent:'center'}}>✕</button>
        </div>
        <div style={{display:'flex',gap:0,borderBottom:`1px solid ${C.borderGray}`}}>
          {[['info','기본 정보'],['review','AI 검토'],['history','이력']].map(([k,v])=>(
            <button key={k} onClick={()=>setActiveTab(k)} style={{flex:1,padding:'12px',border:'none',background:'transparent',cursor:'pointer',fontSize:'12px',fontWeight:600,color:activeTab===k?C.primary:C.textSm,borderBottom:`2px solid ${activeTab===k?C.primary:'transparent'}`,transition:'all .15s'}}>{v}</button>
          ))}
        </div>
        <div style={{padding:24}}>
          {activeTab==='info'&&(
            <div>
              {[['문서 ID',item.id],['카테고리',item.category],['현재 버전',item.version],['적용 범위',item.dept],['다음 검토일',item.reviewDate],['담당자',item.reviewer]].map(([k,v])=>(
                <div key={k} style={{display:'flex',justifyContent:'space-between',padding:'10px 0',borderBottom:`1px solid ${C.borderGray}`,fontSize:'13px'}}>
                  <span style={{color:C.textSm,fontWeight:600}}>{k}</span>
                  <span style={{color:C.text,fontWeight:400}}>{v}</span>
                </div>
              ))}
              <div style={{marginTop:16,display:'flex',gap:10}}>
                <div><Badge text={item.status}/></div>
                <div><Badge text={item.risk}/></div>
              </div>
              <div style={{display:'flex',gap:10,marginTop:20}}>
                <button style={{flex:1,padding:'9px',border:`1px solid ${C.border}`,borderRadius:'7px',cursor:'pointer',fontSize:'12px',fontWeight:600,background:'transparent',color:C.primary}}>결재 요청</button>
                <button style={{flex:1,padding:'9px',border:'none',borderRadius:'7px',cursor:'pointer',fontSize:'12px',fontWeight:600,background:C.primary,color:'#fff'}}>AI 검토 실행</button>
              </div>
            </div>
          )}
          {activeTab==='review'&&(
            <div>
              <div style={{padding:'12px',background:'#EFF6FF',borderRadius:'8px',marginBottom:16,fontSize:'12px',color:'#1D4ED8',border:'1px solid #BFDBFE'}}>
                🤖 적용 법률: 근로기준법, 최저임금법, 남녀고용평등법
              </div>
              {REVIEW_ITEMS.map((r,i)=>(
                <div key={i} style={{marginBottom:12,padding:'12px',background:'#F8FAFC',borderRadius:'8px',border:`1px solid ${C.borderGray}`}}>
                  <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:6}}>
                    <span style={{fontSize:'11px',fontWeight:700,color:C.text}}>{r.clause}</span>
                    <Badge text={r.severity}/>
                  </div>
                  <div style={{fontSize:'10px',color:C.textSm,marginBottom:4,fontWeight:600}}>근거: {r.law}</div>
                  <div style={{fontSize:'12px',color:C.text,lineHeight:1.5,marginBottom:8}}>{r.summary}</div>
                  <div style={{padding:'8px 10px',background:'#EFF6FF',borderRadius:'5px',fontSize:'11px',color:'#1D4ED8',lineHeight:1.5}}>💡 {r.suggestion}</div>
                </div>
              ))}
            </div>
          )}
          {activeTab==='history'&&(
            <div>
              {VERSIONS.map((v,i)=>(
                <div key={i} style={{display:'flex',gap:12,marginBottom:16,paddingBottom:16,borderBottom:i<VERSIONS.length-1?`1px solid ${C.borderGray}`:'none'}}>
                  <div style={{display:'flex',flexDirection:'column',alignItems:'center',gap:4}}>
                    <div style={{width:10,height:10,borderRadius:'50%',background:i===0?C.primary:'#CBD5E1',flexShrink:0,marginTop:3}}/>
                    {i<VERSIONS.length-1&&<div style={{width:1,flex:1,background:'#CBD5E1'}}/>}
                  </div>
                  <div style={{flex:1}}>
                    <div style={{display:'flex',justifyContent:'space-between',marginBottom:4}}>
                      <span style={{fontWeight:700,color:C.text,fontSize:'13px'}}>{v.v}</span>
                      <span style={{fontSize:'11px',color:C.textSm}}>{v.date}</span>
                    </div>
                    <div style={{fontSize:'12px',color:C.text,marginBottom:4}}>{v.reason}</div>
                    <div style={{fontSize:'11px',color:C.textSm,marginBottom:4}}>승인자: {v.approver}</div>
                    <div style={{padding:'6px 10px',background:'#F0F9FF',borderRadius:'5px',fontSize:'11px',color:C.primary}}>AI 요약: {v.aiSummary}</div>
                  </div>
                </div>
              ))}
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

function Toast({msg,onClose}){
  useEffect(()=>{const t=setTimeout(onClose,2500);return()=>clearTimeout(t);},[]);
  return <div style={{position:'fixed',bottom:24,right:24,background:'#0F172A',color:'#fff',padding:'12px 20px',borderRadius:'8px',fontSize:'13px',zIndex:9999,boxShadow:'0 4px 20px rgba(0,0,0,0.3)'}}>{msg}</div>;
}

// ─── 정책 문서 허브 ───
function PolicyHub(){
  const [filter,setFilter]=useState('전체');
  const [statusFilter,setStatusFilter]=useState('전체');
  const [drawer,setDrawer]=useState(null);
  const cats=['전체','근로조건','급여/복리','교육/훈련','채용'];
  const statuses=['전체','현행','검토중','개정중','검토요청'];
  const filtered=POLICIES.filter(p=>(filter==='전체'||p.category===filter)&&(statusFilter==='전체'||p.status===statusFilter));
  return(
    <div>
      {drawer&&<Drawer item={drawer} onClose={()=>setDrawer(null)}/>}
      <div style={{background:'linear-gradient(135deg,#0284C7,#0EA5E9)',borderRadius:'12px',padding:'20px 28px',marginBottom:20,color:'#fff'}}>
        <div style={{fontSize:'12px',opacity:.7,fontWeight:600,marginBottom:4}}>POLICY HUB</div>
        <div style={{fontSize:'20px',fontWeight:800,marginBottom:8}}>정책 문서 허브</div>
        <div style={{display:'flex',gap:24}}>
          {[{l:'전체 문서',v:'38건'},{l:'현행',v:'24건'},{l:'검토 필요',v:'9건'},{l:'만료',v:'5건'}].map(i=>(
            <div key={i.l}><span style={{fontWeight:800,fontSize:'18px'}}>{i.v}</span><span style={{fontSize:'11px',opacity:.7,marginLeft:4}}>{i.l}</span></div>
          ))}
        </div>
      </div>
      <div style={{display:'flex',gap:8,marginBottom:16,flexWrap:'wrap',alignItems:'center'}}>

      </div>
    </div>
  );
}

              </select>
              <span style={{color:C.textSm}}>↔</span>
              <select value={compareB} onChange={e=>setCompareB(e.target.value)} style={{padding:'5px 10px',border:`1px solid ${C.borderGray}`,borderRadius:'5px',fontSize:'12px',cursor:'pointer',outline:'none'}}>
                {versions.map(v=><option key={v}>{v}</option>)}
              </select>
            </div>
            <div style={{padding:'8px 4px'}}>
              <div style={{padding:'6px 16px',fontSize:'11px',fontWeight:600,color:C.textSm,display:'flex',gap:16,borderBottom:`1px solid ${C.borderGray}`,marginBottom:4}}>
                <span style={{display:'flex',alignItems:'center',gap:4}}><span style={{width:10,height:10,background:'#DCFCE7',border:'1px solid #86EFAC',borderRadius:2,display:'inline-block'}}/>추가</span>
                <span style={{display:'flex',alignItems:'center',gap:4}}><span style={{width:10,height:10,background:'#FFE4E6',border:'1px solid #FECDD3',borderRadius:2,display:'inline-block'}}/>삭제</span>
                <span style={{display:'flex',alignItems:'center',gap:4}}><span style={{width:10,height:10,background:'#F8FAFC',border:'1px solid #E2E8F0',borderRadius:2,display:'inline-block'}}/>변경 없음</span>
              </div>
              {diffLines.map((l,i)=>(
                <div key={i} style={{padding:'6px 16px',background:l.type==='added'?'#F0FDF4':l.type==='removed'?'#FFF1F2':'transparent',borderLeft:`3px solid ${l.type==='added'?'#86EFAC':l.type==='removed'?'#FECDD3':'transparent'}`,fontSize:'12px',color:l.type==='added'?'#166534':l.type==='removed'?'#9F1239':C.text,lineHeight:1.6,fontFamily:'monospace',marginBottom:1}}>
                  <span style={{marginRight:8,fontWeight:700,opacity:.6}}>{l.type==='added'?'+':l.type==='removed'?'-':' '}</span>{l.text}
                </div>
              ))}
            </div>
          </div>
        </div>
      </div>
    </div>
  );
}

// ─── 메인 앱 (topnav-hero) ───
const NAV_TABS=[
  {key:'compliance-dashboard',label:'팀별 정책 준수 현황 대시보드',icon:'📊'},
  {key:'policy-hub',label:'정책 문서 허브',icon:'📁'},
  {key:'compliance-review',label:'AI 노동법 컴플라이언스 검토',icon:'🤖'},
  {key:'approval-workflow',label:'정책 개정 승인 워크플로우',icon:'✅'},
  {key:'version-history',label:'정책 버전 히스토리 & 비교',icon:'🔄'},
];

function App(){
  const [tab,setTab]=useState('compliance-dashboard');
  function renderTab(){
    switch(tab){
      case 'compliance-dashboard':return <ComplianceDashboard/>;
      case 'policy-hub':return <PolicyHub/>;
      case 'compliance-review':return <ComplianceReview/>;
      case 'approval-workflow':return <ApprovalWorkflow/>;
      case 'version-history':return <VersionHistory/>;
      default:return <ComplianceDashboard/>;
    }
  }
  return(
    <div style={{minHeight:'100vh',background:C.bg,fontFamily:'Pretendard, sans-serif'}}>
      {/* 탑 네비 */}
      <nav style={{background:C.nav,borderBottom:`1px solid ${C.navBorder}`,position:'sticky',top:0,zIndex:100,boxShadow:'0 1px 8px rgba(0,102,204,0.06)'}}>
        <div style={{maxWidth:1400,margin:'0 auto',padding:'0 24px',display:'flex',alignItems:'center',gap:0,height:56}}>
          <div style={{display:'flex',alignItems:'center',gap:8,marginRight:32,flexShrink:0}}>
            <div style={{width:28,height:28,borderRadius:'6px',background:C.primary,display:'flex',alignItems:'center',justifyContent:'center',fontSize:'14px',fontWeight:900,color:'#fff'}}>P</div>
            <span style={{fontWeight:900,fontSize:'15px',color:C.secondary,letterSpacing:'-0.3px'}}>PolicyGuard</span>
          </div>
          <div style={{display:'flex',gap:0,flex:1,overflow:'auto'}}>
            {NAV_TABS.map(t=>(
              <button key={t.key} onClick={()=>setTab(t.key)} title={t.label} style={{display:'flex',alignItems:'center',gap:6,padding:'16px 14px',border:'none',background:'transparent',cursor:'pointer',fontSize:'12px',fontWeight:600,color:tab===t.key?C.primary:C.textSm,borderBottom:`2px solid ${tab===t.key?C.primary:'transparent'}`,whiteSpace:'nowrap',transition:'all .15s'}}
                onMouseEnter={e=>{if(tab!==t.key)e.currentTarget.style.color=C.primary;}}
                onMouseLeave={e=>{if(tab!==t.key)e.currentTarget.style.color=C.textSm;}}>
                <span>{t.icon}</span><span>{t.label}</span>
              </button>
            ))}
          </div>
          <div style={{display:'flex',alignItems:'center',gap:10,marginLeft:16,flexShrink:0}}>
            <button style={{padding:'6px 14px',border:`1px solid ${C.border}`,borderRadius:'6px',background:'transparent',color:C.primary,fontSize:'12px',fontWeight:600,cursor:'pointer'}}>🔔 알림 3</button>
            <div style={{width:30,height:30,borderRadius:'50%',background:C.primary,color:'#fff',display:'flex',alignItems:'center',justifyContent:'center',fontSize:'12px',fontWeight:700,cursor:'pointer'}}>이</div>
          </div>
        </div>
      </nav>
      <main style={{maxWidth:1400,margin:'0 auto',padding:'24px'}}>
        {renderTab()}
      </main>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
