function Badge({text,type}){
  const map={active:{bg:'#DCFCE7',c:'#15803D'},trial:{bg:'#FEF3C7',c:'#B45309'},Enterprise:{bg:'#EDE9FE',c:'#6D28D9'},Pro:{bg:'#DBEAFE',c:'#1D4ED8'},Free:{bg:'#F3F4F6',c:'#374151'}};
  const s=map[type||text]||{bg:'#F1F5F9',c:'#475569'};
  return <span style={{background:s.bg,color:s.c,padding:'2px 8px',borderRadius:'4px',fontSize:'11px',fontWeight:600,whiteSpace:'nowrap'}}>{text}</span>;
}

function DetailPanel({item,onClose}){
  return(
    <div style={{background:C.surface,borderLeft:`1px solid ${C.border}`,padding:20,height:'100%',overflowY:'auto'}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16}}>
        <span style={{fontWeight:800,fontSize:'14px',color:C.text}}>{item.name || item.id}</span>
        <button onClick={onClose} style={{border:'none',background:'#F3F4F6',cursor:'pointer',width:24,height:24,borderRadius:'50%',fontSize:'12px',color:C.textGray}}>✕</button>
      </div>
      {item.plan&&(
        <div style={{display:'flex',flexDirection:'column',gap:8}}>
          {[['테넌트 ID',item.id],['플랜',item.plan],['계약 수',`${item.contracts}건`],['결재 완료율',`${item.rate}%`],['사용자 수',`${item.users}명`],['가입일',item.since],['월 과금',`₩${item.monthly.toLocaleString()}`]].map(([k,v])=>(
            <div key={k} style={{display:'flex',justifyContent:'space-between',padding:'7px 0',borderBottom:`1px solid ${C.borderGray}`,fontSize:'12px'}}>
              <span style={{color:C.textGray,fontWeight:600}}>{k}</span>
              <span style={{color:C.text,fontWeight:k==='플랜'||k==='상태'?700:400}}>{v}</span>
            </div>
          ))}
          <div style={{marginTop:8}}><Badge text={item.plan}/></div>
          <button style={{marginTop:8,width:'100%',padding:'8px',border:'none',borderRadius:'7px',background:C.primary,color:'#fff',fontSize:'12px',fontWeight:700,cursor:'pointer'}}>플랜 변경</button>
        </div>
      )}
    </div>
  );
}

function Toast({msg,onClose}){
  useEffect(()=>{const t=setTimeout(onClose,2500);return()=>clearTimeout(t);},[]);
  return <div style={{position:'fixed',bottom:24,right:24,background:'#1E1B4B',color:'#fff',padding:'12px 20px',borderRadius:'8px',fontSize:'13px',zIndex:9999,boxShadow:'0 4px 20px rgba(0,0,0,0.3)'}}>{msg}</div>;
}

// ─── 플랫폼 분석 대시보드 ───
function AnalyticsDashboard(){
  const [period,setPeriod]=useState('30일');
  const [selected,setSelected]=useState(null);
  const scatterData=TENANTS.map(t=>({x:t.contracts,y:t.rate,z:t.users,name:t.name,plan:t.plan}));
  const planDist=[{name:'Enterprise',value:2,color:C.primary},{name:'Pro',value:3,color:C.accent},{name:'Free',value:1,color:'#E5E7EB'}];

  return(
    <div style={{display:'flex',gap:0,height:'100%'}}>
      <div style={{flex:1,overflow:'auto',padding:'0 1px'}}>
        <div style={{display:'flex',gap:10,marginBottom:16,alignItems:'center'}}>
          <div style={{flex:1}}>
            <div style={{fontSize:'16px',fontWeight:800,color:C.text}}>플랫폼 분석 대시보드</div>

            ))}

        </div>

              <div style={{fontSize:'22px',fontWeight:900,color:C.text,marginBottom:2}}>{k.v}</div>
              <div style={{fontSize:'11px',color:k.c,fontWeight:600}}>{k.sub}</div>
            </div>
          ))}
        </div>

        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:14,marginBottom:14}}>
          <div style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:'10px',padding:16}}>
            <div style={{fontSize:'12px',fontWeight:700,color:C.text,marginBottom:14}}>계약 처리량 + 결재 소요일</div>
            <ResponsiveContainer width="100%" height={180}>
              <ComposedChart data={TREND_DATA}>
                <CartesianGrid strokeDasharray="3 3" stroke="#F3F4F6"/>

                <Bar yAxisId="left" dataKey="계약수" fill={C.accent} radius={[3,3,0,0]} barSize={18}/>

              </div>
              <div style={{width:120,height:6,background:'#F3F4F6',borderRadius:3,overflow:'hidden',flexShrink:0}}>

        </div>
      )}
    </div>

}

// ─── 계약 템플릿 마켓플레이스 ───
function TemplateMarketplace(){
  const [category,setCategory]=useState('전체');
  const [search,setSearch]=useState('');
  const [selected,setSelected]=useState(null);
  const [preview,setPreview]=useState(null);
  const [toast,setToast]=useState('');
  const [formVals,setFormVals]=useState({});

  const cats=['전체','서비스 계약','용역 계약','비밀유지','구매 계약','도급 계약','위탁 계약'];
  const filtered=TEMPLATES.filter(t=>(category==='전체'||t.category===category)&&(search===''||t.name.includes(search)||t.industry.includes(search)));

  const NDA_TEMPLATE=`비밀유지 계약서

제1조 (목적)
본 계약서는 {{갑_회사명}}(이하 "갑")과 {{을_회사명}}(이하 "을") 사이에
비밀정보의 보호 및 관리에 관하여 다음과 같이 합의한다.

제2조 (비밀정보의 정의)
본 계약에서 "비밀정보"라 함은 {{비밀정보_범위}}에 관한 일체의 기술적,
영업적, 재무적 정보를 말한다.

제3조 (비밀유지 의무)
을은 갑의 비밀정보를 계약 종료 후 {{비밀유지_기간}}년간 제3자에게
공개하거나 누설하지 않는다.

제4조 (계약 기간)
본 계약의 유효기간은 {{계약_시작일}}부터 {{계약_종료일}}까지로 한다.

작성일: {{작성일}}`;

  const vars=selected?['갑_회사명','을_회사명','비밀정보_범위','비밀유지_기간','계약_시작일','계약_종료일','작성일']:[];

  function getPreviewText(){
    let txt=NDA_TEMPLATE;
    vars.forEach(v=>{if(formVals[v])txt=txt.replaceAll(`{{${v}}}`,formVals[v]);});
    return txt;
  }

  return(
    <div style={{display:'flex',gap:0,height:'100%'}}>
      {toast&&<Toast msg={toast} onClose={()=>setToast('')}/>}
      <div style={{flex:1,overflow:'auto'}}>
        <div style={{fontSize:'16px',fontWeight:800,color:C.text,marginBottom:4}}>계약 템플릿 마켓플레이스</div>
        <div style={{fontSize:'12px',color:C.textGray,marginBottom:16}}>검증된 계약서 템플릿을 바로 사용하거나 조직에 맞게 커스터마이징하세요</div>

        <div style={{display:'flex',gap:8,marginBottom:16,flexWrap:'wrap',alignItems:'center'}}>
          <div style={{background:'#F9FAFB',border:`1px solid ${C.borderGray}`,borderRadius:'8px',padding:'6px 12px',display:'flex',alignItems:'center',gap:8,flex:1,maxWidth:300}}>
            <span style={{fontSize:'13px',color:C.textGray}}>🔍</span>
            <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="계약 유형, 업종 검색..." style={{border:'none',outline:'none',fontSize:'12px',color:C.text,background:'transparent',width:'100%'}}/>
          </div>
          {cats.map(c=>(
            <button key={c} onClick={()=>setCategory(c)} style={{padding:'5px 12px',borderRadius:'20px',border:`1px solid ${category===c?C.primary:C.borderGray}`,background:category===c?C.primary:'transparent',color:category===c?'#fff':C.textGray,fontSize:'11px',fontWeight:600,cursor:'pointer'}}>{c}</button>
          ))}
        </div>

        {filtered.filter(t=>t.featured).length>0&&(
          <div style={{marginBottom:16}}>
            <div style={{fontSize:'12px',fontWeight:700,color:C.text,marginBottom:10}}>⭐ 추천 템플릿</div>
            <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:12}}>
              {filtered.filter(t=>t.featured).map(t=>(
                <div key={t.id} onClick={()=>setSelected(t)} style={{background:C.surface,border:`2px solid ${selected?.id===t.id?C.primary:C.border}`,borderRadius:'10px',padding:16,cursor:'pointer',transition:'all .15s'}}
                  onMouseEnter={e=>{if(selected?.id!==t.id){e.currentTarget.style.borderColor=C.accent;e.currentTarget.style.transform='translateY(-2px)';}}}
                  onMouseLeave={e=>{if(selected?.id!==t.id){e.currentTarget.style.borderColor=C.border;e.currentTarget.style.transform='';}}}>
                  <div style={{fontSize:'9px',fontWeight:700,color:C.primary,textTransform:'uppercase',letterSpacing:'0.5px',marginBottom:6}}>⭐ 추천</div>
                  <div style={{fontSize:'13px',fontWeight:700,color:C.text,marginBottom:6,lineHeight:1.3}}>{t.name}</div>
                  <div style={{fontSize:'11px',color:C.textGray,marginBottom:8}}>{t.category} · {t.industry}</div>
                  <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',fontSize:'11px'}}>
                    <span style={{color:C.textGray}}>⭐ {t.rating} · {t.uses.toLocaleString()}회</span>
                    <span style={{color:C.primary,fontWeight:600}}>변수 {t.vars}개</span>
                  </div>
                </div>
              ))}
            </div>
          </div>
        )}

        <div style={{fontSize:'12px',fontWeight:700,color:C.text,marginBottom:10}}>전체 템플릿 ({filtered.length}개)</div>
        <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:12}}>
          {filtered.map(t=>(
            <div key={t.id} onClick={()=>setSelected(t)} style={{background:C.surface,border:`1px solid ${selected?.id===t.id?C.primary:C.borderGray}`,borderRadius:'10px',padding:14,cursor:'pointer',transition:'all .15s'}}
              onMouseEnter={e=>{if(selected?.id!==t.id)e.currentTarget.style.borderColor=C.accent;}}
              onMouseLeave={e=>{if(selected?.id!==t.id)e.currentTarget.style.borderColor=C.borderGray;}}>
              <div style={{fontSize:'12px',fontWeight:700,color:C.text,marginBottom:4,lineHeight:1.3}}>{t.name}</div>

// ─── 테넌트 온보딩 ───
function TenantOnboarding(){
  const [step,setStep]=useState(0);
  const [completed,setCompleted]=useState([]);
  const [form,setForm]=useState({company:'',industry:'',employees:'',address:''});
  const [toast,setToast]=useState('');

  const stepContents=[
    {title:'회사 정보 입력',fields:[{k:'company',label:'회사명 *',placeholder:'(주)코리아테크'},{k:'industry',label:'업종 *',placeholder:'IT/소프트웨어'},{k:'employees',label:'직원 수',placeholder:'예: 50-100명'},{k:'address',label:'사업장 주소',placeholder:'서울 강남구 테헤란로 123'}]},
    {title:'조직/팀 설정',teams:['경영팀','법무팀','재무팀','구매팀','영업팀']},
    {title:'결재 라인 구성',flows:['기본 결재 (1단계)','표준 결재 (2단계)','중요 계약 (3단계)']},
    {title:'계약 카테고리 정의',cats:['서비스 계약','용역 계약','구매 계약','임대차 계약','비밀유지']},
    {title:'플레이북 설정',templates:['IT 서비스 표준 플레이북','구매 계약 기본 플레이북']},
    {title:'설정 완료',done:true},
  ];

  function next(){
    if(step<ONBOARDING_STEPS.length-1){setCompleted(p=>[...new Set([...p,step])]);setStep(s=>s+1);}
    else setToast('온보딩이 완료되었습니다! 워크스페이스가 활성화됩니다.');
  }

  const content=stepContents[step];
  const progress=Math.round(((step)/ONBOARDING_STEPS.length)*100);

  return(
    <div style={{maxWidth:760,margin:'0 auto'}}>
      {toast&&<Toast msg={toast} onClose={()=>setToast('')}/>}
      <div style={{fontSize:'16px',fontWeight:800,color:C.text,marginBottom:4}}>테넌트 워크스페이스 & 온보딩</div>
      <div style={{fontSize:'12px',color:C.textGray,marginBottom:20}}>새로운 회사의 독립 워크스페이스를 설정합니다</div>

      <div style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:'12px',padding:28}}>
        <div style={{marginBottom:24}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:8}}>
            <span style={{fontSize:'12px',fontWeight:700,color:C.text}}>설정 진행률</span>
            <span style={{fontSize:'12px',color:C.primary,fontWeight:700}}>{progress}%</span>
          </div>
          <div style={{height:8,background:'#F3F4F6',borderRadius:4,overflow:'hidden',marginBottom:16}}>
            <div style={{height:'100%',background:`linear-gradient(90deg,${C.primary},${C.accent})`,borderRadius:4,width:`${progress}%`,transition:'width .3s'}}/>
          </div>
          <div style={{display:'flex',gap:0}}>
            {ONBOARDING_STEPS.map((s,i)=>(
              <div key={s} style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',gap:4}}>
                <div onClick={()=>{if(completed.includes(i)||i===step)setStep(i);}} style={{width:28,height:28,borderRadius:'50%',background:completed.includes(i)?C.low:step===i?C.primary:'#E5E7EB',color:completed.includes(i)||step===i?'#fff':'#9CA3AF',display:'flex',alignItems:'center',justifyContent:'center',fontSize:'11px',fontWeight:700,cursor:'pointer',flexShrink:0}}>{completed.includes(i)?'✓':(i+1)}</div>

              </div>
            ))}
          </div>
        </div>

        <div style={{marginBottom:24}}>
          <div style={{fontSize:'15px',fontWeight:800,color:C.text,marginBottom:4}}>{content.title}</div>
          <div style={{fontSize:'12px',color:C.textGray,marginBottom:20}}>단계 {step+1} / {ONBOARDING_STEPS.length}</div>

          {content.fields&&(
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:14}}>
              {content.fields.map(f=>(
                <div key={f.k}>
                  <label style={{fontSize:'12px',color:C.textGray,fontWeight:600,display:'block',marginBottom:5}}>{f.label}</label>
                  <input value={form[f.k]} onChange={e=>setForm(p=>({...p,[f.k]:e.target.value}))} placeholder={f.placeholder} style={{width:'100%',padding:'9px 12px',border:`1px solid ${C.borderGray}`,borderRadius:'7px',fontSize:'13px',outline:'none',color:C.text,transition:'border .15s'}}

              ))}
            </div>
          )}
          {content.teams&&(
            <div>
              <div style={{fontSize:'12px',color:C.textGray,marginBottom:10}}>기본 팀 구성을 선택하세요 (추후 변경 가능)</div>
              <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
                {content.teams.map(t=>(
                  <label key={t} style={{display:'flex',alignItems:'center',gap:6,padding:'8px 14px',border:`1px solid ${C.border}`,borderRadius:'20px',cursor:'pointer',fontSize:'12px',fontWeight:600,color:C.primary,background:'#F5F3FF'}}>
                    <input type="checkbox" defaultChecked/>{t}

          )}
          {content.flows&&(
            <div style={{display:'flex',flexDirection:'column',gap:8}}>
              {content.flows.map((f,i)=>(
                <label key={f} style={{display:'flex',alignItems:'center',gap:10,padding:'12px 16px',border:`1px solid ${i===1?C.primary:C.borderGray}`,borderRadius:'8px',cursor:'pointer',background:i===1?'#F5F3FF':'transparent'}}>

                </label>
              ))}
            </div>
          )}
          {content.cats&&(
            <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
              {content.cats.map(c=>(
                <label key={c} style={{display:'flex',alignItems:'center',gap:6,padding:'7px 14px',border:`1px solid ${C.border}`,borderRadius:'20px',cursor:'pointer',fontSize:'12px',color:C.primary,background:'#F5F3FF'}}>
                  <input type="checkbox" defaultChecked/>{c}
                </label>
              ))}
            </div>
          )}
          {content.templates&&(
            <div style={{display:'flex',flexDirection:'column',gap:8}}>
              {content.templates.map(t=>(
                <label key={t} style={{display:'flex',alignItems:'center',gap:10,padding:'12px 16px',border:`1px solid ${C.borderGray}`,borderRadius:'8px',cursor:'pointer'}}>
                  <input type="checkbox" defaultChecked/><span style={{fontSize:'13px',color:C.text}}>{t}</span>
                </label>
              ))}
            </div>
          )}
          {content.done&&(
            <div style={{textAlign:'center',padding:'20px 0'}}>
              <div style={{fontSize:'48px',marginBottom:12}}>🎉</div>
              <div style={{fontSize:'18px',fontWeight:800,color:C.text,marginBottom:4}}>설정 완료!</div>
              <div style={{fontSize:'13px',color:C.textGray,lineHeight:1.6}}>워크스페이스가 준비되었습니다.<br/>대시보드로 이동하여 계약 관리를 시작하세요.</div>
            </div>

        </div>

        <div style={{display:'flex',justifyContent:'space-between',paddingTop:16,borderTop:`1px solid ${C.borderGray}`}}>

          <button onClick={next} style={{padding:'9px 24px',border:'none',borderRadius:'8px',cursor:'pointer',fontSize:'13px',fontWeight:700,background:C.primary,color:'#fff'}}>{step===ONBOARDING_STEPS.length-1?'완료':'다음 →'}</button>
        </div>
      </div>
    </div>
  );
}

// ─── AI 계약 & 결재 (테넌트 스코프) ───
function TenantContract(){
  const [quota,setQuota]=useState(23);
  const [tenant,setTenant]=useState('코리아테크');
  const [plan,setPlan]=useState('Enterprise');
  const [toast,setToast]=useState('');
  const [showUpgrade,setShowUpgrade]=useState(false);

  const quotaMax=plan==='Enterprise'?9999:plan==='Pro'?100:5;
  const quotaLeft=plan==='Enterprise'?'무제한':quotaMax-quota;
  const quotaPct=plan==='Enterprise'?20:Math.round((quota/quotaMax)*100);
  const isLow=plan!=='Enterprise'&&quotaPct>=80;

  function runReview(){
    if(plan==='Free'&&quota>=quotaMax){setShowUpgrade(true);return;}
    setQuota(q=>q+1);
    setToast('AI 계약 리뷰가 시작되었습니다.');
  }

  return(
    <div>
      {toast&&<Toast msg={toast} onClose={()=>setToast('')}/>}
      {showUpgrade&&(
        <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.4)',display:'flex',alignItems:'center',justifyContent:'center',zIndex:1000}}>
          <div style={{background:C.surface,borderRadius:'12px',padding:32,width:400,textAlign:'center',boxShadow:'0 20px 60px rgba(0,0,0,0.2)'}}>
            <div style={{fontSize:'36px',marginBottom:12}}>🚀</div>
            <div style={{fontSize:'17px',fontWeight:800,color:C.text,marginBottom:8}}>AI 리뷰 한도에 도달했습니다</div>
            <div style={{fontSize:'13px',color:C.textGray,lineHeight:1.6,marginBottom:20}}>Free 플랜은 월 5회 AI 리뷰를 제공합니다.<br/>Pro 플랜으로 업그레이드하면 월 100회를 사용할 수 있습니다.</div>
            <button onClick={()=>{setPlan('Pro');setShowUpgrade(false);setToast('Pro 플랜으로 업그레이드되었습니다.');}} style={{width:'100%',padding:'10px',border:'none',borderRadius:'8px',background:C.primary,color:'#fff',fontWeight:700,fontSize:'13px',cursor:'pointer',marginBottom:8}}>Pro로 업그레이드 (₩290K/월)</button>
            <button onClick={()=>setShowUpgrade(false)} style={{width:'100%',padding:'10px',border:`1px solid ${C.borderGray}`,borderRadius:'8px',background:'transparent',color:C.textGray,fontSize:'13px',cursor:'pointer'}}>나중에</button>
          </div>
        </div>
      )}

      <div style={{display:'flex',gap:10,marginBottom:16,alignItems:'center'}}>
        <div style={{fontSize:'16px',fontWeight:800,color:C.text,flex:1}}>AI 계약 검토 & 결재 (테넌트 스코프)</div>
        <div style={{display:'flex',gap:6,alignItems:'center'}}>
          <span style={{fontSize:'12px',color:C.textGray}}>현재 테넌트:</span>
          <select value={tenant} onChange={e=>setTenant(e.target.value)} style={{padding:'5px 10px',border:`1px solid ${C.border}`,borderRadius:'6px',fontSize:'12px',cursor:'pointer',outline:'none',color:C.text}}>
            {TENANTS.map(t=><option key={t.id}>{t.name}</option>)}
          </select>
          <Badge text={plan}/>
        </div>
      </div>

      {isLow&&(
        <div style={{padding:'10px 16px',background:'#FFFBEB',border:'1px solid #FDE68A',borderRadius:'8px',marginBottom:16,display:'flex',justifyContent:'space-between',alignItems:'center',fontSize:'12px',color:'#92400E'}}>
          <span>⚠️ AI 리뷰 잔여 횟수: <strong>{quotaLeft}회</strong> — 한도의 20% 미만입니다.</span>
          <button onClick={()=>setPlan('Enterprise')} style={{padding:'4px 12px',border:'none',borderRadius:'5px',background:'#D97706',color:'#fff',fontSize:'11px',fontWeight:700,cursor:'pointer'}}>업그레이드</button>
        </div>
      )}

      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:16,marginBottom:16}}>
        <div style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:'10px',padding:20}}>
          <div style={{fontSize:'13px',fontWeight:700,color:C.text,marginBottom:14}}>AI 계약 리뷰 현황</div>
          <div style={{marginBottom:14}}>
            <div style={{display:'flex',justifyContent:'space-between',marginBottom:6,fontSize:'12px'}}>
              <span style={{color:C.textGray}}>이번 달 사용량</span>
              <span style={{fontWeight:700,color:C.text}}>{quota}회 {plan!=='Enterprise'&&`/ ${quotaMax}회`}</span>
            </div>
            <div style={{height:8,background:'#F3F4F6',borderRadius:4,overflow:'hidden'}}>
              <div style={{height:'100%',background:isLow?'#F59E0B':C.primary,borderRadius:4,width:`${quotaPct}%`,transition:'width .3s'}}/>
            </div>
            <div style={{fontSize:'11px',color:isLow?'#D97706':C.textGray,marginTop:4,fontWeight:isLow?700:400}}>
              {plan==='Enterprise'?'무제한 사용 가능':`잔여 ${typeof quotaLeft==='number'?quotaLeft:'무제한'}회`}
            </div>
          </div>
          <div style={{display:'flex',gap:8,marginBottom:14}}>
            <select style={{flex:1,padding:'7px 10px',border:`1px solid ${C.borderGray}`,borderRadius:'6px',fontSize:'12px',cursor:'pointer',outline:'none',color:C.text}}>
              <option>클라우드_인프라_계약서.pdf</option>
              <option>소프트웨어_라이선스.pdf</option>
            </select>
            <button onClick={runReview} style={{padding:'7px 16px',border:'none',borderRadius:'6px',background:C.primary,color:'#fff',fontSize:'12px',fontWeight:700,cursor:'pointer',whiteSpace:'nowrap'}}>🤖 리뷰 실행</button>
          </div>
          <div style={{padding:'12px',background:'#F5F3FF',borderRadius:'8px',border:`1px solid ${C.border}`,fontSize:'11px',color:C.textSm}}>
            <strong>테넌트 스코프 적용 중</strong><br/>
            Tenant ID: {TENANTS.find(t=>t.name===tenant)?.id||'T001'} · Plan: {plan}<br/>
            모든 AI 호출에 테넌트 컨텍스트가 자동 주입됩니다.
          </div>
        </div>

        <div style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:'10px',padding:20}}>
          <div style={{fontSize:'13px',fontWeight:700,color:C.text,marginBottom:14}}>결재 진행 현황</div>
          <div style={{display:'flex',flexDirection:'column',gap:10}}>
            {[{name:'클라우드 서비스 계약',step:2,total:3,status:'결재중'},{name:'소프트웨어 라이선스',step:3,total:3,status:'완료'},{name:'데이터 분석 플랫폼',step:1,total:4,status:'대기중'}].map((c,i)=>(
              <div key={i} style={{padding:'12px',background:'#FAFAFA',borderRadius:'8px',border:`1px solid ${C.borderGray}`}}>
                <div style={{display:'flex',justifyContent:'space-between',marginBottom:8}}>
                  <span style={{fontSize:'12px',fontWeight:700,color:C.text}}>{c.name}</span>
                  <Badge text={c.status} type={c.status==='완료'?'active':c.status==='결재중'?'Pro':'trial'}/>
                </div>
                <div style={{display:'flex',gap:3,alignItems:'center'}}>
                  {Array.from({length:c.total},(_,j)=>(
                    <React.Fragment key={j}>
                      <div style={{width:20,height:20,borderRadius:'50%',background:j<c.step?C.primary:j===c.step-1?C.accent:'#E5E7EB',display:'flex',alignItems:'center',justifyContent:'center',fontSize:'9px',color:j<c.step?'#fff':'#9CA3AF',fontWeight:700}}>{j<c.step?'✓':j+1}</div>
                      {j<c.total-1&&<div style={{flex:1,height:2,background:j<c.step-1?C.primary:'#E5E7EB'}}/>}
                    </React.Fragment>
                  ))}
                </div>
                <div style={{fontSize:'10px',color:C.textGray,marginTop:6}}>
                  {plan==='Free'&&c.total>2&&<span style={{color:C.primary,fontWeight:600}}>⚠️ Free 플랜: 최대 2단계 결재</span>}
                </div>
              </div>
            ))}
          </div>
        </div>
      </div>

      <div style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:'10px',padding:20}}>
        <div style={{fontSize:'13px',fontWeight:700,color:C.text,marginBottom:14}}>플랜별 기능 제한 현황</div>
        <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:12}}>
          {[{f:'AI 리뷰 횟수',free:'5회/월',pro:'100회/월',ent:'무제한'},{f:'결재 단계 수',free:'2단계',pro:'5단계',ent:'무제한'},{f:'계약 문서 보관',free:'10건',pro:'무제한',ent:'무제한'}].map(({f,free,pro,ent})=>(
            <div key={f} style={{padding:'12px',background:'#FAFAFA',borderRadius:'8px',border:`1px solid ${C.borderGray}`}}>
              <div style={{fontSize:'11px',fontWeight:700,color:C.text,marginBottom:8}}>{f}</div>
              {[['Free',free],['Pro',pro],['Enterprise',ent]].map(([p,v])=>(
                <div key={p} style={{display:'flex',justifyContent:'space-between',padding:'4px 0',fontSize:'11px',background:p===plan?'#F5F3FF':'transparent',borderRadius:3,padding:'3px 6px',marginBottom:2}}>
                  <span style={{color:C.textGray,fontWeight:p===plan?700:400}}>{p}</span>
                  <span style={{color:p===plan?C.primary:C.textGray,fontWeight:p===plan?700:400}}>{v}</span>
                </div>
              ))}
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

// ─── 메인 앱 (bright-workspace) ───
const NAV_ITEMS=[
  {key:'analytics-dashboard',label:'플랫폼 분석 대시보드',icon:'📊'},
  {key:'template-marketplace',label:'계약 템플릿 마켓플레이스',icon:'🛒'},
  {key:'workspace-onboarding',label:'테넌트 워크스페이스 & 온보딩',icon:'🚀'},
  {key:'super-admin',label:'슈퍼 어드민 운영 콘솔',icon:'⚙️'},
  {key:'tenant-contract',label:'AI 계약 검토 & 결재 (테넌트 스코프)',icon:'📋'},
];

function App(){
  const [page,setPage]=useState('analytics-dashboard');
  const current=NAV_ITEMS.find(n=>n.key===page);

  function renderPage(){
    switch(page){
      case 'analytics-dashboard':return <AnalyticsDashboard/>;
      case 'template-marketplace':return <TemplateMarketplace/>;
      case 'workspace-onboarding':return <TenantOnboarding/>;
      case 'super-admin':return <SuperAdmin/>;
      case 'tenant-contract':return <TenantContract/>;
      default:return <AnalyticsDashboard/>;
    }
  }

  return(
    <div style={{display:'flex',minHeight:'100vh',fontFamily:'Pretendard, sans-serif'}}>
      {/* 밝은 사이드바 */}
      <aside style={{width:240,background:C.sidebar,borderRight:`1px solid ${C.sidebarBorder}`,display:'flex',flexDirection:'column',position:'fixed',top:0,left:0,bottom:0,zIndex:100}}>
        <div style={{padding:'20px 16px',borderBottom:`1px solid ${C.sidebarBorder}`}}>
          <div style={{display:'flex',alignItems:'center',gap:8}}>
            <div style={{width:30,height:30,borderRadius:'8px',background:`linear-gradient(135deg,${C.primary},${C.accent})`,display:'flex',alignItems:'center',justifyContent:'center',fontSize:'14px',color:'#fff',fontWeight:900}}>C</div>
            <div>
              <div style={{fontWeight:900,fontSize:'14px',color:C.secondary}}>ContractOS</div>
              <div style={{fontSize:'9px',color:C.textGray,fontWeight:600}}>멀티테넌트 법무 플랫폼</div>
            </div>
          </div>
        </div>

        <div style={{padding:'10px 12px',borderBottom:`1px solid ${C.sidebarBorder}`}}>
          <div style={{background:'#F5F3FF',borderRadius:'7px',padding:'7px 10px',display:'flex',alignItems:'center',gap:6}}>
            <span style={{fontSize:'10px',color:C.primary,fontWeight:700}}>SUPER ADMIN</span>
            <div style={{width:6,height:6,borderRadius:'50%',background:C.low,marginLeft:'auto'}}/>
          </div>
        </div>

        <nav style={{flex:1,padding:'8px 10px',overflow:'auto'}}>
          <div style={{fontSize:'9px',color:C.textGray,fontWeight:700,textTransform:'uppercase',letterSpacing:'1px',padding:'10px 6px 6px'}}>운영 관리</div>
          {NAV_ITEMS.map(item=>{
            const active=page===item.key;
            return(
              <button key={item.key} onClick={()=>setPage(item.key)} title={item.label} style={{display:'flex',alignItems:'center',gap:8,width:'100%',padding:'8px 10px',borderRadius:'7px',border:'none',cursor:'pointer',background:active?'#F5F3FF':'transparent',color:active?C.primary:C.textGray,fontSize:'11px',fontWeight:active?700:500,textAlign:'left',marginBottom:2,transition:'all .15s',whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}
                onMouseEnter={e=>{if(!active){e.currentTarget.style.background='#FAFAFA';e.currentTarget.style.color=C.text;}}}
                onMouseLeave={e=>{if(!active){e.currentTarget.style.background='transparent';e.currentTarget.style.color=C.textGray;}}}>
                <span style={{fontSize:'14px',flexShrink:0}}>{item.icon}</span>
                <span style={{overflow:'hidden',textOverflow:'ellipsis'}}>{item.label}</span>
              </button>
            );
          })}
        </nav>

        <div style={{padding:'12px 16px',borderTop:`1px solid ${C.sidebarBorder}`}}>
          <div style={{display:'flex',alignItems:'center',gap:8}}>
            <div style={{width:28,height:28,borderRadius:'50%',background:`linear-gradient(135deg,${C.primary},${C.accent})`,color:'#fff',display:'flex',alignItems:'center',justifyContent:'center',fontSize:'11px',fontWeight:700,flexShrink:0}}>관</div>
            <div style={{overflow:'hidden'}}>
              <div style={{fontSize:'11px',fontWeight:700,color:C.text,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>플랫폼 관리자</div>
              <div style={{fontSize:'10px',color:C.textGray}}>super@contractos.io</div>
            </div>
          </div>
        </div>
      </aside>

      <div style={{flex:1,display:'flex',flexDirection:'column',marginLeft:240}}>
        <header style={{background:C.surface,borderBottom:`1px solid ${C.sidebarBorder}`,padding:'0 24px',height:52,display:'flex',alignItems:'center',gap:12,position:'sticky',top:0,zIndex:90}}>
          <div style={{flex:1,display:'flex',alignItems:'center',gap:8}}>
            <span style={{fontSize:'13px',fontWeight:700,color:C.text}}>{current?.label}</span>
          </div>
          <div style={{display:'flex',alignItems:'center',gap:10}}>
            <div style={{background:'#F9FAFB',border:`1px solid ${C.borderGray}`,borderRadius:'6px',padding:'5px 10px',display:'flex',alignItems:'center',gap:6,width:180}}>
              <span style={{fontSize:'11px',color:C.textGray}}>🔍</span>
              <input placeholder="빠른 검색..." style={{border:'none',outline:'none',fontSize:'11px',color:C.text,background:'transparent',width:'100%'}}/>
            </div>
            <button style={{padding:'5px 12px',border:`1px solid ${C.border}`,borderRadius:'6px',background:'#F5F3FF',color:C.primary,fontSize:'11px',fontWeight:700,cursor:'pointer'}}>🔔 2</button>
          </div>
        </header>
        <main style={{flex:1,overflow:'auto',padding:20,background:C.bg}}>
          {renderPage()}
        </main>
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
