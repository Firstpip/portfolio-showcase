const StatusBadge = ({ status }) => {
  const colors = {
    '접수': { bg:'#EFF6FF', text:'#3B82F6', border:'#BFDBFE' },
    '검토중': { bg:'#FFFBEB', text:'#D97706', border:'#FDE68A' },

    '매입불가': { bg:'#FEF2F2', text:'#DC2626', border:'#FECACA' },
    '대기': { bg:'#FFFBEB', text:'#D97706', border:'#FDE68A' },
    '보류': { bg:'#F5F3FF', text:'#7C3AED', border:'#DDD6FE' },
    '정상': { bg:'#F0FDF4', text:'#059669', border:'#A7F3D0' },
    '주의': { bg:'#FFFBEB', text:'#D97706', border:'#FDE68A' },
  };
  const c = colors[status] || { bg:'#F1F5F9', text:'#64748B', border:'#E2E8F0' };
  return (
    <span style={{ display:'inline-flex', alignItems:'center', gap:4, padding:'3px 10px', borderRadius:20, fontSize:12, fontWeight:600, background:c.bg, color:c.text, border:`1px solid ${c.border}` }}>

  );
};

      <span style={{ fontSize:13, color:C.textSecondary, fontWeight:500 }}>{label}</span>
      <span style={{ fontSize:22 }}>{icon}</span>

    {sub && <div style={{ fontSize:12, color:C.textSecondary, marginTop:6 }}>{sub}</div>}
  </div>
);

            <button key={s} onClick={()=>setFilter(s)} style={{ padding:'5px 14px', borderRadius:20, border:`1px solid ${filter===s?C.primary:C.border}`, background:filter===s?C.primaryLight:'white', color:filter===s?C.primary:C.textSecondary, cursor:'pointer', fontSize:12, fontWeight:filter===s?600:400 }}>{s}</button>
          ))}
        </div>
        <table style={{ width:'100%', borderCollapse:'collapse' }}>
          <thead>
            <tr style={{ borderBottom:`2px solid ${C.border}` }}>
              <th style={{ padding:'8px 12px', width:32 }}>
                <input type="checkbox" onChange={e=>setSelected(e.target.checked ? filtered.map(r=>r.id) : [])} checked={selected.length===filtered.length && filtered.length>0} style={{ cursor:'pointer' }} />
              </th>
              {['신청 ID','신청자','상품권','금액','핀번호','상태','신청시각','액션'].map(h=>(
                <th key={h} style={{ textAlign:'left', padding:'8px 12px', fontSize:12, color:C.textSecondary, fontWeight:600 }}>{h}</th>
              ))}
            </tr>
          </thead>
          <tbody>
            {filtered.map(r=>(
              <tr key={r.id} style={{ borderBottom:`1px solid #F1F5F9`, transition:'background 150ms', background: selected.includes(r.id)?'#EFF6FF':'transparent' }}
                onMouseEnter={e=>{ if(!selected.includes(r.id)) e.currentTarget.style.background='#F8FBFF'; }}
                onMouseLeave={e=>{ if(!selected.includes(r.id)) e.currentTarget.style.background='transparent'; }}>
                <td style={{ padding:'10px 12px' }}>
                  <input type="checkbox" checked={selected.includes(r.id)} onChange={e=>setSelected(s=>e.target.checked?[...s,r.id]:s.filter(x=>x!==r.id))} style={{ cursor:'pointer' }} />
                </td>
                <td onClick={()=>setModal(r)} style={{ padding:'10px 12px', fontSize:13, fontWeight:600, color:C.primary, cursor:'pointer' }}>{r.id}</td>
                <td style={{ padding:'10px 12px', fontSize:13 }}>{r.user}</td>
                <td style={{ padding:'10px 12px', fontSize:13 }}>{r.type}</td>
                <td style={{ padding:'10px 12px', fontSize:13, fontWeight:600 }}>₩{r.amount.toLocaleString()}</td>
                <td style={{ padding:'10px 12px', fontSize:13, fontFamily:'monospace', color:C.textSecondary }}>{r.pin}</td>
                <td style={{ padding:'10px 12px' }}><StatusBadge status={r.status} /></td>
                <td style={{ padding:'10px 12px', fontSize:12, color:C.textSecondary }}>{r.createdAt}</td>
                <td style={{ padding:'10px 12px' }}>
                  <button onClick={()=>setModal(r)} style={{ padding:'4px 10px', borderRadius:6, border:`1px solid ${C.border}`, background:'white', cursor:'pointer', fontSize:11, color:C.textSecondary }}>상세</button>
                </td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>
      {modal && (
        <Modal title={`신청 상세 — ${modal.id}`} onClose={()=>setModal(null)}>
          <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:12 }}>
            {[['신청 ID',modal.id],['신청자',modal.user],['상품권',modal.type],['금액',`₩${modal.amount.toLocaleString()}`],['핀번호',modal.pin],['입금계좌',modal.account]].map(([l,v])=>(
              <div key={l} style={{ padding:'12px 14px', background:'#F8FBFF', borderRadius:8, border:`1px solid ${C.border}` }}>
                <div style={{ fontSize:11, color:C.textSecondary, marginBottom:3, fontWeight:500 }}>{l}</div>
                <div style={{ fontSize:13, fontWeight:600 }}>{v}</div>
              </div>
            ))}
          </div>
          <div style={{ marginTop:16, padding:'14px 16px', background:'#FFFBEB', borderRadius:10, border:`1px solid #FDE68A` }}>
            <label style={{ fontSize:12, fontWeight:600, display:'block', marginBottom:6, color:'#92400E' }}>거절 사유 입력 (선택)</label>
            <textarea placeholder="매입불가 처리 시 사유를 입력하세요..." rows={2} style={{ width:'100%', padding:'8px 10px', borderRadius:6, border:`1px solid #FDE68A`, fontSize:13, resize:'vertical' }} />
          </div>
          <div style={{ marginTop:16, display:'flex', gap:10, justifyContent:'flex-end' }}>
            <button onClick={()=>setModal(null)} style={{ padding:'9px 18px', borderRadius:8, border:`1px solid ${C.border}`, background:'white', cursor:'pointer', fontSize:13, color:C.textSecondary }}>닫기</button>
            <button onClick={()=>setModal(null)} style={{ padding:'9px 18px', borderRadius:8, border:`1px solid ${C.danger}`, background:'#FEF2F2', cursor:'pointer', fontSize:13, color:C.danger, fontWeight:600 }}>매입불가</button>
            <button onClick={()=>setModal(null)} style={{ padding:'9px 18px', borderRadius:8, border:'none', background:C.primary, cursor:'pointer', fontSize:13, color:'white', fontWeight:600 }}>매입 승인</button>
          </div>
        </Modal>
      )}
    </div>
  );
};

const PaymentPage = () => {
  const [tab, setTab] = useState('대기');
  const [confirm, setConfirm] = useState(null);
  const tabs = ['대기','완료','보류'];
  const filtered = tab==='전체' ? PAYMENTS : PAYMENTS.filter(p=>p.status===tab);

  return (
    <div style={{ animation:'fadeIn 0.3s ease' }}>
      <div style={{ display:'grid', gridTemplateColumns:'repeat(3,1fr)', gap:16, marginBottom:24 }}>
        <KpiCard label="입금 대기" value="2건" sub="₩74,600" color={C.warning} icon="⏳" />
        <KpiCard label="오늘 입금 완료" value="2건" sub="₩84,200 처리됨" color={C.success} icon="✅" />
        <KpiCard label="보류 건" value="1건" sub="검토 필요" color={C.danger} icon="🔍" />
      </div>
      <div style={{ background:C.surface, borderRadius:12, padding:24, border:`1px solid ${C.border}`, boxShadow:'0 1px 4px rgba(0,102,204,0.06)' }}>
        <div style={{ display:'flex', gap:4, marginBottom:20, borderBottom:`2px solid ${C.border}`, paddingBottom:0 }}>
          {tabs.map(t=>(
            <button key={t} onClick={()=>setTab(t)} style={{ padding:'8px 20px', border:'none', background:'none', cursor:'pointer', fontSize:14, fontWeight:tab===t?700:400, color:tab===t?C.primary:C.textSecondary, borderBottom:tab===t?`2px solid ${C.primary}`:'2px solid transparent', marginBottom:-2, transition:'all 150ms' }}>{t}</button>
          ))}
        </div>
        <table style={{ width:'100%', borderCollapse:'collapse' }}>
          <thead>
            <tr style={{ borderBottom:`2px solid ${C.border}` }}>
              {['입금 ID','신청 ID','신청자','입금 금액','입금 계좌','상태','처리 일시','액션'].map(h=>(
                <th key={h} style={{ textAlign:'left', padding:'8px 12px', fontSize:12, color:C.textSecondary, fontWeight:600 }}>{h}</th>
              ))}
            </tr>
          </thead>
          <tbody>
            {filtered.map(p=>(
              <tr key={p.id} style={{ borderBottom:`1px solid #F1F5F9` }}>
                <td style={{ padding:'12px', fontSize:13, fontWeight:600, color:C.primary }}>{p.id}</td>
                <td style={{ padding:'12px', fontSize:13 }}>{p.reqId}</td>
                <td style={{ padding:'12px', fontSize:13 }}>{p.user}</td>
                <td style={{ padding:'12px', fontSize:14, fontWeight:700 }}>₩{p.amount.toLocaleString()}</td>
                <td style={{ padding:'12px', fontSize:12, color:C.textSecondary }}>{p.account}</td>
                <td style={{ padding:'12px' }}><StatusBadge status={p.status} /></td>
                <td style={{ padding:'12px', fontSize:12, color:C.textSecondary }}>{p.processedAt}</td>
                <td style={{ padding:'12px' }}>
                  {p.status==='대기' && (
                    <button onClick={()=>setConfirm(p)} style={{ padding:'5px 12px', borderRadius:6, border:'none', background:C.primary, cursor:'pointer', fontSize:11, color:'white', fontWeight:600 }}>입금 처리</button>
                  )}
                </td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>
      {confirm && (
        <Modal title="입금 처리 확인" onClose={()=>setConfirm(null)} width={460}>
          <div style={{ textAlign:'center', padding:'8px 0' }}>
            <div style={{ fontSize:48, marginBottom:12 }}>💸</div>
            <p style={{ fontSize:15, marginBottom:4 }}>다음 내역으로 입금 처리하시겠습니까?</p>
            <p style={{ fontSize:13, color:C.textSecondary, marginBottom:20 }}>처리 후 취소가 불가합니다</p>
          </div>
          <div style={{ padding:20, background:'#F8FBFF', borderRadius:12, border:`1px solid ${C.border}`, marginBottom:20 }}>
            <div style={{ display:'flex', justifyContent:'space-between', marginBottom:8 }}>
              <span style={{ fontSize:13, color:C.textSecondary }}>신청자</span><span style={{ fontSize:13, fontWeight:600 }}>{confirm.user}</span>
            </div>
            <div style={{ display:'flex', justifyContent:'space-between', marginBottom:8 }}>
              <span style={{ fontSize:13, color:C.textSecondary }}>입금 계좌</span><span style={{ fontSize:13, fontWeight:600 }}>{confirm.account}</span>
            </div>
            <div style={{ height:1, background:C.border, margin:'8px 0' }} />
            <div style={{ display:'flex', justifyContent:'space-between' }}>
              <span style={{ fontSize:14, fontWeight:700 }}>입금 금액</span>
              <span style={{ fontSize:22, fontWeight:700, color:C.primary }}>₩{confirm.amount.toLocaleString()}</span>
            </div>
          </div>
          <div style={{ marginBottom:16 }}>
            <label style={{ fontSize:12, fontWeight:600, display:'block', marginBottom:6 }}>관리자 메모 (선택)</label>
            <textarea placeholder="처리 관련 메모..." rows={2} style={{ width:'100%', padding:'8px 10px', borderRadius:8, border:`1px solid ${C.border}`, fontSize:13, resize:'vertical' }} />
          </div>
          <div style={{ display:'flex', gap:10 }}>
            <button onClick={()=>setConfirm(null)} style={{ flex:1, padding:'11px', borderRadius:10, border:`1px solid ${C.border}`, background:'white', cursor:'pointer', fontSize:14, color:C.textSecondary }}>취소</button>
            <button onClick={()=>setConfirm(null)} style={{ flex:2, padding:'11px', borderRadius:10, background:C.primary, color:'white', border:'none', cursor:'pointer', fontSize:14, fontWeight:700 }}>✓ 입금 처리 확인</button>
          </div>
        </Modal>
      )}
    </div>
  );
};

// ─── Sidebar Navigation ───────────────────────────────────────
const NAV_ITEMS = [
  { id:'main', label:'메인홈', icon:'🏠', group:'사용자' },
  { id:'sell', label:'상품권 판매 신청', icon:'💰', group:'사용자' },
  { id:'mypage', label:'마이페이지', icon:'👤', group:'사용자' },
  { id:'divider', label:'', icon:'', group:'관리자' },
  { id:'dashboard', label:'관리자 대시보드', icon:'📊', group:'관리자' },
  { id:'requests', label:'매입신청 관리', icon:'📋', group:'관리자' },
  { id:'payments', label:'입금 관리', icon:'🏦', group:'관리자' },
];

const PAGE_TITLES = {
  main: '메인홈',
  sell: '상품권 판매 신청',
  mypage: '마이페이지',
  dashboard: '관리자 대시보드',
  requests: '매입신청 관리',
  payments: '입금 관리',
};

function App() {
  const [page, setPage] = useState('dashboard');
  const [time, setTime] = useState(new Date());

  useEffect(()=>{
    const t = setInterval(()=>setTime(new Date()), 60000);
    return ()=>clearInterval(t);
  },[]);

  const renderPage = () => {
    switch(page) {
      case 'main': return <MainHomePage />;
      case 'sell': return <SellPage />;
      case 'mypage': return <MyPageComp />;
      case 'dashboard': return <DashboardPage />;
      case 'requests': return <AdminRequestsPage />;
      case 'payments': return <PaymentPage />;
      default: return <DashboardPage />;
    }
  };

  const isAdmin = ['dashboard','requests','payments'].includes(page);

  return (
    <div style={{ display:'flex', minHeight:'100vh', background:C.bg }}>
      {/* Sidebar */}
      <aside style={{ width:260, background:C.sidebar, flexShrink:0, display:'flex', flexDirection:'column', position:'sticky', top:0, height:'100vh', overflow:'hidden' }}>
        {/* Logo */}
        <div style={{ padding:'24px 20px 20px', borderBottom:'1px solid rgba(255,255,255,0.08)' }}>
          <div style={{ display:'flex', alignItems:'center', gap:10 }}>
            <div style={{ width:36, height:36, borderRadius:10, background:`linear-gradient(135deg, ${C.primary}, ${C.accent})`, display:'flex', alignItems:'center', justifyContent:'center', fontSize:18 }}>🎫</div>
            <div>
              <div style={{ fontSize:15, fontWeight:700, color:'white', lineHeight:1.2 }}>핀캐시</div>
              <div style={{ fontSize:11, color:'rgba(255,255,255,0.5)' }}>상품권 매입 플랫폼</div>
            </div>
          </div>
        </div>
        {/* Nav */}
        <nav style={{ flex:1, padding:'12px 10px', overflowY:'auto' }}>
          {/* 사용자 섹션 */}
          <div style={{ fontSize:10, fontWeight:600, color:'rgba(255,255,255,0.35)', letterSpacing:1, padding:'8px 10px 4px', marginBottom:2 }}>사용자</div>
          {NAV_ITEMS.filter(n=>n.group==='사용자').map(item=>(
            <button key={item.id} onClick={()=>setPage(item.id)} style={{ display:'flex', alignItems:'center', gap:10, width:'100%', padding:'10px 12px', borderRadius:8, border:'none', cursor:'pointer', textAlign:'left', marginBottom:2, transition:'all 150ms', background: page===item.id ? C.sidebarActive : 'transparent', color: page===item.id ? 'white' : 'rgba(255,255,255,0.65)' }}>
              <span style={{ fontSize:16 }}>{item.icon}</span>
              <span style={{ fontSize:13, fontWeight: page===item.id ? 600 : 400 }}>{item.label}</span>
            </button>
          ))}
          {/* 관리자 섹션 */}
          <div style={{ fontSize:10, fontWeight:600, color:'rgba(255,255,255,0.35)', letterSpacing:1, padding:'16px 10px 4px', marginBottom:2 }}>관리자</div>
          {NAV_ITEMS.filter(n=>n.group==='관리자').map(item=>(
            <button key={item.id} onClick={()=>setPage(item.id)} style={{ display:'flex', alignItems:'center', gap:10, width:'100%', padding:'10px 12px', borderRadius:8, border:'none', cursor:'pointer', textAlign:'left', marginBottom:2, transition:'all 150ms', background: page===item.id ? C.sidebarActive : 'transparent', color: page===item.id ? 'white' : 'rgba(255,255,255,0.65)' }}>
              <span style={{ fontSize:16 }}>{item.icon}</span>
              <span style={{ fontSize:13, fontWeight: page===item.id ? 600 : 400 }}>{item.label}</span>
            </button>
          ))}
        </nav>
        {/* User Info */}
        <div style={{ padding:'16px 20px', borderTop:'1px solid rgba(255,255,255,0.08)', display:'flex', alignItems:'center', gap:10 }}>
          <div style={{ width:32, height:32, borderRadius:'50%', background:`linear-gradient(135deg,${C.primary},${C.accent})`, display:'flex', alignItems:'center', justifyContent:'center', fontSize:14, color:'white', fontWeight:700 }}>관</div>
          <div>
            <div style={{ fontSize:13, fontWeight:600, color:'white' }}>관리자</div>
            <div style={{ fontSize:11, color:'rgba(255,255,255,0.45)' }}>admin@pincash.kr</div>
          </div>
        </div>
      </aside>

      {/* Main */}
      <div style={{ flex:1, display:'flex', flexDirection:'column', minWidth:0 }}>
        {/* TopBar */}
        <header style={{ background:C.surface, borderBottom:`1px solid ${C.border}`, padding:'0 28px', height:60, display:'flex', alignItems:'center', justifyContent:'space-between', position:'sticky', top:0, zIndex:100, boxShadow:'0 1px 4px rgba(0,102,204,0.06)' }}>
          <div>
            <h1 style={{ fontSize:17, fontWeight:700, color:C.text }}>{PAGE_TITLES[page]}</h1>
            {isAdmin && <p style={{ fontSize:12, color:C.textSecondary }}>관리자 콘솔</p>}
          </div>
          <div style={{ display:'flex', alignItems:'center', gap:12 }}>
            <div style={{ padding:'6px 14px', borderRadius:8, background:C.primaryLight, border:`1px solid ${C.border}`, fontSize:12, color:C.primary, fontWeight:600 }}>
              🟢 핀번호 검증 API 정상
            </div>
            <div style={{ position:'relative', cursor:'pointer' }}>
              <div style={{ width:36, height:36, borderRadius:10, background:'#FEF3C7', display:'flex', alignItems:'center', justifyContent:'center', fontSize:18 }}>🔔</div>
              <div style={{ position:'absolute', top:-2, right:-2, width:16, height:16, borderRadius:'50%', background:C.danger, display:'flex', alignItems:'center', justifyContent:'center', fontSize:9, color:'white', fontWeight:700 }}>3</div>
            </div>
            <div style={{ width:36, height:36, borderRadius:10, background:C.primaryLight, display:'flex', alignItems:'center', justifyContent:'center', fontSize:16, cursor:'pointer' }}>👤</div>
            <div style={{ fontSize:12, color:C.textSecondary }}>
              {time.toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit'})}
            </div>
          </div>
        </header>
        <main style={{ flex:1, padding:28, overflowY:'auto' }}>
          {renderPage()}
        </main>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
