// ─── Helpers ──────────────────────────────────────────────────
const StatusBadge = ({ status }) => {
  const map = {
    '활성':{bg:'#F0FDF4',text:'#059669',border:'#A7F3D0'},
    '정지':{bg:'#FEF2F2',text:'#DC2626',border:'#FECACA'},
    '폐기':{bg:'#F1F5F9',text:'#64748B',border:'#E2E8F0'},
    '충전':{bg:'#EFF6FF',text:'#2563EB',border:'#BFDBFE'},
    '사용':{bg:'#FEF2F2',text:'#DC2626',border:'#FECACA'},
    '취소':{bg:'#F5F3FF',text:'#7C3AED',border:'#DDD6FE'},
    '만료임박':{bg:'#FFFBEB',text:'#D97706',border:'#FDE68A'},
  };
  const c = map[status] || {bg:'#F1F5F9',text:'#64748B',border:'#E2E8F0'};
  return <span style={{display:'inline-flex',alignItems:'center',padding:'3px 10px',borderRadius:20,fontSize:12,fontWeight:600,background:c.bg,color:c.text,border:`1px solid ${c.border}`}}>{status}</span>;
};

const Drawer = ({ item, onClose, type }) => {
  if (!item) return null;
  return (
    <>
      <div onClick={onClose} style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.4)',zIndex:200,backdropFilter:'blur(2px)'}} />
      <div style={{position:'fixed',top:0,right:0,bottom:0,width:480,background:C.surface,boxShadow:'-8px 0 40px rgba(0,0,0,0.12)',zIndex:201,overflowY:'auto',animation:'slideIn 200ms ease'}}>

          <button onClick={onClose} style={{background:'none',border:'none',cursor:'pointer',fontSize:20,color:C.textSecondary}}>✕</button>
        </div>
        <div style={{padding:24}}>
          {type==='card' ? (
            <>
              <div style={{padding:20,background:`linear-gradient(135deg,${C.primary},${C.accent})`,borderRadius:16,color:'white',marginBottom:24,position:'relative',overflow:'hidden'}}>
                <div style={{position:'absolute',top:-30,right:-30,width:120,height:120,borderRadius:'50%',background:'rgba(255,255,255,0.05)'}} />
                <div style={{fontSize:12,opacity:0.75,marginBottom:8}}>선불카드</div>
                <div style={{fontSize:18,letterSpacing:3,fontWeight:700,marginBottom:16,fontFamily:'monospace'}}>{item.number}</div>
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-end'}}>
                  <div>
                    <div style={{fontSize:11,opacity:0.75,marginBottom:2}}>잔액</div>
                    <div style={{fontSize:24,fontWeight:700}}>₩{item.balance.toLocaleString()}</div>
                  </div>
                  <div style={{textAlign:'right'}}>
                    <div style={{fontSize:11,opacity:0.75,marginBottom:2}}>유효기간</div>
                    <div style={{fontSize:15,fontWeight:600}}>{item.expiry}</div>
                  </div>
                </div>
              </div>
              <div style={{marginBottom:16}}>
                <div style={{fontSize:12,color:C.textSecondary,marginBottom:4}}>잔액 현황</div>
                <div style={{height:8,background:'#E2E8F0',borderRadius:4,overflow:'hidden'}}>
                  <div style={{height:'100%',width:`${(item.balance/item.limit)*100}%`,background:item.balance/item.limit>0.5?C.accent:item.balance/item.limit>0.2?C.warning:C.danger,borderRadius:4,transition:'width 0.5s ease'}} />

                <div style={{display:'flex',justifyContent:'space-between',marginTop:4,fontSize:11,color:C.textSecondary}}>
                  <span>₩{item.balance.toLocaleString()} 잔액</span>
                  <span>한도 ₩{item.limit.toLocaleString()}</span>

                {[['예금주',item.holder],['카드 ID',item.id],['발급일',item.issuedAt],['유효기간',item.expiry]].map(([l,v])=>(
                  <div key={l} style={{display:'flex',justifyContent:'space-between',padding:'10px 14px',background:'#F8FAFC',borderRadius:8}}>

                ))}
                <div style={{display:'flex',justifyContent:'space-between',padding:'10px 14px',background:'#F8FAFC',borderRadius:8}}>
                  <span style={{fontSize:13,color:C.textSecondary}}>상태</span><StatusBadge status={item.status} />
                </div>
              </div>
              <div style={{display:'flex',gap:8}}>
                <button onClick={onClose} style={{flex:1,padding:'10px',borderRadius:8,border:`1px solid ${C.border}`,background:'white',cursor:'pointer',fontSize:13,color:C.textSecondary}}>닫기</button>

                  </div>
                ))}

              <button onClick={onClose} style={{width:'100%',padding:'11px',borderRadius:10,background:C.primary,color:'white',border:'none',cursor:'pointer',fontSize:14,fontWeight:600}}>확인</button>
            </>
          )}

      </div>

};

// ─── Page Components ───────────────────────────────────────────
const ChargePage = () => {
  const [cardNum, setCardNum] = useState('');
  const [validated, setValidated] = useState(false);
  const [amount, setAmount] = useState(null);
  const [done, setDone] = useState(false);

  const handleCard = v => {
    setCardNum(v);
    if (v.replace(/-/g,'').length >= 16) setValidated(true);
    else { setValidated(false); setAmount(null); }
  };

  return (
    <div style={{maxWidth:680,margin:'0 auto',animation:'fadeIn 0.3s ease'}}>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:20}}>
        <div style={{background:C.surface,borderRadius:12,padding:28,border:`1px solid ${C.border}`,gridColumn:'1/-1'}}>

            <div style={{display:'flex',gap:8}}>
              <input value={cardNum} onChange={e=>handleCard(e.target.value)} placeholder="4532-****-****-****" maxLength={19} style={{flex:1,padding:'11px 14px',borderRadius:10,border:`2px solid ${validated?C.accent:C.border}`,fontSize:15,fontFamily:'monospace',letterSpacing:2,outline:'none',transition:'border 200ms'}} />
              <button style={{padding:'11px 18px',borderRadius:10,border:`1px solid ${C.border}`,background:'#F8FAFC',cursor:'pointer',fontSize:13,fontWeight:600,color:C.textSecondary}}>조회</button>
            </div>
            {validated && (
              <div style={{marginTop:10,padding:'12px 16px',background:'#EFF6FF',borderRadius:10,border:`1px solid #BFDBFE`,animation:'fadeIn 0.2s ease'}}>
                <div style={{fontSize:13,fontWeight:700,color:C.accent,marginBottom:6}}>✅ 카드 확인됨</div>
                <div style={{display:'flex',gap:24,fontSize:12,color:'#1E40AF'}}>
                  <span>예금주: <strong>김준서</strong></span>
                  <span>현재 잔액: <strong>₩37,500</strong></span>
                  <span>가용 한도: <strong>₩162,500</strong></span>
                </div>
              </div>
            )}
          </div>
          <div>
            <label style={{fontSize:13,fontWeight:600,display:'block',marginBottom:10}}>충전 금액 선택</label>
            <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:8,marginBottom:12}}>
              {[10000,30000,50000,100000].map(v=>(
                <button key={v} onClick={()=>setAmount(v)} style={{padding:'10px 8px',borderRadius:10,border:`2px solid ${amount===v?C.accent:C.border}`,background:amount===v?'#EFF6FF':'white',cursor:'pointer',fontSize:13,fontWeight:amount===v?700:400,color:amount===v?C.accent:C.text,transition:'all 150ms'}}>
                  ₩{(v/10000)}만원
                </button>
              ))}
            </div>
            <div style={{display:'flex',gap:8}}>
              <input placeholder="직접 입력 (1만원 단위)" style={{flex:1,padding:'10px 14px',borderRadius:10,border:`1px solid ${C.border}`,fontSize:14}} />
              <span style={{display:'flex',alignItems:'center',fontSize:13,color:C.textSecondary,whiteSpace:'nowrap'}}>원</span>
            </div>
          </div>
        </div>

        {amount && (
          <div style={{background:C.surface,borderRadius:12,padding:24,border:`2px solid ${C.accent}`,gridColumn:'1/-1',animation:'fadeIn 0.2s ease'}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16}}>
              <h4 style={{fontSize:14,fontWeight:700}}>충전 내역 확인</h4>
              <StatusBadge status="충전" />
            </div>
            <div style={{display:'flex',flexDirection:'column',gap:8,marginBottom:20}}>
              {[['충전 카드','4532-****-****-8821'],['현재 잔액','₩37,500'],['충전 금액',`₩${amount.toLocaleString()}`]].map(([l,v])=>(
                <div key={l} style={{display:'flex',justifyContent:'space-between',padding:'8px 0',borderBottom:`1px solid #F1F5F9`}}>
                  <span style={{fontSize:13,color:C.textSecondary}}>{l}</span><span style={{fontSize:13,fontWeight:600}}>{v}</span>
                </div>
              ))}
              <div style={{display:'flex',justifyContent:'space-between',padding:'10px 0'}}>
                <span style={{fontSize:15,fontWeight:700}}>충전 후 잔액</span>
                <span style={{fontSize:20,fontWeight:700,color:C.accent}}>₩{(37500+amount).toLocaleString()}</span>
              </div>
            </div>
            {done ? (
              <div style={{textAlign:'center',padding:'20px 0',animation:'fadeIn 0.3s ease'}}>
                <div style={{fontSize:40,marginBottom:8}}>✅</div>
                <div style={{fontSize:16,fontWeight:700,color:C.success}}>충전이 완료되었습니다!</div>
                <div style={{fontSize:13,color:C.textSecondary,marginTop:4}}>거래번호: TXN-8802</div>
                <button onClick={()=>{setDone(false);setAmount(null);setCardNum('');setValidated(false);}} style={{marginTop:16,padding:'9px 24px',borderRadius:8,background:C.primary,color:'white',border:'none',cursor:'pointer',fontSize:13,fontWeight:600}}>새 충전 신청</button>
              </div>
            ) : (
              <button onClick={()=>setDone(true)} style={{width:'100%',padding:'13px',borderRadius:10,background:`linear-gradient(135deg,${C.primary},${C.accent})`,color:'white',border:'none',cursor:'pointer',fontSize:15,fontWeight:700}}>
                ⚡ 충전 신청 완료
              </button>
            )}
          </div>
        )}
      </div>
    </div>
  );
};

const TransactionsPage = () => {
  const [drawer, setDrawer] = useState(null);
  const [typeFilter, setTypeFilter] = useState('전체');
  const filtered = typeFilter==='전체' ? TRANSACTIONS : TRANSACTIONS.filter(t=>t.type===typeFilter);

  return (
    <div style={{animation:'fadeIn 0.3s ease'}}>
      <div style={{background:C.surface,borderRadius:12,padding:24,border:`1px solid ${C.border}`}}>
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:16}}>
          <h3 style={{fontSize:15,fontWeight:700}}>거래 내역</h3>
          <div style={{display:'flex',gap:8}}>
            {['전체','충전','사용','취소'].map(f=>(
              <button key={f} onClick={()=>setTypeFilter(f)} style={{padding:'5px 14px',borderRadius:20,border:`1px solid ${typeFilter===f?C.accent:C.border}`,background:typeFilter===f?'#EFF6FF':'white',color:typeFilter===f?C.accent:C.textSecondary,cursor:'pointer',fontSize:12,fontWeight:typeFilter===f?600:400}}>{f}</button>
            ))}
          </div>
        </div>
        {filtered.map(tx=>(
          <div key={tx.id} onClick={()=>setDrawer({item:tx,type:'tx'})} style={{display:'flex',alignItems:'center',padding:'14px 16px',borderRadius:10,border:`1px solid ${C.border}`,marginBottom:8,cursor:'pointer',transition:'all 150ms'}}
            onMouseEnter={e=>{e.currentTarget.style.background='#F8FAFC';e.currentTarget.style.borderColor=C.accent;}}
            onMouseLeave={e=>{e.currentTarget.style.background='white';e.currentTarget.style.borderColor=C.border;}}>
            <div style={{width:40,height:40,borderRadius:10,background:tx.type==='충전'?'#EFF6FF':tx.type==='사용'?'#FEF2F2':'#F5F3FF',display:'flex',alignItems:'center',justifyContent:'center',fontSize:18,marginRight:14,flexShrink:0}}>
              {tx.type==='충전'?'⚡':tx.type==='사용'?'💳':'↩️'}
            </div>
            <div style={{flex:1,minWidth:0}}>
              <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:3}}>
                <span style={{fontSize:13,fontWeight:600}}>{tx.memo}</span>
                <StatusBadge status={tx.type} />
              </div>
              <div style={{fontSize:12,color:C.textSecondary}}>{tx.card} · {tx.date}</div>
            </div>
            <div style={{textAlign:'right',flexShrink:0}}>
              <div style={{fontSize:16,fontWeight:700,color:tx.type==='충전'?C.accent:tx.type==='사용'?C.danger:C.purple}}>
                {tx.type==='충전'?'+':''}₩{Math.abs(tx.amount).toLocaleString()}
              </div>
              <div style={{fontSize:11,color:C.textSecondary}}>잔액 ₩{tx.balance.toLocaleString()}</div>
            </div>
          </div>
        ))}
      </div>
      {drawer && <Drawer item={drawer.item} type={drawer.type==='tx'?'tx':'card'} onClose={()=>setDrawer(null)} />}
    </div>
  );
};

const BalancePage = () => {
  const [drawer, setDrawer] = useState(null);
  const today = new Date('2026-04-02');
  const isExpiringSoon = (exp) => {
    const d = new Date(exp+'-01');
    const diff = (d - today) / (1000*60*60*24);
    return diff <= 60;
  };

  return (
    <div style={{animation:'fadeIn 0.3s ease'}}>
      <div style={{padding:'16px 20px',background:'#FFFBEB',borderRadius:12,border:`1px solid #FDE68A`,marginBottom:20,display:'flex',alignItems:'center',gap:12}}>
        <span style={{fontSize:20}}>⚠️</span>
        <div>
          <div style={{fontSize:14,fontWeight:700,color:'#92400E'}}>만료 임박 카드 2장</div>
          <div style={{fontSize:12,color:'#B45309'}}>PC-0042, PC-0046 카드가 2026년 5월에 만료됩니다. 잔액 사용을 권장합니다.</div>
        </div>
      </div>
      <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:16}}>
        {CARDS.map(card=>(
          <div key={card.id} onClick={()=>setDrawer({item:card,type:'card'})} style={{background:C.surface,borderRadius:12,padding:20,border:`1px solid ${isExpiringSoon(card.expiry)?'#FDE68A':C.border}`,cursor:'pointer',transition:'all 150ms',position:'relative'}}
            onMouseEnter={e=>{e.currentTarget.style.borderColor=C.accent;e.currentTarget.style.boxShadow=`0 4px 16px rgba(59,130,246,0.12)`;}}
            onMouseLeave={e=>{e.currentTarget.style.borderColor=isExpiringSoon(card.expiry)?'#FDE68A':C.border;e.currentTarget.style.boxShadow='none';}}>
            {isExpiringSoon(card.expiry) && (
              <div style={{position:'absolute',top:12,right:12}}><StatusBadge status="만료임박" /></div>
            )}
            <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:16}}>
              <div style={{width:36,height:36,borderRadius:8,background:`linear-gradient(135deg,${C.primary},${C.accent})`,display:'flex',alignItems:'center',justifyContent:'center',fontSize:18}}>💳</div>
              <div>
                <div style={{fontSize:13,fontWeight:600}}>{card.holder}</div>
                <div style={{fontSize:11,color:C.textSecondary,fontFamily:'monospace'}}>{card.number}</div>
              </div>
            </div>
            <div style={{marginBottom:12}}>
              <div style={{fontSize:11,color:C.textSecondary,marginBottom:2}}>현재 잔액</div>
              <div style={{fontSize:22,fontWeight:700,color:C.text}}>₩{card.balance.toLocaleString()}</div>
            </div>
            <div style={{height:6,background:'#F1F5F9',borderRadius:3,overflow:'hidden',marginBottom:6}}>
              <div style={{height:'100%',width:`${(card.balance/card.limit)*100}%`,background:card.balance/card.limit>0.5?C.accent:card.balance/card.limit>0.2?C.warning:C.danger,borderRadius:3}} />
            </div>
            <div style={{display:'flex',justifyContent:'space-between',fontSize:11,color:C.textSecondary,marginBottom:10}}>
              <span>잔액 {Math.round(card.balance/card.limit*100)}%</span>
              <span>한도 ₩{(card.limit/10000)}만</span>
            </div>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
              <span style={{fontSize:11,color:C.textSecondary}}>유효 {card.expiry}</span>
              <StatusBadge status={card.status} />
            </div>
          </div>
        ))}
      </div>
      {drawer && <Drawer item={drawer.item} type="card" onClose={()=>setDrawer(null)} />}
    </div>
  );
};

const SettlementPage = () => {
  const [period, setPeriod] = useState('7일');
  return (
    <div style={{animation:'fadeIn 0.3s ease'}}>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:16,marginBottom:24}}>
        <div style={{background:C.surface,borderRadius:12,padding:24,border:`1px solid ${C.border}`}}>
          <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:16}}>
            <h3 style={{fontSize:15,fontWeight:700}}>일별 충전/사용/취소 추이</h3>
            <div style={{display:'flex',gap:4}}>
              {['7일','14일','30일'].map(p=>(
                <button key={p} onClick={()=>setPeriod(p)} style={{padding:'4px 10px',borderRadius:6,border:`1px solid ${period===p?C.accent:C.border}`,background:period===p?'#EFF6FF':'white',color:period===p?C.accent:C.textSecondary,cursor:'pointer',fontSize:11,fontWeight:period===p?600:400}}>{p}</button>
              ))}
            </div>
          </div>
          <ResponsiveContainer width="100%" height={220}>
            <ComposedChart data={SETTLEMENT_DATA}>
              <CartesianGrid strokeDasharray="3 3" stroke="#F1F5F9" vertical={false} />
              <XAxis dataKey="date" tick={{fontSize:11,fill:C.textSecondary}} axisLine={false} tickLine={false} />
              <YAxis tick={{fontSize:10,fill:C.textSecondary}} axisLine={false} tickLine={false} tickFormatter={v=>`${(v/10000).toFixed(0)}만`} />
              <Tooltip formatter={v=>`₩${v.toLocaleString()}`} contentStyle={{borderRadius:8,border:`1px solid ${C.border}`}} />
              <Legend iconType="circle" iconSize={8} wrapperStyle={{fontSize:11}} />
              <Bar dataKey="charge" name="충전" fill={C.accent} radius={[3,3,0,0]} />
              <Bar dataKey="use" name="사용" fill={C.danger} radius={[3,3,0,0]} />
              <Line dataKey="cancel" name="취소" stroke={C.purple} strokeWidth={2} dot={{r:3,fill:C.purple}} />
            </ComposedChart>
          </ResponsiveContainer>
        </div>
        <div style={{background:C.surface,borderRadius:12,padding:24,border:`1px solid ${C.border}`}}>
          <h3 style={{fontSize:15,fontWeight:700,marginBottom:16}}>월별 정산 요약</h3>
          {[
            {month:'2026년 4월',charge:14800000,use:7300000,status:'진행중',color:C.warning},
            {month:'2026년 3월',charge:48200000,use:23700000,status:'정산완료',color:C.success},
            {month:'2026년 2월',charge:39100000,use:19400000,status:'정산완료',color:C.success},
          ].map(m=>(
            <div key={m.month} style={{padding:'14px 16px',borderRadius:10,border:`1px solid ${C.border}`,marginBottom:10}}>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:8}}>
                <span style={{fontSize:13,fontWeight:600}}>{m.month}</span>
                <span style={{fontSize:11,fontWeight:600,color:m.color,background:`${m.color}15`,padding:'3px 10px',borderRadius:20}}>{m.status}</span>
              </div>
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:8,fontSize:12}}>
                <div><span style={{color:C.textSecondary}}>충전</span><br /><strong style={{color:C.accent}}>₩{(m.charge/10000).toFixed(0)}만</strong></div>
                <div><span style={{color:C.textSecondary}}>사용</span><br /><strong style={{color:C.danger}}>₩{(m.use/10000).toFixed(0)}만</strong></div>
                <div><span style={{color:C.textSecondary}}>미정산</span><br /><strong style={{color:C.primary}}>₩{((m.charge-m.use)/10000).toFixed(0)}만</strong></div>
              </div>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
};

const CardMgmtPage = () => {
  const [drawer, setDrawer] = useState(null);
  const [selected, setSelected] = useState([]);
  const [confirmModal, setConfirmModal] = useState(false);

  return (
    <div style={{animation:'fadeIn 0.3s ease'}}>
      <div style={{background:C.surface,borderRadius:12,padding:24,border:`1px solid ${C.border}`}}>
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:16}}>
          <h3 style={{fontSize:15,fontWeight:700}}>선불카드 목록</h3>
          <div style={{display:'flex',gap:8}}>
            {selected.length>0 && (
              <button onClick={()=>setConfirmModal(true)} style={{padding:'7px 14px',borderRadius:8,border:`1px solid ${C.warning}`,background:'#FFFBEB',cursor:'pointer',fontSize:12,color:'#92400E',fontWeight:600}}>{selected.length}장 일괄 정지</button>
            )}
            <button style={{padding:'7px 14px',borderRadius:8,border:'none',background:C.primary,cursor:'pointer',fontSize:12,color:'white',fontWeight:600}}>+ 카드 발급</button>
          </div>
        </div>
        <table style={{width:'100%',borderCollapse:'collapse'}}>
          <thead>
            <tr style={{borderBottom:`2px solid ${C.border}`}}>
              <th style={{padding:'8px 12px',width:32}}><input type="checkbox" onChange={e=>setSelected(e.target.checked?CARDS.map(c=>c.id):[])} checked={selected.length===CARDS.length} style={{cursor:'pointer'}} /></th>
              {['카드 ID','카드 번호','예금주','잔액','한도','유효기간','상태','액션'].map(h=>(
                <th key={h} style={{textAlign:'left',padding:'8px 12px',fontSize:12,color:C.textSecondary,fontWeight:600}}>{h}</th>
              ))}
            </tr>
          </thead>
          <tbody>
            {CARDS.map(card=>(
              <tr key={card.id} style={{borderBottom:`1px solid #F1F5F9`,background:selected.includes(card.id)?'#EFF6FF':'transparent',transition:'background 150ms'}}
                onMouseEnter={e=>{if(!selected.includes(card.id))e.currentTarget.style.background='#F8FAFC';}}
                onMouseLeave={e=>{if(!selected.includes(card.id))e.currentTarget.style.background='transparent';}}>
                <td style={{padding:'10px 12px'}}><input type="checkbox" checked={selected.includes(card.id)} onChange={e=>setSelected(s=>e.target.checked?[...s,card.id]:s.filter(x=>x!==card.id))} style={{cursor:'pointer'}} /></td>
                <td onClick={()=>setDrawer({item:card,type:'card'})} style={{padding:'10px 12px',fontSize:13,fontWeight:600,color:C.accent,cursor:'pointer'}}>{card.id}</td>
                <td style={{padding:'10px 12px',fontSize:12,fontFamily:'monospace',color:C.textSecondary}}>{card.number}</td>
                <td style={{padding:'10px 12px',fontSize:13}}>{card.holder}</td>
                <td style={{padding:'10px 12px',fontSize:13,fontWeight:600}}>₩{card.balance.toLocaleString()}</td>
                <td style={{padding:'10px 12px',fontSize:12,color:C.textSecondary}}>₩{card.limit.toLocaleString()}</td>
                <td style={{padding:'10px 12px',fontSize:12,color:C.textSecondary}}>{card.expiry}</td>
                <td style={{padding:'10px 12px'}}><StatusBadge status={card.status} /></td>
                <td style={{padding:'10px 12px'}}>
                  <button onClick={()=>setDrawer({item:card,type:'card'})} style={{padding:'4px 10px',borderRadius:6,border:`1px solid ${C.border}`,background:'white',cursor:'pointer',fontSize:11,color:C.textSecondary}}>상세</button>
                </td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>
      {drawer && <Drawer item={drawer.item} type="card" onClose={()=>setDrawer(null)} />}
      {confirmModal && (
        <>
          <div onClick={()=>setConfirmModal(false)} style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.45)',zIndex:1000}} />
          <div style={{position:'fixed',top:'50%',left:'50%',transform:'translate(-50%,-50%)',width:420,background:C.surface,borderRadius:16,zIndex:1001,padding:28,boxShadow:'0 20px 60px rgba(0,0,0,0.2)'}}>
            <h3 style={{fontSize:16,fontWeight:700,marginBottom:8}}>일괄 정지 확인</h3>
            <p style={{fontSize:13,color:C.textSecondary,marginBottom:20}}>선택한 <strong>{selected.length}장</strong>의 카드를 정지하시겠습니까? 정지 후 결제가 불가합니다.</p>
            <div style={{display:'flex',gap:10}}>
              <button onClick={()=>setConfirmModal(false)} style={{flex:1,padding:'11px',borderRadius:10,border:`1px solid ${C.border}`,background:'white',cursor:'pointer',fontSize:14,color:C.textSecondary}}>취소</button>
              <button onClick={()=>{setConfirmModal(false);setSelected([]);}} style={{flex:1,padding:'11px',borderRadius:10,background:C.warning,color:'white',border:'none',cursor:'pointer',fontSize:14,fontWeight:700}}>정지 처리</button>
            </div>
          </div>
        </>
      )}
    </div>
  );
};

// ─── Main App ─────────────────────────────────────────────────
const TABS = [
  { id:'charge', label:'충전 신청', icon:'⚡' },
  { id:'transactions', label:'거래 내역', icon:'📋' },
  { id:'balance', label:'잔액 조회', icon:'💳' },
  { id:'settlement', label:'정산 대시보드', icon:'📊' },
  { id:'card-management', label:'카드 관리', icon:'🏧' },
];

function App() {
  const [tab, setTab] = useState('charge');
  const meta = TAB_METAS[tab];

  const renderContent = () => {
    switch(tab) {
      case 'charge': return <ChargePage />;
      case 'transactions': return <TransactionsPage />;
      case 'balance': return <BalancePage />;
      case 'settlement': return <SettlementPage />;
      case 'card-management': return <CardMgmtPage />;
      default: return <ChargePage />;
    }
  };

  return (
    <div style={{minHeight:'100vh',background:C.bg}}>
      {/* TopNav */}
      <header style={{position:'sticky',top:0,zIndex:100,background:C.surface,borderBottom:`1px solid ${C.border}`,display:'flex',alignItems:'center',height:56,padding:'0 24px',gap:4,boxShadow:'0 1px 4px rgba(0,0,0,0.04)'}}>
        <div style={{display:'flex',alignItems:'center',gap:10,marginRight:20}}>
          <div style={{width:32,height:32,borderRadius:8,background:`linear-gradient(135deg,${C.primary},${C.accent})`,display:'flex',alignItems:'center',justifyContent:'center',fontSize:16}}>💳</div>
          <span style={{fontSize:15,fontWeight:700,color:C.secondary}}>핀페이</span>
        </div>
        {TABS.map(t=>(
          <button key={t.id} onClick={()=>setTab(t.id)} style={{display:'flex',alignItems:'center',gap:6,padding:'6px 14px',borderRadius:8,border:'none',background:tab===t.id?C.primaryLight:'transparent',cursor:'pointer',fontSize:13,fontWeight:tab===t.id?700:400,color:tab===t.id?C.primary:C.textSecondary,transition:'all 150ms'}}>
            <span style={{fontSize:15}}>{t.icon}</span>{t.label}
          </button>
        ))}
        <div style={{flex:1}} />
        <div style={{display:'flex',alignItems:'center',gap:10}}>
          <div style={{padding:'5px 12px',borderRadius:20,background:'#F0FDF4',border:`1px solid #A7F3D0`,fontSize:11,color:C.success,fontWeight:600}}>🟢 API 정상</div>
          <div style={{width:32,height:32,borderRadius:8,background:'#F1F5F9',display:'flex',alignItems:'center',justifyContent:'center',fontSize:16,cursor:'pointer'}}>🔔</div>
          <div style={{width:32,height:32,borderRadius:'50%',background:`linear-gradient(135deg,${C.primary},${C.accent})`,display:'flex',alignItems:'center',justifyContent:'center',color:'white',fontSize:13,fontWeight:700,cursor:'pointer'}}>관</div>
        </div>
      </header>

      {/* Hero Banner */}
      <div style={{background:`linear-gradient(135deg,${C.primary} 0%,${C.accent} 100%)`,padding:'28px 32px',color:'white',position:'relative',overflow:'hidden'}}>
        <div style={{position:'absolute',right:-40,top:-40,width:200,height:200,borderRadius:'50%',background:'rgba(255,255,255,0.04)'}} />
        <div style={{position:'relative',display:'flex',alignItems:'center',justifyContent:'space-between'}}>
          <div>
            <div style={{fontSize:12,opacity:0.75,marginBottom:4}}>{meta.icon} {meta.title}</div>
            <h2 style={{fontSize:22,fontWeight:700}}>{meta.title}</h2>
          </div>
          <div style={{display:'flex',gap:32}}>
            {meta.kpis.map(k=>(
              <div key={k.label} style={{textAlign:'right'}}>
                <div style={{fontSize:11,opacity:0.75,marginBottom:2}}>{k.label}</div>
                <div style={{fontSize:18,fontWeight:700}}>{k.value}</div>
              </div>
            ))}
          </div>
        </div>
      </div>

      {/* Content */}
      <main style={{padding:'28px 32px'}}>
        {renderContent()}
      </main>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
