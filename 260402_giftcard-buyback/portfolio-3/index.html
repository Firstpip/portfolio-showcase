const Card = ({ children, style={}, glow=false }) => (
  <div style={{ background:C.surface, borderRadius:16, border:`1px solid ${C.border}`, padding:20, boxShadow: glow ? '0 0 24px rgba(124,58,237,0.15)' : '0 4px 16px rgba(0,0,0,0.3)', ...style }}>
    {children}
  </div>
);

const Badge = ({ label, color='purple' }) => {
  const map = {
    purple: { bg:C.primaryLight, text:C.accent, border:C.primaryBorder },
    green: { bg:C.successBg, text:C.success, border:'rgba(16,185,129,0.3)' },
    red: { bg:C.dangerBg, text:C.danger, border:'rgba(239,68,68,0.3)' },
    yellow: { bg:C.warningBg, text:C.warning, border:'rgba(245,158,11,0.3)' },
    cyan: { bg:C.cyanBg, text:C.cyan, border:'rgba(34,211,238,0.3)' },
    gray: { bg:'rgba(148,163,184,0.1)', text:C.textSec, border:'rgba(148,163,184,0.2)' },
  };
  const s = map[color] || map.purple;
  return <span style={{ display:'inline-flex', alignItems:'center', padding:'3px 10px', borderRadius:20, fontSize:12, fontWeight:600, background:s.bg, color:s.text, border:`1px solid ${s.border}` }}>{label}</span>;
};

const RiskBar = ({ score }) => {
  const color = score >= 80 ? C.danger : score >= 60 ? C.warning : C.success;
  return (
    <div style={{ display:'flex', alignItems:'center', gap:8 }}>
      <div style={{ flex:1, height:6, background:'rgba(255,255,255,0.08)', borderRadius:3, overflow:'hidden' }}>
        <div style={{ height:'100%', width:`${score}%`, background:color, borderRadius:3, transition:'width 0.5s ease' }} />
      </div>
      <span style={{ fontSize:13, fontWeight:700, color, minWidth:28 }}>{score}</span>
    </div>
  );
};
