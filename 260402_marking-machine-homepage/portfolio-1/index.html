// ─── 사이드바 ───
function Sidebar({active,setActive}){
  return(
    <aside style={{width:260,background:C.sidebar,display:'flex',flexDirection:'column',minHeight:'100vh',position:'fixed',left:0,top:0,bottom:0,zIndex:50}}>
      <div style={{padding:'28px 24px 20px',borderBottom:'1px solid rgba(255,255,255,0.08)'}}>

          <div style={{width:38,height:38,background:C.primary,borderRadius:8,display:'flex',alignItems:'center',justifyContent:'center',fontSize:20}}>⚡</div>
          <div>
            <div style={{color:'#fff',fontWeight:700,fontSize:15,lineHeight:1.2}}>마킹테크</div>
            <div style={{color:C.sidebarText,fontSize:11,marginTop:2}}>MarkinTech Co.</div>
          </div>
        </div>
      </div>
      <nav style={{flex:1,padding:'16px 12px'}}>
        {NAV_ITEMS.map(n=>(
          <button key={n.key} onClick={()=>setActive(n.key)}
            style={{width:'100%',display:'flex',alignItems:'center',gap:12,padding:'10px 14px',borderRadius:8,border:'none',cursor:'pointer',marginBottom:2,
              background:active===n.key?'rgba(245,158,11,0.15)':'transparent',
              color:active===n.key?C.sidebarActive:C.sidebarText,
              fontWeight:active===n.key?700:400,fontSize:14,fontFamily:'inherit',transition:'all 0.15s'}}>
            <span style={{fontSize:16}}>{n.icon}</span>
            {n.key}
          </button>
        ))}
      </nav>
      <div style={{padding:'16px 20px',borderTop:'1px solid rgba(255,255,255,0.08)'}}>
        <div style={{display:'flex',alignItems:'center',gap:10}}>
          <div style={{width:32,height:32,borderRadius:'50%',background:C.primary,display:'flex',alignItems:'center',justifyContent:'center',color:'#fff',fontSize:13,fontWeight:700}}>김</div>

            <div style={{color:C.sidebarText,fontSize:11}}>콘텐츠 담당자</div>

              {page:'회사 소개',title:'회사 소개 | 마킹테크',desc:'1. ISO 9001 인증. 20년 기술력. CE 인증 마킹 장비 제조기업.',og:'⚠️',status:'수정 필요'},
              {page:'고객 문의',title:'제품 문의 및 견적 요청 | 마킹테크',desc:'레이저 마킹기 구매 문의, 견적, AS 신청 — 영업일 1일 내 회신.',og:'✅',status:'완료'},
            ].map(r=>(
              <tr key={r.page} style={{borderBottom:`1px solid ${C.border}`}}>
                <td style={{padding:'10px 12px',fontWeight:700,color:C.text}}>{r.page}</td>
                <td style={{padding:'10px 12px',maxWidth:180,fontSize:12,color:C.textSm,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{r.title}</td>
                <td style={{padding:'10px 12px',maxWidth:180,fontSize:12,color:C.textSm,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{r.desc}</td>
                <td style={{padding:'10px 12px',textAlign:'center'}}>{r.og}</td>
                <td style={{padding:'10px 12px'}}><span style={{background:r.status==='완료'?'#ECFDF5':'#FFFBEB',color:r.status==='완료'?C.success:C.warn,borderRadius:20,padding:'3px 10px',fontSize:12,fontWeight:600}}>{r.status}</span></td>
              </tr>
            ))}
          </tbody>
        </table>
      </Card>
    </div>
  );
}

// ─── 앱 ───
function App(){
  const [active,setActive]=useState('홈');
  const screens={
    '홈':{title:'홈페이지 미리보기',comp:<HomeScreen/>},
    '제품 소개':{title:'제품 소개',comp:<ProductsScreen/>},
    '회사 소개':{title:'회사 소개',comp:<AboutScreen/>},
    '고객 문의':{title:'고객 문의',comp:<ContactScreen/>},
    '관리자 CMS':{title:'관리자 CMS',comp:<AdminScreen/>},
    'SEO 설정':{title:'SEO 설정',comp:<SeoScreen/>},
  };
  const {title,comp}=screens[active];
  return(
    <div style={{display:'flex',minHeight:'100vh',background:C.bg}}>
      <Sidebar active={active} setActive={setActive}/>
      <div style={{marginLeft:260,flex:1,minWidth:0}}>

        <main style={{padding:'24px 28px',minHeight:'calc(100vh - 56px)'}}>

}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
