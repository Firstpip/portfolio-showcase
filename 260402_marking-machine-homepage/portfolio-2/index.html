// ─── 탑네비 ───
function Topnav({active,setActive}){
  return(

          <div>
            <div style={{fontWeight:800,fontSize:16,color:C.text}}>에코클린</div>
            <div style={{fontSize:10,color:C.textSm}}>EcoClean Env. Tech.</div>
          </div>
        </div>
        <div style={{display:'flex',gap:4,flex:1}}>
          {NAV.map(n=>(
            <button key={n.key} onClick={()=>setActive(n.key)}
              style={{padding:'8px 16px',background:active===n.key?`${C.primary}22`:'transparent',border:'none',borderRadius:8,cursor:'pointer',fontFamily:'inherit',fontSize:14,fontWeight:active===n.key?700:400,color:active===n.key?C.primary:C.textSm,display:'flex',alignItems:'center',gap:6,transition:'all 0.15s'}}>
              {n.icon} {n.key}

          ))}

        <div style={{display:'flex',gap:10}}>
          <button style={{background:'transparent',border:`1px solid ${C.primary}`,color:C.primary,borderRadius:8,padding:'7px 16px',fontSize:13,cursor:'pointer',fontFamily:'inherit',fontWeight:600}}>📞 대표번호</button>

      </div>
    </nav>
  );
}

                <div style={{fontSize:12,color:C.primary,marginBottom:6,fontWeight:600}}>{p.product}</div>
                <div style={{fontSize:12,color:C.textSm,lineHeight:1.6}}>{p.desc}</div>
                <div style={{fontSize:11,color:C.textSm,marginTop:8}}>{p.year}년 납품</div>
              </div>
            </div>
          ))}
        </div>
        {filtered.length===0&&<div style={{textAlign:'center',padding:'40px',color:C.textSm}}>해당 업종의 납품 실적이 없습니다.</div>}
      </Card>
      <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:14}}>
        {[
          {icon:'🏆',v:'1,200+',l:'누적 납품 현장'},
          {icon:'🌏',v:'12개국',l:'해외 납품 실적'},
          {icon:'⭐',v:'98%',l:'재계약률'},
        ].map(s=>(
          <Card key={s.l} style={{textAlign:'center',padding:'20px'}}>
            <div style={{fontSize:36,marginBottom:8}}>{s.icon}</div>
            <div style={{fontSize:24,fontWeight:900,color:C.primary}}>{s.v}</div>
            <div style={{fontSize:13,color:C.textSm,marginTop:4}}>{s.l}</div>
          </Card>
        ))}
      </div>
    </div>
  );
}

// ─── 견적 문의 화면 ───

            {step===1&&(
              <div>
                <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:14,marginBottom:14}}>

                    <button key={t} onClick={()=>setForm({...form,type:t})}

                <div style={{marginBottom:14}}>

                  <div style={{display:'flex',gap:10}}>
                    {['옥내','옥외','반옥외'].map(e=>(
                      <button key={e} onClick={()=>setForm({...form,env:e})}
                        style={{flex:1,padding:'10px',borderRadius:8,border:`1px solid ${form.env===e?C.primary:C.border}`,background:form.env===e?`${C.primary}15`:'transparent',cursor:'pointer',fontFamily:'inherit',color:form.env===e?C.primary:C.textSm,fontWeight:700,fontSize:13}}>

                    ))}

                </div>
                <div style={{display:'flex',gap:10}}>
                  <button onClick={()=>setStep(1)} style={{flex:1,background:'transparent',color:C.textSm,border:`1px solid ${C.border}`,borderRadius:9,padding:'11px',fontWeight:600,fontSize:14,cursor:'pointer',fontFamily:'inherit'}}>← 이전</button>
                  <button onClick={()=>setStep(3)} style={{flex:2,background:C.primary,color:'#fff',border:'none',borderRadius:9,padding:'11px',fontWeight:700,fontSize:14,cursor:'pointer',fontFamily:'inherit'}}>다음 →</button>
                </div>
              </div>
            )}
            {step===3&&(
              <div>
                {[
                  {label:'회사명',ph:'(주)예시기업'},
                  {label:'담당자명',ph:'홍길동'},
                  {label:'연락처',ph:'010-1234-5678'},
                  {label:'이메일',ph:'contact@example.com'},
                ].map(f=>(
                  <div key={f.label} style={{marginBottom:12}}>
                    <label style={{display:'block',fontSize:13,fontWeight:600,color:C.text,marginBottom:5}}>{f.label}</label>
                    <input placeholder={f.ph} style={{width:'100%',padding:'10px 12px',background:'#071008',border:`1px solid ${C.border}`,borderRadius:8,fontSize:13,color:C.text,fontFamily:'inherit'}}/>

                ))}
                <div style={{display:'flex',gap:10,marginTop:8}}>
                  <button onClick={()=>setStep(2)} style={{flex:1,background:'transparent',color:C.textSm,border:`1px solid ${C.border}`,borderRadius:9,padding:'11px',fontWeight:600,fontSize:14,cursor:'pointer',fontFamily:'inherit'}}>← 이전</button>
                  <button onClick={()=>setSubmitted(true)} style={{flex:2,background:C.primary,color:'#fff',border:'none',borderRadius:9,padding:'11px',fontWeight:700,fontSize:14,cursor:'pointer',fontFamily:'inherit'}}>견적 요청 제출</button>
                </div>
              </div>
            )}

      </Card>
      <div style={{display:'flex',flexDirection:'column',gap:14}}>
        <Card>
          <div style={{fontWeight:700,fontSize:14,color:C.text,marginBottom:14}}>카카오채널 상담</div>
          <div style={{background:'#FEE500',borderRadius:10,padding:'18px',textAlign:'center',cursor:'pointer'}}>
            <div style={{fontSize:32,marginBottom:8}}>💬</div>
            <div style={{fontWeight:700,fontSize:15,color:'#391B1B',marginBottom:4}}>카카오채널 바로가기</div>
            <div style={{fontSize:12,color:'#5A3A1A'}}>평일 09:00~18:00</div>
          </div>
          <div style={{marginTop:12,fontSize:12,color:C.textSm,lineHeight:1.8}}>
            <div>📞 02-000-0000 (대표)</div>
            <div>📠 02-000-0001</div>
            <div>✉️ sales@ecoclean.co.kr</div>
          </div>
        </Card>
        <Card>
          <div style={{fontWeight:700,fontSize:14,color:C.text,marginBottom:12}}>담당 엔지니어</div>
          {[
            {name:'김환경',spec:'집진기 전문',exp:'15년'},
            {name:'이스크러버',spec:'세정·흡수탑',exp:'12년'},
            {name:'박탈취',spec:'RTO·생물학적',exp:'10년'},
          ].map(e=>(
            <div key={e.name} style={{display:'flex',gap:12,alignItems:'center',marginBottom:10}}>
              <div style={{width:36,height:36,borderRadius:'50%',background:`${C.primary}20`,display:'flex',alignItems:'center',justifyContent:'center',fontSize:16,color:C.primary}}>👷</div>
              <div>
                <div style={{fontWeight:700,fontSize:13,color:C.text}}>{e.name} 엔지니어</div>

          ))}

      </div>
    </div>
  );
}

// ─── SEO 관리 화면 ───
function SeoScreen(){
  const visitData=[
    {month:'10월',방문:820},{month:'11월',방문:1140},{month:'12월',방문:980},
    {month:'1월',방문:1380},{month:'2월',방문:1620},{month:'3월',방문:2100},
  ];
  return(
    <div>
      <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:14,marginBottom:16}}>
        {[
          {label:'구글 노출 수',value:'18,400',icon:'🔍',change:'+41%',color:C.primary},
          {label:'평균 게재 순위',value:'7.2위',icon:'📈',change:'▲ 2.3',color:C.accent},
          {label:'클릭률',value:'4.8%',icon:'👆',change:'+1.2%p',color:'#06B6D4'},
        ].map(s=>(
          <Card key={s.label} style={{padding:'18px'}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:8}}>
              <span style={{fontSize:22}}>{s.icon}</span>
              <span style={{fontSize:11,color:C.primary,fontWeight:700,background:`${C.primary}15`,borderRadius:20,padding:'2px 8px'}}>{s.change}</span>
            </div>
            <div style={{fontSize:24,fontWeight:900,color:s.color}}>{s.value}</div>
            <div style={{fontSize:12,color:C.textSm,marginTop:3}}>{s.label}</div>
          </Card>
        ))}
      </div>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:14,marginBottom:14}}>
        <Card>
          <div style={{fontWeight:700,fontSize:14,color:C.text,marginBottom:14}}>월별 방문자 추이</div>
          <ResponsiveContainer width="100%" height={160}>
            <AreaChart data={visitData}>
              <defs>
                <linearGradient id="vGrad" x1="0" y1="0" x2="0" y2="1">
                  <stop offset="5%" stopColor={C.primary} stopOpacity={0.3}/>
                  <stop offset="95%" stopColor={C.primary} stopOpacity={0}/>
                </linearGradient>
              </defs>
              <CartesianGrid strokeDasharray="3 3" stroke={C.border}/>
              <XAxis dataKey="month" tick={{fontSize:10,fill:C.textSm}}/>
              <YAxis tick={{fontSize:10,fill:C.textSm}}/>
              <Tooltip contentStyle={{background:C.surface,border:`1px solid ${C.border}`,color:C.text,fontSize:12}}/>
              <Area type="monotone" dataKey="방문" stroke={C.primary} fill="url(#vGrad)" strokeWidth={2}/>
            </AreaChart>
          </ResponsiveContainer>
        </Card>
        <Card>
          <div style={{fontWeight:700,fontSize:14,color:C.text,marginBottom:14}}>키워드 순위 현황</div>
          {[
            {kw:'산업용 집진기',rank:3,volume:'2,100/월'},
            {kw:'집진기 납품업체',rank:5,volume:'880/월'},
            {kw:'환경설비 전문기업',rank:2,volume:'640/월'},
            {kw:'스크러버 가격',rank:8,volume:'520/월'},
            {kw:'RTO 소각로',rank:11,volume:'310/월'},
          ].map(k=>(
            <div key={k.kw} style={{display:'flex',alignItems:'center',gap:12,padding:'8px 10px',background:'#071008',borderRadius:7,marginBottom:8}}>
              <div style={{fontSize:14,fontWeight:900,color:k.rank<=5?C.primary:k.rank<=10?C.warn:C.textSm,minWidth:40,textAlign:'center'}}>{k.rank}위</div>
              <div style={{flex:1}}>
                <div style={{fontSize:13,fontWeight:600,color:C.text}}>{k.kw}</div>
                <div style={{fontSize:11,color:C.textSm}}>월 검색량 {k.volume}</div>
              </div>
            </div>
          ))}
        </Card>
      </div>
      <Card>
        <div style={{fontWeight:700,fontSize:14,color:C.text,marginBottom:14}}>페이지별 메타 설정 현황</div>
        <table style={{width:'100%',borderCollapse:'collapse',fontSize:13}}>
          <thead><tr style={{background:'#071008'}}>
            {['페이지','Title 태그','타겟 키워드','SEO 점수','상태'].map(h=>(
              <th key={h} style={{padding:'10px 12px',textAlign:'left',fontWeight:600,color:C.textSm,border:`1px solid ${C.border}`}}>{h}</th>
            ))}
          </tr></thead>
          <tbody>
            {SEO_ITEMS.map(r=>(
              <tr key={r.page}>
                <td style={{padding:'10px 12px',fontWeight:700,color:C.text,border:`1px solid ${C.border}`}}>{r.page}</td>
                <td style={{padding:'10px 12px',color:C.textSm,fontSize:12,border:`1px solid ${C.border}`,maxWidth:160,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{r.title}</td>
                <td style={{padding:'10px 12px',color:C.textSm,fontSize:12,border:`1px solid ${C.border}`}}>{r.keyword}</td>
                <td style={{padding:'10px 12px',border:`1px solid ${C.border}`}}>
                  <div style={{display:'flex',alignItems:'center',gap:8}}>
                    <div style={{flex:1,height:5,background:C.border,borderRadius:3}}>
                      <div style={{height:'100%',width:`${r.score}%`,background:r.score>=85?C.primary:C.warn,borderRadius:3}}/>
                    </div>
                    <span style={{fontSize:12,fontWeight:700,color:r.score>=85?C.primary:C.warn,minWidth:28}}>{r.score}</span>
                  </div>
                </td>
                <td style={{padding:'10px 12px',border:`1px solid ${C.border}`}}>
                  <span style={{background:r.status==='완료'?`${C.primary}20`:C.warn+'20',color:r.status==='완료'?C.primary:C.warn,borderRadius:20,padding:'3px 10px',fontSize:12,fontWeight:700}}>{r.status}</span>
                </td>
              </tr>
            ))}
          </tbody>
        </table>
      </Card>
    </div>
  );
}

// ─── 앱 ───
function App(){
  const [active,setActive]=useState('메인');
  const screens={
    '메인':{title:'홈페이지 메인',comp:<MainScreen/>},
    '제품 카탈로그':{title:'제품 카탈로그',comp:<CatalogScreen/>},
    '납품 실적':{title:'납품 실적',comp:<ProjectsScreen/>},
    '견적 문의':{title:'견적 문의',comp:<InquiryScreen/>},
    'SEO 관리':{title:'SEO 관리 패널',comp:<SeoScreen/>},
  };
  const {comp}=screens[active];
  return(
    <div style={{minHeight:'100vh',background:C.bg}}>
      <Topnav active={active} setActive={setActive}/>
      <main style={{maxWidth:1200,margin:'0 auto',padding:'28px 32px'}}>
        {comp}
      </main>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
