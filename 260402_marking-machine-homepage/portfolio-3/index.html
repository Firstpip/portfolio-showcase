        <span style={{fontSize:12,color:C.textSm}}>시스템 정상</span>
      </div>}
    </div>
  );
}

function Card({children,style={}}){
  return <div style={{background:C.surface,borderRadius:10,border:`1px solid ${C.border}`,padding:'20px 22px',...style}}>{children}</div>;
}

function Badge({children,color='primary'}){
  const colors={primary:{bg:`${C.primary}12`,text:C.primary},success:{bg:'#ECFDF5',text:C.success},warn:{bg:'#FFFBEB',text:C.warn},danger:{bg:'#FEF2F2',text:C.danger}};
  const s=colors[color]||colors.primary;
  return <span style={{background:s.bg,color:s.text,borderRadius:20,padding:'2px 10px',fontSize:11,fontWeight:700}}>{children}</span>;
}

            <div style={{marginBottom:10}}>
              <label style={{display:'block',fontSize:12,fontWeight:600,color:C.textSm,marginBottom:4}}>hero.title [{editKey}]</label>
              <input defaultValue={I18N_CONTENT[editKey].hero} style={{width:'100%',padding:'9px 12px',border:`1px solid ${C.primary}`,borderRadius:7,fontSize:13,fontFamily:'inherit'}}/>
            </div>
            <div style={{marginBottom:14}}>
              <label style={{display:'block',fontSize:12,fontWeight:600,color:C.textSm,marginBottom:4}}>hero.subtitle [{editKey}]</label>
              <textarea rows={2} defaultValue={I18N_CONTENT[editKey].sub} style={{width:'100%',padding:'9px 12px',border:`1px solid ${C.primary}`,borderRadius:7,fontSize:13,fontFamily:'inherit',resize:'none'}}/>
            </div>
            <button style={{background:C.primary,color:'#fff',border:'none',borderRadius:8,padding:'9px 22px',fontWeight:700,fontSize:13,cursor:'pointer',fontFamily:'inherit'}}>저장</button>
          </div>
        )}
      </Card>
    </div>
  );
}

// ─── 관리자 화면 ───
function AdminScreen(){
  const [tab,setTab]=useState('제품 관리');
  const adminTabs=['제품 관리','딜러 관리','견적 이력'];
  const gradeColor={골드:'warn',실버:'primary',브론즈:'success'};
  return(
    <div>
      <div style={{display:'flex',gap:4,marginBottom:16}}>
        {adminTabs.map(t=>(
          <button key={t} onClick={()=>setTab(t)}
            style={{padding:'7px 16px',borderRadius:8,border:`1px solid ${tab===t?C.primary:C.border}`,background:tab===t?C.primary:'transparent',color:tab===t?'#fff':C.textSm,fontSize:13,cursor:'pointer',fontFamily:'inherit',fontWeight:tab===t?700:400}}>
            {t}
          </button>
        ))}
      </div>
      {tab==='제품 관리'&&(
        <Card>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:14}}>
            <div style={{fontWeight:700,fontSize:14}}>제품 목록 — {PRODUCTS.length}종</div>
            <button style={{background:C.primary,color:'#fff',border:'none',borderRadius:7,padding:'7px 16px',fontSize:13,cursor:'pointer',fontFamily:'inherit',fontWeight:600}}>+ 제품 등록</button>
          </div>
          <table style={{width:'100%',borderCollapse:'collapse',fontSize:13}}>
            <thead><tr style={{background:'#F9FAFB'}}>
              {['코드','제품명 (KO/EN/JA)','카테고리','가격','관리'].map(h=>(
                <th key={h} style={{padding:'9px 12px',textAlign:'left',fontWeight:600,color:C.textSm,border:`1px solid ${C.border}`}}>{h}</th>
              ))}
            </tr></thead>
            <tbody>
              {PRODUCTS.map(p=>(
                <tr key={p.id}>
                  <td style={{padding:'9px 12px',border:`1px solid ${C.border}`,fontFamily:'monospace',fontSize:11,color:C.textSm}}>{p.id}</td>
                  <td style={{padding:'9px 12px',border:`1px solid ${C.border}`}}>
                    <div style={{fontWeight:700,fontSize:12,color:C.text}}>{p.name.KO}</div>
                    <div style={{fontSize:11,color:C.textSm}}>{p.name.EN}</div>
                    <div style={{fontSize:11,color:C.textSm}}>{p.name.JA}</div>
                  </td>
                  <td style={{padding:'9px 12px',border:`1px solid ${C.border}`}}><Badge color="primary">{p.cat}</Badge></td>
                  <td style={{padding:'9px 12px',border:`1px solid ${C.border}`,fontWeight:700,color:C.primary}}>{p.price}</td>
                  <td style={{padding:'9px 12px',border:`1px solid ${C.border}`}}>
                    <div style={{display:'flex',gap:6}}>
                      <button style={{background:`${C.primary}12`,color:C.primary,border:'none',borderRadius:5,padding:'4px 10px',fontSize:11,cursor:'pointer',fontFamily:'inherit'}}>편집</button>
                      <button style={{background:'#FEF2F2',color:C.danger,border:'none',borderRadius:5,padding:'4px 10px',fontSize:11,cursor:'pointer',fontFamily:'inherit'}}>삭제</button>
                    </div>
                  </td>
                </tr>
              ))}
            </tbody>
          </table>
        </Card>
      )}
      {tab==='딜러 관리'&&(
        <Card>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:14}}>
            <div style={{fontWeight:700,fontSize:14}}>딜러 계정 — {DEALERS.length}개</div>
            <button style={{background:C.primary,color:'#fff',border:'none',borderRadius:7,padding:'7px 16px',fontSize:13,cursor:'pointer',fontFamily:'inherit',fontWeight:600}}>+ 딜러 등록</button>
          </div>
          <table style={{width:'100%',borderCollapse:'collapse',fontSize:13}}>
            <thead><tr style={{background:'#F9FAFB'}}>
              {['딜러명','담당 지역','등급','납품건','가입일','상태'].map(h=>(
                <th key={h} style={{padding:'9px 12px',textAlign:'left',fontWeight:600,color:C.textSm,border:`1px solid ${C.border}`}}>{h}</th>
              ))}
            </tr></thead>
            <tbody>
              {DEALERS.map(d=>(
                <tr key={d.id}>
                  <td style={{padding:'9px 12px',border:`1px solid ${C.border}`,fontWeight:700,color:C.text}}>{d.name}</td>
                  <td style={{padding:'9px 12px',border:`1px solid ${C.border}`,color:C.textSm}}>{d.region}</td>
                  <td style={{padding:'9px 12px',border:`1px solid ${C.border}`}}><Badge color={gradeColor[d.grade]||'primary'}>{d.grade}</Badge></td>
                  <td style={{padding:'9px 12px',border:`1px solid ${C.border}`,fontWeight:700,color:C.primary}}>{d.sales}건</td>
                  <td style={{padding:'9px 12px',border:`1px solid ${C.border}`,color:C.textSm}}>{d.joined}</td>
                  <td style={{padding:'9px 12px',border:`1px solid ${C.border}`}}>
                    <Badge color={d.active?'success':'warn'}>{d.active?'활성':'비활성'}</Badge>
                  </td>
                </tr>
              ))}
            </tbody>
          </table>
        </Card>
      )}
      {tab==='견적 이력'&&(
        <Card>
          <div style={{fontWeight:700,fontSize:14,marginBottom:14}}>견적 이력 — React Table v8 데이터 그리드</div>
          <table style={{width:'100%',borderCollapse:'collapse',fontSize:13}}>
            <thead><tr style={{background:'#F9FAFB'}}>
              {['견적번호','딜러','제품','금액','날짜','상태'].map(h=>(
                <th key={h} style={{padding:'9px 12px',textAlign:'left',fontWeight:600,color:C.textSm,border:`1px solid ${C.border}`}}>{h}</th>
              ))}
            </tr></thead>
            <tbody>
              {QUOTES.map(q=>(
                <tr key={q.id}>
                  <td style={{padding:'9px 12px',border:`1px solid ${C.border}`,fontFamily:'monospace',fontSize:11,color:C.textSm}}>{q.id}</td>
                  <td style={{padding:'9px 12px',border:`1px solid ${C.border}`,fontWeight:600,color:C.text}}>{q.dealer}</td>
                  <td style={{padding:'9px 12px',border:`1px solid ${C.border}`,color:C.textSm}}>{q.product}</td>
                  <td style={{padding:'9px 12px',border:`1px solid ${C.border}`,fontWeight:700,color:C.primary}}>{q.amount}</td>
                  <td style={{padding:'9px 12px',border:`1px solid ${C.border}`,color:C.textSm}}>{q.date}</td>
                  <td style={{padding:'9px 12px',border:`1px solid ${C.border}`}}>
                    <Badge color={q.status==='승인'?'success':q.status==='완료'?'primary':'warn'}>{q.status}</Badge>
                  </td>
                </tr>
              ))}
            </tbody>
          </table>
        </Card>
      )}
    </div>
  );
}

// ─── 앱 ───
function App(){
  const [active,setActive]=useState('홈페이지');
  const screens={
    '홈페이지':{title:'홈페이지 (다국어 지원)',comp:<HomepageScreen/>},
    '제품 카탈로그':{title:'제품 카탈로그',comp:<CatalogScreen/>},
    '딜러 포털':{title:'딜러 포털',comp:<DealerScreen/>},
    '견적 시스템':{title:'견적 시스템',comp:<QuoteScreen/>},
    '다국어 설정':{title:'다국어 설정 (i18next)',comp:<I18nScreen/>},
    '관리자':{title:'관리자 백오피스',comp:<AdminScreen/>},
  };
  const {title,comp}=screens[active];
  return(
    <div style={{display:'flex',minHeight:'100vh',background:C.bg}}>
      <Sidebar active={active} setActive={setActive}/>
      <div style={{marginLeft:240,flex:1,minWidth:0}}>
        <Topbar title={title}/>
        <main style={{padding:'22px 26px',minHeight:'calc(100vh - 54px)'}}>
          {comp}
        </main>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
