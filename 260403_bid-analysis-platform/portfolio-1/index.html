// ── App ───────────────────────────────────────────────────────────────────────
const PAGES = [
  { id: 'announcement-list', label: '공고 통합 조회', icon: '📋', section: '데이터 조회' },
  { id: 'prediction', label: '사정률 예측', icon: '📈', section: '예측 분석' },
  { id: 'statistics-report', label: '통계 리포트', icon: '📊', section: '예측 분석' },
  { id: 'admin', label: '관리자 모니터링', icon: '⚙️', section: '시스템 관리' },
];

function App() {
  const [page, setPage] = useState('announcement-list');
  const sections = [...new Set(PAGES.map(p => p.section))];
  const current = PAGES.find(p => p.id === page);

  const renderPage = () => {
    switch(page) {
      case 'announcement-list': return <AnnouncementPage />;
      case 'prediction': return <PredictionPage />;
      case 'statistics-report': return <StatisticsPage />;
      case 'admin': return <AdminPage />;
      default: return null;
    }
  };

  return (
    <div className="layout">
      <aside className="sidebar">
        <div className="sidebar-logo">
          <div className="logo-mark">
            <div className="logo-icon">📡</div>
            <div>
              <div>입찰 인사이트</div>
              <div className="logo-sub">조달 입찰 분석 플랫폼</div>
            </div>
          </div>
        </div>
        {sections.map(sec => (
          <div key={sec} className="sidebar-section">
            <div className="sidebar-label">{sec}</div>
            {PAGES.filter(p => p.section === sec).map(p => (
              <button
                key={p.id}
                className={`nav-item ${page === p.id ? 'active' : ''}`}
                onClick={() => setPage(p.id)}
              >
                <span className="nav-icon">{p.icon}</span>
                {p.label}
              </button>
            ))}
          </div>
        ))}
        <div className="sidebar-bottom">
          <div className="user-badge">
            <div className="avatar">김</div>
            <div className="user-info">
              <div className="name">김영호</div>
              <div className="plan">프리미엄 플랜</div>
            </div>
          </div>
        </div>
      </aside>
      <div className="main">
        <div className="topbar">
          <div className="topbar-title">{current?.icon} {current?.label}</div>
          <div className="topbar-right">
            <span className="badge badge-green">● API 정상</span>
            <span className="badge badge-blue">마지막 수집: 오늘 07:00</span>
            <button className="btn btn-primary">🔄 수동 수집</button>
          </div>
        </div>
        <div className="content">
          {renderPage()}
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
