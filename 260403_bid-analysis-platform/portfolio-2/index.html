<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>부동산 경매 낙찰가 예측 시스템</title>
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" rel="stylesheet">
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://unpkg.com/prop-types@15/prop-types.min.js"></script>
<script src="https://unpkg.com/recharts@2.12.7/umd/Recharts.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Pretendard', -apple-system, sans-serif; background: #F8FAFC; color: #0F172A; }
  :root {
    --primary: #3B82F6;
    --primary-dark: #2563EB;
    --secondary: #1E293B;
    --accent: #F59E0B;
    --bg: #F8FAFC;
    --surface: #FFFFFF;
    --text-primary: #0F172A;
    --text-secondary: #64748B;
    --border: #E2E8F0;
  }
  /* Top Nav */
  .topnav {
    background: var(--secondary);
    padding: 0 28px;
    display: flex; align-items: center; gap: 0;
    height: 56px; position: sticky; top: 0; z-index: 100;
  }
  .brand {
    font-size: 15px; font-weight: 800; color: #fff;
    margin-right: 32px; display: flex; align-items: center; gap: 8px; flex-shrink: 0;
  }
  .brand-icon {
    width: 28px; height: 28px; border-radius: 6px;
    background: var(--primary); display: flex; align-items: center; justify-content: center; font-size: 14px;
  }
  .nav-tabs { display: flex; align-items: center; gap: 2px; flex: 1; }
  .nav-tab {
    padding: 9px 16px; border-radius: 8px; font-size: 13.5px; font-weight: 500;
    color: rgba(255,255,255,0.6); cursor: pointer; transition: all 0.15s;
    border: none; background: none; font-family: 'Pretendard', sans-serif;
    display: flex; align-items: center; gap: 6px;
  }
  .nav-tab:hover { background: rgba(255,255,255,0.08); color: #fff; }
  .nav-tab.active { background: var(--primary); color: #fff; }
  .nav-right { display: flex; align-items: center; gap: 10px; }
  .nav-badge { font-size: 11px; font-weight: 600; padding: 3px 8px; border-radius: 12px; }
  .nav-badge-blue { background: rgba(59,130,246,0.3); color: #93C5FD; }
  /* Hero Banner */
  .hero {
    background: linear-gradient(135deg, var(--secondary) 0%, #0F2044 100%);
    padding: 28px 32px 24px;
    color: #fff;
  }
  .hero-top { display: flex; align-items: flex-start; justify-content: space-between; }
  .hero-label { font-size: 11px; font-weight: 600; color: #93C5FD; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px; }
  .hero-title { font-size: 22px; font-weight: 800; color: #fff; margin-bottom: 4px; }
  .hero-sub { font-size: 13px; color: rgba(255,255,255,0.55); }
  .hero-kpis { display: flex; gap: 28px; margin-top: 20px; }
  .hero-kpi-val { font-size: 26px; font-weight: 800; color: #fff; }
  .hero-kpi-label { font-size: 11.5px; color: rgba(255,255,255,0.5); margin-top: 2px; }
  .hero-kpi-change { font-size: 12px; color: #34D399; margin-top: 2px; }
  /* Main content */
  .main-wrap { max-width: 1280px; margin: 0 auto; padding: 24px 32px; }
  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }
  .grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; }
  .mb-16 { margin-bottom: 16px; }
  .mb-20 { margin-bottom: 20px; }
  .card {
    background: var(--surface); border-radius: 14px;
    border: 1px solid var(--border);
    box-shadow: 0 2px 12px rgba(0,0,0,0.06);
    padding: 20px;
    overflow: hidden;
  }
  .card-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
  .card-title { font-size: 14px; font-weight: 700; }
  .card-sub { font-size: 12px; color: var(--text-secondary); margin-top: 2px; }
  /* Property list */
  .prop-card {
    border: 1.5px solid var(--border); border-radius: 12px; padding: 16px;
    cursor: pointer; transition: all 0.15s; margin-bottom: 10px;
  }
  .prop-card:hover { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(59,130,246,0.1); }
  .prop-card.selected { border-color: var(--primary); background: #EFF6FF; }
  .prop-type { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 700; margin-bottom: 6px; }
  .prop-type-apt { background: #DBEAFE; color: #1D4ED8; }
  .prop-type-office { background: #D1FAE5; color: #065F46; }
  .prop-type-land { background: #FEF3C7; color: #92400E; }
  .prop-name { font-size: 14px; font-weight: 700; margin-bottom: 3px; }
  .prop-meta { font-size: 12px; color: var(--text-secondary); }
  .prop-row { display: flex; justify-content: space-between; margin-top: 8px; }
  .prop-stat { text-align: center; }
  .prop-stat-val { font-size: 15px; font-weight: 800; }
  .prop-stat-label { font-size: 10.5px; color: var(--text-secondary); }
  /* Prediction UI */
  .pred-result {
    background: linear-gradient(135deg, #1E3A8A 0%, #1D4ED8 100%);
    border-radius: 12px; padding: 20px; color: #fff; margin-bottom: 14px;
  }
  .pred-label { font-size: 11px; color: rgba(255,255,255,0.6); text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 4px; }
  .pred-val { font-size: 36px; font-weight: 900; }
  .pred-range-row { display: flex; gap: 16px; margin-top: 10px; }
  .pred-range-item { background: rgba(255,255,255,0.12); border-radius: 8px; padding: 8px 14px; flex: 1; text-align: center; }
  .pred-range-label { font-size: 10px; color: rgba(255,255,255,0.55); }
  .pred-range-val { font-size: 16px; font-weight: 800; margin-top: 2px; }
  /* Confidence ring (simplified) */
  .conf-ring { display: flex; align-items: center; gap: 16px; padding: 14px 16px; background: #F8FAFC; border-radius: 10px; border: 1px solid var(--border); }
  .conf-circle { width: 56px; height: 56px; border-radius: 50%; border: 5px solid #DBEAFE; border-top-color: var(--primary); display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 800; color: var(--primary); flex-shrink: 0; }
  /* Table */
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th { text-align: left; padding: 9px 12px; font-size: 11.5px; font-weight: 600; color: var(--text-secondary); border-bottom: 1.5px solid var(--border); background: #F8FAFC; }
  td { padding: 11px 12px; border-bottom: 1px solid var(--border); vertical-align: middle; }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: #F8FAFC; }
  /* Sim form */
  .sim-row { display: flex; justify-content: space-between; align-items: center; padding: 9px 0; border-bottom: 1px solid var(--border); font-size: 13px; }
  .sim-row:last-child { border-bottom: none; }
  .sim-label { color: var(--text-secondary); }
  .sim-val { font-weight: 700; }
  .sim-input { width: 110px; padding: 5px 10px; border: 1.5px solid var(--border); border-radius: 6px; font-size: 13px; font-family: 'Pretendard', sans-serif; text-align: right; }
  /* Tabs in card */
  .tab-row { display: flex; gap: 6px; margin-bottom: 16px; }
  .tab-btn { padding: 5px 14px; border-radius: 20px; font-size: 12.5px; font-weight: 600; cursor: pointer; border: 1.5px solid; transition: all 0.15s; }
  .tab-btn.on { background: var(--primary); color: #fff; border-color: var(--primary); }
  .tab-btn.off { background: transparent; color: var(--text-secondary); border-color: var(--border); }
  /* Scrollbar */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-thumb { background: #CBD5E1; border-radius: 2px; }
  /* Scroll area */
  .scroll-area { max-height: 280px; overflow-y: auto; }
  .section-title { font-size: 16px; font-weight: 800; margin-bottom: 4px; }
  .section-sub { font-size: 13px; color: var(--text-secondary); margin-bottom: 16px; }
  .btn { display: inline-flex; align-items: center; gap: 6px; padding: 7px 14px; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; border: none; transition: all 0.15s; font-family: 'Pretendard', sans-serif; }
  .btn-primary { background: var(--primary); color: #fff; }
  .btn-outline { background: transparent; color: var(--text-primary); border: 1.5px solid var(--border); }
  .tag { display: inline-flex; align-items: center; padding: 3px 8px; border-radius: 5px; font-size: 11px; font-weight: 600; }
  .tag-success { background: #D1FAE5; color: #065F46; }
  .tag-warning { background: #FEF3C7; color: #92400E; }
  .tag-info { background: #DBEAFE; color: #1D4ED8; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useMemo } = React;
const { BarChart, Bar, LineChart, Line, AreaChart, Area, XAxis, YAxis, CartesianGrid, Tooltip, ResponsiveContainer, ComposedChart, Legend, RadialBarChart, RadialBar, PieChart, Pie, Cell } = Recharts;

// ── Data ──────────────────────────────────────────────────────────────────────
const properties = [
  { id: 1, type: '아파트', name: '서울 송파구 잠실동 파크리오 84㎡', court: '서울동부지방법원', appraisal: 132000, minBid: 105600, failCount: 0, deadline: '2026-04-22', area: '서울' },
  { id: 2, type: '아파트', name: '경기 수원시 영통구 망포동 힐스테이트 59㎡', court: '수원지방법원', appraisal: 58000, minBid: 46400, failCount: 1, deadline: '2026-04-25', area: '경기' },
  { id: 3, type: '상가', name: '서울 강남구 역삼동 테헤란로 1층 상가 45㎡', court: '서울중앙지방법원', appraisal: 88000, minBid: 61600, failCount: 2, deadline: '2026-04-28', area: '서울' },
  { id: 4, type: '토지', name: '충북 충주시 중앙탑면 전답 2,100㎡', court: '청주지방법원', appraisal: 21000, minBid: 14700, failCount: 3, deadline: '2026-05-06', area: '충북' },
  { id: 5, type: '아파트', name: '인천 연수구 송도동 더샵센트럴파크 75㎡', court: '인천지방법원', appraisal: 74000, minBid: 59200, failCount: 0, deadline: '2026-05-08', area: '인천' },
];

const auctionTrend = [
  { month: '10월', rate: 91.2, count: 312 },
  { month: '11월', rate: 88.7, count: 287 },
  { month: '12월', rate: 85.3, count: 341 },
  { month: '1월', rate: 89.4, count: 298 },
  { month: '2월', rate: 92.1, count: 376 },
  { month: '3월', rate: 93.8, count: 402 },
];

const regionRates = [
  { region: '서울', apt: 97.2, office: 88.4, land: 81.2 },
  { region: '경기', apt: 93.5, office: 85.1, land: 79.8 },
  { region: '인천', apt: 91.8, office: 83.7, land: 77.4 },
  { region: '부산', apt: 89.3, office: 82.1, land: 75.6 },
  { region: '대전', apt: 87.1, office: 80.4, land: 73.2 },
];

// Prediction per property
const predMap = {
  1: { rate: 97.2, min: 94.8, max: 99.1, failProb: 8, confidence: 91 },
  2: { rate: 88.4, min: 85.2, max: 91.8, failProb: 22, confidence: 85 },
  3: { rate: 79.3, min: 75.1, max: 83.6, failProb: 41, confidence: 78 },
  4: { rate: 71.8, min: 66.4, max: 77.2, failProb: 58, confidence: 72 },
  5: { rate: 94.1, min: 91.2, max: 96.9, failProb: 12, confidence: 89 },
};

const similarCases = [
  { name: '잠실 트리지움 84㎡', date: '2025.12', rate: 98.4, amount: 128900 },
  { name: '잠실 리센츠 84㎡', date: '2026.01', rate: 96.8, amount: 127000 },
  { name: '잠실 엘스 84㎡', date: '2026.02', rate: 97.1, amount: 127700 },
  { name: '가락동 파크뷰 81㎡', date: '2026.03', rate: 95.9, amount: 125600 },
];

// ROI Simulation
const initialInputs = { bidAmount: 128000, acquisition: 4.6, repair: 2000, rent: 420, months: 12 };

const COLORS_PIE = ['#3B82F6', '#F59E0B', '#10B981'];

// ── Pages ─────────────────────────────────────────────────────────────────────
function AuctionListPage() {
  const [typeFilter, setTypeFilter] = useState('all');
  const filtered = properties.filter(p => typeFilter === 'all' || p.type === typeFilter);
  return (
    <div>
      <div className="section-title">경매 물건 조회</div>
      <div className="section-sub">법원경매정보 OpenAPI 연동 · 유형/지역 필터 · Kakao Maps 지도 연동</div>
      <div style={{display:'flex',gap:'8px',marginBottom:'16px',flexWrap:'wrap'}}>
        {['all','아파트','상가','토지'].map(t => (
          <button key={t} className={`tab-btn ${typeFilter === t ? 'on' : 'off'}`} onClick={() => setTypeFilter(t)}>
            {t === 'all' ? '전체' : t}
          </button>
        ))}
        <div style={{marginLeft:'auto',display:'flex',gap:'8px'}}>
          <button className="btn btn-outline" style={{fontSize:'12.5px'}}>🗺️ 지도 뷰</button>
          <button className="btn btn-primary" style={{fontSize:'12.5px'}}>📋 목록 뷰</button>
        </div>
      </div>
      <div className="grid-2">
        <div>
          <div className="scroll-area" style={{maxHeight:'420px'}}>
            {filtered.map(p => {
              const pred = predMap[p.id];
              return (
                <div key={p.id} className="prop-card">
                  <span className={`prop-type ${p.type === '아파트' ? 'prop-type-apt' : p.type === '상가' ? 'prop-type-office' : 'prop-type-land'}`}>{p.type}</span>
                  <div className="prop-name">{p.name}</div>
                  <div className="prop-meta">{p.court} · 기일 {p.deadline}</div>
                  <div className="prop-row">
                    <div className="prop-stat">
                      <div className="prop-stat-val" style={{color:'var(--text-primary)'}}>{(p.appraisal/10000).toFixed(1)}억</div>
                      <div className="prop-stat-label">감정가</div>
                    </div>
                    <div className="prop-stat">
                      <div className="prop-stat-val" style={{color:'#059669'}}>{(p.minBid/10000).toFixed(1)}억</div>
                      <div className="prop-stat-label">최저가</div>
                    </div>
                    <div className="prop-stat">
                      <div className="prop-stat-val" style={{color:'var(--primary)'}}>{pred.rate}%</div>
                      <div className="prop-stat-label">예상 낙찰가율</div>
                    </div>
                    <div className="prop-stat">
                      <div className="prop-stat-val" style={{color: p.failCount > 1 ? '#D97706' : 'var(--text-secondary)'}}>{p.failCount}회</div>
                      <div className="prop-stat-label">유찰 횟수</div>
                    </div>
                  </div>
                </div>
              );
            })}
          </div>
        </div>
        {/* Map placeholder */}
        <div className="card" style={{background:'linear-gradient(135deg,#1E293B,#0F2044)',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',minHeight:'380px',color:'rgba(255,255,255,0.6)'}}>
          <div style={{fontSize:'36px',marginBottom:'12px'}}>🗺️</div>
          <div style={{fontSize:'14px',fontWeight:'700',color:'#fff',marginBottom:'6px'}}>Kakao Maps 연동</div>
          <div style={{fontSize:'12px',textAlign:'center',lineHeight:'1.6'}}>지도 영역 이동 시<br/>해당 범위 경매 물건 자동 필터링</div>
          <div style={{marginTop:'16px',display:'flex',gap:'8px',flexWrap:'wrap',justifyContent:'center'}}>
            {['📍 잠실 파크리오','📍 수원 힐스테이트','📍 강남 상가'].map(pin => (
              <div key={pin} style={{fontSize:'11px',background:'rgba(59,130,246,0.2)',color:'#93C5FD',padding:'4px 10px',borderRadius:'12px'}}>{pin}</div>
            ))}
          </div>
        </div>
      </div>
    </div>
  );
}

function PredictionPage() {
  const [selected, setSelected] = useState(properties[0]);
  const pred = predMap[selected.id];
  const predAmount = Math.round(selected.appraisal * pred.rate / 100);

  return (
    <div>
      <div className="section-title">낙찰가율 예측</div>
      <div className="section-sub">선형회귀 + 로지스틱 앙상블 모델 · k-NN 유사 사례 제공 · 신뢰 구간 95%</div>
      <div className="grid-2" style={{gridTemplateColumns:'1fr 1fr',gap:'16px'}}>
        <div>
          <div className="card mb-16" style={{marginBottom:'14px'}}>
            <div className="card-title" style={{marginBottom:'10px'}}>물건 선택</div>
            {properties.slice(0,4).map(p => (
              <div key={p.id} className={`prop-card ${selected.id === p.id ? 'selected' : ''}`} style={{padding:'10px 12px',marginBottom:'6px'}} onClick={() => setSelected(p)}>
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                  <div>
                    <span className={`prop-type ${p.type === '아파트' ? 'prop-type-apt' : p.type === '상가' ? 'prop-type-office' : 'prop-type-land'}`} style={{marginBottom:'4px',display:'inline-block'}}>{p.type}</span>
                    <div style={{fontSize:'13px',fontWeight:'700'}}>{p.name.slice(0,22)}...</div>
                    <div style={{fontSize:'11.5px',color:'var(--text-secondary)'}}>감정가 {(p.appraisal/10000).toFixed(1)}억 · 유찰 {p.failCount}회</div>
                  </div>
                  {selected.id === p.id && <span style={{color:'var(--primary)',fontWeight:'800',fontSize:'18px'}}>✓</span>}
                </div>
              </div>
            ))}
          </div>
          <div className="card">
            <div className="card-title" style={{marginBottom:'10px'}}>유사 낙찰 사례 (k-NN 검색)</div>
            <table>
              <thead><tr><th>물건</th><th>낙찰일</th><th>낙찰가율</th></tr></thead>
              <tbody>
                {similarCases.map((c,i) => (
                  <tr key={i}>
                    <td style={{fontSize:'12px'}}>{c.name}</td>
                    <td style={{fontSize:'12px',color:'var(--text-secondary)'}}>{c.date}</td>
                    <td><span style={{fontWeight:'700',color:'var(--primary)'}}>{c.rate}%</span></td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        </div>
        <div>
          <div className="pred-result mb-16">
            <div className="pred-label">예상 낙찰가율</div>
            <div className="pred-val">{pred.rate}%</div>
            <div style={{fontSize:'13px',color:'rgba(255,255,255,0.65)',marginTop:'4px'}}>예상 낙찰가: {predAmount.toLocaleString()}만원</div>
            <div className="pred-range-row">
              <div className="pred-range-item">
                <div className="pred-range-label">하한 (95% CI)</div>
                <div className="pred-range-val">{pred.min}%</div>
              </div>
              <div className="pred-range-item">
                <div className="pred-range-label">유찰 확률</div>
                <div className="pred-range-val" style={{color:'#FCD34D'}}>{pred.failProb}%</div>
              </div>
              <div className="pred-range-item">
                <div className="pred-range-label">상한 (95% CI)</div>
                <div className="pred-range-val">{pred.max}%</div>
              </div>
            </div>
          </div>
          <div className="conf-ring mb-16" style={{marginBottom:'14px'}}>
            <div className="conf-circle">{pred.confidence}%</div>
            <div>
              <div style={{fontWeight:'700',fontSize:'14px'}}>예측 신뢰도</div>
              <div style={{fontSize:'12px',color:'var(--text-secondary)',marginTop:'3px'}}>
                {pred.confidence >= 88 ? '유사 낙찰 사례 충분, 높은 신뢰도' : pred.confidence >= 80 ? '유사 사례 적정, 중간 신뢰도' : '유사 사례 부족, 낮은 신뢰도'}
              </div>
            </div>
          </div>
          <div className="card">
            <div className="card-title" style={{marginBottom:'12px'}}>낙찰가율 분포 (동일 유형)</div>
            <ResponsiveContainer width="100%" height={170}>
              <BarChart data={[
                {range:'70-75%',count:12},{range:'75-80%',count:28},{range:'80-85%',count:45},{range:'85-90%',count:62},{range:'90-95%',count:84},{range:'95-100%',count:71},{range:'100%+',count:38},
              ]} margin={{top:0,right:0,bottom:0,left:0}}>
                <XAxis dataKey="range" tick={{fontSize:9,fill:'#94A3B8'}} axisLine={false} tickLine={false} />
                <YAxis tick={{fontSize:10,fill:'#94A3B8'}} axisLine={false} tickLine={false} />
                <Tooltip />
                <Bar dataKey="count" name="건수" radius={[3,3,0,0]} fill="#3B82F6">
                  {[false,false,false,false,false,true,false].map((highlight,i) => (

    </div>
  );
}

function SimulatorPage() {
  const [inputs, setInputs] = useState(initialInputs);
  const roi = useMemo(() => {
    const totalInvest = inputs.bidAmount * 10000 * (1 + inputs.acquisition/100) + inputs.repair * 10000;
    const totalRent = inputs.rent * 10000 * inputs.months;
    const netRoi = ((totalRent / totalInvest) * 100).toFixed(2);
    return { totalInvest, totalRent, netRoi, breakeven: Math.ceil(totalInvest / (inputs.rent * 10000)) };
  }, [inputs]);

  const scenarios = [
    { label: '낙관', bidAmount: inputs.bidAmount * 0.95, color: '#059669', emoji: '🟢' },
    { label: '기준', bidAmount: inputs.bidAmount, color: '#3B82F6', emoji: '🔵' },
    { label: '비관', bidAmount: inputs.bidAmount * 1.05, color: '#DC2626', emoji: '🔴' },
  ].map(s => ({
    ...s,
    invest: s.bidAmount * 10000 * (1 + inputs.acquisition/100) + inputs.repair * 10000,
    roi: ((inputs.rent * 10000 * inputs.months) / (s.bidAmount * 10000 * (1 + inputs.acquisition/100) + inputs.repair * 10000) * 100).toFixed(2),
  }));

  return (
    <div>
      <div className="section-title">수익률 시뮬레이터</div>
      <div className="section-sub">낙관/기준/비관 3시나리오 동시 계산 · React Hook Form + useMemo 실시간 연산</div>
      <div className="grid-2">
        <div className="card">
          <div className="card-title" style={{marginBottom:'14px'}}>투자 조건 입력</div>
          {[
            ['낙찰가 (만원)', 'bidAmount', '만원'],
            ['취득세율 (%)', 'acquisition', '%'],
            ['수리비 (만원)', 'repair', '만원'],
            ['월 임대수익 (만원)', 'rent', '만원'],
            ['보유 기간 (개월)', 'months', '개월'],
          ].map(([label, key, unit]) => (
            <div key={key} className="sim-row">
              <span className="sim-label">{label}</span>
              <div style={{display:'flex',alignItems:'center',gap:'4px'}}>
                <input
                  className="sim-input"
                  type="number"
                  value={inputs[key]}
                  onChange={e => setInputs(prev => ({...prev, [key]: parseFloat(e.target.value) || 0}))}
                />
                <span style={{fontSize:'12px',color:'var(--text-secondary)'}}>{unit}</span>
              </div>
            </div>
          ))}
          <div style={{marginTop:'14px',padding:'12px',background:'#EFF6FF',borderRadius:'8px'}}>
            <div style={{fontSize:'12px',color:'#1D4ED8',fontWeight:'600',marginBottom:'4px'}}>기준 시나리오 결과</div>
            <div style={{display:'flex',justifyContent:'space-between',fontSize:'13px',marginBottom:'4px'}}>
              <span style={{color:'var(--text-secondary)'}}>총 투자비용</span>
              <span style={{fontWeight:'700'}}>{Math.round(roi.totalInvest/10000).toLocaleString()}만원</span>
            </div>
            <div style={{display:'flex',justifyContent:'space-between',fontSize:'13px',marginBottom:'4px'}}>
              <span style={{color:'var(--text-secondary)'}}>임대수익 합계</span>
              <span style={{fontWeight:'700',color:'#059669'}}>{Math.round(roi.totalRent/10000).toLocaleString()}만원</span>
            </div>
            <div style={{display:'flex',justifyContent:'space-between',fontSize:'14px'}}>
              <span style={{fontWeight:'700'}}>순 투자수익률</span>
              <span style={{fontWeight:'900',color:'var(--primary)',fontSize:'16px'}}>{roi.netRoi}%</span>
            </div>
          </div>
        </div>
        <div>
          <div className="card mb-16" style={{marginBottom:'14px'}}>
            <div className="card-title" style={{marginBottom:'12px'}}>3개 시나리오 비교</div>
            <table>
              <thead><tr><th>시나리오</th><th>낙찰가</th><th>총 투자</th><th>수익률</th></tr></thead>
              <tbody>
                {scenarios.map(s => (
                  <tr key={s.label}>
                    <td><span style={{fontWeight:'700',color:s.color}}>{s.emoji} {s.label}</span></td>
                    <td style={{fontWeight:'600'}}>{Math.round(s.bidAmount).toLocaleString()}만원</td>
                    <td style={{fontSize:'12.5px',color:'var(--text-secondary)'}}>{Math.round(s.invest/10000).toLocaleString()}만원</td>
                    <td><span style={{fontWeight:'800',color:s.color,fontSize:'14px'}}>{s.roi}%</span></td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
          <div className="card">
            <div className="card-title" style={{marginBottom:'12px'}}>비용 구조 분석</div>
            <ResponsiveContainer width="100%" height={180}>
              <BarChart data={[
                { name: '낙찰가', value: inputs.bidAmount },
                { name: '취득세', value: Math.round(inputs.bidAmount * inputs.acquisition / 100) },
                { name: '수리비', value: inputs.repair },
              ]} margin={{top:0,right:0,bottom:0,left:0}}>
                <CartesianGrid strokeDasharray="3 3" stroke="#F1F5F9" />
                <XAxis dataKey="name" tick={{fontSize:11,fill:'#94A3B8'}} axisLine={false} tickLine={false} />
                <YAxis tick={{fontSize:10,fill:'#94A3B8'}} axisLine={false} tickLine={false} tickFormatter={v=>v.toLocaleString()} />
                <Tooltip formatter={(v) => [`${v.toLocaleString()}만원`]} />
                <Bar dataKey="value" name="금액" radius={[4,4,0,0]}>
                  <Cell fill="#3B82F6" />
                  <Cell fill="#F59E0B" />
                  <Cell fill="#10B981" />
                </Bar>
              </BarChart>
            </ResponsiveContainer>
          </div>
        </div>
      </div>
    </div>
  );
}
