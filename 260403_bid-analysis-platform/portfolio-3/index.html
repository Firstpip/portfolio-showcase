<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>입찰 인텔리전스 통합 플랫폼</title>
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" rel="stylesheet">
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://unpkg.com/prop-types@15/prop-types.min.js"></script>

<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Pretendard', -apple-system, sans-serif; background: #F0FDF4; color: #064E3B; }
  :root {
    --primary: #059669;
    --primary-dark: #047857;
    --secondary: #065F46;
    --accent: #10B981;
    --bg: #F0FDF4;
    --surface: #FFFFFF;
    --text-primary: #064E3B;
    --text-secondary: #6B7280;
    --border: #D1FAE5;
    --sidebar-w: 240px;
  }
  .layout { display: flex; height: 100vh; overflow: hidden; }
  /* Sidebar — bright */
  .sidebar {
    width: var(--sidebar-w); background: var(--surface); border-right: 1.5px solid var(--border);
    display: flex; flex-direction: column; flex-shrink: 0; overflow-y: auto;
  }
  .sidebar-logo { padding: 18px 16px 14px; border-bottom: 1px solid var(--border); }
  .logo-box { display: flex; align-items: center; gap: 10px; }
  .logo-icon { width: 34px; height: 34px; border-radius: 10px; background: var(--primary); display: flex; align-items: center; justify-content: center; font-size: 17px; }
  .logo-name { font-size: 14px; font-weight: 800; color: var(--text-primary); }
  .logo-sub { font-size: 10.5px; color: var(--text-secondary); margin-top: 1px; }
  .sidebar-team { margin: 10px 12px 0; padding: 10px 10px; background: var(--bg); border-radius: 8px; border: 1px solid var(--border); }
  .team-label { font-size: 10px; font-weight: 600; color: var(--text-secondary); margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.6px; }
  .team-name { font-size: 13px; font-weight: 700; color: var(--text-primary); }
  .nav-section { padding: 14px 12px 6px; }
  .nav-section-label { font-size: 10px; font-weight: 600; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.7px; padding: 0 8px; margin-bottom: 5px; }
  .nav-item {
    display: flex; align-items: center; gap: 8px;
    padding: 8px 10px; border-radius: 8px; font-size: 13.5px; font-weight: 500;
    color: var(--text-secondary); cursor: pointer; border: none; background: none;
    width: 100%; text-align: left; transition: all 0.15s; margin-bottom: 1px;
  }
  .nav-item:hover { background: var(--bg); color: var(--text-primary); }
  .nav-item.active { background: #D1FAE5; color: var(--primary); font-weight: 700; }
  .nav-icon { font-size: 15px; width: 18px; text-align: center; flex-shrink: 0; }
  .nav-badge { margin-left: auto; font-size: 10.5px; font-weight: 700; background: var(--primary); color: #fff; padding: 1px 7px; border-radius: 10px; }
  .sidebar-bottom { margin-top: auto; padding: 12px; border-top: 1px solid var(--border); }
  .user-row { display: flex; align-items: center; gap: 8px; padding: 8px; border-radius: 8px; background: var(--bg); }
  .avatar { width: 30px; height: 30px; border-radius: 50%; background: var(--primary); display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; color: #fff; flex-shrink: 0; }
  .user-name { font-size: 13px; font-weight: 600; color: var(--text-primary); }
  .user-role { font-size: 11px; color: var(--text-secondary); }
  /* Main */
  .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
  .topbar { height: 52px; background: var(--surface); border-bottom: 1.5px solid var(--border); display: flex; align-items: center; padding: 0 22px; justify-content: space-between; flex-shrink: 0; }
  .topbar-title { font-size: 14px; font-weight: 700; color: var(--text-primary); }
  .content { flex: 1; overflow-y: auto; padding: 22px; }
  /* Cards */
  .card { background: var(--surface); border-radius: 12px; border: 1.5px solid var(--border); padding: 18px; }
  .card-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
  .card-title { font-size: 13.5px; font-weight: 700; color: var(--text-primary); }
  .card-sub { font-size: 11.5px; color: var(--text-secondary); margin-top: 2px; }
  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; }
  .grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; }
  .mb-14 { margin-bottom: 14px; }
  /* KPI */
  .kpi-card { background: var(--surface); border: 1.5px solid var(--border); border-radius: 12px; padding: 16px 18px; }
  .kpi-icon { font-size: 22px; margin-bottom: 8px; }
  .kpi-label { font-size: 11.5px; color: var(--text-secondary); font-weight: 500; margin-bottom: 4px; }
  .kpi-value { font-size: 22px; font-weight: 800; color: var(--text-primary); }
  .kpi-change { font-size: 11.5px; margin-top: 3px; }
  .kpi-change.up { color: var(--primary); }
  /* Tags */
  .tag { display: inline-flex; align-items: center; padding: 2px 8px; border-radius: 5px; font-size: 11px; font-weight: 600; }
  .tag-green { background: #D1FAE5; color: #065F46; }
  .tag-blue { background: #DBEAFE; color: #1D4ED8; }
  .tag-amber { background: #FEF3C7; color: #92400E; }
  .tag-gray { background: #F1F5F9; color: #475569; }
  /* Buttons */
  .btn { display: inline-flex; align-items: center; gap: 6px; padding: 7px 14px; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; border: none; transition: all 0.15s; font-family: 'Pretendard', sans-serif; }
  .btn-primary { background: var(--primary); color: #fff; }
  .btn-primary:hover { background: var(--primary-dark); }
  .btn-outline { background: transparent; color: var(--text-primary); border: 1.5px solid var(--border); }
  /* Plan cards */
  .plan-card { border: 2px solid var(--border); border-radius: 14px; padding: 22px; text-align: center; position: relative; cursor: pointer; transition: all 0.15s; }
  .plan-card:hover { border-color: var(--accent); transform: translateY(-2px); box-shadow: 0 8px 24px rgba(16,185,129,0.12); }
  .plan-card.popular { border-color: var(--primary); }
  .plan-badge { position: absolute; top: -11px; left: 50%; transform: translateX(-50%); background: var(--primary); color: #fff; font-size: 11px; font-weight: 700; padding: 3px 12px; border-radius: 10px; }
  .plan-name { font-size: 14px; font-weight: 800; color: var(--text-primary); margin-bottom: 4px; }
  .plan-price { font-size: 28px; font-weight: 900; color: var(--primary); }
  .plan-price span { font-size: 13px; font-weight: 500; color: var(--text-secondary); }
  .plan-feature { font-size: 12px; color: var(--text-secondary); padding: 5px 0; border-bottom: 1px solid var(--border); text-align: left; }
  .plan-feature:last-child { border-bottom: none; }
  .plan-feature.ok::before { content: '✓ '; color: var(--primary); font-weight: 700; }
  .plan-feature.no { opacity: 0.4; }
  .plan-feature.no::before { content: '✗ '; color: #9CA3AF; font-weight: 700; }
  /* Workspace */
  .workspace-board { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 14px; }
  .kanban-col { background: var(--bg); border-radius: 10px; padding: 12px; border: 1px solid var(--border); }
  .kanban-header { font-size: 12px; font-weight: 700; color: var(--text-secondary); margin-bottom: 10px; display: flex; align-items: center; justify-content: space-between; }
  .kanban-card { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 10px; margin-bottom: 8px; }
  .kanban-title { font-size: 12.5px; font-weight: 700; color: var(--text-primary); margin-bottom: 4px; }
  .kanban-meta { font-size: 11px; color: var(--text-secondary); }
  /* Alert engine */
  .alert-card { border: 1.5px solid var(--border); border-radius: 10px; padding: 14px; margin-bottom: 10px; }
  .alert-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
  .alert-name { font-size: 13px; font-weight: 700; }
  .alert-cond { font-size: 11.5px; color: var(--text-secondary); margin-bottom: 6px; }
  .alert-row { display: flex; gap: 6px; align-items: center; }
  /* Toggle */
  .toggle { width: 36px; height: 20px; border-radius: 10px; cursor: pointer; position: relative; transition: background 0.2s; flex-shrink: 0; }
  .toggle.on { background: var(--primary); }
  .toggle.off { background: #D1D5DB; }
  .toggle::after { content: ''; position: absolute; width: 14px; height: 14px; border-radius: 50%; background: #fff; top: 3px; transition: left 0.2s; }
  .toggle.on::after { left: 19px; }
  .toggle.off::after { left: 3px; }
  /* Comment */
  .comment-bubble { display: flex; gap: 10px; margin-bottom: 10px; }
  .comment-avatar { width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; color: #fff; flex-shrink: 0; }
  .comment-content { background: #F8FAFC; border-radius: 10px; padding: 8px 12px; flex: 1; border: 1px solid var(--border); }
  .comment-author { font-size: 11.5px; font-weight: 700; color: var(--text-primary); }
  .comment-text { font-size: 12.5px; color: #374151; margin-top: 2px; line-height: 1.5; }
  .comment-time { font-size: 10.5px; color: var(--text-secondary); margin-top: 3px; }
  /* Scrollbar */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-thumb { background: #A7F3D0; border-radius: 2px; }
  /* Page header */
  .page-header { margin-bottom: 18px; }
  .page-title { font-size: 19px; font-weight: 800; color: var(--text-primary); }
  .page-desc { font-size: 12.5px; color: var(--text-secondary); margin-top: 3px; }
  /* Divider */
  .divider { height: 1px; background: var(--border); margin: 14px 0; }
  /* Stat */
  .stat-row { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid var(--border); font-size: 13px; }
  .stat-row:last-child { border-bottom: none; }
  /* Table */
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th { text-align: left; padding: 9px 10px; font-size: 11.5px; font-weight: 600; color: var(--text-secondary); border-bottom: 1.5px solid var(--border); background: var(--bg); }
  td { padding: 10px 10px; border-bottom: 1px solid var(--border); vertical-align: middle; }
  tr:last-child td { border-bottom: none; }
</style>
</head>
<body>

// ── App ───────────────────────────────────────────────────────────────────────
const PAGES = [
  { id: 'strategy-dashboard', label: '입찰 전략 대시보드', icon: '📊', section: '분석' },
  { id: 'team-workspace', label: '팀 협업 워크스페이스', icon: '👥', section: '팀 협업' },
  { id: 'alert-engine', label: '맞춤 알림 엔진', icon: '🔔', section: '팀 협업', badge: '3' },
  { id: 'subscription', label: '구독 요금제 관리', icon: '💳', section: '설정' },
];

function App() {
  const [page, setPage] = useState('subscription');
  const sections = [...new Set(PAGES.map(p => p.section))];
  const current = PAGES.find(p => p.id === page);

  const renderPage = () => {
    switch(page) {
      case 'subscription': return <SubscriptionPage />;
      case 'team-workspace': return <WorkspacePage />;
      case 'alert-engine': return <AlertPage />;
      case 'strategy-dashboard': return <StrategyPage />;
      default: return null;
    }
  };

  return (
    <div className="layout">
      <aside className="sidebar">
        <div className="sidebar-logo">
          <div className="logo-box">
            <div className="logo-icon">🏆</div>
            <div>
              <div className="logo-name">입찰 인텔리전스</div>
              <div className="logo-sub">SaaS 통합 플랫폼</div>
            </div>
          </div>
        </div>
        <div className="sidebar-team">
          <div className="team-label">팀 워크스페이스</div>
          <div className="team-name">㈜현대건설 입찰팀 — 프리미엄</div>
        </div>
        {sections.map(sec => (
          <div key={sec} className="nav-section">
            <div className="nav-section-label">{sec}</div>
            {PAGES.filter(p => p.section === sec).map(p => (
              <button
                key={p.id}
                className={`nav-item ${page === p.id ? 'active' : ''}`}
                onClick={() => setPage(p.id)}
              >
                <span className="nav-icon">{p.icon}</span>
                {p.label}
                {p.badge && <span className="nav-badge">{p.badge}</span>}
              </button>
            ))}
          </div>
        ))}
        <div className="sidebar-bottom">
          <div className="user-row">
            <div className="avatar">김</div>
            <div>
              <div className="user-name">김영호</div>
              <div className="user-role">팀장</div>
            </div>
          </div>
        </div>
      </aside>
      <div className="main">
        <div className="topbar">
          <div className="topbar-title">{current?.icon} {current?.label}</div>
          <div style={{display:'flex',alignItems:'center',gap:'10px'}}>
            <span style={{fontSize:'12px',color:'var(--text-secondary)'}}>● Socket.io 연결됨</span>
            <button className="btn btn-primary" style={{fontSize:'12px',padding:'5px 12px'}}>+ 공고 추가</button>
          </div>
        </div>
        <div className="content">
          {renderPage()}
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
