// ── 공통 컴포넌트 ──
function Badge({ color, children }) {
  const palettes = {
    hot: { bg:'#FEE2E2', text:'#DC2626', border:'#FECACA' },
    warm: { bg:'#FEF3C7', text:'#D97706', border:'#FDE68A' },
    normal: { bg:'#DBEAFE', text:'#1D4ED8', border:'#BFDBFE' },
    cold: { bg:'#F1F5F9', text:'#64748B', border:'#E2E8F0' },
    success: { bg:'#D1FAE5', text:'#059669', border:'#A7F3D0' },
    warning: { bg:'#FEF3C7', text:'#D97706', border:'#FDE68A' },
    error: { bg:'#FEE2E2', text:'#DC2626', border:'#FECACA' },
    tag: { bg:'#EFF6FF', text:'#3B82F6', border:'#BFDBFE' },
  };
  const p = palettes[color] || palettes.tag;
  return (
    <span style={{ display:'inline-flex', alignItems:'center', gap:4, padding:'2px 8px', borderRadius:20,
      fontSize:11, fontWeight:600, background:p.bg, color:p.text, border:`1px solid ${p.border}` }}>
      {children}
    </span>
  );
}

function KpiCard({ title, value, sub, icon, color, trend }) {
  return (
    <div style={{ background:C.surface, borderRadius:12, padding:'20px 24px', boxShadow:'0 1px 3px rgba(0,0,0,0.06)',
      border:`1px solid ${C.border}`, display:'flex', alignItems:'flex-start', gap:16, flex:1 }}>
      <div style={{ width:48, height:48, borderRadius:12, background:`${color}18`,
        display:'flex', alignItems:'center', justifyContent:'center', fontSize:22, flexShrink:0 }}>{icon}</div>
      <div style={{ flex:1 }}>
        <div style={{ fontSize:12, color:C.textSec, fontWeight:500, marginBottom:4 }}>{title}</div>
        <div style={{ fontSize:28, fontWeight:700, color:C.text, lineHeight:1 }}>{value}</div>
        {sub && <div style={{ fontSize:12, color:C.textMute, marginTop:4 }}>{sub}</div>}
        {trend && <div style={{ fontSize:11, color: trend > 0 ? C.success : C.danger, marginTop:4, fontWeight:600 }}>
          {trend > 0 ? '▲' : '▼'} {Math.abs(trend)}건 전일 대비
        </div>}
      </div>
    </div>
  );
}

// ── 모달 ──
function Modal({ title, onClose, children, width=560 }) {
  return (
    <div style={{ position:'fixed', inset:0, zIndex:1000, display:'flex', alignItems:'center', justifyContent:'center' }}>
      <div onClick={onClose} style={{ position:'absolute', inset:0, background:'rgba(15,23,42,0.5)' }} />
      <div style={{ position:'relative', background:C.surface, borderRadius:16, width, maxWidth:'90vw',
        maxHeight:'85vh', overflowY:'auto', boxShadow:'0 20px 60px rgba(0,0,0,0.2)', animation:'fadeIn 180ms ease' }}>
        <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between',
          padding:'20px 24px 16px', borderBottom:`1px solid ${C.border}` }}>
          <h3 style={{ fontSize:16, fontWeight:700, color:C.text }}>{title}</h3>
          <button onClick={onClose} style={{ border:'none', background:'none', cursor:'pointer',
            width:32, height:32, borderRadius:8, display:'flex', alignItems:'center', justifyContent:'center',
            fontSize:18, color:C.textSec, transition:'background .15s' }}
            onMouseEnter={e=>e.target.style.background=C.border} onMouseLeave={e=>e.target.style.background='none'}>✕</button>
        </div>
        <div style={{ padding:'20px 24px' }}>{children}</div>
      </div>
    </div>
  );
}

// ── TopBar ──
function TopBar({ title }) {
  const [time, setTime] = React.useState(new Date());
  React.useEffect(() => { const t = setInterval(() => setTime(new Date()), 60000); return () => clearInterval(t); }, []);
  return (
    <div style={{ background:C.surface, borderBottom:`1px solid ${C.border}`, padding:'0 28px',
      height:60, display:'flex', alignItems:'center', gap:16, flexShrink:0 }}>
      <h1 style={{ flex:1, fontSize:17, fontWeight:700, color:C.text }}>{title}</h1>
      <div style={{ fontSize:12, color:C.textMute }}>
        {time.toLocaleDateString('ko-KR', { year:'numeric', month:'long', day:'numeric', weekday:'long' })}
      </div>
      <button style={{ width:36, height:36, borderRadius:8, border:`1px solid ${C.border}`,
        background:'none', cursor:'pointer', fontSize:18, display:'flex', alignItems:'center', justifyContent:'center' }}>🔔</button>

        display:'flex', alignItems:'center', justifyContent:'center', color:'#fff', fontWeight:700, fontSize:14 }}>최</div>
    </div>
  );
}

              <div style={{ fontSize:11, color:C.textMute, marginTop:6 }}>{modal.date}</div>
            </div>
            {modal.status !== 'success' && (
              <div>
                <div style={{ fontSize:12, fontWeight:600, color:C.textSec, marginBottom:6 }}>수동 수정</div>
                <select style={{ width:'100%', padding:'8px 12px', borderRadius:8, border:`1px solid ${C.border}`,
                  fontSize:13, fontFamily:'inherit', marginBottom:8 }}>
                  <option>동일 인물로 승인</option>
                  <option>동명이인으로 제외</option>
                  <option>재처리 요청</option>
                </select>
                <textarea placeholder="처리 사유를 입력하세요..." rows={3}
                  style={{ width:'100%', padding:'10px 12px', borderRadius:8, border:`1px solid ${C.border}`,
                    fontSize:13, fontFamily:'inherit', resize:'none', outline:'none' }} />
              </div>
            )}
            <div style={{ display:'flex', gap:8, justifyContent:'flex-end' }}>
              <button onClick={() => setModal(null)}
                style={{ padding:'9px 18px', borderRadius:8, border:`1px solid ${C.border}`,
                  background:'none', cursor:'pointer', fontSize:13, fontWeight:600, color:C.textSec }}>닫기</button>
              {modal.status !== 'success' && (
                <button onClick={() => setModal(null)}
                  style={{ padding:'9px 18px', borderRadius:8, border:'none',
                    background:C.secondary, color:'#fff', cursor:'pointer', fontSize:13, fontWeight:600 }}>수정 완료</button>
              )}
            </div>
          </div>
        </Modal>
      )}
    </div>
  );
}

// ── 메인 앱 ──
const PAGE_TITLES = {
  dashboard: '대시보드', donors: '기부자 뉴스 수집', scoring: '타이밍 점수 랭킹', validation: '데이터 정합성 검증',
};

function App() {
  const [page, setPage] = React.useState('dashboard');
  return (
    <div style={{ display:'flex', minHeight:'100vh' }}>
      <Sidebar active={page} onNav={setPage} />
      <div style={{ flex:1, display:'flex', flexDirection:'column', minWidth:0 }}>
        <TopBar title={PAGE_TITLES[page]} />
        <main style={{ flex:1, overflowY:'auto', padding:'24px 28px' }}>
          {page === 'dashboard' && <DashboardPage onNav={setPage} />}
          {page === 'donors' && <DonorsPage />}
          {page === 'scoring' && <ScoringPage />}
          {page === 'validation' && <ValidationPage />}
        </main>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
