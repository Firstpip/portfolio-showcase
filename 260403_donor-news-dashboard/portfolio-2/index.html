function Badge({ color, children, size='sm' }) {
  const p = {
    hot:{bg:'#FEE2E2',text:'#DC2626',border:'#FECACA'},
    warm:{bg:'#FEF3C7',text:'#D97706',border:'#FDE68A'},
    cool:{bg:'#DBEAFE',text:'#2563EB',border:'#BFDBFE'},
    tag:{bg:'#EFF6FF',text:'#3B82F6',border:'#BFDBFE'},
    success:{bg:'#D1FAE5',text:'#059669',border:'#A7F3D0'},
    warning:{bg:'#FEF3C7',text:'#D97706',border:'#FDE68A'},
    error:{bg:'#FEE2E2',text:'#DC2626',border:'#FECACA'},
    neutral:{bg:'#F1F5F9',text:'#64748B',border:'#E2E8F0'},
    active:{bg:'#D1FAE5',text:'#059669',border:'#A7F3D0'},
  }[color] || {bg:'#F1F5F9',text:'#64748B',border:'#E2E8F0'};
  return (
    <span style={{display:'inline-flex',alignItems:'center',gap:3,
      padding:size==='sm'?'2px 8px':'3px 10px',borderRadius:20,
      fontSize:size==='sm'?11:12,fontWeight:600,
      background:p.bg,color:p.text,border:`1px solid ${p.border}`}}>
      {children}
    </span>
  );
}

// Drawer (슬라이드오버)
function Drawer({ item, onClose }) {
  if (!item) return null;
  return (
    <>
      <div onClick={onClose} style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.4)',zIndex:200}} />
      <div style={{position:'fixed',top:0,right:0,bottom:0,width:480,
        background:C.surface,boxShadow:'-8px 0 40px rgba(0,0,0,0.15)',
        zIndex:201,overflowY:'auto',padding:0,animation:'slideIn 200ms ease'}}>
        {/* 헤더 */}
        <div style={{background:`linear-gradient(135deg, ${C.gradFrom}, ${C.gradTo})`,
          padding:'24px 24px 28px'}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:16}}>
            <div style={{display:'flex',gap:14,alignItems:'center'}}>
              <div style={{width:52,height:52,borderRadius:'50%',background:'rgba(255,255,255,0.2)',
                display:'flex',alignItems:'center',justifyContent:'center',color:'#fff',
                fontSize:22,fontWeight:800}}>{item.name[0]}</div>
              <div>
                <div style={{color:'#fff',fontSize:18,fontWeight:800}}>{item.name}</div>
                <div style={{color:'rgba(255,255,255,0.75)',fontSize:13}}>{item.title}</div>
              </div>
            </div>
            <button onClick={onClose} style={{border:'none',background:'rgba(255,255,255,0.2)',
              borderRadius:8,width:32,height:32,cursor:'pointer',color:'#fff',fontSize:16,
              display:'flex',alignItems:'center',justifyContent:'center'}}>✕</button>
          </div>
          <div style={{display:'flex',gap:20}}>
            {[{label:'타이밍 스코어',val:item.score},{label:'이번주 뉴스',val:`${item.news}건`},
              {label:'점수 변동',val:item.trend}].map(k=>(
              <div key={k.label}>
                <div style={{color:'rgba(255,255,255,0.6)',fontSize:11,marginBottom:2}}>{k.label}</div>
                <div style={{color:'#fff',fontSize:18,fontWeight:800}}>{k.val}</div>
              </div>
            ))}
          </div>
        </div>
        {/* 본문 */}
        <div style={{padding:'20px 24px',display:'flex',flexDirection:'column',gap:16}}>
          <div>
            <div style={{fontSize:12,fontWeight:600,color:C.textSec,marginBottom:8}}>최신 뉴스 요약</div>
            <div style={{padding:'12px 14px',background:'#F0F9FF',borderRadius:10,border:'1px solid #BAE6FD',
              fontSize:13,color:C.text,lineHeight:1.7}}>{item.desc}</div>
          </div>
          <div>
            <div style={{fontSize:12,fontWeight:600,color:C.textSec,marginBottom:8}}>스코어 분석 레이더</div>
            <ResponsiveContainer width="100%" height={200}>
              <RadarChart data={RADAR_DATA}>
                <PolarGrid stroke={C.border} />
                <PolarAngleAxis dataKey="subject" tick={{fontSize:11,fill:C.textSec}} />
                <Radar name="스코어" dataKey="v" stroke={C.secondary} fill={C.secondary} fillOpacity={0.2} />
                <Tooltip contentStyle={{fontSize:12,borderRadius:8}} />
              </RadarChart>
            </ResponsiveContainer>
          </div>
          <div>
            <div style={{fontSize:12,fontWeight:600,color:C.textSec,marginBottom:8}}>GPT-4o-mini 판별 결과</div>
            <div style={{display:'flex',gap:8,marginBottom:8}}>
              {item.verified ? <Badge color="success">✅ 동일 인물 확인</Badge> : <Badge color="warning">⚠️ 검토 필요</Badge>}
              <Badge color="tag">신뢰도 {item.verified ? '96%' : '63%'}</Badge>
            </div>
          </div>
          <div>
            <div style={{fontSize:12,fontWeight:600,color:C.textSec,marginBottom:6}}>접촉 메모</div>
            <textarea rows={3} placeholder="접촉 메모를 입력하세요..." style={{width:'100%',
              padding:'10px 12px',borderRadius:8,border:`1px solid ${C.border}`,
              fontSize:13,fontFamily:'inherit',resize:'none',outline:'none'}} />

          <div style={{display:'flex',gap:8}}>
            <button onClick={onClose} style={{flex:1,padding:'10px',borderRadius:8,
              border:`1px solid ${C.border}`,background:'none',cursor:'pointer',fontSize:13,fontWeight:600,color:C.textSec}}>닫기</button>
            <button onClick={onClose} style={{flex:2,padding:'10px',borderRadius:8,border:'none',

              cursor:'pointer',fontSize:13,fontWeight:600}}>접촉 일정 등록</button>
          </div>
        </div>
      </div>
    </>
  );
}

// ── 히어로 배너 ──
function HeroBanner({ tab }) {

  return (
    <div style={{background:`linear-gradient(135deg, ${C.gradFrom} 0%, ${C.gradTo} 100%)`,
      padding:'28px 32px'}}>
      <div style={{fontSize:20,fontWeight:800,color:'#fff',marginBottom:14}}>{meta.title}</div>
      <div style={{display:'flex',gap:40}}>
        {meta.kpis.map(k=>(
          <div key={k.label}>
            <div style={{color:'rgba(255,255,255,0.6)',fontSize:12,marginBottom:3}}>{k.label}</div>
            <div style={{color:'#fff',fontSize:24,fontWeight:800}}>{k.value}</div>
          </div>

      </div>

// ── 허브 페이지 ──
function HubPage({ setDrawer }) {
  const top = [...PERSONS].sort((a,b)=>b.score-a.score).slice(0,4);
  return (
    <div style={{display:'flex',flexDirection:'column',gap:20,animation:'fadeIn .3s ease'}}>
      <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:14}}>
        {top.map(p=>(
          <div key={p.id} onClick={()=>setDrawer(p)}
            style={{background:C.surface,borderRadius:14,padding:'16px 18px',cursor:'pointer',
              boxShadow:'0 2px 12px rgba(0,0,0,0.06)',border:`1px solid ${C.border}`,
              transition:'all .15s',}}
            onMouseEnter={e=>{e.currentTarget.style.boxShadow='0 8px 30px rgba(37,99,235,0.12)';e.currentTarget.style.transform='translateY(-2px)'}}
            onMouseLeave={e=>{e.currentTarget.style.boxShadow='0 2px 12px rgba(0,0,0,0.06)';e.currentTarget.style.transform='none'}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:10}}>
              <div style={{width:42,height:42,borderRadius:'50%',
                background:`linear-gradient(135deg,${C.gradFrom},${C.gradTo})`,
                display:'flex',alignItems:'center',justifyContent:'center',
                color:'#fff',fontSize:18,fontWeight:800}}>{p.name[0]}</div>
              <div style={{fontSize:22,fontWeight:800,color:p.score>=80?C.danger:p.score>=60?C.warning:C.info}}>{p.score}</div>
            </div>
            <div style={{fontWeight:700,fontSize:14,color:C.text}}>{p.name}</div>
            <div style={{fontSize:12,color:C.textSec,marginTop:2}}>{p.title}</div>
            <div style={{marginTop:8,display:'flex',gap:6}}>
              <Badge color="tag">{p.tag}</Badge>
              <Badge color="cool">뉴스 {p.news}건</Badge>
            </div>
          </div>
        ))}
      </div>
      <div style={{display:'grid',gridTemplateColumns:'1fr 320px',gap:14}}>
        <div style={{background:C.surface,borderRadius:14,padding:'20px 22px',
          boxShadow:'0 2px 12px rgba(0,0,0,0.06)',border:`1px solid ${C.border}`}}>
          <div style={{fontWeight:700,fontSize:14,color:C.text,marginBottom:16}}>주간 평균 타이밍 스코어 추이</div>
          <ResponsiveContainer width="100%" height={180}>
            <LineChart data={SCORE_TREND}>
              <CartesianGrid strokeDasharray="3 3" stroke={C.border} />
              <XAxis dataKey="week" tick={{fontSize:11,fill:C.textMute}} />
              <YAxis domain={[50,100]} tick={{fontSize:11,fill:C.textMute}} />
              <Tooltip contentStyle={{borderRadius:8,border:`1px solid ${C.border}`,fontSize:12}} />
              <Line type="monotone" dataKey="avg" stroke={C.secondary} strokeWidth={2.5}
                dot={{fill:C.secondary,r:5}} name="평균 점수" />
            </LineChart>
          </ResponsiveContainer>
        </div>
        <div style={{background:C.surface,borderRadius:14,padding:'20px 22px',
          boxShadow:'0 2px 12px rgba(0,0,0,0.06)',border:`1px solid ${C.border}`}}>
          <div style={{fontWeight:700,fontSize:14,color:C.text,marginBottom:14}}>소스별 오늘 수집</div>
          <div style={{display:'flex',flexDirection:'column',gap:10}}>
            {SOURCES.map(s=>(
              <div key={s.id} style={{display:'flex',alignItems:'center',gap:10}}>
                <span style={{width:8,height:8,borderRadius:'50%',
                  background:s.status==='active'?C.success:C.danger,flexShrink:0}} />
                <div style={{flex:1}}>
                  <div style={{fontSize:12,fontWeight:600,color:C.text}}>{s.name}</div>
                  <div style={{fontSize:11,color:C.textMute}}>{s.cron}</div>
                </div>
                <div style={{fontSize:13,fontWeight:700,color:s.status==='active'?C.text:C.danger}}>{s.today}건</div>
              </div>
            ))}
          </div>
        </div>
      </div>
    </div>
  );
}

// ── 인물 동향 ──
function PersonsPage({ setDrawer }) {
  const [search, setSearch] = React.useState('');
  const filtered = PERSONS.filter(p => !search || p.name.includes(search) || p.title.includes(search));
  return (
    <div style={{display:'flex',flexDirection:'column',gap:14,animation:'fadeIn .3s ease'}}>
      <div style={{background:C.surface,borderRadius:12,padding:'14px 18px',
        boxShadow:'0 1px 4px rgba(0,0,0,0.06)',border:`1px solid ${C.border}`}}>
        <div style={{position:'relative'}}>
          <span style={{position:'absolute',left:12,top:'50%',transform:'translateY(-50%)',fontSize:15}}>🔍</span>
          <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="인물 이름, 직함 검색..."
            style={{width:'100%',padding:'9px 12px 9px 36px',borderRadius:8,border:`1px solid ${C.border}`,
              fontSize:13,outline:'none',fontFamily:'inherit'}} />
        </div>
      </div>
      <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill, minmax(300px,1fr))',gap:14}}>
        {filtered.map(p=>(
          <div key={p.id} onClick={()=>setDrawer(p)}
            style={{background:C.surface,borderRadius:14,padding:'18px 20px',cursor:'pointer',
              boxShadow:'0 2px 8px rgba(0,0,0,0.06)',border:`1px solid ${C.border}`,transition:'all .15s'}}
            onMouseEnter={e=>{e.currentTarget.style.boxShadow='0 6px 24px rgba(37,99,235,0.12)';e.currentTarget.style.borderColor=C.accent}}
            onMouseLeave={e=>{e.currentTarget.style.boxShadow='0 2px 8px rgba(0,0,0,0.06)';e.currentTarget.style.borderColor=C.border}}>
            <div style={{display:'flex',gap:12,alignItems:'flex-start',marginBottom:12}}>
              <div style={{width:44,height:44,borderRadius:'50%',
                background:`linear-gradient(135deg,${C.gradFrom},${C.gradTo})`,
                display:'flex',alignItems:'center',justifyContent:'center',
                color:'#fff',fontSize:18,fontWeight:800,flexShrink:0}}>{p.name[0]}</div>
              <div style={{flex:1}}>
                <div style={{fontWeight:700,fontSize:14,color:C.text}}>{p.name}</div>
                <div style={{fontSize:12,color:C.textSec,marginTop:1}}>{p.title}</div>
              </div>
              <div style={{textAlign:'right'}}>
                <div style={{fontSize:20,fontWeight:800,color:p.score>=80?C.danger:p.score>=60?C.warning:C.info}}>{p.score}</div>
                <div style={{fontSize:11,color:p.trend.startsWith('+')?C.success:p.trend==='0'?C.textMute:C.danger,fontWeight:600}}>{p.trend}</div>
              </div>
            </div>
            <div style={{fontSize:12,color:C.textSec,lineHeight:1.6,marginBottom:10}}>{p.desc}</div>
            <div style={{display:'flex',gap:6}}>
              <Badge color="tag">{p.tag}</Badge>
              {p.verified ? <Badge color="success">✅ 판별 완료</Badge> : <Badge color="warning">검토 필요</Badge>}
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}

// ── 타이밍 스코어 ──
function ScoringPage({ setDrawer }) {
  const sorted = [...PERSONS].sort((a,b)=>b.score-a.score);
  const barData = sorted.map(p=>({name:p.name, score:p.score}));
  return (
    <div style={{display:'flex',flexDirection:'column',gap:14,animation:'fadeIn .3s ease'}}>
      <div style={{background:C.surface,borderRadius:14,padding:'20px 22px',
        boxShadow:'0 2px 8px rgba(0,0,0,0.06)',border:`1px solid ${C.border}`}}>
        <div style={{fontWeight:700,fontSize:14,color:C.text,marginBottom:14}}>인물별 타이밍 스코어</div>
        <ResponsiveContainer width="100%" height={200}>
          <BarChart data={barData} layout="vertical">
            <CartesianGrid strokeDasharray="3 3" horizontal={false} stroke={C.border} />
            <XAxis type="number" domain={[0,100]} tick={{fontSize:11,fill:C.textMute}} />
            <YAxis type="category" dataKey="name" width={65} tick={{fontSize:12,fill:C.text}} />
            <Tooltip contentStyle={{borderRadius:8,border:`1px solid ${C.border}`,fontSize:12}} />
            <Bar dataKey="score" radius={[0,4,4,0]} name="스코어">
              {barData.map((e,i)=><Recharts.Cell key={i} fill={e.score>=80?C.danger:e.score>=60?C.warning:C.accent} />)}
            </Bar>
          </BarChart>
        </ResponsiveContainer>
      </div>
      <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(280px,1fr))',gap:12}}>
        {sorted.map((p,i)=>(
          <div key={p.id} onClick={()=>setDrawer(p)}
            style={{background:C.surface,borderRadius:12,padding:'14px 16px',cursor:'pointer',
              boxShadow:'0 1px 4px rgba(0,0,0,0.06)',border:`1px solid ${C.border}`,
              transition:'all .15s',display:'flex',gap:12,alignItems:'center'}}
            onMouseEnter={e=>{e.currentTarget.style.boxShadow='0 4px 16px rgba(37,99,235,0.1)'}}
            onMouseLeave={e=>{e.currentTarget.style.boxShadow='0 1px 4px rgba(0,0,0,0.06)'}}>
            <div style={{width:28,height:28,borderRadius:'50%',
              background:i<3?`linear-gradient(135deg,${C.gradFrom},${C.gradTo})`:'#E2E8F0',
              display:'flex',alignItems:'center',justifyContent:'center',
              color:i<3?'#fff':C.textSec,fontSize:12,fontWeight:800,flexShrink:0}}>{i+1}</div>
            <div style={{flex:1}}>
              <div style={{fontWeight:700,fontSize:13,color:C.text}}>{p.name}</div>
              <div style={{fontSize:11,color:C.textSec}}>{p.title}</div>
            </div>
            <div style={{textAlign:'right'}}>
              <div style={{fontSize:20,fontWeight:800,color:p.score>=80?C.danger:p.score>=60?C.warning:C.info}}>{p.score}</div>
              <div style={{fontSize:11,color:p.trend.startsWith('+')?C.success:C.danger,fontWeight:600}}>{p.trend}</div>
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}

// ── 소스 설정 ──
function SettingsPage() {
  const [sourceModal, setSourceModal] = React.useState(null);
  const [showAdd, setShowAdd] = React.useState(false);
  return (
    <div style={{display:'flex',flexDirection:'column',gap:14,animation:'fadeIn .3s ease'}}>
      <div style={{background:C.surface,borderRadius:14,padding:'20px 22px',
        boxShadow:'0 2px 8px rgba(0,0,0,0.06)',border:`1px solid ${C.border}`}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:14}}>
          <div style={{fontWeight:700,fontSize:14,color:C.text}}>뉴스 수집 소스 관리</div>
          <button onClick={()=>setShowAdd(true)}
            style={{padding:'8px 14px',borderRadius:8,border:'none',
              background:`linear-gradient(135deg,${C.gradFrom},${C.gradTo})`,color:'#fff',
              cursor:'pointer',fontSize:12,fontWeight:600}}>+ 소스 추가</button>
        </div>
        <div style={{display:'flex',flexDirection:'column',gap:10}}>
          {SOURCES.map(s=>(
            <div key={s.id} style={{display:'flex',alignItems:'center',gap:14,padding:'14px 16px',
              borderRadius:10,border:`1px solid ${s.status==='active'?C.border:'#FECACA'}`,
              background:s.status==='active'?C.surface:'#FFF5F5'}}>
              <span style={{fontSize:20}}>{s.type==='API'?'🔌':s.type==='RSS'?'📡':'🕸️'}</span>
              <div style={{flex:1}}>
                <div style={{fontWeight:600,fontSize:13,color:C.text}}>{s.name}</div>
                <div style={{fontSize:11,color:C.textMute,marginTop:2}}>{s.cron} · {s.type}</div>
              </div>
              <div style={{textAlign:'center'}}>
                <div style={{fontSize:14,fontWeight:700,color:C.text}}>{s.today}건</div>
                <div style={{fontSize:11,color:C.textMute}}>오늘 수집</div>
              </div>
              <div style={{textAlign:'center',width:60}}>
                <div style={{fontSize:14,fontWeight:700,color:s.status==='active'?C.success:C.danger}}>{s.rate}</div>
                <div style={{fontSize:11,color:C.textMute}}>성공률</div>
              </div>
              <Badge color={s.status==='active'?'active':'error'}>{s.status==='active'?'✅ 정상':'❌ 오류'}</Badge>
              <button onClick={()=>setSourceModal(s)}
                style={{padding:'6px 12px',borderRadius:6,border:`1px solid ${C.border}`,
                  background:'none',cursor:'pointer',fontSize:12,fontWeight:600,color:C.textSec}}>수정</button>
            </div>
          ))}
        </div>
      </div>
      {(sourceModal || showAdd) && (
        <SourceModal source={sourceModal} onClose={()=>{setSourceModal(null);setShowAdd(false);}} />
      )}
    </div>
  );
}

// ── 메인 앱 ──
function App() {
  const [tab, setTab] = React.useState('main');
  const [drawer, setDrawer] = React.useState(null);
  return (
    <div style={{minHeight:'100vh',background:C.bg}}>
      {/* 상단 탭 네비 */}
      <header style={{position:'sticky',top:0,zIndex:100,background:C.surface,
        borderBottom:`1px solid ${C.border}`,display:'flex',alignItems:'center',
        height:56,padding:'0 24px',gap:4}}>
        <div style={{display:'flex',alignItems:'center',gap:8,marginRight:20,flexShrink:0}}>
          <div style={{width:30,height:30,borderRadius:8,
            background:`linear-gradient(135deg,${C.gradFrom},${C.gradTo})`,
            display:'flex',alignItems:'center',justifyContent:'center',fontSize:16}}>🧠</div>
          <span style={{fontWeight:800,fontSize:15,color:C.text}}>IntelliWatch</span>
        </div>
        <div style={{display:'flex',gap:2,flex:1}}>
          {TABS.map(t=>(
            <button key={t.id} onClick={()=>setTab(t.id)}
              style={{padding:'8px 14px',border:'none',background:'none',cursor:'pointer',
                borderRadius:8,fontSize:13,fontWeight:tab===t.id?700:500,
                color:tab===t.id?C.secondary:C.textSec,
                borderBottom:tab===t.id?`2px solid ${C.secondary}`:'2px solid transparent',
                transition:'all .15s'}}>
              {t.icon} {t.label}
            </button>
          ))}
        </div>
        <div style={{display:'flex',gap:8,alignItems:'center'}}>
          <div style={{padding:'7px 14px',borderRadius:8,border:`1px solid ${C.border}`,
            fontSize:12,color:C.textSec,display:'flex',alignItems:'center',gap:6}}>
            🔍 <span>검색...</span>
          </div>
          <button style={{width:34,height:34,borderRadius:8,border:`1px solid ${C.border}`,
            background:'none',cursor:'pointer',fontSize:16}}>🔔</button>
          <div style={{width:34,height:34,borderRadius:'50%',
            background:`linear-gradient(135deg,${C.gradFrom},${C.gradTo})`,
            display:'flex',alignItems:'center',justifyContent:'center',
            color:'#fff',fontWeight:700,fontSize:13,cursor:'pointer'}}>박</div>
        </div>
      </header>
      {/* 히어로 배너 */}
      <HeroBanner tab={tab} />
      {/* 콘텐츠 */}
      <main style={{padding:'24px 32px'}}>
        {tab==='main' && <HubPage setDrawer={setDrawer} />}
        {tab==='persons' && <PersonsPage setDrawer={setDrawer} />}
        {tab==='scoring' && <ScoringPage setDrawer={setDrawer} />}
        {tab==='settings' && <SettingsPage />}
      </main>
      <Drawer item={drawer} onClose={()=>setDrawer(null)} />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
