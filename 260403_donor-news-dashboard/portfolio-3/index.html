function Badge({ color, children }) {
  const p = {
    VIP:{bg:'#FFF7ED',text:'#EA580C',border:'#FED7AA'},
    핵심:{bg:'#EFF6FF',text:'#1D4ED8',border:'#BFDBFE'},
    일반:{bg:'#F1F5F9',text:'#475569',border:'#CBD5E1'},
    hot:{bg:'#FEE2E2',text:'#DC2626',border:'#FECACA'},
    warm:{bg:'#FEF3C7',text:'#D97706',border:'#FDE68A'},
    normal:{bg:'#F1F5F9',text:'#64748B',border:'#E2E8F0'},
    success:{bg:'#D1FAE5',text:'#059669',border:'#A7F3D0'},
    warning:{bg:'#FEF3C7',text:'#D97706',border:'#FDE68A'},
    active:{bg:'#D1FAE5',text:'#059669',border:'#A7F3D0'},
    paused:{bg:'#F1F5F9',text:'#64748B',border:'#CBD5E1'},
    tag:{bg:'#ECFDF5',text:'#065F46',border:'#A7F3D0'},
    news:{bg:'#DBEAFE',text:'#1D4ED8',border:'#BFDBFE'},
    contact:{bg:'#D1FAE5',text:'#059669',border:'#A7F3D0'},
    proposal:{bg:'#EDE9FE',text:'#7C3AED',border:'#DDD6FE'},
    ai:{bg:'#FDF4FF',text:'#9333EA',border:'#E9D5FF'},
  }[color] || {bg:'#F1F5F9',text:'#64748B',border:'#CBD5E1'};
  return (
    <span style={{display:'inline-flex',alignItems:'center',gap:3,padding:'2px 8px',borderRadius:20,
      fontSize:11,fontWeight:600,background:p.bg,color:p.text,border:`1px solid ${p.border}`}}>
      {children}
    </span>
  );
}

// 모달
function Modal({ title, onClose, children, width=560 }) {
  return (
    <div style={{position:'fixed',inset:0,zIndex:1000,display:'flex',alignItems:'center',justifyContent:'center'}}>
      <div onClick={onClose} style={{position:'absolute',inset:0,background:'rgba(0,0,0,0.45)'}} />
      <div style={{position:'relative',background:C.surface,borderRadius:20,width,maxWidth:'90vw',
        maxHeight:'85vh',overflowY:'auto',boxShadow:'0 20px 60px rgba(0,0,0,0.2)',animation:'fadeIn 180ms ease'}}>
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',
          padding:'20px 24px 16px',borderBottom:`1px solid ${C.border}`}}>
          <h3 style={{fontSize:16,fontWeight:700,color:C.text}}>{title}</h3>
          <button onClick={onClose} style={{border:'none',background:'none',cursor:'pointer',
            width:32,height:32,borderRadius:8,fontSize:18,color:C.textSec}}>✕</button>
        </div>
        <div style={{padding:'20px 24px'}}>{children}</div>
      </div>
    </div>
  );
}

// 사이드바
function Sidebar({ active, onNav }) {
  return (
    <nav style={{width:240,background:C.sidebar,borderRight:`1px solid ${C.sidebarBorder}`,

      <div style={{padding:'20px 16px 14px'}}>
        <div style={{display:'flex',alignItems:'center',gap:10}}>

            display:'flex',alignItems:'center',justifyContent:'center',fontSize:18}}>🌿</div>
          <div>
            <div style={{fontWeight:800,fontSize:15,color:C.text}}>DonorOS</div>

          </div>

          <span>🎯 91점 최고</span><span>📡 4개 소스</span>
        </div>
      </div>
      {/* 네비 */}
      <div style={{flex:1,padding:'4px 8px',display:'flex',flexDirection:'column',gap:2}}>
        {NAV.map(item=>{
          const isActive = active===item.id;
          return (
            <button key={item.id} onClick={()=>onNav(item.id)}
              style={{display:'flex',alignItems:'center',gap:10,padding:'10px 12px',
                borderRadius:10,border:'none',cursor:'pointer',textAlign:'left',width:'100%',
                transition:'all .15s',
                background:isActive?C.activeNavBg:'transparent',
                borderLeft:isActive?`3px solid ${C.activeNavBorder}`:'3px solid transparent'}}>
              <span style={{fontSize:17}}>{item.icon}</span>
              <span style={{color:isActive?C.activeNavText:C.textSec,
                fontWeight:isActive?700:400,fontSize:14}}>{item.label}</span>
              {isActive && <span style={{marginLeft:'auto',width:8,height:8,borderRadius:'50%',background:C.accent}} />}

          );

        background:`linear-gradient(135deg,${C.primary},${C.accent})`,
        display:'flex',alignItems:'center',justifyContent:'center',color:'#fff',fontWeight:700,fontSize:12}}>최</div>

// 타임라인 페이지 (메인 — 마스터-디테일)

  const [selected, setSelected] = React.useState(DONORS[0]);
  const events = TIMELINE_EVENTS.filter(e => e.donorId === selected.id);
  return (
    <div style={{display:'flex',gap:0,height:'calc(100vh - 48px)',animation:'fadeIn .3s ease'}}>
      {/* 마스터 — 기부자 목록 (42%) */}

        <div style={{padding:'16px 16px 12px',borderBottom:`1px solid ${C.border}`}}>
          {/* 인라인 탭 */}
          <div style={{display:'flex',gap:0,borderBottom:`1px solid ${C.border}`,marginBottom:0}}>
            {['전체','VIP','핵심','일반'].map((t,i)=>(
              <button key={t} style={{padding:'8px 14px',border:'none',background:'none',cursor:'pointer',
                fontSize:12,fontWeight:i===0?700:500,
                color:i===0?C.accent:C.textSec,
                borderBottom:i===0?`2px solid ${C.accent}`:'2px solid transparent'}}>
                {t}
              </button>
            ))}
          </div>
        </div>
        <div style={{padding:'8px'}}>
          {DONORS.map(d=>(
            <div key={d.id} onClick={()=>setSelected(d)}
              style={{padding:'12px 14px',borderRadius:12,cursor:'pointer',transition:'all .15s',marginBottom:4,
                background:selected?.id===d.id?C.activeNavBg:C.surface,
                border:`1px solid ${selected?.id===d.id?C.borderDark:C.border}`}}

              <div style={{display:'flex',gap:10,alignItems:'flex-start'}}>
                <div style={{width:40,height:40,borderRadius:'50%',
                  background:`linear-gradient(135deg,${C.primary},${C.accent})`,
                  display:'flex',alignItems:'center',justifyContent:'center',
                  color:'#fff',fontSize:16,fontWeight:700,flexShrink:0}}>{d.name[0]}</div>
                <div style={{flex:1}}>
                  <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:3}}>
                    <span style={{fontWeight:700,fontSize:13,color:C.text}}>{d.name}</span>
                    <span style={{fontSize:18,fontWeight:800,

                  </div>
                  <div style={{fontSize:12,color:C.textSec,marginBottom:6}}>{d.org}</div>
                  <div style={{display:'flex',gap:5}}>
                    <Badge color={d.tier}>{d.tier}</Badge>

                    💬 {d.memo}
                  </div>}
                </div>
              </div>
            </div>
          ))}

                  color:'#fff',fontSize:22,fontWeight:800}}>{selected.name[0]}</div>
                <div style={{flex:1}}>
                  <div style={{fontWeight:800,fontSize:18,color:C.text}}>{selected.name}</div>
                  <div style={{fontSize:13,color:C.textSec}}>{selected.org}</div>
                </div>
                <div style={{textAlign:'center'}}>
                  <div style={{fontSize:36,fontWeight:800,

                      background:e.type==='news'?'#DBEAFE':e.type==='contact'?C.successBg:'#EDE9FE',
                      display:'flex',alignItems:'center',justifyContent:'center',fontSize:16,flexShrink:0}}>{e.icon}</div>

                      border:`1px solid ${C.border}`}}>
                      <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:4}}>
                        <span style={{fontWeight:600,fontSize:13,color:C.text}}>{e.title}</span>
                        <Badge color={e.type}>{e.type==='news'?'뉴스':e.type==='contact'?'접촉':'제안'}</Badge>
                      </div>
                      <div style={{fontSize:12,color:C.textSec}}>{e.desc}</div>
                      {e.score && <div style={{marginTop:6,fontSize:12,fontWeight:700,
                        color:e.score>=80?C.danger:e.score>=60?C.warning:C.success}}>
                        타이밍 점수 {e.score}점
                      </div>}
                    </div>
                  </div>
                </div>
              ))}
              {events.length===0 && <div style={{textAlign:'center',color:C.textMute,fontSize:13,padding:24}}>이벤트 없음</div>}
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

// 보고서 생성 페이지
function ReportsPage() {
  const [step, setStep] = React.useState(0);
  const [selected, setSelected] = React.useState([]);
  const toggle = id => setSelected(prev => prev.includes(id) ? prev.filter(x=>x!==id) : [...prev,id]);
  return (
    <div style={{padding:'20px 24px',display:'flex',flexDirection:'column',gap:16,animation:'fadeIn .3s ease'}}>
      <div style={{display:'flex',gap:10,marginBottom:4}}>
        {['기부자 선택','보고서 옵션','생성 완료'].map((s,i)=>(
          <div key={i} style={{display:'flex',alignItems:'center',gap:6}}>
            <div style={{width:26,height:26,borderRadius:'50%',
              background:i<=step?`linear-gradient(135deg,${C.primary},${C.accent})`:'#E2E8F0',
              display:'flex',alignItems:'center',justifyContent:'center',
              color:i<=step?'#fff':C.textMute,fontSize:12,fontWeight:700}}>{i+1}</div>
            <span style={{fontSize:13,fontWeight:i===step?700:400,
              color:i<=step?C.text:C.textMute}}>{s}</span>
            {i<2 && <span style={{color:C.border,marginLeft:6}}>›</span>}
          </div>
        ))}
      </div>
      {step === 0 && (
        <div>
          <div style={{background:C.surface,borderRadius:16,padding:'20px',
            boxShadow:'0 2px 8px rgba(6,95,70,0.06)',border:`1px solid ${C.border}`,marginBottom:12}}>
            <div style={{fontWeight:700,fontSize:14,color:C.text,marginBottom:12}}>보고서 대상 기부자 선택</div>
            <div style={{display:'flex',flexDirection:'column',gap:8}}>
              {DONORS.map(d=>(
                <div key={d.id} onClick={()=>toggle(d.id)}
                  style={{display:'flex',alignItems:'center',gap:12,padding:'12px 14px',borderRadius:10,
                    cursor:'pointer',transition:'all .12s',
                    background:selected.includes(d.id)?C.activeNavBg:C.surface,
                    border:`1px solid ${selected.includes(d.id)?C.accent:C.border}`}}
                  onMouseEnter={e=>{ if(!selected.includes(d.id)) e.currentTarget.style.background=C.surfaceHover; }}
                  onMouseLeave={e=>{ if(!selected.includes(d.id)) e.currentTarget.style.background=C.surface; }}>
                  <div style={{width:20,height:20,borderRadius:5,
                    background:selected.includes(d.id)?C.accent:C.surface,
                    border:`2px solid ${selected.includes(d.id)?C.accent:C.border}`,
                    display:'flex',alignItems:'center',justifyContent:'center',
                    color:'#fff',fontSize:12,flexShrink:0}}>
                    {selected.includes(d.id) && '✓'}
                  </div>
                  <div style={{width:36,height:36,borderRadius:'50%',
                    background:`linear-gradient(135deg,${C.primary},${C.accent})`,
                    display:'flex',alignItems:'center',justifyContent:'center',
                    color:'#fff',fontWeight:700,flexShrink:0}}>{d.name[0]}</div>
                  <div style={{flex:1}}>
                    <div style={{fontWeight:600,fontSize:13,color:C.text}}>{d.name}</div>
                    <div style={{fontSize:12,color:C.textSec}}>{d.org}</div>
                  </div>
                  <div style={{fontSize:18,fontWeight:800,
                    color:d.score>=80?C.danger:d.score>=60?C.warning:C.success}}>{d.score}점</div>
                </div>
              ))}
            </div>
          </div>
          <button disabled={!selected.length} onClick={()=>setStep(1)}
            style={{width:'100%',padding:'12px',borderRadius:12,border:'none',
              background:selected.length?`linear-gradient(135deg,${C.primary},${C.accent})`:'#E2E8F0',
              color:selected.length?'#fff':C.textMute,cursor:selected.length?'pointer':'not-allowed',
              fontSize:14,fontWeight:700}}>
            {selected.length}명 선택됨 → 다음 단계
          </button>
        </div>
      )}
      {step === 1 && (
        <div>
          <div style={{background:C.surface,borderRadius:16,padding:'20px',
            boxShadow:'0 2px 8px rgba(6,95,70,0.06)',border:`1px solid ${C.border}`,marginBottom:12}}>
            <div style={{fontWeight:700,fontSize:14,color:C.text,marginBottom:14}}>보고서 옵션</div>
            <div style={{display:'flex',flexDirection:'column',gap:12}}>
              {[{label:'보고서 제목',placeholder:'2025 Q2 기부 제안 보고서'},
                {label:'담당자',placeholder:'최기용 선임'}].map(f=>(
                <div key={f.label}>
                  <div style={{fontSize:12,fontWeight:600,color:C.textSec,marginBottom:4}}>{f.label}</div>
                  <input placeholder={f.placeholder} style={{width:'100%',padding:'9px 12px',borderRadius:8,
                    border:`1px solid ${C.border}`,fontSize:13,fontFamily:'inherit',outline:'none'}} />
                </div>
              ))}
              <div>
                <div style={{fontSize:12,fontWeight:600,color:C.textSec,marginBottom:6}}>포함 섹션</div>
                <div style={{display:'flex',flexDirection:'column',gap:6}}>
                  {['📰 최신 뉴스 요약 (Claude API 생성)','🎯 타이밍 점수 분석','📞 접촉 이력 요약','💬 맞춤 기부 제안 메시지'].map(s=>(
                    <label key={s} style={{display:'flex',alignItems:'center',gap:8,cursor:'pointer',fontSize:13,color:C.text}}>
                      <input type="checkbox" defaultChecked style={{accentColor:C.accent}} />
                      {s}
                    </label>
                  ))}
                </div>
              </div>
            </div>
          </div>
          <div style={{display:'flex',gap:10}}>
            <button onClick={()=>setStep(0)} style={{padding:'12px 20px',borderRadius:12,
              border:`1px solid ${C.border}`,background:'none',cursor:'pointer',fontSize:13,fontWeight:600,color:C.textSec}}>이전</button>
            <button onClick={()=>setStep(2)} style={{flex:1,padding:'12px',borderRadius:12,border:'none',
              background:`linear-gradient(135deg,${C.primary},${C.accent})`,color:'#fff',
              cursor:'pointer',fontSize:14,fontWeight:700}}>🤖 Claude API로 보고서 생성</button>
          </div>
        </div>
      )}
      {step === 2 && (
        <div style={{background:C.surface,borderRadius:16,padding:'28px',
          boxShadow:'0 2px 8px rgba(6,95,70,0.06)',border:`1px solid ${C.border}`,textAlign:'center'}}>
          <div style={{fontSize:48,marginBottom:12}}>✅</div>
          <div style={{fontSize:18,fontWeight:800,color:C.text,marginBottom:8}}>보고서 생성 완료</div>
          <div style={{fontSize:13,color:C.textSec,marginBottom:20}}>
            {selected.length}명의 기부자에 대한 맞춤 기부 제안 보고서가 생성되었습니다.<br/>
            Claude API로 각 기부자별 맞춤 메시지가 포함되어 있습니다.
          </div>
          <div style={{display:'flex',gap:10,justifyContent:'center'}}>
            <button onClick={()=>setStep(0)} style={{padding:'10px 20px',borderRadius:10,
              border:`1px solid ${C.border}`,background:'none',cursor:'pointer',fontSize:13,fontWeight:600,color:C.textSec}}>
              새 보고서
            </button>
            <button style={{padding:'10px 24px',borderRadius:10,border:'none',
              background:`linear-gradient(135deg,${C.primary},${C.accent})`,color:'#fff',
              cursor:'pointer',fontSize:13,fontWeight:700}}>📄 PDF 다운로드</button>
          </div>
        </div>
      )}
    </div>
  );
}

// 메인 앱
function App() {
  const [section, setSection] = React.useState('main');
  return (

}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
