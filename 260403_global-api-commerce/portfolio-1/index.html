<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>글로벌 API 커머스 플랫폼 — 맞춤 구현 데모</title>
<link rel="preconnect" href="https://cdn.jsdelivr.net">
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" rel="stylesheet">
<script src="https://unpkg.com/prop-types@15/prop-types.min.js"></script>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://unpkg.com/recharts@2/umd/Recharts.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Pretendard',sans-serif;background:#F4F7FB;color:#111827;display:flex;height:100vh;overflow:hidden}

/* Sidebar */
#sidebar{width:260px;background:#1A2F5A;display:flex;flex-direction:column;flex-shrink:0;height:100vh;overflow-y:auto}
.sb-logo{padding:24px 20px 20px;border-bottom:1px solid rgba(255,255,255,.1)}
.sb-logo-name{font-size:15px;font-weight:700;color:#fff;line-height:1.2}
.sb-logo-sub{font-size:11px;color:rgba(255,255,255,.5);margin-top:3px}
.sb-badge{display:inline-block;background:#FF6B35;color:#fff;font-size:9px;font-weight:700;padding:2px 7px;border-radius:20px;margin-top:6px;letter-spacing:.5px}
.sb-section{padding:16px 12px 8px;font-size:10px;font-weight:600;color:rgba(255,255,255,.35);letter-spacing:1px;text-transform:uppercase}
.sb-menu{list-style:none}
.sb-item{display:flex;align-items:center;gap:10px;padding:10px 16px;cursor:pointer;border-radius:8px;margin:2px 8px;color:rgba(255,255,255,.65);font-size:13px;font-weight:500;transition:all .15s}
.sb-item:hover{background:rgba(255,255,255,.08);color:#fff}
.sb-item.active{background:#0F52BA;color:#fff}
.sb-icon{font-size:16px;width:20px;text-align:center}
.sb-badge-count{margin-left:auto;background:#FF6B35;color:#fff;font-size:10px;font-weight:700;padding:2px 6px;border-radius:10px}

/* Main */
#main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.topbar{background:#fff;border-bottom:1px solid #E5E9F0;padding:0 28px;height:60px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.topbar-title{font-size:17px;font-weight:700;color:#111827}
.topbar-right{display:flex;align-items:center;gap:12px}
.tb-badge{background:#F0F6FF;color:#0F52BA;font-size:12px;font-weight:600;padding:5px 12px;border-radius:20px}
.tb-avatar{width:34px;height:34px;background:#0F52BA;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-size:13px;font-weight:700}
.content{flex:1;overflow-y:auto;padding:28px}

/* KPI Cards */
.kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:24px}
.kpi-card{background:#fff;border-radius:12px;padding:20px;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.kpi-label{font-size:12px;color:#6B7280;font-weight:500;margin-bottom:8px}
.kpi-val{font-size:26px;font-weight:700;color:#111827;line-height:1}
.kpi-sub{font-size:12px;color:#6B7280;margin-top:6px}
.kpi-up{color:#10B981}
.kpi-down{color:#EF4444}

/* Section */
.section-row{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:20px}
.card{background:#fff;border-radius:12px;padding:22px;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.card-full{grid-column:1/-1}
.card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px}
.card-title{font-size:14px;font-weight:700;color:#111827}
.card-action{font-size:12px;color:#0F52BA;cursor:pointer;font-weight:500}

/* Table */
.tbl{width:100%;border-collapse:collapse}
.tbl th{font-size:11px;font-weight:600;color:#6B7280;text-transform:uppercase;letter-spacing:.5px;padding:0 12px 10px;text-align:left;border-bottom:1px solid #F0F2F5}
.tbl td{padding:12px;font-size:13px;color:#374151;border-bottom:1px solid #F9FAFB}
.tbl tr:last-child td{border-bottom:none}
.tbl tr:hover td{background:#F9FAFB}

/* Badges */
.badge{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600}
.badge-green{background:#D1FAE5;color:#065F46}
.badge-blue{background:#DBEAFE;color:#1E40AF}
.badge-orange{background:#FEF3C7;color:#92400E}
.badge-red{background:#FEE2E2;color:#991B1B}
.badge-gray{background:#F3F4F6;color:#6B7280}
.badge-dot::before{content:'';width:6px;height:6px;border-radius:50%;background:currentColor;display:inline-block}

/* Product grid for storefront */
.prod-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
.prod-card{border:1px solid #E5E9F0;border-radius:10px;overflow:hidden;cursor:pointer;transition:.15s}
.prod-card:hover{box-shadow:0 4px 12px rgba(0,0,0,.1);transform:translateY(-2px)}
.prod-img{height:140px;display:flex;align-items:center;justify-content:center;font-size:40px;background:#F4F7FB}
.prod-info{padding:12px}
.prod-brand{font-size:11px;color:#6B7280;margin-bottom:3px}
.prod-name{font-size:13px;font-weight:600;color:#111827;margin-bottom:6px}
.prod-price-row{display:flex;align-items:center;gap:8px}
.prod-price{font-size:15px;font-weight:700;color:#0F52BA}
.prod-orig{font-size:12px;color:#9CA3AF;text-decoration:line-through}
.prod-badge{font-size:10px;background:#FEE2E2;color:#991B1B;padding:2px 6px;border-radius:4px;font-weight:600}

/* API sync screen */
.api-provider-list{display:flex;flex-direction:column;gap:12px}
.api-provider{display:flex;align-items:center;gap:14px;padding:16px;border:1px solid #E5E9F0;border-radius:10px}
.api-icon{width:40px;height:40px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.api-info{flex:1}
.api-name{font-size:14px;font-weight:600;color:#111827}
.api-desc{font-size:12px;color:#6B7280;margin-top:2px}
.api-stats{text-align:right;font-size:12px;color:#6B7280}
.api-count{font-size:16px;font-weight:700;color:#111827}
.progress-bar{height:4px;background:#E5E9F0;border-radius:4px;margin-top:8px;overflow:hidden}
.progress-fill{height:100%;border-radius:4px;background:linear-gradient(90deg,#0F52BA,#38BDF8)}

/* Membership */
.member-type-tabs{display:flex;gap:8px;margin-bottom:18px}
.mem-tab{padding:7px 16px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;border:1.5px solid #E5E9F0;color:#6B7280;background:#fff;transition:.15s}
.mem-tab.active{background:#0F52BA;color:#fff;border-color:#0F52BA}

/* Payment */
.pay-methods{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:20px}
.pay-method{border:2px solid #E5E9F0;border-radius:10px;padding:16px;text-align:center;cursor:pointer;transition:.15s}
.pay-method.selected{border-color:#0F52BA;background:#F0F6FF}
.pay-method-icon{font-size:28px;margin-bottom:6px}
.pay-method-name{font-size:12px;font-weight:600;color:#374151}
.pay-calc{background:#F4F7FB;border-radius:10px;padding:16px}
.pay-row{display:flex;justify-content:space-between;padding:6px 0;font-size:13px;color:#374151;border-bottom:1px solid #E5E9F0}
.pay-row:last-child{border-bottom:none;font-weight:700;color:#111827;font-size:14px}

/* Seller dashboard */
.seller-stat-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin-bottom:18px}
.seller-stat{background:#F4F7FB;border-radius:10px;padding:14px}
.seller-stat-label{font-size:11px;color:#6B7280;margin-bottom:4px}
.seller-stat-val{font-size:20px;font-weight:700;color:#111827}

/* Scrollbar */
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:#CBD5E1;border-radius:4px}

/* Demo label */
.demo-strip{background:linear-gradient(90deg,#0F52BA,#1E6EE8);color:#fff;text-align:center;font-size:11px;font-weight:600;padding:5px;letter-spacing:.5px;flex-shrink:0}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState } = React;
const { AreaChart, Area, BarChart, Bar, XAxis, YAxis, CartesianGrid, Tooltip, ResponsiveContainer, LineChart, Line, PieChart, Pie, Cell } = Recharts;

const NAV = [
  { id: 'storefront', icon: '🛍️', label: 'B2C 쇼핑' },
  { id: 'api-sync', icon: '🔄', label: 'API 수집 엔진' },
  { id: 'membership', icon: '👥', label: 'B2B/B2C 하이브리드 회원' },
  { id: 'payment', icon: '💳', label: '글로벌 결제 통합' },
  { id: 'seller-dashboard', icon: '📦', label: '셀러 대시보드' },
  { id: 'admin-dashboard', icon: '⚙️', label: '관리자 대시보드' },
];

const COLORS = ['#0F52BA','#FF6B35','#10B981','#8B5CF6','#F59E0B'];

/* ===== SCREENS ===== */
function StorefrontScreen() {
  const products = [
    { emoji:'👜', brand:'Maison Margiela', name:'MM6 에센셜 레더 토트백', price:'₩485,000', orig:'₩620,000', disc:'22%', tag:'해외직구' },
    { emoji:'⌚', brand:'Apple', name:'Apple Watch Ultra 2 49mm', price:'₩1,089,000', orig:'₩1,189,000', disc:'8%', tag:'공식인증' },
    { emoji:'👟', brand:'New Balance', name:'990v6 메이드인USA 스니커즈', price:'₩298,000', orig:'₩359,000', disc:'17%', tag:'한정수량' },
    { emoji:'🕶️', brand:'Ray-Ban', name:'클래식 에비에이터 선글라스 Gold', price:'₩178,000', orig:'₩229,000', disc:'22%', tag:'베스트' },
    { emoji:'💄', brand:'Charlotte Tilbury', name:'필로우토크 립스틱 컬렉션', price:'₩67,000', orig:'₩82,000', disc:'18%', tag:'뷰티' },
    { emoji:'🎒', brand:'Herschel Supply', name:'리틀 아메리카 백팩 22L', price:'₩142,000', orig:'₩175,000', disc:'19%', tag:'인기' },
  ];
  return (
    <div>
      <div style={{background:'linear-gradient(135deg,#0F52BA 0%,#1E6EE8 100%)',borderRadius:'14px',padding:'28px 32px',marginBottom:'24px',color:'#fff',display:'flex',alignItems:'center',justifyContent:'space-between'}}>
        <div>
          <div style={{fontSize:'12px',fontWeight:600,opacity:.7,letterSpacing:'1px',marginBottom:'8px'}}>GLOBAL COMMERCE</div>
          <div style={{fontSize:'26px',fontWeight:800,marginBottom:'6px'}}>해외 직구 · 병행수입<br/>최저가 보장 플랫폼</div>
          <div style={{fontSize:'13px',opacity:.8}}>3,200개 해외 브랜드 · 실시간 재고 연동</div>
        </div>
        <div style={{fontSize:'80px'}}>🌍</div>
      </div>
      <div style={{display:'flex',gap:'8px',marginBottom:'20px',flexWrap:'wrap'}}>
        {['전체','패션','전자기기','뷰티','스포츠','홈/리빙'].map((c,i)=>(
          <div key={c} style={{padding:'7px 16px',borderRadius:'20px',fontSize:'13px',fontWeight:600,cursor:'pointer',background:i===0?'#0F52BA':'#fff',color:i===0?'#fff':'#374151',border:i===0?'none':'1.5px solid #E5E9F0'}}>{c}</div>
        ))}
      </div>
      <div className="prod-grid">
        {products.map((p,i)=>(
          <div key={i} className="prod-card">
            <div className="prod-img">{p.emoji}</div>
            <div className="prod-info">
              <div className="prod-brand">{p.brand}</div>
              <div className="prod-name">{p.name}</div>
              <div className="prod-price-row">

      </div>
    </div>
  );
}

function ApiSyncScreen() {
  const providers = [
    { emoji:'🇺🇸', name:'Shopify Partner API', desc:'패션·생활용품 공급사 12개 연동', status:'정상', count:1842, progress:87, color:'#10B981' },

    { time:'14:19:22', event:'Amazon 배송 정보 역동기화', items:89, status:'완료' },
  ];
  return (
    <div>
      <div className="kpi-grid">
        {[
          {label:'연동 공급사', val:'4개', sub:'총 17개 채널'},

        ].map((k,i)=>(
          <div key={i} className="kpi-card">
            <div className="kpi-label">{k.label}</div>
            <div className="kpi-val">{k.val}</div>
            <div className="kpi-sub">{k.sub}</div>
          </div>
        ))}
      </div>
      <div className="section-row">
        <div className="card">
          <div className="card-header"><span className="card-title">공급사 연동 현황</span><span className="card-action">설정 관리</span></div>

                <div className="api-info">
                  <div className="api-name">{p.name}</div>
                  <div className="api-desc">{p.desc}</div>
                  <div className="progress-bar" style={{marginTop:'8px'}}><div className="progress-fill" style={{width:`${p.progress}%`,background:p.color}}/></div>
                </div>
                <div className="api-stats">
                  <div className="api-count">{p.count.toLocaleString()}</div>
                  <span className={`badge ${p.status==='정상'?'badge-green':'badge-orange'}`}>{p.status}</span>
                </div>
              </div>
            ))}
          </div>
        </div>
        <div className="card">
          <div className="card-header"><span className="card-title">실시간 동기화 로그</span><span className="card-action">전체 보기</span></div>
          <table className="tbl">
            <thead><tr><th>시각</th><th>이벤트</th><th>건수</th><th>상태</th></tr></thead>
            <tbody>
              {logs.map((l,i)=>(
                <tr key={i}>
                  <td style={{fontFamily:'monospace',fontSize:'12px',color:'#6B7280'}}>{l.time}</td>
                  <td>{l.event}</td>
                  <td style={{fontWeight:600}}>{l.items}</td>
                  <td><span className={`badge ${l.status==='완료'?'badge-green':'badge-blue'}`}>{l.status}</span></td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      </div>
      <div className="card">
        <div className="card-header"><span className="card-title">시간대별 수집량 추이</span></div>
        <ResponsiveContainer width="100%" height={160}>
          <AreaChart data={[
            {t:'09시',cnt:420},{t:'10시',cnt:890},{t:'11시',cnt:1240},{t:'12시',cnt:980},{t:'13시',cnt:1100},{t:'14시',cnt:1380},
          ]}>
            <CartesianGrid strokeDasharray="3 3" stroke="#F0F2F5"/>
            <XAxis dataKey="t" tick={{fontSize:11,fill:'#6B7280'}}/>
            <YAxis tick={{fontSize:11,fill:'#6B7280'}}/>
            <Tooltip/>
            <Area type="monotone" dataKey="cnt" stroke="#0F52BA" fill="#EFF6FF" strokeWidth={2} name="수집 건수"/>
