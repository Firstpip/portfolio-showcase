<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>뷰티/패션 멀티채널 셀러 관리 SaaS — 구현 데모</title>
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" rel="stylesheet">
<script src="https://unpkg.com/prop-types@15/prop-types.min.js"></script>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://unpkg.com/recharts@2/umd/Recharts.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Pretendard',sans-serif;background:#FAFAFA;color:#1C1917}
.demo-strip{background:linear-gradient(90deg,#7C3AED,#9B59E8);color:#fff;text-align:center;font-size:11px;font-weight:600;padding:5px;letter-spacing:.5px}

/* Topnav */
.topnav{background:#fff;border-bottom:1px solid #E5E7EB;padding:0;display:flex;flex-direction:column;flex-shrink:0}
.topnav-brand{display:flex;align-items:center;justify-content:space-between;padding:14px 28px;border-bottom:1px solid #F3F4F6}
.brand-name{font-size:18px;font-weight:800;background:linear-gradient(135deg,#7C3AED,#A855F7);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.brand-sub{font-size:11px;color:#78716C;margin-top:2px}
.brand-badge{background:linear-gradient(135deg,#7C3AED,#A855F7);color:#fff;font-size:10px;font-weight:700;padding:3px 10px;border-radius:20px;margin-left:12px}
.topnav-tabs{display:flex;padding:0 28px}
.tab-item{padding:14px 18px;font-size:13px;font-weight:600;cursor:pointer;color:#78716C;border-bottom:2.5px solid transparent;white-space:nowrap;transition:.15s}
.tab-item:hover{color:#7C3AED}
.tab-item.active{color:#7C3AED;border-bottom-color:#7C3AED}

/* Hero banner per tab */
.hero{padding:20px 28px;background:linear-gradient(135deg,#7C3AED 0%,#9333EA 100%);color:#fff;display:flex;align-items:center;justify-content:space-between}
.hero-title{font-size:20px;font-weight:800;margin-bottom:4px}
.hero-sub{font-size:13px;opacity:.85}
.hero-stats{display:flex;gap:28px}
.hero-stat{text-align:center}
.hero-stat-val{font-size:22px;font-weight:800}
.hero-stat-label{font-size:11px;opacity:.75;margin-top:2px}

/* Content */
.content{padding:24px 28px;overflow-y:auto;height:calc(100vh - 200px)}

/* Cards */
.grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:20px}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:18px;margin-bottom:18px}
.card{background:#fff;border-radius:14px;padding:20px;border:1px solid #E5E7EB}
.card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.card-title{font-size:13px;font-weight:700;color:#1C1917}
.card-action{font-size:12px;color:#7C3AED;cursor:pointer;font-weight:600}
.kpi-val{font-size:24px;font-weight:800;color:#1C1917}
.kpi-label{font-size:12px;color:#78716C;margin-bottom:6px;font-weight:500}
.kpi-sub{font-size:11px;color:#78716C;margin-top:4px}

/* Table */
.tbl{width:100%;border-collapse:collapse}
.tbl th{font-size:11px;font-weight:600;color:#78716C;text-transform:uppercase;letter-spacing:.5px;padding:0 10px 10px;text-align:left;border-bottom:1px solid #F3F4F6}
.tbl td{padding:11px 10px;font-size:13px;color:#374151;border-bottom:1px solid #F9FAFB}
.tbl tr:last-child td{border-bottom:none}

/* Badges */
.badge{display:inline-flex;align-items:center;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600}
.badge-green{background:#D1FAE5;color:#065F46}
.badge-purple{background:#EDE9FE;color:#5B21B6}
.badge-amber{background:#FEF3C7;color:#92400E}
.badge-red{background:#FEE2E2;color:#991B1B}
.badge-gray{background:#F3F4F6;color:#6B7280}
.badge-blue{background:#DBEAFE;color:#1E40AF}

/* Channel tags */
.ch-tag{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:6px;font-size:11px;font-weight:600}
.ch-shopify{background:#95BF47;color:#fff}
.ch-amazon{background:#FF9900;color:#fff}
.ch-naver{background:#03C75A;color:#fff}

/* Inventory table */
.inv-bar{height:6px;border-radius:4px;background:#E5E7EB;margin-top:4px;overflow:hidden}
.inv-fill{height:100%;border-radius:4px}

/* Channel status card */
.ch-card{border:1px solid #E5E7EB;border-radius:10px;padding:14px;display:flex;align-items:center;gap:12px}
.ch-logo{width:38px;height:38px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:20px}
.ch-info{flex:1}
.ch-name{font-size:13px;font-weight:700}
.ch-desc{font-size:11px;color:#78716C;margin-top:2px}
.status-dot{width:8px;height:8px;border-radius:50%;background:#10B981}

::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:#D1D5DB;border-radius:4px}
</style>
</head>
<body>
<div id="root"></div>

            {orders.map((o,i)=>(
              <tr key={i}>
                <td style={{fontFamily:'monospace',fontSize:'11px'}}>{o.id}</td>
                <td><span className={`ch-tag ${CH_STYLE[o.channel]}`}>{o.channel}</span></td>
                <td style={{fontWeight:500}}>{o.buyer}</td>
                <td>{o.product}</td>
                <td style={{fontWeight:700}}>{o.amt}</td>
                <td style={{fontSize:'11px',fontFamily:'monospace',color:'#78716C'}}>{o.tracking}</td>
                <td><span className={`badge ${o.status==='배송완료'?'badge-green':o.status==='배송중'?'badge-blue':o.status==='처리중'?'badge-amber':'badge-purple'}`}>{o.status}</span></td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>
    </div>
  );
}

  return (

          </ResponsiveContainer>
        </div>
        <div className="card">

          <ResponsiveContainer width="100%" height={160}>
            <PieChart><Pie data={pieData} cx="50%" cy="50%" outerRadius={70} dataKey="value" label={({name,value})=>`${name} ${value}%`} labelLine={false}>

          <div style={{marginTop:'12px'}}>

                <span style={{fontWeight:700,color:'#DC2626'}}>-{c.amount}</span>

const SCREENS = {
  '채널 대시보드': ChannelDashboard,
  '재고 동기화': InventorySyncScreen,
