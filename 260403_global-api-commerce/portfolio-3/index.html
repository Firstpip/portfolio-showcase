<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>B2B 도매 전문 커머스 플랫폼 — 구현 데모</title>
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" rel="stylesheet">
<script src="https://unpkg.com/prop-types@15/prop-types.min.js"></script>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://unpkg.com/recharts@2/umd/Recharts.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Pretendard',sans-serif;background:#F9FAFB;color:#111827;display:flex;flex-direction:column;height:100vh;overflow:hidden}
.demo-strip{background:linear-gradient(90deg,#059669,#10B981);color:#fff;text-align:center;font-size:11px;font-weight:600;padding:5px;letter-spacing:.5px;flex-shrink:0}

/* Layout */
.app-body{display:flex;flex:1;overflow:hidden}

/* Sidebar — bright */
#sidebar{width:240px;background:#fff;border-right:1px solid #E5E7EB;display:flex;flex-direction:column;flex-shrink:0;overflow-y:auto}
.sb-logo{padding:20px 18px 16px;border-bottom:1px solid #F3F4F6}
.sb-logo-row{display:flex;align-items:center;gap:10px}
.sb-logo-icon{width:36px;height:36px;background:linear-gradient(135deg,#059669,#10B981);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:18px;color:#fff}
.sb-logo-name{font-size:14px;font-weight:800;color:#111827}
.sb-logo-sub{font-size:10px;color:#6B7280}
.sb-badge{display:inline-block;background:#D1FAE5;color:#065F46;font-size:9px;font-weight:700;padding:2px 8px;border-radius:10px;margin-top:8px;letter-spacing:.3px}
.sb-section{padding:14px 16px 6px;font-size:10px;font-weight:700;color:#9CA3AF;letter-spacing:.8px;text-transform:uppercase}
.sb-item{display:flex;align-items:center;gap:9px;padding:9px 14px;cursor:pointer;border-radius:8px;margin:1px 8px;color:#6B7280;font-size:13px;font-weight:500;transition:.15s}
.sb-item:hover{background:#F0FDF4;color:#059669}
.sb-item.active{background:#D1FAE5;color:#059669;font-weight:700}
.sb-icon{font-size:15px;width:20px;text-align:center}
.sb-count{margin-left:auto;background:#059669;color:#fff;font-size:10px;font-weight:700;padding:1px 6px;border-radius:10px}

/* Main */
#main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.topbar{background:#fff;border-bottom:1px solid #E5E7EB;padding:0 24px;height:54px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.topbar-title{font-size:15px;font-weight:700}
.tb-right{display:flex;align-items:center;gap:10px}
.tb-chip{background:#F0FDF4;color:#059669;font-size:11px;font-weight:600;padding:4px 12px;border-radius:20px;border:1px solid #A7F3D0}

/* Inline tabs */
.inline-tabs{display:flex;gap:4px;border-bottom:1px solid #E5E7EB;padding:0 24px;background:#fff;flex-shrink:0}
.itab{padding:10px 14px;font-size:12px;font-weight:600;cursor:pointer;color:#6B7280;border-bottom:2px solid transparent;transition:.15s}
.itab:hover{color:#059669}
.itab.active{color:#059669;border-bottom-color:#059669}

/* Content */
.content{flex:1;overflow-y:auto;padding:20px 24px}

/* KPI */
.kpi-row{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:18px}
.kpi-card{background:#fff;border:1px solid #E5E7EB;border-radius:8px;padding:16px}
.kpi-label{font-size:11px;color:#6B7280;font-weight:500;margin-bottom:5px}
.kpi-val{font-size:22px;font-weight:800;color:#111827}
.kpi-sub{font-size:11px;color:#6B7280;margin-top:4px}

/* Cards */
.row-2{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px}
.card{background:#fff;border:1px solid #E5E7EB;border-radius:8px;padding:18px}
.card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.card-title{font-size:13px;font-weight:700}
.card-action{font-size:11px;color:#059669;cursor:pointer;font-weight:600}

/* Table */
.tbl{width:100%;border-collapse:collapse}
.tbl th{font-size:10px;font-weight:600;color:#9CA3AF;text-transform:uppercase;letter-spacing:.5px;padding:0 8px 8px;text-align:left;border-bottom:1px solid #F3F4F6}
.tbl td{padding:10px 8px;font-size:12px;color:#374151;border-bottom:1px solid #F9FAFB}
.tbl tr:last-child td{border-bottom:none}
.tbl tr:hover td{background:#F9FAFB}

/* Badges */
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:700}
.badge-green{background:#D1FAE5;color:#065F46}
.badge-amber{background:#FEF3C7;color:#92400E}
.badge-red{background:#FEE2E2;color:#991B1B}
.badge-blue{background:#DBEAFE;color:#1E40AF}
.badge-gray{background:#F3F4F6;color:#6B7280}
.badge-purple{background:#EDE9FE;color:#5B21B6}

/* Catalog product */
.prod-row{display:flex;align-items:center;gap:12px;padding:12px;border:1px solid #F3F4F6;border-radius:8px;margin-bottom:8px;cursor:pointer;transition:.15s}
.prod-row:hover{border-color:#A7F3D0;background:#F0FDF4}
.prod-emoji{font-size:28px;width:48px;text-align:center}
.prod-info{flex:1}
.prod-name{font-size:13px;font-weight:600}
.prod-brand{font-size:11px;color:#6B7280}
.prod-moq{font-size:11px;color:#059669;font-weight:600;margin-top:3px}
.prod-price-col{text-align:right}
.prod-price{font-size:16px;font-weight:800;color:#059669}
.prod-b2c{font-size:11px;color:#9CA3AF;text-decoration:line-through}
.prod-save{font-size:10px;background:#D1FAE5;color:#065F46;padding:2px 6px;border-radius:4px;font-weight:700}

/* Workflow steps */
.wf-step{display:flex;align-items:center;gap:10px;padding:12px 16px;background:#fff;border:1px solid #E5E7EB;border-radius:8px;margin-bottom:8px}
.wf-num{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;flex-shrink:0}
.wf-label{font-size:13px;font-weight:600;color:#111827}
.wf-sub{font-size:11px;color:#6B7280}
.wf-status{margin-left:auto}

/* Credit bar */
.credit-bar{height:8px;border-radius:6px;background:#E5E7EB;margin-top:6px;overflow:hidden}
.credit-fill{height:100%;border-radius:6px}

::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:#D1D5DB;border-radius:4px}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState } = React;
const { BarChart, Bar, AreaChart, Area, XAxis, YAxis, CartesianGrid, Tooltip, ResponsiveContainer, PieChart, Pie, Cell } = Recharts;

const NAV = [
  { id:'홀세일 카탈로그', icon:'🏷️', label:'홀세일 카탈로그' },
  { id:'견적서 관리', icon:'📋', label:'견적서 관리', count: 4 },
  { id:'대량 발주', icon:'📦', label:'대량 발주', count: 7 },

  { id:'관리자 대시보드', icon:'📊', label:'관리자 대시보드' },
];

const SUBTABS = {
  '홀세일 카탈로그': ['전체','패션','뷰티','전자기기','스포츠'],
  '견적서 관리': ['전체','검토중','발송됨','확정됨','만료'],
  '대량 발주': ['전체','결재중','승인완료','반려'],
  '계약 관리': ['전체','활성','만료임박','만료'],
  'B2B 정산': ['전체','정산 예정','완료','미수금'],
  '관리자 대시보드': ['전체 현황','바이어 승인','발주 현황','정산 현황'],
};

function WholesaleCatalog() {
  const prods = [
    { emoji:'💄', brand:'Charlotte Tilbury', name:'필로우토크 립스틱 컬렉션 12종 세트', moq:'30박스 (360개)', price:'₩42,000', b2c:'₩67,000', save:'37%', stock:'잔여 180박스' },
    { emoji:'🧴', brand:'La Mer', name:'더 크림 30ml 도매 팩', moq:'10박스 (60개)', price:'₩389,000', b2c:'₩689,000', save:'43%', stock:'잔여 42박스' },
    { emoji:'👟', brand:'New Balance', name:'990v6 MiUSA 혼합 사이즈 도매', moq:'24켤레 (1박스)', price:'₩218,000', b2c:'₩298,000', save:'27%', stock:'잔여 28박스' },
    { emoji:'⌚', brand:'Apple', name:'Apple Watch Series 9 41mm GPS 10팩', moq:'10대 (1팩)', price:'₩430,000', b2c:'₩589,000', save:'27%', stock:'잔여 15팩' },

        <div>
          <div style={{fontSize:'12px',fontWeight:700,color:'#065F46'}}>귀사 계약 특별가 적용 중</div>
          <div style={{fontSize:'11px',color:'#059669'}}>계약 ID: CTR-2025-0041 · 유효기간 2026.12.31 · 신용 한도 ₩5,000만원</div>
        </div>
        <div style={{marginLeft:'auto',fontSize:'12px',color:'#059669',fontWeight:600,cursor:'pointer'}}>계약 상세 →</div>
      </div>
      {prods.map((p,i)=>(
        <div key={i} className="prod-row">
          <div className="prod-emoji">{p.emoji}</div>
          <div className="prod-info">
            <div className="prod-brand">{p.brand}</div>
            <div className="prod-name">{p.name}</div>
            <div className="prod-moq">최소 발주: {p.moq}</div>

          </div>
          <div className="prod-price-col">
            <div className="prod-price">{p.price}</div>
            <div><span className="prod-save">-{p.save}</span></div>
            <div style={{fontSize:'10px',color:'#6B7280',marginTop:'3px'}}>{p.stock}</div>
          </div>
          <button style={{marginLeft:'12px',background:'#059669',color:'#fff',border:'none',padding:'8px 14px',borderRadius:'7px',fontSize:'12px',cursor:'pointer',fontWeight:700,whiteSpace:'nowrap'}}>발주 추가</button>
        </div>

function QuotationScreen() {
  const quotes = [
    { id:'QT-2026-0042', buyer:'(주)패션365', items:8, total:'₩12,480,000', issued:'2026.03.28', expires:'2026.04.27', status:'확정됨' },
    { id:'QT-2026-0041', buyer:'스타일하우스', items:3, total:'₩4,200,000', issued:'2026.03.25', expires:'2026.04.24', status:'발송됨' },
    { id:'QT-2026-0040', buyer:'글로벌트레이드(주)', items:12, total:'₩28,740,000', issued:'2026.03.22', expires:'2026.04.21', status:'검토중' },
    { id:'QT-2026-0039', buyer:'미래패션', items:5, total:'₩7,920,000', issued:'2026.03.15', expires:'2026.04.14', status:'확정됨' },
    { id:'QT-2026-0038', buyer:'케이뷰티코리아', items:9, total:'₩15,600,000', issued:'2026.02.28', expires:'2026.03.29', status:'만료' },
  ];
  const WF_STEPS = [
    { step:'1', label:'견적 요청', sub:'바이어가 상품·수량 요청', done:true },
    { step:'2', label:'내부 검토', sub:'단가·재고 확인', done:true },
    { step:'3', label:'견적서 발행', sub:'PDF 자동 생성 · 발송', done:true },
    { step:'4', label:'바이어 확인', sub:'30일 유효기간 내 확인', done:false },
    { step:'5', label:'발주 전환', sub:'견적 → 정식 발주 확정', done:false },
  ];
  return (
    <div>
      <div className="kpi-row">
        {[{label:'이번 달 견적 발행',val:'42건'},{label:'확정 전환율',val:'61.4%'},{label:'평균 견적 금액',val:'₩12.4M'},{label:'만료 예정(7일)',val:'8건'}].map((k,i)=>(
          <div key={i} className="kpi-card"><div className="kpi-label">{k.label}</div><div className="kpi-val" style={{fontSize:'20px'}}>{k.val}</div></div>
        ))}
      </div>
      <div className="row-2">
        <div className="card">
          <div className="card-header"><span className="card-title">견적 → 발주 워크플로우</span></div>
          {WF_STEPS.map((s,i)=>(
            <div key={i} className="wf-step">
              <div className="wf-num" style={{background:s.done?'#059669':'#E5E7EB',color:s.done?'#fff':'#9CA3AF'}}>{s.done?'✓':s.step}</div>
              <div>
                <div className="wf-label" style={{color:s.done?'#111827':'#9CA3AF'}}>{s.label}</div>
                <div className="wf-sub">{s.sub}</div>
              </div>
              <div className="wf-status">
                <span className={`badge ${s.done?'badge-green':'badge-gray'}`}>{s.done?'완료':'대기'}</span>
              </div>
            </div>
          ))}
        </div>
        <div className="card">
          <div className="card-header"><span className="card-title">견적서 목록</span><span className="card-action">+ 신규 견적</span></div>
          <table className="tbl">
            <thead><tr><th>견적번호</th><th>바이어</th><th>금액</th><th>유효기간</th><th>상태</th></tr></thead>
            <tbody>
              {quotes.map((q,i)=>(
                <tr key={i}>
                  <td style={{fontFamily:'monospace',fontSize:'10px'}}>{q.id}</td>
                  <td style={{fontWeight:600}}>{q.buyer}</td>
                  <td style={{fontWeight:700,color:'#059669'}}>{q.total}</td>
                  <td style={{fontSize:'11px',color:'#6B7280'}}>{q.expires}</td>
                  <td><span className={`badge ${q.status==='확정됨'?'badge-green':q.status==='발송됨'?'badge-blue':q.status==='검토중'?'badge-amber':'badge-gray'}`}>{q.status}</span></td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      </div>
    </div>
  );
}

            <thead><tr><th>발주번호</th><th>바이어</th><th>금액</th><th>결재 현황</th><th>상태</th></tr></thead>
            <tbody>

                </tr>
              ))}
            </tbody>
          </table>
        </div>
      </div>
    </div>
  );
}

function ContractManagementScreen() {
  const contracts = [
    { buyer:'(주)패션365', type:'홀세일', discount:'37%', creditLimit:'5,000만원', creditUsed:'1,840만원', payment:'NET30', expires:'2026.12.31', status:'활성' },
    { buyer:'글로벌트레이드(주)', type:'홀세일', discount:'41%', creditLimit:'1억원', creditUsed:'6,200만원', payment:'NET60', expires:'2026.08.15', status:'활성' },
    { buyer:'스타일하우스', type:'기업회원', discount:'22%', creditLimit:'1,000만원', creditUsed:'340만원', payment:'선불', expires:'2026.05.30', status:'만료임박' },
    { buyer:'미래패션', type:'기업회원', discount:'18%', creditLimit:'500만원', creditUsed:'0', payment:'선불', expires:'2026.11.20', status:'활성' },
    { buyer:'케이뷰티코리아', type:'홀세일', discount:'33%', creditLimit:'3,000만원', creditUsed:'2,980만원', payment:'NET30', expires:'2025.12.31', status:'만료' },
  ];
  const usedPct = (used, limit) => {
    const u = parseInt(used.replace(/[^0-9]/g,'')) || 0;
    const l = parseInt(limit.replace(/[^0-9]/g,'')) || 1;
    return Math.min(100, Math.round(u/l*100));
  };
  return (
    <div>
      <div className="kpi-row">
        {[{label:'전체 계약',val:'187건'},{label:'활성 계약',val:'142건'},{label:'만료 임박(30일)',val:'18건'},{label:'총 신용 한도',val:'₩24.7B'}].map((k,i)=>(
          <div key={i} className="kpi-card"><div className="kpi-label">{k.label}</div><div className="kpi-val" style={{fontSize:'20px'}}>{k.val}</div></div>
        ))}
      </div>
      <div className="card">
        <div className="card-header"><span className="card-title">바이어별 계약 현황</span><span className="card-action">+ 신규 계약</span></div>
        <table className="tbl">
          <thead><tr><th>바이어</th><th>등급</th><th>특별할인</th><th>신용 한도 / 사용</th><th>결제 조건</th><th>만료일</th><th>상태</th></tr></thead>
          <tbody>
            {contracts.map((c,i)=>(
              <tr key={i}>
                <td style={{fontWeight:700}}>{c.buyer}</td>
                <td><span className={`badge ${c.type==='홀세일'?'badge-green':'badge-blue'}`}>{c.type}</span></td>
                <td style={{fontWeight:700,color:'#059669'}}>-{c.discount}</td>
                <td style={{minWidth:'140px'}}>
                  <div style={{fontSize:'11px',color:'#374151'}}>{c.creditUsed} / {c.creditLimit}</div>
                  <div className="credit-bar"><div className="credit-fill" style={{width:`${usedPct(c.creditUsed,c.creditLimit)}%`,background:usedPct(c.creditUsed,c.creditLimit)>80?'#EF4444':usedPct(c.creditUsed,c.creditLimit)>60?'#F59E0B':'#059669'}}/></div>
                </td>
                <td><span className="badge badge-gray">{c.payment}</span></td>
                <td style={{fontSize:'11px',color: c.status==='만료임박'?'#D97706':c.status==='만료'?'#DC2626':'#6B7280',fontWeight:c.status!=='활성'?700:400}}>{c.expires}</td>
                <td><span className={`badge ${c.status==='활성'?'badge-green':c.status==='만료임박'?'badge-amber':'badge-gray'}`}>{c.status}</span></td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>
    </div>
  );
}
