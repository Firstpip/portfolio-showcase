<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>신분증 촬영 자동 보정 시스템 — 맞춤 구현 데모</title>
<link rel="preconnect" href="https://cdn.jsdelivr.net">
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" rel="stylesheet">
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://unpkg.com/prop-types@15/prop-types.min.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, sans-serif; background: #F0F9FF; color: #1A1A2E; height: 100vh; overflow: hidden; }
::-webkit-scrollbar { width: 6px; } ::-webkit-scrollbar-track { background: #f1f5f9; } ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.5} }
@keyframes spin { to { transform: rotate(360deg); } }
@keyframes progress { 0%{width:0%} 100%{width:72%} }
@keyframes scanLine { 0%{top:10%} 100%{top:85%} }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef } = React;

const C = {
  primary: '#0066CC', secondary: '#1A365D', accent: '#38BDF8',
  bg: '#F0F9FF', surface: '#FFFFFF', textP: '#1A1A2E', textS: '#6B7280',
  success: '#059669', warning: '#D97706', danger: '#DC2626', border: '#E2E8F0'
};

const NAV_ITEMS = [
  { id: 'camera-guide', label: '신분증 촬영 가이드', icon: '📷', sub: '카메라 보조 기능' },
  { id: 'image-processing', label: '이미지 자동 보정', icon: '🔧', sub: 'OpenCV 처리 파이프라인' },
  { id: 'secure-upload', label: '암호화 전송', icon: '🔒', sub: 'AES-256-GCM 보안 전송' },
  { id: 'admin-dashboard', label: '관리자 대시보드', icon: '📊', sub: '이미지 조회 및 다운로드' },
];

// ========== 화면 1: 신분증 촬영 가이드 ==========
function CameraGuideScreen() {
  const [idType, setIdType] = useState('주민등록증');
  const [countdown, setCountdown] = useState(null);
  const [captured, setCaptured] = useState(false);
  const [scanPos, setScanPos] = useState(10);

  useEffect(() => {
    const iv = setInterval(() => setScanPos(p => p >= 85 ? 10 : p + 1.5), 40);
    return () => clearInterval(iv);
  }, []);

  const handleAuto = () => {
    setCountdown(3);
    const t = setInterval(() => {
      setCountdown(p => {
        if (p <= 1) { clearInterval(t); setCaptured(true); return null; }
        return p - 1;
      });
    }, 1000);
  };

  const statusItems = [
    { label: '조도', value: '최적', level: 4, color: C.success },
    { label: '각도', value: '좋음', level: 3, color: C.success },
    { label: '초점', value: '최적', level: 4, color: C.success },
    { label: '반사', value: '없음', level: 4, color: C.success },
  ];

  return (
    <div style={{ display: 'flex', flexDirection: 'column', gap: 20, maxWidth: 780 }}>
      <div style={{ background: C.surface, borderRadius: 14, padding: '24px', boxShadow: '0 1px 3px rgba(0,0,0,.08)' }}>
        <div style={{ marginBottom: 16, display: 'flex', gap: 8 }}>
          {['주민등록증', '외국인등록증', '여권'].map(t => (
            <button key={t} onClick={() => setIdType(t)} style={{
              padding: '7px 16px', borderRadius: 20, border: `1.5px solid ${idType===t ? C.primary : C.border}`,
              background: idType===t ? C.primary : 'transparent', color: idType===t ? '#fff' : C.textS,
              fontSize: 13, fontWeight: 500, cursor: 'pointer', fontFamily: 'inherit'
            }}>{t}</button>
          ))}
        </div>

        {/* Camera viewfinder */}
        <div style={{ position: 'relative', background: '#0a0f1e', borderRadius: 12, overflow: 'hidden', height: 340, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
          {/* Grid overlay */}
          <div style={{ position: 'absolute', inset: 0, backgroundImage: 'linear-gradient(rgba(56,189,248,.06) 1px, transparent 1px), linear-gradient(90deg, rgba(56,189,248,.06) 1px, transparent 1px)', backgroundSize: '40px 40px' }} />

          {/* ID card guide frame */}
          <div style={{ position: 'relative', width: idType==='여권' ? 220 : 280, height: idType==='여권' ? 310 : 176, border: captured ? `2.5px solid ${C.success}` : `2.5px solid ${C.accent}`, borderRadius: 8, boxShadow: captured ? `0 0 0 1px ${C.success}40, 0 0 20px ${C.success}30` : `0 0 0 1px ${C.accent}40, 0 0 20px ${C.accent}30` }}>
            {/* Corner brackets */}
            {[['0','0','top','left'],['0','auto','top','right'],['auto','0','bottom','left'],['auto','auto','bottom','right']].map(([t,r,vert,horiz],i) => (
              <div key={i} style={{ position: 'absolute', [vert]: -2, [horiz]: -2, width: 20, height: 20, borderColor: captured ? C.success : C.accent, borderStyle: 'solid', borderTopWidth: vert==='top' ? 3 : 0, borderBottomWidth: vert==='bottom' ? 3 : 0, borderLeftWidth: horiz==='left' ? 3 : 0, borderRightWidth: horiz==='right' ? 3 : 0 }} />
            ))}

            {/* Scan line */}
            {!captured && (
              <div style={{ position: 'absolute', left: 0, right: 0, height: 2, top: `${scanPos}%`, background: `linear-gradient(90deg, transparent, ${C.accent}, transparent)`, boxShadow: `0 0 8px ${C.accent}` }} />
            )}

            {/* ID card content simulation */}
            <div style={{ position: 'absolute', inset: 8, background: captured ? 'rgba(5,150,105,.12)' : 'rgba(56,189,248,.06)', borderRadius: 4, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
              {captured ? (
                <div style={{ textAlign: 'center' }}>
                  <div style={{ fontSize: 28, marginBottom: 6 }}>✓</div>
                  <div style={{ color: C.success, fontSize: 13, fontWeight: 600 }}>촬영 완료</div>
                </div>
              ) : (
                <div style={{ color: 'rgba(56,189,248,.4)', fontSize: 12, textAlign: 'center', lineHeight: 1.5 }}>
                  {idType}<br/>가이드 프레임에 맞춰<br/>신분증을 위치시키세요
                </div>
              )}
            </div>

            {/* Countdown overlay */}
            {countdown && (
              <div style={{ position: 'absolute', inset: 0, background: 'rgba(0,0,0,.6)', display: 'flex', alignItems: 'center', justifyContent: 'center', borderRadius: 6 }}>
                <div style={{ fontSize: 64, color: '#fff', fontWeight: 700, animation: 'pulse 0.8s infinite' }}>{countdown}</div>
              </div>
            )}
          </div>

          {/* Status overlay bottom */}
          <div style={{ position: 'absolute', bottom: 0, left: 0, right: 0, background: 'linear-gradient(transparent, rgba(0,0,0,.75))', padding: '24px 20px 16px' }}>
            <div style={{ display: 'flex', gap: 20, justifyContent: 'center' }}>
              {statusItems.map(s => (
                <div key={s.label} style={{ textAlign: 'center' }}>
                  <div style={{ display: 'flex', gap: 2, justifyContent: 'center', marginBottom: 3 }}>
                    {[1,2,3,4].map(i => <div key={i} style={{ width: 6, height: 6, borderRadius: '50%', background: i<=s.level ? s.color : 'rgba(255,255,255,.25)' }} />)}
                  </div>
                  <div style={{ color: '#fff', fontSize: 11, opacity: .8 }}>{s.label}</div>
                </div>
              ))}
            </div>
          </div>
        </div>

        {/* Controls */}
        <div style={{ marginTop: 16, display: 'flex', gap: 10, justifyContent: 'center', alignItems: 'center' }}>
          {!captured ? (
            <>
              <button onClick={handleAuto} disabled={!!countdown} style={{ padding: '11px 28px', background: C.primary, color: '#fff', border: 'none', borderRadius: 10, fontSize: 14, fontWeight: 600, cursor: 'pointer', fontFamily: 'inherit', opacity: countdown ? .6 : 1 }}>
                {countdown ? `${countdown}초 후 촬영...` : '자동 촬영 시작'}
              </button>
              <button onClick={() => setCaptured(true)} style={{ padding: '11px 22px', background: 'transparent', color: C.textP, border: `1.5px solid ${C.border}`, borderRadius: 10, fontSize: 14, cursor: 'pointer', fontFamily: 'inherit' }}>직접 촬영</button>
            </>
          ) : (
            <>
              <button style={{ padding: '11px 28px', background: C.success, color: '#fff', border: 'none', borderRadius: 10, fontSize: 14, fontWeight: 600, cursor: 'pointer', fontFamily: 'inherit' }}>다음 단계 → 이미지 보정</button>
              <button onClick={() => { setCaptured(false); setCountdown(null); }} style={{ padding: '11px 22px', background: 'transparent', color: C.textS, border: `1.5px solid ${C.border}`, borderRadius: 10, fontSize: 14, cursor: 'pointer', fontFamily: 'inherit' }}>다시 촬영</button>
            </>
          )}
        </div>
      </div>

      {/* Tips */}
      <div style={{ background: C.surface, borderRadius: 14, padding: '18px 24px', boxShadow: '0 1px 3px rgba(0,0,0,.08)' }}>
        <div style={{ fontSize: 13, fontWeight: 600, color: C.textP, marginBottom: 12 }}>📋 촬영 시 유의사항</div>
        <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 8 }}>
          {['신분증을 밝은 곳에서 촬영하세요', '가이드 프레임에 신분증이 꽉 차도록 조정하세요', '반사광이 없는 각도를 찾으세요', '흔들리지 않도록 수평을 유지하세요'].map(t => (
            <div key={t} style={{ display: 'flex', gap: 8, alignItems: 'flex-start', fontSize: 13, color: C.textS }}>
              <span style={{ color: C.success, flexShrink: 0 }}>✓</span> {t}
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

// ========== 화면 2: 이미지 자동 보정 ==========
function ImageProcessingScreen() {
  const [step, setStep] = useState(4);

  const steps = [
    { label: '빛반사 감지 및 인페인팅', detail: 'BGR 채널 분석 → 과포화 픽셀 마스킹 → inpaint()', done: true },
    { label: '신분증 윤곽 추출', detail: 'Canny 엣지 → HoughLines → 꼭짓점 4개 추출', done: true },
    { label: '투시 변환 (원근 보정)', detail: 'warpPerspective → 85.6×54mm 기준 리샘플링', done: true },
    { label: 'CLAHE 대비 향상', detail: 'clipLimit=2.0, tileGridSize=8×8 적용', done: true },
  ];

  // Simulated ID card: before (with glare) and after (clean)
  const IDCardBefore = () => (
    <div style={{ width: '100%', height: 160, background: 'linear-gradient(135deg, #e8e4d8 0%, #f5f2e8 100%)', borderRadius: 8, position: 'relative', overflow: 'hidden', border: '1px solid #d0cabb' }}>
      <div style={{ position: 'absolute', top: 12, left: 12, right: 12 }}>
        <div style={{ fontSize: 10, fontWeight: 700, color: '#2d4a8a', marginBottom: 6, letterSpacing: 1 }}>대한민국 주민등록증</div>
        <div style={{ display: 'flex', gap: 10 }}>
          <div style={{ width: 44, height: 56, background: 'linear-gradient(135deg, #c8b8a0, #b0a090)', borderRadius: 3, flexShrink: 0 }} />
          <div style={{ flex: 1 }}>
            {['성 명', '생년월일', '주   소'].map((f,i) => (
              <div key={f} style={{ marginBottom: 5 }}>
                <div style={{ fontSize: 8, color: '#666', marginBottom: 1 }}>{f}</div>
                <div style={{ height: 7, background: '#aaa', borderRadius: 2, width: i===2?'90%':'60%', opacity: .7 }} />
              </div>
            ))}
          </div>
        </div>
      </div>
      {/* Glare overlay */}
      <div style={{ position: 'absolute', top: '20%', left: '30%', width: '50%', height: '45%', background: 'radial-gradient(ellipse, rgba(255,255,255,.9) 0%, rgba(255,255,255,.5) 40%, transparent 70%)', transform: 'rotate(-15deg)' }} />
      <div style={{ position: 'absolute', top: '55%', right: '10%', width: '30%', height: '25%', background: 'radial-gradient(ellipse, rgba(255,255,255,.7) 0%, transparent 70%)', transform: 'rotate(10deg)' }} />
      <div style={{ position: 'absolute', bottom: 8, left: 0, right: 0, textAlign: 'center', fontSize: 9, color: '#a0957a', letterSpacing: 2 }}>000000 - 0000000</div>
    </div>
  );

  const IDCardAfter = () => (
    <div style={{ width: '100%', height: 160, background: 'linear-gradient(135deg, #f8f5ed 0%, #fdfaf4 100%)', borderRadius: 8, position: 'relative', overflow: 'hidden', border: '1px solid #d8d0b8' }}>
      <div style={{ position: 'absolute', top: 12, left: 12, right: 12 }}>
        <div style={{ fontSize: 10, fontWeight: 700, color: '#1a3a7a', marginBottom: 6, letterSpacing: 1 }}>대한민국 주민등록증</div>
        <div style={{ display: 'flex', gap: 10 }}>
          <div style={{ width: 44, height: 56, background: 'linear-gradient(135deg, #c5a882, #a8906a)', borderRadius: 3, flexShrink: 0 }} />
          <div style={{ flex: 1 }}>
            {[['성 명','김민준'],['생년월일','1990.05.23'],['주   소','서울특별시']].map(([f,v],i) => (
              <div key={f} style={{ marginBottom: 5 }}>
                <div style={{ fontSize: 8, color: '#888', marginBottom: 1 }}>{f}</div>
                <div style={{ fontSize: 9, color: '#1a1a2e', fontWeight: 600 }}>{v}</div>
              </div>
            ))}
          </div>
        </div>
      </div>
      <div style={{ position: 'absolute', bottom: 8, left: 0, right: 0, textAlign: 'center', fontSize: 9, color: '#7a6e58', letterSpacing: 2 }}>901123 - 1234567</div>
    </div>
  );

  return (
    <div style={{ display: 'flex', flexDirection: 'column', gap: 20, maxWidth: 840 }}>
      {/* Comparison */}
      <div style={{ background: C.surface, borderRadius: 14, padding: 24, boxShadow: '0 1px 3px rgba(0,0,0,.08)' }}>
        <div style={{ fontSize: 15, fontWeight: 700, color: C.textP, marginBottom: 20 }}>보정 전·후 비교</div>
        <div style={{ display: 'grid', gridTemplateColumns: '1fr 60px 1fr', gap: 0, alignItems: 'center' }}>
          <div>
            <div style={{ fontSize: 12, color: C.danger, fontWeight: 600, marginBottom: 8, display: 'flex', alignItems: 'center', gap: 4 }}>
              <span style={{ width: 8, height: 8, borderRadius: '50%', background: C.danger, display: 'inline-block' }} /> 원본 (빛반사 있음)
            </div>
            <IDCardBefore />
          </div>
          <div style={{ textAlign: 'center', fontSize: 22, color: C.accent }}>→</div>
          <div>
            <div style={{ fontSize: 12, color: C.success, fontWeight: 600, marginBottom: 8, display: 'flex', alignItems: 'center', gap: 4 }}>
              <span style={{ width: 8, height: 8, borderRadius: '50%', background: C.success, display: 'inline-block' }} /> 보정 완료 (텍스트 판독 가능)
            </div>
            <IDCardAfter />
          </div>
        </div>
      </div>

      {/* Pipeline */}
      <div style={{ background: C.surface, borderRadius: 14, padding: 24, boxShadow: '0 1px 3px rgba(0,0,0,.08)' }}>
        <div style={{ fontSize: 15, fontWeight: 700, color: C.textP, marginBottom: 4 }}>OpenCV 처리 파이프라인</div>
        <div style={{ fontSize: 13, color: C.textS, marginBottom: 20 }}>FastAPI 서버에서 4단계 순차 처리</div>
        <div style={{ display: 'flex', flexDirection: 'column', gap: 0 }}>
          {steps.map((s, i) => (
            <div key={i} style={{ display: 'flex', gap: 16, alignItems: 'flex-start', paddingBottom: i<steps.length-1 ? 16 : 0, position: 'relative' }}>
              {i<steps.length-1 && <div style={{ position: 'absolute', left: 17, top: 36, bottom: 0, width: 2, background: C.success + '40' }} />}
              <div style={{ width: 36, height: 36, borderRadius: '50%', background: s.done ? C.success : C.border, display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0, color: '#fff', fontSize: 16, fontWeight: 700 }}>
                {s.done ? '✓' : i+1}
              </div>
              <div style={{ flex: 1, paddingTop: 4 }}>
                <div style={{ fontSize: 14, fontWeight: 600, color: C.textP, marginBottom: 3 }}>{s.label}</div>
                <div style={{ fontSize: 12, color: C.textS, fontFamily: 'monospace', background: '#f8fafc', padding: '4px 8px', borderRadius: 4, display: 'inline-block' }}>{s.detail}</div>
              </div>
              {s.done && <div style={{ fontSize: 12, color: C.success, fontWeight: 600, paddingTop: 6, whiteSpace: 'nowrap' }}>처리 완료</div>}
            </div>
          ))}
        </div>
      </div>

      {/* Quality metrics */}
      <div style={{ display: 'grid', gridTemplateColumns: 'repeat(4, 1fr)', gap: 12 }}>
        {[
          { label: '텍스트 가독성', before: '34%', after: '96%', color: C.success },
          { label: '빛반사 제거율', before: '—', after: '완전 제거', color: C.primary },
          { label: '이미지 선명도', before: '낮음', after: '높음', color: C.accent },
          { label: '처리 소요 시간', before: '', after: '1.2초', color: C.textS },
        ].map(m => (
          <div key={m.label} style={{ background: C.surface, borderRadius: 12, padding: '16px', textAlign: 'center', boxShadow: '0 1px 3px rgba(0,0,0,.08)' }}>
            <div style={{ fontSize: 11, color: C.textS, marginBottom: 6 }}>{m.label}</div>
            <div style={{ fontSize: 18, fontWeight: 700, color: m.color }}>{m.after}</div>
            {m.before && <div style={{ fontSize: 11, color: C.textS }}>이전: {m.before}</div>}
          </div>
        ))}
      </div>

      <div style={{ display: 'flex', gap: 10 }}>
        <button style={{ padding: '12px 32px', background: C.primary, color: '#fff', border: 'none', borderRadius: 10, fontSize: 14, fontWeight: 600, cursor: 'pointer', fontFamily: 'inherit' }}>암호화 전송으로 이동 →</button>
        <button style={{ padding: '12px 20px', background: 'transparent', color: C.textS, border: `1.5px solid ${C.border}`, borderRadius: 10, fontSize: 14, cursor: 'pointer', fontFamily: 'inherit' }}>보정 설정 조정</button>
      </div>
    </div>
  );
}

// ========== 화면 3: 암호화 전송 ==========
function SecureUploadScreen() {
  const [active, setActive] = useState(2);

  useEffect(() => {
    const iv = setInterval(() => setActive(a => a < 4 ? a + 1 : 4), 1400);
    return () => clearInterval(iv);
  }, []);

  const uploadSteps = [
    { label: '클라이언트 암호화', desc: 'Web Crypto API AES-256-GCM 적용', done: true },
    { label: 'HTTPS 보안 전송', desc: 'TLS 1.3 채널로 서버 전송 중', done: active >= 2 },
    { label: 'S3 암호화 저장', desc: 'AWS S3 SSE-S3 서버사이드 암호화', done: active >= 3 },
    { label: '클라이언트 메모리 정리', desc: 'Canvas clearRect() + 참조 해제', done: active >= 4 },
  ];

  return (
    <div style={{ display: 'flex', flexDirection: 'column', gap: 20, maxWidth: 720 }}>
      {/* Security badges */}
      <div style={{ display: 'grid', gridTemplateColumns: 'repeat(3, 1fr)', gap: 12 }}>
        {[
          { icon: '🔒', label: 'AES-256-GCM', sub: '클라이언트 암호화', color: '#1A365D' },
          { icon: '🛡️', label: 'TLS 1.3', sub: '전송 구간 암호화', color: '#0066CC' },
          { icon: '☁️', label: 'S3 SSE', sub: '서버 저장 암호화', color: '#0891b2' },
        ].map(b => (
          <div key={b.label} style={{ background: `linear-gradient(135deg, ${b.color}, ${b.color}dd)`, borderRadius: 14, padding: '18px 16px', color: '#fff', textAlign: 'center' }}>
            <div style={{ fontSize: 24, marginBottom: 6 }}>{b.icon}</div>
            <div style={{ fontSize: 14, fontWeight: 700, marginBottom: 3 }}>{b.label}</div>
            <div style={{ fontSize: 11, opacity: .8 }}>{b.sub}</div>
          </div>
        ))}
      </div>

      {/* Progress steps */}
      <div style={{ background: C.surface, borderRadius: 14, padding: 24, boxShadow: '0 1px 3px rgba(0,0,0,.08)' }}>
        <div style={{ fontSize: 15, fontWeight: 700, color: C.textP, marginBottom: 20 }}>전송 진행 상태</div>
        <div style={{ display: 'flex', flexDirection: 'column', gap: 16 }}>
          {uploadSteps.map((s, i) => (
            <div key={i} style={{ display: 'flex', gap: 14, alignItems: 'center', padding: '14px 16px', borderRadius: 10, background: s.done ? '#f0fdf4' : '#f8fafc', border: `1px solid ${s.done ? '#bbf7d0' : C.border}` }}>
              <div style={{ width: 32, height: 32, borderRadius: '50%', background: s.done ? C.success : C.border, display: 'flex', alignItems: 'center', justifyContent: 'center', color: '#fff', fontSize: 14, fontWeight: 700, flexShrink: 0 }}>
                {s.done ? '✓' : i+1}
              </div>
              <div style={{ flex: 1 }}>
                <div style={{ fontSize: 14, fontWeight: 600, color: C.textP }}>{s.label}</div>
                <div style={{ fontSize: 12, color: C.textS, marginTop: 2 }}>{s.desc}</div>
              </div>
              <div style={{ fontSize: 12, fontWeight: 600, color: s.done ? C.success : C.textS }}>
                {s.done ? '완료' : '대기'}
              </div>
            </div>
          ))}
        </div>

        {active >= 4 && (
          <div style={{ marginTop: 20, padding: '16px', background: '#f0fdf4', borderRadius: 10, border: '1px solid #bbf7d0', textAlign: 'center' }}>
            <div style={{ fontSize: 22, marginBottom: 6 }}>✅</div>
            <div style={{ fontSize: 15, fontWeight: 700, color: C.success }}>전송 완료</div>
            <div style={{ fontSize: 13, color: C.textS, marginTop: 4 }}>클라이언트 메모리에서 모든 이미지 데이터가 삭제되었습니다</div>
          </div>
        )}
      </div>

      {/* Security info */}
      <div style={{ background: C.surface, borderRadius: 14, padding: 24, boxShadow: '0 1px 3px rgba(0,0,0,.08)' }}>
        <div style={{ fontSize: 14, fontWeight: 700, color: C.textP, marginBottom: 14 }}>보안 아키텍처 설계</div>
        <div style={{ display: 'flex', flexDirection: 'column', gap: 10 }}>
          {[
            '클라이언트에서 AES-256-GCM 키를 생성하여 전송 전 암호화 수행',
            'HTTPS(TLS 1.3)로 전송하여 중간자 공격 방어',
            'AWS S3 버킷에 SSE-S3 적용, 저장 데이터 암호화',
            '전송 완료 즉시 Canvas API clearRect() 및 JavaScript 참조 해제',
            '서버에서 AES 복호화 후 즉시 S3 암호화 저장 (평문 보관 없음)',
          ].map((t, i) => (
            <div key={i} style={{ display: 'flex', gap: 10, alignItems: 'flex-start', fontSize: 13, color: C.textS }}>
              <div style={{ width: 18, height: 18, borderRadius: '50%', background: C.primary + '15', color: C.primary, display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 10, fontWeight: 700, flexShrink: 0, marginTop: 1 }}>{i+1}</div>
              {t}
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}
