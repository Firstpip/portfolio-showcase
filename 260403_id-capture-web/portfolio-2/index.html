<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>법인 서류 스캔 디지털화 플랫폼 — 구현 데모</title>
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" rel="stylesheet">
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://unpkg.com/prop-types@15/prop-types.min.js"></script>
<script src="https://unpkg.com/recharts@2.12.2/umd/Recharts.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Pretendard', -apple-system, sans-serif; background: #F8FAFC; color: #0F172A; height: 100vh; overflow: hidden; }
::-webkit-scrollbar { width: 6px; } ::-webkit-scrollbar-track { background: #f1f5f9; } ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
@keyframes edgePulse { 0%,100%{opacity:.6} 50%{opacity:1} }
@keyframes slideIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
@keyframes scanX { 0%{left:5%} 100%{left:90%} }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect } = React;
const { BarChart, Bar, XAxis, YAxis, CartesianGrid, Tooltip, ResponsiveContainer, PieChart, Pie, Cell } = Recharts;

const C = {
  primary: '#334155', secondary: '#0F172A', accent: '#06B6D4',
  bg: '#F8FAFC', surface: '#FFFFFF', textP: '#0F172A', textS: '#64748B',
  success: '#059669', warning: '#D97706', danger: '#DC2626', border: '#E2E8F0'
};

const NAV_TABS = [
  { id: 'scan-capture', label: '문서 촬영 및 엣지 감지', icon: '📷' },
  { id: 'image-correction', label: '이미지 보정 및 OCR 전처리', icon: '🔬' },
  { id: 'document-classify', label: '문서 유형 분류 및 보관', icon: '🗂️' },
  { id: 'document-dashboard', label: '서류 대시보드', icon: '📊' },
];

const HERO_INFO = {
  'scan-capture': { title: '문서 촬영 및 엣지 감지', sub: 'OpenCV.js 브라우저 실행 · 실시간 윤곽 감지 · 자동 캡처', color: '#0f2744' },
  'image-correction': { title: '이미지 보정 및 OCR 전처리', sub: 'Otsu 이진화 · 노이즈 제거 · DESKEW 보정 · Tesseract 최적화', color: '#0a1f35' },
  'document-classify': { title: '문서 유형 분류 및 보관', sub: '레이아웃 패턴 분류 · PostgreSQL JSONB · S3 자동 경로 생성', color: '#0c2340' },
  'document-dashboard': { title: '서류 대시보드', sub: '만료 알림 · 버전 관리 · 역할 기반 권한 제어 · 현황 차트', color: '#0d1f30' },
};

// ===== SCREEN 1: 문서 촬영 및 엣지 감지 =====
function ScanCaptureScreen() {
  const [edgeMode, setEdgeMode] = useState(true);
  const [detected, setDetected] = useState(false);
  const [progress, setProgress] = useState(0);

  useEffect(() => {
    const iv = setInterval(() => {
      setProgress(p => {
        if (p >= 100) { setDetected(true); clearInterval(iv); return 100; }
        return p + 2;
      });
    }, 60);
    return () => clearInterval(iv);
  }, []);

  const DocumentSVGOverlay = () => (
    <svg style={{ position: 'absolute', inset: 0, width: '100%', height: '100%' }}>
      {detected && (
        <>
          <polygon points="60,55 380,42 390,260 55,275" fill="none" stroke="#06B6D4" strokeWidth="2.5"
            style={{ animation: 'edgePulse 2s infinite' }} />
          {[[60,55],[380,42],[390,260],[55,275]].map(([x,y],i) => (
            <circle key={i} cx={x} cy={y} r="6" fill="#06B6D4" style={{ animation: 'edgePulse 1.5s infinite' }} />
          ))}
        </>
      )}
      {!detected && progress > 30 && (
        <rect x="50" y="40" width="345" height="235" fill="none" stroke="rgba(6,182,212,.4)" strokeWidth="1.5" strokeDasharray="8 4" />
      )}
    </svg>
  );

  return (
    <div style={{ display: 'grid', gridTemplateColumns: '1fr 340px', gap: 20, alignItems: 'start' }}>
      {/* Camera area */}
      <div style={{ background: C.surface, borderRadius: 16, overflow: 'hidden', boxShadow: '0 4px 16px rgba(0,0,0,.1)' }}>
        <div style={{ background: '#111827', padding: '12px 16px', display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
          <div style={{ display: 'flex', gap: 10, alignItems: 'center' }}>
            <div style={{ width: 8, height: 8, borderRadius: '50%', background: detected ? '#22c55e' : '#ef4444', boxShadow: detected ? '0 0 6px #22c55e' : 'none' }} />
            <span style={{ color: '#e2e8f0', fontSize: 12, fontWeight: 500 }}>OpenCV.js · 엣지 감지 활성화</span>
          </div>
          <div style={{ display: 'flex', gap: 8 }}>
            {['엣지 감지', '원본 뷰'].map(m => (
              <button key={m} onClick={() => setEdgeMode(m==='엣지 감지')} style={{ padding: '4px 10px', borderRadius: 6, border: 'none', background: (m==='엣지 감지') === edgeMode ? C.accent : '#374151', color: '#fff', fontSize: 11, cursor: 'pointer', fontFamily: 'inherit' }}>{m}</button>
            ))}
          </div>
        </div>

        {/* Viewfinder */}
        <div style={{ position: 'relative', height: 320, background: '#1e2a3a', display: 'flex', alignItems: 'center', justifyContent: 'center', overflow: 'hidden' }}>
          {/* Simulated document */}
          <div style={{ width: 340, height: 240, background: '#f8f5f0', borderRadius: 4, position: 'relative', boxShadow: '0 8px 32px rgba(0,0,0,.4)', display: 'flex', flexDirection: 'column', padding: 16 }}>
            <div style={{ fontSize: 11, fontWeight: 700, color: '#1a3a7a', marginBottom: 8, letterSpacing: .5 }}>사업자등록증</div>
            <div style={{ height: 1, background: '#1a3a7a', marginBottom: 10 }} />
            <div style={{ display: 'grid', gridTemplateColumns: '80px 1fr', gap: 6 }}>
              {[['법인명','(주)한국물산'],['등록번호','123-45-67890'],['대표이사','박철수'],['사업장소재지','서울시 강남구 테헤란로 123'],['업태','도매 및 소매업'],['종목','의류 및 잡화']].map(([k,v]) => (
                <React.Fragment key={k}>
                  <div style={{ fontSize: 9, color: '#666', borderRight: '1px solid #ddd', paddingRight: 8 }}>{k}</div>
                  <div style={{ fontSize: 9, color: '#1a1a2e', fontWeight: 500 }}>{v}</div>
                </React.Fragment>
              ))}
            </div>
            <div style={{ marginTop: 'auto', textAlign: 'right', fontSize: 9, color: '#888' }}>국세청장</div>
          </div>

          {edgeMode && <DocumentSVGOverlay />}

          {/* Detection progress */}
          <div style={{ position: 'absolute', bottom: 12, left: 12, right: 12 }}>
            <div style={{ background: 'rgba(0,0,0,.7)', borderRadius: 8, padding: '10px 14px' }}>
              <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: 6 }}>
                <span style={{ fontSize: 11, color: '#e2e8f0' }}>{detected ? '✓ 문서 감지 완료' : `엣지 분석 중... ${progress}%`}</span>
                <span style={{ fontSize: 11, color: C.accent }}>Canny + HoughLines</span>
              </div>
              <div style={{ height: 3, background: '#374151', borderRadius: 2 }}>
                <div style={{ height: '100%', width: `${progress}%`, background: detected ? '#22c55e' : C.accent, borderRadius: 2, transition: 'width .1s' }} />
              </div>
            </div>
          </div>
        </div>

        {/* Controls */}
        <div style={{ padding: '16px 20px', display: 'flex', gap: 10, background: '#f8fafc', borderTop: `1px solid ${C.border}` }}>
          <button style={{ flex: 1, padding: '10px', background: detected ? C.success : C.primary, color: '#fff', border: 'none', borderRadius: 10, fontSize: 13, fontWeight: 600, cursor: 'pointer', fontFamily: 'inherit' }}>
            {detected ? '✓ 자동 캡처 완료 — 보정 단계로 이동' : '수동 촬영'}
          </button>
          <button style={{ padding: '10px 16px', background: 'transparent', color: C.textS, border: `1.5px solid ${C.border}`, borderRadius: 10, fontSize: 13, cursor: 'pointer', fontFamily: 'inherit' }}>재시도</button>
        </div>
      </div>

      {/* Side panel */}
      <div style={{ display: 'flex', flexDirection: 'column', gap: 14 }}>
        {/* OpenCV.js status */}
        <div style={{ background: C.surface, borderRadius: 14, padding: 18, boxShadow: '0 2px 8px rgba(0,0,0,.08)' }}>
          <div style={{ fontSize: 13, fontWeight: 700, color: C.textP, marginBottom: 12 }}>OpenCV.js 엔진</div>
          <div style={{ display: 'flex', gap: 8, alignItems: 'center', padding: '10px 12px', background: '#f0fdf4', borderRadius: 8, marginBottom: 10 }}>
            <div style={{ width: 8, height: 8, borderRadius: '50%', background: '#22c55e' }} />
            <span style={{ fontSize: 12, color: C.success, fontWeight: 500 }}>브라우저 직접 실행 중</span>
          </div>
          {[
            { label: '처리 방식', value: '클라이언트 사이드' },
            { label: '서버 왕복', value: '없음 (0ms)' },
            { label: '알고리즘', value: 'Canny + Hough' },
            { label: '샘플링', value: '300ms 간격' },
          ].map(({ label, value }) => (
            <div key={label} style={{ display: 'flex', justifyContent: 'space-between', padding: '6px 0', borderBottom: `1px solid ${C.border}`, fontSize: 12 }}>
              <span style={{ color: C.textS }}>{label}</span>
              <span style={{ color: C.textP, fontWeight: 500 }}>{value}</span>
            </div>
          ))}
        </div>

        {/* Detection results */}
        {detected && (
          <div style={{ background: C.surface, borderRadius: 14, padding: 18, boxShadow: '0 2px 8px rgba(0,0,0,.08)', animation: 'slideIn .4s ease' }}>
            <div style={{ fontSize: 13, fontWeight: 700, color: C.textP, marginBottom: 12 }}>감지 결과</div>
            {[
              { label: '문서 꼭짓점', value: '4개 추출됨', ok: true },
              { label: '면적 비율', value: '72% (임계값 충족)', ok: true },
              { label: '기울기', value: '-3.2° (보정 예정)', ok: true },
              { label: '조도', value: '양호', ok: true },
            ].map(({ label, value, ok }) => (
              <div key={label} style={{ display: 'flex', justifyContent: 'space-between', padding: '6px 0', borderBottom: `1px solid ${C.border}`, fontSize: 12 }}>
                <span style={{ color: C.textS }}>{label}</span>
                <span style={{ color: ok ? C.success : C.danger, fontWeight: 500 }}>{value}</span>
              </div>
            ))}
          </div>
        )}

        {/* Document types */}
        <div style={{ background: C.surface, borderRadius: 14, padding: 18, boxShadow: '0 2px 8px rgba(0,0,0,.08)' }}>
          <div style={{ fontSize: 13, fontWeight: 700, color: C.textP, marginBottom: 10 }}>지원 서류 유형</div>
          <div style={{ display: 'flex', flexWrap: 'wrap', gap: 6 }}>
            {['사업자등록증', '인감증명서', '법인등기부등본', '계약서', '견적서', '세금계산서'].map(t => (
              <span key={t} style={{ padding: '4px 10px', background: C.accent + '15', color: C.accent, borderRadius: 12, fontSize: 11, fontWeight: 500 }}>{t}</span>
            ))}
          </div>
        </div>
      </div>
    </div>
  );
}

// ===== SCREEN 2: 이미지 보정 및 OCR 전처리 =====
function ImageCorrectionScreen() {
  const [viewStep, setViewStep] = useState(3);

  const pipeline = [
    { name: 'Otsu 이진화', desc: '자동 임계값 산출 → 텍스트/배경 분리', detail: 'threshold(src, 0, 255, THRESH_BINARY+THRESH_OTSU)', color: '#7c3aed' },
    { name: '모폴로지 노이즈 제거', desc: 'MORPH_CLOSE로 문자 내부 빈 픽셀 제거', detail: 'morphologyEx(src, MORPH_CLOSE, kernel)', color: '#0891b2' },
    { name: 'DESKEW 회전 보정', desc: 'minAreaRect로 기울기 측정 후 warpAffine', detail: 'cv2.minAreaRect → warpAffine(-3.2°)', color: '#059669' },
    { name: 'PNG 300DPI 변환', desc: 'Tesseract OCR 호환 포맷으로 최종 저장', detail: 'imencode(".png", 300dpi, quality=100)', color: '#0066CC' },
  ];

  // Simulated document states for each step
  const DocStep = ({ step }) => {
    const filters = [
      '',
      'contrast(200%) grayscale(100%)',
      'contrast(200%) grayscale(100%) brightness(1.1)',
      'contrast(220%) grayscale(100%) brightness(1.15)',
      'contrast(220%) grayscale(100%) brightness(1.15) sharpen',
    ];
    return (
      <div style={{ width: '100%', height: 200, background: step === 0 ? '#f0ebe0' : '#fafafa', border: `1px solid ${C.border}`, borderRadius: 8, position: 'relative', overflow: 'hidden', display: 'flex', alignItems: 'center', justifyContent: 'center', filter: step > 0 ? 'contrast(180%) grayscale(80%)' : 'none' }}>
        <div style={{ width: '85%', height: '88%', background: step === 0 ? '#f8f5f0' : '#fff', position: 'relative', padding: 12, borderRadius: 4 }}>
          {step === 0 && <div style={{ position: 'absolute', top: '25%', left: '20%', width: '60%', height: '35%', background: 'radial-gradient(ellipse, rgba(255,255,255,.8), transparent 70%)', pointerEvents: 'none' }} />}
          <div style={{ fontSize: 9, fontWeight: 700, color: step > 0 ? '#000' : '#1a3a7a', marginBottom: 6 }}>사업자등록증</div>
          {[1,2,3,4,5].map(i => (
            <div key={i} style={{ height: step > 1 ? 7 : 6, background: step > 1 ? '#111' : '#9ca3af', borderRadius: 2, marginBottom: 5, width: `${[95,72,88,65,80][i-1]}%`, opacity: step > 0 ? 1 : .7 }} />
          ))}
          {step === 0 && <div style={{ position: 'absolute', bottom: 4, right: 4, fontSize: 8, color: '#b0a090' }}>원본 (기울어짐 -3.2°)</div>}
          {step === 3 && <div style={{ position: 'absolute', bottom: 4, right: 4, fontSize: 8, color: C.success, fontWeight: 600 }}>OCR 최적화 완료</div>}
        </div>
      </div>
    );
  };

  return (
    <div style={{ display: 'flex', flexDirection: 'column', gap: 20 }}>
      {/* Main comparison */}
      <div style={{ background: C.surface, borderRadius: 16, padding: 24, boxShadow: '0 2px 12px rgba(0,0,0,.08)' }}>
        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 20 }}>
          <div>
            <div style={{ fontSize: 15, fontWeight: 700, color: C.textP }}>처리 단계 시각화</div>
            <div style={{ fontSize: 12, color: C.textS, marginTop: 2 }}>단계를 클릭하여 처리 상태를 확인하세요</div>
          </div>
          <div style={{ display: 'flex', gap: 6 }}>
            {['원본', '이진화', '노이즈제거', 'DESKEW'].map((s, i) => (
              <button key={s} onClick={() => setViewStep(i)} style={{
                padding: '6px 12px', borderRadius: 8, border: `1.5px solid ${viewStep===i ? pipeline[i>0?i-1:0]?.color || C.accent : C.border}`,
                background: viewStep===i ? (pipeline[i>0?i-1:0]?.color || C.accent) + '15' : 'transparent',
                color: viewStep===i ? (pipeline[i>0?i-1:0]?.color || C.accent) : C.textS,
                fontSize: 12, cursor: 'pointer', fontFamily: 'inherit', fontWeight: viewStep===i ? 600 : 400
              }}>{s}</button>
            ))}
          </div>
        </div>
        <DocStep step={viewStep} />
      </div>

      {/* Pipeline steps */}
      <div style={{ display: 'grid', gridTemplateColumns: 'repeat(4, 1fr)', gap: 12 }}>
        {pipeline.map((p, i) => (
          <div key={i} onClick={() => setViewStep(i+1)} style={{ background: C.surface, borderRadius: 14, padding: '16px', cursor: 'pointer', boxShadow: '0 2px 8px rgba(0,0,0,.08)', border: `1.5px solid ${viewStep===i+1 ? p.color : C.border}`, transition: 'all .15s' }}>
            <div style={{ width: 32, height: 32, borderRadius: 10, background: p.color + '20', color: p.color, display: 'flex', alignItems: 'center', justifyContent: 'center', fontWeight: 700, fontSize: 14, marginBottom: 10 }}>
              {i+1}
            </div>
            <div style={{ fontSize: 13, fontWeight: 700, color: C.textP, marginBottom: 4 }}>{p.name}</div>
            <div style={{ fontSize: 11, color: C.textS, marginBottom: 8, lineHeight: 1.5 }}>{p.desc}</div>
            <div style={{ fontSize: 10, color: p.color, fontFamily: 'monospace', background: p.color + '10', padding: '4px 6px', borderRadius: 4, wordBreak: 'break-all' }}>{p.detail}</div>
          </div>
        ))}
      </div>

      {/* OCR readiness */}
      <div style={{ background: C.surface, borderRadius: 14, padding: '18px 24px', boxShadow: '0 2px 8px rgba(0,0,0,.08)' }}>
        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
          <div>
            <div style={{ fontSize: 14, fontWeight: 700, color: C.textP }}>OCR 전처리 완료</div>
            <div style={{ fontSize: 12, color: C.textS, marginTop: 2 }}>Tesseract OCR 호환 포맷 (PNG, 300DPI) 변환 완료</div>
          </div>
          <div style={{ display: 'flex', gap: 10 }}>
            <button style={{ padding: '10px 20px', background: C.accent, color: '#fff', border: 'none', borderRadius: 10, fontSize: 13, fontWeight: 600, cursor: 'pointer', fontFamily: 'inherit' }}>문서 분류 단계로 →</button>
            <button style={{ padding: '10px 16px', background: 'transparent', color: C.textS, border: `1.5px solid ${C.border}`, borderRadius: 10, fontSize: 13, cursor: 'pointer', fontFamily: 'inherit' }}>재처리</button>
          </div>
        </div>
      </div>
    </div>
  );
}

// ===== SCREEN 3: 문서 유형 분류 및 보관 =====
function DocumentClassifyScreen() {
  const [selected, setSelected] = useState(null);
  const [tag, setTag] = useState('');

  const docs = [
    { id: 'DOC-001', name: '사업자등록증', confidence: 98, status: '자동 분류', expiry: '갱신 없음', size: '2.1MB' },
    { id: 'DOC-002', name: '법인인감증명서', confidence: 94, status: '자동 분류', expiry: '2025-03-31', size: '1.8MB' },
    { id: 'DOC-003', name: '계약서', confidence: 87, status: '수동 확인 권장', expiry: '2026-12-31', size: '4.2MB' },
    { id: 'DOC-004', name: '세금계산서', confidence: 96, status: '자동 분류', expiry: '없음', size: '0.9MB' },
    { id: 'DOC-005', name: '법인등기부등본', confidence: 91, status: '자동 분류', expiry: '2025-06-30', size: '3.1MB' },
  ];

  const folders = [
    { name: '법인 기본 서류', count: 12, icon: '🏢', color: C.accent },
    { name: '계약 관련', count: 8, icon: '📝', color: '#7c3aed' },
    { name: '세금 서류', count: 24, icon: '🧾', color: '#059669' },
    { name: '인허가 서류', count: 5, icon: '✅', color: '#D97706' },
  ];

  return (
    <div style={{ display: 'grid', gridTemplateColumns: '1fr 280px', gap: 20 }}>
      {/* Documents */}
      <div style={{ display: 'flex', flexDirection: 'column', gap: 14 }}>
        {/* Classification result */}
        <div style={{ background: C.surface, borderRadius: 16, padding: 20, boxShadow: '0 2px 8px rgba(0,0,0,.08)' }}>
          <div style={{ fontSize: 14, fontWeight: 700, color: C.textP, marginBottom: 4 }}>분류 결과</div>
          <div style={{ fontSize: 12, color: C.textS, marginBottom: 14 }}>레이아웃 패턴 분석 + 텍스트 패턴 매칭으로 자동 분류</div>
          <div style={{ display: 'flex', flexDirection: 'column', gap: 8 }}>
            {docs.map(doc => (
              <div key={doc.id} onClick={() => setSelected(selected===doc.id ? null : doc.id)} style={{
                padding: '14px 16px', borderRadius: 10, border: `1.5px solid ${selected===doc.id ? C.accent : C.border}`,
                background: selected===doc.id ? C.accent + '08' : '#fafafa', cursor: 'pointer', transition: 'all .15s'
              }}>
                <div style={{ display: 'flex', alignItems: 'center', gap: 12 }}>
                  <div style={{ fontSize: 20 }}>📄</div>
                  <div style={{ flex: 1 }}>
                    <div style={{ display: 'flex', alignItems: 'center', gap: 8, marginBottom: 3 }}>
                      <span style={{ fontSize: 13, fontWeight: 600, color: C.textP }}>{doc.name}</span>
                      <span style={{ fontSize: 10, padding: '2px 8px', borderRadius: 10, background: doc.confidence >= 95 ? '#f0fdf4' : '#fffbeb', color: doc.confidence >= 95 ? C.success : C.warning, fontWeight: 600 }}>
                        신뢰도 {doc.confidence}%
                      </span>
                    </div>
                    <div style={{ fontSize: 11, color: C.textS }}>{doc.status} · {doc.size}{doc.expiry !== '없음' && doc.expiry !== '갱신 없음' ? ` · 만료 ${doc.expiry}` : ''}</div>
                  </div>
                  <div style={{ fontSize: 18, color: C.textS }}>{selected===doc.id ? '▲' : '▼'}</div>
                </div>
                {selected === doc.id && (
                  <div style={{ marginTop: 12, paddingTop: 12, borderTop: `1px solid ${C.border}`, animation: 'slideIn .2s ease' }}>
                    <div style={{ fontSize: 12, color: C.textS, marginBottom: 8 }}>태그 추가</div>
                    <div style={{ display: 'flex', gap: 8, flexWrap: 'wrap', marginBottom: 10 }}>
                      {['중요', '검토중', '승인완료', '갱신필요'].map(t => (
                        <button key={t} style={{ padding: '4px 10px', borderRadius: 12, border: `1px solid ${C.border}`, background: 'transparent', color: C.textS, fontSize: 11, cursor: 'pointer', fontFamily: 'inherit' }}>{t}</button>
                      ))}
                    </div>
                    <div style={{ display: 'flex', gap: 8 }}>
                      <button style={{ padding: '7px 14px', background: C.accent, color: '#fff', border: 'none', borderRadius: 8, fontSize: 12, cursor: 'pointer', fontFamily: 'inherit', fontWeight: 600 }}>보관함에 저장</button>
                      <button style={{ padding: '7px 14px', background: 'transparent', color: C.textS, border: `1px solid ${C.border}`, borderRadius: 8, fontSize: 12, cursor: 'pointer', fontFamily: 'inherit' }}>유형 수정</button>
                    </div>
                  </div>
                )}
              </div>
            ))}
          </div>
        </div>
      </div>

      {/* Folders sidebar */}
      <div style={{ display: 'flex', flexDirection: 'column', gap: 14 }}>
        <div style={{ background: C.surface, borderRadius: 14, padding: 18, boxShadow: '0 2px 8px rgba(0,0,0,.08)' }}>
          <div style={{ fontSize: 13, fontWeight: 700, color: C.textP, marginBottom: 12 }}>보관함 폴더</div>
          <div style={{ display: 'flex', flexDirection: 'column', gap: 8 }}>
            {folders.map(f => (
              <div key={f.name} style={{ display: 'flex', alignItems: 'center', gap: 10, padding: '10px 12px', borderRadius: 10, background: '#f8fafc', border: `1px solid ${C.border}`, cursor: 'pointer' }}>
                <div style={{ fontSize: 18 }}>{f.icon}</div>
                <div style={{ flex: 1 }}>
                  <div style={{ fontSize: 12, fontWeight: 600, color: C.textP }}>{f.name}</div>
                  <div style={{ fontSize: 11, color: C.textS }}>{f.count}개 파일</div>
                </div>
              </div>
            ))}
          </div>
        </div>

        {/* Storage info */}
        <div style={{ background: C.surface, borderRadius: 14, padding: 18, boxShadow: '0 2px 8px rgba(0,0,0,.08)' }}>
          <div style={{ fontSize: 13, fontWeight: 700, color: C.textP, marginBottom: 12 }}>S3 저장 구조</div>
          <div style={{ fontFamily: 'monospace', fontSize: 11, color: C.textS, lineHeight: 2, background: '#f8fafc', padding: 12, borderRadius: 8 }}>
            <div style={{ color: C.accent }}>org-001/</div>
            <div style={{ paddingLeft: 12, color: C.textP }}>법인서류/</div>
            <div style={{ paddingLeft: 24, color: C.textS }}>2025-03/</div>
            <div style={{ paddingLeft: 36, color: C.success }}>DOC-001.png</div>
            <div style={{ paddingLeft: 12, color: C.textP }}>계약관련/</div>
            <div style={{ paddingLeft: 24, color: C.textS }}>...Presigned URL</div>
          </div>
        </div>
      </div>
    </div>
  );
}

// ===== SCREEN 4: 서류 대시보드 =====
function DocumentDashboardScreen() {
  const barData = [
    { month: '10월', count: 18 }, { month: '11월', count: 24 }, { month: '12월', count: 31 },
    { month: '1월', count: 22 }, { month: '2월', count: 28 }, { month: '3월', count: 35 },
  ];
  const pieData = [
    { name: '법인서류', value: 35, color: C.accent },
    { name: '계약관련', value: 28, color: '#7c3aed' },
    { name: '세금서류', value: 22, color: C.success },
    { name: '기타', value: 15, color: C.warning },
  ];

  const expiryItems = [
    { name: '법인인감증명서', dDay: 5, status: 'danger' },
    { name: '건강보험료 납부확인서', dDay: 12, status: 'warning' },
    { name: '법인등기부등본', dDay: 22, status: 'warning' },
    { name: '사업자등록증 사본', dDay: 45, status: 'ok' },
  ];

  return (
    <div style={{ display: 'flex', flexDirection: 'column', gap: 20 }}>
      {/* KPI cards */}
      <div style={{ display: 'grid', gridTemplateColumns: 'repeat(4, 1fr)', gap: 14 }}>
        {[
          { label: '전체 서류', value: '127', sub: '건', color: C.primary, bg: '#f8fafc' },
          { label: '만료 임박', value: '8', sub: '30일 이내', color: C.danger, bg: '#fef2f2' },
          { label: '이번 달 스캔', value: '35', sub: '건', color: C.accent, bg: '#ecfeff' },
          { label: '보관 용량', value: '4.2', sub: 'GB', color: '#7c3aed', bg: '#faf5ff' },
        ].map(k => (
          <div key={k.label} style={{ background: k.bg, borderRadius: 14, padding: '16px 18px', border: `1px solid ${k.color}20` }}>
            <div style={{ fontSize: 11, color: C.textS, marginBottom: 6 }}>{k.label}</div>
            <div style={{ display: 'flex', alignItems: 'flex-end', gap: 4 }}>
              <div style={{ fontSize: 28, fontWeight: 700, color: k.color, lineHeight: 1 }}>{k.value}</div>
              <div style={{ fontSize: 12, color: C.textS, marginBottom: 2 }}>{k.sub}</div>
            </div>
          </div>
        ))}
      </div>

      {/* Charts row */}
      <div style={{ display: 'grid', gridTemplateColumns: '1fr 300px', gap: 16 }}>
        <div style={{ background: C.surface, borderRadius: 14, padding: '20px 24px', boxShadow: '0 2px 8px rgba(0,0,0,.08)' }}>
          <div style={{ fontSize: 14, fontWeight: 700, color: C.textP, marginBottom: 16 }}>월별 스캔 건수</div>
          <ResponsiveContainer width="100%" height={160}>
            <BarChart data={barData} margin={{ top: 0, right: 0, left: -20, bottom: 0 }}>
              <CartesianGrid strokeDasharray="3 3" stroke="#f1f5f9" />
              <XAxis dataKey="month" tick={{ fontSize: 11, fill: C.textS }} />
              <YAxis tick={{ fontSize: 11, fill: C.textS }} />
              <Tooltip contentStyle={{ fontSize: 12, borderRadius: 8 }} />
              <Bar dataKey="count" name="스캔 건수" fill={C.accent} radius={[4,4,0,0]} />
            </BarChart>
          </ResponsiveContainer>
        </div>

        <div style={{ background: C.surface, borderRadius: 14, padding: '20px', boxShadow: '0 2px 8px rgba(0,0,0,.08)' }}>
          <div style={{ fontSize: 14, fontWeight: 700, color: C.textP, marginBottom: 8 }}>서류 유형별 비중</div>
          <ResponsiveContainer width="100%" height={130}>
            <PieChart>
              <Pie data={pieData} cx="50%" cy="50%" innerRadius={35} outerRadius={55} paddingAngle={2} dataKey="value">
                {pieData.map((entry, i) => <Cell key={i} fill={entry.color} />)}
              </Pie>
              <Tooltip contentStyle={{ fontSize: 11, borderRadius: 8 }} formatter={(v, n) => [`${v}%`, n]} />
            </PieChart>
          </ResponsiveContainer>
          <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 4 }}>
            {pieData.map(d => (
              <div key={d.name} style={{ display: 'flex', alignItems: 'center', gap: 5, fontSize: 11 }}>
                <div style={{ width: 8, height: 8, borderRadius: '50%', background: d.color, flexShrink: 0 }} />
                <span style={{ color: C.textS }}>{d.name}</span>
              </div>
            ))}
          </div>
        </div>
      </div>

      {/* Expiry alerts */}
      <div style={{ background: C.surface, borderRadius: 14, padding: '18px 24px', boxShadow: '0 2px 8px rgba(0,0,0,.08)' }}>
        <div style={{ fontSize: 14, fontWeight: 700, color: C.textP, marginBottom: 14 }}>만료 임박 알림 <span style={{ fontSize: 12, color: C.danger, fontWeight: 500 }}>(D-30 이내)</span></div>
        <div style={{ display: 'grid', gridTemplateColumns: 'repeat(2, 1fr)', gap: 10 }}>
          {expiryItems.map(e => (
            <div key={e.name} style={{ display: 'flex', alignItems: 'center', gap: 12, padding: '12px 14px', borderRadius: 10, background: e.status==='danger' ? '#fef2f2' : e.status==='warning' ? '#fffbeb' : '#f0fdf4', border: `1px solid ${e.status==='danger' ? '#fecaca' : e.status==='warning' ? '#fde68a' : '#bbf7d0'}` }}>
              <div style={{ fontSize: 20 }}>📄</div>
              <div style={{ flex: 1 }}>
                <div style={{ fontSize: 12, fontWeight: 600, color: C.textP }}>{e.name}</div>
              </div>
              <div style={{ fontSize: 12, fontWeight: 700, color: e.status==='danger' ? C.danger : e.status==='warning' ? C.warning : C.success }}>D-{e.dDay}</div>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

// ===== MAIN APP =====
function App() {
  const [current, setCurrent] = useState('scan-capture');

  const SCREENS = {
    'scan-capture': DocumentScreen => ScanCaptureScreen,
    'image-correction': DocumentScreen => ImageCorrectionScreen,
    'document-classify': DocumentScreen => DocumentClassifyScreen,
    'document-dashboard': DocumentScreen => DocumentDashboardScreen,
  };
  const comps = { 'scan-capture': ScanCaptureScreen, 'image-correction': ImageCorrectionScreen, 'document-classify': DocumentClassifyScreen, 'document-dashboard': DocumentDashboardScreen };
  const Screen = comps[current];
  const hero = HERO_INFO[current];

  return (
    <div style={{ display: 'flex', flexDirection: 'column', height: '100vh', overflow: 'hidden' }}>
      {/* Top navigation */}
      <div style={{ background: C.secondary, flexShrink: 0, zIndex: 10 }}>
        <div style={{ display: 'flex', alignItems: 'center', padding: '0 28px', height: 56, gap: 8 }}>
          {/* Logo */}
          <div style={{ display: 'flex', alignItems: 'center', gap: 8, marginRight: 24, flexShrink: 0 }}>
            <div style={{ width: 30, height: 30, borderRadius: 8, background: C.accent, display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 14 }}>📁</div>
            <span style={{ color: '#fff', fontSize: 13, fontWeight: 700 }}>DocScan Pro</span>
          </div>
          {/* Nav tabs */}
          <div style={{ display: 'flex', gap: 2, flex: 1, overflow: 'auto' }}>
            {NAV_TABS.map(tab => {
              const active = current === tab.id;
              return (
                <button key={tab.id} onClick={() => setCurrent(tab.id)} style={{
                  display: 'flex', alignItems: 'center', gap: 6, padding: '8px 14px',
                  borderRadius: 8, border: 'none', cursor: 'pointer', fontFamily: 'inherit',
                  background: active ? 'rgba(255,255,255,.12)' : 'transparent',
                  color: active ? '#fff' : 'rgba(255,255,255,.6)',
                  fontSize: 12, fontWeight: active ? 600 : 400, whiteSpace: 'nowrap',
                  borderBottom: active ? `2px solid ${C.accent}` : '2px solid transparent',
                }}>
                  <span>{tab.icon}</span>{tab.label}
                </button>
              );
            })}
          </div>
          {/* User */}
          <div style={{ display: 'flex', alignItems: 'center', gap: 8, marginLeft: 16, flexShrink: 0 }}>
            <div style={{ width: 28, height: 28, borderRadius: '50%', background: C.accent, color: C.secondary, display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 12, fontWeight: 700 }}>이</div>
            <span style={{ color: 'rgba(255,255,255,.7)', fontSize: 12 }}>이지영</span>
          </div>
        </div>
      </div>

      {/* Hero banner */}
      <div style={{ background: `linear-gradient(135deg, ${hero.color} 0%, #0c2a40 100%)`, padding: '20px 28px', flexShrink: 0 }}>
        <div style={{ fontSize: 18, fontWeight: 700, color: '#fff', marginBottom: 4 }}>{hero.title}</div>
        <div style={{ fontSize: 12, color: 'rgba(255,255,255,.65)', display: 'flex', gap: 16, flexWrap: 'wrap' }}>
          {hero.sub.split(' · ').map(s => (
            <span key={s} style={{ display: 'flex', alignItems: 'center', gap: 5 }}>
              <span style={{ width: 5, height: 5, borderRadius: '50%', background: C.accent, display: 'inline-block' }} />
              {s}
            </span>
          ))}
        </div>
      </div>

      {/* Content */}
      <div style={{ flex: 1, overflowY: 'auto', padding: '24px 28px' }}>
        <Screen key={current} />
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
