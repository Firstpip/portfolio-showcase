<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>e-KYC 통합 비대면 인증 플랫폼 — 구현 데모</title>
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" rel="stylesheet">
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://unpkg.com/prop-types@15/prop-types.min.js"></script>
<script src="https://unpkg.com/recharts@2.12.2/umd/Recharts.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Pretendard', -apple-system, sans-serif; background: #F0FDF4; color: #064E3B; height: 100vh; overflow: hidden; }
::-webkit-scrollbar { width: 6px; } ::-webkit-scrollbar-track { background: #dcfce7; } ::-webkit-scrollbar-thumb { background: #86efac; border-radius: 3px; }
@keyframes fadeIn { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }
@keyframes faceMatch { 0%,100%{box-shadow:0 0 0 0 rgba(52,211,153,.4)} 50%{box-shadow:0 0 0 12px rgba(52,211,153,0)} }
@keyframes sigPulse { 0%,100%{opacity:1} 50%{opacity:.3} }
@keyframes scanStep { 0%{width:0%} 100%{width:100%} }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef } = React;
const { BarChart, Bar, XAxis, YAxis, CartesianGrid, Tooltip, ResponsiveContainer, RadialBarChart, RadialBar, Legend } = Recharts;

const C = {
  primary: '#059669', secondary: '#064E3B', accent: '#34D399',
  bg: '#F0FDF4', surface: '#FFFFFF', textP: '#064E3B', textS: '#6B7280',
  success: '#059669', warning: '#D97706', danger: '#DC2626',
  border: '#D1FAE5', sidebarBg: '#ECFDF5',
};

const NAV_ITEMS = [
  { id: 'id-capture', label: '신분증 촬영 및 보정', icon: '🪪', step: 1 },
  { id: 'face-verification', label: '얼굴 대조 검증', icon: '👤', step: 2 },
  { id: 'signature-capture', label: '서명 캡처 및 검증', icon: '✍️', step: 3 },
  { id: 'audit-dashboard', label: '인증 이력 및 컴플라이언스', icon: '📋', step: null },
];

// Progress wizard component
const WizardProgress = ({ current }) => {
  const steps = ['신분증 촬영', '얼굴 대조', '서명 검증', '인증 완료'];
  const stepMap = { 'id-capture': 0, 'face-verification': 1, 'signature-capture': 2 };
  const activeIdx = stepMap[current] ?? -1;
  return (
    <div style={{ display: 'flex', alignItems: 'center', gap: 0, marginBottom: 24 }}>
      {steps.map((s, i) => (
        <React.Fragment key={s}>
          <div style={{ display: 'flex', flex: i < steps.length-1 ? 1 : 0, alignItems: 'center', gap: 0 }}>
            <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 5, flexShrink: 0 }}>
              <div style={{ width: 32, height: 32, borderRadius: '50%', display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 13, fontWeight: 700, background: i <= activeIdx ? C.primary : '#d1fae5', color: i <= activeIdx ? '#fff' : '#6b7280', border: i === activeIdx ? `3px solid ${C.accent}` : 'none', boxShadow: i === activeIdx ? `0 0 0 3px ${C.accent}40` : 'none' }}>
                {i < activeIdx ? '✓' : i+1}
              </div>
              <div style={{ fontSize: 10, color: i <= activeIdx ? C.primary : C.textS, fontWeight: i === activeIdx ? 600 : 400, textAlign: 'center', whiteSpace: 'nowrap' }}>{s}</div>
            </div>
            {i < steps.length-1 && <div style={{ flex: 1, height: 2, background: i < activeIdx ? C.primary : '#d1fae5', margin: '0 4px', marginTop: -14 }} />}
          </div>
        </React.Fragment>
      ))}
    </div>
  );
};

// ===== SCREEN 1: 신분증 촬영 및 보정 =====
function IDCaptureScreen() {
  const [phase, setPhase] = useState('capture'); // capture | processing | done
  const [progress, setProgress] = useState(0);

  const handleCapture = () => {
    setPhase('processing');
    let p = 0;
    const iv = setInterval(() => {
      p += 3;
      setProgress(p);
      if (p >= 100) { clearInterval(iv); setPhase('done'); }
    }, 80);
  };

  const pipelineSteps = [
    { label: '빛반사 감지 및 인페인팅', done: progress >= 25 },
    { label: '신분증 윤곽 추출 (Canny+Hough)', done: progress >= 50 },
    { label: '투시 변환 (warpPerspective)', done: progress >= 75 },
    { label: 'CLAHE 대비 향상', done: progress >= 100 },
  ];

  return (
    <div style={{ animation: 'fadeIn .3s ease' }}>
      <WizardProgress current="id-capture" />
      <div style={{ display: 'grid', gridTemplateColumns: '1fr 320px', gap: 20 }}>
        {/* Camera / Processing / Done */}
        <div style={{ background: C.surface, borderRadius: 16, overflow: 'hidden', boxShadow: '0 2px 12px rgba(5,150,105,.1)', border: `1px solid ${C.border}` }}>
          {phase === 'capture' && (
            <div>
              <div style={{ background: '#111827', padding: 14, display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
                <span style={{ color: '#e2e8f0', fontSize: 12 }}>📷 카메라 가이드 활성화</span>
                <span style={{ color: C.accent, fontSize: 11 }}>Canvas API · WebRTC</span>
              </div>
              <div style={{ position: 'relative', height: 280, background: '#0d1a2e', display: 'flex', alignItems: 'center', justifyContent: 'center', overflow: 'hidden' }}>
                <div style={{ backgroundImage: 'linear-gradient(rgba(52,211,153,.04) 1px, transparent 1px), linear-gradient(90deg, rgba(52,211,153,.04) 1px, transparent 1px)', backgroundSize: '36px 36px', position: 'absolute', inset: 0 }} />
                <div style={{ width: 280, height: 176, border: `2px solid ${C.accent}`, borderRadius: 8, position: 'relative', boxShadow: `0 0 0 1px ${C.accent}30, 0 0 24px ${C.accent}20` }}>
                  {[[0,0,'top','left'],[0,'auto','top','right'],['auto',0,'bottom','left'],['auto','auto','bottom','right']].map(([t,r,v,h],i) => (
                    <div key={i} style={{ position: 'absolute', [v]: -2, [h]: -2, width: 18, height: 18, borderColor: C.accent, borderStyle: 'solid', borderTopWidth: v==='top'?3:0, borderBottomWidth: v==='bottom'?3:0, borderLeftWidth: h==='left'?3:0, borderRightWidth: h==='right'?3:0 }} />
                  ))}
                  <div style={{ position: 'absolute', inset: 8, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
                    <div style={{ textAlign: 'center', color: `rgba(52,211,153,.5)`, fontSize: 12, lineHeight: 1.7 }}>
                      신분증을 프레임 내에<br/>위치시키세요<br/><span style={{ fontSize: 10, opacity: .7 }}>주민등록증 · 여권 지원</span>
                    </div>
                  </div>
                </div>
                {/* Status indicators */}
                <div style={{ position: 'absolute', bottom: 12, left: 0, right: 0, display: 'flex', justifyContent: 'center', gap: 20 }}>
                  {[['조도','최적','#22c55e'],['각도','좋음','#22c55e'],['초점','최적','#22c55e'],['반사','감지중','#fbbf24']].map(([l,v,c]) => (
                    <div key={l} style={{ textAlign: 'center' }}>
                      <div style={{ fontSize: 11, color: c, fontWeight: 600 }}>{v}</div>
                      <div style={{ fontSize: 10, color: 'rgba(255,255,255,.5)' }}>{l}</div>
                    </div>
                  ))}
                </div>
              </div>
              <div style={{ padding: '14px 20px', display: 'flex', gap: 10 }}>
                <button onClick={handleCapture} style={{ flex: 1, padding: '11px', background: C.primary, color: '#fff', border: 'none', borderRadius: 10, fontSize: 13, fontWeight: 600, cursor: 'pointer', fontFamily: 'inherit' }}>촬영 및 자동 보정 시작</button>
              </div>
            </div>
          )}

          {phase === 'processing' && (
            <div style={{ padding: 24 }}>
              <div style={{ fontSize: 14, fontWeight: 700, color: C.textP, marginBottom: 16 }}>OpenCV 보정 파이프라인 처리 중...</div>
              <div style={{ marginBottom: 16 }}>
                <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: 6, fontSize: 12, color: C.textS }}>
                  <span>전체 진행</span><span>{progress}%</span>
                </div>
                <div style={{ height: 8, background: '#d1fae5', borderRadius: 4 }}>
                  <div style={{ height: '100%', width: `${progress}%`, background: `linear-gradient(90deg, ${C.primary}, ${C.accent})`, borderRadius: 4, transition: 'width .1s' }} />
                </div>
              </div>
              {pipelineSteps.map((s, i) => (
                <div key={i} style={{ display: 'flex', gap: 10, alignItems: 'center', padding: '10px 0', borderBottom: i<3 ? `1px solid ${C.border}` : 'none' }}>
                  <div style={{ width: 22, height: 22, borderRadius: '50%', background: s.done ? C.primary : '#d1fae5', color: s.done ? '#fff' : C.textS, display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 11, flexShrink: 0, fontWeight: 700 }}>{s.done ? '✓' : i+1}</div>
                  <div style={{ fontSize: 13, color: s.done ? C.textP : C.textS, fontWeight: s.done ? 500 : 400 }}>{s.label}</div>
                  {s.done && <div style={{ marginLeft: 'auto', fontSize: 11, color: C.success }}>완료</div>}
                </div>
              ))}
            </div>
          )}

          {phase === 'done' && (
            <div style={{ padding: 24 }}>
              <div style={{ textAlign: 'center', padding: '16px 0' }}>
                <div style={{ fontSize: 40, marginBottom: 10 }}>✅</div>
                <div style={{ fontSize: 15, fontWeight: 700, color: C.success, marginBottom: 4 }}>신분증 보정 완료</div>
                <div style={{ fontSize: 12, color: C.textS, marginBottom: 20 }}>4단계 OpenCV 파이프라인 처리 완료 · AES-256-GCM 암호화 전송</div>
              </div>
              <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 10, marginBottom: 16 }}>
                {[['처리 결과','우수'],['반사 제거','완료'],['윤곽 감지','성공'],['암호화','AES-256']].map(([k,v]) => (
                  <div key={k} style={{ padding: '10px 12px', background: '#f0fdf4', borderRadius: 8, border: `1px solid ${C.border}` }}>
                    <div style={{ fontSize: 10, color: C.textS }}>{k}</div>
                    <div style={{ fontSize: 13, fontWeight: 700, color: C.primary }}>{v}</div>
                  </div>
                ))}
              </div>
              <button style={{ width: '100%', padding: '11px', background: C.primary, color: '#fff', border: 'none', borderRadius: 10, fontSize: 13, fontWeight: 600, cursor: 'pointer', fontFamily: 'inherit' }}>다음 단계: 얼굴 대조 검증 →</button>
            </div>
          )}
        </div>

        {/* Info panel */}
        <div style={{ display: 'flex', flexDirection: 'column', gap: 12 }}>
          <div style={{ background: C.surface, borderRadius: 14, padding: 18, border: `1px solid ${C.border}`, boxShadow: '0 1px 6px rgba(5,150,105,.08)' }}>
            <div style={{ fontSize: 13, fontWeight: 700, color: C.textP, marginBottom: 10 }}>e-KYC 파이프라인</div>
            {NAV_ITEMS.filter(n => n.step).map(n => (
              <div key={n.id} style={{ display: 'flex', gap: 8, alignItems: 'center', padding: '8px 0', borderBottom: `1px solid ${C.border}` }}>
                <div style={{ width: 22, height: 22, borderRadius: '50%', background: n.id === 'id-capture' ? C.primary : '#d1fae5', color: n.id === 'id-capture' ? '#fff' : C.textS, display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 11, fontWeight: 700, flexShrink: 0 }}>{n.step}</div>
                <span style={{ fontSize: 12, color: n.id === 'id-capture' ? C.primary : C.textS, fontWeight: n.id === 'id-capture' ? 600 : 400 }}>{n.label}</span>
              </div>
            ))}
          </div>
          <div style={{ background: C.surface, borderRadius: 14, padding: 18, border: `1px solid ${C.border}`, boxShadow: '0 1px 6px rgba(5,150,105,.08)' }}>
            <div style={{ fontSize: 13, fontWeight: 700, color: C.textP, marginBottom: 10 }}>보안 처리 방식</div>
            {['Canvas API 기반 실시간 가이드 프레임','FastAPI + OpenCV 4단계 파이프라인','Web Crypto API AES-256-GCM 암호화','전송 후 클라이언트 메모리 즉시 정리'].map((t,i) => (
              <div key={i} style={{ display: 'flex', gap: 8, padding: '6px 0', fontSize: 12, color: C.textS, borderBottom: i<3 ? `1px solid ${C.border}` : 'none' }}>
                <span style={{ color: C.primary, flexShrink: 0 }}>✓</span>{t}
              </div>
            ))}
          </div>
        </div>
      </div>
    </div>
  );
}

// ===== SCREEN 2: 얼굴 대조 검증 =====
function FaceVerificationScreen() {
  const [selfiePhase, setSelfiePhase] = useState('ready'); // ready | liveness | comparing | result
  const [similarity, setSimilarity] = useState(0);

  const handleVerify = () => {
    setSelfiePhase('liveness');
    setTimeout(() => setSelfiePhase('comparing'), 1500);
    setTimeout(() => {
      let s = 0;
      const iv = setInterval(() => {
        s += 2;
        setSimilarity(s);
        if (s >= 94) { clearInterval(iv); setSelfiePhase('result'); }
      }, 40);
    }, 2500);
  };

  const FaceSimulation = ({ isId, label }) => (
    <div style={{ flex: 1, background: isId ? '#f8f5f0' : '#1a2332', borderRadius: 12, overflow: 'hidden', position: 'relative', height: 200 }}>
      <div style={{ position: 'absolute', inset: 0, display: 'flex', alignItems: 'center', justifyContent: 'center', flexDirection: 'column' }}>
        {isId ? (
          <div style={{ textAlign: 'center' }}>
            <div style={{ width: 60, height: 72, borderRadius: '50% 50% 40% 40%', background: 'linear-gradient(180deg, #c5a882 0%, #a88060 100%)', margin: '0 auto 8px' }} />
            <div style={{ fontSize: 10, color: '#888' }}>신분증 사진</div>
          </div>
        ) : (
          <div style={{ textAlign: 'center' }}>
            <div style={{ width: 64, height: 76, borderRadius: '50% 50% 40% 40%', background: 'linear-gradient(180deg, #c5a882 0%, #a88060 100%)', margin: '0 auto 8px', boxShadow: selfiePhase === 'result' ? `0 0 0 4px ${C.accent}` : 'none', animation: selfiePhase === 'result' ? 'faceMatch 1.5s ease infinite' : 'none' }} />
            <div style={{ fontSize: 10, color: 'rgba(255,255,255,.6)' }}>실시간 셀피</div>
          </div>
        )}
      </div>
      <div style={{ position: 'absolute', bottom: 8, left: 8, right: 8, fontSize: 11, fontWeight: 600, color: isId ? '#666' : '#e2e8f0', textAlign: 'center' }}>{label}</div>
      {!isId && selfiePhase === 'liveness' && (
        <div style={{ position: 'absolute', inset: 0, display: 'flex', alignItems: 'center', justifyContent: 'center', background: 'rgba(0,0,0,.6)' }}>
          <div style={{ color: '#fff', textAlign: 'center' }}>
            <div style={{ fontSize: 20, animation: 'sigPulse 1s infinite' }}>👁️</div>
            <div style={{ fontSize: 12, marginTop: 6 }}>눈 깜빡임 감지 중...</div>
          </div>
        </div>
      )}
    </div>
  );

  return (
    <div style={{ animation: 'fadeIn .3s ease' }}>
      <WizardProgress current="face-verification" />
      <div style={{ display: 'grid', gridTemplateColumns: '1fr 300px', gap: 20 }}>
        <div style={{ background: C.surface, borderRadius: 16, padding: 24, boxShadow: '0 2px 12px rgba(5,150,105,.1)', border: `1px solid ${C.border}` }}>
          <div style={{ fontSize: 15, fontWeight: 700, color: C.textP, marginBottom: 4 }}>신분증 사진 ↔ 셀피 대조</div>
          <div style={{ fontSize: 12, color: C.textS, marginBottom: 18 }}>Azure Face API FaceDetect + FaceVerify · Canvas 기반 라이브니스 감지</div>

          <div style={{ display: 'flex', gap: 12, marginBottom: 16 }}>
            <FaceSimulation isId={true} label="신분증 사진 (보정됨)" />
            <div style={{ display: 'flex', alignItems: 'center', flexDirection: 'column', justifyContent: 'center', gap: 6 }}>
              {selfiePhase === 'result' ? (
                <div style={{ fontSize: 22, color: C.success }}>✓</div>
              ) : (
                <div style={{ fontSize: 22, color: C.textS }}>↔</div>
              )}
              {selfiePhase === 'result' && (
                <div style={{ padding: '4px 10px', background: '#f0fdf4', border: `1px solid ${C.border}`, borderRadius: 20, fontSize: 11, color: C.success, fontWeight: 700 }}>{similarity}%</div>
              )}
            </div>
            <FaceSimulation isId={false} label="라이브 셀피" />
          </div>

          {selfiePhase === 'result' && (
            <div style={{ padding: 16, background: '#f0fdf4', borderRadius: 12, border: `1px solid ${C.border}`, marginBottom: 16, animation: 'fadeIn .3s ease' }}>
              <div style={{ display: 'flex', justify: 'space-between', alignItems: 'center', gap: 16 }}>
                <div>
                  <div style={{ fontSize: 14, fontWeight: 700, color: C.success }}>✅ 동일인 인증 완료</div>
                  <div style={{ fontSize: 12, color: C.textS, marginTop: 2 }}>유사도 점수: {similarity}% · 라이브니스: 통과</div>
                </div>
                <div style={{ textAlign: 'center' }}>
                  <div style={{ fontSize: 28, fontWeight: 700, color: C.primary, lineHeight: 1 }}>{similarity}%</div>
                  <div style={{ fontSize: 10, color: C.textS }}>Face API 유사도</div>
                </div>
              </div>
            </div>
          )}

          {selfiePhase !== 'result' && (
            <button onClick={handleVerify} disabled={selfiePhase !== 'ready'} style={{ width: '100%', padding: '12px', background: selfiePhase === 'ready' ? C.primary : '#d1fae5', color: selfiePhase === 'ready' ? '#fff' : C.textS, border: 'none', borderRadius: 10, fontSize: 13, fontWeight: 600, cursor: selfiePhase === 'ready' ? 'pointer' : 'default', fontFamily: 'inherit' }}>
              {selfiePhase === 'ready' ? '얼굴 대조 검증 시작' : selfiePhase === 'liveness' ? '라이브니스 감지 중... 👁️' : '얼굴 비교 분석 중... 🔍'}
            </button>
          )}
          {selfiePhase === 'result' && (
            <button style={{ width: '100%', padding: '12px', background: C.primary, color: '#fff', border: 'none', borderRadius: 10, fontSize: 13, fontWeight: 600, cursor: 'pointer', fontFamily: 'inherit' }}>다음 단계: 서명 검증 →</button>
          )}
        </div>

        {/* Info */}
        <div style={{ display: 'flex', flexDirection: 'column', gap: 12 }}>
          <div style={{ background: C.surface, borderRadius: 14, padding: 18, border: `1px solid ${C.border}` }}>
            <div style={{ fontSize: 13, fontWeight: 700, color: C.textP, marginBottom: 10 }}>검증 방식</div>
            {[
              { icon: '☁️', label: 'Azure Face API', desc: 'FaceDetect + FaceVerify 호출' },
              { icon: '👁️', label: '라이브니스 감지', desc: 'Canvas 픽셀 변화 기반 눈 깜빡임' },
              { icon: '🔒', label: '배경 블러', desc: '셀피 전송 전 배경 처리' },
              { icon: '📝', label: '이력 저장', desc: '결과+타임스탬프 DB 기록' },
            ].map(item => (
              <div key={item.label} style={{ display: 'flex', gap: 10, padding: '8px 0', borderBottom: `1px solid ${C.border}`, alignItems: 'flex-start' }}>
                <span style={{ fontSize: 16, flexShrink: 0 }}>{item.icon}</span>
                <div>
                  <div style={{ fontSize: 12, fontWeight: 600, color: C.textP }}>{item.label}</div>
                  <div style={{ fontSize: 11, color: C.textS }}>{item.desc}</div>
                </div>
              </div>
            ))}
          </div>
          <div style={{ background: '#fffbeb', borderRadius: 14, padding: 14, border: '1px solid #fde68a' }}>
            <div style={{ fontSize: 12, fontWeight: 600, color: C.warning, marginBottom: 6 }}>⚠️ 데이터 처리 방침</div>
            <div style={{ fontSize: 11, color: '#92400e', lineHeight: 1.6 }}>셀피 이미지는 대조 완료 즉시 서버에서 삭제되며, 유사도 점수와 판정 결과만 보관됩니다.</div>
          </div>
        </div>
      </div>
    </div>
  );
}

// ===== SCREEN 3: 서명 캡처 및 검증 =====
function SignatureCaptureScreen() {
  const canvasRef = useRef(null);
  const [drawing, setDrawing] = useState(false);
  const [hasSignature, setHasSignature] = useState(false);
  const [verified, setVerified] = useState(false);
  const [hash, setHash] = useState('');
  const lastPos = useRef(null);

  const getPos = (e, canvas) => {
    const rect = canvas.getBoundingClientRect();
    const src = e.touches ? e.touches[0] : e;
    return { x: src.clientX - rect.left, y: src.clientY - rect.top };
  };

  const startDraw = (e) => {
    setDrawing(true);
    const canvas = canvasRef.current;
    const pos = getPos(e, canvas);
    lastPos.current = pos;
    const ctx = canvas.getContext('2d');
    ctx.beginPath();
    ctx.moveTo(pos.x, pos.y);
  };

  const draw = (e) => {
    if (!drawing) return;
    e.preventDefault();
    const canvas = canvasRef.current;
    const ctx = canvas.getContext('2d');
    const pos = getPos(e, canvas);
    ctx.strokeStyle = '#059669';
    ctx.lineWidth = 2.5;
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';
    ctx.lineTo(pos.x, pos.y);
    ctx.stroke();
    lastPos.current = pos;
    setHasSignature(true);
  };

  const stopDraw = () => setDrawing(false);

  const clearSig = () => {
    const canvas = canvasRef.current;
    const ctx = canvas.getContext('2d');
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    setHasSignature(false);
    setVerified(false);
    setHash('');
  };

  const verify = () => {
    const mockHash = 'sha256:' + Array.from({length:32}, () => Math.floor(Math.random()*16).toString(16)).join('').match(/.{4}/g).join('');
    setHash(mockHash);
    setVerified(true);
  };

  return (
    <div style={{ animation: 'fadeIn .3s ease' }}>
      <WizardProgress current="signature-capture" />
      <div style={{ display: 'grid', gridTemplateColumns: '1fr 300px', gap: 20 }}>
        <div style={{ background: C.surface, borderRadius: 16, padding: 24, boxShadow: '0 2px 12px rgba(5,150,105,.1)', border: `1px solid ${C.border}` }}>
          <div style={{ fontSize: 15, fontWeight: 700, color: C.textP, marginBottom: 4 }}>서명 입력</div>
          <div style={{ fontSize: 12, color: C.textS, marginBottom: 16 }}>Canvas Bézier Interpolation · SHA-256 무결성 해시</div>

          {/* Signature pad */}
          <div style={{ border: `1.5px solid ${verified ? C.primary : C.border}`, borderRadius: 12, overflow: 'hidden', marginBottom: 14, position: 'relative', background: '#fafff9' }}>
            {!hasSignature && (
              <div style={{ position: 'absolute', inset: 0, display: 'flex', alignItems: 'center', justifyContent: 'center', pointerEvents: 'none' }}>
                <div style={{ fontSize: 13, color: '#9ca3af', textAlign: 'center' }}>
                  <div style={{ fontSize: 24, marginBottom: 6, animation: 'sigPulse 2s infinite' }}>✍️</div>
                  <div>이 영역에 서명하세요</div>
                  <div style={{ fontSize: 11, marginTop: 3 }}>마우스 드래그 또는 터치</div>
                </div>
              </div>
            )}
            <canvas
              ref={canvasRef}
              width={500}
              height={180}
              style={{ display: 'block', width: '100%', height: 180, cursor: 'crosshair', touchAction: 'none' }}
              onMouseDown={startDraw}
              onMouseMove={draw}
              onMouseUp={stopDraw}
              onMouseLeave={stopDraw}
              onTouchStart={startDraw}
              onTouchMove={draw}
              onTouchEnd={stopDraw}
            />
            {verified && (
              <div style={{ position: 'absolute', bottom: 6, right: 8, fontSize: 11, color: C.success, fontWeight: 600 }}>✓ SHA-256 해시 생성됨</div>
            )}
          </div>

          {/* Controls */}
          <div style={{ display: 'flex', gap: 10, marginBottom: 16 }}>
            <button onClick={clearSig} style={{ padding: '9px 16px', background: 'transparent', color: C.textS, border: `1.5px solid ${C.border}`, borderRadius: 8, fontSize: 13, cursor: 'pointer', fontFamily: 'inherit' }}>지우기</button>
            <button onClick={verify} disabled={!hasSignature || verified} style={{ flex: 1, padding: '9px', background: hasSignature && !verified ? C.primary : '#d1fae5', color: hasSignature && !verified ? '#fff' : C.textS, border: 'none', borderRadius: 8, fontSize: 13, fontWeight: 600, cursor: hasSignature && !verified ? 'pointer' : 'default', fontFamily: 'inherit' }}>
              {verified ? '✓ 서명 검증 완료' : '서명 완료 및 해시 생성'}
            </button>
          </div>

          {/* Hash display */}
          {verified && hash && (
            <div style={{ background: '#f0fdf4', borderRadius: 10, padding: 14, border: `1px solid ${C.border}`, animation: 'fadeIn .3s ease', marginBottom: 16 }}>
              <div style={{ fontSize: 11, color: C.textS, marginBottom: 6, fontWeight: 600 }}>SHA-256 무결성 해시</div>
              <div style={{ fontFamily: 'monospace', fontSize: 10, color: C.secondary, wordBreak: 'break-all', lineHeight: 1.6 }}>{hash}</div>
              <div style={{ fontSize: 11, color: C.textS, marginTop: 8 }}>서명 이미지와 해시를 함께 저장하여 위변조 검증에 활용합니다</div>
            </div>
          )}

          {verified && (
            <button style={{ width: '100%', padding: '12px', background: C.primary, color: '#fff', border: 'none', borderRadius: 10, fontSize: 13, fontWeight: 600, cursor: 'pointer', fontFamily: 'inherit' }}>e-KYC 파이프라인 완료 — 관리자 확인 대기</button>
          )}
        </div>

        {/* Info */}
        <div style={{ display: 'flex', flexDirection: 'column', gap: 12 }}>
          <div style={{ background: C.surface, borderRadius: 14, padding: 18, border: `1px solid ${C.border}` }}>
            <div style={{ fontSize: 13, fontWeight: 700, color: C.textP, marginBottom: 10 }}>구현 방식</div>
            {[
              { label: '입력 방식', value: 'Canvas + Bézier 보간' },
              { label: '해시 알고리즘', value: 'Web Crypto API SHA-256' },
              { label: '저장 형식', value: 'PNG + 해시 페어' },
              { label: '위변조 검증', value: '재계산 해시 비교' },
              { label: '컴포넌트', value: 'React 재사용 컴포넌트' },
            ].map(({ label, value }) => (
              <div key={label} style={{ display: 'flex', justifyContent: 'space-between', padding: '7px 0', borderBottom: `1px solid ${C.border}`, fontSize: 12 }}>
                <span style={{ color: C.textS }}>{label}</span>
                <span style={{ color: C.textP, fontWeight: 500 }}>{value}</span>
              </div>
            ))}
          </div>
          <div style={{ background: C.surface, borderRadius: 14, padding: 18, border: `1px solid ${C.border}` }}>
            <div style={{ fontSize: 13, fontWeight: 700, color: C.textP, marginBottom: 8 }}>서명 검증 프로세스</div>
            {['1. Canvas에서 서명 입력 (Bézier 보간)','2. toBlob()으로 PNG 추출','3. SHA-256 해시 생성','4. 서명 이미지 + 해시 함께 저장','5. 위변조 시: 재계산 해시 불일치 감지'].map((t,i) => (
              <div key={i} style={{ fontSize: 11, color: C.textS, padding: '4px 0', borderBottom: i<4 ? `1px solid ${C.border}` : 'none' }}>{t}</div>

      </div>
    </div>
  );
}
