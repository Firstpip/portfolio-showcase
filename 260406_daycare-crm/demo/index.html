<!DOCTYPE html>
<html lang="ko">
<head>

<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>

<style>

<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useRef,useMemo,useCallback}=React;
const {LineChart,Line,BarChart,Bar,XAxis,YAxis,CartesianGrid,Tooltip,Legend,ResponsiveContainer}=Recharts;

/* ═══════════════════════════════════════════════════════════════════
   DESIGN TOKENS
   ════════════════════════��══════════════════════════════════════════ */
const C={primary:'#2563EB',primaryDark:'#1D4ED8',primaryLight:'#EFF6FF',accent:'#3B82F6',bg:'#F1F5F9',surface:'#FFFFFF',sidebar:'#0F172A',sidebarHover:'#1E293B',sidebarActive:'#2563EB',border:'#E2E8F0',text:'#1E293B',textLight:'#64748B',success:'#10B981',warning:'#F59E0B',danger:'#EF4444',dangerLight:'#FEF2F2',successLight:'#ECFDF5',warningLight:'#FFFBEB'};

/* ════════════��══════════════════════════════════════════════════════
   INITIAL DATA
   ════════════════════════════════════════════════════════���══════════ */
const INIT_CENTERS=[
  {id:'C001',name:'햇살 어린이집',address:'서울 강남구 논현동 312-5',manager:'박원장',phone:'02-1234-5678',rooms:[{id:'R001',name:'오리반',age:'만 3세',capacity:25,count:22},{id:'R002',name:'코끼리반',age:'만 4세',capacity:25,count:24},{id:'R003',name:'기린반',age:'만 5세',capacity:20,count:18}]},
  {id:'C002',name:'꿈나무 어린이집',address:'서울 서초구 반포동 108-3',manager:'이원장',phone:'02-2345-6789',rooms:[{id:'R004',name:'토끼반',age:'만 2세',capacity:15,count:14},{id:'R005',name:'곰반',age:'만 3세',capacity:25,count:23},{id:'R006',name:'나비반',age:'만 4세',capacity:25,count:21}]},
  {id:'C003',name:'별빛 어린이집',address:'서울 송파구 잠실동 45-2',manager:'김원장',phone:'02-3456-7890',rooms:[{id:'R007',name:'사자반',age:'만 3세',capacity:25,count:20},{id:'R008',name:'펭귄반',age:'만 4세',capacity:25,count:19}]},
  {id:'C004',name:'푸르미 어린이집',address:'경기 성남시 분당구 야탑동 223',manager:'정원장',phone:'031-4567-8901',rooms:[{id:'R009',name:'해달반',age:'만 2세',capacity:15,count:13},{id:'R010',name:'돌고래반',age:'만 3세',capacity:25,count:22},{id:'R011',name:'수달반',age:'만 5세',capacity:20,count:17}]},
];
const SN=['김','이','박','최','정','강','조','윤','장','임','한','백','서','권','황','안','송','류','전','홍'];
const NF=['영희','지영','수연','미래','혜진','소희','채원','지수','하늘','은정','다연','서현','보라','주희','나영'];
const NC=['민준','서연','도현','유나','하준','지호','서아','우진','나은','시온','예린','이준','건우','하은','준서'];
const pick=a=>a[Math.floor(Math.random()*a.length)];
const FAIL_REASONS=['잔액 부족','계좌 오류','동의 만료'];

function seedMembers(centers){
  const ms=[];let idx=1;
  centers.forEach(c=>c.rooms.forEach(r=>{
    for(let i=0;i<r.count;i++){
      const sn=pick(SN),fn=pick(NF),cn=sn+pick(NC);
      const roll=Math.random();
      const st=roll<0.08?'미납':roll<0.14?'계좌미등록':'정상';
      const acct=st==='계좌미등록'?'미등록':'등록완료';
      const mm=String(Math.floor(Math.random()*4)+6).padStart(2,'0');
      const dd=String(Math.floor(Math.random()*28)+1).padStart(2,'0');
      ms.push({id:'M'+String(idx).padStart(4,'0'),name:sn+fn,phone:`010-${String(Math.floor(Math.random()*9000)+1000)}-${String(Math.floor(Math.random()*9000)+1000)}`,childName:cn,center:c.name,centerId:c.id,room:r.name,roomId:r.id,accountStatus:acct,joinDate:`2025-${mm}-${dd}`,status:st,amount:35000,bankAccount:acct==='등록완료'?`***-****-${String(Math.floor(Math.random()*9000)+1000)}`:'',cmsConsent:acct==='등록완료'});
      idx++;
    }
  }));
  return ms;
}

const CHART_DATA=[{month:'9월',완료:142,미납:12,취소:3},{month:'10월',완료:156,미납:9,취소:2},{month:'11월',완료:163,미납:15,취소:4},{month:'12월',완료:158,미납:18,취소:5},{month:'1월',완료:171,미납:11,취소:2},{month:'2월',완료:168,미납:8,취소:1},{month:'3월',완료:179,미납:14,취소:3}];

/* ═══════════════════════════════════════════════════════════════════
   SHARED UI COMPONENTS
   ═══════════════��═══════════════════════════════════════════════════ */
function Badge({label,color,bg}){return <span style={{display:'inline-flex',alignItems:'center',padding:'3px 10px',borderRadius:20,fontSize:12,fontWeight:600,color:color||C.text,background:bg||C.bg}}>{label}</span>;}
function StatusBadge({status}){
  const m={'정상':{c:'#065F46',b:'#D1FAE5'},'미납':{c:'#991B1B',b:'#FEE2E2'},'계좌미등록':{c:'#92400E',b:'#FEF3C7'},'성공':{c:'#065F46',b:'#D1FAE5'},'잔액 부족':{c:'#991B1B',b:'#FEE2E2'},'계좌 오류':{c:'#991B1B',b:'#FEE2E2'},'동의 만료':{c:'#92400E',b:'#FEF3C7'},'등록완료':{c:'#065F46',b:'#D1FAE5'},'미등록':{c:'#92400E',b:'#FEF3C7'},'대기':{c:'#1E40AF',b:'#DBEAFE'},'ARS 발신 중':{c:'#7C3AED',b:'#EDE9FE'},'동의 완료':{c:'#065F46',b:'#D1FAE5'}};
  const s=m[status]||{c:C.textLight,b:C.bg};
  return <Badge label={status} color={s.c} bg={s.b}/>;
}
function KpiCard({label,value,sub,icon,color}){
  return <div style={{background:C.surface,borderRadius:12,padding:20,boxShadow:'0 1px 4px rgba(0,0,0,0.06)',display:'flex',gap:16,alignItems:'flex-start'}}>
    <div style={{width:44,height:44,borderRadius:10,background:color+'18',display:'flex',alignItems:'center',justifyContent:'center',fontSize:20,flexShrink:0}}>{icon}</div>
    <div><div style={{fontSize:12,color:C.textLight,fontWeight:500}}>{label}</div><div style={{fontSize:24,fontWeight:700,lineHeight:1.2,marginTop:2}}>{value}</div>{sub&&<div style={{fontSize:12,color:C.textLight,marginTop:2}}>{sub}</div>}</div>
  </div>;
}
function Modal({title,onClose,children,width=560}){
  return <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.45)',zIndex:400,display:'flex',alignItems:'center',justifyContent:'center'}} onClick={e=>{if(e.target===e.currentTarget)onClose();}}>
    <div className="fade-in" style={{background:C.surface,borderRadius:16,width,maxWidth:'90vw',maxHeight:'85vh',overflowY:'auto',padding:28,boxShadow:'0 20px 60px rgba(0,0,0,0.2)'}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:20}}><h3 style={{fontSize:18,fontWeight:700}}>{title}</h3><button onClick={onClose} style={{border:'none',background:'none',fontSize:20,cursor:'pointer',color:C.textLight,padding:'4px 8px'}}>✕</button></div>
      {children}
    </div>
  </div>;
}
function FormRow({label,children}){return <div style={{marginBottom:14}}><label style={{display:'block',fontSize:13,fontWeight:600,marginBottom:6}}>{label}</label>{children}</div>;}
const inputSt={width:'100%',padding:'10px 12px',border:`1.5px solid ${C.border}`,borderRadius:8,fontSize:14,fontFamily:'inherit',outline:'none'};
const selectSt={...inputSt,background:'white'};
function KInput({id,defaultValue,placeholder,type='text',style:sx}){
  return <input id={id} type={type} defaultValue={defaultValue||''} placeholder={placeholder} style={{...inputSt,...sx}}/>;
}
function readInput(id){const el=document.getElementById(id);return el?el.value:'';}
function clearInput(id){const el=document.getElementById(id);if(el)el.value='';}
function Btn({label,onClick,small,primary,danger,disabled,full}){
  const bg=disabled?'#94A3B8':danger?C.danger:primary?C.primary:'transparent';
  const clr=primary||danger?'#fff':C.text;
  const brd=primary||danger?'none':`1.5px solid ${C.border}`;
  return <button onClick={disabled?null:onClick} style={{background:bg,color:clr,border:brd,borderRadius:8,padding:small?'7px 14px':'10px 20px',fontSize:small?13:14,fontWeight:600,cursor:disabled?'default':'pointer',fontFamily:'inherit',opacity:disabled?.6:1,width:full?'100%':'auto'}}>{label}</button>;
}
function Toast({msg,onClose}){useEffect(()=>{const t=setTimeout(onClose,2800);return()=>clearTimeout(t);},[]);return <div style={{position:'fixed',bottom:28,right:28,background:'#1E293B',color:'#fff',padding:'12px 20px',borderRadius:10,fontSize:14,zIndex:999,boxShadow:'0 8px 24px rgba(0,0,0,0.2)'}}>✅ {msg}</div>;}
function Pagination({current,total,onPage}){
  if(total<=1)return null;
  const pages=[];let s=Math.max(1,current-2),e=Math.min(total,s+4);if(e-s<4)s=Math.max(1,e-4);
  for(let i=s;i<=e;i++)pages.push(i);
  const btnSt=(active)=>({width:32,height:32,borderRadius:6,border:`1px solid ${active?C.primary:C.border}`,background:active?C.primary:'white',color:active?'white':C.text,fontSize:13,fontWeight:active?700:400,cursor:'pointer',fontFamily:'inherit'});
  return <div style={{display:'flex',justifyContent:'center',gap:6,alignItems:'center',padding:'14px 20px'}}>
    <button onClick={()=>onPage(Math.max(1,current-1))} style={btnSt(false)} disabled={current===1}>‹</button>
    {pages.map(p=><button key={p} onClick={()=>onPage(p)} style={btnSt(p===current)}>{p}</button>)}
    <button onClick={()=>onPage(Math.min(total,current+1))} style={btnSt(false)} disabled={current===total}>›</button>
  </div>;
}

/* ═══════════════════════════════════════════════════════════════════
   DASHBOARD
   ═════════════════════════��═════════════════════════════════════════ */
function Dashboard({members,batchResults,centers}){
  const [modal,setModal]=useState(null);
  const unpaid=batchResults.filter(r=>r.reason!=='성공');
  const total=members.length;
  const unpaidCount=members.filter(m=>m.status==='미납').length;
  const noAcct=members.filter(m=>m.accountStatus==='미등록').length;
  const barData=centers.map(c=>({name:c.name.replace(' 어린이집',''),회원수:members.filter(m=>m.centerId===c.id).length}));

  return <div className="fade-in">
    <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:16,marginBottom:24}}>
      <KpiCard label="전체 회원" value={total.toLocaleString()+'명'} sub="실시간 반영" icon="👥" color={C.primary}/>
      <KpiCard label="이번달 결제 완료" value={batchResults.filter(r=>r.reason==='성공').length+'건'} sub="35,000원 기준" icon="✅" color={C.success}/>
      <KpiCard label="미납자" value={unpaidCount+'명'} sub="배치 실행 후 자동 집계" icon="⚠️" color={C.warning}/>
      <KpiCard label="계좌 미등록" value={noAcct+'명'} sub="가입 후 미완료" icon="🏦" color={C.danger}/>
    </div>
    <div style={{display:'grid',gridTemplateColumns:'1fr 360px',gap:16,marginBottom:24}}>
      <div style={{background:C.surface,borderRadius:12,padding:20,boxShadow:'0 1px 4px rgba(0,0,0,0.06)'}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16}}><h3 style={{fontSize:15,fontWeight:700}}>월별 결제 현황</h3><span style={{fontSize:12,color:C.textLight}}>최근 7개월</span></div>
        <ResponsiveContainer width="100%" height={220}>
          <LineChart data={CHART_DATA}><CartesianGrid strokeDasharray="3 3" stroke="#F1F5F9"/><XAxis dataKey="month" tick={{fontSize:12}}/><YAxis tick={{fontSize:12}}/><Tooltip/><Legend/>
            <Line type="monotone" dataKey="완료" stroke={C.primary} strokeWidth={2.5} dot={{r:4}}/><Line type="monotone" dataKey="미납" stroke={C.danger} strokeWidth={2} dot={{r:3}}/><Line type="monotone" dataKey="취소" stroke={C.warning} strokeWidth={2} dot={{r:3}}/>
          </LineChart>
        </ResponsiveContainer>
      </div>
      <div style={{background:C.surface,borderRadius:12,padding:20,boxShadow:'0 1px 4px rgba(0,0,0,0.06)'}}>
        <h3 style={{fontSize:15,fontWeight:700,marginBottom:16}}>어린이집별 회원 수</h3>
        <ResponsiveContainer width="100%" height={180}>
          <BarChart data={barData} barSize={28}><CartesianGrid strokeDasharray="3 3" stroke="#F1F5F9" vertical={false}/><XAxis dataKey="name" tick={{fontSize:11}}/><YAxis tick={{fontSize:12}}/><Tooltip/><Bar dataKey="회원수" fill={C.primary} radius={[6,6,0,0]}/></BarChart>
        </ResponsiveContainer>
      </div>
    </div>
    <div style={{background:C.surface,borderRadius:12,padding:20,boxShadow:'0 1px 4px rgba(0,0,0,0.06)'}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16}}><h3 style={{fontSize:15,fontWeight:700}}>최근 미납자</h3>{unpaid.length>0&&<Btn small primary label="전체 보기" onClick={()=>setModal('unpaid')}/>}</div>
      {unpaid.length===0?<p style={{color:C.textLight,fontSize:14,textAlign:'center',padding:20}}>배치 실행 후 미납자가 표시됩니다.</p>:
      <table style={{width:'100%',borderCollapse:'collapse'}}><thead><tr style={{borderBottom:`2px solid ${C.border}`}}>{['회원명','자녀명','어린이집','미납 사유','금액'].map(h=><th key={h} style={{textAlign:'left',padding:'8px 12px',fontSize:12,color:C.textLight,fontWeight:600}}>{h}</th>)}</tr></thead>
      <tbody>{unpaid.slice(0,6).map(r=><tr key={r.id} style={{borderBottom:`1px solid ${C.border}`}}><td style={{padding:'10px 12px',fontSize:13,fontWeight:600}}>{r.name}</td><td style={{padding:'10px 12px',fontSize:13}}>{r.childName}</td><td style={{padding:'10px 12px',fontSize:13}}>{r.center}</td><td style={{padding:'10px 12px'}}><StatusBadge status={r.reason}/></td><td style={{padding:'10px 12px',fontSize:13,fontWeight:600}}>{r.amount}원</td></tr>)}</tbody></table>}
    </div>
    {modal==='unpaid'&&<Modal title={`전체 미납자 (${unpaid.length}명)`} onClose={()=>setModal(null)}>
      {unpaid.map(r=><div key={r.id} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:12,background:C.bg,borderRadius:8,marginBottom:8}}>
        <div><div style={{fontWeight:600,fontSize:14}}>{r.name} <span style={{fontWeight:400,color:C.textLight}}>({r.childName})</span></div><div style={{fontSize:12,color:C.textLight,marginTop:2}}>{r.center} · {r.room}</div></div>
        <StatusBadge status={r.reason}/>
      </div>)}
    </Modal>}
  </div>;
}

/* ═══════════════════════════════════════════════════════════════════
   MEMBER MANAGEMENT (with real CRUD)
   ═══════════════���═══════════════════════════════════════════════════ */
function MemberMgmt({members,setMembers,centers}){
  const PER=15;const [search,setSearch]=useState('');const [fCenter,setFC]=useState('전체');const [fStatus,setFS]=useState('전체');const [page,setPage]=useState(1);const [modal,setModal]=useState(null);const [toast,setToast]=useState(null);
  const [addForm,setAddForm]=useState({name:'',phone:'',childName:'',center:'',room:''});

  const filtered=useMemo(()=>members.filter(m=>{
    const s=!search||m.name.includes(search)||m.childName.includes(search)||m.id.includes(search);
    const c=fCenter==='전체'||m.center===fCenter;const st=fStatus==='전체'||m.status===fStatus;return s&&c&&st;
  }),[members,search,fCenter,fStatus]);
  const totalP=Math.ceil(filtered.length/PER);const paged=filtered.slice((page-1)*PER,page*PER);
  useEffect(()=>setPage(1),[search,fCenter,fStatus]);

  const addMember=()=>{
    const name=readInput('a-name'),phone=readInput('a-phone'),childName=readInput('a-child');
    if(!name){setToast('학부모 이름을 입력해주세요.');return;}
    if(!childName){setToast('자녀 이름을 입력해주세요.');return;}
    if(!addForm.center){setToast('어린이집을 선택해주세요.');return;}
    const newId='M'+String(members.length+1).padStart(4,'0');
    const ct=centers.find(c=>c.name===addForm.center);
    setMembers(prev=>[{id:newId,name,phone:phone||'010-0000-0000',childName,center:addForm.center,centerId:ct?.id||'',room:addForm.room||ct?.rooms[0]?.name||'',roomId:'',accountStatus:'미등록',joinDate:new Date().toISOString().slice(0,10),status:'계좌미등록',amount:35000,bankAccount:'',cmsConsent:false},...prev]);
    setAddForm({name:'',phone:'',childName:'',center:'',room:''});setModal(null);setToast(`회원 ${name}(${newId})이 추가되었습니다.`);
  };

  const downloadExcel=async()=>{
    const wb=new ExcelJS.Workbook();const ws=wb.addWorksheet('회원목록');
    ws.columns=[{header:'회원번호',key:'id',width:12},{header:'학부모명',key:'name',width:14},{header:'자녀명',key:'childName',width:14},{header:'어린이집',key:'center',width:18},{header:'반',key:'room',width:10},{header:'연락처',key:'phone',width:16},{header:'계좌',key:'accountStatus',width:10},{header:'상태',key:'status',width:10}];
    ws.getRow(1).font={bold:true};ws.getRow(1).fill={type:'pattern',pattern:'solid',fgColor:{argb:'FF2563EB'}};ws.getRow(1).font={bold:true,color:{argb:'FFFFFFFF'}};
    filtered.forEach(m=>ws.addRow(m));
    const buf=await wb.xlsx.writeBuffer();const blob=new Blob([buf],{type:'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet'});
    const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=`회원목록_${new Date().toISOString().slice(0,10)}.xlsx`;a.click();
    setToast(`${filtered.length}명 엑셀 다운로드 완료`);
  };

  return <div className="fade-in">
    <div style={{background:C.surface,borderRadius:12,padding:20,boxShadow:'0 1px 4px rgba(0,0,0,0.06)',marginBottom:16}}>
      <div style={{display:'flex',gap:12,alignItems:'center',flexWrap:'wrap'}}>
        <input defaultValue="" placeholder="🔍 회원명 / 자녀명 / 회원번호" onInput={e=>setSearch(e.target.value)} style={{...inputSt,flex:1,minWidth:200}}/>
        <select value={fCenter} onChange={e=>setFC(e.target.value)} style={selectSt}><option>전체</option>{centers.map(c=><option key={c.id}>{c.name}</option>)}</select>
        <select value={fStatus} onChange={e=>setFS(e.target.value)} style={{...selectSt,width:120}}>{['전체','정상','미납','계좌미등록'].map(s=><option key={s}>{s}</option>)}</select>
        <Btn primary label="+ 회원 추가" onClick={()=>setModal('add')}/>

/* ══════��═════════════════════════════════════���══════════════════════
   BATCH PAYMENT (with real state changes)
   ════════════════���═════════════════════════════════���════════════════ */
function BatchPayment({members,setMembers,batchResults,setBatchResults}){
  const PER=12;const [running,setRunning]=useState(false);const [progress,setProgress]=useState(0);const [done,setDone]=useState(false);
  const [filter,setFilter]=useState('전체');const [modal,setModal]=useState(null);const [toast,setToast]=useState(null);const [bPage,setBP]=useState(1);const ref=useRef(null);

  const runBatch=()=>{
    setRunning(true);setProgress(0);setDone(false);
    const eligible=members.filter(m=>m.cmsConsent&&m.accountStatus==='등록완료');
    ref.current=setInterval(()=>{
      setProgress(p=>{
        if(p>=100){
          clearInterval(ref.current);setRunning(false);setDone(true);
          const results=eligible.map((m,i)=>{const ok=Math.random()>0.15;return{id:'B'+String(i+1).padStart(4,'0'),memberId:m.id,name:m.name,childName:m.childName,center:m.center,room:m.room,reason:ok?'성공':pick(FAIL_REASONS),amount:'35,000',date:'2026-04-05'};});
          setBatchResults(results);
          setMembers(prev=>prev.map(m=>{const r=results.find(b=>b.memberId===m.id);if(!r)return m;return{...m,status:r.reason==='성공'?'정상':'미납'};}));
          setToast(`배치 완료: ${results.filter(r=>r.reason==='성공').length}건 성공 / ${results.filter(r=>r.reason!=='성공').length}건 실패`);
          return 100;
        }
        return p+2;
      });
    },50);
  };

  const ok=batchResults.filter(r=>r.reason==='성공').length;const fail=batchResults.filter(r=>r.reason!=='성공').length;
  const bf=filter==='전체'?batchResults:filter==='성공'?batchResults.filter(r=>r.reason==='성공'):batchResults.filter(r=>r.reason!=='성공');
  const tp=Math.ceil(bf.length/PER);const pb=bf.slice((bPage-1)*PER,bPage*PER);
  useEffect(()=>setBP(1),[filter]);

  return <div className="fade-in">
    <div style={{background:C.surface,borderRadius:12,padding:24,boxShadow:'0 1px 4px rgba(0,0,0,0.06)',marginBottom:16}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start'}}>
        <div><h3 style={{fontSize:16,fontWeight:700}}>2026년 4월 자동이체 배치</h3><p style={{fontSize:13,color:C.textLight,marginTop:4}}>효성CMS Web API (HTTP+JSON) · 배치 출금 → 결과 자동 반영</p></div>
        <Btn primary label={running?'실행 중...':'🚀 배치 실행'} onClick={runBatch} disabled={running}/>
      </div>
      {(running||done)&&<div style={{marginTop:20}}>
        <div style={{display:'flex',justifyContent:'space-between',marginBottom:8}}><span style={{fontSize:13,fontWeight:600}}>처리 현황</span><span style={{fontSize:13,color:C.textLight}}>{Math.round(progress/100*members.filter(m=>m.cmsConsent).length)}/{members.filter(m=>m.cmsConsent).length}건</span></div>
        <div style={{background:C.bg,borderRadius:100,height:10,overflow:'hidden'}}><div style={{height:'100%',width:`${progress}%`,background:done?C.success:C.primary,borderRadius:100,transition:'width 80ms'}}/></div>
        {done&&<div style={{display:'flex',gap:12,marginTop:16}}>
          <div style={{flex:1,background:C.successLight,borderRadius:10,padding:14,textAlign:'center'}}><div style={{fontSize:22,fontWeight:700,color:C.success}}>{ok}</div><div style={{fontSize:12,color:'#065F46'}}>성공</div></div>
          <div style={{flex:1,background:C.dangerLight,borderRadius:10,padding:14,textAlign:'center'}}><div style={{fontSize:22,fontWeight:700,color:C.danger}}>{fail}</div><div style={{fontSize:12,color:'#991B1B'}}>실패</div></div>
        </div>}
      </div>}
    </div>
    {batchResults.length>0&&<div style={{background:C.surface,borderRadius:12,boxShadow:'0 1px 4px rgba(0,0,0,0.06)',overflow:'hidden'}}>
      <div style={{padding:'14px 20px',borderBottom:`1px solid ${C.border}`,display:'flex',gap:8,alignItems:'center'}}>
        {['전체','성공','실패'].map(f=><button key={f} onClick={()=>setFilter(f)} style={{padding:'6px 14px',borderRadius:20,border:`1.5px solid ${filter===f?C.primary:C.border}`,background:filter===f?C.primaryLight:'white',color:filter===f?C.primary:C.text,fontSize:13,fontWeight:filter===f?600:400,cursor:'pointer',fontFamily:'inherit'}}>{f} ({f==='성공'?ok:f==='실패'?fail:batchResults.length})</button>)}
        <div style={{flex:1}}/>{fail>0&&<Btn small label="실패자 일괄 재청구" onClick={()=>setToast('재청구 요청이 등록되었습니다.')}/>}
      </div>
      <table style={{width:'100%',borderCollapse:'collapse'}}><thead><tr style={{background:C.bg}}>{['회원명','자녀명','어린이집/반','금액','결과',''].map(h=><th key={h} style={{textAlign:'left',padding:'10px 14px',fontSize:12,color:C.textLight,fontWeight:600,borderBottom:`1px solid ${C.border}`}}>{h}</th>)}</tr></thead>
      <tbody>{pb.map(r=><tr key={r.id} style={{borderBottom:`1px solid ${C.border}`}} onMouseEnter={e=>e.currentTarget.style.background=C.bg} onMouseLeave={e=>e.currentTarget.style.background='transparent'}>
        <td style={{padding:'11px 14px',fontSize:14,fontWeight:600}}>{r.name}</td><td style={{padding:'11px 14px',fontSize:13}}>{r.childName}</td><td style={{padding:'11px 14px',fontSize:13}}>{r.center}/{r.room}</td><td style={{padding:'11px 14px',fontSize:13}}>{r.amount}원</td><td style={{padding:'11px 14px'}}><StatusBadge status={r.reason}/></td>
        <td style={{padding:'11px 14px'}}>{r.reason!=='성공'&&<button onClick={()=>setToast(`${r.name}님 재청구 완료`)} style={{border:`1px solid ${C.danger}`,borderRadius:6,padding:'4px 10px',fontSize:12,cursor:'pointer',color:C.danger,background:'white',fontFamily:'inherit'}}>재청구</button>}</td>
      </tr>)}</tbody></table>
      <Pagination current={bPage} total={tp} onPage={setBP}/>
    </div>}
    {batchResults.length===0&&!running&&<div style={{background:C.surface,borderRadius:12,padding:40,textAlign:'center',boxShadow:'0 1px 4px rgba(0,0,0,0.06)'}}><div style={{fontSize:32,marginBottom:12}}>💳</div><p style={{color:C.textLight}}>배치 실행 버튼을 누르면 CMS 동의 완료 회원에 대해 일괄 출금을 시작합니다.</p></div>}
    {toast&&<Toast msg={toast} onClose={()=>setToast(null)}/>}
  </div>;
}

/* ═══════════════════════════════════════════════════════════════════
   STATEMENT EXPORT (with real Excel download)
   ════════════════��══════════════════════════════════════════════════ */
function StatementExport({members,centers,batchResults}){
  const [sCenter,setSC]=useState('전체');const [sRoom,setSR]=useState('전체');const [sMonth,setSM]=useState('2026-04');const [toast,setToast]=useState(null);
  const rooms=sCenter==='전체'?centers.flatMap(c=>c.rooms):centers.find(c=>c.name===sCenter)?.rooms||[];
  const target=members.filter(m=>(sCenter==='전체'||m.center===sCenter)&&(sRoom==='전체'||m.room===sRoom));
  const [history,setHistory]=useState([{id:'EX001',center:'햇살 어린이집',room:'전체',month:'2026-03',at:'2026-03-31 10:23',dl:3},{id:'EX002',center:'꿈나무 어린이집',room:'전체',month:'2026-03',at:'2026-03-31 10:45',dl:1}]);

  const generate=async()=>{
    const wb=new ExcelJS.Workbook();
    const grouped={};target.forEach(m=>{const k=m.center+'/'+m.room;if(!grouped[k])grouped[k]=[];grouped[k].push(m);});
    Object.entries(grouped).forEach(([key,ms])=>{
      const ws=wb.addWorksheet(key.length>30?key.slice(0,30):key);
      ws.mergeCells('A1:F1');ws.getCell('A1').value=`거래명세표 — ${sMonth} — ${key}`;ws.getCell('A1').font={size:14,bold:true};ws.getCell('A1').alignment={horizontal:'center'};
      ws.addRow([]);ws.addRow(['회원번호','학부모명','자녀명','청구금액','결제상태','비고']);
      const hdr=ws.getRow(3);hdr.font={bold:true,color:{argb:'FFFFFFFF'}};hdr.eachCell(c=>{c.fill={type:'pattern',pattern:'solid',fgColor:{argb:'FF2563EB'}};});
      ws.columns=[{width:12},{width:14},{width:14},{width:14},{width:12},{width:16}];
      let total=0;ms.forEach(m=>{const br=batchResults.find(b=>b.memberId===m.id);const st=br?br.reason:'미처리';ws.addRow([m.id,m.name,m.childName,'35,000원',st,'']);total+=35000;});
      ws.addRow([]);const sumRow=ws.addRow(['','','합계',total.toLocaleString()+'원','','']);sumRow.font={bold:true};
    });
    const buf=await wb.xlsx.writeBuffer();const blob=new Blob([buf],{type:'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet'});
    const fn=`거래명세표_${sMonth}_${sCenter}.xlsx`;const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=fn;a.click();
    setHistory(p=>[{id:'EX'+String(p.length+1).padStart(3,'0'),center:sCenter,room:sRoom,month:sMonth,at:new Date().toLocaleString('ko-KR'),dl:0},...p]);
    setToast(`거래명세표 다운로드 완료 (${Object.keys(grouped).length}개 시트)`);
  };

  return <div className="fade-in">
    <div style={{display:'grid',gridTemplateColumns:'340px 1fr',gap:16}}>
      <div style={{background:C.surface,borderRadius:12,padding:20,boxShadow:'0 1px 4px rgba(0,0,0,0.06)',height:'fit-content'}}>
        <h3 style={{fontSize:15,fontWeight:700,marginBottom:16}}>생성 조건</h3>
        <FormRow label="어린이집"><select value={sCenter} onChange={e=>{setSC(e.target.value);setSR('전체');}} style={selectSt}><option>전체</option>{centers.map(c=><option key={c.id}>{c.name}</option>)}</select></FormRow>
        <FormRow label="반"><select value={sRoom} onChange={e=>setSR(e.target.value)} style={selectSt}><option>전체</option>{rooms.map(r=><option key={r.id}>{r.name}</option>)}</select></FormRow>
        <FormRow label="정산 월"><input type="month" value={sMonth} onChange={e=>setSM(e.target.value)} style={inputSt}/></FormRow>
        <div style={{padding:12,background:C.primaryLight,borderRadius:8,marginBottom:16}}><div style={{fontSize:13,color:C.primary,fontWeight:600}}>대상: {target.length}명 · 어린이집/반별 시트 분리</div></div>
        <Btn primary full label="📊 엑셀 자동 생성 및 다운로드" onClick={generate}/>

          <div style={{maxHeight:280,overflowY:'auto'}}><table style={{width:'100%',borderCollapse:'collapse'}}><thead style={{position:'sticky',top:0,background:C.bg}}><tr>{['번호','학부모','자녀','어린이집/반','금액'].map(h=><th key={h} style={{textAlign:'left',padding:'10px 14px',fontSize:12,color:C.textLight,fontWeight:600,borderBottom:`1px solid ${C.border}`}}>{h}</th>)}</tr></thead>

  return <div style={{display:'flex',minHeight:'100vh'}}>
    <aside style={{width:260,background:C.sidebar,flexShrink:0,display:'flex',flexDirection:'column'}}>
      <div style={{padding:'20px 20px 16px'}}><div style={{fontSize:13,color:'#64748B',fontWeight:500,letterSpacing:'0.08em',marginBottom:4}}>DAYCARE CRM</div><div style={{fontSize:18,color:'#FFFFFF',fontWeight:700,lineHeight:1.2}}>어린이집 식판<br/>세척 서비스</div></div>
      <div style={{width:'calc(100% - 40px)',height:1,background:'#1E293B',margin:'0 20px 12px'}}/>
      <nav style={{flex:1,padding:'0 12px',display:'flex',flexDirection:'column',gap:2}}>
        {NAV.map(item=>{
          if(item.id==='divider')return <div key="div" style={{height:1,background:'#1E293B',margin:'8px 8px'}}></div>;
          const active=page===item.id;const isParent=item.id==='parent-app';
          return <button key={item.id} onClick={()=>setPage(item.id)} style={{
            display:'flex',alignItems:'center',gap:10,width:'100%',padding:'10px 16px',border:'none',cursor:'pointer',textAlign:'left',
            background:active?(isParent?'#7C3AED':C.sidebarActive):'transparent',
            color:active?'#FFFFFF':'#94A3B8',borderRadius:8,fontSize:14,fontWeight:active?600:400,fontFamily:'inherit',transition:'all 150ms',
          }}
          onMouseEnter={e=>{if(!active){e.currentTarget.style.background=C.sidebarHover;e.currentTarget.style.color='#FFFFFF';}}}
          onMouseLeave={e=>{if(!active){e.currentTarget.style.background='transparent';e.currentTarget.style.color='#94A3B8';}}}>
            <span style={{fontSize:16}}>{item.icon}</span>{item.label}
          </button>;
        })}
      </nav>
      <div style={{padding:'16px 20px',borderTop:'1px solid #1E293B'}}>
        <div style={{display:'flex',alignItems:'center',gap:10}}>
          <div style={{width:36,height:36,borderRadius:'50%',background:C.primary,display:'flex',alignItems:'center',justifyContent:'center',color:'#fff',fontSize:14,fontWeight:700}}>관</div>
          <div><div style={{fontSize:13,color:'#F1F5F9',fontWeight:600}}>관리자</div><div style={{fontSize:11,color:'#64748B'}}>admin@daycare.kr</div></div>
        </div>
      </div>
    </aside>
    <div style={{flex:1,display:'flex',flexDirection:'column',overflow:'hidden'}}>
      <header style={{height:56,background:C.surface,borderBottom:`1px solid ${C.border}`,display:'flex',alignItems:'center',padding:'0 24px',gap:12,flexShrink:0}}>
        <h1 style={{fontSize:16,fontWeight:700}}>{cur?.icon} {cur?.label}</h1><div style={{flex:1}}/>
        <span style={{fontSize:13,color:C.textLight}}>2026년 4월 7일</span>
      </header>
      <main style={{flex:1,overflowY:'auto',padding:24,background:page==='parent-app'?'#F0F0F5':C.bg}}>
        {PAGE[page]}
      </main>
    </div>
  </div>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
