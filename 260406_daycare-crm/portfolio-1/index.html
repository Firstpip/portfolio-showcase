// ─── 공통 컴포넌트 ──────────────────────────────────────────────────
function Badge({ label, color, bg }) {
  return (
    <span style={{
      display:'inline-flex', alignItems:'center', padding:'3px 10px',
      borderRadius:20, fontSize:12, fontWeight:600,
      color: color || C.text, background: bg || C.bg,
    }}>{label}</span>
  );
}

function StatusBadge({ status }) {
  const map = {
    '정상':     { color:'#065F46', bg:'#D1FAE5' },
    '미납':     { color:'#991B1B', bg:'#FEE2E2' },
    '계좌미등록':{ color:'#92400E', bg:'#FEF3C7' },
    '성공':     { color:'#065F46', bg:'#D1FAE5' },
    '잔액 부족': { color:'#991B1B', bg:'#FEE2E2' },
    '계좌 오류': { color:'#991B1B', bg:'#FEE2E2' },
    '동의 만료': { color:'#92400E', bg:'#FEF3C7' },
    '등록완료':  { color:'#065F46', bg:'#D1FAE5' },
    '미등록':   { color:'#92400E', bg:'#FEF3C7' },
  };
  const s = map[status] || { color:C.textLight, bg:C.bg };
  return <Badge label={status} color={s.color} bg={s.bg} />;
}

function KpiCard({ label, value, sub, icon, color }) {
  return (
    <div style={{
      background:C.surface, borderRadius:12, padding:20,
      boxShadow:'0 1px 4px rgba(0,0,0,0.06)', display:'flex', gap:16, alignItems:'flex-start',
    }}>
      <div style={{
        width:44, height:44, borderRadius:10, background: color+'18',
        display:'flex', alignItems:'center', justifyContent:'center', fontSize:20, flexShrink:0,
      }}>{icon}</div>
      <div>
        <div style={{ fontSize:12, color:C.textLight, fontWeight:500 }}>{label}</div>
        <div style={{ fontSize:24, fontWeight:700, color:C.text, lineHeight:1.2, marginTop:2 }}>{value}</div>
        {sub && <div style={{ fontSize:12, color:C.textLight, marginTop:2 }}>{sub}</div>}
      </div>
    </div>
  );
}

function Modal({ title, onClose, children, width=560 }) {
  return (
    <div style={{ position:'fixed', inset:0, background:'rgba(0,0,0,0.45)', zIndex:400, display:'flex', alignItems:'center', justifyContent:'center' }}
      onClick={e => { if(e.target===e.currentTarget) onClose(); }}>
      <div className="fade-in" style={{ background:C.surface, borderRadius:16, width, maxWidth:'90vw', maxHeight:'85vh', overflowY:'auto', padding:28, boxShadow:'0 20px 60px rgba(0,0,0,0.2)' }}>
        <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:20 }}>
          <h3 style={{ fontSize:18, fontWeight:700 }}>{title}</h3>
          <button onClick={onClose} style={{ border:'none', background:'none', fontSize:20, cursor:'pointer', color:C.textLight, padding:'4px 8px' }}>✕</button>
        </div>
        {children}
      </div>
    </div>
  );
}

function FormRow({ label, children }) {
  return (
    <div style={{ marginBottom:16 }}>
      <label style={{ display:'block', fontSize:13, fontWeight:600, color:C.text, marginBottom:6 }}>{label}</label>
      {children}
    </div>
  );
}

function Input({ placeholder, value, type='text' }) {
  const [v, setV] = useState(value||'');
  return <input type={type} value={v} onChange={e=>setV(e.target.value)} placeholder={placeholder}
    style={{ width:'100%', padding:'10px 12px', border:`1.5px solid ${C.border}`, borderRadius:8, fontSize:14, fontFamily:'inherit', outline:'none' }} />;
}

function Select({ options }) {
  const [v, setV] = useState(options[0]);
  return (
    <select value={v} onChange={e=>setV(e.target.value)}
      style={{ width:'100%', padding:'10px 12px', border:`1.5px solid ${C.border}`, borderRadius:8, fontSize:14, fontFamily:'inherit', outline:'none', background:'white' }}>
      {options.map(o=><option key={o}>{o}</option>)}
    </select>
  );
}

function PrimaryBtn({ label, onClick, small }) {
  return (
    <button onClick={onClick} style={{
      background:C.primary, color:'#fff', border:'none', borderRadius:8,
      padding: small ? '7px 14px' : '10px 20px', fontSize: small ? 13 : 14,
      fontWeight:600, cursor:'pointer', fontFamily:'inherit',
    }}>{label}</button>
  );
}

function SecondaryBtn({ label, onClick, small }) {
  return (
    <button onClick={onClick} style={{
      background:'transparent', color:C.text, border:`1.5px solid ${C.border}`, borderRadius:8,
      padding: small ? '6px 14px' : '9px 20px', fontSize: small ? 13 : 14,
      fontWeight:600, cursor:'pointer', fontFamily:'inherit',
    }}>{label}</button>
  );
}

function Toast({ msg, onClose }) {
  useEffect(() => { const t = setTimeout(onClose, 2800); return ()=>clearTimeout(t); }, []);
  return (
    <div style={{ position:'fixed', bottom:28, right:28, background:'#1E293B', color:'#fff', padding:'12px 20px', borderRadius:10, fontSize:14, zIndex:999, boxShadow:'0 8px 24px rgba(0,0,0,0.2)' }}>
      ✅ {msg}
    </div>
  );
}

// ─── 회원 관리 ─────────────────────────────────────────────────────
function MemberManagement() {
  const [search, setSearch] = useState('');
  const [filterCenter, setFilterCenter] = useState('전체');
  const [filterStatus, setFilterStatus] = useState('전체');
  const [modal, setModal] = useState(null);

  const filtered = MEMBERS.filter(m => {
    const matchSearch = m.name.includes(search) || m.childName.includes(search);
    const matchCenter = filterCenter==='전체' || m.center===filterCenter;
    const matchStatus = filterStatus==='전체' || m.status===filterStatus;
    return matchSearch && matchCenter && matchStatus;
  });

  return (
    <div className="fade-in">
      <div style={{ background:C.surface, borderRadius:12, padding:20, boxShadow:'0 1px 4px rgba(0,0,0,0.06)', marginBottom:16 }}>
        <div style={{ display:'flex', gap:12, alignItems:'center', flexWrap:'wrap' }}>
          <input value={search} onChange={e=>setSearch(e.target.value)}
            placeholder="🔍 회원명 또는 자녀명 검색..."
            style={{ flex:1, minWidth:200, padding:'9px 14px', border:`1.5px solid ${C.border}`, borderRadius:8, fontSize:14, fontFamily:'inherit', outline:'none' }} />

// ─── 자동이체 배치 ─────────────────────────────────────────────────
function BatchPayment() {
  const [running, setRunning] = useState(false);
  const [progress, setProgress] = useState(0);
  const [done, setDone] = useState(false);
  const [filter, setFilter] = useState('전체');
  const [modal, setModal] = useState(null);
  const [toast, setToast] = useState(null);
  const intervalRef = useRef(null);

  const startBatch = () => {
    setRunning(true); setProgress(0); setDone(false);
    intervalRef.current = setInterval(() => {
      setProgress(p => {
        if(p >= 100) {
          clearInterval(intervalRef.current);
          setRunning(false); setDone(true);
          setToast('3월 자동이체 배치가 완료되었습니다.');
          return 100;
        }
        return p + 2;
      });
    }, 60);
  };

  const batchFiltered = filter==='전체' ? BATCH_RESULTS
    : filter==='성공' ? BATCH_RESULTS.filter(r=>r.reason==='성공')
    : BATCH_RESULTS.filter(r=>r.reason!=='성공');

  const successCount = BATCH_RESULTS.filter(r=>r.reason==='성공').length;
  const failCount = BATCH_RESULTS.filter(r=>r.reason!=='성공').length;

  return (
    <div className="fade-in">
      <div style={{ background:C.surface, borderRadius:12, padding:24, boxShadow:'0 1px 4px rgba(0,0,0,0.06)', marginBottom:16 }}>
        <div style={{ display:'flex', justifyContent:'space-between', alignItems:'flex-start' }}>
          <div>
            <h3 style={{ fontSize:16, fontWeight:700 }}>2026년 3월 자동이체 배치</h3>
            <p style={{ fontSize:13, color:C.textLight, marginTop:4 }}>효성CMS 출금 요청 → 결과 조회 순서로 처리됩니다</p>
          </div>
          <PrimaryBtn label={running ? '실행 중...' : '배치 실행'} onClick={running ? null : startBatch} />
        </div>

        {(running || done) && (
          <div style={{ marginTop:20 }}>
            <div style={{ display:'flex', justifyContent:'space-between', marginBottom:8 }}>
              <span style={{ fontSize:13, fontWeight:600 }}>처리 현황</span>
              <span style={{ fontSize:13, color:C.textLight }}>{Math.round(progress/100*BATCH_RESULTS.length)}/{BATCH_RESULTS.length}건</span>
            </div>
            <div style={{ background:C.bg, borderRadius:100, height:10, overflow:'hidden' }}>
              <div style={{ height:'100%', width:`${progress}%`, background:done?C.success:C.primary, borderRadius:100, transition:'width 100ms' }} />
            </div>
            {done && (
              <div style={{ display:'flex', gap:12, marginTop:16 }}>
                <div style={{ flex:1, background:C.successLight, borderRadius:10, padding:14, textAlign:'center' }}>
                  <div style={{ fontSize:22, fontWeight:700, color:C.success }}>{successCount}</div>
                  <div style={{ fontSize:12, color:'#065F46', marginTop:2 }}>성공</div>
                </div>
                <div style={{ flex:1, background:C.dangerLight, borderRadius:10, padding:14, textAlign:'center' }}>
                  <div style={{ fontSize:22, fontWeight:700, color:C.danger }}>{failCount}</div>
                  <div style={{ fontSize:12, color:'#991B1B', marginTop:2 }}>실패</div>
                </div>
                <div style={{ flex:1, background:C.warningLight, borderRadius:10, padding:14, textAlign:'center' }}>
                  <div style={{ fontSize:22, fontWeight:700, color:C.warning }}>0</div>
                  <div style={{ fontSize:12, color:'#92400E', marginTop:2 }}>보류</div>
                </div>
              </div>
            )}
          </div>
        )}
      </div>

      <div style={{ background:C.surface, borderRadius:12, boxShadow:'0 1px 4px rgba(0,0,0,0.06)', overflow:'hidden' }}>
        <div style={{ padding:'14px 20px', borderBottom:`1px solid ${C.border}`, display:'flex', gap:8, alignItems:'center' }}>
          {['전체','성공','실패'].map(f=>(
            <button key={f} onClick={()=>setFilter(f)}
              style={{ padding:'6px 14px', borderRadius:20, border:`1.5px solid ${filter===f?C.primary:C.border}`,
                background:filter===f?C.primaryLight:'white', color:filter===f?C.primary:C.text,
                fontSize:13, fontWeight:filter===f?600:400, cursor:'pointer', fontFamily:'inherit' }}>
              {f}
            </button>
          ))}
          <div style={{ flex:1 }} />
          {failCount > 0 && <SecondaryBtn small label="실패자 재청구" onClick={()=>setToast('재청구 요청이 등록되었습니다.')} />}
        </div>
        <table style={{ width:'100%', borderCollapse:'collapse' }}>
          <thead>
            <tr style={{ background:C.bg }}>
              {['회원명','청구금액','처리 결과','날짜',''].map(h=>(
                <th key={h} style={{ textAlign:'left', padding:'10px 14px', fontSize:12, color:C.textLight, fontWeight:600, borderBottom:`1px solid ${C.border}` }}>{h}</th>
              ))}
            </tr>
          </thead>
          <tbody>
            {batchFiltered.map(r=>(
              <tr key={r.id} style={{ borderBottom:`1px solid ${C.border}`, cursor:'pointer' }}
                onMouseEnter={e=>e.currentTarget.style.background=C.bg}
                onMouseLeave={e=>e.currentTarget.style.background='transparent'}
                onClick={()=>setModal({type:'batchDetail',data:r})}>
                <td style={{ padding:'12px 14px', fontSize:14, fontWeight:600 }}>{r.name}</td>
                <td style={{ padding:'12px 14px', fontSize:13 }}>{r.amount}원</td>
                <td style={{ padding:'12px 14px' }}><StatusBadge status={r.reason} /></td>
                <td style={{ padding:'12px 14px', fontSize:12, color:C.textLight }}>{r.date}</td>
                <td style={{ padding:'12px 14px' }}>
                  {r.reason!=='성공' && (
                    <button onClick={e=>{e.stopPropagation(); setToast(`${r.name}님 재청구 요청이 등록되었습니다.`);}}
                      style={{ border:`1px solid ${C.danger}`, borderRadius:6, padding:'4px 10px', fontSize:12, cursor:'pointer', color:C.danger, background:'white', fontFamily:'inherit' }}>
                      재청구
                    </button>
                  )}
                </td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>

      {modal && modal.type==='batchDetail' && (
        <Modal title="결제 상세" onClose={()=>setModal(null)} width={420}>
          <div style={{ display:'grid', gap:10, marginBottom:20 }}>
            {[['회원명', modal.data.name], ['청구금액', modal.data.amount+'원'], ['처리 결과', <StatusBadge status={modal.data.reason} />], ['처리일시', modal.data.date+' 09:00']].map(([k,v])=>(
              <div key={k} style={{ display:'flex', justifyContent:'space-between', alignItems:'center', padding:'10px 14px', background:C.bg, borderRadius:8 }}>
                <span style={{ fontSize:13, color:C.textLight }}>{k}</span>
                <span style={{ fontSize:13, fontWeight: typeof v==='string' ? 600 : 400 }}>{v}</span>
              </div>
            ))}
          </div>
          {modal.data.reason!=='성공' && (
            <PrimaryBtn label="재청구 요청" onClick={()=>{setModal(null); setToast('재청구 요청이 등록되었습니다.');}} />
          )}
        </Modal>
      )}

      {toast && <Toast msg={toast} onClose={()=>setToast(null)} />}
    </div>
  );
}

                    <td style={{ padding:'10px 14px', fontSize:13, fontWeight:600 }}>명세표_{h.month}_{h.center}.xlsx</td>
                    <td style={{ padding:'10px 14px', fontSize:13 }}>{h.center} / {h.room}</td>
                    <td style={{ padding:'10px 14px', fontSize:12, color:C.textLight }}>{h.createdAt}</td>
                    <td style={{ padding:'10px 14px', fontSize:13 }}>{h.creator}</td>
                    <td style={{ padding:'10px 14px', fontSize:13 }}>{h.downloads}회</td>
                    <td style={{ padding:'10px 14px' }}>
                      <button onClick={()=>setToast('파일 다운로드를 시작합니다.')}
                        style={{ border:`1px solid ${C.primary}`, borderRadius:6, padding:'4px 10px', fontSize:12, cursor:'pointer', color:C.primary, background:'white', fontFamily:'inherit' }}>
                        📥 다운로드
                      </button>
                    </td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        </div>
      </div>

      {modal==='preview' && (
        <Modal title="거래명세표 생성 확인" onClose={()=>setModal(null)} width={480}>
          <div style={{ background:C.bg, borderRadius:10, padding:16, marginBottom:20 }}>
            <div style={{ fontSize:14, fontWeight:700, marginBottom:8 }}>생성 예정 파일</div>
            <div style={{ fontSize:13, color:C.textLight }}>📄 명세표_{selectedMonth}_{selectedCenter}.xlsx</div>
            <div style={{ fontSize:13, color:C.textLight, marginTop:4 }}>· 대상 회원 {previewData.length}명 · {selectedMonth} · {selectedRoom}</div>
          </div>
          <p style={{ fontSize:13, color:C.textLight, marginBottom:20 }}>ExcelJS로 어린이집·반별 시트를 분리하여 생성합니다. 생성 후 다운로드 이력이 자동 기록됩니다.</p>
          <div style={{ display:'flex', gap:8 }}>
            <PrimaryBtn label="생성 및 다운로드" onClick={()=>{setModal(null); setToast('거래명세표가 생성되어 다운로드됩니다.');}} />
            <SecondaryBtn label="취소" onClick={()=>setModal(null)} />
          </div>
        </Modal>
      )}

      {toast && <Toast msg={toast} onClose={()=>setToast(null)} />}
    </div>
  );
}

// ─── 메인 앱 ──────────────────────────────────────────────────────
const NAV = [
  { id:'dashboard', label:'대시보드', icon:'📊' },
  { id:'member-mgmt', label:'회원 관리', icon:'👥' },
  { id:'batch-payment', label:'자동이체 배치', icon:'💳' },
  { id:'statement-export', label:'거래명세표', icon:'📋' },
];

function SideNavItem({ item, active, onClick }) {
  return (
    <button onClick={onClick} style={{
      display:'flex', alignItems:'center', gap:10, width:'100%',
      padding:'10px 16px', border:'none', cursor:'pointer', textAlign:'left',
      background: active ? C.sidebarActive : 'transparent',
      color: active ? '#FFFFFF' : '#94A3B8',
      borderRadius:8, fontSize:14, fontWeight: active ? 600 : 400,
      fontFamily:'inherit', transition:'all 150ms',
    }}
    onMouseEnter={e=>{ if(!active) e.currentTarget.style.background=C.sidebarHover; e.currentTarget.style.color='#FFFFFF'; }}
    onMouseLeave={e=>{ if(!active) { e.currentTarget.style.background='transparent'; e.currentTarget.style.color='#94A3B8'; } }}>
      <span style={{ fontSize:16 }}>{item.icon}</span>
      {item.label}
    </button>
  );
}

function App() {
  const [page, setPage] = useState('dashboard');

  const PAGE_CONTENT = {
    dashboard: <Dashboard />,
    'member-mgmt': <MemberManagement />,
    'batch-payment': <BatchPayment />,
    'statement-export': <StatementExport />,
  };

  const currentNav = NAV.find(n=>n.id===page);

  return (
    <div style={{ display:'flex', minHeight:'100vh', fontFamily:'Pretendard, sans-serif' }}>
      {/* 사이드바 */}
      <aside style={{ width:260, background:C.sidebar, flexShrink:0, display:'flex', flexDirection:'column' }}>
        <div style={{ padding:'20px 20px 16px' }}>
          <div style={{ fontSize:13, color:'#64748B', fontWeight:500, letterSpacing:'0.08em', marginBottom:4 }}>DAYCARE CRM</div>
          <div style={{ fontSize:18, color:'#FFFFFF', fontWeight:700, lineHeight:1.2 }}>어린이집 식판<br/>세척 서비스</div>
        </div>
        <div style={{ width:'calc(100% - 40px)', height:1, background:'#1E293B', margin:'0 20px 12px' }} />
        <nav style={{ flex:1, padding:'0 12px', display:'flex', flexDirection:'column', gap:2 }}>
          {NAV.map(item=>(
            <SideNavItem key={item.id} item={item} active={page===item.id} onClick={()=>setPage(item.id)} />
          ))}
        </nav>
        <div style={{ padding:'16px 20px', borderTop:'1px solid #1E293B' }}>
          <div style={{ display:'flex', alignItems:'center', gap:10 }}>
            <div style={{ width:36, height:36, borderRadius:'50%', background:C.primary, display:'flex', alignItems:'center', justifyContent:'center', color:'#fff', fontSize:14, fontWeight:700 }}>관</div>
            <div>
              <div style={{ fontSize:13, color:'#F1F5F9', fontWeight:600 }}>관리자</div>
              <div style={{ fontSize:11, color:'#64748B' }}>admin@daycare.kr</div>
            </div>
          </div>
        </div>
      </aside>

      {/* 메인 */}
      <div style={{ flex:1, display:'flex', flexDirection:'column', overflow:'hidden' }}>
        <header style={{ height:56, background:C.surface, borderBottom:`1px solid ${C.border}`, display:'flex', alignItems:'center', padding:'0 24px', gap:12, flexShrink:0 }}>
          <h1 style={{ fontSize:16, fontWeight:700 }}>{currentNav?.icon} {currentNav?.label}</h1>
          <div style={{ flex:1 }} />
          <div style={{ display:'flex', gap:12, alignItems:'center' }}>
            <button style={{ border:'none', background:'none', fontSize:18, cursor:'pointer' }}>🔔</button>
            <div style={{ width:1, height:24, background:C.border }} />
            <span style={{ fontSize:13, color:C.textLight }}>2026년 3월 6일</span>
          </div>
        </header>
        <main style={{ flex:1, overflowY:'auto', padding:24 }}>
          {PAGE_CONTENT[page]}
        </main>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
