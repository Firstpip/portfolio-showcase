// ─── 공통 컴포넌트 ──────────────────────────────────────────────────
function Badge({ label, color, bg }) {
  return <span style={{ display:'inline-flex', alignItems:'center', padding:'3px 10px', borderRadius:20, fontSize:12, fontWeight:600, color, background:bg }}>{label}</span>;
}

function StatusBadge({ status }) {
  const map = {
    '정상':      { color:'#6EE7B7', bg:'#064E3B' },
    '미납':      { color:'#FCA5A5', bg:'#450A0A' },
    '계좌미등록': { color:'#FCD34D', bg:'#451A03' },
    '성공':      { color:'#6EE7B7', bg:'#064E3B' },
    '잔액 부족': { color:'#FCA5A5', bg:'#450A0A' },
    '계좌 미등록':{ color:'#FCD34D', bg:'#451A03' },
    '등록완료':  { color:'#6EE7B7', bg:'#064E3B' },
    '미등록':    { color:'#FCD34D', bg:'#451A03' },
    '발송완료':  { color:'#6EE7B7', bg:'#064E3B' },
    '대기':      { color:'#FCD34D', bg:'#451A03' },
  };
  const s = map[status] || { color:C.textLight, bg:C.surfaceHigh };
  return <Badge label={status} color={s.color} bg={s.bg} />;
}

function KpiInline({ label, value }) {

    <div>
      <div style={{ fontSize:11, color:'rgba(255,255,255,0.65)', fontWeight:500, marginBottom:2 }}>{label}</div>
      <div style={{ fontSize:20, fontWeight:700, color:'#fff' }}>{value}</div>
    </div>
  );
}

function Card({ children, style }) {
  return <div style={{ background:C.surface, borderRadius:14, padding:20, boxShadow:'0 4px 20px rgba(0,0,0,0.3)', ...style }}>{children}</div>;
}

function Drawer({ item, onClose, children, title }) {
  return (
    <>
      <div onClick={onClose} style={{ position:'fixed', inset:0, background:'rgba(0,0,0,0.6)', zIndex:300 }} />
      <div className="slide-right" style={{ position:'fixed', top:0, right:0, bottom:0, width:440, background:C.surface, zIndex:301, overflowY:'auto', padding:24, borderLeft:`1px solid ${C.border}` }}>
        <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:20 }}>
          <h3 style={{ fontSize:17, fontWeight:700 }}>{title}</h3>
          <button onClick={onClose} style={{ border:'none', background:C.surfaceHigh, borderRadius:8, width:32, height:32, cursor:'pointer', color:C.textLight, fontSize:16 }}>✕</button>
        </div>
        {children}
      </div>
    </>
  );
}

function Modal({ title, onClose, children, width=520 }) {
  return (
    <div style={{ position:'fixed', inset:0, background:'rgba(0,0,0,0.6)', zIndex:400, display:'flex', alignItems:'center', justifyContent:'center' }}
      onClick={e=>{ if(e.target===e.currentTarget) onClose(); }}>
      <div className="fade-in" style={{ background:C.surface, borderRadius:16, width, maxWidth:'90vw', maxHeight:'85vh', overflowY:'auto', padding:28, border:`1px solid ${C.border}` }}>
        <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:20 }}>
          <h3 style={{ fontSize:17, fontWeight:700 }}>{title}</h3>
          <button onClick={onClose} style={{ border:'none', background:C.surfaceHigh, borderRadius:8, width:32, height:32, cursor:'pointer', color:C.textLight, fontSize:16 }}>✕</button>
        </div>
        {children}
      </div>

}

function FormRow({ label, children }) {
  return (
    <div style={{ marginBottom:16 }}>
      <label style={{ display:'block', fontSize:13, fontWeight:600, color:C.textLight, marginBottom:6 }}>{label}</label>
      {children}
    </div>

}

function DarkInput({ placeholder, value }) {
  const [v, setV] = useState(value||'');
  return <input value={v} onChange={e=>setV(e.target.value)} placeholder={placeholder}
    style={{ width:'100%', padding:'10px 12px', background:C.surfaceHigh, border:`1.5px solid ${C.border}`, borderRadius:8, fontSize:14, fontFamily:'inherit', outline:'none', color:C.text }} />;
}

function DarkSelect({ options }) {
  const [v, setV] = useState(options[0]);
  return (
    <select value={v} onChange={e=>setV(e.target.value)}
      style={{ width:'100%', padding:'10px 12px', background:C.surfaceHigh, border:`1.5px solid ${C.border}`, borderRadius:8, fontSize:14, fontFamily:'inherit', outline:'none', color:C.text }}>
      {options.map(o=><option key={o}>{o}</option>)}
    </select>
  );
}

function PrimaryBtn({ label, onClick, small }) {
  return (
    <button onClick={onClick} style={{
      background:`linear-gradient(135deg, ${C.primary}, ${C.primaryDark})`, color:'#fff', border:'none', borderRadius:8,
      padding: small?'7px 14px':'10px 20px', fontSize:small?13:14, fontWeight:600, cursor:'pointer', fontFamily:'inherit',
      boxShadow:`0 4px 14px ${C.primary}50`,
    }}>{label}</button>
  );
}

function SecBtn({ label, onClick, small }) {
  return (
    <button onClick={onClick} style={{
      background:'transparent', color:C.textLight, border:`1.5px solid ${C.border}`, borderRadius:8,
      padding: small?'6px 14px':'9px 20px', fontSize:small?13:14, fontWeight:600, cursor:'pointer', fontFamily:'inherit',
    }}>{label}</button>
  );
}

function Toast({ msg, onClose }) {
  useEffect(()=>{ const t=setTimeout(onClose, 2800); return ()=>clearTimeout(t); }, []);
  return (
    <div style={{ position:'fixed', bottom:28, right:28, background:C.surface, color:C.text, border:`1px solid ${C.border}`, padding:'12px 20px', borderRadius:10, fontSize:14, zIndex:999, boxShadow:'0 8px 30px rgba(0,0,0,0.4)' }}>
      ✅ {msg}
    </div>
  );
}

function InfoRow({ label, value }) {
  return (
    <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', padding:'10px 14px', background:C.surfaceHigh, borderRadius:8, marginBottom:8 }}>
      <span style={{ fontSize:13, color:C.textLight }}>{label}</span>
      <span style={{ fontSize:13, fontWeight:600 }}>{value}</span>
    </div>
  );
}

// ─── 자동이체 관리 ─────────────────────────────────────────────────
function PaymentBatch() {
  const [running, setRunning] = useState(false);
  const [progress, setProgress] = useState(0);
  const [done, setDone] = useState(false);
  const [filter, setFilter] = useState('전체');
  const [drawer, setDrawer] = useState(null);
  const [toast, setToast] = useState(null);
  const [modal, setModal] = useState(null);
  const intv = useRef(null);

  const start = () => {
    setRunning(true); setProgress(0); setDone(false);
    intv.current = setInterval(()=>{
      setProgress(p=>{ if(p>=100) { clearInterval(intv.current); setRunning(false); setDone(true); setToast('3월 자동이체 배치가 완료되었습니다.'); return 100; } return p+2; });
    }, 60);
  };

  const filtered = filter==='전체' ? BATCH_LOG : filter==='성공' ? BATCH_LOG.filter(b=>b.result==='성공') : BATCH_LOG.filter(b=>b.result!=='성공');
  const successN = BATCH_LOG.filter(b=>b.result==='성공').length;
  const failN = BATCH_LOG.filter(b=>b.result!=='성공').length;

  return (
    <div className="fade-in" style={{ padding:'24px 28px' }}>
      <Card style={{ marginBottom:16 }}>
        <div style={{ display:'flex', justifyContent:'space-between', alignItems:'flex-start' }}>
          <div>
            <h3 style={{ fontSize:16, fontWeight:700 }}>2026년 3월 수강료 자동이체</h3>
            <p style={{ fontSize:13, color:C.textLight, marginTop:4 }}>APScheduler 배치 스케줄 · WebSocket 실시간 진행률 스트리밍</p>
          </div>
          <div style={{ display:'flex', gap:8 }}>
            <SecBtn small label="SMS 발송 설정" onClick={()=>setModal('sms')} />
            <PrimaryBtn label={running?'처리 중...':'배치 실행'} onClick={running?null:start} />
          </div>
        </div>

        {(running || done) && (
          <div style={{ marginTop:20 }}>
            <div style={{ display:'flex', justifyContent:'space-between', marginBottom:8 }}>
              <span style={{ fontSize:13, fontWeight:600 }}>실시간 처리 현황</span>
              <span style={{ fontSize:13, color:C.textLight }}>{Math.round(progress/100*BATCH_LOG.length)}/{BATCH_LOG.length}건</span>
            </div>
            <div style={{ background:C.surfaceHigh, borderRadius:100, height:8 }}>
              <div style={{ height:'100%', width:`${progress}%`, background:done?C.success:`linear-gradient(90deg,${C.primary},${C.accent})`, borderRadius:100, transition:'width 100ms' }} />
            </div>
            {done && (
              <div style={{ display:'grid', gridTemplateColumns:'repeat(3,1fr)', gap:12, marginTop:16 }}>
                {[{label:'성공',n:successN,color:C.success,bg:C.successBg},{label:'실패',n:failN,color:C.danger,bg:C.dangerBg},{label:'보류',n:0,color:C.warning,bg:C.warningBg}].map(x=>(
                  <div key={x.label} style={{ background:x.bg, borderRadius:10, padding:'14px', textAlign:'center' }}>
                    <div style={{ fontSize:24, fontWeight:700, color:x.color }}>{x.n}</div>
                    <div style={{ fontSize:12, color:x.color, marginTop:2, opacity:0.8 }}>{x.label}</div>
                  </div>
                ))}
              </div>
            )}
          </div>
        )}
      </Card>

      <Card style={{ padding:0, overflow:'hidden' }}>
        <div style={{ padding:'14px 20px', borderBottom:`1px solid ${C.border}`, display:'flex', gap:8, alignItems:'center' }}>
          {['전체','성공','실패'].map(f=>(
            <button key={f} onClick={()=>setFilter(f)}
              style={{ padding:'6px 14px', borderRadius:20, border:`1.5px solid ${filter===f?C.primary:C.border}`,
                background:filter===f?C.primary+'20':'transparent', color:filter===f?C.accent:C.textLight,
                fontSize:13, fontWeight:filter===f?600:400, cursor:'pointer', fontFamily:'inherit' }}>
              {f}
            </button>
          ))}
          <div style={{ flex:1 }} />
          {failN>0 && <SecBtn small label={`실패 ${failN}건 재청구`} onClick={()=>setToast('재청구 요청이 등록되었습니다.')} />}
        </div>
        <table style={{ width:'100%', borderCollapse:'collapse' }}>
          <thead>
            <tr style={{ background:C.surfaceHigh }}>
              {['수강생','수강료','처리 결과','SMS','날짜',''].map(h=>(
                <th key={h} style={{ textAlign:'left', padding:'10px 14px', fontSize:12, color:C.textLight, fontWeight:600, borderBottom:`1px solid ${C.border}` }}>{h}</th>
              ))}
            </tr>
          </thead>
          <tbody>
            {filtered.map(b=>(
              <tr key={b.id} style={{ borderBottom:`1px solid ${C.border}`, cursor:'pointer', transition:'background 150ms' }}
                onMouseEnter={e=>e.currentTarget.style.background=C.surfaceHigh}
                onMouseLeave={e=>e.currentTarget.style.background='transparent'}
                onClick={()=>setDrawer(b)}>
                <td style={{ padding:'12px 14px', fontSize:14, fontWeight:600 }}>{b.name}</td>
                <td style={{ padding:'12px 14px', fontSize:13 }}>{b.fee}원</td>
                <td style={{ padding:'12px 14px' }}><StatusBadge status={b.result} /></td>
                <td style={{ padding:'12px 14px' }}><StatusBadge status={b.sms} /></td>
                <td style={{ padding:'12px 14px', fontSize:12, color:C.textLight }}>{b.date}</td>
                <td style={{ padding:'12px 14px' }}>
                  {b.result!=='성공' && (
                    <button onClick={e=>{e.stopPropagation(); setToast(`${b.name}님 재청구 요청이 등록되었습니다.`);}}
                      style={{ border:`1px solid ${C.danger}`, borderRadius:6, padding:'4px 10px', fontSize:12, cursor:'pointer', color:C.danger, background:'transparent', fontFamily:'inherit' }}>
                      재청구
                    </button>
                  )}
                </td>
              </tr>
            ))}
          </tbody>
        </table>
      </Card>

      {drawer && (
        <Drawer title="처리 상세" onClose={()=>setDrawer(null)}>
          <InfoRow label="수강생명" value={drawer.name} />
          <InfoRow label="수강료" value={drawer.fee+'원'} />
          <InfoRow label="처리 결과" value={<StatusBadge status={drawer.result} />} />
          <InfoRow label="SMS 발송" value={<StatusBadge status={drawer.sms} />} />
          <InfoRow label="처리일시" value={drawer.date+' 09:00'} />
          {drawer.result!=='성공' && (
            <div style={{ marginTop:16 }}><PrimaryBtn label="재청구 요청" onClick={()=>{setDrawer(null); setToast('재청구 요청이 등록되었습니다.');}} /></div>
          )}
        </Drawer>
      )}

      {modal==='sms' && (
        <Modal title="SMS 발송 설정" onClose={()=>setModal(null)} width={440}>
          <FormRow label="발송 시점"><DarkSelect options={['배치 완료 즉시','당일 오전 10시','다음날 오전 9시']} /></FormRow>
          <FormRow label="발송 대상"><DarkSelect options={['미납자 전원','잔액 부족만','계좌 오류만']} /></FormRow>
          <FormRow label="발송 문구">
            <textarea rows={4} defaultValue="[PayCycle] 안녕하세요. {이름}님, {월}월 수강료 {금액}원 납부가 처리되지 않았습니다. 계좌를 확인해주세요."
              style={{ width:'100%', padding:'10px 12px', background:C.surfaceHigh, border:`1.5px solid ${C.border}`, borderRadius:8, fontSize:13, fontFamily:'inherit', resize:'none', outline:'none', color:C.text }} />
          </FormRow>
          <div style={{ display:'flex', gap:8 }}>
            <PrimaryBtn label="저장" onClick={()=>{setModal(null); setToast('SMS 발송 설정이 저장되었습니다.');}} />
            <SecBtn label="취소" onClick={()=>setModal(null)} />
          </div>
        </Modal>
      )}

      {toast && <Toast msg={toast} onClose={()=>setToast(null)} />}
    </div>
  );
}

            <div key={s.id} style={{ display:'flex', justifyContent:'space-between', alignItems:'center', padding:'10px 14px', background:C.surfaceHigh, borderRadius:8, marginBottom:8 }}>
              <div style={{ fontWeight:600 }}>{s.name}</div>
              <StatusBadge status={s.status} />
            </div>
          ))}
        </Modal>
      )}

      {modal && modal.type==='edit' && (
        <Modal title="강좌 수정" onClose={()=>setModal(null)}>
          <FormRow label="강좌명"><DarkInput value={modal.data.name} /></FormRow>
          <FormRow label="정원"><DarkInput value={String(modal.data.capacity)} /></FormRow>
          <FormRow label="월 수강료"><DarkInput value={modal.data.fee} /></FormRow>
          <div style={{ display:'flex', gap:8 }}>
            <PrimaryBtn label="저장" onClick={()=>{setModal(null); setToast('강좌 정보가 수정되었습니다.');}} />
            <SecBtn label="취소" onClick={()=>setModal(null)} />
          </div>
        </Modal>
      )}

      {toast && <Toast msg={toast} onClose={()=>setToast(null)} />}
    </div>
  );
}
