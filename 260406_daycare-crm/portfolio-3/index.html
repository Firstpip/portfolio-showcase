  { id:'PM002', name:'신용카드 결제', type:'card', tenants:3, members:123, status:'운영중', successRate:'98.7%', lastBatch:'2026-03-01' },

const PIE_COLORS = [C.primary, C.blue, C.orange];

// ─── 공통 컴포넌트 ──────────────────────────────────────────────────
function Badge({ label, color, bg }) {
  return <span style={{ display:'inline-flex', alignItems:'center', padding:'3px 10px', borderRadius:20, fontSize:12, fontWeight:600, color, background:bg }}>{label}</span>;
}

function StatusBadge({ status }) {
  const map = {
    '정상':     { color:'#065F46', bg:'#D1FAE5' },
    '미납':     { color:'#991B1B', bg:'#FEE2E2' },
    '운영중':   { color:'#065F46', bg:'#D1FAE5' },
    '정산완료': { color:'#065F46', bg:'#D1FAE5' },
    '정산 중':  { color:'#92400E', bg:'#FEF3C7' },
    '미납 보류':{ color:'#991B1B', bg:'#FEE2E2' },
    'Pro':        { color:'#5B21B6', bg:'#EDE9FE' },
    'Enterprise': { color:'#1E40AF', bg:'#EFF6FF' },
    'Basic':      { color:'#374151', bg:'#F3F4F6' },
  };
  const s = map[status] || { color:C.textLight, bg:C.bg };
  return <Badge label={status} color={s.color} bg={s.bg} />;
}

function KpiCard({ label, value, icon, color, sub }) {
  return (
    <div style={{ background:C.surface, borderRadius:16, padding:18, border:`1.5px solid ${C.border}`, display:'flex', gap:14, alignItems:'center' }}>
      <div style={{ width:44, height:44, borderRadius:12, background:color+'15', display:'flex', alignItems:'center', justifyContent:'center', fontSize:20, flexShrink:0 }}>{icon}</div>
      <div>
        <div style={{ fontSize:11, color:C.textLight, fontWeight:500, marginBottom:2 }}>{label}</div>
        <div style={{ fontSize:22, fontWeight:700, color:C.text }}>{value}</div>
        {sub && <div style={{ fontSize:11, color:C.textLight, marginTop:1 }}>{sub}</div>}
      </div>
    </div>
  );
}

function Modal({ title, onClose, children, width=520 }) {
  return (
    <div style={{ position:'fixed', inset:0, background:'rgba(0,0,0,0.4)', zIndex:400, display:'flex', alignItems:'center', justifyContent:'center' }}
      onClick={e=>{ if(e.target===e.currentTarget) onClose(); }}>
      <div className="fade-in" style={{ background:C.surface, borderRadius:20, width, maxWidth:'90vw', maxHeight:'85vh', overflowY:'auto', padding:28, boxShadow:'0 20px 60px rgba(0,0,0,0.15)', border:`1.5px solid ${C.border}` }}>
        <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:20 }}>
          <h3 style={{ fontSize:17, fontWeight:700 }}>{title}</h3>
          <button onClick={onClose} style={{ border:'none', background:C.bg, borderRadius:8, width:32, height:32, cursor:'pointer', color:C.textLight, fontSize:16 }}>✕</button>
        </div>
        {children}
      </div>
    </div>
  );
}

function FormRow({ label, children }) {
  return (
    <div style={{ marginBottom:16 }}>
      <label style={{ display:'block', fontSize:13, fontWeight:600, color:C.text, marginBottom:6 }}>{label}</label>
      {children}
    </div>
  );
}

function GreenInput({ placeholder, value }) {
  const [v, setV] = useState(value||'');
  return <input value={v} onChange={e=>setV(e.target.value)} placeholder={placeholder}
    style={{ width:'100%', padding:'10px 12px', background:C.bg, border:`1.5px solid ${C.borderMid}`, borderRadius:10, fontSize:14, fontFamily:'inherit', outline:'none', color:C.text }} />;
}

function GreenSelect({ options }) {
  const [v, setV] = useState(options[0]);
  return (
    <select value={v} onChange={e=>setV(e.target.value)}
      style={{ width:'100%', padding:'10px 12px', background:C.bg, border:`1.5px solid ${C.borderMid}`, borderRadius:10, fontSize:14, fontFamily:'inherit', outline:'none', color:C.text }}>
      {options.map(o=><option key={o}>{o}</option>)}
    </select>
  );
}

function PrimaryBtn({ label, onClick, small }) {
  return (
    <button onClick={onClick} style={{
      background:C.primary, color:'#fff', border:'none', borderRadius:10,
      padding: small?'7px 14px':'10px 20px', fontSize:small?13:14, fontWeight:600, cursor:'pointer', fontFamily:'inherit',
    }}>{label}</button>
  );
}

function SecBtn({ label, onClick, small }) {
  return (
    <button onClick={onClick} style={{
      background:'transparent', color:C.textMid, border:`1.5px solid ${C.borderMid}`, borderRadius:10,
      padding: small?'6px 14px':'9px 20px', fontSize:small?13:14, fontWeight:600, cursor:'pointer', fontFamily:'inherit',
    }}>{label}</button>
  );
}

function Toast({ msg, onClose }) {
  useEffect(()=>{ const t=setTimeout(onClose, 2800); return ()=>clearTimeout(t); }, []);
  return (
    <div style={{ position:'fixed', bottom:24, right:24, background:'#064E3B', color:'#fff', padding:'12px 20px', borderRadius:12, fontSize:14, zIndex:999 }}>
      ✅ {msg}
    </div>
  );
}

function InfoRow({ label, value }) {
  return (
    <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', padding:'10px 14px', background:C.bg, borderRadius:10, marginBottom:8 }}>
      <span style={{ fontSize:13, color:C.textLight }}>{label}</span>
      <span style={{ fontSize:13, fontWeight:600, color:C.text }}>{value}</span>
    </div>
  );
}

// ─── 섹션 컴포넌트 ──────────────────────────────────────────────────

// 센터 통합 현황
function CenterOverview({ selected, setSelected }) {
  const [modal, setModal] = useState(null);

  const tenantMembers = TENANTS.reduce((s,t)=>s+t.members, 0);
  const tenantRevenue = '26,355,000';

  return (

        <KpiCard label="등록 테넌트" value={`${TENANTS.length}개`} icon="🏢" color={C.primary} />
        <KpiCard label="전체 센터" value="15개" icon="🏫" color={C.blue} sub="5개 체인 운영 중" />

          <div style={{ fontSize:13, fontWeight:600, color:C.textLight, marginBottom:8, padding:'0 2px' }}>테넌트 ({TENANTS.length}개)</div>
          <div style={{ display:'flex', flexDirection:'column', gap:6 }}>
            {TENANTS.map(t=>(
              <div key={t.id}

        {/* 상세 (디테일) */}

              <div style={{ background:C.surface, borderRadius:16, padding:20, border:`1.5px solid ${C.border}`, marginBottom:12 }}>

                  <div style={{ width:48, height:48, borderRadius:14, background:C.primaryLight, display:'flex', alignItems:'center', justifyContent:'center', fontSize:22 }}>🏢</div>
                  <div>
                    <div style={{ fontSize:16, fontWeight:700 }}>{selected.name}</div>
                    <StatusBadge status={selected.plan} />
                  </div>
                </div>
                <InfoRow label="담당자" value={selected.contact} />
                <InfoRow label="연락처" value={selected.phone} />
                <InfoRow label="센터 수" value={`${selected.centers}개`} />
                <InfoRow label="전체 회원" value={`${selected.members}명`} />
                <InfoRow label="월 수익" value={selected.monthlyRevenue+'원'} />
                <InfoRow label="결제일" value={`매월 ${selected.accountingDate}일`} />
                <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', padding:'10px 14px', background:C.bg, borderRadius:10, marginBottom:8 }}>

                <div style={{ fontSize:13, fontWeight:600, marginBottom:10 }}>소속 센터</div>
                {CENTER_DATA.filter(c=>c.tenant===selected.id).length > 0

                    <div key={c.id} style={{ display:'flex', justifyContent:'space-between', alignItems:'center', padding:'10px 12px', background:C.bg, borderRadius:10, marginBottom:6 }}>

            <PrimaryBtn label="저장" onClick={()=>setModal(null)} />

        </Modal>
      )}
      {modal && modal.type==='settlement' && (
        <Modal title={`${modal.data.name} 정산 내역`} onClose={()=>setModal(null)}>
          {SETTLEMENT_LIST.filter(s=>s.tenant===modal.data.name).map(s=>(

                <div style={{ fontSize:12, color:C.textLight }}>{s.method}</div>
              </div>
              <div style={{ textAlign:'right' }}>
                <div style={{ fontWeight:700, fontSize:14, color:C.primary }}>{s.total}원</div>

            <div style={{ textAlign:'center', color:C.textLight, padding:20 }}>정산 내역이 없습니다</div>

// 다중 결제 수단
function PaymentMethods({ selected, setSelected }) {
  const [modal, setModal] = useState(null);
  const [toast, setToast] = useState(null);

  return (
    <div className="fade-in">
      <div style={{ display:'flex', justifyContent:'flex-end', marginBottom:12 }}>
        <PrimaryBtn label="+ 결제 수단 추가" onClick={()=>setModal('add')} />

      <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:12 }}>
        {/* 결제 수단 목록 (마스터) */}

          <div style={{ fontSize:13, fontWeight:600, color:C.textLight, marginBottom:8 }}>결제 수단 ({PAYMENT_METHODS.length}개)</div>

              return (
                <div key={pm.id}
                  style={{ background:C.surface, borderRadius:14, padding:'16px', border:`1.5px solid ${selected?.id===pm.id?C.primary:C.border}`, cursor:'pointer', transition:'all 160ms' }}
                  onClick={()=>setSelected(pm)}>
                  <div style={{ display:'flex', gap:12, alignItems:'center', marginBottom:10 }}>
                    <div style={{ width:40, height:40, borderRadius:12, background:colors[pm.type]+'15', display:'flex', alignItems:'center', justifyContent:'center', fontSize:18 }}>
                      {icons[pm.type]}
                    </div>
                    <div>
                      <div style={{ fontSize:14, fontWeight:700 }}>{pm.name}</div>
                      <div style={{ fontSize:12, color:C.textLight }}>테넌트 {pm.tenants}개 · 회원 {pm.members}명</div>
                    </div>
                    <StatusBadge status={pm.status} />
                  </div>
                  <div style={{ display:'flex', gap:16 }}>
                    <div style={{ fontSize:12, color:C.textLight }}>성공률 <span style={{ color:C.primary, fontWeight:700 }}>{pm.successRate}</span></div>
                    <div style={{ fontSize:12, color:C.textLight }}>마지막 배치 <span style={{ fontWeight:600 }}>{pm.lastBatch}</span></div>
                  </div>
                </div>
              );
            })}
          </div>
        </div>

        {/* 상세 */}
        <div>
          {selected ? (
            <div className="fade-in">

          ))}
        </div>
        <div style={{ padding:'12px 16px', borderTop:`1px solid ${C.border}` }}>
          <div style={{ display:'flex', alignItems:'center', gap:8 }}>
            <div style={{ width:32, height:32, borderRadius:'50%', background:C.primaryLight, display:'flex', alignItems:'center', justifyContent:'center', color:C.primary, fontSize:13, fontWeight:700 }}>관</div>
            <div>
              <div style={{ fontSize:12, fontWeight:600, color:C.text }}>슈퍼 관리자</div>
              <div style={{ fontSize:10, color:C.textLight }}>super@carehub.kr</div>
            </div>
          </div>
        </div>
      </nav>

      {/* 메인 */}
      <div style={{ flex:1, display:'flex', flexDirection:'column', overflow:'hidden' }}>
        {/* 앱바 */}
        <header style={{ height:40, background:C.appbar, borderBottom:`1.5px solid ${C.border}`, display:'flex', alignItems:'center', padding:'0 16px', gap:8, flexShrink:0 }}>
          <span style={{ fontSize:12, color:C.textLight }}>{currentNav?.label}</span>
          <div style={{ flex:1 }} />
          <button style={{ border:'none', background:'none', cursor:'pointer', fontSize:15 }}>🔍</button>
          <div style={{ width:28, height:28, borderRadius:'50%', background:C.primaryLight, display:'flex', alignItems:'center', justifyContent:'center', fontSize:12, fontWeight:700, color:C.primary }}>관</div>
        </header>

        {/* 인라인 탭 스트립 */}
        <div style={{ height:38, background:C.appbar, borderBottom:`1.5px solid ${C.border}`, display:'flex', alignItems:'flex-end', padding:'0 16px', gap:0, flexShrink:0 }}>
          {(SECTION_TABS[section]||[]).map((t,i)=>(
            <button key={t.label} onClick={()=>setTab(i)} style={{
              padding:'0 14px', height:'100%', border:'none', background:'transparent', cursor:'pointer', fontFamily:'inherit',
              color: tab===i ? C.primary : C.textLight,
              fontSize:13, fontWeight: tab===i ? 600 : 400,
              borderBottom: tab===i ? `2px solid ${C.primary}` : '2px solid transparent',
              marginBottom:'-1.5px', transition:'all 150ms',
            }}>{t.label}</button>
          ))}
        </div>

        {/* 콘텐츠 워크스페이스 */}
        <div style={{ flex:1, overflowY:'auto', padding:'16px 20px' }}>
          {CONTENT[section]}
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
