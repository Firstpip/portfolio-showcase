/* ─── Components ─── */
const Stat=({label,value,sub,color,icon})=>(
  <div style={{background:C.surface,borderRadius:12,padding:'20px 24px',flex:1,minWidth:160,boxShadow:'0 1px 4px rgba(0,0,0,.06)'}}>
    <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:8}}>
      <span style={{fontSize:13,color:C.textLight,fontWeight:500}}>{label}</span>
      <span style={{fontSize:20}}>{icon}</span>
    </div>
    <div style={{fontSize:26,fontWeight:700,color:color||C.text}}>{value}</div>
    {sub&&<div style={{fontSize:12,color:C.textMuted,marginTop:4}}>{sub}</div>}
  </div>
);

const Badge=({s})=>{
  const map={
    '활성':{bg:'#DCFCE7',c:'#15803D'},'휴면':{bg:'#F1F5F9',c:'#64748B'},
    '승인':{bg:'#DBEAFE',c:'#1D4ED8'},'심사중':{bg:'#FEF9C3',c:'#A16207'},'반려':{bg:'#FEE2E2',c:'#B91C1C'},
    '노출':{bg:'#DCFCE7',c:'#15803D'},'블라인드':{bg:'#FEE2E2',c:'#B91C1C'},
    '요청중':{bg:'#EDE9FE',c:'#6D28D9'},'제안받는중':{bg:'#DBEAFE',c:'#1D4ED8'},
    '계약확정':{bg:'#D1FAE5',c:'#065F46'},'완료':{bg:'#F1F5F9',c:'#475569'},
    'naver':{bg:'#DCFCE7',c:'#15803D'},'instagram':{bg:'#FDF4FF',c:'#9333EA'},'youtube':{bg:'#FEE2E2',c:'#B91C1C'},
  };
  const t=map[s]||{bg:'#F1F5F9',c:'#64748B'};
  return <span style={{background:t.bg,color:t.c,fontSize:11,fontWeight:600,padding:'2px 8px',borderRadius:20}}>{s}</span>;
};

function Dashboard(){

      <div style={{display:'flex',gap:16,marginBottom:24,flexWrap:'wrap'}}>
        <Stat label="총 회원 수" value="1,284" sub="수요자 892 · 공급자 144 · 심사중 248" icon="👤" color={C.primary}/>
        <Stat label="이번 달 견적 요청" value="128건" sub="전월 대비 +14건" icon="📋" color={C.accent}/>
        <Stat label="포인트 유통량" value="48,200P" sub="충전 31,200 · 차감 17,000" icon="💰" color="#7C3AED"/>

      </div>
      <div style={{display:'grid',gridTemplateColumns:'2fr 1fr',gap:20,marginBottom:20}}>
        <div style={{background:C.surface,borderRadius:12,padding:'20px 24px',boxShadow:'0 1px 4px rgba(0,0,0,.06)'}}>
          <div style={{fontWeight:600,marginBottom:16,fontSize:14}}>일별 견적 요청 · 계약 추이</div>
          <ResponsiveContainer width="100%" height={200}>
            <AreaChart data={dailyQuotes}>
              <CartesianGrid strokeDasharray="3 3" stroke="#F1F5F9"/>
              <XAxis dataKey="d" tick={{fontSize:11,fill:C.textMuted}}/>
              <YAxis tick={{fontSize:11,fill:C.textMuted}}/>
              <Tooltip contentStyle={{fontSize:12,borderRadius:8,border:`1px solid ${C.border}`}}/>
              <Area type="monotone" dataKey="req" name="견적 요청" stroke={C.primary} fill="#DBEAFE" strokeWidth={2}/>
              <Area type="monotone" dataKey="contract" name="계약 완료" stroke={C.success} fill="#DCFCE7" strokeWidth={2}/>
            </AreaChart>
          </ResponsiveContainer>
        </div>
        <div style={{background:C.surface,borderRadius:12,padding:'20px 24px',boxShadow:'0 1px 4px rgba(0,0,0,.06)'}}>
          <div style={{fontWeight:600,marginBottom:16,fontSize:14}}>카테고리별 요청 분포</div>
          <ResponsiveContainer width="100%" height={160}>
            <PieChart>

          </ResponsiveContainer>
          <div style={{display:'flex',flexDirection:'column',gap:4,marginTop:8}}>
            {categoryDist.map((e,i)=>(
              <div key={i} style={{display:'flex',alignItems:'center',gap:6,fontSize:11,color:C.textLight}}>
                <span style={{width:8,height:8,borderRadius:2,background:e.color,flexShrink:0}}/>
                <span style={{flex:1}}>{e.name}</span><span style={{fontWeight:600}}>{e.value}%</span>

            <Bar dataKey="fee" name="수수료 차감" fill={C.accent} radius={[4,4,0,0]}/>
          </BarChart>
        </ResponsiveContainer>
      </div>
    </div>

function Members(){

    background:tab===t?C.primary:'transparent',color:tab===t?'#fff':C.textLight});
  return(
    <div className="page" style={{padding:'28px 32px',overflowY:'auto',height:'calc(100vh - 56px)'}}>

          <button style={tabSt('supplier')} onClick={()=>setTab('supplier')}>공급자 (144)</button>
        </div>
      </div>
      {tab==='buyer'?(
        <div style={{background:C.surface,borderRadius:12,overflow:'hidden',boxShadow:'0 1px 4px rgba(0,0,0,.06)'}}>
          <table style={{width:'100%',borderCollapse:'collapse'}}>
            <thead>
              <tr style={{background:'#F8FAFC'}}>
                {['ID','이름','연락처','가입일','견적 요청','상태'].map(h=>(
                  <th key={h} style={{padding:'12px 16px',fontSize:12,fontWeight:600,color:C.textLight,textAlign:'left',borderBottom:`1px solid ${C.border}`}}>{h}</th>
                ))}
              </tr>

            <tbody>
              {MEMBERS_BUYER.map(m=>(
                <tr key={m.id} style={{borderBottom:`1px solid ${C.border}`}}>
                  <td style={{padding:'12px 16px',fontSize:12,color:C.textMuted,fontFamily:'monospace'}}>{m.id}</td>
                  <td style={{padding:'12px 16px',fontSize:13,fontWeight:600}}>{m.name}</td>
                  <td style={{padding:'12px 16px',fontSize:12,color:C.textLight}}>{m.phone}</td>
                  <td style={{padding:'12px 16px',fontSize:12,color:C.textLight}}>{m.joined}</td>
                  <td style={{padding:'12px 16px',fontSize:13,fontWeight:600,color:m.requests>0?C.primary:C.textMuted}}>{m.requests}건</td>

        <div style={{background:C.surface,borderRadius:12,overflow:'hidden',boxShadow:'0 1px 4px rgba(0,0,0,.06)'}}>
          <table style={{width:'100%',borderCollapse:'collapse'}}>
            <thead>
              <tr style={{background:'#F8FAFC'}}>
                {['ID','업체명','지역','시공분야','계약','포인트','승인 상태',''].map(h=>(
                  <th key={h} style={{padding:'12px 16px',fontSize:12,fontWeight:600,color:C.textLight,textAlign:'left',borderBottom:`1px solid ${C.border}`}}>{h}</th>
                ))}
              </tr>
            </thead>
            <tbody>
              {MEMBERS_SUPPLIER.map(s=>(
                <tr key={s.id} style={{borderBottom:`1px solid ${C.border}`}}>
                  <td style={{padding:'12px 16px',fontSize:12,color:C.textMuted,fontFamily:'monospace'}}>{s.id}</td>
                  <td style={{padding:'12px 16px',fontSize:13,fontWeight:600}}>{s.name}</td>
                  <td style={{padding:'12px 16px',fontSize:12,color:C.textLight}}>{s.area}</td>
                  <td style={{padding:'12px 16px',fontSize:12,color:C.textLight}}>{s.field}</td>
                  <td style={{padding:'12px 16px',fontSize:13,fontWeight:600,color:C.primary}}>{s.contracts}건</td>
                  <td style={{padding:'12px 16px',fontSize:12,color:C.textLight}}>{s.points>0?s.points.toLocaleString()+'P':'—'}</td>
                  <td style={{padding:'12px 16px'}}><Badge s={s.status}/></td>

                      <div style={{display:'flex',gap:6}}>
                        <button style={{fontSize:11,padding:'4px 10px',borderRadius:6,border:'none',background:C.primary,color:'#fff',cursor:'pointer',fontWeight:600}}>승인</button>
                        <button style={{fontSize:11,padding:'4px 10px',borderRadius:6,border:'none',background:'#FEE2E2',color:C.danger,cursor:'pointer',fontWeight:600}}>반려</button>

function Feed(){
  const [filter,setFilter]=useState('전체');
  const cats=['전체','도배·벽지','욕실 수리','타일·바닥','전기·조명','도어·창호'];
  const filtered=filter==='전체'?FEEDS:FEEDS.filter(f=>f.category===filter);
  return(
    <div className="page" style={{padding:'28px 32px',overflowY:'auto',height:'calc(100vh - 56px)'}}>
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:20}}>
        <h2 style={{fontSize:20,fontWeight:700}}>콘텐츠 피드</h2>
        <button style={{fontSize:12,padding:'8px 16px',borderRadius:8,border:'none',background:C.primary,color:'#fff',cursor:'pointer',fontWeight:600}}>+ 콘텐츠 등록</button>
      </div>
      <div style={{display:'flex',gap:8,marginBottom:20,flexWrap:'wrap'}}>
        {cats.map(c=>(
          <button key={c} onClick={()=>setFilter(c)} style={{
            fontSize:12,padding:'6px 14px',borderRadius:20,cursor:'pointer',fontWeight:600,
            border:`1px solid ${filter===c?C.primary:C.border}`,
            background:filter===c?C.primary:'#fff',color:filter===c?'#fff':C.textLight
          }}>{c}</button>
        ))}
      </div>
      <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:16}}>
        {filtered.map(f=>(
          <div key={f.id} style={{background:C.surface,borderRadius:12,overflow:'hidden',boxShadow:'0 1px 4px rgba(0,0,0,.06)'}}>
            <div style={{height:100,background:`linear-gradient(135deg,${C.primary}22,${C.accent}22)`,display:'flex',alignItems:'center',justifyContent:'center',fontSize:36,borderBottom:`1px solid ${C.border}`}}>
              {f.img}
            </div>
            <div style={{padding:'14px 16px'}}>
              <div style={{display:'flex',alignItems:'center',gap:6,marginBottom:8}}>
                <Badge s={f.source}/><Badge s={f.status}/>
              </div>
              <div style={{fontSize:13,fontWeight:600,lineHeight:1.4,marginBottom:8,color:C.text}}>{f.title}</div>
              <div style={{fontSize:11,color:C.textMuted,marginBottom:4}}>{f.supplier} · {f.category}</div>
              <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginTop:10}}>
                <span style={{fontSize:11,color:C.textMuted}}>👁 {f.views.toLocaleString()}회</span>
                <div style={{display:'flex',gap:6}}>
                  <button style={{fontSize:11,padding:'4px 8px',borderRadius:6,border:`1px solid ${C.border}`,background:'#fff',cursor:'pointer',color:C.textLight}}>수정</button>
                  {f.status==='노출'
                    ?<button style={{fontSize:11,padding:'4px 8px',borderRadius:6,border:'none',background:'#FEE2E2',color:C.danger,cursor:'pointer',fontWeight:600}}>블라인드</button>
                    :<button style={{fontSize:11,padding:'4px 8px',borderRadius:6,border:'none',background:'#DCFCE7',color:C.success,cursor:'pointer',fontWeight:600}}>노출</button>
                  }
                </div>
              </div>
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}

function Quotes(){
  const statusColors={'요청중':'#7C3AED','제안받는중':C.primary,'계약확정':C.success,'완료':C.textMuted};
  const [sel,setSel]=useState(null);
  return(
    <div className="page" style={{padding:'28px 32px',overflowY:'auto',height:'calc(100vh - 56px)'}}>
      <h2 style={{fontSize:20,fontWeight:700,marginBottom:20}}>견적 관리</h2>
      <div style={{display:'flex',gap:12,marginBottom:20}}>
        {[['요청중',2,'#EDE9FE','#6D28D9'],['제안받는중',2,'#DBEAFE','#1D4ED8'],['계약확정',1,'#D1FAE5','#065F46'],['완료',2,'#F1F5F9','#64748B']].map(([s,c,bg,col])=>(
          <div key={s} style={{flex:1,background:bg,borderRadius:12,padding:'16px 20px',textAlign:'center'}}>
            <div style={{fontSize:22,fontWeight:700,color:col}}>{c}</div>
            <div style={{fontSize:12,color:col,fontWeight:500,marginTop:4}}>{s}</div>
          </div>
        ))}
      </div>
      <div style={{background:C.surface,borderRadius:12,overflow:'hidden',boxShadow:'0 1px 4px rgba(0,0,0,.06)'}}>
        <table style={{width:'100%',borderCollapse:'collapse'}}>
          <thead>
            <tr style={{background:'#F8FAFC'}}>
              {['견적 번호','수요자','주소','카테고리','희망 예산','현장사진','연결 업체','상태','요청일'].map(h=>(
                <th key={h} style={{padding:'12px 14px',fontSize:11,fontWeight:600,color:C.textLight,textAlign:'left',borderBottom:`1px solid ${C.border}`,whiteSpace:'nowrap'}}>{h}</th>
              ))}
            </tr>
          </thead>
          <tbody>
            {QUOTES.map(q=>(
              <tr key={q.id} style={{borderBottom:`1px solid ${C.border}`,cursor:'pointer',background:sel===q.id?'#F8FAFC':'#fff'}}
                  onClick={()=>setSel(sel===q.id?null:q.id)}>
                <td style={{padding:'12px 14px',fontSize:12,color:C.textMuted,fontFamily:'monospace'}}>{q.id}</td>
                <td style={{padding:'12px 14px',fontSize:13,fontWeight:600}}>{q.buyer}</td>
                <td style={{padding:'12px 14px',fontSize:11,color:C.textLight,maxWidth:160,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{q.address}</td>
                <td style={{padding:'12px 14px',fontSize:12,color:C.textLight}}>{q.category}</td>
                <td style={{padding:'12px 14px',fontSize:12,fontWeight:600,color:C.primary}}>{q.budget}</td>
                <td style={{padding:'12px 14px',fontSize:12,color:C.textLight,textAlign:'center'}}>{q.photos}장</td>
                <td style={{padding:'12px 14px',fontSize:12,color:q.supplier==='-'?C.textMuted:C.text}}>{q.supplier}</td>
                <td style={{padding:'12px 14px'}}><Badge s={q.status}/></td>
                <td style={{padding:'12px 14px',fontSize:11,color:C.textMuted}}>{q.date}</td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>
      {sel&&(()=>{
        const q=QUOTES.find(x=>x.id===sel);
        return(
          <div style={{marginTop:16,background:C.surface,borderRadius:12,padding:'20px 24px',boxShadow:'0 1px 4px rgba(0,0,0,.06)'}}>
            <div style={{fontWeight:700,marginBottom:12,fontSize:14}}>견적 상세 — {q.id}</div>
            <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:12}}>
              {[['수요자',q.buyer],['주소',q.address],['카테고리',q.category],['희망 예산',q.budget],['현장 사진',q.photos+'장'],['연결 업체',q.supplier],['요청일',q.date],['상태',q.status]].map(([k,v])=>(
                <div key={k}>
                  <div style={{fontSize:11,color:C.textMuted,marginBottom:2}}>{k}</div>
                  <div style={{fontSize:13,fontWeight:600,color:C.text}}>{v}</div>
                </div>
              ))}
            </div>
            {q.status==='제안받는중'&&(
              <div style={{marginTop:14,display:'flex',gap:8}}>
                <button style={{fontSize:12,padding:'8px 20px',borderRadius:8,border:'none',background:C.primary,color:'#fff',cursor:'pointer',fontWeight:600}}>계약 확정 처리</button>
                <button style={{fontSize:12,padding:'8px 20px',borderRadius:8,border:`1px solid ${C.border}`,background:'#fff',cursor:'pointer',color:C.textLight}}>닫기</button>
              </div>
            )}
          </div>
        );
      })()}
    </div>
  );
}

const SCREENS={dashboard:Dashboard,members:Members,feed:Feed,quotes:Quotes};

          <div style={{fontSize:16,fontWeight:700,color:'#fff',letterSpacing:'-0.3px'}}>홈케어 O2O</div>

        <nav style={{flex:1,padding:'16px 12px',display:'flex',flexDirection:'column',gap:4}}>
          {MENU.map(m=>(

            }}>

          ))}
        </nav>
        <div style={{padding:'16px 24px',borderTop:'1px solid rgba(255,255,255,.06)'}}>
          <div style={{fontSize:11,color:'#475569',textAlign:'center',lineHeight:1.5}}>
            구현 데모 · 자체 개발 프로젝트<br/>
            <span style={{color:'#2563EB',fontWeight:600}}>React + Node.js + PostgreSQL</span>
          </div>
        </div>
      </aside>
      {/* Main */}
      <div style={{flex:1,display:'flex',flexDirection:'column',minWidth:0}}>
        <header style={{height:56,background:C.surface,borderBottom:`1px solid ${C.border}`,display:'flex',alignItems:'center',padding:'0 24px',justifyContent:'space-between',flexShrink:0}}>
          <div style={{fontSize:13,color:C.textLight}}>
            {MENU.find(m=>m.id===active)?.icon} <span style={{marginLeft:6}}>{MENU.find(m=>m.id===active)?.label}</span>
          </div>
          <div style={{display:'flex',alignItems:'center',gap:16}}>
            <span style={{fontSize:12,color:C.textMuted}}>2026-04-06 09:24</span>
            <div style={{width:32,height:32,borderRadius:8,background:C.primary,display:'flex',alignItems:'center',justifyContent:'center',color:'#fff',fontSize:13,fontWeight:700}}>관</div>
          </div>
        </header>
        <main style={{flex:1,overflow:'hidden'}}>
          <Screen/>
        </main>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
