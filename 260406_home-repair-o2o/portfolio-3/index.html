    '활성':{bg:'#D1FAE5',c:'#065F46'},'긴급':{bg:'#FEE2E2',c:'#B91C1C'},'보통':{bg:'#DBEAFE',c:'#1D4ED8'},

      <div style={{display:'grid',gridTemplateColumns:'5fr 4fr',gap:20}}>
        <div>
          <div style={{fontWeight:600,fontSize:13,color:C.textLight,marginBottom:10}}>전체 업체 성과 리더보드</div>
          <div style={{display:'flex',flexDirection:'column',gap:8}}>
            {PERFORMANCE.map((p,i)=>(
              <div key={p.name} onClick={()=>setSel(i)} style={{background:sel===i?C.primaryLight:C.surface,borderRadius:12,padding:'14px 18px',cursor:'pointer',border:`1px solid ${sel===i?C.primary:C.border}`,display:'flex',alignItems:'center',gap:14,transition:'all .2s'}}>
                <div style={{width:28,height:28,borderRadius:8,background:i<3?C.primary:C.bg,color:i<3?'#fff':C.textMuted,display:'flex',alignItems:'center',justifyContent:'center',fontSize:13,fontWeight:700,flexShrink:0,border:`1px solid ${C.border}`}}>{i+1}</div>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:6}}>
                    <span style={{fontSize:14,fontWeight:700}}>{p.name}</span>
                    <Badge s={p.grade}/>
                    <span style={{fontSize:14,color:trendC[p.trend],fontWeight:700}}>{p.trend}</span>
                  </div>
                  <div style={{display:'flex',gap:16}}>
                    {[['응답',p.response+'%'],['완료',p.complete+'%'],['재이용',p.reuse+'%']].map(([k,v])=>(
                      <span key={k} style={{fontSize:11,color:C.textMuted}}>{k} <strong style={{color:C.text}}>{v}</strong></span>
                    ))}
                  </div>
                </div>
                <div style={{fontSize:22,fontWeight:800,color:i===0?C.primary:C.textLight,flexShrink:0}}>{p.score}</div>
              </div>
            ))}
          </div>
        </div>
        <div>
          <div style={{background:C.surface,borderRadius:12,padding:'20px',border:`1px solid ${C.border}`,marginBottom:14}}>
            <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:14}}>
              <div style={{fontWeight:700,fontSize:14}}>{p.name}</div>
              <Badge s={p.grade}/>
            </div>
            <ResponsiveContainer width="100%" height={200}>
              <RadarChart data={rd}>
                <PolarGrid stroke={C.border}/>
                <PolarAngleAxis dataKey="subject" tick={{fontSize:10,fill:C.textMuted}}/>
                <Radar name={p.name} dataKey="v" stroke={C.primary} fill={C.primary} fillOpacity={0.25} strokeWidth={2}/>
              </RadarChart>
            </ResponsiveContainer>
          </div>
          <div style={{background:C.surface,borderRadius:12,padding:'16px 18px',border:`1px solid ${C.border}`}}>
            <div style={{fontWeight:600,fontSize:13,marginBottom:12}}>상세 지표</div>
            {[['응답 속도',p.response+'%'],['계약 완료율',p.complete+'%'],['재이용율',p.reuse+'%'],['클레임 발생',p.claim+'건'],['종합 스코어',p.score],['현재 등급',p.grade]].map(([k,v])=>(
              <div key={k} style={{display:'flex',justifyContent:'space-between',padding:'7px 0',borderBottom:`1px solid ${C.border}`,fontSize:12}}>
                <span style={{color:C.textLight}}>{k}</span>
                <span style={{fontWeight:700,color:k==='현재 등급'?gradeC[v]:C.text}}>{v}</span>
              </div>
            ))}
            <button style={{marginTop:14,width:'100%',padding:'10px',borderRadius:8,border:'none',background:C.bg,color:C.primary,fontWeight:700,fontSize:12,cursor:'pointer',border:`1px solid ${C.border}`}}>인센티브 포인트 지급</button>
          </div>
        </div>
      </div>
    </div>
  );
}

</script>
