  { id: 2, content: '지금 이 순간, 당신이 가장 원하는 것은 무엇인가요?', scheduledAt: '2026-04-07 09:00', sentAt: null, responses: 0, status: '예약됨' },

  { id: 5, content: '10년 후의 나는 지금의 나에게 어떤 말을 해줄 것 같나요?', scheduledAt: '2026-04-04 09:00', sentAt: '2026-04-04 09:00', responses: 50, status: '발송완료' },

const rules = [

  { id: 2, name: '성장 키워드 — 격려 응답', priority: 2, condition: '키워드: 해냈다, 성장, 노력, 변화', template: '{{response_excerpt}} — 오늘 이 변화를 알아차리셨다는 것 자체가 이미 성장입니다.', matchCount: 62, confidence: 0.88, status: '활성' },
  { id: 3, name: '관계 고민 — 재프레이밍', priority: 3, condition: '카테고리: 관계, 갈등, 기대', template: '상대방의 행동 뒤에는 어떤 욕구가 있었을까요? {{response_excerpt}} 에서 보이는 패턴을 함께 살펴봅시다.', matchCount: 41, confidence: 0.79, status: '활성' },
  { id: 4, name: '미래 지향 — 가능성 확장', priority: 4, condition: '키워드: 원한다, 꿈, 목표, 되고 싶다', template: '{{response_excerpt}} — 그 바람을 실현하려면 오늘 어떤 작은 행동이 가능할까요?', matchCount: 28, confidence: 0.85, status: '활성' },
  { id: 5, name: '기본 매칭 불가 — 검수 큐 이동', priority: 99, condition: '매칭 신뢰도 < 0.6', template: null, matchCount: 19, confidence: null, status: '폴백' },

const reviewItems = [
  { id: 1, token: 'anon-2b9e...m7', question: '오늘 가장 어려웠던 순간은 언제였나요?', response: '그냥 아무것도 하기 싫었어요. 이유도 모르겠고 그냥 멍하니 있었는데 눈물이 나더라구요.', suggestedRule: '부정 감정 — 공감 응답', confidence: 0.54, status: '대기', createdAt: '2026-04-06 09:47' },

];

  { date: '04-04', total: 160, auto: 145, manual: 15 },
  { date: '04-05', total: 164, auto: 148, manual: 16 },
  { date: '04-06', total: 58, auto: 49, manual: 9 },
];

const weeklyResponseRate = [
  { week: '3/3주', rate: 78 }, { week: '3/4주', rate: 82 }, { week: '4/1주', rate: 79 },
  { week: '4/2주', rate: 85 }, { week: '현재', rate: 80 },

// ─── 공통 컴포넌트 ───
function Badge({ label, color = 'blue' }) {
  const colors = {
    blue: { bg: '#EFF6FF', text: '#1D4ED8' },
    green: { bg: '#ECFDF5', text: '#059669' },
    yellow: { bg: '#FFFBEB', text: '#B45309' },
    red: { bg: '#FEF2F2', text: '#DC2626' },
    gray: { bg: '#F3F4F6', text: '#6B7280' },
    purple: { bg: '#F5F3FF', text: '#7C3AED' },
  };
  const c = colors[color] || colors.blue;
  return (
    <span style={{ background: c.bg, color: c.text, padding: '2px 10px', borderRadius: 20, fontSize: 12, fontWeight: 600, whiteSpace:'nowrap' }}>
      {label}
    </span>
  );
}

function StatCard({ icon, label, value, sub, color = C.primary }) {
  return (
    <div style={{ background: C.surface, borderRadius: 12, padding: '20px 24px', boxShadow: '0 1px 6px rgba(0,0,0,0.07)', flex: 1, minWidth: 180 }}>
      <div style={{ display: 'flex', alignItems: 'center', gap: 12, marginBottom: 12 }}>
        <div style={{ width: 40, height: 40, borderRadius: 10, background: color + '18', display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 20 }}>{icon}</div>
        <span style={{ color: C.textSec, fontSize: 13, fontWeight: 500 }}>{label}</span>
      </div>
      <div style={{ fontSize: 28, fontWeight: 700, color: C.text }}>{value}</div>
      {sub && <div style={{ fontSize: 12, color: C.textSec, marginTop: 4 }}>{sub}</div>}
    </div>
  );
}

function Modal({ children, onClose, title, width = 560 }) {
  return (
    <div style={{ position: 'fixed', inset: 0, background: 'rgba(0,0,0,0.45)', zIndex: 1000, display: 'flex', alignItems: 'center', justifyContent: 'center', padding: 24 }}>
      <div style={{ background: C.surface, borderRadius: 16, width: '100%', maxWidth: width, maxHeight: '85vh', overflowY: 'auto', animation: 'modalIn 200ms ease', boxShadow: '0 20px 60px rgba(0,0,0,0.2)' }}>
        <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', padding: '20px 24px', borderBottom: `1px solid ${C.border}` }}>
          <span style={{ fontWeight: 700, fontSize: 16 }}>{title}</span>
          <button onClick={onClose} style={{ background: 'none', border: 'none', fontSize: 20, cursor: 'pointer', color: C.textSec, lineHeight: 1 }}>✕</button>
        </div>
        <div style={{ padding: 24 }}>{children}</div>
      </div>
    </div>
  );
}

function Toast({ message, onClose }) {
  useEffect(() => { const t = setTimeout(onClose, 2800); return () => clearTimeout(t); }, []);
  return (
    <div style={{ position: 'fixed', bottom: 28, right: 28, background: '#1A2332', color: '#fff', padding: '12px 20px', borderRadius: 10, zIndex: 2000, fontSize: 14, boxShadow: '0 8px 24px rgba(0,0,0,0.2)', animation: 'fadeIn 200ms ease' }}>
      ✓ {message}
    </div>
  );
}

        <StatCard icon="💬" label="오늘 응답 수" value="58건" sub="전체 58명 중" color={C.success} />
        <StatCard icon="⚡" label="자동 처리율" value="84.5%" sub="규칙 엔진 자동 답장" color={C.accent} />
        <StatCard icon="🔍" label="검수 대기" value="9건" sub="수동 개입 필요" color={C.warning} />
      </div>

      <div style={{ display: 'grid', gridTemplateColumns: '1fr 340px', gap: 20, marginBottom: 20 }}>
        <div style={{ background: C.surface, borderRadius: 12, padding: 24, boxShadow: '0 1px 6px rgba(0,0,0,0.07)' }}>
          <div style={{ fontWeight: 700, marginBottom: 16, fontSize: 15 }}>주간 응답률 추이</div>
          <ResponsiveContainer width="100%" height={200}>
            <AreaChart data={weeklyResponseRate}>
              <defs>
                <linearGradient id="rateGrad" x1="0" y1="0" x2="0" y2="1">
                  <stop offset="5%" stopColor={C.primary} stopOpacity={0.18}/>
                  <stop offset="95%" stopColor={C.primary} stopOpacity={0}/>
                </linearGradient>
              </defs>
              <CartesianGrid strokeDasharray="3 3" stroke={C.border}/>
              <XAxis dataKey="week" tick={{ fontSize: 12 }} stroke={C.border}/>
              <YAxis domain={[60, 100]} tick={{ fontSize: 12 }} stroke={C.border}/>
              <Tooltip formatter={(v) => [`${v}%`, '응답률']} contentStyle={{ borderRadius: 8, border: `1px solid ${C.border}` }}/>
              <Area type="monotone" dataKey="rate" stroke={C.primary} strokeWidth={2.5} fill="url(#rateGrad)" dot={{ r: 4, fill: C.primary }}/>
            </AreaChart>
          </ResponsiveContainer>
        </div>
        <div style={{ background: C.surface, borderRadius: 12, padding: 24, boxShadow: '0 1px 6px rgba(0,0,0,0.07)' }}>
          <div style={{ fontWeight: 700, marginBottom: 16, fontSize: 15 }}>기수 현황</div>

              <div>
                <div style={{ fontWeight: 600, fontSize: 14 }}>{c.name}</div>
                <div style={{ fontSize: 12, color: C.textSec }}>참여자 {c.memberCount}명</div>
              </div>
              <div style={{ textAlign: 'right' }}>

                <div style={{ fontSize: 12, color: C.textSec, marginTop: 4 }}>응답률 {c.responseRate}%</div>
              </div>
            </div>
          ))}
        </div>
      </div>

      <div style={{ background: C.surface, borderRadius: 12, padding: 24, boxShadow: '0 1px 6px rgba(0,0,0,0.07)' }}>
        <div style={{ fontWeight: 700, marginBottom: 16, fontSize: 15 }}>일별 응답 처리 현황 (최근 7일)</div>
        <ResponsiveContainer width="100%" height={200}>
          <BarChart data={pipelineData}>
            <CartesianGrid strokeDasharray="3 3" stroke={C.border}/>
            <XAxis dataKey="date" tick={{ fontSize: 12 }} stroke={C.border}/>
            <YAxis tick={{ fontSize: 12 }} stroke={C.border}/>
            <Tooltip contentStyle={{ borderRadius: 8, border: `1px solid ${C.border}` }}/>
            <Bar dataKey="auto" name="자동 처리" fill={C.primary} radius={[4,4,0,0]}/>
            <Bar dataKey="manual" name="수동 처리" fill={C.warning} radius={[4,4,0,0]}/>

      </div>
    </div>

                <span style={{ fontSize: 12, fontWeight: 600, color: c.responseRate > 80 ? C.success : C.warning }}>{c.responseRate}%</span>

      <div style={{ background: C.surface, borderRadius: 12, padding: 24, boxShadow: '0 1px 6px rgba(0,0,0,0.07)' }}>
        <div style={{ fontWeight: 700, marginBottom: 16, fontSize: 15 }}>참여자 목록 (3기)</div>

          <thead>
            <tr style={{ borderBottom: `2px solid ${C.border}` }}>
              {['익명 토큰', '기수', '참여일', '상태', '오늘 응답', '누적 응답'].map(h => (
                <th key={h} style={{ padding: '8px 12px', textAlign: 'left', fontSize: 12, color: C.textSec, fontWeight: 600 }}>{h}</th>

          <tbody>
            {members.map(m => (

              >
                <td style={{ padding: '12px', fontSize: 13, fontFamily: 'monospace', color: C.textSec }}>{m.token}</td>

function RuleEditorPage() {
  const [modal, setModal] = useState(null);
  const [testInput, setTestInput] = useState('');
  const [testResult, setTestResult] = useState(null);
  const [toast, setToast] = useState('');

  const runTest = () => {
    if (!testInput.trim()) return;
    const matched = rules.find(r => r.name !== '기본 매칭 불가 — 검수 큐 이동' && r.confidence > 0.6);
    setTestResult({ rule: matched, input: testInput });
  };

  return (
    <div className="fade-in">
      <div style={{ display: 'grid', gridTemplateColumns: '1fr 380px', gap: 20 }}>
        <div>
          <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 16 }}>

            <button onClick={() => setModal('create')} style={{ background: C.primary, color: '#fff', border: 'none', borderRadius: 8, padding: '9px 18px', fontSize: 14, fontWeight: 600, cursor: 'pointer' }}>

              <div key={r.id} onClick={() => setModal({ type: 'detail', item: r })} style={{ background: C.surface, borderRadius: 12, padding: 18, boxShadow: '0 1px 6px rgba(0,0,0,0.07)', cursor: 'pointer', border: r.name.includes('폴백') ? `2px dashed ${C.border}` : `1px solid ${C.border}`, transition: 'box-shadow 150ms' }}

function ReviewQueuePage() {
  const [items, setItems] = useState(reviewItems);
  const [modal, setModal] = useState(null);
  const [toast, setToast] = useState('');

  const approve = (id) => {
    setItems(prev => prev.map(x => x.id === id ? { ...x, status: '승인' } : x));
    setModal(null);
    setToast('답장이 승인되어 발송되었습니다.');
  };

  const reject = (id) => {
    setItems(prev => prev.map(x => x.id === id ? { ...x, status: '거부' } : x));
    setModal(null);
    setToast('답장이 거부되었습니다.');
  };

  const waiting = items.filter(x => x.status === '대기').length;
  const reviewing = items.filter(x => x.status === '검수중').length;

  return (
    <div className="fade-in">
