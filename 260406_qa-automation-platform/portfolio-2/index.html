// ─── 공통 컴포넌트 ───
function Badge({ label, color = 'gray' }) {
  const colors = {
    indigo: { bg: '#EEF2FF', text: '#4338CA' },
    green: { bg: '#ECFDF5', text: '#059669' },
    yellow: { bg: '#FFFBEB', text: '#B45309' },
    red: { bg: '#FEF2F2', text: '#DC2626' },
    gray: { bg: '#F3F4F6', text: '#6B7280' },
    blue: { bg: '#EFF6FF', text: '#1D4ED8' },
  };
  const c = colors[color] || colors.gray;
  return (
    <span style={{ background: c.bg, color: c.text, padding: '2px 10px', borderRadius: 20, fontSize: 12, fontWeight: 600, whiteSpace: 'nowrap' }}>
      {label}
    </span>
  );
}

    inbox: { title: '문의 인박스', sub: '오늘 신규 문의 67건', grad: `linear-gradient(135deg, #334155 0%, #475569 100%)` },

    agents: { title: '에이전트 워크스페이스', sub: '배분된 티켓 3건 처리 대기', grad: `linear-gradient(135deg, #1E40AF 0%, #3B82F6 100%)` },
    analytics: { title: '운영 현황', sub: '오늘 자동처리율 86.6%', grad: `linear-gradient(135deg, #065F46 0%, #10B981 100%)` },
  };
  const b = banners[tab] || banners.home;
  return (
    <div style={{ background: b.grad, padding: '24px 32px', color: '#fff' }}>
      <div style={{ fontSize: 22, fontWeight: 800, marginBottom: 6 }}>{b.title}</div>
      <div style={{ fontSize: 14, opacity: 0.8, marginBottom: kpis ? 16 : 0 }}>{b.sub}</div>

        <div style={{ display: 'flex', gap: 32 }}>

}

function Drawer({ item, onClose, onReply }) {
  const [reply, setReply] = useState('');
  const catColors = { '환불': 'indigo', '배송': 'blue', '기술지원': 'yellow', '결제': 'green', '계정': 'gray', '기타': 'gray' };

    <>
      <div onClick={onClose} style={{ position: 'fixed', inset: 0, background: 'rgba(0,0,0,0.35)', zIndex: 200 }}/>
      <div style={{ position: 'fixed', top: 0, right: 0, bottom: 0, width: 480, background: C.surface, boxShadow: '-8px 0 40px rgba(0,0,0,0.12)', zIndex: 201, overflowY: 'auto', animation: 'slideRight 200ms ease' }}>
        <div style={{ padding: '20px 24px', borderBottom: `1px solid ${C.border}`, display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>

          <button onClick={onClose} style={{ background: 'none', border: 'none', fontSize: 20, cursor: 'pointer', color: C.textSec }}>✕</button>
        </div>
        <div style={{ padding: 24 }}>
          <div style={{ display: 'flex', gap: 8, marginBottom: 16 }}>
            <Badge label={item.category} color={catColors[item.category] || 'gray'} />
            <Badge label={item.priority === 'urgent' ? '긴급' : item.priority === 'high' ? '높음' : '보통'} color={item.priority === 'urgent' ? 'red' : item.priority === 'high' ? 'yellow' : 'gray'} />
          </div>
          <div style={{ fontWeight: 700, fontSize: 17, marginBottom: 8 }}>{item.subject}</div>
          <div style={{ fontSize: 13, color: C.textSec, marginBottom: 16 }}>고객: {item.customer} · {item.createdAt}</div>
          {item.detail && (
            <div style={{ background: C.bg, borderRadius: 8, padding: 14, fontSize: 14, lineHeight: 1.7, marginBottom: 20, borderLeft: `3px solid ${C.accent}` }}>

            </div>

          {item.sla && (
            <div style={{ background: item.sla < 30 ? '#FEF2F2' : '#FFFBEB', borderRadius: 8, padding: 12, marginBottom: 20, display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
              <span style={{ fontSize: 13, fontWeight: 600, color: item.sla < 30 ? C.danger : C.warning }}>⏱ SLA 남은 시간</span>
              <span style={{ fontSize: 18, fontWeight: 800, color: item.sla < 30 ? C.danger : C.warning }}>{item.sla}분</span>
            </div>
          )}
          <div style={{ fontWeight: 600, fontSize: 14, marginBottom: 8 }}>답변 작성</div>
          <textarea rows={5} value={reply} onChange={e => setReply(e.target.value)} placeholder="고객에게 보낼 답변을 작성하세요..." style={{ width: '100%', padding: '12px 14px', border: `1px solid ${C.border}`, borderRadius: 8, fontSize: 14, resize: 'none', lineHeight: 1.6, marginBottom: 12 }}/>

            <button onClick={onClose} style={{ flex: 1, padding: '10px', borderRadius: 8, border: `1px solid ${C.border}`, background: C.surface, cursor: 'pointer', fontSize: 14 }}>보류</button>
            <button onClick={() => onReply(item.id)} style={{ flex: 1, padding: '10px', borderRadius: 8, border: 'none', background: C.accent, color: '#fff', cursor: 'pointer', fontSize: 14, fontWeight: 600 }}>발송</button>

}

function Modal({ children, onClose, title, width = 560 }) {
  return (
    <div style={{ position: 'fixed', inset: 0, background: 'rgba(0,0,0,0.45)', zIndex: 300, display: 'flex', alignItems: 'center', justifyContent: 'center', padding: 24 }}>
      <div style={{ background: C.surface, borderRadius: 12, width: '100%', maxWidth: width, maxHeight: '85vh', overflowY: 'auto', animation: 'modalIn 200ms ease', boxShadow: '0 20px 60px rgba(0,0,0,0.2)' }}>
        <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', padding: '20px 24px', borderBottom: `1px solid ${C.border}` }}>
          <span style={{ fontWeight: 700, fontSize: 16 }}>{title}</span>
          <button onClick={onClose} style={{ background: 'none', border: 'none', fontSize: 20, cursor: 'pointer', color: C.textSec }}>✕</button>
        </div>
        <div style={{ padding: 24 }}>{children}</div>
      </div>
    </div>
  );
}

function Toast({ message, onClose }) {
  useEffect(() => { const t = setTimeout(onClose, 2800); return () => clearTimeout(t); }, []);
  return (
    <div style={{ position: 'fixed', bottom: 28, right: 28, background: '#0F172A', color: '#fff', padding: '12px 20px', borderRadius: 10, zIndex: 9999, fontSize: 14, boxShadow: '0 8px 24px rgba(0,0,0,0.2)', animation: 'fadeIn 200ms ease' }}>
      ✓ {message}
    </div>
  );
}

// ─── 문의 인박스 ───
function InboxPage() {
  const [drawer, setDrawer] = useState(null);

  const [toast, setToast] = useState('');

              </tr>
            ))}
          </tbody>
        </table>
      </div>

}

        <div style={{ flex: 1 }}/>
        <div style={{ display: 'flex', alignItems: 'center', gap: 12 }}>
          <div style={{ display: 'flex', alignItems: 'center', gap: 6, background: C.bg, borderRadius: 6, padding: '6px 12px', border: `1px solid ${C.border}` }}>
            <span>🔍</span>
            <input placeholder="검색..." style={{ background: 'none', border: 'none', outline: 'none', fontSize: 13, width: 120 }}/>
          </div>
          <div style={{ position: 'relative', cursor: 'pointer' }}>
            <span style={{ fontSize: 20 }}>🔔</span>
            <span style={{ position: 'absolute', top: -2, right: -4, width: 16, height: 16, background: C.danger, borderRadius: '50%', fontSize: 10, color: '#fff', display: 'flex', alignItems: 'center', justifyContent: 'center', fontWeight: 700 }}>3</span>
          </div>
          <div style={{ width: 32, height: 32, borderRadius: '50%', background: C.accent, display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 13, fontWeight: 700, color: '#fff', cursor: 'pointer' }}>김</div>
        </div>
      </header>

      {/* 히어로 배너 (탭 선택 시) */}
      {tab && activeTab && (
        <HeroBanner tab={tab} kpis={activeTab.kpis} />
      )}

      {/* 콘텐츠 */}
      <main>
        {renderContent()}
      </main>

      {/* 회원가입 모달 */}
      {modal === 'signup' && (
        <Modal title="무료 체험 시작" onClose={() => setModal(null)}>
          <div style={{ display: 'flex', flexDirection: 'column', gap: 14 }}>
            <div style={{ textAlign: 'center', padding: '8px 0 16px' }}>
              <div style={{ fontSize: 40, marginBottom: 8 }}>⚡</div>
              <div style={{ fontSize: 15, color: C.textSec }}>14일 무료 체험, 카드 등록 불필요</div>
            </div>
            <div>
              <label style={{ fontSize: 13, fontWeight: 600, color: C.textSec, display: 'block', marginBottom: 6 }}>회사명</label>
              <input placeholder="예: (주)테크솔루션" style={{ width: '100%', padding: '10px 12px', border: `1px solid ${C.border}`, borderRadius: 8, fontSize: 14 }}/>
            </div>
            <div>
              <label style={{ fontSize: 13, fontWeight: 600, color: C.textSec, display: 'block', marginBottom: 6 }}>이메일</label>
              <input type="email" placeholder="admin@company.com" style={{ width: '100%', padding: '10px 12px', border: `1px solid ${C.border}`, borderRadius: 8, fontSize: 14 }}/>
            </div>
            <div>
              <label style={{ fontSize: 13, fontWeight: 600, color: C.textSec, display: 'block', marginBottom: 6 }}>일 평균 문의 수</label>
              <select style={{ width: '100%', padding: '10px 12px', border: `1px solid ${C.border}`, borderRadius: 8, fontSize: 14, background: C.surface }}>
                <option>100건 미만</option>
                <option>100~500건</option>
                <option>500~2000건</option>
                <option>2000건 이상</option>
              </select>
            </div>
            <button onClick={() => { setModal(null); setTab('inbox'); setToast('무료 체험이 시작되었습니다!'); }} style={{ width: '100%', padding: '12px', borderRadius: 8, border: 'none', background: C.accent, color: '#fff', cursor: 'pointer', fontSize: 15, fontWeight: 700, marginTop: 8 }}>
              무료로 시작하기
            </button>
          </div>
        </Modal>
      )}

      {toast && <Toast message={toast} onClose={() => setToast('')} />}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
