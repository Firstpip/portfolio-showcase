// ─── 공통 컴포넌트 ───
function Badge({ label, color = 'purple' }) {
  const colors = {
    purple: { bg: 'rgba(124, 58, 237, 0.2)', text: '#C4B5FD' },
    pink: { bg: 'rgba(236, 72, 153, 0.2)', text: '#F9A8D4' },
    green: { bg: 'rgba(16, 185, 129, 0.2)', text: '#6EE7B7' },
    yellow: { bg: 'rgba(245, 158, 11, 0.2)', text: '#FDE68A' },
    red: { bg: 'rgba(239, 68, 68, 0.2)', text: '#FCA5A5' },
    gray: { bg: 'rgba(255,255,255,0.08)', text: '#A78BFA' },
    ai: { bg: 'rgba(236, 72, 153, 0.2)', text: '#F9A8D4' },
    rule: { bg: 'rgba(124, 58, 237, 0.2)', text: '#C4B5FD' },
  };
  const c = colors[color] || colors.purple;
  return (
    <span style={{ background: c.bg, color: c.text, padding: '2px 10px', borderRadius: 20, fontSize: 12, fontWeight: 600, whiteSpace: 'nowrap' }}>
      {label}
    </span>
  );
}

function StatCard({ icon, label, value, sub, color = C.primary }) {
  return (
    <div style={{ background: C.surface, borderRadius: 14, padding: '20px 22px', border: `1px solid ${C.border}`, boxShadow: `0 4px 24px rgba(124,58,237,0.08)` }}>
      <div style={{ display: 'flex', alignItems: 'center', gap: 10, marginBottom: 12 }}>
        <div style={{ width: 38, height: 38, borderRadius: 10, background: color + '22', display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 18 }}>{icon}</div>
        <span style={{ color: C.textSec, fontSize: 13 }}>{label}</span>
      </div>
      <div style={{ fontSize: 28, fontWeight: 700, color: C.text }}>{value}</div>
      {sub && <div style={{ fontSize: 12, color: C.textSec, marginTop: 4 }}>{sub}</div>}
    </div>
  );
}

function Modal({ children, onClose, title, width = 560 }) {
  return (
    <div style={{ position: 'fixed', inset: 0, background: 'rgba(0,0,0,0.7)', zIndex: 1000, display: 'flex', alignItems: 'center', justifyContent: 'center', padding: 24 }}>
      <div style={{ background: C.surface, borderRadius: 16, width: '100%', maxWidth: width, maxHeight: '85vh', overflowY: 'auto', animation: 'modalIn 200ms ease', boxShadow: `0 20px 60px rgba(0,0,0,0.5), 0 0 0 1px ${C.borderStrong}` }}>
        <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', padding: '20px 24px', borderBottom: `1px solid ${C.border}` }}>
          <span style={{ fontWeight: 700, fontSize: 16, color: C.text }}>{title}</span>
          <button onClick={onClose} style={{ background: 'none', border: 'none', fontSize: 20, cursor: 'pointer', color: C.textSec, lineHeight: 1 }}>✕</button>
        </div>
        <div style={{ padding: 24 }}>{children}</div>
      </div>
    </div>
  );
}

function Toast({ message, onClose }) {
  useEffect(() => { const t = setTimeout(onClose, 2800); return () => clearTimeout(t); }, []);
  return (
    <div style={{ position: 'fixed', bottom: 28, right: 28, background: C.primary, color: '#fff', padding: '12px 20px', borderRadius: 10, zIndex: 2000, fontSize: 14, boxShadow: `0 8px 24px rgba(124,58,237,0.4)`, animation: 'fadeIn 200ms ease' }}>

  );
}

                <option>v3.2 (최신)</option>
                <option>v3.1</option>
                <option>v2.0</option>
              </select>
            </div>
            <div>
              <label style={{ fontSize: 13, fontWeight: 600, color: C.textSec, display: 'block', marginBottom: 6 }}>내보내기 포맷</label>
              <div style={{ display: 'flex', gap: 8 }}>
                {['JSONL', 'CSV', 'Parquet'].map(f => (
                  <button key={f} style={{ flex: 1, padding: '10px', border: `1px solid ${f === 'JSONL' ? C.primary : C.border}`, borderRadius: 8, background: f === 'JSONL' ? 'rgba(124,58,237,0.15)' : 'transparent', color: f === 'JSONL' ? C.secondary : C.textSec, cursor: 'pointer', fontSize: 13, fontWeight: f === 'JSONL' ? 700 : 400 }}>{f}</button>
                ))}
              </div>
            </div>
            <div style={{ background: 'rgba(16,185,129,0.1)', borderRadius: 8, padding: 12, fontSize: 13, color: C.success }}>
              🔒 PII 마스킹 자동 적용됩니다. UUID 토큰만 포함됩니다.
            </div>
            <div style={{ display: 'flex', gap: 10, justifyContent: 'flex-end' }}>
              <button onClick={() => setModal(null)} style={{ padding: '10px 20px', borderRadius: 8, border: `1px solid ${C.border}`, background: 'transparent', cursor: 'pointer', fontSize: 14, color: C.text }}>취소</button>
              <button onClick={() => { setModal(null); setToast('내보내기가 시작되었습니다.'); }} style={{ padding: '10px 20px', borderRadius: 8, border: 'none', background: C.primary, color: '#fff', cursor: 'pointer', fontSize: 14, fontWeight: 600 }}>내보내기</button>
            </div>
          </div>
        </Modal>
      )}

      {toast && <Toast message={toast} onClose={() => setToast('')} />}
    </div>
  );
}

// ─── 메인 앱 ───
const NAV_ITEMS = [
  { id: 'dashboard', label: '전체 현황', icon: '📊' },
  { id: 'ai', label: 'AI 평가', icon: '🤖' },
  { id: 'cohorts', label: '기수 관리', icon: '👥' },
  { id: 'analytics', label: '응답 분석', icon: '📈' },
  { id: 'dataset', label: '데이터셋', icon: '🗄️' },
];

function SideNavItem({ icon, label, active, onClick }) {
  return (
    <button onClick={onClick} style={{
      width: '100%', display: 'flex', alignItems: 'center', gap: 10,
      padding: '10px 14px', borderRadius: 10, border: 'none', cursor: 'pointer',
      background: active ? 'rgba(124, 58, 237, 0.2)' : 'transparent',
      color: active ? '#C4B5FD' : C.textSec,
      fontSize: 14, fontWeight: active ? 600 : 400,
      borderLeft: active ? `3px solid ${C.primary}` : '3px solid transparent',
      marginBottom: 2, transition: 'all 150ms', textAlign: 'left',
      fontFamily: 'Pretendard, sans-serif',
    }}
      onMouseEnter={e => { if (!active) e.currentTarget.style.background = 'rgba(124,58,237,0.08)'; }}
      onMouseLeave={e => { if (!active) e.currentTarget.style.background = 'transparent'; }}
    >
      <span style={{ fontSize: 16 }}>{icon}</span>
      {label}
    </button>
  );
}

  return (

      <nav style={{ width: 240, background: C.surface, borderRight: `1px solid ${C.border}`, display: 'flex', flexDirection: 'column', paddingTop: 16, flexShrink: 0 }}>

        </div>

        <div style={{ padding: '16px', borderTop: `1px solid ${C.border}` }}>
          <div style={{ display: 'flex', alignItems: 'center', gap: 8, marginBottom: 12 }}>
            <div style={{ width: 8, height: 8, borderRadius: '50%', background: C.success }} className="pulse"/>
            <span style={{ fontSize: 12, color: C.textSec }}>AI 엔진 실행 중</span>
          </div>
          <div style={{ background: C.surfaceHigh, borderRadius: 8, padding: 10 }}>
            <div style={{ fontSize: 11, color: C.textSec }}>오늘 API 비용</div>
            <div style={{ fontSize: 18, fontWeight: 700, color: C.accent }}>$0.51</div>
            <div style={{ height: 4, background: 'rgba(255,255,255,0.08)', borderRadius: 2, overflow: 'hidden', marginTop: 6 }}>
              <div style={{ width: '17%', height: '100%', background: C.success, borderRadius: 2 }}/>
            </div>
            <div style={{ fontSize: 11, color: C.textSec, marginTop: 3 }}>$3.00 상한 중 17%</div>
          </div>
        </div>
      </nav>

      {/* 메인 영역 */}
      <div style={{ flex: 1, display: 'flex', flexDirection: 'column', minWidth: 0 }}>
        {/* 앱바 44px */}
        <div style={{ height: 48, borderBottom: `1px solid ${C.border}`, display: 'flex', alignItems: 'center', padding: '0 24px', justifyContent: 'space-between', flexShrink: 0, background: C.surface }}>

          <div style={{ display: 'flex', gap: 12, alignItems: 'center' }}>
            <div style={{ display: 'flex', alignItems: 'center', gap: 6, background: C.surfaceHigh, borderRadius: 6, padding: '5px 12px', border: `1px solid ${C.border}` }}>
              <span style={{ fontSize: 13 }}>🔍</span>
              <input placeholder="검색..." style={{ background: 'none', border: 'none', outline: 'none', fontSize: 13, width: 120, color: C.text }}/>

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
