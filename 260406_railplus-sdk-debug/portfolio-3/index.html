function Toast({ msg, onClose }) {
  useEffect(() => { const t = setTimeout(onClose, 2800); return () => clearTimeout(t); }, []);
  return <div className="toast">{msg}</div>;
}

function Modal({ title, onClose, children, actions }) {
  return (
    <div className="modal-overlay" onClick={onClose}>
      <div className="modal-box" onClick={e => e.stopPropagation()}>
        <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', padding:'20px 24px', borderBottom:`1px solid ${C.border}` }}>
          <span style={{ fontWeight:700, fontSize:15, color:C.tp }}>{title}</span>
          <button onClick={onClose} style={{ background:'none', border:'none', cursor:'pointer', fontSize:20, color:C.ts }}>×</button>
        </div>
        <div style={{ padding:'24px' }}>{children}</div>
        {actions && <div style={{ display:'flex', gap:8, justifyContent:'flex-end', padding:'16px 24px', borderTop:`1px solid ${C.border}`, background:'#F8FAFC', borderRadius:'0 0 14px 14px' }}>{actions}</div>}
      </div>
    </div>
  );
}

function Btn({ children, variant='primary', onClick, small }) {
  const s = {
    primary: { background:C.primary, color:'#fff', border:'none' },
    secondary: { background:'#fff', color:C.ts, border:`1px solid ${C.border}` },
    danger: { background:'#FEE2E2', color:C.err, border:`1px solid #FECACA` },
    outline: { background:'transparent', color:C.primary, border:`1px solid ${C.primary}` },
  };
  return <button onClick={onClick} style={{ ...s[variant], padding:small?'5px 12px':'8px 16px', borderRadius:8, cursor:'pointer', fontFamily:'inherit', fontSize:small?11:13, fontWeight:600, transition:'all .15s' }}>{children}</button>;
}

        ))}
      </div>

      <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:16 }}>
        <div style={{ background:C.surface, borderRadius:12, border:`1px solid ${C.border}`, boxShadow:'0 1px 3px rgba(0,0,0,.05)', display:'flex', flexDirection:'column' }}>
          <div style={{ padding:'16px 20px', borderBottom:`1px solid ${C.border}`, fontWeight:700, fontSize:14, color:C.tp }}>
            이슈 코멘트 — ISS-041 레일플러스 SDK 타임아웃
          </div>
          <div style={{ flex:1, padding:'16px 20px', overflow:'auto', maxHeight:340 }}>
            {commentList.map(c => (
              <div key={c.id} style={{ display:'flex', gap:10, marginBottom:16 }}>
                <div style={{ width:32, height:32, borderRadius:'50%', background:`linear-gradient(135deg,${c.color},${c.color}aa)`, display:'flex', alignItems:'center', justifyContent:'center', color:'#fff', fontWeight:700, fontSize:13, flexShrink:0 }}>{c.avatar}</div>
                <div style={{ flex:1 }}>
                  <div style={{ display:'flex', gap:8, marginBottom:4 }}>
                    <span style={{ fontSize:12, fontWeight:700, color:C.tp }}>{c.author}</span>
                    <span style={{ fontSize:11, color:C.ts }}>{c.ts}</span>
                  </div>
                  <div style={{ background:'#F8FAFC', borderRadius:10, padding:'10px 12px', fontSize:13, color:C.tp, lineHeight:1.5, borderTopLeftRadius:2 }}>
                    {c.msg.split(/(@\S+)/).map((part,i) => part.startsWith('@') ? <strong key={i} style={{ color:C.primary }}>{part}</strong> : part)}
                  </div>
                </div>
              </div>
            ))}
          </div>
          <div style={{ padding:'12px 16px', borderTop:`1px solid ${C.border}`, display:'flex', gap:10 }}>
            <input value={comment} onChange={e=>setComment(e.target.value)} onKeyDown={e=>e.key==='Enter'&&!e.shiftKey&&addComment()} placeholder="@멘션으로 팀원 알림 가능 — Enter로 전송" style={{ flex:1, padding:'8px 12px', border:`1px solid ${C.border}`, borderRadius:8, fontSize:13, fontFamily:'inherit' }} />
            <Btn small onClick={addComment}>전송</Btn>
          </div>
        </div>

        <div style={{ background:C.surface, borderRadius:12, border:`1px solid ${C.border}`, padding:'20px', boxShadow:'0 1px 3px rgba(0,0,0,.05)' }}>
          <div style={{ fontWeight:700, fontSize:14, color:C.tp, marginBottom:16 }}>실시간 활동 피드</div>
          {[
            { actor:'이승민', action:'ISS-039 이슈를 "해결" 상태로 변경', ts:'2분 전', icon:'✅', color:'#F97316' },
            { actor:'박지수', action:'ISS-040에 코멘트 남김', ts:'8분 전', icon:'💬', color:'#6366F1' },
            { actor:'김하나', action:'레일플러스 SDK 재현 케이스 2개 추가', ts:'14분 전', icon:'🔍', color:'#8B5CF6' },
            { actor:'최기용', action:'알림 규칙 "레일플러스 성공률 임계값" 수정', ts:'22분 전', icon:'🔔', color:C.primary },
            { actor:'박지수', action:'ISS-040 이슈 등록 — KG이니시스 지연', ts:'31분 전', icon:'🆕', color:'#6366F1' },
            { actor:'이승민', action:'Crashlytics 리포트 분석 완료', ts:'45분 전', icon:'📊', color:'#F97316' },
          ].map((a,i) => (
            <div key={i} style={{ display:'flex', gap:12, marginBottom:14, paddingBottom:14, borderBottom:i<5?`1px solid ${C.border}`:'none' }}>
              <div style={{ width:32, height:32, borderRadius:'50%', background:`${a.color}18`, display:'flex', alignItems:'center', justifyContent:'center', fontSize:14, flexShrink:0 }}>{a.icon}</div>
              <div>
                <div style={{ fontSize:13, color:C.tp }}><strong style={{ color:a.color }}>{a.actor}</strong> {a.action}</div>
                <div style={{ fontSize:11, color:C.ts, marginTop:2 }}>{a.ts}</div>
              </div>
            </div>
          ))}
        </div>
      </div>

      {toast && <Toast msg={toast} onClose={() => setToast(null)} />}
      {modal && (
        <Modal title={`${modal.name} 프로필`} onClose={() => setModal(null)} actions={[<Btn key="c" variant="secondary" onClick={() => setModal(null)}>닫기</Btn>]}>
          <div style={{ display:'flex', flexDirection:'column', gap:12, fontSize:13 }}>
            <div style={{ display:'flex', alignItems:'center', gap:14, marginBottom:4 }}>
              <div style={{ width:52, height:52, borderRadius:'50%', background:`linear-gradient(135deg,${modal.color},${modal.color}aa)`, display:'flex', alignItems:'center', justifyContent:'center', color:'#fff', fontWeight:800, fontSize:22 }}>{modal.avatar}</div>
              <div><div style={{ fontWeight:800, fontSize:16, color:C.tp }}>{modal.name}</div><div style={{ color:C.ts }}>{modal.role}</div></div>
            </div>
            <div style={{ background:'#F8FAFC', borderRadius:8, padding:'12px' }}>
              <div style={{ fontSize:11, color:C.ts, marginBottom:6 }}>담당 SDK</div>
              <div style={{ display:'flex', gap:6 }}>{modal.sdks.map(s=><span key={s} className="badge" style={{ background:C.primaryLight, color:C.primary }}>{s}</span>)}</div>
            </div>
            <div style={{ background:'#F8FAFC', borderRadius:8, padding:'12px' }}>
              <div style={{ fontSize:11, color:C.ts, marginBottom:4 }}>최근 활동</div>
              <p style={{ color:C.tp }}>{modal.recentActivity}</p>
            </div>
            <div style={{ background: modal.openIssues>0?'#FEE2E2':C.primaryLight, borderRadius:8, padding:'12px' }}>
              <div style={{ fontSize:11, color:C.ts, marginBottom:4 }}>미해결 이슈</div>
              <strong style={{ color:modal.openIssues>0?C.err:C.primary }}>{modal.openIssues}건</strong>
            </div>
          </div>
        </Modal>
      )}
    </div>
  );
}

// ── 메인 앱
function App() {
  const [page, setPage] = useState('SDK 통합 현황판');

  const render = () => {
    switch(page) {
      case 'SDK 통합 현황판': return <SdkOverviewPage />;
      case '알림 규칙 설정': return <AlertRulesPage />;
      case '이슈 트래킹': return <IssueTrackerPage />;
      case '팀 협업 관리': return <TeamPage />;
      default: return null;
    }
  };

  return (
    <div style={{ display:'flex', minHeight:'100vh' }}>
      <Sidebar page={page} onNav={setPage} />
      <div style={{ flex:1, display:'flex', flexDirection:'column', minWidth:0 }}>
        <TopBar title={page} />
        <main style={{ flex:1, overflow:'auto' }}>{render()}</main>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
