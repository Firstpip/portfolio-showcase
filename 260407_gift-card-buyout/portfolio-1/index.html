<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Pretendard', -apple-system, sans-serif; background: #F0F4F8; color: #1E293B; min-height: 100vh; display: flex; }

  /* Sidebar */
  .sidebar {
    width: 260px; min-height: 100vh; background: #ffffff;
    border-right: 1px solid #E2E8F0; display: flex; flex-direction: column;
    position: fixed; top: 0; left: 0; bottom: 0; z-index: 100;
    box-shadow: 2px 0 8px rgba(0,0,0,0.04);
  }
  .sidebar-logo {
    padding: 24px 20px; border-bottom: 1px solid #F1F5F9;
    display: flex; align-items: center; gap: 10px;
  }
  .logo-icon {
    width: 36px; height: 36px; background: linear-gradient(135deg, #1A56DB, #0EA5E9);
    border-radius: 10px; display: flex; align-items: center; justify-content: center;
    color: #fff; font-size: 16px; font-weight: 800;
  }
  .logo-text { font-size: 18px; font-weight: 800; color: #1A56DB; }
  .logo-sub { font-size: 11px; color: #94A3B8; margin-top: 1px; }

  .sidebar-nav { flex: 1; padding: 16px 12px; overflow-y: auto; }
  .nav-section-label {
    font-size: 10px; font-weight: 700; color: #94A3B8; letter-spacing: 0.1em;
    text-transform: uppercase; padding: 8px 8px 4px;
  }
  .nav-item {
    display: flex; align-items: center; gap: 10px; padding: 10px 12px;
    border-radius: 10px; cursor: pointer; transition: all 0.15s; margin-bottom: 2px;
    color: #64748B; font-size: 14px; font-weight: 500; border: none; background: none; width: 100%; text-align: left;
  }
  .nav-item:hover { background: #F1F5F9; color: #1E293B; }
  .nav-item.active { background: #EFF6FF; color: #1A56DB; font-weight: 600; }
  .nav-item .icon { font-size: 16px; width: 20px; text-align: center; }
  .nav-badge { margin-left: auto; background: #FEF3C7; color: #D97706; font-size: 11px; font-weight: 700; padding: 2px 7px; border-radius: 20px; }

  .sidebar-footer {
    padding: 16px 20px; border-top: 1px solid #F1F5F9;
    display: flex; align-items: center; gap: 10px;
  }
  .user-avatar { width: 36px; height: 36px; border-radius: 50%; background: linear-gradient(135deg, #1A56DB, #3B82F6); display: flex; align-items: center; justify-content: center; color: #fff; font-size: 14px; font-weight: 700; }
  .user-info { flex: 1; }
  .user-name { font-size: 13px; font-weight: 600; color: #1E293B; }
  .user-role { font-size: 11px; color: #94A3B8; }

  /* Main */
  .main { margin-left: 260px; flex: 1; display: flex; flex-direction: column; min-height: 100vh; }
  .topbar {
    height: 60px; background: #fff; border-bottom: 1px solid #E2E8F0;
    display: flex; align-items: center; padding: 0 28px; gap: 16px;
    position: sticky; top: 0; z-index: 50;
  }
  .topbar-title { font-size: 16px; font-weight: 700; color: #1E293B; }
  .topbar-breadcrumb { font-size: 13px; color: #94A3B8; }
  .topbar-spacer { flex: 1; }
  .topbar-badge { background: #EFF6FF; color: #1A56DB; font-size: 12px; font-weight: 600; padding: 4px 12px; border-radius: 20px; }
  .topbar-btn {
    background: #1A56DB; color: #fff; border: none; border-radius: 8px;
    padding: 8px 16px; font-size: 13px; font-weight: 600; cursor: pointer;
    font-family: inherit; display: flex; align-items: center; gap: 6px;
  }
  .topbar-btn:hover { background: #1D4ED8; }

  .content { padding: 28px; flex: 1; }

  /* Cards */
  .card { background: #fff; border-radius: 14px; box-shadow: 0 1px 4px rgba(0,0,0,0.06); padding: 24px; margin-bottom: 20px; }
  .card-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
  .card-title { font-size: 16px; font-weight: 700; color: #1E293B; }
  .card-subtitle { font-size: 13px; color: #64748B; margin-top: 2px; }

  /* Stat cards */
  .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 20px; }
  .stat-card { background: #fff; border-radius: 14px; padding: 20px; box-shadow: 0 1px 4px rgba(0,0,0,0.06); }
  .stat-label { font-size: 12px; color: #94A3B8; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; }
  .stat-value { font-size: 28px; font-weight: 800; color: #1E293B; margin: 6px 0 4px; }
  .stat-change { font-size: 12px; font-weight: 600; }
  .stat-change.up { color: #16A34A; }
  .stat-change.down { color: #DC2626; }
  .stat-icon { width: 40px; height: 40px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 18px; margin-bottom: 12px; }

  /* Status badges */
  .badge { display: inline-flex; align-items: center; gap: 4px; padding: 4px 10px; border-radius: 20px; font-size: 12px; font-weight: 600; }
  .badge-blue { background: #EFF6FF; color: #1A56DB; }
  .badge-green { background: #F0FDF4; color: #16A34A; }
  .badge-yellow { background: #FFFBEB; color: #D97706; }
  .badge-red { background: #FEF2F2; color: #DC2626; }
  .badge-gray { background: #F1F5F9; color: #64748B; }

  /* Table */
  .table-wrap { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th { text-align: left; padding: 10px 16px; color: #64748B; font-weight: 600; font-size: 12px; border-bottom: 1px solid #F1F5F9; background: #FAFBFC; }
  td { padding: 14px 16px; border-bottom: 1px solid #F8FAFC; color: #374151; vertical-align: middle; }
  tr:hover td { background: #FAFBFF; }
  tr:last-child td { border-bottom: none; }

  /* Step wizard */
  .step-wizard { display: flex; align-items: center; gap: 0; margin-bottom: 32px; }
  .step-item { display: flex; flex-direction: column; align-items: center; flex: 1; position: relative; }
  .step-item:not(:last-child)::after {
    content: ''; position: absolute; top: 18px; left: 50%; width: 100%;
    height: 2px; background: #E2E8F0; z-index: 0;
  }
  .step-item.done::after { background: #1A56DB; }
  .step-circle {
    width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center;
    font-size: 14px; font-weight: 700; border: 2px solid #E2E8F0; background: #fff; color: #94A3B8; position: relative; z-index: 1;
  }
  .step-item.done .step-circle { background: #1A56DB; border-color: #1A56DB; color: #fff; }
  .step-item.active .step-circle { background: #fff; border-color: #1A56DB; color: #1A56DB; }
  .step-label { font-size: 12px; color: #94A3B8; margin-top: 6px; font-weight: 500; }
  .step-item.active .step-label { color: #1A56DB; font-weight: 700; }

  /* Form */
  .form-group { margin-bottom: 20px; }
  .form-label { font-size: 13px; font-weight: 600; color: #374151; margin-bottom: 6px; display: block; }
  .form-input {
    width: 100%; padding: 10px 14px; border: 1.5px solid #E2E8F0; border-radius: 10px;
    font-size: 14px; color: #1E293B; background: #fff; outline: none; font-family: inherit;
    transition: border-color 0.15s;
  }
  .form-input:focus { border-color: #1A56DB; box-shadow: 0 0 0 3px rgba(26,86,219,0.08); }
  .form-hint { font-size: 12px; color: #94A3B8; margin-top: 4px; }

  /* Gift card grid */
  .gc-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 20px; }
  .gc-card {
    border: 2px solid #E2E8F0; border-radius: 12px; padding: 16px; cursor: pointer;
    transition: all 0.15s; display: flex; flex-direction: column; align-items: center; gap: 8px;

  .gc-card:hover { border-color: #1A56DB; background: #EFF6FF; }
  .gc-card.selected { border-color: #1A56DB; background: #EFF6FF; }
  .gc-icon { width: 48px; height: 48px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 22px; }
  .gc-name { font-size: 13px; font-weight: 700; color: #1E293B; text-align: center; }
  .gc-rate { font-size: 12px; font-weight: 600; color: #16A34A; }

  /* Pin inputs */
  .pin-row { display: flex; gap: 8px; align-items: center; margin-bottom: 12px; }
  .pin-input {
    flex: 1; padding: 10px 14px; border: 1.5px solid #E2E8F0; border-radius: 10px;
    font-size: 14px; font-family: 'Pretendard', monospace; letter-spacing: 2px; color: #1E293B;
    background: #fff; outline: none; text-align: center;
  }
  .pin-input.valid { border-color: #16A34A; background: #F0FDF4; }
  .pin-input.invalid { border-color: #DC2626; background: #FEF2F2; }
  .pin-del { background: #F1F5F9; border: none; border-radius: 8px; width: 36px; height: 36px; cursor: pointer; color: #64748B; font-size: 14px; }

  /* Verify animation */
  .verify-card { background: #fff; border-radius: 14px; padding: 32px; text-align: center; box-shadow: 0 1px 4px rgba(0,0,0,0.06); }
  .verify-spinner {
    width: 60px; height: 60px; border: 4px solid #EFF6FF; border-top-color: #1A56DB;
    border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 16px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .verify-result { display: flex; flex-direction: column; align-items: center; }
  .verify-check { width: 64px; height: 64px; background: #F0FDF4; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 28px; margin: 0 auto 16px; }
  .verify-amount { font-size: 36px; font-weight: 800; color: #1A56DB; }
  .verify-fee { font-size: 14px; color: #94A3B8; margin-top: 4px; }

  /* Timeline */
  .timeline { position: relative; }
  .timeline-item { display: flex; gap: 16px; padding-bottom: 24px; position: relative; }
  .timeline-item:not(:last-child)::before {
    content: ''; position: absolute; left: 15px; top: 32px; bottom: 0; width: 2px; background: #F1F5F9;
  }
  .timeline-dot { width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 14px; flex-shrink: 0; }
  .timeline-dot.done { background: #EFF6FF; }
  .timeline-dot.active { background: #1A56DB; }
  .timeline-dot.pending { background: #F1F5F9; }
  .timeline-content { flex: 1; padding-top: 4px; }
  .timeline-title { font-size: 14px; font-weight: 600; color: #1E293B; }
  .timeline-desc { font-size: 12px; color: #94A3B8; margin-top: 2px; }
  .timeline-time { font-size: 11px; color: #CBD5E1; margin-top: 4px; }

  /* Price confirm */
  .price-box { background: linear-gradient(135deg, #EFF6FF, #DBEAFE); border-radius: 14px; padding: 24px; text-align: center; margin-bottom: 20px; }
  .price-label { font-size: 13px; color: #3B82F6; font-weight: 600; }
  .price-value { font-size: 40px; font-weight: 800; color: #1A56DB; margin: 8px 0; }
  .price-note { font-size: 12px; color: #64748B; }

  /* Primary btn */
  .btn-primary {
    background: #1A56DB; color: #fff; border: none; border-radius: 10px;
    padding: 12px 24px; font-size: 15px; font-weight: 700; cursor: pointer;
    font-family: inherit; width: 100%; transition: background 0.15s;
  }
  .btn-primary:hover { background: #1D4ED8; }
  .btn-secondary {
    background: #F1F5F9; color: #64748B; border: none; border-radius: 10px;
    padding: 12px 24px; font-size: 15px; font-weight: 600; cursor: pointer;
    font-family: inherit; width: 100%; transition: background 0.15s;
  }
  .btn-secondary:hover { background: #E2E8F0; }
  .btn-row { display: flex; gap: 12px; }
  .btn-row > * { flex: 1; }

  /* Chart area */
  .chart-area { height: 220px; }

  /* Modal */
  .modal-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.35); z-index: 200;
    display: flex; align-items: center; justify-content: center;
    animation: fadeIn 0.2s;
  }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  .modal {
    background: #fff; border-radius: 16px; padding: 28px; width: 440px; max-width: 90vw;
    box-shadow: 0 20px 60px rgba(0,0,0,0.15);
    animation: fadeInScale 0.2s;
  }
  @keyframes fadeInScale {
    from { opacity: 0; transform: translate(-50%,-50%) scale(0.95); }
    to { opacity: 1; transform: translate(-50%,-50%) scale(1); }
  }
  .modal-title { font-size: 18px; font-weight: 800; color: #1E293B; margin-bottom: 4px; }
  .modal-subtitle { font-size: 13px; color: #94A3B8; margin-bottom: 20px; }

  /* Toast */
  .toast {
    position: fixed; bottom: 28px; right: 28px; background: #1E293B; color: #fff;
    padding: 12px 20px; border-radius: 10px; font-size: 14px; font-weight: 500;
    z-index: 300; animation: slideUp 0.3s;
  }
  @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

  /* Admin specific */
  .policy-row { display: flex; align-items: center; padding: 14px 0; border-bottom: 1px solid #F1F5F9; gap: 12px; }
  .policy-row:last-child { border-bottom: none; }
  .policy-gc { display: flex; align-items: center; gap: 10px; flex: 1; }
  .policy-gc-icon { width: 36px; height: 36px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 16px; }
  .policy-gc-name { font-size: 14px; font-weight: 600; color: #1E293B; }
  .rate-input { width: 80px; padding: 6px 10px; border: 1.5px solid #E2E8F0; border-radius: 8px; font-size: 14px; font-weight: 700; color: #1A56DB; text-align: center; font-family: inherit; outline: none; }
  .rate-input:focus { border-color: #1A56DB; }

  .select-all { display: flex; align-items: center; gap: 8px; padding: 10px 16px; background: #F8FAFC; border-bottom: 1px solid #F1F5F9; }
  .checkbox { width: 16px; height: 16px; accent-color: #1A56DB; cursor: pointer; }

  /* Pagination */
  .pagination { display: flex; align-items: center; justify-content: center; gap: 4px; padding: 16px 0 0; }
  .page-btn { width: 34px; height: 34px; border: 1px solid #E2E8F0; border-radius: 8px; background: #fff; cursor: pointer; font-size: 13px; font-weight: 500; color: #64748B; display: flex; align-items: center; justify-content: center; font-family: inherit; }
  .page-btn.active { background: #1A56DB; color: #fff; border-color: #1A56DB; font-weight: 700; }
  .page-btn:hover:not(.active) { background: #F1F5F9; }

  /* Empty state */
  .empty { text-align: center; padding: 48px 24px; }
  .empty-icon { font-size: 48px; margin-bottom: 12px; }
  .empty-title { font-size: 16px; font-weight: 700; color: #1E293B; margin-bottom: 4px; }
  .empty-desc { font-size: 13px; color: #94A3B8; }

  /* Account card */
  .account-card { border: 1.5px solid #E2E8F0; border-radius: 12px; padding: 16px; display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
  .account-bank { width: 40px; height: 40px; border-radius: 10px; background: linear-gradient(135deg, #1A56DB, #3B82F6); display: flex; align-items: center; justify-content: center; color: #fff; font-size: 14px; font-weight: 700; }
  .account-info { flex: 1; }
  .account-name { font-size: 14px; font-weight: 700; color: #1E293B; }
  .account-number { font-size: 12px; color: #94A3B8; letter-spacing: 1px; margin-top: 2px; }
  .account-default { background: #EFF6FF; color: #1A56DB; font-size: 11px; font-weight: 700; padding: 3px 8px; border-radius: 6px; }
</style>

  const cls = { blue: 'badge-blue', green: 'badge-green', yellow: 'badge-yellow', red: 'badge-red', gray: 'badge-gray' };

// Main Apply Flow
function MainView({ onNavigate }) {
  const [step, setStep] = useState(0);
  const [selectedGC, setSelectedGC] = useState(null);
  const [pins, setPins] = useState(['']);
  const [verifying, setVerifying] = useState(false);
  const [verified, setVerified] = useState(false);
  const [confirmed, setConfirmed] = useState(false);
  const [toast, setToast] = useState('');

  const steps = ['상품권 선택', '핀번호 입력', '검증 · 확인', '완료'];

  const handleVerify = () => {
    setStep(2); setVerifying(true);
    setTimeout(() => { setVerifying(false); setVerified(true); }, 2200);
  };

  const handleConfirm = () => {
    setConfirmed(true); setStep(3);
    setToast('판매 신청이 완료되었습니다! 입금까지 약 3~5분이 소요됩니다.');
  };

  const addPin = () => setPins(p => [...p, '']);

  return (
    <div>
      <div className="step-wizard">
        {steps.map((s, i) => (
          <div key={i} className={`step-item ${i < step ? 'done' : i === step ? 'active' : ''}`}>
            <div className="step-circle">{i < step ? '✓' : i + 1}</div>
            <div className="step-label">{s}</div>
          </div>
        ))}
      </div>

      {step === 0 && (
        <div className="card">
          <div className="card-header">
            <div>
              <div className="card-title">상품권 종류 선택</div>
              <div className="card-subtitle">판매하실 상품권을 선택해 주세요</div>
            </div>
            <span className="badge badge-blue">실시간 환율 적용</span>
          </div>
          <div className="gc-grid">
            {GIFT_CARDS.map(gc => (
              <div key={gc.id} className={`gc-card ${selectedGC?.id === gc.id ? 'selected' : ''}`}
                   onClick={() => setSelectedGC(gc)}>
                <div className="gc-icon" style={{ background: gc.bg }}>{gc.icon}</div>
                <div className="gc-name">{gc.name}</div>
                <div className="gc-rate">매입률 {gc.rate}%</div>
              </div>
            ))}
          </div>
          <button className="btn-primary" style={{ marginTop: 8 }}
                  onClick={() => selectedGC && setStep(1)}
                  disabled={!selectedGC}>
            다음 단계 →
          </button>
        </div>
      )}

      {step === 1 && (
        <div className="card">
          <div className="card-header">
            <div>
              <div className="card-title">{selectedGC?.icon} {selectedGC?.name} 핀번호 입력</div>
              <div className="card-subtitle">핀번호와 금액을 정확히 입력해 주세요 (다중 입력 가능)</div>
            </div>
          </div>
          <div className="form-group">
            <label className="form-label">금액권 종류</label>
            <div style={{ display: 'flex', gap: 8 }}>
              {['1만원', '3만원', '5만원', '10만원'].map(v => (
                <button key={v} style={{ padding: '8px 16px', border: '1.5px solid #E2E8F0', borderRadius: 8, background: '#fff', cursor: 'pointer', fontSize: 13, fontFamily: 'inherit', fontWeight: 500 }}>{v}</button>
              ))}
            </div>
          </div>
          <div className="form-group">
            <label className="form-label">핀번호 입력 <span style={{ color: '#94A3B8', fontWeight: 400 }}>({pins.length}개)</span></label>
            {pins.map((p, i) => (
              <div key={i} className="pin-row">
                <span style={{ fontSize: 13, color: '#94A3B8', width: 20 }}>{i+1}</span>
                <input className="pin-input valid" placeholder={`핀번호 ${i+1} (예: 1234-5678-9012-3456)`} defaultValue={i === 0 ? '4721-8833-9920-5541' : ''} />
                {pins.length > 1 && <button className="pin-del" onClick={() => setPins(p => p.filter((_, j) => j !== i))}>×</button>}
              </div>
            ))}
            <button onClick={addPin} style={{ background: 'none', border: '1.5px dashed #E2E8F0', borderRadius: 10, padding: '10px', width: '100%', cursor: 'pointer', color: '#1A56DB', fontSize: 13, fontWeight: 600, fontFamily: 'inherit' }}>
              + 핀번호 추가
            </button>
          </div>
          <div className="form-group">
            <label className="form-label">입금 계좌</label>
            <div className="account-card">
              <div className="account-bank">KB</div>
              <div className="account-info">
                <div className="account-name">국민은행 · 김지수</div>
                <div className="account-number">1234-56-789012</div>
              </div>
              <span className="account-default">기본계좌</span>
            </div>
          </div>
          <div className="btn-row">
            <button className="btn-secondary" onClick={() => setStep(0)}>이전</button>
            <button className="btn-primary" onClick={handleVerify}>검증 시작</button>
          </div>
        </div>
      )}

      {step === 2 && (
        <div className="verify-card">
          {verifying ? (
            <>
              <div className="verify-spinner"></div>
              <div style={{ fontSize: 16, fontWeight: 700, color: '#1E293B', marginBottom: 4 }}>핀번호 검증 중...</div>
              <div style={{ fontSize: 13, color: '#94A3B8' }}>컬쳐랜드 서버에서 유효성을 확인하고 있습니다</div>
              <div style={{ marginTop: 20, display: 'flex', gap: 8, justifyContent: 'center' }}>
                {['유효성 확인', '금액 조회', '중복 검사'].map((t, i) => (
                  <div key={t} style={{ display: 'flex', alignItems: 'center', gap: 4, fontSize: 12, color: '#94A3B8' }}>
                    <span style={{ color: '#1A56DB' }}>⟳</span> {t}
                  </div>
                ))}
              </div>
            </>
          ) : (
            <div className="verify-result">
              <div className="verify-check">✅</div>
              <div style={{ fontSize: 14, color: '#94A3B8', marginBottom: 4 }}>핀번호 검증 완료</div>
              <div style={{ fontSize: 20, fontWeight: 700, color: '#1E293B', marginBottom: 16 }}>{selectedGC?.name} 50,000원권 (1장)</div>
              <div className="price-box" style={{ width: '100%' }}>
                <div className="price-label">최종 매입 금액 (수수료 {100 - (selectedGC?.rate || 93)}% 적용)</div>
                <div className="price-value">{((selectedGC?.rate || 93) * 500).toLocaleString()}원</div>
                <div className="price-note">입금 예정: 국민은행 1234-56-789012 · 약 3~5분 소요</div>
              </div>
              <div className="btn-row" style={{ width: '100%' }}>
                <button className="btn-secondary" onClick={() => setStep(1)}>취소</button>
                <button className="btn-primary" onClick={handleConfirm}>판매 확정</button>
              </div>
            </div>
          )}
        </div>
      )}

      {step === 3 && (
        <div className="verify-card">
          <div style={{ fontSize: 48, marginBottom: 12 }}>🎉</div>
          <div style={{ fontSize: 22, fontWeight: 800, color: '#1E293B', marginBottom: 4 }}>판매 신청 완료!</div>
          <div style={{ fontSize: 14, color: '#64748B', marginBottom: 20 }}>거래번호: TRX-20240407-006</div>
          <div style={{ background: '#F0FDF4', border: '1.5px solid #BBF7D0', borderRadius: 12, padding: 16, marginBottom: 20, width: '100%' }}>
            <div style={{ fontSize: 13, color: '#16A34A', fontWeight: 600, marginBottom: 8 }}>입금 예정 안내</div>
            <div style={{ display: 'flex', justifyContent: 'space-between', fontSize: 13 }}>
              <span style={{ color: '#64748B' }}>입금 금액</span>
              <span style={{ fontWeight: 700, color: '#1E293B' }}>46,500원</span>
            </div>
            <div style={{ display: 'flex', justifyContent: 'space-between', fontSize: 13, marginTop: 4 }}>
              <span style={{ color: '#64748B' }}>입금 계좌</span>
              <span style={{ fontWeight: 600, color: '#1E293B' }}>국민 1234-56-789012</span>
            </div>
            <div style={{ display: 'flex', justifyContent: 'space-between', fontSize: 13, marginTop: 4 }}>
              <span style={{ color: '#64748B' }}>예상 입금 시간</span>
              <span style={{ fontWeight: 600, color: '#1E293B' }}>3~5분 이내</span>
            </div>
          </div>
          <div className="btn-row" style={{ width: '100%' }}>
            <button className="btn-secondary" onClick={() => onNavigate('history')}>거래 내역 보기</button>
            <button className="btn-primary" onClick={() => { setStep(0); setSelectedGC(null); setPins(['']); setVerified(false); setConfirmed(false); }}>새 판매 신청</button>
          </div>
        </div>
      )}

      {toast && <Toast msg={toast} onClose={() => setToast('')} />}
    </div>
  );
}

// Verify View (standalone PIN verify demo)
function VerifyView() {
  const [pins] = useState(['4721-8833-9920-5541', '9023-1144-7756-3302']);
  const [states, setStates] = useState(['idle', 'idle']);
  const [running, setRunning] = useState(false);

  const runVerify = () => {
    setRunning(true);
    setStates(['loading', 'loading']);
    setTimeout(() => setStates(['valid', 'loading']), 1400);
    setTimeout(() => setStates(['valid', 'invalid']), 2600);
    setTimeout(() => setRunning(false), 2800);
  };

  return (
    <div>
      <div className="stats-grid" style={{ gridTemplateColumns: 'repeat(3, 1fr)' }}>
        {[
          { icon: '✅', label: '오늘 검증 성공', value: '1,284건', color: '#F0FDF4', iconBg: '#DCFCE7' },
          { icon: '❌', label: '검증 실패', value: '47건', color: '#FEF2F2', iconBg: '#FEE2E2' },
          { icon: '⚡', label: '평균 검증 시간', value: '1.3초', color: '#EFF6FF', iconBg: '#DBEAFE' },
        ].map(s => (
          <div key={s.label} className="stat-card" style={{ background: s.color }}>
            <div className="stat-icon" style={{ background: s.iconBg }}>{s.icon}</div>
            <div className="stat-label">{s.label}</div>
            <div className="stat-value" style={{ fontSize: 24 }}>{s.value}</div>
          </div>
        ))}
      </div>
      <div className="card">
        <div className="card-header">
          <div>
            <div className="card-title">실시간 핀번호 검증 엔진</div>
            <div className="card-subtitle">핀번호 유효성 · 금액 · 중복 사용 여부를 자동 검증합니다</div>
          </div>
        </div>
        <div style={{ background: '#F8FAFC', borderRadius: 12, padding: 16, marginBottom: 16 }}>
          <div style={{ fontSize: 12, color: '#94A3B8', fontWeight: 600, marginBottom: 10 }}>검증 엔진 아키텍처</div>
          <div style={{ display: 'flex', alignItems: 'center', gap: 8, flexWrap: 'wrap' }}>
            {['사용자 입력', '→', 'Bull Queue', '→', '검증 워커 ×5', '→', 'Redis 캐시', '→', '상품권사 API', '→', '결과 반환'].map((t, i) => (
              <span key={i} style={{ fontSize: 12, color: t === '→' ? '#94A3B8' : '#1A56DB', background: t === '→' ? 'none' : '#EFF6FF', padding: t === '→' ? 0 : '4px 10px', borderRadius: 20, fontWeight: t === '→' ? 400 : 600 }}>{t}</span>
            ))}
          </div>
        </div>
        {pins.map((pin, i) => (
          <div key={i} style={{ border: '1.5px solid ' + (states[i] === 'valid' ? '#BBF7D0' : states[i] === 'invalid' ? '#FECACA' : '#E2E8F0'), borderRadius: 12, padding: 16, marginBottom: 12, background: states[i] === 'valid' ? '#F0FDF4' : states[i] === 'invalid' ? '#FEF2F2' : '#fff', transition: 'all 0.3s' }}>
            <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between' }}>
              <div>
                <div style={{ fontSize: 12, color: '#94A3B8', fontWeight: 600 }}>컬쳐랜드 핀번호 {i + 1}</div>
                <div style={{ fontFamily: 'monospace', fontSize: 16, fontWeight: 700, color: '#1E293B', letterSpacing: 2, marginTop: 4 }}>{pin}</div>
              </div>
              <div>
                {states[i] === 'idle' && <span className="badge badge-gray">대기중</span>}
                {states[i] === 'loading' && <span style={{ display: 'flex', alignItems: 'center', gap: 6, fontSize: 12, color: '#1A56DB', fontWeight: 600 }}><span className="verify-spinner" style={{ width: 18, height: 18, borderWidth: 2, display: 'inline-block' }}></span> 검증중...</span>}
                {states[i] === 'valid' && <span className="badge badge-green">✓ 유효 · 50,000원</span>}
                {states[i] === 'invalid' && <span className="badge badge-red">✗ 이미 사용됨</span>}
              </div>
            </div>
          </div>
        ))}
        <button className="btn-primary" onClick={runVerify} disabled={running} style={{ marginTop: 8 }}>
          {running ? '검증 실행 중...' : '🔍 검증 실행'}
        </button>
      </div>
      <div className="card">
        <div className="card-title" style={{ marginBottom: 16 }}>검증 결과 유형 분류</div>
        <div style={{ display: 'grid', gridTemplateColumns: 'repeat(3, 1fr)', gap: 12 }}>
          {[
            { type: '정상 (사용 가능)', count: 1284, color: '#16A34A', bg: '#F0FDF4' },
            { type: '사용됨 (재사용 불가)', count: 28, color: '#DC2626', bg: '#FEF2F2' },
            { type: '만료 / 잘못된 번호', count: 19, color: '#D97706', bg: '#FFFBEB' },
          ].map(r => (
            <div key={r.type} style={{ background: r.bg, borderRadius: 12, padding: 16 }}>
              <div style={{ fontSize: 12, color: r.color, fontWeight: 700 }}>{r.type}</div>
              <div style={{ fontSize: 28, fontWeight: 800, color: '#1E293B', marginTop: 4 }}>{r.count.toLocaleString()}</div>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

// History View

  const [filter, setFilter] = useState('전체');
  const [page, setPage] = useState(1);
  const PER_PAGE = 4;

  const filters = ['전체', '입금완료', '검증중', '매입불가'];
  const filtered = filter === '전체' ? TRANSACTIONS : TRANSACTIONS.filter(t => t.status === filter);
  const total = Math.ceil(filtered.length / PER_PAGE);
  const paginated = filtered.slice((page - 1) * PER_PAGE, page * PER_PAGE);

  return (
    <div>
      <div className="stats-grid" style={{ gridTemplateColumns: 'repeat(3, 1fr)' }}>
        {[
          { label: '이번 달 판매', value: '1,240,000원', change: '총 18건', icon: '💰', iconBg: '#EFF6FF' },
          { label: '입금 완료', value: '15건', change: '1,126,400원', icon: '✅', iconBg: '#F0FDF4' },
          { label: '진행중', value: '2건', change: '검증 · 승인 대기', icon: '⏳', iconBg: '#FFFBEB' },
        ].map(s => (
          <div key={s.label} className="stat-card">
            <div className="stat-icon" style={{ background: s.iconBg }}>{s.icon}</div>
            <div className="stat-label">{s.label}</div>
            <div className="stat-value" style={{ fontSize: 22 }}>{s.value}</div>
            <div className="stat-change" style={{ color: '#64748B' }}>{s.change}</div>
          </div>
        ))}
      </div>

      <div className="card">
        <div className="card-header">
          <div className="card-title">거래 내역</div>
          <div style={{ display: 'flex', gap: 6 }}>
            {filters.map(f => (
              <button key={f} onClick={() => { setFilter(f); setPage(1); }} style={{ padding: '6px 14px', border: '1px solid ' + (filter === f ? '#1A56DB' : '#E2E8F0'), borderRadius: 20, background: filter === f ? '#EFF6FF' : '#fff', color: filter === f ? '#1A56DB' : '#64748B', fontSize: 12, fontWeight: filter === f ? 700 : 500, cursor: 'pointer', fontFamily: 'inherit' }}>{f}</button>
            ))}
          </div>
        </div>
        <div className="table-wrap">
          <table>
            <thead>
              <tr>
                <th>거래번호</th><th>상품권</th><th>액면가</th><th>입금액</th><th>입금계좌</th><th>상태</th><th>일시</th>
              </tr>
            </thead>
            <tbody>
              {paginated.map(t => (
                <tr key={t.id}>
                  <td style={{ fontFamily: 'monospace', fontSize: 12 }}>{t.id}</td>
                  <td style={{ fontWeight: 600 }}>{t.type}</td>
                  <td>{t.amount.toLocaleString()}원</td>
                  <td style={{ fontWeight: 700, color: '#1A56DB' }}>{t.payout.toLocaleString()}원</td>
                  <td style={{ fontSize: 12, color: '#94A3B8' }}>{t.account}</td>
                  <td><Badge>{t.status}</Badge></td>
                  <td style={{ fontSize: 12, color: '#94A3B8' }}>{t.date}</td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
        <div className="pagination">
          <button className="page-btn" onClick={() => setPage(p => Math.max(1, p-1))} disabled={page === 1}>‹</button>
          {Array.from({ length: total || 1 }, (_, i) => (
            <button key={i+1} className={`page-btn ${page === i+1 ? 'active' : ''}`} onClick={() => setPage(i+1)}>{i+1}</button>
          ))}
          <button className="page-btn" onClick={() => setPage(p => Math.min(total, p+1))} disabled={page >= total}>›</button>

      </div>

      <div className="card">
        <div className="card-title" style={{ marginBottom: 16 }}>실시간 거래 처리 흐름</div>
        {[
          { dot: 'done', icon: '✓', title: '판매 신청 접수', desc: 'TRX-20240407-001 · 컬쳐랜드 50,000원', time: '14:23:01' },
          { dot: 'done', icon: '✓', title: '핀번호 검증 완료', desc: '유효 · 잔액 50,000원 확인', time: '14:23:03' },
          { dot: 'active', icon: '⚡', title: '입금 처리 중', desc: '국민은행 1234-56-789012 · 자동이체 요청', time: '14:23:04' },
          { dot: 'pending', icon: '○', title: '입금 완료 예정', desc: '약 3~5분 소요 예상', time: '예정' },
        ].map((item, i) => (
          <div key={i} className="timeline-item">
            <div className={`timeline-dot ${item.dot}`} style={{ color: item.dot === 'active' ? '#fff' : item.dot === 'done' ? '#1A56DB' : '#94A3B8' }}>{item.icon}</div>
            <div className="timeline-content">
              <div className="timeline-title">{item.title}</div>
              <div className="timeline-desc">{item.desc}</div>
              <div className="timeline-time">{item.time}</div>
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}

                <CartesianGrid strokeDasharray="3 3" stroke="#F1F5F9" />
                <XAxis dataKey="day" tick={{ fontSize: 11, fill: '#94A3B8' }} />
                <YAxis tick={{ fontSize: 11, fill: '#94A3B8' }} tickFormatter={v => `${(v/1000000).toFixed(0)}M`} />
                <Tooltip formatter={v => `${v.toLocaleString()}원`} />
                <Area type="monotone" dataKey="amount" stroke="#1A56DB" strokeWidth={2} fill="url(#colorAmt)" />
              </AreaChart>
            </ResponsiveContainer>
          </div>
        </div>
        <div className="card">
          <div className="card-header"><div className="card-title">상품권별 비중</div></div>
          <div className="chart-area">
            <ResponsiveContainer width="100%" height="100%">
              <PieChart>
                <Pie data={PIE_DATA} cx="50%" cy="50%" innerRadius={50} outerRadius={80} dataKey="value" label={({ name, value }) => `${name} ${value}%`} labelLine={false} fontSize={10}>
                  {PIE_DATA.map((e, i) => <Cell key={i} fill={e.color} />)}
                </Pie>
                <Tooltip />
              </PieChart>
            </ResponsiveContainer>
          </div>
        </div>
      </div>

      <div className="card">
        <div className="card-header">
          <div>
            <div className="card-title">매입 신청 관리</div>
            <div className="card-subtitle">실시간 업데이트 · {selected.length > 0 && `${selected.length}건 선택됨`}</div>
          </div>
          <div style={{ display: 'flex', gap: 8 }}>
            {selected.length > 0 && <>
              <button onClick={() => handleBulk('일괄 승인')} style={{ background: '#1A56DB', color: '#fff', border: 'none', borderRadius: 8, padding: '8px 16px', fontSize: 13, fontWeight: 600, cursor: 'pointer', fontFamily: 'inherit' }}>일괄 승인 ({selected.length})</button>
              <button onClick={() => handleBulk('일괄 반려')} style={{ background: '#FEF2F2', color: '#DC2626', border: '1px solid #FECACA', borderRadius: 8, padding: '8px 16px', fontSize: 13, fontWeight: 600, cursor: 'pointer', fontFamily: 'inherit' }}>반려</button>
            </>}
          </div>
        </div>
        <div className="select-all">
          <input type="checkbox" className="checkbox" checked={selected.length === ADMIN_DATA.length} onChange={selectAll} />
          <span style={{ fontSize: 12, color: '#64748B' }}>전체 선택</span>
        </div>
        <div className="table-wrap">
          <table>
            <thead>
              <tr>
                <th style={{ width: 40 }}></th>
                <th>거래 ID</th><th>신청자</th><th>상품권</th><th>금액</th><th>핀번호</th><th>상태</th><th>시각</th><th>처리</th>
              </tr>
            </thead>
            <tbody>
              {paginated.map(d => (
                <tr key={d.id}>
                  <td><input type="checkbox" className="checkbox" checked={selected.includes(d.id)} onChange={() => toggleSelect(d.id)} /></td>
                  <td style={{ fontFamily: 'monospace', fontSize: 11 }}>{d.id}</td>
                  <td style={{ fontWeight: 600 }}>{d.user}</td>
                  <td>{d.type}</td>
                  <td style={{ fontWeight: 700, color: '#1A56DB' }}>{d.amount.toLocaleString()}원</td>
                  <td style={{ fontFamily: 'monospace', fontSize: 12, color: '#94A3B8' }}>{d.pin}</td>
                  <td><Badge>{d.status}</Badge></td>
                  <td style={{ fontSize: 12, color: '#94A3B8' }}>{d.time}</td>
                  <td>
                    <div style={{ display: 'flex', gap: 4 }}>
                      <button onClick={() => setToast(`${d.id} 승인 처리`)} style={{ background: '#EFF6FF', color: '#1A56DB', border: 'none', borderRadius: 6, padding: '4px 10px', fontSize: 12, fontWeight: 600, cursor: 'pointer', fontFamily: 'inherit' }}>승인</button>
                      <button onClick={() => setToast(`${d.id} 반려 처리`)} style={{ background: '#FEF2F2', color: '#DC2626', border: 'none', borderRadius: 6, padding: '4px 10px', fontSize: 12, fontWeight: 600, cursor: 'pointer', fontFamily: 'inherit' }}>반려</button>
                    </div>
                  </td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
        <div className="pagination">
          <button className="page-btn" onClick={() => setPage(p => Math.max(1, p-1))} disabled={page === 1}>‹</button>
          {Array.from({ length: total }, (_, i) => (
            <button key={i+1} className={`page-btn ${page === i+1 ? 'active' : ''}`} onClick={() => setPage(i+1)}>{i+1}</button>
          ))}
          <button className="page-btn" onClick={() => setPage(p => Math.min(total, p+1))} disabled={page >= total}>›</button>
        </div>
      </div>

      <div className="card">
        <div className="card-header"><div className="card-title">상품권 정책 관리</div><span className="badge badge-blue">실시간 적용</span></div>
        {GIFT_CARDS.slice(0, 5).map(gc => (
          <div key={gc.id} className="policy-row">
            <div className="policy-gc">
              <div className="policy-gc-icon" style={{ background: gc.bg }}>{gc.icon}</div>
              <div className="policy-gc-name">{gc.name}</div>
            </div>
            <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
              <span style={{ fontSize: 13, color: '#94A3B8' }}>매입률</span>
              <input className="rate-input" defaultValue={gc.rate} />
              <span style={{ fontSize: 13, color: '#94A3B8' }}>%</span>
            </div>
            <span className={`badge ${gc.rate >= 90 ? 'badge-green' : 'badge-yellow'}`}>{gc.rate >= 90 ? '활성' : '제한'}</span>
          </div>
        ))}
      </div>

      {toast && <Toast msg={toast} onClose={() => setToast('')} />}
    </div>
  );
}

function App() {
  const [activeView, setActiveView] = useState('main');

  const navItems = [
    { key: 'main', label: '상품권 매입 신청', icon: '🎫', section: '서비스' },
    { key: 'verify', label: '핀번호 검증', icon: '🔍', section: '서비스' },
    { key: 'history', label: '거래 내역', icon: '📋', section: '서비스', badge: '2' },
    { key: 'admin', label: '관리자 대시보드', icon: '⚙️', section: '관리' },
  ];

  const sections = [...new Set(navItems.map(n => n.section))];
  const viewTitles = { main: '상품권 매입 신청', verify: '핀번호 검증 엔진', history: '거래 내역', admin: '관리자 대시보드' };

  return (
    <>
      <div className="sidebar">
        <div className="sidebar-logo">
          <div className="logo-icon">G</div>
          <div>
            <div className="logo-text">기프트페이</div>
            <div className="logo-sub">상품권 자동 매입 플랫폼</div>
          </div>
        </div>
        <nav className="sidebar-nav">
          {sections.map(section => (
            <div key={section}>
              <div className="nav-section-label">{section}</div>
              {navItems.filter(n => n.section === section).map(item => (
                <button key={item.key} className={`nav-item ${activeView === item.key ? 'active' : ''}`} onClick={() => setActiveView(item.key)}>
                  <span className="icon">{item.icon}</span>
                  {item.label}
                  {item.badge && <span className="nav-badge">{item.badge}</span>}
                </button>
              ))}
            </div>
          ))}
        </nav>
        <div className="sidebar-footer">
          <div className="user-avatar">김</div>
          <div className="user-info">
            <div className="user-name">김지수</div>
            <div className="user-role">일반 회원</div>
          </div>
        </div>
      </div>

      <div className="main">
        <div className="topbar">
          <div>
            <div className="topbar-breadcrumb">기프트페이</div>
            <div className="topbar-title">{viewTitles[activeView]}</div>
          </div>
          <div className="topbar-spacer" />
          <span className="topbar-badge">🟢 실시간 운영 중</span>
          <button className="topbar-btn">매입 신청 +</button>
        </div>
        <div className="content">
          {activeView === 'main' && <MainView onNavigate={setActiveView} />}
          {activeView === 'verify' && <VerifyView />}
          {activeView === 'history' && <HistoryView />}
          {activeView === 'admin' && <AdminView />}
        </div>
      </div>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
