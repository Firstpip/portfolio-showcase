<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>디바이스딜 — 구현 데모</title>
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" rel="stylesheet">
<script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://unpkg.com/prop-types/prop-types.min.js"></script>
<script src="https://unpkg.com/react-is@18.3.1/umd/react-is.development.js"></script>
<script src="https://unpkg.com/recharts@2.15.0/umd/Recharts.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Pretendard', -apple-system, sans-serif; background: #FAF5FF; color: #1E1B4B; min-height: 100vh; word-break: keep-all; overflow-wrap: break-word; }

  /* Topnav */
  .topnav {
    background: #fff; border-bottom: 1px solid #EDE9FE; padding: 0 32px;
    display: flex; align-items: center; gap: 0; height: 64px; position: sticky; top: 0; z-index: 100;
    box-shadow: 0 2px 12px rgba(124,58,237,0.07);
  }
  .logo { display: flex; align-items: center; gap: 10px; margin-right: 40px; text-decoration: none; }
  .logo-mark {
    width: 38px; height: 38px; background: linear-gradient(135deg, #7C3AED, #EC4899);
    border-radius: 12px; display: flex; align-items: center; justify-content: center;
    color: #fff; font-weight: 900; font-size: 17px;
  }
  .logo-text { font-size: 20px; font-weight: 900; background: linear-gradient(135deg, #7C3AED, #EC4899); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  .logo-sub { font-size: 11px; color: #A78BFA; margin-top: -2px; }

  .nav-tabs { display: flex; gap: 0; flex: 1; }
  .nav-tab {
    padding: 0 22px; height: 64px; display: flex; align-items: center; gap: 6px;
    font-size: 14px; font-weight: 600; color: #6B7280; cursor: pointer; border: none; background: none;
    border-bottom: 3px solid transparent; transition: all 0.15s; font-family: inherit; position: relative;
  }
  .nav-tab:hover { color: #7C3AED; }
  .nav-tab.active { color: #7C3AED; border-bottom-color: #7C3AED; }
  .nav-badge { background: linear-gradient(135deg, #7C3AED, #EC4899); color: #fff; font-size: 11px; font-weight: 700; padding: 2px 7px; border-radius: 20px; }

  .nav-right { margin-left: auto; display: flex; align-items: center; gap: 12px; }
  .nav-btn {
    background: linear-gradient(135deg, #7C3AED, #EC4899); color: #fff; border: none; border-radius: 10px;
    padding: 9px 20px; font-size: 14px; font-weight: 700; cursor: pointer; font-family: inherit;
  }
  .user-chip { display: flex; align-items: center; gap: 8px; padding: 6px 12px; background: #F5F3FF; border-radius: 10px; }
  .user-ava { width: 28px; height: 28px; border-radius: 50%; background: linear-gradient(135deg, #7C3AED, #EC4899); display: flex; align-items: center; justify-content: center; color: #fff; font-size: 12px; font-weight: 700; }
  .user-nm { font-size: 13px; font-weight: 600; color: #1E1B4B; }

  /* Hero */
  .hero {
    background: linear-gradient(135deg, #7C3AED 0%, #6D28D9 40%, #EC4899 100%);
    padding: 40px 32px; color: #fff;
  }
  .hero-label { font-size: 12px; font-weight: 700; letter-spacing: 0.12em; opacity: 0.7; text-transform: uppercase; margin-bottom: 8px; }
  .hero-title { font-size: 32px; font-weight: 900; margin-bottom: 6px; }
  .hero-sub { font-size: 15px; opacity: 0.85; }
  .hero-stats { display: flex; gap: 32px; margin-top: 24px; }
  .hero-stat-val { font-size: 28px; font-weight: 900; }
  .hero-stat-label { font-size: 12px; opacity: 0.7; margin-top: 2px; }

  /* Content */
  .content { max-width: 1200px; margin: 0 auto; padding: 32px; }

  /* Cards */
  .card { background: #fff; border-radius: 16px; box-shadow: 0 2px 16px rgba(124,58,237,0.08); padding: 24px; margin-bottom: 20px; }
  .card-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
  .card-title { font-size: 17px; font-weight: 800; color: #1E1B4B; }
  .card-sub { font-size: 13px; color: #6B7280; margin-top: 2px; }

  /* Stats */
  .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 20px; }
  .stat-card { background: #fff; border-radius: 16px; padding: 20px; box-shadow: 0 2px 12px rgba(124,58,237,0.07); border-top: 3px solid; }
  .stat-card.purple { border-top-color: #7C3AED; }
  .stat-card.pink { border-top-color: #EC4899; }
  .stat-card.green { border-top-color: #10B981; }
  .stat-card.amber { border-top-color: #F59E0B; }
  .stat-label { font-size: 11px; font-weight: 700; color: #9CA3AF; text-transform: uppercase; letter-spacing: 0.08em; }
  .stat-value { font-size: 28px; font-weight: 900; color: #1E1B4B; margin: 6px 0 4px; }
  .stat-change { font-size: 12px; font-weight: 600; color: #6B7280; }

  /* Badges */
  .badge { display: inline-flex; align-items: center; gap: 4px; padding: 4px 10px; border-radius: 20px; font-size: 12px; font-weight: 700; }
  .b-purple { background: #F5F3FF; color: #7C3AED; }
  .b-green { background: #ECFDF5; color: #059669; }
  .b-pink { background: #FDF2F8; color: #DB2777; }
  .b-amber { background: #FFFBEB; color: #D97706; }
  .b-gray { background: #F3F4F6; color: #6B7280; }
  .b-red { background: #FEF2F2; color: #DC2626; }

  /* Device cards */
  .device-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin-bottom: 20px; }
  .device-card {
    border: 2px solid #EDE9FE; border-radius: 14px; padding: 20px; cursor: pointer;
    transition: all 0.15s; text-align: center; position: relative;
  }
  .device-card:hover { border-color: #7C3AED; transform: translateY(-2px); box-shadow: 0 6px 20px rgba(124,58,237,0.15); }
  .device-card.selected { border-color: #7C3AED; background: #F5F3FF; }
  .device-card.selected::after { content: '✓'; position: absolute; top: 10px; right: 10px; width: 22px; height: 22px; background: #7C3AED; color: #fff; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 800; }
  .device-icon { font-size: 36px; margin-bottom: 10px; }
  .device-name { font-size: 14px; font-weight: 800; color: #1E1B4B; margin-bottom: 4px; }
  .device-price { font-size: 13px; color: #7C3AED; font-weight: 700; }

  /* Condition slider */
  .condition-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 14px; }
  .condition-item { background: #F9F7FF; border-radius: 12px; padding: 16px; }
  .condition-label { font-size: 13px; font-weight: 700; color: #1E1B4B; margin-bottom: 10px; display: flex; justify-content: space-between; }
  .condition-score { color: #7C3AED; }
  .condition-options { display: flex; gap: 6px; }
  .cond-btn { flex: 1; padding: 7px 4px; border: 1.5px solid #EDE9FE; border-radius: 8px; background: #fff; font-size: 12px; font-weight: 600; cursor: pointer; font-family: inherit; color: #6B7280; transition: all 0.15s; text-align: center; }
  .cond-btn.active { background: #7C3AED; border-color: #7C3AED; color: #fff; }

  /* Price result */
  .price-banner {
    background: linear-gradient(135deg, #7C3AED, #EC4899); border-radius: 16px; padding: 28px;
    color: #fff; text-align: center; margin-bottom: 20px; position: relative; overflow: hidden;
  }
  .price-banner::before { content: ''; position: absolute; inset: 0; background: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.03'%3E%3Ccircle cx='30' cy='30' r='20'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E"); }
  .price-label { font-size: 13px; opacity: 0.8; font-weight: 600; }
  .price-value { font-size: 48px; font-weight: 900; margin: 8px 0; }
  .price-info { font-size: 13px; opacity: 0.8; }
  .price-breakdown { display: flex; justify-content: center; gap: 24px; margin-top: 16px; padding-top: 16px; border-top: 1px solid rgba(255,255,255,0.2); }
  .price-item { text-align: center; }
  .price-item-label { font-size: 11px; opacity: 0.7; }
  .price-item-value { font-size: 16px; font-weight: 800; margin-top: 2px; }

  /* Timeline */
  .timeline { position: relative; padding-left: 28px; }
  .tl-item { position: relative; padding-bottom: 28px; }
  .tl-item::before { content: ''; position: absolute; left: -20px; top: 14px; bottom: 0; width: 2px; background: #EDE9FE; }
  .tl-item:last-child::before { display: none; }
  .tl-dot { position: absolute; left: -26px; top: 8px; width: 14px; height: 14px; border-radius: 50%; border: 2px solid #EDE9FE; background: #fff; }
  .tl-dot.done { background: #7C3AED; border-color: #7C3AED; }
  .tl-dot.active { background: #EC4899; border-color: #EC4899; box-shadow: 0 0 0 4px rgba(236,72,153,0.2); }
  .tl-title { font-size: 14px; font-weight: 700; color: #1E1B4B; margin-bottom: 2px; }
  .tl-desc { font-size: 12px; color: #9CA3AF; }
  .tl-time { font-size: 11px; color: #C4B5FD; margin-top: 4px; }

  /* Table */
  .table-wrap { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th { text-align: left; padding: 10px 16px; color: #9CA3AF; font-weight: 700; font-size: 11px; border-bottom: 1px solid #F3F4F6; text-transform: uppercase; letter-spacing: 0.05em; }
  td { padding: 14px 16px; border-bottom: 1px solid #FAF5FF; color: #374151; vertical-align: middle; }
  tr:hover td { background: #F9F7FF; }
  tr:last-child td { border-bottom: none; }

  /* Buttons */
  .btn-grad { background: linear-gradient(135deg, #7C3AED, #EC4899); color: #fff; border: none; border-radius: 12px; padding: 13px 28px; font-size: 15px; font-weight: 800; cursor: pointer; font-family: inherit; width: 100%; transition: opacity 0.15s; }
  .btn-grad:hover { opacity: 0.9; }
  .btn-outline { background: #fff; color: #7C3AED; border: 2px solid #EDE9FE; border-radius: 12px; padding: 12px 28px; font-size: 15px; font-weight: 700; cursor: pointer; font-family: inherit; width: 100%; transition: all 0.15s; }
  .btn-outline:hover { border-color: #7C3AED; background: #F5F3FF; }
  .btn-row { display: flex; gap: 12px; }
  .btn-row > * { flex: 1; }
  .btn-sm { padding: 6px 14px; border: none; border-radius: 8px; font-size: 12px; font-weight: 700; cursor: pointer; font-family: inherit; }
  .btn-sm-purple { background: #F5F3FF; color: #7C3AED; }
  .btn-sm-pink { background: #FDF2F8; color: #DB2777; }

  /* Form */
  .form-group { margin-bottom: 20px; }
  .form-label { font-size: 13px; font-weight: 700; color: #1E1B4B; margin-bottom: 8px; display: block; }
  .form-input { width: 100%; padding: 11px 14px; border: 2px solid #EDE9FE; border-radius: 12px; font-size: 14px; color: #1E1B4B; background: #fff; outline: none; font-family: inherit; transition: border-color 0.15s; }
  .form-input:focus { border-color: #7C3AED; box-shadow: 0 0 0 3px rgba(124,58,237,0.1); }

  /* Pagination */
  .pagination { display: flex; align-items: center; justify-content: center; gap: 4px; padding: 16px 0 0; }
  .page-btn { width: 34px; height: 34px; border: 1.5px solid #EDE9FE; border-radius: 8px; background: #fff; cursor: pointer; font-size: 13px; font-weight: 600; color: #6B7280; display: flex; align-items: center; justify-content: center; font-family: inherit; }
  .page-btn.active { background: linear-gradient(135deg, #7C3AED, #EC4899); color: #fff; border-color: transparent; font-weight: 800; }
  .page-btn:hover:not(.active) { background: #F5F3FF; color: #7C3AED; }

  /* Chart */
  .chart-area { height: 200px; }

  /* Toast */
  .toast { position: fixed; bottom: 28px; right: 28px; background: linear-gradient(135deg, #7C3AED, #EC4899); color: #fff; padding: 14px 22px; border-radius: 12px; font-size: 14px; font-weight: 600; z-index: 300; animation: slideUp 0.3s; box-shadow: 0 8px 24px rgba(124,58,237,0.3); }
  @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

  /* Model selector */
  .model-select { background: #F9F7FF; border-radius: 12px; padding: 16px; margin-bottom: 16px; }
  .model-search { display: flex; gap: 8px; margin-bottom: 12px; }
  .model-search input { flex: 1; padding: 9px 14px; border: 2px solid #EDE9FE; border-radius: 10px; font-size: 14px; font-family: inherit; outline: none; color: #1E1B4B; }
  .model-search input:focus { border-color: #7C3AED; }
  .model-list { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
  .model-item { padding: 10px 12px; border: 2px solid #EDE9FE; border-radius: 10px; background: #fff; cursor: pointer; font-size: 13px; font-weight: 600; color: #374151; transition: all 0.15s; text-align: center; }
  .model-item:hover, .model-item.selected { border-color: #7C3AED; background: #F5F3FF; color: #7C3AED; }

  .step-indicator { display: flex; align-items: center; gap: 8px; margin-bottom: 24px; }
  .step-dot { width: 10px; height: 10px; border-radius: 50%; background: #EDE9FE; }
  .step-dot.done { background: #7C3AED; }
  .step-dot.active { background: linear-gradient(135deg, #7C3AED, #EC4899); box-shadow: 0 0 0 3px rgba(124,58,237,0.2); }
  .step-line { flex: 1; height: 2px; background: #EDE9FE; border-radius: 2px; }
  .step-line.done { background: #7C3AED; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect } = React;
const { BarChart, Bar, LineChart, Line, XAxis, YAxis, CartesianGrid, Tooltip, ResponsiveContainer, Cell } = Recharts;

const MODELS = {
  phone: ['삼성 갤럭시 S24 Ultra', '삼성 갤럭시 S24+', '아이폰 15 Pro Max', '아이폰 15 Pro', '아이폰 15', '삼성 갤럭시 Z폴드6', '삼성 갤럭시 Z플립6', '아이폰 14 Pro'],
  tablet: ['아이패드 프로 M4 11인치', '아이패드 에어 M2', '갤럭시 탭 S9+', '갤럭시 탭 S9 FE'],
  laptop: ['맥북 프로 14인치 M3', '맥북 에어 M3', '삼성 갤럭시북4 프로', 'LG 그램 2024'],
};

const BASE_PRICES = {
  '삼성 갤럭시 S24 Ultra': 780000,
  '삼성 갤럭시 S24+': 560000,
  '아이폰 15 Pro Max': 820000,
  '아이폰 15 Pro': 680000,
  '아이폰 15': 480000,
  '삼성 갤럭시 Z폴드6': 920000,
  '삼성 갤럭시 Z플립6': 620000,
  '아이폰 14 Pro': 540000,
};

const DEVICES = [
  { id: 'phone', name: '스마트폰', icon: '📱', range: '10만~92만원', count: '3,241건' },
  { id: 'tablet', name: '태블릿', icon: '📟', range: '5만~68만원', count: '891건' },
  { id: 'laptop', name: '노트북', icon: '💻', range: '8만~130만원', count: '445건' },
];

const CHART_DATA = [
  { day: '4/1', amount: 8400, count: 124 },
  { day: '4/2', amount: 7200, count: 108 },
  { day: '4/3', amount: 11400, count: 178 },
  { day: '4/4', amount: 9800, count: 144 },
  { day: '4/5', amount: 14200, count: 212 },
  { day: '4/6', amount: 12600, count: 189 },
  { day: '4/7', amount: 13800, count: 205 },
];

const RECENT_ORDERS = [
  { id: 'DD-20240407-089', device: '아이폰 15 Pro Max', user: '이준혁', status: '검수중', quoted: 820000, final: null, time: '14:52' },
  { id: 'DD-20240407-088', device: '갤럭시 S24 Ultra', user: '최수아', status: '입금완료', quoted: 710000, final: 695000, time: '13:40' },
  { id: 'DD-20240407-087', device: '맥북 프로 M3', user: '박민서', status: '배송중', quoted: 1150000, final: null, time: '11:22' },
  { id: 'DD-20240407-086', device: '아이패드 프로 M4', user: '김도윤', status: '입금완료', quoted: 580000, final: 562000, time: '10:05' },
  { id: 'DD-20240407-085', device: '갤럭시 Z폴드6', user: '정서윤', status: '견적만료', quoted: 860000, final: null, time: '09:18' },
];

function Badge({ children }) {
  const map = { '검수중': 'b-amber', '입금완료': 'b-green', '배송중': 'b-purple', '견적만료': 'b-red', '접수완료': 'b-gray' };
  return <span className={`badge ${map[children] || 'b-gray'}`}>{children}</span>;
}

function Toast({ msg, onClose }) {
  useEffect(() => { const t = setTimeout(onClose, 3000); return () => clearTimeout(t); }, []);
  return <div className="toast">✅ {msg}</div>;
}

// Main: 기기 평가 + 견적
function MainView({ onNav }) {
  const [phase, setPhase] = useState(0); // 0:기기선택 1:모델 2:상태 3:결과
  const [devType, setDevType] = useState(null);
  const [model, setModel] = useState(null);
  const [conds, setConds] = useState({ screen: 1, battery: 1, body: 1, function: 1 });
  const [toast, setToast] = useState('');

  const condLabels = [
    { key: 'screen', name: '화면 상태', opts: ['손상', '미세흠집', '양호', '완벽'] },
    { key: 'battery', name: '배터리 수명', opts: ['80% 미만', '85%', '90%', '100%'] },
    { key: 'body', name: '외관 상태', opts: ['손상심함', '흠집있음', '약간흠집', '무흠집'] },
    { key: 'function', name: '기능 상태', opts: ['일부불량', '미세이슈', '정상', '완전정상'] },
  ];

  const basePrice = model ? (BASE_PRICES[model] || 600000) : 600000;
  const condScore = Object.values(conds).reduce((a, b) => a + b, 0) / (4 * 3);
  const finalPrice = Math.round(basePrice * (0.65 + condScore * 0.25) / 10000) * 10000;

  const steps = ['기기 선택', '모델 선택', '상태 평가', '견적 확인'];

  return (
    <div>
      <div className="hero">
        <div className="hero-label">디바이스딜 · 즉시 매입 플랫폼</div>
        <div className="hero-title">중고 기기, 지금 바로 현금화 💸</div>
        <div className="hero-sub">자동 상태 평가 → 즉시 견적 → 당일 입금까지, 모든 과정이 자동화됩니다</div>
        <div className="hero-stats">
          {[{ v: '4,577', l: '오늘 매입 견적' }, { v: '₩13.8M', l: '오늘 지급 총액' }, { v: '2시간', l: '평균 입금 시간' }].map(s => (
            <div key={s.l}><div className="hero-stat-val">{s.v}</div><div className="hero-stat-label">{s.l}</div></div>
          ))}
        </div>
      </div>

      <div className="content">
        {/* Step Indicator */}
        <div style={{ display: 'flex', alignItems: 'center', marginBottom: 24 }}>
          {steps.map((s, i) => (
            <React.Fragment key={i}>
              <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 4 }}>
                <div style={{ width: 32, height: 32, borderRadius: '50%', display: 'flex', alignItems: 'center', justifyContent: 'center', background: i < phase ? '#7C3AED' : i === phase ? 'linear-gradient(135deg,#7C3AED,#EC4899)' : '#EDE9FE', color: i <= phase ? '#fff' : '#9CA3AF', fontWeight: 800, fontSize: 13 }}
                  onClick={() => i < phase && setPhase(i)} style2={{ cursor: i < phase ? 'pointer' : 'default' }}>
                  {i < phase ? '✓' : i+1}
                </div>
                <div style={{ fontSize: 11, fontWeight: 600, color: i === phase ? '#7C3AED' : '#9CA3AF' }}>{s}</div>
              </div>
              {i < steps.length - 1 && <div style={{ flex: 1, height: 2, background: i < phase ? '#7C3AED' : '#EDE9FE', margin: '0 8px', marginBottom: 20 }} />}
            </React.Fragment>
          ))}
        </div>

        {phase === 0 && (
          <div className="card">
            <div className="card-header"><div className="card-title">판매할 기기 유형 선택</div><span className="badge b-purple">전국 무료 픽업</span></div>
            <div className="device-grid">
              {DEVICES.map(d => (

      {view === 'main' && <MainView onNav={setView} />}
      {view === 'apply' && <ApplyView />}
      {view === 'track' && <TrackView />}
      {view === 'admin' && <AdminView />}
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
