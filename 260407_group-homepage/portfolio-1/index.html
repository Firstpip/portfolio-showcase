<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PSK그룹 통합 홈페이지 & CMS — 맞춤 구현 데모</title>
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" rel="stylesheet">
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://unpkg.com/prop-types/prop-types.min.js"></script>
<script src="https://unpkg.com/react-is@18.3.1/umd/react-is.development.js"></script>
<script src="https://unpkg.com/recharts@2.15.0/umd/Recharts.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Pretendard',sans-serif;background:#F4F6FA;color:#1A1E2D;word-break:keep-all;overflow-wrap:break-word}
:root{
  --primary:#1B3A6B;--secondary:#2E5FA3;--accent:#E85D26;
  --bg:#F4F6FA;--surface:#fff;--border:#E2E8F0;
  --text1:#1A1E2D;--text2:#5A6478;--text3:#94A3B8;
  --sidebar-w:260px;--topbar-h:60px;
}
/* SCROLLBAR */
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:#CBD5E1;border-radius:3px}
/* LAYOUT */
#root{display:flex;min-height:100vh}
.sidebar{width:var(--sidebar-w);min-height:100vh;background:var(--primary);display:flex;flex-direction:column;position:fixed;top:0;left:0;z-index:100}
.sidebar-logo{padding:20px 20px 16px;border-bottom:1px solid rgba(255,255,255,0.1)}
.sidebar-logo-title{font-size:18px;font-weight:700;color:#fff;letter-spacing:-0.3px}
.sidebar-logo-sub{font-size:11px;color:rgba(255,255,255,0.5);margin-top:3px}
.company-switcher{padding:12px 16px;border-bottom:1px solid rgba(255,255,255,0.1)}
.company-switcher-label{font-size:10px;color:rgba(255,255,255,0.4);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px}
.company-btn{width:100%;display:flex;align-items:center;gap:8px;padding:8px 12px;border-radius:6px;border:none;background:transparent;color:rgba(255,255,255,0.7);cursor:pointer;font-size:13px;font-family:'Pretendard',sans-serif;transition:.2s}
.company-btn:hover{background:rgba(255,255,255,0.08);color:#fff}
.company-btn.active{background:rgba(255,255,255,0.15);color:#fff;font-weight:600}
.company-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.sidebar-nav{padding:16px 0;flex:1}
.nav-section-label{padding:4px 20px 8px;font-size:10px;color:rgba(255,255,255,0.35);text-transform:uppercase;letter-spacing:1px}
.nav-btn{width:100%;display:flex;align-items:center;gap:10px;padding:10px 20px;border:none;background:transparent;color:rgba(255,255,255,0.65);cursor:pointer;font-size:14px;font-family:'Pretendard',sans-serif;transition:.15s;text-align:left;border-left:3px solid transparent}
.nav-btn:hover{background:rgba(255,255,255,0.07);color:#fff}
.nav-btn.active{background:rgba(255,255,255,0.12);color:#fff;font-weight:600;border-left-color:var(--accent)}
.nav-icon{font-size:16px;width:18px;text-align:center;flex-shrink:0}
.sidebar-bottom{padding:16px;border-top:1px solid rgba(255,255,255,0.1)}
.admin-badge{display:flex;align-items:center;gap:8px;padding:8px 12px;background:rgba(255,255,255,0.08);border-radius:6px}
.admin-avatar{width:28px;height:28px;border-radius:50%;background:var(--accent);display:flex;align-items:center;justify-content:center;color:#fff;font-size:12px;font-weight:700;flex-shrink:0}
.admin-info{flex:1;min-width:0}
.admin-name{font-size:12px;font-weight:600;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.admin-role{font-size:10px;color:rgba(255,255,255,0.4)}
/* MAIN */
.main-content{margin-left:var(--sidebar-w);flex:1;display:flex;flex-direction:column;min-height:100vh}
.topbar{height:var(--topbar-h);background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 28px;gap:12px;position:sticky;top:0;z-index:50}
.topbar-breadcrumb{font-size:13px;color:var(--text2)}
.topbar-breadcrumb span{color:var(--text1);font-weight:600}
.topbar-actions{margin-left:auto;display:flex;align-items:center;gap:10px}
.btn{display:inline-flex;align-items:center;gap:6px;padding:7px 16px;border-radius:6px;font-size:13px;font-weight:500;font-family:'Pretendard',sans-serif;cursor:pointer;border:none;transition:.15s}
.btn-primary{background:var(--secondary);color:#fff}
.btn-primary:hover{background:var(--primary)}
.btn-outline{background:transparent;color:var(--text2);border:1px solid var(--border)}
.btn-outline:hover{background:var(--bg);color:var(--text1)}
.btn-accent{background:var(--accent);color:#fff}
.btn-accent:hover{opacity:.9}
.topbar-noti{width:36px;height:36px;border-radius:8px;background:var(--bg);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:16px;position:relative}
.noti-dot{position:absolute;top:6px;right:6px;width:7px;height:7px;border-radius:50%;background:var(--accent);border:2px solid var(--surface)}
.page-content{padding:28px;flex:1}
/* SKELETON */
.skeleton{background:linear-gradient(90deg,#E2E8F0 25%,#EEF2F7 50%,#E2E8F0 75%);background-size:200% 100%;animation:shimmer 1.5s infinite;border-radius:6px}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
/* CARDS */
.card{background:var(--surface);border-radius:10px;box-shadow:0 1px 4px rgba(0,0,0,0.06),0 2px 12px rgba(0,0,0,0.04);overflow:hidden}
.card-header{padding:18px 22px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px}
.card-title{font-size:15px;font-weight:600;color:var(--text1)}
.card-body{padding:22px}
/* KPI CARDS */
.kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:24px}
.kpi-card{background:var(--surface);border-radius:10px;padding:20px;box-shadow:0 1px 4px rgba(0,0,0,0.06);border-left:4px solid var(--secondary)}
.kpi-label{font-size:12px;color:var(--text2);font-weight:500;margin-bottom:8px}
.kpi-value{font-size:26px;font-weight:700;color:var(--text1);letter-spacing:-0.5px}
.kpi-sub{font-size:11px;color:var(--text3);margin-top:4px}
/* GRID */
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
/* SECTION TITLE */
.section-title{font-size:20px;font-weight:700;color:var(--text1);margin-bottom:6px;letter-spacing:-0.3px}
.section-sub{font-size:14px;color:var(--text2);margin-bottom:24px}
/* COMPANY INTRO PAGE */
.hero-banner{background:linear-gradient(135deg,var(--primary) 0%,var(--secondary) 100%);border-radius:12px;padding:40px 40px 32px;margin-bottom:24px;display:flex;justify-content:space-between;align-items:flex-end}
.hero-text h1{font-size:28px;font-weight:800;color:#fff;letter-spacing:-0.5px;margin-bottom:10px}
.hero-text p{font-size:14px;color:rgba(255,255,255,0.75);line-height:1.7;max-width:500px}
.hero-badge{display:inline-flex;align-items:center;gap:6px;padding:5px 12px;background:rgba(255,255,255,0.15);border-radius:20px;color:#fff;font-size:12px;font-weight:500;margin-bottom:14px}
.hero-stats{display:flex;gap:32px}
.hero-stat-item{text-align:right}
.hero-stat-val{font-size:24px;font-weight:700;color:#fff}
.hero-stat-label{font-size:11px;color:rgba(255,255,255,0.6)}
/* VISION CARDS */
.vision-card{background:var(--surface);border-radius:10px;padding:24px;box-shadow:0 1px 4px rgba(0,0,0,0.06);border-top:3px solid var(--accent)}
.vision-icon{font-size:28px;margin-bottom:12px}
.vision-title{font-size:16px;font-weight:700;color:var(--text1);margin-bottom:8px}
.vision-desc{font-size:13px;color:var(--text2);line-height:1.7}
/* TIMELINE */
.timeline{padding:0}
.timeline-item{display:flex;gap:20px;padding:18px 0;border-bottom:1px solid var(--border);position:relative}
.timeline-item:last-child{border-bottom:none}
.timeline-year{font-size:22px;font-weight:800;color:var(--secondary);min-width:70px}
.timeline-content{flex:1}
.timeline-badge{display:inline-block;padding:3px 10px;background:#EEF2FF;color:var(--secondary);border-radius:12px;font-size:11px;font-weight:600;margin-bottom:8px}
.timeline-event{font-size:14px;color:var(--text1);font-weight:500;line-height:1.6}
/* BUSINESS AREAS */
.biz-card{background:var(--surface);border-radius:10px;padding:22px;box-shadow:0 1px 4px rgba(0,0,0,0.06);cursor:pointer;transition:.2s;border:2px solid transparent}
.biz-card:hover{border-color:var(--secondary);transform:translateY(-2px)}
.biz-icon{width:48px;height:48px;border-radius:10px;background:#EEF4FF;display:flex;align-items:center;justify-content:center;font-size:22px;margin-bottom:14px}
.biz-name{font-size:15px;font-weight:700;color:var(--text1);margin-bottom:6px}
.biz-desc{font-size:12px;color:var(--text2);line-height:1.6}
/* PRODUCTS PAGE */
.filter-row{display:flex;align-items:center;gap:8px;margin-bottom:22px;flex-wrap:wrap}
.filter-chip{padding:6px 14px;border-radius:20px;border:1px solid var(--border);background:var(--surface);color:var(--text2);font-size:13px;cursor:pointer;font-family:'Pretendard',sans-serif;transition:.15s}
.filter-chip:hover{border-color:var(--secondary);color:var(--secondary)}
.filter-chip.active{background:var(--secondary);color:#fff;border-color:var(--secondary)}
.product-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:18px}
.product-card{background:var(--surface);border-radius:10px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,0.06);cursor:pointer;transition:.2s}
.product-card:hover{box-shadow:0 4px 20px rgba(0,0,0,0.1);transform:translateY(-2px)}
.product-img{height:140px;display:flex;align-items:center;justify-content:center;font-size:40px}
.product-info{padding:16px}
.product-category{font-size:11px;font-weight:600;color:var(--accent);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:6px}
.product-name{font-size:14px;font-weight:700;color:var(--text1);margin-bottom:6px;line-height:1.4}
.product-desc{font-size:12px;color:var(--text2);line-height:1.6}
.product-footer{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;border-top:1px solid var(--border);background:var(--bg)}
.product-tag{font-size:11px;color:var(--text3);background:#F1F5F9;padding:3px 8px;border-radius:4px}
/* NEWS PAGE */
.tab-row{display:flex;gap:0;margin-bottom:22px;border-bottom:2px solid var(--border)}
.tab-btn{padding:10px 20px;border:none;background:transparent;color:var(--text2);font-size:14px;font-weight:500;cursor:pointer;font-family:'Pretendard',sans-serif;border-bottom:2px solid transparent;margin-bottom:-2px;transition:.15s}
.tab-btn:hover{color:var(--text1)}
.tab-btn.active{color:var(--secondary);border-bottom-color:var(--secondary);font-weight:700}
.news-list{display:flex;flex-direction:column;gap:0}
.news-item{display:flex;align-items:flex-start;gap:16px;padding:16px 0;border-bottom:1px solid var(--border);cursor:pointer;transition:.15s}
.news-item:hover{background:var(--bg);margin:0 -22px;padding:16px 22px}
.news-badge{flex-shrink:0;padding:4px 10px;border-radius:4px;font-size:11px;font-weight:600}
.badge-notice{background:#FFF7ED;color:#C2410C}
.badge-press{background:#EFF6FF;color:#1D4ED8}
.badge-news{background:#F0FDF4;color:#15803D}
.badge-pin{background:#FEF2F2;color:#DC2626}
.news-content{flex:1;min-width:0}
.news-title{font-size:14px;font-weight:600;color:var(--text1);margin-bottom:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.news-meta{font-size:12px;color:var(--text3);display:flex;gap:12px}
.news-company-tag{font-size:11px;padding:2px 8px;border-radius:3px;background:#F1F5F9;color:var(--text2)}
.pin-icon{color:var(--accent);font-size:14px;flex-shrink:0;margin-top:2px}
/* NEWS DETAIL */
.news-detail-header{background:var(--bg);border-radius:10px;padding:24px;margin-bottom:20px;border-left:4px solid var(--secondary)}
.news-detail-title{font-size:20px;font-weight:700;color:var(--text1);margin-bottom:10px;line-height:1.4}
.news-detail-meta{display:flex;gap:16px;font-size:13px;color:var(--text2)}
.news-detail-body{font-size:14px;color:var(--text1);line-height:1.9}
.news-detail-body p{margin-bottom:16px}
/* PAGINATION */
.pagination{display:flex;align-items:center;justify-content:center;gap:6px;margin-top:24px}
.page-btn{width:34px;height:34px;border-radius:6px;border:1px solid var(--border);background:var(--surface);color:var(--text2);font-size:13px;cursor:pointer;font-family:'Pretendard',sans-serif;display:flex;align-items:center;justify-content:center;transition:.15s}
.page-btn:hover{border-color:var(--secondary);color:var(--secondary)}
.page-btn.active{background:var(--secondary);color:#fff;border-color:var(--secondary)}
.page-btn:disabled{opacity:.4;cursor:not-allowed}
/* CHARTS SECTION */
.charts-grid{display:grid;grid-template-columns:2fr 1fr;gap:16px;margin-bottom:16px}
.chart-wrap{width:100%;height:260px}
/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.45);display:flex;align-items:center;justify-content:center;z-index:200;animation:fadeIn .2s}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.modal{background:var(--surface);border-radius:14px;width:640px;max-width:90vw;max-height:85vh;overflow-y:auto;animation:fadeInScale .2s}
@keyframes fadeInScale{
  from{opacity:0;transform:translate(-50%,-50%) scale(0.95)}
  to{opacity:1;transform:translate(-50%,-50%) scale(1)}
}
.modal{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%)}
.modal-header{padding:22px 24px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:var(--surface);z-index:1}
.modal-title{font-size:17px;font-weight:700;color:var(--text1)}
.modal-close{width:30px;height:30px;border-radius:6px;border:none;background:var(--bg);color:var(--text2);cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center}
.modal-body{padding:22px 24px}
/* TAG */
.tag{display:inline-flex;align-items:center;padding:3px 10px;border-radius:12px;font-size:11px;font-weight:600;gap:4px}
.tag-blue{background:#EEF4FF;color:var(--secondary)}
.tag-orange{background:#FFF7ED;color:#C2410C}
.tag-green{background:#F0FDF4;color:#15803D}
/* TABLE */
.data-table{width:100%;border-collapse:collapse}
.data-table th{padding:10px 14px;text-align:left;font-size:12px;font-weight:600;color:var(--text2);background:var(--bg);border-bottom:1px solid var(--border)}
.data-table td{padding:12px 14px;font-size:13px;color:var(--text1);border-bottom:1px solid var(--border)}
.data-table tr:hover td{background:#F8FAFC}
/* STAT DETAIL ROW */
.stat-row{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid var(--border)}
.stat-row:last-child{border-bottom:none}
.stat-row-label{font-size:13px;color:var(--text2);min-width:120px}
.stat-bar-wrap{flex:1;height:8px;background:var(--bg);border-radius:4px;overflow:hidden}
.stat-bar-fill{height:100%;border-radius:4px;background:var(--secondary)}
.stat-row-val{font-size:13px;font-weight:600;color:var(--text1);min-width:50px;text-align:right}
/* RECHARTS OVERRIDE */
.recharts-default-tooltip{border-radius:8px!important;box-shadow:0 4px 16px rgba(0,0,0,0.12)!important;border:1px solid var(--border)!important}
</style>
</head>

function ProductsPage({ companyId }) {

    setLoaded(false);

    return () => clearTimeout(t);
  }, [companyId]);

  const filtered = PRODUCTS.filter(p =>
    (companyId === 'all' || p.company === companyId) &&
    (catFilter === '전체' || p.category === catFilter)
  );
  const cats = ['전체', ...new Set(PRODUCTS.filter(p => companyId === 'all' || p.company === companyId).map(p => p.category))];
  const totalPages = Math.ceil(filtered.length / PER);
  const paged = filtered.slice((currentPage-1)*PER, currentPage*PER);

  const handleCat = (c) => { setCatFilter(c); setCurrentPage(1); };

      </div>
    </div>
  );

  return (
    <div>
      <div className="filter-row">
        {cats.map(c => (
          <button key={c} className={`filter-chip${catFilter===c?' active':''}`} onClick={() => handleCat(c)}>{c}</button>

      <div className="product-grid">

          </div>
        ))}

      {totalPages > 1 && (
        <div className="pagination">
          <button className="page-btn" onClick={() => setCurrentPage(p => Math.max(1,p-1))} disabled={currentPage===1}>‹</button>
          {Array.from({length:totalPages},(_, i) => i+1).map(n => (
            <button key={n} className={`page-btn${currentPage===n?' active':''}`} onClick={() => setCurrentPage(n)}>{n}</button>

      <div className="card">
        <div className="card-body" style={{padding:0}}>
          <div className="news-list">
            {paged.map(n => (
              <div key={n.id} className="news-item" onClick={() => setSelected(n)} style={{padding:'16px 22px'}}>
                {n.pin && <span className="pin-icon">📌</span>}
                <span className={`news-badge ${typeClass[n.type]}`}>{n.type}</span>
                <div className="news-content">
                  <div className="news-title">{n.title}</div>
                  <div className="news-meta">
                    <span className="news-company-tag">{COMPANIES.find(c=>c.id===n.company)?.name}</span>
                    <span>{n.date}</span>
                    <span>조회 {n.views.toLocaleString()}</span>
                  </div>
                </div>
              </div>
            ))}
            {paged.length === 0 && (
              <div style={{padding:'40px',textAlign:'center',color:'var(--text3)'}}>
                <div style={{fontSize:32,marginBottom:10}}>📋</div>
                게시물이 없습니다.
              </div>
            )}
          </div>
        </div>
      </div>
      {totalPages > 1 && (
        <div className="pagination">
          <button className="page-btn" onClick={() => setCurrentPage(p => Math.max(1,p-1))} disabled={currentPage===1}>‹</button>
          {Array.from({length:totalPages},(_,i)=>i+1).map(n => (
            <button key={n} className={`page-btn${currentPage===n?' active':''}`} onClick={() => setCurrentPage(n)}>{n}</button>
          ))}
          <button className="page-btn" onClick={() => setCurrentPage(p => Math.min(totalPages,p+1))} disabled={currentPage===totalPages}>›</button>
        </div>
      )}
    </div>
  );
}

function DashboardPage() {
  const [range, setRange] = useState('30일');
  const [loaded, setLoaded] = useState(false);

  useEffect(() => {
    setLoaded(false);
    const t = setTimeout(() => setLoaded(true), 1500);
    return () => clearTimeout(t);
  }, []);

  const rangeData = {
    '7일': STAT_DATA.pageviews.slice(-3),
    '30일': STAT_DATA.pageviews,
    '90일': STAT_DATA.pageviews,
  };

  if (!loaded) return (
    <div>
      <div className="kpi-grid">{[0,1,2,3].map(i=><div key={i} className="skeleton" style={{height:96}}/>)}</div>
      <div className="charts-grid">
        <div className="skeleton" style={{height:300}}/>
        <div className="skeleton" style={{height:300}}/>
      </div>
    </div>
  );

  return (
    <div>
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:20}}>
        <div>
          <div className="section-title">통계 대시보드</div>
          <div className="section-sub">3개 계열사 사이트 현황</div>
        </div>
        <div style={{display:'flex',gap:6}}>
          {['7일','30일','90일'].map(r => (
            <button key={r} className={`filter-chip${range===r?' active':''}`} style={{fontSize:12,padding:'5px 12px'}} onClick={() => setRange(r)}>{r}</button>
          ))}
        </div>
      </div>

      <div className="kpi-grid">
        {[
          {label:'총 페이지뷰',value:'10,315',sub:'3개 사이트 합산',color:'var(--secondary)'},
          {label:'게시물 수',value:'122',sub:'공지·보도자료·뉴스',color:'var(--accent)'},
          {label:'제품·서비스',value:'42',sub:'등록된 항목',color:'#15803D'},
          {label:'어드민 계정',value:'9',sub:'계열사별 권한 분리',color:'#7C3AED'},
        ].map((k,i) => (
          <div key={i} className="kpi-card" style={{borderLeftColor:k.color}}>
            <div className="kpi-label">{k.label}</div>
            <div className="kpi-value">{k.value}</div>
            <div className="kpi-sub">{k.sub}</div>
          </div>
        ))}
      </div>

      <div className="charts-grid">
        <div className="card">
          <div className="card-header">
            <span className="card-title">기간별 페이지뷰</span>
          </div>
          <div className="card-body">
            <div className="chart-wrap">
              <ResponsiveContainer width="100%" height="100%">
                <LineChart data={rangeData[range]} margin={{top:4,right:16,left:-10,bottom:0}}>
                  <CartesianGrid strokeDasharray="3 3" stroke="#E2E8F0"/>
                  <XAxis dataKey="date" tick={{fontSize:11,fill:'#94A3B8'}}/>
                  <YAxis tick={{fontSize:11,fill:'#94A3B8'}}/>
                  <Tooltip/>
                  <Legend wrapperStyle={{fontSize:12}}/>
                  <Line type="monotone" dataKey="holding" name="HB홀딩스" stroke="#E85D26" strokeWidth={2} dot={false}/>
                  <Line type="monotone" dataKey="constr" name="HB건설" stroke="#2E5FA3" strokeWidth={2} dot={false}/>
                  <Line type="monotone" dataKey="gear" name="HB기어텍" stroke="#15803D" strokeWidth={2} dot={false}/>
                </LineChart>
              </ResponsiveContainer>
            </div>
          </div>
        </div>

        <div className="card">
          <div className="card-header">
            <span className="card-title">계열사별 비중</span>
          </div>
          <div className="card-body">
            <div className="chart-wrap" style={{height:220}}>
              <ResponsiveContainer width="100%" height="100%">
                <PieChart>
                  <Pie data={STAT_DATA.byCompany} cx="50%" cy="50%" innerRadius={55} outerRadius={85} dataKey="value" paddingAngle={3}>
                    {STAT_DATA.byCompany.map((entry, index) => (
                      <Cell key={index} fill={entry.color}/>
                    ))}
                  </Pie>
                  <Tooltip formatter={(v) => v.toLocaleString()}/>
                  <Legend wrapperStyle={{fontSize:12}}/>
                </PieChart>
              </ResponsiveContainer>
            </div>
            <div>
              {STAT_DATA.byCompany.map((s,i) => (
                <div key={i} className="stat-row">
                  <div className="stat-row-label" style={{display:'flex',alignItems:'center',gap:6}}>
                    <span style={{width:10,height:10,borderRadius:'50%',background:s.color,flexShrink:0}}/>
                    {s.name}
                  </div>
                  <div className="stat-bar-wrap">
                    <div className="stat-bar-fill" style={{width:`${Math.round(s.value/10315*100)}%`,background:s.color}}/>
                  </div>
                  <div className="stat-row-val">{s.value.toLocaleString()}</div>
                </div>
              ))}
            </div>
          </div>
        </div>
      </div>

      <div className="card">
        <div className="card-header">
          <span className="card-title">콘텐츠 유형별 현황</span>
        </div>
        <div className="card-body">
          <div className="chart-wrap" style={{height:200}}>
            <ResponsiveContainer width="100%" height="100%">
              <BarChart data={STAT_DATA.content} margin={{top:4,right:16,left:-10,bottom:0}}>
                <CartesianGrid strokeDasharray="3 3" stroke="#E2E8F0"/>
                <XAxis dataKey="name" tick={{fontSize:12,fill:'#5A6478'}}/>
                <YAxis tick={{fontSize:11,fill:'#94A3B8'}}/>
                <Tooltip/>
                <Bar dataKey="수" fill="#2E5FA3" radius={[4,4,0,0]}/>
              </BarChart>
            </ResponsiveContainer>
          </div>
        </div>
      </div>
    </div>
  );
}

// ── APP ────────────────────────────────────────────────────────────────────────
function App() {
  const [activeNav, setActiveNav] = useState('기업 소개');
  const [activeCompany, setActiveCompany] = useState('holding');

  const NAV_ITEMS = [
    { label: '기업 소개', icon: '🏢' },
    { label: '제품 서비스', icon: '📦' },
    { label: '뉴스 공지', icon: '📰' },
    { label: '통계 대시보드', icon: '📊' },
  ];

  const PAGE_TITLES = {
    '기업 소개': '기업 소개',
    '제품 서비스': '제품 & 서비스',
    '뉴스 공지': '뉴스 & 공지',
    '통계 대시보드': '통계 대시보드',
  };

  const renderContent = () => {
    switch (activeNav) {
      case '기업 소개': return <CompanyIntroPage companyId={activeCompany} />;
      case '제품 서비스': return <ProductsPage companyId={activeCompany} />;
      case '뉴스 공지': return <NewsPage companyId={activeCompany} />;
      case '통계 대시보드': return <DashboardPage />;
      default: return null;
    }
  };

  return (
    <div id="root" style={{display:'flex'}}>
      {/* SIDEBAR */}
      <nav className="sidebar">
        <div className="sidebar-logo">
          <div className="sidebar-logo-title">HB Group CMS</div>
          <div className="sidebar-logo-sub">그룹사 통합 콘텐츠 관리</div>
        </div>

        <div className="company-switcher">
          <div className="company-switcher-label">계열사 선택</div>
          {COMPANIES.map(c => (
            <button key={c.id} className={`company-btn${activeCompany===c.id?' active':''}`} onClick={() => setActiveCompany(c.id)}>
              <span className="company-dot" style={{background:c.dot}}/>
              <span>{c.name}</span>
              <span style={{marginLeft:'auto',fontSize:10,opacity:.6}}>{c.sub}</span>
            </button>
          ))}
        </div>

        <div className="sidebar-nav">
          <div className="nav-section-label">메뉴</div>
          {NAV_ITEMS.map(item => (
            <button
              key={item.label}
              className={`nav-btn${activeNav===item.label?' active':''}`}
              onClick={() => setActiveNav(item.label)}
            >
              <span className="nav-icon">{item.icon}</span>
              <span>{item.label}</span>
            </button>
          ))}
        </div>

        <div className="sidebar-bottom">
          <div className="admin-badge">
            <div className="admin-avatar">김</div>
            <div className="admin-info">
              <div className="admin-name">김관리자</div>
              <div className="admin-role">슈퍼어드민</div>
            </div>
            <span style={{color:'rgba(255,255,255,0.4)',fontSize:14}}>⚙️</span>
          </div>
        </div>
      </nav>

      {/* MAIN */}
      <div className="main-content">
        <div className="topbar">
          <div className="topbar-breadcrumb">
            {COMPANIES.find(c=>c.id===activeCompany)?.name} / <span>{PAGE_TITLES[activeNav]}</span>
          </div>
          <div className="topbar-actions">
            {activeNav === '뉴스 공지' && (
              <button className="btn btn-primary">✏️ 새 게시물 작성</button>
            )}
            {activeNav === '제품 서비스' && (
              <button className="btn btn-accent">+ 제품 등록</button>
            )}
            <div className="topbar-noti">
              🔔<span className="noti-dot"/>
            </div>
          </div>
        </div>

        <div className="page-content">
          {renderContent()}
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
