<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>학교법인 통합 웹사이트 & CMS — 구현 데모</title>
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" rel="stylesheet">
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Pretendard',sans-serif;background:#F7F9FF;color:#111827;word-break:keep-all;overflow-wrap:break-word}
:root{
  --primary:#2D5BE3;--secondary:#1A3A8F;--accent:#F5A623;
  --bg:#F7F9FF;--surface:#fff;--border:#E5EAF3;
  --text1:#111827;--text2:#4B5563;--text3:#9CA3AF;
  --topnav-h:64px;
}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:#CBD5E1;border-radius:3px}
/* TOPNAV */
.topnav{height:var(--topnav-h);background:var(--secondary);display:flex;align-items:center;padding:0 40px;position:sticky;top:0;z-index:100;gap:0}
.topnav-logo{font-size:18px;font-weight:800;color:#fff;letter-spacing:-0.3px;margin-right:40px;white-space:nowrap}
.topnav-logo span{color:var(--accent)}
.nav-tabs{display:flex;gap:0;flex:1}
.nav-tab{padding:0 22px;height:var(--topnav-h);display:flex;align-items:center;color:rgba(255,255,255,0.65);font-size:14px;font-weight:500;cursor:pointer;border:none;background:transparent;font-family:'Pretendard',sans-serif;border-bottom:3px solid transparent;transition:.15s;white-space:nowrap}
.nav-tab:hover{color:#fff}
.nav-tab.active{color:#fff;font-weight:700;border-bottom-color:var(--accent)}
.topnav-right{margin-left:auto;display:flex;align-items:center;gap:10px}
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 18px;border-radius:8px;font-size:13px;font-weight:600;font-family:'Pretendard',sans-serif;cursor:pointer;border:none;transition:.15s}
.btn-white{background:#fff;color:var(--primary)}
.btn-white:hover{background:#F0F4FF}
.btn-outline-white{background:transparent;color:#fff;border:1.5px solid rgba(255,255,255,0.4)}
.btn-outline-white:hover{background:rgba(255,255,255,0.08);border-color:#fff}
.btn-primary{background:var(--primary);color:#fff}
.btn-primary:hover{background:var(--secondary)}
.btn-accent{background:var(--accent);color:#fff}
.school-selector{display:flex;gap:6px}
.school-tag{padding:5px 14px;border-radius:20px;border:1.5px solid rgba(255,255,255,0.3);background:transparent;color:rgba(255,255,255,0.7);font-size:12px;font-weight:500;cursor:pointer;font-family:'Pretendard',sans-serif;transition:.15s}
.school-tag:hover{border-color:#fff;color:#fff}
.school-tag.active{background:rgba(255,255,255,0.15);border-color:#fff;color:#fff;font-weight:700}
/* PAGE */
.page-wrap{min-height:calc(100vh - var(--topnav-h))}
/* HERO */
.hero{background:linear-gradient(145deg,var(--secondary) 0%,var(--primary) 55%,#4B7BF5 100%);padding:64px 60px 56px;position:relative;overflow:hidden}
.hero::before{content:'';position:absolute;top:-60px;right:-80px;width:400px;height:400px;border-radius:50%;background:rgba(255,255,255,0.05)}
.hero::after{content:'';position:absolute;bottom:-100px;left:20%;width:300px;height:300px;border-radius:50%;background:rgba(255,255,255,0.04)}
.hero-inner{position:relative;z-index:1;max-width:1100px;margin:0 auto;display:grid;grid-template-columns:1fr 1fr;gap:48px;align-items:center}
.hero-label{display:inline-flex;align-items:center;gap:6px;padding:5px 14px;background:rgba(245,166,35,0.2);border:1px solid rgba(245,166,35,0.5);border-radius:20px;color:var(--accent);font-size:12px;font-weight:600;margin-bottom:18px}
.hero-title{font-size:34px;font-weight:900;color:#fff;line-height:1.25;letter-spacing:-0.8px;margin-bottom:16px}
.hero-desc{font-size:15px;color:rgba(255,255,255,0.78);line-height:1.8;margin-bottom:28px}
.hero-cta{display:flex;gap:10px}
.hero-stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.hero-stat-card{background:rgba(255,255,255,0.1);backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,0.15);border-radius:12px;padding:18px 20px}
.hero-stat-card .val{font-size:26px;font-weight:800;color:#fff;letter-spacing:-0.5px}
.hero-stat-card .lbl{font-size:12px;color:rgba(255,255,255,0.6);margin-top:4px}
/* SECTIONS */
.section{padding:44px 60px;max-width:1200px;margin:0 auto}
.section-header{margin-bottom:28px}
.section-title{font-size:24px;font-weight:800;color:var(--text1);letter-spacing:-0.4px;margin-bottom:6px}
.section-sub{font-size:14px;color:var(--text2)}
/* CARD */
.card{background:var(--surface);border-radius:12px;box-shadow:0 2px 12px rgba(45,91,227,0.07),0 1px 4px rgba(0,0,0,0.05);overflow:hidden}
.card-header{padding:18px 22px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px}
.card-title{font-size:15px;font-weight:600;color:var(--text1)}
.card-body{padding:22px}
/* SKELETON */
.skeleton{background:linear-gradient(90deg,#E8EDF8 25%,#F0F4FF 50%,#E8EDF8 75%);background-size:200% 100%;animation:shimmer 1.5s infinite;border-radius:8px}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
/* GRIDS */
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:18px}
.grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:18px}
.grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
/* DEPT FILTER */
.filter-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:20px}
.filter-chip{padding:6px 16px;border-radius:20px;border:1.5px solid var(--border);background:var(--surface);color:var(--text2);font-size:13px;cursor:pointer;font-family:'Pretendard',sans-serif;transition:.15s}
.filter-chip:hover{border-color:var(--primary);color:var(--primary)}
.filter-chip.active{background:var(--primary);color:#fff;border-color:var(--primary)}
/* FACULTY CARDS */
.faculty-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px}
.faculty-card{background:var(--surface);border-radius:12px;padding:22px;box-shadow:0 1px 6px rgba(0,0,0,0.06);cursor:pointer;transition:.2s;text-align:center;border:2px solid transparent}
.faculty-card:hover{border-color:var(--primary);transform:translateY(-2px)}
.faculty-avatar{width:72px;height:72px;border-radius:50%;margin:0 auto 14px;display:flex;align-items:center;justify-content:center;font-size:28px;font-weight:700;color:#fff}
.faculty-name{font-size:15px;font-weight:700;color:var(--text1);margin-bottom:4px}
.faculty-dept{font-size:12px;color:var(--primary);font-weight:500;margin-bottom:6px}
.faculty-field{font-size:12px;color:var(--text2);line-height:1.5}
/* TIMELINE */
.timeline-steps{display:flex;gap:0;position:relative;margin:24px 0}
.timeline-steps::before{content:'';position:absolute;top:20px;left:0;right:0;height:2px;background:var(--border)}
.step-item{flex:1;display:flex;flex-direction:column;align-items:center;position:relative;z-index:1;cursor:pointer}
.step-dot{width:40px;height:40px;border-radius:50%;border:3px solid var(--border);background:var(--surface);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:var(--text3);margin-bottom:10px;transition:.2s}
.step-item.done .step-dot{background:var(--primary);border-color:var(--primary);color:#fff}
.step-item.current .step-dot{background:var(--accent);border-color:var(--accent);color:#fff;box-shadow:0 0 0 5px rgba(245,166,35,0.2)}
.step-label{font-size:12px;font-weight:500;color:var(--text2);text-align:center;max-width:90px}
.step-item.done .step-label{color:var(--primary);font-weight:600}
.step-item.current .step-label{color:var(--accent);font-weight:700}
/* NOTICE */
.notice-item{display:flex;align-items:flex-start;gap:14px;padding:16px 0;border-bottom:1px solid var(--border);cursor:pointer;transition:.15s}
.notice-item:hover{background:var(--bg);margin:0 -22px;padding:16px 22px}
.notice-item:last-child{border-bottom:none}
.notice-badge{padding:3px 10px;border-radius:12px;font-size:11px;font-weight:700;flex-shrink:0;white-space:nowrap}
.badge-school{background:#EEF4FF;color:var(--primary)}
.badge-admin{background:#FFF9EC;color:#B45309}
.badge-news{background:#F0FDF4;color:#15803D}
.notice-title{font-size:14px;font-weight:600;color:var(--text1);margin-bottom:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.notice-meta{font-size:12px;color:var(--text3);display:flex;gap:10px}
.pin-mark{color:var(--accent);font-size:13px;flex-shrink:0;margin-top:2px}
/* SEARCH */
.search-wrap{position:relative;width:280px}
.search-wrap input{width:100%;padding:9px 14px 9px 36px;border:1.5px solid var(--border);border-radius:8px;font-size:13px;font-family:'Pretendard',sans-serif;outline:none;background:var(--surface);color:var(--text1);transition:.15s}
.search-wrap input:focus{border-color:var(--primary)}
.search-icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);font-size:14px;color:var(--text3)}
/* ADMISSION */
.admission-type-tabs{display:flex;gap:0;margin-bottom:28px;background:var(--bg);border-radius:10px;padding:4px}
.admission-tab{flex:1;padding:10px;border:none;background:transparent;border-radius:8px;font-size:14px;font-weight:500;color:var(--text2);cursor:pointer;font-family:'Pretendard',sans-serif;transition:.15s}
.admission-tab.active{background:var(--surface);color:var(--primary);font-weight:700;box-shadow:0 1px 6px rgba(0,0,0,0.08)}
.schedule-card{background:var(--surface);border-radius:12px;padding:22px;border-left:4px solid var(--primary);box-shadow:0 1px 6px rgba(0,0,0,0.05);margin-bottom:14px}
.schedule-phase{font-size:11px;font-weight:700;color:var(--primary);text-transform:uppercase;letter-spacing:0.8px;margin-bottom:8px}
.schedule-title{font-size:15px;font-weight:700;color:var(--text1);margin-bottom:6px}
.schedule-date{font-size:13px;color:var(--text2)}
.checklist-item{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--border);cursor:pointer}
.checklist-item:last-child{border-bottom:none}
.check-box{width:20px;height:20px;border-radius:5px;border:2px solid var(--border);flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:.15s}
.check-box.checked{background:var(--primary);border-color:var(--primary)}
/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.45);display:flex;align-items:center;justify-content:center;z-index:200;animation:fadeIn .2s}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.modal{background:var(--surface);border-radius:16px;width:600px;max-width:90vw;max-height:85vh;overflow-y:auto;position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);animation:fadeInScale .2s}
@keyframes fadeInScale{
  from{opacity:0;transform:translate(-50%,-50%) scale(0.95)}
  to{opacity:1;transform:translate(-50%,-50%) scale(1)}
}
.modal-header{padding:22px 24px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:var(--surface)}
.modal-title{font-size:17px;font-weight:700;color:var(--text1)}
.modal-close{width:32px;height:32px;border-radius:8px;border:none;background:var(--bg);color:var(--text2);cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center}
.modal-body{padding:22px 24px}
/* PAGINATION */
.pagination{display:flex;align-items:center;justify-content:center;gap:6px;margin-top:24px}
.page-btn{width:34px;height:34px;border-radius:8px;border:1.5px solid var(--border);background:var(--surface);color:var(--text2);font-size:13px;cursor:pointer;font-family:'Pretendard',sans-serif;display:flex;align-items:center;justify-content:center;transition:.15s}
.page-btn:hover{border-color:var(--primary);color:var(--primary)}
.page-btn.active{background:var(--primary);color:#fff;border-color:var(--primary)}
.page-btn:disabled{opacity:.4;cursor:not-allowed}
/* TAG */
.tag{display:inline-flex;align-items:center;padding:3px 10px;border-radius:12px;font-size:11px;font-weight:600}
.tag-blue{background:#EEF4FF;color:var(--primary)}
.tag-orange{background:#FFF9EC;color:#B45309}
.tag-green{background:#F0FDF4;color:#15803D}
/* HIGHLIGHT CARD */
.highlight-card{background:linear-gradient(135deg,var(--primary) 0%,#4B7BF5 100%);border-radius:12px;padding:28px;color:#fff}
.highlight-card .num{font-size:36px;font-weight:900;letter-spacing:-1px}
.highlight-card .lbl{font-size:13px;opacity:.8;margin-top:4px}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect } = React;

const SCHOOLS = [
  { id: 'univ', name: '한빛대학교', type: '대학교', color: '#2D5BE3' },
  { id: 'high', name: '한빛고등학교', type: '고등학교', color: '#1A3A8F' },

const FACULTIES = [

  { id:5, school:'univ', name:'정해준', dept:'컴퓨터공학과', field:'보안·암호화 시스템', color:'#C2410C', initial:'정' },

  { id:8, school:'high', name:'강나연', dept:'인문계열', field:'국어·영어 논술', color:'#9D174D', initial:'강' },

  { id:10, school:'inst', name:'신보라', dept:'어학 과정', field:'영어·일어 번역', color:'#059669', initial:'신' },

const NOTICES = [
  { id:1, school:'univ', type:'학사', title:'2025년 1학기 수강신청 기간 안내', date:'2025.04.03', views:4820, pin:true },
  { id:2, school:'univ', type:'학사', title:'2025 한빛대학교 전체 입학식 안내 및 주차장 이용 공지', date:'2025.04.01', views:2640 },
  { id:3, school:'high', type:'교무', title:'한빛고 2025 수시 원서접수 기간 안내', date:'2025.03.28', views:1920 },
  { id:4, school:'univ', type:'뉴스', title:'한빛대 AI 연구소, 과학기술정보통신부 과제 선정', date:'2025.03.25', views:980 },
  { id:5, school:'inst', type:'교무', title:'2025 상반기 수강 등록 안내 및 장학금 혜택 공지', date:'2025.03.20', views:750 },
  { id:6, school:'univ', type:'뉴스', title:'한빛대 창업지원센터, 스타트업 9개사 투자 유치 성공 지원', date:'2025.03.15', views:640 },
  { id:7, school:'high', type:'교무', title:'한빛고 특기자 전형 상담 신청 방법 안내', date:'2025.03.10', views:1140 },
  { id:8, school:'univ', type:'학사', title:'2025년 학생 생활관 입사 신청 안내', date:'2025.03.07', views:2380 },
];

const DEPTS = { univ:['전체','컴퓨터공학과','경영학과','기계공학과','법학과'], high:['전체','이공계열','인문계열'], inst:['전체','디자인 과정','어학 과정'] };

const PER_PAGE = 6;

// ── 학교 소개 ──────────────────────────────────────────────────────────────────
function SchoolIntroPage({ school }) {
  const [loaded, setLoaded] = useState(false);
  useEffect(() => {
    setLoaded(false);
    const t = setTimeout(() => setLoaded(true), 1500);
    return () => clearTimeout(t);
  }, [school.id]);

  if (!loaded) return (
    <div>
      <div className="skeleton" style={{height:320,marginBottom:28,borderRadius:0}}/>
      <div className="section">
        <div className="grid-3">{[0,1,2].map(i=><div key={i} className="skeleton" style={{height:140}}/>)}</div>

            <div className="hero-title">{school.name}<br/>미래를 설계하는 인재 육성</div>

              {val:'1,200명',lbl:'재학생'},
              {val:'42개',lbl:'부활동 클럽'},
              {val:'87%',lbl:'대입 진학률'},
            ] : [
              {val:'2003',lbl:'설립 연도'},
              {val:'3,400명',lbl:'연 수강생'},
              {val:'38개',lbl:'교육 과정'},
              {val:'96%',lbl:'수강생 만족도'},
            ]).map((s,i)=>(
              <div key={i} className="hero-stat-card">
                <div className="val">{s.val}</div>
                <div className="lbl">{s.lbl}</div>
              </div>
            ))}
          </div>
        </div>
      </div>
      <div className="section">
        <div className="section-header">
          <div className="section-title">교육 이념 & 사업 분야</div>
        </div>
        <div className="grid-3">
          {(school.id==='univ' ? [
            {icon:'🌏',title:'글로벌 역량',desc:'국제 공동 연구·해외 교환 프로그램으로 세계 무대에서 통하는 역량을 키웁니다.'},
            {icon:'💡',title:'융합 혁신',desc:'AI·빅데이터·디자인 사고를 접목한 융합 커리큘럼으로 미래 산업을 선도합니다.'},
            {icon:'🤝',title:'산학 협력',desc:'200개 기업과의 MOU 기반 현장 실습·채용 연계 프로그램을 운영합니다.'},
          ] : school.id==='high' ? [
            {icon:'📚',title:'기초 학력 강화',desc:'수학·과학·국어 기초 역량을 탄탄히 다지는 심화 과정을 제공합니다.'},
            {icon:'🏆',title:'특기 개발',desc:'스포츠·예술·이공계 특기자 전형 준비를 위한 전담 프로그램을 운영합니다.'},
            {icon:'🌱',title:'인성 교육',desc:'봉사활동·리더십·창의력 계발 프로그램으로 전인적 성장을 지원합니다.'},
          ] : [
            {icon:'🎓',title:'평생 학습',desc:'직장인·경력단절자를 위한 유연한 수강 일정과 온라인 병행 교육을 제공합니다.'},
            {icon:'💼',title:'취업 연계',desc:'자격증·포트폴리오 준비부터 채용 연계까지 취업 올인원 커리큘럼을 운영합니다.'},
            {icon:'🔬',title:'실무 중심',desc:'현업 전문가가 직접 강의하는 프로젝트 기반 실무 교육을 진행합니다.'},
          ]).map((c,i)=>(
            <div key={i} className="card" style={{padding:24}}>
              <div style={{fontSize:32,marginBottom:14}}>{c.icon}</div>
              <div style={{fontSize:16,fontWeight:700,color:'var(--text1)',marginBottom:8}}>{c.title}</div>
              <div style={{fontSize:13,color:'var(--text2)',lineHeight:1.7}}>{c.desc}</div>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

// ── 입학 정보 ──────────────────────────────────────────────────────────────────
function AdmissionPage({ school }) {
  const [type, setType] = useState('수시');
  const [checklist, setChecklist] = useState({});
  const [loaded, setLoaded] = useState(false);
  const TYPES = school.id==='univ' ? ['수시','정시','편입'] : ['일반전형','특기자전형','전편입'];
  const SCHEDULES = {
    수시:[
      {phase:'원서 접수',title:'온라인 원서접수 기간',date:'2025.09.01 — 09.12'},
      {phase:'서류 제출',title:'학생부·자소서·추천서 제출',date:'2025.09.15 — 09.22'},
      {phase:'서류 심사',title:'1단계 서류 심사 결과 발표',date:'2025.10.15'},
      {phase:'면접',title:'단계별 면접 고사 진행',date:'2025.11.03 — 11.08'},
    ],
    정시:[
      {phase:'수능 접수',title:'2025학년도 대학수학능력시험 접수',date:'2025.08.20 — 08.30'},
      {phase:'원서 접수',title:'정시 가·나·다군 원서접수',date:'2025.12.27 — 12.31'},
      {phase:'합격 발표',title:'최초 합격자 발표',date:'2026.01.15'},
      {phase:'등록',title:'최초 합격자 등록 기간',date:'2026.01.16 — 01.17'},
    ],

      {phase:'서류 접수',title:'편입학 원서 및 서류 제출',date:'2026.01.05 — 01.15'},
      {phase:'필기 시험',title:'편입학 전공 필기 고사',date:'2026.01.25'},
      {phase:'합격 발표',title:'최종 합격자 발표',date:'2026.02.05'},
      {phase:'등록',title:'최종 등록 기간',date:'2026.02.06 — 02.07'},
    ],
  };
  const DOCS = ['학교생활기록부(최근 3년)','자기소개서 (양식 다운로드)','추천서 (담임·교과 교사)','개인정보 활용 동의서','수험표 (수능 응시자)','졸업증명서'];

  useEffect(() => {
    setLoaded(false);
    const t = setTimeout(() => setLoaded(true), 1500);
    return () => clearTimeout(t);
  }, [school.id]);

  if (!loaded) return (
    <div className="section">
      <div className="skeleton" style={{height:56,marginBottom:28,borderRadius:10}}/>
      {[0,1,2,3].map(i=><div key={i} className="skeleton" style={{height:80,marginBottom:14}}/>)}
    </div>
  );

  return (
    <div className="section">
      <div className="section-header">
        <div className="section-title">입학 정보</div>
        <div className="section-sub">{school.name} 입학 전형 안내 및 지원 일정</div>
      </div>
      <div className="admission-type-tabs">
        {TYPES.map(t=>(
          <button key={t} className={`admission-tab${type===t?' active':''}`} onClick={()=>setType(t)}>{t}</button>
        ))}
      </div>
      <div className="grid-2">
        <div>
          <div style={{fontWeight:700,color:'var(--text1)',marginBottom:16,fontSize:15}}>📅 전형 일정</div>
          <div className="timeline-steps">
            {(SCHEDULES[type]||SCHEDULES['수시']).map((s,i)=>(

                <div className="step-dot">{i+1}</div>
                <div className="step-label">{s.phase}</div>
              </div>
            ))}
          </div>
          {(SCHEDULES[type]||SCHEDULES['수시']).map((s,i)=>(
            <div key={i} className="schedule-card">

              <div className="schedule-date">📅 {s.date}</div>

        <div>
          <div style={{fontWeight:700,color:'var(--text1)',marginBottom:16,fontSize:15}}>📋 제출 서류 체크리스트</div>
          <div className="card">
            <div className="card-body">
              {DOCS.map((doc,i)=>(

                  </div>
                  <span style={{fontSize:14,color:checklist[i]?'var(--text3)':'var(--text1)',textDecoration:checklist[i]?'line-through':'none'}}>{doc}</span>
                </div>
              ))}

          </div>
          <div className="highlight-card" style={{marginTop:16}}>
            <div style={{fontSize:13,opacity:.8,marginBottom:8}}>입학 문의</div>
            <div style={{fontSize:15,fontWeight:700}}>입학처 대표번호</div>
            <div style={{fontSize:22,fontWeight:900,letterSpacing:-0.5,marginTop:4}}>02-1234-5678</div>
            <div style={{fontSize:12,opacity:.7,marginTop:6}}>평일 09:00 — 18:00</div>
          </div>
        </div>
      </div>
    </div>
  );
}

// ── 교수 소개 ──────────────────────────────────────────────────────────────────
function FacultyPage({ school }) {
  const [dept, setDept] = useState('전체');
  const [search, setSearch] = useState('');
  const [selected, setSelected] = useState(null);
  const [loaded, setLoaded] = useState(false);

  useEffect(() => {
    setLoaded(false);
    const t = setTimeout(() => setLoaded(true), 1500);
    return () => clearTimeout(t);
  }, [school.id]);

  const facList = FACULTIES.filter(f=>f.school===school.id);
  const filtered = facList.filter(f=>
    (dept==='전체'||f.dept===dept) &&
    (f.name.includes(search)||f.field.includes(search)||f.dept.includes(search))
  );
  const depts = DEPTS[school.id] || ['전체'];

  if (!loaded) return (
    <div className="section">
      <div className="faculty-grid">
        {[0,1,2,3,4,5].map(i=><div key={i} className="skeleton" style={{height:180}}/>)}
      </div>
    </div>
  );

  return (
    <div className="section">
      <div className="section-header">
        <div className="section-title">교수 소개</div>
        <div className="section-sub">{school.name} 교수진</div>
      </div>
      <div style={{display:'flex',gap:12,alignItems:'center',marginBottom:20,flexWrap:'wrap'}}>
        <div className="filter-row" style={{margin:0}}>
          {depts.map(d=>(
            <button key={d} className={`filter-chip${dept===d?' active':''}`} onClick={()=>setDept(d)}>{d}</button>
          ))}
        </div>
        <div className="search-wrap" style={{marginLeft:'auto'}}>
          <span className="search-icon">🔍</span>
          <input placeholder="이름·전공 검색" value={search} onChange={e=>setSearch(e.target.value)}/>
        </div>
      </div>
      <div className="faculty-grid">
        {filtered.map(f=>(
          <div key={f.id} className="faculty-card" onClick={()=>setSelected(f)}>
            <div className="faculty-avatar" style={{background:f.color}}>{f.initial}</div>
            <div className="faculty-name">{f.name} 교수</div>
            <div className="faculty-dept">{f.dept}</div>
            <div className="faculty-field">{f.field}</div>
          </div>
        ))}
        {filtered.length===0 && (
          <div style={{gridColumn:'1/-1',textAlign:'center',padding:40,color:'var(--text3)'}}>
            <div style={{fontSize:32,marginBottom:10}}>🔍</div>
            검색 결과가 없습니다.
          </div>
        )}
      </div>

      {selected && (
        <div className="modal-overlay" onClick={e=>{if(e.target===e.currentTarget)setSelected(null)}}>
          <div className="modal">
            <div className="modal-header">
              <span className="modal-title">{selected.name} 교수</span>
              <button className="modal-close" onClick={()=>setSelected(null)}>✕</button>
            </div>
            <div className="modal-body">
              <div style={{display:'flex',gap:20,marginBottom:20,alignItems:'center'}}>
                <div className="faculty-avatar" style={{background:selected.color,width:80,height:80,fontSize:32,margin:0}}>{selected.initial}</div>
                <div>
                  <div style={{fontSize:20,fontWeight:800,color:'var(--text1)'}}>{selected.name} 교수</div>
                  <div style={{fontSize:14,color:'var(--primary)',fontWeight:500,margin:'4px 0'}}>{selected.dept}</div>
                  <div style={{display:'flex',gap:6}}>
                    <span className="tag tag-blue">{selected.field.split('·')[0]}</span>
                    {selected.field.split('·')[1] && <span className="tag tag-orange">{selected.field.split('·')[1]}</span>}
                  </div>
                </div>
              </div>
              <table style={{width:'100%',borderCollapse:'collapse'}}>
                <tbody>
                  {[
                    ['소속','한빛대학교 '+selected.dept],
                    ['연구 분야',selected.field],
                    ['학력','서울대학교 박사 / MIT 박사후연구원'],
                    ['연락처',selected.name[0]+'교수@hanbit.ac.kr'],
                    ['연구실','공학관 '+Math.floor(Math.random()*4+4)+'층 '+Math.floor(Math.random()*900+100)+'호'],
                  ].map(([k,v],i)=>(
                    <tr key={i}>
                      <td style={{padding:'10px 14px',background:'var(--bg)',color:'var(--text2)',fontSize:13,width:90,borderBottom:'1px solid var(--border)'}}>{k}</td>
                      <td style={{padding:'10px 14px',fontSize:13,color:'var(--text1)',borderBottom:'1px solid var(--border)'}}>{v}</td>
                    </tr>
                  ))}
                </tbody>
              </table>
              <div style={{marginTop:16}}>
                <div style={{fontSize:13,fontWeight:700,color:'var(--text2)',marginBottom:10}}>주요 저서·논문</div>
                {[
                  `《${selected.field.split('·')[0]} 핵심 원리》 (2024, 한빛출판사)`,
                  `"${selected.field} 응용 연구" — 한국공학회지 2023`,
                  `"미래 산업을 위한 ${selected.dept} 커리큘럼 혁신" — 교육혁신연구 2022`,
                ].map((b,i)=>(
                  <div key={i} style={{fontSize:13,color:'var(--text1)',padding:'7px 0',borderBottom:'1px solid var(--border)',display:'flex',gap:8,alignItems:'flex-start'}}>
                    <span style={{color:'var(--primary)',fontWeight:700,flexShrink:0}}>•</span>{b}
                  </div>
                ))}
              </div>
              <div style={{marginTop:16}}>
                <button className="btn btn-primary">📧 이메일 문의</button>
              </div>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// ── 공지 게시판 ────────────────────────────────────────────────────────────────
function NoticePage({ school }) {
  const [tab, setTab] = useState('전체');
  const [currentPage, setCurrentPage] = useState(1);
  const [selected, setSelected] = useState(null);
  const [loaded, setLoaded] = useState(false);
  const TABS = ['전체','학사','교무','뉴스'];
  const TYPE_MAP = {'학사':'badge-school','교무':'badge-admin','뉴스':'badge-news'};

  useEffect(() => {
    setLoaded(false);
    const t = setTimeout(() => setLoaded(true), 1500);
    return () => clearTimeout(t);
  }, [school.id]);

  const filtered = NOTICES.filter(n=>n.school===school.id&&(tab==='전체'||n.type===tab));
  const sorted = [...filtered].sort((a,b)=>(b.pin?1:0)-(a.pin?1:0));
  const totalPages = Math.ceil(sorted.length/PER_PAGE)||1;
  const paged = sorted.slice((currentPage-1)*PER_PAGE,currentPage*PER_PAGE);
  const handleTab = t => { setTab(t); setCurrentPage(1); };

  if (!loaded) return (
    <div className="section">
      <div style={{display:'flex',gap:0,borderBottom:'2px solid var(--border)',marginBottom:22}}>
        {[0,1,2,3].map(i=><div key={i} className="skeleton" style={{width:80,height:40,margin:'0 2px'}}/>)}
      </div>
      {[0,1,2,3].map(i=><div key={i} className="skeleton" style={{height:64,marginBottom:12}}/>)}
    </div>
  );

  if (selected) return (
    <div className="section">
      <button className="btn btn-primary" style={{marginBottom:20,background:'transparent',color:'var(--primary)',border:'1.5px solid var(--primary)'}} onClick={()=>setSelected(null)}>← 목록으로</button>
      <div className="card">
        <div className="card-body">
          <div style={{background:'var(--bg)',borderRadius:10,padding:22,marginBottom:20,borderLeft:'4px solid var(--primary)'}}>
            <div style={{display:'flex',gap:8,marginBottom:10}}>
              <span className={`notice-badge ${TYPE_MAP[selected.type]||'badge-school'}`}>{selected.type}</span>
              {selected.pin && <span style={{color:'var(--accent)',fontSize:12,fontWeight:600}}>📌 고정</span>}
            </div>
            <div style={{fontSize:20,fontWeight:700,color:'var(--text1)',marginBottom:10}}>{selected.title}</div>
            <div style={{display:'flex',gap:16,fontSize:13,color:'var(--text2)'}}>
              <span>📅 {selected.date}</span><span>👁️ {selected.views.toLocaleString()}</span>
            </div>
          </div>
          <div style={{fontSize:14,color:'var(--text1)',lineHeight:1.9}}>
            <p>본 공지사항은 <strong>{selected.title}</strong>에 관한 안내입니다. 학교 CMS 어드민을 통해 담당 교직원이 WYSIWYG 에디터로 직접 작성하고 관리합니다.</p>
            <p>중요 공지사항은 상단 고정 기능을 활용하며, 첨부파일 업로드 및 이미지 삽입이 가능합니다. 학교별 담당자만 해당 게시물을 수정할 수 있는 권한 분리 구조가 적용되어 있습니다.</p>
          </div>
        </div>
      </div>
    </div>
  );

  return (
    <div className="section">
      <div className="section-header">
        <div className="section-title">공지 게시판</div>
        <div className="section-sub">{school.name} 공지사항·학사·뉴스</div>
      </div>
      <div style={{display:'flex',gap:0,borderBottom:'2px solid var(--border)',marginBottom:22}}>
        {TABS.map(t=>(
          <button key={t} style={{padding:'10px 22px',border:'none',background:'transparent',color:tab===t?'var(--primary)':'var(--text2)',fontSize:14,fontWeight:tab===t?700:500,cursor:'pointer',fontFamily:"'Pretendard',sans-serif",borderBottom:`2px solid ${tab===t?'var(--primary)':'transparent'}`,marginBottom:-2,transition:'.15s'}} onClick={()=>handleTab(t)}>{t}</button>
        ))}
      </div>
      <div className="card">
        <div className="card-body" style={{padding:0}}>
          {paged.map(n=>(
            <div key={n.id} className="notice-item" onClick={()=>setSelected(n)} style={{padding:'16px 22px'}}>
              {n.pin && <span className="pin-mark">📌</span>}
              <span className={`notice-badge ${TYPE_MAP[n.type]||'badge-school'}`}>{n.type}</span>
              <div style={{flex:1,minWidth:0}}>
                <div className="notice-title">{n.title}</div>
                <div className="notice-meta"><span>{n.date}</span><span>조회 {n.views.toLocaleString()}</span></div>
              </div>
            </div>
          ))}
          {paged.length===0 && (
            <div style={{padding:40,textAlign:'center',color:'var(--text3)'}}>
              <div style={{fontSize:32,marginBottom:10}}>📋</div>게시물이 없습니다.
            </div>
          )}
        </div>
      </div>
      {totalPages>1 && (
        <div className="pagination">
          <button className="page-btn" onClick={()=>setCurrentPage(p=>Math.max(1,p-1))} disabled={currentPage===1}>‹</button>
          {Array.from({length:totalPages},(_,i)=>i+1).map(n=>(
            <button key={n} className={`page-btn${currentPage===n?' active':''}`} onClick={()=>setCurrentPage(n)}>{n}</button>
          ))}
          <button className="page-btn" onClick={()=>setCurrentPage(p=>Math.min(totalPages,p+1))} disabled={currentPage===totalPages}>›</button>
        </div>
      )}
    </div>
  );
}

// ── APP ────────────────────────────────────────────────────────────────────────
function App() {
  const [activeTab, setActiveTab] = useState('학교 소개');
  const [activeSchool, setActiveSchool] = useState(SCHOOLS[0]);

  const TABS = ['학교 소개','입학 정보','교수 소개','공지 게시판'];

  const renderContent = () => {
    switch(activeTab) {
      case '학교 소개': return <SchoolIntroPage school={activeSchool}/>;
      case '입학 정보': return <AdmissionPage school={activeSchool}/>;
      case '교수 소개': return <FacultyPage school={activeSchool}/>;
      case '공지 게시판': return <NoticePage school={activeSchool}/>;
      default: return null;
    }
  };

  return (
    <>
      <nav className="topnav">
        <div className="topnav-logo">한빛<span>EDU</span></div>
        <div className="nav-tabs">
          {TABS.map(t=>(
            <button key={t} className={`nav-tab${activeTab===t?' active':''}`} onClick={()=>setActiveTab(t)}>{t}</button>
          ))}
        </div>
        <div className="topnav-right">
          <div className="school-selector">
            {SCHOOLS.map(s=>(
              <button key={s.id} className={`school-tag${activeSchool.id===s.id?' active':''}`} onClick={()=>setActiveSchool(s)}>{s.name}</button>
            ))}
          </div>
          <button className="btn btn-white" style={{marginLeft:8}}>🔒 관리자</button>
        </div>
      </nav>
      <div className="page-wrap">
        {renderContent()}
      </div>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
