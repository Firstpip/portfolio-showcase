<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>멀티사이트 CMS 통합 관리 플랫폼 — 구현 데모</title>
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" rel="stylesheet">
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://unpkg.com/prop-types/prop-types.min.js"></script>
<script src="https://unpkg.com/react-is@18.3.1/umd/react-is.development.js"></script>
<script src="https://unpkg.com/recharts@2.15.0/umd/Recharts.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Pretendard',sans-serif;background:#F0F2F8;color:#0F1624;word-break:keep-all;overflow-wrap:break-word}
:root{
  --primary:#6C63FF;--secondary:#4A45C9;--accent:#00D9A5;
  --bg:#F0F2F8;--surface:#fff;--border:#E3E6F0;
  --text1:#0F1624;--text2:#4B5675;--text3:#9BA3BA;
  --sidebar-w:240px;--topbar-h:58px;
}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:#C8CDD9;border-radius:3px}
/* SIDEBAR */
.sidebar{width:var(--sidebar-w);min-height:100vh;background:var(--surface);border-right:1px solid var(--border);position:fixed;top:0;left:0;z-index:100;display:flex;flex-direction:column}
.sidebar-logo{padding:20px 20px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px}
.logo-icon{width:36px;height:36px;border-radius:10px;background:linear-gradient(135deg,var(--primary),var(--accent));display:flex;align-items:center;justify-content:center;color:#fff;font-size:18px;font-weight:800}
.logo-text{font-size:16px;font-weight:800;color:var(--text1);letter-spacing:-0.3px}
.logo-sub{font-size:11px;color:var(--text3)}
/* SITE CONTEXT */
.site-context{margin:12px 14px;background:linear-gradient(135deg,var(--primary) 0%,var(--secondary) 100%);border-radius:10px;padding:12px 14px;cursor:pointer}
.site-context-label{font-size:10px;color:rgba(255,255,255,0.6);margin-bottom:4px;text-transform:uppercase;letter-spacing:0.8px}
.site-context-name{font-size:13px;font-weight:700;color:#fff;display:flex;align-items:center;justify-content:space-between}
/* NAV */
.sidebar-nav{padding:8px 0;flex:1}
.nav-section-label{padding:12px 18px 4px;font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:1px;font-weight:600}
.nav-btn{width:100%;display:flex;align-items:center;gap:10px;padding:9px 18px;border:none;background:transparent;color:var(--text2);cursor:pointer;font-size:13px;font-family:'Pretendard',sans-serif;transition:.15s;text-align:left;border-radius:0;position:relative}
.nav-btn:hover{background:#F5F5FF;color:var(--primary)}
.nav-btn.active{background:#F0EDFF;color:var(--primary);font-weight:700}
.nav-btn.active::before{content:'';position:absolute;left:0;top:25%;bottom:25%;width:3px;border-radius:0 3px 3px 0;background:var(--primary)}
.nav-icon{font-size:16px;width:18px;text-align:center;flex-shrink:0}
.nav-badge{margin-left:auto;background:var(--primary);color:#fff;font-size:10px;font-weight:700;padding:2px 7px;border-radius:10px}
.sidebar-bottom{padding:12px 14px;border-top:1px solid var(--border)}
.user-chip{display:flex;align-items:center;gap:10px;padding:10px 12px;background:var(--bg);border-radius:10px}
.user-avatar{width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,var(--primary),var(--accent));display:flex;align-items:center;justify-content:center;color:#fff;font-size:13px;font-weight:700;flex-shrink:0}
/* MAIN */
.main-content{margin-left:var(--sidebar-w);flex:1;display:flex;flex-direction:column;min-height:100vh}
.topbar{height:var(--topbar-h);background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 28px;gap:12px;position:sticky;top:0;z-index:50}
.topbar-title{font-size:16px;font-weight:700;color:var(--text1)}
.topbar-sub{font-size:12px;color:var(--text3);margin-left:8px}
.topbar-actions{margin-left:auto;display:flex;align-items:center;gap:8px}
.btn{display:inline-flex;align-items:center;gap:6px;padding:7px 16px;border-radius:8px;font-size:13px;font-weight:600;font-family:'Pretendard',sans-serif;cursor:pointer;border:none;transition:.15s}
.btn-primary{background:var(--primary);color:#fff}
.btn-primary:hover{background:var(--secondary)}
.btn-accent{background:var(--accent);color:#0F1624}
.btn-accent:hover{opacity:.9}
.btn-outline{background:transparent;color:var(--text2);border:1.5px solid var(--border)}
.btn-outline:hover{border-color:var(--primary);color:var(--primary)}
.page-content{padding:26px}
/* SKELETON */
.skeleton{background:linear-gradient(90deg,#E8EAF0 25%,#F0F2F8 50%,#E8EAF0 75%);background-size:200% 100%;animation:shimmer 1.5s infinite;border-radius:8px}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
/* CARD */
.card{background:var(--surface);border-radius:12px;box-shadow:0 1px 4px rgba(0,0,0,0.05),0 2px 10px rgba(108,99,255,0.06)}
.card-header{padding:16px 20px 12px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px}
.card-title{font-size:14px;font-weight:700;color:var(--text1)}
.card-body{padding:20px}
/* STATUS BADGE */
.status-badge{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700}
.status-active{background:#D1FAF0;color:#047857}
.status-inactive{background:#F1F3F9;color:#6B7280}
.status-maintenance{background:#FFF7ED;color:#B45309}
.status-pending{background:#EEF4FF;color:#3B5BDB}
/* SITE CARDS */
.site-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:20px}
.site-card{background:var(--surface);border-radius:12px;padding:20px;border:1.5px solid var(--border);cursor:pointer;transition:.2s;position:relative;overflow:hidden}
.site-card:hover{border-color:var(--primary);box-shadow:0 4px 16px rgba(108,99,255,0.12);transform:translateY(-2px)}
.site-card.selected{border-color:var(--primary);background:#FAFAFF}
.site-card-top{width:100%;height:80px;border-radius:8px;margin-bottom:14px;display:flex;align-items:center;justify-content:center;font-size:28px;font-weight:800;color:#fff}
.site-card-name{font-size:14px;font-weight:700;color:var(--text1);margin-bottom:4px}
.site-card-domain{font-size:12px;color:var(--text3);margin-bottom:10px}
.site-card-meta{display:flex;justify-content:space-between;align-items:center}
/* CONTENT EDITOR */
.editor-layout{display:grid;grid-template-columns:1fr 320px;gap:16px}
.block-list{display:flex;flex-direction:column;gap:8px}
.block-item{background:var(--surface);border:1.5px solid var(--border);border-radius:10px;padding:14px 16px;display:flex;align-items:flex-start;gap:12px;cursor:grab;transition:.15s}
.block-item:hover{border-color:var(--primary)}
.block-drag-icon{color:var(--text3);font-size:16px;margin-top:2px;cursor:grab}
.block-type-icon{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.block-content{flex:1;min-width:0}
.block-type-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.8px;margin-bottom:6px}
.lang-tabs{display:flex;gap:4px;margin-bottom:12px}
.lang-tab{padding:4px 12px;border-radius:6px;border:1.5px solid var(--border);background:transparent;font-size:12px;font-weight:600;cursor:pointer;font-family:'Pretendard',sans-serif;transition:.15s;color:var(--text2)}
.lang-tab.active{background:var(--primary);color:#fff;border-color:var(--primary)}
.editor-preview{background:var(--bg);border-radius:10px;border:1.5px solid var(--border);overflow:hidden}
.preview-header{padding:10px 14px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;font-size:12px;font-weight:600;color:var(--text2)}
.preview-toggle{display:flex;gap:4px}
.preview-toggle-btn{padding:4px 12px;border-radius:5px;border:none;background:transparent;font-size:11px;cursor:pointer;font-family:'Pretendard',sans-serif;color:var(--text2);transition:.15s}
.preview-toggle-btn.active{background:var(--primary);color:#fff}
/* BANNER */
.banner-list{display:flex;flex-direction:column;gap:12px}
.banner-item{background:var(--surface);border-radius:10px;padding:16px 18px;display:flex;align-items:center;gap:14px;border:1.5px solid var(--border);cursor:pointer;transition:.15s}
.banner-item:hover{border-color:var(--primary)}
.banner-thumb{width:80px;height:50px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}
.banner-info{flex:1;min-width:0}
.banner-name{font-size:13px;font-weight:700;color:var(--text1);margin-bottom:4px}
.banner-meta{font-size:12px;color:var(--text3);display:flex;gap:10px}
.banner-type-badge{padding:2px 8px;border-radius:4px;font-size:10px;font-weight:700}
.type-popup{background:#EEF4FF;color:#3B5BDB}
.type-bar{background:#F0FDF4;color:#15803D}
.type-slide{background:#FFF7ED;color:#B45309}
/* SEO */
.seo-table{width:100%;border-collapse:collapse}
.seo-table th{padding:10px 14px;font-size:11px;font-weight:700;color:var(--text2);background:var(--bg);border-bottom:1px solid var(--border);text-align:left}
.seo-table td{padding:12px 14px;font-size:13px;border-bottom:1px solid var(--border);vertical-align:top}
.seo-table tr:hover td{background:#FAFAFF}
.seo-input{width:100%;border:1.5px solid var(--border);border-radius:6px;padding:7px 10px;font-size:13px;font-family:'Pretendard',sans-serif;outline:none;color:var(--text1);transition:.15s}
.seo-input:focus{border-color:var(--primary)}
.char-count{font-size:11px;color:var(--text3);text-align:right;margin-top:2px}
.char-count.over{color:#DC2626}
/* CHARTS */
.chart-wrap{width:100%;height:240px}
/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(15,22,36,0.55);display:flex;align-items:center;justify-content:center;z-index:200;animation:fadeIn .2s}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.modal{background:var(--surface);border-radius:16px;width:580px;max-width:90vw;max-height:85vh;overflow-y:auto;position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);animation:fadeInScale .2s}
@keyframes fadeInScale{
  from{opacity:0;transform:translate(-50%,-50%) scale(0.95)}
  to{opacity:1;transform:translate(-50%,-50%) scale(1)}
}
.modal-header{padding:20px 22px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:var(--surface)}
.modal-title{font-size:16px;font-weight:700;color:var(--text1)}
.modal-close{width:30px;height:30px;border-radius:7px;border:none;background:var(--bg);color:var(--text2);cursor:pointer;font-size:17px;display:flex;align-items:center;justify-content:center}
.modal-body{padding:20px 22px}
/* PAGINATION */
.pagination{display:flex;align-items:center;justify-content:center;gap:5px;margin-top:20px}
.page-btn{width:32px;height:32px;border-radius:7px;border:1.5px solid var(--border);background:var(--surface);color:var(--text2);font-size:13px;cursor:pointer;font-family:'Pretendard',sans-serif;display:flex;align-items:center;justify-content:center;transition:.15s}
.page-btn:hover{border-color:var(--primary);color:var(--primary)}
.page-btn.active{background:var(--primary);color:#fff;border-color:var(--primary)}
.page-btn:disabled{opacity:.4;cursor:not-allowed}
/* KPI */
.kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:20px}
.kpi-card{background:var(--surface);border-radius:10px;padding:18px;position:relative;overflow:hidden}
.kpi-card::before{content:'';position:absolute;top:-20px;right:-20px;width:80px;height:80px;border-radius:50%;opacity:.08}
.kpi-label{font-size:12px;color:var(--text2);margin-bottom:6px}
.kpi-value{font-size:24px;font-weight:800;color:var(--text1);letter-spacing:-0.5px}
.kpi-sub{font-size:11px;color:var(--text3);margin-top:3px}
/* FORM */
.form-group{margin-bottom:16px}
.form-label{font-size:12px;font-weight:600;color:var(--text2);margin-bottom:6px}
.form-input{width:100%;border:1.5px solid var(--border);border-radius:8px;padding:9px 12px;font-size:13px;font-family:'Pretendard',sans-serif;outline:none;color:var(--text1);transition:.15s;background:var(--surface)}
.form-input:focus{border-color:var(--primary)}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect } = React;
const { BarChart, Bar, XAxis, YAxis, CartesianGrid, Tooltip, ResponsiveContainer, Cell } = Recharts;

const SITES = [
  { id:1, name:'HB홀딩스', domain:'hbholding.co.kr', status:'active', color:'#6C63FF', manager:'김관리', pages:24, posts:45, media:128, lastEdit:'방금 전' },
  { id:2, name:'HB건설', domain:'hbconstr.co.kr', status:'active', color:'#00D9A5', manager:'이담당', pages:18, posts:62, media:210, lastEdit:'3시간 전' },
  { id:3, name:'HB기어텍', domain:'hbgeartech.co.kr', status:'active', color:'#F5A623', manager:'박운영', pages:16, posts:38, media:94, lastEdit:'1일 전' },
  { id:4, name:'HB평생교육원', domain:'hbedu.co.kr', status:'maintenance', color:'#F43F5E', manager:'최매니저', pages:12, posts:29, media:76, lastEdit:'2일 전' },
  { id:5, name:'HB건설 글로벌', domain:'hbconstr.global', status:'inactive', color:'#94A3B8', manager:'미배정', pages:8, posts:12, media:41, lastEdit:'5일 전' },
];

const BLOCKS = [
  { id:1, type:'텍스트', icon:'📝', bg:'#EEF4FF', color:'#3B5BDB', content:'그룹사 통합 홈페이지 & CMS 플랫폼에 오신 것을 환영합니다. 멀티사이트 CMS로 n개 기업 홈페이지를 단일 어드민에서 관리할 수 있습니다.' },
  { id:2, type:'이미지', icon:'🖼️', bg:'#F0FDF4', color:'#15803D', content:'hero-banner.jpg (1920×600px)' },
  { id:3, type:'갤러리', icon:'📸', bg:'#FFF7ED', color:'#B45309', content:'4개 이미지 (캐러셀)' },
  { id:4, type:'텍스트', icon:'📝', bg:'#EEF4FF', color:'#3B5BDB', content:'핵심 서비스 소개 섹션 — 사업 분야별 아이콘 카드 레이아웃' },
  { id:5, type:'임베드', icon:'🔗', bg:'#FAF5FF', color:'#6D28D9', content:'YouTube 영상 (기업 소개)' },
];

const BANNERS = [
  { id:1, site:'HB홀딩스', name:'주주총회 안내 팝업', type:'팝업', status:'active', start:'2025.04.01', end:'2025.04.15', icon:'📢', bg:'#EEF4FF' },
  { id:2, site:'HB건설', name:'채용 공고 슬라이드 배너', type:'슬라이드', status:'pending', start:'2025.04.08', end:'2025.04.30', icon:'👷', bg:'#F0FDF4' },
  { id:3, site:'HB기어텍', name:'박람회 참가 하단 알림 바', type:'바', status:'active', start:'2025.03.25', end:'2025.04.10', icon:'⚙️', bg:'#FFF7ED' },
  { id:4, site:'HB홀딩스', name:'ESG 보고서 다운로드 팝업', type:'팝업', status:'inactive', start:'2025.02.01', end:'2025.03.31', icon:'🌱', bg:'#F5F3FF' },
  { id:5, site:'HB평생교육원', name:'수강 등록 마감 긴급 배너', type:'바', status:'active', start:'2025.04.05', end:'2025.04.20', icon:'🎓', bg:'#FFF0F0' },
];

const SEO_PAGES = [
  { page:'홈페이지', path:'/', title:'HB그룹 — 건설·제조·인프라 통합 그룹', desc:'국내 최고의 건설·제조·인프라 그룹 HB의 공식 홈페이지입니다. 그룹사 소개, 사업 분야, 최신 뉴스를 확인하세요.' },
  { page:'기업 소개', path:'/about', title:'기업 소개 — HB그룹', desc:'HB그룹의 비전, 미션, 연혁, 임원진을 소개합니다.' },
  { page:'제품·서비스', path:'/products', title:'제품·서비스 — HB그룹', desc:'HB그룹 계열사의 핵심 제품 및 서비스를 소개합니다.' },
  { page:'뉴스룸', path:'/news', title:'뉴스룸 — HB그룹 최신 소식', desc:'HB그룹의 최신 보도자료, 공지사항, 이벤트 소식을 확인하세요.' },
  { page:'채용', path:'/careers', title:'채용 — HB그룹 인재 채용', desc:'HB그룹과 함께 성장할 인재를 모집합니다. 채용 공고를 확인하세요.' },
];

const CHART_DATA = [
  { name:'HB홀딩스', 페이지:24, 게시물:45, 미디어:128 },
  { name:'HB건설', 페이지:18, 게시물:62, 미디어:210 },
  { name:'HB기어텍', 페이지:16, 게시물:38, 미디어:94 },
  { name:'교육원', 페이지:12, 게시물:29, 미디어:76 },
  { name:'글로벌', 페이지:8, 게시물:12, 미디어:41 },
];

const STATUS_LABEL = { active:'활성', inactive:'비활성', maintenance:'점검 중', pending:'예정' };
const STATUS_CLASS = { active:'status-active', inactive:'status-inactive', maintenance:'status-maintenance', pending:'status-pending' };
const BANNER_TYPE_CLASS = { '팝업':'type-popup', '바':'type-bar', '슬라이드':'type-slide' };

// ── 사이트 관리 ──────────────────────────────────────────────────────────────
function SiteManagePage() {
  const [selected, setSelected] = useState(null);
  const [showAdd, setShowAdd] = useState(false);
  const [loaded, setLoaded] = useState(false);
  useEffect(() => {
    setLoaded(false);
    const t = setTimeout(() => setLoaded(true), 1500);
    return () => clearTimeout(t);
  }, []);

  if (!loaded) return (
    <div>
      <div className="kpi-grid">{[0,1,2,3].map(i=><div key={i} className="skeleton" style={{height:88}}/>)}</div>
      <div className="site-grid">{[0,1,2,3,4,5].map(i=><div key={i} className="skeleton" style={{height:180}}/>)}</div>
    </div>
  );

  return (
    <div>
      <div className="kpi-grid">
        {[
          {label:'전체 사이트',value:SITES.length+'개',sub:'등록된 사이트'},
          {label:'활성 사이트',value:SITES.filter(s=>s.status==='active').length+'개',sub:'현재 운영 중'},
          {label:'총 게시물',value:SITES.reduce((acc,s)=>acc+s.posts,0)+'개',sub:'전체 콘텐츠'},
          {label:'총 미디어',value:SITES.reduce((acc,s)=>acc+s.media,0)+'개',sub:'업로드된 파일'},
        ].map((k,i)=>(
          <div key={i} className="kpi-card" style={{boxShadow:'0 1px 4px rgba(0,0,0,0.06)'}}>
            <div className="kpi-label">{k.label}</div>
            <div className="kpi-value">{k.value}</div>
            <div className="kpi-sub">{k.sub}</div>
          </div>
        ))}
      </div>
      <div className="site-grid">
        {SITES.map(s=>(
          <div key={s.id} className={`site-card${selected?.id===s.id?' selected':''}`} onClick={()=>setSelected(s)}>
            <div className="site-card-top" style={{background:`linear-gradient(135deg,${s.color}cc,${s.color}88)`}}>
              {s.name[0]}
            </div>
            <div className="site-card-name">{s.name}</div>
            <div className="site-card-domain">{s.domain}</div>
            <div className="site-card-meta">
              <span className={`status-badge ${STATUS_CLASS[s.status]}`}>
                <span style={{width:6,height:6,borderRadius:'50%',background:'currentColor'}}/>
                {STATUS_LABEL[s.status]}
              </span>
              <span style={{fontSize:12,color:'var(--text3)'}}>{s.lastEdit}</span>
            </div>

        <div style={{background:'var(--surface)',borderRadius:12,padding:20,border:'2px dashed var(--border)',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:10,cursor:'pointer',transition:'.2s',minHeight:160}} onClick={()=>setShowAdd(true)}

            </div>
            <div className="modal-body">
              {[
                ['사이트 이름','예: HB물류','text'],
                ['도메인','예: hblogistics.co.kr','text'],
                ['담당자 계정','예: manager@hbgroup.co.kr','email'],
              ].map(([label,ph,type])=>(
                <div key={label} className="form-group">
                  <div className="form-label">{label}</div>

                    <div key={c} style={{width:32,height:32,borderRadius:'50%',background:c,cursor:'pointer',border:'2px solid transparent'}} onClick={e=>{e.currentTarget.style.borderColor='var(--text1)'}}/>

              <div style={{display:'flex',gap:8,marginTop:20}}>

              </div>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// ── 배너 팝업 ──────────────────────────────────────────────────────────────────
function BannerPage() {
  const [filter, setFilter] = useState('전체');
  const [loaded, setLoaded] = useState(false);
  useEffect(() => {
    setLoaded(false);
    const t = setTimeout(() => setLoaded(true), 1500);
    return () => clearTimeout(t);
  }, []);

  const filtered = BANNERS.filter(b => filter==='전체' || b.status===filter);

  if (!loaded) return (
    <div>{[0,1,2,3].map(i=><div key={i} className="skeleton" style={{height:84,marginBottom:12}}/>)}</div>
  );

  return (
    <div>
      <div style={{display:'flex',gap:8,marginBottom:20,flexWrap:'wrap',alignItems:'center'}}>
        {['전체','active','pending','inactive'].map(f=>(
          <button key={f} className={`btn ${filter===f?'btn-primary':'btn-outline'}`} style={{padding:'6px 14px',fontSize:12}} onClick={()=>setFilter(f)}>
            {f==='전체'?'전체':STATUS_LABEL[f]}
          </button>
        ))}
        <button className="btn btn-accent" style={{marginLeft:'auto'}}>+ 배너 추가</button>
      </div>
      <div className="banner-list">
        {filtered.map(b=>(
          <div key={b.id} className="banner-item">
            <div className="banner-thumb" style={{background:b.bg}}>{b.icon}</div>
            <div className="banner-info">
              <div style={{display:'flex',align:'center',gap:8,marginBottom:4}}>
                <span className="banner-name">{b.name}</span>
                <span className={`banner-type-badge ${BANNER_TYPE_CLASS[b.type]}`}>{b.type}</span>
              </div>
              <div className="banner-meta">
                <span>📍 {b.site}</span>
                <span>📅 {b.start} — {b.end}</span>
              </div>
            </div>
            <div style={{display:'flex',flexDirection:'column',alignItems:'flex-end',gap:8,flexShrink:0}}>
              <span className={`status-badge ${STATUS_CLASS[b.status]}`}>
                <span style={{width:5,height:5,borderRadius:'50%',background:'currentColor'}}/>
                {STATUS_LABEL[b.status]}
              </span>
              <div style={{display:'flex',gap:6}}>
                <button className="btn btn-outline" style={{padding:'4px 10px',fontSize:11}}>편집</button>
                <button className="btn btn-outline" style={{padding:'4px 10px',fontSize:11,color:'#DC2626',borderColor:'#FCA5A5'}}>삭제</button>
              </div>
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}

// ── SEO 통계 ──────────────────────────────────────────────────────────────────
function SEOPage() {
  const [titles, setTitles] = useState(Object.fromEntries(SEO_PAGES.map(p=>[p.path,p.title])));
  const [descs, setDescs] = useState(Object.fromEntries(SEO_PAGES.map(p=>[p.path,p.desc])));
  const [loaded, setLoaded] = useState(false);
  const [chartKey, setChartKey] = useState('페이지');
  useEffect(() => {
    setLoaded(false);
    const t = setTimeout(() => setLoaded(true), 1500);
    return () => clearTimeout(t);
  }, []);

  if (!loaded) return (
    <div>
      <div className="skeleton" style={{height:260,marginBottom:20}}/>
      {[0,1,2].map(i=><div key={i} className="skeleton" style={{height:80,marginBottom:12}}/>)}
    </div>
  );

  return (
    <div>
      <div className="card" style={{marginBottom:20}}>
        <div className="card-header">
          <span className="card-title">멀티사이트 콘텐츠 현황</span>
          <div style={{marginLeft:'auto',display:'flex',gap:6}}>
            {['페이지','게시물','미디어'].map(k=>(
              <button key={k} className={`btn ${chartKey===k?'btn-primary':'btn-outline'}`} style={{padding:'4px 12px',fontSize:11}} onClick={()=>setChartKey(k)}>{k}</button>
            ))}
          </div>
        </div>
        <div className="card-body">
          <div className="chart-wrap">
            <ResponsiveContainer width="100%" height="100%">
              <BarChart data={CHART_DATA} margin={{top:4,right:16,left:-10,bottom:0}}>
                <CartesianGrid strokeDasharray="3 3" stroke="#E3E6F0"/>
                <XAxis dataKey="name" tick={{fontSize:12,fill:'#4B5675'}}/>
                <YAxis tick={{fontSize:11,fill:'#9BA3BA'}}/>
                <Tooltip/>
                <Bar dataKey={chartKey} radius={[6,6,0,0]}>
                  {CHART_DATA.map((_, i) => (
                    <Cell key={i} fill={['#6C63FF','#00D9A5','#F5A623','#F43F5E','#94A3B8'][i]}/>
                  ))}
                </Bar>
              </BarChart>
            </ResponsiveContainer>
          </div>
        </div>
      </div>

      <div className="card">
        <div className="card-header">
          <span className="card-title">페이지별 SEO 메타 편집</span>
          <span style={{marginLeft:'auto',fontSize:12,color:'var(--text3)'}}>HB홀딩스 기준</span>
        </div>
        <div className="card-body" style={{padding:0}}>
          <table className="seo-table">
            <thead>
              <tr>
                <th style={{width:120}}>페이지</th>
                <th>og:title <span style={{color:'#94A3B8',fontWeight:400}}>(60자 권장)</span></th>
                <th>og:description <span style={{color:'#94A3B8',fontWeight:400}}>(160자 권장)</span></th>
              </tr>
            </thead>
            <tbody>
              {SEO_PAGES.map(p=>(
                <tr key={p.path}>
                  <td>
                    <div style={{fontSize:13,fontWeight:600,color:'var(--text1)'}}>{p.page}</div>
                    <div style={{fontSize:11,color:'var(--text3)'}}>{p.path}</div>
                  </td>
                  <td>
                    <input className="seo-input" value={titles[p.path]||''} onChange={e=>setTitles(prev=>({...prev,[p.path]:e.target.value}))} maxLength={80}/>
                    <div className={`char-count${(titles[p.path]||'').length>60?' over':''}`}>{(titles[p.path]||'').length}/60</div>
                  </td>
                  <td>
                    <input className="seo-input" value={descs[p.path]||''} onChange={e=>setDescs(prev=>({...prev,[p.path]:e.target.value}))} maxLength={200}/>
                    <div className={`char-count${(descs[p.path]||'').length>160?' over':''}`}>{(descs[p.path]||'').length}/160</div>
                  </td>
                </tr>
              ))}
            </tbody>
          </table>
          <div style={{padding:16,borderTop:'1px solid var(--border)',display:'flex',gap:8}}>
            <button className="btn btn-primary">💾 메타 저장</button>
            <button className="btn btn-outline">🗺️ 사이트맵 생성</button>
          </div>
        </div>
      </div>
    </div>
  );
}

// ── APP ────────────────────────────────────────────────────────────────────────
function App() {
  const [activeNav, setActiveNav] = useState('사이트 관리');
  const [activeSite, setActiveSite] = useState(SITES[0]);

  const NAV_ITEMS = [
    { label:'사이트 관리', icon:'🌐', badge:null },
    { label:'콘텐츠 편집', icon:'✏️', badge:null },
    { label:'배너 팝업', icon:'📢', badge:'3' },
    { label:'SEO 통계', icon:'📈', badge:null },
  ];

  const renderContent = () => {
    switch(activeNav) {
      case '사이트 관리': return <SiteManagePage/>;
      case '콘텐츠 편집': return <ContentEditorPage/>;
      case '배너 팝업': return <BannerPage/>;

  const PAGE_TITLES = {

    '콘텐츠 편집':'콘텐츠 편집',
    '배너 팝업':'배너·팝업 관리',
    'SEO 통계':'SEO & 통계',
  };

  return (
    <div style={{display:'flex'}}>
      <nav className="sidebar">
        <div className="sidebar-logo">
          <div className="logo-icon">C</div>
          <div>
            <div className="logo-text">MultiCMS</div>
            <div className="logo-sub">멀티사이트 통합 관리</div>

        </div>
        <div className="site-context" onClick={()=>{}}>
          <div className="site-context-label">현재 사이트</div>

            <span>{activeSite.name}</span>
            <span style={{fontSize:12}}>▾</span>
          </div>
        </div>
        <div className="sidebar-nav">
          <div className="nav-section-label">관리 메뉴</div>
          {NAV_ITEMS.map(item=>(
            <button key={item.label} className={`nav-btn${activeNav===item.label?' active':''}`} onClick={()=>setActiveNav(item.label)}>
              <span className="nav-icon">{item.icon}</span>
              <span>{item.label}</span>
              {item.badge && <span className="nav-badge">{item.badge}</span>}
            </button>
          ))}
          <div className="nav-section-label" style={{marginTop:8}}>시스템</div>
          <button className="nav-btn"><span className="nav-icon">👥</span><span>계정·권한</span></button>
          <button className="nav-btn"><span className="nav-icon">⚙️</span><span>설정</span></button>
        </div>
        <div className="sidebar-bottom">
          <div className="user-chip">
            <div className="user-avatar">김</div>
            <div style={{flex:1,minWidth:0}}>
              <div style={{fontSize:13,fontWeight:600,color:'var(--text1)',whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>김관리자</div>
              <div style={{fontSize:11,color:'var(--text3)'}}>슈퍼어드민</div>
            </div>
            <span style={{color:'var(--text3)',fontSize:13}}>⋯</span>
          </div>
        </div>
      </nav>
      <div className="main-content">
        <div className="topbar">
          <div>
            <span className="topbar-title">{PAGE_TITLES[activeNav]}</span>
            <span className="topbar-sub">/ {activeSite.name}</span>

          <div className="topbar-actions">
            {activeNav==='콘텐츠 편집' && (
              <button className="btn btn-accent">📤 배포</button>

        <div className="page-content">
          {renderContent()}

    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
