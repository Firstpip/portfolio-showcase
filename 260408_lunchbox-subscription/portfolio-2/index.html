/* ─── 공통 컴포넌트 ─── */
function CountUp({end,duration=1200,suffix=''}){
  const[val,setVal]=useState(0);
  useEffect(()=>{let s=0;const step=end/(duration/16);const t=setInterval(()=>{s+=step;if(s>=end){setVal(end);clearInterval(t)}else setVal(Math.floor(s))},16);return()=>clearInterval(t)},[end]);
  return<span style={{animation:'countUp 400ms ease'}}>{val.toLocaleString()}{suffix}</span>;
}

function Toast({message,onClose}){
  useEffect(()=>{const t=setTimeout(onClose,3000);return()=>clearTimeout(t)},[]);
  return<div style={{position:'fixed',bottom:24,right:24,zIndex:9999,background:C.secondary,color:'#fff',padding:'12px 24px',borderRadius:8,animation:'slideUp 300ms ease',boxShadow:'0 4px 16px rgba(0,0,0,.2)',fontSize:14}}>{message}</div>;
}

}

              onMouseLeave={e=>{e.currentTarget.style.transform='';e.currentTarget.style.boxShadow='none'}}>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10}}>
                <span style={{fontWeight:700,fontSize:14}}>{s.company}</span>
                <Badge text={s.status}/>
              </div>
              <div style={{fontSize:13,color:C.textLight,marginBottom:6}}>{s.plan} | {s.cycle}</div>
              <div style={{fontSize:18,fontWeight:700,color:C.primary}}>{s.monthly.toLocaleString()}원<span style={{fontSize:12,fontWeight:400,color:C.textLight}}>/월</span></div>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

/* ─── 구독 플랜 관리 ─── */

      <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:16}}>

            onMouseEnter={e=>{e.currentTarget.style.transform='scale(1.02)';e.currentTarget.style.boxShadow='0 8px 24px rgba(0,0,0,.15)'}}

        {PAYMENTS.map((p,i)=>(
          <div key={p.id} onClick={()=>{setDrawer(p);setDrawerType('payment')}} style={{background:C.surface,borderRadius:16,padding:20,boxShadow:'0 4px 16px rgba(0,0,0,.10)',cursor:'pointer',transition:'all 200ms',animation:`slideUp 400ms ease ${i*80}ms both`}}
            onMouseEnter={e=>{e.currentTarget.style.transform='scale(1.02)';e.currentTarget.style.boxShadow='0 8px 24px rgba(0,0,0,.15)'}}

      <div style={{background:C.surface,borderRadius:16,padding:20,boxShadow:'0 4px 16px rgba(0,0,0,.10)'}}>
        <div style={{fontSize:13,fontWeight:700,textTransform:'uppercase',letterSpacing:'.05em',marginBottom:16,color:C.textLight}}>결제 성공률</div>

          <div style={{flex:1}}>

            <div style={{height:10,borderRadius:5,background:'#E2E8F0'}}><div style={{height:10,borderRadius:5,background:C.accent,width:'83%',animation:'barGrow 800ms ease','--target-width':'83%'}}/></div>
          </div>
          <div style={{flex:1}}>
            <div style={{display:'flex',justifyContent:'space-between',marginBottom:8,fontSize:14}}><span>실패→재시도 성공</span><span style={{fontWeight:700,color:'#F59E0B'}}>1/1 (100%)</span></div>
            <div style={{height:10,borderRadius:5,background:'#E2E8F0'}}><div style={{height:10,borderRadius:5,background:'#F59E0B',width:'100%',animation:'barGrow 800ms ease 200ms','--target-width':'100%'}}/></div>

/* ─── 정산 리포트 ─── */

  return(
    <div style={{animation:'fadeIn 300ms ease'}}>
      <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:16,marginBottom:20}}>
        {SETTLEMENTS.map((s,i)=>(
          <div key={s.id} onClick={()=>{setDrawer(s);setDrawerType('settlement')}} style={{background:C.surface,borderRadius:16,padding:20,boxShadow:'0 4px 16px rgba(0,0,0,.10)',cursor:'pointer',transition:'all 200ms',animation:`slideUp 400ms ease ${i*80}ms both`}}
            onMouseEnter={e=>{e.currentTarget.style.transform='scale(1.02)';e.currentTarget.style.boxShadow='0 8px 24px rgba(0,0,0,.15)'}}
            onMouseLeave={e=>{e.currentTarget.style.transform='';e.currentTarget.style.boxShadow='0 4px 16px rgba(0,0,0,.10)'}}>

              <span style={{fontSize:12,color:C.textLight}}>{s.month}</span>

            </div>
            <div style={{fontWeight:700,fontSize:15,marginBottom:8}}>{s.company}</div>
            <div style={{display:'flex',justifyContent:'space-between',fontSize:13,color:C.textLight,marginBottom:4}}>

/* ─── 상품 카탈로그 ─── */
function CatalogContent({setDrawer,setDrawerType}){
  const [cat,setCat]=useState('전체');
  const cats=['전체','용지','토너/잉크','문구','포장재','종합','간식'];
  const filtered=CATALOG.filter(c=>cat==='전체'||c.category===cat);
  return(
    <div style={{animation:'fadeIn 300ms ease'}}>
      <div style={{display:'flex',gap:8,marginBottom:16}}>
        {cats.map(c=>(
          <button key={c} onClick={()=>setCat(c)} style={{padding:'6px 14px',borderRadius:20,border:'none',fontSize:12,fontWeight:cat===c?600:400,background:cat===c?C.primary:'#E2E8F0',color:cat===c?'#fff':C.text,cursor:'pointer',transition:'all 150ms',fontFamily:'inherit'}}>{c}</button>
        ))}
      </div>
      <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:16}}>
        {filtered.map((c,i)=>(
          <div key={c.id} onClick={()=>{setDrawer(c);setDrawerType('catalog')}} style={{background:C.surface,borderRadius:16,padding:20,boxShadow:'0 4px 16px rgba(0,0,0,.10)',cursor:'pointer',transition:'all 200ms',animation:`slideUp 400ms ease ${i*80}ms both`}}
            onMouseEnter={e=>{e.currentTarget.style.transform='scale(1.02)';e.currentTarget.style.boxShadow='0 8px 24px rgba(0,0,0,.15)'}}
            onMouseLeave={e=>{e.currentTarget.style.transform='';e.currentTarget.style.boxShadow='0 4px 16px rgba(0,0,0,.10)'}}>
            <div style={{fontSize:40,marginBottom:12}}>{c.img}</div>
            <h4 style={{fontSize:14,fontWeight:700,marginBottom:6}}>{c.name}</h4>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
              <span style={{fontSize:18,fontWeight:700,color:C.primary}}>{c.price.toLocaleString()}원</span>
              <span style={{fontSize:12,color:c.stock<100?'#DC2626':C.textLight}}>재고 {c.stock}{c.unit}</span>
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}

/* ─── TABS ─── */
const TABS=[
  {id:'home',label:'구독 대시보드'},
  {id:'subscription',label:'구독 플랜 관리'},
  {id:'payment',label:'자동 결제 관리'},
  {id:'settlement',label:'정산 리포트'},
  {id:'catalog',label:'상품 카탈로그'},
];

const HERO_DATA={
  home:{title:'구독 대시보드',kpis:[{label:'활성 구독',value:'5개'},{label:'월 매출',value:'1,180만원'},{label:'신규 구독',value:'+2'}]},
  subscription:{title:'구독 플랜 관리',kpis:[{label:'총 구독',value:'6개'},{label:'프리미엄',value:'3'},{label:'스탠다드',value:'2'}]},
  payment:{title:'자동 결제 관리',kpis:[{label:'이번 달 결제',value:'6건'},{label:'성공률',value:'83%'},{label:'재시도 성공',value:'1건'}]},
  settlement:{title:'정산 리포트',kpis:[{label:'이번 달 정산',value:'5건'},{label:'정산 완료',value:'3건'},{label:'총 정산액',value:'987만원'}]},
  catalog:{title:'상품 카탈로그',kpis:[{label:'등록 상품',value:'9개'},{label:'카테고리',value:'5'},{label:'재고 부족',value:'2'}]},
};

/* ─── App ─── */
function App(){
  const [tab,setTab]=useState('home');
  const [drawer,setDrawer]=useState(null);
  const [drawerType,setDrawerType]=useState('');
  const [modal,setModal]=useState(null);
  const [toast,setToast]=useState(null);
  const [loading,setLoading]=useState(true);

  useEffect(()=>{setTimeout(()=>setLoading(false),1200)},[]);

  if(loading){
    return(
      <div style={{minHeight:'100vh',background:C.bg}}>
        <div style={{height:56,background:C.surface,borderBottom:'1px solid #E2E8F0'}}/>
        <div style={{height:100,background:`linear-gradient(135deg,${C.primary},${C.accent})`}}/>
        <div style={{padding:32,display:'flex',flexDirection:'column',gap:16}}>
          {[...Array(3)].map((_,i)=><div key={i} style={{height:160,borderRadius:16,background:'linear-gradient(90deg,#F1F5F9 25%,#E2E8F0 50%,#F1F5F9 75%)',backgroundSize:'200% 100%',animation:'shimmer 1.5s infinite'}}/>)}
        </div>
      </div>
    );
  }

  return(
    <div style={{minHeight:'100vh',background:C.bg}}>
      {/* TopNav */}
      <header style={{position:'sticky',top:0,zIndex:100,background:C.surface,borderBottom:'1px solid #E2E8F0',display:'flex',alignItems:'center',height:56,padding:'0 24px',gap:8}}>
        <div style={{display:'flex',alignItems:'center',gap:8,marginRight:24}}>
          <div style={{width:32,height:32,borderRadius:8,background:C.primary,display:'flex',alignItems:'center',justifyContent:'center',color:'#fff',fontSize:16}}>📦</div>
          <span style={{fontWeight:700,fontSize:15}}>오피스 서플라이</span>
        </div>
        {TABS.map(t=>(
          <button key={t.id} onClick={()=>setTab(t.id)} style={{padding:'8px 14px',borderRadius:8,border:'none',cursor:'pointer',fontSize:13,fontWeight:tab===t.id?600:400,background:tab===t.id?`${C.primary}12`:'transparent',color:tab===t.id?C.primary:C.textLight,transition:'all 150ms',fontFamily:'inherit'}}>{t.label}</button>
        ))}
        <div style={{flex:1}}/>
        <div style={{position:'relative'}}>
          <input placeholder="검색..." style={{padding:'7px 12px 7px 32px',borderRadius:8,border:'1px solid #E2E8F0',fontSize:12,width:180,fontFamily:'inherit'}}/>
          <span style={{position:'absolute',left:10,top:'50%',transform:'translateY(-50%)',fontSize:13}}>🔍</span>
        </div>
        <span style={{fontSize:18,cursor:'pointer'}}>🔔</span>
        <div style={{width:32,height:32,borderRadius:16,background:'#E2E8F0',display:'flex',alignItems:'center',justifyContent:'center',fontSize:13,fontWeight:600}}>관</div>
      </header>

      <HeroBanner {...HERO_DATA[tab]}/>

      <main style={{padding:'24px 32px'}}>
        {tab==='home'&&<DashboardContent setDrawer={setDrawer} setDrawerType={setDrawerType}/>}
        {tab==='subscription'&&<SubscriptionContent setDrawer={setDrawer} setDrawerType={setDrawerType} setModal={setModal}/>}
        {tab==='payment'&&<PaymentContent setDrawer={setDrawer} setDrawerType={setDrawerType}/>}
        {tab==='settlement'&&<SettlementContent setDrawer={setDrawer} setDrawerType={setDrawerType}/>}
        {tab==='catalog'&&<CatalogContent setDrawer={setDrawer} setDrawerType={setDrawerType}/>}
      </main>

      <Drawer item={drawer} onClose={()=>setDrawer(null)} type={drawerType} setToast={setToast}/>

      {modal&&modal.type==='create-sub'&&(
        <Modal title="구독 등록" onClose={()=>setModal(null)}>
          <FormField label="업체명" value=""/>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:16}}>
            <FormField label="플랜" options={['프리미엄','스탠다드','베이직']}/>
            <FormField label="결제 주기" options={['주간','격주','월간']}/>
          </div>
          <FormField label="담당자명" value=""/>
          <FormField label="이메일" value=""/>
          <div style={{display:'flex',justifyContent:'flex-end',gap:8,marginTop:8}}>
            <button onClick={()=>setModal(null)} style={{padding:'8px 20px',borderRadius:10,border:'1px solid #E2E8F0',background:'#fff',fontSize:13,cursor:'pointer',fontFamily:'inherit'}}>취소</button>
            <button onClick={()=>{setModal(null);setToast('구독이 등록되었습니다.')}} style={{padding:'8px 20px',borderRadius:10,border:'none',background:C.primary,color:'#fff',fontSize:13,fontWeight:600,cursor:'pointer',fontFamily:'inherit'}}>등록</button>
          </div>
        </Modal>
      )}

      {toast&&<Toast message={toast} onClose={()=>setToast(null)}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
