/* ─── 공통 컴포넌트 ─── */
function CountUp({end,duration=1200,suffix=''}){
  const[val,setVal]=useState(0);
  useEffect(()=>{let s=0;const step=end/(duration/16);const t=setInterval(()=>{s+=step;if(s>=end){setVal(end);clearInterval(t)}else setVal(Math.floor(s))},16);return()=>clearInterval(t)},[end]);
  return<span style={{animation:'countUp 400ms ease'}}>{val.toLocaleString()}{suffix}</span>;
}

function Toast({message,onClose}){
  useEffect(()=>{const t=setTimeout(onClose,3000);return()=>clearTimeout(t)},[]);
  return<div style={{position:'fixed',bottom:24,right:24,zIndex:9999,background:C.secondary,color:'#fff',padding:'12px 24px',borderRadius:10,animation:'slideUp 300ms ease',boxShadow:'0 4px 16px rgba(0,0,0,.2)',fontSize:14}}>{message}</div>;
}

function Badge({text}){
  const colors={

    '배송중':{bg:'#FEF3C7',t:'#D97706'},'배송완료':{bg:'#D1FAE5',t:'#059669'},'준비중':{bg:'#EDE9FE',t:'#7C3AED'},
  };
  const c=colors[text]||{bg:'#F3F4F6',t:'#6B7280'};
  return<span style={{display:'inline-block',padding:'3px 10px',borderRadius:20,fontSize:12,fontWeight:600,background:c.bg,color:c.t}}>{text}</span>;
}

              <div key={k} style={{textAlign:'center'}}>
                <div style={{fontSize:11,color:C.textLight}}>{k==='protein'?'단백질':k==='carb'?'탄수화물':k==='fat'?'지방':'식이섬유'}</div>
                <div style={{height:4,borderRadius:2,background:'#E5E7EB',marginTop:4}}>
                  <div style={{height:4,borderRadius:2,background:C.primary,width:`${v}%`,animation:'barGrow 600ms ease','--target-width':`${v}%`}}/>
                </div>
                <div style={{fontSize:12,fontWeight:600,marginTop:2}}>{v}%</div>
              </div>
            ))}
          </div>
        </div>
      ))}
      <ResponsiveContainer width="100%" height={200}>
        <RadarChart data={radarData}><PolarGrid stroke="#E5E7EB"/><PolarAngleAxis dataKey="subject" tick={{fontSize:11}}/><PolarRadiusAxis angle={30} domain={[0,100]} tick={{fontSize:10}}/><Radar dataKey="A" stroke={C.primary} fill={`${C.primary}30`} strokeWidth={2}/></RadarChart>
      </ResponsiveContainer>
    </div>
  );
}

/* ─── 배송 경로 ─── */
function DeliveryList({selected,setSelected}){
  return DELIVERIES.map((d,i)=>(
    <div key={d.id} onClick={()=>setSelected(d)} style={{padding:'14px 16px',cursor:'pointer',borderBottom:'1px solid #F3F4F6',transition:'all 150ms',background:selected?.id===d.id?`${C.primary}08`:'transparent',borderLeft:selected?.id===d.id?`3px solid ${C.primary}`:'3px solid transparent',animation:`slideUp 300ms ease ${i*50}ms both`}}
      onMouseEnter={e=>{if(selected?.id!==d.id)e.currentTarget.style.background=`${C.primary}04`}}
      onMouseLeave={e=>{if(selected?.id!==d.id)e.currentTarget.style.background='transparent'}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:4}}>
        <span style={{fontWeight:600,fontSize:14}}>{d.branch}</span>
        <Badge text={d.status}/>
      </div>
      <div style={{fontSize:12,color:C.textLight}}>{d.driver} · {d.orders}건</div>
      <div style={{height:4,borderRadius:2,background:'#E5E7EB',marginTop:8}}>
        <div style={{height:4,borderRadius:2,background:d.progress===100?C.accent:C.primary,width:`${d.progress}%`,transition:'width 500ms ease'}}/>
      </div>
    </div>
  ));
}

function DeliveryDetail({item,setToast}){
  if(!item) return <div style={{display:'flex',alignItems:'center',justifyContent:'center',height:'100%',color:C.textLight,fontSize:14}}>배송 건을 선택하세요</div>;
  return(
    <div style={{animation:'slideInRight 250ms ease'}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16}}>
        <h3 style={{fontSize:18,fontWeight:700}}>{item.branch}</h3>
        <Badge text={item.status}/>
      </div>
      <div style={{padding:16,borderRadius:16,background:`${C.primary}06`,border:'1px solid #E5E7EB',marginBottom:16}}>
        <div style={{display:'flex',justifyContent:'space-between',marginBottom:8}}>
          <span style={{fontSize:13,color:C.textLight}}>진행률</span>
          <span style={{fontSize:13,fontWeight:700}}>{item.progress}%</span>
        </div>
        <div style={{height:8,borderRadius:4,background:'#E5E7EB'}}>
          <div style={{height:8,borderRadius:4,background:item.progress===100?C.accent:C.primary,width:`${item.progress}%`,animation:'barGrow 800ms ease','--target-width':`${item.progress}%`}}/>
        </div>
      </div>
      {[['배송 ID',item.id],['기사',item.driver],['경로',item.route],['주문 수',`${item.orders}건`],['출발 시간',item.startTime],['도착 예정',item.eta]].map(([l,v])=>(
        <div key={l} style={{display:'flex',justifyContent:'space-between',padding:'10px 0',borderBottom:'1px solid #F3F4F6',fontSize:14}}>
          <span style={{color:C.textLight}}>{l}</span><span style={{fontWeight:500}}>{v}</span>
        </div>
      ))}
      <div style={{marginTop:16,padding:16,borderRadius:16,border:'1px dashed #D1D5DB',background:'#F9FAFB',textAlign:'center'}}>
        <span style={{fontSize:40}}>🗺️</span>
        <p style={{fontSize:13,color:C.textLight,marginTop:8}}>Leaflet.js 지도 시각화 영역<br/>배송 경로 폴리라인 렌더링</p>
      </div>
      <button onClick={()=>setToast('배송 경로가 재계산되었습니다.')} style={{width:'100%',padding:'10px',borderRadius:10,border:'none',background:C.primary,color:'#fff',fontSize:13,fontWeight:600,cursor:'pointer',fontFamily:'inherit',marginTop:16}}>경로 재최적화</button>
    </div>
  );
}

/* ─── 재고 관리 ─── */
function InventoryList({selected,setSelected,tab}){
  const items=tab==='alert'?INVENTORY.filter(i=>i.status==='부족'):INVENTORY;
  return items.map((item,i)=>(
    <div key={item.id} onClick={()=>setSelected(item)} style={{padding:'14px 16px',cursor:'pointer',borderBottom:'1px solid #F3F4F6',transition:'all 150ms',background:selected?.id===item.id?`${C.primary}08`:'transparent',borderLeft:selected?.id===item.id?`3px solid ${C.primary}`:'3px solid transparent',animation:`slideUp 300ms ease ${i*50}ms both`}}
      onMouseEnter={e=>{if(selected?.id!==item.id)e.currentTarget.style.background=`${C.primary}04`}}
      onMouseLeave={e=>{if(selected?.id!==item.id)e.currentTarget.style.background='transparent'}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:2}}>
        <span style={{fontWeight:600,fontSize:14}}>{item.item}</span>
        <Badge text={item.status}/>
      </div>
      <div style={{fontSize:12,color:C.textLight}}>{item.branch} · {item.current}/{item.min} {item.unit}</div>
    </div>
  ));
}

function InventoryDetail({item,setToast}){
  if(!item) return <div style={{display:'flex',alignItems:'center',justifyContent:'center',height:'100%',color:C.textLight,fontSize:14}}>품목을 선택하세요</div>;
  const pct=Math.min((item.current/item.min)*100,100);
  return(
    <div style={{animation:'slideInRight 250ms ease'}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16}}>
        <h3 style={{fontSize:18,fontWeight:700}}>{item.item}</h3>
        <Badge text={item.status}/>
      </div>
      {[['지점',item.branch],['현재 재고',`${item.current} ${item.unit}`],['최소 수량',`${item.min} ${item.unit}`],['마지막 발주',item.lastOrder]].map(([l,v])=>(
        <div key={l} style={{display:'flex',justifyContent:'space-between',padding:'10px 0',borderBottom:'1px solid #F3F4F6',fontSize:14}}>
          <span style={{color:C.textLight}}>{l}</span><span style={{fontWeight:500}}>{v}</span>
        </div>
      ))}
      <div style={{marginTop:16}}>
        <div style={{display:'flex',justifyContent:'space-between',fontSize:13,marginBottom:6}}><span>재고 수준</span><span style={{fontWeight:700,color:pct>=100?C.accent:pct>=50?'#F59E0B':'#DC2626'}}>{Math.round(pct)}%</span></div>
        <div style={{height:8,borderRadius:4,background:'#E5E7EB'}}><div style={{height:8,borderRadius:4,background:pct>=100?C.accent:pct>=50?'#F59E0B':'#DC2626',width:`${pct}%`,animation:'barGrow 800ms ease','--target-width':`${pct}%`}}/></div>
      </div>
      <button onClick={()=>setToast('발주가 신청되었습니다.')} style={{width:'100%',padding:'10px',borderRadius:10,border:'none',background:item.status==='부족'?'#DC2626':C.primary,color:'#fff',fontSize:13,fontWeight:600,cursor:'pointer',fontFamily:'inherit',marginTop:20}}>{item.status==='부족'?'긴급 발주':'발주 신청'}</button>
    </div>
  );
}

/* ─── App ─── */
function App(){
  const [section,setSection]=useState('dashboard');
  const [tab,setTab]=useState(0);
  const [selected,setSelected]=useState(null);
  const [toast,setToast]=useState(null);
  const [loading,setLoading]=useState(true);

  useEffect(()=>{setTimeout(()=>setLoading(false),1200)},[]);
  useEffect(()=>{setTab(0);setSelected(null)},[section]);

  if(loading){
    return(
      <div style={{display:'flex',minHeight:'100vh'}}>
        <div style={{width:240,background:'#fff',borderRight:'1px solid #E5E7EB'}}/>
        <div style={{flex:1,padding:20,display:'flex',flexDirection:'column',gap:12}}>
          {[40,38,...Array(3).fill(160)].map((h,i)=><div key={i} style={{height:h,borderRadius:12,background:'linear-gradient(90deg,#F1F5F9 25%,#E2E8F0 50%,#F1F5F9 75%)',backgroundSize:'200% 100%',animation:'shimmer 1.5s infinite'}}/>)}
        </div>
      </div>
    );
  }

  const tabs=SECTION_TABS[section]||[];

  function renderMaster(){
    const t=tabs[tab]?.id;
    if(section==='dashboard'){
      if(t==='overview') return <div style={{padding:20}}><DashboardOverview/></div>;
      if(t==='comparison') return <div style={{padding:20}}><DashboardComparison/></div>;
    }
    if(section==='branch') return <BranchList selected={selected} setSelected={setSelected}/>;
    if(section==='ai-menu') return <AIMenuRecommend selected={selected} setSelected={setSelected}/>;
    if(section==='delivery') return <DeliveryList selected={selected} setSelected={setSelected}/>;
    if(section==='inventory') return <InventoryList selected={selected} setSelected={setSelected} tab={tabs[tab]?.id}/>;
    return null;
  }

  function renderDetail(){
    if(section==='dashboard') return null;
    if(section==='branch') return <BranchDetail item={selected} setToast={setToast}/>;
    if(section==='ai-menu') return <AIMenuDetail item={selected}/>;
    if(section==='delivery') return <DeliveryDetail item={selected} setToast={setToast}/>;
    if(section==='inventory') return <InventoryDetail item={selected} setToast={setToast}/>;
    return null;
  }

  const isDashboard=section==='dashboard';

  return(
    <div style={{display:'flex',minHeight:'100vh',background:C.bg}}>
      {/* 밝은 사이드바 */}
      <nav style={{width:240,background:'#fff',borderRight:'1px solid #E5E7EB',display:'flex',flexDirection:'column',paddingTop:16,flexShrink:0}}>
        <div style={{padding:'0 16px 20px',display:'flex',alignItems:'center',gap:8}}>
          <div style={{width:32,height:32,borderRadius:10,background:C.primary,display:'flex',alignItems:'center',justifyContent:'center',color:'#fff',fontSize:16}}>🍽️</div>
          <span style={{fontWeight:700,fontSize:15}}>급식 통합 관리</span>
        </div>
        <div style={{flex:1,display:'flex',flexDirection:'column',gap:2,padding:'0 8px'}}>
          {NAV.map(item=>(
            <button key={item.id} onClick={()=>setSection(item.id)} style={{display:'flex',alignItems:'center',gap:10,width:'100%',padding:'9px 12px',borderRadius:8,border:'none',cursor:'pointer',background:section===item.id?`${C.primary}10`:'transparent',color:section===item.id?C.primary:C.textLight,borderLeft:section===item.id?`3px solid ${C.primary}`:'3px solid transparent',fontSize:14,fontWeight:section===item.id?600:400,transition:'all 150ms',fontFamily:'inherit',textAlign:'left'}}>
              <span style={{fontSize:18}}>{item.icon}</span>{item.label}
            </button>
          ))}
        </div>
        <div style={{padding:'12px 16px',borderTop:'1px solid #E5E7EB',display:'flex',alignItems:'center',gap:8}}>
          <div style={{width:28,height:28,borderRadius:14,background:'#E5E7EB',display:'flex',alignItems:'center',justifyContent:'center',fontSize:12,fontWeight:600}}>관</div>
          <div><div style={{fontSize:12,fontWeight:500}}>본사 관리자</div><div style={{fontSize:10,color:C.textLight}}>admin@catering.co.kr</div></div>
        </div>
      </nav>

      {/* 메인 영역 */}
      <div style={{flex:1,display:'flex',flexDirection:'column',overflow:'hidden'}}>
        {/* 앱바 */}
        <header style={{height:40,borderBottom:'1px solid #E5E7EB',display:'flex',alignItems:'center',padding:'0 16px',gap:8,background:C.surface,flexShrink:0}}>
          <span style={{fontSize:12,color:C.textLight}}>홈</span>
          <span style={{fontSize:12,color:C.textLight}}>›</span>
          <span style={{fontSize:12,fontWeight:600}}>{NAV.find(n=>n.id===section)?.label}</span>
          {tabs[tab]&&<><span style={{fontSize:12,color:C.textLight}}>›</span><span style={{fontSize:12,color:C.textLight}}>{tabs[tab].label}</span></>}
          <div style={{flex:1}}/>
          <input placeholder="검색..." style={{padding:'5px 10px 5px 28px',borderRadius:6,border:'1px solid #E5E7EB',fontSize:11,width:160,fontFamily:'inherit'}}/>
          <div style={{width:24,height:24,borderRadius:12,background:'#E5E7EB',display:'flex',alignItems:'center',justifyContent:'center',fontSize:11}}>관</div>
        </header>

        {/* 탭 스트립 */}
        <div style={{height:38,borderBottom:'1px solid #E5E7EB',display:'flex',alignItems:'flex-end',padding:'0 16px',background:C.surface,flexShrink:0}}>
          {tabs.map((t,i)=>(
            <button key={t.id} onClick={()=>{setTab(i);setSelected(null)}} style={{padding:'8px 14px 6px',border:'none',cursor:'pointer',background:'transparent',fontFamily:'inherit',fontSize:13,color:tab===i?C.primary:C.textLight,fontWeight:tab===i?600:400,borderBottom:tab===i?`2px solid ${C.primary}`:'2px solid transparent',marginBottom:-1,transition:'all 150ms'}}>{t.label}</button>
          ))}
        </div>

        {/* 콘텐츠 */}
        <div style={{flex:1,display:'flex',overflow:'hidden',animation:'fadeIn 300ms ease'}}>
          {isDashboard?(
            <div style={{flex:1,overflowY:'auto',padding:20}}>{renderMaster()}</div>
          ):(
            <>
              <div style={{width:'42%',borderRight:'1px solid #E5E7EB',overflowY:'auto'}}>{renderMaster()}</div>
              <div style={{flex:1,overflowY:'auto',padding:20}}>{renderDetail()}</div>
            </>
          )}
        </div>
      </div>

      {toast&&<Toast message={toast} onClose={()=>setToast(null)}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
