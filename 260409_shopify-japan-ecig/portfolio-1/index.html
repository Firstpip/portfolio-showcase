// ─── 공통 컴포넌트 ─────────────────────────────────────────────
function Badge({ children, color='accent' }) {
  const colors = {
    accent: { bg: C.accentSoft, text: C.accent },
    success: { bg: 'rgba(76,175,80,0.15)', text: C.success },
    warning: { bg: 'rgba(255,152,0,0.15)', text: C.warning },
    muted: { bg: 'rgba(136,146,164,0.15)', text: C.textSub },
    blue: { bg: 'rgba(74,144,217,0.15)', text: C.blueLight },
  };
  const c = colors[color] || colors.accent;
  return (
    <span style={{ display:'inline-block', padding:'2px 8px', borderRadius:20, fontSize:11, fontWeight:600, background:c.bg, color:c.text }}>
      {children}
    </span>
  );
}

function Stars({ rating }) {
  return (
    <span>
      {[1,2,3,4,5].map(i => (
        <span key={i} style={{ color: i <= Math.round(rating) ? '#FFB300' : C.textMuted, fontSize:13 }}>★</span>
      ))}
    </span>
  );
}

function Modal({ title, onClose, children }) {
  return (
    <div style={{ position:'fixed', inset:0, zIndex:1000, display:'flex', alignItems:'center', justifyContent:'center', background:'rgba(0,0,0,0.7)' }}
      onClick={e => { if(e.target===e.currentTarget) onClose(); }}>
      <div style={{ background:C.surface, border:`1px solid ${C.border}`, borderRadius:12, padding:28, width:'90%', maxWidth:520, maxHeight:'85vh', overflowY:'auto' }}>
        <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:20 }}>
          <h3 style={{ fontSize:18, fontWeight:700 }}>{title}</h3>
          <button onClick={onClose} style={{ background:'none', border:'none', color:C.textSub, fontSize:22, cursor:'pointer', lineHeight:1 }}>×</button>
        </div>
        {children}
      </div>
    </div>
  );
}

function Toast({ msg, onClose }) {
  useEffect(() => { const t = setTimeout(onClose, 2500); return () => clearTimeout(t); }, []);
  return (
    <div style={{ position:'fixed', bottom:24, right:24, zIndex:9999, background:C.success, color:'#fff', padding:'12px 20px', borderRadius:8, fontWeight:600, fontSize:14, boxShadow:'0 4px 16px rgba(0,0,0,0.4)' }}>
      ✓ {msg}
    </div>
  );
}

// ─── 성인 인증 게이트 ──────────────────────────────────────────
function AgeGateScreen() {
  const [year, setYear] = useState('');
  const [month, setMonth] = useState('');
  const [day, setDay] = useState('');
  const [error, setError] = useState('');
  const [result, setResult] = useState(null);

  const verify = () => {
    if (!year || !month || !day) { setError('生年月日を入力してください。'); return; }
    const birth = new Date(Number(year), Number(month)-1, Number(day));
    const today = new Date();
    let age = today.getFullYear() - birth.getFullYear();
    const m = today.getMonth() - birth.getMonth();
    if (m < 0 || (m === 0 && today.getDate() < birth.getDate())) age--;
    if (age < 20) {
      setResult('reject');
    } else {
      setResult('pass');
    }
  };

  const inp = { background: C.card, border:`1px solid ${C.border}`, borderRadius:8, color:C.text, padding:'10px 14px', fontSize:15, outline:'none', width:'100%' };

  return (
    <div style={{ display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', minHeight:'calc(100vh - 60px)', padding:24 }}>
      <div style={{ background:C.card, border:`1px solid ${C.border}`, borderRadius:16, padding:40, width:'100%', maxWidth:480, textAlign:'center' }}>
        {/* 로고 영역 */}
        <div style={{ marginBottom:8 }}>
          <span style={{ fontSize:40 }}>💨</span>
        </div>
        <h1 style={{ fontSize:28, fontWeight:800, color:C.accent, letterSpacing:2, marginBottom:6 }}>VAPE.JP</h1>
        <p style={{ color:C.textSub, fontSize:13, marginBottom:28 }}>日本最大級の電子タバコ専門ストア</p>

        {!result ? (
          <>
            <div style={{ background:'rgba(233,69,96,0.08)', border:`1px solid rgba(233,69,96,0.3)`, borderRadius:8, padding:'12px 16px', marginBottom:24, fontSize:13, color:'#FFB3C0', lineHeight:1.6 }}>
              ⚠️ このサイトはたばこ製品を販売しています。<br/>
              日本法律により、<strong>20歳未満の方</strong>はご利用いただけません。
            </div>

            <p style={{ color:C.textSub, fontSize:13, marginBottom:16 }}>生年月日を入力してください</p>

            <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr 1fr', gap:10, marginBottom:16 }}>
              <input style={inp} type="number" placeholder="年 (例: 1990)" value={year} onChange={e=>setYear(e.target.value)} min="1920" max="2010" />
              <select style={{...inp}} value={month} onChange={e=>setMonth(e.target.value)}>
                <option value="">月</option>
                {Array.from({length:12},(_,i)=><option key={i+1} value={i+1}>{i+1}月</option>)}
              </select>
              <select style={{...inp}} value={day} onChange={e=>setDay(e.target.value)}>
                <option value="">日</option>
                {Array.from({length:31},(_,i)=><option key={i+1} value={i+1}>{i+1}日</option>)}
              </select>
            </div>

            {error && <p style={{ color:C.accent, fontSize:12, marginBottom:12 }}>{error}</p>}

            <button onClick={verify} style={{ width:'100%', padding:'14px', background:C.accent, border:'none', borderRadius:8, color:'#fff', fontWeight:700, fontSize:16, cursor:'pointer', transition:'background 0.2s' }}
              onMouseEnter={e=>e.target.style.background=C.accentHover}
              onMouseLeave={e=>e.target.style.background=C.accent}>
              年齢確認する
            </button>

            <p style={{ color:C.textMuted, fontSize:11, marginTop:16 }}>
              認証状態はセッション中保持されます。<br/>
              個人情報は収集いたしません。
            </p>
          </>
        ) : result === 'pass' ? (
          <div>
            <div style={{ fontSize:48, marginBottom:16 }}>✅</div>
            <h3 style={{ color:C.success, fontSize:20, fontWeight:700, marginBottom:8 }}>ご利用いただけます</h3>
            <p style={{ color:C.textSub, fontSize:14, marginBottom:20 }}>成人確認が完了しました。ショッピングをお楽しみください。</p>
            <div style={{ background:'rgba(76,175,80,0.1)', border:`1px solid rgba(76,175,80,0.3)`, borderRadius:8, padding:'10px 16px', fontSize:12, color:'rgba(76,175,80,0.9)' }}>
              セッションストレージに認証状態を保存しました。<br/>
              ブラウザを閉じると再認証が必要になります。
            </div>
            <p style={{ marginTop:16, fontSize:12, color:C.textMuted }}>
              구현 포인트: sessionStorage.setItem('age_verified', 'true') 처리
            </p>
          </div>
        ) : (
          <div>
            <div style={{ fontSize:48, marginBottom:16 }}>🚫</div>
            <h3 style={{ color:C.accent, fontSize:20, fontWeight:700, marginBottom:8 }}>ご利用いただけません</h3>
            <p style={{ color:C.textSub, fontSize:14 }}>申し訳ございませんが、20歳未満の方はご利用いただけません。</p>
            <button onClick={()=>setResult(null)} style={{ marginTop:20, padding:'10px 24px', background:C.card, border:`1px solid ${C.border}`, borderRadius:8, color:C.text, cursor:'pointer', fontSize:14 }}>
              戻る
            </button>
          </div>
        )}
      </div>

      {/* 구현 설명 */}
      <div style={{ marginTop:24, background:C.surface, border:`1px solid ${C.border}`, borderRadius:8, padding:16, width:'100%', maxWidth:480 }}>
        <p style={{ fontSize:12, color:C.textSub, marginBottom:6, fontWeight:600 }}>⚙ 구현 포인트 (Shopify Liquid + JS)</p>
        <ul style={{ fontSize:11, color:C.textMuted, paddingLeft:16, lineHeight:2 }}>
          <li>생년월일 기반 연령 계산 (일본 기준 만 20세)</li>
          <li>sessionStorage 기반 인증 상태 유지 — 브라우저 재시작 시 재인증</li>
          <li>미성년자 접근 시 /age-restricted 페이지 리디렉션</li>
        </ul>
      </div>
    </div>
  );
}

// ─── 상품 목록 ─────────────────────────────────────────────────
function ProductListScreen({ onSelectProduct }) {
  const [brand, setBrand] = useState('전체');
  const [nicotine, setNicotine] = useState('전체');
  const [sort, setSort] = useState('popular');
  const [modal, setModal] = useState(null);
  const [cartMsg, setCartMsg] = useState('');

  const brands = ['전체', 'RELX', 'JUUL', 'VOOPOO', 'SMOK', 'Uwell'];
  const nicotines = ['전체', '2%', '3%', '5%'];

  let filtered = PRODUCTS
    .filter(p => brand === '전체' || p.brand === brand)
    .filter(p => nicotine === '전체' || p.nicotine === nicotine);

  if (sort === 'price-asc') filtered = [...filtered].sort((a,b)=>a.price-b.price);
  else if (sort === 'price-desc') filtered = [...filtered].sort((a,b)=>b.price-a.price);
  else if (sort === 'rating') filtered = [...filtered].sort((a,b)=>b.rating-a.rating);

  const addCart = (p) => { setCartMsg(`${p.name}をカートに追加しました！`); setTimeout(()=>setCartMsg(''),2200); };

  const selStyle = { background:C.card, border:`1px solid ${C.border}`, borderRadius:6, color:C.text, padding:'7px 12px', fontSize:13, cursor:'pointer', outline:'none' };

  return (
    <div style={{ padding:24 }}>
      {cartMsg && <Toast msg={cartMsg} onClose={()=>setCartMsg('')} />}

      {/* 헤더 */}
      <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:20 }}>
        <div>
          <h2 style={{ fontSize:22, fontWeight:700 }}>商品一覧</h2>
          <p style={{ color:C.textSub, fontSize:13, marginTop:2 }}>全 {filtered.length}件</p>
        </div>
        <select style={selStyle} value={sort} onChange={e=>setSort(e.target.value)}>
          <option value="popular">人気順</option>
          <option value="price-asc">価格が安い順</option>
          <option value="price-desc">価格が高い順</option>
          <option value="rating">評価順</option>
        </select>
      </div>

      <div style={{ display:'flex', gap:20 }}>
        {/* 필터 사이드 */}
        <div style={{ width:180, flexShrink:0 }}>
          <div style={{ background:C.card, border:`1px solid ${C.border}`, borderRadius:10, padding:16, marginBottom:12 }}>
            <p style={{ fontSize:12, color:C.textSub, fontWeight:600, marginBottom:10 }}>ブランド</p>
            {brands.map(b => (
              <button key={b} onClick={()=>setBrand(b)} style={{ display:'block', width:'100%', textAlign:'left', padding:'7px 10px', borderRadius:6, border:'none', background: brand===b ? C.accentSoft : 'transparent', color: brand===b ? C.accent : C.textSub, fontSize:13, cursor:'pointer', marginBottom:2, transition:'all 0.15s' }}>
                {brand===b ? '▶ ' : ''}{b}
              </button>
            ))}
          </div>
          <div style={{ background:C.card, border:`1px solid ${C.border}`, borderRadius:10, padding:16 }}>
            <p style={{ fontSize:12, color:C.textSub, fontWeight:600, marginBottom:10 }}>ニコチン濃度</p>
            {nicotines.map(n => (
              <button key={n} onClick={()=>setNicotine(n)} style={{ display:'block', width:'100%', textAlign:'left', padding:'7px 10px', borderRadius:6, border:'none', background: nicotine===n ? C.accentSoft : 'transparent', color: nicotine===n ? C.accent : C.textSub, fontSize:13, cursor:'pointer', marginBottom:2, transition:'all 0.15s' }}>
                {nicotine===n ? '▶ ' : ''}{n}
              </button>
            ))}
          </div>
        </div>

        {/* 상품 그리드 */}
        <div style={{ flex:1, display:'grid', gridTemplateColumns:'repeat(auto-fill, minmax(200px, 1fr))', gap:16 }}>
          {filtered.map(p => (
            <div key={p.id} style={{ background:C.card, border:`1px solid ${C.border}`, borderRadius:10, padding:16, cursor:'pointer', transition:'all 0.2s', opacity: p.stock===0 ? 0.6 : 1 }}
              onMouseEnter={e=>e.currentTarget.style.borderColor=C.accent}
              onMouseLeave={e=>e.currentTarget.style.borderColor=C.border}
              onClick={()=>onSelectProduct(p)}>
              <div style={{ fontSize:48, textAlign:'center', marginBottom:10 }}>{p.img}</div>
              <div style={{ display:'flex', gap:4, flexWrap:'wrap', marginBottom:8 }}>
                {p.tags.map(t=><Badge key={t} color={t==='베스트셀러'?'accent':t==='품절예정'?'warning':'blue'}>{t}</Badge>)}
              </div>
              <p style={{ fontSize:11, color:C.textSub, marginBottom:2 }}>{p.brand}</p>
              <p style={{ fontSize:14, fontWeight:700, marginBottom:4, lineHeight:1.4 }}>{p.name}</p>
              <p style={{ fontSize:12, color:C.textSub, marginBottom:6 }}>{p.flavor} / {p.nicotine}</p>
              <div style={{ display:'flex', alignItems:'center', gap:4, marginBottom:10 }}>
                <Stars rating={p.rating} />
                <span style={{ fontSize:11, color:C.textMuted }}>({p.reviews})</span>
              </div>
              <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center' }}>
                <span style={{ fontSize:18, fontWeight:800, color:C.accent }}>¥{p.price.toLocaleString()}</span>
                <button onClick={e=>{e.stopPropagation(); addCart(p);}} disabled={p.stock===0}
                  style={{ padding:'6px 12px', background: p.stock===0 ? C.card : C.accent, border:`1px solid ${p.stock===0?C.border:C.accent}`, borderRadius:6, color: p.stock===0 ? C.textMuted : '#fff', fontSize:12, fontWeight:600, cursor: p.stock===0?'not-allowed':'pointer' }}>
                  {p.stock===0 ? '品切れ' : 'カートへ'}
                </button>
              </div>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

// ─── 장바구니 ──────────────────────────────────────────────────
function CartScreen() {
  const [items, setItems] = useState([
    { ...PRODUCTS[0], qty:2, selFlavor:'ライチアイス', selNic:'3%' },
    { ...PRODUCTS[3], qty:1, selFlavor:'マンゴーアイス', selNic:'3%' },
  ]);
  const [coupon, setCoupon] = useState('');
  const [couponApplied, setCouponApplied] = useState(false);
  const [step, setStep] = useState('cart');
  const [payMethod, setPayMethod] = useState('paypal');
  const [address, setAddress] = useState({ zip:'', prefecture:'', city:'', street:'' });
  const [toast, setToast] = useState('');
  const [zipLoading, setZipLoading] = useState(false);

  const subtotal = items.reduce((s,i)=>s+i.price*i.qty, 0);
  const shipping = 1200;
  const discount = couponApplied ? Math.floor(subtotal*0.1) : 0;
  const total = subtotal + shipping - discount;

  const updateQty = (id, delta) => {
    setItems(prev => prev.map(i => i.id===id ? {...i, qty:Math.max(1,i.qty+delta)} : i));
  };
  const removeItem = (id) => setItems(prev => prev.filter(i=>i.id!==id));
  const applyCoupon = () => {
    if (coupon === 'VAPE10') { setCouponApplied(true); setToast('クーポン適用: 10%オフ'); }
    else setToast('無効なクーポンコードです');
  };
  const lookupZip = () => {
    setZipLoading(true);
    setTimeout(()=>{
      setAddress({zip:address.zip, prefecture:'東京都', city:'渋谷区神宮前', street:''});
      setZipLoading(false);
      setToast('住所を自動入力しました');
    }, 800);
  };

  const inp = { width:'100%', background:C.bg, border:`1px solid ${C.border}`, borderRadius:8, color:C.text, padding:'10px 14px', fontSize:14, outline:'none' };

  return (
    <div style={{ padding:24 }}>
      {toast && <Toast msg={toast} onClose={()=>setToast('')} />}

      <h2 style={{ fontSize:22, fontWeight:700, marginBottom:20 }}>
        {step==='cart' ? 'ショッピングカート' : step==='address' ? '配送先の入力' : '注文確認'}
      </h2>

      {/* 스텝 인디케이터 */}
      <div style={{ display:'flex', gap:0, marginBottom:24, background:C.card, borderRadius:8, overflow:'hidden', border:`1px solid ${C.border}` }}>
        {['cart','address','confirm'].map((s,i)=>(
          <div key={s} style={{ flex:1, padding:'10px', textAlign:'center', fontSize:13, fontWeight:600, background: step===s?C.accent:'transparent', color: step===s?'#fff':C.textSub, transition:'all 0.2s' }}>
            {i+1}. {s==='cart'?'カート':s==='address'?'配送先':'確認'}
          </div>
        ))}
      </div>

      {step === 'cart' && (
        <div style={{ display:'grid', gridTemplateColumns:'1fr 340px', gap:20 }}>
          <div>
            {items.map(item=>(
              <div key={item.id} style={{ background:C.card, border:`1px solid ${C.border}`, borderRadius:10, padding:16, marginBottom:12, display:'flex', gap:14, alignItems:'center' }}>
                <div style={{ fontSize:40 }}>{item.img}</div>
                <div style={{ flex:1 }}>
                  <p style={{ fontSize:11, color:C.textSub }}>{item.brand}</p>
                  <p style={{ fontSize:15, fontWeight:700, marginBottom:2 }}>{item.name}</p>
                  <p style={{ fontSize:12, color:C.textSub }}>{item.selFlavor} / {item.selNic}</p>
                </div>
                <div style={{ display:'flex', alignItems:'center', gap:0, border:`1px solid ${C.border}`, borderRadius:6, overflow:'hidden' }}>
                  <button onClick={()=>updateQty(item.id,-1)} style={{ width:30, height:30, background:C.bg, border:'none', color:C.text, cursor:'pointer', fontSize:16 }}>−</button>
                  <span style={{ width:36, textAlign:'center', fontSize:14, fontWeight:600 }}>{item.qty}</span>
                  <button onClick={()=>updateQty(item.id,1)} style={{ width:30, height:30, background:C.bg, border:'none', color:C.text, cursor:'pointer', fontSize:16 }}>+</button>
                </div>
                <div style={{ textAlign:'right', minWidth:80 }}>
                  <p style={{ fontSize:17, fontWeight:800, color:C.accent }}>¥{(item.price*item.qty).toLocaleString()}</p>
                  <button onClick={()=>removeItem(item.id)} style={{ background:'none', border:'none', color:C.textMuted, fontSize:12, cursor:'pointer', marginTop:4 }}>削除</button>
                </div>
              </div>
            ))}
            {/* 쿠폰 */}
            <div style={{ background:C.card, border:`1px solid ${C.border}`, borderRadius:10, padding:16, display:'flex', gap:10 }}>
              <input style={{...inp, flex:1}} placeholder="クーポンコード (例: VAPE10)" value={coupon} onChange={e=>setCoupon(e.target.value)} />
              <button onClick={applyCoupon} style={{ padding:'10px 16px', background:couponApplied?C.success:C.blue, border:'none', borderRadius:8, color:'#fff', fontWeight:600, fontSize:14, cursor:'pointer', whiteSpace:'nowrap' }}>
                {couponApplied ? '✓ 適用済' : '適用'}
              </button>
            </div>
          </div>

          {/* 주문 요약 */}
          <div style={{ background:C.card, border:`1px solid ${C.border}`, borderRadius:10, padding:20, height:'fit-content' }}>
            <h3 style={{ fontSize:16, fontWeight:700, marginBottom:16 }}>注文サマリー</h3>
            <div style={{ display:'flex', flexDirection:'column', gap:10, marginBottom:16, fontSize:14 }}>
              <div style={{ display:'flex', justifyContent:'space-between', color:C.textSub }}><span>小計</span><span>¥{subtotal.toLocaleString()}</span></div>
              <div style={{ display:'flex', justifyContent:'space-between', color:C.textSub }}><span>送料</span><span>¥{shipping.toLocaleString()}</span></div>
              {couponApplied && <div style={{ display:'flex', justifyContent:'space-between', color:C.success }}><span>クーポン割引</span><span>-¥{discount.toLocaleString()}</span></div>}
              <div style={{ borderTop:`1px solid ${C.border}`, paddingTop:10, display:'flex', justifyContent:'space-between', fontWeight:800, fontSize:16 }}>
                <span>合計</span><span style={{ color:C.accent }}>¥{total.toLocaleString()}</span>
              </div>
            </div>
            <button onClick={()=>setStep('address')} style={{ width:'100%', padding:14, background:C.accent, border:'none', borderRadius:8, color:'#fff', fontWeight:700, fontSize:16, cursor:'pointer' }}>
              配送先を入力する →
            </button>
            <div style={{ marginTop:12, display:'flex', gap:10, justifyContent:'center' }}>
              <span style={{ fontSize:24 }}>💳</span><span style={{ fontSize:24 }}>🅿️</span><span style={{ fontSize:13, color:C.textMuted, alignSelf:'center' }}>SSL暗号化</span>
            </div>
          </div>
        </div>
      )}

      {step === 'address' && (
        <div style={{ display:'grid', gridTemplateColumns:'1fr 340px', gap:20 }}>
          <div style={{ background:C.card, border:`1px solid ${C.border}`, borderRadius:10, padding:20 }}>
            <h3 style={{ fontSize:16, fontWeight:700, marginBottom:16 }}>配送先住所</h3>
            <div style={{ display:'grid', gridTemplateColumns:'1fr auto', gap:10, marginBottom:14 }}>
              <input style={inp} placeholder="郵便番号 (例: 150-0001)" value={address.zip} onChange={e=>setAddress({...address,zip:e.target.value})} />
              <button onClick={lookupZip} style={{ padding:'10px 14px', background:C.blue, border:'none', borderRadius:8, color:'#fff', fontSize:13, cursor:'pointer', whiteSpace:'nowrap' }}>
                {zipLoading ? '検索中...' : '住所検索'}
              </button>
            </div>
            <p style={{ fontSize:11, color:C.textSub, marginBottom:14 }}>⚙ 구현 포인트: 일본 우편번호 API (jp-zipcode) 연동으로 주소 자동완성</p>
            <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:10, marginBottom:10 }}>
              <input style={inp} placeholder="都道府県" value={address.prefecture} onChange={e=>setAddress({...address,prefecture:e.target.value})} />
              <input style={inp} placeholder="市区町村" value={address.city} onChange={e=>setAddress({...address,city:e.target.value})} />
            </div>
            <input style={{...inp, marginBottom:16}} placeholder="番地・マンション名" value={address.street} onChange={e=>setAddress({...address,street:e.target.value})} />

            <h3 style={{ fontSize:16, fontWeight:700, marginBottom:12 }}>お支払い方法</h3>
            {['paypal','card'].map(m=>(
              <label key={m} style={{ display:'flex', gap:12, alignItems:'center', padding:'14px 16px', background: payMethod===m?C.accentSoft:C.bg, border:`1.5px solid ${payMethod===m?C.accent:C.border}`, borderRadius:8, cursor:'pointer', marginBottom:8, transition:'all 0.15s' }}>
                <input type="radio" name="pay" value={m} checked={payMethod===m} onChange={()=>setPayMethod(m)} style={{ accentColor:C.accent }} />
                <span style={{ fontSize:20 }}>{m==='paypal'?'🅿️':'💳'}</span>
                <span style={{ fontSize:14, fontWeight:600 }}>{m==='paypal'?'PayPal':'クレジットカード'}</span>
              </label>
            ))}
          </div>
          <div style={{ background:C.card, border:`1px solid ${C.border}`, borderRadius:10, padding:20, height:'fit-content' }}>
            <h3 style={{ fontSize:15, fontWeight:700, marginBottom:12 }}>注文サマリー</h3>
            <div style={{ fontSize:14, color:C.textSub, marginBottom:16 }}>
              <div style={{ display:'flex', justifyContent:'space-between', marginBottom:6 }}><span>合計</span><span style={{ color:C.accent, fontWeight:800 }}>¥{total.toLocaleString()}</span></div>
            </div>
            <button onClick={()=>setStep('confirm')} style={{ width:'100%', padding:14, background:C.accent, border:'none', borderRadius:8, color:'#fff', fontWeight:700, fontSize:15, cursor:'pointer' }}>
              注文確認へ →
            </button>
            <button onClick={()=>setStep('cart')} style={{ width:'100%', padding:10, marginTop:8, background:'transparent', border:`1px solid ${C.border}`, borderRadius:8, color:C.textSub, fontSize:14, cursor:'pointer' }}>
              ← カートへ戻る
            </button>
          </div>
        </div>
      )}

      {step === 'confirm' && (
        <div style={{ maxWidth:560, margin:'0 auto', textAlign:'center' }}>
          <div style={{ background:C.card, border:`1px solid ${C.border}`, borderRadius:16, padding:32 }}>
            <div style={{ fontSize:60, marginBottom:16 }}>✅</div>
            <h3 style={{ fontSize:22, fontWeight:800, color:C.success, marginBottom:8 }}>ご注文ありがとうございます！</h3>
            <p style={{ color:C.textSub, fontSize:14, marginBottom:20 }}>注文番号: <strong style={{ color:C.accent }}>ORD-2024-004</strong></p>
            <div style={{ background:C.bg, borderRadius:8, padding:16, fontSize:13, color:C.textSub, marginBottom:20, textAlign:'left' }}>
              <div style={{ marginBottom:6 }}>📦 配送予定: 3〜7営業日</div>
              <div style={{ marginBottom:6 }}>💳 支払い: {payMethod==='paypal'?'PayPal':'クレジットカード'}</div>
              <div>📧 確認メールを送信しました</div>
            </div>
            <button onClick={()=>setStep('cart')} style={{ padding:'12px 28px', background:C.accent, border:'none', borderRadius:8, color:'#fff', fontWeight:700, cursor:'pointer' }}>
              ショッピングを続ける
            </button>
          </div>
        </div>
      )}
    </div>
  );
}

    </div>
  );
}

  { id:'상품 상세', label:'상품 상세', icon:'📦' },

  { id:'법적 고지', label:'법적 고지', icon:'📋' },
];

  const handleSelectProduct = (p) => {
    setSelectedProduct(p);
    setPage('상품 상세');
  };

  const renderPage = () => {
    switch(page) {
      case '성인 인증': return <AgeGateScreen />;
      case '상품 목록': return <ProductListScreen onSelectProduct={handleSelectProduct} />;
      case '상품 상세': return <ProductDetailScreen product={selectedProduct} />;
      case '장바구니': return <CartScreen />;
      case '마이페이지': return <MypageScreen />;
      case '법적 고지': return <LegalScreen />;
      default: return <AgeGateScreen />;
    }
  };

  return (
    <div style={{ display:'flex', minHeight:'100vh', background:C.bg }}>
      {/* 사이드바 */}
      <aside style={{ width:240, background:C.sidebar, borderRight:`1px solid ${C.sidebarBorder}`, display:'flex', flexDirection:'column', flexShrink:0, position:'sticky', top:0, height:'100vh', overflowY:'auto' }}>

            <span style={{ fontSize:26 }}>💨</span>

              <p style={{ fontSize:20, fontWeight:800, color:C.accent, letterSpacing:1 }}>VAPE.JP</p>
              <p style={{ fontSize:10, color:C.textMuted }}>맞춤 구현 데모</p>
            </div>
          </div>
        </div>

        {/* 뱃지 */}
        <div style={{ padding:'12px 16px', borderBottom:`1px solid ${C.sidebarBorder}` }}>
          <div style={{ background:C.accentSoft, border:`1px solid rgba(233,69,96,0.3)`, borderRadius:6, padding:'8px 12px', fontSize:11, color:C.accent }}>
            🔞 成人認証済み環境<br/>
            <span style={{ color:C.textMuted, fontSize:10 }}>Shopify Liquid + Session</span>
          </div>
        </div>

        {/* 네비 */}
        <nav style={{ flex:1, padding:'12px 10px' }}>
          <p style={{ fontSize:10, color:C.textMuted, fontWeight:600, padding:'4px 10px', marginBottom:4, letterSpacing:1 }}>메뉴</p>
          {NAV_ITEMS.map(item => (
            <button key={item.id} title={item.id} onClick={() => setPage(item.id)}
              style={{ display:'flex', alignItems:'center', gap:10, width:'100%', padding:'10px 12px', borderRadius:8, border:'none', background: page===item.id ? C.accentSoft : 'transparent', color: page===item.id ? C.accent : C.textSub, fontSize:13, fontWeight: page===item.id ? 700 : 400, cursor:'pointer', textAlign:'left', marginBottom:2, transition:'all 0.15s' }}
              onMouseEnter={e=>{ if(page!==item.id) e.currentTarget.style.background=C.surfaceHover; }}
              onMouseLeave={e=>{ if(page!==item.id) e.currentTarget.style.background='transparent'; }}>
              <span style={{ fontSize:16 }}>{item.icon}</span>
              <span>{item.label}</span>
              {page===item.id && <span style={{ marginLeft:'auto', fontSize:10 }}>●</span>}
            </button>
          ))}
        </nav>

        {/* 하단 유저 정보 */}
        <div style={{ padding:'12px 16px', borderTop:`1px solid ${C.sidebarBorder}` }}>

      </aside>

      <div style={{ flex:1, display:'flex', flexDirection:'column', minWidth:0 }}>
        {/* 탑바 */}

            <h1 style={{ fontSize:16, fontWeight:700 }}>{NAV_ITEMS.find(n=>n.id===page)?.label}</h1>

            <span style={{ fontSize:20, cursor:'pointer' }}>🛒</span>

        {/* 페이지 콘텐츠 */}
        <main style={{ flex:1, overflow:'auto' }}>
          {renderPage()}

          <span style={{ color:C.textMuted, fontSize:10 }}>© 2024 VAPE.JP — 맞춤 구현 데모</span>
        </footer>
      </div>
    </div>
  );
}
