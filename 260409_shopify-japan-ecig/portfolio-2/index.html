// ─── SVG 레이더 차트 ──────────────────────────────────────────
function RadarChart({ data, size=160 }) {
  const labels = Object.keys(data);
  const values = Object.values(data);
  const max = 5;
  const cx = size/2, cy = size/2, r = size*0.38;
  const angleStep = (Math.PI*2) / labels.length;
  const getXY = (i, val) => ({
    x: cx + r * (val/max) * Math.cos(i*angleStep - Math.PI/2),
    y: cy + r * (val/max) * Math.sin(i*angleStep - Math.PI/2),
  });
  const labelXY = (i) => ({
    x: cx + (r+20) * Math.cos(i*angleStep - Math.PI/2),
    y: cy + (r+20) * Math.sin(i*angleStep - Math.PI/2),
  });
  const polyPoints = values.map((v,i)=>{ const p=getXY(i,v); return `${p.x},${p.y}`; }).join(' ');
  const gridPoints = (ratio) => labels.map((_,i)=>{
    const p=getXY(i,max*ratio); return `${p.x},${p.y}`;
  }).join(' ');
  return (
    <svg width={size} height={size} style={{ overflow:'visible' }}>
      {[0.2,0.4,0.6,0.8,1].map(r=>(
        <polygon key={r} points={gridPoints(r)} fill="none" stroke={C.border} strokeWidth="0.8" />
      ))}
      {labels.map((_,i)=>{ const p=getXY(i,max); return <line key={i} x1={cx} y1={cy} x2={p.x} y2={p.y} stroke={C.border} strokeWidth="0.8" />; })}
      <polygon points={polyPoints} fill={`${C.accent}33`} stroke={C.accent} strokeWidth="2" />
      {values.map((v,i)=>{ const p=getXY(i,v); return <circle key={i} cx={p.x} cy={p.y} r="4" fill={C.accent} />; })}
      {labels.map((l,i)=>{ const p=labelXY(i); return (
        <text key={i} x={p.x} y={p.y} textAnchor="middle" dominantBaseline="middle" fontSize="10" fill={C.textSub}>{l}</text>
      ); })}
    </svg>
  );
}

function Badge({ children, color='accent' }) {
  const map = {
    accent:{ bg:C.accentSoft, text:C.accent },
    success:{ bg:'rgba(108,166,122,0.15)', text:C.success },
    warning:{ bg:'rgba(224,140,58,0.15)', text:C.warning },
    muted:{ bg:'rgba(110,88,64,0.2)', text:C.textSub },
  };
  const c = map[color] || map.accent;
  return <span style={{ display:'inline-block', padding:'2px 9px', borderRadius:20, fontSize:11, fontWeight:600, background:c.bg, color:c.text }}>{children}</span>;
}

function CheckoutScreen() {
  const [shipMethod, setShipMethod] = useState('dhl-express');

  const SHIP_OPTIONS = [
    { id:'dhl-express', label:'DHL Express', days:'3〜5営業日', price:2200, icon:'✈️' },
    { id:'ems', label:'EMS 国際速達郵便', days:'5〜7営業日', price:1400, icon:'📮' },
    { id:'sal', label:'SAL便 (普通)', days:'14〜21営業日', price:800, icon:'🚢' },

  const subtotal = PRODUCTS[0].price * 2;
  const total = subtotal + selected.price;

  const arrivalDate = () => {
    const d = new Date();
    const bdays = selected.days.startsWith('3') ? 4 : selected.days.startsWith('5') ? 6 : 17;

              <div style={{ display:'flex', justifyContent:'space-between', color:C.textSub }}><span>小計</span><span>¥{subtotal.toLocaleString()}</span></div>
              <div style={{ display:'flex', justifyContent:'space-between', color:C.textSub }}><span>送料 ({selected.label})</span><span>¥{selected.price.toLocaleString()}</span></div>
              <div style={{ display:'flex', justifyContent:'space-between', fontSize:11, color:C.textMuted }}><span>到着予定</span><span>{arrivalDate()}</span></div>

// ─── 배송 추적 ────────────────────────────────────────────────
function TrackingScreen() {
  const [trackNo, setTrackNo] = useState('');
  const [carrier, setCarrier] = useState('dhl');
  const [result, setResult] = useState(null);
  const [loading, setLoading] = useState(false);

  const search = () => {
    setLoading(true);
    setTimeout(()=>{ setResult(ORDERS[0]); setLoading(false); }, 900);
  };

  const o = ORDERS[0];
  const activeStep = o?.stages.filter(s=>s.done).length - 1;

  return (
    <div style={{ padding:'20px 24px', maxWidth:700 }}>
      <div style={{ background:C.card, border:`1px solid ${C.border}`, borderRadius:10, padding:20, marginBottom:20 }}>
        <h3 style={{ fontSize:16, fontWeight:700, marginBottom:14 }}>配送状況を確認</h3>
        <div style={{ display:'flex', gap:10 }}>
          <select value={carrier} onChange={e=>setCarrier(e.target.value)} style={{ background:C.surface, border:`1px solid ${C.border}`, borderRadius:8, color:C.text, padding:'10px 14px', fontSize:14, outline:'none' }}>
            <option value="dhl">DHL</option>
            <option value="ems">EMS</option>
            <option value="sal">SAL便</option>
          </select>
          <input style={{ flex:1, background:C.surface, border:`1px solid ${C.border}`, borderRadius:8, color:C.text, padding:'10px 14px', fontSize:14, outline:'none' }}
            placeholder="追跡番号を入力 (例: DH442918730JP)"
            value={trackNo} onChange={e=>setTrackNo(e.target.value)} />
          <button onClick={search} style={{ padding:'10px 20px', background:C.accent, border:'none', borderRadius:8, color:C.nav, fontWeight:700, fontSize:14, cursor:'pointer', whiteSpace:'nowrap' }}>
            {loading ? '検索中...' : '追跡する'}
          </button>
        </div>
        <p style={{ fontSize:11, color:C.textMuted, marginTop:8 }}>
          ⚙ 구현 포인트: DHL Tracking API / 日本郵便追跡API 연동으로 실시간 배송 상태 조회
        </p>
      </div>

      {result && (
        <div>
          <div style={{ background:C.card, border:`1px solid ${C.border}`, borderRadius:10, padding:20, marginBottom:16 }}>
            <div style={{ display:'flex', justifyContent:'space-between', alignItems:'start', marginBottom:16 }}>
              <div>
                <p style={{ fontSize:13, color:C.textSub }}>追跡番号</p>
                <p style={{ fontSize:18, fontWeight:800, color:C.accent, fontFamily:'monospace' }}>{o.tracking}</p>
              </div>
              <Badge color={o.status===3?'success':o.status===4?'accent':'warning'}>
                {o.stages[o.status]?.label || '配達完了'}
              </Badge>
            </div>
            <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr 1fr', gap:10, marginBottom:16 }}>
              {[
                {label:'配送業者', val:o.carrier},
                {label:'注文番号', val:o.id},
                {label:'配達予定', val:'4月15日'},
              ].map(f=>(
                <div key={f.label} style={{ background:C.surface, borderRadius:8, padding:'10px 14px' }}>
                  <p style={{ fontSize:11, color:C.textMuted }}>{f.label}</p>
                  <p style={{ fontSize:14, fontWeight:700, marginTop:2 }}>{f.val}</p>
                </div>
              ))}
            </div>

            {/* 타임라인 */}
            <div style={{ position:'relative' }}>
              {o.stages.map((stage, i) => (
                <div key={i} style={{ display:'flex', gap:16, paddingBottom:16, position:'relative' }}>
                  {i < o.stages.length-1 && (
                    <div style={{ position:'absolute', left:11, top:24, width:2, height:'calc(100% - 8px)', background: stage.done ? C.accent : C.border }} />
                  )}
                  <div style={{ width:24, height:24, borderRadius:'50%', background: stage.done ? C.accent : C.border, display:'flex', alignItems:'center', justifyContent:'center', fontSize:11, color: stage.done?C.nav:'transparent', fontWeight:700, flexShrink:0, zIndex:1 }}>
                    {stage.done ? '✓' : i===activeStep+1 ? '⏳' : ''}
                  </div>
                  <div style={{ flex:1 }}>
                    <p style={{ fontSize:14, fontWeight:stage.done?700:400, color:stage.done?C.text:C.textMuted }}>{stage.label}</p>
                    <p style={{ fontSize:12, color:C.textMuted }}>{stage.time} · {stage.loc}</p>
                  </div>
                </div>
              ))}
            </div>
          </div>

          <div style={{ background:C.accentSoft, border:`1px solid ${C.accent}44`, borderRadius:8, padding:14, fontSize:13, color:C.accent }}>
            📧 現在のステータスが「入国審査」になり次第、メールでお知らせします。
          </div>
        </div>
      )}
    </div>
  );
}

  const renderPage = () => {

  return (
    <div style={{ minHeight:'100vh', background:C.bg }}>
      {/* 상단 수평 네비 */}
      <header style={{ position:'sticky', top:0, zIndex:200, background:C.nav, borderBottom:`1px solid ${C.navBorder}`, display:'flex', alignItems:'center', height:58, padding:'0 24px', gap:4 }}>
        {/* 로고 */}
        <div style={{ display:'flex', alignItems:'center', gap:8, marginRight:24 }}>
          <span style={{ fontSize:22 }}>🌸</span>
          <div>
            <p style={{ fontSize:16, fontWeight:800, color:C.accent, letterSpacing:1, fontFamily:"'Noto Serif JP', serif" }}>SAKURA CELLAR</p>
            <p style={{ fontSize:9, color:C.textMuted, letterSpacing:1 }}>구현 데모</p>
          </div>
        </div>

        {/* 탭 */}
        <div style={{ display:'flex', gap:2, flex:1 }}>
          {TABS.map(t => (
            <button key={t.id} title={t.id} onClick={() => setPage(t.id)}
              style={{ display:'flex', alignItems:'center', gap:6, padding:'8px 14px', borderRadius:8, border:'none', background: page===t.id ? C.accentSoft : 'transparent', color: page===t.id ? C.accent : C.textSub, fontSize:13, fontWeight: page===t.id ? 700 : 400, cursor:'pointer', transition:'all 0.15s' }}
              onMouseEnter={e=>{ if(page!==t.id) e.currentTarget.style.background='rgba(255,255,255,0.05)'; }}
              onMouseLeave={e=>{ if(page!==t.id) e.currentTarget.style.background='transparent'; }}>
              <span style={{ fontSize:14 }}>{t.icon}</span>
              <span>{t.label}</span>
            </button>
          ))}
        </div>

        {/* 우측 액션 */}
        <div style={{ display:'flex', alignItems:'center', gap:14 }}>
          <input placeholder="銘柄を検索..." style={{ background:C.card, border:`1px solid ${C.navBorder}`, borderRadius:20, padding:'7px 14px', color:C.text, fontSize:12, outline:'none', width:160 }} />
          <div style={{ position:'relative', cursor:'pointer' }}>
            <span style={{ fontSize:20 }}>🛒</span>
            {cartCount > 0 && <span style={{ position:'absolute', top:-5, right:-5, width:16, height:16, borderRadius:'50%', background:C.accent, fontSize:9, color:C.nav, display:'flex', alignItems:'center', justifyContent:'center', fontWeight:800 }}>{cartCount}</span>}
          </div>
          <span style={{ fontSize:20, cursor:'pointer' }}>👤</span>
        </div>
      </header>

      {/* 히어로 배너 */}
      <HeroBanner page={page} />

      {/* 페이지 콘텐츠 */}
      <main style={{ minHeight:'calc(100vh - 120px)' }}>
        {renderPage()}
      </main>

      {/* 드로워 */}
      <Drawer item={drawer} onClose={()=>setDrawer(null)} />

      {/* 푸터 */}
      <footer style={{ background:C.nav, borderTop:`1px solid ${C.navBorder}`, padding:'12px 24px', display:'flex', justifyContent:'space-between', fontSize:11, color:C.textMuted }}>
        <span>⚠️ 本サービスは20歳以上の方のみご利用いただけます。お酒は適量を。</span>
        <span>© 2024 SAKURA CELLAR — 구현 데모</span>
      </footer>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
