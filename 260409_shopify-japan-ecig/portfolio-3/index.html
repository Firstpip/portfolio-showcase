// ─── SVG 차트 ─────────────────────────────────────────────────
function LineChart({ data, width=560, height=180 }) {
  if (!data || data.length === 0) return null;
  const pad = { t:12, r:16, b:32, l:60 };
  const W = width - pad.l - pad.r, H = height - pad.t - pad.b;
  const minV = 0;
  const maxV = Math.max(...data.map(d=>d.sales));
  const scaleY = v => H - ((v - minV) / (maxV - minV)) * H;
  const scaleX = i => (i / (data.length - 1)) * W;

  const points = data.map((d,i)=>`${scaleX(i)},${scaleY(d.sales)}`).join(' ');
  const areaPoints = `${scaleX(0)},${H} ${points} ${scaleX(data.length-1)},${H}`;

  const yLabels = [0, maxV*0.25, maxV*0.5, maxV*0.75, maxV].map(v => ({
    val: (v/10000).toFixed(0) + '万',
    y: scaleY(v)
  }));

  return (
    <svg width="100%" viewBox={`0 0 ${width} ${height}`} style={{ overflow:'visible' }}>
      <defs>
        <linearGradient id="lineGrad" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stopColor={C.accent} stopOpacity="0.2" />
          <stop offset="100%" stopColor={C.accent} stopOpacity="0" />
        </linearGradient>
      </defs>
      <g transform={`translate(${pad.l},${pad.t})`}>
        {yLabels.map(yl=>(
          <g key={yl.val}>
            <line x1={0} y1={yl.y} x2={W} y2={yl.y} stroke={C.border} strokeWidth="1" strokeDasharray="4,4" />
            <text x={-8} y={yl.y+4} textAnchor="end" fontSize="10" fill={C.textMuted}>{yl.val}</text>
          </g>
        ))}
        <polygon points={areaPoints} fill="url(#lineGrad)" />
        <polyline points={points} fill="none" stroke={C.accent} strokeWidth="2.5" strokeLinejoin="round" />
        {data.filter((_,i)=>i%6===0).map((d,i,arr)=>{
          const origI = i * 6;
          return (
            <g key={origI}>
              <circle cx={scaleX(origI)} cy={scaleY(d.sales)} r="4" fill={C.accent} stroke="#fff" strokeWidth="2" />
              <text x={scaleX(origI)} y={H+18} textAnchor="middle" fontSize="9" fill={C.textMuted}>{d.day}日</text>
            </g>
          );
        })}
      </g>
    </svg>
  );
}

function DonutChart({ data, size=160 }) {
  const cx = size/2, cy = size/2, r = size*0.38, ir = size*0.24;
  let cumAngle = -Math.PI/2;
  const total = data.reduce((s,d)=>s+d.value,0);
  const segments = data.map(d=>{
    const angle = (d.value/total)*Math.PI*2;
    const start = cumAngle;
    cumAngle += angle;
    const x1 = cx + r*Math.cos(start), y1 = cy + r*Math.sin(start);
    const x2 = cx + r*Math.cos(cumAngle), y2 = cy + r*Math.sin(cumAngle);
    const ix1 = cx + ir*Math.cos(start), iy1 = cy + ir*Math.sin(start);
    const ix2 = cx + ir*Math.cos(cumAngle), iy2 = cy + ir*Math.sin(cumAngle);
    const lg = angle > Math.PI ? 1 : 0;
    return { ...d, path:`M${x1},${y1} A${r},${r} 0 ${lg},1 ${x2},${y2} L${ix2},${iy2} A${ir},${ir} 0 ${lg},0 ${ix1},${iy1} Z` };
  });
  return (
    <svg width={size} height={size}>
      {segments.map((s,i)=>(
        <path key={i} d={s.path} fill={s.color} stroke="#fff" strokeWidth="2" />
      ))}
      <text x={cx} y={cy-6} textAnchor="middle" fontSize="11" fontWeight="700" fill={C.text}>총 매출</text>
      <text x={cx} y={cy+10} textAnchor="middle" fontSize="13" fontWeight="800" fill={C.accent}>비중</text>
    </svg>
  );
}

// ─── 공통 컴포넌트 ────────────────────────────────────────────
function Badge({ children, color='accent' }) {
  const map = {
    accent:{ bg:C.accentSoft, text:C.accent },
    success:{ bg:C.successSoft, text:C.success },
    warning:{ bg:C.warningSoft, text:C.warning },
    danger:{ bg:C.dangerSoft, text:C.danger },
    purple:{ bg:C.purpleSoft, text:C.purple },
    muted:{ bg:'#F3F4F6', text:C.textSub },
  };
  const c = map[color] || map.accent;
  return <span style={{ display:'inline-block', padding:'2px 8px', borderRadius:20, fontSize:11, fontWeight:600, background:c.bg, color:c.text }}>{children}</span>;
}

function KPICard({ icon, label, value, sub, color='accent' }) {
  const colors = { accent:C.accent, success:C.success, warning:C.warning, purple:C.purple };
  const softs = { accent:C.accentSoft, success:C.successSoft, warning:C.warningSoft, purple:C.purpleSoft };
  return (
    <div style={{ background:C.surface, border:`1px solid ${C.border}`, borderRadius:10, padding:20, boxShadow:'0 1px 4px rgba(0,0,0,0.06)' }}>
      <div style={{ display:'flex', justifyContent:'space-between', alignItems:'flex-start', marginBottom:12 }}>
        <p style={{ fontSize:13, color:C.textSub, fontWeight:500 }}>{label}</p>
        <div style={{ width:36, height:36, borderRadius:8, background:softs[color], display:'flex', alignItems:'center', justifyContent:'center', fontSize:18 }}>{icon}</div>
      </div>
      <p style={{ fontSize:26, fontWeight:800, color:C.text, marginBottom:4 }}>{value}</p>
      <p style={{ fontSize:12, color:C.textMuted }}>{sub}</p>
    </div>
  );
}

        </div>
        {children}
      </div>
    </div>
  );
}

function Toast({ msg, onClose }) {
  useEffect(()=>{ const t=setTimeout(onClose,2500); return ()=>clearTimeout(t); },[]);
  return <div style={{ position:'fixed', bottom:24, right:24, zIndex:9999, background:C.success, color:'#fff', padding:'12px 20px', borderRadius:8, fontWeight:600, fontSize:14, boxShadow:'0 4px 16px rgba(16,185,129,0.4)' }}>✓ {msg}</div>;
}

          <button onClick={()=>setPreviewModal(true)} style={{ padding:'9px 18px', background:C.bg, border:`1px solid ${C.border}`, borderRadius:8, color:C.text, fontSize:14, cursor:'pointer' }}>
            미리보기
          </button>
          <button onClick={()=>setToast('상품이 등록되었습니다!')} style={{ padding:'9px 18px', background:C.accent, border:'none', borderRadius:8, color:'#fff', fontWeight:700, fontSize:14, cursor:'pointer' }}>
            등록하기
          </button>
        </div>
      </div>

      <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:20 }}>
        {/* 왼쪽 */}
        <div style={{ display:'flex', flexDirection:'column', gap:16 }}>
          {/* 이미지 업로드 */}
          <div style={{ background:C.surface, border:`1px solid ${C.border}`, borderRadius:10, padding:20 }}>
            <label style={{ fontSize:13, fontWeight:700, display:'block', marginBottom:12 }}>상품 이미지</label>
            <div
              style={{ border:`2px dashed ${dragOver?C.accent:C.border}`, borderRadius:10, padding:28, textAlign:'center', background:dragOver?C.accentSoft:C.bg, transition:'all 0.2s', cursor:'pointer' }}
              onDragOver={e=>{e.preventDefault();setDragOver(true);}}
              onDragLeave={()=>setDragOver(false)}
              onDrop={handleDrop}>
              <div style={{ fontSize:32, marginBottom:8 }}>🖼️</div>
              <p style={{ fontSize:13, color:C.textSub, marginBottom:4 }}>이미지를 드래그하거나 클릭하여 업로드</p>
              <p style={{ fontSize:11, color:C.textMuted, marginBottom:12 }}>PNG, JPG, WEBP (최대 5MB)</p>
              <label style={{ padding:'7px 16px', background:C.accent, border:'none', borderRadius:6, color:'#fff', fontSize:13, cursor:'pointer', fontWeight:600 }}>
                파일 선택
                <input type="file" accept="image/*" multiple onChange={handleFileInput} style={{ display:'none' }} />
              </label>
            </div>
            {images.length > 0 && (
              <div style={{ display:'flex', gap:8, marginTop:12, flexWrap:'wrap' }}>
                {images.map((img,i)=>(
                  <div key={i} style={{ position:'relative' }}>
                    <img src={img} style={{ width:70, height:70, objectFit:'cover', borderRadius:8, border:`1px solid ${C.border}` }} alt="" />
                    <button onClick={()=>setImages(prev=>prev.filter((_,j)=>j!==i))} style={{ position:'absolute', top:-6, right:-6, width:20, height:20, borderRadius:'50%', background:C.danger, border:'none', color:'#fff', fontSize:12, cursor:'pointer', display:'flex', alignItems:'center', justifyContent:'center' }}>×</button>
                  </div>
                ))}
              </div>
            )}
            <p style={{ fontSize:11, color:C.textMuted, marginTop:8 }}>⚙ File API 드래그앤드롭 구현 (모바일 폴백: 파일 선택 버튼)</p>
          </div>

          {/* 기본 정보 */}
          <div style={{ background:C.surface, border:`1px solid ${C.border}`, borderRadius:10, padding:20 }}>
            <label style={{ fontSize:13, fontWeight:700, display:'block', marginBottom:12 }}>기본 정보</label>
            <div style={{ display:'flex', flexDirection:'column', gap:12 }}>
              <div>
                <label style={{ fontSize:12, color:C.textSub, display:'block', marginBottom:5 }}>상품명 (日本語) *</label>
                <input style={inp} placeholder="例: 獺祭 純米大吟醸 磨き三割九分" value={formData.name} onChange={e=>setFormData({...formData,name:e.target.value})} />
              </div>
              <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:10 }}>
                <div>
                  <label style={{ fontSize:12, color:C.textSub, display:'block', marginBottom:5 }}>판매가 (JPY) *</label>
                  <input style={inp} type="number" placeholder="5800" value={formData.price} onChange={e=>setFormData({...formData,price:e.target.value})} />
                </div>
                <div>
                  <label style={{ fontSize:12, color:C.textSub, display:'block', marginBottom:5 }}>재고 수량</label>
                  <input style={inp} type="number" placeholder="100" value={formData.stock} onChange={e=>setFormData({...formData,stock:e.target.value})} />
                </div>
              </div>
            </div>
          </div>
        </div>

        {/* 오른쪽 */}
        <div style={{ display:'flex', flexDirection:'column', gap:16 }}>
          {/* 카테고리 선택 */}
          <div style={{ background:C.surface, border:`1px solid ${C.border}`, borderRadius:10, padding:20 }}>
            <label style={{ fontSize:13, fontWeight:700, display:'block', marginBottom:12 }}>카테고리 선택</label>
            <div style={{ display:'flex', flexDirection:'column', gap:10 }}>
              <select style={{...inp, cursor:'pointer'}} value={category1} onChange={e=>{setCategory1(e.target.value);setCategory2('');}}>
                <option value="">대카테고리 선택</option>
                {Object.keys(CATEGORIES).map(c=><option key={c}>{c}</option>)}
              </select>
              {category1 && (
                <select style={{...inp, cursor:'pointer'}} value={category2} onChange={e=>setCategory2(e.target.value)}>
                  <option value="">소카테고리 선택</option>
                  {CATEGORIES[category1].map(c=><option key={c}>{c}</option>)}
                </select>
              )}
              {category1 && <p style={{ fontSize:11, color:C.textMuted }}>⚙ 2단계 카테고리 계층 트리 구조</p>}
            </div>
          </div>

          {/* 다국어 설명 */}
          <div style={{ background:C.surface, border:`1px solid ${C.border}`, borderRadius:10, padding:20, flex:1 }}>
            <label style={{ fontSize:13, fontWeight:700, display:'block', marginBottom:12 }}>상품 설명 (다국어)</label>
            <div style={{ display:'flex', gap:4, marginBottom:12 }}>
              {[{id:'ko',label:'한국어'},{id:'ja',label:'日本語'},{id:'en',label:'English'}].map(l=>(
                <button key={l.id} onClick={()=>setLangTab(l.id)} style={{ flex:1, padding:'7px', borderRadius:6, border:`1.5px solid ${langTab===l.id?C.accent:C.border}`, background:langTab===l.id?C.accentSoft:'transparent', color:langTab===l.id?C.accent:C.textSub, fontSize:12, fontWeight:600, cursor:'pointer' }}>
                  {l.label}
                </button>
              ))}
            </div>
            <p style={{ fontSize:11, color:C.textMuted, marginBottom:6 }}>⚙ 탭별 상태 객체 통합 관리로 탭 전환 시 데이터 유실 방지</p>
            <textarea
              value={descriptions[langTab]}
              onChange={e=>setDescriptions(prev=>({...prev,[langTab]:e.target.value}))}
              placeholder={langTab==='ko'?'상품 설명을 입력하세요...':langTab==='ja'?'商品説明を入力してください...':'Enter product description...'}
              style={{ width:'100%', height:140, background:C.bg, border:`1px solid ${C.border}`, borderRadius:8, color:C.text, padding:12, fontSize:14, resize:'vertical', outline:'none', fontFamily:'inherit' }} />
            <div style={{ display:'flex', gap:8, marginTop:8 }}>
              {Object.entries(descriptions).map(([lang,val])=>(
                <div key={lang} style={{ flex:1, background:C.bg, borderRadius:6, padding:'6px 10px', fontSize:11, textAlign:'center' }}>
                  <span style={{ color:C.textMuted }}>{lang==='ko'?'KO':lang==='ja'?'JA':'EN'}</span>
                  <span style={{ color: val.length>0?C.success:C.textMuted, marginLeft:4 }}>{val.length>0?'✓':'미입력'}</span>
                </div>
              ))}
            </div>
          </div>
        </div>
      </div>

      {previewModal && (
        <Modal title="상품 미리보기" onClose={()=>setPreviewModal(false)}>
          <div style={{ textAlign:'center' }}>
            <div style={{ fontSize:60, marginBottom:12 }}>🍶</div>
            <h3 style={{ fontSize:18, fontWeight:800, marginBottom:4 }}>{formData.name || '(상품명 미입력)'}</h3>
            <p style={{ color:C.textSub, fontSize:14, marginBottom:8 }}>{category1} {category2 && `> ${category2}`}</p>
            <p style={{ fontSize:24, fontWeight:800, color:C.accent }}>¥{Number(formData.price||0).toLocaleString()}</p>
            {descriptions.ko && <p style={{ marginTop:12, fontSize:13, color:C.textSub, lineHeight:1.7 }}>{descriptions.ko}</p>}
            {descriptions.ja && <p style={{ marginTop:8, fontSize:13, color:C.textSub, lineHeight:1.7 }}>{descriptions.ja}</p>}
          </div>
        </Modal>
      )}
    </div>
  );
}

// ─── 메인 앱 ─────────────────────────────────────────────────
const NAV_ITEMS = [
  { id:'대시보드', icon:'📊', label:'대시보드' },
  { id:'멤버십', icon:'🏆', label:'멤버십 관리' },
  { id:'주문 관리', icon:'📦', label:'주문 관리' },
  { id:'이메일 캠페인', icon:'📧', label:'이메일 캠페인' },
  { id:'상품 등록', icon:'➕', label:'상품 등록' },
];

function App() {
  const [page, setPage] = useState('대시보드');

  const renderPage = () => {
    switch(page) {
      case '대시보드': return <DashboardScreen />;
      case '멤버십': return <MembershipScreen />;
      case '주문 관리': return <OrdersScreen />;
      case '이메일 캠페인': return <EmailCampaignScreen />;
      case '상품 등록': return <ProductRegisterScreen />;
      default: return <DashboardScreen />;
    }
  };

  return (
    <div style={{ display:'flex', minHeight:'100vh', background:C.bg }}>
      {/* 밝은 사이드바 */}
      <aside style={{ width:240, background:C.sidebar, borderRight:`1px solid ${C.sidebarBorder}`, display:'flex', flexDirection:'column', flexShrink:0, position:'sticky', top:0, height:'100vh', overflowY:'auto', boxShadow:'2px 0 8px rgba(0,0,0,0.04)' }}>
        {/* 로고 */}
        <div style={{ padding:'20px 20px 16px', borderBottom:`1px solid ${C.sidebarBorder}` }}>
          <div style={{ display:'flex', alignItems:'center', gap:10 }}>
            <div style={{ width:36, height:36, borderRadius:10, background:`linear-gradient(135deg,${C.accent},${C.accentLight})`, display:'flex', alignItems:'center', justifyContent:'center', fontSize:18 }}>🌐</div>
            <div>
              <p style={{ fontSize:16, fontWeight:800, color:C.accent }}>CROSSMART</p>
              <p style={{ fontSize:9, color:C.textMuted }}>구현 데모</p>
            </div>
          </div>
        </div>

        {/* 플랫폼 배지 */}
        <div style={{ padding:'12px 16px', borderBottom:`1px solid ${C.sidebarBorder}` }}>
          <div style={{ background:C.accentSoft, borderRadius:8, padding:'8px 12px', fontSize:11, color:C.accent }}>
            🌏 크로스보더 플랫폼<br/>
            <span style={{ color:C.textMuted, fontSize:10 }}>멀티 카테고리 · 멀티 통화</span>
          </div>
        </div>

        {/* 네비 */}
        <nav style={{ flex:1, padding:'12px 10px' }}>
          <p style={{ fontSize:10, color:C.textMuted, fontWeight:600, padding:'4px 10px', marginBottom:4, letterSpacing:1 }}>메뉴</p>
          {NAV_ITEMS.map(item=>(
            <button key={item.id} title={item.id} onClick={()=>setPage(item.id)}
              style={{ display:'flex', alignItems:'center', gap:10, width:'100%', padding:'10px 12px', borderRadius:8, border:'none', background:page===item.id?C.accentSoft:'transparent', color:page===item.id?C.accent:C.textSub, fontSize:13, fontWeight:page===item.id?700:400, cursor:'pointer', textAlign:'left', marginBottom:2, transition:'all 0.15s' }}
              onMouseEnter={e=>{ if(page!==item.id) e.currentTarget.style.background=C.surfaceHover; }}
              onMouseLeave={e=>{ if(page!==item.id) e.currentTarget.style.background='transparent'; }}>
              <span style={{ fontSize:16 }}>{item.icon}</span>
              <span>{item.label}</span>
              {page===item.id && <div style={{ marginLeft:'auto', width:6, height:6, borderRadius:'50%', background:C.accent }} />}
            </button>
          ))}
        </nav>

        {/* 하단 */}
        <div style={{ padding:'12px 16px', borderTop:`1px solid ${C.sidebarBorder}` }}>
          <div style={{ display:'flex', alignItems:'center', gap:10 }}>
            <div style={{ width:32, height:32, borderRadius:'50%', background:`linear-gradient(135deg,${C.accent},${C.purple})`, display:'flex', alignItems:'center', justifyContent:'center', fontSize:13, color:'#fff', fontWeight:700 }}>관</div>
            <div>
              <p style={{ fontSize:12, fontWeight:600, color:C.text }}>플랫폼 관리자</p>
              <p style={{ fontSize:10, color:C.textMuted }}>admin@crossmart.jp</p>
            </div>
          </div>
        </div>
      </aside>

      {/* 메인 */}
      <div style={{ flex:1, display:'flex', flexDirection:'column', minWidth:0 }}>
        {/* 탑바 */}
        <header style={{ height:56, background:C.surface, borderBottom:`1px solid ${C.sidebarBorder}`, display:'flex', alignItems:'center', justifyContent:'space-between', padding:'0 24px', position:'sticky', top:0, zIndex:100, boxShadow:'0 1px 4px rgba(0,0,0,0.04)' }}>
          <div>
            <h1 style={{ fontSize:16, fontWeight:700, color:C.text }}>{NAV_ITEMS.find(n=>n.id===page)?.label}</h1>
          </div>
          <div style={{ display:'flex', alignItems:'center', gap:12 }}>
            <input placeholder="검색..." style={{ background:C.bg, border:`1px solid ${C.border}`, borderRadius:20, padding:'7px 14px', color:C.text, fontSize:13, outline:'none', width:180 }} />
            <div style={{ position:'relative' }}>
              <span style={{ fontSize:20, cursor:'pointer' }}>🔔</span>
              <span style={{ position:'absolute', top:-3, right:-3, width:16, height:16, borderRadius:'50%', background:C.danger, fontSize:9, color:'#fff', display:'flex', alignItems:'center', justifyContent:'center', fontWeight:700 }}>5</span>
            </div>
            <div style={{ width:32, height:32, borderRadius:'50%', background:`linear-gradient(135deg,${C.accent},${C.purple})`, display:'flex', alignItems:'center', justifyContent:'center', fontSize:13, color:'#fff', fontWeight:700, cursor:'pointer' }}>관</div>
          </div>
        </header>

        {/* 콘텐츠 */}
        <main style={{ flex:1, overflow:'auto' }}>
          {renderPage()}
        </main>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
