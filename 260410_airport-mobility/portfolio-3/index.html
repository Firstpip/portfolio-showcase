function Badge({ label, color }) {
  return <span style={{ display:'inline-flex', padding:'3px 10px', borderRadius:20, background:`${color}18`, color, fontSize:11, fontWeight:600 }}>{label}</span>;
}

function Modal({ title, onClose, children, width=560 }) {
  return (
    <div style={{ position:'fixed', inset:0, background:'rgba(15,23,42,0.55)', zIndex:1000, display:'flex', alignItems:'center', justifyContent:'center', padding:24 }} onClick={onClose}>
      <div style={{ background:C.surface, borderRadius:16, width, maxWidth:'100%', maxHeight:'90vh', overflowY:'auto', boxShadow:'0 24px 80px rgba(15,23,42,0.3)', animation:'slideUp 200ms ease' }} onClick={e=>e.stopPropagation()}>
        <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', padding:'20px 24px 16px', borderBottom:`1px solid ${C.border}` }}>
          <span style={{ fontSize:16, fontWeight:700, color:C.text }}>{title}</span>
          <button onClick={onClose} style={{ width:32, height:32, border:'none', borderRadius:8, background:C.bg, cursor:'pointer', fontSize:16, color:C.text2, display:'flex', alignItems:'center', justifyContent:'center' }}>✕</button>
        </div>
        <div style={{ padding:'20px 24px' }}>{children}</div>
      </div>
    </div>
  );
}

function Toast({ msg, onClose }) {
  useEffect(()=>{const t=setTimeout(onClose,2500);return()=>clearTimeout(t);},[]);
  return <div style={{ position:'fixed', bottom:28, right:28, background:C.secondary, color:'#fff', padding:'12px 20px', borderRadius:10, zIndex:2000, fontSize:13, fontWeight:500, boxShadow:'0 8px 24px rgba(0,0,0,0.2)', animation:'slideUp 200ms ease' }}>✅ {msg}</div>;

// ── AI Chatbot ──
function AiChatbotPage() {
  const [msgs, setMsgs] = useState(CHAT_INIT);
  const [input, setInput] = useState('');
  const [typing, setTyping] = useState(false);
  const bottomRef = useRef(null);

  useEffect(()=>{ bottomRef.current?.scrollIntoView({ behavior:'smooth' }); },[msgs]);

  const sendMsg = (text) => {
    const userMsg = text || input.trim();
    if(!userMsg) return;
    setInput('');
    setMsgs(m=>[...m,{role:'user',msg:userMsg,time:new Date().toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit'})}]);
    setTyping(true);
    setTimeout(()=>{
      setTyping(false);
      const key = Object.keys(BOT_REPLIES).find(k=>userMsg.includes(k));
      const reply = BOT_REPLIES[key||'default'];
      setMsgs(m=>[...m,{role:'bot',msg:reply,time:new Date().toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit'})}]);
    },1200);
  };

  const QUICK = ['예약하기','요금 문의','인천공항','김포공항'];

  return (
    <div style={{ padding:22, animation:'fadeIn 250ms ease', height:'calc(100vh - 48px - 44px)', display:'flex', gap:20 }}>
      {/* Chat window */}
      <div style={{ flex:1, background:C.surface, borderRadius:16, border:`1px solid ${C.border}`, display:'flex', flexDirection:'column', overflow:'hidden' }}>
        {/* Header */}
        <div style={{ padding:'14px 18px', borderBottom:`1px solid ${C.border}`, display:'flex', alignItems:'center', gap:10 }}>
          <div style={{ width:38, height:38, borderRadius:'50%', background:`linear-gradient(135deg,${C.primary},${C.purple})`, display:'flex', alignItems:'center', justifyContent:'center', fontSize:18 }}>🤖</div>
          <div>
            <div style={{ fontSize:14, fontWeight:700, color:C.text }}>에어모빌 AI 상담봇</div>
            <div style={{ fontSize:11, color:C.success }}>● 온라인 · Claude API 연동</div>
          </div>
          <div style={{ marginLeft:'auto', fontSize:11, color:C.text3 }}>한국어 · English · 中文 · 日本語 · Tiếng Việt</div>
        </div>
        {/* Messages */}
        <div style={{ flex:1, overflowY:'auto', padding:'16px 18px', display:'flex', flexDirection:'column', gap:12 }}>
          {msgs.map((m,i)=>(
            <div key={i} style={{ display:'flex', justifyContent:m.role==='user'?'flex-end':'flex-start', animation:'chatAppear 200ms ease' }}>
              {m.role==='bot' && <div style={{ width:28, height:28, borderRadius:'50%', background:C.primaryLight, display:'flex', alignItems:'center', justifyContent:'center', fontSize:14, marginRight:8, flexShrink:0 }}>🤖</div>}
              <div>
                <div style={{ maxWidth:360, padding:'10px 14px', borderRadius: m.role==='bot'?'4px 14px 14px 14px':'14px 4px 14px 14px', background:m.role==='bot'?C.bg:`linear-gradient(135deg,${C.primary},${C.primaryDark})`, color:m.role==='bot'?C.text:'#fff', fontSize:13, lineHeight:1.6 }}>{m.msg}</div>
                <div style={{ fontSize:10, color:C.text3, marginTop:3, textAlign:m.role==='user'?'right':'left' }}>{m.time}</div>
              </div>
            </div>
          ))}
          {typing && (
            <div style={{ display:'flex', alignItems:'center', gap:8 }}>
              <div style={{ width:28, height:28, borderRadius:'50%', background:C.primaryLight, display:'flex', alignItems:'center', justifyContent:'center', fontSize:14 }}>🤖</div>
              <div style={{ padding:'10px 16px', borderRadius:'4px 14px 14px 14px', background:C.bg, display:'flex', gap:4 }}>
                {[0,1,2].map(i=><span key={i} style={{ width:7, height:7, borderRadius:'50%', background:C.text3, display:'inline-block', animation:`typing 1s ${i*0.2}s infinite` }}></span>)}
              </div>
            </div>
          )}
          <div ref={bottomRef} />
        </div>
        {/* Quick replies */}
        <div style={{ padding:'8px 18px', display:'flex', gap:8, flexWrap:'wrap', borderTop:`1px solid ${C.border}` }}>
          {QUICK.map(q=>(
            <button key={q} onClick={()=>sendMsg(q)} style={{ padding:'5px 12px', borderRadius:16, border:`1px solid ${C.primary}44`, background:C.primaryLight, color:C.primary, fontSize:12, fontWeight:600, cursor:'pointer' }}>{q}</button>
          ))}
        </div>
        {/* Input */}
        <div style={{ padding:'10px 14px', borderTop:`1px solid ${C.border}`, display:'flex', gap:10 }}>
          <input value={input} onChange={e=>setInput(e.target.value)} onKeyDown={e=>e.key==='Enter'&&sendMsg()} placeholder="메시지를 입력하세요 (한국어, English, 中文 모두 가능)..." style={{ flex:1, padding:'9px 14px', border:`1px solid ${C.border}`, borderRadius:10, fontSize:13, outline:'none', color:C.text }} />
          <button onClick={()=>sendMsg()} style={{ padding:'9px 18px', borderRadius:10, border:'none', background:`linear-gradient(135deg,${C.primary},${C.primaryDark})`, color:'#fff', fontSize:13, fontWeight:700, cursor:'pointer' }}>전송</button>
        </div>
      </div>
      {/* Stats panel */}
      <div style={{ width:260, display:'flex', flexDirection:'column', gap:14 }}>
        {[{l:'오늘 상담 건수',v:'128건',c:C.primary},{l:'자동 해결률',v:'89%',c:C.success},{l:'평균 응답 시간',v:'0.9초',c:C.text},{l:'미해결 에스컬레이션',v:'14건',c:C.warning}].map(s=>(
          <div key={s.l} style={{ background:C.surface, borderRadius:12, padding:'16px 18px', border:`1px solid ${C.border}` }}>
            <div style={{ fontSize:11, color:C.text2, marginBottom:5 }}>{s.l}</div>
            <div style={{ fontSize:22, fontWeight:800, color:s.c }}>{s.v}</div>
          </div>
        ))}
        <div style={{ background:C.surface, borderRadius:12, padding:'16px 18px', border:`1px solid ${C.border}`, flex:1 }}>
          <div style={{ fontSize:12, fontWeight:700, color:C.text, marginBottom:10 }}>언어별 상담 비율</div>
          {[['🇰🇷 한국어',45],['🇨🇳 中文',28],['🇯🇵 日本語',16],['🇺🇸 English',8],['🇻🇳 Tiếng Việt',3]].map(([l,v])=>(
            <div key={l} style={{ marginBottom:8 }}>
              <div style={{ display:'flex', justifyContent:'space-between', marginBottom:3 }}>
                <span style={{ fontSize:11, color:C.text }}>{l}</span>
                <span style={{ fontSize:11, fontWeight:700, color:C.text }}>{v}%</span>
              </div>
              <div style={{ height:5, background:C.border, borderRadius:3 }}>
                <div style={{ width:`${v}%`, height:'100%', background:C.primary, borderRadius:3 }}></div>
              </div>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

                <td style={{ padding:'10px 16px', fontSize:11, color:C.primary, fontFamily:'monospace', fontWeight:600 }}>{k.key}</td>
                <td style={{ padding:'10px 16px', fontSize:12, color:C.text2 }}>{k.ko}</td>
                <td style={{ padding:'10px 16px' }}>
                  <input defaultValue={k[selected]||''} placeholder="번역 없음" style={{ width:'100%', padding:'6px 10px', border:`1px solid ${C.border}`, borderRadius:7, fontSize:12, outline:'none', color:C.text }} />
                </td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>
    </div>
  );
}

function PlaceholderPage({ name }) {
  return (
    <div style={{ padding:48, display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', gap:16, color:C.text2 }}>
      <div style={{ fontSize:48 }}>🔧</div>
      <div style={{ fontSize:16, fontWeight:600, color:C.text }}>{name}</div>
      <div style={{ fontSize:13 }}>구현 데모 — 실제 프로젝트에서 상세 구현 예정</div>
    </div>
  );
}

// ── App ──
function App() {
  const [section, setSection] = useState('analytics-dashboard');
  const [toast, setToast] = useState(null);
  const showToast = msg => setToast(msg);

  const render = () => {
    if(section==='analytics-dashboard') return <AnalyticsDashboardPage />;
    if(section==='ota-integration') return <OtaIntegrationPage toast={showToast} />;
    if(section==='ai-chatbot') return <AiChatbotPage />;
    if(section==='bid-dispatch') return <BidDispatchPage toast={showToast} />;
    if(section==='i18n') return <I18nPage toast={showToast} />;
    return <PlaceholderPage name={{logs:'API 로그',settings:'고급 설정'}[section]||section} />;
  };

  return (
    <div style={{ display:'flex', width:'100%', height:'100vh', overflow:'hidden' }}>
      <Sidebar section={section} setSection={setSection} />
      <div style={{ flex:1, display:'flex', flexDirection:'column', overflow:'hidden' }}>
        <AppBar section={section} />
        <main style={{ flex:1, overflow:'auto', background:C.bg }}>
          {render()}
        </main>
      </div>
      {toast && <Toast msg={toast} onClose={()=>setToast(null)} />}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
