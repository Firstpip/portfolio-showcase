// ── Utility components ──
function Badge({ status }) {
  const s = STATUS_MAP[status] || { label:status, bg:'#F3F4F6', color:C.text2 };
  return <span style={{ display:'inline-block', padding:'3px 10px', borderRadius:20, fontSize:12, fontWeight:600, background:s.bg, color:s.color }}>{s.label}</span>;
}

function KpiCard({ icon, label, value, sub, color }) {
  return (
    <div style={{ background:C.surface, borderRadius:14, padding:'20px 22px', border:`1px solid ${C.border}`, flex:1, minWidth:180, animation:'fadeIn 0.4s ease' }}>
      <div style={{ display:'flex', alignItems:'center', gap:10, marginBottom:12 }}>
        <div style={{ width:40, height:40, borderRadius:10, background:color||C.primaryLight, display:'flex', alignItems:'center', justifyContent:'center', fontSize:20 }}>{icon}</div>
        <span style={{ fontSize:13, color:C.text2, fontWeight:500 }}>{label}</span>
      </div>
      <div style={{ fontSize:26, fontWeight:800, color:C.text }}>{value}</div>
      {sub && <div style={{ fontSize:12, color:C.text3, marginTop:4 }}>{sub}</div>}
    </div>
  );
}

function Modal({ title, onClose, children, width }) {
  return (
    <>
      <div onClick={onClose} style={{ position:'fixed', inset:0, background:'rgba(0,0,0,0.4)', zIndex:1000 }} />
      <div style={{ position:'fixed', top:'50%', left:'50%', transform:'translate(-50%,-50%)', width:width||520, maxHeight:'85vh', background:C.surface, borderRadius:16, boxShadow:'0 20px 60px rgba(0,0,0,0.2)', zIndex:1001, overflow:'hidden', animation:'fadeIn 0.2s ease' }}>
        <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', padding:'18px 24px', borderBottom:`1px solid ${C.border}` }}>
          <h3 style={{ fontSize:17, fontWeight:700, color:C.text }}>{title}</h3>
          <button onClick={onClose} style={{ background:'none', border:'none', cursor:'pointer', fontSize:20, color:C.text2, padding:4 }}>✕</button>
        </div>
        <div style={{ padding:24, overflowY:'auto', maxHeight:'calc(85vh - 60px)' }}>{children}</div>
      </div>
    </>
  );
}

function Toast({ msg, onClose }) {
  useEffect(() => { const t = setTimeout(onClose, 2500); return () => clearTimeout(t); }, []);
  return <div style={{ position:'fixed', bottom:24, left:'50%', transform:'translateX(-50%)', background:C.text, color:'#fff', padding:'12px 24px', borderRadius:10, fontSize:14, fontWeight:500, zIndex:2000, animation:'fadeIn 0.2s ease', boxShadow:'0 6px 24px rgba(0,0,0,0.15)' }}>{msg}</div>;
}

// ── Chat page ──
function ChatPage() {
  const [activeChat, setActiveChat] = useState('C-001');
  const [input, setInput] = useState('');
  const [messages, setMessages] = useState(CHAT_MESSAGES);
  const chat = CHATS.find(c=>c.id===activeChat);
  const msgs = messages[activeChat] || [];
  const bottomRef = useRef(null);

  useEffect(() => { bottomRef.current?.scrollIntoView({ behavior:'smooth' }); }, [msgs.length, activeChat]);

  const send = () => {
    if(!input.trim()) return;
    setMessages(prev => ({...prev, [activeChat]: [...(prev[activeChat]||[]), { from:'admin', text:input, time: new Date().toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit'}) }]}));
    setInput('');
  };

  return (
    <div style={{ display:'flex', height:'calc(100vh - 120px)', background:C.surface, borderRadius:14, border:`1px solid ${C.border}`, overflow:'hidden' }}>
      {/* Chat list */}
      <div style={{ width:320, borderRight:`1px solid ${C.border}`, display:'flex', flexDirection:'column' }}>
        <div style={{ padding:16, borderBottom:`1px solid ${C.border}` }}>
          <input placeholder="회원 검색..." style={{ width:'100%', padding:'8px 12px', borderRadius:8, border:`1px solid ${C.border}`, fontSize:13, outline:'none' }} />
        </div>
        <div style={{ flex:1, overflowY:'auto' }} className="scrollbar-hide">
          {CHATS.map(c=>(
            <div key={c.id} onClick={()=>setActiveChat(c.id)} style={{ display:'flex', gap:12, padding:'14px 16px', cursor:'pointer', background:activeChat===c.id?C.primaryLight:'transparent', borderBottom:`1px solid ${C.border}`, transition:'background 0.15s' }}>
              <div style={{ fontSize:28, flexShrink:0 }}>{c.photo}</div>
              <div style={{ flex:1, minWidth:0 }}>
                <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center' }}>
                  <span style={{ fontSize:14, fontWeight:600 }}>{c.member}</span>
                  <span style={{ fontSize:11, color:C.text3 }}>{c.time}</span>
                </div>
                <div style={{ fontSize:12, color:C.text2, overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap', marginTop:2 }}>{c.lastMsg}</div>
              </div>
              {c.unread > 0 && <div style={{ width:20, height:20, borderRadius:10, background:C.primary, color:'#fff', fontSize:11, fontWeight:700, display:'flex', alignItems:'center', justifyContent:'center', flexShrink:0, marginTop:4 }}>{c.unread}</div>}
            </div>
          ))}
        </div>
      </div>
      {/* Chat messages */}
      <div style={{ flex:1, display:'flex', flexDirection:'column' }}>
        <div style={{ padding:'14px 20px', borderBottom:`1px solid ${C.border}`, display:'flex', alignItems:'center', gap:12 }}>
          <div style={{ fontSize:24 }}>{chat?.photo}</div>
          <div><div style={{ fontSize:15, fontWeight:600 }}>{chat?.member}</div><div style={{ fontSize:12, color:C.text3 }}>최근 활동: {chat?.time}</div></div>
        </div>
        <div style={{ flex:1, overflowY:'auto', padding:20, display:'flex', flexDirection:'column', gap:10, background:C.bg }} className="scrollbar-hide">
          {msgs.map((m,i)=>(
            <div key={i} style={{ display:'flex', justifyContent:m.from==='admin'?'flex-end':'flex-start' }}>
              <div style={{ maxWidth:'65%', padding:'10px 14px', borderRadius:14, background:m.from==='admin'?C.primary:C.surface, color:m.from==='admin'?'#fff':C.text, fontSize:13, lineHeight:1.5, boxShadow:m.from==='admin'?'none':'0 1px 3px rgba(0,0,0,0.06)', borderBottomRightRadius:m.from==='admin'?4:14, borderBottomLeftRadius:m.from==='admin'?14:4 }}>
                {m.text}
                <div style={{ fontSize:10, color:m.from==='admin'?'rgba(255,255,255,0.7)':C.text3, marginTop:4, textAlign:'right' }}>{m.time}</div>
              </div>
            </div>
          ))}
          <div ref={bottomRef} />
        </div>
        <div style={{ padding:'12px 20px', borderTop:`1px solid ${C.border}`, display:'flex', gap:8, background:C.surface }}>
          <button style={{ padding:'8px', borderRadius:8, border:`1px solid ${C.border}`, background:'transparent', cursor:'pointer', fontSize:16 }}>📎</button>
          <input value={input} onChange={e=>setInput(e.target.value)} onKeyDown={e=>e.key==='Enter'&&send()} placeholder="메시지를 입력하세요..." style={{ flex:1, padding:'10px 14px', borderRadius:10, border:`1px solid ${C.border}`, fontSize:13, outline:'none' }} />
          <button onClick={send} style={{ padding:'8px 18px', borderRadius:10, background:C.primary, color:'#fff', border:'none', fontSize:13, fontWeight:600, cursor:'pointer' }}>전송</button>
        </div>
      </div>
    </div>
  );
}

            </div>
            <div><label style={{ fontSize:13, fontWeight:500, color:C.text2, marginBottom:4, display:'block' }}>트레이너</label>
              <select style={{ width:'100%', padding:'10px 12px', borderRadius:8, border:`1px solid ${C.border}`, fontSize:13, outline:'none', background:'#fff' }}>{TRAINERS.map(t=><option key={t.id}>{t.name}</option>)}</select></div>
            <div><label style={{ fontSize:13, fontWeight:500, color:C.text2, marginBottom:4, display:'block' }}>룸</label>
              <select style={{ width:'100%', padding:'10px 12px', borderRadius:8, border:`1px solid ${C.border}`, fontSize:13, outline:'none', background:'#fff' }}><option>A룸</option><option>B룸</option><option>C룸</option></select></div>
            <button onClick={()=>{setModal(null);setToast('예약이 등록되었습니다.')}} style={{ padding:'12px', borderRadius:8, background:C.primary, color:'#fff', border:'none', fontSize:14, fontWeight:600, cursor:'pointer' }}>예약 등록</button>
          </div>
        </Modal>
      );
      case 'scheduleDetail': {
        const s = modal.item;
        return (
          <Modal title={`예약 상세 — ${s.id}`} onClose={()=>setModal(null)} width={440}>
            <div style={{ display:'flex', flexDirection:'column', gap:12 }}>
              {[{l:'회원',v:s.member},{l:'유형',v:s.type},{l:'트레이너',v:s.trainer},{l:'날짜',v:s.date},{l:'시간',v:`${s.time} (${s.duration}분)`},{l:'룸',v:s.room}].map(f=>(
                <div key={f.l} style={{ display:'flex', padding:'10px 14px', borderRadius:8, background:C.bg }}>
                  <span style={{ width:80, fontSize:13, color:C.text2, fontWeight:500 }}>{f.l}</span>
                  <span style={{ fontSize:13, fontWeight:600 }}>{f.v}</span>
                </div>
              ))}
              <div style={{ display:'flex', alignItems:'center', gap:8, padding:'10px 14px', borderRadius:8, background:C.bg }}>
                <span style={{ width:80, fontSize:13, color:C.text2, fontWeight:500 }}>상태</span>
                <Badge status={s.status} />
              </div>
              <div style={{ display:'flex', gap:8, marginTop:8 }}>
                <button onClick={()=>{setModal(null);setToast('예약이 변경되었습니다.')}} style={{ flex:1, padding:'10px', borderRadius:8, background:C.primary, color:'#fff', border:'none', fontSize:13, fontWeight:600, cursor:'pointer' }}>시간 변경</button>
                <button onClick={()=>{setModal(null);setToast('예약이 취소되었습니다.')}} style={{ flex:1, padding:'10px', borderRadius:8, background:C.danger, color:'#fff', border:'none', fontSize:13, fontWeight:600, cursor:'pointer' }}>예약 취소</button>
              </div>
            </div>
          </Modal>
        );
      }
      default: return null;
    }
  };

  return (
    <div style={{ display:'flex', width:'100%', height:'100vh', overflow:'hidden' }}>
      {/* Sidebar */}
      <aside style={{ width:260, background:C.sidebarBg, display:'flex', flexDirection:'column', flexShrink:0 }}>
        <div style={{ padding:'22px 20px 16px', borderBottom:`1px solid ${C.sidebarBorder}` }}>
          <div style={{ display:'flex', alignItems:'center', gap:10 }}>
            <div style={{ width:36, height:36, borderRadius:10, background:`linear-gradient(135deg, ${C.primary}, ${C.accent})`, display:'flex', alignItems:'center', justifyContent:'center', color:'#fff', fontSize:18, fontWeight:800 }}>F</div>
            <div><div style={{ fontSize:15, fontWeight:700, color:'#fff' }}>핏라이프</div><div style={{ fontSize:11, color:'rgba(255,255,255,0.5)' }}>강남점 관리자</div></div>
          </div>
        </div>
        <div style={{ flex:1, padding:'12px 10px', display:'flex', flexDirection:'column', gap:2 }}>
          {PAGES.filter(p=>p.id!=='settings').map(p=>(
            <button key={p.id} onClick={()=>setPage(p.id)} style={{ display:'flex', alignItems:'center', gap:10, padding:'10px 14px', borderRadius:10, border:'none', cursor:'pointer', background:page===p.id?'rgba(255,107,71,0.15)':'transparent', color:page===p.id?C.primary:'rgba(255,255,255,0.7)', fontSize:14, fontWeight:page===p.id?600:400, transition:'all 0.15s', width:'100%', textAlign:'left', fontFamily:'inherit' }}>
              <span style={{ fontSize:18 }}>{p.icon}</span>{p.label}
              {p.id==='chat' && <span style={{ marginLeft:'auto', width:18, height:18, borderRadius:9, background:C.primary, color:'#fff', fontSize:10, fontWeight:700, display:'flex', alignItems:'center', justifyContent:'center' }}>3</span>}
            </button>
          ))}
        </div>
        <div style={{ padding:'12px 10px', borderTop:`1px solid ${C.sidebarBorder}` }}>
          <button onClick={()=>setPage('settings')} title="설정" style={{ display:'flex', alignItems:'center', gap:10, padding:'10px 14px', borderRadius:10, border:'none', cursor:'pointer', background:page==='settings'?'rgba(255,107,71,0.15)':'transparent', color:page==='settings'?C.primary:'rgba(255,255,255,0.7)', fontSize:14, fontWeight:page==='settings'?600:400, width:'100%', textAlign:'left', fontFamily:'inherit' }}>
            <span style={{ fontSize:18 }}>⚙️</span>설정
          </button>
        </div>
        <div style={{ padding:'14px 20px', borderTop:`1px solid ${C.sidebarBorder}` }}>
          <div style={{ display:'flex', alignItems:'center', gap:10 }}>
            <div style={{ width:32, height:32, borderRadius:16, background:'rgba(255,255,255,0.1)', display:'flex', alignItems:'center', justifyContent:'center', fontSize:14 }}>👤</div>
            <div><div style={{ fontSize:13, fontWeight:500, color:'#fff' }}>김대현</div><div style={{ fontSize:11, color:'rgba(255,255,255,0.4)' }}>센터장</div></div>
          </div>
        </div>
      </aside>

      {/* Main */}
      <div style={{ flex:1, display:'flex', flexDirection:'column', overflow:'hidden' }}>
        {/* TopBar */}
        <header style={{ height:58, background:C.surface, borderBottom:`1px solid ${C.border}`, display:'flex', alignItems:'center', padding:'0 24px', gap:12, flexShrink:0 }}>
          <h2 style={{ fontSize:17, fontWeight:700, color:C.text }}>{PAGES.find(p=>p.id===page)?.label}</h2>
          <div style={{ flex:1 }} />
          <div style={{ position:'relative' }}>
            <input placeholder="회원 · 예약 검색..." style={{ padding:'8px 14px 8px 32px', borderRadius:8, border:`1px solid ${C.border}`, fontSize:13, width:240, outline:'none' }} />
            <span style={{ position:'absolute', left:10, top:'50%', transform:'translateY(-50%)', fontSize:14 }}>🔍</span>
          </div>
          <div style={{ position:'relative', cursor:'pointer' }}>
            <span style={{ fontSize:20 }}>🔔</span>
            <div style={{ position:'absolute', top:-2, right:-4, width:16, height:16, borderRadius:8, background:C.danger, color:'#fff', fontSize:9, fontWeight:700, display:'flex', alignItems:'center', justifyContent:'center' }}>2</div>
          </div>
        </header>

        {/* Content */}
        <main style={{ flex:1, overflow:'auto', padding:24, background:C.bg }} className="scrollbar-hide">
          <div key={page} style={{ animation:'fadeIn 0.3s ease' }}>
            {renderPage()}
          </div>
        </main>
      </div>

      {renderModal()}
      {toast && <Toast msg={toast} onClose={()=>setToast(null)} />}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
