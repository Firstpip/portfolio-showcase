</head>
<body>

  { id:'D-003', name:'박준호', dept:'외과', specialty:'복강경, 갑상선', available:false, photo:'👨‍⚕️', rating:4.7, patients:198, nextSlot:'14:00' },

const APPOINTMENTS = [

  { id:'A-003', patient:'박민수', phone:'010-3456-7890', doctor:'정수연', dept:'피부과', date:'2026-04-10', time:'09:30', type:'초진', status:'completed', symptoms:'아토피 악화', memo:'처방전 발급 완료' },
  { id:'A-004', patient:'최유진', phone:'010-4567-8901', doctor:'한동현', dept:'이비인후과', date:'2026-04-10', time:'10:00', type:'재진', status:'waiting', symptoms:'비염 경과 확인', memo:'' },
  { id:'A-005', patient:'정하나', phone:'010-5678-9012', doctor:'김영수', dept:'내과', date:'2026-04-10', time:'14:00', type:'초진', status:'confirmed', symptoms:'건강검진 상담', memo:'' },
  { id:'A-006', patient:'한지민', phone:'010-6789-0123', doctor:'박준호', dept:'외과', date:'2026-04-10', time:'14:00', type:'재진', status:'confirmed', symptoms:'수술 후 경과', memo:'봉합 부위 확인' },

  { id:'A-008', patient:'김태연', phone:'010-8901-2345', doctor:'이미영', dept:'정형외과', date:'2026-04-11', time:'09:00', type:'초진', status:'confirmed', symptoms:'어깨 통증', memo:'' },

const STATUS_MAP = {

const CHAT_LIST = [
  { id:'CH-01', patient:'김철수', lastMsg:'선생님, 약 복용 후 두통이 생겼는데 괜찮을까요?', time:'5분 전', unread:1, photo:'🧑' },
  { id:'CH-02', patient:'이영희', lastMsg:'네, 다음 주 화요일 예약하겠습니다.', time:'30분 전', unread:0, photo:'👩' },
  { id:'CH-03', patient:'최유진', lastMsg:'비염 약 처방 부탁드립니다.', time:'1시간 전', unread:2, photo:'👩' },
  { id:'CH-04', patient:'정하나', lastMsg:'건강검진 결과는 언제 나오나요?', time:'2시간 전', unread:1, photo:'👩' },
];

const CHAT_MSGS = {
  'CH-01': [
    { from:'patient', text:'선생님, 어제 처방받은 위장약 복용 후 두통이 생겼습니다.', time:'14:20' },
    { from:'doctor', text:'두통이 얼마나 지속되고 있나요? 약 복용 후 몇 시간 뒤에 발생했는지 알려주세요.', time:'14:22' },
    { from:'patient', text:'약 먹고 1시간쯤 후에 시작됐고, 지금까지 계속 있습니다.', time:'14:25' },
    { from:'patient', text:'선생님, 약 복용 후 두통이 생겼는데 괜찮을까요?', time:'14:30' },

    { from:'doctor', text:'MRI 결과 확인됐습니다. 다음 주에 내원하셔서 결과 상담 진행하겠습니다.', time:'13:00' },

const SCHEDULE_SLOTS = [
  { time:'09:00', slots:[{dr:'정수연',booked:true},{dr:'한동현',booked:false},{dr:'김영수',booked:false}] },
  { time:'09:30', slots:[{dr:'정수연',booked:true,patient:'박민수'},{dr:'한동현',booked:false},{dr:'김영수',booked:false}] },
  { time:'10:00', slots:[{dr:'정수연',booked:false},{dr:'한동현',booked:true,patient:'최유진'},{dr:'김영수',booked:false}] },
  { time:'10:30', slots:[{dr:'정수연',booked:false},{dr:'한동현',booked:false},{dr:'김영수',booked:true,patient:'김철수'}] },
  { time:'11:00', slots:[{dr:'정수연',booked:false},{dr:'한동현',booked:false},{dr:'이미영',booked:true,patient:'이영희'}] },
  { time:'14:00', slots:[{dr:'박준호',booked:true,patient:'한지민'},{dr:'김영수',booked:true,patient:'정하나'},{dr:'이미영',booked:false}] },
  { time:'15:00', slots:[{dr:'박준호',booked:false},{dr:'김영수',booked:false},{dr:'이미영',booked:false}] },
  { time:'15:30', slots:[{dr:'윤지혜',booked:true,patient:'오승아'},{dr:'김영수',booked:false},{dr:'이미영',booked:false}] },
];

const weeklyData = [
  { day:'월', appointments:32, completed:28 },
  { day:'화', appointments:28, completed:25 },
  { day:'수', appointments:35, completed:30 },
  { day:'목', appointments:30, completed:22 },
  { day:'금', appointments:25, completed:18 },
];

// ── Components ──
function Badge({ status }) {
  const s = STATUS_MAP[status] || { label:status, bg:'#F3F4F6', color:C.text2 };
  return <span style={{ padding:'3px 10px', borderRadius:20, fontSize:12, fontWeight:600, background:s.bg, color:s.color }}>{s.label}</span>;
}

function Toast({ msg, onClose }) {
  useEffect(() => { const t = setTimeout(onClose, 2500); return () => clearTimeout(t); }, []);
  return <div style={{ position:'fixed', bottom:24, left:'50%', transform:'translateX(-50%)', background:C.text, color:'#fff', padding:'12px 24px', borderRadius:10, fontSize:14, fontWeight:500, zIndex:2000, animation:'fadeIn 0.2s ease', boxShadow:'0 6px 24px rgba(0,0,0,0.15)' }}>{msg}</div>;
}

function Drawer({ item, onClose, onToast }) {
  if (!item) return null;
  const isAppointment = !!item.doctor;
  return (
    <>
      <div onClick={onClose} style={{ position:'fixed', inset:0, background:'rgba(0,0,0,0.35)', zIndex:200 }} />
      <div style={{ position:'fixed', top:0, right:0, bottom:0, width:480, background:C.surface, boxShadow:'-8px 0 40px rgba(0,0,0,0.12)', zIndex:201, overflowY:'auto', animation:'slideIn 0.25s ease' }} className="scrollbar-hide">
        <div style={{ padding:'20px 24px', borderBottom:`1px solid ${C.border}`, display:'flex', justifyContent:'space-between', alignItems:'center' }}>
          <h3 style={{ fontSize:17, fontWeight:700 }}>{isAppointment ? `예약 상세 — ${item.id}` : `의사 상세 — ${item.name}`}</h3>
          <button onClick={onClose} style={{ background:'none', border:'none', fontSize:20, cursor:'pointer', color:C.text2 }}>✕</button>
        </div>
        <div style={{ padding:24 }}>
          {isAppointment ? (
            <div style={{ display:'flex', flexDirection:'column', gap:14 }}>
              <div style={{ display:'flex', alignItems:'center', gap:12, padding:16, borderRadius:12, background:C.bg }}>
                <div style={{ fontSize:36 }}>🏥</div>
                <div><div style={{ fontSize:16, fontWeight:700 }}>{item.patient}</div><div style={{ fontSize:13, color:C.text2 }}>{item.phone}</div></div>
                <div style={{ marginLeft:'auto' }}><Badge status={item.status} /></div>
              </div>
              {[{l:'진료과',v:item.dept},{l:'담당의',v:item.doctor},{l:'일시',v:`${item.date} ${item.time}`},{l:'구분',v:item.type},{l:'증상',v:item.symptoms}].map(f=>(
                <div key={f.l} style={{ display:'flex', padding:'10px 14px', borderRadius:8, background:C.bg }}>
                  <span style={{ width:70, fontSize:13, color:C.text2, fontWeight:500, flexShrink:0 }}>{f.l}</span>
                  <span style={{ fontSize:13, fontWeight:500 }}>{f.v}</span>
                </div>
              ))}
              {item.memo && <div style={{ padding:'12px 14px', borderRadius:8, background:C.warningLight, fontSize:13 }}>📌 {item.memo}</div>}
              <div style={{ marginTop:8 }}>
                <label style={{ fontSize:13, fontWeight:500, color:C.text2, display:'block', marginBottom:6 }}>진료 메모</label>
                <textarea rows={3} placeholder="진료 내용 기록..." style={{ width:'100%', padding:'10px 12px', borderRadius:8, border:`1px solid ${C.border}`, fontSize:13, outline:'none', resize:'vertical' }} />
              </div>
              <div style={{ display:'flex', gap:8 }}>
                <button onClick={()=>{onClose();onToast('예약 상태가 변경되었습니다.')}} style={{ flex:1, padding:'10px', borderRadius:8, background:C.primary, color:'#fff', border:'none', fontSize:13, fontWeight:600, cursor:'pointer' }}>상태 변경</button>
                <button onClick={()=>{onClose();onToast('예약이 취소되었습니다.')}} style={{ flex:1, padding:'10px', borderRadius:8, background:C.danger, color:'#fff', border:'none', fontSize:13, fontWeight:600, cursor:'pointer' }}>취소</button>
              </div>
            </div>
          ) : (
            <div style={{ display:'flex', flexDirection:'column', gap:14 }}>
              <div style={{ textAlign:'center', padding:20 }}>
                <div style={{ fontSize:48, marginBottom:8 }}>{item.photo}</div>
                <div style={{ fontSize:18, fontWeight:700 }}>{item.name} 전문의</div>
                <div style={{ fontSize:13, color:C.text2, marginTop:4 }}>{item.dept} · {item.specialty}</div>
                <div style={{ display:'flex', justifyContent:'center', gap:16, marginTop:12 }}>
                  <span style={{ fontSize:14, fontWeight:600, color:C.primary }}>⭐ {item.rating}</span>
                  <span style={{ fontSize:14, color:C.text2 }}>환자 {item.patients}명</span>
                </div>
              </div>
              <div style={{ padding:'10px 14px', borderRadius:8, background:item.available?C.successLight:C.dangerLight, textAlign:'center', fontSize:13, fontWeight:600, color:item.available?C.success:C.danger }}>{item.available?'진료 가능':'진료 중'}</div>
              <div style={{ padding:'10px 14px', borderRadius:8, background:C.bg }}><span style={{ fontSize:13, color:C.text2 }}>다음 빈 슬롯: </span><span style={{ fontSize:14, fontWeight:600, color:C.primary }}>{item.nextSlot}</span></div>
              <button onClick={()=>{onClose();onToast('예약이 등록되었습니다.')}} style={{ padding:'12px', borderRadius:10, background:C.primary, color:'#fff', border:'none', fontSize:14, fontWeight:600, cursor:'pointer' }}>이 의사로 예약하기</button>
            </div>
          )}
        </div>
      </div>
    </>
  );
}

// ── Pages ──
function HomePage({ setDrawer }) {
  const [dept, setDept] = useState('전체');
  const [search, setSearch] = useState('');
  const filtered = DOCTORS.filter(d => {
    if (dept !== '전체' && d.dept !== dept) return false;
    if (search && !d.name.includes(search) && !d.specialty.includes(search)) return false;
    return true;
  });
  return (
    <div style={{ maxWidth:1100, margin:'0 auto' }}>
      <div style={{ display:'flex', gap:8, marginBottom:20, flexWrap:'wrap', alignItems:'center' }}>
        {['전체',...DEPARTMENTS].map(d=>(
          <button key={d} onClick={()=>setDept(d)} style={{ padding:'7px 16px', borderRadius:20, border:`1px solid ${dept===d?C.primary:C.border}`, background:dept===d?C.primaryLight:'#fff', color:dept===d?C.primary:C.text2, fontSize:13, fontWeight:500, cursor:'pointer' }}>{d}</button>
        ))}
        <div style={{ flex:1 }} />
        <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="의사명·전문분야 검색" style={{ padding:'8px 14px', borderRadius:8, border:`1px solid ${C.border}`, fontSize:13, width:220, outline:'none' }} />
      </div>
      <div style={{ display:'grid', gridTemplateColumns:'repeat(auto-fill, minmax(300px, 1fr))', gap:16 }}>
        {filtered.map(d=>(
          <div key={d.id} onClick={()=>setDrawer(d)} style={{ background:'#fff', borderRadius:16, padding:22, border:`1px solid ${C.border}`, cursor:'pointer', transition:'box-shadow 0.2s, transform 0.2s', boxShadow:'0 2px 8px rgba(0,0,0,0.04)' }} onMouseEnter={e=>{e.currentTarget.style.boxShadow='0 8px 24px rgba(26,110,189,0.12)';e.currentTarget.style.transform='translateY(-2px)'}} onMouseLeave={e=>{e.currentTarget.style.boxShadow='0 2px 8px rgba(0,0,0,0.04)';e.currentTarget.style.transform='none'}}>
            <div style={{ display:'flex', alignItems:'center', gap:14 }}>
              <div style={{ fontSize:40 }}>{d.photo}</div>
              <div style={{ flex:1 }}>
                <div style={{ fontSize:16, fontWeight:700 }}>{d.name} <span style={{ fontSize:13, color:C.text2, fontWeight:400 }}>전문의</span></div>
                <div style={{ fontSize:13, color:C.primary, fontWeight:500, marginTop:2 }}>{d.dept}</div>
                <div style={{ fontSize:12, color:C.text2, marginTop:2 }}>{d.specialty}</div>
              </div>
            </div>
            <div style={{ display:'flex', justifyContent:'space-between', marginTop:16, paddingTop:12, borderTop:`1px solid ${C.border}` }}>
              <span style={{ fontSize:13, fontWeight:600, color:C.primary }}>⭐ {d.rating}</span>
              <span style={{ fontSize:12, color:C.text2 }}>누적 환자 {d.patients}명</span>
              <span style={{ fontSize:12, padding:'2px 8px', borderRadius:10, background:d.available?C.successLight:C.dangerLight, color:d.available?C.success:C.danger, fontWeight:500 }}>{d.available?'예약 가능':'대기'}</span>
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}

function AppointmentsPage({ setDrawer }) {
  const [filter, setFilter] = useState('all');
  const filtered = APPOINTMENTS.filter(a => filter === 'all' || a.status === filter);
  const statusCounts = { waiting: APPOINTMENTS.filter(a=>a.status==='waiting').length, in_progress: APPOINTMENTS.filter(a=>a.status==='in_progress').length, completed: APPOINTMENTS.filter(a=>a.status==='completed').length, confirmed: APPOINTMENTS.filter(a=>a.status==='confirmed').length };

  return (
    <div style={{ maxWidth:1100, margin:'0 auto' }}>
      <div style={{ display:'flex', gap:16, marginBottom:20, flexWrap:'wrap' }}>
        {[{k:'waiting',l:'대기',icon:'⏳',c:C.warning},{k:'in_progress',l:'진행 중',icon:'🔵',c:C.primary},{k:'completed',l:'완료',icon:'✅',c:C.success},{k:'confirmed',l:'예정',icon:'📅',c:C.info}].map(s=>(
          <div key={s.k} style={{ flex:1, minWidth:140, background:'#fff', borderRadius:14, padding:'16px 20px', border:`1px solid ${C.border}`, cursor:'pointer', transition:'border-color 0.2s', borderLeftWidth:4, borderLeftColor:s.c }} onClick={()=>setFilter(filter===s.k?'all':s.k)}>
            <div style={{ fontSize:12, color:C.text2, marginBottom:4 }}>{s.icon} {s.l}</div>
            <div style={{ fontSize:24, fontWeight:800, color:s.c }}>{statusCounts[s.k]}</div>
          </div>
        ))}
      </div>
      <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:16 }}>
        <div style={{ background:'#fff', borderRadius:14, padding:22, border:`1px solid ${C.border}` }}>
          <h4 style={{ fontSize:15, fontWeight:700, marginBottom:14 }}>📊 주간 예약 현황</h4>
          <ResponsiveContainer width="100%" height={200}>
            <BarChart data={weeklyData}>
              <CartesianGrid strokeDasharray="3 3" stroke={C.border} />
              <XAxis dataKey="day" tick={{ fontSize:12 }} />
              <YAxis tick={{ fontSize:12 }} />
              <Tooltip />
              <Bar dataKey="appointments" fill={C.primaryLight} name="예약" radius={[4,4,0,0]} />
              <Bar dataKey="completed" fill={C.primary} name="완료" radius={[4,4,0,0]} />
            </BarChart>
          </ResponsiveContainer>
        </div>
        <div style={{ background:'#fff', borderRadius:14, padding:22, border:`1px solid ${C.border}` }}>
          <h4 style={{ fontSize:15, fontWeight:700, marginBottom:14 }}>🏥 진료과별 분포</h4>
          <ResponsiveContainer width="100%" height={200}>
            <PieChart>
              <Pie data={[{name:'내과',value:3},{name:'정형외과',value:2},{name:'피부과',value:1},{name:'이비인후과',value:1},{name:'소아과',value:1}]} cx="50%" cy="50%" outerRadius={70} dataKey="value" label={({name,percent})=>`${name} ${(percent*100).toFixed(0)}%`}>
                {[C.primary,C.secondary,C.info,C.success,C.warning].map((c,i)=> <Cell key={i} fill={c} /> )}
              </Pie>
              <Tooltip />
            </PieChart>
          </ResponsiveContainer>
        </div>
      </div>
      <div style={{ background:'#fff', borderRadius:14, padding:22, border:`1px solid ${C.border}`, marginTop:16 }}>
        <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:14 }}>
          <h4 style={{ fontSize:15, fontWeight:700 }}>📋 예약 목록</h4>
          <div style={{ display:'flex', gap:6 }}>
            {[{k:'all',l:'전체'},{k:'waiting',l:'대기'},{k:'in_progress',l:'진행'},{k:'completed',l:'완료'},{k:'confirmed',l:'예정'}].map(f=>(
              <button key={f.k} onClick={()=>setFilter(f.k)} style={{ padding:'5px 12px', borderRadius:16, border:`1px solid ${filter===f.k?C.primary:C.border}`, background:filter===f.k?C.primaryLight:'transparent', color:filter===f.k?C.primary:C.text2, fontSize:12, cursor:'pointer', fontWeight:500 }}>{f.l}</button>
            ))}
          </div>
        </div>
        <table style={{ width:'100%', borderCollapse:'collapse' }}>
          <thead><tr style={{ borderBottom:`2px solid ${C.border}` }}>
            {['환자명','진료과','담당의','일시','구분','증상','상태'].map(h=>(
              <th key={h} style={{ padding:'10px 10px', fontSize:12, fontWeight:600, color:C.text2, textAlign:'left' }}>{h}</th>
            ))}
          </tr></thead>
          <tbody>
            {filtered.map(a=>(
              <tr key={a.id} onClick={()=>setDrawer(a)} style={{ borderBottom:`1px solid ${C.border}`, cursor:'pointer', transition:'background 0.15s' }} onMouseEnter={e=>e.currentTarget.style.background=C.bg} onMouseLeave={e=>e.currentTarget.style.background='transparent'}>
                <td style={{ padding:'10px', fontSize:13, fontWeight:600 }}>{a.patient}</td>
                <td style={{ padding:'10px', fontSize:13 }}>{a.dept}</td>
                <td style={{ padding:'10px', fontSize:13, color:C.text2 }}>{a.doctor}</td>
                <td style={{ padding:'10px', fontSize:13, color:C.text2 }}>{a.date} {a.time}</td>
                <td style={{ padding:'10px' }}><span style={{ padding:'2px 8px', borderRadius:10, fontSize:11, fontWeight:500, background:a.type==='초진'?C.primaryLight:C.infoLight, color:a.type==='초진'?C.primary:C.info }}>{a.type}</span></td>
                <td style={{ padding:'10px', fontSize:12, color:C.text2, maxWidth:150, overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap' }}>{a.symptoms}</td>
                <td style={{ padding:'10px' }}><Badge status={a.status} /></td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>
    </div>
  );
}

function ChatPage({ onToast }) {
  const [activeChat, setActiveChat] = useState('CH-01');
  const [input, setInput] = useState('');
  const [messages, setMessages] = useState(CHAT_MSGS);
  const chat = CHAT_LIST.find(c=>c.id===activeChat);
  const msgs = messages[activeChat] || [];
  const bottomRef = useRef(null);
  useEffect(() => { bottomRef.current?.scrollIntoView({ behavior:'smooth' }); }, [msgs.length, activeChat]);
  const send = () => {
    if(!input.trim()) return;
    setMessages(prev => ({...prev, [activeChat]: [...(prev[activeChat]||[]), { from:'doctor', text:input, time: new Date().toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit'}) }]}));
    setInput('');
  };

  return (
    <div style={{ maxWidth:1100, margin:'0 auto', display:'flex', height:'calc(100vh - 220px)', background:'#fff', borderRadius:14, border:`1px solid ${C.border}`, overflow:'hidden' }}>
      <div style={{ width:300, borderRight:`1px solid ${C.border}`, display:'flex', flexDirection:'column' }}>
        <div style={{ padding:14, borderBottom:`1px solid ${C.border}` }}>
          <input placeholder="환자 검색..." style={{ width:'100%', padding:'8px 12px', borderRadius:8, border:`1px solid ${C.border}`, fontSize:13, outline:'none' }} />
        </div>
        <div style={{ flex:1, overflowY:'auto' }} className="scrollbar-hide">
          {CHAT_LIST.map(c=>(
            <div key={c.id} onClick={()=>setActiveChat(c.id)} style={{ display:'flex', gap:10, padding:'14px 16px', cursor:'pointer', background:activeChat===c.id?C.primaryLight:'transparent', borderBottom:`1px solid ${C.border}` }}>
              <div style={{ fontSize:26, flexShrink:0 }}>{c.photo}</div>
              <div style={{ flex:1, minWidth:0 }}>
                <div style={{ display:'flex', justifyContent:'space-between' }}>
                  <span style={{ fontSize:14, fontWeight:600 }}>{c.patient}</span>
                  <span style={{ fontSize:11, color:C.text3 }}>{c.time}</span>
                </div>
                <div style={{ fontSize:12, color:C.text2, overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap', marginTop:2 }}>{c.lastMsg}</div>
              </div>
              {c.unread>0 && <div style={{ width:18, height:18, borderRadius:9, background:C.primary, color:'#fff', fontSize:10, fontWeight:700, display:'flex', alignItems:'center', justifyContent:'center', flexShrink:0, marginTop:4 }}>{c.unread}</div>}
            </div>
          ))}
        </div>
      </div>
      <div style={{ flex:1, display:'flex', flexDirection:'column' }}>
        <div style={{ padding:'14px 20px', borderBottom:`1px solid ${C.border}`, display:'flex', alignItems:'center', gap:10 }}>
          <div style={{ fontSize:22 }}>{chat?.photo}</div>
          <div><div style={{ fontSize:15, fontWeight:600 }}>{chat?.patient}</div></div>
          <div style={{ flex:1 }} />
          <button onClick={()=>onToast('파일을 첨부합니다.')} style={{ padding:'6px 12px', borderRadius:8, border:`1px solid ${C.border}`, background:'transparent', fontSize:12, cursor:'pointer' }}>📎 파일 첨부</button>
        </div>
        <div style={{ flex:1, overflowY:'auto', padding:20, display:'flex', flexDirection:'column', gap:10, background:C.bg }} className="scrollbar-hide">
          {msgs.map((m,i)=>(
            <div key={i} style={{ display:'flex', justifyContent:m.from==='doctor'?'flex-end':'flex-start' }}>
              <div style={{ maxWidth:'65%', padding:'10px 14px', borderRadius:14, background:m.from==='doctor'?C.primary:'#fff', color:m.from==='doctor'?'#fff':C.text, fontSize:13, lineHeight:1.5, boxShadow:m.from==='doctor'?'none':'0 1px 3px rgba(0,0,0,0.06)', borderBottomRightRadius:m.from==='doctor'?4:14, borderBottomLeftRadius:m.from==='doctor'?14:4 }}>
                {m.text}
                <div style={{ fontSize:10, color:m.from==='doctor'?'rgba(255,255,255,0.7)':C.text3, marginTop:4, textAlign:'right' }}>{m.time}</div>
              </div>
            </div>
          ))}
          <div ref={bottomRef} />
        </div>
        <div style={{ padding:'12px 20px', borderTop:`1px solid ${C.border}`, display:'flex', gap:8 }}>
          <input value={input} onChange={e=>setInput(e.target.value)} onKeyDown={e=>e.key==='Enter'&&send()} placeholder="상담 메시지 입력..." style={{ flex:1, padding:'10px 14px', borderRadius:10, border:`1px solid ${C.border}`, fontSize:13, outline:'none' }} />
          <button onClick={send} style={{ padding:'8px 18px', borderRadius:10, background:C.primary, color:'#fff', border:'none', fontSize:13, fontWeight:600, cursor:'pointer' }}>전송</button>
        </div>
      </div>
    </div>
  );
}

function ScheduleSettingsPage({ onToast }) {
  const [selectedDr, setSelectedDr] = useState('김영수');
  const days = ['월','화','수','목','금','토'];
  const hours = ['09:00','09:30','10:00','10:30','11:00','11:30','12:00','14:00','14:30','15:00','15:30','16:00','16:30','17:00'];
  const [blocks, setBlocks] = useState({ '월':['09:00','09:30','10:00','10:30','11:00','14:00','14:30','15:00'], '화':['09:00','09:30','10:00','10:30','11:00','14:00','14:30','15:00'], '수':['09:00','09:30','10:00','10:30'], '목':['09:00','09:30','10:00','10:30','11:00','14:00','14:30','15:00','15:30','16:00'], '금':['09:00','09:30','10:00','10:30','11:00','14:00'], '토':[] });
  const toggle = (day, hour) => {
    setBlocks(prev => {
      const arr = prev[day] || [];
      return { ...prev, [day]: arr.includes(hour) ? arr.filter(h=>h!==hour) : [...arr, hour] };
    });
  };

  return (
    <div style={{ maxWidth:1100, margin:'0 auto' }}>
      <div style={{ display:'flex', gap:16, marginBottom:20 }}>
        <div style={{ width:260, background:'#fff', borderRadius:14, padding:20, border:`1px solid ${C.border}` }}>
          <h4 style={{ fontSize:14, fontWeight:700, marginBottom:12 }}>의료진 목록</h4>
          {DOCTORS.map(d=>(
            <div key={d.id} onClick={()=>setSelectedDr(d.name)} style={{ display:'flex', alignItems:'center', gap:10, padding:'10px 12px', borderRadius:8, cursor:'pointer', background:selectedDr===d.name?C.primaryLight:'transparent', marginBottom:4, transition:'background 0.15s' }}>
              <span style={{ fontSize:20 }}>{d.photo}</span>
              <div><div style={{ fontSize:13, fontWeight:selectedDr===d.name?600:400, color:selectedDr===d.name?C.primary:C.text }}>{d.name}</div><div style={{ fontSize:11, color:C.text3 }}>{d.dept}</div></div>
            </div>
          ))}
        </div>
        <div style={{ flex:1, background:'#fff', borderRadius:14, padding:22, border:`1px solid ${C.border}` }}>
          <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:16 }}>
            <h4 style={{ fontSize:15, fontWeight:700 }}>📅 {selectedDr} 전문의 — 진료 가능 시간</h4>
            <button onClick={()=>onToast('스케줄이 저장되었습니다.')} style={{ padding:'8px 16px', borderRadius:8, background:C.primary, color:'#fff', border:'none', fontSize:13, fontWeight:600, cursor:'pointer' }}>저장</button>
          </div>
          <div style={{ overflowX:'auto' }}>
            <div style={{ display:'grid', gridTemplateColumns:'70px repeat(6, 1fr)', gap:1, background:C.border, borderRadius:10, overflow:'hidden', minWidth:550 }}>
              <div style={{ background:C.bg, padding:8 }} />
              {days.map(d=><div key={d} style={{ background:C.bg, padding:'8px 0', fontSize:13, fontWeight:600, textAlign:'center' }}>{d}</div>)}
              {hours.map(h=>(
                <React.Fragment key={h}>
                  <div style={{ background:'#fff', padding:'6px 8px', fontSize:11, color:C.text2, display:'flex', alignItems:'center' }}>{h}</div>
                  {days.map(d=>{
                    const active = (blocks[d]||[]).includes(h);
                    return <div key={d} onClick={()=>toggle(d,h)} style={{ background:active?C.primaryLight:'#fff', cursor:'pointer', display:'flex', alignItems:'center', justifyContent:'center', transition:'background 0.15s', minHeight:28 }}>{active && <div style={{ width:20, height:4, borderRadius:2, background:C.primary }} />}</div>;
                  })}
                </React.Fragment>
              ))}
            </div>
          </div>
          <div style={{ marginTop:16, display:'flex', gap:12, alignItems:'center', fontSize:12, color:C.text2 }}>
            <div style={{ display:'flex', alignItems:'center', gap:4 }}><div style={{ width:14, height:14, borderRadius:4, background:C.primaryLight, border:`1px solid ${C.primary}` }} /><span>진료 가능</span></div>
            <div style={{ display:'flex', alignItems:'center', gap:4 }}><div style={{ width:14, height:14, borderRadius:4, background:'#fff', border:`1px solid ${C.border}` }} /><span>진료 불가</span></div>
            <span style={{ marginLeft:8 }}>클릭하여 토글</span>
          </div>
        </div>
      </div>
      <div style={{ background:'#fff', borderRadius:14, padding:22, border:`1px solid ${C.border}` }}>
        <h4 style={{ fontSize:15, fontWeight:700, marginBottom:14 }}>🚫 예외 일정 (휴가 · 학회)</h4>
        <table style={{ width:'100%', borderCollapse:'collapse' }}>
          <thead><tr style={{ borderBottom:`2px solid ${C.border}` }}>
            {['의사','유형','시작일','종료일','사유',''].map(h=><th key={h} style={{ padding:'8px 10px', fontSize:12, fontWeight:600, color:C.text2, textAlign:'left' }}>{h}</th>)}
          </tr></thead>
          <tbody>
            {[{dr:'박준호',type:'학회',from:'2026-04-15',to:'2026-04-17',reason:'대한외과학회 춘계학술대회'},{dr:'윤지혜',type:'휴가',from:'2026-04-20',to:'2026-04-22',reason:'개인 휴가'}].map((e,i)=>(
              <tr key={i} style={{ borderBottom:`1px solid ${C.border}` }}>
                <td style={{ padding:'10px', fontSize:13 }}>{e.dr}</td>
                <td style={{ padding:'10px' }}><span style={{ padding:'2px 8px', borderRadius:10, fontSize:11, fontWeight:500, background:e.type==='학회'?C.infoLight:C.warningLight, color:e.type==='학회'?C.info:C.warning }}>{e.type}</span></td>
                <td style={{ padding:'10px', fontSize:13 }}>{e.from}</td>
                <td style={{ padding:'10px', fontSize:13 }}>{e.to}</td>
                <td style={{ padding:'10px', fontSize:13, color:C.text2 }}>{e.reason}</td>
                <td style={{ padding:'10px' }}><button style={{ padding:'4px 10px', borderRadius:6, border:`1px solid ${C.border}`, background:'transparent', fontSize:12, cursor:'pointer' }}>수정</button></td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>
    </div>
  );
}

function SettingsPage({ onToast }) {
  return (
    <div style={{ maxWidth:700, margin:'0 auto' }}>
      <div style={{ background:'#fff', borderRadius:14, padding:24, border:`1px solid ${C.border}`, marginBottom:16 }}>
        <h4 style={{ fontSize:15, fontWeight:700, marginBottom:16 }}>🏥 병원 정보</h4>
        {[{l:'병원명',v:'서울메디컬센터'},{l:'대표원장',v:'김영수'},{l:'전화',v:'02-1234-5678'},{l:'주소',v:'서울시 강남구 테헤란로 123'},{l:'진료시간',v:'09:00 ~ 18:00 (점심 12:00~13:00)'}].map(f=>(
          <div key={f.l} style={{ display:'flex', gap:12, alignItems:'center', marginBottom:10 }}>

            <input defaultValue={f.v} style={{ flex:1, padding:'8px 12px', borderRadius:8, border:`1px solid ${C.border}`, fontSize:13, outline:'none' }} />
          </div>
        ))}
        <button onClick={()=>onToast('병원 정보가 저장되었습니다.')} style={{ marginTop:8, padding:'10px 20px', borderRadius:8, background:C.primary, color:'#fff', border:'none', fontSize:13, fontWeight:600, cursor:'pointer' }}>저장</button>

// ── App ──
const TABS = [
  { id:'home', label:'예약하기' },
  { id:'appointments', label:'예약 현황' },
  { id:'chat', label:'상담 채팅' },
  { id:'schedule', label:'스케줄 설정' },
  { id:'settings', label:'설정' },
];

const PAGE_META = {
  home: { title:'진료 예약', desc:'진료과와 의사를 선택하여 예약하세요', kpis:[{label:'진료과',value:'6개'},{label:'등록 의사',value:'6명'},{label:'오늘 빈 슬롯',value:'14건'}] },
  appointments: { title:'예약 현황', desc:'오늘의 예약 현황을 확인하고 관리하세요', kpis:[{label:'오늘 예약',value:'8건'},{label:'대기 중',value:'2건'},{label:'완료',value:'1건'}] },
  chat: { title:'상담 채팅', desc:'환자와 실시간으로 소통하세요', kpis:[{label:'활성 채팅',value:'4건'},{label:'읽지 않음',value:'4건'},{label:'오늘 상담',value:'6건'}] },
  schedule: { title:'스케줄 설정', desc:'의료진의 진료 가능 시간을 관리하세요', kpis:[{label:'등록 의사',value:'6명'},{label:'주간 슬롯',value:'48건'},{label:'예외 일정',value:'2건'}] },
  settings: { title:'설정', desc:'병원 정보 및 시스템 설정', kpis:[{label:'진료과',value:'6개'},{label:'의료진',value:'6명'},{label:'알림',value:'활성'}] },
};

function App() {
  const [tab, setTab] = useState('home');
  const [drawer, setDrawer] = useState(null);
  const [toast, setToast] = useState(null);
  const meta = PAGE_META[tab];

  const renderContent = () => {
    switch(tab) {
      case 'home': return <HomePage setDrawer={setDrawer} />;
      case 'appointments': return <AppointmentsPage setDrawer={setDrawer} />;
      case 'chat': return <ChatPage onToast={setToast} />;
      case 'schedule': return <ScheduleSettingsPage onToast={setToast} />;
      case 'settings': return <SettingsPage onToast={setToast} />;
      default: return <HomePage setDrawer={setDrawer} />;
    }
  };

  return (
    <div style={{ width:'100%', minHeight:'100vh', background:C.bg }}>
      {/* Top nav */}
      <header style={{ position:'sticky', top:0, zIndex:100, background:C.surface, borderBottom:`1px solid ${C.border}`, display:'flex', alignItems:'center', height:56, padding:'0 28px', gap:6 }}>
        <div style={{ display:'flex', alignItems:'center', gap:8, marginRight:24 }}>
          <div style={{ width:32, height:32, borderRadius:8, background:`linear-gradient(135deg, ${C.primary}, ${C.accent})`, display:'flex', alignItems:'center', justifyContent:'center', color:'#fff', fontSize:16, fontWeight:800 }}>M</div>
          <span style={{ fontSize:16, fontWeight:700, color:C.text }}>메디케어</span>
        </div>
        {TABS.map(t=>(
          <button key={t.id} onClick={()=>setTab(t.id)} style={{ padding:'8px 16px', borderRadius:8, border:'none', cursor:'pointer', background:tab===t.id?C.primaryLight:'transparent', color:tab===t.id?C.primary:C.text2, fontSize:14, fontWeight:tab===t.id?600:400, transition:'all 0.15s', fontFamily:'inherit' }}>{t.label}</button>
        ))}
        <div style={{ flex:1 }} />
        <div style={{ position:'relative' }}><input placeholder="검색..." style={{ padding:'7px 12px 7px 28px', borderRadius:8, border:`1px solid ${C.border}`, fontSize:13, width:180, outline:'none' }} /><span style={{ position:'absolute', left:8, top:'50%', transform:'translateY(-50%)', fontSize:13 }}>🔍</span></div>
        <div style={{ position:'relative', cursor:'pointer', marginLeft:8 }}><span style={{ fontSize:18 }}>🔔</span><div style={{ position:'absolute', top:-4, right:-4, width:14, height:14, borderRadius:7, background:C.danger, color:'#fff', fontSize:8, fontWeight:700, display:'flex', alignItems:'center', justifyContent:'center' }}>4</div></div>
        <div style={{ width:32, height:32, borderRadius:16, background:C.primaryLight, display:'flex', alignItems:'center', justifyContent:'center', fontSize:14, marginLeft:8, cursor:'pointer' }}>👤</div>
      </header>

      {/* Hero banner */}
      <div style={{ background:`linear-gradient(135deg, ${C.primary}, ${C.accent})`, padding:'28px 32px', color:'#fff' }}>
        <div style={{ maxWidth:1100, margin:'0 auto' }}>
          <h1 style={{ fontSize:22, fontWeight:800 }}>{meta.title}</h1>
          <p style={{ fontSize:13, opacity:0.85, marginTop:4 }}>{meta.desc}</p>
          <div style={{ display:'flex', gap:32, marginTop:14 }}>
            {meta.kpis.map(k=>(
              <div key={k.label}><div style={{ fontSize:11, opacity:0.7 }}>{k.label}</div><div style={{ fontSize:20, fontWeight:800, marginTop:2 }}>{k.value}</div></div>
            ))}
          </div>
        </div>
      </div>

      {/* Content */}
      <main style={{ padding:'24px 32px' }}>
        <div key={tab} style={{ animation:'fadeIn 0.3s ease' }}>
          {renderContent()}
        </div>
      </main>

      <Drawer item={drawer} onClose={()=>setDrawer(null)} onToast={setToast} />
      {toast && <Toast msg={toast} onClose={()=>setToast(null)} />}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
