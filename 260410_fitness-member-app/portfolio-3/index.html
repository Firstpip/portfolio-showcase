function SideNavItem({ icon, label, active, onClick, badge }) {

function TabUnderline({ label, active, onClick }) {

function TrainerDetail({ trainer }) {
  if (!trainer) return <div style={{ display:'flex', alignItems:'center', justifyContent:'center', height:300, color:C.text3, fontSize:14 }}>트레이너를 선택하세요</div>;
  const t = trainer;
  return (
    <div style={{ animation:'fadeIn 0.3s ease' }}>
      <div style={{ display:'flex', alignItems:'center', gap:14, marginBottom:20 }}>
        <div style={{ fontSize:42 }}>{t.photo}</div>
        <div><div style={{ fontSize:18, fontWeight:700 }}>{t.name}</div><div style={{ fontSize:13, color:C.text2, marginTop:2 }}>{t.center} · {t.specialty}</div>
          <div style={{ display:'flex', gap:6, marginTop:6 }}>{t.certifications.map(c=><span key={c} style={{ padding:'2px 8px', borderRadius:10, background:C.primaryLight, color:C.primary, fontSize:11, fontWeight:500 }}>{c}</span>)}</div>
        </div>
      </div>
      <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:10, marginBottom:16 }}>
        {[{l:'담당 회원',v:`${t.members}명`,c:C.primary},{l:'주간 수업',v:`${t.classesWeek}회`,c:C.info},{l:'회원 유지율',v:`${t.retentionRate}%`,c:C.success},{l:'매출 기여',v:`${t.revenueContrib}만`,c:C.warning}].map(d=>(
          <div key={d.l} style={{ padding:'12px 14px', borderRadius:10, background:C.bg, border:`1px solid ${C.border}` }}>
            <div style={{ fontSize:11, color:C.text3 }}>{d.l}</div>
            <div style={{ fontSize:18, fontWeight:700, color:d.c, marginTop:2 }}>{d.v}</div>
          </div>

      <div style={{ background:C.surface, borderRadius:10, padding:14, border:`1px solid ${C.border}` }}>
        <h5 style={{ fontSize:13, fontWeight:600, marginBottom:8 }}>📌 관리자 메모</h5>

}

  { id:'migration', label:'데이터 마이그레이션', icon:'📥' },
];

function App() {

  const [toast, setToast] = useState(null);

    switch(section) {
      case 'dashboard': return <DashboardPage setSelected={setSelected} />;
      case 'trainers': return <TrainersPage setSelected={setSelected} />;
      case 'contents': return <ContentsPage setSelected={setSelected} />;
      case 'migration': return <MigrationPage onToast={setToast} />;
      case 'settings': return <SettingsPage onToast={setToast} />;

    }
  };

  const BREADCRUMB = { dashboard:'운영 현황', trainers:'트레이너 분석', contents:'콘텐츠 관리', migration:'데이터 마이그레이션', settings:'설정' };

  return (
    <div style={{ display:'flex', width:'100%', height:'100vh', background:C.bg, overflow:'hidden' }}>
      {/* Bright sidebar */}
      <nav style={{ width:240, background:'#fff', borderRight:`1px solid ${C.border}`, display:'flex', flexDirection:'column', paddingTop:16, flexShrink:0 }}>
        <div style={{ padding:'0 16px 16px', display:'flex', alignItems:'center', gap:8 }}>
          <div style={{ width:32, height:32, borderRadius:8, background:`linear-gradient(135deg, ${C.primary}, ${C.secondary})`, display:'flex', alignItems:'center', justifyContent:'center', color:'#fff', fontSize:15, fontWeight:800 }}>F</div>

          {NAV_ITEMS.map(item=>(
            <SideNavItem key={item.id} icon={item.icon} label={item.label} active={section===item.id} onClick={()=>setSection(item.id)} badge={item.id==='migration'?'1':null} />
          ))}
        </div>
        <div style={{ padding:'0 8px 8px' }}>
          <SideNavItem icon="⚙️" label="설정" active={section==='settings'} onClick={()=>setSection('settings')} />
        </div>
        <div style={{ padding:'12px 16px', borderTop:`1px solid ${C.border}`, display:'flex', alignItems:'center', gap:8 }}>
          <div style={{ width:28, height:28, borderRadius:14, background:C.primaryLight, display:'flex', alignItems:'center', justifyContent:'center', fontSize:12 }}>👤</div>
          <div><div style={{ fontSize:12, fontWeight:500 }}>관리자</div><div style={{ fontSize:10, color:C.text3 }}>3개 센터 관리</div></div>

      </nav>

      {/* Main */}

        {/* App bar */}
        <header style={{ height:40, borderBottom:`1px solid ${C.border}`, display:'flex', alignItems:'center', padding:'0 16px', gap:8, background:C.surface, flexShrink:0 }}>
          <span style={{ fontSize:12, color:C.text3 }}>핏애널리틱스</span>
          <span style={{ fontSize:12, color:C.text3 }}>/</span>

function Toast({ msg, onClose }) {
  React.useEffect(() => { const t = setTimeout(onClose, 2500); return () => clearTimeout(t); }, []);
  return <div style={{ position:'fixed', bottom:24, left:'50%', transform:'translateX(-50%)', background:C.text, color:'#fff', padding:'12px 24px', borderRadius:10, fontSize:14, fontWeight:500, zIndex:2000, animation:'fadeIn 0.2s ease', boxShadow:'0 6px 24px rgba(0,0,0,0.15)' }}>{msg}</div>;
}
