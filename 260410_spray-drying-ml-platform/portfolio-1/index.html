function heatColor(v) {
  const stops = [
    [0, '#1e3a5f'], [0.25,'#1e5c8c'], [0.5,'#6366F1'], [0.75,'#22D3EE'], [1,'#10B981']
  ];
  let lo=stops[0], hi=stops[stops.length-1];
  for(let i=0;i<stops.length-1;i++) { if(v>=stops[i][0]&&v<=stops[i+1][0]){lo=stops[i];hi=stops[i+1];break;} }
  const t = (v-lo[0])/(hi[0]-lo[0]);
  const hex2rgb = h => [parseInt(h.slice(1,3),16),parseInt(h.slice(3,5),16),parseInt(h.slice(5,7),16)];
  const a=hex2rgb(lo[1]), b=hex2rgb(hi[1]);
  const r=Math.round(a[0]+(b[0]-a[0])*t), g=Math.round(a[1]+(b[1]-a[1])*t), bl=Math.round(a[2]+(b[2]-a[2])*t);
  return `rgb(${r},${g},${bl})`;
}

function PredictionPage() {
  const [inletTemp, setInletTemp] = useState(200);
  const [flowRate, setFlowRate] = useState(12);
  const [rpm, setRpm] = useState(14000);
  const [pressure, setPressure] = useState(2.5);
  const [concentration, setConc] = useState(30);
  const [predicted, setPredicted] = useState(null);
  const [loading, setLoading] = useState(false);
  const [warn, setWarn] = useState(false);

    setLoading(true);
    setTimeout(() => {
      const moisture = Math.max(1.2, 5.8 - (inletTemp-180)*0.04 - flowRate*0.08 + (Math.random()-0.5)*0.3);

function MonitoringPage() {
  const [epoch, setEpoch] = useState(35);

  const logRef = useRef(null);

  useEffect(() => {
    if (logRef.current) logRef.current.scrollTop = logRef.current.scrollHeight;
  }, [epoch]);

  const toggleRun = () => {
    if (running) { setRunning(false); return; }
    setRunning(true);
    setEpoch(35);
    let e = 35;
    const iv = setInterval(() => {
      e += 1;
      setEpoch(e);
      if (e >= 50) { clearInterval(iv); setRunning(false); }
    }, 500);
  };

  const pct = Math.round((epoch / 50) * 100);

  return (
    <div>
      <div className="page-title">모델 학습 상태 실시간 모니터링</div>

      </div>

              <div className="card-title">📋 보고서 미리보기</div>
              <div className="card-sub">SSE 스트리밍 실시간 렌더링</div>
            </div>
            {done && <div className="result-badge badge-success">✓ 생성 완료</div>}
          </div>
          {!text && !generating && (
            <div style={{textAlign:'center', padding:'40px 0', color:'var(--text2)'}}>
              <div style={{fontSize:36, marginBottom:12}}>📄</div>
              <div style={{fontSize:13}}>생성 버튼을 눌러<br/>GPT-4o 보고서를 시작하세요</div>
            </div>
          )}
          {(text || generating) && (
            <div className="report-area">
              {text}
              {generating && <span className="typing-cursor" />}
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
