<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>멀티 공정 R&D 지식 관리 플랫폼 — 구현 데모</title>
<link rel="preconnect" href="https://cdn.jsdelivr.net">
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" rel="stylesheet">
<script src="https://unpkg.com/prop-types@15/prop-types.min.js"></script>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://unpkg.com/recharts@2.12.7/umd/Recharts.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --primary: #F59E0B;
  --primary-dark: #D97706;
  --accent: #FB923C;
  --bg: #111827;
  --surface: #1F2937;
  --surface2: #283548;
  --border: rgba(245,158,11,0.15);
  --border2: rgba(255,255,255,0.06);
  --text: #F9FAFB;
  --text2: #9CA3AF;
  --success: #34D399;
  --info: #60A5FA;
  --danger: #F87171;
  --sidebar-w: 240px;
}
html, body { width: 100%; height: 100%; background: var(--bg); color: var(--text); font-family: 'Pretendard', sans-serif; font-size: 14px; }
#root { display: flex; width: 100%; height: 100vh; overflow: hidden; }

/* BRIGHT SIDEBAR */
.sidebar {
  width: var(--sidebar-w); min-width: var(--sidebar-w);
  background: #1A2332; border-right: 1px solid var(--border);
  display: flex; flex-direction: column; overflow-y: auto;
}
.sidebar-header {
  padding: 20px 16px 16px;
  border-bottom: 1px solid var(--border2);
}
.logo-row { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; }
.logo-icon-wrap {
  width: 38px; height: 38px; border-radius: 10px;
  background: linear-gradient(135deg, var(--primary), var(--accent));
  display: flex; align-items: center; justify-content: center; font-size: 20px;
}
.logo-name { font-size: 14px; font-weight: 800; }
.logo-ver { font-size: 10px; color: var(--text2); }
.search-input {
  width: 100%; background: rgba(255,255,255,0.05);
  border: 1px solid var(--border2); border-radius: 8px;
  padding: 8px 12px; color: var(--text2); font-size: 12px;
  font-family: 'Pretendard', sans-serif; outline: none;
}
.search-input::placeholder { color: var(--text2); }
.search-input:focus { border-color: var(--primary); color: var(--text); }

.sidebar-section { padding: 12px 12px 4px; }
.sidebar-section-label { font-size: 10px; font-weight: 700; color: var(--text2); text-transform: uppercase; letter-spacing: 0.8px; padding: 0 6px 6px; }
.sidebar-btn {
  display: flex; align-items: center; gap: 8px;
  padding: 8px 10px; border-radius: 8px; cursor: pointer;
  color: var(--text2); font-size: 12px; font-weight: 500;
  transition: all 0.15s; width: 100%; border: none; background: none;
  font-family: 'Pretendard', sans-serif; text-align: left;
}
.sidebar-btn:hover { background: rgba(245,158,11,0.08); color: var(--text); }
.sidebar-btn.active { background: rgba(245,158,11,0.12); color: var(--primary); font-weight: 700; }
.sidebar-btn .icon { font-size: 14px; width: 18px; text-align: center; flex-shrink: 0; }
.sidebar-btn .count { margin-left: auto; font-size: 10px; background: rgba(245,158,11,0.15); color: var(--primary); padding: 2px 6px; border-radius: 6px; font-weight: 700; }

/* PROCESS CARD in SIDEBAR */
.process-card-mini {
  margin: 0 8px 6px;
  background: var(--surface2); border-radius: 8px; padding: 10px;
  cursor: pointer; border: 1px solid transparent; transition: all 0.15s;
}
.process-card-mini:hover { border-color: var(--border); }
.process-card-mini.selected { border-color: var(--primary); }
.pcm-name { font-size: 11px; font-weight: 700; margin-bottom: 4px; }
.pcm-stats { display: flex; gap: 10px; }
.pcm-stat { font-size: 10px; color: var(--text2); }
.pcm-dot { width: 6px; height: 6px; border-radius: 50%; display: inline-block; margin-right: 4px; }

.sidebar-footer {
  margin-top: auto; padding: 12px;
  border-top: 1px solid var(--border2);
}
.team-member { display: flex; align-items: center; gap: 8px; padding: 6px 8px; border-radius: 6px; cursor: pointer; }
.team-member:hover { background: rgba(255,255,255,0.04); }
.member-avatar { width: 26px; height: 26px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 700; color: #fff; flex-shrink: 0; }
.member-info-name { font-size: 11px; font-weight: 600; }
.member-info-role { font-size: 10px; color: var(--text2); }
.member-status { margin-left: auto; width: 7px; height: 7px; border-radius: 50%; }

/* MAIN */
.main-area { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
.main-topbar {
  height: 54px; background: var(--surface);
  border-bottom: 1px solid var(--border2);
  display: flex; align-items: center; padding: 0 24px; gap: 12px;
  flex-shrink: 0;
}
.breadcrumb { font-size: 13px; color: var(--text2); flex: 1; }
.breadcrumb strong { color: var(--text); }
.main-content { flex: 1; overflow-y: auto; padding: 24px; }

/* CARDS */
.page-header { margin-bottom: 20px; }
.page-h { font-size: 18px; font-weight: 800; margin-bottom: 4px; }
.page-p { font-size: 12px; color: var(--text2); }
.stat-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 20px; }
.stat-card {
  background: var(--surface); border: 1px solid var(--border2);
  border-radius: 10px; padding: 14px;
  position: relative; overflow: hidden;
}
.stat-card::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0;
  height: 3px; background: var(--primary);
}
.stat-label { font-size: 10px; color: var(--text2); font-weight: 600; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px; }
.stat-val { font-size: 22px; font-weight: 800; }
.stat-sub { font-size: 10px; color: var(--text2); margin-top: 3px; }
.card { background: var(--surface); border: 1px solid var(--border2); border-radius: 10px; padding: 18px; }
.card-hd { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 14px; }
.card-title { font-size: 13px; font-weight: 700; }
.card-sub { font-size: 10px; color: var(--text2); margin-top: 2px; }
.grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 20px; }

/* PROCESS HUB CARDS */
.process-hub-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; margin-bottom: 20px; }
.process-hub-card {
  background: var(--surface); border: 1px solid var(--border2);
  border-radius: 12px; padding: 18px; cursor: pointer;
  transition: all 0.2s; position: relative; overflow: hidden;
}
.process-hub-card:hover { border-color: var(--primary); transform: translateY(-2px); }
.process-hub-card.active { border-color: var(--primary); background: rgba(245,158,11,0.04); }
.phc-icon { font-size: 28px; margin-bottom: 10px; }
.phc-name { font-size: 14px; font-weight: 800; margin-bottom: 4px; }
.phc-desc { font-size: 11px; color: var(--text2); margin-bottom: 12px; }
.phc-stats { display: flex; gap: 12px; }
.phc-stat { text-align: center; flex: 1; background: rgba(255,255,255,0.04); border-radius: 6px; padding: 6px; }
.phc-stat-val { font-size: 14px; font-weight: 700; color: var(--primary); }
.phc-stat-label { font-size: 9px; color: var(--text2); margin-top: 2px; }
.phc-sparkline { height: 30px; margin-top: 10px; }

/* NOTE CARDS */
.note-list { display: flex; flex-direction: column; gap: 10px; }
.note-card {
  background: var(--surface2); border-radius: 8px; padding: 14px;
  cursor: pointer; border: 1px solid transparent; transition: all 0.15s;
}
.note-card:hover { border-color: var(--border); }
.nc-title { font-size: 13px; font-weight: 700; margin-bottom: 4px; }
.nc-preview { font-size: 11px; color: var(--text2); margin-bottom: 8px; line-height: 1.5; }
.nc-tags { display: flex; gap: 6px; flex-wrap: wrap; }
.nc-tag { font-size: 10px; padding: 2px 8px; border-radius: 4px; font-weight: 600; }
.tag-amber { background: rgba(245,158,11,0.15); color: var(--primary); }
.tag-blue { background: rgba(96,165,250,0.15); color: var(--info); }
.tag-green { background: rgba(52,211,153,0.15); color: var(--success); }
.nc-meta { font-size: 10px; color: var(--text2); margin-top: 6px; }

/* MODEL COMPARISON */
.model-radar-wrap { display: flex; gap: 20px; align-items: flex-start; }
.model-list { display: flex; flex-direction: column; gap: 8px; width: 220px; flex-shrink: 0; }
.model-item {
  background: var(--surface2); border-radius: 8px; padding: 12px;
  cursor: pointer; border: 2px solid transparent; transition: all 0.15s;
}
.model-item.selected { border-color: var(--primary); }
.model-item-name { font-size: 12px; font-weight: 700; margin-bottom: 4px; }
.model-item-date { font-size: 10px; color: var(--text2); margin-bottom: 8px; }
.model-metrics-row { display: flex; gap: 8px; }
.model-metric { flex: 1; text-align: center; }
.model-metric-val { font-size: 13px; font-weight: 700; }
.model-metric-label { font-size: 9px; color: var(--text2); }
.ensemble-slider { margin-top: 14px; }
.es-label { font-size: 11px; color: var(--text2); margin-bottom: 6px; }
.es-track { display: flex; align-items: center; gap: 8px; }
.es-input { flex: 1; accent-color: var(--primary); cursor: pointer; }
.es-val { font-size: 12px; font-weight: 700; color: var(--primary); min-width: 36px; text-align: right; }

/* COST SIMULATOR */
.cost-input-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 16px; }
.cost-input-item { background: var(--surface2); border-radius: 8px; padding: 12px; }
.ci-label { font-size: 10px; color: var(--text2); font-weight: 600; margin-bottom: 6px; }
.ci-track { display: flex; align-items: center; gap: 8px; }
.ci-input { flex: 1; accent-color: var(--primary); cursor: pointer; }
.ci-val { font-size: 12px; font-weight: 700; color: var(--primary); min-width: 50px; text-align: right; }

/* TABLE */
.mini-table { width: 100%; border-collapse: collapse; }
.mini-table th { font-size: 10px; color: var(--text2); font-weight: 600; padding: 8px 10px; border-bottom: 1px solid var(--border2); text-align: left; }
.mini-table td { font-size: 11px; padding: 9px 10px; border-bottom: 1px solid rgba(255,255,255,0.03); }

/* BADGE */
.badge { display: inline-flex; align-items: center; padding: 3px 8px; border-radius: 5px; font-size: 10px; font-weight: 700; }
.badge-amber { background: rgba(245,158,11,0.15); color: var(--primary); }
.badge-blue { background: rgba(96,165,250,0.15); color: var(--info); }
.badge-green { background: rgba(52,211,153,0.12); color: var(--success); }

.btn { padding: 8px 16px; border-radius: 8px; font-size: 12px; font-weight: 600; cursor: pointer; border: none; font-family: 'Pretendard', sans-serif; }
.btn-primary { background: var(--primary); color: #111827; }
.btn-ghost { background: rgba(255,255,255,0.06); color: var(--text2); }
.btn-ghost:hover { color: var(--text); }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect } = React;
const { RadarChart, Radar, PolarGrid, PolarAngleAxis, BarChart, Bar, XAxis, YAxis, CartesianGrid, Tooltip, ResponsiveContainer, Legend, AreaChart, Area, Cell } = Recharts;

// ─── DATA ───────────────────────────────────────────
const PROCESSES = [
  { id:'spray', icon:'🌫', name:'분무건조 공정', desc:'Spray Drying', experiments:47, predictions:312, models:3, active:true, spark:[22,18,35,28,41,37,47] },
  { id:'crystal', icon:'💎', name:'결정화 공정', desc:'Crystallization', experiments:31, predictions:198, models:2, active:true, spark:[12,20,15,28,22,31,29] },
  { id:'granul', icon:'⚙️', name:'과립화 공정', desc:'Granulation', experiments:24, predictions:142, models:2, active:false, spark:[8,12,18,14,22,20,24] },
];

const NOTES = [
  { id:1, title:'분무건조 v2.0 모델 피드백 반영 결과', preview:'4월 실험 데이터 12건 추가 후 MAE 0.097로 개선. 입구온도 205°C 조건에서 수분함량 안정적.', tags:['분무건조', 'v2.0', '피드백'], author:'김연구', date:'2026-04-10', tagClasses:['tag-amber','tag-blue','tag-green'] },
  { id:2, title:'결정화 공정 냉각 속도 최적화 메모', preview:'냉각 속도 1.5°C/min에서 결정 크기 분포 최적 (d50=180μm). 교반 속도 영향 추가 실험 필요.', tags:['결정화', '냉각', '실험'], author:'박결정', date:'2026-04-09', tagClasses:['tag-blue','tag-amber','tag-green'] },
  { id:3, title:'과립화 공정 바인더 농도 스크리닝', preview:'PVP 농도 3~5% 구간에서 과립 경도 목표(30N) 달성. 5% 초과 시 용해도 저하 관찰.', tags:['과립화', '바인더', 'PVP'], author:'이과립', date:'2026-04-08', tagClasses:['tag-green','tag-amber','tag-blue'] },
  { id:4, title:'하이브리드 모델 물리항 수식 정리', preview:'분무건조 물리 모델 수식 (Nusselt, Sherwood 무차원수) 정리 완료. FastAPI 백엔드 구현 연계 예정.', tags:['물리모델', '수식', 'FastAPI'], author:'김연구', date:'2026-04-07', tagClasses:['tag-amber','tag-blue','tag-amber'] },
];

const MODELS = [
  { id:'v1', name:'Baseline 회귀 (v1.0)', date:'2026-03-10', color:'#6B7280', metrics:[50,62,58,45,55], r2:0.841, mae:0.183, rmse:0.241 },
  { id:'v1.2', name:'피처 엔지니어링 (v1.2)', date:'2026-03-18', color:'#60A5FA', metrics:[62,74,68,60,70], r2:0.879, mae:0.142, rmse:0.196 },
  { id:'v2', name:'하이브리드 모델 (v2.0)', date:'2026-04-02', color:'#F59E0B', metrics:[85,78,90,82,88], r2:0.924, mae:0.097, rmse:0.134 },
];

const RADAR_AXES = [
  {subject:'예측 정확도'}, {subject:'신뢰구간'}, {subject:'범용성'}, {subject:'수렴 속도'}, {subject:'피처 중요도'},
];

const COST_BASE = [
  { condition:'현재 공정', cost: 24800, defect: 3.2, label:'현재' },
  { condition:'최적 조건 A', cost: 21200, defect: 1.8, label:'최적 A' },
  { condition:'최적 조건 B', cost: 22600, defect: 1.4, label:'최적 B' },
];

// ─── COMPONENTS ─────────────────────────────────────
function ProcessHub({ onProcess }) {
  const [selected, setSelected] = useState('spray');
  const sparkData = (arr) => arr.map((v,i) => ({i, v}));

  return (
    <div>
      <div className="page-header">
        <div className="page-h">멀티 공정 통합 관리</div>
        <div className="page-p">React Router v6 중첩 라우팅으로 각 공정의 독립 워크스페이스를 구성합니다</div>
      </div>
      <div className="stat-row">
        <div className="stat-card"><div className="stat-label">관리 중인 공정</div><div className="stat-val" style={{color:'var(--primary)'}}>3개</div><div className="stat-sub">분무건조·결정화·과립화</div></div>
        <div className="stat-card"><div className="stat-label">전체 실험 건수</div><div className="stat-val">102건</div><div className="stat-sub">전체 공정 누적</div></div>
        <div className="stat-card"><div className="stat-label">전체 예측 횟수</div><div className="stat-val">652회</div><div className="stat-sub">오늘 37회 실행</div></div>
        <div className="stat-card"><div className="stat-label">활성 모델</div><div className="stat-val" style={{color:'var(--success)'}}>7개</div><div className="stat-sub">공정별 체크포인트</div></div>
      </div>
      <div className="process-hub-grid">
        {PROCESSES.map(p => (
          <div key={p.id} className={`process-hub-card ${selected===p.id?'active':''}`}
            onClick={() => { setSelected(p.id); onProcess && onProcess(p.id); }}>
            <div className="phc-icon">{p.icon}</div>
            <div className="phc-name">{p.name}</div>
            <div className="phc-desc">{p.desc}</div>
            <div className="phc-stats">
              <div className="phc-stat"><div className="phc-stat-val">{p.experiments}</div><div className="phc-stat-label">실험 수</div></div>
              <div className="phc-stat"><div className="phc-stat-val">{p.predictions}</div><div className="phc-stat-label">예측 수</div></div>
              <div className="phc-stat"><div className="phc-stat-val">{p.models}</div><div className="phc-stat-label">모델 수</div></div>
            </div>
            <div className="phc-sparkline">
              <ResponsiveContainer width="100%" height={30}>
                <AreaChart data={sparkData(p.spark)} margin={{top:2,right:0,bottom:0,left:0}}>
                  <Area type="monotone" dataKey="v" stroke="#F59E0B" strokeWidth={1.5} fill="rgba(245,158,11,0.1)" dot={false} />
                </AreaChart>
              </ResponsiveContainer>
            </div>
            <div style={{marginTop:8, display:'flex', alignItems:'center', gap:6}}>
              <div className={`pcm-dot`} style={{background: p.active?'var(--success)':'#4B5563'}} />
              <span style={{fontSize:10, color: p.active?'var(--success)':'var(--text2)'}}>{p.active ? '활성' : '대기 중'}</span>
              {selected===p.id && <span className="badge badge-amber" style={{marginLeft:'auto'}}>선택됨</span>}
            </div>
          </div>
        ))}
      </div>
      <div className="card">
        <div className="card-hd">
          <div>
            <div className="card-title">📋 최근 공정 활동</div>
            <div className="card-sub">PostgreSQL GROUP BY 집계 쿼리 — 공정별 일별 활동 지표</div>
          </div>
        </div>
        <table className="mini-table">
          <thead>
            <tr><th>공정</th><th>오늘 예측</th><th>이번 주 실험</th><th>활성 모델</th><th>최근 정확도(R²)</th></tr>
          </thead>
          <tbody>
            {[
              {name:'분무건조', tp:18, we:4, am:3, r2:'0.924'},
              {name:'결정화', tp:12, we:2, am:2, r2:'0.887'},
              {name:'과립화', tp:7, we:1, am:2, r2:'0.861'},
            ].map(r=>(
              <tr key={r.name}>
                <td><strong>{r.name}</strong></td>
                <td>{r.tp}회</td>
                <td>{r.we}건</td>
                <td><span className="badge badge-amber">{r.am}개</span></td>
                <td><strong style={{color:'var(--success)'}}>{r.r2}</strong></td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>
    </div>
  );
}

function NotesPage() {
  const [search, setSearch] = useState('');
  const [selectedTag, setSelectedTag] = useState('전체');
  const [expanded, setExpanded] = useState(null);
  const tags = ['전체', '분무건조', '결정화', '과립화', '물리모델', '피드백'];
  const filtered = NOTES.filter(n => {
    const matchSearch = !search || n.title.includes(search) || n.preview.includes(search);
    const matchTag = selectedTag === '전체' || n.tags.includes(selectedTag);
    return matchSearch && matchTag;
  });

  return (
    <div>
      <div className="page-header">
        <div className="page-h">팀 협업 실험 노트</div>
        <div className="page-p">PostgreSQL JSONB + GIN 인덱스 전문 검색 — 태그·공정·날짜 복합 필터</div>
      </div>
      <div className="stat-row">
        <div className="stat-card"><div className="stat-label">전체 노트</div><div className="stat-val" style={{color:'var(--primary)'}}>{NOTES.length}</div><div className="stat-sub">전체 공정 합산</div></div>
        <div className="stat-card"><div className="stat-label">이번 주 작성</div><div className="stat-val">4건</div><div className="stat-sub">4명 참여</div></div>
        <div className="stat-card"><div className="stat-label">전문 검색 인덱스</div><div className="stat-val" style={{fontSize:14}}>GIN</div><div className="stat-sub">PostgreSQL Full-Text</div></div>
        <div className="stat-card"><div className="stat-label">태그 유형</div><div className="stat-val">18개</div><div className="stat-sub">공정·기술·도메인</div></div>

      <div className="card" style={{marginBottom:16}}>

              </div>
            )}

              {note.tags.map((t,i) => (
                <span key={t} className={`nc-tag ${note.tagClasses[i]}`}>{t}</span>

            <div className="nc-meta">{note.author} · {note.date} · {expanded===note.id ? '접기 ▲' : '펼치기 ▼'}</div>

  );
}

function ModelComparePage() {
  const [selectedIds, setSelectedIds] = useState(['v1','v2']);
  const [weights, setWeights] = useState({v1:0.2, 'v1.2':0.3, v2:0.5});

  const toggleModel = (id) => {
    setSelectedIds(prev => prev.includes(id) ? prev.filter(x=>x!==id) : [...prev, id]);
  };

  const radarData = RADAR_AXES.map((ax, i) => {
    const row = {subject: ax.subject};
    MODELS.forEach(m => { row[m.id] = m.metrics[i]; });
    return row;
  });

  const ensembleR2 = Object.entries(weights).reduce((acc,[id,w]) => {
    const m = MODELS.find(m => m.id === id);
    return acc + (m ? m.r2 * w : 0);
  }, 0);

  return (
    <div>
      <div className="page-header">
        <div className="page-h">모델 버전 비교 및 앙상블</div>
        <div className="page-p">Recharts RadarChart 다차원 성능 비교 + 앙상블 가중치 슬라이더 실시간 재계산</div>
      </div>
      <div className="stat-row">
        <div className="stat-card"><div className="stat-label">비교 모델 수</div><div className="stat-val" style={{color:'var(--primary)'}}>{MODELS.length}개</div><div className="stat-sub">버전 체크포인트</div></div>
        <div className="stat-card"><div className="stat-label">최고 단일 R²</div><div className="stat-val" style={{color:'var(--success)'}}>0.924</div><div className="stat-sub">v2.0 하이브리드</div></div>
        <div className="stat-card"><div className="stat-label">앙상블 R² (추정)</div><div className="stat-val" style={{color:'var(--primary)'}}>{ensembleR2.toFixed(3)}</div><div className="stat-sub">가중 평균</div></div>
        <div className="stat-card"><div className="stat-label">차트 유형</div><div className="stat-val" style={{fontSize:14}}>RadarChart</div><div className="stat-sub">Recharts 다차원</div></div>
      </div>
      <div className="grid-2" style={{alignItems:'start'}}>
        <div className="card">
          <div className="card-hd">
            <div>
              <div className="card-title">📡 모델 성능 레이더 차트</div>
              <div className="card-sub">5개 지표 다차원 비교 — Recharts RadarChart</div>
            </div>
          </div>
          <ResponsiveContainer width="100%" height={260}>
            <RadarChart data={radarData}>
              <PolarGrid stroke="rgba(255,255,255,0.1)" />
              <PolarAngleAxis dataKey="subject" tick={{fill:'#9CA3AF', fontSize:11}} />
              {MODELS.filter(m => selectedIds.includes(m.id)).map(m => (
                <Radar key={m.id} name={m.name} dataKey={m.id}
                  stroke={m.color} fill={m.color} fillOpacity={0.15} strokeWidth={2} />
              ))}
              <Legend wrapperStyle={{fontSize:11}} />
            </RadarChart>
          </ResponsiveContainer>
        </div>
        <div className="card">
          <div className="card-hd">
            <div>
              <div className="card-title">⚖️ 앙상블 가중치 설정</div>
              <div className="card-sub">슬라이더 조정 → React 실시간 가중 평균 재계산</div>
            </div>
            <span className="badge badge-green">R² {ensembleR2.toFixed(3)}</span>
          </div>
          <div className="model-list">
            {MODELS.map(m => (
              <div key={m.id} className={`model-item ${selectedIds.includes(m.id)?'selected':''}`}
                onClick={() => toggleModel(m.id)}>
                <div style={{display:'flex', alignItems:'center', gap:8, marginBottom:6}}>
                  <div style={{width:10, height:10, borderRadius:'50%', background:m.color, flexShrink:0}} />
                  <div className="model-item-name">{m.name}</div>
                </div>
                <div className="model-item-date">{m.date}</div>
                <div className="model-metrics-row">
                  {[{l:'R²',v:m.r2},{l:'MAE',v:m.mae},{l:'RMSE',v:m.rmse}].map(x=>(
                    <div key={x.l} className="model-metric">
                      <div className="model-metric-val" style={{color:m.color, fontSize:12}}>{x.v}</div>
                      <div className="model-metric-label">{x.l}</div>
                    </div>
                  ))}
                </div>
                {selectedIds.includes(m.id) && (
                  <div className="ensemble-slider" onClick={e => e.stopPropagation()}>
                    <div className="es-label">가중치: {(weights[m.id]*100).toFixed(0)}%</div>
                    <div className="es-track">
                      <input type="range" min={0} max={100} value={weights[m.id]*100}
                        onChange={e => setWeights(prev => ({...prev, [m.id]: +e.target.value/100}))}
                        className="es-input" />
                      <span className="es-val">{(weights[m.id]*100).toFixed(0)}%</span>
                    </div>
                  </div>
                )}
              </div>
            ))}
          </div>
        </div>
      </div>
    </div>
  );
}

function CostPage() {
  const [rawMaterial, setRawMaterial] = useState(12000);
  const [energyCost, setEnergy] = useState(350);
  const [batchSize, setBatch] = useState(500);
  const [defectPenalty, setDefect] = useState(80000);

  const calcCost = (base, defectPct) => {
    const mat = rawMaterial * (batchSize/1000);
    const energy = energyCost * (batchSize/1000) * 8;
    const penalty = defectPct/100 * batchSize * defectPenalty;
    return Math.round(mat + energy + penalty + base);
  };

  const data = [
    { name:'현재 공정', cost: calcCost(8000, 3.2), fill:'#6B7280' },
    { name:'최적 조건 A', cost: calcCost(5000, 1.8), fill:'#F59E0B' },
    { name:'최적 조건 B', cost: calcCost(6000, 1.4), fill:'#34D399' },
  ];
  const minCost = Math.min(...data.map(d=>d.cost));

  return (
    <div>
      <div className="page-header">
        <div className="page-h">비용 예측 및 ROI 시뮬레이터</div>
        <div className="page-p">단가 슬라이더 → React 실시간 재계산 → Recharts BarChart 공정 조건별 배치 원가 비교</div>
      </div>
      <div className="stat-row">
        <div className="stat-card"><div className="stat-label">현재 공정 배치 원가</div><div className="stat-val">{data[0].cost.toLocaleString()}</div><div className="stat-sub">원/배치</div></div>
        <div className="stat-card"><div className="stat-label">최적 조건 A</div><div className="stat-val" style={{color:'var(--primary)'}}>{data[1].cost.toLocaleString()}</div><div className="stat-sub">원/배치</div></div>
        <div className="stat-card"><div className="stat-label">최적 조건 B</div><div className="stat-val" style={{color:'var(--success)'}}>{data[2].cost.toLocaleString()}</div><div className="stat-sub">원/배치 (최저)</div></div>
        <div className="stat-card"><div className="stat-label">비용 절감 (B 기준)</div><div className="stat-val" style={{color:'var(--success)'}}>{((data[0].cost-data[2].cost)/data[0].cost*100).toFixed(1)}%</div><div className="stat-sub">현재 대비 추정</div></div>
      </div>
      <div className="grid-2">
        <div className="card">
          <div className="card-hd">
            <div>
              <div className="card-title">⚙️ 단가 입력 설정</div>
              <div className="card-sub">슬라이더 변경 시 즉시 재계산</div>
            </div>
          </div>
          <div className="cost-input-grid">
            {[
              {label:'원료 단가 (원/kg)', min:5000, max:30000, step:500, val:rawMaterial, set:setRawMaterial},
              {label:'에너지 단가 (원/kWh)', min:100, max:800, step:10, val:energyCost, set:setEnergy},
              {label:'배치 규모 (kg)', min:100, max:2000, step:50, val:batchSize, set:setBatch},
              {label:'불량 페널티 (원/개)', min:10000, max:200000, step:5000, val:defectPenalty, set:setDefect},
            ].map(p => (
              <div key={p.label} className="cost-input-item">
                <div className="ci-label">{p.label}</div>
                <div className="ci-track">
                  <input type="range" min={p.min} max={p.max} step={p.step} value={p.val}
                    onChange={e => p.set(+e.target.value)} className="ci-input" />
                  <span className="ci-val">{p.val.toLocaleString()}</span>
                </div>
              </div>
            ))}
          </div>
          <div style={{background:'rgba(245,158,11,0.06)', border:'1px solid var(--border)', borderRadius:8, padding:12}}>
            <div style={{fontSize:11, fontWeight:700, color:'var(--primary)', marginBottom:8}}>배치 원가 계산 구조</div>
            {['원료비 = 단가 × 배치 규모', '에너지비 = 단가 × 배치 × 8h', '불량 페널티 = 불량률 × 규모 × 페널티'].map(t => (
              <div key={t} style={{fontSize:11, color:'var(--text2)', marginBottom:4}}>• {t}</div>
            ))}
          </div>
        </div>
        <div className="card">
          <div className="card-hd">
            <div>
              <div className="card-title">📊 공정 조건별 배치 원가 비교</div>
              <div className="card-sub">Recharts BarChart — 실시간 재계산 시각화</div>
            </div>
            <button className="btn btn-ghost" style={{fontSize:11}}>📥 Excel</button>
          </div>
          <ResponsiveContainer width="100%" height={200}>
            <BarChart data={data} margin={{top:4, right:16, bottom:4, left:0}}>
              <CartesianGrid strokeDasharray="3 3" stroke="rgba(255,255,255,0.04)" />
              <XAxis dataKey="name" tick={{fill:'#9CA3AF', fontSize:11}} tickLine={false} />
              <YAxis tick={{fill:'#9CA3AF', fontSize:11}} tickLine={false} tickFormatter={v=>`${(v/10000).toFixed(0)}만`} />
              <Tooltip contentStyle={{background:'#1F2937', border:'1px solid rgba(245,158,11,0.15)', borderRadius:8}} formatter={v=>[`${v.toLocaleString()}원`, '배치 원가']} />
              <Bar dataKey="cost" radius={[6,6,0,0]}>
                {data.map((d,i) => <Cell key={i} fill={d.cost===minCost ? '#34D399' : d.fill} />)}
              </Bar>
            </BarChart>
          </ResponsiveContainer>
          <table className="mini-table" style={{marginTop:10}}>
            <thead><tr><th>공정 조건</th><th>배치 원가</th><th>현재 대비</th></tr></thead>
            <tbody>
              {data.map(d => (
                <tr key={d.name}>
                  <td><strong>{d.name}</strong></td>
                  <td><strong style={{color: d.cost===minCost?'var(--success)':'var(--text)'}}>{d.cost.toLocaleString()}원</strong></td>
                  <td style={{color: d.cost<data[0].cost?'var(--success)':'var(--text2)'}}>
                    {d.cost===data[0].cost ? '기준' : `-${((data[0].cost-d.cost)/data[0].cost*100).toFixed(1)}%`}
                  </td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      </div>
    </div>
  );
}
