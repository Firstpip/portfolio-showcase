function Badge({ text, color }) {
  const colors = {
    orange: { bg:'#FFF4EF', text:'#E85C2F' },
    green: { bg:'#ECFDF5', text:'#059669' },
    red: { bg:'#FEF2F2', text:'#DC2626' },
    blue: { bg:'#EFF6FF', text:'#2563EB' },
    gray: { bg:'#F3F4F6', text:'#6B7280' },
  };
  const c = colors[color] || colors.gray;
  return <span style={{ display:'inline-block', padding:'2px 8px', borderRadius:99, fontSize:11, fontWeight:600, background:c.bg, color:c.text }}>{text}</span>;
}

function StatCard({ label, value, icon, color }) {
  return (
    <div style={{ background:C.surface, borderRadius:12, padding:'16px 20px', border:`1px solid ${C.border}`, display:'flex', alignItems:'center', gap:12, flex:1 }}>
      <div style={{ width:44, height:44, borderRadius:10, background:color+'20', display:'flex', alignItems:'center', justifyContent:'center', fontSize:20 }}>{icon}</div>
      <div>
        <div style={{ fontSize:22, fontWeight:700, color:C.text }}>{value}</div>
        <div style={{ fontSize:12, color:C.textSub, marginTop:2 }}>{label}</div>
      </div>
    </div>
  );
}

function JobCard({ job, onClick }) {
  const [bk, setBk] = React.useState(job.bookmarked);
  return (
    <div onClick={onClick} style={{ background:C.surface, borderRadius:12, border:`1px solid ${C.border}`, padding:20, cursor:'pointer', transition:'all 200ms', animation:'fadeIn 300ms ease' }}

      onMouseLeave={e => { e.currentTarget.style.boxShadow='none'; e.currentTarget.style.borderColor=C.border; }}>
      <div style={{ display:'flex', alignItems:'flex-start', gap:12 }}>
        <div style={{ width:48, height:48, borderRadius:10, background:C.primaryBg, display:'flex', alignItems:'center', justifyContent:'center', fontSize:22, flexShrink:0 }}>{job.img}</div>
        <div style={{ flex:1, minWidth:0 }}>
          <div style={{ display:'flex', alignItems:'center', gap:6, marginBottom:4 }}>

          <div style={{ display:'flex', flexWrap:'wrap', gap:4, marginBottom:10 }}>
            {job.tag.map(t => <Badge key={t} text={t} color="gray" />)}
          </div>
          <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between' }}>
            <span style={{ fontSize:14, fontWeight:700, color:C.primary }}>{job.salary}</span>

              <button onClick={e=>{ e.stopPropagation(); setBk(!bk); }} style={{ background:'none', border:'none', cursor:'pointer', fontSize:16, color:bk?'#E85C2F':'#CBD5E1' }}>{bk?'❤️':'🤍'}</button>
              <span style={{ fontSize:12, color:C.textSub }}>{job.posted}</span>

        </div>
      </div>

function Modal({ open, onClose, title, children }) {
  if (!open) return null;
  return (
    <>
      <div onClick={onClose} style={{ position:'fixed', inset:0, background:'rgba(0,0,0,0.45)', zIndex:300 }} />
      <div style={{ position:'fixed', top:'50%', left:'50%', transform:'translate(-50%,-50%)', width:560, maxHeight:'85vh', background:C.surface, borderRadius:16, zIndex:301, overflow:'hidden', boxShadow:'0 20px 60px rgba(0,0,0,0.2)' }}>
        <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', padding:'20px 24px', borderBottom:`1px solid ${C.border}` }}>
          <span style={{ fontWeight:700, fontSize:16, color:C.text }}>{title}</span>
          <button onClick={onClose} style={{ background:'none', border:'none', cursor:'pointer', fontSize:20, color:C.textSub }}>✕</button>
        </div>
        <div style={{ overflowY:'auto', maxHeight:'calc(85vh - 60px)', padding:24 }}>{children}</div>
      </div>
    </>
  );
}

function Toast({ msg, onClose }) {
  React.useEffect(() => { const t = setTimeout(onClose, 2500); return () => clearTimeout(t); }, []);
  return (
    <div style={{ position:'fixed', bottom:24, right:24, background:C.text, color:'#fff', borderRadius:10, padding:'12px 20px', fontSize:13, zIndex:500, boxShadow:'0 4px 20px rgba(0,0,0,0.2)', animation:'slideUp 200ms ease' }}>✅ {msg}</div>
  );
}

// ─── 구인글 리스트 ─────────────────────────────────────────
function ListPage({ onSelect }) {
  const [region, setRegion] = React.useState('전체');
  const [type, setType] = React.useState('전체');
  const [search, setSearch] = React.useState('');
  const filtered = JOBS.filter(j => {
    const regionOk = region==='전체' || j.area.includes(region);
    const typeOk = type==='전체' || j.type===type;
    const searchOk = !search || j.title.includes(search) || j.company.includes(search);
    return regionOk && typeOk && searchOk;
  });
  return (
    <div>
      <div style={{ display:'flex', gap:10, marginBottom:16, alignItems:'center' }}>
        <div style={{ flex:1, display:'flex', alignItems:'center', background:C.surface, border:`1px solid ${C.border}`, borderRadius:10, padding:'0 14px', height:40 }}>
          <span style={{ marginRight:8, color:C.textSub }}>🔍</span>
          <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="지역, 회사명, 직무명 검색" style={{ border:'none', outline:'none', flex:1, fontSize:14, color:C.text, background:'transparent' }} />
        </div>
      </div>
      <div style={{ display:'flex', gap:8, marginBottom:12, overflowX:'auto', paddingBottom:4 }}>
        {REGIONS.map(r => <button key={r} onClick={()=>setRegion(r)} style={{ padding:'5px 14px', borderRadius:99, border:`1px solid ${region===r?C.primary:C.border}`, background:region===r?C.primary:'transparent', color:region===r?'#fff':C.textSub, cursor:'pointer', fontSize:12, whiteSpace:'nowrap', fontWeight:region===r?600:400, transition:'all 150ms' }}>{r}</button>)}
      </div>
      <div style={{ display:'flex', gap:8, marginBottom:20, overflowX:'auto', paddingBottom:4 }}>
        {JOB_TYPES.map(t => <button key={t} onClick={()=>setType(t)} style={{ padding:'5px 14px', borderRadius:99, border:`1px solid ${type===t?C.accent:C.border}`, background:type===t?C.accent:'transparent', color:type===t?'#fff':C.textSub, cursor:'pointer', fontSize:12, whiteSpace:'nowrap', fontWeight:type===t?600:400, transition:'all 150ms' }}>{t}</button>)}
      </div>
      <div style={{ fontSize:13, color:C.textSub, marginBottom:12 }}>총 <strong style={{ color:C.primary }}>{filtered.length}</strong>개의 공고</div>
      <div style={{ display:'flex', flexDirection:'column', gap:10 }}>

      </div>
    </div>
  );
}

function App() {
  const [page, setPage] = React.useState('메인 화면');
  const [selectedJob, setSelectedJob] = React.useState(null);
  const [toast, setToast] = React.useState(null);
  const showToast = (msg) => { setToast(msg); };

  const renderPage = () => {
    switch(page) {
      case '메인 화면': return <MainPage onNav={setPage} />;
      case '구인글 리스트': return <ListPage onSelect={j=>{ setSelectedJob(j); setPage('구인글 상세'); }} />;
      case '구인글 상세': return <DetailPage job={selectedJob} />;
      case '구인글 등록': return <RegisterPage onSubmit={()=>{ setPage('결제 시스템'); showToast('등록 정보 저장 완료! 결제 화면으로 이동합니다'); }} />;
      case '결제 시스템': return <PaymentPage />;
      case '마이페이지': return <MyPage />;
      default: return null;
    }
  };

  return (
    <div style={{ display:'flex', width:'100%', height:'100vh', overflow:'hidden' }}>
      {/* 사이드바 */}
      <aside style={{ width:240, background:C.sidebar, display:'flex', flexDirection:'column', flexShrink:0, overflow:'hidden' }}>
        <div style={{ padding:'22px 20px 16px', borderBottom:'1px solid rgba(255,255,255,0.08)' }}>
          <div style={{ fontSize:18, fontWeight:800, color:'#fff' }}>🏘️ FieldJob</div>
          <div style={{ fontSize:11, color:'rgba(255,255,255,0.4)', marginTop:2 }}>분양현장 구인구직 플랫폼</div>
        </div>
        <nav style={{ flex:1, padding:'12px 10px', overflowY:'auto' }}>
          {NAV.map(n => (
            <button key={n.id} onClick={()=>setPage(n.id)} style={{ width:'100%', display:'flex', alignItems:'center', gap:10, padding:'10px 12px', borderRadius:10, border:'none', background:page===n.id?C.primary:'transparent', cursor:'pointer', color:page===n.id?'#fff':C.sidebarText, fontSize:13, fontWeight:page===n.id?600:400, marginBottom:2, transition:'all 150ms', textAlign:'left' }}
              onMouseEnter={e=>{ if(page!==n.id) e.currentTarget.style.background='rgba(255,255,255,0.06)'; }}
              onMouseLeave={e=>{ if(page!==n.id) e.currentTarget.style.background='transparent'; }}>
              <span>{n.icon}</span>
              <span>{n.label}</span>
            </button>
          ))}
        </nav>
        <div style={{ padding:'16px 14px', borderTop:'1px solid rgba(255,255,255,0.08)', display:'flex', alignItems:'center', gap:10 }}>
          <div style={{ width:34, height:34, borderRadius:99, background:C.primary, display:'flex', alignItems:'center', justifyContent:'center', fontSize:14, color:'#fff', fontWeight:700 }}>최</div>
          <div>
            <div style={{ fontSize:13, fontWeight:600, color:'#fff' }}>최분양</div>
            <div style={{ fontSize:11, color:C.sidebarText }}>구직자 계정</div>
          </div>
        </div>
      </aside>
      {/* 메인 영역 */}
      <div style={{ flex:1, display:'flex', flexDirection:'column', overflow:'hidden', background:C.bg }}>
        {/* 탑바 */}
        <header style={{ height:56, background:C.surface, borderBottom:`1px solid ${C.border}`, display:'flex', alignItems:'center', padding:'0 24px', gap:12, flexShrink:0 }}>
          <span style={{ fontSize:16, fontWeight:700, color:C.text, flex:1 }}>{page}</span>
          <div style={{ display:'flex', alignItems:'center', background:C.bg, borderRadius:8, padding:'6px 12px', gap:8, width:200 }}>
            <span style={{ color:C.textSub, fontSize:13 }}>🔍</span>
            <input placeholder="공고 검색" style={{ border:'none', background:'transparent', outline:'none', fontSize:13, color:C.text, width:'100%' }} />
          </div>
          <div style={{ position:'relative' }}>
            <button style={{ background:'none', border:'none', cursor:'pointer', fontSize:20, color:C.textSub }}>🔔</button>
            <div style={{ position:'absolute', top:-2, right:-2, width:8, height:8, background:C.primary, borderRadius:99 }} />
          </div>
        </header>
        {/* 콘텐츠 */}
        <main style={{ flex:1, overflowY:'auto', padding:24 }}>
          {renderPage()}
        </main>
      </div>
      {toast && <Toast msg={toast} onClose={()=>setToast(null)} />}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
