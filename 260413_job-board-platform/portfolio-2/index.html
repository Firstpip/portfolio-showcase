function Tag({ text, color }) {
  const m = { primary:{bg:C.primaryBg,tc:C.primary}, green:{bg:'#E6FCF5',tc:'#087F5B'}, red:{bg:'#FFF5F5',tc:'#C92A2A'}, gray:{bg:'#F1F3F5',tc:'#495057'} };
  const c = m[color]||m.gray;
  return <span style={{ display:'inline-block', padding:'3px 10px', borderRadius:99, fontSize:11, fontWeight:600, background:c.bg, color:c.tc }}>{text}</span>;
}

function FreelancerTab({ onSelect }) {
  const [search, setSearch] = React.useState('');
  const [skill, setSkill] = React.useState('전체');
  const skills = ['전체','React','Node.js','Spring Boot','Python','iOS/Android','DevOps'];
  const filtered = FREELANCERS.filter(f => {
    const skillOk = skill==='전체' || f.skills.some(s=>s.includes(skill));
    const searchOk = !search || f.name.includes(search) || f.role.includes(search);
    return skillOk && searchOk;
  });
  return (
    <div style={{ padding:'24px 32px' }}>
      <div style={{ display:'flex', gap:10, marginBottom:16 }}>
        <div style={{ flex:1, display:'flex', alignItems:'center', background:C.surface, border:`1px solid ${C.border}`, borderRadius:8, padding:'0 14px', height:40 }}>
          <span style={{ color:C.textSub, marginRight:8 }}>🔍</span>
          <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="이름, 역할, 기술스택 검색" style={{ border:'none', outline:'none', flex:1, fontSize:14, color:C.text, background:'transparent' }} />
        </div>
      </div>
      <div style={{ display:'flex', gap:6, marginBottom:20, flexWrap:'wrap' }}>
        {skills.map(s => <button key={s} onClick={()=>setSkill(s)} style={{ padding:'5px 14px', borderRadius:99, border:`1px solid ${skill===s?C.primary:C.border}`, background:skill===s?C.primary:'transparent', color:skill===s?'#fff':C.textSub, cursor:'pointer', fontSize:12, fontWeight:skill===s?600:400, transition:'all 150ms' }}>{s}</button>)}
      </div>
      <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr 1fr', gap:16 }}>
        {filtered.map(f => (
          <div key={f.id} onClick={()=>onSelect(f)} style={{ background:C.surface, borderRadius:12, border:`1px solid ${C.border}`, padding:20, cursor:'pointer', transition:'all 200ms' }}
            onMouseEnter={e=>{e.currentTarget.style.boxShadow='0 4px 20px rgba(59,91,219,0.12)';e.currentTarget.style.borderColor=C.primary;}}
            onMouseLeave={e=>{e.currentTarget.style.boxShadow='none';e.currentTarget.style.borderColor=C.border;}}>
            <div style={{ display:'flex', alignItems:'center', gap:10, marginBottom:12 }}>
              <div style={{ width:44, height:44, borderRadius:99, background:f.available?C.primary:'#ADB5BD', color:'#fff', display:'flex', alignItems:'center', justifyContent:'center', fontSize:18, fontWeight:700 }}>{f.avatar}</div>
              <div>
                <div style={{ fontWeight:700, color:C.text }}>{f.name}</div>
                <div style={{ fontSize:12, color:C.textSub }}>{f.role}</div>
              </div>
            </div>
            <div style={{ display:'flex', flexWrap:'wrap', gap:4, marginBottom:10 }}>
              {f.skills.slice(0,3).map(s=><Tag key={s} text={s} color="primary" />)}
            </div>
            <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between' }}>
              <span style={{ fontSize:13, fontWeight:700, color:C.primary }}>{f.rate}</span>
              <span style={{ fontSize:12, color:C.textSub }}>⭐ {f.rating}</span>
            </div>
            <div style={{ marginTop:8 }}>
              <Tag text={f.available?'즉시투입가능':'대기중'} color={f.available?'green':'gray'} />
            </div>

        ))}

    </div>
  );
}

      <div style={{ fontSize:20, fontWeight:800, color:C.text, marginBottom:8 }}>결제 완료!</div>
      <div style={{ fontSize:14, color:C.textSub, marginBottom:16 }}>공고가 즉시 활성화되었습니다</div>
      <div style={{ display:'inline-flex', gap:6, alignItems:'center', padding:'8px 16px', background:C.primaryBg, borderRadius:99, fontSize:13, color:C.primary, fontWeight:600 }}>
        🔒 토스페이먼츠 서버 검증 + Supabase 트랜잭션 원자 처리
      </div>
      <div style={{ marginTop:24, padding:16, background:C.bg, borderRadius:12, fontSize:13, color:C.textSub, textAlign:'left', display:'inline-block', minWidth:320 }}>
        <div style={{ marginBottom:6 }}>📋 상품: {plans.find(p=>p.id===plan)?.name}</div>
        <div style={{ marginBottom:6 }}>💰 결제: {plans.find(p=>p.id===plan)?.price.toLocaleString()}원</div>
        <div>🔒 결제 방식: 토스페이먼츠 위젯 SDK + Route Handler 서버 승인</div>
      </div>
    </div>
  );
  return (
    <div style={{ padding:'24px 32px' }}>
      {step==='plan' && (
        <>
          <div style={{ display:'flex', flexDirection:'column', gap:12, marginBottom:20 }}>
            {plans.map(p => (
              <div key={p.id} onClick={()=>setPlan(p.id)} style={{ padding:20, borderRadius:12, border:`2px solid ${plan===p.id?p.color:C.border}`, background:plan===p.id?p.color+'08':C.surface, cursor:'pointer', transition:'all 200ms', position:'relative' }}>
                {p.popular && <div style={{ position:'absolute', top:-10, right:16, background:C.primary, color:'#fff', fontSize:11, fontWeight:700, padding:'2px 10px', borderRadius:99 }}>추천</div>}
                <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center' }}>
                  <div>
                    <div style={{ fontWeight:700, fontSize:15, color:C.text }}>{p.name}</div>
                    <div style={{ fontSize:13, color:C.textSub, marginTop:3 }}>{p.desc}</div>
                  </div>
                  <div style={{ fontSize:20, fontWeight:800, color:p.color }}>{p.price.toLocaleString()}원</div>
                </div>
              </div>
            ))}
          </div>
          <button onClick={()=>plan&&setStep('pay')} style={{ width:'100%', padding:'13px', borderRadius:10, background:plan?C.primary:'#ADB5BD', color:'#fff', border:'none', cursor:plan?'pointer':'not-allowed', fontSize:15, fontWeight:700 }}>결제 진행</button>
        </>
      )}
      {step==='pay' && (
        <div>
          <button onClick={()=>setStep('plan')} style={{ background:'none', border:'none', cursor:'pointer', fontSize:14, color:C.textSub, marginBottom:16 }}>← 플랜 다시 선택</button>
          <div style={{ background:C.bg, borderRadius:12, padding:16, marginBottom:16 }}>
            <div style={{ fontSize:13, color:C.textSub }}>선택 플랜</div>
            <div style={{ fontWeight:700, color:C.text }}>{plans.find(p=>p.id===plan)?.name}</div>
            <div style={{ fontSize:18, fontWeight:800, color:C.primary, marginTop:4 }}>{plans.find(p=>p.id===plan)?.price.toLocaleString()}원</div>
          </div>
          <div style={{ background:'#F0FFF4', border:'1px solid #D3F9D8', borderRadius:10, padding:14, marginBottom:16, fontSize:13, color:'#2F9E44' }}>
            🔒 토스페이먼츠 위젯 SDK · 결제 승인은 서버(Route Handler)에서만 처리
          </div>
          <div style={{ background:C.surface, border:`1px solid ${C.border}`, borderRadius:12, padding:20, marginBottom:16, textAlign:'center' }}>
            <div style={{ fontSize:13, color:C.textSub, marginBottom:8 }}>토스페이먼츠 결제창 영역</div>
            <div style={{ display:'flex', gap:10, justifyContent:'center' }}>
              {['💳 카드','🏦 가상계좌','📱 간편결제'].map(m => <button key={m} style={{ padding:'8px 16px', borderRadius:8, border:`1px solid ${C.border}`, background:C.bg, cursor:'pointer', fontSize:13 }}>{m}</button>)}
            </div>
          </div>
          <button onClick={()=>setStep('done')} style={{ width:'100%', padding:'13px', borderRadius:10, background:C.primary, color:'#fff', border:'none', cursor:'pointer', fontSize:15, fontWeight:700 }}>
            {plans.find(p=>p.id===plan)?.price.toLocaleString()}원 결제하기
          </button>
        </div>
      )}
    </div>
  );
}

function AuthTab() {
  const [mode, setMode] = React.useState('login');
  const [role, setRole] = React.useState(null);
  const [step, setStep] = React.useState('login');
  if (step==='onboarding') return (
    <div style={{ padding:'40px 32px', maxWidth:480, margin:'0 auto' }}>
      <div style={{ textAlign:'center', marginBottom:24 }}>
        <div style={{ fontSize:36, marginBottom:8 }}>👋</div>
        <div style={{ fontSize:20, fontWeight:800, color:C.text }}>환영합니다!</div>
        <div style={{ fontSize:14, color:C.textSub, marginTop:4 }}>역할을 선택해 주세요</div>
      </div>
      <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:12, marginBottom:20 }}>
        {[['client','🏢','의뢰자','프로젝트를 맡길 개발자를 찾고 있습니다'],['freelancer','💻','프리랜서','프로젝트를 받아 개발하고 싶습니다']].map(([k,icon,title,desc])=>(
          <div key={k} onClick={()=>setRole(k)} style={{ padding:20, borderRadius:12, border:`2px solid ${role===k?C.primary:C.border}`, background:role===k?C.primaryBg:C.surface, cursor:'pointer', textAlign:'center', transition:'all 200ms' }}>
            <div style={{ fontSize:32, marginBottom:8 }}>{icon}</div>
            <div style={{ fontWeight:700, fontSize:15, color:C.text, marginBottom:4 }}>{title}</div>
            <div style={{ fontSize:12, color:C.textSub }}>{desc}</div>
          </div>
        ))}
      </div>
      <button onClick={()=>setStep('login')} disabled={!role} style={{ width:'100%', padding:'13px', borderRadius:10, background:role?C.primary:'#ADB5BD', color:'#fff', border:'none', cursor:role?'pointer':'not-allowed', fontSize:15, fontWeight:700 }}>시작하기</button>
    </div>
  );
  return (
    <div style={{ padding:'40px 32px', maxWidth:440, margin:'0 auto' }}>
      <div style={{ textAlign:'center', marginBottom:24 }}>
        <div style={{ fontSize:28, fontWeight:800, color:C.text, marginBottom:6 }}>{mode==='login'?'로그인':'회원가입'}</div>
        <div style={{ fontSize:14, color:C.textSub }}>IT 프리랜서 매칭 플랫폼</div>
      </div>
      <div style={{ display:'flex', flexDirection:'column', gap:10, marginBottom:20 }}>
        {[['🟡 카카오로 시작하기','#FEE500','#3C1E1E'],['⚫ GitHub으로 시작하기','#24292E','#fff']].map(([label,bg,tc])=>(
          <button key={label} onClick={()=>setStep('onboarding')} style={{ padding:'13px', borderRadius:10, background:bg, color:tc, border:'none', cursor:'pointer', fontSize:14, fontWeight:600 }}>{label}</button>
        ))}
      </div>
      <div style={{ display:'flex', alignItems:'center', gap:8, marginBottom:20 }}>
        <div style={{ flex:1, height:1, background:C.border }} />
        <span style={{ fontSize:12, color:C.textSub }}>또는 이메일로</span>
        <div style={{ flex:1, height:1, background:C.border }} />
      </div>
      {[['이메일','email','text'],['비밀번호','password','password']].map(([l,k,t])=>(
        <div key={k} style={{ marginBottom:12 }}>
          <label style={{ fontSize:13, fontWeight:600, color:C.text, display:'block', marginBottom:5 }}>{l}</label>
          <input type={t} style={{ width:'100%', padding:'10px 12px', borderRadius:8, border:`1px solid ${C.border}`, fontSize:14, outline:'none', color:C.text }} />
        </div>
      ))}
      <button style={{ width:'100%', padding:'13px', borderRadius:10, background:C.primary, color:'#fff', border:'none', cursor:'pointer', fontSize:14, fontWeight:700, marginBottom:12 }}>{mode==='login'?'로그인':'가입하기'}</button>
      <div style={{ textAlign:'center', fontSize:13, color:C.textSub }}>
        {mode==='login'?'계정이 없으신가요? ':'이미 계정이 있으신가요? '}
        <button onClick={()=>setMode(m=>m==='login'?'signup':'login')} style={{ background:'none', border:'none', cursor:'pointer', color:C.primary, fontWeight:600, fontSize:13 }}>{mode==='login'?'가입하기':'로그인'}</button>
      </div>
      <div style={{ marginTop:14, padding:12, background:C.primaryBg, borderRadius:8, fontSize:12, color:C.primary }}>
        🔒 Supabase Auth OAuth + Next.js Middleware 역할별 라우트 접근 제어
      </div>
    </div>
  );
}

function DashboardTab() {
  const stats = [{l:'진행 중 프로젝트',v:'2개',icon:'📁',c:'#5C7CFA'},{l:'이번 달 제안',v:'8건',icon:'📨',c:C.accent},{l:'저장한 프리랜서',v:'14명',icon:'⭐',c:C.warning},{l:'완료 프로젝트',v:'23개',icon:'✅',c:C.success}];
  const projects = [{name:'CRM 백엔드 개발',freelancer:'김지현',progress:65,status:'진행중'},{name:'결제 시스템 고도화',freelancer:'이민준',progress:30,status:'킥오프'}];
  return (
    <div style={{ padding:'24px 32px' }}>
      <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr 1fr 1fr', gap:14, marginBottom:24 }}>
        {stats.map(s => (
          <div key={s.l} style={{ background:C.surface, borderRadius:12, border:`1px solid ${C.border}`, padding:'16px 18px', display:'flex', alignItems:'center', gap:12 }}>
            <div style={{ width:42, height:42, borderRadius:10, background:s.c+'20', display:'flex', alignItems:'center', justifyContent:'center', fontSize:18 }}>{s.icon}</div>
            <div>
              <div style={{ fontSize:20, fontWeight:800, color:C.text }}>{s.v}</div>
              <div style={{ fontSize:11, color:C.textSub, marginTop:1 }}>{s.l}</div>
            </div>
          </div>
        ))}
      </div>
      <div style={{ background:C.surface, borderRadius:12, border:`1px solid ${C.border}`, padding:20 }}>
        <div style={{ fontWeight:700, fontSize:15, color:C.text, marginBottom:16 }}>진행 중 프로젝트</div>
        {projects.map(p => (
          <div key={p.name} style={{ padding:'14px 0', borderBottom:`1px solid ${C.border}` }}>
            <div style={{ display:'flex', justifyContent:'space-between', marginBottom:8 }}>
              <div>
                <div style={{ fontWeight:600, fontSize:14, color:C.text }}>{p.name}</div>
                <div style={{ fontSize:12, color:C.textSub }}>담당: {p.freelancer}</div>
              </div>
              <Tag text={p.status} color="green" />
            </div>
            <div style={{ height:6, background:C.bg, borderRadius:99, overflow:'hidden' }}>
              <div style={{ height:'100%', width:p.progress+'%', background:`linear-gradient(90deg, ${C.primary}, ${C.accent})`, borderRadius:99, transition:'width 600ms ease' }} />
            </div>
            <div style={{ fontSize:12, color:C.textSub, marginTop:4 }}>{p.progress}% 완료</div>
          </div>
        ))}
      </div>
      <div style={{ marginTop:16, padding:14, background:C.primaryBg, borderRadius:10, fontSize:13, color:C.primary }}>
        🔄 Supabase RLS로 역할별 데이터 격리 · RSC 서버 렌더링으로 초기 로딩 없음
      </div>
    </div>
  );
}

function App() {
  const [tab, setTab] = React.useState('프리랜서 탐색');
  const [drawer, setDrawer] = React.useState(null);
  const renderContent = () => {
    switch(tab) {
      case '프리랜서 탐색': return <FreelancerTab onSelect={setDrawer} />;
      case '프로젝트 공고': return <ProjectTab onSelect={setDrawer} />;
      case '토스페이먼츠 결제': return <PaymentTab />;
      case '소셜 로그인': return <AuthTab />;
      case '대시보드': return <DashboardTab />;
      default: return null;
    }
  };
  return (
    <div style={{ width:'100%', minHeight:'100vh', background:C.bg, display:'flex', flexDirection:'column' }}>
      {/* 탑 네비 */}
      <header style={{ position:'sticky', top:0, zIndex:100, background:C.surface, borderBottom:`1px solid ${C.border}`, display:'flex', alignItems:'center', height:56, padding:'0 24px', gap:4 }}>
        <div style={{ fontSize:17, fontWeight:800, color:C.primary, marginRight:16 }}>🔗 MatchIT</div>
        {TABS.map(t => (
          <button key={t.id} onClick={()=>setTab(t.id)} style={{ padding:'6px 14px', borderRadius:6, border:'none', background:tab===t.id?C.primaryBg:'transparent', color:tab===t.id?C.primary:C.textSub, cursor:'pointer', fontSize:13, fontWeight:tab===t.id?700:400, transition:'all 150ms' }}>
            {t.icon} {t.label}
          </button>
        ))}
        <div style={{ flex:1 }} />
        <div style={{ display:'flex', alignItems:'center', background:C.bg, borderRadius:6, padding:'5px 12px', gap:6, width:180 }}>
          <span style={{ color:C.textSub, fontSize:13 }}>🔍</span>
          <input placeholder="검색" style={{ border:'none', background:'transparent', outline:'none', fontSize:13, color:C.text, width:'100%' }} />
        </div>
        <div style={{ position:'relative', marginLeft:8 }}>
          <button style={{ background:'none', border:'none', cursor:'pointer', fontSize:18, color:C.textSub }}>🔔</button>
          <div style={{ position:'absolute', top:-1, right:-1, width:7, height:7, background:C.danger, borderRadius:99 }} />
        </div>
        <div style={{ width:32, height:32, borderRadius:99, background:C.primary, color:'#fff', display:'flex', alignItems:'center', justifyContent:'center', fontSize:13, fontWeight:700, marginLeft:8, cursor:'pointer' }}>김</div>
      </header>
      {/* 히어로 배너 */}
      <HeroBanner tab={tab} />
      {/* 콘텐츠 */}
      <div style={{ flex:1, overflowY:'auto' }}>
        {renderContent()}
      </div>
      {/* 드로어 */}
      <Drawer item={drawer} onClose={()=>setDrawer(null)} />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
