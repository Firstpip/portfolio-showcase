function Badge({ text, color }) {
  const m = {
    green:{bg:'#ECFDF5',tc:'#059669'}, red:{bg:'#FEF2F2',tc:'#DC2626'},
    yellow:{bg:'#FFFBEB',tc:'#D97706'}, blue:{bg:'#EFF6FF',tc:'#2563EB'},
    gray:{bg:'#F1F5F9',tc:'#475569'}, purple:{bg:C.primaryBg,tc:C.primary},
  };
  const c = m[color]||m.gray;
  return <span style={{ display:'inline-block', padding:'2px 8px', borderRadius:99, fontSize:11, fontWeight:600, background:c.bg, color:c.tc }}>{text}</span>;
}

function KpiCard({ label, value, icon, color, sub }) {
  return (
    <div style={{ background:C.surface, borderRadius:12, border:`1px solid ${C.border}`, padding:'18px 20px', display:'flex', alignItems:'center', gap:14 }}>
      <div style={{ width:46, height:46, borderRadius:11, background:color+'18', display:'flex', alignItems:'center', justifyContent:'center', fontSize:20 }}>{icon}</div>
      <div>
        <div style={{ fontSize:22, fontWeight:800, color:C.text }}>{value}</div>
        <div style={{ fontSize:12, color:C.textSub, marginTop:1 }}>{label}</div>
        {sub && <div style={{ fontSize:11, color:color, marginTop:2 }}>{sub}</div>}
      </div>
    </div>
  );
}

function DetailPanel({ item, type, onClose }) {

      </div>
      <div style={{ flex:1, overflowY:'auto', padding:20 }}>

            <div style={{ marginTop:16 }}>

                환불 처리 (포트원 환불 API)

// ─── 회원 관리 ─────────────────────────────────────────────
function MembersPage() {
  const [search, setSearch] = React.useState('');

  const filtered = MEMBERS.filter(m => !search || m.name.includes(search) || m.email.includes(search));
  return (
    <div style={{ display:'flex', flex:1, overflow:'hidden' }}>
      <div style={{ flex:1, padding:24, overflowY:'auto' }}>
        <div style={{ display:'flex', gap:10, marginBottom:16 }}>
          <div style={{ flex:1, display:'flex', alignItems:'center', background:C.surface, border:`1px solid ${C.border}`, borderRadius:8, padding:'0 12px', height:38 }}>
            <span style={{ color:C.textSub, marginRight:8, fontSize:13 }}>🔍</span>
            <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="이름, 이메일 검색" style={{ border:'none', outline:'none', flex:1, fontSize:13, color:C.text, background:'transparent' }} />
          </div>
        </div>
        <div style={{ background:C.surface, borderRadius:12, border:`1px solid ${C.border}`, overflow:'hidden' }}>
          <table style={{ width:'100%', borderCollapse:'collapse' }}>
            <thead><tr style={{ background:C.bg }}>
              {['이름','이메일','유형','가입일','공고','결제합계','상태'].map(h => <th key={h} style={{ padding:'10px 14px', fontSize:12, fontWeight:600, color:C.textSub, textAlign:'left', borderBottom:`1px solid ${C.border}` }}>{h}</th>)}
            </tr></thead>
            <tbody>
              {filtered.map(m => (
                <tr key={m.id} onClick={()=>setSelected(m)} style={{ cursor:'pointer', transition:'background 150ms' }}
                  onMouseEnter={e=>e.currentTarget.style.background=C.bg} onMouseLeave={e=>e.currentTarget.style.background='transparent'}>
                  <td style={{ padding:'12px 14px', fontSize:13, fontWeight:600, color:C.text }}>{m.name}</td>
                  <td style={{ padding:'12px 14px', fontSize:12, color:C.textSub }}>{m.email}</td>
                  <td style={{ padding:'12px 14px' }}><Badge text={m.type} color="purple" /></td>
                  <td style={{ padding:'12px 14px', fontSize:12, color:C.textSub }}>{m.joined}</td>
                  <td style={{ padding:'12px 14px', fontSize:12, color:C.text }}>{m.posts}</td>
                  <td style={{ padding:'12px 14px', fontSize:12, fontWeight:600, color:C.text }}>{m.payments?m.payments.toLocaleString()+'원':'-'}</td>

          </table>
        </div>
        <div style={{ marginTop:12, padding:10, background:C.primaryBg, borderRadius:8, fontSize:12, color:C.primary }}>
          🔍 TanStack Table 서버사이드 페이지네이션 · Prisma 커서 기반 쿼리
        </div>
      </div>
      {selected && <DetailPanel item={selected} type="member" onClose={()=>setSelected(null)} />}
    </div>
  );
}

function PostsPage() {
  const [posts, setPosts] = React.useState(PENDING_POSTS);
  const [selected, setSelected] = React.useState(null);
  const [checked, setChecked] = React.useState([]);
  const toggle = (id) => setChecked(c => c.includes(id)?c.filter(x=>x!==id):[...c,id]);
  const bulkApprove = () => { setPosts(p=>p.filter(x=>!checked.includes(x.id))); setChecked([]); };
  return (
    <div style={{ display:'flex', flex:1, overflow:'hidden' }}>
      <div style={{ flex:1, padding:24, overflowY:'auto' }}>
        <div style={{ display:'flex', gap:10, marginBottom:16, alignItems:'center' }}>
          <span style={{ fontSize:14, color:C.textSub, flex:1 }}>승인 대기 <strong style={{ color:C.primary }}>{posts.length}</strong>건</span>
          {checked.length>0 && (
            <>
              <button onClick={bulkApprove} style={{ padding:'7px 16px', borderRadius:8, background:C.success, color:'#fff', border:'none', cursor:'pointer', fontSize:13, fontWeight:600 }}>✅ {checked.length}개 일괄 승인</button>
              <button onClick={()=>setChecked([])} style={{ padding:'7px 16px', borderRadius:8, background:C.danger, color:'#fff', border:'none', cursor:'pointer', fontSize:13, fontWeight:600 }}>❌ {checked.length}개 일괄 거절</button>
            </>
          )}
        </div>
        <div style={{ background:C.surface, borderRadius:12, border:`1px solid ${C.border}`, overflow:'hidden' }}>
          <table style={{ width:'100%', borderCollapse:'collapse' }}>
            <thead><tr style={{ background:C.bg }}>
              <th style={{ padding:'10px 14px', width:36 }}><input type="checkbox" onChange={e=>setChecked(e.target.checked?posts.map(p=>p.id):[])} /></th>
              {['공고 제목','업체명','지역','결제','제출 시간'].map(h => <th key={h} style={{ padding:'10px 14px', fontSize:12, fontWeight:600, color:C.textSub, textAlign:'left', borderBottom:`1px solid ${C.border}` }}>{h}</th>)}
            </tr></thead>
            <tbody>
              {posts.map(p => (
                <tr key={p.id} style={{ background:checked.includes(p.id)?C.primaryBg:'transparent', cursor:'pointer', transition:'background 150ms' }}
                  onMouseEnter={e=>{ if(!checked.includes(p.id)) e.currentTarget.style.background=C.bg; }}
                  onMouseLeave={e=>{ if(!checked.includes(p.id)) e.currentTarget.style.background='transparent'; }}>
                  <td style={{ padding:'12px 14px' }} onClick={e=>e.stopPropagation()}><input type="checkbox" checked={checked.includes(p.id)} onChange={()=>toggle(p.id)} /></td>
                  <td style={{ padding:'12px 14px', fontSize:13, fontWeight:600, color:C.text, cursor:'pointer' }} onClick={()=>setSelected(p)}>{p.title}</td>
                  <td style={{ padding:'12px 14px', fontSize:12, color:C.textSub }}>{p.company}</td>
                  <td style={{ padding:'12px 14px', fontSize:12, color:C.textSub }}>{p.area}</td>
                  <td style={{ padding:'12px 14px' }}><Badge text={p.payment==='완료'?'결제완료':'결제미완'} color={p.payment==='완료'?'green':'red'} /></td>
                  <td style={{ padding:'12px 14px', fontSize:12, color:C.textSub }}>{p.submitted}</td>
                </tr>
              ))}
              {posts.length===0 && <tr><td colSpan={6} style={{ padding:32, textAlign:'center', fontSize:14, color:C.textSub }}>✅ 승인 대기 공고가 없습니다</td></tr>}
            </tbody>
          </table>
        </div>
        <div style={{ marginTop:12, padding:10, background:C.primaryBg, borderRadius:8, fontSize:12, color:C.primary }}>
          ⚡ 상태 머신(pending→approved/rejected) + 결제 교차 검증 후 상태 전환
        </div>
      </div>
      {selected && <DetailPanel item={selected} type="post" onClose={()=>setSelected(null)} />}
    </div>
  );
}

// ─── 광고 배너 관리 ────────────────────────────────────────
function BannersPage() {
  const [banners, setBanners] = React.useState(BANNERS);
  const [modal, setModal] = React.useState(false);
  const [drag, setDrag] = React.useState(null);
  const move = (from, to) => {
    const arr = [...banners];
    arr.splice(to, 0, arr.splice(from, 1)[0]);
    setBanners(arr.map((b,i)=>({...b,order:i+1})));
  };
  return (
    <div style={{ padding:24, overflowY:'auto', flex:1 }}>
      <div style={{ display:'flex', justifyContent:'flex-end', marginBottom:16 }}>
        <button onClick={()=>setModal(true)} style={{ padding:'8px 18px', borderRadius:8, background:C.primary, color:'#fff', border:'none', cursor:'pointer', fontSize:14, fontWeight:600 }}>+ 배너 등록</button>
      </div>
      <div style={{ display:'flex', flexDirection:'column', gap:10 }}>
        {banners.map((b,i) => (
          <div key={b.id} draggable onDragStart={()=>setDrag(i)} onDragOver={e=>{e.preventDefault();}} onDrop={()=>{if(drag!==null&&drag!==i){move(drag,i);setDrag(null);}}}
            style={{ background:C.surface, borderRadius:12, border:`1px solid ${C.border}`, padding:'16px 20px', display:'flex', alignItems:'center', gap:14, cursor:'grab', transition:'all 200ms', animation:'fadeIn 300ms ease' }}
            onMouseEnter={e=>{e.currentTarget.style.boxShadow='0 4px 16px rgba(99,102,241,0.1)';e.currentTarget.style.borderColor=C.primary;}}
            onMouseLeave={e=>{e.currentTarget.style.boxShadow='none';e.currentTarget.style.borderColor=C.border;}}>
            <div style={{ color:C.textSub, fontSize:18 }}>⠿</div>
            <div style={{ width:44, height:44, borderRadius:10, background:C.primaryBg, display:'flex', alignItems:'center', justifyContent:'center', fontSize:22 }}>{b.img}</div>
            <div style={{ flex:1 }}>
              <div style={{ fontWeight:700, fontSize:14, color:C.text }}>{b.title}</div>
              <div style={{ fontSize:12, color:C.textSub, marginTop:2 }}>노출 기간: {b.period}</div>
            </div>
            <Badge text={b.status} color={b.status==='노출중'?'green':'yellow'} />
            <span style={{ fontSize:12, color:C.textSub }}>순서 {b.order}</span>
            <div style={{ display:'flex', gap:6 }}>
              <button style={{ padding:'5px 12px', borderRadius:6, border:`1px solid ${C.border}`, background:'transparent', cursor:'pointer', fontSize:12, color:C.textSub }}>수정</button>
              <button style={{ padding:'5px 12px', borderRadius:6, border:`1px solid ${C.danger}30`, background:'#FEF2F2', cursor:'pointer', fontSize:12, color:C.danger }}>삭제</button>
            </div>
          </div>
        ))}
      </div>
      <div style={{ marginTop:14, padding:12, background:C.primaryBg, borderRadius:10, fontSize:12, color:C.primary }}>
        🖱️ @dnd-kit/sortable 드래그앤드롭 순서 변경 + 서버 배치 동기화 · Sharp 이미지 리사이징
      </div>
      {modal && (
        <>
          <div onClick={()=>setModal(false)} style={{ position:'fixed', inset:0, background:'rgba(0,0,0,0.4)', zIndex:300 }} />
          <div style={{ position:'fixed', top:'50%', left:'50%', transform:'translate(-50%,-50%)', width:480, background:C.surface, borderRadius:14, zIndex:301, boxShadow:'0 20px 60px rgba(0,0,0,0.2)', overflow:'hidden' }}>
            <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', padding:'18px 22px', borderBottom:`1px solid ${C.border}` }}>
              <span style={{ fontWeight:700, fontSize:15 }}>배너 등록</span>
              <button onClick={()=>setModal(false)} style={{ background:'none', border:'none', cursor:'pointer', fontSize:18, color:C.textSub }}>✕</button>
            </div>
            <div style={{ padding:22 }}>
              {[['배너 제목','text'],['노출 기간(시작)','date'],['노출 기간(종료)','date']].map(([l,t])=>(
                <div key={l} style={{ marginBottom:14 }}>
                  <label style={{ fontSize:13, fontWeight:600, color:C.text, display:'block', marginBottom:5 }}>{l}</label>
                  <input type={t} style={{ width:'100%', padding:'9px 12px', borderRadius:8, border:`1px solid ${C.border}`, fontSize:14, outline:'none', color:C.text }} />

              </div>
              <div style={{ display:'flex', gap:10 }}>
                <button onClick={()=>setModal(false)} style={{ flex:1, padding:'11px', borderRadius:8, border:`1px solid ${C.border}`, background:'transparent', cursor:'pointer', fontSize:14 }}>취소</button>

              </div>
            </div>
          </div>
        </>
      )}
    </div>
  );
}

// ─── 앱 루트 ──────────────────────────────────────────────
function App() {
  const [page, setPage] = React.useState('매출 통계 대시보드');
  const sections = [...new Set(NAV.map(n=>n.section))];
  const renderPage = () => {
    switch(page) {
      case '매출 통계 대시보드': return <StatsPage />;
      case '회원 관리': return <MembersPage />;
      case '게시물 승인 관리': return <PostsPage />;
      case '결제/환불 관리': return <PaymentsPage />;
      case '광고 배너 관리': return <BannersPage />;
      case '운영자 권한 관리': return <AdminsPage />;
      default: return null;
    }
  };
  return (
    <div style={{ display:'flex', width:'100%', height:'100vh', overflow:'hidden' }}>
      {/* 밝은 사이드바 */}
      <aside style={{ width:220, background:C.sidebar, borderRight:`1px solid ${C.border}`, display:'flex', flexDirection:'column', flexShrink:0 }}>
        <div style={{ padding:'20px 16px 14px', borderBottom:`1px solid ${C.border}` }}>
          <div style={{ fontSize:16, fontWeight:800, color:C.primary }}>⚙️ FieldJob Admin</div>
          <div style={{ fontSize:11, color:C.textSub, marginTop:2 }}>운영자 통합 관리 시스템</div>
        </div>
        <nav style={{ flex:1, padding:'10px 8px', overflowY:'auto' }}>
          {sections.map(section => (
            <div key={section} style={{ marginBottom:8 }}>
              <div style={{ fontSize:10, fontWeight:700, color:C.textSub, padding:'4px 10px', textTransform:'uppercase', letterSpacing:1 }}>{section}</div>
              {NAV.filter(n=>n.section===section).map(n => (
                <button key={n.id} onClick={()=>setPage(n.id)} style={{ width:'100%', display:'flex', alignItems:'center', gap:8, padding:'9px 10px', borderRadius:8, border:'none', background:page===n.id?C.primaryBg:'transparent', cursor:'pointer', color:page===n.id?C.primary:C.textSub, fontSize:13, fontWeight:page===n.id?600:400, marginBottom:1, transition:'all 150ms', textAlign:'left' }}
                  onMouseEnter={e=>{ if(page!==n.id) e.currentTarget.style.background=C.bg; }}
                  onMouseLeave={e=>{ if(page!==n.id) e.currentTarget.style.background='transparent'; }}>
                  <span>{n.icon}</span>
                  <span>{n.label}</span>
                </button>
              ))}
            </div>
          ))}
        </nav>
        <div style={{ padding:'12px 14px', borderTop:`1px solid ${C.border}`, display:'flex', alignItems:'center', gap:8 }}>
          <div style={{ width:30, height:30, borderRadius:99, background:C.primary, color:'#fff', display:'flex', alignItems:'center', justifyContent:'center', fontSize:12, fontWeight:700 }}>관</div>
          <div>
            <div style={{ fontSize:12, fontWeight:600, color:C.text }}>관리자1</div>
            <div style={{ fontSize:11, color:C.textSub }}>슈퍼관리자</div>
          </div>
        </div>
      </aside>
      {/* 메인 */}
      <div style={{ flex:1, display:'flex', flexDirection:'column', overflow:'hidden', background:C.bg }}>
        {/* 탑바 */}
        <header style={{ height:52, background:C.surface, borderBottom:`1px solid ${C.border}`, display:'flex', alignItems:'center', padding:'0 20px', gap:10, flexShrink:0 }}>
          <span style={{ fontSize:15, fontWeight:700, color:C.text, flex:1 }}>{page}</span>
          <div style={{ display:'flex', alignItems:'center', background:C.bg, borderRadius:8, padding:'5px 12px', gap:6, width:180 }}>
            <span style={{ color:C.textSub, fontSize:12 }}>🔍</span>
            <input placeholder="검색" style={{ border:'none', background:'transparent', outline:'none', fontSize:13, color:C.text, width:'100%' }} />
          </div>
          <div style={{ position:'relative' }}>
            <button style={{ background:'none', border:'none', cursor:'pointer', fontSize:18, color:C.textSub }}>🔔</button>
            <div style={{ position:'absolute', top:0, right:0, width:7, height:7, background:C.danger, borderRadius:99 }} />
          </div>
        </header>
        {/* 콘텐츠 */}
        <div style={{ flex:1, overflow:'hidden', display:'flex' }}>
          {renderPage()}
        </div>
      </div>
    </div>
  );
}
