function StatusBadge({ status }) {
  const map = {
    '대기': { bg: '#FFF3CD', color: '#92700A', label: '대기' },
    '진행': { bg: '#D1FAE5', color: '#065F46', label: '진행' },
    '완료': { bg: '#E0E7FF', color: '#3730A3', label: '완료' },
    '오류': { bg: '#FEE2E2', color: '#991B1B', label: '오류' },
    active: { bg: '#D1FAE5', color: '#065F46', label: '연결됨' },
    closed: { bg: '#E5E7EB', color: '#374151', label: '종료' },
    error: { bg: '#FEE2E2', color: '#991B1B', label: '오류' },
    success: { bg: '#D1FAE5', color: '#065F46', label: '성공' },
    failed: { bg: '#FEE2E2', color: '#991B1B', label: '실패' },
    dlq: { bg: '#FEF3C7', color: '#92700A', label: 'DLQ' },
  };
  const s = map[status] || { bg: '#E5E7EB', color: '#374151', label: status };
  return (
    <span style={{ background: s.bg, color: s.color, padding: '2px 10px', borderRadius: 20, fontSize: 12, fontWeight: 600 }}>
      {s.label}
    </span>
  );
}

  );
}
