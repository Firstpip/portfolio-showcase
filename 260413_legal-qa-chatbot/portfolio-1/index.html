.chat-sessions{width:260px;flex-shrink:0}

.dash-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:20px}

.mini-stat-val{font-size:22px;font-weight:700;color:#1E3A5F}
