<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LegalEdu 종합 법학 학습 플랫폼 — 구현 데모</title>
<link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/prop-types@15/prop-types.min.js"></script>
<script src="https://unpkg.com/recharts@2.8.0/umd/Recharts.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Pretendard',sans-serif;background:#FAFAF8;color:#1C1917;height:100vh;overflow:hidden}
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-thumb{background:#E2D8F3;border-radius:3px}
.app{display:flex;height:100vh;overflow:hidden}
/* BRIGHT SIDEBAR */
.sidebar{width:240px;background:#FFFFFF;border-right:1px solid #EDE9FE;display:flex;flex-direction:column;flex-shrink:0;box-shadow:2px 0 12px rgba(124,58,237,0.06)}
.sb-logo{padding:22px 20px 16px;border-bottom:1px solid #F0EBF8}
.sb-logo-row{display:flex;align-items:center;gap:10px}
.sb-logo-icon{width:38px;height:38px;background:linear-gradient(135deg,#7C3AED,#5B21B6);border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:20px}
.sb-logo-text{font-size:15px;font-weight:800;color:#1C1917}
.sb-logo-sub{font-size:10.5px;color:#7C3AED;margin-top:2px;font-weight:600}
.sb-nav{flex:1;padding:10px 0;overflow-y:auto}
.sb-section{padding:14px 18px 6px;font-size:10px;font-weight:700;color:#A78BFA;letter-spacing:1.2px;text-transform:uppercase}
.sb-item{display:flex;align-items:center;gap:9px;padding:10px 18px;cursor:pointer;transition:all .2s;font-size:13.5px;color:#57534E;border-radius:0;position:relative;border-left:3px solid transparent;margin:0 8px;border-radius:8px;margin-bottom:2px}
.sb-item:hover{background:#F5F3FF;color:#7C3AED}
.sb-item.active{background:#EDE9FE;color:#7C3AED;font-weight:700;border-left:3px solid #7C3AED;border-radius:8px}
.sb-item .sb-icon{font-size:17px;width:22px;text-align:center}
.sb-badge{background:#F59E0B;color:#fff;font-size:10px;font-weight:700;padding:2px 6px;border-radius:10px;margin-left:auto}
.sb-user{padding:14px 18px;border-top:1px solid #F0EBF8;display:flex;align-items:center;gap:10px}
.sb-avatar{width:36px;height:36px;background:linear-gradient(135deg,#7C3AED,#5B21B6);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:#fff;flex-shrink:0}
.sb-user-name{font-size:13px;font-weight:700;color:#1C1917}
.sb-user-role{font-size:11px;color:#7C3AED}
/* MAIN */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.topbar{background:#fff;border-bottom:1px solid #EDE9FE;padding:0 26px;height:58px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.topbar-title{font-size:17px;font-weight:800;color:#1C1917}
.topbar-right{display:flex;align-items:center;gap:10px}
.tb-chip{background:#F5F3FF;color:#7C3AED;padding:5px 12px;border-radius:20px;font-size:12px;font-weight:600;border:1px solid #EDE9FE}
.content{flex:1;overflow-y:auto;padding:22px 26px}

/* CHAT+QUIZ PANEL */
.chat-quiz-layout{display:grid;grid-template-columns:1fr 320px;gap:16px;height:calc(100vh - 102px)}
.chat-box{display:flex;flex-direction:column;background:#fff;border:1.5px solid #EDE9FE;border-radius:16px;overflow:hidden;box-shadow:0 2px 12px rgba(124,58,237,0.05)}
.chat-head{padding:14px 18px;border-bottom:1px solid #F5F3FF;display:flex;align-items:center;justify-content:space-between;background:linear-gradient(135deg,#F5F3FF,#FEFCE8)}
.ai-chip{display:flex;align-items:center;gap:8px}
.ai-ball{width:34px;height:34px;background:linear-gradient(135deg,#7C3AED,#5B21B6);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:16px}
.ai-name{font-size:14px;font-weight:700;color:#1C1917}
.ai-status{font-size:11px;color:#7C3AED;margin-top:1px}
.rag-tag{background:#EDE9FE;color:#7C3AED;font-size:11px;padding:4px 10px;border-radius:6px;border:1px solid #DDD6FE;font-weight:600}
.msgs{flex:1;overflow-y:auto;padding:16px 18px;display:flex;flex-direction:column;gap:12px}
.m-row{display:flex;gap:8px}
.m-row.u{flex-direction:row-reverse}
.mv{width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;flex-shrink:0}
.mv.ai{background:linear-gradient(135deg,#7C3AED,#5B21B6);color:#fff}
.mv.u{background:#F5F3FF;color:#7C3AED}
.bbl{max-width:76%;padding:11px 14px;border-radius:12px;font-size:13px;line-height:1.65}
.bbl.ai{background:#F8F7FF;border:1px solid #EDE9FE;border-top-left-radius:2px;color:#1C1917}
.bbl.u{background:linear-gradient(135deg,#7C3AED,#5B21B6);color:#fff;border-top-right-radius:2px}
.related-q-box{margin-top:10px;background:#FEFCE8;border:1px solid #FDE68A;border-radius:10px;padding:10px 13px}
.rq-title{font-size:11.5px;font-weight:700;color:#92400E;margin-bottom:7px}
.rq-item{display:flex;align-items:center;justify-content:space-between;padding:6px 10px;background:#fff;border-radius:7px;margin-bottom:5px;cursor:pointer;border:1px solid #FDE68A;transition:background .15s}
.rq-item:hover{background:#FFFBEB}
.rq-item:last-child{margin-bottom:0}
.rq-text{font-size:12px;color:#1C1917;font-weight:500}
.rq-cat{font-size:11px;color:#D97706;background:#FEF3C7;padding:2px 7px;border-radius:4px}
.try-btn{background:#7C3AED;color:#fff;border:none;padding:3px 9px;border-radius:5px;font-size:11px;cursor:pointer;font-family:inherit;white-space:nowrap}
.inp-area{padding:14px 18px;border-top:1px solid #F5F3FF}
.quick-btns{display:flex;gap:7px;margin-bottom:9px;flex-wrap:wrap}
.qb{background:#F5F3FF;border:1px solid #EDE9FE;color:#7C3AED;padding:5px 11px;border-radius:20px;font-size:12px;cursor:pointer;font-family:inherit}
.inp-row{display:flex;gap:8px}
.inp{flex:1;border:1.5px solid #EDE9FE;border-radius:10px;padding:9px 13px;font-family:inherit;font-size:13px;outline:none;background:#FAFAF8;transition:border-color .2s}
.inp:focus{border-color:#7C3AED;background:#fff}
.send{width:38px;height:38px;background:linear-gradient(135deg,#7C3AED,#5B21B6);color:#fff;border:none;border-radius:9px;font-size:17px;cursor:pointer;display:flex;align-items:center;justify-content:center}
/* RIGHT PANEL */
.rp{display:flex;flex-direction:column;gap:12px;overflow-y:auto}
.rp-card{background:#fff;border:1.5px solid #EDE9FE;border-radius:14px;padding:16px;box-shadow:0 2px 8px rgba(124,58,237,0.04)}
.rp-card h4{font-size:13px;font-weight:700;color:#1C1917;margin-bottom:12px;display:flex;align-items:center;gap:7px}
.prog-row{display:flex;align-items:center;gap:10px;margin-bottom:9px}
.prog-label{font-size:12px;color:#57534E;width:52px;flex-shrink:0}
.prog-bar{flex:1;height:7px;background:#F0EBF8;border-radius:10px;overflow:hidden}
.prog-fill{height:100%;border-radius:10px}
.prog-pct{font-size:11px;color:#7C3AED;font-weight:700;width:30px;text-align:right;flex-shrink:0}
.exam-mini{background:#F5F3FF;border:1.5px solid #EDE9FE;border-radius:10px;padding:12px;cursor:pointer;transition:all .2s}
.exam-mini:hover{background:#EDE9FE}
.em-title{font-size:13px;font-weight:700;color:#1C1917}
.em-meta{font-size:11.5px;color:#78716C;margin-top:4px}
.em-badge{background:#7C3AED;color:#fff;font-size:10px;padding:2px 7px;border-radius:4px;margin-top:6px;display:inline-block}

/* EXAM */
.exam-layout{max-width:800px;margin:0 auto}
.exam-header-card{background:linear-gradient(135deg,#7C3AED,#5B21B6);border-radius:16px;padding:24px 28px;margin-bottom:20px;color:#fff;display:flex;align-items:center;justify-content:space-between}
.exam-title{font-size:20px;font-weight:800}
.exam-sub{font-size:13px;opacity:.8;margin-top:5px}
.exam-meta-chips{display:flex;gap:8px;margin-top:14px;flex-wrap:wrap}
.e-chip{background:rgba(255,255,255,0.15);border:1px solid rgba(255,255,255,0.25);padding:5px 12px;border-radius:20px;font-size:12px}
.timer-box{background:rgba(255,255,255,0.15);border:1px solid rgba(255,255,255,0.25);border-radius:14px;padding:16px 20px;text-align:center}
.timer-val{font-size:32px;font-weight:800;font-variant-numeric:tabular-nums}
.timer-label{font-size:11px;opacity:.7;margin-top:3px}
.q-progress{background:#fff;border:1.5px solid #EDE9FE;border-radius:14px;padding:16px 22px;margin-bottom:16px;display:flex;align-items:center;gap:16px}
.q-prog-bar{flex:1;height:8px;background:#F0EBF8;border-radius:10px;overflow:hidden}
.q-prog-fill{height:100%;background:linear-gradient(135deg,#7C3AED,#F59E0B);border-radius:10px;width:40%}
.q-card{background:#fff;border:1.5px solid #EDE9FE;border-radius:16px;padding:24px 28px;margin-bottom:14px;box-shadow:0 2px 12px rgba(124,58,237,0.06)}
.q-num{display:flex;align-items:center;gap:10px;margin-bottom:16px}
.q-num-badge{background:#7C3AED;color:#fff;width:28px;height:28px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;flex-shrink:0}
.q-cat-tag{background:#EDE9FE;color:#7C3AED;padding:3px 9px;border-radius:5px;font-size:11px;font-weight:600}
.adapt-badge{background:#FEF3C7;color:#D97706;padding:3px 9px;border-radius:5px;font-size:11px;font-weight:600;border:1px solid #FDE68A}
.q-text{font-size:15px;font-weight:600;line-height:1.6;color:#1C1917;margin-bottom:20px}
.options{display:flex;flex-direction:column;gap:10px}
.opt{display:flex;align-items:center;gap:12px;padding:13px 16px;border:1.5px solid #EDE9FE;border-radius:12px;cursor:pointer;transition:all .2s}
.opt:hover{border-color:#7C3AED;background:#F5F3FF}
.opt.selected{border-color:#7C3AED;background:#EDE9FE}
.opt.correct{border-color:#22C55E;background:#F0FDF4}
.opt-num{width:28px;height:28px;border-radius:8px;background:#F5F3FF;color:#7C3AED;font-size:13px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.opt.selected .opt-num{background:#7C3AED;color:#fff}
.opt.correct .opt-num{background:#22C55E;color:#fff}
.opt-text{font-size:13.5px;color:#1C1917;line-height:1.4}
.q-nav{display:flex;justify-content:space-between;align-items:center;margin-top:16px}
.btn-prev{background:#fff;border:1.5px solid #EDE9FE;color:#57534E;padding:10px 20px;border-radius:10px;font-family:inherit;font-size:13px;cursor:pointer}
.btn-next{background:linear-gradient(135deg,#7C3AED,#5B21B6);color:#fff;border:none;padding:10px 22px;border-radius:10px;font-family:inherit;font-size:13px;font-weight:700;cursor:pointer}
.ai-hint{background:#FEF9C3;border:1px solid #FDE68A;border-radius:10px;padding:11px 14px;margin-top:12px;display:flex;gap:8px}
.hint-icon{font-size:16px;flex-shrink:0}
.hint-text{font-size:12.5px;color:#78350F;line-height:1.6}

/* STUDY ROOM */
.study-layout{display:grid;grid-template-columns:200px 1fr 260px;gap:14px;height:calc(100vh - 102px)}
.rooms-panel{background:#fff;border:1.5px solid #EDE9FE;border-radius:14px;overflow:hidden}
.rooms-head{padding:13px 16px;border-bottom:1px solid #F5F3FF;font-size:13px;font-weight:700;background:linear-gradient(135deg,#F5F3FF,#FEFCE8)}
.room-item{padding:12px 16px;border-bottom:1px solid #F5F3FF;cursor:pointer;transition:background .15s}
.room-item.active{background:#EDE9FE;border-left:3px solid #7C3AED}
.room-item:hover{background:#F5F3FF}
.room-name{font-size:13px;font-weight:700;color:#1C1917}
.room-cnt{font-size:11px;color:#78716C;margin-top:3px}
.room-live{display:inline-flex;align-items:center;gap:4px;font-size:10px;color:#22C55E;margin-top:4px}
.live-dot{width:5px;height:5px;background:#22C55E;border-radius:50%;animation:pulse2 1.5s infinite}
@keyframes pulse2{0%,100%{opacity:1}50%{opacity:.3}}
.study-chat{display:flex;flex-direction:column;background:#fff;border:1.5px solid #EDE9FE;border-radius:14px;overflow:hidden}
.sc-head{padding:13px 18px;border-bottom:1px solid #F5F3FF;display:flex;align-items:center;justify-content:space-between;background:linear-gradient(135deg,#F5F3FF,#FEFCE8)}
.sc-head h3{font-size:14px;font-weight:700}
.members-row{display:flex;gap:-4px}
.m-chip{width:28px;height:28px;border-radius:50%;border:2px solid #fff;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#fff;margin-left:-4px}
.study-msgs{flex:1;overflow-y:auto;padding:15px 18px;display:flex;flex-direction:column;gap:10px}
.sm-row{display:flex;gap:8px;align-items:flex-start}
.sm-av{width:28px;height:28px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#fff;flex-shrink:0}
.sm-name{font-size:11px;color:#78716C;margin-bottom:3px}
.sm-bbl{background:#F8F7FF;border:1px solid #EDE9FE;border-radius:10px;border-top-left-radius:2px;padding:9px 13px;font-size:13px;line-height:1.55;max-width:80%}
.sm-bbl.ai-msg{background:linear-gradient(135deg,#EDE9FE,#F5F3FF);border-color:#DDD6FE}
.ai-answer-box{background:#EDE9FE;border:1px solid #DDD6FE;border-radius:10px;padding:10px 13px;margin-top:6px;font-size:12.5px;line-height:1.6;color:#3730A3}
.study-input{padding:13px 18px;border-top:1px solid #F5F3FF}
.stats-panel{background:#fff;border:1.5px solid #EDE9FE;border-radius:14px;padding:16px;overflow-y:auto}
.stats-panel h3{font-size:13px;font-weight:700;margin-bottom:14px}
.contrib-item{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.c-av{width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:#fff;flex-shrink:0}
.c-name{font-size:12.5px;font-weight:600;color:#1C1917}
.c-bar-wrap{flex:1}
.c-bar{height:6px;background:#EDE9FE;border-radius:10px;overflow:hidden;margin-top:4px}
.c-fill{height:100%;border-radius:10px;background:linear-gradient(135deg,#7C3AED,#F59E0B)}
.c-cnt{font-size:11px;color:#7C3AED;font-weight:700;flex-shrink:0}

/* INSTRUCTOR */
.inst-layout{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.inst-upload{background:#fff;border:1.5px solid #EDE9FE;border-radius:14px;padding:22px}
.inst-upload h3{font-size:15px;font-weight:700;margin-bottom:16px}
.drop-zone{border:2px dashed #DDD6FE;border-radius:12px;padding:28px;text-align:center;cursor:pointer;transition:all .2s;background:#FAFAF8;margin-bottom:16px}
.drop-zone:hover{border-color:#7C3AED;background:#F5F3FF}
.drop-icon{font-size:36px;margin-bottom:8px}
.drop-text{font-size:13.5px;font-weight:600;color:#1C1917}
.drop-sub{font-size:12px;color:#78716C;margin-top:4px}
.auto-tag-result{background:#EDE9FE;border:1px solid #DDD6FE;border-radius:12px;padding:16px;margin-top:12px}
.at-title{font-size:12.5px;font-weight:700;color:#5B21B6;margin-bottom:10px;display:flex;align-items:center;gap:6px}
.tag-row{display:flex;flex-wrap:wrap;gap:7px}
.auto-tag{padding:5px 12px;border-radius:20px;font-size:12px;font-weight:600}
.tag-cat{background:#EDE9FE;color:#7C3AED;border:1px solid #DDD6FE}
.tag-diff{background:#FEF3C7;color:#D97706;border:1px solid #FDE68A}
.tag-type{background:#D1FAE5;color:#065F46;border:1px solid #A7F3D0}
.inst-right{display:flex;flex-direction:column;gap:14px}
.weak-card{background:#fff;border:1.5px solid #EDE9FE;border-radius:14px;padding:20px}
.weak-card h3{font-size:14px;font-weight:700;margin-bottom:14px}
.weak-item{display:flex;align-items:center;gap:10px;padding:10px 12px;background:#FEF9FF;border:1px solid #EDE9FE;border-radius:10px;margin-bottom:8px}
.weak-icon{font-size:18px;flex-shrink:0}
.weak-label{flex:1;font-size:13px;font-weight:600;color:#1C1917}
.weak-cnt{font-size:12px;color:#7C3AED;font-weight:700}
.alert-btn{background:#F59E0B;color:#fff;border:none;padding:4px 10px;border-radius:6px;font-size:11px;cursor:pointer;font-family:inherit;white-space:nowrap}
.content-list{background:#fff;border:1.5px solid #EDE9FE;border-radius:14px;overflow:hidden}
.cl-header{display:grid;grid-template-columns:1fr 90px 80px 70px;padding:10px 16px;background:#F8F7FF;border-bottom:1px solid #EDE9FE;font-size:11.5px;font-weight:700;color:#78716C}
.cl-row{display:grid;grid-template-columns:1fr 90px 80px 70px;padding:12px 16px;border-bottom:1px solid #F5F3FF;font-size:12.5px;align-items:center}
.cl-row:last-child{border-bottom:none}
.diff-badge{padding:3px 8px;border-radius:5px;font-size:11px;font-weight:600}
.diff-hard{background:#FEE2E2;color:#DC2626}
.diff-med{background:#FEF3C7;color:#D97706}
.diff-easy{background:#D1FAE5;color:#065F46}

/* PROGRESS */
.prog-layout{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.prog-main{display:flex;flex-direction:column;gap:14px}
.prog-card{background:#fff;border:1.5px solid #EDE9FE;border-radius:14px;padding:20px;box-shadow:0 2px 8px rgba(124,58,237,0.04)}
.prog-card h3{font-size:14px;font-weight:700;margin-bottom:14px}
.ai-comment{background:linear-gradient(135deg,#EDE9FE,#FEFCE8);border:1px solid #DDD6FE;border-radius:12px;padding:16px}
.ai-c-head{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.ai-c-icon{width:32px;height:32px;background:linear-gradient(135deg,#7C3AED,#5B21B6);border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.ai-c-name{font-size:13px;font-weight:700;color:#1C1917}
.ai-c-sub{font-size:11px;color:#7C3AED}
.ai-c-text{font-size:13px;line-height:1.7;color:#292524}
.focus-chips{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}
.focus-chip{background:#7C3AED;color:#fff;padding:6px 14px;border-radius:20px;font-size:12px;font-weight:600}
.heatmap{display:grid;grid-template-columns:repeat(10,1fr);gap:4px;margin-top:12px}
.hm-cell{width:100%;aspect-ratio:1;border-radius:4px;background:#EDE9FE}
.hm-cell.d1{background:#C4B5FD}
.hm-cell.d2{background:#8B5CF6}
.hm-cell.d3{background:#6D28D9}
.hm-cell.d4{background:#4C1D95}
.prog-right{display:flex;flex-direction:column;gap:14px}
.mini-stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.mini-s{background:#fff;border:1.5px solid #EDE9FE;border-radius:12px;padding:14px;text-align:center;box-shadow:0 1px 6px rgba(124,58,237,0.04)}
.ms-val{font-size:22px;font-weight:800;color:#7C3AED}
.ms-label{font-size:11px;color:#78716C;margin-top:3px}
.recent-acts{background:#fff;border:1.5px solid #EDE9FE;border-radius:14px;padding:18px}
.recent-acts h3{font-size:14px;font-weight:700;margin-bottom:12px}
.act-item{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid #F5F3FF}
.act-item:last-child{border-bottom:none}
.act-icon{width:32px;height:32px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0}
.act-text{flex:1;font-size:12.5px;color:#1C1917;font-weight:500}
.act-time{font-size:11px;color:#A8A29E}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState } = React;
