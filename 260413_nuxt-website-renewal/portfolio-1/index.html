function Modal({ open, onClose, title, children, width=560 }) {

  return (
    <div style={{ position:'fixed', inset:0, background:'rgba(0,0,0,0.45)', zIndex:1000, display:'flex', alignItems:'center', justifyContent:'center' }}

      <div style={{ background:'#fff', borderRadius:16, width, maxWidth:'94vw', maxHeight:'88vh', overflow:'auto', boxShadow:'0 20px 60px rgba(0,0,0,0.2)' }}
        onClick={e=>e.stopPropagation()}>
        <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', padding:'20px 24px', borderBottom:'1px solid #EDE0D7' }}>
          <h3 style={{ fontSize:17, fontWeight:700, color:'#1A1210' }}>{title}</h3>
          <button onClick={onClose} style={{ background:'none', border:'none', cursor:'pointer', padding:4, borderRadius:8, display:'flex' }}>
            <Icon name="x" size={18} color="#6B5B52" />
          </button>
        </div>
        <div style={{ padding:24 }}>{children}</div>
      </div>
    </div>
  );
}

/* ── 스타일 필터 ── */

  const [selectedStyle, setSelectedStyle] = useState([]);
  const [selectedArea, setSelectedArea] = useState([]);
  const [selectedRoom, setSelectedRoom] = useState([]);
  const [keyword, setKeyword] = useState('');

  const styles = ['모던','북유럽','빈티지','내추럴','미니멀','럭셔리','인더스트리얼','프로방스'];

  const rooms = ['거실','주방','침실','욕실','드레스룸','발코니','전체'];

    const styleOk = selectedStyle.length===0 || selectedStyle.includes(f.style);

  return (

            </div>
          </div>

          {/* 스타일 */}

            <div style={{ display:'flex', flexWrap:'wrap', gap:7 }}>
              {styles.map(s => (
                <button key={s} onClick={() => toggle(selectedStyle, setSelectedStyle, s)}
                  style={{ padding:'5px 13px', borderRadius:20, border:'1.5px solid', cursor:'pointer', fontSize:12, fontWeight:600,
                    borderColor: selectedStyle.includes(s) ? 'var(--primary)' : 'var(--border)',

                    color: selectedStyle.includes(s) ? '#fff' : 'var(--text-2)' }}>

            </div>

                <button key={a} onClick={() => toggle(selectedArea, setSelectedArea, a)}
                  style={{ padding:'5px 13px', borderRadius:20, border:'1.5px solid', cursor:'pointer', fontSize:12, fontWeight:600,

                  {r}

            </div>

          {/* 초기화 */}
          {(selectedStyle.length||selectedArea.length||selectedRoom.length||keyword) ? (

          <div style={{ display:'grid', gridTemplateColumns:'repeat(3,1fr)', gap:16 }}>

                <div style={{ height:140, background:item.img }} />

                  <div style={{ display:'flex', gap:5, marginBottom:6 }}>

                  </div>
                  <p style={{ fontSize:13, fontWeight:700, color:'#1A1210', lineHeight:1.4, marginBottom:6 }}>{item.title}</p>
                  <div style={{ display:'flex', gap:8 }}>
                    {item.tags.map(t=><span key={t} style={{ fontSize:11, color:'#a08878' }}>#{t}</span>)}
                  </div>
                </div>
              </div>
            ))}
          </div>
        </div>
      </div>
    </div>
  );
}

            <label style={{ fontSize:13, fontWeight:700, color:'#1A1210', display:'block', marginBottom:6 }}>설명</label>
            <textarea value={form.desc} onChange={e=>setForm(p=>({...p,desc:e.target.value}))} rows={3} placeholder="시공사례에 대한 설명을 입력하세요..."
              style={{ width:'100%', padding:'10px 14px', border:'1.5px solid var(--border)', borderRadius:10, fontSize:14, outline:'none', resize:'vertical', fontFamily:'Pretendard' }} />
          </div>
          <div style={{ display:'flex', gap:10, justifyContent:'flex-end' }}>
            <button onClick={()=>setShowCreate(false)} style={{ padding:'10px 20px', borderRadius:10, border:'1.5px solid var(--border)', background:'var(--surface)', color:'var(--text-2)', fontWeight:600, fontSize:14, cursor:'pointer' }}>취소</button>
            <button onClick={()=>{handleSubmit();}} style={{ padding:'10px 24px', borderRadius:10, border:'none', background:'var(--primary)', color:'#fff', fontWeight:700, fontSize:14, cursor:'pointer' }}>등록하기</button>
          </div>
        </div>
      </Modal>

      {/* 상세 모달 */}
      <Modal open={!!selected} onClose={()=>setSelected(null)} title="시공사례 상세" width={500}>
        {selected && (
          <div style={{ display:'grid', gap:14 }}>
            <div style={{ height:140, background:selected.img, borderRadius:12 }} />
            <div style={{ display:'flex', gap:8, flexWrap:'wrap' }}>
              <Badge color={statusColor(selected.status)}>{statusLabel(selected.status)}</Badge>
              <Badge color="gray">{selected.area||'평수 미입력'}</Badge>
            </div>
            <h3 style={{ fontSize:17, fontWeight:800, color:'#1A1210' }}>{selected.title}</h3>
            <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:12 }}>
              <div style={{ background:'#FAF7F4', borderRadius:10, padding:'12px 14px' }}>
                <div style={{ fontSize:11, color:'#a08878', fontWeight:700, marginBottom:4 }}>시공업체</div>
                <div style={{ fontSize:14, fontWeight:600, color:'#1A1210' }}>{selected.contractor}</div>
              </div>
              <div style={{ background:'#FAF7F4', borderRadius:10, padding:'12px 14px' }}>
                <div style={{ fontSize:11, color:'#a08878', fontWeight:700, marginBottom:4 }}>등록일</div>
                <div style={{ fontSize:14, fontWeight:600, color:'#1A1210' }}>{selected.date}</div>
              </div>
            </div>
            <div>
              <label style={{ fontSize:12, fontWeight:700, color:'#a08878', display:'block', marginBottom:6 }}>관리자 메모</label>
              <textarea rows={2} placeholder="내부 메모를 입력하세요..." style={{ width:'100%', padding:'10px 14px', border:'1.5px solid var(--border)', borderRadius:10, fontSize:13, outline:'none', resize:'none', fontFamily:'Pretendard' }} />
            </div>
            <div style={{ display:'flex', gap:8, justifyContent:'flex-end' }}>
              <button onClick={()=>setSelected(null)} style={{ padding:'9px 18px', borderRadius:10, border:'1.5px solid var(--border)', background:'transparent', color:'var(--text-2)', fontWeight:600, fontSize:13, cursor:'pointer' }}>닫기</button>
              <button onClick={()=>{toggleStatus(selected.id);setSelected(null);}} style={{ padding:'9px 18px', borderRadius:10, border:'none', background:'var(--primary)', color:'#fff', fontWeight:700, fontSize:13, cursor:'pointer' }}>
                {selected.status==='published'?'내리기':'게시하기'}
              </button>
            </div>
          </div>
        )}
      </Modal>

      <Toast msg={toast} />
    </div>
  );
}

/* ── App ── */
function App() {
  const [page, setPage] = useState('main');
  const [cardModal, setCardModal] = useState(null);
  const [imgModal, setImgModal] = useState(null);
  const [toast, setToast] = useState('');

  const PAGE_TITLES = { main:'오늘의 집들이', 'gallery-detail':'집들이 갤러리 상세', 'style-filter':'스타일 필터', 'admin-register':'시공사례 관리' };

  return (
    <div style={{ display:'flex', width:'100%', height:'100vh', overflow:'hidden' }}>
      <Sidebar page={page} setPage={setPage} />

      {/* 우측 */}
      <div style={{ flex:1, display:'flex', flexDirection:'column', overflow:'hidden' }}>
        {/* TopBar */}
        <div style={{ height:60, background:'var(--surface)', borderBottom:'1px solid var(--border)', display:'flex', alignItems:'center', justifyContent:'space-between', padding:'0 24px', flexShrink:0 }}>
          <h2 style={{ fontSize:16, fontWeight:700, color:'#1A1210' }}>{PAGE_TITLES[page]}</h2>
          <div style={{ display:'flex', alignItems:'center', gap:12 }}>
            <div style={{ display:'flex', alignItems:'center', gap:8, background:'#FAF7F4', borderRadius:10, padding:'8px 14px', border:'1px solid var(--border)' }}>
              <Icon name="search" size={15} color="#a08878" />
              <input placeholder="집들이 검색..." style={{ width:180, background:'none', border:'none', outline:'none', fontSize:13, color:'#1A1210' }} />
            </div>
            <button style={{ width:36, height:36, borderRadius:10, background:'var(--primary-light)', border:'none', cursor:'pointer', display:'flex', alignItems:'center', justifyContent:'center', position:'relative' }}>
              <Icon name="bell" size={16} color="var(--primary)" />
              <span style={{ position:'absolute', top:6, right:6, width:8, height:8, borderRadius:'50%', background:'var(--primary)', border:'2px solid #fff' }} />
            </button>
            <div style={{ width:34, height:34, borderRadius:10, background:'linear-gradient(135deg,#D4622A,#8B4513)', display:'flex', alignItems:'center', justifyContent:'center', color:'#fff', fontWeight:700, fontSize:13, cursor:'pointer' }}>최</div>
          </div>
        </div>

        {/* 콘텐츠 */}
        <main style={{ flex:1, overflowY:'auto' }}>
          {page==='main' && <MainPage onCardClick={setCardModal} />}
          {page==='gallery-detail' && <GalleryPage onImgClick={setImgModal} />}
          {page==='style-filter' && <FilterPage />}
          {page==='admin-register' && <AdminPage />}
        </main>
      </div>

      {/* 카드 상세 모달 */}
      <Modal open={!!cardModal} onClose={()=>setCardModal(null)} title="집들이 상세" width={500}>
        {cardModal && (
          <div>
            <div style={{ height:160, background:cardModal.img, borderRadius:12, marginBottom:16 }} />
            <div style={{ display:'flex', gap:8, marginBottom:12, flexWrap:'wrap' }}>
              <Badge color="primary">{cardModal.style}</Badge>
              <Badge color="gray">{cardModal.area}</Badge>
              <Badge color="gray">{cardModal.room}</Badge>
            </div>
            <h3 style={{ fontSize:18, fontWeight:800, color:'#1A1210', marginBottom:6 }}>{cardModal.title}</h3>
            <p style={{ fontSize:13, color:'#6B5B52', marginBottom:12 }}>작성자: {cardModal.user}</p>
            <div style={{ display:'flex', gap:8, marginBottom:16 }}>
              {cardModal.tags.map(t=><span key={t} style={{ fontSize:12, color:'var(--primary)', background:'var(--primary-light)', padding:'3px 10px', borderRadius:12, fontWeight:600 }}>#{t}</span>)}
            </div>
            <div style={{ display:'flex', gap:8 }}>
              <button onClick={()=>setCardModal(null)} style={{ flex:1, padding:'11px', borderRadius:10, border:'1.5px solid var(--border)', background:'transparent', color:'var(--text-2)', fontWeight:600, cursor:'pointer' }}>닫기</button>
              <button onClick={()=>{setPage('gallery-detail');setCardModal(null);}} style={{ flex:2, padding:'11px', borderRadius:10, border:'none', background:'var(--primary)', color:'#fff', fontWeight:700, cursor:'pointer' }}>갤러리 보기</button>
            </div>
          </div>
        )}
      </Modal>

      {/* 이미지 라이트박스 */}
      <Modal open={!!imgModal} onClose={()=>setImgModal(null)} title={imgModal?.title||''} width={640}>
        {imgModal && (
          <div>
            <div style={{ height:320, background:imgModal.img, borderRadius:12, marginBottom:16 }} />
            <p style={{ fontSize:14, color:'#6B5B52', lineHeight:1.6 }}>{imgModal.desc}</p>
          </div>
        )}
      </Modal>

      <Toast msg={toast} />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
