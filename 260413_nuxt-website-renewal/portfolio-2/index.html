/* ── TopNav ── */
const TABS = [
  { key:'main', label:'홈', icon:'home' },
  { key:'review-detail', label:'리뷰 상세', icon:'review' },
  { key:'map-explore', label:'지도 탐색', icon:'map' },
  { key:'category-curate', label:'카테고리', icon:'category' },
];

/* ── App ── */
function App() {
  const [tab, setTab] = useState('main');
  const [drawer, setDrawer] = useState(null);

  return (
    <div style={{ display:'flex', flexDirection:'column', width:'100%', minHeight:'100vh' }}>
      {/* TopNav */}
      <header style={{ background:'var(--surface)', borderBottom:'1px solid var(--border)', position:'sticky', top:0, zIndex:100 }}>
        <div style={{ maxWidth:1100, margin:'0 auto', padding:'0 28px', display:'flex', alignItems:'center', height:64 }}>
          {/* 로고 */}
          <div style={{ display:'flex', alignItems:'center', gap:10, marginRight:36 }}>
            <div style={{ width:34, height:34, background:'linear-gradient(135deg,#1B6CA8,#0F2A3D)', borderRadius:10, display:'flex', alignItems:'center', justifyContent:'center' }}>
              <span style={{ color:'#fff', fontSize:16 }}>✈</span>
            </div>
            <span style={{ fontSize:16, fontWeight:900, color:'#0F2A3D', letterSpacing:-.5 }}>트립로그</span>
          </div>

          {/* 탭 */}
          <nav style={{ display:'flex', gap:4, flex:1 }}>
            {TABS.map(t => (
              <button key={t.key} onClick={()=>setTab(t.key)}
                style={{ display:'flex', alignItems:'center', gap:6, padding:'8px 16px', borderRadius:10, border:'none', cursor:'pointer', fontSize:14, fontWeight:600,
                  background: tab===t.key ? 'var(--primary-light)' : 'transparent',
                  color: tab===t.key ? 'var(--primary)' : '#5A7A8A' }}>
                <Icon name={t.icon} size={15} color={tab===t.key?'var(--primary)':'#5A7A8A'} />
                {t.label}
              </button>
            ))}
          </nav>

          {/* 우측 */}
          <div style={{ display:'flex', alignItems:'center', gap:10 }}>
            <div style={{ display:'flex', alignItems:'center', gap:8, background:'#F8FAFC', borderRadius:10, padding:'8px 14px', border:'1px solid var(--border)' }}>
              <Icon name="search" size={15} color="#5A7A8A" />
              <input placeholder="여행지, 리뷰 검색..." style={{ width:160, background:'none', border:'none', outline:'none', fontSize:13, color:'#0F2A3D' }} />
            </div>
            <button style={{ width:36, height:36, borderRadius:10, background:'var(--primary-light)', border:'none', cursor:'pointer', display:'flex', alignItems:'center', justifyContent:'center' }}>
              <Icon name="bell" size={16} color="var(--primary)" />
            </button>
            <button style={{ display:'flex', alignItems:'center', gap:7, padding:'7px 14px', borderRadius:10, border:'none', background:'var(--primary)', color:'#fff', fontWeight:700, fontSize:13, cursor:'pointer' }}>
              <Icon name="plus" size={14} color="#fff" /> 리뷰 작성
            </button>
          </div>
        </div>

        {/* 서브 탭 바 (홈에서) */}
        {tab==='main' && (
          <div style={{ background:'var(--bg)', borderTop:'1px solid var(--border)' }}>
            <div style={{ maxWidth:1100, margin:'0 auto', padding:'0 28px', display:'flex', gap:6, overflowX:'auto' }}>
              {['전체','국내여행','해외여행','맛집','카페','숙박','자연','문화'].map((c,i) => (
                <button key={c} style={{ padding:'8px 16px', border:'none', borderBottom: i===0?'2.5px solid var(--primary)':'2.5px solid transparent', background:'transparent', cursor:'pointer', fontSize:13, fontWeight: i===0?700:500, color: i===0?'var(--primary)':'#5A7A8A', whiteSpace:'nowrap', flexShrink:0 }}>
                  {c}
                </button>
              ))}
            </div>
          </div>
        )}
      </header>

      {/* 콘텐츠 */}
      <main style={{ flex:1 }}>
        {tab==='main' && <HomePage onItemClick={setDrawer} />}
        {tab==='review-detail' && <ReviewDetailPage onItemClick={setDrawer} />}
        {tab==='map-explore' && <MapPage onItemClick={setDrawer} />}
        {tab==='category-curate' && <CategoryPage onItemClick={setDrawer} />}
      </main>

      <Drawer open={!!drawer} onClose={()=>setDrawer(null)} item={drawer} />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
