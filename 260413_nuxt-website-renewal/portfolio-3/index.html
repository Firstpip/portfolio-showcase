  return <span style={{ background: c[color]+'1A', color: c[color], fontSize:small?10:11, fontWeight:700, padding:small?'2px 7px':'3px 9px', borderRadius:20 }}>{children}</span>;
}

}

  return (
    <div style={{ display:'flex', flex:1, height:'100%', overflow:'hidden' }}>
      {/* 좌측: 업체 목록 */}

        <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:20 }}>

        </div>

      {/* 업체 목록 (간략) */}
      <div style={{ width:220, borderRight:'1px solid var(--border)', overflowY:'auto', flexShrink:0, padding:'16px' }}>
        <div style={{ fontSize:12, fontWeight:700, color:'#9ABBA8', marginBottom:10, letterSpacing:.5 }}>등록 업체</div>
        {CONTRACTORS.map(ct => (
          <div key={ct.id} style={{ display:'flex', alignItems:'center', gap:8, padding:'10px', borderRadius:8, cursor:'pointer', marginBottom:4,
            background: ct.id===1?'var(--primary-light)':'transparent', border:'1.5px solid', borderColor: ct.id===1?'var(--primary)':'transparent' }}>
            <div style={{ width:32, height:32, borderRadius:8, background:ct.img, flexShrink:0 }} />
            <div>
              <p style={{ fontSize:12, fontWeight:700, color:'#1A2E25' }}>{ct.name}</p>
              <p style={{ fontSize:10, color:'#9ABBA8' }}>⭐ {ct.rating}</p>
            </div>
          </div>
        ))}
      </div>

      {/* 프로필 메인 */}
      <div style={{ flex:1, overflowY:'auto', padding:'24px' }}>
        {/* 헤더 */}
        <div style={{ background:'var(--surface)', borderRadius:'var(--radius)', padding:'20px', marginBottom:16, border:'1px solid var(--border)', display:'flex', gap:16, alignItems:'center' }}>
          <div style={{ width:64, height:64, borderRadius:14, background:c.img, flexShrink:0 }} />
          <div style={{ flex:1 }}>
            <div style={{ display:'flex', gap:8, alignItems:'center', marginBottom:6 }}>
              <h2 style={{ fontSize:18, fontWeight:900, color:'#1A2E25' }}>{c.name}</h2>
              {c.verified && <Badge color="primary">인증업체</Badge>}
              <Badge color="accent">매칭스코어 {c.score}</Badge>
            </div>
            <div style={{ display:'flex', gap:12, alignItems:'center', flexWrap:'wrap' }}>
              <span style={{ display:'flex', alignItems:'center', gap:4, fontSize:14, fontWeight:700, color:'#1A2E25' }}><Icon name="star" size={14} color="#F4A623" /> {c.rating} <span style={{ fontSize:12, fontWeight:400, color:'#9ABBA8' }}>({c.reviews}개 리뷰)</span></span>
              <span style={{ fontSize:13, color:'#5A7A6A' }}>{c.area}</span>
              <span style={{ fontSize:13, color:'#5A7A6A' }}>응답률 {c.response}%</span>
              <span style={{ fontSize:13, fontWeight:700, color:'var(--primary)' }}>시작 {c.minPrice}~</span>
            </div>
          </div>
          <button onClick={()=>showToast('견적 요청이 전송됐습니다')} style={{ padding:'10px 20px', borderRadius:8, border:'none', background:'var(--primary)', color:'#fff', fontWeight:700, fontSize:14, cursor:'pointer' }}>견적 요청</button>
        </div>

        {/* 탭 */}
        <div style={{ display:'flex', gap:4, marginBottom:16 }}>
          {[['portfolio','포트폴리오'],['reviews','시공 리뷰'],['info','업체 정보']].map(([k,l]) => (
            <button key={k} onClick={()=>setActiveTab(k)} style={{ padding:'8px 18px', borderRadius:8, border:'none', cursor:'pointer', fontSize:14, fontWeight:600,
              background: activeTab===k?'var(--primary)':'var(--surface)', color: activeTab===k?'#fff':'#5A7A6A',
              border: activeTab===k?'none':'1.5px solid var(--border)' }}>
              {l}
            </button>
          ))}
        </div>

        {/* 포트폴리오 */}
        {activeTab==='portfolio' && (
          <div style={{ display:'grid', gridTemplateColumns:'repeat(2,1fr)', gap:16 }}>
            {PORTFOLIO_WORKS.map(w => (
              <div key={w.id} onClick={()=>setSelectedWork(selectedWork?.id===w.id?null:w)}
                style={{ background:'var(--surface)', borderRadius:'var(--radius)', overflow:'hidden', border:'1.5px solid', cursor:'pointer', transition:'all 0.15s',
                  borderColor: selectedWork?.id===w.id?'var(--primary)':'var(--border)',
                  boxShadow: selectedWork?.id===w.id?'0 4px 16px rgba(46,107,79,0.2)':'var(--shadow)' }}>
                <div style={{ height:140, background:w.img }} />
                <div style={{ padding:'14px' }}>
                  <div style={{ display:'flex', gap:6, marginBottom:8, flexWrap:'wrap' }}>
                    {w.tags.map(t=><Badge key={t} small>{t}</Badge>)}
                  </div>
                  <h4 style={{ fontSize:14, fontWeight:700, color:'#1A2E25', marginBottom:6, lineHeight:1.35 }}>{w.title}</h4>
                  <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center' }}>
                    <div>
                      <span style={{ fontSize:12, color:'#5A7A6A' }}>{w.area} · {w.year}</span>
                    </div>
                    <div style={{ display:'flex', gap:4, alignItems:'center' }}>
                      <Icon name="star" size={12} color="#F4A623" />
                      <span style={{ fontSize:13, fontWeight:800, color:'#1A2E25' }}>{w.rating}</span>
                    </div>
                  </div>
                  <div style={{ marginTop:6, padding:'6px 10px', background:'var(--primary-light)', borderRadius:6, textAlign:'center' }}>
                    <span style={{ fontSize:13, fontWeight:700, color:'var(--primary)' }}>총 {w.price}</span>
                  </div>
                </div>
              </div>
            ))}
          </div>
        )}

        {/* 리뷰 */}
        {activeTab==='reviews' && (
          <div style={{ display:'flex', flexDirection:'column', gap:12 }}>
            {[...Array(4)].map((_, i) => (
              <div key={i} style={{ background:'var(--surface)', borderRadius:'var(--radius)', padding:'16px', border:'1px solid var(--border)' }}>
                <div style={{ display:'flex', gap:10, alignItems:'flex-start' }}>
                  <div style={{ width:36, height:36, borderRadius:9, background:`hsl(${i*60+80},40%,50%)`, display:'flex', alignItems:'center', justifyContent:'center', color:'#fff', fontWeight:700, flexShrink:0 }}>{['김','이','박','최'][i]}</div>
                  <div style={{ flex:1 }}>
                    <div style={{ display:'flex', gap:8, alignItems:'center', marginBottom:4 }}>
                      <span style={{ fontSize:13, fontWeight:700, color:'#1A2E25' }}>{['김민지','이수진','박준혁','최기용'][i]}</span>
                      <div style={{ display:'flex', gap:2 }}>{[...Array(5)].map((_,j)=><Icon key={j} name="star" size={11} color="#F4A623" />)}</div>
                      <span style={{ fontSize:11, color:'#9ABBA8' }}>{['2026.03.28','2026.02.15','2026.01.20','2025.12.10'][i]}</span>
                    </div>
                    <Badge small color="gray">{['25평 모던 리모델링','18평 원룸 시공','32평 아파트','45평 전체 시공'][i]}</Badge>
                    <p style={{ fontSize:13, color:'#5A7A6A', lineHeight:1.6, marginTop:8 }}>
                      {['꼼꼼하고 깔끔하게 마무리해 주셨어요. 일정도 정확히 지켜주셔서 만족합니다.','디자인 감각이 뛰어나셔서 원하는 스타일로 완성도 높게 시공해 주셨어요.','소통이 원활하고 중간 진행상황도 잘 공유해주셔서 안심하고 맡길 수 있었습니다.','큰 평수인데도 꼼꼼하게 하나하나 챙겨주셔서 기대 이상의 결과물이 나왔어요.'][i]}
                    </p>
                  </div>
                </div>
              </div>
            ))}
          </div>
        )}

        {/* 업체 정보 */}
        {activeTab==='info' && (
          <div style={{ background:'var(--surface)', borderRadius:'var(--radius)', padding:'20px', border:'1px solid var(--border)' }}>
            <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:16 }}>
              {[['업체명',c.name],['전문 지역',c.area],['평수 범위',c.range],['응답률',c.response+'%'],['최소 시공비',c.minPrice],['보유 리뷰',c.reviews+'개']].map(([l,v])=>(
                <div key={l} style={{ padding:'14px', background:'#FAFCFB', borderRadius:8, border:'1px solid var(--border)' }}>
                  <div style={{ fontSize:11, color:'#9ABBA8', fontWeight:700, marginBottom:4 }}>{l}</div>
                  <div style={{ fontSize:15, fontWeight:800, color:'#1A2E25' }}>{v}</div>
                </div>
              ))}
            </div>
            <div style={{ marginTop:16 }}>
              <div style={{ fontSize:12, color:'#9ABBA8', fontWeight:700, marginBottom:8 }}>전문 스타일</div>
              <div style={{ display:'flex', gap:8, flexWrap:'wrap' }}>
                {c.styles.map(s=><Badge key={s}>{s}</Badge>)}
              </div>
            </div>
          </div>
        )}
      </div>
      <Toast msg={toast} />
    </div>
  );
}

/* ── App ── */
function App() {
  const [page, setPage] = useState('main');
  const PAGE_TITLES = { main:'견적 매칭', 'admin-cms':'관리자 CMS', 'community-feed':'커뮤니티', 'contractor-profile':'업체 프로필' };

  return (
    <div style={{ display:'flex', width:'100%', height:'100vh', overflow:'hidden' }}>
      <Sidebar page={page} setPage={setPage} />

      <div style={{ flex:1, display:'flex', flexDirection:'column', overflow:'hidden' }}>
        {/* TopBar */}
        <div style={{ height:56, background:'var(--surface)', borderBottom:'1px solid var(--border)', display:'flex', alignItems:'center', justifyContent:'space-between', padding:'0 24px', flexShrink:0 }}>
          <div style={{ display:'flex', alignItems:'center', gap:10 }}>
            <h2 style={{ fontSize:15, fontWeight:800, color:'#1A2E25' }}>{PAGE_TITLES[page]}</h2>
          </div>
          <div style={{ display:'flex', alignItems:'center', gap:10 }}>
            <div style={{ display:'flex', alignItems:'center', gap:8, background:'#F7FAF8', borderRadius:8, padding:'7px 12px', border:'1px solid var(--border)' }}>
              <Icon name="search" size={14} color="#9ABBA8" />
              <input placeholder="검색..." style={{ width:160, background:'none', border:'none', outline:'none', fontSize:13, color:'#1A2E25' }} />
            </div>
            <button style={{ width:34, height:34, borderRadius:8, background:'var(--primary-light)', border:'none', cursor:'pointer', display:'flex', alignItems:'center', justifyContent:'center', position:'relative' }}>
              <Icon name="bell" size={15} color="var(--primary)" />
              <span style={{ position:'absolute', top:7, right:7, width:7, height:7, borderRadius:'50%', background:'var(--accent)', border:'1.5px solid #fff' }} />
            </button>
            <div style={{ width:32, height:32, borderRadius:8, background:'var(--primary)', display:'flex', alignItems:'center', justifyContent:'center', color:'#fff', fontWeight:700, fontSize:12, cursor:'pointer' }}>최</div>
          </div>
        </div>

        {/* 페이지 */}
        <div style={{ flex:1, display:'flex', overflow:'hidden' }}>
          {page==='main' && <MainPage />}
          {page==='admin-cms' && <CMSPage />}
          {page==='community-feed' && <CommunityPage />}
          {page==='contractor-profile' && <ContractorPage />}
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
