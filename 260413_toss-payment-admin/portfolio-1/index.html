  const map={
    승인:{bg:'#ECFDF5',c:C.success},취소:{bg:'#FEF2F2',c:C.danger},
    실패:{bg:'#FEF2F2',c:C.danger},완료:{bg:'#ECFDF5',c:C.success},
    처리중:{bg:'#FFFBEB',c:C.warning},재시도중:{bg:'#FFFBEB',c:C.warning},
    처리완료:{bg:'#ECFDF5',c:C.success},활성:{bg:'#ECFDF5',c:C.success},
    비활성:{bg:'#F1F5F9',c:C.ts},슈퍼어드민:{bg:'#EFF6FF',c:C.primary},
    일반어드민:{bg:'#F0F9FF',c:C.accent},

};
