const StatusBadge=({status})=>{
  const map={
    활성:{bg:'#ECFDF5',c:C.success},정지:{bg:'#FFFBEB',c:C.warning},해지:{bg:'#FEF2F2',c:C.danger},
    성공:{bg:'#ECFDF5',c:C.success},실패:{bg:'#FEF2F2',c:C.danger},재시도예정:{bg:'#FFFBEB',c:C.warning},
    완료:{bg:'#ECFDF5',c:C.success},처리중:{bg:'#FFFBEB',c:C.warning},
  };
  const s=map[status]||{bg:'#F1F5F9',c:C.ts};
  return <span style={{background:s.bg,color:s.c,padding:'2px 10px',borderRadius:20,fontSize:12,fontWeight:600}}>{status}</span>;
};

function SubscribersView(){
  const [filter,setFilter]=useState('전체');
  const counts={전체:subscribers.length,활성:subscribers.filter(s=>s.status==='활성').length,정지:subscribers.filter(s=>s.status==='정지').length,해지:subscribers.filter(s=>s.status==='해지').length};
  const filtered=filter==='전체'?subscribers:subscribers.filter(s=>s.status===filter);
  return(
    <div style={{background:C.surface,borderRadius:12,padding:20,boxShadow:'0 2px 8px rgba(91,33,182,.06)'}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16}}>
        <div style={{fontWeight:700,fontSize:14}}>구독자 관리</div>
        <input placeholder="이름/이메일 검색" style={{padding:'8px 14px',border:`1px solid ${C.border}`,borderRadius:8,fontSize:13,outline:'none',width:200}}/>
      </div>
      <div style={{display:'flex',gap:8,marginBottom:16}}>
        {Object.entries(counts).map(([s,n])=>(
          <button key={s} onClick={()=>setFilter(s)} style={{
            padding:'6px 16px',borderRadius:20,border:`1px solid ${filter===s?C.secondary:C.border}`,
            background:filter===s?C.secondary:'transparent',color:filter===s?'#fff':C.ts,
            fontSize:13,cursor:'pointer',fontWeight:600
          }}>{s} <span style={{opacity:.7}}>{n}</span></button>
        ))}
      </div>
      <table style={{width:'100%',borderCollapse:'collapse',fontSize:13}}>
        <thead><tr style={{background:'#FAF7FF',borderBottom:`2px solid ${C.border}`}}>
          {['구독자','이메일','플랜','상태','다음 결제일','결제금액','관리'].map(h=>(
            <th key={h} style={{padding:'10px 12px',textAlign:'left',color:C.ts,fontWeight:600}}>{h}</th>
          ))}
        </tr></thead>
        <tbody>{filtered.map(s=>(
          <tr key={s.id} style={{borderBottom:`1px solid ${C.border}`}}>
            <td style={{padding:'12px',fontWeight:600}}>{s.name}</td>
            <td style={{padding:'12px',color:C.ts,fontSize:12}}>{s.email}</td>
            <td style={{padding:'12px'}}><span style={{background:'#FAF7FF',color:C.secondary,padding:'2px 8px',borderRadius:20,fontSize:12,fontWeight:600}}>{s.plan}</span></td>
            <td style={{padding:'12px'}}><StatusBadge status={s.status}/></td>
            <td style={{padding:'12px',color:C.ts,fontSize:12}}>{s.nextBill}</td>
            <td style={{padding:'12px',fontWeight:700}}>{fmt(s.amount)}</td>
            <td style={{padding:'12px'}}>
              <div style={{display:'flex',gap:6}}>
                <button style={{padding:'4px 8px',borderRadius:6,border:`1px solid ${C.border}`,fontSize:11,cursor:'pointer',color:C.ts}}>상세</button>
                {s.status==='활성'&&<button style={{padding:'4px 8px',borderRadius:6,border:`1px solid ${C.danger}`,color:C.danger,fontSize:11,cursor:'pointer',background:'transparent'}}>해지</button>}
              </div>
            </td>
          </tr>
        ))}</tbody>
      </table>
      <div style={{marginTop:12,color:C.ts,fontSize:13}}>총 {filtered.length}명</div>
    </div>
  );
}

        <div style={{fontWeight:700,fontSize:14,marginBottom:16}}>해지·환불 워크플로우 — 즉시 해지 처리</div>
        <div style={{display:'flex',gap:0,marginBottom:24}}>
          {['구독자 확인','해지 유형 선택','환불 금액 계산','최종 확인'].map((s,i)=>(
            <div key={s} style={{flex:1,display:'flex',alignItems:'center'}}>
              <div style={{textAlign:'center',width:'100%'}}>
                <div style={{width:32,height:32,borderRadius:'50%',background:i<=step?C.secondary:'#EDE9FE',color:i<=step?'#fff':C.ts,display:'flex',alignItems:'center',justifyContent:'center',fontWeight:700,fontSize:14,margin:'0 auto 6px'}}>{i+1}</div>
                <div style={{fontSize:12,color:i<=step?C.secondary:C.ts,fontWeight:i<=step?600:400}}>{s}</div>
              </div>
              {i<3&&<div style={{width:40,height:2,background:i<step?C.secondary:'#EDE9FE',flexShrink:0}}/>}
            </div>
          ))}
        </div>
        <div style={{background:'#FAF7FF',borderRadius:10,padding:16,marginBottom:16,fontSize:13}}>
          {step===0&&<div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
            {[['구독자','강지현'],['플랜','스탠다드 월간'],['결제금액','₩29,000/월'],['구독 시작일','2026-03-13'],['다음 결제일','2026-05-13'],['남은 기간','30일']].map(([k,v])=>(
              <div key={k}><span style={{color:C.ts}}>{k}: </span><span style={{fontWeight:600}}>{v}</span></div>
            ))}
          </div>}
          {step===1&&<div>
            <div style={{fontWeight:600,marginBottom:12}}>해지 유형 선택</div>
            <div style={{display:'flex',gap:12}}>
              {[['즉시 해지','즉시 서비스 종료, 잔여 기간 환불','#FEF2F2','#EF4444'],['만료 해지','결제 기간 만료 시 자동 해지','#F0FDF4','#10B981']].map(([t,d,bg,c])=>(
                <div key={t} style={{flex:1,border:`2px solid ${c}`,borderRadius:10,padding:14,background:bg,cursor:'pointer'}}>
                  <div style={{fontWeight:700,color:c}}>{t}</div>
                  <div style={{fontSize:12,color:C.ts,marginTop:4}}>{d}</div>
                </div>
              ))}
            </div>
          </div>}
          {step===2&&<div>
            <div style={{fontWeight:600,marginBottom:12}}>환불 금액 자동 계산</div>
            {[['결제 금액','₩29,000'],['사용 기간','31일 / 61일'],['잔여 기간','30일'],['환불 금액 (일할)','₩14,262'],['수수료 차감','- ₩762'],['최종 환불액','₩13,500']].map(([k,v],i)=>(
              <div key={k} style={{display:'flex',justifyContent:'space-between',padding:'6px 0',borderBottom:i===4?`2px solid ${C.border}`:`1px solid ${C.border}`,fontWeight:i===5?700:400,color:i===5?C.danger:C.tp}}>
                <span style={{color:i===5?C.danger:C.ts}}>{k}</span><span>{v}</span>
              </div>
            ))}
          </div>}
          {step===3&&<div style={{textAlign:'center',padding:'20px 0'}}>
            <div style={{fontSize:32,marginBottom:8}}>✅</div>
            <div style={{fontWeight:700,fontSize:16}}>해지 처리 완료</div>
            <div style={{color:C.ts,fontSize:13,marginTop:4}}>환불금 ₩13,500이 토스페이먼츠 취소 API로 처리됩니다.</div>
          </div>}
        </div>
        <div style={{display:'flex',justifyContent:'flex-end',gap:8}}>
          {step>0&&step<3&&<button onClick={()=>setStep(step-1)} style={{padding:'8px 20px',borderRadius:8,border:`1px solid ${C.border}`,background:'transparent',cursor:'pointer',fontSize:13}}>이전</button>}
          {step<3&&<button onClick={()=>setStep(step+1)} style={{padding:'8px 20px',borderRadius:8,background:C.secondary,color:'#fff',border:'none',cursor:'pointer',fontSize:13,fontWeight:600}}>{step===2?'해지 확정':'다음'}</button>}
        </div>
      </div>
      <div style={{background:C.surface,borderRadius:12,padding:20,boxShadow:'0 2px 8px rgba(91,33,182,.06)'}}>
        <div style={{fontWeight:700,fontSize:14,marginBottom:14}}>해지 처리 이력</div>
        <table style={{width:'100%',borderCollapse:'collapse',fontSize:13}}>
          <thead><tr style={{background:'#FAF7FF',borderBottom:`2px solid ${C.border}`}}>
            {['ID','구독자','플랜','해지유형','환불금액','사유','상태','날짜'].map(h=>(
              <th key={h} style={{padding:'10px 12px',textAlign:'left',color:C.ts,fontWeight:600}}>{h}</th>
            ))}
          </tr></thead>
          <tbody>{cancellations.map(c=>(
            <tr key={c.id} style={{borderBottom:`1px solid ${C.border}`}}>
              <td style={{padding:'12px',color:C.ts,fontSize:11}}>{c.id}</td>
              <td style={{padding:'12px',fontWeight:600}}>{c.user}</td>
              <td style={{padding:'12px'}}>{c.plan}</td>
              <td style={{padding:'12px'}}><span style={{background:c.type==='즉시해지'?'#FEF2F2':'#F0FDF4',color:c.type==='즉시해지'?C.danger:C.success,padding:'2px 8px',borderRadius:20,fontSize:11,fontWeight:600}}>{c.type}</span></td>
              <td style={{padding:'12px',fontWeight:c.refund>0?700:400,color:c.refund>0?C.danger:C.ts}}>{c.refund>0?fmt(c.refund):'없음'}</td>
              <td style={{padding:'12px',color:C.ts}}>{c.reason}</td>
              <td style={{padding:'12px'}}><StatusBadge status={c.status}/></td>
              <td style={{padding:'12px',color:C.ts,fontSize:12}}>{c.date}</td>
            </tr>
          ))}</tbody>
        </table>
      </div>
    </div>
  );
}

function App(){
  const [page,setPage]=useState('plans');
  const views={plans:<PlansView/>,billing:<BillingView/>,subscribers:<SubscribersView/>,analytics:<AnalyticsView/>,cancellation:<CancellationView/>};
  const hero=heroConfig[page];
  return(
    <div style={{display:'flex',flexDirection:'column',height:'100vh',background:C.bg}}>
      {/* Top Nav */}
      <div style={{background:C.primary,padding:'0 28px',flexShrink:0}}>
        <div style={{display:'flex',alignItems:'center',height:52,gap:8}}>
          <div style={{color:'#fff',fontWeight:800,fontSize:15,marginRight:24}}>SubscribeOps</div>
          {navItems.map(n=>(
            <button key={n.id} onClick={()=>setPage(n.id)} style={{
              padding:'0 16px',height:52,border:'none',background:'transparent',
              color:page===n.id?'#fff':'rgba(255,255,255,.6)',
              borderBottom:page===n.id?'3px solid #A78BFA':'3px solid transparent',
              fontSize:13,fontWeight:page===n.id?700:400,cursor:'pointer',whiteSpace:'nowrap'
            }}>{n.label}</button>
          ))}
          <div style={{marginLeft:'auto',display:'flex',alignItems:'center',gap:10}}>
            <span style={{color:'rgba(255,255,255,.6)',fontSize:12}}>김관리 | 슈퍼어드민</span>
          </div>
        </div>
      </div>
      {/* Hero Banner */}
      <div style={{background:`linear-gradient(135deg, ${C.secondary} 0%, ${C.primary} 100%)`,padding:'20px 28px',flexShrink:0}}>
        <div style={{color:'rgba(255,255,255,.7)',fontSize:12,marginBottom:4}}>{hero.icon} {hero.title}</div>
        <div style={{color:'#fff',fontSize:14,fontWeight:500}}>{hero.sub}</div>
      </div>
      {/* Content */}
      <div style={{flex:1,overflow:'auto',padding:'22px 28px'}}>
        {views[page]}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
