<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>멀티 PG 통합 결제 플랫폼 — 구현 데모</title>
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" rel="stylesheet">
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/prop-types@15/prop-types.min.js"></script>
<script src="https://unpkg.com/recharts@2.12.7/umd/Recharts.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Pretendard',sans-serif;background:#F0FDF4;color:#1A1A2E;height:100vh;overflow:hidden}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:#F0FDF4}::-webkit-scrollbar-thumb{background:#86EFAC;border-radius:3px}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState}=React;
const {BarChart,Bar,XAxis,YAxis,CartesianGrid,Tooltip,ResponsiveContainer,RadarChart,Radar,PolarGrid,PolarAngleAxis,PolarRadiusAxis,AreaChart,Area,Cell}=Recharts;

const C={
  primary:'#059669',secondary:'#10B981',accent:'#34D399',
  bg:'#F0FDF4',surface:'#fff',
  tp:'#1A1A2E',ts:'#6B7280',
  success:'#10B981',warning:'#F59E0B',danger:'#EF4444',
  border:'#D1FAE5',
  toss:'#0064FF',kakao:'#FEE500',naver:'#03C75A'
};

const pgStats=[
  {name:'토스페이먼츠',color:C.toss,amount:48200000,count:1842,success:96.2,fee:1.5,status:'정상'},
  {name:'카카오페이',color:'#F7C900',amount:22100000,count:987,success:98.1,fee:2.0,status:'정상'},
  {name:'네이버페이',color:C.naver,amount:15800000,count:643,success:97.4,fee:1.8,status:'정상'},
];

const routingRules=[
  {id:'rule-001',priority:1,condition:'금액 ≤ 50,000원',action:'카카오페이',reason:'간편결제 선호 구간',status:'활성'},
  {id:'rule-002',priority:2,condition:'결제수단 = 네이버아이디',action:'네이버페이',reason:'아이디 결제 전용',status:'활성'},
  {id:'rule-003',priority:3,condition:'금액 > 50,000원',action:'토스페이먼츠',reason:'고액 결제 안정성',status:'활성'},
  {id:'rule-004',priority:4,condition:'기본 (Fallback)',action:'토스페이먼츠',reason:'기본 PG',status:'활성'},
];

const unifiedPayments=[
  {id:'UNI-9981',pg:'토스페이먼츠',user:'김민준',amount:79000,status:'승인',date:'04-13 14:23',method:'카드'},
  {id:'UNI-9980',pg:'카카오페이',user:'이수연',amount:15000,status:'승인',date:'04-13 13:55',method:'간편결제'},
  {id:'UNI-9979',pg:'네이버페이',user:'박도현',amount:29000,status:'취소',date:'04-13 13:11',method:'아이디결제'},
  {id:'UNI-9978',pg:'토스페이먼츠',user:'정유나',amount:150000,status:'승인',date:'04-13 12:44',method:'계좌이체'},
  {id:'UNI-9977',pg:'카카오페이',user:'최재원',amount:9900,status:'실패',date:'04-13 11:30',method:'간편결제'},
  {id:'UNI-9976',pg:'네이버페이',user:'강지현',amount:29000,status:'승인',date:'04-13 10:22',method:'아이디결제'},
];

const radarData=[
  {metric:'성공률',토스페이먼츠:96,카카오페이:98,네이버페이:97},
  {metric:'처리속도',토스페이먼츠:88,카카오페이:92,네이버페이:85},
  {metric:'비용효율',토스페이먼츠:90,카카오페이:80,네이버페이:85},
  {metric:'안정성',토스페이먼츠:95,카카오페이:91,네이버페이:93},
  {metric:'지원기능',토스페이먼츠:95,카카오페이:82,네이버페이:88},
];

const settlements=[
  {pg:'토스페이먼츠',cycle:'D+1',grossAmt:48200000,fee:723000,netAmt:47477000,expectedDate:'2026-04-14',status:'정산예정'},
  {pg:'카카오페이',cycle:'D+2',grossAmt:22100000,fee:442000,netAmt:21658000,expectedDate:'2026-04-15',status:'정산예정'},
  {pg:'네이버페이',cycle:'주별',grossAmt:15800000,fee:284400,netAmt:15515600,expectedDate:'2026-04-18',status:'정산예정'},
];

const pgColors={토스페이먼츠:C.toss,카카오페이:'#F59E0B',네이버페이:C.naver};

const StatusBadge=({status})=>{
  const map={승인:{bg:'#ECFDF5',c:C.success},취소:{bg:'#FEF2F2',c:C.danger},실패:{bg:'#FEF2F2',c:C.danger},
    정상:{bg:'#ECFDF5',c:C.success},활성:{bg:'#ECFDF5',c:C.success},정산예정:{bg:'#EFF6FF',c:'#1D4ED8'}};
  const s=map[status]||{bg:'#F1F5F9',c:C.ts};
  return <span style={{background:s.bg,color:s.c,padding:'2px 10px',borderRadius:20,fontSize:12,fontWeight:600}}>{status}</span>;
};

const PgBadge=({name})=>{
  const c=pgColors[name]||C.ts;
  return <span style={{background:c+'18',color:c,padding:'2px 10px',borderRadius:20,fontSize:12,fontWeight:700,border:`1px solid ${c}40`}}>{name}</span>;
};

const fmt=n=>n.toLocaleString('ko-KR')+'원';

const navItems=[
  {id:'pg-overview',label:'멀티 PG 통합 관리',icon:'🌐'},
  {id:'routing',label:'PG별 결제 라우팅',icon:'🔀'},
  {id:'unified-payments',label:'통합 결제 내역 조회',icon:'📋'},
  {id:'pg-analytics',label:'PG별 성과 분석',icon:'📊'},
  {id:'settlement',label:'통합 정산 관리',icon:'💰'},
];

function PgOverviewView(){
  return(
    <div style={{display:'flex',flexDirection:'column',gap:20}}>
      <div style={{display:'flex',gap:14}}>
        {pgStats.map(pg=>(
          <div key={pg.name} style={{flex:1,background:C.surface,borderRadius:14,padding:20,boxShadow:'0 2px 8px rgba(5,150,105,.08)',border:`1px solid ${C.border}`,borderTop:`3px solid ${pg.color}`}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12}}>
              <div style={{fontWeight:700,fontSize:15,color:pg.color}}>{pg.name}</div>
              <StatusBadge status={pg.status}/>
            </div>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,fontSize:13}}>
              <div><div style={{color:C.ts,fontSize:11}}>오늘 결제액</div><div style={{fontWeight:800,fontSize:16}}>₩{(pg.amount/10000).toFixed(0)}만</div></div>
              <div><div style={{color:C.ts,fontSize:11}}>결제 건수</div><div style={{fontWeight:700,fontSize:16}}>{pg.count.toLocaleString()}건</div></div>
              <div><div style={{color:C.ts,fontSize:11}}>성공률</div><div style={{fontWeight:700,color:C.success}}>{pg.success}%</div></div>
              <div><div style={{color:C.ts,fontSize:11}}>수수료율</div><div style={{fontWeight:700}}>{pg.fee}%</div></div>
            </div>
            <div style={{marginTop:12,height:4,background:'#D1FAE5',borderRadius:2}}>
              <div style={{height:'100%',width:`${pg.success}%`,background:pg.color,borderRadius:2}}/>
            </div>
          </div>
        ))}
      </div>
      <div style={{background:C.surface,borderRadius:12,padding:22,boxShadow:'0 2px 8px rgba(5,150,105,.08)'}}>
        <div style={{fontWeight:700,fontSize:14,marginBottom:16}}>멀티 PG 통합 관리 — PG사별 오늘 결제 금액 비교</div>
        <ResponsiveContainer width="100%" height={200}>
          <BarChart data={pgStats}>
            <CartesianGrid strokeDasharray="3 3" stroke="#D1FAE5"/>
            <XAxis dataKey="name" tick={{fontSize:12,fill:C.ts}}/>
            <YAxis tickFormatter={v=>(v/10000)+'만'} tick={{fontSize:12,fill:C.ts}}/>
            <Tooltip formatter={v=>[fmt(v),'결제금액']}/>
            <Bar dataKey="amount" radius={[6,6,0,0]}>
              {pgStats.map((pg,i)=><Cell key={pg.name} fill={pg.color}/>)}
            </Bar>
          </BarChart>
        </ResponsiveContainer>
      </div>
      <div style={{background:'#ECFDF5',borderRadius:12,padding:18,border:`1px solid #86EFAC`,fontSize:13}}>
        <div style={{fontWeight:700,color:C.primary,marginBottom:6}}>🏗️ Strategy 패턴 아키텍처</div>
        <div style={{display:'flex',gap:16,alignItems:'center',flexWrap:'wrap'}}>
          <div style={{background:'#fff',borderRadius:8,padding:'8px 14px',border:`1px solid ${C.border}`,fontSize:12,fontWeight:600}}>IPgProvider (인터페이스)</div>
          <span style={{color:C.ts}}>→ 구현</span>
          {['TossProvider','KakaoProvider','NaverProvider'].map(p=>(
            <div key={p} style={{background:'#fff',borderRadius:8,padding:'8px 14px',border:`1px solid ${C.secondary}`,fontSize:12,fontWeight:600,color:C.primary}}>{p}</div>
          ))}
          <span style={{color:C.ts}}>→ 자동 등록</span>
          <div style={{background:'#fff',borderRadius:8,padding:'8px 14px',border:`1px solid ${C.border}`,fontSize:12,fontWeight:600}}>PgRouter</div>
        </div>
      </div>
    </div>
  );
}

function RoutingView(){
  const [modal,setModal]=useState(false);
  return(
    <div style={{display:'flex',flexDirection:'column',gap:20}}>
      <div style={{background:C.surface,borderRadius:12,padding:22,boxShadow:'0 2px 8px rgba(5,150,105,.08)'}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16}}>
          <div style={{fontWeight:700,fontSize:14}}>PG별 결제 라우팅 — 라우팅 규칙 관리</div>
          <button onClick={()=>setModal(true)} style={{padding:'8px 18px',borderRadius:8,background:C.primary,color:'#fff',border:'none',fontSize:13,fontWeight:600,cursor:'pointer'}}>+ 규칙 추가</button>
        </div>
        <div style={{background:'#ECFDF5',borderRadius:8,padding:12,marginBottom:14,fontSize:12,color:'#166534'}}>
          💡 규칙은 우선순위 순서로 평가됩니다. 상위 규칙이 일치하면 하위 규칙은 평가하지 않습니다.
        </div>
        <div style={{display:'flex',flexDirection:'column',gap:12}}>
          {routingRules.map((r,i)=>(
            <div key={r.id} style={{display:'flex',alignItems:'center',gap:12,padding:14,borderRadius:10,background:i===0?'#ECFDF5':'#F8FAFC',border:`1px solid ${i===0?'#86EFAC':C.border}`}}>
              <div style={{width:28,height:28,borderRadius:'50%',background:C.primary,color:'#fff',display:'flex',alignItems:'center',justifyContent:'center',fontWeight:800,fontSize:13,flexShrink:0}}>
                {r.priority}
              </div>
              <div style={{flex:1}}>
                <div style={{fontWeight:600,fontSize:13}}>{r.condition}</div>
                <div style={{fontSize:12,color:C.ts,marginTop:2}}>{r.reason}</div>
              </div>
              <div style={{fontWeight:700,fontSize:13}}>→</div>
              <div style={{background:pgColors[r.action]+'18',color:pgColors[r.action],padding:'4px 14px',borderRadius:20,fontSize:13,fontWeight:700,border:`1px solid ${pgColors[r.action]}40`}}>
                {r.action}
              </div>
              <StatusBadge status={r.status}/>
              <div style={{display:'flex',gap:6}}>
                <button style={{padding:'4px 10px',borderRadius:6,border:`1px solid ${C.border}`,fontSize:12,cursor:'pointer',color:C.ts}}>편집</button>
              </div>
            </div>
          ))}
        </div>
      </div>
      <div style={{background:C.surface,borderRadius:12,padding:22,boxShadow:'0 2px 8px rgba(5,150,105,.08)'}}>
        <div style={{fontWeight:700,fontSize:14,marginBottom:14}}>라우팅 결정 로그 (최근 24시간)</div>
        <div style={{display:'flex',gap:12}}>
          {pgStats.map(pg=>(
            <div key={pg.name} style={{flex:1,textAlign:'center',padding:14,borderRadius:10,background:'#F8FAFC',border:`1px solid ${C.border}`}}>
              <div style={{fontSize:12,color:C.ts,marginBottom:4}}>{pg.name}</div>
              <div style={{fontWeight:800,fontSize:20,color:pg.color}}>{pg.count}건</div>
              <div style={{fontSize:11,color:C.ts,marginTop:2}}>{Math.round(pg.count/(pgStats.reduce((a,b)=>a+b.count,0))*100)}% 라우팅</div>
            </div>
          ))}
        </div>
      </div>
      {modal&&(
        <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,.5)',display:'flex',alignItems:'center',justifyContent:'center',zIndex:100}}>
          <div style={{background:C.surface,borderRadius:16,padding:28,width:440}}>
            <div style={{fontWeight:700,fontSize:15,marginBottom:16}}>새 라우팅 규칙 추가</div>
            <div style={{display:'flex',flexDirection:'column',gap:12}}>
              {[['조건 유형','select',['금액 범위','결제 수단','카테고리']],['액션 (라우팅 대상)','select',['토스페이먼츠','카카오페이','네이버페이']],['우선순위','number']].map(([l,t,opts])=>(
                <div key={l}>
                  <div style={{fontSize:13,fontWeight:600,marginBottom:6}}>{l}</div>
                  {t==='select'?<select style={{width:'100%',padding:'8px',border:`1px solid ${C.border}`,borderRadius:8,fontSize:13}}>
                    {opts.map(o=><option key={o}>{o}</option>)}
                  </select>:<input type="number" placeholder="1" style={{width:'100%',padding:'8px',border:`1px solid ${C.border}`,borderRadius:8,fontSize:13}}/>}
                </div>
              ))}
              <input placeholder="규칙 설명 (선택)" style={{padding:'8px',border:`1px solid ${C.border}`,borderRadius:8,fontSize:13}}/>
            </div>
            <div style={{display:'flex',gap:8,justifyContent:'flex-end',marginTop:16}}>
              <button onClick={()=>setModal(false)} style={{padding:'8px 20px',borderRadius:8,border:`1px solid ${C.border}`,cursor:'pointer',fontSize:13}}>취소</button>
              <button onClick={()=>setModal(false)} style={{padding:'8px 20px',borderRadius:8,background:C.primary,color:'#fff',border:'none',cursor:'pointer',fontSize:13,fontWeight:600}}>저장</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

function UnifiedPaymentsView(){
  const [pgF,setPgF]=useState('전체');
  const pgs=['전체','토스페이먼츠','카카오페이','네이버페이'];
  const filtered=pgF==='전체'?unifiedPayments:unifiedPayments.filter(p=>p.pg===pgF);
  return(
    <div style={{background:C.surface,borderRadius:12,padding:22,boxShadow:'0 2px 8px rgba(5,150,105,.08)'}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16}}>
        <div style={{fontWeight:700,fontSize:14}}>통합 결제 내역 조회</div>
        <input placeholder="주문번호 / 결제자 검색" style={{padding:'8px 14px',border:`1px solid ${C.border}`,borderRadius:8,fontSize:13,outline:'none',width:200}}/>
      </div>
      <div style={{display:'flex',gap:8,marginBottom:14}}>
        {pgs.map(pg=>(
          <button key={pg} onClick={()=>setPgF(pg)} style={{
            padding:'6px 14px',borderRadius:20,fontSize:12,cursor:'pointer',fontWeight:600,
            border:`1px solid ${pgF===pg?C.primary:C.border}`,
            background:pgF===pg?C.primary:'transparent',color:pgF===pg?'#fff':C.ts
          }}>{pg}</button>
        ))}
      </div>
      <table style={{width:'100%',borderCollapse:'collapse',fontSize:13}}>
        <thead><tr style={{background:'#F0FDF4',borderBottom:`2px solid ${C.border}`}}>
          {['주문번호','PG사','결제자','금액','결제수단','상태','결제일시'].map(h=>(
            <th key={h} style={{padding:'10px 12px',textAlign:'left',color:C.ts,fontWeight:600}}>{h}</th>
          ))}
        </tr></thead>
        <tbody>{filtered.map(p=>(
          <tr key={p.id} style={{borderBottom:`1px solid ${C.border}`}}>
            <td style={{padding:'12px',color:C.primary,fontWeight:600,fontSize:12}}>{p.id}</td>
            <td style={{padding:'12px'}}><PgBadge name={p.pg}/></td>
            <td style={{padding:'12px',fontWeight:600}}>{p.user}</td>
            <td style={{padding:'12px',fontWeight:700}}>{fmt(p.amount)}</td>
            <td style={{padding:'12px',color:C.ts}}>{p.method}</td>
            <td style={{padding:'12px'}}><StatusBadge status={p.status}/></td>
            <td style={{padding:'12px',color:C.ts,fontSize:12}}>{p.date}</td>
          </tr>
        ))}</tbody>
      </table>
      <div style={{marginTop:12,color:C.ts,fontSize:13}}>총 {filtered.length}건</div>
    </div>
  );
}

function PgAnalyticsView(){
  return(
    <div style={{display:'flex',flexDirection:'column',gap:20}}>
      <div style={{display:'flex',gap:16}}>
        <div style={{flex:1,background:C.surface,borderRadius:12,padding:22,boxShadow:'0 2px 8px rgba(5,150,105,.08)'}}>
          <div style={{fontWeight:700,fontSize:14,marginBottom:16}}>PG별 성과 분석 — 다차원 비교 레이더 차트</div>
          <ResponsiveContainer width="100%" height={240}>
            <RadarChart data={radarData}>
              <PolarGrid stroke={C.border}/>
              <PolarAngleAxis dataKey="metric" tick={{fontSize:12,fill:C.ts}}/>
              <PolarRadiusAxis angle={90} domain={[70,100]} tick={{fontSize:10,fill:C.ts}}/>
              <Radar name="토스페이먼츠" dataKey="토스페이먼츠" stroke={C.toss} fill={C.toss} fillOpacity={0.15}/>
              <Radar name="카카오페이" dataKey="카카오페이" stroke="#F59E0B" fill="#F59E0B" fillOpacity={0.15}/>
              <Radar name="네이버페이" dataKey="네이버페이" stroke={C.naver} fill={C.naver} fillOpacity={0.15}/>
              <Tooltip/>
            </RadarChart>
          </ResponsiveContainer>
          <div style={{display:'flex',gap:12,justifyContent:'center',fontSize:12}}>
            {[['토스페이먼츠',C.toss],['카카오페이','#F59E0B'],['네이버페이',C.naver]].map(([n,c])=>(
              <span key={n} style={{display:'flex',alignItems:'center',gap:4}}><span style={{width:10,height:10,borderRadius:'50%',background:c,display:'inline-block'}}/>{n}</span>
            ))}
          </div>
        </div>
        <div style={{width:240,display:'flex',flexDirection:'column',gap:12}}>
          {pgStats.map(pg=>(
            <div key={pg.name} style={{background:C.surface,borderRadius:12,padding:16,boxShadow:'0 2px 8px rgba(5,150,105,.08)',border:`1px solid ${C.border}`}}>
              <div style={{fontWeight:700,color:pg.color,fontSize:13,marginBottom:8}}>{pg.name}</div>
              {[['성공률',`${pg.success}%`],['결제건',`${pg.count}건`],['수수료',`${pg.fee}%`]].map(([k,v])=>(
                <div key={k} style={{display:'flex',justifyContent:'space-between',fontSize:12,marginBottom:4}}>
                  <span style={{color:C.ts}}>{k}</span><span style={{fontWeight:600}}>{v}</span>
                </div>
              ))}
            </div>
          ))}
        </div>
      </div>
      <div style={{background:C.surface,borderRadius:12,padding:22,boxShadow:'0 2px 8px rgba(5,150,105,.08)'}}>
        <div style={{fontWeight:700,fontSize:14,marginBottom:16}}>PG사별 결제 성공률 비교</div>
        <ResponsiveContainer width="100%" height={120}>
          <BarChart data={pgStats} layout="vertical" margin={{left:80}}>
            <CartesianGrid strokeDasharray="3 3" stroke={C.border}/>
            <XAxis type="number" domain={[90,100]} tick={{fontSize:12,fill:C.ts}} tickFormatter={v=>v+'%'}/>
            <YAxis dataKey="name" type="category" tick={{fontSize:12,fill:C.ts}}/>
            <Tooltip formatter={v=>[v+'%','성공률']}/>
            <Bar dataKey="success" radius={[0,6,6,0]}>
              {pgStats.map(pg=><Cell key={pg.name} fill={pg.color}/>)}
            </Bar>
          </BarChart>
        </ResponsiveContainer>
      </div>
    </div>
  );
}

function SettlementView(){
  return(
    <div style={{display:'flex',flexDirection:'column',gap:20}}>
      <div style={{display:'flex',gap:14}}>
        {[['전체 정산 예정액','₩84,651,600','3개 PG 합산',C.primary],['오늘 정산 (토스)','₩47,477,000','D+1 기준',C.toss],['이번주 정산 (네이버)','₩15,515,600','주별 정산',C.naver]].map(([l,v,s,c])=>(
          <div key={l} style={{flex:1,background:C.surface,borderRadius:12,padding:18,boxShadow:'0 2px 8px rgba(5,150,105,.08)',border:`1px solid ${C.border}`}}>
            <div style={{fontSize:12,color:C.ts}}>{l}</div>
            <div style={{fontSize:20,fontWeight:800,color:c,marginTop:4}}>{v}</div>
            <div style={{fontSize:11,color:C.ts,marginTop:2}}>{s}</div>
          </div>
        ))}
      </div>
      <div style={{background:C.surface,borderRadius:12,padding:22,boxShadow:'0 2px 8px rgba(5,150,105,.08)'}}>
        <div style={{fontWeight:700,fontSize:14,marginBottom:16}}>통합 정산 관리 — PG사별 정산 내역</div>
        <table style={{width:'100%',borderCollapse:'collapse',fontSize:13}}>
          <thead><tr style={{background:'#F0FDF4',borderBottom:`2px solid ${C.border}`}}>
            {['PG사','정산 주기','총 결제액','수수료','순 정산액','예상 정산일','상태'].map(h=>(
              <th key={h} style={{padding:'12px',textAlign:'left',color:C.ts,fontWeight:600}}>{h}</th>
            ))}
          </tr></thead>
          <tbody>{settlements.map(s=>(
            <tr key={s.pg} style={{borderBottom:`1px solid ${C.border}`}}>
              <td style={{padding:'14px 12px'}}><PgBadge name={s.pg}/></td>
              <td style={{padding:'14px 12px'}}><span style={{background:'#F0FDF4',color:C.primary,padding:'2px 8px',borderRadius:20,fontSize:12,fontWeight:600}}>{s.cycle}</span></td>
              <td style={{padding:'14px 12px',fontWeight:600}}>{fmt(s.grossAmt)}</td>
              <td style={{padding:'14px 12px',color:C.danger}}>- {fmt(s.fee)}</td>
              <td style={{padding:'14px 12px',fontWeight:800,color:C.primary}}>{fmt(s.netAmt)}</td>
              <td style={{padding:'14px 12px',color:C.ts}}>{s.expectedDate}</td>
              <td style={{padding:'14px 12px'}}><StatusBadge status={s.status}/></td>
            </tr>
          ))}</tbody>
          <tfoot><tr style={{background:'#F0FDF4',borderTop:`2px solid ${C.border}`}}>
            <td colSpan={2} style={{padding:'12px',fontWeight:700}}>합계</td>
            <td style={{padding:'12px',fontWeight:700}}>{fmt(settlements.reduce((a,s)=>a+s.grossAmt,0))}</td>
            <td style={{padding:'12px',fontWeight:700,color:C.danger}}>- {fmt(settlements.reduce((a,s)=>a+s.fee,0))}</td>
            <td style={{padding:'12px',fontWeight:800,color:C.primary,fontSize:15}}>{fmt(settlements.reduce((a,s)=>a+s.netAmt,0))}</td>
            <td colSpan={2} style={{padding:'12px'}}/>
          </tr></tfoot>
        </table>
      </div>
      <div style={{background:'#ECFDF5',borderRadius:12,padding:16,border:`1px solid #86EFAC`,fontSize:13}}>
        <div style={{fontWeight:700,color:C.primary,marginBottom:4}}>📅 정산 주기 관리</div>
        <div style={{color:'#166534'}}>PG사별 정산 주기와 수수료율은 PaymentGateway 모델에서 관리됩니다. 정산 예정액은 결제 금액에서 PG 수수료를 자동 차감하여 산출됩니다.</div>
      </div>
    </div>
  );
}

function App(){
  const [page,setPage]=useState('pg-overview');
  const views={'pg-overview':<PgOverviewView/>,'routing':<RoutingView/>,'unified-payments':<UnifiedPaymentsView/>,'pg-analytics':<PgAnalyticsView/>,'settlement':<SettlementView/>};
  const cur=navItems.find(n=>n.id===page);
  return(
    <div style={{display:'flex',height:'100vh',background:C.bg}}>
      {/* Bright Sidebar */}
      <div style={{width:240,background:C.surface,borderRight:`1px solid ${C.border}`,display:'flex',flexDirection:'column',flexShrink:0}}>
        <div style={{padding:'20px 18px 16px',borderBottom:`1px solid ${C.border}`}}>
          <div style={{fontWeight:800,fontSize:15,color:C.primary}}>MultiPay Hub</div>
          <div style={{fontSize:11,color:C.ts,marginTop:2}}>통합 PG 결제 플랫폼</div>
          <div style={{display:'flex',gap:4,marginTop:10}}>
            {['T','K','N'].map((l,i)=>(
              <div key={l} style={{width:22,height:22,borderRadius:'50%',background:[C.toss,'#F59E0B',C.naver][i],display:'flex',alignItems:'center',justifyContent:'center',color:'#fff',fontSize:10,fontWeight:800}}>{l}</div>
            ))}
            <span style={{fontSize:11,color:C.ts,alignSelf:'center',marginLeft:4}}>3개 PG 연결됨</span>
          </div>
        </div>
        <nav style={{flex:1,padding:'10px 8px'}}>
          {navItems.map(n=>(
            <button key={n.id} onClick={()=>setPage(n.id)} style={{
              display:'flex',alignItems:'center',gap:10,width:'100%',padding:'10px 12px',
              background:page===n.id?'#ECFDF5':'transparent',
              border:'none',cursor:'pointer',
              color:page===n.id?C.primary:C.ts,
              fontSize:13,fontWeight:page===n.id?700:400,textAlign:'left',
              borderRadius:8,marginBottom:2,
              transition:'all .15s'
            }}>
              <span style={{fontSize:16}}>{n.icon}</span>
              <span>{n.label}</span>
            </button>
          ))}
        </nav>
        <div style={{padding:'14px 18px',borderTop:`1px solid ${C.border}`}}>
          <div style={{fontSize:12,color:C.ts,marginBottom:8}}>PG 연결 상태</div>
          {[['토스',C.toss],[' 카카오','#F59E0B'],['네이버',C.naver]].map(([name,color])=>(
            <div key={name} style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:4,fontSize:11}}>
              <span style={{color:C.ts}}>{name}</span>
              <span style={{background:'#ECFDF5',color:C.success,padding:'1px 6px',borderRadius:20,fontWeight:600}}>정상</span>
            </div>
          ))}
        </div>
      </div>
      {/* Main */}
      <div style={{flex:1,display:'flex',flexDirection:'column',overflow:'hidden'}}>
        <div style={{background:C.surface,padding:'0 24px',height:52,display:'flex',alignItems:'center',justifyContent:'space-between',borderBottom:`1px solid ${C.border}`,flexShrink:0}}>
          <div style={{fontWeight:700,fontSize:14,color:C.tp}}>{cur?.icon} {cur?.label}</div>
          <div style={{display:'flex',gap:10,alignItems:'center'}}>
            <div style={{display:'flex',gap:6}}>
              {pgStats.map(pg=>(
                <span key={pg.name} style={{background:pg.color+'15',color:pg.color,fontSize:11,padding:'2px 8px',borderRadius:20,fontWeight:600}}>● {pg.name.split('페이')[0]}</span>
              ))}
            </div>
            <span style={{fontSize:12,color:C.ts}}>2026-04-13</span>
          </div>
        </div>
        <div style={{flex:1,overflow:'auto',padding:'22px 24px'}}>
          {views[page]}
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
