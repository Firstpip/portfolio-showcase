<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>웹툰 다국어 식자 에디터 — 맞춤 구현 데모</title>
<link rel="preconnect" href="https://cdn.jsdelivr.net" />
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" rel="stylesheet" />
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { width: 100%; height: 100%; font-family: 'Pretendard', -apple-system, sans-serif; background: #0F172A; color: #F1F5F9; }
#root { display: flex; width: 100%; height: 100vh; overflow: hidden; }
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: #1E293B; }
::-webkit-scrollbar-thumb { background: #334155; border-radius: 3px; }
button { cursor: pointer; border: none; font-family: inherit; }
input, textarea, select { font-family: inherit; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useRef, useEffect, useCallback } = React;

// ── 색상 토큰 ──────────────────────────────────
const C = {
  bg: '#0F172A', surface: '#1E293B', elevated: '#263350',
  border: '#334155', borderLight: '#2D3F55',
  primary: '#2563EB', primaryHover: '#3B82F6',
  accent: '#38BDF8', accentDim: 'rgba(56,189,248,0.15)',
  text: '#F1F5F9', textSub: '#94A3B8', textDim: '#64748B',
  success: '#10B981', warning: '#F59E0B', error: '#EF4444',
  tag: '#1E3A5F',
};

// ── 더미 데이터 ────────────────────────────────
const EPISODES = [
  { id:1, title:'에피소드 1화 — 운명의 만남', pages:28, status:'in_progress', langs:['ko','en'], updated:'2026-04-11' },
  { id:2, title:'에피소드 2화 — 첫 번째 선택', pages:32, status:'done', langs:['ko','en','ja'], updated:'2026-04-10' },
  { id:3, title:'에피소드 3화 — 진실의 방', pages:25, status:'review', langs:['ko','en'], updated:'2026-04-12' },
  { id:4, title:'에피소드 4화 — 숨겨진 과거', pages:30, status:'pending', langs:['ko'], updated:'2026-04-09' },
  { id:5, title:'에피소드 5화 — 붕괴의 시작', pages:27, status:'pending', langs:['ko'], updated:'2026-04-08' },
];

const TEXT_BOXES_INITIAL = [
  { id:1, x:45, y:60, w:120, h:40, lang:'en', text:'Wait… you were here?', fontSize:11, fontFamily:'Arial' },
  { id:2, x:220, y:110, w:140, h:45, lang:'en', text:"I've been watching you all along.", fontSize:11, fontFamily:'Arial' },
  { id:3, x:80, y:190, w:130, h:38, lang:'en', text:'That\'s impossible!', fontSize:12, fontFamily:'Arial' },
  { id:4, x:200, y:255, w:150, h:42, lang:'en', text:'Nothing is impossible in this world.', fontSize:10, fontFamily:'Arial' },
];

const LANGS = [
  { code:'ko', label:'KO', name:'한국어', flag:'🇰🇷' },
  { code:'en', label:'EN', name:'English', flag:'🇺🇸' },
  { code:'ja', label:'JA', name:'日本語', flag:'🇯🇵' },
];

const LANG_TEXTS = {
  ko: ['잠깐… 여기 있었어?', '내가 줄곧 지켜보고 있었어.', '그건 불가능해!', '이 세계에서 불가능한 건 없어.'],
  en: ["Wait… you were here?", "I've been watching you all along.", "That's impossible!", 'Nothing is impossible in this world.'],
  ja: ['待って…ここにいたの？', 'ずっと見ていたんだよ。', 'それは不可能だ！', 'この世界に不可能はない。'],
};

const NAV_ITEMS = [
  { id:'dual-editor', icon:'⚡', label:'Dual Editor' },
  { id:'canvas-text-control', icon:'✏️', label:'Canvas Text Control' },
  { id:'json-save-load', icon:'💾', label:'JSON Save & Load' },
  { id:'multilingual-viewer', icon:'🌐', label:'Multilingual Viewer' },
  { id:'vertical-scroll', icon:'📜', label:'Vertical Scroll Viewer' },
];

// ── 공통 컴포넌트 ──────────────────────────────
function Badge({ color='#334155', text, textColor='#94A3B8' }) {
  return (
    <span style={{ background:color, color:textColor, fontSize:11, padding:'2px 8px', borderRadius:4, fontWeight:600, whiteSpace:'nowrap' }}>
      {text}
    </span>
  );
}

function StatusBadge({ status }) {
  const map = {
    in_progress: { bg:'rgba(37,99,235,0.2)', color:'#60A5FA', label:'편집 중' },
    done:        { bg:'rgba(16,185,129,0.2)', color:'#34D399', label:'완료' },
    review:      { bg:'rgba(245,158,11,0.2)', color:'#FCD34D', label:'검수 중' },
    pending:     { bg:'rgba(100,116,139,0.2)', color:'#94A3B8', label:'대기' },
  };
  const s = map[status] || map.pending;
  return <Badge color={s.bg} text={s.label} textColor={s.color} />;
}

function Toast({ msg, onClose }) {
  useEffect(() => { const t = setTimeout(onClose, 2200); return ()=>clearTimeout(t); }, []);
  return (
    <div style={{ position:'fixed', bottom:28, right:28, background:C.primary, color:'#fff', padding:'10px 18px', borderRadius:8, fontSize:13, fontWeight:500, zIndex:9999, display:'flex', gap:8, alignItems:'center', boxShadow:'0 4px 20px rgba(37,99,235,0.4)' }}>
      <span>✓</span>{msg}
    </div>
  );
}

function Modal({ title, onClose, children, width=480 }) {
  return (
    <div style={{ position:'fixed', inset:0, background:'rgba(0,0,0,0.7)', display:'flex', alignItems:'center', justifyContent:'center', zIndex:1000 }}
         onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div style={{ background:C.surface, border:`1px solid ${C.border}`, borderRadius:10, width, maxHeight:'80vh', overflow:'auto', padding:24 }}>
        <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:20 }}>
          <span style={{ fontWeight:700, fontSize:16 }}>{title}</span>
          <button onClick={onClose} style={{ background:'none', color:C.textSub, fontSize:20, lineHeight:1 }}>×</button>
        </div>
        {children}
      </div>
    </div>
  );
}

// ── 캔버스 뷰 컴포넌트 ─────────────────────────
function WebtoonCanvas({ boxes, selectedId, onSelect, activeLang, showOriginal }) {
  const canvasRef = useRef(null);

  useEffect(() => {
    const canvas = canvasRef.current;
    if (!canvas) return;
    const ctx = canvas.getContext('2d');
    const W = canvas.width, H = canvas.height;

    // 배경 — 웹툰 패널 시뮬레이션
    ctx.fillStyle = showOriginal ? '#F8F4EE' : '#FAFAF9';
    ctx.fillRect(0, 0, W, H);

    // 패널 외곽선
    ctx.strokeStyle = '#222';
    ctx.lineWidth = 2;
    ctx.strokeRect(2, 2, W-4, H-4);

    // 배경 패널 구분선 (만화 패널 느낌)
    ctx.fillStyle = '#E8E0D8';
    ctx.fillRect(0, H*0.45, W, 2);
    ctx.fillRect(W*0.5, 0, 2, H*0.45);

    // 캐릭터 실루엣 (단순 도형으로 표현)
    ctx.fillStyle = showOriginal ? '#C8B4A0' : '#D0C4BC';
    // 상단 좌 — 캐릭터 1
    ctx.beginPath();
    ctx.arc(80, 110, 28, 0, Math.PI*2);
    ctx.fill();
    ctx.fillRect(55, 138, 50, 80);
    // 상단 우 — 캐릭터 2
    ctx.fillStyle = showOriginal ? '#B0A090' : '#BEB0A8';
    ctx.beginPath();
    ctx.arc(240, 95, 24, 0, Math.PI*2);
    ctx.fill();
    ctx.fillRect(218, 119, 44, 70);
    // 하단 — 배경
    ctx.fillStyle = showOriginal ? '#D0E8C0' : '#E0EED8';
    ctx.fillRect(10, H*0.47, W-20, H*0.48);

    // 원본이면 한국어 말풍선 텍스트 표시
    if (showOriginal) {
      const origTexts = ['잠깐…', '지켜보고 있었어.', '불가능해!', '없어.'];
      const positions = [{x:40,y:62},{x:215,y:115},{x:75,y:192},{x:198,y:258}];
      ctx.font = 'bold 10px sans-serif';
      ctx.fillStyle = '#333';
      positions.forEach((p,i) => {
        ctx.fillStyle = 'rgba(255,255,255,0.85)';
        ctx.fillRect(p.x-4, p.y-13, origTexts[i].length*8+8, 18);
        ctx.fillStyle = '#222';
        ctx.fillText(origTexts[i], p.x, p.y);
      });
    }

    // 텍스트 박스 렌더링
    boxes.forEach(box => {
      const isSelected = box.id === selectedId;
      const texts = LANG_TEXTS[activeLang];
      const textToShow = texts[box.id - 1] || box.text;

      // 말풍선 배경
      ctx.fillStyle = isSelected ? 'rgba(37,99,235,0.2)' : 'rgba(255,255,255,0.88)';
      ctx.strokeStyle = isSelected ? C.primary : '#999';
      ctx.lineWidth = isSelected ? 2 : 1;
      ctx.beginPath();
      roundRect(ctx, box.x, box.y, box.w, box.h, 5);
      ctx.fill();
      ctx.stroke();

      // 텍스트
      ctx.fillStyle = '#111';
      ctx.font = `${box.fontSize}px "${box.fontFamily}", sans-serif`;
      ctx.fillStyle = '#111';
      wrapText(ctx, textToShow, box.x+5, box.y+14, box.w-10, 14);

      // 선택 핸들
      if (isSelected) {
        ctx.fillStyle = C.primary;
        [[box.x,box.y],[box.x+box.w,box.y],[box.x,box.y+box.h],[box.x+box.w,box.y+box.h]].forEach(([hx,hy])=>{
          ctx.beginPath(); ctx.arc(hx, hy, 4, 0, Math.PI*2); ctx.fill();
        });
      }
    });
  }, [boxes, selectedId, activeLang, showOriginal]);

  function roundRect(ctx, x, y, w, h, r) {
    ctx.moveTo(x+r,y); ctx.lineTo(x+w-r,y); ctx.arcTo(x+w,y,x+w,y+r,r);
    ctx.lineTo(x+w,y+h-r); ctx.arcTo(x+w,y+h,x+w-r,y+h,r);
    ctx.lineTo(x+r,y+h); ctx.arcTo(x,y+h,x,y+h-r,r);
    ctx.lineTo(x,y+r); ctx.arcTo(x,y,x+r,y,r); ctx.closePath();
  }

  function wrapText(ctx, text, x, y, maxW, lineH) {
    const words = text.split(' ');
    let line = '';
    let cy = y;
    for (let w of words) {
      const test = line + w + ' ';
      if (ctx.measureText(test).width > maxW && line) {
        ctx.fillText(line, x, cy); line = w + ' '; cy += lineH;
      } else line = test;
    }
    ctx.fillText(line, x, cy);
  }

  function handleClick(e) {
    const rect = canvasRef.current.getBoundingClientRect();
    const scaleX = canvasRef.current.width / rect.width;
    const scaleY = canvasRef.current.height / rect.height;
    const mx = (e.clientX - rect.left) * scaleX;
    const my = (e.clientY - rect.top) * scaleY;
    const hit = boxes.find(b => mx>=b.x && mx<=b.x+b.w && my>=b.y && my<=b.y+b.h);
    onSelect(hit ? hit.id : null);
  }

  return (
    <canvas ref={canvasRef} width={380} height={340}
      onClick={handleClick}
      style={{ width:'100%', height:'100%', cursor:'crosshair', borderRadius:4 }} />
  );
}

// ── P1: Dual Editor ────────────────────────────
function DualEditorPage({ toast }) {
  const [selectedId, setSelectedId] = useState(null);
  const [boxes, setBoxes] = useState(TEXT_BOXES_INITIAL);
  const [activeLang, setActiveLang] = useState('en');
  const [scrollY, setScrollY] = useState(0);
  const selected = boxes.find(b => b.id === selectedId);

  function updateBox(field, val) {
    setBoxes(prev => prev.map(b => b.id===selectedId ? {...b, [field]:val} : b));
  }

  return (
    <div style={{ display:'flex', flexDirection:'column', gap:16, height:'100%' }}>
      {/* 툴바 */}
      <div style={{ display:'flex', gap:10, alignItems:'center' }}>
        <span style={{ fontSize:13, color:C.textSub }}>에피소드:</span>
        <select style={{ background:C.elevated, border:`1px solid ${C.border}`, color:C.text, padding:'5px 10px', borderRadius:6, fontSize:13 }}>
          <option>에피소드 1화 — 운명의 만남</option>
          <option>에피소드 2화 — 첫 번째 선택</option>
        </select>
        <span style={{ fontSize:13, color:C.textSub, marginLeft:8 }}>언어:</span>
        {LANGS.map(l => (
          <button key={l.code} onClick={()=>setActiveLang(l.code)}
            style={{ background: activeLang===l.code ? C.primary : C.elevated, color: activeLang===l.code ? '#fff' : C.textSub, padding:'5px 12px', borderRadius:6, fontSize:12, fontWeight:600, border:`1px solid ${activeLang===l.code ? C.primary : C.border}` }}>
            {l.flag} {l.label}
          </button>
        ))}
        <div style={{ flex:1 }} />
        <button onClick={()=>toast('저장 완료!')} style={{ background:C.primary, color:'#fff', padding:'6px 16px', borderRadius:6, fontSize:13, fontWeight:600 }}>
          💾 저장
        </button>
      </div>

      {/* 듀얼 패널 */}
      <div style={{ display:'flex', gap:12, flex:1, minHeight:0 }}>
        {/* 좌: 원본 */}
        <div style={{ flex:1, display:'flex', flexDirection:'column', minWidth:0 }}>
          <div style={{ fontSize:11, color:C.textSub, marginBottom:6, display:'flex', alignItems:'center', gap:6 }}>
            <span style={{ background:C.tag, color:C.accent, padding:'2px 8px', borderRadius:4, fontSize:10, fontWeight:700 }}>ORIGINAL</span>
            원본 이미지 (KO 대사 포함)
          </div>
          <div style={{ flex:1, background:'#1A2535', border:`1px solid ${C.border}`, borderRadius:8, overflow:'hidden', position:'relative' }}
               onScroll={e=>setScrollY(e.target.scrollTop)}>
            <WebtoonCanvas boxes={boxes} selectedId={selectedId} onSelect={setSelectedId} activeLang='ko' showOriginal={true} />
          </div>
        </div>

        {/* 우: 작업 Canvas */}
        <div style={{ flex:1, display:'flex', flexDirection:'column', minWidth:0 }}>
          <div style={{ fontSize:11, color:C.textSub, marginBottom:6, display:'flex', alignItems:'center', gap:6 }}>
            <span style={{ background:'rgba(37,99,235,0.2)', color:C.primaryHover, padding:'2px 8px', borderRadius:4, fontSize:10, fontWeight:700 }}>EDITOR</span>
            작업 이미지 — 텍스트 박스 클릭 선택
          </div>
          <div style={{ flex:1, background:'#1A2535', border:`2px solid ${selectedId ? C.primary : C.border}`, borderRadius:8, overflow:'hidden', transition:'border-color 0.2s' }}>
            <WebtoonCanvas boxes={boxes} selectedId={selectedId} onSelect={setSelectedId} activeLang={activeLang} showOriginal={false} />
          </div>
        </div>

        {/* Inspector */}
        <div style={{ width:210, flexShrink:0, background:C.surface, border:`1px solid ${C.border}`, borderRadius:8, padding:14, display:'flex', flexDirection:'column', gap:12 }}>
          <div style={{ fontSize:12, fontWeight:700, color:C.accent }}>Inspector</div>
          {selected ? (
            <>
              <InspRow label='ID' value={`TB-${selected.id.toString().padStart(3,'0')}`} />
              <div>
                <div style={{ fontSize:11, color:C.textSub, marginBottom:4 }}>텍스트</div>
                <textarea value={LANG_TEXTS[activeLang][selected.id-1] || selected.text}
                  onChange={e=>updateBox('text',e.target.value)}
                  rows={3} style={{ width:'100%', background:C.elevated, border:`1px solid ${C.border}`, color:C.text, borderRadius:5, padding:'6px 8px', fontSize:11, resize:'vertical' }} />
              </div>
              <InspField label='X' value={selected.x} onChange={v=>updateBox('x',+v)} />
              <InspField label='Y' value={selected.y} onChange={v=>updateBox('y',+v)} />
              <InspField label='W' value={selected.w} onChange={v=>updateBox('w',+v)} />
              <InspField label='H' value={selected.h} onChange={v=>updateBox('h',+v)} />
              <InspField label='fontSize' value={selected.fontSize} onChange={v=>updateBox('fontSize',+v)} />
              <div>
                <div style={{ fontSize:11, color:C.textSub, marginBottom:4 }}>Font</div>
                <select value={selected.fontFamily} onChange={e=>updateBox('fontFamily',e.target.value)}
                  style={{ width:'100%', background:C.elevated, border:`1px solid ${C.border}`, color:C.text, padding:'4px 6px', borderRadius:5, fontSize:11 }}>
                  <option>Arial</option><option>Georgia</option><option>Verdana</option><option>Noto Sans</option>
                </select>
              </div>
              <div style={{ fontSize:11, color:C.textSub }}>
                JSON Preview:<br/>
                <code style={{ color:C.accent, fontSize:10 }}>
                  {`{"x":${selected.x},"y":${selected.y},"w":${selected.w},"h":${selected.h},"fs":${selected.fontSize}}`}
                </code>
              </div>
            </>
          ) : (
            <div style={{ color:C.textDim, fontSize:12, textAlign:'center', paddingTop:20 }}>
              Canvas에서<br/>텍스트 박스를<br/>클릭하세요
            </div>
          )}
        </div>
      </div>

      {/* 상태 바 */}
      <div style={{ display:'flex', gap:16, padding:'8px 12px', background:C.surface, borderRadius:6, fontSize:11, color:C.textSub }}>
        <span>📦 텍스트 박스: {boxes.length}개</span>
        <span>🌐 언어: {activeLang.toUpperCase()}</span>
        {selected && <span>✓ 선택: TB-{String(selected.id).padStart(3,'0')} ({selected.x}, {selected.y})</span>}
        <span style={{ marginLeft:'auto' }}>Fabric.js IText 시뮬레이션</span>
      </div>
    </div>
  );
}

function InspRow({ label, value }) {
  return (
    <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center' }}>
      <span style={{ fontSize:11, color:C.textSub }}>{label}</span>
      <span style={{ fontSize:11, color:C.text, fontFamily:'monospace' }}>{value}</span>
    </div>
  );
}

function InspField({ label, value, onChange }) {
  return (
    <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', gap:6 }}>
      <span style={{ fontSize:11, color:C.textSub, width:48 }}>{label}</span>
      <input type='number' value={value} onChange={e=>onChange(e.target.value)}
        style={{ width:70, background:C.elevated, border:`1px solid ${C.border}`, color:C.text, borderRadius:4, padding:'3px 6px', fontSize:11, textAlign:'right' }} />
    </div>
  );
}

// ── P2: Canvas Text Control ──────────────────────
function CanvasTextControlPage({ toast }) {
  const [boxes, setBoxes] = useState(TEXT_BOXES_INITIAL);
  const [selectedId, setSelectedId] = useState(1);
  const [showAddModal, setShowAddModal] = useState(false);
  const [newText, setNewText] = useState('');
  const selected = boxes.find(b => b.id === selectedId);

  function updateBox(field, val) {
    setBoxes(prev => prev.map(b => b.id===selectedId ? {...b,[field]:val} : b));
  }

  function addBox() {
    const id = Math.max(...boxes.map(b=>b.id)) + 1;
    setBoxes(prev => [...prev, { id, x:50, y:50, w:130, h:40, lang:'en', text:newText||'New text', fontSize:11, fontFamily:'Arial' }]);
    setSelectedId(id);
    setNewText('');
    setShowAddModal(false);
    toast('텍스트 박스 추가!');
  }

  function removeBox() {
    setBoxes(prev => prev.filter(b => b.id !== selectedId));
    setSelectedId(null);
  }

  return (
    <div style={{ display:'flex', gap:16, height:'100%' }}>
      {/* 캔버스 영역 */}
      <div style={{ flex:1, display:'flex', flexDirection:'column', gap:10 }}>
        <div style={{ display:'flex', gap:8 }}>
          <button onClick={()=>setShowAddModal(true)} style={{ background:C.primary, color:'#fff', padding:'6px 14px', borderRadius:6, fontSize:12, fontWeight:600 }}>
            + 텍스트 박스 추가
          </button>
          {selectedId && (
            <button onClick={removeBox} style={{ background:'rgba(239,68,68,0.15)', color:'#F87171', padding:'6px 14px', borderRadius:6, fontSize:12, border:'1px solid rgba(239,68,68,0.3)' }}>
              🗑 선택 삭제
            </button>
          )}
          <div style={{ marginLeft:'auto', fontSize:12, color:C.textSub, alignSelf:'center' }}>
            ← 캔버스에서 텍스트 박스를 클릭하여 선택
          </div>
        </div>

        <div style={{ flex:1, background:'#1A2535', border:`1px solid ${C.border}`, borderRadius:8, overflow:'hidden' }}>
          <WebtoonCanvas boxes={boxes} selectedId={selectedId} onSelect={setSelectedId} activeLang='en' showOriginal={false} />
        </div>

        {/* IME 안내 */}
        <div style={{ background:'rgba(56,189,248,0.08)', border:'1px solid rgba(56,189,248,0.2)', borderRadius:6, padding:'8px 12px', fontSize:11, color:C.accent }}>
          💡 CJK 입력 지원: <code>compositionstart/end</code> 이벤트로 한·일·중 IME 입력 완료 시점을 감지하여 Canvas 업데이트를 지연 처리
        </div>
      </div>

      {/* 속성 패널 */}

// ── P5: Vertical Scroll Viewer ────────────────
function VerticalScrollPage() {
  const [loadedPages, setLoadedPages] = useState([0,1,2]);
  const [activeLang, setActiveLang] = useState('en');
  const containerRef = useRef(null);

  const PAGE_COLORS = ['#1A2535','#1B2436','#1C2537','#1D2638','#1E2739'];
  const PAGE_TITLES = ['1화 — p.01','1화 — p.02','1화 — p.03','1화 — p.04','1화 — p.05'];

  function handleScroll(e) {
    const { scrollTop, scrollHeight, clientHeight } = e.target;
    if (scrollHeight - scrollTop - clientHeight < 200 && loadedPages.length < 5) {
      setLoadedPages(prev => [...prev, prev.length]);
    }
  }

  return (
    <div style={{ display:'flex', gap:16, height:'100%' }}>
      {/* 스크롤 뷰어 */}
      <div style={{ flex:1, display:'flex', flexDirection:'column', gap:10 }}>
        <div style={{ display:'flex', gap:8, alignItems:'center' }}>
          {LANGS.map(l => (
            <button key={l.code} onClick={()=>setActiveLang(l.code)}
              style={{ background: activeLang===l.code ? C.primary : C.elevated, color: activeLang===l.code ? '#fff' : C.textSub, padding:'4px 12px', borderRadius:5, fontSize:12, fontWeight:600, border:`1px solid ${activeLang===l.code ? C.primary : C.border}` }}>
              {l.flag} {l.label}
            </button>
          ))}
          <span style={{ marginLeft:'auto', fontSize:11, color:C.textSub }}>
            {loadedPages.length}컷 로드됨 (스크롤로 추가 로드)
          </span>
        </div>

        <div ref={containerRef} onScroll={handleScroll}
          style={{ flex:1, overflowY:'auto', background:'#0A1628', borderRadius:8, border:`1px solid ${C.border}`, display:'flex', flexDirection:'column', gap:0, padding:'0 40px' }}>
          {loadedPages.map(idx => (
            <div key={idx} style={{ paddingBottom:2 }}>
              <div style={{ fontSize:10, color:C.textDim, textAlign:'center', padding:'4px 0' }}>{PAGE_TITLES[idx]}</div>
              <div style={{ background:PAGE_COLORS[idx], borderRadius:4, overflow:'hidden', width:'100%' }}>
                <WebtoonCanvas boxes={TEXT_BOXES_INITIAL.slice(0,idx%2+2)} selectedId={null} onSelect={()=>{}} activeLang={activeLang} showOriginal={false} />
              </div>
            </div>
          ))}
          {loadedPages.length >= 5 && (
            <div style={{ textAlign:'center', padding:20, fontSize:12, color:C.textDim }}>
              ─ 에피소드 종료 ─
            </div>
          )}
        </div>
      </div>

      {/* 사이드 정보 */}
      <div style={{ width:220, flexShrink:0, display:'flex', flexDirection:'column', gap:10 }}>
        <div style={{ background:C.surface, border:`1px solid ${C.border}`, borderRadius:8, padding:14 }}>
          <div style={{ fontSize:12, fontWeight:700, color:C.accent, marginBottom:10 }}>메모리 최적화</div>
          <div style={{ display:'flex', flexDirection:'column', gap:8 }}>
            {['Intersection Observer', 'Canvas.dispose()', 'Lazy Load Sentinel', 'Virtual Scroll'].map((tech, i) => (
              <div key={i} style={{ display:'flex', gap:8, alignItems:'center' }}>
                <span style={{ color:C.success, fontSize:11 }}>✓</span>
                <span style={{ fontSize:11, color:C.textSub }}>{tech}</span>
              </div>
            ))}
          </div>
        </div>

        <div style={{ background:C.surface, border:`1px solid ${C.border}`, borderRadius:8, padding:14 }}>
          <div style={{ fontSize:12, fontWeight:700, color:C.accent, marginBottom:10 }}>로드 상태</div>
          {Array.from({length:5}, (_,i) => (
            <div key={i} style={{ display:'flex', gap:8, alignItems:'center', marginBottom:6 }}>
              <div style={{ width:10, height:10, borderRadius:'50%', background: loadedPages.includes(i) ? C.success : C.border }} />
              <span style={{ fontSize:11, color: loadedPages.includes(i) ? C.text : C.textDim }}>{PAGE_TITLES[i]}</span>
              {loadedPages.includes(i) && <span style={{ marginLeft:'auto', fontSize:9, color:C.success }}>LIVE</span>}
            </div>
          ))}
        </div>

        <div style={{ background:'rgba(56,189,248,0.08)', border:'1px solid rgba(56,189,248,0.2)', borderRadius:6, padding:'10px 12px', fontSize:11, color:C.accent }}>
          💡 뷰포트 이탈 컷:<br/><code style={{ fontSize:10 }}>canvas.dispose()</code>로 즉시 메모리 해제
        </div>
      </div>
    </div>
  );
}

        <div style={{ padding:'12px', borderTop:`1px solid ${C.border}` }}>

            <div style={{ width:28, height:28, borderRadius:'50%', background:`linear-gradient(135deg,${C.primary},${C.accent})`, display:'flex', alignItems:'center', justifyContent:'center', fontSize:12, fontWeight:700 }}>K</div>
            <div>
              <div style={{ fontSize:12, fontWeight:600 }}>김번역</div>
              <div style={{ fontSize:10, color:C.textDim }}>Editor · EN</div>
            </div>
          </div>
        </div>
      </aside>

      {/* 메인 */}
      <div style={{ flex:1, display:'flex', flexDirection:'column', minWidth:0 }}>
        {/* 탑바 */}
        <div style={{ height:52, borderBottom:`1px solid ${C.border}`, display:'flex', alignItems:'center', padding:'0 20px', gap:12, flexShrink:0, background:'#0B1525' }}>
          <span style={{ fontWeight:700, fontSize:15 }}>{titles[page]}</span>
          <div style={{ flex:1 }} />
          <div style={{ display:'flex', gap:6, alignItems:'center' }}>
            <span style={{ background:'rgba(16,185,129,0.15)', color:'#34D399', fontSize:11, padding:'3px 8px', borderRadius:4, fontWeight:600 }}>● LIVE</span>
            <span style={{ color:C.textSub, fontSize:12 }}>Fabric.js 6.x</span>
          </div>
        </div>

        {/* 콘텐츠 */}
        <main style={{ flex:1, overflow:'auto', padding:20 }}>
          {pages[page]}
        </main>
      </div>

      {toastMsg && <Toast msg={toastMsg} onClose={()=>setToastMsg(null)} />}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
