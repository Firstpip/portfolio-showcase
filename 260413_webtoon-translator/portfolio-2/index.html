<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>인터랙티브 지도 식자 에디터 — 구현 데모</title>
<link rel="preconnect" href="https://cdn.jsdelivr.net" />
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" rel="stylesheet" />
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { width: 100%; height: 100%; font-family: 'Pretendard', -apple-system, sans-serif; background: #EFF6FF; color: #1E3A8A; }
#root { display: flex; flex-direction: column; width: 100%; min-height: 100vh; }
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: #EFF6FF; }
::-webkit-scrollbar-thumb { background: #93C5FD; border-radius: 3px; }
button { cursor: pointer; border: none; font-family: inherit; }
input, textarea, select { font-family: inherit; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useRef, useEffect } = React;

const C = {
  bg: '#EFF6FF', surface: '#FFFFFF', elevated: '#F0F7FF',
  border: '#BFDBFE', borderDark: '#93C5FD',
  primary: '#1D4ED8', primaryHover: '#2563EB', primaryLight: 'rgba(29,78,216,0.1)',
  accent: '#60A5FA', accentLight: 'rgba(96,165,250,0.15)',
  text: '#1E3A8A', textSub: '#3B82F6', textDim: '#64748B',
  success: '#059669', warning: '#D97706', error: '#DC2626',
};

const TABS = [
  { id:'map-canvas-editor', label:'Map Canvas Editor', icon:'🗺️' },
  { id:'language-switch', label:'Language Switch', icon:'🌐' },
  { id:'text-style-panel', label:'Text Style Panel', icon:'🎨' },
  { id:'export-preview', label:'Export Preview', icon:'📥' },
];

// 지도 레이블 더미 데이터
const MAP_LABELS_EN = [
  { id:1, x:60, y:50, w:110, h:34, text:'Seoul Station', fontSize:12, color:'#1D4ED8', fontFamily:'Arial' },
  { id:2, x:250, y:80, w:100, h:34, text:'Gangnam District', fontSize:11, color:'#1D4ED8', fontFamily:'Arial' },
  { id:3, x:120, y:160, w:120, h:34, text:'Han River Park', fontSize:12, color:'#059669', fontFamily:'Arial' },
  { id:4, x:280, y:200, w:115, h:34, text:'Lotte World Tower', fontSize:11, color:'#DC2626', fontFamily:'Arial' },
  { id:5, x:40, y:240, w:105, h:34, text:'Incheon Airport', fontSize:12, color:'#7C3AED', fontFamily:'Arial' },
];
const MAP_LABELS_KO = [
  { id:1, x:60, y:50, w:110, h:34, text:'서울역', fontSize:13, color:'#1D4ED8', fontFamily:'Arial' },
  { id:2, x:250, y:80, w:100, h:34, text:'강남구', fontSize:12, color:'#1D4ED8', fontFamily:'Arial' },
  { id:3, x:120, y:160, w:120, h:34, text:'한강공원', fontSize:13, color:'#059669', fontFamily:'Arial' },
  { id:4, x:280, y:200, w:115, h:34, text:'롯데월드타워', fontSize:12, color:'#DC2626', fontFamily:'Arial' },
  { id:5, x:40, y:240, w:105, h:34, text:'인천공항', fontSize:13, color:'#7C3AED', fontFamily:'Arial' },
];
const MAP_LABELS_JA = [
  { id:1, x:60, y:50, w:110, h:34, text:'ソウル駅', fontSize:12, color:'#1D4ED8', fontFamily:'Arial' },
  { id:2, x:250, y:80, w:100, h:34, text:'江南区', fontSize:12, color:'#1D4ED8', fontFamily:'Arial' },
  { id:3, x:120, y:160, w:120, h:34, text:'漢江公園', fontSize:12, color:'#059669', fontFamily:'Arial' },
  { id:4, x:280, y:200, w:115, h:34, text:'ロッテタワー', fontSize:11, color:'#DC2626', fontFamily:'Arial' },
  { id:5, x:40, y:240, w:105, h:34, text:'仁川空港', fontSize:12, color:'#7C3AED', fontFamily:'Arial' },
];
const LANG_LABELS = { en: MAP_LABELS_EN, ko: MAP_LABELS_KO, ja: MAP_LABELS_JA };

const LANGS = [
  { code:'en', name:'English', flag:'🇺🇸' },
  { code:'ko', name:'한국어', flag:'🇰🇷' },
  { code:'ja', name:'日本語', flag:'🇯🇵' },
];

// 지도 Canvas 컴포넌트
function MapCanvas({ labels, selectedId, onSelect, zoom=1 }) {
  const canvasRef = useRef(null);

  useEffect(() => {
    const canvas = canvasRef.current;
    if (!canvas) return;
    const ctx = canvas.getContext('2d');
    const W = canvas.width, H = canvas.height;

    // 지도 배경 렌더링
    ctx.fillStyle = '#E8F4F8';
    ctx.fillRect(0,0,W,H);

    // 도로망
    ctx.strokeStyle = '#FFFFFF';
    ctx.lineWidth = 3;
    [[0,H/2,W,H/2],[W/2,0,W/2,H],[0,H/3,W,H/3],[0,H*2/3,W,H*2/3],[W/3,0,W/3,H],[W*2/3,0,W*2/3,H]].forEach(([x1,y1,x2,y2]) => {
      ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(x2,y2); ctx.stroke();
    });

    // 블록 (도시 구역)
    const blocks = [
      { x:15,y:15,w:80,h:60,color:'#D1E8F0' },{ x:200,y:10,w:100,h:70,color:'#C8E6D0' },
      { x:10,y:130,w:90,h:80,color:'#E0D8F0' },{ x:220,y:140,w:120,h:90,color:'#F0E0D0' },
      { x:100,y:200,w:80,h:80,color:'#D0ECF4' },{ x:280,y:260,w:80,h:60,color:'#F0D8E8' },
    ];
    blocks.forEach(b => {
      ctx.fillStyle = b.color;
      ctx.fillRect(b.x,b.y,b.w,b.h);
      ctx.strokeStyle = 'rgba(255,255,255,0.8)';
      ctx.lineWidth = 1;
      ctx.strokeRect(b.x,b.y,b.w,b.h);
    });

    // 한강 (강)
    ctx.fillStyle = '#B3D9F2';
    ctx.beginPath();
    ctx.moveTo(0,150); ctx.bezierCurveTo(100,140,200,170,W,155);
    ctx.lineTo(W,170); ctx.bezierCurveTo(200,185,100,160,0,165);
    ctx.closePath(); ctx.fill();

    // 텍스트 레이블
    labels.forEach(label => {
      const isSelected = label.id === selectedId;
      ctx.fillStyle = isSelected ? 'rgba(29,78,216,0.12)' : 'rgba(255,255,255,0.88)';
      ctx.strokeStyle = isSelected ? C.primary : 'rgba(29,78,216,0.3)';
      ctx.lineWidth = isSelected ? 2 : 1;
      ctx.shadowColor = isSelected ? 'rgba(29,78,216,0.3)' : 'rgba(0,0,0,0.08)';
      ctx.shadowBlur = isSelected ? 6 : 3;
      ctx.beginPath();
      roundRect(ctx, label.x, label.y, label.w, label.h, 6);
      ctx.fill(); ctx.stroke();
      ctx.shadowBlur = 0;

      ctx.font = `bold ${label.fontSize}px "${label.fontFamily}", sans-serif`;
      ctx.fillStyle = label.color;
      ctx.textBaseline = 'middle';
      ctx.fillText(label.text, label.x+8, label.y+label.h/2);
      ctx.textBaseline = 'alphabetic';
    });

    // 나침반
    ctx.fillStyle = 'rgba(255,255,255,0.9)';
    ctx.beginPath(); ctx.arc(W-24, 24, 14, 0, Math.PI*2); ctx.fill();
    ctx.strokeStyle = '#93C5FD'; ctx.lineWidth = 1; ctx.stroke();
    ctx.fillStyle = C.primary; ctx.font = 'bold 10px sans-serif'; ctx.textAlign = 'center';
    ctx.fillText('N', W-24, 19);
    ctx.textAlign = 'start';

  }, [labels, selectedId]);

  function roundRect(ctx, x, y, w, h, r) {
    ctx.moveTo(x+r,y); ctx.lineTo(x+w-r,y); ctx.arcTo(x+w,y,x+w,y+r,r);
    ctx.lineTo(x+w,y+h-r); ctx.arcTo(x+w,y+h,x+w-r,y+h,r);
    ctx.lineTo(x+r,y+h); ctx.arcTo(x,y+h,x,y+h-r,r);
    ctx.lineTo(x,y+r); ctx.arcTo(x,y,x+r,y,r); ctx.closePath();
  }

  function handleClick(e) {
    const rect = canvasRef.current.getBoundingClientRect();
    const scaleX = canvasRef.current.width / rect.width;
    const scaleY = canvasRef.current.height / rect.height;
    const mx = (e.clientX - rect.left) * scaleX;
    const my = (e.clientY - rect.top) * scaleY;
    const hit = labels.find(l => mx>=l.x && mx<=l.x+l.w && my>=l.y && my<=l.y+l.h);
    onSelect(hit ? hit.id : null);
  }

  return (
    <canvas ref={canvasRef} width={430} height={330}
      onClick={handleClick}
      style={{ width:'100%', height:'100%', cursor:'crosshair' }} />
  );
}

function Toast({ msg, onClose }) {
  useEffect(() => { const t = setTimeout(onClose, 2000); return ()=>clearTimeout(t); }, []);
  return (
    <div style={{ position:'fixed', bottom:24, right:24, background:C.primary, color:'#fff', padding:'10px 18px', borderRadius:8, fontSize:13, fontWeight:600, zIndex:9999, boxShadow:'0 4px 20px rgba(29,78,216,0.35)' }}>
      ✓ {msg}
    </div>
  );
}

function Modal({ title, onClose, children, width=460 }) {
  return (
    <div style={{ position:'fixed', inset:0, background:'rgba(30,58,138,0.3)', display:'flex', alignItems:'center', justifyContent:'center', zIndex:1000 }}
         onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div style={{ background:C.surface, border:`1px solid ${C.border}`, borderRadius:12, width, maxHeight:'80vh', overflow:'auto', padding:24, boxShadow:'0 20px 60px rgba(29,78,216,0.15)' }}>
        <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:20 }}>
          <span style={{ fontWeight:700, fontSize:16, color:C.text }}>{title}</span>
          <button onClick={onClose} style={{ background:'none', color:C.textSub, fontSize:22, lineHeight:1 }}>×</button>
        </div>
        {children}
      </div>
    </div>
  );
}

// ── Tab 1: Map Canvas Editor ───────────────────
function MapCanvasEditorTab({ toast }) {
  const [lang, setLang] = useState('en');
  const [selectedId, setSelectedId] = useState(null);
  const [labels, setLabels] = useState(MAP_LABELS_EN);
  const [showAdd, setShowAdd] = useState(false);
  const [addForm, setAddForm] = useState({ text:'', color:'#1D4ED8' });

  function switchLang(code) {
    setLang(code);
    setLabels(LANG_LABELS[code].map(l => ({...l})));
    setSelectedId(null);
  }

  const selected = labels.find(l => l.id === selectedId);

  function updateLabel(field, val) {
    setLabels(prev => prev.map(l => l.id===selectedId ? {...l,[field]:val} : l));
  }

  function addLabel() {
    const id = Math.max(...labels.map(l=>l.id)) + 1;
    setLabels(prev => [...prev, { id, x:100, y:100, w:110, h:34, text:addForm.text||'New Label', fontSize:12, color:addForm.color, fontFamily:'Arial' }]);
    setSelectedId(id);
    setShowAdd(false);
    toast('레이블 추가 완료!');
  }

  return (
    <div style={{ display:'flex', gap:16 }}>
      {/* 캔버스 */}
      <div style={{ flex:1, display:'flex', flexDirection:'column', gap:10 }}>
        <div style={{ display:'flex', gap:8, alignItems:'center' }}>
          <span style={{ fontSize:12, color:C.textDim, fontWeight:500 }}>지도 언어:</span>
          {LANGS.map(l => (
            <button key={l.code} onClick={()=>switchLang(l.code)}
              style={{ background: lang===l.code ? C.primary : C.elevated, color: lang===l.code ? '#fff' : C.text, padding:'5px 12px', borderRadius:6, fontSize:12, fontWeight:600, border:`1px solid ${lang===l.code ? C.primary : C.border}`, transition:'all 0.15s' }}>
              {l.flag} {l.name}
            </button>
          ))}
          <div style={{ flex:1 }} />
          <button onClick={()=>setShowAdd(true)} style={{ background:C.primary, color:'#fff', padding:'6px 14px', borderRadius:6, fontSize:12, fontWeight:600 }}>
            + 레이블 추가
          </button>
        </div>

        <div style={{ background:C.surface, border:`1px solid ${C.border}`, borderRadius:10, overflow:'hidden', boxShadow:'0 2px 12px rgba(29,78,216,0.08)' }}>
          <MapCanvas labels={labels} selectedId={selectedId} onSelect={setSelectedId} />
        </div>
        <div style={{ fontSize:11, color:C.textDim, textAlign:'center' }}>
          레이블 클릭 → 선택 · 드래그로 이동 · Fabric.js IText 기반 구현 예정
        </div>
      </div>

      {/* Inspector */}
      <div style={{ width:240, flexShrink:0 }}>
        <div style={{ background:C.surface, border:`1px solid ${C.border}`, borderRadius:10, padding:16, boxShadow:'0 2px 8px rgba(29,78,216,0.06)' }}>
          <div style={{ fontSize:13, fontWeight:700, color:C.primary, marginBottom:12 }}>Inspector</div>
          {selected ? (
            <div style={{ display:'flex', flexDirection:'column', gap:10 }}>
              <LabelField label='텍스트' value={selected.text} onChange={v=>updateLabel('text',v)} />
              <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:8 }}>
                {[['X','x'],['Y','y'],['W','w'],['H','h']].map(([lbl,fld]) => (
                  <div key={fld}>
                    <div style={{ fontSize:10, color:C.textDim, marginBottom:3 }}>{lbl}</div>
                    <input type='number' value={selected[fld]} onChange={e=>updateLabel(fld,+e.target.value)}
                      style={{ width:'100%', border:`1px solid ${C.border}`, borderRadius:5, padding:'5px 7px', fontSize:11, color:C.text, background:C.elevated }} />
                  </div>
                ))}
              </div>
              <div>
                <div style={{ fontSize:10, color:C.textDim, marginBottom:3 }}>Font Size</div>
                <input type='range' min={9} max={18} value={selected.fontSize}
                  onChange={e=>updateLabel('fontSize',+e.target.value)}
                  style={{ width:'100%' }} />
                <div style={{ fontSize:10, color:C.textSub, textAlign:'right' }}>{selected.fontSize}px</div>
              </div>
              <div>
                <div style={{ fontSize:10, color:C.textDim, marginBottom:3 }}>색상</div>
                <div style={{ display:'flex', gap:6, flexWrap:'wrap' }}>
                  {['#1D4ED8','#059669','#DC2626','#7C3AED','#D97706','#0E7490'].map(c => (
                    <div key={c} onClick={()=>updateLabel('color',c)}
                      style={{ width:22, height:22, borderRadius:4, background:c, cursor:'pointer', border:`2px solid ${selected.color===c ? '#000' : 'transparent'}`, transition:'border 0.1s' }} />
                  ))}
                </div>
              </div>
              <div style={{ background:C.elevated, borderRadius:6, padding:'8px', fontSize:10, color:C.textSub, fontFamily:'monospace' }}>
                {`{id:${selected.id}, x:${selected.x}, y:${selected.y}, text:"${selected.text.slice(0,12)}..."}`}
              </div>
            </div>
          ) : (
            <div style={{ color:C.textDim, fontSize:12, textAlign:'center', padding:'20px 0' }}>
              지도에서 레이블을<br/>클릭하세요
            </div>
          )}
        </div>
      </div>

      {showAdd && (
        <Modal title='레이블 추가' onClose={()=>setShowAdd(false)} width={360}>
          <div style={{ display:'flex', flexDirection:'column', gap:12 }}>
            <div>
              <div style={{ fontSize:12, color:C.textDim, marginBottom:5 }}>레이블 텍스트</div>
              <input value={addForm.text} onChange={e=>setAddForm(p=>({...p,text:e.target.value}))} placeholder='지명 입력...'
                style={{ width:'100%', border:`1px solid ${C.border}`, borderRadius:7, padding:'8px 12px', fontSize:13, color:C.text }} />
            </div>
            <div>
              <div style={{ fontSize:12, color:C.textDim, marginBottom:5 }}>색상</div>
              <div style={{ display:'flex', gap:8 }}>
                {['#1D4ED8','#059669','#DC2626','#7C3AED'].map(c => (
                  <div key={c} onClick={()=>setAddForm(p=>({...p,color:c}))}
                    style={{ width:28, height:28, borderRadius:5, background:c, cursor:'pointer', border:`3px solid ${addForm.color===c ? '#000' : 'transparent'}` }} />
                ))}
              </div>
            </div>
            <div style={{ display:'flex', gap:8, justifyContent:'flex-end', marginTop:4 }}>
              <button onClick={()=>setShowAdd(false)} style={{ background:C.elevated, color:C.text, border:`1px solid ${C.border}`, padding:'7px 16px', borderRadius:7, fontSize:13 }}>취소</button>
              <button onClick={addLabel} style={{ background:C.primary, color:'#fff', padding:'7px 16px', borderRadius:7, fontSize:13, fontWeight:600 }}>추가</button>
            </div>
          </div>
        </Modal>
      )}
    </div>
  );
}

function LabelField({ label, value, onChange }) {
  return (
    <div>
      <div style={{ fontSize:10, color:C.textDim, marginBottom:3 }}>{label}</div>
      <input value={value} onChange={e=>onChange(e.target.value)}
        style={{ width:'100%', border:`1px solid ${C.border}`, borderRadius:5, padding:'5px 8px', fontSize:12, color:C.text, background:C.elevated }} />
    </div>
  );
}

// ── Tab 2: Language Switch ───────────────────
function LanguageSwitchTab() {
  const [lang, setLang] = useState('en');
  const [switching, setSwitching] = useState(false);
  const [selectedId, setSelectedId] = useState(null);

  function switchLang(code) {
    setSwitching(true);
    setTimeout(() => { setLang(code); setSwitching(false); }, 200);
  }

  return (
    <div style={{ display:'flex', gap:16 }}>
      <div style={{ flex:1, display:'flex', flexDirection:'column', gap:12 }}>
        {/* 언어 선택 카드 */}
        <div style={{ display:'grid', gridTemplateColumns:'repeat(3,1fr)', gap:10 }}>
          {LANGS.map(l => (
            <div key={l.code} onClick={()=>switchLang(l.code)}
              style={{ background: lang===l.code ? C.primaryLight : C.surface, border:`2px solid ${lang===l.code ? C.primary : C.border}`, borderRadius:10, padding:'12px', cursor:'pointer', textAlign:'center', transition:'all 0.2s' }}>
              <div style={{ fontSize:28, marginBottom:4 }}>{l.flag}</div>
              <div style={{ fontSize:13, fontWeight:700, color: lang===l.code ? C.primary : C.text }}>{l.name}</div>
              {lang===l.code && <div style={{ fontSize:10, color:C.primary, marginTop:2 }}>● 활성</div>}
            </div>
          ))}
        </div>

        {/* 지도 */}
        <div style={{ background:C.surface, border:`2px solid ${lang==='ko' ? '#059669' : lang==='ja' ? '#7C3AED' : C.primary}`, borderRadius:10, overflow:'hidden', opacity: switching ? 0.5 : 1, transition:'opacity 0.2s, border-color 0.3s', boxShadow:'0 2px 12px rgba(29,78,216,0.1)' }}>
          <MapCanvas labels={LANG_LABELS[lang]} selectedId={selectedId} onSelect={setSelectedId} />
        </div>

        <div style={{ background:'#F0FDF4', border:'1px solid #A7F3D0', borderRadius:7, padding:'8px 12px', fontSize:11, color:'#065F46', display:'flex', gap:8, alignItems:'center' }}>
          <span>✅</span>
          이미지 재로드 없이 텍스트 객체(lang JSON)만 교체 — Canvas 객체 <code style={{ background:'#D1FAE5', padding:'1px 4px', borderRadius:3 }}>text</code> 속성만 업데이트
        </div>
      </div>

      {/* 오른쪽: 비교 패널 */}
      <div style={{ width:260, flexShrink:0, display:'flex', flexDirection:'column', gap:10 }}>
        <div style={{ background:C.surface, border:`1px solid ${C.border}`, borderRadius:10, padding:14 }}>
          <div style={{ fontSize:13, fontWeight:700, color:C.primary, marginBottom:10 }}>레이블 비교</div>
          <div style={{ display:'flex', flexDirection:'column', gap:6 }}>
            {MAP_LABELS_EN.map((en, i) => (
              <div key={en.id} style={{ padding:'8px 10px', borderRadius:7, background:C.elevated, border:`1px solid ${C.border}` }}>
                <div style={{ fontSize:10, color:C.textDim, marginBottom:3 }}>Label #{en.id}</div>
                <div style={{ fontSize:11, color:C.primary, fontWeight:600, marginBottom:2 }}>
                  {LANG_LABELS[lang][i]?.text}
                </div>
                <div style={{ fontSize:9, color:C.textDim, opacity: switching ? 0 : 1, transition:'opacity 0.2s' }}>
                  EN: {en.text}
                </div>
              </div>
            ))}
          </div>
        </div>

        <div style={{ background:C.primaryLight, border:`1px solid ${C.border}`, borderRadius:8, padding:'10px 12px', fontSize:11, color:C.primary }}>
          <div style={{ fontWeight:700, marginBottom:5 }}>데이터 구조</div>
          <code style={{ fontSize:9, display:'block', lineHeight:1.6 }}>
            {`{\n  "lang": "${lang}",\n  "labels": [\n    { "id":1, "text":"${LANG_LABELS[lang][0]?.text}" }\n    ...\n  ]\n}`}
          </code>
        </div>
      </div>
    </div>
  );
}

// ── Tab 3: Text Style Panel ───────────────────
function TextStylePanelTab({ toast }) {
  const [labels, setLabels] = useState(MAP_LABELS_EN);
  const [selectedId, setSelectedId] = useState(1);
  const selected = labels.find(l => l.id === selectedId);

  function updateLabel(field, val) {
    setLabels(prev => prev.map(l => l.id===selectedId ? {...l,[field]:val} : l));
  }

  const FONTS = ['Arial', 'Georgia', 'Verdana', 'Trebuchet MS', 'Noto Sans', 'Noto Sans JP', 'Noto Sans KR'];
  const COLORS = ['#1D4ED8','#059669','#DC2626','#7C3AED','#D97706','#0E7490','#374151','#111827'];

  return (
    <div style={{ display:'flex', gap:16 }}>
      <div style={{ flex:1, display:'flex', flexDirection:'column', gap:10 }}>
        {/* 폰트 로드 안내 */}
        <div style={{ background:'#FEF3C7', border:'1px solid #FCD34D', borderRadius:7, padding:'8px 12px', fontSize:11, color:'#92400E', display:'flex', gap:8 }}>
          <span>⚡</span>
          <span>FontFace API: <code>Noto Sans JP/KR/SC</code> 선택 시 <code>FontFace.load()</code> Promise 완료 후 <code>canvas.renderAll()</code> 호출 — CJK 글자 깨짐 방지</span>
        </div>

        <div style={{ background:C.surface, border:`1px solid ${C.border}`, borderRadius:10, overflow:'hidden' }}>
          <MapCanvas labels={labels} selectedId={selectedId} onSelect={setSelectedId} />
        </div>
      </div>

      {/* 스타일 패널 */}
      <div style={{ width:280, flexShrink:0 }}>
        {/* 레이블 선택 목록 */}
        <div style={{ background:C.surface, border:`1px solid ${C.border}`, borderRadius:10, padding:14, marginBottom:12 }}>
          <div style={{ fontSize:12, fontWeight:700, color:C.primary, marginBottom:8 }}>레이블 선택</div>
          <div style={{ display:'flex', flexDirection:'column', gap:4 }}>
            {labels.map(l => (
              <div key={l.id} onClick={()=>setSelectedId(l.id)}
                style={{ padding:'6px 10px', borderRadius:6, cursor:'pointer', background: l.id===selectedId ? C.primaryLight : C.elevated, border:`1px solid ${l.id===selectedId ? C.primary : C.border}`, display:'flex', gap:8, alignItems:'center' }}>
                <div style={{ width:12, height:12, borderRadius:2, background:l.color, flexShrink:0 }} />
                <span style={{ fontSize:11, color: l.id===selectedId ? C.primary : C.text, fontWeight: l.id===selectedId ? 600 : 400 }}>{l.text}</span>
              </div>
            ))}
          </div>
        </div>

        {/* 스타일 속성 */}
        {selected && (
          <div style={{ background:C.surface, border:`1px solid ${C.border}`, borderRadius:10, padding:16, display:'flex', flexDirection:'column', gap:12 }}>
            <div style={{ fontSize:12, fontWeight:700, color:C.primary }}>스타일 편집</div>

            <div>
              <div style={{ fontSize:11, color:C.textDim, marginBottom:5 }}>Font Family</div>
              <select value={selected.fontFamily} onChange={e=>updateLabel('fontFamily',e.target.value)}
                style={{ width:'100%', border:`1px solid ${C.border}`, borderRadius:6, padding:'7px 10px', fontSize:12, color:C.text, background:C.elevated }}>
                {FONTS.map(f => <option key={f}>{f}</option>)}
              </select>
            </div>

            <div>
              <div style={{ fontSize:11, color:C.textDim, marginBottom:5 }}>Font Size: <strong>{selected.fontSize}px</strong></div>
              <input type='range' min={8} max={20} value={selected.fontSize}
                onChange={e=>updateLabel('fontSize',+e.target.value)} style={{ width:'100%' }} />
              <div style={{ display:'flex', justifyContent:'space-between', fontSize:9, color:C.textDim }}>
                <span>8px</span><span>20px</span>
              </div>
            </div>

            <div>
              <div style={{ fontSize:11, color:C.textDim, marginBottom:5 }}>색상</div>
              <div style={{ display:'flex', flexWrap:'wrap', gap:6 }}>
                {COLORS.map(c => (
                  <div key={c} onClick={()=>updateLabel('color',c)}
                    style={{ width:26, height:26, borderRadius:5, background:c, cursor:'pointer', border:`3px solid ${selected.color===c ? '#000' : 'transparent'}`, transition:'border 0.1s' }} />
                ))}
              </div>
            </div>

            <div style={{ padding:'8px', background:C.elevated, borderRadius:6, fontSize:10, color:C.textDim, fontFamily:'monospace' }}>
              <code>{`fontFamily: "${selected.fontFamily}"\nfontSize: ${selected.fontSize}px\nfill: "${selected.color}"`}</code>
            </div>

            <button onClick={()=>toast('스타일 적용 완료!')} style={{ background:C.primary, color:'#fff', padding:'8px', borderRadius:7, fontSize:12, fontWeight:600 }}>
              ✓ 적용
            </button>
          </div>
        )}
      </div>
    </div>
  );
}

// ── Tab 4: Export Preview ──────────────────────
function ExportPreviewTab({ toast }) {
  const [lang, setLang] = useState('en');
  const [showExportModal, setShowExportModal] = useState(false);
  const [exportFormat, setExportFormat] = useState('png');

  const jsonData = {
    map_id: 'seoul-metro-2026',
    exported_at: '2026-04-13T14:32:00Z',
    lang,
    labels: LANG_LABELS[lang].map(l => ({ id:l.id, x:l.x, y:l.y, text:l.text, fontSize:l.fontSize, color:l.color, fontFamily:l.fontFamily }))
  };

  return (
    <div style={{ display:'flex', gap:16 }}>
      <div style={{ flex:1, display:'flex', flexDirection:'column', gap:12 }}>
        <div style={{ display:'flex', gap:8, alignItems:'center' }}>
          <span style={{ fontSize:12, color:C.textDim }}>내보낼 언어:</span>
          {LANGS.map(l => (
            <button key={l.code} onClick={()=>setLang(l.code)}
              style={{ background: lang===l.code ? C.primary : C.elevated, color: lang===l.code ? '#fff' : C.text, padding:'5px 12px', borderRadius:6, fontSize:12, fontWeight:600, border:`1px solid ${lang===l.code ? C.primary : C.border}`, transition:'all 0.15s' }}>
              {l.flag} {l.name}
            </button>
          ))}
          <div style={{ flex:1 }} />
          <button onClick={()=>setShowExportModal(true)} style={{ background:C.primary, color:'#fff', padding:'7px 16px', borderRadius:7, fontSize:12, fontWeight:600 }}>
            📥 내보내기
          </button>
        </div>

        {/* 미리보기 */}
        <div style={{ background:C.surface, border:`1px solid ${C.border}`, borderRadius:10, overflow:'hidden', position:'relative' }}>
          <div style={{ position:'absolute', top:10, left:10, background:C.primary, color:'#fff', fontSize:10, padding:'3px 8px', borderRadius:4, fontWeight:700, zIndex:1 }}>
            PREVIEW
          </div>
          <MapCanvas labels={LANG_LABELS[lang]} selectedId={null} onSelect={()=>{}} />
        </div>

        <div style={{ background:'#EFF6FF', border:`1px solid ${C.border}`, borderRadius:7, padding:'8px 12px', fontSize:11, color:C.text }}>
          💡 <strong>canvas.toDataURL('image/png')</strong>로 배경+텍스트 합성 PNG 생성, <strong>canvas.toJSON()</strong>으로 편집 데이터 JSON 동시 다운로드
        </div>
      </div>

      {/* JSON 미리보기 */}
      <div style={{ width:300, flexShrink:0 }}>
        <div style={{ background:C.surface, border:`1px solid ${C.border}`, borderRadius:10, padding:14, height:'100%', display:'flex', flexDirection:'column', gap:10 }}>
          <div style={{ fontSize:12, fontWeight:700, color:C.primary }}>JSON 데이터 미리보기</div>
          <pre style={{ flex:1, background:C.elevated, borderRadius:7, padding:'10px', fontSize:9.5, color:C.textSub, overflow:'auto', lineHeight:1.6, fontFamily:'monospace' }}>
            {JSON.stringify(jsonData, null, 2)}
          </pre>
        </div>
      </div>

      {showExportModal && (
        <Modal title='내보내기 설정' onClose={()=>setShowExportModal(false)} width={380}>
          <div style={{ display:'flex', flexDirection:'column', gap:14 }}>
            <div>
              <div style={{ fontSize:12, color:C.textDim, marginBottom:6 }}>형식 선택</div>
              <div style={{ display:'flex', gap:8 }}>
                {[['png','🖼 PNG 이미지'],['json','📄 JSON 데이터'],['both','📦 PNG + JSON']].map(([v,l]) => (
                  <button key={v} onClick={()=>setExportFormat(v)}
                    style={{ flex:1, padding:'10px 6px', borderRadius:7, fontSize:11, fontWeight:600, background: exportFormat===v ? C.primaryLight : C.elevated, border:`2px solid ${exportFormat===v ? C.primary : C.border}`, color: exportFormat===v ? C.primary : C.text }}>
                    {l}
                  </button>
                ))}
              </div>
            </div>
            <div style={{ background:C.elevated, borderRadius:7, padding:'10px 12px', fontSize:11, color:C.textDim }}>
              파일명: <strong>{`seoul-map-${lang}-${new Date().toISOString().slice(0,10)}`}</strong>
            </div>
            <div style={{ display:'flex', gap:8, justifyContent:'flex-end' }}>
              <button onClick={()=>setShowExportModal(false)} style={{ background:C.elevated, color:C.text, border:`1px solid ${C.border}`, padding:'7px 16px', borderRadius:7, fontSize:13 }}>취소</button>
              <button onClick={()=>{ toast('내보내기 완료!'); setShowExportModal(false); }} style={{ background:C.primary, color:'#fff', padding:'7px 16px', borderRadius:7, fontSize:13, fontWeight:600 }}>
                다운로드
              </button>
            </div>
          </div>
        </Modal>
      )}
    </div>
  );
}

// ── 메인 App ───────────────────────────────────
function App() {
  const [tab, setTab] = useState('map-canvas-editor');
  const [toastMsg, setToastMsg] = useState(null);

  function toast(msg) { setToastMsg(msg); }

  const tabs = {
    'map-canvas-editor': <MapCanvasEditorTab toast={toast} />,
    'language-switch': <LanguageSwitchTab />,
    'text-style-panel': <TextStylePanelTab toast={toast} />,
    'export-preview': <ExportPreviewTab toast={toast} />,
  };

  return (
    <div style={{ display:'flex', flexDirection:'column', width:'100%', minHeight:'100vh', background:C.bg }}>
      {/* 상단 탑바 */}
      <header style={{ background:C.surface, borderBottom:`2px solid ${C.border}`, padding:'0 24px', boxShadow:'0 2px 8px rgba(29,78,216,0.06)' }}>
        <div style={{ display:'flex', alignItems:'center', gap:20, height:58 }}>
          {/* 로고 */}
          <div style={{ display:'flex', alignItems:'center', gap:10 }}>
            <div style={{ width:34, height:34, background:`linear-gradient(135deg,${C.primary},${C.accent})`, borderRadius:8, display:'flex', alignItems:'center', justifyContent:'center', fontSize:17 }}>
              🗺️
            </div>
            <div>
              <div style={{ fontSize:14, fontWeight:800, color:C.primary }}>MapLabel Studio</div>
              <div style={{ fontSize:10, color:C.textDim }}>인터랙티브 지도 식자 에디터</div>
            </div>
          </div>

          {/* 탭 네비 */}
          <nav style={{ display:'flex', gap:2, marginLeft:16 }}>
            {TABS.map(t => (
              <button key={t.id} onClick={()=>setTab(t.id)}
                style={{ padding:'8px 16px', borderRadius:6, fontSize:13, fontWeight:600, background: tab===t.id ? C.primaryLight : 'transparent', color: tab===t.id ? C.primary : C.textDim, borderBottom: tab===t.id ? `2px solid ${C.primary}` : '2px solid transparent', transition:'all 0.15s', display:'flex', gap:6, alignItems:'center' }}>
                <span>{t.icon}</span>{t.label}
              </button>
            ))}
          </nav>

          <div style={{ flex:1 }} />
          <div style={{ display:'flex', gap:8, alignItems:'center' }}>
            <span style={{ background:'#F0FDF4', color:'#059669', fontSize:11, padding:'4px 10px', borderRadius:5, fontWeight:600, border:'1px solid #A7F3D0' }}>
              ✓ Fabric.js 6.x
            </span>
            <div style={{ width:32, height:32, borderRadius:'50%', background:`linear-gradient(135deg,${C.primary},${C.accent})`, display:'flex', alignItems:'center', justifyContent:'center', color:'#fff', fontSize:13, fontWeight:700 }}>
              M
            </div>
          </div>
        </div>
      </header>

      {/* 히어로 배너 */}
      <div style={{ background:`linear-gradient(135deg, ${C.primary} 0%, #1E40AF 100%)`, padding:'14px 24px', display:'flex', alignItems:'center', gap:12 }}>
        <div>
          <div style={{ fontSize:15, fontWeight:700, color:'#fff' }}>인터랙티브 지도 식자 에디터 — 구현 데모</div>
          <div style={{ fontSize:12, color:'rgba(255,255,255,0.75)', marginTop:2 }}>
            Canvas 텍스트 레이어 제어 · 다국어 즉시 전환 · Fabric.js + FontFace API
          </div>
        </div>
        <div style={{ flex:1 }} />
        <div style={{ display:'flex', gap:8 }}>
          {['React 18','Fabric.js','react-i18next','FontFace API'].map(t => (
            <span key={t} style={{ background:'rgba(255,255,255,0.15)', color:'rgba(255,255,255,0.9)', fontSize:11, padding:'3px 10px', borderRadius:4, fontWeight:500 }}>{t}</span>
          ))}
        </div>
      </div>

      {/* 콘텐츠 */}
      <main style={{ flex:1, padding:'20px 24px', overflow:'auto' }}>
        {tabs[tab]}
      </main>

      {toastMsg && <Toast msg={toastMsg} onClose={()=>setToastMsg(null)} />}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
