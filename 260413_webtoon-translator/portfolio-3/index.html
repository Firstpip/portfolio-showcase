// ── 공통 컴포넌트 ──────────────────────────────
function Badge({ color, bg, text }) {
  return <span style={{ background:bg, color, fontSize:11, padding:'2px 8px', borderRadius:4, fontWeight:600, whiteSpace:'nowrap' }}>{text}</span>;
}

function StatusBadge({ status }) {
  const map = {
    translate: { bg:'rgba(14,165,233,0.15)', color:'#0EA5E9', label:'번역 중' },
    typeset:   { bg:'rgba(124,58,237,0.15)', color:'#7C3AED', label:'식자 중' },
    review:    { bg:'rgba(245,158,11,0.15)', color:'#D97706', label:'검수 중' },
    done:      { bg:'rgba(5,150,105,0.15)',  color:'#059669', label:'완료' },
    pending:   { bg:'rgba(156,163,175,0.15)', color:'#9CA3AF', label:'대기' },
  };
  const s = map[status] || map.pending;
  return <Badge bg={s.bg} color={s.color} text={s.label} />;
}

function RoleBadge({ role }) {
  const map = {
    translator: { bg:'rgba(14,165,233,0.12)', color:'#0369A1', label:'번역가' },
    typesetter: { bg:'rgba(124,58,237,0.12)', color:'#6D28D9', label:'식자가' },
    reviewer:   { bg:'rgba(245,158,11,0.12)', color:'#B45309', label:'검수자' },
    manager:    { bg:'rgba(5,150,105,0.12)',  color:'#065F46', label:'매니저' },
  };
  const s = map[role] || { bg:'#F3F4F6', color:'#6B7280', label:role };
  return <Badge bg={s.bg} color={s.color} text={s.label} />;
}

function Toast({ msg, onClose }) {
  useEffect(() => { const t = setTimeout(onClose, 2200); return ()=>clearTimeout(t); }, []);
  return (
    <div style={{ position:'fixed', bottom:24, right:24, background:C.primary, color:'#fff', padding:'10px 18px', borderRadius:8, fontSize:13, fontWeight:600, zIndex:9999, boxShadow:'0 4px 20px rgba(124,58,237,0.4)' }}>
      ✓ {msg}
    </div>
  );
}

function Modal({ title, onClose, children, width=480 }) {
  return (
    <div style={{ position:'fixed', inset:0, background:'rgba(30,27,75,0.3)', display:'flex', alignItems:'center', justifyContent:'center', zIndex:1000 }}
         onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div style={{ background:C.surface, border:`1px solid ${C.border}`, borderRadius:14, width, maxHeight:'82vh', overflow:'auto', padding:24, boxShadow:'0 24px 60px rgba(124,58,237,0.15)' }}>

          <button onClick={onClose} style={{ background:'none', color:C.textSub, fontSize:22, lineHeight:1 }}>×</button>
        </div>
        {children}
      </div>
    </div>
  );
}

                    ))}
                  </div>
                </div>
                {/* 진행 바 */}
                <div style={{ display:'flex', gap:2, height:8, borderRadius:4, overflow:'hidden', marginBottom:6 }}>
                  {[
                    { key:'translate', color:C.info, val:proj.status.translate },
                    { key:'typeset', color:C.primary, val:proj.status.typeset },
                    { key:'review', color:C.warning, val:proj.status.review },
                    { key:'done', color:C.success, val:proj.status.done },

                    <div key={s.key} style={{ flex:s.val, background:s.color, transition:'flex 0.3s' }} />

                </div>
                <div style={{ display:'flex', gap:14, fontSize:11, color:C.textDim }}>

                  <span style={{ color:C.info }}>번역 {proj.status.translate}</span>
                  <span style={{ color:C.primary }}>식자 {proj.status.typeset}</span>
                  <span style={{ color:C.warning }}>검수 {proj.status.review}</span>
                  <span style={{ color:C.success }}>완료 {proj.status.done}</span>
                  <span style={{ marginLeft:'auto', fontWeight:600, color:C.primary }}>{donePct}%</span>

      {/* 최근 작업 */}
      <div style={{ background:C.surface, border:`1px solid ${C.border}`, borderRadius:12, padding:16, boxShadow:'0 2px 8px rgba(124,58,237,0.05)' }}>

              <div style={{ fontSize:10, color:C.textDim, marginTop:4 }}>{ep.assignee || '미배정'}</div>

            </div>
            <div>

              {[
                { label:'번역 중', val:selectedProject.status.translate, color:C.info },
                { label:'식자 중', val:selectedProject.status.typeset, color:C.primary },
                { label:'검수 중', val:selectedProject.status.review, color:C.warning },

    setRoles(prev => [...prev, { id, ...addForm, active:true, projects:0 }]);

// ── P3: Episode Task Board (칸반) ──────────────
function EpisodeTaskBoardPage({ toast }) {
  const [episodes, setEpisodes] = useState(EPISODES);
  const [selectedEp, setSelectedEp] = useState(null);
  const [dragId, setDragId] = useState(null);
  const [dragOver, setDragOver] = useState(null);

  const COLS = [
    { key:'pending', label:'대기', color:'#9CA3AF', bg:'#F9FAFB' },
    { key:'translate', label:'번역 중', color:C.info, bg:'rgba(14,165,233,0.06)' },
    { key:'typeset', label:'식자 중', color:C.primary, bg:'rgba(124,58,237,0.06)' },
    { key:'review', label:'검수 중', color:C.warning, bg:'rgba(245,158,11,0.06)' },
    { key:'done', label:'완료', color:C.success, bg:'rgba(5,150,105,0.06)' },
  ];

  function moveEpisode(epId, newStatus) {
    setEpisodes(prev => prev.map(e => e.id===epId ? {...e, status:newStatus} : e));
    toast('상태 변경 완료!');
  }

  function handleDrop(colKey) {
    if (dragId) { moveEpisode(dragId, colKey); setDragId(null); setDragOver(null); }
  }

  const daysLeft = (due) => Math.ceil((new Date(due) - new Date()) / 86400000);

  return (
    <div style={{ display:'flex', flexDirection:'column', gap:12, height:'100%' }}>
      <div style={{ fontSize:12, color:C.textDim }}>
        드래그 앤 드롭으로 에피소드 상태 변경 (@dnd-kit 기반 구현 예정)
      </div>
      <div style={{ display:'flex', gap:10, flex:1, minHeight:0, overflowX:'auto' }}>
        {COLS.map(col => {
          const colEps = episodes.filter(e => e.status === col.key);
          return (
            <div key={col.key}
              onDragOver={e=>{e.preventDefault(); setDragOver(col.key);}}
              onDrop={()=>handleDrop(col.key)}
              onDragLeave={()=>setDragOver(null)}
              style={{ width:200, flexShrink:0, background: dragOver===col.key ? 'rgba(124,58,237,0.08)' : col.bg, borderRadius:10, border:`1px solid ${dragOver===col.key ? C.primary : C.border}`, padding:'10px', display:'flex', flexDirection:'column', gap:6, transition:'all 0.15s' }}>
              {/* 컬럼 헤더 */}
              <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', paddingBottom:8, borderBottom:`1px solid ${C.border}` }}>
                <span style={{ fontSize:12, fontWeight:700, color:col.color }}>{col.label}</span>
                <span style={{ background:col.color, color:'#fff', width:20, height:20, borderRadius:'50%', display:'flex', alignItems:'center', justifyContent:'center', fontSize:11, fontWeight:700 }}>{colEps.length}</span>
              </div>

              <div style={{ flex:1, overflowY:'auto', display:'flex', flexDirection:'column', gap:6 }}>
                {colEps.map(ep => {
                  const d = daysLeft(ep.due);
                  return (
                    <div key={ep.id}
                      draggable
                      onDragStart={()=>setDragId(ep.id)}
                      onDragEnd={()=>setDragId(null)}
                      onClick={()=>setSelectedEp(ep)}
                      style={{ background:C.surface, border:`1px solid ${C.border}`, borderRadius:8, padding:'10px', cursor:'grab', boxShadow:'0 1px 4px rgba(124,58,237,0.05)', opacity: dragId===ep.id ? 0.4 : 1, transition:'opacity 0.15s' }}>
                      <div style={{ fontSize:11, fontWeight:600, marginBottom:4, lineHeight:1.4 }}>{ep.title}</div>
                      <div style={{ display:'flex', gap:6, alignItems:'center', flexWrap:'wrap' }}>
                        <span style={{ fontSize:10, color:C.textDim }}>{ep.pages}컷</span>
                        {ep.assignee && <span style={{ fontSize:10, color:C.primary, background:C.accentLight, padding:'1px 5px', borderRadius:3 }}>{ep.assignee}</span>}
                      </div>
                      {d <= 3 && col.key !== 'done' && (
                        <div style={{ marginTop:4, fontSize:10, color:C.error, fontWeight:600 }}>
                          ⚠ D-{Math.max(0,d)}
                        </div>
                      )}
                    </div>
                  );
                })}
              </div>
            </div>
          );
        })}
      </div>

      {selectedEp && (
        <Modal title={selectedEp.title} onClose={()=>setSelectedEp(null)} width={420}>
          <div style={{ display:'flex', flexDirection:'column', gap:12 }}>
            <div style={{ display:'flex', gap:8 }}>
              <StatusBadge status={selectedEp.status} />
              <span style={{ fontSize:12, color:C.textDim }}>{selectedEp.pages}컷</span>
              <span style={{ fontSize:12, color:C.textDim }}>마감: {selectedEp.due}</span>
            </div>
            <div>
              <div style={{ fontSize:12, color:C.textDim, marginBottom:5 }}>담당자</div>
              <select defaultValue={selectedEp.assignee}
                style={{ width:'100%', border:`1px solid ${C.border}`, borderRadius:7, padding:'8px 10px', fontSize:13, color:C.text }}>
                <option value=''>미배정</option>
                {ROLES.filter(r=>r.active).map(r => <option key={r.id} value={r.name}>{r.name} ({r.role})</option>)}
              </select>
            </div>
            <div>
              <div style={{ fontSize:12, color:C.textDim, marginBottom:5 }}>상태 변경</div>
              <div style={{ display:'flex', gap:6, flexWrap:'wrap' }}>
                {['pending','translate','typeset','review','done'].map(s => (
                  <button key={s} onClick={()=>{moveEpisode(selectedEp.id,s); setSelectedEp(null);}}
                    style={{ padding:'6px 12px', borderRadius:6, fontSize:11, fontWeight:600, background: selectedEp.status===s ? C.primary : C.elevated, color: selectedEp.status===s ? '#fff' : C.text, border:`1px solid ${selectedEp.status===s ? C.primary : C.border}` }}>
                    {s==='pending'?'대기':s==='translate'?'번역':s==='typeset'?'식자':s==='review'?'검수':'완료'}
                  </button>
                ))}
              </div>
            </div>
            <div>
              <div style={{ fontSize:12, color:C.textDim, marginBottom:5 }}>작업 메모</div>
              <textarea rows={3} placeholder='메모 입력...'
                style={{ width:'100%', border:`1px solid ${C.border}`, borderRadius:7, padding:'8px 10px', fontSize:12, color:C.text, resize:'vertical' }} />
            </div>
            <div style={{ display:'flex', justifyContent:'flex-end', gap:8 }}>
              <button onClick={()=>setSelectedEp(null)} style={{ background:C.elevated, color:C.text, border:`1px solid ${C.border}`, padding:'7px 16px', borderRadius:7, fontSize:12 }}>닫기</button>
              <button onClick={()=>{ toast('저장!'); setSelectedEp(null); }} style={{ background:C.primary, color:'#fff', padding:'7px 16px', borderRadius:7, fontSize:12, fontWeight:600 }}>저장</button>
            </div>
          </div>
        </Modal>
      )}
    </div>
  );
}

// ── P4: QA Review Panel ───────────────────────
function QAReviewPanelPage({ toast }) {
  const [sliderX, setSliderX] = useState(50);
  const [selectedEp, setSelectedEp] = useState(EPISODES[2]);
  const [comments, setComments] = useState([
    { id:1, x:45, y:62, text:'폰트 크기가 너무 작습니다. 12px로 변경 요청', resolved:false },
    { id:2, x:215, y:112, text:'줄바꿈 위치 조정 필요', resolved:true },
  ]);
  const [showCommentModal, setShowCommentModal] = useState(null);
  const [newComment, setNewComment] = useState('');
  const containerRef = useRef(null);

  function addComment(e) {
    const rect = containerRef.current?.getBoundingClientRect();
    if (!rect) return;
    const x = ((e.clientX - rect.left) / rect.width * 100).toFixed(0);
    const y = ((e.clientY - rect.top) / rect.height * 100).toFixed(0);
    setShowCommentModal({ x:+x, y:+y });
  }

  function submitComment() {
    if (!newComment.trim()) return;
    const id = comments.length + 1;
    setComments(prev => [...prev, { id, x:showCommentModal.x, y:showCommentModal.y, text:newComment, resolved:false }]);
    setNewComment('');
    setShowCommentModal(null);
    toast('코멘트 추가!');
  }

  return (
    <div style={{ display:'flex', gap:14 }}>
      {/* 에피소드 선택 */}
      <div style={{ width:200, flexShrink:0, display:'flex', flexDirection:'column', gap:8 }}>
        <div style={{ fontSize:12, fontWeight:700, color:C.primary, marginBottom:4 }}>에피소드 선택</div>
        {EPISODES.filter(e=>['typeset','review','done'].includes(e.status)).map(ep => (
          <div key={ep.id} onClick={()=>setSelectedEp(ep)}
            style={{ padding:'10px 12px', borderRadius:8, border:`1px solid ${selectedEp?.id===ep.id ? C.primary : C.border}`, cursor:'pointer', background: selectedEp?.id===ep.id ? C.primaryLight : C.surface, transition:'all 0.15s' }}>
            <div style={{ fontSize:11, fontWeight:600, marginBottom:3 }}>{ep.title}</div>
            <StatusBadge status={ep.status} />
          </div>
        ))}
      </div>

      {/* 비교 뷰어 */}
      <div style={{ flex:1, display:'flex', flexDirection:'column', gap:10 }}>
        <div style={{ display:'flex', gap:8, alignItems:'center' }}>
          <span style={{ fontSize:12, color:C.textDim }}>비교 슬라이더:</span>
          <input type='range' min={10} max={90} value={sliderX}
            onChange={e=>setSliderX(+e.target.value)}
            style={{ flex:1 }} />
          <span style={{ fontSize:11, color:C.textSub, fontWeight:600, width:50 }}>원본 {sliderX}%</span>
        </div>

        <div ref={containerRef}
          style={{ position:'relative', background:C.surface, border:`1px solid ${C.border}`, borderRadius:10, overflow:'hidden', height:300, cursor:'crosshair', boxShadow:'0 2px 8px rgba(124,58,237,0.06)' }}
          onClick={addComment}>
          {/* 좌측: 식자 완료 */}
          <div style={{ position:'absolute', inset:0, background:'linear-gradient(135deg,#E8F4F8 0%,#F0E8F8 100%)' }}>
            <div style={{ position:'absolute', bottom:8, left:8, fontSize:10, color:C.textDim, background:'rgba(255,255,255,0.8)', padding:'2px 6px', borderRadius:3 }}>식자 완료</div>
          </div>
          {/* 우측: 원본 */}
          <div style={{ position:'absolute', inset:0, background:'linear-gradient(135deg,#FFF8E8 0%,#F8EEE8 100%)', clipPath:`inset(0 0 0 ${sliderX}%)` }}>
            <div style={{ position:'absolute', bottom:8, right:8, fontSize:10, color:C.textDim, background:'rgba(255,255,255,0.8)', padding:'2px 6px', borderRadius:3 }}>원본</div>
          </div>
          {/* 슬라이더 선 */}
          <div style={{ position:'absolute', top:0, bottom:0, left:`${sliderX}%`, width:2, background:C.primary, zIndex:2, cursor:'col-resize' }}>
            <div style={{ position:'absolute', top:'50%', left:'50%', transform:'translate(-50%,-50%)', width:20, height:20, borderRadius:'50%', background:C.primary, display:'flex', alignItems:'center', justifyContent:'center', color:'#fff', fontSize:12 }}>⟷</div>
          </div>
          {/* 코멘트 핀 */}
          {comments.map(c => (
            <div key={c.id}
              style={{ position:'absolute', left:`${c.x}%`, top:`${c.y}%`, width:20, height:20, background: c.resolved ? C.success : C.error, borderRadius:'50%', display:'flex', alignItems:'center', justifyContent:'center', color:'#fff', fontSize:11, fontWeight:700, cursor:'pointer', zIndex:3, transform:'translate(-50%,-50%)', boxShadow:'0 2px 6px rgba(0,0,0,0.2)' }}
              onClick={e=>{ e.stopPropagation(); }}>
              {c.id}
            </div>
          ))}
        </div>
        <div style={{ fontSize:11, color:C.textDim, textAlign:'center' }}>클릭하여 코멘트 핀 추가</div>
      </div>

      {/* 코멘트 목록 */}
      <div style={{ width:220, flexShrink:0, display:'flex', flexDirection:'column', gap:8 }}>
        <div style={{ fontSize:12, fontWeight:700, color:C.primary }}>코멘트 ({comments.length})</div>
        {comments.map(c => (
          <div key={c.id} style={{ background:C.surface, border:`1px solid ${c.resolved ? 'rgba(5,150,105,0.3)' : C.error}`, borderRadius:8, padding:'10px 12px' }}>
            <div style={{ display:'flex', gap:6, alignItems:'center', marginBottom:5 }}>
              <div style={{ width:18, height:18, borderRadius:'50%', background: c.resolved ? C.success : C.error, display:'flex', alignItems:'center', justifyContent:'center', color:'#fff', fontSize:10, fontWeight:700, flexShrink:0 }}>{c.id}</div>
              <span style={{ fontSize:10, color: c.resolved ? C.success : C.error, fontWeight:600 }}>{c.resolved ? '해결됨' : '미해결'}</span>
            </div>
            <div style={{ fontSize:11, color:C.text, lineHeight:1.5 }}>{c.text}</div>
            {!c.resolved && (
              <button onClick={()=>{ setComments(prev=>prev.map(cc=>cc.id===c.id?{...cc,resolved:true}:cc)); toast('해결 처리!'); }}
                style={{ marginTop:6, background:'rgba(5,150,105,0.1)', color:C.success, border:'1px solid rgba(5,150,105,0.3)', padding:'3px 8px', borderRadius:4, fontSize:10, fontWeight:600, cursor:'pointer' }}>
                해결
              </button>
            )}
          </div>
        ))}
      </div>

      {showCommentModal && (
        <Modal title='코멘트 추가' onClose={()=>setShowCommentModal(null)} width={360}>
          <div style={{ display:'flex', flexDirection:'column', gap:10 }}>
            <div style={{ fontSize:12, color:C.textDim }}>위치: ({showCommentModal.x}%, {showCommentModal.y}%)</div>
            <textarea value={newComment} onChange={e=>setNewComment(e.target.value)} rows={3} placeholder='코멘트 내용 입력...'
              style={{ width:'100%', border:`1px solid ${C.border}`, borderRadius:7, padding:'8px 10px', fontSize:13, color:C.text, resize:'vertical' }} />
            <div style={{ display:'flex', gap:8, justifyContent:'flex-end' }}>
              <button onClick={()=>setShowCommentModal(null)} style={{ background:C.elevated, color:C.text, border:`1px solid ${C.border}`, padding:'7px 14px', borderRadius:7, fontSize:12 }}>취소</button>
              <button onClick={submitComment} style={{ background:C.primary, color:'#fff', padding:'7px 14px', borderRadius:7, fontSize:12, fontWeight:600 }}>추가</button>
            </div>
          </div>
        </Modal>
      )}
    </div>
  );
}

// ── P5: Translation Memory ─────────────────────
function TranslationMemoryPage({ toast }) {
  const [query, setQuery] = useState('');
  const [results, setResults] = useState([]);
  const [searching, setSearching] = useState(false);
  const [selected, setSelected] = useState(null);

  function search() {
    if (!query.trim()) return;
    setSearching(true);
    setTimeout(() => {
      const filtered = TM_ENTRIES.filter(e =>
        e.source.includes(query) || e.target.toLowerCase().includes(query.toLowerCase())
      );
      setResults(filtered.length > 0 ? filtered : TM_ENTRIES.slice(0,3));
      setSearching(false);
    }, 280);
  }

  return (
    <div style={{ display:'flex', gap:14 }}>
      <div style={{ flex:1, display:'flex', flexDirection:'column', gap:12 }}>
        {/* 검색 */}
        <div style={{ display:'flex', gap:8 }}>
          <input value={query} onChange={e=>setQuery(e.target.value)}
            onKeyDown={e=>e.key==='Enter'&&search()}
            placeholder='번역 텍스트 검색 (한국어 원문 또는 영문)...'
            style={{ flex:1, border:`2px solid ${C.border}`, borderRadius:8, padding:'10px 14px', fontSize:13, color:C.text }} />
          <button onClick={search} style={{ background:C.primary, color:'#fff', padding:'0 20px', borderRadius:8, fontSize:13, fontWeight:600 }}>
            {searching ? '검색 중...' : '검색'}
          </button>
        </div>

        {/* pgvector 설명 */}
        <div style={{ background:'rgba(124,58,237,0.08)', border:'1px solid rgba(124,58,237,0.2)', borderRadius:8, padding:'10px 14px', fontSize:11, color:C.primary, display:'flex', gap:8 }}>
          <span>🧠</span>
          <span><strong>pgvector</strong> 유사도 검색: 입력 텍스트를 임베딩하여 PostgreSQL pgvector 확장으로 코사인 유사도 상위 5개 후보 조회 — debounce 300ms 적용</span>
        </div>

        {/* 검색 결과 */}
        {results.length > 0 && (
          <div style={{ display:'flex', flexDirection:'column', gap:8 }}>
            <div style={{ fontSize:12, color:C.textDim }}>검색 결과 {results.length}건</div>
            {results.map(entry => (
              <div key={entry.id} onClick={()=>setSelected(entry)}
                style={{ background:C.surface, border:`1px solid ${selected?.id===entry.id ? C.primary : C.border}`, borderRadius:10, padding:'14px 16px', cursor:'pointer', transition:'all 0.15s', boxShadow:'0 1px 4px rgba(124,58,237,0.04)' }}>
                <div style={{ display:'flex', gap:8, alignItems:'flex-start', marginBottom:8 }}>
                  <div style={{ flex:1 }}>
                    <div style={{ fontSize:12, color:C.textDim, marginBottom:3 }}>원문 (KO)</div>
                    <div style={{ fontSize:13, fontWeight:600, color:C.text }}>{entry.source}</div>
                  </div>
                  <div style={{ flexShrink:0, textAlign:'right' }}>
                    <div style={{ fontSize:20, fontWeight:800, color: entry.similarity >= 90 ? C.success : entry.similarity >= 70 ? C.warning : C.textSub }}>{entry.similarity}%</div>
                    <div style={{ fontSize:9, color:C.textDim }}>유사도</div>
                  </div>
                </div>
                <div style={{ fontSize:12, color:C.primary, marginBottom:4 }}>→ {entry.target}</div>
                <div style={{ fontSize:10, color:C.textDim }}>사용 횟수: {entry.used}회</div>
              </div>
            ))}
          </div>
        )}

        {results.length === 0 && (
          <div style={{ background:C.surface, border:`1px solid ${C.border}`, borderRadius:10, padding:30, textAlign:'center', color:C.textDim, fontSize:13 }}>
            검색어를 입력하고 Enter를 눌러 유사 번역을 찾아보세요
          </div>
        )}
      </div>

      {/* 선택 패널 */}
      <div style={{ width:260, flexShrink:0 }}>
        {selected ? (
          <div style={{ background:C.surface, border:`1px solid ${C.border}`, borderRadius:12, padding:16, display:'flex', flexDirection:'column', gap:10 }}>
            <div style={{ fontSize:12, fontWeight:700, color:C.primary }}>선택된 번역 메모리</div>
            <div style={{ background:C.elevated, borderRadius:8, padding:'10px 12px' }}>
              <div style={{ fontSize:10, color:C.textDim, marginBottom:3 }}>원문</div>
              <div style={{ fontSize:12, color:C.text, fontWeight:600, lineHeight:1.5 }}>{selected.source}</div>
            </div>
            <div style={{ background:'rgba(124,58,237,0.08)', borderRadius:8, padding:'10px 12px' }}>
              <div style={{ fontSize:10, color:C.textDim, marginBottom:3 }}>번역문</div>
              <div style={{ fontSize:12, color:C.primary, fontWeight:600, lineHeight:1.5 }}>{selected.target}</div>
            </div>
            <div style={{ display:'flex', justifyContent:'space-between', fontSize:11, color:C.textDim }}>
              <span>유사도: <strong style={{ color: selected.similarity >= 90 ? C.success : C.warning }}>{selected.similarity}%</strong></span>
              <span>사용: {selected.used}회</span>
            </div>
            <button onClick={()=>toast('Canvas IText에 자동 입력!')}
              style={{ background:C.primary, color:'#fff', padding:'9px', borderRadius:8, fontSize:12, fontWeight:700 }}>
              ✓ Canvas에 적용
            </button>
          </div>
        ) : (
          <div style={{ background:C.surface, border:`1px solid ${C.border}`, borderRadius:12, padding:16 }}>
            <div style={{ fontSize:12, fontWeight:700, color:C.primary, marginBottom:10 }}>번역 메모리 통계</div>
            {[
              { label:'등록된 번역 쌍', value:`${TM_ENTRIES.length}개`, color:C.primary },
              { label:'평균 유사도', value:'75.6%', color:C.success },
              { label:'총 사용 횟수', value:`${TM_ENTRIES.reduce((s,e)=>s+e.used,0)}회`, color:C.info },
            ].map(s => (
              <div key={s.label} style={{ display:'flex', justifyContent:'space-between', padding:'8px 0', borderBottom:`1px solid ${C.border}` }}>
                <span style={{ fontSize:12, color:C.textDim }}>{s.label}</span>
                <span style={{ fontSize:13, fontWeight:700, color:s.color }}>{s.value}</span>
              </div>
            ))}
            <div style={{ marginTop:12, padding:'10px', background:C.elevated, borderRadius:7, fontSize:10, color:C.textDim, lineHeight:1.6 }}>
              pgvector <code style={{ background:'rgba(124,58,237,0.1)', padding:'1px 4px', borderRadius:2 }}>cosine_distance</code> 연산으로 의미 기반 유사 번역 추천
            </div>
          </div>
        )}
      </div>
    </div>
  );
}
