<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>유럽 화장품 수출 인증 B2B 플랫폼</title>
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" rel="stylesheet"/>
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://unpkg.com/prop-types/prop-types.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/recharts@2.15.0/umd/Recharts.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
html,body{width:100%;height:100%;font-family:'Pretendard',-apple-system,sans-serif;background:#F0F4FF;}
#root{display:flex;width:100%;height:100vh;overflow:hidden;}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
@keyframes slideRight{from{transform:translateX(-12px);opacity:0}to{transform:none;opacity:1}}
@keyframes modalIn{from{opacity:0;transform:scale(.96)}to{opacity:1;transform:none}}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useRef} = React;
const {BarChart,Bar,XAxis,YAxis,CartesianGrid,Tooltip,ResponsiveContainer,LineChart,Line,Legend} = Recharts;

const C = {
  primary:'#1A56DB', secondary:'#1E40AF', accent:'#3B82F6',
  bg:'#F0F4FF', surface:'#FFFFFF', sidebar:'#0F1C3F',
  sidebarActive:'#1A56DB', sidebarText:'#94A3C0', sidebarTextActive:'#FFFFFF',
  text:'#1E293B', textSub:'#64748B', border:'#E2E8F0',
  success:'#10B981', warning:'#F59E0B', danger:'#EF4444',
  badge:'#EFF6FF', badgeText:'#1A56DB',
};

const PAGES = [
  {id:'quote', icon:'🧮', label:'자동 견적 계산기'},
  {id:'compare', icon:'⚖️', label:'파트너사 비교 뷰'},
  {id:'pdf', icon:'📄', label:'PDF 견적서 생성'},
  {id:'admin', icon:'⚙️', label:'관리자 단가 관리'},
];

const PAGE_TITLES = {
  quote:'자동 견적 계산기', compare:'파트너사 비교 뷰',
  pdf:'PDF 견적서 생성', admin:'관리자 단가 관리',
};

// ── 더미 데이터 ──────────────────────────────────────────────────────────────
const CERT_TYPES = [
  {id:'cpnp', label:'CPNP 등록 (EU)', base:1200000},
  {id:'reach', label:'REACH 규정 대응', base:850000},
  {id:'biocide', label:'생물살균제 인증', base:2100000},
  {id:'fda', label:'미국 FDA 등록', base:950000},
  {id:'china', label:'중국 NMPA 인증', base:3200000},
];
const COUNTRIES = ['독일','프랑스','영국','이탈리아','스페인','네덜란드'];
const PRODUCT_CATS = ['스킨케어','색조화장품','헤어케어','선케어','바디케어','향수'];

const PARTNERS = [
  {id:'A', name:'(주)유로인증파트너스', tier:'Tier 1 (Premium)', color:'#1A56DB', bgColor:'#EFF6FF'},
  {id:'B', name:'(주)글로벌컴플라이언스', tier:'Tier 2 (Standard)', color:'#7C3AED', bgColor:'#F5F3FF'},
  {id:'C', name:'(주)코스메틱어시스트', tier:'Tier 3 (Budget)', color:'#059669', bgColor:'#F0FDF4'},
];

const LEAD_LIST = [
  {id:1,company:'(주)아모스핀즈',contact:'김지영 대리',country:'독일,프랑스',cert:'CPNP 등록',status:'견적 검토중',amount:'₩2,840,000',date:'2026-04-10'},
  {id:2,company:'(주)클레어스코스메',contact:'박민준 팀장',country:'영국',cert:'REACH+CPNP',status:'파트너사 선택',amount:'₩1,920,000',date:'2026-04-09'},
  {id:3,company:'더마팩토리 글로벌',contact:'이수진 과장',country:'이탈리아,스페인',cert:'CPNP 등록',status:'견적서 발송',amount:'₩3,150,000',date:'2026-04-08'},
  {id:4,company:'(주)뷰티피아',contact:'최현우 대리',country:'네덜란드',cert:'REACH 규정',status:'계약 완료',amount:'₩890,000',date:'2026-04-07'},
  {id:5,company:'(주)루나코스메틱',contact:'정서연 과장',country:'독일',cert:'생물살균제',status:'재견적 요청',amount:'₩2,310,000',date:'2026-04-06'},
];

const ADMIN_PRICE = [
  {id:1,partner:'(주)유로인증파트너스',cert:'CPNP 등록',unit:'건',price:'1,200,000',extra:'국가당 +80,000',active:true},
  {id:2,partner:'(주)유로인증파트너스',cert:'REACH 규정',unit:'건',price:'850,000',extra:'성분당 +12,000',active:true},
  {id:3,partner:'(주)글로벌컴플라이언스',cert:'CPNP 등록',unit:'건',price:'980,000',extra:'국가당 +65,000',active:true},
  {id:4,partner:'(주)글로벌컴플라이언스',cert:'생물살균제',unit:'건',price:'1,850,000',extra:'제품당 +180,000',active:true},
  {id:5,partner:'(주)코스메틱어시스트',cert:'CPNP 등록',unit:'건',price:'760,000',extra:'국가당 +50,000',active:true},
  {id:6,partner:'(주)코스메틱어시스트',cert:'REACH 규정',unit:'건',price:'620,000',extra:'성분당 +9,000',active:false},
];

const MONTHLY_DATA = [
  {month:'10월',견적:18,계약:7},{month:'11월',견적:23,계약:11},
  {month:'12월',견적:15,계약:6},{month:'1월',견적:28,계약:14},
  {month:'2월',견적:32,계약:18},{month:'3월',견적:41,계약:22},
];

// ── 공용 컴포넌트 ──────────────────────────────────────────────────────────
function Tag({color,bg,children}){
  return <span style={{display:'inline-block',padding:'2px 8px',borderRadius:99,fontSize:11,fontWeight:600,color:color||C.badgeText,background:bg||C.badge}}>{children}</span>;
}
function StatusBadge({status}){
  const map={
    '견적 검토중':{c:'#92400E',b:'#FEF3C7'},
    '파트너사 선택':{c:'#1E40AF',b:'#DBEAFE'},
    '견적서 발송':{c:'#065F46',b:'#D1FAE5'},
    '계약 완료':{c:'#1A1A1A',b:'#D1FAE5'},
    '재견적 요청':{c:'#7F1D1D',b:'#FEE2E2'},
  };
  const s=map[status]||{c:'#64748B',b:'#F1F5F9'};
  return <Tag color={s.c} bg={s.b}>{status}</Tag>;
}
function Modal({title,onClose,children,width=560}){
  return (
    <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.45)',zIndex:500,display:'flex',alignItems:'center',justifyContent:'center'}} onClick={onClose}>
      <div style={{background:'#fff',borderRadius:16,width,maxWidth:'95vw',maxHeight:'90vh',overflow:'auto',padding:28,animation:'modalIn 200ms ease',boxShadow:'0 24px 64px rgba(0,0,0,.18)'}} onClick={e=>e.stopPropagation()}>
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:20}}>
          <h3 style={{fontWeight:700,fontSize:16,color:C.text}}>{title}</h3>
          <button onClick={onClose} style={{border:'none',background:'none',cursor:'pointer',fontSize:18,color:C.textSub,padding:'4px 8px',borderRadius:8}}>✕</button>
        </div>
        {children}
      </div>
    </div>
  );
}
function FormField({label,children}){
  return <div style={{marginBottom:16}}><label style={{display:'block',fontSize:12,fontWeight:600,color:C.textSub,marginBottom:6}}>{label}</label>{children}</div>;
}
function Input({...props}){
  return <input {...props} style={{width:'100%',padding:'9px 12px',border:`1.5px solid ${C.border}`,borderRadius:8,fontSize:13,fontFamily:'inherit',outline:'none',...props.style}}/>;
}
function Select({options,...props}){
  return <select {...props} style={{width:'100%',padding:'9px 12px',border:`1.5px solid ${C.border}`,borderRadius:8,fontSize:13,fontFamily:'inherit',outline:'none',...props.style}}>
    {options.map(o=><option key={o}>{o}</option>)}
  </select>;
}
function Btn({variant='primary',children,onClick,size='md'}){
  const base={border:'none',cursor:'pointer',fontFamily:'inherit',fontWeight:600,borderRadius:8,transition:'all 150ms'};
  const sizes={md:{padding:'9px 18px',fontSize:13},sm:{padding:'6px 12px',fontSize:12},lg:{padding:'12px 24px',fontSize:14}};
  const vars={
    primary:{background:C.primary,color:'#fff'},
    secondary:{background:C.bg,color:C.primary,border:`1.5px solid ${C.primary}`},
    ghost:{background:'transparent',color:C.textSub},
    danger:{background:'#FEE2E2',color:'#DC2626'},
    success:{background:'#D1FAE5',color:'#065F46'},
  };
  return <button onClick={onClick} style={{...base,...sizes[size],...vars[variant]}}>{children}</button>;
}

// ── 견적 계산기 페이지 ──────────────────────────────────────────────────────
function QuotePage(){
  const [step,setStep]=useState(0);
  const [form,setForm]=useState({cert:'CPNP 등록 (EU)',countries:[],products:[],qty:1,urgent:false});
  const [result,setResult]=useState(null);
  const [showResult,setShowResult]=useState(false);

  const toggleCountry=(c)=>{
    setForm(f=>({...f,countries:f.countries.includes(c)?f.countries.filter(x=>x!==c):[...f.countries,c]}));
  };
  const toggleProduct=(p)=>{
    setForm(f=>({...f,products:f.products.includes(p)?f.products.filter(x=>x!==p):[...f.products,p]}));
  };
  const calcQuote=()=>{
    const certType=CERT_TYPES.find(c=>c.label===form.cert)||CERT_TYPES[0];
    const basePrice=certType.base;
    const countryMul=Math.max(form.countries.length,1)*0.8+0.2;
    const productMul=Math.max(form.products.length,1)*0.6+0.4;
    const qtyMul=1+(form.qty-1)*0.15;
    const urgentMul=form.urgent?1.25:1;
    const base=Math.round(basePrice*countryMul*productMul*qtyMul*urgentMul/10000)*10000;
    setResult({
      A:Math.round(base*1.0/10000)*10000,
      B:Math.round(base*0.82/10000)*10000,
      C:Math.round(base*0.65/10000)*10000,
      period:form.urgent?'45일':'90일',
      cert:form.cert,
    });
    setShowResult(true);
  };

  const steps=[{label:'인증 유형 선택'},{label:'대상 국가 선택'},{label:'제품 카테고리'},{label:'견적 조건 설정'}];

  if(showResult&&result){
    return (
      <div style={{animation:'fadeIn 300ms ease'}}>
        <div style={{display:'flex',alignItems:'center',gap:12,marginBottom:24}}>
          <button onClick={()=>setShowResult(false)} style={{border:'none',background:C.bg,borderRadius:8,padding:'8px 14px',cursor:'pointer',fontSize:13,color:C.primary,fontWeight:600}}>← 다시 계산</button>
          <h2 style={{fontSize:18,fontWeight:700,color:C.text}}>견적 계산 결과</h2>
        </div>
        <div style={{background:'#fff',borderRadius:16,padding:20,marginBottom:20,border:`1px solid ${C.border}`,boxShadow:'0 2px 12px rgba(0,0,0,.04)'}}>
          <div style={{display:'flex',flexWrap:'wrap',gap:8,marginBottom:16}}>
            <Tag>{result.cert}</Tag>
            <Tag bg='#F0FDF4' color='#065F46'>납기 {result.period}</Tag>
            {form.countries.map(c=><Tag key={c} bg='#F5F3FF' color='#7C3AED'>{c}</Tag>)}
            {form.urgent&&<Tag bg='#FEF3C7' color='#92400E'>긴급 처리</Tag>}
          </div>
          <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:16}}>
            {PARTNERS.map((p,i)=>{
              const amt=[result.A,result.B,result.C][i];
              const isMin=i===2;
              return (
                <div key={p.id} style={{borderRadius:14,border:`2px solid ${isMin?C.success:C.border}`,padding:20,background:isMin?'#F0FDF4':'#fff',position:'relative'}}>
                  {isMin&&<span style={{position:'absolute',top:-10,right:12,background:C.success,color:'#fff',borderRadius:99,fontSize:10,fontWeight:700,padding:'2px 10px'}}>최저가</span>}
                  <div style={{fontSize:11,fontWeight:600,color:C.textSub,marginBottom:6}}>{p.tier}</div>
                  <div style={{fontSize:14,fontWeight:700,color:C.text,marginBottom:4}}>{p.name}</div>
                  <div style={{fontSize:24,fontWeight:800,color:p.color,marginBottom:8}}>₩{amt.toLocaleString()}</div>
                  <div style={{fontSize:11,color:C.textSub,borderTop:`1px solid ${C.border}`,paddingTop:8,lineHeight:1.6}}>
                    <div>납기: {result.period}</div>
                    <div>서류 검토 포함</div>
                    <div>사후 관리 {i===0?'12개월':i===1?'6개월':'3개월'}</div>
                  </div>
                  <Btn variant={isMin?'primary':'secondary'} size='sm' onClick={()=>alert(`${p.name}으로 견적을 요청합니다.`)} style={{width:'100%',marginTop:12}}>견적 요청</Btn>
                </div>
              );
            })}
          </div>
        </div>
        <div style={{background:'#fff',borderRadius:16,padding:20,border:`1px solid ${C.border}`,boxShadow:'0 2px 12px rgba(0,0,0,.04)'}}>
          <h4 style={{fontWeight:700,marginBottom:12,color:C.text}}>파트너사별 비용 비교</h4>
          <ResponsiveContainer width="100%" height={200}>
            <BarChart data={[{name:'Tier 1',금액:result.A},{name:'Tier 2',금액:result.B},{name:'Tier 3',금액:result.C}]}>
              <CartesianGrid strokeDasharray="3 3" stroke={C.border}/>
              <XAxis dataKey="name" tick={{fontSize:12}}/>
              <YAxis tickFormatter={v=>`${(v/10000).toFixed(0)}만`} tick={{fontSize:11}}/>
              <Tooltip formatter={v=>`₩${v.toLocaleString()}`}/>
              <Bar dataKey="금액" fill={C.primary} radius={[6,6,0,0]}/>
            </BarChart>
          </ResponsiveContainer>
        </div>
      </div>
    );
  }

  return (
    <div style={{animation:'fadeIn 300ms ease'}}>
      <h2 style={{fontSize:18,fontWeight:700,color:C.text,marginBottom:20}}>자동 견적 계산기</h2>
      {/* 스텝 인디케이터 */}
      <div style={{display:'flex',alignItems:'center',gap:0,marginBottom:28}}>
        {steps.map((s,i)=>(
          <React.Fragment key={i}>
            <div style={{display:'flex',alignItems:'center',gap:8,cursor:'pointer'}} onClick={()=>setStep(i)}>
              <div style={{width:28,height:28,borderRadius:99,background:i<=step?C.primary:C.border,color:'#fff',display:'flex',alignItems:'center',justifyContent:'center',fontSize:12,fontWeight:700,flexShrink:0}}>{i+1}</div>
              <span style={{fontSize:12,fontWeight:600,color:i<=step?C.primary:C.textSub,whiteSpace:'nowrap'}}>{s.label}</span>
            </div>
            {i<steps.length-1&&<div style={{flex:1,height:2,background:i<step?C.primary:C.border,margin:'0 8px'}}/>}
          </React.Fragment>
        ))}
      </div>

      <div style={{background:'#fff',borderRadius:16,padding:24,border:`1px solid ${C.border}`,boxShadow:'0 2px 12px rgba(0,0,0,.04)',marginBottom:20}}>
        {step===0&&(
          <div style={{animation:'slideRight 200ms ease'}}>
            <h4 style={{fontWeight:700,marginBottom:16,color:C.text}}>인증 유형을 선택하세요</h4>
            <div style={{display:'grid',gridTemplateColumns:'repeat(2,1fr)',gap:12}}>
              {CERT_TYPES.map(c=>(
                <div key={c.id} onClick={()=>setForm(f=>({...f,cert:c.label}))} style={{border:`2px solid ${form.cert===c.label?C.primary:C.border}`,borderRadius:12,padding:16,cursor:'pointer',background:form.cert===c.label?C.badge:'#fff',transition:'all 150ms'}}>
                  <div style={{fontWeight:700,fontSize:13,color:form.cert===c.label?C.primary:C.text,marginBottom:4}}>{c.label}</div>
                  <div style={{fontSize:12,color:C.textSub}}>기본가 ₩{c.base.toLocaleString()}부터</div>
                </div>
              ))}
            </div>
          </div>
        )}
        {step===1&&(
          <div style={{animation:'slideRight 200ms ease'}}>
            <h4 style={{fontWeight:700,marginBottom:16,color:C.text}}>수출 대상 국가를 선택하세요 (복수 선택 가능)</h4>
            <div style={{display:'flex',flexWrap:'wrap',gap:10}}>
              {COUNTRIES.map(c=>(
                <div key={c} onClick={()=>toggleCountry(c)} style={{padding:'8px 18px',borderRadius:99,border:`2px solid ${form.countries.includes(c)?C.primary:C.border}`,background:form.countries.includes(c)?C.badge:'#fff',color:form.countries.includes(c)?C.primary:C.text,fontSize:13,fontWeight:600,cursor:'pointer',transition:'all 150ms'}}>{c}</div>
              ))}
            </div>
            {form.countries.length>0&&<div style={{marginTop:12,fontSize:12,color:C.textSub}}>선택됨: {form.countries.join(', ')} (+{form.countries.length}개국)</div>}
          </div>
        )}
        {step===2&&(
          <div style={{animation:'slideRight 200ms ease'}}>
            <h4 style={{fontWeight:700,marginBottom:16,color:C.text}}>제품 카테고리를 선택하세요 (복수 선택 가능)</h4>
            <div style={{display:'flex',flexWrap:'wrap',gap:10}}>
              {PRODUCT_CATS.map(p=>(
                <div key={p} onClick={()=>toggleProduct(p)} style={{padding:'8px 18px',borderRadius:99,border:`2px solid ${form.products.includes(p)?C.primary:C.border}`,background:form.products.includes(p)?C.badge:'#fff',color:form.products.includes(p)?C.primary:C.text,fontSize:13,fontWeight:600,cursor:'pointer',transition:'all 150ms'}}>{p}</div>
              ))}
            </div>
          </div>
        )}
        {step===3&&(
          <div style={{animation:'slideRight 200ms ease'}}>
            <h4 style={{fontWeight:700,marginBottom:20,color:C.text}}>견적 조건 설정</h4>
            <FormField label="제품 SKU 수">
              <input type="range" min={1} max={20} value={form.qty} onChange={e=>setForm(f=>({...f,qty:+e.target.value}))} style={{width:'100%',accentColor:C.primary}}/>
              <div style={{fontSize:13,color:C.primary,fontWeight:700,marginTop:4}}>{form.qty}개 SKU</div>
            </FormField>
            <div style={{display:'flex',alignItems:'center',gap:12,padding:16,border:`1.5px solid ${form.urgent?C.warning:C.border}`,borderRadius:12,cursor:'pointer',background:form.urgent?'#FFFBEB':'#fff'}} onClick={()=>setForm(f=>({...f,urgent:!f.urgent}))}>
              <div style={{width:20,height:20,borderRadius:99,border:`2px solid ${form.urgent?C.warning:C.border}`,background:form.urgent?C.warning:'#fff',display:'flex',alignItems:'center',justifyContent:'center',color:'#fff',fontSize:12,transition:'all 150ms'}}>{form.urgent&&'✓'}</div>
              <div>
                <div style={{fontWeight:700,fontSize:13,color:form.urgent?'#92400E':C.text}}>긴급 처리 신청</div>
                <div style={{fontSize:11,color:C.textSub}}>납기 45일 단축 (추가 비용 25% 발생)</div>
              </div>
            </div>
          </div>
        )}
      </div>

      <div style={{display:'flex',justifyContent:'space-between'}}>
        <Btn variant='ghost' onClick={()=>setStep(s=>Math.max(0,s-1))} size='sm'>이전</Btn>
        {step<3
          ?<Btn onClick={()=>setStep(s=>s+1)}>다음 단계 →</Btn>
          :<Btn onClick={calcQuote}>견적 계산하기 🧮</Btn>
        }
      </div>
    </div>
  );
}

// ── 파트너사 비교 뷰 ──────────────────────────────────────────────────────────
function ComparePage(){
  const items=[
    {cat:'기본 서비스',A:'✅ 서류 검토',B:'✅ 서류 검토',C:'✅ 서류 검토'},
    {cat:'규제 컨설팅',A:'✅ 전담 컨설턴트',B:'✅ 전담 컨설턴트',C:'⚡ 이메일 지원'},
    {cat:'CPNP 등록 대행',A:'✅ 포함',B:'✅ 포함',C:'✅ 포함'},
    {cat:'사후 관리 기간',A:'12개월',B:'6개월',C:'3개월'},

              <Legend/>
              <Line type="monotone" dataKey="견적" stroke={C.primary} strokeWidth={2.5} dot={{r:4}}/>
              <Line type="monotone" dataKey="계약" stroke={C.success} strokeWidth={2.5} dot={{r:4}}/>
            </LineChart>
          </ResponsiveContainer>
        </div>
        <div style={{background:'#fff',borderRadius:16,padding:20,border:`1px solid ${C.border}`,boxShadow:'0 2px 8px rgba(0,0,0,.04)'}}>
          <h4 style={{fontWeight:700,marginBottom:16,color:C.text}}>최근 견적 리드</h4>
          {LEAD_LIST.slice(0,4).map(l=>(
            <div key={l.id} style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'10px 0',borderBottom:`1px solid ${C.border}`,cursor:'pointer'}} onClick={()=>onNav('admin')}>
              <div>
                <div style={{fontSize:12,fontWeight:600,color:C.text}}>{l.company}</div>
                <div style={{fontSize:11,color:C.textSub}}>{l.cert} · {l.country}</div>
              </div>
              <div style={{textAlign:'right'}}>
                <div style={{fontSize:12,fontWeight:700,color:C.primary}}>{l.amount}</div>
                <StatusBadge status={l.status}/>
              </div>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

// ── 메인 앱 ──────────────────────────────────────────────────────────────────
function App(){
  const [page,setPage]=useState('dashboard');
  const allPages=[{id:'dashboard',icon:'🏠',label:'대시보드'},...PAGES];

  const renderPage=()=>{
    if(page==='dashboard') return <DashboardHome onNav={setPage}/>;
    if(page==='quote') return <QuotePage/>;
    if(page==='compare') return <ComparePage/>;
    if(page==='pdf') return <PdfPage/>;
    if(page==='admin') return <AdminPage/>;
  };

  return (
    <div style={{display:'flex',width:'100%',height:'100vh',overflow:'hidden'}}>
      {/* 사이드바 */}
      <aside style={{width:260,background:C.sidebar,display:'flex',flexDirection:'column',flexShrink:0,paddingTop:0,overflow:'hidden'}}>
        {/* 로고 */}
        <div style={{padding:'20px 20px 16px',borderBottom:'1px solid rgba(255,255,255,.06)'}}>
          <div style={{display:'flex',alignItems:'center',gap:10}}>
            <div style={{width:36,height:36,borderRadius:10,background:C.primary,display:'flex',alignItems:'center',justifyContent:'center',fontSize:18}}>🌍</div>
            <div>
              <div style={{fontSize:13,fontWeight:800,color:'#fff',lineHeight:1.2}}>EuroCert</div>
              <div style={{fontSize:9,color:C.sidebarText}}>수출 인증 B2B 플랫폼</div>
            </div>
          </div>
        </div>
        {/* 네비 */}
        <nav style={{flex:1,padding:'12px 10px',display:'flex',flexDirection:'column',gap:2,overflowY:'auto'}}>
          {allPages.map(p=>(
            <button key={p.id} onClick={()=>setPage(p.id)} style={{
              display:'flex',alignItems:'center',gap:12,padding:'10px 14px',borderRadius:10,border:'none',cursor:'pointer',
              background:page===p.id?C.sidebarActive:'transparent',
              color:page===p.id?'#fff':C.sidebarText,
              fontFamily:'inherit',fontSize:13,fontWeight:600,textAlign:'left',transition:'all 150ms',
            }}>
              <span style={{fontSize:16}}>{p.icon}</span>
              {p.label}
            </button>
          ))}
        </nav>
        {/* 유저 */}
        <div style={{padding:'12px 16px',borderTop:'1px solid rgba(255,255,255,.06)',display:'flex',alignItems:'center',gap:10}}>
          <div style={{width:32,height:32,borderRadius:99,background:C.primary,display:'flex',alignItems:'center',justifyContent:'center',fontSize:13,color:'#fff',fontWeight:700}}>김</div>
          <div>
            <div style={{fontSize:12,fontWeight:600,color:'#fff'}}>김관리자</div>
            <div style={{fontSize:10,color:C.sidebarText}}>admin@eurocert.kr</div>
          </div>
        </div>
      </aside>

      {/* 메인 영역 */}
      <div style={{flex:1,display:'flex',flexDirection:'column',overflow:'hidden'}}>
        {/* 탑바 */}
        <header style={{height:56,background:'#fff',borderBottom:`1px solid ${C.border}`,display:'flex',alignItems:'center',padding:'0 24px',gap:16,flexShrink:0,boxShadow:'0 1px 4px rgba(0,0,0,.04)'}}>
          <h1 style={{fontSize:15,fontWeight:700,color:C.text,flex:1}}>{allPages.find(p=>p.id===page)?.label}</h1>
          <div style={{display:'flex',alignItems:'center',gap:12}}>
            <div style={{display:'flex',alignItems:'center',gap:8,padding:'6px 12px',background:C.bg,borderRadius:8,border:`1px solid ${C.border}`}}>
              <span style={{fontSize:12,color:C.textSub}}>🔍</span>
              <input placeholder="검색..." style={{border:'none',background:'transparent',fontSize:12,outline:'none',width:120,fontFamily:'inherit'}}/>
            </div>
            <div style={{width:32,height:32,borderRadius:99,background:C.bg,border:`1px solid ${C.border}`,display:'flex',alignItems:'center',justifyContent:'center',cursor:'pointer',fontSize:14}}>🔔</div>
            <div style={{width:32,height:32,borderRadius:99,background:C.primary,display:'flex',alignItems:'center',justifyContent:'center',fontSize:13,color:'#fff',fontWeight:700,cursor:'pointer'}}>김</div>
          </div>
        </header>
        {/* 콘텐츠 */}
        <main style={{flex:1,overflow:'auto',padding:24,background:C.bg}}>
          {renderPage()}
        </main>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
