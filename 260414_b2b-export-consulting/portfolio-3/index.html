function Tag({color,bg,children}){
  return <span style={{display:'inline-flex',alignItems:'center',padding:'2px 8px',borderRadius:99,fontSize:10,fontWeight:600,color:color||C.tagText,background:bg||C.tag}}>{children}</span>;
}
function PriorityDot({p}){
  const m={high:'#EF4444',mid:'#F59E0B',low:'#6B8C77'};
  return <span style={{display:'inline-block',width:8,height:8,borderRadius:99,background:m[p]||'#ccc',flexShrink:0}}/>;
}
function EmailStatus({s}){
  const m={'발송 완료':{c:'#065F46',b:'#D1FAE5'},'예약 발송':{c:'#1E40AF',b:'#DBEAFE'},'대기 중':{c:'#92400E',b:'#FEF3C7'},'전송 실패':{c:'#7F1D1D',b:'#FEE2E2'}};
  const x=m[s]||{c:C.textSub,b:'#F1F5F9'};
  return <Tag color={x.c} bg={x.b}>{s}</Tag>;
}

// ── CRM 리드 관리 ──────────────────────────────────────────────────────────────
function CrmView({tab,setSelected}){
  const stages=['초기 상담','견적 검토','파트너 선택','계약 협의','계약 완료'];
  if(tab===1){
    return(
      <div style={{display:'flex',gap:12,overflowX:'auto',height:'100%',paddingBottom:8}}>
        {stages.map(stage=>{
          const items=LEADS.filter(l=>l.stage===stage);
          return(
            <div key={stage} style={{minWidth:200,flexShrink:0}}>
              <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:8,padding:'6px 8px',background:C.tag,borderRadius:8}}>
                <span style={{fontSize:11,fontWeight:700,color:C.primary}}>{stage}</span>
                <Tag>{items.length}</Tag>
              </div>
              {items.map(l=>(
                <div key={l.id} onClick={()=>setSelected(l)} style={{background:'#fff',borderRadius:10,padding:12,marginBottom:8,border:`1px solid ${C.border}`,cursor:'pointer',boxShadow:'0 1px 4px rgba(0,0,0,.04)',transition:'all 150ms'}}>
                  <div style={{display:'flex',alignItems:'center',gap:6,marginBottom:6}}>
                    <PriorityDot p={l.priority}/>
                    <span style={{fontSize:12,fontWeight:700,color:C.text}}>{l.company.replace('(주)','')}</span>
                  </div>
                  <div style={{fontSize:10,color:C.textSub,marginBottom:6}}>{l.contact} · {l.lastContact}</div>
                  <div style={{fontSize:12,fontWeight:700,color:C.primary}}>{l.amount}</div>
                  <div style={{fontSize:10,color:C.textSub,marginTop:4}}>담당: {l.assigned}</div>
                </div>
              ))}
            </div>
          );
        })}
      </div>
    );
  }
  if(tab===2){
    const assignees=['김다은','이준혁','박소영'];
    return(
      <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:16}}>
        {assignees.map(a=>{
          const myLeads=LEADS.filter(l=>l.assigned===a);
          const total=myLeads.reduce((s,l)=>s+parseInt(l.amount.replace(/[₩,]/g,'')),0);
          return(
            <div key={a} style={{background:'#fff',borderRadius:14,border:`1px solid ${C.border}`,padding:16}}>
              <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:12}}>
                <div style={{width:36,height:36,borderRadius:99,background:C.tag,display:'flex',alignItems:'center',justifyContent:'center',fontSize:14,fontWeight:700,color:C.primary}}>{a[0]}</div>
                <div><div style={{fontSize:13,fontWeight:700,color:C.text}}>{a}</div><div style={{fontSize:10,color:C.textSub}}>{myLeads.length}건 담당</div></div>
              </div>
              <div style={{fontSize:15,fontWeight:800,color:C.primary,marginBottom:12}}>₩{total.toLocaleString()}</div>
              {myLeads.map(l=>(
                <div key={l.id} style={{display:'flex',justifyContent:'space-between',padding:'6px 0',borderTop:`1px solid ${C.border}`,fontSize:11}}>
                  <span style={{color:C.text}}>{l.company.replace('(주)','')}</span>
                  <Tag>{l.stage}</Tag>
                </div>
              ))}
            </div>
          );
        })}
      </div>
    );
  }
  // 전체 목록 (tab===0)
  return(
    <div style={{display:'flex',gap:16,height:'100%',overflow:'auto'}}>
      <div style={{width:'42%',flexShrink:0,overflow:'auto'}}>
        {LEADS.map(l=>(
          <div key={l.id} onClick={()=>setSelected(l)} style={{background:'#fff',borderRadius:10,padding:'12px 14px',marginBottom:6,border:`1px solid ${C.border}`,cursor:'pointer',display:'flex',alignItems:'center',gap:10,transition:'all 150ms'}}>
            <PriorityDot p={l.priority}/>
            <div style={{flex:1}}>
              <div style={{fontSize:13,fontWeight:700,color:C.text}}>{l.company}</div>
              <div style={{fontSize:10,color:C.textSub}}>{l.contact} · {l.cert}</div>
            </div>
            <div style={{textAlign:'right'}}>
              <div style={{fontSize:12,fontWeight:700,color:C.primary}}>{l.amount}</div>
              <Tag>{l.stage}</Tag>
            </div>
          </div>
        ))}
      </div>
      <div style={{flex:1,background:'#fff',borderRadius:16,border:`1px solid ${C.border}`,padding:20,overflow:'auto'}}>
        <LeadDetail/>
      </div>
    </div>
  );
}

        {TEMPLATES.map(t=>(
          <div key={t} style={{background:'#fff',borderRadius:12,padding:16,border:`1px solid ${C.border}`,cursor:'pointer'}} onClick={()=>setShowModal(true)}>
            <div style={{fontSize:24,marginBottom:8}}>📧</div>
            <div style={{fontSize:13,fontWeight:700,color:C.text,marginBottom:4}}>{t}</div>
            <div style={{fontSize:10,color:C.textSub,marginBottom:10}}>한/영/일 3개 언어 지원</div>
            <div style={{display:'flex',gap:6}}>
              <Tag>한국어</Tag>
              <Tag bg={C.indigoTag} color={C.indigoText}>English</Tag>
              <Tag bg={C.amberTag} color={C.amberText}>日本語</Tag>
            </div>
          </div>
        ))}
        {showModal&&(
          <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,.3)',zIndex:500,display:'flex',alignItems:'center',justifyContent:'center'}} onClick={()=>setShowModal(false)}>
            <div style={{background:'#fff',borderRadius:16,padding:28,width:480,boxShadow:'0 20px 60px rgba(0,0,0,.15)'}} onClick={e=>e.stopPropagation()}>
              <div style={{display:'flex',justifyContent:'space-between',marginBottom:16}}>
                <h3 style={{fontWeight:700,color:C.text}}>템플릿 편집</h3>
                <button onClick={()=>setShowModal(false)} style={{border:'none',background:'none',cursor:'pointer',color:C.textSub,fontSize:16}}>✕</button>
              </div>
              {[['제목','[{{cert_type}} 견적서] {{company}}님의 {{country}} 인증 견적서 발송'],['발신자 이름','EuroCert 컨설팅팀'],['언어','한국어']].map(([k,v])=>(
                <div key={k} style={{marginBottom:12}}>
                  <div style={{fontSize:10,fontWeight:600,color:C.textSub,marginBottom:4}}>{k}</div>
                  <input defaultValue={v} style={{width:'100%',padding:'8px 12px',border:`1.5px solid ${C.border}`,borderRadius:8,fontSize:12,fontFamily:'inherit',outline:'none'}}/>
                </div>
              ))}
              <div style={{marginBottom:16}}>
                <div style={{fontSize:10,fontWeight:600,color:C.textSub,marginBottom:4}}>본문 내용</div>
                <textarea rows={4} defaultValue="안녕하세요, {{contact}}님. 요청하신 {{cert_type}} 인증 견적서를 첨부 파일로 전달드립니다." style={{width:'100%',padding:'8px 12px',border:`1.5px solid ${C.border}`,borderRadius:8,fontSize:12,fontFamily:'inherit',outline:'none',resize:'none'}}/>
              </div>
              <div style={{display:'flex',justifyContent:'flex-end',gap:8}}>
                <button onClick={()=>setShowModal(false)} style={{padding:'8px 16px',border:`1px solid ${C.border}`,borderRadius:8,background:'transparent',color:C.textSub,cursor:'pointer',fontFamily:'inherit',fontWeight:600,fontSize:12}}>취소</button>
                <button onClick={()=>setShowModal(false)} style={{padding:'8px 16px',border:'none',borderRadius:8,background:C.primary,color:'#fff',cursor:'pointer',fontFamily:'inherit',fontWeight:600,fontSize:12}}>저장</button>
              </div>
            </div>
          </div>
        )}
      </div>
    );
  }
  const items=tab===0?EMAIL_QUEUE.filter(e=>e.status!=='발송 완료'):EMAIL_QUEUE;
  return(
    <div style={{display:'flex',gap:16,height:'100%',overflow:'auto'}}>
      <div style={{flex:1,overflow:'auto'}}>
        {items.map(e=>(
          <div key={e.id} onClick={()=>setSelected(e)} style={{background:'#fff',borderRadius:10,padding:'12px 14px',marginBottom:6,border:`1px solid ${C.border}`,cursor:'pointer',display:'flex',alignItems:'center',gap:12}}>
            <span style={{fontSize:18}}>📨</span>
            <div style={{flex:1}}>
              <div style={{fontSize:12,fontWeight:700,color:C.text,marginBottom:2}}>{e.subject}</div>
              <div style={{fontSize:10,color:C.textSub}}>{e.to} · {e.size}</div>
            </div>
            <div style={{textAlign:'right'}}>
              <EmailStatus s={e.status}/>
              <div style={{fontSize:10,color:C.textSub,marginTop:4}}>{e.time}</div>
            </div>
          </div>
        ))}
      </div>
      <div style={{width:'40%',background:'#fff',borderRadius:16,border:`1px solid ${C.border}`,padding:20}}>
        <h4 style={{fontWeight:700,color:C.text,marginBottom:14}}>오늘 발송 현황</h4>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8,marginBottom:16}}>
          {[['발송 완료','2건','#D1FAE5','#065F46'],['예약 발송','1건','#DBEAFE','#1E40AF'],['대기 중','1건','#FEF3C7','#92400E'],['전송 실패','1건','#FEE2E2','#7F1D1D']].map(([k,v,bg,c])=>(
            <div key={k} style={{padding:'10px 12px',background:bg,borderRadius:8}}>
              <div style={{fontSize:18,fontWeight:800,color:c}}>{v}</div>
              <div style={{fontSize:10,color:c}}>{k}</div>
            </div>
          ))}
        </div>
        <div style={{fontSize:11,color:C.textSub,padding:10,background:C.bg,borderRadius:8,lineHeight:1.6}}>
          🔄 Bull Queue(Redis) 기반 비동기 발송 파이프라인<br/>
          재시도 정책: 실패 시 3회 자동 재시도 (지수 백오프)
        </div>
      </div>
    </div>
  );
}

// ── 다국어 지원 뷰 ────────────────────────────────────────────────────────────
function I18nView({tab}){
  if(tab===0){
    return(
      <div>
        <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:16,marginBottom:20}}>
          {LANG_STATS.map(l=>(
            <div key={l.lang} style={{background:'#fff',borderRadius:14,border:`1px solid ${C.border}`,padding:18}}>
              <div style={{display:'flex',justifyContent:'space-between',marginBottom:12}}>
                <span style={{fontSize:14,fontWeight:700,color:C.text}}>{l.lang}</span>
                <Tag color={l.coverage===100?'#065F46':'#92400E'} bg={l.coverage===100?'#D1FAE5':'#FEF3C7'}>{l.coverage}%</Tag>
              </div>
              <div style={{height:6,background:C.border,borderRadius:99,marginBottom:8,overflow:'hidden'}}>
                <div style={{width:`${l.coverage}%`,height:'100%',background:l.coverage===100?C.primary:'#F59E0B',borderRadius:99,transition:'width 500ms'}}/>
              </div>
              <div style={{fontSize:11,color:C.textSub}}>{l.keys.toLocaleString()} / 2,840 키</div>
            </div>
          ))}
        </div>
        <div style={{background:'#fff',borderRadius:16,border:`1px solid ${C.border}`,overflow:'hidden'}}>
          <div style={{padding:'14px 20px',borderBottom:`1px solid ${C.border}`,display:'flex',justifyContent:'space-between',alignItems:'center'}}>
            <h4 style={{fontWeight:700,color:C.text}}>미번역 키 목록</h4>
            <Tag bg={C.amberTag} color={C.amberText}>142개 미완료</Tag>
          </div>
          {[
            {key:'certification.biocide.label',ko:'생물살균제 인증',en:'Biocide Certification',jp:'—'},
            {key:'quote.pdf.legal_notice',ko:'법적 고지 사항',en:'Legal Notice',jp:'—'},
            {key:'admin.partner.tier',ko:'파트너사 등급',en:'—',jp:'—'},
          ].map(k=>(
            <div key={k.key} style={{display:'grid',gridTemplateColumns:'2fr 1fr 1fr 1fr',gap:12,padding:'12px 20px',borderBottom:`1px solid ${C.border}`,alignItems:'center'}}>
              <span style={{fontSize:11,fontFamily:'monospace',color:C.primary}}>{k.key}</span>
              <span style={{fontSize:12,color:C.text}}>{k.ko||'—'}</span>
              <span style={{fontSize:12,color:k.en!=='—'?C.text:C.danger}}>{k.en||'미번역'}</span>
              <span style={{fontSize:12,color:k.jp!=='—'?C.text:C.danger}}>{k.jp||'미번역'}</span>
            </div>
          ))}
        </div>
      </div>
    );
  }
  return(
    <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:16}}>
      {['PDF 견적서 템플릿','이메일 발송 템플릿','웹사이트 UI','관리자 페이지'].map(t=>(
        <div key={t} style={{background:'#fff',borderRadius:14,border:`1px solid ${C.border}`,padding:18}}>
          <div style={{fontSize:13,fontWeight:700,color:C.text,marginBottom:12}}>{t}</div>
          {LANG_STATS.map(l=>(
            <div key={l.lang} style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'6px 0',borderBottom:`1px solid ${C.border}`}}>
              <span style={{fontSize:12,color:C.textSub}}>{l.lang}</span>
              <div style={{display:'flex',alignItems:'center',gap:8}}>
                <div style={{width:60,height:4,background:C.border,borderRadius:99,overflow:'hidden'}}><div style={{width:`${Math.min(l.coverage,100)}%`,height:'100%',background:C.primary,borderRadius:99}}/></div>
                <span style={{fontSize:10,color:l.coverage===100?C.primary:C.warning}}>{l.coverage}%</span>
              </div>
            </div>
          ))}
        </div>
      ))}
    </div>
  );
}

// ── 대시보드 ─────────────────────────────────────────────────────────────────
function Dashboard({onNav}){
  const MONTH=[{m:'10월',리드:12,계약:5},{m:'11월',리드:18,계약:8},{m:'12월',리드:14,계약:6},{m:'1월',리드:22,계약:10},{m:'2월',리드:28,계약:14},{m:'3월',리드:35,계약:18}];
  const PIE=[{name:'EU',value:42,color:C.primary},{name:'북미',value:28,color:C.accent},{name:'아시아',value:22,color:'#F59E0B'},{name:'기타',value:8,color:'#94A3B8'}];
  return(
    <div style={{height:'100%',overflow:'auto'}}>
      <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:14,marginBottom:20}}>
        {[
          {l:'관리 국가',v:'8개국',icon:'🌍',c:C.primary},
          {l:'활성 리드',v:`${LEADS.length}건`,icon:'📋',c:'#7C3AED'},
          {l:'발송 예정',v:'3건',icon:'✉️',c:'#D97706'},
          {l:'번역 완료율',v:'91%',icon:'🔤',c:C.accent},
        ].map(k=>(
          <div key={k.l} style={{background:'#fff',borderRadius:12,padding:'14px 16px',border:`1px solid ${C.border}`,cursor:'pointer'}} onClick={()=>{}}>
            <div style={{fontSize:20,marginBottom:6}}>{k.icon}</div>
            <div style={{fontSize:20,fontWeight:800,color:k.c}}>{k.v}</div>
            <div style={{fontSize:11,color:C.textSub}}>{k.l}</div>
          </div>
        ))}
      </div>
      <div style={{display:'grid',gridTemplateColumns:'1.6fr 1fr',gap:16,marginBottom:16}}>
        <div style={{background:'#fff',borderRadius:14,padding:18,border:`1px solid ${C.border}`}}>
          <h4 style={{fontWeight:700,color:C.text,marginBottom:14,fontSize:13}}>월별 리드/계약 추이</h4>
          <ResponsiveContainer width="100%" height={180}>
            <LineChart data={MONTH}>
              <CartesianGrid strokeDasharray="3 3" stroke={C.border}/>
              <XAxis dataKey="m" tick={{fontSize:10}}/>
              <YAxis tick={{fontSize:10}}/>
              <Tooltip/>
              <Legend/>
              <Line type="monotone" dataKey="리드" stroke={C.primary} strokeWidth={2.5} dot={{r:3}}/>
              <Line type="monotone" dataKey="계약" stroke={C.accent} strokeWidth={2.5} dot={{r:3}}/>
            </LineChart>
          </ResponsiveContainer>
        </div>
        <div style={{background:'#fff',borderRadius:14,padding:18,border:`1px solid ${C.border}`}}>
          <h4 style={{fontWeight:700,color:C.text,marginBottom:14,fontSize:13}}>지역별 견적 분포</h4>
          <ResponsiveContainer width="100%" height={180}>
            <PieChart>
              <Pie data={PIE} cx="50%" cy="50%" outerRadius={65} dataKey="value" label={({name,value})=>`${name} ${value}%`} labelLine={false} fontSize={9}>
                {PIE.map((entry,i)=><Cell key={i} fill={entry.color}/>)}
              </Pie>
              <Tooltip/>
            </PieChart>
          </ResponsiveContainer>
        </div>
      </div>
    </div>
  );
}

// ── 메인 앱 ──────────────────────────────────────────────────────────────────
function App(){
  const [section,setSection]=useState('dashboard');
  const [tab,setTab]=useState(0);
  const [selected,setSelected]=useState(null);

  const allNav=[{id:'dashboard',icon:'🏠',label:'대시보드'},...NAV];

  const renderContent=()=>{
    if(section==='dashboard') return <Dashboard onNav={setSection}/>;
    if(section==='regulation') return <RegulationView tab={tab} setSelected={setSelected}/>;
    if(section==='crm') return <CrmView tab={tab} setSelected={setSelected}/>;
    if(section==='email') return <EmailView tab={tab} setSelected={setSelected}/>;
    if(section==='i18n') return <I18nView tab={tab}/>;
  };

  const currentTabs=SECTION_TABS[section]||[];

  return(
    <div style={{display:'flex',width:'100%',height:'100vh',overflow:'hidden'}}>
      {/* 밝은 사이드바 */}
      <nav style={{width:240,background:'#fff',borderRight:`1px solid ${C.border}`,display:'flex',flexDirection:'column',paddingTop:0,flexShrink:0}}>
        <div style={{padding:'18px 16px 12px',borderBottom:`1px solid ${C.border}`,display:'flex',alignItems:'center',gap:10}}>
          <div style={{width:34,height:34,borderRadius:9,background:`linear-gradient(135deg,${C.primary},${C.accent})`,display:'flex',alignItems:'center',justifyContent:'center',fontSize:16}}>🌍</div>
          <div>
            <div style={{fontSize:13,fontWeight:800,color:C.text}}>GlobalCert Hub</div>
            <div style={{fontSize:9,color:C.textSub}}>글로벌 B2B 컨설팅</div>
          </div>
        </div>
        <div style={{flex:1,display:'flex',flexDirection:'column',gap:1,padding:'10px 8px',overflowY:'auto'}}>
          {allNav.map(item=>{
            const active=section===item.id;
            return(
              <button key={item.id} onClick={()=>{setSection(item.id);setTab(0);setSelected(null);}} style={{
                display:'flex',alignItems:'center',gap:10,padding:'9px 12px',borderRadius:8,border:'none',
                cursor:'pointer',fontFamily:'inherit',fontSize:12,fontWeight:600,textAlign:'left',
                background:active?C.tag:'transparent',color:active?C.primary:C.textSub,
                borderLeft:`3px solid ${active?C.primary:'transparent'}`,transition:'all 150ms',
              }}>
                <span style={{fontSize:15}}>{item.icon}</span>
                {item.label}
              </button>
            );
          })}
        </div>
        <div style={{padding:'12px 14px',borderTop:`1px solid ${C.border}`,display:'flex',alignItems:'center',gap:10}}>
          <div style={{width:30,height:30,borderRadius:99,background:C.tag,display:'flex',alignItems:'center',justifyContent:'center',fontSize:12,fontWeight:700,color:C.primary}}>김</div>
          <div>
            <div style={{fontSize:11,fontWeight:700,color:C.text}}>김관리자</div>
            <div style={{fontSize:9,color:C.textSub}}>admin@globalcert.kr</div>
          </div>
        </div>
      </nav>

      {/* 메인 */}
      <div style={{flex:1,display:'flex',flexDirection:'column',overflow:'hidden'}}>
        {/* 앱바 */}
        <header style={{height:40,borderBottom:`1px solid ${C.border}`,display:'flex',alignItems:'center',padding:'0 16px',gap:8,background:'#fff',flexShrink:0}}>
          <span style={{fontSize:11,color:C.textSub}}>GlobalCert Hub</span>
          <span style={{fontSize:11,color:C.border}}>›</span>
          <span style={{fontSize:11,color:C.text,fontWeight:600}}>{allNav.find(n=>n.id===section)?.label}</span>
          <div style={{flex:1}}/>
          <div style={{display:'flex',alignItems:'center',gap:6,padding:'4px 10px',background:C.bg,borderRadius:6,border:`1px solid ${C.border}`}}>
            <span style={{fontSize:10,color:C.textSub}}>🔍</span>
            <input placeholder="검색..." style={{border:'none',background:'transparent',fontSize:11,outline:'none',width:100,fontFamily:'inherit',color:C.text}}/>
          </div>
          <div style={{width:26,height:26,borderRadius:99,background:`linear-gradient(135deg,${C.primary},${C.accent})`,display:'flex',alignItems:'center',justifyContent:'center',fontSize:11,color:'#fff',fontWeight:700,cursor:'pointer'}}>김</div>
        </header>

        {/* 인라인 탭 */}
        {currentTabs.length>0&&(
          <div style={{height:38,borderBottom:`1px solid ${C.border}`,display:'flex',alignItems:'flex-end',padding:'0 16px',background:'#fff',flexShrink:0}}>
            {currentTabs.map((t,i)=>(
              <button key={t} onClick={()=>setTab(i)} style={{
                padding:'0 14px 8px',border:'none',background:'transparent',cursor:'pointer',fontFamily:'inherit',
                fontSize:12,fontWeight:600,color:tab===i?C.primary:C.textSub,
                borderBottom:`2px solid ${tab===i?C.primary:'transparent'}`,marginBottom:-1,transition:'all 150ms',
              }}>{t}</button>
            ))}
          </div>
        )}

        {/* 워크스페이스 */}
        <main style={{flex:1,overflow:'auto',padding:'18px 20px',background:C.bg}}>
          <div style={{animation:'fadeIn 250ms ease'}}>
            {renderContent()}
          </div>
        </main>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
