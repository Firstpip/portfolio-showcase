*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

.brand-name { font-size: 15px; font-weight: 800; color: var(--text); letter-spacing: -0.3px; }

.nav-divider { width: 1px; height: 24px; background: var(--border); }
.nav-links { display: flex; align-items: center; gap: 2px; }
.nav-link {
  padding: 7px 14px; border-radius: 8px; cursor: pointer;
  font-size: 13px; font-weight: 500; color: var(--text-sub); transition: all 0.15s;

.nav-link:hover { background: var(--bg); color: var(--text); }
.nav-link.active { background: #E0F2FE; color: var(--primary); font-weight: 600; }
.topnav-right { display: flex; align-items: center; gap: 10px; }
.live-badge {

  background: #F0FDF4; border: 1px solid #86EFAC; border-radius: 20px;

.live-dot { width: 6px; height: 6px; background: #22C55E; border-radius: 50%; animation: pulse 1.5s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
.topnav-avatar {
  width: 32px; height: 32px; border-radius: 50%;

  display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 700; color: #fff;
}
/* Hero strip */
.hero-strip {
  background: linear-gradient(135deg, #0C4A6E 0%, #0369A1 100%);
  padding: 24px 32px; display: grid; grid-template-columns: repeat(5, 1fr); gap: 1px;
}
.hero-kpi { padding: 8px 24px; border-right: 1px solid rgba(255,255,255,0.12); }
.hero-kpi:last-child { border-right: none; }
.hero-label { font-size: 10.5px; font-weight: 600; color: rgba(255,255,255,0.55); letter-spacing: 0.8px; text-transform: uppercase; margin-bottom: 6px; }
.hero-value { font-size: 28px; font-weight: 800; color: #fff; letter-spacing: -0.5px; }
.hero-unit { font-size: 12px; font-weight: 600; color: rgba(255,255,255,0.6); margin-left: 3px; }
.hero-delta { display: flex; align-items: center; gap: 4px; margin-top: 5px; font-size: 11.5px; font-weight: 600; }
.delta-up { color: #86EFAC; }
.delta-down { color: #FCA5A5; }
.delta-neutral { color: rgba(255,255,255,0.5); }
/* Content */
.content { padding: 24px 32px; }
.page { display: none; }
.page.active { display: block; }
/* Grid */
.grid-two { display: grid; grid-template-columns: 2fr 1fr; gap: 16px; margin-bottom: 20px; }
.grid-equal { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 20px; }
.grid-three { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; margin-bottom: 20px; }
/* Card */
.card {
  background: var(--surface); border-radius: 10px; padding: 22px 24px;
  border: 1px solid var(--border-light); box-shadow: 0 1px 4px rgba(14,165,233,0.05);

.card-header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 18px; }
.card-title { font-size: 13.5px; font-weight: 700; color: var(--text); }
.card-sub { font-size: 11px; color: var(--text-sub); margin-top: 2px; }
.chip {

.tbl th:last-child, .tbl td:last-child { text-align: right; }
.tbl td { padding: 10px; border-bottom: 1px solid var(--border-light); color: var(--text); }
.tbl tr:last-child td { border-bottom: none; }
.tbl tr:hover td { background: var(--bg); }
.badge { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 10px; font-weight: 700; }
.badge-green { background: #DCFCE7; color: #15803D; }
.badge-yellow { background: #FEF9C3; color: #854D0E; }
.badge-red { background: #FEE2E2; color: #B91C1C; }
.badge-blue { background: #DBEAFE; color: #1D4ED8; }
.badge-gray { background: #F1F5F9; color: #475569; }

.progress-row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
.progress-label { width: 80px; font-size: 12px; color: var(--text-sub); flex-shrink: 0; }
.progress-track { flex: 1; height: 7px; background: var(--border-light); border-radius: 4px; overflow: hidden; }
.progress-fill { height: 100%; border-radius: 4px; }
.progress-pct { width: 38px; text-align: right; font-size: 12px; font-weight: 700; color: var(--text); }

.alert-item { display: flex; align-items: center; gap: 12px; padding: 12px 0; border-bottom: 1px solid var(--border-light); }
.alert-item:last-child { border-bottom: none; }
.alert-icon { width: 34px; height: 34px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 16px; flex-shrink: 0; }
.alert-info .alert-icon { background: #DBEAFE; }
.alert-warn .alert-icon { background: #FEF9C3; }

.alert-time { margin-left: auto; font-size: 10.5px; color: var(--text-sub); flex-shrink: 0; }
/* Tabs */
.tab-row { display: flex; gap: 4px; margin-bottom: 16px; }
.tab-btn {

  cursor: pointer; transition: all 0.15s; background: var(--bg); color: var(--text-sub); border: 1.5px solid var(--border-light);

.tab-btn.active { background: var(--primary); color: #fff; border-color: var(--primary); font-weight: 600; }
/* Custom tooltip */
.ct { background: #0C4A6E; color: #fff; padding: 8px 12px; border-radius: 8px; font-size: 12px; }
.ct .cl { font-weight: 700; margin-bottom: 4px; }
/* Gauge center */
.gauge-wrap { position: relative; }
.gauge-center {

.gauge-val { font-size: 30px; font-weight: 800; color: var(--text); }
.gauge-lbl { font-size: 11px; color: var(--text-sub); margin-top: 1px; }
