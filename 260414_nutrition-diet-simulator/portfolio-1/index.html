<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>뉴트리핏(NutriFit) — 맞춤 구현 데모</title>
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" rel="stylesheet" />
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://unpkg.com/prop-types/prop-types.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/recharts@2.15.0/umd/Recharts.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 100%; height: 100%; font-family: 'Pretendard', sans-serif; }
  #root { display: flex; width: 100%; height: 100vh; overflow: hidden; }
  ::-webkit-scrollbar { width: 6px; } ::-webkit-scrollbar-track { background: transparent; } ::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 3px; }
  input[type=range] { -webkit-appearance: none; appearance: none; height: 6px; border-radius: 3px; outline: none; cursor: pointer; }
  input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; appearance: none; width: 18px; height: 18px; border-radius: 50%; background: #E8613C; cursor: pointer; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useMemo, useCallback, useEffect } = React;
const { BarChart, Bar, RadialBarChart, RadialBar, PieChart, Pie, Cell, XAxis, YAxis, CartesianGrid, Tooltip, ResponsiveContainer, Legend } = Recharts;

const C = {
  primary: '#E8613C', primaryLight: '#FBEEE8', primaryDark: '#C44A28',
  secondary: '#2D6A4F', secondaryLight: '#E8F3EE',
  accent: '#F4A261', accentLight: '#FEF3E2',
  bg: '#FDF6F0', surface: '#FFFFFF', border: '#F0E4DA',
  text: '#1C1917', textSub: '#78716C', textMuted: '#A8A29E',
  sidebar: '#1C1917', sidebarActive: '#E8613C', sidebarText: '#D6D3D1',
  success: '#22C55E', warning: '#F59E0B', info: '#3B82F6',
  danger: '#EF4444',
};

// 더미 식품 데이터
const FOODS = [
  { id: 1, name: '닭가슴살', category: '육류', per100g: { cal: 165, carb: 0, protein: 31, fat: 3.6, sugar: 0, sodium: 74 } },
  { id: 2, name: '현미밥', category: '곡류', per100g: { cal: 353, carb: 77, protein: 7.4, fat: 2.9, sugar: 0.7, sodium: 2 } },
  { id: 3, name: '브로콜리', category: '채소', per100g: { cal: 34, carb: 6.6, protein: 2.8, fat: 0.4, sugar: 1.7, sodium: 33 } },
  { id: 4, name: '고구마', category: '채소', per100g: { cal: 86, carb: 20, protein: 1.6, fat: 0.1, sugar: 4.2, sodium: 55 } },
  { id: 5, name: '달걀', category: '난류', per100g: { cal: 155, carb: 1.1, protein: 13, fat: 11, sugar: 1.1, sodium: 124 } },
  { id: 6, name: '아보카도', category: '과일', per100g: { cal: 160, carb: 8.5, protein: 2, fat: 14.7, sugar: 0.7, sodium: 7 } },
  { id: 7, name: '연어', category: '어류', per100g: { cal: 208, carb: 0, protein: 20, fat: 13, sugar: 0, sodium: 59 } },
  { id: 8, name: '두부', category: '두류', per100g: { cal: 76, carb: 1.9, protein: 8.1, fat: 4.2, sugar: 0.3, sodium: 7 } },
  { id: 9, name: '바나나', category: '과일', per100g: { cal: 89, carb: 23, protein: 1.1, fat: 0.3, sugar: 12, sodium: 1 } },
  { id: 10, name: '그릭 요거트', category: '유제품', per100g: { cal: 59, carb: 3.6, protein: 10, fat: 0.4, sugar: 3.2, sodium: 36 } },
  { id: 11, name: '오트밀', category: '곡류', per100g: { cal: 389, carb: 66, protein: 17, fat: 7, sugar: 1.1, sodium: 2 } },
  { id: 12, name: '아몬드', category: '견과', per100g: { cal: 579, carb: 22, protein: 21, fat: 50, sugar: 4.4, sodium: 1 } },
  { id: 13, name: '고등어', category: '어류', per100g: { cal: 205, carb: 0, protein: 19, fat: 13, sugar: 0, sodium: 90 } },
  { id: 14, name: '사과', category: '과일', per100g: { cal: 52, carb: 14, protein: 0.3, fat: 0.2, sugar: 10, sodium: 1 } },
  { id: 15, name: '시금치', category: '채소', per100g: { cal: 23, carb: 3.6, protein: 2.9, fat: 0.4, sugar: 0.4, sodium: 79 } },
];

const NUTRIENT_LABELS = [
  { key: 'cal', label: '칼로리', unit: 'kcal', color: C.primary, dailyRef: 2000 },
  { key: 'carb', label: '탄수화물', unit: 'g', color: '#F59E0B', dailyRef: 324 },
  { key: 'protein', label: '단백질', unit: 'g', color: '#3B82F6', dailyRef: 55 },
  { key: 'fat', label: '지방', unit: 'g', color: '#8B5CF6', dailyRef: 54 },
  { key: 'sugar', label: '당류', unit: 'g', color: '#EC4899', dailyRef: 100 },
  { key: 'sodium', label: '나트륨', unit: 'mg', color: '#F97316', dailyRef: 2000 },
];

const ACTIVITY_LEVELS = [
  { value: 1.2, label: '거의 없음', desc: '좌식 생활' },
  { value: 1.375, label: '가벼운 활동', desc: '주 1-3회 운동' },
  { value: 1.55, label: '보통 활동', desc: '주 3-5회 운동' },
  { value: 1.725, label: '활발한 활동', desc: '주 6-7회 운동' },
  { value: 1.9, label: '매우 활발', desc: '하루 2회 운동' },
];

const NAV_ITEMS = [
  { id: '식품 검색', icon: '🔍', label: '식품 검색' },
  { id: '영양 시뮬레이터', icon: '📊', label: '영양 시뮬레이터' },
  { id: 'TDEE 계산기', icon: '⚡', label: 'TDEE 계산기' },
  { id: '식단 저장·공유', icon: '💾', label: '식단 저장·공유' },
];

// === 공통 컴포넌트 ===
function Badge({ children, color = C.primary }) {
  return (
    <span style={{ display:'inline-block', padding:'2px 8px', borderRadius:12, fontSize:11, fontWeight:600, background: color + '20', color }}>
      {children}
    </span>
  );
}

function Toast({ msg, onClose }) {
  useEffect(() => { const t = setTimeout(onClose, 2500); return () => clearTimeout(t); }, []);
  return (
    <div style={{
      position:'fixed', bottom:24, right:24, background: C.secondary, color:'#fff',
      padding:'12px 20px', borderRadius:10, fontSize:14, fontWeight:500,
      boxShadow:'0 4px 16px rgba(0,0,0,0.2)', zIndex:9999, display:'flex', gap:8, alignItems:'center'
    }}>
      <span>✓</span> {msg}
    </div>
  );
}

function Modal({ title, onClose, children, width = 520 }) {
  return (
    <div style={{ position:'fixed', inset:0, background:'rgba(0,0,0,0.45)', zIndex:1000, display:'flex', alignItems:'center', justifyContent:'center' }}
      onClick={e => e.target === e.currentTarget && onClose()}>
      <div style={{ background: C.surface, borderRadius:16, width, maxWidth:'92vw', maxHeight:'85vh', overflow:'auto', boxShadow:'0 20px 60px rgba(0,0,0,0.25)' }}>
        <div style={{ padding:'20px 24px', borderBottom:`1px solid ${C.border}`, display:'flex', justifyContent:'space-between', alignItems:'center' }}>
          <span style={{ fontWeight:700, fontSize:16, color: C.text }}>{title}</span>
          <button onClick={onClose} style={{ background:'none', border:'none', fontSize:20, cursor:'pointer', color: C.textMuted }}>×</button>
        </div>
        <div style={{ padding:24 }}>{children}</div>
      </div>
    </div>
  );
}

function ProgressBar({ label, value, max, unit, color, compact }) {
  const pct = Math.min((value / max) * 100, 100);
  const over = (value / max) * 100 > 100;
  return (
    <div style={{ marginBottom: compact ? 10 : 14 }}>
      <div style={{ display:'flex', justifyContent:'space-between', marginBottom:5, fontSize:13 }}>
        <span style={{ fontWeight:500, color: C.text }}>{label}</span>
        <span style={{ color: over ? C.danger : C.textSub }}>
          {value.toFixed(1)}{unit} / {max}{unit} ({Math.round((value/max)*100)}%)
        </span>
      </div>
      <div style={{ height:8, background: C.border, borderRadius:4, overflow:'hidden' }}>
        <div style={{
          height:'100%', width:`${pct}%`, background: over ? C.danger : color,
          borderRadius:4, transition:'width 0.3s ease'
        }} />
      </div>
    </div>
  );
}

// === 페이지: 식품 검색 ===
function FoodSearchPage({ addToMeal }) {
  const [query, setQuery] = useState('');
  const [selected, setSelected] = useState(null);
  const [weight, setWeight] = useState(100);
  const [modal, setModal] = useState(null);

  const results = useMemo(() => {
    if (!query.trim()) return FOODS.slice(0, 8);
    const q = query.toLowerCase();
    return FOODS.filter(f => f.name.includes(q) || f.category.includes(q));
  }, [query]);

  const calc = useMemo(() => {
    if (!selected) return null;
    const ratio = weight / 100;
    return {
      cal: +(selected.per100g.cal * ratio).toFixed(1),
      carb: +(selected.per100g.carb * ratio).toFixed(1),
      protein: +(selected.per100g.protein * ratio).toFixed(1),
      fat: +(selected.per100g.fat * ratio).toFixed(1),
      sugar: +(selected.per100g.sugar * ratio).toFixed(1),
      sodium: +(selected.per100g.sodium * ratio).toFixed(1),
    };
  }, [selected, weight]);

  const chartData = calc ? [
    { name: '탄수화물', value: calc.carb, color: '#F59E0B' },
    { name: '단백질', value: calc.protein, color: '#3B82F6' },
    { name: '지방', value: calc.fat, color: '#8B5CF6' },
  ] : [];

  return (
    <div style={{ display:'flex', gap:24, height:'100%' }}>
      {/* 검색 패널 */}
      <div style={{ flex:1, display:'flex', flexDirection:'column', gap:16 }}>
        <div style={{ background: C.surface, borderRadius:14, padding:20, boxShadow:'0 2px 10px rgba(0,0,0,0.06)' }}>
          <div style={{ position:'relative' }}>
            <span style={{ position:'absolute', left:14, top:'50%', transform:'translateY(-50%)', fontSize:18 }}>🔍</span>
            <input
              value={query} onChange={e => setQuery(e.target.value)}
              placeholder="식품명 또는 카테고리로 검색 (초성 검색 지원)"
              style={{
                width:'100%', padding:'12px 14px 12px 44px', border:`1.5px solid ${C.border}`,
                borderRadius:10, fontSize:14, outline:'none', color: C.text,
                transition:'border-color 0.2s'
              }}
              onFocus={e => e.target.style.borderColor = C.primary}
              onBlur={e => e.target.style.borderColor = C.border}
            />
          </div>
          <div style={{ display:'flex', gap:8, marginTop:12, flexWrap:'wrap' }}>
            {['육류', '채소', '과일', '곡류', '어류', '유제품'].map(cat => (
              <button key={cat} onClick={() => setQuery(cat)} style={{
                padding:'5px 12px', borderRadius:20, fontSize:12, fontWeight:500, cursor:'pointer',
                background: query === cat ? C.primary : C.bg, color: query === cat ? '#fff' : C.textSub,
                border:`1px solid ${query === cat ? C.primary : C.border}`, transition:'all 0.2s'
              }}>{cat}</button>
            ))}
          </div>
        </div>

        <div style={{ background: C.surface, borderRadius:14, padding:20, boxShadow:'0 2px 10px rgba(0,0,0,0.06)', flex:1, overflow:'auto' }}>
          <div style={{ fontSize:12, color: C.textMuted, marginBottom:12 }}>검색 결과 {results.length}개 · 식약처/농진청 데이터 기반</div>
          <div style={{ display:'grid', gridTemplateColumns:'repeat(auto-fill, minmax(200px, 1fr))', gap:10 }}>
            {results.map(f => (
              <div key={f.id} onClick={() => { setSelected(f); setWeight(100); }}
                style={{
                  padding:14, borderRadius:10, border:`1.5px solid ${selected?.id === f.id ? C.primary : C.border}`,
                  cursor:'pointer', background: selected?.id === f.id ? C.primaryLight : C.surface,
                  transition:'all 0.2s'
                }}>
                <div style={{ fontWeight:600, fontSize:14, color: C.text, marginBottom:4 }}>{f.name}</div>
                <Badge color={C.secondary}>{f.category}</Badge>
                <div style={{ marginTop:8, fontSize:12, color: C.textSub }}>
                  {f.per100g.cal} kcal · 단백질 {f.per100g.protein}g
                </div>
              </div>
            ))}
          </div>
        </div>
      </div>

      {/* 영양 정보 패널 */}
      <div style={{ width:320, display:'flex', flexDirection:'column', gap:16 }}>
        {selected ? (
          <>
            <div style={{ background: C.surface, borderRadius:14, padding:20, boxShadow:'0 2px 10px rgba(0,0,0,0.06)' }}>
              <div style={{ fontWeight:700, fontSize:16, color: C.text, marginBottom:4 }}>{selected.name}</div>
              <Badge color={C.secondary}>{selected.category}</Badge>
              <div style={{ marginTop:16, marginBottom:8 }}>
                <div style={{ fontSize:12, color: C.textSub, marginBottom:6 }}>섭취량 조절 (10g 단위)</div>
                <div style={{ display:'flex', alignItems:'center', gap:10 }}>
                  <button onClick={() => setWeight(Math.max(10, weight - 10))} style={{
                    width:32, height:32, borderRadius:8, border:'none', background: C.bg, fontSize:18, cursor:'pointer'
                  }}>−</button>
                  <input type="range" min={10} max={500} step={10} value={weight}
                    onChange={e => setWeight(+e.target.value)}
                    style={{ flex:1, accentColor: C.primary }} />
                  <button onClick={() => setWeight(Math.min(500, weight + 10))} style={{
                    width:32, height:32, borderRadius:8, border:'none', background: C.bg, fontSize:18, cursor:'pointer'
                  }}>＋</button>
                </div>
                <div style={{ textAlign:'center', fontWeight:700, fontSize:20, color: C.primary, marginTop:6 }}>{weight}g</div>
              </div>

              {calc && (
                <div style={{ background: C.bg, borderRadius:10, padding:14, marginTop:12 }}>
                  <div style={{ fontSize:22, fontWeight:800, color: C.primary, textAlign:'center', marginBottom:10 }}>
                    {calc.cal} kcal
                  </div>
                  <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr 1fr', gap:8, textAlign:'center' }}>
                    {[['탄수화물', calc.carb, 'g', '#F59E0B'], ['단백질', calc.protein, 'g', '#3B82F6'], ['지방', calc.fat, 'g', '#8B5CF6']].map(([n, v, u, c]) => (
                      <div key={n}>
                        <div style={{ fontSize:11, color: C.textMuted }}>{n}</div>
                        <div style={{ fontWeight:700, fontSize:16, color: c }}>{v}{u}</div>
                      </div>
                    ))}
                  </div>
                </div>
              )}
            </div>

            {calc && (
              <div style={{ background: C.surface, borderRadius:14, padding:16, boxShadow:'0 2px 10px rgba(0,0,0,0.06)' }}>
                <div style={{ fontSize:12, color: C.textSub, marginBottom:10, fontWeight:600 }}>탄·단·지 비율</div>
                <ResponsiveContainer width="100%" height={130}>
                  <PieChart>
                    <Pie data={chartData} dataKey="value" cx="50%" cy="50%" outerRadius={55} innerRadius={30}>
                      {chartData.map((d, i) => <Cell key={i} fill={d.color} />)}
                    </Pie>
                    <Tooltip formatter={(v, n) => [`${v}g`, n]} />
                  </PieChart>
                </ResponsiveContainer>
                <div style={{ display:'flex', justifyContent:'center', gap:12 }}>
                  {chartData.map(d => (
                    <div key={d.name} style={{ display:'flex', alignItems:'center', gap:4, fontSize:11 }}>
                      <div style={{ width:8, height:8, borderRadius:'50%', background:d.color }} />
                      <span style={{ color: C.textSub }}>{d.name}</span>
                    </div>
                  ))}
                </div>
              </div>
            )}

            <button onClick={() => { addToMeal({ food: selected, weight, nutrients: calc }); setModal('added'); }}
              style={{
                padding:'12px 0', borderRadius:10, border:'none', background: C.primary, color:'#fff',
                fontSize:14, fontWeight:700, cursor:'pointer', transition:'background 0.2s'
              }}>
              + 식단에 추가
            </button>
          </>
        ) : (
          <div style={{
            background: C.surface, borderRadius:14, padding:40, boxShadow:'0 2px 10px rgba(0,0,0,0.06)',
            textAlign:'center', color: C.textMuted
          }}>
            <div style={{ fontSize:40, marginBottom:12 }}>🥗</div>
            <div style={{ fontSize:14 }}>식품을 선택하면<br />영양정보가 표시됩니다</div>
          </div>
        )}
      </div>

      {modal === 'added' && <Toast msg={`${selected?.name} ${weight}g 식단에 추가됨`} onClose={() => setModal(null)} />}
    </div>
  );
}

// === 페이지: 영양 시뮬레이터 ===
function SimulatorPage({ meal, updateMealWeight, removeMeal, tdeeGoals }) {
  const [detailOpen, setDetailOpen] = useState(false);
  const [selected, setSelected] = useState(null);

  const totals = useMemo(() => {
    return meal.reduce((acc, item) => {
      Object.keys(item.nutrients).forEach(k => { acc[k] = (acc[k] || 0) + item.nutrients[k]; });
      return acc;
    }, {});
  }, [meal]);

  const goals = tdeeGoals || { cal: 2000, carb: 250, protein: 130, fat: 65, sugar: 50, sodium: 2000 };

  return (
    <div style={{ display:'flex', gap:24, height:'100%' }}>
      <div style={{ flex:1, display:'flex', flexDirection:'column', gap:16, overflow:'auto' }}>
        <div style={{ background: C.surface, borderRadius:14, padding:20, boxShadow:'0 2px 10px rgba(0,0,0,0.06)' }}>
          <div style={{ fontWeight:700, fontSize:15, color: C.text, marginBottom:14 }}>오늘의 식단 ({meal.length}개)</div>
          {meal.length === 0 ? (
            <div style={{ textAlign:'center', padding:'32px 0', color: C.textMuted, fontSize:14 }}>
              <div style={{ fontSize:36, marginBottom:8 }}>🍽️</div>
              식품 검색에서 추가해보세요
            </div>
          ) : (
            meal.map((item, idx) => (
              <div key={idx} onClick={() => setSelected(item)} style={{
                display:'flex', alignItems:'center', gap:12, padding:'12px 0',
                borderBottom: idx < meal.length - 1 ? `1px solid ${C.border}` : 'none',
                cursor:'pointer'
              }}>
                <div style={{
                  width:42, height:42, borderRadius:10, background: C.bg,
                  display:'flex', alignItems:'center', justifyContent:'center', fontSize:22, flexShrink:0
                }}>🥗</div>
                <div style={{ flex:1 }}>
                  <div style={{ fontWeight:600, fontSize:14, color: C.text }}>{item.food.name}</div>
                  <div style={{ fontSize:12, color: C.textSub }}>{item.nutrients.cal} kcal · 단백질 {item.nutrients.protein}g</div>
                </div>
                <div style={{ display:'flex', alignItems:'center', gap:8 }}>
                  <button onClick={e => { e.stopPropagation(); updateMealWeight(idx, Math.max(10, item.weight - 10)); }} style={{
                    width:28, height:28, borderRadius:6, border:`1px solid ${C.border}`, background: C.bg, cursor:'pointer', fontSize:16
                  }}>−</button>
                  <span style={{ fontWeight:700, fontSize:14, color: C.primary, minWidth:50, textAlign:'center' }}>{item.weight}g</span>
                  <button onClick={e => { e.stopPropagation(); updateMealWeight(idx, Math.min(500, item.weight + 10)); }} style={{
                    width:28, height:28, borderRadius:6, border:`1px solid ${C.border}`, background: C.bg, cursor:'pointer', fontSize:16
                  }}>＋</button>
                  <button onClick={e => { e.stopPropagation(); removeMeal(idx); }} style={{
                    width:28, height:28, borderRadius:6, border:'none', background:'#FEE2E2', color: C.danger, cursor:'pointer', fontSize:14
                  }}>✕</button>
                </div>
              </div>
            ))
          )}
        </div>
      </div>

      <div style={{ width:340, display:'flex', flexDirection:'column', gap:16, overflow:'auto' }}>
        <div style={{ background: C.surface, borderRadius:14, padding:20, boxShadow:'0 2px 10px rgba(0,0,0,0.06)' }}>
          <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:14 }}>
            <span style={{ fontWeight:700, fontSize:15, color: C.text }}>영양소 섭취 현황</span>
            {tdeeGoals && <Badge color={C.secondary}>정밀 모드</Badge>}
          </div>
          {NUTRIENT_LABELS.map(n => (
            <ProgressBar key={n.key} label={n.label} value={totals[n.key] || 0}
              max={n.key === 'cal' ? goals.cal : n.key === 'carb' ? goals.carb : n.key === 'protein' ? goals.protein : n.key === 'fat' ? goals.fat : n.key === 'sugar' ? goals.sugar : goals.sodium}
              unit={n.unit} color={n.color} />
          ))}
          <button onClick={() => setDetailOpen(true)} style={{
            width:'100%', marginTop:8, padding:'9px 0', borderRadius:8, border:`1px solid ${C.primary}`,
            background:'transparent', color: C.primary, fontSize:13, fontWeight:600, cursor:'pointer'
          }}>상세 영양소 보기 ↓</button>
        </div>

        <div style={{ background: C.surface, borderRadius:14, padding:20, boxShadow:'0 2px 10px rgba(0,0,0,0.06)' }}>
          <div style={{ fontWeight:700, fontSize:15, color: C.text, marginBottom:12 }}>총 칼로리</div>
          <div style={{ fontSize:38, fontWeight:900, color: C.primary, textAlign:'center' }}>
            {(totals.cal || 0).toFixed(0)}<span style={{ fontSize:16, color: C.textSub }}>kcal</span>
          </div>

// === 페이지: TDEE 계산기 ===
function TdeePage({ onSetGoals }) {
  const [gender, setGender] = useState('male');
  const [age, setAge] = useState(28);
  const [height, setHeight] = useState(175);
  const [weight, setWeight] = useState(70);
  const [activity, setActivity] = useState(1.55);
  const [result, setResult] = useState(null);

  const calculate = () => {
    const bmr = gender === 'male'
      ? 10 * weight + 6.25 * height - 5 * age + 5
      : 10 * weight + 6.25 * height - 5 * age - 161;
    const tdee = Math.round(bmr * activity);
    const goals = {
      cal: tdee, carb: Math.round((tdee * 0.5) / 4),
      protein: Math.round((tdee * 0.25) / 4), fat: Math.round((tdee * 0.25) / 9),
      sugar: 50, sodium: 2000,
    };
    setResult({ bmr: Math.round(bmr), tdee, goals });
  };

  return (
    <div style={{ display:'flex', gap:24, height:'100%' }}>
      <div style={{ flex:1, display:'flex', flexDirection:'column', gap:16, overflow:'auto' }}>
        <div style={{ background: C.surface, borderRadius:14, padding:24, boxShadow:'0 2px 10px rgba(0,0,0,0.06)' }}>
          <div style={{ fontWeight:700, fontSize:15, color: C.text, marginBottom:18 }}>신체 정보 입력 (Mifflin-St Jeor 공식)</div>

          <div style={{ marginBottom:18 }}>
            <div style={{ fontSize:13, color: C.textSub, marginBottom:8, fontWeight:500 }}>성별</div>
            <div style={{ display:'flex', gap:10 }}>
              {[['male', '남성 ♂'], ['female', '여성 ♀']].map(([v, l]) => (
                <button key={v} onClick={() => setGender(v)} style={{
                  flex:1, padding:'10px 0', borderRadius:10, border:`1.5px solid ${gender === v ? C.primary : C.border}`,
                  background: gender === v ? C.primaryLight : C.surface, color: gender === v ? C.primary : C.textSub,
                  fontWeight:600, fontSize:14, cursor:'pointer', transition:'all 0.2s'
                }}>{l}</button>
              ))}
            </div>
          </div>

          {[
            ['나이', age, v => setAge(+v), 15, 80, '세'],
            ['키', height, v => setHeight(+v), 140, 220, 'cm'],
            ['체중', weight, v => setWeight(+v), 30, 200, 'kg'],
          ].map(([label, val, setter, min, max, unit]) => (
            <div key={label} style={{ marginBottom:16 }}>
              <div style={{ display:'flex', justifyContent:'space-between', fontSize:13, marginBottom:6 }}>
                <span style={{ color: C.textSub, fontWeight:500 }}>{label}</span>
                <span style={{ fontWeight:700, color: C.primary }}>{val} {unit}</span>
              </div>
              <input type="range" min={min} max={max} value={val}
                onChange={e => setter(e.target.value)} style={{ width:'100%', accentColor: C.primary }} />
            </div>
          ))}

          <div style={{ marginBottom:20 }}>
            <div style={{ fontSize:13, color: C.textSub, marginBottom:8, fontWeight:500 }}>활동량</div>
            {ACTIVITY_LEVELS.map(a => (
              <button key={a.value} onClick={() => setActivity(a.value)} style={{
                display:'flex', width:'100%', alignItems:'center', justifyContent:'space-between',
                padding:'10px 14px', borderRadius:8, border:`1px solid ${activity === a.value ? C.primary : C.border}`,
                background: activity === a.value ? C.primaryLight : C.surface, cursor:'pointer',
                marginBottom:6, transition:'all 0.2s'
              }}>
                <span style={{ fontWeight:500, fontSize:13, color: C.text }}>{a.label}</span>
                <span style={{ fontSize:12, color: C.textSub }}>{a.desc}</span>
              </button>
            ))}
          </div>

          <button onClick={calculate} style={{

      <div style={{ width:340, display:'flex', flexDirection:'column', gap:16, overflow:'auto' }}>

              <div style={{ textAlign:'center', padding:'20px 0', background:`linear-gradient(135deg, ${C.primary}, ${C.accent})`, borderRadius:12, color:'#fff', marginBottom:16 }}>

// === 페이지: 식단 저장·공유 ===
function SharePage({ meal }) {
  const [history, setHistory] = useState([
    { id: 1, name: '다이어트 식단 A', date: '2026-04-13', items: ['닭가슴살 200g', '브로콜리 150g', '현미밥 80g'], cal: 423 },
    { id: 2, name: '근육 증량 식단', date: '2026-04-12', items: ['연어 150g', '달걀 2개', '오트밀 100g', '아보카도 50g'], cal: 812 },
    { id: 3, name: '클린 이팅 기본', date: '2026-04-11', items: ['두부 200g', '시금치 100g', '고구마 150g'], cal: 347 },
  ]);
  const [modal, setModal] = useState(null);
  const [saveName, setSaveName] = useState('');
  const [toast, setToast] = useState(null);
  const [selected, setSelected] = useState(null);

  const currentCal = meal.reduce((s, i) => s + (i.nutrients.cal || 0), 0);

  const saveMeal = () => {
    if (!saveName.trim()) return;
    const newEntry = {
      id: Date.now(), name: saveName, date: new Date().toISOString().slice(0, 10),
      items: meal.map(i => `${i.food.name} ${i.weight}g`), cal: Math.round(currentCal),
    };
    setHistory([newEntry, ...history]);
    setSaveName('');
    setModal(null);
    setToast('식단이 저장되었습니다');
  };

  const shareUrl = (entry) => {
    const encoded = btoa(encodeURIComponent(JSON.stringify(entry.items)));
    return `https://nutrifit.kr/share?d=${encoded.slice(0, 32)}...`;
  };

  return (
    <div style={{ display:'flex', gap:24, height:'100%' }}>
      <div style={{ flex:1, display:'flex', flexDirection:'column', gap:16, overflow:'auto' }}>
        <div style={{ background: C.surface, borderRadius:14, padding:20, boxShadow:'0 2px 10px rgba(0,0,0,0.06)' }}>
          <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:14 }}>
            <span style={{ fontWeight:700, fontSize:15, color: C.text }}>저장된 식단 ({history.length}개)</span>
            <button onClick={() => setModal('save')} style={{
              padding:'8px 16px', borderRadius:8, border:'none', background: C.primary, color:'#fff',
              fontSize:13, fontWeight:600, cursor:'pointer'
            }}>현재 식단 저장</button>
          </div>
          {history.map((entry) => (
            <div key={entry.id} onClick={() => setSelected(entry)} style={{
              padding:16, borderRadius:10, border:`1px solid ${C.border}`, marginBottom:10, cursor:'pointer',
              transition:'all 0.2s', background: selected?.id === entry.id ? C.primaryLight : C.surface
            }}>
              <div style={{ display:'flex', justifyContent:'space-between', alignItems:'flex-start' }}>
                <div>
                  <div style={{ fontWeight:600, fontSize:14, color: C.text, marginBottom:4 }}>{entry.name}</div>
                  <div style={{ fontSize:12, color: C.textMuted }}>{entry.date}</div>
                </div>
                <div style={{ fontWeight:800, fontSize:18, color: C.primary }}>{entry.cal} kcal</div>
              </div>
              <div style={{ display:'flex', gap:6, flexWrap:'wrap', marginTop:8 }}>
                {entry.items.slice(0, 3).map((item, i) => (
                  <Badge key={i} color={C.secondary}>{item}</Badge>
                ))}
                {entry.items.length > 3 && <Badge color={C.textMuted}>+{entry.items.length - 3}</Badge>}
              </div>
            </div>
          ))}
        </div>
      </div>

      <div style={{ width:320, display:'flex', flexDirection:'column', gap:16 }}>
        {selected ? (
          <div style={{ background: C.surface, borderRadius:14, padding:20, boxShadow:'0 2px 10px rgba(0,0,0,0.06)' }}>
            <div style={{ fontWeight:700, fontSize:15, color: C.text, marginBottom:12 }}>{selected.name}</div>
            <div style={{ fontSize:12, color: C.textMuted, marginBottom:12 }}>{selected.date}</div>
            <div style={{ fontSize:32, fontWeight:900, color: C.primary, marginBottom:12 }}>{selected.cal} kcal</div>
            <div style={{ marginBottom:16 }}>
              {selected.items.map((item, i) => (
                <div key={i} style={{
                  padding:'8px 0', borderBottom:`1px solid ${C.border}`, fontSize:13, color: C.text
                }}>🥗 {item}</div>
              ))}
            </div>
            <div style={{ background: C.bg, borderRadius:10, padding:12, marginBottom:12 }}>
              <div style={{ fontSize:11, color: C.textMuted, marginBottom:6, fontWeight:600 }}>공유 URL (URL 압축 인코딩)</div>
              <div style={{ fontSize:11, color: C.primary, wordBreak:'break-all', lineHeight:1.5 }}>
                {shareUrl(selected)}
              </div>
            </div>
            <button onClick={() => { setToast('공유 링크가 클립보드에 복사되었습니다'); }}
              style={{
                width:'100%', padding:'10px 0', borderRadius:8, border:'none',
                background: C.primary, color:'#fff', fontSize:13, fontWeight:600, cursor:'pointer'
              }}>링크 복사</button>
          </div>
        ) : (
          <div style={{
            background: C.surface, borderRadius:14, padding:40, boxShadow:'0 2px 10px rgba(0,0,0,0.06)',
            textAlign:'center', color: C.textMuted
          }}>
            <div style={{ fontSize:40, marginBottom:12 }}>💾</div>
            <div style={{ fontSize:14, lineHeight:1.6 }}>식단을 선택하면<br />공유 URL이 생성됩니다</div>
          </div>
        )}

        <div style={{ background: C.surface, borderRadius:14, padding:16, boxShadow:'0 2px 10px rgba(0,0,0,0.06)' }}>
          <div style={{ fontWeight:600, fontSize:13, color: C.text, marginBottom:8 }}>현재 식단</div>
          <div style={{ fontSize:12, color: C.textSub }}>
            {meal.length === 0 ? '추가된 식품 없음' : `${meal.length}개 식품 · ${Math.round(currentCal)} kcal`}
          </div>
        </div>
      </div>

      {modal === 'save' && (
        <Modal title="현재 식단 저장" onClose={() => setModal(null)} width={400}>
          <div>
            <div style={{ fontSize:13, color: C.textSub, marginBottom:8 }}>식단 이름</div>
            <input value={saveName} onChange={e => setSaveName(e.target.value)}
              placeholder="예: 월요일 다이어트 식단"
              style={{
                width:'100%', padding:'10px 12px', border:`1px solid ${C.border}`, borderRadius:8,
                fontSize:14, outline:'none', color: C.text, marginBottom:16
              }} />
            <div style={{ fontSize:12, color: C.textMuted, marginBottom:16 }}>
              현재 {meal.length}개 식품 · {Math.round(currentCal)} kcal
            </div>
            <button onClick={saveMeal} style={{
              width:'100%', padding:'11px 0', borderRadius:8, border:'none',
              background: C.primary, color:'#fff', fontSize:14, fontWeight:700, cursor:'pointer'
            }}>저장하기</button>
          </div>
        </Modal>
      )}

      {toast && <Toast msg={toast} onClose={() => setToast(null)} />}
    </div>
  );
}

    setMeal(prev => {
      const existing = prev.findIndex(m => m.food.id === item.food.id);
      if (existing >= 0) {
        const next = [...prev];
        next[existing] = item;
        return next;
      }
      return [...prev, item];
    });
  }, []);

  const updateMealWeight = useCallback((idx, newWeight) => {
    setMeal(prev => {
      const next = [...prev];
      const item = next[idx];
      const ratio = newWeight / 100;
      next[idx] = {
        ...item, weight: newWeight,
        nutrients: Object.fromEntries(
          Object.keys(item.food.per100g).map(k => [k, +(item.food.per100g[k] * ratio).toFixed(1)])
        )
      };
      return next;
    });
  }, []);

          <div style={{ flex:1 }}>
            <h1 style={{ fontSize:16, fontWeight:700, color: C.text }}>{pageTitle[page]}</h1>
            <div style={{ fontSize:11, color: C.textMuted }}>식약처/농진청 공공데이터 기반 · No-DB MVP</div>
          </div>
          <div style={{ display:'flex', gap:10, alignItems:'center' }}>
            {meal.length > 0 && (
              <div style={{ background: C.primaryLight, borderRadius:20, padding:'5px 12px', fontSize:12, color: C.primary, fontWeight:600 }}>
                🍽️ {meal.length}개 · {Math.round(mealCalTotal)} kcal
              </div>
            )}
            <div style={{
              width:32, height:32, borderRadius:'50%', background:`linear-gradient(135deg, ${C.primary}, ${C.accent})`,
              display:'flex', alignItems:'center', justifyContent:'center', color:'#fff', fontSize:14, fontWeight:700
            }}>N</div>
          </div>
        </header>

        {/* 컨텐츠 */}
        <main style={{ flex:1, padding:24, overflow:'auto' }}>
          {page === '식품 검색' && <FoodSearchPage addToMeal={addToMeal} />}
          {page === '영양 시뮬레이터' && <SimulatorPage meal={meal} updateMealWeight={updateMealWeight} removeMeal={removeMeal} tdeeGoals={tdeeGoals} />}
          {page === 'TDEE 계산기' && <TdeePage onSetGoals={(g) => { setTdeeGoals(g); setToast('영양 목표가 시뮬레이터에 적용되었습니다'); setPage('영양 시뮬레이터'); }} />}
          {page === '식단 저장·공유' && <SharePage meal={meal} />}
        </main>
      </div>

      {toast && <Toast msg={toast} onClose={() => setToast(null)} />}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
