<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>바디로그(BodyLog) 운동 영양 트래커 — 구현 데모</title>
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" rel="stylesheet" />
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://unpkg.com/prop-types/prop-types.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/recharts@2.15.0/umd/Recharts.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 100%; height: 100%; font-family: 'Pretendard', sans-serif; background: #0F0F1A; color: #F0F0FF; }
  #root { display: flex; flex-direction: column; width: 100%; min-height: 100vh; }
  ::-webkit-scrollbar { width: 6px; } ::-webkit-scrollbar-track { background: rgba(255,255,255,0.05); } ::-webkit-scrollbar-thumb { background: #3A3A5C; border-radius: 3px; }
  input[type=range] { -webkit-appearance: none; appearance: none; height: 5px; border-radius:3px; outline: none; cursor: pointer; background: rgba(255,255,255,0.1); }
  input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; appearance: none; width: 16px; height: 16px; border-radius: 50%; background: #6C3FE8; cursor: pointer; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useMemo, useCallback, useEffect } = React;
const { ComposedChart, BarChart, Bar, LineChart, Line, RadialBarChart, RadialBar, PieChart, Pie, Cell, XAxis, YAxis, CartesianGrid, Tooltip, ResponsiveContainer, Legend } = Recharts;

const C = {
  primary: '#6C3FE8', primaryLight: 'rgba(108,63,232,0.2)',
  accent: '#00D4AA', accentLight: 'rgba(0,212,170,0.15)',
  bg: '#0F0F1A', surface: '#1E1E30', surfaceHover: '#252540',
  border: 'rgba(255,255,255,0.08)', borderHover: 'rgba(255,255,255,0.16)',
  text: '#F0F0FF', textSub: '#9CA3C0', textMuted: '#6B7280',
  navBg: '#141422', warning: '#F59E0B', danger: '#EF4444', success: '#10B981',
};

const TABS = [
  { id: '운동 로그', icon: '💪', label: '운동 로그' },
  { id: '영양 섭취 기록', icon: '🥗', label: '영양 섭취 기록' },
  { id: '주간 대시보드', icon: '📈', label: '주간 대시보드' },
  { id: '목표 설정', icon: '🎯', label: '목표 설정' },
];

const EXERCISES = [
  { name: '벤치프레스', muscle: '가슴' }, { name: '스쿼트', muscle: '하체' },
  { name: '데드리프트', muscle: '등' }, { name: '풀업', muscle: '등/이두' },
  { name: '숄더프레스', muscle: '어깨' }, { name: '바벨로우', muscle: '등' },
  { name: '렉익스텐션', muscle: '하체' }, { name: '케이블 컬', muscle: '이두' },
];

const FOODS_P2 = [
  { id: 1, name: '닭가슴살', cal: 165, protein: 31, carb: 0, fat: 3.6 },
  { id: 2, name: '현미밥', cal: 353, protein: 7.4, carb: 77, fat: 2.9 },
  { id: 3, name: '달걀', cal: 155, protein: 13, carb: 1.1, fat: 11 },
  { id: 4, name: '오트밀', cal: 389, protein: 17, carb: 66, fat: 7 },
  { id: 5, name: '연어', cal: 208, protein: 20, carb: 0, fat: 13 },
  { id: 6, name: '두부', cal: 76, protein: 8.1, carb: 1.9, fat: 4.2 },
  { id: 7, name: '그릭 요거트', cal: 59, protein: 10, carb: 3.6, fat: 0.4 },
  { id: 8, name: '아몬드', cal: 579, protein: 21, carb: 22, fat: 50 },
];

const WEEKLY_DATA = [
  { day: '월', volume: 12400, cal: 1820, calGoal: 2200 },
  { day: '화', volume: 0, cal: 1650, calGoal: 2200 },
  { day: '수', volume: 15200, cal: 2100, calGoal: 2200 },
  { day: '목', volume: 9800, cal: 1950, calGoal: 2200 },
  { day: '금', volume: 18600, cal: 2350, calGoal: 2200 },
  { day: '토', volume: 21000, cal: 2600, calGoal: 2200 },
  { day: '일', volume: 0, cal: 1780, calGoal: 2200 },
];

const LOG_DATA = [
  { id: 1, exercise: '벤치프레스', sets: [{ reps: 8, weight: 85 }, { reps: 8, weight: 85 }, { reps: 6, weight: 90 }] },
  { id: 2, exercise: '인클라인 덤벨프레스', sets: [{ reps: 10, weight: 30 }, { reps: 10, weight: 30 }, { reps: 8, weight: 32 }] },
  { id: 3, exercise: '풀업', sets: [{ reps: 12, weight: 0 }, { reps: 10, weight: 0 }, { reps: 8, weight: 0 }] },
];

const epley1RM = (weight, reps) => reps === 1 ? weight : +(weight * (1 + reps / 30)).toFixed(1);

// === 공통 컴포넌트 ===
function Modal({ title, onClose, children, width = 500 }) {
  return (
    <div style={{ position:'fixed', inset:0, background:'rgba(0,0,0,0.65)', zIndex:1000, display:'flex', alignItems:'center', justifyContent:'center' }}
      onClick={e => e.target === e.currentTarget && onClose()}>
      <div style={{ background: C.surface, borderRadius:16, width, maxWidth:'92vw', maxHeight:'85vh', overflow:'auto', border:`1px solid ${C.border}`, boxShadow:'0 24px 80px rgba(0,0,0,0.5)' }}>
        <div style={{ padding:'18px 24px', borderBottom:`1px solid ${C.border}`, display:'flex', justifyContent:'space-between', alignItems:'center' }}>
          <span style={{ fontWeight:700, fontSize:16 }}>{title}</span>
          <button onClick={onClose} style={{ background:'none', border:'none', fontSize:20, cursor:'pointer', color: C.textMuted }}>×</button>
        </div>
        <div style={{ padding:24 }}>{children}</div>
      </div>
    </div>
  );
}

function Drawer({ item, onClose }) {
  if (!item) return null;
  return (
    <>
      <div style={{ position:'fixed', inset:0, background:'rgba(0,0,0,0.4)', zIndex:900 }} onClick={onClose} />
      <div style={{
        position:'fixed', top:0, right:0, bottom:0, width:400, background: C.surface,
        borderLeft:`1px solid ${C.border}`, zIndex:901, padding:24, overflow:'auto',
        boxShadow:'-10px 0 40px rgba(0,0,0,0.3)'
      }}>
        <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:20 }}>
          <span style={{ fontWeight:700, fontSize:16 }}>{item.exercise}</span>
          <button onClick={onClose} style={{ background:'none', border:'none', fontSize:20, cursor:'pointer', color: C.textMuted }}>×</button>
        </div>
        <div style={{ marginBottom:16 }}>
          <span style={{ background: C.primaryLight, color: C.primary, borderRadius:20, padding:'4px 12px', fontSize:12, fontWeight:600 }}>
            {item.sets.length}세트
          </span>
        </div>
        {item.sets.map((s, i) => (
          <div key={i} style={{
            padding:14, borderRadius:10, border:`1px solid ${C.border}`,
            marginBottom:8, display:'flex', justifyContent:'space-between', alignItems:'center'
          }}>
            <span style={{ color: C.textSub, fontSize:13 }}>{i + 1}세트</span>
            <span style={{ fontWeight:700 }}>{s.weight > 0 ? `${s.weight}kg × ${s.reps}회` : `${s.reps}회 (자체중량)`}</span>
            <div style={{ textAlign:'right' }}>
              <div style={{ fontSize:11, color: C.textMuted }}>예상 1RM</div>
              <div style={{ fontWeight:700, color: C.accent, fontSize:16 }}>{epley1RM(s.weight, s.reps)}kg</div>
            </div>
          </div>
        ))}
        <div style={{ marginTop:16, padding:14, borderRadius:10, background:'rgba(0,212,170,0.1)', border:`1px solid rgba(0,212,170,0.2)` }}>
          <div style={{ fontSize:12, color: C.textMuted, marginBottom:4 }}>최고 1RM (Epley 공식)</div>
          <div style={{ fontSize:28, fontWeight:900, color: C.accent }}>
            {Math.max(...item.sets.map(s => epley1RM(s.weight || 0, s.reps)))}kg
          </div>
        </div>
        <div style={{ marginTop:16, display:'flex', gap:10 }}>
          <button style={{ flex:1, padding:'10px 0', borderRadius:8, border:`1px solid ${C.primary}`, background:'transparent', color: C.primary, fontSize:13, fontWeight:600, cursor:'pointer' }}>수정</button>
          <button onClick={onClose} style={{ flex:1, padding:'10px 0', borderRadius:8, border:'none', background: C.primary, color:'#fff', fontSize:13, fontWeight:600, cursor:'pointer' }}>닫기</button>
        </div>
      </div>
    </>
  );
}

function Toast({ msg, onClose }) {
  useEffect(() => { const t = setTimeout(onClose, 2500); return () => clearTimeout(t); }, []);
  return (
    <div style={{
      position:'fixed', bottom:24, right:24, background: C.accent, color:'#0F0F1A',
      padding:'12px 20px', borderRadius:10, fontSize:14, fontWeight:700,
      boxShadow:'0 4px 20px rgba(0,212,170,0.4)', zIndex:9999
    }}>✓ {msg}</div>
  );
}

function StatCard({ label, value, unit, sub, color = C.primary, icon }) {
  return (
    <div style={{
      background: C.surface, borderRadius:14, padding:'18px 20px',
      border:`1px solid ${C.border}`, flex:1,
    }}>
      <div style={{ display:'flex', justifyContent:'space-between', alignItems:'flex-start' }}>
        <div>
          <div style={{ fontSize:12, color: C.textSub, marginBottom:6 }}>{label}</div>
          <div style={{ fontSize:28, fontWeight:900, color }}>{value}<span style={{ fontSize:14, color: C.textMuted, marginLeft:4 }}>{unit}</span></div>
          {sub && <div style={{ fontSize:11, color: C.textMuted, marginTop:4 }}>{sub}</div>}
        </div>
        <div style={{ fontSize:28 }}>{icon}</div>
      </div>
    </div>
  );
}

// 히어로 배너
function HeroBanner({ tab }) {
  const meta = {
    '운동 로그': { title: '운동 로그', sub: '오늘의 운동을 기록하세요', kpis: [{ label: '오늘 세트', val: '12세트' }, { label: '총 볼륨', val: '15,200kg' }, { label: '최고 1RM', val: '95kg' }], gradient: `linear-gradient(135deg, #6C3FE8, #9B6EF8)` },
    '영양 섭취 기록': { title: '영양 섭취 기록', sub: '끼니별 영양소를 기록하세요', kpis: [{ label: '오늘 칼로리', val: '1,850 kcal' }, { label: '단백질', val: '142g' }, { label: '탄수화물', val: '195g' }], gradient: `linear-gradient(135deg, #00D4AA, #00A882)` },
    '주간 대시보드': { title: '주간 대시보드', sub: '7일간 운동·영양 추이를 확인하세요', kpis: [{ label: '주간 운동일', val: '5일' }, { label: '평균 칼로리', val: '2,035 kcal' }, { label: 'TDEE 달성률', val: '92%' }], gradient: `linear-gradient(135deg, #3B82F6, #6C3FE8)` },
    '목표 설정': { title: '목표 설정', sub: '일일 칼로리·영양소 목표를 설정하세요', kpis: [{ label: '칼로리 목표', val: '2,200 kcal' }, { label: '단백질 목표', val: '160g' }, { label: '달성률', val: '84%' }], gradient: `linear-gradient(135deg, #F59E0B, #EF4444)` },
  };
  const m = meta[tab] || meta['운동 로그'];
  return (
    <div style={{ background: m.gradient, padding:'24px 32px', color:'#fff' }}>
      <h1 style={{ fontSize:22, fontWeight:800, marginBottom:4 }}>{m.title}</h1>
      <div style={{ fontSize:13, opacity:0.8, marginBottom:16 }}>{m.sub}</div>
      <div style={{ display:'flex', gap:32 }}>
        {m.kpis.map(k => (
          <div key={k.label}>
            <div style={{ fontSize:11, opacity:0.75 }}>{k.label}</div>
            <div style={{ fontSize:20, fontWeight:800, marginTop:2 }}>{k.val}</div>
          </div>
        ))}
      </div>
    </div>
  );
}

// === 탭: 운동 로그 ===
function WorkoutLogTab() {
  const [logs, setLogs] = useState(LOG_DATA);
  const [drawer, setDrawer] = useState(null);
  const [modal, setModal] = useState(null);
  const [form, setForm] = useState({ exercise: '', weight: 80, reps: 10 });
  const [toast, setToast] = useState(null);

  const addLog = () => {
    if (!form.exercise) return;
    setLogs(prev => [...prev, {
      id: Date.now(), exercise: form.exercise,
      sets: [{ reps: form.reps, weight: form.weight }]
    }]);
    setModal(null);
    setToast('운동 기록이 추가되었습니다');
  };

  return (
    <div>
      <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:20 }}>
        <div style={{ fontSize:13, color: C.textSub }}>{new Date().toLocaleDateString('ko-KR', { month:'long', day:'numeric', weekday:'long' })}</div>
        <button onClick={() => setModal('add')} style={{
          padding:'9px 18px', borderRadius:8, border:'none', background: C.primary, color:'#fff',
          fontSize:13, fontWeight:700, cursor:'pointer'
        }}>+ 운동 추가</button>
      </div>

      <div style={{ display:'grid', gridTemplateColumns:'repeat(auto-fill, minmax(280px, 1fr))', gap:14 }}>
        {logs.map(log => (
          <div key={log.id} onClick={() => setDrawer(log)} style={{
            background: C.surface, borderRadius:14, padding:18, border:`1px solid ${C.border}`,
            cursor:'pointer', transition:'all 0.2s'
          }}
            onMouseEnter={e => { e.currentTarget.style.borderColor = C.primary; e.currentTarget.style.background = C.surfaceHover; }}
            onMouseLeave={e => { e.currentTarget.style.borderColor = C.border; e.currentTarget.style.background = C.surface; }}>
            <div style={{ display:'flex', justifyContent:'space-between', marginBottom:10 }}>
              <div style={{ fontWeight:700, fontSize:15 }}>{log.exercise}</div>
              <span style={{ background: C.primaryLight, color: C.primary, borderRadius:6, padding:'2px 8px', fontSize:11, fontWeight:600 }}>{log.sets.length}세트</span>
            </div>
            <div style={{ display:'flex', gap:12 }}>
              {log.sets.slice(0, 3).map((s, i) => (
                <div key={i} style={{ fontSize:12, color: C.textSub }}>
                  {i + 1}: {s.weight > 0 ? `${s.weight}kg×${s.reps}` : `${s.reps}회`}
                </div>
              ))}
            </div>
            <div style={{ marginTop:12, padding:'8px 10px', borderRadius:8, background:'rgba(0,212,170,0.1)', display:'flex', justifyContent:'space-between' }}>
              <span style={{ fontSize:11, color: C.textMuted }}>최고 1RM</span>
              <span style={{ fontSize:14, fontWeight:800, color: C.accent }}>
                {Math.max(...log.sets.map(s => epley1RM(s.weight || 0, s.reps)))}kg
              </span>
            </div>
          </div>
        ))}
      </div>

      {modal === 'add' && (
        <Modal title="운동 추가" onClose={() => setModal(null)}>
          <div>
            <div style={{ marginBottom:16 }}>
              <div style={{ fontSize:13, color: C.textSub, marginBottom:6 }}>운동 종목</div>
              <select value={form.exercise} onChange={e => setForm(f => ({ ...f, exercise: e.target.value }))}
                style={{ width:'100%', padding:'10px 12px', borderRadius:8, border:`1px solid ${C.border}`, background: C.surface, color: C.text, fontSize:14, outline:'none' }}>
                <option value="">선택하세요</option>
                {EXERCISES.map(e => <option key={e.name} value={e.name}>{e.name} ({e.muscle})</option>)}
              </select>
            </div>
            <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:12, marginBottom:16 }}>
              {[['중량 (kg)', form.weight, v => setForm(f => ({ ...f, weight: +v })), 0, 200],
                ['반복 횟수', form.reps, v => setForm(f => ({ ...f, reps: +v })), 1, 50]].map(([label, val, setter, min, max]) => (
                <div key={label}>
                  <div style={{ fontSize:13, color: C.textSub, marginBottom:6 }}>{label}</div>
                  <input type="number" min={min} max={max} value={val} onChange={e => setter(e.target.value)}
                    style={{ width:'100%', padding:'10px 12px', borderRadius:8, border:`1px solid ${C.border}`, background: C.surface, color: C.text, fontSize:14, outline:'none' }} />
                </div>
              ))}
            </div>
            {form.exercise && form.reps > 0 && (
              <div style={{ padding:12, borderRadius:8, background:'rgba(0,212,170,0.1)', marginBottom:16, textAlign:'center' }}>
                <span style={{ fontSize:12, color: C.textMuted }}>예상 1RM: </span>
                <span style={{ fontWeight:800, fontSize:18, color: C.accent }}>{epley1RM(form.weight, form.reps)}kg</span>
              </div>
            )}
            <button onClick={addLog} style={{
              width:'100%', padding:'11px 0', borderRadius:8, border:'none',
              background: C.primary, color:'#fff', fontSize:14, fontWeight:700, cursor:'pointer'
            }}>추가하기</button>
          </div>
        </Modal>
      )}

      <Drawer item={drawer} onClose={() => setDrawer(null)} />
      {toast && <Toast msg={toast} onClose={() => setToast(null)} />}
    </div>
  );
}

// === 탭: 영양 섭취 기록 ===
function NutritionTab() {
  const [meal, setMeal] = useState('아침');
  const [records, setRecords] = useState({
    '아침': [{ food: FOODS_P2[3], weight: 80 }, { food: FOODS_P2[6], weight: 200 }],
    '점심': [{ food: FOODS_P2[0], weight: 200 }, { food: FOODS_P2[1], weight: 150 }],
    '저녁': [{ food: FOODS_P2[4], weight: 150 }],
    '간식': [],
  });
  const [drawer, setDrawer] = useState(null);
  const [modal, setModal] = useState(null);
  const [addFood, setAddFood] = useState(null);
  const [addWeight, setAddWeight] = useState(100);
  const [toast, setToast] = useState(null);

  const totals = useMemo(() => {
    return Object.values(records).flat().reduce((acc, r) => {
      const ratio = r.weight / 100;
      acc.cal += r.food.cal * ratio;
      acc.protein += r.food.protein * ratio;
      acc.carb += r.food.carb * ratio;
      acc.fat += r.food.fat * ratio;
      return acc;
    }, { cal: 0, protein: 0, carb: 0, fat: 0 });
  }, [records]);

  const mealTotals = useMemo(() => {
    return records[meal].reduce((acc, r) => {
      const ratio = r.weight / 100;
      acc.cal += r.food.cal * ratio;
      acc.protein += r.food.protein * ratio;
      return acc;
    }, { cal: 0, protein: 0 });
  }, [records, meal]);

  const pieData = [
    { name: '탄수화물', value: Math.round(totals.carb), color: '#F59E0B' },
    { name: '단백질', value: Math.round(totals.protein), color: '#6C3FE8' },
    { name: '지방', value: Math.round(totals.fat), color: '#EC4899' },
  ];

  const addRecord = () => {
    if (!addFood) return;
    setRecords(prev => ({
      ...prev,
      [meal]: [...prev[meal], { food: addFood, weight: addWeight }]
    }));
    setModal(null);
    setAddFood(null);
    setAddWeight(100);
    setToast(`${addFood.name} ${addWeight}g 추가됨`);
  };

  return (
    <div style={{ display:'flex', gap:24 }}>
      <div style={{ flex:1 }}>
        <div style={{ display:'flex', gap:8, marginBottom:16 }}>
          {['아침', '점심', '저녁', '간식'].map(m => (
            <button key={m} onClick={() => setMeal(m)} style={{
              padding:'8px 18px', borderRadius:20, border:'none', cursor:'pointer', fontWeight:600, fontSize:13, transition:'all 0.2s',
              background: meal === m ? C.primary : C.surface, color: meal === m ? '#fff' : C.textSub,
            }}>{m}</button>
          ))}
          <button onClick={() => setModal('add')} style={{
            marginLeft:'auto', padding:'8px 16px', borderRadius:20, border:'none',
            background: C.accent, color:'#0F0F1A', fontWeight:700, fontSize:13, cursor:'pointer'
          }}>+ 추가</button>
        </div>

        <div style={{ background: C.surface, borderRadius:14, border:`1px solid ${C.border}`, overflow:'hidden' }}>
          <div style={{ padding:'12px 16px', borderBottom:`1px solid ${C.border}`, display:'flex', justifyContent:'space-between', alignItems:'center' }}>
            <span style={{ fontWeight:600, fontSize:14 }}>{meal}</span>
            <span style={{ fontSize:13, color: C.textSub }}>{Math.round(mealTotals.cal)} kcal · 단백질 {Math.round(mealTotals.protein)}g</span>
          </div>
          {records[meal].length === 0 ? (
            <div style={{ textAlign:'center', padding:'40px 0', color: C.textMuted, fontSize:14 }}>
              <div style={{ fontSize:32, marginBottom:8 }}>🍽️</div>
              추가된 식품 없음
            </div>
          ) : (
            records[meal].map((r, idx) => (
              <div key={idx} onClick={() => setDrawer({ ...r, mealType: meal, idx })} style={{
                display:'flex', alignItems:'center', gap:14, padding:'14px 16px',
                borderBottom: idx < records[meal].length - 1 ? `1px solid ${C.border}` : 'none',
                cursor:'pointer', transition:'background 0.15s'
              }}
                onMouseEnter={e => e.currentTarget.style.background = C.surfaceHover}
                onMouseLeave={e => e.currentTarget.style.background = 'transparent'}>
                <div style={{ width:40, height:40, borderRadius:10, background:'rgba(255,255,255,0.05)', display:'flex', alignItems:'center', justifyContent:'center', fontSize:20 }}>🥗</div>
                <div style={{ flex:1 }}>
                  <div style={{ fontWeight:600, fontSize:14 }}>{r.food.name}</div>
                  <div style={{ fontSize:12, color: C.textSub }}>{r.weight}g · {Math.round(r.food.cal * r.weight / 100)} kcal</div>
                </div>
                <div style={{ textAlign:'right' }}>
                  <div style={{ fontSize:13, fontWeight:700, color: C.primary }}>{Math.round(r.food.protein * r.weight / 100)}g</div>
                  <div style={{ fontSize:11, color: C.textMuted }}>단백질</div>
                </div>
              </div>
            ))
          )}
        </div>
      </div>

      <div style={{ width:280 }}>
        <div style={{ background: C.surface, borderRadius:14, padding:18, border:`1px solid ${C.border}`, marginBottom:14 }}>
          <div style={{ fontWeight:700, fontSize:14, marginBottom:12 }}>오늘 합계</div>
          <div style={{ fontSize:32, fontWeight:900, color: C.accent, marginBottom:8 }}>{Math.round(totals.cal)}<span style={{ fontSize:13, color: C.textMuted }}>kcal</span></div>
          <ResponsiveContainer width="100%" height={120}>
            <PieChart>
              <Pie data={pieData} dataKey="value" cx="50%" cy="50%" outerRadius={50} innerRadius={28}>
                {pieData.map((d, i) => <Cell key={i} fill={d.color} />)}
              </Pie>
              <Tooltip formatter={(v, n) => [`${v}g`, n]} contentStyle={{ background: C.surface, border:`1px solid ${C.border}`, color: C.text }} />
            </PieChart>
          </ResponsiveContainer>
          <div style={{ display:'flex', justifyContent:'center', gap:14, marginTop:4 }}>
            {pieData.map(d => (
              <div key={d.name} style={{ textAlign:'center' }}>
                <div style={{ width:8, height:8, borderRadius:'50%', background:d.color, margin:'0 auto 3px' }} />
                <div style={{ fontSize:10, color: C.textMuted }}>{d.name}</div>
                <div style={{ fontSize:14, fontWeight:700, color: d.color }}>{d.value}g</div>
              </div>
            ))}
          </div>
        </div>
      </div>

      {modal === 'add' && (
        <Modal title={`${meal} 식품 추가`} onClose={() => setModal(null)} width={420}>
          <div>
            <div style={{ marginBottom:14 }}>
              <div style={{ fontSize:13, color: C.textSub, marginBottom:6 }}>식품 선택</div>
              <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:8 }}>
                {FOODS_P2.map(f => (
                  <button key={f.id} onClick={() => setAddFood(f)} style={{
                    padding:'10px 12px', borderRadius:8, border:`1px solid ${addFood?.id === f.id ? C.primary : C.border}`,
                    background: addFood?.id === f.id ? C.primaryLight : C.surface, cursor:'pointer', textAlign:'left', transition:'all 0.15s'
                  }}>
                    <div style={{ fontWeight:600, fontSize:13, color: C.text }}>{f.name}</div>
                    <div style={{ fontSize:11, color: C.textMuted }}>100g당 {f.cal}kcal</div>
                  </button>
                ))}
              </div>
            </div>
            <div style={{ marginBottom:16 }}>
              <div style={{ display:'flex', justifyContent:'space-between', fontSize:13, marginBottom:6 }}>
                <span style={{ color: C.textSub }}>중량</span>
                <span style={{ fontWeight:700, color: C.primary }}>{addWeight}g</span>
              </div>
              <input type="range" min={10} max={500} step={10} value={addWeight} onChange={e => setAddWeight(+e.target.value)} style={{ width:'100%' }} />
              {addFood && (
                <div style={{ marginTop:8, textAlign:'center', color: C.accent, fontWeight:700 }}>
                  {Math.round(addFood.cal * addWeight / 100)} kcal · 단백질 {Math.round(addFood.protein * addWeight / 100)}g
                </div>
              )}
            </div>
            <button onClick={addRecord} disabled={!addFood} style={{
              width:'100%', padding:'11px 0', borderRadius:8, border:'none',
              background: addFood ? C.primary : C.border, color:'#fff', fontSize:14, fontWeight:700, cursor: addFood ? 'pointer' : 'default'
            }}>추가하기</button>
          </div>
        </Modal>
      )}

      {drawer && (
        <Modal title={`${drawer.food.name} 상세`} onClose={() => setDrawer(null)}>
          <div>
            <div style={{ display:'flex', gap:10, marginBottom:16 }}>
              <span style={{ background: C.primaryLight, color: C.primary, borderRadius:20, padding:'4px 12px', fontSize:12, fontWeight:600 }}>{drawer.mealType}</span>
              <span style={{ background: C.accentLight, color: C.accent, borderRadius:20, padding:'4px 12px', fontSize:12, fontWeight:600 }}>{drawer.weight}g</span>
            </div>
            <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:12 }}>
              {[['칼로리', Math.round(drawer.food.cal * drawer.weight / 100), 'kcal', C.primary],
                ['단백질', Math.round(drawer.food.protein * drawer.weight / 100), 'g', '#6C3FE8'],
                ['탄수화물', Math.round(drawer.food.carb * drawer.weight / 100), 'g', '#F59E0B'],
                ['지방', Math.round(drawer.food.fat * drawer.weight / 100), 'g', '#EC4899']].map(([n, v, u, c]) => (
                <div key={n} style={{ background:'rgba(255,255,255,0.04)', borderRadius:10, padding:14, textAlign:'center' }}>
                  <div style={{ fontSize:12, color: C.textMuted, marginBottom:4 }}>{n}</div>
                  <div style={{ fontSize:24, fontWeight:800, color: c }}>{v}<span style={{ fontSize:12 }}>{u}</span></div>
                </div>
              ))}
            </div>
            <button onClick={() => setDrawer(null)} style={{
              width:'100%', marginTop:16, padding:'10px 0', borderRadius:8, border:`1px solid ${C.border}`,
              background:'transparent', color: C.text, fontSize:13, fontWeight:600, cursor:'pointer'
            }}>닫기</button>
          </div>
        </Modal>
      )}

      {toast && <Toast msg={toast} onClose={() => setToast(null)} />}
    </div>
  );
}

// === 탭: 주간 대시보드 ===
function DashboardTab() {
  const [drawer, setDrawer] = useState(null);
  return (
    <div>
      <div style={{ display:'flex', gap:14, marginBottom:20 }}>
        <StatCard label="주간 총 볼륨" value="77,000" unit="kg" sub="5일 운동 기준" color={C.primary} icon="💪" />
        <StatCard label="평균 칼로리" value="2,035" unit="kcal" sub="7일 평균" color={C.accent} icon="🔥" />
        <StatCard label="TDEE 달성률" value="92" unit="%" sub="목표: 2,200 kcal" color={C.warning} icon="🎯" />
        <StatCard label="단백질 평균" value="148" unit="g" sub="7일 평균" color="#6C3FE8" icon="🥩" />
      </div>

      <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:16, marginBottom:16 }}>
        <div style={{ background: C.surface, borderRadius:14, padding:18, border:`1px solid ${C.border}` }}>
          <div style={{ fontWeight:700, fontSize:14, marginBottom:14 }}>주간 볼륨 & 칼로리</div>
          <ResponsiveContainer width="100%" height={200}>
            <ComposedChart data={WEEKLY_DATA}>
              <CartesianGrid strokeDasharray="3 3" stroke="rgba(255,255,255,0.05)" />
              <XAxis dataKey="day" stroke={C.textMuted} tick={{ fontSize:11 }} />
              <YAxis yAxisId="left" stroke={C.textMuted} tick={{ fontSize:11 }} />
              <YAxis yAxisId="right" orientation="right" stroke={C.textMuted} tick={{ fontSize:11 }} />
              <Tooltip contentStyle={{ background: C.surface, border:`1px solid ${C.border}`, color: C.text, borderRadius:8 }} />
              <Bar yAxisId="left" dataKey="volume" fill={C.primary} opacity={0.8} radius={[4,4,0,0]} name="볼륨(kg)" />
              <Line yAxisId="right" type="monotone" dataKey="cal" stroke={C.accent} strokeWidth={2} dot={{ r:4, fill:C.accent }} name="칼로리" />
            </ComposedChart>
          </ResponsiveContainer>
        </div>

        <div style={{ background: C.surface, borderRadius:14, padding:18, border:`1px solid ${C.border}` }}>
          <div style={{ fontWeight:700, fontSize:14, marginBottom:14 }}>칼로리 목표 달성률</div>
          <ResponsiveContainer width="100%" height={200}>
            <BarChart data={WEEKLY_DATA}>
              <CartesianGrid strokeDasharray="3 3" stroke="rgba(255,255,255,0.05)" />
              <XAxis dataKey="day" stroke={C.textMuted} tick={{ fontSize:11 }} />
              <YAxis stroke={C.textMuted} tick={{ fontSize:11 }} domain={[0, 3000]} />
              <Tooltip contentStyle={{ background: C.surface, border:`1px solid ${C.border}`, color: C.text, borderRadius:8 }} />
              <Bar dataKey="calGoal" fill="rgba(255,255,255,0.06)" radius={[4,4,0,0]} name="목표" />
              <Bar dataKey="cal" fill={C.accent} radius={[4,4,0,0]} opacity={0.85} name="섭취" />
            </BarChart>
          </ResponsiveContainer>
        </div>
      </div>

      <div style={{ background: C.surface, borderRadius:14, border:`1px solid ${C.border}`, overflow:'hidden' }}>
        <div style={{ padding:'14px 16px', borderBottom:`1px solid ${C.border}`, fontWeight:700, fontSize:14 }}>일별 요약</div>
        {WEEKLY_DATA.map((d, i) => (
          <div key={i} onClick={() => setDrawer(d)} style={{
            display:'flex', alignItems:'center', gap:16, padding:'12px 16px',
            borderBottom: i < WEEKLY_DATA.length - 1 ? `1px solid ${C.border}` : 'none', cursor:'pointer', transition:'background 0.15s'
          }}
            onMouseEnter={e => e.currentTarget.style.background = C.surfaceHover}
            onMouseLeave={e => e.currentTarget.style.background = 'transparent'}>
            <div style={{ width:32, height:32, borderRadius:8, background: d.volume > 0 ? C.primaryLight : 'rgba(255,255,255,0.05)', display:'flex', alignItems:'center', justifyContent:'center', fontSize:16 }}>
              {d.volume > 0 ? '💪' : '😴'}
            </div>
            <div style={{ width:24, fontWeight:700, color: C.textSub, fontSize:13 }}>{d.day}</div>
            <div style={{ flex:1 }}>
              <div style={{ height:6, background:'rgba(255,255,255,0.08)', borderRadius:3, overflow:'hidden' }}>
                <div style={{ height:'100%', width:`${Math.min((d.cal / 2500) * 100, 100)}%`, background: C.accent, borderRadius:3 }} />
              </div>
            </div>
            <div style={{ width:100, textAlign:'right', fontSize:13, color: C.text, fontWeight:600 }}>{d.cal.toLocaleString()} kcal</div>
            <div style={{ width:100, textAlign:'right', fontSize:12, color: d.volume > 0 ? C.primary : C.textMuted }}>
              {d.volume > 0 ? `${d.volume.toLocaleString()} kg` : '휴식일'}
            </div>
          </div>
        ))}
      </div>

      {drawer && (
        <Modal title={`${drawer.day}요일 상세`} onClose={() => setDrawer(null)}>
          <div>
            <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:12 }}>
              {[['칼로리', `${drawer.cal} kcal`, C.accent], ['운동 볼륨', drawer.volume > 0 ? `${drawer.volume.toLocaleString()} kg` : '휴식일', C.primary], ['목표 달성', `${Math.round(drawer.cal / drawer.calGoal * 100)}%`, drawer.cal >= drawer.calGoal ? C.success : C.warning]].map(([n, v, c]) => (
                <div key={n} style={{ background:'rgba(255,255,255,0.04)', borderRadius:10, padding:16, textAlign:'center' }}>
                  <div style={{ fontSize:12, color: C.textMuted, marginBottom:4 }}>{n}</div>
                  <div style={{ fontSize:20, fontWeight:800, color: c }}>{v}</div>
                </div>
              ))}
            </div>
            <button onClick={() => setDrawer(null)} style={{
              width:'100%', marginTop:16, padding:'10px 0', borderRadius:8, border:`1px solid ${C.border}`,
              background:'transparent', color: C.text, fontSize:13, fontWeight:600, cursor:'pointer'
            }}>닫기</button>
          </div>
        </Modal>
      )}
    </div>
  );
}

// === 탭: 목표 설정 ===
function GoalTab() {
  const [goals, setGoals] = useState({ cal: 2200, protein: 160, carb: 220, fat: 70 });
  const [edit, setEdit] = useState({ ...goals });
  const [editing, setEditing] = useState(false);
  const [toast, setToast] = useState(null);

  const current = { cal: 1850, protein: 142, carb: 195, fat: 58 };

  const save = () => { setGoals({ ...edit }); setEditing(false); setToast('목표가 업데이트되었습니다'); };

  return (
    <div style={{ maxWidth:700 }}>
      <div style={{ background: C.surface, borderRadius:14, padding:24, border:`1px solid ${C.border}`, marginBottom:16 }}>
        <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:20 }}>
          <span style={{ fontWeight:700, fontSize:16 }}>일일 영양소 목표</span>
          {!editing ? (
            <button onClick={() => setEditing(true)} style={{
              padding:'8px 16px', borderRadius:8, border:`1px solid ${C.primary}`, background:'transparent',
              color: C.primary, fontSize:13, fontWeight:600, cursor:'pointer'
            }}>수정</button>
          ) : (
            <div style={{ display:'flex', gap:8 }}>
              <button onClick={() => setEditing(false)} style={{ padding:'8px 14px', borderRadius:8, border:`1px solid ${C.border}`, background:'transparent', color: C.textSub, fontSize:13, cursor:'pointer' }}>취소</button>
              <button onClick={save} style={{ padding:'8px 16px', borderRadius:8, border:'none', background: C.primary, color:'#fff', fontSize:13, fontWeight:700, cursor:'pointer' }}>저장</button>
            </div>
          )}
        </div>
        {[
          { key:'cal', label:'칼로리', unit:'kcal', color: C.accent, min:1200, max:4000 },
          { key:'protein', label:'단백질', unit:'g', color:'#6C3FE8', min:50, max:300 },
          { key:'carb', label:'탄수화물', unit:'g', color:'#F59E0B', min:50, max:600 },
          { key:'fat', label:'지방', unit:'g', color:'#EC4899', min:20, max:200 },
        ].map(({ key, label, unit, color, min, max }) => (
          <div key={key} style={{ marginBottom:20 }}>
            <div style={{ display:'flex', justifyContent:'space-between', marginBottom:8, fontSize:14 }}>
              <span style={{ fontWeight:600 }}>{label}</span>
              <div style={{ display:'flex', alignItems:'center', gap:10 }}>
                <span style={{ color: C.textSub, fontSize:12 }}>{current[key]}{unit} / </span>
                {editing ? (
                  <input type="number" min={min} max={max} value={edit[key]} onChange={e => setEdit(g => ({ ...g, [key]: +e.target.value }))}
                    style={{ width:80, padding:'3px 8px', borderRadius:6, border:`1px solid ${C.border}`, background: C.bg, color: C.text, fontSize:13, textAlign:'right' }} />
                ) : (
                  <span style={{ fontWeight:700, color }}>{goals[key]}{unit}</span>
                )}
              </div>
            </div>
            <div style={{ height:10, background:'rgba(255,255,255,0.08)', borderRadius:5, overflow:'hidden' }}>
              <div style={{
                height:'100%', width:`${Math.min((current[key] / goals[key]) * 100, 100)}%`,
                background: color, borderRadius:5, transition:'width 0.5s ease'
              }} />
            </div>
            <div style={{ textAlign:'right', fontSize:11, color: C.textMuted, marginTop:3 }}>
              {Math.round((current[key] / goals[key]) * 100)}% 달성
            </div>
          </div>
        ))}
      </div>

      {toast && <Toast msg={toast} onClose={() => setToast(null)} />}
    </div>
  );
}

// === 메인 앱 ===
function App() {
  const [tab, setTab] = useState('운동 로그');

  return (
    <div style={{ display:'flex', flexDirection:'column', width:'100%', minHeight:'100vh', background: C.bg, color: C.text }}>
      {/* 탑 네비 */}
      <header style={{
        position:'sticky', top:0, zIndex:100, background: C.navBg,
        borderBottom:`1px solid ${C.border}`, display:'flex', alignItems:'center', height:56, padding:'0 24px', gap:8
      }}>
        <div style={{ fontWeight:900, fontSize:18, color:'#fff', marginRight:16 }}>💪 BodyLog</div>
        {TABS.map(t => (
          <button key={t.id} onClick={() => setTab(t.id)} style={{
            display:'flex', alignItems:'center', gap:6, padding:'6px 14px', borderRadius:8, border:'none', cursor:'pointer',
            background: tab === t.id ? C.primaryLight : 'transparent', color: tab === t.id ? C.primary : C.textSub,
            fontWeight: tab === t.id ? 700 : 400, fontSize:13, transition:'all 0.15s'
          }}>
            <span>{t.icon}</span> {t.label}
          </button>
        ))}
        <div style={{ flex:1 }} />
        <div style={{ fontSize:12, color: C.textMuted, background:'rgba(255,255,255,0.05)', padding:'5px 12px', borderRadius:6 }}>
          {new Date().toLocaleDateString('ko-KR', { month:'short', day:'numeric' })}
        </div>
        <div style={{ width:32, height:32, borderRadius:'50%', background:`linear-gradient(135deg, ${C.primary}, ${C.accent})`, display:'flex', alignItems:'center', justifyContent:'center', fontSize:14, fontWeight:700 }}>B</div>
      </header>

      {/* 히어로 배너 */}
      <HeroBanner tab={tab} />

      {/* 콘텐츠 */}
      <main style={{ padding:'24px 32px', flex:1 }}>
        {tab === '운동 로그' && <WorkoutLogTab />}
        {tab === '영양 섭취 기록' && <NutritionTab />}
        {tab === '주간 대시보드' && <DashboardTab />}
        {tab === '목표 설정' && <GoalTab />}
      </main>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
