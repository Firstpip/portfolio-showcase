// === 공통 컴포넌트 ===
function Tag({ children, color = C.primary }) {
  return (
    <span style={{
      display:'inline-block', padding:'3px 10px', borderRadius:20, fontSize:11, fontWeight:600,
      background: color + '18', color, border:`1px solid ${color}28`
    }}>{children}</span>
  );
}

function Modal({ title, onClose, children, width = 500 }) {
  return (
    <div style={{ position:'fixed', inset:0, background:'rgba(15,23,42,0.4)', zIndex:1000, display:'flex', alignItems:'center', justifyContent:'center' }}
      onClick={e => e.target === e.currentTarget && onClose()}>
      <div style={{ background: C.surface, borderRadius:16, width, maxWidth:'92vw', maxHeight:'88vh', overflow:'auto', boxShadow:'0 20px 60px rgba(0,0,0,0.15)', border:`1px solid ${C.border}` }}>
        <div style={{ padding:'18px 24px', borderBottom:`1px solid ${C.border}`, display:'flex', justifyContent:'space-between', alignItems:'center' }}>
          <span style={{ fontWeight:700, fontSize:16, color: C.text }}>{title}</span>
          <button onClick={onClose} style={{ background:'none', border:'none', fontSize:20, cursor:'pointer', color: C.textMuted }}>×</button>
        </div>
        <div style={{ padding:24 }}>{children}</div>
      </div>
    </div>
  );
}

function Toast({ msg, onClose }) {
  useEffect(() => { const t = setTimeout(onClose, 2500); return () => clearTimeout(t); }, []);
  return (
    <div style={{
      position:'fixed', bottom:24, right:24, background: C.text, color:'#fff',
      padding:'12px 20px', borderRadius:10, fontSize:13, fontWeight:500,
      boxShadow:'0 4px 20px rgba(0,0,0,0.2)', zIndex:9999
    }}>✓ {msg}</div>
  );
}

function KpiCard({ label, value, unit, sub, color = C.primary, icon, trend }) {
  return (
    <div style={{
      background: C.surface, borderRadius:14, padding:'18px 20px',
      border:`1px solid ${C.border}`, flex:1,
      boxShadow:'0 1px 3px rgba(0,0,0,0.04)'
    }}>
      <div style={{ display:'flex', justifyContent:'space-between', marginBottom:12 }}>
        <span style={{ fontSize:12, color: C.textMuted, fontWeight:500 }}>{label}</span>
        <span style={{ fontSize:22 }}>{icon}</span>
      </div>
      <div style={{ fontSize:30, fontWeight:900, color, letterSpacing:'-1px' }}>
        {value}<span style={{ fontSize:13, color: C.textMuted, fontWeight:400, marginLeft:3 }}>{unit}</span>
      </div>
      {sub && <div style={{ fontSize:11, color: C.textMuted, marginTop:6 }}>{sub}</div>}
      {trend && <div style={{ fontSize:11, color: trend > 0 ? C.success : C.danger, marginTop:6, fontWeight:600 }}>{trend > 0 ? '▲' : '▼'} {Math.abs(trend)}% 지난달 대비</div>}
    </div>
  );
}

  const heatmapColor = (v) => {
    if (v === 0) return '#F1F5F9';
    if (v < 0.4) return '#BFDBFE';
    if (v < 0.7) return '#60A5FA';
    if (v < 0.9) return '#2563EB';
    return '#1D4ED8';

  return (
    <div style={{ padding:24, overflow:'auto', height:'100%' }}>
      <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:20 }}>

          <h2 style={{ fontWeight:800, fontSize:18, color: C.text }}>2025년 10월 ~ 2026년 4월</h2>

        }}>📄 PDF 내보내기</button>
      </div>

      <div style={{ display:'flex', gap:14, marginBottom:20 }}>
        <KpiCard label="평균 칼로리" value="1,969" unit="kcal/일" icon="🔥" color={C.primary} trend={4.2} />
        <KpiCard label="평균 단백질" value="144" unit="g/일" icon="💪" color={C.secondary} trend={8.1} />
        <KpiCard label="목표 달성일" value="142" unit="일" icon="🎯" color={C.accent} sub="총 196일 중" />
        <KpiCard label="기록 완주율" value="91" unit="%" icon="📅" color={C.warning} />
      </div>

      <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:16, marginBottom:20 }}>
        <div style={{ background: C.surface, borderRadius:14, border:`1px solid ${C.border}`, padding:20 }}>
          <div style={{ fontWeight:700, fontSize:14, color: C.text, marginBottom:14 }}>월간 칼로리 & 단백질 추이</div>
          <ResponsiveContainer width="100%" height={200}>
            <ComposedChart data={MONTHLY_DATA}>
              <CartesianGrid strokeDasharray="3 3" stroke="#F1F5F9" />
              <XAxis dataKey="month" tick={{ fontSize:11, fill: C.textMuted }} />
              <YAxis yAxisId="left" tick={{ fontSize:11, fill: C.textMuted }} />
              <YAxis yAxisId="right" orientation="right" tick={{ fontSize:11, fill: C.textMuted }} />
              <Tooltip contentStyle={{ borderRadius:8, border:`1px solid ${C.border}`, fontSize:12 }} />
              <Bar yAxisId="left" dataKey="cal" fill={C.primary} opacity={0.75} radius={[4,4,0,0]} name="칼로리(kcal)" />
              <Line yAxisId="right" type="monotone" dataKey="protein" stroke={C.secondary} strokeWidth={2.5} dot={{ r:4, fill:C.secondary }} name="단백질(g)" />
            </ComposedChart>
          </ResponsiveContainer>
        </div>

        <div style={{ background: C.surface, borderRadius:14, border:`1px solid ${C.border}`, padding:20 }}>
          <div style={{ fontWeight:700, fontSize:14, color: C.text, marginBottom:14 }}>월간 탄·단·지 추이</div>
          <ResponsiveContainer width="100%" height={200}>
            <AreaChart data={MONTHLY_DATA}>
              <CartesianGrid strokeDasharray="3 3" stroke="#F1F5F9" />
              <XAxis dataKey="month" tick={{ fontSize:11, fill: C.textMuted }} />
              <YAxis tick={{ fontSize:11, fill: C.textMuted }} />
              <Tooltip contentStyle={{ borderRadius:8, border:`1px solid ${C.border}`, fontSize:12 }} />
              <Area type="monotone" dataKey="carb" stackId="1" stroke="#F59E0B" fill="#FEF3C7" name="탄수화물(g)" />
              <Area type="monotone" dataKey="protein" stackId="1" stroke={C.primary} fill={C.primaryLight} name="단백질(g)" />
              <Area type="monotone" dataKey="fat" stackId="1" stroke={C.accent} fill="#F5F3FF" name="지방(g)" />
            </AreaChart>
          </ResponsiveContainer>
        </div>
      </div>

      <div style={{ background: C.surface, borderRadius:14, border:`1px solid ${C.border}`, padding:20, marginBottom:20 }}>

              cursor:'pointer', display:'flex', alignItems:'center', justifyContent:'center',
              fontSize:10, color: d.value > 0.6 ? '#fff' : C.textMuted, fontWeight:600, transition:'transform 0.15s'
            }}
              title={`${d.day}일 달성률 ${Math.round(d.value * 100)}%`}
              onMouseEnter={e => e.currentTarget.style.transform = 'scale(1.15)'}
              onMouseLeave={e => e.currentTarget.style.transform = 'scale(1)'}>
              {d.day}
            </div>
          ))}

        <div style={{ display:'flex', gap:6, alignItems:'center', marginTop:10 }}>
          <span style={{ fontSize:11, color: C.textMuted }}>낮음</span>
          {[0, 0.3, 0.6, 0.8, 1.0].map(v => (
            <div key={v} style={{ width:16, height:16, borderRadius:3, background: heatmapColor(v) }} />
          ))}
          <span style={{ fontSize:11, color: C.textMuted }}>높음</span>
        </div>
      </div>

      {modal && (
        <Modal title={`4월 ${modal.day}일 상세`} onClose={() => setModal(null)} width={360}>
          <div>
            <div style={{ textAlign:'center', padding:'20px 0' }}>
              <div style={{ fontSize:48, fontWeight:900, color: C.primary }}>{Math.round(modal.value * 100)}%</div>
              <div style={{ fontSize:14, color: C.textMuted }}>일일 영양 목표 달성률</div>
            </div>
            <div style={{ padding:12, background: C.primaryLight, borderRadius:10, textAlign:'center', fontSize:13, color: C.primary }}>
              {modal.value >= 0.8 ? '✅ 목표 달성!' : modal.value >= 0.5 ? '🔶 절반 이상 달성' : '❌ 미달 — 다음 날 보충 권장'}
            </div>
            <button onClick={() => setModal(null)} style={{
              width:'100%', marginTop:16, padding:'10px 0', borderRadius:8, border:'none',
              background: C.primary, color:'#fff', fontSize:14, fontWeight:700, cursor:'pointer'
            }}>확인</button>
          </div>
        </Modal>
      )}

      {toast && <Toast msg={toast} onClose={() => setToast(null)} />}
    </div>
  );
}

              <h1 style={{ fontSize:16, fontWeight:800, color: C.text }}>{page}</h1>

                background: C.primaryMid, color: C.primary, borderRadius:6, padding:'2px 8px',
                fontSize:11, fontWeight:700
              }}>{pageMeta[page]?.badge}</span>
            </div>
            <div style={{ fontSize:11, color: C.textMuted, marginTop:1 }}>{pageMeta[page]?.desc}</div>
          </div>
          <div style={{ display:'flex', gap:8, alignItems:'center' }}>
            <div style={{ fontSize:12, color: C.textMuted, background: C.bg, borderRadius:6, padding:'4px 10px', border:`1px solid ${C.border}` }}>
              Supabase ☁️ Connected
            </div>
            <div style={{
              width:32, height:32, borderRadius:10, background: C.primaryMid,
              display:'flex', alignItems:'center', justifyContent:'center', color: C.primary, fontWeight:800, fontSize:13
            }}>N</div>
          </div>
        </header>

        {/* 콘텐츠 */}
        <div style={{ flex:1, overflow:'hidden' }}>
          {page === '회원 관리' && <MemberPage />}
          {page === '식단 관리' && <DietPage />}
          {page === '식단 공유 피드' && <FeedPage />}
          {page === '영양 리포트' && <ReportPage />}
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
