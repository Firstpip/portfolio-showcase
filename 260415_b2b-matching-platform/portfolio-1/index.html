<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>글로벌 스타트업 박람회 B2B 매칭 플랫폼</title>
<link rel="preconnect" href="https://cdn.jsdelivr.net" />
<link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700&display=swap" rel="stylesheet" />
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://unpkg.com/prop-types/prop-types.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/recharts@2.15.0/umd/Recharts.min.js"></script>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{width:100%;height:100%;font-family:'Pretendard',sans-serif;background:#F4F6FA}
  #root{display:flex;width:100%;height:100vh;overflow:hidden}
  ::-webkit-scrollbar{width:6px;height:6px}
  ::-webkit-scrollbar-track{background:transparent}
  ::-webkit-scrollbar-thumb{background:#CBD5E0;border-radius:3px}
  @keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
  @keyframes slideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
  @keyframes overlayIn{from{opacity:0}to{opacity:1}}
  .fade-in{animation:fadeIn 0.25s ease}
  .badge{display:inline-flex;align-items:center;padding:3px 10px;border-radius:20px;font-size:12px;font-weight:600}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useCallback } = React;
const { BarChart, Bar, XAxis, YAxis, Tooltip, ResponsiveContainer, PieChart, Pie, Cell, Legend } = Recharts;

const C = {
  primary:'#1A2942', secondary:'#B8732A', accent:'#E8A84C',
  bg:'#F4F6FA', surface:'#FFFFFF', border:'#E2E8F0',
  text:'#0F1B2D', textSub:'#5A6A82', success:'#16A34A', danger:'#DC2626',
  warn:'#D97706', info:'#2563EB',
};

const STARTUPS = [
  {id:1,name:'핀테크랩 코리아',industry:'핀테크',stage:'시리즈A',country:'한국',desc:'AI 기반 개인 자산관리 솔루션',ir:'FinTech_Lab_IR.pdf',size:18,matched:3,avatar:'🏦',status:'active'},
  {id:2,name:'그린에너지 테크',industry:'클린테크',stage:'Pre-A',country:'한국',desc:'탄소중립 재생에너지 플랫폼',ir:'GreenEnergy_IR.pdf',size:12,matched:1,avatar:'🌿',status:'active'},
  {id:3,name:'메디케어 AI',industry:'헬스케어',stage:'시리즈B',country:'한국',desc:'의료 영상 AI 진단 솔루션',ir:'MediCare_AI_IR.pdf',size:45,matched:7,avatar:'🏥',status:'active'},
  {id:4,name:'로지스틱 옵티마',industry:'물류',stage:'Pre-A',country:'한국',desc:'스마트 물류 최적화 SaaS',ir:'Logistic_IR.pdf',size:22,matched:2,avatar:'🚚',status:'pending'},
  {id:5,name:'에듀테크 넥스트',industry:'에듀테크',stage:'씨드',country:'한국',desc:'개인 맞춤 AI 교육 플랫폼',ir:'EduTech_IR.pdf',size:8,matched:0,avatar:'📚',status:'active'},
  {id:6,name:'스페이스 커머스',industry:'이커머스',stage:'시리즈A',country:'한국',desc:'3D 가상공간 쇼핑 플랫폼',ir:'SpaceCommerce_IR.pdf',size:31,matched:4,avatar:'🛍️',status:'active'},
];

const BUYERS = [
  {id:1,name:'KV Partners',type:'VC',focus:'핀테크·AI',portfolio:24,country:'한국',avatar:'🏢'},
  {id:2,name:'Sequoia Korea',type:'글로벌VC',focus:'딥테크·헬스케어',portfolio:89,country:'미국',avatar:'🌐'},
  {id:3,name:'Kakao Ventures',type:'CVC',focus:'커머스·플랫폼',portfolio:41,country:'한국',avatar:'💛'},
  {id:4,name:'Goldman PE Asia',type:'PE',focus:'성장 단계',portfolio:17,country:'홍콩',avatar:'🏛️'},
];

const INDUSTRIES = ['전체','핀테크','클린테크','헬스케어','물류','에듀테크','이커머스'];

const SLOTS = {
  day1:['10:00','11:00','14:00','15:00','16:00'],
  day2:['09:00','10:00','11:00','14:00','15:00','16:00'],
  day3:['09:00','10:00','11:00','14:00'],
};

const BOOKINGS_INIT = {
  day1:{10:[1],[11]:[],14:[],15:[3],16:[]},
  day2:{9:[],10:[2],11:[],14:[],15:[],16:[]},
  day3:{9:[],10:[],11:[4],14:[]},
};

const MATCH_DATA = [
  {name:'월',요청:12,성사:8},{name:'화',요청:18,성사:14},{name:'수',요청:22,성사:17},
  {name:'목',요청:16,성사:11},{name:'금',요청:28,성사:21},{name:'토',요청:8,성사:5},
];
const PIE_DATA = [
  {name:'핀테크',value:28},{name:'헬스케어',value:22},{name:'클린테크',value:18},
  {name:'이커머스',value:15},{name:'에듀테크',value:10},{name:'기타',value:7},
];
const PIE_COLORS = ['#1A2942','#B8732A','#E8A84C','#3B82F6','#10B981','#8B5CF6'];

const NOTICES = [
  {id:1,title:'[필독] 박람회 일정 안내',date:'2026-04-10',file:'매뉴얼_v2.pdf'},
  {id:2,title:'IR 덱 업로드 가이드',date:'2026-04-08',file:'업로드가이드.pdf'},
  {id:3,title:'현장 부스 배치도 공개',date:'2026-04-06',file:'부스배치도.pdf'},
];

function StatusBadge({status}) {
  const map = {active:{c:'#D1FAE5',t:'#065F46',l:'활성'},pending:{c:'#FEF3C7',t:'#92400E',l:'대기'},matched:{c:'#DBEAFE',t:'#1E40AF',l:'매칭완료'}};
  const s = map[status]||map.active;
  return <span className="badge" style={{background:s.c,color:s.t}}>{s.l}</span>;
}

function StageBadge({stage}) {
  return <span className="badge" style={{background:'#EDE9FE',color:'#5B21B6'}}>{stage}</span>;
}

function Modal({title,onClose,children}) {
  return (
    <div onClick={onClose} style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.5)',zIndex:500,display:'flex',alignItems:'center',justifyContent:'center'}} className="fade-in">
      <div onClick={e=>e.stopPropagation()} style={{background:C.surface,borderRadius:16,padding:28,width:560,maxHeight:'80vh',overflowY:'auto',boxShadow:'0 20px 60px rgba(0,0,0,0.25)'}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:20}}>
          <h3 style={{fontSize:18,fontWeight:700,color:C.text}}>{title}</h3>
          <button onClick={onClose} style={{border:'none',background:'none',fontSize:20,cursor:'pointer',color:C.textSub,lineHeight:1}}>✕</button>
        </div>
        {children}
      </div>
    </div>
  );
}

function Toast({msg,onClose}) {
  return (
    <div style={{position:'fixed',bottom:28,right:28,background:'#1E293B',color:'#fff',padding:'12px 20px',borderRadius:10,fontSize:14,fontWeight:500,zIndex:600,boxShadow:'0 8px 24px rgba(0,0,0,0.2)',display:'flex',gap:10,alignItems:'center'}}>
      ✅ {msg}
      <button onClick={onClose} style={{border:'none',background:'none',color:'#94A3B8',cursor:'pointer',fontSize:16}}>✕</button>
    </div>
  );
}

// ===== B2B 매칭 및 탐색 =====
function PageMatching({onToast}) {
  const [industry,setIndustry] = useState('전체');
  const [stage,setStage] = useState('전체');
  const [search,setSearch] = useState('');
  const [modal,setModal] = useState(null);
  const [offers,setOffers] = useState({});

  const filtered = STARTUPS.filter(s =>
    (industry==='전체'||s.industry===industry) &&
    (stage==='전체'||s.stage===stage) &&
    (s.name.includes(search)||s.desc.includes(search))
  );

  function sendOffer(id) {
    setOffers(p=>({...p,[id]:'pending'}));
    setModal(null);
    onToast('매칭 오퍼를 전송했습니다');
  }

  return (
    <div className="fade-in">
      <div style={{display:'flex',gap:10,marginBottom:20,flexWrap:'wrap',alignItems:'center'}}>
        <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="기업명 또는 키워드 검색..."
          style={{flex:'1 1 200px',padding:'9px 14px',border:`1.5px solid ${C.border}`,borderRadius:9,fontSize:14,outline:'none',background:C.surface}} />
        <select value={industry} onChange={e=>setIndustry(e.target.value)}
          style={{padding:'9px 12px',border:`1.5px solid ${C.border}`,borderRadius:9,fontSize:14,background:C.surface,cursor:'pointer'}}>
          {INDUSTRIES.map(i=><option key={i}>{i}</option>)}
        </select>
        <select value={stage} onChange={e=>setStage(e.target.value)}
          style={{padding:'9px 12px',border:`1.5px solid ${C.border}`,borderRadius:9,fontSize:14,background:C.surface,cursor:'pointer'}}>
          {['전체','씨드','Pre-A','시리즈A','시리즈B'].map(s=><option key={s}>{s}</option>)}
        </select>
      </div>

      <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(280px,1fr))',gap:16}}>
        {filtered.map(s => (
          <div key={s.id} onClick={()=>setModal(s)} style={{background:C.surface,borderRadius:12,padding:20,border:`1px solid ${C.border}`,cursor:'pointer',transition:'all 0.2s',boxShadow:'0 2px 8px rgba(0,0,0,0.04)'}}
            onMouseEnter={e=>e.currentTarget.style.boxShadow='0 6px 20px rgba(26,41,66,0.12)'}
            onMouseLeave={e=>e.currentTarget.style.boxShadow='0 2px 8px rgba(0,0,0,0.04)'}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:12}}>
              <div style={{fontSize:32}}>{s.avatar}</div>
              <StatusBadge status={offers[s.id]?'matched':s.status} />
            </div>
            <div style={{fontWeight:700,fontSize:16,color:C.text,marginBottom:4}}>{s.name}</div>
            <div style={{fontSize:13,color:C.textSub,marginBottom:10}}>{s.desc}</div>
            <div style={{display:'flex',gap:6,flexWrap:'wrap',marginBottom:12}}>
              <StageBadge stage={s.stage} />
              <span className="badge" style={{background:'#F1F5F9',color:C.textSub}}>{s.industry}</span>
              <span className="badge" style={{background:'#F1F5F9',color:C.textSub}}>{s.country}</span>
            </div>
            <div style={{display:'flex',gap:16,fontSize:12,color:C.textSub}}>
              <span>IR 덱 {s.size}MB</span>
              <span>매칭 {s.matched}건</span>
            </div>
          </div>
        ))}
      </div>

      {modal && (
        <Modal title={modal.name} onClose={()=>setModal(null)}>
          <div style={{fontSize:36,marginBottom:12}}>{modal.avatar}</div>
          <div style={{display:'flex',gap:8,flexWrap:'wrap',marginBottom:16}}>
            <StageBadge stage={modal.stage} />
            <span className="badge" style={{background:'#F1F5F9',color:C.textSub}}>{modal.industry}</span>
            <span className="badge" style={{background:'#F1F5F9',color:C.textSub}}>{modal.country}</span>
          </div>
          <p style={{color:C.textSub,fontSize:14,marginBottom:16,lineHeight:1.6}}>{modal.desc}</p>
          <div style={{background:'#F8FAFC',borderRadius:10,padding:14,marginBottom:20,fontSize:13,color:C.textSub}}>
            <div style={{marginBottom:6}}>📄 IR 덱: <strong style={{color:C.text}}>{modal.ir}</strong> ({modal.size}MB)</div>
            <div>📊 기존 매칭 성사: <strong style={{color:C.text}}>{modal.matched}건</strong></div>
          </div>
          <div style={{display:'flex',gap:10}}>
            <button onClick={()=>onToast('IR 덱을 다운로드합니다')}
              style={{flex:1,padding:'10px 0',border:`1.5px solid ${C.border}`,borderRadius:9,background:C.surface,cursor:'pointer',fontSize:14,fontWeight:600,color:C.text}}>
              📄 IR 덱 열람
            </button>
            <button onClick={()=>sendOffer(modal.id)} disabled={!!offers[modal.id]}
              style={{flex:1,padding:'10px 0',border:'none',borderRadius:9,background:offers[modal.id]?'#94A3B8':C.primary,color:'#fff',cursor:offers[modal.id]?'not-allowed':'pointer',fontSize:14,fontWeight:600}}>
              {offers[modal.id]?'오퍼 전송됨':'💼 매칭 오퍼 전송'}
            </button>
          </div>
        </Modal>
      )}
    </div>
  );
}

// ===== 미팅 스케줄링 =====
function PageScheduling({onToast}) {
  const [day,setDay] = useState('day1');
  const [bookings,setBookings] = useState(BOOKINGS_INIT);
  const [modal,setModal] = useState(null);
  const [myMeetings,setMyMeetings] = useState([
    {id:1,company:'KV Partners',day:'1일차',time:'10:00',booth:'B-12',status:'confirmed'},
    {id:2,company:'Sequoia Korea',day:'2일차',time:'14:00',booth:'A-03',status:'pending'},
  ]);

  const dayLabels = {day1:'1일차 (10월 14일)',day2:'2일차 (10월 15일)',day3:'3일차 (10월 16일)'};
  const slotMap = {day1:['10:00','11:00','14:00','15:00','16:00'],day2:['09:00','10:00','11:00','14:00','15:00','16:00'],day3:['09:00','10:00','11:00','14:00']};

  function isBooked(slot) {
    const h = parseInt(slot);
    const b = bookings[day];
    return b && b[h] && b[h].length > 0;
  }

  function bookSlot() {
    if (!modal) return;
    const h = parseInt(modal.slot);
    setBookings(p=>({...p,[day]:{...p[day],[h]:[...(p[day][h]||[]),99]}}));
    setMyMeetings(p=>[...p,{id:Date.now(),company:'신규 미팅',day:dayLabels[day].split(' ')[0],time:modal.slot,booth:'C-07',status:'pending'}]);
    setModal(null);
    onToast(`${modal.slot} 슬롯 예약이 완료되었습니다`);
  }

  return (
    <div className="fade-in" style={{display:'grid',gridTemplateColumns:'1fr 340px',gap:20}}>
      <div>
        <div style={{display:'flex',gap:8,marginBottom:20}}>
          {Object.keys(dayLabels).map(d=>(
            <button key={d} onClick={()=>setDay(d)}
              style={{padding:'8px 18px',border:'none',borderRadius:9,cursor:'pointer',fontWeight:600,fontSize:14,
                background:day===d?C.primary:'#E8EDF5',color:day===d?'#fff':C.textSub,transition:'all 0.2s'}}>
              {dayLabels[d]}
            </button>
          ))}
        </div>
        <div style={{background:C.surface,borderRadius:12,border:`1px solid ${C.border}`,overflow:'hidden'}}>
          <div style={{background:C.primary,padding:'14px 20px',color:'#fff',fontWeight:700,fontSize:15}}>
            타임테이블 — {dayLabels[day]}
          </div>
          <div style={{padding:16,display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:10}}>
            {slotMap[day].map(slot=>{
              const booked = isBooked(slot);
              return (
                <div key={slot} onClick={()=>!booked&&setModal({slot})}
                  style={{padding:'16px 12px',borderRadius:10,textAlign:'center',cursor:booked?'not-allowed':'pointer',
                    background:booked?'#FEE2E2':'#F0F9FF',border:`2px solid ${booked?'#FCA5A5':'#BAE6FD'}`,transition:'all 0.2s'}}
                  onMouseEnter={e=>!booked&&(e.currentTarget.style.background='#DBEAFE')}
                  onMouseLeave={e=>!booked&&(e.currentTarget.style.background='#F0F9FF')}>
                  <div style={{fontSize:18,fontWeight:700,color:booked?'#991B1B':'#0369A1'}}>{slot}</div>
                  <div style={{fontSize:12,color:booked?'#EF4444':'#38BDF8',marginTop:4,fontWeight:600}}>
                    {booked?'예약됨':'예약 가능'}
                  </div>
                </div>
              );
            })}
          </div>
        </div>
      </div>

      <div>
        <h4 style={{fontWeight:700,color:C.text,marginBottom:12,fontSize:15}}>내 미팅 일정</h4>
        <div style={{display:'flex',flexDirection:'column',gap:10}}>
          {myMeetings.map(m=>(
            <div key={m.id} style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:10,padding:14,cursor:'pointer'}}
              onClick={()=>onToast(`${m.company} 미팅 상세 조회`)}>
              <div style={{fontWeight:600,fontSize:14,color:C.text,marginBottom:4}}>{m.company}</div>
              <div style={{fontSize:12,color:C.textSub,marginBottom:8}}>{m.day} · {m.time} · 부스 {m.booth}</div>
              <span className="badge" style={{background:m.status==='confirmed'?'#D1FAE5':'#FEF3C7',color:m.status==='confirmed'?'#065F46':'#92400E'}}>
                {m.status==='confirmed'?'확정':'대기 중'}
              </span>
            </div>
          ))}
        </div>
      </div>

      {modal && (
        <Modal title={`${modal.slot} 슬롯 예약`} onClose={()=>setModal(null)}>
          <div style={{background:'#F0F9FF',borderRadius:10,padding:16,marginBottom:20,fontSize:14}}>
            <div style={{color:C.textSub,marginBottom:6}}>선택 일정</div>
            <div style={{fontWeight:700,color:C.text,fontSize:18}}>{dayLabels[day]} · {modal.slot}</div>
          </div>
          <div style={{marginBottom:16}}>
            <label style={{fontSize:13,fontWeight:600,color:C.text,display:'block',marginBottom:6}}>미팅 상대</label>
            <select style={{width:'100%',padding:'9px 12px',border:`1.5px solid ${C.border}`,borderRadius:9,fontSize:14,background:C.surface}}>
              {BUYERS.map(b=><option key={b.id}>{b.name} ({b.country})</option>)}
            </select>
          </div>
          <div style={{marginBottom:20}}>
            <label style={{fontSize:13,fontWeight:600,color:C.text,display:'block',marginBottom:6}}>상담 목적</label>
            <textarea rows={3} placeholder="투자 상담, 파트너십 논의 등..." style={{width:'100%',padding:'9px 12px',border:`1.5px solid ${C.border}`,borderRadius:9,fontSize:14,resize:'none',fontFamily:'inherit'}} />
          </div>
          <div style={{display:'flex',gap:10}}>
            <button onClick={()=>setModal(null)} style={{flex:1,padding:'10px',border:`1.5px solid ${C.border}`,borderRadius:9,background:C.surface,cursor:'pointer',fontWeight:600,fontSize:14}}>취소</button>
            <button onClick={bookSlot} style={{flex:1,padding:'10px',border:'none',borderRadius:9,background:C.secondary,color:'#fff',cursor:'pointer',fontWeight:600,fontSize:14}}>예약 확정</button>
          </div>
        </Modal>
      )}
    </div>
  );
}

// ===== IR 덱 뷰어 =====
function PageIRDeck({onToast}) {
  const [selected,setSelected] = useState(STARTUPS[0]);
  const [page,setPage] = useState(1);
  const totalPages = 12;

  return (
    <div className="fade-in" style={{display:'grid',gridTemplateColumns:'280px 1fr',gap:16,height:'calc(100vh - 160px)'}}>
      <div style={{overflowY:'auto'}}>
        <h4 style={{fontWeight:700,color:C.text,marginBottom:12,fontSize:14}}>셀러 목록</h4>
        {STARTUPS.map(s=>(
          <div key={s.id} onClick={()=>{setSelected(s);setPage(1);}}
            style={{padding:'12px 14px',borderRadius:10,marginBottom:8,cursor:'pointer',border:`1.5px solid ${selected.id===s.id?C.primary:C.border}`,background:selected.id===s.id?'#EFF6FF':C.surface,transition:'all 0.15s'}}>
            <div style={{display:'flex',gap:10,alignItems:'center'}}>
              <span style={{fontSize:24}}>{s.avatar}</span>
              <div>
                <div style={{fontWeight:600,fontSize:13,color:C.text}}>{s.name}</div>
                <div style={{fontSize:11,color:C.textSub}}>{s.ir} · {s.size}MB</div>
              </div>
            </div>
          </div>
        ))}
      </div>

      <div style={{background:C.surface,borderRadius:12,border:`1px solid ${C.border}`,display:'flex',flexDirection:'column',overflow:'hidden'}}>
        <div style={{background:C.primary,padding:'14px 20px',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
          <div>
            <div style={{color:'#CBD5E1',fontSize:12}}>IR 덱 뷰어</div>
            <div style={{color:'#fff',fontWeight:700,fontSize:15,marginTop:2}}>{selected.ir}</div>
          </div>
          <div style={{display:'flex',gap:8}}>
            <button onClick={()=>onToast(`${selected.ir} 다운로드 시작`)} style={{padding:'7px 14px',background:C.secondary,border:'none',borderRadius:7,color:'#fff',cursor:'pointer',fontWeight:600,fontSize:13}}>
              ⬇ 다운로드
            </button>
          </div>
        </div>

        <div style={{flex:1,background:'#F8FAFC',display:'flex',alignItems:'center',justifyContent:'center',flexDirection:'column',gap:16,padding:24}}>
          <div style={{width:'100%',maxWidth:480,background:C.surface,borderRadius:10,boxShadow:'0 4px 20px rgba(0,0,0,0.1)',padding:32,aspectRatio:'4/3',display:'flex',flexDirection:'column',justifyContent:'center',position:'relative'}}>
            <div style={{position:'absolute',top:12,right:16,fontSize:12,color:'#94A3B8'}}>{page} / {totalPages}</div>
            {page===1 && <>
              <div style={{fontSize:28,marginBottom:8}}>{selected.avatar}</div>
              <div style={{fontSize:20,fontWeight:700,color:C.primary,marginBottom:4}}>{selected.name}</div>
              <div style={{fontSize:14,color:C.textSub,marginBottom:16}}>{selected.desc}</div>
              <div style={{display:'flex',gap:8}}>
                <StageBadge stage={selected.stage} />
                <span className="badge" style={{background:'#F1F5F9',color:C.textSub}}>{selected.industry}</span>
              </div>
            </>}
            {page===2 && <>
              <div style={{fontWeight:700,fontSize:16,color:C.text,marginBottom:16}}>📊 핵심 지표</div>
              {[['월 활성 사용자','12,400명'],['매출 성장률','MoM 18%'],['고객 유지율','94.2%']].map(([k,v])=>(
                <div key={k} style={{display:'flex',justifyContent:'space-between',padding:'10px 0',borderBottom:`1px solid ${C.border}`,fontSize:14}}>
                  <span style={{color:C.textSub}}>{k}</span><span style={{fontWeight:700,color:C.text}}>{v}</span>
                </div>
              ))}
            </>}
            {page>2 && <div style={{textAlign:'center',color:'#94A3B8',fontSize:14}}>슬라이드 {page} — 프레젠테이션 내용</div>}
          </div>
        </div>

        <div style={{padding:'12px 20px',borderTop:`1px solid ${C.border}`,display:'flex',justifyContent:'center',gap:10,alignItems:'center'}}>
          <button onClick={()=>setPage(p=>Math.max(1,p-1))} disabled={page===1}
            style={{padding:'7px 16px',border:`1.5px solid ${C.border}`,borderRadius:7,cursor:page===1?'not-allowed':'pointer',background:C.surface,fontWeight:600,fontSize:13}}>
            ‹ 이전
          </button>
          <span style={{fontSize:13,color:C.textSub}}>{page} / {totalPages}</span>
          <button onClick={()=>setPage(p=>Math.min(totalPages,p+1))} disabled={page===totalPages}
            style={{padding:'7px 16px',border:`1.5px solid ${C.border}`,borderRadius:7,cursor:page===totalPages?'not-allowed':'pointer',background:C.surface,fontWeight:600,fontSize:13}}>
            다음 ›
          </button>
        </div>
      </div>
    </div>
  );
}

// ===== 관리자 대시보드 =====
function PageAdmin({onToast}) {
  const [tab,setTab] = useState('stats');
  const [noticeModal,setNoticeModal] = useState(false);

    {label:'총 참가 기업',value:'184',sub:'바이어 62 · 셀러 122',icon:'🏢',color:'#EFF6FF'},
    {label:'매칭 오퍼 건수',value:'347',sub:'성사 218건 (62.8%)',icon:'🤝',color:'#F0FDF4'},
    {label:'예약 완료 미팅',value:'218',sub:'잔여 슬롯 89개',icon:'📅',color:'#FFF7ED'},
    {label:'IR 덱 다운로드',value:'1,284',sub:'평균 6.2회/기업',icon:'📄',color:'#FDF4FF'},
  ];

  return (
    <div className="fade-in">
      <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:14,marginBottom:20}}>
        {kpis.map(k=>(
          <div key={k.label} style={{background:k.color,borderRadius:12,padding:18,border:`1px solid ${C.border}`}}>
            <div style={{fontSize:28,marginBottom:8}}>{k.icon}</div>
            <div style={{fontSize:24,fontWeight:700,color:C.text}}>{k.value}</div>
            <div style={{fontSize:13,fontWeight:600,color:C.text,marginBottom:2}}>{k.label}</div>
            <div style={{fontSize:11,color:C.textSub}}>{k.sub}</div>
          </div>
        ))}
      </div>

      <div style={{display:'flex',gap:8,marginBottom:16}}>
        {['stats','members','notices'].map(t=>(
          <button key={t} onClick={()=>setTab(t)}
            style={{padding:'7px 16px',border:'none',borderRadius:8,cursor:'pointer',fontWeight:600,fontSize:13,
              background:tab===t?C.primary:'#E8EDF5',color:tab===t?'#fff':C.textSub}}>
            {t==='stats'?'매칭 통계':t==='members'?'회원 관리':'공지사항'}
          </button>
        ))}
      </div>

      {tab==='stats' && (
        <div style={{display:'grid',gridTemplateColumns:'3fr 2fr',gap:16}}>
          <div style={{background:C.surface,borderRadius:12,padding:20,border:`1px solid ${C.border}`}}>
            <div style={{fontWeight:700,fontSize:14,color:C.text,marginBottom:16}}>일별 매칭 현황</div>
            <ResponsiveContainer width="100%" height={200}>
              <BarChart data={MATCH_DATA}>
                <XAxis dataKey="name" tick={{fontSize:12}} />
                <YAxis tick={{fontSize:12}} />
                <Tooltip />
                <Bar dataKey="요청" fill={C.primary} radius={[4,4,0,0]} />
                <Bar dataKey="성사" fill={C.secondary} radius={[4,4,0,0]} />
              </BarChart>
            </ResponsiveContainer>
          </div>
          <div style={{background:C.surface,borderRadius:12,padding:20,border:`1px solid ${C.border}`}}>
            <div style={{fontWeight:700,fontSize:14,color:C.text,marginBottom:16}}>산업군별 분포</div>
            <ResponsiveContainer width="100%" height={200}>
              <PieChart>
                <Pie data={PIE_DATA} cx="50%" cy="50%" innerRadius={50} outerRadius={80} dataKey="value">
                  {PIE_DATA.map((e,i)=><Cell key={i} fill={PIE_COLORS[i]} />)}
                </Pie>
                <Tooltip />
                <Legend iconSize={10} wrapperStyle={{fontSize:11}} />
              </PieChart>
            </ResponsiveContainer>
          </div>
        </div>
      )}

      {tab==='members' && (
        <div style={{background:C.surface,borderRadius:12,border:`1px solid ${C.border}`,overflow:'hidden'}}>
          <table style={{width:'100%',borderCollapse:'collapse',fontSize:14}}>
            <thead><tr style={{background:'#F8FAFC'}}>
              {['기업명','유형','산업군','국가','매칭수','상태'].map(h=>(
                <th key={h} style={{padding:'12px 16px',textAlign:'left',fontWeight:600,color:C.textSub,fontSize:13,borderBottom:`1px solid ${C.border}`}}>{h}</th>
              ))}
            </tr></thead>
            <tbody>
              {STARTUPS.map(s=>(
                <tr key={s.id} onClick={()=>setMemberModal(s)} style={{cursor:'pointer',transition:'background 0.15s'}}
                  onMouseEnter={e=>e.currentTarget.style.background='#F8FAFC'}
                  onMouseLeave={e=>e.currentTarget.style.background='transparent'}>
                  <td style={{padding:'12px 16px',fontWeight:600,color:C.text}}>{s.avatar} {s.name}</td>
                  <td style={{padding:'12px 16px',color:C.textSub}}>셀러</td>
                  <td style={{padding:'12px 16px',color:C.textSub}}>{s.industry}</td>
                  <td style={{padding:'12px 16px',color:C.textSub}}>{s.country}</td>
                  <td style={{padding:'12px 16px',fontWeight:600,color:C.text}}>{s.matched}건</td>
                  <td style={{padding:'12px 16px'}}><StatusBadge status={s.status} /></td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      )}

      {tab==='notices' && (
        <div>
          <div style={{display:'flex',justifyContent:'flex-end',marginBottom:12}}>
            <button onClick={()=>setNoticeModal(true)} style={{padding:'9px 18px',background:C.primary,border:'none',borderRadius:9,color:'#fff',cursor:'pointer',fontWeight:600,fontSize:14}}>
              + 공지사항 등록
            </button>
          </div>
          <div style={{display:'flex',flexDirection:'column',gap:10}}>
            {NOTICES.map(n=>(
              <div key={n.id} style={{background:C.surface,borderRadius:10,padding:'16px 20px',border:`1px solid ${C.border}`,display:'flex',justifyContent:'space-between',alignItems:'center',cursor:'pointer'}}
                onClick={()=>onToast(`"${n.title}" 공지를 열람합니다`)}>
                <div>
                  <div style={{fontWeight:600,fontSize:14,color:C.text,marginBottom:4}}>{n.title}</div>
                  <div style={{fontSize:12,color:C.textSub}}>📎 {n.file} · {n.date}</div>
                </div>
                <button onClick={e=>{e.stopPropagation();onToast(`${n.file} 다운로드`)}} style={{padding:'6px 12px',border:`1.5px solid ${C.border}`,borderRadius:7,background:C.surface,cursor:'pointer',fontSize:12,fontWeight:600}}>
                  ⬇ 첨부
                </button>
              </div>
            ))}
          </div>
        </div>
      )}

      {noticeModal && (
        <Modal title="공지사항 등록" onClose={()=>setNoticeModal(false)}>
          <div style={{marginBottom:14}}>
            <label style={{fontSize:13,fontWeight:600,color:C.text,display:'block',marginBottom:6}}>제목</label>
            <input style={{width:'100%',padding:'9px 12px',border:`1.5px solid ${C.border}`,borderRadius:9,fontSize:14}} placeholder="공지사항 제목 입력" />
          </div>
          <div style={{marginBottom:14}}>
            <label style={{fontSize:13,fontWeight:600,color:C.text,display:'block',marginBottom:6}}>내용</label>
            <textarea rows={4} style={{width:'100%',padding:'9px 12px',border:`1.5px solid ${C.border}`,borderRadius:9,fontSize:14,resize:'none',fontFamily:'inherit'}} placeholder="공지사항 내용을 입력하세요" />
          </div>
          <div style={{marginBottom:20}}>
            <label style={{fontSize:13,fontWeight:600,color:C.text,display:'block',marginBottom:6}}>첨부파일</label>
            <div style={{border:`2px dashed ${C.border}`,borderRadius:9,padding:'20px',textAlign:'center',color:C.textSub,fontSize:13,cursor:'pointer'}}
              onClick={()=>onToast('파일 선택 창이 열립니다')}>
              📎 클릭하여 파일 첨부
            </div>
          </div>
          <div style={{display:'flex',gap:10}}>
            <button onClick={()=>setNoticeModal(false)} style={{flex:1,padding:'10px',border:`1.5px solid ${C.border}`,borderRadius:9,background:C.surface,cursor:'pointer',fontWeight:600,fontSize:14}}>취소</button>
            <button onClick={()=>{setNoticeModal(false);onToast('공지사항이 등록되었습니다');}}
              style={{flex:1,padding:'10px',border:'none',borderRadius:9,background:C.primary,color:'#fff',cursor:'pointer',fontWeight:600,fontSize:14}}>등록</button>
          </div>
        </Modal>
      )}

      {memberModal && (
        <Modal title={memberModal.name} onClose={()=>setMemberModal(null)}>
          <div style={{fontSize:36,marginBottom:12}}>{memberModal.avatar}</div>
          <div style={{display:'flex',gap:8,marginBottom:16}}>
            <StageBadge stage={memberModal.stage} />
            <span className="badge" style={{background:'#F1F5F9',color:C.textSub}}>{memberModal.industry}</span>
          </div>
          <p style={{color:C.textSub,fontSize:14,marginBottom:16,lineHeight:1.6}}>{memberModal.desc}</p>
          <div style={{marginBottom:16}}>
            <label style={{fontSize:13,fontWeight:600,color:C.text,display:'block',marginBottom:6}}>관리자 메모</label>
            <textarea rows={3} style={{width:'100%',padding:'9px 12px',border:`1.5px solid ${C.border}`,borderRadius:9,fontSize:14,resize:'none',fontFamily:'inherit'}} defaultValue="VIP 셀러 — 사전 인터뷰 완료" />
          </div>
          <button onClick={()=>{setMemberModal(null);onToast('메모가 저장되었습니다');}}
            style={{width:'100%',padding:'10px',border:'none',borderRadius:9,background:C.primary,color:'#fff',cursor:'pointer',fontWeight:600,fontSize:14}}>저장</button>
        </Modal>
      )}
    </div>
  );
}

// ===== 메인 APP =====
const NAV_ITEMS = [
  {id:'B2B 매칭 및 탐색',icon:'🔍',label:'B2B 매칭 및 탐색'},
  {id:'미팅 스케줄링',icon:'📅',label:'미팅 스케줄링'},
  {id:'IR 덱 뷰어',icon:'📄',label:'IR 덱 뷰어'},
  {id:'관리자 대시보드',icon:'📊',label:'관리자 대시보드'},
];

function App() {
  const [page,setPage] = useState('B2B 매칭 및 탐색');
  const [toast,setToast] = useState(null);

  function showToast(msg) {
    setToast(msg);
    setTimeout(()=>setToast(null),2500);
  }

  function renderPage() {
    if (page==='B2B 매칭 및 탐색') return <PageMatching onToast={showToast} />;
    if (page==='미팅 스케줄링') return <PageScheduling onToast={showToast} />;
    if (page==='IR 덱 뷰어') return <PageIRDeck onToast={showToast} />;
    if (page==='관리자 대시보드') return <PageAdmin onToast={showToast} />;
  }

  return (
    <div style={{display:'flex',width:'100%',height:'100vh',overflow:'hidden'}}>
      {/* 사이드바 */}
      <aside style={{width:260,background:C.primary,flexShrink:0,display:'flex',flexDirection:'column',padding:'0 0 16px'}}>
        <div style={{padding:'20px 20px 16px',borderBottom:'1px solid rgba(255,255,255,0.08)'}}>
          <div style={{color:'#fff',fontWeight:800,fontSize:17,letterSpacing:-0.5}}>🌐 GlobalMatch</div>
          <div style={{color:'rgba(255,255,255,0.45)',fontSize:11,marginTop:3}}>B2B 매칭 플랫폼</div>
        </div>
        <div style={{flex:1,padding:'12px 10px',overflowY:'auto'}}>
          {NAV_ITEMS.map(item=>(
            <button key={item.id} onClick={()=>setPage(item.id)}
              style={{width:'100%',display:'flex',alignItems:'center',gap:10,padding:'10px 12px',border:'none',borderRadius:9,cursor:'pointer',marginBottom:2,textAlign:'left',fontFamily:'inherit',transition:'all 0.15s',
                background:page===item.id?'rgba(255,255,255,0.12)':'transparent',
                color:page===item.id?'#fff':'rgba(255,255,255,0.6)',
                fontWeight:page===item.id?600:400,fontSize:14,
                borderLeft:page===item.id?`3px solid ${C.accent}`:'3px solid transparent'}}>
              <span style={{fontSize:16}}>{item.icon}</span>{item.label}
            </button>
          ))}
        </div>
        <div style={{padding:'12px 20px',borderTop:'1px solid rgba(255,255,255,0.08)'}}>
          <div style={{display:'flex',alignItems:'center',gap:10}}>
            <div style={{width:34,height:34,borderRadius:'50%',background:C.secondary,display:'flex',alignItems:'center',justifyContent:'center',fontSize:14,fontWeight:700,color:'#fff'}}>K</div>
            <div>
              <div style={{color:'#fff',fontWeight:600,fontSize:13}}>김수빈</div>
              <div style={{color:'rgba(255,255,255,0.45)',fontSize:11}}>바이어 · KV Partners</div>
            </div>
          </div>
        </div>
      </aside>

      {/* 메인 영역 */}
      <div style={{flex:1,display:'flex',flexDirection:'column',overflow:'hidden'}}>
        <header style={{background:C.surface,borderBottom:`1px solid ${C.border}`,padding:'0 24px',height:60,display:'flex',alignItems:'center',justifyContent:'space-between',flexShrink:0}}>
          <div>
            <div style={{fontWeight:700,fontSize:16,color:C.text}}>{page}</div>
            <div style={{fontSize:12,color:C.textSub}}>글로벌 스타트업 박람회 2026 · 10월 14~16일</div>
          </div>
          <div style={{display:'flex',gap:12,alignItems:'center'}}>
            <span style={{background:'#FEF3C7',color:'#92400E',fontSize:12,fontWeight:600,padding:'4px 10px',borderRadius:6}}>D-182 · 박람회까지</span>
            <div style={{width:34,height:34,borderRadius:'50%',background:'#EFF6FF',display:'flex',alignItems:'center',justifyContent:'center',fontSize:18}}>🔔</div>
          </div>
        </header>
        <main style={{flex:1,overflow:'auto',padding:24}}>
          {renderPage()}
        </main>
      </div>

      {toast && <Toast msg={toast} onClose={()=>setToast(null)} />}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
