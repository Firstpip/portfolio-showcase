// ===== 세션 예약 및 스케줄러 =====
function TabScheduler({lang,onToast}) {
  const [drawer,setDrawer] = useState(null);
  const [dayFilter,setDayFilter] = useState('전체');
  const t = LANGS[lang];

  const days = ['전체','1일차','2일차','3일차'];
  const filtered = SESSIONS.filter(s=>dayFilter==='전체'||s.day===dayFilter);

  return (
    <div className="fade-in">
      <div style={{display:'flex',gap:10,marginBottom:20}}>
        {days.map(d=>(
          <button key={d} onClick={()=>setDayFilter(d)}
            style={{padding:'8px 18px',border:'none',borderRadius:9,cursor:'pointer',fontWeight:600,fontSize:13,
              background:dayFilter===d?C.primary:'#EDE9FE',color:dayFilter===d?'#fff':C.primary,transition:'all 0.15s'}}>
            {d}
          </button>
        ))}
      </div>
      <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(320px,1fr))',gap:16}}>
        {filtered.map(s=>{
          const full = s.registered >= s.cap;
          const pct = Math.min(100, s.registered/s.cap*100);
          return (
            <div key={s.id} onClick={()=>setDrawer(s)} className="card" style={{padding:20,cursor:'pointer',transition:'transform 0.2s,box-shadow 0.2s'}}
              onMouseEnter={e=>{e.currentTarget.style.transform='translateY(-3px)';e.currentTarget.style.boxShadow='0 10px 30px rgba(91,63,214,0.16)'}}
              onMouseLeave={e=>{e.currentTarget.style.transform='translateY(0)';e.currentTarget.style.boxShadow='0 4px 16px rgba(91,63,214,0.08)'}}>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:10}}>
                <div style={{width:10,height:10,borderRadius:'50%',background:s.color,marginTop:4}} />
                <span className="badge" style={{background:full?'#FEE2E2':'#D1FAE5',color:full?'#991B1B':'#065F46'}}>
                  {full?t.full:t.available}
                </span>
              </div>
              <div style={{fontWeight:700,fontSize:15,color:C.text,marginBottom:6,lineHeight:1.3}}>{s.title}</div>
              <div style={{fontSize:13,color:C.textSub,marginBottom:10}}>{s.speaker}</div>
              <div style={{display:'flex',gap:8,flexWrap:'wrap',marginBottom:12}}>
                {s.tags.map(tag=><span key={tag} className="badge" style={{background:'#EDE9FE',color:C.primary,fontSize:11}}>{tag}</span>)}
              </div>
              <div style={{fontSize:12,color:C.textSub,marginBottom:10}}>{s.day} · {s.time} · {s.hall}</div>
              <div style={{background:'#F5F4FF',borderRadius:4,height:6,marginBottom:6}}>
                <div style={{width:`${pct}%`,background:full?'#EF4444':C.primary,borderRadius:4,height:6}} />
              </div>
              <div style={{fontSize:11,color:C.textSub}}>{s.registered}/{s.cap}명 등록</div>
            </div>
          );
        })}
      </div>
      {drawer && <Drawer item={drawer} lang={lang} onClose={()=>setDrawer(null)} onToast={onToast} />}
    </div>
  );
}

          {t.nav.map((label,i)=>(

          ))}

        {/* KPI 카드 미리보기 */}
        <div className="card" style={{padding:20}}>
          <div style={{fontWeight:700,fontSize:14,color:C.text,marginBottom:14}}>KPI 현황</div>
          {t.kpis.map((k,i)=>(

            </div>
          </div>
          <div style={{padding:'12px 20px',borderTop:`1px solid ${C.border}`,display:'flex',justifyContent:'center',gap:10,alignItems:'center'}}>
            <button onClick={()=>setPage(p=>Math.max(1,p-1))} disabled={page===1}
              style={{padding:'7px 16px',border:`1.5px solid ${C.border}`,borderRadius:7,cursor:page===1?'not-allowed':'pointer',background:'#fff',fontWeight:600,fontSize:13}}>‹</button>
            <span style={{fontSize:13,color:C.textSub}}>{page} / {selected.slides}</span>
            <button onClick={()=>setPage(p=>Math.min(selected.slides,p+1))} disabled={page===selected.slides}
              style={{padding:'7px 16px',border:`1.5px solid ${C.border}`,borderRadius:7,cursor:page===selected.slides?'not-allowed':'pointer',background:'#fff',fontWeight:600,fontSize:13}}>›</button>
          </div>
        </div>
      </div>

      {uploadModal && (
        <>
          <div onClick={()=>setUploadModal(false)} style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.45)',zIndex:500}} />
          <div style={{position:'fixed',top:'50%',left:'50%',transform:'translate(-50%,-50%)',width:480,background:'#fff',borderRadius:16,padding:28,zIndex:501,boxShadow:'0 20px 60px rgba(0,0,0,0.2)'}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:20}}>
              <h3 style={{fontWeight:700,fontSize:18,color:C.text}}>발표 자료 업로드</h3>
              <button onClick={()=>setUploadModal(false)} style={{border:'none',background:'none',fontSize:20,cursor:'pointer',color:C.textSub}}>✕</button>
            </div>
            <div style={{marginBottom:14}}>
              <label style={{fontSize:13,fontWeight:600,color:C.text,display:'block',marginBottom:6}}>세션 선택</label>
              <select style={{width:'100%',padding:'9px 12px',border:`1.5px solid ${C.border}`,borderRadius:9,fontSize:14,background:'#fff'}}>
                {SESSIONS.map(s=><option key={s.id}>{s.title}</option>)}
              </select>
            </div>
            <div style={{marginBottom:14}}>
              <label style={{fontSize:13,fontWeight:600,color:C.text,display:'block',marginBottom:6}}>발표 자료 (PDF)</label>
              <div style={{border:`2px dashed ${C.border}`,borderRadius:9,padding:'24px',textAlign:'center',color:C.textSub,fontSize:13,cursor:'pointer',background:'#F5F4FF'}}
                onClick={()=>onToast('파일 선택 창이 열립니다')}>
                📎 PDF 파일을 드래그하거나 클릭하여 업로드
              </div>
            </div>
            <div style={{marginBottom:20}}>
              <label style={{fontSize:13,fontWeight:600,color:C.text,display:'block',marginBottom:6}}>공개 설정</label>
              <select style={{width:'100%',padding:'9px 12px',border:`1.5px solid ${C.border}`,borderRadius:9,fontSize:14,background:'#fff'}}>
                <option>등록 참가자 전체 공개</option>
                <option>해당 세션 예약자만 공개</option>
                <option>비공개 (관리자만)</option>
              </select>
            </div>
            <div style={{display:'flex',gap:10}}>
              <button onClick={()=>setUploadModal(false)} style={{flex:1,padding:'10px',border:`1.5px solid ${C.border}`,borderRadius:9,background:'#fff',cursor:'pointer',fontWeight:600,fontSize:14}}>취소</button>
              <button onClick={()=>{setUploadModal(false);onToast('발표 자료가 업로드되었습니다');}}
                style={{flex:1,padding:'10px',border:'none',borderRadius:9,background:C.primary,color:'#fff',cursor:'pointer',fontWeight:600,fontSize:14}}>업로드</button>
            </div>
          </div>
        </>
      )}
    </div>
  );
}

// ===== 참가자 등록 및 뱃지 발급 =====
function TabBadge({lang,onToast}) {
  const [registrations,setRegistrations] = useState(REGISTRATIONS);
  const [search,setSearch] = useState('');
  const [regModal,setRegModal] = useState(false);
  const [badgePreview,setBadgePreview] = useState(null);

  const filtered = registrations.filter(r=>r.name.includes(search)||r.company.includes(search));

  function issueAll() {
    setRegistrations(p=>p.map(r=>({...r,issued:true})));
    onToast('전체 뱃지 발급이 완료되었습니다');
  }

  return (
    <div className="fade-in">
      <div style={{display:'flex',gap:10,marginBottom:16,flexWrap:'wrap',alignItems:'center'}}>
        <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="이름 또는 소속 검색..."
          style={{flex:'1 1 200px',padding:'9px 14px',border:`1.5px solid ${C.border}`,borderRadius:9,fontSize:14,outline:'none',background:'#fff'}} />
        <button onClick={()=>setRegModal(true)} style={{padding:'9px 16px',background:C.primary,border:'none',borderRadius:9,color:'#fff',cursor:'pointer',fontWeight:600,fontSize:14}}>
          + 참가자 등록
        </button>
        <button onClick={issueAll} style={{padding:'9px 16px',background:'#059669',border:'none',borderRadius:9,color:'#fff',cursor:'pointer',fontWeight:600,fontSize:14}}>
          전체 뱃지 발급
        </button>
      </div>

      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>
        {filtered.map(r=>(
          <div key={r.id} className="card" style={{padding:18,cursor:'pointer'}} onClick={()=>setBadgePreview(r)}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:10}}>
              <div>
                <div style={{fontWeight:700,fontSize:15,color:C.text,marginBottom:2}}>{r.name}</div>
                <div style={{fontSize:12,color:C.textSub}}>{r.role} · {r.company}</div>
              </div>
              <span className="badge" style={{background:r.issued?'#D1FAE5':'#FEF3C7',color:r.issued?'#065F46':'#92400E'}}>
                {r.issued?'발급완료':'대기'}
              </span>
            </div>
            <div style={{display:'flex',gap:8,alignItems:'center',fontSize:12,color:C.textSub}}>
              <span>🌏 {r.country}</span>
              <span>🏷️ {r.badge}</span>
            </div>
          </div>
        ))}
      </div>

      {/* 뱃지 프리뷰 모달 */}
      {badgePreview && (
        <>
          <div onClick={()=>setBadgePreview(null)} style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.5)',zIndex:500}} />
          <div style={{position:'fixed',top:'50%',left:'50%',transform:'translate(-50%,-50%)',width:380,background:'#fff',borderRadius:16,padding:28,zIndex:501,boxShadow:'0 20px 60px rgba(0,0,0,0.2)'}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:20}}>
              <h3 style={{fontWeight:700,fontSize:17,color:C.text}}>뱃지 미리보기</h3>
              <button onClick={()=>setBadgePreview(null)} style={{border:'none',background:'none',fontSize:20,cursor:'pointer',color:C.textSub}}>✕</button>
            </div>
            {/* 뱃지 디자인 */}
            <div style={{background:`linear-gradient(135deg,${C.primary},${C.accent})`,borderRadius:12,padding:24,textAlign:'center',marginBottom:20,color:'#fff'}}>
              <div style={{fontSize:11,opacity:0.7,marginBottom:4,letterSpacing:1}}>2026 TECH INNOVATORS SUMMIT</div>
              <div style={{width:60,height:60,borderRadius:'50%',background:'rgba(255,255,255,0.2)',margin:'0 auto 12px',display:'flex',alignItems:'center',justifyContent:'center',fontSize:28}}>
                {badgePreview.name[0]}
              </div>
              <div style={{fontWeight:800,fontSize:20,marginBottom:4}}>{badgePreview.name}</div>
              <div style={{fontSize:13,opacity:0.85}}>{badgePreview.role} · {badgePreview.company}</div>
              <div style={{marginTop:12,padding:'6px 12px',background:'rgba(255,255,255,0.1)',borderRadius:6,fontSize:12}}>{badgePreview.badge}</div>
            </div>
            <button onClick={()=>{
              setRegistrations(p=>p.map(r=>r.id===badgePreview.id?{...r,issued:true}:r));
              setBadgePreview(null);
              onToast(`${badgePreview.name} 뱃지가 발급되었습니다`);
            }} style={{width:'100%',padding:'11px',border:'none',borderRadius:10,background:C.primary,color:'#fff',cursor:'pointer',fontWeight:700,fontSize:15}}>
              🖨️ 뱃지 출력 및 발급
            </button>
          </div>
        </>
      )}

      {regModal && (
        <>
          <div onClick={()=>setRegModal(false)} style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.45)',zIndex:500}} />
          <div style={{position:'fixed',top:'50%',left:'50%',transform:'translate(-50%,-50%)',width:480,background:'#fff',borderRadius:16,padding:28,zIndex:501,boxShadow:'0 20px 60px rgba(0,0,0,0.2)'}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:20}}>
              <h3 style={{fontWeight:700,fontSize:18,color:C.text}}>참가자 신규 등록</h3>
              <button onClick={()=>setRegModal(false)} style={{border:'none',background:'none',fontSize:20,cursor:'pointer',color:C.textSub}}>✕</button>
            </div>
            {[['이름','text','홍길동'],['소속 기업','text','네이버'],['직함/역할','text','개발자'],['국가','text','한국']].map(([l,type,ph])=>(
              <div key={l} style={{marginBottom:14}}>
                <label style={{fontSize:13,fontWeight:600,color:C.text,display:'block',marginBottom:6}}>{l}</label>
                <input type={type} placeholder={ph} style={{width:'100%',padding:'9px 12px',border:`1.5px solid ${C.border}`,borderRadius:9,fontSize:14}} />
              </div>
            ))}
            <div style={{display:'flex',gap:10,marginTop:6}}>
              <button onClick={()=>setRegModal(false)} style={{flex:1,padding:'10px',border:`1.5px solid ${C.border}`,borderRadius:9,background:'#fff',cursor:'pointer',fontWeight:600,fontSize:14}}>취소</button>
              <button onClick={()=>{setRegModal(false);onToast('참가자가 등록되었습니다');}}
                style={{flex:1,padding:'10px',border:'none',borderRadius:9,background:C.primary,color:'#fff',cursor:'pointer',fontWeight:600,fontSize:14}}>등록</button>
            </div>
          </div>
        </>
      )}
    </div>
  );
}

// ===== 메인 APP =====
const TABS = [
  {id:'세션 예약 및 스케줄러',en:'Session Scheduler',ja:'セッション予約',icon:'📅'},
  {id:'다국어 UI 전환 (한/영/일)',en:'Multilingual UI',ja:'多言語UI',icon:'🌐'},
  {id:'발표 자료 업로드 및 뷰어',en:'Material Viewer',ja:'資料ビューア',icon:'📄'},
  {id:'참가자 등록 및 뱃지 발급',en:'Badge Issuance',ja:'バッジ発行',icon:'🏷️'},
];

const PAGE_HEROES = {
  '세션 예약 및 스케줄러':{gradient:`linear-gradient(135deg,${C.primary},#7C3AED)`,kpis:[{l:'전체 세션',v:'24개'},{l:'예약 가능',v:'18개'},{l:'총 참가 인원',v:'1,284명'}]},
  '다국어 UI 전환 (한/영/일)':{gradient:`linear-gradient(135deg,#0891B2,#5B3FD6)`,kpis:[{l:'지원 언어',v:'3개'},{l:'다국어 문자열',v:'342개'},{l:'해외 참가자',v:'38%'}]},
  '발표 자료 업로드 및 뷰어':{gradient:`linear-gradient(135deg,#DB2777,#7C3AED)`,kpis:[{l:'업로드 자료',v:'24건'},{l:'총 슬라이드',v:'892장'},{l:'다운로드',v:'1,284회'}]},
  '참가자 등록 및 뱃지 발급':{gradient:`linear-gradient(135deg,#059669,#0891B2)`,kpis:[{l:'등록 참가자',v:'1,284명'},{l:'뱃지 발급',v:'1,190장'},{l:'미발급',v:'94명'}]},
};

function App() {
  const [tab,setTab] = useState('세션 예약 및 스케줄러');
  const [lang,setLang] = useState('ko');
  const [toast,setToast] = useState(null);

  function showToast(msg) { setToast(msg); setTimeout(()=>setToast(null),2500); }

  const hero = PAGE_HEROES[tab];
  const t = LANGS[lang];

  function tabLabel(item) {
    if (lang==='en') return item.en;
    if (lang==='ja') return item.ja;
    return item.id;
  }

  return (
    <div style={{display:'flex',flexDirection:'column',width:'100%',minHeight:'100vh',background:C.bg}}>
      {/* 탑 네비 */}
      <header style={{position:'sticky',top:0,zIndex:100,background:C.surface,borderBottom:`1px solid ${C.border}`,height:56,display:'flex',alignItems:'center',padding:'0 32px',gap:4,flexShrink:0}}>
        <div style={{fontWeight:800,fontSize:17,color:C.primary,marginRight:16,whiteSpace:'nowrap'}}>🌐 ConfManager</div>
        {TABS.map(item=>(
          <button key={item.id} onClick={()=>setTab(item.id)}
            style={{padding:'0 14px',height:56,border:'none',background:'none',cursor:'pointer',fontWeight:600,fontSize:14,whiteSpace:'nowrap',
              color:tab===item.id?C.primary:C.textSub,
              borderBottom:tab===item.id?`2.5px solid ${C.primary}`:'2.5px solid transparent',
              transition:'all 0.15s'}}>
            {item.icon} {tabLabel(item)}
          </button>
        ))}
        <div style={{flex:1}} />
        <div style={{display:'flex',gap:8,alignItems:'center'}}>
          {[['ko','🇰🇷'],['en','🇺🇸'],['ja','🇯🇵']].map(([code,flag])=>(
            <button key={code} onClick={()=>setLang(code)}
              style={{padding:'4px 10px',border:`1.5px solid ${lang===code?C.primary:C.border}`,borderRadius:7,cursor:'pointer',fontSize:14,
                background:lang===code?C.primary:'#fff',color:lang===code?'#fff':C.textSub,fontWeight:600,transition:'all 0.15s'}}>
              {flag}
            </button>
          ))}
        </div>
      </header>

      {/* 히어로 배너 */}
      <div style={{background:hero.gradient,padding:'24px 32px',color:'#fff'}}>
        <h1 style={{fontWeight:800,fontSize:22,marginBottom:4}}>{TABS.find(t2=>t2.id===tab)&&(lang==='en'?TABS.find(t2=>t2.id===tab).en:lang==='ja'?TABS.find(t2=>t2.id===tab).ja:tab)}</h1>
        <div style={{fontSize:13,opacity:0.75,marginBottom:14}}>{t.subtitle}</div>
        <div style={{display:'flex',gap:24,flexWrap:'wrap'}}>
          {hero.kpis.map(k=>(
            <div key={k.l}>
              <div style={{fontWeight:700,fontSize:20}}>{k.v}</div>
              <div style={{fontSize:12,opacity:0.7}}>{k.l}</div>
            </div>
          ))}
        </div>
      </div>

      {/* 콘텐츠 */}
      <main style={{flex:1,padding:'24px 32px'}}>
        {tab==='세션 예약 및 스케줄러' && <TabScheduler lang={lang} onToast={showToast} />}
        {tab==='다국어 UI 전환 (한/영/일)' && <TabMultilang lang={lang} setLang={setLang} />}
        {tab==='발표 자료 업로드 및 뷰어' && <TabMaterialViewer lang={lang} onToast={showToast} />}
        {tab==='참가자 등록 및 뱃지 발급' && <TabBadge lang={lang} onToast={showToast} />}
      </main>

      {toast && (
        <div style={{position:'fixed',bottom:28,right:28,background:'#1E1B4B',color:'#fff',padding:'12px 20px',borderRadius:10,fontSize:14,fontWeight:500,zIndex:600,boxShadow:'0 8px 24px rgba(0,0,0,0.2)',display:'flex',gap:10,alignItems:'center'}}>
          ✅ {toast}
          <button onClick={()=>setToast(null)} style={{border:'none',background:'none',color:'#94A3B8',cursor:'pointer',fontSize:16}}>✕</button>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
