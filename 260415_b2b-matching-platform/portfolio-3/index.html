  {id:4,company:'스페이스커머스',invested:'8억',stage:'시리즈A',irr:'-2.1%',status:'주의',month:'2025-11'},

function DetailPanel({item,onClose,onToast,type}) {
  if (!item) return null;
  return (
    <div style={{width:360,borderLeft:`1px solid ${C.border}`,background:C.surface,flexShrink:0,display:'flex',flexDirection:'column',overflowY:'auto'}} className="fade-in">
      <div style={{padding:'16px 20px',borderBottom:`1px solid ${C.border}`,display:'flex',justifyContent:'space-between',alignItems:'center',background:'#F0FDF4'}}>
        <span style={{fontWeight:700,fontSize:15,color:C.text}}>{type==='startup'?'스타트업 상세':type==='event'?'이벤트 상세':'포트폴리오 상세'}</span>
        <button onClick={onClose} style={{border:'none',background:'none',fontSize:18,cursor:'pointer',color:C.textSub}}>✕</button>
      </div>
      <div style={{padding:20,flex:1}}>
        {type==='startup' && (
          <>
            <div style={{textAlign:'center',marginBottom:20}}>
              <div style={{fontSize:48,marginBottom:8}}>{item.avatar}</div>
              <div style={{fontWeight:800,fontSize:18,color:C.text,marginBottom:4}}>{item.name}</div>
              <div style={{display:'flex',justifyContent:'center',gap:6}}>
                {item.tags.map(t=><span key={t} className="badge" style={{background:'#D1FAE5',color:C.secondary,fontSize:11}}>{t}</span>)}
              </div>
            </div>
            <div style={{background:'linear-gradient(135deg,#059669,#34D399)',borderRadius:12,padding:16,marginBottom:16,color:'#fff',textAlign:'center'}}>
              <div style={{fontSize:36,fontWeight:800}}>{item.match}%</div>
              <div style={{fontSize:13,opacity:0.85}}>AI 매칭 적합도</div>
            </div>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginBottom:16}}>
              {[['단계',item.stage],['누적 투자',item.raised],['AI 점수',item.score+'점'],['상태',item.status==='hot'?'🔥 핫':'🌱 신규']].map(([k,v])=>(
                <div key={k} style={{background:'#F0FDF4',borderRadius:10,padding:12}}>
                  <div style={{fontSize:11,color:C.textSub,marginBottom:2}}>{k}</div>
                  <div style={{fontSize:14,fontWeight:700,color:C.text}}>{v}</div>
                </div>
              ))}
            </div>
            <div style={{marginBottom:16}}>
              <label style={{fontSize:13,fontWeight:600,color:C.text,display:'block',marginBottom:6}}>투자자 메모</label>
              <textarea rows={3} style={{width:'100%',padding:'9px 12px',border:`1.5px solid ${C.border}`,borderRadius:9,fontSize:13,resize:'none',fontFamily:'inherit'}} placeholder="미팅 인상, 후속 검토 사항 등..." />
            </div>
            <div style={{display:'flex',gap:8}}>
              <button onClick={()=>onToast(`${item.ir} IR 덱 열람`)} style={{flex:1,padding:'9px',border:`1.5px solid ${C.border}`,borderRadius:9,background:C.surface,cursor:'pointer',fontWeight:600,fontSize:13}}>📄 IR 열람</button>
              <button onClick={()=>onToast(`${item.name} 화상 미팅 예약`)} style={{flex:1,padding:'9px',border:'none',borderRadius:9,background:C.primary,color:'#fff',cursor:'pointer',fontWeight:600,fontSize:13}}>🎥 미팅 예약</button>
            </div>
          </>
        )}

        {type==='event' && (
          <>
            <div style={{background:'linear-gradient(135deg,#059669,#0891B2)',borderRadius:12,padding:20,marginBottom:16,color:'#fff'}}>
              <div style={{fontSize:16,fontWeight:800,marginBottom:6}}>{item.name}</div>
              <div style={{fontSize:12,opacity:0.8}}>{item.date} ~ {item.endDate}</div>
            </div>
            {[['세션 수',item.sessions+'개'],['등록 참가자',item.registered.toLocaleString()+'명'],['테넌트 ID',item.tenant]].map(([k,v])=>(
              <div key={k} style={{display:'flex',justifyContent:'space-between',padding:'12px 0',borderBottom:`1px solid ${C.border}`,fontSize:14}}>
                <span style={{color:C.textSub}}>{k}</span><span style={{fontWeight:700,color:C.text}}>{v}</span>

            <div style={{textAlign:'center',padding:'20px 0 16px'}}>

              <div style={{fontSize:13,color:C.textSub,marginBottom:12}}>{item.stage} · 투자 {item.month}</div>
              <div style={{fontSize:36,fontWeight:800,color:item.irr.startsWith('+')?'#059669':'#DC2626'}}>{item.irr}</div>
              <div style={{fontSize:12,color:C.textSub,marginTop:4}}>수익률 (IRR)</div>
            </div>
            <div style={{background:'#F0FDF4',borderRadius:10,padding:16,marginBottom:16,fontSize:14}}>
              <div style={{display:'flex',justifyContent:'space-between',marginBottom:8}}>
                <span style={{color:C.textSub}}>투자 금액</span>
                <span style={{fontWeight:700,color:C.text}}>{item.invested}</span>
              </div>
              <div style={{display:'flex',justifyContent:'space-between'}}>
                <span style={{color:C.textSub}}>현재 상태</span>
                <span className="badge" style={{background:item.status==='성장'?'#D1FAE5':item.status==='주의'?'#FEE2E2':'#FEF3C7',color:item.status==='성장'?'#065F46':item.status==='주의'?'#991B1B':'#92400E'}}>{item.status}</span>
              </div>
            </div>
            <div style={{marginBottom:16}}>
              <label style={{fontSize:13,fontWeight:600,color:C.text,display:'block',marginBottom:6}}>후속 투자 검토</label>
              <select style={{width:'100%',padding:'9px 12px',border:`1.5px solid ${C.border}`,borderRadius:9,fontSize:14,background:C.surface}}>
                <option>적극 검토 중</option><option>관망</option><option>보류</option>
              </select>
            </div>
            <button onClick={()=>onToast('포트폴리오 보고서 생성')} style={{width:'100%',padding:'10px',border:'none',borderRadius:9,background:C.primary,color:'#fff',cursor:'pointer',fontWeight:600,fontSize:14}}>
              📋 보고서 생성
            </button>
          </>
        )}
      </div>
    </div>
  );
}

// ===== AI 추천 매칭 엔진 =====
function SectionAIMatching({onToast,onSelect,selected}) {
  const [sort,setSort] = useState('match');
  const [filter,setFilter] = useState('전체');
  const sorted = [...STARTUPS_AI]
    .filter(s=>filter==='전체'||s.industry===filter)
    .sort((a,b)=>sort==='match'?b.match-a.match:b.score-a.score);

  return (
    <div className="fade-in">
      <div style={{background:'linear-gradient(135deg,#059669,#34D399)',borderRadius:14,padding:20,color:'#fff',marginBottom:20,display:'flex',justifyContent:'space-between',alignItems:'center'}}>
        <div>
          <div style={{fontSize:13,opacity:0.8,marginBottom:4}}>pgvector 임베딩 기반 유사도 분석</div>
          <div style={{fontWeight:800,fontSize:17}}>AI 투자 매칭 추천 엔진</div>
        </div>
        <div style={{background:'rgba(255,255,255,0.15)',borderRadius:10,padding:'10px 16px',textAlign:'center'}}>
          <div style={{fontSize:24,fontWeight:800}}>{STARTUPS_AI.length}</div>
          <div style={{fontSize:11,opacity:0.8}}>활성 후보</div>
        </div>
      </div>

      <div style={{display:'flex',gap:10,marginBottom:16,flexWrap:'wrap',alignItems:'center'}}>
        <select value={filter} onChange={e=>setFilter(e.target.value)}
          style={{padding:'8px 12px',border:`1.5px solid ${C.border}`,borderRadius:9,fontSize:13,background:C.surface,cursor:'pointer'}}>
          {['전체','핀테크','클린테크','헬스케어','물류','에듀테크','이커머스'].map(i=><option key={i}>{i}</option>)}
        </select>
        <div style={{display:'flex',gap:6}}>
          {[['match','매칭률'],['score','AI 점수']].map(([key,label])=>(
            <button key={key} onClick={()=>setSort(key)}
              style={{padding:'8px 14px',border:'none',borderRadius:9,cursor:'pointer',fontWeight:600,fontSize:13,
                background:sort===key?C.primary:'#D1FAE5',color:sort===key?'#fff':C.secondary,transition:'all 0.15s'}}>
              {label} 순
            </button>
          ))}
        </div>
      </div>

      <div style={{display:'flex',flexDirection:'column',gap:10}}>
        {sorted.map((s,i)=>(
          <div key={s.id} onClick={()=>onSelect(s,'startup')}
            style={{background:C.surface,borderRadius:12,padding:'14px 16px',border:`1.5px solid ${selected?.id===s.id?C.primary:C.border}`,cursor:'pointer',display:'flex',alignItems:'center',gap:14,transition:'all 0.15s',boxShadow:selected?.id===s.id?'0 4px 16px rgba(5,150,105,0.15)':'none'}}
            onMouseEnter={e=>e.currentTarget.style.background='#F0FDF4'}
            onMouseLeave={e=>e.currentTarget.style.background=C.surface}>
            <div style={{width:32,height:32,borderRadius:8,background:'#D1FAE5',display:'flex',alignItems:'center',justifyContent:'center',fontWeight:700,color:C.secondary,fontSize:12,flexShrink:0}}>
              #{i+1}
            </div>
            <span style={{fontSize:28,flexShrink:0}}>{s.avatar}</span>
            <div style={{flex:1,minWidth:0}}>
              <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:3}}>
                <span style={{fontWeight:700,fontSize:14,color:C.text}}>{s.name}</span>
                {s.status==='hot'&&<span style={{fontSize:12}}>🔥</span>}
                <span className="badge" style={{background:'#D1FAE5',color:C.secondary,fontSize:11}}>{s.stage}</span>
              </div>
              <div style={{display:'flex',gap:6,flexWrap:'wrap'}}>
                {s.tags.slice(0,2).map(t=><span key={t} style={{fontSize:11,color:C.textSub,background:'#F0FDF4',padding:'2px 8px',borderRadius:10}}>{t}</span>)}
              </div>
            </div>
            <div style={{textAlign:'right',flexShrink:0}}>
              <div style={{fontWeight:800,fontSize:20,color:C.primary}}>{s.match}%</div>
              <div style={{fontSize:11,color:C.textSub}}>매칭률</div>
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}

// ===== 화상 미팅 통합 스케줄러 =====

    <div className="fade-in">

        <div>
          <div style={{fontSize:13,opacity:0.8,marginBottom:4}}>Zoom API 자동화 통합</div>
          <div style={{fontWeight:800,fontSize:17}}>화상 미팅 스케줄러</div>
        </div>
        <button onClick={()=>setAddModal(true)} style={{padding:'9px 18px',background:'rgba(255,255,255,0.2)',border:'1px solid rgba(255,255,255,0.35)',borderRadius:9,color:'#fff',cursor:'pointer',fontWeight:600,fontSize:14}}>
          + 미팅 예약

      <div style={{display:'flex',flexDirection:'column',gap:10}}>
        {meetings.map(m=>(
          <div key={m.id} onClick={()=>onSelect(m,'meeting')}

            onMouseLeave={e=>e.currentTarget.style.background=C.surface}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:10}}>

                <div style={{fontWeight:700,fontSize:15,color:C.text,marginBottom:3}}>{m.company}</div>

              <span className="badge" style={{background:m.status==='confirmed'?'#D1FAE5':'#FEF3C7',color:m.status==='confirmed'?'#065F46':'#92400E'}}>

              <h3 style={{fontWeight:700,fontSize:18,color:C.text}}>화상 미팅 예약</h3>
              <button onClick={()=>setAddModal(false)} style={{border:'none',background:'none',fontSize:20,cursor:'pointer',color:C.textSub}}>✕</button>
            </div>

              <select style={{width:'100%',padding:'9px 12px',border:`1.5px solid ${C.border}`,borderRadius:9,fontSize:14,background:'#fff'}}>

              <div>
                <label style={{fontSize:13,fontWeight:600,color:C.text,display:'block',marginBottom:6}}>날짜</label>
                <input type="date" defaultValue="2026-04-25" style={{width:'100%',padding:'9px 12px',border:`1.5px solid ${C.border}`,borderRadius:9,fontSize:14}} />
              </div>
              <div>
                <label style={{fontSize:13,fontWeight:600,color:C.text,display:'block',marginBottom:6}}>시간</label>
                <input type="time" defaultValue="14:00" style={{width:'100%',padding:'9px 12px',border:`1.5px solid ${C.border}`,borderRadius:9,fontSize:14}} />
              </div>
            </div>
            <div style={{background:'#F0FDF4',borderRadius:9,padding:12,marginBottom:18,fontSize:13,color:C.secondary}}>
              🎥 Zoom API 자동으로 미팅 링크를 생성하고 참가자에게 이메일 발송합니다
            </div>
            <div style={{display:'flex',gap:10}}>
              <button onClick={()=>setAddModal(false)} style={{flex:1,padding:'10px',border:`1.5px solid ${C.border}`,borderRadius:9,background:'#fff',cursor:'pointer',fontWeight:600,fontSize:14}}>취소</button>
              <button onClick={()=>{setAddModal(false);setMeetings(p=>[...p,{id:Date.now(),company:'에듀테크넥스트',type:'화상',date:'2026-04-25',time:'14:00',zoom:'zoom.us/j/'+Math.floor(Math.random()*9000+1000),status:'pending'}]);onToast('화상 미팅이 예약되었습니다');}}
                style={{flex:1,padding:'10px',border:'none',borderRadius:9,background:C.primary,color:'#fff',cursor:'pointer',fontWeight:600,fontSize:14}}>예약 확정</button>
            </div>
          </div>
        </>
      )}
    </div>
  );
}

// ===== 멀티 이벤트 관리 =====
function SectionMultiEvent({onToast,onSelect,selected}) {
  return (
    <div className="fade-in">
      <div style={{background:'linear-gradient(135deg,#D97706,#059669)',borderRadius:14,padding:20,color:'#fff',marginBottom:20,display:'flex',justifyContent:'space-between',alignItems:'center'}}>
        <div>
          <div style={{fontSize:13,opacity:0.8,marginBottom:4}}>RLS 멀티테넌트 격리 아키텍처</div>
          <div style={{fontWeight:800,fontSize:17}}>멀티 이벤트 관리</div>
        </div>
        <button onClick={()=>onToast('신규 이벤트 생성 폼 열기')} style={{padding:'9px 18px',background:'rgba(255,255,255,0.2)',border:'1px solid rgba(255,255,255,0.35)',borderRadius:9,color:'#fff',cursor:'pointer',fontWeight:600,fontSize:14}}>
          + 이벤트 생성
        </button>
      </div>

      <div style={{display:'flex',flexDirection:'column',gap:12,marginBottom:20}}>
        {EVENTS.map(ev=>(
          <div key={ev.id} onClick={()=>onSelect(ev,'event')}
            style={{background:C.surface,borderRadius:12,padding:'18px 20px',border:`1.5px solid ${selected?.id===ev.id?C.primary:C.border}`,cursor:'pointer',transition:'all 0.15s'}}
            onMouseEnter={e=>e.currentTarget.style.background='#F0FDF4'}
            onMouseLeave={e=>e.currentTarget.style.background=C.surface}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:10}}>
              <div>
                <div style={{fontWeight:700,fontSize:15,color:C.text,marginBottom:4}}>{ev.name}</div>
                <div style={{fontSize:12,color:C.textSub}}>{ev.date} ~ {ev.endDate}</div>
              </div>
              <span className="badge" style={{background:ev.status==='active'?'#D1FAE5':'#EDE9FE',color:ev.status==='active'?'#065F46':'#5B21B6'}}>
                {ev.status==='active'?'진행 중':'예정'}
              </span>
            </div>
            <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:10}}>
              {[['세션',ev.sessions+'개'],['참가자',ev.registered.toLocaleString()+'명'],['테넌트',ev.tenant]].map(([k,v])=>(
                <div key={k} style={{background:'#F0FDF4',borderRadius:8,padding:'8px 10px',textAlign:'center'}}>
                  <div style={{fontSize:13,fontWeight:700,color:C.text}}>{v}</div>
                  <div style={{fontSize:10,color:C.textSub,marginTop:1}}>{k}</div>
                </div>
              ))}
            </div>
          </div>
        ))}
      </div>

      <div style={{background:C.surface,borderRadius:12,border:`1px solid ${C.border}`,padding:16}}>
        <div style={{fontWeight:700,fontSize:13,color:C.text,marginBottom:12}}>멀티테넌트 설정 (Config 기반)</div>
        <div style={{display:'flex',flexDirection:'column',gap:8,fontSize:12}}>
          {[['로고 URL','config.logo_url'],['브랜드 색상','config.primary_color'],['행사 기간','config.event_dates'],['타임슬롯','config.timeslot_interval']].map(([k,v])=>(
            <div key={k} style={{display:'flex',justifyContent:'space-between',padding:'8px 12px',background:'#F0FDF4',borderRadius:8}}>
              <span style={{color:C.textSub}}>{k}</span>
              <code style={{color:C.primary,fontWeight:600}}>{v}</code>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

// ===== 투자사 포트폴리오 트래커 =====
function SectionPortfolioTracker({onToast,onSelect,selected}) {
  const totalInvested = PORTFOLIOS.reduce((s,p)=>s+parseInt(p.invested),0);

  return (
    <div className="fade-in">
      <div style={{background:'linear-gradient(135deg,#7C3AED,#059669)',borderRadius:14,padding:20,color:'#fff',marginBottom:20}}>
        <div style={{fontSize:13,opacity:0.8,marginBottom:4}}>DnD-Kit Kanban CRM 기반</div>
        <div style={{fontWeight:800,fontSize:17,marginBottom:12}}>포트폴리오 트래커</div>
        <div style={{display:'flex',gap:20}}>
          <div><div style={{fontWeight:800,fontSize:22}}>{totalInvested}억</div><div style={{fontSize:12,opacity:0.75}}>총 투자금액</div></div>
          <div><div style={{fontWeight:800,fontSize:22}}>{PORTFOLIOS.length}</div><div style={{fontSize:12,opacity:0.75}}>포트폴리오</div></div>
        </div>
      </div>

      <div style={{display:'flex',flexDirection:'column',gap:10}}>
        {PORTFOLIOS.map(p=>(
          <div key={p.id} onClick={()=>onSelect(p,'portfolio')}
            style={{background:C.surface,borderRadius:12,padding:'16px 18px',border:`1.5px solid ${selected?.id===p.id?C.primary:C.border}`,cursor:'pointer',transition:'all 0.15s'}}
            onMouseEnter={e=>e.currentTarget.style.background='#F0FDF4'}
            onMouseLeave={e=>e.currentTarget.style.background=C.surface}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:8}}>
              <div>
                <div style={{fontWeight:700,fontSize:15,color:C.text,marginBottom:2}}>{p.company}</div>
                <div style={{fontSize:12,color:C.textSub}}>{p.stage} · {p.month} 투자</div>
              </div>
              <div style={{textAlign:'right'}}>
                <div style={{fontWeight:800,fontSize:20,color:p.irr.startsWith('+')?'#059669':'#DC2626'}}>{p.irr}</div>
                <div style={{fontSize:11,color:C.textSub}}>IRR</div>
              </div>
            </div>
            <div style={{display:'flex',gap:8,alignItems:'center'}}>
              <span style={{fontSize:13,color:C.textSub}}>투자금 {p.invested}</span>
              <span className="badge" style={{background:p.status==='성장'?'#D1FAE5':p.status==='주의'?'#FEE2E2':'#FEF3C7',color:p.status==='성장'?'#065F46':p.status==='주의'?'#991B1B':'#92400E'}}>
                {p.status}
              </span>
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}

// ===== 메인 APP =====
const NAV = [
  {id:'AI 추천 매칭 엔진',icon:'🤖',label:'AI 추천 매칭 엔진'},
  {id:'화상 미팅 통합 스케줄러',icon:'🎥',label:'화상 미팅 통합 스케줄러'},
  {id:'멀티 이벤트 관리',icon:'📅',label:'멀티 이벤트 관리'},
  {id:'투자사 포트폴리오 트래커',icon:'📈',label:'투자사 포트폴리오 트래커'},
];

function App() {
  const [section,setSection] = useState('AI 추천 매칭 엔진');
  const [selected,setSelected] = useState(null);
  const [selectedType,setSelectedType] = useState(null);
  const [toast,setToast] = useState(null);

  function showToast(msg) { setToast(msg); setTimeout(()=>setToast(null),2500); }
  function handleSelect(item,type) { setSelected(item); setSelectedType(type); }

  return (
    <div style={{display:'flex',width:'100%',height:'100vh',overflow:'hidden'}}>
      {/* 밝은 사이드바 */}
      <nav style={{width:240,background:C.surface,borderRight:`1px solid ${C.border}`,display:'flex',flexDirection:'column',flexShrink:0}}>
        <div style={{padding:'18px 16px 14px',borderBottom:`1px solid ${C.border}`}}>
          <div style={{fontWeight:800,fontSize:16,color:C.primary}}>🌱 InvestMatch</div>
          <div style={{fontSize:11,color:C.textSub,marginTop:2}}>AI 투자 매칭 플랫폼</div>
        </div>
        <div style={{flex:1,padding:'10px 8px',overflowY:'auto'}}>
          {NAV.map(item=>(
            <button key={item.id} onClick={()=>{setSection(item.id);setSelected(null);}}
              style={{width:'100%',display:'flex',alignItems:'center',gap:9,padding:'10px 10px',border:'none',borderRadius:10,cursor:'pointer',marginBottom:2,textAlign:'left',fontFamily:'inherit',transition:'all 0.15s',
                background:section===item.id?'#D1FAE5':'transparent',
                color:section===item.id?C.secondary:C.textSub,
                fontWeight:section===item.id?700:500,fontSize:13,
                borderLeft:section===item.id?`3px solid ${C.primary}`:'3px solid transparent'}}>
              <span>{item.icon}</span>{item.label}
            </button>
          ))}
        </div>
        <div style={{padding:'12px 16px',borderTop:`1px solid ${C.border}`}}>
          <div style={{display:'flex',gap:10,alignItems:'center'}}>
            <div style={{width:32,height:32,borderRadius:'50%',background:'#D1FAE5',display:'flex',alignItems:'center',justifyContent:'center',fontSize:16}}>K</div>
            <div>
              <div style={{fontSize:13,fontWeight:700,color:C.text}}>김민준</div>
              <div style={{fontSize:11,color:C.textSub}}>투자 파트너</div>
            </div>
          </div>
        </div>
      </nav>

      {/* 메인 */}
      <div style={{flex:1,display:'flex',flexDirection:'column',overflow:'hidden'}}>
        {/* 앱바 */}
        <div style={{height:48,background:C.surface,borderBottom:`1px solid ${C.border}`,display:'flex',alignItems:'center',padding:'0 20px',gap:8,flexShrink:0}}>
          <span style={{fontSize:12,color:C.textSub}}>InvestMatch</span>
          <span style={{fontSize:12,color:C.textSub}}>›</span>
          <span style={{fontSize:12,fontWeight:600,color:C.text}}>{section}</span>
          <div style={{flex:1}} />
          <div style={{display:'flex',gap:8,alignItems:'center'}}>
            <div style={{background:'#D1FAE5',color:C.primary,fontSize:11,fontWeight:600,padding:'4px 10px',borderRadius:6}}>🟢 AI 엔진 정상</div>
          </div>
        </div>

        {/* 콘텐츠 영역 */}
        <div style={{flex:1,overflow:'hidden',display:'flex'}}>
          <main style={{flex:1,overflow:'auto',padding:20}}>
            {section==='AI 추천 매칭 엔진' && <SectionAIMatching onToast={showToast} onSelect={handleSelect} selected={selected} />}
            {section==='화상 미팅 통합 스케줄러' && <SectionVideoMeeting onToast={showToast} onSelect={handleSelect} selected={selected} />}
            {section==='멀티 이벤트 관리' && <SectionMultiEvent onToast={showToast} onSelect={handleSelect} selected={selected} />}
            {section==='투자사 포트폴리오 트래커' && <SectionPortfolioTracker onToast={showToast} onSelect={handleSelect} selected={selected} />}
          </main>

          {/* 디테일 패널 */}
          {selected && selectedType && (
            <DetailPanel item={selected} type={selectedType} onClose={()=>setSelected(null)} onToast={showToast} />
          )}
        </div>
      </div>

      {toast && (
        <div style={{position:'fixed',bottom:24,right:24,background:'#064E3B',color:'#fff',padding:'12px 20px',borderRadius:10,fontSize:14,fontWeight:500,zIndex:600,boxShadow:'0 8px 24px rgba(0,0,0,0.2)',display:'flex',gap:10,alignItems:'center'}}>
          ✅ {toast}
          <button onClick={()=>setToast(null)} style={{border:'none',background:'none',color:'#6EE7B7',cursor:'pointer',fontSize:16}}>✕</button>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
