function genSlots(doctor) {
  const slots = [];
  const statuses = ['available','booked','booked','available','booked','completed','booked','available','booked','completed','booked','available'];
  let si = 0;
  for (let h = 9; h < 18; h++) {
    if (h === 12) { slots.push({ time:'12:00', disabled:true }); h = 12; continue; }
    if (h === 13 && slots[slots.length-1]?.time === '12:00') continue;
    for (let m = 0; m < 60 && (h*60+m) < 18*60; m += 30) {
      if (h === 12) continue;
      const t = `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}`;
      const patients = ['김영수','이지은','박민호','최유진','정현우','강소영','윤태양','임나래','조성현','한미래'];
      slots.push({ time:t, status:statuses[si%statuses.length], patient:patients[si%patients.length], doctorId:doctor.id, si });
      si++;
    }
  }
  return slots.filter(s=>!s.disabled);
}

}

              <span style={{padding:'4px 10px',borderRadius:20,fontSize:11,fontWeight:600,background:ss.bg,color:ss.c}}>{ss.t}</span>
              <div style={{display:'flex',gap:6}} onClick={e=>e.stopPropagation()}>
                {p.status==='waiting' && <button onClick={()=>handleStatus(p.id,'in-progress')} style={{padding:'5px 10px',borderRadius:6,border:'none',background:`${C.primary}15`,color:C.primary,fontSize:11,fontWeight:600,cursor:'pointer'}}>진료 시작</button>}
                {p.status==='in-progress' && <button onClick={()=>handleStatus(p.id,'completed')} style={{padding:'5px 10px',borderRadius:6,border:'none',background:`${C.success}15`,color:C.success,fontSize:11,fontWeight:600,cursor:'pointer'}}>완료</button>}
              </div>
            </div>
          );
        })}
      </div>
      {drawer && <Drawer item={drawer} onClose={()=>setDrawer(null)} />}
      {toast && <Toast msg={toast} onDone={()=>setToast('')} />}
    </div>
  );
}

function StatsPage() {
  const weekData = [
    {day:'월',예약:32,취소:3,완료:28},{day:'화',예약:38,취소:2,완료:35},
    {day:'수',예약:41,취소:5,완료:36},{day:'목',예약:36,취소:2,완료:34},
    {day:'금',예약:45,취소:4,완료:40},{day:'토',예약:28,취소:1,완료:27},
  ];
  return (
    <div style={{padding:'0 32px 32px'}}>
      <div style={{display:'grid',gridTemplateColumns:'2fr 1fr',gap:16,marginBottom:20}}>
        <div style={{background:C.surface,borderRadius:14,padding:24,border:`1px solid ${C.border}`}}>
          <h3 style={{fontSize:15,fontWeight:700,color:C.tp,marginBottom:16}}>주간 예약 현황</h3>
          <div style={{height:200}}>
            <ResponsiveContainer width="100%" height="100%">
              <ComposedChart data={weekData} margin={{top:4,right:8,left:-20,bottom:4}}>
                <CartesianGrid strokeDasharray="3 3" stroke={C.border} />
                <XAxis dataKey="day" tick={{fontSize:12,fill:C.ts}} />
                <YAxis tick={{fontSize:11,fill:C.ts}} />
                <Tooltip />
                <Bar dataKey="예약" fill={C.primary} radius={[4,4,0,0]} opacity={0.85} />
                <Bar dataKey="완료" fill={C.accent} radius={[4,4,0,0]} opacity={0.85} />
                <Line type="monotone" dataKey="취소" stroke={C.danger} strokeWidth={2} dot={{fill:C.danger,r:3}} />
              </ComposedChart>
            </ResponsiveContainer>
          </div>
        </div>
        <div style={{background:C.surface,borderRadius:14,padding:24,border:`1px solid ${C.border}`}}>
          <h3 style={{fontSize:15,fontWeight:700,color:C.tp,marginBottom:16}}>진료과별 현황</h3>
          {DOCTORS.map(d=>(
            <div key={d.id} style={{marginBottom:12}}>
              <div style={{display:'flex',justifyContent:'space-between',fontSize:13,marginBottom:4}}>
                <span style={{color:C.tp,fontWeight:500}}>{d.dept}</span>
                <span style={{color:d.color,fontWeight:700}}>{d.today}건</span>
              </div>
              <div style={{height:6,borderRadius:3,background:`${d.color}20`,overflow:'hidden'}}>
                <div style={{height:'100%',borderRadius:3,background:d.color,width:`${(d.today/14)*100}%`}} />
              </div>
            </div>
          ))}
        </div>
      </div>
      <div style={{background:C.surface,borderRadius:14,padding:24,border:`1px solid ${C.border}`}}>
        <h3 style={{fontSize:15,fontWeight:700,color:C.tp,marginBottom:16}}>시간대별 예약 밀도</h3>
        <div style={{height:180}}>
          <ResponsiveContainer width="100%" height="100%">
            <AreaChart data={STATS_DATA} margin={{top:4,right:8,left:-20,bottom:4}}>
              <CartesianGrid strokeDasharray="3 3" stroke={C.border} />
              <XAxis dataKey="time" tick={{fontSize:11,fill:C.ts}} />
              <YAxis tick={{fontSize:11,fill:C.ts}} />
              <Tooltip />
              <Area type="monotone" dataKey="예약" stroke={C.primary} fill={`${C.primary}20`} strokeWidth={2} />
              <Area type="monotone" dataKey="완료" stroke={C.accent} fill={`${C.accent}15`} strokeWidth={2} />
            </AreaChart>
          </ResponsiveContainer>
        </div>
      </div>
    </div>
  );
}

  return (
    <div style={{padding:'0 32px 32px'}}>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:16}}>
        {DOCTORS.map(doc=>(
          <div key={doc.id} style={{background:C.surface,borderRadius:14,padding:24,border:`1px solid ${C.border}`}}>
            <div style={{display:'flex',alignItems:'center',gap:12,marginBottom:20,paddingBottom:16,borderBottom:`1px solid ${C.border}`}}>

              <div>
                <div style={{fontSize:15,fontWeight:700,color:C.tp}}>Dr. {doc.name}</div>
                <div style={{fontSize:12,color:C.ts}}>{doc.dept} · {doc.title}</div>
              </div>
            </div>
            <div style={{display:'flex',flexDirection:'column',gap:12}}>

                <div style={{display:'flex',gap:5}}>
                  {['월','화','수','목','금','토'].map((d,i)=>(
                    <button key={d} style={{width:34,height:34,borderRadius:8,border:`1px solid ${i<5?doc.color:C.border}`,fontSize:12,fontWeight:600,cursor:'pointer',background:i<5?`${doc.color}15`:'transparent',color:i<5?doc.color:C.ts}}>{d}</button>

function App() {
  const [tab, setTab] = useState('home');
  const meta = PAGE_META[tab] || PAGE_META.home;

  const renderContent = () => {
    if (tab==='home') return <HomePage onTab={setTab} />;
    if (tab==='booking') return <BookingPage />;
    if (tab==='doctor-queue') return <QueuePage />;
    if (tab==='stats') return <StatsPage />;
    if (tab==='schedule') return <ScheduleSettingPage />;
  };

  return (
    <div style={{display:'flex',flexDirection:'column',width:'100%',minHeight:'100vh',background:C.bg}}>
      {/* 상단 네비 */}
      <header style={{position:'sticky',top:0,zIndex:100,background:C.surface,borderBottom:`1px solid ${C.border}`,display:'flex',alignItems:'center',height:56,padding:'0 24px',gap:4}}>
        <div style={{display:'flex',alignItems:'center',gap:8,marginRight:16}}>
          <div style={{width:32,height:32,borderRadius:8,background:C.primary,display:'flex',alignItems:'center',justifyContent:'center',fontSize:16}}>🏥</div>
          <span style={{fontSize:15,fontWeight:700,color:C.tp}}>MediSchedule</span>
        </div>
        {TABS.map(t=>(
          <button key={t.id} onClick={()=>setTab(t.id)} style={{
            display:'flex',alignItems:'center',gap:6,padding:'7px 14px',borderRadius:8,border:'none',
            cursor:'pointer',fontSize:13,fontWeight:tab===t.id?700:500,
            background:tab===t.id?`${C.primary}15`:'transparent',
            color:tab===t.id?C.primary:C.ts,
            borderBottom:tab===t.id?`2px solid ${C.primary}`:'2px solid transparent',
            transition:'all 0.15s',
          }}>
            <span>{t.icon}</span><span>{t.label}</span>
          </button>
        ))}
        <div style={{flex:1}} />
        <div style={{display:'flex',alignItems:'center',gap:8,padding:'6px 14px',borderRadius:8,background:C.bg,border:`1px solid ${C.border}`,fontSize:13,color:C.ts,cursor:'text'}}>🔍 검색...</div>
        <button style={{background:'none',border:'none',cursor:'pointer',fontSize:20,position:'relative'}}>
          🔔<span style={{position:'absolute',top:0,right:0,width:8,height:8,borderRadius:'50%',background:C.danger}} />
        </button>
        <div style={{width:32,height:32,borderRadius:'50%',background:C.primary,display:'flex',alignItems:'center',justifyContent:'center',color:'#fff',fontSize:12,fontWeight:700,cursor:'pointer'}}>의</div>
      </header>

      {/* 히어로 배너 */}
      <div style={{background:`linear-gradient(135deg, ${C.hero1}, ${C.hero2})`,padding:'24px 32px',color:'#fff'}}>
        <div style={{display:'flex',alignItems:'flex-start',justifyContent:'space-between'}}>
          <div>
            <h1 style={{fontSize:20,fontWeight:700,marginBottom:6}}>{meta.title}</h1>
            <div style={{display:'flex',gap:24,marginTop:8}}>
              {meta.kpis.map(k=>(
                <div key={k.l} style={{background:'rgba(255,255,255,0.15)',borderRadius:8,padding:'8px 16px',backdropFilter:'blur(4px)'}}>
                  <div style={{fontSize:11,opacity:0.75,marginBottom:1}}>{k.l}</div>
                  <div style={{fontSize:16,fontWeight:700}}>{k.v}</div>
                </div>
              ))}
            </div>
          </div>
          <div style={{fontSize:13,opacity:0.75}}>2026.04.15 (수) 오후 2:30</div>
        </div>
      </div>

      {/* 콘텐츠 */}
      <main style={{flex:1,paddingTop:24}}>
        {renderContent()}
      </main>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
