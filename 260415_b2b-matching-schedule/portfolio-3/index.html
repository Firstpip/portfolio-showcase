function Toast({ msg, onDone }) {
  React.useEffect(()=>{const t=setTimeout(onDone,2200);return()=>clearTimeout(t);},[]);
  return <div style={{position:'fixed',bottom:24,right:24,background:C.primary,color:'#fff',padding:'11px 18px',borderRadius:10,fontSize:13,fontWeight:600,zIndex:400,boxShadow:'0 8px 24px rgba(55,48,163,0.35)'}}>{msg}</div>;
}

function StatusBadge({ status }) {
  const m = { active:{bg:'#D1FAE5',c:'#065F46',t:'진행 중'}, upcoming:{bg:'#DBEAFE',c:'#1D4ED8',t:'예정'}, completed:{bg:'#F1F5F9',c:'#475569',t:'완료'}, VIP:{bg:'#EDE9FE',c:'#6D28D9',t:'VIP'}, 재방문:{bg:'#FEF3C7',c:'#92400E',t:'재방문'}, 신규:{bg:'#DBEAFE',c:'#1D4ED8',t:'신규'}, confirmed:{bg:'#D1FAE5',c:'#065F46',t:'확정'}, pending:{bg:'#FEF3C7',c:'#92400E',t:'대기'}, review:{bg:'#F1F5F9',c:'#475569',t:'검토'} };
  const s = m[status] || m.review;
  return <span style={{padding:'3px 9px',borderRadius:20,fontSize:11,fontWeight:600,background:s.bg,color:s.c}}>{s.t}</span>;
}

                <XAxis dataKey="event" tick={{fontSize:10,fill:C.ts}} />
                <YAxis tick={{fontSize:11,fill:C.ts}} />
                <Tooltip />
                <Bar dataKey="매칭건수" fill={C.primary} radius={[4,4,0,0]} />
                <Bar dataKey="상담완료" fill={C.accent} radius={[4,4,0,0]} />
                <Bar dataKey="방문초청" fill={C.secondary} radius={[4,4,0,0]} />
              </BarChart>
            </ResponsiveContainer>
          </div>
        </div>
        <div style={{background:C.surface,borderRadius:12,padding:20,border:`1px solid ${C.border}`}}>
          <h3 style={{fontSize:14,fontWeight:700,color:C.tp,marginBottom:14}}>분야별 매칭 강도</h3>
          <div style={{height:200}}>
            <ResponsiveContainer width="100%" height="100%">
              <RadarChart data={RADAR_DATA}>
                <PolarGrid stroke={C.border} />
                <PolarAngleAxis dataKey="subject" tick={{fontSize:11,fill:C.ts}} />
                <Radar name="공급" dataKey="A" stroke={C.primary} fill={C.primary} fillOpacity={0.25} />
                <Radar name="수요" dataKey="B" stroke={C.secondary} fill={C.secondary} fillOpacity={0.2} />
                <Tooltip />
              </RadarChart>
            </ResponsiveContainer>
          </div>
        </div>
      </div>
      <div style={{background:C.surface,borderRadius:12,border:`1px solid ${C.border}`,overflow:'hidden'}}>
        <div style={{padding:'14px 20px',borderBottom:`1px solid ${C.border}`,display:'flex',alignItems:'center',gap:8}}>
          <h3 style={{fontSize:14,fontWeight:700,color:C.tp,flex:1}}>리포트 목록</h3>
          <button onClick={()=>setToast('PDF 생성 큐에 추가되었습니다')} style={{padding:'6px 14px',borderRadius:7,border:'none',background:C.secondary,color:'#fff',fontSize:12,fontWeight:600,cursor:'pointer'}}>PDF 생성</button>
        </div>
        {EVENTS.filter(e=>e.status!=='upcoming').map(ev=>(
          <div key={ev.id} style={{display:'flex',alignItems:'center',padding:'12px 20px',borderBottom:`1px solid ${C.border}`,gap:14}}>
            <span style={{fontSize:20}}>📄</span>
            <div style={{flex:1}}>
              <div style={{fontSize:13,fontWeight:600,color:C.tp}}>{ev.name} 결과 리포트</div>
              <div style={{fontSize:11,color:C.ts,marginTop:2}}>{ev.date} · 매칭 {ev.matches}건 · 방문초청 포함</div>
            </div>
            <StatusBadge status={ev.status} />
            <button onClick={()=>setToast('리포트 다운로드 중...')} style={{padding:'5px 12px',borderRadius:7,border:`1px solid ${C.border}`,background:'#fff',fontSize:12,cursor:'pointer'}}>다운로드</button>
          </div>
        ))}
      </div>
      {toast && <Toast msg={toast} onDone={()=>setToast('')} />}
    </div>
  );
}

function AIMatchingPage() {
  const [selected, setSelected] = useState(null);
  const [toast, setToast] = useState('');

  return (
    <div style={{display:'flex',gap:0,height:'100%',overflow:'hidden'}}>
      <div style={{flex:'0 0 55%',overflowY:'auto',padding:'16px 16px',borderRight:`1px solid ${C.border}`}}>
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:12}}>
          <div>
            <h3 style={{fontSize:14,fontWeight:700,color:C.tp}}>AI 매칭 추천 결과</h3>
            <p style={{fontSize:11,color:C.ts,marginTop:2}}>OpenAI Embeddings + pgvector 코사인 유사도</p>
          </div>
          <button onClick={()=>setToast('AI 재분석 중... (pgvector 쿼리 실행)')} style={{padding:'6px 12px',borderRadius:7,border:'none',background:`${C.accent}15`,color:C.accent,fontSize:12,fontWeight:600,cursor:'pointer'}}>🤖 재분석</button>
        </div>
        {AI_MATCHES.map(m=>(
          <div key={m.id} onClick={()=>setSelected(m)} style={{
            padding:'14px',borderRadius:10,border:`1.5px solid ${selected?.id===m.id?C.primary:C.border}`,
            background:selected?.id===m.id?`${C.primary}06`:'#fff',
            cursor:'pointer',marginBottom:8,transition:'all 0.12s',
          }}>
            <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:6}}>
              <div style={{width:44,height:8,borderRadius:4,background:`${C.primary}15`,overflow:'hidden',flex:1}}>
                <div style={{height:'100%',borderRadius:4,background:m.score>85?C.success:m.score>70?C.primary:C.warning,width:`${m.score}%`}} />
              </div>
              <span style={{fontSize:14,fontWeight:700,color:m.score>85?C.success:C.primary,width:40,textAlign:'right'}}>{m.score}</span>
              <StatusBadge status={m.status} />
            </div>
            <div style={{display:'flex',gap:8,alignItems:'flex-start'}}>
              <div style={{flex:1}}>
                <div style={{fontSize:13,fontWeight:600,color:C.tp}}>🏭 {m.company}</div>
                <div style={{fontSize:12,color:C.ts,marginTop:2}}>↕</div>
                <div style={{fontSize:13,fontWeight:600,color:C.tp}}>🌏 {m.buyer}</div>
              </div>
              <div style={{maxWidth:180,fontSize:11,color:C.ts,textAlign:'right'}}>{m.reason}</div>
            </div>
          </div>
        ))}
      </div>
      <div style={{flex:1,overflowY:'auto',padding:'16px 20px'}}>
        {selected ? (
          <div>
            <div style={{marginBottom:14,padding:'16px',borderRadius:12,background:`${C.accent}08`,border:`1px solid ${C.accent}25`}}>
              <div style={{fontSize:13,color:C.ts,marginBottom:6}}>AI 매칭 점수</div>
              <div style={{display:'flex',alignItems:'baseline',gap:8}}>
                <span style={{fontSize:36,fontWeight:700,color:selected.score>85?C.success:C.primary}}>{selected.score}</span>
                <span style={{fontSize:14,color:C.ts}}>/ 100</span>
              </div>
              <div style={{fontSize:12,color:C.ts,marginTop:4}}>{selected.reason}</div>
            </div>
            <div style={{display:'flex',flexDirection:'column',gap:8,marginBottom:14}}>
              {[
                {icon:'🏭',l:'공급 기업',v:selected.company},
                {icon:'🌏',l:'해외 바이어',v:selected.buyer},
                {icon:'📦',l:'매칭 분야',v:selected.category},
              ].map(r=>(
                <div key={r.l} style={{padding:'12px 14px',borderRadius:8,background:C.bg,border:`1px solid ${C.border}`,display:'flex',gap:10,alignItems:'center'}}>
                  <span style={{fontSize:18}}>{r.icon}</span>
                  <div>
                    <div style={{fontSize:11,color:C.ts,marginBottom:2}}>{r.l}</div>
                    <div style={{fontSize:14,fontWeight:700,color:C.tp}}>{r.v}</div>
                  </div>
                </div>
              ))}
            </div>
            <div style={{padding:'12px 14px',borderRadius:8,background:'#fff',border:`1px solid ${C.border}`,marginBottom:14}}>
              <div style={{fontSize:12,color:C.ts,marginBottom:6}}>매칭 근거 (AI 분석)</div>
              <div style={{fontSize:13,color:C.tp,lineHeight:1.6}}>{selected.reason}. pgvector 코사인 유사도 기반 임베딩 분석 결과입니다.</div>
            </div>
            <div style={{display:'flex',gap:8}}>
              <button onClick={()=>{setSelected(null);setToast('매칭이 승인되었습니다');}} style={{flex:1,padding:'9px 0',borderRadius:8,border:'none',background:C.success,color:'#fff',fontSize:13,fontWeight:600,cursor:'pointer'}}>✓ 승인</button>
              <button onClick={()=>setToast('매칭이 거절되었습니다')} style={{flex:1,padding:'9px 0',borderRadius:8,border:`1px solid ${C.border}`,background:'#fff',fontSize:13,cursor:'pointer'}}>✕ 거절</button>
            </div>
          </div>
        ) : (
          <div style={{display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',height:'100%',color:C.ts}}>
            <div style={{fontSize:36,marginBottom:10}}>🤖</div>
            <div style={{fontSize:14,fontWeight:600}}>매칭을 선택하세요</div>
            <div style={{fontSize:12,marginTop:4}}>AI 분석 상세 정보가 표시됩니다</div>
          </div>
        )}
        {toast && <Toast msg={toast} onDone={()=>setToast('')} />}
      </div>
    </div>
  );
}

function EventsPage() {
  return (
    <div style={{overflowY:'auto',padding:'16px 20px',height:'100%'}}>
      <div style={{display:'flex',gap:0,borderRadius:12,overflow:'hidden',border:`1px solid ${C.border}`,background:C.surface}}>
        <div style={{display:'grid',gridTemplateColumns:'80px repeat(12, 1fr)',borderBottom:`1px solid ${C.border}`,background:C.bg}}>
          <div style={{padding:'10px 12px',fontSize:12,color:C.ts,fontWeight:600,borderRight:`1px solid ${C.border}`}}>행사</div>
          {['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'].map(m=>(
            <div key={m} style={{padding:'10px 4px',fontSize:11,color:C.ts,textAlign:'center',borderRight:`1px solid ${C.border}`}}>{m}</div>
          ))}
        </div>
        {EVENTS.map(ev=>{
          const monthMap = { '2026-05-15':5, '2026-07-10':7, '2025-10-22':10, '2025-06-18':6 };
          const month = monthMap[ev.date] || 5;
          return (
            <div key={ev.id} style={{display:'grid',gridTemplateColumns:'80px repeat(12, 1fr)',borderBottom:`1px solid ${C.border}`}}>
              <div style={{padding:'12px',fontSize:11,color:C.ts,borderRight:`1px solid ${C.border}`,display:'flex',alignItems:'center'}}>
                {ev.date.substring(0,4)}
              </div>
              {[...Array(12)].map((_,i)=>(
                <div key={i} style={{padding:'6px 4px',borderRight:`1px solid ${C.border}`,display:'flex',alignItems:'center',justifyContent:'center'}}>
                  {i+1===month && (
                    <div style={{padding:'4px 6px',borderRadius:4,background:ev.status==='active'?C.primary:ev.status==='upcoming'?C.accent:C.ts,color:'#fff',fontSize:9,fontWeight:700,whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis',maxWidth:'100%'}}>
                      {ev.name.substring(5,12)}
                    </div>
                  )}
                </div>
              ))}
            </div>
          );
        })}
      </div>
      <div style={{marginTop:16,display:'grid',gridTemplateColumns:'repeat(2, 1fr)',gap:12}}>
        {EVENTS.map(ev=>(
          <div key={ev.id} style={{background:C.surface,borderRadius:10,padding:'14px 16px',border:`1px solid ${C.border}`}}>
            <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:6}}>
              <div style={{fontSize:13,fontWeight:700,color:C.tp}}>{ev.name}</div>
              <StatusBadge status={ev.status} />
            </div>
            <div style={{fontSize:12,color:C.ts}}>{ev.date} · 기업 {ev.companies}개 · 바이어 {ev.buyers}명</div>
          </div>
        ))}
      </div>
    </div>
  );
}

const SECTION_TABS = {
  main:[{label:'전체'},{label:'진행 중'},{label:'예정'},{label:'완료'}],
  'buyer-crm':[{label:'전체'},{label:'VIP'},{label:'재방문'},{label:'신규'}],
  report:[{label:'행사별'},{label:'연간'},{label:'국가별'}],
  'ai-matching':[{label:'추천 목록'},{label:'확정됨'},{label:'대기 중'}],
  events:[{label:'타임라인'},{label:'캘린더'}],
};

function App() {
  const [section, setSection] = useState('main');
  const [tabIdx, setTabIdx] = useState(0);

  const tabs = SECTION_TABS[section] || [];

  const renderContent = () => {
    if (section==='main') return <MainPage />;
    if (section==='buyer-crm') return <CRMPage />;
    if (section==='report') return <ReportPage />;
    if (section==='ai-matching') return <AIMatchingPage />;
    if (section==='events') return <EventsPage />;
  };

  return (
    <div style={{display:'flex',width:'100%',height:'100vh',overflow:'hidden'}}>
      <SideNav section={section} onNav={s=>{setSection(s);setTabIdx(0);}} />
      <div style={{flex:1,display:'flex',flexDirection:'column',overflow:'hidden'}}>
        <AppBar section={section} />
        {/* 인라인 탭 스트립 */}
        <div style={{height:40,borderBottom:`1px solid ${C.border}`,display:'flex',alignItems:'flex-end',padding:'0 20px',gap:4,background:C.surface,flexShrink:0}}>
          {tabs.map((t,i)=>(
            <button key={i} onClick={()=>setTabIdx(i)} style={{
              padding:'6px 14px',border:'none',cursor:'pointer',fontSize:13,
              borderBottom:`2px solid ${tabIdx===i?C.primary:'transparent'}`,
              color:tabIdx===i?C.primary:C.ts,fontWeight:tabIdx===i?600:400,
              background:'transparent',marginBottom:-1,transition:'all 0.12s',
            }}>{t.label}</button>
          ))}
        </div>
        {/* 콘텐츠 */}
        <main style={{flex:1,overflow:'hidden',background:C.bg}}>
          {renderContent()}
        </main>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
