<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>건축 개발 사업성 분석 시뮬레이터 — 맞춤 구현 데모</title>
<link rel="preconnect" href="https://cdn.jsdelivr.net">
<link href="https://cdn.jsdelivr.net/npm/pretendard@1.3.9/dist/web/static/pretendard.min.css" rel="stylesheet">
<script src="https://unpkg.com/prop-types@15/prop-types.min.js"></script>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/recharts@2.12.7/umd/Recharts.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body, #root { width: 100%; min-height: 100vh; }
body { font-family: 'Pretendard', -apple-system, sans-serif; background: #F0F4F8; color: #0D1B2A; }
:root {
  --navy: #0B2545;
  --navy2: #163560;
  --accent: #1A6FD8;
  --accent2: #2F8EF4;
  --teal: #0E9E8E;
  --gold: #E8A020;
  --bg: #F0F4F8;
  --surface: #FFFFFF;
  --surface2: #F8FAFE;
  --text: #0D1B2A;
  --text-sub: #4A6080;
  --border: #D8E2EE;
  --sidebar-w: 260px;
}
/* Layout */
.layout { display: flex; min-height: 100vh; }
/* Sidebar */
.sidebar {
  width: var(--sidebar-w); min-height: 100vh; background: var(--navy);
  display: flex; flex-direction: column; position: fixed; top:0; left:0; z-index:10;
}
.sidebar-logo {
  padding: 26px 22px 18px; border-bottom: 1px solid rgba(255,255,255,0.08);
}
.logo-badge {
  display: inline-flex; align-items: center; gap: 6px; background: rgba(26,111,216,0.25);
  border: 1px solid rgba(26,111,216,0.4); padding: 4px 10px; border-radius: 20px; margin-bottom: 10px;
}
.logo-badge-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--accent2); }
.logo-badge-text { font-size: 10px; font-weight: 600; color: var(--accent2); letter-spacing: 0.8px; }
.sidebar-logo .app-name { font-size: 15px; font-weight: 800; color: #fff; line-height: 1.3; letter-spacing: -0.3px; }
.sidebar-logo .app-sub { font-size: 10.5px; color: rgba(255,255,255,0.4); margin-top: 3px; }
.sidebar-nav { flex: 1; padding: 14px 0; overflow-y: auto; }
.nav-section { padding: 0 14px 4px; }
.nav-section-label { font-size: 9.5px; font-weight: 700; color: rgba(255,255,255,0.3); letter-spacing: 1.4px; text-transform: uppercase; padding: 10px 8px 6px; }
.nav-item {
  display: flex; align-items: center; gap: 10px; padding: 10px 12px; border-radius: 9px;
  cursor: pointer; transition: all 0.15s; color: rgba(255,255,255,0.6); font-size: 13px; font-weight: 500;
  margin-bottom: 2px; border: 1px solid transparent;
}
.nav-item:hover { background: rgba(255,255,255,0.07); color: rgba(255,255,255,0.9); }
.nav-item.active { background: rgba(26,111,216,0.75); color: #fff; font-weight: 700; border-color: rgba(47,142,244,0.3); }
.nav-icon { width: 16px; height: 16px; flex-shrink: 0; opacity: 0.8; }
.nav-item.active .nav-icon { opacity: 1; }
.nav-badge { margin-left: auto; background: rgba(232,160,32,0.2); color: var(--gold); font-size: 9.5px; font-weight: 700; padding: 2px 7px; border-radius: 10px; }
.nav-badge.new { background: rgba(14,158,142,0.2); color: var(--teal); }
.sidebar-footer { padding: 14px; border-top: 1px solid rgba(255,255,255,0.08); }
.sidebar-user { display: flex; align-items: center; gap: 10px; }
.user-avatar { width: 34px; height: 34px; border-radius: 50%; background: linear-gradient(135deg, var(--accent), var(--teal)); display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 800; color: #fff; flex-shrink: 0; }
.user-info .uname { font-size: 12.5px; font-weight: 700; color: #fff; }
.user-info .urole { font-size: 10.5px; color: rgba(255,255,255,0.4); }
/* Main */
.main { margin-left: var(--sidebar-w); flex: 1; display: flex; flex-direction: column; min-width: 0; }
/* Topbar */
.topbar {
  height: 62px; background: var(--surface); border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between; padding: 0 28px;
  position: sticky; top: 0; z-index: 5; box-shadow: 0 1px 4px rgba(0,0,0,0.04);
}
.topbar-breadcrumb { display: flex; align-items: center; gap: 8px; }
.breadcrumb-root { font-size: 11.5px; color: var(--text-sub); }
.breadcrumb-sep { color: var(--border); }
.page-title { font-size: 16px; font-weight: 800; color: var(--text); letter-spacing: -0.3px; }
.topbar-right { display: flex; align-items: center; gap: 10px; }
.topbar-btn {
  display: flex; align-items: center; gap: 6px; padding: 7px 14px; border-radius: 8px;
  border: 1.5px solid var(--border); background: var(--surface); cursor: pointer;
  font-size: 12px; font-weight: 600; color: var(--text-sub); transition: all 0.15s; font-family: inherit;
}
.topbar-btn:hover { border-color: var(--accent); color: var(--accent); }
.topbar-btn.primary { background: var(--accent); border-color: var(--accent); color: #fff; }
.topbar-btn.primary:hover { background: var(--accent2); border-color: var(--accent2); }
.status-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--teal); display: inline-block; animation: pulse 2s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
/* Content */
.content { padding: 24px 28px; flex: 1; }
/* Page toggle */
.page { display: none; }
.page.active { display: block; }

/* ─── STEP INDICATOR ─── */
.step-indicator {
  display: flex; align-items: center; gap: 0; margin-bottom: 24px; background: var(--surface);
  border: 1px solid var(--border); border-radius: 12px; padding: 16px 24px; overflow-x: auto;
}
.step-item { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
.step-num { width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; flex-shrink: 0; }
.step-num.done { background: var(--teal); color: #fff; }
.step-num.active { background: var(--accent); color: #fff; box-shadow: 0 0 0 3px rgba(26,111,216,0.2); }
.step-num.pending { background: var(--border); color: var(--text-sub); }
.step-label { font-size: 12.5px; font-weight: 600; white-space: nowrap; }
.step-label.done { color: var(--teal); }
.step-label.active { color: var(--accent); }
.step-label.pending { color: var(--text-sub); }
.step-connector { width: 40px; height: 2px; background: var(--border); margin: 0 8px; flex-shrink: 0; }
.step-connector.done { background: var(--teal); }

/* ─── FORM ─── */
.form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 20px; }
.form-grid.three { grid-template-columns: 1fr 1fr 1fr; }
.form-section { background: var(--surface); border-radius: 12px; border: 1px solid var(--border); padding: 20px 22px; }
.form-section-title { font-size: 13px; font-weight: 800; color: var(--text); margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }
.section-icon { width: 28px; height: 28px; border-radius: 7px; display: flex; align-items: center; justify-content: center; font-size: 14px; }
.section-icon.blue { background: #DBEAFE; }
.section-icon.teal { background: #CCFBF1; }
.section-icon.gold { background: #FEF3C7; }
.form-field { margin-bottom: 14px; }
.form-field:last-child { margin-bottom: 0; }
.field-label { font-size: 11.5px; font-weight: 600; color: var(--text-sub); margin-bottom: 5px; display: flex; align-items: center; gap: 4px; }
.field-req { color: #E53E3E; font-size: 10px; }
.form-select, .form-input {
  width: 100%; padding: 9px 12px; border-radius: 8px; border: 1.5px solid var(--border);
  font-size: 13px; font-family: inherit; color: var(--text); background: var(--surface2);
  transition: border-color 0.15s; appearance: none; outline: none;
}
.form-select:focus, .form-input:focus { border-color: var(--accent); background: #fff; }
.select-wrap { position: relative; }
.select-wrap::after { content: '▾'; position: absolute; right: 10px; top: 50%; transform: translateY(-50%); color: var(--text-sub); pointer-events: none; font-size: 11px; }
.input-unit { position: relative; }
.input-unit .form-input { padding-right: 40px; }
.unit-label { position: absolute; right: 12px; top: 50%; transform: translateY(-50%); font-size: 12px; color: var(--text-sub); font-weight: 500; }
.form-hint { font-size: 10.5px; color: var(--text-sub); margin-top: 4px; }
.form-actions { display: flex; align-items: center; gap: 10px; justify-content: flex-end; margin-top: 4px; }
.btn {
  display: inline-flex; align-items: center; gap: 7px; padding: 10px 20px; border-radius: 9px;
  font-size: 13px; font-weight: 700; cursor: pointer; border: none; font-family: inherit;
  transition: all 0.15s;
}
.btn-ghost { background: transparent; border: 1.5px solid var(--border); color: var(--text-sub); }
.btn-ghost:hover { border-color: var(--accent); color: var(--accent); }
.btn-outline { background: transparent; border: 1.5px solid var(--accent); color: var(--accent); }
.btn-outline:hover { background: #DBEAFE; }
.btn-primary { background: var(--accent); color: #fff; box-shadow: 0 2px 8px rgba(26,111,216,0.3); }
.btn-primary:hover { background: var(--accent2); }
.btn-danger { background: #FEE2E2; color: #B91C1C; border: 1.5px solid #FCA5A5; }
.btn-danger:hover { background: #FECACA; }
.btn-sm { padding: 6px 12px; font-size: 12px; border-radius: 7px; }

/* ─── KPI CARDS ─── */
.kpi-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; margin-bottom: 20px; }
.kpi-card {
  background: var(--surface); border-radius: 12px; padding: 18px 20px;
  border: 1px solid var(--border); position: relative; overflow: hidden; transition: box-shadow 0.2s;
}
.kpi-card:hover { box-shadow: 0 4px 18px rgba(0,0,0,0.07); }
.kpi-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; border-radius: 12px 12px 0 0; }
.kpi-card.blue::before { background: var(--accent); }
.kpi-card.teal::before { background: var(--teal); }
.kpi-card.gold::before { background: var(--gold); }
.kpi-card.red::before { background: #E53E3E; }
.kpi-card.green::before { background: #059669; }
.kpi-label { font-size: 11px; font-weight: 600; color: var(--text-sub); margin-bottom: 6px; }
.kpi-value { font-size: 24px; font-weight: 800; color: var(--text); letter-spacing: -0.5px; }
.kpi-unit { font-size: 12px; font-weight: 600; color: var(--text-sub); }
.kpi-sub { font-size: 11px; margin-top: 6px; color: var(--text-sub); display: flex; align-items: center; gap: 4px; }
.kpi-up { color: #059669; font-weight: 700; }
.kpi-down { color: #DC2626; font-weight: 700; }
.kpi-icon { position: absolute; right: 16px; top: 20px; width: 36px; height: 36px; border-radius: 9px; display: flex; align-items: center; justify-content: center; font-size: 18px; }
.kpi-icon.blue { background: #DBEAFE; }
.kpi-icon.teal { background: #CCFBF1; }
.kpi-icon.gold { background: #FEF3C7; }
.kpi-icon.red { background: #FEE2E2; }
.kpi-icon.green { background: #DCFCE7; }

/* ─── CHART CARDS ─── */
.chart-row { display: grid; gap: 14px; margin-bottom: 20px; }
.chart-row.two { grid-template-columns: 7fr 5fr; }
.chart-row.three { grid-template-columns: 1fr 1fr 1fr; }
.chart-card {
  background: var(--surface); border-radius: 12px; padding: 20px 22px;
  border: 1px solid var(--border); transition: box-shadow 0.2s;
}
.chart-card:hover { box-shadow: 0 4px 18px rgba(0,0,0,0.07); }
.chart-header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 18px; }
.chart-title { font-size: 13.5px; font-weight: 800; color: var(--text); }
.chart-sub { font-size: 11px; color: var(--text-sub); margin-top: 2px; }
.chart-tag { font-size: 10px; font-weight: 700; padding: 3px 9px; border-radius: 20px; white-space: nowrap; }
.chart-tag.blue { background: #DBEAFE; color: var(--accent); }
.chart-tag.teal { background: #CCFBF1; color: var(--teal); }
.chart-tag.gold { background: #FEF3C7; color: #B45309; }

/* ─── RESULT CARDS ─── */
.result-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; margin-bottom: 20px; }
.result-card {
  background: var(--surface); border-radius: 12px; padding: 18px 20px;
  border: 1px solid var(--border);
}
.result-divider { height: 1px; background: var(--border); margin: 4px 0 10px; }

/* ─── COST TABLE ─── */
.cost-row { display: flex; align-items: center; justify-content: space-between; padding: 7px 0; border-bottom: 1px solid var(--border); }
.cost-row:last-child { border-bottom: none; }
.cost-name { font-size: 12.5px; color: var(--text-sub); display: flex; align-items: center; gap: 7px; }
.cost-dot { width: 8px; height: 8px; border-radius: 2px; flex-shrink: 0; }
.cost-val { font-size: 13px; font-weight: 700; color: var(--text); }
.cost-pct { font-size: 10.5px; color: var(--text-sub); margin-left: 6px; }

/* ─── DATA TABLE ─── */
.table-wrap { overflow-x: auto; }
.data-table { width: 100%; border-collapse: collapse; font-size: 12.5px; }
.data-table th { font-size: 10.5px; font-weight: 700; color: var(--text-sub); padding: 0 12px 10px; text-align: left; border-bottom: 1.5px solid var(--border); letter-spacing: 0.4px; white-space: nowrap; }
.data-table td { padding: 10px 12px; border-bottom: 1px solid var(--border); color: var(--text); vertical-align: middle; }
.data-table tr:last-child td { border-bottom: none; }
.data-table tr:hover td { background: var(--surface2); cursor: pointer; }
.badge { display: inline-flex; align-items: center; gap: 4px; padding: 2px 8px; border-radius: 10px; font-size: 10.5px; font-weight: 700; }
.badge-green { background: #DCFCE7; color: #15803D; }
.badge-yellow { background: #FEF9C3; color: #854D0E; }
.badge-red { background: #FEE2E2; color: #B91C1C; }
.badge-blue { background: #DBEAFE; color: #1D4ED8; }
.badge-teal { background: #CCFBF1; color: #0F766E; }
.badge-gray { background: #F1F5F9; color: #475569; }

/* ─── TABLE TOOLBAR ─── */
.table-toolbar { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; flex-wrap: wrap; }
.search-box { display: flex; align-items: center; gap: 7px; padding: 8px 12px; border-radius: 8px; border: 1.5px solid var(--border); background: var(--surface2); min-width: 200px; }
.search-box input { border: none; background: transparent; font-size: 12.5px; color: var(--text); outline: none; font-family: inherit; width: 100%; }
.filter-select { padding: 8px 28px 8px 10px; border-radius: 8px; border: 1.5px solid var(--border); background: var(--surface2); font-size: 12.5px; color: var(--text); font-family: inherit; appearance: none; cursor: pointer; outline: none; }
.table-action-right { margin-left: auto; display: flex; gap: 8px; }

/* ─── RATE CARD ─── */
.rate-card {
  background: linear-gradient(135deg, var(--navy) 0%, var(--navy2) 100%);
  border-radius: 12px; padding: 20px 22px; color: #fff; position: relative; overflow: hidden;
}
.rate-card::after { content: ''; position: absolute; right: -20px; top: -20px; width: 100px; height: 100px; border-radius: 50%; background: rgba(255,255,255,0.04); }
.rate-label { font-size: 11px; color: rgba(255,255,255,0.55); margin-bottom: 6px; }
.rate-val { font-size: 36px; font-weight: 800; letter-spacing: -1px; }
.rate-unit { font-size: 16px; font-weight: 600; opacity: 0.7; }
.rate-judge { display: inline-flex; align-items: center; gap: 5px; padding: 4px 12px; border-radius: 20px; font-size: 11.5px; font-weight: 700; margin-top: 8px; }
.judge-good { background: rgba(14,158,142,0.25); color: #6EE7B7; border: 1px solid rgba(14,158,142,0.3); }
.judge-bad { background: rgba(229,62,62,0.25); color: #FCA5A5; border: 1px solid rgba(229,62,62,0.3); }
.judge-mid { background: rgba(232,160,32,0.25); color: #FDE68A; border: 1px solid rgba(232,160,32,0.3); }

/* ─── INTEREST CARDS ─── */
.interest-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 20px; }
.interest-card {
  background: var(--surface); border-radius: 10px; padding: 14px 16px;
  border: 1px solid var(--border); transition: box-shadow 0.2s;
}
.interest-card:hover { box-shadow: 0 3px 12px rgba(0,0,0,0.06); }
.interest-bank { font-size: 10.5px; font-weight: 700; color: var(--text-sub); margin-bottom: 8px; display: flex; align-items: center; gap: 6px; }
.bank-logo { width: 20px; height: 20px; border-radius: 5px; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 800; color: #fff; flex-shrink: 0; }
.interest-val { font-size: 22px; font-weight: 800; color: var(--text); letter-spacing: -0.5px; }
.interest-unit { font-size: 12px; font-weight: 600; color: var(--text-sub); }
.interest-type { font-size: 10.5px; color: var(--text-sub); margin-top: 4px; }
.interest-updated { font-size: 9.5px; color: rgba(74,96,128,0.7); margin-top: 2px; }

/* ─── MODAL ─── */
.modal-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.45); z-index: 100;
  display: flex; align-items: center; justify-content: center; padding: 20px;
}
.modal-box {
  background: var(--surface); border-radius: 16px; width: 560px; max-width: 100%;
  box-shadow: 0 20px 60px rgba(0,0,0,0.2); overflow: hidden;
}
.modal-header {
  padding: 20px 24px; border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
}
.modal-title { font-size: 15px; font-weight: 800; color: var(--text); }
.modal-close { width: 30px; height: 30px; border-radius: 7px; border: none; background: var(--bg); cursor: pointer; font-size: 16px; color: var(--text-sub); display: flex; align-items: center; justify-content: center; transition: background 0.15s; }
.modal-close:hover { background: var(--border); }
.modal-body { padding: 20px 24px; }
.modal-footer { padding: 14px 24px; border-top: 1px solid var(--border); display: flex; justify-content: flex-end; gap: 8px; }
.detail-row { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid var(--border); }
.detail-row:last-child { border-bottom: none; }
.detail-key { font-size: 12px; color: var(--text-sub); font-weight: 500; }
.detail-val { font-size: 12.5px; font-weight: 700; color: var(--text); }

/* ─── PAGINATION ─── */
.pagination { display: flex; align-items: center; gap: 4px; justify-content: center; margin-top: 14px; }
.page-btn { width: 30px; height: 30px; border-radius: 7px; border: 1.5px solid var(--border); background: var(--surface); cursor: pointer; font-size: 12px; color: var(--text-sub); display: flex; align-items: center; justify-content: center; transition: all 0.15s; font-family: inherit; }
.page-btn:hover { border-color: var(--accent); color: var(--accent); }
.page-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; font-weight: 700; }

/* ─── SAVE TOAST ─── */
.toast {
  position: fixed; bottom: 24px; right: 24px; background: var(--navy); color: #fff;
  padding: 12px 20px; border-radius: 10px; font-size: 13px; font-weight: 600;
  display: flex; align-items: center; gap: 8px; z-index: 200;
  box-shadow: 0 4px 20px rgba(0,0,0,0.25); animation: slideUp 0.3s ease;
}
@keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

/* ─── CUSTOM TOOLTIP ─── */
.ctip { background: #0D1B2A; color: #fff; padding: 8px 12px; border-radius: 8px; font-size: 12px; box-shadow: 0 4px 16px rgba(0,0,0,0.25); }
.ctip-label { font-weight: 700; margin-bottom: 3px; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 3px; }
</style>
</head>
<body>
<div id="root"></div>
<script>
const { useState, useCallback, useRef } = React;
const {
  ResponsiveContainer, BarChart, Bar, LineChart, Line,
  XAxis, YAxis, CartesianGrid, Tooltip, Legend, Cell,
  PieChart, Pie, ComposedChart, Area, AreaChart, ReferenceLine
} = Recharts;

// ─── DUMMY DATA ──────────────────────────────────────────────────────────────

const REGIONS = ['서울특별시', '경기도', '인천광역시', '부산광역시', '대전광역시', '광주광역시', '대구광역시', '울산광역시'];
const DISTRICTS = {
  '서울특별시': ['강남구', '서초구', '송파구', '마포구', '영등포구', '용산구', '성동구'],
