// ───────────── Utility Components ─────────────
function Badge({label, color, bg}){
  return <span style={{display:'inline-flex',alignItems:'center',padding:'2px 8px',borderRadius:999,fontSize:11,fontWeight:600,color:color||C.primary,background:bg||C.infoBg,letterSpacing:'0.02em'}}>{label}</span>;
}

function StatusDot({status}){
  const map={normal:{c:C.success,label:'정상'},warn:{c:C.warning,label:'주의'},delayed:{c:'#8B5CF6',label:'지연'},critical:{c:C.danger,label:'긴급'}};
  const s=map[status]||map.normal;
  return <span style={{display:'inline-flex',alignItems:'center',gap:5,fontSize:12,fontWeight:600,color:s.c}}><span style={{width:7,height:7,borderRadius:'50%',background:s.c,display:'inline-block',animation:status==='warn'||status==='critical'?'pulse 1.5s infinite':undefined}}></span>{s.label}</span>;
}

function KpiMini({label,value,unit,ok}){
  return(
    <div style={{display:'flex',flexDirection:'column',gap:2}}>
      <span style={{fontSize:11,color:'rgba(255,255,255,0.7)',fontWeight:500}}>{label}</span>
      <span style={{fontSize:22,fontWeight:800,color:'#FFF',letterSpacing:'-0.02em'}}>{value}<span style={{fontSize:13,fontWeight:600,opacity:0.8,marginLeft:2}}>{unit}</span></span>
    </div>
  );
}

function Card({children,style,onClick}){
  return <div onClick={onClick} style={{background:C.surface,borderRadius:12,border:`1px solid ${C.border}`,padding:'20px',transition:'box-shadow 0.15s,transform 0.15s',cursor:onClick?'pointer':undefined,...style}} onMouseEnter={onClick?e=>{e.currentTarget.style.boxShadow='0 4px 20px rgba(8,145,178,0.12)';e.currentTarget.style.transform='translateY(-1px)'}:undefined} onMouseLeave={onClick?e=>{e.currentTarget.style.boxShadow='none';e.currentTarget.style.transform='none'}:undefined}>{children}</div>;
}

function SectionHeader({title,sub,right}){
  return(
    <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:20}}>
      <div>
        <h2 style={{fontSize:18,fontWeight:700,color:C.text}}>{title}</h2>
        {sub&&<p style={{fontSize:13,color:C.textMuted,marginTop:2}}>{sub}</p>}
      </div>
      {right}
    </div>
  );
}

function ProgressBar({value,max=100,color=C.primary,height=6,animated=false}){
  const pct=Math.min(100,(value/max)*100);
  return(
    <div style={{background:'#E2E8F0',borderRadius:999,height,overflow:'hidden'}}>
      <div style={{height:'100%',width:`${pct}%`,background:color,borderRadius:999,transition:'width 0.6s ease'}}/>
    </div>
  );
}

function Select({value,onChange,options,label}){
  return(
    <div style={{display:'flex',alignItems:'center',gap:8}}>
      {label&&<span style={{fontSize:12,color:C.textMuted,whiteSpace:'nowrap'}}>{label}</span>}
      <select value={value} onChange={e=>onChange(e.target.value)} style={{fontSize:13,padding:'6px 10px',border:`1px solid ${C.border}`,borderRadius:8,background:'#fff',color:C.text,outline:'none',cursor:'pointer'}}>
        {options.map(o=><option key={o.value||o} value={o.value||o}>{o.label||o}</option>)}
      </select>
    </div>
  );
}

function FilterChip({label,active,onClick}){
  return(
    <button onClick={onClick} style={{padding:'5px 12px',borderRadius:999,border:`1.5px solid ${active?C.primary:C.border}`,background:active?C.primary:'#fff',color:active?'#fff':C.textMuted,fontSize:12,fontWeight:600,cursor:'pointer',transition:'all 0.15s'}}>{label}</button>
  );
}

// ───────────── Drawer ─────────────
function Drawer({open,onClose,title,children}){
  if(!open) return null;
  return(
    <div style={{position:'fixed',inset:0,zIndex:800}}>
      <div onClick={onClose} style={{position:'absolute',inset:0,background:'rgba(15,23,42,0.35)',animation:'fadeIn 200ms ease'}}/>
      <div style={{position:'absolute',top:0,right:0,width:420,height:'100%',background:'#fff',boxShadow:'-4px 0 30px rgba(0,0,0,0.1)',animation:'drawerIn 250ms cubic-bezier(0.4,0,0.2,1)',display:'flex',flexDirection:'column'}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'20px 24px',borderBottom:`1px solid ${C.border}`}}>
          <h3 style={{fontSize:16,fontWeight:700}}>{title}</h3>
          <button onClick={onClose} style={{background:'none',border:'none',fontSize:20,cursor:'pointer',color:C.textMuted,lineHeight:1}}>✕</button>
        </div>
        <div style={{flex:1,overflowY:'auto',padding:'24px'}}>{children}</div>
      </div>
    </div>
  );
}

function DrawerRow({label,value,sub}){
  return(
    <div style={{padding:'10px 0',borderBottom:`1px solid ${C.border}`}}>
      <div style={{fontSize:11,color:C.textMuted,fontWeight:500,marginBottom:3}}>{label}</div>
      <div style={{fontSize:14,fontWeight:600,color:C.text}}>{value}</div>
      {sub&&<div style={{fontSize:12,color:C.textMuted,marginTop:2}}>{sub}</div>}
    </div>
  );
}

// ───────────── Page 1: KPI Dashboard ─────────────
function PageKpiDashboard(){
  const [lineFilter, setLineFilter] = useState('전체');
  const [selectedCard, setSelectedCard] = useState(null);

  const filtered = lineFilter==='전체' ? KPI_CARDS : KPI_CARDS.filter(k=>k.line.startsWith(lineFilter));

  const totProduction = KPI_CARDS.reduce((a,k)=>a+k.production,0);
  const avgDefect = (KPI_CARDS.reduce((a,k)=>a+k.defectRate,0)/KPI_CARDS.length).toFixed(1);
  const avgUptime = (KPI_CARDS.reduce((a,k)=>a+k.uptime,0)/KPI_CARDS.length).toFixed(1);

  const oeeColor = v => v>=85?C.success:v>=75?C.warning:C.danger;

  return(
    <div>
      {/* Hero Banner */}
      <div style={{background:C.gradient,borderRadius:16,padding:'28px 32px',marginBottom:24,color:'#fff',position:'relative',overflow:'hidden'}}>
        <div style={{position:'absolute',top:-40,right:-40,width:200,height:200,borderRadius:'50%',background:'rgba(255,255,255,0.05)'}}/>
        <div style={{position:'absolute',bottom:-60,right:80,width:140,height:140,borderRadius:'50%',background:'rgba(255,255,255,0.06)'}}/>
        <div style={{position:'relative',zIndex:1}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',flexWrap:'wrap',gap:16}}>
            <div>
              <p style={{fontSize:12,fontWeight:600,opacity:0.75,letterSpacing:'0.05em',marginBottom:6}}>공정별 KPI 대시보드 / 오늘 (2026-04-15)</p>
              <h1 style={{fontSize:26,fontWeight:800,letterSpacing:'-0.02em'}}>광주 제1공장 실시간 현황</h1>
            </div>
            <div style={{display:'flex',gap:32}}>
              <KpiMini label="금일 총 생산량" value={totProduction.toLocaleString()} unit="개"/>
              <KpiMini label="평균 불량률" value={avgDefect} unit="%"/>
              <KpiMini label="평균 가동률" value={avgUptime} unit="%"/>
            </div>
          </div>
        </div>
      </div>

      {/* Filter */}
      <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:20,flexWrap:'wrap'}}>
        <span style={{fontSize:13,color:C.textMuted,fontWeight:600}}>라인 필터:</span>
        {['전체','L1','L2','L3','L4','L5'].map(f=>(
          <FilterChip key={f} label={f==='전체'?'전체 라인':f+' 라인'} active={lineFilter===f} onClick={()=>setLineFilter(f)}/>
        ))}
      </div>

      {/* KPI Cards Grid */}
      <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(300px,1fr))',gap:16,marginBottom:24}}>
        {filtered.map((k,i)=>(
          <Card key={k.line} onClick={()=>setSelectedCard(k)} style={{animation:`slideUp ${200+i*60}ms ease`}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:14}}>
              <div>
                <h3 style={{fontSize:15,fontWeight:700,color:C.text}}>{k.line}</h3>
                <div style={{display:'flex',gap:6,marginTop:4,flexWrap:'wrap'}}>
                  <Badge label={k.shift} color='#0E7490' bg='#CFFAFE'/>
                  <Badge label={k.product} color='#6D28D9' bg='#EDE9FE'/>
                </div>
              </div>
              <div style={{textAlign:'right'}}>
                <div style={{fontSize:11,color:C.textMuted,fontWeight:500}}>OEE</div>
                <div style={{fontSize:24,fontWeight:800,color:oeeColor(k.oee)}}>{k.oee}<span style={{fontSize:12}}>%</span></div>
              </div>
            </div>

            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:10,marginBottom:14}}>
              {[
                {label:'생산량',value:`${k.production.toLocaleString()}`,unit:'개',target:`목표 ${k.productionTarget.toLocaleString()}`,ok:k.production>=k.productionTarget*0.95},
                {label:'불량률',value:k.defectRate,unit:'%',target:`기준 ${k.defectTarget}%`,ok:k.defectRate<=k.defectTarget},
                {label:'가동률',value:k.uptime,unit:'%',target:`목표 ${k.uptimeTarget}%`,ok:k.uptime>=k.uptimeTarget},
              ].map(m=>(
                <div key={m.label} style={{background:'#F8FAFC',borderRadius:8,padding:'10px 12px'}}>
                  <div style={{fontSize:10,color:C.textMuted,fontWeight:600,marginBottom:3}}>{m.label}</div>
                  <div style={{fontSize:18,fontWeight:800,color:m.ok?C.success:C.danger}}>{m.value}<span style={{fontSize:10,fontWeight:600}}>{m.unit}</span></div>
                  <div style={{fontSize:10,color:C.textMuted,marginTop:2}}>{m.target}</div>
                </div>
              ))}
            </div>

            <div>
              <div style={{display:'flex',justifyContent:'space-between',marginBottom:4}}>
                <span style={{fontSize:11,color:C.textMuted}}>생산 달성률</span>
                <span style={{fontSize:11,fontWeight:700,color:C.textSub}}>{((k.production/k.productionTarget)*100).toFixed(1)}%</span>
              </div>

// ───────────── Page 2: Drilldown ─────────────
function PageDrilldown(){
  const [path, setPath] = useState([FACTORY]);
  const [selectedNode, setSelectedNode] = useState(null);

  const current = path[path.length-1];
  const oeeColor = v => v>=85?C.success:v>=75?C.warning:C.danger;
  const typeLabel = {factory:'공장',building:'건물/동',line:'라인',machine:'설비/기계'};
  const typeIcon = {factory:'🏭',building:'🏗️',line:'⚙️',machine:'🔧'};

  const drill = (node) => {
    if(node.children?.length) setPath([...path,node]);
    else setSelectedNode(node);
  };
  const goTo = (idx) => setPath(path.slice(0,idx+1));

  return(
    <div>
      {/* Hero */}
      <div style={{background:C.gradient,borderRadius:16,padding:'28px 32px',marginBottom:24,color:'#fff',position:'relative',overflow:'hidden'}}>
        <div style={{position:'absolute',top:-30,right:-30,width:160,height:160,borderRadius:'50%',background:'rgba(255,255,255,0.06)'}}/>
        <p style={{fontSize:12,fontWeight:600,opacity:0.75,letterSpacing:'0.05em',marginBottom:6}}>드릴다운 분석 / 계층 탐색</p>
        <h1 style={{fontSize:26,fontWeight:800,letterSpacing:'-0.02em'}}>공장 → 라인 → 설비 계층 분석</h1>
      </div>

      {/* Breadcrumb */}
      <div style={{display:'flex',alignItems:'center',gap:6,marginBottom:20,flexWrap:'wrap'}}>
        {path.map((p,i)=>(
          <React.Fragment key={i}>
            <button onClick={()=>goTo(i)} style={{background:'none',border:'none',fontSize:13,fontWeight:i===path.length-1?700:500,color:i===path.length-1?C.primary:C.textMuted,cursor:'pointer',padding:'4px 6px',borderRadius:6,transition:'color 0.15s'}}>
              {typeIcon[p.type]} {p.name}
            </button>
            {i<path.length-1&&<span style={{color:C.border,fontSize:14,fontWeight:300}}>/</span>}
          </React.Fragment>
        ))}
      </div>

      {/* Current node summary */}
      <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:12,marginBottom:24}}>
        {[
          {label:'생산량',value:current.production.toLocaleString()+'개',color:C.primary},
          {label:'불량률',value:current.defectRate+'%',color:current.defectRate>2?C.danger:C.success},
          {label:'가동률',value:current.uptime+'%',color:current.uptime>=90?C.success:C.warning},
          {label:'OEE',value:current.oee+'%',color:oeeColor(current.oee)},
        ].map(m=>(
          <Card key={m.label} style={{textAlign:'center',padding:'18px 12px'}}>
            <div style={{fontSize:11,color:C.textMuted,fontWeight:600,marginBottom:6}}>{m.label}</div>
            <div style={{fontSize:24,fontWeight:800,color:m.color}}>{m.value}</div>
          </Card>
        ))}
      </div>

      {/* Children grid */}
      {current.children&&(
        <div>
          <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:14}}>
            <span style={{fontSize:14,fontWeight:700,color:C.text}}>{typeLabel[current.type]} 하위 {typeLabel[current.children[0]?.type]}</span>
            <Badge label={`${current.children.length}개`} color={C.primary} bg={C.infoBg}/>
            <span style={{fontSize:12,color:C.textMuted}}>· 카드 클릭 시 하위 계층으로 진입</span>
          </div>
          <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(280px,1fr))',gap:14}}>
            {current.children.map((child,i)=>(
              <Card key={child.code} onClick={()=>drill(child)} style={{animation:`slideUp ${150+i*70}ms ease`,borderLeft:`4px solid ${oeeColor(child.oee)}`}}>
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:12}}>
                  <div>
                    <div style={{fontSize:11,color:C.textMuted,fontWeight:600,marginBottom:3}}>{typeIcon[child.type]} {typeLabel[child.type]}</div>
                    <h3 style={{fontSize:15,fontWeight:700}}>{child.name}</h3>
                    <span style={{fontSize:11,color:C.textMuted}}>{child.code}</span>
                  </div>
                  <div style={{textAlign:'right'}}>
                    <div style={{fontSize:10,color:C.textMuted}}>OEE</div>
                    <div style={{fontSize:22,fontWeight:800,color:oeeColor(child.oee)}}>{child.oee}%</div>
                  </div>
                </div>
                <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:8,marginBottom:10}}>
                  {[
                    {l:'생산량',v:child.production.toLocaleString()+'개'},
                    {l:'불량률',v:child.defectRate+'%'},
                    {l:'가동률',v:child.uptime+'%'},
                  ].map(m=>(
                    <div key={m.l} style={{background:'#F8FAFC',borderRadius:6,padding:'6px 8px',textAlign:'center'}}>
                      <div style={{fontSize:9,color:C.textMuted,fontWeight:600}}>{m.l}</div>
                      <div style={{fontSize:14,fontWeight:700,color:C.text,marginTop:1}}>{m.v}</div>
                    </div>
                  ))}
                </div>
                {child.operator&&<div style={{fontSize:12,color:C.textMuted}}>담당: {child.operator}</div>}
                {child.children&&<div style={{fontSize:11,color:C.primary,fontWeight:600,marginTop:6}}>▶ 하위 {child.children.length}개 →</div>}
                {!child.children&&<div style={{fontSize:11,color:C.textMuted,marginTop:6}}>최하위 설비 (클릭 → 상세)</div>}
              </Card>
            ))}
          </div>
        </div>
      )}

      {/* Drawer for leaf node */}
      <Drawer open={!!selectedNode} onClose={()=>setSelectedNode(null)} title={selectedNode?.name+' 설비 상세'}>
        {selectedNode&&(
          <div>
            <div style={{background:C.gradient,borderRadius:10,padding:'16px 20px',marginBottom:20,color:'#fff'}}>
              <div style={{fontSize:22,fontWeight:800}}>OEE {selectedNode.oee}%</div>
              <div style={{fontSize:12,opacity:0.8,marginTop:2}}>{selectedNode.code}</div>
            </div>
            <DrawerRow label="설비 코드" value={selectedNode.code}/>
            <DrawerRow label="담당자" value={selectedNode.operator||'-'}/>
            <DrawerRow label="생산량" value={selectedNode.production.toLocaleString()+' 개'}/>
            <DrawerRow label="불량률" value={selectedNode.defectRate+' %'}/>
            <DrawerRow label="가동률" value={selectedNode.uptime+' %'}/>
            <DrawerRow label="OEE" value={selectedNode.oee+' %'}/>
            <div style={{marginTop:20}}>
              <div style={{fontSize:12,fontWeight:700,marginBottom:10,color:C.text}}>OEE 분해</div>
              {[
                {l:'가용성',v:selectedNode.uptime,c:C.primary},
                {l:'성능',v:((selectedNode.production/(selectedNode.production/0.95))*100).toFixed(1),c:'#6366F1'},
                {l:'품질',v:(100-selectedNode.defectRate).toFixed(1),c:C.success},
              ].map(m=>(
                <div key={m.l} style={{marginBottom:10}}>
                  <div style={{display:'flex',justifyContent:'space-between',marginBottom:3}}>
                    <span style={{fontSize:12,color:C.textMuted}}>{m.l}</span>
                    <span style={{fontSize:12,fontWeight:700,color:m.c}}>{m.v}%</span>
                  </div>
                  <ProgressBar value={parseFloat(m.v)} color={m.c}/>
                </div>
              ))}
            </div>
          </div>
        )}
      </Drawer>
    </div>
  );
}

        <h1 style={{fontSize:26,fontWeight:800,letterSpacing:'-0.02em'}}>원시 → 정제 → 집계 자동화 파이프라인</h1>
      </div>

      {/* Pipeline Stages */}
      <Card style={{marginBottom:20}}>
        <SectionHeader title="파이프라인 단계 시각화" sub="원시 데이터 → 집계 KPI 자동 처리 흐름"/>
        <div style={{display:'flex',alignItems:'stretch',gap:0,overflowX:'auto',paddingBottom:4}}>
          {stageData.map((s,i)=>(
            <React.Fragment key={s.label}>
              <div style={{flex:'1 1 0',minWidth:140,background:i%2===0?'#F8FAFC':'#F0FBFF',borderRadius:10,padding:'18px 16px',textAlign:'center',position:'relative'}}>
                <div style={{fontSize:28,marginBottom:8}}>{s.icon}</div>
                <div style={{fontSize:12,fontWeight:800,color:C.text,whiteSpace:'pre-line',lineHeight:1.4,marginBottom:6}}>{s.label}</div>
                <div style={{fontSize:11,color:C.textMuted,marginBottom:10,lineHeight:1.5}}>{s.desc}</div>
                <div style={{fontSize:18,fontWeight:800,color:C.primary,marginBottom:4}}>{s.records}</div>
                <div style={{fontSize:10,color:C.textMuted,marginBottom:8}}>처리 레코드</div>
                <StatusDot status={s.status}/>
              </div>
              {i<stageData.length-1&&(
                <div style={{display:'flex',alignItems:'center',padding:'0 6px',color:C.primary,fontSize:20,fontWeight:700,flexShrink:0}}>→</div>
              )}
            </React.Fragment>
          ))}
        </div>
      </Card>

      {/* Source Status + Queue */}
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:16,marginBottom:20}}>
        {/* Source Cards */}
        <Card>
          <SectionHeader title="수집 소스 상태" sub="실시간 연결 현황 · 클릭 시 상세"/>
          <div style={{display:'flex',flexDirection:'column',gap:10}}>
            {SOURCES.map(src=>(
              <div key={src.id} onClick={()=>setSelectedSource(src)} style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'10px 12px',borderRadius:8,border:`1px solid ${C.border}`,cursor:'pointer',transition:'all 0.15s',background:'#FAFAFA'}}
                onMouseEnter={e=>{e.currentTarget.style.background='#F0FBFF';e.currentTarget.style.borderColor=C.primary}}
                onMouseLeave={e=>{e.currentTarget.style.background='#FAFAFA';e.currentTarget.style.borderColor=C.border}}>
                <div>
                  <div style={{fontSize:13,fontWeight:700,color:C.text}}>{src.name}</div>
                  <div style={{fontSize:11,color:C.textMuted,marginTop:1}}>{src.type} · 주기: {src.interval} · 마지막: {src.lastSync}</div>
                </div>
                <div style={{textAlign:'right'}}>
                  <StatusDot status={src.status}/>
                  <div style={{fontSize:10,color:C.textMuted,marginTop:3}}>{src.errors>0?`오류 ${src.errors}건`:'오류 없음'}</div>
                </div>
              </div>
            ))}
          </div>
        </Card>

        {/* Queue */}
        <Card>
          <SectionHeader title="처리 큐 현황" sub="Bull Queue 실시간 상태"/>
          <div style={{display:'flex',flexDirection:'column',gap:16}}>
            {QUEUES.map(q=>{
              const total=q.pending+q.processing+q.done;
              const pct=((q.done/total)*100).toFixed(1);
              return(
                <div key={q.name}>
                  <div style={{display:'flex',justifyContent:'space-between',marginBottom:4}}>
                    <div>
                      <span style={{fontSize:13,fontWeight:700,color:C.text,fontFamily:'monospace'}}>{q.name}</span>
                      <span style={{marginLeft:8,fontSize:11,color:C.textMuted}}>처리중 {q.processing} · 대기 {q.pending}</span>
                    </div>
                    <span style={{fontSize:12,fontWeight:700,color:q.color}}>{pct}%</span>
                  </div>
                  <ProgressBar value={parseFloat(pct)} color={q.color}/>
                  <div style={{display:'flex',gap:12,marginTop:4}}>
                    <span style={{fontSize:10,color:C.success,fontWeight:600}}>완료: {q.done.toLocaleString()}</span>
                    <span style={{fontSize:10,color:q.failRate>0.1?C.danger:C.textMuted,fontWeight:600}}>실패율: {q.failRate}%</span>
                  </div>
                </div>
              );
            })}
          </div>
        </Card>
      </div>

      {/* Anomaly list */}
      <Card>
        <SectionHeader title="이상값 알림 목록" sub="자동 탐지된 이상 신호 · 클릭 시 상세"/>
        <div style={{display:'flex',flexDirection:'column',gap:8}}>
          {ANOMALIES.map((a,i)=>{
            const sc={critical:{bg:C.dangerBg,color:C.danger,label:'긴급'},warn:{bg:C.warningBg,color:C.warning,label:'주의'},info:{bg:C.infoBg,color:C.info,label:'정보'}};
            const s=sc[a.severity]||sc.info;
            return(
              <div key={i} onClick={()=>setSelectedAnomaly(a)} style={{display:'flex',alignItems:'center',gap:14,padding:'12px 14px',borderRadius:8,border:`1px solid ${C.border}`,cursor:'pointer',background:'#FAFAFA',transition:'all 0.15s'}}
                onMouseEnter={e=>{e.currentTarget.style.background='#F0FBFF';e.currentTarget.style.borderColor=C.primary}}
                onMouseLeave={e=>{e.currentTarget.style.background='#FAFAFA';e.currentTarget.style.borderColor=C.border}}>
                <span style={{fontSize:12,fontWeight:700,color:C.textMuted,whiteSpace:'nowrap'}}>{a.time}</span>
                <span style={{padding:'3px 8px',borderRadius:999,fontSize:11,fontWeight:700,background:s.bg,color:s.color,whiteSpace:'nowrap'}}>{s.label}</span>
                <div style={{flex:1}}>
                  <span style={{fontSize:13,fontWeight:600,color:C.text}}>{a.source}</span>
                  <span style={{fontSize:12,color:C.textMuted,marginLeft:8}}>{a.field} = <b style={{color:s.color}}>{a.value}</b> (임계: {a.threshold})</span>
                </div>
                <span style={{fontSize:12,color:C.primary,fontWeight:600}}>상세 →</span>
              </div>
            );
          })}
        </div>
      </Card>

      {/* Source Drawer */}
      <Drawer open={!!selectedSource} onClose={()=>setSelectedSource(null)} title={selectedSource?.name+' 상세'}>
        {selectedSource&&(
          <div>
            <div style={{background:C.gradient,borderRadius:10,padding:'16px 20px',marginBottom:20,color:'#fff'}}>
              <div style={{fontSize:18,fontWeight:800}}>{selectedSource.type} 소스</div>
              <StatusDot status={selectedSource.status}/>
            </div>
            <DrawerRow label="소스 ID" value={selectedSource.id}/>
            <DrawerRow label="타입" value={selectedSource.type}/>
            <DrawerRow label="수집 주기" value={selectedSource.interval}/>
            <DrawerRow label="마지막 동기화" value={selectedSource.lastSync}/>
            <DrawerRow label="총 레코드" value={selectedSource.records.toLocaleString()+' 건'}/>
            <DrawerRow label="오류 건수" value={selectedSource.errors+' 건'} sub={selectedSource.errors>0?'오류 로그 확인 필요':'정상'}/>
          </div>
        )}
      </Drawer>

      {/* Anomaly Drawer */}
      <Drawer open={!!selectedAnomaly} onClose={()=>setSelectedAnomaly(null)} title="이상값 상세 정보">
        {selectedAnomaly&&(
          <div>
            <div style={{background:selectedAnomaly.severity==='critical'?'linear-gradient(135deg,#DC2626,#EF4444)':C.gradient,borderRadius:10,padding:'16px 20px',marginBottom:20,color:'#fff'}}>
              <div style={{fontSize:18,fontWeight:800}}>
                {selectedAnomaly.severity==='critical'?'🚨 긴급':selectedAnomaly.severity==='warn'?'⚠️ 주의':'ℹ️ 정보'} 이상값 감지
              </div>
            </div>
            <DrawerRow label="감지 시각" value={selectedAnomaly.time}/>
            <DrawerRow label="소스" value={selectedAnomaly.source}/>
            <DrawerRow label="항목" value={selectedAnomaly.field}/>
            <DrawerRow label="측정값" value={selectedAnomaly.value}/>
            <DrawerRow label="임계값" value={selectedAnomaly.threshold}/>
            <DrawerRow label="초과량" value={(parseFloat(selectedAnomaly.value)-parseFloat(selectedAnomaly.threshold)).toFixed(1)+' ('+selectedAnomaly.field.match(/\(([^)]+)\)/)?.[1]||'단위'+')'} />
            <div style={{marginTop:20,padding:'14px',background:C.warningBg,borderRadius:8,fontSize:12,color:C.warning,fontWeight:600}}>
              ⚠️ 해당 데이터는 이상값으로 분류되어 집계에서 제외되었습니다.
            </div>
          </div>
        )}
      </Drawer>
    </div>
  );
}

// ───────────── TopNav ─────────────
const PAGES = [
  {key:'kpi-dashboard',label:'공정별 KPI 대시보드'},
  {key:'drilldown',label:'드릴다운 분석'},
  {key:'comparison',label:'다차원 필터 및 비교'},
  {key:'data-pipeline',label:'데이터 수집 및 집계 파이프라인'},
];

function TopNav({page,setPage}){
  return(
    <nav style={{background:'#fff',borderBottom:`1px solid ${C.border}`,position:'sticky',top:0,zIndex:100,boxShadow:'0 1px 8px rgba(0,0,0,0.04)'}}>
      <div style={{maxWidth:1280,margin:'0 auto',padding:'0 24px',display:'flex',alignItems:'center',gap:0}}>
        <div style={{padding:'14px 0',marginRight:24,display:'flex',alignItems:'center',gap:10}}>
          <div style={{width:28,height:28,borderRadius:7,background:C.gradient,display:'flex',alignItems:'center',justifyContent:'center',fontSize:14}}>⚙️</div>
          <span style={{fontSize:14,fontWeight:800,color:C.text,letterSpacing:'-0.02em',whiteSpace:'nowrap'}}>MFG Analytics</span>
        </div>
        <div style={{display:'flex',alignItems:'center',gap:2,overflowX:'auto'}}>
          {PAGES.map(p=>(
            <button
              key={p.key}
              onClick={()=>setPage(p.key)}
              style={{
                padding:'16px 14px',
                background:'none',
                border:'none',
                fontSize:13,
                fontWeight:page===p.key?700:500,
                color:page===p.key?C.primary:C.textMuted,
                cursor:'pointer',
                whiteSpace:'nowrap',
                position:'relative',
                transition:'color 0.15s',
              }}
            >
              {p.label}
              {page===p.key&&<div style={{position:'absolute',bottom:0,left:8,right:8,height:2,background:C.primary,borderRadius:'2px 2px 0 0'}}/>}
            </button>
          ))}
        </div>
        <div style={{marginLeft:'auto',display:'flex',alignItems:'center',gap:10,paddingLeft:16}}>
          <div style={{fontSize:11,color:C.textMuted,whiteSpace:'nowrap'}}>
            <span style={{display:'inline-block',width:7,height:7,borderRadius:'50%',background:C.success,marginRight:4,animation:'pulse 2s infinite'}}/>
            실시간 연결
          </div>
          <div style={{width:30,height:30,borderRadius:'50%',background:C.gradient,display:'flex',alignItems:'center',justifyContent:'center',fontSize:12,color:'#fff',fontWeight:700,flexShrink:0}}>K</div>
        </div>
      </div>
    </nav>
  );
}

// ───────────── App ─────────────
function App(){
  const [page,setPage]=useState('kpi-dashboard');

  const pageMap = {
    'kpi-dashboard':<PageKpiDashboard/>,
    'drilldown':<PageDrilldown/>,
    'comparison':<PageComparison/>,
    'data-pipeline':<PagePipeline/>,
  };

  return(
    <div style={{minHeight:'100vh',background:C.bg,fontFamily:'Pretendard,-apple-system,sans-serif'}}>
      <TopNav page={page} setPage={setPage}/>
      <main style={{maxWidth:1280,margin:'0 auto',padding:'28px 24px',animation:'fadeIn 300ms ease'}}>
        {pageMap[page]}
      </main>
    </div>
  );
}

const container=document.getElementById('root');
const rootEl=ReactDOM.createRoot(container);
rootEl.render(<App/>);
</script>
</body>
</html>
