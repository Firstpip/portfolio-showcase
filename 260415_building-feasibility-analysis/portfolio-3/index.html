<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>프롭테크 SaaS 멀티 테넌트 분석 플랫폼 — 구현 데모</title>
<link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/prop-types@15/prop-types.min.js"></script>
<script src="https://unpkg.com/recharts@2.8.0/umd/Recharts.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body,#root{width:100%;height:100%}
body{font-family:'Pretendard',sans-serif;background:#F0FAF6;color:#1A2D25;overflow:hidden}
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-thumb{background:#A7F3D0;border-radius:3px}
.app{display:flex;height:100vh;overflow:hidden}

/* SIDEBAR */
.sidebar{width:240px;background:#FFFFFF;border-right:1px solid #D1FAE5;display:flex;flex-direction:column;flex-shrink:0;box-shadow:2px 0 16px rgba(5,150,105,0.07)}
.sb-logo{padding:22px 20px 16px;border-bottom:1px solid #ECFDF5}
.sb-logo-row{display:flex;align-items:center;gap:10px}
.sb-logo-icon{width:40px;height:40px;background:linear-gradient(135deg,#059669,#10B981);border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:20px}
.sb-logo-text{font-size:15px;font-weight:800;color:#1A2D25}
.sb-logo-sub{font-size:10px;color:#059669;margin-top:2px;font-weight:700;letter-spacing:.3px}
.sb-nav{flex:1;padding:10px 10px;overflow-y:auto}
.sb-section{padding:14px 10px 6px;font-size:10px;font-weight:700;color:#6EE7B7;letter-spacing:1.2px;text-transform:uppercase}
.sb-item{display:flex;align-items:center;gap:9px;padding:10px 14px;cursor:pointer;transition:all .2s;font-size:13.5px;color:#6B7280;border-left:3px solid transparent;border-radius:10px;margin-bottom:2px;position:relative}
.sb-item:hover{background:#ECFDF5;color:#059669}
.sb-item.active{background:#D1FAE5;color:#059669;font-weight:700;border-left:3px solid #059669}
.sb-item .sb-icon{font-size:17px;width:22px;text-align:center;flex-shrink:0}
.sb-badge{background:#EF4444;color:#fff;font-size:10px;font-weight:700;padding:2px 6px;border-radius:10px;margin-left:auto}
.sb-user{padding:14px 16px;border-top:1px solid #ECFDF5;display:flex;align-items:center;gap:10px}
.sb-avatar{width:36px;height:36px;background:linear-gradient(135deg,#059669,#10B981);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:#fff;flex-shrink:0}
.sb-user-name{font-size:13px;font-weight:700;color:#1A2D25}
.sb-user-role{font-size:11px;color:#059669;font-weight:600}

/* MAIN */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.topbar{background:#fff;border-bottom:1px solid #D1FAE5;padding:0 26px;height:58px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;box-shadow:0 1px 8px rgba(5,150,105,0.04)}
.topbar-title{font-size:17px;font-weight:800;color:#1A2D25}
.topbar-right{display:flex;align-items:center;gap:10px}
.tb-chip{background:#ECFDF5;color:#059669;padding:5px 13px;border-radius:20px;font-size:12px;font-weight:600;border:1px solid #A7F3D0}
.tb-chip.warn{background:#FEF3C7;color:#D97706;border-color:#FDE68A}
.content{flex:1;overflow-y:auto;padding:22px 26px}

/* MASTER DETAIL LAYOUT */
.md-layout{display:grid;grid-template-columns:42% 58%;gap:16px;height:calc(100vh - 100px)}
.master-panel{background:#fff;border-radius:20px;border:1.5px solid #D1FAE5;box-shadow:0 4px 20px rgba(5,150,105,0.06);overflow:hidden;display:flex;flex-direction:column}
.detail-panel{background:#fff;border-radius:20px;border:1.5px solid #D1FAE5;box-shadow:0 4px 20px rgba(5,150,105,0.06);overflow:hidden;display:flex;flex-direction:column}
.panel-header{padding:18px 20px;border-bottom:1px solid #ECFDF5;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.panel-title{font-size:14px;font-weight:800;color:#1A2D25}
.panel-body{flex:1;overflow-y:auto;padding:14px}

/* CARDS */
.list-item{padding:14px 16px;border-radius:14px;cursor:pointer;transition:all .2s;border:1.5px solid #E5E7EB;margin-bottom:10px;position:relative}
.list-item:hover{border-color:#A7F3D0;background:#F0FAF6}
.list-item.selected{border-color:#059669;background:#ECFDF5;box-shadow:0 2px 12px rgba(5,150,105,0.12)}
.list-item-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:8px}
.list-item-name{font-size:13.5px;font-weight:700;color:#1A2D25}
.badge{font-size:10.5px;font-weight:700;padding:3px 9px;border-radius:20px}
.badge-active{background:#D1FAE5;color:#059669}
.badge-trial{background:#FEF3C7;color:#D97706}
.badge-inactive{background:#F3F4F6;color:#6B7280}
.badge-owner{background:#EDE9FE;color:#7C3AED}
.badge-editor{background:#DBEAFE;color:#2563EB}
.badge-viewer{background:#F3F4F6;color:#6B7280}
.list-item-meta{font-size:12px;color:#9CA3AF;display:flex;gap:12px}
.list-item-meta span{display:flex;align-items:center;gap:4px}

/* DETAIL SECTIONS */
.detail-section{margin-bottom:18px}
.detail-section-title{font-size:12px;font-weight:700;color:#6B7280;text-transform:uppercase;letter-spacing:.8px;margin-bottom:10px;display:flex;align-items:center;gap:6px}
.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.info-card{background:#F9FAFB;border-radius:12px;padding:14px;border:1px solid #E5E7EB}
.info-card-label{font-size:11px;color:#9CA3AF;font-weight:600;margin-bottom:4px}
.info-card-value{font-size:14px;font-weight:700;color:#1A2D25}
.info-card-value.green{color:#059669}

/* PROGRESS BARS */
.prog-row{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.prog-label{font-size:12.5px;color:#374151;font-weight:500;flex:1}
.prog-track{flex:2;height:8px;background:#F3F4F6;border-radius:10px;overflow:hidden}
.prog-fill{height:100%;border-radius:10px;transition:width .4s}
.prog-fill-green{background:linear-gradient(90deg,#10B981,#059669)}
.prog-fill-yellow{background:linear-gradient(90deg,#F59E0B,#D97706)}
.prog-fill-red{background:linear-gradient(90deg,#EF4444,#DC2626)}
.prog-pct{font-size:12px;font-weight:700;width:38px;text-align:right}
.pct-green{color:#059669}
.pct-yellow{color:#D97706}
.pct-red{color:#EF4444}

/* RLS VISUAL */
.rls-box{background:#F0FAF6;border:1.5px solid #A7F3D0;border-radius:14px;padding:16px;margin-bottom:10px}
.rls-title{font-size:12.5px;font-weight:700;color:#065F46;margin-bottom:10px;display:flex;align-items:center;gap:6px}
.rls-policy{display:flex;align-items:flex-start;gap:10px;background:#fff;border-radius:10px;padding:11px 13px;margin-bottom:8px;border:1px solid #D1FAE5}
.rls-icon{font-size:18px;flex-shrink:0}
.rls-policy-name{font-size:12.5px;font-weight:700;color:#1A2D25}
.rls-policy-desc{font-size:11.5px;color:#6B7280;margin-top:3px;line-height:1.5}
.rls-tag{display:inline-flex;align-items:center;gap:4px;background:#ECFDF5;color:#059669;font-size:10.5px;font-weight:700;padding:2px 8px;border-radius:6px;margin-top:6px}

/* PLAN CARDS */
.plan-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:18px}
.plan-card{border-radius:18px;padding:20px;border:2px solid transparent;cursor:pointer;transition:all .2s;position:relative;overflow:hidden}
.plan-card.starter{background:#F9FAFB;border-color:#E5E7EB}
.plan-card.pro{background:linear-gradient(135deg,#ECFDF5,#D1FAE5);border-color:#059669}
.plan-card.enterprise{background:linear-gradient(135deg,#EDE9FE,#DDD6FE);border-color:#7C3AED}
.plan-badge{font-size:10px;font-weight:700;padding:3px 9px;border-radius:20px;display:inline-block;margin-bottom:12px}
.plan-badge.starter{background:#E5E7EB;color:#6B7280}
.plan-badge.pro{background:#059669;color:#fff}
.plan-badge.enterprise{background:#7C3AED;color:#fff}
.plan-name{font-size:16px;font-weight:800;color:#1A2D25;margin-bottom:4px}
.plan-price{font-size:22px;font-weight:800;color:#059669;margin-bottom:2px}
.plan-price.enterprise{color:#7C3AED}
.plan-period{font-size:11px;color:#9CA3AF;margin-bottom:14px}
.plan-feature{font-size:12px;color:#374151;display:flex;align-items:center;gap:6px;margin-bottom:6px}
.plan-pop{position:absolute;top:14px;right:14px;background:#059669;color:#fff;font-size:10px;font-weight:700;padding:3px 8px;border-radius:20px}

/* USAGE TABLE */
.usage-table{background:#fff;border-radius:16px;border:1.5px solid #D1FAE5;overflow:hidden}
.usage-table-head{display:grid;grid-template-columns:1.5fr 1fr 1fr 1fr 80px;gap:10px;padding:12px 18px;background:#F0FAF6;border-bottom:1px solid #D1FAE5;font-size:11px;font-weight:700;color:#6B7280;text-transform:uppercase;letter-spacing:.6px}
.usage-table-row{display:grid;grid-template-columns:1.5fr 1fr 1fr 1fr 80px;gap:10px;padding:12px 18px;border-bottom:1px solid #F3F4F6;align-items:center;transition:background .15s}
.usage-table-row:hover{background:#F9FAFB}
.usage-table-row:last-child{border-bottom:none}
.usage-tenant-name{font-size:13px;font-weight:700;color:#1A2D25}
.usage-tenant-plan{font-size:11px;color:#059669;font-weight:600;margin-top:2px}
.alert-chip{background:#FEE2E2;color:#EF4444;font-size:10.5px;font-weight:700;padding:3px 9px;border-radius:20px;display:inline-block}
.normal-chip{background:#D1FAE5;color:#059669;font-size:10.5px;font-weight:700;padding:3px 9px;border-radius:20px;display:inline-block}

/* TEAM */
.team-header-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.btn-primary{background:linear-gradient(135deg,#059669,#10B981);color:#fff;border:none;padding:9px 18px;border-radius:10px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;display:flex;align-items:center;gap:6px}
.btn-secondary{background:#F3F4F6;color:#374151;border:none;padding:7px 14px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit}
.btn-sm{background:#ECFDF5;color:#059669;border:1px solid #A7F3D0;padding:5px 12px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit}
.member-card{display:flex;align-items:center;gap:14px;padding:14px 16px;border-radius:14px;border:1.5px solid #E5E7EB;margin-bottom:10px;transition:all .2s}
.member-card:hover{border-color:#A7F3D0;background:#F0FAF6}
.member-avatar{width:42px;height:42px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:800;flex-shrink:0;color:#fff}
.member-info{flex:1}
.member-name{font-size:13.5px;font-weight:700;color:#1A2D25}
.member-email{font-size:12px;color:#9CA3AF;margin-top:2px}
.member-actions{display:flex;align-items:center;gap:8px}

/* SHARED ANALYSIS CARDS */
.shared-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px}
.shared-card{background:#F9FAFB;border-radius:14px;padding:16px;border:1.5px solid #E5E7EB;cursor:pointer;transition:all .2s}
.shared-card:hover{border-color:#A7F3D0;background:#F0FAF6;box-shadow:0 4px 16px rgba(5,150,105,0.08)}
.shared-card-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:10px}
.shared-card-title{font-size:13px;font-weight:700;color:#1A2D25}
.shared-card-meta{font-size:11.5px;color:#9CA3AF;margin-top:4px}
.shared-card-footer{display:flex;align-items:center;justify-content:space-between;margin-top:12px;padding-top:10px;border-top:1px solid #E5E7EB}
.shared-avatars{display:flex}
.shared-avatar-sm{width:24px;height:24px;border-radius:6px;border:2px solid #fff;margin-left:-6px;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:800;color:#fff;flex-shrink:0}
.shared-avatar-sm:first-child{margin-left:0}

/* COMMENTS */
.comment-box{background:#F9FAFB;border-radius:16px;padding:16px;border:1.5px solid #E5E7EB}
.comment-title{font-size:13px;font-weight:700;color:#1A2D25;margin-bottom:12px}
.comment-item{display:flex;gap:10px;margin-bottom:14px}
.comment-av{width:32px;height:32px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;color:#fff;flex-shrink:0}
.comment-body{flex:1}
.comment-meta{font-size:11.5px;font-weight:700;color:#1A2D25;margin-bottom:4px;display:flex;align-items:center;gap:8px}
.comment-time{font-size:11px;color:#9CA3AF;font-weight:400}
.comment-text{font-size:12.5px;color:#374151;line-height:1.6}
.comment-input-row{display:flex;gap:8px;margin-top:12px;padding-top:12px;border-top:1px solid #E5E7EB}
.comment-input{flex:1;border:1.5px solid #E5E7EB;border-radius:10px;padding:9px 13px;font-family:inherit;font-size:12.5px;outline:none;background:#fff;transition:border-color .2s}
.comment-input:focus{border-color:#059669}
.send-btn{background:linear-gradient(135deg,#059669,#10B981);color:#fff;border:none;border-radius:9px;padding:0 14px;font-size:16px;cursor:pointer}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.45);display:flex;align-items:center;justify-content:center;z-index:100;backdrop-filter:blur(3px)}
.modal{background:#fff;border-radius:24px;padding:32px;width:480px;box-shadow:0 24px 80px rgba(0,0,0,0.18)}
.modal-title{font-size:18px;font-weight:800;color:#1A2D25;margin-bottom:6px}
.modal-sub{font-size:13px;color:#9CA3AF;margin-bottom:24px}
.modal-label{font-size:12px;font-weight:700;color:#374151;margin-bottom:6px;margin-top:16px}
.modal-input{width:100%;border:1.5px solid #E5E7EB;border-radius:10px;padding:10px 14px;font-family:inherit;font-size:13px;outline:none;transition:border-color .2s}
.modal-input:focus{border-color:#059669}
.modal-select{width:100%;border:1.5px solid #E5E7EB;border-radius:10px;padding:10px 14px;font-family:inherit;font-size:13px;outline:none;background:#fff;cursor:pointer}
.modal-footer{display:flex;gap:10px;margin-top:24px}
.modal-btn-cancel{flex:1;background:#F3F4F6;color:#374151;border:none;padding:12px;border-radius:12px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit}
.modal-btn-primary{flex:2;background:linear-gradient(135deg,#059669,#10B981);color:#fff;border:none;padding:12px;border-radius:12px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit}

/* PDF PAGE */
.pdf-layout{display:grid;grid-template-columns:1fr 340px;gap:16px;height:calc(100vh - 100px)}
.pdf-preview{background:#fff;border-radius:20px;border:1.5px solid #D1FAE5;box-shadow:0 4px 20px rgba(5,150,105,0.06);overflow:hidden;display:flex;flex-direction:column}
.pdf-options{display:flex;flex-direction:column;gap:14px}
.pdf-page{background:#F9FAFB;flex:1;overflow-y:auto;padding:24px;display:flex;flex-direction:column;align-items:center;gap:16px}
.pdf-sheet{background:#fff;width:100%;max-width:540px;border-radius:12px;box-shadow:0 4px 24px rgba(0,0,0,0.1);padding:28px 32px;border:1px solid #E5E7EB}
.pdf-sheet-header{border-bottom:2px solid #059669;padding-bottom:16px;margin-bottom:20px}
.pdf-sheet-logo{font-size:20px;font-weight:800;color:#059669;margin-bottom:4px}
.pdf-sheet-title{font-size:16px;font-weight:700;color:#1A2D25;margin-bottom:6px}
.pdf-sheet-meta{font-size:11.5px;color:#9CA3AF;display:flex;gap:16px}
.pdf-section-title{font-size:12px;font-weight:700;color:#059669;text-transform:uppercase;letter-spacing:.8px;margin-bottom:10px}
.pdf-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:18px}
.pdf-cell{background:#F0FAF6;border-radius:8px;padding:10px 12px;border:1px solid #D1FAE5}
.pdf-cell-label{font-size:10.5px;color:#6B7280;font-weight:600;margin-bottom:2px}
.pdf-cell-value{font-size:14px;font-weight:700;color:#1A2D25}
.pdf-cell-value.big{font-size:20px;color:#059669}
.pdf-chart-placeholder{background:#F0FAF6;border-radius:10px;height:120px;display:flex;align-items:center;justify-content:center;margin-bottom:18px;border:1px dashed #A7F3D0;flex-direction:column;gap:6px}
.pdf-chart-label{font-size:12px;color:#059669;font-weight:600}
.pdf-risk-bar{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.pdf-risk-label{font-size:12px;color:#374151;width:80px;flex-shrink:0}
.pdf-risk-track{flex:1;height:8px;background:#E5E7EB;border-radius:6px;overflow:hidden}
.pdf-risk-fill{height:100%;border-radius:6px}
.pdf-risk-score{font-size:12px;font-weight:700;width:30px;text-align:right}

/* OPTIONS PANEL */
.opt-card{background:#fff;border-radius:18px;border:1.5px solid #D1FAE5;padding:18px;box-shadow:0 4px 16px rgba(5,150,105,0.05)}
.opt-card-title{font-size:13px;font-weight:800;color:#1A2D25;margin-bottom:14px;display:flex;align-items:center;gap:7px}
.opt-row{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid #F3F4F6}
.opt-row:last-child{border-bottom:none}
.opt-row-label{font-size:13px;color:#374151;font-weight:500;display:flex;align-items:center;gap:8px}
.toggle{width:42px;height:24px;background:#D1FAE5;border-radius:12px;position:relative;cursor:pointer;flex-shrink:0;transition:background .2s}
.toggle.on{background:#059669}
.toggle-knob{position:absolute;top:3px;left:3px;width:18px;height:18px;background:#fff;border-radius:50%;transition:left .2s;box-shadow:0 1px 4px rgba(0,0,0,0.15)}
.toggle.on .toggle-knob{left:21px}
.email-input-row{display:flex;gap:8px;margin-top:10px}
.email-inp{flex:1;border:1.5px solid #E5E7EB;border-radius:9px;padding:8px 12px;font-family:inherit;font-size:12.5px;outline:none}
.email-inp:focus{border-color:#059669}
.schedule-select{width:100%;border:1.5px solid #E5E7EB;border-radius:9px;padding:8px 12px;font-family:inherit;font-size:12.5px;outline:none;background:#fff;margin-top:10px}

/* MOBILE PREVIEW */
.mobile-frame{background:#1A2D25;border-radius:36px;padding:8px;box-shadow:0 16px 48px rgba(0,0,0,0.25);margin:0 auto;width:220px;flex-shrink:0}
.mobile-screen{background:#FFFFFF;border-radius:28px;overflow:hidden;position:relative}
.mobile-notch{background:#1A2D25;height:24px;display:flex;align-items:center;justify-content:center}
.mobile-notch-pill{background:#000;width:70px;height:14px;border-radius:7px}
.mobile-status{display:flex;align-items:center;justify-content:space-between;padding:6px 12px;background:#fff;border-bottom:1px solid #ECFDF5}
.mobile-status-app{font-size:9px;font-weight:800;color:#059669}
.mobile-body{padding:12px}
.mobile-card{background:#F0FAF6;border-radius:10px;padding:10px 12px;margin-bottom:8px;border:1px solid #D1FAE5}
.mobile-card-label{font-size:8px;color:#6B7280;font-weight:600;margin-bottom:2px}
.mobile-card-value{font-size:13px;font-weight:800;color:#059669}
.mobile-card-sub{font-size:8px;color:#9CA3AF}
.mobile-chart-stub{background:#ECFDF5;border-radius:8px;height:55px;display:flex;align-items:center;justify-content:center;margin-bottom:8px}
.mobile-chart-label{font-size:8px;color:#059669;font-weight:600}
.mobile-nav{display:flex;justify-content:space-around;padding:8px 6px;border-top:1px solid #ECFDF5;background:#fff}
.mobile-nav-item{display:flex;flex-direction:column;align-items:center;gap:2px;font-size:7px;color:#9CA3AF;font-weight:600}
.mobile-nav-item.active{color:#059669}

/* EMPTY STATE */
.empty-detail{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:12px;color:#9CA3AF}
.empty-icon{font-size:42px;opacity:.4}
.empty-text{font-size:13px;font-weight:600}

/* STAT CHIPS */
.stat-row{display:flex;gap:10px;margin-bottom:16px}
.stat-chip{flex:1;background:#fff;border:1.5px solid #D1FAE5;border-radius:14px;padding:14px;text-align:center;box-shadow:0 2px 8px rgba(5,150,105,0.05)}
.stat-chip-value{font-size:22px;font-weight:800;color:#059669}

function PlanBadge({ plan }) {
  const map = { enterprise: ['엔터프라이즈', 'badge-active'], pro: ['프로', 'badge-editor'], starter: ['스타터', 'badge-inactive'], trial: ['체험판', 'badge-trial'] };
  const [label, cls] = map[plan] || ['알 수 없음', 'badge-inactive'];
  return <span className={`badge ${cls}`}>{label}</span>;
}

function RoleBadge({ role }) {
  const map = { owner: ['소유자', 'badge-owner'], editor: ['편집자', 'badge-editor'], viewer: ['뷰어', 'badge-viewer'] };
  const [label, cls] = map[role] || ['뷰어', 'badge-viewer'];
  return <span className={`badge ${cls}`}>{label}</span>;
}

function UsageBar({ used, limit }) {
  if (!limit) return <span className="tag tag-green">무제한</span>;
  const pct = Math.min(100, Math.round((used / limit) * 100));
  const cls = pct >= 95 ? 'prog-fill-red' : pct >= 80 ? 'prog-fill-yellow' : 'prog-fill-green';
  const pctCls = pct >= 95 ? 'pct-red' : pct >= 80 ? 'pct-yellow' : 'pct-green';
  return (
    <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
      <div className="prog-track" style={{ flex: 1 }}><div className={`prog-fill ${cls}`} style={{ width: `${pct}%` }} /></div>
      <span className={pctCls} style={{ fontSize: 12, fontWeight: 700, width: 34, textAlign: 'right' }}>{pct}%</span>
    </div>
  );
}
