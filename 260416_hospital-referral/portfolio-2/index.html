<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>건설현장 안전 작업 허가 워크플로우 시스템</title>
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" rel="stylesheet">
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://unpkg.com/prop-types/prop-types.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/recharts@2.15.0/umd/Recharts.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 100%; min-height: 100%; font-family: 'Pretendard', sans-serif; }
  #root { display: flex; flex-direction: column; width: 100%; min-height: 100vh; }

  @keyframes fadeIn { from { opacity: 0 } to { opacity: 1 } }
  @keyframes fadeInScale { from { opacity: 0; transform: scale(0.96) } to { opacity: 1; transform: scale(1) } }
  @keyframes slideInRight { from { opacity: 0; transform: translateX(40px) } to { opacity: 1; transform: translateX(0) } }
  @keyframes slideUp { from { opacity: 0; transform: translateY(20px) } to { opacity: 1; transform: translateY(0) } }
  @keyframes countUp { from { opacity: 0; transform: translateY(10px) } to { opacity: 1; transform: translateY(0) } }
  @keyframes shimmer { 0% { background-position: -200% 0 } 100% { background-position: 200% 0 } }
  @keyframes pulse { 0%, 100% { opacity: 1 } 50% { opacity: 0.4 } }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect } = React;
const { BarChart, Bar, XAxis, YAxis, CartesianGrid, Tooltip, ResponsiveContainer, LineChart, Line, PieChart, Pie, Cell } = Recharts;

const C = {
  primary: '#D97706',
  primaryLight: '#FEF3C7',
  primaryDark: '#92400E',
  accent: '#EF4444',
  accentLight: '#FEE2E2',
  green: '#10B981',
  greenLight: '#D1FAE5',
  blue: '#3B82F6',
  blueLight: '#DBEAFE',
  purple: '#8B5CF6',
  purpleLight: '#EDE9FE',
  bg: '#FAFAFA',
  surface: '#FFFFFF',
  border: '#E5E7EB',
  text: '#1C1917',
  textLight: '#78716C',
  textMuted: '#A8A29E',
  nav: '#FFFFFF',
};

const PERMITS = [
  { id:'PTW-0234', type:'고소작업', risk:'high', site:'강남 재개발 A동', requester:'김태현 작업반장', approver:'이준서 현장소장', status:'승인 대기', step:1, started:'09:15', expires:'18:00', description:'15층 외벽 마감 작업, 달비계 사용', equipment:['안전벨트','헬멧','추락방지망'] },
  { id:'PTW-0235', type:'밀폐공간', risk:'high', site:'판교 물류센터 B창고', requester:'박민준 팀장', approver:'최수진 안전관리자', status:'승인 완료', step:3, started:'08:30', expires:'17:00', description:'하수관 내부 도장 작업, 환기 장치 필수', equipment:['산소측정기','방독마스크','안전로프'] },
  { id:'PTW-0236', type:'화기작업', risk:'medium', site:'인천 공장동 3구역', requester:'정민아 팀원', approver:'강현우 안전관리자', status:'작업 진행 중', step:4, started:'10:00', expires:'16:00', description:'배관 용접 작업, 소화기 2대 배치 완료', equipment:['용접마스크','소화기','내열장갑'] },
  { id:'PTW-0237', type:'전기작업', risk:'medium', site:'서울 오피스텔 5동', requester:'이수진 전기기사', approver:'김승우 현장소장', status:'검토 중', step:2, started:'11:00', expires:'17:30', description:'고압선 점검 작업, 차단기 차단 후 진행', equipment:['절연장갑','검전기','안전표지'] },
  { id:'PTW-0238', type:'고소작업', risk:'low', site:'부산 신항 야적장', requester:'최동혁 반장', approver:'박지원 현장소장', status:'완료', step:5, started:'07:00', expires:'12:00', description:'조명 교체 작업, 사다리차 사용', equipment:['안전벨트','헬멧'] },
  { id:'PTW-0239', type:'밀폐공간', risk:'high', site:'강북 정수장 3호기', requester:'홍길동 기술자', approver:'이미래 안전관리자', status:'승인 대기', step:1, started:'13:00', expires:'19:00', description:'필터 교체 작업, 잔류 화학물질 주의', equipment:['산소측정기','방독마스크','인명구조줄'] },
];

const WEEK_DATA = [
  { day:'월', permits: 12, completed: 10 }, { day:'화', permits: 15, completed: 13 },
  { day:'수', permits: 9, completed: 9 },  { day:'목', permits: 18, completed: 15 },
  { day:'금', permits: 14, completed: 11 }, { day:'토', permits: 6, completed: 6 },
];

const RISK_PIE = [
  { name:'고위험', value: 8, color: '#EF4444' },
  { name:'중위험', value: 12, color: '#F59E0B' },
  { name:'저위험', value: 5, color: '#10B981' },
];

const TYPE_ICONS = { '고소작업':'🏗️', '밀폐공간':'⚠️', '화기작업':'🔥', '전기작업':'⚡' };

const RISK_CONFIG = {
  high: { label:'고위험', color:'#EF4444', bg:'#FEE2E2' },
  medium: { label:'중위험', color:'#F59E0B', bg:'#FEF3C7' },
  low: { label:'저위험', color:'#10B981', bg:'#D1FAE5' },
};

const STATUS_CONFIG = {
  '승인 대기': { color:'#D97706', bg:'#FEF3C7' },
  '검토 중': { color:'#8B5CF6', bg:'#EDE9FE' },
  '승인 완료': { color:'#3B82F6', bg:'#DBEAFE' },
  '작업 진행 중': { color:'#10B981', bg:'#D1FAE5' },
  '완료': { color:'#6B7280', bg:'#F3F4F6' },
};

function RiskBadge({ risk }) {
  const c = RISK_CONFIG[risk];
  return <span style={{ fontSize:11, fontWeight:700, padding:'3px 8px', borderRadius:6, background:c.bg, color:c.color }}>{c.label}</span>;
}

function StatusBadge({ status }) {
  const c = STATUS_CONFIG[status] || { color:'#6B7280', bg:'#F3F4F6' };
  return <span style={{ fontSize:11, fontWeight:600, padding:'4px 10px', borderRadius:20, background:c.bg, color:c.color }}>{status}</span>;
}

function CountUp({ end, suffix='' }) {
  const [val, setVal] = useState(0);
  useEffect(() => {
    let s = 0; const step = end / 60;
    const t = setInterval(() => { s += step; if (s >= end) { setVal(end); clearInterval(t); } else setVal(Math.floor(s)); }, 16);
    return () => clearInterval(t);
  }, [end]);
  return <span>{val.toLocaleString()}{suffix}</span>;
}

function Toast({ message, onClose }) {
  useEffect(() => { const t = setTimeout(onClose, 3000); return () => clearTimeout(t); }, []);
  return (
    <div style={{ position:'fixed', bottom:24, right:24, zIndex:9999, background:'#1C1917', color:'#fff', padding:'12px 20px', borderRadius:8, animation:'slideUp 300ms ease', boxShadow:'0 4px 16px rgba(0,0,0,0.2)', fontSize:14 }}>
      {message}
    </div>
  );
}

function Drawer({ item, onClose, setToast }) {
  const steps = ['요청 등록','안전 검토','승인 완료','작업 진행','완료'];
  return (
    <>
      <div onClick={onClose} style={{ position:'fixed', inset:0, background:'rgba(0,0,0,0.4)', zIndex:200, animation:'fadeIn 200ms ease' }} />
      <div style={{ position:'fixed', top:0, right:0, bottom:0, width:480, background:C.surface, boxShadow:'-8px 0 40px rgba(0,0,0,0.15)', zIndex:201, overflowY:'auto', animation:'slideInRight 200ms ease' }}>
        <div style={{ padding:'20px 24px', borderBottom:`1px solid ${C.border}`, display:'flex', justifyContent:'space-between', alignItems:'center' }}>
          <div>
            <div style={{ fontSize:14, fontFamily:'monospace', color:C.textLight, marginBottom:2 }}>{item.id}</div>
            <h3 style={{ fontSize:18, fontWeight:800, color:C.text }}>{item.type}</h3>
          </div>
          <button onClick={onClose} style={{ background:'none', border:'none', fontSize:22, cursor:'pointer', color:C.textLight }}>✕</button>
        </div>

        <div style={{ padding:24 }}>
          {/* 기본 정보 */}
          <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:10, marginBottom:20 }}>
            {[
              ['현장', item.site], ['위험도', <RiskBadge risk={item.risk} />],
              ['요청자', item.requester], ['승인자', item.approver],
              ['작업 시작', item.started], ['작업 종료', item.expires],
            ].map(([k, v]) => (
              <div key={k} style={{ background:'#FEF9F0', borderRadius:8, padding:'10px 12px' }}>
                <div style={{ fontSize:11, color:C.textMuted, marginBottom:4, fontWeight:600 }}>{k}</div>
                <div style={{ fontSize:13, fontWeight:600, color:C.text }}>{v}</div>
              </div>
            ))}
          </div>

          <div style={{ background:'#FEF9F0', borderRadius:8, padding:14, marginBottom:20 }}>
            <div style={{ fontSize:11, fontWeight:600, color:C.textMuted, marginBottom:6 }}>작업 내용</div>
            <div style={{ fontSize:13, color:C.text, lineHeight:1.6 }}>{item.description}</div>
          </div>

          {/* 안전 장비 */}
          <div style={{ marginBottom:20 }}>
            <div style={{ fontSize:13, fontWeight:700, color:C.text, marginBottom:10 }}>필수 안전 장비</div>
            <div style={{ display:'flex', flexWrap:'wrap', gap:8 }}>
              {item.equipment.map(eq => (
                <span key={eq} style={{ padding:'6px 12px', borderRadius:20, background:'#FEF3C7', color:'#92400E', fontSize:12, fontWeight:600, display:'flex', alignItems:'center', gap:4 }}>
                  ✓ {eq}
                </span>
              ))}
            </div>
          </div>

          {/* 승인 단계 */}
          <div style={{ marginBottom:24 }}>
            <div style={{ fontSize:13, fontWeight:700, color:C.text, marginBottom:12 }}>승인 단계</div>
            {steps.map((s, i) => {
              const done = i < item.step;
              const current = i === item.step - 1;
              return (
                <div key={s} style={{ display:'flex', gap:12, marginBottom:14 }}>
                  <div style={{ display:'flex', flexDirection:'column', alignItems:'center' }}>
                    <div style={{ width:32, height:32, borderRadius:'50%', background: done ? C.primary : current ? C.primary : '#E5E7EB', display:'flex', alignItems:'center', justifyContent:'center', color:'#fff', fontWeight:700, fontSize:13, flexShrink:0 }}>
                      {done ? '✓' : i+1}
                    </div>
                    {i < steps.length-1 && <div style={{ width:2, height:20, background: done ? C.primary : '#E5E7EB', marginTop:4 }} />}
                  </div>
                  <div style={{ flex:1, paddingTop:4 }}>
                    <span style={{ fontSize:13, fontWeight: done || current ? 700 : 400, color: done || current ? C.text : C.textMuted }}>{s}</span>
                    {current && <span style={{ marginLeft:8, fontSize:11, padding:'2px 8px', borderRadius:10, background:C.primaryLight, color:C.primaryDark, fontWeight:700 }}>현재 단계</span>}
                  </div>
                </div>
              );
            })}
          </div>

          <div style={{ display:'flex', gap:8 }}>
            {item.status === '승인 대기' && (
              <button onClick={() => { setToast('허가서를 승인했습니다'); onClose(); }} style={{ flex:1, background:C.primary, color:'#fff', border:'none', borderRadius:8, padding:'11px', fontSize:14, fontWeight:700, cursor:'pointer' }}>✓ 허가 승인</button>
            )}
            {item.status === '검토 중' && (
              <button onClick={() => { setToast('검토 의견을 전달했습니다'); onClose(); }} style={{ flex:1, background:'#8B5CF6', color:'#fff', border:'none', borderRadius:8, padding:'11px', fontSize:14, fontWeight:700, cursor:'pointer' }}>의견 전달</button>
            )}
            <button onClick={onClose} style={{ flex: item.status==='완료' ? 1 : 'auto', background:'#F5F5F4', color:C.text, border:'none', borderRadius:8, padding:'11px 16px', fontSize:14, cursor:'pointer' }}>닫기</button>
          </div>
        </div>
      </div>
    </>
  );
}

// ─── 탭 콘텐츠 ───────────────────────────────────────────────────
function PermitOverview({ setDrawer }) {
  return (
    <div style={{ animation:'fadeIn 300ms ease' }}>
      <div style={{ display:'grid', gridTemplateColumns:'repeat(3,1fr)', gap:16, marginBottom:24 }}>
        {PERMITS.map((p, i) => (
          <div key={p.id} onClick={() => setDrawer(p)}
            style={{ background:C.surface, borderRadius:16, padding:20, boxShadow:'0 4px 16px rgba(0,0,0,0.08)', cursor:'pointer', transition:'all 200ms', animation:`slideUp 400ms ease ${i*70}ms both` }}
            onMouseEnter={e => { e.currentTarget.style.transform='scale(1.02)'; e.currentTarget.style.boxShadow='0 8px 24px rgba(0,0,0,0.14)'; }}
            onMouseLeave={e => { e.currentTarget.style.transform='scale(1)'; e.currentTarget.style.boxShadow='0 4px 16px rgba(0,0,0,0.08)'; }}
          >
            <div style={{ display:'flex', justifyContent:'space-between', alignItems:'flex-start', marginBottom:12 }}>
              <div style={{ fontSize:28 }}>{TYPE_ICONS[p.type]}</div>
              <RiskBadge risk={p.risk} />
            </div>
            <div style={{ fontSize:15, fontWeight:800, color:C.text, marginBottom:4 }}>{p.type}</div>
            <div style={{ fontSize:12, color:C.textLight, marginBottom:10, lineHeight:1.4 }}>{p.site}</div>
            <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center' }}>
              <StatusBadge status={p.status} />
              <span style={{ fontSize:11, color:C.textMuted }}>~{p.expires}</span>
            </div>
            <div style={{ marginTop:12 }}>
              <div style={{ display:'flex', justifyContent:'space-between', fontSize:10, marginBottom:4, color:C.textMuted }}>
                <span>승인 진행률</span>
                <span>{p.step}/5 단계</span>
              </div>
              <div style={{ height:5, borderRadius:4, background:'#F0F0EF', overflow:'hidden' }}>
                <div style={{ height:'100%', background: p.risk==='high' ? C.accent : p.risk==='medium' ? C.primary : C.green, borderRadius:4, width:`${(p.step/5)*100}%`, transition:'width 800ms ease' }} />
              </div>
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}

function PermitForm({ setToast, setTab }) {

  const [risk, setRisk] = useState('medium');
  const [checklist, setChecklist] = useState({});
  const [submitted, setSubmitted] = useState(false);

  const CHECKLIST_MAP = {

    '밀폐공간': ['산소 농도 측정', '방독마스크 지급', '안전 로프 연결', '인명구조 대기'],
    '화기작업': ['소화기 배치', '용접마스크 착용', '화기 감시인 배치', '인화물질 제거'],
    '전기작업': ['차단기 차단 확인', '절연장갑 착용', '검전기 확인', '안전표지 설치'],
  };

  const checklist_items = type ? CHECKLIST_MAP[type] : [];

  if (submitted) {
    return (
      <div style={{ display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', height:360, animation:'fadeInScale 300ms ease' }}>
        <div style={{ fontSize:56, marginBottom:16 }}>📋</div>
        <div style={{ fontSize:20, fontWeight:800, color:C.text, marginBottom:8 }}>허가 요청이 접수되었습니다</div>
        <div style={{ fontSize:14, color:C.textLight, marginBottom:24 }}>현장소장에게 알림을 전송했습니다</div>
        <div style={{ display:'flex', gap:12 }}>
          <button onClick={() => { setSubmitted(false); setType(''); setChecklist({}); }} style={{ background:C.primaryLight, color:C.primaryDark, border:'none', borderRadius:8, padding:'10px 20px', fontSize:14, fontWeight:700, cursor:'pointer' }}>새 요청 등록</button>
          <button onClick={() => setTab('main')} style={{ background:C.primary, color:'#fff', border:'none', borderRadius:8, padding:'10px 20px', fontSize:14, fontWeight:700, cursor:'pointer' }}>목록으로</button>
        </div>
      </div>
    );
  }

  return (
    <div style={{ maxWidth:700, animation:'fadeIn 300ms ease' }}>
      <div style={{ background:C.surface, borderRadius:16, padding:28, boxShadow:'0 4px 16px rgba(0,0,0,0.08)' }}>
        <h2 style={{ fontSize:18, fontWeight:800, color:C.text, marginBottom:24 }}>신규 허가 요청</h2>

        <div style={{ marginBottom:20 }}>
          <label style={{ display:'block', fontSize:12, fontWeight:700, color:C.textLight, marginBottom:8, textTransform:'uppercase', letterSpacing:'0.05em' }}>작업 유형 *</label>
          <div style={{ display:'grid', gridTemplateColumns:'repeat(4,1fr)', gap:10 }}>
            {['고소작업','밀폐공간','화기작업','전기작업'].map(t => (
              <button key={t} onClick={() => { setType(t); setChecklist({}); }} style={{ padding:'14px 8px', borderRadius:10, border:`2px solid ${type===t ? C.primary : C.border}`, background: type===t ? C.primaryLight : C.surface, cursor:'pointer', fontFamily:'inherit', transition:'all 200ms', display:'flex', flexDirection:'column', alignItems:'center', gap:6 }}>
                <span style={{ fontSize:24 }}>{TYPE_ICONS[t]}</span>
                <span style={{ fontSize:12, fontWeight:700, color: type===t ? C.primaryDark : C.text }}>{t}</span>
              </button>
            ))}
          </div>
        </div>

        <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:16, marginBottom:20 }}>
          <div>
            <label style={{ display:'block', fontSize:12, fontWeight:700, color:C.textLight, marginBottom:6, textTransform:'uppercase', letterSpacing:'0.05em' }}>현장명 *</label>
            <input placeholder="예: 강남 재개발 A동" style={{ width:'100%', padding:'10px 12px', borderRadius:8, border:`1.5px solid ${C.border}`, fontSize:14, fontFamily:'inherit', outline:'none' }} />
          </div>
          <div>
            <label style={{ display:'block', fontSize:12, fontWeight:700, color:C.textLight, marginBottom:6, textTransform:'uppercase', letterSpacing:'0.05em' }}>위험도</label>
            <select value={risk} onChange={e => setRisk(e.target.value)} style={{ width:'100%', padding:'10px 12px', borderRadius:8, border:`1.5px solid ${C.border}`, fontSize:14, fontFamily:'inherit', outline:'none', background:C.surface }}>
              <option value="high">🔴 고위험</option>
              <option value="medium">🟡 중위험</option>
              <option value="low">🟢 저위험</option>
            </select>
          </div>
          <div>
            <label style={{ display:'block', fontSize:12, fontWeight:700, color:C.textLight, marginBottom:6, textTransform:'uppercase', letterSpacing:'0.05em' }}>작업 시작 시각</label>
            <input type="time" defaultValue="09:00" style={{ width:'100%', padding:'10px 12px', borderRadius:8, border:`1.5px solid ${C.border}`, fontSize:14, fontFamily:'inherit', outline:'none' }} />

          <div>
            <label style={{ display:'block', fontSize:12, fontWeight:700, color:C.textLight, marginBottom:6, textTransform:'uppercase', letterSpacing:'0.05em' }}>작업 종료 시각</label>
            <input type="time" defaultValue="18:00" style={{ width:'100%', padding:'10px 12px', borderRadius:8, border:`1.5px solid ${C.border}`, fontSize:14, fontFamily:'inherit', outline:'none' }} />
          </div>
        </div>

        <div style={{ marginBottom:20 }}>
          <label style={{ display:'block', fontSize:12, fontWeight:700, color:C.textLight, marginBottom:6, textTransform:'uppercase', letterSpacing:'0.05em' }}>작업 내용</label>
          <textarea placeholder="작업 상세 내용, 주의 사항 등을 입력하세요..." rows={3} style={{ width:'100%', padding:'10px 12px', borderRadius:8, border:`1.5px solid ${C.border}`, fontSize:14, fontFamily:'inherit', resize:'vertical', outline:'none' }} />
        </div>

        {checklist_items.length > 0 && (
          <div style={{ marginBottom:24 }}>
            <label style={{ display:'block', fontSize:12, fontWeight:700, color:C.textLight, marginBottom:10, textTransform:'uppercase', letterSpacing:'0.05em' }}>안전 체크리스트 ({type})</label>
            <div style={{ display:'flex', flexDirection:'column', gap:8 }}>
              {checklist_items.map(item => (
                <label key={item} onClick={() => setChecklist(c => ({...c, [item]: !c[item]}))} style={{ display:'flex', alignItems:'center', gap:10, padding:'10px 14px', borderRadius:8, border:`1.5px solid ${checklist[item] ? C.primary : C.border}`, background: checklist[item] ? C.primaryLight : C.surface, cursor:'pointer', transition:'all 200ms' }}>
                  <div style={{ width:20, height:20, borderRadius:4, border:`2px solid ${checklist[item] ? C.primary : C.border}`, background: checklist[item] ? C.primary : 'transparent', display:'flex', alignItems:'center', justifyContent:'center', flexShrink:0 }}>
                    {checklist[item] && <span style={{ color:'#fff', fontSize:12 }}>✓</span>}
                  </div>
                  <span style={{ fontSize:13, color: checklist[item] ? C.primaryDark : C.text, fontWeight: checklist[item] ? 600 : 400 }}>{item}</span>
                </label>
              ))}
            </div>
          </div>
        )}

        <button onClick={() => { if (type) { setSubmitted(true); setToast('허가 요청이 제출되었습니다'); } }} style={{ width:'100%', padding:'13px', background: type ? C.primary : '#E5E7EB', color: type ? '#fff' : C.textMuted, border:'none', borderRadius:10, fontSize:15, fontWeight:800, cursor: type ? 'pointer' : 'not-allowed', transition:'all 200ms' }}>
          허가 요청 제출
        </button>
      </div>
    </div>
  );
}

function ApprovalFlow({ setToast, setDrawer }) {
  const pending = PERMITS.filter(p => ['승인 대기','검토 중'].includes(p.status));
  const approved = PERMITS.filter(p => ['승인 완료','작업 진행 중'].includes(p.status));

  return (
    <div style={{ animation:'fadeIn 300ms ease' }}>
      <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:20 }}>
        <div>
          <div style={{ fontSize:14, fontWeight:800, color:C.text, marginBottom:14, display:'flex', alignItems:'center', gap:8 }}>
            <span style={{ width:8, height:8, borderRadius:'50%', background:C.primary, display:'inline-block', animation:'pulse 1.5s infinite' }} />
            승인 대기 ({pending.length}건)
          </div>
          <div style={{ display:'flex', flexDirection:'column', gap:10 }}>
            {pending.map((p, i) => (
              <div key={p.id} onClick={() => setDrawer(p)} style={{ background:C.surface, borderRadius:12, padding:16, boxShadow:'0 4px 16px rgba(0,0,0,0.07)', cursor:'pointer', transition:'all 200ms', animation:`slideUp 300ms ease ${i*60}ms both` }}
                onMouseEnter={e => { e.currentTarget.style.transform='scale(1.01)'; e.currentTarget.style.boxShadow='0 6px 20px rgba(0,0,0,0.12)'; }}
                onMouseLeave={e => { e.currentTarget.style.transform='scale(1)'; e.currentTarget.style.boxShadow='0 4px 16px rgba(0,0,0,0.07)'; }}
              >
                <div style={{ display:'flex', justifyContent:'space-between', marginBottom:8 }}>
                  <span style={{ fontSize:14, fontWeight:800, color:C.text }}>{TYPE_ICONS[p.type]} {p.type}</span>
                  <RiskBadge risk={p.risk} />
                </div>
                <div style={{ fontSize:12, color:C.textLight, marginBottom:8 }}>{p.site}</div>
                <div style={{ display:'flex', gap:6 }}>
                  <button onClick={e => { e.stopPropagation(); setToast(`${p.id} 허가 승인 완료`); }} style={{ flex:1, padding:'7px', background:C.primary, color:'#fff', border:'none', borderRadius:7, fontSize:12, fontWeight:700, cursor:'pointer' }}>승인</button>
                  <button onClick={e => { e.stopPropagation(); setToast(`${p.id} 반려 처리됨`); }} style={{ flex:1, padding:'7px', background:C.accentLight, color:C.accent, border:'none', borderRadius:7, fontSize:12, fontWeight:700, cursor:'pointer' }}>반려</button>
                </div>
              </div>
            ))}
          </div>
        </div>
        <div>
          <div style={{ fontSize:14, fontWeight:800, color:C.text, marginBottom:14, display:'flex', alignItems:'center', gap:8 }}>
            <span style={{ width:8, height:8, borderRadius:'50%', background:C.green, display:'inline-block' }} />
            승인 완료 / 진행 중 ({approved.length}건)
          </div>
          <div style={{ display:'flex', flexDirection:'column', gap:10 }}>
            {approved.map((p, i) => (
              <div key={p.id} onClick={() => setDrawer(p)} style={{ background:C.surface, borderRadius:12, padding:16, boxShadow:'0 4px 16px rgba(0,0,0,0.07)', cursor:'pointer', transition:'all 200ms', animation:`slideUp 300ms ease ${i*60}ms both` }}
                onMouseEnter={e => { e.currentTarget.style.transform='scale(1.01)'; e.currentTarget.style.boxShadow='0 6px 20px rgba(0,0,0,0.12)'; }}
                onMouseLeave={e => { e.currentTarget.style.transform='scale(1)'; e.currentTarget.style.boxShadow='0 4px 16px rgba(0,0,0,0.07)'; }}
              >
                <div style={{ display:'flex', justifyContent:'space-between', marginBottom:8 }}>
                  <span style={{ fontSize:14, fontWeight:800, color:C.text }}>{TYPE_ICONS[p.type]} {p.type}</span>
                  <StatusBadge status={p.status} />
                </div>
                <div style={{ fontSize:12, color:C.textLight, marginBottom:6 }}>{p.site}</div>
                <div style={{ fontSize:11, color:C.textMuted }}>~{p.expires} · {p.approver}</div>
              </div>
            ))}
          </div>
        </div>
      </div>
    </div>
  );
}

function SiteManagement({ setToast }) {
  const sites = [
    { name:'강남 재개발 현장', active:3, pending:2, completed:12, manager:'이준서', risk:'high', lastSafe:'3일' },
    { name:'판교 물류센터', active:1, pending:0, completed:8, manager:'최수진', risk:'medium', lastSafe:'12일' },
    { name:'인천 공장동', active:2, pending:1, completed:15, manager:'강현우', risk:'medium', lastSafe:'7일' },
    { name:'서울 오피스텔', active:1, pending:1, completed:5, manager:'김승우', risk:'low', lastSafe:'21일' },
    { name:'부산 신항', active:0, pending:0, completed:3, manager:'박지원', risk:'low', lastSafe:'35일' },
  ];
  const [selected, setSelected] = useState(null);

  return (
    <div style={{ animation:'fadeIn 300ms ease' }}>
      <div style={{ display:'grid', gridTemplateColumns:'repeat(3,1fr)', gap:16 }}>
        {sites.map((s, i) => (
          <div key={s.name} onClick={() => setSelected(s)} style={{ background:C.surface, borderRadius:16, padding:20, boxShadow:'0 4px 16px rgba(0,0,0,0.08)', cursor:'pointer', transition:'all 200ms', animation:`slideUp 400ms ease ${i*60}ms both` }}
            onMouseEnter={e => { e.currentTarget.style.transform='scale(1.02)'; e.currentTarget.style.boxShadow='0 8px 24px rgba(0,0,0,0.12)'; }}
            onMouseLeave={e => { e.currentTarget.style.transform='scale(1)'; e.currentTarget.style.boxShadow='0 4px 16px rgba(0,0,0,0.08)'; }}
          >
            <div style={{ display:'flex', justifyContent:'space-between', marginBottom:12 }}>
              <span style={{ fontSize:14, fontWeight:800, color:C.text }}>{s.name}</span>
              <RiskBadge risk={s.risk} />
            </div>
            <div style={{ fontSize:12, color:C.textLight, marginBottom:12 }}>현장소장: {s.manager}</div>
            <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr 1fr', gap:8, marginBottom:12 }}>
              {[['진행 중',s.active,C.blue],['대기',s.pending,C.primary],['완료',s.completed,C.green]].map(([l,v,c]) => (
                <div key={l} style={{ textAlign:'center', background:'#FAFAF9', borderRadius:8, padding:'8px 4px' }}>
                  <div style={{ fontSize:20, fontWeight:800, color:c }}>{v}</div>
                  <div style={{ fontSize:10, color:C.textMuted, marginTop:2 }}>{l}</div>
                </div>
              ))}
            </div>
            <div style={{ fontSize:11, color:C.textMuted }}>🛡️ 마지막 사고 없이 <strong style={{color:C.green}}>{s.lastSafe}</strong> 경과</div>
          </div>
        ))}
      </div>

      {selected && (
        <>
          <div onClick={() => setSelected(null)} style={{ position:'fixed', inset:0, background:'rgba(0,0,0,0.4)', zIndex:200, animation:'fadeIn 200ms ease' }} />
          <div style={{ position:'fixed', top:0, right:0, bottom:0, width:440, background:C.surface, boxShadow:'-8px 0 40px rgba(0,0,0,0.15)', zIndex:201, overflowY:'auto', animation:'slideInRight 200ms ease', padding:24 }}>
            <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:20 }}>
              <h3 style={{ fontSize:18, fontWeight:800, color:C.text }}>{selected.name}</h3>
              <button onClick={() => setSelected(null)} style={{ background:'none', border:'none', fontSize:22, cursor:'pointer', color:C.textLight }}>✕</button>
            </div>
            <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:10, marginBottom:20 }}>
              {[['현장소장',selected.manager],['위험 등급',<RiskBadge risk={selected.risk}/>],['진행 중',`${selected.active}건`],['대기 중',`${selected.pending}건`],['완료',`${selected.completed}건`],['무사고',`${selected.lastSafe} 경과`]].map(([k,v]) => (
                <div key={k} style={{ background:'#FEF9F0', borderRadius:8, padding:'10px 12px' }}>
                  <div style={{ fontSize:11, color:C.textMuted, marginBottom:4, fontWeight:600 }}>{k}</div>
                  <div style={{ fontSize:14, fontWeight:700, color:C.text }}>{v}</div>
                </div>
              ))}
            </div>
            <div style={{ display:'flex', gap:8 }}>
              <button onClick={() => { setToast(`${selected.name} 허가 요청 등록으로 이동합니다`); setSelected(null); }} style={{ flex:1, background:C.primary, color:'#fff', border:'none', borderRadius:8, padding:'11px', fontSize:14, fontWeight:700, cursor:'pointer' }}>허가 요청</button>
              <button onClick={() => setSelected(null)} style={{ background:'#F5F5F4', color:C.text, border:'none', borderRadius:8, padding:'11px 16px', fontSize:14, cursor:'pointer' }}>닫기</button>
            </div>
          </div>
        </>
      )}
    </div>
  );
}

// ─── 탭 & 히어로 메타 ────────────────────────────────────────────
const TABS = [
  { id:'main', label:'작업 허가 현황' },
  { id:'permit-form', label:'신규 허가 요청' },
  { id:'approval-flow', label:'승인 워크플로우' },
  { id:'site-management', label:'현장 관리' },
];

const PAGE_META = {
  'main': { title:'작업 허가 현황 대시보드', kpis:[{label:'오늘 총 허가',val:25},{label:'진행 중',val:6},{label:'완료',val:17}] },
  'permit-form': { title:'신규 허가 요청 등록', kpis:[{label:'오늘 등록',val:8},{label:'처리 대기',val:3},{label:'승인률',val:'89%'}] },
  'approval-flow': { title:'승인 워크플로우 관리', kpis:[{label:'승인 대기',val:4},{label:'검토 중',val:2},{label:'오늘 승인',val:11}] },
  'site-management': { title:'현장별 허가 관리', kpis:[{label:'관리 현장',val:5},{label:'활성 허가',val:7},{label:'무사고 현장',val:3}] },
};

function App() {
  const [tab, setTab] = useState('main');
  const [drawer, setDrawer] = useState(null);
  const [toast, setToast] = useState(null);
  const [loading, setLoading] = useState(true);

  useEffect(() => { setTimeout(() => setLoading(false), 1200); }, []);

  const meta = PAGE_META[tab];

  function renderContent() {
    if (loading) return (
      <div style={{ display:'flex', flexDirection:'column', gap:16, padding:'0 32px 32px' }}>
        {[...Array(3)].map((_,i) => (
          <div key={i} style={{ height:100, borderRadius:16, background:'linear-gradient(90deg,#F5F5F4 25%,#E7E5E4 50%,#F5F5F4 75%)', backgroundSize:'200% 100%', animation:'shimmer 1.5s infinite' }} />
        ))}
      </div>
    );
    switch(tab) {
      case 'main': return <PermitOverview setDrawer={setDrawer} />;
      case 'permit-form': return <PermitForm setToast={setToast} setTab={setTab} />;
      case 'approval-flow': return <ApprovalFlow setToast={setToast} setDrawer={setDrawer} />;
      case 'site-management': return <SiteManagement setToast={setToast} />;
    }
  }

  return (
    <div style={{ minHeight:'100vh', background:C.bg, width:'100%' }}>
      {/* 상단 네비 */}
      <header style={{ position:'sticky', top:0, zIndex:100, background:C.nav, borderBottom:`1px solid ${C.border}`, display:'flex', alignItems:'center', height:58, padding:'0 32px', gap:4, boxShadow:'0 1px 4px rgba(0,0,0,0.06)' }}>
        <div style={{ display:'flex', alignItems:'center', gap:10, marginRight:20 }}>
          <div style={{ width:34, height:34, borderRadius:10, background:'linear-gradient(135deg,#D97706,#F59E0B)', display:'flex', alignItems:'center', justifyContent:'center', fontSize:18 }}>⛑️</div>
          <span style={{ fontWeight:800, fontSize:15, color:C.text, letterSpacing:'-0.02em' }}>SafeWork PTW</span>
        </div>
        {TABS.map(t => (
          <button key={t.id} onClick={() => setTab(t.id)} style={{ padding:'6px 14px', borderRadius:8, border:'none', cursor:'pointer', background: tab===t.id ? C.primaryLight : 'transparent', color: tab===t.id ? C.primaryDark : C.textLight, fontWeight: tab===t.id ? 700 : 500, fontSize:13, fontFamily:'inherit', transition:'all 150ms' }}
            onMouseEnter={e => { if (tab!==t.id) e.currentTarget.style.background='#F5F5F4'; }}
            onMouseLeave={e => { if (tab!==t.id) e.currentTarget.style.background='transparent'; }}
          >{t.label}</button>
        ))}
        <div style={{ flex:1 }} />
        <div style={{ display:'flex', alignItems:'center', gap:8, background:'#F5F5F4', borderRadius:8, padding:'7px 12px' }}>
          <span style={{ fontSize:13 }}>🔍</span>
          <input placeholder="허가 검색..." style={{ border:'none', background:'transparent', fontSize:13, outline:'none', width:140, fontFamily:'inherit' }} />
        </div>
        <button style={{ background:'none', border:'none', cursor:'pointer', fontSize:20, position:'relative', marginLeft:4 }}>
          🔔
          <span style={{ position:'absolute', top:-2, right:-2, width:16, height:16, borderRadius:'50%', background:C.accent, color:'#fff', fontSize:9, fontWeight:700, display:'flex', alignItems:'center', justifyContent:'center' }}>4</span>
        </button>
        <div style={{ display:'flex', alignItems:'center', gap:7, marginLeft:4 }}>
          <div style={{ width:32, height:32, borderRadius:'50%', background:'linear-gradient(135deg,#D97706,#F59E0B)', display:'flex', alignItems:'center', justifyContent:'center', color:'#fff', fontWeight:800, fontSize:13 }}>이</div>
          <span style={{ fontSize:13, fontWeight:700, color:C.text }}>이준서</span>
          <span style={{ fontSize:12, color:C.textMuted }}>▾</span>
        </div>
      </header>

      {/* 히어로 배너 */}
      <div key={tab} style={{ background:'linear-gradient(135deg, #D97706, #B45309)', padding:'28px 32px', animation:'fadeIn 250ms ease' }}>
        <h1 style={{ fontSize:26, fontWeight:900, color:'#fff', letterSpacing:'-0.03em', marginBottom:14 }}>{meta.title}</h1>
        <div style={{ display:'flex', gap:36 }}>
          {meta.kpis.map((k, i) => (
            <div key={k.label} style={{ animation:`slideUp 400ms ease ${i*100}ms both` }}>
              <div style={{ fontSize:30, fontWeight:900, color:'#fff' }}>
                {typeof k.val === 'string' ? k.val : <CountUp end={k.val} />}
              </div>
              <div style={{ fontSize:12, color:'rgba(255,255,255,0.75)', marginTop:2 }}>{k.label}</div>
            </div>
          ))}
        </div>
      </div>

      {/* 콘텐츠 */}
      <main key={tab} style={{ padding:'28px 32px', animation:'fadeIn 300ms ease' }}>
        {renderContent()}
      </main>

      {drawer && <Drawer item={drawer} onClose={() => setDrawer(null)} setToast={setToast} />}
      {toast && <Toast message={toast} onClose={() => setToast(null)} />}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
