// ─── 유틸 ────────────────────────────────────────────────────────
function CountUp({ end, suffix='', duration=900 }) {
  const [val, setVal] = useState(0);
  useEffect(() => {
    let s = 0; const step = end / (duration/16);
    const t = setInterval(() => { s += step; if (s>=end) { setVal(end); clearInterval(t); } else setVal(Math.floor(s)); }, 16);
    return () => clearInterval(t);
  }, [end]);
  return <span style={{ animation:'countUp 400ms ease' }}>{val.toLocaleString()}{suffix}</span>;
}

function Toast({ message, onClose }) {
  useEffect(() => { const t = setTimeout(onClose, 3000); return () => clearTimeout(t); }, []);
  return (
    <div style={{ position:'fixed', bottom:24, right:24, zIndex:9999, background:C.text, color:'#fff', padding:'12px 20px', borderRadius:10, animation:'slideUp 300ms ease', boxShadow:'0 4px 16px rgba(0,0,0,0.2)', fontSize:14, display:'flex', alignItems:'center', gap:8 }}>
      <span style={{ color:'#A78BFA' }}>✦</span> {message}
    </div>
  );
}

                ))}
              </div>

              <button onClick={() => setToast(`${selectedHosp.name}에 회송 요청을 전송했습니다`)} style={{ width:'100%', padding:'12px', background: selectedHosp.score>=70 ? `linear-gradient(135deg, ${C.primary}, ${C.accent})` : '#E5E7EB', color: selectedHosp.score>=70?'#fff':C.textMuted, border:'none', borderRadius:12, fontSize:14, fontWeight:800, cursor: selectedHosp.score>=70?'pointer':'not-allowed', transition:'all 200ms' }}>
                {selectedHosp.score>=70 ? '✦ 이 병원에 회송 요청' : '수용 불가'}
              </button>
            </div>
          </div>
        ) : (
          <div style={{ display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', height:'100%', color:C.textMuted }}>
            <div style={{ fontSize:40, marginBottom:12, opacity:0.4 }}>🤖</div>
            <div style={{ fontSize:14 }}>병원을 선택하면 AI 점수 분석이 표시됩니다</div>
          </div>
        )}
      </div>
    </div>
  );
}

// ─── Section: 병원 네트워크 지도 ─────────────────────────────────
function NetworkMap({ setToast }) {
  const [selectedNode, setSelectedNode] = useState(null);
  const nodeMap = Object.fromEntries(NETWORK_NODES.map(n => [n.id, n]));

  return (
    <div style={{ display:'flex', height:'100%', overflow:'hidden' }}>
      <div style={{ width:'42%', borderRight:`1px solid ${C.border}`, overflowY:'auto' }}>
        <div style={{ padding:'10px 14px', borderBottom:`1px solid ${C.borderLight}` }}>
          <div style={{ fontSize:11, fontWeight:700, color:C.textMuted, textTransform:'uppercase', letterSpacing:'0.06em' }}>네트워크 노드</div>
        </div>
        {NETWORK_NODES.map((n, i) => (
          <div key={n.id} onClick={() => setSelectedNode(n)}
            style={{ padding:'12px 14px', borderBottom:`1px solid ${C.borderLight}`, cursor:'pointer', transition:'all 150ms', background: selectedNode?.id===n.id ? C.primaryLight : 'transparent', borderLeft: selectedNode?.id===n.id ? `3px solid ${C.primary}` : '3px solid transparent', animation:`slideUp 300ms ease ${i*40}ms both` }}
            onMouseEnter={e => { if (selectedNode?.id!==n.id) e.currentTarget.style.background='#F8F7FF'; }}
            onMouseLeave={e => { if (selectedNode?.id!==n.id) e.currentTarget.style.background='transparent'; }}
          >
            <div style={{ display:'flex', alignItems:'center', gap:8, marginBottom:4 }}>
              <div style={{ width:10, height:10, borderRadius:'50%', background: n.type==='hub' ? C.primary : C.accent, boxShadow: n.type==='hub' ? `0 0 0 3px ${C.primaryLight}` : 'none' }} />
              <span style={{ fontWeight:700, fontSize:13, color: selectedNode?.id===n.id ? C.primary : C.text }}>{n.name}</span>
              {n.type==='hub' && <span style={{ fontSize:10, padding:'2px 7px', borderRadius:10, background:C.primary, color:'#fff', fontWeight:700 }}>허브</span>}
            </div>
            <div style={{ fontSize:11, color:C.textMuted }}>연결 {n.flows}개 · 회송 링크 활성</div>
          </div>
        ))}
      </div>

      <div style={{ flex:1, overflowY:'auto', padding:20, position:'relative' }}>
        {/* SVG 네트워크 */}
        <div style={{ background:'#F0F4FF', borderRadius:16, marginBottom:16, overflow:'hidden', position:'relative' }}>
          <svg width="100%" height="320" viewBox="0 0 700 460" style={{ display:'block' }}>
            {/* 링크 아크 */}
            {NETWORK_LINKS.map((link, i) => {
              const from = nodeMap[link.from];
              const to = nodeMap[link.to];
              if (!from || !to) return null;
              const mx = (from.x + to.x) / 2;
              const my = (from.y + to.y) / 2 - 40;
              return (
                <g key={i}>
                  <path d={`M ${from.x} ${from.y} Q ${mx} ${my} ${to.x} ${to.y}`}
                    fill="none" stroke={C.primary} strokeWidth={link.weight*1.5} strokeOpacity={0.25}
                    style={{ animation:`floatArc ${2+i*0.3}s ease-in-out infinite` }}
                  />
                </g>
              );
            })}

            {/* 노드 */}
            {NETWORK_NODES.map(n => (
              <g key={n.id} onClick={() => setSelectedNode(n)} style={{ cursor:'pointer' }}>
                <circle cx={n.x} cy={n.y} r={n.type==='hub'?22:16}
                  fill={n.type==='hub' ? C.primary : C.accent}
                  fillOpacity={selectedNode?.id===n.id ? 1 : 0.85}
                  stroke="#fff" strokeWidth={3}
                  style={{ filter: selectedNode?.id===n.id ? `drop-shadow(0 4px 8px ${C.primary}60)` : 'none', transition:'all 200ms' }}
                />
                <text x={n.x} y={n.y+4} textAnchor="middle" fill="#fff" fontSize={n.type==='hub'?13:11} fontWeight="800" fontFamily="Pretendard">{n.flows}</text>
                <text x={n.x} y={n.y+(n.type==='hub'?34:27)} textAnchor="middle" fill={C.text} fontSize={11} fontWeight="600" fontFamily="Pretendard">{n.name}</text>
              </g>
            ))}
          </svg>

          <div style={{ position:'absolute', top:10, right:10, display:'flex', gap:8 }}>
            {[['● 허브 병원',C.primary],['● 협력 병원',C.accent]].map(([l,c]) => (
              <span key={l} style={{ fontSize:10, fontWeight:700, color:c, background:'rgba(255,255,255,0.9)', padding:'4px 8px', borderRadius:6 }}>{l}</span>
            ))}
          </div>
        </div>

        {selectedNode && (
          <div key={selectedNode.id} style={{ background:C.surface, borderRadius:16, padding:16, border:`1px solid ${C.border}`, animation:'slideUp 250ms ease' }}>
            <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:12 }}>
              <h4 style={{ fontSize:15, fontWeight:800, color:C.text }}>{selectedNode.name}</h4>
              {selectedNode.type==='hub' && <span style={{ fontSize:11, padding:'3px 10px', borderRadius:10, background:C.primary, color:'#fff', fontWeight:700 }}>허브 병원</span>}
            </div>
            <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:8 }}>
              {[['연결 네트워크',`${selectedNode.flows}개 병원`],['회송 링크','활성'],['역할',selectedNode.type==='hub'?'상급병원':'협력병원'],['노드 위치',`(${selectedNode.x}, ${selectedNode.y})`]].map(([k,v]) => (
                <div key={k} style={{ background:'#F8F9FF', borderRadius:8, padding:'8px 10px' }}>
                  <div style={{ fontSize:10, color:C.textMuted, marginBottom:3, fontWeight:700 }}>{k}</div>
                  <div style={{ fontSize:13, fontWeight:700, color:C.text }}>{v}</div>
                </div>
              ))}
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

// ─── Section: 회송 통계 리포트 ────────────────────────────────────
function StatsReport() {
  const [tab, setTab] = useState(0);

  return (
    <div style={{ display:'flex', height:'100%', overflow:'hidden' }}>
      <div style={{ width:'42%', borderRight:`1px solid ${C.border}`, overflowY:'auto' }}>
        <div style={{ padding:'10px 14px', borderBottom:`1px solid ${C.borderLight}` }}>
          <div style={{ fontSize:11, fontWeight:700, color:C.textMuted, textTransform:'uppercase', letterSpacing:'0.06em' }}>기간 선택</div>
        </div>
        {STATS_MONTHS.map((m, i) => (
          <div key={m.month} onClick={() => setTab(i)}
            style={{ padding:'12px 14px', borderBottom:`1px solid ${C.borderLight}`, cursor:'pointer', transition:'all 150ms', background: tab===i ? C.primaryLight : 'transparent', borderLeft: tab===i ? `3px solid ${C.primary}` : '3px solid transparent', animation:`slideUp 300ms ease ${i*40}ms both` }}
            onMouseEnter={e => { if (tab!==i) e.currentTarget.style.background='#F8F7FF'; }}
            onMouseLeave={e => { if (tab!==i) e.currentTarget.style.background='transparent'; }}
          >
            <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center' }}>
              <span style={{ fontWeight:700, fontSize:13, color: tab===i ? C.primary : C.text }}>2025년 {m.month}</span>
              <span style={{ fontWeight:800, fontSize:15, color: tab===i ? C.primary : C.text }}>{m.total}건</span>
            </div>
            <div style={{ fontSize:11, color:C.textMuted, marginTop:3 }}>평균 처리 {m.avg}분</div>
          </div>
        ))}
      </div>

      <div style={{ flex:1, overflowY:'auto', padding:20 }}>
        <div key={tab} style={{ animation:'slideInRight 280ms ease' }}>
          <h3 style={{ fontSize:16, fontWeight:800, color:C.text, marginBottom:4 }}>2025년 {STATS_MONTHS[tab].month} 회송 통계</h3>
          <div style={{ fontSize:12, color:C.textMuted, marginBottom:16 }}>회송 요청 {STATS_MONTHS[tab].total}건 · 평균 처리 {STATS_MONTHS[tab].avg}분</div>

          <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:10, marginBottom:20 }}>
            {[
              ['총 요청',`${STATS_MONTHS[tab].total}건`],
              ['수용 완료',`${Math.round(STATS_MONTHS[tab].total*0.91)}건`],
              ['수용률','91%'],
              ['평균 처리',`${STATS_MONTHS[tab].avg}분`],
            ].map(([k,v]) => (
              <div key={k} style={{ background:'#F8F9FF', borderRadius:12, padding:'12px 14px', border:`1px solid ${C.border}` }}>
                <div style={{ fontSize:11, fontWeight:700, color:C.textMuted, marginBottom:4, textTransform:'uppercase', letterSpacing:'0.05em' }}>{k}</div>
                <div style={{ fontSize:22, fontWeight:900, color:C.primary }}>{v}</div>
              </div>
            ))}
          </div>

          {/* 조건별 수용률 */}
          <div style={{ marginBottom:20 }}>
            <div style={{ fontSize:12, fontWeight:700, color:C.textLight, marginBottom:10, textTransform:'uppercase', letterSpacing:'0.06em' }}>환자 조건별 수용률</div>
            {CONDITION_DATA.map((c, i) => (
              <div key={c.condition} style={{ marginBottom:12, animation:`slideUp 300ms ease ${i*60}ms both` }}>
                <div style={{ display:'flex', justifyContent:'space-between', fontSize:12, marginBottom:5 }}>
                  <span style={{ color:C.text, fontWeight:600 }}>{c.condition}</span>
                  <div style={{ display:'flex', gap:8 }}>
                    <span style={{ color:C.textMuted }}>요청 {c.count}건</span>
                    <span style={{ fontWeight:800, color: c.acceptRate>=85?C.green:c.acceptRate>=70?C.orange:'#EF4444' }}>{c.acceptRate}%</span>
                  </div>
                </div>
                <div style={{ height:7, borderRadius:4, background:'#F1F5F9' }}>
                  <div style={{ height:'100%', borderRadius:4, background: c.acceptRate>=85?C.green:c.acceptRate>=70?C.orange:'#EF4444', width:`${c.acceptRate}%`, transition:'width 800ms ease' }} />
                </div>
              </div>
            ))}
          </div>

          {/* 월별 추이 차트 */}
          <div style={{ height:160 }}>
            <div style={{ fontSize:12, fontWeight:700, color:C.textLight, marginBottom:8, textTransform:'uppercase', letterSpacing:'0.06em' }}>월별 수용률 추이</div>
            <ResponsiveContainer width="100%" height="100%">
              <ComposedChart data={MONTHLY_DATA}>
                <CartesianGrid strokeDasharray="3 3" stroke="#F1F5F9" />
                <XAxis dataKey="month" tick={{fontSize:10, fill:C.textMuted}} axisLine={false} tickLine={false} />
                <YAxis yAxisId="left" tick={{fontSize:10, fill:C.textMuted}} axisLine={false} tickLine={false} />
                <YAxis yAxisId="right" orientation="right" domain={[80,100]} tick={{fontSize:10, fill:C.textMuted}} axisLine={false} tickLine={false} />
                <Tooltip contentStyle={{fontSize:12, borderRadius:8, border:'none', boxShadow:'0 4px 12px rgba(0,0,0,0.1)'}} />
                <Bar yAxisId="left" dataKey="requests" fill={C.primaryLight} radius={[4,4,0,0]} name="총 요청" />
                <Line yAxisId="right" type="monotone" dataKey="rate" stroke={C.primary} strokeWidth={2.5} dot={{fill:C.primary, r:3}} name="수용률(%)" />
              </ComposedChart>
            </ResponsiveContainer>
          </div>
        </div>
      </div>
    </div>
  );
}

// ─── 사이드 네비 ─────────────────────────────────────────────────
const NAV_ITEMS = [
  { id:'main', label:'네트워크 분석', icon:'📊' },
  { id:'ai-recommend', label:'AI 병원 추천', icon:'🤖' },
  { id:'network-map', label:'병원 네트워크 지도', icon:'🗺️' },
  { id:'stats-report', label:'회송 통계 리포트', icon:'📈' },
];

const SECTION_TABS = {
  'main': [{ label:'추천 점수 순' }, { label:'수용 가능' }, { label:'거리 순' }],
  'ai-recommend': [{ label:'전체 추천' }, { label:'고추천' }, { label:'조건 맞춤' }],
  'network-map': [{ label:'전체 네트워크' }, { label:'서울 권역' }, { label:'인천 권역' }],
  'stats-report': [{ label:'월별 추이' }, { label:'조건별 분석' }, { label:'병원별 비교' }],
};

function SideNavItem({ icon, label, active, onClick }) {
  return (
    <button onClick={onClick} style={{ display:'flex', alignItems:'center', gap:10, width:'100%', padding:'9px 12px', borderRadius:8, border:'none', cursor:'pointer', background: active ? `${C.primary}12` : 'transparent', color: active ? C.primary : C.textLight, borderLeft: active ? `3px solid ${C.primary}` : '3px solid transparent', fontSize:13, fontWeight: active ? 700 : 400, transition:'all 150ms', fontFamily:'inherit', textAlign:'left' }}
      onMouseEnter={e => { if (!active) e.currentTarget.style.background='#F8F9FF'; }}
      onMouseLeave={e => { if (!active) e.currentTarget.style.background='transparent'; }}
    >
      <span style={{ fontSize:17 }}>{icon}</span> {label}
    </button>
  );
}

function TabUnderline({ label, active, onClick }) {
  return (
    <button onClick={onClick} style={{ padding:'8px 14px 6px', border:'none', cursor:'pointer', background:'transparent', fontFamily:'inherit', fontSize:12, color: active ? C.primary : C.textLight, fontWeight: active ? 700 : 400, borderBottom: active ? `2px solid ${C.primary}` : '2px solid transparent', marginBottom:-1, transition:'all 150ms' }}>{label}</button>
  );
}

function App() {
  const [section, setSection] = useState('main');
  const [tabIdx, setTabIdx] = useState(0);
  const [selectedItem, setSelectedItem] = useState(null);
  const [toast, setToast] = useState(null);
  const [loading, setLoading] = useState(true);

  useEffect(() => { setTimeout(() => setLoading(false), 1100); }, []);
  useEffect(() => { setTabIdx(0); setSelectedItem(null); }, [section]);

  function renderContent() {
    if (loading) return (
      <div style={{ display:'flex', flexDirection:'column', gap:12, padding:16 }}>
        {[...Array(4)].map((_,i) => (
          <div key={i} style={{ height:72, borderRadius:12, background:'linear-gradient(90deg,#F1F5F9 25%,#E2E8F0 50%,#F1F5F9 75%)', backgroundSize:'200% 100%', animation:'shimmer 1.5s infinite' }} />
        ))}
      </div>
    );
    switch(section) {
      case 'main': return <AnalyticsDashboard selected={selectedItem} setSelected={setSelectedItem} />;
      case 'ai-recommend': return <AIRecommend setToast={setToast} />;
      case 'network-map': return <NetworkMap setToast={setToast} />;
      case 'stats-report': return <StatsReport />;
    }
  }

  return (
    <div style={{ display:'flex', width:'100%', height:'100vh', overflow:'hidden', background:C.bg }}>
      {/* 밝은 사이드바 */}
      <nav style={{ width:240, background:C.surface, borderRight:`1px solid ${C.sidebarBorder}`, display:'flex', flexDirection:'column', paddingTop:16, flexShrink:0 }}>
        <div style={{ padding:'0 16px 16px', borderBottom:`1px solid ${C.border}` }}>
          <div style={{ display:'flex', alignItems:'center', gap:9 }}>
            <div style={{ width:34, height:34, borderRadius:10, background:`linear-gradient(135deg, ${C.primary}, ${C.accent})`, display:'flex', alignItems:'center', justifyContent:'center', fontSize:17 }}>🏥</div>
            <div>
              <div style={{ fontWeight:800, fontSize:14, color:C.text, letterSpacing:'-0.02em' }}>ReferNet</div>
              <div style={{ color:C.textMuted, fontSize:10, marginTop:1 }}>회송 네트워크 분석</div>
            </div>
          </div>
        </div>

        <div style={{ padding:'10px 12px', borderBottom:`1px solid ${C.border}` }}>
          <div style={{ fontSize:10, fontWeight:700, color:C.textMuted, letterSpacing:'0.08em', marginBottom:6 }}>현재 기관</div>
          <div style={{ fontSize:13, fontWeight:700, color:C.text }}>서울대병원</div>
          <div style={{ fontSize:11, color:C.textMuted, marginTop:1 }}>환자회송팀 · 김지현</div>
        </div>

        <div style={{ flex:1, padding:'8px', display:'flex', flexDirection:'column', gap:2 }}>
          {NAV_ITEMS.map(item => (
            <SideNavItem key={item.id} icon={item.icon} label={item.label} active={section===item.id} onClick={() => setSection(item.id)} />
          ))}
        </div>

        <div style={{ padding:'8px 12px', borderTop:`1px solid ${C.border}` }}>
          <SideNavItem icon="⚙️" label="설정" active={section==='settings'} onClick={() => setSection('settings')} />
          <div style={{ display:'flex', alignItems:'center', gap:8, padding:'8px 12px', marginTop:4 }}>
            <div style={{ width:30, height:30, borderRadius:'50%', background:`linear-gradient(135deg, ${C.primary}, ${C.accent})`, display:'flex', alignItems:'center', justifyContent:'center', color:'#fff', fontWeight:800, fontSize:12, flexShrink:0 }}>김</div>
            <div style={{ flex:1, minWidth:0 }}>
              <div style={{ fontSize:12, fontWeight:700, color:C.text, whiteSpace:'nowrap', overflow:'hidden', textOverflow:'ellipsis' }}>김지현</div>
              <div style={{ fontSize:10, color:C.textMuted }}>분석 담당자</div>
            </div>
          </div>
        </div>
      </nav>

      {/* 메인 영역 */}
      <div style={{ flex:1, display:'flex', flexDirection:'column', overflow:'hidden' }}>
        {/* 앱바 */}
        <header style={{ height:40, borderBottom:`1px solid ${C.border}`, display:'flex', alignItems:'center', padding:'0 16px', gap:8, background:C.surface, flexShrink:0 }}>
          <span style={{ fontSize:12, color:C.textMuted }}>ReferNet</span>
          <span style={{ color:C.border }}>›</span>
          <span style={{ fontSize:12, fontWeight:700, color:C.text }}>{NAV_ITEMS.find(n=>n.id===section)?.label}</span>
          <div style={{ flex:1 }} />
          <div style={{ display:'flex', alignItems:'center', gap:6, background:'#F8FAFC', borderRadius:6, padding:'4px 10px', border:`1px solid ${C.border}` }}>
            <span style={{ fontSize:12 }}>🔍</span>
            <input placeholder="검색..." style={{ border:'none', background:'transparent', fontSize:12, outline:'none', width:120, fontFamily:'inherit' }} />
          </div>
          <button style={{ background:'none', border:'none', cursor:'pointer', fontSize:18, position:'relative' }}>
            🔔
            <span style={{ position:'absolute', top:-2, right:-2, width:14, height:14, borderRadius:'50%', background:'#EF4444', color:'#fff', fontSize:8, fontWeight:700, display:'flex', alignItems:'center', justifyContent:'center' }}>2</span>
          </button>
        </header>

        {/* 탭 스트립 */}
        <div style={{ height:38, borderBottom:`1px solid ${C.border}`, display:'flex', alignItems:'flex-end', padding:'0 16px', gap:0, background:C.surface, flexShrink:0 }}>
          {(SECTION_TABS[section]||[]).map((t, i) => (
            <TabUnderline key={t.label} label={t.label} active={tabIdx===i} onClick={() => setTabIdx(i)} />
          ))}
          <div style={{ flex:1 }} />
          <div style={{ display:'flex', gap:4, alignItems:'center', paddingBottom:6 }}>
            <button onClick={() => setToast('내보내기가 완료됩니다')} style={{ fontSize:11, padding:'4px 10px', borderRadius:6, border:`1px solid ${C.border}`, background:C.surface, color:C.textLight, cursor:'pointer', fontFamily:'inherit' }}>↓ CSV</button>
          </div>
        </div>

        {/* 마스터-디테일 */}
        <div key={section} style={{ flex:1, overflow:'hidden', animation:'fadeIn 280ms ease' }}>
          {renderContent()}
        </div>
      </div>

      {toast && <Toast message={toast} onClose={() => setToast(null)} />}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
