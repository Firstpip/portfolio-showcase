function StatusBadge({ status }) {
  const map = {
    '답변 대기': ['#F59E0B', '#FFFBEB'],
    '견적 발송': [C.secondary, '#ECFDF5'],
    '계약 진행': [C.primary, '#F0FDF4'],
    '완료': ['#6B7280', '#F3F4F6'],
    '뉴스': [C.blue, '#EFF6FF'],
    '공지': [C.primary, '#F0FDF4'],
  };
  const [color, bg] = map[status] || [C.textLight, '#F3F4F6'];
  return (
    <span style={{ display: 'inline-block', padding: '3px 10px', borderRadius: 20, fontSize: 11, fontWeight: 600, color, background: bg }}>{status}</span>
  );
}

function CatalogPage({ lang, setDrawer }) {
  const [filter, setFilter] = React.useState('all');
  const [search, setSearch] = React.useState('');
  const cats = ['all', '체결부품', '배관자재', '유압기기', '베어링', '공압기기', '동력전달'];
  const catMap = { 'all': { ko: '전체', en: 'All', zh: '全部' } };
  cats.slice(1).forEach((c, i) => {
    const en = ['Fasteners', 'Piping', 'Hydraulics', 'Bearings', 'Pneumatics', 'Power Trans.'][i];
    const zh = ['紧固件', '管道', '液压', '轴承', '气动', '动力传输'][i];
    catMap[c] = { ko: c, en, zh };
  });

  const filtered = PRODUCTS.filter(p => {
    const matchCat = filter === 'all' || p.cat === filter;
    const q = search.toLowerCase();
    const matchSearch = p.name.toLowerCase().includes(q) || p.nameEn.toLowerCase().includes(q);
    return matchCat && matchSearch;
  });

  const getName = (p) => lang === 'ko' ? p.name : lang === 'en' ? p.nameEn : p.nameZh;
  const getCat = (p) => lang === 'ko' ? p.cat : lang === 'en' ? p.catEn : p.catZh;

  return (
    <div style={{ animation: 'fadeIn 250ms ease' }}>
      <div style={{ display: 'flex', gap: 8, marginBottom: 20, flexWrap: 'wrap', alignItems: 'center' }}>
        {cats.map(c => {
          const label = catMap[c][lang] || catMap[c].ko;
          return (
            <button key={c} onClick={() => setFilter(c)} style={{
              padding: '6px 16px', borderRadius: 20, fontSize: 13, fontWeight: 500, border: `1.5px solid ${filter === c ? C.primary : C.borderGray}`,
              background: filter === c ? C.primary : C.surface, color: filter === c ? '#fff' : C.textLight, transition: 'all 150ms',
            }}>{label}</button>
          );
        })}
        <div style={{ flex: 1 }} />
        <input value={search} onChange={e => setSearch(e.target.value)} placeholder={lang === 'ko' ? '제품 검색...' : lang === 'en' ? 'Search...' : '搜索...'}
          style={{ padding: '7px 14px', border: `1.5px solid ${C.borderGray}`, borderRadius: 8, fontSize: 13, width: 200, outline: 'none' }} />
      </div>
      <div style={{ display: 'grid', gridTemplateColumns: 'repeat(3, 1fr)', gap: 16 }}>
        {filtered.map(p => (
          <div key={p.id} onClick={() => setDrawer({ ...p, _type: 'product' })} style={{
            background: C.surface, borderRadius: 14, border: `1.5px solid ${C.border}`,
            overflow: 'hidden', cursor: 'pointer', transition: 'all 200ms',
          }}
            onMouseEnter={e => { e.currentTarget.style.boxShadow = '0 8px 28px rgba(13,92,58,0.12)'; e.currentTarget.style.transform = 'translateY(-3px)'; e.currentTarget.style.borderColor = C.secondary; }}
            onMouseLeave={e => { e.currentTarget.style.boxShadow = ''; e.currentTarget.style.transform = ''; e.currentTarget.style.borderColor = C.border; }}>
            <div style={{ padding: '28px 20px', textAlign: 'center', background: C.bg, fontSize: 40 }}>{p.icon}</div>
            <div style={{ padding: '16px' }}>
              <div style={{ display: 'flex', gap: 6, marginBottom: 8, flexWrap: 'wrap' }}>
                <span style={{ fontSize: 11, background: `${C.accent}30`, color: C.primary, padding: '2px 8px', borderRadius: 6, fontWeight: 600 }}>{getCat(p)}</span>
                {p.tags.map(t => (
                  <span key={t} style={{ fontSize: 11, background: '#F3F4F6', color: C.textLight, padding: '2px 8px', borderRadius: 6 }}>{t}</span>
                ))}
              </div>
              <h3 style={{ fontSize: 14, fontWeight: 700, color: C.text, marginBottom: 4, lineHeight: 1.4 }}>{getName(p)}</h3>
              <div style={{ fontSize: 13, color: C.textLight, marginBottom: 12 }}>{p.desc}</div>
              <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
                <div style={{ fontSize: 16, fontWeight: 800, color: C.primary }}>{p.price}</div>
                <div style={{ fontSize: 11, color: C.textLight }}>MOQ: {p.moq}</div>
              </div>
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}

    { section: '연락처 페이지 설명', ko: '전화, 이메일, 방문 문의 모두 환영합니다', en: '', zh: '', done: false },
  ];

  const langs = ['ko', 'en', 'zh'];
  const labels = { ko: '한국어', en: 'English', zh: '中文' };
  const done = ITEMS.filter(i => i.done).length;

  return (
    <div style={{ animation: 'fadeIn 250ms ease' }}>
      <div style={{ display: 'flex', gap: 16, marginBottom: 24 }}>
        {langs.map(l => {
          const count = ITEMS.filter(i => i[l]).length;
          return (
            <div key={l} style={{ flex: 1, background: C.surface, borderRadius: 12, padding: 20, border: `1.5px solid ${l === lang ? C.primary : C.border}` }}>
              <div style={{ fontSize: 20, marginBottom: 6 }}>{l === 'ko' ? '🇰🇷' : l === 'en' ? '🇺🇸' : '🇨🇳'}</div>
              <div style={{ fontSize: 15, fontWeight: 700, color: C.text }}>{labels[l]}</div>
              <div style={{ fontSize: 13, color: C.textLight, marginTop: 4 }}>{count}/{ITEMS.length} 항목 번역 완료</div>
              <div style={{ marginTop: 10, height: 6, background: C.bg, borderRadius: 3, overflow: 'hidden' }}>
                <div style={{ width: `${(count / ITEMS.length) * 100}%`, height: '100%', background: l === lang ? C.primary : C.secondary, borderRadius: 3 }} />
              </div>
            </div>
          );
        })}
      </div>
      <div style={{ background: C.surface, borderRadius: 12, border: `1.5px solid ${C.border}`, overflow: 'hidden' }}>
        <div style={{ padding: '12px 20px', borderBottom: `1px solid ${C.borderGray}`, display: 'flex', gap: 8, alignItems: 'center' }}>
          <span style={{ fontSize: 13, fontWeight: 600, color: C.text }}>번역 항목 관리</span>
          <span style={{ fontSize: 11, background: C.bg, color: C.primary, padding: '2px 8px', borderRadius: 10, fontWeight: 600 }}>{done}/{ITEMS.length} 완료</span>
        </div>
        <table style={{ width: '100%', borderCollapse: 'collapse' }}>
          <thead>
            <tr style={{ background: C.bg }}>
              {['섹션', '한국어', 'English', '中文', '상태'].map(h => (
                <th key={h} style={{ padding: '10px 16px', textAlign: 'left', fontSize: 12, fontWeight: 600, color: C.textLight, borderBottom: `1px solid ${C.borderGray}` }}>{h}</th>
              ))}
            </tr>
          </thead>
          <tbody>
            {ITEMS.map((item, i) => (
              <tr key={i} style={{ borderBottom: `1px solid ${C.borderGray}`, cursor: 'pointer', transition: 'background 150ms' }}
                onMouseEnter={e => e.currentTarget.style.background = C.bg}
                onMouseLeave={e => e.currentTarget.style.background = ''}>
                <td style={{ padding: '12px 16px', fontSize: 12, fontWeight: 600, color: C.text, whiteSpace: 'nowrap' }}>{item.section}</td>
                <td style={{ padding: '12px 16px', fontSize: 12, color: C.textMid, maxWidth: 140, overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>{item.ko || '—'}</td>
                <td style={{ padding: '12px 16px', fontSize: 12, color: item.en ? C.textMid : C.textLight, maxWidth: 140, overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>{item.en || '미번역'}</td>
                <td style={{ padding: '12px 16px', fontSize: 12, color: item.zh ? C.textMid : C.textLight }}>{item.zh || '미번역'}</td>
                <td style={{ padding: '12px 16px' }}>
                  <span style={{ display: 'inline-flex', alignItems: 'center', gap: 4, fontSize: 11, fontWeight: 600, color: item.done ? C.secondary : C.warning }}>
                    {item.done ? '✓ 완료' : '⏳ 진행중'}
                  </span>
                </td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>
    </div>
  );
}

function InquiryPage({ lang, setDrawer }) {
  const [showForm, setShowForm] = React.useState(false);
  const [submitted, setSubmitted] = React.useState(false);

  const ph = {
    ko: { company: '회사명', name: '담당자명', email: '이메일', product: '문의 제품', content: '문의 내용을 상세히 작성해주세요.' },
    en: { company: 'Company Name', name: 'Contact Name', email: 'Email', product: 'Product of Interest', content: 'Please describe your inquiry in detail.' },
    zh: { company: '公司名称', name: '联系人', email: '电子邮件', product: '感兴趣的产品', content: '请详细描述您的询价需求。' },
  }[lang] || {};

  return (
    <div style={{ animation: 'fadeIn 250ms ease' }}>
      <div style={{ display: 'flex', justifyContent: 'flex-end', marginBottom: 16 }}>
        <button onClick={() => setShowForm(!showForm)} style={{
          padding: '8px 20px', background: showForm ? C.bg : C.primary, color: showForm ? C.text : '#fff',
          border: `1.5px solid ${showForm ? C.borderGray : C.primary}`, borderRadius: 8, fontSize: 13, fontWeight: 600,
        }}>{showForm ? '목록 보기' : (lang === 'ko' ? '+ 문의 작성' : lang === 'en' ? '+ New Inquiry' : '+ 发起询价')}</button>
      </div>

      {showForm ? (
        <div style={{ background: C.surface, borderRadius: 14, padding: 28, border: `1.5px solid ${C.border}`, maxWidth: 600 }}>
          <h3 style={{ fontSize: 17, fontWeight: 700, color: C.text, marginBottom: 20 }}>{lang === 'ko' ? '견적 문의하기' : lang === 'en' ? 'Request a Quote' : '发起询价'}</h3>
          {submitted ? (
            <div style={{ textAlign: 'center', padding: '32px 0' }}>
              <div style={{ fontSize: 48, marginBottom: 12 }}>✅</div>
              <div style={{ fontSize: 16, fontWeight: 700, color: C.primary }}>{lang === 'ko' ? '문의가 접수되었습니다' : lang === 'en' ? 'Inquiry Submitted!' : '询价已提交！'}</div>
              <div style={{ fontSize: 13, color: C.textLight, marginTop: 8 }}>{lang === 'ko' ? '영업일 2일 이내에 답변드리겠습니다.' : lang === 'en' ? 'We will respond within 2 business days.' : '我们将在2个工作日内回复您。'}</div>
              <button onClick={() => { setSubmitted(false); setShowForm(false); }} style={{ marginTop: 20, padding: '9px 24px', background: C.primary, color: '#fff', border: 'none', borderRadius: 8, fontSize: 14, fontWeight: 600 }}>목록으로</button>
            </div>
          ) : (
            <div>
              <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 14, marginBottom: 14 }}>
                {[['company', 'text'], ['name', 'text'], ['email', 'email'], ['product', 'text']].map(([key, type]) => (
                  <div key={key}>
                    <label style={{ fontSize: 12, fontWeight: 600, color: C.textLight, display: 'block', marginBottom: 6 }}>{ph[key]}</label>
                    <input type={type} placeholder={ph[key]} style={{ width: '100%', padding: '9px 12px', border: `1.5px solid ${C.borderGray}`, borderRadius: 8, fontSize: 13, outline: 'none' }} />
                  </div>
                ))}
              </div>
              <div>
                <label style={{ fontSize: 12, fontWeight: 600, color: C.textLight, display: 'block', marginBottom: 6 }}>{ph.content?.split('.')[0]}</label>
                <textarea rows={5} placeholder={ph.content} style={{ width: '100%', padding: '9px 12px', border: `1.5px solid ${C.borderGray}`, borderRadius: 8, fontSize: 13, resize: 'vertical' }} />
              </div>
              <button onClick={() => setSubmitted(true)} style={{ marginTop: 20, padding: '11px 32px', background: C.primary, color: '#fff', border: 'none', borderRadius: 8, fontSize: 15, fontWeight: 700 }}>
                {lang === 'ko' ? '문의 제출' : lang === 'en' ? 'Submit Inquiry' : '提交询价'}
              </button>
            </div>
          )}
        </div>
      ) : (
        <div style={{ background: C.surface, borderRadius: 14, border: `1.5px solid ${C.border}`, overflow: 'hidden' }}>
          <table style={{ width: '100%', borderCollapse: 'collapse' }}>
            <thead>
              <tr style={{ background: C.bg }}>
                {['문의 ID', '업체명', '국가', '제품', '접수일', '상태'].map(h => (
                  <th key={h} style={{ padding: '12px 16px', textAlign: 'left', fontSize: 12, fontWeight: 600, color: C.textLight, borderBottom: `1px solid ${C.borderGray}` }}>{h}</th>
                ))}
              </tr>
            </thead>
            <tbody>
              {INQUIRIES.map(inq => (
                <tr key={inq.id} onClick={() => setDrawer({ ...inq, _type: 'inquiry' })} style={{ borderBottom: `1px solid ${C.borderGray}`, cursor: 'pointer', transition: 'background 150ms' }}
                  onMouseEnter={e => e.currentTarget.style.background = C.bg}
                  onMouseLeave={e => e.currentTarget.style.background = ''}>
                  <td style={{ padding: '14px 16px', fontSize: 12, fontFamily: 'monospace', color: C.textLight }}>{inq.id}</td>
                  <td style={{ padding: '14px 16px', fontSize: 14, fontWeight: 600, color: C.text }}>{inq.company}</td>
                  <td style={{ padding: '14px 16px', fontSize: 13 }}>{inq.country}</td>
                  <td style={{ padding: '14px 16px', fontSize: 13, color: C.textMid }}>{inq.product}</td>
                  <td style={{ padding: '14px 16px', fontSize: 13, color: C.textLight }}>{inq.date}</td>
                  <td style={{ padding: '14px 16px' }}><StatusBadge status={inq.status} /></td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      )}
    </div>
  );
}

function NewsPage({ lang, setDrawer }) {
  return (
    <div style={{ animation: 'fadeIn 250ms ease', display: 'grid', gridTemplateColumns: 'repeat(2, 1fr)', gap: 20 }}>
      {NEWS.map(n => (
        <div key={n.id} onClick={() => setDrawer({ ...n, _type: 'news' })} style={{
          background: C.surface, borderRadius: 14, border: `1.5px solid ${C.border}`,
          overflow: 'hidden', cursor: 'pointer', transition: 'all 200ms',
        }}
          onMouseEnter={e => { e.currentTarget.style.boxShadow = '0 8px 28px rgba(13,92,58,0.12)'; e.currentTarget.style.transform = 'translateY(-3px)'; }}
          onMouseLeave={e => { e.currentTarget.style.boxShadow = ''; e.currentTarget.style.transform = ''; }}>
          <div style={{ padding: '32px 20px', textAlign: 'center', background: `linear-gradient(135deg, ${C.primary}15, ${C.accent}20)`, fontSize: 40 }}>{n.img}</div>
          <div style={{ padding: '16px 20px' }}>
            <div style={{ marginBottom: 8 }}><StatusBadge status={n.type} /></div>
            <h3 style={{ fontSize: 15, fontWeight: 700, color: C.text, marginBottom: 8, lineHeight: 1.4 }}>{lang === 'en' ? n.titleEn : n.title}</h3>
            <p style={{ fontSize: 13, color: C.textLight, lineHeight: 1.7, marginBottom: 12 }}>{n.summary}</p>
            <div style={{ fontSize: 12, color: C.textLight }}>{n.date}</div>
          </div>
        </div>
      ))}
    </div>
  );
}

function App() {
  const [tab, setTab] = React.useState('catalog');
  const [lang, setLang] = React.useState('ko');
  const [drawer, setDrawer] = React.useState(null);

  const meta = PAGE_META[tab];
  const metaLang = meta[lang] || meta.ko;

  const renderContent = () => {
    switch (tab) {
      case 'catalog': return <CatalogPage lang={lang} setDrawer={setDrawer} />;
      case 'multilang': return <MultiLangPage lang={lang} setDrawer={setDrawer} />;
      case 'inquiry': return <InquiryPage lang={lang} setDrawer={setDrawer} />;
      case 'news': return <NewsPage lang={lang} setDrawer={setDrawer} />;
      default: return null;
    }
  };

  return (
    <div style={{ display: 'flex', flexDirection: 'column', width: '100%', minHeight: '100vh', background: C.bg }}>
      {/* 상단 네비 */}
      <header style={{
        position: 'sticky', top: 0, zIndex: 100, background: C.surface,
        borderBottom: `1px solid ${C.borderGray}`, display: 'flex', alignItems: 'center',
        height: 56, padding: '0 24px', gap: 6,
      }}>
        <div style={{ display: 'flex', alignItems: 'center', gap: 8, marginRight: 16 }}>
          <div style={{ width: 32, height: 32, borderRadius: 8, background: C.primary, display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 16 }}>🌿</div>
          <span style={{ fontWeight: 800, fontSize: 14, color: C.primary }}>GlobalTech B2B</span>
        </div>
        {TABS.map(t => {
          const label = t.label[lang] || t.label.ko;
          return (
            <button key={t.id} onClick={() => setTab(t.id)} style={{
              display: 'flex', alignItems: 'center', gap: 5, padding: '8px 14px', border: 'none', background: 'none',
              fontSize: 14, fontWeight: tab === t.id ? 700 : 400, cursor: 'pointer',
              color: tab === t.id ? C.primary : C.textLight, borderRadius: 8,
              borderBottom: tab === t.id ? `2px solid ${C.primary}` : '2px solid transparent',
              transition: 'all 150ms',
            }}>
              <span>{t.icon}</span>{label}
            </button>
          );
        })}
        <div style={{ flex: 1 }} />
        {/* 언어 전환 */}
        <div style={{ display: 'flex', gap: 4, background: C.bg, borderRadius: 8, padding: 3, border: `1px solid ${C.borderGray}` }}>
          {Object.entries(LANGS).map(([l, label]) => (
            <button key={l} onClick={() => setLang(l)} style={{
              padding: '4px 10px', borderRadius: 6, fontSize: 12, fontWeight: 600, border: 'none',
              background: lang === l ? C.primary : 'transparent', color: lang === l ? '#fff' : C.textLight,
              transition: 'all 150ms',
            }}>{label}</button>
          ))}
        </div>
        <button style={{ padding: '6px 14px', background: C.primary, color: '#fff', border: 'none', borderRadius: 8, fontSize: 13, fontWeight: 600, marginLeft: 8 }}>
          {lang === 'ko' ? '로그인' : lang === 'en' ? 'Login' : '登录'}
        </button>
      </header>

      {/* 히어로 배너 */}
      <div style={{ background: `linear-gradient(135deg, ${C.primary} 0%, #065F46 100%)`, padding: '28px 32px', color: '#fff' }}>
        <div style={{ display: 'flex', alignItems: 'center', gap: 12, marginBottom: 12 }}>
          <span style={{ fontSize: 28 }}>{TABS.find(t => t.id === tab)?.icon}</span>
          <h1 style={{ fontSize: 24, fontWeight: 800 }}>{metaLang.title}</h1>
        </div>
        <p style={{ fontSize: 14, opacity: 0.8, marginBottom: 20 }}>{metaLang.sub}</p>
        <div style={{ display: 'flex', gap: 32 }}>
          {meta.kpis.map(k => (
            <div key={k.label} style={{ textAlign: 'center' }}>
              <div style={{ fontSize: 22, fontWeight: 800 }}>{k.value}</div>
              <div style={{ fontSize: 12, opacity: 0.7, marginTop: 2 }}>{lang === 'ko' ? k.label : lang === 'en' ? k.en : k.zh || k.label}</div>
            </div>
          ))}
        </div>
      </div>

      {/* 콘텐츠 */}
      <main style={{ flex: 1, padding: '28px 32px' }}>
        {renderContent()}
      </main>

      {drawer && <Drawer item={drawer} onClose={() => setDrawer(null)} />}
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
