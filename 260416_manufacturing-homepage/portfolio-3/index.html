function SideNavItem({ icon, label, active, onClick }) {
  return (
    <button onClick={onClick} style={{
      display: 'flex', alignItems: 'center', gap: 10, width: '100%',
      padding: '9px 12px', borderRadius: 8, border: 'none', cursor: 'pointer',
      background: active ? C.primaryLight : 'transparent',
      color: active ? C.primary : C.textLight,
      borderLeft: active ? `3px solid ${C.primary}` : '3px solid transparent',
      fontSize: 14, fontWeight: active ? 600 : 400,
      transition: 'all 150ms', fontFamily: 'inherit', textAlign: 'left',
    }}>
      <span style={{ fontSize: 17 }}>{icon}</span>
      {label}
    </button>
  );
}

function TabUnderline({ label, active, onClick }) {
  return (
    <button onClick={onClick} style={{
      padding: '8px 14px 6px', border: 'none', cursor: 'pointer',
      background: 'transparent', fontFamily: 'inherit', fontSize: 13,
      color: active ? C.primary : C.textLight, fontWeight: active ? 600 : 400,
      borderBottom: active ? `2px solid ${C.primary}` : '2px solid transparent',
      marginBottom: -1, transition: 'all 150ms',
    }}>{label}</button>
  );
}

function StatusBadge({ status }) {
  const map = {
    '정상': [C.success, '#ECFDF5'],
    '부족': [C.warning, '#FFFBEB'],
    '품절': [C.danger, '#FEF2F2'],
    '결재 대기': [C.warning, '#FFFBEB'],
    '검토 중': [C.info, '#EFF6FF'],
    '서류 확인': [C.info, '#EFF6FF'],
    '생산 중': [C.primary, '#F5F3FF'],
    '출고 준비': [C.success, '#ECFDF5'],
    '납품 완료': ['#6B7280', '#F3F4F6'],
    '활성': [C.success, '#ECFDF5'],
    '비활성': ['#6B7280', '#F3F4F6'],
    '긴급': [C.danger, '#FEF2F2'],
    '일반': ['#6B7280', '#F3F4F6'],
    '보통': [C.info, '#EFF6FF'],
  };
  const [color, bg] = map[status] || [C.textLight, '#F3F4F6'];
  return (
    <span style={{ display: 'inline-block', padding: '2px 9px', borderRadius: 20, fontSize: 11, fontWeight: 600, color, background: bg }}>{status}</span>
  );
}

let dashChartInstance = null;

function DashboardPage({ tab }) {
  const canvasRef = React.useRef(null);
  React.useEffect(() => {
    if (tab !== 'overview' || !canvasRef.current) return;
    if (dashChartInstance) { dashChartInstance.destroy(); dashChartInstance = null; }
    dashChartInstance = new Chart(canvasRef.current, {
      type: 'line',
      data: {
        labels: ['1월', '2월', '3월', '4월(현재)'],
        datasets: [
          { label: '발주 건수', data: [18, 24, 31, 12], borderColor: C.primary, backgroundColor: C.primary + '20', tension: 0.4, fill: true, borderWidth: 2 },
          { label: '납품 완료', data: [15, 22, 29, 8], borderColor: C.success, backgroundColor: C.success + '10', tension: 0.4, fill: true, borderWidth: 2 },
        ],
      },
      options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'top' } }, scales: { y: { beginAtZero: true } } },
    });
    return () => { if (dashChartInstance) { dashChartInstance.destroy(); dashChartInstance = null; } };
  }, [tab]);

  if (tab === 'alerts') {
    const alerts = [
      { level: 'high', msg: '유압 실린더 HC-200 재고 위험 수준 (87개, 최소 100개)', time: '10분 전' },
      { level: 'high', msg: '공압 솔레노이드 밸브 재고 소진 — 발주 긴급 필요', time: '1시간 전' },
      { level: 'mid', msg: '모터 감속기 25:1 재고 부족 (45개, 최소 50개)', time: '3시간 전' },
      { level: 'low', msg: 'PO-2026-0412 결재 대기 중 — 24시간 초과 예정', time: '6시간 전' },
      { level: 'low', msg: 'Hanoi Machinery Co. 신규 견적 요청 접수', time: '어제' },
    ];
    const lvColors = { high: [C.danger, '#FEF2F2'], mid: [C.warning, '#FFFBEB'], low: [C.info, '#EFF6FF'] };
    return (
      <div style={{ display: 'flex', flexDirection: 'column', gap: 10 }}>
        {alerts.map((a, i) => {
          const [color, bg] = lvColors[a.level];
          return (
            <div key={i} style={{ padding: '14px 16px', borderRadius: 10, background: bg, border: `1px solid ${color}30`, display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
              <div style={{ display: 'flex', gap: 10, alignItems: 'center' }}>
                <span style={{ fontSize: 18 }}>{a.level === 'high' ? '🚨' : a.level === 'mid' ? '⚠️' : 'ℹ️'}</span>
                <span style={{ fontSize: 13, color: C.text }}>{a.msg}</span>
              </div>
              <span style={{ fontSize: 11, color: C.textLight, flexShrink: 0, marginLeft: 12 }}>{a.time}</span>
            </div>
          );
        })}
      </div>
    );
  }

  const kpis = [
    { label: '이번달 발주', value: '12건', icon: '📋', color: C.primary },
    { label: '납품 진행중', value: '2건', icon: '🚛', color: C.info },
    { label: '재고 경고', value: '3종', icon: '⚠️', color: C.warning },
    { label: '바이어 활성', value: '3개사', icon: '🌐', color: C.success },
  ];

  return (
    <div style={{ display: 'flex', flexDirection: 'column', gap: 16 }}>
      <div style={{ display: 'grid', gridTemplateColumns: 'repeat(4, 1fr)', gap: 12 }}>
        {kpis.map(k => (
          <div key={k.label} style={{ background: C.surface, borderRadius: 14, padding: '16px', border: `1px solid ${C.border}`, boxShadow: '0 2px 8px rgba(0,0,0,0.04)' }}>
            <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start' }}>
              <div>
                <div style={{ fontSize: 11, color: C.textLight, marginBottom: 6 }}>{k.label}</div>
                <div style={{ fontSize: 24, fontWeight: 800, color: k.color }}>{k.value}</div>
              </div>
              <div style={{ fontSize: 24 }}>{k.icon}</div>
            </div>
          </div>
        ))}
      </div>
      <div style={{ background: C.surface, borderRadius: 14, padding: 20, border: `1px solid ${C.border}` }}>
        <div style={{ fontSize: 14, fontWeight: 700, color: C.text, marginBottom: 12 }}>월별 발주·납품 현황</div>
        <div className="chart-wrap"><canvas ref={canvasRef} /></div>
      </div>
    </div>
  );
}

function OrdersPage({ tab }) {

  const data = ORDERS_DATA[tab] || [];

  return (
    <div style={{ display: 'flex', height: '100%', overflow: 'hidden' }}>

      <div style={{ width: '42%', borderRight: `1px solid ${C.border}`, overflowY: 'auto' }}>
        {data.map(order => (
          <div key={order.id} onClick={() => setSelected(order)} style={{
            padding: '14px 16px', cursor: 'pointer', borderBottom: `1px solid ${C.border}`,
            background: selected?.id === order.id ? C.primaryLight : 'transparent',
            transition: 'background 150ms',
            borderLeft: selected?.id === order.id ? `3px solid ${C.primary}` : '3px solid transparent',
          }}
            onMouseEnter={e => { if (selected?.id !== order.id) e.currentTarget.style.background = C.bg; }}
            onMouseLeave={e => { if (selected?.id !== order.id) e.currentTarget.style.background = 'transparent'; }}>
            <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: 6 }}>
              <span style={{ fontSize: 12, fontFamily: 'monospace', color: C.textLight }}>{order.id}</span>
              <StatusBadge status={order.priority} />

            <div style={{ fontSize: 14, fontWeight: 700, color: C.text, marginBottom: 4 }}>{order.company}</div>

              <span style={{ fontSize: 14, fontWeight: 700, color: C.primary }}>{order.amount}</span>

              </div>
              <StatusBadge status={selected.status} />
            </div>
            {[['주문 품목', selected.items], ['발주 금액', selected.amount], ['접수일', selected.date], ['담당자', selected.manager], ['우선순위', null]].map(([k, v]) => (
              <div key={k} style={{ display: 'flex', justifyContent: 'space-between', padding: '10px 0', borderBottom: `1px solid ${C.border}`, alignItems: 'center' }}>
                <span style={{ fontSize: 13, color: C.textLight }}>{k}</span>
                {k === '우선순위' ? <StatusBadge status={selected.priority} /> : <span style={{ fontSize: 13, fontWeight: 600 }}>{v}</span>}

            </div>
            <div style={{ display: 'flex', gap: 8, marginTop: 16 }}>
              <button style={{ padding: '9px 18px', background: C.primary, color: '#fff', border: 'none', borderRadius: 8, fontSize: 13, fontWeight: 600 }}>발주 승인</button>
              <button style={{ padding: '9px 18px', border: `1px solid ${C.danger}`, color: C.danger, background: C.surface, borderRadius: 8, fontSize: 13 }}>반려</button>
              <button style={{ padding: '9px 18px', border: `1px solid ${C.border}`, background: C.surface, borderRadius: 8, fontSize: 13 }}>상태 변경</button>
            </div>

          <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', height: '100%', color: C.textLight }}>

function InventoryPage({ tab }) {
  const [selected, setSelected] = React.useState(null);
  const data = INVENTORY_DATA[tab] || INVENTORY_DATA.all;

  const getStockColor = (item) => {
    if (item.stock === 0) return C.danger;
    if (item.stock <= item.min) return C.warning;
    return C.success;
  };

  return (
    <div style={{ display: 'flex', height: '100%', overflow: 'hidden' }}>
      <div style={{ width: '42%', borderRight: `1px solid ${C.border}`, overflowY: 'auto' }}>
        {data.map(item => (
          <div key={item.sku} onClick={() => setSelected(item)} style={{
            padding: '12px 16px', cursor: 'pointer', borderBottom: `1px solid ${C.border}`,
            background: selected?.sku === item.sku ? C.primaryLight : 'transparent',
            borderLeft: selected?.sku === item.sku ? `3px solid ${C.primary}` : '3px solid transparent',
            transition: 'background 150ms',
          }}
            onMouseEnter={e => { if (selected?.sku !== item.sku) e.currentTarget.style.background = C.bg; }}
            onMouseLeave={e => { if (selected?.sku !== item.sku) e.currentTarget.style.background = 'transparent'; }}>
            <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: 6 }}>
              <span style={{ fontSize: 13, fontWeight: 700, color: C.text }}>{item.name}</span>
              <StatusBadge status={item.status} />
            </div>
            <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
              <span style={{ fontSize: 12, color: C.textLight }}>{item.sku} · {item.cat}</span>
              <span style={{ fontSize: 15, fontWeight: 800, color: getStockColor(item) }}>{item.stock.toLocaleString()}개</span>
            </div>
            {item.stock > 0 && (
              <div style={{ marginTop: 6, height: 4, background: '#F3F4F6', borderRadius: 2, overflow: 'hidden' }}>
                <div style={{ width: `${Math.min(100, (item.stock / (item.min * 3)) * 100)}%`, height: '100%', background: getStockColor(item), borderRadius: 2 }} />
              </div>
            )}
          </div>
        ))}
      </div>
      <div style={{ flex: 1, overflowY: 'auto', padding: 20 }}>
        {selected ? (
          <div style={{ animation: 'slideIn 200ms ease' }}>
            <h3 style={{ fontSize: 17, fontWeight: 800, color: C.text, marginBottom: 4 }}>{selected.name}</h3>
            <p style={{ fontSize: 12, color: C.textLight, marginBottom: 16 }}>{selected.sku}</p>
            <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 12, marginBottom: 16 }}>
              {[['현재 재고', `${selected.stock.toLocaleString()}개`], ['최소 재고', `${selected.min.toLocaleString()}개`], ['입고 예정', selected.incoming ? `${selected.incoming}개` : '없음'], ['보관 위치', selected.loc]].map(([k, v]) => (
                <div key={k} style={{ background: C.bg, borderRadius: 10, padding: '12px 14px' }}>
                  <div style={{ fontSize: 11, color: C.textLight, marginBottom: 4 }}>{k}</div>
                  <div style={{ fontSize: 16, fontWeight: 700, color: k === '현재 재고' ? (selected.stock === 0 ? C.danger : selected.stock <= selected.min ? C.warning : C.success) : C.text }}>{v}</div>
                </div>
              ))}
            </div>
            {[['카테고리', selected.cat], ['상태', null]].map(([k, v]) => (
              <div key={k} style={{ display: 'flex', justifyContent: 'space-between', padding: '10px 0', borderBottom: `1px solid ${C.border}`, alignItems: 'center' }}>
                <span style={{ fontSize: 13, color: C.textLight }}>{k}</span>
                {k === '상태' ? <StatusBadge status={selected.status} /> : <span style={{ fontSize: 13, fontWeight: 600 }}>{v}</span>}
              </div>
            ))}
            <div style={{ display: 'flex', gap: 8, marginTop: 20 }}>
              <button style={{ padding: '9px 18px', background: C.primary, color: '#fff', border: 'none', borderRadius: 8, fontSize: 13, fontWeight: 600 }}>발주 요청</button>
              <button style={{ padding: '9px 18px', border: `1px solid ${C.border}`, background: C.surface, borderRadius: 8, fontSize: 13 }}>재고 조정</button>
            </div>
          </div>
        ) : (
          <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', height: '100%', color: C.textLight }}>
            <div style={{ fontSize: 40, marginBottom: 12 }}>📦</div>
            <div style={{ fontSize: 14 }}>재고 항목을 선택하면 상세 정보가 표시됩니다.</div>
          </div>
        )}
      </div>
    </div>
  );
}

function GlobalPage({ tab }) {
  const [selected, setSelected] = React.useState(null);

  if (tab === 'catalog') {
    return (
      <div style={{ overflowY: 'auto', padding: '0 0 20px' }}>
        <div style={{ padding: '12px 16px', background: '#1E3A5F', color: '#fff', borderRadius: 10, marginBottom: 16, display: 'flex', alignItems: 'center', gap: 10 }}>
          <span style={{ fontSize: 20 }}>🇺🇸</span>
          <div>
            <div style={{ fontSize: 13, fontWeight: 700 }}>English Product Catalog — Global Buyer View</div>
            <div style={{ fontSize: 11, opacity: 0.7 }}>Prices in USD · MOQ shown per item</div>
          </div>
        </div>
        <div style={{ display: 'flex', flexDirection: 'column', gap: 10 }}>
          {EN_CATALOG.map(p => (
            <div key={p.id} style={{
              padding: '14px 16px', background: C.surface, borderRadius: 10, border: `1px solid ${C.border}`,
              display: 'flex', alignItems: 'center', gap: 14,
              opacity: p.available ? 1 : 0.6,
            }}>
              <span style={{ fontSize: 28 }}>{p.icon}</span>
              <div style={{ flex: 1 }}>
                <div style={{ fontSize: 14, fontWeight: 700, color: C.text }}>{p.name}</div>
                <div style={{ fontSize: 12, color: C.textLight }}>{p.cat} · MOQ: {p.moq}</div>
              </div>
              <div style={{ textAlign: 'right' }}>
                <div style={{ fontSize: 16, fontWeight: 800, color: C.primary }}>{p.price}</div>
                <div style={{ fontSize: 11, color: p.available ? C.success : C.danger, fontWeight: 600, marginTop: 2 }}>{p.available ? '● Available' : '● Out of Stock'}</div>
              </div>
            </div>
          ))}
        </div>
      </div>
    );
  }

  return (
    <div style={{ display: 'flex', height: '100%', overflow: 'hidden' }}>
      <div style={{ width: '42%', borderRight: `1px solid ${C.border}`, overflowY: 'auto' }}>
        {BUYERS.map(buyer => (
          <div key={buyer.id} onClick={() => setSelected(buyer)} style={{
            padding: '14px 16px', cursor: 'pointer', borderBottom: `1px solid ${C.border}`,
            background: selected?.id === buyer.id ? C.primaryLight : 'transparent',
            borderLeft: selected?.id === buyer.id ? `3px solid ${C.primary}` : '3px solid transparent',
            transition: 'background 150ms',
          }}
            onMouseEnter={e => { if (selected?.id !== buyer.id) e.currentTarget.style.background = C.bg; }}
            onMouseLeave={e => { if (selected?.id !== buyer.id) e.currentTarget.style.background = 'transparent'; }}>
            <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: 6 }}>
              <span style={{ fontSize: 14, fontWeight: 700, color: C.text }}>{buyer.company}</span>
              <StatusBadge status={buyer.status} />
            </div>
            <div style={{ fontSize: 12, color: C.textLight }}>{buyer.country}</div>
            <div style={{ fontSize: 12, color: C.textLight, marginTop: 2 }}>최근 주문: {buyer.lastOrder}</div>
          </div>
        ))}
      </div>
      <div style={{ flex: 1, overflowY: 'auto', padding: 20 }}>
        {selected ? (
          <div style={{ animation: 'slideIn 200ms ease' }}>
            <h3 style={{ fontSize: 17, fontWeight: 800, color: C.text, marginBottom: 4 }}>{selected.company}</h3>
            <p style={{ fontSize: 13, color: C.textLight, marginBottom: 16 }}>{selected.country}</p>
            {[['담당자', selected.contact], ['이메일', selected.email], ['최근 주문', selected.lastOrder]].map(([k, v]) => (
              <div key={k} style={{ display: 'flex', justifyContent: 'space-between', padding: '10px 0', borderBottom: `1px solid ${C.border}` }}>
                <span style={{ fontSize: 13, color: C.textLight }}>{k}</span>
                <span style={{ fontSize: 13, fontWeight: 600 }}>{v}</span>
              </div>
            ))}
            <div style={{ marginTop: 12, padding: '10px 0', borderBottom: `1px solid ${C.border}` }}>
              <div style={{ fontSize: 13, color: C.textLight, marginBottom: 8 }}>관심 제품군</div>
              <div style={{ display: 'flex', gap: 6, flexWrap: 'wrap' }}>
                {selected.products.map(p => (
                  <span key={p} style={{ padding: '3px 10px', background: C.primaryLight, color: C.primary, borderRadius: 6, fontSize: 12, fontWeight: 600 }}>{p}</span>
                ))}
              </div>
            </div>
            <div style={{ display: 'flex', gap: 8, marginTop: 20 }}>
              <button style={{ padding: '9px 18px', background: C.primary, color: '#fff', border: 'none', borderRadius: 8, fontSize: 13, fontWeight: 600 }}>견적서 발송</button>
              <button style={{ padding: '9px 18px', border: `1px solid ${C.border}`, background: C.surface, borderRadius: 8, fontSize: 13 }}>이력 보기</button>
            </div>
          </div>
        ) : (
          <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', height: '100%', color: C.textLight }}>
            <div style={{ fontSize: 40, marginBottom: 12 }}>🌐</div>
            <div style={{ fontSize: 14 }}>바이어를 선택하면 상세 정보가 표시됩니다.</div>
          </div>
        )}
      </div>
    </div>
  );
}

function AnalyticsPage({ tab }) {
  const cats = ['체결부품', '배관자재', '유압기기', '베어링', '공압기기', '동력전달'];
  const values = [35, 22, 18, 42, 12, 25];
  return (
    <div style={{ padding: '8px 0', display: 'flex', flexDirection: 'column', gap: 16 }}>
      <div style={{ background: C.surface, borderRadius: 14, padding: 20, border: `1px solid ${C.border}` }}>
        <div style={{ fontSize: 14, fontWeight: 700, color: C.text, marginBottom: 14 }}>
          {tab === 'monthly' ? '월별 발주 추이' : '카테고리별 판매 분포'}
        </div>
        {tab === 'category' && (
          <div style={{ display: 'flex', flexDirection: 'column', gap: 10 }}>
            {cats.map((cat, i) => (
              <div key={cat}>
                <div style={{ display: 'flex', justifyContent: 'space-between', fontSize: 13, marginBottom: 4 }}>
                  <span style={{ color: C.text, fontWeight: 500 }}>{cat}</span>
                  <span style={{ color: C.primary, fontWeight: 700 }}>{values[i]}건</span>
                </div>
                <div style={{ height: 8, background: '#F3F4F6', borderRadius: 4, overflow: 'hidden' }}>
                  <div style={{ width: `${(values[i] / 42) * 100}%`, height: '100%', background: `linear-gradient(90deg, ${C.primary}, ${C.secondary})`, borderRadius: 4, transition: 'width 600ms ease' }} />
                </div>
              </div>
            ))}
          </div>
        )}
        {tab === 'monthly' && (
          <div style={{ display: 'grid', gridTemplateColumns: 'repeat(4, 1fr)', gap: 12 }}>
            {[['1월', 18, 15], ['2월', 24, 22], ['3월', 31, 29], ['4월', 12, 8]].map(([month, orders, done]) => (
              <div key={month} style={{ background: C.bg, borderRadius: 10, padding: 14 }}>
                <div style={{ fontSize: 12, color: C.textLight, marginBottom: 6 }}>{month}</div>
                <div style={{ fontSize: 20, fontWeight: 800, color: C.primary }}>{orders}건</div>
                <div style={{ fontSize: 12, color: C.success, marginTop: 4 }}>✓ 완료 {done}건</div>
              </div>
            ))}
          </div>
        )}
      </div>
    </div>
  );
}

function App() {
  const [section, setSection] = React.useState('dashboard');
  const [tabIdx, setTabIdx] = React.useState(0);

  React.useEffect(() => { setTabIdx(0); }, [section]);

  const tabs = SECTION_TABS[section] || [];
  const currentTab = tabs[tabIdx]?.id || 'overview';

  const breadcrumb = { dashboard: 'B2B 대시보드', orders: '발주 관리', inventory: '재고 현황', global: '글로벌 포털', analytics: '분석 리포트' };

  const renderContent = () => {
    switch (section) {
      case 'dashboard': return <DashboardPage tab={currentTab} />;
      case 'orders': return <OrdersPage tab={currentTab} />;
      case 'inventory': return <InventoryPage tab={currentTab} />;
      case 'global': return <GlobalPage tab={currentTab} />;
      case 'analytics': return <AnalyticsPage tab={currentTab} />;
      default: return null;
    }
  };

  return (
    <div style={{ display: 'flex', width: '100%', height: '100vh', overflow: 'hidden', background: C.bg }}>
      {/* 밝은 사이드바 */}
      <nav style={{
        width: 240, background: C.surface, borderRight: `1px solid ${C.border}`,
        display: 'flex', flexDirection: 'column', paddingTop: 16, flexShrink: 0,
      }}>
        <div style={{ padding: '0 16px 16px', borderBottom: `1px solid ${C.border}`, marginBottom: 8 }}>
          <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
            <div style={{ width: 34, height: 34, borderRadius: 10, background: `linear-gradient(135deg, ${C.primary}, ${C.secondary})`, display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 18 }}>⚡</div>
            <div>
              <div style={{ fontSize: 14, fontWeight: 800, color: C.text }}>ManuB2B</div>
              <div style={{ fontSize: 11, color: C.textLight }}>발주·재고 통합 플랫폼</div>
            </div>
          </div>
        </div>
        <div style={{ flex: 1, padding: '0 8px', display: 'flex', flexDirection: 'column', gap: 2 }}>
          {NAV_ITEMS.map(item => (
            <SideNavItem key={item.id} icon={item.icon} label={item.label} active={section === item.id} onClick={() => setSection(item.id)} />
          ))}
        </div>
        <div style={{ padding: '12px 16px', borderTop: `1px solid ${C.border}` }}>
          <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
            <div style={{ width: 32, height: 32, borderRadius: '50%', background: `linear-gradient(135deg, ${C.primary}, ${C.secondary})`, display: 'flex', alignItems: 'center', justifyContent: 'center', color: '#fff', fontSize: 13, fontWeight: 700 }}>김</div>
            <div>
              <div style={{ fontSize: 13, fontWeight: 600, color: C.text }}>김관리자</div>
              <div style={{ fontSize: 11, color: C.textLight }}>구매팀 팀장</div>
            </div>
          </div>
        </div>
      </nav>

      {/* 메인 */}
      <div style={{ flex: 1, display: 'flex', flexDirection: 'column', overflow: 'hidden' }}>
        {/* 앱바 */}
        <header style={{
          height: 44, borderBottom: `1px solid ${C.border}`, display: 'flex', alignItems: 'center',
          padding: '0 16px', gap: 8, background: C.surface, flexShrink: 0,
        }}>
          <span style={{ fontSize: 12, color: C.textLight }}>홈</span>
          <span style={{ fontSize: 12, color: C.textLight }}>›</span>
          <span style={{ fontSize: 12, fontWeight: 600, color: C.text }}>{breadcrumb[section]}</span>
          {tabs[tabIdx] && (
            <>
              <span style={{ fontSize: 12, color: C.textLight }}>›</span>
              <span style={{ fontSize: 12, fontWeight: 600, color: C.primary }}>{tabs[tabIdx].label}</span>
            </>
          )}
          <div style={{ flex: 1 }} />
          <input placeholder="검색..." style={{ padding: '5px 12px', border: `1px solid ${C.border}`, borderRadius: 20, fontSize: 12, width: 180, outline: 'none', background: C.bg }} />
          <div style={{ width: 30, height: 30, borderRadius: '50%', background: `linear-gradient(135deg, ${C.primary}, ${C.secondary})`, display: 'flex', alignItems: 'center', justifyContent: 'center', color: '#fff', fontSize: 12, fontWeight: 700 }}>김</div>
        </header>
        {/* 탭 스트립 */}
        <div style={{ height: 40, borderBottom: `1px solid ${C.border}`, display: 'flex', alignItems: 'flex-end', padding: '0 16px', background: C.surface, flexShrink: 0 }}>
          {tabs.map((t, i) => (
            <TabUnderline key={t.id} label={t.label} active={tabIdx === i} onClick={() => setTabIdx(i)} />
          ))}
          <div style={{ flex: 1 }} />
          <button style={{ padding: '5px 14px', background: C.primary, color: '#fff', border: 'none', borderRadius: 6, fontSize: 12, fontWeight: 600, marginBottom: 6 }}>
            {section === 'orders' ? '+ 발주 등록' : section === 'inventory' ? '+ 재고 조정' : section === 'global' ? '+ 바이어 등록' : '+ 신규'}
          </button>
        </div>
        {/* 워크스페이스 */}
        <div style={{ flex: 1, overflow: ['orders', 'inventory', 'global'].includes(section) ? 'hidden' : 'auto', padding: ['orders', 'inventory', 'global'].includes(section) ? 0 : '16px 20px' }}>
          <div style={{ animation: 'fadeIn 200ms ease', height: '100%' }}>
            {renderContent()}
          </div>
        </div>
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
