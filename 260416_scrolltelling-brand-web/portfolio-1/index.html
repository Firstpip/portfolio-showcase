/* ── 캔버스 파티클 훅 ── */
function useParticleCanvas(canvasRef) {
  useEffect(() => {
    const canvas = canvasRef.current;
    if (!canvas) return;
    const ctx = canvas.getContext('2d');
    let animId;
    let particles = [];
    let t = 0;

    const resize = () => {
      canvas.width = canvas.offsetWidth;
      canvas.height = canvas.offsetHeight;
    };
    resize();
    window.addEventListener('resize', resize);

    // 파티클 초기화
    for (let i = 0; i < 120; i++) {
      particles.push({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        r: Math.random() * 2 + 0.5,
        vx: (Math.random() - 0.5) * 0.4,
        vy: (Math.random() - 0.5) * 0.4,
        alpha: Math.random() * 0.6 + 0.2,
        hue: Math.random() > 0.5 ? 270 : 42,
      });
    }

    const draw = () => {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      t += 0.01;

      // 웨이브라인 (사운드 파형 시뮬레이션)
      const waves = [
        { amp: 40, freq: 0.015, speed: 1.2, alpha: 0.25, color: '#7B2FE5', y: canvas.height * 0.45 },
        { amp: 25, freq: 0.022, speed: 0.9, alpha: 0.18, color: '#A855F7', y: canvas.height * 0.5 },
        { amp: 15, freq: 0.03, speed: 1.5, alpha: 0.12, color: '#C9A84C', y: canvas.height * 0.55 },
      ];

      waves.forEach(w => {
        ctx.beginPath();
        ctx.strokeStyle = w.color;
        ctx.globalAlpha = w.alpha;
        ctx.lineWidth = 1.5;
        for (let x = 0; x <= canvas.width; x += 2) {
          const y = w.y + Math.sin(x * w.freq + t * w.speed) * w.amp * (1 + 0.3 * Math.sin(t * 0.5));
          if (x === 0) ctx.moveTo(x, y);
          else ctx.lineTo(x, y);
        }
        ctx.stroke();
        ctx.globalAlpha = 1;
      });

      // 파티클
      particles.forEach(p => {
        p.x += p.vx;
        p.y += p.vy;
        if (p.x < 0) p.x = canvas.width;
        if (p.x > canvas.width) p.x = 0;
        if (p.y < 0) p.y = canvas.height;
        if (p.y > canvas.height) p.y = 0;

        const grd = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, p.r * 3);
        const col = p.hue === 270 ? '123,47,229' : '201,168,76';
        grd.addColorStop(0, `rgba(${col},${p.alpha})`);
        grd.addColorStop(1, `rgba(${col},0)`);
        ctx.beginPath();
        ctx.fillStyle = grd;
        ctx.arc(p.x, p.y, p.r * 3, 0, Math.PI * 2);
        ctx.fill();
      });

      // 커넥션 라인
      ctx.lineWidth = 0.3;
      for (let i = 0; i < particles.length; i++) {
        for (let j = i + 1; j < particles.length; j++) {
          const dx = particles[i].x - particles[j].x;
          const dy = particles[i].y - particles[j].y;
          const dist = Math.sqrt(dx * dx + dy * dy);
          if (dist < 80) {
            ctx.globalAlpha = (1 - dist / 80) * 0.15;
            ctx.strokeStyle = '#7B2FE5';
            ctx.beginPath();
            ctx.moveTo(particles[i].x, particles[i].y);
            ctx.lineTo(particles[j].x, particles[j].y);
            ctx.stroke();
          }
        }
      }
      ctx.globalAlpha = 1;
      animId = requestAnimationFrame(draw);
    };
    draw();

    return () => {
      cancelAnimationFrame(animId);
      window.removeEventListener('resize', resize);
    };
  }, []);
}

                  <div style={{ display:'flex', gap:16, marginTop:12, animation:'fadeUp .2s ease' }}>

                )}
              </div>

          );
        })}
      </div>
    </div>
  );
}

function ContactSection() {
  const [form, setForm] = useState({ name:'', email:'', type:'게임 사운드', message:'' });
  const [sent, setSent] = useState(false);
  const types = ['게임 사운드', '로컬리제이션', '아티스트 캐스팅', '오리지널 OST', '기타'];
  const canvasRef = useRef(null);
  useParticleCanvas(canvasRef);

  const handleSubmit = (e) => { e.preventDefault(); setSent(true); };

  return (
    <div style={{ position:'relative', height:'100%', overflow:'hidden' }}>
      <canvas ref={canvasRef} style={{ position:'absolute', inset:0, width:'100%', height:'100%', opacity:.4 }} />
      <div style={{ position:'relative', zIndex:2, padding:'48px 56px', height:'100%', overflowY:'auto' }}>
        <div style={{ display:'flex', alignItems:'center', gap:10, marginBottom:8 }}>
          <div style={{ width:24, height:2, background:'#7B2FE5' }} />
          <span style={{ fontSize:12, color:'#7B2FE5', fontWeight:600, letterSpacing:'0.15em', textTransform:'uppercase' }}>Contact</span>
        </div>
        <h2 style={{ fontSize:36, fontWeight:800, marginBottom:32, letterSpacing:'-0.03em' }}>프로젝트를 시작할<br/><span style={{ color:'#7B2FE5' }}>준비가 되셨나요?</span></h2>

        <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:40 }}>
          <div>
            {sent ? (
              <div style={{
                background:'rgba(123,47,229,.15)', border:'1px solid #7B2FE5',
                borderRadius:8, padding:40, textAlign:'center', animation:'fadeUp .4s ease'
              }}>
                <div style={{ fontSize:48, marginBottom:16 }}>✅</div>
                <div style={{ fontSize:20, fontWeight:700, marginBottom:8 }}>문의가 접수되었습니다</div>

            ) : (
              <form onSubmit={handleSubmit}>
                {[

                ].map(f => (
                  <div key={f.key} style={{ marginBottom:20 }}>
                    <label style={{ display:'block', fontSize:13, color:'#8A8A9A', marginBottom:8 }}>{f.label}</label>
                    <input
                      type={f.type} value={form[f.key]} placeholder={f.placeholder}
                      onChange={e => setForm({...form, [f.key]: e.target.value})}
                      style={{
                        width:'100%', padding:'12px 16px',
                        background:'rgba(255,255,255,.05)', border:'1px solid rgba(255,255,255,.12)',
                        borderRadius:4, color:'#F5F5F7', fontSize:14, fontFamily:'inherit',
                        outline:'none', transition:'border-color .2s'
                      }}
                      onFocus={e => e.target.style.borderColor='#7B2FE5'}
                      onBlur={e => e.target.style.borderColor='rgba(255,255,255,.12)'}
                    />
                  </div>
                ))}
                <div style={{ marginBottom:20 }}>
                  <label style={{ display:'block', fontSize:13, color:'#8A8A9A', marginBottom:8 }}>서비스 유형</label>
                  <div style={{ display:'flex', gap:8, flexWrap:'wrap' }}>
                    {types.map(t => (
                      <button key={t} type="button"
                        onClick={() => setForm({...form, type:t})}
                        style={{
                          padding:'6px 14px', border:`1px solid ${form.type===t ? '#7B2FE5' : 'rgba(255,255,255,.12)'}`,
                          borderRadius:3, background: form.type===t ? 'rgba(123,47,229,.2)' : 'transparent',
                          color: form.type===t ? '#A855F7' : '#8A8A9A', fontSize:12, cursor:'pointer', fontFamily:'inherit'
                        }}
                      >{t}</button>
                    ))}
                  </div>
                </div>
                <div style={{ marginBottom:24 }}>
                  <label style={{ display:'block', fontSize:13, color:'#8A8A9A', marginBottom:8 }}>프로젝트 내용</label>
                  <textarea
                    value={form.message} placeholder="프로젝트에 대해 간략히 설명해주세요..."
                    onChange={e => setForm({...form, message:e.target.value})}
                    rows={4}
                    style={{
                      width:'100%', padding:'12px 16px',
                      background:'rgba(255,255,255,.05)', border:'1px solid rgba(255,255,255,.12)',
                      borderRadius:4, color:'#F5F5F7', fontSize:14, fontFamily:'inherit',
                      outline:'none', resize:'none', transition:'border-color .2s'
                    }}
                    onFocus={e => e.target.style.borderColor='#7B2FE5'}
                    onBlur={e => e.target.style.borderColor='rgba(255,255,255,.12)'}
                  />
                </div>
                <button type="submit" style={{
                  width:'100%', padding:'14px', background:'#7B2FE5', color:'#fff', border:'none',
                  borderRadius:4, fontSize:15, fontWeight:600, cursor:'pointer', fontFamily:'inherit',
                  boxShadow:'0 0 30px rgba(123,47,229,.4)', transition:'all .3s'

          <div>
            <div style={{ background:'#13131A', border:'1px solid rgba(255,255,255,.08)', borderRadius:8, padding:24, marginBottom:20 }}>
              <div style={{ fontSize:14, fontWeight:700, marginBottom:16 }}>연락처</div>
              {[
                ['📧', 'hello@soundverse.studio'],
                ['📞', '+82-2-1234-5678'],
                ['📍', '서울특별시 강남구 테헤란로 152'],
                ['🌐', 'soundverse.studio'],
              ].map(([icon,val]) => (
                <div key={val} style={{ display:'flex', gap:12, marginBottom:12, alignItems:'center' }}>
                  <span style={{ fontSize:16 }}>{icon}</span>
                  <span style={{ fontSize:13, color:'#8A8A9A' }}>{val}</span>
                </div>
              ))}
            </div>
            <div style={{ background:'rgba(123,47,229,.1)', border:'1px solid rgba(123,47,229,.3)', borderRadius:8, padding:24 }}>
              <div style={{ fontSize:14, fontWeight:700, color:'#A855F7', marginBottom:8 }}>글로벌 오피스</div>
              {['🇰🇷 서울 (헤드쿼터)','🇯🇵 도쿄','🇸🇬 싱가포르','🇺🇸 로스앤젤레스'].map(o => (
                <div key={o} style={{ fontSize:13, color:'#8A8A9A', marginBottom:6 }}>{o}</div>
              ))}
            </div>
          </div>
        </div>
      </div>
    </div>
  );
}

  return (
    <div style={{ display:'flex', width:'100%', height:'100vh', overflow:'hidden' }}>

      <aside style={{

            <div>
              <div style={{ fontSize:15, fontWeight:800, letterSpacing:'-0.02em' }}>SoundVerse</div>
              <div style={{ fontSize:10, color:'#7B2FE5', fontWeight:600, letterSpacing:'0.1em' }}>STUDIO</div>
            </div>
          </div>
        </div>

        {/* 네비게이션 */}
        <nav style={{ flex:1, padding:'16px 0' }}>
          {navItems.map(item => (
            <button key={item.label}
              onClick={() => setActiveNav(item.label)}
              title={item.label}
              style={{
                width:'100%', display:'flex', alignItems:'center', gap:14,
                padding:'13px 24px', border:'none', cursor:'pointer',
                background: activeNav===item.label ? 'rgba(123,47,229,.15)' : 'transparent',
                color: activeNav===item.label ? '#A855F7' : '#8A8A9A',
                fontSize:14, fontWeight: activeNav===item.label ? 600 : 400,
                fontFamily:'inherit', textAlign:'left', transition:'all .2s',
                borderRight: activeNav===item.label ? '2px solid #7B2FE5' : '2px solid transparent',
              }}
              onMouseEnter={e => { if(activeNav!==item.label) { e.currentTarget.style.background='rgba(255,255,255,.04)'; e.currentTarget.style.color='#F5F5F7'; } }}
              onMouseLeave={e => { if(activeNav!==item.label) { e.currentTarget.style.background='transparent'; e.currentTarget.style.color='#8A8A9A'; } }}
            >
              <span style={{ fontSize:16, opacity:.8 }}>{item.icon}</span>
              <span>{item.label}</span>
            </button>
          ))}
        </nav>

        {/* 하단 배지 */}
        <div style={{ padding:'20px 24px', borderTop:'1px solid rgba(255,255,255,.06)' }}>
          <div style={{ background:'rgba(123,47,229,.1)', border:'1px solid rgba(123,47,229,.25)', borderRadius:6, padding:'12px 14px' }}>
            <div style={{ fontSize:11, color:'#7B2FE5', fontWeight:700, marginBottom:4 }}>맞춤 구현 데모</div>

          </div>
        </div>
      </aside>

      {/* 탑바 */}
      <div style={{ flex:1, display:'flex', flexDirection:'column', height:'100vh', overflow:'hidden' }}>
        <header style={{
          height:56, background:'rgba(10,10,15,.8)', backdropFilter:'blur(12px)',
          borderBottom:'1px solid rgba(255,255,255,.06)',
