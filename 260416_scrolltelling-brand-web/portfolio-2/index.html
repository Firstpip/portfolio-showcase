/* ── 캔버스 배경 ── */
function useNeonCanvas(ref) {
  useEffect(() => {
    const canvas = ref.current;
    if (!canvas) return;
    const ctx = canvas.getContext('2d');
    let animId, t = 0;
    const resize = () => { canvas.width = canvas.offsetWidth; canvas.height = canvas.offsetHeight; };
    resize();
    window.addEventListener('resize', resize);

    const nodes = Array.from({length:50}, () => ({
      x: Math.random(), y: Math.random(),
      vx: (Math.random()-.5)*.003, vy: (Math.random()-.5)*.003,
    }));

    const draw = () => {
      ctx.clearRect(0,0,canvas.width,canvas.height);
      t += 0.008;
      nodes.forEach(n => {
        n.x += n.vx; n.y += n.vy;
        if (n.x < 0 || n.x > 1) n.vx *= -1;
        if (n.y < 0 || n.y > 1) n.vy *= -1;
      });
      // 연결선
      for (let i=0; i<nodes.length; i++) {
        for (let j=i+1; j<nodes.length; j++) {
          const dx = (nodes[i].x - nodes[j].x) * canvas.width;
          const dy = (nodes[i].y - nodes[j].y) * canvas.height;
          const d = Math.sqrt(dx*dx + dy*dy);
          if (d < 120) {
            ctx.globalAlpha = (1-d/120) * 0.12;
            ctx.strokeStyle = '#00FFA3';
            ctx.lineWidth = .5;
            ctx.beginPath();
            ctx.moveTo(nodes[i].x*canvas.width, nodes[i].y*canvas.height);
            ctx.lineTo(nodes[j].x*canvas.width, nodes[j].y*canvas.height);
            ctx.stroke();
          }
        }
      }
      nodes.forEach(n => {
        ctx.globalAlpha = .4;
        ctx.fillStyle = '#00FFA3';
        ctx.beginPath();
        ctx.arc(n.x*canvas.width, n.y*canvas.height, 1.5, 0, Math.PI*2);
        ctx.fill();
      });
      ctx.globalAlpha = 1;
      animId = requestAnimationFrame(draw);
    };
    draw();
    return () => { cancelAnimationFrame(animId); window.removeEventListener('resize', resize); };
  }, []);
}

function CareersSection() {
  const [typed, setTyped] = useState('');
  const [line, setLine] = useState(0);
  const lines = ['> NEXUS_GAME_STUDIO', '> CAREERS_PORTAL_v2.4.1', '> Loading open positions...', '> 4 positions found.', '> Display results? [Y/n]: Y'];

    if (line >= lines.length) return;
    let idx = 0;
    const interval = setInterval(() => {
      setTyped(lines[line].slice(0, idx+1));
      idx++;
      if (idx >= lines[line].length) { clearInterval(interval); setTimeout(() => setLine(l => l+1), 400); }
    }, 30);
    return () => clearInterval(interval);
  }, [line]);

    <div style={{ height:'100%', overflowY:'auto', padding:'40px 64px' }}>

      {/* 터미널 인트로 */}
      <div style={{
        background:'#0A0A0F', border:'1px solid rgba(0,255,163,.25)', borderRadius:4, padding:20, marginBottom:28,
        fontFamily:'monospace', fontSize:13
      }}>
        {lines.slice(0, line).map((l,i) => (
          <div key={i} style={{ color:'rgba(0,255,163,.7)', marginBottom:4 }}>{l}</div>
        ))}
        {line < lines.length && (
          <div style={{ color:'#00FFA3' }}>
            {typed}<span style={{ animation:'terminalBlink .7s infinite' }}>_</span>
          </div>
        )}
      </div>

      {/* 포지션 목록 */}
      <div style={{ display:'flex', flexDirection:'column', gap:12 }}>
        {POSITIONS.map((p, i) => (
          <div key={i} style={{ background:'rgba(255,255,255,.03)', border:'1px solid rgba(255,255,255,.08)', borderRadius:4, padding:20, transition:'all .25s', animation:`fadeUp .3s ease ${i*0.08}s both` }}
            onMouseEnter={e => { e.currentTarget.style.borderColor='rgba(0,255,163,.4)'; e.currentTarget.style.background='rgba(0,255,163,.05)'; }}
            onMouseLeave={e => { e.currentTarget.style.borderColor='rgba(255,255,255,.08)'; e.currentTarget.style.background='rgba(255,255,255,.03)'; }}
          >
            <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:8 }}>
              <div>
                <div style={{ fontSize:16, fontWeight:700 }}>{p.title}</div>
                <div style={{ fontSize:12, color:'rgba(255,255,255,.4)', marginTop:2 }}>{p.team}</div>
              </div>
              <div style={{ display:'flex', gap:8, alignItems:'center' }}>
                <span style={{
                  padding:'4px 12px', fontSize:11, fontWeight:600, borderRadius:2,
                  background: p.type==='정규직' ? 'rgba(0,255,163,.15)' : 'rgba(255,0,110,.15)',
                  color: p.type==='정규직' ? '#00FFA3' : '#FF006E'
                }}>{p.type}</span>
                <button style={{
                  padding:'6px 16px', background:'transparent', border:'1px solid rgba(0,255,163,.4)',
                  color:'#00FFA3', borderRadius:2, fontSize:12, fontWeight:600, cursor:'pointer', fontFamily:'inherit'
                }}>지원하기</button>
              </div>
            </div>
            <div style={{ fontSize:12, color:'rgba(255,255,255,.4)', display:'flex', alignItems:'center', gap:6 }}>
              <span style={{ color:'rgba(0,255,163,.5)' }}>REQ:</span>
              {p.req}
            </div>
          </div>
        ))}
      </div>

      <div style={{ marginTop:28, padding:20, background:'rgba(255,0,110,.05)', border:'1px solid rgba(255,0,110,.2)', borderRadius:4 }}>
        <div style={{ fontSize:12, color:'#FF006E', fontWeight:700, marginBottom:6 }}>📬 열정이 있다면 누구든 환영합니다</div>
        <div style={{ fontSize:12, color:'rgba(255,255,255,.5)' }}>포지션에 없는 직군도 careers@nexusgame.studio 로 자유롭게 이력서를 보내주세요.</div>
      </div>
    </div>
  );
}

/* ── 앱 ── */
function App() {
  const [activeNav, setActiveNav] = useState('홈');
  const navItems = ['홈','게임','스튜디오','채용'];
  const SECTIONS = { '홈':<HomeSection/>, '게임':<GamesSection/>, '스튜디오':<StudioSection/>, '채용':<CareersSection/> };

  return (
    <div style={{ display:'flex', flexDirection:'column', width:'100%', height:'100vh', overflow:'hidden' }}>
      {/* 탑 네비게이션 */}
      <header style={{
        height:60, background:'rgba(5,5,8,.9)', backdropFilter:'blur(12px)',
        borderBottom:'1px solid rgba(0,255,163,.12)',
        display:'flex', alignItems:'center', padding:'0 64px', gap:48, flexShrink:0, zIndex:10,
        boxShadow:'0 1px 0 rgba(0,255,163,.08)'
      }}>
        {/* 로고 */}
        <div style={{ display:'flex', alignItems:'center', gap:12, marginRight:16 }}>
          <div style={{
            width:32, height:32, background:'linear-gradient(135deg,#00FFA3,#7B00FF)',
            borderRadius:4, display:'flex', alignItems:'center', justifyContent:'center',
            fontSize:16, boxShadow:'0 0 16px rgba(0,255,163,.5)'
          }}>◈</div>
          <div style={{ fontSize:16, fontWeight:900, letterSpacing:'-0.02em' }}>
            NEXUS<span style={{ color:'#00FFA3' }}>GAME</span>
          </div>
        </div>

        {/* 네비 탭 */}
        <nav style={{ display:'flex', gap:4 }}>
          {navItems.map(item => (
            <button key={item}
              onClick={() => setActiveNav(item)}
              title={item}
              style={{
                padding:'8px 20px', border:'none', borderRadius:3, cursor:'pointer',
                background: activeNav===item ? 'rgba(0,255,163,.12)' : 'transparent',
                color: activeNav===item ? '#00FFA3' : 'rgba(255,255,255,.45)',
                fontSize:13, fontWeight: activeNav===item ? 700 : 400,
                fontFamily:'inherit', transition:'all .2s', letterSpacing:'0.02em',
                boxShadow: activeNav===item ? '0 0 15px rgba(0,255,163,.2)' : 'none',
              }}
              onMouseEnter={e => { if(activeNav!==item) e.currentTarget.style.color='rgba(255,255,255,.8)'; }}
              onMouseLeave={e => { if(activeNav!==item) e.currentTarget.style.color='rgba(255,255,255,.45)'; }}
            >{item}</button>
          ))}
        </nav>

        <div style={{ marginLeft:'auto', display:'flex', gap:12, alignItems:'center' }}>
          <div style={{ fontSize:11, color:'rgba(255,255,255,.3)', letterSpacing:'0.1em' }}>GSAP × Three.js × HTML5 Video</div>
          <button style={{
            padding:'7px 18px', background:'#00FFA3', color:'#050508',
            border:'none', borderRadius:2, fontSize:12, fontWeight:800, cursor:'pointer',
            fontFamily:'inherit', letterSpacing:'0.05em', textTransform:'uppercase',
            boxShadow:'0 0 16px rgba(0,255,163,.4)'
          }}>채용 지원</button>
        </div>
      </header>

      {/* 히어로 배너 아래 콘텐츠 */}
      <main style={{ flex:1, overflow:'hidden' }}>
        {SECTIONS[activeNav]}
      </main>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
