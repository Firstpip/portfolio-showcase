<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Luminary Agency — 구현 데모</title>
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" rel="stylesheet">
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;font-family:'Pretendard',-apple-system,sans-serif;background:#F8F5F0;color:#1A1A1A;overflow:hidden}
#root{display:flex;width:100%;height:100vh;overflow:hidden}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:#F0EDE8}::-webkit-scrollbar-thumb{background:#C4956A;border-radius:2px}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideRight{from{opacity:0;transform:translateX(-16px)}to{opacity:1;transform:translateX(0)}}
@keyframes revealMask{from{clip-path:inset(0 100% 0 0)}to{clip-path:inset(0 0% 0 0)}}
@keyframes countUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef } = React;

/* ── 데이터 ── */
const CASES = [
  { id:1, type:'브랜딩', title:'Meridian 금융그룹 리브랜딩', client:'Meridian Financial', year:'2024', desc:'전통 금융사의 디지털 전환 아이덴티티 시스템 설계. 96개 touchpoint에 일관된 브랜드 언어를 적용했습니다.', tags:['Brand Identity','Motion','Digital'], color:'#C4956A' },
  { id:2, type:'웹', title:'Vella Cosmetics 인터랙티브 스토어', client:'Vella Beauty Group', year:'2024', desc:'스크롤텔링 기반 D2C 뷰티 스토어. 스크롤 인터랙션으로 브랜드 스토리와 쇼핑 경험을 결합했습니다.', tags:['Web','Scrolltelling','E-Commerce'], color:'#8B7355' },
  { id:3, type:'영상', title:'Orbis 우주 테마파크 프로모션', client:'Orbis Experience', year:'2023', desc:'4분 시네마틱 영상 + 인터랙티브 웹 경험. Cannes Lions 디지털 부문 동상 수상 작품.', tags:['Film','Interactive','Award'], color:'#1A1A1A' },
  { id:4, type:'앱', title:'Sage 명상 앱 UX 리디자인', client:'Sage Labs', year:'2023', desc:'23만 MAU 명상 앱의 전면 UX 재설계. 사용자 여정 분석 기반 온보딩 플로우 최적화를 설계했습니다.', tags:['App','UX Research','Motion'], color:'#C4956A' },
  { id:5, type:'브랜딩', title:'Koto 전통주 글로벌 런칭', client:'Koto Spirits', year:'2023', desc:'한국 전통주 브랜드의 글로벌 시장 진출 패키지·웹·영상 통합 캠페인. 일본·미국 동시 출시 지원.', tags:['Brand','Packaging','Global'], color:'#8B7355' },
  { id:6, type:'웹', title:'Nextra 클라우드 제품 사이트', client:'Nextra Tech', year:'2024', desc:'B2B SaaS 제품 소개 웹사이트. Three.js 기반 제품 데모 인터랙션과 GSAP 스크롤텔링으로 기술력을 시각화했습니다.', tags:['Web','3D','B2B'], color:'#1A1A1A' },
];

const OFFICES = [
  { city:'서울', country:'대한민국', flag:'🇰🇷', role:'아시아 태평양 본부', team:14, cx:620, cy:195 },
  { city:'도쿄', country:'일본', flag:'🇯🇵', role:'일본 오피스', team:6, cx:660, cy:205 },
  { city:'뉴욕', country:'미국', flag:'🇺🇸', role:'북미 허브', team:11, cx:220, cy:175 },
  { city:'런던', country:'영국', flag:'🇬🇧', role:'유럽 오피스', team:8, cx:430, cy:148 },
  { city:'싱가포르', country:'싱가포르', flag:'🇸🇬', role:'동남아 오피스', team:5, cx:610, cy:235 },
];

const LANGS = {
  ko: {
    headline: '세상을 감동시키는\n크리에이티브의 힘',
    sub: '브랜드, 영상, 웹, 앱 — Luminary는 크리에이티브의 모든 접점에서 탁월한 경험을 설계합니다.',
    cta: '프로젝트 시작하기',
    tag: '글로벌 크리에이티브 에이전시'
  },
  en: {
    headline: 'Creative Power\nthat Moves the World',
    sub: 'Brand, film, web, app — Luminary designs outstanding experiences across every creative touchpoint.',
    cta: 'Start a Project',
    tag: 'Global Creative Agency'
  },
  ja: {
    headline: '世界を動かす\nクリエイティブの力',
    sub: 'ブランド、映像、ウェブ、アプリ — Luminaryは全てのクリエイティブな接点で卓越した体験を設計します。',
    cta: 'プロジェクトを始める',
    tag: 'グローバルクリエイティブエージェンシー'
  }
};

/* ── 섹션들 ── */
function HomeSection() {
  const [visible, setVisible] = useState(false);
  useEffect(() => { const t = setTimeout(() => setVisible(true), 80); return () => clearTimeout(t); }, []);

  return (
    <div style={{ height:'100%', overflowY:'auto' }}>
      {/* 히어로 */}
      <div style={{
        height:'100vh', display:'flex', flexDirection:'column', justifyContent:'flex-end',
        padding:'0 56px 56px', position:'relative', overflow:'hidden',
        background:'linear-gradient(160deg, #F8F5F0 60%, #EDE8E0 100%)'
      }}>
        {/* 배경 타이포 */}
        <div style={{
          position:'absolute', top:'10%', right:'-2%', fontSize:220, fontWeight:900,
          color:'rgba(26,26,26,.04)', lineHeight:1, letterSpacing:'-0.06em', userSelect:'none', pointerEvents:'none'
        }}>LMY</div>

        <div style={{ position:'relative', zIndex:2 }}>
          <div style={{
            fontSize:11, fontWeight:700, color:'#C4956A', letterSpacing:'0.25em',
            textTransform:'uppercase', marginBottom:28,
            opacity: visible?1:0, transition:'opacity .6s ease'
          }}>글로벌 크리에이티브 에이전시 · EST. 2009</div>

          <h1 style={{
            fontSize:72, fontWeight:900, lineHeight:1.05, letterSpacing:'-0.04em', marginBottom:32,
            opacity: visible?1:0, transform: visible?'translateY(0)':'translateY(30px)',
            transition:'all .9s cubic-bezier(.22,.61,.36,1) .1s'
          }}>
            <span style={{ display:'block' }}>세상을 감동시키는</span>
            <span style={{ display:'block', color:'#C4956A' }}>크리에이티브의 힘</span>
          </h1>

          <p style={{
            fontSize:17, color:'#6B6560', lineHeight:1.75, maxWidth:520, marginBottom:40,
            opacity: visible?1:0, transition:'opacity .9s ease .3s'
          }}>
            브랜드, 영상, 웹, 앱 — Luminary는 크리에이티브의 모든 접점에서 탁월한 경험을 설계합니다.
            Framer Motion + GSAP SplitText 기반 스크롤텔링 기법을 구현합니다.
          </p>

          <div style={{ display:'flex', gap:16, opacity: visible?1:0, transition:'opacity .9s ease .5s' }}>
            <button style={{
              padding:'14px 36px', background:'#1A1A1A', color:'#F8F5F0',
              border:'none', fontSize:14, fontWeight:700, cursor:'pointer', fontFamily:'inherit',
              letterSpacing:'0.02em', transition:'all .3s'
            }}
            onMouseEnter={e => { e.target.style.background='#C4956A'; }}
            onMouseLeave={e => { e.target.style.background='#1A1A1A'; }}
            >프로젝트 시작하기</button>
            <button style={{
              padding:'14px 36px', background:'transparent', color:'#1A1A1A',
              border:'1px solid rgba(26,26,26,.3)', fontSize:14, fontWeight:600, cursor:'pointer', fontFamily:'inherit',
              transition:'all .3s'
            }}
            onMouseEnter={e => { e.target.style.borderColor='#1A1A1A'; }}
            onMouseLeave={e => { e.target.style.borderColor='rgba(26,26,26,.3)'; }}
            >케이스 스터디 보기</button>
          </div>
        </div>
      </div>

      {/* 스탯 바 */}
      <div style={{ display:'flex', borderTop:'1px solid rgba(26,26,26,.08)', borderBottom:'1px solid rgba(26,26,26,.08)' }}>
        {[['15년+','설립 연도 2009'],['280+','완료 프로젝트'],['5','글로벌 오피스'],['44','수상 경력']].map(([n,l],i) => (
          <div key={i} style={{ flex:1, padding:'28px 32px', borderRight: i<3 ? '1px solid rgba(26,26,26,.08)' : 'none', textAlign:'center' }}>
            <div style={{ fontSize:36, fontWeight:900, letterSpacing:'-0.04em', marginBottom:4 }}>{n}</div>
            <div style={{ fontSize:12, color:'#6B6560' }}>{l}</div>
          </div>
        ))}
      </div>

      {/* 클라이언트 */}
      <div style={{ padding:'48px 56px' }}>
        <div style={{ fontSize:11, color:'#6B6560', letterSpacing:'0.2em', textTransform:'uppercase', textAlign:'center', marginBottom:32 }}>Clients & Partners</div>
        <div style={{ display:'flex', gap:40, justifyContent:'center', alignItems:'center', flexWrap:'wrap' }}>
          {['Meridian Financial','Vella Beauty','Orbis Experience','Sage Labs','Koto Spirits','Nextra Tech'].map(c => (
            <div key={c} style={{ fontSize:14, fontWeight:700, color:'rgba(26,26,26,.25)', letterSpacing:'0.02em', transition:'color .2s', cursor:'pointer' }}
              onMouseEnter={e => e.target.style.color='#1A1A1A'}
              onMouseLeave={e => e.target.style.color='rgba(26,26,26,.25)'}
            >{c}</div>
          ))}
        </div>
      </div>
    </div>
  );
}

function CaseStudiesSection() {
  const [filter, setFilter] = useState('전체');
  const [sel, setSel] = useState(null);
  const types = ['전체','브랜딩','웹','영상','앱'];
  const filtered = filter==='전체' ? CASES : CASES.filter(c => c.type===filter);

  return (
    <div style={{ height:'100%', overflowY:'auto', padding:'40px 40px 40px 0' }}>
      <div style={{ padding:'0 0 0 8px', display:'flex', alignItems:'flex-end', justifyContent:'space-between', marginBottom:32 }}>
        <div>
          <div style={{ fontSize:11, color:'#C4956A', fontWeight:700, letterSpacing:'0.2em', textTransform:'uppercase', marginBottom:8 }}>Case Studies</div>
          <h2 style={{ fontSize:34, fontWeight:900, letterSpacing:'-0.03em' }}>선별된 프로젝트</h2>
        </div>
        <div style={{ display:'flex', gap:8 }}>
          {types.map(t => (
            <button key={t} onClick={() => setFilter(t)} style={{
              padding:'7px 16px', border:`1px solid ${filter===t ? '#1A1A1A' : 'rgba(26,26,26,.15)'}`,
              background: filter===t ? '#1A1A1A' : 'transparent',
              color: filter===t ? '#F8F5F0' : '#6B6560', fontSize:12, fontWeight:500,
              cursor:'pointer', fontFamily:'inherit', transition:'all .2s'
            }}>{t}</button>
          ))}
        </div>
      </div>

      {sel ? (
        /* 케이스 상세 */
        <div style={{ animation:'fadeUp .3s ease' }}>
          <button onClick={() => setSel(null)} style={{
            display:'flex', alignItems:'center', gap:8, background:'none', border:'none',
            color:'#6B6560', fontSize:13, cursor:'pointer', fontFamily:'inherit', marginBottom:24
          }}>← 목록으로</button>
          <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:40 }}>
            <div style={{
              background:'linear-gradient(135deg, rgba(196,149,106,.1), rgba(139,115,85,.05))',
              border:'1px solid rgba(26,26,26,.08)', padding:40, display:'flex', flexDirection:'column', justifyContent:'flex-end', minHeight:280
            }}>
              <div style={{ fontSize:11, color:'#C4956A', fontWeight:700, letterSpacing:'0.15em', textTransform:'uppercase', marginBottom:8 }}>{sel.type} · {sel.year}</div>
              <h3 style={{ fontSize:26, fontWeight:900, letterSpacing:'-0.03em' }}>{sel.title}</h3>
            </div>
            <div>
              <div style={{ fontSize:12, color:'#6B6560', marginBottom:4 }}>클라이언트</div>
              <div style={{ fontSize:16, fontWeight:700, marginBottom:24 }}>{sel.client}</div>
              <p style={{ fontSize:15, color:'#6B6560', lineHeight:1.8, marginBottom:24 }}>{sel.desc}</p>
              <div style={{ display:'flex', gap:8, flexWrap:'wrap', marginBottom:32 }}>
                {sel.tags.map(t => (
                  <span key={t} style={{ padding:'5px 12px', border:'1px solid rgba(26,26,26,.15)', fontSize:12, color:'#1A1A1A', fontWeight:500 }}>{t}</span>
                ))}
              </div>
              <button style={{
                padding:'12px 28px', background:'#1A1A1A', color:'#F8F5F0',
                border:'none', fontSize:13, fontWeight:700, cursor:'pointer', fontFamily:'inherit'
              }}>케이스 스터디 전문 →</button>
            </div>
          </div>
        </div>
      ) : (
        /* 케이스 그리드 */
        <div style={{ display:'grid', gridTemplateColumns:'repeat(3, 1fr)', gap:1, background:'rgba(26,26,26,.08)' }}>
          {filtered.map((c, i) => (
            <div key={c.id}
              onClick={() => setSel(c)}
              style={{
                background:'#F8F5F0', padding:28, cursor:'pointer', transition:'all .25s',
                animation:`fadeUp .3s ease ${i*0.05}s both`
              }}
              onMouseEnter={e => e.currentTarget.style.background='#FFFFFF'}
              onMouseLeave={e => e.currentTarget.style.background='#F8F5F0'}
            >
              <div style={{ display:'flex', justifyContent:'space-between', marginBottom:16 }}>
                <span style={{ fontSize:11, color:'#C4956A', fontWeight:700, letterSpacing:'0.12em', textTransform:'uppercase' }}>{c.type}</span>
                <span style={{ fontSize:11, color:'#6B6560' }}>{c.year}</span>
              </div>
              <div style={{ width:40, height:2, background:c.color, marginBottom:16 }} />
              <h3 style={{ fontSize:16, fontWeight:800, marginBottom:8, lineHeight:1.3, letterSpacing:'-0.01em' }}>{c.title}</h3>
              <div style={{ fontSize:12, color:'#6B6560', marginBottom:16 }}>{c.client}</div>
              <div style={{ display:'flex', gap:6, flexWrap:'wrap' }}>
                {c.tags.slice(0,2).map(t => (
                  <span key={t} style={{ padding:'3px 8px', background:'rgba(26,26,26,.06)', fontSize:11, color:'#6B6560' }}>{t}</span>
                ))}
              </div>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

function GlobalSection() {
  const [lang, setLang] = useState('ko');
  const [fading, setFading] = useState(false);
  const c = LANGS[lang];

  const changeLang = (l) => {
    setFading(true);
    setTimeout(() => { setLang(l); setFading(false); }, 300);
  };

  return (
    <div style={{ height:'100%', overflowY:'auto', padding:'40px 0' }}>
      <div style={{ padding:'0 40px 0 8px', marginBottom:32 }}>
        <div style={{ fontSize:11, color:'#C4956A', fontWeight:700, letterSpacing:'0.2em', textTransform:'uppercase', marginBottom:8 }}>Global · 다국어 지원</div>
        <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between' }}>
          <h2 style={{ fontSize:34, fontWeight:900, letterSpacing:'-0.03em' }}>i18next 다국어 지원<br/>구현 데모</h2>
          {/* 언어 전환 */}
          <div style={{ display:'flex', gap:8 }}>
            {[['ko','한국어'],['en','English'],['ja','日本語']].map(([l,label]) => (
              <button key={l} onClick={() => changeLang(l)} style={{
                padding:'8px 18px', border:`1px solid ${lang===l ? '#1A1A1A' : 'rgba(26,26,26,.2)'}`,
                background: lang===l ? '#1A1A1A' : 'transparent',
                color: lang===l ? '#F8F5F0' : '#6B6560', fontSize:12, fontWeight: lang===l ? 700 : 400,
                cursor:'pointer', fontFamily:'inherit', transition:'all .2s'
              }}>{label}</button>
            ))}
          </div>
        </div>
      </div>

      {/* 다국어 데모 박스 */}
      <div style={{ margin:'0 40px 0 0', padding:48, background:'#FFFFFF', border:'1px solid rgba(26,26,26,.08)', marginBottom:32 }}>
        <div style={{ fontSize:11, color:'#C4956A', fontWeight:700, letterSpacing:'0.2em', textTransform:'uppercase', marginBottom:20 }}>{c.tag}</div>
        <div style={{
          opacity: fading ? 0 : 1, transform: fading ? 'translateY(8px)' : 'translateY(0)',
          transition:'all .3s ease'
        }}>
          <h2 style={{ fontSize:44, fontWeight:900, lineHeight:1.15, letterSpacing:'-0.04em', marginBottom:24, whiteSpace:'pre-line' }}>{c.headline}</h2>
          <p style={{ fontSize:16, color:'#6B6560', lineHeight:1.8, maxWidth:500, marginBottom:32 }}>{c.sub}</p>
          <button style={{
            padding:'12px 32px', background:'#1A1A1A', color:'#F8F5F0',
            border:'none', fontSize:14, fontWeight:700, cursor:'pointer', fontFamily:'inherit'
          }}>{c.cta}</button>
        </div>
      </div>

      {/* 기술 설명 */}
      <div style={{ margin:'0 40px 0 0', padding:24, background:'rgba(196,149,106,.08)', border:'1px solid rgba(196,149,106,.2)' }}>
        <div style={{ fontSize:12, color:'#C4956A', fontWeight:700, marginBottom:8 }}>구현 방식 — i18next + react-i18next</div>
        <div style={{ fontSize:13, color:'#6B6560', lineHeight:1.7 }}>
          언어별 JSON 리소스를 lazy import로 분리하고, 전환 시 GSAP fade 시퀀스(fadeOut → 언어 교체 → fadeIn)를 적용합니다.
          localStorage에 언어 설정을 유지하고, Accept-Language 헤더로 초기값을 자동 감지하는 구조를 구현합니다.
        </div>
      </div>
    </div>
  );
}

function AboutSection() {
  const [selOffice, setSelOffice] = useState(0);
  const office = OFFICES[selOffice];

  return (
    <div style={{ height:'100%', overflowY:'auto', padding:'40px 0' }}>
      <div style={{ padding:'0 40px 0 8px', marginBottom:28 }}>
        <div style={{ fontSize:11, color:'#C4956A', fontWeight:700, letterSpacing:'0.2em', textTransform:'uppercase', marginBottom:8 }}>About</div>
        <h2 style={{ fontSize:34, fontWeight:900, letterSpacing:'-0.03em' }}>글로벌 팀, 로컬 인사이트</h2>
        <p style={{ fontSize:14, color:'#6B6560', marginTop:8, lineHeight:1.7 }}>SVG 인터랙티브 세계지도로 팀 거점을 표시합니다 — 핀을 클릭하면 오피스 정보를 확인하세요.</p>

          {/* 그리드 */}
          {[...Array(9)].map((_,i) => (
            <line key={`v${i}`} x1={i*100} y1="0" x2={i*100} y2="400" stroke="rgba(26,26,26,.05)" strokeWidth="1" />
          ))}
          {[...Array(5)].map((_,i) => (
            <line key={`h${i}`} x1="0" y1={i*100} x2="800" y2={i*100} stroke="rgba(26,26,26,.05)" strokeWidth="1" />
          ))}
          {/* 대륙 실루엣 (단순화) */}
          <ellipse cx="220" cy="200" rx="140" ry="100" fill="rgba(196,149,106,.12)" />
          <ellipse cx="440" cy="170" rx="100" ry="80" fill="rgba(196,149,106,.12)" />
          <ellipse cx="620" cy="210" rx="120" ry="90" fill="rgba(196,149,106,.12)" />

          {/* 연결선 */}
          {OFFICES.map((o, i) => i < OFFICES.length-1 && (
            <line key={`line${i}`} x1={OFFICES[i].cx} y1={OFFICES[i].cy} x2={OFFICES[i+1].cx} y2={OFFICES[i+1].cy}
              stroke="rgba(196,149,106,.25)" strokeWidth="1" strokeDasharray="4,4" />
          ))}

          {/* 오피스 핀 */}
          {OFFICES.map((o, i) => (
            <g key={o.city} style={{ cursor:'pointer' }} onClick={() => setSelOffice(i)}>
              <circle cx={o.cx} cy={o.cy} r={selOffice===i ? 14 : 10}
                fill={selOffice===i ? '#C4956A' : '#1A1A1A'}
                opacity={selOffice===i ? 1 : 0.5}
                style={{ transition:'all .3s' }}
              />
              <circle cx={o.cx} cy={o.cy} r={selOffice===i ? 20 : 0}
                fill="none" stroke="#C4956A" strokeWidth="1.5" opacity={selOffice===i ? 0.5 : 0}
                style={{ transition:'all .3s' }}
              />
              <text x={o.cx} y={o.cy-18} textAnchor="middle" fontSize="10"
                fill={selOffice===i ? '#C4956A' : '#6B6560'} fontFamily="Pretendard" fontWeight="600"
                style={{ transition:'all .3s' }}
              >{o.city}</text>
            </g>
          ))}
        </svg>

        {/* 오피스 정보 패널 */}
        <div style={{ borderTop:'1px solid rgba(26,26,26,.08)', padding:'16px 24px', display:'flex', alignItems:'center', gap:24 }} key={selOffice}>
          <div style={{ fontSize:28 }}>{office.flag}</div>
          <div>
            <div style={{ fontSize:15, fontWeight:800 }}>{office.city}, {office.country}</div>
            <div style={{ fontSize:12, color:'#C4956A', fontWeight:600 }}>{office.role}</div>
          </div>
          <div style={{ marginLeft:'auto', display:'flex', gap:24 }}>
            <div style={{ textAlign:'center' }}>
              <div style={{ fontSize:20, fontWeight:900 }}>{office.team}</div>
              <div style={{ fontSize:11, color:'#6B6560' }}>팀원 수</div>
            </div>
          </div>
        </div>
      </div>

      {/* 팀 가치 */}
      <div style={{ margin:'0 40px 0 0', display:'grid', gridTemplateColumns:'repeat(3,1fr)', gap:1, background:'rgba(26,26,26,.08)' }}>
        {[
          { icon:'🌍', title:'Global Mindset', desc:'5개국 오피스, 18개 국적의 팀원이 함께 작업합니다.' },
          { icon:'✨', title:'Creative First', desc:'기술보다 아이디어를 먼저 생각합니다. 형식보다 임팩트를 중시합니다.' },
          { icon:'🤝', title:'Partner-Centric', desc:'클라이언트를 파트너로 대합니다. 프로젝트 이후에도 관계를 이어갑니다.' },
        ].map(v => (
          <div key={v.title} style={{ background:'#F8F5F0', padding:24 }}>
            <div style={{ fontSize:24, marginBottom:12 }}>{v.icon}</div>
            <div style={{ fontSize:14, fontWeight:800, marginBottom:8 }}>{v.title}</div>
            <div style={{ fontSize:13, color:'#6B6560', lineHeight:1.7 }}>{v.desc}</div>
          </div>
        ))}
      </div>
    </div>
  );
}

function ContactSection() {
  const [step, setStep] = useState(0);
  const [data, setData] = useState({ type:[], budget:'', name:'', email:'', message:'' });
  const [done, setDone] = useState(false);

  const types = ['브랜드 아이덴티티','인터랙티브 웹','영상 제작','앱/UI 디자인','통합 캠페인','기타'];
  const budgets = ['~3,000만원','3,000~8,000만원','8,000만원~1억','1억 이상','협의'];

  const steps = ['프로젝트 유형', '예산 범위', '기본 정보'];

  if (done) return (
    <div style={{ height:'100%', display:'flex', alignItems:'center', justifyContent:'center', flexDirection:'column' }}>
      <div style={{ fontSize:48, marginBottom:16 }}>✉️</div>
      <div style={{ fontSize:24, fontWeight:900, letterSpacing:'-0.03em', marginBottom:8 }}>문의가 접수되었습니다</div>
      <div style={{ fontSize:15, color:'#6B6560' }}>영업일 1일 내 담당자가 연락드립니다.</div>
    </div>
  );

  return (
    <div style={{ height:'100%', overflowY:'auto', padding:'40px 0' }}>
      <div style={{ padding:'0 40px 0 8px', marginBottom:40 }}>
        <div style={{ fontSize:11, color:'#C4956A', fontWeight:700, letterSpacing:'0.2em', textTransform:'uppercase', marginBottom:8 }}>Contact</div>
        <h2 style={{ fontSize:34, fontWeight:900, letterSpacing:'-0.03em' }}>프로젝트를 함께<br/>만들어갈 준비가 되셨나요?</h2>
      </div>

      {/* 스텝 인디케이터 */}
      <div style={{ margin:'0 40px 32px 0', display:'flex', gap:0 }}>
        {steps.map((s, i) => (
          <div key={i} style={{ flex:1, display:'flex', alignItems:'center' }}>
            <div style={{
              width:28, height:28, borderRadius:'50%', flexShrink:0,
              background: step>i ? '#1A1A1A' : step===i ? '#C4956A' : 'rgba(26,26,26,.12)',
              color: step>i || step===i ? '#F8F5F0' : '#6B6560',
              display:'flex', alignItems:'center', justifyContent:'center', fontSize:12, fontWeight:700
            }}>{step>i ? '✓' : i+1}</div>
            <div style={{ flex:1, height:1, background: step>i ? '#1A1A1A' : 'rgba(26,26,26,.12)', display: i<steps.length-1 ? 'block' : 'none' }} />
          </div>
        ))}
      </div>
      <div style={{ margin:'0 40px 24px 0', fontSize:12, color:'#6B6560' }}>{steps[step]}</div>

      {/* 스텝 내용 */}
      <div style={{ margin:'0 40px 0 0' }}>
        {step===0 && (
          <div style={{ animation:'fadeUp .3s ease' }}>
            <div style={{ display:'grid', gridTemplateColumns:'repeat(3,1fr)', gap:8, marginBottom:28 }}>
              {types.map(t => (
                <div key={t}
                  onClick={() => setData(d => ({
                    ...d, type: d.type.includes(t) ? d.type.filter(x=>x!==t) : [...d.type, t]
                  }))}
                  style={{
                    padding:'16px 20px', border:`1px solid ${data.type.includes(t) ? '#1A1A1A' : 'rgba(26,26,26,.15)'}`,
                    background: data.type.includes(t) ? '#1A1A1A' : 'transparent',
                    color: data.type.includes(t) ? '#F8F5F0' : '#1A1A1A',
                    cursor:'pointer', fontSize:13, fontWeight: data.type.includes(t) ? 700 : 400,
                    transition:'all .2s', textAlign:'center'
                  }}
                >{t}</div>
              ))}
            </div>
            <button onClick={() => setStep(1)} disabled={data.type.length===0} style={{
              padding:'12px 32px', background: data.type.length>0 ? '#1A1A1A' : 'rgba(26,26,26,.2)',
              color:'#F8F5F0', border:'none', fontSize:13, fontWeight:700, cursor: data.type.length>0 ? 'pointer' : 'default', fontFamily:'inherit'
            }}>다음 →</button>
          </div>
        )}
        {step===1 && (
          <div style={{ animation:'fadeUp .3s ease' }}>
            <div style={{ display:'flex', flexDirection:'column', gap:8, marginBottom:28 }}>
              {budgets.map(b => (
                <div key={b}
                  onClick={() => setData(d => ({...d, budget:b}))}
                  style={{
                    padding:'16px 24px', border:`1px solid ${data.budget===b ? '#1A1A1A' : 'rgba(26,26,26,.15)'}`,
                    background: data.budget===b ? '#1A1A1A' : 'transparent',
                    color: data.budget===b ? '#F8F5F0' : '#1A1A1A',
                    cursor:'pointer', fontSize:14, fontWeight: data.budget===b ? 700 : 400, transition:'all .2s'
                  }}
                >{b}</div>
              ))}
            </div>
            <div style={{ display:'flex', gap:12 }}>
              <button onClick={() => setStep(0)} style={{ padding:'12px 24px', background:'transparent', border:'1px solid rgba(26,26,26,.2)', color:'#6B6560', fontSize:13, cursor:'pointer', fontFamily:'inherit' }}>← 이전</button>
              <button onClick={() => setStep(2)} disabled={!data.budget} style={{ padding:'12px 32px', background: data.budget ? '#1A1A1A' : 'rgba(26,26,26,.2)', color:'#F8F5F0', border:'none', fontSize:13, fontWeight:700, cursor: data.budget ? 'pointer' : 'default', fontFamily:'inherit' }}>다음 →</button>
            </div>
          </div>
        )}
        {step===2 && (
          <div style={{ animation:'fadeUp .3s ease' }}>
            <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:16, marginBottom:16 }}>
              {[['name','성함','홍길동','text'],['email','이메일','hello@company.com','email']].map(([k,l,p,t]) => (
                <div key={k}>
                  <label style={{ display:'block', fontSize:12, color:'#6B6560', marginBottom:8 }}>{l}</label>
                  <input type={t} value={data[k]} placeholder={p}
                    onChange={e => setData(d => ({...d,[k]:e.target.value}))}
                    style={{ width:'100%', padding:'12px 16px', border:'1px solid rgba(26,26,26,.2)', background:'#fff', fontSize:14, fontFamily:'inherit', outline:'none' }}
                    onFocus={e => e.target.style.borderColor='#1A1A1A'}
                    onBlur={e => e.target.style.borderColor='rgba(26,26,26,.2)'}
                  />
                </div>
              ))}
            </div>
            <div style={{ marginBottom:24 }}>
              <label style={{ display:'block', fontSize:12, color:'#6B6560', marginBottom:8 }}>프로젝트 내용</label>
              <textarea rows={4} value={data.message} placeholder="프로젝트에 대해 알려주세요..."
                onChange={e => setData(d => ({...d, message:e.target.value}))}
                style={{ width:'100%', padding:'12px 16px', border:'1px solid rgba(26,26,26,.2)', background:'#fff', fontSize:14, fontFamily:'inherit', outline:'none', resize:'none' }}
                onFocus={e => e.target.style.borderColor='#1A1A1A'}
                onBlur={e => e.target.style.borderColor='rgba(26,26,26,.2)'}
              />
            </div>
            <div style={{ display:'flex', gap:12 }}>
              <button onClick={() => setStep(1)} style={{ padding:'12px 24px', background:'transparent', border:'1px solid rgba(26,26,26,.2)', color:'#6B6560', fontSize:13, cursor:'pointer', fontFamily:'inherit' }}>← 이전</button>
              <button onClick={() => setDone(true)} style={{ padding:'12px 32px', background:'#1A1A1A', color:'#F8F5F0', border:'none', fontSize:13, fontWeight:700, cursor:'pointer', fontFamily:'inherit' }}>문의 보내기</button>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

/* ── 메인 앱 ── */
function App() {
  const [activeNav, setActiveNav] = useState('홈');
  const navItems = [
    { label:'홈', icon:'⊙' },
    { label:'케이스 스터디', icon:'◫' },
    { label:'글로벌', icon:'◌' },
    { label:'어바웃', icon:'◎' },
    { label:'컨택', icon:'◉' },
  ];
  const SECTIONS = { '홈':<HomeSection/>, '케이스 스터디':<CaseStudiesSection/>, '글로벌':<GlobalSection/>, '어바웃':<AboutSection/>, '컨택':<ContactSection/> };

  return (
    <div style={{ display:'flex', width:'100%', height:'100vh', overflow:'hidden' }}>
      {/* 밝은 사이드바 */}
      <aside style={{
        width:240, minWidth:240, height:'100vh',
        background:'#FFFFFF', borderRight:'1px solid rgba(26,26,26,.08)',
        display:'flex', flexDirection:'column', zIndex:10
      }}>
        {/* 로고 */}
        <div style={{ padding:'28px 24px', borderBottom:'1px solid rgba(26,26,26,.06)' }}>
          <div style={{ display:'flex', alignItems:'center', gap:12 }}>
            <div style={{
              width:36, height:36, background:'#1A1A1A',
              display:'flex', alignItems:'center', justifyContent:'center', fontSize:16, color:'#C4956A'
            }}>L</div>
            <div>
              <div style={{ fontSize:16, fontWeight:900, letterSpacing:'-0.03em' }}>Luminary</div>
              <div style={{ fontSize:10, color:'#C4956A', fontWeight:600, letterSpacing:'0.1em' }}>AGENCY</div>
            </div>
          </div>
        </div>

        {/* 네비게이션 */}
        <nav style={{ flex:1, padding:'20px 0' }}>
          {navItems.map(item => (
            <button key={item.label}
              onClick={() => setActiveNav(item.label)}
              title={item.label}
              style={{
                width:'100%', display:'flex', alignItems:'center', gap:12,
                padding:'11px 24px', border:'none', cursor:'pointer', fontFamily:'inherit',
                background: activeNav===item.label ? 'rgba(26,26,26,.05)' : 'transparent',
                color: activeNav===item.label ? '#1A1A1A' : '#6B6560',
                fontSize:13, fontWeight: activeNav===item.label ? 700 : 400,
                textAlign:'left', transition:'all .2s',
                borderLeft: activeNav===item.label ? '2px solid #C4956A' : '2px solid transparent',
              }}
              onMouseEnter={e => { if(activeNav!==item.label) e.currentTarget.style.background='rgba(26,26,26,.03)'; }}
              onMouseLeave={e => { if(activeNav!==item.label) e.currentTarget.style.background='transparent'; }}
            >
              <span style={{ fontSize:14, opacity:.6 }}>{item.icon}</span>
              <span style={{ fontSize:13 }}>{item.label}</span>
            </button>
          ))}
        </nav>

        {/* 구현 배지 */}
        <div style={{ padding:'20px 24px', borderTop:'1px solid rgba(26,26,26,.06)' }}>
          <div style={{ padding:'12px 14px', background:'rgba(196,149,106,.08)', border:'1px solid rgba(196,149,106,.2)' }}>
            <div style={{ fontSize:11, color:'#C4956A', fontWeight:700, marginBottom:4 }}>확장 데모</div>
            <div style={{ fontSize:11, color:'#6B6560', lineHeight:1.5 }}>MVP 이후 확장 방향 — 다국어·케이스 스터디·다단계 폼 추가</div>
          </div>
        </div>
      </aside>

      {/* 탑바 */}
      <div style={{ flex:1, display:'flex', flexDirection:'column', height:'100vh', overflow:'hidden' }}>
        <header style={{
          height:52, background:'rgba(248,245,240,.95)', backdropFilter:'blur(8px)',
          borderBottom:'1px solid rgba(26,26,26,.08)',
          display:'flex', alignItems:'center', justifyContent:'space-between',
          padding:'0 40px', flexShrink:0
        }}>
          <div style={{ display:'flex', alignItems:'center', gap:8 }}>
            <span style={{ fontSize:12, color:'#6B6560' }}>Luminary</span>
            <span style={{ color:'rgba(26,26,26,.2)' }}>/</span>
            <span style={{ fontSize:12, fontWeight:700, color:'#1A1A1A' }}>{activeNav}</span>
          </div>
          <div style={{ display:'flex', gap:24, alignItems:'center' }}>
            <div style={{ fontSize:11, color:'#6B6560', letterSpacing:'0.05em' }}>Seoul · New York · London · Tokyo · Singapore</div>
            <button style={{
              padding:'6px 18px', background:'#1A1A1A', color:'#F8F5F0',
              border:'none', fontSize:11, fontWeight:700, cursor:'pointer', fontFamily:'inherit', letterSpacing:'0.05em'
            }}>문의하기</button>
          </div>
        </header>

        <main style={{ flex:1, overflow:'hidden', padding:'0 0 0 40px' }}>
          {SECTIONS[activeNav]}
        </main>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
