  @keyframes slideInRight { from { opacity: 0; transform: translateX(30px) } to { opacity: 1; transform: translateX(0) } }
  @keyframes slideUp { from { opacity: 0; transform: translateY(20px) } to { opacity: 1; transform: translateY(0) } }

// Skeleton loader
function SkeletonBox({ h = 80, w = '100%' }) {
  return (
    <div style={{
      height: h, width: w, borderRadius: 12,
      background: 'linear-gradient(90deg, #1E293B 25%, #263348 50%, #1E293B 75%)',
      backgroundSize: '200% 100%', animation: 'shimmer 1.5s infinite',

}

    </div>
  );
}

// CountUp
function CountUp({ end, duration = 1000, suffix = '' }) {
  const [val, setVal] = React.useState(0);
  React.useEffect(() => {
    let start = 0; const step = end / (duration / 16);
    const timer = setInterval(() => {
      start += step;
      if (start >= end) { setVal(end); clearInterval(timer); }
      else setVal(Math.floor(start));
    }, 16);
    return () => clearInterval(timer);
  }, [end]);
  return <span style={{ animation: 'countUp 400ms ease' }}>{val.toLocaleString()}{suffix}</span>;
}

// Toast
function Toast({ message, onClose }) {
  React.useEffect(() => { const t = setTimeout(onClose, 3000); return () => clearTimeout(t); }, []);
  return (
    <div style={{
      position: 'fixed', bottom: 24, right: 24, zIndex: 9999,
      background: C.surface, color: C.text, padding: '12px 20px',
      borderRadius: 10, animation: 'slideUp 300ms ease',
      boxShadow: '0 4px 20px rgba(0,0,0,0.4)', border: `1px solid ${C.border}`,
      display: 'flex', alignItems: 'center', gap: 10, fontSize: 14,
    }}>
      <span style={{ fontSize: 18 }}>✅</span> {message}
    </div>
  );
}

// Modal (flexbox centered)

      <div onClick={onClose} style={{ position: 'absolute', inset: 0, background: 'rgba(0,0,0,0.6)', animation: 'fadeIn 200ms ease' }} />
      <div style={{
        position: 'relative', width, maxHeight: '85vh',

        animation: 'fadeInScale 200ms ease', display: 'flex', flexDirection: 'column',
        boxShadow: '0 20px 60px rgba(0,0,0,0.5)', border: `1px solid ${C.border}`,

        </div>

          padding: '10px 14px', color: C.text, fontSize: 14, outline: 'none',

function FormSelect({ label, value, onChange, options }) {

// ─── Page: 실시간 음성 채팅 ───
function PageVoiceChat({ onToast }) {
  const [participants, setParticipants] = React.useState(VOICE_PARTICIPANTS);
  const [selfMuted, setSelfMuted] = React.useState(false);
  const [volume, setVolume] = React.useState(80);
  const [connected, setConnected] = React.useState(true);
  const [selectedUser, setSelectedUser] = React.useState(null);

  const toggleMute = (id) => {
    setParticipants(prev => prev.map(p => p.id === id ? { ...p, muted: !p.muted } : p));
    if (id === 1) { setSelfMuted(v => !v); }
  };

  const disconnect = () => { setConnected(false); onToast('음성 채팅 연결이 해제되었습니다'); };
  const reconnect = () => { setConnected(true); onToast('음성 채팅에 재연결되었습니다'); };

  return (
    <div style={{ display: 'flex', flexDirection: 'column', gap: 20, animation: 'fadeIn 300ms ease' }}>
      {/* 상단: 방 정보 + 연결 상태 */}
      <div style={{ background: C.surface, borderRadius: 14, padding: 20, border: `1px solid ${C.border}`, display: 'flex', alignItems: 'center', gap: 16 }}>
        <div style={{ width: 48, height: 48, borderRadius: 14, background: C.primaryDim, display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 26 }}>🎙️</div>
        <div style={{ flex: 1 }}>
          <div style={{ fontSize: 18, fontWeight: 700, color: C.text }}>코딩 스터디방</div>
          <div style={{ display: 'flex', alignItems: 'center', gap: 12, marginTop: 4, fontSize: 13, color: C.textSub }}>
            <span>👥 {participants.length}명 참여 중</span>
            <span style={{ opacity: 0.4 }}>|</span>
            <span>🔒 친구 전용</span>
          </div>
        </div>
        <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
          <div style={{
            padding: '6px 14px', borderRadius: 20, fontSize: 12, fontWeight: 700,
            background: connected ? C.accentDim : 'rgba(239,68,68,0.12)',
            color: connected ? C.accent : C.danger,
            display: 'flex', alignItems: 'center', gap: 6,
          }}>
            <span style={{ animation: connected ? 'pulse 2s infinite' : 'none' }}>●</span>
            {connected ? 'WebRTC 연결됨' : '연결 끊김'}
          </div>
          {connected
            ? <button onClick={disconnect} style={{ background: 'rgba(239,68,68,0.12)', border: `1px solid ${C.danger}`, color: C.danger, borderRadius: 8, padding: '8px 16px', fontSize: 13, cursor: 'pointer', fontFamily: 'inherit' }}>🔌 연결 해제</button>
            : <button onClick={reconnect} style={{ background: C.primaryDim, border: `1px solid ${C.primary}`, color: C.primaryLight, borderRadius: 8, padding: '8px 16px', fontSize: 13, cursor: 'pointer', fontFamily: 'inherit' }}>🔄 재연결</button>
          }
        </div>
      </div>

      {/* 참여자 그리드 */}
      <div style={{ display: 'grid', gridTemplateColumns: 'repeat(3,1fr)', gap: 16 }}>
        {participants.map((p, i) => (
          <div key={p.id}
            onClick={() => setSelectedUser(p)}
            style={{
              background: C.surface, borderRadius: 16, padding: 24, border: `1px solid ${p.speaking && !p.muted ? C.primary : C.border}`,
              display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 14,
              cursor: 'pointer', transition: 'all 200ms ease',
              boxShadow: p.speaking && !p.muted ? `0 0 0 2px ${C.primaryDim}, 0 4px 20px rgba(59,130,246,0.15)` : 'none',
              animation: `slideUp 400ms ease ${i * 100}ms both`,
            }}
            onMouseEnter={e => { e.currentTarget.style.transform = 'translateY(-2px)'; e.currentTarget.style.boxShadow = `0 4px 16px rgba(0,0,0,0.3)`; }}
            onMouseLeave={e => {
              e.currentTarget.style.transform = 'translateY(0)';
              e.currentTarget.style.boxShadow = p.speaking && !p.muted ? `0 0 0 2px ${C.primaryDim}, 0 4px 20px rgba(59,130,246,0.15)` : 'none';
            }}>
            {/* 아바타 */}
            <div style={{
              width: 72, height: 72, borderRadius: '50%', background: C.bg,
              display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 36,
              border: `3px solid ${p.speaking && !p.muted ? C.primary : C.border}`,
              animation: p.speaking && !p.muted ? 'voicePulse 1.5s ease-in-out infinite' : 'none',
              position: 'relative',
            }}>
              {p.avatar}
              {p.muted && (
                <div style={{ position: 'absolute', bottom: 0, right: 0, width: 24, height: 24, borderRadius: '50%', background: C.danger, display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 12, border: `2px solid ${C.surface}` }}>🔇</div>
              )}
            </div>
            <div style={{ fontSize: 15, fontWeight: 700, color: C.text }}>{p.name}</div>

            {/* 오디오 파형 */}
            <div style={{ display: 'flex', gap: 3, alignItems: 'center', height: 24 }}>
              {[...Array(7)].map((_, j) => (
                <div key={j} style={{
                  width: 4, borderRadius: 2,
                  background: p.speaking && !p.muted ? C.primary : C.textMuted,
                  height: p.speaking && !p.muted ? undefined : 4,
                  animation: p.speaking && !p.muted ? `waveAnim ${0.6 + j * 0.08}s ease-in-out ${j * 0.1}s infinite alternate` : 'none',
                }} />
              ))}
            </div>

            {/* 컨트롤 */}
            <div style={{ display: 'flex', gap: 8 }}>
              {p.id === 1 ? (
                <button
                  onClick={e => { e.stopPropagation(); toggleMute(p.id); }}
                  style={{
                    background: p.muted ? 'rgba(239,68,68,0.12)' : C.primaryDim,
                    border: `1px solid ${p.muted ? C.danger : C.primary}`,
                    color: p.muted ? C.danger : C.primaryLight,
                    borderRadius: 8, padding: '6px 14px', fontSize: 13, cursor: 'pointer', fontFamily: 'inherit',
                  }}>
                  {p.muted ? '🔇 음소거' : '🎤 마이크'}
                </button>
              ) : (
                <button
                  onClick={e => { e.stopPropagation(); setSelectedUser(p); }}
                  style={{
                    background: C.bg, border: `1px solid ${C.border}`, color: C.textSub,
                    borderRadius: 8, padding: '6px 14px', fontSize: 13, cursor: 'pointer', fontFamily: 'inherit',
                  }}>
                  볼륨 조절
                </button>
              )}
            </div>
          </div>
        ))}
      </div>

      {/* 내 음성 컨트롤 패널 */}
      <div style={{ background: C.surface, borderRadius: 14, padding: 20, border: `1px solid ${C.border}`, animation: 'slideUp 400ms ease 300ms both' }}>
        <div style={{ fontSize: 14, fontWeight: 700, color: C.text, marginBottom: 16 }}>🎛️ 내 음성 설정</div>
        <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr 1fr', gap: 20 }}>
          {/* 마이크 토글 */}
          <div style={{ display: 'flex', flexDirection: 'column', gap: 10 }}>
            <div style={{ fontSize: 12, color: C.textSub, fontWeight: 600 }}>마이크</div>
            <button
              onClick={() => { toggleMute(1); onToast(selfMuted ? '마이크가 켜졌습니다' : '마이크가 음소거되었습니다'); }}
              style={{
                background: selfMuted ? 'rgba(239,68,68,0.12)' : C.primaryDim,
                border: `1px solid ${selfMuted ? C.danger : C.primary}`,
                color: selfMuted ? C.danger : C.primaryLight,
                borderRadius: 10, padding: '12px', fontSize: 24, cursor: 'pointer',
                transition: 'all 150ms', display: 'flex', alignItems: 'center', justifyContent: 'center',
              }}>
              {selfMuted ? '🔇' : '🎤'}
            </button>
            <div style={{ fontSize: 12, color: selfMuted ? C.danger : C.accent, textAlign: 'center', fontWeight: 600 }}>
              {selfMuted ? '음소거 중' : '마이크 켜짐'}
            </div>
          </div>

          {/* 볼륨 슬라이더 */}
          <div style={{ display: 'flex', flexDirection: 'column', gap: 10 }}>
            <div style={{ fontSize: 12, color: C.textSub, fontWeight: 600 }}>마스터 볼륨 ({volume}%)</div>
            <div style={{ display: 'flex', alignItems: 'center', gap: 10, padding: '12px 0' }}>
              <span style={{ fontSize: 18 }}>🔈</span>
              <input
                type="range" min={0} max={100} value={volume}
                onChange={e => setVolume(Number(e.target.value))}
                style={{ flex: 1, accentColor: C.primary, cursor: 'pointer' }}
              />
              <span style={{ fontSize: 18 }}>🔊</span>
            </div>
            <div style={{ height: 4, background: C.bg, borderRadius: 2, overflow: 'hidden' }}>
              <div style={{ height: '100%', width: `${volume}%`, background: `linear-gradient(90deg, ${C.primary}, ${C.primaryLight})`, borderRadius: 2, transition: 'width 150ms' }} />
            </div>
          </div>

          {/* 연결 품질 */}
          <div style={{ display: 'flex', flexDirection: 'column', gap: 10 }}>
            <div style={{ fontSize: 12, color: C.textSub, fontWeight: 600 }}>연결 품질</div>
            <div style={{ background: C.bg, borderRadius: 10, padding: 12, border: `1px solid ${C.border}`, flex: 1 }}>
              <div style={{ display: 'flex', justify: 'space-between', gap: 8, flexDirection: 'column' }}>
                {[{ label: '레이턴시', value: '34ms', ok: true }, { label: '패킷 손실', value: '0.2%', ok: true }, { label: '코덱', value: 'Opus', ok: true }].map(r => (
                  <div key={r.label} style={{ display: 'flex', justifyContent: 'space-between', fontSize: 12 }}>
                    <span style={{ color: C.textSub }}>{r.label}</span>
                    <span style={{ color: r.ok ? C.accent : C.danger, fontWeight: 600 }}>{r.value}</span>
                  </div>
                ))}
              </div>
            </div>
          </div>
        </div>
      </div>

      {/* 참여자 상세 모달 */}
      {selectedUser && (
        <Modal title={`${selectedUser.name} 설정`} onClose={() => setSelectedUser(null)} width={420}>
          <div style={{ display: 'flex', flexDirection: 'column', gap: 16 }}>
            <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 10, padding: 16 }}>
              <div style={{ fontSize: 56 }}>{selectedUser.avatar}</div>
              <div style={{ fontSize: 18, fontWeight: 700, color: C.text }}>{selectedUser.name}</div>
              <StatusBadge status="online" />
            </div>
            <div style={{ display: 'flex', flexDirection: 'column', gap: 8 }}>
              <div style={{ fontSize: 12, color: C.textSub, fontWeight: 600 }}>개별 볼륨 ({selectedUser.volume}%)</div>
              <input type="range" min={0} max={100} defaultValue={selectedUser.volume} style={{ width: '100%', accentColor: C.primary }} />
            </div>
            <div style={{ display: 'flex', gap: 10, justifyContent: 'flex-end' }}>
              <button onClick={() => { setSelectedUser(null); onToast(`${selectedUser.name}를 음소거했습니다`); }} style={{ background: 'rgba(239,68,68,0.12)', border: `1px solid ${C.danger}`, color: C.danger, borderRadius: 8, padding: '10px 16px', fontSize: 13, cursor: 'pointer', fontFamily: 'inherit' }}>🔇 음소거</button>
              <button onClick={() => setSelectedUser(null)} style={{ background: C.primary, border: 'none', color: '#fff', borderRadius: 8, padding: '10px 20px', fontSize: 13, fontWeight: 600, cursor: 'pointer', fontFamily: 'inherit' }}>적용</button>
            </div>
          </div>
        </Modal>
      )}
    </div>
  );
}

                  {f.badge && <span style={{ fontSize: 10, background: C.primaryDim, color: C.primaryLight, padding: '2px 6px', borderRadius: 10, fontWeight: 700 }}>{f.badge}</span>}
                </div>
                <div style={{ fontSize: 12, color: C.textSub }}>@{f.nickname}
                  {f.room && <span style={{ marginLeft: 8 }}>🎙️ {f.room}</span>}
                </div>
              </div>
              <StatusBadge status={f.status} />
            </div>
          ))}
          {filtered.length === 0 && (
            <div style={{ textAlign: 'center', padding: 40, color: C.textMuted, fontSize: 14 }}>검색 결과가 없습니다</div>
          )}
        </div>
      </div>

      {/* 친구 상세 모달 */}
      {selected && (
        <Modal title={selected.name} onClose={() => setSelected(null)} width={420}>
          <div style={{ display: 'flex', flexDirection: 'column', gap: 16 }}>
            <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 10, padding: 16 }}>
              <div style={{ fontSize: 56 }}>{selected.avatar}</div>
              <div style={{ fontSize: 18, fontWeight: 700, color: C.text }}>{selected.name}</div>
              <div style={{ fontSize: 13, color: C.textSub }}>@{selected.nickname}</div>
              <StatusBadge status={selected.status} />
            </div>
            {selected.room && (
              <div style={{ background: C.bg, borderRadius: 10, padding: 12, border: `1px solid ${C.border}`, display: 'flex', alignItems: 'center', gap: 10 }}>
                <span style={{ fontSize: 20 }}>🎙️</span>
                <div>
                  <div style={{ fontSize: 12, color: C.textSub }}>현재 음성 채팅방</div>
                  <div style={{ fontSize: 14, fontWeight: 600, color: C.text }}>{selected.room}</div>
                </div>
              </div>
            )}
            <div style={{ display: 'flex', gap: 10, justifyContent: 'flex-end' }}>
              <button onClick={() => { setSelected(null); onToast('친구를 삭제했습니다'); }} style={{ background: 'transparent', border: `1px solid ${C.border}`, color: C.textSub, borderRadius: 8, padding: '10px 16px', fontSize: 13, cursor: 'pointer', fontFamily: 'inherit' }}>삭제</button>
              {selected.room && <button onClick={() => { setSelected(null); onToast(`${selected.room}에 입장합니다`); }} style={{ background: C.primary, border: 'none', color: '#fff', borderRadius: 8, padding: '10px 20px', fontSize: 13, fontWeight: 600, cursor: 'pointer', fontFamily: 'inherit' }}>🎙️ 방 입장</button>}
            </div>
          </div>
        </Modal>
      )}

      {/* 친구 추가 모달 */}
      {showAdd && (
        <Modal title="친구 추가" onClose={() => setShowAdd(false)} width={420}>
          <div style={{ display: 'flex', flexDirection: 'column', gap: 16 }}>
            <FormInput label="닉네임으로 검색" placeholder="@닉네임 입력..." value={addNick} onChange={e => setAddNick(e.target.value)} />
            {addNick.length > 0 && (
              <div style={{ background: C.bg, borderRadius: 10, padding: 14, border: `1px solid ${C.border}` }}>
                <div style={{ display: 'flex', alignItems: 'center', gap: 12 }}>
                  <div style={{ width: 40, height: 40, borderRadius: '50%', background: C.surface2, display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 22 }}>🌟</div>
                  <div style={{ flex: 1 }}>
                    <div style={{ fontSize: 14, fontWeight: 600, color: C.text }}>검색 결과: @{addNick}</div>
                    <div style={{ fontSize: 12, color: C.textSub }}>공통 친구 0명</div>
                  </div>
                  <button onClick={() => { setShowAdd(false); onToast('친구 요청을 보냈습니다'); }} style={{ background: C.primaryDim, border: `1px solid ${C.primary}`, color: C.primaryLight, borderRadius: 6, padding: '6px 14px', fontSize: 13, cursor: 'pointer', fontFamily: 'inherit' }}>요청 보내기</button>
                </div>
              </div>
            )}
          </div>
        </Modal>
      )}
    </div>
  );
}

// ─── Page: 계정 및 프로필 ───
function PageProfile({ onToast }) {
  const [editMode, setEditMode] = React.useState(false);
  const [nickname, setNickname] = React.useState('김현우');
  const [bio, setBio] = React.useState('코딩과 음악을 좋아합니다 🎵');
  const [pwModal, setPwModal] = React.useState(false);

  return (
    <div style={{ display: 'flex', flexDirection: 'column', gap: 20, animation: 'fadeIn 300ms ease' }}>
      {/* 프로필 카드 */}
      <div style={{ background: C.surface, borderRadius: 14, padding: 28, border: `1px solid ${C.border}`, display: 'flex', gap: 28, alignItems: 'flex-start', animation: 'slideUp 400ms ease both' }}>
        <div style={{ position: 'relative', flexShrink: 0 }}>
          <div style={{ width: 88, height: 88, borderRadius: '50%', background: `linear-gradient(135deg, ${C.primary}, #8B5CF6)`, display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 44, border: `4px solid ${C.border}` }}>😊</div>
          <button onClick={() => onToast('프로필 이미지를 변경합니다')} style={{ position: 'absolute', bottom: 0, right: 0, width: 28, height: 28, borderRadius: '50%', background: C.primary, border: `2px solid ${C.surface}`, cursor: 'pointer', display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 14 }}>✏️</button>
        </div>
        <div style={{ flex: 1 }}>
          {editMode ? (
            <div style={{ display: 'flex', flexDirection: 'column', gap: 12 }}>
              <FormInput label="닉네임" value={nickname} onChange={e => setNickname(e.target.value)} placeholder="닉네임 입력" />
              <div style={{ display: 'flex', flexDirection: 'column', gap: 6 }}>
                <label style={{ fontSize: 13, color: C.textSub, fontWeight: 600 }}>한줄 소개</label>
                <textarea value={bio} onChange={e => setBio(e.target.value)} style={{ background: C.bg, border: `1px solid ${C.border}`, borderRadius: 8, padding: '10px 14px', color: C.text, fontSize: 14, outline: 'none', fontFamily: 'inherit', resize: 'none', height: 80 }} />
              </div>
              <div style={{ display: 'flex', gap: 10 }}>
                <button onClick={() => { setEditMode(false); onToast('프로필이 저장되었습니다'); }} style={{ background: C.primary, border: 'none', color: '#fff', borderRadius: 8, padding: '8px 20px', fontSize: 14, fontWeight: 600, cursor: 'pointer', fontFamily: 'inherit' }}>저장</button>
                <button onClick={() => setEditMode(false)} style={{ background: 'transparent', border: `1px solid ${C.border}`, color: C.textSub, borderRadius: 8, padding: '8px 16px', fontSize: 14, cursor: 'pointer', fontFamily: 'inherit' }}>취소</button>
              </div>
            </div>
          ) : (
            <div>
              <div style={{ display: 'flex', alignItems: 'center', gap: 12 }}>
                <div style={{ fontSize: 22, fontWeight: 700, color: C.text }}>{nickname}</div>
                <span style={{ background: C.primaryDim, color: C.primaryLight, fontSize: 11, padding: '3px 8px', borderRadius: 20, fontWeight: 700 }}>활성 계정</span>
              </div>
              <div style={{ fontSize: 13, color: C.textSub, marginTop: 4 }}>@{nickname.toLowerCase().replace(' ', '_')}</div>
              <div style={{ fontSize: 14, color: C.text, marginTop: 8 }}>{bio}</div>
              <button onClick={() => setEditMode(true)} style={{ marginTop: 12, background: C.primaryDim, border: `1px solid ${C.primary}`, color: C.primaryLight, borderRadius: 8, padding: '8px 16px', fontSize: 13, cursor: 'pointer', fontFamily: 'inherit' }}>✏️ 프로필 편집</button>
            </div>
          )}
        </div>
      </div>

      {/* 통계 */}
      <div style={{ display: 'grid', gridTemplateColumns: 'repeat(3,1fr)', gap: 16 }}>
        {[
          { label: '친구 수', value: 7, icon: '👥', color: C.primary },
          { label: '생성한 방', value: 2, icon: '🏠', color: '#8B5CF6' },
          { label: '총 통화 세션', value: 48, icon: '🎙️', color: C.accent },
        ].map((s, i) => (
          <div key={s.label} style={{ background: C.surface, borderRadius: 14, padding: 20, border: `1px solid ${C.border}`, animation: `slideUp 400ms ease ${i * 80}ms both` }}>
            <div style={{ fontSize: 24, marginBottom: 8 }}>{s.icon}</div>
            <div style={{ fontSize: 28, fontWeight: 800, color: s.color }}><CountUp end={s.value} /></div>
            <div style={{ fontSize: 13, color: C.textSub, marginTop: 4 }}>{s.label}</div>
          </div>
        ))}
      </div>

      {/* 보안 설정 */}
      <div style={{ background: C.surface, borderRadius: 14, padding: 20, border: `1px solid ${C.border}` }}>
        <div style={{ fontSize: 15, fontWeight: 700, color: C.text, marginBottom: 16 }}>🔒 보안 설정</div>
        <div style={{ display: 'flex', flexDirection: 'column', gap: 12 }}>
          {[
            { label: '이메일 주소', value: 'hyunwoo@ajit.app', action: '변경', onClick: () => onToast('이메일 변경 페이지로 이동합니다') },
            { label: '비밀번호', value: '마지막 변경: 30일 전', action: '변경', onClick: () => setPwModal(true) },
            { label: '로그인 기기 관리', value: '2개 기기 로그인 중', action: '확인', onClick: () => onToast('기기 관리 페이지를 엽니다') },
          ].map(item => (
            <div key={item.label} style={{ display: 'flex', alignItems: 'center', padding: '12px 14px', background: C.bg, borderRadius: 10, border: `1px solid ${C.border}` }}>
              <div style={{ flex: 1 }}>
                <div style={{ fontSize: 14, fontWeight: 600, color: C.text }}>{item.label}</div>
                <div style={{ fontSize: 12, color: C.textSub, marginTop: 2 }}>{item.value}</div>
              </div>
              <button onClick={item.onClick} style={{ background: 'transparent', border: `1px solid ${C.border}`, color: C.textSub, borderRadius: 6, padding: '6px 14px', fontSize: 13, cursor: 'pointer', fontFamily: 'inherit' }}>{item.action}</button>
            </div>
          ))}
        </div>
      </div>

      {pwModal && (
        <Modal title="비밀번호 변경" onClose={() => setPwModal(false)} width={440}>
          <div style={{ display: 'flex', flexDirection: 'column', gap: 14 }}>
            <FormInput label="현재 비밀번호" type="password" placeholder="현재 비밀번호 입력" />
            <FormInput label="새 비밀번호" type="password" placeholder="8자 이상, 영문+숫자 조합" />
            <FormInput label="비밀번호 확인" type="password" placeholder="새 비밀번호 재입력" />
            <div style={{ background: C.bg, borderRadius: 8, padding: 12, border: `1px solid ${C.border}`, fontSize: 12, color: C.textSub }}>
              💡 JWT 액세스(15분) + 리프레시(7일) 토큰 이중 구조 적용 — 비밀번호 변경 시 모든 기기에서 로그아웃됩니다.
            </div>
            <div style={{ display: 'flex', gap: 10, justifyContent: 'flex-end' }}>
              <button onClick={() => setPwModal(false)} style={{ background: 'transparent', border: `1px solid ${C.border}`, color: C.textSub, borderRadius: 8, padding: '10px 16px', fontSize: 13, cursor: 'pointer', fontFamily: 'inherit' }}>취소</button>
              <button onClick={() => { setPwModal(false); onToast('비밀번호가 변경되었습니다'); }} style={{ background: C.primary, border: 'none', color: '#fff', borderRadius: 8, padding: '10px 20px', fontSize: 13, fontWeight: 600, cursor: 'pointer', fontFamily: 'inherit' }}>변경하기</button>
            </div>
          </div>
        </Modal>
      )}
    </div>
  );
}

// ─── Main App ───
function App() {
  const [page, setPage] = React.useState('마이룸 대시보드');
  const [loading, setLoading] = React.useState(true);
  const [toast, setToast] = React.useState(null);
  const [modal, setModal] = React.useState(null);

  React.useEffect(() => { setTimeout(() => setLoading(false), 1400); }, []);

  const onToast = (msg) => setToast(msg);
  const onModal = (data) => setModal(data);

  const renderPage = () => {
    switch (page) {
      case '마이룸 대시보드': return <PageDashboard onToast={onToast} onModal={onModal} />;
      case '실시간 음성 채팅': return <PageVoiceChat onToast={onToast} />;
      case '친구 시스템': return <PageFriends onToast={onToast} />;
      case '계정 및 프로필': return <PageProfile onToast={onToast} />;
      default: return null;
    }
  };

  if (loading) {
    return (
      <div style={{ display: 'flex', width: '100%', height: '100vh', background: C.bg }}>
        {/* Skeleton sidebar */}
        <div style={{ width: 260, background: '#0F172A', borderRight: `1px solid ${C.border}`, display: 'flex', flexDirection: 'column', gap: 16, padding: 20 }}>
          <SkeletonBox h={48} />
          {[...Array(4)].map((_, i) => <SkeletonBox key={i} h={36} />)}
        </div>
        {/* Skeleton content */}
        <div style={{ flex: 1, background: C.bg }}>
          <div style={{ height: 56, background: C.surface, borderBottom: `1px solid ${C.border}` }} />
          <SkeletonLoader />
        </div>
      </div>
    );
  }

  return (
    <div style={{ display: 'flex', width: '100%', height: '100vh', overflow: 'hidden', background: C.bg }}>
      {/* Sidebar */}
      <aside style={{ width: 260, background: '#0A1628', borderRight: `1px solid ${C.border}`, display: 'flex', flexDirection: 'column', flexShrink: 0 }}>
        {/* Logo */}
        <div style={{ padding: '20px 20px 12px', borderBottom: `1px solid ${C.border}` }}>
          <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
            <div style={{ width: 36, height: 36, borderRadius: 10, background: `linear-gradient(135deg, ${C.primary}, #8B5CF6)`, display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 20 }}>🏠</div>
            <div>
              <div style={{ fontSize: 16, fontWeight: 800, color: C.text, letterSpacing: '-0.02em' }}>아지트</div>
              <div style={{ fontSize: 11, color: C.textSub }}>실시간 음성 채팅 플랫폼</div>
            </div>
          </div>
        </div>

        {/* Nav */}
        <div style={{ flex: 1, padding: '12px 10px', display: 'flex', flexDirection: 'column', gap: 4 }}>
          {NAV.map(item => (
            <button key={item.id} onClick={() => setPage(item.id)} style={{
              display: 'flex', alignItems: 'center', gap: 12, width: '100%',
              padding: '11px 14px', borderRadius: 10, border: 'none', cursor: 'pointer',
              background: page === item.id ? C.primaryDim : 'transparent',
              color: page === item.id ? C.primaryLight : C.textSub,
              borderLeft: page === item.id ? `3px solid ${C.primary}` : '3px solid transparent',
              fontSize: 14, fontWeight: page === item.id ? 600 : 400,
              transition: 'all 150ms', fontFamily: 'inherit', textAlign: 'left',
            }}
            onMouseEnter={e => { if (page !== item.id) e.currentTarget.style.background = 'rgba(255,255,255,0.04)'; }}
            onMouseLeave={e => { if (page !== item.id) e.currentTarget.style.background = 'transparent'; }}>
              <span style={{ fontSize: 18 }}>{item.icon}</span>
              {item.label}
            </button>
          ))}
        </div>

        {/* 온라인 친구 표시 */}
        <div style={{ padding: '12px 10px', borderTop: `1px solid ${C.border}` }}>
          <div style={{ fontSize: 11, color: C.textMuted, fontWeight: 700, letterSpacing: '0.05em', marginBottom: 8, padding: '0 14px' }}>ONLINE — {FRIENDS.filter(f => f.status === 'online').length}명</div>
          {FRIENDS.filter(f => f.status === 'online').slice(0, 3).map(f => (
            <div key={f.id} style={{ display: 'flex', alignItems: 'center', gap: 10, padding: '6px 14px', borderRadius: 8, cursor: 'pointer', transition: 'background 150ms' }}
              onMouseEnter={e => e.currentTarget.style.background = 'rgba(255,255,255,0.04)'}
              onMouseLeave={e => e.currentTarget.style.background = 'transparent'}>
              <div style={{ position: 'relative' }}>
                <div style={{ width: 30, height: 30, borderRadius: '50%', background: C.surface2, display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 18 }}>{f.avatar}</div>
                <div style={{ position: 'absolute', bottom: 0, right: 0, width: 8, height: 8, borderRadius: '50%', background: C.accent, border: `2px solid #0A1628` }} />
              </div>
              <span style={{ fontSize: 13, color: C.textSub }}>{f.name}</span>
            </div>
          ))}
        </div>

        {/* User info */}
        <div style={{ padding: '12px 14px', borderTop: `1px solid ${C.border}`, display: 'flex', alignItems: 'center', gap: 10 }}>
          <div style={{ width: 34, height: 34, borderRadius: '50%', background: `linear-gradient(135deg, ${C.primary}, #8B5CF6)`, display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 18 }}>😊</div>
          <div style={{ flex: 1, minWidth: 0 }}>
            <div style={{ fontSize: 13, fontWeight: 600, color: C.text }}>김현우</div>
            <div style={{ fontSize: 11, color: C.accent }}>● 온라인</div>
          </div>
          <button onClick={() => onToast('설정 페이지를 엽니다')} style={{ background: 'none', border: 'none', color: C.textMuted, cursor: 'pointer', fontSize: 18 }}>⚙️</button>
        </div>
      </aside>

      {/* Main */}
      <div style={{ flex: 1, display: 'flex', flexDirection: 'column', overflow: 'hidden' }}>
        {/* TopBar */}
        <header style={{ height: 56, background: C.surface, borderBottom: `1px solid ${C.border}`, display: 'flex', alignItems: 'center', padding: '0 24px', gap: 12, flexShrink: 0 }}>
          <div style={{ flex: 1, fontSize: 18, fontWeight: 700, color: C.text }}>{page}</div>
          <div style={{ position: 'relative' }}>
            <input placeholder="친구, 방 검색..." style={{ background: C.bg, border: `1px solid ${C.border}`, borderRadius: 8, padding: '8px 14px 8px 36px', color: C.text, fontSize: 13, outline: 'none', fontFamily: 'inherit', width: 220 }} />
            <span style={{ position: 'absolute', left: 12, top: '50%', transform: 'translateY(-50%)', fontSize: 16, pointerEvents: 'none' }}>🔍</span>
          </div>
          <button onClick={() => onToast('알림이 없습니다')} style={{ background: 'none', border: 'none', color: C.textSub, cursor: 'pointer', fontSize: 20, position: 'relative' }}>
            🔔
            <span style={{ position: 'absolute', top: -2, right: -2, width: 8, height: 8, borderRadius: '50%', background: C.primary, border: `1px solid ${C.surface}` }} />
          </button>
          <div style={{ width: 34, height: 34, borderRadius: '50%', background: `linear-gradient(135deg, ${C.primary}, #8B5CF6)`, display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 18, cursor: 'pointer' }}>😊</div>
        </header>

        {/* Content */}
        <main style={{ flex: 1, overflow: 'auto', padding: 24, background: C.bg }}>
          <div key={page} style={{ animation: 'fadeIn 300ms ease' }}>
            {renderPage()}
          </div>
        </main>
      </div>

      {/* Toast */}
      {toast && <Toast message={toast} onClose={() => setToast(null)} />}

      {/* Friend detail modal */}
      {modal?.type === 'friendDetail' && (
        <Modal title={modal.item.name} onClose={() => setModal(null)} width={400}>
          <div style={{ display: 'flex', flexDirection: 'column', gap: 16, alignItems: 'center', padding: 16 }}>
            <div style={{ fontSize: 56 }}>{modal.item.avatar}</div>
            <div style={{ fontSize: 18, fontWeight: 700, color: C.text }}>{modal.item.name}</div>
            <StatusBadge status={modal.item.status} />
            {modal.item.room && <div style={{ fontSize: 13, color: C.textSub }}>🎙️ {modal.item.room}</div>}
            <div style={{ display: 'flex', gap: 10, width: '100%', justifyContent: 'center', paddingTop: 8 }}>
              {modal.item.room && <button onClick={() => { setModal(null); onToast('방에 입장합니다'); }} style={{ background: C.primary, border: 'none', color: '#fff', borderRadius: 8, padding: '10px 20px', fontSize: 13, fontWeight: 600, cursor: 'pointer', fontFamily: 'inherit' }}>🎙️ 방 입장</button>}
              <button onClick={() => setModal(null)} style={{ background: C.bg, border: `1px solid ${C.border}`, color: C.textSub, borderRadius: 8, padding: '10px 16px', fontSize: 13, cursor: 'pointer', fontFamily: 'inherit' }}>닫기</button>
            </div>
          </div>
        </Modal>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
