// ── Components ──
function CountUp({ end, duration = 1000, suffix = '' }) {
  const [val, setVal] = React.useState(0);
  React.useEffect(() => {
    let s = 0; const step = end / (duration / 16);
    const t = setInterval(() => { s += step; if (s >= end) { setVal(end); clearInterval(t); } else setVal(Math.floor(s)); }, 16);
    return () => clearInterval(t);
  }, [end]);
  return <span>{val.toLocaleString()}{suffix}</span>;
}

function Toast({ message, onClose }) {
  React.useEffect(() => { const t = setTimeout(onClose, 3000); return () => clearTimeout(t); }, []);
  return (
    <div style={{ position: 'fixed', bottom: 24, right: 24, zIndex: 9999, background: C.text, color: '#fff', padding: '12px 20px', borderRadius: 10, animation: 'slideUp 300ms ease', boxShadow: '0 4px 20px rgba(0,0,0,0.2)', fontSize: 14, display: 'flex', alignItems: 'center', gap: 10 }}>
      <span>✅</span> {message}
    </div>
  );
}

function Modal({ title, onClose, children, width = 560 }) {
  return (
    <div style={{ position: 'fixed', inset: 0, zIndex: 500, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
      <div onClick={onClose} style={{ position: 'absolute', inset: 0, background: 'rgba(0,0,0,0.4)', animation: 'fadeIn 200ms ease' }} />
      <div style={{ position: 'relative', width, maxHeight: '85vh', background: C.surface, borderRadius: 20, zIndex: 501, animation: 'fadeInScale 200ms ease', display: 'flex', flexDirection: 'column', boxShadow: '0 20px 60px rgba(0,0,0,0.15)', border: `1px solid ${C.borderMed}` }}>
        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', padding: '20px 24px', borderBottom: `1px solid ${C.borderMed}` }}>
          <h3 style={{ fontSize: 17, fontWeight: 700, color: C.text }}>{title}</h3>
          <button onClick={onClose} style={{ background: 'none', border: 'none', color: C.textSub, fontSize: 20, cursor: 'pointer' }}>✕</button>
        </div>
        <div style={{ padding: 24, overflowY: 'auto', flex: 1 }}>{children}</div>
      </div>
    </div>
  );
}

// Drawer (slide-over for topnav-hero)

  return (
    <>

      <div style={{

        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 24 }}>

              <div style={{ fontSize: 12, color: C.textSub, marginBottom: 6 }}>{d.icon} {d.label}</div>
              <div style={{ fontSize: 15, fontWeight: 600, color: C.text }}>{d.value}</div>

          <div style={{ fontSize: 12, color: C.primary, fontWeight: 600, marginBottom: 6 }}>📚 현재 학습 주제</div>
          <div style={{ fontSize: 15, fontWeight: 600, color: C.text }}>{item.subject}</div>
          {item.timer && <div style={{ fontSize: 13, color: C.primary, marginTop: 8 }}>⏱️ {item.timer}</div>}
        </div>

        {/* 태그 */}
        <div style={{ display: 'flex', flexWrap: 'wrap', gap: 8, marginBottom: 24 }}>
          {item.tags.map(t => (

        </div>

        <div style={{ display: 'flex', gap: 10 }}>
          <button onClick={() => { onClose(); onToast(`${item.title}에 입장했습니다! 🎙️`); }} style={{ flex: 1, background: C.primary, border: 'none', color: '#fff', borderRadius: 12, padding: '14px', fontSize: 15, fontWeight: 700, cursor: 'pointer', fontFamily: 'inherit' }}>🎙️ 입장하기</button>

        </div>
      </div>
    </>

}

function Tag({ label }) {
  return <span style={{ fontSize: 12, background: C.primaryDim, color: C.primary, padding: '3px 8px', borderRadius: 20, fontWeight: 600 }}>#{label}</span>;
}

function StatusChip({ status }) {
  const is진행 = status === '진행중';
  return (
    <span style={{ fontSize: 12, background: is진행 ? C.primaryDim : 'rgba(245,158,11,0.1)', color: is진행 ? C.primary : C.warning, padding: '4px 10px', borderRadius: 20, fontWeight: 700, display: 'inline-flex', alignItems: 'center', gap: 4 }}>
      <span style={{ animation: is진행 ? 'pulse 2s infinite' : 'none' }}>●</span> {status}
    </span>
  );
}

// ── Page: 스터디룸 탐색 ──
function PageStudyRooms({ onToast, setDrawer }) {
  const [filter, setFilter] = React.useState('전체');
  const [search, setSearch] = React.useState('');
  const [showCreate, setShowCreate] = React.useState(false);

  const FILTERS = ['전체', '진행중', '모집중', '개발', '영어', '공무원'];
  const filtered = ROOMS.filter(r => {
    if (search && !r.title.includes(search) && !r.subject.includes(search)) return false;
    if (filter === '진행중' || filter === '모집중') return r.status === filter;
    if (['개발', '영어', '공무원'].includes(filter)) return r.tags.some(t => t.includes(filter) || filter.includes(t));
    return true;
  });

  return (
    <div style={{ padding: '24px 32px', animation: 'fadeIn 300ms ease' }}>
      {/* 필터 + 검색 */}
      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 20 }}>
        <div style={{ display: 'flex', gap: 8, flexWrap: 'wrap' }}>
          {FILTERS.map(f => (
            <button key={f} onClick={() => setFilter(f)} style={{
              background: filter === f ? C.primary : C.surface,
              border: `1px solid ${filter === f ? C.primary : C.borderMed}`,
              color: filter === f ? '#fff' : C.textSub,
              borderRadius: 20, padding: '7px 16px', fontSize: 13, cursor: 'pointer', fontFamily: 'inherit',
              fontWeight: filter === f ? 600 : 400, transition: 'all 150ms',
            }}>{f}</button>
          ))}
        </div>
        <div style={{ display: 'flex', gap: 10 }}>
          <div style={{ position: 'relative' }}>
            <input placeholder="방 검색..." value={search} onChange={e => setSearch(e.target.value)} style={{ background: C.surface, border: `1px solid ${C.borderMed}`, borderRadius: 10, padding: '9px 14px 9px 36px', color: C.text, fontSize: 13, outline: 'none', fontFamily: 'inherit', width: 200 }} />
            <span style={{ position: 'absolute', left: 12, top: '50%', transform: 'translateY(-50%)', fontSize: 16 }}>🔍</span>
          </div>
          <button onClick={() => setShowCreate(true)} style={{ background: C.primary, border: 'none', color: '#fff', borderRadius: 10, padding: '9px 18px', fontSize: 13, fontWeight: 700, cursor: 'pointer', fontFamily: 'inherit' }}>+ 방 만들기</button>
        </div>
      </div>

      {/* 카드 그리드 */}
      <div style={{ display: 'grid', gridTemplateColumns: 'repeat(3,1fr)', gap: 18 }}>
        {filtered.map((room, i) => (
          <div key={room.id}
            onClick={() => setDrawer(room)}
            style={{
              background: C.surface, borderRadius: 18, padding: 22,
              border: `1px solid ${C.borderMed}`,
              boxShadow: '0 4px 16px rgba(0,0,0,0.06)',
              cursor: 'pointer', transition: 'all 200ms ease',
              animation: `slideUp 400ms ease ${i * 80}ms both`,
            }}
            onMouseEnter={e => { e.currentTarget.style.transform = 'scale(1.02)'; e.currentTarget.style.boxShadow = '0 8px 28px rgba(0,0,0,0.1)'; }}
            onMouseLeave={e => { e.currentTarget.style.transform = 'scale(1)'; e.currentTarget.style.boxShadow = '0 4px 16px rgba(0,0,0,0.06)'; }}>
            {/* 헤더 */}
            <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', marginBottom: 14 }}>

                <div style={{ fontSize: 16, fontWeight: 700, color: C.text, marginBottom: 4, display: 'flex', alignItems: 'center', gap: 6 }}>
                  {room.isPrivate && <span style={{ fontSize: 14 }}>🔒</span>} {room.title}
                </div>
                <div style={{ fontSize: 12, color: C.textSub }}>방장: {room.host}</div>
              </div>
              <StatusChip status={room.status} />
            </div>

            {/* 주제 */}
            <div style={{ background: C.bg, borderRadius: 10, padding: 10, marginBottom: 14, fontSize: 13, color: C.text, borderLeft: `3px solid ${C.primary}` }}>
              📚 {room.subject}
            </div>

            {/* 타이머 */}
            {room.timer && (
              <div style={{ background: C.primaryDim, borderRadius: 8, padding: '6px 10px', marginBottom: 12, fontSize: 12, color: C.primary, fontWeight: 600 }}>⏱️ {room.timer}</div>
            )}

            {/* 인원 바 */}
            <div style={{ marginBottom: 14 }}>

// ── Page: 포모도로 타이머 ──
function PagePomodoro({ onToast }) {
  const [phase, setPhase] = React.useState('집중');
  const [timeLeft, setTimeLeft] = React.useState(25 * 60);
  const [running, setRunning] = React.useState(false);
  const [sessionsToday, setSessionsToday] = React.useState(3);

  React.useEffect(() => {
    if (!running) return;
    const id = setInterval(() => setTimeLeft(t => {
      if (t <= 1) { clearInterval(id); setRunning(false); setSessionsToday(s => s + 1); onToast(phase === '집중' ? '집중 완료! 휴식을 취하세요 ☕' : '휴식 완료! 다시 집중합시다 💪'); return phase === '집중' ? 5 * 60 : 25 * 60; }
      return t - 1;
    }), 1000);
    return () => clearInterval(id);
  }, [running, phase]);

  const mm = String(Math.floor(timeLeft / 60)).padStart(2, '0');
  const ss = String(timeLeft % 60).padStart(2, '0');
  const progress = phase === '집중' ? 1 - timeLeft / (25 * 60) : 1 - timeLeft / (5 * 60);
  const circumference = 2 * Math.PI * 90;
  const { LineChart, Line, XAxis, YAxis, Tooltip, ResponsiveContainer } = Recharts;

  return (
    <div style={{ padding: '24px 32px', animation: 'fadeIn 300ms ease' }}>
      <div style={{ display: 'flex', gap: 28 }}>
        {/* 타이머 */}
        <div style={{ display: 'flex', flexDirection: 'column', gap: 20, flex: 1 }}>
          {/* 페이즈 탭 */}
          <div style={{ background: C.surface, borderRadius: 16, padding: 6, display: 'inline-flex', border: `1px solid ${C.borderMed}`, alignSelf: 'center' }}>
            {['집중', '짧은 휴식', '긴 휴식'].map(p => (
              <button key={p} onClick={() => { setPhase(p); setRunning(false); setTimeLeft(p === '집중' ? 25 * 60 : p === '짧은 휴식' ? 5 * 60 : 15 * 60); }} style={{
                background: phase === p ? C.primary : 'transparent',
                border: 'none', color: phase === p ? '#fff' : C.textSub,
                borderRadius: 10, padding: '8px 20px', fontSize: 13, fontWeight: phase === p ? 700 : 400,
                cursor: 'pointer', fontFamily: 'inherit', transition: 'all 150ms',
              }}>{p}</button>
            ))}
          </div>

          {/* SVG 원형 타이머 */}
          <div style={{ display: 'flex', justifyContent: 'center', alignItems: 'center', padding: 20 }}>
            <div style={{ position: 'relative', width: 220, height: 220 }}>
              <svg width="220" height="220" style={{ transform: 'rotate(-90deg)' }}>
                <circle cx="110" cy="110" r="90" fill="none" stroke={C.bg} strokeWidth="12" />
                <circle cx="110" cy="110" r="90" fill="none" stroke={C.primary} strokeWidth="12"
                  strokeDasharray={circumference} strokeDashoffset={circumference * (1 - progress)}
                  strokeLinecap="round" style={{ transition: 'stroke-dashoffset 1s linear' }} />
              </svg>
              <div style={{ position: 'absolute', inset: 0, display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', animation: running ? 'timerPulse 2s infinite' : 'none' }}>
                <div style={{ fontSize: 48, fontWeight: 800, color: C.text, letterSpacing: '-0.02em', fontVariantNumeric: 'tabular-nums' }}>{mm}:{ss}</div>
                <div style={{ fontSize: 14, color: C.textSub, marginTop: 6, fontWeight: 600 }}>{phase}</div>
              </div>
            </div>
          </div>

          {/* 컨트롤 */}
          <div style={{ display: 'flex', justifyContent: 'center', gap: 14 }}>
            <button onClick={() => { setRunning(false); setTimeLeft(phase === '집중' ? 25 * 60 : 5 * 60); }} style={{ background: C.surface, border: `1px solid ${C.borderMed}`, color: C.textSub, borderRadius: 12, padding: '12px 24px', fontSize: 14, cursor: 'pointer', fontFamily: 'inherit' }}>🔄 초기화</button>
            <button onClick={() => setRunning(!running)} style={{ background: running ? 'rgba(239,68,68,0.1)' : C.primary, border: `2px solid ${running ? C.danger : C.primary}`, color: running ? C.danger : '#fff', borderRadius: 12, padding: '12px 36px', fontSize: 15, fontWeight: 700, cursor: 'pointer', fontFamily: 'inherit', transition: 'all 150ms' }}>
              {running ? '⏸ 일시정지' : '▶ 시작'}
            </button>
            <button onClick={() => { setPhase(p => p === '집중' ? '짧은 휴식' : '집중'); setRunning(false); setTimeLeft(phase === '집중' ? 5 * 60 : 25 * 60); }} style={{ background: C.surface, border: `1px solid ${C.borderMed}`, color: C.textSub, borderRadius: 12, padding: '12px 24px', fontSize: 14, cursor: 'pointer', fontFamily: 'inherit' }}>⏭ 다음</button>

          <div style={{ background: C.primaryDim, borderRadius: 12, padding: 14, border: `1px solid ${C.border}`, display: 'flex', alignItems: 'center', gap: 12 }}>
            <span style={{ fontSize: 24 }}>🔄</span>
            <div>
              <div style={{ fontSize: 13, fontWeight: 700, color: C.text }}>방 전체 공유 타이머 활성화</div>

                <span style={{ fontSize: 15, fontWeight: 700, color: C.primary }}>{typeof s.value === 'number' ? <CountUp end={s.value} /> : s.value}</span>
              </div>

          <div style={{ background: C.surface, borderRadius: 16, padding: 18, border: `1px solid ${C.borderMed}` }}>

        {/* 참여자 관리 */}
        <div style={{ background: C.surface, borderRadius: 18, border: `1px solid ${C.borderMed}`, overflow: 'hidden' }}>
          <div style={{ padding: '18px 20px', borderBottom: `1px solid ${C.borderMed}`, display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
            <div style={{ fontSize: 15, fontWeight: 700, color: C.text }}>👥 참여자 관리</div>
            <span style={{ fontSize: 13, color: C.textSub }}>{members.length}명 참여 중</span>
          </div>
          <div style={{ padding: 12, display: 'flex', flexDirection: 'column', gap: 8 }}>
            {members.map((m, i) => (
              <div key={m.id}
                onClick={() => setSelected2(m)}
                style={{
                  display: 'flex', alignItems: 'center', gap: 12, padding: '12px 14px', borderRadius: 12,
                  cursor: 'pointer', transition: 'all 150ms',
                  background: selected2?.id === m.id ? C.primaryDim : C.bg,
                  border: `1px solid ${selected2?.id === m.id ? C.primary : 'transparent'}`,
                  animation: `slideUp 300ms ease ${i * 60}ms both`,
                }}
                onMouseEnter={e => { if (selected2?.id !== m.id) e.currentTarget.style.background = C.surface2; }}
                onMouseLeave={e => { if (selected2?.id !== m.id) e.currentTarget.style.background = C.bg; }}>
                <div style={{ fontSize: 32 }}>{m.avatar}</div>
                <div style={{ flex: 1 }}>
                  <div style={{ fontSize: 14, fontWeight: 600, color: C.text, display: 'flex', alignItems: 'center', gap: 8 }}>
                    {m.name}
                    {m.role === '방장' && <span style={{ fontSize: 11, background: C.primaryDim, color: C.primary, padding: '2px 6px', borderRadius: 10, fontWeight: 700 }}>방장</span>}
                  </div>
                  <div style={{ fontSize: 12, color: C.textSub }}><span style={{ color: C.primary }}>● 참여중</span></div>
                </div>
                <div style={{ display: 'flex', gap: 8 }}>
                  {m.id !== 1 && (
                    <>
                      <button onClick={e => { e.stopPropagation(); muteMember(m.id); }} title={m.micOn ? '음소거' : '음소거 해제'} style={{ background: 'none', border: `1px solid ${C.borderMed}`, borderRadius: 8, padding: '5px 10px', cursor: 'pointer', fontSize: 16 }}>
                        {m.micOn ? '🎤' : '🔇'}
                      </button>
                      <button onClick={e => { e.stopPropagation(); kickMember(m.id); }} title="강퇴" style={{ background: 'rgba(239,68,68,0.08)', border: `1px solid ${C.danger}`, borderRadius: 8, padding: '5px 10px', cursor: 'pointer', fontSize: 16, color: C.danger }}>
                        🚪
                      </button>
                    </>
                  )}
                </div>
              </div>
            ))}
          </div>
        </div>

        {/* 방 설정 */}
        <div style={{ display: 'flex', flexDirection: 'column', gap: 16 }}>
          <div style={{ background: C.surface, borderRadius: 18, border: `1px solid ${C.borderMed}`, padding: 20 }}>
            <div style={{ fontSize: 15, fontWeight: 700, color: C.text, marginBottom: 16 }}>⚙️ 방 설정</div>
            <div style={{ display: 'flex', flexDirection: 'column', gap: 12 }}>
              <div style={{ display: 'flex', flexDirection: 'column', gap: 6 }}>
                <label style={{ fontSize: 13, color: C.textSub, fontWeight: 600 }}>공개 설정</label>
                <select value={privacy} onChange={e => setPrivacy(e.target.value)} style={{ background: C.bg, border: `1px solid ${C.borderMed}`, borderRadius: 10, padding: '10px 14px', color: C.text, fontSize: 14, outline: 'none', fontFamily: 'inherit', cursor: 'pointer' }}>
                  {['공개', '비공개'].map(o => <option key={o}>{o}</option>)}
                </select>
              </div>
              <div style={{ display: 'flex', flexDirection: 'column', gap: 6 }}>
                <label style={{ fontSize: 13, color: C.textSub, fontWeight: 600 }}>최대 인원</label>
                <select value={maxMem} onChange={e => setMaxMem(e.target.value)} style={{ background: C.bg, border: `1px solid ${C.borderMed}`, borderRadius: 10, padding: '10px 14px', color: C.text, fontSize: 14, outline: 'none', fontFamily: 'inherit', cursor: 'pointer' }}>
                  {['4', '6', '8', '10'].map(o => <option key={o}>{o}명</option>)}
                </select>
              </div>
              <button onClick={() => onToast('방 설정이 저장되었습니다 · WebSocket으로 전 참여자에게 반영')} style={{ background: C.primary, border: 'none', color: '#fff', borderRadius: 10, padding: '12px', fontSize: 14, fontWeight: 700, cursor: 'pointer', fontFamily: 'inherit' }}>변경 적용</button>
            </div>
          </div>

          {/* 방장 전용 액션 */}
          <div style={{ background: C.surface, borderRadius: 18, border: `1px solid ${C.borderMed}`, padding: 20 }}>
            <div style={{ fontSize: 15, fontWeight: 700, color: C.text, marginBottom: 14 }}>🛡️ 방장 전용 액션</div>
            <div style={{ display: 'flex', flexDirection: 'column', gap: 8 }}>
              {[
                { label: '전체 음소거', desc: '모든 참여자 마이크 일시 차단', icon: '🔇', color: C.warning, action: () => onToast('모든 참여자를 음소거했습니다') },
                { label: '학습 주제 변경', desc: '방의 현재 학습 주제를 업데이트', icon: '📚', color: C.accent, action: () => onToast('학습 주제를 변경합니다') },
                { label: '방 일시 잠금', desc: '새 참여자 입장 차단', icon: '🔒', color: C.textSub, action: () => onToast('방이 일시 잠금되었습니다') },
                { label: '방 종료', desc: '스터디룸을 닫고 모두 퇴장', icon: '🚪', color: C.danger, action: () => onToast('방이 종료되었습니다') },
              ].map(a => (
                <button key={a.label} onClick={a.action} style={{
                  display: 'flex', alignItems: 'center', gap: 12, width: '100%',
                  background: C.bg, border: `1px solid ${C.borderMed}`, borderRadius: 10,
                  padding: '12px 14px', cursor: 'pointer', fontFamily: 'inherit',
                  transition: 'all 150ms', textAlign: 'left',
                }}
                onMouseEnter={e => { e.currentTarget.style.background = C.surface2; e.currentTarget.style.borderColor = a.color; }}
                onMouseLeave={e => { e.currentTarget.style.background = C.bg; e.currentTarget.style.borderColor = C.borderMed; }}>
                  <span style={{ fontSize: 22 }}>{a.icon}</span>
                  <div>
                    <div style={{ fontSize: 13, fontWeight: 600, color: a.color }}>{a.label}</div>
                    <div style={{ fontSize: 11, color: C.textSub }}>{a.desc}</div>
                  </div>
                </button>
              ))}
            </div>
          </div>
        </div>
      </div>

      {/* 참여자 상세 */}
      {selected2 && selected2.id !== 1 && (
        <Modal title={`${selected2.name} 관리`} onClose={() => setSelected2(null)} width={420}>
          <div style={{ display: 'flex', flexDirection: 'column', gap: 16 }}>
            <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 10, padding: 16 }}>
              <div style={{ fontSize: 56 }}>{selected2.avatar}</div>
              <div style={{ fontSize: 18, fontWeight: 700, color: C.text }}>{selected2.name}</div>
              <span style={{ fontSize: 13, color: C.textSub }}>{selected2.role}</span>
            </div>
            <div style={{ display: 'flex', gap: 10 }}>
              <button onClick={() => muteMember(selected2.id)} style={{ flex: 1, background: 'rgba(245,158,11,0.1)', border: `1px solid ${C.warning}`, color: C.warning, borderRadius: 10, padding: '12px', fontSize: 13, cursor: 'pointer', fontFamily: 'inherit', fontWeight: 600 }}>
                {selected2.micOn ? '🔇 음소거' : '🎤 음소거 해제'}
              </button>
              <button onClick={() => kickMember(selected2.id)} style={{ flex: 1, background: 'rgba(239,68,68,0.1)', border: `1px solid ${C.danger}`, color: C.danger, borderRadius: 10, padding: '12px', fontSize: 13, cursor: 'pointer', fontFamily: 'inherit', fontWeight: 600 }}>🚪 강퇴</button>
            </div>
            <button onClick={() => setSelected2(null)} style={{ background: C.bg, border: `1px solid ${C.borderMed}`, color: C.textSub, borderRadius: 10, padding: '10px', fontSize: 14, cursor: 'pointer', fontFamily: 'inherit' }}>닫기</button>
          </div>
        </Modal>
      )}
    </div>
  );
}

// ── App ──
function App() {
  const [tab, setTab] = React.useState('스터디룸 탐색');
  const [loading, setLoading] = React.useState(true);
  const [toast, setToast] = React.useState(null);
  const [drawer, setDrawer] = React.useState(null);

  React.useEffect(() => { setTimeout(() => setLoading(false), 1400); }, []);

  const onToast = msg => setToast(msg);

  const renderContent = () => {
    switch (tab) {
      case '스터디룸 탐색': return <PageStudyRooms onToast={onToast} setDrawer={setDrawer} />;
      case '음성·화상 통신': return <PageWebRTC onToast={onToast} />;
      case '포모도로 타이머': return <PagePomodoro onToast={onToast} />;
      case '스터디룸 관리': return <PageRoomMgmt onToast={onToast} />;
      default: return null;
    }
  };

  if (loading) {
    return (
      <div style={{ minHeight: '100vh', background: C.bg }}>
        <div style={{ height: 56, background: C.surface, borderBottom: `1px solid ${C.borderMed}` }} />
        <div style={{ height: 120, background: C.primary, opacity: 0.3 }} />
        <div style={{ padding: 24, display: 'flex', flexDirection: 'column', gap: 16 }}>
          {[...Array(3)].map((_, i) => (
            <div key={i} style={{ height: 140, borderRadius: 18, background: 'linear-gradient(90deg, #E5E7EB 25%, #D1D5DB 50%, #E5E7EB 75%)', backgroundSize: '200% 100%', animation: 'shimmer 1.5s infinite' }} />
          ))}
        </div>
      </div>
    );
  }

  return (
    <div style={{ display: 'flex', flexDirection: 'column', width: '100%', minHeight: '100vh', background: C.bg }}>
      {/* Topnav */}
      <header style={{ position: 'sticky', top: 0, zIndex: 100, background: C.surface, borderBottom: `1px solid ${C.borderMed}`, display: 'flex', alignItems: 'center', height: 56, padding: '0 24px', gap: 8 }}>
        <div style={{ display: 'flex', alignItems: 'center', gap: 10, marginRight: 16 }}>
          <div style={{ width: 34, height: 34, borderRadius: 10, background: `linear-gradient(135deg, ${C.primary}, #34D399)`, display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 20 }}>📚</div>
          <span style={{ fontSize: 16, fontWeight: 800, color: C.text, letterSpacing: '-0.02em' }}>라이브 스터디룸</span>
        </div>
        {TABS.map(t => (
          <button key={t.id} onClick={() => setTab(t.id)} style={{
            background: tab === t.id ? C.primaryDim : 'transparent',
            border: 'none', color: tab === t.id ? C.primary : C.textSub,
            borderRadius: 8, padding: '7px 14px', fontSize: 13, cursor: 'pointer', fontFamily: 'inherit',
            fontWeight: tab === t.id ? 600 : 400, transition: 'all 150ms',
            display: 'flex', alignItems: 'center', gap: 6,
          }}>
            <span>{t.icon}</span> {t.label}
          </button>
        ))}
        <div style={{ flex: 1 }} />
        <div style={{ position: 'relative' }}>
          <input placeholder="검색..." style={{ background: C.surface2, border: `1px solid ${C.borderMed}`, borderRadius: 8, padding: '7px 12px 7px 32px', color: C.text, fontSize: 13, outline: 'none', fontFamily: 'inherit', width: 180 }} />
          <span style={{ position: 'absolute', left: 10, top: '50%', transform: 'translateY(-50%)', fontSize: 15 }}>🔍</span>
        </div>
        <button onClick={() => onToast('알림 확인')} style={{ background: 'none', border: 'none', cursor: 'pointer', fontSize: 22, color: C.textSub }}>🔔</button>
        <div style={{ width: 34, height: 34, borderRadius: '50%', background: `linear-gradient(135deg, ${C.primary}, #34D399)`, display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 18, cursor: 'pointer' }}>😊</div>
      </header>

      {/* Hero banner */}
      <HeroBanner tab={tab} />

      {/* Content */}
      <div key={tab} style={{ flex: 1, animation: 'fadeIn 300ms ease' }}>
        {renderContent()}
      </div>

      {/* Drawer */}
      {drawer && <Drawer item={drawer} onClose={() => setDrawer(null)} onToast={onToast} />}

      {/* Toast */}
      {toast && <Toast message={toast} onClose={() => setToast(null)} />}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
