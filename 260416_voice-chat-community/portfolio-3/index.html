// ── Components ──
function CountUp({ end, duration = 1000, suffix = '' }) {
  const [val, setVal] = React.useState(0);
  React.useEffect(() => {
    let s = 0; const step = end / (duration / 16);
    const t = setInterval(() => { s += step; if (s >= end) { setVal(end); clearInterval(t); } else setVal(Math.floor(s)); }, 16);
    return () => clearInterval(t);
  }, [end]);
  return <span>{val.toLocaleString()}{suffix}</span>;
}

function Toast({ message, onClose }) {
  React.useEffect(() => { const t = setTimeout(onClose, 3000); return () => clearTimeout(t); }, []);
  return (
    <div style={{ position: 'fixed', bottom: 24, right: 24, zIndex: 9999, background: C.primary, color: '#fff', padding: '12px 20px', borderRadius: 12, animation: 'slideUp 300ms ease', boxShadow: '0 4px 20px rgba(124,58,237,0.3)', fontSize: 14, display: 'flex', alignItems: 'center', gap: 10 }}>
      <span>✅</span> {message}
    </div>
  );
}

function Modal({ title, onClose, children, width = 560 }) {
  return (
    <div style={{ position: 'fixed', inset: 0, zIndex: 500, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
      <div onClick={onClose} style={{ position: 'absolute', inset: 0, background: 'rgba(0,0,0,0.35)', animation: 'fadeIn 200ms ease' }} />
      <div style={{ position: 'relative', width, maxHeight: '85vh', background: C.surface, borderRadius: 20, zIndex: 501, animation: 'fadeInScale 200ms ease', display: 'flex', flexDirection: 'column', boxShadow: '0 20px 60px rgba(124,58,237,0.15)', border: `1px solid ${C.border}` }}>
        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', padding: '20px 24px', borderBottom: `1px solid ${C.borderMed}` }}>
          <h3 style={{ fontSize: 17, fontWeight: 700, color: C.text }}>{title}</h3>
          <button onClick={onClose} style={{ background: 'none', border: 'none', color: C.textSub, fontSize: 20, cursor: 'pointer' }}>✕</button>
        </div>
        <div style={{ padding: 24, overflowY: 'auto', flex: 1 }}>{children}</div>
      </div>
    </div>
  );
}

}

              <button onClick={() => setShowBuy(true)} style={{ width: '100%', background: C.primary, border: 'none', color: '#fff', borderRadius: 12, padding: '14px', fontSize: 15, fontWeight: 700, cursor: 'pointer', fontFamily: 'inherit', opacity: coins < selected.price ? 0.5 : 1 }}>

              <div style={{ fontSize: 18, fontWeight: 700, color: C.text }}>{selected.name}</div>
              <RarityBadge rarity={selected.rarity} />

            <div style={{ background: C.primaryDim, borderRadius: 12, padding: 14, border: `1px solid ${C.primaryBorder}` }}>

                <span style={{ fontWeight: 700, color: C.text }}>💜 {coins.toLocaleString()} 코인</span>
              </div>
              <div style={{ display: 'flex', justifyContent: 'space-between', fontSize: 14, marginBottom: 8 }}>
                <span style={{ color: C.textSub }}>차감 금액</span>
                <span style={{ fontWeight: 700, color: C.danger }}>- {selected.price.toLocaleString()} 코인</span>
              </div>
              <div style={{ height: 1, background: C.border, margin: '8px 0' }} />
              <div style={{ display: 'flex', justifyContent: 'space-between', fontSize: 15 }}>
                <span style={{ fontWeight: 700, color: C.text }}>구매 후 잔액</span>

              <button onClick={() => setShowBuy(false)} style={{ flex: 1, background: C.surface2, border: `1px solid ${C.borderMed}`, color: C.textSub, borderRadius: 10, padding: '12px', fontSize: 14, cursor: 'pointer', fontFamily: 'inherit' }}>취소</button>

}

// ── Page: 신고·제재 시스템 ──
function PageReports({ onToast, tab }) {
  const [selected, setSelected] = React.useState(null);
  const [showAction, setShowAction] = React.useState(false);

  const severityColor = s => s === 'high' ? C.danger : s === 'medium' ? C.warning : C.textSub;
  const severityLabel = s => s === 'high' ? '긴급' : s === 'medium' ? '보통' : '낮음';

              padding: '12px 16px', cursor: 'pointer', borderBottom: `1px solid ${C.bg}`,
              background: selected?.id === r.id ? C.primaryDim : 'transparent',
              borderLeft: selected?.id === r.id ? `3px solid ${C.primary}` : `3px solid ${severityColor(r.severity)}`,

            onMouseEnter={e => { if (selected?.id !== r.id) e.currentTarget.style.background = C.surface2; }}

                <div style={{ display: 'flex', alignItems: 'center', gap: 6 }}>

                  <span style={{ fontSize: 11, fontWeight: 700, padding: '2px 6px', borderRadius: 8, background: `${severityColor(r.severity)}15`, color: severityColor(r.severity) }}>{severityLabel(r.severity)}</span>

                      flex: 1, background: action.bg, border: `1px solid ${action.color}30`, color: action.color,
                      borderRadius: 10, padding: '12px 8px', fontSize: 12, fontWeight: 700, cursor: 'pointer', fontFamily: 'inherit',
                      display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 6,
                    }}>
                      <span style={{ fontSize: 22 }}>{action.icon}</span>
                      {action.label}
                    </button>
                  ))}
                </div>
                <div style={{ background: C.primaryDim, borderRadius: 10, padding: 10, border: `1px solid ${C.primaryBorder}`, fontSize: 12, color: C.primary }}>
                  💡 NestJS 상태머신으로 신고 처리 단계가 관리됩니다. 제재 적용 시 Socket.io를 통해 피신고자가 즉시 강제 퇴장됩니다.
                </div>
              </div>
            )}
          </div>
        ) : (
          <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', height: '100%', color: C.textMuted, gap: 12 }}>
            <span style={{ fontSize: 48 }}>🛡️</span><span style={{ fontSize: 14 }}>신고를 선택하면 상세 내용과 처리 옵션이 표시됩니다</span>
          </div>
        )}
      </div>
    </div>
  );
}

// ── App ──
function App() {
  const [section, setSection] = React.useState('공개 채널 탐색');
  const [tabIdx, setTabIdx] = React.useState(0);
  const [loading, setLoading] = React.useState(true);
  const [toast, setToast] = React.useState(null);

  React.useEffect(() => { setTimeout(() => setLoading(false), 1400); }, []);

  const onToast = msg => setToast(msg);
  const tabs = SECTION_TABS[section] || [];

  const renderContent = () => {
    switch (section) {
      case '공개 채널 탐색': return <PageChannels onToast={onToast} tab={tabIdx} />;
      case '아이템 상점': return <PageItemShop onToast={onToast} tab={tabIdx} />;
      case '관리자 대시보드': return <PageAdminDashboard onToast={onToast} tab={tabIdx} />;
      case '신고·제재 시스템': return <PageReports onToast={onToast} tab={tabIdx} />;
      default: return null;
    }
  };

  if (loading) {
    return (
      <div style={{ display: 'flex', width: '100%', height: '100vh', background: C.bg }}>
        <div style={{ width: 240, background: C.surface, borderRight: `1px solid ${C.borderMed}`, padding: 16, display: 'flex', flexDirection: 'column', gap: 12 }}>
          {[...Array(5)].map((_, i) => (
            <div key={i} style={{ height: 40, borderRadius: 10, background: 'linear-gradient(90deg, #F5F3FF 25%, #EDE9FE 50%, #F5F3FF 75%)', backgroundSize: '200% 100%', animation: 'shimmer 1.5s infinite' }} />
          ))}
        </div>
        <div style={{ flex: 1, display: 'flex', flexDirection: 'column' }}>
          <div style={{ height: 40, background: C.surface, borderBottom: `1px solid ${C.borderMed}` }} />
          <div style={{ height: 38, background: C.surface, borderBottom: `1px solid ${C.borderMed}` }} />
          <div style={{ flex: 1, padding: 20, display: 'flex', gap: 16 }}>
            <div style={{ width: '42%', display: 'flex', flexDirection: 'column', gap: 10 }}>
              {[...Array(5)].map((_, i) => <div key={i} style={{ height: 64, borderRadius: 12, background: 'linear-gradient(90deg, #F5F3FF 25%, #EDE9FE 50%, #F5F3FF 75%)', backgroundSize: '200% 100%', animation: 'shimmer 1.5s infinite' }} />)}
            </div>
            <div style={{ flex: 1, borderRadius: 16, background: 'linear-gradient(90deg, #F5F3FF 25%, #EDE9FE 50%, #F5F3FF 75%)', backgroundSize: '200% 100%', animation: 'shimmer 1.5s infinite' }} />
          </div>
        </div>
      </div>
    );
  }

  return (
    <div style={{ display: 'flex', width: '100%', height: '100vh', overflow: 'hidden', background: C.bg }}>
      {/* Sidebar (밝은 화이트, 240px) */}
      <nav style={{ width: 240, background: C.surface, borderRight: `1px solid ${C.borderMed}`, display: 'flex', flexDirection: 'column', paddingTop: 0, flexShrink: 0 }}>
        {/* 로고 */}
        <div style={{ padding: '16px 16px 14px', borderBottom: `1px solid ${C.borderMed}` }}>
          <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
            <div style={{ width: 36, height: 36, borderRadius: 10, background: `linear-gradient(135deg, ${C.primary}, ${C.primaryLight})`, display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 20 }}>🌐</div>
            <div>
              <div style={{ fontSize: 14, fontWeight: 800, color: C.text, letterSpacing: '-0.02em' }}>보이스 커뮤니티 허브</div>
              <div style={{ fontSize: 11, color: C.textSub }}>관리자 패널</div>
            </div>
          </div>
        </div>

        {/* Nav items */}
        <div style={{ flex: 1, padding: '10px 8px', display: 'flex', flexDirection: 'column', gap: 2 }}>
          {NAV_ITEMS.map(item => (
            <SideNavItem key={item.id} icon={item.icon} label={item.label} active={section === item.id} onClick={() => { setSection(item.id); setTabIdx(0); }} />
          ))}
        </div>

        {/* 코인 잔액 표시 */}
        <div style={{ padding: '12px 16px', borderTop: `1px solid ${C.borderMed}`, background: C.primaryDim }}>
          <div style={{ fontSize: 11, color: C.textMuted, fontWeight: 600, marginBottom: 4 }}>내 코인</div>
          <div style={{ fontSize: 16, fontWeight: 800, color: C.primary }}>💜 1,850 코인</div>
        </div>

        {/* 사용자 정보 */}
        <div style={{ padding: '12px 14px', borderTop: `1px solid ${C.borderMed}`, display: 'flex', alignItems: 'center', gap: 10 }}>
          <div style={{ width: 34, height: 34, borderRadius: '50%', background: `linear-gradient(135deg, ${C.primary}, ${C.primaryLight})`, display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 18 }}>👑</div>
          <div style={{ flex: 1, minWidth: 0 }}>
            <div style={{ fontSize: 13, fontWeight: 600, color: C.text }}>김현우</div>
            <div style={{ fontSize: 11, color: C.primary }}>관리자</div>
          </div>
          <button onClick={() => onToast('설정 페이지를 엽니다')} style={{ background: 'none', border: 'none', color: C.textMuted, cursor: 'pointer', fontSize: 18 }}>⚙️</button>
        </div>
      </nav>

      {/* Main */}
      <div style={{ flex: 1, display: 'flex', flexDirection: 'column', overflow: 'hidden' }}>
        {/* AppBar (44px) */}
        <header style={{ height: 40, borderBottom: `1px solid ${C.borderMed}`, display: 'flex', alignItems: 'center', padding: '0 16px', gap: 8, background: C.surface, flexShrink: 0 }}>
          <span style={{ fontSize: 13, color: C.textMuted }}>커뮤니티 허브</span>
          <span style={{ color: C.textMuted, fontSize: 13 }}>›</span>
          <span style={{ fontSize: 13, fontWeight: 600, color: C.text }}>{section}</span>
          <div style={{ flex: 1 }} />
          <div style={{ position: 'relative' }}>
            <input placeholder="검색..." style={{ background: C.bg, border: `1px solid ${C.borderMed}`, borderRadius: 8, padding: '5px 10px 5px 28px', color: C.text, fontSize: 12, outline: 'none', fontFamily: 'inherit', width: 160 }} />
            <span style={{ position: 'absolute', left: 9, top: '50%', transform: 'translateY(-50%)', fontSize: 13 }}>🔍</span>
          </div>
          <button onClick={() => onToast('알림 확인')} style={{ background: 'none', border: 'none', cursor: 'pointer', fontSize: 18, color: C.textSub }}>🔔</button>
          <div style={{ width: 28, height: 28, borderRadius: '50%', background: `linear-gradient(135deg, ${C.primary}, ${C.primaryLight})`, display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 16, cursor: 'pointer' }}>👑</div>
        </header>

        {/* Tab strip (38px) */}
        <div style={{ height: 38, borderBottom: `1px solid ${C.borderMed}`, display: 'flex', alignItems: 'flex-end', padding: '0 16px', gap: 0, background: C.surface, flexShrink: 0 }}>
          {tabs.map((t, i) => (
            <TabUnderline key={t} label={t} active={tabIdx === i} onClick={() => setTabIdx(i)} />
          ))}
          <div style={{ flex: 1 }} />
          <button onClick={() => onToast('새 항목을 추가합니다')} style={{ background: C.primary, border: 'none', color: '#fff', borderRadius: 8, padding: '5px 12px', fontSize: 12, fontWeight: 600, cursor: 'pointer', fontFamily: 'inherit', marginBottom: 4 }}>+ 추가</button>
        </div>

        {/* Workspace content */}
        <div key={`${section}-${tabIdx}`} style={{ flex: 1, overflow: 'hidden', display: 'flex', animation: 'fadeIn 300ms ease' }}>
          {renderContent()}
        </div>
      </div>

      {/* Toast */}
      {toast && <Toast message={toast} onClose={() => setToast(null)} />}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
