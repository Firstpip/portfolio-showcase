<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>전자칠판 기술지원 AI 챗봇 — 맞춤 구현 데모</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" rel="stylesheet">
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:'Pretendard',sans-serif;background:#F0F4F8;color:#0F172A;min-height:100vh;}
  ::-webkit-scrollbar{width:6px;height:6px;}
  ::-webkit-scrollbar-track{background:#F0F4F8;}
  ::-webkit-scrollbar-thumb{background:#CBD5E1;border-radius:3px;}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useRef, useEffect } = React;

const COLORS = {
  primary: '#1A56DB',
  secondary: '#1E3A5F',
  accent: '#38BDF8',
  bg: '#F0F4F8',
  surface: '#FFFFFF',
  textPrimary: '#0F172A',
  textSecondary: '#64748B',
  border: '#E2E8F0',
  hover: '#EFF6FF',
  success: '#10B981',
  warning: '#F59E0B',
  error: '#EF4444',
};

// Icons as SVG
const Icon = ({ name, size = 18, color = 'currentColor' }) => {
  const icons = {
    bot: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2"><rect x="3" y="11" width="18" height="10" rx="2"/><circle cx="12" cy="5" r="2"/><path d="M12 7v4"/><line x1="8" y1="16" x2="8" y2="16"/><line x1="16" y1="16" x2="16" y2="16"/></svg>,
    video: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2"><polygon points="23 7 16 12 23 17 23 7"/><rect x="1" y="5" width="15" height="14" rx="2" ry="2"/></svg>,
    file: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>,
    history: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>,
    settings: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2"><circle cx="12" cy="12" r="3"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14M5 12H3M21 12h-2M12 5V3M12 21v-2"/></svg>,
    send: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>,
    search: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>,
    upload: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2"><polyline points="16 16 12 12 8 16"/><line x1="12" y1="12" x2="12" y2="21"/><path d="M20.39 18.39A5 5 0 0 0 18 9h-1.26A8 8 0 1 0 3 16.3"/></svg>,
    play: <svg width={size} height={size} viewBox="0 0 24 24" fill={color} stroke="none"><polygon points="5 3 19 12 5 21 5 3"/></svg>,
    plus: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>,
    edit: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>,
    trash: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4h6v2"/></svg>,
    check: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2.5"><polyline points="20 6 9 17 4 12"/></svg>,
    clock: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>,
    user: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>,
    chevronRight: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2"><polyline points="9 18 15 12 9 6"/></svg>,
    db: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2"><ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M21 12c0 1.66-4 3-9 3s-9-1.34-9-3"/><path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5"/></svg>,
    tag: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2"><path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"/><line x1="7" y1="7" x2="7.01" y2="7"/></svg>,
  };
  return icons[name] || null;
};

// Status Badge
const Badge = ({ status }) => {
  const styles = {
    '완료': { bg: '#DCFCE7', color: '#16A34A' },
    '처리중': { bg: '#FEF3C7', color: '#D97706' },
    '대기': { bg: '#F1F5F9', color: '#64748B' },
    '오류': { bg: '#FEE2E2', color: '#DC2626' },
    '활성': { bg: '#DBEAFE', color: '#1D4ED8' },
    '비활성': { bg: '#F1F5F9', color: '#64748B' },
  };
  const s = styles[status] || styles['대기'];
  return (
    <span style={{
      display:'inline-flex', alignItems:'center', gap:'4px',
      padding:'2px 10px', borderRadius:'20px', fontSize:'12px', fontWeight:'600',
      background: s.bg, color: s.color
    }}>{status}</span>
  );
};

// ─── Chat Screen ───────────────────────────────────────────────────
const ChatScreen = () => {
  const [messages, setMessages] = useState([
    { id:1, role:'assistant', type:'text', text:'안녕하세요! 전자칠판 기술지원 AI 챗봇입니다. 제품 설치, 네트워크 연결, 화면 오류 등 어떤 문제든 도와드리겠습니다.', time:'09:15' },
    { id:2, role:'user', text:'IFP-86 화면이 갑자기 꺼졌다가 켜지는 현상이 반복됩니다.', time:'09:16' },
    { id:3, role:'assistant', type:'complex', time:'09:16',
      text:'IFP-86 화면 깜빡임 현상은 주로 다음 원인으로 발생합니다.',
      items: [
        { label:'1단계', text:'전원 케이블 연결 상태 확인 및 재연결' },
        { label:'2단계', text:'HDMI/DP 신호 케이블 교체 또는 다른 포트 사용' },
        { label:'3단계', text:'설정 > 디스플레이 > 화면 주사율을 60Hz로 고정' },
      ],
      video: { title:'IFP-86 화면 깜빡임 해결 가이드', duration:'3:42', model:'IFP-86' },
      pdf: { title:'IFP 시리즈 화면 장애 매뉴얼', page:'14p' }
    },
    { id:4, role:'user', text:'3단계까지 했는데도 증상이 계속됩니다.', time:'09:18' },
    { id:5, role:'assistant', type:'text', text:'증상이 지속된다면 메인보드 전원부 불량일 가능성이 있습니다. AS 센터 접수를 권장드립니다. 최가까운 서비스센터 안내가 필요하신가요?', time:'09:18' },
  ]);
  const [input, setInput] = useState('');
  const [sessions] = useState([
    { id:1, label:'IFP-86 화면 깜빡임', date:'오늘', count:5, active:true },
    { id:2, label:'네트워크 WiFi 연결 오류', date:'어제', count:3, active:false },
    { id:3, label:'터치 인식 불량 IFP-65', date:'2일 전', count:7, active:false },
    { id:4, label:'소프트웨어 업데이트 실패', date:'3일 전', count:4, active:false },
    { id:5, label:'HDMI 연결 없음 표시', date:'3일 전', count:6, active:false },
  ]);

  const sendMsg = () => {
    if (!input.trim()) return;
    setMessages(prev => [...prev, { id: prev.length+1, role:'user', text:input.trim(), time:new Date().toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit'}) }]);
    const q = input.trim();
    setInput('');
    setTimeout(() => {
      setMessages(prev => [...prev, { id: prev.length+1, role:'assistant', type:'text', text:`"${q}"에 대한 답변을 AS 이력 데이터베이스에서 검색 중입니다. 관련 매뉴얼과 과거 수리 이력을 분석하여 최적의 해결 방법을 안내드리겠습니다.`, time:new Date().toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit'}) }]);
    }, 800);
  };

  return (
    <div style={{display:'flex', height:'100%', gap:'0'}}>
      {/* Session list */}
      <div style={{width:'260px', flexShrink:0, borderRight:`1px solid ${COLORS.border}`, background:COLORS.surface, overflowY:'auto'}}>
        <div style={{padding:'16px', borderBottom:`1px solid ${COLORS.border}`}}>
          <button style={{width:'100%', padding:'9px 14px', background:COLORS.primary, color:'#fff', border:'none', borderRadius:'8px', fontSize:'14px', fontWeight:'600', cursor:'pointer', display:'flex', alignItems:'center', gap:'6px', justifyContent:'center'}}>
            <Icon name="plus" size={15} color="#fff"/> 새 대화 시작
          </button>
        </div>
        <div style={{padding:'8px'}}>
          {sessions.map(s => (
            <div key={s.id} style={{padding:'10px 12px', borderRadius:'8px', marginBottom:'2px', cursor:'pointer', background: s.active ? COLORS.hover : 'transparent', borderLeft: s.active ? `3px solid ${COLORS.primary}` : '3px solid transparent'}}>
              <div style={{fontSize:'13px', fontWeight: s.active ? '600' : '500', color: s.active ? COLORS.primary : COLORS.textPrimary, marginBottom:'3px', whiteSpace:'nowrap', overflow:'hidden', textOverflow:'ellipsis'}}>{s.label}</div>
              <div style={{display:'flex', gap:'8px', fontSize:'11px', color:COLORS.textSecondary}}>
                <span>{s.date}</span><span>·</span><span>메시지 {s.count}개</span>
              </div>
            </div>
          ))}
        </div>
      </div>

      {/* Chat area */}
      <div style={{flex:1, display:'flex', flexDirection:'column', overflow:'hidden'}}>
        {/* Header */}
        <div style={{padding:'14px 20px', borderBottom:`1px solid ${COLORS.border}`, background:COLORS.surface, display:'flex', alignItems:'center', gap:'10px'}}>
          <div style={{width:'36px', height:'36px', borderRadius:'10px', background:`${COLORS.primary}15`, display:'flex', alignItems:'center', justifyContent:'center'}}>
            <Icon name="bot" size={18} color={COLORS.primary}/>
          </div>
          <div>
            <div style={{fontSize:'14px', fontWeight:'700', color:COLORS.textPrimary}}>IFP-86 화면 깜빡임</div>
            <div style={{fontSize:'12px', color:COLORS.success, display:'flex', alignItems:'center', gap:'4px'}}>
              <span style={{width:'6px', height:'6px', borderRadius:'50%', background:COLORS.success, display:'inline-block'}}/>AI 챗봇 응답 준비 중
            </div>
          </div>
          <div style={{marginLeft:'auto', display:'flex', gap:'8px'}}>
            <span style={{fontSize:'12px', color:COLORS.textSecondary, background:COLORS.bg, padding:'4px 10px', borderRadius:'20px'}}>pgvector RAG</span>
            <span style={{fontSize:'12px', color:COLORS.textSecondary, background:COLORS.bg, padding:'4px 10px', borderRadius:'20px'}}>GPT-4o-mini</span>
          </div>
        </div>

        {/* Messages */}
        <div style={{flex:1, overflowY:'auto', padding:'20px'}}>
          {messages.map(msg => (
            <div key={msg.id} style={{marginBottom:'16px', display:'flex', flexDirection: msg.role==='user' ? 'row-reverse' : 'row', gap:'10px', alignItems:'flex-start'}}>
              {msg.role === 'assistant' && (
                <div style={{width:'32px', height:'32px', borderRadius:'10px', background:`${COLORS.primary}15`, display:'flex', alignItems:'center', justifyContent:'center', flexShrink:0}}>
                  <Icon name="bot" size={16} color={COLORS.primary}/>
                </div>
              )}
              <div style={{maxWidth:'70%'}}>
                {msg.type === 'complex' ? (
                  <div>
                    <div style={{background:COLORS.surface, border:`1px solid ${COLORS.border}`, borderRadius:'12px', padding:'14px', marginBottom:'8px'}}>
                      <p style={{fontSize:'14px', marginBottom:'10px'}}>{msg.text}</p>
                      <div style={{display:'flex', flexDirection:'column', gap:'6px'}}>
                        {msg.items.map((item, i) => (
                          <div key={i} style={{display:'flex', gap:'8px', alignItems:'flex-start', padding:'8px', background:COLORS.bg, borderRadius:'8px', fontSize:'13px'}}>
                            <span style={{color:COLORS.primary, fontWeight:'700', fontSize:'11px', background:`${COLORS.primary}15`, padding:'2px 7px', borderRadius:'4px', flexShrink:0}}>{item.label}</span>
                            <span>{item.text}</span>
                          </div>
                        ))}
                      </div>
                    </div>
                    {/* Video attachment */}
                    <div style={{background:'#1E3A5F', borderRadius:'10px', padding:'12px', display:'flex', gap:'10px', alignItems:'center', marginBottom:'6px', cursor:'pointer'}}>
                      <div style={{width:'44px', height:'44px', borderRadius:'8px', background:`${COLORS.accent}30`, display:'flex', alignItems:'center', justifyContent:'center', flexShrink:0}}>
                        <Icon name="play" size={18} color={COLORS.accent}/>
                      </div>
                      <div>
                        <div style={{fontSize:'13px', fontWeight:'600', color:'#F0F4F8', marginBottom:'2px'}}>{msg.video.title}</div>
                        <div style={{fontSize:'11px', color:'#94A3B8', display:'flex', gap:'8px'}}>
                          <span>{msg.video.duration}</span><span>·</span><span>모델: {msg.video.model}</span>
                        </div>
                      </div>
                    </div>
                    {/* PDF attachment */}
                    <div style={{background:COLORS.surface, border:`1px solid ${COLORS.border}`, borderRadius:'10px', padding:'10px', display:'flex', gap:'10px', alignItems:'center', cursor:'pointer'}}>
                      <div style={{width:'36px', height:'36px', borderRadius:'6px', background:'#FEE2E2', display:'flex', alignItems:'center', justifyContent:'center'}}>
                        <Icon name="file" size={16} color="#DC2626"/>
                      </div>
                      <div>
                        <div style={{fontSize:'13px', fontWeight:'600', color:COLORS.textPrimary}}>{msg.pdf.title}</div>
                        <div style={{fontSize:'11px', color:COLORS.textSecondary}}>바로가기: {msg.pdf.page}</div>
                      </div>
                    </div>
                  </div>
                ) : (
                  <div style={{
                    background: msg.role==='user' ? COLORS.primary : COLORS.surface,
                    border: msg.role==='user' ? 'none' : `1px solid ${COLORS.border}`,
                    color: msg.role==='user' ? '#fff' : COLORS.textPrimary,
                    borderRadius: msg.role==='user' ? '12px 12px 4px 12px' : '12px 12px 12px 4px',
                    padding:'10px 14px', fontSize:'14px', lineHeight:'1.6'
                  }}>{msg.text}</div>
                )}
                <div style={{fontSize:'11px', color:COLORS.textSecondary, marginTop:'4px', textAlign: msg.role==='user' ? 'right' : 'left'}}>{msg.time}</div>
              </div>
            </div>
          ))}
        </div>

        {/* Input */}
        <div style={{padding:'16px 20px', borderTop:`1px solid ${COLORS.border}`, background:COLORS.surface}}>
          <div style={{display:'flex', gap:'10px', alignItems:'flex-end'}}>
            <div style={{flex:1, display:'flex', alignItems:'center', border:`1.5px solid ${COLORS.border}`, borderRadius:'12px', padding:'10px 14px', background:COLORS.bg, gap:'8px'}}>
              <input
                value={input}
                onChange={e => setInput(e.target.value)}
                onKeyDown={e => e.key==='Enter' && sendMsg()}
                placeholder="전자칠판 관련 기술 문제를 질문해주세요..."
                style={{flex:1, border:'none', background:'transparent', fontSize:'14px', outline:'none', color:COLORS.textPrimary}}
              />
            </div>
            <button onClick={sendMsg} style={{width:'44px', height:'44px', borderRadius:'12px', background:COLORS.primary, border:'none', cursor:'pointer', display:'flex', alignItems:'center', justifyContent:'center', flexShrink:0}}>
              <Icon name="send" size={18} color="#fff"/>
            </button>
          </div>
          <div style={{display:'flex', gap:'6px', marginTop:'8px', flexWrap:'wrap'}}>
            {['화면이 켜지지 않아요','터치가 안 됩니다','WiFi 연결 문제','소프트웨어 업데이트'].map(q => (
              <button key={q} onClick={() => setInput(q)} style={{padding:'5px 12px', border:`1px solid ${COLORS.border}`, borderRadius:'20px', background:COLORS.surface, fontSize:'12px', color:COLORS.textSecondary, cursor:'pointer'}}>{q}</button>
            ))}
          </div>
        </div>
      </div>
    </div>
  );
};

// ─── Video Library Screen ───────────────────────────────────────────
const VideoLibraryScreen = () => {
  const [filter, setFilter] = useState('전체');
  const [search, setSearch] = useState('');
  const filters = ['전체','설치/세팅','네트워크','화면/디스플레이','터치','소프트웨어','음향'];
  const videos = [
    { id:1, title:'IFP-86 초기 설치 및 벽면 마운트 가이드', model:'IFP-86', cat:'설치/세팅', dur:'6:14', tags:['설치','마운트','벽면고정'], thumb:'#1A56DB' },
    { id:2, title:'전자칠판 WiFi 연결 및 네트워크 설정', model:'전체', cat:'네트워크', dur:'4:31', tags:['WiFi','네트워크','IP설정'], thumb:'#0369A1' },
    { id:3, title:'IFP-75 화면 깜빡임 원인 및 해결 방법', model:'IFP-75', cat:'화면/디스플레이', dur:'3:42', tags:['화면','깜빡임','HDMI'], thumb:'#1D4ED8' },
    { id:4, title:'터치 펜 감도 조정 및 캘리브레이션', model:'전체', cat:'터치', dur:'2:55', tags:['터치','펜','캘리브레이션'], thumb:'#0E7490' },
    { id:5, title:'스마트보드 OS 업데이트 절차 안내', model:'전체', cat:'소프트웨어', dur:'5:08', tags:['업데이트','OS','펌웨어'], thumb:'#1E40AF' },
    { id:6, title:'IFP-65 스피커 음질 개선 설정 방법', model:'IFP-65', cat:'음향', dur:'2:17', tags:['음향','스피커','볼륨'], thumb:'#1D4ED8' },
    { id:7, title:'HDMI·DP 외부 입력 소스 전환 가이드', model:'전체', cat:'화면/디스플레이', dur:'3:20', tags:['HDMI','DP','외부입력'], thumb:'#075985' },
    { id:8, title:'전자칠판 절전 모드 해제 및 설정', model:'전체', cat:'설치/세팅', dur:'1:58', tags:['절전','설정','대기'], thumb:'#1E3A5F' },
  ];
  const filtered = videos.filter(v => (filter==='전체' || v.cat===filter) && (v.title.includes(search) || v.tags.some(t => t.includes(search))));

  return (
    <div style={{padding:'24px', overflowY:'auto', height:'100%'}}>
      <div style={{display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:'20px'}}>
        <div>
          <h2 style={{fontSize:'20px', fontWeight:'700', color:COLORS.textPrimary, marginBottom:'4px'}}>동영상 라이브러리 검색</h2>
          <p style={{fontSize:'13px', color:COLORS.textSecondary}}>제품 모델, 증상, 키워드로 기술지원 영상을 검색합니다</p>
        </div>
        <span style={{fontSize:'13px', color:COLORS.textSecondary, background:COLORS.bg, padding:'6px 12px', borderRadius:'8px', border:`1px solid ${COLORS.border}`}}>총 {filtered.length}개 영상</span>
      </div>

      {/* Search */}
      <div style={{display:'flex', gap:'10px', marginBottom:'16px'}}>
        <div style={{flex:1, display:'flex', alignItems:'center', border:`1.5px solid ${COLORS.border}`, borderRadius:'10px', padding:'10px 14px', background:COLORS.surface, gap:'8px'}}>

              <div style={{maxWidth:'65%', background: m.role==='user' ? COLORS.primary : COLORS.surface, color: m.role==='user' ? '#fff' : COLORS.textPrimary, border: m.role==='user' ? 'none' : `1px solid ${COLORS.border}`, borderRadius:'10px', padding:'10px 14px', fontSize:'13px', lineHeight:'1.6'}}>
                {m.text}
                <div style={{fontSize:'10px', marginTop:'4px', opacity:0.7}}>{m.time}</div>
              </div>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
};
