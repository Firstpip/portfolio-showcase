<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>전자칠판 기술지원 플랫폼 — 구현 데모</title>
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" rel="stylesheet">
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:'Pretendard',sans-serif;background:#0F172A;color:#F1F5F9;min-height:100vh;}
  ::-webkit-scrollbar{width:5px;height:5px;}
  ::-webkit-scrollbar-track{background:#0F172A;}
  ::-webkit-scrollbar-thumb{background:#334155;border-radius:3px;}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef } = React;

const C = {
  primary: '#6366F1',
  secondary: '#1E293B',
  accent: '#10B981',
  bg: '#0F172A',
  surface: '#1E293B',
  surface2: '#263451',
  textPrimary: '#F1F5F9',
  textSecondary: '#94A3B8',
  border: '#334155',
  warning: '#F59E0B',
  error: '#EF4444',
  blue: '#38BDF8',
  purple: '#A78BFA',
};

const Icon = ({ name, size=18, color='currentColor' }) => {
  const icons = {
    chart: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/><line x1="2" y1="20" x2="22" y2="20"/></svg>,
    db: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2"><ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M21 12c0 1.66-4 3-9 3s-9-1.34-9-3"/><path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5"/></svg>,
    star: <svg width={size} height={size} viewBox="0 0 24 24" fill={color} stroke="none"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>,
    grid: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>,
    report: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>,
    search: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>,
    key: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2"><path d="M21 2l-2 2m-7.61 7.61a5.5 5.5 0 1 1-7.778 7.778 5.5 5.5 0 0 1 7.777-7.777zm0 0L15.5 7.5m0 0l3 3L22 7l-3-3m-3.5 3.5L19 4"/></svg>,
    check: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2.5"><polyline points="20 6 9 17 4 12"/></svg>,
    x: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>,
    refresh: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>,
    plus: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>,
    thumbUp: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2"><path d="M14 9V5a3 3 0 0 0-3-3l-4 9v11h11.28a2 2 0 0 0 2-1.7l1.38-9a2 2 0 0 0-2-2.3zM7 22H4a2 2 0 0 1-2-2v-7a2 2 0 0 1 2-2h3"/></svg>,
    thumbDown: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2"><path d="M10 15v4a3 3 0 0 0 3 3l4-9V2H5.72a2 2 0 0 0-2 1.7l-1.38 9a2 2 0 0 0 2 2.3zm7-13h2.67A2.31 2.31 0 0 1 22 4v7a2.31 2.31 0 0 1-2.33 2H17"/></svg>,
    filter: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2"><polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/></svg>,
    copy: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>,
    alert: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>,
    tag: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2"><path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"/><line x1="7" y1="7" x2="7.01" y2="7"/></svg>,
  };
  return icons[name] || null;
};

const Stat = ({ label, value, sub, color, icon }) => (
  <div style={{background:C.surface, border:`1px solid ${C.border}`, borderRadius:'12px', padding:'18px', position:'relative', overflow:'hidden'}}>
    <div style={{position:'absolute', top:0, left:0, right:0, height:'3px', background:color}}/>
    <div style={{display:'flex', justifyContent:'space-between', alignItems:'flex-start', marginBottom:'10px'}}>
      <div style={{fontSize:'13px', color:C.textSecondary}}>{label}</div>
      <div style={{opacity:0.3}}><Icon name={icon} size={20} color={color}/></div>
    </div>
    <div style={{fontSize:'26px', fontWeight:'800', color:value === '−' ? C.textSecondary : C.textPrimary, marginBottom:'4px', letterSpacing:'-0.5px'}}>{value}</div>
    <div style={{fontSize:'12px', color:C.textSecondary}}>{sub}</div>
  </div>
);

// ─── Dashboard Screen ───────────────────────────────────────────────
const DashboardScreen = () => {
  const areaRef = useRef(); const barRef = useRef(); const doughnutRef = useRef();
  useEffect(() => {
    if (typeof Chart === 'undefined') return;
    const a = new Chart(areaRef.current, { type:'line',
      data:{ labels:['1월','2월','3월','4월','5월','6월'],
        datasets:[
          { label:'IFP-86', data:[312,378,421,389,445,510], borderColor:'#6366F1', backgroundColor:'rgba(99,102,241,0.08)', fill:true, tension:0.4 },
          { label:'IFP-75', data:[187,204,231,267,290,312], borderColor:'#10B981', backgroundColor:'rgba(16,185,129,0.06)', fill:true, tension:0.4 },
          { label:'IFP-65', data:[94,112,134,156,178,203], borderColor:'#38BDF8', backgroundColor:'rgba(56,189,248,0.05)', fill:true, tension:0.4 },
        ]},
      options:{ responsive:true, maintainAspectRatio:false, plugins:{ legend:{ labels:{color:C.textSecondary, font:{size:11}} } },
        scales:{ x:{ticks:{color:C.textSecondary}, grid:{color:'rgba(255,255,255,0.04)'}}, y:{ticks:{color:C.textSecondary}, grid:{color:'rgba(255,255,255,0.04)'}} } }
    });
    const b = new Chart(barRef.current, { type:'bar',
      data:{ labels:['화면 불량','네트워크','터치 이슈','소프트웨어','전원 문제'],
        datasets:[{ label:'문의 수', data:[482,391,315,278,224], backgroundColor:['#6366F1','#10B981','#38BDF8','#A78BFA','#F59E0B'], borderRadius:6 }]},
      options:{ responsive:true, maintainAspectRatio:false, plugins:{ legend:{display:false} },
        scales:{ x:{ticks:{color:C.textSecondary}, grid:{display:false}}, y:{ticks:{color:C.textSecondary}, grid:{color:'rgba(255,255,255,0.04)'}} } }
    });
    const d = new Chart(doughnutRef.current, { type:'doughnut',
      data:{ labels:['자동처리','부분지원','수동처리'],
        datasets:[{ data:[73,14,13], backgroundColor:['#6366F1','#F59E0B','#EF4444'], borderWidth:0, borderRadius:4 }]},
      options:{ responsive:true, maintainAspectRatio:false, cutout:'72%',
        plugins:{ legend:{ position:'bottom', labels:{color:C.textSecondary, font:{size:11}, padding:12} } } }
    });
    return () => { a.destroy(); b.destroy(); d.destroy(); };
  }, []);

  const top10 = [
    { rank:1, symptom:'화면 깜빡임/잔상', model:'IFP-86', count:127, trend:'+12%' },
    { rank:2, symptom:'WiFi 자동 연결 안 됨', model:'전체', count:98, trend:'+5%' },
    { rank:3, symptom:'터치 인식 불량', model:'IFP-75', count:87, trend:'-3%' },
    { rank:4, symptom:'OS 업데이트 실패', model:'전체', count:74, trend:'+8%' },
    { rank:5, symptom:'HDMI 신호 없음', model:'IFP-65', count:61, trend:'+1%' },
  ];

  return (
    <div style={{padding:'24px', overflowY:'auto', height:'100%'}}>
      {/* KPI Cards */}
      <div style={{display:'grid', gridTemplateColumns:'repeat(4,1fr)', gap:'14px', marginBottom:'24px'}}>
        <Stat label="이번 달 총 문의" value="4,281" sub="전월 대비 +8.3%" color={C.primary} icon="chart"/>
        <Stat label="자동 처리율" value="87.3%" sub="목표: 85% 달성" color={C.accent} icon="check"/>
        <Stat label="평균 답변 품질" value="4.2 / 5" sub="피드백 1,847건" color={C.blue} icon="star"/>
        <Stat label="미해결 문의" value="92건" sub="검토 대기 14건" color={C.warning} icon="alert"/>
      </div>

      {/* Charts row 1 */}
      <div style={{display:'grid', gridTemplateColumns:'2fr 1fr', gap:'16px', marginBottom:'16px'}}>
        <div style={{background:C.surface, borderRadius:'12px', border:`1px solid ${C.border}`, padding:'20px'}}>
          <div style={{display:'flex', justifyContent:'space-between', marginBottom:'16px'}}>
            <div>
              <div style={{fontSize:'14px', fontWeight:'700', color:C.textPrimary, marginBottom:'2px'}}>모델별 월별 문의량 추이</div>
              <div style={{fontSize:'12px', color:C.textSecondary}}>최근 6개월</div>
            </div>
            <div style={{display:'flex', gap:'6px'}}>
              {['1M','3M','6M'].map(t => <button key={t} style={{padding:'4px 10px', border:`1px solid ${C.border}`, borderRadius:'6px', background: t==='6M' ? C.primary : 'transparent', color: t==='6M' ? '#fff' : C.textSecondary, fontSize:'11px', cursor:'pointer'}}>{t}</button>)}
            </div>
          </div>
          <div style={{height:'220px'}}><canvas ref={areaRef}/></div>
        </div>
        <div style={{background:C.surface, borderRadius:'12px', border:`1px solid ${C.border}`, padding:'20px'}}>
          <div style={{fontSize:'14px', fontWeight:'700', color:C.textPrimary, marginBottom:'4px'}}>처리 유형 분포</div>
          <div style={{fontSize:'12px', color:C.textSecondary, marginBottom:'16px'}}>이번 달 기준</div>
          <div style={{height:'220px'}}><canvas ref={doughnutRef}/></div>
        </div>
      </div>

      {/* Charts row 2 */}
      <div style={{display:'grid', gridTemplateColumns:'1fr 1fr', gap:'16px'}}>
        <div style={{background:C.surface, borderRadius:'12px', border:`1px solid ${C.border}`, padding:'20px'}}>
          <div style={{fontSize:'14px', fontWeight:'700', color:C.textPrimary, marginBottom:'4px'}}>증상 유형별 문의 TOP 5</div>
          <div style={{fontSize:'12px', color:C.textSecondary, marginBottom:'16px'}}>누적 기준</div>
          <div style={{height:'200px'}}><canvas ref={barRef}/></div>
        </div>
        <div style={{background:C.surface, borderRadius:'12px', border:`1px solid ${C.border}`, padding:'20px'}}>
          <div style={{fontSize:'14px', fontWeight:'700', color:C.textPrimary, marginBottom:'16px'}}>인기 증상 TOP 5</div>
          <div style={{display:'flex', flexDirection:'column', gap:'8px'}}>
            {top10.map(r => (
              <div key={r.rank} style={{display:'flex', alignItems:'center', gap:'10px', padding:'8px', borderRadius:'8px', background:'rgba(255,255,255,0.03)'}}>
                <span style={{width:'22px', height:'22px', borderRadius:'6px', background: r.rank<=3 ? C.primary : C.surface2, color: r.rank<=3 ? '#fff' : C.textSecondary, fontSize:'11px', fontWeight:'700', display:'flex', alignItems:'center', justifyContent:'center', flexShrink:0}}>{r.rank}</span>
                <div style={{flex:1}}>
                  <div style={{fontSize:'13px', fontWeight:'600', color:C.textPrimary}}>{r.symptom}</div>
                  <div style={{fontSize:'11px', color:C.textSecondary}}>{r.model}</div>
                </div>
                <div style={{textAlign:'right'}}>
                  <div style={{fontSize:'14px', fontWeight:'700', color:C.textPrimary}}>{r.count}</div>
                  <div style={{fontSize:'11px', color: r.trend.startsWith('+') ? C.accent : C.error}}>{r.trend}</div>
                </div>
              </div>
            ))}
          </div>
        </div>
      </div>
    </div>
  );
};

// ─── Vector DB Screen ───────────────────────────────────────────────
const VectorDBScreen = () => {
  const [query, setQuery] = useState('');
  const [results, setResults] = useState(null);
  const [loading, setLoading] = useState(false);

  const mockSearch = () => {
    if (!query.trim()) return;
    setLoading(true);
    setResults(null);
    setTimeout(() => {
      setResults([
        { id:'chunk_2847', doc:'IFP_시리즈_설치_매뉴얼_v3.2.pdf', page:14, score:0.924, text:'화면 깜빡임 현상은 HDMI 케이블의 신호 불안정 또는 디스플레이 드라이버 오류로 발생할 수 있습니다. 케이블 교체 후에도 증상이 지속되면...' },
        { id:'chunk_1203', doc:'AS_이력_2026Q1.json', page:null, score:0.887, text:'[IFP-86 AS이력 #2024-0847] 증상: 화면 깜빡임 반복. 조치: 메인보드 전원부 교체. 부품코드: MB-IFP86-PWR-V2' },
        { id:'chunk_0891', doc:'네트워크_설정_가이드_v2.pdf', page:8, score:0.712, text:'디스플레이 해상도 및 주사율 설정에서 화면 안정성 관련 옵션을 확인하고 권장값(60Hz, 1920x1080)으로 설정하세요.' },
      ]);
      setLoading(false);
    }, 1200);
  };

  const docs = [
    { name:'IFP_시리즈_설치_매뉴얼_v3.2.pdf', chunks:142, model:'IFP-86/75/65', updated:'2시간 전', type:'PDF' },
    { name:'AS_이력_2026Q1.json', chunks:318, model:'전체', updated:'1일 전', type:'JSON' },
    { name:'네트워크_설정_가이드_v2.pdf', chunks:87, model:'전체', updated:'3일 전', type:'PDF' },
    { name:'소프트웨어_업데이트_매뉴얼.pdf', chunks:89, model:'전체', updated:'7일 전', type:'PDF' },
    { name:'터치_캘리브레이션_가이드.pdf', chunks:45, model:'전체', updated:'14일 전', type:'PDF' },
  ];

  return (
    <div style={{padding:'24px', overflowY:'auto', height:'100%'}}>
      <div style={{marginBottom:'20px'}}>
        <h2 style={{fontSize:'20px', fontWeight:'700', color:C.textPrimary, marginBottom:'4px'}}>Vector DB 관리 UI</h2>
        <p style={{fontSize:'13px', color:C.textSecondary}}>pgvector 색인 현황 조회 및 실시간 유사도 검색 테스트</p>
      </div>

      {/* Stats */}
      <div style={{display:'grid', gridTemplateColumns:'repeat(4,1fr)', gap:'12px', marginBottom:'20px'}}>
        {[
          { label:'총 색인 청크', value:'2,847', color:C.primary },
          { label:'색인 문서', value:'5개', color:C.accent },
          { label:'평균 유사도 점수', value:'0.847', color:C.blue },
          { label:'인덱스 타입', value:'ivfflat', color:C.purple },
        ].map(s => (
          <div key={s.label} style={{background:C.surface, border:`1px solid ${C.border}`, borderRadius:'10px', padding:'14px', textAlign:'center'}}>
            <div style={{fontSize:'20px', fontWeight:'800', color:s.color, marginBottom:'4px'}}>{s.value}</div>
            <div style={{fontSize:'12px', color:C.textSecondary}}>{s.label}</div>
          </div>
        ))}
      </div>

      <div style={{display:'grid', gridTemplateColumns:'1fr 1fr', gap:'16px'}}>
        {/* Search console */}
        <div style={{background:C.surface, border:`1px solid ${C.border}`, borderRadius:'12px', padding:'20px'}}>
          <div style={{fontSize:'14px', fontWeight:'700', color:C.textPrimary, marginBottom:'14px', display:'flex', alignItems:'center', gap:'8px'}}>
            <Icon name="search" size={16} color={C.primary}/>
            유사도 검색 테스트 콘솔
          </div>
          <div style={{display:'flex', gap:'8px', marginBottom:'12px'}}>
            <input value={query} onChange={e=>setQuery(e.target.value)} onKeyDown={e=>e.key==='Enter'&&mockSearch()} placeholder="검색할 자연어 쿼리를 입력하세요..." style={{flex:1, padding:'9px 12px', background:'rgba(255,255,255,0.05)', border:`1px solid ${C.border}`, borderRadius:'8px', color:C.textPrimary, fontSize:'13px', outline:'none'}}/>
            <button onClick={mockSearch} style={{padding:'9px 14px', background:C.primary, border:'none', borderRadius:'8px', color:'#fff', fontSize:'13px', cursor:'pointer', fontWeight:'600'}}>검색</button>
          </div>
          <div style={{display:'flex', gap:'6px', marginBottom:'14px', flexWrap:'wrap'}}>
            {['화면 깜빡임','WiFi 연결 안됨','터치 캘리브레이션'].map(q => (
              <button key={q} onClick={()=>{ setQuery(q); }} style={{padding:'4px 10px', border:`1px solid ${C.border}`, borderRadius:'20px', background:'transparent', color:C.textSecondary, fontSize:'11px', cursor:'pointer'}}>{q}</button>
            ))}
          </div>
          {loading && (
            <div style={{textAlign:'center', padding:'20px', color:C.textSecondary, fontSize:'13px'}}>
              <div style={{marginBottom:'6px', color:C.primary}}>● pgvector 검색 중...</div>
              embedding 생성 → cosine distance 계산 중
            </div>
          )}
          {results && (
            <div>
              <div style={{fontSize:'12px', color:C.textSecondary, marginBottom:'8px'}}>Top-3 결과 (쿼리: "{query}")</div>
              {results.map((r,i) => (
                <div key={i} style={{background:'rgba(255,255,255,0.04)', border:`1px solid ${C.border}`, borderRadius:'8px', padding:'12px', marginBottom:'8px'}}>
                  <div style={{display:'flex', justifyContent:'space-between', marginBottom:'6px'}}>
                    <span style={{fontSize:'11px', color:C.primary, fontWeight:'600'}}>{r.id}</span>
                    <span style={{fontSize:'12px', fontWeight:'700', color: r.score > 0.9 ? C.accent : r.score > 0.8 ? C.blue : C.textSecondary}}>유사도 {r.score.toFixed(3)}</span>
                  </div>
                  <div style={{fontSize:'11px', color:C.textSecondary, marginBottom:'4px'}}>{r.doc}{r.page ? ` · p.${r.page}` : ''}</div>
                  <div style={{fontSize:'12px', color:C.textPrimary, lineHeight:'1.5', display:'-webkit-box', WebkitLineClamp:2, WebkitBoxOrient:'vertical', overflow:'hidden'}}>{r.text}</div>
                </div>
              ))}
            </div>
          )}
          {!results && !loading && (
            <div style={{textAlign:'center', padding:'24px', color:C.textSecondary, fontSize:'13px', border:`1px dashed ${C.border}`, borderRadius:'8px'}}>
              쿼리를 입력하고 검색하면 pgvector<br/>유사도 결과가 표시됩니다
            </div>
          )}
        </div>

        {/* Index table */}
        <div style={{background:C.surface, border:`1px solid ${C.border}`, borderRadius:'12px', padding:'20px'}}>
          <div style={{display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:'14px'}}>
            <div style={{fontSize:'14px', fontWeight:'700', color:C.textPrimary}}>색인 문서 목록</div>

          { title:'자동화율 성장', value:'87.3%', delta:'+6.1%p', desc:'1월 대비 6.1%p 향상', color:C.accent },
          { title:'총 처리 문의', value:'14,847건', delta:'이번 달 4,281건', desc:'누적 처리량', color:C.primary },
          { title:'미해결 감소', value:'92건', delta:'1월 대비 -34%', desc:'잔존 미해결 문의', color:C.blue },
        ].map(s => (
          <div key={s.title} style={{background:C.surface, border:`1px solid ${C.border}`, borderRadius:'12px', padding:'18px'}}>
            <div style={{fontSize:'13px', color:C.textSecondary, marginBottom:'8px'}}>{s.title}</div>
            <div style={{fontSize:'26px', fontWeight:'800', color:s.color, marginBottom:'4px'}}>{s.value}</div>
            <div style={{fontSize:'12px', color:C.textSecondary}}>{s.desc}</div>
            <div style={{fontSize:'12px', color:C.accent, marginTop:'4px', fontWeight:'600'}}>{s.delta}</div>
          </div>
        ))}
      </div>

      <div style={{display:'grid', gridTemplateColumns:'1fr 1fr', gap:'16px', marginBottom:'16px'}}>
        <div style={{background:C.surface, border:`1px solid ${C.border}`, borderRadius:'12px', padding:'20px'}}>
          <div style={{fontSize:'14px', fontWeight:'700', color:C.textPrimary, marginBottom:'14px'}}>핵심 지표 추이 (4개월)</div>
          <div style={{height:'200px'}}><canvas ref={lineRef}/></div>
        </div>
        <div style={{background:C.surface, border:`1px solid ${C.border}`, borderRadius:'12px', padding:'20px'}}>
          <div style={{fontSize:'14px', fontWeight:'700', color:C.textPrimary, marginBottom:'14px'}}>색인 커버리지 현황</div>
          {[
            { label:'IFP-86 시리즈', pct:92, color:C.primary },
            { label:'IFP-75 시리즈', pct:85, color:C.accent },
            { label:'IFP-65 시리즈', pct:78, color:C.blue },
            { label:'IST-65 터치', pct:42, color:C.warning },
          ].map(r => (
            <div key={r.label} style={{marginBottom:'14px'}}>
              <div style={{display:'flex', justifyContent:'space-between', fontSize:'13px', marginBottom:'5px', fontWeight:'600'}}>
                <span style={{color:C.textPrimary}}>{r.label}</span>
                <span style={{color:r.color}}>{r.pct}%</span>
              </div>
              <div style={{height:'8px', borderRadius:'4px', background:'rgba(255,255,255,0.06)', overflow:'hidden'}}>
                <div style={{width:`${r.pct}%`, height:'100%', background:r.color, borderRadius:'4px'}}/>
              </div>
            </div>
          ))}
        </div>
      </div>

      {/* Improvement priority */}
      <div style={{background:C.surface, border:`1px solid ${C.border}`, borderRadius:'12px', overflow:'hidden'}}>
        <div style={{padding:'14px 16px', borderBottom:`1px solid ${C.border}`}}>
          <div style={{fontSize:'14px', fontWeight:'700', color:C.textPrimary}}>개선 우선순위 <span style={{fontSize:'12px', color:C.textSecondary, fontWeight:'400', marginLeft:'6px'}}>낮은 품질 답변 분석 기반 자동 도출</span></div>
        </div>
        <table style={{width:'100%', borderCollapse:'collapse'}}>
          <thead>
            <tr style={{background:'rgba(255,255,255,0.03)'}}>
              {['우선순위','개선 항목','예상 임팩트','투입 노력','상태'].map(h => (
                <th key={h} style={{padding:'10px 14px', textAlign:'left', fontSize:'12px', fontWeight:'700', color:C.textSecondary, borderBottom:`1px solid ${C.border}`}}>{h}</th>
              ))}
            </tr>
          </thead>
          <tbody>
            {improvements.map((r,i) => (
              <tr key={r.priority} style={{borderBottom: i<improvements.length-1 ? `1px solid ${C.border}` : 'none'}}>
                <td style={{padding:'12px 14px'}}>
                  <span style={{width:'26px', height:'26px', borderRadius:'6px', background: r.priority<=2 ? C.primary : C.surface2, color: r.priority<=2 ? '#fff' : C.textSecondary, fontSize:'12px', fontWeight:'800', display:'inline-flex', alignItems:'center', justifyContent:'center'}}>P{r.priority}</span>
                </td>
                <td style={{padding:'12px 14px', fontSize:'13px', fontWeight:'600', color:C.textPrimary}}>{r.title}</td>
                <td style={{padding:'12px 14px'}}>
                  <span style={{fontSize:'12px', padding:'3px 8px', borderRadius:'4px', background: r.impact==='높음' ? 'rgba(99,102,241,0.15)' : 'rgba(245,158,11,0.15)', color: r.impact==='높음' ? C.primary : C.warning, fontWeight:'600'}}>{r.impact}</span>
                </td>
                <td style={{padding:'12px 14px', fontSize:'13px', color:C.textSecondary}}>{r.effort}</td>
                <td style={{padding:'12px 14px'}}>
                  <span style={{fontSize:'12px', padding:'3px 8px', borderRadius:'4px', background: r.status==='예정' ? 'rgba(16,185,129,0.15)' : 'rgba(56,189,248,0.15)', color: r.status==='예정' ? C.accent : C.blue, fontWeight:'600'}}>{r.status}</span>
                </td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>
    </div>
  );
};

          <div style={{display:'flex', alignItems:'center', gap:'10px'}}>
            <span style={{fontSize:'12px', color:C.accent, display:'flex', alignItems:'center', gap:'4px'}}>

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
