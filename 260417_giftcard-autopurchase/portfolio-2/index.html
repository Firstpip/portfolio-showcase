    '성공': { bg: 'rgba(16,185,129,0.15)', color: '#34D399', text: '성공' },
    '실패': { bg: 'rgba(244,63,94,0.15)', color: '#FB7185', text: '실패' },
    '검증중': { bg: 'rgba(99,102,241,0.15)', color: '#818CF8', text: '검증중' },
    '대기': { bg: 'rgba(245,158,11,0.15)', color: '#FCD34D', text: '대기' },
  };
  const s = MAP[status] || { bg: 'rgba(255,255,255,0.1)', color: '#94A3B8', text: status };
  return (
    <span style={{ background: s.bg, color: s.color, padding: '3px 10px', borderRadius: 20, fontSize: 12, fontWeight: 600 }}>
      {s.text}
    </span>
  );
}

function CountUp({ end, suffix = '', prefix = '' }) {
  const [val, setVal] = useState(0);
  useEffect(() => {
    let start = 0;
    const step = end / (1200 / 16);
    const timer = setInterval(() => {
      start += step;
      if (start >= end) { setVal(end); clearInterval(timer); }
      else setVal(Math.floor(start));
    }, 16);
    return () => clearInterval(timer);
  }, [end]);
  return <span>{prefix}{val.toLocaleString()}{suffix}</span>;
}

function Toast({ message, onClose }) {
  useEffect(() => { const t = setTimeout(onClose, 3000); return () => clearTimeout(t); }, []);
  return (
    <div style={{
      position: 'fixed', bottom: 28, right: 28, zIndex: 9999,
      background: C.surface2, color: C.text, padding: '12px 20px',
      borderRadius: 10, animation: 'slideUp 300ms ease',
      boxShadow: '0 4px 24px rgba(0,0,0,0.5)', fontSize: 14, fontWeight: 500,
      display: 'flex', alignItems: 'center', gap: 8, border: `1px solid ${C.border}`,
    }}>
      <span>✅</span> {message}
    </div>
  );
}

}

      <div style={{ display: 'flex', gap: 10, marginBottom: 20 }}>
        <button onClick={() => setToast('일괄 정산이 처리되었습니다. 미지급액 전액이 각 계좌로 즉시 이체됩니다.')} style={{
          padding: '10px 20px', borderRadius: 8, border: 'none',
          background: '#F59E0B', color: '#fff', fontWeight: 700, fontSize: 13, cursor: 'pointer', fontFamily: 'inherit',
          display: 'flex', alignItems: 'center', gap: 8,
        }}>💰 미지급 전체 정산 ({pending.length}건)</button>
        <button style={{
          padding: '10px 20px', borderRadius: 8, border: `1px solid ${C.border}`,
          background: 'transparent', color: C.textSec, fontWeight: 600, fontSize: 13, cursor: 'pointer', fontFamily: 'inherit',
        }}>📥 CSV 내보내기</button>
      </div>

      {/* 정산 목록 */}
      <div style={{ background: C.surface, borderRadius: 16, border: `1px solid ${C.border}`, overflow: 'hidden' }}>
        <table style={{ width: '100%', borderCollapse: 'collapse' }}>
          <thead>
            <tr style={{ background: C.surface2 }}>
              {['정산 ID', '사용자', '총 매입액', '지급 완료', '미지급 잔액', '최종 신청일', '상태', ''].map(h => (
                <th key={h} style={{ padding: '12px 16px', textAlign: 'left', fontSize: 11, color: C.textSec, fontWeight: 700, letterSpacing: '0.05em', textTransform: 'uppercase', whiteSpace: 'nowrap' }}>{h}</th>
              ))}
            </tr>
          </thead>
          <tbody>
            {SETTLEMENTS.map((s, i) => (
              <tr key={s.id} onClick={() => setDrawer({ item: s, type: 'settlement' })} style={{
                borderBottom: `1px solid ${C.border}`, cursor: 'pointer', transition: 'all 150ms',
                animation: `slideUp 300ms ease ${i*50}ms both`,
              }}
              onMouseEnter={e => { e.currentTarget.style.background = C.surface2; e.currentTarget.style.borderLeft = `3px solid ${C.accent}`; }}
              onMouseLeave={e => { e.currentTarget.style.background = 'transparent'; e.currentTarget.style.borderLeft = '3px solid transparent'; }}>
                <td style={{ padding: '14px 16px', fontSize: 12, fontWeight: 600, color: C.secondary }}>{s.id}</td>
                <td style={{ padding: '14px 16px' }}>
                  <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
                    <div style={{ width: 28, height: 28, borderRadius: '50%', background: `linear-gradient(135deg, ${C.accent}, ${C.success})`, display: 'flex', alignItems: 'center', justifyContent: 'center', color: '#fff', fontSize: 12, fontWeight: 700 }}>{s.user[0]}</div>
                    <div>
                      <div style={{ fontSize: 13, color: C.text, fontWeight: 600 }}>{s.user}</div>
                      <div style={{ fontSize: 11, color: C.textSec }}>{s.userId}</div>
                    </div>
                  </div>
                </td>
                <td style={{ padding: '14px 16px', fontSize: 13, fontWeight: 600, color: C.text, whiteSpace: 'nowrap' }}>{s.totalAmount.toLocaleString()}원</td>
                <td style={{ padding: '14px 16px', fontSize: 13, color: '#34D399', fontWeight: 600, whiteSpace: 'nowrap' }}>{s.paid.toLocaleString()}원</td>
                <td style={{ padding: '14px 16px', fontSize: 13, fontWeight: 700, color: s.unpaid > 0 ? '#FCD34D' : C.textSec, whiteSpace: 'nowrap' }}>
                  {s.unpaid > 0 ? s.unpaid.toLocaleString() + '원' : '-'}
                </td>
                <td style={{ padding: '14px 16px', fontSize: 12, color: C.textSec }}>{s.lastDate}</td>
                <td style={{ padding: '14px 16px' }}><Badge status={s.status} /></td>
                <td style={{ padding: '14px 16px' }}>
                  <span style={{ fontSize: 12, color: C.secondary }}>상세 →</span>
                </td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>
    </div>
  );
}

// ─── 앱 루트 ─────────────────────────────────────────
function App() {
  const [tab, setTab] = useState('dashboard');
  const [drawer, setDrawer] = useState(null);
  const [contentKey, setContentKey] = useState(0);
  const [toast, setToast] = useState(null);
  const [notifCount, setNotifCount] = useState(3);

  const handleTabChange = (t) => { setTab(t); setContentKey(k => k + 1); };

  const handleAction = (action, item) => {
    setDrawer(null);
    if (action === 'approve') setToast(`${item.id} 입금 처리 완료. ${item.payout.toLocaleString()}원 지급됩니다.`);
    else if (action === 'reject') setToast(`${item.id} 반려 처리되었습니다.`);
    else if (action === 'save-giftcard') setToast(`${item.name} 수수료 설정이 저장되었습니다.`);
    else if (action === 'settle') setToast(`${item.user} 정산 완료. ${item.unpaid.toLocaleString()}원 즉시 이체됩니다.`);
  };

  const meta = PAGE_META[tab];

  const renderContent = () => {
    switch (tab) {
      case 'dashboard': return <DashboardTab setDrawer={setDrawer} />;
      case 'purchase': return <PurchaseTab setDrawer={setDrawer} />;
      case 'giftcard': return <GiftcardTab setDrawer={setDrawer} />;
      case 'settlement': return <SettlementTab setDrawer={setDrawer} />;
      default: return null;
    }
  };

  return (
    <div style={{ display: 'flex', flexDirection: 'column', width: '100%', minHeight: '100vh', background: C.bg }}>
      {toast && <Toast message={toast} onClose={() => setToast(null)} />}

      {/* 상단 네비게이션 */}
      <header style={{
        position: 'sticky', top: 0, zIndex: 100,
        background: C.surface, borderBottom: `1px solid ${C.border}`,
        display: 'flex', alignItems: 'center', height: 56, padding: '0 24px', gap: 4,
      }}>
        {/* 로고 */}
        <div style={{ display: 'flex', alignItems: 'center', gap: 10, marginRight: 20, flexShrink: 0 }}>
          <div style={{
            width: 32, height: 32, borderRadius: 8,
            background: `linear-gradient(135deg, ${C.primary}, ${C.accent})`,
            display: 'flex', alignItems: 'center', justifyContent: 'center',
            fontSize: 16, fontWeight: 800, color: '#fff',
          }}>핀</div>
          <div style={{ fontSize: 14, fontWeight: 700, color: C.text }}>
            핀페이 <span style={{ color: C.textSec, fontWeight: 400 }}>어드민</span>
          </div>
        </div>

        {/* 탭 */}
        {TABS.map(t => (
          <button key={t.id} onClick={() => handleTabChange(t.id)} style={{
            display: 'flex', alignItems: 'center', gap: 6, padding: '8px 16px',
            border: 'none', background: tab === t.id ? 'rgba(99,102,241,0.15)' : 'transparent',
            color: tab === t.id ? C.secondary : C.textSec,
            fontWeight: tab === t.id ? 700 : 400, fontSize: 14, cursor: 'pointer', fontFamily: 'inherit',
            borderRadius: 8, transition: 'all 150ms',
          }}
          onMouseEnter={e => { if (tab !== t.id) { e.currentTarget.style.background = C.surface2; e.currentTarget.style.color = C.text; } }}
          onMouseLeave={e => { if (tab !== t.id) { e.currentTarget.style.background = 'transparent'; e.currentTarget.style.color = C.textSec; } }}
          >
            <span style={{ fontSize: 15 }}>{t.icon}</span>
            {t.label}
          </button>
        ))}

        <div style={{ flex: 1 }} />

        {/* 우측 */}
        <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
          <div style={{ display: 'flex', alignItems: 'center', gap: 6, background: 'rgba(16,185,129,0.1)', padding: '5px 12px', borderRadius: 20 }}>
            <LiveDot />
            <span style={{ fontSize: 11, color: '#34D399', fontWeight: 600 }}>실시간 연결됨</span>
          </div>
          <button onClick={() => setNotifCount(0)} style={{
            position: 'relative', background: C.surface2, border: `1px solid ${C.border}`, borderRadius: 8,
            padding: '7px 10px', cursor: 'pointer', fontSize: 16,
          }}>
            🔔
            {notifCount > 0 && (
              <span style={{ position: 'absolute', top: -4, right: -4, width: 18, height: 18, background: C.danger, borderRadius: '50%', fontSize: 10, fontWeight: 700, color: '#fff', display: 'flex', alignItems: 'center', justifyContent: 'center' }}>{notifCount}</span>
            )}
          </button>
          <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
            <div style={{ width: 32, height: 32, borderRadius: '50%', background: `linear-gradient(135deg, ${C.primary}, ${C.purple})`, display: 'flex', alignItems: 'center', justifyContent: 'center', color: '#fff', fontSize: 14, fontWeight: 700 }}>관</div>
            <span style={{ fontSize: 13, fontWeight: 600, color: C.text }}>관리자</span>
          </div>
        </div>
      </header>

      {/* 히어로 배너 */}
      <div style={{
        background: meta.gradient,
        padding: '28px 32px',
        animation: 'fadeIn 350ms ease',
      }}>
        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start' }}>
          <div>
            <div style={{ display: 'flex', alignItems: 'center', gap: 10, marginBottom: 6 }}>
              <span style={{ fontSize: 24 }}>{meta.icon}</span>
              <h1 style={{ fontSize: 24, fontWeight: 800, color: '#fff', letterSpacing: '-0.02em' }}>{meta.title}</h1>
            </div>
            <p style={{ fontSize: 13, color: 'rgba(255,255,255,0.75)', marginBottom: 0 }}>{meta.desc}</p>
          </div>
          <div style={{ display: 'flex', gap: 32, flexShrink: 0 }}>
            {meta.kpis.map(k => (
              <div key={k.label} style={{ textAlign: 'center' }}>
                <div style={{ fontSize: 22, fontWeight: 800, color: '#fff' }}>
                  <CountUp end={typeof k.value === 'number' ? k.value : 0} suffix={k.suffix} />
                </div>
                <div style={{ fontSize: 11, color: 'rgba(255,255,255,0.7)', marginTop: 2 }}>{k.label}</div>
              </div>
            ))}
          </div>
        </div>
      </div>

      {/* 메인 콘텐츠 */}
      <main style={{ flex: 1 }}>
        <div key={contentKey} style={{ animation: 'fadeIn 300ms ease' }}>
          {renderContent()}
        </div>
      </main>

      {/* Drawer */}
      {drawer && (
        <Drawer
          item={drawer.item}
          type={drawer.type}
          onClose={() => setDrawer(null)}
          onAction={handleAction}
        />
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
