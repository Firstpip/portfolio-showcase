// ─── 공통 컴포넌트 ───
function Modal({ title, children, onClose, size = 'md' }) {
  const widths = { sm: 480, md: 640, lg: 800 };
  return (
    <div onClick={onClose} style={{
      position: 'fixed', inset: 0, background: 'rgba(0,0,0,0.45)',
      display: 'flex', alignItems: 'center', justifyContent: 'center', zIndex: 1000
    }}>
      <div onClick={e => e.stopPropagation()} style={{
        background: C.surface, borderRadius: 12, width: widths[size],
        maxHeight: '90vh', overflowY: 'auto', boxShadow: '0 20px 60px rgba(0,0,0,0.2)'
      }}>
        <div style={{ padding: '20px 24px', borderBottom: `1px solid ${C.border}`, display: 'flex', alignItems: 'center', justifyContent: 'space-between' }}>
          <span style={{ fontSize: 16, fontWeight: 700, color: C.text }}>{title}</span>
          <button onClick={onClose} style={{ background: 'none', fontSize: 20, color: C.textSub, lineHeight: 1 }}>×</button>
        </div>
        <div style={{ padding: 24 }}>{children}</div>
      </div>
    </div>
  );
}

function Badge({ label, color = C.primary, bg = C.primaryLight }) {
  return (
    <span style={{ display: 'inline-flex', alignItems: 'center', padding: '2px 8px', borderRadius: 4, fontSize: 12, fontWeight: 600, color, background: bg }}>
      {label}
    </span>
  );
}

function Btn({ children, onClick, variant = 'primary', size = 'md', style: s = {} }) {
  const styles = {
    primary: { background: C.primary, color: '#fff' },
    secondary: { background: C.bg, color: C.text, border: `1px solid ${C.border}` },
    danger: { background: C.danger, color: '#fff' },
    ghost: { background: 'transparent', color: C.primary, border: `1px solid ${C.primary}` },
  };
  const sizes = { sm: { padding: '5px 12px', fontSize: 13 }, md: { padding: '8px 16px', fontSize: 14 }, lg: { padding: '11px 20px', fontSize: 15 } };
  return (
    <button onClick={onClick} style={{ ...styles[variant], ...sizes[size], borderRadius: 6, fontWeight: 600, cursor: 'pointer', transition: 'opacity 0.15s', ...s }}>
      {children}
    </button>
  );
}

function FormField({ label, children }) {

}

function Input({ value, onChange, placeholder, type = 'text' }) {

}

          <button key={t.id} onClick={() => setTab(t.id)} style={{

            color: tab === t.id ? '#fff' : C.textSub, fontWeight: tab === t.id ? 700 : 400, fontSize: 14, cursor: 'pointer'
          }}>{t.label}</button>
        ))}
      </div>

      {tab === 'info' && (
        <div style={{ background: C.surface, borderRadius: 10, padding: 24, border: `1px solid ${C.border}` }}>
          <div style={{ fontWeight: 700, fontSize: 15, color: C.text, marginBottom: 20 }}>기관 기본 정보</div>
          <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 16 }}>
            <FormField label="기관명">
              <Input defaultValue="해피케어 요양원" />
            </FormField>
            <FormField label="사업자번호">
              <Input defaultValue="123-45-67890" />
            </FormField>
            <FormField label="대표자명">
              <Input defaultValue="김관리" />
            </FormField>
            <FormField label="요양기관 기호">
              <Input defaultValue="51234567" />
            </FormField>
            <FormField label="주소">
              <Input defaultValue="서울시 송파구 올림픽로 123" />
            </FormField>
            <FormField label="전화번호">
              <Input defaultValue="02-1234-5678" />
            </FormField>
          </div>
          <div style={{ marginTop: 16, display: 'flex', justifyContent: 'flex-end' }}>
            <Btn onClick={() => {}}>저장</Btn>
          </div>
        </div>
      )}

      {tab === 'banking' && (
        <div style={{ background: C.surface, borderRadius: 10, padding: 24, border: `1px solid ${C.border}` }}>
          <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 20 }}>
            <div style={{ fontWeight: 700, fontSize: 15, color: C.text }}>금융 계좌 연동 현황</div>
            <Btn onClick={() => setModal({ type: 'addAccount' })} size="sm">+ 계좌 추가</Btn>
          </div>
          {[
            { bank: 'KB국민은행', account: '123-456-789012', type: '보통예금', status: '연동 정상', lastSync: '09:30' },
            { bank: '신한은행', account: '110-345-678901', type: '보통예금', status: '연동 정상', lastSync: '09:30' },
            { bank: '우리은행', account: '1002-456-789012', type: '법인카드', status: '연동 정상', lastSync: '09:28' },
          ].map(a => (
            <div key={a.bank} style={{ display: 'flex', alignItems: 'center', padding: '16px 0', borderBottom: `1px solid ${C.border}`, gap: 16 }}>
              <div style={{ width: 40, height: 40, borderRadius: 8, background: C.primaryLight, display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 20 }}>🏦</div>
              <div style={{ flex: 1 }}>
                <div style={{ fontWeight: 600, fontSize: 14, color: C.text }}>{a.bank}</div>
                <div style={{ fontSize: 12, color: C.textSub }}>{a.account} · {a.type}</div>
              </div>
              <Badge label={a.status} color={C.success} bg={C.success + '15'} />
              <div style={{ fontSize: 11, color: C.textSub }}>최종: {a.lastSync}</div>
              <Btn onClick={() => setModal({ type: 'editAccount', item: a })} variant="secondary" size="sm">설정</Btn>
            </div>
          ))}
        </div>
      )}

      {tab === 'accounts' && (
        <div style={{ background: C.surface, borderRadius: 10, padding: 24, border: `1px solid ${C.border}` }}>
          <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 20 }}>
            <div style={{ fontWeight: 700, fontSize: 15, color: C.text }}>계정과목 체계</div>
            <Btn onClick={() => setModal({ type: 'addSubject' })} size="sm">+ 계정과목 추가</Btn>
          </div>
          <table style={{ width: '100%', borderCollapse: 'collapse', fontSize: 13 }}>
            <thead>
              <tr style={{ borderBottom: `2px solid ${C.border}`, background: C.bg }}>
                {['코드', '계정과목명', '그룹', '잔액', '액션'].map(h => (
                  <th key={h} style={{ padding: '10px 12px', textAlign: 'left', color: C.textSub, fontWeight: 600, fontSize: 12 }}>{h}</th>
                ))}
              </tr>
            </thead>
            <tbody>
              {accountSubjects.map(a => (
                <tr key={a.code} style={{ borderBottom: `1px solid ${C.border}` }}>
                  <td style={{ padding: '10px 12px', color: C.textSub, fontFamily: 'monospace' }}>{a.code}</td>
                  <td style={{ padding: '10px 12px', color: C.text, fontWeight: 500 }}>{a.name}</td>
                  <td style={{ padding: '10px 12px' }}>
                    <Badge label={a.group} color={a.group === '자산' ? C.info : a.group === '수익' ? C.success : C.warning} bg={(a.group === '자산' ? C.info : a.group === '수익' ? C.success : C.warning) + '15'} />
                  </td>
                  <td style={{ padding: '10px 12px', color: C.text, fontWeight: 700 }}>{a.balance.toLocaleString()}원</td>
                  <td style={{ padding: '10px 12px' }}>
                    <Btn onClick={() => setModal({ type: 'editSubject', item: a })} variant="secondary" size="sm">수정</Btn>
                  </td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      )}

      {/* 모달 */}
      {modal?.type === 'addAccount' && (
        <Modal title="계좌 추가" onClose={() => setModal(null)} size="sm">
          <FormField label="은행 선택">
            <Select defaultValue="" onChange={() => {}} options={[
              { value: '', label: '은행 선택' },
              { value: 'KB', label: 'KB국민은행' },
              { value: '신한', label: '신한은행' },
              { value: '하나', label: '하나은행' },
              { value: '우리', label: '우리은행' },
            ]} />
          </FormField>
          <FormField label="계좌번호">
            <Input placeholder="계좌번호 입력 (- 없이)" />
          </FormField>
          <FormField label="계좌 유형">
            <Select defaultValue="보통예금" onChange={() => {}} options={[
              { value: '보통예금', label: '보통예금' },
              { value: '법인카드', label: '법인카드' },
            ]} />
          </FormField>
          <div style={{ display: 'flex', gap: 8, justifyContent: 'flex-end', marginTop: 8 }}>
            <Btn onClick={() => setModal(null)} variant="secondary">취소</Btn>
            <Btn onClick={() => setModal(null)}>API 연동 테스트</Btn>
          </div>
        </Modal>
      )}
      {modal?.type === 'editAccount' && (
        <Modal title={`${modal.item.bank} 설정`} onClose={() => setModal(null)} size="sm">
          <FormField label="계좌번호">
            <Input defaultValue={modal.item.account} />
          </FormField>
          <FormField label="동기화 주기">
            <Select defaultValue="30" onChange={() => {}} options={[
              { value: '10', label: '10분마다' },
              { value: '30', label: '30분마다' },
              { value: '60', label: '1시간마다' },
            ]} />
          </FormField>
          <div style={{ display: 'flex', gap: 8, justifyContent: 'flex-end', marginTop: 8 }}>
            <Btn onClick={() => setModal(null)} variant="danger">연동 해제</Btn>
            <div style={{ flex: 1 }} />
            <Btn onClick={() => setModal(null)} variant="secondary">취소</Btn>
            <Btn onClick={() => setModal(null)}>저장</Btn>
          </div>
        </Modal>
      )}
      {modal?.type === 'addSubject' && (
        <Modal title="계정과목 추가" onClose={() => setModal(null)} size="sm">
          <FormField label="계정 코드">
            <Input placeholder="예: 505" />
          </FormField>
          <FormField label="계정과목명">
            <Input placeholder="계정과목명 입력" />
          </FormField>
          <FormField label="그룹">
            <Select defaultValue="비용" onChange={() => {}} options={[
              { value: '자산', label: '자산' },
              { value: '부채', label: '부채' },
              { value: '수익', label: '수익' },
              { value: '비용', label: '비용' },
            ]} />
          </FormField>
          <div style={{ display: 'flex', gap: 8, justifyContent: 'flex-end', marginTop: 8 }}>
            <Btn onClick={() => setModal(null)} variant="secondary">취소</Btn>
            <Btn onClick={() => setModal(null)}>추가</Btn>
          </div>
        </Modal>
      )}
      {modal?.type === 'editSubject' && (
        <Modal title="계정과목 수정" onClose={() => setModal(null)} size="sm">
          <FormField label="계정과목명">
            <Input defaultValue={modal.item.name} />
          </FormField>
          <FormField label="그룹">
            <Select defaultValue={modal.item.group} onChange={() => {}} options={[
              { value: '자산', label: '자산' },
              { value: '부채', label: '부채' },
              { value: '수익', label: '수익' },
              { value: '비용', label: '비용' },
            ]} />
          </FormField>
          <div style={{ display: 'flex', gap: 8, justifyContent: 'flex-end', marginTop: 8 }}>
            <Btn onClick={() => setModal(null)} variant="secondary">취소</Btn>
            <Btn onClick={() => setModal(null)}>저장</Btn>
          </div>
        </Modal>
      )}
    </div>
  );
}

// ─── 페이지 렌더러 ───
const PAGE_TITLES = {
  dashboard: '재무 현황 대시보드',
  transaction: '거래 내역 관리',
  voucher: '전표 생성 및 관리',
  settings: '기본 정보 설정',
};

// ─── App ───
function App() {
  const [page, setPage] = useState('dashboard');
  return (
    <div style={{ display: 'flex', width: '100%', height: '100vh', overflow: 'hidden' }}>
      <Sidebar active={page} onNav={setPage} />
      <div style={{ flex: 1, display: 'flex', flexDirection: 'column', overflow: 'hidden' }}>
        <TopBar title={PAGE_TITLES[page]} />
        <main style={{ flex: 1, overflowY: 'auto', padding: 24, background: C.bg }}>
          {page === 'dashboard' && <Dashboard />}
          {page === 'transaction' && <TransactionPage />}
          {page === 'voucher' && <VoucherPage />}
          {page === 'settings' && <SettingsPage />}
        </main>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
