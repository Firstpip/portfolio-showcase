function Card({ children, style = {} }) {
  return (
    <div style={{ background: C.surface, border: `1px solid ${C.border}`, borderRadius: 10, ...style }}>
      {children}
    </div>
  );
}

function Badge({ label, color = C.accent, bg }) {
  const bgColor = bg || (color + '22');
  return (
    <span style={{ display: 'inline-flex', alignItems: 'center', padding: '3px 9px', borderRadius: 20, fontSize: 12, fontWeight: 600, color, background: bgColor }}>
      {label}
    </span>
  );
}

function Btn({ children, onClick, variant = 'primary', size = 'md', style: s = {} }) {
  const styles = {
    primary: { background: C.accent, color: '#0F1E30' },
    secondary: { background: 'transparent', color: C.text, border: `1px solid ${C.border}` },
    ghost: { background: 'transparent', color: C.accent, border: `1px solid ${C.accent}` },
    danger: { background: C.danger, color: '#fff' },
  };
  const sizes = { sm: { padding: '5px 12px', fontSize: 12 }, md: { padding: '8px 16px', fontSize: 14 }, lg: { padding: '11px 20px', fontSize: 15 } };
  return (
    <button onClick={onClick} style={{ ...styles[variant], ...sizes[size], borderRadius: 6, fontWeight: 600, cursor: 'pointer', ...s }}>
      {children}
    </button>
  );
}

function Modal({ title, children, onClose, size = 'md' }) {
  const widths = { sm: 480, md: 640, lg: 860 };
  return (
    <div onClick={onClose} style={{ position: 'fixed', inset: 0, background: 'rgba(0,0,0,0.6)', display: 'flex', alignItems: 'center', justifyContent: 'center', zIndex: 1000 }}>
      <div onClick={e => e.stopPropagation()} style={{
        background: C.surface, borderRadius: 12, width: widths[size],
        maxHeight: '90vh', overflowY: 'auto', border: `1px solid ${C.border}`,
        boxShadow: '0 24px 80px rgba(0,0,0,0.5)'
      }}>
        <div style={{ padding: '20px 24px', borderBottom: `1px solid ${C.border}`, display: 'flex', alignItems: 'center', justifyContent: 'space-between' }}>
          <span style={{ fontSize: 16, fontWeight: 700, color: C.text }}>{title}</span>
          <button onClick={onClose} style={{ background: 'none', fontSize: 22, color: C.textSub, lineHeight: 1 }}>×</button>
        </div>
        <div style={{ padding: 24 }}>{children}</div>
      </div>
    </div>
  );
}

function Stat({ label, value, unit, sub, color = C.accent, icon }) {
  return (
    <Card style={{ padding: 20 }}>
      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', marginBottom: 12 }}>
        <span style={{ fontSize: 22 }}>{icon}</span>
        <span style={{ fontSize: 12, fontWeight: 600, color, background: color + '20', padding: '2px 8px', borderRadius: 20 }}>{sub}</span>
      </div>
      <div style={{ fontSize: 26, fontWeight: 800, color: C.text }}>{value}<span style={{ fontSize: 14, fontWeight: 500, color: C.textSub, marginLeft: 4 }}>{unit}</span></div>
      <div style={{ fontSize: 12, color: C.textSub, marginTop: 4 }}>{label}</div>
    </Card>
  );
}

        <table style={{ width: '100%', borderCollapse: 'collapse' }}>
          <thead>
            <tr style={{ borderBottom: `1px solid ${C.border}` }}>
              {['기관명', '기본 플랜', '맞춤 적용 내용', '적용일', '담당자'].map(h => (
                <th key={h} style={{ padding: '8px 12px', textAlign: 'left', fontSize: 12, fontWeight: 600, color: C.textSub }}>{h}</th>
              ))}
            </tr>
          </thead>
          <tbody>
            {[
              { name: '해피케어 요양원', base: 'Standard', custom: 'API 접근 + 전담 CS 추가', date: '2026-04-05', admin: '영업팀' },
              { name: '서울케어홈', base: 'Enterprise', custom: '계정 한도 5개 → 무제한', date: '2026-03-15', admin: '시스템관리자' },
            ].map((r, i) => (
              <tr key={i} style={{ borderBottom: `1px solid ${C.border}` }}>
                <td style={{ padding: '10px 12px', fontSize: 14, fontWeight: 600, color: C.text }}>{r.name}</td>
                <td style={{ padding: '10px 12px' }}><Badge label={r.base} color={planColorMap[r.base]} /></td>
                <td style={{ padding: '10px 12px', fontSize: 13, color: C.textSub }}>{r.custom}</td>
                <td style={{ padding: '10px 12px', fontSize: 13, color: C.textSub }}>{r.date}</td>
                <td style={{ padding: '10px 12px', fontSize: 13, color: C.textSub }}>{r.admin}</td>
              </tr>
            ))}
          </tbody>
        </table>
      </Card>

      {/* 편집 모달 */}
      {editPlan && localFeatures && (
        <Modal title={`${editPlan} 요금제 편집`} onClose={() => setEditPlan(null)} size="sm">
          <div style={{ marginBottom: 16 }}>
            <div style={{ fontSize: 13, fontWeight: 700, color: C.textSub, marginBottom: 10 }}>기능 활성화 설정</div>
            <div style={{ display: 'flex', flexDirection: 'column', gap: 8 }}>
              {Object.entries(localFeatures).map(([feat, on]) => (
                <div key={feat} style={{
                  display: 'flex', alignItems: 'center', justifyContent: 'space-between',
                  padding: '10px 14px', background: C.bg, borderRadius: 8,
                  border: `1px solid ${on ? C.success + '30' : C.border}`,
                }}>
                  <span style={{ fontSize: 14, color: C.text }}>{feat}</span>
                  <button onClick={() => handleToggle(feat)} style={{
                    width: 44, height: 24, borderRadius: 12, border: 'none', cursor: 'pointer',
                    background: on ? C.success : 'rgba(255,255,255,0.1)',
                    position: 'relative', transition: 'background 0.2s'
                  }}>
                    <span style={{
                      position: 'absolute', top: 3, left: on ? 22 : 3, width: 18, height: 18,
                      borderRadius: '50%', background: '#fff', transition: 'left 0.2s',
                    }} />
                  </button>
                </div>
              ))}
            </div>
          </div>
          <div style={{ display: 'flex', gap: 8, justifyContent: 'flex-end' }}>
            <Btn variant="secondary" onClick={() => setEditPlan(null)}>취소</Btn>
            <Btn onClick={() => setEditPlan(null)}>변경사항 저장</Btn>
          </div>
        </Modal>
      )}

      {/* 변경 이력 모달 */}
      {showLog && (
        <Modal title="요금제 변경 이력" onClose={() => setShowLog(false)} size="md">
          <div style={{ display: 'flex', flexDirection: 'column', gap: 0 }}>
            {auditLog.map((log, i) => (
              <div key={i} style={{
                display: 'grid', gridTemplateColumns: '150px 1fr 80px 80px 80px',
                gap: 12, alignItems: 'center', padding: '12px 0',
                borderBottom: i < auditLog.length - 1 ? `1px solid ${C.border}` : 'none'
              }}>
                <span style={{ fontSize: 12, color: C.textSub, fontFamily: 'monospace' }}>{log.ts}</span>
                <span style={{ fontSize: 13, color: C.text }}>{log.action}</span>
                <span style={{ fontSize: 12, color: C.danger, textAlign: 'center' }}>{log.before}</span>
                <span style={{ fontSize: 12, color: C.success, textAlign: 'center' }}>{log.after}</span>
                <span style={{ fontSize: 12, color: C.textSub, textAlign: 'right' }}>{log.admin}</span>
              </div>
            ))}
          </div>
          <div style={{ display: 'flex', justifyContent: 'flex-end', marginTop: 12 }}>
            <Btn variant="secondary" onClick={() => setShowLog(false)}>닫기</Btn>
          </div>
        </Modal>
      )}
    </div>
  );
}

// ─── 앱 루트 ───

  const [page, setPage] = useState('dashboard');

  const pages = {
    dashboard: <Dashboard />,
    member: <MemberManagement />,
    payroll: <PayrollManagement />,
    'plan-management': <PlatformManagement />,
  };

  const titles = {
    dashboard: '운영 대시보드',
    member: '회원 기관 관리',
    payroll: '급여 및 4대보험 관리',
    'plan-management': '요금제 및 플랫폼 정책',
  };

  return (
    <>
      <TopNav active={page} onNav={setPage} />
      <div style={{ flex: 1, overflow: 'hidden', display: 'flex', flexDirection: 'column' }}>
        {pages[page]}
      </div>

  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
