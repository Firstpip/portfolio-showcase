<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { width: 100%; height: 100%; font-family: 'Pretendard', -apple-system, sans-serif; background: #0F0A1A; color: #F5F0FF; }
#root { display: flex; flex-direction: column; width: 100%; min-height: 100vh; }

@keyframes fadeIn { from { opacity: 0 } to { opacity: 1 } }
@keyframes fadeInScale { from { opacity: 0; transform: scale(0.95) } to { opacity: 1; transform: scale(1) } }
@keyframes slideInRight { from { opacity: 0; transform: translateX(40px) } to { opacity: 1; transform: translateX(0) } }
@keyframes slideUp { from { opacity: 0; transform: translateY(24px) } to { opacity: 1; transform: translateY(0) } }
@keyframes countUp { from { opacity: 0; transform: translateY(10px) } to { opacity: 1; transform: translateY(0) } }
@keyframes shimmer { 0% { background-position: -200% 0 } 100% { background-position: 200% 0 } }
@keyframes barGrow { from { width: 0% } to { width: var(--target-width) } }
@keyframes aiScan { 0% { transform: translateY(0) } 50% { transform: translateY(160px) } 100% { transform: translateY(0) } }
@keyframes tagPop { from { opacity: 0; transform: scale(0.5) } to { opacity: 1; transform: scale(1) } }
@keyframes glowPulse { 0%, 100% { box-shadow: 0 0 20px rgba(124,58,237,0.3) } 50% { box-shadow: 0 0 40px rgba(124,58,237,0.6) } }

::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: #3D2D6A; border-radius: 3px; }
</style>
</head>

  { id: 3, emoji: '🎂', name: '생일 파티', tags: ['파티', '실내', '음식', '사람'], aiDone: true, date: '2024.04.05' },

  { id: 7, emoji: '🍜', name: '맛집 저녁', tags: ['음식', '실내', '사람'], aiDone: false, date: '2024.05.05' },

/* ─── 공통 컴포넌트 ─── */
function Drawer({ item, onClose, children }) {
  return (
    <>
      <div onClick={onClose} style={{ position: 'fixed', inset: 0, background: 'rgba(0,0,0,0.6)', zIndex: 200, animation: 'fadeIn 200ms ease' }} />
      <div style={{ position: 'fixed', top: 0, right: 0, bottom: 0, width: 480, background: C.bgCard, boxShadow: '-4px 0 40px rgba(0,0,0,0.5)', zIndex: 201, overflowY: 'auto', padding: 28, animation: 'slideInRight 200ms ease', border: `1px solid ${C.border}` }}>
        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 24 }}>
          <h2 style={{ fontSize: 18, fontWeight: 700, color: C.text }}>{item?.name || '상세 보기'}</h2>
          <button onClick={onClose} style={{ background: 'none', border: 'none', fontSize: 22, cursor: 'pointer', color: C.textSec }}>✕</button>
        </div>
        {children}
      </div>
    </>
  );
}

function Modal({ title, onClose, children, width = 520 }) {
  return (
    <div style={{ position: 'fixed', inset: 0, zIndex: 500, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
      <div onClick={onClose} style={{ position: 'absolute', inset: 0, background: 'rgba(0,0,0,0.7)', animation: 'fadeIn 200ms ease' }} />
      <div style={{ position: 'relative', width, maxWidth: '90vw', maxHeight: '85vh', background: C.bgCard, borderRadius: 16, zIndex: 501, animation: 'fadeInScale 200ms ease', display: 'flex', flexDirection: 'column', boxShadow: '0 24px 80px rgba(0,0,0,0.5)', border: `1px solid ${C.border}` }}>
        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', padding: '20px 24px', borderBottom: `1px solid ${C.border}` }}>
          <h3 style={{ fontSize: 18, fontWeight: 700, color: C.text }}>{title}</h3>
          <button onClick={onClose} style={{ background: 'none', border: 'none', fontSize: 22, cursor: 'pointer', color: C.textSec, lineHeight: 1 }}>✕</button>
        </div>
        <div style={{ padding: 24, overflowY: 'auto', flex: 1 }}>{children}</div>
      </div>
    </div>
  );
}

function Toast({ message, onClose }) {
  useEffect(() => { const t = setTimeout(onClose, 3000); return () => clearTimeout(t); }, []);
  return (
    <div style={{ position: 'fixed', bottom: 24, right: 24, zIndex: 9999, background: C.primary, color: '#fff', padding: '12px 20px', borderRadius: 10, animation: 'slideUp 300ms ease', boxShadow: '0 4px 24px rgba(124,58,237,0.4)', display: 'flex', alignItems: 'center', gap: 8, fontSize: 14 }}>
      <span>✨</span> {message}
    </div>
  );
}

function CountUp({ end, suffix = '', prefix = '' }) {
  const [val, setVal] = useState(0);
  useEffect(() => {
    let s = 0; const step = end / 60;
    const t = setInterval(() => { s += step; if (s >= end) { setVal(end); clearInterval(t); } else setVal(Math.floor(s)); }, 16);
    return () => clearInterval(t);
  }, [end]);
  return <span>{prefix}{val.toLocaleString()}{suffix}</span>;
}

function GradientBadge({ label, color = C.primary }) {
  return <span style={{ padding: '3px 10px', borderRadius: 20, background: `${color}25`, color: color, fontSize: 11, fontWeight: 700, border: `1px solid ${color}40` }}>{label}</span>;
}

/* ─── 탭 2: AI 자동 태깅 ─── */

    setScanning(true);

    <div key="ai-tagging" style={{ animation: 'fadeIn 300ms ease' }}>

        <button onClick={handleScan} disabled={scanning} style={{ padding: '9px 18px', background: scanning ? C.surface : C.primary, color: scanning ? C.textSec : '#fff', border: `1px solid ${scanning ? C.border : C.primary}`, borderRadius: 8, cursor: scanning ? 'default' : 'pointer', fontWeight: 600, fontSize: 13, fontFamily: 'inherit', display: 'flex', alignItems: 'center', gap: 6, transition: 'all 200ms' }}>

            onMouseLeave={e => { e.currentTarget.style.transform = 'scale(1)'; e.currentTarget.style.borderColor = C.border; }}
          >
            {/* 이미지 */}
            <div style={{ height: 140, background: `linear-gradient(135deg, ${C.primary}20, ${C.accent}10)`, display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 60, position: 'relative' }}>

              {!photo.aiDone && scanning && (
                <div style={{ position: 'absolute', inset: 0, background: 'rgba(0,0,0,0.5)', display: 'flex', alignItems: 'center', justifyContent: 'center' }}>

                </div>

                {photo.tags.length > 0 ? photo.tags.map((tag, ti) => (

              <div style={{ display: 'flex', gap: 8, flexWrap: 'wrap' }}>

            <button onClick={() => { setDrawer(null); onToast('태그가 저장되었습니다'); }} style={{ flex: 1, padding: '10px', background: C.primary, color: '#fff', border: 'none', borderRadius: 8, cursor: 'pointer', fontWeight: 600, fontFamily: 'inherit' }}>태그 저장</button>
            <button onClick={() => { setDrawer(null); onToast('태그를 직접 편집합니다'); }} style={{ flex: 1, padding: '10px', background: C.surface, color: C.primaryLight, border: `1px solid ${C.border}`, borderRadius: 8, cursor: 'pointer', fontFamily: 'inherit' }}>✏️ 편집</button>

        </Drawer>

  );
}

                <div style={{ display: 'flex', gap: 6 }}>
                  {hl.tags.slice(0, 2).map(t => (
                    <span key={t} style={{ padding: '2px 9px', borderRadius: 20, background: `${C.primary}20`, color: C.primaryLight, fontSize: 11, fontWeight: 600 }}>{t}</span>
                  ))}
                </div>
                <div style={{ display: 'flex', gap: 8, alignItems: 'center' }}>
                  <span style={{ fontSize: 12, color: C.textLight }}>📸 {hl.photos}장</span>
                  <button onClick={(e) => { e.stopPropagation(); onToast('공유 링크가 복사되었습니다'); }} style={{ padding: '4px 10px', background: `${C.primary}20`, color: C.primaryLight, border: 'none', borderRadius: 6, cursor: 'pointer', fontSize: 12, fontFamily: 'inherit' }}>🔗 공유</button>
                </div>
              </div>
            </div>
          </div>
        ))}
      </div>

      {drawer && (
        <Drawer item={drawer} onClose={() => setDrawer(null)}>
          <div style={{ background: `linear-gradient(135deg, ${C.primary}, ${C.accent}80)`, borderRadius: 14, padding: '24px 20px', marginBottom: 20, textAlign: 'center' }}>
            <div style={{ fontSize: 70, marginBottom: 12 }}>{drawer.emoji}</div>
            <h2 style={{ fontSize: 22, fontWeight: 800, color: '#fff', marginBottom: 4 }}>{drawer.title}</h2>
            <p style={{ fontSize: 13, color: 'rgba(255,255,255,0.75)' }}>{drawer.period} · 📸 {drawer.photos}장</p>
          </div>
          <div style={{ background: C.surface, borderRadius: 10, padding: '14px 16px', marginBottom: 16 }}>
            <p style={{ fontSize: 13, fontWeight: 700, color: C.textSec, marginBottom: 8 }}>AI 요약</p>
            <p style={{ fontSize: 14, color: C.text, lineHeight: 1.8 }}>{drawer.summary}</p>
          </div>
          <div style={{ display: 'grid', gridTemplateColumns: 'repeat(3, 1fr)', gap: 8, marginBottom: 20 }}>
            {[...Array(6)].map((_, i) => (
              <div key={i} style={{ aspectRatio: '1', background: `${C.primary}${15 + i * 8}`, borderRadius: 10, display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 26 }}>{drawer.emoji}</div>
            ))}
          </div>
          <div style={{ background: C.surface, borderRadius: 10, padding: '12px 14px', marginBottom: 16, display: 'flex', alignItems: 'center', gap: 10 }}>
            <span style={{ fontSize: 18 }}>🔗</span>
            <code style={{ flex: 1, fontSize: 11, color: C.primaryLight, overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>https://memorydrive.app/h/eyJhbGci...</code>
            <button onClick={() => onToast('공유 링크가 복사되었습니다')} style={{ padding: '4px 10px', background: `${C.primary}20`, color: C.primaryLight, border: 'none', borderRadius: 6, cursor: 'pointer', fontSize: 12, fontFamily: 'inherit', flexShrink: 0 }}>복사</button>
          </div>
          <div style={{ display: 'flex', gap: 10 }}>
            <button onClick={() => { setDrawer(null); onToast('이미지로 내보내기 중...'); }} style={{ flex: 1, padding: '10px', background: C.primary, color: '#fff', border: 'none', borderRadius: 8, cursor: 'pointer', fontWeight: 600, fontFamily: 'inherit' }}>⬇️ 이미지 내보내기</button>
            <button onClick={() => { setDrawer(null); onToast('공유 링크가 복사되었습니다'); }} style={{ flex: 1, padding: '10px', background: C.surface, color: C.primaryLight, border: `1px solid ${C.border}`, borderRadius: 8, cursor: 'pointer', fontFamily: 'inherit' }}>🔗 링크 공유</button>
          </div>
        </Drawer>
      )}
    </div>
  );
}

/* ─── 상단 탭 네비 ─── */
const TABS = [
  { id: 'home', label: '공유 앨범 & 초대', icon: '🤝' },
  { id: 'ai-tagging', label: 'AI 자동 태깅', icon: '🤖' },
  { id: 'timeline', label: '날짜별 타임라인 뷰', icon: '📅' },
  { id: 'highlight', label: '추억 하이라이트 생성', icon: '✨' },
];

/* ─── 메인 앱 ─── */
function App() {
  const [tab, setTab] = useState('home');
  const [toast, setToast] = useState(null);
  const [loading, setLoading] = useState(true);

  useEffect(() => { setTimeout(() => setLoading(false), 1200); }, []);

  const showToast = useCallback((msg) => setToast(msg), []);

  const renderContent = () => {
    const props = { onToast: showToast };
    switch (tab) {
      case 'home': return <SharedAlbumPage {...props} />;
      case 'ai-tagging': return <AITaggingPage {...props} />;
      case 'timeline': return <TimelinePage {...props} />;
      case 'highlight': return <HighlightPage {...props} />;
      default: return null;
    }
  };

  if (loading) {
    return (
      <div style={{ display: 'flex', width: '100%', height: '100vh', alignItems: 'center', justifyContent: 'center', background: C.bg }}>
        <div style={{ textAlign: 'center' }}>
          <div style={{ width: 64, height: 64, background: C.primary, borderRadius: 18, display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 32, margin: '0 auto 20px', animation: 'glowPulse 1.5s infinite' }}>💜</div>
          <div style={{ display: 'flex', flexDirection: 'column', gap: 10, alignItems: 'center' }}>
            {[200, 280, 160].map((w, i) => (
              <div key={i} style={{ height: 10, width: w, borderRadius: 5, background: 'linear-gradient(90deg, #241742 25%, #3D2D6A 50%, #241742 75%)', backgroundSize: '200% 100%', animation: 'shimmer 1.5s infinite' }} />
            ))}
          </div>
        </div>
      </div>
    );
  }

  return (
    <div style={{ display: 'flex', flexDirection: 'column', width: '100%', minHeight: '100vh', background: C.bg }}>
      {/* 상단 수평 네비게이션 */}
      <header style={{ position: 'sticky', top: 0, zIndex: 100, background: '#150E28', borderBottom: `1px solid ${C.border}`, display: 'flex', alignItems: 'center', height: 58, padding: '0 28px', gap: 6 }}>
        {/* 로고 */}
        <div style={{ display: 'flex', alignItems: 'center', gap: 10, marginRight: 16 }}>
          <div style={{ width: 34, height: 34, background: C.primary, borderRadius: 9, display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 18 }}>💜</div>
          <span style={{ color: C.text, fontWeight: 800, fontSize: 15 }}>추억 아카이브</span>
        </div>
        {/* 탭 */}
        {TABS.map(t => (
          <button key={t.id} onClick={() => setTab(t.id)} style={{
            display: 'flex', alignItems: 'center', gap: 6,
            padding: '8px 14px', borderRadius: 8, border: 'none', cursor: 'pointer',
            background: tab === t.id ? `${C.primary}20` : 'transparent',
            color: tab === t.id ? C.primaryLight : C.textSec,
            fontSize: 13, fontWeight: tab === t.id ? 700 : 400,
            transition: 'all 150ms', fontFamily: 'inherit',
          }}
          onMouseEnter={e => { if (tab !== t.id) { e.currentTarget.style.background = C.surface; e.currentTarget.style.color = C.text; }}}
          onMouseLeave={e => { if (tab !== t.id) { e.currentTarget.style.background = 'transparent'; e.currentTarget.style.color = C.textSec; }}}
          >
            <span>{t.icon}</span> {t.label}
          </button>
        ))}
        <div style={{ flex: 1 }} />
        {/* 우측 */}
        <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
          <div style={{ display: 'flex', alignItems: 'center', gap: 7, background: C.surface, border: `1px solid ${C.border}`, borderRadius: 8, padding: '6px 12px' }}>
            <span style={{ fontSize: 13 }}>🔍</span>
            <input placeholder="검색" style={{ border: 'none', background: 'transparent', outline: 'none', fontSize: 13, width: 110, fontFamily: 'inherit', color: C.text }} />
          </div>
          <div style={{ position: 'relative' }}>
            <button style={{ width: 34, height: 34, borderRadius: '50%', background: C.surface, border: `1px solid ${C.border}`, cursor: 'pointer', fontSize: 15 }}>🔔</button>
            <div style={{ position: 'absolute', top: 1, right: 1, width: 8, height: 8, background: C.danger, borderRadius: '50%' }} />
          </div>
          <div style={{ width: 34, height: 34, borderRadius: '50%', background: C.primary, display: 'flex', alignItems: 'center', justifyContent: 'center', color: '#fff', fontWeight: 700, fontSize: 14, cursor: 'pointer' }}>김</div>
        </div>
      </header>

      {/* 히어로 배너 */}
      <HeroBanner tab={tab} />

      {/* 메인 콘텐츠 */}
      <main style={{ flex: 1, padding: '28px 32px', maxWidth: 1200, margin: '0 auto', width: '100%' }}>
        <div key={tab} style={{ animation: 'fadeIn 300ms ease' }}>
          {renderContent()}
        </div>
      </main>

      {toast && <Toast message={toast} onClose={() => setToast(null)} />}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
