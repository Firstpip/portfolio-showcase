<script src="https://unpkg.com/prop-types/prop-types.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/recharts@2.15.0/umd/Recharts.min.js"></script>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{width:100%;height:100%;font-family:'Pretendard',sans-serif;background:#F1F5F9}
  #root{display:flex;width:100%;height:100vh;overflow:hidden}
  @keyframes fadeIn{from{opacity:0}to{opacity:1}}
  @keyframes fadeInScale{from{opacity:0;transform:scale(0.95)}to{opacity:1;transform:scale(1)}}
  @keyframes slideInRight{from{opacity:0;transform:translateX(30px)}to{opacity:1;transform:translateX(0)}}
  @keyframes slideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
  @keyframes countUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
  @keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:0.5}}
  @keyframes barGrow{from{width:0%}to{width:var(--target-width)}}
  @keyframes slideDown{from{opacity:0;transform:translateY(-10px)}to{opacity:1;transform:translateY(0)}}
  @keyframes ripple{0%{transform:scale(0);opacity:0.5}100%{transform:scale(4);opacity:0}}
  ::-webkit-scrollbar{width:6px;height:6px}
  ::-webkit-scrollbar-track{background:transparent}
  ::-webkit-scrollbar-thumb{background:#CBD5E1;border-radius:3px}
</style>

<body>
<div id="root"></div>
<script type="text/babel">
const C = {
  primary:'#2563EB',secondary:'#1E40AF',accent:'#0EA5E9',
  bg:'#F1F5F9',surface:'#FFFFFF',
  text:'#0F172A',textLight:'#64748B',
  border:'#E2E8F0',sidebar:'#0F172A',sidebarText:'#94A3B8',sidebarActive:'#2563EB',
  success:'#10B981',warning:'#F59E0B',danger:'#EF4444',

  BarChart,Bar,XAxis,YAxis,CartesianGrid,Tooltip,ResponsiveContainer,Legend} = Recharts;

/* ─── Toast ─── */
function Toast({msg,onClose}){
  React.useEffect(()=>{const t=setTimeout(onClose,3000);return()=>clearTimeout(t)},[]);
  return <div style={{position:'fixed',bottom:24,right:24,zIndex:9999,background:'#1A1A2E',color:'#fff',padding:'12px 20px',borderRadius:8,animation:'slideUp 300ms ease',boxShadow:'0 4px 16px rgba(0,0,0,0.2)',fontSize:14}}>{msg}</div>;
}

/* ─── Modal ─── */
function Modal({title,onClose,children,width=560}){
  return(
    <div style={{position:'fixed',inset:0,zIndex:500,display:'flex',alignItems:'center',justifyContent:'center'}}>
      <div onClick={onClose} style={{position:'absolute',inset:0,background:'rgba(0,0,0,0.45)',animation:'fadeIn 200ms ease'}}/>
      <div style={{position:'relative',width,maxHeight:'85vh',background:'#fff',borderRadius:12,zIndex:501,animation:'fadeInScale 200ms ease',display:'flex',flexDirection:'column',boxShadow:'0 20px 60px rgba(0,0,0,0.18)'}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'20px 24px',borderBottom:`1px solid ${C.border}`}}>
          <h3 style={{fontSize:18,fontWeight:700,color:C.text}}>{title}</h3>
          <button onClick={onClose} style={{background:'none',border:'none',fontSize:20,cursor:'pointer',color:C.textLight}}>✕</button>
        </div>
        <div style={{padding:24,overflowY:'auto',flex:1}}>{children}</div>
      </div>
    </div>
  );
}

/* ─── CountUp ─── */
function CountUp({end,suffix='',duration=1200}){
  const [val,setVal]=React.useState(0);
  React.useEffect(()=>{let s=0;const step=end/(duration/16);const t=setInterval(()=>{s+=step;if(s>=end){setVal(end);clearInterval(t);}else setVal(Math.floor(s));},16);return()=>clearInterval(t);},[end]);
  return <span style={{animation:'countUp 400ms ease'}}>{val.toLocaleString()}{suffix}</span>;
}

function ExtractPage({setModal,setToast}){
  const [text,setText]=React.useState('');

  const [loading,setLoading]=React.useState(false);

  const LLMS=[{val:'claude',label:'Claude 3.5 Sonnet'},{val:'gemini',label:'Gemini 1.5 Pro'},{val:'gpt4',label:'GPT-4o'}];
  const run=()=>{
    if(!text.trim()){setToast('텍스트를 입력해주세요.');return;}
    setLoading(true);setResults(null);
    setTimeout(()=>{setLoading(false);setResults(EXTRACT_RESULTS);},2000);

  const useSample=()=>setText(SAMPLE_TEXTS[0]);
  return(
    <div style={{animation:'fadeIn 300ms ease'}}>

          <div style={{display:'grid',gridTemplateColumns:'auto 1fr',gap:8,fontSize:13}}>
            {[['파일명',r.file],['LLM',r.llm],['추출 항목',`${r.items}개`],['형식',r.format.toUpperCase()],['크기',r.size],['내보내기 일시',r.date]].map(([k,v])=>(
              <React.Fragment key={k}>
                <div style={{color:C.textLight,padding:'4px 0'}}>{k}</div>
                <div style={{color:C.text,fontWeight:500,padding:'4px 0'}}>{v}</div>
              </React.Fragment>
            ))}
          </div>
          <div style={{display:'flex',gap:8,marginTop:8}}>
            <button onClick={()=>{setToast(`${r.file}.${r.format} 다운로드 시작`);onClose();}} style={{flex:1,padding:'10px',background:C.primary,color:'#fff',border:'none',borderRadius:6,cursor:'pointer',fontFamily:'inherit',fontSize:13,fontWeight:600}}>📥 다시 다운로드</button>
            <button onClick={onClose} style={{padding:'10px 16px',background:C.bg,border:`1px solid ${C.border}`,borderRadius:6,cursor:'pointer',fontFamily:'inherit',fontSize:13}}>닫기</button>
          </div>
        </div>
      </Modal>
    );
  }
  if(modal.type==='newPrompt'){
    return(
      <Modal title="새 프롬프트 템플릿" onClose={onClose} width={560}>
        <div style={{display:'flex',flexDirection:'column',gap:14}}>
          {[{label:'템플릿 이름',type:'text',placeholder:'예: 견적서 항목 추출'},
            {label:'카테고리',type:'select',options:['영업문서','계약문서','마케팅','기타']},
          ].map(f=>(
            <div key={f.label}>
              <div style={{fontSize:13,fontWeight:600,color:C.text,marginBottom:6}}>{f.label}</div>
              {f.type==='select'?(
                <select style={{width:'100%',border:`1px solid ${C.border}`,borderRadius:6,padding:'8px 10px',fontSize:13,outline:'none',fontFamily:'inherit'}}>
                  {f.options.map(o=><option key={o}>{o}</option>)}
                </select>
              ):(
                <input type={f.type} placeholder={f.placeholder} style={{width:'100%',border:`1px solid ${C.border}`,borderRadius:6,padding:'8px 10px',fontSize:13,outline:'none',fontFamily:'inherit'}}/>
              )}
            </div>
          ))}
          <div>
            <div style={{fontSize:13,fontWeight:600,color:C.text,marginBottom:6}}>초기 프롬프트 내용</div>
            <textarea placeholder="프롬프트를 입력하세요..." style={{width:'100%',border:`1px solid ${C.border}`,borderRadius:6,padding:10,fontSize:13,outline:'none',fontFamily:'inherit',resize:'none',height:120}}/>
          </div>
          <div style={{display:'flex',gap:8,justifyContent:'flex-end'}}>
            <button onClick={onClose} style={{padding:'8px 16px',background:C.bg,border:`1px solid ${C.border}`,borderRadius:6,cursor:'pointer',fontFamily:'inherit',fontSize:13}}>취소</button>
            <button onClick={()=>{setToast('✅ 새 템플릿이 저장되었습니다.');onClose();}} style={{padding:'8px 16px',background:C.primary,color:'#fff',border:'none',borderRadius:6,cursor:'pointer',fontFamily:'inherit',fontSize:13,fontWeight:600}}>저장</button>
          </div>
        </div>
      </Modal>
    );
  }
  if(modal.type==='testResult'){
    return(
      <Modal title="🧪 프롬프트 테스트 결과" onClose={onClose} width={580}>
        <div style={{display:'flex',flexDirection:'column',gap:14}}>
          <div style={{background:`${C.success}10`,border:`1px solid ${C.success}30`,borderRadius:8,padding:14,display:'flex',alignItems:'center',gap:12}}>
            <span style={{fontSize:28}}>✅</span>
            <div>
              <div style={{fontWeight:700,color:C.success,fontSize:15}}>테스트 성공 — 정확도 95%</div>
              <div style={{fontSize:12,color:C.textLight,marginTop:2}}>샘플 10건 중 9.5건 정확 추출</div>
            </div>
          </div>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:10}}>
            {[{label:'전체 항목',val:'48개'},{label:'정확 추출',val:'45개'},{label:'오류',val:'3개'}].map(s=>(
              <div key={s.label} style={{background:C.bg,borderRadius:8,padding:12,textAlign:'center'}}>
                <div style={{fontWeight:700,fontSize:18,color:C.text}}>{s.val}</div>
                <div style={{fontSize:11,color:C.textLight,marginTop:4}}>{s.label}</div>
              </div>
            ))}
          </div>
          <div style={{display:'flex',gap:8,justifyContent:'flex-end'}}>
            <button onClick={onClose} style={{padding:'8px 16px',background:C.bg,border:`1px solid ${C.border}`,borderRadius:6,cursor:'pointer',fontFamily:'inherit',fontSize:13}}>닫기</button>
            <button onClick={()=>{setToast('새 버전으로 저장되었습니다.');onClose();}} style={{padding:'8px 16px',background:C.primary,color:'#fff',border:'none',borderRadius:6,cursor:'pointer',fontFamily:'inherit',fontSize:13,fontWeight:600}}>이 버전 저장</button>
          </div>
        </div>
      </Modal>
    );
  }
  if(modal.type==='bulkExport'){
    return(
      <Modal title="📥 일괄 다운로드" onClose={onClose} width={480}>
        <div style={{display:'flex',flexDirection:'column',gap:14}}>
          <div style={{fontSize:14,color:C.text}}>다운로드할 형식을 선택하세요:</div>
          <div style={{display:'flex',flexDirection:'column',gap:8}}>
            {[{fmt:'xlsx',label:'Excel (.xlsx) — 컬럼 서식 포함',icon:'📗'},{fmt:'csv',label:'CSV (.csv) — 한국어 BOM 포함',icon:'📋'},{fmt:'json',label:'JSON (.json) — 원본 구조 포함',icon:'📦'}].map(f=>(
              <label key={f.fmt} style={{display:'flex',alignItems:'center',gap:10,padding:'10px 14px',border:`1px solid ${C.border}`,borderRadius:8,cursor:'pointer'}}>
                <input type="checkbox" style={{accentColor:C.primary}}/><span style={{fontSize:16}}>{f.icon}</span><span style={{fontSize:13,color:C.text}}>{f.label}</span>
              </label>
            ))}
          </div>
          <div style={{display:'flex',gap:8,justifyContent:'flex-end'}}>
            <button onClick={onClose} style={{padding:'8px 16px',background:C.bg,border:`1px solid ${C.border}`,borderRadius:6,cursor:'pointer',fontFamily:'inherit',fontSize:13}}>취소</button>
            <button onClick={()=>{setToast('📥 일괄 다운로드를 시작합니다.');onClose();}} style={{padding:'8px 16px',background:C.primary,color:'#fff',border:'none',borderRadius:6,cursor:'pointer',fontFamily:'inherit',fontSize:13,fontWeight:600}}>다운로드 시작</button>
          </div>
        </div>
      </Modal>
    );
  }
  if(modal.type==='kpiDetail'){
    return(
      <Modal title={modal.item.label} onClose={onClose} width={420}>
        <div style={{display:'flex',flexDirection:'column',gap:14}}>
          <div style={{textAlign:'center',padding:20}}>
            <div style={{fontSize:48,marginBottom:8}}>{modal.item.icon}</div>
            <div style={{fontSize:40,fontWeight:800,color:modal.item.color}}>{modal.item.val.toLocaleString()}{modal.item.suf}</div>
            <div style={{fontSize:14,color:C.success,marginTop:8,fontWeight:600}}>{modal.item.change} (이전 대비)</div>
          </div>
          <button onClick={onClose} style={{padding:'10px',background:C.bg,border:`1px solid ${C.border}`,borderRadius:6,cursor:'pointer',fontFamily:'inherit',fontSize:13}}>닫기</button>
        </div>
      </Modal>
    );
  }
  if(modal.type==='exportSingle'){
    return(
      <Modal title="추출 결과 내보내기" onClose={onClose} width={420}>
        <div style={{display:'flex',flexDirection:'column',gap:14}}>
          <div style={{fontSize:14,color:C.text}}>추출된 {modal.items.length}개 항목을 내보냅니다:</div>
          {[{fmt:'xlsx',label:'Excel (.xlsx)',icon:'📗'},{fmt:'csv',label:'CSV (.csv)',icon:'📋'},{fmt:'json',label:'JSON (.json)',icon:'📦'}].map(f=>(
            <button key={f.fmt} onClick={()=>{setToast(`${f.label} 다운로드 시작`);onClose();}} style={{display:'flex',alignItems:'center',gap:10,padding:'12px 16px',border:`1px solid ${C.border}`,borderRadius:8,cursor:'pointer',background:'#fff',fontFamily:'inherit',fontSize:14,fontWeight:500,width:'100%',transition:'background 150ms'}}
              onMouseEnter={e=>e.currentTarget.style.background=C.bg}
              onMouseLeave={e=>e.currentTarget.style.background='#fff'}>
              <span style={{fontSize:20}}>{f.icon}</span>{f.label}<span style={{marginLeft:'auto',color:C.textLight,fontSize:12}}>→</span>
            </button>
          ))}
          <button onClick={onClose} style={{padding:'10px',background:C.bg,border:`1px solid ${C.border}`,borderRadius:6,cursor:'pointer',fontFamily:'inherit',fontSize:13}}>취소</button>
        </div>
      </Modal>
    );
  }
  if(modal.type==='versionDetail'){
    const v=modal.item;
    return(
      <Modal title={`${v.ver} 버전 상세`} onClose={onClose} width={460}>
        <div style={{display:'flex',flexDirection:'column',gap:14}}>
          <div style={{display:'grid',gridTemplateColumns:'auto 1fr',gap:8,fontSize:13}}>
            {[['버전',v.ver],['저장일',v.date],['정확도',v.score],['변경 내용',v.desc]].map(([k,val])=>(
              <React.Fragment key={k}>
                <div style={{color:C.textLight,padding:'4px 0'}}>{k}</div>
                <div style={{color:C.text,fontWeight:500,padding:'4px 0'}}>{val}</div>
              </React.Fragment>
            ))}
          </div>
          <div style={{display:'flex',gap:8,justifyContent:'flex-end'}}>
            <button onClick={onClose} style={{padding:'8px 16px',background:C.bg,border:`1px solid ${C.border}`,borderRadius:6,cursor:'pointer',fontFamily:'inherit',fontSize:13}}>닫기</button>
            <button onClick={()=>{setToast(`${v.ver} 버전을 불러왔습니다.`);onClose();}} style={{padding:'8px 16px',background:C.primary,color:'#fff',border:'none',borderRadius:6,cursor:'pointer',fontFamily:'inherit',fontSize:13,fontWeight:600}}>불러오기</button>
          </div>
        </div>
      </Modal>
    );
  }
  if(modal.type==='extractItemDetail'){
    const r=modal.item;
    return(
      <Modal title="추출 항목 상세" onClose={onClose} width={420}>
        <div style={{display:'flex',flexDirection:'column',gap:12}}>
          <div style={{display:'grid',gridTemplateColumns:'auto 1fr',gap:8,fontSize:13}}>
            {[['용어',r.term],['추출값',r.code],['페이지',r.page],['유형',r.type],['신뢰도',r.confidence]].map(([k,v])=>(
              <React.Fragment key={k}>
                <div style={{color:C.textLight,padding:'4px 0'}}>{k}</div>
                <div style={{color:C.text,fontWeight:500,padding:'4px 0'}}>{v}</div>
              </React.Fragment>
            ))}
          </div>
          <button onClick={onClose} style={{padding:'10px',background:C.bg,border:`1px solid ${C.border}`,borderRadius:6,cursor:'pointer',fontFamily:'inherit',fontSize:13,marginTop:4}}>닫기</button>
        </div>
      </Modal>
    );
  }
  return null;
}

/* ─── App ─── */
function App(){
  const [page,setPage]=React.useState('dashboard');
  const [modal,setModal]=React.useState(null);
  const [toast,setToast]=React.useState(null);
  const renderPage=()=>{
    const props={setModal,setToast:(m)=>setToast(m)};
    if(page==='dashboard')return <DashboardPage {...props}/>;
    if(page==='extract-demo')return <ExtractPage {...props}/>;
    if(page==='prompt-editor')return <PromptEditorPage {...props}/>;
    if(page==='export-result')return <ExportPage {...props}/>;
  };
  return(
    <div style={{display:'flex',width:'100%',height:'100vh',overflow:'hidden'}}>
      <Sidebar page={page} onNav={(p)=>{setPage(p);setModal(null);}}/>
      <div style={{flex:1,display:'flex',flexDirection:'column',overflow:'hidden'}}>
        <TopBar title={PAGE_TITLES[page]}/>
        <main style={{flex:1,overflowY:'auto',padding:24,background:C.bg}}>
          {renderPage()}
        </main>
      </div>
      {modal&&<ModalContent modal={modal} onClose={()=>setModal(null)} setToast={(m)=>setToast(m)}/>}
      {toast&&<Toast msg={toast} onClose={()=>setToast(null)}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
