<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://unpkg.com/prop-types/prop-types.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/recharts@2.15.0/umd/Recharts.min.js"></script>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{width:100%;height:100%;font-family:'Pretendard',sans-serif}
  #root{display:flex;flex-direction:column;width:100%;min-height:100vh}
  @keyframes fadeIn{from{opacity:0}to{opacity:1}}
  @keyframes fadeInScale{from{opacity:0;transform:scale(0.95)}to{opacity:1;transform:scale(1)}}
  @keyframes slideInRight{from{opacity:0;transform:translateX(40px)}to{opacity:1;transform:translateX(0)}}
  @keyframes slideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
  @keyframes countUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
  @keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:0.5}}
  @keyframes barGrow{from{width:0%}to{width:var(--target-width)}}
  @keyframes ripple{0%{transform:scale(0);opacity:0.5}100%{transform:scale(4);opacity:0}}
  @keyframes progress{from{width:0}to{width:var(--target)}}
  ::-webkit-scrollbar{width:6px;height:6px}
  ::-webkit-scrollbar-track{background:transparent}
  ::-webkit-scrollbar-thumb{background:#CBD5E1;border-radius:3px}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const C={
  primary:'#0F766E',secondary:'#115E59',accent:'#14B8A6',
  bg:'#F0FDFA',surface:'#FFFFFF',
  text:'#134E4A',textLight:'#6B7280',
  border:'#CCFBF1',navBorder:'#E5E7EB',
  success:'#10B981',warning:'#F59E0B',danger:'#EF4444',purple:'#8B5CF6',
};

const {BarChart,Bar,XAxis,YAxis,CartesianGrid,Tooltip,Legend,ResponsiveContainer,
  AreaChart,Area,LineChart,Line} = Recharts;

/* ─── Toast ─── */
function Toast({msg,onClose}){
  React.useEffect(()=>{const t=setTimeout(onClose,3000);return()=>clearTimeout(t)},[]);
  return <div style={{position:'fixed',bottom:24,right:24,zIndex:9999,background:'#134E4A',color:'#fff',padding:'12px 20px',borderRadius:8,animation:'slideUp 300ms ease',boxShadow:'0 4px 16px rgba(0,0,0,0.2)',fontSize:14}}>{msg}</div>;
}

/* ─── Drawer ─── */
function Drawer({item,onClose,children}){
  return(
    <>
      <div onClick={onClose} style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.4)',zIndex:200,animation:'fadeIn 200ms ease'}}/>
      <div style={{position:'fixed',top:0,right:0,bottom:0,width:480,background:'#fff',boxShadow:'-8px 0 40px rgba(0,0,0,0.15)',zIndex:201,overflowY:'auto',padding:28,animation:'slideInRight 200ms ease'}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:20,paddingBottom:16,borderBottom:`1px solid ${C.navBorder}`}}>
          <h3 style={{fontSize:18,fontWeight:700,color:C.text}}>{item?.title||'상세 정보'}</h3>
          <button onClick={onClose} style={{background:'none',border:'none',fontSize:22,cursor:'pointer',color:C.textLight}}>✕</button>
        </div>
        {children}
      </div>
    </>
  );
}

/* ─── CountUp ─── */
function CountUp({end,suffix='',duration=1200}){
  const [val,setVal]=React.useState(0);
  React.useEffect(()=>{let s=0;const step=end/(duration/16);const t=setInterval(()=>{s+=step;if(s>=end){setVal(end);clearInterval(t);}else setVal(Math.floor(s));},16);return()=>clearInterval(t);},[end]);
  return <span style={{animation:'countUp 400ms ease'}}>{val.toLocaleString()}{suffix}</span>;
}

/* ─── Header ─── */

function Header({tab,setTab}){
  return(
    <header style={{position:'sticky',top:0,zIndex:100,background:'#fff',borderBottom:`1px solid ${C.navBorder}`,display:'flex',alignItems:'center',height:56,padding:'0 24px',gap:4,flexShrink:0}}>

        <div style={{width:32,height:32,borderRadius:8,background:`linear-gradient(135deg,${C.primary},${C.accent})`,display:'flex',alignItems:'center',justifyContent:'center',fontSize:16}}>🤖</div>
        <span style={{fontWeight:800,fontSize:16,color:C.text}}>PromptOps</span>
      </div>
      {TABS.map(t=>(
        <button key={t.id} onClick={()=>setTab(t.id)} style={{
          padding:'8px 16px',border:'none',background:'transparent',cursor:'pointer',fontFamily:'inherit',

          <span>🔍</span><span>검색...</span>

}

/* ─── Hero ─── */
function Hero({tab}){
  const m=PAGE_META[tab];
  return(
    <div style={{background:m.gradient,padding:'28px 32px',color:'#fff',animation:'fadeIn 300ms ease'}}>
      <div style={{display:'flex',alignItems:'flex-start',justifyContent:'space-between',flexWrap:'wrap',gap:16}}>

            <span style={{fontSize:18}}>{m.icon}</span><span>PromptOps</span><span>/</span><span>{m.title}</span>

          <h1 style={{fontSize:26,fontWeight:800,letterSpacing:'-0.02em'}}>{m.title}</h1>

}

/* ─── App ─── */
function App(){
  const [tab,setTab]=React.useState('dashboard');
  const [drawer,setDrawer]=React.useState(null);
  const [toast,setToast]=React.useState(null);
  const renderContent=()=>{
    const props={setDrawer,setToast:(m)=>setToast(m)};
    if(tab==='dashboard')return <DashboardPage {...props}/>;
    if(tab==='batch-upload')return <BatchUploadPage {...props}/>;
    if(tab==='prompt-library')return <PromptLibraryPage {...props}/>;
    if(tab==='usage-analytics')return <UsageAnalyticsPage {...props}/>;
  };
  return(
    <div style={{display:'flex',flexDirection:'column',width:'100%',minHeight:'100vh',background:C.bg}}>
      <Header tab={tab} setTab={(t)=>{setTab(t);setDrawer(null);}}/>
      <Hero tab={tab}/>
      <main style={{flex:1,animation:'fadeIn 300ms ease'}}>
        {renderContent()}
      </main>
      {drawer&&(
        <Drawer item={drawer} onClose={()=>setDrawer(null)}>
          <DrawerContent drawer={drawer} onClose={()=>setDrawer(null)} setToast={(m)=>setToast(m)}/>
        </Drawer>
      )}
      {toast&&<Toast msg={toast} onClose={()=>setToast(null)}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
