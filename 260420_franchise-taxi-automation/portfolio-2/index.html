function CountUp({ end, duration=1000, suffix='' }) {
  const [val, setVal] = React.useState(0);
  React.useEffect(() => {
    let start = 0; const step = end / (duration / 16);
    const timer = setInterval(() => {
      start += step;
      if (start >= end) { setVal(end); clearInterval(timer); }
      else setVal(Math.floor(start));
    }, 16);
    return () => clearInterval(timer);
  }, [end]);
  return <span>{val.toLocaleString()}{suffix}</span>;
}

function Toast({ message, type='success', onClose }) {
  React.useEffect(() => { const t = setTimeout(onClose, 3000); return () => clearTimeout(t); }, []);
  const bg = type === 'success' ? C.success : type === 'danger' ? C.danger : C.info;
  return (
    <div style={{ position:'fixed', bottom:24, right:24, zIndex:9999, background:bg, color:'#fff', padding:'12px 20px', borderRadius:8, display:'flex', alignItems:'center', gap:12, boxShadow:'0 4px 20px rgba(0,0,0,0.4)', animation:'slideUp 300ms ease', fontSize:14, fontWeight:500 }}>
      <span>{type==='success'?'✓':type==='danger'?'✕':'ℹ'}</span>
      <span>{message}</span>
    </div>
  );
}

function TestRunner({ system, onDone }) {
  const [step, setStep] = React.useState(0);
  const steps = ['인증 확인 중...','엔드포인트 연결 중...','테스트 요청 발송 중...','응답 검증 중...','완료'];
  React.useEffect(() => {
    if (step < steps.length - 1) {
      const t = setTimeout(() => setStep(s => s+1), 600);
      return () => clearTimeout(t);
    }
  }, [step]);

  return (
    <div>
      <div style={{ display:'flex', flexDirection:'column', gap:10, marginBottom:20 }}>
        {steps.map((s, i) => (
          <div key={i} style={{ display:'flex', alignItems:'center', gap:12, fontSize:13, color: i < step ? C.success : i === step ? C.accent : C.textSecondary, animation: i === step ? 'pulse 1s infinite' : '' }}>
            <span style={{ width:20, height:20, borderRadius:999, background: i < step ? `${C.success}20` : i === step ? C.accentDim : 'rgba(255,255,255,0.05)', display:'flex', alignItems:'center', justifyContent:'center', fontSize:12, flexShrink:0, border: `1px solid ${i < step ? C.success : i === step ? C.accent : C.border}` }}>{i < step ? '✓' : i+1}</span>
            {s}
          </div>
        ))}
      </div>
      {step === steps.length - 1 && (
        <div>
          <div style={{ background:`${C.success}15`, border:`1px solid ${C.success}30`, borderRadius:8, padding:'10px 14px', fontSize:13, color:C.success, marginBottom:14 }}>
            ✅ 연동 테스트 성공 — 응답시간 {system.latency}ms
          </div>
          <pre style={{ background:C.bg, borderRadius:8, padding:'12px 14px', fontSize:11, color:C.textSecondary, overflowX:'auto' }}>{`{"status":"ok","code":200,"system":"${system.id}","latency":${system.latency}}`}</pre>
          <button onClick={onDone} style={{ marginTop:14, width:'100%', padding:'10px', background:C.accentDim, color:C.accent, border:`1px solid ${C.accent}40`, borderRadius:8, fontSize:13, fontWeight:600, cursor:'pointer' }}>확인</button>
        </div>
      )}
    </div>
  );
}

  const [toast, setToast] = React.useState(null);
  const [loading, setLoading] = React.useState(true);

  React.useEffect(() => { setTimeout(() => setLoading(false), 1200); }, []);

  const showToast = (msg, type='success') => setToast({ msg, type });

  const renderContent = () => {
    const props = { showToast };
    if (tab === 'monitoring') return <MonitoringPage {...props} />;
    if (tab === 'pipeline') return <PipelinePage {...props} />;
    if (tab === 'integration') return <IntegrationPage {...props} />;
    if (tab === 'anomaly') return <AnomalyPage {...props} />;
  };

  if (loading) {
    return (
      <div style={{ display:'flex', width:'100%', height:'100vh', alignItems:'center', justifyContent:'center', background:C.bg }}>
        <div style={{ textAlign:'center' }}>
          <div style={{ width:52, height:52, borderRadius:12, background:`linear-gradient(135deg, ${C.accent}, #0099CC)`, display:'flex', alignItems:'center', justifyContent:'center', fontSize:26, margin:'0 auto 16px', animation:'pulse 1.5s infinite' }}>🚀</div>
          <div style={{ fontSize:14, color:C.textSecondary, animation:'pulse 1.5s infinite' }}>자동화 플랫폼을 초기화 중...</div>
        </div>
      </div>
    );
  }

  return (
    <div style={{ display:'flex', flexDirection:'column', width:'100%', minHeight:'100vh', background:C.bg }}>
      <TopNav tab={tab} setTab={setTab} />
      <HeroBanner tab={tab} />
      <main style={{ flex:1, padding:'28px 32px', maxWidth:1300, width:'100%', margin:'0 auto', boxSizing:'border-box' }}>
        <div key={tab} style={{ animation:'fadeIn 300ms ease' }}>
          {renderContent()}
        </div>
      </main>
      {toast && <Toast message={toast.msg} type={toast.type} onClose={() => setToast(null)} />}
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
