<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>파티 소통 플랫폼 — 맞춤 구현 데모</title>
<link rel="preconnect" href="https://cdn.jsdelivr.net">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;font-family:'Pretendard',sans-serif;background:#0F0F1A;color:#F9FAFB;}
#root{display:flex;flex-direction:column;width:100%;min-height:100vh;}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes fadeInScale{from{opacity:0;transform:scale(0.95)}to{opacity:1;transform:scale(1)}}
@keyframes slideInRight{from{opacity:0;transform:translateX(30px)}to{opacity:1;transform:translateX(0)}}
@keyframes slideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes ripple{0%{transform:scale(0);opacity:0.5}100%{transform:scale(4);opacity:0}}
@keyframes countUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.5}}
@keyframes barGrow{from{width:0%}to{width:var(--target-width)}}
@keyframes slideDown{from{opacity:0;transform:translateY(-10px);max-height:0}to{opacity:1;transform:translateY(0);max-height:500px}}
@keyframes heartFloat{0%{transform:translateY(0) scale(1);opacity:1}100%{transform:translateY(-60px) scale(1.4);opacity:0}}
@keyframes rankSlide{from{opacity:0;transform:translateX(-20px)}to{opacity:1;transform:translateX(0)}}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const C = {
  bg:'#0F0F1A',
  surface:'#1A1A2E',
  surfaceHover:'#22223B',
  border:'rgba(255,75,125,0.2)',
  primary:'#FF4B7D',
  secondary:'#7C3AED',
  accent:'#F59E0B',
  accentGreen:'#10B981',
  text:'#F9FAFB',
  textSub:'#9CA3AF',
  textDim:'#6B7280',
  gradient:'linear-gradient(135deg,#FF4B7D,#7C3AED)',
  gradientSoft:'linear-gradient(135deg,rgba(255,75,125,0.15),rgba(124,58,237,0.15))',
};

// ---- Utilities ----
function useInterval(fn, delay) {
  React.useEffect(() => {
    const id = setInterval(fn, delay);
    return () => clearInterval(id);
  }, []);
}

function CountUp({ end, duration=1200, suffix='' }) {
  const [val, setVal] = React.useState(0);
  React.useEffect(() => {
    let s=0; const step=end/(duration/16);
    const t=setInterval(()=>{ s+=step; if(s>=end){setVal(end);clearInterval(t);}else setVal(Math.floor(s)); },16);
    return ()=>clearInterval(t);
  },[end]);
  return <span style={{animation:'countUp 400ms ease'}}>{val.toLocaleString()}{suffix}</span>;
}

function Toast({ message, onClose }) {
  React.useEffect(()=>{ const t=setTimeout(onClose,3000); return()=>clearTimeout(t); },[]);
  return (
    <div style={{position:'fixed',bottom:28,right:28,zIndex:9999,background:C.primary,color:'#fff',padding:'12px 22px',borderRadius:12,animation:'slideUp 300ms ease',boxShadow:'0 8px 24px rgba(255,75,125,0.5)',fontWeight:600,fontSize:14}}>
      {message}
    </div>
  );
}

function Modal({title,onClose,children,width=520}) {
  return (
    <div style={{position:'fixed',inset:0,zIndex:500,display:'flex',alignItems:'center',justifyContent:'center'}}>
      <div onClick={onClose} style={{position:'absolute',inset:0,background:'rgba(0,0,0,0.7)',animation:'fadeIn 200ms ease'}}/>
      <div style={{position:'relative',width,maxHeight:'85vh',background:C.surface,borderRadius:20,zIndex:501,animation:'fadeInScale 220ms ease',display:'flex',flexDirection:'column',boxShadow:'0 24px 80px rgba(0,0,0,0.5)',border:`1px solid ${C.border}`}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'20px 24px',borderBottom:`1px solid ${C.border}`}}>
          <h3 style={{fontSize:18,fontWeight:700,color:C.text}}>{title}</h3>
          <button onClick={onClose} style={{background:'none',border:'none',color:C.textSub,fontSize:20,cursor:'pointer',padding:'4px 8px',borderRadius:8,transition:'all 150ms'}} onMouseEnter={e=>e.target.style.background=C.surfaceHover} onMouseLeave={e=>e.target.style.background='none'}>✕</button>
        </div>
        <div style={{padding:24,overflowY:'auto',flex:1}}>{children}</div>
      </div>
    </div>
  );
}

// ---- Data ----
const PARTY_INFO = { name: '봄밤 게스트하우스 파티', number: '2차', endAt: Date.now() + 82 * 60 * 1000 };

const PARTICIPANTS = [
  {id:1,nick:'별빛여행자',emoji:'🌟',cupitLeft:0,likesLeft:1,cupitReceived:4,likesReceived:7,msgReceived:3,status:'online'},
  {id:2,nick:'제주바람',emoji:'🌊',cupitLeft:1,likesLeft:2,cupitReceived:2,likesReceived:5,msgReceived:1,status:'online'},
  {id:3,nick:'서울고양이',emoji:'🐱',cupitLeft:2,likesLeft:3,cupitReceived:6,likesReceived:3,msgReceived:2,status:'online'},
  {id:4,nick:'하늘걷기',emoji:'☁️',cupitLeft:2,likesLeft:1,cupitReceived:1,likesReceived:8,msgReceived:0,status:'online'},
  {id:5,nick:'달빛피아노',emoji:'🎹',cupitLeft:1,likesLeft:0,cupitReceived:3,likesReceived:4,msgReceived:5,status:'online'},
  {id:6,nick:'책읽는곰',emoji:'📚',cupitLeft:0,likesLeft:2,cupitReceived:0,likesReceived:2,msgReceived:1,status:'away'},
  {id:7,nick:'맛집탐험가',emoji:'🍜',cupitLeft:2,likesLeft:3,cupitReceived:5,likesReceived:6,msgReceived:4,status:'online'},
  {id:8,nick:'음악여행',emoji:'🎵',cupitLeft:2,likesLeft:1,cupitReceived:2,likesReceived:3,msgReceived:2,status:'online'},
];

const INIT_MSGS = [
  {id:1,from:'별빛여행자',emoji:'🌟',text:'오늘 파티 너무 기대돼요! 😊',time:'20:03',read:true},
  {id:2,from:'달빛피아노',emoji:'🎹',text:'안녕하세요~ 반갑습니다!',time:'20:07',read:true},
  {id:3,from:'서울고양이',emoji:'🐱',text:'저 사진 좀 찍어도 될까요? 🤩',time:'20:11',read:false},
  {id:4,from:'맛집탐험가',emoji:'🍜',text:'이 근처 맛있는 데 알아요?',time:'20:15',read:false},
  {id:5,from:'제주바람',emoji:'🌊',text:'노래 신청은 어떻게 해요?',time:'20:19',read:false},
];

const NOTICES = [
  {id:1,text:'🎉 파티 시작! 음료는 바 카운터에서 받아가세요',time:'20:00'},
  {id:2,text:'🎵 신청곡 1번 — 「밤편지」 곧 나옵니다',time:'20:10'},
  {id:3,text:'📸 단체 사진 20:30에 1층 로비에서 찍을 예정입니다',time:'20:18'},
];

// ---- Components ----

function PartyTimer({ endAt }) {
  const [remain, setRemain] = React.useState(Math.max(0, endAt - Date.now()));
  useInterval(() => setRemain(t => Math.max(0, t - 1000)), 1000);
  const h = Math.floor(remain/3600000);
  const m = Math.floor((remain%3600000)/60000);
  const s = Math.floor((remain%60000)/1000);
  const pad = n => String(n).padStart(2,'0');
  const pct = Math.round((1 - remain/(90*60*1000)) * 100);
  return (
    <div style={{textAlign:'center'}}>
      <div style={{fontSize:13,color:C.textSub,marginBottom:6,letterSpacing:'0.08em',textTransform:'uppercase'}}>파티 남은 시간</div>
      <div style={{fontSize:40,fontWeight:800,letterSpacing:4,color:'#fff',textShadow:'0 0 30px rgba(255,75,125,0.8)',fontVariantNumeric:'tabular-nums'}}>
        {pad(h)}:{pad(m)}:{pad(s)}
      </div>
      <div style={{marginTop:10,height:6,borderRadius:3,background:'rgba(255,255,255,0.15)',overflow:'hidden'}}>
        <div style={{height:'100%',borderRadius:3,background:C.gradient,width:`${pct}%`,transition:'width 1s linear'}}/>
      </div>
    </div>
  );
}

function HeroPanel({ count }) {
  return (
    <div style={{background:C.gradient,padding:'28px 32px',display:'flex',justifyContent:'space-between',alignItems:'center',gap:24,flexWrap:'wrap'}}>

        <div style={{fontSize:13,color:'rgba(255,255,255,0.75)',marginBottom:4}}>현재 파티</div>
        <div style={{fontSize:22,fontWeight:800,color:'#fff'}}>{PARTY_INFO.name}</div>
        <div style={{fontSize:13,color:'rgba(255,255,255,0.8)',marginTop:4}}>{PARTY_INFO.number} · QR 입장 완료</div>
      </div>
      <div style={{display:'flex',gap:24,alignItems:'center',flexWrap:'wrap'}}>
        <div style={{textAlign:'center'}}>
          <div style={{fontSize:28,fontWeight:800,color:'#fff'}}><CountUp end={count}/></div>
          <div style={{fontSize:12,color:'rgba(255,255,255,0.75)'}}>참여 중</div>
        </div>
        <div style={{width:1,height:40,background:'rgba(255,255,255,0.3)'}}/>
        <PartyTimer endAt={PARTY_INFO.endAt}/>
      </div>
    </div>
  );
}

// Tab: 파티 로비

    <div style={{padding:24}}>
      {/* Notices */}
      <div style={{marginBottom:24}}>
        <div style={{fontSize:12,color:C.textSub,letterSpacing:'0.06em',textTransform:'uppercase',marginBottom:12}}>실시간 공지</div>
        <div style={{display:'flex',flexDirection:'column',gap:10}}>
          {notices.map((n,i)=>(
            <div key={n.id} style={{background:C.surface,borderRadius:14,padding:'14px 18px',border:`1px solid ${C.border}`,display:'flex',alignItems:'flex-start',gap:12,animation:`slideUp 400ms ease ${i*80}ms both`}}>
              <div style={{fontSize:18}}>{n.text.split(' ')[0]}</div>

        ].map((s,i)=>(

          <div style={{fontSize:15,fontWeight:700,color:C.text}}>QR 입장 완료</div>
          <div style={{fontSize:13,color:C.textSub,marginTop:2}}>닉네임: <span style={{color:C.primary,fontWeight:600}}>별빛여행자</span> · 변경 2회 남음</div>
        </div>

}

// Tab: 쪽지함
function MessagesTab({ msgs, setMsgs, setToast }) {
  const [compose, setCompose] = React.useState(false);
  const [to, setTo] = React.useState('');
  const [body, setBody] = React.useState('');
  const [selected, setSelected] = React.useState(null);

  const unread = msgs.filter(m=>!m.read).length;

  function send() {
    if (!to.trim() || !body.trim()) return;
    setMsgs(m=>[...m,{id:m.length+10,from:'나',emoji:'👤',text:body,time:'지금',read:true,sent:true}]);
    setToast('쪽지를 발송했습니다! 💌');
    setCompose(false);
    setTo(''); setBody('');
  }

  return (
    <div style={{padding:24}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:20}}>
        <div style={{display:'flex',alignItems:'center',gap:10}}>
          <span style={{fontSize:18,fontWeight:700}}>받은 쪽지함</span>
          {unread>0 && <span style={{background:C.primary,color:'#fff',borderRadius:999,padding:'2px 10px',fontSize:12,fontWeight:700}}>{unread}</span>}
        </div>
        <button onClick={()=>setCompose(true)} style={{padding:'9px 20px',background:C.gradient,border:'none',borderRadius:20,color:'#fff',fontWeight:700,fontSize:13,cursor:'pointer',display:'flex',alignItems:'center',gap:6}}>
          <span>✉️</span> 쪽지 쓰기
        </button>
      </div>

      <div style={{display:'flex',flexDirection:'column',gap:10}}>
        {msgs.map((m,i)=>(
          <div key={m.id} onClick={()=>setSelected(m)} style={{background:m.read?C.surface:'rgba(255,75,125,0.12)',borderRadius:14,padding:'14px 18px',border:`1px solid ${m.read?C.border:'rgba(255,75,125,0.4)'}`,cursor:'pointer',transition:'all 180ms',animation:`slideUp 350ms ease ${i*60}ms both`}}
            onMouseEnter={e=>e.currentTarget.style.background=m.read?C.surfaceHover:'rgba(255,75,125,0.2)'}
            onMouseLeave={e=>e.currentTarget.style.background=m.read?C.surface:'rgba(255,75,125,0.12)'}>
            <div style={{display:'flex',alignItems:'center',gap:10}}>
              <div style={{fontSize:26}}>{m.emoji}</div>
              <div style={{flex:1,minWidth:0}}>
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                  <span style={{fontSize:14,fontWeight:700,color:m.read?C.text:C.primary}}>{m.from}</span>
                  <span style={{fontSize:11,color:C.textDim}}>{m.time}</span>
                </div>
                <div style={{fontSize:13,color:C.textSub,marginTop:3,whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{m.text}</div>
              </div>
              {!m.read && <div style={{width:8,height:8,borderRadius:'50%',background:C.primary,flexShrink:0}}/>}
            </div>
          </div>
        ))}
      </div>

      {selected && (
        <Modal title={`${selected.emoji} ${selected.from}`} onClose={()=>{setSelected(null);setMsgs(m=>m.map(x=>x.id===selected.id?{...x,read:true}:x));}}>
          <div style={{background:C.gradientSoft,borderRadius:12,padding:16,marginBottom:16,border:`1px solid ${C.border}`}}>
            <p style={{fontSize:15,color:C.text,lineHeight:1.7}}>{selected.text}</p>
            <div style={{fontSize:12,color:C.textDim,marginTop:8,textAlign:'right'}}>{selected.time}</div>
          </div>
          <button onClick={()=>{setSelected(null);setCompose(true);setTo(selected.from);}} style={{width:'100%',padding:'12px',background:C.gradient,border:'none',borderRadius:12,color:'#fff',fontWeight:700,fontSize:14,cursor:'pointer'}}>
            💌 답장하기
          </button>
        </Modal>
      )}

      {compose && (
        <Modal title="쪽지 쓰기 ✉️" onClose={()=>{setCompose(false);setTo('');setBody('');}}>
          <div style={{display:'flex',flexDirection:'column',gap:14}}>
            <div>
              <label style={{fontSize:13,color:C.textSub,display:'block',marginBottom:6}}>받는 사람</label>
              <select value={to} onChange={e=>setTo(e.target.value)} style={{width:'100%',padding:'10px 14px',background:C.bg,border:`1px solid ${C.border}`,borderRadius:10,color:C.text,fontSize:14}}>
                <option value="">참석자 선택</option>
                {PARTICIPANTS.map(p=><option key={p.id} value={p.nick}>{p.emoji} {p.nick}</option>)}
              </select>
            </div>
            <div>
              <label style={{fontSize:13,color:C.textSub,display:'block',marginBottom:6}}>메시지</label>
              <textarea value={body} onChange={e=>setBody(e.target.value)} placeholder="쪽지 내용을 입력하세요 (최대 200자)" rows={4} style={{width:'100%',padding:'12px 14px',background:C.bg,border:`1px solid ${C.border}`,borderRadius:10,color:C.text,fontSize:14,resize:'none',fontFamily:'Pretendard'}}/>
            </div>
            <button onClick={send} style={{padding:'12px',background:C.gradient,border:'none',borderRadius:12,color:'#fff',fontWeight:700,fontSize:15,cursor:'pointer'}}>
              💌 발송하기
            </button>
          </div>
        </Modal>
      )}
    </div>
  );
}

// Tab: 참석자
function InteractionsTab({ participants, setParticipants, setToast }) {
  const [hearts, setHearts] = React.useState([]);

  function sendCupit(id) {
    setParticipants(ps=>ps.map(p=>p.id===id&&p.cupitLeft>0?{...p,cupitLeft:p.cupitLeft-1,cupitReceived:p.cupitReceived+1}:p));
    const h={id:Date.now(),targetId:id};
    setHearts(hs=>[...hs,h]);
    setTimeout(()=>setHearts(hs=>hs.filter(x=>x.id!==h.id)),800);
    setToast('💘 큐피트 발사! 상대방에게 전달됩니다');
  }
  function sendLike(id) {
    setParticipants(ps=>ps.map(p=>p.id===id&&p.likesLeft>0?{...p,likesLeft:p.likesLeft-1,likesReceived:p.likesReceived+1}:p));
    setToast('❤️ 호감도를 표현했습니다!');
  }

  return (
    <div style={{padding:24}}>
      <div style={{fontSize:13,color:C.textSub,marginBottom:16}}>참석자 <b style={{color:C.primary}}>{participants.filter(p=>p.status==='online').length}명</b> 온라인</div>
      <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(200px,1fr))',gap:14}}>
        {participants.map((p,i)=>(
          <div key={p.id} style={{background:C.surface,borderRadius:18,padding:'18px 16px',border:`1px solid ${C.border}`,transition:'all 200ms',animation:`slideUp 400ms ease ${i*70}ms both`,position:'relative'}}
            onMouseEnter={e=>{ e.currentTarget.style.transform='translateY(-4px)'; e.currentTarget.style.boxShadow=`0 12px 32px rgba(255,75,125,0.2)`; }}
            onMouseLeave={e=>{ e.currentTarget.style.transform='none'; e.currentTarget.style.boxShadow='none'; }}>
            <div style={{textAlign:'center',marginBottom:12}}>
              <div style={{fontSize:38,marginBottom:6}}>{p.emoji}</div>
              <div style={{fontSize:15,fontWeight:700,color:C.text}}>{p.nick}</div>
              <div style={{fontSize:11,color:p.status==='online'?C.accentGreen:C.textDim,marginTop:3}}>{p.status==='online'?'● 온라인':'○ 자리비움'}</div>
            </div>
            <div style={{display:'flex',gap:6,marginBottom:12}}>
              {[{icon:'💘',label:'호감',val:p.likesReceived},{icon:'💝',label:'큐피트',val:p.cupitReceived}].map(s=>(
                <div key={s.label} style={{flex:1,textAlign:'center',background:C.gradientSoft,borderRadius:8,padding:'6px 4px'}}>
                  <div style={{fontSize:12}}>{s.icon} <span style={{fontWeight:700,color:C.primary}}>{s.val}</span></div>
                </div>
              ))}
            </div>
            <div style={{display:'flex',gap:6}}>
              <button disabled={p.cupitLeft===0} onClick={()=>sendCupit(p.id)} style={{flex:1,padding:'8px 4px',background:p.cupitLeft>0?C.gradient:'#333',border:'none',borderRadius:10,color:p.cupitLeft>0?'#fff':'#666',fontSize:12,fontWeight:700,cursor:p.cupitLeft>0?'pointer':'default',transition:'all 150ms'}}>
                💘 큐피트 {p.cupitLeft>0?`(${p.cupitLeft})`:''}
              </button>
              <button disabled={p.likesLeft===0} onClick={()=>sendLike(p.id)} style={{flex:1,padding:'8px 4px',background:p.likesLeft>0?`linear-gradient(135deg,${C.accent},#EF4444)`:'#333',border:'none',borderRadius:10,color:p.likesLeft>0?'#fff':'#666',fontSize:12,fontWeight:700,cursor:p.likesLeft>0?'pointer':'default',transition:'all 150ms'}}>
                ❤️ 호감 {p.likesLeft>0?`(${p.likesLeft})`:''}
              </button>
            </div>
            {/* Float hearts */}
            {hearts.filter(h=>h.targetId===p.id).map(h=>(
              <div key={h.id} style={{position:'absolute',top:'30%',left:'50%',transform:'translateX(-50%)',fontSize:32,animation:'heartFloat 800ms ease forwards',pointerEvents:'none'}}>💘</div>
            ))}
          </div>
        ))}
      </div>
    </div>
  );
}

// Tab: 호감도 순위
function RankingTab({ participants }) {
  const [rankData, setRankData] = React.useState(
    [...participants].sort((a,b)=>b.likesReceived-a.likesReceived)
  );

  useInterval(() => {
    setRankData(rd=>{
      const r=[...rd];
      const i=Math.floor(Math.random()*r.length);
      r[i]={...r[i],likesReceived:r[i].likesReceived+(Math.random()>0.5?1:0)};
      return [...r].sort((a,b)=>b.likesReceived-a.likesReceived);
    });
  }, 2500);

  const medalColors = ['#F59E0B','#9CA3AF','#CD7F32'];

  return (
    <div style={{padding:24}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:20}}>
        <div style={{fontSize:16,fontWeight:700}}>실시간 호감도 순위</div>
        <div style={{display:'flex',alignItems:'center',gap:6,background:'rgba(16,185,129,0.15)',border:'1px solid rgba(16,185,129,0.3)',borderRadius:20,padding:'5px 12px'}}>
          <div style={{width:7,height:7,borderRadius:'50%',background:C.accentGreen,animation:'pulse 1.2s infinite'}}/>
          <span style={{fontSize:12,color:C.accentGreen,fontWeight:600}}>LIVE</span>
        </div>
      </div>

      {/* Top 3 podium */}
      <div style={{display:'flex',justifyContent:'center',alignItems:'flex-end',gap:16,marginBottom:28,paddingBottom:8}}>
        {[rankData[1],rankData[0],rankData[2]].map((p,i)=>{
          const heights=[60,80,50];
          const ranks=[2,1,3];
          return (
            <div key={p?.id} style={{textAlign:'center',flex:1,maxWidth:100}}>
              <div style={{fontSize:28,marginBottom:4}}>{p?.emoji}</div>
              <div style={{fontSize:13,fontWeight:600,color:C.text,marginBottom:6}}>{p?.nick}</div>
              <div style={{fontSize:18,fontWeight:800,color:medalColors[i]}}>{p?.likesReceived}</div>
              <div style={{height:heights[i],marginTop:8,borderRadius:'8px 8px 0 0',background:`linear-gradient(180deg,${medalColors[i]}44,${medalColors[i]}22)`,border:`2px solid ${medalColors[i]}44`,display:'flex',alignItems:'center',justifyContent:'center',fontSize:22}}>
                {['🥈','🥇','🥉'][i]}
              </div>
            </div>
          );
        })}
      </div>

      {/* Full list */}
      <div style={{display:'flex',flexDirection:'column',gap:8}}>
        {rankData.map((p,i)=>(
          <div key={p.id} style={{display:'flex',alignItems:'center',gap:14,background:i<3?C.gradientSoft:C.surface,borderRadius:12,padding:'12px 16px',border:`1px solid ${i===0?'rgba(245,158,11,0.4)':C.border}`,animation:`rankSlide 350ms ease ${i*50}ms both`,transition:'all 200ms'}}>
            <div style={{width:28,textAlign:'center',fontSize:i<3?18:14,fontWeight:700,color:i<3?medalColors[i]:C.textDim}}>
              {i<3?['🥇','🥈','🥉'][i]:i+1}
            </div>
            <div style={{fontSize:22}}>{p.emoji}</div>
            <div style={{flex:1}}>
              <div style={{fontSize:14,fontWeight:600,color:C.text}}>{p.nick}</div>
            </div>
            <div style={{fontSize:20,fontWeight:800,color:i===0?C.accent:C.primary}}>{p.likesReceived}<span style={{fontSize:12,color:C.textSub,marginLeft:2}}>❤️</span></div>
          </div>
        ))}
      </div>
    </div>
  );
}

// ---- Main App ----
function App() {
  const [tab, setTab] = React.useState('파티 로비');
  const [tabKey, setTabKey] = React.useState(0);
  const [participants, setParticipants] = React.useState(PARTICIPANTS);
  const [msgs, setMsgs] = React.useState(INIT_MSGS);
  const [count, setCount] = React.useState(47);
  const [toast, setToast] = React.useState(null);
  const [reqModal, setReqModal] = React.useState(false);
  const [reqType, setReqType] = React.useState('song');
  const [reqText, setReqText] = React.useState('');
  const [nickModal, setNickModal] = React.useState(false);
  const [newNick, setNewNick] = React.useState('');

  useInterval(()=>setCount(c=>c+(Math.random()>0.6?1:Math.random()>0.8?-1:0)),4000);

  function switchTab(t) { setTab(t); setTabKey(k=>k+1); }

  const TABS = ['파티 로비','쪽지함','참석자','호감도 순위'];
  const unreadCount = msgs.filter(m=>!m.read).length;

  return (
    <div style={{display:'flex',flexDirection:'column',width:'100%',minHeight:'100vh',background:C.bg}}>
      {/* Top nav */}
      <header style={{position:'sticky',top:0,zIndex:100,background:'rgba(15,15,26,0.92)',backdropFilter:'blur(12px)',borderBottom:`1px solid ${C.border}`,display:'flex',alignItems:'center',height:58,padding:'0 20px',gap:4}}>
        <div style={{display:'flex',alignItems:'center',gap:8,marginRight:16}}>
          <div style={{fontSize:22}}>🎉</div>
          <span style={{fontWeight:800,fontSize:16,background:C.gradient,WebkitBackgroundClip:'text',WebkitTextFillColor:'transparent'}}>PartyLink</span>
        </div>
        {TABS.map(t=>(
          <button key={t} onClick={()=>switchTab(t)} style={{padding:'7px 14px',background:tab===t?C.gradient:'transparent',border:tab===t?'none':'1px solid transparent',borderRadius:20,color:tab===t?'#fff':C.textSub,fontSize:13,fontWeight:600,cursor:'pointer',transition:'all 180ms',position:'relative',whiteSpace:'nowrap'}}
            onMouseEnter={e=>{ if(tab!==t) e.currentTarget.style.color=C.text; }}
            onMouseLeave={e=>{ if(tab!==t) e.currentTarget.style.color=C.textSub; }}>
            {t}
            {t==='쪽지함'&&unreadCount>0&&<span style={{position:'absolute',top:-4,right:-4,width:16,height:16,borderRadius:'50%',background:C.primary,color:'#fff',fontSize:9,fontWeight:800,display:'flex',alignItems:'center',justifyContent:'center'}}>{unreadCount}</span>}
          </button>
        ))}
        <div style={{flex:1}}/>
        <button onClick={()=>setReqModal(true)} style={{padding:'7px 14px',background:'rgba(245,158,11,0.15)',border:'1px solid rgba(245,158,11,0.3)',borderRadius:20,color:C.accent,fontSize:12,fontWeight:600,cursor:'pointer',marginRight:6}}>🎵 신청</button>
        <button onClick={()=>setNickModal(true)} style={{width:36,height:36,borderRadius:'50%',background:C.gradient,border:'none',fontSize:16,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center'}}>🌟</button>
      </header>

      {/* Hero */}
      <HeroPanel count={count}/>

      {/* Content */}
      <main style={{flex:1}}>
        <div key={tabKey} style={{animation:'fadeIn 300ms ease'}}>
          {tab==='파티 로비' && <PartyLobbyTab notices={NOTICES} count={count}/>}
          {tab==='쪽지함' && <MessagesTab msgs={msgs} setMsgs={setMsgs} setToast={setToast}/>}
          {tab==='참석자' && <InteractionsTab participants={participants} setParticipants={setParticipants} setToast={setToast}/>}
          {tab==='호감도 순위' && <RankingTab participants={participants}/>}
        </div>
      </main>

      {/* Song/SOS request modal */}
      {reqModal && (
        <Modal title="노래 신청 / SOS" onClose={()=>{setReqModal(false);setReqText('');}}>
          <div style={{display:'flex',gap:10,marginBottom:16}}>
            {[{val:'song',label:'🎵 노래 신청'},{val:'sos',label:'🆘 SOS 요청'}].map(r=>(
              <button key={r.val} onClick={()=>setReqType(r.val)} style={{flex:1,padding:'10px',background:reqType===r.val?C.gradient:'transparent',border:`1px solid ${reqType===r.val?'transparent':C.border}`,borderRadius:12,color:reqType===r.val?'#fff':C.textSub,fontWeight:600,fontSize:13,cursor:'pointer'}}>
                {r.label}
              </button>
            ))}
          </div>
          <textarea value={reqText} onChange={e=>setReqText(e.target.value)} placeholder={reqType==='song'?'신청할 노래 제목과 가수를 입력하세요':'도움이 필요한 내용을 입력하세요'} rows={3} style={{width:'100%',padding:'12px',background:C.bg,border:`1px solid ${C.border}`,borderRadius:10,color:C.text,fontSize:14,resize:'none',fontFamily:'Pretendard',marginBottom:14}}/>
          <button onClick={()=>{setToast(reqType==='song'?'🎵 노래 신청이 접수됐습니다!':'🆘 SOS 요청을 보냈습니다!');setReqModal(false);setReqText('');}} style={{width:'100%',padding:'12px',background:C.gradient,border:'none',borderRadius:12,color:'#fff',fontWeight:700,fontSize:15,cursor:'pointer'}}>
            전송하기
          </button>
        </Modal>
      )}

      {/* Nickname modal */}
      {nickModal && (
        <Modal title="닉네임 변경" onClose={()=>{setNickModal(false);setNewNick('');}}>
          <div style={{marginBottom:12,padding:'10px 14px',background:'rgba(245,158,11,0.1)',borderRadius:10,border:'1px solid rgba(245,158,11,0.3)',fontSize:13,color:C.accent}}>
            ⚠️ 변경 가능 횟수: <b>2회</b> 남음 (총 3회 제한)
          </div>
          <input value={newNick} onChange={e=>setNewNick(e.target.value)} placeholder="새 닉네임 입력 (최대 10자)" maxLength={10} style={{width:'100%',padding:'12px 14px',background:C.bg,border:`1px solid ${C.border}`,borderRadius:10,color:C.text,fontSize:15,marginBottom:14,fontFamily:'Pretendard'}}/>
          <button onClick={()=>{if(newNick.trim()){setToast(`닉네임이 "${newNick}"으로 변경됐습니다!`);setNickModal(false);setNewNick('');}}} style={{width:'100%',padding:'12px',background:C.gradient,border:'none',borderRadius:12,color:'#fff',fontWeight:700,fontSize:15,cursor:'pointer'}}>
            변경 완료
          </button>
        </Modal>
      )}

      {toast && <Toast message={toast} onClose={()=>setToast(null)}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
