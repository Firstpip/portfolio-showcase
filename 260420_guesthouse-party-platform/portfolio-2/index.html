// ---- Utilities ----
function useInterval(fn, delay) {
  React.useEffect(()=>{ const id=setInterval(fn,delay); return ()=>clearInterval(id); },[]);
}

function CountUp({ end, duration=1200, suffix='' }) {
  const [val, setVal] = React.useState(0);
  React.useEffect(()=>{
    let s=0; const step=end/(duration/16);
    const t=setInterval(()=>{ s+=step; if(s>=end){setVal(end);clearInterval(t);}else setVal(Math.floor(s)); },16);
    return()=>clearInterval(t);
  },[end]);
  return <span style={{animation:'countUp 400ms ease'}}>{val.toLocaleString()}{suffix}</span>;
}

function Toast({ message, type='success', onClose }) {
  React.useEffect(()=>{ const t=setTimeout(onClose,3000); return()=>clearTimeout(t); },[]);
  const colors={success:C.accent,warning:C.warning,error:C.danger,info:C.primary};
  return (
    <div style={{position:'fixed',bottom:24,right:24,zIndex:9999,background:colors[type]||C.accent,color:'#fff',padding:'12px 20px',borderRadius:10,animation:'slideUp 300ms ease',boxShadow:`0 8px 24px rgba(0,0,0,0.3)`,fontWeight:600,fontSize:14,display:'flex',alignItems:'center',gap:8}}>
      {message}
    </div>
  );
}

function Modal({title,onClose,children,width=540}) {

      <div onClick={onClose} style={{position:'absolute',inset:0,background:'rgba(0,0,0,0.65)',animation:'fadeIn 200ms ease'}}/>

  );
}

// ---- Chart Components ----
function ActivityLineChart({ live }) {
  const ref = React.useRef(null);
  const chartRef = React.useRef(null);

  React.useEffect(()=>{
    if(!ref.current) return;
    const labels = Array.from({length:12},(_,i)=>`${20-Math.floor((11-i)/2)}:${(11-i)%2===0?'00':'30'}`).reverse().slice(-12);
    const data = [3,5,4,8,6,9,7,12,10,15,13,live];
    chartRef.current = new Chart(ref.current,{
      type:'line',
      data:{
        labels,
        datasets:[{
          label:'활동 수',
          data,
          borderColor:'#6366F1',
          backgroundColor:'rgba(99,102,241,0.1)',
          fill:true,
          tension:0.4,
          pointBackgroundColor:'#6366F1',
          pointRadius:3,
          pointHoverRadius:6,
        }]
      },
      options:{
        responsive:true,maintainAspectRatio:false,
        plugins:{legend:{display:false},tooltip:{backgroundColor:'#1F2937',titleColor:'#E6EDF3',bodyColor:'#8B949E',borderColor:'rgba(99,102,241,0.3)',borderWidth:1}},
        scales:{
          x:{ticks:{color:'#8B949E',font:{size:10}},grid:{color:'rgba(255,255,255,0.05)'},border:{color:'rgba(255,255,255,0.1)'}},
          y:{ticks:{color:'#8B949E',font:{size:10}},grid:{color:'rgba(255,255,255,0.05)'},border:{color:'rgba(255,255,255,0.1)'}}
        }
      }
    });
    return()=>{ if(chartRef.current){chartRef.current.destroy();chartRef.current=null;} };
  },[]);

  React.useEffect(()=>{
    if(chartRef.current){ chartRef.current.data.datasets[0].data[11]=live; chartRef.current.update(); }
  },[live]);

  return <div className="chart-canvas-wrap"><canvas ref={ref}/></div>;
}

function ActivityDonutChart() {
  const ref = React.useRef(null);
  React.useEffect(()=>{
    if(!ref.current) return;
    const ch = new Chart(ref.current,{
      type:'doughnut',
      data:{
        labels:['쪽지','호감도','큐피트','곡신청','SOS'],
        datasets:[{data:[28,22,15,10,5],backgroundColor:['#6366F1','#10B981','#EC4899','#F59E0B','#EF4444'],borderWidth:0,hoverOffset:6}]
      },
      options:{responsive:true,maintainAspectRatio:false,cutout:'68%',plugins:{legend:{position:'bottom',labels:{color:'#8B949E',font:{size:11},padding:10}},tooltip:{backgroundColor:'#1F2937',titleColor:'#E6EDF3',bodyColor:'#8B949E'}}}
    });
    return()=>ch.destroy();
  },[]);
  return <div className="chart-canvas-wrap"><canvas ref={ref}/></div>;
}

function ParticipantsPage({ participants, setParticipants, setToast }) {

  const [kickModal, setKickModal] = React.useState(null);

  const filtered = participants.filter(p=>{
    const matchSearch = p.nick.includes(search);
    const matchFilter = filter==='all'||p.status===filter||(filter==='flagged'&&p.flag);
    return matchSearch && matchFilter;
  });

  function kickUser(id) {
    setParticipants(ps=>ps.filter(p=>p.id!==id));
    setToast({msg:'참석자를 파티에서 내보냈습니다.',type:'warning'});

            {{all:'전체',online:'온라인',away:'자리비움',flagged:'⚑ 주의'}[f]}

        <div style={{flex:1}}/>

// 공지·곡 신청
function BroadcastPage({ songs, setSongs, sos, setSos, setToast }) {
  const [noticeText, setNoticeText] = React.useState('');
  const [notices, setNotices] = React.useState([
    {id:1,text:'🎉 파티 시작! 음료는 바 카운터에서 받아가세요',time:'20:00'},
    {id:2,text:'🎵 신청곡 1번 — 「밤편지」 곧 나옵니다',time:'20:10'},
  ]);
  const [dragOver, setDragOver] = React.useState(null);
  const [dragItem, setDragItem] = React.useState(null);

  function sendNotice() {
    if(!noticeText.trim()) return;
    const n={id:Date.now(),text:noticeText,time:new Date().toTimeString().slice(0,5)};
    setNotices(ns=>[...ns,n]);
    setToast({msg:'공지가 전체 참석자에게 발송됐습니다!',type:'success'});
    setNoticeText('');
  }
  function doneRequest(id) {
    setSongs(qs=>qs.map(q=>q.id===id?{...q,status:'done'}:q));
    setToast({msg:'처리 완료로 변경됐습니다.',type:'info'});
  }
  function handleSos(id,status) {
    setSos(ss=>ss.map(s=>s.id===id?{...s,status}:s));
    setToast({msg:status==='done'?'SOS 처리 완료!':'SOS 처리 중으로 변경됐습니다.',type:status==='done'?'success':'info'});
  }

  function dragStart(id){ setDragItem(id); }
  function dragEnter(id){ setDragOver(id); }
  function dragEnd(){
    if(dragItem==null||dragOver==null||dragItem===dragOver){ setDragItem(null);setDragOver(null);return; }
    setSongs(qs=>{
      const updated=[...qs];
      const from=updated.findIndex(q=>q.id===dragItem);
      const to=updated.findIndex(q=>q.id===dragOver);
      const [item]=updated.splice(from,1);
      updated.splice(to,0,item);
      return updated;
    });
    setDragItem(null); setDragOver(null);
    setToast({msg:'곡 순서가 변경됐습니다.',type:'info'});
  }

  return (
    <div style={{padding:'24px 28px',display:'grid',gridTemplateColumns:'1fr 1fr',gap:20,alignItems:'start'}}>
      {/* Left: Broadcast + SOS */}
      <div style={{display:'flex',flexDirection:'column',gap:16}}>
        {/* Broadcast */}
        <div style={{background:C.surface,borderRadius:14,padding:18,border:`1px solid ${C.border}`}}>
          <div style={{fontSize:14,fontWeight:700,marginBottom:14}}>📢 전체 공지 발송</div>
          <textarea value={noticeText} onChange={e=>setNoticeText(e.target.value)} placeholder="모든 참석자에게 보낼 공지 내용을 입력하세요..." rows={3} style={{width:'100%',padding:'12px',background:C.bg,border:`1px solid ${C.border}`,borderRadius:10,color:C.text,fontSize:13,resize:'none',fontFamily:'Pretendard',marginBottom:10}}/>
          <button onClick={sendNotice} style={{width:'100%',padding:'10px',background:C.gradient,border:'none',borderRadius:10,color:'#fff',fontWeight:700,fontSize:13,cursor:'pointer'}}>
            📢 전송하기
          </button>
          <div style={{marginTop:14}}>
            <div style={{fontSize:12,color:C.textSub,marginBottom:8}}>발송 이력</div>
            <div style={{display:'flex',flexDirection:'column',gap:8,maxHeight:180,overflowY:'auto'}}>
              {[...notices].reverse().map((n,i)=>(
                <div key={n.id} style={{padding:'10px 12px',background:C.bg,borderRadius:10,border:`1px solid ${C.borderSoft}`,animation:`slideUp 300ms ease ${i*50}ms both`}}>
                  <div style={{fontSize:13,color:C.text,marginBottom:4}}>{n.text}</div>
                  <div style={{fontSize:11,color:C.textDim}}>{n.time}</div>
                </div>
              ))}
            </div>
          </div>
        </div>

        {/* SOS */}
        <div style={{background:C.surface,borderRadius:14,padding:18,border:`1px solid ${C.border}`}}>
          <div style={{fontSize:14,fontWeight:700,marginBottom:12}}>🆘 SOS 요청 목록</div>
          <div style={{display:'flex',flexDirection:'column',gap:8}}>
            {sos.map((s,i)=>(
              <div key={s.id} style={{padding:'12px',background:s.status==='pending'?'rgba(239,68,68,0.08)':C.bg,borderRadius:10,border:`1px solid ${s.status==='pending'?'rgba(239,68,68,0.3)':C.borderSoft}`,animation:`slideUp 300ms ease ${i*60}ms both`}}>
                <div style={{display:'flex',justifyContent:'space-between',marginBottom:6}}>
                  <span style={{fontSize:13,fontWeight:600,color:C.text}}>{s.from}</span>
                  <span style={{fontSize:11,color:C.textDim}}>{s.time}</span>
                </div>
                <div style={{fontSize:13,color:C.textSub,marginBottom:8}}>{s.text}</div>
                {s.status==='pending'&&<button onClick={()=>handleSos(s.id,'done')} style={{fontSize:12,padding:'5px 12px',background:C.accent,border:'none',borderRadius:6,color:'#fff',fontWeight:600,cursor:'pointer'}}>처리 완료</button>}
                {s.status==='done'&&<span style={{fontSize:11,color:C.accent}}>✓ 처리 완료</span>}
              </div>
            ))}
          </div>
        </div>
      </div>

      {/* Right: Song queue */}
      <div style={{background:C.surface,borderRadius:14,padding:18,border:`1px solid ${C.border}`}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:14}}>
          <div style={{fontSize:14,fontWeight:700}}>🎵 신청곡 관리</div>
          <div style={{fontSize:11,color:C.textSub}}>드래그로 순서 조정</div>
        </div>
        <div style={{display:'flex',flexDirection:'column',gap:8}}>
          {songs.map((s,i)=>(
            <div key={s.id}
              draggable={s.status!=='done'}
              onDragStart={()=>dragStart(s.id)}
              onDragEnter={()=>dragEnter(s.id)}
              onDragEnd={dragEnd}
              onDragOver={e=>e.preventDefault()}
              style={{padding:'12px 14px',background:dragOver===s.id?'rgba(99,102,241,0.15)':s.status==='playing'?'rgba(16,185,129,0.08)':C.bg,borderRadius:10,border:`1px solid ${s.status==='playing'?'rgba(16,185,129,0.4)':dragOver===s.id?'rgba(99,102,241,0.4)':C.borderSoft}`,cursor:s.status!=='done'?'grab':'default',transition:'all 150ms',display:'flex',alignItems:'center',gap:12,animation:`slideUp 300ms ease ${i*50}ms both`}}>
              <div style={{fontSize:16,color:C.textDim,cursor:'grab'}}>⠿</div>
              <div style={{flex:1}}>
                <div style={{fontSize:13,fontWeight:600,color:C.text}}>{s.song}</div>
                <div style={{fontSize:11,color:C.textSub,marginTop:2}}>신청: {s.requester} · {s.time}</div>
              </div>
              <div style={{display:'flex',alignItems:'center',gap:8}}>
                {s.status==='playing'&&<span style={{fontSize:11,color:C.accent,background:'rgba(16,185,129,0.15)',padding:'3px 8px',borderRadius:20,fontWeight:600}}>▶ 재생중</span>}
                {s.status==='queued'&&<button onClick={()=>doneRequest(s.id)} style={{fontSize:11,padding:'4px 10px',background:C.surface,border:`1px solid ${C.border}`,borderRadius:6,color:C.textSub,cursor:'pointer',transition:'all 150ms'}} onMouseEnter={e=>e.target.style.borderColor=C.accent} onMouseLeave={e=>e.target.style.borderColor=C.border}>완료</button>}
                {s.status==='done'&&<span style={{fontSize:11,color:C.textDim}}>✓ 완료</span>}
              </div>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

                {{all:'전체',cupid:'💘 큐피트',msg:'💌 쪽지',like:'❤️ 호감',nick:'✏️ 닉변',song:'🎵 신청',sos:'🆘 SOS'}[f]}

                  onMouseEnter={e=>e.currentTarget.style.background=C.surfaceHover}

          {route==='대시보드' && <DashboardPage participants={participants} liveActivity={liveActivity}/>}
          {route==='참석자 관리' && <ParticipantsPage participants={participants} setParticipants={setParticipants} setToast={setToast}/>}
          {route==='공지·곡 신청' && <BroadcastPage songs={songs} setSongs={setSongs} sos={sos} setSos={setSos} setToast={setToast}/>}
          {route==='활동 로그' && <ActivityPage/>}
        </div>
      </main>

      {/* Footer */}
      <footer style={{background:C.surface,borderTop:`1px solid ${C.border}`,padding:'14px 28px',display:'flex',alignItems:'center',justifyContent:'space-between'}}>
        <div style={{fontSize:12,color:C.textDim}}>PartyOps Admin · 파티 운영 관리 플랫폼</div>
        <div style={{display:'flex',alignItems:'center',gap:6}}>
          <div style={{width:6,height:6,borderRadius:'50%',background:C.accent,animation:'pulse 1.2s infinite'}}/>
          <span style={{fontSize:11,color:C.accent}}>실시간 동기화 중</span>
        </div>
      </footer>

      {toast && <Toast message={toast.msg} type={toast.type} onClose={()=>setToast(null)}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
