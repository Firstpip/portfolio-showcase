/* ─── 공통 컴포넌트 ─── */
function CountUp({ end, suffix = '' }) {
  const [val, setVal] = useState(0);
  useEffect(() => {
    let cur = 0; const step = end / 40;
    const t = setInterval(() => {
      cur += step;
      if (cur >= end) { setVal(end); clearInterval(t); }
      else setVal(Math.floor(cur));
    }, 20);
    return () => clearInterval(t);
  }, [end]);
  return <span style={{ animation: 'countUp 400ms ease' }}>{val.toLocaleString()}{suffix}</span>;
}

function Toast({ msg, onClose }) {
  useEffect(() => { const t = setTimeout(onClose, 3000); return () => clearTimeout(t); }, []);
  return (
    <div style={{ position: 'fixed', bottom: 24, right: 24, zIndex: 9999,

      fontSize: 14, animation: 'slideUp 300ms ease', boxShadow: `0 4px 20px rgba(6,182,212,0.4)` }}>
      ✅ {msg}

  );
}

                animation: `slideUp 400ms ease ${i*80}ms both`,
                boxShadow: '0 4px 16px rgba(0,0,0,0.3)', transition: 'all 200ms',
                border: `1px solid ${item.shortage > 0 ? C.warning + '50' : C.border}` }}
              onMouseEnter={e => { e.currentTarget.style.transform = 'scale(1.02)'; }}
              onMouseLeave={e => { e.currentTarget.style.transform = 'scale(1)'; }}>
              <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: 12 }}>
                <div>
                  <div style={{ fontSize: 14, fontWeight: 700, color: C.text }}>{item.branch}</div>
                  <div style={{ fontSize: 11, color: C.textSub, marginTop: 2 }}>기기 {item.devices}대</div>
                </div>
                <StatusBadge status={item.orderStatus} />
              </div>
              <div style={{ marginBottom: 10 }}>
                <div style={{ display: 'flex', justifyContent: 'space-between', fontSize: 11,
                  color: C.textSub, marginBottom: 6 }}>
                  <span>평균 잔량</span>
                  <span style={{ fontWeight: 700, color: C.text }}>{item.avgRemain}회 / 200회</span>
                </div>
                <div style={{ height: 6, background: C.surface2, borderRadius: 3, overflow: 'hidden' }}>
                  <div style={{ height: '100%', borderRadius: 3,
                    background: pct <= 30 ? C.danger : pct <= 50 ? C.warning : C.primary,
                    width: `${pct}%`, animation: 'barGrow 800ms ease 200ms both',
                    '--target-width': `${pct}%` }} />
                </div>
              </div>
              {item.shortage > 0 && (
                <div style={{ fontSize: 11, color: C.warning, fontWeight: 600, marginBottom: 10 }}>
                  ⚠️ {item.shortage}대 잔량 부족
                </div>
              )}
              {item.shortage > 0 && item.orderStatus === '없음' && (
                <button onClick={e => { e.stopPropagation(); setOrderModal(item); }}
                  style={{ width: '100%', padding: '8px', borderRadius: 8, border: `1px solid ${C.primary}`,
                    background: 'transparent', color: C.primary, fontSize: 12, fontWeight: 700, cursor: 'pointer' }}>
                  발주 요청
                </button>
              )}
            </div>
          );
        })}
      </div>

      {drawer && (
        <Drawer title={`${drawer.branch} 소모품 상세`} onClose={() => setDrawer(null)}>
          <div style={{ display: 'flex', flexDirection: 'column', gap: 12 }}>
            {[
              ['지점', drawer.branch], ['기기 수', `${drawer.devices}대`],
              ['평균 잔량', `${drawer.avgRemain}회`], ['부족 기기', `${drawer.shortage}대`],
              ['마지막 발주', drawer.lastOrder], ['발주 상태', drawer.orderStatus],
            ].map(([k, v]) => (
              <div key={k} style={{ background: C.surface2, borderRadius: 10, padding: '12px 14px',
                display: 'flex', justifyContent: 'space-between' }}>
                <span style={{ fontSize: 12, color: C.textSub }}>{k}</span>
                <span style={{ fontSize: 13, fontWeight: 700, color: C.text }}>{v}</span>
              </div>
            ))}
            {drawer.shortage > 0 && drawer.orderStatus === '없음' && (
              <button onClick={() => { setDrawer(null); setOrderModal(drawer); }}
                style={{ padding: '12px', borderRadius: 10, border: 'none', cursor: 'pointer',
                  background: C.primary, color: '#fff', fontSize: 13, fontWeight: 700, marginTop: 8 }}>
                발주 요청
              </button>
            )}
          </div>
        </Drawer>
      )}

      {orderModal && (
        <Modal title={`${orderModal.branch} 발주 요청`} onClose={() => setOrderModal(null)} width={400}>
          <div style={{ textAlign: 'center', padding: '8px 0' }}>
            <div style={{ fontSize: 32, marginBottom: 12 }}>🧴</div>
            <div style={{ fontSize: 15, fontWeight: 600, color: C.text, marginBottom: 8 }}>
              {orderModal.branch} 피톤치드 발주를 요청하시겠습니까?
            </div>
            <div style={{ fontSize: 13, color: C.textSub, marginBottom: 20 }}>
              {orderModal.shortage}대 기기 잔량 부족 — 평균 {orderModal.avgRemain}회 남음
            </div>
            <div style={{ display: 'flex', gap: 8 }}>
              <button onClick={() => handleOrder(orderModal)}
                style={{ flex: 1, padding: '10px', borderRadius: 10, border: 'none', cursor: 'pointer',
                  background: C.primary, color: '#fff', fontSize: 13, fontWeight: 700 }}>발주 요청</button>
              <button onClick={() => setOrderModal(null)}
                style={{ flex: 1, padding: '10px', borderRadius: 10, border: `1px solid ${C.border}`, cursor: 'pointer',
                  background: 'transparent', color: C.textSub, fontSize: 13, fontWeight: 700 }}>취소</button>
            </div>
          </div>
        </Modal>
      )}
      {toast && <Toast msg={toast} onClose={() => setToast('')} />}
    </div>
  );
}

/* ─── 앱 ─── */

    { label: '알람', value: 3, suffix: '건', color: C.warning },
  ],
  analytics: [
    { label: '월 총 매출', value: 3121000, suffix: '원', color: C.primary },
    { label: '지점 수', value: 5, suffix: '개소', color: C.accent },
    { label: '최고 지점', value: 924000, suffix: '원(성남)', color: C.success },
  ],
  control: [
    { label: '대기 명령', value: 1, suffix: '건', color: C.warning },
    { label: '오늘 완료', value: 4, suffix: '건', color: C.success },
    { label: '실패', value: 1, suffix: '건', color: C.danger },
  ],
  inventory: [

    { label: '잔량 부족', value: 3, suffix: '대', color: C.warning },

  ],
};

function App() {
  const [tab, setTab] = useState('main');

  function renderPage() {
    switch (tab) {
      case 'main': return <MainPage />;
      case 'analytics': return <AnalyticsPage />;
      case 'control': return <ControlPage />;
      case 'inventory': return <InventoryPage />;
      default: return null;
    }
  }

  return (
    <div style={{ display: 'flex', flexDirection: 'column', width: '100%', minHeight: '100vh' }}>
      <NavBar tab={tab} onTab={setTab} />
      <HeroBanner tab={tab} kpis={PAGE_KPIS[tab]} />
      <main style={{ flex: 1, background: C.bg }}>
        {renderPage()}
      </main>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
