function CountUp({end, suffix=''}) {
  const [v,setV] = useState(0);
  useEffect(() => {
    let s=0, step=end/50;
    const t = setInterval(() => { s+=step; if(s>=end){setV(end);clearInterval(t);}else setV(Math.floor(s)); }, 24);
    return ()=>clearInterval(t);
  }, [end]);
  return <span style={{animation:'countUp 400ms ease'}}>{v.toLocaleString()}{suffix}</span>;
}

function Toast({msg,onClose}) {
  useEffect(()=>{ const t=setTimeout(onClose,3000); return()=>clearTimeout(t); },[]);
  return (
    <div style={{position:'fixed',bottom:24,right:24,zIndex:9999,background:C.primary,color:'#fff',
      padding:'12px 22px',borderRadius:8,fontSize:14,fontWeight:500,
      animation:'slideUp 300ms ease',boxShadow:'0 8px 32px rgba(26,26,46,0.2)'}}>
      {msg}
    </div>
  );
}

    </div>
  );

  const statusColors = {'검토중':['#FEF3C7','#D97706'],'견적발송':['#DBEAFE','#2563EB'],'계약완료':['#D1FAE5','#059669'],'취소':['#FEE2E2','#DC2626']};

  return (
    <div style={{flex:1,background:C.bg}}>
      <div style={{background:`linear-gradient(135deg,${C.primary},#2D2D5E)`,padding:'32px 48px',color:'#fff'}}>
        <div style={{maxWidth:1100,margin:'0 auto',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
          <div>
            <h2 style={{fontSize:24,fontWeight:800,marginBottom:4}}>CMS 관리자 대시보드</h2>
            <p style={{fontSize:13,opacity:0.7}}>콘텐츠 및 견적 요청 통합 관리</p>
          </div>
          <div style={{display:'flex',gap:12,alignItems:'center'}}>
            <span style={{fontSize:13,opacity:0.7}}>admin@luminate-tech.kr</span>
            <button onClick={()=>setLoggedIn(false)} style={{padding:'7px 16px',background:'rgba(255,255,255,0.1)',border:'1px solid rgba(255,255,255,0.2)',color:'#fff',borderRadius:4,fontSize:12,cursor:'pointer',fontFamily:'Pretendard,sans-serif'}}>로그아웃</button>
          </div>
        </div>
      </div>
      <div style={{maxWidth:1100,margin:'0 auto',padding:'32px 48px'}}>
        {/* KPI */}
        <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:16,marginBottom:28}}>
          {[{i:'📋',l:'전체 견적 요청',v:estimates.length},{i:'⏳',l:'검토 중',v:estimates.filter(e=>e.status==='검토중').length},
            {i:'📧',l:'견적 발송',v:estimates.filter(e=>e.status==='견적발송').length},{i:'✅',l:'계약 완료',v:estimates.filter(e=>e.status==='계약완료').length}
          ].map((k,i)=>(
            <div key={i} style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:10,padding:'20px',
              animation:`slideUp 300ms ease ${i*60}ms both`}}>
              <div style={{fontSize:24,marginBottom:8}}>{k.i}</div>
              <div style={{fontSize:26,fontWeight:800,color:C.textPrimary,animation:'countUp 400ms ease'}}>{k.v}</div>
              <div style={{fontSize:12,color:C.textSecondary,marginTop:4}}>{k.l}</div>
            </div>
          ))}
        </div>

        {/* Tabs */}
        <div style={{display:'flex',gap:0,marginBottom:20,borderBottom:`1px solid ${C.border}`}}>
          {[{v:'estimates',l:'견적 요청 관리'},{v:'content',l:'콘텐츠 관리'},{v:'settings',l:'사이트 설정'}].map(t=>(
            <button key={t.v} onClick={()=>setActiveTab(t.v)}
              style={{padding:'10px 20px',background:'transparent',border:'none',cursor:'pointer',fontSize:14,fontWeight:600,
                fontFamily:'Pretendard,sans-serif',color:activeTab===t.v?C.primary:C.textSecondary,
                borderBottom:`2px solid ${activeTab===t.v?C.primary:'transparent'}`,transition:'all 200ms'}}>
              {t.l}
            </button>
          ))}
        </div>

        {activeTab==='estimates' && (
          <div style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:10,overflow:'hidden'}}>
            <div style={{padding:'16px 20px',borderBottom:`1px solid ${C.border}`,display:'flex',justifyContent:'space-between',alignItems:'center'}}>
              <h3 style={{fontSize:15,fontWeight:700,color:C.textPrimary}}>견적 요청 목록</h3>
              <span style={{fontSize:12,color:C.textSecondary}}>총 {estimates.length}건</span>
            </div>
            <table style={{width:'100%',borderCollapse:'collapse'}}>
              <thead>
                <tr style={{background:C.bg}}>
                  {['담당자','회사','서비스','규모','요청일','상태','관리'].map(h=>(
                    <th key={h} style={{padding:'10px 16px',fontSize:11,fontWeight:700,color:C.textSecondary,textAlign:'left',letterSpacing:'0.05em',textTransform:'uppercase'}}>{h}</th>
                  ))}
                </tr>
              </thead>
              <tbody>
                {estimates.map((e,i)=>{
                  const [bg,fg] = statusColors[e.status]||['#F3F4F6','#6B7280'];
                  return (
                    <tr key={e.id} style={{borderTop:`1px solid ${C.border}`,transition:'background 150ms',cursor:'pointer'}}
                      onMouseEnter={el=>el.currentTarget.style.background='rgba(201,168,76,0.04)'}
                      onMouseLeave={el=>el.currentTarget.style.background='transparent'}>
                      <td style={{padding:'12px 16px',fontSize:13,fontWeight:600,color:C.textPrimary}}>{e.name}</td>
                      <td style={{padding:'12px 16px',fontSize:13,color:C.textSecondary}}>{e.company}</td>
                      <td style={{padding:'12px 16px',fontSize:13,color:C.textSecondary}}>{e.service}</td>
                      <td style={{padding:'12px 16px',fontSize:13,color:C.textSecondary}}>{e.size}</td>
                      <td style={{padding:'12px 16px',fontSize:12,color:C.textSecondary}}>{e.date}</td>
                      <td style={{padding:'12px 16px'}}>
                        <select value={e.status} onChange={ev=>{const next=[...estimates];next[i]={...e,status:ev.target.value};setEstimates(next);toast(`✅ ${e.name} 상태가 변경되었습니다.`);}}
                          style={{padding:'4px 10px',background:bg,color:fg,border:'none',borderRadius:999,
                            fontSize:11,fontWeight:600,cursor:'pointer',fontFamily:'Pretendard,sans-serif'}}>
                          {Object.keys(statusColors).map(s=><option key={s} value={s}>{s}</option>)}
                        </select>
                      </td>
                      <td style={{padding:'12px 16px'}}>
                        <button onClick={()=>setEditModal(e)} style={{padding:'5px 12px',background:C.primary,color:'#fff',border:'none',borderRadius:4,fontSize:11,cursor:'pointer',fontFamily:'Pretendard,sans-serif'}}>상세</button>
                      </td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </div>
        )}

        {activeTab==='content' && (
          <div style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:10,overflow:'hidden'}}>
            <div style={{padding:'16px 20px',borderBottom:`1px solid ${C.border}`,display:'flex',justifyContent:'space-between',alignItems:'center'}}>
              <h3 style={{fontSize:15,fontWeight:700,color:C.textPrimary}}>서비스 콘텐츠 관리</h3>
              <button onClick={()=>toast('✅ 콘텐츠 새로고침 완료')} style={{padding:'7px 14px',background:C.primary,color:'#fff',border:'none',borderRadius:4,fontSize:12,cursor:'pointer',fontFamily:'Pretendard,sans-serif'}}>+ 콘텐츠 추가</button>
            </div>
            <table style={{width:'100%',borderCollapse:'collapse'}}>
              <thead>
                <tr style={{background:C.bg}}>
                  {['제목','상태','조회수','수정일','관리'].map(h=><th key={h} style={{padding:'10px 16px',fontSize:11,fontWeight:700,color:C.textSecondary,textAlign:'left',letterSpacing:'0.05em',textTransform:'uppercase'}}>{h}</th>)}
                </tr>
              </thead>
              <tbody>
                {CMS_CONTENT.services.map(s=>(
                  <tr key={s.id} style={{borderTop:`1px solid ${C.border}`}}>
                    <td style={{padding:'12px 16px',fontSize:13,fontWeight:600,color:C.textPrimary}}>{s.title}</td>
                    <td style={{padding:'12px 16px'}}>
                      <span style={{padding:'3px 10px',background:s.status==='published'?'#D1FAE5':'#FEF3C7',color:s.status==='published'?'#059669':'#D97706',borderRadius:999,fontSize:11,fontWeight:600}}>
                        {s.status==='published'?'게시중':'임시저장'}
                      </span>
                    </td>
                    <td style={{padding:'12px 16px',fontSize:13,color:C.textSecondary}}>{s.views.toLocaleString()}</td>
                    <td style={{padding:'12px 16px',fontSize:12,color:C.textSecondary}}>{s.updated}</td>
                    <td style={{padding:'12px 16px',display:'flex',gap:6}}>
                      <button onClick={()=>toast(`✅ ${s.title} 편집 모드 진입`)} style={{padding:'5px 12px',background:C.bg,border:`1px solid ${C.border}`,borderRadius:4,fontSize:11,cursor:'pointer',fontFamily:'Pretendard,sans-serif',color:C.textPrimary}}>편집</button>
                      <button onClick={()=>toast(`ℹ️ ${s.title} 미리보기`)} style={{padding:'5px 12px',background:C.primary,color:'#fff',border:'none',borderRadius:4,fontSize:11,cursor:'pointer',fontFamily:'Pretendard,sans-serif'}}>미리보기</button>
                    </td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        )}

        {activeTab==='settings' && (
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:20}}>
            {[
              {title:'기본 언어 설정',desc:'사이트 기본 표시 언어를 설정합니다.'},
              {title:'Redis 캐시 설정',desc:'콘텐츠 캐시 TTL 및 무효화 정책을 설정합니다.'},
              {title:'이메일 알림 설정',desc:'견적 요청 수신 시 알림 이메일 설정입니다.'},
              {title:'보안 설정',desc:'JWT 토큰 만료 시간 및 IP 화이트리스트를 관리합니다.'},
            ].map((s,i)=>(
              <div key={i} style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:10,padding:'24px'}}>
                <h4 style={{fontSize:14,fontWeight:700,color:C.textPrimary,marginBottom:8}}>{s.title}</h4>
                <p style={{fontSize:12,color:C.textSecondary,lineHeight:1.6,marginBottom:16}}>{s.desc}</p>
                <button onClick={()=>toast(`✅ ${s.title} 저장되었습니다.`)} style={{padding:'8px 16px',background:C.primary,color:'#fff',border:'none',borderRadius:4,fontSize:12,cursor:'pointer',fontFamily:'Pretendard,sans-serif'}}>설정 변경</button>
              </div>
            ))}
          </div>
        )}
      </div>

      {editModal && (
        <Modal title={`견적 상세 — ${editModal.name}`} onClose={()=>setEditModal(null)}>
          <div style={{display:'flex',flexDirection:'column',gap:14}}>
            {[['담당자',editModal.name],['회사',editModal.company],['서비스',editModal.service],['규모',editModal.size],['요청일',editModal.date],['현재 상태',editModal.status]].map(([k,v])=>(
              <div key={k} style={{display:'flex',padding:'8px 0',borderBottom:`1px solid ${C.border}`}}>
                <span style={{width:80,fontSize:12,fontWeight:600,color:C.textSecondary}}>{k}</span>
                <span style={{fontSize:13,color:C.textPrimary}}>{v}</span>
              </div>
            ))}
            <div>
              <label style={{fontSize:12,fontWeight:600,color:C.textSecondary,display:'block',marginBottom:6}}>관리자 메모</label>
              <textarea placeholder="내부 메모를 입력하세요..." style={{width:'100%',padding:'10px 14px',border:`1px solid ${C.border}`,borderRadius:6,fontSize:13,color:C.textPrimary,background:C.bg,fontFamily:'Pretendard,sans-serif',outline:'none',resize:'vertical',minHeight:80}}/>
            </div>
            <button onClick={()=>{toast('✅ 저장되었습니다.');setEditModal(null);}} style={{padding:'10px',background:C.primary,color:'#fff',border:'none',borderRadius:4,fontSize:13,fontWeight:600,cursor:'pointer',fontFamily:'Pretendard,sans-serif'}}>저장</button>
          </div>
        </Modal>
      )}
    </div>
  );
}

function App() {
  const [tab, setTab] = useState('home');
  const [lang, setLang] = useState('ko');
  const [contentKey, setContentKey] = useState(0);
  const [toastMsg, setToastMsg] = useState(null);

  const toast = (msg) => setToastMsg(msg);

  const changeTab = (t) => { setTab(t); setContentKey(k=>k+1); };
  const t = I18N[lang];

  const TABS = [
    {id:'home',label:t.nav.home},
    {id:'services',label:t.nav.services},
    {id:'portfolio',label:t.nav.portfolio},
    {id:'estimate',label:t.nav.estimate},
    {id:'admin',label:t.nav.admin},
  ];

  return (
    <div style={{display:'flex',flexDirection:'column',width:'100%',minHeight:'100vh',background:C.bg}}>
      {/* Header */}
      <header style={{position:'sticky',top:0,zIndex:100,background:C.surface,borderBottom:`1px solid ${C.border}`,
        display:'flex',alignItems:'center',height:56,padding:'0 24px',gap:4}}>
        <div onClick={()=>changeTab('home')} style={{fontSize:16,fontWeight:800,color:C.primary,letterSpacing:'-0.01em',marginRight:12,cursor:'pointer'}}>LUMINATE</div>
        <nav style={{display:'flex',gap:0,flex:1}}>
          {TABS.map(tb=>(
            <button key={tb.id} onClick={()=>changeTab(tb.id)}
              title={tb.label}
              style={{padding:'0 14px',height:56,background:'transparent',border:'none',cursor:'pointer',
                fontSize:13,fontWeight:600,color:tab===tb.id?C.primary:C.textSecondary,
                borderBottom:`2px solid ${tab===tb.id?C.primary:'transparent'}`,
                transition:'all 200ms',fontFamily:'Pretendard,sans-serif'}}>
              {tb.label}
            </button>
          ))}
        </nav>
        <div style={{display:'flex',alignItems:'center',gap:10}}>
          <button onClick={()=>setLang(l=>l==='ko'?'en':'ko')}
            style={{padding:'5px 12px',border:`1px solid ${C.border}`,borderRadius:999,fontSize:11,
              fontWeight:700,cursor:'pointer',background:C.bg,color:C.textSecondary,fontFamily:'Pretendard,sans-serif',transition:'all 200ms'}}
            onMouseEnter={e=>{e.currentTarget.style.borderColor=C.gold;e.currentTarget.style.color=C.gold;}}
            onMouseLeave={e=>{e.currentTarget.style.borderColor=C.border;e.currentTarget.style.color=C.textSecondary;}}>
            {lang==='ko'?'EN':'한'}
          </button>
        </div>
      </header>

      {/* Content */}
      <div key={contentKey} style={{display:'flex',flexDirection:'column',flex:1,animation:'fadeIn 250ms ease'}}>
        {tab==='home' && <HomePage lang={lang} setTab={changeTab} toast={toast}/>}
        {tab==='services' && <ServicesPage lang={lang} toast={toast}/>}
        {tab==='portfolio' && <PortfolioPage toast={toast}/>}
        {tab==='estimate' && <EstimatePage toast={toast}/>}
        {tab==='admin' && <AdminPage toast={toast}/>}
      </div>

      {/* Footer */}
      <footer style={{background:C.primary,color:'#fff',padding:'40px 48px 28px'}}>
        <div style={{maxWidth:1100,margin:'0 auto'}}>
          <div style={{display:'grid',gridTemplateColumns:'2fr 1fr 1fr 1fr',gap:40,marginBottom:32}}>
            <div>
              <div style={{fontSize:18,fontWeight:800,color:C.gold,letterSpacing:'0.05em',marginBottom:12}}>LUMINATE</div>
              <p style={{fontSize:12,opacity:0.6,lineHeight:1.8}}>조명과 레이저 맵핑 기술로<br/>모든 공간에 새로운 경험을 만듭니다.</p>
            </div>
            {[
              {title:'서비스',links:['조명 시공','레이저 맵핑','미디어 연출','기술 컨설팅']},
              {title:'회사',links:['회사 소개','연혁','채용','뉴스']},
              {title:'지원',links:['프로젝트 문의','FAQ','이용약관','개인정보처리방침']},
            ].map(col=>(
              <div key={col.title}>
                <div style={{fontSize:11,fontWeight:700,letterSpacing:'0.1em',textTransform:'uppercase',opacity:0.9,marginBottom:14}}>{col.title}</div>
                <div style={{display:'flex',flexDirection:'column',gap:9}}>
                  {col.links.map(l=><a key={l} href="#" style={{fontSize:12,opacity:0.6,color:'#fff',textDecoration:'none',transition:'opacity 200ms'}}
                    onMouseEnter={e=>e.target.style.opacity='1'} onMouseLeave={e=>e.target.style.opacity='0.6'}>{l}</a>)}
                </div>
              </div>
            ))}
          </div>
          <div style={{borderTop:'1px solid rgba(255,255,255,0.1)',paddingTop:20,display:'flex',justifyContent:'space-between',alignItems:'center'}}>
            <span style={{fontSize:11,opacity:0.5}}>© 2025 Luminate Tech. All rights reserved.</span>
            <span style={{fontSize:11,opacity:0.5}}>서울특별시 마포구 디지털미디어시티 1길 35</span>
          </div>
        </div>
      </footer>

      {toastMsg && <Toast msg={toastMsg} onClose={()=>setToastMsg(null)}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
