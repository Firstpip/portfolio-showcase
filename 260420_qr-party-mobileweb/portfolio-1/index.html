*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;font-family:'Pretendard',sans-serif;background:#0A0618;color:#F5F3FF;overflow-x:hidden;}
#root{display:flex;width:100%;min-height:100vh;}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes fadeInScale{from{opacity:0;transform:scale(0.95)}to{opacity:1;transform:scale(1)}}
@keyframes slideInRight{from{opacity:0;transform:translateX(30px)}to{opacity:1;transform:translateX(0)}}
@keyframes slideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes ripple{0%{transform:scale(0);opacity:0.5}100%{transform:scale(4);opacity:0}}
@keyframes countUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.5}}
@keyframes barGrow{from{width:0%}to{width:var(--target-width)}}
@keyframes slideDown{from{opacity:0;transform:translateY(-10px);max-height:0}to{opacity:1;transform:translateY(0);max-height:500px}}
@keyframes glowPulse{0%,100%{box-shadow:0 0 20px rgba(124,58,237,0.4)}50%{box-shadow:0 0 40px rgba(124,58,237,0.8)}}
@keyframes heartBeat{0%,100%{transform:scale(1)}50%{transform:scale(1.3)}}
@keyframes countdown{0%{opacity:1;transform:scale(1)}100%{opacity:0.6;transform:scale(0.95)}}

function Toast({message, onClose}){
  React.useEffect(()=>{const t=setTimeout(onClose,3000);return()=>clearTimeout(t);},[]);
  return (
    <div style={{position:'fixed',bottom:80,left:'50%',transform:'translateX(-50%)',zIndex:9999,
      background:C.primary,color:'#fff',padding:'12px 24px',borderRadius:24,
      animation:'slideUp 300ms ease',boxShadow:`0 4px 20px rgba(124,58,237,0.5)`,
      fontSize:13,fontWeight:600,whiteSpace:'nowrap'}}>
      {message}
    </div>
  );
}

function Modal({title, onClose, children}){
  return (
    <div style={{position:'fixed',inset:0,zIndex:500,display:'flex',alignItems:'center',justifyContent:'center',padding:'0 16px'}}>
      <div onClick={onClose} style={{position:'absolute',inset:0,background:'rgba(0,0,0,0.7)',animation:'fadeIn 200ms ease'}}/>
      <div style={{position:'relative',width:'100%',maxWidth:440,maxHeight:'85vh',
        background:C.surface,borderRadius:20,zIndex:501,animation:'fadeInScale 200ms ease',
        display:'flex',flexDirection:'column',boxShadow:`0 20px 60px rgba(0,0,0,0.5),0 0 40px rgba(124,58,237,0.2)`,
        border:`1px solid ${C.border}`}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',

          <h3 style={{fontSize:16,fontWeight:700,color:C.text}}>{title}</h3>
          <button onClick={onClose} style={{background:'none',border:'none',fontSize:18,cursor:'pointer',color:C.textMuted}}>✕</button>
        </div>
        <div style={{padding:'16px 20px',overflowY:'auto',flex:1}}>{children}</div>
      </div>
    </div>
  );
}

function CountdownTimer(){
  const [elapsed, setElapsed] = React.useState(PARTY_INFO.elapsedMinutes * 60);
  const total = PARTY_INFO.totalMinutes * 60;
  React.useEffect(()=>{
    const t=setInterval(()=>setElapsed(e=>e<total?e+1:e),1000);
    return()=>clearInterval(t);
  },[]);
  const remaining = total - elapsed;
  const mm = String(Math.floor(remaining/60)).padStart(2,'0');
  const ss = String(remaining%60).padStart(2,'0');
  const pct = (elapsed/total)*100;
  return(
    <div style={{textAlign:'center'}}>
      <div style={{fontSize:12,color:C.textMuted,marginBottom:6}}>파티 종료까지</div>
      <div style={{fontSize:40,fontWeight:800,color:C.accentLight,letterSpacing:2,
        animation:'countUp 400ms ease',fontVariantNumeric:'tabular-nums'}}>
        {mm}:{ss}
      </div>
      <div style={{marginTop:10,height:6,borderRadius:99,background:'rgba(255,255,255,0.1)',overflow:'hidden'}}>
        <div style={{height:'100%',borderRadius:99,
          background:`linear-gradient(90deg,${C.primary},${C.accentLight})`,
          width:`${pct}%`,transition:'width 1s linear'}}/>
      </div>
      <div style={{fontSize:11,color:C.textDim,marginTop:4}}>{Math.floor(elapsed/60)}분 진행 / {PARTY_INFO.totalMinutes}분 총 파티</div>
    </div>
  );
}

function CupidPage(){
  const [cupidsLeft, setCupidsLeft] = React.useState(MY_STATUS.cupidsLeft);
  const [likesLeft, setLikesLeft] = React.useState(MY_STATUS.likesLeft);
  const [selected, setSelected] = React.useState(null);
  const [toast, setToast] = React.useState(null);
  const [likeModal, setLikeModal] = React.useState(null);
  const [cupidAnim, setCupidAnim] = React.useState(null);
  const [rank, setRank] = React.useState(LIKE_RANK);

  const sendCupid = (p)=>{
    if(cupidsLeft<=0){setToast('큐피트 사용 횟수를 모두 사용했습니다');return;}
    setCupidsLeft(c=>c-1);
    setCupidAnim(p.id);
    setTimeout(()=>setCupidAnim(null),1500);
    setToast(`${p.nickname}님에게 큐피트를 발사했습니다 💘`);
  };
  const sendLike = (p)=>{
    if(likesLeft<=0){setToast('호감도 사용 횟수를 모두 사용했습니다');setLikeModal(null);return;}
    setLikesLeft(c=>c-1);
    setRank(prev=>prev.map(r=>r.nickname===p.nickname?{...r,count:r.count+1}:{...r}).sort((a,b)=>b.count-a.count).map((r,i)=>({...r,rank:i+1})));
    setLikeModal(null);
    setToast(`${p.nickname}님에게 호감도를 전달했습니다 ❤️`);
  };

  return(
    <div style={{animation:'fadeIn 300ms ease'}}>
      {/* 잔여 횟수 */}
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12,marginBottom:16}}>
        <div style={{background:`linear-gradient(135deg,${C.pink},#BE185D)`,borderRadius:18,padding:20,
          boxShadow:`0 4px 20px rgba(236,72,153,0.3)`}}>

          <div style={{fontSize:11,color:'rgba(255,255,255,0.6)',marginTop:4}}>발사 횟수</div>
        </div>
        <div style={{background:`linear-gradient(135deg,${C.danger},#DC2626)`,borderRadius:18,padding:20,
          boxShadow:`0 4px 20px rgba(248,113,113,0.3)`}}>
          <div style={{fontSize:12,color:'rgba(255,255,255,0.7)',marginBottom:4}}>호감도 잔여</div>
          <div style={{fontSize:36,fontWeight:800,color:'#fff'}}>{likesLeft}<span style={{fontSize:16}}>/3</span></div>
          <div style={{fontSize:11,color:'rgba(255,255,255,0.6)',marginTop:4}}>전달 횟수</div>
        </div>
      </div>

      {/* 호감도 순위 */}
      <div style={{background:C.surface,borderRadius:20,padding:20,marginBottom:16,border:`1px solid ${C.border}`}}>
        <div style={{fontSize:12,color:C.textMuted,marginBottom:14,fontWeight:600}}>🏆 호감도 순위</div>
        {rank.slice(0,6).map((p,i)=>(
          <div key={p.nickname} style={{display:'flex',alignItems:'center',gap:12,
            padding:'10px 0',borderBottom:i<5?`1px solid rgba(255,255,255,0.05)`:'none',
            animation:`slideUp 400ms ease ${i*60}ms both`}}>
            <div style={{width:28,height:28,borderRadius:'50%',
              background:i===0?'linear-gradient(135deg,#F59E0B,#D97706)':i===1?'linear-gradient(135deg,#9CA3AF,#6B7280)':i===2?'linear-gradient(135deg,#CD7C2F,#92400E)':'rgba(255,255,255,0.08)',
              display:'flex',alignItems:'center',justifyContent:'center',

                  ❤️ 호감도
                </button>
              </div>
            </div>
          ))}

      </div>

      {likeModal && (
        <Modal title="호감도 전달" onClose={()=>setLikeModal(null)}>
          <div style={{textAlign:'center',padding:'8px 0'}}>
            <div style={{fontSize:40,marginBottom:12,animation:'heartBeat 0.6s ease'}}>❤️</div>

              <button onClick={()=>sendLike(likeModal)} style={{flex:1,background:C.danger,border:'none',
                borderRadius:12,padding:'12px',color:'#fff',cursor:'pointer',fontSize:14,fontWeight:700}}>전달하기</button>
            </div>
          </div>
        </Modal>

      {toast && <Toast message={toast} onClose={()=>setToast(null)}/>}
    </div>
  );
}

function MessagePage(){
  const [messages, setMessages] = React.useState(MESSAGES);
  const [compose, setCompose] = React.useState(false);
  const [detail, setDetail] = React.useState(null);
  const [toNick, setToNick] = React.useState('');
  const [msgText, setMsgText] = React.useState('');
  const [toast, setToast] = React.useState(null);

  const sendMsg = ()=>{
    if(!toNick.trim()||!msgText.trim())return;
    const newMsg = {id:Date.now(),from:'나',to:toNick.trim(),time:'지금',text:msgText.trim(),isNew:false};
    setMessages(m=>[newMsg,...m]);
    setToNick('');setMsgText('');
    setCompose(false);
    setToast(`${newMsg.to}님에게 쪽지를 보냈습니다 💌`);
  };

  return(
    <div style={{animation:'fadeIn 300ms ease'}}>
      {/* 새 쪽지 작성 버튼 */}
      <button onClick={()=>setCompose(true)} style={{
        width:'100%',background:`linear-gradient(135deg,${C.primary},${C.primaryLight})`,
        border:'none',borderRadius:16,padding:'16px',color:'#fff',
        fontSize:14,fontWeight:700,cursor:'pointer',marginBottom:16,
        boxShadow:`0 4px 20px rgba(124,58,237,0.4)`}}>
        ✏️ 새 쪽지 보내기
      </button>

      {/* 쪽지 목록 */}
      <div style={{background:C.surface,borderRadius:20,padding:20,border:`1px solid ${C.border}`}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:14}}>
          <div style={{fontSize:12,color:C.textMuted,fontWeight:600}}>받은/보낸 쪽지</div>
          <span style={{fontSize:11,background:`rgba(124,58,237,0.2)`,color:C.primaryLight,
            padding:'3px 10px',borderRadius:20}}>
            {messages.filter(m=>m.isNew).length}개 읽지않음
          </span>
        </div>
        {messages.map((msg,i)=>(
          <div key={msg.id} onClick={()=>{setDetail(msg);setMessages(ms=>ms.map(m=>m.id===msg.id?{...m,isNew:false}:m));}}
            style={{
              padding:'14px',marginBottom:8,borderRadius:14,cursor:'pointer',
              background:msg.isNew?`rgba(124,58,237,0.15)`:C.surfaceAlt,
              border:`1px solid ${msg.isNew?C.primary:C.border}`,
              transition:'all 200ms',animation:`slideUp 400ms ease ${i*80}ms both`}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:6}}>
              <div style={{display:'flex',alignItems:'center',gap:8}}>
                {msg.isNew && <div style={{width:6,height:6,borderRadius:'50%',background:C.primary,flexShrink:0}}/>}
                <div>
                  <span style={{fontSize:12,color:C.textDim}}>{msg.from==='나'?`나 → ${msg.to}`:`${msg.from} → 나`}</span>
                </div>
              </div>
              <span style={{fontSize:11,color:C.textDim}}>{msg.time}</span>
            </div>
            <div style={{fontSize:14,color:C.text,lineHeight:1.4,
              overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>
              {msg.text}
            </div>
          </div>
        ))}
      </div>

      {compose && (
        <Modal title="💌 쪽지 보내기" onClose={()=>setCompose(false)}>
          <div>
            <label style={{fontSize:13,color:C.textMuted,display:'block',marginBottom:6}}>받는 사람 닉네임</label>
            <select value={toNick} onChange={e=>setToNick(e.target.value)}
              style={{width:'100%',background:C.surfaceAlt,border:`1px solid ${C.border}`,
                borderRadius:10,padding:'10px 14px',color:C.text,fontSize:14,outline:'none',marginBottom:12}}>
              <option value="">닉네임 선택</option>
              {PARTICIPANTS.filter(p=>p.nickname!==MY_STATUS.nickname).map(p=>(
                <option key={p.id} value={p.nickname}>{p.nickname}</option>
              ))}
            </select>
            <label style={{fontSize:13,color:C.textMuted,display:'block',marginBottom:6}}>쪽지 내용</label>
            <textarea value={msgText} onChange={e=>setMsgText(e.target.value)}
              placeholder="쪽지 내용을 입력하세요 (최대 100자)"
              maxLength={100}
              style={{width:'100%',height:100,background:C.surfaceAlt,border:`1px solid ${C.border}`,
                borderRadius:10,padding:'10px 14px',color:C.text,fontSize:14,outline:'none',resize:'none'}}/>
            <div style={{textAlign:'right',fontSize:11,color:C.textDim,marginTop:4,marginBottom:12}}>
              {msgText.length}/100
            </div>
            <button onClick={sendMsg} style={{width:'100%',background:C.primary,border:'none',borderRadius:12,
              padding:'13px',color:'#fff',fontSize:14,fontWeight:700,cursor:'pointer'}}>
              보내기
            </button>
          </div>
        </Modal>
      )}

      {detail && (
        <Modal title="쪽지 상세" onClose={()=>setDetail(null)}>
          <div>
            <div style={{background:C.surfaceAlt,borderRadius:12,padding:16,marginBottom:16}}>
              <div style={{fontSize:12,color:C.textDim,marginBottom:8}}>
                {detail.from==='나'?`나 → ${detail.to}`:`${detail.from} → 나`} · {detail.time}
              </div>
              <p style={{fontSize:15,color:C.text,lineHeight:1.6}}>{detail.text}</p>
            </div>
            {detail.from!=='나' && (
              <button onClick={()=>{setDetail(null);setCompose(true);setToNick(detail.from);}}
                style={{width:'100%',background:C.primary,border:'none',borderRadius:12,
                  padding:'13px',color:'#fff',fontSize:14,fontWeight:700,cursor:'pointer'}}>
                답장하기
              </button>
            )}
          </div>
        </Modal>
      )}

      {toast && <Toast message={toast} onClose={()=>setToast(null)}/>}
    </div>
  );
}

        scrollbarWidth:'none',position:'sticky',top:56,zIndex:99}}>
        {TABS.map(t=>(
          <button key={t.id} onClick={()=>setTab(t.id)} style={{
            flex:'0 0 auto',padding:'12px 16px',
            background:'none',border:'none',cursor:'pointer',
            fontSize:12,fontWeight:600,whiteSpace:'nowrap',
            color:tab===t.id?C.primaryLight:C.textDim,
            borderBottom:`2px solid ${tab===t.id?C.primary:'transparent'}`,
            transition:'all 200ms'}}>
            {t.label}
          </button>
        ))}
      </nav>

      {/* 히어로 배너 */}
      <div style={{
        background:`linear-gradient(135deg,rgba(124,58,237,0.3),rgba(245,158,11,0.1))`,
        borderBottom:`1px solid ${C.border}`,padding:'16px 20px'}}>
        <div style={{display:'flex',gap:24}}>
          {tab==='main'&&[
            {v:PARTY_INFO.currentOnline,l:'온라인'},
            {v:`${Math.round((PARTY_INFO.totalMinutes-PARTY_INFO.elapsedMinutes))}분`,l:'남은 시간'},
            {v:MY_STATUS.messages,l:'새 쪽지'},
          ].map((k,i)=>(
            <div key={i}>
              <div style={{fontSize:18,fontWeight:800,color:C.accentLight}}>{k.v}</div>
              <div style={{fontSize:10,color:C.textDim,marginTop:1}}>{k.l}</div>
            </div>
          ))}
          {tab==='nickname'&&[
            {v:MY_STATUS.nickname,l:'현재 닉네임'},
            {v:`${MY_STATUS.nicknameChangesLeft}회`,l:'변경 가능'},
            {v:MY_STATUS.applied2nd?'완료':'대기중',l:'2차 신청'},
          ].map((k,i)=>(
            <div key={i}>
              <div style={{fontSize:14,fontWeight:800,color:C.accentLight}}>{k.v}</div>
              <div style={{fontSize:10,color:C.textDim,marginTop:1}}>{k.l}</div>
            </div>
          ))}
          {tab==='cupid'&&[
            {v:`${cupidsLeft || MY_STATUS.cupidsLeft}회`,l:'큐피트 잔여'},
            {v:`${likesLeft || MY_STATUS.likesLeft}회`,l:'호감도 잔여'},
            {v:LIKE_RANK[0]?.nickname,l:'현재 1위'},
          ].map((k,i)=>(
            <div key={i}>
              <div style={{fontSize:14,fontWeight:800,color:C.accentLight}}>{k.v}</div>
              <div style={{fontSize:10,color:C.textDim,marginTop:1}}>{k.l}</div>
            </div>
          ))}
          {tab==='message'&&[
            {v:MESSAGES.filter(m=>m.isNew).length,l:'읽지않음'},
            {v:MESSAGES.length,l:'전체 쪽지'},
            {v:'활성',l:'쪽지 상태'},
          ].map((k,i)=>(
            <div key={i}>
              <div style={{fontSize:14,fontWeight:800,color:C.accentLight}}>{k.v}</div>
              <div style={{fontSize:10,color:C.textDim,marginTop:1}}>{k.l}</div>
            </div>
          ))}
        </div>
      </div>

      {/* 메인 콘텐츠 */}
      <main style={{flex:1,padding:'16px 20px 80px',position:'relative',zIndex:1}}>
        {tab==='main' && <MainPage onMsg={goMsg}/>}
        {tab==='nickname' && <NicknamePage/>}
        {tab==='cupid' && <CupidPage/>}
        {tab==='message' && <MessagePage/>}
      </main>

      {/* 하단 바 */}
      <div style={{position:'fixed',bottom:0,left:0,right:0,zIndex:200,
        background:'rgba(10,6,24,0.95)',backdropFilter:'blur(20px)',
        borderTop:`1px solid ${C.border}`,padding:'8px 0',
        display:'flex',justifyContent:'space-around'}}>
        {TABS.map(t=>(
          <button key={t.id} onClick={()=>setTab(t.id)} style={{
            display:'flex',flexDirection:'column',alignItems:'center',gap:3,
            padding:'6px 12px',background:'none',border:'none',cursor:'pointer',
            color:tab===t.id?C.primary:C.textDim,transition:'all 200ms'}}>
            <span style={{fontSize:18,transform:tab===t.id?'scale(1.2)':'scale(1)',transition:'transform 200ms'}}>{t.icon}</span>
            <span style={{fontSize:9,fontWeight:tab===t.id?700:400}}>{t.label.split(' ')[0]}</span>
          </button>
        ))}
      </div>
    </div>
  );
}

// 전역 상태용 변수 (closure 참조)
let cupidsLeft = MY_STATUS.cupidsLeft;
let likesLeft = MY_STATUS.likesLeft;

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
