*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;font-family:'Pretendard',sans-serif;background:#F8FAFC;color:#0F172A;}
#root{display:flex;flex-direction:column;width:100%;min-height:100vh;}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes fadeInScale{from{opacity:0;transform:scale(0.95)}to{opacity:1;transform:scale(1)}}
@keyframes slideInRight{from{opacity:0;transform:translateX(30px)}to{opacity:1;transform:translateX(0)}}
@keyframes slideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes ripple{0%{transform:scale(0);opacity:0.5}100%{transform:scale(4);opacity:0}}
@keyframes countUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.5}}
@keyframes barGrow{from{width:0%}to{width:var(--target-width)}}
@keyframes slideDown{from{opacity:0;transform:translateY(-10px);max-height:0}to{opacity:1;transform:translateY(0);max-height:500px}}

function Toast({message, onClose}){
  React.useEffect(()=>{const t=setTimeout(onClose,3000);return()=>clearTimeout(t);},[]);
  return(
    <div style={{position:'fixed',bottom:24,right:24,zIndex:9999,
      background:C.text,color:'#fff',padding:'12px 20px',borderRadius:10,
      animation:'slideUp 300ms ease',boxShadow:'0 4px 20px rgba(0,0,0,0.2)',fontSize:13,fontWeight:600}}>
      {message}
    </div>
  );
}

function Modal({title, onClose, children, width=560}){
  return(
    <div style={{position:'fixed',inset:0,zIndex:500,display:'flex',alignItems:'center',justifyContent:'center',padding:'0 16px'}}>
      <div onClick={onClose} style={{position:'absolute',inset:0,background:'rgba(0,0,0,0.4)',animation:'fadeIn 200ms ease'}}/>
      <div style={{position:'relative',width:'100%',maxWidth:width,maxHeight:'85vh',
        background:C.surface,borderRadius:16,zIndex:501,animation:'fadeInScale 200ms ease',
        display:'flex',flexDirection:'column',boxShadow:'0 20px 60px rgba(0,0,0,0.15)'}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',
          padding:'20px 24px',borderBottom:`1px solid ${C.border}`}}>
          <h3 style={{fontSize:16,fontWeight:700}}>{title}</h3>
          <button onClick={onClose} style={{background:'none',border:'none',fontSize:18,cursor:'pointer',color:C.textDim}}>✕</button>
        </div>
        <div style={{padding:24,overflowY:'auto',flex:1}}>{children}</div>
      </div>
    </div>
  );
}

function Badge({text, color, bg}){
  return <span style={{fontSize:11,fontWeight:600,color,background:bg,padding:'3px 10px',borderRadius:20,border:`1px solid ${color}22`,display:'inline-block'}}>{text}</span>;
}

function CountUp({end,suffix=''}){
  const [val,setVal]=React.useState(0);
  React.useEffect(()=>{
    let s=0;const step=end/(1200/16);
    const t=setInterval(()=>{s+=step;if(s>=end){setVal(end);clearInterval(t);}else setVal(Math.floor(s));},16);
    return()=>clearInterval(t);
  },[end]);
  return <span style={{animation:'countUp 400ms ease'}}>{val.toLocaleString()}{suffix}</span>;
}

    const v = parseInt(newLimit);

                        width:`${(p.count/sorted[0].count)*100}%`}}/>
                    </div>
                    <span style={{fontSize:14,fontWeight:700,color:C.text,minWidth:24}}>{p.count}</span>
                  </div>
                </td>
                <td style={{textAlign:'center',padding:'12px 16px',fontSize:13,color:C.textMuted}}>
                  {p.currentLimit}회
                </td>
                <td style={{textAlign:'center',padding:'12px 16px'}}>
                  <button onClick={e=>{e.stopPropagation();setAdjustModal(p);setNewLimit(String(p.currentLimit));}} style={{
                    background:'transparent',border:`1px solid ${C.primary}`,borderRadius:7,
                    padding:'4px 12px',fontSize:11,cursor:'pointer',color:C.primary,fontWeight:600}}>
                    횟수 조정
                  </button>
                </td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>

      {adjustModal && (
        <Modal title={`${adjustModal.nickname} 호감도 횟수 조정`} onClose={()=>setAdjustModal(null)} width={380}>
          <div>
            <div style={{background:`${C.warning}15`,borderRadius:10,padding:12,marginBottom:16,
              border:`1px solid ${C.warning}30`}}>
              <p style={{fontSize:12,color:C.warning}}>⚠️ 횟수 변경은 감사 로그에 기록됩니다</p>
            </div>
            <div style={{marginBottom:8,fontSize:13,color:C.textMuted}}>현재 한도: <strong style={{color:C.text}}>{adjustModal.currentLimit}회</strong></div>
            <input type="number" value={newLimit} onChange={e=>setNewLimit(e.target.value)}
              min={1} max={10} placeholder="새 횟수 입력"
              style={{width:'100%',border:`1px solid ${C.border}`,borderRadius:10,
                padding:'10px 14px',fontSize:16,outline:'none',fontWeight:700,color:C.text,marginBottom:16}}/>
            <div style={{display:'flex',gap:10}}>
              <button onClick={()=>setAdjustModal(null)} style={{flex:1,background:C.surfaceAlt,border:`1px solid ${C.border}`,
                borderRadius:10,padding:'11px',cursor:'pointer',fontSize:14}}>취소</button>
              <button onClick={saveAdjust} style={{flex:1,background:C.primary,border:'none',borderRadius:10,
                padding:'11px',color:'#fff',cursor:'pointer',fontSize:14,fontWeight:700}}>저장</button>
            </div>
          </div>
        </Modal>
      )}

      {snapshotModal && (
        <Modal title="순위 스냅샷 저장" onClose={()=>setSnapshotModal(false)} width={400}>
          <div>
            <p style={{fontSize:14,color:C.textMuted,marginBottom:16}}>현재 호감도 순위를 스냅샷으로 저장합니다. 파티 종료 후에도 결과를 조회할 수 있습니다.</p>
            <div style={{background:C.surfaceAlt,borderRadius:10,padding:12,marginBottom:16}}>
              {sorted.slice(0,3).map((p,i)=>(
                <div key={p.nickname} style={{display:'flex',justifyContent:'space-between',padding:'6px 0',
                  borderBottom:i<2?`1px solid ${C.border}`:'none',fontSize:13}}>
                  <span style={{color:C.textMuted}}>{['🥇','🥈','🥉'][i]} {p.nickname}</span>
                  <span style={{fontWeight:700,color:C.text}}>{p.count}점</span>
                </div>
              ))}
            </div>
            <button onClick={()=>{setSnapshotModal(false);setToast('호감도 순위 스냅샷이 저장되었습니다');}}
              style={{width:'100%',background:C.accent,border:'none',borderRadius:10,
                padding:'12px',color:'#fff',fontSize:14,fontWeight:700,cursor:'pointer'}}>
              스냅샷 저장
            </button>
          </div>
        </Modal>
      )}

      {toast && <Toast message={toast} onClose={()=>setToast(null)}/>}
    </div>
  );
}

function App(){
  const [route, setRoute] = React.useState('main');
  const [loading, setLoading] = React.useState(true);
  const [toast, setToast] = React.useState(null);

  React.useEffect(()=>{
    const t=setTimeout(()=>setLoading(false),1500);
    return()=>clearTimeout(t);
  },[]);

  if(loading){
    return(
      <div style={{width:'100%',minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center',background:C.bg}}>
        <div style={{display:'flex',flexDirection:'column',gap:16,alignItems:'center'}}>
          {[...Array(3)].map((_,i)=>(
            <div key={i} style={{width:360,height:80,borderRadius:12,
              background:`linear-gradient(90deg,${C.surfaceAlt} 25%,${C.border} 50%,${C.surfaceAlt} 75%)`,
              backgroundSize:'200% 100%',animation:'shimmer 1.5s infinite'}}/>
          ))}
        </div>
      </div>
    );
  }

  const PAGE_META = {
    main: {title:'파티 대시보드',desc:'실시간 파티 현황 모니터링',icon:'📊'},
    participants: {title:'참가자 관리',desc:'신청 상태 및 닉네임 관리',icon:'👥'},
    messages: {title:'쪽지·요청 관리',desc:'전체 쪽지 조회 및 특수 요청 처리',icon:'💬'},
    likes: {title:'호감도 관리',desc:'호감도 순위 및 횟수 조정',icon:'❤️'},
  };

  const meta = PAGE_META[route];

  return(
    <div style={{width:'100%',minHeight:'100vh',background:C.bg,display:'flex',flexDirection:'column'}}>
      {/* 글로벌 네비 */}
      <header style={{
        position:'sticky',top:0,zIndex:100,
        background:C.surface,borderBottom:`1px solid ${C.border}`,
        display:'flex',alignItems:'center',height:64,padding:'0 32px',gap:0}}>
        <div style={{display:'flex',alignItems:'center',gap:10,marginRight:40}}>
          <div style={{width:32,height:32,borderRadius:8,
            background:`linear-gradient(135deg,${C.primary},${C.primaryDark})`,
            display:'flex',alignItems:'center',justifyContent:'center',fontSize:16}}>🎪</div>
          <span style={{fontSize:16,fontWeight:800,color:C.text}}>PartyAdmin</span>
        </div>
        <nav style={{display:'flex',gap:2,flex:1}}>
          {NAV_ITEMS.map(item=>(
            <button key={item.id} onClick={()=>setRoute(item.id)} style={{
              padding:'8px 18px',border:'none',borderRadius:8,cursor:'pointer',fontSize:14,fontWeight:600,
              background:route===item.id?`${C.primary}15`:'transparent',
              color:route===item.id?C.primary:C.textMuted,
              transition:'all 200ms'}}>
              {item.label}
            </button>
          ))}
        </nav>
        <div style={{display:'flex',alignItems:'center',gap:12}}>
          <div style={{position:'relative'}}>
            <button style={{background:'none',border:`1px solid ${C.border}`,borderRadius:8,padding:'7px 10px',cursor:'pointer'}}>
              🔔
            </button>
            <div style={{position:'absolute',top:-4,right:-4,width:16,height:16,borderRadius:'50%',
              background:C.danger,display:'flex',alignItems:'center',justifyContent:'center',
              fontSize:9,color:'#fff',fontWeight:700}}>
              {REQUESTS_DATA.filter(r=>r.status==='대기중').length}
            </div>
          </div>
          <div style={{display:'flex',alignItems:'center',gap:8,padding:'6px 14px',
            background:C.surfaceAlt,borderRadius:8}}>
            <div style={{width:28,height:28,borderRadius:'50%',
              background:`linear-gradient(135deg,${C.primary},${C.primaryDark})`,
              display:'flex',alignItems:'center',justifyContent:'center',fontSize:13,color:'#fff',fontWeight:700}}>관</div>
            <span style={{fontSize:13,fontWeight:600,color:C.text}}>운영자</span>
          </div>
        </div>
      </header>

      {/* 히어로 배너 */}
      <div style={{
        background:`linear-gradient(135deg,${C.primary}15,${C.accent}08)`,
        borderBottom:`1px solid ${C.border}`,padding:'24px 32px'}}>
        <div style={{maxWidth:1200,margin:'0 auto',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
          <div>
            <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:4}}>
              <span style={{fontSize:24}}>{meta.icon}</span>
              <h1 style={{fontSize:24,fontWeight:800,color:C.text}}>{meta.title}</h1>
            </div>
            <p style={{fontSize:13,color:C.textMuted}}>{meta.desc}</p>
          </div>
          <div style={{display:'flex',gap:24,fontSize:13}}>
            {[
              {label:'현재 참가자',value:`${PARTY_CONFIG.currentCount}명`},
              {label:'2차 미신청',value:`${PARTY_CONFIG.currentCount-31}명`},
              {label:'대기 요청',value:`${REQUESTS_DATA.filter(r=>r.status==='대기중').length}건`},
            ].map((k,i)=>(
              <div key={i} style={{textAlign:'center'}}>
                <div style={{fontSize:20,fontWeight:800,color:C.primary}}>{k.value}</div>
                <div style={{fontSize:11,color:C.textDim,marginTop:2}}>{k.label}</div>
              </div>
            ))}
          </div>
        </div>
      </div>

      {/* 메인 콘텐츠 */}
      <main style={{flex:1,padding:'28px 32px'}}>
        <div style={{maxWidth:1200,margin:'0 auto',animation:'fadeIn 300ms ease'}}>
          {route==='main' && <DashboardPage/>}
          {route==='participants' && <ParticipantsPage/>}
          {route==='messages' && <MessagesPage/>}
          {route==='likes' && <LikesPage/>}
        </div>
      </main>

      {/* 푸터 */}
      <footer style={{background:C.surface,borderTop:`1px solid ${C.border}`,
        padding:'20px 32px',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
        <div style={{fontSize:12,color:C.textDim}}>PartyAdmin v1.0 · 파티 운영 관리자 플랫폼 — 구현 데모</div>
        <div style={{display:'flex',gap:16,fontSize:12,color:C.textDim}}>
          <span>WebSocket 연결됨</span>
          <span>Redis 캐시 활성</span>
          <span>Socket.io 룸 분리</span>
        </div>
      </footer>

      {toast && <Toast message={toast} onClose={()=>setToast(null)}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
