function CountUp({ end, duration = 1200, suffix = '' }) {
  const [val, setVal] = useState(0);
  useEffect(() => {
    let start = 0;
    const step = end / (duration / 16);
    const timer = setInterval(() => {
      start += step;
      if (start >= end) { setVal(end); clearInterval(timer); }
      else setVal(Math.floor(start));
    }, 16);
    return () => clearInterval(timer);
  }, [end]);
  return <span style={{ animation: 'countUp 400ms ease' }}>{val.toLocaleString()}{suffix}</span>;
}

function Toast({ message, onClose }) {
  useEffect(() => { const t = setTimeout(onClose, 3000); return () => clearTimeout(t); }, []);
  return (
    <div style={{ position: 'fixed', bottom: 24, right: 24, zIndex: 9999, background: C.secondary, color: '#fff', padding: '12px 24px', borderRadius: 10, animation: 'slideUp 300ms ease', boxShadow: '0 4px 16px rgba(0,0,0,0.2)', fontSize: 14 }}>
      {message}
    </div>
  );
}

        <span key={i} style={{ color: i <= rating ? '#F59E0B' : '#D1D5DB', fontSize: size }}>★</span>
      ))}
    </span>
  );
}

              onMouseLeave={e => { e.currentTarget.style.transform = 'scale(1)'; e.currentTarget.style.boxShadow = '0 4px 16px rgba(0,0,0,0.08)'; }}>
              <div style={{ position: 'relative' }}>
                <div style={{ width: 48, height: 48, borderRadius: 24, background: `linear-gradient(135deg, ${GRADE_COLORS[user.grade]}, ${C.accent})`, display: 'flex', alignItems: 'center', justifyContent: 'center', color: '#fff', fontWeight: 800, fontSize: 18 }}>{user.avatar}</div>
                {i < 3 && <div style={{ position: 'absolute', top: -6, right: -6, width: 20, height: 20, borderRadius: 10, background: ['#FFD700','#C0C0C0','#CD7F32'][i], display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 10, fontWeight: 800, color: '#fff' }}>{i+1}</div>}
              </div>
              <div style={{ flex: 1 }}>
                <div style={{ fontWeight: 700, fontSize: 14, marginBottom: 4 }}>{user.user}</div>
                <div style={{ display: 'flex', gap: 6, alignItems: 'center' }}>
                  <GradeBadge grade={user.grade} />
                  <span style={{ fontSize: 12, color: C.textSecondary }}>{user.points.toLocaleString()} P</span>
                </div>
              </div>
              <div style={{ fontSize: 12, color: '#10B981', fontWeight: 700 }}>{user.monthChange}</div>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

function SearchPage({ setDrawer }) {
  const [query, setQuery] = useState('');
  const [catFilter, setCatFilter] = useState('전체');
  const [loading, setLoading] = useState(false);

  const categories = ['전체', '진통제', '영양제', '소화제', '항히스타민'];
  const filtered = DRUGS.filter(d =>
    (catFilter === '전체' || d.category === catFilter) &&
    (query === '' || d.name.includes(query) || d.ingredients.includes(query) || d.effect.includes(query))
  );

  const handleSearch = () => {
    if (!query) return;
    setLoading(true);
    setTimeout(() => setLoading(false), 800);
  };

  return (
    <div style={{ padding: '24px 32px' }} key="search">
      <div style={{ background: C.surface, borderRadius: 16, padding: 24, marginBottom: 24, boxShadow: '0 4px 16px rgba(0,0,0,0.08)' }}>
        <div style={{ display: 'flex', gap: 12, marginBottom: 16 }}>
          <div style={{ flex: 1, position: 'relative' }}>
            <span style={{ position: 'absolute', left: 14, top: '50%', transform: 'translateY(-50%)', fontSize: 16 }}>🔍</span>
            <input value={query} onChange={e => { setQuery(e.target.value); handleSearch(); }} placeholder="약품명, 성분명, 효능으로 검색..." style={{ width: '100%', padding: '12px 16px 12px 42px', border: `1px solid ${C.border}`, borderRadius: 12, fontSize: 14, outline: 'none', fontFamily: 'Pretendard' }} />
          </div>
          <button onClick={handleSearch} style={{ padding: '12px 28px', background: `linear-gradient(135deg, #0891B2, #1D4ED8)`, color: '#fff', border: 'none', borderRadius: 12, fontWeight: 700, cursor: 'pointer', fontSize: 14 }}>검색</button>
        </div>
        <div style={{ display: 'flex', gap: 8 }}>
          {categories.map(cat => (
            <button key={cat} onClick={() => setCatFilter(cat)} style={{ padding: '6px 14px', borderRadius: 20, border: `1px solid ${catFilter === cat ? '#0891B2' : C.border}`, cursor: 'pointer', background: catFilter === cat ? '#0891B2' : 'transparent', color: catFilter === cat ? '#fff' : C.textSecondary, fontWeight: catFilter === cat ? 700 : 400, fontSize: 12, transition: 'all 150ms' }}>{cat}</button>
          ))}
        </div>
      </div>

      {loading ? (
        <div style={{ display: 'grid', gridTemplateColumns: 'repeat(4, 1fr)', gap: 16 }}>
          {[1,2,3,4].map(i => <div key={i} style={{ height: 180, borderRadius: 16, background: 'linear-gradient(90deg, #F1F5F9 25%, #E8E0F0 50%, #F1F5F9 75%)', backgroundSize: '200% 100%', animation: 'shimmer 1.5s infinite' }} />)}
        </div>
      ) : (
        <>
          <div style={{ marginBottom: 12, fontSize: 13, color: C.textSecondary }}>검색 결과 <strong>{filtered.length}</strong>개</div>
          <div style={{ display: 'grid', gridTemplateColumns: 'repeat(4, 1fr)', gap: 16 }}>
            {filtered.map((drug, i) => (
              <div key={drug.id} onClick={() => setDrawer({ item: drug, type: 'drug' })} style={{ background: C.surface, borderRadius: 16, padding: 20, boxShadow: '0 4px 16px rgba(0,0,0,0.08)', cursor: 'pointer', transition: 'all 200ms', animation: `slideUp 400ms ease ${i * 80}ms both`, textAlign: 'center' }}
                onMouseEnter={e => { e.currentTarget.style.transform = 'scale(1.03)'; e.currentTarget.style.boxShadow = '0 8px 24px rgba(0,0,0,0.15)'; }}
                onMouseLeave={e => { e.currentTarget.style.transform = 'scale(1)'; e.currentTarget.style.boxShadow = '0 4px 16px rgba(0,0,0,0.08)'; }}>
                <div style={{ fontSize: 36, marginBottom: 12 }}>{drug.image}</div>
                <div style={{ fontWeight: 700, fontSize: 13, marginBottom: 6, lineHeight: 1.4 }}>{drug.name}</div>
                <span style={{ background: '#0891B2' + '15', color: '#0891B2', padding: '2px 10px', borderRadius: 20, fontSize: 11, fontWeight: 600 }}>{drug.category}</span>
                <div style={{ display: 'flex', justifyContent: 'center', marginTop: 10, gap: 8 }}>
                  <StarRating rating={Math.round(drug.avgRating)} size={12} />
                  <span style={{ fontSize: 11, color: C.textSecondary }}>{drug.avgRating}</span>
                </div>
                <div style={{ fontSize: 11, color: C.textLight, marginTop: 4 }}>리뷰 {drug.reviews.toLocaleString()}개</div>
              </div>
            ))}
          </div>
        </>
      )}
    </div>
  );
}

function App() {
  const [tab, setTab] = useState('main');
  const [drawer, setDrawer] = useState(null);
  const meta = PAGE_META[tab];

  const renderContent = () => {
    const props = { setDrawer: (d) => setDrawer(d) };
    const map = { main: <MainPage {...props} />, interaction: <InteractionPage {...props} />, reward: <RewardPage {...props} />, search: <SearchPage {...props} /> };
    return <div key={tab} style={{ animation: 'fadeIn 300ms ease' }}>{map[tab]}</div>;
  };

  return (
    <div style={{ width: '100%', minHeight: '100vh', background: C.bg, display: 'flex', flexDirection: 'column' }}>
      <header style={{ position: 'sticky', top: 0, zIndex: 100, background: C.surface, borderBottom: `1px solid ${C.border}`, display: 'flex', alignItems: 'center', height: 56, padding: '0 24px', gap: 8 }}>
        <div style={{ display: 'flex', alignItems: 'center', gap: 8, marginRight: 16 }}>
          <div style={{ width: 28, height: 28, borderRadius: 8, background: `linear-gradient(135deg, ${C.primary}, ${C.accent})`, display: 'flex', alignItems: 'center', justifyContent: 'center', color: '#fff', fontWeight: 800, fontSize: 14 }}>약</div>
          <span style={{ fontWeight: 800, fontSize: 15, color: C.textPrimary }}>약알 리뷰</span>
        </div>
        {TABS.map(t => (
          <button key={t.id} onClick={() => setTab(t.id)} style={{ padding: '6px 16px', borderRadius: 8, border: 'none', cursor: 'pointer', background: tab === t.id ? C.primary + '15' : 'transparent', color: tab === t.id ? C.primary : C.textSecondary, fontWeight: tab === t.id ? 700 : 500, fontSize: 14, transition: 'all 150ms' }}>{t.label}</button>
        ))}
        <div style={{ flex: 1 }} />
        <div style={{ display: 'flex', alignItems: 'center', gap: 12 }}>
          <div style={{ width: 200, position: 'relative' }}>
            <input placeholder="약품 검색..." style={{ width: '100%', padding: '8px 12px 8px 32px', border: `1px solid ${C.border}`, borderRadius: 10, fontSize: 13, outline: 'none', fontFamily: 'Pretendard' }} />
            <span style={{ position: 'absolute', left: 10, top: '50%', transform: 'translateY(-50%)', fontSize: 13 }}>🔍</span>
          </div>
          <button style={{ width: 34, height: 34, borderRadius: 17, background: C.bg, border: `1px solid ${C.border}`, cursor: 'pointer', fontSize: 16 }}>🔔</button>
          <div style={{ width: 34, height: 34, borderRadius: 17, background: `linear-gradient(135deg, ${C.primary}, ${C.accent})`, display: 'flex', alignItems: 'center', justifyContent: 'center', color: '#fff', fontWeight: 700, fontSize: 14, cursor: 'pointer' }}>김</div>
        </div>
      </header>

      <div style={{ background: meta.gradient, padding: '28px 32px', color: '#fff' }}>
        <h1 style={{ fontSize: 26, fontWeight: 800, marginBottom: 6 }}>{meta.title}</h1>
        <p style={{ fontSize: 14, opacity: 0.85, marginBottom: 16 }}>{meta.subtitle}</p>
        <div style={{ display: 'flex', gap: 32 }}>
          {meta.kpis.map((kpi, i) => (
            <div key={kpi.label} style={{ animation: `countUp 400ms ease ${i * 120}ms both` }}>
              <div style={{ fontSize: 24, fontWeight: 800 }}><CountUp end={kpi.value} suffix={kpi.suffix} /></div>
              <div style={{ fontSize: 12, opacity: 0.8, marginTop: 2 }}>{kpi.label}</div>
            </div>
          ))}
        </div>
      </div>

      <main style={{ flex: 1 }}>{renderContent()}</main>

      {drawer && <Drawer item={drawer.item} type={drawer.type} onClose={() => setDrawer(null)} />}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
