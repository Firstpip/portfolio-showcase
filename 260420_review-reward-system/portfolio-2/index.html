function CountUp({ end, duration = 1200, suffix = '' }) {
  const [val, setVal] = useState(0);
  useEffect(() => {
    let start = 0;
    const step = end / (duration / 16);
    const timer = setInterval(() => {
      start += step;
      if (start >= end) { setVal(end); clearInterval(timer); }
      else setVal(Math.floor(start));
    }, 16);
    return () => clearInterval(timer);
  }, [end]);
  return <span>{val.toLocaleString()}{suffix}</span>;
}

function Toast({ message, onClose }) {
  useEffect(() => { const t = setTimeout(onClose, 3000); return () => clearTimeout(t); }, []);
  return (
    <div style={{ position: 'fixed', bottom: 24, right: 24, zIndex: 9999, background: C.secondary, color: '#fff', padding: '12px 24px', borderRadius: 10, animation: 'slideUp 300ms ease', boxShadow: '0 4px 16px rgba(0,0,0,0.2)', fontSize: 14 }}>{message}</div>
  );
}

function GradeBadge({ grade }) {
  return <span style={{ background: GRADE_COLORS[grade] + '22', color: GRADE_COLORS[grade], padding: '2px 10px', borderRadius: 20, fontSize: 11, fontWeight: 700 }}>{grade}</span>;
}

function StatusBadge({ status }) {
  const s = STATUS_STYLE[status] || STATUS_STYLE['정상'];

}

              <div style={{ fontWeight: 700, fontSize: 13, marginBottom: 8 }}>📱 공유 카드 미리보기</div>
              <div style={{ fontSize: 12, color: C.textSecondary, lineHeight: 1.6 }}>리뷰 페이지마다 카카오톡 공유 버튼이 노출됩니다. OG 메타태그는 Next.js에서 약품별로 동적 생성됩니다.</div>
            </div>
            {[
              { label: 'OG 타이틀 템플릿', value: '[약품명] 리뷰 — 약알' },
              { label: 'OG 설명 템플릿', value: '리뷰 [수]개 · 평균 [평점]점' },
              { label: '카카오 앱 키', value: 'js-xxxxx-****-****' },
            ].map(item => (
              <div key={item.label} style={{ display: 'flex', justifyContent: 'space-between', padding: '10px 0', borderBottom: `1px solid ${C.border}`, fontSize: 13 }}>
                <span style={{ color: C.textSecondary }}>{item.label}</span>
                <span style={{ fontFamily: 'monospace', fontSize: 12, color: C.textPrimary }}>{item.value}</span>
              </div>
            ))}
            <button onClick={() => setSharePreview(true)} style={{ marginTop: 16, width: '100%', padding: '11px', background: '#FEE500', color: '#000', border: 'none', borderRadius: 10, fontWeight: 700, fontSize: 13, cursor: 'pointer' }}>카카오 공유 미리보기</button>
          </div>
        </div>
      </div>
    </div>
  );
}

function App() {
  const [route, setRoute] = useState('main');
  const [toast, setToast] = useState(null);
  const [loading, setLoading] = useState(true);

  useEffect(() => { const t = setTimeout(() => setLoading(false), 1200); return () => clearTimeout(t); }, []);

  const PAGE_TITLES = { main: '관리자 대시보드', content: '리뷰 콘텐츠 관리', 'reward-admin': '사용자 리워드 관리', activation: '사이트 활성화 기능' };
  const PAGE_SUB = {
    main: '리뷰 현황 · 신고 접수 · 회원 분포를 한눈에',
    content: '전체 리뷰 조회 · 블라인드 처리 · 신고 관리',
    'reward-admin': '포인트 현황 · 수동 조정 · 배지 분포',
    activation: '베스트 리뷰어 노출 · 이벤트 배너 · 카카오 공유',
  };
  const PAGE_GRAD = {
    main: `linear-gradient(135deg, ${C.primary}, ${C.accent})`,
    content: `linear-gradient(135deg, ${C.secondary}, ${C.primary})`,
    'reward-admin': `linear-gradient(135deg, #F59E0B, #10B981)`,
    activation: `linear-gradient(135deg, #0891B2, ${C.primary})`,
  };

  const renderPage = () => {
    const props = { setToast: (m) => setToast(m) };
    const map = {
      main: <DashboardPage />,
      content: <ContentPage {...props} />,
      'reward-admin': <RewardAdminPage {...props} />,
      activation: <ActivationPage {...props} />,
    };
    return <div key={route} style={{ animation: 'fadeIn 300ms ease' }}>{map[route]}</div>;
  };

  if (loading) return (
    <div style={{ minHeight: '100vh', display: 'flex', alignItems: 'center', justifyContent: 'center', background: C.bg, flexDirection: 'column', gap: 16 }}>
      <div style={{ width: 48, height: 48, borderRadius: 12, background: `linear-gradient(135deg, ${C.primary}, ${C.accent})`, display: 'flex', alignItems: 'center', justifyContent: 'center', color: '#fff', fontWeight: 800, fontSize: 22 }}>약</div>
      <div style={{ fontSize: 14, color: C.textSecondary }}>약알 관리자 대시보드 로딩 중...</div>
      <div style={{ width: 200, height: 4, background: '#E5E7EB', borderRadius: 2, overflow: 'hidden' }}>
        <div style={{ height: '100%', background: `linear-gradient(90deg, ${C.primary}, ${C.accent})`, borderRadius: 2, animation: 'barGrow 1200ms ease both', '--target-width': '100%', width: '100%' }} />
      </div>
    </div>
  );

  return (
    <div style={{ width: '100%', minHeight: '100vh', background: C.bg, display: 'flex', flexDirection: 'column' }}>
      {toast && <Toast message={toast} onClose={() => setToast(null)} />}

      <header style={{ background: C.surface, borderBottom: `1px solid ${C.border}`, display: 'flex', alignItems: 'center', height: 58, padding: '0 32px', gap: 8 }}>
        <div style={{ display: 'flex', alignItems: 'center', gap: 8, marginRight: 20 }}>
          <div style={{ width: 30, height: 30, borderRadius: 8, background: `linear-gradient(135deg, ${C.primary}, ${C.accent})`, display: 'flex', alignItems: 'center', justifyContent: 'center', color: '#fff', fontWeight: 800, fontSize: 14 }}>약</div>
          <span style={{ fontWeight: 800, fontSize: 15, color: C.textPrimary }}>약알 Admin</span>
        </div>
        <nav style={{ display: 'flex', gap: 2 }}>
          {NAV_ITEMS.map(item => (
            <button key={item.id} onClick={() => setRoute(item.id)} style={{ padding: '7px 16px', borderRadius: 8, border: 'none', cursor: 'pointer', background: route === item.id ? C.primary + '18' : 'transparent', color: route === item.id ? C.primary : C.textSecondary, fontWeight: route === item.id ? 700 : 500, fontSize: 14, transition: 'all 150ms' }}>{item.label}</button>
          ))}
        </nav>
        <div style={{ flex: 1 }} />
        <div style={{ display: 'flex', alignItems: 'center', gap: 12 }}>
          <button style={{ padding: '7px 14px', border: `1px solid ${C.border}`, borderRadius: 8, background: 'none', cursor: 'pointer', fontSize: 12, color: C.textSecondary }}>🔔 신고 7건</button>
          <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
            <div style={{ width: 32, height: 32, borderRadius: 16, background: `linear-gradient(135deg, ${C.secondary}, ${C.primary})`, display: 'flex', alignItems: 'center', justifyContent: 'center', color: '#fff', fontWeight: 700, fontSize: 13 }}>관</div>
            <span style={{ fontSize: 13, fontWeight: 600, color: C.textPrimary }}>관리자</span>
          </div>
        </div>
      </header>

      <div style={{ background: PAGE_GRAD[route], padding: '24px 32px', color: '#fff' }}>
        <h1 style={{ fontSize: 24, fontWeight: 800, marginBottom: 4 }}>{PAGE_TITLES[route]}</h1>
        <p style={{ fontSize: 13, opacity: 0.85 }}>{PAGE_SUB[route]}</p>
      </div>

      <main style={{ flex: 1, padding: '24px 32px' }}>{renderPage()}</main>

      <footer style={{ background: C.surface, borderTop: `1px solid ${C.border}`, padding: '16px 32px', display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
        <span style={{ fontSize: 12, color: C.textLight }}>약알 관리자 시스템 v2.0 — PostgreSQL · Prisma · Redis · Node.js</span>
        <span style={{ fontSize: 12, color: C.textLight }}>© 2024 약알 — React + Next.js + Node.js + Express 기반 구현 데모</span>
      </footer>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
