function CountUp({end,suffix='',dur=1200}){
  const [v,setV]=React.useState(0);
  React.useEffect(()=>{
    let s=0;const step=end/(dur/16);
    const t=setInterval(()=>{s=Math.min(s+step,end);setV(Math.floor(s));if(s>=end)clearInterval(t);},16);
    return()=>clearInterval(t);
  },[end]);
  return <span style={{animation:'countUp 400ms ease'}}>{v.toLocaleString()}{suffix}</span>;
}

function Toast({msg,onClose}){
  React.useEffect(()=>{const t=setTimeout(onClose,3000);return()=>clearTimeout(t);},[]);
  return(
    <div style={{position:'fixed',bottom:24,right:24,zIndex:9999,background:C.primary,color:'#fff',
      padding:'12px 20px',borderRadius:8,animation:'slideUp 300ms ease',
      boxShadow:'0 4px 16px rgba(0,0,0,0.2)',fontSize:14,fontWeight:500}}>
      {msg}
    </div>
  );
}

function ConvertPage({setToast}){
  const [uploading,setUploading]=React.useState(false);
  const [prog,setProg]=React.useState(0);
  const [done,setDone]=React.useState(false);
  const [dragging,setDragging]=React.useState(false);

  const handleUpload=()=>{
    if(uploading)return;
    setUploading(true);setProg(0);setDone(false);
    const intv=setInterval(()=>setProg(p=>{
      if(p>=100){clearInterval(intv);setUploading(false);setDone(true);setToast('파일 업로드 완료! 변환 준비가 완료되었습니다.');return 100;}
      return p+7;
    }),70);
  };

  return(
    <div style={{display:'grid',gridTemplateColumns:'1fr 360px',gap:24}}>
      <div>
        <div onDragOver={e=>{e.preventDefault();setDragging(true);}} onDragLeave={()=>setDragging(false)}
          onDrop={e=>{e.preventDefault();setDragging(false);handleUpload();}}
          onClick={!uploading?handleUpload:undefined}
          style={{border:`2px dashed ${dragging?C.secondary:C.border}`,borderRadius:16,padding:'48px 32px',
            background:dragging?`${C.secondary}08`:C.surface,textAlign:'center',cursor:'pointer',
            transition:'all 200ms ease',marginBottom:24,boxShadow:'0 1px 3px rgba(0,0,0,0.04)'}}>
          <div style={{fontSize:42,marginBottom:12}}>📐</div>
          <div style={{fontSize:16,fontWeight:600,color:C.text,marginBottom:6}}>DWG/DXF 파일을 드래그하거나 클릭하여 업로드</div>
          <div style={{fontSize:13,color:C.textSub,marginBottom:20}}>최대 50MB · AutoCAD 2000 이상 지원</div>
          {uploading&&(
            <div style={{marginTop:12}}>
              <div style={{height:6,background:C.border,borderRadius:99,overflow:'hidden',marginBottom:8}}>
                <div style={{height:'100%',background:C.secondary,width:`${prog}%`,transition:'width 80ms',borderRadius:99}}/>
              </div>
              <div style={{fontSize:12,color:C.textSub}}>{prog}% 업로드 중...</div>

function AutoConvertPage({setToast}){
  const [algos,setAlgos]=React.useState(ALGORITHMS.reduce((a,al)=>({...a,[al.id]:al.def}),{}));
  const [running,setRunning]=React.useState(false);
  const [done,setDone]=React.useState(false);
  const [prog,setProg]=React.useState(0);
  const cnt=Object.values(algos).filter(Boolean).length;

  const handleRun=()=>{
    if(running||cnt===0)return;
    setRunning(true);setDone(false);setProg(0);
    const intv=setInterval(()=>setProg(p=>{
      if(p>=100){clearInterval(intv);setRunning(false);setDone(true);setToast('도면 변환이 완료되었습니다! 결과를 다운로드하세요.');return 100;}
      return p+4;
    }),80);
  };

  return(
    <div style={{display:'grid',gridTemplateColumns:'300px 1fr',gap:24}}>
      <div>
        <div style={{background:C.surface,borderRadius:12,overflow:'hidden',boxShadow:'0 1px 3px rgba(0,0,0,0.06)'}}>
          <div style={{padding:'16px 20px',borderBottom:`1px solid ${C.border}`,background:`${C.primary}08`}}>
            <div style={{fontSize:15,fontWeight:700,color:C.primary}}>변환 알고리즘</div>
            <div style={{fontSize:12,color:C.textSub,marginTop:3}}>{cnt}/6개 선택됨</div>
          </div>
          {ALGORITHMS.map((al,i)=>(
            <div key={al.id} onClick={()=>setAlgos(a=>({...a,[al.id]:!a[al.id]}))}
              style={{padding:'13px 20px',cursor:'pointer',
                borderBottom:i<ALGORITHMS.length-1?`1px solid ${C.border}`:'none',
                background:algos[al.id]?`${C.secondary}08`:'transparent',
                display:'flex',alignItems:'flex-start',gap:12,
                transition:'background 150ms',animation:`slideUp 300ms ease ${i*50}ms both`}}
              onMouseEnter={e=>e.currentTarget.style.background=algos[al.id]?`${C.secondary}14`:C.bg}
              onMouseLeave={e=>e.currentTarget.style.background=algos[al.id]?`${C.secondary}08`:'transparent'}>
              <div style={{width:20,height:20,borderRadius:4,flexShrink:0,marginTop:2,
                background:algos[al.id]?C.secondary:'transparent',
                border:`2px solid ${algos[al.id]?C.secondary:C.border}`,
                display:'flex',alignItems:'center',justifyContent:'center',transition:'all 150ms'}}>
                {algos[al.id]&&<span style={{color:'#fff',fontSize:11,fontWeight:700}}>✓</span>}
              </div>
              <div>
                <div style={{fontSize:13,fontWeight:600,color:C.text}}>{al.name}</div>
                <div style={{fontSize:11,color:C.textSub,marginTop:2,lineHeight:1.4}}>{al.desc}</div>
              </div>
            </div>
          ))}
          <div style={{padding:20,borderTop:`1px solid ${C.border}`}}>
            <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:14,padding:'8px 12px',background:`${C.primary}08`,borderRadius:8}}>
              <span style={{fontSize:16}}>📄</span>
              <div>
                <div style={{fontSize:12,fontWeight:600,color:C.text}}>3층 평면도.dxf</div>
                <div style={{fontSize:11,color:C.textSub}}>2.4 MB · 1,842개 객체</div>
              </div>
            </div>
            {running&&(
              <div style={{marginBottom:12}}>
                <div style={{height:6,background:C.border,borderRadius:99,overflow:'hidden',marginBottom:4}}>
                  <div style={{height:'100%',background:C.secondary,width:`${prog}%`,transition:'width 80ms',borderRadius:99}}/>
                </div>
                <div style={{fontSize:11,color:C.textSub,textAlign:'center'}}>변환 중... {prog}%</div>
              </div>
            )}
            <button onClick={handleRun} disabled={running||cnt===0}
              style={{width:'100%',padding:'12px',
                background:running?C.border:cnt===0?C.border:C.primary,
                color:running||cnt===0?C.textSub:'#fff',
                border:'none',borderRadius:8,cursor:running||cnt===0?'default':'pointer',
                fontSize:14,fontWeight:700,transition:'all 200ms'}}>
              {running?'변환 중...':done?'재변환 실행':'변환 실행'}
            </button>
          </div>
        </div>
      </div>

      <div>
        <div style={{background:C.surface,borderRadius:12,overflow:'hidden',boxShadow:'0 1px 3px rgba(0,0,0,0.06)'}}>
          <div style={{padding:'14px 20px',borderBottom:`1px solid ${C.border}`,display:'flex',gap:24,alignItems:'center'}}>
            <span style={{fontSize:13,fontWeight:600,color:C.primary}}>● 설계 도면 (원본)</span>
            <span style={{fontSize:13,fontWeight:600,color:C.success}}>● 적산 도면 (변환 결과)</span>
            <div style={{flex:1}}/>
            {done&&<span style={{fontSize:12,background:`${C.success}18`,color:C.success,padding:'4px 10px',borderRadius:6,fontWeight:600}}>✓ 변환 완료</span>}
          </div>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',height:380,position:'relative'}}>
            <div style={{padding:12,borderRight:`1px solid ${C.border}`}}>
              <div style={{fontSize:11,color:C.textSub,marginBottom:6,textAlign:'center'}}>설계 도면 — 3층 평면도.dxf</div>
              <div style={{height:'calc(100% - 24px)'}}><CADDrawing type="design"/></div>
            </div>
            <div style={{padding:12,position:'relative'}}>
              <div style={{fontSize:11,color:done?C.success:C.textSub,marginBottom:6,textAlign:'center',fontWeight:done?600:400}}>
                {done?'✓ 적산 도면 (변환 완료)':'적산 도면 (변환 대기)'}
              </div>
              <div style={{height:'calc(100% - 24px)',position:'relative'}}>
                <CADDrawing type={done?'survey':'design'}/>
                {running&&(
                  <div style={{position:'absolute',inset:0,display:'flex',alignItems:'center',justifyContent:'center',background:'rgba(255,255,255,0.85)',borderRadius:8}}>
                    <div style={{textAlign:'center'}}>
                      <div style={{width:40,height:40,border:`3px solid ${C.border}`,borderTopColor:C.secondary,borderRadius:99,animation:'spin 1s linear infinite',margin:'0 auto 12px'}}/>
                      <div style={{fontSize:12,color:C.textSub,fontWeight:600}}>변환 중... {prog}%</div>
                    </div>
                  </div>
                )}
              </div>
            </div>
          </div>
          <div style={{padding:'12px 20px',borderTop:`1px solid ${C.border}`,display:'flex',gap:20,background:C.bg,alignItems:'center'}}>
            {[{l:'레이어 수',b:12,a:done?'8':'-'},{l:'객체 수',b:'1,842',a:done?'1,567':'-'},{l:'파일 크기',b:'2.4 MB',a:done?'1.8 MB':'-'}].map((s,i)=>(
              <div key={i} style={{fontSize:12,color:C.textSub}}>
                <span style={{fontWeight:600,color:C.text}}>{s.l}</span>: {s.b} → <span style={{color:done?C.success:C.textSub,fontWeight:done?700:400}}>{s.a}</span>
              </div>
            ))}
            <div style={{flex:1}}/>
            {done&&(
              <button onClick={()=>setToast('적산 도면 DXF 파일을 다운로드합니다')}
                style={{padding:'7px 18px',background:C.success,color:'#fff',border:'none',borderRadius:6,cursor:'pointer',fontSize:13,fontWeight:700}}>
                ↓ 결과 다운로드
              </button>
            )}
          </div>
        </div>
      </div>
    </div>
  );
}

function HistoryPage({setDrawer}){
  const [filter,setFilter]=React.useState('전체');
  const [search,setSearch]=React.useState('');
  const filtered=HISTORY.filter(h=>{
    if(filter!=='전체'&&h.status!==filter)return false;
    if(search&&!h.name.includes(search))return false;
    return true;
  });
  return(
    <div style={{background:C.surface,borderRadius:12,overflow:'hidden',boxShadow:'0 1px 3px rgba(0,0,0,0.06)'}}>
      <div style={{padding:'16px 20px',borderBottom:`1px solid ${C.border}`,display:'flex',gap:10,alignItems:'center',flexWrap:'wrap'}}>
        {['전체','완료','처리 중','오류'].map(f=>(
          <button key={f} onClick={()=>setFilter(f)} style={{padding:'6px 16px',borderRadius:99,fontSize:13,
            border:`1px solid ${filter===f?C.secondary:C.border}`,
            background:filter===f?`${C.secondary}14`:'transparent',
            color:filter===f?C.secondary:C.textSub,cursor:'pointer',fontWeight:filter===f?600:400}}>
            {f}
          </button>
        ))}
        <div style={{flex:1}}/>
        <div style={{display:'flex',alignItems:'center',gap:8,padding:'7px 14px',background:C.bg,borderRadius:8,border:`1px solid ${C.border}`}}>
          <svg width="13" height="13" viewBox="0 0 13 13" fill="none"><circle cx="5.5" cy="5.5" r="3.5" stroke={C.textSub} strokeWidth="1.5"/><line x1="8" y1="8" x2="12" y2="12" stroke={C.textSub} strokeWidth="1.5" strokeLinecap="round"/></svg>
          <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="파일명 검색..."
            style={{border:'none',outline:'none',background:'transparent',fontSize:13,color:C.text,width:160}}/>
        </div>
      </div>
      <div style={{display:'grid',gridTemplateColumns:'2fr 1.5fr 100px 100px 1.5fr 80px',padding:'10px 20px',background:C.bg,borderBottom:`1px solid ${C.border}`}}>
        {['파일명','적용 알고리즘','상태','처리 시간','변환 일시',''].map((h,i)=>(
          <span key={i} style={{fontSize:12,fontWeight:600,color:C.textSub}}>{h}</span>
        ))}
      </div>
      {filtered.map((item,i)=>(
        <div key={item.id} onClick={()=>setDrawer(item)}
          style={{display:'grid',gridTemplateColumns:'2fr 1.5fr 100px 100px 1.5fr 80px',
            padding:'14px 20px',cursor:'pointer',
            borderBottom:`1px solid ${C.border}`,transition:'background 150ms',
            animation:`slideUp 300ms ease ${i*50}ms both`}}
          onMouseEnter={e=>e.currentTarget.style.background=C.bg}
          onMouseLeave={e=>e.currentTarget.style.background='transparent'}>
          <div style={{display:'flex',alignItems:'center',gap:10}}>
            <span style={{fontSize:16}}>📄</span>
            <div>
              <div style={{fontSize:13,fontWeight:500,color:C.text}}>{item.name}</div>
              <div style={{fontSize:11,color:C.textSub}}>{item.size} · {item.user}</div>
            </div>
          </div>
          <div style={{fontSize:12,color:C.textSub,display:'flex',alignItems:'center'}}>{item.algos.length}개 알고리즘 적용</div>
          <div style={{display:'flex',alignItems:'center'}}><Badge status={item.status}/></div>
          <div style={{fontSize:13,color:C.text,display:'flex',alignItems:'center'}}>{item.dur}</div>
          <div style={{fontSize:12,color:C.textSub,display:'flex',alignItems:'center'}}>{item.date}</div>
          <div style={{display:'flex',alignItems:'center'}}>
            {item.status==='완료'&&(
              <button onClick={e=>e.stopPropagation()}
                style={{padding:'5px 10px',fontSize:11,background:C.bg,border:`1px solid ${C.border}`,borderRadius:4,cursor:'pointer',color:C.textSub}}>
                ↓
              </button>
            )}
          </div>
        </div>
      ))}
      {filtered.length===0&&(
        <div style={{padding:48,textAlign:'center',color:C.textSub,fontSize:14}}>검색 결과가 없습니다</div>
      )}
    </div>
  );
}

function HistoryDrawer({item,onClose}){
  return(
    <>
      <div onClick={onClose} style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.35)',zIndex:200,animation:'fadeIn 200ms ease'}}/>
      <div style={{position:'fixed',top:0,right:0,bottom:0,width:440,
        background:C.surface,boxShadow:'-8px 0 40px rgba(0,0,0,0.12)',
        zIndex:201,overflowY:'auto',padding:28,animation:'slideInRight 200ms ease'}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:24}}>
          <h3 style={{fontSize:17,fontWeight:700,color:C.text}}>변환 상세 정보</h3>
          <button onClick={onClose} style={{background:'none',border:'none',fontSize:20,cursor:'pointer',color:C.textSub}}>✕</button>
        </div>
        <div style={{background:C.bg,borderRadius:10,padding:16,marginBottom:20}}>
          <div style={{fontSize:14,fontWeight:600,marginBottom:6}}>{item.name}</div>
          <div style={{display:'flex',gap:16,fontSize:12,color:C.textSub}}>
            <span>크기: {item.size}</span><span>처리자: {item.user}</span>
          </div>
        </div>
        <div style={{marginBottom:20}}>
          <div style={{fontSize:13,fontWeight:600,color:C.textSub,marginBottom:10,textTransform:'uppercase',letterSpacing:'0.05em'}}>변환 결과</div>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:12}}>
            {[{l:'레이어 수',v:item.layers},{l:'객체 수',v:(item.entities||0).toLocaleString()},{l:'처리 시간',v:item.dur}].map(m=>(
              <div key={m.l} style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:8,padding:14,textAlign:'center'}}>
                <div style={{fontSize:18,fontWeight:700,color:C.primary,marginBottom:4}}>{m.v}</div>
                <div style={{fontSize:11,color:C.textSub}}>{m.l}</div>
              </div>
            ))}
          </div>
        </div>
        <div style={{marginBottom:20}}>
          <div style={{fontSize:13,fontWeight:600,color:C.textSub,marginBottom:10,textTransform:'uppercase',letterSpacing:'0.05em'}}>적용된 알고리즘</div>
          {item.algos.map((a,i)=>(
            <div key={i} style={{display:'flex',alignItems:'center',gap:8,marginBottom:7}}>
              <div style={{width:8,height:8,borderRadius:99,background:C.secondary,flexShrink:0}}/>
              <span style={{fontSize:13,color:C.text}}>{a}</span>
            </div>
          ))}
        </div>
        <div style={{marginBottom:24}}>
          <div style={{fontSize:13,fontWeight:600,color:C.textSub,marginBottom:8,textTransform:'uppercase',letterSpacing:'0.05em'}}>처리 정보</div>
          <div style={{display:'flex',alignItems:'center',gap:12}}>
            <Badge status={item.status}/>
            <span style={{fontSize:13,color:C.textSub}}>{item.date}</span>
          </div>
        </div>
        {item.status==='완료'&&(
          <button style={{width:'100%',padding:14,background:C.primary,color:'#fff',border:'none',borderRadius:10,cursor:'pointer',fontSize:14,fontWeight:700}}>
            ↓ 결과 도면 다운로드 (DXF)
          </button>
        )}
        {item.status==='오류'&&(
          <button style={{width:'100%',padding:14,background:C.error,color:'#fff',border:'none',borderRadius:10,cursor:'pointer',fontSize:14,fontWeight:700}}>
            ↻ 재변환 시도
          </button>
        )}
      </div>
    </>
  );
}

function Skeleton(){
  return(
    <div style={{minHeight:'100vh',background:C.bg,padding:32}}>
      <div style={{height:60,background:'#E2E8F0',borderRadius:8,marginBottom:8}}/>
      <div style={{height:120,background:C.secondary,borderRadius:0,marginBottom:24,opacity:0.3}}/>
      {[1,2,3].map(i=>(
        <div key={i} style={{height:80,background:'linear-gradient(90deg,#E8EDF5 25%,#D1D9E6 50%,#E8EDF5 75%)',backgroundSize:'200% 100%',animation:'shimmer 1.5s infinite',borderRadius:10,marginBottom:16}}/>
      ))}
    </div>
  );
}

function App(){
  const [tab,setTab]=React.useState('main');
  const [drawer,setDrawer]=React.useState(null);
  const [toast,setToast]=React.useState(null);
  const [loading,setLoading]=React.useState(true);
  React.useEffect(()=>{setTimeout(()=>setLoading(false),1000);},[]);
  if(loading)return <Skeleton/>;
  return(
    <div style={{display:'flex',flexDirection:'column',minHeight:'100vh',background:C.bg,width:'100%'}}>
      <Header tab={tab} setTab={setTab}/>
      <HeroBanner tab={tab}/>
      <main style={{flex:1,padding:'28px 32px',maxWidth:1240,margin:'0 auto',width:'100%'}}>
        <div key={tab} style={{animation:'fadeIn 300ms ease'}}>
          {tab==='main'&&<ConvertPage setToast={setToast}/>}
          {tab==='convert'&&<AutoConvertPage setToast={setToast}/>}
          {tab==='edit'&&<EditPage setToast={setToast}/>}
          {tab==='history'&&<HistoryPage setDrawer={setDrawer}/>}
        </div>
      </main>
      {drawer&&<HistoryDrawer item={drawer} onClose={()=>setDrawer(null)}/>}
      {toast&&<Toast msg={toast} onClose={()=>setToast(null)}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
