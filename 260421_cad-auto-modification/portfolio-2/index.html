function CountUp({end,suffix='',dur=1200}){
  const [v,setV]=React.useState(0);
  React.useEffect(()=>{
    let s=0;const step=end/(dur/16);
    const t=setInterval(()=>{s=Math.min(s+step,end);setV(Math.floor(s));if(s>=end)clearInterval(t);},16);
    return()=>clearInterval(t);
  },[end]);
  return <span style={{animation:'countUp 400ms ease'}}>{v.toLocaleString()}{suffix}</span>;
}

function Toast({msg,onClose}){
  React.useEffect(()=>{const t=setTimeout(onClose,3000);return()=>clearTimeout(t);},[]);
  return(
    <div style={{position:'fixed',bottom:24,right:24,zIndex:9999,
      background:D.surface,color:D.text,padding:'12px 20px',borderRadius:8,
      animation:'slideUp 300ms ease',border:`1px solid ${D.primary}`,
      boxShadow:`0 4px 20px rgba(56,189,248,0.2)`,fontSize:14,fontWeight:500}}>
      {msg}

  );
}

            </div>
            <div style={{display:'flex',gap:10}}>
              <button onClick={()=>setModal(null)} style={{flex:1,padding:'12px',background:D.primary,color:D.bg,border:'none',borderRadius:8,cursor:'pointer',fontSize:14,fontWeight:700}}>변경 사항 저장</button>
              <button onClick={()=>setModal(null)} style={{padding:'12px 20px',background:'transparent',color:D.textSub,border:`1px solid ${D.border}`,borderRadius:8,cursor:'pointer',fontSize:14}}>취소</button>
            </div>
          </div>
        </Modal>
      )}
    </div>
  );
}

function Footer(){
  return(
    <footer style={{background:D.surface,borderTop:`1px solid ${D.border}`,marginTop:64}}>
      <div style={{maxWidth:1240,margin:'0 auto',padding:'48px 32px 32px',display:'grid',gridTemplateColumns:'2fr 1fr 1fr 1fr',gap:32}}>
        <div>
          <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:16}}>
            <div style={{width:32,height:32,borderRadius:8,background:`linear-gradient(135deg,${D.primary},${D.secondary})`,display:'flex',alignItems:'center',justifyContent:'center'}}>
              <svg width="16" height="16" viewBox="0 0 18 18" fill="none"><rect x="2" y="2" width="14" height="14" rx="2" stroke="#fff" strokeWidth="1.5"/><line x1="7" y1="2" x2="7" y2="16" stroke="#fff" strokeWidth="1.5"/><line x1="2" y1="8" x2="16" y2="8" stroke="#fff" strokeWidth="1.5"/></svg>
            </div>
            <span style={{fontSize:15,fontWeight:700,color:D.text}}>CAD AutoPlatform</span>
          </div>
          <p style={{fontSize:13,color:D.textSub,lineHeight:1.7}}>건설사 설계팀을 위한 CAD 도면 자동화 SaaS 플랫폼입니다. 설계 도면을 적산 도면으로 자동 변환하고 관리합니다.</p>
        </div>
        {[
          {title:'서비스',items:['도면 변환','알고리즘 설정','프로젝트 관리']},
          {title:'지원',items:['사용자 가이드','API 문서','고객 지원']},
          {title:'회사',items:['소개','블로그','채용']},
        ].map(col=>(
          <div key={col.title}>
            <div style={{fontSize:13,fontWeight:700,color:D.text,marginBottom:12}}>{col.title}</div>
            {col.items.map(item=>(
              <div key={item} style={{fontSize:13,color:D.textSub,marginBottom:8,cursor:'pointer'}} onMouseEnter={e=>e.target.style.color=D.primary} onMouseLeave={e=>e.target.style.color=D.textSub}>{item}</div>
            ))}
          </div>
        ))}
      </div>
      <div style={{maxWidth:1240,margin:'0 auto',padding:'16px 32px',borderTop:`1px solid ${D.border}`,display:'flex',justifyContent:'space-between',alignItems:'center'}}>
        <span style={{fontSize:12,color:D.textSub}}>© 2026 CAD AutoPlatform. All rights reserved.</span>
        <span style={{fontSize:12,color:D.textSub}}>Python + FastAPI + Redis + React 기반 구현</span>
      </div>
    </footer>
  );
}

function Skeleton(){
  return(
    <div style={{minHeight:'100vh',background:D.bg,padding:32}}>
      <div style={{height:64,background:D.surface,borderRadius:0,marginBottom:0}}/>
      {[1,2,3].map(i=>(
        <div key={i} style={{height:100,background:'linear-gradient(90deg,#1E293B 25%,#263148 50%,#1E293B 75%)',backgroundSize:'200% 100%',animation:'shimmer 1.5s infinite',borderRadius:12,marginBottom:16,marginTop:16}}/>
      ))}
    </div>
  );
}

function App(){
  const [route,setRoute]=React.useState('main');
  const [toast,setToast]=React.useState(null);
  const [loading,setLoading]=React.useState(true);
  React.useEffect(()=>{setTimeout(()=>setLoading(false),1100);},[]);
  if(loading)return <Skeleton/>;
  return(
    <div style={{display:'flex',flexDirection:'column',minHeight:'100vh',background:D.bg,width:'100%'}}>
      <GlobalNav route={route} setRoute={setRoute}/>
      <main style={{flex:1,padding:'32px',maxWidth:1240,margin:'0 auto',width:'100%'}}>
        <div key={route} style={{animation:'fadeIn 300ms ease'}}>
          {route==='main'&&<DashboardPage setToast={setToast}/>}
          {route==='projects'&&<ProjectsPage setToast={setToast}/>}
          {route==='analytics'&&<AnalyticsPage setToast={setToast}/>}
          {route==='users'&&<UsersPage setToast={setToast}/>}
        </div>
      </main>
      <Footer/>
      {toast&&<Toast msg={toast} onClose={()=>setToast(null)}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
