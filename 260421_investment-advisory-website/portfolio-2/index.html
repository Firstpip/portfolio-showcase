// ── CountUp ────────────────────────────────
function CountUp({ end, suffix = '', prefix = '' }) {
  const [val, setVal] = useState(0);
  useEffect(() => {
    let s = 0; const step = end / 60;
    const t = setInterval(() => { s += step; if (s >= end) { setVal(end); clearInterval(t); } else setVal(Math.floor(s)); }, 16);
    return () => clearInterval(t);
  }, [end]);
  return <span>{prefix}{val.toLocaleString()}{suffix}</span>;
}

// ── Chat Page ───────────────────────────────
function ChatPage({ setToast }) {
  const [selectedSession, setSelectedSession] = useState(CHAT_SESSIONS[0]);
  const [messages, setMessages] = useState(CHAT_MESSAGES_INIT);
  const [inputText, setInputText] = useState('');
  const [replyIdx, setReplyIdx] = useState(0);
  const [uploading, setUploading] = useState(false);
  const messagesEndRef = useRef(null);

  useEffect(() => { messagesEndRef.current?.scrollIntoView({ behavior: 'smooth' }); }, [messages]);

  const sendMsg = () => {
    if (!inputText.trim()) return;
    const now = new Date(); const t = `${now.getHours()}:${String(now.getMinutes()).padStart(2, '0')}`;
    setMessages(m => [...m, { id: Date.now(), sender: 'advisor', name: '어드바이저', text: inputText, time: t }]);
    setInputText('');
    setTimeout(() => {
      const reply = AUTO_REPLIES[replyIdx % AUTO_REPLIES.length];
      setMessages(m => [...m, { id: Date.now() + 1, sender: 'user', name: selectedSession.name, text: reply, time: t }]);
      setReplyIdx(r => r + 1);
    }, 1200);
  };

  const handleUpload = () => {
    setUploading(true);
    setTimeout(() => { setUploading(false); setMessages(m => [...m, { id: Date.now(), sender: 'advisor', name: '어드바이저', text: '[파일 첨부] 투자분석_리포트.pdf (2.4MB)', time: '지금', isFile: true }]); }, 1500);
  };

  const gradeColor = { 'VIP': C.primary, '프리미엄': C.accent, '일반': C.textSecondary };

  return (
    <div key="chat" style={{ animation: 'fadeIn 300ms ease', display: 'flex', height: 'calc(100vh - 160px)' }}>
      {/* 상담 목록 */}
      <div style={{ width: 280, background: C.surface, borderRight: `1px solid ${C.border}`, overflowY: 'auto', flexShrink: 0 }}>

            <span style={{ fontSize: 12, color: C.textMuted }}>🔍</span>
            <input placeholder="회원 검색..." style={{ background: 'transparent', border: 'none', outline: 'none', fontSize: 12, color: C.textPrimary, width: '100%', fontFamily: 'Pretendard, sans-serif' }} />
          </div>
        </div>
        {CHAT_SESSIONS.map((s, i) => (
          <div key={s.id}
            onClick={() => setSelectedSession(s)}
            style={{
              display: 'flex', alignItems: 'center', gap: 10, padding: '12px 16px', cursor: 'pointer',
              transition: 'all 150ms', borderBottom: `1px solid ${C.border}`,
              background: selectedSession?.id === s.id ? C.surface2 : 'transparent',
              borderLeft: selectedSession?.id === s.id ? `3px solid ${C.primary}` : '3px solid transparent',

          >
            <div style={{ width: 36, height: 36, borderRadius: '50%', background: `linear-gradient(135deg, ${C.primary}80, ${C.accent}80)`, display: 'flex', alignItems: 'center', justifyContent: 'center', color: '#fff', fontWeight: 700, fontSize: 13, position: 'relative', flexShrink: 0 }}>
              {s.name[0]}
              <span style={{ position: 'absolute', bottom: 0, right: 0, width: 9, height: 9, borderRadius: '50%', background: s.status === 'online' ? C.positive : C.textMuted, border: `2px solid ${selectedSession?.id === s.id ? C.surface2 : C.surface}` }}></span>
            </div>
            <div style={{ flex: 1, minWidth: 0 }}>
              <div style={{ display: 'flex', justifyContent: 'space-between' }}>
                <span style={{ fontSize: 13, fontWeight: 600, color: C.textPrimary }}>{s.name}</span>
                <span style={{ fontSize: 10, color: C.textMuted }}>{s.time}</span>
              </div>
              <div style={{ display: 'flex', alignItems: 'center', gap: 4, marginTop: 2 }}>
                <span style={{ color: gradeColor[s.grade] || C.textMuted, fontSize: 10, fontWeight: 700 }}>{s.grade}</span>
              </div>

          </div>
        ))}
      </div>

      {/* 채팅 룸 */}
      <div style={{ flex: 1, display: 'flex', flexDirection: 'column', background: C.bg }}>

        <div style={{ padding: '14px 20px', background: C.surface, borderBottom: `1px solid ${C.border}`, display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
          <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
            <div style={{ width: 32, height: 32, borderRadius: '50%', background: `linear-gradient(135deg, ${C.primary}, ${C.accent})`, display: 'flex', alignItems: 'center', justifyContent: 'center', color: '#fff', fontWeight: 700, fontSize: 13 }}>{selectedSession?.name[0]}</div>

          </div>
          <div style={{ display: 'flex', gap: 8 }}>

            <button onClick={() => setToast('상담 종료 처리')} style={{ background: '#FEE2E2', border: `1px solid #FECACA`, borderRadius: 7, padding: '5px 12px', fontSize: 11, cursor: 'pointer', color: '#DC2626', fontFamily: 'Pretendard, sans-serif' }}>종료</button>

              <div style={{ maxWidth: '70%' }}>
                <div style={{ fontSize: 11, color: C.textMuted, marginBottom: 4, textAlign: msg.sender === 'advisor' ? 'right' : 'left' }}>{msg.name} · {msg.time}</div>

                  padding: '10px 14px', borderRadius: msg.sender === 'advisor' ? '14px 14px 4px 14px' : '14px 14px 14px 4px',
                  background: msg.sender === 'advisor' ? C.primary : C.surface,
                  color: msg.sender === 'advisor' ? '#fff' : C.textPrimary,
                  fontSize: 13, lineHeight: 1.6, border: msg.sender !== 'advisor' ? `1px solid ${C.border}` : 'none',
                }}>
                  {msg.isFile ? <span>📎 {msg.text}</span> : msg.text}
                </div>
              </div>
            </div>
          ))}
          {uploading && (
            <div style={{ display: 'flex', justifyContent: 'flex-end' }}>

          <div ref={messagesEndRef} />

        {/* 입력 영역 */}
        <div style={{ padding: '14px 20px', background: C.surface, borderTop: `1px solid ${C.border}`, display: 'flex', gap: 8, alignItems: 'flex-end' }}>
          <button onClick={handleUpload} style={{ background: C.surface2, border: `1px solid ${C.border}`, borderRadius: 8, width: 36, height: 36, cursor: 'pointer', fontSize: 14, flexShrink: 0, color: C.textSecondary }}>📎</button>

        </div>
      </div>
    </div>
  );
}

// ── Members Page ────────────────────────────
function MembersPage({ setToast }) {
  const [members, setMembers] = useState(MEMBERS_LIST);
  const [selectedMember, setSelectedMember] = useState(null);
  const [filterGrade, setFilterGrade] = useState('전체');

  const grades = ['전체', 'VIP', '프리미엄', '일반'];
  const filtered = members.filter(m => filterGrade === '전체' || m.grade === filterGrade);
  const gradeColor = { 'VIP': C.primary, '프리미엄': C.accent, '일반': C.textMuted };

  return (
    <div key="members" style={{ padding: '24px 32px', animation: 'fadeIn 300ms ease' }}>
      {/* 필터 */}
      <div style={{ display: 'flex', gap: 8, marginBottom: 20 }}>
        {grades.map(g => (
          <button key={g} onClick={() => setFilterGrade(g)} style={{
            padding: '6px 14px', borderRadius: 20, fontSize: 12, cursor: 'pointer', fontFamily: 'Pretendard, sans-serif', fontWeight: 500,
            background: filterGrade === g ? C.primary : C.surface,
            color: filterGrade === g ? '#fff' : C.textSecondary,
            border: `1px solid ${filterGrade === g ? C.primary : C.border}`,
          }}>{g} {g !== '전체' && `(${members.filter(m => m.grade === g).length})`}</button>
        ))}
        <button onClick={() => setToast('회원 내보내기 (CSV)')} style={{ marginLeft: 'auto', padding: '6px 14px', borderRadius: 8, fontSize: 12, cursor: 'pointer', fontFamily: 'Pretendard, sans-serif', background: C.surface, color: C.textSecondary, border: `1px solid ${C.border}` }}>📥 내보내기</button>
      </div>

      {/* 회원 카드 그리드 */}
      <div style={{ display: 'grid', gridTemplateColumns: 'repeat(3, 1fr)', gap: 16 }}>
        {filtered.map((m, i) => (
          <div key={m.id}
            onClick={() => setSelectedMember(m)}
            style={{
              background: C.surface, borderRadius: 18, padding: '18px 20px',
              border: `1px solid ${C.border}`, cursor: 'pointer',
              transition: 'all 200ms', animation: `slideUp 300ms ease ${i * 60}ms both`,
            }}
            onMouseEnter={e => { e.currentTarget.style.boxShadow = `0 10px 32px rgba(124,58,237,0.18)`; e.currentTarget.style.transform = 'scale(1.02)'; e.currentTarget.style.borderColor = C.primary; }}
            onMouseLeave={e => { e.currentTarget.style.boxShadow = ''; e.currentTarget.style.transform = ''; e.currentTarget.style.borderColor = C.border; }}
          >
            <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', marginBottom: 12 }}>
              <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
                <div style={{ width: 38, height: 38, borderRadius: '50%', background: `linear-gradient(135deg, ${gradeColor[m.grade] || C.textMuted}80, ${C.accent}80)`, display: 'flex', alignItems: 'center', justifyContent: 'center', color: '#fff', fontWeight: 700, fontSize: 14 }}>{m.name[0]}</div>
                <div>
                  <div style={{ fontSize: 14, fontWeight: 700, color: C.textPrimary }}>{m.name}</div>
                  <div style={{ fontSize: 11, color: C.textMuted }}>{m.email}</div>
                </div>
              </div>
              <span style={{ fontSize: 10, padding: '3px 8px', borderRadius: 6, fontWeight: 700, background: `${gradeColor[m.grade] || C.textMuted}25`, color: gradeColor[m.grade] || C.textMuted, border: `1px solid ${gradeColor[m.grade] || C.textMuted}40` }}>{m.grade}</span>
            </div>
            <div style={{ display: 'flex', justifyContent: 'space-between', padding: '10px 12px', background: C.surface2, borderRadius: 8 }}>
              <div>
                <div style={{ fontSize: 10, color: C.textMuted }}>총 자산</div>
                <div style={{ fontSize: 13, fontWeight: 700, color: C.textPrimary, marginTop: 2 }}>{m.asset}원</div>
              </div>
              <div style={{ textAlign: 'right' }}>
                <div style={{ fontSize: 10, color: C.textMuted }}>가입일</div>
                <div style={{ fontSize: 12, color: C.textSecondary, marginTop: 2 }}>{m.joinDate}</div>
              </div>
            </div>
            <div style={{ display: 'flex', gap: 4, marginTop: 10 }}>
              <span style={{ fontSize: 9, padding: '2px 6px', borderRadius: 4, background: m.lang === 'ko' ? '#DBEAFE' : '#FCE7F3', color: m.lang === 'ko' ? '#1D4ED8' : '#9D174D', fontWeight: 600 }}>
                {m.lang === 'ko' ? '🇰🇷 KO' : '🇺🇸 EN'}
              </span>
            </div>
          </div>
        ))}
      </div>

      {selectedMember && (
        <Drawer item={selectedMember} onClose={() => setSelectedMember(null)} title="회원 상세 정보">
          {[['이메일', selectedMember.email], ['등급', selectedMember.grade], ['가입일', selectedMember.joinDate], ['총 자산', selectedMember.asset + '원'], ['언어 설정', selectedMember.lang === 'ko' ? '한국어' : 'English']].map(([k, v]) => (
            <div key={k} style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 14, paddingBottom: 14, borderBottom: `1px solid ${C.border}` }}>
              <span style={{ fontSize: 13, color: C.textSecondary }}>{k}</span>
              <span style={{ fontSize: 13, fontWeight: 600, color: C.textPrimary }}>{v}</span>
            </div>
          ))}
          <div style={{ marginTop: 8 }}>
            <div style={{ fontSize: 12, color: C.textMuted, marginBottom: 10 }}>등급 변경</div>
            <div style={{ display: 'flex', gap: 8 }}>
              {['일반', '프리미엄', 'VIP'].map(g => (
                <button key={g} onClick={() => { setToast(`${selectedMember.name} → ${g} 등급 변경`); setSelectedMember(null); }} style={{
                  flex: 1, padding: '9px', borderRadius: 8, border: `1px solid ${gradeColor[g] || C.border}`, cursor: 'pointer', fontSize: 12, fontWeight: 600, fontFamily: 'Pretendard, sans-serif',
                  background: selectedMember.grade === g ? `${gradeColor[g] || C.primary}30` : 'transparent',
                  color: gradeColor[g] || C.textSecondary,
                }}>{g}</button>
              ))}
            </div>
          </div>
        </Drawer>
      )}
    </div>
  );
}

// ── Skeleton ───────────────────────────────
function SkeletonLoader() {
  return (
    <div style={{ padding: '24px 32px' }}>
      {[1, 2, 3].map(i => (
        <div key={i} style={{ height: 80, borderRadius: 12, marginBottom: 16, background: `linear-gradient(90deg, ${C.surface2} 25%, ${C.border} 50%, ${C.surface2} 75%)`, backgroundSize: '200% 100%', animation: 'shimmer 1.5s infinite' }} />
      ))}
    </div>
  );
}

// ── App ─────────────────────────────────────
function App() {
  const [tab, setTab] = useState('dashboard');
  const [toast, setToast] = useState(null);
  const [loading, setLoading] = useState(true);
  const [drawer, setDrawer] = useState(null);

  useEffect(() => { setTimeout(() => setLoading(false), 1200); }, []);

  const KPIS = {
    dashboard: [{ value: 1284, suffix: '명', label: '전체 회원' }, { value: 47, suffix: '명', label: '실시간 접속' }, { value: 2741, suffix: '회', label: '리포트 열람' }],
    chat: [{ value: 3, suffix: '건', label: '미읽음 상담' }, { value: 12, suffix: '명', label: '오늘 상담' }, { value: 98, suffix: '%', label: '응답률' }],
    content: [{ value: 6, suffix: '건', label: '게시 리포트' }, { value: 1284, suffix: '명', label: '뉴스레터 구독' }, { value: 274, suffix: '회', label: '오늘 열람' }],
    i18n: [{ value: 2, suffix: '개', label: '지원 언어' }, { value: 48, suffix: '%', label: '영문 커버리지' }, { value: 5, suffix: '건', label: '미번역 콘텐츠' }],
    members: [{ value: 1284, suffix: '명', label: '전체 회원' }, { value: 42, suffix: '명', label: 'VIP' }, { value: 156, suffix: '명', label: '프리미엄' }],
  };

  const handleSetTab = (t) => {
    setLoading(true); setTab(t); setTimeout(() => setLoading(false), 500);
  };

  const renderPage = () => {
    if (loading) return <SkeletonLoader />;
    switch (tab) {
      case 'dashboard': return <DashboardPage setToast={setToast} setDrawer={setDrawer} />;
      case 'chat': return <ChatPage setToast={setToast} />;
      case 'content': return <ContentPage setToast={setToast} />;
      case 'i18n': return <I18nPage setToast={setToast} />;
      case 'members': return <MembersPage setToast={setToast} />;
      default: return null;
    }
  };

  return (
    <div style={{ display: 'flex', flexDirection: 'column', width: '100%', minHeight: '100vh', background: C.bg }}>
      <Topnav tab={tab} setTab={handleSetTab} />
      <HeroBanner tab={tab} kpis={KPIS[tab] || []} />
      <main style={{ flex: 1 }}>{renderPage()}</main>
      {toast && <Toast message={toast} onClose={() => setToast(null)} />}
      {drawer?.type === 'chat' && (
        <Drawer item={drawer.item} onClose={() => setDrawer(null)} title="상담 세션 상세">
          <div style={{ marginBottom: 16, background: C.surface2, borderRadius: 8, padding: '12px 14px' }}>
            <div style={{ fontSize: 12, color: C.textMuted }}>마지막 메시지</div>
            <div style={{ fontSize: 13, color: C.textPrimary, marginTop: 4 }}>{drawer.item.lastMsg}</div>
          </div>
          <button onClick={() => { setDrawer(null); setToast('채팅 화면으로 이동'); handleSetTab('chat'); }} style={{ width: '100%', background: C.primary, color: '#fff', border: 'none', borderRadius: 8, padding: '11px', fontSize: 13, fontWeight: 600, cursor: 'pointer', fontFamily: 'Pretendard, sans-serif' }}>채팅 열기</button>
        </Drawer>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
