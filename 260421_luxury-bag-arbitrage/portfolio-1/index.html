function pct(n){return n?.toFixed(1)+'%';}

function StatusBadge({status}){
  const map={alert:{bg:'#FEF3C7',color:'#D97706',text:'알림전송'},sent:{bg:'#D1FAE5',color:'#065F46',text:'발송완료'},review:{bg:'#EDE9FE',color:'#5B21B6',text:'검토필요'},skip:{bg:'#F1F5F9',color:'#64748B',text:'제외'}};

  return <span style={{padding:'3px 10px',borderRadius:12,fontSize:12,fontWeight:600,background:s.bg,color:s.color}}>{s.text}</span>;
}

function GradeBadge({grade}){
  const map={'S':{bg:'#FEF3C7',color:'#B45309'},'A+':{bg:'#D1FAE5',color:'#065F46'},'A':{bg:'#DBEAFE',color:'#1E40AF'},'B+':{bg:'#EDE9FE',color:'#5B21B6'},'B':{bg:'#FEE2E2',color:'#991B1B'}};
  const s=map[grade]||{bg:'#F1F5F9',color:'#64748B'};
  return <span style={{padding:'2px 8px',borderRadius:8,fontSize:11,fontWeight:700,background:s.bg,color:s.color}}>{grade}</span>;
}

function CountUp({end,suffix='',duration=1200}){
  const [v,setV]=useState(0);
  useEffect(()=>{
    let s=0,step=end/(duration/16);
    const t=setInterval(()=>{s+=step;if(s>=end){setV(end);clearInterval(t);}else setV(Math.floor(s));},16);
    return()=>clearInterval(t);
  },[end]);
  return <span style={{animation:'countUp 400ms ease'}}>{v.toLocaleString()}{suffix}</span>;
}

function Toast({msg,onClose}){
  useEffect(()=>{const t=setTimeout(onClose,3000);return()=>clearTimeout(t);},[]);
  return <div style={{position:'fixed',bottom:24,right:24,zIndex:9999,background:'#1A1A2E',color:'#fff',padding:'12px 20px',borderRadius:10,animation:'slideUp 300ms ease',boxShadow:'0 4px 16px rgba(0,0,0,0.2)',fontSize:14}}>{msg}</div>;
}

      <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:12}}>
        <span style={{fontSize:13,color:C.textSec,fontWeight:500}}>{label}</span>
        <span style={{fontSize:22}}>{icon}</span>

    </div>
  );
}

          </div>
          <div>
            <div style={{fontSize:13,fontWeight:600,color:C.text,marginBottom:8}}>차익율</div>
            <div style={{display:'flex',alignItems:'center',gap:12}}>
              <div style={{flex:1,height:10,borderRadius:5,background:'#E2E8F0',overflow:'hidden'}}>
                <div style={{height:'100%',borderRadius:5,background:item.ratio>=15?C.success:C.warning,width:`${Math.min(item.ratio*3,100)}%`,animation:'barGrow 1s ease both','--target-width':`${Math.min(item.ratio*3,100)}%`}}/>
              </div>
              <span style={{fontSize:18,fontWeight:800,color:item.ratio>=15?C.success:C.warning}}>{pct(item.ratio)}</span>
            </div>
          </div>
          <div>
            <label style={{fontSize:13,fontWeight:600,color:C.text,display:'block',marginBottom:6}}>메모</label>
            <textarea rows={3} placeholder="검토 내용을 입력하세요..." style={{width:'100%',padding:'10px 12px',borderRadius:8,border:`1px solid ${C.border}`,fontSize:13,resize:'vertical',outline:'none'}}/>
          </div>
          <div style={{display:'flex',gap:10}}>
            <button onClick={()=>{setModal(null);setToast('텔레그램 알림을 즉시 전송했습니다.');}} style={{flex:1,padding:'10px',borderRadius:8,background:C.primary,border:'none',color:'#fff',fontSize:14,cursor:'pointer',fontWeight:600}}>알림 전송</button>
            <button onClick={()=>{setModal(null);setToast('매물이 제외 처리되었습니다.');}} style={{flex:1,padding:'10px',borderRadius:8,border:`1px solid ${C.border}`,background:'transparent',color:C.textSec,fontSize:14,cursor:'pointer'}}>제외 처리</button>
          </div>
        </div>
      </Modal>
    );
  }
  if(modal.type==='arbitrage'){
    const {item}=modal;
    return (
      <Modal title="차익 분석 상세" onClose={()=>setModal(null)} width={520}>
        <div style={{display:'flex',flexDirection:'column',gap:14}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:14,borderRadius:10,background:'#EBF2FF'}}>
            <div><div style={{fontSize:14,fontWeight:700,color:C.text}}>{item.brand} {item.model}</div><div style={{fontSize:12,color:C.textSec,marginTop:2}}>매입가: {fmt(item.buyPrice)}</div></div>
            <div style={{textAlign:'right'}}><div style={{fontSize:22,fontWeight:800,color:C.success}}>{pct(item.ratio)}</div><div style={{fontSize:11,color:C.textSec}}>시세차익율</div></div>
          </div>
          <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:10}}>
            {[['구구스',item.gugus],['필웨이',item.feelway],['번개장터',item.bunjang]].map(([p,v])=>(
              <div key={p} style={{padding:12,borderRadius:8,background:'#F8FAFC',textAlign:'center',border:v===item.best?`2px solid ${C.primary}`:'2px solid transparent'}}>
                <div style={{fontSize:11,color:C.textSec,marginBottom:4}}>{p}{v===item.best&&<span style={{color:C.primary,marginLeft:4}}>★</span>}</div>
                <div style={{fontSize:15,fontWeight:700,color:v===item.best?C.primary:C.text}}>{fmt(v)}</div>
              </div>
            ))}
          </div>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
            {[['최고 시세',item.best,C.primary],['플랫폼 수수료',item.fee,'#64748B'],['예상 순수익',item.net,C.success],['매입가',item.buyPrice,C.text]].map(([k,v,c])=>(
              <div key={k} style={{padding:12,borderRadius:8,background:'#F8FAFC'}}>
                <div style={{fontSize:12,color:C.textSec,marginBottom:3}}>{k}</div>
                <div style={{fontSize:16,fontWeight:700,color:c}}>{fmt(v)}</div>
              </div>
            ))}
          </div>
          <button onClick={()=>{setModal(null);setToast('알림 규칙에 이 매물 조건이 추가되었습니다.');}} style={{padding:'11px',borderRadius:8,background:C.primary,border:'none',color:'#fff',fontSize:14,cursor:'pointer',fontWeight:600}}>이 조건으로 알림 규칙 추가</button>
        </div>
      </Modal>
    );
  }
  if(modal.type==='pipelineDetail'){
    const {item}=modal;
    return (
      <Modal title={`${item.brand} ${item.type} 상세`} onClose={()=>setModal(null)} width={480}>
        <div style={{display:'flex',flexDirection:'column',gap:14}}>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
            {[['전체 처리',item.count],['성공',item.success],['실패',item.fail],['성공률',Math.round(item.success/item.count*100)+'%']].map(([k,v])=>(
              <div key={k} style={{padding:14,borderRadius:10,background:'#F8FAFC',textAlign:'center'}}>
                <div style={{fontSize:12,color:C.textSec,marginBottom:4}}>{k}</div>
                <div style={{fontSize:22,fontWeight:800,color:C.text}}>{typeof v==='number'?v.toLocaleString():v}</div>
              </div>
            ))}
          </div>
          <div style={{padding:14,borderRadius:10,background:'#FEF3C7'}}>
            <div style={{fontSize:13,fontWeight:600,color:'#92400E',marginBottom:6}}>실패 항목 처리</div>
            <div style={{fontSize:13,color:'#92400E'}}>실패한 {item.fail}건은 다음 사이클에서 자동 재시도됩니다. (최대 3회)</div>
          </div>
          <button onClick={()=>{setModal(null);setToast('파이프라인을 즉시 재실행합니다.');}} style={{padding:'11px',borderRadius:8,background:C.primary,border:'none',color:'#fff',fontSize:14,cursor:'pointer',fontWeight:600}}>즉시 재실행</button>
        </div>
      </Modal>
    );
  }
  if(modal.type==='editAlert'){
    const {rule}=modal;
    return (
      <Modal title="알림 규칙 수정" onClose={()=>setModal(null)} width={480}>
        <div style={{display:'flex',flexDirection:'column',gap:14}}>
          {[['브랜드',rule.brand],['모델',rule.model],['텔레그램 채널',rule.chatId]].map(([k,v])=>(
            <div key={k}><label style={{fontSize:13,fontWeight:600,color:C.text,display:'block',marginBottom:6}}>{k}</label>
            <input defaultValue={v} style={{width:'100%',padding:'9px 12px',borderRadius:8,border:`1px solid ${C.border}`,fontSize:13,color:C.text}}/></div>
          ))}
          <div style={{display:'flex',gap:10,marginTop:4}}>
            <button onClick={()=>setModal(null)} style={{flex:1,padding:'10px',borderRadius:8,border:`1px solid ${C.border}`,background:'transparent',fontSize:14,cursor:'pointer',color:C.textSec}}>취소</button>
            <button onClick={()=>{setModal(null);setToast('알림 규칙이 수정되었습니다.');}} style={{flex:2,padding:'10px',borderRadius:8,background:C.primary,border:'none',fontSize:14,cursor:'pointer',color:'#fff',fontWeight:700}}>저장</button>
          </div>
        </div>
      </Modal>
    );
  }
  return null;
}

function App(){
  const [page,setPage]=useState('dashboard');
  const [modal,setModal]=useState(null);
  const [toast,setToast]=useState(null);
  const PAGE_TITLES={dashboard:'실시간 대시보드',listing:'매물 목록',arbitrage:'차익 분석',alerts:'알림 설정',pipeline:'파이프라인 현황'};
  const [pageKey,setPageKey]=useState(0);
  const changePage=(p)=>{setPage(p);setPageKey(k=>k+1);};
  return (
    <div style={{display:'flex',width:'100%',height:'100vh',overflow:'hidden',fontFamily:'Pretendard,sans-serif'}}>
      {/* 사이드바 */}
      <aside style={{width:240,background:C.sidebar,flexShrink:0,display:'flex',flexDirection:'column',overflowY:'auto'}}>
        <div style={{padding:'24px 20px 16px'}}>
          <div style={{fontSize:18,fontWeight:800,color:'#fff',marginBottom:4}}>🏷️ LuxAI</div>
          <div style={{fontSize:11,color:'rgba(255,255,255,0.4)'}}>명품 시세차익 분석 시스템</div>
        </div>
        <nav style={{flex:1,padding:'8px 12px'}}>
          {NAV.map(n=>(
            <button key={n.id} onClick={()=>changePage(n.id)}
              style={{width:'100%',display:'flex',alignItems:'center',gap:10,padding:'10px 12px',borderRadius:8,border:'none',cursor:'pointer',marginBottom:4,textAlign:'left',background:page===n.id?C.sidebarActive:'transparent',color:page===n.id?'#fff':'rgba(255,255,255,0.65)',fontSize:13,fontWeight:page===n.id?600:400,transition:'all 150ms',fontFamily:'Pretendard,sans-serif'}}
              onMouseEnter={e=>{if(page!==n.id)e.currentTarget.style.background=C.sidebarHover;}}
              onMouseLeave={e=>{if(page!==n.id)e.currentTarget.style.background='transparent';}}>
              <span style={{fontSize:16}}>{n.icon}</span>
              {n.label}
            </button>
          ))}
        </nav>
        <div style={{padding:'16px 20px',borderTop:'1px solid rgba(255,255,255,0.1)'}}>
          <div style={{display:'flex',alignItems:'center',gap:10}}>
            <div style={{width:32,height:32,borderRadius:'50%',background:C.accent,display:'flex',alignItems:'center',justifyContent:'center',fontSize:14,fontWeight:700,color:'#fff'}}>김</div>
            <div>
              <div style={{fontSize:13,fontWeight:600,color:'#fff'}}>김민준</div>
              <div style={{fontSize:11,color:'rgba(255,255,255,0.4)'}}>시스템 관리자</div>
            </div>
          </div>
        </div>
      </aside>
      {/* 메인 */}
      <div style={{flex:1,display:'flex',flexDirection:'column',overflow:'hidden'}}>
        <header style={{height:56,background:C.surface,borderBottom:`1px solid ${C.border}`,display:'flex',alignItems:'center',padding:'0 24px',gap:12,flexShrink:0}}>
          <span style={{fontSize:16,fontWeight:700,color:C.text,flex:1}}>{PAGE_TITLES[page]}</span>
          <div style={{width:200,position:'relative'}}>
            <input placeholder="매물 검색..." style={{width:'100%',padding:'7px 12px 7px 32px',borderRadius:8,border:`1px solid ${C.border}`,fontSize:13,background:'#F8FAFC',outline:'none'}}/>
            <span style={{position:'absolute',left:10,top:'50%',transform:'translateY(-50%)',color:C.textSec,fontSize:13}}>🔍</span>
          </div>
          <div style={{width:32,height:32,borderRadius:'50%',background:'#F1F5F9',display:'flex',alignItems:'center',justifyContent:'center',cursor:'pointer',fontSize:16}}>🔔</div>
          <div style={{width:32,height:32,borderRadius:'50%',background:C.primary,display:'flex',alignItems:'center',justifyContent:'center',fontSize:13,fontWeight:700,color:'#fff'}}>김</div>
        </header>
        <main style={{flex:1,overflowY:'auto',padding:24,background:C.bg}}>
          <div key={pageKey} style={{animation:'fadeIn 300ms ease'}}>
            {page==='dashboard'&&<DashboardPage setModal={setModal} setToast={setToast}/>}
            {page==='listing'&&<ListingPage setModal={setModal} setToast={setToast}/>}
            {page==='arbitrage'&&<ArbitragePage setModal={setModal} setToast={setToast}/>}
            {page==='alerts'&&<AlertsPage setModal={setModal} setToast={setToast}/>}
            {page==='pipeline'&&<PipelinePage setModal={setModal} setToast={setToast}/>}
          </div>
        </main>
      </div>
      <ModalContent modal={modal} setModal={setModal} setToast={msg=>setToast(msg)}/>
      {toast&&<Toast msg={toast} onClose={()=>setToast(null)}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
