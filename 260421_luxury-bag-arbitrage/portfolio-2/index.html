function fmt(n){return n?.toLocaleString()+'원';}
function pct(n){return n?.toFixed(1)+'%';}

function CountUp({end,suffix='',duration=1200}){
  const [v,setV]=useState(0);
  useEffect(()=>{
    let s=0,step=end/(duration/16);
    const t=setInterval(()=>{s+=step;if(s>=end){setV(end);clearInterval(t);}else setV(Math.floor(s));},16);
    return()=>clearInterval(t);
  },[end]);
  return <span style={{animation:'countUp 400ms ease'}}>{v.toLocaleString()}{suffix}</span>;
}

function Toast({msg,onClose}){
  useEffect(()=>{const t=setTimeout(onClose,3000);return()=>clearTimeout(t);},[]);
  return <div style={{position:'fixed',bottom:24,right:24,zIndex:9999,background:'linear-gradient(135deg,#6366F1,#8B5CF6)',color:'#fff',padding:'12px 20px',borderRadius:10,animation:'slideUp 300ms ease',boxShadow:'0 4px 20px rgba(99,102,241,0.4)',fontSize:14}}>{msg}</div>;
}

      <header style={{position:'sticky',top:0,zIndex:100,background:C.surface,borderBottom:`1px solid ${C.border}`,display:'flex',alignItems:'center',height:56,padding:'0 24px',gap:4,flexShrink:0}}>
        <div style={{fontSize:17,fontWeight:800,color:C.text,marginRight:12,letterSpacing:'-0.03em'}}>
          <span style={{color:C.primary}}>Resell</span><span style={{color:C.textSec}}>AI</span>
        </div>
        {TABS.map(t=>(
          <button key={t.id} onClick={()=>changeTab(t.id)}
            style={{padding:'8px 14px',borderRadius:8,border:'none',cursor:'pointer',fontSize:13,fontWeight:tab===t.id?700:400,color:tab===t.id?C.primary:C.textSec,background:tab===t.id?'rgba(99,102,241,0.12)':'transparent',transition:'all 150ms',fontFamily:'Pretendard,sans-serif'}}>
            {t.label}
          </button>
        ))}
        <div style={{flex:1}}/>
        <div style={{width:200,position:'relative',marginRight:8}}>
          <input placeholder="모델명 검색..." style={{width:'100%',padding:'7px 12px 7px 30px',borderRadius:8,border:`1px solid ${C.border}`,fontSize:12,background:'rgba(255,255,255,0.05)',color:C.text,outline:'none'}}/>
          <span style={{position:'absolute',left:10,top:'50%',transform:'translateY(-50%)',color:C.textSec,fontSize:12}}>🔍</span>
        </div>
        <button style={{width:32,height:32,borderRadius:'50%',background:'rgba(255,255,255,0.06)',border:'none',cursor:'pointer',fontSize:14,display:'flex',alignItems:'center',justifyContent:'center',marginRight:4}}>🔔</button>
        <div style={{width:32,height:32,borderRadius:'50%',background:'linear-gradient(135deg,#6366F1,#8B5CF6)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:13,fontWeight:700,color:'#fff',cursor:'pointer'}}>김</div>
      </header>

      {/* 히어로 배너 */}
      <div key={tab+'-hero'} style={{background:meta.grad,padding:'28px 32px',animation:'fadeIn 250ms ease'}}>
        <div style={{maxWidth:1200,margin:'0 auto'}}>
          <h1 style={{fontSize:24,fontWeight:800,color:'#fff',marginBottom:12,letterSpacing:'-0.03em'}}>{meta.title}</h1>
          <div style={{display:'flex',gap:32}}>
            {meta.kpis.map((kpi,i)=>(
              <div key={kpi.label} style={{animation:`slideUp 300ms ease ${i*60}ms both`}}>
                <div style={{fontSize:11,color:'rgba(255,255,255,0.7)',marginBottom:4,letterSpacing:'0.06em',fontWeight:600,textTransform:'uppercase'}}>{kpi.label}</div>
                <div style={{fontSize:20,fontWeight:800,color:'#fff'}}>{kpi.value}</div>
              </div>
            ))}
          </div>
        </div>
      </div>

      {/* 콘텐츠 */}
      <main style={{flex:1,padding:'24px 32px',maxWidth:1200,margin:'0 auto',width:'100%'}}>
        <div key={tabKey} style={{animation:'fadeIn 300ms ease'}}>
          {tab==='dashboard'&&<DashboardTab setDrawer={setDrawer} setToast={setToast}/>}
          {tab==='trend'&&<TrendTab setDrawer={setDrawer} setToast={setToast}/>}
          {tab==='portfolio'&&<PortfolioTab setDrawer={setDrawer} setToast={setToast}/>}
          {tab==='rules'&&<RulesTab setDrawer={setDrawer} setToast={setToast}/>}
          {tab==='brands'&&<BrandsTab setDrawer={setDrawer} setToast={setToast}/>}
        </div>
      </main>

      <Drawer item={drawer} onClose={()=>setDrawer(null)}/>
      {toast&&<Toast msg={toast} onClose={()=>setToast(null)}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
