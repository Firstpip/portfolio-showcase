// ─── 유틸 컴포넌트 ───
function CountUp({end, suffix='', prefix='', duration=1200}) {
  const [val, setVal] = useState(0);
  useEffect(() => {
    let s = 0; const step = end / (duration/16);
    const t = setInterval(() => {
      s += step; if(s >= end){setVal(end);clearInterval(t);} else setVal(Math.floor(s));
    }, 16);
    return ()=>clearInterval(t);
  }, [end]);
  return <span style={{animation:'countUp 400ms ease'}}>{prefix}{val.toLocaleString()}{suffix}</span>;
}

function Toast({message, icon='✅', onClose}) {
  useEffect(()=>{ const t=setTimeout(onClose,3000); return()=>clearTimeout(t); },[]);
  return <div className="toast"><span className="toast-icon">{icon}</span>{message}</div>;
}

function Modal({title, onClose, children, wide=false}) {
  return (
    <div style={{position:'fixed',inset:0,zIndex:500,display:'flex',alignItems:'center',justifyContent:'center'}}>
      <div onClick={onClose} style={{position:'absolute',inset:0,background:'rgba(0,0,0,0.7)',animation:'fadeIn 200ms ease'}} />
      <div className={`modal-box ${wide?'modal-wide':''}`}>
        <div className="modal-header">
          <span className="modal-title">{title}</span>
          <button className="modal-close" onClick={onClose}>✕</button>
        </div>
        <div className="modal-body">{children}</div>
      </div>
    </div>
  );
}

function StatusBadge({status}) {
  const map = {normal:['정상','badge-green'],alert:['경보','badge-red'],warning:['주의','badge-yellow']};
  const [label,cls] = map[status]||['알수없음','badge-blue'];
  return <span className={`badge ${cls}`}><span className="status-dot" style={{background:status==='normal'?'#00E5A0':status==='alert'?'#FF4757':'#FFB800'}}></span>{label}</span>;
}

// ─── 사용자 및 권한 관리 페이지 ───
function UserMgmtPage({addToast}) {
  const [users, setUsers] = useState(USERS);
  const [search, setSearch] = useState('');
  const [selectedUser, setSelectedUser] = useState(null);
  const [showAdd, setShowAdd] = useState(false);
  const [roleFilter, setRoleFilter] = useState('전체');

  const filtered = users.filter(u => {
    const matchSearch = u.name.includes(search) || u.email.includes(search);
    const matchRole = roleFilter==='전체' || u.role===roleFilter;
    return matchSearch && matchRole;
  });

  const toggleStatus = (id) => {
    setUsers(us=>us.map(u=>u.id===id?{...u,status:u.status==='active'?'inactive':'active'}:u));
    addToast('사용자 상태가 변경되었습니다','🔄');
  };

  return (
    <div className="page-animation">
      <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:14,marginBottom:20}}>
        {[
          {label:'전체 사용자',val:users.length,icon:'👤'},
          {label:'활성 사용자',val:users.filter(u=>u.status==='active').length,icon:'🟢'},
          {label:'슈퍼어드민',val:users.filter(u=>u.role==='슈퍼어드민').length,icon:'🔑'},

          <div key={k.label} className="kpi-card" style={{animation:`slideUp 300ms ease ${i*60}ms both`,padding:16}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
              <div>
                <div className="kpi-label">{k.label}</div>
                <div className="kpi-value" style={{fontSize:22}}><CountUp end={k.val} /></div>

              <span style={{fontSize:24,opacity:0.6}}>{k.icon}</span>

      <div className="table-card">

            <div className="schedule-filter" style={{marginBottom:0}}>
              {['전체','슈퍼어드민','관리자','일반사용자'].map(r=>(

          <tbody>
            {filtered.map(u=>(
              <tr key={u.id} onClick={()=>setSelectedUser(u)}>
                <td>
                  <div style={{display:'flex',alignItems:'center',gap:8}}>
                    <div className="user-table-avatar">{u.name[0]}</div>

                <td style={{color:'#7AA8CC'}}>{u.email}</td>

            <div style={{marginLeft:'auto',textAlign:'right'}}>

              </select>
            </div>
            <div className="form-group">
              <label className="form-label">상태</label>
              <select className="form-select" defaultValue={selectedUser.status}>

            <label className="form-label">접근 가능 발전소</label>

// ─── 메인 앱 ───
function App() {
  const [page, setPage] = useState('대시보드');
  const [loading, setLoading] = useState(true);
  const [selectedPlant, setSelectedPlant] = useState(null);
  const [toasts, setToasts] = useState([]);
  const [pageKey, setPageKey] = useState(0);

  useEffect(()=>{ setTimeout(()=>setLoading(false), 1200); },[]);

  const addToast = useCallback((msg, icon='✅') => {
    const id = Date.now();
    setToasts(t=>[...t,{id,msg,icon}]);
  },[]);

  const removeToast = useCallback((id) => setToasts(t=>t.filter(x=>x.id!==id)),[]);

  const navigate = (p) => { setPage(p); setPageKey(k=>k+1); if(p!=='발전소 분석') setSelectedPlant(null); };

  const PAGE_TITLES = {
    '대시보드':'통합 모니터링 대시보드',
    '데이터 연동':'데이터 연동 관리',
    '발전소 분석':'발전소 상세 분석',
    '사용자 관리':'사용자 및 권한 관리',
    '설정':'시스템 설정',
  };

  const NAV_ITEMS = [
    {section:'모니터링',items:[
      {id:'대시보드',icon:'⊞',label:'대시보드',badge:null},
      {id:'발전소 분석',icon:'📊',label:'발전소 분석',badge:null},
    ]},
    {section:'데이터 관리',items:[
      {id:'데이터 연동',icon:'🔗',label:'데이터 연동',badge:'3'},
    ]},
    {section:'운영',items:[
      {id:'사용자 관리',icon:'👥',label:'사용자 관리',badge:null},
      {id:'설정',icon:'⚙',label:'설정',badge:null},
    ]},
  ];

  if(loading) return (
    <div style={{display:'flex',width:'100%',height:'100vh',background:'#060E1D',alignItems:'center',justifyContent:'center',flexDirection:'column',gap:20}}>
      <div style={{fontSize:28,fontWeight:800,color:'#00C8FF',letterSpacing:'-0.03em'}}>☀ 솔라허브</div>
      <div style={{width:200,height:3,background:'rgba(0,200,255,0.15)',borderRadius:2,overflow:'hidden'}}>
        <div style={{height:'100%',background:'linear-gradient(90deg,#00C8FF,#00E5A0)',width:'60%',borderRadius:2,animation:'barGrow 1.2s ease both','--target-width':'60%'}} />
      </div>
      <div style={{fontSize:13,color:'#7AA8CC'}}>발전소 데이터를 불러오는 중...</div>

    switch(page) {
      case '대시보드': return <DashboardPage onPlantClick={(p)=>{setSelectedPlant(p);navigate('발전소 분석')}} addToast={addToast} />;
      case '데이터 연동': return <IntegrationPage addToast={addToast} />;
      case '발전소 분석': return <PlantDetailPage plant={selectedPlant} addToast={addToast} />;
      case '사용자 관리': return <UserMgmtPage addToast={addToast} />;
      case '설정': return (
        <div className="page-animation">
          <div style={{display:'flex',flexDirection:'column',gap:12}}>
            {['알림 설정','수집 주기 기본값','보안 설정','API 연동 설정'].map((s,i)=>(
              <div key={s} className="collapse-section" style={{animation:`slideUp 300ms ease ${i*60}ms both`}}>
                <div className="collapse-header" onClick={()=>addToast(`${s} 패널을 열었습니다`,'⚙')}>
                  <span style={{fontSize:13,fontWeight:600,color:'#E8F4FF'}}>{s}</span>
                  <span style={{color:'#7AA8CC'}}>›</span>
                </div>
              </div>
            ))}
          </div>
        </div>
      );
      default: return null;
    }
  };

  return (
    <div style={{display:'flex',width:'100%',height:'100vh',overflow:'hidden'}}>
      {/* 사이드바 */}
      <aside className="sidebar">
        <div className="sidebar-logo">
          <div className="brand">☀ 솔라허브</div>
          <div className="subtitle">Solar Monitoring Platform</div>
        </div>

        {NAV_ITEMS.map(sec=>(
          <div key={sec.section}>
            <div className="nav-section">{sec.section}</div>
            {sec.items.map(item=>(
              <div key={item.id} className={`nav-item ${page===item.id?'active':''}`} onClick={()=>navigate(item.id)} title={item.label}>
                <span className="nav-icon">{item.icon}</span>
                <span>{item.label}</span>
                {item.badge && <span className="nav-badge">{item.badge}</span>}
              </div>
            ))}
          </div>
        ))}

        <div style={{padding:'8px 12px 4px',marginTop:8}}>
          <div style={{fontSize:11,color:'#7AA8CC',padding:'8px 0 6px',textTransform:'uppercase',letterSpacing:'0.08em'}}>발전소 현황</div>
          {PLANTS.slice(0,4).map(p=>(
            <div key={p.id} style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'5px 4px',fontSize:11,color:'#7AA8CC',cursor:'pointer',borderRadius:6,transition:'background 150ms'}}
              onClick={()=>{setSelectedPlant(p);navigate('발전소 분석')}} title={p.name}>
              <div style={{display:'flex',alignItems:'center',gap:6}}>
                <span className="status-dot" style={{background:p.status==='normal'?'#00E5A0':p.status==='alert'?'#FF4757':'#FFB800',animation:p.status==='normal'?'neonPulse 2s infinite':'none'}} />
                <span style={{maxWidth:120,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{p.name}</span>
              </div>
              <span style={{color:'#00C8FF',fontWeight:600,fontSize:10}}>{p.efficiency}%</span>
            </div>
          ))}
        </div>

        <div className="sidebar-footer">
          <div className="user-card">
            <div className="user-avatar">김</div>
            <div>
              <div className="user-name">김민준</div>
              <div className="user-role">슈퍼어드민</div>
            </div>
          </div>
        </div>
      </aside>

      {/* 메인 */}
      <div style={{flex:1,display:'flex',flexDirection:'column',overflow:'hidden'}}>
        <div className="topbar">
          <div>
            <span className="topbar-title">{PAGE_TITLES[page]||page}</span>
            <span className="topbar-breadcrumb">/ {page}</span>
          </div>
          <div className="topbar-actions">
            <div style={{fontSize:12,color:'#7AA8CC',background:'rgba(0,229,160,0.08)',border:'1px solid rgba(0,229,160,0.2)',borderRadius:999,padding:'4px 10px',display:'flex',alignItems:'center',gap:4}}>
              <span className="status-dot dot-green" style={{animation:'neonPulse 2s infinite'}} />
              <span style={{color:'#00E5A0',fontSize:11,fontWeight:600}}>4/6 정상</span>
            </div>
            <button className="icon-btn has-notif" onClick={()=>addToast('경보 {ALERTS.length}건 — 세종 스마트팜, 아산 공단','🔔')}>🔔</button>
            <button className="icon-btn" onClick={()=>addToast('새로고침 완료','🔄')}>↻</button>
            <div className="user-avatar" style={{width:32,height:32,cursor:'pointer'}} onClick={()=>addToast('프로필 설정을 엽니다','👤')}>김</div>
          </div>
        </div>
        <div className="content">
          <div key={pageKey} style={{animation:'fadeIn 300ms ease'}}>
            {renderPage()}
          </div>
        </div>
      </div>

      {/* 토스트 */}
      <div className="toast-wrap">
        {toasts.map(t=><Toast key={t.id} message={t.msg} icon={t.icon} onClose={()=>removeToast(t.id)} />)}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
