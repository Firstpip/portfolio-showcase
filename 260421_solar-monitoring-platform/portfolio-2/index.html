// ─── 유틸 컴포넌트 ───
function CountUp({end, suffix='', prefix='', duration=1200}) {
  const [val, setVal] = useState(0);
  useEffect(() => {
    let s=0; const step = end/(duration/16);
    const t = setInterval(()=>{ s+=step; if(s>=end){setVal(end);clearInterval(t);}else setVal(Math.floor(s)); },16);
    return()=>clearInterval(t);
  },[end]);
  return <span style={{animation:'countUp 400ms ease'}}>{prefix}{val.toLocaleString()}{suffix}</span>;
}

function Toast({message, icon='✅', onClose}) {
  useEffect(()=>{ const t=setTimeout(onClose,3000); return()=>clearTimeout(t); },[]);
  return <div className="toast"><span className="toast-icon">{icon}</span>{message}</div>;
}

function GaugeCircle({value, max=100}) {
  const r = 45, circ = 2*Math.PI*r;
  const offset = circ - (value/max)*circ;
  return (
    <div className="self-rate-gauge">
      <div className="gauge-ring" style={{width:110,height:110}}>
        <svg width="110" height="110" viewBox="0 0 110 110">
          <circle cx="55" cy="55" r={r} fill="none" stroke="#EBF5F0" strokeWidth="10" />
          <circle cx="55" cy="55" r={r} fill="none" stroke="#00A878" strokeWidth="10"
            strokeDasharray={circ} strokeDashoffset={offset} strokeLinecap="round"
            style={{transition:'stroke-dashoffset 1000ms ease'}} />
        </svg>
        <div className="gauge-val"><CountUp end={value} suffix="%" /></div>
      </div>
      <div style={{fontSize:11,color:'#4D7A65',marginTop:4}}>자급률</div>
    </div>
  );
}

// ─── EMS 스케줄 탭 ───
function EmsSchedulePage({addToast}) {
  const [schedule, setSchedule] = useState(EMS_SCHEDULE);
  const [selfRate, setSelfRate] = useState(87);
  const [dragging, setDragging] = useState(null);
  const [showExtend, setShowExtend] = useState(false);

  const toggleSlot = (hour) => {
    const chargeIdx = schedule.charge.indexOf(hour);
    const dischargeIdx = schedule.discharge.indexOf(hour);
    let newSchedule;
    if(chargeIdx>=0) {
      newSchedule = {...schedule, charge: schedule.charge.filter(h=>h!==hour)};
    } else if(dischargeIdx>=0) {
      newSchedule = {...schedule, discharge: schedule.discharge.filter(h=>h!==hour), charge:[...schedule.charge,hour]};
    } else {
      newSchedule = {...schedule, discharge:[...schedule.discharge,hour]};
    }
    setSchedule(newSchedule);
    const newRate = Math.min(100, Math.max(60, selfRate + (Math.random()>0.5?2:-1)));
    setSelfRate(Math.round(newRate));
    addToast('스케줄 변경 — 예상 자급률이 재계산되었습니다','⚡');
  };

  const getSlotType = (hour) => {
    if(schedule.charge.includes(hour)) return 'charge';
    if(schedule.discharge.includes(hour)) return 'discharge';
    return 'idle';
  };

  const SLOT_LABELS = {charge:'충전',discharge:'방전',idle:'대기'};
  const FORECAST = [
    {h:'06',pred:200,actual:180},{h:'07',pred:850,actual:820},{h:'08',pred:2500,actual:2400},
    {h:'09',pred:5400,actual:5200},{h:'10',pred:8000,actual:7800},{h:'11',pred:9600,actual:9400},
    {h:'12',pred:10500,actual:10200},{h:'13',pred:10000,actual:null},{h:'14',pred:9100,actual:null},
    {h:'15',pred:7400,actual:null},{h:'16',pred:5200,actual:null},{h:'17',pred:2900,actual:null},
    {h:'18',pred:950,actual:null},{h:'19',pred:210,actual:null},{h:'20',pred:0,actual:null},
  ];

  return (
    <div className="page-animation">
      <div style={{display:'flex',gap:16,marginBottom:16}}>
        {/* 간트 스케줄 */}
        <div className="white-card" style={{flex:2,cursor:'default'}}>
          <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:12}}>
            <div>
              <div className="section-title">🔋 ESS 충방전 스케줄 (Gantt)</div>
              <div className="section-sub">슬롯 클릭으로 충전/방전/대기 순환 전환 · 변경 시 자급률 실시간 재계산</div>
            </div>
            <button className="btn btn-primary" style={{fontSize:11}} onClick={()=>addToast('스케줄이 Bull Queue에 동기화되었습니다','⚙')}>저장 및 적용</button>
          </div>

          {/* 간트 차트 */}
          <div style={{overflowX:'auto'}}>
            <div style={{minWidth:560}}>
              <div style={{display:'flex',gap:2,marginBottom:4,paddingLeft:88}}>
                {HOURS.map(h=>(
                  <div key={h} style={{flex:1,textAlign:'center',fontSize:10,color:'#9DBAAE',fontWeight:600}}>{h}시</div>
                ))}
              </div>
              {['ESS 배터리','발전소 A+B'].map((row,ri)=>(
                <div key={row} className="gantt-row">
                  <div className="gantt-label">{row}</div>
                  <div className="gantt-track">
                    {HOURS.map((h,hi)=>{
                      const hr = parseInt(h);
                      const slotType = ri===0 ? getSlotType(hr) : (hr>=7&&hr<=17?'charge':'idle');
                      return (
                        <div key={h} className={`schedule-slot ${slotType}`}
                          onClick={()=>ri===0&&toggleSlot(hr)}
                          style={{cursor:ri===0?'pointer':'default',fontSize:9,justifyContent:'center'}}>
                          {SLOT_LABELS[slotType][0]}
                        </div>
                      );
                    })}
                  </div>
                </div>
              ))}
            </div>
          </div>

          <div style={{display:'flex',gap:12,marginTop:12,paddingLeft:88}}>
            {[{type:'charge',label:'충전',color:'rgba(0,168,120,0.15)',border:'rgba(0,168,120,0.3)',text:'#007D5A'},
              {type:'discharge',label:'방전',color:'rgba(255,150,50,0.15)',border:'rgba(255,150,50,0.3)',text:'#C05000'},
              {type:'idle',label:'대기',color:'#F5F9F7',border:'#C8DDD8',text:'#9DBAAE'}].map(l=>(
              <div key={l.type} style={{display:'flex',alignItems:'center',gap:6}}>
                <div style={{width:16,height:14,borderRadius:3,background:l.color,border:`1.5px solid ${l.border}`}} />

              </div>
            ))}
          </div>
        </div>

        {/* 자급률 게이지 */}

          <div style={{fontSize:13,fontWeight:700,color:'#1A2E26',textAlign:'center'}}>예상 자급률<br/><span style={{fontSize:11,fontWeight:400,color:'#4D7A65'}}>스케줄 변경 시 자동 재계산</span></div>
          <GaugeCircle value={selfRate} />

            {[
              {label:'충전 시간',val:`${schedule.charge.length}시간`},

              </div>

        </div>
      </div>

      {/* 예측 발전량 */}
      <div className="white-card" style={{marginBottom:16,cursor:'default'}}>
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:12}}>
          <div>
            <div className="section-title">🌤️ 예측 발전량 vs 실측 (기상청 API 연동)</div>
            <div className="section-sub">오늘 시간별 예측/실측 발전량 (kW)</div>
          </div>
          <button className="btn btn-ghost" style={{fontSize:11}} onClick={()=>addToast('기상청 API 데이터를 갱신합니다','🌤️')}>기상 데이터 갱신</button>
        </div>
        <div style={{height:180}}>
          <ResponsiveContainer width="100%" height="100%">
            <ComposedChart data={FORECAST}>
              <CartesianGrid strokeDasharray="3 3" stroke="#F0FAF5" />
              <XAxis dataKey="h" tick={{fill:'#4D7A65',fontSize:11}} axisLine={false} tickLine={false} tickFormatter={h=>`${h}시`} />
              <YAxis tick={{fill:'#4D7A65',fontSize:11}} axisLine={false} tickLine={false} tickFormatter={v=>`${(v/1000).toFixed(1)}k`} />
              <Tooltip contentStyle={{background:'#fff',border:'1px solid #E2EDE9',borderRadius:8}} />
              <Area type="monotone" dataKey="pred" stroke="#00A878" strokeDasharray="5 3" fill="rgba(0,168,120,0.05)" name="예측" strokeWidth={2} />

            <div style={{fontSize:14,fontWeight:800,color:'#00A878',marginBottom:2}}>EMS 실시간 제어 확장 (향후 고도화)</div>

              {step:'2단계',title:'실시간 ESS 제어',desc:'충방전 명령을 Bull Queue를 통해 ESS 컨트롤러에 전송, 실행 결과 피드백 수신'},
              {step:'3단계',title:'VPP 통합',desc:'가상발전소 운영자 플랫폼과 API 연동 — 거래 신호 수신 시 자동 방전 스케줄 조정'},

  },[]);
  const removeToast = useCallback((id)=>setToasts(t=>t.filter(x=>x.id!==id)),[]);

  const switchTab = (t) => { setTab(t); setTabKey(k=>k+1); };
  const meta = HERO_META[tab];

  if(loading) return (
    <div style={{width:'100%',height:'100vh',background:'#F5F9F7',display:'flex',alignItems:'center',justifyContent:'center',flexDirection:'column',gap:20}}>
      <div style={{fontSize:28,fontWeight:800,color:'#00A878',letterSpacing:'-0.03em',display:'flex',alignItems:'center',gap:8}}>⚡ 에너지맵</div>
      <div style={{width:200,height:4,background:'#E8F5EF',borderRadius:2,overflow:'hidden'}}>
        <div style={{height:'100%',background:'linear-gradient(90deg,#00A878,#3BDE9A)',width:'65%',borderRadius:2,animation:'barGrow 1.2s ease both','--target-width':'65%'}} />
      </div>
      <div style={{fontSize:13,color:'#4D7A65'}}>에너지 데이터를 불러오는 중...</div>
    </div>
  );

  const renderTab = () => {
    switch(tab) {
      case '에너지 수지': return <EnergyBalancePage addToast={addToast} />;
      case '관리자 포털': return <AdminOpsPage addToast={addToast} />;
      case '발전소 비교': return <PortfolioComparePage addToast={addToast} />;
      case 'EMS 스케줄': return <EmsSchedulePage addToast={addToast} />;
      default: return null;
    }
  };

  return (
    <div style={{display:'flex',flexDirection:'column',width:'100%',minHeight:'100vh',background:C.bg}}>
      {/* 상단 네비 */}
      <header className="topnav">
        <div className="nav-logo" onClick={()=>switchTab('에너지 수지')}>
          <span>⚡</span>
          <span>에너지맵</span>
          <span className="nav-logo-sub">Smart Energy Platform</span>
        </div>
        {TABS.map(t=>(
          <button key={t.id} className={`nav-tab ${tab===t.id?'active':''}`} onClick={()=>switchTab(t.id)} title={t.label}>
            {t.label}
          </button>
        ))}
        <div className="nav-right">
          <button className="nav-icon-btn notif" onClick={()=>addToast('연동 경보 2건이 있습니다','⚠️')}>🔔</button>
          <button className="nav-icon-btn" onClick={()=>addToast('데이터를 새로고침합니다','🔄')}>↻</button>
          <div className="nav-avatar" onClick={()=>addToast('프로필 설정','👤')}>김</div>
        </div>
      </header>

      {/* 히어로 배너 */}
      <div className="page-hero" style={{background:meta.grad}}>
        <div className="hero-bg-circle" style={{width:200,height:200,top:-60,right:100}} />
        <div className="hero-bg-circle" style={{width:120,height:120,top:20,right:320}} />
        <div className="hero-title">{meta.title}</div>
        <div className="hero-sub">{meta.sub}</div>
        <div className="hero-kpis">
          {meta.kpis.map((k,i)=>(
            <div key={k.label} className="hero-kpi" style={{animation:`slideUp 400ms ease ${i*100}ms both`}}>
              <div className="hero-kpi-label">{k.label}</div>
              <div className="hero-kpi-val">{k.val}<span className="hero-kpi-unit">{k.unit}</span></div>
            </div>
          ))}
        </div>
      </div>

      {/* 페이지 콘텐츠 */}
      <main className="page-content">
        <div key={tabKey} style={{animation:'fadeIn 300ms ease'}}>
          {renderTab()}
        </div>
      </main>

      {/* 토스트 */}
      <div className="toast-wrap">
        {toasts.map(t=><Toast key={t.id} message={t.msg} icon={t.icon} onClose={()=>removeToast(t.id)} />)}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
