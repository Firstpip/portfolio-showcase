function CountUp({ end, duration=1200, suffix='' }) {
  const [val, setVal] = React.useState(0);
  React.useEffect(() => {
    let start = 0;
    const step = end / (duration / 16);
    const timer = setInterval(() => {
      start += step;
      if (start >= end) { setVal(end); clearInterval(timer); }
      else setVal(Math.floor(start));
    }, 16);
    return () => clearInterval(timer);
  }, [end]);
  return <span style={{ animation:'countUp 400ms ease' }}>{val.toLocaleString()}{suffix}</span>;
}

function Toast({ message, type='success', onClose }) {
  React.useEffect(() => { const t = setTimeout(onClose, 3000); return () => clearTimeout(t); }, []);
  const colors = { success: C.success, error: C.danger, info: C.info };
  return (
    <div style={{
      position:'fixed', bottom:24, right:24, zIndex:9999,
      background: colors[type]||C.success, color:'#fff',
      padding:'12px 20px', borderRadius:10,
      animation:'slideUp 300ms ease',
      boxShadow:'0 4px 20px rgba(0,0,0,0.2)',
      display:'flex', alignItems:'center', gap:10, fontSize:14, fontWeight:600,
    }}>
      {type==='success'?'✓':type==='error'?'✕':'ℹ'} {message}
    </div>
  );
}

function ChatPage({ toast }) {

    if (!input.trim()||!room) return;
    const newMsg = { id:Date.now(), from:'me', text:input, time:new Date().toLocaleTimeString('ko',{hour:'2-digit',minute:'2-digit'}), mine:true };
    setMsgs(m=>({...m,[room.id]:[...(m[room.id]||[]),newMsg]}));

      setMsgs(m=>({...m,[room.id]:[...m[room.id],reply]}));

          </div>
        </div>
      ):(
        <div style={{flex:1,display:'flex',alignItems:'center',justifyContent:'center',flexDirection:'column',gap:16,color:C.textLight}}>
          <span style={{fontSize:56}}>💬</span>
          <div style={{fontSize:18,fontWeight:700,color:C.textSecondary}}>대화를 선택해주세요</div>
          <div style={{fontSize:14}}>왼쪽 목록에서 채팅방을 클릭하면 대화를 시작할 수 있습니다</div>
        </div>
      )}
    </div>
  );
}

function PostWritePage({ toast }) {
  const [form, setForm] = React.useState(LISTING_FORM_INIT);
  const [files, setFiles] = React.useState([]);
  const [dragging, setDragging] = React.useState(false);
  const [submitted, setSubmitted] = React.useState(false);
  const set = (k,v) => setForm(f=>({...f,[k]:v}));
  if (submitted) return (
    <div style={{display:'flex',alignItems:'center',justifyContent:'center',height:'60vh',flexDirection:'column',gap:20,animation:'fadeInScale 400ms ease'}}>
      <div style={{width:80,height:80,borderRadius:'50%',background:`${C.success}22`,display:'flex',alignItems:'center',justifyContent:'center',fontSize:40}}>✅</div>
      <div style={{fontSize:24,fontWeight:800,color:C.textPrimary}}>매물 등록 완료!</div>
      <div style={{fontSize:15,color:C.textSecondary}}>'{form.title||'회원권 매물'}'이(가) 정상 등록되었습니다.</div>
      <button onClick={()=>setSubmitted(false)} style={{padding:'12px 28px',borderRadius:12,cursor:'pointer',fontSize:15,fontWeight:700,background:C.primary,color:'#fff',border:'none'}}>새 매물 등록</button>
    </div>
  );
  return (
    <div style={{animation:'fadeIn 300ms ease'}}>
      <div style={{background:`linear-gradient(135deg, ${C.primary}, ${C.primaryLight})`,padding:'28px 32px',color:'#fff'}}>
        <div style={{fontSize:24,fontWeight:800,marginBottom:4}}>✏️ 매물 등록</div>
        <div style={{fontSize:14,opacity:0.85}}>유휴 회원권을 손쉽게 양도해 보세요</div>
      </div>
      <div style={{maxWidth:720,margin:'32px auto',padding:'0 32px',display:'flex',flexDirection:'column',gap:24}}>
        <div style={{background:C.surface,borderRadius:16,padding:24,boxShadow:'0 2px 12px rgba(0,0,0,0.06)'}}>
          <div style={{fontSize:16,fontWeight:800,color:C.textPrimary,marginBottom:16}}>📷 사진 추가</div>
          <div
            onDragOver={e=>{e.preventDefault();setDragging(true);}}
            onDragLeave={()=>setDragging(false)}
            onDrop={e=>{e.preventDefault();setDragging(false);setFiles(['헬스장1.jpg','헬스장2.jpg','헬스장3.jpg']);}}
            onClick={()=>setFiles(['헬스장1.jpg','헬스장2.jpg','헬스장3.jpg'])}
            style={{
              border:`2px dashed ${dragging?C.primary:C.border}`,
              borderRadius:14,padding:32,textAlign:'center',
              background:dragging?`${C.primary}08`:C.bg,
              cursor:'pointer',transition:'all 200ms',
            }}
          >
            {files.length>0?(
              <div>
                <div style={{display:'flex',gap:10,justifyContent:'center',marginBottom:12}}>
                  {files.map((f,i)=>(
                    <div key={i} style={{width:72,height:72,borderRadius:10,background:`linear-gradient(135deg,${C.primary}33,${C.accent}33)`,display:'flex',alignItems:'center',justifyContent:'center',fontSize:24}}>🏋️</div>
                  ))}
                </div>
                <div style={{fontSize:13,color:C.success,fontWeight:700}}>{files.length}장 업로드 완료</div>
                <div style={{fontSize:12,color:C.textLight,marginTop:4}}>클릭하여 추가 업로드 (최대 10장)</div>
              </div>
            ):(
              <div>
                <div style={{fontSize:40,marginBottom:12}}>📷</div>
                <div style={{fontSize:15,fontWeight:700,color:C.textPrimary}}>사진 추가 (최대 10장)</div>
                <div style={{fontSize:13,color:C.textSecondary,marginTop:4}}>드래그하거나 클릭해서 업로드</div>
              </div>
            )}
          </div>
        </div>
        <div style={{background:C.surface,borderRadius:16,padding:24,boxShadow:'0 2px 12px rgba(0,0,0,0.06)'}}>
          <div style={{fontSize:16,fontWeight:800,color:C.textPrimary,marginBottom:16}}>📝 기본 정보</div>
          <div style={{display:'flex',flexDirection:'column',gap:16}}>
            {[
              {label:'제목',key:'title',placeholder:'예) 헬스장 3개월 이용권 양도',type:'text'},
              {label:'가격 (원)',key:'price',placeholder:'예) 120000',type:'number'},
              {label:'스포츠센터명',key:'gym',placeholder:'예) 스포애니 역삼점',type:'text'},
            ].map(f=>(
              <div key={f.key}>
                <div style={{fontSize:13,fontWeight:700,color:C.textPrimary,marginBottom:8}}>{f.label}</div>
                <input type={f.type} placeholder={f.placeholder} value={form[f.key]} onChange={e=>set(f.key,e.target.value)}
                  style={{width:'100%',padding:'11px 16px',borderRadius:12,border:`1.5px solid ${C.border}`,fontSize:14,outline:'none',fontFamily:'Pretendard',transition:'border-color 150ms'}}
                  onFocus={e=>e.target.style.borderColor=C.primary}
                  onBlur={e=>e.target.style.borderColor=C.border}
                />
              </div>
            ))}
            <div>
              <div style={{fontSize:13,fontWeight:700,color:C.textPrimary,marginBottom:8}}>스포츠 종목</div>
              <div style={{display:'flex',flexWrap:'wrap',gap:8}}>
                {CATEGORIES.slice(1).map(c=>(
                  <button key={c} onClick={()=>set('category',c)} style={{
                    padding:'8px 18px',borderRadius:22,cursor:'pointer',fontSize:13,fontWeight:600,
                    background:form.category===c?C.primary:'#fff',
                    color:form.category===c?'#fff':C.textSecondary,
                    border:`1.5px solid ${form.category===c?C.primary:C.border}`,
                    transition:'all 150ms',
                  }}>{c}</button>
                ))}
              </div>
            </div>
            <div>
              <div style={{fontSize:13,fontWeight:700,color:C.textPrimary,marginBottom:8}}>판매 상태</div>
              <div style={{display:'flex',gap:8}}>
                {['판매중','예약중','판매완료'].map(s=>(
                  <button key={s} onClick={()=>set('status',s)} style={{
                    padding:'8px 18px',borderRadius:22,cursor:'pointer',fontSize:13,fontWeight:600,
                    background:form.status===s?C.secondary:'#fff',
                    color:form.status===s?'#fff':C.textSecondary,
                    border:`1.5px solid ${form.status===s?C.secondary:C.border}`,
                    transition:'all 150ms',
                  }}>{s}</button>
                ))}
              </div>
            </div>
          </div>
        </div>
        <div style={{background:C.surface,borderRadius:16,padding:24,boxShadow:'0 2px 12px rgba(0,0,0,0.06)'}}>
          <div style={{fontSize:16,fontWeight:800,color:C.textPrimary,marginBottom:16}}>📍 위치 정보</div>
          <div style={{background:'linear-gradient(135deg,#E8F4FD,#D1E9FF)',borderRadius:14,height:180,display:'flex',alignItems:'center',justifyContent:'center',flexDirection:'column',gap:10,cursor:'pointer',marginBottom:12}}>
            <span style={{fontSize:40}}>🗺️</span>
            <div style={{fontSize:14,color:C.info,fontWeight:700}}>지도에서 위치 선택</div>
            <div style={{fontSize:12,color:C.textSecondary}}>Kakao Maps API 연동 · 상호명 검색 및 핀 지정</div>
          </div>
          <div>
            <div style={{fontSize:13,fontWeight:700,color:C.textPrimary,marginBottom:8}}>매물 설명</div>
            <textarea placeholder="양도 사유, 이용 가능 기간, 특이사항 등을 자세히 작성해 주세요." value={form.desc} onChange={e=>set('desc',e.target.value)} rows={4}
              style={{width:'100%',padding:'11px 16px',borderRadius:12,border:`1.5px solid ${C.border}`,fontSize:14,outline:'none',resize:'none',fontFamily:'Pretendard'}} />
          </div>
        </div>
        <button onClick={()=>{if(!form.title||!form.price){toast('제목과 가격을 입력해주세요.','error');return;}setSubmitted(true);toast('매물이 등록되었습니다! 🎉');}} style={{
          padding:'16px',borderRadius:14,cursor:'pointer',fontSize:16,fontWeight:800,
          background:`linear-gradient(135deg,${C.primary},${C.primaryLight})`,
          color:'#fff',border:'none',
          boxShadow:`0 4px 16px ${C.primary}40`,
          transition:'all 200ms',
        }}>
          매물 등록하기
        </button>
      </div>
    </div>
  );
}

function App() {
  const [tab, setTab] = React.useState('매물 목록');
  const [drawer, setDrawer] = React.useState(null);
  const [toast, setToast] = React.useState(null);
  const [listings, setListings] = React.useState(LISTINGS);
  const [loading, setLoading] = React.useState(true);
  const showToast = (msg, type='success') => { setToast({msg,type,id:Date.now()}); };
  const TABS = ['매물 목록', '지도 검색', '채팅', '매물 등록'];
  const TAB_TITLES = {
    '매물 목록': '매물 목록 및 탐색',
    '지도 검색': '위치 기반 스포츠센터 검색',
    '채팅': '실시간 1:1 채팅',
    '매물 등록': '매물 등록 및 관리',
  };
  React.useEffect(()=>{ setTimeout(()=>setLoading(false),1500); },[]);
  if (loading) return (
    <div style={{width:'100%',minHeight:'100vh',background:C.bg,display:'flex',flexDirection:'column'}}>
      <div style={{height:56,background:C.surface,borderBottom:`1px solid ${C.border}`}} />
      <div style={{padding:'0 32px',marginTop:20}}>
        {[...Array(3)].map((_,i)=>(
          <div key={i} style={{height:200,borderRadius:16,background:'linear-gradient(90deg,#F1F5F9 25%,#E2E8F0 50%,#F1F5F9 75%)',backgroundSize:'200% 100%',animation:'shimmer 1.5s infinite',marginBottom:16}} />
        ))}
      </div>
    </div>
  );
  return (
    <div style={{width:'100%',minHeight:'100vh',background:C.bg,display:'flex',flexDirection:'column'}}>
      <header style={{
        position:'sticky',top:0,zIndex:100,
        background:C.surface,borderBottom:`1px solid ${C.border}`,
        display:'flex',alignItems:'center',height:56,padding:'0 24px',gap:4,
      }}>
        <div style={{display:'flex',alignItems:'center',gap:10,marginRight:20}}>
          <div style={{width:32,height:32,borderRadius:8,background:`linear-gradient(135deg,${C.primary},${C.accent})`,display:'flex',alignItems:'center',justifyContent:'center',fontSize:18}}>🏅</div>
          <span style={{fontSize:16,fontWeight:800,color:C.textPrimary}}>스포팟</span>
        </div>
        {TABS.map(t=>(
          <button key={t}
            data-feature={t==='지도 검색'?'위치 기반 스포츠센터 검색':t==='매물 목록'?'매물 목록 및 탐색':t==='매물 등록'?'매물 등록 및 관리':'실시간 1:1 채팅'}
            onClick={()=>setTab(t)} style={{
            padding:'6px 16px',borderRadius:8,cursor:'pointer',
            fontSize:14,fontWeight:tab===t?700:500,
            background:tab===t?`${C.primary}15`:'transparent',
            color:tab===t?C.primary:C.textSecondary,
            border:'none',transition:'all 150ms',whiteSpace:'nowrap',
          }}>{t}</button>
        ))}
        <div style={{flex:1}} />
        <div style={{display:'flex',alignItems:'center',gap:10}}>
          <button style={{background:'none',border:`1px solid ${C.border}`,borderRadius:8,padding:'6px 12px',cursor:'pointer',fontSize:13,color:C.textSecondary}}>🔍</button>
          <button style={{background:'none',border:`1px solid ${C.border}`,borderRadius:8,padding:'6px 12px',cursor:'pointer',fontSize:13,color:C.textSecondary}}>🔔</button>
          <div style={{width:32,height:32,borderRadius:'50%',background:`linear-gradient(135deg,${C.primary},${C.accent})`,display:'flex',alignItems:'center',justifyContent:'center',color:'#fff',fontWeight:700,fontSize:13,cursor:'pointer'}}>김</div>
        </div>
      </header>
      <main style={{flex:1,animation:'fadeIn 300ms ease'}}>
        {tab==='매물 목록' && <ListingsPage listings={listings} setListings={setListings} setDrawer={setDrawer} toast={showToast} />}
        {tab==='지도 검색' && <MapPage toast={showToast} />}
        {tab==='채팅' && <ChatPage toast={showToast} />}
        {tab==='매물 등록' && <PostWritePage toast={showToast} />}
      </main>
      {drawer && <Drawer item={listings.find(l=>l.id===drawer.id)||drawer} onClose={()=>setDrawer(null)} onLike={(id)=>setListings(ls=>ls.map(l=>l.id===id?{...l,liked:!l.liked}:l))} onChat={()=>{}} toast={showToast} />}
      {toast && <Toast key={toast.id} message={toast.msg} type={toast.type} onClose={()=>setToast(null)} />}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
