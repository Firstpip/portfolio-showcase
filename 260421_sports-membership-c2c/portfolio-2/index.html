function CountUp({ end, duration=1200, suffix='' }) {
  const [val, setVal] = React.useState(0);
  React.useEffect(() => {
    let start = 0;
    const step = end / (duration / 16);
    const timer = setInterval(() => {
      start += step;
      if (start >= end) { setVal(end); clearInterval(timer); }
      else setVal(Math.floor(start));
    }, 16);
    return () => clearInterval(timer);
  }, [end]);
  return <span style={{ animation:'countUp 400ms ease' }}>{val.toLocaleString()}{suffix}</span>;
}

function Toast({ message, type='success', onClose }) {

  const icons = { success:'✓', error:'✕', info:'ℹ', warning:'⚠' };
  return (
    <div style={{ position:'fixed', bottom:24, right:24, zIndex:9999,
      background:colors[type]||C.success, color:'#fff',
      padding:'12px 20px', borderRadius:10, animation:'slideUp 300ms ease',

      fontSize:14, fontWeight:600, }}>
      {icons[type]} {message}
    </div>
  );
}

  return (

    onMouseEnter={e=>{e.currentTarget.style.transform='translateY(-2px)';e.currentTarget.style.boxShadow='0 4px 16px rgba(0,0,0,0.1)';}}

  );
}

                <td style={{padding:'12px 16px',fontSize:12,color:C.textSecondary}}>{s.date}</td>
                <td style={{padding:'12px 16px'}}>
                  <span style={{background:`${status_color[s.status]}18`,color:status_color[s.status],padding:'3px 10px',borderRadius:8,fontSize:12,fontWeight:700}}>{s.status}</span>
                </td>
                <td style={{padding:'12px 16px'}} onClick={e=>e.stopPropagation()}>
                  {s.status==='정산대기'&&<button onClick={()=>{setSettlements(ss=>ss.map(x=>x.id===s.id?{...x,status:'정산완료'}:x));toast('정산 처리 완료!');}} style={{padding:'4px 10px',borderRadius:6,cursor:'pointer',fontSize:12,fontWeight:600,background:`${C.success}18`,color:C.success,border:'none'}}>정산처리</button>}
                  {s.status==='이의신청'&&<button onClick={()=>setModal({type:'dispute',settlement:s})} style={{padding:'4px 10px',borderRadius:6,cursor:'pointer',fontSize:12,fontWeight:600,background:`${C.danger}18`,color:C.danger,border:'none'}}>처리</button>}
                </td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>
      {modal?.type==='policy' && (
        <Modal title="수수료 정책 설정" onClose={()=>setModal(null)} width={580}>
          <div style={{marginBottom:16,padding:'12px 16px',background:`${C.info}10`,borderRadius:10,fontSize:13,color:C.info}}>
            수수료 정책은 즉시 적용됩니다. 카테고리별·금액 구간별로 개별 설정이 가능합니다.
          </div>
          {policies.map((p,i)=>(
            <div key={p.id} style={{display:'flex',alignItems:'center',gap:12,padding:'14px 16px',background:C.bg,borderRadius:10,marginBottom:10}}>
              <div style={{flex:1}}>
                <div style={{fontSize:13,fontWeight:700,color:C.textPrimary}}>{p.category} · {p.minAmount.toLocaleString()}원 ~ {p.maxAmount<9000000?p.maxAmount.toLocaleString()+'원':'무제한'}</div>
                <div style={{display:'flex',alignItems:'center',gap:8,marginTop:6}}>
                  <input type="number" defaultValue={p.rate} style={{width:60,padding:'5px 8px',borderRadius:6,border:`1px solid ${C.border}`,fontSize:14,fontFamily:'Pretendard'}} onChange={e=>setPolicies(ps=>ps.map(x=>x.id===p.id?{...x,rate:Number(e.target.value)}:x))} />
                  <span style={{fontSize:13,color:C.textSecondary}}>% 수수료</span>
                </div>
              </div>
              <div style={{display:'flex',gap:6,alignItems:'center'}}>
                <span style={{fontSize:12,color:p.active?C.success:C.textLight,fontWeight:600}}>{p.active?'활성':'비활성'}</span>
                <div onClick={()=>setPolicies(ps=>ps.map(x=>x.id===p.id?{...x,active:!x.active}:x))} style={{width:38,height:20,borderRadius:10,background:p.active?C.primary:C.border,cursor:'pointer',position:'relative',transition:'all 200ms'}}>
                  <div style={{position:'absolute',top:2,left:p.active?'calc(100% - 18px)':2,width:16,height:16,borderRadius:'50%',background:'#fff',transition:'all 200ms'}} />
                </div>
              </div>
            </div>
          ))}
          <button onClick={()=>{toast('수수료 정책이 저장됐습니다!');setModal(null);}} style={{width:'100%',padding:'12px',borderRadius:10,cursor:'pointer',fontSize:14,fontWeight:700,background:C.primary,color:'#fff',border:'none',marginTop:8}}>정책 저장</button>
        </Modal>
      )}
      {modal?.type==='dispute' && (
        <Modal title="이의신청 처리" onClose={()=>setModal(null)} width={480}>
          <div style={{padding:'14px 16px',background:`${C.warning}10`,borderRadius:10,marginBottom:16}}>
            <div style={{fontSize:14,fontWeight:700,color:C.textPrimary}}>{modal.settlement.seller} → {modal.settlement.buyer}</div>
            <div style={{fontSize:13,color:C.textSecondary,marginTop:4}}>{modal.settlement.listing} · {modal.settlement.amount.toLocaleString()}원</div>
          </div>
          <textarea rows={3} placeholder="처리 내용을 입력하세요..." style={{width:'100%',padding:'10px 14px',borderRadius:10,border:`1px solid ${C.border}`,fontSize:14,outline:'none',resize:'none',fontFamily:'Pretendard',marginBottom:16}} />
          <div style={{display:'flex',gap:10}}>
            <button onClick={()=>{setSettlements(ss=>ss.map(x=>x.id===modal.settlement.id?{...x,status:'정산완료'}:x));toast('이의신청 처리 완료!');setModal(null);}} style={{flex:1,padding:'12px',borderRadius:10,cursor:'pointer',fontSize:14,fontWeight:700,background:C.success,color:'#fff',border:'none'}}>정산 승인</button>
            <button onClick={()=>{setModal(null);toast('환불 처리됐습니다.','warning');}} style={{flex:1,padding:'12px',borderRadius:10,cursor:'pointer',fontSize:14,fontWeight:700,background:C.danger,color:'#fff',border:'none'}}>환불 처리</button>
          </div>
        </Modal>
      )}
    </div>
  );
}

function App() {
  const [route, setRoute] = React.useState('대시보드');
  const [toast, setToast] = React.useState(null);
  const [loading, setLoading] = React.useState(true);
  const showToast = (msg, type='success') => setToast({msg,type,id:Date.now()});
  const NAV = ['대시보드','사용자 관리','매물 모니터링','정산 관리'];
  React.useEffect(()=>{ setTimeout(()=>setLoading(false),1500); },[]);
  if (loading) return (
    <div style={{width:'100%',minHeight:'100vh',background:C.bg,display:'flex',flexDirection:'column'}}>
      <div style={{height:64,background:C.surface,borderBottom:`1px solid ${C.border}`}} />
      <div style={{padding:'28px 32px',maxWidth:1300,margin:'0 auto',width:'100%'}}>
        <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:16,marginBottom:24}}>
          {[...Array(4)].map((_,i)=>(
            <div key={i} style={{height:120,borderRadius:12,background:'linear-gradient(90deg,#F1F5F9 25%,#E2E8F0 50%,#F1F5F9 75%)',backgroundSize:'200% 100%',animation:'shimmer 1.5s infinite'}} />
          ))}
        </div>
        {[...Array(2)].map((_,i)=>(
          <div key={i} style={{height:260,borderRadius:12,background:'linear-gradient(90deg,#F1F5F9 25%,#E2E8F0 50%,#F1F5F9 75%)',backgroundSize:'200% 100%',animation:'shimmer 1.5s infinite',marginBottom:16}} />
        ))}
      </div>
    </div>
  );
  return (
    <div style={{width:'100%',minHeight:'100vh',background:C.bg,display:'flex',flexDirection:'column'}}>
      <header style={{
        position:'sticky',top:0,zIndex:100,
        background:C.surface,borderBottom:`1px solid ${C.border}`,
        display:'flex',alignItems:'center',height:64,padding:'0 32px',gap:4,
      }}>
        <div style={{display:'flex',alignItems:'center',gap:10,marginRight:24}}>
          <div style={{width:32,height:32,borderRadius:8,background:`linear-gradient(135deg,${C.primary},${C.primaryLight})`,display:'flex',alignItems:'center',justifyContent:'center',fontSize:16,color:'#fff',fontWeight:800}}>S</div>
          <span style={{fontSize:15,fontWeight:800,color:C.textPrimary}}>스포팟 운영 관리</span>
        </div>
        <nav style={{display:'flex',gap:2}}>
          {NAV.map(n=>(
            <button key={n} onClick={()=>setRoute(n)} style={{
              padding:'7px 18px',borderRadius:8,cursor:'pointer',
              fontSize:14,fontWeight:route===n?700:500,
              background:route===n?`${C.primary}12`:'transparent',
              color:route===n?C.primary:C.textSecondary,
              border:'none',transition:'all 150ms',whiteSpace:'nowrap',
            }}>{n}</button>
          ))}
        </nav>
        <div style={{flex:1}} />
        <div style={{display:'flex',alignItems:'center',gap:12}}>
          <div style={{background:`${C.danger}18`,color:C.danger,padding:'4px 10px',borderRadius:8,fontSize:12,fontWeight:700}}>🚨 신고 8건</div>
          <button style={{background:'none',border:`1px solid ${C.border}`,borderRadius:8,padding:'6px 12px',cursor:'pointer',fontSize:13,color:C.textSecondary}}>🔔</button>
          <div style={{display:'flex',alignItems:'center',gap:8,cursor:'pointer'}}>
            <div style={{width:32,height:32,borderRadius:'50%',background:`linear-gradient(135deg,${C.primary},${C.primaryLight})`,display:'flex',alignItems:'center',justifyContent:'center',color:'#fff',fontWeight:700,fontSize:13}}>관</div>
            <span style={{fontSize:13,fontWeight:600,color:C.textPrimary}}>관리자</span>
          </div>
        </div>
      </header>
      <main style={{flex:1,animation:'fadeIn 300ms ease'}}>
        {route==='대시보드' && <DashboardPage />}
        {route==='사용자 관리' && <UserManagePage toast={showToast} />}
        {route==='매물 모니터링' && <ListingMonitorPage toast={showToast} />}
        {route==='정산 관리' && <SettlementPage toast={showToast} />}
      </main>
      <footer style={{background:C.secondary,color:'rgba(255,255,255,0.6)',padding:'28px 32px',fontSize:13}}>
        <div style={{maxWidth:1300,margin:'0 auto',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
          <div>
            <div style={{color:'#fff',fontWeight:700,fontSize:14,marginBottom:6}}>스포팟 운영 관리 시스템</div>
            <div>스포츠 회원권 C2C 중개 플랫폼 내부 운영 도구 · React + Node.js + PostgreSQL + Redis</div>
          </div>
          <div style={{display:'flex',gap:24}}>
            {['운영 정책','시스템 로그','API 문서','도움말'].map(l=>(
              <span key={l} style={{cursor:'pointer',transition:'color 150ms'}} onMouseEnter={e=>e.target.style.color='#fff'} onMouseLeave={e=>e.target.style.color='rgba(255,255,255,0.6)'}>{l}</span>
            ))}
          </div>
        </div>
      </footer>
      {toast && <Toast key={toast.id} message={toast.msg} type={toast.type} onClose={()=>setToast(null)} />}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
