/* ── CountUp 훅 ── */
function useCountUp(target, duration = 1200) {
  const [value, setValue] = useState(0);
  useEffect(() => {
    let start = 0;
    const step = target / (duration / 16);
    const timer = setInterval(() => {
      start += step;
      if (start >= target) { setValue(target); clearInterval(timer); }
      else setValue(Math.floor(start));
    }, 16);
    return () => clearInterval(timer);
  }, [target]);
  return value;
}

function Toast({ message, onClose }) {

  return (

  );
}

/* ── KPI 카드 (CountUp) ── */
function KpiCard({ label, value, unit, icon, color, delay=0 }) {
  const displayed = useCountUp(value, 1000);
  return (
    <div style={{ background:C.surface2, border:`1px solid ${C.border}`, borderRadius:14, padding:20, animation:`slideUp 0.4s ${delay}s both` }}>
      <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:12 }}>
        <span style={{ color:C.textMuted, fontSize:13 }}>{label}</span>
        <span style={{ fontSize:22 }}>{icon}</span>
      </div>
      <div style={{ display:'flex', alignItems:'baseline', gap:4 }}>
        <span style={{ color, fontSize:32, fontWeight:800 }}>{displayed}</span>
        <span style={{ color:C.textMuted, fontSize:14 }}>{unit}</span>
      </div>
    </div>
  );
}

                  <div style={{ display:'flex', gap:2 }}>
                    {Object.values(w.progress).map((p,j) => (
                      <div key={j} title={`${p}%`} style={{ flex:1, height:4, borderRadius:2, background: p===100 ? C.success : p>60 ? C.primary : C.warning, opacity: p===0 ? 0.2 : 1 }} />
                    ))}
                  </div>
                  <span style={{ color:C.textMuted, fontSize:11, marginTop:3, display:'block' }}>
                    {Math.round(Object.values(w.progress).reduce((a,b)=>a+b,0)/Object.values(w.progress).length)}% 평균

                <td style={{ padding:'12px 16px' }}><Badge status={w.status} /></td>

              </tr>
            ))}
          </tbody>
        </table>
      </div>
    </div>
  );
}

/* ── 소설 에디터 페이지 ── */
function NovelEditorPage({ showToast }) {
  const [paragraphs, setParagraphs] = useState(NOVEL_PARAGRAPHS);
  const [translating, setTranslating] = useState(null);
  const [autoSaveState, setAutoSaveState] = useState('saved');

  const getStatusStyle = (status) => ({
    approved: { bg:'rgba(52,211,153,0.12)', color:C.success, label:'✓ 승인' },
    auto:     { bg:'rgba(251,191,36,0.12)', color:C.warning, label:'⚡ 자동번역' },
    pending:  { bg:'rgba(148,163,184,0.1)', color:C.textMuted, label:'◯ 미번역' },
  }[status] || { bg:'transparent', color:C.textMuted, label:'-' });

  const handleAutoTranslate = (id) => {
    setTranslating(id);
    setTimeout(() => {
      setParagraphs(prev => prev.map(p => p.id===id ? { ...p, translated: p.autoResult || p.original+' (번역됨)', status:'auto' } : p));
      setTranslating(null);
      setAutoSaveState('modified');
      setTimeout(() => setAutoSaveState('saved'), 1000);
    }, 1500);
  };

  const handleTranslationChange = (id, val) => {
    setParagraphs(prev => prev.map(p => p.id===id ? { ...p, translated:val, status:'auto' } : p));
    setAutoSaveState('modified');
    setTimeout(() => setAutoSaveState('saved'), 800);
  };

  const handleApprove = (id) => {
    setParagraphs(prev => prev.map(p => p.id===id ? { ...p, status:'approved' } : p));
    showToast('단락 승인 완료');
  };

  return (
    <div className="fade-in" style={{ padding:'16px 24px', height:'calc(100vh - 56px)', display:'flex', flexDirection:'column', gap:12 }}>
      {/* 툴바 */}
      <div style={{ display:'flex', alignItems:'center', gap:12, background:C.surface2, border:`1px solid ${C.border}`, borderRadius:10, padding:'10px 16px' }}>
        <select style={{ background:C.surface, border:`1px solid ${C.border}`, color:C.text, borderRadius:6, padding:'4px 10px', fontSize:13, cursor:'pointer' }}>
          <option>달빛 소나타</option>
          <option>벚꽃이 지는 날</option>
        </select>
        <select style={{ background:C.surface, border:`1px solid ${C.border}`, color:C.text, borderRadius:6, padding:'4px 10px', fontSize:13, cursor:'pointer' }}>
          <option>Chapter 01 — 도착</option>
          <option>Chapter 02 — 첫 만남</option>
        </select>
        <select style={{ background:C.surface, border:`1px solid ${C.border}`, color:C.text, borderRadius:6, padding:'4px 10px', fontSize:13, cursor:'pointer' }}>
          <option>🇺🇸 → 🇰🇷 (한국어)</option>
          <option>🇺🇸 → 🇯🇵 (日本語)</option>
        </select>
        <div style={{ flex:1 }} />
        <div style={{ display:'flex', gap:4, fontSize:12 }}>
          {[{label:'전체', n:paragraphs.length},{label:'승인', n:paragraphs.filter(p=>p.status==='approved').length},{label:'대기', n:paragraphs.filter(p=>p.status==='pending').length}].map(s => (
            <span key={s.label} style={{ background:C.surface3, borderRadius:6, padding:'3px 8px', color:C.textMuted }}>{s.label} <strong style={{ color:C.text }}>{s.n}</strong></span>
          ))}
        </div>
        <div style={{ color: autoSaveState==='saved' ? C.success : C.warning, fontSize:13, display:'flex', alignItems:'center', gap:4 }}>
          {autoSaveState==='saving' ? <span style={{ animation:'spin 1s linear infinite', display:'inline-block' }}>↻</span> : '✓'}
          {autoSaveState==='saved' ? '저장됨' : '저장 중…'}
        </div>
        <button onClick={() => { paragraphs.filter(p=>p.status==='pending').forEach(p => handleAutoTranslate(p.id)); showToast('모든 미번역 단락 자동 번역 요청'); }} style={{ background:'linear-gradient(135deg,#6366F1,#A78BFA)', border:'none', color:'#fff', borderRadius:8, padding:'6px 14px', fontSize:13, fontWeight:600, cursor:'pointer' }}>⚡ 전체 자동 번역</button>
      </div>

      {/* 헤더 */}
      <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:12 }}>
        {['원문 (English)','번역문 (한국어)'].map(label => (
          <div key={label} style={{ background:C.surface3, border:`1px solid ${C.border}`, borderRadius:8, padding:'8px 16px', color:C.textMuted, fontSize:13, fontWeight:600, textAlign:'center' }}>{label}</div>
        ))}
      </div>

      {/* 단락 목록 */}
      <div style={{ flex:1, overflow:'auto', display:'flex', flexDirection:'column', gap:8 }}>
        {paragraphs.map(para => {
          const ss = getStatusStyle(para.status);
          const isTranslating = translating===para.id;
          return (
            <div key={para.id} style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:12, background:C.surface2, border:`1px solid ${C.border}`, borderRadius:10, padding:14, transition:'border-color 0.15s', borderColor: para.status==='approved' ? 'rgba(52,211,153,0.3)' : C.border }}>
              {/* 원문 */}
              <div>
                <div style={{ color:C.text, fontSize:14, lineHeight:1.7, padding:'6px 0' }}>{para.original}</div>
              </div>
              {/* 번역문 */}
              <div style={{ position:'relative' }}>
                {isTranslating ? (
                  <div style={{ display:'flex', alignItems:'center', gap:8, padding:'10px 0', color:C.primary }}>
                    <span style={{ animation:'spin 1s linear infinite', display:'inline-block', fontSize:18 }}>↻</span>
                    <span style={{ fontSize:13 }}>DeepL API 번역 중…</span>
                  </div>
                ) : para.status==='pending' && !para.translated ? (
                  <div style={{ display:'flex', gap:8, padding:'6px 0', alignItems:'center' }}>
                    <button onClick={() => handleAutoTranslate(para.id)} style={{ background:'rgba(99,102,241,0.15)', border:`1px solid ${C.primary}`, color:C.primary, borderRadius:6, padding:'5px 12px', fontSize:12, cursor:'pointer', fontWeight:600 }}>⚡ 자동 번역</button>
                    <span style={{ color:C.textDim, fontSize:12 }}>또는 직접 입력</span>
                  </div>
                ) : (
                  <textarea
                    value={para.translated || para.autoResult || ''}
                    onChange={e => handleTranslationChange(para.id, e.target.value)}
                    style={{ width:'100%', background:'transparent', border:'none', borderBottom:`1px solid ${C.border}`, color:C.text, fontSize:14, lineHeight:1.7, resize:'none', outline:'none', fontFamily:'inherit', paddingBottom:4, minHeight:60 }}
                  />
                )}
                <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', marginTop:6 }}>
                  <span style={{ background:ss.bg, color:ss.color, borderRadius:4, padding:'1px 8px', fontSize:11, fontWeight:600 }}>{ss.label}</span>
                  {para.status!=='approved' && para.translated && (
                    <button onClick={() => handleApprove(para.id)} style={{ background:'rgba(52,211,153,0.12)', border:`1px solid ${C.success}`, color:C.success, borderRadius:6, padding:'2px 10px', fontSize:11, cursor:'pointer' }}>✓ 승인</button>
                  )}
                </div>
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

        ))}
        <div style={{ flex:1 }} />
        <div style={{ background:C.surface2, border:`1px solid ${C.border}`, borderRadius:10, padding:'8px 16px', display:'flex', alignItems:'center', gap:8 }}>
          <span style={{ color:C.textMuted, fontSize:12 }}>이미지 서빙:</span>
          <span style={{ background:'rgba(52,211,153,0.15)', color:C.success, borderRadius:4, padding:'2px 8px', fontSize:11, fontWeight:600 }}>분리 완료</span>
          <span style={{ color:C.textDim, fontSize:11 }}>이미지 재로드 없음</span>
        </div>
      </div>

      {/* 뷰어 콘텐츠 */}
      <div style={{ flex:1, overflow:'auto', background:C.surface2, border:`1px solid ${C.border}`, borderRadius:12 }}>
        {workType==='webtoon' ? (
          <div style={{ padding:24, display:'flex', flexDirection:'column', gap:3, maxWidth:560, margin:'0 auto' }}>
            <div style={{ textAlign:'center', marginBottom:16 }}>
              <span style={{ color:C.primary, fontSize:14, fontWeight:700 }}>빛의 전사 S2 — EP.01</span>
              <span style={{ color:C.textMuted, fontSize:12, marginLeft:8 }}>[{activeLang}] 렌더링 중</span>
            </div>
            {[
              { h:180, label:'[컷 1] 도시 전경', panelText: { EN:'Darkness…', JA:'暗闇…', ZH:'黑暗…', ES:'Oscuridad…' }[activeLang] },
              { h:140, label:'[컷 2] 캐릭터', panelText: { EN:'The signal!', JA:'信号だ！', ZH:'信号！', ES:'¡La señal!' }[activeLang] },
              { h:220, label:'[컷 3] 액션', panelText: { EN:'We move at dawn.', JA:'夜明けに動く。', ZH:'黎明时行动。', ES:'Nos movemos al amanecer.' }[activeLang] },
            ].map((cut,i) => (
              <div key={i} style={{ height:cut.h, background:`#${['10101E','0D0D1A','121220'][i]}`, borderRadius:4, position:'relative', border:`1px solid ${C.border}`, display:'flex', alignItems:'center', justifyContent:'center' }}>
                <span style={{ color:C.textDim, fontSize:12 }}>{cut.label}</span>
                <div style={{ position:'absolute', left:'8%', top:'15%', width:'45%', height:'18%', background:'rgba(0,0,0,0.75)', border:`1px solid ${C.primary}40`, borderRadius:3, display:'flex', alignItems:'center', justifyContent:'center', padding:4 }}>
                  <span style={{ color:C.text, fontSize:10, textAlign:'center' }}>{cut.panelText}</span>
                </div>
              </div>
            ))}
          </div>
        ) : (
          <div style={{ padding:32, maxWidth:680, margin:'0 auto' }}>
            <div style={{ textAlign:'center', marginBottom:24 }}>
              <div style={{ color:C.text, fontSize:20, fontWeight:700 }}>달빛 소나타</div>
              <div style={{ color:C.textMuted, fontSize:14, marginTop:4 }}>Chapter 01 — 도착 · [{activeLang}]</div>
            </div>
            {(novelTexts[activeLang] || novelTexts.EN).map((text, i) => (
              <p key={i} style={{ color: text.includes('[번역 대기')? C.textDim : C.text, fontSize:16, lineHeight:1.9, marginBottom:20, opacity: text.includes('[번역 대기')? 0.5 : 1, fontStyle: text.includes('[번역 대기')? 'italic' : 'normal' }}>{text}</p>
            ))}
          </div>
        )}
      </div>
    </div>
  );
}

/* ── 메인 앱 ── */
function App() {
  const [page, setPage] = useState('dashboard');
  const [modal, setModal] = useState(null);
  const [toast, setToast] = useState(null);

  const showToast = (msg) => setToast(msg);
  const PAGE_TITLES = { dashboard:'작가 대시보드', webtoon:'웹툰 에디터', novel:'소설 에디터', viewer:'언어 뷰어' };

  return (
    <div style={{ display:'flex', width:'100%', height:'100vh', overflow:'hidden', background:C.bg }}>
      <Sidebar active={page} onNav={setPage} />
      <div style={{ flex:1, display:'flex', flexDirection:'column', overflow:'hidden' }}>
        <TopBar title={PAGE_TITLES[page]} />
        <div style={{ flex:1, overflow:'auto' }}>
          {page==='dashboard' && <DashboardPage setModal={setModal} showToast={showToast} />}
          {page==='webtoon'   && <WebtoonEditorPage showToast={showToast} />}
          {page==='novel'     && <NovelEditorPage showToast={showToast} />}
          {page==='viewer'    && <ViewerPage showToast={showToast} />}
        </div>
      </div>

      {/* 작품 상세 모달 */}
      {modal?.type==='workDetail' && (
        <Modal title={modal.work.title} onClose={() => setModal(null)} width={560}>
          <div style={{ padding:24, display:'flex', flexDirection:'column', gap:16 }}>
            <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:12 }}>
              {[
                ['유형', modal.work.type==='webtoon'?'웹툰':'소설'],
                ['총 회차', `${modal.work.episodes}화`],
                ['조회수', `${modal.work.views.toLocaleString()}회`],
                ['최근 수정', modal.work.updated],
              ].map(([k,v]) => (
                <div key={k} style={{ background:C.surface2, border:`1px solid ${C.border}`, borderRadius:8, padding:'12px 14px' }}>
                  <div style={{ color:C.textMuted, fontSize:12 }}>{k}</div>
                  <div style={{ color:C.text, fontWeight:700, fontSize:16, marginTop:2 }}>{v}</div>
                </div>
              ))}
            </div>
            <div>
              <div style={{ color:C.textMuted, fontSize:13, marginBottom:10 }}>언어별 번역 진행률</div>
              {modal.work.langs.map(lang => (
                <div key={lang} style={{ display:'flex', alignItems:'center', gap:12, marginBottom:10 }}>
                  <span style={{ color:C.text, fontSize:13, width:32 }}>{lang}</span>
                  <div style={{ flex:1, height:6, background:C.border, borderRadius:99 }}>
                    <div style={{ height:6, borderRadius:99, width:`${modal.work.progress[lang]||0}%`, background: (modal.work.progress[lang]||0)===100 ? C.success : C.primary, transition:'width 0.5s' }} />
                  </div>
                  <span style={{ color:C.textMuted, fontSize:13, width:36 }}>{modal.work.progress[lang]||0}%</span>
                </div>
              ))}
            </div>
            <div style={{ display:'flex', gap:10, justifyContent:'flex-end', paddingTop:4 }}>
              <button onClick={() => { setModal(null); setPage('webtoon'); }} style={{ background:C.primaryLight, border:`1px solid ${C.primary}`, color:C.primary, borderRadius:8, padding:'8px 20px', cursor:'pointer', fontSize:14, fontWeight:600 }}>에디터 열기</button>
              <button onClick={() => setModal(null)} style={{ background:'none', border:`1px solid ${C.border}`, color:C.textMuted, borderRadius:8, padding:'8px 20px', cursor:'pointer', fontSize:14 }}>닫기</button>
            </div>
          </div>
        </Modal>
      )}

      {/* 새 작품 모달 */}
      {modal==='newWork' && (
        <Modal title="새 작품 등록" onClose={() => setModal(null)} width={480}>
          <div style={{ padding:24, display:'flex', flexDirection:'column', gap:14 }}>
            {[['작품명','text','예: 은하수 탐험대'],['유형','select',''],['번역 대상 언어','text','예: EN, JA, ZH']].map(([label, type, ph]) => (
              <div key={label}>
                <label style={{ color:C.textMuted, fontSize:12, display:'block', marginBottom:4 }}>{label}</label>
                {type==='select' ? (
                  <select style={{ width:'100%', background:C.surface2, border:`1px solid ${C.border}`, borderRadius:6, padding:'8px 10px', color:C.text, fontSize:14 }}>
                    <option value="webtoon">웹툰</option>
                    <option value="novel">소설</option>
                  </select>
                ) : (
                  <input placeholder={ph} style={{ width:'100%', background:C.surface2, border:`1px solid ${C.border}`, borderRadius:6, padding:'8px 10px', color:C.text, fontSize:14, outline:'none' }} />
                )}
              </div>
            ))}
            <div>
              <label style={{ color:C.textMuted, fontSize:12, display:'block', marginBottom:4 }}>작품 소개</label>
              <textarea rows={3} placeholder="간략한 작품 소개를 입력하세요…" style={{ width:'100%', background:C.surface2, border:`1px solid ${C.border}`, borderRadius:6, padding:'8px 10px', color:C.text, fontSize:14, outline:'none', resize:'none', fontFamily:'inherit' }} />
            </div>
            <div style={{ display:'flex', gap:10, justifyContent:'flex-end', paddingTop:4 }}>
              <button onClick={() => setModal(null)} style={{ background:'none', border:`1px solid ${C.border}`, color:C.textMuted, borderRadius:8, padding:'8px 20px', cursor:'pointer', fontSize:14 }}>취소</button>
              <button onClick={() => { setModal(null); showToast('새 작품이 등록되었습니다'); }} style={{ background:C.gradient, border:'none', color:'#fff', borderRadius:8, padding:'8px 20px', cursor:'pointer', fontSize:14, fontWeight:600 }}>등록</button>
            </div>
          </div>
        </Modal>
      )}

      {toast && <Toast message={toast} onClose={() => setToast(null)} />}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
