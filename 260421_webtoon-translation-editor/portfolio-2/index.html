/* ── CountUp 훅 ── */
function useCountUp(target, duration = 1200) {
  const [value, setValue] = useState(0);
  useEffect(() => {
    if (typeof target !== 'number') return;
    let start = 0;
    const step = target / (duration / 16);
    const timer = setInterval(() => {
      start += step;
      if (start >= target) { setValue(target); clearInterval(timer); }
      else setValue(Math.floor(start));
    }, 16);
    return () => clearInterval(timer);
  }, [target]);
  return value;
}

  return (

  );
}

        <div>
          <div style={{ color:C.textMuted, fontSize:12, marginBottom:8 }}>번역 완성도 게이팅</div>
          <div style={{ height:10, background:C.surface2, borderRadius:99, marginBottom:4 }}>
            <div style={{ height:10, borderRadius:99, width:`${job.completionGate}%`, background: job.completionGate===100 ? C.success : C.warning }} />
          </div>
          <div style={{ display:'flex', justifyContent:'space-between', color:C.textMuted, fontSize:12 }}>
            <span>{job.completionGate}% 완성</span>
            <span style={{ color: job.completionGate>=100 ? C.success : C.warning }}>{job.completionGate>=100 ? '✓ 발행 가능' : '⚠ 100% 필요'}</span>
          </div>
        </div>
        <div>
          <div style={{ color:C.textMuted, fontSize:12, marginBottom:8 }}>언어별 패키지</div>
          {job.lang.split(',').map(lang => (
            <div key={lang} style={{ display:'flex', alignItems:'center', justifyContent:'space-between', padding:'8px 0', borderBottom:`1px solid ${C.border}` }}>
              <span style={{ color:C.text, fontSize:14 }}>{lang.trim()}</span>
              <span style={{ background: job.status==='completed'?C.secondaryLight:'#EFF6FF', color: job.status==='completed'?C.success:C.primary, borderRadius:6, padding:'2px 10px', fontSize:12, fontWeight:600 }}>{job.status==='completed'?'발행 완료':'예약됨'}</span>
            </div>
          ))}
        </div>
      </div>
    );
  }

  if (drawerItem.type==='member') {
    const { member } = drawerItem;
    return (
      <div style={{ padding:24, display:'flex', flexDirection:'column', gap:16 }}>
        <div style={{ display:'flex', alignItems:'center', gap:14 }}>
          <div style={{ width:56, height:56, borderRadius:99, background:`linear-gradient(135deg,${C.primary},${C.accent})`, display:'flex', alignItems:'center', justifyContent:'center', fontSize:22, color:'#fff', fontWeight:700 }}>{member.avatar}</div>
          <div>
            <div style={{ color:C.text, fontWeight:800, fontSize:18 }}>{member.name}</div>
            <div style={{ color:C.textMuted, fontSize:14 }}>{member.role} · {member.lang}</div>
            <div style={{ display:'flex', alignItems:'center', gap:6, marginTop:4 }}>
              <span style={{ width:8, height:8, borderRadius:99, background: member.online?C.success:C.textDim, display:'inline-block' }} />
              <span style={{ fontSize:12, color: member.online?C.success:C.textMuted }}>{member.online?'온라인':'오프라인'}</span>
            </div>
          </div>
        </div>
        <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:10 }}>
          {[['할당 작업',`${member.tasks}개`],['완료',`${member.done}개`],['완료율',`${Math.round(member.done/member.tasks*100)}%`],['역할',member.role]].map(([k,v])=>(
            <div key={k} style={{ background:C.surface2, borderRadius:10, padding:14 }}>
              <div style={{ color:C.textMuted, fontSize:12 }}>{k}</div>
              <div style={{ color:C.text, fontWeight:700, fontSize:16, marginTop:2 }}>{v}</div>
            </div>
          ))}
        </div>
      </div>
    );
  }
  return null;
}

/* ── 메인 앱 ── */
function App() {
  const [tab, setTab] = useState('home');
  const [drawer, setDrawer] = useState(null);
  const [modal, setModal] = useState(null);
  const [toast, setToast] = useState(null);

  const showToast = useCallback((msg, type='success') => setToast({ msg, type }), []);

  return (
    <div style={{ display:'flex', flexDirection:'column', width:'100%', minHeight:'100vh', background:C.bg }}>
      <TopNav tab={tab} setTab={setTab} />
      <HeroBanner tab={tab} />
      <main style={{ flex:1 }}>
        {tab==='home'   && <HomePage setDrawer={setDrawer} setModal={setModal} showToast={showToast} />}
        {tab==='collab' && <CollabPage setDrawer={setDrawer} showToast={showToast} />}
        {tab==='review' && <ReviewPage setDrawer={setDrawer} showToast={showToast} />}
        {tab==='publish'&& <PublishPage setDrawer={setDrawer} showToast={showToast} />}
      </main>

      {/* 슬라이드오버 드로어 */}
      {drawer && (
        <Drawer title={drawer.type==='task' ? `${drawer.task.work} — ${drawer.task.ep}` : drawer.type==='review' ? '리뷰 상세' : drawer.type==='job' ? '발행 상세' : '팀원 정보'} onClose={() => setDrawer(null)}>
          <DrawerContent drawerItem={drawer} showToast={showToast} />
        </Drawer>
      )}

      {toast && <Toast message={toast.msg} type={toast.type} onClose={() => setToast(null)} />}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
