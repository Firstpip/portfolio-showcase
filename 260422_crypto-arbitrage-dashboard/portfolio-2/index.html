// ── Utility Components ─────────────────────────────────────────────────────────
function CountUp({end,duration=1200,suffix='',prefix='',decimals=0}){
  const [val,setVal]=useState(0);
  useEffect(()=>{
    let s=0;const step=end/(duration/16);
    const t=setInterval(()=>{
      s+=step;
      if(s>=end){setVal(end);clearInterval(t);}
      else setVal(parseFloat(s.toFixed(decimals)));
    },16);
    return()=>clearInterval(t);
  },[end]);
  return <span style={{animation:'countUp 400ms ease'}}>{prefix}{typeof val==='number'&&decimals===0?val.toLocaleString():val.toFixed(decimals)}{suffix}</span>;
}

function Toast({message,type='success',onClose}){
  useEffect(()=>{const t=setTimeout(onClose,3000);return()=>clearTimeout(t);},[]);
  const bg=type==='success'?C.success:type==='warn'?C.warning:C.danger;
  return(
    <div style={{position:'fixed',bottom:24,right:24,zIndex:9999,background:bg,color:'#fff',padding:'12px 20px',borderRadius:10,animation:'slideUp 300ms ease',boxShadow:'0 8px 30px rgba(0,0,0,0.15)',display:'flex',alignItems:'center',gap:8,fontSize:14,fontWeight:600}}>
      {type==='success'?'✓':type==='warn'?'⚠':'✕'} {message}
    </div>
  );
}

function Modal({title,onClose,children,width=600}){

function Card({children,style={},hoverable=false}){
  const [hovered,setHovered]=useState(false);
  return(
    <div
      onMouseEnter={hoverable?()=>setHovered(true):undefined}
      onMouseLeave={hoverable?()=>setHovered(false):undefined}
      style={{background:C.surface,borderRadius:12,padding:20,boxShadow:'0 2px 12px rgba(30,41,59,0.07)',border:`1px solid ${C.border}`,transition:'transform 200ms ease, box-shadow 200ms ease',transform:hovered?'scale(1.01)':'scale(1)',boxShadow:hovered?'0 8px 24px rgba(37,99,235,0.12)':'0 2px 12px rgba(30,41,59,0.07)',...style}}>
      {children}
    </div>
  );
}

function KPICard({label,val,suffix,prefix,decimals,color,icon,delay,trend}){
  return(
    <Card hoverable style={{animation:`slideUp 400ms ease ${delay}ms both`}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start'}}>
        <div>
          <div style={{fontSize:12,color:C.textSecondary,marginBottom:8,fontWeight:600}}>{label}</div>
          <div style={{fontSize:26,fontWeight:800,color:color||C.textPrimary}}>
            <CountUp end={val} suffix={suffix} prefix={prefix} decimals={decimals||0}/>
          </div>
          {trend&&<div style={{fontSize:12,color:trend>0?C.success:C.danger,marginTop:4,fontWeight:600}}>{trend>0?'▲':'▼'} {Math.abs(trend)}% vs 지난주</div>}
        </div>
        {icon&&<div style={{fontSize:24,opacity:0.7}}>{icon}</div>}
      </div>
    </Card>
  );
}

function StatusDot({status}){
  const map={connected:[C.success,'연결됨'],reconnecting:[C.warning,'재연결 중'],disconnected:[C.danger,'연결 끊김']};
  const [color,label]=map[status]||[C.textMuted,'알 수 없음'];
  return(
    <div style={{display:'flex',alignItems:'center',gap:6}}>
      <div style={{width:8,height:8,borderRadius:'50%',background:color,animation:status==='reconnecting'?'connPulse 1s infinite':'none'}}/>
      <span style={{fontSize:12,color,fontWeight:700}}>{label}</span>
    </div>
  );
}

function HistoryPage({onToast}){
  const [data,setData]=useState(HISTORY_DATA);

  const [page,setHistPage]=useState(1);
  const [isExporting,setIsExporting]=useState(false);

  const filtered=data.filter(h=>{
    if(filters.coin&&!h.coin.toLowerCase().includes(filters.coin.toLowerCase()))return false;
    if(filters.from&&h.from!==filters.from)return false;
    if(filters.minSpread&&h.spread<parseFloat(filters.minSpread))return false;
    return true;

  function handleExport(){
    setIsExporting(true);
    setTimeout(()=>{setIsExporting(false);onToast('CSV 내보내기가 완료되었습니다. (StreamingResponse)');},1800);

          <span style={{fontSize:12,color:C.textMuted}}>PostgreSQL 월별 파티셔닝 · SQLAlchemy yield_per 스트리밍</span>
        </div>
        <div style={{display:'grid',gridTemplateColumns:'80px 60px 1fr 1fr 80px 60px 60px 80px',padding:'10px 12px',background:C.surface2,borderRadius:8,marginBottom:8,fontSize:12,color:C.textMuted,fontWeight:700,textTransform:'uppercase',letterSpacing:'0.04em'}}>
          <span>시간</span><span>코인</span><span>FROM</span><span>TO</span><span>방향</span><span>차익률</span><span>거래량</span><span>네트워크</span>
        </div>
        {filtered.map((h,i)=>(
          <div key={h.id} style={{display:'grid',gridTemplateColumns:'80px 60px 1fr 1fr 80px 60px 60px 80px',padding:'11px 12px',borderRadius:8,marginBottom:2,animation:`rowSlideIn 200ms ease ${i*30}ms both`}}
            onMouseEnter={e=>e.currentTarget.style.background=C.surface2}
            onMouseLeave={e=>e.currentTarget.style.background='transparent'}>
            <span style={{fontSize:12,color:C.textMuted}}>{h.time}</span>
            <span style={{fontWeight:700,fontSize:13}}>{h.coin}</span>
            <span style={{fontSize:12,color:C.textSecondary}}>{h.from}</span>
            <span style={{fontSize:12,color:C.textSecondary}}>{h.to}</span>
            <span style={{fontSize:11,padding:'2px 6px',borderRadius:4,background:C.surface2,color:C.textMuted}}>{h.dir}</span>
            <span style={{fontWeight:700,fontSize:13,color:h.spread>=2?C.success:h.spread>=0?C.warning:C.danger}}>{h.spread>0?'+':''}{h.spread}%</span>
            <span style={{fontSize:12,color:C.textSecondary}}>{h.vol}</span>
            <span style={{fontSize:11,color:C.textMuted}}>{h.network}</span>
          </div>
        ))}
        {/* Pagination */}
        <div style={{display:'flex',justifyContent:'center',gap:8,marginTop:16,paddingTop:16,borderTop:`1px solid ${C.border}`}}>
          {[1,2,3,4,5].map(p=>(
            <button key={p} onClick={()=>setHistPage(p)} style={{width:36,height:36,borderRadius:8,border:`1px solid ${p===page?C.primary:C.border}`,background:p===page?C.primary:'transparent',color:p===page?'#fff':C.textSecondary,cursor:'pointer',fontWeight:700,fontSize:13,transition:'all 150ms'}}>
              {p}
            </button>
          ))}
        </div>
      </Card>
    </div>
  );
}
