<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>NFC 참여 확인 시스템 — 맞춤 구현 데모</title>
<link rel="preconnect" href="https://cdn.jsdelivr.net/npm/pretendard@1.3.9/dist/web/static/pretendard.css"/>
<link href="https://cdn.jsdelivr.net/npm/pretendard@1.3.9/dist/web/static/pretendard.css" rel="stylesheet"/>
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;font-family:'Pretendard',-apple-system,sans-serif}
#root{display:flex;width:100%;height:100vh;overflow:hidden}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideInRight{from{transform:translateX(100%);opacity:0}to{transform:translateX(0);opacity:1}}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(37,99,235,0.4)}50%{box-shadow:0 0 0 10px rgba(37,99,235,0)}}
@keyframes countUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
@keyframes slideDown{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:translateY(0)}}
@keyframes toastIn{from{opacity:0;transform:translateX(100%)}to{opacity:1;transform:translateX(0)}}
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
@keyframes nfcRing{0%{transform:scale(1);opacity:1}100%{transform:scale(2.4);opacity:0}}
@keyframes rowFadeIn{from{opacity:0;transform:translateX(-10px)}to{opacity:1;transform:translateX(0)}}
@keyframes progressFill{from{width:0%}to{width:var(--w)}}
@keyframes fadeInScale{from{opacity:0;transform:scale(0.92)}to{opacity:1;transform:scale(1)}}
@keyframes slideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes ripple{0%{transform:scale(0);opacity:0.6}100%{transform:scale(3);opacity:0}}
@keyframes barGrow{from{width:0}to{width:100%}}
@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useRef}=React;

const C={
  primary:'#2563EB',primaryDark:'#1D4ED8',primaryLight:'#EFF6FF',
  secondary:'#10B981',secondaryLight:'#ECFDF5',
  accent:'#F59E0B',accentLight:'#FFFBEB',
  danger:'#EF4444',dangerLight:'#FEF2F2',
  sidebar:'#0F172A',sidebarHover:'#1E293B',sidebarActive:'#1E3A8A',
  bg:'#F8FAFC',surface:'#FFFFFF',border:'#E2E8F0',
  text:'#1E293B',textSec:'#64748B',textMuted:'#94A3B8',
};

const MOCK_STUDENTS=[
  {id:1,no:'2025-101',name:'김민준',grade:3,cls:2,nfcId:'NFC-A1B2',status:'active'},
  {id:2,no:'2025-102',name:'이서연',grade:3,cls:2,nfcId:'NFC-C3D4',status:'active'},
  {id:3,no:'2025-103',name:'박도윤',grade:4,cls:1,nfcId:'NFC-E5F6',status:'active'},
  {id:4,no:'2025-104',name:'최지우',grade:4,cls:1,nfcId:'NFC-G7H8',status:'inactive'},
  {id:5,no:'2025-105',name:'정하윤',grade:5,cls:3,nfcId:'NFC-I9J0',status:'active'},
  {id:6,no:'2025-106',name:'윤시우',grade:5,cls:3,nfcId:'NFC-K1L2',status:'active'},
  {id:7,no:'2025-107',name:'강예준',grade:6,cls:2,nfcId:'NFC-M3N4',status:'active'},
  {id:8,no:'2025-108',name:'조아린',grade:6,cls:2,nfcId:'NFC-O5P6',status:'active'},
];

const MOCK_HISTORY=[
  {id:1,date:'2026-04-22',time:'09:03',name:'김민준',grade:3,cls:2,location:'체육관 입구',status:'정상'},
  {id:2,date:'2026-04-22',time:'09:05',name:'이서연',grade:3,cls:2,location:'체육관 입구',status:'정상'},
  {id:3,date:'2026-04-22',time:'09:11',name:'정하윤',grade:5,cls:3,location:'강당 A동',status:'지각'},
  {id:4,date:'2026-04-22',time:'09:15',name:'윤시우',grade:5,cls:3,location:'강당 A동',status:'정상'},
  {id:5,date:'2026-04-21',time:'09:04',name:'박도윤',grade:4,cls:1,location:'체육관 입구',status:'정상'},
  {id:6,date:'2026-04-21',time:'09:07',name:'강예준',grade:6,cls:2,location:'강당 B동',status:'정상'},
  {id:7,date:'2026-04-21',time:'09:09',name:'조아린',grade:6,cls:2,location:'강당 B동',status:'정상'},
  {id:8,date:'2026-04-21',time:'09:22',name:'최지우',grade:4,cls:1,location:'체육관 입구',status:'지각'},
];

const LIVE_FEED=[
  {id:101,time:'09:47:12',name:'강예준',grade:6,cls:2,nfcId:'NFC-M3N4',location:'체육관 입구'},
  {id:102,time:'09:46:55',name:'조아린',grade:6,cls:2,nfcId:'NFC-O5P6',location:'체육관 입구'},
  {id:103,time:'09:44:30',name:'윤시우',grade:5,cls:3,nfcId:'NFC-K1L2',location:'강당 A동'},
  {id:104,time:'09:42:17',name:'정하윤',grade:5,cls:3,nfcId:'NFC-I9J0',location:'강당 A동'},
  {id:105,time:'09:39:02',name:'박도윤',grade:4,cls:1,nfcId:'NFC-E5F6',location:'체육관 입구'},
];

function Toast({msg,onClose}){
  useEffect(()=>{const t=setTimeout(onClose,2800);return()=>clearTimeout(t)},[]);
  return(
    <div style={{position:'fixed',bottom:24,right:24,background:C.primary,color:'#fff',
      padding:'12px 20px',borderRadius:10,boxShadow:'0 8px 24px rgba(37,99,235,0.3)',
      zIndex:9999,animation:'toastIn 300ms ease',display:'flex',alignItems:'center',gap:8,fontSize:14}}>
      <span style={{fontSize:18}}>✅</span>{msg}
    </div>
  );
}

function Modal({title,children,onClose,wide}){
  return(
    <div onClick={e=>e.target===e.currentTarget&&onClose()} style={{
      position:'fixed',inset:0,background:'rgba(15,23,42,0.55)',zIndex:500,
      display:'flex',alignItems:'center',justifyContent:'center',animation:'fadeIn 200ms ease'}}>
      <div style={{background:C.surface,borderRadius:16,padding:28,width:wide?720:500,maxHeight:'85vh',
        overflowY:'auto',boxShadow:'0 24px 64px rgba(0,0,0,0.18)',animation:'fadeIn 200ms ease'}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:20}}>
          <h3 style={{fontSize:18,fontWeight:700,color:C.text}}>{title}</h3>
          <button onClick={onClose} style={{background:'none',border:'none',cursor:'pointer',
            color:C.textMuted,fontSize:20,padding:4}}>&times;</button>
        </div>
        {children}
      </div>
    </div>
  );
}

function Badge({text,color='gray'}){
  const map={green:{bg:C.secondaryLight,c:C.secondary},yellow:{bg:C.accentLight,c:'#D97706'},
    red:{bg:C.dangerLight,c:C.danger},blue:{bg:C.primaryLight,c:C.primary},
    gray:{bg:'#F1F5F9',c:C.textSec}};
  const s=map[color]||map.gray;
  return <span style={{background:s.bg,color:s.c,fontSize:12,fontWeight:600,
    padding:'3px 10px',borderRadius:20}}>{text}</span>;
}

function KpiCard({icon,label,value,sub,color}){
  const [hovered,setHovered]=useState(false);
  return(
    <div onMouseEnter={()=>setHovered(true)} onMouseLeave={()=>setHovered(false)}
      style={{background:C.surface,borderRadius:14,padding:'20px 22px',flex:1,
        boxShadow:hovered?'0 8px 24px rgba(37,99,235,0.12)':'0 2px 8px rgba(0,0,0,0.06)',
        animation:'fadeInScale 0.5s ease',border:`1px solid ${C.border}`,
        transform:hovered?'translateY(-3px)':'translateY(0)',transition:'all 200ms',cursor:'pointer'}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start'}}>
        <div>
          <div style={{fontSize:13,color:C.textSec,marginBottom:6}}>{label}</div>
          <div style={{fontSize:30,fontWeight:800,color:C.text,letterSpacing:-1}}>{value}</div>
          {sub&&<div style={{fontSize:12,color:C.textMuted,marginTop:4}}>{sub}</div>}
        </div>
        <div style={{width:44,height:44,borderRadius:12,background:color+'22',
          display:'flex',alignItems:'center',justifyContent:'center',fontSize:22}}>{icon}</div>
      </div>
    </div>
  );
}

/* ─── Dashboard ─── */
function Dashboard(){
  const [feed,setFeed]=useState(LIVE_FEED);
  const [pulse,setPulse]=useState(false);
  useEffect(()=>{
    const iv=setInterval(()=>{
      const names=['이서연','김민준','최지우','정하윤'];
      const locs=['체육관 입구','강당 A동','강당 B동'];
      const n=names[Math.floor(Math.random()*names.length)];
      const l=locs[Math.floor(Math.random()*locs.length)];
      const now=new Date();
      const t=`${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}:${String(now.getSeconds()).padStart(2,'0')}`;
      setFeed(prev=>[{id:Date.now(),time:t,name:n,grade:3,cls:2,nfcId:'NFC-NEW',location:l},...prev.slice(0,9)]);
      setPulse(true);
      setTimeout(()=>setPulse(false),800);
    },5000);
    return()=>clearInterval(iv);
  },[]);
  return(
    <div style={{animation:'fadeIn 300ms ease'}}>
      <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:16,marginBottom:24}}>
        <KpiCard icon="👥" label="오늘 참여 학생" value="142명" sub="전체 230명 중" color={C.primary}/>
        <KpiCard icon="✅" label="참여율" value="61.7%" sub="전일 대비 +3.2%" color={C.secondary}/>
        <KpiCard icon="📍" label="활성 태그 포인트" value="4개소" sub="체육관·강당 A/B·운동장" color={C.accent}/>
        <KpiCard icon="⏱" label="오늘 누적 태그" value="178회" sub="오전 9시 기준" color="#8B5CF6}"/>
      </div>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:20}}>
        {/* Live Feed */}
        <div style={{background:C.surface,borderRadius:14,padding:20,boxShadow:'0 2px 8px rgba(0,0,0,0.06)',border:`1px solid ${C.border}`}}>
          <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:16}}>
            <div style={{position:'relative',width:12,height:12}}>
              <div style={{
                position:'absolute',inset:0,borderRadius:'50%',background:C.secondary,
                animation:pulse?'nfcRing 800ms ease-out':'none'
              }}/>
              <div style={{position:'absolute',inset:0,borderRadius:'50%',background:C.secondary}}/>
            </div>
            <span style={{fontWeight:700,fontSize:15,color:C.text}}>실시간 NFC 태그 로그</span>
            <Badge text="LIVE" color="green"/>
          </div>
          {feed.slice(0,6).map((r,i)=>(
            <div key={r.id} style={{display:'flex',alignItems:'center',gap:10,padding:'9px 0',
              borderBottom:i<5?`1px solid ${C.border}`:'none',
              animation:'rowFadeIn 400ms ease',animationFillMode:'both',animationDelay:`${i*60}ms`}}>
              <div style={{width:36,height:36,borderRadius:10,background:C.primaryLight,
                display:'flex',alignItems:'center',justifyContent:'center',fontSize:16,flexShrink:0}}>🏷️</div>
              <div style={{flex:1,minWidth:0}}>
                <div style={{fontWeight:600,fontSize:13,color:C.text}}>{r.name} <span style={{color:C.textMuted,fontWeight:400}}>({r.grade}학년 {r.cls}반)</span></div>
                <div style={{fontSize:12,color:C.textSec,marginTop:1}}>{r.location}</div>
              </div>
              <div style={{fontSize:12,color:C.textMuted,fontVariantNumeric:'tabular-nums'}}>{r.time}</div>
            </div>
          ))}
        </div>
        {/* Today Stats */}
        <div style={{background:C.surface,borderRadius:14,padding:20,boxShadow:'0 2px 8px rgba(0,0,0,0.06)',border:`1px solid ${C.border}`}}>
          <div style={{fontWeight:700,fontSize:15,color:C.text,marginBottom:16}}>학년별 참여 현황</div>
          {[
            {grade:'3학년',total:42,done:31,pct:74},
            {grade:'4학년',total:40,done:28,pct:70},
            {grade:'5학년',total:38,done:22,pct:58},
            {grade:'6학년',total:44,done:29,pct:66},
            {grade:'1학년',total:36,done:18,pct:50},
            {grade:'2학년',total:30,done:14,pct:47},
          ].map((r,i)=>(
            <div key={r.grade} style={{marginBottom:14,animation:`slideUp 0.4s ease ${i*60}ms both`}}>
              <div style={{display:'flex',justifyContent:'space-between',fontSize:13,marginBottom:5}}>
                <span style={{fontWeight:600,color:C.text}}>{r.grade}</span>
                <span style={{color:C.textSec}}>{r.done}/{r.total}명 ({r.pct}%)</span>
              </div>
              <div style={{height:8,background:C.bg,borderRadius:99,overflow:'hidden'}}>
                <div style={{height:'100%',width:`${r.pct}%`,background:`linear-gradient(90deg,${C.primary},${C.secondary})`,
                  borderRadius:99,transition:'width 1s ease',animation:'barGrow 1s ease both'}}/>
              </div>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

/* ─── Students ─── */
function Students(){
  const [students,setStudents]=useState(MOCK_STUDENTS);
  const [search,setSearch]=useState('');
  const [grade,setGrade]=useState('');
  const [modal,setModal]=useState(null);
  const [toast,setToast]=useState('');
  const filtered=students.filter(s=>{
    const q=search.toLowerCase();
    return(!q||(s.name.includes(q)||s.nfcId.toLowerCase().includes(q)))&&
      (!grade||s.grade===parseInt(grade));
  });
  const closeModal=()=>setModal(null);
  const showToast=msg=>{setToast(msg);setTimeout(()=>setToast(''),3000)};
  const save=()=>{showToast(modal?.id?'학생 정보가 수정되었습니다.':'학생이 등록되었습니다.');closeModal()};
  const del=()=>{setStudents(prev=>prev.filter(s=>s.id!==modal.item?.id));showToast('학생 정보가 삭제되었습니다.');closeModal()};
  return(
    <div style={{animation:'fadeIn 300ms ease'}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:20}}>
        <div style={{display:'flex',gap:10}}>
          <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="이름 또는 NFC ID 검색"
            style={{padding:'9px 14px',border:`1px solid ${C.border}`,borderRadius:8,fontSize:14,width:220,outline:'none'}}/>
          <select value={grade} onChange={e=>setGrade(e.target.value)}
            style={{padding:'9px 14px',border:`1px solid ${C.border}`,borderRadius:8,fontSize:14,outline:'none'}}>
            <option value="">전체 학년</option>
            {[1,2,3,4,5,6].map(g=><option key={g} value={g}>{g}학년</option>)}
          </select>
        </div>
        <div style={{display:'flex',gap:10}}>
          <button onClick={()=>setModal({type:'csv'})}
            style={{padding:'9px 16px',border:`1px solid ${C.border}`,borderRadius:8,
              fontSize:13,cursor:'pointer',background:C.surface,color:C.text,fontWeight:500}}>CSV 업로드</button>
          <button title="학생 추가" onClick={()=>setModal({type:'create'})}
            style={{padding:'9px 18px',background:C.primary,color:'#fff',border:'none',borderRadius:8,
              fontSize:13,cursor:'pointer',fontWeight:600}}>+ 학생 추가</button>
        </div>
      </div>
      <div style={{background:C.surface,borderRadius:14,border:`1px solid ${C.border}`,overflow:'hidden',boxShadow:'0 2px 8px rgba(0,0,0,0.06)'}}>
        <table style={{width:'100%',borderCollapse:'collapse'}}>
          <thead>
            <tr style={{background:'#F8FAFC'}}>
              {['학번','이름','학년/반','NFC 카드 ID','상태','액션'].map(h=>(
                <th key={h} style={{padding:'12px 16px',textAlign:'left',fontSize:12,fontWeight:700,
                  color:C.textSec,letterSpacing:'0.05em',borderBottom:`1px solid ${C.border}`}}>{h}</th>
              ))}
            </tr>
          </thead>
          <tbody>
            {filtered.map((s,i)=>(
              <tr key={s.id} onClick={()=>setModal({type:'detail',item:s})} style={{cursor:'pointer',
                transition:'background 150ms',animation:`rowFadeIn 300ms ease ${i*40}ms both`}}
                onMouseEnter={e=>e.currentTarget.style.background='#F8FAFC'}
                onMouseLeave={e=>e.currentTarget.style.background='transparent'}>
                <td style={{padding:'12px 16px',fontSize:14,color:C.textSec,borderBottom:`1px solid ${C.border}`}}>{s.no}</td>
                <td style={{padding:'12px 16px',fontSize:14,fontWeight:600,color:C.text,borderBottom:`1px solid ${C.border}`}}>{s.name}</td>
                <td style={{padding:'12px 16px',fontSize:14,color:C.text,borderBottom:`1px solid ${C.border}`}}>{s.grade}학년 {s.cls}반</td>
                <td style={{padding:'12px 16px',fontSize:13,color:C.textSec,fontFamily:'monospace',borderBottom:`1px solid ${C.border}`}}>{s.nfcId}</td>
                <td style={{padding:'12px 16px',borderBottom:`1px solid ${C.border}`}}>
                  <Badge text={s.status==='active'?'활성':'비활성'} color={s.status==='active'?'green':'gray'}/>
                </td>
                <td onClick={e=>e.stopPropagation()} style={{padding:'12px 16px',borderBottom:`1px solid ${C.border}`}}>
                  <div style={{display:'flex',gap:8}}>
                    <button onClick={()=>setModal({type:'edit',item:s})}
                      style={{padding:'5px 12px',background:C.primaryLight,color:C.primary,border:'none',
                        borderRadius:6,fontSize:12,cursor:'pointer',fontWeight:600}}>수정</button>
                    <button onClick={()=>setModal({type:'delete',item:s})}
                      style={{padding:'5px 12px',background:C.dangerLight,color:C.danger,border:'none',
                        borderRadius:6,fontSize:12,cursor:'pointer',fontWeight:600}}>삭제</button>
                  </div>
                </td>
              </tr>
            ))}
          </tbody>
        </table>
        <div style={{padding:'12px 16px',fontSize:13,color:C.textSec,background:'#FAFAFA',borderTop:`1px solid ${C.border}`}}>
          총 {filtered.length}명 표시 중 (전체 {students.length}명)
        </div>
      </div>
      {/* Modals */}
      {modal?.type==='detail'&&<Modal title="학생 상세 정보" onClose={closeModal}>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:16}}>
          {[['학번',modal.item.no],['이름',modal.item.name],['학년',`${modal.item.grade}학년`],['반',`${modal.item.cls}반`],['NFC 카드 ID',modal.item.nfcId]].map(([l,v])=>(
            <div key={l}><div style={{fontSize:12,color:C.textSec,marginBottom:4}}>{l}</div>
            <div style={{fontWeight:600,color:C.text}}>{v}</div></div>
          ))}
          <div><div style={{fontSize:12,color:C.textSec,marginBottom:4}}>상태</div>
            <Badge text={modal.item.status==='active'?'활성':'비활성'} color={modal.item.status==='active'?'green':'gray'}/></div>
        </div>
        <div style={{marginTop:20,display:'flex',gap:10,justifyContent:'flex-end'}}>
          <button onClick={closeModal} style={{padding:'9px 18px',border:`1px solid ${C.border}`,borderRadius:8,cursor:'pointer',background:C.surface}}>닫기</button>
          <button onClick={()=>setModal({type:'edit',item:modal.item})} style={{padding:'9px 18px',background:C.primary,color:'#fff',border:'none',borderRadius:8,cursor:'pointer',fontWeight:600}}>수정하기</button>
        </div>
      </Modal>}
      {(modal?.type==='create'||modal?.type==='edit')&&<Modal title={modal.type==='create'?'학생 추가':'학생 정보 수정'} onClose={closeModal}>
        <div style={{display:'flex',flexDirection:'column',gap:14}}>
          {[['이름','text',modal.item?.name||''],['학번','text',modal.item?.no||''],['NFC 카드 ID','text',modal.item?.nfcId||'']].map(([l,t,v])=>(
            <div key={l}>
              <label style={{fontSize:13,fontWeight:600,color:C.text,display:'block',marginBottom:6}}>{l}</label>
              <input defaultValue={v} type={t} style={{width:'100%',padding:'9px 12px',border:`1px solid ${C.border}`,borderRadius:8,fontSize:14,outline:'none'}}/>
            </div>
          ))}
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>
            <div><label style={{fontSize:13,fontWeight:600,color:C.text,display:'block',marginBottom:6}}>학년</label>
              <select defaultValue={modal.item?.grade||3} style={{width:'100%',padding:'9px 12px',border:`1px solid ${C.border}`,borderRadius:8,fontSize:14,outline:'none'}}>
                {[1,2,3,4,5,6].map(g=><option key={g} value={g}>{g}학년</option>)}</select></div>
            <div><label style={{fontSize:13,fontWeight:600,color:C.text,display:'block',marginBottom:6}}>반</label>
              <select defaultValue={modal.item?.cls||1} style={{width:'100%',padding:'9px 12px',border:`1px solid ${C.border}`,borderRadius:8,fontSize:14,outline:'none'}}>
                {[1,2,3,4].map(c=><option key={c} value={c}>{c}반</option>)}</select></div>
          </div>
          <div style={{display:'flex',gap:10,justifyContent:'flex-end',marginTop:8}}>
            <button onClick={closeModal} style={{padding:'9px 18px',border:`1px solid ${C.border}`,borderRadius:8,cursor:'pointer',background:C.surface}}>취소</button>
            <button onClick={save} style={{padding:'9px 20px',background:C.primary,color:'#fff',border:'none',borderRadius:8,cursor:'pointer',fontWeight:600}}>저장</button>
          </div>
        </div>
      </Modal>}
      {modal?.type==='delete'&&<Modal title="학생 삭제 확인" onClose={closeModal}>
        <p style={{color:C.text,lineHeight:1.6}}><strong>{modal.item?.name}</strong> 학생 정보를 삭제하면 관련 참여 이력도 함께 삭제됩니다. 계속하시겠습니까?</p>
        <div style={{display:'flex',gap:10,justifyContent:'flex-end',marginTop:20}}>
          <button onClick={closeModal} style={{padding:'9px 18px',border:`1px solid ${C.border}`,borderRadius:8,cursor:'pointer',background:C.surface}}>취소</button>
          <button onClick={del} style={{padding:'9px 20px',background:C.danger,color:'#fff',border:'none',borderRadius:8,cursor:'pointer',fontWeight:600}}>삭제</button>
        </div>
      </Modal>}
      {modal?.type==='csv'&&<Modal title="CSV 일괄 업로드" onClose={closeModal}>
        <p style={{color:C.textSec,fontSize:14,marginBottom:16}}>CSV 파일을 업로드하여 학생 정보를 일괄 등록합니다.<br/>형식: 학번, 이름, 학년, 반, NFC카드ID</p>
        <div style={{border:`2px dashed ${C.border}`,borderRadius:10,padding:40,textAlign:'center',cursor:'pointer',background:'#FAFBFC'}}>
          <div style={{fontSize:36,marginBottom:8}}>📄</div>
          <div style={{fontWeight:600,color:C.text}}>CSV 파일 드래그 또는 클릭하여 업로드</div>
          <div style={{fontSize:13,color:C.textMuted,marginTop:4}}>최대 500행 지원</div>
        </div>
        <div style={{display:'flex',gap:10,justifyContent:'flex-end',marginTop:16}}>
          <button onClick={closeModal} style={{padding:'9px 18px',border:`1px solid ${C.border}`,borderRadius:8,cursor:'pointer',background:C.surface}}>취소</button>
          <button onClick={()=>{showToast('CSV 업로드가 완료되었습니다.');closeModal()}} style={{padding:'9px 20px',background:C.primary,color:'#fff',border:'none',borderRadius:8,cursor:'pointer',fontWeight:600}}>업로드</button>
        </div>
      </Modal>}
      {toast&&<Toast msg={toast} onClose={()=>setToast('')}/>}
    </div>
  );
}

/* ─── History ─── */
function History(){
  const [dateFrom,setDateFrom]=useState('2026-04-21');
  const [dateTo,setDateTo]=useState('2026-04-22');
  const [grade,setGrade]=useState('');
  const [status,setStatus]=useState('');
  const [modal,setModal]=useState(null);
  const filtered=MOCK_HISTORY.filter(h=>{
    return h.date>=dateFrom&&h.date<=dateTo&&
      (!grade||h.grade===parseInt(grade))&&
      (!status||h.status===status);
  });
  return(
    <div style={{animation:'fadeIn 300ms ease'}}>
      <div style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:12,padding:16,marginBottom:20,display:'flex',gap:12,flexWrap:'wrap',boxShadow:'0 2px 8px rgba(0,0,0,0.04)'}}>
        <div style={{display:'flex',alignItems:'center',gap:8}}>
          <span style={{fontSize:13,color:C.textSec,fontWeight:500}}>기간</span>
          <input type="date" value={dateFrom} onChange={e=>setDateFrom(e.target.value)}
            style={{padding:'7px 10px',border:`1px solid ${C.border}`,borderRadius:8,fontSize:13,outline:'none'}}/>
          <span style={{color:C.textMuted}}>~</span>
          <input type="date" value={dateTo} onChange={e=>setDateTo(e.target.value)}
            style={{padding:'7px 10px',border:`1px solid ${C.border}`,borderRadius:8,fontSize:13,outline:'none'}}/>
        </div>
        <select value={grade} onChange={e=>setGrade(e.target.value)}
          style={{padding:'7px 12px',border:`1px solid ${C.border}`,borderRadius:8,fontSize:13,outline:'none'}}>
          <option value="">전체 학년</option>
          {[1,2,3,4,5,6].map(g=><option key={g} value={g}>{g}학년</option>)}
        </select>
        <select value={status} onChange={e=>setStatus(e.target.value)}
          style={{padding:'7px 12px',border:`1px solid ${C.border}`,borderRadius:8,fontSize:13,outline:'none'}}>
          <option value="">전체 상태</option>
          <option value="정상">정상</option>
          <option value="지각">지각</option>
        </select>
      </div>
      <div style={{background:C.surface,borderRadius:14,border:`1px solid ${C.border}`,overflow:'hidden',boxShadow:'0 2px 8px rgba(0,0,0,0.06)'}}>
        <table style={{width:'100%',borderCollapse:'collapse'}}>
          <thead>
            <tr style={{background:'#F8FAFC'}}>
              {['날짜','시간','이름','학년/반','태그 장소','상태'].map(h=>(
                <th key={h} style={{padding:'12px 16px',textAlign:'left',fontSize:12,fontWeight:700,color:C.textSec,borderBottom:`1px solid ${C.border}`}}>{h}</th>
              ))}
            </tr>
          </thead>
          <tbody>
            {filtered.map((h,i)=>(
              <tr key={h.id} onClick={()=>setModal(h)} style={{cursor:'pointer',transition:'background 150ms',
                animation:`rowFadeIn 300ms ease ${i*50}ms both`}}
                onMouseEnter={e=>e.currentTarget.style.background='#F8FAFC'}
                onMouseLeave={e=>e.currentTarget.style.background='transparent'}>
                <td style={{padding:'12px 16px',fontSize:13,color:C.textSec,borderBottom:`1px solid ${C.border}`}}>{h.date}</td>
                <td style={{padding:'12px 16px',fontSize:13,fontFamily:'monospace',color:C.text,borderBottom:`1px solid ${C.border}`}}>{h.time}</td>
                <td style={{padding:'12px 16px',fontWeight:600,fontSize:14,color:C.text,borderBottom:`1px solid ${C.border}`}}>{h.name}</td>
                <td style={{padding:'12px 16px',fontSize:13,color:C.text,borderBottom:`1px solid ${C.border}`}}>{h.grade}학년 {h.cls}반</td>
                <td style={{padding:'12px 16px',fontSize:13,color:C.textSec,borderBottom:`1px solid ${C.border}`}}>{h.location}</td>
                <td style={{padding:'12px 16px',borderBottom:`1px solid ${C.border}`}}>
                  <Badge text={h.status} color={h.status==='정상'?'green':'yellow'}/>
                </td>
              </tr>
            ))}
            {filtered.length===0&&<tr><td colSpan={6} style={{padding:40,textAlign:'center',color:C.textMuted,fontSize:14}}>조건에 맞는 이력이 없습니다.</td></tr>}
          </tbody>
        </table>
        <div style={{padding:'12px 16px',fontSize:13,color:C.textSec,background:'#FAFAFA',borderTop:`1px solid ${C.border}`}}>
          총 {filtered.length}건 조회됨
        </div>
      </div>
      {modal&&<Modal title="참여 이력 상세" onClose={()=>setModal(null)}>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:16}}>
          {[['날짜',modal.date],['시간',modal.time],['이름',modal.name],['학년/반',`${modal.grade}학년 ${modal.cls}반`],['태그 장소',modal.location]].map(([l,v])=>(
            <div key={l}><div style={{fontSize:12,color:C.textSec,marginBottom:4}}>{l}</div>
            <div style={{fontWeight:600,color:C.text}}>{v}</div></div>
          ))}
          <div><div style={{fontSize:12,color:C.textSec,marginBottom:4}}>참여 상태</div>
            <Badge text={modal.status} color={modal.status==='정상'?'green':'yellow'}/></div>
        </div>
        <div style={{marginTop:20,textAlign:'right'}}>
          <button onClick={()=>setModal(null)} style={{padding:'9px 18px',background:C.primary,color:'#fff',border:'none',borderRadius:8,cursor:'pointer',fontWeight:600}}>닫기</button>
        </div>
      </Modal>}
    </div>
  );
}

/* ─── Export ─── */
function Export(){
  const [form,setForm]=useState({dateFrom:'2026-04-01',dateTo:'2026-04-22',grade:'',cls:'',format:'xlsx'});
  const [loading,setLoading]=useState(false);
  const [progress,setProgress]=useState(0);
  const [done,setDone]=useState(false);
  const set=k=>v=>setForm(p=>({...p,[k]:v}));
  const download=()=>{
    setLoading(true);setProgress(0);setDone(false);
    let p=0;
    const iv=setInterval(()=>{p+=Math.random()*20;if(p>=100){p=100;clearInterval(iv);
      setTimeout(()=>{setLoading(false);setDone(true)},300);}setProgress(p);},200);
  };
  return(
    <div style={{animation:'fadeIn 300ms ease',maxWidth:680}}>
      <div style={{background:C.surface,borderRadius:14,padding:28,border:`1px solid ${C.border}`,boxShadow:'0 2px 8px rgba(0,0,0,0.06)',marginBottom:20}}>
        <h3 style={{fontSize:16,fontWeight:700,color:C.text,marginBottom:20}}>내보내기 옵션 설정</h3>
        <div style={{display:'flex',flexDirection:'column',gap:18}}>
          <div>
            <label style={{fontSize:13,fontWeight:600,color:C.text,display:'block',marginBottom:8}}>조회 기간</label>
            <div style={{display:'flex',gap:10,alignItems:'center'}}>
              <input type="date" value={form.dateFrom} onChange={e=>set('dateFrom')(e.target.value)}
                style={{flex:1,padding:'9px 12px',border:`1px solid ${C.border}`,borderRadius:8,fontSize:14,outline:'none'}}/>
              <span style={{color:C.textMuted}}>~</span>
              <input type="date" value={form.dateTo} onChange={e=>set('dateTo')(e.target.value)}
                style={{flex:1,padding:'9px 12px',border:`1px solid ${C.border}`,borderRadius:8,fontSize:14,outline:'none'}}/>
            </div>
          </div>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>
            <div><label style={{fontSize:13,fontWeight:600,color:C.text,display:'block',marginBottom:8}}>학년 (선택)</label>
              <select value={form.grade} onChange={e=>set('grade')(e.target.value)}
                style={{width:'100%',padding:'9px 12px',border:`1px solid ${C.border}`,borderRadius:8,fontSize:14,outline:'none'}}>
                <option value="">전체 학년</option>
                {[1,2,3,4,5,6].map(g=><option key={g} value={g}>{g}학년</option>)}</select></div>
            <div><label style={{fontSize:13,fontWeight:600,color:C.text,display:'block',marginBottom:8}}>반 (선택)</label>
              <select value={form.cls} onChange={e=>set('cls')(e.target.value)}
                style={{width:'100%',padding:'9px 12px',border:`1px solid ${C.border}`,borderRadius:8,fontSize:14,outline:'none'}}>
                <option value="">전체 반</option>
                {[1,2,3,4].map(c=><option key={c} value={c}>{c}반</option>)}</select></div>
          </div>
          <div>
            <label style={{fontSize:13,fontWeight:600,color:C.text,display:'block',marginBottom:8}}>파일 형식</label>
            <div style={{display:'flex',gap:12}}>
              {[['xlsx','Excel (.xlsx)'],['csv','CSV (.csv)']].map(([v,l])=>(
                <label key={v} style={{display:'flex',alignItems:'center',gap:8,cursor:'pointer'}}>
                  <input type="radio" name="format" value={v} checked={form.format===v} onChange={()=>set('format')(v)}/>
                  <span style={{fontSize:14,color:C.text}}>{l}</span>
                </label>
              ))}
            </div>
          </div>
        </div>
        {loading&&(
          <div style={{marginTop:20}}>
            <div style={{display:'flex',justifyContent:'space-between',fontSize:13,color:C.textSec,marginBottom:6}}>
              <span>파일 생성 중...</span><span>{Math.round(progress)}%</span>
            </div>
            <div style={{height:8,background:C.bg,borderRadius:99,overflow:'hidden'}}>
              <div style={{height:'100%',width:`${progress}%`,background:`linear-gradient(90deg,${C.primary},${C.secondary})`,
                borderRadius:99,transition:'width 200ms linear'}}/>
            </div>
          </div>
        )}
        {done&&(
          <div style={{marginTop:16,padding:'12px 16px',background:C.secondaryLight,borderRadius:10,display:'flex',alignItems:'center',gap:10,animation:'fadeIn 300ms ease'}}>
            <span style={{fontSize:20}}>✅</span>
            <div>
              <div style={{fontWeight:700,color:C.secondary,fontSize:14}}>엑셀 파일이 생성되었습니다</div>
              <div style={{fontSize:12,color:C.textSec,marginTop:2}}>participation_2026-04-01_2026-04-22.xlsx (다운로드 완료)</div>
            </div>
          </div>
        )}
        <div style={{marginTop:20,display:'flex',justifyContent:'flex-end'}}>
          <button title="데이터 내보내기" onClick={download} disabled={loading}
            style={{padding:'10px 24px',background:loading?C.textMuted:C.primary,color:'#fff',border:'none',
              borderRadius:9,fontSize:14,cursor:loading?'not-allowed':'pointer',fontWeight:700,
              display:'flex',alignItems:'center',gap:8}}>
            {loading?<span style={{display:'inline-block',width:16,height:16,border:'2px solid #fff',borderTopColor:'transparent',borderRadius:'50%',animation:'spin 600ms linear infinite'}}/>:'⬇'}
            {loading?'생성 중...':'엑셀 다운로드'}
          </button>
        </div>
      </div>
      <div style={{background:C.accentLight,borderRadius:12,padding:16,border:`1px solid #FDE68A`,fontSize:13,color:'#92400E'}}>
        💡 내보내기 파일에는 학번, 이름, 학년, 반, 참여일, 참여시간, 태그 장소, 상태 컬럼이 포함됩니다.
      </div>
    </div>
  );
}

/* ─── Sidebar & Main App ─── */
const NAV=[
  {id:'dashboard',icon:'🏠',label:'대시보드'},
  {id:'students',icon:'👤',label:'학생 관리'},
  {id:'history',icon:'📋',label:'참여 이력'},
  {id:'export',icon:'데이터 내보내기',label:'데이터 내보내기'},
];

function App(){
  const [page,setPage]=useState('dashboard');

      <aside style={{width:240,background:C.sidebar,display:'flex',flexDirection:'column',flexShrink:0}}>
        {/* Logo */}
        <div style={{padding:'24px 20px 20px',borderBottom:'1px solid rgba(255,255,255,0.08)'}}>
          <div style={{display:'flex',alignItems:'center',gap:10}}>
            <div style={{width:36,height:36,borderRadius:10,background:'linear-gradient(135deg,#3B82F6,#10B981)',
              display:'flex',alignItems:'center',justifyContent:'center',fontSize:18}}>🏷</div>
            <div>
              <div style={{color:'#fff',fontWeight:800,fontSize:14,lineHeight:1.2}}>NFC 참여 관리</div>
              <div style={{color:'rgba(255,255,255,0.4)',fontSize:11,marginTop:1}}>건강증진 프로그램</div>
            </div>
          </div>
        </div>
        {/* Nav */}
        <nav style={{flex:1,padding:'12px 10px',overflowY:'auto'}}>
          <div style={{fontSize:11,color:'rgba(255,255,255,0.35)',letterSpacing:'0.08em',padding:'8px 10px',marginBottom:4}}>MAIN MENU</div>
          {[
            {id:'dashboard',icon:'🏠',label:'대시보드'},
            {id:'students',icon:'👤',label:'학생 관리'},
            {id:'history',icon:'📋',label:'참여 이력'},
            {id:'export',icon:'⬇',label:'데이터 내보내기'},
          ].map(item=>{
            const active=page===item.id;
            return(
              <button key={item.id} title={item.label} onClick={()=>setPage(item.id)}
                style={{width:'100%',display:'flex',alignItems:'center',gap:10,padding:'10px 12px',
                  borderRadius:9,border:'none',cursor:'pointer',textAlign:'left',marginBottom:2,
                  background:active?C.sidebarActive:'transparent',
                  color:active?'#fff':'rgba(255,255,255,0.6)',
                  fontWeight:active?700:400,fontSize:14,transition:'all 150ms'}}>
                <span style={{fontSize:17}}>{item.icon}</span>
                {item.label}
                {active&&<div style={{marginLeft:'auto',width:6,height:6,borderRadius:'50%',background:C.secondary}}/>}
              </button>
            );
          })}
        </nav>
        {/* User */}
        <div style={{padding:'14px 20px',borderTop:'1px solid rgba(255,255,255,0.08)',display:'flex',alignItems:'center',gap:10}}>
          <div style={{width:34,height:34,borderRadius:50,background:'linear-gradient(135deg,#6366F1,#8B5CF6)',
            display:'flex',alignItems:'center',justifyContent:'center',color:'#fff',fontWeight:700,fontSize:14,flexShrink:0}}>관</div>
          <div>
            <div style={{color:'#fff',fontWeight:600,fontSize:13}}>김관리자</div>
            <div style={{color:'rgba(255,255,255,0.4)',fontSize:11}}>시스템 관리자</div>
          </div>
        </div>
      </aside>
      {/* Main */}
      <div style={{flex:1,display:'flex',flexDirection:'column',minWidth:0}}>
        {/* TopBar */}
        <header style={{height:56,background:C.surface,borderBottom:`1px solid ${C.border}`,
          display:'flex',alignItems:'center',padding:'0 24px',gap:12,flexShrink:0}}>
          <h2 style={{fontSize:16,fontWeight:700,color:C.text,flex:1}}>{PAGE_TITLES[page]}</h2>
          <div style={{display:'flex',gap:8,alignItems:'center'}}>
            <div style={{padding:'6px 14px',background:C.secondaryLight,borderRadius:8,
              display:'flex',alignItems:'center',gap:6,fontSize:12,fontWeight:600,color:C.secondary}}>
              <div style={{width:7,height:7,borderRadius:'50%',background:C.secondary,animation:'pulse 2s infinite'}}/>
              NFC 연결됨
            </div>
            <div style={{width:34,height:34,borderRadius:50,background:`linear-gradient(135deg,${C.primary},#6366F1)`,
              display:'flex',alignItems:'center',justifyContent:'center',color:'#fff',fontSize:13,fontWeight:700,cursor:'pointer'}}>K</div>
          </div>
        </header>
        {/* Content */}
        <main style={{flex:1,overflowY:'auto',padding:24,background:C.bg}}>
          {pages[page]}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
