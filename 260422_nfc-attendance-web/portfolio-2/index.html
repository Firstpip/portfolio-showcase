<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>건강증진 프로그램 통합 관리 플랫폼 — 구현 데모</title>
<link rel="preconnect" href="https://cdn.jsdelivr.net/npm/pretendard@1.3.9/dist/web/static/pretendard.css"/>
<link href="https://cdn.jsdelivr.net/npm/pretendard@1.3.9/dist/web/static/pretendard.css" rel="stylesheet"/>
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://unpkg.com/prop-types/prop-types.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;min-height:100%;font-family:'Pretendard',-apple-system,sans-serif}
#root{display:flex;flex-direction:column;width:100%;min-height:100vh}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideInRight{from{transform:translateX(100%);opacity:0}to{transform:translateX(0);opacity:1}}
@keyframes countUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@keyframes toastIn{from{opacity:0;transform:translateX(100%)}to{opacity:1;transform:translateX(0)}}
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
@keyframes heroIn{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:translateY(0)}}
@keyframes cardHover{0%{transform:translateY(0)}50%{transform:translateY(-3px)}100%{transform:translateY(0)}}
@keyframes progressFill{from{width:0}to{width:var(--w)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.6}}
@keyframes badgePop{0%{transform:scale(0.7);opacity:0}100%{transform:scale(1);opacity:1}}
@keyframes tabSlide{from{width:0;opacity:0}to{opacity:1}}
@keyframes fadeInScale{from{opacity:0;transform:scale(0.94)}to{opacity:1;transform:scale(1)}}
@keyframes slideUp{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}
@keyframes ripple{0%{transform:scale(0);opacity:0.5}100%{transform:scale(3.5);opacity:0}}
@keyframes barGrow{from{width:0}to{width:100%}}
@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
@keyframes slideDown{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useRef,useCallback}=React;

const C={
  primary:'#7C3AED',primaryDark:'#6D28D9',primaryLight:'#F5F3FF',
  accent:'#F97316',accentLight:'#FFF7ED',
  cyan:'#06B6D4',cyanLight:'#ECFEFF',
  green:'#10B981',greenLight:'#ECFDF5',
  yellow:'#F59E0B',yellowLight:'#FFFBEB',
  red:'#EF4444',redLight:'#FEF2F2',
  bg:'#FAFAFA',surface:'#FFFFFF',border:'#E5E7EB',
  text:'#111827',textSec:'#6B7280',textMuted:'#9CA3AF',
};

/* ─── Toast ─── */
function Toast({msg,onClose}){
  useEffect(()=>{const t=setTimeout(onClose,2800);return()=>clearTimeout(t)},[]);
  return(
    <div style={{position:'fixed',bottom:24,right:24,background:C.primary,color:'#fff',
      padding:'12px 20px',borderRadius:10,boxShadow:'0 8px 24px rgba(124,58,237,0.3)',
      zIndex:9999,animation:'toastIn 300ms ease',display:'flex',alignItems:'center',gap:8,fontSize:14}}>
      <span style={{fontSize:18}}>✅</span>{msg}
    </div>
  );
}

/* ─── Drawer ─── */
function Drawer({item,onClose,children}){
  return(
    <>
      <div onClick={onClose} style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.35)',zIndex:200}}/>
      <div style={{position:'fixed',top:0,right:0,bottom:0,width:460,background:C.surface,
        boxShadow:'-8px 0 40px rgba(0,0,0,0.12)',zIndex:201,overflowY:'auto',padding:28,
        animation:'slideInRight 220ms ease'}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:22}}>
          <h3 style={{fontSize:17,fontWeight:700,color:C.text}}>{item?.title||'상세 정보'}</h3>
          <button onClick={onClose} style={{background:'none',border:'none',cursor:'pointer',color:C.textMuted,fontSize:22}}>&times;</button>
        </div>
        {children}
      </div>
    </>
  );
}

/* ─── Modal ─── */
function Modal({title,children,onClose}){
  return(
    <div onClick={e=>e.target===e.currentTarget&&onClose()} style={{
      position:'fixed',inset:0,background:'rgba(0,0,0,0.4)',zIndex:500,
      display:'flex',alignItems:'center',justifyContent:'center',animation:'fadeIn 200ms ease'}}>
      <div style={{background:C.surface,borderRadius:16,padding:28,width:520,maxHeight:'88vh',
        overflowY:'auto',boxShadow:'0 24px 64px rgba(0,0,0,0.16)',animation:'fadeIn 200ms ease'}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:20}}>
          <h3 style={{fontSize:17,fontWeight:700,color:C.text}}>{title}</h3>
          <button onClick={onClose} style={{background:'none',border:'none',cursor:'pointer',color:C.textMuted,fontSize:22}}>&times;</button>
        </div>
        {children}
      </div>
    </div>
  );
}

function Badge({text,color='gray'}){
  const map={green:{bg:C.greenLight,c:C.green},yellow:{bg:C.yellowLight,c:'#D97706'},
    red:{bg:C.redLight,c:C.red},purple:{bg:C.primaryLight,c:C.primary},
    cyan:{bg:C.cyanLight,c:C.cyan},gray:{bg:'#F3F4F6',c:C.textSec}};
  const s=map[color]||map.gray;
  return<span style={{background:s.bg,color:s.c,fontSize:12,fontWeight:700,
    padding:'3px 10px',borderRadius:20,animation:'badgePop 300ms ease'}}>{text}</span>;
}

/* ─── Hero Banner ─── */
function HeroBanner({icon,title,kpis,gradient}){
  return(
    <div style={{background:gradient,padding:'26px 32px',animation:'heroIn 350ms ease',
      boxShadow:'0 4px 24px rgba(0,0,0,0.15)'}}>
      <div style={{display:'flex',alignItems:'flex-start',gap:14}}>
        <div style={{width:46,height:46,borderRadius:14,background:'rgba(255,255,255,0.2)',
          display:'flex',alignItems:'center',justifyContent:'center',fontSize:24}}>{icon}</div>
        <div style={{flex:1}}>
          <h2 style={{color:'#fff',fontSize:22,fontWeight:800,letterSpacing:-0.5}}>{title}</h2>
          <div style={{display:'flex',gap:28,marginTop:12,flexWrap:'wrap'}}>
            {kpis.map(k=>(
              <div key={k.label} style={{animation:'countUp 0.5s ease'}}>
                <div style={{color:'rgba(255,255,255,0.7)',fontSize:12,marginBottom:3}}>{k.label}</div>
                <div style={{color:'#fff',fontSize:22,fontWeight:800,letterSpacing:-0.5}}>{k.value}</div>
              </div>
            ))}
          </div>
        </div>
      </div>
    </div>
  );
}

/* ─── Dashboard Page ─── */
const PROGRAMS=[
  {id:1,name:'체력측정 프로그램',icon:'🏃',participants:142,total:230,rate:61.7,locations:['체육관 입구','운동장'],color:C.primary},
  {id:2,name:'영양교육 프로그램',icon:'🥗',participants:198,total:230,rate:86.1,locations:['강당 A동'],color:C.green},
  {id:3,name:'명상·마음챙김',icon:'🧘',participants:87,total:230,rate:37.8,locations:['강당 B동'],color:C.cyan},
  {id:4,name:'보건교육 프로그램',icon:'🏥',participants:215,total:230,rate:93.5,locations:['보건실'],color:C.accent},
];

const RECENT_TAGS=[
  {id:1,time:'09:47',name:'강예준',program:'체력측정 프로그램',grade:6},
  {id:2,time:'09:46',name:'조아린',program:'영양교육 프로그램',grade:6},
  {id:3,time:'09:44',name:'윤시우',program:'체력측정 프로그램',grade:5},
  {id:4,time:'09:42',name:'정하윤',program:'명상·마음챙김',grade:5},
  {id:5,time:'09:40',name:'박도윤',program:'보건교육 프로그램',grade:4},
];

function DashboardPage(){
  const [drawer,setDrawer]=useState(null);
  const [liveTags,setLiveTags]=useState(RECENT_TAGS);
  useEffect(()=>{
    const iv=setInterval(()=>{
      const names=['김민준','이서연','최지우'];
      const progs=PROGRAMS.map(p=>p.name);
      const n=names[Math.floor(Math.random()*names.length)];
      const p=progs[Math.floor(Math.random()*progs.length)];
      const m=new Date();
      const t=`${String(m.getHours()).padStart(2,'0')}:${String(m.getMinutes()).padStart(2,'0')}`;
      setLiveTags(prev=>[{id:Date.now(),time:t,name:n,program:p,grade:3},...prev.slice(0,7)]);
    },6000);
    return()=>clearInterval(iv);
  },[]);
  return(
    <div style={{padding:'24px 32px',animation:'fadeIn 300ms ease'}}>
      <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:16,marginBottom:24}}>
        {[
          {label:'전체 학생 수',value:'230명',icon:'👥',color:C.primary},
          {label:'오늘 참여 학생',value:'189명',icon:'✅',color:C.green},
          {label:'운영 프로그램',value:'4개',icon:'📋',color:C.cyan},
          {label:'오늘 태그 횟수',value:'642회',icon:'🏷',color:C.accent},
        ].map(k=>(
          <div key={k.label} onClick={()=>setDrawer({title:k.label,body:`${k.label} 상세 현황`,value:k.value})}
            style={{background:C.surface,borderRadius:14,padding:'18px 20px',cursor:'pointer',
              border:`1px solid ${C.border}`,boxShadow:'0 2px 8px rgba(0,0,0,0.05)',
              transition:'box-shadow 200ms,transform 200ms',animation:'countUp 0.4s ease'}}
            onMouseEnter={e=>{e.currentTarget.style.boxShadow='0 8px 24px rgba(0,0,0,0.10)';e.currentTarget.style.transform='translateY(-2px)'}}
            onMouseLeave={e=>{e.currentTarget.style.boxShadow='0 2px 8px rgba(0,0,0,0.05)';e.currentTarget.style.transform='translateY(0)'}}>
            <div style={{fontSize:26,marginBottom:6}}>{k.icon}</div>
            <div style={{fontSize:24,fontWeight:800,color:C.text}}>{k.value}</div>
            <div style={{fontSize:13,color:C.textSec,marginTop:4}}>{k.label}</div>
          </div>
        ))}
      </div>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:20}}>
        {/* Programs */}
        <div style={{background:C.surface,borderRadius:14,padding:20,border:`1px solid ${C.border}`,boxShadow:'0 2px 8px rgba(0,0,0,0.05)'}}>
          <div style={{fontWeight:700,fontSize:15,color:C.text,marginBottom:16}}>프로그램별 참여 현황</div>
          {PROGRAMS.map((p,i)=>(
            <div key={p.id} onClick={()=>setDrawer({title:p.name,program:p})}
              style={{padding:'10px 0',borderBottom:`1px solid ${C.border}`,cursor:'pointer',
                transition:'background 150ms',borderRadius:8,marginBottom:2,
                animation:`slideUp 0.4s ease ${i*80}ms both`}}
              onMouseEnter={e=>e.currentTarget.style.background='#FAFAFA'}
              onMouseLeave={e=>e.currentTarget.style.background='transparent'}>
              <div style={{display:'flex',alignItems:'center',gap:10,paddingInline:4}}>
                <span style={{fontSize:22}}>{p.icon}</span>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{display:'flex',justifyContent:'space-between',marginBottom:5}}>
                    <span style={{fontWeight:600,fontSize:13,color:C.text}}>{p.name}</span>
                    <span style={{fontSize:13,color:C.textSec,fontWeight:700}}>{p.rate}%</span>
                  </div>
                  <div style={{height:7,background:'#F3F4F6',borderRadius:99,overflow:'hidden'}}>
                    <div style={{height:'100%',width:`${p.rate}%`,background:p.color,borderRadius:99,transition:'width 1s ease'}}/>
                  </div>
                  <div style={{fontSize:11,color:C.textMuted,marginTop:3}}>{p.participants}/{p.total}명 참여</div>
                </div>
              </div>
            </div>
          ))}
        </div>
        {/* Live Tags */}
        <div style={{background:C.surface,borderRadius:14,padding:20,border:`1px solid ${C.border}`,boxShadow:'0 2px 8px rgba(0,0,0,0.05)'}}>
          <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:16}}>
            <div style={{width:8,height:8,borderRadius:'50%',background:C.green,animation:'pulse 1.5s infinite'}}/>
            <span style={{fontWeight:700,fontSize:15,color:C.text}}>실시간 최근 태그</span>
            <Badge text="LIVE" color="green"/>
          </div>
          {liveTags.slice(0,6).map((t,i)=>(
            <div key={t.id} style={{display:'flex',gap:12,padding:'9px 0',
              borderBottom:i<5?`1px solid ${C.border}`:'none',animation:'fadeIn 400ms ease'}}>
              <div style={{width:36,height:36,borderRadius:10,background:C.primaryLight,
                display:'flex',alignItems:'center',justifyContent:'center',fontSize:16,flexShrink:0}}>🏷</div>
              <div style={{flex:1}}>
                <div style={{fontWeight:600,fontSize:13,color:C.text}}>{t.name} <span style={{color:C.textMuted,fontSize:12}}>({t.grade}학년)</span></div>
                <div style={{fontSize:11,color:C.textSec,marginTop:2}}>{t.program}</div>
              </div>
              <div style={{fontSize:12,color:C.textMuted}}>{t.time}</div>
            </div>
          ))}
        </div>
      </div>
      {drawer&&<Drawer item={drawer} onClose={()=>setDrawer(null)}>
        {drawer.program?(
          <div>
            <div style={{fontSize:48,textAlign:'center',marginBottom:12}}>{drawer.program.icon}</div>
            <div style={{marginBottom:16}}>
              <div style={{fontSize:13,color:C.textSec,marginBottom:4}}>전체 참여율</div>
              <div style={{fontSize:36,fontWeight:800,color:drawer.program.color}}>{drawer.program.rate}%</div>
            </div>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12,marginBottom:16}}>
              {[['참여 학생',`${drawer.program.participants}명`],['전체 학생',`${drawer.program.total}명`]].map(([l,v])=>(
                <div key={l} style={{background:C.bg,borderRadius:10,padding:12}}>
                  <div style={{fontSize:12,color:C.textSec}}>{l}</div>
                  <div style={{fontWeight:700,fontSize:18,color:C.text,marginTop:2}}>{v}</div>
                </div>
              ))}
            </div>
            <div style={{marginBottom:12}}>
              <div style={{fontSize:13,color:C.textSec,marginBottom:6}}>태그 포인트</div>
              {drawer.program.locations.map(l=>(
                <div key={l} style={{padding:'8px 12px',background:C.primaryLight,borderRadius:8,marginBottom:6,fontSize:13,color:C.primary,fontWeight:500}}>📍 {l}</div>
              ))}
            </div>
          </div>
        ):(
          <div style={{padding:24,textAlign:'center'}}>
            <div style={{fontSize:48,marginBottom:8}}>📊</div>
            <div style={{fontSize:20,fontWeight:700,color:C.text}}>{drawer.value}</div>
            <div style={{fontSize:13,color:C.textSec,marginTop:4}}>{drawer.title} 기준</div>
          </div>
        )}
      </Drawer>}
    </div>
  );
}

/* ─── Analytics Page ─── */
function AnalyticsPage(){
  const chartRef=useRef(null);
  const chartInst=useRef(null);
  const [grade,setGrade]=useState('전체');
  const [period,setPeriod]=useState('weekly');
  const [drawer,setDrawer]=useState(null);
  useEffect(()=>{
    if(!chartRef.current)return;
    if(chartInst.current)chartInst.current.destroy();
    const labels=period==='weekly'?['4/14','4/15','4/16','4/17','4/18','4/21','4/22']:
      ['3월','4월','5월'];
    const data1=period==='weekly'?[82,78,91,85,88,76,87]:[75,84,82];
    const data2=period==='weekly'?[68,72,80,74,79,70,82]:[66,78,80];
    chartInst.current=new Chart(chartRef.current,{
      type:'bar',
      data:{
        labels,
        datasets:[
          {label:'체력측정',data:data1,backgroundColor:'rgba(124,58,237,0.7)',borderRadius:6},
          {label:'영양교육',data:data2,backgroundColor:'rgba(6,182,212,0.7)',borderRadius:6},
        ]
      },
      options:{responsive:true,maintainAspectRatio:false,
        plugins:{legend:{position:'top'},tooltip:{mode:'index'}},
        scales:{y:{beginAtZero:true,max:100,ticks:{callback:v=>`${v}%`}}}}
    });
    return()=>chartInst.current?.destroy();
  },[grade,period]);

  const LOW_CLASSES=[
    {grade:'5학년',cls:'3반',rate:38,students:12,absent:20},
    {grade:'1학년',cls:'2반',rate:44,students:11,absent:14},
    {grade:'2학년',cls:'1반',rate:47,students:9,absent:11},
  ];
  return(
    <div style={{padding:'24px 32px',animation:'fadeIn 300ms ease'}}>
      <div style={{background:C.surface,borderRadius:14,border:`1px solid ${C.border}`,padding:20,marginBottom:20,boxShadow:'0 2px 8px rgba(0,0,0,0.05)'}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16}}>
          <div style={{fontWeight:700,fontSize:15,color:C.text}}>프로그램별 참여 추이</div>
          <div style={{display:'flex',gap:10}}>
            <select value={grade} onChange={e=>setGrade(e.target.value)}
              style={{padding:'7px 12px',border:`1px solid ${C.border}`,borderRadius:8,fontSize:13,outline:'none'}}>
              {['전체','3학년','4학년','5학년','6학년'].map(g=><option key={g}>{g}</option>)}
            </select>
            <select value={period} onChange={e=>setPeriod(e.target.value)}
              style={{padding:'7px 12px',border:`1px solid ${C.border}`,borderRadius:8,fontSize:13,outline:'none'}}>
              <option value="weekly">주간</option>
              <option value="monthly">월간</option>
            </select>
          </div>
        </div>
        <div className="chart-canvas-wrap" style={{position:'relative',height:260}}>
          <canvas ref={chartRef} style={{width:'100%',height:'100%'}}/>
        </div>
      </div>
      <div style={{background:C.surface,borderRadius:14,border:`1px solid ${C.border}`,padding:20,boxShadow:'0 2px 8px rgba(0,0,0,0.05)'}}>
        <div style={{fontWeight:700,fontSize:15,color:C.text,marginBottom:4}}>참여율 하위 학급</div>
        <div style={{fontSize:13,color:C.textSec,marginBottom:16}}>50% 미만 학급 자동 감지</div>
        <table style={{width:'100%',borderCollapse:'collapse'}}>
          <thead>
            <tr style={{background:'#F9FAFB'}}>
              {['학급','참여율','참여학생','미참여','조치'].map(h=>(
                <th key={h} style={{padding:'10px 14px',textAlign:'left',fontSize:12,fontWeight:700,color:C.textSec,borderBottom:`1px solid ${C.border}`}}>{h}</th>
              ))}
            </tr>
          </thead>
          <tbody>
            {LOW_CLASSES.map((c,i)=>(
              <tr key={i} onClick={()=>setDrawer({title:`${c.grade} ${c.cls} 상세`,cls:c})}
                style={{cursor:'pointer',animation:`fadeIn 300ms ease ${i*80}ms both`}}
                onMouseEnter={e=>e.currentTarget.style.background='#F9FAFB'}
                onMouseLeave={e=>e.currentTarget.style.background='transparent'}>
                <td style={{padding:'12px 14px',fontWeight:600,color:C.text,borderBottom:`1px solid ${C.border}`}}>{c.grade} {c.cls}</td>
                <td style={{padding:'12px 14px',borderBottom:`1px solid ${C.border}`}}>
                  <div style={{display:'flex',alignItems:'center',gap:8}}>
                    <div style={{height:6,width:80,background:'#F3F4F6',borderRadius:99}}>
                      <div style={{height:'100%',width:`${c.rate}%`,background:C.red,borderRadius:99}}/>
                    </div>
                    <span style={{fontWeight:700,color:C.red,fontSize:13}}>{c.rate}%</span>
                  </div>
                </td>
                <td style={{padding:'12px 14px',fontSize:14,color:C.text,borderBottom:`1px solid ${C.border}`}}>{c.students}명</td>
                <td style={{padding:'12px 14px',borderBottom:`1px solid ${C.border}`}}><Badge text={`${c.absent}명`} color="red"/></td>
                <td onClick={e=>e.stopPropagation()} style={{padding:'12px 14px',borderBottom:`1px solid ${C.border}`}}>
                  <button onClick={()=>setDrawer({title:`${c.grade} ${c.cls} 상세`,cls:c})}
                    style={{padding:'5px 12px',background:C.primaryLight,color:C.primary,border:'none',borderRadius:6,fontSize:12,cursor:'pointer',fontWeight:600}}>알림 발송</button>
                </td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>
      {drawer&&<Drawer item={drawer} onClose={()=>setDrawer(null)}>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12,marginBottom:20}}>
          {[['학급',`${drawer.cls.grade} ${drawer.cls.cls}`],['참여율',`${drawer.cls.rate}%`],['참여 학생',`${drawer.cls.students}명`],['미참여',`${drawer.cls.absent}명`]].map(([l,v])=>(
            <div key={l} style={{background:C.bg,borderRadius:10,padding:14}}>

/* ─── Reports Page ─── */
const MOCK_REPORTS=[
  {id:1,name:'4월 전교생 참여현황.xlsx',size:'2.3 MB',created:'2026-04-22',program:'체력측정 프로그램',status:'완료'},
  {id:2,name:'3월 영양교육 이력.xlsx',size:'1.8 MB',created:'2026-04-01',program:'영양교육 프로그램',status:'완료'},
  {id:3,name:'1분기 종합 보고서.xlsx',size:'4.1 MB',created:'2026-04-01',program:'전체 프로그램',status:'완료'},
];

function ReportsPage(){
  const [modal,setModal]=useState(null);
  const [drawer,setDrawer]=useState(null);
  const [generating,setGenerating]=useState(false);
  const [progress,setProgress]=useState(0);
  const [reports,setReports]=useState(MOCK_REPORTS);
  const [toast,setToast]=useState('');
  const showToast=msg=>{setToast(msg);setTimeout(()=>setToast(''),3000)};
  const generate=()=>{
    setGenerating(true);setProgress(0);
    let p=0;
    const iv=setInterval(()=>{p+=Math.random()*25;if(p>=100){p=100;clearInterval(iv);
      setTimeout(()=>{setGenerating(false);setModal(null);
        setReports(prev=>[{id:Date.now(),name:`${new Date().getMonth()+1}월 신규 보고서.xlsx`,size:'1.5 MB',created:'2026-04-22',program:'체력측정 프로그램',status:'완료'},...prev]);
        showToast('보고서가 생성되었습니다.');},300);}setProgress(p);},300);
  };
  return(
    <div style={{padding:'24px 32px',animation:'fadeIn 300ms ease'}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:20}}>
        <div style={{fontSize:14,color:C.textSec}}>총 {reports.length}개 보고서</div>
        <button onClick={()=>setModal({type:'create'})}
          style={{padding:'9px 18px',background:C.primary,color:'#fff',border:'none',borderRadius:9,
            fontSize:13,cursor:'pointer',fontWeight:700}}>+ 보고서 생성</button>
      </div>
      <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:16}}>
        {reports.map((r,i)=>(
          <div key={r.id} onClick={()=>setDrawer({title:r.name,report:r})}
            style={{background:C.surface,borderRadius:16,padding:20,
              border:`1px solid ${C.border}`,
              cursor:'pointer',
              boxShadow:'0 4px 16px rgba(124,58,237,0.08)',
              animation:`fadeInScale 400ms ease ${i*100}ms both`,
              transition:'box-shadow 200ms,transform 200ms'}}
            onMouseEnter={e=>{e.currentTarget.style.boxShadow='0 12px 32px rgba(124,58,237,0.18)';e.currentTarget.style.transform='translateY(-4px)'}}
            onMouseLeave={e=>{e.currentTarget.style.boxShadow='0 4px 16px rgba(124,58,237,0.08)';e.currentTarget.style.transform='translateY(0)'}}>
            <div style={{fontSize:32,marginBottom:12}}>📊</div>
            <div style={{fontWeight:700,fontSize:13,color:C.text,marginBottom:6,lineHeight:1.4}}>{r.name}</div>
            <div style={{fontSize:12,color:C.textSec,marginBottom:8}}>{r.program}</div>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
              <span style={{fontSize:11,color:C.textMuted}}>{r.created} · {r.size}</span>
              <Badge text={r.status} color="green"/>
            </div>
          </div>
        ))}
      </div>
      {modal?.type==='create'&&<Modal title="보고서 생성" onClose={()=>setModal(null)}>
        <div style={{display:'flex',flexDirection:'column',gap:14}}>
          <div>
            <label style={{fontSize:13,fontWeight:600,color:C.text,display:'block',marginBottom:6}}>대상 프로그램</label>
            <select style={{width:'100%',padding:'9px 12px',border:`1px solid ${C.border}`,borderRadius:8,fontSize:14,outline:'none'}}>
              {PROGRAMS.map(p=><option key={p.id}>{p.name}</option>)}
              <option>전체 프로그램</option>
            </select>
          </div>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
            <div><label style={{fontSize:13,fontWeight:600,color:C.text,display:'block',marginBottom:6}}>시작일</label>
              <input type="date" defaultValue="2026-04-01" style={{width:'100%',padding:'9px 12px',border:`1px solid ${C.border}`,borderRadius:8,fontSize:14,outline:'none'}}/></div>
            <div><label style={{fontSize:13,fontWeight:600,color:C.text,display:'block',marginBottom:6}}>종료일</label>
              <input type="date" defaultValue="2026-04-22" style={{width:'100%',padding:'9px 12px',border:`1px solid ${C.border}`,borderRadius:8,fontSize:14,outline:'none'}}/></div>
          </div>
          {generating&&(
            <div>
              <div style={{display:'flex',justifyContent:'space-between',fontSize:13,color:C.textSec,marginBottom:6}}>
                <span>보고서 생성 중...</span><span>{Math.round(progress)}%</span>
              </div>
              <div style={{height:8,background:C.bg,borderRadius:99,overflow:'hidden'}}>
                <div style={{height:'100%',width:`${progress}%`,background:`linear-gradient(90deg,${C.primary},${C.cyan})`,borderRadius:99,transition:'width 300ms linear'}}/>
              </div>
            </div>
          )}
          <div style={{display:'flex',gap:10,justifyContent:'flex-end'}}>
            <button onClick={()=>setModal(null)} style={{padding:'9px 18px',border:`1px solid ${C.border}`,borderRadius:8,cursor:'pointer',background:C.surface}}>취소</button>
            <button onClick={generate} disabled={generating}
              style={{padding:'9px 20px',background:generating?C.textMuted:C.primary,color:'#fff',border:'none',borderRadius:8,cursor:generating?'not-allowed':'pointer',fontWeight:700}}>
              {generating?'생성 중...':'생성'}
            </button>
          </div>
        </div>
      </Modal>}
      {drawer&&<Drawer item={drawer} onClose={()=>setDrawer(null)}>
        <div style={{fontSize:48,textAlign:'center',marginBottom:16}}>📊</div>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12,marginBottom:20}}>
          {[['파일명',drawer.report.name],['프로그램',drawer.report.program],['생성일',drawer.report.created],['크기',drawer.report.size]].map(([l,v])=>(
            <div key={l} style={{background:C.bg,borderRadius:10,padding:12}}>
              <div style={{fontSize:12,color:C.textSec,marginBottom:3}}>{l}</div>
              <div style={{fontWeight:600,color:C.text,fontSize:12,wordBreak:'break-all'}}>{v}</div>
            </div>
          ))}
        </div>
        <div style={{display:'flex',flexDirection:'column',gap:10}}>
          <button onClick={()=>{showToast('다운로드가 시작되었습니다.');setDrawer(null)}}
            style={{padding:'11px',background:C.primary,color:'#fff',border:'none',borderRadius:9,cursor:'pointer',fontWeight:700,fontSize:13}}>⬇ 다운로드</button>
          <button onClick={()=>{showToast('공유 링크가 생성되었습니다. (30분 유효)');setDrawer(null)}}
            style={{padding:'11px',background:C.bg,color:C.text,border:`1px solid ${C.border}`,borderRadius:9,cursor:'pointer',fontWeight:600,fontSize:13}}>🔗 공유 링크 생성</button>
        </div>
      </Drawer>}
      {toast&&<Toast msg={toast} onClose={()=>setToast('')}/>}
    </div>
  );
}
