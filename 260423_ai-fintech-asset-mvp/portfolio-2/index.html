}

// ============================================================
// CountUp
// ============================================================
function CountUp({ end, duration = 1100, prefix = '', suffix = '', decimals = 0 }) {
  const [val, setVal] = useState(0);
  useEffect(() => {
    let raf; const start = performance.now();
    const tick = (t) => {
      const p = Math.min(1, (t - start) / duration);
      setVal(end * (1 - Math.pow(1 - p, 3)));
      if (p < 1) raf = requestAnimationFrame(tick);
    };
    raf = requestAnimationFrame(tick);
    return () => cancelAnimationFrame(raf);
  }, [end]);
  const shown = decimals === 0
    ? Math.round(val).toLocaleString('ko-KR')
    : val.toLocaleString('ko-KR', { minimumFractionDigits: decimals, maximumFractionDigits: decimals });
  return <span>{prefix}{shown}{suffix}</span>;
}

    accent: { background: C.accent, color: '#0F172A' },
    danger: { background: 'rgba(248,113,113,0.15)', color: C.danger },

  return (

}

function TreemapCell(props) {
  const { x, y, width, height, name, size, fill } = props;
  if (width < 50 || height < 30) return null;
  return (
    <g>
      <rect x={x} y={y} width={width} height={height} style={{ fill: fill || '#6366F1', stroke: '#0F172A', strokeWidth: 2 }} />
      <text x={x + 10} y={y + 22} fill="#fff" fontSize={12} fontWeight={700}>{name}</text>
      <text x={x + 10} y={y + 40} fill="#fff" fontSize={14} fontWeight={800} opacity={0.9}>{size}만</text>
    </g>
  );
}

          {[0, 1, 2, 3, 4].map(i => <div key={i} className="skeleton-shimmer" style={{ height: 140, borderRadius: 14 }} />)}
        </div>
        <div className="skeleton-shimmer" style={{ height: 320, borderRadius: 16 }} />
      </div>
    );
  }

  return (
    <div style={{ width: '100%', minHeight: '100vh', background: C.bg, display: 'flex', flexDirection: 'column' }}>
      <TopNav route={route} onNav={nav} onOpenAlerts={() => setAlertsOpen(true)} />
      <AnimatedContent pageKey={route + (selectedAsset ? ':detail' : '')}>
        {selectedAsset ? (
          <AssetDetailPage asset={selectedAsset} onBack={() => setSelectedAsset(null)} />
        ) : (
          <>
            {route === 'main' && <HomePage onNav={nav} onSelectClass={() => nav('assets')} />}
            {route === 'assets' && <AssetsPage onSelect={setSelectedAsset} />}
            {route === 'rebalancing' && <RebalancingPage onExecute={() => pushToast('리밸런싱 거래 5건 실행 완료', 'success')} />}
            {route === 'report' && <ReportPage onToast={pushToast} />}
            {route === 'admin' && <AdminPage />}
          </>
        )}
      </AnimatedContent>
      <div style={{ flex: 1 }} />
      <Footer />

      {alertsOpen && (
        <Modal title="최근 알림" onClose={() => setAlertsOpen(false)}>
          <div style={{ display: 'flex', flexDirection: 'column', gap: 10 }}>
            {[
              { icon: '📈', title: 'NVDA 목표가 도달', desc: '$870 도달', time: '2시간 전' },
              { icon: '⚖️', title: '리밸런싱 제안', desc: '4건의 조정 권고', time: '5시간 전' },
              { icon: '📄', title: '주간 리포트', desc: '이메일 발송 완료', time: '어제' },
              { icon: '💱', title: 'BTC 변동', desc: '+4.2% 급등', time: '어제' },
            ].map((a, i) => (
              <div key={i} style={{ padding: 14, background: C.surfaceAlt, borderRadius: 10, display: 'flex', gap: 12, alignItems: 'center' }}>
                <div style={{ fontSize: 18 }}>{a.icon}</div>
                <div style={{ flex: 1 }}>
                  <div style={{ fontSize: 13, fontWeight: 700 }}>{a.title}</div>
                  <div style={{ fontSize: 11, color: C.textMuted }}>{a.desc}</div>
                </div>
                <div style={{ fontSize: 11, color: C.textDim }}>{a.time}</div>
              </div>
            ))}
          </div>
        </Modal>
      )}

      {toast && <Toast message={toast.message} type={toast.type} onClose={() => setToast(null)} />}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
