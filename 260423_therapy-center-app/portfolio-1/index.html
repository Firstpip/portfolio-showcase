function CountUp({end,dur=1200,suf=''}){
  const[v,sv]=useState(0);
  useEffect(()=>{let s=0;const step=end/(dur/16);const t=setInterval(()=>{s+=step;if(s>=end){sv(end);clearInterval(t);}else sv(Math.floor(s));},16);return()=>clearInterval(t);},[end]);
  return <span style={{animation:'countUp 400ms ease'}}>{v.toLocaleString()}{suf}</span>;
}

function Toast({msg,onClose}){
  useEffect(()=>{const t=setTimeout(onClose,3000);return()=>clearTimeout(t);},[]);
  return <div style={{position:'fixed',bottom:24,right:24,zIndex:9999,background:'#2D2D2D',color:'#fff',padding:'12px 20px',borderRadius:8,animation:'slideUp 300ms ease',boxShadow:'0 4px 16px rgba(0,0,0,0.2)',fontSize:14}}>{msg}</div>;
}

function StarRating({val,onChange}){
  const[hov,setHov]=useState(0);
  return(
    <div style={{display:'flex',gap:4}}>
      {[1,2,3,4,5].map(s=>(
        <span key={s} onClick={()=>onChange(s)} onMouseEnter={()=>setHov(s)} onMouseLeave={()=>setHov(0)}
          style={{fontSize:30,cursor:'pointer',color:s<=(hov||val)?C.a:'#E5E7EB',transition:'color 150ms'}}>★</span>
      ))}
    </div>
  );
}

  const META={
    main:{title:'내 아이에게 맞는 발달센터 찾기',sub:'지역과 치료 유형으로 센터를 탐색하세요',kpis:[{l:'등록 센터',v:124,suf:'개'},{l:'등록 후기',v:2847,suf:'건'},{l:'치료 유형',v:8,suf:'종'}]},
    'center-detail':{title:'센터 상세 정보',sub:'치료 프로그램, 위치, 후기를 확인하세요',kpis:[{l:'평점',v:'★ 4.9',suf:''},{l:'후기',v:203,suf:'건'},{l:'개원',v:'2016',suf:'년'}]},
    review:{title:'실제 이용 후기',sub:'치료를 경험한 부모들의 생생한 후기',kpis:[{l:'전체 후기',v:2847,suf:'건'},{l:'평균 평점',v:'4.7',suf:'점'},{l:'후기 센터',v:89,suf:'개'}]},
    login:{title:'카카오 로그인',sub:'간편 소셜 로그인으로 후기를 남기세요',kpis:[]},
  };

  return(
    <div style={{display:'flex',flexDirection:'column',width:'100%',minHeight:'100vh',background:C.bg}}>
      {/* Nav */}
      <header style={{position:'sticky',top:0,zIndex:100,background:'#fff',borderBottom:`1px solid ${C.bdr}`,display:'flex',alignItems:'center',height:56,padding:'0 20px',gap:2,boxShadow:'0 2px 8px rgba(255,107,107,0.06)'}}>
        <div style={{fontWeight:800,fontSize:17,color:C.p,marginRight:12,flexShrink:0}}>🌱 발달센터</div>
        {TABS.map(t=>(
          <button key={t.id} title={t.full} onClick={()=>setTab(t.id)}
            style={{padding:'7px 14px',borderRadius:8,border:'none',background:tab===t.id?C.lt:'transparent',color:tab===t.id?C.p:C.sub,fontWeight:tab===t.id?700:500,cursor:'pointer',fontSize:13,transition:'all 150ms',display:'flex',alignItems:'center',gap:5,flexShrink:0}}>
            <span>{t.icon}</span>{t.label}
          </button>
        ))}
        <div style={{flex:1}}/>
        <button style={{background:'none',border:'none',cursor:'pointer',fontSize:18,padding:6}} title="검색">🔍</button>
        <button style={{background:'none',border:'none',cursor:'pointer',fontSize:18,padding:6}} title="알림">🔔</button>
        <div style={{width:30,height:30,borderRadius:'50%',background:`linear-gradient(135deg,${C.p},${C.s})`,display:'flex',alignItems:'center',justifyContent:'center',color:'#fff',fontSize:13,cursor:'pointer',marginLeft:4}}>👤</div>
      </header>

      {/* Hero */}
      <div style={{background:`linear-gradient(135deg,${C.p},${C.s})`,padding:'20px 28px',color:'#fff'}}>
        <h1 style={{fontSize:22,fontWeight:800,marginBottom:4}}>{META[tab].title}</h1>
        <p style={{fontSize:13,opacity:0.88,marginBottom:META[tab].kpis.length?14:0}}>{META[tab].sub}</p>
        {META[tab].kpis.length>0&&(
          <div style={{display:'flex',gap:20}}>
            {META[tab].kpis.map(k=>(
              <div key={k.l} style={{textAlign:'center'}}>
                <div style={{fontSize:20,fontWeight:800}}>{typeof k.v==='number'?<CountUp end={k.v} suf={k.suf}/>:`${k.v}${k.suf}`}</div>
                <div style={{fontSize:11,opacity:0.8}}>{k.l}</div>
              </div>
            ))}
          </div>
        )}
      </div>

      {/* Content */}
      <main style={{flex:1}}>
        {loading?<Skeleton/>:(
          <div key={tab} style={{animation:'fadeIn 300ms ease'}}>
            {tab==='main'&&<HomePage onOpen={setDrawer}/>}
            {tab==='center-detail'&&<CenterDetailPage onReview={doReview}/>}
            {tab==='review'&&<ReviewPage onReview={doReview}/>}
            {tab==='login'&&<LoginPage onLogin={()=>setLogged(true)}/>}
          </div>
        )}
      </main>

      {drawer&&<Drawer center={drawer} onClose={()=>setDrawer(null)} onReview={doReview}/>}
      {showRev&&<ReviewModal onClose={()=>setShowRev(false)} onDone={()=>{setShowRev(false);setToast('후기가 등록되었습니다 😊');}}/>}
      {toast&&<Toast msg={toast} onClose={()=>setToast(null)}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
