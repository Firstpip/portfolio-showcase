/* ─── Components ─── */
function CountUp({end,dur=1000,suf=''}){
  const[v,sv]=useState(0);
  useEffect(()=>{let s=0;const step=end/(dur/16);const t=setInterval(()=>{s+=step;if(s>=end){sv(end);clearInterval(t);}else sv(Math.floor(s));},16);return()=>clearInterval(t);},[end]);
  return <span style={{animation:'countUp 400ms ease'}}>{v.toLocaleString()}{suf}</span>;
}

function Toast({msg,onClose}){
  useEffect(()=>{const t=setTimeout(onClose,3000);return()=>clearTimeout(t);},[]);
  return <div style={{position:'fixed',bottom:24,right:24,zIndex:9999,background:'#0F172A',color:'#fff',padding:'12px 20px',borderRadius:8,animation:'slideUp 300ms ease',boxShadow:'0 4px 16px rgba(0,0,0,0.25)',fontSize:14,maxWidth:300}}>{msg}</div>;
}

function Modal({title,onClose,children,w=560}){
  return(
    <div style={{position:'fixed',inset:0,zIndex:500,display:'flex',alignItems:'center',justifyContent:'center'}}>
      <div onClick={onClose} style={{position:'absolute',inset:0,background:'rgba(0,0,0,0.45)',animation:'fadeIn 200ms ease'}}/>
      <div style={{position:'relative',width:w,maxHeight:'88vh',background:'#fff',borderRadius:14,zIndex:501,animation:'fadeInScale 200ms ease',display:'flex',flexDirection:'column',boxShadow:'0 20px 60px rgba(0,0,0,0.2)'}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'18px 22px',borderBottom:`1px solid ${C.bdr}`}}>
          <h3 style={{fontSize:17,fontWeight:700,color:C.txt}}>{title}</h3>
          <button onClick={onClose} style={{background:'none',border:'none',fontSize:20,cursor:'pointer',color:C.sub}}>✕</button>
        </div>
        <div style={{padding:22,overflowY:'auto',flex:1}}>{children}</div>
      </div>
    </div>
  );
}

function Badge({status}){
  const m=STATUS_MAP[status]||{label:status,color:'#64748B',bg:'#F1F5F9'};
  return <span style={{background:m.bg,color:m.color,padding:'3px 10px',borderRadius:999,fontSize:12,fontWeight:600}}>{m.label}</span>;
}

function SevBadge({sev}){
  const m=SEV_MAP[sev]||SEV_MAP.low;
  return <span style={{background:m.bg,color:m.color,padding:'3px 8px',borderRadius:999,fontSize:11,fontWeight:600}}>{m.label}</span>;
}

function Skeleton(){
  const sh={background:'linear-gradient(90deg,#E0F2FE 25%,#BAE6FD 50%,#E0F2FE 75%)',backgroundSize:'200% 100%',animation:'shimmer 1.5s infinite',borderRadius:10};

        {[...Array(4)].map((_,i)=><div key={i} style={{...sh,height:100}}/>)}

      <div style={{display:'grid',gridTemplateColumns:'2fr 1fr',gap:16}}>
        <div style={{...sh,height:240}}/><div style={{...sh,height:240}}/>
      </div>
    </div>
  );
}

    {id:'report',label:'신고 관리',full:'후기 신고 관리',icon:'🚨'},
    {id:'analytics',label:'통계 분석',full:'센터 방문 통계 분석',icon:'📈'},
  ];

  return(
    <div style={{display:'flex',flexDirection:'column',width:'100%',minHeight:'100vh',background:C.bg}}>
      {/* Global Nav */}
      <header style={{position:'sticky',top:0,zIndex:100,background:'#fff',borderBottom:`1px solid ${C.bdr}`,display:'flex',alignItems:'center',height:60,padding:'0 28px',gap:4,boxShadow:'0 2px 8px rgba(14,165,233,0.07)'}}>
        <div style={{fontWeight:800,fontSize:17,color:C.s,marginRight:16,flexShrink:0,display:'flex',alignItems:'center',gap:6}}>
          <span style={{fontSize:22}}>🌱</span> 발달센터 관리
        </div>
        <nav style={{display:'flex',gap:2}}>
          {NAV.map(n=>(
            <button key={n.id} title={n.full} onClick={()=>setRoute(n.id)}
              style={{padding:'7px 14px',borderRadius:8,border:'none',background:route===n.id?C.lt:'transparent',color:route===n.id?C.p:C.sub,fontWeight:route===n.id?700:500,cursor:'pointer',fontSize:13,transition:'all 150ms',display:'flex',alignItems:'center',gap:5,flexShrink:0}}>
              <span>{n.icon}</span>{n.label}
            </button>
          ))}
        </nav>
        <div style={{flex:1}}/>
        <div style={{display:'flex',alignItems:'center',gap:10}}>
          <button style={{background:'none',border:'none',cursor:'pointer',fontSize:18,padding:4}}>🔔</button>
          <div style={{display:'flex',alignItems:'center',gap:8,padding:'6px 12px',background:C.lt,borderRadius:8,cursor:'pointer'}}>
            <div style={{width:28,height:28,borderRadius:'50%',background:`linear-gradient(135deg,${C.p},${C.a})`,display:'flex',alignItems:'center',justifyContent:'center',color:'#fff',fontSize:13,fontWeight:700}}>관</div>
            <div style={{lineHeight:1}}>
              <div style={{fontSize:12,fontWeight:700,color:C.txt}}>관리자</div>
              <div style={{fontSize:10,color:C.sub}}>super admin</div>
            </div>
          </div>
        </div>
      </header>

      {/* Main content */}
      <main style={{flex:1}}>
        {loading?<Skeleton/>:(
          <div key={route} style={{animation:'fadeIn 300ms ease'}}>
            {route==='main'&&<DashboardPage setRoute={setRoute}/>}
            {route==='center-review'&&<CenterReviewPage onToast={setToast}/>}
            {route==='report'&&<ReportPage onToast={setToast}/>}
            {route==='analytics'&&<AnalyticsPage/>}
          </div>
        )}
      </main>

      {/* Footer */}
      <footer style={{background:C.dark,color:'rgba(255,255,255,0.8)',padding:'28px 28px 20px',marginTop:32}}>
        <div style={{display:'grid',gridTemplateColumns:'2fr 1fr 1fr 1fr',gap:28,maxWidth:1100,margin:'0 auto'}}>
          <div>
            <div style={{fontWeight:800,fontSize:16,color:'#fff',marginBottom:8,display:'flex',alignItems:'center',gap:6}}>🌱 발달센터 통합 관리 플랫폼</div>
            <p style={{fontSize:12,opacity:0.7,lineHeight:1.7}}>발달치료가 필요한 아이를 둔 부모와 발달센터를 이어주는 정보 플랫폼의 관리자 시스템입니다.</p>
          </div>
          {[['시스템',['대시보드','센터 심사','신고 관리','통계 분석']],['지원',['운영 가이드','API 문서','FAQ']],['정책',['이용약관','개인정보처리방침','운영 정책']]].map(([title,items])=>(
            <div key={title}>
              <div style={{fontWeight:700,fontSize:13,color:'#fff',marginBottom:10}}>{title}</div>
              {items.map(it=><div key={it} style={{fontSize:12,opacity:0.65,marginBottom:5,cursor:'pointer'}}>{it}</div>)}
            </div>
          ))}
        </div>
        <div style={{marginTop:20,paddingTop:14,borderTop:'1px solid rgba(255,255,255,0.12)',textAlign:'center',fontSize:11,opacity:0.5}}>
          © 2026 발달센터 통합 관리 플랫폼 — 자체 개발 프로젝트
        </div>
      </footer>

      {toast&&<Toast msg={toast} onClose={()=>setToast(null)}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
