<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>봉은사 다국어 사찰투어 — 맞춤 구현 데모</title>
<link rel="preconnect" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;font-family:'Pretendard',sans-serif;background:#FAF6EE}
#root{display:flex;flex-direction:column;width:100%;min-height:100vh}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes fadeInScale{from{opacity:0;transform:scale(0.95)}to{opacity:1;transform:scale(1)}}
@keyframes slideInRight{from{opacity:0;transform:translateX(30px)}to{opacity:1;transform:translateX(0)}}
@keyframes slideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes ripple{0%{transform:scale(0);opacity:0.5}100%{transform:scale(4);opacity:0}}
@keyframes countUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.5}}
@keyframes barGrow{from{width:0%}to{width:var(--target-width)}}
@keyframes slideDown{from{opacity:0;transform:translateY(-10px);max-height:0}to{opacity:1;transform:translateY(0);max-height:500px}}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">

  accent: '#4A7C59',
  bg: '#FAF6EE',
  surface: '#FFFFFF',

const LANG_LABELS = { KO: '한국어', EN: 'English', ZH: '中文', JA: '日本語' };

const LINKS_BY_LANG = {

const HERO_META = {

    EN: { title: 'Bongeunsa Multilingual Guide', sub: 'Digital Tour Guide for Visitors' },
    ZH: { title: '奉恩寺多语言导览系统', sub: '为寺院访客提供数字导览服务' },

  { id: 1, q: '이번 봉은사 방문의 주된 목적은 무엇인가요?', choices: ['내면의 평화와 힐링', '불교 문화 체험', '관광 및 사진 촬영', '지인과의 나들이', '특별한 이유 없이'] },
  { id: 2, q: '하루를 어떻게 보내는 것을 좋아하시나요?', choices: ['혼자 조용히 책 읽기', '친구들과 함께 활동', '자연 속 산책과 운동', '박물관·문화시설 탐방', '맛있는 음식 탐방'] },
  { id: 3, q: '사찰에서 참여하고 싶은 프로그램은?', choices: ['좌선 명상 체험', '스님과의 차담', '발우공양 (사찰 식사)', '불교 미술 작품 감상', '경내 안내 해설 투어'] },
  { id: 4, q: '지금 나에게 가장 필요한 것은?', choices: ['완전한 고요함', '새로운 배움', '자연과의 교감', '역사와의 대화', '특별한 경험'] },

const RESULT_TYPES = [
  { id: 'meditation', name: '선정 명상가', kanji: '禪定 冥想家', emoji: '🧘', desc: '당신은 고요함과 내면의 성찰을 추구합니다. 봉은사의 선방과 명상 공간에서 깊은 평화를 찾을 수 있을 거예요.', recommend: '선불교 명상 체험 프로그램', percent: 28, color: '#4A7C59', gradientFrom: '#4A7C59', gradientTo: '#2D5A3E' },
  { id: 'historian', name: '역사 탐구자', kanji: '歷史 探究者', emoji: '📜', desc: '역사와 문화에 깊은 관심을 가진 분이시네요. 봉은사의 천년 역사를 따라 거닐며 귀한 유물들을 만나보세요.', recommend: '문화재 전문 해설 투어', percent: 22, color: '#8B6914', gradientFrom: '#8B6914', gradientTo: '#5C4410' },
  { id: 'nature', name: '자연 치유자', kanji: '自然 治癒者', emoji: '🌿', desc: '도심 속 초록빛 힐링을 원하시는군요. 봉은사의 울창한 숲길과 연못을 천천히 거닐며 자연의 에너지를 느껴보세요.', recommend: '경내 숲길 자연 치유 산책', percent: 34, color: '#2D7A4F', gradientFrom: '#2D7A4F', gradientTo: '#1B5235' },
  { id: 'community', name: '법회 참여자', kanji: '法會 參與者', emoji: '🪔', desc: '사람들과 함께하는 따뜻한 공동체를 소중히 여기는 분이시군요. 봉은사의 법회와 불교 문화 행사를 경험해 보세요.', recommend: '월례 법회 및 불교 문화 행사', percent: 16, color: '#A0522D', gradientFrom: '#A0522D', gradientTo: '#6B3519' },
];

function CountUp({ end }) {
  const [val, setVal] = useState(typeof end === 'number' ? 0 : end);
  useEffect(() => {
    if (typeof end !== 'number') return;
    let start = 0;
    const step = end / 75;
    const timer = setInterval(() => {
      start += step;
      if (start >= end) { setVal(end); clearInterval(timer); }
      else setVal(Math.floor(start));
    }, 16);
    return () => clearInterval(timer);
  }, [end]);
  return <span style={{ animation: 'countUp 400ms ease' }}>{typeof end === 'number' ? val.toLocaleString() : end}</span>;
}

function Toast({ message, onClose }) {
  useEffect(() => { const t = setTimeout(onClose, 3000); return () => clearTimeout(t); }, []);
  return (
    <div style={{ position: 'fixed', bottom: 24, right: 24, zIndex: 9999, background: C.accent, color: '#fff', padding: '12px 22px', borderRadius: 10, animation: 'slideUp 300ms ease', boxShadow: '0 4px 16px rgba(0,0,0,0.2)', fontSize: 14, fontWeight: 600 }}>
      ✓ {message}
    </div>
  );
}

function Modal({ title, onClose, children }) {
  return (
    <div style={{ position: 'fixed', inset: 0, zIndex: 500, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
      <div onClick={onClose} style={{ position: 'absolute', inset: 0, background: 'rgba(0,0,0,0.5)', animation: 'fadeIn 200ms ease' }} />
      <div style={{ position: 'relative', width: 460, maxHeight: '85vh', background: C.surface, borderRadius: 20, zIndex: 501, animation: 'fadeInScale 220ms ease', display: 'flex', flexDirection: 'column', boxShadow: '0 24px 64px rgba(0,0,0,0.2)' }}>
        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', padding: '18px 24px', borderBottom: `1px solid ${C.border}` }}>
          <h3 style={{ fontSize: 17, fontWeight: 700, color: C.text }}>{title}</h3>
          <button onClick={onClose} style={{ background: 'none', border: 'none', fontSize: 20, cursor: 'pointer', color: C.textSub, lineHeight: 1 }}>✕</button>
        </div>
        <div style={{ padding: 24, overflowY: 'auto', flex: 1 }}>{children}</div>
      </div>
    </div>
  );
}

function SkeletonBox({ w, h, delay = 0, radius = 8 }) {
  return (
    <div style={{ width: w, height: h, borderRadius: radius, background: 'linear-gradient(90deg, #F5EDD6 25%, #EDD8A0 50%, #F5EDD6 75%)', backgroundSize: '200% 100%', animation: `shimmer 1.5s infinite ${delay}s` }} />
  );
}

function App() {
  const [screen, setScreen] = useState('main');
  const [lang, setLang] = useState('KO');
  const [loading, setLoading] = useState(true);
  const [profile, setProfile] = useState({ name: '이민지', gender: '여성', age: '20대', nationality: '대한민국', consent: true });
  const [answers, setAnswers] = useState({});
  const [currentQ, setCurrentQ] = useState(0);
  const [resultType, setResultType] = useState(RESULT_TYPES[0]);
  const [toast, setToast] = useState(null);
  const [modal, setModal] = useState(null);
  const [pageKey, setPageKey] = useState(0);

  useEffect(() => { setTimeout(() => setLoading(false), 1500); }, []);

  const goScreen = (s) => { setScreen(s); setPageKey(k => k + 1); };

  const heroGradients = {
    main: 'linear-gradient(135deg, #6B4A10 0%, #8B6914 35%, #C4973A 70%, #4A7C59 100%)',
    'profile-form': 'linear-gradient(135deg, #6B4F8E 0%, #9B6B9B 55%, #C4973A 100%)',
    survey: 'linear-gradient(135deg, #1A3A2A 0%, #2D5A3E 40%, #4A7C59 100%)',
    result: resultType ? `linear-gradient(135deg, ${resultType.gradientFrom}, ${resultType.gradientTo})` : 'linear-gradient(135deg, #4A7C59, #2D5A3E)',
  };

  const links = LINKS_BY_LANG[lang] || LINKS_BY_LANG.KO;
  const heroTitle = screen === 'main' ? (HERO_META.main[lang]?.title || HERO_META.main.KO.title) : '';
  const heroSub = screen === 'main' ? (HERO_META.main[lang]?.sub || HERO_META.main.KO.sub) : '';

  const heroLabels = {
    'profile-form': { title: '사찰 투어 참여자 등록', sub: '나만의 사찰 성향 유형을 알아보세요' },
    survey: { title: 'Who Am I? 사찰 성향 투어', sub: `질문 ${currentQ + 1} / ${QUESTIONS.length}` },
    result: { title: '나의 사찰 성향 결과', sub: '당신에게 맞는 봉은사 투어를 안내합니다' },
  };

  const currentHero = screen === 'main' ? { title: heroTitle, sub: heroSub } : (heroLabels[screen] || { title: '', sub: '' });
  const kpis = screen === 'main' ? [{ l: '오늘 방문', v: 247 }, { l: '이달 참여', v: 1823 }, { l: '누적 완료', v: 9412 }] : null;

  if (loading) {
    return (
      <div style={{ width: '100%', minHeight: '100vh', background: C.bg, display: 'flex', flexDirection: 'column' }}>
        <div style={{ height: 60, background: C.surface, borderBottom: `1px solid ${C.border}`, display: 'flex', alignItems: 'center', padding: '0 20px', gap: 10 }}>
          <SkeletonBox w={90} h={24} />
          {[0,1,2,3].map(i => <SkeletonBox key={i} w={60} h={20} delay={i * 0.1} />)}
        </div>
        <div style={{ height: 150, background: 'linear-gradient(90deg, #E8D5B0 25%, #DCC896 50%, #E8D5B0 75%)', backgroundSize: '200% 100%', animation: 'shimmer 1.5s infinite' }} />
        <div style={{ padding: '20px 16px', display: 'flex', flexDirection: 'column', gap: 12, maxWidth: 640, margin: '0 auto', width: '100%' }}>
          {[0,1,2,3].map(i => <SkeletonBox key={i} w="100%" h={80} delay={i * 0.12} radius={14} />)}
          <SkeletonBox w="100%" h={54} delay={0.5} radius={14} />
        </div>
      </div>
    );
  }

  return (
    <div style={{ width: '100%', minHeight: '100vh', background: C.bg, display: 'flex', flexDirection: 'column' }}>

      {/* TopNav */}

        <div style={{ display: 'flex', alignItems: 'center', gap: 6, cursor: 'pointer', marginRight: 8 }} onClick={() => goScreen('main')}>
          <span style={{ fontSize: 20 }}>🏯</span>
          <div>
            <div style={{ fontSize: 14, fontWeight: 800, color: C.primary, letterSpacing: '-0.02em', lineHeight: 1.1 }}>봉은사</div>

        </div>
        <div style={{ display: 'flex', gap: 2, flex: 1 }}>
          {Object.entries(LANG_LABELS).map(([key, name]) => (
            <button key={key} onClick={() => setLang(key)}

              {name}
            </button>
          ))}
        </div>
        {screen !== 'main' && (
          <button onClick={() => goScreen('main')} style={{ padding: '6px 10px', borderRadius: 8, border: `1px solid ${C.border}`, background: 'transparent', cursor: 'pointer', fontSize: 12, color: C.textSub, fontFamily: 'Pretendard, sans-serif' }}>← 홈</button>

      </header>

      {/* Hero Banner */}
      <div style={{ background: heroGradients[screen] || heroGradients.main, padding: '24px 20px 22px', color: '#fff' }}>

          <h1 style={{ fontSize: 20, fontWeight: 800, letterSpacing: '-0.03em', marginBottom: 6, animation: 'slideUp 350ms ease' }}>

                  <div style={{ fontSize: 11, opacity: 0.75 }}>{kpi.l}</div>

            </div>

            </div>
          )}

      </div>

      {/* Main Content */}

          {screen === 'main' && (
            <MainScreen links={links} lang={lang} onTourStart={() => goScreen('profile-form')} setModal={setModal} setToast={setToast} />
          )}
          {screen === 'profile-form' && (
            <ProfileForm profile={profile} setProfile={setProfile} onSubmit={() => { setCurrentQ(0); setAnswers({}); goScreen('survey'); }} />

          {screen === 'survey' && (

          )}
          {screen === 'result' && (
            <ResultScreen result={resultType} onRestart={() => { setCurrentQ(0); setAnswers({}); goScreen('main'); }} onShare={platform => setToast(`${platform}으로 공유 준비 중입니다!`)} />
          )}
        </div>
      </main>

      {toast && <Toast message={toast} onClose={() => setToast(null)} />}
      {modal && <Modal title={modal.title} onClose={() => setModal(null)}>{modal.content}</Modal>}
    </div>
  );
}

function MainScreen({ links, lang, onTourStart, setModal, setToast }) {
  const ctaLabels = { KO: '사찰 투어 시작하기', EN: 'Start Temple Tour', ZH: '开始寺院之旅', JA: '寺院ツアーを始める' };
  const cta = ctaLabels[lang] || ctaLabels.KO;

  return (
    <div>
      {/* Today stats banner */}
      <div style={{ background: C.surface, borderRadius: 12, padding: '12px 16px', marginBottom: 14, border: `1px solid ${C.border}`, display: 'flex', justifyContent: 'space-between', alignItems: 'center', animation: 'fadeIn 300ms ease' }}>
        <div>
          <div style={{ fontSize: 12, color: C.textSub, marginBottom: 2 }}>오늘 사찰 방문객</div>
          <div style={{ fontSize: 18, fontWeight: 800, color: C.primary }}>247명</div>
        </div>

          <div style={{ fontSize: 12, color: C.textSub, marginBottom: 2 }}>이번 달 투어 참여</div>
          <div style={{ fontSize: 18, fontWeight: 800, color: C.accent }}>1,823명</div>
        </div>
        <div style={{ width: 40, height: 40, borderRadius: 10, background: C.langBg, display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 20 }}>🏯</div>
      </div>

      {/* Link tree */}
      <div style={{ display: 'flex', flexDirection: 'column', gap: 10, marginBottom: 20 }}>
        {links.map((link, i) => (
          <div key={i} onClick={() => setModal({ title: link.title, content: <LinkDetailContent link={link} setToast={setToast} /> })}
            style={{ background: C.surface, borderRadius: 14, padding: '14px 16px', border: `1px solid ${C.border}`, cursor: 'pointer', display: 'flex', alignItems: 'center', gap: 12, boxShadow: '0 2px 6px rgba(0,0,0,0.04)', transition: 'all 200ms', animation: `slideUp 380ms ease ${i * 80}ms both` }}
            onMouseEnter={e => { e.currentTarget.style.transform = 'translateY(-2px)'; e.currentTarget.style.boxShadow = '0 8px 20px rgba(139,105,20,0.14)'; }}
            onMouseLeave={e => { e.currentTarget.style.transform = ''; e.currentTarget.style.boxShadow = '0 2px 6px rgba(0,0,0,0.04)'; }}>
            <div style={{ width: 46, height: 46, borderRadius: 12, background: link.bg, display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 22, flexShrink: 0 }}>
              {link.icon}
            </div>
            <div style={{ flex: 1 }}>
              <div style={{ fontSize: 15, fontWeight: 700, color: C.text, marginBottom: 2 }}>{link.title}</div>
              <div style={{ fontSize: 12, color: C.textSub }}>{link.desc}</div>
            </div>
            <span style={{ color: C.secondary, fontSize: 16 }}>›</span>
          </div>
        ))}
      </div>

      {/* CTA Button */}
      <button onClick={onTourStart}
        style={{ width: '100%', padding: '15px', borderRadius: 14, border: 'none', background: `linear-gradient(135deg, ${C.primary}, ${C.secondary})`, color: '#fff', fontSize: 15, fontWeight: 700, cursor: 'pointer', boxShadow: '0 4px 16px rgba(139,105,20,0.32)', transition: 'all 200ms', letterSpacing: '-0.01em', fontFamily: 'Pretendard, sans-serif' }}
        onMouseEnter={e => { e.target.style.transform = 'translateY(-2px)'; e.target.style.boxShadow = '0 8px 24px rgba(139,105,20,0.44)'; }}
        onMouseLeave={e => { e.target.style.transform = ''; e.target.style.boxShadow = '0 4px 16px rgba(139,105,20,0.32)'; }}>
        🏯 {cta}
      </button>
      <p style={{ textAlign: 'center', fontSize: 12, color: C.textSub, marginTop: 10 }}>
        약 5분 · 5문항 MBTI식 설문 · 4가지 성향 유형
      </p>
    </div>
  );
}

function LinkDetailContent({ link, setToast }) {
  return (
    <div>
      <div style={{ display: 'flex', alignItems: 'center', gap: 12, marginBottom: 16, padding: '14px 16px', borderRadius: 12, background: link.bg }}>
        <span style={{ fontSize: 36 }}>{link.icon}</span>
        <div>
          <div style={{ fontSize: 16, fontWeight: 700, color: C.text }}>{link.title}</div>
          <div style={{ fontSize: 13, color: C.textSub }}>{link.desc}</div>
        </div>
      </div>
      <p style={{ fontSize: 14, color: C.text, lineHeight: 1.7, marginBottom: 16 }}>
        봉은사 공식 안내 페이지로 연결됩니다. 방문 전 운영 시간 및 프로그램 일정을 꼭 확인해 주세요.
      </p>
      <div style={{ padding: '12px 14px', borderRadius: 10, background: '#FFF8E7', border: `1px solid ${C.border}`, fontSize: 13, color: C.textSub, marginBottom: 14 }}>
        🕐 운영 시간: 매일 04:30 – 21:00 · 📍 서울 강남구 봉은사로 531
      </div>
      <button onClick={() => setToast('해당 페이지로 이동합니다!')}
        style={{ width: '100%', padding: '12px', borderRadius: 10, border: 'none', background: link.color, color: '#fff', fontSize: 14, fontWeight: 700, cursor: 'pointer', fontFamily: 'Pretendard, sans-serif' }}>
        바로가기 →
      </button>
    </div>
  );
}

function ProfileForm({ profile, setProfile, onSubmit }) {
  return (
    <div style={{ background: C.surface, borderRadius: 16, padding: 22, border: `1px solid ${C.border}`, boxShadow: '0 4px 16px rgba(139,105,20,0.08)', animation: 'fadeIn 300ms ease' }}>
      <div style={{ display: 'flex', alignItems: 'center', gap: 8, marginBottom: 20, padding: '10px 12px', borderRadius: 10, background: C.langBg, border: `1px solid ${C.border}` }}>
        <span style={{ fontSize: 16 }}>🔒</span>
        <span style={{ fontSize: 12, color: C.textSub, lineHeight: 1.4 }}>입력하신 정보는 AES-256 암호화 후 저장되며 투어 성향 분석 목적으로만 활용됩니다.</span>
      </div>

      {[
        { label: '이름', name: 'name', type: 'text' },
        { label: '성별', name: 'gender', options: ['여성', '남성', '기타'] },
        { label: '연령대', name: 'age', options: ['10대', '20대', '30대', '40대', '50대 이상'] },
        { label: '국적', name: 'nationality', options: ['대한민국', '미국/캐나다', '중국', '일본', '동남아시아', '유럽', '기타'] },
      ].map(field => (
        <div key={field.name} style={{ marginBottom: 14 }}>
          <label style={{ display: 'block', fontSize: 13, fontWeight: 600, color: C.text, marginBottom: 5 }}>{field.label}</label>
          {field.options ? (
            <select value={profile[field.name]} onChange={e => setProfile(p => ({ ...p, [field.name]: e.target.value }))}
              style={{ width: '100%', padding: '10px 12px', borderRadius: 10, border: `1.5px solid ${C.border}`, fontSize: 14, color: C.text, background: C.surface, fontFamily: 'Pretendard, sans-serif', appearance: 'none', cursor: 'pointer' }}>
              {field.options.map(o => <option key={o}>{o}</option>)}
            </select>
          ) : (
            <input type="text" value={profile[field.name]} onChange={e => setProfile(p => ({ ...p, [field.name]: e.target.value }))}
              style={{ width: '100%', padding: '10px 12px', borderRadius: 10, border: `1.5px solid ${C.border}`, fontSize: 14, color: C.text, background: C.surface, fontFamily: 'Pretendard, sans-serif' }} />
          )}
        </div>
      ))}

      <div style={{ display: 'flex', alignItems: 'flex-start', gap: 10, margin: '16px 0 20px', padding: '12px 14px', borderRadius: 10, background: '#F8FFF9', border: `1px solid #C8E6D0` }}>
        <input type="checkbox" id="consent" checked={profile.consent} onChange={e => setProfile(p => ({ ...p, consent: e.target.checked }))}
          style={{ marginTop: 2, accentColor: C.accent, width: 16, height: 16, cursor: 'pointer', flexShrink: 0 }} />
        <label htmlFor="consent" style={{ fontSize: 12, color: C.textSub, lineHeight: 1.6, cursor: 'pointer' }}>
          <strong style={{ color: C.text, display: 'block', marginBottom: 2 }}>개인정보 수집 및 이용 동의 (필수)</strong>
          수집 항목: 이름, 성별, 연령대, 국적 · 목적: 사찰투어 성향 분석 · 보유기간: 1년
        </label>
      </div>

      <button onClick={onSubmit} disabled={!profile.consent}
        style={{ width: '100%', padding: '14px', borderRadius: 12, border: 'none', background: profile.consent ? `linear-gradient(135deg, ${C.primary}, ${C.secondary})` : '#D0C5B0', color: '#fff', fontSize: 15, fontWeight: 700, cursor: profile.consent ? 'pointer' : 'not-allowed', transition: 'all 200ms', fontFamily: 'Pretendard, sans-serif' }}>
        설문 시작
      </button>
    </div>
  );
}

function SurveyScreen({ questions, currentQ, answers, onAnswer, onNext, onResult }) {
  const q = questions[currentQ];
  const selected = answers[currentQ];
  const isLast = currentQ === questions.length - 1;
  const [showGuide, setShowGuide] = useState(false);

  const bgColors = ['#1A3A2A', '#2D3A5A', '#3A2A1A', '#2A1A3A', '#1A3A30'];

  return (
    <div key={currentQ} style={{ animation: 'slideInRight 280ms ease' }}>
      {/* Section label — 설문 진행 인터페이스 */}
      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 10 }}>
        <div style={{ fontSize: 12, fontWeight: 600, color: C.textSub }}>설문 진행 인터페이스</div>
        <button onClick={() => setShowGuide(g => !g)} style={{ fontSize: 12, color: C.primary, background: 'none', border: 'none', cursor: 'pointer', fontFamily: 'Pretendard, sans-serif', fontWeight: 600 }}>
          {showGuide ? '안내 닫기 ↑' : '인터페이스 안내 ↓'}
        </button>
      </div>
      {showGuide && (
        <div style={{ marginBottom: 10, padding: '12px 14px', background: C.surface, borderRadius: 10, border: `1px solid ${C.border}`, fontSize: 12, color: C.textSub, lineHeight: 1.7, animation: 'slideDown 200ms ease' }}>
          각 질문마다 5개의 선택지 중 하나를 선택합니다. 선택 후 <strong style={{ color: C.text }}>다음 질문</strong> 버튼으로 이동하거나,
          언제든지 <strong style={{ color: C.text }}>결과 보기</strong>를 눌러 현재까지의 답변으로 성향 유형을 확인할 수 있습니다.
        </div>
      )}
      {/* Question image area */}
      <div style={{ height: 110, borderRadius: 14, background: `linear-gradient(135deg, ${bgColors[currentQ % bgColors.length]}, #4A7C59)`, marginBottom: 16, display: 'flex', alignItems: 'center', justifyContent: 'center', position: 'relative', overflow: 'hidden' }}>
        <span style={{ fontSize: 52, opacity: 0.9, filter: 'drop-shadow(0 2px 8px rgba(0,0,0,0.3))' }}>🏯</span>
        <div style={{ position: 'absolute', top: 10, left: 14, background: 'rgba(255,255,255,0.15)', borderRadius: 6, padding: '3px 8px', color: '#fff', fontSize: 11, fontWeight: 600 }}>
          봉은사 투어 · {currentQ + 1}/{questions.length}
        </div>
        <div style={{ position: 'absolute', bottom: 0, left: 0, right: 0, height: 2, background: `rgba(255,255,255,0.2)` }}>
          <div style={{ height: '100%', background: '#fff', width: `${((currentQ + 1) / questions.length) * 100}%`, transition: 'width 400ms ease' }} />
        </div>
      </div>

      {/* Question */}
      <div style={{ background: C.surface, borderRadius: 14, padding: '18px 16px', border: `1px solid ${C.border}`, boxShadow: '0 4px 12px rgba(139,105,20,0.07)', marginBottom: 12 }}>
        <div style={{ fontSize: 12, color: C.textSub, marginBottom: 8, fontWeight: 500 }}>Q{currentQ + 1}. 성향 파악 질문</div>
        <h3 style={{ fontSize: 15, fontWeight: 700, color: C.text, lineHeight: 1.55, marginBottom: 16 }}>{q.q}</h3>

        <div style={{ display: 'flex', flexDirection: 'column', gap: 8 }}>
          {q.choices.map((choice, i) => (
            <button key={i} onClick={() => onAnswer(currentQ, choice)}
              style={{ padding: '11px 14px', borderRadius: 10, border: `2px solid ${selected === choice ? C.primary : C.border}`, background: selected === choice ? C.langBg : C.surface, color: selected === choice ? C.primary : C.text, fontSize: 14, fontWeight: selected === choice ? 700 : 500, cursor: 'pointer', textAlign: 'left', transition: 'all 150ms', animation: `slideUp 280ms ease ${i * 50}ms both`, fontFamily: 'Pretendard, sans-serif' }}
              onMouseEnter={e => { if (selected !== choice) { e.currentTarget.style.borderColor = C.secondary; e.currentTarget.style.background = '#FFFBF0'; } }}
              onMouseLeave={e => { if (selected !== choice) { e.currentTarget.style.borderColor = C.border; e.currentTarget.style.background = C.surface; } }}>
              <span style={{ color: selected === choice ? C.primary : C.secondary, fontWeight: 700, marginRight: 8 }}>{i + 1}.</span>{choice}
            </button>
          ))}
        </div>
      </div>

      {/* Nav buttons */}
      <div style={{ display: 'flex', gap: 8 }}>
        <button onClick={onResult}
          style={{ flex: 1, padding: '12px', borderRadius: 10, border: `1.5px solid ${C.border}`, background: C.surface, color: C.textSub, fontSize: 13, fontWeight: 600, cursor: 'pointer', transition: 'all 150ms', fontFamily: 'Pretendard, sans-serif' }}
          onMouseEnter={e => { e.currentTarget.style.background = C.langBg; e.currentTarget.style.color = C.text; }}
          onMouseLeave={e => { e.currentTarget.style.background = C.surface; e.currentTarget.style.color = C.textSub; }}>
          결과 보기
        </button>
        {isLast ? (
          <button onClick={onResult}
            style={{ flex: 2, padding: '12px', borderRadius: 10, border: 'none', background: `linear-gradient(135deg, ${C.accent}, #2D5A3E)`, color: '#fff', fontSize: 14, fontWeight: 700, cursor: 'pointer', fontFamily: 'Pretendard, sans-serif' }}>
            최종 결과 확인 →
          </button>
        ) : (
          <button onClick={onNext} disabled={!selected}
            style={{ flex: 2, padding: '12px', borderRadius: 10, border: 'none', background: selected ? `linear-gradient(135deg, ${C.primary}, ${C.secondary})` : '#D0C5B0', color: '#fff', fontSize: 14, fontWeight: 700, cursor: selected ? 'pointer' : 'not-allowed', transition: 'all 150ms', fontFamily: 'Pretendard, sans-serif' }}>
            다음 질문 →
          </button>
        )}
      </div>
    </div>
  );
}

function ResultScreen({ result, onRestart, onShare }) {
  if (!result) return null;

  const shareButtons = [
    { name: '카카오톡', bg: '#FAE100', color: '#3C1E1E', icon: '💬' },
    { name: 'X', bg: '#000', color: '#fff', icon: '✕' },
    { name: '인스타그램', bg: '#E1306C', color: '#fff', icon: '📸' },
  ];

  return (
    <div style={{ animation: 'fadeIn 350ms ease' }}>
      {/* Type card */}
      <div style={{ background: C.surface, borderRadius: 20, overflow: 'hidden', boxShadow: '0 8px 32px rgba(0,0,0,0.13)', marginBottom: 14 }}>
        <div style={{ background: `linear-gradient(135deg, ${result.gradientFrom}, ${result.gradientTo})`, padding: '28px 20px', textAlign: 'center', color: '#fff' }}>
          <div style={{ fontSize: 54, marginBottom: 10, animation: 'slideUp 400ms ease' }}>{result.emoji}</div>
          <div style={{ fontSize: 11, opacity: 0.75, letterSpacing: '0.12em', marginBottom: 4, textTransform: 'uppercase' }}>나의 사찰 성향 유형</div>
          <div style={{ fontSize: 22, fontWeight: 800, letterSpacing: '-0.02em', marginBottom: 3 }}>{result.name}</div>
          <div style={{ fontSize: 13, opacity: 0.75, letterSpacing: '0.06em' }}>{result.kanji}</div>
        </div>
        <div style={{ padding: '18px 20px' }}>
          <p style={{ fontSize: 14, color: C.text, lineHeight: 1.7, marginBottom: 14 }}>{result.desc}</p>
          <div style={{ background: C.langBg, borderRadius: 10, padding: '12px 14px', marginBottom: 14, border: `1px solid ${C.border}` }}>
            <div style={{ fontSize: 11, color: C.textSub, marginBottom: 3, fontWeight: 600 }}>✨ 추천 프로그램</div>
            <div style={{ fontSize: 14, fontWeight: 700, color: C.primary }}>{result.recommend}</div>
          </div>
          <div>
            <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: 5, fontSize: 12, color: C.textSub }}>
              <span>전체 참여자 중 이 유형 비율</span>
              <span style={{ fontWeight: 700, color: result.color }}>{result.percent}%</span>
            </div>
            <div style={{ height: 7, borderRadius: 100, background: C.border, overflow: 'hidden' }}>
              <div style={{ height: '100%', background: `linear-gradient(90deg, ${result.gradientFrom}, ${result.gradientTo})`, borderRadius: 100, '--target-width': `${result.percent}%`, animation: 'barGrow 900ms ease 300ms both', width: `${result.percent}%` }} />
            </div>
          </div>
        </div>
      </div>

      {/* Share */}
      <div style={{ background: C.surface, borderRadius: 14, padding: '16px 18px', border: `1px solid ${C.border}`, marginBottom: 12 }}>
        <h3 style={{ fontSize: 14, fontWeight: 700, color: C.text, marginBottom: 12, textAlign: 'center' }}>결과 공유하기</h3>
        <div style={{ display: 'flex', gap: 8 }}>
          {shareButtons.map(btn => (
            <button key={btn.name} onClick={() => onShare(btn.name)}
              style={{ flex: 1, padding: '11px 6px', borderRadius: 10, border: 'none', background: btn.bg, color: btn.color, fontSize: 12, fontWeight: 700, cursor: 'pointer', display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 3, transition: 'all 150ms', fontFamily: 'Pretendard, sans-serif' }}
              onMouseEnter={e => e.currentTarget.style.transform = 'scale(1.05)'}
              onMouseLeave={e => e.currentTarget.style.transform = ''}>
              <span style={{ fontSize: 16 }}>{btn.icon}</span>
              <span>{btn.name}</span>
            </button>
          ))}
        </div>
      </div>

      <button onClick={onRestart}
        style={{ width: '100%', padding: '13px', borderRadius: 12, border: `1.5px solid ${C.border}`, background: C.surface, color: C.textSub, fontSize: 14, fontWeight: 600, cursor: 'pointer', fontFamily: 'Pretendard, sans-serif' }}>
        🔄 다시 시작하기
      </button>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
