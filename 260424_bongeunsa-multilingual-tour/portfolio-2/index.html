@keyframes slideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}

@keyframes countUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.5}}
@keyframes barGrow{from{width:0%}to{width:var(--target-width)}}

  { id: 'P002', name: 'Emily Chen', gender: '여성', age: '30대', nationality: '미국/캐나다', lang: 'English', type: '역사 탐구자', date: '2026-04-24 14:08' },

function CountUp({ end, suffix = '' }) {
  const [val, setVal] = useState(0);
  useEffect(() => {
    let start = 0;
    const step = end / 75;
    const timer = setInterval(() => {
      start += step;
      if (start >= end) { setVal(end); clearInterval(timer); }
      else setVal(Math.floor(start));
    }, 16);
    return () => clearInterval(timer);
  }, [end]);
  return <span style={{ animation: 'countUp 400ms ease' }}>{val.toLocaleString()}{suffix}</span>;
}

function Toast({ message, type = 'success', onClose }) {
  useEffect(() => { const t = setTimeout(onClose, 3000); return () => clearTimeout(t); }, []);
  const bg = type === 'success' ? C.accent : type === 'error' ? C.danger : C.primary;
  return (
    <div style={{ position: 'fixed', bottom: 24, right: 24, zIndex: 9999, background: bg, color: '#fff', padding: '12px 20px', borderRadius: 10, animation: 'slideUp 300ms ease', boxShadow: '0 4px 16px rgba(0,0,0,0.2)', fontSize: 14, fontWeight: 600, display: 'flex', alignItems: 'center', gap: 8 }}>
      <span>{type === 'success' ? '✓' : '!'}</span>{message}
    </div>
  );
}

function Modal({ title, onClose, children, width = 560 }) {
  return (
    <div style={{ position: 'fixed', inset: 0, zIndex: 500, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
      <div onClick={onClose} style={{ position: 'absolute', inset: 0, background: 'rgba(0,0,0,0.4)', animation: 'fadeIn 200ms ease' }} />
      <div style={{ position: 'relative', width, maxHeight: '85vh', background: C.surface, borderRadius: 14, zIndex: 501, animation: 'fadeInScale 220ms ease', display: 'flex', flexDirection: 'column', boxShadow: '0 20px 60px rgba(0,0,0,0.18)' }}>
        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', padding: '18px 24px', borderBottom: `1px solid ${C.border}` }}>
          <h3 style={{ fontSize: 17, fontWeight: 700, color: C.text }}>{title}</h3>
          <button onClick={onClose} style={{ background: 'none', border: 'none', fontSize: 20, cursor: 'pointer', color: C.textSub, lineHeight: 1 }}>✕</button>
        </div>
        <div style={{ padding: 24, overflowY: 'auto', flex: 1 }}>{children}</div>
      </div>

  );
}

function Card({ children, style }) {

    <div style={{ background: C.surface, borderRadius: 12, border: `1px solid ${C.border}`, boxShadow: '0 2px 8px rgba(15,23,42,0.05)', ...style }}>

function Badge({ label, color }) {
  const colors = {
    success: { bg: '#DCFCE7', text: '#166534' },
    warning: { bg: '#FEF9C3', text: '#854D0E' },
    info: { bg: '#DBEAFE', text: '#1E40AF' },
    neutral: { bg: '#F1F5F9', text: '#475569' },
  };
  const s = colors[color] || colors.neutral;
  return (
    <span style={{ display: 'inline-block', padding: '2px 8px', borderRadius: 100, background: s.bg, color: s.text, fontSize: 11, fontWeight: 700 }}>{label}</span>
  );
}

          </div>
          <div style={{ marginBottom: 14 }}>
            <label style={{ display: 'block', fontSize: 12, fontWeight: 600, color: C.text, marginBottom: 5 }}>해상도</label>
            <select value={qrSize} onChange={e => setQrSize(e.target.value)}
              style={{ width: '100%', padding: '9px 12px', borderRadius: 8, border: `1.5px solid ${C.border}`, fontSize: 13, color: C.text, fontFamily: 'Pretendard, sans-serif' }}>
              {['150dpi', '300dpi', '600dpi'].map(s => <option key={s}>{s}</option>)}
            </select>
          </div>
          {qrGenerated && (
            <div style={{ display: 'flex', justifyContent: 'center', marginBottom: 14, padding: '12px', background: C.bg, borderRadius: 10, border: `1px solid ${C.border}` }}>
              <div style={{ width: 80, height: 80, background: 'repeating-conic-gradient(#1E5FA8 0% 25%, #fff 0% 50%) 0/20px 20px', borderRadius: 4 }} />
            </div>
          )}
          <button onClick={handleQR} disabled={qrLoading}
            style={{ width: '100%', padding: '12px', borderRadius: 10, border: 'none', background: qrLoading ? '#94A3B8' : C.primary, color: '#fff', fontSize: 14, fontWeight: 700, cursor: qrLoading ? 'default' : 'pointer', display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 8, fontFamily: 'Pretendard, sans-serif', transition: 'background 200ms' }}>
            {qrLoading ? (
              <><span style={{ animation: 'pulse 1s infinite' }}>⏳</span> QR 생성 중...</>
            ) : '🔲 QR 코드 생성'}
          </button>
        </Card>
      </div>

      {/* Audit log */}
      <Card>
        <div style={{ padding: '14px 18px', borderBottom: `1px solid ${C.border}` }}>
          <h3 style={{ fontSize: 14, fontWeight: 700, color: C.text }}>감사 로그 — 최근 다운로드 이력</h3>
        </div>
        <div>
          {auditLog.map((log, i) => (
            <div key={i} style={{ padding: '12px 18px', borderTop: i > 0 ? `1px solid ${C.border}` : 'none', display: 'flex', gap: 16, alignItems: 'center', animation: `slideUp 280ms ease ${i * 60}ms both` }}>
              <div style={{ width: 32, height: 32, borderRadius: 8, background: log.action.includes('Excel') ? '#DCFCE7' : '#DBEAFE', display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 14, flexShrink: 0 }}>
                {log.action.includes('Excel') ? '📊' : '🔲'}
              </div>
              <div style={{ flex: 1 }}>
                <div style={{ fontSize: 13, fontWeight: 600, color: C.text }}>{log.action}</div>
                <div style={{ fontSize: 12, color: C.textSub }}>담당자: {log.user} · {log.items}</div>
              </div>
              <div style={{ fontSize: 12, color: C.textSub }}>{log.date}</div>
            </div>
          ))}
        </div>
      </Card>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
