function CountUp({ end, duration = 1200, suffix = '' }) {
  const [val, setVal] = React.useState(0);
  React.useEffect(() => {
    let start = 0; const step = end / (duration / 16);
    const timer = setInterval(() => {
      start += step;
      if (start >= end) { setVal(end); clearInterval(timer); }
      else setVal(Math.floor(start));
    }, 16);
    return () => clearInterval(timer);
  }, [end]);
  return <span style={{ animation: 'countUp 400ms ease' }}>{val.toLocaleString()}{suffix}</span>;
}

function Toast({ message, type = 'success', onClose }) {
  React.useEffect(() => { const t = setTimeout(onClose, 3000); return () => clearTimeout(t); }, []);
  const bg = type === 'success' ? C.success : type === 'error' ? C.danger : C.primary;
  return (
    <div style={{ position: 'fixed', bottom: 24, right: 24, zIndex: 9999, background: bg, color: '#fff', padding: '12px 20px', borderRadius: 10, animation: 'slideUp 300ms ease', boxShadow: '0 4px 16px rgba(0,0,0,0.2)', display: 'flex', alignItems: 'center', gap: 10, fontSize: 14, fontWeight: 600 }}>
      <span>{type === 'success' ? '✓' : type === 'error' ? '✕' : 'ℹ'}</span>
      {message}
    </div>
  );
}

            <tr style={{ background: '#F8FAFF' }}>
              {['도면명', '프로젝트', '분석일', '준수율', '마킹수', '리포트', '상태'].map(h => (
                <th key={h} style={{ padding: '12px 16px', fontSize: 12, fontWeight: 600, color: C.textSub, textAlign: 'left', borderBottom: `1px solid ${C.border}` }}>{h}</th>
              ))}
            </tr>
          </thead>
          <tbody>
            {filtered.map((h, i) => (
              <tr key={h.id} onClick={() => setDrawer({ ...h, drawerType: 'history' })} style={{ borderBottom: `1px solid ${C.border}`, cursor: 'pointer', animation: `slideUp 300ms ease ${i * 50}ms both` }}
                onMouseEnter={e => e.currentTarget.style.background = '#F8FAFF'}
                onMouseLeave={e => e.currentTarget.style.background = 'transparent'}>
                <td style={{ padding: '13px 16px', fontSize: 13, color: C.text, maxWidth: 220 }}>
                  <div style={{ fontWeight: 600, marginBottom: 2, overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>{h.name}</div>
                </td>
                <td style={{ padding: '13px 16px', fontSize: 12, color: C.textSub }}>{h.project}</td>
                <td style={{ padding: '13px 16px', fontSize: 12, color: C.textSub }}>{h.date}</td>
                <td style={{ padding: '13px 16px', fontSize: 13, fontWeight: 700, color: h.compliance >= 90 ? C.success : h.compliance >= 80 ? C.warning : C.textSub }}>{h.compliance !== null ? `${h.compliance}%` : '-'}</td>
                <td style={{ padding: '13px 16px', fontSize: 13, color: C.text }}>{h.markings !== null ? `${h.markings}개` : '-'}</td>
                <td style={{ padding: '13px 16px', fontSize: 13, color: C.text }}>{h.reports}건</td>
                <td style={{ padding: '13px 16px' }}><StatusBadge status={h.status} /></td>
              </tr>
            ))}
          </tbody>
        </table>
        <div style={{ padding: '14px 24px', borderTop: `1px solid ${C.border}`, fontSize: 13, color: C.textSub }}>{filtered.length}건 표시</div>
      </div>
    </div>
  );
}

function App() {
  const [tab, setTab] = React.useState('main');
  const [drawer, setDrawer] = React.useState(null);
  const [modal, setModal] = React.useState(null);
  const [toasts, setToasts] = React.useState([]);

  const toast = (message, type = 'success') => {
    const id = Date.now();
    setToasts(t => [...t, { id, message, type }]);
    setTimeout(() => setToasts(t => t.filter(x => x.id !== id)), 3500);
  };

  const meta = PAGE_META[tab];

  return (
    <div style={{ display: 'flex', flexDirection: 'column', width: '100%', minHeight: '100vh', background: C.bg }}>
      {/* 상단 네비게이션 */}
      <header style={{ position: 'sticky', top: 0, zIndex: 100, background: C.surface, borderBottom: `1px solid ${C.border}`, display: 'flex', alignItems: 'center', height: 56, padding: '0 24px', gap: 6, boxShadow: '0 1px 4px rgba(0,0,0,0.06)' }}>
        <div style={{ display: 'flex', alignItems: 'center', gap: 10, marginRight: 20 }}>
          <div style={{ width: 30, height: 30, background: C.primary, borderRadius: 8, display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 16 }}>🔥</div>
          <span style={{ fontSize: 16, fontWeight: 800, color: C.text, letterSpacing: '-0.02em' }}>파이어체크</span>
        </div>
        {TABS.map(t => (
          <button key={t.id} onClick={() => setTab(t.id)} title={t.label} style={{ background: tab === t.id ? '#EEF2FF' : 'none', color: tab === t.id ? C.primary : C.textSub, border: 'none', borderRadius: 8, padding: '6px 14px', fontSize: 14, fontWeight: tab === t.id ? 700 : 500, cursor: 'pointer', transition: 'all 150ms', whiteSpace: 'nowrap' }}>
            {t.label}
          </button>
        ))}
        <div style={{ flex: 1 }} />
        <div style={{ display: 'flex', alignItems: 'center', gap: 12 }}>
          <div style={{ position: 'relative' }}>
            <button style={{ background: 'none', border: 'none', cursor: 'pointer', fontSize: 18, color: C.textSub }}>🔔</button>
            <div style={{ position: 'absolute', top: 0, right: 0, width: 8, height: 8, background: C.accent, borderRadius: '50%' }} />
          </div>
          <div style={{ width: 32, height: 32, background: C.primary, borderRadius: '50%', display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 13, fontWeight: 700, color: '#fff' }}>김</div>
        </div>
      </header>

      {/* 히어로 배너 */}
      <div style={{ background: `linear-gradient(135deg, ${C.primary} 0%, ${C.secondary} 100%)`, padding: '24px 32px', color: '#fff' }}>
        <div style={{ display: 'flex', alignItems: 'center', gap: 12, marginBottom: 14 }}>
          <span style={{ fontSize: 24 }}>{meta.icon}</span>
          <h1 style={{ fontSize: 22, fontWeight: 800, letterSpacing: '-0.02em' }}>{meta.title}</h1>
        </div>
        <div style={{ display: 'flex', gap: 32 }}>
          {meta.kpis.map((k, i) => (
            <div key={k.label} style={{ animation: `slideUp 400ms ease ${i * 100}ms both` }}>
              <div style={{ fontSize: 26, fontWeight: 800, lineHeight: 1 }}><CountUp end={k.value} suffix={k.suffix} /></div>
              <div style={{ fontSize: 12, opacity: 0.8, marginTop: 4 }}>{k.label}</div>
            </div>
          ))}
        </div>
      </div>

      {/* 메인 콘텐츠 */}
      <main style={{ flex: 1, padding: '24px 32px' }}>
        {tab === 'main' && <MainPage setDrawer={setDrawer} setModal={setModal} toast={toast} />}
        {tab === 'marking' && <MarkingPage setDrawer={setDrawer} />}
        {tab === 'load-check' && <LoadCheckPage toast={toast} />}
        {tab === 'report' && <ReportPage toast={toast} />}
        {tab === 'history' && <HistoryPage setDrawer={setDrawer} />}
      </main>

      {/* Drawer */}
      {drawer && (
        <Drawer title={drawer.drawerType === 'marking' ? `마킹 상세 — B${drawer.id}` : drawer.drawerType === 'history' ? '검토 이력 상세' : '분석 결과 상세'} onClose={() => setDrawer(null)}>
          {drawer.drawerType === 'marking' ? (
            <div>
              <div style={{ background: C.bg, borderRadius: 10, padding: 18, marginBottom: 16 }}>
                <div style={{ fontSize: 12, color: C.textSub, marginBottom: 4 }}>위치</div>
                <div style={{ fontSize: 14, fontWeight: 600, color: C.text, marginBottom: 12 }}>{drawer.pos}</div>
                <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 12 }}>
                  {[{ label: '마킹 유형', val: drawer.type }, { label: '적용 법규', val: drawer.rule }, { label: '설치 간격', val: `${drawer.distance}m` }, { label: '판정', val: drawer.status }].map(f => (
                    <div key={f.label}>
                      <div style={{ fontSize: 11, color: C.textSub, marginBottom: 3 }}>{f.label}</div>
                      <div style={{ fontSize: 13, fontWeight: 600, color: C.text }}>{f.label === '판정' ? <StatusBadge status={f.val} /> : f.val}</div>
                    </div>
                  ))}
                </div>
              </div>
              {drawer.status !== '적정' && (
                <div style={{ background: '#FEF3C7', border: '1px solid #FDE68A', borderRadius: 10, padding: 14, marginBottom: 16 }}>
                  <div style={{ fontSize: 13, fontWeight: 600, color: '#92400E' }}>개선 권고</div>
                  <div style={{ fontSize: 12, color: '#92400E', marginTop: 6 }}>설치 간격이 법규 기준({drawer.type === '종방향' ? '12m' : drawer.type === '횡방향' ? '6m' : '2.8m'})을 초과합니다. 버팀대 위치를 조정하거나 추가 설치를 검토하세요.</div>
                </div>
              )}
              <button onClick={() => { setDrawer(null); toast('마킹 수정 사항이 저장되었습니다.'); }} style={{ width: '100%', background: C.primary, color: '#fff', border: 'none', borderRadius: 8, padding: '11px', fontSize: 14, fontWeight: 600, cursor: 'pointer' }}>마킹 수정 저장</button>
            </div>
          ) : (
            <div>
              <div style={{ background: C.bg, borderRadius: 10, padding: 18, marginBottom: 16 }}>
                <div style={{ fontSize: 14, fontWeight: 700, color: C.text, marginBottom: 12 }}>{drawer.name}</div>
                <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 12 }}>
                  {[
                    { label: '프로젝트', val: drawer.project || '-' },
                    { label: '분석일', val: drawer.date || '-' },
                    { label: '법규 준수율', val: drawer.compliance ? `${drawer.compliance}%` : '-' },
                    { label: '마킹 수', val: drawer.markings ? `${drawer.markings}개` : '-' },
                    { label: '리포트', val: `${drawer.reports || 0}건` },
                    { label: '상태', val: drawer.status },
                  ].map(f => (
                    <div key={f.label}>
                      <div style={{ fontSize: 11, color: C.textSub, marginBottom: 3 }}>{f.label}</div>
                      <div style={{ fontSize: 13, fontWeight: 600, color: C.text }}>{f.label === '상태' ? <StatusBadge status={f.val} /> : f.val}</div>
                    </div>
                  ))}
                </div>
              </div>
              <button onClick={() => { setDrawer(null); toast('리포트 다운로드 시작'); }} style={{ width: '100%', background: C.primary, color: '#fff', border: 'none', borderRadius: 8, padding: '11px', fontSize: 14, fontWeight: 600, cursor: 'pointer' }}>리포트 다운로드</button>
            </div>
          )}
        </Drawer>
      )}

      {/* 토스트 */}
      {toasts.map(t => <Toast key={t.id} message={t.message} type={t.type} onClose={() => setToasts(ts => ts.filter(x => x.id !== t.id))} />)}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
