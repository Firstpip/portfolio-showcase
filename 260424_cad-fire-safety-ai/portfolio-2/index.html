<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>파이어허브 — 소방설계 팀 협업 분석 플랫폼</title>
<link rel="preconnect" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://unpkg.com/prop-types/prop-types.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/recharts@2.15.0/umd/Recharts.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;font-family:'Pretendard',sans-serif;background:#111827;color:#F9FAFB}
#root{display:flex;flex-direction:column;width:100%;min-height:100vh}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:#1F2937}
::-webkit-scrollbar-thumb{background:#374151;border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:#4B5563}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes fadeInScale{from{opacity:0;transform:scale(0.96)}to{opacity:1;transform:scale(1)}}
@keyframes slideUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideInRight{from{opacity:0;transform:translateX(24px)}to{opacity:1;transform:translateX(0)}}
@keyframes slideInLeft{from{opacity:0;transform:translateX(-24px)}to{opacity:1;transform:translateX(0)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.45}}
@keyframes glow{0%,100%{box-shadow:0 0 0 0 rgba(29,181,132,0.4)}50%{box-shadow:0 0 0 8px rgba(29,181,132,0)}}
@keyframes barGrow{from{width:0}to{width:var(--tw)}}
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
@keyframes countUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes borderFlash{0%,100%{border-color:#374151}50%{border-color:#1DB584}}
@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const C = {
  primary:'#1DB584', primaryHover:'#17A076',
  accent:'#E84855',
  bg:'#111827', surface:'#1F2937', surfaceAlt:'#2D3748',
  border:'#374151', borderLight:'#4B5563',
  text:'#F9FAFB', textSub:'#9CA3AF', textMuted:'#6B7280',
  success:'#10B981', warning:'#F59E0B', danger:'#EF4444', info:'#3B82F6',
};

const { AreaChart, Area, BarChart, Bar, PieChart, Pie, Cell,
        LineChart, Line, XAxis, YAxis, CartesianGrid, Tooltip,
        ResponsiveContainer, Legend } = Recharts;

/* ── 공통 컴포넌트 ── */
function Badge({ label, color = C.primary, bg }) {
  return (
    <span style={{ display:'inline-flex', alignItems:'center', padding:'2px 8px',
      background: bg || color+'22', color, fontSize:11, fontWeight:700,
      borderRadius:4, border:`1px solid ${color}44` }}>
      {label}
    </span>
  );
}

function StatCard({ icon, label, value, sub, color = C.primary, trend }) {
  return (
    <div style={{ background:C.surface, border:`1px solid ${C.border}`, borderRadius:6,
      padding:'18px 20px', animation:'slideUp 350ms ease' }}>
      <div style={{ display:'flex', justifyContent:'space-between', alignItems:'flex-start' }}>
        <div>
          <div style={{ fontSize:12, color:C.textSub, fontWeight:600, marginBottom:6 }}>{label}</div>
          <div style={{ fontSize:28, fontWeight:800, color:C.text, animation:'countUp 400ms ease' }}>{value}</div>
          {sub && <div style={{ fontSize:12, color:C.textMuted, marginTop:4 }}>{sub}</div>}
        </div>
        <div style={{ width:40, height:40, borderRadius:8, background:color+'22',
          display:'flex', alignItems:'center', justifyContent:'center', fontSize:20 }}>{icon}</div>
      </div>
      {trend !== undefined && (
        <div style={{ marginTop:10, display:'flex', alignItems:'center', gap:4 }}>
          <span style={{ fontSize:12, color: trend >= 0 ? C.success : C.danger, fontWeight:600 }}>
            {trend >= 0 ? '▲' : '▼'} {Math.abs(trend)}%
          </span>
          <span style={{ fontSize:11, color:C.textMuted }}>지난 주 대비</span>
        </div>
      )}
    </div>
  );
}

function Toast({ message, type = 'success', onClose }) {
  React.useEffect(() => { const t = setTimeout(onClose, 3000); return () => clearTimeout(t); }, []);
  const color = type === 'success' ? C.success : type === 'error' ? C.danger : C.primary;
  return (
    <div style={{ position:'fixed', bottom:24, right:24, zIndex:9999,
      background:C.surfaceAlt, color:C.text, padding:'12px 20px',
      borderRadius:6, border:`1px solid ${color}`, animation:'slideUp 300ms ease',
      boxShadow:'0 8px 32px rgba(0,0,0,0.4)', display:'flex', alignItems:'center', gap:10, fontSize:14, fontWeight:600 }}>
      <span style={{ color }}>{type === 'success' ? '✓' : '✕'}</span>
      {message}
    </div>
  );
}

function Modal({ title, onClose, children, width = 560 }) {
  return (
    <div style={{ position:'fixed', inset:0, zIndex:500, display:'flex', alignItems:'center', justifyContent:'center' }}>
      <div onClick={onClose} style={{ position:'absolute', inset:0, background:'rgba(0,0,0,0.6)', animation:'fadeIn 200ms ease' }} />
      <div style={{ position:'relative', width, maxHeight:'85vh', background:C.surface,
        border:`1px solid ${C.border}`, borderRadius:8, zIndex:501,
        animation:'fadeInScale 200ms ease', display:'flex', flexDirection:'column',
        boxShadow:'0 24px 80px rgba(0,0,0,0.5)' }}>
        <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center',
          padding:'16px 22px', borderBottom:`1px solid ${C.border}` }}>
          <h3 style={{ fontSize:16, fontWeight:700, color:C.text }}>{title}</h3>
          <button onClick={onClose} style={{ background:'none', border:'none', fontSize:18,
            cursor:'pointer', color:C.textSub, lineHeight:1 }}>✕</button>
        </div>
        <div style={{ padding:22, overflowY:'auto', flex:1 }}>{children}</div>
      </div>
    </div>
  );
}

/* ── 공통 Drawer (오른쪽 슬라이드) ── */
function Drawer({ title, onClose, children }) {
  return (
    <>
      <div onClick={onClose} style={{ position:'fixed', inset:0, background:'rgba(0,0,0,0.5)', zIndex:200, animation:'fadeIn 200ms ease' }} />
      <div style={{ position:'fixed', top:0, right:0, bottom:0, width:480,
        background:C.surface, border:`1px solid ${C.border}`, zIndex:201,
        overflowY:'auto', padding:26, animation:'slideInRight 200ms ease',
        boxShadow:'-12px 0 60px rgba(0,0,0,0.4)' }}>
        <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:22 }}>
          <h3 style={{ fontSize:17, fontWeight:700, color:C.text }}>{title}</h3>
          <button onClick={onClose} style={{ background:'none', border:'none', fontSize:20,
            cursor:'pointer', color:C.textSub }}>✕</button>
        </div>
        {children}
      </div>
    </>
  );
}

/* ── 입력 공통 스타일 ── */
const inputStyle = {
  width:'100%', padding:'9px 12px', background:C.surfaceAlt, border:`1px solid ${C.border}`,
  borderRadius:6, color:C.text, fontSize:13, outline:'none', fontFamily:'inherit',
};
const btnStyle = (variant='primary') => ({
  padding:'8px 16px', border:'none', borderRadius:6, cursor:'pointer', fontSize:13, fontWeight:600,
  background: variant === 'primary' ? C.primary : variant === 'danger' ? C.danger : C.surfaceAlt,
  color: variant === 'ghost' ? C.textSub : '#fff',
  transition:'opacity 0.15s',
});

/* ════════════════════════════════════
   화면 1: 팀 협업 대시보드 (main)
════════════════════════════════════ */
const complianceData = [
  { week:'1주', 준수율:72, 건수:14 },
  { week:'2주', 준수율:78, 건수:18 },
  { week:'3주', 준수율:83, 건수:22 },
  { week:'4주', 준수율:81, 건수:19 },
  { week:'5주', 준수율:88, 건수:26 },
  { week:'6주', 준수율:91, 건수:24 },
];
const markingTypePie = [
  { name:'종방향', value:38 }, { name:'횡방향', value:27 },
  { name:'말단', value:21 }, { name:'수직', value:14 },
];
const PIE_COLORS = [C.primary, C.info, C.warning, '#8B5CF6'];

const pendingItems = [
  { id:1, project:'삼성동 오피스 B동', reviewer:'김민준', deadline:'2026-04-26', status:'검토중' },
  { id:2, project:'강남구 소방설비 A층', reviewer:'이서연', deadline:'2026-04-27', status:'대기중' },
  { id:3, project:'마포구 상가 3층', reviewer:'박지호', deadline:'2026-04-28', status:'검토중' },
  { id:4, project:'서초구 데이터센터', reviewer:'최유진', deadline:'2026-04-29', status:'대기중' },
];

function MainDashboard({ showToast }) {
  const [alertDismissed, setAlertDismissed] = React.useState(false);
  const [approving, setApproving] = React.useState(null);
  return (
    <div style={{ animation:'slideUp 300ms ease' }}>
      {!alertDismissed && (
        <div style={{ background:'#1DB58418', border:`1px solid ${C.primary}55`,
          borderRadius:6, padding:'12px 18px', marginBottom:20,
          display:'flex', justifyContent:'space-between', alignItems:'center',
          animation:'borderFlash 2s ease 1' }}>
          <div style={{ display:'flex', alignItems:'center', gap:10 }}>
            <span style={{ color:C.primary, fontSize:16 }}>🔔</span>
            <span style={{ fontSize:13, color:C.text }}>
              <strong>이서연</strong> 팀원이 "마포구 상가 3층" 도면 분석을 완료했습니다.
            </span>
          </div>
          <button onClick={() => setAlertDismissed(true)}
            style={{ background:'none', border:'none', color:C.textSub, cursor:'pointer', fontSize:16 }}>✕</button>
        </div>
      )}

      <div style={{ display:'grid', gridTemplateColumns:'repeat(4,1fr)', gap:14, marginBottom:24 }}>
        <StatCard icon="📁" label="이번 달 분석 건수" value="24" sub="전월 19건" color={C.primary} trend={26} />
        <StatCard icon="✅" label="평균 법규 준수율" value="91%" sub="목표 90% 초과" color={C.success} trend={8} />
        <StatCard icon="⏳" label="미결 검토 항목" value="4" sub="평균 처리 2.1일" color={C.warning} />
        <StatCard icon="👥" label="활성 팀원" value="7" sub="이번 주 기여 5명" color={C.info} />
      </div>

      <div style={{ display:'grid', gridTemplateColumns:'2fr 1fr', gap:14, marginBottom:24 }}>
        <div style={{ background:C.surface, border:`1px solid ${C.border}`, borderRadius:6, padding:20 }}>
          <div style={{ fontSize:14, fontWeight:700, color:C.text, marginBottom:16 }}>주간 법규 준수율 추이</div>
          <ResponsiveContainer width="100%" height={200}>
            <AreaChart data={complianceData}>
              <defs>
                <linearGradient id="cGrad" x1="0" y1="0" x2="0" y2="1">
                  <stop offset="5%" stopColor={C.primary} stopOpacity={0.3} />
                  <stop offset="95%" stopColor={C.primary} stopOpacity={0} />
                </linearGradient>
              </defs>
              <CartesianGrid stroke={C.border} strokeDasharray="3 3" />
              <XAxis dataKey="week" tick={{ fill:C.textSub, fontSize:11 }} axisLine={false} tickLine={false} />
              <YAxis tick={{ fill:C.textSub, fontSize:11 }} axisLine={false} tickLine={false} domain={[60,100]} />
              <Tooltip contentStyle={{ background:C.surfaceAlt, border:`1px solid ${C.border}`, borderRadius:6, color:C.text }} />
              <Area type="monotone" dataKey="준수율" stroke={C.primary} fill="url(#cGrad)" strokeWidth={2} dot={{ fill:C.primary, r:3 }} />
            </AreaChart>
          </ResponsiveContainer>
        </div>
        <div style={{ background:C.surface, border:`1px solid ${C.border}`, borderRadius:6, padding:20 }}>
          <div style={{ fontSize:14, fontWeight:700, color:C.text, marginBottom:16 }}>마킹 유형 분포</div>
          <ResponsiveContainer width="100%" height={160}>
            <PieChart>
              <Pie data={markingTypePie} cx="50%" cy="50%" innerRadius={45} outerRadius={70}
                dataKey="value" paddingAngle={3}>
                {markingTypePie.map((_, i) => <Cell key={i} fill={PIE_COLORS[i]} />)}
              </Pie>
              <Tooltip contentStyle={{ background:C.surfaceAlt, border:`1px solid ${C.border}`, borderRadius:6, color:C.text }} />
            </PieChart>
          </ResponsiveContainer>
          <div style={{ display:'flex', flexWrap:'wrap', gap:6, marginTop:8 }}>
            {markingTypePie.map((d, i) => (
              <div key={i} style={{ display:'flex', alignItems:'center', gap:4, fontSize:11, color:C.textSub }}>
                <div style={{ width:8, height:8, borderRadius:'50%', background:PIE_COLORS[i] }} />
                {d.name} {d.value}%
              </div>
            ))}
          </div>
        </div>
      </div>

      <div style={{ background:C.surface, border:`1px solid ${C.border}`, borderRadius:6, padding:20 }}>
        <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:16 }}>
          <div style={{ fontSize:14, fontWeight:700, color:C.text }}>미결 검토 항목</div>
          <Badge label={`${pendingItems.length}건 대기`} color={C.warning} />
        </div>
        <table style={{ width:'100%', borderCollapse:'collapse', fontSize:13 }}>
          <thead>
            <tr style={{ borderBottom:`1px solid ${C.border}` }}>
              {['프로젝트명','담당자','마감일','상태','액션'].map(h => (
                <th key={h} style={{ padding:'8px 12px', textAlign:'left', color:C.textSub, fontWeight:600, fontSize:11 }}>{h}</th>
              ))}
            </tr>
          </thead>
          <tbody>
            {pendingItems.map(item => (
              <tr key={item.id} style={{ borderBottom:`1px solid ${C.border}22` }}>
                <td style={{ padding:'10px 12px', color:C.text, fontWeight:600 }}>{item.project}</td>
                <td style={{ padding:'10px 12px', color:C.textSub }}>{item.reviewer}</td>
                <td style={{ padding:'10px 12px', color:C.textSub }}>{item.deadline}</td>
                <td style={{ padding:'10px 12px' }}>
                  <Badge label={item.status} color={item.status === '검토중' ? C.primary : C.warning} />
                </td>
                <td style={{ padding:'10px 12px' }}>
                  <button onClick={() => {
                    setApproving(item.id);
                    setTimeout(() => { setApproving(null); showToast(`"${item.project}" 검토 승인 완료`); }, 900);
                  }} style={{ ...btnStyle('primary'), padding:'5px 12px', fontSize:12,
                    opacity: approving === item.id ? 0.6 : 1 }}>
                    {approving === item.id ? '처리 중...' : '승인'}
                  </button>
                </td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>
    </div>
  );
}

/* ════════════════════════════════════
   화면 2: 도면 버전 관리 및 댓글
════════════════════════════════════ */
const versionList = [
  { id:'v1.3', date:'2026-04-23 14:22', author:'김민준', changes:'버팀대 마킹 7개 수정', status:'최신', compliance:91 },
  { id:'v1.2', date:'2026-04-22 10:41', author:'이서연', changes:'하중 검토 기준 재적용', status:'이전', compliance:85 },
  { id:'v1.1', date:'2026-04-21 09:15', author:'박지호', changes:'도면 배관 재인식', status:'이전', compliance:78 },
  { id:'v1.0', date:'2026-04-20 17:30', author:'김민준', changes:'최초 분석 등록', status:'기본', compliance:72 },
];
const initComments = [
  { id:1, author:'이서연', time:'14:35', anchor:'마킹 #A-12', text:'종방향 버팀대 간격이 12.3m로 법규 초과입니다. v1.3에서 수정 필요합니다.' },
  { id:2, author:'박지호', time:'15:02', anchor:'마킹 #B-07', text:'횡방향 기준은 6m인데 현재 5.8m로 정상 범위입니다. 하중 검토 후 확인 부탁드립니다.' },
  { id:3, author:'최유진', time:'15:48', anchor:'마킹 #C-03', text:'말단 거리 2.6m로 기준(2.8m) 미달입니다. 재마킹 요청드립니다.' },
];

function VersionScreen({ showToast }) {
  const [selected, setSelected] = React.useState(versionList[0]);
  const [comments, setComments] = React.useState(initComments);
  const [newComment, setNewComment] = React.useState('');
  const [compareMode, setCompareMode] = React.useState(false);

  return (
    <div style={{ display:'grid', gridTemplateColumns:'280px 1fr', gap:16, animation:'slideUp 300ms ease' }}>
      <div style={{ background:C.surface, border:`1px solid ${C.border}`, borderRadius:6, padding:16 }}>
        <div style={{ fontSize:13, fontWeight:700, color:C.text, marginBottom:14, display:'flex', justifyContent:'space-between' }}>
          버전 이력
          <button onClick={() => { setCompareMode(!compareMode); showToast(compareMode ? '비교 모드 해제' : '버전 비교 모드 활성화'); }}
            style={{ ...btnStyle('ghost'), padding:'3px 10px', fontSize:11,
              color: compareMode ? C.primary : C.textSub, border:`1px solid ${compareMode ? C.primary : C.border}` }}>
            비교
          </button>
        </div>
        <div style={{ display:'flex', flexDirection:'column', gap:8 }}>
          {versionList.map(v => (
            <div key={v.id} onClick={() => setSelected(v)}
              style={{ padding:'12px 14px', borderRadius:6, cursor:'pointer',
                background: selected.id === v.id ? C.primary+'22' : 'transparent',
                border:`1px solid ${selected.id === v.id ? C.primary : C.border}`,
                transition:'all 0.15s', animation:'slideInLeft 300ms ease' }}>
              <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center' }}>
                <span style={{ fontSize:13, fontWeight:700, color: selected.id === v.id ? C.primary : C.text }}>{v.id}</span>
                <Badge label={v.status} color={v.status === '최신' ? C.success : C.textMuted} />
              </div>
              <div style={{ fontSize:11, color:C.textSub, marginTop:4 }}>{v.author} · {v.date.split(' ')[0]}</div>
              <div style={{ display:'flex', alignItems:'center', gap:6, marginTop:6 }}>
                <div style={{ height:3, flex:1, background:C.border, borderRadius:2 }}>
                  <div style={{ width:`${v.compliance}%`, height:'100%', borderRadius:2,
                    background: v.compliance >= 90 ? C.success : v.compliance >= 80 ? C.primary : C.warning }} />
                </div>
                <span style={{ fontSize:10, color:C.textSub, minWidth:28 }}>{v.compliance}%</span>
              </div>
            </div>
          ))}
        </div>
      </div>

      <div style={{ display:'flex', flexDirection:'column', gap:14 }}>
        <div style={{ background:C.surface, border:`1px solid ${C.border}`, borderRadius:6, padding:20 }}>
          <div style={{ fontSize:14, fontWeight:700, color:C.text, marginBottom:4 }}>
            {selected.id} — {selected.date}
          </div>
          <div style={{ fontSize:12, color:C.textSub, marginBottom:16 }}>변경 내용: {selected.changes}</div>
          <div style={{ background:C.surfaceAlt, borderRadius:6, border:`1px solid ${C.border}`,
            height:220, display:'flex', alignItems:'center', justifyContent:'center', position:'relative', overflow:'hidden' }}>
            <div style={{ position:'absolute', inset:0, background:'repeating-linear-gradient(0deg,transparent,transparent 30px,#374151 30px,#374151 31px),repeating-linear-gradient(90deg,transparent,transparent 40px,#374151 40px,#374151 41px)', opacity:0.3 }} />
            <div style={{ position:'relative', zIndex:1, textAlign:'center' }}>
              <div style={{ fontSize:36, marginBottom:8 }}>📐</div>
              <div style={{ fontSize:13, color:C.textSub }}>삼성동 오피스 B동 2F 소방배관도</div>
              <div style={{ display:'flex', gap:8, justifyContent:'center', marginTop:12, flexWrap:'wrap' }}>
                {['마킹 #A-12 ✓', '마킹 #B-07 ✓', '마킹 #C-03 ⚠'].map((m,i) => (
                  <span key={i} style={{ fontSize:11, padding:'3px 8px',
                    background: m.includes('⚠') ? C.warning+'33' : C.primary+'33',
                    color: m.includes('⚠') ? C.warning : C.primary,
                    border:`1px solid ${m.includes('⚠') ? C.warning : C.primary}55`, borderRadius:4 }}>{m}</span>
                ))}
              </div>
            </div>
          </div>
        </div>

        <div style={{ background:C.surface, border:`1px solid ${C.border}`, borderRadius:6, padding:20 }}>
          <div style={{ fontSize:14, fontWeight:700, color:C.text, marginBottom:14 }}>마킹 댓글 ({comments.length})</div>
          <div style={{ display:'flex', flexDirection:'column', gap:10, marginBottom:14 }}>
            {comments.map(c => (
              <div key={c.id} style={{ padding:'12px 14px', background:C.surfaceAlt,
                border:`1px solid ${C.border}`, borderRadius:6, animation:'slideUp 300ms ease' }}>
                <div style={{ display:'flex', gap:8, alignItems:'center', marginBottom:6 }}>
                  <span style={{ fontSize:11, fontWeight:700, color:C.primary }}>{c.author}</span>

    <div style={{ minHeight:'100vh', background:C.bg, display:'flex', flexDirection:'column' }}>
      {/* 글로벌 탑 네비게이션 */}
      <nav style={{ background:C.surface, borderBottom:`1px solid ${C.border}`,
        padding:'0 24px', display:'flex', alignItems:'center', height:56, gap:0,
        boxShadow:'0 2px 12px rgba(0,0,0,0.3)', position:'sticky', top:0, zIndex:100 }}>
        <div style={{ display:'flex', alignItems:'center', gap:10, marginRight:40, minWidth:180 }}>
          <div style={{ width:32, height:32, borderRadius:6, background:`linear-gradient(135deg, ${C.primary}, #10B981)`,
            display:'flex', alignItems:'center', justifyContent:'center', fontSize:16 }}>🔥</div>
          <div>
            <div style={{ fontSize:14, fontWeight:800, color:C.text }}>파이어허브</div>
            <div style={{ fontSize:9, color:C.textMuted, letterSpacing:'0.08em' }}>FIRE SAFETY PLATFORM</div>
          </div>
        </div>
        <div style={{ display:'flex', gap:2, flex:1 }}>
          {NAV_ITEMS.map(item => (
            <button key={item.id} onClick={() => setRoute(item.id)}
              style={{ padding:'8px 18px', border:'none', borderRadius:6, cursor:'pointer', fontSize:13, fontWeight:600,
                background: route === item.id ? C.primary+'22' : 'transparent',
                color: route === item.id ? C.primary : C.textSub,
                transition:'all 0.15s',
                borderBottom: route === item.id ? `2px solid ${C.primary}` : '2px solid transparent' }}>
              {item.label}
            </button>
          ))}
        </div>
        <div style={{ display:'flex', alignItems:'center', gap:12 }}>
          <div style={{ width:32, height:32, borderRadius:'50%',
            background:`linear-gradient(135deg, ${C.info}, #6366F1)`,
            display:'flex', alignItems:'center', justifyContent:'center', fontSize:13, fontWeight:700, color:'#fff' }}>최</div>
          <div>
            <div style={{ fontSize:12, fontWeight:700, color:C.text }}>최유진</div>
            <div style={{ fontSize:10, color:C.textMuted }}>관리자</div>
          </div>
        </div>
      </nav>

      {/* 페이지 헤더 */}
      <div style={{ padding:'20px 24px 0', borderBottom:`1px solid ${C.border}`,
        background:C.surface }}>
        <div style={{ maxWidth:1280, margin:'0 auto' }}>
          <div style={{ fontSize:12, color:C.textMuted, marginBottom:4 }}>
            파이어허브 / {pageTitle[route]}
          </div>
          <div style={{ fontSize:20, fontWeight:800, color:C.text, paddingBottom:16 }}>
            {pageTitle[route]}
          </div>
        </div>
      </div>

      {/* 콘텐츠 */}
      <main style={{ flex:1, padding:'24px', maxWidth:1280, margin:'0 auto', width:'100%' }}>
        {route === 'main' && <MainDashboard showToast={showToast} />}
        {route === 'version' && <VersionScreen showToast={showToast} />}
        {route === 'regulation' && <RegulationScreen showToast={showToast} />}
        {route === 'catalog' && <CatalogScreen showToast={showToast} />}
        {route === 'stats' && <StatsScreen />}
      </main>

      {/* 푸터 */}
      <footer style={{ background:C.surface, borderTop:`1px solid ${C.border}`,
        padding:'12px 24px', display:'flex', justifyContent:'space-between', alignItems:'center' }}>
        <div style={{ fontSize:11, color:C.textMuted }}>© 2026 파이어허브 · 소방설계 팀 협업 분석 플랫폼</div>
        <div style={{ display:'flex', gap:16 }}>
          {['API 문서','관리자 설정','로그아웃'].map(t => (
            <span key={t} style={{ fontSize:11, color:C.textMuted, cursor:'pointer' }}>{t}</span>
          ))}
        </div>
      </footer>

      {toast && <Toast key={toast.key} message={toast.msg} type={toast.type} onClose={() => setToast(null)} />}
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
