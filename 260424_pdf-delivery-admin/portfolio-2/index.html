function CountUp({end, suffix='', duration=1200}) {
  const [val, setVal] = React.useState(0);
  React.useEffect(() => {
    let start = 0;
    const step = end / (duration / 16);
    const timer = setInterval(() => {
      start += step;
      if (start >= end) { setVal(end); clearInterval(timer); }
      else setVal(Math.floor(start));
    }, 16);
    return () => clearInterval(timer);
  }, [end]);
  return <span style={{animation:'countUp 400ms ease'}}>{val.toLocaleString()}{suffix}</span>;
}

function Toast({message, type='success', onClose}) {
  React.useEffect(() => {
    const t = setTimeout(onClose, 3000);
    return () => clearTimeout(t);
  }, []);
  return (
    <div style={{position:'fixed',bottom:24,right:24,zIndex:9999,background:type==='success'?C.success:C.danger,color:'#fff',padding:'12px 24px',borderRadius:8,animation:'slideUp 300ms ease',boxShadow:'0 4px 16px rgba(0,0,0,0.2)',display:'flex',alignItems:'center',gap:8,fontSize:14,fontWeight:600}}>
      {type==='success'?'✓':'✕'} {message}
    </div>
  );
}

  const CHANNEL_PERF = [{name:'이메일',성공률:94,평균응답:'1.2s'},{name:'알림톡',성공률:97,평균응답:'0.8s'},{name:'웹팩스',성공률:88,평균응답:'4.5s'}];

  return (
    <div style={{animation:'fadeIn 300ms ease'}}>
      <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:16,marginBottom:20}}>
        {[{label:'총 발송(이번달)',value:3620,suffix:'건'},{label:'채널 성공률',value:93,suffix:'%'},{label:'평균 발송 시간',value:0,unit:'1.8초'},{label:'재시도 건수',value:45,suffix:'건'}].map((k,i)=>(
          <div key={k.label} style={{background:C.surface,borderRadius:12,padding:20,boxShadow:'0 4px 16px rgba(0,0,0,0.08)',animation:`slideUp 300ms ease ${i*80}ms both`,transition:'transform 200ms,box-shadow 200ms',cursor:'pointer'}}
            onMouseEnter={e=>{e.currentTarget.style.transform='scale(1.02)';e.currentTarget.style.boxShadow='0 8px 24px rgba(0,0,0,0.15)'}}
            onMouseLeave={e=>{e.currentTarget.style.transform='';e.currentTarget.style.boxShadow='0 4px 16px rgba(0,0,0,0.08)'}}>
            <div style={{fontSize:11,fontWeight:600,color:C.textSecondary,marginBottom:8,textTransform:'uppercase',letterSpacing:'0.05em'}}>{k.label}</div>
            <div style={{fontSize:26,fontWeight:800,color:C.primary}}>
              {k.unit || <><CountUp end={k.value}/>{k.suffix}</>}
            </div>
          </div>
        ))}
      </div>

      <div style={{background:C.surface,borderRadius:14,padding:24,boxShadow:'0 4px 16px rgba(0,0,0,0.08)',marginBottom:20}}>
        <h3 style={{fontSize:15,fontWeight:700,color:C.textPrimary,marginBottom:4,textTransform:'uppercase',letterSpacing:'0.04em'}}>월별 채널 발송 비교</h3>
        <p style={{fontSize:12,color:C.textSecondary,marginBottom:16}}>2024년 1분기 ~ 현재</p>
        <ResponsiveContainer width="100%" height={220}>
          <BarChart data={MONTHLY} barGap={4}>
            <CartesianGrid strokeDasharray="3 3" stroke="#F1F5F9" vertical={false}/>
            <XAxis dataKey="month" tick={{fontSize:12,fill:C.textSecondary}} axisLine={false} tickLine={false}/>
            <YAxis tick={{fontSize:11,fill:C.textSecondary}} axisLine={false} tickLine={false}/>
            <Tooltip contentStyle={{fontSize:12,borderRadius:8}}/>
            <Legend iconSize={10} wrapperStyle={{fontSize:12}}/>
            <Bar dataKey="이메일" fill={C.primary} radius={[4,4,0,0]}/>
            <Bar dataKey="알림톡" fill="#F59E0B" radius={[4,4,0,0]}/>
            <Bar dataKey="웹팩스" fill="#8B5CF6" radius={[4,4,0,0]}/>
          </BarChart>
        </ResponsiveContainer>
      </div>

      <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:16}}>
        {CHANNEL_PERF.map((cp,i)=>(
          <div key={cp.name} style={{background:C.surface,borderRadius:12,padding:20,boxShadow:'0 4px 16px rgba(0,0,0,0.08)',animation:`slideUp 300ms ease ${i*80}ms both`}}>
            <div style={{fontSize:14,fontWeight:700,color:C.textPrimary,marginBottom:12}}>{cp.name} 성능</div>
            <div style={{marginBottom:10}}>
              <div style={{display:'flex',justifyContent:'space-between',marginBottom:4}}>
                <span style={{fontSize:12,color:C.textSecondary}}>성공률</span>
                <span style={{fontSize:13,fontWeight:700,color:cp.성공률>=95?C.success:cp.성공률>=90?C.warning:C.danger}}>{cp.성공률}%</span>
              </div>
              <div style={{height:8,background:'#E2E8F0',borderRadius:999,overflow:'hidden'}}>
                <div style={{height:'100%',background:cp.성공률>=95?C.success:cp.성공률>=90?C.warning:C.danger,borderRadius:999,width:`${cp.성공률}%`,animation:'barGrow 1000ms ease 200ms both','--target-width':`${cp.성공률}%`}}/>
              </div>
            </div>
            <div style={{display:'flex',justifyContent:'space-between',padding:'8px 12px',background:'#F8FAFC',borderRadius:8}}>
              <span style={{fontSize:12,color:C.textSecondary}}>평균 응답</span>
              <span style={{fontSize:12,fontWeight:600,color:C.textPrimary}}>{cp.평균응답}</span>
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}

function App() {
  const [tab, setTab] = React.useState('main');
  const [toast, setToast] = React.useState(null);
  const [loading, setLoading] = React.useState(true);

  React.useEffect(() => { setTimeout(()=>setLoading(false), 1400); }, []);

  const showToast = (msg, type='success') => setToast({message:msg, type});

  const renderContent = () => {
    switch(tab) {
      case 'main': return <MainPage/>;
      case 'history': return <HistoryPage onToast={showToast}/>;
      case 'template': return <TemplatePage onToast={showToast}/>;
      case 'schedule': return <SchedulePage onToast={showToast}/>;
      case 'analytics': return <AnalyticsPage/>;
      default: return <MainPage/>;
    }
  };

  if (loading) {
    return (
      <div style={{display:'flex',width:'100%',height:'100vh',alignItems:'center',justifyContent:'center',background:C.bg}}>
        <div style={{textAlign:'center'}}>
          <div style={{fontSize:40,marginBottom:12,animation:'pulse 1.5s infinite'}}>⚡</div>
          <div style={{fontSize:15,fontWeight:700,color:C.textPrimary,marginBottom:4}}>DocuSend Pro</div>
          <div style={{fontSize:13,color:C.textSecondary,marginBottom:16}}>시스템 로딩 중...</div>
          <div style={{width:200,height:4,background:'#E2E8F0',borderRadius:999,overflow:'hidden',margin:'0 auto'}}>
            <div style={{height:'100%',background:`linear-gradient(90deg,${C.primary},${C.accent})`,borderRadius:999,animation:'barGrow 1.4s ease forwards','--target-width':'100%'}}></div>
          </div>
        </div>
      </div>
    );
  }

  const hero = PAGE_HERO[tab];

  return (
    <div style={{display:'flex',flexDirection:'column',width:'100%',minHeight:'100vh'}}>
      {/* Topnav */}
      <header style={{
        position:'sticky',top:0,zIndex:100,background:C.surface,
        borderBottom:`1px solid ${C.border}`,
        display:'flex',alignItems:'center',height:56,padding:'0 24px',gap:4,
        boxShadow:'0 1px 4px rgba(0,0,0,0.06)',
      }}>
        <div style={{display:'flex',alignItems:'center',gap:8,marginRight:16}}>
          <div style={{width:30,height:30,borderRadius:8,background:`linear-gradient(135deg,${C.primary},${C.accent})`,display:'flex',alignItems:'center',justifyContent:'center',fontSize:14}}>⚡</div>
          <span style={{fontSize:15,fontWeight:800,color:C.secondary,letterSpacing:'-0.02em'}}>DocuSend Pro</span>
        </div>
        {TABS.map(t=>(
          <button key={t.id} onClick={()=>setTab(t.id)} style={{
            padding:'7px 14px',background:'none',border:'none',cursor:'pointer',
            fontSize:13,fontWeight:tab===t.id?700:400,color:tab===t.id?C.primary:C.textSecondary,
            borderRadius:8,transition:'all 200ms',position:'relative',
          }}
          onMouseEnter={e=>{if(tab!==t.id)e.currentTarget.style.background='#F8FAFC'}}
          onMouseLeave={e=>{e.currentTarget.style.background=''}}>
            {t.label}
            {tab===t.id && <div style={{position:'absolute',bottom:-1,left:'50%',transform:'translateX(-50%)',width:24,height:2,background:C.primary,borderRadius:99}}/>}
          </button>
        ))}
        <div style={{flex:1}}/>
        <div style={{display:'flex',alignItems:'center',gap:8}}>
          <div style={{padding:'5px 10px',background:'#F1F5F9',borderRadius:8,fontSize:12,color:C.textSecondary,display:'flex',alignItems:'center',gap:6}}>
            <span style={{width:6,height:6,borderRadius:'50%',background:C.success,display:'inline-block'}}/>DB 연결
          </div>
          <button onClick={()=>showToast('새 알림이 없습니다')} style={{width:34,height:34,borderRadius:8,background:'#F1F5F9',border:'none',cursor:'pointer',fontSize:15,display:'flex',alignItems:'center',justifyContent:'center'}}>🔔</button>
          <div style={{width:32,height:32,borderRadius:8,background:`linear-gradient(135deg,${C.primary},${C.accent})`,display:'flex',alignItems:'center',justifyContent:'center',fontSize:12,color:'#fff',fontWeight:700,cursor:'pointer'}}>최</div>
        </div>
      </header>

      {/* Hero Banner */}
      <div style={{background:hero.gradient,padding:'24px 32px',color:'#fff'}}>
        <div style={{display:'flex',alignItems:'center',gap:12,marginBottom:12}}>
          <span style={{fontSize:28}}>{hero.icon}</span>
          <h1 style={{fontSize:22,fontWeight:800,letterSpacing:'-0.02em'}}>{hero.title}</h1>
        </div>
        <div style={{display:'flex',gap:24}}>
          {hero.kpis.map(k=>(
            <div key={k} style={{fontSize:13,opacity:0.9,display:'flex',alignItems:'center',gap:6}}>
              <span style={{width:6,height:6,borderRadius:'50%',background:'rgba(255,255,255,0.6)',display:'inline-block'}}/>
              {k}
            </div>
          ))}
        </div>
      </div>

      {/* Content */}
      <main style={{flex:1,padding:'24px 32px',background:C.bg}} key={tab}>
        {renderContent()}
      </main>

      {toast && <Toast message={toast.message} type={toast.type} onClose={()=>setToast(null)}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
