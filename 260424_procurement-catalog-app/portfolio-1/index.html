function CountUp({end,suffix=''}){
  const [val,setVal]=React.useState(0);
  React.useEffect(()=>{
    let s=0;const step=end/(1200/16);
    const t=setInterval(()=>{s+=step;if(s>=end){setVal(end);clearInterval(t);}else setVal(Math.floor(s));},16);
    return()=>clearInterval(t);
  },[end]);
  return <span style={{animation:'countUp 400ms ease'}}>{val.toLocaleString()}{suffix}</span>;
}

function Toast({msg,onClose}){
  React.useEffect(()=>{const t=setTimeout(onClose,3000);return()=>clearTimeout(t);},[]);
  return(
    <div style={{position:'fixed',bottom:24,right:24,zIndex:9999,background:C.secondary,color:'#fff',
      padding:'12px 24px',borderRadius:8,animation:'slideUp 300ms ease',boxShadow:'0 4px 16px rgba(0,0,0,0.2)',fontSize:14}}>
      {msg}
    </div>
  );
}

function SearchPage({onSelect}){
  const [query,setQuery]=React.useState('');
  const [activeType,setActiveType]=React.useState('all');
  const [searched,setSearched]=React.useState(false);
  const doSearch=()=>{if(query.trim())setSearched(true);};
  const results=searched?SEARCH_ALL.filter(item=>item.name.toLowerCase().includes(query.toLowerCase())||item.sub.toLowerCase().includes(query.toLowerCase())):[];
  const filtered=activeType==='all'?results:results.filter(r=>r.type===activeType);
  const counts={all:results.length,product:results.filter(r=>r.type==='product').length,institution:results.filter(r=>r.type==='institution').length};
  return(
    <div style={{animation:'fadeIn 300ms ease'}}>
      <div style={{background:C.surface,borderRadius:14,padding:24,boxShadow:'0 4px 16px rgba(0,0,0,0.08)',marginBottom:20}}>
        <div style={{fontSize:18,fontWeight:700,color:C.textPrimary,marginBottom:4}}>통합 검색</div>
        <div style={{fontSize:13,color:C.textSecondary,marginBottom:16}}>제품명, 기업명, 수요기관명으로 통합 검색합니다</div>
        <div style={{display:'flex',gap:10}}>
          <div style={{flex:1,position:'relative'}}>
            <span style={{position:'absolute',left:14,top:'50%',transform:'translateY(-50%)',color:C.textSecondary,fontSize:16}}>🔍</span>
            <input value={query} onChange={e=>setQuery(e.target.value)}
              onKeyDown={e=>e.key==='Enter'&&doSearch()}
              placeholder="검색어를 입력하세요 (예: LED, 서울시, 공기청정)"
              style={{width:'100%',padding:'13px 14px 13px 44px',borderRadius:10,border:`2px solid ${C.border}`,fontSize:15,outline:'none',fontFamily:'Pretendard',transition:'border 150ms'}}
              onFocus={e=>e.target.style.borderColor=C.primary} onBlur={e=>e.target.style.borderColor=C.border}/>
          </div>
          <button onClick={doSearch} style={{padding:'0 28px',borderRadius:10,background:C.primary,color:'#fff',border:'none',cursor:'pointer',fontSize:15,fontWeight:700}}>
            검색
          </button>
        </div>
        {!searched&&(
          <div style={{marginTop:16}}>
            <div style={{fontSize:12,color:C.textSecondary,marginBottom:8}}>추천 검색어</div>
            <div style={{display:'flex',gap:6,flexWrap:'wrap'}}>
              {['LED 조명','공기청정','스마트','서울시','보안','에너지'].map(kw=>(
                <button key={kw} onClick={()=>{setQuery(kw);setTimeout(()=>setSearched(true),10);}}
                  style={{padding:'5px 12px',borderRadius:999,border:`1px solid ${C.border}`,background:'transparent',color:C.textSecondary,fontSize:12,cursor:'pointer'}}>
                  {kw}
                </button>
              ))}
            </div>
          </div>
        )}
      </div>
      {searched&&(
        <div>
          <div style={{display:'flex',gap:8,marginBottom:16}}>
            {[['all','전체',counts.all],['product','제품',counts.product],['institution','기관',counts.institution]].map(([k,label,cnt])=>(
              <button key={k} onClick={()=>setActiveType(k)} style={{padding:'8px 16px',borderRadius:8,border:'none',cursor:'pointer',fontSize:13,fontWeight:600,
                background:activeType===k?C.primary:'#fff',color:activeType===k?'#fff':C.textSecondary,
                boxShadow:'0 2px 6px rgba(0,0,0,0.06)',transition:'all 150ms'}}>
                {label} ({cnt})
              </button>
            ))}
          </div>
          {filtered.length===0?(
            <div style={{textAlign:'center',padding:'60px 0',color:C.textSecondary}}>
              <div style={{fontSize:36,marginBottom:12}}>😔</div>
              <div style={{fontSize:16,fontWeight:600}}>"{query}"에 대한 검색 결과가 없습니다</div>
            </div>
          ):(
            <div style={{display:'grid',gap:10}}>
              {filtered.map((item,i)=>{
                const prod=item.type==='product'?PRODUCTS.find(p=>p.id===item.id):null;
                const inst=item.type==='institution'?INSTITUTIONS.find(p=>p.id===item.id):null;
                return(
                  <div key={`${item.type}-${item.id}`} onClick={()=>onSelect(item.type==='product'?prod:inst,item.type)}
                    style={{background:C.surface,borderRadius:12,padding:'16px 18px',cursor:'pointer',
                      boxShadow:'0 2px 8px rgba(0,0,0,0.06)',transition:'all 150ms',
                      animation:`slideUp 300ms ease ${i*60}ms both`,display:'flex',alignItems:'center',gap:14}}
                    onMouseEnter={e=>{e.currentTarget.style.background=C.bg}}
                    onMouseLeave={e=>{e.currentTarget.style.background=C.surface}}>
                    <div style={{width:42,height:42,borderRadius:10,background:item.type==='product'?C.primaryLight:'#EDE9FE',
                      display:'flex',alignItems:'center',justifyContent:'center',fontSize:20,flexShrink:0}}>
                      {item.type==='product'?'📦':'🏛️'}
                    </div>
                    <div style={{flex:1}}>
                      <div style={{fontSize:14,fontWeight:600,color:C.textPrimary,marginBottom:3}}>
                        {item.name.split(new RegExp(`(${query})`,'gi')).map((part,j)=>
                          part.toLowerCase()===query.toLowerCase()?
                          <mark key={j} style={{background:'#FEF9C3',color:C.textPrimary,borderRadius:3,padding:'0 2px'}}>{part}</mark>:part
                        )}
                      </div>
                      <div style={{fontSize:12,color:C.textSecondary}}>{item.sub}</div>
                    </div>
                    <span style={{padding:'3px 10px',borderRadius:999,background:C.primaryLight,color:C.primary,fontSize:11,fontWeight:600,flexShrink:0}}>
                      {item.badge}
                    </span>
                  </div>
                );
              })}
            </div>
          )}
        </div>
      )}
    </div>
  );
}

function InquiryPage({showToast}){
  const [step,setStep]=React.useState(1);
  const [target,setTarget]=React.useState('');
  const [form,setForm]=React.useState({name:'',org:'',phone:'',email:'',msg:''});
  const handleSubmit=()=>{
    if(!form.name||!form.email||!form.msg)return;
    setStep(3);
    showToast('문의가 성공적으로 접수되었습니다.');
  };
  return(
    <div style={{animation:'fadeIn 300ms ease',maxWidth:680,margin:'0 auto'}}>
      <div style={{display:'flex',gap:0,marginBottom:24,borderRadius:12,overflow:'hidden',boxShadow:'0 2px 8px rgba(0,0,0,0.06)'}}>

          <div key={s} style={{flex:1,padding:'14px',textAlign:'center',
            background:step>=s?C.primary:C.surface,color:step>=s?'#fff':C.textSecondary,

          <div style={{fontSize:13,color:C.textSecondary,marginBottom:20}}>문의하실 대상을 선택해주세요</div>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:14}}>

              <div key={opt.k} onClick={()=>{setTarget(opt.k);setStep(2);}}

                <div style={{fontSize:13,color:C.textSecondary,lineHeight:1.5}}>{opt.desc}</div>

          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:20}}>
            <div>
              <div style={{fontSize:18,fontWeight:700,color:C.textPrimary}}>문의 내용 작성</div>

            </button>
          </div>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:14}}>
            {[['이름 *','name','text','홍길동'],['소속 기관','org','text','조달청']].map(([label,field,type2,ph])=>(
              <div key={field}>
                <label style={{display:'block',fontSize:12,fontWeight:600,color:C.textSecondary,marginBottom:6}}>{label}</label>
                <input type={type2} placeholder={ph} value={form[field]} onChange={e=>setForm({...form,[field]:e.target.value})}
                  style={{width:'100%',padding:'10px 14px',borderRadius:8,border:`1.5px solid ${C.border}`,fontSize:14,outline:'none',fontFamily:'Pretendard',transition:'border 150ms'}}
                  onFocus={e=>e.target.style.borderColor=C.primary} onBlur={e=>e.target.style.borderColor=C.border}/>

            {[['연락처','phone','tel','010-0000-0000'],['이메일 *','email','email','hong@example.com']].map(([label,field,type2,ph])=>(

                <label style={{display:'block',fontSize:12,fontWeight:600,color:C.textSecondary,marginBottom:6}}>{label}</label>
                <input type={type2} placeholder={ph} value={form[field]} onChange={e=>setForm({...form,[field]:e.target.value})}
                  style={{width:'100%',padding:'10px 14px',borderRadius:8,border:`1.5px solid ${C.border}`,fontSize:14,outline:'none',fontFamily:'Pretendard',transition:'border 150ms'}}

              onFocus={e=>e.target.style.borderColor=C.primary} onBlur={e=>e.target.style.borderColor=C.border}/>
          </div>
          <button onClick={handleSubmit} style={{width:'100%',marginTop:20,padding:'14px',borderRadius:10,
            background:C.primary,color:'#fff',border:'none',fontSize:15,fontWeight:700,cursor:'pointer',transition:'all 200ms'}}
            onMouseEnter={e=>e.currentTarget.style.background='#1e40af'} onMouseLeave={e=>e.currentTarget.style.background=C.primary}>
            문의 발송
          </button>
        </div>
      )}
      {step===3&&(
        <div style={{background:C.surface,borderRadius:14,padding:48,textAlign:'center',boxShadow:'0 4px 16px rgba(0,0,0,0.08)',animation:'fadeInScale 300ms ease'}}>
          <div style={{width:72,height:72,borderRadius:'50%',background:'#ECFDF5',display:'flex',alignItems:'center',justifyContent:'center',margin:'0 auto 20px',fontSize:36}}>
            ✅
          </div>
          <div style={{fontSize:22,fontWeight:700,color:C.textPrimary,marginBottom:8}}>문의가 접수되었습니다</div>
          <div style={{fontSize:14,color:C.textSecondary,lineHeight:1.6,marginBottom:24}}>
            담당자 이메일({form.email})로 접수 확인 메일이 발송됩니다.<br/>빠른 시일 내에 담당자가 연락드리겠습니다.
          </div>
          <button onClick={()=>{setStep(1);setForm({name:'',org:'',phone:'',email:'',msg:''});}}

            새 문의 작성
          </button>
        </div>
      )}
    </div>
  );
}

  '통합 검색':{title:'통합 검색',icon:'🔍',kpis:[{label:'전체 데이터',val:299},{label:'제품',val:247},{label:'기관',val:52}]},
  '문의하기':{title:'문의하기',icon:'✉️',kpis:[{label:'평균 응답',val:null,text:'1영업일 이내'},{label:'문의 채널',val:null,text:'이메일 자동 발송'},{label:'처리율',val:null,text:'98.7%'}]},

const TABS=['제품 카탈로그','수요기관','통합 검색','문의하기'];

function App(){
  const [tab,setTab]=React.useState('제품 카탈로그');
  const [drawer,setDrawer]=React.useState(null);
  const [drawerType,setDrawerType]=React.useState(null);
  const [toast,setToast]=React.useState(null);
  const [loading,setLoading]=React.useState(true);
  React.useEffect(()=>{setTimeout(()=>setLoading(false),1500);},[]);
  const openDrawer=(item,type)=>{setDrawer(item);setDrawerType(type);};
  const meta=PAGE_META[tab];
  if(loading) return(
    <div style={{width:'100%',minHeight:'100vh',background:C.bg}}>
      <div style={{height:56,background:C.surface,boxShadow:`0 1px 0 ${C.border}`}}/>
      <div style={{height:130,background:`linear-gradient(135deg,${C.primary},${C.accent})`}}/>
      <div style={{padding:24}}>
        {[...Array(3)].map((_,i)=>(
          <div key={i} style={{height:120,borderRadius:12,marginBottom:16,
            background:'linear-gradient(90deg,#E2E8F0 25%,#F1F5F9 50%,#E2E8F0 75%)',

    <div style={{minHeight:'100vh',background:C.bg,display:'flex',flexDirection:'column',width:'100%'}}>

        display:'flex',alignItems:'center',height:56,padding:'0 24px',gap:8}}>
        <div style={{display:'flex',alignItems:'center',gap:8,marginRight:16,cursor:'pointer'}}>
          <div style={{width:28,height:28,borderRadius:8,background:`linear-gradient(135deg,${C.primary},${C.accent})`,display:'flex',alignItems:'center',justifyContent:'center',fontSize:14}}>🏅</div>
          <span style={{fontSize:15,fontWeight:800,color:C.textPrimary}}>우수조달포탈</span>
        </div>
        {TABS.map(t=>(
          <button key={t} onClick={()=>setTab(t)} style={{padding:'6px 14px',borderRadius:8,border:'none',cursor:'pointer',fontSize:13,fontWeight:600,
            background:tab===t?C.primaryLight:'transparent',color:tab===t?C.primary:C.textSecondary,
            transition:'all 150ms',whiteSpace:'nowrap'}}>
            {t}
          </button>
        ))}
        <div style={{flex:1}}/>
        <div style={{display:'flex',alignItems:'center',gap:8}}>
          <button style={{width:36,height:36,borderRadius:8,background:'transparent',border:'none',cursor:'pointer',fontSize:16,display:'flex',alignItems:'center',justifyContent:'center',color:C.textSecondary}}>🔔</button>
          <div style={{width:32,height:32,borderRadius:'50%',background:`linear-gradient(135deg,${C.primary},${C.accent})`,display:'flex',alignItems:'center',justifyContent:'center',color:'#fff',fontSize:12,fontWeight:700,cursor:'pointer'}}>김</div>
        </div>
      </header>
      <div style={{background:`linear-gradient(135deg,${C.primary},${C.accent})`,padding:'24px 32px',color:'#fff'}}>
        <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:10}}>
          <span style={{fontSize:22}}>{meta.icon}</span>
          <h1 style={{fontSize:22,fontWeight:800,letterSpacing:'-0.02em'}}>{meta.title}</h1>
        </div>
        <div style={{display:'flex',gap:28}}>
          {meta.kpis.map((k,i)=>(
            <div key={i} style={{animation:`slideUp 400ms ease ${i*100}ms both`}}>
              <div style={{fontSize:22,fontWeight:800}}>{k.val!==null?<CountUp end={k.val}/>:k.text}</div>
              <div style={{fontSize:12,opacity:0.8,marginTop:2}}>{k.label}</div>
            </div>
          ))}
        </div>
      </div>
      <main style={{flex:1,padding:'24px 28px',maxWidth:1400,width:'100%',margin:'0 auto',alignSelf:'stretch'}}>
        {tab==='제품 카탈로그'&&<ProductsPage onSelect={openDrawer}/>}
        {tab==='수요기관'&&<InstitutionsPage onSelect={openDrawer}/>}
        {tab==='통합 검색'&&<SearchPage onSelect={openDrawer}/>}
        {tab==='문의하기'&&<InquiryPage showToast={msg=>setToast(msg)}/>}
      </main>
      {drawer&&<Drawer item={drawer} type={drawerType} onClose={()=>setDrawer(null)}/>}
      {toast&&<Toast msg={toast} onClose={()=>setToast(null)}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
