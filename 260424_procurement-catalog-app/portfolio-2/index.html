function CountUp({end,suffix=''}){
  const [val,setVal]=React.useState(0);
  React.useEffect(()=>{
    let s=0;const step=end/(1200/16);
    const t=setInterval(()=>{s+=step;if(s>=end){setVal(end);clearInterval(t);}else setVal(Math.floor(s));},16);
    return()=>clearInterval(t);
  },[end]);
  return <span style={{animation:'countUp 400ms ease'}}>{val.toLocaleString()}{suffix}</span>;
}

function Toast({msg,type,onClose}){
  React.useEffect(()=>{const t=setTimeout(onClose,3000);return()=>clearTimeout(t);},[]);
  const bg=type==='error'?C.error:type==='warn'?C.warn:C.secondary;
  return(
    <div style={{position:'fixed',bottom:24,right:24,zIndex:9999,background:bg,color:'#fff',
      padding:'12px 24px',borderRadius:8,animation:'slideUp 300ms ease',boxShadow:'0 4px 16px rgba(0,0,0,0.2)',fontSize:14,display:'flex',alignItems:'center',gap:8}}>
      {type==='success'&&'✅'} {msg}
    </div>
  );
}

              <div style={{marginBottom:16}}>
                <label style={{display:'block',fontSize:12,fontWeight:600,color:C.textSecondary,marginBottom:6}}>제품 상세 설명</label>
                <textarea placeholder="제품 주요 사양 및 특징을 입력하세요" rows={3} value={form.spec} onChange={e=>setForm({...form,spec:e.target.value})}
                  style={{width:'100%',padding:'10px 14px',borderRadius:8,border:`1.5px solid ${C.border}`,fontSize:14,outline:'none',resize:'vertical',fontFamily:'Pretendard'}}/>
              </div>
              <button onClick={handleReg} style={{width:'100%',padding:'13px',borderRadius:10,background:C.primary,color:'#fff',border:'none',fontSize:14,fontWeight:700,cursor:'pointer'}}>
                등록 신청
              </button>
            </>
          )}
        </Modal>
      )}
      {inquiryModal&&(
        <Modal title="문의 상세" onClose={()=>setInquiryModal(null)} width={480}>
          <div style={{padding:'0 0 16px 0',borderBottom:`1px solid ${C.border}`,marginBottom:16}}>
            <div style={{display:'flex',justifyContent:'space-between',marginBottom:6}}>
              <span style={{fontSize:15,fontWeight:700,color:C.textPrimary}}>{inquiryModal.from}</span>
              <span style={{padding:'3px 10px',borderRadius:999,
                background:inquiryModal.status==='답변완료'?'#ECFDF5':'#EFF6FF',
                color:inquiryModal.status==='답변완료'?C.primary:'#1D4ED8',fontSize:12,fontWeight:700}}>
                {inquiryModal.status}
              </span>
            </div>
            <div style={{fontSize:13,color:C.textSecondary}}>{inquiryModal.product} · {inquiryModal.date}</div>
          </div>
          <div style={{background:C.bg,borderRadius:10,padding:16,marginBottom:16}}>
            <div style={{fontSize:12,color:C.textSecondary,marginBottom:6}}>문의 내용</div>
            <div style={{fontSize:14,color:C.textPrimary,lineHeight:1.6}}>{inquiryModal.msg}</div>
          </div>
          <div>
            <label style={{display:'block',fontSize:12,fontWeight:600,color:C.textSecondary,marginBottom:6}}>답변 작성</label>
            <textarea placeholder="답변 내용을 입력하세요" rows={4}
              style={{width:'100%',padding:'10px 14px',borderRadius:8,border:`1.5px solid ${C.border}`,fontSize:14,outline:'none',resize:'vertical',fontFamily:'Pretendard'}}/>
          </div>
          <button onClick={()=>setInquiryModal(null)} style={{width:'100%',marginTop:14,padding:'12px',borderRadius:10,background:C.primary,color:'#fff',border:'none',fontSize:14,fontWeight:600,cursor:'pointer'}}>
            답변 발송
          </button>
        </Modal>
      )}
    </div>
  );
}

const NAV_ITEMS=[
  {id:'home',label:'홈',icon:'🏠'},
  {id:'category',label:'카탈로그',icon:'📦'},
  {id:'bookmark',label:'북마크',icon:'🔖'},
  {id:'notification',label:'알림',icon:'🔔'},
  {id:'supplier',label:'기업 관리',icon:'🏭'},
];

function App(){
  const [route,setRoute]=React.useState('home');
  const [bookmarks,setBookmarks]=React.useState([1,3,5,8]);
  const [selectedProduct,setSelectedProduct]=React.useState(null);
  const [toast,setToast]=React.useState(null);
  const [loading,setLoading]=React.useState(true);
  React.useEffect(()=>{setTimeout(()=>setLoading(false),1500);},[]);
  const toggleBookmark=(id)=>{
    setBookmarks(prev=>prev.includes(id)?prev.filter(b=>b!==id):[...prev,id]);
    setToast({msg:bookmarks.includes(id)?'북마크에서 제거했습니다':'북마크에 추가했습니다',type:'success'});
  };
  const unread=NOTIFICATIONS.filter(n=>!n.read).length;
  if(loading) return(
    <div style={{width:'100%',minHeight:'100vh',background:C.bg}}>
      <div style={{height:64,background:C.surface,boxShadow:`0 1px 0 ${C.border}`}}/>
      <div style={{padding:24}}>
        {[...Array(4)].map((_,i)=>(
          <div key={i} style={{height:100,borderRadius:16,marginBottom:16,
            background:'linear-gradient(90deg,#D1FAE5 25%,#ECFDF5 50%,#D1FAE5 75%)',
            backgroundSize:'200% 100%',animation:'shimmer 1.5s infinite'}}/>
        ))}
      </div>
    </div>
  );
  return(
    <div style={{minHeight:'100vh',background:C.bg,display:'flex',flexDirection:'column',width:'100%'}}>
      <header style={{position:'sticky',top:0,zIndex:100,background:C.surface,borderBottom:`1px solid ${C.border}`,
        display:'flex',alignItems:'center',height:64,padding:'0 32px',gap:24}}>
        <div onClick={()=>setRoute('home')} style={{display:'flex',alignItems:'center',gap:8,cursor:'pointer',flexShrink:0}}>
          <div style={{width:32,height:32,borderRadius:10,background:`linear-gradient(135deg,${C.primary},${C.accent})`,display:'flex',alignItems:'center',justifyContent:'center',fontSize:16}}>🏅</div>
          <span style={{fontSize:16,fontWeight:800,color:C.textPrimary}}>조달포탈 App</span>
        </div>
        <nav style={{display:'flex',gap:2}}>
          {NAV_ITEMS.map(item=>(
            <button key={item.id} onClick={()=>setRoute(item.id)} style={{padding:'8px 14px',borderRadius:8,border:'none',cursor:'pointer',fontSize:13,fontWeight:600,
              background:route===item.id?C.primaryLight:'transparent',color:route===item.id?C.primary:C.textSecondary,
              transition:'all 150ms',display:'flex',alignItems:'center',gap:5,position:'relative',whiteSpace:'nowrap'}}>
              {item.label}
              {item.id==='notification'&&unread>0&&<span style={{position:'absolute',top:6,right:8,width:7,height:7,borderRadius:'50%',background:'#EF4444'}}/>}
              {item.id==='bookmark'&&bookmarks.length>0&&<span style={{fontSize:10,background:C.primary,color:'#fff',borderRadius:999,padding:'1px 5px',marginLeft:2}}>{bookmarks.length}</span>}
            </button>
          ))}
        </nav>
        <div style={{flex:1}}/>
        <div style={{display:'flex',alignItems:'center',gap:10}}>
          <div style={{fontSize:12,color:C.textSecondary}}>에코솔루션즈(주)</div>
          <div style={{width:34,height:34,borderRadius:'50%',background:`linear-gradient(135deg,${C.primary},${C.accent})`,display:'flex',alignItems:'center',justifyContent:'center',color:'#fff',fontSize:13,fontWeight:700,cursor:'pointer'}}>에</div>
        </div>
      </header>
      <main style={{flex:1,padding:'28px 32px',maxWidth:1400,width:'100%',margin:'0 auto',alignSelf:'stretch'}}>
        {route==='home'&&<HomePage bookmarks={bookmarks} onToggleBookmark={toggleBookmark} onSelectProduct={p=>{setSelectedProduct(p);setRoute('detail');}} setRoute={setRoute}/>}
        {route==='category'&&(
          <div style={{animation:'fadeIn 300ms ease'}}>
            <div style={{display:'flex',gap:16,flexWrap:'wrap'}}>
              {PRODUCTS.map((p,i)=>(
                <div key={p.id} onClick={()=>{setSelectedProduct(p);setRoute('detail');}}
                  style={{width:'calc(25% - 12px)',minWidth:200,background:C.surface,borderRadius:16,overflow:'hidden',cursor:'pointer',
                    boxShadow:'0 2px 8px rgba(0,0,0,0.06)',transition:'all 200ms',
                    animation:`slideUp 400ms ease ${i*60}ms both`}}
                  onMouseEnter={e=>{e.currentTarget.style.transform='scale(1.03)';e.currentTarget.style.boxShadow='0 12px 32px rgba(0,0,0,0.12)'}}
                  onMouseLeave={e=>{e.currentTarget.style.transform='scale(1)';e.currentTarget.style.boxShadow='0 2px 8px rgba(0,0,0,0.06)'}}>
                  <div style={{position:'relative',overflow:'hidden'}}>
                    <img src={p.img} alt={p.name} style={{width:'100%',height:160,objectFit:'cover',transition:'transform 300ms'}}
                      onMouseEnter={e=>e.target.style.transform='scale(1.08)'}
                      onMouseLeave={e=>e.target.style.transform='scale(1)'}/>
                    <button onClick={ev=>{ev.stopPropagation();toggleBookmark(p.id);}}
                      style={{position:'absolute',top:10,right:10,width:28,height:28,borderRadius:'50%',
                        background:'rgba(255,255,255,0.9)',border:'none',cursor:'pointer',fontSize:13,
                        display:'flex',alignItems:'center',justifyContent:'center'}}>
                      {bookmarks.includes(p.id)?'🔖':'🔖'}
                    </button>
                    <span style={{position:'absolute',top:10,left:10,padding:'2px 8px',borderRadius:999,
                      background:p.badge==='혁신'?'rgba(5,150,105,0.9)':'rgba(16,185,129,0.9)',
                      color:'#fff',fontSize:11,fontWeight:700}}>{p.badge}</span>
                  </div>
                  <div style={{padding:'12px 14px'}}>
                    <div style={{fontSize:11,color:C.textSecondary,marginBottom:3}}>{p.company}</div>
                    <div style={{fontSize:13,fontWeight:700,color:C.textPrimary,marginBottom:5,lineHeight:1.4}}>{p.name}</div>
                    <div style={{fontSize:14,fontWeight:700,color:C.primary}}>{p.price}원</div>
                  </div>
                </div>
              ))}
            </div>
          </div>
        )}
        {route==='detail'&&selectedProduct&&(
          <div style={{animation:'fadeIn 300ms ease',maxWidth:800,margin:'0 auto'}}>
            <button onClick={()=>setRoute('category')} style={{display:'flex',alignItems:'center',gap:6,padding:'8px 14px',borderRadius:8,background:C.surface,border:'none',cursor:'pointer',fontSize:13,color:C.textSecondary,marginBottom:20,boxShadow:'0 2px 6px rgba(0,0,0,0.05)'}}>
              ← 목록으로
            </button>
            <div style={{background:C.surface,borderRadius:20,overflow:'hidden',boxShadow:'0 4px 24px rgba(0,0,0,0.08)'}}>
              <img src={selectedProduct.img} alt={selectedProduct.name} style={{width:'100%',height:320,objectFit:'cover'}}/>
              <div style={{padding:32}}>
                <div style={{display:'flex',gap:8,marginBottom:12}}>
                  <span style={{padding:'4px 12px',borderRadius:999,background:C.primaryLight,color:C.primary,fontSize:12,fontWeight:600}}>{selectedProduct.badge}</span>
                  <span style={{padding:'4px 12px',borderRadius:999,background:C.bg,color:C.textSecondary,fontSize:12}}>{selectedProduct.category}</span>
                </div>
                <h1 style={{fontSize:24,fontWeight:800,color:C.textPrimary,marginBottom:6}}>{selectedProduct.name}</h1>
                <div style={{fontSize:14,color:C.textSecondary,marginBottom:16}}>{selectedProduct.company}</div>
                <div style={{fontSize:28,fontWeight:800,color:C.primary,marginBottom:24}}>{selectedProduct.price}원</div>
                <div style={{display:'flex',gap:12}}>
                  <button style={{flex:1,padding:'14px',borderRadius:12,background:C.primary,color:'#fff',border:'none',cursor:'pointer',fontSize:15,fontWeight:700}}>
                    문의하기
                  </button>
                  <button onClick={()=>toggleBookmark(selectedProduct.id)}
                    style={{padding:'14px 20px',borderRadius:12,background:bookmarks.includes(selectedProduct.id)?C.primaryLight:C.bg,
                      color:C.primary,border:`1.5px solid ${C.border}`,cursor:'pointer',fontSize:20}}>
                    🔖
                  </button>
                </div>
              </div>
            </div>
          </div>
        )}
        {route==='bookmark'&&<BookmarkPage bookmarks={bookmarks} onToggleBookmark={toggleBookmark} onSelectProduct={p=>{setSelectedProduct(p);setRoute('detail');}}/>}
        {route==='notification'&&<NotificationPage/>}
        {route==='supplier'&&<SupplierPage/>}
      </main>
      <footer style={{background:C.secondary,color:'#fff',padding:'40px 32px 28px'}}>
        <div style={{maxWidth:1200,margin:'0 auto',display:'grid',gridTemplateColumns:'2fr 1fr 1fr',gap:32}}>
          <div>
            <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:10}}>
              <div style={{width:28,height:28,borderRadius:8,background:`linear-gradient(135deg,${C.primary},${C.accent})`,display:'flex',alignItems:'center',justifyContent:'center',fontSize:14}}>🏅</div>
              <span style={{fontSize:15,fontWeight:800}}>조달포탈 App</span>
            </div>
            <p style={{opacity:0.65,fontSize:13,lineHeight:1.6,marginBottom:8}}>
              Capacitor 기반 Android/iOS 하이브리드 앱으로 공공 조달 물품 정보를 모바일에서 간편하게 이용할 수 있습니다.
            </p>
            <div style={{display:'flex',gap:8,marginTop:12}}>
              {['App Store','Google Play'].map(s=>(
                <div key={s} style={{padding:'7px 14px',borderRadius:8,background:'rgba(255,255,255,0.1)',fontSize:12,cursor:'pointer',border:'1px solid rgba(255,255,255,0.2)'}}>{s}</div>
              ))}
            </div>
          </div>
          {[['서비스',['제품 카탈로그','수요기관 안내','통합 검색','문의하기']],['기업 서비스',['제품 등록','문의 관리','앱 설정','고객센터']]].map(([title,items])=>(
            <div key={title}>
              <div style={{fontWeight:700,marginBottom:12,fontSize:14}}>{title}</div>
              {items.map(item=><div key={item} style={{opacity:0.65,fontSize:13,marginBottom:6,cursor:'pointer'}}>{item}</div>)}
            </div>
          ))}
        </div>
        <div style={{maxWidth:1200,margin:'24px auto 0',paddingTop:20,borderTop:'1px solid rgba(255,255,255,0.1)',fontSize:12,opacity:0.5,textAlign:'center'}}>
          조달포탈 App — 구현 데모 · Capacitor 5 + Vue 3 + Node.js + PostgreSQL
        </div>
      </footer>
      {toast&&<Toast msg={toast.msg} type={toast.type} onClose={()=>setToast(null)}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
