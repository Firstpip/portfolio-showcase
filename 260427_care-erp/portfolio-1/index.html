function Toast({ message, onClose }) {
  React.useEffect(() => { const t = setTimeout(onClose, 3000); return () => clearTimeout(t); }, []);
  return (
    <div style={{ position:'fixed', bottom:24, right:24, zIndex:9999, background:'#1E3A5F', color:'#fff', padding:'12px 24px', borderRadius:8, animation:'slideUp 300ms ease', boxShadow:'0 4px 16px rgba(0,0,0,0.2)', fontSize:14 }}>
      {message}
    </div>
  );
}

function Modal({ title, onClose, children, width=560 }) {
  return (
    <div style={{ position:'fixed', inset:0, zIndex:500, display:'flex', alignItems:'center', justifyContent:'center' }}>
      <div onClick={onClose} style={{ position:'absolute', inset:0, background:'rgba(0,0,0,0.45)', animation:'fadeIn 200ms ease' }} />
      <div style={{ position:'relative', width, maxHeight:'85vh', background:'#fff', borderRadius:12, zIndex:501, animation:'fadeInScale 200ms ease', display:'flex', flexDirection:'column', boxShadow:'0 20px 60px rgba(0,0,0,0.18)' }}>
        <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', padding:'20px 24px', borderBottom:'1px solid #E2E8F0' }}>
          <h3 style={{ fontSize:17, fontWeight:700, color:'#1A2332' }}>{title}</h3>
          <button onClick={onClose} style={{ background:'none', border:'none', fontSize:20, cursor:'pointer', color:'#5A6A7E' }}>✕</button>
        </div>
        <div style={{ padding:24, overflowY:'auto', flex:1 }}>{children}</div>
      </div>
    </div>
  );
}

function CountUp({ end, duration=1200, prefix='', suffix='' }) {
  const [val, setVal] = React.useState(0);
  React.useEffect(() => {
    let s=0; const step = end/(duration/16);
    const t = setInterval(() => { s+=step; if(s>=end){setVal(end);clearInterval(t);}else setVal(Math.floor(s)); },16);
    return () => clearInterval(t);
  }, [end]);
  return <span style={{ animation:'countUp 400ms ease' }}>{prefix}{val.toLocaleString()}{suffix}</span>;
}

function StatusBadge({ status }) {
  const map = { '확정':['#DCFCE7','#16A34A'], '검토중':['#FEF9C3','#CA8A04'], '초안':['#EFF6FF','#3B82F6'], '연결됨':['#DCFCE7','#16A34A'], '오류':['#FEE2E2','#DC2626'] };
  const [bg, color] = map[status] || ['#F1F5F9','#64748B'];
  return <span style={{ background:bg, color, padding:'2px 10px', borderRadius:20, fontSize:12, fontWeight:600 }}>{status}</span>;
}

                {t==='select' ? <select style={{ width:'100%', border:'1px solid #E2E8F0', borderRadius:8, padding:'9px 14px', fontSize:13, outline:'none' }}>{opts.map(o=><option key={o}>{o}</option>)}</select>
                  : <input type={t} style={{ width:'100%', border:'1px solid #E2E8F0', borderRadius:8, padding:'9px 14px', fontSize:13, outline:'none' }} />}
              </div>
            ))}
            <button onClick={()=>{ setDrawerOpen(false); onToast('인증서가 등록되었습니다.'); }} style={{ width:'100%', padding:'12px', background:'#1E3A5F', color:'#fff', border:'none', borderRadius:8, fontSize:14, fontWeight:700, cursor:'pointer', marginTop:8 }}>등록 완료</button>
          </div>
        </div>
      )}

      {addAcctOpen && (
        <Modal title="계좌 추가 연동" onClose={()=>setAddAcctOpen(false)} width={480}>
          {[['금융기관','select',['국민은행','신한은행','우리은행','하나은행','IBK기업은행','삼성카드','현대카드','KB국민카드']],['계좌번호','text','계좌번호 입력'],['계좌 유형','select',['당좌','보통','법인카드','정기예금']]].map(([l,t,opts])=>(
            <div key={l} style={{ marginBottom:14 }}>
              <label style={{ fontSize:13, fontWeight:600, display:'block', marginBottom:6 }}>{l}</label>
              {t==='select' ? <select style={{ width:'100%', border:'1px solid #E2E8F0', borderRadius:8, padding:'9px 14px', fontSize:13, outline:'none' }}>{opts.map(o=><option key={o}>{o}</option>)}</select>
                : <input type={t} placeholder={opts} style={{ width:'100%', border:'1px solid #E2E8F0', borderRadius:8, padding:'9px 14px', fontSize:13, outline:'none' }} />}
            </div>
          ))}
          <div style={{ background:'#FEF9C3', border:'1px solid #FDE68A', borderRadius:8, padding:12, fontSize:12, color:'#92400E', marginBottom:16 }}>
            ⚠️ API 연동 시 공인인증서 확인이 필요합니다.
          </div>
          <div style={{ display:'flex', gap:10, justifyContent:'flex-end' }}>
            <button onClick={()=>setAddAcctOpen(false)} style={{ padding:'9px 20px', background:'#F4F6F9', border:'none', borderRadius:8, fontSize:13, cursor:'pointer', fontWeight:600 }}>취소</button>
            <button onClick={()=>{ setAddAcctOpen(false); onToast('계좌 연동이 완료되었습니다.'); }} style={{ padding:'9px 20px', background:'#1E3A5F', color:'#fff', border:'none', borderRadius:8, fontSize:13, cursor:'pointer', fontWeight:600 }}>연동 완료</button>
          </div>
        </Modal>
      )}
    </div>
  );
}

/* ============ MAIN APP ============ */
function App() {
  const [page, setPage] = React.useState('main');
  const [toast, setToast] = React.useState(null);
  const [pageKey, setPageKey] = React.useState(0);

  function navigate(p) { setPage(p); setPageKey(k=>k+1); }
  function showToast(msg) { setToast(msg); }
  function clearToast() { setToast(null); }

  const NAV_ITEMS = [
    { id:'main', label:'대시보드', icon:'📊' },
    { id:'transactions', label:'거래 내역', icon:'💳' },
    { id:'vouchers', label:'전표 관리', icon:'📋' },
    { id:'settings', label:'기본 설정', icon:'⚙️' },
  ];

  return (
    <div style={{ display:'flex', width:'100%', height:'100vh', overflow:'hidden' }}>
      {/* Sidebar */}
      <aside style={{ width:220, background:'#1E3A5F', display:'flex', flexDirection:'column', flexShrink:0 }}>
        <div style={{ padding:'24px 20px', borderBottom:'1px solid rgba(255,255,255,0.1)' }}>
          <div style={{ display:'flex', alignItems:'center', gap:10 }}>
            <div style={{ width:36, height:36, background:'#3B9DE8', borderRadius:8, display:'flex', alignItems:'center', justifyContent:'center', fontSize:18 }}>🏥</div>
            <div>
              <div style={{ color:'#fff', fontSize:13, fontWeight:700 }}>케어ERP</div>
              <div style={{ color:'rgba(255,255,255,0.5)', fontSize:11 }}>재무회계 자동화</div>
            </div>
          </div>
        </div>
        <div style={{ padding:'16px 12px', flex:1 }}>
          <div style={{ fontSize:10, color:'rgba(255,255,255,0.35)', fontWeight:700, letterSpacing:'0.08em', textTransform:'uppercase', padding:'0 8px', marginBottom:8 }}>메뉴</div>
          {NAV_ITEMS.map(item=>(
            <button key={item.id} onClick={()=>navigate(item.id)} style={{ width:'100%', textAlign:'left', display:'flex', alignItems:'center', gap:10, padding:'10px 12px', borderRadius:8, border:'none', cursor:'pointer', marginBottom:2, transition:'all 150ms', background: page===item.id ? 'rgba(59,157,232,0.2)' : 'transparent', color: page===item.id ? '#3B9DE8' : 'rgba(255,255,255,0.6)', fontWeight: page===item.id ? 600 : 400, fontSize:13 }}>
              <span style={{ fontSize:16 }}>{item.icon}</span>
              {item.label}
              {item.id==='main' && page===item.id && <div style={{ marginLeft:'auto', width:6, height:6, background:'#3B9DE8', borderRadius:'50%' }} />}
            </button>
          ))}
        </div>
        <div style={{ padding:'16px 20px', borderTop:'1px solid rgba(255,255,255,0.1)' }}>
          <div style={{ display:'flex', alignItems:'center', gap:8 }}>
            <div style={{ width:30, height:30, background:'#3B9DE8', borderRadius:'50%', display:'flex', alignItems:'center', justifyContent:'center', fontSize:13, color:'#fff', fontWeight:700 }}>김</div>
            <div>
              <div style={{ color:'#fff', fontSize:12, fontWeight:600 }}>김회계</div>
              <div style={{ color:'rgba(255,255,255,0.4)', fontSize:10 }}>회계담당자</div>
            </div>
          </div>
        </div>
      </aside>

      {/* Main */}
      <div style={{ flex:1, display:'flex', flexDirection:'column', overflow:'hidden' }}>
        <header style={{ height:60, background:'#fff', borderBottom:'1px solid #E2E8F0', display:'flex', alignItems:'center', justifyContent:'space-between', padding:'0 24px', flexShrink:0 }}>
          <div>
            <span style={{ fontSize:14, fontWeight:700, color:'#1A2332' }}>행복한 봄 요양원</span>
            <span style={{ fontSize:12, color:'#5A6A7E', marginLeft:8 }}>· 2025년 4월</span>
          </div>
          <div style={{ display:'flex', alignItems:'center', gap:12 }}>
            <button onClick={()=>showToast('시스템 동기화를 시작합니다.')} style={{ background:'#F4F6F9', border:'none', borderRadius:8, padding:'7px 12px', fontSize:12, cursor:'pointer', color:'#5A6A7E', fontWeight:500 }}>🔄 동기화</button>
            <div style={{ position:'relative' }}>
              <button onClick={()=>showToast('알림 3건이 있습니다.')} style={{ background:'none', border:'none', cursor:'pointer', fontSize:20 }}>🔔</button>
              <span style={{ position:'absolute', top:-2, right:-2, background:'#EF4444', color:'#fff', width:16, height:16, borderRadius:'50%', fontSize:9, display:'flex', alignItems:'center', justifyContent:'center', fontWeight:700 }}>3</span>
            </div>
          </div>
        </header>

        <main style={{ flex:1, overflowY:'auto', padding:24 }}>
          <div key={pageKey}>
            {page==='main' && <DashboardScreen onToast={showToast} />}
            {page==='transactions' && <TransactionsScreen onToast={showToast} />}
            {page==='vouchers' && <VouchersScreen onToast={showToast} />}
            {page==='settings' && <SettingsScreen onToast={showToast} />}
          </div>
        </main>
      </div>

      {toast && <Toast message={toast} onClose={clearToast} />}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
