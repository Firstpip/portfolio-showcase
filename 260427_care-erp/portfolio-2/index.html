*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body, #root { width: 100%; height: 100%; font-family: 'Pretendard', sans-serif; }
body { background: #EFF4F9; color: #0D2137; overflow: hidden; }
@keyframes fadeIn { from { opacity: 0 } to { opacity: 1 } }
@keyframes fadeInScale { from { opacity: 0; transform: scale(0.95) } to { opacity: 1; transform: scale(1) } }
@keyframes slideInRight { from { opacity: 0; transform: translateX(30px) } to { opacity: 1; transform: translateX(0) } }
@keyframes slideUp { from { opacity: 0; transform: translateY(20px) } to { opacity: 1; transform: translateY(0) } }
@keyframes ripple { 0% { transform: scale(0); opacity: 0.5 } 100% { transform: scale(4); opacity: 0 } }
@keyframes countUp { from { opacity: 0; transform: translateY(10px) } to { opacity: 1; transform: translateY(0) } }
@keyframes shimmer { 0% { background-position: -200% 0 } 100% { background-position: 200% 0 } }
@keyframes pulse { 0%, 100% { opacity: 1 } 50% { opacity: 0.5 } }
@keyframes barGrow { from { width: 0% } to { width: var(--target-width) } }
@keyframes slideDown { from { opacity: 0; transform: translateY(-10px) } to { opacity: 1; transform: translateY(0) } }
.chart-canvas-wrap { position: relative; height: 200px; }
.chart-canvas-wrap canvas { width: 100% !important; height: 100% !important; }

/* ============ COMPONENTS ============ */
const P = '#0B4F7A', S = '#1A7EC4', A = '#00B5AD';

function Toast({ message, onClose }) {
  React.useEffect(() => { const t = setTimeout(onClose, 3000); return () => clearTimeout(t); }, []);
  return <div style={{ position:'fixed', bottom:24, right:24, zIndex:9999, background:'#0B4F7A', color:'#fff', padding:'12px 24px', borderRadius:20, animation:'slideUp 300ms ease', boxShadow:'0 8px 24px rgba(11,79,122,0.35)', fontSize:14, fontWeight:500 }}>{message}</div>;
}

function Modal({ title, onClose, children, width=580 }) {
  return (
    <div style={{ position:'fixed', inset:0, zIndex:500, display:'flex', alignItems:'center', justifyContent:'center' }}>
      <div onClick={onClose} style={{ position:'absolute', inset:0, background:'rgba(13,33,55,0.5)', animation:'fadeIn 200ms ease' }} />
      <div style={{ position:'relative', width, maxHeight:'88vh', background:'#fff', borderRadius:20, zIndex:501, animation:'fadeInScale 200ms ease', display:'flex', flexDirection:'column', boxShadow:'0 24px 64px rgba(11,79,122,0.2)' }}>
        <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', padding:'20px 24px', borderBottom:'1px solid #E2EBF5' }}>
          <h3 style={{ fontSize:17, fontWeight:700, color:'#0D2137' }}>{title}</h3>
          <button onClick={onClose} style={{ background:'none', border:'none', fontSize:20, cursor:'pointer', color:'#4A6580' }}>✕</button>
        </div>
        <div style={{ padding:24, overflowY:'auto', flex:1 }}>{children}</div>
      </div>
    </div>
  );
}

function CountUp({ end, duration=1200, suffix='' }) {
  const [val, setVal] = React.useState(0);
  React.useEffect(() => {
    let s=0; const step=end/(duration/16);
    const t=setInterval(()=>{ s+=step; if(s>=end){setVal(end);clearInterval(t);}else setVal(Math.floor(s)); },16);
    return ()=>clearInterval(t);
  }, [end]);
  return <span style={{ animation:'countUp 400ms ease' }}>{val.toLocaleString()}{suffix}</span>;
}

function Badge({ status }) {
  const map = { '활성':['#DCFCE7','#16A34A'], '정지':['#FEE2E2','#DC2626'], '대기':['#FEF9C3','#CA8A04'], '프리미엄':['#EFF6FF','#0B4F7A'], '스탠다드':['#E0F2FE','#0284C7'], '베이직':['#F1F5F9','#64748B'] };
  const [bg,c] = map[status]||['#F1F5F9','#64748B'];
  return <span style={{ background:bg, color:c, padding:'3px 10px', borderRadius:20, fontSize:12, fontWeight:600 }}>{status}</span>;
}

            { label:'이달 총 거래 수집', value:12847, suffix:'건', icon:'💳' },
            { label:'이달 전표 생성', value:9341, suffix:'건', icon:'📋' },
          ].map((k,i)=>(

          ))}

      <div style={{ display:'grid', gridTemplateColumns:'2fr 1fr 1fr', gap:16, marginBottom:16 }}>
        <div style={{ background:'#fff', borderRadius:16, padding:20, boxShadow:'0 2px 12px rgba(11,79,122,0.08)' }}>

          + 기관 등록

      <div style={{ background:'#fff', borderRadius:16, padding:16, boxShadow:'0 2px 8px rgba(11,79,122,0.07)', marginBottom:16 }}>
        <div style={{ display:'flex', gap:10, alignItems:'center' }}>
          <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="기관명·대표자 검색..." style={{ flex:1, border:'1px solid #DDE7F0', borderRadius:20, padding:'9px 16px', fontSize:13, outline:'none' }} />

      <div style={{ background:'#fff', borderRadius:16, boxShadow:'0 2px 8px rgba(11,79,122,0.07)', overflow:'hidden' }}>
        <table style={{ width:'100%', borderCollapse:'collapse' }}>

            <tr style={{ background:'#F4F8FC' }}>

                <th key={h} style={{ padding:'12px 14px', fontSize:12, fontWeight:600, color:'#4A6580', textAlign:'left', borderBottom:'1px solid #DDE7F0' }}>{h}</th>

          </thead>
          <tbody>
            {filtered.map((m,i)=>(
              <tr key={m.id} onClick={()=>setSelected(m)} style={{ cursor:'pointer', transition:'background 150ms', borderBottom:'1px solid #F4F8FC' }}
                onMouseEnter={e=>e.currentTarget.style.background='rgba(11,79,122,0.03)'}
                onMouseLeave={e=>e.currentTarget.style.background=''}
              >
                <td style={{ padding:'13px 14px' }}>
                  <div style={{ display:'flex', alignItems:'center', gap:8 }}>
                    <div style={{ width:32, height:32, borderRadius:8, background:`${P}15`, display:'flex', alignItems:'center', justifyContent:'center', fontSize:14, fontWeight:700, color:P }}>{m.name[0]}</div>

                  </div>
                </td>

          </div>
          <div style={{ marginBottom:16 }}>
            {['정규직 2명 계산중...','파트타임 1명 계산중...','일용직 1명 계산중...','4대보험 공제 계산중...','전표 자동 생성중...'].map((s,i)=>(
              <div key={i} style={{ display:'flex', alignItems:'center', gap:8, padding:'6px 0', fontSize:13 }}>
                <span style={{ color:'#16A34A', fontWeight:700 }}>✓</span>
                <span style={{ color:'#0D2137' }}>{s}</span>
              </div>
            ))}
          </div>
          <div style={{ background:'#DCFCE7', borderRadius:8, padding:12, fontSize:13, color:'#16A34A', fontWeight:600, marginBottom:16 }}>
            ✅ 전 직원 급여 계산 완료 · 회계 전표 5건 자동 생성
          </div>
          <div style={{ display:'flex', gap:10, justifyContent:'flex-end' }}>
            <button onClick={()=>setCalcOpen(false)} style={{ padding:'9px 20px', background:'#EFF4F9', border:'none', borderRadius:20, fontSize:13, cursor:'pointer', fontWeight:600 }}>닫기</button>
            <button onClick={()=>{ setCalcOpen(false); onToast('급여 지급 완료 처리 및 전표 연동이 완료되었습니다.'); }} style={{ padding:'9px 20px', background:P, color:'#fff', border:'none', borderRadius:20, fontSize:13, cursor:'pointer', fontWeight:600 }}>지급 확정</button>
          </div>
        </Modal>
      )}
    </div>
  );
}

/* ============ MAIN APP ============ */
function App() {
  const [page, setPage] = React.useState('main');
  const [toast, setToast] = React.useState(null);
  const [pageKey, setPageKey] = React.useState(0);

  function navigate(p) { setPage(p); setPageKey(k=>k+1); }

  const TABS = [
    { id:'main', label:'대시보드', icon:'📊' },
    { id:'members', label:'회원 관리', icon:'🏥' },
    { id:'services', label:'서비스 관리', icon:'⚙️' },
    { id:'payroll', label:'급여 관리', icon:'💼' },
  ];

  return (
    <div style={{ display:'flex', flexDirection:'column', width:'100%', height:'100vh', overflow:'hidden' }}>
      {/* TopNav */}
      <header style={{ background:`linear-gradient(135deg, ${P} 0%, ${S} 100%)`, padding:'0 24px', display:'flex', alignItems:'center', justifyContent:'space-between', flexShrink:0, height:60 }}>
        <div style={{ display:'flex', alignItems:'center', gap:16 }}>
          <div style={{ display:'flex', alignItems:'center', gap:10 }}>
            <div style={{ width:34, height:34, background:'rgba(255,255,255,0.2)', borderRadius:10, display:'flex', alignItems:'center', justifyContent:'center', fontSize:18 }}>🏥</div>
            <div>
              <div style={{ color:'#fff', fontSize:14, fontWeight:800, letterSpacing:'-0.01em' }}>케어ERP 관리자</div>
              <div style={{ color:'rgba(255,255,255,0.55)', fontSize:10 }}>통합 플랫폼</div>
            </div>
          </div>
          <div style={{ width:1, height:28, background:'rgba(255,255,255,0.2)', margin:'0 8px' }} />
          <nav style={{ display:'flex', gap:2 }}>
            {TABS.map(tab=>(
              <button key={tab.id} onClick={()=>navigate(tab.id)} style={{ display:'flex', alignItems:'center', gap:6, padding:'8px 14px', borderRadius:10, border:'none', cursor:'pointer', transition:'all 150ms', background: page===tab.id ? 'rgba(255,255,255,0.18)' : 'transparent', color: page===tab.id ? '#fff' : 'rgba(255,255,255,0.65)', fontSize:13, fontWeight: page===tab.id ? 700 : 500 }}>
                <span style={{ fontSize:15 }}>{tab.icon}</span>{tab.label}
              </button>
            ))}
          </nav>
        </div>
        <div style={{ display:'flex', alignItems:'center', gap:12 }}>
          <div style={{ position:'relative' }}>
            <button onClick={()=>setToast('알람 3건이 있습니다.')} style={{ background:'rgba(255,255,255,0.15)', border:'none', borderRadius:10, padding:'7px 10px', cursor:'pointer', fontSize:18 }}>🔔</button>
            <span style={{ position:'absolute', top:-2, right:-2, background:'#EF4444', color:'#fff', width:16, height:16, borderRadius:'50%', fontSize:9, display:'flex', alignItems:'center', justifyContent:'center', fontWeight:700 }}>3</span>
          </div>
          <div style={{ display:'flex', alignItems:'center', gap:8 }}>
            <div style={{ width:30, height:30, background:'rgba(255,255,255,0.25)', borderRadius:'50%', display:'flex', alignItems:'center', justifyContent:'center', fontSize:13, color:'#fff', fontWeight:700 }}>관</div>
            <span style={{ color:'#fff', fontSize:12, fontWeight:600 }}>슈퍼 관리자</span>
          </div>
        </div>
      </header>

      {/* Hero Banner (대시보드 외 화면에서는 미표시) */}
      {page !== 'main' && (
        <div style={{ background:`${P}08`, borderBottom:'1px solid #DDE7F0', padding:'12px 24px', display:'flex', alignItems:'center', gap:8, flexShrink:0 }}>
          <span style={{ fontSize:13, color:'#4A6580' }}>
            {TABS.find(t=>t.id===page)?.icon} {TABS.find(t=>t.id===page)?.label}
          </span>
          <span style={{ color:'#C0CFE0' }}>·</span>
          <span style={{ fontSize:12, color:'#4A6580' }}>2025년 4월 기준</span>
        </div>
      )}

      {/* Content */}
      <main style={{ flex:1, overflowY:'auto', padding:24, background:'#EFF4F9' }}>
        <div key={pageKey}>
          {page==='main' && <DashboardScreen onToast={setToast} />}
          {page==='members' && <MembersScreen onToast={setToast} />}
          {page==='services' && <ServicesScreen onToast={setToast} />}
          {page==='payroll' && <PayrollScreen onToast={setToast} />}
        </div>
      </main>

      {toast && <Toast message={toast} onClose={()=>setToast(null)} />}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
