const {useState,useEffect,useRef,useCallback} = React;

function CountUp({end,prefix='',suffix='',duration=1200}){
  const [val,setVal]=useState(0);
  const ref=useRef(null);
  useEffect(()=>{
    const n=parseFloat(String(end).replace(/[^0-9.]/g,''))||0;
    const start=Date.now();
    const tick=()=>{
      const p=Math.min((Date.now()-start)/duration,1);
      const ease=1-Math.pow(1-p,3);
      setVal(Math.round(n*ease));
      if(p<1)ref.current=requestAnimationFrame(tick);
    };
    ref.current=requestAnimationFrame(tick);
    return()=>{if(ref.current)cancelAnimationFrame(ref.current)};
  },[end]);
  const display=String(end).includes(',')?val.toLocaleString():val;
  return <span style={{animation:'countUp 0.5s ease both'}}>{prefix}{display}{suffix}</span>;
}

function RippleButton({onClick,style,children}){
  const [ripples,setRipples]=useState([]);
  function handleClick(e){
    const r=e.currentTarget.getBoundingClientRect();
    const id=Date.now();
    const x=e.clientX-r.left, y=e.clientY-r.top;
    setRipples(prev=>[...prev,{id,x,y}]);
    setTimeout(()=>setRipples(prev=>prev.filter(r=>r.id!==id)),600);
    if(onClick)onClick(e);
  }
  return(
    <button onClick={handleClick} style={{...style,position:'relative',overflow:'hidden'}}>
      {children}
      {ripples.map(r=>(
        <span key={r.id} style={{position:'absolute',left:r.x-10,top:r.y-10,width:20,height:20,borderRadius:'50%',background:'rgba(255,255,255,0.4)',animation:'ripple 0.6s ease-out forwards',pointerEvents:'none'}}/>
      ))}
    </button>
  );
}

function StaggerList({items,renderItem,gap=8}){

}

function Toast({msg,type,onClose}){
  useEffect(()=>{const t=setTimeout(onClose,3000);return()=>clearTimeout(t)},[]);
  const bg={success:C.successBg,error:C.errorBg,info:'#E0F2FE'}[type]||C.successBg;
  const tc={success:C.success,error:C.error,info:'#0284C7'}[type]||C.success;
  return(
    <div style={{position:'fixed',top:72,right:24,zIndex:9999,animation:'slideUp 0.3s ease',
      background:bg,border:`1px solid ${tc}`,borderRadius:10,padding:'12px 18px',
      display:'flex',alignItems:'center',gap:10,boxShadow:'0 4px 20px rgba(0,0,0,0.12)',minWidth:260}}>
      <span style={{fontSize:18}}>{type==='success'?'✅':type==='error'?'❌':'ℹ️'}</span>
      <span style={{color:tc,fontWeight:600,fontSize:14}}>{msg}</span>
      <button onClick={onClose} style={{marginLeft:'auto',background:'none',border:'none',cursor:'pointer',color:tc,fontWeight:700,fontSize:16}}>×</button>
    </div>
  );
}
