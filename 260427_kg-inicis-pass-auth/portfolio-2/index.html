@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideInRight{from{transform:translateX(100%);opacity:0}to{transform:translateX(0);opacity:1}}
@keyframes slideInUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}
@keyframes bounceIn{0%{opacity:0;transform:scale(0.88)}60%{transform:scale(1.03)}100%{opacity:1;transform:scale(1)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.45}}
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
@keyframes glowPulse{0%,100%{box-shadow:0 0 0 0 rgba(52,211,153,0.4)}70%{box-shadow:0 0 0 8px rgba(52,211,153,0)}}
@keyframes streamIn{from{opacity:0;transform:translateX(-12px)}to{opacity:1;transform:translateX(0)}}
@keyframes gradientShift{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}
@keyframes progressFill{from{width:0}to{width:var(--pct)}}
@keyframes toastSlide{from{opacity:0;transform:translateY(-14px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeInScale{from{opacity:0;transform:scale(0.90) translateY(10px)}to{opacity:1;transform:scale(1) translateY(0)}}
@keyframes slideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes ripple{0%{transform:scale(0);opacity:0.55}100%{transform:scale(5);opacity:0}}
@keyframes countUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes shimmer{0%{background-position:-300px 0}100%{background-position:calc(300px + 100%) 0}}
@keyframes barGrow{from{width:0;opacity:0}to{width:var(--bw,80%);opacity:1}}

<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useRef,useCallback} = React;

function CountUp({end,prefix='',suffix='',duration=1100}){
  const [val,setVal]=useState(0);
  const rafRef=useRef(null);
  useEffect(()=>{
    const n=parseFloat(String(end).replace(/[^0-9.]/g,''))||0;
    const s=Date.now();
    const tick=()=>{
      const p=Math.min((Date.now()-s)/duration,1);
      const e2=1-Math.pow(1-p,3);
      setVal(Math.round(n*e2));
      if(p<1)rafRef.current=requestAnimationFrame(tick);
    };
    rafRef.current=requestAnimationFrame(tick);
    return()=>{if(rafRef.current)cancelAnimationFrame(rafRef.current)};
  },[end]);
  const disp=String(end).includes('.')?val.toFixed(1):String(end).includes(',')?val.toLocaleString():val;
  return <span style={{animation:'countUp 0.4s ease both'}}>{prefix}{disp}{suffix}</span>;
}

function RippleBtn({onClick,style,children,disabled}){
  const [rpl,setRpl]=useState([]);
  function hc(e){
    if(disabled)return;
    const b=e.currentTarget.getBoundingClientRect();
    const id=Date.now();
    setRpl(p=>[...p,{id,x:e.clientX-b.left,y:e.clientY-b.top}]);
    setTimeout(()=>setRpl(p=>p.filter(r=>r.id!==id)),700);
    if(onClick)onClick(e);
  }
  return(
    <button onClick={hc} disabled={disabled} style={{...style,position:'relative',overflow:'hidden'}}>
      {children}
      {rpl.map(r=>(
        <span key={r.id} style={{position:'absolute',left:r.x-12,top:r.y-12,width:24,height:24,borderRadius:'50%',background:'rgba(255,255,255,0.3)',animation:'ripple 0.7s ease-out forwards',pointerEvents:'none'}}/>
      ))}
    </button>
  );
}

function StaggerCards({items,renderItem,cols=1,gap=12}){
  return(
    <div style={{display:'grid',gridTemplateColumns:`repeat(${cols},1fr)`,gap}}>
      {items.map((item,i)=>(
        <div key={i} style={{animation:`fadeInScale 0.4s ease ${i*0.08}s both`}}>
          {renderItem(item,i)}
        </div>
      ))}
    </div>
  );
}
const {LineChart,Line,BarChart,Bar,AreaChart,Area,XAxis,YAxis,CartesianGrid,Tooltip,ResponsiveContainer,PieChart,Pie,Cell,RadarChart,Radar,PolarGrid,PolarAngleAxis} = Recharts;

const C = {
  primary:'#7C3AED',primaryLight:'#9F67F5',
  secondary:'#4C1D95',accent:'#34D399',accentDim:'#065F46',
  bg:'#0F172A',surface:'#1E293B',surface2:'#263548',border:'#334155',
  text:'#F1F5F9',textSub:'#94A3B8',textDim:'#64748B',
  success:'#34D399',successDim:'rgba(52,211,153,0.15)',
  error:'#F87171',errorDim:'rgba(248,113,113,0.15)',
  warn:'#FBBF24',warnDim:'rgba(251,191,36,0.15)',
  purple:'#A78BFA',purpleDim:'rgba(124,58,237,0.2)',
  cyan:'#22D3EE',
};

function Toast({msg,type,onClose}){
  useEffect(()=>{const t=setTimeout(onClose,3200);return()=>clearTimeout(t)},[]);
  const bc={success:C.success,error:C.error,info:C.cyan,warn:C.warn}[type]||C.success;
  return(
    <div style={{position:'fixed',top:70,right:20,zIndex:9999,animation:'toastSlide 0.3s ease',
      background:C.surface2,border:`1px solid ${bc}40`,borderLeft:`3px solid ${bc}`,borderRadius:4,
      padding:'12px 16px',display:'flex',alignItems:'center',gap:10,boxShadow:'0 8px 32px rgba(0,0,0,0.4)',minWidth:280}}>
      <span style={{fontSize:16}}>{type==='success'?'✅':type==='error'?'❌':type==='warn'?'⚠️':'ℹ️'}</span>
      <span style={{color:C.text,fontWeight:600,fontSize:13,flex:1}}>{msg}</span>
      <button onClick={onClose} style={{background:'none',border:'none',cursor:'pointer',color:C.textSub,fontWeight:700,fontSize:18,lineHeight:1}}>×</button>
    </div>
  );
}

function Modal({title,onClose,children,width=540}){
  return(
    <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.65)',zIndex:5000,display:'flex',alignItems:'center',justifyContent:'center',animation:'fadeIn 0.2s ease'}}>
      <div style={{background:C.surface,borderRadius:6,width,maxWidth:'90vw',maxHeight:'85vh',overflow:'auto',border:`1px solid ${C.border}`,boxShadow:'0 24px 80px rgba(0,0,0,0.5)',animation:'bounceIn 0.3s ease'}}>
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'18px 22px',borderBottom:`1px solid ${C.border}`}}>
          <h3 style={{fontSize:16,fontWeight:700,color:C.text}}>{title}</h3>
          <button onClick={onClose} style={{background:'none',border:'none',cursor:'pointer',fontSize:22,color:C.textSub,lineHeight:1}}>×</button>
        </div>
        <div style={{padding:'22px'}}>{children}</div>
      </div>

}

function Drawer({title,onClose,children}){

        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'18px 22px',borderBottom:`1px solid ${C.border}`,position:'sticky',top:0,background:C.surface,zIndex:1}}>
          <h3 style={{fontSize:15,fontWeight:700,color:C.text}}>{title}</h3>
          <button onClick={onClose} style={{background:'none',border:'none',cursor:'pointer',fontSize:22,color:C.textSub}}>×</button>
        </div>
        <div style={{padding:'22px'}}>{children}</div>
      </div>

}

function Badge({status,size='sm'}){
  const map={
    '승인완료':{bg:C.successDim,c:C.success},
    '인증성공':{bg:C.successDim,c:C.success},
    '처리중':{bg:C.warnDim,c:C.warn},
    '실패':{bg:C.errorDim,c:C.error},
    '망취소':{bg:C.purpleDim,c:C.purple},
    '대기':{bg:'rgba(100,116,139,0.15)',c:C.textSub},
    '정상':{bg:C.successDim,c:C.success},
    '경고':{bg:C.warnDim,c:C.warn},
    '오류':{bg:C.errorDim,c:C.error},
    '활성':{bg:C.successDim,c:C.success},
    '비활성':{bg:'rgba(100,116,139,0.15)',c:C.textSub},
    'PASS':{bg:C.purpleDim,c:C.purple},
    '전달완료':{bg:C.successDim,c:C.success},
    '미전달':{bg:C.errorDim,c:C.error},
  };
  const s=map[status]||{bg:'rgba(100,116,139,0.15)',c:C.textSub};
  const pad=size==='sm'?'3px 9px':'4px 12px';
  return(
    <span style={{display:'inline-flex',alignItems:'center',gap:4,padding:pad,borderRadius:20,background:s.bg,color:s.c,fontSize:size==='sm'?11:13,fontWeight:700,border:`1px solid ${s.c}30`}}>
      {(status==='처리중'||status==='정상'||status==='활성')&&<span style={{width:6,height:6,borderRadius:'50%',background:s.c,animation:'glowPulse 1.8s infinite'}}/>}
      {status}
    </span>
  );
}

function Stat({icon,label,val,sub,color,countEnd}){
  return(
    <div style={{background:C.surface,borderRadius:6,padding:'18px 20px',border:`1px solid ${C.border}`,boxShadow:`0 4px 20px rgba(0,0,0,0.25),inset 0 1px 0 rgba(255,255,255,0.04)`,animation:'fadeInScale 0.4s ease both',transition:'border-color 0.2s,transform 0.2s,box-shadow 0.2s'}}
      onMouseEnter={e=>{e.currentTarget.style.borderColor=color||C.primary;e.currentTarget.style.transform='translateY(-3px)';e.currentTarget.style.boxShadow=`0 8px 30px rgba(0,0,0,0.35),0 0 0 1px ${(color||C.primary)}40`}}
      onMouseLeave={e=>{e.currentTarget.style.borderColor=C.border;e.currentTarget.style.transform='none';e.currentTarget.style.boxShadow='0 4px 20px rgba(0,0,0,0.25),inset 0 1px 0 rgba(255,255,255,0.04)'}}>
      <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:12}}>
        <div style={{width:38,height:38,borderRadius:4,background:`${color||C.primary}20`,border:`1px solid ${color||C.primary}40`,display:'flex',alignItems:'center',justifyContent:'center',fontSize:18,boxShadow:`0 2px 8px ${(color||C.primary)}20`}}>{icon}</div>
        <span style={{fontSize:11,color:C.textSub,fontWeight:600,textTransform:'uppercase',letterSpacing:'0.05em'}}>{label}</span>
      </div>
      <div style={{fontSize:22,fontWeight:800,color:C.text,marginBottom:4}}>
        {countEnd?<CountUp end={countEnd} prefix={val.startsWith('₩')?'₩':''} suffix={val.includes('건')?'건':val.includes('개')?'개':val.includes('%')?'%':val.includes('TPS')?'TPS':''} duration={1000}/>:val}
      </div>
      {sub&&<div style={{fontSize:11,color:C.textSub}}>{sub}</div>}
    </div>
  );
}

        {pages[route]||pages.main}
      </main>
      <footer style={{background:C.surface,borderTop:`1px solid ${C.border}`,padding:'14px 24px',textAlign:'center'}}>
        <span style={{fontSize:11,color:C.textDim}}>통합 결제·인증 관리 콘솔 · Redis Streams · Node.js/Express · PostgreSQL · Prisma · 구현 데모</span>
      </footer>
      {toast&&<Toast msg={toast.msg} type={toast.type} onClose={()=>setToast(null)}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
