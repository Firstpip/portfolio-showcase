    html, body { width: 100%; height: 100%; font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, sans-serif; color: #111827; background: #F9FAFB; }
    #root { display: flex; flex-direction: column; width: 100%; min-height: 100vh; }

    @keyframes fadeIn { from { opacity: 0 } to { opacity: 1 } }
    @keyframes fadeInScale { from { opacity: 0; transform: scale(0.95) } to { opacity: 1; transform: scale(1) } }
    @keyframes slideInRight { from { opacity: 0; transform: translateX(30px) } to { opacity: 1; transform: translateX(0) } }
    @keyframes slideUp { from { opacity: 0; transform: translateY(20px) } to { opacity: 1; transform: translateY(0) } }
    @keyframes ripple { 0% { transform: scale(0); opacity: 0.5 } 100% { transform: scale(4); opacity: 0 } }
    @keyframes countUp { from { opacity: 0; transform: translateY(10px) } to { opacity: 1; transform: translateY(0) } }
    @keyframes shimmer { 0% { background-position: -200% 0 } 100% { background-position: 200% 0 } }
    @keyframes pulse { 0%, 100% { opacity: 1 } 50% { opacity: 0.5 } }
    @keyframes barGrow { from { width: 0% } to { width: var(--target-width) } }
    @keyframes slideDown { from { opacity: 0; transform: translateY(-10px); max-height: 0 } to { opacity: 1; transform: translateY(0); max-height: 500px } }

    input, select, textarea { font-family: 'Pretendard', sans-serif; }

    // ─── 공통 컴포넌트 ───
    function Badge({ children, color = C.primary, bg }) {
      return (
        <span style={{ display: 'inline-block', padding: '3px 10px', borderRadius: 999, fontSize: 11, fontWeight: 700, background: bg || color + '18', color }}>
          {children}
        </span>
      );
    }

    function Toast({ message, onClose }) {
      useEffect(() => { const t = setTimeout(onClose, 3000); return () => clearTimeout(t); }, []);
      return (
        <div style={{ position: 'fixed', bottom: 24, right: 24, zIndex: 9999, background: '#1F2937', color: '#fff', padding: '12px 20px', borderRadius: 10, boxShadow: '0 4px 20px rgba(0,0,0,0.25)', animation: 'slideUp 300ms ease', display: 'flex', alignItems: 'center', gap: 10, fontSize: 14 }}>
          <span style={{ fontSize: 16 }}>✓</span> {message}
        </div>
      );
    }

    function Modal({ title, onClose, children, width = 560 }) {
      return (
        <div style={{ position: 'fixed', inset: 0, zIndex: 500, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
          <div onClick={onClose} style={{ position: 'absolute', inset: 0, background: 'rgba(0,0,0,0.45)', animation: 'fadeIn 200ms ease' }} />
          <div style={{ position: 'relative', width, maxHeight: '85vh', background: '#fff', borderRadius: 16, zIndex: 501, animation: 'fadeInScale 200ms ease', display: 'flex', flexDirection: 'column', boxShadow: '0 24px 64px rgba(0,0,0,0.18)' }}>
            <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', padding: '20px 24px', borderBottom: `1px solid ${C.border}` }}>

              <button onClick={onClose} style={{ background: 'none', border: 'none', fontSize: 22, color: C.textLight, lineHeight: 1 }}>✕</button>
            </div>
            <div style={{ padding: 24, overflowY: 'auto', flex: 1 }}>{children}</div>
          </div>
        </div>
      );
    }

          <div style={{ position: 'fixed', top: 0, right: 0, bottom: 0, width: 500, background: '#fff', boxShadow: '-8px 0 40px rgba(0,0,0,0.12)', zIndex: 201, overflowY: 'auto', animation: 'slideInRight 200ms ease' }}>

              <h3 style={{ fontSize: 16, fontWeight: 700 }}>공고 상세</h3>

                  <Badge color={C.primary}>{item.type}</Badge>

    // ─── 카운트업 ───
    function CountUp({ end, duration = 1200, suffix = '' }) {
      const [val, setVal] = useState(0);
      useEffect(() => {
        let start = 0; const step = end / (duration / 16);
        const timer = setInterval(() => {
          start += step;
          if (start >= end) { setVal(end); clearInterval(timer); }
          else setVal(Math.floor(start));
        }, 16);
        return () => clearInterval(timer);
      }, [end]);
      return <span style={{ animation: 'countUp 400ms ease' }}>{val.toLocaleString()}{suffix}</span>;
    }

          (!filters.keyword || b.title.includes(filters.keyword))

      return (

              </select>
              <select value={filters.type} onChange={e => setFilters({...filters, type: e.target.value})}
                style={{ padding: '9px 12px', border: `1px solid ${C.border}`, borderRadius: 8, fontSize: 14, background: '#fff', color: C.text }}>
                <option value="">전체 업종</option>

                style={{ padding: '9px 14px', border: `1px solid ${C.border}`, borderRadius: 8, fontSize: 14 }} />

                style={{ background: C.primary, color: '#fff', border: 'none', borderRadius: 8, fontWeight: 600, fontSize: 14, transition: 'all 200ms' }}>
                검색
              </button>
            </div>
          </div>

          {/* 리스트 헤더 */}
          <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 12 }}>
            <div style={{ fontSize: 14, color: C.textLight }}>총 <strong style={{ color: C.text }}>{filtered.length}</strong>건 검색됨</div>
            <div style={{ display: 'flex', gap: 8 }}>
              {['마감순', '금액순', '적합도순'].map(s => (
                <button key={s} style={{ padding: '6px 12px', border: `1px solid ${C.border}`, borderRadius: 6, fontSize: 12, background: s === '마감순' ? C.accentLight : '#fff', color: s === '마감순' ? C.primary : C.textLight, fontWeight: s === '마감순' ? 600 : 400 }}>{s}</button>

      const showToast = (msg) => { setToast(msg); };

      const TABS = [
        { id: 'main', label: '공고 검색' },
        { id: 'dashboard', label: '낙찰 분석' },
        { id: 'subscription', label: '구독 관리' },
        { id: 'auth', label: '회원 가입' },
      ];

      const hero = HERO_META[tab];

      return (
        <div style={{ display: 'flex', flexDirection: 'column', width: '100%', minHeight: '100vh', background: C.bg }}>
          {/* 상단 네비 */}
          <header style={{ position: 'sticky', top: 0, zIndex: 100, background: '#fff', borderBottom: `1px solid ${C.border}`, display: 'flex', alignItems: 'center', height: 58, padding: '0 28px', gap: 4 }}>
            <div style={{ display: 'flex', alignItems: 'center', gap: 8, marginRight: 20 }}>
              <div style={{ width: 28, height: 28, background: `linear-gradient(135deg, ${C.primary}, ${C.accent})`, borderRadius: 8, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
                <span style={{ fontSize: 14 }}>📋</span>
              </div>
              <span style={{ fontSize: 15, fontWeight: 800, color: C.primary }}>BidScope</span>
            </div>
            {TABS.map(t => (
              <button key={t.id} onClick={() => handleTab(t.id)}
                style={{ padding: '8px 16px', background: 'none', border: 'none', fontSize: 14, fontWeight: tab === t.id ? 700 : 400, color: tab === t.id ? C.primary : C.textLight, borderBottom: tab === t.id ? `2px solid ${C.primary}` : '2px solid transparent', transition: 'all 200ms', cursor: 'pointer', whiteSpace: 'nowrap' }}>
                {t.label}
              </button>
            ))}
            <div style={{ flex: 1 }} />
            <div style={{ display: 'flex', gap: 12, alignItems: 'center' }}>
              <button style={{ background: 'none', border: 'none', fontSize: 18, cursor: 'pointer', color: C.textLight }}>🔍</button>
              <button style={{ background: 'none', border: 'none', fontSize: 18, cursor: 'pointer', color: C.textLight, position: 'relative' }}>
                🔔
                <span style={{ position: 'absolute', top: -2, right: -2, width: 8, height: 8, background: C.error, borderRadius: '50%' }} />
              </button>
              <div style={{ width: 32, height: 32, borderRadius: '50%', background: `linear-gradient(135deg, ${C.primary}, ${C.accent})`, display: 'flex', alignItems: 'center', justifyContent: 'center', cursor: 'pointer' }}>
                <span style={{ fontSize: 14, color: '#fff', fontWeight: 700 }}>김</span>
              </div>
            </div>
          </header>

          {/* 히어로 배너 */}
          <div style={{ background: `linear-gradient(135deg, ${C.primary} 0%, #2563EB 50%, ${C.accent} 100%)`, padding: '28px 32px', color: '#fff' }}>
            <div style={{ maxWidth: 1200, margin: '0 auto', display: 'flex', alignItems: 'center', justifyContent: 'space-between', flexWrap: 'wrap', gap: 16 }}>
              <div>
                <h1 style={{ fontSize: 26, fontWeight: 800, marginBottom: 6 }}>{hero.title}</h1>
                <p style={{ fontSize: 14, opacity: 0.85 }}>{hero.subtitle}</p>
              </div>
              <div style={{ display: 'flex', gap: 24 }}>
                {hero.kpis.map(k => (
                  <div key={k.label} style={{ textAlign: 'center' }}>
                    <div style={{ fontSize: 20, fontWeight: 800 }}>{k.value}</div>
                    <div style={{ fontSize: 12, opacity: 0.75, marginTop: 2 }}>{k.label}</div>
                  </div>
                ))}
              </div>
            </div>
          </div>

          {/* 콘텐츠 */}
          <main style={{ flex: 1, maxWidth: 1200, width: '100%', margin: '0 auto', padding: '24px 32px', boxSizing: 'border-box', alignSelf: 'stretch' }}>
            {loading ? <Skeleton /> : (
              <div key={contentKey} style={{ animation: 'fadeIn 300ms ease' }}>
                {tab === 'main' && <SearchPage onDrawer={setDrawer} />}
                {tab === 'dashboard' && <DashboardPage />}
                {tab === 'subscription' && <SubscriptionPage onToast={showToast} />}
                {tab === 'auth' && <AuthPage onToast={showToast} />}
              </div>
            )}
          </main>

          {drawer && <Drawer item={drawer} onClose={() => setDrawer(null)} />}
          {toast && <Toast message={toast} onClose={() => setToast(null)} />}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
