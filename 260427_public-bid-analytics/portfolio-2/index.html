    function CountUp({ end, duration = 1200, suffix = '' }) {
      const [val, setVal] = useState(0);
      useEffect(() => {
        let start = 0; const step = end / (duration / 16);
        const timer = setInterval(() => {
          start += step;
          if (start >= end) { setVal(end); clearInterval(timer); }
          else setVal(Math.floor(start));
        }, 16);
        return () => clearInterval(timer);
      }, [end]);
      return <span style={{ animation: 'countUp 400ms ease' }}>{val.toLocaleString()}{suffix}</span>;
    }

                  style={{ padding: '14px 16px', background: 'none', border: 'none', fontSize: 13, fontWeight: activeTab === tab ? 700 : 400, color: activeTab === tab ? D.primary : D.textLight, borderBottom: activeTab === tab ? `2px solid ${D.primary}` : '2px solid transparent', cursor: 'pointer', transition: 'all 200ms' }}>
                  {tab} <span style={{ fontSize: 11, marginLeft: 4, background: activeTab === tab ? `${D.primary}25` : D.bg, color: activeTab === tab ? D.primary : D.textLight, padding: '2px 7px', borderRadius: 999 }}>{cnt}</span>
                </button>
              ))}
              <div style={{ flex: 1 }} />
              <button onClick={() => onToast('새 공고를 스크랩에 추가합니다.')}
                style={{ alignSelf: 'center', padding: '6px 14px', background: `${D.primary}25`, color: D.primary, border: 'none', borderRadius: 6, fontSize: 12, fontWeight: 600, cursor: 'pointer' }}>
                + 스크랩 추가
              </button>
            </div>

            <div style={{ padding: '16px 20px' }}>
              {filtered.length === 0 ? (
                <div style={{ textAlign: 'center', padding: '40px 0', color: D.textLight, fontSize: 14 }}>해당 상태의 스크랩이 없습니다.</div>
              ) : (
                <div style={{ display: 'flex', flexDirection: 'column', gap: 10 }}>
                  {filtered.map((s, i) => (
                    <div key={s.id} onClick={() => setSelectedScrap(s)}
                      style={{ display: 'flex', alignItems: 'center', gap: 14, padding: '14px 16px', background: D.bg, borderRadius: 12, cursor: 'pointer', border: `1px solid ${D.border}`, transition: 'all 200ms', animation: `slideUp 300ms ease ${i * 60}ms both` }}
                      onMouseEnter={e => { e.currentTarget.style.borderColor = D.primary; e.currentTarget.style.background = `${D.primary}10`; }}
                      onMouseLeave={e => { e.currentTarget.style.borderColor = D.border; e.currentTarget.style.background = D.bg; }}>
                      <div style={{ flex: 1 }}>
                        <div style={{ fontSize: 13, fontWeight: 600, marginBottom: 5 }}>{s.title}</div>
                        <div style={{ display: 'flex', gap: 12, fontSize: 12, color: D.textLight }}>
                          <span>{s.org}</span>
                          <span>마감 {s.deadline}</span>
                          <span>{(parseInt(s.amount.replace(/,/g, '')) / 100000000).toFixed(1)}억</span>
                          {s.rate !== '-' && <span style={{ color: D.success }}>추천 투찰률 {s.rate}</span>}
                        </div>
                      </div>
                      <div style={{ display: 'flex', gap: 8 }}>
                        {['참여예정', '검토중', '패스'].map(st => (
                          <button key={st} onClick={e => { e.stopPropagation(); setScraps(prev => prev.map(p => p.id === s.id ? {...p, status: st} : p)); onToast(`상태가 "${st}"으로 변경되었습니다.`); }}
                            style={{ padding: '5px 10px', background: s.status === st ? (st === '참여예정' ? D.success : st === '검토중' ? D.warning : D.textLight) + '25' : D.surfaceHigh, border: `1px solid ${s.status === st ? (st === '참여예정' ? D.success : st === '검토중' ? D.warning : D.textLight) : D.border}`, borderRadius: 6, fontSize: 11, color: s.status === st ? (st === '참여예정' ? D.success : st === '검토중' ? D.warning : D.textLight) : D.textLight, cursor: 'pointer' }}>
                            {st}
                          </button>
                        ))}
                      </div>
                    </div>
                  ))}
                </div>
              )}
            </div>
          </div>

          {selectedScrap && (
            <DrawerDark item={selectedScrap} onClose={() => setSelectedScrap(null)}>
              <div style={{ background: `${D.accent}15`, borderRadius: 12, padding: '14px 16px', marginBottom: 18, border: `1px solid ${D.accent}30` }}>
                <div style={{ fontSize: 15, fontWeight: 700, marginBottom: 6, lineHeight: 1.5 }}>{selectedScrap.title}</div>
                <Badge color={selectedScrap.status === '참여예정' ? D.success : selectedScrap.status === '검토중' ? D.warning : D.textLight}>{selectedScrap.status}</Badge>
              </div>
              {[
                { label: '발주기관', value: selectedScrap.org },
                { label: '업종', value: selectedScrap.type },
                { label: '마감일', value: selectedScrap.deadline },
                { label: '입찰금액', value: selectedScrap.amount + '원' },
                { label: 'AI 추천 투찰률', value: selectedScrap.rate },
              ].map(({ label, value }) => (
                <div key={label} style={{ display: 'flex', justifyContent: 'space-between', padding: '11px 0', borderBottom: `1px solid ${D.border}` }}>
                  <span style={{ fontSize: 13, color: D.textLight }}>{label}</span>
                  <span style={{ fontSize: 13, fontWeight: 600 }}>{value}</span>
                </div>
              ))}
              <div style={{ display: 'flex', gap: 10, marginTop: 20 }}>
                <button onClick={() => { setSelectedScrap(null); onToast('첨부파일 다운로드 링크가 생성되었습니다.'); }}
                  style={{ flex: 1, padding: '10px 0', background: D.primary, color: '#fff', border: 'none', borderRadius: 8, fontWeight: 600, fontSize: 13, cursor: 'pointer' }}>
                  첨부파일 다운로드
                </button>
                <button onClick={() => { setSelectedScrap(null); onToast('AI 예측 페이지로 이동합니다.'); }}
                  style={{ flex: 1, padding: '10px 0', background: D.bg, border: `1px solid ${D.border}`, color: D.accent, borderRadius: 8, fontWeight: 600, fontSize: 13, cursor: 'pointer' }}>
                  AI 예측 보기
                </button>
              </div>
            </DrawerDark>
          )}
        </div>
      );
    }

    // ─── 메인 앱 ───
    function App() {
      const [route, setRoute] = useState('main');
      const [toast, setToast] = useState(null);
      const [loading, setLoading] = useState(true);
      const [routeKey, setRouteKey] = useState(0);

      useEffect(() => { setTimeout(() => setLoading(false), 1000); }, []);

      const navigate = (r) => { setRoute(r); setRouteKey(k => k + 1); };
      const showToast = (msg) => setToast(msg);

      const NAV = [
        { id: 'main', label: 'AI 예측', icon: '🤖' },
        { id: 'alerts', label: '알림 관리', icon: '🔔' },
        { id: 'admin', label: '관리자', icon: '⚙️' },
        { id: 'scraps', label: '스크랩', icon: '📌' },
      ];

      const PAGE_HERO = {
        main: { title: 'AI 입찰 금액 예측', sub: '과거 낙찰 데이터 기반 최적 투찰 금액을 추천합니다', kpis: [{ label: '분석 공고 수', value: '48,201건' }, { label: '평균 예측 정확도', value: '91.3%' }, { label: '이번달 예측 요청', value: '1,284건' }] },
        alerts: { title: '실시간 알림 관리', sub: '관심 조건에 맞는 공고를 자동으로 감지하여 알림합니다', kpis: [{ label: '등록 조건', value: '4개' }, { label: '이번달 알림', value: '247건' }, { label: '미읽음', value: '2건' }] },
        admin: { title: '관리자 대시보드', sub: '전체 회원 현황과 구독·결제 내역을 통합 관리합니다', kpis: [{ label: '전체 회원', value: '2,180개사' }, { label: '유료 구독', value: '689개사' }, { label: '이번달 수익', value: '28백만원' }] },
        scraps: { title: '공고 스크랩 관리', sub: '관심 공고를 저장하고 참여 일정을 관리합니다', kpis: [{ label: '전체 스크랩', value: '5건' }, { label: '참여 예정', value: '2건' }, { label: '검토 중', value: '2건' }] },
      };

      const hero = PAGE_HERO[route];

      return (
        <div style={{ display: 'flex', flexDirection: 'column', width: '100%', minHeight: '100vh', background: D.bg }}>
          {/* 상단 네비 */}
          <header style={{ position: 'sticky', top: 0, zIndex: 100, background: D.surface, borderBottom: `1px solid ${D.border}`, display: 'flex', alignItems: 'center', height: 60, padding: '0 28px', gap: 4 }}>
            <div style={{ display: 'flex', alignItems: 'center', gap: 8, marginRight: 24 }}>
              <div style={{ width: 30, height: 30, background: `linear-gradient(135deg, ${D.primary}, ${D.accent})`, borderRadius: 8, display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 14 }}>🔮</div>
              <span style={{ fontSize: 15, fontWeight: 800, background: `linear-gradient(90deg, ${D.primary}, ${D.accent})`, WebkitBackgroundClip: 'text', WebkitTextFillColor: 'transparent' }}>BidAI Pro</span>
            </div>
            {NAV.map(n => (
              <button key={n.id} onClick={() => navigate(n.id)}
                style={{ padding: '8px 16px', background: route === n.id ? `${D.primary}20` : 'none', border: 'none', fontSize: 14, fontWeight: route === n.id ? 700 : 400, color: route === n.id ? D.primary : D.textLight, borderRadius: 8, transition: 'all 200ms', cursor: 'pointer', whiteSpace: 'nowrap' }}>
                {n.label}
              </button>
            ))}
            <div style={{ flex: 1 }} />
            <div style={{ display: 'flex', gap: 10, alignItems: 'center' }}>
              <button style={{ background: 'none', border: 'none', fontSize: 18, cursor: 'pointer', color: D.textLight }}>🔍</button>
              <div style={{ position: 'relative' }}>
                <button style={{ background: 'none', border: 'none', fontSize: 18, cursor: 'pointer', color: D.textLight }}>🔔</button>
                <span style={{ position: 'absolute', top: 0, right: 0, width: 8, height: 8, background: D.error, borderRadius: '50%' }} />
              </div>
              <div style={{ width: 32, height: 32, borderRadius: '50%', background: `linear-gradient(135deg, ${D.primary}, ${D.accent})`, display: 'flex', alignItems: 'center', justifyContent: 'center', cursor: 'pointer', fontSize: 13, fontWeight: 700 }}>김</div>
            </div>
          </header>

          {/* 히어로 배너 */}
          <div style={{ background: `linear-gradient(135deg, ${D.primary}40 0%, ${D.bg} 60%)`, borderBottom: `1px solid ${D.border}`, padding: '24px 32px' }}>
            <div style={{ maxWidth: 1200, margin: '0 auto', display: 'flex', alignItems: 'center', justifyContent: 'space-between', flexWrap: 'wrap', gap: 16 }}>
              <div>
                <h1 style={{ fontSize: 24, fontWeight: 800, marginBottom: 5, color: D.text }}>{hero.title}</h1>
                <p style={{ fontSize: 13, color: D.textLight }}>{hero.sub}</p>
              </div>
              <div style={{ display: 'flex', gap: 24 }}>
                {hero.kpis.map(k => (
                  <div key={k.label} style={{ textAlign: 'center' }}>
                    <div style={{ fontSize: 18, fontWeight: 800, color: D.accent }}>{k.value}</div>
                    <div style={{ fontSize: 11, color: D.textLight, marginTop: 2 }}>{k.label}</div>
                  </div>
                ))}
              </div>
            </div>
          </div>

          {/* 메인 콘텐츠 */}
          <main style={{ flex: 1, maxWidth: 1200, width: '100%', margin: '0 auto', padding: '22px 32px', boxSizing: 'border-box', alignSelf: 'stretch' }}>
            {loading ? (
              <div style={{ display: 'flex', flexDirection: 'column', gap: 16 }}>
                {[...Array(3)].map((_,i) => (
                  <div key={i} style={{ height: 120, borderRadius: 14, background: 'linear-gradient(90deg, #1E293B 25%, #263346 50%, #1E293B 75%)', backgroundSize: '200% 100%', animation: 'shimmer 1.5s infinite' }} />
                ))}
              </div>
            ) : (
              <div key={routeKey} style={{ animation: 'fadeIn 300ms ease' }}>
                {route === 'main' && <AIPredictPage onToast={showToast} />}
                {route === 'alerts' && <AlertsPage onToast={showToast} />}
                {route === 'admin' && <AdminPage onToast={showToast} />}
                {route === 'scraps' && <ScrapsPage onToast={showToast} />}
              </div>
            )}
          </main>

          {/* 푸터 */}
          <footer style={{ background: '#070D1A', borderTop: `1px solid ${D.border}`, padding: '32px 40px' }}>
            <div style={{ maxWidth: 1200, margin: '0 auto', display: 'grid', gridTemplateColumns: '2fr 1fr 1fr 1fr', gap: 32 }}>
              <div>
                <div style={{ display: 'flex', alignItems: 'center', gap: 8, marginBottom: 10 }}>
                  <div style={{ width: 24, height: 24, background: `linear-gradient(135deg, ${D.primary}, ${D.accent})`, borderRadius: 6, display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 12 }}>🔮</div>
                  <span style={{ fontSize: 14, fontWeight: 800, color: D.text }}>BidAI Pro</span>
                </div>
                <p style={{ fontSize: 12, color: D.textLight, lineHeight: 1.7 }}>AI 기반 공공입찰 분석 플랫폼.<br />데이터로 최적의 입찰 전략을 수립합니다.</p>
              </div>
              {[
                { title: '서비스', items: ['AI 예측', '알림 관리', '스크랩 관리', '구독 플랜'] },
                { title: '지원', items: ['사용 가이드', '자주 묻는 질문', '1:1 문의', 'API 문서'] },
                { title: '회사', items: ['회사 소개', '채용 정보', '파트너십', '개인정보처리방침'] },
              ].map(({ title, items }) => (
                <div key={title}>
                  <div style={{ fontSize: 12, fontWeight: 700, color: D.textMid, marginBottom: 10, textTransform: 'uppercase', letterSpacing: '0.05em' }}>{title}</div>
                  <div style={{ display: 'flex', flexDirection: 'column', gap: 6 }}>
                    {items.map(item => <span key={item} style={{ fontSize: 12, color: D.textLight, cursor: 'pointer' }}>{item}</span>)}
                  </div>
                </div>
              ))}
            </div>
            <div style={{ maxWidth: 1200, margin: '24px auto 0', paddingTop: 16, borderTop: `1px solid ${D.border}`, fontSize: 11, color: D.textLight, textAlign: 'center' }}>
              © 2026 BidAI Pro. All rights reserved. · 구독형 공공입찰 데이터 분석 서비스
            </div>
          </footer>

          {toast && <Toast message={toast} onClose={() => setToast(null)} />}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
