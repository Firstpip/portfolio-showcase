function Toast({ message, type='success', onClose }) {
  useEffect(() => { const t = setTimeout(onClose, 3200); return () => clearTimeout(t); }, []);
  const map = { success: { bg:C.success, icon:'✓' }, error: { bg:C.error, icon:'✕' }, info: { bg:C.info, icon:'ℹ' } };
  const cfg = map[type] || map.success;
  return (
    <div style={{ position:'fixed', bottom:24, right:24, zIndex:9999, background:cfg.bg, color:'#fff', padding:'13px 22px', borderRadius:10, animation:'slideUp 300ms ease', boxShadow:'0 6px 20px rgba(0,0,0,0.25)', display:'flex', alignItems:'center', gap:10, fontWeight:600, fontSize:14 }}>
      <span style={{ fontSize:18 }}>{cfg.icon}</span> {message}
    </div>
  );
}

function Modal({ title, onClose, children, width=560 }) {

          <button onClick={onClose} style={{ background:'none', border:'none', fontSize:22, cursor:'pointer', color:C.textSecondary, lineHeight:1, padding:'2px 6px' }}>✕</button>
        </div>
        <div style={{ padding:24, overflowY:'auto', flex:1 }}>{children}</div>
      </div>
    </div>
  );
}

function CountUp({ end, duration=1200, suffix='', prefix='' }) {
  const [val, setVal] = useState(0);
  useEffect(() => {
    let start = 0;
    const step = end / (duration / 16);
    const timer = setInterval(() => {
      start += step;
      if (start >= end) { setVal(end); clearInterval(timer); }
      else setVal(Math.floor(start));
    }, 16);
    return () => clearInterval(timer);
  }, [end]);
  return <span style={{ animation:'countUp 400ms ease' }}>{prefix}{val.toLocaleString()}{suffix}</span>;
}

function Badge({ color, children, size='sm' }) {
  const map = {

    warning: { bg:C.warningLight, text:'#92400E' },
    info: { bg:C.infoLight, text:'#1E40AF' },
    purple: { bg:'#EDE9FE', text:'#5B21B6' },
    gray: { bg:'#F1F5F9', text:'#475569' },
  };
  const cfg = map[color] || map.gray;
  const pad = size === 'sm' ? '3px 10px' : '5px 14px';
  return <span style={{ padding:pad, borderRadius:20, fontSize:size==='sm'?12:13, fontWeight:600, background:cfg.bg, color:cfg.text, whiteSpace:'nowrap' }}>{children}</span>;

/* ===== PAGE 3: CLIENT MANAGEMENT ===== */
function ClientsPage({ showToast }) {
  const [clients, setClients] = useState(CLIENTS);
  const [search, setSearch] = useState('');
  const [filterStatus, setFilterStatus] = useState('전체');
  const [filterCat, setFilterCat] = useState('전체');
  const [selected, setSelected] = useState(null);
  const [showAdd, setShowAdd] = useState(false);
  const [form, setForm] = useState({ name:'', site:'', category:'B', manager:'', contact:'' });
  const [showDelete, setShowDelete] = useState(null);

  const filtered = clients.filter(c =>
    (filterStatus==='전체' || c.status===filterStatus) &&
    (filterCat==='전체' || c.category===filterCat) &&
    (c.name.includes(search) || c.site.includes(search) || c.manager.includes(search))
  );

  function handleAdd() {
    if (!form.name.trim()) return;
    const newClient = { id:Date.now(), ...form, status:'활성', lastInput:'-', totalInputs:0 };
    setClients(prev => [newClient, ...prev]);
    setForm({ name:'', site:'', category:'B', manager:'', contact:'' });
    setShowAdd(false);
    showToast(`${form.name} 거래처가 등록되었습니다`);
  }

  function handleDelete() {
    setClients(prev => prev.filter(c => c.id !== showDelete.id));
    if (selected?.id === showDelete.id) setSelected(null);
    setShowDelete(null);
    showToast('거래처가 비활성화되었습니다');
  }

  return (
    <div style={{ display:'flex', flexDirection:'column', height:'100%', animation:'fadeIn 300ms ease' }}>
      <TopBar title="거래처 관리" subtitle="거래처 정보 · 분류 · 이력 통합 관리"
        extra={<button onClick={() => setShowAdd(true)} style={{ padding:'9px 18px', borderRadius:9, background:C.accent, color:'#fff', border:'none', cursor:'pointer', fontSize:13, fontWeight:700 }}>+ 거래처 등록</button>}
      />
      <div style={{ flex:1, display:'flex', overflow:'hidden' }}>
        {/* Main list */}

          {/* Filters */}
          <div style={{ padding:'14px 24px', background:C.surface, borderBottom:`1px solid ${C.border}`, display:'flex', gap:10, alignItems:'center', flexShrink:0 }}>
            <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="🔍 거래처명, 부지, 담당자 검색"
              style={{ padding:'9px 14px', border:`1px solid ${C.border}`, borderRadius:9, fontSize:13, width:240, outline:'none' }}
              onFocus={e=>e.target.style.borderColor=C.accent} onBlur={e=>e.target.style.borderColor=C.border}
            />
            <div style={{ width:1, height:24, background:C.border }} />
            {['전체','활성','비활성'].map(s => (
              <button key={s} onClick={() => setFilterStatus(s)} style={{ padding:'7px 14px', borderRadius:20, border:`1px solid ${filterStatus===s?C.accent:C.border}`, background:filterStatus===s?C.accentLight:C.surface, color:filterStatus===s?C.accent:C.textSecondary, cursor:'pointer', fontSize:12, fontWeight:600, transition:'all 120ms' }}>{s}</button>
            ))}
            <div style={{ width:1, height:24, background:C.border }} />
            {['전체','A','B','C'].map(cat => (
              <button key={cat} onClick={() => setFilterCat(cat)} style={{ padding:'7px 12px', borderRadius:20, border:`1px solid ${filterCat===cat?C.accent:C.border}`, background:filterCat===cat?C.accentLight:C.surface, color:filterCat===cat?C.accent:C.textSecondary, cursor:'pointer', fontSize:12, fontWeight:600, transition:'all 120ms' }}>{cat==='전체'?'전체 등급':`${cat}등급`}</button>
            ))}
            <span style={{ marginLeft:'auto', fontSize:13, color:C.textSecondary }}>{filtered.length}개 거래처</span>
          </div>
          <div style={{ flex:1, overflow:'auto', padding:'0 0 16px' }}>
            <table style={{ width:'100%', borderCollapse:'collapse' }}>
              <thead style={{ position:'sticky', top:0, zIndex:10 }}>
                <tr style={{ background:C.bg }}>
                  {['거래처명','등급','부지','담당자','상태','최근 입력','총 건수',''].map(h => (

              <tbody>

              </select>
            </div>
            <button onClick={handleAdd} style={{ padding:'13px', background:C.accent, color:'#fff', border:'none', borderRadius:10, cursor:'pointer', fontSize:15, fontWeight:700, marginTop:4 }}>등록하기</button>
          </div>
        </Modal>
      )}

      {showDelete && (
        <Modal title="거래처 삭제 확인" onClose={() => setShowDelete(null)} width={400}>
          <div style={{ textAlign:'center', paddingBottom:8 }}>
            <div style={{ fontSize:40, marginBottom:12 }}>⚠️</div>
            <p style={{ fontSize:15, color:C.textPrimary, marginBottom:6 }}><strong>{showDelete.name}</strong>을(를)</p>
            <p style={{ fontSize:15, color:C.textSecondary, marginBottom:20 }}>목록에서 제거하시겠습니까?</p>
            <div style={{ display:'flex', gap:10 }}>
              <button onClick={() => setShowDelete(null)} style={{ flex:1, padding:'13px', borderRadius:9, border:`1px solid ${C.border}`, background:C.surface, cursor:'pointer', fontSize:14, fontWeight:600 }}>취소</button>
              <button onClick={handleDelete} style={{ flex:1, padding:'13px', borderRadius:9, border:'none', background:C.error, color:'#fff', cursor:'pointer', fontSize:14, fontWeight:700 }}>삭제</button>
            </div>
          </div>
        </Modal>
      )}
    </div>
  );
}

/* ===== PAGE 4: ANALYTICS ===== */
function AnalyticsPage({ showToast }) {
  const [period, setPeriod] = useState('month');
  const [downloading, setDownloading] = useState(false);
  const barRef = useRef(null);
  const pieRef = useRef(null);
  const lineRef = useRef(null);
  const barInst = useRef(null);
  const pieInst = useRef(null);
  const lineInst = useRef(null);

  const DATA = {
    week: { bar:[22,18,15,31,19,25,17], labels:['월','화','수','목','금','토','일'] },
    month: { bar:[142,98,76,115,63,89], labels:['한라물산','대한산업','삼화유통','태평양물류','금강기업','현대산업개발'] },
    quarter: { bar:[583,514,621,498], labels:['1월','2월','3월','4월'] },
  };

  useEffect(() => {
    const d = DATA[period];
    if (barRef.current) {
      if (barInst.current) barInst.current.destroy();
      barInst.current = new Chart(barRef.current, {
        type:'bar',
        data:{ labels:d.labels, datasets:[{ label:'입력 건수', data:d.bar, backgroundColor:d.bar.map((_,i)=>`hsl(${240+i*15},70%,${55+i*4}%)`), borderRadius:6 }] },
        options:{ responsive:true, maintainAspectRatio:false, plugins:{ legend:{ display:false } }, scales:{ y:{ beginAtZero:true }, x:{ grid:{ display:false } } } },
      });
    }
    if (pieRef.current) {
      if (pieInst.current) pieInst.current.destroy();
      pieInst.current = new Chart(pieRef.current, {
        type:'doughnut',
        data:{ labels:['원자재','부자재','소모품'], datasets:[{ data:[45,32,23], backgroundColor:[C.accent,'#F59E0B','#10B981'], borderWidth:0, hoverOffset:6 }] },
        options:{ responsive:true, maintainAspectRatio:false, plugins:{ legend:{ position:'bottom', labels:{ padding:14, font:{ family:'Pretendard', size:12 } } } }, cutout:'65%' },
      });
    }
    if (lineRef.current) {
      if (lineInst.current) lineInst.current.destroy();
      lineInst.current = new Chart(lineRef.current, {
        type:'line',
        data:{ labels:['1주차','2주차','3주차','4주차'], datasets:[
          { label:'이번 달', data:[130,158,142,153], borderColor:C.accent, tension:0.4, borderWidth:2.5, pointRadius:4, pointBackgroundColor:C.accent },
          { label:'지난 달', data:[112,135,128,139], borderColor:'#CBD5E1', tension:0.4, borderWidth:2, pointRadius:3, borderDash:[4,4] },
        ]},
        options:{ responsive:true, maintainAspectRatio:false, plugins:{ legend:{ position:'top', labels:{ font:{ family:'Pretendard', size:12 } } } }, scales:{ y:{ beginAtZero:false }, x:{ grid:{ display:false } } } },
      });
    }
    return () => {
      if (barInst.current) barInst.current.destroy();
      if (pieInst.current) pieInst.current.destroy();
      if (lineInst.current) lineInst.current.destroy();
    };
  }, [period]);

  function handleDownload() {
    setDownloading(true);
    setTimeout(() => { setDownloading(false); showToast('📊 엑셀 파일이 다운로드되었습니다'); }, 2200);
  }

  const summaryStats = [
    { label:'이번 달 총 입력', value:583, unit:'건', color:C.accent },
    { label:'일평균 입력', value:27, unit:'건/일', color:C.success },
    { label:'참여 거래처', value:18, unit:'개사', color:C.info },
    { label:'주요 품목 수', value:12, unit:'종', color:C.warning },
  ];

  return (
    <div style={{ display:'flex', flexDirection:'column', height:'100%', animation:'fadeIn 300ms ease' }}>
      <TopBar title="통계 분석" subtitle="입력 데이터 통계 · 영업 분석 · 엑셀 내보내기"
        extra={
          <button onClick={handleDownload} disabled={downloading} style={{ padding:'9px 18px', borderRadius:9, background:downloading?C.textSecondary:C.success, color:'#fff', border:'none', cursor:downloading?'wait':'pointer', fontSize:13, fontWeight:700, display:'flex', alignItems:'center', gap:6, opacity:downloading?0.7:1 }}>
            {downloading ? '⏳ 생성 중...' : '📥 엑셀 내보내기'}
          </button>
        }
      />
      <div style={{ flex:1, overflow:'auto', padding:28 }}>
        {/* Period Selector */}
        <div style={{ display:'flex', gap:8, marginBottom:24 }}>
          {[['week','주간'],['month','월간'],['quarter','분기']].map(([k,l]) => (
            <button key={k} onClick={() => setPeriod(k)} style={{ padding:'9px 20px', borderRadius:22, border:`1.5px solid ${period===k?C.accent:C.border}`, background:period===k?C.accentLight:C.surface, color:period===k?C.accent:C.textSecondary, cursor:'pointer', fontSize:13, fontWeight:600, transition:'all 150ms' }}>{l}</button>
          ))}
        </div>

        {/* Summary KPIs */}
        <div style={{ display:'grid', gridTemplateColumns:'repeat(4,1fr)', gap:14, marginBottom:20 }}>
          {summaryStats.map((s,i) => (
            <div key={i} style={{ background:C.surface, borderRadius:12, padding:'18px 20px', boxShadow:'0 2px 8px rgba(0,0,0,0.06)', animation:`slideUp 350ms ease ${i*70}ms both` }}>
              <div style={{ fontSize:12, fontWeight:600, color:C.textSecondary, marginBottom:8 }}>{s.label}</div>
              <div style={{ fontSize:26, fontWeight:900, color:s.color }}><CountUp end={s.value} suffix={s.unit.replace(/^\d*/,'')} /></div>
              <div style={{ fontSize:11, color:C.textSecondary }}>{s.unit}</div>
            </div>
          ))}
        </div>

        {/* Charts Row 1 */}
        <div style={{ display:'grid', gridTemplateColumns:'1.6fr 1fr', gap:16, marginBottom:16 }}>
          <div style={{ background:C.surface, borderRadius:14, padding:22, boxShadow:'0 2px 10px rgba(0,0,0,0.06)' }}>
            <h3 style={{ fontSize:15, fontWeight:700, color:C.textPrimary, marginBottom:16 }}>
              {period==='month' ? '거래처별 입력 건수' : period==='week' ? '요일별 입력 건수' : '월별 총 입력량'}
            </h3>
            <div style={{ position:'relative', height:240 }}>
              <canvas ref={barRef} style={{ width:'100%', height:'100%' }} />
            </div>
          </div>
          <div style={{ background:C.surface, borderRadius:14, padding:22, boxShadow:'0 2px 10px rgba(0,0,0,0.06)' }}>
            <h3 style={{ fontSize:15, fontWeight:700, color:C.textPrimary, marginBottom:16 }}>카테고리 분포</h3>
            <div style={{ position:'relative', height:240 }}>
              <canvas ref={pieRef} style={{ width:'100%', height:'100%' }} />
            </div>
          </div>
        </div>

        {/* Charts Row 2 */}
        <div style={{ background:C.surface, borderRadius:14, padding:22, boxShadow:'0 2px 10px rgba(0,0,0,0.06)' }}>
          <h3 style={{ fontSize:15, fontWeight:700, color:C.textPrimary, marginBottom:16 }}>주차별 입력 트렌드 (전월 비교)</h3>
          <div style={{ position:'relative', height:220 }}>
            <canvas ref={lineRef} style={{ width:'100%', height:'100%' }} />
          </div>
        </div>
      </div>
    </div>
  );
}

/* ===== MAIN APP ===== */
function App() {
  const [page, setPage] = useState('main');
  const [toast, setToast] = useState(null);

  function showToast(msg, type='success') { setToast({ msg, type }); }

  const pageMap = {
    main: <KioskPage showToast={showToast} />,
    dashboard: <DashboardPage />,
    clients: <ClientsPage showToast={showToast} />,
    analytics: <AnalyticsPage showToast={showToast} />,
  };

  return (
    <div style={{ display:'flex', width:'100%', height:'100vh', overflow:'hidden' }}>
      <Sidebar activePage={page} setPage={setPage} />
      <div style={{ flex:1, display:'flex', flexDirection:'column', overflow:'hidden', minWidth:0, background:C.bg }}>
        {pageMap[page]}
      </div>
      {toast && <Toast message={toast.msg} type={toast.type} onClose={() => setToast(null)} />}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
