function Toast({ message, type='success', onClose }) {
  useEffect(() => { const t = setTimeout(onClose, 3200); return () => clearTimeout(t); }, []);
  const map = { success:{ bg:C.success, icon:'✓' }, error:{ bg:C.error, icon:'✕' }, info:{ bg:C.info, icon:'ℹ' } };
  const cfg = map[type] || map.success;
  return (
    <div style={{ position:'fixed', bottom:24, right:24, zIndex:9999, background:cfg.bg, color:'#fff', padding:'13px 22px', borderRadius:10, animation:'slideUp 300ms ease', boxShadow:'0 6px 20px rgba(0,0,0,0.25)', display:'flex', alignItems:'center', gap:10, fontWeight:600, fontSize:14 }}>
      <span style={{ fontSize:18 }}>{cfg.icon}</span> {message}
    </div>
  );
}

function Modal({ title, onClose, children, width=560 }) {
  return (
    <div style={{ position:'fixed', inset:0, zIndex:500, display:'flex', alignItems:'center', justifyContent:'center' }}>
      <div onClick={onClose} style={{ position:'absolute', inset:0, background:'rgba(0,0,0,0.45)', animation:'fadeIn 200ms ease' }} />
      <div style={{ position:'relative', width, maxHeight:'85vh', background:C.surface, borderRadius:10, zIndex:501, animation:'fadeInScale 220ms ease', display:'flex', flexDirection:'column', boxShadow:'0 24px 64px rgba(0,0,0,0.2)' }}>
        <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', padding:'20px 24px', borderBottom:`1px solid ${C.borderLight}`, flexShrink:0 }}>
          <h3 style={{ fontSize:17, fontWeight:700, color:C.textPrimary }}>{title}</h3>
          <button onClick={onClose} style={{ background:'none', border:'none', fontSize:22, cursor:'pointer', color:C.textSecondary }}>✕</button>
        </div>
        <div style={{ padding:24, overflowY:'auto', flex:1 }}>{children}</div>
      </div>
    </div>
  );
}

function CountUp({ end, duration=1200, suffix='' }) {
  const [val, setVal] = useState(0);
  useEffect(() => {
    let start = 0;
    const step = end / (duration / 16);
    const timer = setInterval(() => {
      start += step;
      if (start >= end) { setVal(end); clearInterval(timer); }
      else setVal(Math.floor(start));
    }, 16);
    return () => clearInterval(timer);
  }, [end]);
  return <span style={{ animation:'countUp 400ms ease' }}>{val.toLocaleString()}{suffix}</span>;
}

function Badge({ color, children }) {
  const map = {
    success:{ bg:C.successLight, text:'#065F46' },
    error:{ bg:C.errorLight, text:'#991B1B' },
    warning:{ bg:C.warningLight, text:'#92400E' },
    info:{ bg:C.infoLight, text:'#1E40AF' },
    cyan:{ bg:'#CFFAFE', text:'#164E63' },
    gray:{ bg:'#F1F5F9', text:'#475569' },
    admin:{ bg:'#EDE9FE', text:'#5B21B6' },
  };
  const cfg = map[color] || map.gray;
  return <span style={{ padding:'3px 10px', borderRadius:20, fontSize:12, fontWeight:600, background:cfg.bg, color:cfg.text, whiteSpace:'nowrap' }}>{children}</span>;
}

          { label:'참여 거래처', value:18, unit:'개사', icon:'🏢', color:C.primary },

          <div style={{ position:'relative', height:240 }}>

      </div>

      <div style={{ background:C.surface, borderRadius:8, padding:22, border:`1px solid ${C.border}` }}>

          <tbody>

            </div>

  );
}

/* ===== MAIN APP ===== */
function App() {
  const [page, setPage] = useState('main');
  const [toast, setToast] = useState(null);

  function showToast(msg, type='success') { setToast({ msg, type }); }

  const pages = {
    main: <MainPage />,
    reports: <ReportsPage showToast={showToast} />,
    settings: <SettingsPage showToast={showToast} />,
    mobile: <MobilePage showToast={showToast} />,
  };

  return (
    <div style={{ width:'100%', height:'100vh', display:'flex', flexDirection:'column', overflow:'hidden', background:C.bg }}>
      <TopNav activePage={page} setPage={setPage} />
      <div style={{ flex:1, overflow:'hidden', display:'flex', flexDirection:'column' }}>
        {pages[page]}
      </div>
      {toast && <Toast message={toast.msg} type={toast.type} onClose={() => setToast(null)} />}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
