<style>
* { margin:0; padding:0; box-sizing:border-box; }
html, body { width:100%; min-height:100vh; font-family:'Pretendard',sans-serif; background:#F0F9FF; }
#root { display:flex; flex-direction:column; width:100%; min-height:100vh; }

@keyframes fadeIn { from{opacity:0}to{opacity:1} }
@keyframes fadeInScale { from{opacity:0;transform:scale(0.95)}to{opacity:1;transform:scale(1)} }
@keyframes slideInRight { from{opacity:0;transform:translateX(30px)}to{opacity:1;transform:translateX(0)} }
@keyframes slideUp { from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)} }
@keyframes ripple { 0%{transform:scale(0);opacity:0.5}100%{transform:scale(4);opacity:0} }
@keyframes countUp { from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)} }
@keyframes shimmer { 0%{background-position:-200% 0}100%{background-position:200% 0} }
@keyframes pulse { 0%,100%{opacity:1}50%{opacity:0.5} }
@keyframes barGrow { from{width:0%}to{width:var(--target-width)} }
@keyframes slideDown { from{opacity:0;transform:translateY(-10px);max-height:0}to{opacity:1;transform:translateY(0);max-height:500px} }
@keyframes spin { to{transform:rotate(360deg)} }
</style>
</head>

const { useState, useEffect, useRef } = React;
const { LineChart, Line, BarChart, Bar, XAxis, YAxis, CartesianGrid, Tooltip, ResponsiveContainer, PieChart, Pie, Cell, Legend, ComposedChart, Area } = Recharts;

const C = {
  primary:'#0EA5E9', secondary:'#0F4C75', accent:'#06B6D4',
  bg:'#F0F9FF', surface:'#FFFFFF', border:'#E0F2FE',
  text:'#0C1B33', textSub:'#475569', textLight:'#94A3B8',
  success:'#10B981', warning:'#F59E0B', danger:'#EF4444',
  gradient:'linear-gradient(135deg, #0EA5E9 0%, #0F4C75 100%)',
  gradientAlt:'linear-gradient(135deg, #06B6D4 0%, #0EA5E9 100%)',
};

function CountUp({ end, duration=1200, suffix='' }) {
  const [val, setVal] = useState(0);
  useEffect(()=>{
    let s=0; const step=end/(duration/16);
    const t=setInterval(()=>{ s+=step; if(s>=end){setVal(end);clearInterval(t);}else setVal(Math.floor(s)); },16);
    return()=>clearInterval(t);
  },[end]);
  return <span style={{animation:'countUp 400ms ease'}}>{val.toLocaleString()}{suffix}</span>;
}

function Toast({ message, onClose }) {
  useEffect(()=>{const t=setTimeout(onClose,3000);return()=>clearTimeout(t);},[]);
  return (
    <div style={{position:'fixed',bottom:24,right:24,zIndex:9999,background:'linear-gradient(135deg,#0EA5E9,#0F4C75)',color:'#fff',padding:'12px 20px',borderRadius:12,animation:'slideUp 300ms ease',boxShadow:'0 8px 24px rgba(14,165,233,0.35)',fontSize:14,display:'flex',alignItems:'center',gap:8}}>
      ✓ {message}
    </div>
  );
}

function Drawer({ item, onClose }) {
  return (
    <>
      <div onClick={onClose} style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.35)',zIndex:200,animation:'fadeIn 200ms ease'}}/>
      <div style={{position:'fixed',top:0,right:0,bottom:0,width:460,background:C.surface,boxShadow:'-8px 0 40px rgba(0,0,0,0.12)',zIndex:201,overflowY:'auto',padding:28,animation:'slideInRight 220ms ease'}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:24}}>

        </div>

          <button onClick={onClose} style={{flex:1,padding:'10px',borderRadius:10,border:'none',background:C.gradient,color:'#fff',cursor:'pointer',fontSize:14,fontWeight:600}}>확인</button>

}

function ComparisonPage({ setDrawer }) {

  const [yearTo, setYearTo] = useState('2025');
  const [selected, setSelected] = useState(null);

  const merged = COMPARE_EMPLOYEES[0].data.map(d=>({
    year:d.year,
    [COMPARE_EMPLOYEES[0].name]:COMPARE_EMPLOYEES[0].data.find(x=>x.year===d.year)?.score,
    [COMPARE_EMPLOYEES[1].name]:COMPARE_EMPLOYEES[1].data.find(x=>x.year===d.year)?.score,

        <select style={{padding:'7px 12px',borderRadius:8,border:`1px solid ${C.border}`,fontSize:13,background:'#F0F9FF',color:C.text}}>

            <CartesianGrid strokeDasharray="3 3" stroke="#E0F2FE"/>
            <XAxis dataKey="year" tick={{fontSize:12,fill:C.textSub}} axisLine={false} tickLine={false}/>
            <YAxis domain={[55,100]} tick={{fontSize:11,fill:C.textSub}} axisLine={false} tickLine={false}/>
            <Tooltip contentStyle={{borderRadius:10,border:'none',boxShadow:'0 4px 16px rgba(0,0,0,0.1)',fontSize:13}}/>
            <Legend wrapperStyle={{fontSize:13}}/>
            {COMPARE_EMPLOYEES.map((e,i)=>(
              <Line key={e.name} type="monotone" dataKey={e.name} stroke={COLORS[i]} strokeWidth={2.5} dot={{r:5,fill:COLORS[i]}} activeDot={{r:7}}/>
            ))}
          </LineChart>
        </ResponsiveContainer>
      </div>
      <div style={{background:C.surface,borderRadius:16,boxShadow:'0 4px 16px rgba(0,0,0,0.06)'}}>
        <div style={{padding:'16px 20px',borderBottom:`1px solid ${C.border}`,fontSize:15,fontWeight:700,color:C.text}}>연도별 점수 테이블</div>
        <div style={{overflowX:'auto'}}>
          <table style={{width:'100%',borderCollapse:'collapse'}}>

              <tr style={{background:'#F0F9FF',borderBottom:`1px solid ${C.border}`}}>

                {['2021','2022','2023','2024','2025'].filter(y=>y>=yearFrom&&y<=yearTo).map(y=>(
                  <th key={y} style={{padding:'12px 16px',textAlign:'center',fontSize:12,fontWeight:700,color:C.textSub}}>{y}년</th>
                ))}
                <th style={{padding:'12px 16px',textAlign:'center',fontSize:12,fontWeight:700,color:C.textSub}}>변화</th>
              </tr>
            </thead>
            <tbody>
              {COMPARE_EMPLOYEES.map((e,idx)=>{
                const filtered=e.data.filter(d=>d.year>=yearFrom&&d.year<=yearTo);
                const diff=filtered.length>1?filtered[filtered.length-1].score-filtered[0].score:0;
                return (
                  <tr key={e.id} style={{borderBottom:`1px solid ${C.border}`,cursor:'pointer',transition:'background 150ms',animation:`slideUp 300ms ease ${idx*80}ms both`}}
                    onClick={()=>setDrawer({title:e.name,drawerContent:<PersonDetail person={{...e,...RANKING[idx]}}/>})}
                    onMouseEnter={ev=>{ev.currentTarget.style.background='#F0F9FF';}}
                    onMouseLeave={ev=>{ev.currentTarget.style.background='transparent';}}>
                    <td style={{padding:'13px 16px'}}>
                      <div style={{fontWeight:700,color:C.text,fontSize:14}}>{e.name}</div>
                      <div style={{fontSize:12,color:C.textSub}}>{e.dept} · {e.grade}</div>
                    </td>
                    {filtered.map(d=>(
                      <td key={d.year} style={{padding:'13px 16px',textAlign:'center',fontSize:14,fontWeight:600,color:C.text}}>{d.score}</td>
                    ))}
                    <td style={{padding:'13px 16px',textAlign:'center'}}>
                      <span style={{background:diff>=0?'#D1FAE5':'#FEE2E2',color:diff>=0?C.success:C.danger,padding:'2px 10px',borderRadius:999,fontSize:12,fontWeight:700}}>
                        {diff>=0?'+':''}{diff.toFixed(1)}
                      </span>
                    </td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>
      </div>
    </div>
  );
}

function ReportPage({ toast }) {
  const [generating, setGenerating] = useState(null);
  const [progress, setProgress] = useState(0);
  const [done, setDone] = useState({});

  function startGenerate(id) {
    setGenerating(id); setProgress(0);
    let p=0;
    const t=setInterval(()=>{
      p+=Math.random()*20+5;
      if(p>=100){ setProgress(100); clearInterval(t); setTimeout(()=>{setGenerating(null);setDone(d=>({...d,[id]:true}));toast('보고서 생성이 완료되었습니다.');},400); }
      else setProgress(Math.min(p,99));
    },300);

    <div key="report" style={{animation:'fadeIn 350ms ease'}}>

        <div style={{position:'fixed',inset:0,zIndex:500,display:'flex',alignItems:'center',justifyContent:'center'}}>

              <div style={{height:'100%',borderRadius:999,background:C.gradient,width:`${progress}%`,transition:'width 300ms ease'}}/>

// ──────────── 엑셀 관리 ────────────
function ExcelPage({ toast }) {
  const [uploading, setUploading] = useState(false);
  const [uploadDone, setUploadDone] = useState(false);
  const [uploadFile, setUploadFile] = useState(null);
  const [errors, setErrors] = useState([]);
  const [dragOver, setDragOver] = useState(false);
  const [downloadLoading, setDownloadLoading] = useState(false);

  function simulateUpload(name) {
    setUploadFile(name); setUploading(true); setUploadDone(false); setErrors([]);
    setTimeout(()=>{
      setUploading(false); setUploadDone(true);
      setErrors([{row:12,col:'부서',msg:'존재하지 않는 부서명 "IT본부"'},{row:35,col:'직급',msg:'직급 코드 오류 "3level"'}]);
      toast('파일 파싱 완료 — 오류 2건 감지');
    },2000);
  }

  function handleDownload() {
    setDownloadLoading(true);
    setTimeout(()=>{ setDownloadLoading(false); toast('엑셀 파일 다운로드가 시작되었습니다.'); },1800);
  }

  return (
    <div key="excel" style={{animation:'fadeIn 350ms ease'}}>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:16,marginBottom:20}}>
        {/* 업로드 */}
        <div style={{background:C.surface,borderRadius:16,padding:24,boxShadow:'0 4px 16px rgba(0,0,0,0.06)'}}>
          <div style={{fontSize:15,fontWeight:700,color:C.text,marginBottom:16}}>📤 데이터 업로드</div>
          <div
            onDragOver={e=>{e.preventDefault();setDragOver(true);}}
            onDragLeave={()=>setDragOver(false)}
            onDrop={e=>{e.preventDefault();setDragOver(false);const f=e.dataTransfer.files[0];if(f)simulateUpload(f.name);}}
            onClick={()=>simulateUpload('평정대상자_2025.xlsx')}
            style={{border:`2px dashed ${dragOver?C.primary:C.border}`,borderRadius:12,padding:'32px 20px',textAlign:'center',cursor:'pointer',transition:'all 200ms',background:dragOver?'#F0F9FF':'transparent'}}>
            <div style={{fontSize:36,marginBottom:12}}>📎</div>
            <div style={{fontSize:14,fontWeight:600,color:C.text,marginBottom:6}}>파일을 드래그하거나 클릭하여 업로드</div>
            <div style={{fontSize:12,color:C.textLight}}>.xlsx, .xls 파일 지원 · 최대 50MB</div>
          </div>
          {uploading && (
            <div style={{marginTop:16,padding:14,background:'#F0F9FF',borderRadius:10}}>
              <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:10}}>
                <div style={{width:18,height:18,borderRadius:'50%',border:`2px solid ${C.primary}`,borderTopColor:'transparent',animation:'spin 800ms linear infinite'}}/>
                <span style={{fontSize:13,color:C.textSub}}>{uploadFile} 파싱 중...</span>
              </div>
              <div style={{height:4,borderRadius:999,background:'#E0F2FE',overflow:'hidden'}}>
                <div style={{height:'100%',borderRadius:999,background:C.gradient,width:'60%',animation:'barGrow 2s ease both'}}/>
              </div>
            </div>
          )}
          {uploadDone && (
            <div style={{marginTop:16}}>
              <div style={{background:'#D1FAE5',borderRadius:8,padding:'10px 14px',fontSize:13,color:C.success,marginBottom:10}}>
                ✓ {uploadFile} — 2,400행 처리 완료
              </div>
              {errors.length>0 && (
                <div>
                  <div style={{fontSize:13,fontWeight:600,color:C.danger,marginBottom:8}}>오류 {errors.length}건 감지</div>
                  {errors.map((e,i)=>(
                    <div key={i} style={{background:'#FFF1F1',borderRadius:8,padding:'8px 12px',marginBottom:6,fontSize:12}}>
                      <span style={{color:C.danger,fontWeight:600}}>행 {e.row} · {e.col}:</span> <span style={{color:C.text}}>{e.msg}</span>
                    </div>
                  ))}
                </div>
              )}
            </div>
          )}
        </div>
        {/* 다운로드 */}
        <div style={{background:C.surface,borderRadius:16,padding:24,boxShadow:'0 4px 16px rgba(0,0,0,0.06)'}}>
          <div style={{fontSize:15,fontWeight:700,color:C.text,marginBottom:16}}>📥 결과 내보내기</div>
          <div style={{marginBottom:16}}>
            <label style={{fontSize:13,fontWeight:600,color:C.textSub,display:'block',marginBottom:8}}>연도</label>
            <select style={{width:'100%',padding:'9px 12px',borderRadius:8,border:`1px solid ${C.border}`,fontSize:13,background:'#F0F9FF',color:C.text}}>
              <option>2025년</option><option>2024년</option><option>2023년</option>
            </select>
          </div>
          <div style={{marginBottom:16}}>
            <label style={{fontSize:13,fontWeight:600,color:C.textSub,display:'block',marginBottom:8}}>부서</label>
            <select style={{width:'100%',padding:'9px 12px',borderRadius:8,border:`1px solid ${C.border}`,fontSize:13,background:'#F0F9FF',color:C.text}}>
              <option>전체 부서</option><option>개발팀</option><option>마케팅팀</option><option>재무회계팀</option>
            </select>
          </div>
          <div style={{marginBottom:20}}>
            <label style={{fontSize:13,fontWeight:600,color:C.textSub,display:'block',marginBottom:8}}>포함 데이터</label>
            {['평정 점수','순위 정보','가감점 내역','평정자 정보'].map(opt=>(
              <label key={opt} style={{display:'flex',alignItems:'center',gap:8,marginBottom:8,cursor:'pointer',fontSize:13,color:C.text}}>
                <input type="checkbox" defaultChecked style={{accentColor:C.primary}}/> {opt}
              </label>
            ))}

          <button onClick={handleDownload} disabled={downloadLoading}
            style={{width:'100%',padding:'11px',borderRadius:10,border:'none',background:downloadLoading?C.textLight:C.gradient,color:'#fff',cursor:downloadLoading?'not-allowed':'pointer',fontSize:14,fontWeight:700,display:'flex',alignItems:'center',justifyContent:'center',gap:8}}>
            {downloadLoading
              ? <><div style={{width:16,height:16,borderRadius:'50%',border:'2px solid rgba(255,255,255,0.4)',borderTopColor:'#fff',animation:'spin 800ms linear infinite'}}/> 생성 중...</>
              : '엑셀 다운로드'}
          </button>
        </div>
      </div>
      <div style={{background:C.surface,borderRadius:16,padding:24,boxShadow:'0 4px 16px rgba(0,0,0,0.06)'}}>
        <div style={{fontSize:15,fontWeight:700,color:C.text,marginBottom:16}}>최근 처리 이력</div>

              {name:'평정결과_2025_개발팀.xlsx',type:'다운로드',rows:18,errors:0,date:'2025-04-28',user:'이상호'},

                </td>
                <td style={{padding:'12px',fontSize:13,color:C.textSub}}>{r.rows.toLocaleString()}행</td>
                <td style={{padding:'12px'}}>
                  {r.errors>0
                    ? <span style={{background:'#FEE2E2',color:C.danger,padding:'2px 8px',borderRadius:6,fontSize:12,fontWeight:600}}>{r.errors}건</span>
                    : <span style={{background:'#D1FAE5',color:C.success,padding:'2px 8px',borderRadius:6,fontSize:12,fontWeight:600}}>없음</span>}
                </td>
                <td style={{padding:'12px',fontSize:12,color:C.textLight}}>{r.date}</td>
                <td style={{padding:'12px',fontSize:13,color:C.textSub}}>{r.user}</td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>
    </div>
  );
}

              </div>
              <div style={{height:7,borderRadius:999,background:'#E0F2FE'}}>
                <div style={{height:'100%',borderRadius:999,background:g.color,'--target-width':`${g.count/total*100}%`,width:`${g.count/total*100}%`,animation:`barGrow 1000ms ease ${GRADE_DATA.indexOf(g)*100}ms both`}}/>
              </div>
            </div>
          ))}
        </div>
      </div>
      <div style={{background:C.surface,borderRadius:16,boxShadow:'0 4px 16px rgba(0,0,0,0.06)'}}>
        <div style={{padding:'16px 20px',borderBottom:`1px solid ${C.border}`,display:'flex',justifyContent:'space-between',alignItems:'center'}}>
          <div style={{fontSize:15,fontWeight:700,color:C.text}}>전체 순위</div>
          <div style={{display:'flex',gap:8}}>
            <select style={{padding:'5px 10px',borderRadius:6,border:`1px solid ${C.border}`,fontSize:12,background:'#F0F9FF',color:C.text}}>
              <option>전체 등급</option><option>S등급</option><option>A등급</option>
            </select>
            <select style={{padding:'5px 10px',borderRadius:6,border:`1px solid ${C.border}`,fontSize:12,background:'#F0F9FF',color:C.text}}>
              <option>전체 부서</option><option>개발팀</option>
            </select>
          </div>
        </div>
        <table style={{width:'100%',borderCollapse:'collapse'}}>
          <thead><tr style={{background:'#F0F9FF',borderBottom:`1px solid ${C.border}`}}>
            {['순위','이름','부서','직급','종합점수','등급','순위변동'].map(h=>(
              <th key={h} style={{padding:'11px 16px',textAlign:'left',fontSize:12,fontWeight:600,color:C.textSub}}>{h}</th>
            ))}
          </tr></thead>
          <tbody>
            {RANKING.map((r,i)=>{
              const grade = r.score>=95?'S':r.score>=88?'A':r.score>=80?'B':'C';
              const gradeColor = r.score>=95?'#F59E0B':r.score>=88?C.success:r.score>=80?C.primary:C.textSub;
              return (
                <tr key={r.rank} style={{borderBottom:`1px solid ${C.border}`,cursor:'pointer',transition:'background 150ms',animation:`slideUp 300ms ease ${i*60}ms both`}}
                  onClick={()=>setDrawer({title:r.name,drawerContent:<PersonDetail person={r}/>})}
                  onMouseEnter={ev=>ev.currentTarget.style.background='#F0F9FF'}
                  onMouseLeave={ev=>ev.currentTarget.style.background='transparent'}>
                  <td style={{padding:'13px 16px',fontSize:14,fontWeight:800,color:r.rank<=3?'#F59E0B':C.textSub}}>#{r.rank}</td>
                  <td style={{padding:'13px 16px',fontSize:14,fontWeight:600,color:C.text}}>{r.name}</td>
                  <td style={{padding:'13px 16px',fontSize:13,color:C.textSub}}>{r.dept}</td>
                  <td style={{padding:'13px 16px',fontSize:13,color:C.textSub}}>{r.grade}</td>
                  <td style={{padding:'13px 16px',fontSize:15,fontWeight:700,color:C.primary}}>{r.score}</td>
                  <td style={{padding:'13px 16px'}}>
                    <span style={{background:`${gradeColor}22`,color:gradeColor,padding:'2px 10px',borderRadius:999,fontSize:13,fontWeight:700}}>{grade}</span>
                  </td>
                  <td style={{padding:'13px 16px'}}>
                    <span style={{color:r.change===0?C.textLight:r.change>0?C.success:C.danger,fontSize:13,fontWeight:600}}>
                      {r.change===0?'—':r.change>0?`↑${r.change}`:` ↓${Math.abs(r.change)}`}
                    </span>
                  </td>
                </tr>
              );
            })}
          </tbody>
        </table>
      </div>
    </div>
  );
}

// ──────────── 메인 앱 ────────────
function App() {
  const [tab, setTab] = useState('home');
  const [drawer, setDrawer] = useState(null);
  const [toast, setToast] = useState(null);
  const showToast = msg => setToast(msg);

  return (
    <div style={{display:'flex',flexDirection:'column',width:'100%',minHeight:'100vh',background:C.bg}}>
      {/* 상단 수평 네비 */}
      <header style={{position:'sticky',top:0,zIndex:100,background:C.surface,borderBottom:`1px solid ${C.border}`,display:'flex',alignItems:'center',height:56,padding:'0 24px',gap:4,boxShadow:'0 2px 8px rgba(0,0,0,0.04)'}}>
        <div style={{display:'flex',alignItems:'center',gap:8,marginRight:16}}>
          <div style={{width:28,height:28,borderRadius:8,background:C.gradient,display:'flex',alignItems:'center',justifyContent:'center',fontSize:12,fontWeight:800,color:'#fff'}}>HR</div>
          <span style={{fontSize:14,fontWeight:800,color:C.text,letterSpacing:'-0.02em'}}>HR Analytics</span>
        </div>
        {TABS.map(t=>(
          <button key={t.id} onClick={()=>setTab(t.id)} style={{padding:'6px 14px',borderRadius:8,border:'none',background:tab===t.id?'#EFF6FF':'transparent',color:tab===t.id?C.primary:C.textSub,cursor:'pointer',fontSize:13,fontWeight:tab===t.id?700:400,transition:'all 150ms'}}>
            {t.label}
          </button>
        ))}
        <div style={{flex:1}}/>
        <div style={{display:'flex',alignItems:'center',gap:6,background:'#F0F9FF',borderRadius:8,padding:'5px 12px',marginRight:8}}>
          <span style={{fontSize:12,color:C.textSub}}>🔍</span>
          <input placeholder="검색..." style={{border:'none',background:'transparent',fontSize:12,outline:'none',width:100,color:C.text}}/>
        </div>
        <div style={{position:'relative',marginRight:4}}>
          <div style={{width:32,height:32,borderRadius:'50%',display:'flex',alignItems:'center',justifyContent:'center',fontSize:16,cursor:'pointer',color:C.textSub}}>🔔</div>
          <div style={{position:'absolute',top:4,right:4,width:8,height:8,borderRadius:'50%',background:C.danger}}/>
        </div>
        <div style={{width:32,height:32,borderRadius:'50%',background:C.gradient,display:'flex',alignItems:'center',justifyContent:'center',fontSize:12,fontWeight:700,color:'#fff',cursor:'pointer'}}>김</div>
      </header>

      {/* 히어로 배너 */}
      <div style={{background:C.gradient,padding:'28px 32px',color:'#fff',animation:'fadeIn 300ms ease'}}>
        <h1 style={{fontSize:24,fontWeight:800,letterSpacing:'-0.02em',marginBottom:6}}>{HERO_META[tab].title}</h1>
        <p style={{fontSize:13,opacity:0.85,marginBottom:18}}>{HERO_META[tab].desc}</p>
        <div style={{display:'flex',gap:32}}>
          {HERO_META[tab].kpis.map((k,i)=>(
            <div key={k.l} style={{animation:`slideUp 400ms ease ${i*80}ms both`}}>
              <div style={{fontSize:26,fontWeight:800,letterSpacing:'-0.02em'}}><CountUp end={k.v} suffix={k.s}/></div>
              <div style={{fontSize:11,opacity:0.8,marginTop:2}}>{k.l}</div>
            </div>
          ))}
        </div>
      </div>

      {/* 콘텐츠 */}
      <main style={{flex:1,padding:'24px 32px'}}>
        {tab==='home' && <HomePage setDrawer={setDrawer}/>}
        {tab==='comparison' && <ComparisonPage setDrawer={setDrawer}/>}
        {tab==='report' && <ReportPage toast={showToast}/>}
        {tab==='excel' && <ExcelPage toast={showToast}/>}
        {tab==='analytics' && <AnalyticsPage setDrawer={setDrawer}/>}
      </main>

      {drawer && <Drawer item={drawer} onClose={()=>setDrawer(null)}/>}
      {toast && <Toast message={toast} onClose={()=>setToast(null)}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
