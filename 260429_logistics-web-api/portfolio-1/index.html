/* CountUp animation for KPI numbers */
function CountUp({ end, suffix = '' }) {
  const [val, setVal] = useState(0);
  useEffect(() => {
    let cur = 0;
    const step = Math.max(1, Math.ceil(end / 25));
    const timer = setInterval(() => {
      cur = Math.min(cur + step, end);
      setVal(cur);
      if (cur >= end) clearInterval(timer);
    }, 40);
    return () => clearInterval(timer);
  }, [end]);
  return `${val}${suffix}`;
}

function StatusBadge({ status, config }) {

}

function Toast({ msg, onClose }) {
  useEffect(() => { const t = setTimeout(onClose, 3000); return ()=>clearTimeout(t); }, []);
  return (
    <div style={{
      position:'fixed', bottom:24, left:'50%', transform:'translateX(-50%)',
      background:'#0F172A', color:'#fff', padding:'12px 20px', borderRadius:10,
      fontSize:14, fontWeight:500, zIndex:9999, animation:'toastIn .3s ease',
      display:'flex', alignItems:'center', gap:8, minWidth:200, maxWidth:400,
    }}>
      <span style={{color:'#4ADE80'}}>✓</span> {msg}
    </div>
  );
}

function Modal({ title, onClose, children, width=520 }) {

function Input({ value, onChange, placeholder, type='text', style={} }) {

        width:'100%', padding:'9px 12px', borderRadius:8, border:`1.5px solid ${C.border}`,

      onBlur={e=>e.target.style.border=`1.5px solid ${C.border}`}
    />
  );
}

function Select({ value, onChange, options, style={} }) {
  return (
    <select value={value} onChange={onChange}

      {options.map(o => <option key={o.value||o} value={o.value||o}>{o.label||o}</option>)}

}

function OrderDetailPage({ orders, selectedOrder, onSelectOrder, onUpdateOrder, onToast }) {
  const order = selectedOrder || orders[0];
  const [editMode, setEditMode] = useState(false);
  const [editAddr, setEditAddr] = useState(order?.address || '');
  const [editMemo, setEditMemo] = useState(order?.memo || '');
  const [sending, setSending] = useState(false);

  useEffect(() => {
    if (order) { setEditAddr(order.address); setEditMemo(order.memo || ''); setEditMode(false); }
  }, [order?.id]);

  if (!order) return <div style={{textAlign:'center', padding:60, color:C.muted}}>주문을 선택해 주세요.</div>;

  const handleSave = () => {
    setSending(true);
    setTimeout(() => {
      setSending(false);
      setEditMode(false);
      onUpdateOrder({ ...order, address: editAddr, memo: editMemo });
      onToast('배송지 정보가 Packiyo API를 통해 업데이트되었습니다.');
    }, 1200);
  };

  const statusList = ['접수','처리중','배송중','완료','지연'];

  return (
    <div style={{animation:'fadeIn .3s ease'}}>
      <div style={{display:'flex', gap:12, marginBottom:20}}>

            <div style={{maxHeight:320, overflowY:'auto'}}>
              {orders.slice(0,8).map(o => (
                <div key={o.id} onClick={()=>onSelectOrder(o)} style={{
                  padding:'11px 16px', cursor:'pointer', borderBottom:`1px solid ${C.border}`,

                }}
                  onMouseEnter={e=>{ if(o.id!==order.id) e.currentTarget.style.background='#F8FAFC'; }}
                  onMouseLeave={e=>{ e.currentTarget.style.background=o.id===order.id?C.primaryLight:'transparent'; }}>
                  <div style={{fontSize:12, fontWeight:700, color:o.id===order.id?C.primary:C.text}}>{o.id}</div>
                  <div style={{fontSize:11, color:C.muted, marginTop:2}}>{o.company} · {o.date}</div>
                  <div style={{marginTop:4}}><StatusBadge status={o.status} config={STATUS_COLORS} /></div>
                </div>
              ))}
            </div>
          </div>
        </div>

        <div style={{flex:1}}>
          <div style={{background:C.surface, borderRadius:12, border:`1px solid ${C.border}`, padding:'24px 28px'}}>
            <div style={{display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:20}}>
              <div>
                <div style={{fontSize:20, fontWeight:800, color:C.text}}>{order.id}</div>
                <div style={{fontSize:14, color:C.muted, marginTop:2}}>{order.company} · 등록일 {order.date}</div>
              </div>
              <div style={{display:'flex', gap:8, alignItems:'center'}}>
                <StatusBadge status={order.status} config={STATUS_COLORS} />
                {!editMode && (
                  <button onClick={()=>setEditMode(true)} style={{
                    padding:'7px 16px', borderRadius:8, fontSize:13, fontWeight:600,
                    background:C.primary, color:'#fff', transition:'all .2s',
                  }}
                    onMouseEnter={e=>e.target.style.background=C.primaryDark}
                    onMouseLeave={e=>e.target.style.background=C.primary}>
                    배송지 수정
                  </button>
                )}
              </div>
            </div>

            <div style={{display:'grid', gridTemplateColumns:'1fr 1fr', gap:16, marginBottom:20}}>
              {[
                { label:'상품명', value:order.product },
                { label:'무게', value:order.weight },
                { label:'택배사', value:order.carrier },
                { label:'운송장 번호', value:order.trackNo },
              ].map(f => (
                <div key={f.label} style={{background:C.bg, borderRadius:9, padding:'14px 16px'}}>
                  <div style={{fontSize:12, fontWeight:600, color:C.muted, marginBottom:4}}>{f.label}</div>
                  <div style={{fontSize:14, fontWeight:600, color:C.text}}>{f.value}</div>
                </div>
              ))}
            </div>

            <div style={{borderTop:`1px solid ${C.border}`, paddingTop:20}}>
              <div style={{fontSize:14, fontWeight:700, color:C.text, marginBottom:12}}>배송지 정보</div>

                <div>
                  <FormField label="배송지 주소" required>
                    <Input value={editAddr} onChange={e=>setEditAddr(e.target.value)} placeholder="배송지 주소 입력" />
                  </FormField>
                  <FormField label="관리자 메모">
                    <textarea value={editMemo} onChange={e=>setEditMemo(e.target.value)}

                        width:'100%', padding:'9px 12px', borderRadius:8, border:`1.5px solid ${C.border}`,
                        fontSize:14, color:C.text, background:C.surface, outline:'none', resize:'vertical', minHeight:80,

                      border:`1.5px solid ${C.border}`, color:C.textSub, background:C.surface,
                    }}>취소</button>
                    <button onClick={handleSave} disabled={sending} style={{
                      padding:'8px 18px', borderRadius:8, fontSize:13, fontWeight:600,
                      background:sending?C.muted:C.success, color:'#fff', transition:'all .2s',
                    }}>
                      {sending ? <span style={{animation:'pulse 1s infinite'}}>Packiyo API 전송 중...</span> : 'Packiyo API 업데이트'}
                    </button>
                  </div>
                </div>
              ) : (
                <div>
                  <div style={{background:C.bg, borderRadius:9, padding:'14px 16px', marginBottom:12}}>
                    <div style={{fontSize:12, fontWeight:600, color:C.muted, marginBottom:4}}>현재 배송지</div>
                    <div style={{fontSize:14, color:C.text}}>{order.address}</div>
                  </div>
                  {order.memo && (
                    <div style={{background:'#FEF3C7', borderRadius:9, padding:'12px 16px', border:'1px solid #FDE68A'}}>
                      <div style={{fontSize:12, fontWeight:600, color:C.warning, marginBottom:4}}>관리자 메모</div>
                      <div style={{fontSize:13, color:'#92400E'}}>{order.memo}</div>
                    </div>
                  )}
                </div>
              )}
            </div>

            <div style={{borderTop:`1px solid ${C.border}`, paddingTop:20, marginTop:20}}>
              <div style={{fontSize:14, fontWeight:700, color:C.text, marginBottom:12}}>배송 단계</div>
              <div style={{display:'flex', alignItems:'center', gap:0}}>
                {statusList.map((s, i) => {
                  const idx = statusList.indexOf(order.status);
                  const done = i < idx;
                  const active = i === idx;
                  return (
                    <React.Fragment key={s}>
                      <div style={{display:'flex', flexDirection:'column', alignItems:'center'}}>
                        <div style={{
                          width:32, height:32, borderRadius:'50%', border:`2px solid ${active||done ? C.primary : C.border}`,
                          background:done ? C.primary : active ? C.primaryLight : C.surface,
                          display:'flex', alignItems:'center', justifyContent:'center', fontSize:12,
                          color:done ? '#fff' : active ? C.primary : C.muted, fontWeight:700,
                        }}>{done ? '✓' : i+1}</div>
                        <div style={{fontSize:10, color:active?C.primary:C.muted, marginTop:4, fontWeight:active?700:400}}>{s}</div>
                      </div>
                      {i<statusList.length-1 && <div style={{flex:1, height:2, background:done?C.primary:C.border, margin:'0 4px', marginBottom:14}} />}
                    </React.Fragment>
                  );
                })}
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  );
}

                    <button onClick={()=>openEdit(c)} style={{
                      padding:'5px 12px', borderRadius:6, fontSize:12, fontWeight:600,
                      border:`1.5px solid ${C.primary}`, color:C.primary, background:'transparent', transition:'all .15s',
                    }}
                      onMouseEnter={e=>{e.target.style.background=C.primaryLight}}
                      onMouseLeave={e=>{e.target.style.background='transparent'}}>수정</button>
                    <button onClick={()=>setDeleteConfirm(c.id)} style={{
                      padding:'5px 12px', borderRadius:6, fontSize:12, fontWeight:600,
                      border:`1.5px solid ${C.error}`, color:C.error, background:'transparent', transition:'all .15s',
                    }}
                      onMouseEnter={e=>{e.target.style.background=C.errorBg}}
                      onMouseLeave={e=>{e.target.style.background='transparent'}}>비활성화</button>
                  </div>
                </td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>

      {modal==='create' && (
        <Modal title="고객사 계정 생성" onClose={()=>setModal(null)}>
          <FormField label="고객사명" required>
            <Input value={editData.name} onChange={e=>setEditData({...editData,name:e.target.value})} placeholder="(주)한빛물산" />
          </FormField>
          <FormField label="이메일" required>
            <Input value={editData.email} onChange={e=>setEditData({...editData,email:e.target.value})} placeholder="ops@company.com" type="email" />
          </FormField>
          <FormField label="연락처">
            <Input value={editData.phone||''} onChange={e=>setEditData({...editData,phone:e.target.value})} placeholder="02-1234-5678" />
          </FormField>
          <FormField label="Packiyo 연동 ID" required>
            <Input value={editData.packiyoId||''} onChange={e=>setEditData({...editData,packiyoId:e.target.value})} placeholder="예: HB-0041" />
          </FormField>
          <FormField label="상태">
            <Select value={editData.status||'활성'} onChange={e=>setEditData({...editData,status:e.target.value})} options={['활성','경고','비활성']} />
          </FormField>
          <div style={{display:'flex', gap:8, justifyContent:'flex-end', marginTop:8}}>
            <button onClick={()=>setModal(null)} style={{padding:'9px 20px', borderRadius:8, fontSize:14, fontWeight:600, border:`1.5px solid ${C.border}`, color:C.textSub, background:C.surface}}>취소</button>
            <button onClick={handleCreate} style={{padding:'9px 20px', borderRadius:8, fontSize:14, fontWeight:600, background:C.primary, color:'#fff'}}>생성</button>
          </div>
        </Modal>
      )}

      {modal==='edit' && (
        <Modal title="고객사 정보 수정" onClose={()=>setModal(null)}>
          <FormField label="고객사명">
            <Input value={editData.name} onChange={e=>setEditData({...editData,name:e.target.value})} />
          </FormField>
          <FormField label="이메일">
            <Input value={editData.email} onChange={e=>setEditData({...editData,email:e.target.value})} type="email" />
          </FormField>
          <FormField label="연락처">
            <Input value={editData.phone||''} onChange={e=>setEditData({...editData,phone:e.target.value})} />
          </FormField>
          <FormField label="Packiyo 연동 ID">
            <Input value={editData.packiyoId} onChange={e=>setEditData({...editData,packiyoId:e.target.value})} />
          </FormField>
          <FormField label="상태">
            <Select value={editData.status} onChange={e=>setEditData({...editData,status:e.target.value})} options={['활성','경고','비활성']} />
          </FormField>
          <div style={{display:'flex', gap:8, justifyContent:'flex-end', marginTop:8}}>
            <button onClick={()=>setModal(null)} style={{padding:'9px 20px', borderRadius:8, fontSize:14, fontWeight:600, border:`1.5px solid ${C.border}`, color:C.textSub, background:C.surface}}>취소</button>
            <button onClick={handleEdit} style={{padding:'9px 20px', borderRadius:8, fontSize:14, fontWeight:600, background:C.success, color:'#fff'}}>저장</button>
          </div>
        </Modal>
      )}

      {deleteConfirm && (
        <Modal title="고객사 비활성화 확인" onClose={()=>setDeleteConfirm(null)} width={400}>
          <div style={{textAlign:'center', padding:'8px 0 20px'}}>
            <div style={{fontSize:40, marginBottom:12}}>⚠️</div>
            <div style={{fontSize:15, color:C.text, fontWeight:600, marginBottom:8}}>정말 비활성화하시겠습니까?</div>
            <div style={{fontSize:13, color:C.muted}}>해당 고객사의 Packiyo API 연동이 즉시 중단됩니다.</div>
          </div>
          <div style={{display:'flex', gap:8, justifyContent:'center'}}>
            <button onClick={()=>setDeleteConfirm(null)} style={{padding:'9px 24px', borderRadius:8, fontSize:14, fontWeight:600, border:`1.5px solid ${C.border}`, color:C.textSub, background:C.surface}}>취소</button>
            <button onClick={()=>handleDelete(deleteConfirm)} style={{padding:'9px 24px', borderRadius:8, fontSize:14, fontWeight:600, background:C.error, color:'#fff'}}>비활성화</button>
          </div>
        </Modal>
      )}
    </div>
  );
}

/* ── App ── */
function App() {
  const [page, setPage] = useState('dashboard');
  const [orders, setOrders] = useState(INIT_ORDERS);
  const [customers] = useState(INIT_CUSTOMERS);
  const [selectedOrder, setSelectedOrder] = useState(null);
  const [toast, setToast] = useState(null);

  const showToast = msg => setToast(msg);

  const navTo = id => setPage(id);

  const handleViewOrder = o => {
    setSelectedOrder(o);
    setPage('detail');
  };

  const handleUpdateOrder = updated => {
    setOrders(orders.map(o => o.id===updated.id ? updated : o));
    setSelectedOrder(updated);
  };

  const PAGE_TITLES = {
    dashboard: '주문 현황 대시보드',
    analytics: '통계 분석',
    orders: '주문 목록',
    detail: '주문 상세',
    customers: '고객사 관리',
  };

  return (
    <div style={{ display:'flex', width:'100%', height:'100vh', overflow:'hidden' }}>
      {/* Sidebar */}
      <aside style={{
        width:240, background:C.sidebar, display:'flex', flexDirection:'column',
        flexShrink:0, zIndex:10, boxShadow:'2px 0 12px rgba(0,0,0,.15)',
      }}>
        {/* Logo */}
        <div style={{padding:'24px 20px 20px', borderBottom:'1px solid rgba(255,255,255,.08)'}}>
          <div style={{display:'flex', alignItems:'center', gap:10}}>
            <div style={{width:34, height:34, borderRadius:9, background:C.primary, display:'flex', alignItems:'center', justifyContent:'center', fontSize:16, fontWeight:800, color:'#fff'}}>L</div>
            <div>
              <div style={{fontSize:15, fontWeight:800, color:'#fff', letterSpacing:'-0.3px'}}>LogiPort</div>
              <div style={{fontSize:11, color:C.sidebarText, marginTop:1}}>물류 고객 포털</div>
            </div>
          </div>
        </div>

        {/* Nav */}
        <nav style={{flex:1, padding:'12px 10px', overflowY:'auto'}}>
          <div style={{fontSize:11, fontWeight:700, color:'rgba(148,163,184,.5)', padding:'4px 12px', marginBottom:6, letterSpacing:'0.5px'}}>MENU</div>
          {NAV_ITEMS.map(item => {
            const active = page===item.id;
            return (
              <button key={item.id} onClick={()=>navTo(item.id)}
                style={{
                  width:'100%', display:'flex', alignItems:'center', gap:10,
                  padding:'10px 12px', borderRadius:9, marginBottom:3,
                  background:active ? C.primary : 'transparent',
                  color:active ? C.sidebarTextActive : C.sidebarText,
                  fontSize:14, fontWeight:active?700:500, textAlign:'left',
                  transition:'all .2s', border:'none', cursor:'pointer',
                }}
                onMouseEnter={e=>{ if(!active) e.currentTarget.style.background=C.sidebarHover; }}
                onMouseLeave={e=>{ if(!active) e.currentTarget.style.background='transparent'; }}>
                <span style={{fontSize:14, opacity:active?1:0.7}}>{item.icon}</span>
                <span>{item.label}</span>
                {item.id==='orders' && <span style={{marginLeft:'auto', background:'rgba(255,255,255,.15)', borderRadius:10, padding:'1px 8px', fontSize:11, fontWeight:700, color:'#fff'}}>{orders.filter(o=>o.status==='지연').length}</span>}
              </button>
            );
          })}
        </nav>

        {/* User */}
        <div style={{padding:'14px 16px', borderTop:'1px solid rgba(255,255,255,.08)', display:'flex', alignItems:'center', gap:10}}>
          <div style={{width:34, height:34, borderRadius:'50%', background:'linear-gradient(135deg,#3B82F6,#8B5CF6)', display:'flex', alignItems:'center', justifyContent:'center', fontSize:14, fontWeight:700, color:'#fff', flexShrink:0}}>관</div>
          <div style={{flex:1, minWidth:0}}>
            <div style={{fontSize:13, fontWeight:700, color:'#fff', overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap'}}>관리자</div>
            <div style={{fontSize:11, color:C.sidebarText}}>admin@logiport.kr</div>
          </div>
        </div>
      </aside>

      {/* Main */}
      <div style={{ flex:1, display:'flex', flexDirection:'column', minWidth:0 }}>
        {/* TopBar */}
        <header style={{
          height:60, background:C.surface, borderBottom:`1px solid ${C.border}`,
          display:'flex', alignItems:'center', padding:'0 24px', gap:12, flexShrink:0,
          boxShadow:'0 1px 4px rgba(0,0,0,.05)',
        }}>
          <div style={{flex:1}}>
            <div style={{fontSize:16, fontWeight:800, color:C.text}}>{PAGE_TITLES[page]}</div>
            <div style={{fontSize:12, color:C.muted}}>Packiyo OMS 연동 중 · 2026-04-29 기준</div>
          </div>
          <div style={{display:'flex', alignItems:'center', gap:8}}>
            <div style={{
              display:'flex', alignItems:'center', gap:6, padding:'6px 14px',
              background:C.successBg, borderRadius:8, fontSize:12, fontWeight:600, color:C.success,
            }}>
              <div style={{width:7, height:7, borderRadius:'50%', background:C.success, animation:'pulse 1.5s infinite'}} />
              Packiyo 연결됨
            </div>
            <div style={{width:36, height:36, borderRadius:'50%', background:'linear-gradient(135deg,#3B82F6,#8B5CF6)', display:'flex', alignItems:'center', justifyContent:'center', fontSize:14, fontWeight:700, color:'#fff', cursor:'pointer'}}>관</div>
          </div>
        </header>

        {/* Content */}
        <main style={{flex:1, overflow:'auto', padding:24, background:C.bg}}>
          {page==='dashboard' && <DashboardPage orders={orders} onViewOrder={handleViewOrder} />}
          {page==='analytics' && <AnalyticsPage />}
          {page==='orders' && <OrderListPage orders={orders} onViewOrder={handleViewOrder} />}
          {page==='detail' && <OrderDetailPage orders={orders} selectedOrder={selectedOrder} onSelectOrder={o=>{setSelectedOrder(o)}} onUpdateOrder={handleUpdateOrder} onToast={showToast} />}
          {page==='customers' && <CustomerPage customers={customers} onToast={showToast} />}
        </main>
      </div>

      {toast && <Toast msg={toast} onClose={()=>setToast(null)} />}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
