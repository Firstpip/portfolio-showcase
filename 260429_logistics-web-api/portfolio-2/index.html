/* CountUp animation for KPI numbers */
function CountUp({ end, suffix = '' }) {
  const [val, setVal] = useState(0);
  useEffect(() => {
    let cur = 0;
    const step = Math.max(1, Math.ceil(end / 25));
    const timer = setInterval(() => {
      cur = Math.min(cur + step, end);
      setVal(cur);
      if (cur >= end) clearInterval(timer);
    }, 40);
    return () => clearInterval(timer);
  }, [end]);
  return `${val}${suffix}`;
}

function Toast({ msg, onClose }) {
  useEffect(() => { const t = setTimeout(onClose, 3000); return ()=>clearTimeout(t); }, []);
  return (
    <div style={{
      position:'fixed', bottom:24, left:'50%', transform:'translateX(-50%)',
      background:'#0F172A', color:'#fff', padding:'12px 20px', borderRadius:10,
      fontSize:14, fontWeight:500, zIndex:9999, animation:'toastIn .3s ease',
      display:'flex', alignItems:'center', gap:8,
    }}>
      <span style={{color:'#4ADE80'}}>✓</span> {msg}
    </div>
  );
}

    onToast(`새 알림 규칙이 생성되었습니다.`);

      <div style={{display:'grid', gridTemplateColumns:'1fr 1fr', gap:14}}>
        {warehouses.map(w=>(
          <div key={w.id} onClick={()=>setDrawer(w)} style={{
            background:C.surface, borderRadius:12, padding:'20px 22px',
            border:`1.5px solid ${w.status!=='정상'?C.warning:C.borderGray}`,
            cursor:'pointer', transition:'all .2s', animation:'slideInUp .4s ease',
          }}
            onMouseEnter={e=>{ e.currentTarget.style.borderColor=C.primary; e.currentTarget.style.transform='scale(1.01)'; }}
            onMouseLeave={e=>{ e.currentTarget.style.borderColor=C.borderGray; e.currentTarget.style.transform='scale(1)'; }}>
            <div style={{display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:12}}>
              <div>
                <div style={{fontSize:15, fontWeight:700, color:C.text}}>{w.name}</div>
                <div style={{fontSize:12, color:C.muted, marginTop:2}}>{w.location}</div>
              </div>
              <StatusBadge status={w.status} />
            </div>
            <div style={{display:'grid', gridTemplateColumns:'1fr 1fr', gap:10, marginBottom:14}}>
              {[['재고 수량',`${w.items.toLocaleString()}개`],['담당자',w.manager],['온도 타입',w.temp]].map(([k,v])=>(
                <div key={k} style={{background:C.bg, borderRadius:8, padding:'10px 12px'}}>
                  <div style={{fontSize:11, fontWeight:600, color:C.muted, marginBottom:3}}>{k}</div>
                  <div style={{fontSize:13, fontWeight:700, color:C.text}}>{v}</div>
                </div>
              ))}
            </div>
            <div>
              <div style={{display:'flex', justifyContent:'space-between', marginBottom:6}}>
                <span style={{fontSize:12, color:C.muted}}>공간 사용률</span>
                <span style={{fontSize:12, fontWeight:700, color:w.used/w.capacity>0.9?C.error:w.used/w.capacity>0.75?C.warning:C.success}}>{Math.round(w.used/w.capacity*100)}%</span>
              </div>
              <div style={{height:6, background:'#E5E7EB', borderRadius:3, overflow:'hidden'}}>
                <div style={{
                  height:'100%', width:`${Math.round(w.used/w.capacity*100)}%`,
                  background:w.used/w.capacity>0.9?C.error:w.used/w.capacity>0.75?C.warning:C.primary,
                  borderRadius:3,
                }} />
              </div>
              <div style={{fontSize:11, color:C.muted, marginTop:4}}>{w.used.toLocaleString()} / {w.capacity.toLocaleString()} 팔레트</div>
            </div>
          </div>
        ))}
      </div>

      {modal && (
        <Modal title="창고 등록" onClose={()=>setModal(false)}>
          <FormField label="창고명"><Input value={formData.name} onChange={e=>setFormData({...formData,name:e.target.value})} placeholder="서울 강동 물류센터" /></FormField>
          <FormField label="주소"><Input value={formData.location} onChange={e=>setFormData({...formData,location:e.target.value})} placeholder="서울 강동구 천호대로 1234" /></FormField>
          <FormField label="최대 용량 (팔레트)"><Input value={formData.capacity} onChange={e=>setFormData({...formData,capacity:e.target.value})} placeholder="2000" type="number" /></FormField>
          <FormField label="담당자"><Input value={formData.manager} onChange={e=>setFormData({...formData,manager:e.target.value})} placeholder="김담당" /></FormField>
          <FormField label="온도 타입"><Select value={formData.temp} onChange={e=>setFormData({...formData,temp:e.target.value})} options={['상온','냉장','냉동','냉장/냉동','상온/냉장']} /></FormField>
          <div style={{display:'flex', gap:8, justifyContent:'flex-end', marginTop:8}}>
            <button onClick={()=>setModal(false)} style={{padding:'9px 20px', borderRadius:8, fontSize:14, fontWeight:600, border:`1.5px solid ${C.borderGray}`, color:C.textSub, background:C.surface}}>취소</button>
            <button onClick={()=>{setModal(false);onToast('새 창고가 등록되었습니다.');}} style={{padding:'9px 20px', borderRadius:8, fontSize:14, fontWeight:600, background:C.primary, color:'#fff'}}>등록</button>
          </div>
        </Modal>
      )}

      {drawer && (
        <Drawer title={drawer.name} onClose={()=>setDrawer(null)}>
          <div style={{display:'flex', flexDirection:'column', gap:14}}>
            {[['창고 ID',drawer.id],['주소',drawer.location],['담당자',drawer.manager],['온도 타입',drawer.temp],['재고 수량',`${drawer.items.toLocaleString()}개`],['최대 용량',`${drawer.capacity.toLocaleString()} 팔레트`],['현재 사용',`${drawer.used.toLocaleString()} 팔레트`]].map(([k,v])=>(
              <div key={k} style={{padding:'9px 0', borderBottom:`1px solid ${C.borderGray}`}}>
                <div style={{fontSize:12, fontWeight:600, color:C.muted, marginBottom:4}}>{k}</div>
                <div style={{fontSize:14, fontWeight:500, color:C.text}}>{v}</div>
              </div>
            ))}
            <button onClick={()=>{setDrawer(null);onToast('입출고 이력 CSV가 생성되었습니다.');}} style={{
              padding:'11px', borderRadius:9, fontSize:14, fontWeight:700,
              background:C.primaryLight, color:C.primary, border:`1.5px solid ${C.primary}`,
            }}>입출고 이력 내보내기</button>
          </div>
        </Drawer>
      )}
    </div>
  );
}

function ApiMonitorPage({ onToast }) {
  const [drawer, setDrawer] = useState(null);

  const overall = {
    success: 98.1,
    avgMs: 316,
    cacheHit: 72.4,
    totalCalls: 3549,
  };

  return (
    <div style={{animation:'fadeIn .3s ease'}}>
      <div style={{display:'flex', gap:14, marginBottom:24, flexWrap:'wrap'}}>
        {[
          { label:'전체 성공률', value:`${overall.success}%`, color:C.success, icon:'✅', status:'정상' },
          { label:'평균 응답시간', value:`${overall.avgMs}ms`, color:overall.avgMs>500?C.error:overall.avgMs>300?C.warning:C.success, icon:'⚡', status:overall.avgMs>500?'장애':overall.avgMs>300?'주의':'정상' },
          { label:'캐시 히트율', value:`${overall.cacheHit}%`, color:C.info, icon:'💾', status:'정상' },
          { label:'총 호출', value:overall.totalCalls.toLocaleString(), color:C.primary, icon:'📡', status:'정상' },
        ].map((k,i) => (
          <div key={k.label} style={{
            flex:1, background:C.surface, borderRadius:12, padding:'18px 20px',
            border:`1.5px solid ${C.borderGray}`, animation:`slideInUp .4s ease ${i*0.05}s both`,
          }}>
            <div style={{display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:10}}>
              <span style={{fontSize:12, fontWeight:600, color:C.muted}}>{k.label}</span>
              <span style={{fontSize:16}}>{k.icon}</span>
            </div>
            <div style={{fontSize:26, fontWeight:800, color:k.color}}>{k.value}</div>
          </div>
        ))}
      </div>

      <div style={{background:C.surface, borderRadius:12, padding:'22px 24px', border:`1px solid ${C.borderGray}`, marginBottom:16}}>
        <div style={{display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:16}}>
          <div style={{fontSize:15, fontWeight:700, color:C.text}}>시간별 성공률 및 응답시간</div>
          <div style={{
            display:'flex', alignItems:'center', gap:6, padding:'5px 12px',
            background:C.successBg, borderRadius:8, fontSize:12, fontWeight:600, color:C.success,
          }}>
            <div style={{width:7, height:7, borderRadius:'50%', background:C.success, animation:'pulse 1.5s infinite'}} />
            Packiyo API 연결됨
          </div>
        </div>
        <div style={{height:220}}>
          <ResponsiveContainer width="100%" height="100%">
            <LineChart data={API_METRICS} margin={{top:4, right:8, left:-20, bottom:0}}>
              <CartesianGrid strokeDasharray="3 3" stroke={C.borderGray} />
              <XAxis dataKey="time" tick={{fontSize:12, fill:C.muted}} />
              <YAxis yAxisId="left" tick={{fontSize:12, fill:C.muted}} domain={[90,100]} />
              <YAxis yAxisId="right" orientation="right" tick={{fontSize:12, fill:C.muted}} />
              <Tooltip contentStyle={{borderRadius:8, border:`1px solid ${C.borderGray}`, fontSize:13}} />
              <Legend wrapperStyle={{fontSize:12}} />
              <Line yAxisId="left" type="monotone" dataKey="성공" stroke={C.success} strokeWidth={2.5} dot={{r:3}} name="성공률(%)" />
              <Line yAxisId="right" type="monotone" dataKey="응답ms" stroke={C.warning} strokeWidth={2.5} dot={{r:3}} name="응답시간(ms)" />
            </LineChart>
          </ResponsiveContainer>
        </div>
      </div>

      <div style={{background:C.surface, borderRadius:12, border:`1px solid ${C.borderGray}`, overflow:'hidden'}}>
        <div style={{padding:'14px 20px', borderBottom:`1px solid ${C.borderGray}`, fontSize:14, fontWeight:700, color:C.text}}>엔드포인트 상세</div>
        <table style={{width:'100%', borderCollapse:'collapse', minWidth:600}}>
          <thead>
            <tr style={{background:'#F0FDF4'}}>
              {['엔드포인트','호출 수','성공률','평균 응답','캐시 히트율','상태'].map(h=>(
                <th key={h} style={{padding:'11px 16px', textAlign:'left', fontSize:12, fontWeight:700, color:C.muted, borderBottom:`1px solid ${C.borderGray}`, whiteSpace:'nowrap'}}>{h}</th>
              ))}
            </tr>
          </thead>
          <tbody>
            {API_ENDPOINTS.map(ep=>(
              <tr key={ep.path} onClick={()=>setDrawer(ep)} style={{cursor:'pointer', borderBottom:`1px solid ${C.borderGray}`, transition:'background .15s'}}
                onMouseEnter={e=>e.currentTarget.style.background='#F0FDF4'}
                onMouseLeave={e=>e.currentTarget.style.background='transparent'}>
                <td style={{padding:'12px 16px'}}>
                  <code style={{fontSize:12, background:C.bg, padding:'3px 8px', borderRadius:6, color:C.primary, fontFamily:'monospace'}}>{ep.path}</code>
                </td>
                <td style={{padding:'12px 16px', fontSize:13, color:C.text}}>{ep.calls.toLocaleString()}</td>
                <td style={{padding:'12px 16px'}}>
                  <span style={{fontSize:13, fontWeight:700, color:ep.successRate>98?C.success:ep.successRate>95?C.warning:C.error}}>{ep.successRate}%</span>
                </td>
                <td style={{padding:'12px 16px', fontSize:13, color:ep.avgMs>500?C.error:ep.avgMs>300?C.warning:C.text, fontWeight:ep.avgMs>300?700:400}}>{ep.avgMs}ms</td>
                <td style={{padding:'12px 16px', fontSize:13, color:C.info, fontWeight:600}}>{ep.cacheHit}%</td>
                <td style={{padding:'12px 16px'}}><StatusBadge status={ep.status} /></td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>

      {drawer && (
        <Drawer title={`엔드포인트 상세`} onClose={()=>setDrawer(null)}>
          <div style={{display:'flex', flexDirection:'column', gap:14}}>
            <div style={{background:C.bg, borderRadius:10, padding:'14px 16px'}}>
              <code style={{fontSize:14, color:C.primary, wordBreak:'break-all'}}>{drawer.path}</code>
            </div>
            {[['총 호출 수',`${drawer.calls.toLocaleString()}건`],['성공률',`${drawer.successRate}%`],['평균 응답시간',`${drawer.avgMs}ms`],['캐시 히트율',`${drawer.cacheHit}%`],['현재 상태',drawer.status]].map(([k,v])=>(
              <div key={k} style={{padding:'9px 0', borderBottom:`1px solid ${C.borderGray}`}}>
                <div style={{fontSize:12, fontWeight:600, color:C.muted, marginBottom:4}}>{k}</div>
                <div style={{fontSize:15, fontWeight:700, color:C.text}}>{v}</div>
              </div>
            ))}
            {drawer.avgMs>500 && (
              <div style={{background:C.errorBg, borderRadius:9, padding:'12px 16px', border:`1px solid #FECACA`}}>
                <div style={{fontSize:13, fontWeight:700, color:C.error, marginBottom:4}}>⚠️ 응답 지연 감지</div>
                <div style={{fontSize:12, color:'#7F1D1D'}}>응답시간이 임계값(500ms)을 초과했습니다. SWR 캐시 레이어 점검을 권장합니다.</div>
              </div>
            )}
            <button onClick={()=>{setDrawer(null);onToast('캐시가 초기화되었습니다.');}} style={{
              padding:'11px', borderRadius:9, fontSize:14, fontWeight:700,
              background:C.primaryLight, color:C.primary, border:`1.5px solid ${C.primary}`,
            }}>캐시 초기화</button>
          </div>
        </Drawer>
      )}
    </div>
  );
}

/* ── App ── */

  const showToast = msg => setToast(msg);
  const meta = PAGE_META[tab];

  return (
    <div style={{ display:'flex', flexDirection:'column', width:'100%', minHeight:'100vh', background:C.bg }}>
      {/* TopNav */}
      <header style={{
        position:'sticky', top:0, zIndex:100, background:C.nav,
        borderBottom:`1px solid ${C.navBorder}`, display:'flex',
        alignItems:'center', height:56, padding:'0 28px', gap:4,
        boxShadow:'0 1px 8px rgba(0,0,0,.06)',
      }}>
        <div style={{display:'flex', alignItems:'center', gap:8, marginRight:20}}>
          <div style={{width:32, height:32, borderRadius:8, background:C.primaryGrad, display:'flex', alignItems:'center', justifyContent:'center', fontSize:14, fontWeight:800, color:'#fff'}}>L</div>
          <div style={{fontSize:15, fontWeight:800, color:C.text, letterSpacing:'-0.3px'}}>LogiManage</div>
        </div>

        {TABS.map(t => (
          <button key={t.id} onClick={()=>setTab(t.id)} style={{
            padding:'7px 16px', borderRadius:8, fontSize:14, fontWeight:600,
            background:tab===t.id?C.primaryLight:'transparent',
            color:tab===t.id?C.primary:C.textSub,
            border:'none', transition:'all .2s',
          }}
            onMouseEnter={e=>{ if(tab!==t.id) e.currentTarget.style.background='#F1F5F9'; }}
            onMouseLeave={e=>{ if(tab!==t.id) e.currentTarget.style.background='transparent'; }}>
            {t.label}
          </button>
        ))}

        <div style={{flex:1}} />
        <div style={{
          display:'flex', alignItems:'center', gap:6, padding:'5px 12px',
          background:C.successBg, borderRadius:8, fontSize:12, fontWeight:600, color:C.success,
        }}>
          <div style={{width:7, height:7, borderRadius:'50%', background:C.success, animation:'pulse 1.5s infinite'}} />
          Packiyo 연결됨
        </div>
        <div style={{width:36, height:36, borderRadius:'50%', background:C.primaryGrad, display:'flex', alignItems:'center', justifyContent:'center', fontSize:14, fontWeight:700, color:'#fff', cursor:'pointer', marginLeft:8}}>관</div>
      </header>

      {/* Hero Banner */}
      <div style={{
        background:meta.gradient, padding:'28px 36px',
        animation:'fadeIn .4s ease',
      }}>
        <div style={{display:'flex', alignItems:'flex-start', justifyContent:'space-between', flexWrap:'wrap', gap:16}}>
          <div>
            <div style={{display:'flex', alignItems:'center', gap:10, marginBottom:6}}>
              <span style={{fontSize:28}}>{meta.icon}</span>
              <h1 style={{fontSize:24, fontWeight:800, color:'#fff', letterSpacing:'-0.5px'}}>{meta.title}</h1>
            </div>
            <p style={{fontSize:14, color:'rgba(255,255,255,.8)'}}>{meta.desc}</p>
          </div>
          <div style={{display:'flex', gap:24, flexWrap:'wrap'}}>
            {meta.kpis.map(k=>(
              <div key={k.label} style={{textAlign:'right'}}>
                <div style={{fontSize:22, fontWeight:800, color:'#fff'}}>{k.value}</div>
                <div style={{fontSize:12, color:'rgba(255,255,255,.7)', marginTop:2}}>{k.label}</div>
              </div>
            ))}
          </div>
        </div>
      </div>

      {/* Content */}
      <main style={{flex:1, overflow:'auto', padding:'24px 36px'}}>
        {tab==='delivery' && <DeliveryPage onToast={showToast} />}
        {tab==='performance' && <PerformancePage onToast={showToast} />}
        {tab==='notifications' && <NotificationsPage onToast={showToast} />}

      </main>

      {toast && <Toast msg={toast} onClose={()=>setToast(null)} />}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
