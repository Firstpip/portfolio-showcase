function CountUp({ end, suffix = '', duration = 1200 }) {
  const [val, setVal] = useState(0);
  useEffect(() => {
    let start = 0;
    const step = end / (duration / 16);
    const timer = setInterval(() => {
      start += step;
      if (start >= end) { setVal(end); clearInterval(timer); }
      else setVal(Math.floor(start));
    }, 16);
    return () => clearInterval(timer);
  }, [end]);
  return <span style={{ animation: 'countUp 400ms ease' }}>{val.toLocaleString()}{suffix}</span>;
}

function Toast({ message, type = 'success', onClose }) {
  useEffect(() => { const t = setTimeout(onClose, 3000); return () => clearTimeout(t); }, []);
  const colors = { success: C.accentGreen, error: '#EF4444', info: C.primary };
  return (
    <div style={{
      position: 'fixed', bottom: 24, right: 24, zIndex: 9999,
      background: C.surface2, color: C.textPrimary, padding: '14px 20px',
      borderRadius: 10, animation: 'slideUp 300ms ease',
      boxShadow: '0 8px 32px rgba(0,0,0,0.4)',

    }}>
      <span>{type === 'success' ? '✓' : type === 'error' ? '✕' : 'ℹ'}</span>
      {message}
    </div>
  );
}

                <div style={{ display: 'flex', gap: 4, marginTop: 10, flexWrap: 'wrap' }}>
                  {char.tags.map(t => <span key={t} style={{ background: `${char.color}18`, color: C.textSecondary, padding: '2px 8px', borderRadius: 99, fontSize: 11 }}>#{t}</span>)}

              <div style={{ padding: '14px 20px 20px' }}>

                <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
                  <span style={{ fontSize: 12, color: C.textMuted }}>⭐ {char.rating} · {char.chatCount.toLocaleString()}회 대화</span>

        </div>
      </div>
    </div>
  );
}

function ChatPage() {
  const [selectedChat, setSelectedChat] = useState(CHAT_HISTORY[0]);
  const [messages, setMessages] = useState([
    { id: 1, role: 'ai', text: '안녕하세요! 오늘도 만나서 반가워요. 어떤 이야기를 나눠볼까요? 💜', time: '14:20' },
    { id: 2, role: 'user', text: '오늘 회사에서 발표가 있었는데 너무 긴장했어', time: '14:22' },
    { id: 3, role: 'ai', text: '발표 때문에 많이 긴장하셨군요! 그래도 해냈잖아요 😊 발표는 어떻게 됐어요?', time: '14:22' },
  ]);
  const [input, setInput] = useState('');
  const [isTyping, setIsTyping] = useState(false);
  const [streamText, setStreamText] = useState('');
  const [showItemPanel, setShowItemPanel] = useState(false);
  const aiResponseIdx = useRef(0);
  const msgEndRef = useRef(null);

  useEffect(() => { msgEndRef.current?.scrollIntoView({ behavior: 'smooth' }); }, [messages, streamText]);

  const sendMessage = useCallback(() => {
    if (!input.trim()) return;
    const userMsg = { id: Date.now(), role: 'user', text: input, time: new Date().toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit' }) };
    setMessages(prev => [...prev, userMsg]);
    setInput('');
    setIsTyping(true);

    const response = AI_RESPONSES[aiResponseIdx.current % AI_RESPONSES.length];
    aiResponseIdx.current++;

    setTimeout(() => {
      setIsTyping(false);
      let idx = 0;
      const interval = setInterval(() => {
        idx++;
        setStreamText(response.slice(0, idx));
        if (idx >= response.length) {
          clearInterval(interval);
          const aiMsg = { id: Date.now() + 1, role: 'ai', text: response, time: new Date().toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit' }) };
          setMessages(prev => [...prev, aiMsg]);
          setStreamText('');
        }
      }, 30);
    }, 1200);
  }, [input]);

  return (
    <div style={{ animation: 'fadeIn 300ms ease' }}>
      <div style={{ background: `linear-gradient(135deg, ${C.secondary} 0%, ${C.primary} 100%)`, padding: '24px 32px' }}>
        <h1 style={{ fontSize: 24, fontWeight: 800, color: '#fff', marginBottom: 4, letterSpacing: '-0.02em' }}>실시간 AI 채팅</h1>
        <p style={{ color: 'rgba(255,255,255,0.75)', fontSize: 14 }}>SSE 기반 스트리밍 · 벡터 DB 컨텍스트 메모리 · 아이템 해금 시스템</p>
      </div>
      <div style={{ display: 'flex', height: 'calc(100vh - 180px)', padding: '0 32px 24px' }}>
        {/* 채팅 목록 */}
        <div style={{ width: 280, flexShrink: 0, background: C.surface, borderRadius: 16, marginRight: 20, marginTop: 20, border: `1px solid ${C.border}`, overflow: 'hidden' }}>
          <div style={{ padding: '16px 16px 8px', borderBottom: `1px solid ${C.border}` }}>
            <input placeholder="대화 검색..." style={{ width: '100%', padding: '8px 12px', background: C.surface2, border: `1px solid ${C.border}`, borderRadius: 8, color: C.textPrimary, fontSize: 13, outline: 'none' }} />
          </div>
          <div style={{ overflowY: 'auto' }}>
            {CHAT_HISTORY.map(chat => (
              <div key={chat.id} onClick={() => setSelectedChat(chat)} style={{
                padding: '14px 16px', cursor: 'pointer', display: 'flex', gap: 12, alignItems: 'center',
                background: selectedChat.id === chat.id ? C.surface2 : 'transparent',
                borderLeft: selectedChat.id === chat.id ? `3px solid ${C.primary}` : '3px solid transparent',
                transition: 'all 150ms',
              }}>
                <div style={{ width: 44, height: 44, borderRadius: '50%', background: `linear-gradient(135deg, ${C.primary}, ${C.secondary})`, display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 20, flexShrink: 0 }}>
                  {CHARACTERS.find(c => c.id === chat.charId)?.img}
                </div>
                <div style={{ flex: 1, minWidth: 0 }}>
                  <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 2 }}>
                    <span style={{ fontWeight: 700, fontSize: 14, color: C.textPrimary }}>{chat.charName}</span>
                    <span style={{ fontSize: 11, color: C.textMuted }}>{chat.time}</span>
                  </div>
                  <div style={{ fontSize: 12, color: C.textSecondary, overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>{chat.lastMsg}</div>
                </div>
                {chat.unread > 0 && <div style={{ width: 18, height: 18, borderRadius: '50%', background: C.secondary, color: '#fff', fontSize: 10, fontWeight: 700, display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0 }}>{chat.unread}</div>}

        </div>

        {/* 채팅 영역 */}

          <div style={{ padding: '14px 20px', borderBottom: `1px solid ${C.border}`, display: 'flex', alignItems: 'center', gap: 12 }}>
            <div style={{ width: 40, height: 40, borderRadius: '50%', background: `linear-gradient(135deg, ${C.secondary}, ${C.primary})`, display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 20 }}>
              {CHARACTERS.find(c => c.id === selectedChat.charId)?.img}
            </div>
            <div>
              <div style={{ fontWeight: 700, fontSize: 15, color: C.textPrimary }}>{selectedChat.charName}</div>
              <div style={{ fontSize: 12, color: C.accentGreen }}>● 온라인</div>
            </div>
            <div style={{ marginLeft: 'auto', display: 'flex', gap: 8 }}>
              <button onClick={() => setShowItemPanel(!showItemPanel)} style={{ padding: '7px 14px', background: `${C.accent}22`, border: `1px solid ${C.accent}44`, borderRadius: 8, color: C.accent, fontSize: 12, fontWeight: 600, cursor: 'pointer' }}>🎁 아이템</button>

                </button>

          {/* 메시지 목록 */}
          <div style={{ flex: 1, overflowY: 'auto', padding: '20px' }}>
            {messages.map((msg, i) => (
              <div key={msg.id} style={{ display: 'flex', justifyContent: msg.role === 'user' ? 'flex-end' : 'flex-start', marginBottom: 16, animation: `slideUp 250ms ease ${i * 30}ms both` }}>
                {msg.role === 'ai' && (
                  <div style={{ width: 36, height: 36, borderRadius: '50%', background: `linear-gradient(135deg, ${C.secondary}, ${C.primary})`, display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 18, marginRight: 10, flexShrink: 0 }}>
                    {CHARACTERS.find(c => c.id === selectedChat.charId)?.img}
                  </div>
                )}
                <div>
                  <div style={{
                    maxWidth: 320, padding: '12px 16px', borderRadius: msg.role === 'user' ? '18px 18px 4px 18px' : '18px 18px 18px 4px',

                </div>

                  {CHARACTERS.find(c => c.id === selectedChat.charId)?.img}

            <div ref={msgEndRef} />

function ExplorePage() {

  const toggleTag = (tag) => setSelectedTags(prev => prev.includes(tag) ? prev.filter(t => t !== tag) : [...prev, tag]);

  const filtered = CHARACTERS.filter(c => {
    const matchSearch = searchQuery === '' || c.name.includes(searchQuery) || c.desc.includes(searchQuery) || c.persona.includes(searchQuery);
    const matchTags = selectedTags.length === 0 || selectedTags.some(t => c.tags.includes(t));
    return matchSearch && matchTags;
  }).sort((a, b) => sortBy === 'popular' ? b.chatCount - a.chatCount : b.rating - a.rating);

  return (

            )}
          </div>
          <div style={{ width: 32, height: 32, borderRadius: '50%', background: `linear-gradient(135deg, ${C.primary}, ${C.secondary})`, display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 14, cursor: 'pointer' }}>👤</div>
          <div style={{ padding: '6px 14px', background: `${C.accent}22`, border: `1px solid ${C.accent}44`, borderRadius: 99, fontSize: 12, fontWeight: 700, color: C.accent }}>🪙 1,240</div>
        </div>
      </header>

      {/* 콘텐츠 */}
      <div key={contentKey} style={{ flex: 1, animation: 'fadeIn 280ms ease' }}>
        {tab === 'home' && <HomePage onSelectChar={setDrawer} />}
        {tab === '실시간 AI 채팅' && <ChatPage />}
        {tab === '구독 및 결제' && <PaymentPage onToast={showToast} />}
        {tab === '마이페이지' && <MyPage onToast={showToast} />}
        {tab === '캐릭터 탐색' && <ExplorePage />}
      </div>

      {drawer && <CharacterDrawer char={drawer} onClose={() => setDrawer(null)} />}
      {toast && <Toast message={toast.msg} type={toast.type} onClose={() => setToast(null)} />}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
