function CountUp({ end, suffix = '', duration = 1000 }) {
  const [val, setVal] = useState(0);
  useEffect(() => {
    let s = 0; const step = end / (duration / 16);
    const t = setInterval(() => { s += step; if (s >= end) { setVal(end); clearInterval(t); } else setVal(Math.floor(s)); }, 16);
    return () => clearInterval(t);
  }, [end]);
  return <span style={{ animation: 'countUp 400ms ease' }}>{val.toLocaleString()}{suffix}</span>;
}

function Toast({ message, type = 'success', onClose }) {
  useEffect(() => { const t = setTimeout(onClose, 3000); return () => clearTimeout(t); }, []);
  const colors = { success: C.accent, error: C.danger, info: C.primary, warning: C.accentOrange };
  return (
    <div style={{ position: 'fixed', bottom: 24, right: 24, zIndex: 9999, background: C.secondary, color: '#fff', padding: '14px 20px', borderRadius: 10, animation: 'slideUp 300ms ease', boxShadow: '0 8px 32px rgba(0,0,0,0.25)', borderLeft: `4px solid ${colors[type]}`, display: 'flex', alignItems: 'center', gap: 10, fontSize: 14 }}>
      <span>{type === 'success' ? '✓' : type === 'error' ? '✕' : type === 'warning' ? '⚠' : 'ℹ'}</span>
      {message}
    </div>
  );
}

function Modal({ title, onClose, children, width = 560 }) {

function KpiCard({ label, value, suffix = '', sub, icon, color = C.primary, delay = 0 }) {

}

// ── 상품 및 구독 관리 화면 ──
function ProductManagementPage({ onToast }) {
  const [products, setProducts] = useState(PRODUCTS_DATA);
  const [priceModal, setPriceModal] = useState(null);
  const [dryRunResult, setDryRunResult] = useState(null);
  const [activeTab, setActiveTab] = useState('subscription');

  const runDryRun = (product) => {
    setDryRunResult(null);
    setTimeout(() => setDryRunResult({ product, affectedCount: Math.floor(Math.random() * 500) + 100 }), 1200);
  };

  const applyChange = () => {
    setDryRunResult(null);
    setPriceModal(null);
    onToast('가격 변경이 적용되었습니다. 이력이 기록되었습니다.', 'success');
  };

  const filtered = products.filter(p => p.type === activeTab);

  return (
    <div style={{ animation: 'fadeIn 300ms ease', padding: '32px 40px' }}>
      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', marginBottom: 24 }}>
        <div>
          <h2 style={{ fontSize: 22, fontWeight: 800, color: C.textPrimary, letterSpacing: '-0.02em' }}>상품 및 구독 관리</h2>
          <p style={{ fontSize: 14, color: C.textMuted, marginTop: 2 }}>구독 플랜 · 코인 패키지 · 가격 변경 Dry-run · 이력 관리</p>

        <button onClick={() => onToast('새 상품 등록 모달을 준비 중입니다.', 'info')} style={{ padding: '10px 20px', background: C.primary, border: 'none', borderRadius: 8, color: '#fff', fontSize: 14, fontWeight: 700, cursor: 'pointer' }}>+ 상품 추가</button>

      <div style={{ display: 'flex', gap: 4, marginBottom: 20, background: C.surface, borderRadius: 8, padding: 4, width: 'fit-content', border: `1px solid ${C.border}` }}>

          <button key={t.id} onClick={() => setActiveTab(t.id)} style={{ padding: '8px 20px', border: 'none', borderRadius: 6, cursor: 'pointer', fontSize: 14, fontWeight: activeTab === t.id ? 700 : 400, background: activeTab === t.id ? C.primary : 'transparent', color: activeTab === t.id ? '#fff' : C.textSecondary, transition: 'all 150ms' }}>{t.label}</button>

            onMouseEnter={e => { e.currentTarget.style.boxShadow = '0 4px 16px rgba(0,0,0,0.1)'; e.currentTarget.style.transform = 'translateY(-2px)'; }}
            onMouseLeave={e => { e.currentTarget.style.boxShadow = '0 1px 3px rgba(0,0,0,0.06)'; e.currentTarget.style.transform = 'translateY(0)'; }}>
            <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', marginBottom: 16 }}>
              <div>
                <div style={{ fontSize: 16, fontWeight: 800, color: C.textPrimary }}>{product.name}</div>
                <div style={{ fontSize: 13, color: C.textMuted, marginTop: 2 }}>{product.type === 'subscription' ? `${(product.active || 0).toLocaleString()}명 이용 중` : `${(product.sold || 0).toLocaleString()}회 판매`}</div>
              </div>
              <Badge color={C.accent}>활성</Badge>
            </div>
            <div style={{ fontSize: 26, fontWeight: 800, color: C.textPrimary, marginBottom: 16 }}>{product.price === 0 ? '무료' : `${product.price.toLocaleString()}원`}{product.type === 'subscription' && product.price > 0 ? '/월' : ''}</div>

              <button onClick={() => onToast('가격 변경 이력을 불러왔습니다.', 'info')} style={{ padding: '9px 14px', background: C.surface2, border: `1px solid ${C.border}`, borderRadius: 7, color: C.textSecondary, fontSize: 13, cursor: 'pointer' }}>이력</button>
            </div>
          </div>
        ))}
      </div>

      {priceModal && (
        <Modal title={`${priceModal.name} — 가격 변경`} onClose={() => { setPriceModal(null); setDryRunResult(null); }}>
          <div style={{ marginBottom: 16 }}>
            <div style={{ display: 'flex', justifyContent: 'space-between', padding: '10px 14px', background: C.surface2, borderRadius: 8, marginBottom: 14 }}>

              <span style={{ fontSize: 14, fontWeight: 700, color: C.textPrimary }}>{priceModal.price.toLocaleString()}원</span>

            <label style={{ display: 'block', fontSize: 13, color: C.textSecondary, marginBottom: 6, marginTop: 14 }}>변경 사유</label>
            <textarea rows={2} placeholder="가격 변경 사유를 입력하세요..." style={{ width: '100%', padding: '10px 14px', background: C.surface2, border: `1px solid ${C.border}`, borderRadius: 8, color: C.textPrimary, fontSize: 14, outline: 'none', resize: 'none' }} />
          </div>
          {!dryRunResult ? (
            <button onClick={() => runDryRun(priceModal)} style={{ width: '100%', padding: '11px', background: C.surface2, border: `1px solid ${C.border}`, borderRadius: 8, color: C.textSecondary, fontSize: 14, cursor: 'pointer', marginBottom: 10 }}>
              🔍 영향 범위 미리보기 (Dry-run)
            </button>
          ) : (
            <div style={{ background: `${C.accentOrange}10`, border: `1px solid ${C.accentOrange}33`, borderRadius: 8, padding: 14, marginBottom: 14, animation: 'fadeInScale 200ms ease' }}>
              <div style={{ fontSize: 13, fontWeight: 700, color: C.accentOrange, marginBottom: 6 }}>⚠ 영향 범위 분석 결과</div>
              <div style={{ fontSize: 14, color: C.textSecondary }}>이 변경사항은 현재 <strong style={{ color: C.textPrimary }}>{dryRunResult.affectedCount.toLocaleString()}명</strong>의 활성 구독자에게 영향을 미칩니다. 다음 결제일부터 새 가격이 적용됩니다.</div>
            </div>
          )}
          <button onClick={dryRunResult ? applyChange : undefined} disabled={!dryRunResult} style={{ width: '100%', padding: '12px', background: dryRunResult ? C.primary : C.surface2, border: 'none', borderRadius: 8, color: dryRunResult ? '#fff' : C.textMuted, fontSize: 14, fontWeight: 700, cursor: dryRunResult ? 'pointer' : 'default' }}>
            {dryRunResult ? '확인 후 변경 적용' : '먼저 영향 범위를 확인하세요'}
          </button>
        </Modal>
      )}
    </div>
  );
}

// ── 회원 모니터링 화면 ──
function MemberMonitoringPage({ onToast }) {
  const [members, setMembers] = useState(MEMBERS_DATA);
  const [selectedMember, setSelectedMember] = useState(null);
  const [search, setSearch] = useState('');
  const [statusFilter, setStatusFilter] = useState('all');
  const [suspendModal, setSuspendModal] = useState(null);

  const statusConfig = {
    normal: { label: '정상', color: C.accent },
    warning: { label: '경고', color: C.accentOrange },
    suspended: { label: '정지', color: C.danger },
  };

  const planColors = { premium: C.accentOrange, basic: C.primary, free: C.textMuted };

  const filtered = members.filter(m => {
    const matchSearch = search === '' || m.name.includes(search) || m.email.includes(search);
    const matchStatus = statusFilter === 'all' || m.status === statusFilter;
    return matchSearch && matchStatus;
  });

  const handleSuspend = (member) => {
    setMembers(prev => prev.map(m => m.id === member.id ? { ...m, status: 'suspended' } : m));
    setSuspendModal(null);
    setSelectedMember(null);
    onToast(`${member.name} 회원이 정지되었습니다. 감사 로그에 기록되었습니다.`, 'warning');
  };

  return (
    <div style={{ animation: 'fadeIn 300ms ease', padding: '32px 40px' }}>
      <div style={{ marginBottom: 24 }}>
        <h2 style={{ fontSize: 22, fontWeight: 800, color: C.textPrimary, letterSpacing: '-0.02em' }}>회원 모니터링</h2>
        <p style={{ fontSize: 14, color: C.textMuted, marginTop: 2 }}>Full-Text Search · LLM 토큰 사용량 · 이상 행동 감지 · RBAC 기반 관리자 액션</p>
      </div>

      <div style={{ display: 'grid', gridTemplateColumns: 'repeat(4, 1fr)', gap: 16, marginBottom: 24 }}>
        {[
          { label: '전체 회원', val: 21240, icon: '👥', color: C.primary },
          { label: '정상', val: 20980, icon: '✅', color: C.accent },
          { label: '경고', val: 198, icon: '⚠️', color: C.accentOrange },
          { label: '정지', val: 62, icon: '🚫', color: C.danger },
        ].map((s, i) => <KpiCard key={i} {...s} delay={i * 60} />)}
      </div>

      <div style={{ display: 'flex', gap: 12, marginBottom: 16 }}>
        <div style={{ position: 'relative', flex: 1 }}>
          <span style={{ position: 'absolute', left: 12, top: '50%', transform: 'translateY(-50%)', color: C.textMuted, fontSize: 16 }}>🔍</span>
          <input value={search} onChange={e => setSearch(e.target.value)} placeholder="이름, 이메일로 검색..." style={{ width: '100%', padding: '10px 12px 10px 36px', background: C.surface, border: `1px solid ${C.border}`, borderRadius: 8, color: C.textPrimary, fontSize: 14, outline: 'none' }} />
        </div>

          <option value="all">전체 상태</option>
          <option value="normal">정상</option>
          <option value="warning">경고</option>
          <option value="suspended">정지</option>
        </select>
      </div>

      <div style={{ background: C.surface, border: `1px solid ${C.border}`, borderRadius: 10, overflow: 'hidden', boxShadow: '0 1px 3px rgba(0,0,0,0.06)' }}>
        <table style={{ width: '100%', borderCollapse: 'collapse' }}>
          <thead>
            <tr style={{ background: C.surface2, borderBottom: `1px solid ${C.border}` }}>
              {['회원', '플랜', '가입일', '보유 코인', '채팅 횟수', '인젝션 시도', '상태', '관리'].map(h => (

      {suspendModal && (
        <Modal title="회원 이용 정지" onClose={() => setSuspendModal(null)} width={460}>

            <div style={{ display: 'flex', gap: 10 }}>

      )}

}
