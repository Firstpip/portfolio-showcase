/* ─── tiny components ─── */
function CountUp({end,suffix=''}){
  const [v,setV]=useState(0);
  useEffect(()=>{
    const isInt=Number.isInteger(end);
    let s=0; const step=end/(1200/16);
    const t=setInterval(()=>{s+=step;if(s>=end){setV(end);clearInterval(t);}else setV(isInt?Math.floor(s):Math.round(s*10)/10);},16);
    return()=>clearInterval(t);
  },[end]);
  return <span style={{animation:'countUp 400ms ease'}}>{typeof v==='number'&&!Number.isInteger(end)?v.toFixed(1):v.toLocaleString()}{suffix}</span>;
}

function Toast({msg,onClose}){
  useEffect(()=>{const t=setTimeout(onClose,3000);return()=>clearTimeout(t);},[]);
  return(
    <div style={{position:'fixed',bottom:24,right:24,zIndex:9999,background:'#1A2233',color:'#fff',padding:'12px 20px',borderRadius:8,animation:'slideUp 300ms ease',boxShadow:'0 4px 16px rgba(0,0,0,0.2)',display:'flex',alignItems:'center',gap:10,borderLeft:`4px solid ${C.accent}`}}>
      <span>✓</span><span style={{fontSize:14}}>{msg}</span>
    </div>
  );
}

/* ─── chat message ─── */

      <div style={{maxWidth:'76%'}}>
        {m.fmt==='text'&&<div style={{background:bot?C.surface:C.primary,color:bot?C.text:'#fff',padding:'10px 14px',borderRadius:bot?'4px 12px 12px 12px':'12px 4px 12px 12px',fontSize:13,lineHeight:1.6,boxShadow:'0 1px 3px rgba(0,0,0,0.07)'}}>{m.text}</div>}
        {m.fmt==='pdf'&&<div style={{background:'#FEF9EC',border:`1px solid ${C.warn}30`,borderRadius:10,padding:12,fontSize:13}}><div style={{fontWeight:600,color:C.text,marginBottom:4}}>📄 {m.pdf}</div><div style={{color:C.textLight,marginBottom:8,fontSize:12}}>페이지 {m.page}에서 관련 내용을 확인할 수 있습니다.</div><button style={{background:C.warn,color:'#fff',border:'none',borderRadius:6,padding:'5px 12px',cursor:'pointer',fontSize:12}}>PDF 열기</button></div>}
        {m.fmt==='video'&&<div style={{background:'#EEF2FF',border:`1px solid ${C.purple}30`,borderRadius:10,padding:12,fontSize:13}}><div style={{fontWeight:600,color:C.text,marginBottom:4}}>🎬 {m.vTitle}</div><div style={{color:C.textLight,marginBottom:8,fontSize:12}}>재생 시간: {m.dur}</div><button style={{background:C.purple,color:'#fff',border:'none',borderRadius:6,padding:'5px 12px',cursor:'pointer',fontSize:12}}>동영상 보기</button></div>}

/* ─── pages ─── */
function ChatPage(){
  const [msgs,setMsgs]=useState(INIT_MSGS);
  const [input,setInput]=useState('');

  const [cat,setCat]=useState(null);
  const botIdx=useRef(0);
  const endRef=useRef(null);

  const send=()=>{
    if(!input.trim())return;
    const now=new Date().toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit'});
    setMsgs(p=>[...p,{id:Date.now(),who:'user',fmt:'text',ts:now,text:input}]);
    setInput('');setTyping(true);
    setTimeout(()=>{
      const r=BOT_Q[botIdx.current%BOT_Q.length];botIdx.current++;
      setMsgs(p=>[...p,{id:Date.now()+1,who:'bot',ts:now,...r}]);
      setTyping(false);
    },1100);
  };
  return(
    <div style={{display:'flex',gap:20,padding:'24px 32px'}}>
      {/* sidebar categories */}
      <div style={{width:210,flexShrink:0}}>
        <div style={{fontSize:11,fontWeight:700,color:C.textLight,marginBottom:10,textTransform:'uppercase',letterSpacing:'0.06em'}}>질문 카테고리</div>
        {CATS.map((c,i)=>(
          <div key={c.id} onClick={()=>{setCat(c.id);setInput(c.label+' 문제 해결 방법');}} style={{display:'flex',alignItems:'center',gap:10,padding:'10px 12px',borderRadius:10,marginBottom:6,cursor:'pointer',background:cat===c.id?`${C.primary}12`:C.surface,border:`1px solid ${cat===c.id?C.primary:C.border}`,transition:'all 200ms',animation:`slideUp 400ms ease ${i*70}ms both`}}>

            <div style={{flex:1}}><div style={{fontSize:13,fontWeight:cat===c.id?600:400,color:C.text}}>{c.label}</div><div style={{fontSize:11,color:C.textLight}}>{c.count}개 사례</div></div>
            {cat===c.id&&<span style={{width:6,height:6,borderRadius:'50%',background:C.primary,display:'block'}}/>}
          </div>
        ))}
        <div style={{marginTop:16,padding:14,background:`${C.accent}10`,borderRadius:10,border:`1px solid ${C.accent}30`}}>
          <div style={{fontSize:12,fontWeight:600,color:C.accent,marginBottom:4}}>📊 오늘 현황</div>
          <div style={{fontSize:12,color:C.text}}>총 질의 <strong>127건</strong></div>
          <div style={{fontSize:12,color:C.text}}>답변 완료 <strong style={{color:C.accent}}>120건</strong></div>
        </div>
      </div>
      {/* chat window */}
      <div style={{flex:1,background:C.surface,borderRadius:14,border:`1px solid ${C.border}`,boxShadow:'0 4px 16px rgba(0,0,0,0.06)',display:'flex',flexDirection:'column',height:530}}>
        <div style={{padding:'14px 18px',borderBottom:`1px solid ${C.border}`,display:'flex',alignItems:'center',gap:10}}>
          <div style={{width:34,height:34,borderRadius:'50%',background:`${C.primary}15`,display:'flex',alignItems:'center',justifyContent:'center',fontSize:16}}>🤖</div>
          <div>
            <div style={{fontWeight:600,fontSize:14,color:C.text}}>SmartBoard 기술지원 봇</div>
            <div style={{fontSize:12,color:C.accent,display:'flex',alignItems:'center',gap:4}}>
              <span style={{width:7,height:7,borderRadius:'50%',background:C.accent,animation:'pulse 2s infinite',display:'block'}}/>온라인
            </div>
          </div>
          <div style={{marginLeft:'auto'}}><span style={{padding:'4px 10px',background:'#F0FDF4',color:C.green,borderRadius:999,fontSize:12,fontWeight:600}}>답변률 94.5%</span></div>
