// ─── CountUp ───
function CountUp({end,suffix='',prefix='',duration=1200}){
  const [val,setVal]=useState(0);
  useEffect(()=>{
    let s=0;const step=end/(duration/16);
    const t=setInterval(()=>{s+=step;if(s>=end){setVal(end);clearInterval(t);}else setVal(Math.floor(s));},16);
    return()=>clearInterval(t);
  },[end]);
  return <span style={{animation:'countUp 400ms ease'}}>{prefix}{val.toLocaleString()}{suffix}</span>;
}

}

                        border:`3px solid ${FDS_SCORE_COLOR(a.score)}`,
                        display:'flex',alignItems:'center',justifyContent:'center',
                        fontSize:11,fontWeight:800,color:FDS_SCORE_COLOR(a.score)}}>
                        {a.score}
                      </div>
                    </div>
                  </td>
                  <td style={{padding:'10px',fontSize:12,color:a.action==='자동차단'?C.danger:C.warning}}>{a.action}</td>
                  <td style={{padding:'10px',fontSize:11,color:C.textSub}}>{a.time}</td>
                  <td style={{padding:'10px'}}>
                    <span style={{padding:'2px 8px',borderRadius:4,fontSize:11,fontWeight:600,
                      background:a.status==='차단됨'?'rgba(248,113,113,0.15)':a.status==='검토중'?'rgba(251,191,36,0.15)':'rgba(52,211,153,0.15)',
                      color:a.status==='차단됨'?C.danger:a.status==='검토중'?C.warning:C.success}}>
                      {a.status}
                    </span>
                  </td>
                </tr>
              ))}
            </tbody>
          </table>
        )}

        {tab==='rules'&&(
          <table style={{width:'100%',borderCollapse:'collapse'}}>
            <thead>
              <tr style={{borderBottom:`1px solid ${C.border}`}}>
                {['탐지 규칙','임계값','조치','상태',''].map(h=>(
                  <th key={h} style={{padding:'8px 12px',textAlign:'left',fontSize:10,color:C.textSub,fontWeight:600}}>{h}</th>
                ))}
              </tr>
            </thead>
            <tbody>
              {rules.map((r,i)=>(
                <tr key={r.rule} style={{borderBottom:`1px solid ${C.border}`,animation:`slideUp 200ms ease ${i*40}ms both`}}>
                  <td style={{padding:'12px',fontSize:13,fontWeight:500}}>{r.rule}</td>
                  <td style={{padding:'12px',fontSize:12,color:C.textSub}}>{r.threshold}</td>
                  <td style={{padding:'12px'}}>
                    <span style={{padding:'2px 8px',borderRadius:4,fontSize:11,fontWeight:600,
                      background:r.action==='자동차단'?'rgba(248,113,113,0.15)':'rgba(251,191,36,0.15)',
                      color:r.action==='자동차단'?C.danger:C.warning}}>
                      {r.action}
                    </span>
                  </td>
                  <td style={{padding:'12px'}}>
                    <span style={{padding:'2px 8px',borderRadius:4,fontSize:11,fontWeight:600,
                      background:r.active?'rgba(52,211,153,0.15)':'rgba(255,255,255,0.05)',
                      color:r.active?C.success:C.textSub}}>
                      {r.active?'활성':'비활성'}
                    </span>
                  </td>
                  <td style={{padding:'12px'}}>
                    <button onClick={()=>toggleRule(i)}
                      style={{padding:'5px 10px',borderRadius:6,border:`1px solid ${C.border}`,
                        background:'transparent',color:r.active?C.danger:C.success,
                        cursor:'pointer',fontSize:11,fontFamily:'inherit'}}>
                      {r.active?'비활성화':'활성화'}
                    </button>
                  </td>
                </tr>
              ))}
            </tbody>
          </table>
        )}
      </div>

      {drawerFds&&(
        <Drawer title={`FDS 상세 — ${drawerFds.id}`} onClose={()=>setDrawerFds(null)}>
          <div style={{display:'flex',flexDirection:'column',gap:14}}>
            <div style={{padding:16,borderRadius:10,border:`1px solid ${C.border}`,
              background:`rgba(${drawerFds.score>=90?'248,113,113':drawerFds.score>=70?'251,191,36':'52,211,153'},0.1)`}}>
              <div style={{fontSize:11,color:C.textSub,marginBottom:4}}>위험도 점수</div>
              <div style={{fontSize:40,fontWeight:900,color:drawerFds.score>=90?C.danger:drawerFds.score>=70?C.warning:C.success}}>
                {drawerFds.score}<span style={{fontSize:18,opacity:0.6}}>/100</span>
              </div>
            </div>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
              {[['탐지 유형',drawerFds.type],['접속 IP',drawerFds.ip],
                ['시도 횟수',`${drawerFds.count}회`],['탐지 시각',`2026.05.04 ${drawerFds.time}`]].map(([l,v])=>(
                <div key={l} style={{background:C.surfaceHigh,borderRadius:6,padding:10}}>
                  <div style={{fontSize:10,color:C.textSub,marginBottom:3}}>{l}</div>
                  <div style={{fontSize:13,fontWeight:600}}>{v}</div>
                </div>
              ))}
            </div>
            <div>
              <div style={{fontSize:12,color:C.textSub,marginBottom:6}}>처리 이력</div>
              {[`탐지 감지: 2026.05.04 ${drawerFds.time}`,
                drawerFds.status==='차단됨'?`자동 차단 실행: 2026.05.04 ${drawerFds.time} +5초`:'검토 큐 등록됨',
              ].map((s,i)=>(
                <div key={i} style={{display:'flex',gap:8,alignItems:'flex-start',marginBottom:8}}>
                  <div style={{width:6,height:6,borderRadius:'50%',background:C.primary,marginTop:4,flexShrink:0}}/>
                  <div style={{fontSize:12,color:C.textSub}}>{s}</div>
                </div>
              ))}
            </div>
            <div>
              <label style={{fontSize:12,color:C.textSub,display:'block',marginBottom:6}}>처리 메모</label>
              <textarea placeholder="조치 내용을 기록하세요..." rows={2}
                style={{width:'100%',padding:10,borderRadius:8,border:`1px solid ${C.border}`,
                  fontSize:13,fontFamily:'inherit',background:C.bg,color:C.text,resize:'vertical',outline:'none'}}/>
            </div>
            {drawerFds.status!=='차단됨'&&(
              <div style={{display:'flex',gap:8}}>
                <button onClick={()=>handleAction(drawerFds.id,'block')}
                  style={{flex:1,padding:'11px',borderRadius:8,border:'none',background:C.danger,
                    color:'#fff',cursor:'pointer',fontSize:13,fontWeight:600,fontFamily:'inherit'}}>
                  🛡️ 즉시 차단
                </button>
                <button onClick={()=>handleAction(drawerFds.id,'pass')}
                  style={{flex:1,padding:'11px',borderRadius:8,border:`1px solid ${C.border}`,
                    background:'transparent',color:C.success,cursor:'pointer',fontSize:13,fontFamily:'inherit'}}>
                  ✅ 정상 처리
                </button>
              </div>
            )}
          </div>
        </Drawer>
      )}
    </div>
  );
}

// ─── App ───
function App(){
  const [tab,setTab]=useState('main');
  const [drawer,setDrawer]=useState(null);
  const [toast,setToast]=useState(null);
  const [loading,setLoading]=useState(true);

  useEffect(()=>{setTimeout(()=>setLoading(false),1200);},[]);

  if(loading){
    return(
      <div style={{display:'flex',width:'100%',height:'100vh',alignItems:'center',justifyContent:'center',background:C.bg}}>
        <div style={{textAlign:'center'}}>
          <div style={{width:40,height:40,border:'3px solid rgba(56,189,248,0.2)',borderTopColor:C.primary,
            borderRadius:'50%',animation:'spin 800ms linear infinite',margin:'0 auto 12px'}}/>
          <div style={{fontSize:13,color:C.textSub}}>핀캐시 프로 로딩 중...</div>
        </div>
      </div>
    );
  }

  const handleTabChange=(id)=>{setTab(id);setDrawer(null);};

  // Global drawer renderer
  const renderDrawer=()=>{
    if(!drawer)return null;
    if(drawer.type==='rate'){
      const v=drawer.data;
      return(
        <Drawer title={`${v.name} 시세 상세`} onClose={()=>setDrawer(null)}>
          <div style={{display:'flex',flexDirection:'column',gap:16}}>
            <div style={{textAlign:'center',padding:'20px 0'}}>
              <div style={{fontSize:48,fontWeight:900,color:v.color,marginBottom:4}}>{v.rate.toFixed(1)}%</div>
              <div style={{fontSize:13,color:C.textSub}}>현재 매입률</div>
              <div style={{marginTop:8,display:'inline-block',padding:'4px 12px',borderRadius:20,fontSize:12,
                background:v.change>0?'rgba(52,211,153,0.15)':'rgba(248,113,113,0.15)',
                color:v.change>0?C.success:C.danger}}>
                {v.change>0?'▲':'▼'} {Math.abs(v.change)}% 전일 대비
              </div>
            </div>
            {[['오늘 거래액',`${v.vol.toLocaleString()}만원`],['수수료율',`${100-v.rate}%`],
              ['최고 매입가','50,000원'],['최저 매입가','1,000원']].map(([l,val])=>(
              <div key={l} style={{display:'flex',justifyContent:'space-between',padding:'10px 0',borderBottom:`1px solid ${C.border}`}}>
                <span style={{fontSize:13,color:C.textSub}}>{l}</span>
                <span style={{fontSize:14,fontWeight:700}}>{val}</span>
              </div>
            ))}
            <button onClick={()=>{setDrawer(null);setToast(`${v.name} 알림을 설정했습니다.`);}}
              style={{padding:'11px',borderRadius:8,border:'none',background:v.color,color:'#000',
                cursor:'pointer',fontSize:13,fontWeight:700,fontFamily:'inherit'}}>
              📢 매입률 변동 알림 설정
            </button>
          </div>
        </Drawer>
      );
    }
    if(drawer.type==='settlement'){
      const s=drawer.data;
      return(
        <Drawer title={`정산 상세 — ${s.id}`} onClose={()=>setDrawer(null)}>
          <div style={{display:'flex',flexDirection:'column',gap:12}}>
            {[['정산 기간',s.period],['처리 건수',`${s.count}건`],['총 매입액',s.gross],
              ['수수료 (10%)',s.fee],['순 지급액',s.net],['처리 워커',s.worker]].map(([l,v])=>(
              <div key={l} style={{display:'flex',justifyContent:'space-between',padding:'10px 0',borderBottom:`1px solid ${C.border}`}}>
                <span style={{fontSize:13,color:C.textSub}}>{l}</span>
                <span style={{fontSize:14,fontWeight:700,color:l==='순 지급액'?C.success:C.text}}>{v}</span>
              </div>
            ))}
            <div style={{background:C.surfaceHigh,borderRadius:8,padding:14}}>
              <div style={{fontSize:12,color:C.textSub,marginBottom:8}}>Bull Queue 처리 로그</div>
              {['job:4522 → 완료 (0.8s)','job:4523 → 완료 (1.1s)','job:4524 → 완료 (0.9s)','…외 59건 완료'].map((l,i)=>(
                <div key={i} style={{fontSize:12,fontFamily:'monospace',color:C.textSub,marginBottom:4}}>
                  <span style={{color:C.success}}>✓</span> {l}
                </div>
              ))}
            </div>
            <button onClick={()=>{setDrawer(null);setToast('정산 보고서를 다운로드합니다...');}}
              style={{padding:'11px',borderRadius:8,border:'none',background:C.primary,color:'#000',
                cursor:'pointer',fontSize:13,fontWeight:700,fontFamily:'inherit'}}>
              📊 상세 보고서 다운로드
            </button>
          </div>
        </Drawer>
      );
    }
    if(drawer.type==='notif'||drawer.type==='notifHist'){
      const n=drawer.data;
      return(
        <Drawer title={`알림 상세`} onClose={()=>setDrawer(null)}>
          <div style={{display:'flex',flexDirection:'column',gap:12}}>
            {Object.entries(n).map(([k,v])=>(
              <div key={k} style={{display:'flex',justifyContent:'space-between',padding:'8px 0',borderBottom:`1px solid ${C.border}`}}>
                <span style={{fontSize:12,color:C.textSub}}>{k}</span>
                <span style={{fontSize:13,fontWeight:600}}>{String(v)}</span>
              </div>
            ))}
            <button onClick={()=>{setDrawer(null);setToast('재발송 요청이 완료되었습니다.');}}
              style={{padding:'11px',borderRadius:8,border:'none',background:C.primary,color:'#000',
                cursor:'pointer',fontSize:13,fontWeight:700,fontFamily:'inherit'}}>
              🔁 재발송
            </button>
          </div>
        </Drawer>
      );
    }
    return null;
  };

  return(
    <div style={{display:'flex',flexDirection:'column',width:'100%',minHeight:'100vh'}}>
      <TopNav tab={tab} onTab={handleTabChange}/>
      <HeroBanner tab={tab}/>
      <main style={{flex:1,background:C.bg}}>
        {tab==='main'&&<MainPage setDrawer={setDrawer} setToast={setToast}/>}
        {tab==='settlement'&&<SettlementPage setDrawer={setDrawer} setToast={setToast}/>}
        {tab==='notification'&&<NotificationPage setDrawer={setDrawer} setToast={setToast}/>}
        {tab==='fds'&&<FdsPage setDrawer={setDrawer} setToast={setToast}/>}
      </main>
      {renderDrawer()}
      {toast&&<Toast msg={toast} onClose={()=>setToast(null)}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
