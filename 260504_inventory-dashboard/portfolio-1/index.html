function CountUp({ end, duration = 1200 }) {
  const [val, setVal] = useState(0);
  useEffect(() => {
    let v = 0; const step = end / (duration / 16);
    const t = setInterval(() => { v += step; if (v >= end) { setVal(end); clearInterval(t); } else setVal(Math.floor(v)); }, 16);
    return () => clearInterval(t);
  }, [end]);
  return <span>{val.toLocaleString()}</span>;
}

function Toast({ msg, type = 'success', onClose }) {
  useEffect(() => { const t = setTimeout(onClose, 3000); return () => clearTimeout(t); }, []);
  const bg = type === 'success' ? C.success : type === 'error' ? C.danger : C.accent;
  return <div style={{ position: 'fixed', bottom: 24, right: 24, zIndex: 9999, background: bg, color: '#fff', padding: '12px 20px', borderRadius: 8, animation: 'slideUp 300ms ease', boxShadow: '0 4px 16px rgba(0,0,0,0.2)', fontSize: 14, fontWeight: 500 }}>{msg}</div>;
}

  const stores = ['all', ...new Set(TXNS.map(t => t.store))];
  const filtered = TXNS.filter(t => {
    if (typeFilter !== 'all' && t.type !== typeFilter) return false;
    if (storeFilter !== 'all' && t.store !== storeFilter) return false;
    if (search && !t.item.includes(search) && !t.store.includes(search)) return false;
    return true;
  });
  return (
    <div key="inout" style={{ animation: 'fadeIn 300ms ease', display: 'flex', flexDirection: 'column', gap: 20 }}>
      <div style={{ background: C.surface, borderRadius: 12, padding: 20, border: `1px solid ${C.border}` }}>
        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 14 }}>
          <div style={{ fontSize: 14, fontWeight: 600, color: C.text }}>최근 7일 추이</div>
          <button onClick={() => setToast('CSV 파일 다운로드 중...')} style={{ fontSize: 12, padding: '6px 14px', background: C.bg, border: `1px solid ${C.border}`, borderRadius: 8, cursor: 'pointer', color: C.text, fontWeight: 500 }}>📥 CSV 다운로드</button>
        </div>
        <div style={{ height: 180 }}>
          <ResponsiveContainer width="100%" height="100%">
            <LineChart data={WEEKLY}>
              <CartesianGrid strokeDasharray="3 3" stroke={C.border} />
              <XAxis dataKey="day" tick={{ fontSize: 11, fill: C.textSec }} />
              <YAxis tick={{ fontSize: 11, fill: C.textSec }} />
              <Tooltip contentStyle={{ fontSize: 12, borderRadius: 8 }} />
              <Legend wrapperStyle={{ fontSize: 12 }} />
              <Line type="monotone" dataKey="in" name="입고" stroke={C.primary} strokeWidth={2} dot={{ r: 4 }} />
              <Line type="monotone" dataKey="out" name="출고" stroke={C.accent} strokeWidth={2} dot={{ r: 4 }} />
            </LineChart>
          </ResponsiveContainer>
        </div>
      </div>
      <div style={{ display: 'flex', gap: 10, alignItems: 'center', flexWrap: 'wrap' }}>
        <div style={{ display: 'flex', gap: 6 }}>
          {[['all','전체'],['in','입고'],['out','출고'],['adjust','조정']].map(([id, label]) => (
            <button key={id} onClick={() => setTypeFilter(id)}
              style={{ padding: '6px 14px', borderRadius: 8, fontSize: 12, border: `1px solid ${typeFilter === id ? C.primary : C.border}`, background: typeFilter === id ? '#EFF6FF' : C.surface, color: typeFilter === id ? C.primary : C.text, cursor: 'pointer', fontWeight: typeFilter === id ? 600 : 400 }}
            >{label}</button>
          ))}
        </div>
        <select value={storeFilter} onChange={e => setStoreFilter(e.target.value)}
          style={{ padding: '6px 12px', borderRadius: 8, border: `1px solid ${C.border}`, fontSize: 12, outline: 'none', color: C.text }}>
          {stores.map(s => <option key={s} value={s}>{s === 'all' ? '전체 매장/창고' : s}</option>)}
        </select>
        <input value={search} onChange={e => setSearch(e.target.value)} placeholder="품목·매장 검색..."
          style={{ padding: '6px 12px', borderRadius: 8, border: `1px solid ${C.border}`, fontSize: 12, outline: 'none', width: 180 }} />
      </div>
      <div style={{ background: C.surface, borderRadius: 12, border: `1px solid ${C.border}` }}>
        <div style={{ padding: '13px 20px', borderBottom: `1px solid ${C.border}` }}>
          <span style={{ fontSize: 13, fontWeight: 600, color: C.text }}>내역 {filtered.length}건</span>
        </div>
        <table style={{ width: '100%', borderCollapse: 'collapse' }}>
          <thead>
            <tr style={{ background: C.bg }}>
              {['ID','일시','매장/창고','품목','유형','수량','담당자'].map(h => (
                <th key={h} style={{ padding: '9px 16px', fontSize: 12, fontWeight: 600, color: C.textSec, textAlign: 'left', borderBottom: `1px solid ${C.border}` }}>{h}</th>
              ))}
            </tr>
          </thead>
          <tbody>
            {filtered.map((t, i) => (
              <tr key={t.id} onClick={() => setModal(t)}
                style={{ cursor: 'pointer', transition: 'background 150ms', animation: `slideUp 280ms ease ${i * 28}ms both` }}
                onMouseEnter={e => e.currentTarget.style.background = 'rgba(29,78,216,0.04)'}
                onMouseLeave={e => e.currentTarget.style.background = 'transparent'}
              >
                <td style={{ padding: '11px 16px', fontSize: 11, color: C.textLight, borderBottom: `1px solid ${C.border}` }}>{t.id}</td>
                <td style={{ padding: '11px 16px', fontSize: 12, color: C.textSec, borderBottom: `1px solid ${C.border}` }}>{t.date}</td>
                <td style={{ padding: '11px 16px', fontSize: 13, fontWeight: 500, color: C.text, borderBottom: `1px solid ${C.border}` }}>{t.store}</td>
                <td style={{ padding: '11px 16px', fontSize: 13, color: C.text, borderBottom: `1px solid ${C.border}` }}>{t.item}</td>
                <td style={{ padding: '11px 16px', borderBottom: `1px solid ${C.border}` }}><Badge status={t.type} /></td>
                <td style={{ padding: '11px 16px', fontSize: 13, fontWeight: 600, color: t.type === 'out' ? C.danger : C.success, borderBottom: `1px solid ${C.border}` }}>{t.type !== 'out' && t.qty > 0 ? '+' : ''}{t.qty}</td>
                <td style={{ padding: '11px 16px', fontSize: 12, color: C.textSec, borderBottom: `1px solid ${C.border}` }}>{t.op}</td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>
      {modal && (
        <Modal title="입출고 상세" onClose={() => setModal(null)}>
          <div>
            {[['트랜잭션 ID', modal.id], ['일시', modal.date], ['매장/창고', modal.store], ['품목명', modal.item], ['유형', modal.type === 'in' ? '입고' : modal.type === 'out' ? '출고' : '재고 조정'], ['수량', `${modal.qty > 0 ? '+' : ''}${modal.qty}개`], ['담당자', modal.op]].map(([k, v]) => (
              <div key={k} style={{ display: 'flex', justifyContent: 'space-between', padding: '12px 0', borderBottom: `1px solid ${C.border}` }}>
                <span style={{ fontSize: 13, color: C.textSec }}>{k}</span>
                <span style={{ fontSize: 13, fontWeight: 500, color: C.text }}>{v}</span>
              </div>
            ))}
          </div>
        </Modal>
      )}
      {toast && <Toast msg={toast} type="info" onClose={() => setToast(null)} />}
    </div>
  );
}

function App() {
  const [page, setPage] = useState('통합 재고 대시보드');
  const renderPage = () => {
    if (page === '통합 재고 대시보드') return <DashboardPage />;
    if (page === '매장 재고 현황') return <StorePage />;
    if (page === '창고 현황') return <WarehousePage />;
    if (page === '입출고 내역') return <InoutPage />;
    return null;
  };
  return (
    <div style={{ display: 'flex', width: '100%', height: '100vh', overflow: 'hidden', fontFamily: "'Pretendard', -apple-system, sans-serif" }}>
      <Sidebar active={page} onNav={setPage} />
      <div style={{ flex: 1, display: 'flex', flexDirection: 'column', overflow: 'hidden' }}>
        <TopBar title={page} />
        <main style={{ flex: 1, overflow: 'auto', padding: 24, background: C.bg }}>{renderPage()}</main>
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
