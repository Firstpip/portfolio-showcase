function CountUp({ end, duration = 1200 }) {
  const [val, setVal] = useState(0);
  useEffect(() => {
    let v = 0; const step = end / (duration / 16);
    const t = setInterval(() => { v += step; if (v >= end) { setVal(end); clearInterval(t); } else setVal(Math.floor(v)); }, 16);
    return () => clearInterval(t);
  }, [end]);
  return <span>{val.toLocaleString()}</span>;
}

function Toast({ msg, type = 'success', onClose }) {
  useEffect(() => { const t = setTimeout(onClose, 3000); return () => clearTimeout(t); }, []);
  const bg = type === 'success' ? C.primary : type === 'error' ? C.danger : C.info;
  return <div style={{ position: 'fixed', bottom: 24, right: 24, zIndex: 9999, background: bg, color: '#fff', padding: '12px 20px', borderRadius: 10, animation: 'slideUp 300ms ease', boxShadow: '0 4px 16px rgba(0,0,0,0.2)', fontSize: 14, fontWeight: 500 }}>{msg}</div>;
}

        <div style={{ fontSize: 13, fontWeight: 700, color: C.textSec, textTransform: 'uppercase', letterSpacing: '0.05em', marginBottom: 14 }}>비교할 매장 선택</div>
        <div style={{ display: 'flex', gap: 10, flexWrap: 'wrap' }}>
          {allStores.map(s => (
            <label key={s} style={{ display: 'flex', alignItems: 'center', gap: 6, padding: '7px 14px', borderRadius: 8, border: `1px solid ${selected.includes(s) ? C.primary : C.borderGray}`, background: selected.includes(s) ? C.primaryLight : C.surface, cursor: 'pointer', transition: 'all 180ms' }}>
              <input type="checkbox" checked={selected.includes(s)} onChange={e => {
                if (e.target.checked) setSelected(prev => [...prev, s]);
                else setSelected(prev => prev.filter(x => x !== s));
              }} style={{ accentColor: C.primary }} />
              <span style={{ fontSize: 13, fontWeight: selected.includes(s) ? 600 : 400, color: selected.includes(s) ? C.primaryDark : C.text }}>{s}</span>
            </label>
          ))}
        </div>
      </div>
      <div style={{ background: C.surface, borderRadius: 16, padding: 24, border: `1px solid ${C.borderGray}` }}>
        <div style={{ fontSize: 13, fontWeight: 700, color: C.textSec, textTransform: 'uppercase', letterSpacing: '0.05em', marginBottom: 16 }}>품목별 재고 수량 비교 (개)</div>
        <div style={{ height: 260 }}>
          <ResponsiveContainer width="100%" height="100%">
            <BarChart data={chartData} barGap={3}>
              <CartesianGrid strokeDasharray="3 3" stroke={C.border} />
              <XAxis dataKey="item" tick={{ fontSize: 10, fill: C.textSec }} />
              <YAxis tick={{ fontSize: 10, fill: C.textSec }} />
              <Tooltip contentStyle={{ fontSize: 12, borderRadius: 10 }} />
              <Legend wrapperStyle={{ fontSize: 11 }} />
              {selected.includes('강남 플래그십') && <Bar dataKey="s1" name="강남 플래그십" fill={C.primary} radius={[4,4,0,0]} />}
              {selected.includes('홍대 직영점') && <Bar dataKey="s2" name="홍대 직영점" fill={C.accent} radius={[4,4,0,0]} />}
              {selected.includes('잠실 팝업스토어') && <Bar dataKey="s3" name="잠실 팝업스토어" fill="#34D399" radius={[4,4,0,0]} />}
            </BarChart>
          </ResponsiveContainer>
        </div>
      </div>
      <div style={{ background: C.surface, borderRadius: 16, border: `1px solid ${C.borderGray}` }}>
        <div style={{ padding: '16px 20px', borderBottom: `1px solid ${C.borderGray}`, fontSize: 13, fontWeight: 700, color: C.textSec, textTransform: 'uppercase', letterSpacing: '0.05em' }}>재고 격차 분석 (클릭 시 상세)</div>
        <div style={{ display: 'grid', gridTemplateColumns: 'repeat(3, 1fr)', gap: 0 }}>
          {COMPARE_ITEMS.map((d, i) => {
            const max = Math.max(d.s1, d.s2, d.s3); const min = Math.min(d.s1, d.s2, d.s3);
            const gap = max > 0 ? Math.round((max - min) / max * 100) : 0;
            return (
              <div key={d.item} onClick={() => setDrawer(d)}
                style={{ padding: '16px 20px', borderBottom: i < 3 ? `1px solid ${C.borderGray}` : 'none', borderRight: (i % 3 !== 2) ? `1px solid ${C.borderGray}` : 'none', cursor: 'pointer', transition: 'background 150ms', animation: `slideUp 300ms ease ${i * 50}ms both` }}
                onMouseEnter={e => e.currentTarget.style.background = C.bg}
                onMouseLeave={e => e.currentTarget.style.background = 'transparent'}
              >
                <div style={{ fontSize: 13, fontWeight: 600, color: C.text, marginBottom: 8 }}>{d.item}</div>
                <div style={{ fontSize: 11, color: C.textSec, marginBottom: 6 }}>강남 {d.s1.toLocaleString()} / 홍대 {d.s2.toLocaleString()} / 잠실 {d.s3.toLocaleString()}</div>
                <div style={{ display: 'flex', alignItems: 'center', gap: 6 }}>
                  <span style={{ fontSize: 11, color: gap > 50 ? C.danger : gap > 30 ? '#D97706' : C.primary, fontWeight: 700 }}>격차 {gap}%</span>
                </div>
              </div>
            );
          })}
        </div>
      </div>
      {drawer && (
        <Drawer title={`${drawer.item} — 재고 비교`} onClose={() => setDrawer(null)}>
          <div style={{ display: 'flex', flexDirection: 'column', gap: 14 }}>
            <div style={{ fontSize: 13, fontWeight: 700, color: C.textSec, textTransform: 'uppercase', letterSpacing: '0.05em', marginBottom: 4 }}>매장별 재고 현황</div>
            {[['강남 플래그십', drawer.s1], ['홍대 직영점', drawer.s2], ['잠실 팝업스토어', drawer.s3]].map(([store, qty]) => (
              <div key={store} style={{ padding: '14px 16px', borderRadius: 12, border: `1px solid ${C.borderGray}` }}>
                <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: 8 }}>
                  <span style={{ fontSize: 13, fontWeight: 600, color: C.text }}>{store}</span>
                  <span style={{ fontSize: 14, fontWeight: 800, color: C.primary }}>{qty.toLocaleString()}개</span>
                </div>
                <div style={{ height: 6, borderRadius: 3, background: '#E5E7EB', overflow: 'hidden' }}>
                  <div style={{ height: '100%', background: C.primary, borderRadius: 3, width: `${Math.round(qty / Math.max(drawer.s1, drawer.s2, drawer.s3) * 100)}%` }} />
                </div>
              </div>
            ))}
            <div style={{ padding: 14, borderRadius: 12, background: '#FFF9C4', border: '1px solid #FDE68A', marginTop: 4 }}>
              <div style={{ fontSize: 12, fontWeight: 700, color: '#92400E', marginBottom: 3 }}>📊 격차 분석</div>
              <div style={{ fontSize: 13, color: '#78350F' }}>
                최대 격차: {(Math.max(drawer.s1, drawer.s2, drawer.s3) - Math.min(drawer.s1, drawer.s2, drawer.s3)).toLocaleString()}개 ({Math.round((Math.max(drawer.s1,drawer.s2,drawer.s3)-Math.min(drawer.s1,drawer.s2,drawer.s3))/Math.max(drawer.s1,drawer.s2,drawer.s3)*100)}%)
              </div>
            </div>
          </div>
        </Drawer>
      )}
    </div>
  );
}

function ApiPage() {
  const [drawer, setDrawer] = useState(null);
  const [toast, setToast] = useState(null);
  const [editSchedule, setEditSchedule] = useState(false);
  return (
    <div key="api" style={{ animation: 'fadeIn 300ms ease', padding: '24px 32px', display: 'flex', flexDirection: 'column', gap: 24 }}>
      <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fill, minmax(280px, 1fr))', gap: 16 }}>
        {API_CONNECTIONS.map((api, i) => (
          <div key={api.id} onClick={() => setDrawer(api)}
            style={{ background: C.surface, borderRadius: 16, padding: 20, border: `1px solid ${api.status === 'warning' ? '#FDE68A' : C.borderGray}`, boxShadow: '0 4px 16px rgba(0,0,0,0.06)', cursor: 'pointer', animation: `slideUp 380ms ease ${i * 80}ms both`, transition: 'transform 200ms, box-shadow 200ms' }}
            onMouseEnter={e => { e.currentTarget.style.transform = 'scale(1.02)'; e.currentTarget.style.boxShadow = '0 8px 24px rgba(0,0,0,0.12)'; }}
            onMouseLeave={e => { e.currentTarget.style.transform = 'scale(1)'; e.currentTarget.style.boxShadow = '0 4px 16px rgba(0,0,0,0.06)'; }}
          >
            <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', marginBottom: 12 }}>
              <div>
                <div style={{ fontSize: 14, fontWeight: 700, color: C.text, marginBottom: 2 }}>{api.name}</div>
                <div style={{ fontSize: 11, color: C.textLight }}>{api.type} · {api.id}</div>
              </div>
              <Badge status={api.status} />
            </div>
            <div style={{ display: 'flex', gap: 16, marginBottom: 12 }}>
              <div>
                <div style={{ fontSize: 20, fontWeight: 800, color: api.successRate > 95 ? C.primary : C.danger }}>{api.successRate}%</div>
                <div style={{ fontSize: 10, color: C.textLight, textTransform: 'uppercase' }}>성공률</div>
              </div>
              <div>
                <div style={{ fontSize: 20, fontWeight: 800, color: api.errorCount > 10 ? C.danger : C.text }}>{api.errorCount}</div>
                <div style={{ fontSize: 10, color: C.textLight, textTransform: 'uppercase' }}>오류 건수</div>
              </div>
            </div>
            <div style={{ fontSize: 11, color: C.textSec }}>마지막 동기화: {api.lastSync}</div>
            <div style={{ fontSize: 11, color: C.textLight, marginTop: 3 }}>스케줄: <code style={{ background: C.bg, padding: '1px 4px', borderRadius: 3, fontSize: 10 }}>{api.schedule}</code></div>
          </div>
        ))}
      </div>
      {drawer && (
        <Drawer title={drawer.name} onClose={() => setDrawer(null)}>
          <div style={{ display: 'flex', flexDirection: 'column', gap: 16 }}>
            <div style={{ padding: 16, borderRadius: 12, background: C.bg, border: `1px solid ${C.border}` }}>
              <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: 6 }}>
                <span style={{ fontSize: 12, color: C.textSec }}>연동 타입</span>
                <span style={{ fontSize: 12, fontWeight: 600, color: C.text }}>{drawer.type}</span>
              </div>
              <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: 6 }}>
                <span style={{ fontSize: 12, color: C.textSec }}>성공률</span>
                <span style={{ fontSize: 12, fontWeight: 700, color: drawer.successRate > 95 ? C.primary : C.danger }}>{drawer.successRate}%</span>
              </div>
              <div style={{ display: 'flex', justifyContent: 'space-between' }}>
                <span style={{ fontSize: 12, color: C.textSec }}>오류 건수</span>
                <span style={{ fontSize: 12, fontWeight: 600, color: C.text }}>{drawer.errorCount}건</span>
              </div>
            </div>
            <div>
              <div style={{ fontSize: 12, fontWeight: 700, color: C.textSec, textTransform: 'uppercase', letterSpacing: '0.05em', marginBottom: 8 }}>동기화 스케줄</div>
              {editSchedule ? (
                <div style={{ display: 'flex', flexDirection: 'column', gap: 8 }}>
                  <select style={{ padding: '8px 12px', borderRadius: 8, border: `1px solid ${C.borderGray}`, fontSize: 13, outline: 'none' }}>
                    <option>매 30분 (*/30 * * * *)</option>
                    <option>매 1시간 (0 * * * *)</option>
                    <option>매 2시간 (0 */2 * * *)</option>
                    <option>실시간</option>
                  </select>
                  <div style={{ display: 'flex', gap: 8 }}>
                    <button onClick={() => { setEditSchedule(false); setToast('스케줄이 즉시 적용되었습니다.'); }} style={{ flex: 1, padding: '9px 0', background: C.primary, color: '#fff', border: 'none', borderRadius: 8, fontSize: 13, fontWeight: 600, cursor: 'pointer' }}>저장</button>
                    <button onClick={() => setEditSchedule(false)} style={{ padding: '9px 16px', background: '#F9FAFB', border: `1px solid ${C.borderGray}`, borderRadius: 8, fontSize: 13, cursor: 'pointer' }}>취소</button>
                  </div>
                </div>
              ) : (
                <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', padding: '10px 14px', borderRadius: 8, border: `1px solid ${C.borderGray}`, background: '#FAFAFA' }}>
                  <code style={{ fontSize: 13, color: C.text }}>{drawer.schedule}</code>
                  <button onClick={() => setEditSchedule(true)} style={{ fontSize: 12, color: C.primary, background: 'none', border: 'none', cursor: 'pointer', fontWeight: 600 }}>수정</button>
                </div>
              )}
            </div>
            <div>
              <div style={{ fontSize: 12, fontWeight: 700, color: C.textSec, textTransform: 'uppercase', letterSpacing: '0.05em', marginBottom: 8 }}>최근 실행 로그</div>
              <div style={{ display: 'flex', flexDirection: 'column', gap: 6 }}>
                {drawer.logs.map((log, i) => (
                  <div key={i} style={{ padding: '9px 12px', borderRadius: 8, background: log.includes('오류') || log.includes('타임아웃') ? '#FFF1F2' : C.bg, border: `1px solid ${log.includes('오류') || log.includes('타임아웃') ? '#FECACA' : C.border}`, fontSize: 12, color: C.text }}>{log}</div>
                ))}
              </div>
            </div>
            <div style={{ display: 'flex', gap: 8, marginTop: 4 }}>
              <button onClick={() => { setToast('수동 동기화를 시작합니다...'); setDrawer(null); }} style={{ flex: 1, padding: '11px 0', background: C.primary, color: '#fff', border: 'none', borderRadius: 10, fontSize: 13, fontWeight: 700, cursor: 'pointer' }}>수동 동기화</button>
              <button onClick={() => setDrawer(null)} style={{ padding: '11px 16px', background: '#F9FAFB', border: `1px solid ${C.borderGray}`, borderRadius: 10, fontSize: 13, cursor: 'pointer' }}>닫기</button>
            </div>
          </div>
        </Drawer>
      )}
      {toast && <Toast msg={toast} onClose={() => setToast(null)} />}
    </div>
  );
}

function ReportPage() {
  const [drawer, setDrawer] = useState(null);
  const [toast, setToast] = useState(null);
  const [period, setPeriod] = useState('30일');
  const sortedItems = [...TURNOVER_DATA].sort((a, b) => b.rate - a.rate);
  return (
    <div key="report" style={{ animation: 'fadeIn 300ms ease', padding: '24px 32px', display: 'flex', flexDirection: 'column', gap: 24 }}>
      <div style={{ display: 'flex', gap: 10, alignItems: 'center' }}>
        {['7일', '30일', '90일'].map(p => (
          <button key={p} onClick={() => setPeriod(p)}
            style={{ padding: '7px 18px', borderRadius: 8, border: `1px solid ${period === p ? C.primary : C.borderGray}`, background: period === p ? C.primaryLight : C.surface, color: period === p ? C.primaryDark : C.textSec, fontSize: 13, fontWeight: period === p ? 700 : 400, cursor: 'pointer', transition: 'all 180ms' }}
          >{p}</button>
        ))}
        <div style={{ flex: 1 }} />
        <button onClick={() => setToast('CSV 파일을 생성하여 다운로드합니다...')} style={{ padding: '7px 16px', borderRadius: 8, border: `1px solid ${C.borderGray}`, background: C.surface, fontSize: 13, cursor: 'pointer', color: C.text, fontWeight: 500, display: 'flex', alignItems: 'center', gap: 6 }}>
          📥 CSV 내보내기
        </button>
      </div>
      <div style={{ background: C.surface, borderRadius: 16, padding: 24, border: `1px solid ${C.borderGray}` }}>
        <div style={{ fontSize: 13, fontWeight: 700, color: C.textSec, textTransform: 'uppercase', letterSpacing: '0.05em', marginBottom: 16 }}>기간별 입출고 추이 ({period})</div>
        <div style={{ height: 220 }}>
          <ResponsiveContainer width="100%" height="100%">
            <LineChart data={WEEKLY}>
              <CartesianGrid strokeDasharray="3 3" stroke={C.border} />
              <XAxis dataKey="day" tick={{ fontSize: 11, fill: C.textSec }} />
              <YAxis tick={{ fontSize: 11, fill: C.textSec }} />
              <Tooltip contentStyle={{ fontSize: 12, borderRadius: 10 }} />
              <Legend wrapperStyle={{ fontSize: 12 }} />
              <Line type="monotone" dataKey="in" name="입고" stroke={C.primary} strokeWidth={2.5} dot={{ r: 5, fill: C.primary }} />
              <Line type="monotone" dataKey="out" name="출고" stroke={C.accent} strokeWidth={2.5} dot={{ r: 5, fill: C.accent }} />
            </LineChart>
          </ResponsiveContainer>
        </div>
      </div>
      <div style={{ background: C.surface, borderRadius: 16, border: `1px solid ${C.borderGray}` }}>
        <div style={{ padding: '16px 20px', borderBottom: `1px solid ${C.borderGray}`, fontSize: 13, fontWeight: 700, color: C.textSec, textTransform: 'uppercase', letterSpacing: '0.05em' }}>품목별 재고 회전율 (클릭 시 상세)</div>
        <table style={{ width: '100%', borderCollapse: 'collapse' }}>
          <thead>
            <tr style={{ background: '#F9FAFB' }}>
              {['순위','품목명','카테고리','출고량','평균 재고','회전율'].map(h => (
                <th key={h} style={{ padding: '10px 16px', fontSize: 11, fontWeight: 700, color: C.textSec, textAlign: 'left', borderBottom: `1px solid ${C.borderGray}`, textTransform: 'uppercase', letterSpacing: '0.04em' }}>{h}</th>
              ))}
            </tr>
          </thead>
          <tbody>
            {sortedItems.map((item, i) => (
              <tr key={item.item} onClick={() => setDrawer(item)}
                style={{ cursor: 'pointer', transition: 'background 150ms', animation: `slideUp 300ms ease ${i * 35}ms both` }}
                onMouseEnter={e => { e.currentTarget.style.background = C.bg; e.currentTarget.style.borderLeft = `3px solid ${C.primary}`; }}
                onMouseLeave={e => { e.currentTarget.style.background = 'transparent'; e.currentTarget.style.borderLeft = 'none'; }}
              >
                <td style={{ padding: '12px 16px', fontSize: 13, fontWeight: 700, color: i < 3 ? C.primary : C.textLight, borderBottom: `1px solid ${C.borderGray}` }}>#{i + 1}</td>
                <td style={{ padding: '12px 16px', fontSize: 13, fontWeight: 600, color: C.text, borderBottom: `1px solid ${C.borderGray}` }}>{item.item}</td>
                <td style={{ padding: '12px 16px', fontSize: 12, color: C.textSec, borderBottom: `1px solid ${C.borderGray}` }}>{item.category}</td>
                <td style={{ padding: '12px 16px', fontSize: 13, color: C.text, borderBottom: `1px solid ${C.borderGray}` }}>{item.out.toLocaleString()}</td>
                <td style={{ padding: '12px 16px', fontSize: 13, color: C.textSec, borderBottom: `1px solid ${C.borderGray}` }}>{item.avgStock.toLocaleString()}</td>
                <td style={{ padding: '12px 16px', borderBottom: `1px solid ${C.borderGray}` }}>
                  <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
                    <div style={{ flex: 1, height: 6, borderRadius: 3, background: '#E5E7EB', overflow: 'hidden', maxWidth: 80 }}>
                      <div style={{ height: '100%', background: item.rate > 100 ? C.danger : item.rate > 60 ? C.warning : C.primary, borderRadius: 3, width: `${Math.min(item.rate / 2, 100)}%` }} />
                    </div>
                    <span style={{ fontSize: 13, fontWeight: 700, color: item.rate > 100 ? C.danger : item.rate > 60 ? '#D97706' : C.primary, minWidth: 45 }}>{item.rate}%</span>
                  </div>
                </td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>
      {drawer && (
        <Drawer title={`${drawer.item} — 회전율 상세`} onClose={() => setDrawer(null)}>
          <div style={{ display: 'flex', flexDirection: 'column', gap: 14 }}>
            <div style={{ padding: 16, borderRadius: 12, background: C.bg, border: `1px solid ${C.border}` }}>
              <div style={{ fontSize: 28, fontWeight: 800, color: drawer.rate > 100 ? C.danger : drawer.rate > 60 ? '#D97706' : C.primary }}>{drawer.rate}%</div>
              <div style={{ fontSize: 12, color: C.textSec, marginTop: 2 }}>재고 회전율 (기간 출고량 ÷ 평균 재고량 × 100)</div>
            </div>
            {[['카테고리', drawer.category], ['기간 출고량', `${drawer.out.toLocaleString()}개`], ['평균 재고', `${drawer.avgStock.toLocaleString()}개`], ['분석 기간', period]].map(([k, v]) => (
              <div key={k} style={{ display: 'flex', justifyContent: 'space-between', padding: '11px 0', borderBottom: `1px solid ${C.borderGray}` }}>
                <span style={{ fontSize: 13, color: C.textSec }}>{k}</span>
                <span style={{ fontSize: 13, fontWeight: 600, color: C.text }}>{v}</span>
              </div>
            ))}
            {drawer.rate > 100 && (
              <div style={{ padding: 14, borderRadius: 12, background: '#FFF1F2', border: '1px solid #FECACA' }}>
                <div style={{ fontSize: 12, fontWeight: 700, color: C.danger, marginBottom: 3 }}>⚠️ 과회전 위험</div>
                <div style={{ fontSize: 13, color: '#991B1B' }}>출고량이 평균 재고량을 초과합니다. 안전재고 기준 재검토가 필요합니다.</div>
              </div>
            )}
          </div>
        </Drawer>
      )}
      {toast && <Toast msg={toast} onClose={() => setToast(null)} />}
    </div>
  );
}

function App() {
  const [tab, setTab] = useState('통합 현황판');
  const renderPage = () => {
    if (tab === '통합 현황판') return <OverviewPage />;
    if (tab === '매장 비교 분석') return <ComparisonPage />;
    if (tab === 'API 연동 관리') return <ApiPage />;
    if (tab === '리포트 & 통계') return <ReportPage />;
    return null;
  };
  return (
    <div style={{ display: 'flex', flexDirection: 'column', width: '100%', minHeight: '100vh', background: C.bg, fontFamily: "'Pretendard', -apple-system, sans-serif" }}>
      <GlobalNav tab={tab} setTab={setTab} />
      <HeroBanner tab={tab} />
      <div style={{ flex: 1 }}>{renderPage()}</div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
