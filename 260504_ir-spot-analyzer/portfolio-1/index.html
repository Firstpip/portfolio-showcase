@keyframes fadeIn{from{opacity:0}to{opacity:1}}

function CountUp({end,suffix='',decimal=false}){
  const[val,setVal]=useState(0);
  useEffect(()=>{
    let s=0;const step=end/(1200/16);
    const t=setInterval(()=>{s+=step;if(s>=end){setVal(end);clearInterval(t);}else setVal(decimal?+(s.toFixed(1)):Math.floor(s));},16);
    return()=>clearInterval(t);
  },[end]);
  return <span style={{animation:'countUp 400ms ease'}}>{decimal?val:val.toLocaleString()}{suffix}</span>;
}

function Toast({msg,onClose}){
  useEffect(()=>{const t=setTimeout(onClose,3000);return()=>clearTimeout(t);},[]);
  return(
    <div style={{position:'fixed',bottom:24,right:24,zIndex:9999,background:C.primary,color:'#fff',padding:'12px 20px',borderRadius:8,animation:'slideUp 300ms ease',boxShadow:'0 4px 16px rgba(99,102,241,0.4)',fontSize:14,display:'flex',alignItems:'center',gap:8}}>
      <span>✓</span>{msg}
    </div>
  );
}

/* ── 스팟 검출 파라미터 ── */
function SpotDetectionPage({onToast}){
  const[pxMin,setPxMin]=useState(5);
  const[pxMax,setPxMax]=useState(20);
  const[bright,setBright]=useState(45);
  const[noise,setNoise]=useState(2);
  const[selectedSpot,setSelectedSpot]=useState(null);
  const estCount=Math.max(3,Math.round(12*(bright/60)*(pxMax-pxMin)/15*(noise<3?1:0.85)));
  return(
    <div style={{animation:'fadeIn 300ms ease',display:'grid',gridTemplateColumns:'320px 1fr',gap:16}}>
      <div>
        <div style={{background:C.surf,borderRadius:12,border:`1px solid ${C.border}`,padding:20,marginBottom:16}}>
          <h3 style={{fontSize:14,fontWeight:700,marginBottom:16,color:C.text}}>검출 파라미터</h3>
          {[
            {l:'최소 픽셀 크기',v:pxMin,set:setPxMin,min:1,max:15,unit:'px',color:C.primary},
            {l:'최대 픽셀 크기',v:pxMax,set:setPxMax,min:10,max:50,unit:'px',color:C.sec},
            {l:'밝기 임계값',v:bright,set:setBright,min:0,max:100,unit:'%',color:C.accent},
            {l:'노이즈 제거 강도',v:noise,set:setNoise,min:0,max:5,unit:'단계',color:C.success},
          ].map(p=>(
            <div key={p.l} style={{marginBottom:18}}>
              <div style={{display:'flex',justifyContent:'space-between',marginBottom:8}}>
                <span style={{fontSize:12,color:C.textMuted}}>{p.l}</span>
                <span style={{fontSize:13,fontWeight:700,color:p.color}}>{p.v} {p.unit}</span>
              </div>
              <input type="range" min={p.min} max={p.max} value={p.v} onChange={e=>p.set(+e.target.value)} style={{width:'100%',accentColor:p.color}}/>
            </div>
          ))}
          <div style={{background:C.bg,borderRadius:8,padding:'12px 14px',marginTop:4}}>
            <div style={{fontSize:11,color:C.textMuted,marginBottom:4}}>예상 검출 스팟 수</div>
            <div style={{fontSize:24,fontWeight:800,color:C.sec}}>{estCount} 개</div>
          </div>
        </div>
        <div style={{background:C.surf,borderRadius:12,border:`1px solid ${C.border}`,padding:20}}>
          <h3 style={{fontSize:14,fontWeight:700,marginBottom:14}}>프리셋</h3>
          {['기본 설정','고감도','저감도'].map((p,i)=>(
            <button key={i} onClick={()=>{setPxMin([5,3,8][i]);setPxMax([20,30,15][i]);setBright([45,30,65][i]);setNoise([2,1,3][i]);onToast(`프리셋 "${p}" 적용됨`);}}
              style={{width:'100%',padding:'8px 12px',background:i===0?`${C.primary}20`:C.bg,border:`1px solid ${i===0?C.primary:C.border}`,borderRadius:7,color:i===0?C.primary:C.textMuted,cursor:'pointer',fontSize:12,marginBottom:6,textAlign:'left',transition:'all 150ms'}}>
              {p}
            </button>
          ))}
        </div>
      </div>
      <div>
        <div style={{background:C.surf,borderRadius:12,border:`1px solid ${C.border}`,overflow:'hidden',marginBottom:16}}>
          <div style={{padding:'14px 20px',borderBottom:`1px solid ${C.border}`,display:'flex',justifyContent:'space-between',alignItems:'center'}}>
            <h3 style={{fontSize:14,fontWeight:700}}>실시간 검출 결과 ({estCount}개)</h3>
            <div style={{display:'flex',gap:8}}>
              <button onClick={()=>onToast('파라미터 재적용 완료')} style={{padding:'5px 14px',background:C.primary,border:'none',borderRadius:6,color:'#fff',cursor:'pointer',fontSize:12,fontWeight:600}}>🔄 재분석</button>
            </div>
          </div>
          <table style={{width:'100%',borderCollapse:'collapse'}}>
            <thead>
              <tr style={{background:C.bg}}>
                {['스팟 ID','X','Y','반경','밝기','형상','거리','상세'].map(h=>(
                  <th key={h} style={{padding:'9px 12px',fontSize:11,color:C.textMuted,textAlign:'left',fontWeight:600,borderBottom:`1px solid ${C.border}`}}>{h}</th>
                ))}
              </tr>
            </thead>
            <tbody>
              {SPOTS.filter(s=>s.r>=pxMin&&s.r<=pxMax&&s.brightness*100>=bright).map((s,i)=>(
                <tr key={i} onClick={()=>setSelectedSpot(s)} style={{borderBottom:`1px solid ${C.border}`,cursor:'pointer',transition:'background 150ms',background:'transparent'}}
                  onMouseEnter={e=>{e.currentTarget.style.background=`${C.primary}10`}}
                  onMouseLeave={e=>{e.currentTarget.style.background='transparent'}}>
                  <td style={{padding:'10px 12px',fontSize:12,fontWeight:700,color:C.primary}}>{s.id}</td>
                  <td style={{padding:'10px 12px',fontSize:12,color:C.textMuted}}>{s.x}</td>
                  <td style={{padding:'10px 12px',fontSize:12,color:C.textMuted}}>{s.y}</td>
                  <td style={{padding:'10px 12px',fontSize:12,color:C.text}}>{s.r}px</td>
                  <td style={{padding:'10px 12px'}}>
                    <div style={{display:'flex',alignItems:'center',gap:6}}>
                      <div style={{width:40,height:5,background:C.border,borderRadius:3,overflow:'hidden'}}>
                        <div style={{height:'100%',width:`${s.brightness*100}%`,background:s.brightness>0.8?C.success:s.brightness>0.6?C.accent:C.danger,transition:'all 300ms'}}/>
                      </div>
                      <span style={{fontSize:11,color:C.textMuted}}>{(s.brightness*100).toFixed(0)}%</span>
                    </div>
                  </td>
                  <td style={{padding:'10px 12px'}}>
                    <span style={{padding:'2px 7px',borderRadius:10,fontSize:10,background:s.shape==='원형'?`${C.success}22`:s.shape==='타원형'?`${C.accent}22`:`${C.danger}22`,color:s.shape==='원형'?C.success:s.shape==='타원형'?C.accent:C.danger}}>{s.shape}</span>
                  </td>
                  <td style={{padding:'10px 12px',fontSize:12,color:C.textMuted}}>{s.dist.toFixed(1)}mm</td>
                  <td style={{padding:'10px 12px'}}>
                    <button onClick={e=>{e.stopPropagation();setSelectedSpot(s);}} style={{padding:'3px 9px',background:C.primary,border:'none',borderRadius:5,color:'#fff',cursor:'pointer',fontSize:11}}>보기</button>
                  </td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      </div>
      {selectedSpot&&<SpotDetailModal spot={selectedSpot} onClose={()=>setSelectedSpot(null)}/>}
    </div>
  );
}

/* ── 오버레이 뷰 ── */

    <div style={{animation:'fadeIn 300ms ease',display:'grid',gridTemplateColumns:'1fr 300px',gap:16}}>

}

        ))}
      </div>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:16,marginBottom:16}}>
        <div style={{background:C.surf,borderRadius:12,border:`1px solid ${C.border}`,padding:20}}>
          <div style={{fontSize:14,fontWeight:700,marginBottom:12}}>밝기 분포 히스토그램</div>
          <div className="chart-canvas-wrap"><canvas ref={histRef}/></div>
        </div>
        <div style={{background:C.surf,borderRadius:12,border:`1px solid ${C.border}`,padding:20}}>
          <div style={{fontSize:14,fontWeight:700,marginBottom:12}}>크기-밝기 산점도</div>
          <div className="chart-canvas-wrap"><canvas ref={scatterRef}/></div>
        </div>
      </div>
      <div style={{background:C.surf,borderRadius:12,border:`1px solid ${C.border}`,padding:20}}>
        <div style={{fontSize:14,fontWeight:700,marginBottom:12}}>스팟별 중심 거리 분포</div>
        <div className="chart-canvas-wrap"><canvas ref={barRef}/></div>
      </div>
      {showExport&&<ExportModal onClose={()=>setShowExport(false)}/>}
      {showParamModal&&<ParameterModal onClose={()=>setShowParamModal(false)} onApply={()=>onToast('파라미터 적용 완료 — 재분석 진행 중')}/>}
    </div>
  );
}

/* ── 설정 ── */
function SettingsPage({onToast}){
  const[auto,setAuto]=useState(true);
  const[unit,setUnit]=useState('mm');
  return(
    <div style={{animation:'fadeIn 300ms ease',maxWidth:600}}>
      <div style={{background:C.surf,borderRadius:12,border:`1px solid ${C.border}`,padding:24,marginBottom:16}}>
        <h3 style={{fontSize:15,fontWeight:700,marginBottom:16}}>분석 설정</h3>
        {[
          {l:'자동 전처리',d:'이미지 로드 시 자동으로 노이즈 제거 필터 적용',v:auto,set:setAuto},
        ].map((s,i)=>(
          <div key={i} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'12px 0',borderBottom:`1px solid ${C.border}`}}>
            <div>
              <div style={{fontSize:13,fontWeight:600,color:C.text}}>{s.l}</div>
              <div style={{fontSize:11,color:C.textMuted,marginTop:2}}>{s.d}</div>
            </div>
            <div onClick={()=>s.set(!s.v)} style={{width:44,height:24,borderRadius:12,background:s.v?C.primary:C.border,cursor:'pointer',position:'relative',transition:'background 200ms'}}>
              <div style={{position:'absolute',top:2,left:s.v?22:2,width:20,height:20,borderRadius:'50%',background:'#fff',transition:'left 200ms'}}/>
            </div>
          </div>
        ))}
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'12px 0',borderBottom:`1px solid ${C.border}`}}>
          <div>
            <div style={{fontSize:13,fontWeight:600,color:C.text}}>거리 단위</div>
            <div style={{fontSize:11,color:C.textMuted,marginTop:2}}>스팟 거리 표시 단위</div>
          </div>
          <select value={unit} onChange={e=>{setUnit(e.target.value);onToast(`단위 변경: ${e.target.value}`);}} style={{background:C.bg,border:`1px solid ${C.border}`,borderRadius:6,padding:'4px 10px',color:C.text,fontSize:12,cursor:'pointer'}}>
            {['mm','px','μm'].map(u=><option key={u} value={u}>{u}</option>)}
          </select>
        </div>
      </div>
      <button onClick={()=>onToast('설정이 저장되었습니다')} style={{padding:'10px 28px',background:C.primary,border:'none',borderRadius:8,color:'#fff',cursor:'pointer',fontSize:13,fontWeight:600}}>설정 저장</button>
    </div>
  );
}

/* ── App Root ── */
function App(){
  const[page,setPage]=useState('이미지 분석');
  const[toast,setToast]=useState(null);
  const showToast=(msg)=>{setToast(null);setTimeout(()=>setToast(msg),10);};

  const PAGE_TITLES={
    '이미지 분석':'이미지 파일 관리 및 분석',
    '스팟 검출':'스팟 검출 파라미터 조절',
    '오버레이 뷰':'스팟 오버레이 시각화',
    '차트 분석':'데이터 시각화 및 내보내기',
    '설정':'시스템 설정',
  };

  const renderPage=()=>{
    switch(page){
      case '이미지 분석':return<ImageAnalysisPage onToast={showToast}/>;
      case '스팟 검출':return<SpotDetectionPage onToast={showToast}/>;
      case '오버레이 뷰':return<OverlayViewPage onToast={showToast}/>;
      case '차트 분석':return<ChartAnalysisPage onToast={showToast}/>;
      case '설정':return<SettingsPage onToast={showToast}/>;
      default:return null;
    }
  };

  return(
    <div style={{display:'flex',width:'100%',height:'100vh',overflow:'hidden'}}>
      <Sidebar page={page} onNav={setPage}/>
      <div style={{flex:1,display:'flex',flexDirection:'column',overflow:'hidden'}}>
        <TopBar title={PAGE_TITLES[page]}/>
        <main style={{flex:1,overflowY:'auto',padding:20,background:C.bg}}>
          {renderPage()}
        </main>
      </div>
      {toast&&<Toast msg={toast} onClose={()=>setToast(null)}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
