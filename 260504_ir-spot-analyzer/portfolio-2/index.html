<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;min-height:100vh;font-family:'Pretendard',sans-serif;background:#F8FAFC;color:#0F172A}
#root{display:flex;flex-direction:column;width:100%;min-height:100vh}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes fadeInScale{from{opacity:0;transform:scale(0.95)}to{opacity:1;transform:scale(1)}}
@keyframes slideInRight{from{opacity:0;transform:translateX(30px)}to{opacity:1;transform:translateX(0)}}

@keyframes ripple{0%{transform:scale(0);opacity:0.5}100%{transform:scale(4);opacity:0}}
@keyframes countUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.5}}
@keyframes barGrow{from{width:0%}to{width:var(--target-width)}}
@keyframes slideDown{from{opacity:0;transform:translateY(-10px);max-height:0}to{opacity:1;transform:translateY(0);max-height:500px}}
.chart-canvas-wrap{position:relative;height:200px}
.chart-canvas-wrap canvas{width:100%!important;height:100%!important}

function CountUp({end,suffix=''}){
  const[val,setVal]=useState(0);
  useEffect(()=>{
    let s=0;const step=end/(1200/16);
    const t=setInterval(()=>{s+=step;if(s>=end){setVal(end);clearInterval(t);}else setVal(Math.floor(s));},16);
    return()=>clearInterval(t);
  },[end]);
  return<span style={{animation:'countUp 400ms ease'}}>{val.toLocaleString()}{suffix}</span>;
}

function Toast({msg,onClose}){
  useEffect(()=>{const t=setTimeout(onClose,3000);return()=>clearTimeout(t);},[]);
  return(
    <div style={{position:'fixed',bottom:24,right:24,zIndex:9999,background:C.primary,color:'#fff',padding:'12px 20px',borderRadius:8,animation:'slideUp 300ms ease',boxShadow:`0 4px 16px rgba(14,165,233,0.4)`,fontSize:14,display:'flex',alignItems:'center',gap:8}}>
      <span>✓</span>{msg}
    </div>
  );
}

/* ── 배치 분석 ── */
function BatchAnalysisPage({onToast}){

  const[running,setRunning]=useState(false);
  const[done,setDone]=useState(false);
  const[drawer,setDrawer]=useState(null);
  const[newBatch,setNewBatch]=useState(false);

  const startBatch=()=>{
    setRunning(true);setDone(false);setProgress(0);
    const iv=setInterval(()=>{
      setProgress(p=>{
        if(p>=100){clearInterval(iv);setRunning(false);setDone(true);onToast('배치 분석 완료: 15개 이미지 처리됨');return 100;}
        return p+Math.random()*8+2;

    },200);

            </div>
            {newBatch&&(

                <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12,marginBottom:12}}>
                  <div>
                    <label style={{fontSize:12,color:C.textMuted,display:'block',marginBottom:4}}>카메라 선택</label>
                    <select style={{width:'100%',padding:'8px 10px',border:`1px solid ${C.border}`,borderRadius:7,fontSize:13,background:C.bg,color:C.text,cursor:'pointer'}}>
                      {['CAM-A1 (Xenics Bobcat)','CAM-B2 (FLIR Lepton)','CAM-C3 (Seek Thermal)'].map(c=><option key={c}>{c}</option>)}
                    </select>
                  </div>
                  <div>
                    <label style={{fontSize:12,color:C.textMuted,display:'block',marginBottom:4}}>분석 프리셋</label>
                    <select style={{width:'100%',padding:'8px 10px',border:`1px solid ${C.border}`,borderRadius:7,fontSize:13,background:C.bg,color:C.text,cursor:'pointer'}}>

                  </div>

              <div style={{fontSize:28,marginBottom:8}}>{running?'⏳':'📁'}</div>
              {running?(
                <>
                  <div style={{fontSize:14,fontWeight:700,color:C.primary,marginBottom:6}}>분석 진행 중...</div>
                  <div style={{height:6,background:C.border,borderRadius:3,overflow:'hidden',maxWidth:300,margin:'0 auto 6px'}}>
                    <div style={{height:'100%',width:`${Math.min(progress,100)}%`,background:`linear-gradient(90deg,${C.primary},${C.sec})`,borderRadius:3,transition:'width 200ms'}}/>

                  <div style={{fontSize:14,fontWeight:600,color:C.textMuted,marginBottom:4}}>이미지 파일을 드래그하거나 클릭하여 업로드</div>

                <span style={{padding:'3px 8px',borderRadius:12,fontSize:11,background:`${C.success}15`,color:C.success}}>{j.status}</span>
                <span style={{fontSize:11,color:C.textMuted}}>{j.id}</span>
                <span style={{color:C.textMuted,fontSize:12}}>›</span>

                <span style={{fontSize:12,color:C.textMuted}}>{q.label}</span>

              </div>

      </div>

        <Drawer title={`배치 상세 — ${drawer.id}`} onClose={()=>setDrawer(null)}>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginBottom:16}}>

            <label style={{fontSize:12,color:C.textMuted,display:'block',marginBottom:6}}>포함 섹션</label>
            {['오버레이 이미지','스팟 데이터 테이블','밝기 분포 차트','검교정 정보'].map((s,i)=>(
              <label key={i} style={{display:'flex',alignItems:'center',gap:8,marginBottom:6,cursor:'pointer',fontSize:13,color:C.text}}>
                <input type="checkbox" defaultChecked style={{accentColor:C.primary}}/>
                {s}
              </label>
            ))}
          </div>
          {genDone?(
            <div style={{background:`${C.success}10`,border:`1px solid ${C.success}30`,borderRadius:8,padding:14,textAlign:'center',marginBottom:16}}>
              <div style={{fontSize:15,fontWeight:700,color:C.success,marginBottom:4}}>✓ 리포트 생성 완료</div>
              <div style={{fontSize:12,color:C.textMuted}}>PDF 파일 준비 완료 | S3 저장 및 공유 링크 발급 완료</div>
            </div>
          ):(
            <button onClick={generating?()=>{}:generateReport} disabled={generating}
              style={{width:'100%',padding:'11px',background:generating?C.border:C.primary,border:'none',borderRadius:8,color:'#fff',cursor:generating?'not-allowed':'pointer',fontSize:14,fontWeight:700,transition:'all 200ms'}}>
              {generating?<span style={{animation:'pulse 1s infinite'}}>⏳ Puppeteer 렌더링 중...</span>:'📄 리포트 생성 실행'}
            </button>
          )}
        </Modal>
      )}
    </div>
  );
}

/* ── App Root ── */
function App(){
  const[tab,setTab]=useState('배치 분석');
  const[toast,setToast]=useState(null);
  const showToast=(msg)=>{setToast(null);setTimeout(()=>setToast(msg),10);};
  const renderContent=()=>{
    switch(tab){
      case '배치 분석':return<BatchAnalysisPage onToast={showToast}/>;
      case '분석 히스토리':return<HistoryPage onToast={showToast}/>;
      case '검교정 설정':return<CalibrationPage onToast={showToast}/>;
      case '리포트 생성':return<ReportPage onToast={showToast}/>;
      default:return null;
    }
  };
  return(
    <div style={{display:'flex',flexDirection:'column',width:'100%',minHeight:'100vh',background:C.bg}}>
      <NavBar tab={tab} onTab={setTab}/>
      <Hero tab={tab}/>
      <main style={{flex:1,padding:'20px 32px'}}>
        {renderContent()}
      </main>
      {toast&&<Toast msg={toast} onClose={()=>setToast(null)}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
