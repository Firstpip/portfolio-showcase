<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>POD 인쇄 PDF 자동 생성 플랫폼 — 맞춤 구현 데모</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://unpkg.com/prop-types/prop-types.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/recharts@2.15.0/umd/Recharts.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;font-family:'Pretendard',sans-serif;background:#F5F8FC;color:#1A2B42}
#root{display:flex;flex-direction:column;width:100%;min-height:100vh}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes fadeInScale{from{opacity:0;transform:scale(0.95)}to{opacity:1;transform:scale(1)}}
@keyframes slideInRight{from{opacity:0;transform:translateX(30px)}to{opacity:1;transform:translateX(0)}}
@keyframes slideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes ripple{0%{transform:scale(0);opacity:0.5}100%{transform:scale(4);opacity:0}}
@keyframes countUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.5}}
@keyframes barGrow{from{width:0%}to{width:var(--tw)}}
@keyframes slideDown{from{opacity:0;transform:translateY(-10px);max-height:0}to{opacity:1;transform:translateY(0);max-height:500px}}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const C={
  primary:'#1B4F8A',secondary:'#2D7DD2',accent:'#5BA3E0',
  bg:'#F5F8FC',surface:'#FFFFFF',border:'#D8E4F0',
  text:'#1A2B42',textSub:'#5A7090',
  success:'#16A34A',warn:'#D97706',danger:'#DC2626',
};
const {useState,useEffect,useRef}=React;
const {BarChart,Bar,XAxis,YAxis,CartesianGrid,Tooltip,ResponsiveContainer,LineChart,Line}=Recharts;

// ── Toast ──────────────────────────────────────────────
function Toast({msg,onClose}){
  useEffect(()=>{const t=setTimeout(onClose,3000);return()=>clearTimeout(t);},[]);
  return(<div style={{position:'fixed',bottom:28,right:28,zIndex:9999,background:C.primary,color:'#fff',padding:'12px 24px',borderRadius:8,animation:'slideUp 300ms ease',boxShadow:'0 4px 16px rgba(0,0,0,0.2)',fontSize:14}}>{msg}</div>);
}

// ── Modal ──────────────────────────────────────────────
function Modal({title,onClose,children,width=560}){
  return(
    <div style={{position:'fixed',inset:0,zIndex:500,display:'flex',alignItems:'center',justifyContent:'center'}}>
      <div onClick={onClose} style={{position:'absolute',inset:0,background:'rgba(0,0,0,0.4)',animation:'fadeIn 200ms ease'}}/>
      <div style={{position:'relative',width,maxHeight:'85vh',background:C.surface,borderRadius:14,zIndex:501,animation:'fadeInScale 200ms ease',display:'flex',flexDirection:'column',boxShadow:'0 20px 60px rgba(0,0,0,0.18)'}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'20px 24px',borderBottom:`1px solid ${C.border}`}}>
          <h3 style={{fontSize:17,fontWeight:700,color:C.text}}>{title}</h3>
          <button onClick={onClose} style={{background:'none',border:'none',fontSize:20,cursor:'pointer',color:C.textSub}}>✕</button>
        </div>
        <div style={{padding:24,overflowY:'auto',flex:1}}>{children}</div>
      </div>
    </div>
  );
}

// ── Drawer ─────────────────────────────────────────────
function Drawer({item,onClose}){
  if(!item)return null;
  const statusColor={완료:C.success,생성중:C.secondary,대기:C.textSub,오류:C.danger};
  return(
    <>
      <div onClick={onClose} style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.35)',zIndex:200}}/>
      <div style={{position:'fixed',top:0,right:0,bottom:0,width:460,background:C.surface,boxShadow:'-8px 0 40px rgba(0,0,0,0.13)',zIndex:201,overflowY:'auto',padding:28,animation:'slideInRight 200ms ease'}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:24}}>
          <h2 style={{fontSize:18,fontWeight:700,color:C.text}}>{item.name}</h2>
          <button onClick={onClose} style={{background:'none',border:'none',fontSize:20,cursor:'pointer',color:C.textSub}}>✕</button>
        </div>
        <div style={{display:'flex',gap:8,marginBottom:20}}>
          <span style={{background:`${statusColor[item.status]}20`,color:statusColor[item.status],padding:'4px 12px',borderRadius:20,fontSize:12,fontWeight:600}}>{item.status}</span>
          <span style={{background:`${C.primary}15`,color:C.primary,padding:'4px 12px',borderRadius:20,fontSize:12}}>{item.pages}페이지</span>
        </div>
        {[['주문 ID',item.id],['요청일',item.date],['이미지 수',`${item.images}장`],['PDF 크기',item.size],['색공간','CMYK (ICC: USWebCoatedSWOP)'],['해상도','300 DPI'],['블리드','0.125인치 (사방)'],['바인딩','하드커버 무선제본']].map(([k,v])=>(
          <div key={k} style={{display:'flex',justifyContent:'space-between',padding:'10px 0',borderBottom:`1px solid ${C.border}`,fontSize:14}}>
            <span style={{color:C.textSub}}>{k}</span><span style={{fontWeight:500,color:C.text}}>{v}</span>
          </div>
        ))}
        <div style={{marginTop:20}}>
          <div style={{fontSize:13,fontWeight:600,color:C.textSub,marginBottom:8}}>관리 메모</div>
          <textarea style={{width:'100%',height:80,border:`1px solid ${C.border}`,borderRadius:8,padding:10,fontSize:13,resize:'none',outline:'none'}} placeholder="메모를 입력하세요..."/>
        </div>
        <div style={{display:'flex',gap:10,marginTop:20}}>
          <button style={{flex:1,padding:'10px',background:C.primary,color:'#fff',border:'none',borderRadius:8,cursor:'pointer',fontWeight:600,fontSize:14}}>PDF 다운로드</button>
          <button style={{flex:1,padding:'10px',background:`${C.primary}15`,color:C.primary,border:'none',borderRadius:8,cursor:'pointer',fontWeight:600,fontSize:14}}>POD 전송</button>
        </div>
      </div>
    </>
  );
}

// ── CountUp ────────────────────────────────────────────
function CountUp({end,suffix=''}){
  const [v,setV]=useState(0);
  useEffect(()=>{let s=0;const step=end/(1200/16);const t=setInterval(()=>{s+=step;if(s>=end){setV(end);clearInterval(t);}else setV(Math.floor(s));},16);return()=>clearInterval(t);},[end]);
  return<span style={{animation:'countUp 400ms ease'}}>{v.toLocaleString()}{suffix}</span>;
}

// ── Hero Banner ────────────────────────────────────────
function HeroBanner({tab}){

    main:{title:'PDF 자동 생성 파이프라인',icon:'🖨️',kpis:[{l:'총 생성 건수',v:2847,s:'건'},{l:'이번 달 생성',v:312,s:'건'},{l:'평균 생성 시간',v:28,s:'초'},{l:'성공률',v:99,s:'%'}]},
    layout:{title:'페이지 레이아웃 에디터',icon:'📐',kpis:[{l:'등록 템플릿',v:24,s:'개'},{l:'커스텀 폰트',v:8,s:'개'},{l:'레이아웃 프리셋',v:16,s:'개'},{l:'최근 수정',v:3,s:'일 전'}]},
    color:{title:'CMYK 색공간 변환 관리',icon:'🎨',kpis:[{l:'변환 완료',v:1842,s:'장'},{l:'처리 대기',v:12,s:'장'},{l:'ICC 프로파일',v:3,s:'개'},{l:'오류율',v:0.2,s:'%'}]},
    preview:{title:'PDF 미리보기 & 최종 검증',icon:'🔍',kpis:[{l:'검증 완료',v:218,s:'건'},{l:'QR 삽입 완료',v:218,s:'건'},{l:'다운로드',v:196,s:'건'},{l:'POD 전송',v:22,s:'건'}]},
  };
  const m=meta[tab]||meta.main;
  return(
    <div style={{background:`linear-gradient(135deg, ${C.primary} 0%, ${C.secondary} 60%, ${C.accent} 100%)`,padding:'28px 32px',color:'#fff'}}>
      <div style={{display:'flex',alignItems:'center',gap:12,marginBottom:16}}>
        <span style={{fontSize:28}}>{m.icon}</span>
        <h1 style={{fontSize:22,fontWeight:800,letterSpacing:'-0.02em'}}>{m.title}</h1>
      </div>

        {m.kpis.map((k,i)=>(
          <div key={k.l} style={{animation:`slideUp 400ms ease ${i*80}ms both`}}>
            <div style={{fontSize:12,opacity:0.8,marginBottom:4}}>{k.l}</div>
            <div style={{fontSize:26,fontWeight:800}}><CountUp end={k.v} suffix={k.s}/></div>
          </div>
        ))}
      </div>
    </div>
  );
}

// ── Tab: PDF 생성 워크플로우 ────────────────────────────
const JOBS=[
  {id:'JOB-2847',name:'나연이의 우주 탐험',status:'완료',date:'2026-05-04',pages:22,images:20,size:'18.4MB'},
  {id:'JOB-2846',name:'지우의 숲 속 친구들',status:'완료',date:'2026-05-04',pages:22,images:20,size:'21.1MB'},
  {id:'JOB-2845',name:'준서의 바다 이야기',status:'생성중',date:'2026-05-04',pages:22,images:20,size:'-'},
  {id:'JOB-2844',name:'하은이와 별나라 여행',status:'대기',date:'2026-05-03',pages:22,images:20,size:'-'},
  {id:'JOB-2843',name:'민준의 공룡 왕국',status:'완료',date:'2026-05-03',pages:22,images:20,size:'19.7MB'},
  {id:'JOB-2842',name:'수아의 꽃밭 모험',status:'오류',date:'2026-05-03',pages:22,images:20,size:'-'},
];
const STEPS=[
  {n:'이미지 전처리',d:'sRGB→CMYK 변환, ICC 프로파일 적용, 블리드 영역 계산',icon:'🖼️',done:true},
  {n:'레이아웃 조립',d:'표지·내지 페이지 순서 배치, 텍스트·이미지 포지셔닝',icon:'📑',done:true},
  {n:'폰트 임베딩',d:'OTF/TTF 커스텀 폰트 서브셋 생성 및 PDF 삽입',icon:'🔤',done:true},
  {n:'PDF 렌더링',d:'ReportLab 엔진으로 최종 인쇄 규격 PDF 출력',icon:'📄',done:false},
];

function TabMain({onToast}){
  const [drawer,setDrawer]=useState(null);
  const [modal,setModal]=useState(false);
  const [creating,setCreating]=useState(false);
  const statusColor={완료:C.success,생성중:C.secondary,대기:C.textSub,오류:C.danger};

  function handleCreate(){
    setCreating(true);
    setTimeout(()=>{setCreating(false);setModal(false);onToast('새 PDF 생성 작업이 큐에 추가되었습니다.');},1800);
  }

  return(
    <div style={{animation:'fadeIn 300ms ease'}}>
      {/* 파이프라인 단계 */}
      <div style={{marginBottom:28}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16}}>
          <h3 style={{fontSize:16,fontWeight:700,color:C.text}}>생성 파이프라인 단계</h3>
          <span style={{fontSize:12,color:C.textSub}}>JOB-2845 진행 중...</span>
        </div>
        <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:14}}>
          {STEPS.map((s,i)=>(
            <div key={s.n} style={{background:s.done?`${C.primary}08`:C.surface,border:`1px solid ${s.done?C.primary+'40':C.border}`,borderRadius:12,padding:16,animation:`slideUp 400ms ease ${i*80}ms both`,boxShadow:`0 2px 8px rgba(0,0,0,0.06)`}}>
              <div style={{fontSize:22,marginBottom:8}}>{s.icon}</div>
              <div style={{fontSize:13,fontWeight:700,color:s.done?C.primary:C.text,marginBottom:4}}>{s.n}</div>
              <div style={{fontSize:11,color:C.textSub,lineHeight:1.5}}>{s.d}</div>
              {s.done
                ?<div style={{marginTop:10,fontSize:11,color:C.success,fontWeight:600}}>✓ 완료</div>
                :<div style={{marginTop:10,height:4,background:`${C.primary}20`,borderRadius:2,overflow:'hidden'}}>
                  <div style={{height:'100%',width:'60%',background:C.secondary,borderRadius:2,animation:'barGrow 2s ease infinite'}}/>
                </div>
              }
            </div>
          ))}
        </div>
      </div>

      {/* 생성 이력 테이블 */}
      <div style={{background:C.surface,borderRadius:14,boxShadow:'0 4px 16px rgba(0,0,0,0.08)',overflow:'hidden'}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'18px 20px',borderBottom:`1px solid ${C.border}`}}>
          <h3 style={{fontSize:15,fontWeight:700,color:C.text}}>생성 이력</h3>
          <button onClick={()=>setModal(true)} style={{background:C.primary,color:'#fff',border:'none',borderRadius:8,padding:'8px 18px',fontSize:13,fontWeight:600,cursor:'pointer'}}>+ 새 PDF 생성</button>
        </div>
        <table style={{width:'100%',borderCollapse:'collapse'}}>
          <thead><tr style={{background:`${C.bg}`}}>

            ))}

          <tbody>
            {JOBS.map((j,i)=>(

                <td style={{padding:'13px 16px',fontSize:14,fontWeight:500,color:C.text}}>{j.name}</td>
                <td style={{padding:'13px 16px',fontSize:13,color:C.textSub,fontFamily:'monospace'}}>{j.id}</td>
                <td style={{padding:'13px 16px'}}>
                  <span style={{background:`${statusColor[j.status]}20`,color:statusColor[j.status],padding:'3px 10px',borderRadius:20,fontSize:12,fontWeight:600}}>
                    {j.status==='생성중'?<span style={{animation:'pulse 1.5s infinite'}}>{j.status}</span>:j.status}
                  </span>
                </td>
                <td style={{padding:'13px 16px',fontSize:13,color:C.text}}>{j.pages}p</td>
                <td style={{padding:'13px 16px',fontSize:13,color:C.textSub}}>{j.date}</td>
                <td style={{padding:'13px 16px',fontSize:13,color:C.text}}>{j.size}</td>
                <td style={{padding:'13px 16px'}}>

              <label style={{fontSize:13,fontWeight:600,color:C.textSub,display:'block',marginBottom:6}}>동화책 제목</label>

            <div>

            <div>

                <div style={{fontSize:13,color:C.textSub}}>클릭 또는 드래그하여 업로드</div>

              </div>

            <div>

              <div style={{border:`2px dashed ${C.border}`,borderRadius:10,padding:'20px',textAlign:'center',cursor:'pointer',background:`${C.primary}04`}}>
                <div style={{fontSize:22,marginBottom:6}}>📋</div>
                <div style={{fontSize:13,color:C.textSub}}>story.json 파일 업로드</div>
              </div>
            </div>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:14}}>
              <div>
                <label style={{fontSize:13,fontWeight:600,color:C.textSub,display:'block',marginBottom:6}}>PDF 엔진</label>

                  <option>fpdf2</option>

              </div>

              {creating?<span style={{animation:'pulse 1s infinite'}}>⚙️ 생성 큐에 추가 중...</span>:'PDF 생성 시작'}
            </button>

        </Modal>
      )}

  );
}

// ── Tab: 레이아웃 에디터 ───────────────────────────────
const FONTS=[
  {name:'나눔고딕',type:'OTF',size:'1.2MB',pages:22,status:'활성'},
  {name:'Gmarket Sans',type:'OTF',size:'0.8MB',pages:18,status:'활성'},
  {name:'배달의민족 연성',type:'TTF',size:'2.1MB',pages:8,status:'활성'},
  {name:'Apple SD Gothic Neo',type:'System',size:'-',pages:5,status:'시스템'},
];
function TabLayout({onToast}){

  return(

      </header>

      {/* 히어로 배너 */}
      <HeroBanner tab={tab}/>

      {/* 콘텐츠 */}
      <main style={{flex:1,padding:28,maxWidth:1200,width:'100%',margin:'0 auto',alignSelf:'stretch',boxSizing:'border-box'}}>
        {tab==='main'&&<TabMain onToast={setToast}/>}
        {tab==='layout'&&<TabLayout onToast={setToast}/>}
        {tab==='color'&&<TabColor onToast={setToast}/>}
        {tab==='preview'&&<TabPreview onToast={setToast}/>}
      </main>

      {toast&&<Toast msg={toast} onClose={()=>setToast(null)}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
