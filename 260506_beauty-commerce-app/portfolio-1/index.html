function CountUp({end, suffix='', duration=1100}) {
  const [val, setVal] = useState(0);
  useEffect(() => {
    let cur = 0;
    const step = end / (duration / 16);
    const t = setInterval(() => {
      cur += step;
      if (cur >= end) { setVal(end); clearInterval(t); }
      else setVal(Math.floor(cur));
    }, 16);
    return () => clearInterval(t);
  }, [end]);
  return <span style={{animation:'countUp 400ms ease'}}>{val.toLocaleString()}{suffix}</span>;
}

  useEffect(() => { const t = setTimeout(onClose, 3000); return () => clearTimeout(t); }, []);

}

function ProductCard({product, index, onDetail}) {

  const disc = Math.round((1 - product.price / product.orig) * 100);
  return (
    <div onClick={() => onDetail(product)} style={{background:C.surface,borderRadius:16,overflow:'hidden',
      cursor:'pointer',boxShadow:'0 4px 16px rgba(233,30,140,0.08)',transition:'all 200ms',

            fontWeight:t.id===activeTab ? 700 : 400,cursor:'pointer',fontSize:13,transition:'all 150ms'}}>
            {t.label}
          </button>
        ))}
      </div>
      {activeTab==='orders' && (
        <div style={{display:'flex',flexDirection:'column',gap:12}}>
          {ORDERS.map((o,i) => (
            <div key={o.id} style={{background:C.surface,borderRadius:14,padding:18,display:'flex',
              alignItems:'center',justifyContent:'space-between',boxShadow:'0 2px 8px rgba(233,30,140,0.06)',
              animation:`slideUp 300ms ease ${i*80}ms both`}}>
              <div>
                <div style={{fontSize:11,color:C.textSecondary,marginBottom:4}}>{o.id} · {o.date}</div>
                <div style={{fontSize:14,fontWeight:600,color:C.textPrimary}}>{o.name}</div>
              </div>
              <div style={{textAlign:'right'}}>
                <div style={{fontSize:16,fontWeight:700,color:C.primary,marginBottom:6}}>{o.price.toLocaleString()}원</div>
                <span style={{padding:'4px 12px',borderRadius:20,background:`${o.sColor}20`,color:o.sColor,fontSize:11,fontWeight:600}}>{o.status}</span>
              </div>
            </div>
          ))}
        </div>
      )}
      {activeTab==='samples' && (
        <div style={{display:'flex',flexDirection:'column',gap:12}}>
          {SAMPLES.map((s,i) => (
            <div key={s.id} style={{background:C.surface,borderRadius:14,padding:18,display:'flex',
              justifyContent:'space-between',alignItems:'center',boxShadow:'0 2px 8px rgba(233,30,140,0.06)',
              animation:`slideUp 300ms ease ${i*80}ms both`}}>
              <div>
                <div style={{fontSize:11,color:C.textSecondary,marginBottom:4}}>{s.id} · 신청일: {s.applied}</div>
                <div style={{fontSize:14,fontWeight:600,color:C.textPrimary}}>{s.name}</div>
                <div style={{fontSize:11,color:C.textSecondary,marginTop:4}}>{s.brand} · 리뷰 마감: {s.deadline}</div>
              </div>
              <span style={{padding:'6px 14px',borderRadius:20,background:`${C.primary}15`,color:C.primary,fontSize:12,fontWeight:600}}>{s.status}</span>
            </div>
          ))}
          <button onClick={() => onToast('샘플 신청 페이지로 이동합니다')} style={{padding:'12px',background:C.surface,
            color:C.primary,border:`2px dashed ${C.primary}`,borderRadius:12,fontWeight:600,fontSize:14,cursor:'pointer'}}>
            + 새 샘플 신청하기
          </button>
        </div>
      )}
      {activeTab==='notify' && (
        <div style={{background:C.surface,borderRadius:16,padding:20,boxShadow:'0 2px 8px rgba(233,30,140,0.06)'}}>
          <h4 style={{fontSize:14,fontWeight:700,color:C.textPrimary,marginBottom:16}}>앱 푸시 알림 설정</h4>
          {Object.keys(notify).map((k,i) => (
            <div key={k} style={{display:'flex',alignItems:'center',justifyContent:'space-between',
              padding:'12px 0',borderBottom:`1px solid ${C.border}`}}>
              <span style={{fontSize:13,color:C.textPrimary}}>{k}</span>
              <button onClick={() => setNotify(n => ({...n, [k]:!n[k]}))} style={{width:44,height:24,borderRadius:12,
                background:notify[k] ? C.primary : '#E2E8F0',border:'none',cursor:'pointer',position:'relative',transition:'background 200ms'}}>
                <div style={{position:'absolute',top:2,left:notify[k]?22:2,width:20,height:20,borderRadius:'50%',
                  background:'#fff',transition:'left 200ms',boxShadow:'0 2px 4px rgba(0,0,0,0.2)'}}/>
              </button>
            </div>
          ))}
        </div>
      )}
      {showEdit && (
        <Modal title="프로필 편집" onClose={() => setShowEdit(false)}>
          <div style={{display:'flex',flexDirection:'column',gap:16}}>
            <div style={{textAlign:'center',marginBottom:8}}>
              <div style={{width:80,height:80,borderRadius:'50%',background:`linear-gradient(135deg,${C.primary},${C.accent})`,
                display:'inline-flex',alignItems:'center',justifyContent:'center',fontSize:26,color:'#fff',fontWeight:700}}>김</div>
              <div style={{marginTop:8}}><button style={{fontSize:12,color:C.primary,fontWeight:600,background:'none',border:'none',cursor:'pointer'}}>프로필 사진 변경</button></div>
            </div>
            {[{l:'닉네임',v:'김민지'},{l:'이메일',v:'minj_beauty@email.com'},{l:'소개',v:'뷰티 크리에이터 | 스킨케어 전문'}].map(f => (
              <div key={f.l}>
                <label style={{fontSize:12,fontWeight:600,color:C.textPrimary,display:'block',marginBottom:6}}>{f.l}</label>
                <input defaultValue={f.v} style={{width:'100%',padding:'10px 14px',border:`1px solid ${C.border}`,borderRadius:8,fontSize:13,outline:'none',fontFamily:'Pretendard'}}/>
              </div>
            ))}
            <button onClick={() => { setShowEdit(false); onToast('프로필이 저장되었습니다'); }} style={{padding:'12px',
              background:`linear-gradient(135deg,${C.primary},${C.secondary})`,
              color:'#fff',border:'none',borderRadius:10,fontWeight:700,fontSize:14,cursor:'pointer'}}>
              저장하기
            </button>
          </div>
        </Modal>
      )}
    </div>
  );
}

function SearchPage({onDetail}) {
  const [query, setQuery] = useState('');
  const [cat, setCat] = useState('전체');
  const cats = ['전체','스킨케어','메이크업','헤어케어','바디케어'];
  const results = PRODUCTS.filter(p => {
    const matchCat = cat==='전체' || p.category===cat;
    const matchQ = !query || p.name.includes(query) || p.brand.includes(query);
    return matchCat && matchQ;
  });
  return (
    <div style={{maxWidth:1200,margin:'0 auto',padding:'28px 32px',animation:'fadeIn 300ms ease'}}>
      <div style={{position:'relative',marginBottom:24}}>
        <input value={query} onChange={e => setQuery(e.target.value)}
          placeholder="브랜드명, 상품명, 성분으로 검색..."
          style={{width:'100%',padding:'14px 20px 14px 52px',border:`2px solid ${C.primary}`,
            borderRadius:16,fontSize:15,outline:'none',fontFamily:'Pretendard',
            background:C.surface,boxShadow:'0 4px 20px rgba(233,30,140,0.1)'}}/>
        <span style={{position:'absolute',left:16,top:'50%',transform:'translateY(-50%)',fontSize:20}}>🔍</span>
      </div>
      <div style={{display:'flex',gap:8,marginBottom:24,flexWrap:'wrap'}}>
        {cats.map(c => (
          <button key={c} onClick={() => setCat(c)} style={{padding:'8px 18px',borderRadius:20,
            border:`2px solid ${c===cat ? C.primary : C.border}`,
            background:c===cat ? C.primary : 'transparent',
            color:c===cat ? '#fff' : C.textSecondary,
            fontWeight:c===cat ? 700 : 400,cursor:'pointer',fontSize:13,transition:'all 150ms'}}>
            {c}
          </button>
        ))}
      </div>
      {results.length > 0 ? (
        <>
          <p style={{fontSize:13,color:C.textSecondary,marginBottom:16}}>총 <strong style={{color:C.primary}}>{results.length}개</strong>의 상품이 검색되었습니다</p>
          <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:20}}>
            {results.map((p,i) => <ProductCard key={p.id} product={p} index={i} onDetail={onDetail}/>)}
          </div>
        </>
      ) : (
        <div style={{textAlign:'center',padding:'60px 0',color:C.textSecondary}}>
          <div style={{fontSize:52,marginBottom:16}}>🔍</div>
          <div style={{fontSize:16,fontWeight:600,color:C.textPrimary}}>검색 결과가 없습니다</div>
          <div style={{fontSize:13,marginTop:8}}>다른 키워드나 카테고리로 검색해 보세요</div>
        </div>
      )}
    </div>
  );
}

const HERO_META = {
  '홈': {title:'K-뷰티를 발견하고 쇼핑하세요',subtitle:'크리에이터가 추천하는 진짜 뷰티 상품',kpis:[{v:2847,s:'+',l:'등록 상품'},{v:124,s:'개',l:'파트너 브랜드'},{v:3892,s:'명',l:'크리에이터'}]},
  '상품 상세': {title:'뷰티 상품 컬렉션',subtitle:'브랜드별 인기 상품을 탐색하고 구매하세요',kpis:[{v:2847,s:'+',l:'전체 상품'},{v:47,s:'개',l:'이번 주 신상'},{v:4.8,s:'점',l:'평균 평점'}]},
  '장바구니': {title:'나의 장바구니',subtitle:'선택한 상품을 확인하고 결제하세요',kpis:[{v:2,s:'개',l:'담긴 상품'},{v:142,s:'천원',l:'총 금액'},{v:17,s:'천원',l:'할인 혜택'}]},
  '마이페이지': {title:'나의 뷰티 활동',subtitle:'구매·샘플·적립 내역을 한눈에 확인하세요',kpis:[{v:3,s:'건',l:'총 구매'},{v:2,s:'건',l:'샘플 신청'},{v:12400,s:'P',l:'적립 포인트'}]},
  '검색': {title:'상품 검색',subtitle:'원하는 뷰티 상품을 빠르게 찾아보세요',kpis:[{v:2847,s:'+',l:'검색 가능 상품'},{v:124,s:'개',l:'등록 브랜드'},{v:12,s:'개',l:'오늘 신상'}]},
};

function App() {
  const [tab, setTab] = useState('홈');
  const [drawer, setDrawer] = useState(null);
  const [toast, setToast] = useState(null);
  const showToast = msg => setToast(msg);
  const meta = HERO_META[tab];
  const navBtn = (id) => ({padding:'8px 14px',borderRadius:8,border:'none',background:tab===id?`${C.primary}12`:'transparent',color:tab===id?C.primary:C.textSecondary,fontWeight:tab===id?700:400,cursor:'pointer',fontSize:13,transition:'all 150ms'});
  return (
    <div style={{display:'flex',flexDirection:'column',width:'100%',minHeight:'100vh',background:C.bg}}>
      {/* Top Nav */}
      <header style={{position:'sticky',top:0,zIndex:100,background:C.surface,
        borderBottom:`1px solid ${C.border}`,display:'flex',alignItems:'center',
        height:60,padding:'0 32px',gap:4,boxShadow:'0 2px 12px rgba(233,30,140,0.06)'}}>
        <div style={{display:'flex',alignItems:'center',gap:8,marginRight:16}}>
          <div style={{width:30,height:30,borderRadius:8,background:`linear-gradient(135deg,${C.primary},${C.accent})`,
            display:'flex',alignItems:'center',justifyContent:'center',fontSize:16}}>✨</div>
          <span style={{fontSize:17,fontWeight:800,color:C.primary}}>GlowPick</span>
        </div>
        <nav style={{display:'flex',gap:2}}>
          <button onClick={() => setTab('홈')} style={navBtn('홈')}>홈</button>
          <button onClick={() => setTab('상품 상세')} style={navBtn('상품 상세')}>상품 상세</button>
          <button onClick={() => setTab('장바구니')} style={navBtn('장바구니')}>장바구니</button>
          <button onClick={() => setTab('마이페이지')} style={navBtn('마이페이지')}>마이페이지</button>
          <button onClick={() => setTab('검색')} style={navBtn('검색')}>검색</button>
        </nav>
        <div style={{flex:1}}/>
        <div style={{display:'flex',alignItems:'center',gap:14}}>
          <span style={{fontSize:18,cursor:'pointer'}}>🔔</span>
          <div style={{width:34,height:34,borderRadius:'50%',
            background:`linear-gradient(135deg,${C.primary},${C.accent})`,
            display:'flex',alignItems:'center',justifyContent:'center',fontSize:13,color:'#fff',fontWeight:700,cursor:'pointer'}}>김</div>
        </div>
      </header>

      {/* Hero Banner */}
      <HeroBanner title={meta.title} subtitle={meta.subtitle} kpis={meta.kpis}/>

      {/* Page Content */}
      <main style={{flex:1}}>
        {tab==='홈' && <HomePage onDetail={setDrawer} onNav={setTab}/>}
        {tab==='상품 상세' && <ProductPage onToast={showToast}/>}
        {tab==='장바구니' && <CartPage onToast={showToast}/>}
        {tab==='마이페이지' && <MyPage onToast={showToast}/>}
        {tab==='검색' && <SearchPage onDetail={setDrawer}/>}
      </main>

      {/* Product Drawer */}
      <ProductDrawer item={drawer} onClose={() => setDrawer(null)} onAddCart={item => { setDrawer(null); showToast(`${item.name}을 장바구니에 담았습니다`); }}/>

      {/* Toast */}
      {toast && <Toast msg={toast} onClose={() => setToast(null)}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
