function CountUp({end, suffix='', duration=1100}) {
  const [val, setVal] = useState(0);
  useEffect(() => {
    let cur = 0;
    const step = end / (duration / 16);
    const t = setInterval(() => {
      cur += step;
      if (cur >= end) { setVal(end); clearInterval(t); }
      else setVal(Math.floor(cur));
    }, 16);
    return () => clearInterval(t);
  }, [end]);
  return <span style={{animation:'countUp 400ms ease'}}>{val.toLocaleString()}{suffix}</span>;
}

  useEffect(() => { const t = setTimeout(onClose, 3000); return () => clearTimeout(t); }, []);
  return (
    <div style={{position:'fixed',bottom:24,right:24,zIndex:9999,background:C.surface2,color:C.textPrimary,
      padding:'12px 24px',borderRadius:10,animation:'slideUp 300ms ease',
      boxShadow:'0 4px 20px rgba(0,0,0,0.5)',fontSize:14,fontWeight:500,
      border:`1px solid ${C.primary}`,display:'flex',alignItems:'center',gap:8}}>

  );
}

  brand: {title:'브랜드 관리', subtitle:'파트너 브랜드와의 협업 현황을 관리합니다'},
  settlement: {title:'정산 관리', subtitle:'월별 협업 정산 내역과 세금계산서를 관리합니다'},
  analytics: {title:'통계 분석', subtitle:'콘텐츠 성과와 수익 트렌드를 분석합니다'},
};

function App() {
  const [route, setRoute] = useState('main');
  const [toast, setToast] = useState(null);
  const showToast = msg => setToast(msg);
  const meta = PAGE_META[route] || PAGE_META.main;
  return (
    <div style={{display:'flex',flexDirection:'column',width:'100%',minHeight:'100vh',background:C.bg}}>
      {/* Global Nav */}
      <header style={{position:'sticky',top:0,zIndex:100,background:C.surface,
        borderBottom:`1px solid ${C.border}`,display:'flex',alignItems:'center',
        height:64,padding:'0 32px',gap:4,boxShadow:'0 4px 24px rgba(0,0,0,0.4)'}}>
        <div style={{display:'flex',alignItems:'center',gap:10,marginRight:20}}>
          <div style={{width:32,height:32,borderRadius:8,background:`linear-gradient(135deg,${C.primary},${C.secondary})`,
            display:'flex',alignItems:'center',justifyContent:'center',fontSize:16}}>✨</div>
          <span style={{fontSize:17,fontWeight:800,background:`linear-gradient(135deg,${C.primary},${C.secondary})`,WebkitBackgroundClip:'text',WebkitTextFillColor:'transparent'}}>GlowCreator</span>
        </div>
        <nav style={{display:'flex',gap:2}}>
          {NAV_ITEMS.map(n => (
            <button key={n.id} onClick={() => setRoute(n.id)} style={{padding:'8px 16px',borderRadius:8,border:'none',
              background:route===n.id ? `${C.primary}20` : 'transparent',
              color:route===n.id ? C.secondary : C.textSecondary,
              fontWeight:route===n.id ? 700 : 400,cursor:'pointer',fontSize:13,transition:'all 150ms'}}>
              {n.label}
            </button>
          ))}
        </nav>
        <div style={{flex:1}}/>
        <div style={{display:'flex',alignItems:'center',gap:14}}>
          <span style={{fontSize:18,cursor:'pointer'}}>🔔</span>
          <div style={{width:34,height:34,borderRadius:'50%',background:`linear-gradient(135deg,${C.primary},${C.secondary})`,
            display:'flex',alignItems:'center',justifyContent:'center',fontSize:13,color:'#fff',fontWeight:700,cursor:'pointer'}}>김</div>
        </div>
      </header>

      {/* Page Hero */}
      <div style={{background:`linear-gradient(135deg,${C.primary}30,${C.secondary}20,transparent)`,
        padding:'24px 32px',borderBottom:`1px solid ${C.border}`,animation:'fadeIn 300ms ease'}}>
        <h1 style={{fontSize:22,fontWeight:800,color:C.textPrimary,marginBottom:4}}>{meta.title}</h1>
        <p style={{fontSize:13,color:C.textSecondary}}>{meta.subtitle}</p>
      </div>

      {/* Page Content */}
      <main style={{flex:1}}>
        {route==='main' && <MainPage/>}
        {route==='sample' && <SamplePage onToast={showToast}/>}
        {route==='brand' && <BrandPage onToast={showToast}/>}
        {route==='settlement' && <SettlementPage onToast={showToast}/>}
        {route==='analytics' && <AnalyticsPage/>}
      </main>

      {/* Footer */}
      <footer style={{background:C.surface,borderTop:`1px solid ${C.border}`,padding:'24px 32px'}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
          <div style={{display:'flex',alignItems:'center',gap:10}}>
            <div style={{width:24,height:24,borderRadius:6,background:`linear-gradient(135deg,${C.primary},${C.secondary})`,display:'flex',alignItems:'center',justifyContent:'center',fontSize:12}}>✨</div>
            <span style={{fontSize:13,fontWeight:600,color:C.textSecondary}}>GlowCreator Platform</span>
          </div>
          <div style={{display:'flex',gap:24}}>
            {['이용약관','개인정보처리방침','서비스 문의'].map(l => (
              <span key={l} style={{fontSize:12,color:C.textSecondary,cursor:'pointer'}}>{l}</span>
            ))}
          </div>
          <span style={{fontSize:11,color:C.border}}>© 2025 GlowCreator. All rights reserved.</span>
        </div>
      </footer>

      {toast && <Toast msg={toast} onClose={() => setToast(null)}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
