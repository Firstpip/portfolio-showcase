function CountUp({ end, duration=1200, suffix='' }) {
  const [val, setVal] = useState(0);
  useEffect(() => {
    if (typeof end !== 'number') { setVal(end); return; }
    let start=0; const step=end/(duration/16);
    const t = setInterval(() => {
      start+=step;
      if(start>=end){setVal(end);clearInterval(t);} else setVal(Math.floor(start));
    },16);
    return ()=>clearInterval(t);
  },[end]);
  return <span style={{animation:'countUp 400ms ease'}}>{typeof val==='number'?val.toLocaleString():val}{suffix}</span>;
}

function TickerPage({ onToast }) {
  const [tickers, setTickers] = useState(TICKERS);
  const [showModal, setShowModal] = useState(false);
  const [newTicker, setNewTicker] = useState({code:'',name:'',sector:'',channel:''});

  const toggle = id => {
    setTickers(ts=>ts.map(t=>t.id===id?{...t,active:!t.active}:t));
    const t = tickers.find(t=>t.id===id);
    onToast(`${t.name} 수집 ${t.active?'비활성화':'활성화'}됨`);
  };

  const addTicker = () => {
    if(!newTicker.code||!newTicker.name) return;
    setTickers(ts=>[...ts,{...newTicker,id:Date.now(),active:true,llm:'gpt-4o-mini',calls:0,lastCall:'-'}]);
    setShowModal(false);
    onToast(`${newTicker.name} (${newTicker.code}) 종목 등록 완료`);
    setNewTicker({code:'',name:'',sector:'',channel:''});

    <div style={{padding:'28px 32px',animation:'fadeIn 300ms ease'}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:20}}>

            )}
            <button onClick={()=>setShowDetail(null)} style={{flex:1,padding:'10px',background:C.bg,color:C.text,border:`1px solid ${C.border}`,borderRadius:8,fontWeight:600,cursor:'pointer'}}>닫기</button>
          </div>
        </Modal>
      )}
    </div>
  );
}

function SettingsPage({ onToast }) {
  const [settings, setSettings] = useState({
    apiEndpoint:'https://api.ir-data.com/v2/transcripts',
    llmDefault:'gpt-4o',
    rateLimit:100,
    retryMax:3,
    retryDelay:1000,
    botToken:'••••••••••••••••••••••',
    botName:'@IRSummaryBot',
    summaryMaxLen:1000,
    promptVersion:'v2.3',
  });

  const save = () => onToast('시스템 설정이 저장되었습니다');

  const Field = ({label,k,type='text'}) => (
    <div style={{marginBottom:16}}>
      <label style={{display:'block',fontSize:13,fontWeight:600,color:C.text,marginBottom:6}}>{label}</label>
      {type==='select' ? (
        <select value={settings[k]} onChange={e=>setSettings(p=>({...p,[k]:e.target.value}))}
          style={{width:'100%',padding:'10px 12px',border:`1px solid ${C.border}`,borderRadius:8,fontSize:14,outline:'none',color:C.text,background:C.surface}}>
          <option>gpt-4o</option><option>gpt-4o-mini</option><option>gemini-pro</option><option>gemini-flash</option>
        </select>
      ) : (
        <input type={type} value={settings[k]} onChange={e=>setSettings(p=>({...p,[k]:e.target.value}))}
          style={{width:'100%',padding:'10px 12px',border:`1px solid ${C.border}`,borderRadius:8,fontSize:14,outline:'none',color:C.text}}/>
      )}
    </div>
  );

  return (
    <div style={{padding:'28px 32px',animation:'fadeIn 300ms ease'}}>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:20}}>
        {[
          {title:'📡 데이터 수집 API',fields:[
            {label:'엔드포인트 URL',k:'apiEndpoint'},
            {label:'Rate Limit (분당 요청)',k:'rateLimit',type:'number'},
            {label:'최대 재시도 횟수',k:'retryMax',type:'number'},
            {label:'재시도 간격 (ms)',k:'retryDelay',type:'number'},
          ]},
          {title:'🤖 AI 요약 설정',fields:[
            {label:'기본 LLM 모델',k:'llmDefault',type:'select'},
            {label:'요약 최대 길이 (자)',k:'summaryMaxLen',type:'number'},
            {label:'프롬프트 버전',k:'promptVersion'},
          ]},
          {title:'📨 텔레그램 봇 설정',fields:[
            {label:'봇 토큰',k:'botToken'},
            {label:'봇 사용자명',k:'botName'},
          ]},
        ].map(sec=>(
          <div key={sec.title} style={{background:C.surface,borderRadius:12,padding:20,boxShadow:'0 1px 4px rgba(0,0,0,0.07)'}}>
            <div style={{fontSize:15,fontWeight:700,color:C.text,marginBottom:16}}>{sec.title}</div>
            {sec.fields.map(f=><Field key={f.k} {...f}/>)}
          </div>
        ))}

        <div style={{background:C.surface,borderRadius:12,padding:20,boxShadow:'0 1px 4px rgba(0,0,0,0.07)'}}>
          <div style={{fontSize:15,fontWeight:700,color:C.text,marginBottom:16}}>⚡ 연결 상태 테스트</div>
          {[
            {name:'IR API 연결', status:'정상', latency:'142ms', color:C.success},
            {name:'OpenAI API', status:'정상', latency:'286ms', color:C.success},
            {name:'Telegram Bot', status:'정상', latency:'58ms', color:C.success},
            {name:'PostgreSQL DB', status:'정상', latency:'12ms', color:C.success},
          ].map((c,i)=>(
            <div key={c.name} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'10px 0',borderBottom:`1px solid ${C.border}`,animation:`slideUp 400ms ease ${i*60}ms both`}}>
              <span style={{fontSize:13,color:C.text}}>{c.name}</span>
              <div style={{display:'flex',alignItems:'center',gap:8}}>
                <span style={{fontSize:11,color:C.textLight}}>{c.latency}</span>
                <span style={{padding:'2px 10px',background:'#E6F4EA',color:C.success,borderRadius:20,fontSize:11,fontWeight:600}}>{c.status}</span>
              </div>
            </div>
          ))}
          <button onClick={save} style={{marginTop:16,width:'100%',padding:'11px',background:'#EBF4FA',color:C.primary,border:`1px solid ${C.primaryLight}`,borderRadius:8,fontWeight:600,cursor:'pointer',fontSize:14}}>연결 재테스트</button>
        </div>
      </div>

      <div style={{marginTop:20,display:'flex',justifyContent:'flex-end',gap:12}}>
        <button style={{padding:'12px 24px',background:C.bg,color:C.text,border:`1px solid ${C.border}`,borderRadius:8,fontWeight:600,cursor:'pointer'}}>초기화</button>
        <button onClick={save} style={{padding:'12px 32px',background:C.primary,color:'#fff',border:'none',borderRadius:8,fontWeight:700,cursor:'pointer',fontSize:15}}>설정 저장</button>
      </div>
    </div>
  );
}

function App() {
  const [tab, setTab] = useState('dashboard');
  const [drawer, setDrawer] = useState(null);
  const [toast, setToast] = useState(null);
  const [pageKey, setPageKey] = useState(0);

  const navigate = t => { setTab(t); setPageKey(k=>k+1); };
  const showToast = msg => setToast(msg);

  const hero = PAGE_META[tab];

  const renderPage = () => {
    switch(tab) {
      case 'dashboard': return <DashboardPage />;
      case 'history':   return <HistoryPage onSelect={setDrawer}/>;
      case 'ticker':    return <TickerPage onToast={showToast}/>;
      case 'pipeline':  return <PipelinePage />;
      case 'settings':  return <SettingsPage onToast={showToast}/>;
    }
  };

  return (
    <div style={{minHeight:'100vh',background:C.bg,display:'flex',flexDirection:'column',width:'100%'}}>
      {/* 상단 수평 네비 */}
      <header style={{position:'sticky',top:0,zIndex:100,background:C.surface,borderBottom:`1px solid ${C.border}`,display:'flex',alignItems:'center',height:56,padding:'0 24px',gap:4}}>
        <div style={{display:'flex',alignItems:'center',gap:8,marginRight:20,minWidth:200}}>
          <div style={{width:32,height:32,borderRadius:8,background:C.primary,display:'flex',alignItems:'center',justifyContent:'center',fontSize:16}}>📡</div>
          <div>
            <div style={{fontSize:14,fontWeight:800,color:C.text,lineHeight:1}}>IR Summary</div>
            <div style={{fontSize:10,color:C.textLight,lineHeight:1.2}}>AI 요약 시스템</div>
          </div>
        </div>
        {TABS.map(t=>(
          <button key={t.id} onClick={()=>navigate(t.id)}
            style={{padding:'8px 14px',border:'none',borderRadius:6,background:tab===t.id?C.primaryLight:'transparent',color:tab===t.id?C.primary:C.textLight,fontWeight:tab===t.id?700:400,cursor:'pointer',fontSize:13,transition:'all 150ms',whiteSpace:'nowrap'}}>
            {t.label}
          </button>
        ))}
        <div style={{flex:1}}/>
        <div style={{display:'flex',alignItems:'center',gap:12}}>
          <div style={{display:'flex',alignItems:'center',gap:5,padding:'5px 10px',background:C.accentLight,borderRadius:6}}>
            <div style={{width:6,height:6,borderRadius:3,background:C.accent,animation:'pulse 2s infinite'}}/>
            <span style={{fontSize:11,color:C.accent,fontWeight:600}}>실시간</span>
          </div>
          <div style={{width:32,height:32,borderRadius:16,background:C.primary,display:'flex',alignItems:'center',justifyContent:'center',color:'#fff',fontSize:14,fontWeight:700}}>김</div>
        </div>
      </header>

      {/* 페이지 히어로 배너 */}
      <div style={{background:`linear-gradient(135deg, ${C.primary} 0%, ${C.secondary} 60%, ${C.accent} 100%)`,padding:'24px 32px',color:'#fff'}}>
        <h1 style={{fontSize:22,fontWeight:800,marginBottom:6}}>{hero.title}</h1>
        <p style={{fontSize:13,opacity:0.85,marginBottom:12}}>{hero.sub}</p>
        <div style={{display:'flex',gap:28}}>
          {hero.kpis.map(k=>(
            <div key={k.l} style={{display:'flex',flexDirection:'column'}}>
              <div style={{fontSize:22,fontWeight:800}}><CountUp end={typeof k.v==='number'?k.v:0}/>{typeof k.v!=='number'?k.v:''}{k.u}</div>
              <div style={{fontSize:11,opacity:0.8,marginTop:1}}>{k.l}</div>
            </div>
          ))}
        </div>
      </div>

      {/* 콘텐츠 */}
      <main style={{flex:1}} key={pageKey}>
        {renderPage()}
      </main>

      <Drawer item={drawer} onClose={()=>setDrawer(null)}/>
      {toast && <Toast msg={toast} onClose={()=>setToast(null)}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
