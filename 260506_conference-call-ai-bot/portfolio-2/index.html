function CountUp({ end, duration=1200, suffix='' }) {
  const [val, setVal] = useState(0);
  useEffect(() => {
    if(typeof end !== 'number'){setVal(end);return;}
    let start=0; const step=end/(duration/16);
    const t=setInterval(()=>{start+=step;if(start>=end){setVal(end);clearInterval(t);}else setVal(Math.floor(start));},16);
    return ()=>clearInterval(t);
  },[end]);
  return <span style={{animation:'countUp 400ms ease'}}>{typeof val==='number'?val.toLocaleString():val}{suffix}</span>;
}

function Toast({ msg, onClose }) {
  useEffect(()=>{const t=setTimeout(onClose,3000);return()=>clearTimeout(t);},[]);

}

        <Modal title="알림 규칙 추가" onClose={()=>setShowRuleModal(false)}>
          {[['규칙 이름','text','예: 반도체 종목 모니터링'],['최소 품질 점수','number','예: 70'],['키워드 (쉼표 구분)','text','예: HBM, CAPEX']].map(([label,type,ph])=>(
            <div key={label} style={{marginBottom:16}}>
              <label style={{display:'block',fontSize:13,fontWeight:600,color:C.text,marginBottom:6}}>{label}</label>
              <input type={type} placeholder={ph} style={{width:'100%',padding:'10px 12px',border:`1px solid ${C.border}`,borderRadius:8,fontSize:14,background:C.surface,color:C.text,outline:'none'}}/>
            </div>
          ))}
          <div style={{marginBottom:16}}>
            <label style={{display:'block',fontSize:13,fontWeight:600,color:C.text,marginBottom:8}}>발송 채널</label>
            <div style={{display:'flex',gap:10}}>
              {['telegram','email','slack'].map(ch=>(
                <label key={ch} style={{display:'flex',alignItems:'center',gap:6,cursor:'pointer'}}>
                  <input type="checkbox" defaultChecked={ch==='telegram'}/> <span style={{fontSize:13,color:C.textLight}}>{ch}</span>
                </label>
              ))}
            </div>
          </div>
          <div style={{display:'flex',gap:10,paddingTop:8}}>
            <button onClick={()=>{setShowRuleModal(false);onToast('알림 규칙이 추가되었습니다');}} style={{flex:1,padding:'12px',background:C.primary,color:'#fff',border:'none',borderRadius:8,fontWeight:700,cursor:'pointer'}}>추가</button>
            <button onClick={()=>setShowRuleModal(false)} style={{flex:1,padding:'12px',background:C.surface2,color:C.text,border:`1px solid ${C.border}`,borderRadius:8,fontWeight:600,cursor:'pointer'}}>취소</button>
          </div>
        </Modal>
      )}
    </div>
  );
}

function AnalyticsPage() {
  const HEATMAP = [
    {company:'삼성전자', weeks:[[82,85,88,91,95],[72,78,81,85,91],[60,65,68,72,79],[70,74,78,80,88]]},
    {company:'SK하이닉스', weeks:[[70,74,76,79,82],[65,68,72,75,80],[58,62,65,68,74],[68,70,73,76,81]]},
  ];

  const heatColor = v => {
    if(v>=85) return C.success;
    if(v>=70) return C.secondary;
    if(v>=55) return C.warning;
    return C.danger;
  };

  return (
    <div style={{padding:'36px 40px',animation:'fadeIn 300ms ease'}}>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:20,marginBottom:28}}>
        <div style={{background:C.surface,borderRadius:14,padding:24,border:`1px solid ${C.border}`}}>
          <div style={{marginBottom:16}}>
            <div style={{fontSize:15,fontWeight:700,color:C.text}}>키워드 트렌드 누적 (TimescaleDB)</div>
            <div style={{fontSize:12,color:C.textLight,marginTop:2}}>주요 키워드 주간 언급 빈도</div>
          </div>
          <div style={{marginBottom:12}}>
            {KEYWORD_DATA.slice(0,5).map((k,i)=>(
              <div key={k.keyword} style={{marginBottom:12,animation:`slideUp 400ms ease ${i*60}ms both`}}>
                <div style={{display:'flex',justifyContent:'space-between',marginBottom:5}}>
                  <span style={{fontSize:13,color:C.text}}>{k.keyword}</span>
                  <div style={{display:'flex',gap:8,alignItems:'center'}}>
                    <span style={{fontSize:11,fontWeight:600,color:k.trend==='↑'?C.success:k.trend==='↓'?C.danger:C.textLight}}>{k.delta}</span>
                    <span style={{fontSize:13,fontWeight:700,color:C.text}}>{k.count}</span>
                  </div>
                </div>
                <div style={{height:8,background:`${C.primary}20`,borderRadius:4,overflow:'hidden'}}>
                  <div style={{height:'100%',width:`${(k.count/50)*100}%`,background:`linear-gradient(90deg, ${C.primary}, ${C.secondary})`,borderRadius:4,'--target-width':`${(k.count/50)*100}%`,animation:`barGrow 1000ms ease ${i*80+200}ms both`}}/>
                </div>
              </div>
            ))}
          </div>
        </div>

        <div style={{background:C.surface,borderRadius:14,padding:24,border:`1px solid ${C.border}`}}>
          <div style={{marginBottom:16}}>
            <div style={{fontSize:15,fontWeight:700,color:C.text}}>감성 점수 추이 (상세)</div>
            <div style={{fontSize:12,color:C.textLight,marginTop:2}}>긍정/중립/부정 주간 비율</div>
          </div>
          <ResponsiveContainer width="100%" height={220}>
            <AreaChart data={SENTIMENT_DATA} margin={{top:5,right:10,left:-20,bottom:0}}>
              <defs>
                <linearGradient id="gPos" x1="0" y1="0" x2="0" y2="1">
                  <stop offset="5%" stopColor={C.success} stopOpacity={0.3}/>
                  <stop offset="95%" stopColor={C.success} stopOpacity={0}/>
                </linearGradient>
              </defs>
              <CartesianGrid strokeDasharray="3 3" stroke={C.border}/>
              <XAxis dataKey="week" tick={{fontSize:11,fill:C.textLight}} axisLine={false} tickLine={false}/>
              <YAxis tick={{fontSize:11,fill:C.textLight}} axisLine={false} tickLine={false}/>
              <Tooltip contentStyle={{background:C.surface2,border:`1px solid ${C.border}`,borderRadius:8,fontSize:12,color:C.text}}/>
              <Area type="monotone" dataKey="pos" name="긍정" stroke={C.success} fill="url(#gPos)" strokeWidth={2.5}/>
              <Line type="monotone" dataKey="neg" name="부정" stroke={C.danger} strokeWidth={2} dot={false} strokeDasharray="4 2"/>
            </AreaChart>
          </ResponsiveContainer>
        </div>
      </div>

      {/* 종목-키워드 히트맵 */}
      <div style={{background:C.surface,borderRadius:14,padding:24,border:`1px solid ${C.border}`}}>
        <div style={{marginBottom:16,display:'flex',justifyContent:'space-between',alignItems:'center'}}>
          <div>
            <div style={{fontSize:15,fontWeight:700,color:C.text}}>종목 × 주간 감성 히트맵</div>
            <div style={{fontSize:12,color:C.textLight,marginTop:2}}>주별 감성 점수 · 진할수록 긍정</div>
          </div>
          <div style={{display:'flex',gap:8,alignItems:'center',fontSize:11,color:C.textLight}}>
            <span style={{padding:'2px 8px',background:`${C.danger}30`,color:C.danger,borderRadius:4}}>미흡</span>
            <span style={{padding:'2px 8px',background:`${C.warning}30`,color:C.warning,borderRadius:4}}>보통</span>
            <span style={{padding:'2px 8px',background:`${C.secondary}30`,color:C.secondary,borderRadius:4}}>양호</span>
            <span style={{padding:'2px 8px',background:`${C.success}30`,color:C.success,borderRadius:4}}>우수</span>
          </div>
        </div>
        <div style={{overflowX:'auto'}}>
          {HEATMAP.map((row,ri)=>(
            <div key={row.company} style={{display:'flex',alignItems:'center',gap:8,marginBottom:10,animation:`slideUp 400ms ease ${ri*80}ms both`}}>
              <div style={{width:100,fontSize:12,fontWeight:600,color:C.text,flexShrink:0}}>{row.company}</div>
              {row.weeks[0].map((v,ci)=>(
                <div key={ci} style={{flex:1,padding:'10px 6px',borderRadius:8,background:`${heatColor(v)}20`,border:`1px solid ${heatColor(v)}40`,textAlign:'center',transition:'all 200ms',cursor:'pointer'}}
                  onMouseEnter={e=>{e.currentTarget.style.background=`${heatColor(v)}30`;e.currentTarget.style.transform='scale(1.05)';}}
                  onMouseLeave={e=>{e.currentTarget.style.background=`${heatColor(v)}20`;e.currentTarget.style.transform='scale(1)';}}>
                  <div style={{fontSize:14,fontWeight:800,color:heatColor(v)}}>{v}</div>
                  <div style={{fontSize:10,color:C.textLight,marginTop:2}}>주{ci+1}</div>
                </div>
              ))}
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

function Footer() {
  return (
    <footer style={{background:C.surface,borderTop:`1px solid ${C.border}`,padding:'40px 40px 28px',marginTop:40}}>
      <div style={{display:'grid',gridTemplateColumns:'2fr 1fr 1fr 1fr',gap:32,maxWidth:1200,margin:'0 auto',marginBottom:28}}>
        <div>
          <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:12}}>
            <div style={{width:32,height:32,borderRadius:8,background:C.primary,display:'flex',alignItems:'center',justifyContent:'center',fontSize:16}}>📡</div>
            <span style={{fontSize:16,fontWeight:800,color:C.text}}>IR Intelligence</span>
          </div>
          <p style={{fontSize:13,color:C.textLight,lineHeight:1.7,maxWidth:260}}>AI 기반 IR 컨퍼런스 콜 자동 요약 및 인텔리전스 분석 플랫폼을 설계·구현합니다.</p>
        </div>
        {[
          {title:'플랫폼',items:['대시보드','AI 품질 평가','구독 관리','알림 설정']},
          {title:'기능',items:['컨퍼런스 콜 수집','LLM 요약 파이프라인','트렌드 분석','멀티 채널 알림']},
          {title:'지원',items:['API 문서','운영 매뉴얼','자가 유지보수 가이드','기술 지원']},
        ].map(col=>(
          <div key={col.title}>
            <div style={{fontSize:12,fontWeight:700,color:C.textLight,textTransform:'uppercase',letterSpacing:'0.06em',marginBottom:12}}>{col.title}</div>
            {col.items.map(item=>(
              <div key={item} style={{fontSize:13,color:C.textLight,marginBottom:7,cursor:'pointer',transition:'color 150ms'}}
                onMouseEnter={e=>e.currentTarget.style.color=C.text}
                onMouseLeave={e=>e.currentTarget.style.color=C.textLight}>{item}</div>
            ))}
          </div>
        ))}
      </div>
      <div style={{borderTop:`1px solid ${C.border}`,paddingTop:20,display:'flex',justifyContent:'space-between',alignItems:'center'}}>
        <span style={{fontSize:12,color:C.textLight}}>IR 인텔리전스 플랫폼 — 구현 데모</span>
        <div style={{display:'flex',gap:10}}>
          {['React','FastAPI','TimescaleDB','Bull Queue','OpenAI API'].map(t=>(
            <span key={t} style={{padding:'2px 8px',background:C.surface2,color:C.textLight,borderRadius:20,fontSize:10,border:`1px solid ${C.border}`}}>{t}</span>
          ))}
        </div>
      </div>
    </footer>
  );
}

function App() {
  const [route, setRoute] = useState('home');
  const [pageKey, setPageKey] = useState(0);
  const [toast, setToast] = useState(null);

  const navigate = r => { setRoute(r); setPageKey(k=>k+1); };
  const showToast = msg => setToast(msg);

  const renderPage = () => {
    switch(route) {
      case 'home':         return <HomePage onNav={navigate}/>;
      case 'quality':      return <QualityPage onToast={showToast}/>;
      case 'subscription': return <SubscriptionPage onToast={showToast}/>;
      case 'notification': return <NotificationPage onToast={showToast}/>;
      case 'analytics':    return <AnalyticsPage/>;
    }
  };

  return (
    <div style={{minHeight:'100vh',background:C.bg,display:'flex',flexDirection:'column',width:'100%'}}>
      {/* 글로벌 네비 */}
      <header style={{position:'sticky',top:0,zIndex:100,background:`${C.surface}E0`,backdropFilter:'blur(12px)',borderBottom:`1px solid ${C.border}`,display:'flex',alignItems:'center',height:64,padding:'0 40px',gap:8}}>
        <div style={{display:'flex',alignItems:'center',gap:10,marginRight:24,cursor:'pointer'}} onClick={()=>navigate('home')}>
          <div style={{width:36,height:36,borderRadius:10,background:`linear-gradient(135deg, ${C.primary}, ${C.secondary})`,display:'flex',alignItems:'center',justifyContent:'center',fontSize:18}}>📡</div>
          <div>
            <div style={{fontSize:15,fontWeight:800,color:C.text,lineHeight:1}}>IR Intelligence</div>
            <div style={{fontSize:10,color:C.textLight,lineHeight:1.3}}>AI 인텔리전스 플랫폼</div>
          </div>
        </div>

        <nav style={{display:'flex',gap:2,flex:1}}>
          {NAV.map(n=>(
            <button key={n.id} onClick={()=>navigate(n.id)}
              style={{padding:'8px 16px',border:'none',borderRadius:8,background:route===n.id?C.primaryDim:'transparent',color:route===n.id?C.primary:C.textLight,fontWeight:route===n.id?700:400,cursor:'pointer',fontSize:13,transition:'all 150ms'}}>
              {n.label}
            </button>
          ))}
        </nav>

        <div style={{display:'flex',alignItems:'center',gap:12}}>
          <div style={{display:'flex',alignItems:'center',gap:6,padding:'5px 12px',background:`${C.secondary}15`,borderRadius:20,border:`1px solid ${C.secondary}30`}}>
            <div style={{width:6,height:6,borderRadius:3,background:C.secondary,animation:'pulse 2s infinite'}}/>
            <span style={{fontSize:11,color:C.secondary,fontWeight:600}}>API 연결 중</span>
          </div>
          <div style={{width:34,height:34,borderRadius:17,background:`linear-gradient(135deg, ${C.primary}, ${C.secondary})`,display:'flex',alignItems:'center',justifyContent:'center',color:'#fff',fontSize:14,fontWeight:700}}>김</div>
        </div>
      </header>

      {/* 페이지 콘텐츠 */}
      <main style={{flex:1}} key={pageKey}>
        {renderPage()}
      </main>

      <Footer/>
      {toast && <Toast msg={toast} onClose={()=>setToast(null)}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
