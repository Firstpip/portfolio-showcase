<head>

<title>채점 기준·통계 통합 관리 플랫폼 — 구현 데모</title>
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" rel="stylesheet">
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html, body { width:100%; height:100%; font-family:'Pretendard',sans-serif; background:#0F172A; color:#F1F5F9; }
#root { display:flex; flex-direction:column; width:100%; min-height:100vh; }

@keyframes fadeIn { from{opacity:0} to{opacity:1} }
@keyframes fadeInScale { from{opacity:0;transform:scale(0.96)} to{opacity:1;transform:scale(1)} }
@keyframes slideInRight { from{opacity:0;transform:translateX(30px)} to{opacity:1;transform:translateX(0)} }
@keyframes slideUp { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }
@keyframes ripple { 0%{transform:scale(0);opacity:0.5} 100%{transform:scale(4);opacity:0} }
@keyframes countUp { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
@keyframes shimmer { 0%{background-position:-200% 0} 100%{background-position:200% 0} }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.5} }
@keyframes barGrow { from{width:0%} to{width:var(--target-width)} }
@keyframes slideDown { from{opacity:0;transform:translateY(-10px);max-height:0} to{opacity:1;transform:translateY(0);max-height:500px} }
@keyframes progressFill { from{width:0} to{width:var(--fill-width)} }

.chart-canvas-wrap { position:relative; }
.chart-canvas-wrap canvas { width:100%!important; height:100%!important; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef } = React;

const C = {
  primary:'#6366F1', primaryLight:'rgba(99,102,241,0.15)', primaryDark:'#4F46E5',
  secondary:'#334155', accent:'#F59E0B', accentLight:'rgba(245,158,11,0.15)',
  green:'#10B981', greenLight:'rgba(16,185,129,0.15)',
  danger:'#EF4444', dangerLight:'rgba(239,68,68,0.15)',
  bg:'#0F172A', surface:'#1E293B', surface2:'#243044', border:'#334155',
  text:'#F1F5F9', textSub:'#94A3B8', textLight:'#64748B',
};

const NAV_ITEMS = [
  {id:'home',label:'홈'},
  {id:'grading',label:'채점 기준 관리'},
  {id:'members',label:'회원 관리'},
  {id:'analytics',label:'통계 분석'},
  {id:'dashboard',label:'대시보드'},
];

// ── CountUp ──────────────────────────────────────
function CountUp({end,duration=1200,suffix=''}) {
  const [val,setVal]=useState(0);
  useEffect(()=>{
    let s=0;const step=end/(duration/16);
    const t=setInterval(()=>{s+=step;if(s>=end){setVal(end);clearInterval(t);}else setVal(Math.floor(s));},16);
    return()=>clearInterval(t);
  },[end]);
  return <span style={{animation:'countUp 400ms ease'}}>{val.toLocaleString()}{suffix}</span>;
}

// ── Toast ──────────────────────────────────────
function Toast({message,type='success',onClose}) {
  useEffect(()=>{const t=setTimeout(onClose,3000);return()=>clearTimeout(t);},[]);
  const bg=type==='success'?C.green:type==='error'?C.danger:C.primary;
  return (
    <div style={{position:'fixed',bottom:24,right:24,zIndex:9999,background:bg,color:'#fff',
      padding:'12px 20px',borderRadius:10,animation:'slideUp 300ms ease',boxShadow:'0 4px 16px rgba(0,0,0,0.3)',
      display:'flex',alignItems:'center',gap:10,fontSize:14,fontWeight:600}}>
      <span>{type==='success'?'✓':type==='error'?'✕':'ℹ'}</span>{message}
    </div>
  );
}

// ── Modal ──────────────────────────────────────
function Modal({title,onClose,children,width=600}) {
  return (
    <div style={{position:'fixed',inset:0,zIndex:500,display:'flex',alignItems:'center',justifyContent:'center'}}>
      <div onClick={onClose} style={{position:'absolute',inset:0,background:'rgba(0,0,0,0.6)',animation:'fadeIn 200ms ease'}}/>
      <div style={{position:'relative',width,maxHeight:'85vh',background:C.surface,borderRadius:16,zIndex:501,
        animation:'fadeInScale 200ms ease',display:'flex',flexDirection:'column',boxShadow:'0 20px 60px rgba(0,0,0,0.4)',border:`1px solid ${C.border}`}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'20px 24px',borderBottom:`1px solid ${C.border}`}}>
          <h3 style={{fontSize:17,fontWeight:700,color:C.text}}>{title}</h3>
          <button onClick={onClose} style={{background:'none',border:'none',fontSize:20,cursor:'pointer',color:C.textSub,lineHeight:1}}>✕</button>
        </div>
        <div style={{padding:24,overflowY:'auto',flex:1}}>{children}</div>
      </div>
    </div>
  );
}

// ── KPI Card ──────────────────────────────────────
function KPICard({label,value,suffix='',sub,color=C.primary,icon,idx=0}) {
  return (
    <div style={{background:C.surface,borderRadius:14,padding:20,border:`1px solid ${C.border}`,
      animation:`slideUp 400ms ease ${idx*80}ms both`,transition:'all 200ms'}}
      onMouseEnter={e=>{e.currentTarget.style.borderColor=color;e.currentTarget.style.transform='translateY(-2px)';}}
      onMouseLeave={e=>{e.currentTarget.style.borderColor=C.border;e.currentTarget.style.transform='';}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:14}}>
        <div style={{fontSize:12,color:C.textSub,fontWeight:600,letterSpacing:'0.05em',textTransform:'uppercase'}}>{label}</div>
        <div style={{width:32,height:32,borderRadius:8,background:color+'20',display:'flex',alignItems:'center',justifyContent:'center',fontSize:16}}>{icon}</div>
      </div>
      <div style={{fontSize:30,fontWeight:800,color:color,marginBottom:6}}>
        <CountUp end={value} suffix={suffix}/>
      </div>
      {sub&&<div style={{fontSize:12,color:C.textSub}}>{sub}</div>}
    </div>
  );
}

  {id:5,title:'VBA 자동화 입문',publisher:'영진닷컴',problems:27,submissions:12,avgScore:65,color:'#8B5CF6'},

            <button key={item.id} onClick={()=>setRoute(item.id)} title={item.label}
              style={{padding:'7px 14px',border:'none',borderRadius:8,fontSize:13,fontWeight:route===item.id?700:500,cursor:'pointer',
                background:route===item.id?C.primaryLight:'none',color:route===item.id?C.primary:C.textSub,transition:'all 150ms'}}>
              {item.label}
            </button>
          ))}
        </nav>
        <div style={{flex:1}}/>
        <div style={{display:'flex',alignItems:'center',gap:10}}>
          <div style={{fontSize:12,color:C.textSub}}>한빛미디어 관리자</div>
          <div style={{width:34,height:34,borderRadius:'50%',background:`linear-gradient(135deg,${C.primary},${C.primaryDark})`,
            display:'flex',alignItems:'center',justifyContent:'center',fontSize:12,color:'#fff',fontWeight:700,cursor:'pointer'}}>한</div>
        </div>
      </header>

      {/* Main Content */}
      <main style={{flex:1,padding:'28px 32px',maxWidth:1400,width:'100%',alignSelf:'center'}}>
        {route==='home'&&<HomePage setRoute={setRoute}/>}
        {route==='grading'&&<GradingPage/>}
        {route==='members'&&<MembersPage/>}
        {route==='analytics'&&<AnalyticsPage/>}
        {route==='dashboard'&&<DashboardPage/>}
      </main>

      {/* Footer */}
      <footer style={{background:C.surface,borderTop:`1px solid ${C.border}`,padding:'28px 32px',marginTop:24}}>
        <div style={{maxWidth:1400,margin:'0 auto',display:'grid',gridTemplateColumns:'2fr 1fr 1fr 1fr',gap:32}}>
          <div>
            <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:10}}>
              <div style={{width:24,height:24,borderRadius:6,background:C.primary,display:'flex',alignItems:'center',justifyContent:'center',fontSize:12}}>📋</div>
              <span style={{fontSize:13,fontWeight:800}}>채점 관리 플랫폼</span>
            </div>
            <p style={{fontSize:12,color:C.textSub,lineHeight:1.7}}>도서 연동형 엑셀·액세스 실습 자동 채점 시스템.<br/>출판사·교육 담당자를 위한 통합 관리 솔루션입니다.</p>
          </div>
          {[['서비스',['채점 기준 관리','통계 분석','회원 관리']],['지원',['도움말','API 문서','1:1 문의']],['법률',['이용약관','개인정보처리방침','서비스 정책']]].map(([title,items])=>(
            <div key={title}>
              <div style={{fontSize:12,fontWeight:700,color:C.textSub,marginBottom:10,textTransform:'uppercase',letterSpacing:'0.05em'}}>{title}</div>
              {items.map(item=><div key={item} style={{fontSize:12,color:C.textLight,marginBottom:6,cursor:'pointer'}}>{item}</div>)}
            </div>
          ))}
        </div>
        <div style={{maxWidth:1400,margin:'20px auto 0',paddingTop:16,borderTop:`1px solid ${C.border}`,fontSize:11,color:C.textLight}}>
          © 2026 채점 관리 플랫폼. 구현 데모 — 실제 서비스가 아닙니다.
        </div>
      </footer>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
