function CountUp({end,suffix='',prefix=''}){
  const [v,setV]=React.useState(0);
  React.useEffect(()=>{
    let s=0;const step=end/(1000/16);
    const t=setInterval(()=>{s+=step;if(s>=end){setV(end);clearInterval(t);}else setV(Math.floor(s));},16);
    return()=>clearInterval(t);
  },[end]);
  return <span style={{animation:'countUp 400ms ease'}}>{prefix}{v.toLocaleString()}{suffix}</span>;
}

function Toast({msg,onClose}){
  React.useEffect(()=>{const t=setTimeout(onClose,3000);return()=>clearTimeout(t);},[]);
  return(
    <div style={{position:'fixed',bottom:24,right:24,zIndex:9999,background:C.primary,color:'#fff',
      padding:'12px 24px',borderRadius:8,animation:'slideUp 300ms ease',boxShadow:'0 4px 16px rgba(0,0,0,0.2)',
      fontSize:14,fontWeight:500}}>
      {msg}
    </div>
  );
}

function EstimatePage({toast}){
  const [tab,setTab]=React.useState('관');
  const [cart,setCart]=React.useState({});
  const [showPdf,setShowPdf]=React.useState(false);
  const cats=Object.keys(PRODUCTS);

  const toggle=(item)=>{
    setCart(c=>{
      const catItems=PRODUCTS[tab];
      const newCart={...c};
      catItems.forEach(i=>{if(newCart[i.id])delete newCart[i.id];});
      if(c[item.id])delete newCart[item.id];
      else newCart[item.id]=item;
      return newCart;
    });
  };

  const total=Object.values(cart).reduce((s,i)=>s+i.price,0);
  const vat=Math.floor(total*0.1);
  const grandTotal=total+vat;

  return(
    <div style={{animation:'fadeIn 300ms ease',display:'grid',gridTemplateColumns:'1fr 320px',gap:20,minHeight:480}}>

        <div style={{padding:20}}>

            const selected=!!cart[item.id];
            return(
              <div key={item.id} onClick={()=>toggle(item)}
                style={{padding:16,borderRadius:12,marginBottom:12,cursor:'pointer',
                  border:`2px solid ${selected?C.accent:C.border}`,

            );
          })}

      </div>

              <span>소계</span><span>{total.toLocaleString()}원</span>
            </div>
            <div style={{display:'flex',justifyContent:'space-between',fontSize:12,color:C.ts,marginBottom:10}}>
              <span>부가세 (10%)</span><span>{vat.toLocaleString()}원</span>
            </div>
            <div style={{display:'flex',justifyContent:'space-between',fontSize:18,fontWeight:800,
              color:C.primary,paddingTop:10,borderTop:`2px solid ${C.border}`}}>
              <span>합계</span><span>{grandTotal.toLocaleString()}원</span>
            </div>
          </div>

          <div style={{marginTop:14,padding:'12px 14px',background:`${C.secondary}12`,borderRadius:10}}>
            <div style={{fontSize:11,color:C.ts,marginBottom:4}}>장례식장 견적 대비</div>
            <div style={{fontSize:13,fontWeight:600,color:C.secondary}}>
              평균 상조 대비 약 {Math.max(0,Math.floor((1800000-grandTotal)/10000)*10)}만원 절약 예상
            </div>
          </div>
        </div>

        <div style={{display:'flex',flexDirection:'column',gap:10}}>
          <button onClick={()=>toast('견적이 저장되었습니다.')} style={{padding:'12px 0',
            background:C.primary,border:'none',borderRadius:10,cursor:'pointer',
            fontWeight:600,fontSize:14,color:'#fff'}}>견적 저장</button>
          <button onClick={()=>setShowPdf(true)} style={{padding:'12px 0',
            background:C.surface,border:`1px solid ${C.border}`,borderRadius:10,cursor:'pointer',
            fontWeight:600,fontSize:14,color:C.tp}}>PDF 다운로드</button>
        </div>
      </div>

      {showPdf&&(
        <Modal title="견적서 PDF 미리보기" onClose={()=>setShowPdf(false)} width={520}>
          <div style={{padding:20,background:C.bg,borderRadius:10,marginBottom:16}}>
            <div style={{textAlign:'center',marginBottom:16}}>
              <div style={{fontSize:20,fontWeight:800,color:C.primary,marginBottom:4}}>정함 장례 플랫폼</div>
              <div style={{fontSize:13,color:C.ts}}>DIY 견적서</div>
            </div>
            <div style={{borderTop:`1px solid ${C.border}`,paddingTop:16}}>
              {Object.values(cart).map(item=>(
                <div key={item.id} style={{display:'flex',justifyContent:'space-between',
                  fontSize:13,marginBottom:8}}>
                  <span style={{color:C.tp}}>{item.name}</span>
                  <span style={{fontWeight:600,color:C.primary}}>{item.price.toLocaleString()}원</span>
                </div>
              ))}
              <div style={{borderTop:`2px solid ${C.border}`,marginTop:12,paddingTop:12,
                display:'flex',justifyContent:'space-between',fontSize:16,fontWeight:800,color:C.primary}}>
                <span>총 합계</span><span>{grandTotal.toLocaleString()}원</span>
              </div>
            </div>
          </div>
          <button onClick={()=>{setShowPdf(false);toast('PDF 다운로드가 시작되었습니다.');}}
            style={{width:'100%',padding:'12px 0',background:C.primary,border:'none',borderRadius:10,
              cursor:'pointer',fontWeight:600,fontSize:14,color:'#fff'}}>
            PDF 다운로드
          </button>
        </Modal>
      )}
    </div>
  );
}

function App(){

  const [contentKey,setContentKey]=React.useState(0);

  const showToast=(msg)=>{setToast(msg);};
  const nav=(t)=>{setTab(t);setContentKey(k=>k+1);};

  return(
    <div style={{display:'flex',flexDirection:'column',width:'100%',minHeight:'100vh',background:C.bg}}>
      {/* 상단 네비 */}

        borderBottom:`1px solid ${C.border}`,display:'flex',alignItems:'center',

          <div style={{width:30,height:30,borderRadius:8,background:`linear-gradient(135deg,${C.primary},${C.secondary})`,
            display:'flex',alignItems:'center',justifyContent:'center',fontSize:14}}>🌿</div>

        </div>
        {TABS.map(t=>(
          <button key={t.id} onClick={()=>nav(t.id)}
            title={t.label}

              cursor:'pointer',fontSize:13,fontWeight:tab===t.id?700:400,
              color:tab===t.id?C.primary:C.ts,borderRadius:8,transition:'all 150ms',
              borderBottom:tab===t.id?`2px solid ${C.primary}`:'2px solid transparent'}}>
            {t.label}
          </button>
        ))}
        <div style={{flex:1}}/>
        <div style={{display:'flex',alignItems:'center',gap:12}}>
          <div style={{padding:'7px 14px',background:C.bg,border:`1px solid ${C.border}`,
            borderRadius:8,display:'flex',alignItems:'center',gap:8,fontSize:13,color:C.ts}}>
            <span>🔍</span><span>검색</span>
          </div>
          <button style={{width:36,height:36,background:C.bg,border:`1px solid ${C.border}`,
            borderRadius:8,cursor:'pointer',fontSize:16,display:'flex',alignItems:'center',justifyContent:'center'}}>
            🔔
          </button>
          <div style={{width:34,height:34,borderRadius:'50%',
            background:`linear-gradient(135deg,${C.primary},${C.secondary})`,
            display:'flex',alignItems:'center',justifyContent:'center',color:'#fff',
            fontSize:13,fontWeight:700,cursor:'pointer'}}>김</div>
        </div>
      </header>

      {/* 히어로 배너 */}
      <div style={{background:`linear-gradient(135deg,${C.primary},${C.secondary})`,
        padding:'24px 32px',color:'#fff'}}>
        <div style={{maxWidth:1200,margin:'0 auto'}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
            <div>
              <div style={{fontSize:11,opacity:0.7,letterSpacing:'0.08em',textTransform:'uppercase',marginBottom:6}}>
                {TABS.find(t=>t.id===tab)?.icon} {TABS.find(t=>t.id===tab)?.label}
              </div>
              <h1 style={{fontSize:22,fontWeight:800,letterSpacing:'-0.02em',marginBottom:4}}>
                {tab==='main'&&'내 장례 설계 현황'}
                {tab==='facility-map'&&'주변 장례식장·화장장 탐색'}
                {tab==='ai-chat'&&'AI 장례지도사 상담'}
                {tab==='estimate'&&'DIY 장례 견적 산출'}
              </h1>
              <p style={{fontSize:13,opacity:0.8,fontWeight:400}}>
                {tab==='main'&&'현재 진행 중인 설계와 가족 분담 현황을 확인하세요'}
                {tab==='facility-map'&&'GPS 기반 1,100개 시설 DB — 거리순·평점순 정렬'}
                {tab==='ai-chat'&&'GPT-4o 기반 AI가 장례 절차와 비용을 안내합니다'}
                {tab==='estimate'&&'항목을 직접 선택하고 실시간 비용을 확인하세요'}
              </p>
            </div>
            <div style={{display:'flex',gap:32}}>
              {tab==='main'&&[

              {tab==='facility-map'&&[
                {label:'주변 시설',val:'38개'},
                {label:'검색 반경',val:'30km'},

                <div key={k.label} style={{textAlign:'center'}}>
                  <div style={{fontSize:22,fontWeight:800}}>{k.val}</div>
                  <div style={{fontSize:11,opacity:0.7}}>{k.label}</div>
                </div>
              ))}
              {tab==='ai-chat'&&[
                {label:'상담 횟수',val:'3회'},
                {label:'저장 메모',val:'1건'},
                {label:'AI 응답',val:'실시간'},

                <div key={k.label} style={{textAlign:'center'}}>

                  <div style={{fontSize:11,opacity:0.7}}>{k.label}</div>
                </div>
              ))}
              {tab==='estimate'&&[
                {label:'선택 항목',val:'0개'},
                {label:'현재 합계',val:'0원'},
                {label:'저장 견적',val:'1건'},

                <div key={k.label} style={{textAlign:'center'}}>

        <div key={contentKey} style={{animation:'fadeIn 300ms ease'}}>

      {toast&&<Toast msg={toast} onClose={()=>setToast(null)}/>}

}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
