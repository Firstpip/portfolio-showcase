*{margin:0;padding:0;box-sizing:border-box;}

#root{display:flex;flex-direction:column;width:100%;min-height:100vh;}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes fadeInScale{from{opacity:0;transform:scale(0.95)}to{opacity:1;transform:scale(1)}}
@keyframes slideInRight{from{opacity:0;transform:translateX(30px)}to{opacity:1;transform:translateX(0)}}
@keyframes slideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes ripple{0%{transform:scale(0);opacity:0.5}100%{transform:scale(4);opacity:0}}
@keyframes countUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.5}}
@keyframes barGrow{from{width:0%}to{width:var(--target-width)}}
@keyframes slideDown{from{opacity:0;transform:translateY(-10px);max-height:0}to{opacity:1;transform:translateY(0);max-height:500px}}
@keyframes glow{0%,100%{box-shadow:0 0 8px rgba(82,183,136,0.3)}50%{box-shadow:0 0 20px rgba(82,183,136,0.6)}}
@keyframes voicePulse{0%{transform:scale(1);opacity:1}50%{transform:scale(1.15);opacity:0.7}100%{transform:scale(1);opacity:1}}
/* spa-modern DNA: scale-based hover (P1과 차별화) */
.g-card{transition:all 220ms ease;}
.g-card:hover{transform:scale(1.02);box-shadow:0 12px 40px rgba(0,0,0,0.45)!important;}
.g-btn{transition:all 180ms ease;}
.g-btn:hover{transform:scale(1.03);filter:brightness(1.08);}
.g-item{transition:all 180ms ease;}
.g-item:hover{transform:scale(1.01);}
</style>
</head>

const C={

  border:'#2A4033',tp:'#E8F5EF',ts:'#95B8A5',
  success:'#52B788',warning:'#F5A623',danger:'#E74C3C',
  glow:'rgba(82,183,136,0.4)',
};

function Toast({msg,onClose}){
  React.useEffect(()=>{const t=setTimeout(onClose,3000);return()=>clearTimeout(t);},[]);
  return(
    <div style={{position:'fixed',bottom:24,right:24,zIndex:9999,
      background:'linear-gradient(135deg,#1B2D22,#243B2E)',color:C.tp,
      padding:'12px 24px',borderRadius:10,animation:'slideUp 300ms ease',
      boxShadow:`0 4px 20px rgba(0,0,0,0.4),0 0 0 1px ${C.border}`,
      fontSize:14,fontWeight:500}}>
      ✓ {msg}
    </div>
  );
}

function Modal({title,onClose,children,width=560}){
  return(
    <div style={{position:'fixed',inset:0,zIndex:500,display:'flex',alignItems:'center',justifyContent:'center'}}>
      <div onClick={onClose} style={{position:'absolute',inset:0,background:'rgba(0,0,0,0.7)',animation:'fadeIn 200ms ease'}}/>
      <div style={{position:'relative',width,maxHeight:'85vh',background:C.surface,borderRadius:14,zIndex:501,
        animation:'fadeInScale 200ms ease',display:'flex',flexDirection:'column',
        boxShadow:`0 20px 60px rgba(0,0,0,0.5),0 0 0 1px ${C.border}`}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',
          padding:'20px 24px',borderBottom:`1px solid ${C.border}`}}>
          <h3 style={{fontSize:17,fontWeight:700,color:C.tp}}>{title}</h3>
          <button onClick={onClose} style={{background:'none',border:'none',fontSize:20,cursor:'pointer',color:C.ts,lineHeight:1}}>✕</button>
        </div>
        <div style={{padding:24,overflowY:'auto',flex:1}}>{children}</div>
      </div>
    </div>
  );
}

function GravePage({toast}){
  const [budget,setBudget]=React.useState(200);
  const [region,setRegion]=React.useState('전체');
  const [type,setType]=React.useState('전체');
  const [loading,setLoading]=React.useState(false);
  const [results,setResults]=React.useState(GRAVE_DATA);
  const [selected,setSelected]=React.useState(null);

  const search=()=>{
    setLoading(true);
    setTimeout(()=>{
      const filtered=GRAVE_DATA.filter(g=>{
        const budgetOk=g.budget<=budget;
        const regionOk=region==='전체'||g.region===region;
        const typeOk=type==='전체'||g.type===type;
        return budgetOk&&regionOk&&typeOk;
      }).sort((a,b)=>b.score-a.score);
      setResults(filtered);
      setLoading(false);
    },800);
  };

  const scoreColor=(s)=>s>=90?C.success:s>=80?C.warning:C.danger;

  return(
    <div style={{animation:'fadeIn 300ms ease'}}>
      <div style={{background:`linear-gradient(135deg,${C.primary},${C.surface})`,
        padding:'32px',marginBottom:28,borderRadius:16,
        border:`1px solid ${C.border}`,position:'relative',overflow:'hidden'}}>
        <div style={{position:'absolute',inset:0,opacity:0.05,
          backgroundImage:`radial-gradient(circle at 70% 30%, ${C.secondary} 0%, transparent 60%)`}}/>
        <h2 style={{fontSize:20,fontWeight:800,color:C.tp,marginBottom:6}}>장지 추천 엔진</h2>
        <p style={{fontSize:13,color:C.ts,marginBottom:24}}>예산과 지역 조건에 맞는 최적의 장지를 AI가 추천합니다</p>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr auto',gap:16,alignItems:'end'}}>
          <div>
            <label style={{fontSize:12,color:C.ts,fontWeight:500,display:'block',marginBottom:8}}>
              예산 상한: <span style={{color:C.secondary,fontWeight:700}}>{budget}만원</span>
            </label>
            <input type="range" min={50} max={500} step={10} value={budget}
              onChange={e=>setBudget(Number(e.target.value))}
              style={{width:'100%',accentColor:C.secondary,height:4,cursor:'pointer'}}/>
            <div style={{display:'flex',justifyContent:'space-between',fontSize:10,color:C.ts,marginTop:4}}>
              <span>50만원</span><span>500만원</span>
            </div>
          </div>
          <div>
            <label style={{fontSize:12,color:C.ts,fontWeight:500,display:'block',marginBottom:8}}>지역 선택</label>
            <select value={region} onChange={e=>setRegion(e.target.value)}
              style={{width:'100%',padding:'10px 12px',borderRadius:10,
                border:`1px solid ${C.border}`,background:C.surface2,color:C.tp,
                fontSize:13,outline:'none',cursor:'pointer'}}>
              {['전체','서울','경기','인천','부산'].map(r=><option key={r} value={r}>{r}</option>)}
            </select>
          </div>
          <div>
            <label style={{fontSize:12,color:C.ts,fontWeight:500,display:'block',marginBottom:8}}>장지 유형</label>
            <div style={{display:'flex',gap:6,flexWrap:'wrap'}}>
              {['전체','납골당','수목장','해양장','자연장'].map(t=>(
                <button key={t} onClick={()=>setType(t)}
                  style={{padding:'8px 12px',borderRadius:8,border:`1px solid ${type===t?C.secondary:C.border}`,
                    background:type===t?`${C.secondary}20`:C.surface2,color:type===t?C.secondary:C.ts,
                    cursor:'pointer',fontSize:12,fontWeight:type===t?600:400,transition:'all 150ms'}}>
                  {t}
                </button>
              ))}
            </div>
          </div>
          <button onClick={search}
            style={{padding:'10px 24px',background:`linear-gradient(135deg,${C.primary},${C.secondary})`,
              border:'none',borderRadius:10,cursor:'pointer',fontWeight:700,fontSize:14,color:'#fff',
              whiteSpace:'nowrap',boxShadow:`0 4px 16px ${C.glow}`}}>
            추천 받기

        <div style={{textAlign:'center',padding:60}}>
          <div style={{fontSize:32,marginBottom:12,animation:'voicePulse 1s ease infinite'}}>🔍</div>
          <div style={{fontSize:15,color:C.ts}}>가중치 점수를 계산하는 중입니다...</div>
        </div>
      ):(
        <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:16}}>
          {results.map((g,i)=>(
            <div key={g.id} onClick={()=>setSelected(g)}
              style={{background:C.surface,borderRadius:14,overflow:'hidden',cursor:'pointer',
                border:`1px solid ${selected?.id===g.id?C.secondary:C.border}`,
                animation:`slideUp 400ms ease ${i*80}ms both`,transition:'all 200ms',
                boxShadow:selected?.id===g.id?`0 0 0 2px ${C.secondary}40,0 8px 24px rgba(0,0,0,0.3)`:'0 4px 16px rgba(0,0,0,0.2)'}}>
              <div style={{padding:'14px 16px 0',display:'flex',justifyContent:'space-between',alignItems:'flex-start'}}>
                <div style={{flex:1}}>
                  <div style={{display:'flex',gap:6,marginBottom:8,flexWrap:'wrap'}}>
                    <span style={{padding:'3px 8px',background:`${C.secondary}25`,color:C.secondary,
                      borderRadius:20,fontSize:11,fontWeight:600}}>{g.type}</span>
                    <span style={{padding:'3px 8px',background:`${C.border}`,color:C.ts,
                      borderRadius:20,fontSize:11}}>{g.region}</span>
                  </div>
                  <div style={{fontSize:14,fontWeight:700,color:C.tp,marginBottom:4,lineHeight:1.4}}>{g.name}</div>
                  <div style={{fontSize:12,color:C.ts}}>거리: {g.dist}km</div>
                </div>
                <div style={{textAlign:'center',flexShrink:0,marginLeft:12}}>
                  <div style={{fontSize:22,fontWeight:800,color:scoreColor(g.score)}}>{g.score}</div>
                  <div style={{fontSize:10,color:C.ts}}>종합점수</div>
                </div>
              </div>
              <div style={{padding:'10px 16px'}}>
                <div style={{display:'flex',gap:6,marginBottom:10,flexWrap:'wrap'}}>
                  {g.tags.map(t=>(
                    <span key={t} style={{padding:'2px 7px',background:`${C.accent}15`,color:C.accent,
                      borderRadius:20,fontSize:10}}>{t}</span>
                  ))}
                </div>
                <div style={{fontSize:12,color:C.ts,lineHeight:1.5,marginBottom:10}}>{g.desc.substring(0,50)}...</div>
              </div>
              <div style={{padding:'10px 16px',borderTop:`1px solid ${C.border}`,
                display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                <div>
                  <div style={{fontSize:13,fontWeight:700,color:C.secondary}}>{g.price}</div>
                  <div style={{fontSize:11,color:C.ts}}>{g.annual}</div>
                </div>
                <div style={{fontSize:11,color:C.ts}}>⭐ {g.rating}/5.0</div>
              </div>
            </div>
          ))}
          {results.length===0&&(
            <div style={{gridColumn:'1/-1',textAlign:'center',padding:60,color:C.ts}}>
              <div style={{fontSize:40,marginBottom:12}}>🔍</div>
              <div>조건에 맞는 장지가 없습니다. 예산 또는 지역 조건을 조정해보세요.</div>
            </div>
          )}
        </div>
      )}

      {selected&&(
        <Modal title="장지 상세 정보" onClose={()=>setSelected(null)} width={560}>
          <div style={{marginBottom:16}}>
            <div style={{display:'flex',gap:8,marginBottom:12,flexWrap:'wrap'}}>
              <span style={{padding:'4px 12px',background:`${C.secondary}25`,color:C.secondary,
                borderRadius:20,fontSize:13,fontWeight:600}}>{selected.type}</span>
              <span style={{padding:'4px 12px',background:C.surface2,color:C.ts,borderRadius:20,fontSize:13}}>
                ⭐ {selected.rating}/5.0
              </span>
              <span style={{padding:'4px 12px',background:`${scoreColor(selected.score)}20`,
                color:scoreColor(selected.score),borderRadius:20,fontSize:13,fontWeight:600}}>
                종합 {selected.score}점
              </span>
            </div>
            <p style={{fontSize:13,color:C.ts,lineHeight:1.7}}>{selected.desc}</p>
          </div>
          <div style={{marginBottom:16}}>
            <div style={{fontSize:13,fontWeight:600,color:C.tp,marginBottom:8}}>주요 서비스</div>
            {selected.features.map(f=>(
              <div key={f} style={{display:'flex',alignItems:'center',gap:8,padding:'8px 0',
                borderBottom:`1px solid ${C.border}`,fontSize:13,color:C.ts}}>
                <span style={{color:C.secondary}}>✓</span>{f}
              </div>
            ))}
          </div>
          <div style={{padding:14,background:C.surface2,borderRadius:10,marginBottom:16}}>
            <div style={{display:'flex',justifyContent:'space-between',marginBottom:6,fontSize:13}}>
              <span style={{color:C.ts}}>구입/안치 비용</span>
              <span style={{fontWeight:700,color:C.secondary}}>{selected.price}</span>
            </div>
            <div style={{display:'flex',justifyContent:'space-between',fontSize:13}}>
              <span style={{color:C.ts}}>연간 관리비</span>
              <span style={{fontWeight:600,color:C.tp}}>{selected.annual}</span>
            </div>
          </div>
          <div style={{display:'flex',gap:10}}>
            <button onClick={()=>{setSelected(null);toast('즐겨찾기에 추가되었습니다.');}}
              style={{flex:1,padding:'12px 0',background:C.surface2,border:`1px solid ${C.border}`,
                borderRadius:10,cursor:'pointer',fontWeight:600,fontSize:14,color:C.tp}}>
              즐겨찾기
            </button>
            <button onClick={()=>{setSelected(null);toast('1순위 장지로 선택되었습니다.');}}
              style={{flex:1,padding:'12px 0',
                background:`linear-gradient(135deg,${C.primary},${C.secondary})`,
                border:'none',borderRadius:10,cursor:'pointer',fontWeight:600,fontSize:14,color:'#fff'}}>
              1순위 선택
            </button>
          </div>
        </Modal>
      )}
    </div>
  );
}

function FamilyPaymentPage({toast}){
  const [members,setMembers]=React.useState(FAMILY_MEMBERS);
  const [showAdd,setShowAdd]=React.useState(false);
  const [newName,setNewName]=React.useState('');
  const [newRel,setNewRel]=React.useState('');
  const [payModal,setPayModal]=React.useState(null);
  const [payStep,setPayStep]=React.useState(1);
  const totalBudget=1240000;
  const paidAmount=members.filter(m=>m.paid).reduce((s,m)=>s+Math.floor(totalBudget*m.ratio/100),0);
  const pct=Math.round(paidAmount/totalBudget*100);

  const markPaid=(id)=>{
    setMembers(ms=>ms.map(m=>m.id===id?{...m,paid:true,amount:Math.floor(totalBudget*m.ratio/100)}:m));
    toast(`${members.find(m=>m.id===id)?.name}님의 결제가 완료되었습니다.`);
    setPayModal(null);
    setPayStep(1);
  };

  const addMember=()=>{
    if(!newName||!newRel)return;
    setMembers(ms=>[...ms,{id:Date.now(),name:newName,relation:newRel,avatar:'👤',ratio:0,paid:false,amount:0}]);
    setNewName('');setNewRel('');setShowAdd(false);

function VoicePage({toast}){
  const [active,setActive]=React.useState(false);
  const [recognized,setRecognized]=React.useState('');
  const [ttsRate,setTtsRate]=React.useState(1.0);
  const [ttsVol,setTtsVol]=React.useState(80);
  const [autoRead,setAutoRead]=React.useState(true);
  const [logs,setLogs]=React.useState([
    {cmd:'견적 보기',result:'견적 산출 화면으로 이동합니다.',time:'10:32'},
    {cmd:'지도 열기',result:'시설 탐색 화면으로 이동합니다.',time:'10:28'},
  ]);

  const COMMANDS=[
    {cmd:'장지 추천',desc:'장지 추천 화면으로 이동'},
    {cmd:'가족 결제',desc:'가족 분담 결제 화면 열기'},
    {cmd:'설계 이력',desc:'버전 히스토리 확인'},
    {cmd:'도움말',desc:'사용 가능한 명령어 목록'},
    {cmd:'현재 비용',desc:'현재 견적 합계 읽기'},
    {cmd:'처음으로',desc:'홈 화면으로 이동'},
  ];

  const toggleVoice=()=>{
    if(active){setActive(false);setRecognized('');return;}
    setActive(true);
    setTimeout(()=>{
      const samples=['장지 추천','가족 결제 현황 보여줘','현재 견적 합계 알려줘'];
      const picked=samples[Math.floor(Math.random()*samples.length)];
      setRecognized(picked);
      setTimeout(()=>{
        setLogs(l=>[{cmd:picked,result:`"${picked}" 명령을 인식하여 실행합니다.`,time:new Date().toLocaleTimeString('ko',{hour:'2-digit',minute:'2-digit'})},...l.slice(0,4)]);
        setActive(false);
        toast(`"${picked}" 명령이 실행되었습니다.`);
        setRecognized('');
      },1200);
    },1500);
  };

  return(
    <div style={{animation:'fadeIn 300ms ease',display:'grid',gridTemplateColumns:'1fr 1fr',gap:24}}>
      {/* 음성 인터페이스 */}
      <div>
        <div style={{background:C.surface,borderRadius:14,padding:28,marginBottom:16,
          border:`1px solid ${C.border}`,textAlign:'center',boxShadow:'0 4px 16px rgba(0,0,0,0.2)'}}>
          <div style={{fontSize:13,color:C.ts,marginBottom:20}}>
            Web Speech API 기반 · 한국어 최적화
          </div>
          {/* 마이크 버튼 */}
          <div style={{position:'relative',display:'inline-block',marginBottom:20}}>
            {active&&[1,2,3].map(r=>(
              <div key={r} style={{position:'absolute',inset:0,margin:'auto',
                width:80+r*30,height:80+r*30,borderRadius:'50%',
                border:`2px solid ${C.secondary}`,opacity:1/(r*1.5),
                transform:'translate(-50%,-50%)',left:'50%',top:'50%',
                animation:`voicePulse ${0.8+r*0.3}s ease infinite`}}/>
            ))}
            <button onClick={toggleVoice}
              style={{width:80,height:80,borderRadius:'50%',border:'none',cursor:'pointer',
                background:active?`linear-gradient(135deg,${C.danger},#c0392b)`:`linear-gradient(135deg,${C.primary},${C.secondary})`,
                fontSize:32,position:'relative',zIndex:1,transition:'all 300ms',
                boxShadow:active?`0 0 0 4px ${C.danger}40`:`0 4px 20px ${C.glow}`}}>
              {active?'🔴':'🎤'}
            </button>
          </div>
          <div style={{fontSize:15,fontWeight:600,color:active?C.secondary:C.ts,marginBottom:8,
            transition:'color 300ms'}}>
            {active?'음성 인식 중...':'마이크를 클릭하여 시작'}
          </div>
          {recognized&&(
            <div style={{padding:'12px 20px',background:`${C.secondary}20`,borderRadius:10,
              border:`1px solid ${C.secondary}50`,animation:'fadeInScale 300ms ease'}}>
              <div style={{fontSize:11,color:C.ts,marginBottom:4}}>인식된 명령</div>
              <div style={{fontSize:16,fontWeight:700,color:C.secondary}}>"{recognized}"</div>
            </div>
          )}
        </div>

        {/* TTS 설정 */}
        <div style={{background:C.surface,borderRadius:14,padding:20,
          border:`1px solid ${C.border}`,boxShadow:'0 4px 16px rgba(0,0,0,0.2)'}}>
          <h4 style={{fontSize:14,fontWeight:700,color:C.tp,marginBottom:16}}>TTS 음성 안내 설정</h4>
          <div style={{marginBottom:16}}>
            <div style={{display:'flex',justifyContent:'space-between',marginBottom:8}}>
              <label style={{fontSize:12,color:C.ts}}>읽기 속도</label>
              <span style={{fontSize:12,color:C.secondary,fontWeight:600}}>{ttsRate.toFixed(1)}x</span>
            </div>
            <input type="range" min={0.5} max={2.0} step={0.1} value={ttsRate}
              onChange={e=>setTtsRate(Number(e.target.value))}
              style={{width:'100%',accentColor:C.secondary,cursor:'pointer'}}/>
          </div>
          <div style={{marginBottom:16}}>
            <div style={{display:'flex',justifyContent:'space-between',marginBottom:8}}>
              <label style={{fontSize:12,color:C.ts}}>음량</label>
              <span style={{fontSize:12,color:C.secondary,fontWeight:600}}>{ttsVol}%</span>
            </div>
            <input type="range" min={0} max={100} step={5} value={ttsVol}
              onChange={e=>setTtsVol(Number(e.target.value))}
              style={{width:'100%',accentColor:C.secondary,cursor:'pointer'}}/>
          </div>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',
            padding:'12px 14px',background:C.surface2,borderRadius:10}}>
            <div>
              <div style={{fontSize:13,fontWeight:500,color:C.tp}}>화면 진입 시 자동 낭독</div>
              <div style={{fontSize:11,color:C.ts}}>새 화면 로드 시 주요 내용을 자동으로 읽습니다</div>
            </div>
            <div onClick={()=>setAutoRead(v=>!v)} style={{width:44,height:24,borderRadius:12,cursor:'pointer',
              background:autoRead?C.secondary:C.border,transition:'all 200ms',position:'relative'}}>
              <div style={{position:'absolute',top:2,left:autoRead?22:2,width:20,height:20,
                borderRadius:'50%',background:'#fff',transition:'left 200ms'}}/>
            </div>
          </div>
          <button onClick={()=>toast('설정이 저장되었습니다.')}
            style={{width:'100%',marginTop:14,padding:'11px 0',
              background:`linear-gradient(135deg,${C.primary},${C.secondary})`,
              border:'none',borderRadius:10,cursor:'pointer',fontWeight:600,fontSize:14,color:'#fff'}}>
            설정 저장
          </button>
        </div>
      </div>

      {/* 명령어 목록 + 인식 로그 */}
      <div>
        <div style={{background:C.surface,borderRadius:14,padding:20,marginBottom:16,
          border:`1px solid ${C.border}`,boxShadow:'0 4px 16px rgba(0,0,0,0.2)'}}>
          <h4 style={{fontSize:14,fontWeight:700,color:C.tp,marginBottom:14}}>사용 가능 명령어</h4>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8}}>
            {COMMANDS.map((c,i)=>(
              <div key={c.cmd} style={{padding:'10px 12px',background:C.surface2,borderRadius:10,
                animation:`slideUp 300ms ease ${i*60}ms both`}}>
                <div style={{fontSize:12,fontWeight:700,color:C.secondary,marginBottom:3}}>
                  🎤 "{c.cmd}"
                </div>
                <div style={{fontSize:11,color:C.ts}}>{c.desc}</div>
              </div>
            ))}
          </div>
        </div>

        <div style={{background:C.surface,borderRadius:14,padding:20,
          border:`1px solid ${C.border}`,boxShadow:'0 4px 16px rgba(0,0,0,0.2)'}}>
          <h4 style={{fontSize:14,fontWeight:700,color:C.tp,marginBottom:14}}>음성 명령 이력</h4>
          {logs.map((l,i)=>(
            <div key={i} style={{padding:'10px 12px',background:C.surface2,borderRadius:10,marginBottom:8,
              animation:`slideUp 300ms ease ${i*80}ms both`}}>
              <div style={{display:'flex',justifyContent:'space-between',marginBottom:4}}>
                <span style={{fontSize:12,fontWeight:600,color:C.secondary}}>"{l.cmd}"</span>
                <span style={{fontSize:11,color:C.ts}}>{l.time}</span>
              </div>
              <div style={{fontSize:11,color:C.ts}}>{l.result}</div>
            </div>
          ))}
          <div style={{padding:'10px 12px',background:`${C.secondary}10`,borderRadius:10,
            border:`1px dashed ${C.secondary}40`,textAlign:'center',fontSize:12,color:C.ts}}>
            WAI-ARIA + NVDA / VoiceOver 호환
          </div>
        </div>
      </div>
    </div>
  );
}

                    display:'flex',alignItems:'center',justifyContent:'center',
                    fontSize:13,fontWeight:700,color:i===0?'#fff':C.ts,
                    boxShadow:i===0?`0 0 12px ${C.glow}`:'none'}}>
                    {h.ver}
                  </div>
                  <div style={{flex:1,background:C.surface,borderRadius:12,padding:14,
                    border:`1px solid ${selected?.id===h.id?C.secondary:C.border}`,
                    boxShadow:selected?.id===h.id?`0 0 0 2px ${C.secondary}30`:'none',
                    transition:'all 200ms'}}>
                    <div style={{display:'flex',justifyContent:'space-between',marginBottom:6}}>
                      <div style={{display:'flex',alignItems:'center',gap:8}}>
                        <span style={{fontSize:13,fontWeight:700,color:C.tp}}>{h.label}</span>
                        {i===0&&<span style={{padding:'2px 8px',background:`${C.secondary}25`,
                          color:C.secondary,borderRadius:20,fontSize:10,fontWeight:600}}>현재</span>}
                      </div>
                      <span style={{fontSize:11,color:C.ts}}>{h.date.split(' ')[0]}</span>
                    </div>
                    <div style={{fontSize:16,fontWeight:700,color:C.secondary,marginBottom:8}}>
                      {h.cost.toLocaleString()}원
                    </div>
                    <div style={{fontSize:11,color:C.ts}}>{h.changes.length}개 변경사항</div>
                  </div>
                </div>
              </div>
            ))}
          </div>

          <div>
            {selected?(
              <div style={{background:C.surface,borderRadius:14,padding:20,
                border:`1px solid ${C.border}`,boxShadow:'0 4px 16px rgba(0,0,0,0.2)'}}>
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16}}>
                  <h4 style={{fontSize:14,fontWeight:700,color:C.tp}}>{selected.label} 변경사항</h4>
                  <span style={{fontSize:13,color:C.secondary,fontWeight:600}}>
                    {selected.cost.toLocaleString()}원
                  </span>
                </div>
                {selected.changes.map((c,i)=>(
                  <div key={i} style={{display:'flex',gap:10,padding:'10px 12px',
                    background:C.surface2,borderRadius:10,marginBottom:8,
                    border:`1px solid ${typeColor(c.type)}30`,
                    animation:`slideUp 300ms ease ${i*80}ms both`}}>
                    <span style={{padding:'2px 8px',background:`${typeColor(c.type)}25`,
                      color:typeColor(c.type),borderRadius:6,fontSize:11,fontWeight:700,
                      flexShrink:0,height:'fit-content'}}>
                      {typeLabel(c.type)}
                    </span>
                    <span style={{fontSize:12,color:C.ts,lineHeight:1.6}}>{c.text}</span>
                  </div>
                ))}
                {selected.id!=='v3'&&(
                  <button onClick={()=>setRestoreModal(selected)}
                    style={{width:'100%',marginTop:12,padding:'11px 0',
                      background:`${C.warning}20`,border:`1px solid ${C.warning}50`,
                      borderRadius:10,cursor:'pointer',fontWeight:600,fontSize:13,color:C.warning}}>
                    이 버전으로 복원
                  </button>
                )}
              </div>
            ):(
              <div style={{background:C.surface,borderRadius:14,padding:40,textAlign:'center',
                border:`1px dashed ${C.border}`,color:C.ts}}>
                <div style={{fontSize:36,marginBottom:12}}>📋</div>
                <div style={{fontSize:13}}>타임라인에서 버전을 선택하면 변경사항을 확인할 수 있습니다.</div>
              </div>
            )}
          </div>
        </div>
      )}

      {mode==='compare'&&(
        <div>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12,marginBottom:20}}>
            {['A 버전 선택','B 버전 선택'].map((label,idx)=>(
              <div key={label}>
                <div style={{fontSize:12,color:C.ts,marginBottom:8,fontWeight:500}}>{label}</div>
                <div style={{display:'flex',flexDirection:'column',gap:8}}>
                  {HISTORY_DATA.map(h=>(
                    <div key={h.id} onClick={()=>idx===0?setCompareA(h):setCompareB(h)}
                      style={{padding:'10px 14px',background:C.surface,borderRadius:10,cursor:'pointer',
                        border:`1px solid ${(idx===0?compareA:compareB)?.id===h.id?C.secondary:C.border}`,
                        display:'flex',justifyContent:'space-between',transition:'all 150ms'}}>
                      <span style={{fontSize:13,fontWeight:600,color:C.tp}}>{h.label}</span>
                      <span style={{fontSize:12,color:C.secondary}}>{h.cost.toLocaleString()}원</span>
                    </div>
                  ))}
                </div>
              </div>
            ))}
          </div>

          {compareA&&compareB&&(
            <div style={{background:C.surface,borderRadius:14,padding:20,
              border:`1px solid ${C.border}`,boxShadow:'0 4px 16px rgba(0,0,0,0.2)'}}>
              <h4 style={{fontSize:14,fontWeight:700,color:C.tp,marginBottom:16}}>
                비용 변화: {compareA.cost.toLocaleString()}원 → {compareB.cost.toLocaleString()}원
                <span style={{fontSize:13,fontWeight:600,color:compareB.cost>compareA.cost?C.danger:C.success,marginLeft:12}}>
                  {compareB.cost>compareA.cost?'+':''}{(compareB.cost-compareA.cost).toLocaleString()}원
                </span>
              </h4>
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:16}}>
                {[{v:compareA,label:'A'},{v:compareB,label:'B'}].map(({v,label})=>(
                  <div key={label}>
                    <div style={{fontSize:12,color:C.ts,marginBottom:8,fontWeight:600}}>
                      {label}: {v.label}
                    </div>
                    {v.changes.map((c,i)=>(
                      <div key={i} style={{padding:'8px 10px',background:C.surface2,borderRadius:8,
                        marginBottom:6,border:`1px solid ${typeColor(c.type)}30`,
                        fontSize:11,color:C.ts,display:'flex',gap:8,alignItems:'flex-start'}}>
                        <span style={{color:typeColor(c.type),fontWeight:700,flexShrink:0}}>{typeLabel(c.type)}</span>
                        <span style={{lineHeight:1.5}}>{c.text}</span>
                      </div>
                    ))}
                  </div>
                ))}
              </div>
            </div>
          )}
        </div>
      )}

      {restoreModal&&(
        <Modal title="버전 복원 확인" onClose={()=>setRestoreModal(null)} width={420}>
          <div style={{textAlign:'center',padding:'20px 0'}}>
            <div style={{fontSize:40,marginBottom:12}}>⚠️</div>
            <p style={{fontSize:14,color:C.ts,lineHeight:1.7,marginBottom:20}}>
              <strong style={{color:C.tp}}>{restoreModal.label}</strong>으로 복원하면<br/>
              이후 변경사항이 모두 사라집니다.<br/>
              정말 복원하시겠습니까?
            </p>
            <div style={{display:'flex',gap:10}}>
              <button onClick={()=>setRestoreModal(null)}
                style={{flex:1,padding:'12px 0',background:C.surface2,border:`1px solid ${C.border}`,
                  borderRadius:10,cursor:'pointer',fontWeight:600,fontSize:14,color:C.ts}}>
                취소
              </button>
              <button onClick={()=>{setRestoreModal(null);toast(`${restoreModal.label}으로 복원되었습니다.`);}}
                style={{flex:1,padding:'12px 0',background:C.danger,border:'none',
                  borderRadius:10,cursor:'pointer',fontWeight:600,fontSize:14,color:'#fff'}}>
                복원 실행
              </button>
            </div>
          </div>
        </Modal>
      )}
    </div>
  );
}

}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
