function Toast({ message, onClose }) {
  React.useEffect(() => { const t = setTimeout(onClose, 3000); return () => clearTimeout(t); }, []);
  return (
    <div style={{ position:'fixed', bottom:24, right:24, zIndex:9999, background:C.primary, color:'#fff', padding:'12px 24px', borderRadius:8, animation:'slideUp 300ms ease', boxShadow:'0 4px 16px rgba(0,0,0,0.2)', fontSize:14 }}>
      {message}
    </div>
  );
}

        {tab==='application' && <ApplicationPage onInquiry={()=>setInquiry(true)} />}
        {tab==='search' && <SearchPage setDrawer={setDrawer} />}
        {tab==='library' && <LibraryPage setDrawer={setDrawer} onToast={showToast} />}
      </main>

      <footer style={{ background:C.primary, color:'#fff', padding:'32px', marginTop:'auto' }}>
        <div style={{ maxWidth:1100, margin:'0 auto', display:'grid', gridTemplateColumns:'2fr 1fr 1fr', gap:32 }}>
          <div>
            <div style={{ fontSize:18, fontWeight:800, marginBottom:8 }}>LifeGen Korea</div>
            <div style={{ fontSize:13, opacity:.7, lineHeight:1.7 }}>글로벌 생명과학 연구 장비 및 솔루션을 제공하는<br/>전문 기업입니다.</div>
          </div>
          <div>
            <div style={{ fontSize:13, fontWeight:700, marginBottom:10, opacity:.8 }}>솔루션</div>
            {['제품 카탈로그','응용분야','자료실','교육/웨비나'].map(l=><div key={l} style={{ fontSize:12, opacity:.7, marginBottom:6, cursor:'pointer' }}>{l}</div>)}
          </div>
          <div>
            <div style={{ fontSize:13, fontWeight:700, marginBottom:10, opacity:.8 }}>고객지원</div>
            {['문의하기','데모 신청','이용약관','개인정보처리방침'].map(l=><div key={l} style={{ fontSize:12, opacity:.7, marginBottom:6, cursor:'pointer' }}>{l}</div>)}
          </div>
        </div>
        <div style={{ maxWidth:1100, margin:'20px auto 0', borderTop:'1px solid rgba(255,255,255,0.2)', paddingTop:16, fontSize:11, opacity:.6 }}>© 2024 LifeGen Korea. All rights reserved.</div>
      </footer>

      <Drawer item={drawer} onClose={()=>setDrawer(null)} />
      {inquiry && <InquiryModal onClose={()=>setInquiry(false)} onToast={showToast} />}
      {toast && <Toast message={toast} onClose={()=>setToast(null)} />}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
