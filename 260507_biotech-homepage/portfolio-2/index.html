function Toast({ message, onClose }) {
  React.useEffect(() => { const t = setTimeout(onClose, 3000); return () => clearTimeout(t); }, []);

    <div style={{ position:'fixed', bottom:24, right:24, zIndex:9999, background:D.accent, color:'#fff', padding:'12px 24px', borderRadius:8, animation:'slideUp 300ms ease', boxShadow:'0 4px 16px rgba(0,0,0,0.3)', fontSize:14, fontWeight:600 }}>

  );
}

function CountUp({ end, suffix='' }) {
  const [val, setVal] = React.useState(0);
  React.useEffect(() => {
    let s=0; const step=end/60;
    const t=setInterval(()=>{ s+=step; if(s>=end){setVal(end);clearInterval(t);}else setVal(Math.floor(s)); },16);
    return ()=>clearInterval(t);
  }, [end]);
  return <span style={{ animation:'countUp 400ms ease' }}>{val.toLocaleString()}{suffix}</span>;
}

              <input defaultValue={editPopup.name} placeholder="팝업 제목 입력" style={{ width:'100%', background:D.surface2, border:`1px solid ${D.border}`, borderRadius:8, padding:'10px 12px', fontSize:13, color:D.text, outline:'none' }} />
            </div>
            <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:12 }}>
              <div>
                <label style={{ fontSize:12, color:D.textLight, display:'block', marginBottom:6 }}>시작일</label>
                <input type="date" defaultValue={editPopup.start?.replace(/\./g,'-')} style={{ width:'100%', background:D.surface2, border:`1px solid ${D.border}`, borderRadius:8, padding:'10px 12px', fontSize:13, color:D.text, outline:'none' }} />
              </div>
              <div>
                <label style={{ fontSize:12, color:D.textLight, display:'block', marginBottom:6 }}>종료일</label>
                <input type="date" defaultValue={editPopup.end?.replace(/\./g,'-')} style={{ width:'100%', background:D.surface2, border:`1px solid ${D.border}`, borderRadius:8, padding:'10px 12px', fontSize:13, color:D.text, outline:'none' }} />
              </div>
            </div>
            <div>
              <label style={{ fontSize:12, color:D.textLight, display:'block', marginBottom:6 }}>노출 타깃</label>
              <select defaultValue={editPopup.target} style={{ width:'100%', background:D.surface2, border:`1px solid ${D.border}`, borderRadius:8, padding:'10px 12px', fontSize:13, color:D.text, outline:'none' }}>
                <option>전체</option><option>세포 분석</option><option>유전체 분석</option><option>단백질 정제</option>
              </select>
            </div>
            <div style={{ display:'flex', alignItems:'center', gap:10 }}>
              <input type="checkbox" defaultChecked={editPopup.mobile} id="mobileChk" />
              <label htmlFor="mobileChk" style={{ fontSize:13, color:D.textMid, cursor:'pointer' }}>모바일 노출</label>
            </div>
            <div style={{ display:'flex', gap:10 }}>
              <button onClick={()=>setEditPopup(null)} style={{ flex:1, border:`1px solid ${D.border}`, background:'none', borderRadius:8, padding:10, fontSize:13, cursor:'pointer', color:D.textMid }}>취소</button>
              <button onClick={()=>{setEditPopup(null);onToast('팝업 설정이 저장되었습니다. Redis 캐시 무효화 완료.');}} style={{ flex:2, background:D.accent, color:'#fff', border:'none', borderRadius:8, padding:10, fontSize:13, fontWeight:700, cursor:'pointer' }}>저장 및 적용</button>
            </div>
          </div>
        </Modal>
      )}
      {editSeo && (
        <Modal title={`SEO 편집 — ${editSeo.page}`} onClose={()=>setEditSeo(null)}>
          <div style={{ display:'flex', flexDirection:'column', gap:14 }}>
            <div>
              <label style={{ fontSize:12, color:D.textLight, display:'block', marginBottom:6 }}>페이지 Title *</label>
              <input defaultValue={editSeo.title} style={{ width:'100%', background:D.surface2, border:`1px solid ${D.border}`, borderRadius:8, padding:'10px 12px', fontSize:13, color:D.text, outline:'none' }} />
            </div>
            <div>
              <label style={{ fontSize:12, color:D.textLight, display:'block', marginBottom:6 }}>Meta Description *</label>
              <textarea defaultValue={editSeo.desc} rows={3} style={{ width:'100%', background:D.surface2, border:`1px solid ${D.border}`, borderRadius:8, padding:'10px 12px', fontSize:13, color:D.text, outline:'none', resize:'vertical' }} />
            </div>
            <div>
              <label style={{ fontSize:12, color:D.textLight, display:'block', marginBottom:6 }}>OG Image URL</label>
              <input defaultValue={editSeo.og} style={{ width:'100%', background:D.surface2, border:`1px solid ${D.border}`, borderRadius:8, padding:'10px 12px', fontSize:13, color:D.text, outline:'none' }} />
            </div>
            <div style={{ display:'flex', gap:10 }}>
              <button onClick={()=>setEditSeo(null)} style={{ flex:1, border:`1px solid ${D.border}`, background:'none', borderRadius:8, padding:10, fontSize:13, cursor:'pointer', color:D.textMid }}>취소</button>
              <button onClick={()=>{setEditSeo(null);onToast('SEO 메타정보 저장 완료. Redis 캐시 무효화.');}} style={{ flex:2, background:D.accent, color:'#fff', border:'none', borderRadius:8, padding:10, fontSize:13, fontWeight:700, cursor:'pointer' }}>저장</button>
            </div>
          </div>
        </Modal>
      )}
    </div>
  );
}

function App() {
  const [route, setRoute] = React.useState('dashboard');
  const [toast, setToast] = React.useState(null);
  const [loading, setLoading] = React.useState(true);

  React.useEffect(() => { setTimeout(()=>setLoading(false), 1200); }, []);

  const showToast = msg => setToast(msg);

  const NAV = [
    { id:'dashboard', label:'대시보드', icon:'📊' },
    { id:'contents', label:'콘텐츠 관리', icon:'📦' },
    { id:'leads', label:'리드 관리', icon:'👥' },
    { id:'settings', label:'설정', icon:'⚙️' },
  ];

  if (loading) {
    return (
      <div style={{ display:'flex', flexDirection:'column', width:'100%', minHeight:'100vh', background:D.bg }}>
        <div style={{ height:64, background:D.surface, borderBottom:`1px solid ${D.border}` }} />
        <div style={{ padding:28, maxWidth:1100, margin:'0 auto', width:'100%' }}>
          <div style={{ display:'grid', gridTemplateColumns:'repeat(4,1fr)', gap:16, marginBottom:24 }}>
            {[0,1,2,3].map(i=><div key={i} style={{ height:100, borderRadius:12, background:'linear-gradient(90deg,#1E293B 25%,#2D3F57 50%,#1E293B 75%)', backgroundSize:'200% 100%', animation:'shimmer 1.5s infinite' }} />)}
          </div>
          {[0,1].map(i=><div key={i} style={{ height:220, borderRadius:12, marginBottom:16, background:'linear-gradient(90deg,#1E293B 25%,#2D3F57 50%,#1E293B 75%)', backgroundSize:'200% 100%', animation:'shimmer 1.5s infinite' }} />)}
        </div>
      </div>
    );
  }

  return (
    <div style={{ display:'flex', flexDirection:'column', width:'100%', minHeight:'100vh', background:D.bg }}>
      <header style={{ position:'sticky', top:0, zIndex:100, background:D.surface, borderBottom:`1px solid ${D.border}`, display:'flex', alignItems:'center', height:64, padding:'0 28px', gap:4 }}>
        <div style={{ display:'flex', alignItems:'center', gap:10, marginRight:16 }}>
          <div style={{ width:34, height:34, borderRadius:8, background:`linear-gradient(135deg, #0A3D6B, #10B981)`, display:'flex', alignItems:'center', justifyContent:'center', color:'#fff', fontSize:16, fontWeight:800 }}>L</div>
          <div>
            <div style={{ fontSize:14, fontWeight:800, color:D.text }}>LifeGen Admin</div>
            <div style={{ fontSize:10, color:D.textLight }}>콘텐츠 관리 플랫폼</div>
          </div>
        </div>
        <nav style={{ display:'flex', gap:2 }}>
          {NAV.map(n=>(
            <button key={n.id} onClick={()=>setRoute(n.id)} style={{ display:'flex', alignItems:'center', gap:6, padding:'8px 16px', borderRadius:8, border:'none', background:route===n.id?D.accentLight:'none', color:route===n.id?D.accent:D.textLight, cursor:'pointer', fontSize:13, fontWeight:route===n.id?700:400, transition:'all 150ms' }}>
              {n.label}
            </button>
          ))}
        </nav>
        <div style={{ flex:1 }} />
        <div style={{ display:'flex', alignItems:'center', gap:10 }}>
          <div style={{ position:'relative' }}>
            <button onClick={()=>showToast('알림 3건')} style={{ background:'none', border:'none', cursor:'pointer', fontSize:18, color:D.textLight, position:'relative' }}>🔔</button>
            <span style={{ position:'absolute', top:-2, right:-2, width:8, height:8, borderRadius:'50%', background:D.accent }} />
          </div>
          <div style={{ width:32, height:32, borderRadius:'50%', background:`linear-gradient(135deg,#0A3D6B,#10B981)`, display:'flex', alignItems:'center', justifyContent:'center', color:'#fff', fontSize:13, fontWeight:700, cursor:'pointer' }}>A</div>
        </div>
      </header>
      <main style={{ flex:1 }}>
        <div style={{ maxWidth:1100, margin:'0 auto', width:'100%' }}>
          {route==='dashboard' && <DashboardPage />}
          {route==='contents' && <ContentsPage onToast={showToast} />}
          {route==='leads' && <LeadsPage onToast={showToast} />}
          {route==='settings' && <SettingsPage onToast={showToast} />}
        </div>
      </main>
      {toast && <Toast message={toast} onClose={()=>setToast(null)} />}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
