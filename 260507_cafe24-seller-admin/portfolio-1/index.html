/* ─── CountUp Hook ─── */
function useCountUp(target, duration=1200){
  const [val, setVal] = useState(0);
  useEffect(()=>{
    let start=0; const step=target/60;
    const timer=setInterval(()=>{ start+=step; if(start>=target){setVal(target);clearInterval(timer);}else{setVal(Math.floor(start));} },duration/60);
    return()=>clearInterval(timer);
  },[target]);
  return val;
}

/* ─── StaggeredList ─── */
function StaggeredList({items, renderItem}){
  return items.map((item,i)=>(
    <div key={i} className="stagger-item" style={{animationDelay:`${i*60}ms`}}>{renderItem(item,i)}</div>
  ));
}

function Toast({msg,onHide}){
  useEffect(()=>{const t=setTimeout(onHide,2200);return()=>clearTimeout(t);},[]);
  return <div className="toast">✅ {msg}</div>;
}

/* ─── KPI Card ─── */
function KpiCard({icon,title,value,sub,color,numericVal}){
  const counted = useCountUp(numericVal||0, 900);
  const displayVal = numericVal ? (value.replace(String(numericVal), String(counted))) : value;
  return(
    <div className="kpi-card ripple-btn" style={{background:C.card,borderRadius:14,padding:'20px 22px',border:`1px solid ${C.border}`,flex:1,cursor:'default',transition:'transform .2s,box-shadow .2s'}}
      onMouseEnter={e=>{e.currentTarget.style.transform='translateY(-2px)';e.currentTarget.style.boxShadow='0 8px 24px rgba(0,0,0,.3)';}}
      onMouseLeave={e=>{e.currentTarget.style.transform='';e.currentTarget.style.boxShadow='';}}>
      <div style={{fontSize:24,marginBottom:8}}>{icon}</div>
      <div style={{fontSize:12,color:C.textSub,fontWeight:600,marginBottom:4,letterSpacing:'.4px',textTransform:'uppercase'}}>{title}</div>
      <div style={{fontSize:26,fontWeight:700,color:color||C.text}}>{displayVal}</div>
      {sub&&<div style={{fontSize:12,color:C.textMuted,marginTop:4}}>{sub}</div>}
    </div>
  );
}

    const selected=shippingList.filter(o=>o.checked);

    setModal({type:'bulkShip',items:selected});

    setShippingList(prev=>prev.filter(o=>!o.checked));

  };

  };

    <div>
      {toast&&<Toast msg={toast} onHide={()=>setToast('')}/>}

          <button key={t} onClick={()=>setTab(t)}

              background:tab===t?C.primary:'transparent',color:tab===t?'#fff':C.textSub,transition:'all .2s'}}>
            {t==='pending'?'🚚 배송 처리':'↩️ 취소·반품·교환'}
          </button>
        ))}
      </div>
      {tab==='pending'&&(
        <>
          <div style={{display:'flex',gap:10,marginBottom:14}}>
            <button onClick={handleBulkShip} className="btn-primary" style={{fontSize:13,padding:'9px 18px'}}>선택 항목 일괄 배송 처리</button>

          </div>
          <div style={{background:C.card,borderRadius:14,border:`1px solid ${C.border}`,overflow:'hidden'}}>
            <table style={{width:'100%',borderCollapse:'collapse'}}>
              <thead>
                <tr style={{background:'rgba(0,0,0,.2)',borderBottom:`1px solid ${C.border}`}}>
                  <th style={{padding:'11px 14px',width:40}}>
                    <input type="checkbox" checked={allChecked} onChange={toggleAll} style={{cursor:'pointer'}}/>
                  </th>
                  {['주문번호','구매자','상품','브랜드','금액','현재 상태'].map(h=>(
                    <th key={h} style={{textAlign:'left',padding:'11px 14px',fontSize:11,color:C.textSub,fontWeight:600}}>{h}</th>
                  ))}
                </tr>
              </thead>
              <tbody>
                {shippingList.map(o=>(
                  <tr key={o.id} onClick={()=>setModal({type:'shipDetail',item:o})}
                    style={{borderBottom:`1px solid rgba(30,58,95,.3)`,cursor:'pointer',
                      background:o.checked?'rgba(37,99,235,.06)':'transparent',transition:'background .15s'}}

                    onMouseLeave={e=>!o.checked&&(e.currentTarget.style.background='transparent')}>
                    <td style={{padding:'11px 14px'}} onClick={e=>{e.stopPropagation();toggleCheck(o.id);}}>
                      <input type="checkbox" checked={o.checked} onChange={()=>{}} style={{cursor:'pointer'}}/>

                    <td style={{padding:'11px 14px',fontSize:12,color:C.accent,fontFamily:'monospace'}}>{o.id}</td>

/* ─── Settlement Page ─── */

  const [toast,setToast]=useState('');

  useEffect(()=>{
    if(!monthRef.current) return;
    const ctx=monthRef.current.getContext('2d');
    new Chart(ctx,{type:'bar',data:{
      labels:['NICEWEAR','MINIMALIST','URBAN ST.','CLASSIC HO.','SOFTFIT'],
      datasets:[
        {label:'매출',data:[3240,1980,4870,2650,480],backgroundColor:'rgba(37,99,235,.7)',borderRadius:6},
        {label:'정산 금액',data:[2916,1782,4480,2385,422],backgroundColor:'rgba(74,158,255,.5)',borderRadius:6},
      ]
    },options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'top',labels:{color:'#94A3B8',font:{size:11}}}},scales:{x:{ticks:{color:'#475569'},grid:{color:'rgba(255,255,255,.04)'}},y:{ticks:{color:'#475569',callback:v=>v+'만'},grid:{color:'rgba(255,255,255,.04)'}}}}});

        <KpiCard icon="✅" title="정산 완료" value="2건" sub="NICEWEAR, MINIMALIST"/>
        <KpiCard icon="⏳" title="정산 대기" value="3건" sub="5월 10일 처리 예정"/>

      <div style={{display:'grid',gridTemplateColumns:'1.6fr 1fr',gap:16,marginBottom:20}}>
        <div style={{background:C.card,borderRadius:14,padding:20,border:`1px solid ${C.border}`}}>
          <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:16}}>

            <div style={{display:'flex',gap:6}}>
              {['daily','weekly','monthly'].map(p=>(
                <button key={p} onClick={()=>setPeriod(p)} style={{padding:'5px 12px',borderRadius:6,border:'none',cursor:'pointer',fontSize:12,fontFamily:'Pretendard',
                  background:period===p?C.primary:'transparent',color:period===p?'#fff':C.textSub,transition:'all .2s'}}>{p==='daily'?'일별':p==='weekly'?'주별':'월별'}</button>

            </div>
          </div>
          <div className="chart-canvas-wrap"><canvas ref={monthRef}/></div>
        </div>
        <div style={{background:C.card,borderRadius:14,padding:20,border:`1px solid ${C.border}`}}>
          <div style={{fontWeight:700,color:C.text,marginBottom:16,fontSize:14}}>⚙️ 수수료율 설정</div>
          {SELLERS.slice(0,5).map(s=>(

              <div style={{display:'flex',alignItems:'center',gap:8}}>

        </header>
        {/* Content */}
        <main style={{flex:1,overflow:'auto',padding:24,background:C.content}}>
          <div key={page} className="page-enter">{renderPage()}</div>
        </main>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
