/* ─── CountUp ─── */
function useCountUp(target, dur=1000){
  const [val,setVal]=useState(0);
  useEffect(()=>{
    if(!target) return;
    let s=0; const step=target/60;
    const t=setInterval(()=>{s+=step;if(s>=target){setVal(target);clearInterval(t);}else{setVal(Math.floor(s));}},(dur/60));
    return()=>clearInterval(t);
  },[target]);
  return val;
}

/* ─── Toast ─── */
function Toast({msg,onHide}){
  useEffect(()=>{const t=setTimeout(onHide,2200);return()=>clearTimeout(t);},[]);
  return <div className="toast">✅ {msg}</div>;
}

          <button onClick={onClose} style={{background:'none',border:'none',cursor:'pointer',fontSize:20,color:C.textMuted,fontFamily:'Pretendard'}}>✕</button>
        </div>
        <div style={{flex:1,padding:24,overflowY:'auto'}}>{children}</div>

  );
}

function useAnalyticsCharts(){
  const stackRef=useRef(null);
  const barRef=useRef(null);
  useEffect(()=>{
    if(stackRef.current){
      const ctx=stackRef.current.getContext('2d');
      const labels=ANALYTICS_DATA.monthlyRevenue.map(d=>d.month.slice(5)+'월');
      const brands=['NICEWEAR','MINIMALIST','URBAN ST.','CLASSIC HO.','SOFTFIT'];
      const colors=['#0062CC','#7C3AED','#16A34A','#D97706','#DC2626'];
      new Chart(ctx,{type:'bar',data:{labels,datasets:brands.map((b,i)=>({label:b,data:ANALYTICS_DATA.monthlyRevenue.map(d=>(d.brands[b]||0)/10000),backgroundColor:colors[i],borderRadius:4}))},
        options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'top',labels:{color:'#64748B',font:{size:10}}}},scales:{x:{stacked:true,ticks:{color:'#64748B'},grid:{color:'rgba(0,0,0,.04)'}},y:{stacked:true,ticks:{color:'#64748B',callback:v=>v+'만'},grid:{color:'rgba(0,0,0,.04)'}}}}});
    }
    if(barRef.current){
      const ctx2=barRef.current.getContext('2d');
      new Chart(ctx2,{type:'bar',data:{
        labels:ANALYTICS_DATA.topProducts.map(p=>p.name.length>8?p.name.slice(0,8)+'…':p.name),
        datasets:[{label:'판매량',data:ANALYTICS_DATA.topProducts.map(p=>p.sales),backgroundColor:'rgba(0,98,204,.7)',borderRadius:6}]
      },options:{responsive:true,maintainAspectRatio:false,indexAxis:'y',plugins:{legend:{display:false}},scales:{x:{ticks:{color:'#64748B'},grid:{color:'rgba(0,0,0,.04)'}},y:{ticks:{color:'#64748B'},grid:{color:'rgba(0,0,0,.04)'}}}}});
    }
  },[]);
  return{stackRef,barRef};
}

          <div className="modal-box" onClick={e=>e.stopPropagation()}>
            <div className="modal-title">알림 상세 — {modal.item.id}<button className="modal-close" onClick={()=>setModal(null)}>✕</button></div>
            <div style={{background:'#F8FAFF',borderRadius:10,padding:16,marginBottom:16}}>
              {[['채널',modal.item.type],['수신자',modal.item.recipient],['제목',modal.item.title],['우선순위',modal.item.priority],['상태',modal.item.status],['발송 시각',modal.item.time]].map(([k,v])=>(
                <div key={k} style={{display:'flex',justifyContent:'space-between',padding:'7px 0',borderBottom:`1px solid ${C.border}`}}>
                  <span style={{fontSize:13,color:C.textSub}}>{k}</span><span style={{fontSize:13,color:C.text,fontWeight:500}}>{v}</span>
                </div>
              ))}
            </div>
            <div className="btn-row"><button className="btn-secondary" onClick={()=>setModal(null)}>닫기</button></div>
          </div>
        </div>
      )}
    </div>
  );
}

/* ─── Main App ─── */
function App(){
  const [tab,setTab]=useState('home');
  const [drawer,setDrawer]=useState(null);

  const renderContent=()=>{
    switch(tab){
      case 'home': return <HomePage setDrawer={setDrawer}/>;
      case 'seller-management': return <SellerManagementPage setDrawer={setDrawer}/>;
      case 'analytics': return <AnalyticsPage setDrawer={setDrawer}/>;
      case 'notification': return <NotificationPage/>;
      default: return <HomePage setDrawer={setDrawer}/>;
    }
  };

  const renderDrawer=()=>{
    if(!drawer) return null;
    if(drawer.type==='sellerDetail'){
      const s=drawer.item;
      return(
        <Drawer title={`셀러 상세 — ${s.brand}`} onClose={()=>setDrawer(null)}>
          <div style={{display:'flex',alignItems:'center',gap:16,marginBottom:24}}>
            <div style={{width:52,height:52,borderRadius:12,background:`linear-gradient(135deg,${C.primary},${C.secondary})`,display:'flex',alignItems:'center',justifyContent:'center',fontSize:18,color:'#fff',fontWeight:800}}>{s.brand.charAt(0)}</div>
            <div>
              <div style={{fontSize:17,fontWeight:800,color:C.text}}>{s.name}</div>
              <div style={{fontSize:13,color:C.textSub}}>{s.brand} · {s.plan} 플랜</div>
            </div>
          </div>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12,marginBottom:20}}>
            {[['월 매출','₩'+s.monthRevenue.toLocaleString(),C.primary],['상품 수',s.products+'개',C.secondary],['수수료율',s.commission+'%',C.textSub],['상태',s.status,s.status==='활성'?C.success:s.status==='검토중'?C.warning:C.danger]].map(([k,v,c])=>(
              <div key={k} style={{background:C.bg,borderRadius:10,padding:'14px 16px',border:`1px solid ${C.border}`}}>
                <div style={{fontSize:11,color:C.textSub,fontWeight:700,marginBottom:6,letterSpacing:'.5px',textTransform:'uppercase'}}>{k}</div>
                <div style={{fontSize:18,fontWeight:800,color:c}}>{v}</div>
              </div>
            ))}
          </div>
          <div style={{marginBottom:16}}>
            {[['이메일',s.email],['등록일',s.joinDate],['담당자',s.admin]].map(([k,v])=>(
              <div key={k} style={{display:'flex',justifyContent:'space-between',padding:'9px 0',borderBottom:`1px solid ${C.border}`}}>
                <span style={{fontSize:13,color:C.textSub}}>{k}</span><span style={{fontSize:13,color:C.text,fontWeight:500}}>{v}</span>
              </div>
            ))}
          </div>
          {s.memo&&<div style={{background:'#FEF3C7',borderRadius:8,padding:12,fontSize:13,color:C.warning,marginBottom:16}}>⚠️ {s.memo}</div>}
          <div className="form-row"><div className="form-label">내부 메모</div><textarea className="form-textarea" defaultValue={s.memo} placeholder="관리 메모 입력..."/></div>
          <button className="btn-primary" style={{width:'100%'}}>메모 저장</button>
        </Drawer>
      );
    }
    if(drawer.type==='settleDetail'){
      const s=drawer.item;
      return(
        <Drawer title={`정산 상세 — ${s.brand}`} onClose={()=>setDrawer(null)}>
          <div style={{background:C.bg,borderRadius:12,padding:16,marginBottom:20}}>
            {[['브랜드',s.brand],['정산 기간',s.period],['총 매출','₩'+s.revenue.toLocaleString()],['수수료율',s.commission+'%'],['수수료 금액','₩'+(s.revenue*s.commission/100).toLocaleString()],['정산 예정 금액','₩'+s.amount.toLocaleString()],['상태',s.status]].map(([k,v])=>(
              <div key={k} style={{display:'flex',justifyContent:'space-between',padding:'8px 0',borderBottom:`1px solid ${C.border}`}}>
                <span style={{fontSize:13,color:C.textSub}}>{k}</span><span style={{fontSize:13,color:C.text,fontWeight:600}}>{v}</span>
              </div>
            ))}
          </div>
          <button className="btn-primary" style={{width:'100%',marginBottom:10}}>📥 정산 내역 다운로드</button>
          <button className="btn-secondary" style={{width:'100%'}} onClick={()=>setDrawer(null)}>닫기</button>
        </Drawer>
      );
    }
    return null;
  };

  return(
    <div style={{display:'flex',flexDirection:'column',width:'100%',minHeight:'100vh'}}>
      {/* Header */}
      <header style={{position:'sticky',top:0,zIndex:100,background:C.surface,borderBottom:`1.5px solid ${C.border}`,display:'flex',alignItems:'center',height:58,padding:'0 28px',gap:4,flexShrink:0,boxShadow:'0 2px 12px rgba(0,0,0,.06)'}}>
        <div style={{fontSize:16,fontWeight:800,color:C.primary,marginRight:20,whiteSpace:'nowrap'}}>
          <span style={{color:C.primary}}>●</span> KoreanMood <span style={{fontSize:11,fontWeight:600,color:C.textMuted}}>SuperAdmin</span>
        </div>
        {TABS.map(t=>(
          <button key={t.id} onClick={()=>setTab(t.id)} title={t.label}
            style={{padding:'8px 16px',borderRadius:8,border:'none',cursor:'pointer',fontSize:13,fontWeight:700,fontFamily:'Pretendard',transition:'all .2s',whiteSpace:'nowrap',
              background:tab===t.id?C.primaryLight:'transparent',color:tab===t.id?C.primary:C.textSub,
              borderBottom:tab===t.id?`2px solid ${C.primary}`:'2px solid transparent',}}>
            {t.label}
          </button>
        ))}
        <div style={{flex:1}}/>
        <div style={{display:'flex',alignItems:'center',gap:6,background:'#F8FAFF',borderRadius:20,padding:'7px 14px',border:`1.5px solid ${C.border}`}}>
          <span style={{fontSize:13,color:C.textSub}}>🔍</span>
          <input placeholder="검색..." style={{background:'none',border:'none',color:C.text,fontSize:13,fontFamily:'Pretendard',width:140,outline:'none'}}/>
        </div>
        <div style={{display:'flex',gap:8,alignItems:'center',marginLeft:8}}>
          <button title="알림" style={{width:36,height:36,borderRadius:8,background:'#F8FAFF',border:`1.5px solid ${C.border}`,cursor:'pointer',fontSize:15,display:'flex',alignItems:'center',justifyContent:'center',position:'relative'}}>
            🔔<span style={{position:'absolute',top:6,right:6,width:6,height:6,background:C.danger,borderRadius:'50%'}}/>
          </button>
          <div style={{width:34,height:34,borderRadius:'50%',background:`linear-gradient(135deg,${C.primary},${C.secondary})`,display:'flex',alignItems:'center',justifyContent:'center',fontSize:12,color:'#fff',fontWeight:700,cursor:'pointer'}}>슈퍼</div>
        </div>
      </header>

      {/* Hero Banner */}
      <HeroBanner meta={HERO_META[tab]}/>

      {/* Content */}
      <main style={{flex:1,background:C.bg}}>
        <div key={tab} className="page-enter">{renderContent()}</div>
      </main>

      {/* Drawer */}
      {renderDrawer()}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
