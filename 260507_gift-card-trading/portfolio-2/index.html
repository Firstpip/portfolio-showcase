// CountUp
function CountUp({end,duration=1200,suffix='',prefix=''}) {
  const [val,setVal]=useState(0);
  useEffect(()=>{
    let s=0;const step=end/(duration/16);
    const t=setInterval(()=>{s+=step;if(s>=end){setVal(end);clearInterval(t);}else setVal(Math.floor(s));},16);
    return()=>clearInterval(t);
  },[end]);
  return <span>{prefix}{val.toLocaleString()}{suffix}</span>;
}

// Toast
function Toast({message,type='success',onClose}) {
  useEffect(()=>{const t=setTimeout(onClose,3000);return()=>clearTimeout(t);},[]);
  const colors={success:C.success,error:C.danger,info:C.info};
  return (
    <div style={{position:'fixed',bottom:24,right:24,zIndex:9999,background:colors[type]||C.success,color:'#fff',
      padding:'12px 20px',borderRadius:10,animation:'slideUp 300ms ease',
      boxShadow:'0 4px 16px rgba(0,0,0,0.2)',display:'flex',alignItems:'center',gap:8,fontSize:14,fontWeight:500}}>
      <span>{type==='success'?'✓':type==='error'?'✕':'ℹ'}</span>{message}
    </div>
  );
}

    const matches = text.match(/\d{4}[-\s]?\d{4}[-\s]?\d{4}[-\s]?\d{4}|\d{12}/g)||[];
    return [...new Set(matches)].slice(0,10);

    const pins = parsePins(text);

              border:`1px solid ${C.border}`,animation:`slideUp 400ms ease ${i*60}ms both`}}
              onMouseEnter={e=>{e.currentTarget.style.transform='translateX(4px)';e.currentTarget.style.borderColor=C.primary;}}
              onMouseLeave={e=>{e.currentTarget.style.transform='translateX(0)';e.currentTarget.style.borderColor=C.border;}}>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                <div style={{display:'flex',alignItems:'center',gap:10}}>
                  {n.isNew&&<span style={{background:C.primary,color:'#fff',borderRadius:4,padding:'2px 6px',fontSize:11,fontWeight:700}}>NEW</span>}
                  <span style={{fontSize:15,fontWeight:n.isNew?600:400,color:C.text}}>{n.title}</span>
                </div>
                <span style={{fontSize:12,color:C.textSub,whiteSpace:'nowrap',marginLeft:16}}>{n.date}</span>
              </div>
            </div>
          ))}
        </div>
      )}

      {/* FAQ */}
      {activeSection==='faq'&&(
        <div style={{animation:'fadeIn 300ms ease'}}>
          {FAQS.map((f,i)=>(
            <div key={i} style={{background:C.surface,borderRadius:12,overflow:'hidden',marginBottom:10,
              boxShadow:'0 2px 8px rgba(0,0,0,0.05)',border:`1px solid ${openFaq===i?C.primary:C.border}`,transition:'border 200ms',animation:`slideUp 400ms ease ${i*60}ms both`}}>
              <button onClick={()=>setOpenFaq(openFaq===i?null:i)} style={{
                width:'100%',display:'flex',justifyContent:'space-between',alignItems:'center',
                padding:'18px 24px',background:'none',border:'none',cursor:'pointer',textAlign:'left'}}>
                <div style={{display:'flex',alignItems:'center',gap:12}}>
                  <span style={{fontSize:16,color:C.primary,fontWeight:700}}>Q</span>
                  <span style={{fontSize:15,fontWeight:600,color:C.text}}>{f.q}</span>
                </div>
                <span style={{fontSize:20,color:C.textSub,transition:'transform 200ms',transform:openFaq===i?'rotate(45deg)':'rotate(0)'}}>+</span>
              </button>
              {openFaq===i&&(
                <div style={{padding:'0 24px 18px',animation:'slideDown 200ms ease',borderTop:`1px solid ${C.border}`}}>
                  <div style={{display:'flex',gap:12,paddingTop:16}}>
                    <span style={{fontSize:16,color:C.success,fontWeight:700}}>A</span>
                    <span style={{fontSize:14,color:C.textSub,lineHeight:1.7}}>{f.a}</span>
                  </div>
                </div>
              )}
            </div>
          ))}
        </div>
      )}

      {/* 1:1 문의 */}
      {activeSection==='inquiry'&&(
        <div style={{animation:'fadeIn 300ms ease'}}>
          {submitted?(
            <div style={{textAlign:'center',padding:'60px 0',animation:'fadeInScale 300ms ease'}}>
              <div style={{fontSize:48,marginBottom:16}}>✅</div>
              <h3 style={{fontSize:22,fontWeight:700,color:C.text,marginBottom:8}}>문의가 접수되었습니다</h3>
              <p style={{fontSize:14,color:C.textSub}}>평균 2시간 이내 이메일 및 문자로 답변드립니다</p>
            </div>
          ):(
            <div style={{background:C.surface,borderRadius:16,padding:32,boxShadow:'0 4px 16px rgba(0,0,0,0.06)',border:`1px solid ${C.border}`}}>
              <h3 style={{fontSize:17,fontWeight:700,color:C.text,marginBottom:20}}>1:1 문의 작성</h3>
              <div style={{display:'flex',flexDirection:'column',gap:16}}>
                <div>
                  <label style={{fontSize:13,fontWeight:600,color:C.text,display:'block',marginBottom:6}}>문의 유형</label>
                  <select style={{width:'100%',padding:'10px 14px',borderRadius:8,border:`1px solid ${C.border}`,fontSize:14,outline:'none',color:C.text,background:C.surface}}>
                    <option>핀번호 검증 관련</option>
                    <option>입금/정산 관련</option>
                    <option>계좌 변경</option>
                    <option>기타 문의</option>
                  </select>
                </div>
                <div>
                  <label style={{fontSize:13,fontWeight:600,color:C.text,display:'block',marginBottom:6}}>제목</label>
                  <input type="text" value={inquiry.title} onChange={e=>setInquiry(p=>({...p,title:e.target.value}))}
                    placeholder="문의 제목을 입력하세요"
                    style={{width:'100%',padding:'10px 14px',borderRadius:8,border:`1px solid ${C.border}`,fontSize:14,outline:'none',color:C.text}}/>
                </div>
                <div>
                  <label style={{fontSize:13,fontWeight:600,color:C.text,display:'block',marginBottom:6}}>내용</label>
                  <textarea value={inquiry.content} onChange={e=>setInquiry(p=>({...p,content:e.target.value}))}
                    placeholder="문의 내용을 자세히 입력해 주세요"
                    style={{width:'100%',height:160,padding:'10px 14px',borderRadius:8,border:`1px solid ${C.border}`,fontSize:14,outline:'none',resize:'none',lineHeight:1.7,color:C.text}}/>
                </div>
                <div>
                  <label style={{fontSize:13,fontWeight:600,color:C.text,display:'block',marginBottom:6}}>첨부파일 (선택)</label>
                  <div style={{border:`2px dashed ${C.border}`,borderRadius:8,padding:'20px',textAlign:'center',cursor:'pointer',color:C.textSub,fontSize:13}}>
                    📎 파일을 드래그하거나 클릭하여 첨부하세요
                  </div>
                </div>
                <button onClick={handleSubmit} style={{padding:'14px',borderRadius:12,
                  background:`linear-gradient(135deg,${C.primary},${C.secondary})`,color:'#fff',
                  border:'none',cursor:'pointer',fontSize:15,fontWeight:700}}>
                  문의 제출하기
                </button>
              </div>
            </div>
          )}
        </div>
      )}
    </div>
  );
}

// ─── 메인 앱 ───
function App() {
  const [tab,setTab]=useState('main');
  const [toast,setToast]=useState(null);
  const [pageKey,setPageKey]=useState(0);
  const [loading,setLoading]=useState(true);

  useEffect(()=>{const t=setTimeout(()=>setLoading(false),900);return()=>clearTimeout(t);},[]);

  const navigate = (t) => {setTab(t);setPageKey(k=>k+1);};
  const showToast = (message,type='success') => setToast({message,type,id:Date.now()});

  const renderContent = () => {
    switch(tab){
      case 'main': return <SellPage onToast={showToast}/>;
      case 'sales-history': return <SalesHistory onToast={showToast}/>;
      case 'settlement': return <Settlement onToast={showToast}/>;
      case 'support': return <Support onToast={showToast}/>;
      default: return <SellPage onToast={showToast}/>;
    }
  };

  if(loading) return (
    <div style={{display:'flex',width:'100%',height:'100vh',alignItems:'center',justifyContent:'center',background:C.bg}}>
      <div style={{textAlign:'center'}}>
        <div style={{width:48,height:48,border:`4px solid ${C.primary}`,borderColor:`${C.primary} transparent`,borderRadius:'50%',animation:'spin 0.8s linear infinite',margin:'0 auto 16px'}}/>
        <div style={{fontSize:15,color:C.textSub}}>GiftPay 로딩 중...</div>
      </div>
    </div>
  );

  return (
    <div style={{display:'flex',flexDirection:'column',width:'100%',minHeight:'100vh'}}>
      {/* 상단 수평 네비 */}
      <header style={{
        position:'sticky',top:0,zIndex:100,
        background:C.surface,borderBottom:`1px solid ${C.border}`,
        display:'flex',alignItems:'center',height:56,padding:'0 32px',gap:4,
        boxShadow:'0 1px 4px rgba(0,0,0,0.06)'}}>
        {/* 로고 */}
        <div style={{display:'flex',alignItems:'center',gap:8,marginRight:24}}>
          <div style={{width:32,height:32,borderRadius:8,background:`linear-gradient(135deg,${C.primary},${C.secondary})`,display:'flex',alignItems:'center',justifyContent:'center',fontSize:16}}>🎁</div>
          <span style={{fontSize:16,fontWeight:800,color:C.text,letterSpacing:'-0.03em'}}>GiftPay</span>
        </div>

        {/* 탭 메뉴 */}
        {TABS.map(t=>(
          <button key={t.id} onClick={()=>navigate(t.id)}
            title={t.label}
            style={{
              padding:'8px 16px',borderRadius:8,border:'none',cursor:'pointer',
              fontSize:14,fontWeight:tab===t.id?700:500,
              background:tab===t.id?`${C.primary}12`:'transparent',
              color:tab===t.id?C.primary:C.textSub,
              transition:'all 150ms',display:'flex',alignItems:'center',gap:6}}>
            <span style={{fontSize:15}}>{t.icon}</span>
            {t.label}
          </button>
        ))}

        <div style={{flex:1}}/>

        {/* 우측 액션 */}
        <div style={{display:'flex',alignItems:'center',gap:8}}>
          <div style={{position:'relative'}}>
            <button style={{width:36,height:36,borderRadius:8,background:C.bg,border:'none',cursor:'pointer',fontSize:16}}>🔔</button>
            <div style={{position:'absolute',top:6,right:6,width:8,height:8,borderRadius:'50%',background:C.danger}}/>
          </div>
          <div style={{width:36,height:36,borderRadius:'50%',background:`linear-gradient(135deg,${C.primary},${C.secondary})`,display:'flex',alignItems:'center',justifyContent:'center',fontSize:14,color:'#fff',fontWeight:700,cursor:'pointer'}}>
            김
          </div>
        </div>
      </header>

      {/* 히어로 배너 */}
      <HeroBanner tab={tab}/>

      {/* 콘텐츠 */}
      <main style={{flex:1,background:C.bg}}>
        <div key={pageKey} style={{animation:'fadeIn 300ms ease'}}>
          {renderContent()}
        </div>
      </main>

      {/* 푸터 */}
      <footer style={{background:'#0F172A',color:'rgba(255,255,255,0.7)',padding:'32px 32px 24px'}}>
        <div style={{maxWidth:1200,margin:'0 auto',display:'grid',gridTemplateColumns:'2fr 1fr 1fr',gap:32}}>
          <div>
            <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:12}}>
              <div style={{width:28,height:28,borderRadius:6,background:`linear-gradient(135deg,${C.primary},${C.secondary})`,display:'flex',alignItems:'center',justifyContent:'center',fontSize:14}}>🎁</div>
              <span style={{fontSize:15,fontWeight:700,color:'#fff'}}>GiftPay</span>
            </div>
            <p style={{fontSize:13,lineHeight:1.6,color:'rgba(255,255,255,0.5)'}}>
              상품권을 가장 빠르고 안전하게 현금으로 전환하는 서비스입니다. 핀번호 입력부터 즉시 입금까지 10분 이내 처리를 목표로 합니다.
            </p>
          </div>
          {[
            {title:'서비스',links:['상품권 판매','이용 안내','수수료 안내','이용약관']},
            {title:'고객지원',links:['자주 묻는 질문','1:1 문의','공지사항','개인정보처리방침']},
          ].map(col=>(
            <div key={col.title}>
              <div style={{fontSize:13,fontWeight:700,color:'rgba(255,255,255,0.9)',marginBottom:12}}>{col.title}</div>
              {col.links.map(l=>(
                <div key={l} style={{fontSize:13,color:'rgba(255,255,255,0.5)',marginBottom:8,cursor:'pointer'}}
                  onMouseEnter={e=>e.currentTarget.style.color='rgba(255,255,255,0.9)'}
                  onMouseLeave={e=>e.currentTarget.style.color='rgba(255,255,255,0.5)'}>{l}</div>
              ))}
            </div>
          ))}
        </div>
        <div style={{maxWidth:1200,margin:'24px auto 0',paddingTop:20,borderTop:'1px solid rgba(255,255,255,0.08)',fontSize:12,color:'rgba(255,255,255,0.35)'}}>
          © 2026 GiftPay. 자체 개발 구현 데모
        </div>
      </footer>

      {/* 토스트 */}
      {toast&&<Toast key={toast.id} message={toast.message} type={toast.type} onClose={()=>setToast(null)}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
