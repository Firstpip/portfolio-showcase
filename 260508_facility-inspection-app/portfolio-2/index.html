function Toast({message,type,onClose}){
  React.useEffect(()=>{const t=setTimeout(onClose,3000);return()=>clearTimeout(t);},[]);
  const bg=type==='success'?'#51CF66':type==='error'?'#FF6B6B':C.primary;
  return(
    <div style={{position:'fixed',bottom:24,right:24,zIndex:9999,
      background:bg,color:'#fff',padding:'12px 20px',borderRadius:8,
      animation:'slideUp 300ms ease',boxShadow:`0 4px 20px rgba(0,0,0,0.4)`,
      fontSize:14,fontWeight:600,maxWidth:320}}>
      {message}
    </div>
  );
}

function GlassCard({children,style={},onClick,hover=false}){
  const [hov,setHov]=React.useState(false);
  return(
    <div onClick={onClick}
      onMouseEnter={()=>hover&&setHov(true)}
      onMouseLeave={()=>setHov(false)}
      style={{background:C.surfaceHigh,borderRadius:16,
        border:`1px solid ${hov?C.borderHigh:C.border}`,
        boxShadow:hov?`0 8px 32px rgba(108,99,255,0.15)`:`0 2px 8px rgba(0,0,0,0.3)`,
        transition:'all 200ms',cursor:onClick?'pointer':'default',
        ...style}}>
      {children}
    </div>
  );
}

function StatChip({label,value,unit,color,i}){
  function CountUp({end}){
    const [v,setV]=React.useState(0);
    React.useEffect(()=>{
      let s=0;const step=end/75;
      const t=setInterval(()=>{s+=step;if(s>=end){setV(end);clearInterval(t);}else setV(Math.floor(s));},16);
      return()=>clearInterval(t);
    },[end]);
    return <span>{v}</span>;
  }
  return(
    <div style={{animation:`slideUp 400ms ease ${i*80}ms both`}}>
      <GlassCard style={{padding:'20px 24px'}}>
        <div style={{fontSize:12,color:C.textSecondary,fontWeight:500,marginBottom:8}}>{label}</div>
        <div style={{fontSize:28,fontWeight:800,color:color||C.textPrimary,letterSpacing:'-0.03em'}}>
          <CountUp end={parseInt(value)||0}/><span style={{fontSize:14,marginLeft:4,fontWeight:500}}>{unit}</span>
        </div>
      </GlassCard>
    </div>
  );
}

function StatusPill({status}){
  const cfg={
    '진행중':{bg:'rgba(108,99,255,0.15)',color:C.primary,dot:C.primary},
    '완료':{bg:'rgba(81,207,102,0.15)',color:C.success,dot:C.success},
    '대기':{bg:'rgba(255,209,102,0.15)',color:C.accent,dot:C.accent},
    '부적합':{bg:'rgba(255,107,107,0.15)',color:C.danger,dot:C.danger},
    '적합':{bg:'rgba(81,207,102,0.15)',color:C.success,dot:C.success},
    'O 적합':{bg:'rgba(81,207,102,0.15)',color:C.success,dot:C.success},
    'X 부적합':{bg:'rgba(255,107,107,0.15)',color:C.danger,dot:C.danger},
  }[status]||{bg:'rgba(255,255,255,0.05)',color:C.textSecondary,dot:C.textSecondary};
  return(
    <span style={{display:'inline-flex',alignItems:'center',gap:5,
      padding:'4px 10px',borderRadius:999,fontSize:12,fontWeight:600,
      background:cfg.bg,color:cfg.color}}>
      <span style={{width:6,height:6,borderRadius:'50%',background:cfg.dot,
        animation:status==='진행중'?'pulse 1.5s infinite':'none'}}/>
      {status}
    </span>
  );
}

            boxShadow:`0 0 10px rgba(108,99,255,0.3)`}}>관</div>
        </div>
      </header>

      {/* 페이지 히어로 */}
      <div style={{padding:'28px 32px 24px',
        background:`linear-gradient(180deg, rgba(108,99,255,0.08) 0%, transparent 100%)`}}>
        <div style={{fontSize:12,color:C.textSecondary,marginBottom:4,letterSpacing:'0.08em',textTransform:'uppercase'}}>
          {NAV_ITEMS.find(n=>n.id===route)?.label}
        </div>
        <h1 style={{fontSize:26,fontWeight:800,color:C.textPrimary,letterSpacing:'-0.02em'}}>
          {{
            dashboard:'전국 시설 통합 관리 대시보드',
            analytics:'점검 이력 분석 리포트',
            team:'팀별 성과 추적 및 배정 관리',
            monitoring:'현장 모니터링 — S3 스토리지',
          }[route]}
        </h1>
      </div>

      {/* 콘텐츠 */}
      <main style={{flex:1,padding:'0 32px 32px',animation:'fadeIn 300ms ease'}}>
        {route==='dashboard'&&<DashboardPage onToast={onToast}/>}
        {route==='analytics'&&<AnalyticsPage onToast={onToast}/>}
        {route==='team'&&<TeamPage onToast={onToast}/>}
        {route==='monitoring'&&<MonitoringPage onToast={onToast}/>}
      </main>

      {/* 푸터 */}
      <footer style={{background:C.surface,borderTop:`1px solid ${C.border}`,
        padding:'20px 32px',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
        <span style={{fontSize:12,color:C.textSecondary}}>© 2026 FacilityHub · 시설 성능관리 통합 플랫폼</span>
        <div style={{display:'flex',gap:16}}>
          {['이용약관','개인정보처리방침','기술 지원'].map(t=>(
            <span key={t} style={{fontSize:12,color:C.textSecondary,cursor:'pointer',
              transition:'color 200ms'}}
              onMouseEnter={e=>e.currentTarget.style.color=C.primary}
              onMouseLeave={e=>e.currentTarget.style.color=C.textSecondary}>{t}</span>
          ))}
        </div>
      </footer>

      {toast&&<Toast message={toast.msg} type={toast.type} onClose={()=>setToast(null)}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
