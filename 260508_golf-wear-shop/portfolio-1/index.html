function CountUp({end, suffix=''}) {
  const [val, setVal] = useState(0);
  useEffect(() => {
    let s=0; const step=end/60;
    const t=setInterval(()=>{ s+=step; if(s>=end){setVal(end);clearInterval(t);}else setVal(Math.floor(s)); },16);
    return ()=>clearInterval(t);
  },[end]);
  return <span style={{animation:'countUp 400ms ease'}}>{val.toLocaleString()}{suffix}</span>;
}

function Toast({msg, onDone}) {
  useEffect(()=>{const t=setTimeout(onDone,3000);return()=>clearTimeout(t);},[]);
  return (
    <div style={{position:'fixed',bottom:24,right:24,zIndex:9999,background:C.secondary,color:'#fff',padding:'12px 24px',borderRadius:8,animation:'slideUp 300ms ease',boxShadow:'0 4px 16px rgba(0,0,0,0.2)',fontSize:14,fontWeight:600,display:'flex',alignItems:'center',gap:8}}>
      <span>✓</span>{msg}
    </div>
  );
}

  if(loading) return (
    <div style={{minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center',background:C.bg}}>
      <div style={{textAlign:'center'}}>
        <div style={{fontSize:28,fontWeight:800,color:C.secondary,marginBottom:8}}>PARCLUB</div>
        <div style={{width:48,height:3,background:`linear-gradient(90deg,${C.primary},${C.secondary})`,borderRadius:2,margin:'0 auto',animation:'barGrow 1.2s ease both','--target-width':'100%'}} />
        <div style={{fontSize:13,color:C.text2,marginTop:12}}>로딩 중...</div>
      </div>
    </div>
  );

  const NAV_TABS = [
    {id:'home',label:'홈'},{id:'women',label:'여성 골프웨어'},{id:'men',label:'남성 골프웨어'},{id:'accessories',label:'액세서리'},{id:'events',label:'이벤트'},
  ];

  if(page==='checkout') return (
    <div style={{width:'100%',minHeight:'100vh',background:C.bg}}>
      <header style={{position:'sticky',top:0,zIndex:100,background:C.surface,borderBottom:`1px solid ${C.border}`,display:'flex',alignItems:'center',height:60,padding:'0 40px',gap:8,boxShadow:'0 1px 8px rgba(0,0,0,0.06)'}}>
        <div style={{fontSize:20,fontWeight:900,color:C.secondary,letterSpacing:'-0.03em',marginRight:16}}>PARCLUB</div>
        <div style={{flex:1}} />
        <button onClick={()=>setPage('main')} style={{background:'none',border:`1px solid ${C.border}`,padding:'8px 16px',borderRadius:8,fontSize:13,cursor:'pointer',fontFamily:'inherit',color:C.text2}}>← 쇼핑 계속하기</button>
        <button onClick={()=>setPage('mypage')} style={{background:'none',border:`1px solid ${C.border}`,borderRadius:8,padding:'8px 14px',fontSize:13,color:C.text1,cursor:'pointer',fontFamily:'inherit',fontWeight:500}}>마이페이지</button>
      </header>
      <CheckoutPage onBack={()=>setPage('main')} />
    </div>
  );

  if(page==='mypage') return (
    <div style={{width:'100%',minHeight:'100vh',background:C.bg}}>
      <header style={{position:'sticky',top:0,zIndex:100,background:C.surface,borderBottom:`1px solid ${C.border}`,display:'flex',alignItems:'center',height:60,padding:'0 40px',gap:8,boxShadow:'0 1px 8px rgba(0,0,0,0.06)'}}>
        <div style={{fontSize:20,fontWeight:900,color:C.secondary,letterSpacing:'-0.03em',marginRight:16}}>PARCLUB</div>
        <div style={{flex:1}} />
        <button onClick={()=>setPage('main')} style={{background:'none',border:`1px solid ${C.border}`,padding:'8px 16px',borderRadius:8,fontSize:13,cursor:'pointer',fontFamily:'inherit',color:C.text2}}>← 쇼핑 계속하기</button>
      </header>
      <MyPage onBack={()=>setPage('main')} />
    </div>
  );

  return (
    <div style={{width:'100%',minHeight:'100vh',background:C.bg}}>
      <header style={{position:'sticky',top:0,zIndex:100,background:C.surface,borderBottom:`1px solid ${C.border}`,display:'flex',alignItems:'center',height:60,padding:'0 32px',gap:0,boxShadow:'0 1px 8px rgba(0,0,0,0.06)'}}>
        <div style={{fontSize:20,fontWeight:900,color:C.secondary,letterSpacing:'-0.03em',marginRight:24,flexShrink:0}}>PARCLUB</div>
        <nav style={{display:'flex',gap:2,flex:1}}>
          {NAV_TABS.map(t=>(
            <button key={t.id} onClick={()=>setTab(t.id)} style={{padding:'8px 14px',background:'none',border:'none',borderBottom:`2px solid ${tab===t.id?C.primary:'transparent'}`,color:tab===t.id?C.primary:C.text2,fontWeight:tab===t.id?700:400,cursor:'pointer',fontSize:14,fontFamily:'inherit',transition:'all 150ms',whiteSpace:'nowrap'}}>
              {t.label}
            </button>
          ))}
        </nav>
        <div style={{display:'flex',alignItems:'center',gap:12,flexShrink:0}}>
          <button style={{background:'none',border:'none',cursor:'pointer',padding:'6px',color:C.text2,fontSize:18,display:'flex',alignItems:'center'}}>
            <svg width="18" height="18" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
          </button>
          <button style={{background:'none',border:`1px solid ${C.border}`,borderRadius:20,padding:'6px 14px',fontSize:13,color:C.text1,cursor:'pointer',fontFamily:'inherit',display:'flex',alignItems:'center',gap:6}}>
            <span>🛒</span>
            {cartCount > 0 && <span style={{background:C.primary,color:'#fff',borderRadius:'50%',width:18,height:18,display:'inline-flex',alignItems:'center',justifyContent:'center',fontSize:11,fontWeight:700}}>{cartCount}</span>}
          </button>
          <button onClick={()=>setPage('checkout')} style={{background:`linear-gradient(135deg,${C.primary},#c0623c)`,color:'#fff',border:'none',borderRadius:8,padding:'8px 18px',fontSize:13,fontWeight:700,cursor:'pointer',fontFamily:'inherit',transition:'all 150ms'}}
            onMouseEnter={e=>e.currentTarget.style.transform='translateY(-1px)'}
            onMouseLeave={e=>e.currentTarget.style.transform='translateY(0)'}>
            주문하기
          </button>
          <button onClick={()=>setPage('mypage')} style={{background:'none',border:`1px solid ${C.border}`,borderRadius:8,padding:'8px 14px',fontSize:13,color:C.text1,cursor:'pointer',fontFamily:'inherit',fontWeight:500,transition:'all 150ms'}}
            onMouseEnter={e=>{e.currentTarget.style.borderColor=C.primary;e.currentTarget.style.color=C.primary;}}
            onMouseLeave={e=>{e.currentTarget.style.borderColor=C.border;e.currentTarget.style.color=C.text1;}}>
            마이페이지
          </button>
        </div>
      </header>
      <HeroBanner tab={tab} />
      <main style={{flex:1}} key={tab}>
        {tab==='home' && <HomePage onProductClick={setDrawer} />}
        {tab==='women' && <CategoryPage category="women" onProductClick={setDrawer} />}
        {tab==='men' && <CategoryPage category="men" onProductClick={setDrawer} />}
        {tab==='accessories' && <CategoryPage category="accessories" onProductClick={setDrawer} />}
        {tab==='events' && <EventsPage />}
      </main>
      <footer style={{background:C.secondary,color:'#fff',padding:'48px 40px 32px',marginTop:64}}>
        <div style={{maxWidth:1200,margin:'0 auto',display:'grid',gridTemplateColumns:'2fr 1fr 1fr 1fr',gap:32}}>
          <div>
            <div style={{fontSize:22,fontWeight:900,marginBottom:12}}>PARCLUB</div>
            <p style={{fontSize:13,opacity:0.7,lineHeight:1.7}}>프리미엄 골프웨어 전문 브랜드<br/>코스에서 최고의 퍼포먼스를 위한 선택</p>
          </div>
          {[['쇼핑',['신상품','베스트셀러','여성','남성']],['고객지원',['공지사항','FAQ','1:1 문의','교환·반품']],['회사',['회사소개','이용약관','개인정보처리방침','제휴 문의']]].map(([title,items])=>(
            <div key={title}>
              <h4 style={{fontSize:14,fontWeight:700,marginBottom:16,opacity:0.9}}>{title}</h4>
              {items.map(item=><div key={item} style={{fontSize:13,opacity:0.6,marginBottom:8,cursor:'pointer'}}>{item}</div>)}
            </div>
          ))}
        </div>
        <div style={{maxWidth:1200,margin:'32px auto 0',paddingTop:24,borderTop:'1px solid rgba(255,255,255,0.15)',fontSize:12,opacity:0.5,textAlign:'center'}}>
          © 2026 PARCLUB. All rights reserved.
        </div>
      </footer>
      {drawer && <ProductDrawer product={drawer} onClose={()=>setDrawer(null)} onAddCart={addToCart} />}
      {toast && <Toast msg={toast} onDone={()=>setToast(null)} />}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
