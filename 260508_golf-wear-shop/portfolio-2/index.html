function Badge({status}) {
  const m = STATUS_META[status]||{bg:'#f0f0f0',color:'#666'};
  return <span style={{background:m.bg,color:m.color,padding:'3px 10px',borderRadius:20,fontSize:12,fontWeight:700}}>{status}</span>;
}

function CountUp({end, suffix=''}) {
  const [val, setVal] = useState(0);
  useEffect(()=>{
    let s=0; const step=end/60;
    const t=setInterval(()=>{s+=step;if(s>=end){setVal(end);clearInterval(t);}else setVal(Math.floor(s));},16);
    return()=>clearInterval(t);
  },[end]);
  return <span style={{animation:'countUp 400ms ease'}}>{val.toLocaleString()}{suffix}</span>;
}

function Toast({msg, onDone}) {
  useEffect(()=>{const t=setTimeout(onDone,3000);return()=>clearTimeout(t);},[]);
  return (
    <div style={{position:'fixed',bottom:24,right:24,zIndex:9999,background:C.secondary,color:'#fff',padding:'12px 24px',borderRadius:8,animation:'slideUp 300ms ease',boxShadow:'0 4px 16px rgba(0,0,0,0.2)',fontSize:14,fontWeight:600,display:'flex',alignItems:'center',gap:8}}>
      <span style={{color:C.success}}>✓</span>{msg}
    </div>
  );
}

function OrdersPage({onToast}) {

function App() {
  const [route, setRoute] = useState('home');
  const [toast, setToast] = useState(null);
  const [loading, setLoading] = useState(true);
  const [notifOpen, setNotifOpen] = useState(false);

  useEffect(()=>{setTimeout(()=>setLoading(false),1200);},[]);

  if(loading) return (
    <div style={{minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center',background:C.bg}}>
      <div style={{textAlign:'center'}}>
        <div style={{fontSize:13,fontWeight:700,color:C.text2,letterSpacing:'0.12em',marginBottom:8,textTransform:'uppercase'}}>PARCLUB Admin</div>
        <div style={{fontSize:28,fontWeight:900,color:C.secondary,marginBottom:12}}>관리자 대시보드</div>
        <div style={{display:'flex',flexDirection:'column',gap:8}}>
          {[...Array(3)].map((_,i)=>(
            <div key={i} style={{width:240,height:12,borderRadius:6,background:'linear-gradient(90deg,#CBD5E1 25%,#94A3B8 50%,#CBD5E1 75%)',backgroundSize:'200% 100%',animation:'shimmer 1.5s infinite',margin:'0 auto',animationDelay:`${i*200}ms`}} />
          ))}
        </div>
      </div>
    </div>
  );

  const NAV = [
    {id:'home',label:'대시보드'},{id:'orders',label:'주문 관리'},{id:'products',label:'상품 관리'},{id:'customers',label:'고객 관리'},
  ];

  return (
    <div style={{width:'100%',minHeight:'100vh',background:C.bg,display:'flex',flexDirection:'column'}}>
      <header style={{position:'sticky',top:0,zIndex:100,background:C.surface,borderBottom:`1px solid ${C.border}`,display:'flex',alignItems:'center',height:60,padding:'0 32px',boxShadow:'0 1px 8px rgba(0,0,0,0.06)'}}>
        <div style={{display:'flex',alignItems:'center',gap:8,marginRight:28}}>
          <div style={{width:28,height:28,borderRadius:6,background:`linear-gradient(135deg,${C.primary},${C.accent})`,display:'flex',alignItems:'center',justifyContent:'center'}}>
            <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><circle cx="7" cy="7" r="5" stroke="white" strokeWidth="1.5"/><circle cx="7" cy="7" r="2" fill="white"/></svg>
          </div>
          <span style={{fontSize:15,fontWeight:800,color:C.text1,letterSpacing:'-0.02em'}}>PARCLUB Admin</span>
        </div>
        <nav style={{display:'flex',gap:2}}>
          {NAV.map(n=>(
            <button key={n.id} onClick={()=>setRoute(n.id)} style={{padding:'8px 16px',background:'none',border:'none',borderBottom:`2px solid ${route===n.id?C.primary:'transparent'}`,color:route===n.id?C.primary:C.text2,fontWeight:route===n.id?700:400,cursor:'pointer',fontSize:14,fontFamily:'inherit',transition:'all 150ms',whiteSpace:'nowrap'}}>
              {n.label}
            </button>
          ))}
        </nav>
        <div style={{flex:1}} />
        <div style={{display:'flex',alignItems:'center',gap:12}}>
          <div style={{position:'relative'}}>
            <button onClick={()=>setNotifOpen(o=>!o)} style={{background:'none',border:`1px solid ${C.border}`,borderRadius:8,width:36,height:36,display:'flex',alignItems:'center',justifyContent:'center',cursor:'pointer',position:'relative',transition:'all 150ms'}}
              onMouseEnter={e=>e.currentTarget.style.borderColor=C.primary}
              onMouseLeave={e=>e.currentTarget.style.borderColor=C.border}>
              <svg width="16" height="16" fill="none" stroke={C.text2} strokeWidth="1.8" viewBox="0 0 24 24"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
              <span style={{position:'absolute',top:-4,right:-4,width:16,height:16,background:C.danger,borderRadius:'50%',color:'#fff',fontSize:10,fontWeight:800,display:'flex',alignItems:'center',justifyContent:'center'}}>3</span>
            </button>
            {notifOpen && (
              <div style={{position:'absolute',top:44,right:0,width:300,background:C.surface,borderRadius:12,boxShadow:'0 8px 32px rgba(0,0,0,0.15)',border:`1px solid ${C.border}`,zIndex:200,animation:'fadeInScale 150ms ease',padding:0,overflow:'hidden'}}>
                <div style={{padding:'12px 16px',borderBottom:`1px solid ${C.border}`,fontSize:13,fontWeight:700}}>알림</div>
                {[{msg:'미입금 주문 12건이 기한 내 처리 필요',time:'방금 전',type:'⚠️'},{msg:'재고 부족 상품 1개 — 와이드 핏 골프 스커트',time:'1시간 전',type:'📦'},{msg:'신규 VIP 회원 등록 — 최지은',time:'3시간 전',type:'👑'}].map((n,i)=>(
                  <div key={i} style={{padding:'12px 16px',borderBottom:`1px solid ${C.border}`,cursor:'pointer',transition:'background 150ms'}}
                    onMouseEnter={e=>e.currentTarget.style.background=C.borderLight}
                    onMouseLeave={e=>e.currentTarget.style.background='transparent'}>
                    <div style={{display:'flex',gap:10,alignItems:'flex-start'}}>
                      <span style={{fontSize:16}}>{n.type}</span>
                      <div>
                        <div style={{fontSize:13,color:C.text1,lineHeight:1.4}}>{n.msg}</div>
                        <div style={{fontSize:11,color:C.text2,marginTop:4}}>{n.time}</div>
                      </div>
                    </div>
                  </div>
                ))}
              </div>
            )}
          </div>
          <div style={{display:'flex',alignItems:'center',gap:8,padding:'6px 12px',border:`1px solid ${C.border}`,borderRadius:8,cursor:'pointer',transition:'all 150ms'}}
            onMouseEnter={e=>e.currentTarget.style.borderColor=C.primary}
            onMouseLeave={e=>e.currentTarget.style.borderColor=C.border}>
            <div style={{width:28,height:28,borderRadius:'50%',background:`linear-gradient(135deg,${C.primary},${C.accent})`,display:'flex',alignItems:'center',justifyContent:'center',color:'#fff',fontWeight:700,fontSize:12}}>관</div>
            <span style={{fontSize:13,fontWeight:600,color:C.text1}}>관리자</span>
          </div>
        </div>
      </header>

      <main style={{flex:1}} key={route}>
        {route==='home' && <DashboardPage onNavigate={setRoute} />}
        {route==='orders' && <OrdersPage onToast={msg=>setToast(msg)} />}
        {route==='products' && <ProductsPage onToast={msg=>setToast(msg)} />}
        {route==='customers' && <CustomersPage onToast={msg=>setToast(msg)} />}
      </main>

      <footer style={{background:C.secondary,color:'#fff',padding:'24px 32px',marginTop:'auto'}}>
        <div style={{maxWidth:1200,margin:'0 auto',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
          <div>
            <div style={{fontSize:14,fontWeight:700,marginBottom:4}}>PARCLUB 관리자 시스템</div>
            <div style={{fontSize:12,opacity:0.5}}>React + Node.js + PostgreSQL + Prisma + Redis + Recharts</div>
          </div>
          <div style={{display:'flex',gap:24}}>
            {['대시보드','주문 관리','상품 관리','고객 관리'].map(l=>(
              <button key={l} onClick={()=>setRoute(['home','orders','products','customers'][['대시보드','주문 관리','상품 관리','고객 관리'].indexOf(l)])} style={{fontSize:13,opacity:0.6,color:'#fff',background:'none',border:'none',cursor:'pointer',fontFamily:'inherit',transition:'opacity 150ms'}}
                onMouseEnter={e=>e.currentTarget.style.opacity='1'}
                onMouseLeave={e=>e.currentTarget.style.opacity='0.6'}>{l}</button>
            ))}
          </div>
          <div style={{fontSize:12,opacity:0.4}}>© 2026 PARCLUB</div>
        </div>
      </footer>
      {toast && <Toast msg={toast} onDone={()=>setToast(null)} />}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
