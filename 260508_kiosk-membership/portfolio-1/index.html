    @keyframes fadeIn{from{opacity:0}to{opacity:1}}
    @keyframes fadeInScale{from{opacity:0;transform:scale(0.95)}to{opacity:1;transform:scale(1)}}
    @keyframes slideInRight{from{opacity:0;transform:translateX(30px)}to{opacity:1;transform:translateX(0)}}
    @keyframes slideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
    @keyframes ripple{0%{transform:scale(0);opacity:0.5}100%{transform:scale(4);opacity:0}}
    @keyframes countUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
    @keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:0.5}}
    @keyframes barGrow{from{width:0%}to{width:var(--target-width)}}
    @keyframes slideDown{from{opacity:0;transform:translateY(-10px)}to{opacity:1;transform:translateY(0)}}

function CountUp({end,suffix='',duration=1200}){
  const[val,setVal]=React.useState(0);
  React.useEffect(()=>{
    let s=0;const step=end/(duration/16);
    const t=setInterval(()=>{s+=step;if(s>=end){setVal(end);clearInterval(t);}else setVal(Math.floor(s));},16);
    return()=>clearInterval(t);
  },[end]);
  return <span style={{animation:'countUp 400ms ease'}}>{val.toLocaleString()}{suffix}</span>;
}

function Toast({message,onClose}){
  React.useEffect(()=>{const t=setTimeout(onClose,3000);return()=>clearTimeout(t);},[]);
  return(
    <div style={{position:'fixed',bottom:24,right:24,zIndex:9999,background:C.text,color:'#fff',
      padding:'12px 24px',borderRadius:10,animation:'slideUp 300ms ease',
      boxShadow:'0 4px 16px rgba(0,0,0,0.2)',display:'flex',alignItems:'center',gap:8,fontSize:14}}>
      <span>✓</span>{message}
    </div>
  );
}

        {/* Category Filter */}

          display:'flex',gap:8,overflowX:'auto'}}>
          {MENU_CATS.map(c=>(

              style={{padding:'8px 18px',borderRadius:99,border:'none',cursor:'pointer',
                background:cat===c?C.primary:C.bg,color:cat===c?'#fff':C.textSub,
                fontSize:13,fontWeight:700,flexShrink:0,transition:'all 150ms'}}>
              {c}

        {/* Menu Grid */}
        <div style={{padding:24}}>

                  cartQty={cartMap[item.id]||0}/>

      {detailItem&&<MenuDetailDrawer item={detailItem} onClose={()=>setDetailItem(null)}
        onAdd={(item,qty)=>{onAdd(item,qty);}}/>}
    </div>
  );
}

      const t=setInterval(()=>{v+=2;setScanProgress(v);if(v>=100){clearInterval(t);setPhase('found');}},80);
      return()=>clearInterval(t);
    }
  },[phase,key]);

  const handleManual=()=>{
    const found=MEMBERS.find(m=>m.id===inputCode||m.phone.includes(inputCode));
    if(found){setMember(found);setPhase('success');}
    else toast('회원 정보를 찾을 수 없습니다');
  };

  const handleNewMember=()=>{
    if(!newData.name||!newData.phone){toast('이름과 연락처를 입력해주세요');return;}

  };

  const curMember=member||MEMBERS[0];
  const gradeInfo=GRADES.find(g=>g.name===(phase==='success'?(member||{grade:'골드'}).grade:'골드'))||GRADES[2];

      <div style={{maxWidth:560,margin:'40px auto',padding:'0 24px'}}>
        {phase==='scan'&&(
          <div style={{animation:'fadeIn 300ms ease'}}>

              border:`2px solid ${C.border}`,boxShadow:C.shadow}}>

                border:`3px solid ${C.primary}`,borderRadius:16,overflow:'hidden',
                animation:'qrPulse 2s ease infinite',background:'#f9f9f9'}}>
                <div style={{position:'absolute',inset:0,display:'flex',alignItems:'center',justifyContent:'center'}}>
                  <div style={{display:'grid',gridTemplateColumns:'repeat(5,1fr)',gap:4,padding:24}}>
                    {Array(25).fill(0).map((_,i)=>(
                      <div key={i} style={{width:12,height:12,background:Math.random()>0.5?C.text:'transparent',borderRadius:2}}/>
                    ))}
                  </div>
                </div>
                <div style={{position:'absolute',top:0,left:0,right:0,height:3,background:C.primary,
                  animation:'scanLine 2s linear infinite'}}/>
                <div style={{position:'absolute',inset:0,background:`linear-gradient(180deg,transparent 60%,${C.primary}22)`}}/>
              </div>
              <div style={{marginBottom:8}}>
                <div style={{height:6,background:C.bg,borderRadius:99,overflow:'hidden',marginBottom:8}}>
                  <div style={{height:'100%',background:C.primary,borderRadius:99,
                    width:`${scanProgress}%`,transition:'width 80ms linear'}}/>
                </div>
                <p style={{fontSize:14,color:C.textSub}}>
                  {scanProgress<100?'카메라 QR 스캔 중... (웹카메라 API 시뮬레이션)':'회원 정보 확인 중...'}

              <div style={{display:'flex',gap:8}}>

                  style={{flex:1,padding:'10px 14px',borderRadius:10,border:`1.5px solid ${C.border}`,
                    fontSize:14,outline:'none',fontFamily:'Pretendard'}}/>
                <button onClick={handleManual}
                  style={{padding:'10px 18px',background:C.primary,color:'#fff',border:'none',
                    borderRadius:10,fontSize:14,fontWeight:700,cursor:'pointer'}}>
                  확인
                </button>
              </div>
              <button onClick={()=>setNewForm(true)} style={{width:'100%',marginTop:10,
                padding:'10px',background:'transparent',color:C.textSub,border:`1px dashed ${C.border}`,
                borderRadius:10,fontSize:13,cursor:'pointer'}}>
                신규 회원 등록
              </button>
            </div>
          </div>
        )}

        {phase==='found'&&(
          <div style={{animation:'fadeInScale 300ms ease'}}>
            <div style={{background:C.surface,borderRadius:20,padding:32,border:`2px solid ${C.primary}`,
              boxShadow:C.shadow,textAlign:'center'}}>
              <div style={{fontSize:48,marginBottom:12}}>✅</div>
              <h2 style={{fontSize:20,fontWeight:800,color:C.text,marginBottom:4}}>회원 인증 완료</h2>
              <p style={{fontSize:14,color:C.textSub,marginBottom:24}}>반갑습니다, {MEMBERS[0].name} 고객님!</p>

                    padding:'4px 12px',borderRadius:99}}>{MEMBERS[0].grade}</span>
                  <span style={{fontSize:14,fontWeight:600,color:C.text}}>{MEMBERS[0].name}</span>
                </div>
                <div style={{fontSize:28,fontWeight:800,color:GRADES[2].color}}>10% 할인 적용</div>
                <div style={{fontSize:12,color:C.textLight,marginTop:4}}>방문 {MEMBERS[0].visits}회 | 누적 {MEMBERS[0].totalAmt.toLocaleString()}원</div>
              </div>
              <button onClick={()=>{setMember(MEMBERS[0]);setPhase('success');}}
                style={{width:'100%',background:C.primary,color:'#fff',border:'none',borderRadius:12,
                  padding:'14px',fontSize:15,fontWeight:800,cursor:'pointer'}}>

              <button onClick={()=>{setPhase('scan');setScanProgress(0);setKey(k=>k+1);}}

        {phase==='success'&&member&&(
          <div style={{animation:'fadeInScale 300ms ease'}}>
            <div style={{background:C.surface,borderRadius:20,padding:28,border:`2px solid ${C.accent}`,boxShadow:`0 4px 16px ${C.accent}22`}}>

                <div>
                  <div style={{fontSize:16,fontWeight:800,color:C.text}}>{member.name} 고객님</div>
                  <span style={{background:GRADES.find(g=>g.name===member.grade)?.color||C.textSub,
                    color:'#fff',fontSize:11,fontWeight:700,padding:'3px 10px',borderRadius:99}}>{member.grade}</span>
                </div>
                <div style={{marginLeft:'auto',textAlign:'right'}}>
                  <div style={{fontSize:22,fontWeight:800,color:C.accent}}>{member.discount}%</div>
                  <div style={{fontSize:11,color:C.textLight}}>할인율</div>

              </div>
              <div style={{height:6,background:C.bg,borderRadius:99,overflow:'hidden',marginBottom:6}}>

            </div>
          </div>
        )}
      </div>

      {newForm&&(
        <Modal title="신규 회원 등록" onClose={()=>setNewForm(false)}>

            <div>
              <label style={{fontSize:13,fontWeight:600,color:C.text,display:'block',marginBottom:6}}>이름 *</label>

  );
}

const DEMO_CART=[

];
const DEMO_MEMBER={name:'김민준',grade:'골드',discount:10};

function PaymentPage({cart,member,setCart,toast}){
  const[step,setStep]=React.useState(0);

    {id:'card',label:'신용카드',icon:'💳'},

    {id:'kakao',label:'카카오페이',icon:'🟡'},
  ];

  const handlePay=()=>{
    setStep(2);
    setTimeout(()=>setStep(3),2500);
  };

  return(
    <div style={{flex:1,animation:'fadeIn 300ms ease'}}>
      <div style={{background:C.gradHero,padding:'28px 32px',color:'#fff'}}>

                  fontSize:11,fontWeight:800,color:i<=step?C.primary:'rgba(255,255,255,0.7)'}}>
                  {i<step?'✓':i+1}
                </div>
                <span style={{fontSize:12,opacity:i<=step?1:0.6}}>{s}</span>
              </div>
              {i<3&&<div style={{width:24,height:1,background:'rgba(255,255,255,0.4)',margin:'0 4px'}}/>}
            </React.Fragment>
          ))}
        </div>
      </div>

      <div style={{maxWidth:520,margin:'32px auto',padding:'0 24px'}}>
        {step===0&&(
          <div style={{animation:'fadeIn 300ms ease'}}>

                    <div style={{fontSize:14,fontWeight:600,color:C.text}}>{item.name}</div>
                    <div style={{fontSize:12,color:C.textLight}}>{item.qty}개 × {item.price.toLocaleString()}원</div>
                  </div>
                  <span style={{fontSize:14,fontWeight:700,color:C.text}}>{(item.price*item.qty).toLocaleString()}원</span>
                </div>
              ))}
            </div>
            <div style={{background:C.surface,borderRadius:14,padding:16,marginBottom:20,border:`1px solid ${C.border}`}}>
              <div style={{display:'flex',justifyContent:'space-between',marginBottom:6}}>
                <span style={{fontSize:14,color:C.textSub}}>소계</span>
                <span style={{fontSize:14,color:C.text}}>{subtotal.toLocaleString()}원</span>
              </div>
              <div style={{display:'flex',justifyContent:'space-between',marginBottom:6}}>
                <span style={{fontSize:14,color:C.accent}}>{effectiveMember.grade} 멤버십 할인 ({effectiveMember.discount}%)</span>

                <span style={{fontSize:20,fontWeight:800,color:C.primary}}>{total.toLocaleString()}원</span>
              </div>

            <button onClick={()=>setStep(1)}

              background:C.bg,borderRadius:12,padding:16}}>
              <span style={{fontSize:15,fontWeight:700,color:C.text}}>최종 결제금액</span>
              <span style={{fontSize:20,fontWeight:800,color:C.primary}}>{total.toLocaleString()}원</span>
            </div>
            <button onClick={handlePay}

                padding:'14px',fontSize:15,fontWeight:800,cursor:'pointer'}}>
              {total.toLocaleString()}원 결제하기
            </button>
          </div>
        )}

        {step===2&&(
          <div style={{textAlign:'center',padding:'60px 0',animation:'fadeIn 300ms ease'}}>
            <div style={{fontSize:60,marginBottom:20,animation:'pulse 1s ease infinite'}}>⏳</div>
            <h2 style={{fontSize:20,fontWeight:800,color:C.text,marginBottom:8}}>결제 처리 중...</h2>
            <p style={{fontSize:14,color:C.textSub}}>포트원 PG 결제 연동 처리 중입니다<br/>잠시만 기다려주세요</p>
            <div style={{marginTop:24,height:4,background:C.bg,borderRadius:99,overflow:'hidden'}}>
              <div style={{height:'100%',background:C.primary,borderRadius:99,
                animation:'barGrow 2.5s ease both','--target-width':'100%',width:'100%'}}/>
            </div>
          </div>
        )}

        {step===3&&(
          <div style={{textAlign:'center',padding:'40px 0',animation:'fadeInScale 300ms ease'}}>
            <div style={{width:80,height:80,borderRadius:99,background:`${C.accent}15`,
              display:'flex',alignItems:'center',justifyContent:'center',fontSize:44,
              margin:'0 auto 20px'}}>✅</div>
            <h2 style={{fontSize:22,fontWeight:800,color:C.text,marginBottom:8}}>결제 완료!</h2>
            <p style={{fontSize:14,color:C.textSub,marginBottom:24}}>감사합니다. 주문이 접수되었습니다</p>
            <div style={{background:C.surface,borderRadius:16,padding:20,textAlign:'left',
              border:`1px solid ${C.border}`,marginBottom:20}}>
              <div style={{display:'flex',justifyContent:'space-between',marginBottom:8}}>
                <span style={{fontSize:13,color:C.textLight}}>주문번호</span>
                <span style={{fontSize:13,fontWeight:700,color:C.text}}>ORD-{Math.floor(Math.random()*9000)+1000}</span>
              </div>
              <div style={{display:'flex',justifyContent:'space-between',marginBottom:8}}>
                <span style={{fontSize:13,color:C.textLight}}>결제 수단</span>
                <span style={{fontSize:13,fontWeight:600,color:C.text}}>{METHODS.find(m=>m.id===method)?.label}</span>

                <span style={{fontSize:15,fontWeight:700,color:C.text}}>결제 금액</span>
                <span style={{fontSize:18,fontWeight:800,color:C.primary}}>{total.toLocaleString()}원</span>
              </div>
            </div>
            <button onClick={()=>{setCart([]);setStep(0);toast('영수증이 출력됩니다');}}
              style={{width:'100%',background:C.primary,color:'#fff',border:'none',borderRadius:12,
                padding:'14px',fontSize:15,fontWeight:800,cursor:'pointer'}}>
              처음으로 돌아가기
            </button>
          </div>
        )}
      </div>
    </div>
  );
}

            <div style={{height:6,background:C.bg,borderRadius:99,overflow:'hidden',marginBottom:4}}>
              <div style={{height:'100%',background:gradeInfo.color,borderRadius:99,
                width:`${Math.min(100,(member.visits/30)*100)}%`,transition:'width 800ms ease'}}/>
            </div>
            <div style={{display:'flex',justifyContent:'space-between',fontSize:11,color:C.textLight}}>
              <span>방문 {member.visits}회</span>
              <span>VIP까지 {Math.max(0,30-member.visits)}회 남음</span>
            </div>
          </div>

          {/* 주문 내역 */}
          <h2 style={{fontSize:15,fontWeight:700,color:C.text,marginBottom:12}}>최근 주문</h2>
          {ORDERS_HISTORY.map((order,i)=>(
            <div key={order.id} onClick={()=>setSelected(selected===order.id?null:order.id)}
              style={{background:C.surface,borderRadius:14,padding:16,marginBottom:10,cursor:'pointer',
                border:`1px solid ${selected===order.id?C.primary:C.border}`,
                boxShadow:C.shadowCard,transition:'all 200ms',
                animation:`slideUp 350ms ease ${i*80}ms both`}}>
              <div style={{display:'flex',justifyContent:'space-between',marginBottom:8}}>
                <div>
                  <span style={{fontSize:12,fontWeight:700,color:C.primary,marginRight:8}}>{order.id}</span>
                  <span style={{fontSize:12,color:C.textLight}}>{order.date}</span>
                </div>
                <span style={{fontSize:14,fontWeight:800,color:C.text}}>{order.total.toLocaleString()}원</span>
              </div>
              <div style={{fontSize:13,color:C.textSub,marginBottom:8}}>
                {order.items.join(' · ')}
              </div>
              {order.discounted<order.total&&(
                <div style={{display:'flex',alignItems:'center',gap:6}}>
                  <span style={{fontSize:11,color:C.accent,fontWeight:700}}>
                    멤버십 할인 -{(order.total-order.discounted).toLocaleString()}원
                  </span>
                </div>
              )}
              {selected===order.id&&(
                <div style={{marginTop:12,paddingTop:12,borderTop:`1px solid ${C.border}`,animation:'slideDown 200ms ease'}}>
                  <button
                    style={{padding:'8px 20px',background:C.primary,color:'#fff',border:'none',
                      borderRadius:99,fontSize:13,fontWeight:700,cursor:'pointer'}}
                    onClick={e=>{e.stopPropagation();}}>
                    재주문 →
                  </button>
                </div>
              )}
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

function App(){
  const[tab,setTab]=React.useState('home');
  const[cart,setCart]=React.useState([]);
  const[member,setMember]=React.useState(null);
  const[toastMsg,setToastMsg]=React.useState(null);
  const[showCart,setShowCart]=React.useState(true);
  const[pageKey,setPageKey]=React.useState(0);

  const toast=(msg)=>setToastMsg(msg);

  const cartMap=React.useMemo(()=>{
    const m={};cart.forEach(i=>{m[i.id]=i.qty;});return m;
  },[cart]);

  const addToCart=(item,qty=1)=>{
    setCart(prev=>{
      const idx=prev.findIndex(i=>i.id===item.id);
      if(idx>=0){
        const next=[...prev];
        next[idx]={...next[idx],qty:next[idx].qty+qty};
        return next;
      }
      return[...prev,{...item,qty}];
    });
    toast(`${item.name} 담았습니다`);
    setShowCart(true);
  };

  const updateCartQty=(id,qty)=>{
    setCart(prev=>qty<=0?prev.filter(i=>i.id!==id):prev.map(i=>i.id===id?{...i,qty}:i));
  };

  const switchTab=(t)=>{setTab(t);setPageKey(k=>k+1);};
  const cartTotal=cart.reduce((s,i)=>s+i.qty,0);

  const TABS=[
    {id:'home',label:'홈'},
    {id:'membership',label:'멤버십 인증'},
    {id:'payment',label:'결제하기'},
    {id:'orders',label:'주문 내역'},
  ];

  return(
    <div style={{display:'flex',flexDirection:'column',width:'100%',minHeight:'100vh',background:C.bg}}>
      {/* TopNav */}
      <header style={{position:'sticky',top:0,zIndex:100,background:C.surface,
        borderBottom:`1px solid ${C.border}`,
        display:'flex',alignItems:'center',height:56,padding:'0 20px',gap:4,
        boxShadow:'0 2px 8px rgba(0,0,0,0.06)'}}>
        <div style={{display:'flex',alignItems:'center',gap:8,marginRight:16}}>
          <span style={{fontSize:22}}>🍽️</span>
          <span style={{fontSize:15,fontWeight:800,color:C.primary}}>맛있는 키오스크</span>
        </div>
        {TABS.map(t=>(
          <button key={t.id} onClick={()=>switchTab(t.id)}
            style={{padding:'8px 14px',border:'none',background:'none',cursor:'pointer',
              fontSize:13,fontWeight:tab===t.id?700:500,
              color:tab===t.id?C.primary:C.textSub,borderRadius:8,
              borderBottom:tab===t.id?`2px solid ${C.primary}`:'2px solid transparent',
              transition:'all 150ms'}}>
            {t.label}
          </button>
        ))}
        <div style={{flex:1}}/>
        <button onClick={()=>setShowCart(!showCart)} style={{position:'relative',background:'none',border:'none',cursor:'pointer',
          padding:'8px',borderRadius:8,fontSize:20}}>
          🛒
          {cartTotal>0&&<span style={{position:'absolute',top:2,right:2,background:C.primary,color:'#fff',
            fontSize:10,fontWeight:700,width:16,height:16,borderRadius:99,display:'flex',alignItems:'center',justifyContent:'center'}}>
            {cartTotal}
          </span>}
        </button>
        {member&&<div style={{display:'flex',alignItems:'center',gap:6,marginLeft:4,
          background:`${C.primary}12`,padding:'6px 12px',borderRadius:99}}>
          <span style={{fontSize:11,fontWeight:700,color:C.primary}}>{member.grade}</span>
          <span style={{fontSize:12,color:C.textSub}}>{member.name}</span>
        </div>}
        <div style={{width:32,height:32,borderRadius:99,background:C.bg,border:`1.5px solid ${C.border}`,
          display:'flex',alignItems:'center',justifyContent:'center',cursor:'pointer',marginLeft:4}}>
          <span style={{fontSize:15}}>👤</span>
        </div>
      </header>

      {/* Content */}
      <div key={pageKey} style={{flex:1,display:'flex',animation:'fadeIn 280ms ease'}}>
        {tab==='home'&&<HomePage cart={cart} cartMap={cartMap} onAdd={addToCart} member={member}
          onPaymentTab={()=>switchTab('payment')} showCart={showCart} setShowCart={setShowCart}
          onUpdateQty={updateCartQty}/>}
        {tab==='membership'&&<MembershipPage member={member} setMember={setMember} toast={toast}/>}
        {tab==='payment'&&<PaymentPage cart={cart} member={member} setCart={setCart} toast={toast}/>}
        {tab==='orders'&&<OrdersPage member={member}/>}
      </div>

      {toastMsg&&<Toast message={toastMsg} onClose={()=>setToastMsg(null)}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
