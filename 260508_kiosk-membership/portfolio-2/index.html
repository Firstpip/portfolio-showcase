function CountUp({end,suffix='',prefix='',duration=1400}){
  const[val,setVal]=React.useState(0);
  React.useEffect(()=>{
    let s=0;const step=end/(duration/16);
    const t=setInterval(()=>{s+=step;if(s>=end){setVal(end);clearInterval(t);}else setVal(Math.floor(s));},16);
    return()=>clearInterval(t);
  },[end]);
  return <span style={{animation:'countUp 400ms ease'}}>{prefix}{val.toLocaleString()}{suffix}</span>;
}

function Toast({message,type='success',onClose}){
  React.useEffect(()=>{const t=setTimeout(onClose,3000);return()=>clearTimeout(t);},[]);
  return(
    <div style={{position:'fixed',bottom:24,right:24,zIndex:9999,
      background:type==='success'?C.success:C.error,color:'#fff',
      padding:'12px 20px',borderRadius:10,animation:'slideUp 300ms ease',
      boxShadow:'0 4px 16px rgba(0,0,0,0.2)',display:'flex',alignItems:'center',gap:8,fontSize:14}}>
      {type==='success'?'✓':'✕'} {message}
    </div>
  );
}

// Chart components
function LineChart(){
  const ref=React.useRef(null);
  const chartRef=React.useRef(null);
  React.useEffect(()=>{
    if(!ref.current)return;
    if(chartRef.current)chartRef.current.destroy();
    chartRef.current=new Chart(ref.current,{
      type:'line',
      data:{
        labels:WEEKLY_LABELS,
        datasets:[{
          label:'매출',data:WEEKLY_SALES,
          borderColor:C.accent,backgroundColor:`${C.accent}18`,
          borderWidth:2.5,tension:0.4,fill:true,
          pointBackgroundColor:C.accent,pointBorderColor:'#fff',pointBorderWidth:2,pointRadius:5,
        }]
      },
      options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},
        tooltip:{callbacks:{label:ctx=>`${ctx.parsed.y.toLocaleString()}원`}}},
        scales:{y:{ticks:{callback:v=>`${(v/10000).toFixed(0)}만`},grid:{color:'#F1F5F9'}},
          x:{grid:{display:false}}}}
    });
    return()=>{if(chartRef.current)chartRef.current.destroy();};
  },[]);
  return <canvas ref={ref}/>;
}

function BarChart(){
  const ref=React.useRef(null);
  const chartRef=React.useRef(null);
  React.useEffect(()=>{
    if(!ref.current)return;
    if(chartRef.current)chartRef.current.destroy();
    chartRef.current=new Chart(ref.current,{
      type:'bar',
      data:{
        labels:MENU_RANK.map(m=>m.name.length>10?m.name.substring(0,10)+'…':m.name),
        datasets:[{
          data:MENU_RANK.map(m=>m.qty),
          backgroundColor:[`${C.accent}CC`,`${C.accent}AA`,`${C.accent}88`,`${C.accent}66`,`${C.accent}44`],
          borderRadius:6,borderSkipped:false,
        }]
      },
      options:{responsive:true,maintainAspectRatio:false,indexAxis:'y',plugins:{legend:{display:false},
        tooltip:{callbacks:{label:ctx=>`${ctx.parsed.x}개 판매`}}},
        scales:{x:{ticks:{callback:v=>`${v}개`},grid:{color:'#F1F5F9'}},y:{grid:{display:false}}}}
    });
    return()=>{if(chartRef.current)chartRef.current.destroy();};
  },[]);
  return <canvas ref={ref}/>;
}

function DonutChart(){
  const ref=React.useRef(null);
  const chartRef=React.useRef(null);
  React.useEffect(()=>{
    if(!ref.current)return;
    if(chartRef.current)chartRef.current.destroy();
    chartRef.current=new Chart(ref.current,{
      type:'doughnut',
      data:{
        labels:GRADE_DIST.map(g=>g.label),
        datasets:[{data:GRADE_DIST.map(g=>g.pct),backgroundColor:GRADE_DIST.map(g=>g.color),
          borderWidth:0,hoverOffset:8}]
      },
      options:{responsive:true,maintainAspectRatio:false,cutout:'65%',
        plugins:{legend:{position:'right',labels:{usePointStyle:true,pointStyle:'circle',
          font:{family:'Pretendard',size:12}}},
          tooltip:{callbacks:{label:ctx=>`${ctx.label}: ${ctx.parsed}%`}}}}
    });
    return()=>{if(chartRef.current)chartRef.current.destroy();};
  },[]);
  return <canvas ref={ref}/>;
}

            <button onClick={()=>{setPolicyModal(false);toast('등급 정책이 저장되었습니다. 배치 재산정 중...');}}
              style={{flex:1,padding:'12px',background:C.primary,color:'#fff',border:'none',
                borderRadius:10,fontSize:14,fontWeight:700,cursor:'pointer'}}>저장 및 배치 재산정</button>
          </div>
        </Modal>
      )}
    </div>
  );
}

function StoresPage({toast}){
  const[drawerItem,setDrawerItem]=React.useState(null);
  const[addModal,setAddModal]=React.useState(false);
  const storeChartRef=React.useRef(null);
  const storeChartInst=React.useRef(null);

  React.useEffect(()=>{
    if(!storeChartRef.current)return;
    if(storeChartInst.current)storeChartInst.current.destroy();
    storeChartInst.current=new Chart(storeChartRef.current,{
      type:'bar',
      data:{
        labels:STORES_DATA.map(s=>s.name),
        datasets:[
          {label:'매출',data:STORES_DATA.map(s=>s.sales),backgroundColor:`${C.primary}CC`,borderRadius:6,borderSkipped:false},
          {label:'주문 수',data:STORES_DATA.map(s=>s.orders*15000),backgroundColor:`${C.accent}AA`,borderRadius:6,borderSkipped:false},
        ]
      },
      options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'top',
        labels:{font:{family:'Pretendard',size:12}}}},
        scales:{y:{ticks:{callback:v=>`${(v/10000).toFixed(0)}만`},grid:{color:'#F1F5F9'}},
          x:{grid:{display:false}},}}
    });
    return()=>{if(storeChartInst.current)storeChartInst.current.destroy();};
  },[]);

  return(
    <div style={{flex:1,overflowY:'auto',animation:'fadeIn 300ms ease'}}>
      <div style={{background:C.gradHero,padding:'28px 32px',color:'#fff'}}>
        <h1 style={{fontSize:24,fontWeight:800,marginBottom:4}}>🏪 매장 관리</h1>
        <p style={{fontSize:14,opacity:0.8}}>멀티 매장 독립 운영 · Redis pub/sub 실시간 키오스크 연동</p>
      </div>

      <div style={{padding:24}}>
        {/* Comparison chart */}
        <div style={{background:C.surface,borderRadius:12,padding:20,marginBottom:20,boxShadow:C.shadowCard}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:14}}>
            <div>
              <div style={{fontSize:13,fontWeight:700,color:C.text}}>매장 간 매출 비교 (이번달)</div>
              <div style={{fontSize:11,color:C.textLight}}>Chart.js 그룹 바 차트 · Prisma 집계</div>
            </div>
          </div>
          <div className="chart-canvas-wrap" style={{height:200}}>
            <canvas ref={storeChartRef}/>
          </div>
        </div>

        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:14}}>
          <div style={{fontSize:14,fontWeight:700,color:C.text}}>전체 매장 ({STORES_DATA.length}개)</div>
          <button onClick={()=>setAddModal(true)}
            style={{padding:'9px 16px',background:C.primary,color:'#fff',border:'none',
              borderRadius:10,fontSize:13,fontWeight:700,cursor:'pointer'}}>+ 매장 추가</button>
        </div>

        <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(280px,1fr))',gap:14}}>
          {STORES_DATA.map((store,i)=>(
            <div key={store.id} onClick={()=>setDrawerItem(store)}
              style={{background:C.surface,borderRadius:14,padding:20,cursor:'pointer',
                boxShadow:C.shadowCard,border:`1px solid ${C.border}`,
                animation:`slideUp 350ms ease ${i*70}ms both`,transition:'all 200ms'}}
              onMouseEnter={e=>{e.currentTarget.style.transform='translateY(-2px)';e.currentTarget.style.boxShadow='0 6px 18px rgba(0,0,0,0.1)';}}
              onMouseLeave={e=>{e.currentTarget.style.transform='none';e.currentTarget.style.boxShadow=C.shadowCard;}}>
              <div style={{display:'flex',justifyContent:'space-between',marginBottom:12}}>
                <div>
                  <div style={{fontSize:16,fontWeight:800,color:C.text,marginBottom:3}}>{store.name}</div>
                  <div style={{fontSize:12,color:C.textLight}}>{store.region} · 키오스크 {store.kiosk}대</div>
                </div>
                <span style={{background:store.status==='점검중'?'#FEF3C7':'#D1FAE5',
                  color:store.status==='점검중'?C.warning:C.success,
                  fontSize:11,fontWeight:700,padding:'4px 10px',borderRadius:99,height:'fit-content'}}>{store.status}</span>
              </div>
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8}}>
                {[{l:'이번달 매출',v:`${(store.sales/10000).toFixed(0)}만원`},
                  {l:'주문 건수',v:`${store.orders}건`},
                  {l:'총 회원',v:`${store.members}명`},
                  {l:'객단가',v:`${Math.round(store.sales/store.orders).toLocaleString()}원`}].map(k=>(
                  <div key={k.l} style={{background:C.bg,borderRadius:8,padding:'8px 10px'}}>
                    <div style={{fontSize:10,color:C.textLight,marginBottom:2}}>{k.l}</div>
                    <div style={{fontSize:14,fontWeight:700,color:C.text}}>{k.v}</div>
                  </div>
                ))}
              </div>
              <div style={{marginTop:12,display:'flex',alignItems:'center',gap:6}}>
                <div style={{width:8,height:8,borderRadius:99,background:store.status==='정상'?C.success:C.warning,
                  animation:store.status==='정상'?'pulse 2s ease infinite':'none'}}/>
                <span style={{fontSize:11,color:C.textLight}}>
                  {store.status==='정상'?'키오스크 실시간 연동 중':'점검으로 키오스크 오프라인'}
                </span>
              </div>
            </div>
          ))}
        </div>
      </div>

      {drawerItem&&<Drawer item={drawerItem} type="store" onClose={()=>setDrawerItem(null)} toast={toast}/>}

      {addModal&&(
        <Modal title="새 매장 추가" onClose={()=>setAddModal(false)}>
          <div style={{display:'flex',flexDirection:'column',gap:14}}>
            {[['매장명','text','예: 인천공항점'],['지역','text','예: 인천'],['키오스크 수','number','0']].map(([label,type,ph])=>(
              <div key={label}>
                <label style={{fontSize:13,fontWeight:600,color:C.text,display:'block',marginBottom:6}}>{label}</label>
                <input type={type} placeholder={ph}
                  style={{width:'100%',padding:'10px 14px',borderRadius:10,border:`1.5px solid ${C.border}`,
                    fontSize:14,outline:'none',fontFamily:'Pretendard'}}/>
              </div>
            ))}
            <div style={{background:`${C.accent}08`,border:`1px solid ${C.accent}40`,borderRadius:10,padding:12,fontSize:12,color:C.textSub}}>
              💡 매장 등록 후 공통 메뉴 템플릿이 자동 적용됩니다. 매장별 가격/품절 재정의는 메뉴 관리에서 설정하세요.
            </div>
            <div style={{display:'flex',gap:8}}>
              <button onClick={()=>setAddModal(false)}
                style={{flex:1,padding:'12px',background:C.bg,color:C.textSub,border:`1px solid ${C.border}`,borderRadius:10,fontSize:14,cursor:'pointer'}}>취소</button>
              <button onClick={()=>{setAddModal(false);toast('새 매장이 등록되었습니다');}}
                style={{flex:1,padding:'12px',background:C.primary,color:'#fff',border:'none',borderRadius:10,fontSize:14,fontWeight:700,cursor:'pointer'}}>등록</button>
            </div>
          </div>
        </Modal>
      )}
    </div>
  );
}

function App(){
  const[route,setRoute]=React.useState('home');
  const[toastData,setToastData]=React.useState(null);
  const[pageKey,setPageKey]=React.useState(0);

  const toast=(msg,type='success')=>setToastData({msg,type});
  const switchRoute=(r)=>{setRoute(r);setPageKey(k=>k+1);};

  const NAV=[
    {id:'home',label:'대시보드'},
    {id:'menu',label:'메뉴 관리'},
    {id:'members',label:'회원 관리'},
    {id:'stores',label:'매장 관리'},
  ];

  return(
    <div style={{display:'flex',flexDirection:'column',width:'100%',minHeight:'100vh',background:C.bg}}>
      {/* Global Nav */}
      <header style={{position:'sticky',top:0,zIndex:100,background:C.surface,
        borderBottom:`1px solid ${C.border}`,
        display:'flex',alignItems:'center',height:64,padding:'0 28px',
        boxShadow:'0 1px 4px rgba(0,0,0,0.06)'}}>
        <div style={{display:'flex',alignItems:'center',gap:8,marginRight:24}}>
          <div style={{width:32,height:32,borderRadius:8,background:C.gradHero,
            display:'flex',alignItems:'center',justifyContent:'center',fontSize:16}}>🏪</div>
          <div>
            <div style={{fontSize:13,fontWeight:800,color:C.primary,lineHeight:1.2}}>KIOSK PRO</div>
            <div style={{fontSize:10,color:C.textLight}}>멤버십 통합 관리</div>
          </div>
        </div>
        <nav style={{display:'flex',gap:2}}>
          {NAV.map(n=>(
            <button key={n.id} onClick={()=>switchRoute(n.id)} className="nav-link"
              style={{padding:'8px 16px',border:'none',background:'none',cursor:'pointer',
                fontSize:13,fontWeight:route===n.id?700:500,
                color:route===n.id?C.primary:C.textSub,borderRadius:8,
                borderBottom:route===n.id?`2px solid ${C.primary}`:'2px solid transparent',
                transition:'all 150ms'}}>
              {n.label}
            </button>
          ))}
        </nav>
        <div style={{flex:1}}/>
        <div style={{display:'flex',alignItems:'center',gap:12}}>
          <div style={{display:'flex',alignItems:'center',gap:6,background:`${C.success}12`,
            padding:'6px 12px',borderRadius:99}}>
            <div style={{width:8,height:8,borderRadius:99,background:C.success,animation:'pulse 2s ease infinite'}}/>
            <span style={{fontSize:11,color:C.success,fontWeight:700}}>Redis 연결됨</span>
          </div>
          <button style={{background:'none',border:'none',cursor:'pointer',fontSize:18,padding:'4px'}}>🔔</button>
          <div style={{width:36,height:36,borderRadius:99,background:C.gradHero,
            display:'flex',alignItems:'center',justifyContent:'center',cursor:'pointer'}}>
            <span style={{fontSize:14,color:'#fff',fontWeight:700}}>관</span>
          </div>
        </div>
      </header>

      {/* Page Content */}
      <div key={pageKey} style={{flex:1,display:'flex',flexDirection:'column',animation:'fadeIn 280ms ease'}}>
        {route==='home'&&<DashboardPage/>}
        {route==='menu'&&<MenuPage toast={toast}/>}
        {route==='members'&&<MembersPage toast={toast}/>}
        {route==='stores'&&<StoresPage toast={toast}/>}
      </div>

      {/* Footer */}
      <footer style={{background:C.primary,color:'rgba(255,255,255,0.7)',padding:'24px 28px',
        display:'flex',alignItems:'center',justifyContent:'space-between',fontSize:12}}>
        <div>
          <span style={{fontWeight:700,color:'#fff',marginRight:12}}>KIOSK PRO</span>
          키오스크 멤버십 통합 관리 플랫폼 | React 18 + Node.js + PostgreSQL + Redis
        </div>
        <div style={{display:'flex',gap:16}}>
          <span>멀티 매장: {STORES_DATA.length}개</span>
          <span>총 회원: {MEMBERS_DATA.length}명</span>
          <span>메뉴: {MENUS_DATA.length}개</span>
        </div>
      </footer>

      {toastData&&<Toast message={toastData.msg} type={toastData.type} onClose={()=>setToastData(null)}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
