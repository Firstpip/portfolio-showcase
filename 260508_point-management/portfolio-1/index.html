<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PointHub — 회원 포인트 관리 시스템</title>
<link rel="preconnect" href="https://cdn.jsdelivr.net">
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" rel="stylesheet">
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://unpkg.com/prop-types/prop-types.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/recharts@2.15.0/umd/Recharts.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body, #root { width: 100%; height: 100%; font-family: 'Pretendard', -apple-system, sans-serif; }
  body { background: #F0F4F8; color: #1C2B3A; }

  @keyframes fadeIn { from { opacity: 0 } to { opacity: 1 } }
  @keyframes fadeInScale { from { opacity: 0; transform: scale(0.95) } to { opacity: 1; transform: scale(1) } }
  @keyframes slideInRight { from { opacity: 0; transform: translateX(30px) } to { opacity: 1; transform: translateX(0) } }
  @keyframes slideUp { from { opacity: 0; transform: translateY(20px) } to { opacity: 1; transform: translateY(0) } }
  @keyframes ripple { 0% { transform: scale(0); opacity: 0.5 } 100% { transform: scale(4); opacity: 0 } }
  @keyframes countUp { from { opacity: 0; transform: translateY(10px) } to { opacity: 1; transform: translateY(0) } }
  @keyframes shimmer { 0% { background-position: -200% 0 } 100% { background-position: 200% 0 } }
  @keyframes pulse { 0%, 100% { opacity: 1 } 50% { opacity: 0.5 } }
  @keyframes barGrow { from { width: 0% } to { width: var(--target-width) } }
  @keyframes slideDown { from { opacity: 0; transform: translateY(-10px); max-height: 0 } to { opacity: 1; transform: translateY(0); max-height: 500px } }
  @keyframes spin { to { transform: rotate(360deg) } }

  .chart-wrap { position: relative; height: 220px; }
  .chart-wrap canvas { width: 100% !important; height: 100% !important; }

  button { cursor: pointer; border: none; outline: none; font-family: 'Pretendard', sans-serif; }
  input, select, textarea { font-family: 'Pretendard', sans-serif; outline: none; }

  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #C4D0DC; border-radius: 3px; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useCallback, useRef } = React;
const { LineChart, Line, BarChart, Bar, XAxis, YAxis, CartesianGrid, Tooltip, ResponsiveContainer, PieChart, Pie, Cell, AreaChart, Area, Legend } = Recharts;

// ── 색상 팔레트

  bg: '#F0F4F8', surface: '#FFFFFF', text: '#1C2B3A', textSub: '#5A6A7E',
  border: '#DDE4EE', success: '#16A34A', warning: '#D97706', danger: '#DC2626',

// ── 더미 데이터

  { id: 1, name: '김민수', email: 'minsu@example.com', phone: '010-2345-6789', point: 48200, expiringSoon: 5000, joinDate: '2024.01.15', status: 'active' },
  { id: 2, name: '이지은', email: 'jieun@example.com', phone: '010-9876-5432', point: 132500, expiringSoon: 0, joinDate: '2023.11.02', status: 'active' },

  { id: 4, name: '최유진', email: 'yujin@example.com', phone: '010-5555-4444', point: 0, expiringSoon: 0, joinDate: '2023.06.10', status: 'inactive' },
  { id: 5, name: '정다은', email: 'daeun@example.com', phone: '010-7777-8888', point: 89300, expiringSoon: 12000, joinDate: '2024.02.28', status: 'active' },
  { id: 6, name: '한재원', email: 'jaewon@example.com', phone: '010-3344-5566', point: 23100, expiringSoon: 0, joinDate: '2023.09.15', status: 'active' },
  { id: 7, name: '오미래', email: 'mirae@example.com', phone: '010-6677-8899', point: 56700, expiringSoon: 3000, joinDate: '2024.04.01', status: 'active' },
  { id: 8, name: '윤서준', email: 'seojun@example.com', phone: '010-1122-3344', point: 15000, expiringSoon: 0, joinDate: '2024.01.30', status: 'active' },
];

const HISTORY = [
  { id: 1, date: '2025.05.07', type: '지급', desc: '5월 구매 적립', amount: 3000, balance: 48200 },

  { id: 7, date: '2025.03.05', type: '차감', desc: '관리자 수동 차감 (환불)', amount: -2000, balance: 39700 },
  { id: 8, date: '2025.02.18', type: '지급', desc: '신규 가입 축하 포인트', amount: 10000, balance: 41700 },
  { id: 9, date: '2025.02.01', type: '지급', desc: '2월 구매 적립', amount: 3100, balance: 31700 },

// ── 유틸
function fmtPoint(n) { return n.toLocaleString() + 'P'; }
function fmtNum(n) { return n.toLocaleString(); }

// ── Toast
function Toast({ messages, onRemove }) {
  return (
    <div style={{ position: 'fixed', bottom: 24, right: 24, zIndex: 9999, display: 'flex', flexDirection: 'column', gap: 8 }}>
      {messages.map(m => (
        <div key={m.id} style={{
          background: m.type === 'error' ? P.danger : P.secondary,
          color: '#fff', padding: '12px 20px', borderRadius: 10,
          animation: 'slideUp 300ms ease', boxShadow: '0 4px 16px rgba(0,0,0,0.2)',
          fontSize: 14, fontWeight: 500, display: 'flex', alignItems: 'center', gap: 8,
        }}>
          <span>{m.type === 'error' ? '⚠️' : '✓'}</span>
          {m.text}
        </div>
      ))}
    </div>
  );
}

// ── CountUp
function CountUp({ end, duration = 1200, suffix = '' }) {
  const [val, setVal] = useState(0);
  useEffect(() => {
    let s = 0; const step = end / (duration / 16);
    const t = setInterval(() => {
      s += step; if (s >= end) { setVal(end); clearInterval(t); } else setVal(Math.floor(s));
    }, 16);
    return () => clearInterval(t);
  }, [end]);
  return <span style={{ animation: 'countUp 400ms ease' }}>{val.toLocaleString()}{suffix}</span>;
}

// ── Badge
function Badge({ type }) {
  const cfg = {
    '지급': { bg: '#DCFCE7', color: '#16A34A', label: '지급' },
    '차감': { bg: '#FEE2E2', color: '#DC2626', label: '차감' },
    '자동소멸': { bg: '#FEF3C7', color: '#D97706', label: '자동소멸' },
    'active': { bg: '#DCFCE7', color: '#16A34A', label: '활성' },
    'inactive': { bg: '#F1F5F9', color: '#64748B', label: '비활성' },
  };
  const c = cfg[type] || { bg: '#F1F5F9', color: '#64748B', label: type };
  return (
    <span style={{ background: c.bg, color: c.color, padding: '3px 10px', borderRadius: 99, fontSize: 12, fontWeight: 600 }}>
      {c.label}
    </span>
  );
}

// ── Modal
function Modal({ title, onClose, children, width = 560 }) {
  return (
    <div style={{ position: 'fixed', inset: 0, zIndex: 500, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
      <div onClick={onClose} style={{ position: 'absolute', inset: 0, background: 'rgba(0,0,0,0.4)', animation: 'fadeIn 200ms ease' }} />
      <div style={{
        position: 'relative', width, maxHeight: '85vh', background: P.surface, borderRadius: 14,
        zIndex: 501, animation: 'fadeInScale 220ms ease', display: 'flex', flexDirection: 'column',
        boxShadow: '0 24px 64px rgba(0,0,0,0.18)',
      }}>
        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', padding: '20px 24px', borderBottom: `1px solid ${P.border}` }}>
          <h3 style={{ fontSize: 18, fontWeight: 700, color: P.text }}>{title}</h3>
          <button onClick={onClose} style={{ background: 'none', fontSize: 20, cursor: 'pointer', color: P.textSub, padding: '0 4px' }}>✕</button>
        </div>
        <div style={{ padding: 24, overflowY: 'auto', flex: 1 }}>{children}</div>
      </div>
    </div>
  );
}

// ── Input 공통
function Input({ label, value, onChange, type = 'text', placeholder = '', required = false }) {
  return (
    <div style={{ marginBottom: 16 }}>
      <label style={{ display: 'block', fontSize: 13, fontWeight: 600, color: P.textSub, marginBottom: 6 }}>
        {label}{required && <span style={{ color: P.danger, marginLeft: 2 }}>*</span>}
      </label>
      <input
        type={type} value={value} onChange={e => onChange(e.target.value)} placeholder={placeholder}
        style={{
          width: '100%', padding: '10px 14px', border: `1.5px solid ${P.border}`, borderRadius: 8,
          fontSize: 14, color: P.text, background: P.surface,
          transition: 'border 150ms',
        }}
        onFocus={e => e.target.style.border = `1.5px solid ${P.primary}`}
        onBlur={e => e.target.style.border = `1.5px solid ${P.border}`}
      />
    </div>
  );
}

// ═══════════════════════════════════════
// 페이지: 대시보드 (main)
// ═══════════════════════════════════════

        <div style={{ background: P.surface, borderRadius: 12, padding: 24, boxShadow: '0 2px 12px rgba(26,111,196,0.08)', border: `1px solid ${P.border}` }}>

// ═══════════════════════════════════════
// 페이지: 포인트 내역 (history)
// ═══════════════════════════════════════
function HistoryPage({ addToast }) {
  const [filterType, setFilterType] = useState('전체');
  const [searchDate, setSearchDate] = useState('');
  const [page, setPage] = useState(1);
  const PER_PAGE = 6;

  const filtered = HISTORY.filter(h => {
    if (filterType !== '전체' && h.type !== filterType) return false;
    if (searchDate && !h.date.includes(searchDate)) return false;
    return true;
  });
  const paged = filtered.slice((page - 1) * PER_PAGE, page * PER_PAGE);
  const totalPages = Math.ceil(filtered.length / PER_PAGE);

  return (
    <div style={{ animation: 'fadeIn 300ms ease' }}>
      <div style={{ background: P.surface, borderRadius: 12, padding: 24, boxShadow: '0 2px 12px rgba(26,111,196,0.08)', border: `1px solid ${P.border}` }}>
        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 20 }}>
          <h2 style={{ fontSize: 20, fontWeight: 800, color: P.text }}>포인트 내역</h2>
          <button onClick={() => addToast('CSV 파일로 내보내는 중...', 'info')} style={{
            padding: '9px 18px', background: P.primary, color: '#fff', borderRadius: 8, fontSize: 13, fontWeight: 600,
            transition: 'background 150ms',
          }}
          onMouseEnter={e => e.currentTarget.style.background = P.secondary}
          onMouseLeave={e => e.currentTarget.style.background = P.primary}
          >
            ↓ 내보내기
          </button>
        </div>

        {/* 필터 */}
        <div style={{ display: 'flex', gap: 12, marginBottom: 20, flexWrap: 'wrap' }}>
          {['전체', '지급', '차감', '자동소멸'].map(t => (
            <button key={t} onClick={() => { setFilterType(t); setPage(1); }} style={{
              padding: '7px 16px', borderRadius: 99, fontSize: 13, fontWeight: 600, border: `1.5px solid`,
              borderColor: filterType === t ? P.primary : P.border,
              background: filterType === t ? P.primary : P.surface,
              color: filterType === t ? '#fff' : P.textSub,
              transition: 'all 150ms',
            }}>
              {t}
            </button>
          ))}
          <input type="month" value={searchDate} onChange={e => { setSearchDate(e.target.value); setPage(1); }}
            style={{ padding: '7px 12px', border: `1.5px solid ${P.border}`, borderRadius: 8, fontSize: 13, color: P.text, background: P.surface }} />
        </div>

        <table style={{ width: '100%', borderCollapse: 'collapse' }}>
          <thead>
            <tr style={{ background: P.bg, borderRadius: 8 }}>
              {['날짜', '유형', '내용', '적립/차감', '잔액'].map(h => (
                <th key={h} style={{ padding: '10px 14px', textAlign: 'left', fontSize: 12, fontWeight: 700, color: P.textSub, textTransform: 'uppercase', letterSpacing: '0.04em' }}>{h}</th>
              ))}
            </tr>
          </thead>
          <tbody>
            {paged.length === 0 ? (
              <tr><td colSpan={5} style={{ textAlign: 'center', padding: '48px 0', color: P.textSub, fontSize: 14 }}>조건에 맞는 내역이 없습니다.</td></tr>
            ) : paged.map((h, i) => (
              <tr key={h.id} style={{ borderBottom: `1px solid ${P.border}`, animation: `slideUp 250ms ease ${i * 40}ms both`, transition: 'background 150ms' }}
                onMouseEnter={e => e.currentTarget.style.background = P.primary10}
                onMouseLeave={e => e.currentTarget.style.background = 'transparent'}
              >
                <td style={{ padding: '13px 14px', fontSize: 13, color: P.textSub }}>{h.date}</td>
                <td style={{ padding: '13px 14px' }}><Badge type={h.type} /></td>
                <td style={{ padding: '13px 14px', fontSize: 13, color: P.text }}>{h.desc}</td>
                <td style={{ padding: '13px 14px', fontSize: 14, fontWeight: 700, color: h.amount > 0 ? P.success : P.danger }}>
                  {h.amount > 0 ? '+' : ''}{fmtPoint(h.amount)}
                </td>
                <td style={{ padding: '13px 14px', fontSize: 13, fontWeight: 600, color: P.text }}>{fmtPoint(h.balance)}</td>
              </tr>
            ))}
          </tbody>
        </table>

        {/* 페이지네이션 */}
        <div style={{ display: 'flex', justifyContent: 'center', gap: 8, marginTop: 20 }}>
          {Array.from({ length: totalPages }, (_, i) => i + 1).map(p => (
            <button key={p} onClick={() => setPage(p)} style={{
              width: 36, height: 36, borderRadius: 8, fontSize: 14, fontWeight: 600,
              background: page === p ? P.primary : P.surface,
              color: page === p ? '#fff' : P.textSub,
              border: `1.5px solid ${page === p ? P.primary : P.border}`,
              transition: 'all 150ms',
            }}>
              {p}
            </button>
          ))}
        </div>
      </div>
    </div>
  );
}

// ═══════════════════════════════════════
// 페이지: 회원 관리 (members)
// ═══════════════════════════════════════
function MembersPage({ addToast }) {
  const [members, setMembers] = useState(MEMBERS);
  const [search, setSearch] = useState('');
  const [filterStatus, setFilterStatus] = useState('전체');
  const [selectedMember, setSelectedMember] = useState(null);
  const [showDeductModal, setShowDeductModal] = useState(false);
  const [deductAmount, setDeductAmount] = useState('');
  const [deductReason, setDeductReason] = useState('');

  const filtered = members.filter(m => {
    if (filterStatus !== '전체' && m.status !== (filterStatus === '활성' ? 'active' : 'inactive')) return false;
    if (search && !m.name.includes(search) && !m.email.includes(search)) return false;
    return true;
  });

  const handleDeduct = () => {
    if (!deductAmount || !deductReason) { addToast('차감 금액과 사유를 입력해주세요.', 'error'); return; }
    const amt = parseInt(deductAmount);
    if (amt <= 0) { addToast('차감 금액은 0보다 커야 합니다.', 'error'); return; }
    if (amt > selectedMember.point) { addToast('잔액보다 큰 금액은 차감할 수 없습니다.', 'error'); return; }
    setMembers(prev => prev.map(m => m.id === selectedMember.id ? { ...m, point: m.point - amt } : m));
    addToast(`${selectedMember.name} 회원 ${fmtPoint(amt)} 차감 완료`);
    setShowDeductModal(false); setDeductAmount(''); setDeductReason('');
  };

  return (
    <div style={{ animation: 'fadeIn 300ms ease' }}>
      <div style={{ background: P.surface, borderRadius: 12, padding: 24, boxShadow: '0 2px 12px rgba(26,111,196,0.08)', border: `1px solid ${P.border}` }}>
        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 20 }}>
          <h2 style={{ fontSize: 20, fontWeight: 800, color: P.text }}>회원 관리</h2>
          <div style={{ display: 'flex', gap: 10 }}>
            <input value={search} onChange={e => setSearch(e.target.value)} placeholder="이름 또는 이메일 검색"
              style={{ padding: '9px 14px', border: `1.5px solid ${P.border}`, borderRadius: 8, fontSize: 13, width: 220, color: P.text }} />
            {['전체', '활성', '비활성'].map(s => (
              <button key={s} onClick={() => setFilterStatus(s)} style={{
                padding: '9px 14px', borderRadius: 8, fontSize: 13, fontWeight: 600,
                background: filterStatus === s ? P.primary : P.surface,
                color: filterStatus === s ? '#fff' : P.textSub,
                border: `1.5px solid ${filterStatus === s ? P.primary : P.border}`,
                transition: 'all 150ms',
              }}>{s}</button>
            ))}
          </div>
        </div>

        <table style={{ width: '100%', borderCollapse: 'collapse' }}>
          <thead>
            <tr style={{ background: P.bg }}>
              {['회원명', '이메일', '포인트 잔액', '30일 내 만료', '상태', '가입일', '관리'].map(h => (
                <th key={h} style={{ padding: '10px 14px', textAlign: 'left', fontSize: 12, fontWeight: 700, color: P.textSub, textTransform: 'uppercase', letterSpacing: '0.04em' }}>{h}</th>
              ))}
            </tr>
          </thead>
          <tbody>
            {filtered.map((m, i) => (
              <tr key={m.id} style={{ borderBottom: `1px solid ${P.border}`, animation: `slideUp 300ms ease ${i * 50}ms both`, transition: 'background 150ms', cursor: 'pointer' }}
                onMouseEnter={e => e.currentTarget.style.background = P.primary10}
                onMouseLeave={e => e.currentTarget.style.background = 'transparent'}
                onClick={() => setSelectedMember(m)}
              >
                <td style={{ padding: '14px', fontSize: 14, fontWeight: 600, color: P.text }}>{m.name}</td>
                <td style={{ padding: '14px', fontSize: 13, color: P.textSub }}>{m.email}</td>
                <td style={{ padding: '14px', fontSize: 14, fontWeight: 700, color: P.primary }}>{fmtPoint(m.point)}</td>
                <td style={{ padding: '14px', fontSize: 13, color: m.expiringSoon > 0 ? P.warning : P.textSub, fontWeight: m.expiringSoon > 0 ? 600 : 400 }}>
                  {m.expiringSoon > 0 ? fmtPoint(m.expiringSoon) : '—'}
                </td>
                <td style={{ padding: '14px' }}><Badge type={m.status} /></td>
                <td style={{ padding: '14px', fontSize: 13, color: P.textSub }}>{m.joinDate}</td>
                <td style={{ padding: '14px' }}>
                  <button onClick={e => { e.stopPropagation(); setSelectedMember(m); setShowDeductModal(true); }} style={{
                    padding: '6px 14px', background: P.danger + '15', color: P.danger, borderRadius: 7, fontSize: 12, fontWeight: 700,
                    border: `1px solid ${P.danger}30`, transition: 'all 150ms',
                  }}
                  onMouseEnter={e => { e.currentTarget.style.background = P.danger; e.currentTarget.style.color = '#fff'; }}
                  onMouseLeave={e => { e.currentTarget.style.background = P.danger + '15'; e.currentTarget.style.color = P.danger; }}
                  >
                    포인트 차감
                  </button>
                </td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>

      {/* 회원 상세 Modal */}
      {selectedMember && !showDeductModal && (
        <Modal title={`${selectedMember.name} 회원 상세`} onClose={() => setSelectedMember(null)} width={500}>
          <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 16 }}>
            {[
              ['이름', selectedMember.name], ['이메일', selectedMember.email],
              ['연락처', selectedMember.phone], ['가입일', selectedMember.joinDate],
              ['포인트 잔액', fmtPoint(selectedMember.point)], ['30일 내 만료', selectedMember.expiringSoon > 0 ? fmtPoint(selectedMember.expiringSoon) : '없음'],
            ].map(([k, v]) => (
              <div key={k} style={{ background: P.bg, borderRadius: 8, padding: '12px 16px' }}>
                <p style={{ fontSize: 12, color: P.textSub, marginBottom: 4, fontWeight: 600 }}>{k}</p>
                <p style={{ fontSize: 14, fontWeight: 700, color: P.text }}>{v}</p>
              </div>
            ))}
          </div>
          <div style={{ display: 'flex', gap: 10, marginTop: 20 }}>
            <button onClick={() => { setShowDeductModal(true); }} style={{ flex: 1, padding: 12, background: P.danger, color: '#fff', borderRadius: 8, fontWeight: 700, fontSize: 14 }}>
              포인트 차감
            </button>
            <button onClick={() => setSelectedMember(null)} style={{ flex: 1, padding: 12, background: P.bg, color: P.textSub, borderRadius: 8, fontWeight: 700, fontSize: 14, border: `1px solid ${P.border}` }}>
              닫기
            </button>
          </div>
        </Modal>
      )}

      {/* 포인트 차감 Modal */}
      {showDeductModal && selectedMember && (
        <Modal title="포인트 수동 차감" onClose={() => { setShowDeductModal(false); setDeductAmount(''); setDeductReason(''); }} width={460}>
          <div style={{ background: P.bg, borderRadius: 8, padding: '12px 16px', marginBottom: 20 }}>
            <p style={{ fontSize: 13, color: P.textSub }}>대상 회원</p>
            <p style={{ fontSize: 16, fontWeight: 700, color: P.text, marginTop: 4 }}>{selectedMember.name} <span style={{ fontSize: 13, color: P.textSub, fontWeight: 400 }}>({selectedMember.email})</span></p>
            <p style={{ fontSize: 13, color: P.primary, fontWeight: 700, marginTop: 4 }}>현재 잔액: {fmtPoint(selectedMember.point)}</p>
          </div>
          <Input label="차감 포인트" value={deductAmount} onChange={setDeductAmount} type="number" placeholder="차감할 포인트 입력" required />
          <div style={{ marginBottom: 16 }}>
            <label style={{ display: 'block', fontSize: 13, fontWeight: 600, color: P.textSub, marginBottom: 6 }}>차감 사유 <span style={{ color: P.danger }}>*</span></label>
            <textarea value={deductReason} onChange={e => setDeductReason(e.target.value)} placeholder="차감 사유를 상세히 입력하세요 (구매 취소, 이벤트 조건 미충족 등)"
              style={{ width: '100%', padding: '10px 14px', border: `1.5px solid ${P.border}`, borderRadius: 8, fontSize: 13, minHeight: 80, resize: 'vertical', color: P.text }} />
          </div>
          <p style={{ fontSize: 12, color: P.danger, marginBottom: 16, background: '#FEE2E2', padding: '8px 12px', borderRadius: 6 }}>
            ⚠️ 포인트 차감 후 취소가 불가합니다. 사유를 정확히 입력해주세요.
          </p>
          <div style={{ display: 'flex', gap: 10 }}>
            <button onClick={handleDeduct} disabled={!deductAmount || !deductReason} style={{
              flex: 1, padding: 12, background: !deductAmount || !deductReason ? '#E2E8F0' : P.danger,
              color: !deductAmount || !deductReason ? P.textSub : '#fff',
              borderRadius: 8, fontWeight: 700, fontSize: 14, transition: 'background 150ms',
            }}>
              차감 확인
            </button>
            <button onClick={() => { setShowDeductModal(false); setDeductAmount(''); setDeductReason(''); }} style={{ flex: 1, padding: 12, background: P.bg, color: P.textSub, borderRadius: 8, fontWeight: 700, fontSize: 14, border: `1px solid ${P.border}` }}>
              취소
            </button>
          </div>
        </Modal>
      )}
    </div>
  );
}

// 페이지: 데이터 업로드 (upload)
// ═══════════════════════════════════════
function UploadPage({ addToast }) {
  const [step, setStep] = useState(0); // 0: 업로드, 1: 파싱중, 2: 검증결과, 3: 등록중, 4: 완료
  const [dragOver, setDragOver] = useState(false);
  const [fileName, setFileName] = useState('');
  const [progress, setProgress] = useState(0);
  const fileInputRef = useRef();

  const PREVIEW_DATA = [
    { row: 1, email: 'minsu@example.com', point: 5000, issueDate: '2025-04-01', status: '✅ 정상', ok: true },
    { row: 2, email: 'jieun@example.com', point: 12000, issueDate: '2025-04-01', status: '✅ 정상', ok: true },
    { row: 3, email: 'unknown@test.com', point: 3000, issueDate: '2025-04-01', status: '❌ 회원 없음', ok: false },
    { row: 4, email: 'sungho@example.com', point: 0, issueDate: '2025-04-01', status: '❌ 포인트 0', ok: false },
    { row: 5, email: 'yujin@example.com', point: 8500, issueDate: '2025-04-01', status: '✅ 정상', ok: true },
  ];

  const handleFile = (name) => {
    if (!name.endsWith('.csv') && !name.endsWith('.xlsx')) {
      addToast('CSV 또는 Excel(.xlsx) 파일만 업로드 가능합니다.', 'error'); return;
    }
    setFileName(name); setStep(1); setProgress(0);
    const iv = setInterval(() => {
      setProgress(p => {
        if (p >= 100) { clearInterval(iv); setStep(2); return 100; }
        return p + 20;
      });
    }, 300);
  };

  const handleRegister = () => {
    setStep(3); setProgress(0);
    const iv = setInterval(() => {
      setProgress(p => {
        if (p >= 100) { clearInterval(iv); setStep(4); return 100; }
        return p + 10;
      });
    }, 200);
  };

  const steps = ['파일 선택', '파일 파싱', '데이터 검증', '등록 중', '완료'];

  return (
    <div style={{ animation: 'fadeIn 300ms ease' }}>
      <div style={{ background: P.surface, borderRadius: 12, padding: 24, boxShadow: '0 2px 12px rgba(26,111,196,0.08)', border: `1px solid ${P.border}` }}>
        <h2 style={{ fontSize: 20, fontWeight: 800, color: P.text, marginBottom: 24 }}>데이터 업로드</h2>

        {/* 스텝 인디케이터 */}
        <div style={{ display: 'flex', alignItems: 'center', marginBottom: 32 }}>
          {steps.map((s, i) => (
            <React.Fragment key={s}>
              <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 6 }}>
                <div style={{
                  width: 36, height: 36, borderRadius: 99, display: 'flex', alignItems: 'center', justifyContent: 'center',
                  background: i < step ? P.success : i === step ? P.primary : P.border,
                  color: i <= step ? '#fff' : P.textSub, fontWeight: 700, fontSize: 14, transition: 'all 300ms',
                }}>
                  {i < step ? '✓' : i + 1}
                </div>
                <span style={{ fontSize: 11, color: i === step ? P.primary : P.textSub, fontWeight: i === step ? 700 : 400 }}>{s}</span>
              </div>
              {i < steps.length - 1 && <div style={{ flex: 1, height: 2, background: i < step ? P.success : P.border, margin: '0 8px', marginBottom: 20, transition: 'background 300ms' }} />}
            </React.Fragment>
          ))}
        </div>

        {step === 0 && (
          <div>
            <div
              onDragOver={e => { e.preventDefault(); setDragOver(true); }}
              onDragLeave={() => setDragOver(false)}
              onDrop={e => { e.preventDefault(); setDragOver(false); const f = e.dataTransfer.files[0]; if (f) handleFile(f.name); }}
              onClick={() => fileInputRef.current.click()}
              style={{
                border: `2px dashed ${dragOver ? P.primary : P.border}`, borderRadius: 12, padding: '48px 24px',
                textAlign: 'center', cursor: 'pointer', transition: 'all 200ms',
                background: dragOver ? P.primary10 : P.bg,
              }}
            >
              <div style={{ fontSize: 48, marginBottom: 12 }}>📁</div>
              <p style={{ fontSize: 16, fontWeight: 700, color: P.text, marginBottom: 8 }}>CSV / Excel 파일을 드래그하거나 클릭하여 선택</p>
              <p style={{ fontSize: 13, color: P.textSub }}>지원 포맷: .csv, .xlsx (최대 10MB)</p>
              <input ref={fileInputRef} type="file" accept=".csv,.xlsx" style={{ display: 'none' }} onChange={e => { if (e.target.files[0]) handleFile(e.target.files[0].name); }} />
            </div>
            <div style={{ marginTop: 20, background: P.bg, borderRadius: 8, padding: 16 }}>
              <p style={{ fontSize: 13, fontWeight: 700, color: P.text, marginBottom: 8 }}>📋 필수 컬럼 형식</p>
              <code style={{ fontSize: 12, color: P.textSub, background: '#E2E8F0', padding: '8px 12px', borderRadius: 6, display: 'block' }}>
                email | point_amount | issue_date (YYYY-MM-DD)
              </code>
            </div>
          </div>
        )}

        {(step === 1 || step === 3) && (
          <div style={{ textAlign: 'center', padding: '32px 0' }}>
            <div style={{ width: 60, height: 60, border: `4px solid ${P.primary}20`, borderTopColor: P.primary, borderRadius: 99, animation: 'spin 1s linear infinite', margin: '0 auto 16px' }} />
            <p style={{ fontSize: 16, fontWeight: 700, color: P.text, marginBottom: 8 }}>{step === 1 ? `${fileName} 파싱 중...` : '데이터 등록 중...'}</p>
            <div style={{ height: 8, background: P.bg, borderRadius: 99, maxWidth: 320, margin: '16px auto 0', overflow: 'hidden' }}>
              <div style={{ height: '100%', borderRadius: 99, background: P.primary, '--target-width': progress + '%', animation: 'barGrow 200ms ease', width: progress + '%', transition: 'width 200ms' }} />
            </div>
            <p style={{ fontSize: 13, color: P.textSub, marginTop: 8 }}>{progress}%</p>
          </div>
        )}

        {step === 2 && (
          <div>
            <div style={{ display: 'flex', gap: 12, marginBottom: 20 }}>
              <div style={{ flex: 1, background: '#DCFCE7', borderRadius: 10, padding: '12px 16px', textAlign: 'center' }}>
                <p style={{ fontSize: 24, fontWeight: 800, color: P.success }}>3</p>
                <p style={{ fontSize: 12, color: P.success, fontWeight: 600 }}>정상 행</p>
              </div>
              <div style={{ flex: 1, background: '#FEE2E2', borderRadius: 10, padding: '12px 16px', textAlign: 'center' }}>
                <p style={{ fontSize: 24, fontWeight: 800, color: P.danger }}>2</p>
                <p style={{ fontSize: 12, color: P.danger, fontWeight: 600 }}>오류 행</p>
              </div>
              <div style={{ flex: 1, background: P.bg, borderRadius: 10, padding: '12px 16px', textAlign: 'center' }}>
                <p style={{ fontSize: 24, fontWeight: 800, color: P.text }}>5</p>
                <p style={{ fontSize: 12, color: P.textSub, fontWeight: 600 }}>전체 행</p>
              </div>
            </div>
            <p style={{ fontSize: 13, fontWeight: 700, color: P.text, marginBottom: 12 }}>파일: {fileName}</p>
            <table style={{ width: '100%', borderCollapse: 'collapse', marginBottom: 20 }}>
              <thead>
                <tr style={{ background: P.bg }}>
                  {['행', '이메일', '포인트', '지급일', '검증 결과'].map(h => (
                    <th key={h} style={{ padding: '8px 12px', textAlign: 'left', fontSize: 12, fontWeight: 700, color: P.textSub }}>{h}</th>
                  ))}
                </tr>
              </thead>
              <tbody>
                {PREVIEW_DATA.map((r, i) => (
                  <tr key={r.row} style={{ borderBottom: `1px solid ${P.border}`, background: !r.ok ? '#FFF5F5' : 'transparent', animation: `slideUp 200ms ease ${i * 40}ms both` }}>
                    <td style={{ padding: '10px 12px', fontSize: 13 }}>{r.row}</td>
                    <td style={{ padding: '10px 12px', fontSize: 13, color: P.text }}>{r.email}</td>
                    <td style={{ padding: '10px 12px', fontSize: 13, fontWeight: 700, color: P.primary }}>{r.point.toLocaleString()}P</td>
                    <td style={{ padding: '10px 12px', fontSize: 13, color: P.textSub }}>{r.issueDate}</td>
                    <td style={{ padding: '10px 12px', fontSize: 12 }}>{r.status}</td>
                  </tr>
                ))}
              </tbody>
            </table>
            <div style={{ display: 'flex', gap: 10 }}>
              <button onClick={handleRegister} style={{ flex: 2, padding: 13, background: P.primary, color: '#fff', borderRadius: 8, fontWeight: 700, fontSize: 14 }}>
                정상 3건 등록 시작
              </button>
              <button onClick={() => addToast('오류 행 CSV 다운로드 완료')} style={{ flex: 1, padding: 13, background: P.bg, color: P.textSub, borderRadius: 8, fontWeight: 700, fontSize: 14, border: `1px solid ${P.border}` }}>
                ↓ 오류 행 다운로드
              </button>
              <button onClick={() => setStep(0)} style={{ flex: 1, padding: 13, background: P.bg, color: P.textSub, borderRadius: 8, fontWeight: 700, fontSize: 14, border: `1px solid ${P.border}` }}>
                다시 업로드
              </button>
            </div>
          </div>
        )}

        {step === 4 && (
          <div style={{ textAlign: 'center', padding: '32px 0' }}>
            <div style={{ fontSize: 64, marginBottom: 16, animation: 'fadeInScale 400ms ease' }}>✅</div>
            <p style={{ fontSize: 20, fontWeight: 800, color: P.success, marginBottom: 8 }}>등록 완료!</p>
            <p style={{ fontSize: 14, color: P.textSub, marginBottom: 24 }}>정상 3건이 성공적으로 DB에 등록되었습니다.</p>
            <div style={{ display: 'flex', gap: 12, justifyContent: 'center', flexWrap: 'wrap' }}>
              <div style={{ background: P.bg, borderRadius: 8, padding: '12px 24px', minWidth: 120, textAlign: 'center' }}>
                <p style={{ fontSize: 24, fontWeight: 800, color: P.success }}>3</p>
                <p style={{ fontSize: 12, color: P.textSub }}>등록 성공</p>
              </div>
              <div style={{ background: P.bg, borderRadius: 8, padding: '12px 24px', minWidth: 120, textAlign: 'center' }}>
                <p style={{ fontSize: 24, fontWeight: 800, color: P.danger }}>2</p>
                <p style={{ fontSize: 12, color: P.textSub }}>오류 (건너뜀)</p>
              </div>
            </div>
            <button onClick={() => { setStep(0); setFileName(''); }} style={{ marginTop: 24, padding: '10px 28px', background: P.primary, color: '#fff', borderRadius: 8, fontWeight: 700, fontSize: 14 }}>
              새 파일 업로드
            </button>
          </div>
        )}
      </div>
    </div>
  );
}

// 페이지: 소멸 설정 (settings)
// ═══════════════════════════════════════
function SettingsPage({ addToast }) {

  const [batchTime, setBatchTime] = useState('02:00');
  const [notifyBefore, setNotifyBefore] = useState(['30', '7']);
  const [autoDeduct, setAutoDeduct] = useState(true);

  const handleSave = () => addToast('소멸 정책이 저장되었습니다.');

    <div style={{ animation: 'fadeIn 300ms ease' }}>
      <div style={{ background: P.surface, borderRadius: 12, padding: 24, boxShadow: '0 2px 12px rgba(26,111,196,0.08)', border: `1px solid ${P.border}` }}>
        <h2 style={{ fontSize: 20, fontWeight: 800, color: P.text, marginBottom: 24 }}>소멸 설정</h2>

        <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 20 }}>
          <div style={{ background: P.bg, borderRadius: 10, padding: 20 }}>
            <h3 style={{ fontSize: 15, fontWeight: 700, color: P.text, marginBottom: 16 }}>⏰ 포인트 유효기간</h3>
            <label style={{ fontSize: 13, color: P.textSub, fontWeight: 600, display: 'block', marginBottom: 8 }}>지급일 기준 소멸 기간</label>
            <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
              <input type="number" value={expiryMonths} onChange={e => setExpiryMonths(e.target.value)}
                style={{ width: 80, padding: '10px 14px', border: `1.5px solid ${P.border}`, borderRadius: 8, fontSize: 14, fontWeight: 700, textAlign: 'center' }} />
              <span style={{ fontSize: 14, color: P.textSub }}>개월 (현재: {expiryMonths}개월 = 1년)</span>
            </div>
          </div>

          <div style={{ background: P.bg, borderRadius: 10, padding: 20 }}>
            <h3 style={{ fontSize: 15, fontWeight: 700, color: P.text, marginBottom: 16 }}>🔄 자동 소멸 배치</h3>
            <label style={{ fontSize: 13, color: P.textSub, fontWeight: 600, display: 'block', marginBottom: 8 }}>배치 실행 시각 (매일)</label>
            <input type="time" value={batchTime} onChange={e => setBatchTime(e.target.value)}
              style={{ padding: '10px 14px', border: `1.5px solid ${P.border}`, borderRadius: 8, fontSize: 14, color: P.text }} />
            <div style={{ display: 'flex', alignItems: 'center', gap: 10, marginTop: 12 }}>
              <div onClick={() => setAutoDeduct(!autoDeduct)} style={{
                width: 48, height: 26, borderRadius: 99, background: autoDeduct ? P.success : '#CBD5E1',
                position: 'relative', cursor: 'pointer', transition: 'background 200ms',
              }}>
                <div style={{
                  position: 'absolute', top: 3, left: autoDeduct ? 25 : 3, width: 20, height: 20,
                  borderRadius: 99, background: '#fff', boxShadow: '0 1px 4px rgba(0,0,0,0.2)', transition: 'left 200ms',
                }} />
              </div>
              <span style={{ fontSize: 13, color: P.text, fontWeight: 600 }}>자동 소멸 활성화 ({autoDeduct ? '켜짐' : '꺼짐'})</span>
            </div>
          </div>

          <div style={{ background: P.bg, borderRadius: 10, padding: 20, gridColumn: '1/-1' }}>
            <h3 style={{ fontSize: 15, fontWeight: 700, color: P.text, marginBottom: 16 }}>📨 소멸 예고 알림</h3>
            <div style={{ display: 'flex', gap: 12, flexWrap: 'wrap' }}>
              {['7', '14', '30', '60'].map(d => (
                <label key={d} style={{ display: 'flex', alignItems: 'center', gap: 8, cursor: 'pointer' }}>
                  <input type="checkbox" checked={notifyBefore.includes(d)} onChange={e => {
                    setNotifyBefore(prev => e.target.checked ? [...prev, d] : prev.filter(x => x !== d));
                  }} style={{ accentColor: P.primary, width: 16, height: 16 }} />
                  <span style={{ fontSize: 14, fontWeight: 600, color: P.text }}>소멸 {d}일 전</span>
                </label>
              ))}
            </div>
            <p style={{ fontSize: 12, color: P.textSub, marginTop: 10 }}>선택한 시점에 해당 회원에게 소멸 예고 알림을 발송합니다.</p>
          </div>
        </div>

        <div style={{ display: 'flex', gap: 10, marginTop: 24 }}>
          <button onClick={handleSave} style={{ padding: '12px 32px', background: P.primary, color: '#fff', borderRadius: 8, fontWeight: 700, fontSize: 14, transition: 'background 150ms' }}
            onMouseEnter={e => e.currentTarget.style.background = P.secondary}
            onMouseLeave={e => e.currentTarget.style.background = P.primary}
          >
            설정 저장
          </button>
          <button onClick={() => addToast('소멸 배치를 즉시 실행합니다...')} style={{ padding: '12px 20px', background: P.warning + '15', color: P.warning, borderRadius: 8, fontWeight: 700, fontSize: 14, border: `1px solid ${P.warning}40` }}>
            ▶ 지금 실행
          </button>
        </div>
      </div>
    </div>
  );
}

// ═══════════════════════════════════════
// 최상위 App
// ═══════════════════════════════════════
function App() {
  const [page, setPage] = useState('main');
  const [prevPage, setPrevPage] = useState('main');
  const [toasts, setToasts] = useState([]);
  const [loading, setLoading] = useState(true);
  const [pageKey, setPageKey] = useState(0);

  useEffect(() => { setTimeout(() => setLoading(false), 1200); }, []);

  const addToast = (text, type = 'success') => {
    const id = Date.now();
    setToasts(prev => [...prev, { id, text, type }]);
    setTimeout(() => setToasts(prev => prev.filter(t => t.id !== id)), 3500);
  };

  const navigate = (p) => {
    setPrevPage(page); setPage(p); setPageKey(k => k + 1);
  };

  const navItems = [
    { id: 'main', label: '대시보드', icon: '📊' },
    { id: 'history', label: '포인트 내역', icon: '📋' },
    { id: 'members', label: '회원 관리', icon: '👥' },
    { id: 'upload', label: '데이터 업로드', icon: '📤' },
    { id: 'settings', label: '소멸 설정', icon: '⚙️' },
  ];

  if (loading) {
    return (
      <div style={{ width: '100%', height: '100vh', background: P.bg, display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', gap: 16 }}>
        <div style={{ fontSize: 48 }}>💎</div>
        <h1 style={{ fontSize: 28, fontWeight: 800, color: P.secondary }}>PointHub</h1>
        <div style={{ display: 'flex', flexDirection: 'column', gap: 10, width: 280 }}>
          {[...Array(3)].map((_, i) => (
            <div key={i} style={{ height: 16, borderRadius: 8, background: 'linear-gradient(90deg, #DDE4EE 25%, #C4D0DC 50%, #DDE4EE 75%)', backgroundSize: '200% 100%', animation: 'shimmer 1.5s infinite' }} />
          ))}
        </div>
      </div>
    );
  }

  return (
    <div style={{ display: 'flex', flexDirection: 'column', width: '100%', minHeight: '100vh', background: P.bg }}>
      {/* 상단 네비게이션 바 */}
      <header style={{ background: P.surface, borderBottom: `1px solid ${P.border}`, position: 'sticky', top: 0, zIndex: 100, boxShadow: '0 2px 8px rgba(26,111,196,0.08)' }}>
        <div style={{ maxWidth: 1200, margin: '0 auto', padding: '0 24px', display: 'flex', alignItems: 'center', gap: 0, height: 64 }}>
          <div style={{ display: 'flex', alignItems: 'center', gap: 10, marginRight: 40 }}>
            <span style={{ fontSize: 28 }}>💎</span>
            <span style={{ fontSize: 18, fontWeight: 800, color: P.secondary, letterSpacing: '-0.02em' }}>PointHub</span>
            <span style={{ fontSize: 11, background: P.primary, color: '#fff', borderRadius: 4, padding: '2px 6px', fontWeight: 700 }}>ADMIN</span>
          </div>
          <nav style={{ display: 'flex', flex: 1 }}>
            {navItems.map(item => (
              <button key={item.id} onClick={() => navigate(item.id)} style={{
                padding: '0 18px', height: 64, background: 'none', fontSize: 14, fontWeight: page === item.id ? 700 : 500,
                color: page === item.id ? P.primary : P.textSub,
                borderBottom: `3px solid ${page === item.id ? P.primary : 'transparent'}`,
                transition: 'all 150ms', display: 'flex', alignItems: 'center', gap: 6,
              }}
              onMouseEnter={e => { if (page !== item.id) e.currentTarget.style.color = P.text; }}
              onMouseLeave={e => { if (page !== item.id) e.currentTarget.style.color = P.textSub; }}
              >
                <span>{item.icon}</span>
                {item.label}
              </button>
            ))}
          </nav>
          <div style={{ display: 'flex', alignItems: 'center', gap: 12 }}>
            <div style={{ width: 34, height: 34, borderRadius: 99, background: `linear-gradient(135deg, ${P.primary}, ${P.accent})`, display: 'flex', alignItems: 'center', justifyContent: 'center', color: '#fff', fontWeight: 700, fontSize: 14 }}>
              A
            </div>
            <div>
              <p style={{ fontSize: 13, fontWeight: 700, color: P.text }}>관리자</p>
              <p style={{ fontSize: 11, color: P.textSub }}>admin@example.com</p>
            </div>
          </div>
        </div>
      </header>

      {/* 히어로 배너 */}
      {page === 'main' && (
        <div style={{ background: `linear-gradient(135deg, ${P.secondary} 0%, ${P.primary} 60%, ${P.accent} 100%)`, padding: '32px 0', animation: 'fadeIn 400ms ease' }}>
          <div style={{ maxWidth: 1200, margin: '0 auto', padding: '0 24px', display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
            <div>
              <h1 style={{ fontSize: 28, fontWeight: 800, color: '#fff', marginBottom: 8, letterSpacing: '-0.02em' }}>회원 포인트 관리 대시보드</h1>
              <p style={{ fontSize: 14, color: 'rgba(255,255,255,0.8)' }}>지급일 기준 자동 소멸 로직 · CSV 일괄 등록 · 역할 기반 접근 제어</p>
            </div>
            <div style={{ display: 'flex', gap: 12 }}>
              <div style={{ background: 'rgba(255,255,255,0.15)', borderRadius: 10, padding: '10px 18px', textAlign: 'center', backdropFilter: 'blur(8px)' }}>
                <p style={{ fontSize: 11, color: 'rgba(255,255,255,0.7)', marginBottom: 2 }}>전체 회원</p>
                <p style={{ fontSize: 20, fontWeight: 800, color: '#fff' }}>{MEMBERS.length}명</p>
              </div>
              <div style={{ background: 'rgba(255,255,255,0.15)', borderRadius: 10, padding: '10px 18px', textAlign: 'center', backdropFilter: 'blur(8px)' }}>
                <p style={{ fontSize: 11, color: 'rgba(255,255,255,0.7)', marginBottom: 2 }}>이번 달 지급</p>
                <p style={{ fontSize: 20, fontWeight: 800, color: '#fff' }}>47,000P</p>
              </div>
            </div>
          </div>
        </div>
      )}

      {/* 메인 콘텐츠 */}
      <main style={{ flex: 1, maxWidth: 1200, width: '100%', margin: '24px auto', padding: '0 24px' }}>
        <div key={pageKey} style={{ animation: 'fadeIn 300ms ease' }}>
          {page === 'main' && <DashboardPage addToast={addToast} />}
          {page === 'history' && <HistoryPage addToast={addToast} />}
          {page === 'members' && <MembersPage addToast={addToast} />}
          {page === 'upload' && <UploadPage addToast={addToast} />}
          {page === 'settings' && <SettingsPage addToast={addToast} />}
        </div>
      </main>

      <Toast messages={toasts} onRemove={id => setToasts(prev => prev.filter(t => t.id !== id))} />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
