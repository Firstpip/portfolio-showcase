<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>

<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body, #root { width: 100%; min-height: 100%; font-family: 'Pretendard', -apple-system, sans-serif; }
  body { background: #1C1917; color: #F5F5F4; }

  @keyframes fadeIn { from { opacity: 0 } to { opacity: 1 } }
  @keyframes fadeInScale { from { opacity: 0; transform: scale(0.95) } to { opacity: 1; transform: scale(1) } }
  @keyframes slideInRight { from { opacity: 0; transform: translateX(30px) } to { opacity: 1; transform: translateX(0) } }
  @keyframes slideUp { from { opacity: 0; transform: translateY(20px) } to { opacity: 1; transform: translateY(0) } }
  @keyframes ripple { 0% { transform: scale(0); opacity: 0.5 } 100% { transform: scale(4); opacity: 0 } }
  @keyframes countUp { from { opacity: 0; transform: translateY(10px) } to { opacity: 1; transform: translateY(0) } }
  @keyframes shimmer { 0% { background-position: -200% 0 } 100% { background-position: 200% 0 } }
  @keyframes pulse { 0%, 100% { opacity: 1 } 50% { opacity: 0.5 } }
  @keyframes barGrow { from { width: 0% } to { width: var(--target-width) } }
  @keyframes spin { to { transform: rotate(360deg) } }
  @keyframes glow { 0%, 100% { box-shadow: 0 0 8px rgba(245,158,11,0.4) } 50% { box-shadow: 0 0 20px rgba(245,158,11,0.8) } }

  .chart-wrap { position: relative; height: 220px; }

  button { cursor: pointer; border: none; outline: none; font-family: 'Pretendard', sans-serif; }
  input, select, textarea { font-family: 'Pretendard', sans-serif; outline: none; }

  ::-webkit-scrollbar { width: 5px; height: 5px; }
  ::-webkit-scrollbar-track { background: #292524; }
  ::-webkit-scrollbar-thumb { background: #44403C; border-radius: 3px; }

  .glow-btn:hover { box-shadow: 0 0 20px rgba(245,158,11,0.4); }
</style>
</head>

// ── 유틸
function fmtP(n) { return n.toLocaleString() + 'P'; }

// ── Toast
function Toast({ msgs }) {
  return (
    <div style={{ position: 'fixed', bottom: 24, right: 24, zIndex: 9999, display: 'flex', flexDirection: 'column', gap: 8 }}>
      {msgs.map(m => (
        <div key={m.id} style={{
          background: m.type === 'error' ? D.danger : '#374151',
          color: '#fff', padding: '12px 20px', borderRadius: 10, animation: 'slideUp 300ms ease',
          boxShadow: '0 8px 24px rgba(0,0,0,0.4)', fontSize: 14, fontWeight: 500,
          display: 'flex', alignItems: 'center', gap: 8, border: `1px solid ${m.type === 'error' ? D.danger : D.border}`,
        }}>
          <span>{m.type === 'error' ? '⚠️' : '✓'}</span>{m.text}
        </div>
      ))}
    </div>
  );
}

// ── CountUp
function CountUp({ end, suffix = '' }) {
  const [val, setVal] = useState(0);
  useEffect(() => {
    let s = 0; const step = end / 75;
    const t = setInterval(() => {
      s += step; if (s >= end) { setVal(end); clearInterval(t); } else setVal(Math.floor(s));
    }, 16);
    return () => clearInterval(t);
  }, [end]);
  return <span>{val.toLocaleString()}{suffix}</span>;
}

// ── Modal
function Modal({ title, onClose, children, width = 560 }) {
  return (
    <div style={{ position: 'fixed', inset: 0, zIndex: 500, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
      <div onClick={onClose} style={{ position: 'absolute', inset: 0, background: 'rgba(0,0,0,0.7)', animation: 'fadeIn 200ms ease' }} />
      <div style={{
        position: 'relative', width, maxHeight: '85vh', background: D.surface, borderRadius: 16,
        zIndex: 501, animation: 'fadeInScale 220ms ease', display: 'flex', flexDirection: 'column',
        boxShadow: '0 24px 64px rgba(0,0,0,0.5)', border: `1px solid ${D.border}`,
      }}>
        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', padding: '20px 24px', borderBottom: `1px solid ${D.border}` }}>
          <h3 style={{ fontSize: 18, fontWeight: 700, color: D.text }}>{title}</h3>
          <button onClick={onClose} style={{ background: 'none', fontSize: 20, cursor: 'pointer', color: D.textSub, padding: '0 4px' }}>✕</button>
        </div>
        <div style={{ padding: 24, overflowY: 'auto', flex: 1 }}>{children}</div>
      </div>
    </div>
  );
}

// ── GradCard
function GradCard({ children, style }) {
  return (
    <div style={{

      boxShadow: '0 4px 16px rgba(0,0,0,0.3)', border: `1px solid ${D.border}`,
      ...style,
    }}>
      {children}
    </div>
  );
}

// ═══════════════════════════════════════

  const [notifs, setNotifs] = useState(NOTIFICATIONS);

  const [sendTarget, setSendTarget] = useState('');

  const handleRetry = (id) => {
    setNotifs(prev => prev.map(n => n.id === id ? { ...n, status: '재발송 중...' } : n));
    setTimeout(() => {
      setNotifs(prev => prev.map(n => n.id === id ? { ...n, status: '발송 완료' } : n));

        <table style={{ width: '100%', borderCollapse: 'collapse' }}>

              {['유형', '회원명', '포인트', '채널', '발송 시각', '상태', ''].map(h => (

              ))}
            </tr>
          </thead>
          <tbody>
            {notifs.map((n, i) => (
              <tr key={n.id} style={{ borderBottom: `1px solid ${D.border}`, animation: `slideUp 250ms ease ${i * 40}ms both`, transition: 'background 150ms' }}
                onMouseEnter={e => e.currentTarget.style.background = D.p15}
                onMouseLeave={e => e.currentTarget.style.background = 'transparent'}
              >
                <td style={{ padding: '12px' }}>
                  <span style={{ padding: '3px 10px', borderRadius: 99, fontSize: 12, fontWeight: 700, background: n.type === 'D-7' ? '#FEE2E220' : D.p15, color: n.type === 'D-7' ? D.danger : D.primary }}>
                    {n.type}
                  </span>
                </td>
                <td style={{ padding: '12px', fontSize: 13, fontWeight: 600, color: D.text }}>{n.member}</td>
                <td style={{ padding: '12px', fontSize: 13, fontWeight: 700, color: D.primary }}>{fmtP(n.point)}</td>
                <td style={{ padding: '12px', fontSize: 12, color: D.textSub }}>{n.channel.join(' · ')}</td>
                <td style={{ padding: '12px', fontSize: 12, color: D.textSub }}>{n.sendAt}</td>
                <td style={{ padding: '12px' }}>
                  <span style={{
                    fontSize: 12, fontWeight: 700, padding: '3px 10px', borderRadius: 99,
                    background: n.status === '발송 완료' ? D.s15 : n.status === '재발송 중...' ? D.p15 : '#FEE2E220',
                    color: n.status === '발송 완료' ? D.success : n.status === '재발송 중...' ? D.primary : D.danger,

                    {n.status}

                </td>
                <td style={{ padding: '12px' }}>

                    <button onClick={() => handleRetry(n.id)} style={{ padding: '5px 12px', background: D.p15, color: D.primary, borderRadius: 6, fontSize: 12, fontWeight: 700, border: `1px solid ${D.p30}` }}>
                      재발송
                    </button>
                  )}
                </td>
              </tr>
            ))}
          </tbody>
        </table>
      </GradCard>

      {showSendModal && (
        <Modal title="수동 알림 발송" onClose={() => setShowSendModal(false)} width={440}>
          <div style={{ marginBottom: 16 }}>
            <label style={{ display: 'block', fontSize: 13, fontWeight: 600, color: D.textSub, marginBottom: 6 }}>발송 대상 이메일 <span style={{ color: D.danger }}>*</span></label>
            <input value={sendTarget} onChange={e => setSendTarget(e.target.value)} placeholder="member@example.com"
              style={{ width: '100%', padding: '10px 14px', background: D.surface2, border: `1.5px solid ${D.border}`, borderRadius: 8, fontSize: 14, color: D.text }} />
          </div>
          <div style={{ background: D.surface2, borderRadius: 8, padding: 14, marginBottom: 20 }}>
            <p style={{ fontSize: 12, color: D.textSub, lineHeight: 1.6 }}>
              📨 이메일 + 인앱 알림을 즉시 발송합니다.<br />
              해당 회원의 소멸 예정 포인트 현황과 만료일이 포함됩니다.
            </p>
          </div>
          <button onClick={handleSend} style={{
            width: '100%', padding: 13, background: sending ? D.surface2 : `linear-gradient(135deg, ${D.primary}, ${D.secondary})`,
            color: sending ? D.textSub : '#1C1917', borderRadius: 8, fontWeight: 800, fontSize: 14,
            display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 8,
          }}>
            {sending ? (
              <><div style={{ width: 18, height: 18, border: '2px solid rgba(255,255,255,0.2)', borderTopColor: D.textSub, borderRadius: 99, animation: 'spin 1s linear infinite' }} />발송 중...</>
            ) : '알림 발송'}
          </button>
        </Modal>
      )}
    </div>
  );
}

// ═══════════════════════════════════════
// 페이지: 권한 관리 (admin-roles)
// ═══════════════════════════════════════
function AdminRolesPage({ addToast }) {
  const [roles, setRoles] = useState(ADMIN_ROLES);
  const [showInvite, setShowInvite] = useState(false);
  const [showEditRole, setShowEditRole] = useState(null);
  const [inviteEmail, setInviteEmail] = useState('');
  const [inviteRole, setInviteRole] = useState('일반어드민');
  const [sending, setSending] = useState(false);

  const PERM_LABELS = { dashboard: '대시보드 조회', members: '회원 목록 조회', points: '포인트 조회', deduct: '포인트 차감', upload: '데이터 업로드', roles: '권한 관리', batch: '배치 모니터링' };

  const handleInvite = () => {
    if (!inviteEmail) { addToast('이메일을 입력하세요', 'error'); return; }
    setSending(true);
    setTimeout(() => { setSending(false); setShowInvite(false); setInviteEmail(''); addToast(`${inviteEmail} 에 초대 링크 발송 완료 (24시간 유효)`); }, 1800);
  };

  const togglePerm = (roleId, perm) => {
    if (roleId === 1) { addToast('슈퍼어드민 권한은 변경할 수 없습니다', 'error'); return; }
    setRoles(prev => prev.map(r => r.id === roleId ? { ...r, perms: { ...r.perms, [perm]: !r.perms[perm] } } : r));
    addToast('권한이 업데이트되었습니다');
  };

  return (
    <div style={{ animation: 'fadeIn 300ms ease' }}>
      <div style={{ display: 'flex', justifyContent: 'flex-end', marginBottom: 16 }}>
        <button onClick={() => setShowInvite(true)} style={{ padding: '10px 22px', background: `linear-gradient(135deg, ${D.primary}, ${D.secondary})`, color: '#1C1917', borderRadius: 10, fontWeight: 800, fontSize: 14 }}>
          + 관리자 초대
        </button>
      </div>

      <div style={{ display: 'flex', flexDirection: 'column', gap: 12 }}>
        {roles.map((role, ri) => (
          <GradCard key={role.id} style={{ animation: `slideUp 300ms ease ${ri * 80}ms both` }}>
            <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', marginBottom: 16 }}>
              <div>
                <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
                  <h3 style={{ fontSize: 16, fontWeight: 800, color: D.text }}>{role.name}</h3>
                  {role.id === 1 && <span style={{ fontSize: 11, background: D.p15, color: D.primary, padding: '2px 8px', borderRadius: 99, fontWeight: 700 }}>최고 권한</span>}
                </div>
                <p style={{ fontSize: 13, color: D.textSub, marginTop: 4 }}>{role.desc} · 관리자 {role.count}명</p>
              </div>
              <button onClick={() => setShowEditRole(role.id === showEditRole ? null : role.id)} style={{
                padding: '7px 14px', background: showEditRole === role.id ? D.p30 : D.surface2, color: showEditRole === role.id ? D.primary : D.textSub, borderRadius: 8, fontSize: 12, fontWeight: 700, border: `1px solid ${D.border}`,
              }}>
                {showEditRole === role.id ? '접기' : '권한 편집'}
              </button>
            </div>
            <div style={{ display: 'flex', flexWrap: 'wrap', gap: 8 }}>
              {Object.entries(PERM_LABELS).map(([k, label]) => (
                <div key={k} onClick={() => { if (showEditRole === role.id) togglePerm(role.id, k); }} style={{
                  display: 'flex', alignItems: 'center', gap: 6, padding: '6px 12px', borderRadius: 8,
                  background: role.perms[k] ? D.s15 : D.surface2,
                  border: `1px solid ${role.perms[k] ? D.success + '50' : D.border}`,
                  cursor: showEditRole === role.id ? 'pointer' : 'default',
                  transition: 'all 150ms', opacity: role.perms[k] ? 1 : 0.5,
                }}>
                  <span style={{ fontSize: 12 }}>{role.perms[k] ? '✓' : '✕'}</span>
                  <span style={{ fontSize: 12, color: role.perms[k] ? D.success : D.textSub, fontWeight: 600 }}>{label}</span>
                </div>
              ))}
            </div>
          </GradCard>
        ))}
      </div>

      {showInvite && (
        <Modal title="관리자 초대" onClose={() => setShowInvite(false)} width={440}>
          <div style={{ marginBottom: 16 }}>
            <label style={{ display: 'block', fontSize: 13, fontWeight: 600, color: D.textSub, marginBottom: 6 }}>초대 이메일 <span style={{ color: D.danger }}>*</span></label>
            <input value={inviteEmail} onChange={e => setInviteEmail(e.target.value)} placeholder="admin@example.com"
              style={{ width: '100%', padding: '10px 14px', background: D.surface2, border: `1.5px solid ${D.border}`, borderRadius: 8, fontSize: 14, color: D.text }} />
          </div>
          <div style={{ marginBottom: 20 }}>
            <label style={{ display: 'block', fontSize: 13, fontWeight: 600, color: D.textSub, marginBottom: 6 }}>역할 배정</label>
            <select value={inviteRole} onChange={e => setInviteRole(e.target.value)} style={{ width: '100%', padding: '10px 14px', background: D.surface2, border: `1.5px solid ${D.border}`, borderRadius: 8, fontSize: 14, color: D.text }}>
              <option>일반어드민</option>
              <option>뷰어</option>
            </select>
          </div>
          <div style={{ background: D.surface2, borderRadius: 8, padding: 12, marginBottom: 16 }}>
            <p style={{ fontSize: 12, color: D.textSub }}>📧 초대 링크는 24시간 동안 유효하며, 이메일로 발송됩니다.</p>
          </div>
          <button onClick={handleInvite} style={{ width: '100%', padding: 13, background: `linear-gradient(135deg, ${D.primary}, ${D.secondary})`, color: '#1C1917', borderRadius: 8, fontWeight: 800, fontSize: 14 }}>
            {sending ? '발송 중...' : '초대 링크 발송'}
          </button>
        </Modal>
      )}
    </div>
  );
}

// ═══════════════════════════════════════
// 페이지: 배치 모니터 (batch-monitor)
// ═══════════════════════════════════════
function BatchMonitorPage({ addToast }) {
  const [jobs, setJobs] = useState(BATCH_JOBS);
  const [triggerModal, setTriggerModal] = useState(null);
  const [running, setRunning] = useState(false);

  const handleRetry = (id) => {
    setJobs(prev => prev.map(j => j.id === id ? { ...j, status: '실행 중', processed: 0 } : j));
    setTimeout(() => {
      setJobs(prev => prev.map(j => j.id === id ? { ...j, status: '완료', processed: j.processed || 1 } : j));
      addToast('배치 재실행 완료');
    }, 2500);
  };

  const handleTrigger = (job) => {
    setRunning(true);
    setTimeout(() => {
      setRunning(false); setTriggerModal(null);
      setJobs(prev => prev.map(j => j.id === job.id ? { ...j, status: '완료', lastRun: '2025.05.08 지금' } : j));
      addToast(`${job.name} 수동 실행 완료`);
    }, 2500);
  };

  const statusBg = (s) => s === '완료' ? D.s15 : s === '실행 중' ? D.p15 : '#EF444420';
  const statusColor = (s) => s === '완료' ? D.success : s === '실행 중' ? D.primary : D.danger;

  const typeBadge = (t) => {
    const map = { '소멸': D.danger + '30', '알림': D.primary + '30', '마이그레이션': D.info + '30', '재시도': D.warning + '30' };
    return map[t] || D.surface2;
  };

  return (
    <div style={{ animation: 'fadeIn 300ms ease' }}>
      {/* 요약 KPI */}
      <div style={{ display: 'grid', gridTemplateColumns: 'repeat(4, 1fr)', gap: 12, marginBottom: 16 }}>
        {[
          { label: '오늘 실행', value: 5, color: D.primary },
          { label: '성공', value: 4, color: D.success },
          { label: '실패', value: 0, color: D.danger },
          { label: '실행 중', value: 1, color: D.warning },
        ].map((k, i) => (
          <GradCard key={k.label} style={{ textAlign: 'center', padding: '14px 12px', animation: `slideUp 300ms ease ${i * 60}ms both` }}>
            <p style={{ fontSize: 26, fontWeight: 800, color: k.color }}>{k.value}</p>
            <p style={{ fontSize: 12, color: D.textSub, marginTop: 4 }}>{k.label}</p>
          </GradCard>
        ))}
      </div>

      <GradCard>
        <h2 style={{ fontSize: 18, fontWeight: 800, color: D.text, marginBottom: 20 }}>배치 작업 현황</h2>
        <table style={{ width: '100%', borderCollapse: 'collapse' }}>
          <thead>
            <tr style={{ borderBottom: `1px solid ${D.border}` }}>
              {['배치명', '유형', '마지막 실행', '소요시간', '처리/실패', '상태', ''].map(h => (
                <th key={h} style={{ padding: '8px 12px', textAlign: 'left', fontSize: 11, fontWeight: 700, color: D.textSub, textTransform: 'uppercase', letterSpacing: '0.05em' }}>{h}</th>
              ))}
            </tr>
          </thead>
          <tbody>
            {jobs.map((job, i) => (
              <tr key={job.id} style={{ borderBottom: `1px solid ${D.border}`, animation: `slideUp 250ms ease ${i * 40}ms both`, transition: 'background 150ms' }}
                onMouseEnter={e => e.currentTarget.style.background = D.p15}
                onMouseLeave={e => e.currentTarget.style.background = 'transparent'}
              >
                <td style={{ padding: '13px 12px', fontSize: 14, fontWeight: 700, color: D.text }}>{job.name}</td>
                <td style={{ padding: '13px 12px' }}>
                  <span style={{ fontSize: 12, padding: '3px 10px', borderRadius: 99, background: typeBadge(job.type), color: D.text, fontWeight: 600 }}>{job.type}</span>
                </td>
                <td style={{ padding: '13px 12px', fontSize: 12, color: D.textSub }}>{job.lastRun}</td>
                <td style={{ padding: '13px 12px', fontSize: 12, color: D.textSub }}>{job.duration}</td>
                <td style={{ padding: '13px 12px', fontSize: 12 }}>
                  <span style={{ color: D.success }}>{job.processed}</span>
                  {job.failed > 0 && <span style={{ color: D.danger }}> / {job.failed}</span>}
                </td>
                <td style={{ padding: '13px 12px' }}>
                  <span style={{ fontSize: 12, fontWeight: 700, padding: '3px 10px', borderRadius: 99, background: statusBg(job.status), color: statusColor(job.status), animation: job.status === '실행 중' ? 'pulse 1s infinite' : 'none' }}>
                    {job.status === '실행 중' ? '● ' : ''}{job.status}
                  </span>
                </td>
                <td style={{ padding: '13px 12px' }}>
                  <div style={{ display: 'flex', gap: 8 }}>
                    <button onClick={() => setTriggerModal(job)} style={{ padding: '5px 12px', background: D.p15, color: D.primary, borderRadius: 6, fontSize: 12, fontWeight: 700, border: `1px solid ${D.p30}` }}>
                      ▶ 실행
                    </button>
                    {job.failed > 0 && (
                      <button onClick={() => handleRetry(job.id)} style={{ padding: '5px 12px', background: '#EF444420', color: D.danger, borderRadius: 6, fontSize: 12, fontWeight: 700, border: `1px solid ${D.danger}40` }}>
                        재시도
                      </button>
                    )}
                  </div>
                </td>
              </tr>
            ))}
          </tbody>
        </table>
      </GradCard>

      {triggerModal && (
        <Modal title="배치 수동 실행" onClose={() => { setTriggerModal(null); setRunning(false); }} width={420}>
          <div style={{ background: D.surface2, borderRadius: 8, padding: 16, marginBottom: 20 }}>
            <p style={{ fontSize: 14, fontWeight: 700, color: D.text, marginBottom: 4 }}>{triggerModal.name}</p>
            <p style={{ fontSize: 12, color: D.textSub }}>마지막 실행: {triggerModal.lastRun}</p>
          </div>
          <p style={{ fontSize: 13, color: D.warning, background: '#FBBF2420', padding: '10px 14px', borderRadius: 8, marginBottom: 20 }}>
            ⚠️ 스케줄 외 즉시 실행됩니다. 중복 처리가 없도록 멱등성이 보장됩니다.
          </p>
          <button onClick={() => handleTrigger(triggerModal)} style={{ width: '100%', padding: 13, background: running ? D.surface2 : `linear-gradient(135deg, ${D.primary}, ${D.secondary})`, color: running ? D.textSub : '#1C1917', borderRadius: 8, fontWeight: 800, fontSize: 14, display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 8 }}>
            {running ? (<><div style={{ width: 18, height: 18, border: '2px solid rgba(255,255,255,0.2)', borderTopColor: D.textSub, borderRadius: 99, animation: 'spin 1s linear infinite' }} />실행 중...</>) : '▶ 즉시 실행'}
          </button>
        </Modal>
      )}
    </div>
  );
}

// 전역 Nav + App
// ═══════════════════════════════════════
function App() {
  const [route, setRoute] = useState('main');
  const [pageKey, setPageKey] = useState(0);
  const [toasts, setToasts] = useState([]);
  const [loading, setLoading] = useState(true);

  useEffect(() => { setTimeout(() => setLoading(false), 1400); }, []);

  const addToast = (text, type = 'success') => {
    const id = Date.now();
    setToasts(prev => [...prev, { id, text, type }]);
    setTimeout(() => setToasts(prev => prev.filter(t => t.id !== id)), 3500);
  };

  const navigate = (r) => { setRoute(r); setPageKey(k => k + 1); };

  const navItems = [
    { id: 'main', label: '분석 대시보드', icon: '📊' },
    { id: 'notifications', label: '알림 센터', icon: '🔔' },
    { id: 'admin-roles', label: '권한 관리', icon: '🔐' },
    { id: 'batch-monitor', label: '배치 모니터', icon: '⚡' },
    { id: 'analytics', label: '포인트 분석', icon: '📈' },
  ];

  if (loading) {
    return (
      <div style={{ width: '100%', height: '100vh', background: D.bg, display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', gap: 16 }}>
        <div style={{ fontSize: 48, animation: 'glow 2s infinite' }}>🔥</div>
        <h1 style={{ fontSize: 28, fontWeight: 800, color: D.primary, letterSpacing: '-0.03em' }}>PointFlow Analytics</h1>
        <div style={{ display: 'flex', flexDirection: 'column', gap: 10, width: 300 }}>
          {[...Array(3)].map((_, i) => (
            <div key={i} style={{ height: 14, borderRadius: 8, background: 'linear-gradient(90deg, #3A3530 25%, #44403C 50%, #3A3530 75%)', backgroundSize: '200% 100%', animation: 'shimmer 1.5s infinite' }} />
          ))}
        </div>
      </div>
    );
  }

  return (
    <div style={{ display: 'flex', flexDirection: 'column', width: '100%', minHeight: '100vh', background: D.bg }}>
      {/* 글로벌 네비 */}
      <header style={{ background: D.surface, borderBottom: `1px solid ${D.border}`, position: 'sticky', top: 0, zIndex: 100, boxShadow: '0 2px 12px rgba(0,0,0,0.4)' }}>
        <div style={{ maxWidth: 1280, margin: '0 auto', padding: '0 28px', display: 'flex', alignItems: 'center', height: 64 }}>
          <div style={{ display: 'flex', alignItems: 'center', gap: 10, marginRight: 40 }}>
            <span style={{ fontSize: 26, animation: 'glow 3s infinite' }}>🔥</span>
            <div>
              <span style={{ fontSize: 17, fontWeight: 800, color: D.primary, letterSpacing: '-0.03em' }}>PointFlow</span>
              <span style={{ fontSize: 17, fontWeight: 400, color: D.textSub, letterSpacing: '-0.02em' }}> Analytics</span>
            </div>
            <span style={{ fontSize: 10, background: D.p30, color: D.primary, borderRadius: 4, padding: '2px 7px', fontWeight: 800, letterSpacing: '0.06em' }}>BETA</span>
          </div>
          <nav style={{ display: 'flex', flex: 1, gap: 2 }}>
            {navItems.map(item => (
              <button key={item.id} onClick={() => navigate(item.id)} style={{
                padding: '0 16px', height: 64, background: 'none', fontSize: 13, fontWeight: route === item.id ? 700 : 500,
                color: route === item.id ? D.primary : D.textSub,
                borderBottom: `2px solid ${route === item.id ? D.primary : 'transparent'}`,
                transition: 'all 150ms', display: 'flex', alignItems: 'center', gap: 6,
              }}
              onMouseEnter={e => { if (route !== item.id) e.currentTarget.style.color = D.text; }}
              onMouseLeave={e => { if (route !== item.id) e.currentTarget.style.color = D.textSub; }}
              >
                <span>{item.icon}</span>{item.label}
              </button>
            ))}
          </nav>
          <div style={{ display: 'flex', alignItems: 'center', gap: 16 }}>
            <div style={{ width: 8, height: 8, borderRadius: 99, background: D.success, boxShadow: `0 0 8px ${D.success}`, animation: 'pulse 2s infinite' }} />
            <div style={{ width: 36, height: 36, borderRadius: 99, background: `linear-gradient(135deg, ${D.primary}, ${D.secondary})`, display: 'flex', alignItems: 'center', justifyContent: 'center', color: '#1C1917', fontWeight: 800, fontSize: 14 }}>
              S
            </div>
            <div>
              <p style={{ fontSize: 13, fontWeight: 700, color: D.text }}>슈퍼어드민</p>
              <p style={{ fontSize: 11, color: D.textSub }}>super@example.com</p>
            </div>
          </div>
        </div>
      </header>

      {/* 히어로 배너 (main only) */}
      {route === 'main' && (
        <div style={{ background: `linear-gradient(135deg, #292524 0%, #3A2C1A 50%, #44380A 100%)`, padding: '28px 0', borderBottom: `1px solid ${D.border}`, animation: 'fadeIn 300ms ease' }}>
          <div style={{ maxWidth: 1280, margin: '0 auto', padding: '0 28px', display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
            <div>
              <h1 style={{ fontSize: 26, fontWeight: 800, color: D.text, marginBottom: 6, letterSpacing: '-0.03em' }}>
                포인트 분석 대시보드
                <span style={{ fontSize: 14, fontWeight: 500, color: D.textSub, marginLeft: 12 }}>Materialized View 집계 · Redis 캐싱 · Bull Queue 배치</span>
              </h1>
              <p style={{ fontSize: 13, color: D.textSub }}>마지막 갱신: 2025.05.08 02:00 (자동 갱신 활성화됨)</p>
            </div>
            <div style={{ display: 'flex', gap: 10 }}>
              {[{ label: '누적 지급', value: '429,000P', color: D.primary }, { label: '이번달 소멸', value: '3,200P', color: D.danger }].map(s => (
                <div key={s.label} style={{ background: 'rgba(255,255,255,0.06)', backdropFilter: 'blur(8px)', borderRadius: 10, padding: '10px 18px', textAlign: 'center', border: `1px solid ${D.border}` }}>
                  <p style={{ fontSize: 11, color: D.textSub, marginBottom: 2 }}>{s.label}</p>
                  <p style={{ fontSize: 18, fontWeight: 800, color: s.color }}>{s.value}</p>
                </div>
              ))}
            </div>
          </div>
        </div>
      )}

      {/* 메인 콘텐츠 */}
      <main style={{ flex: 1, maxWidth: 1280, width: '100%', margin: '24px auto', padding: '0 28px' }}>
        <div key={pageKey} style={{ animation: 'fadeIn 300ms ease' }}>
          {route === 'main' && <AnalyticsDashboard addToast={addToast} />}
          {route === 'notifications' && <NotificationsPage addToast={addToast} />}
          {route === 'admin-roles' && <AdminRolesPage addToast={addToast} />}
          {route === 'batch-monitor' && <BatchMonitorPage addToast={addToast} />}
          {route === 'analytics' && <PointsAnalyticsPage addToast={addToast} />}
        </div>
      </main>

      {/* 푸터 */}
      <footer style={{ background: D.surface, borderTop: `1px solid ${D.border}`, padding: '16px 28px' }}>
        <div style={{ maxWidth: 1280, margin: '0 auto', display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
          <span style={{ fontSize: 12, color: D.textSub }}>PointFlow Analytics © 2025 — 자체 개발 프로젝트</span>
          <span style={{ fontSize: 12, color: D.textSub }}>React 18 · Node.js + Express · PostgreSQL · Redis · Bull Queue</span>
        </div>
      </footer>

      <Toast msgs={toasts} />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
