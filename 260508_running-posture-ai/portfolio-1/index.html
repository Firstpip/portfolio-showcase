<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>달리기 자세 AI 분석 플랫폼 — 맞춤 구현 데모</title>
<link rel="preconnect" href="https://cdn.jsdelivr.net">
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" rel="stylesheet">
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
@keyframes fadeIn { from { opacity:0; transform:translateY(8px) } to { opacity:1; transform:translateY(0) } }
@keyframes slideInRight { from { transform:translateX(100%) } to { transform:translateX(0) } }
@keyframes slideInUp { from { opacity:0; transform:translateY(20px) } to { opacity:1; transform:translateY(0) } }
@keyframes pulse { 0%,100%{ opacity:1 } 50%{ opacity:.5 } }
@keyframes spin { from{ transform:rotate(0deg) } to{ transform:rotate(360deg) } }
@keyframes progressFill { from{ width:0 } to{ width:var(--w,70%) } }
@keyframes blink { 0%,100%{ opacity:1 } 50%{ opacity:0 } }
@keyframes riskGlow { 0%,100%{ box-shadow:0 0 0 0 rgba(239,68,68,.4) } 70%{ box-shadow:0 0 0 12px rgba(239,68,68,0) } }
@keyframes gaugeGrow { from{ stroke-dashoffset:251 } to{ stroke-dashoffset:var(--offset,100) } }
@keyframes waveAnim { 0%,100%{ transform:scaleY(.4) } 50%{ transform:scaleY(1) } }
@keyframes tokenBlink { 0%,100%{ background:#0EA5E920 } 50%{ background:#0EA5E940 } }
@keyframes skeletonDraw { from{ stroke-dashoffset:200 } to{ stroke-dashoffset:0 } }
@keyframes accordionOpen { from{ opacity:0; max-height:0 } to{ opacity:1; max-height:500px } }
@keyframes fadeInScale { from { opacity:0; transform:scale(.94) } to { opacity:1; transform:scale(1) } }
@keyframes slideUp { from { opacity:0; transform:translateY(24px) } to { opacity:1; transform:translateY(0) } }
@keyframes ripple { from { transform:scale(0); opacity:.6 } to { transform:scale(4); opacity:0 } }
@keyframes countUp { 0% { opacity:0; transform:translateY(8px) } 100% { opacity:1; transform:translateY(0) } }
@keyframes shimmer { 0% { background-position:-400px 0 } 100% { background-position:400px 0 } }
@keyframes barGrow { from { transform:scaleX(0) } to { transform:scaleX(1) } }
@keyframes slideDown { from { opacity:0; max-height:0 } to { opacity:1; max-height:600px } }
.kpi-num { animation: countUp .4s ease both; }
.shimmer-el { background:linear-gradient(90deg,#1E293B 25%,#243347 50%,#1E293B 75%); background-size:400px; animation: shimmer 1.5s infinite; }
.bar-anim { animation: barGrow .6s ease both; transform-origin:left center; }
.panel-fade { animation: fadeInScale .25s ease both; }
.slide-down { animation: slideDown .3s ease both; }
html,body{ margin:0; padding:0; width:100%; height:100%; font-family:'Pretendard',sans-serif; background:#0F172A; }
#root{ display:flex; flex-direction:column; width:100%; min-height:100vh; }
*{ box-sizing:border-box; }
::-webkit-scrollbar{ width:6px; }
::-webkit-scrollbar-track{ background:#1E293B; }
::-webkit-scrollbar-thumb{ background:#475569; border-radius:3px; }
button{ cursor:pointer; border:none; outline:none; font-family:'Pretendard',sans-serif; }
input,textarea,select{ font-family:'Pretendard',sans-serif; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useRef,useCallback} = React;

const C = {
  bg:'#0F172A', surf:'#1E293B', surf2:'#243347', border:'#334155',
  primary:'#0EA5E9', secondary:'#6366F1', accent:'#10B981',
  text:'#F1F5F9', textMuted:'#94A3B8', danger:'#EF4444', warning:'#F59E0B',
  success:'#10B981',
};

const TABS = [
  { id:'pose', label:'포즈 분석' },
  { id:'labeling', label:'STT 라벨링' },
  { id:'risk', label:'위험도 진단' },
  { id:'api', label:'API 명세' },
];

const PATIENTS = [
  { id:'P001', name:'김민준', age:32, date:'2026-05-07', status:'분석완료', risk:'주의', views:['전면','측면'] },
  { id:'P002', name:'이서연', age:28, date:'2026-05-07', status:'분석완료', risk:'위험', views:['전면','후면','측면'] },
  { id:'P003', name:'박지훈', age:41, date:'2026-05-06', status:'라벨링중', risk:'-', views:['전면'] },
  { id:'P004', name:'최수아', age:35, date:'2026-05-06', status:'분석완료', risk:'정상', views:['전면','측면'] },
  { id:'P005', name:'정태영', age:26, date:'2026-05-05', status:'분석완료', risk:'주의', views:['전면','후면'] },
];

const JOINT_DATA = [
  { name:'무릎 굽힘각(좌)', val:165, normal:'140~170°' },
  { name:'무릎 굽힘각(우)', val:162, normal:'140~170°' },
  { name:'고관절 신전(좌)', val:178, normal:'170~185°' },
  { name:'고관절 신전(우)', val:174, normal:'170~185°' },
  { name:'발목 배굴(좌)', val:72, normal:'75~90°' },
  { name:'발목 배굴(우)', val:80, normal:'75~90°' },
];

const RISK_PARTS = [
  { part:'무릎', score:72, level:'주의', color:'#F59E0B' },
  { part:'발목(좌)', score:85, level:'위험', color:'#EF4444' },
  { part:'고관절', score:45, level:'정상', color:'#10B981' },
  { part:'허리·척추', score:55, level:'정상', color:'#10B981' },
  { part:'어깨·상체', score:30, level:'정상', color:'#10B981' },
];

const PRESCRIPTIONS = [
  { part:'발목(좌)', items:['종아리 스트레칭 15분/일 권장','착지 시 발뒤꿈치 패드 사용 검토','달리기 거리를 현재의 60%로 단계적 감소','정형외과 추가 검진 예약 필요'] },
  { part:'무릎', items:['슬개골 강화 운동 주 3회','경사 러닝 자제 (평지 훈련 전환)','쿠션감 보강 러닝화로 교체 권장'] },
];

const API_ENDPOINTS = [
  { method:'POST', path:'/api/v1/analyze/pose', desc:'달리기 영상 포즈 분석 요청', params:'file: UploadFile, patient_id: str' },
  { method:'GET', path:'/api/v1/analyze/{session_id}', desc:'분석 세션 결과 조회', params:'session_id: UUID' },
  { method:'POST', path:'/api/v1/label', desc:'음성 소견 STT + 정형화 저장', params:'audio: UploadFile, session_id: UUID' },
  { method:'GET', path:'/api/v1/risk/{session_id}', desc:'부상 위험도 산출 결과', params:'session_id: UUID' },
  { method:'POST', path:'/api/v1/token', desc:'API 토큰 발급', params:'name: str, expires_days: int' },
  { method:'DELETE', path:'/api/v1/token/{token_id}', desc:'API 토큰 폐기', params:'token_id: UUID' },
];

// ─── Shared components ────────────────────────────────────────
function Badge({ text, color, bg }) {
  return <span style={{ fontSize:11, fontWeight:600, padding:'2px 8px', borderRadius:99, color, background:bg||color+'22' }}>{text}</span>;
}

function RiskBadge({ level }) {
  const map = { 정상:['#10B981','#10B98122'], 주의:['#F59E0B','#F59E0B22'], 위험:['#EF4444','#EF444422'] };
  const [c,b] = map[level]||['#94A3B8','#94A3B822'];
  return <Badge text={level} color={c} bg={b} />;
}

function KpiCard({ label, value, sub, color }) {
  return (
    <div style={{ background:C.surf, border:`1px solid ${C.border}`, borderRadius:12, padding:'16px 20px', flex:1, minWidth:140 }}>
      <div style={{ fontSize:12, color:C.textMuted, marginBottom:4 }}>{label}</div>
      <div style={{ fontSize:26, fontWeight:700, color:color||C.primary }}>{value}</div>
      {sub && <div style={{ fontSize:11, color:C.textMuted, marginTop:2 }}>{sub}</div>}
    </div>
  );
}

function Overlay({ onClose }) {
  return <div onClick={onClose} style={{ position:'fixed', inset:0, background:'rgba(0,0,0,.55)', zIndex:200 }} />;
}

function Modal({ title, onClose, children, width=520 }) {
  return (
    <>
      <Overlay onClose={onClose} />
      <div style={{ position:'fixed', top:'50%', left:'50%', transform:'translate(-50%,-50%)', width, background:C.surf, border:`1px solid ${C.border}`, borderRadius:16, zIndex:201, padding:28, animation:'fadeIn .2s ease', maxHeight:'90vh', overflowY:'auto' }}>
        <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:20 }}>
          <h3 style={{ margin:0, color:C.text, fontSize:16, fontWeight:700 }}>{title}</h3>
          <button onClick={onClose} style={{ background:'none', color:C.textMuted, fontSize:20 }}>✕</button>
        </div>
        {children}
      </div>
    </>
  );
}

function Drawer({ onClose, children }) {
  return (
    <>
      <Overlay onClose={onClose} />
      <div style={{ position:'fixed', top:0, right:0, bottom:0, width:460, background:C.surf, borderLeft:`1px solid ${C.border}`, zIndex:201, overflowY:'auto', padding:28, animation:'slideInRight .2s ease' }}>
        <button onClick={onClose} style={{ background:'none', color:C.textMuted, fontSize:20, marginBottom:16, display:'block', marginLeft:'auto' }}>✕</button>
        {children}
      </div>
    </>
  );
}

function Toast({ msg, onClose }) {
  useEffect(() => { const t = setTimeout(onClose, 2800); return () => clearTimeout(t); }, []);
  return (
    <div style={{ position:'fixed', bottom:28, right:28, background:C.accent, color:'#fff', padding:'12px 20px', borderRadius:10, fontWeight:600, zIndex:300, animation:'slideInUp .3s ease', fontSize:14 }}>
      ✓ {msg}
    </div>
  );
}

// ─── Skeleton visualization ───────────────────────────────────
function SkeletonViewer({ frame }) {
  const joints = [
    [200,60],[200,120],[175,115],[155,170],[140,230],[145,285],
    [225,115],[245,170],[260,230],[255,285],
    [195,130],[205,130],[190,210],[210,210],
    [185,290],[215,290],[180,360],[215,360],
  ];
  const bones = [[0,1],[1,2],[2,3],[3,4],[4,5],[1,6],[6,7],[7,8],[8,9],[1,10],[10,11],[11,12],[12,13],[10,14],[14,16],[11,15],[15,17]];
  const highlight = [3,4,5,14,16];
  return (
    <svg width="100%" viewBox="0 0 400 420" style={{ background:'#0A0F1E', borderRadius:10, maxHeight:360 }}>
      <rect width="400" height="420" fill="#0A0F1E" rx="10"/>
      <text x="16" y="24" fill={C.textMuted} fontSize="11">프레임 {frame}/240 | MediaPipe Pose</text>
      {bones.map(([a,b],i) => (
        <line key={i} x1={joints[a][0]} y1={joints[a][1]} x2={joints[b][0]} y2={joints[b][1]}
          stroke={highlight.includes(a)||highlight.includes(b)? C.danger :'#38BDF8'} strokeWidth="2.5"
          strokeLinecap="round" style={{animation:`skeletonDraw .8s ease ${i*.03}s both`}} strokeDasharray="200" strokeDashoffset="0"/>
      ))}
      {joints.map(([x,y],i) => (
        <circle key={i} cx={x} cy={y} r={highlight.includes(i)?6:4}
          fill={highlight.includes(i)?C.danger:C.primary}
          style={{animation:`fadeIn .5s ease ${i*.04}s both`}}
          stroke="#fff" strokeWidth="1.5"/>
      ))}
      {highlight.includes(14) && <circle cx={joints[14][0]} cy={joints[14][1]} r={10} fill="none" stroke={C.danger} strokeWidth="2" style={{animation:'riskGlow 1.5s infinite'}}/>}
      <text x={joints[14][0]+12} y={joints[14][1]+4} fill={C.danger} fontSize="10" fontWeight="bold">⚠ 위험</text>
      <text x="16" y="405" fill={C.textMuted} fontSize="10">보폭 1.42m | 체공시간 0.28s | 케이던스 172spm</text>
    </svg>
  );
}

// ─── Pose Analysis Page ───────────────────────────────────────
function PosePage({ onDrawer }) {
  const [frame, setFrame] = useState(47);
  const [analyzing, setAnalyzing] = useState(false);
  const [progress, setProgress] = useState(0);
  const [selected, setSelected] = useState(null);

  const startAnalysis = () => {
    setAnalyzing(true); setProgress(0);
    const iv = setInterval(() => {
      setProgress(p => { if(p>=100){ clearInterval(iv); setAnalyzing(false); return 100; } return p+3; });
    }, 80);
  };

  return (
    <div style={{ animation:'fadeIn .3s ease' }}>
      <div style={{ display:'flex', gap:20, flexWrap:'wrap' }}>
        {/* Left: viewer */}
        <div style={{ flex:'1 1 480px' }}>
          <div style={{ background:C.surf, borderRadius:14, border:`1px solid ${C.border}`, padding:20 }}>
            <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:14 }}>
              <span style={{ fontWeight:700, color:C.text }}>포즈 분석 뷰어</span>
              <div style={{ display:'flex', gap:8 }}>
                <button onClick={startAnalysis} style={{ background:C.primary, color:'#fff', padding:'6px 16px', borderRadius:8, fontSize:13, fontWeight:600 }}>
                  {analyzing ? '분석 중...' : '분석 시작'}
                </button>
                <button style={{ background:C.surf2, color:C.text, padding:'6px 12px', borderRadius:8, fontSize:13 }}>
                  영상 업로드
                </button>
              </div>
            </div>
            {analyzing && (
              <div style={{ marginBottom:12 }}>
                <div style={{ display:'flex', justifyContent:'space-between', marginBottom:6 }}>
                  <span style={{ fontSize:12, color:C.textMuted }}>관절 추출 중...</span>
                  <span style={{ fontSize:12, color:C.primary }}>{progress}%</span>
                </div>
                <div style={{ height:6, background:C.surf2, borderRadius:3, overflow:'hidden' }}>
                  <div style={{ height:'100%', background:`linear-gradient(90deg,${C.primary},${C.secondary})`, width:`${progress}%`, transition:'width .1s linear', borderRadius:3 }}/>
                </div>
              </div>
            )}
            <SkeletonViewer frame={frame} />
            <div style={{ marginTop:12 }}>
              <div style={{ display:'flex', justifyContent:'space-between', marginBottom:6 }}>
                <span style={{ fontSize:12, color:C.textMuted }}>프레임 탐색 (0~240)</span>
                <span style={{ fontSize:12, color:C.primary, fontWeight:600 }}>{frame} / 240</span>
              </div>
              <input type="range" min={0} max={240} value={frame} onChange={e=>setFrame(+e.target.value)}
                style={{ width:'100%', accentColor:C.primary }} />
            </div>
          </div>

          {/* Biomechanics */}
          <div style={{ background:C.surf, borderRadius:14, border:`1px solid ${C.border}`, padding:20, marginTop:16 }}>
            <div style={{ fontWeight:700, color:C.text, marginBottom:14 }}>생체역학 지표</div>
            <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr 1fr', gap:10 }}>
              {[
                { l:'보폭', v:'1.42 m', ok:true },
                { l:'체공시간', v:'0.28 s', ok:true },
                { l:'케이던스', v:'172 spm', ok:true },
                { l:'착지각도', v:'12°', ok:false },
                { l:'수직진동', v:'9.2 cm', ok:false },
                { l:'팔 대칭성', v:'87%', ok:true },
              ].map((m,i) => (
                <div key={i} style={{ background:m.ok?C.accent+'11':C.danger+'11', border:`1px solid ${m.ok?C.accent:C.danger}33`, borderRadius:10, padding:'12px 14px', textAlign:'center' }}>
                  <div style={{ fontSize:11, color:C.textMuted, marginBottom:4 }}>{m.l}</div>
                  <div style={{ fontSize:18, fontWeight:700, color:m.ok?C.accent:C.danger }}>{m.v}</div>
                </div>
              ))}
            </div>
          </div>
        </div>

        {/* Right: table */}
        <div style={{ flex:'0 0 320px' }}>
          <div style={{ background:C.surf, borderRadius:14, border:`1px solid ${C.border}`, padding:20 }}>
            <div style={{ fontWeight:700, color:C.text, marginBottom:14 }}>분석 케이스 목록</div>
            <div style={{ display:'flex', flexDirection:'column', gap:8 }}>
              {PATIENTS.map(p => (
                <div key={p.id} onClick={() => onDrawer(p)} style={{ background:C.surf2, borderRadius:10, padding:'12px 14px', cursor:'pointer', border:`1px solid ${C.border}`, transition:'all .15s' }}
                  onMouseOver={e=>{e.currentTarget.style.borderColor=C.primary;e.currentTarget.style.background='#1E3A5F';}}
                  onMouseOut={e=>{e.currentTarget.style.borderColor=C.border;e.currentTarget.style.background=C.surf2;}}>
                  <div style={{ display:'flex', justifyContent:'space-between', marginBottom:6 }}>
                    <span style={{ fontWeight:600, color:C.text }}>{p.name}</span>
                    <RiskBadge level={p.risk} />
                  </div>
                  <div style={{ fontSize:12, color:C.textMuted }}>{p.id} · {p.date} · {p.views.join('/')} 촬영</div>
                  <div style={{ marginTop:6 }}>
                    <Badge text={p.status} color={p.status==='분석완료'?C.accent:C.warning} />
                  </div>
                </div>
              ))}
            </div>
          </div>

          {/* Joint angles */}
          <div style={{ background:C.surf, borderRadius:14, border:`1px solid ${C.border}`, padding:20, marginTop:16 }}>
            <div style={{ fontWeight:700, color:C.text, marginBottom:14 }}>관절 각도 데이터</div>
            {JOINT_DATA.map((j,i) => {
              const ok = j.val >= 140;
              return (
                <div key={i} style={{ marginBottom:10 }}>
                  <div style={{ display:'flex', justifyContent:'space-between', marginBottom:4 }}>
                    <span style={{ fontSize:12, color:C.textMuted }}>{j.name}</span>
                    <span style={{ fontSize:12, fontWeight:600, color:ok?C.accent:C.danger }}>{j.val}°</span>
                  </div>
                  <div style={{ height:4, background:C.surf2, borderRadius:2 }}>
                    <div style={{ height:'100%', background:ok?C.accent:C.danger, width:`${Math.min((j.val/200)*100,100)}%`, borderRadius:2, transition:'width .5s ease' }}/>
                  </div>
                </div>
              );
            })}
          </div>
        </div>
      </div>
    </div>
  );
}

// ─── STT Labeling Page ────────────────────────────────────────
function LabelingPage({ onToast }) {
  const [recording, setRecording] = useState(false);
  const [transcript, setTranscript] = useState('');
  const [structured, setStructured] = useState(null);
  const [editMode, setEditMode] = useState(false);
  const [tick, setTick] = useState(0);

  useEffect(() => {
    if(!recording) return;
    const iv = setInterval(() => setTick(t=>t+1), 200);
    return () => clearInterval(iv);
  }, [recording]);

  const SAMPLE_TEXT = '환자 발목 착지 패턴에서 과내전 소견이 관찰됩니다. 좌측 발목의 배굴 가동범위가 정상 범위인 75도 미만으로 제한되어 있으며, 착지 시 발뒤꿈치가 먼저 닿는 힐스트라이크 패턴이 확인됩니다. 부상 위험도는 주의 수준으로 판단하며, 달리기 거리를 현재의 60%로 줄이고 종아리 스트레칭을 일 15분씩 시행하도록 처방합니다.';

  const simulate = () => {
    let i = 0;
    const iv = setInterval(() => {
      setTranscript(SAMPLE_TEXT.slice(0,i+=4));
      if(i>=SAMPLE_TEXT.length){ clearInterval(iv); setRecording(false); }
    }, 30);
  };

  const toggleRecord = () => {
    if(recording){ setRecording(false); return; }
    setRecording(true); setTranscript(''); setStructured(null);
    setTimeout(() => simulate(), 800);
  };

  const runLLM = () => {
    setTimeout(() => {
      setStructured({
        risk:'주의', parts:['발목(좌)','무릎'], pattern:'힐스트라이크 + 과내전',
        prescription:['달리기 거리 60% 감소','종아리 스트레칭 15분/일','힐스트라이크 → 미드풋 착지 교정','착지 시 발뒤꿈치 패드 사용'],
        confidence:94,
      });
      onToast('GPT-4o-mini 정형화 완료');
    }, 1200);
  };

  const LABELS = [
    { date:'2026-05-07', patient:'김민준', status:'검토완료', risk:'주의' },
    { date:'2026-05-06', patient:'이서연', status:'수정필요', risk:'위험' },
    { date:'2026-05-06', patient:'박지훈', status:'라벨링중', risk:'-' },
  ];

  return (
    <div style={{ animation:'fadeIn .3s ease' }}>
      <div style={{ display:'flex', gap:20, flexWrap:'wrap' }}>
        <div style={{ flex:'1 1 460px' }}>
          <div style={{ background:C.surf, borderRadius:14, border:`1px solid ${C.border}`, padding:24 }}>
            <div style={{ fontWeight:700, color:C.text, marginBottom:18, fontSize:15 }}>음성 소견 입력</div>
            {/* Waveform */}

          <button style={{ background:C.surf2, border:`1px solid ${C.border}`, color:C.textMuted, padding:'6px 12px', borderRadius:8, fontSize:12 }}>🔍</button>
          <button style={{ background:C.surf2, border:`1px solid ${C.border}`, color:C.textMuted, padding:'6px 12px', borderRadius:8, fontSize:12, position:'relative' }}>
            🔔<span style={{ position:'absolute', top:-4, right:-4, width:14, height:14, background:C.danger, borderRadius:99, fontSize:9, color:'#fff', display:'flex', alignItems:'center', justifyContent:'center' }}>3</span>
          </button>
          <div style={{ width:32, height:32, background:`linear-gradient(135deg,${C.accent},${C.primary})`, borderRadius:99, display:'flex', alignItems:'center', justifyContent:'center', fontSize:13, color:'#fff', fontWeight:700 }}>박</div>
        </div>
      </header>

      {/* Hero Banner */}
      <div style={{ background:`linear-gradient(135deg, ${C.primary}cc, ${C.secondary}cc)`, padding:'24px 32px', color:'#fff', backdropFilter:'blur(10px)' }}>
        <div style={{ fontSize:10, opacity:.8, marginBottom:4, letterSpacing:2, textTransform:'uppercase' }}>달리기 자세 AI 분석 플랫폼</div>
        <h1 style={{ margin:'0 0 12px', fontSize:22, fontWeight:800 }}>{meta.title}</h1>
        <div style={{ display:'flex', gap:32, flexWrap:'wrap' }}>
          {meta.kpis.map((k,i) => (
            <div key={i}>
              <div style={{ fontSize:11, opacity:.75, marginBottom:2 }}>{k.l}</div>
              <div style={{ fontSize:20, fontWeight:800 }}>{k.v}</div>
            </div>
          ))}
        </div>
      </div>

      {/* Content */}
      <main style={{ flex:1, padding:'24px 32px' }}>
        {tab==='pose' && <PosePage onDrawer={setDrawer}/>}
        {tab==='labeling' && <LabelingPage onToast={showToast}/>}
        {tab==='risk' && <RiskPage onToast={showToast}/>}
        {tab==='api' && <ApiPage onToast={showToast}/>}
      </main>

      {/* Drawer (patient detail) */}
      {drawer && (
        <Drawer onClose={()=>setDrawer(null)}>
          <div style={{ animation:'fadeIn .3s ease' }}>
            <div style={{ display:'flex', justifyContent:'space-between', marginBottom:20 }}>
              <div>
                <div style={{ fontSize:20, fontWeight:800, color:C.text }}>{drawer.name}</div>
                <div style={{ color:C.textMuted, fontSize:13 }}>{drawer.id} · {drawer.age}세</div>
              </div>
              <RiskBadge level={drawer.risk} />
            </div>
            <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:10, marginBottom:16 }}>
              <div style={{ background:C.surf2, borderRadius:10, padding:'12px 14px' }}>
                <div style={{ fontSize:11, color:C.textMuted }}>분석 일자</div>
                <div style={{ fontWeight:600, color:C.text, marginTop:4 }}>{drawer.date}</div>
              </div>
              <div style={{ background:C.surf2, borderRadius:10, padding:'12px 14px' }}>
                <div style={{ fontSize:11, color:C.textMuted }}>촬영 각도</div>
                <div style={{ fontWeight:600, color:C.text, marginTop:4 }}>{drawer.views.join(', ')}</div>
              </div>
              <div style={{ background:C.surf2, borderRadius:10, padding:'12px 14px' }}>
                <div style={{ fontSize:11, color:C.textMuted }}>상태</div>
                <div style={{ marginTop:4 }}><Badge text={drawer.status} color={drawer.status==='분석완료'?C.accent:C.warning}/></div>
              </div>
              <div style={{ background:C.surf2, borderRadius:10, padding:'12px 14px' }}>
                <div style={{ fontSize:11, color:C.textMuted }}>위험도</div>
                <div style={{ marginTop:4 }}><RiskBadge level={drawer.risk}/></div>
              </div>
            </div>
            <div style={{ background:C.surf2, borderRadius:10, padding:'14px 16px', marginBottom:16 }}>
              <div style={{ fontSize:12, color:C.textMuted, marginBottom:8 }}>메모</div>
              <textarea rows={3} placeholder="메모를 입력하세요" style={{ width:'100%', background:'none', border:'none', color:C.text, fontSize:13, resize:'none', outline:'none' }}/>
            </div>
            <div style={{ display:'flex', gap:10 }}>
              <button onClick={()=>{setDrawer(null);showToast('상세 분석 리포트를 열었습니다');}} style={{ flex:1, background:C.primary, color:'#fff', padding:'12px', borderRadius:10, fontWeight:600, fontSize:14 }}>
                분석 리포트
              </button>
              <button onClick={()=>{setDrawer(null);showToast('처방 데이터 저장 완료');}} style={{ flex:1, background:C.surf2, color:C.text, padding:'12px', borderRadius:10, fontWeight:600, fontSize:14, border:`1px solid ${C.border}` }}>
                처방 저장
              </button>
            </div>
          </div>
        </Drawer>
      )}

      {/* Toast */}
      {toast && <Toast msg={toast} onClose={()=>setToast(null)} />}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
