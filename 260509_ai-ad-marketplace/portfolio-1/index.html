function CountUp({end,suffix=''}){
  const [v,setV]=useState(0);
  useEffect(()=>{
    let s=0;const step=end/75;
    const t=setInterval(()=>{s+=step;if(s>=end){setV(end);clearInterval(t);}else setV(Math.floor(s));},16);
    return()=>clearInterval(t);
  },[end]);
  return <span style={{animation:'countUp 400ms ease'}}>{v.toLocaleString()}{suffix}</span>;
}
function Toast({msg,onClose}){
  useEffect(()=>{const t=setTimeout(onClose,3000);return()=>clearTimeout(t);},[]);
  return(
    <div style={{position:'fixed',bottom:24,right:24,zIndex:9999,background:'#1B1340',color:'#fff',
      padding:'12px 20px',borderRadius:10,animation:'slideUp 300ms ease',
      boxShadow:'0 4px 20px rgba(0,0,0,0.25)',fontSize:14,display:'flex',alignItems:'center',gap:8}}>
      ✓ {msg}
    </div>
  );
}

        <div style={{display:'flex',alignItems:'center',gap:10}}>
          <div style={{padding:'6px 12px',background:C.bg,borderRadius:999,fontSize:13,color:C.sub,cursor:'pointer'}}>🔍 검색</div>
          <div style={{width:32,height:32,background:`linear-gradient(135deg,${C.primary},${C.pLight})`,
            borderRadius:'50%',display:'flex',alignItems:'center',justifyContent:'center',color:'#fff',fontSize:14,cursor:'pointer'}}>👤</div>
        </div>
      </header>

      <div style={{background:`linear-gradient(135deg,${C.primary},${C.pLight})`,padding:'22px 32px',color:'#fff'}}>
        <h1 style={{fontSize:21,fontWeight:800,marginBottom:4,letterSpacing:'-0.02em'}}>{meta.title}</h1>
        <p style={{fontSize:13,opacity:0.85,marginBottom:14}}>{meta.desc}</p>
        <div style={{display:'flex',gap:28}}>
          {meta.kpis.map(k=>(
            <div key={k.l}>
              <div style={{fontSize:22,fontWeight:800}}><CountUp end={k.v}/></div>
              <div style={{fontSize:12,opacity:0.8}}>{k.l}</div>
            </div>
          ))}
        </div>
      </div>

      <main style={{flex:1,padding:'24px 32px'}}>
        {tab==='main'&&<MissionPage onMissionClick={m=>{setDrawer(m);setDrawerType('mission');}}/>}
        {tab==='auth'&&<AuthPage/>}
        {tab==='showcase'&&<ShowcasePage onIPClick={ip=>{setDrawer(ip);setDrawerType('ip');}}/>}
        {tab==='payment'&&<PaymentPage/>}
      </main>

      <Drawer item={drawer} type={drawerType} onClose={()=>{setDrawer(null);setDrawerType(null);}}/>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
