  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; font-family: 'Pretendard', sans-serif; background: #0F0F1A; color: #fff; }
    #root { display: flex; flex-direction: column; width: 100%; min-height: 100vh; }

    @keyframes fadeIn { from { opacity: 0 } to { opacity: 1 } }
    @keyframes fadeInScale { from { opacity: 0; transform: scale(0.95) } to { opacity: 1; transform: scale(1) } }
    @keyframes slideInRight { from { opacity: 0; transform: translateX(30px) } to { opacity: 1; transform: translateX(0) } }
    @keyframes slideUp { from { opacity: 0; transform: translateY(20px) } to { opacity: 1; transform: translateY(0) } }
    @keyframes ripple { 0% { transform: scale(0); opacity: 0.5 } 100% { transform: scale(4); opacity: 0 } }
    @keyframes countUp { from { opacity: 0; transform: translateY(10px) } to { opacity: 1; transform: translateY(0) } }
    @keyframes shimmer { 0% { background-position: -200% 0 } 100% { background-position: 200% 0 } }
    @keyframes pulse { 0%, 100% { opacity: 1 } 50% { opacity: 0.5 } }
    @keyframes barGrow { from { width: 0% } to { width: var(--target-width) } }
    @keyframes slideDown { from { opacity: 0; transform: translateY(-10px); max-height: 0 } to { opacity: 1; transform: translateY(0); max-height: 500px } }

    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #1E1E30; }

function Toast({ message, onClose }) {
  useEffect(() => { const t = setTimeout(onClose, 3000); return () => clearTimeout(t); }, []);
  return (
    <div style={{
      position: 'fixed', bottom: 28, right: 28, zIndex: 9999,
      background: C.surfaceHigh, color: C.text, padding: '14px 22px',
      borderRadius: 14, animation: 'slideUp 300ms ease',
      boxShadow: '0 8px 32px rgba(0,0,0,0.5)',
      border: `1px solid ${C.border}`,
      display: 'flex', alignItems: 'center', gap: 10,
      backdropFilter: 'blur(20px)',
    }}>
      <span style={{ color: C.success, fontSize: 18 }}>✓</span>
      <span style={{ fontSize: 14 }}>{message}</span>
    </div>
  );
}

function Modal({ title, onClose, children, width = 540 }) {

      <div style={{

        display: 'flex', flexDirection: 'column',

      }}>

}

function Badge({ text, color }) {
  return (
    <span style={{
      padding: '3px 10px', borderRadius: 999,
      fontSize: 11, fontWeight: 700,
      background: `${color}22`, color,
      border: `1px solid ${color}44`,
    }}>{text}</span>
  );
}

function StatusBadge({ status }) {
  const map = {
    '진행중': C.success, '마감임박': C.warning, '신규': C.info, '완료': '#94A3B8',
    '발행': C.info, '입금대기': C.warning, '만료': '#94A3B8', '활성': C.success, '검토중': C.warning,
  };
  return <Badge text={status} color={map[status] || C.primary} />;
}

function CountUp({ end, suffix = '' }) {
  const [val, setVal] = useState(0);
  useEffect(() => {
    let v = 0; const step = end / 60;
    const t = setInterval(() => {
      v += step;
      if (v >= end) { setVal(end); clearInterval(t); }
      else setVal(Math.floor(v));
    }, 16);
    return () => clearInterval(t);
  }, [end]);
  return <span style={{ animation: 'countUp 500ms ease' }}>{val.toLocaleString()}{suffix}</span>;
}

const INP = { width: '100%', padding: '10px 14px', background: C.surfaceHigh, border: `1px solid ${C.border}`, borderRadius: 10, color: C.text, fontSize: 14, outline: 'none', fontFamily: 'Pretendard' };
const LBL = { fontSize: 13, color: C.textSecondary, marginBottom: 6, display: 'block' };

      <div style={{ display: 'grid', gridTemplateColumns: 'repeat(3, 1fr)', gap: 20 }}>
        {list.map((m, i) => (
          <div key={m.id} onClick={() => onDrawerOpen(m)}

              <span style={{ fontSize: 52 }}>{m.emoji}</span>

              {m.ip !== '없음' && (
                <div style={{ position: 'absolute', bottom: 10, left: 10 }}>

              <div style={{ fontSize: 15, fontWeight: 700, marginBottom: 12, lineHeight: 1.45 }}>{m.title}</div>
              <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: 12 }}>

// ── Submission ──
function Submission({ onToast }) {
  const [missionSel, setMissionSel] = useState('');
  const [ipSel, setIpSel] = useState('없음');
  const [title, setTitle] = useState('');
  const [desc, setDesc] = useState('');
  const [file, setFile] = useState('');
  const [dragOver, setDragOver] = useState(false);
  const [uploading, setUploading] = useState(false);
  const [progress, setProgress] = useState(0);

  const MY = [
    { id: 1, mission: '여름 신제품 뷰티 챌린지', status: '심사중', date: '2026.05.01', ip: '아이즈원 IP' },
    { id: 2, mission: '신규 게임 홍보 영상', status: '선정', date: '2026.04.20', ip: '없음' },
    { id: 3, mission: 'IT 스타트업 바이럴 영상', status: '미선정', date: '2026.04.15', ip: '인플루언서 IP' },
  ];

  const submit = () => {
    if (!file) { onToast('영상 파일을 선택해주세요'); return; }
    if (!missionSel) { onToast('미션을 선택해주세요'); return; }
    if (!title) { onToast('시안 제목을 입력해주세요'); return; }
    setUploading(true); setProgress(0);
    const iv = setInterval(() => {
      setProgress(p => {
        if (p >= 100) {
          clearInterval(iv); setUploading(false);
          onToast('시안이 성공적으로 제출되었습니다!');
          setFile(''); setTitle(''); setDesc(''); setMissionSel('');
          return 100;
        }
        return Math.min(p + Math.random() * 14, 100);
      });
    }, 180);
  };

  return (
    <div style={{ animation: 'fadeIn 300ms ease', display: 'grid', gridTemplateColumns: '1fr 330px', gap: 24 }}>
      <div style={{ background: 'rgba(255,255,255,0.04)', backdropFilter: 'blur(20px)', borderRadius: 20, padding: 28, border: `1px solid ${C.border}` }}>
        <h3 style={{ fontSize: 18, fontWeight: 700, marginBottom: 24 }}>새 시안 제출</h3>
        <div style={{ marginBottom: 18 }}>
          <label style={LBL}>미션 선택 *</label>
          <select value={missionSel} onChange={e => setMissionSel(e.target.value)} style={INP}>
            <option value="">미션을 선택하세요</option>
            {MISSIONS.map(m => <option key={m.id} value={m.title}>{m.title}</option>)}
          </select>
        </div>
        <div style={{ marginBottom: 18 }}>
          <label style={LBL}>시안 제목 *</label>
          <input value={title} onChange={e => setTitle(e.target.value)} placeholder="시안의 핵심 컨셉" style={INP} />
        </div>
        <div style={{ marginBottom: 18 }}>
          <label style={LBL}>영상 업로드 * (MP4/MOV · 최대 500MB)</label>
          <div
            onDragOver={e => { e.preventDefault(); setDragOver(true); }}
            onDragLeave={() => setDragOver(false)}
            onDrop={e => { e.preventDefault(); setDragOver(false); const f = e.dataTransfer.files[0]; if (f) setFile(f.name); }}
            onClick={() => !file && setFile('summer_beauty_challenge_cut.mp4')}
            style={{
              border: `2px dashed ${dragOver ? C.primary : C.border}`, borderRadius: 16,
              padding: '32px 24px', textAlign: 'center', cursor: 'pointer',
              background: dragOver ? `${C.primary}12` : C.surfaceHigh,
              transition: 'all 200ms',
            }}
          >
            {file ? (
              <div>
                <div style={{ fontSize: 36, marginBottom: 8 }}>🎬</div>
                <div style={{ fontSize: 14, fontWeight: 600, color: C.primary }}>{file}</div>
                <div style={{ fontSize: 12, color: C.textSecondary, marginTop: 4 }}>업로드 준비 완료</div>
              </div>
            ) : (
              <div>
                <div style={{ fontSize: 44, marginBottom: 10 }}>📤</div>
                <div style={{ fontSize: 15, fontWeight: 600, marginBottom: 6 }}>영상 드래그 또는 클릭하여 선택</div>
                <div style={{ fontSize: 13, color: C.textSecondary }}>MP4, MOV · 최대 500MB</div>
              </div>
            )}
          </div>
        </div>
        {uploading && (
          <div style={{ marginBottom: 18 }}>
            <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: 8 }}>
              <span style={{ fontSize: 13, color: C.textSecondary }}>업로드 중...</span>

            </div>
            <div style={{ height: 8, background: C.surfaceHigh, borderRadius: 4, overflow: 'hidden' }}>
              <div style={{ height: '100%', background: `linear-gradient(90deg, ${C.primary}, ${C.accent})`, width: `${progress}%`, transition: 'width 180ms ease', borderRadius: 4 }} />
            </div>
          </div>
        )}
        <div style={{ marginBottom: 18 }}>
          <label style={LBL}>시안 설명</label>
          <textarea value={desc} onChange={e => setDesc(e.target.value)} placeholder="영상 기획 의도와 활용 IP를 설명해주세요" style={{ ...INP, height: 90, resize: 'vertical' }} />
        </div>
        <div style={{ marginBottom: 24 }}>
          <label style={LBL}>활용 IP 선택</label>

            <option value="없음">IP 없음</option>

          </select>
        </div>
        <button onClick={submit} disabled={uploading} style={{
          width: '100%', padding: '14px',
          background: uploading ? C.surfaceHigh : `linear-gradient(135deg, ${C.primary}, ${C.accent})`,
          color: '#fff', border: 'none', borderRadius: 12,
          fontSize: 16, fontWeight: 700, cursor: uploading ? 'not-allowed' : 'pointer',
          fontFamily: 'Pretendard', transition: 'all 200ms',
        }}>{uploading ? '업로드 중...' : '시안 제출하기'}</button>
      </div>

      <div style={{ background: 'rgba(255,255,255,0.04)', backdropFilter: 'blur(20px)', borderRadius: 20, padding: 24, border: `1px solid ${C.border}`, height: 'fit-content' }}>
        <h3 style={{ fontSize: 16, fontWeight: 700, marginBottom: 18 }}>내 제출 내역</h3>
        {MY.map((s, i) => {
          const sc = { '선정': C.success, '심사중': C.warning, '미선정': '#94A3B8' };
          return (
            <div key={s.id} style={{ padding: 16, borderRadius: 12, background: C.surfaceHigh, marginBottom: 12, animation: `slideUp 400ms ease ${i * 80}ms both` }}>
              <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: 8, gap: 8 }}>
                <div style={{ fontSize: 13, fontWeight: 600, flex: 1 }}>{s.mission}</div>
                <StatusBadge status={s.status} />
              </div>
              {s.ip !== '없음' && <div style={{ fontSize: 11, color: C.accent, marginBottom: 4 }}>IP: {s.ip}</div>}
              <div style={{ fontSize: 11, color: C.textSecondary }}>제출일: {s.date}</div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

// ── IP Showcase ──
function IPShowcase({ onModalOpen }) {
  const [type, setType] = useState('전체');
  const list = IPS.filter(ip => type === '전체' || ip.type === type);
  return (
    <div style={{ animation: 'fadeIn 300ms ease' }}>
      <div style={{ display: 'flex', gap: 8, marginBottom: 24, flexWrap: 'wrap' }}>
        {IP_TYPES.map(t => (
          <button key={t} onClick={() => setType(t)} style={{
            padding: '7px 16px', borderRadius: 999, border: 'none', cursor: 'pointer',
            background: type === t ? C.accent : C.surfaceHigh,
            color: type === t ? '#fff' : C.textSecondary,
            fontSize: 13, fontWeight: 600, fontFamily: 'Pretendard', transition: 'all 150ms',
          }}>{t}</button>
        ))}
      </div>
      <div style={{ display: 'grid', gridTemplateColumns: 'repeat(3, 1fr)', gap: 20 }}>
        {list.map((ip, i) => (
          <div key={ip.id} onClick={() => onModalOpen(ip)}
            style={{
              background: 'rgba(255,255,255,0.04)', backdropFilter: 'blur(20px)',
              borderRadius: 18, overflow: 'hidden', cursor: 'pointer',
              border: `1px solid ${C.border}`, transition: 'all 220ms ease',
              animation: `slideUp 400ms ease ${i * 80}ms both`,
              position: 'relative',
            }}
            onMouseEnter={e => { e.currentTarget.style.transform = 'scale(1.03)'; e.currentTarget.style.boxShadow = '0 14px 44px rgba(255,159,28,0.22)'; }}
            onMouseLeave={e => { e.currentTarget.style.transform = ''; e.currentTarget.style.boxShadow = ''; }}
          >
            {ip.badge && (
              <div style={{ position: 'absolute', top: 12, left: 12, zIndex: 1 }}>
                <Badge text={ip.badge} color={ip.badge === 'HOT' ? C.error : ip.badge === 'NEW' ? C.info : C.accent} />
              </div>
            )}
            <div style={{ height: 152, background: `linear-gradient(135deg, ${C.accent}35, ${C.primary}25, #1A1A2E)`, display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 60 }}>
              {ip.emoji}
            </div>
            <div style={{ padding: '16px 18px' }}>
              <div style={{ fontSize: 11, color: C.accent, fontWeight: 700, marginBottom: 6, letterSpacing: '0.06em', textTransform: 'uppercase' }}>{ip.type}</div>
              <div style={{ fontSize: 14, fontWeight: 700, marginBottom: 8, lineHeight: 1.45 }}>{ip.name}</div>
              <div style={{ fontSize: 12, color: C.textSecondary, marginBottom: 14 }}>{ip.usageCondition}</div>
              <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
                <div style={{ fontSize: 12, color: C.textSecondary }}>활용 {ip.usageCount}회</div>
                <div style={{ display: 'flex', gap: 8, alignItems: 'center' }}>
                  <StatusBadge status={ip.status} />
                  {ip.status === '활성' && (
                    <button onClick={e => e.stopPropagation()} style={{
                      padding: '5px 12px', borderRadius: 8, border: `1px solid ${C.accent}55`,
                      background: `${C.accent}18`, color: C.accent,
                      fontSize: 12, fontWeight: 700, cursor: 'pointer', fontFamily: 'Pretendard',
                    }}>활용하기</button>
                  )}
                </div>
              </div>
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}

// ── Payment Link ──
function PaymentLink({ onToast }) {
  const [pays, setPays] = useState(PAYMENTS);
  const [filter, setFilter] = useState('전체');
  const [showNew, setShowNew] = useState(false);
  const [selected, setSelected] = useState(null);
  const [newM, setNewM] = useState(''); const [newC, setNewC] = useState(''); const [newA, setNewA] = useState('');

  const list = pays.filter(p => filter === '전체' || p.status === filter);

  const issue = () => {
    if (!newM || !newC || !newA) { onToast('모든 항목을 입력해주세요'); return; }
    setPays([{ id: pays.length + 1, mission: newM, creator: newC, amount: newA, issued: '2026.05.09', expires: '2026.05.23', status: '발행', email: 'new@creator.kr' }, ...pays]);
    setShowNew(false); setNewM(''); setNewC(''); setNewA('');
    onToast('결제 링크가 발행되었습니다. 이메일로 전송됩니다.');
  };

  const steps = ['발행', '입금대기', '입금확인', '정산완료'];
  const stepIdx = { '발행': 0, '입금대기': 1, '완료': 3, '만료': 0 };

  return (
    <div style={{ animation: 'fadeIn 300ms ease' }}>
      <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: 24, gap: 12, flexWrap: 'wrap', alignItems: 'center' }}>
        <div style={{ display: 'flex', gap: 8, flexWrap: 'wrap' }}>
          {['전체', '발행', '입금대기', '완료', '만료'].map(s => (
            <button key={s} onClick={() => setFilter(s)} style={{
              padding: '7px 16px', borderRadius: 999, border: 'none', cursor: 'pointer',
              background: filter === s ? C.primary : C.surfaceHigh,
              color: filter === s ? '#fff' : C.textSecondary,
              fontSize: 13, fontWeight: 600, fontFamily: 'Pretendard', transition: 'all 150ms',
            }}>{s}</button>
          ))}
        </div>
        <button onClick={() => setShowNew(true)} style={{
          padding: '10px 20px', borderRadius: 12, border: 'none', cursor: 'pointer',
          background: `linear-gradient(135deg, ${C.primary}, ${C.accent})`,
          color: '#fff', fontSize: 14, fontWeight: 700, fontFamily: 'Pretendard',
        }}>+ 결제 링크 발행</button>
      </div>
      <div style={{ display: 'flex', flexDirection: 'column', gap: 12 }}>
        {list.map((p, i) => (
          <div key={p.id} onClick={() => setSelected(p)}
            style={{
              background: 'rgba(255,255,255,0.04)', backdropFilter: 'blur(20px)',
              borderRadius: 16, padding: '20px 24px', border: `1px solid ${C.border}`,
              cursor: 'pointer', transition: 'all 200ms',
              animation: `slideUp 400ms ease ${i * 60}ms both`,
              display: 'flex', justifyContent: 'space-between', alignItems: 'center',
            }}
            onMouseEnter={e => { e.currentTarget.style.borderColor = `${C.primary}45`; e.currentTarget.style.background = `rgba(255,77,46,0.06)`; }}
            onMouseLeave={e => { e.currentTarget.style.borderColor = C.border; e.currentTarget.style.background = 'rgba(255,255,255,0.04)'; }}
          >
            <div>
              <div style={{ fontSize: 15, fontWeight: 700, marginBottom: 5 }}>{p.mission}</div>
              <div style={{ fontSize: 13, color: C.textSecondary }}>크리에이터: {p.creator} · 발행: {p.issued} · 만료: {p.expires}</div>
            </div>
            <div style={{ display: 'flex', alignItems: 'center', gap: 16 }}>
              <div style={{ fontSize: 18, fontWeight: 800, color: C.primary }}>{p.amount}</div>
              <StatusBadge status={p.status} />
            </div>
          </div>
        ))}
      </div>

      {selected && (
        <Drawer title="결제 링크 상세" onClose={() => setSelected(null)} width={440}>
          <div style={{ background: C.surfaceHigh, borderRadius: 14, padding: 20, marginBottom: 20 }}>
            <div style={{ fontSize: 14, fontWeight: 700, marginBottom: 14 }}>{selected.mission}</div>
            <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 12 }}>
              {[['크리에이터', selected.creator], ['이메일', selected.email], ['금액', selected.amount], ['상태', selected.status], ['발행일', selected.issued], ['만료일', selected.expires]].map(([k, v]) => (
                <div key={k}>
                  <div style={{ fontSize: 11, color: C.textSecondary, marginBottom: 3 }}>{k}</div>
                  <div style={{ fontSize: 13, fontWeight: 600 }}>{v}</div>
                </div>
              ))}
            </div>
          </div>
          <div style={{ marginBottom: 20 }}>
            <div style={{ fontSize: 13, color: C.textSecondary, marginBottom: 12 }}>결제 진행 현황</div>
            <div style={{ display: 'flex' }}>
              {steps.map((step, i) => {
                const cur = stepIdx[selected.status] || 0;
                return (
                  <div key={step} style={{ flex: 1, textAlign: 'center' }}>
                    <div style={{ height: 4, background: i <= cur ? C.primary : C.surfaceHigh, marginBottom: 8, transition: 'all 300ms' }} />
                    <div style={{ fontSize: 11, color: i <= cur ? C.text : C.textSecondary }}>{step}</div>
                  </div>
                );
              })}
            </div>
          </div>
          <button onClick={() => { onToast('결제 링크가 이메일로 재발송되었습니다.'); setSelected(null); }}
            style={{ width: '100%', padding: '12px', borderRadius: 12, border: 'none', cursor: 'pointer', background: `linear-gradient(135deg, ${C.primary}, ${C.accent})`, color: '#fff', fontSize: 14, fontWeight: 700, fontFamily: 'Pretendard' }}>링크 재발송</button>
        </Drawer>
      )}

      {showNew && (
        <Modal title="새 결제 링크 발행" onClose={() => setShowNew(false)}>
          <div>
            <div style={{ marginBottom: 16 }}>
              <label style={LBL}>미션</label>
              <select value={newM} onChange={e => setNewM(e.target.value)} style={INP}>
                <option value="">선택</option>
                {MISSIONS.map(m => <option key={m.id} value={m.title}>{m.title}</option>)}
              </select>
            </div>
            <div style={{ marginBottom: 16 }}>
              <label style={LBL}>크리에이터명</label>
              <input value={newC} onChange={e => setNewC(e.target.value)} placeholder="크리에이터 이름" style={INP} />
            </div>
            <div style={{ marginBottom: 24 }}>
              <label style={LBL}>결제 금액</label>
              <input value={newA} onChange={e => setNewA(e.target.value)} placeholder="예: 500,000원" style={INP} />
            </div>
            <button onClick={issue} style={{ width: '100%', padding: '14px', borderRadius: 12, border: 'none', cursor: 'pointer', background: `linear-gradient(135deg, ${C.primary}, ${C.accent})`, color: '#fff', fontSize: 15, fontWeight: 700, fontFamily: 'Pretendard' }}>발행 및 이메일 발송</button>
          </div>
        </Modal>
      )}
    </div>
  );
}

// ── App ──

      <div style={{ background: C.bg, minHeight: '100vh', display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
        <div style={{ textAlign: 'center' }}>

            <div key={i} style={{ height: 80, background: 'linear-gradient(90deg, #1A1A2E 25%, #252540 50%, #1A1A2E 75%)', backgroundSize: '200% 100%', animation: 'shimmer 1.5s infinite', borderRadius: 16, marginBottom: 16, width: 400 }} />

  return (

        position: 'sticky', top: 0, zIndex: 100,
        background: 'rgba(15,15,26,0.88)', backdropFilter: 'blur(24px)',

          <span style={{ fontSize: 16, fontWeight: 800, background: `linear-gradient(135deg, ${C.primary}, ${C.accent})`, WebkitBackgroundClip: 'text', WebkitTextFillColor: 'transparent' }}>OYE.ai</span>
        </div>
        {TABS.map(t => (
          <button key={t} onClick={() => setTab(t)} style={{

            background: tab === t ? `${C.primary}1A` : 'transparent',

        </div>
        <div style={{ display: 'flex', gap: 36 }}>
          {meta.kpis.map((k, i) => (

          ))}
        </div>
      </div>

      {/* Main */}
      <main style={{ flex: 1, padding: '28px 32px', maxWidth: 1280, width: '100%', alignSelf: 'center' }}>

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
