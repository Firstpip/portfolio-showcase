<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" rel="stylesheet"/>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://unpkg.com/prop-types@15/prop-types.min.js"></script>
<script src="https://unpkg.com/recharts@2.12.7/umd/Recharts.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Pretendard',sans-serif;background:#F0F4F8;color:#0D1B2A;min-height:100vh}

@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes fadeInScale{from{opacity:0;transform:scale(.93)}to{opacity:1;transform:scale(1)}}
@keyframes slideInRight{from{transform:translateX(100%);opacity:0}to{transform:translateX(0);opacity:1}}
@keyframes slideUp{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}
@keyframes ripple{0%{transform:scale(0);opacity:.5}100%{transform:scale(3);opacity:0}}
@keyframes countUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.45}}
@keyframes barGrow{from{transform:scaleY(0);transform-origin:bottom}to{transform:scaleY(1);transform-origin:bottom}}
@keyframes slideDown{from{opacity:0;transform:translateY(-12px)}to{opacity:1;transform:translateY(0)}}

::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:#F0F4F8}
::-webkit-scrollbar-thumb{background:#CBD5E1;border-radius:3px}
</style>

<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useRef,useCallback}=React;
const {AreaChart,Area,PieChart,Pie,Cell,XAxis,YAxis,CartesianGrid,Tooltip,ResponsiveContainer,Legend}=Recharts;

// ── Design tokens ──────────────────────────────────────────────────────────
const C={

  secondary:'#1A936F',
  accent:'#F4A261',
  bg:'#F0F4F8',surface:'#FFFFFF',
  text:'#0D1B2A',textSub:'#64748B',
  border:'#E2E8F0',
  danger:'#DC2626',warn:'#D97706',

// ── Style helpers ──────────────────────────────────────────────────────────
const S={
  card:{background:C.surface,borderRadius:12,boxShadow:'0 1px 4px rgba(0,0,0,.07)',padding:24},
  cardSm:{background:C.surface,borderRadius:10,boxShadow:'0 1px 3px rgba(0,0,0,.06)',padding:18},
  h2:{fontSize:22,fontWeight:700,color:C.text,marginBottom:4},
  h3:{fontSize:16,fontWeight:700,color:C.text},
  sub:{fontSize:13,color:C.textSub,marginTop:2},
  label:{fontSize:11,fontWeight:600,color:C.textSub,textTransform:'uppercase',letterSpacing:.6,display:'block',marginBottom:6},
  row:{display:'flex',alignItems:'center',gap:12},
  rowBetween:{display:'flex',alignItems:'center',justifyContent:'space-between'},
  grid2:{display:'grid',gridTemplateColumns:'repeat(2,1fr)',gap:20},
  grid3:{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:16},
  grid4:{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:16},
  table:{width:'100%',borderCollapse:'collapse'},
  th:{padding:'10px 14px',textAlign:'left',fontSize:11,fontWeight:700,color:C.textSub,borderBottom:`1px solid ${C.border}`,textTransform:'uppercase',letterSpacing:.4},
  td:{padding:'13px 14px',borderBottom:`1px solid ${C.border}`,fontSize:13,color:C.text,verticalAlign:'middle'},
  overlay:{position:'fixed',inset:0,background:'rgba(0,0,0,.45)',display:'flex',alignItems:'center',justifyContent:'center',zIndex:200},
  modal:{background:C.surface,borderRadius:16,padding:32,width:480,maxHeight:'82vh',overflowY:'auto',animation:'fadeInScale 180ms ease'},
  toast:{position:'fixed',bottom:28,right:28,background:C.text,color:'#fff',padding:'12px 20px',borderRadius:10,fontSize:14,fontWeight:500,zIndex:300,animation:'slideUp 220ms ease'},
  skeleton:{background:'linear-gradient(90deg,#e9edf2 25%,#f3f6fa 50%,#e9edf2 75%)',backgroundSize:'200% 100%',animation:'shimmer 1.5s infinite',borderRadius:6},

const btn=(bg,color='#fff',extra={})=>({display:'inline-flex',alignItems:'center',gap:6,padding:'8px 18px',borderRadius:8,border:'none',background:bg,color,fontFamily:'Pretendard',fontWeight:600,fontSize:13,cursor:'pointer',transition:'all .15s',...extra});
const btnSm=(bg,color='#fff')=>({display:'inline-flex',alignItems:'center',padding:'5px 12px',borderRadius:6,border:'none',background:bg,color,fontFamily:'Pretendard',fontWeight:600,fontSize:12,cursor:'pointer',transition:'all .15s'});
const badge=(c,bg)=>({display:'inline-flex',alignItems:'center',padding:'3px 10px',borderRadius:20,fontSize:11,fontWeight:700,color:c,background:bg});
const chip=(active)=>({padding:'5px 14px',borderRadius:20,border:`1px solid ${active?C.primary:C.border}`,background:active?C.primary:'#fff',color:active?'#fff':C.textSub,fontSize:13,fontWeight:500,cursor:'pointer',fontFamily:'Pretendard',transition:'all .15s'});

// ── Micro components ───────────────────────────────────────────────────────
function Skeleton({w='100%',h=16,r=6,style={}}){
  return <div style={{...S.skeleton,width:w,height:h,borderRadius:r,...style}}/>;
}

function CountUp({target,suffix='',prefix='',duration=1400}){
  const [val,setVal]=useState(0);
  useEffect(()=>{
    let st=null;
    const step=ts=>{
      if(!st)st=ts;
      const p=Math.min((ts-st)/duration,1);
      setVal(Math.round(p*target));
      if(p<1)requestAnimationFrame(step);
    };
    requestAnimationFrame(step);
  },[target,duration]);
  return <span style={{animation:'countUp 350ms ease'}}>{prefix}{val.toLocaleString()}{suffix}</span>;
}

function useToast(){
  const [msg,setMsg]=useState(null);
  const show=useCallback(m=>{setMsg(m);setTimeout(()=>setMsg(null),3000);},[]);
  return {msg,show};
}

      <div style={{display:'flex',alignItems:'center',gap:10}}>
        <span style={{width:8,height:8,borderRadius:'50%',background:'#4ADE80',display:'inline-block',animation:'pulse 2s infinite'}}/>

      </div>

  );
}

const ABUSES=[
  {id:'AB001',type:'다중계정 감지',user:'anonymous_92',ip:'211.47.xxx.xxx',count:5,time:'12분 전',risk:'높음'},
  {id:'AB002',type:'Rate Limit 초과',user:'creator_bot44',ip:'58.230.xxx.xxx',count:142,time:'28분 전',risk:'높음'},
  {id:'AB003',type:'이상 제출 패턴',user:'user_4892',ip:'172.16.xxx.xxx',count:31,time:'1시간 전',risk:'중간'},
  {id:'AB004',type:'사기성 결제 시도',user:'fake_adv9',ip:'203.10.xxx.xxx',count:3,time:'2시간 전',risk:'높음'},
  {id:'AB005',type:'스팸 시안 제출',user:'spam_creator',ip:'61.82.xxx.xxx',count:18,time:'3시간 전',risk:'낮음'},
];
const SENTRY=[
  {id:'EVT-1923',title:'Supabase RLS PolicyViolation',level:'error',count:14,first:'2시간 전',file:'lib/supabase/rls.ts'},
  {id:'EVT-1921',title:'VideoUpload: File size exceeded 200MB',level:'warning',count:3,first:'4시간 전',file:'api/submissions/upload.ts'},
  {id:'EVT-1908',title:'Resend: Email delivery timeout',level:'warning',count:7,first:'1일 전',file:'lib/resend/notify.ts'},
  {id:'EVT-1901',title:'Next.js: Hydration mismatch on MissionCard',level:'info',count:2,first:'2일 전',file:'components/MissionCard.tsx'},
];

function MonitoringPage(){
  const [resolved,setResolved]=useState([]);
  const {msg,show}=useToast();
  const riskC={'높음':[C.danger,'#FEE2E2'],'중간':[C.warn,'#FEF3C7'],'낮음':[C.secondary,'#DCFCE7']};
  const lvlC={'error':[C.danger,'#FEE2E2'],'warning':[C.warn,'#FEF3C7'],'info':[C.primary,'#DBEAFE']};
  const resolve=(id)=>{setResolved(p=>[...p,id]);show('검토 완료 처리되었습니다');};
  const pending=ABUSES.filter(a=>!resolved.includes(a.id)).length;
  return (
    <div style={{animation:'fadeIn 300ms ease'}}>
      <div style={{marginBottom:24}}>
        <h1 style={S.h2}>어뷰징 모니터링 & Sentry 에러 추적</h1>
        <p style={S.sub}>RLS · Rate Limiting · 다중계정 감지 · Sentry 실시간 에러</p>
      </div>

      {/* KPI mini */}
      <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:14,marginBottom:24}}>
        {[
          {l:'탐지된 이상 행동',v:ABUSES.length+'건',c:C.danger},
          {l:'미처리 항목',v:pending+'건',c:C.warn},
          {l:'Sentry 활성 에러',v:SENTRY.filter(e=>e.level==='error').length+'건',c:C.danger},
          {l:'Rate Limit 발동',v:`${ABUSES.filter(a=>a.type.includes('Rate')).reduce((s,a)=>s+a.count,0)}회`,c:C.primary},
        ].map((k,i)=>(
          <div key={i} style={{...S.cardSm,borderLeft:`3px solid ${k.c}`,animation:`slideUp 300ms ease ${i*60}ms both`}}>
            <span style={S.label}>{k.l}</span>
            <div style={{fontSize:22,fontWeight:800,color:k.c}}>{k.v}</div>
          </div>
        ))}
      </div>

      {/* Abuse list */}
      <div style={{...S.card,marginBottom:20}}>
        <div style={{...S.rowBetween,marginBottom:16}}>
          <div style={S.h3}>어뷰징 의심 행동 목록</div>
          <span style={badge(C.danger,'#FEE2E2')}>{pending}건 미처리</span>
        </div>
        <table style={S.table}>
          <thead><tr>
            {['ID','유형','계정','IP주소','발생수','위험도','시간','처리'].map(h=><th key={h} style={S.th}>{h}</th>)}
          </tr></thead>
          <tbody>
            {ABUSES.map((a,i)=>{
              const done=resolved.includes(a.id);
              const [rc,rb]=riskC[a.risk]||[C.textSub,'#F1F5F9'];
              return (
                <tr key={a.id} style={{opacity:done?.4:1,transition:'opacity .3s',animation:`slideDown 250ms ease ${i*45}ms both`}}>
                  <td style={S.td}><code style={{fontSize:11,background:'#F1F5F9',padding:'2px 6px',borderRadius:4,color:C.textSub}}>{a.id}</code></td>
                  <td style={S.td}><span style={{fontWeight:600,fontSize:13}}>{a.type}</span></td>
                  <td style={S.td}><code style={{fontSize:12,background:'#F1F5F9',padding:'2px 7px',borderRadius:4}}>{a.user}</code></td>
                  <td style={S.td}><code style={{fontSize:12,background:'#F1F5F9',padding:'2px 7px',borderRadius:4}}>{a.ip}</code></td>
                  <td style={S.td}>{a.count}회</td>
                  <td style={S.td}><span style={badge(rc,rb)}>{a.risk}</span></td>
                  <td style={S.td}><span style={{fontSize:12,color:C.textSub}}>{a.time}</span></td>
                  <td style={S.td}>
                    <button style={{...btnSm(done?'#E2E8F0':C.secondary,done?C.textSub:'#fff'),cursor:done?'default':'pointer'}} disabled={done}
                      onClick={()=>resolve(a.id)}>{done?'완료':'검토 완료'}</button>
                  </td>
                </tr>
              );
            })}
          </tbody>
        </table>
      </div>

      {/* Sentry errors */}
      <div style={S.card}>
        <div style={{...S.rowBetween,marginBottom:16}}>
          <div style={S.h3}>Sentry 에러 추적</div>
          <div style={{display:'flex',alignItems:'center',gap:8}}>
            <span style={{width:7,height:7,borderRadius:'50%',background:C.secondary,display:'inline-block',animation:'pulse 2s infinite'}}/>
            <span style={{fontSize:12,color:C.textSub}}>실시간 연동 중</span>
          </div>
        </div>
        {SENTRY.map((e,i)=>{
          const [lc,lb]=lvlC[e.level]||[C.textSub,'#F1F5F9'];
          return (
            <div key={e.id} style={{padding:'14px 0',borderBottom:i<SENTRY.length-1?`1px solid ${C.border}`:'none',animation:`slideDown 250ms ease ${i*55}ms both`}}>
              <div style={{...S.rowBetween,marginBottom:8}}>
                <div style={{display:'flex',alignItems:'center',gap:10}}>
                  <span style={badge(lc,lb)}>{e.level}</span>
                  <span style={{fontWeight:600,fontSize:13,color:C.text}}>{e.title}</span>
                </div>
                <span style={{fontSize:12,color:C.textSub}}>{e.count}회 발생</span>
              </div>
              <div style={{display:'flex',alignItems:'center',gap:14}}>
                <code style={{fontSize:11,background:'#F1F5F9',padding:'3px 9px',borderRadius:5,color:C.textSub}}>{e.file}</code>
                <span style={{fontSize:11,color:C.textSub}}>최초: {e.first}</span>
                <span style={{fontSize:11,color:C.textSub}}>ID: {e.id}</span>
              </div>
            </div>
          );
        })}
      </div>
      {msg&&<div style={S.toast}>{msg}</div>}
    </div>
  );
}
