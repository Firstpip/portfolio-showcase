function Toast({ message, type = 'success', onClose }) {
  useEffect(() => { const t = setTimeout(onClose, 3000); return () => clearTimeout(t); }, []);
  const bg = type === 'success' ? C.accent : type === 'danger' ? C.danger : C.warning;
  return (
    <div style={{
      position: 'fixed', bottom: 28, right: 28, zIndex: 9999,
      background: C.surface, color: C.text, padding: '14px 22px',
      borderRadius: 12, animation: 'slideUp 300ms ease',
      boxShadow: '0 8px 32px rgba(0,0,0,0.12)',
      border: `1px solid ${C.border}`,
      display: 'flex', alignItems: 'center', gap: 10,
    }}>
      <span style={{ color: bg, fontSize: 16 }}>{type === 'success' ? '✓' : '!'}</span>
      <span style={{ fontSize: 14 }}>{message}</span>
    </div>
  );
}

function StatusBadge({ status }) {
  const map = {
    '심사대기': [C.warning, C.warningLight], '승인': [C.accent, C.accentLight], '반려': [C.danger, C.dangerLight],
    '활성': [C.accent, C.accentLight], '경고': [C.warning, C.warningLight], '차단': [C.danger, C.dangerLight],
    '발행': [C.primary, C.primaryLight], '입금대기': [C.warning, C.warningLight], '정산완료': [C.accent, C.accentLight], '만료': [C.textSecondary, C.surfaceHigh],
    '진행중': [C.accent, C.accentLight], '완료': [C.textSecondary, C.surfaceHigh],
  };
  const [color, bg] = map[status] || [C.textSecondary, C.surfaceHigh];
  return <Badge text={status} color={color} bg={bg} />;
}

function CountUp({ end, suffix = '' }) {
  const [val, setVal] = useState(0);
  useEffect(() => {
    let v = 0; const step = end / 60;
    const t = setInterval(() => {
      v += step;
      if (v >= end) { setVal(end); clearInterval(t); }
      else setVal(Math.floor(v));
    }, 16);
    return () => clearInterval(t);
  }, [end]);
  return <span style={{ animation: 'countUp 400ms ease' }}>{val.toLocaleString()}{suffix}</span>;
}

    setSelected(null); onToast('미션이 승인되었습니다. 광고주에게 알림이 발송됩니다.');
  };

  const reject = (id) => {
    if (!rejectReason) { onToast('반려 사유를 입력해주세요'); return; }
    setMissions(ms => ms.map(m => m.id === id ? { ...m, status: '반려' } : m));
    setShowReject(null); setRejectReason(''); setSelected(null);
    onToast('미션이 반려 처리되었습니다.');
  };

  return (
    <div style={{ animation: 'fadeIn 300ms ease' }}>
      <div style={{ display: 'flex', gap: 8, marginBottom: 24 }}>
        {['전체', '심사대기', '승인', '반려'].map(s => (
          <button key={s} onClick={() => setFilter(s)} style={{
            padding: '7px 18px', borderRadius: 8, cursor: 'pointer',
            border: `1px solid ${filter === s ? C.primary : C.border}`,
            background: filter === s ? C.primaryLight : C.surface,
            color: filter === s ? C.primary : C.textSecondary,
            fontSize: 13, fontWeight: 600, fontFamily: 'Pretendard', transition: 'all 150ms',
          }}>{s}{s === '심사대기' && ` (${missions.filter(m => m.status === '심사대기').length})`}</button>
        ))}
      </div>

      <div style={{ display: 'grid', gridTemplateColumns: 'repeat(2, 1fr)', gap: 16 }}>
        {list.map((m, i) => (
          <div key={m.id} onClick={() => setSelected(m)}
            style={{
              background: C.surface, borderRadius: 14, overflow: 'hidden',
              border: `1px solid ${selected?.id === m.id ? C.primary : C.border}`,
              cursor: 'pointer', transition: 'all 200ms',
              animation: `slideUp 400ms ease ${i * 80}ms both`,
            }}
            onMouseEnter={e => { e.currentTarget.style.boxShadow = '0 4px 16px rgba(0,0,0,0.08)'; }}
            onMouseLeave={e => { e.currentTarget.style.boxShadow = ''; }}
          >
            <div style={{ display: 'flex', gap: 0 }}>
              <div style={{ width: 80, flexShrink: 0, background: C.surfaceHigh, display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 36 }}>{m.emoji}</div>
              <div style={{ padding: '16px 18px', flex: 1 }}>
                <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: 8 }}>
                  <div style={{ fontSize: 14, fontWeight: 700 }}>{m.title}</div>
                  <StatusBadge status={m.status} />
                </div>
                <div style={{ fontSize: 12, color: C.textSecondary, marginBottom: 10 }}>
                  {m.advertiser} · {m.category} · {m.budget} · 마감 {m.deadline}
                </div>
                {m.ip !== '없음' && (
                  <div style={{ display: 'inline-block', fontSize: 11, fontWeight: 700, color: C.primary, background: C.primaryLight, padding: '2px 8px', borderRadius: 999, marginBottom: 8 }}>✨ IP: {m.ip}</div>
                )}
                {m.status === '심사대기' && (
                  <div style={{ display: 'flex', gap: 8, marginTop: 6 }}>
                    <button onClick={e => { e.stopPropagation(); approve(m.id); }}
                      style={{ padding: '6px 14px', borderRadius: 7, border: 'none', background: C.accent, color: '#fff', fontSize: 12, fontWeight: 700, cursor: 'pointer', fontFamily: 'Pretendard' }}>승인</button>
                    <button onClick={e => { e.stopPropagation(); setShowReject(m.id); }}
                      style={{ padding: '6px 14px', borderRadius: 7, border: `1px solid ${C.danger}`, background: C.dangerLight, color: C.danger, fontSize: 12, fontWeight: 700, cursor: 'pointer', fontFamily: 'Pretendard' }}>반려</button>
                  </div>
                )}
              </div>
            </div>
          </div>
        ))}
      </div>

      {/* Mission detail */}
      {selected && (
        <Modal title="미션 상세" onClose={() => setSelected(null)}>
          <div>
            <div style={{ height: 130, background: C.surfaceHigh, borderRadius: 10, display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 64, marginBottom: 20 }}>{selected.emoji}</div>
            <div style={{ marginBottom: 12 }}><StatusBadge status={selected.status} /></div>
            <h3 style={{ fontSize: 17, fontWeight: 700, margin: '10px 0 16px' }}>{selected.title}</h3>
            <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 10, marginBottom: 20 }}>
              {[['광고주', selected.advertiser], ['카테고리', selected.category], ['예산', selected.budget], ['마감일', selected.deadline], ['시안 제출', `${selected.submissions}개`], ['IP 사용', selected.ip]].map(([k, v]) => (
                <div key={k} style={{ background: C.surfaceHigh, borderRadius: 8, padding: '10px 14px' }}>
                  <div style={{ fontSize: 11, color: C.textSecondary, marginBottom: 3 }}>{k}</div>
                  <div style={{ fontSize: 13, fontWeight: 600 }}>{v}</div>
                </div>
              ))}
            </div>
            {selected.status === '심사대기' && (
              <div style={{ display: 'flex', gap: 10 }}>
                <button onClick={() => approve(selected.id)}
                  style={{ flex: 1, padding: '12px', borderRadius: 10, border: 'none', background: C.accent, color: '#fff', fontSize: 14, fontWeight: 700, cursor: 'pointer', fontFamily: 'Pretendard' }}>✓ 승인</button>
                <button onClick={() => { setShowReject(selected.id); }}
                  style={{ flex: 1, padding: '12px', borderRadius: 10, border: `1px solid ${C.danger}`, background: C.dangerLight, color: C.danger, fontSize: 14, fontWeight: 700, cursor: 'pointer', fontFamily: 'Pretendard' }}>✕ 반려</button>
              </div>
            )}
          </div>
        </Modal>
      )}

      {/* Reject reason modal */}
      {showReject && (
        <Modal title="반려 사유 입력" onClose={() => { setShowReject(null); setRejectReason(''); }} width={440}>
          <div>
            <div style={{ marginBottom: 20 }}>
              <label style={LBL}>반려 사유 *</label>
              <textarea value={rejectReason} onChange={e => setRejectReason(e.target.value)}
                placeholder="광고주에게 전달될 반려 사유를 입력해주세요" rows={4}
                style={{ ...INP, resize: 'vertical' }} />
            </div>
            <button onClick={() => reject(showReject)}
              style={{ width: '100%', padding: '13px', borderRadius: 10, border: 'none', background: C.danger, color: '#fff', fontSize: 14, fontWeight: 700, cursor: 'pointer', fontFamily: 'Pretendard' }}>반려 처리</button>
          </div>
        </Modal>
      )}
    </div>
  );
}

// ── Members Page ──

                  <div style={{ fontSize: 13, fontWeight: 600 }}>{v}</div>
                </div>
              ))}
            </div>
            <button onClick={() => toggleIpStatus(selectedIp.id)} style={{
              width: '100%', padding: '12px', borderRadius: 10, cursor: 'pointer',
              border: selectedIp.status === '활성' ? `1px solid ${C.danger}` : `1px solid ${C.accent}`,
              background: selectedIp.status === '활성' ? C.dangerLight : C.accentLight,
              color: selectedIp.status === '활성' ? C.danger : C.accent,
              fontSize: 14, fontWeight: 700, fontFamily: 'Pretendard',
            }}>{selectedIp.status === '활성' ? 'IP 비활성화' : 'IP 활성화'}</button>
          </div>
        </Modal>
      )}

      {showConfirm && (
        <Modal title="계정 상태 변경" onClose={() => setShowConfirm(null)} width={420}>
          <div style={{ textAlign: 'center', padding: '12px 0' }}>
            <div style={{ fontSize: 52, marginBottom: 16 }}>⚠️</div>
            <p style={{ fontSize: 16, fontWeight: 600, marginBottom: 8 }}>정말 변경하시겠습니까?</p>
            <p style={{ fontSize: 14, color: C.textSecondary, marginBottom: 24 }}>이 작업은 즉시 적용되며 회원에게 알림이 발송됩니다.</p>
            <div style={{ display: 'flex', gap: 10 }}>
              <button onClick={() => setShowConfirm(null)} style={{ flex: 1, padding: '12px', borderRadius: 10, border: `1px solid ${C.border}`, background: C.surfaceHigh, fontSize: 14, fontWeight: 700, cursor: 'pointer', fontFamily: 'Pretendard' }}>취소</button>
              <button onClick={() => toggleBlock(showConfirm)} style={{ flex: 1, padding: '12px', borderRadius: 10, border: 'none', background: C.danger, color: '#fff', fontSize: 14, fontWeight: 700, cursor: 'pointer', fontFamily: 'Pretendard' }}>확인</button>
            </div>
          </div>
        </Modal>
      )}
    </div>
  );
}

// ── Settlement Page ──
function SettlementPage({ onToast }) {
  const [pays, setPays] = useState(PAYMENTS);
  const [filter, setFilter] = useState('전체');
  const [selected, setSelected] = useState(null);

  const list = pays.filter(p => filter === '전체' || p.status === filter);

  const confirm = (id) => {
    setPays(ps => ps.map(p => p.id === id ? { ...p, status: '정산완료' } : p));
    setSelected(null); onToast('입금이 확인되었습니다. 크리에이터에게 정산 이메일이 발송됩니다.');
  };

  const steps = ['발행', '입금대기', '입금확인', '정산완료'];
  const stepIdx = { '발행': 0, '입금대기': 1, '입금확인': 2, '정산완료': 3, '만료': -1 };

  const csvExport = () => { onToast('CSV 파일이 다운로드 중입니다.'); };

  return (
    <div style={{ animation: 'fadeIn 300ms ease' }}>
      <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: 24, gap: 12, flexWrap: 'wrap', alignItems: 'center' }}>
        <div style={{ display: 'flex', gap: 8, flexWrap: 'wrap' }}>
          {['전체', '발행', '입금대기', '정산완료', '만료'].map(s => (
            <button key={s} onClick={() => setFilter(s)} style={{
              padding: '7px 16px', borderRadius: 8, cursor: 'pointer',
              border: `1px solid ${filter === s ? C.primary : C.border}`,
              background: filter === s ? C.primaryLight : C.surface,
              color: filter === s ? C.primary : C.textSecondary,
              fontSize: 13, fontWeight: 600, fontFamily: 'Pretendard', transition: 'all 150ms',
            }}>{s}</button>
          ))}
        </div>
        <button onClick={csvExport} style={{
          padding: '9px 18px', borderRadius: 8, cursor: 'pointer',
          border: `1px solid ${C.border}`, background: C.surface,
          color: C.text, fontSize: 13, fontWeight: 600, fontFamily: 'Pretendard',
          display: 'flex', alignItems: 'center', gap: 6,
        }}>📥 CSV 내보내기</button>
      </div>

      <div style={{ display: 'flex', flexDirection: 'column', gap: 12 }}>
        {list.map((p, i) => (
          <div key={p.id} onClick={() => setSelected(p)}
            style={{
              background: C.surface, borderRadius: 14, padding: '18px 22px',
              border: `1px solid ${selected?.id === p.id ? C.primary : C.border}`,
              cursor: 'pointer', transition: 'all 200ms',
              animation: `slideUp 400ms ease ${i * 60}ms both`,
              display: 'flex', justifyContent: 'space-between', alignItems: 'center',
            }}
            onMouseEnter={e => { e.currentTarget.style.boxShadow = '0 4px 16px rgba(0,0,0,0.06)'; }}
            onMouseLeave={e => { e.currentTarget.style.boxShadow = ''; }}
          >
            <div>
              <div style={{ fontSize: 15, fontWeight: 700, marginBottom: 5 }}>{p.mission}</div>
              <div style={{ fontSize: 13, color: C.textSecondary }}>크리에이터: {p.creator} · {p.email}</div>
              <div style={{ fontSize: 12, color: C.textMuted, marginTop: 3 }}>발행: {p.issued} · 만료: {p.expires}</div>
            </div>
            <div style={{ display: 'flex', alignItems: 'center', gap: 16 }}>
              <div style={{ textAlign: 'right' }}>
                <div style={{ fontSize: 18, fontWeight: 800, color: C.primary }}>{p.amount}</div>
              </div>
              <StatusBadge status={p.status} />
              {p.status === '입금대기' && (
                <button onClick={e => { e.stopPropagation(); confirm(p.id); }}
                  style={{ padding: '8px 16px', borderRadius: 8, border: 'none', background: C.accent, color: '#fff', fontSize: 13, fontWeight: 700, cursor: 'pointer', fontFamily: 'Pretendard', whiteSpace: 'nowrap' }}>입금 확인</button>
              )}
            </div>
          </div>
        ))}
      </div>

      {selected && (
        <Modal title="결제 링크 상세" onClose={() => setSelected(null)}>
          <div>
            <div style={{ background: C.surfaceHigh, borderRadius: 12, padding: 20, marginBottom: 20 }}>
              <div style={{ fontSize: 15, fontWeight: 700, marginBottom: 14 }}>{selected.mission}</div>
              <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 12 }}>
                {[['크리에이터', selected.creator], ['이메일', selected.email], ['금액', selected.amount], ['상태', selected.status], ['발행일', selected.issued], ['만료일', selected.expires]].map(([k, v]) => (
                  <div key={k}>
                    <div style={{ fontSize: 11, color: C.textSecondary, marginBottom: 3 }}>{k}</div>
                    <div style={{ fontSize: 13, fontWeight: 600 }}>{v}</div>
                  </div>
                ))}
              </div>
            </div>

            {/* Status stepper */}
            {selected.status !== '만료' && (
              <div style={{ marginBottom: 20 }}>
                <div style={{ fontSize: 13, color: C.textSecondary, marginBottom: 12 }}>결제 진행 현황</div>
                <div style={{ display: 'flex' }}>
                  {steps.map((step, i) => {
                    const cur = stepIdx[selected.status] ?? 0;
                    return (
                      <div key={step} style={{ flex: 1, textAlign: 'center' }}>
                        <div style={{ height: 4, background: i <= cur ? C.primary : C.border, marginBottom: 8, transition: 'all 300ms', borderRadius: 2 }} />
                        <div style={{ fontSize: 11, color: i <= cur ? C.text : C.textSecondary, fontWeight: i === cur ? 700 : 400 }}>{step}</div>
                      </div>
                    );
                  })}
                </div>
              </div>
            )}

            {selected.status === '입금대기' && (
              <button onClick={() => confirm(selected.id)}
                style={{ width: '100%', padding: '13px', borderRadius: 10, border: 'none', background: C.accent, color: '#fff', fontSize: 14, fontWeight: 700, cursor: 'pointer', fontFamily: 'Pretendard' }}>✓ 입금 확인 처리</button>
            )}
          </div>
        </Modal>
      )}
    </div>
  );
}

// ── App ──

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
