function CountUp({ end, duration = 1200, suffix = '' }) {
  const [val, setVal] = useState(0);
  useEffect(() => {
    let start = 0; const step = end / (duration / 16);
    const timer = setInterval(() => {
      start += step;
      if (start >= end) { setVal(end); clearInterval(timer); }
      else setVal(Math.floor(start));
    }, 16);
    return () => clearInterval(timer);
  }, [end]);
  return <span style={{ animation: 'countUp 400ms ease' }}>{val.toLocaleString()}{suffix}</span>;
}

function Toast({ message, type = 'success', onClose }) {
  useEffect(() => { const t = setTimeout(onClose, 3000); return () => clearTimeout(t); }, []);
  const bg = type === 'success' ? C.success : type === 'error' ? C.danger : C.primary;
  return (
    <div style={{ position: 'fixed', bottom: 24, right: 24, zIndex: 9999, background: bg, color: '#fff', padding: '12px 20px', borderRadius: 10, animation: 'slideUp 300ms ease', boxShadow: '0 8px 24px rgba(0,0,0,0.3)', fontSize: 14, fontWeight: 600, display: 'flex', alignItems: 'center', gap: 8 }}>
      {type === 'success' ? '✓' : type === 'error' ? '✕' : 'ℹ'} {message}
    </div>
  );
}

  const [progress, setProgress] = useState(0);
  const [jobStatus, setJobStatus] = useState('idle');
  const [previewModal, setPreviewModal] = useState(false);

  const startRender = () => {
    setRendering(true); setProgress(0); setJobStatus('queued');
    setTimeout(() => setJobStatus('processing'), 800);
    let p = 0;
    const t = setInterval(() => {
      p += Math.random() * 3 + 1;
      if (p >= 100) { p = 100; clearInterval(t); setJobStatus('completed'); setRendering(false); }
      setProgress(Math.min(p, 100));
    }, 600);
  };

  const VOICES = [
    { id: 'natural-female', label: '자연스러운 여성', lang: 'ko-KR', sample: '안녕하세요, 오늘은...' },
    { id: 'warm-male', label: '따뜻한 남성', lang: 'ko-KR', sample: '반갑습니다, 지금...' },
    { id: 'professional', label: '전문 MC', lang: 'ko-KR', sample: '여러분, 안녕하세요...' },
    { id: 'bright-female', label: '밝은 여성', lang: 'ko-KR', sample: '오늘 소개할...' },
  ];

  const statusColors = { idle: C.textMuted, queued: C.warning, processing: C.accent, completed: C.success, failed: C.danger };
  const statusLabels = { idle: '대기 중', queued: '큐 등록됨', processing: '렌더링 중', completed: '완료', failed: '실패' };

  return (
    <div style={{ display: 'grid', gridTemplateColumns: '1fr 380px', gap: 24 }}>
      <div style={{ display: 'flex', flexDirection: 'column', gap: 20 }}>

          <h3 style={{ fontSize: 15, fontWeight: 700, marginBottom: 16, color: C.text }}>AI 아바타 선택 <span style={{ fontSize: 12, color: C.textSub, fontWeight: 400 }}>— HeyGen API 연동</span></h3>
          <div style={{ display: 'grid', gridTemplateColumns: 'repeat(3, 1fr)', gap: 12 }}>
            {AVATARS.map(av => (
              <div key={av.id} onClick={() => setSelectedAvatar(av.id)} style={{ background: selectedAvatar === av.id ? 'rgba(108,99,255,0.15)' : C.surface2, border: `2px solid ${selectedAvatar === av.id ? C.primary : C.border}`, borderRadius: 12, padding: '16px 12px', cursor: 'pointer', transition: 'all 200ms', textAlign: 'center', position: 'relative' }}>
                {av.badge && <span style={{ position: 'absolute', top: 8, right: 8, background: av.badge === '인기' ? C.primary : C.success, color: '#fff', fontSize: 10, fontWeight: 700, padding: '2px 6px', borderRadius: 20 }}>{av.badge}</span>}
                <div style={{ width: 56, height: 56, borderRadius: '50%', background: `linear-gradient(135deg, ${C.primary}, ${C.accent})`, margin: '0 auto 10px', display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 22 }}>👤</div>
                <div style={{ fontSize: 13, fontWeight: 700, marginBottom: 4 }}>{av.name}</div>
                <div style={{ fontSize: 11, color: C.textSub }}>{av.style} · {av.lang}</div>
              </div>
            ))}
          </div>
        </div>

        {/* Voice selection */}
        <div style={{ background: C.surface, borderRadius: 16, padding: 24, border: `1px solid ${C.border}`, animation: 'slideUp 400ms ease 160ms both' }}>
          <h3 style={{ fontSize: 15, fontWeight: 700, marginBottom: 16 }}>TTS 음성 선택</h3>
          <div style={{ display: 'flex', flexDirection: 'column', gap: 10 }}>
            {VOICES.map(v => (
              <div key={v.id} onClick={() => setSelectedVoice(v.id)} style={{ background: selectedVoice === v.id ? 'rgba(0,217,255,0.08)' : C.surface2, border: `1px solid ${selectedVoice === v.id ? C.accent : C.border}`, borderRadius: 10, padding: '12px 16px', cursor: 'pointer', display: 'flex', alignItems: 'center', gap: 14, transition: 'all 200ms' }}>
                <div style={{ width: 36, height: 36, borderRadius: '50%', background: selectedVoice === v.id ? C.accent : C.border, display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 16 }}>🎙</div>
                <div style={{ flex: 1 }}>
                  <div style={{ fontSize: 14, fontWeight: 600, marginBottom: 2 }}>{v.label}</div>
                  <div style={{ fontSize: 12, color: C.textSub }}>{v.sample}</div>
                </div>
                <div style={{ fontSize: 11, color: C.textMuted, border: `1px solid ${C.border}`, padding: '2px 8px', borderRadius: 20 }}>{v.lang}</div>
              </div>
            ))}
          </div>
        </div>
      </div>

      {/* Right: Render panel */}
      <div style={{ display: 'flex', flexDirection: 'column', gap: 16, animation: 'slideUp 400ms ease 200ms both' }}>
        <div style={{ background: C.surface, borderRadius: 16, padding: 24, border: `1px solid ${C.border}` }}>
          <h3 style={{ fontSize: 15, fontWeight: 700, marginBottom: 20 }}>렌더링 제어판</h3>
          <div style={{ marginBottom: 20, background: C.surface2, borderRadius: 12, padding: 16 }}>
            <div style={{ fontSize: 12, color: C.textSub, marginBottom: 8 }}>잡 상태 (Bull Queue)</div>
            <div style={{ display: 'flex', alignItems: 'center', gap: 8, marginBottom: 12 }}>
              <div style={{ width: 8, height: 8, borderRadius: '50%', background: statusColors[jobStatus], animation: jobStatus === 'processing' ? 'pulse 1.5s infinite' : 'none' }} />
              <span style={{ fontSize: 14, fontWeight: 600, color: statusColors[jobStatus] }}>{statusLabels[jobStatus]}</span>
            </div>
            {rendering || jobStatus === 'completed' ? (
              <>
                <div style={{ display: 'flex', justifyContent: 'space-between', fontSize: 12, color: C.textSub, marginBottom: 6 }}>
                  <span>렌더링 진행률</span>
                  <span>{Math.round(progress)}%</span>
                </div>
                <div style={{ background: C.border, borderRadius: 4, height: 8, overflow: 'hidden' }}>
                  <div style={{ height: '100%', background: `linear-gradient(90deg, ${C.primary}, ${C.accent})`, width: `${progress}%`, transition: 'width 500ms ease', borderRadius: 4 }} />
                </div>
                {jobStatus === 'processing' && (
                  <div style={{ marginTop: 10, fontSize: 12, color: C.textSub }}>클립 2/4 렌더링 중 · Socket.io 실시간 업데이트</div>
                )}
              </>
            ) : null}
          </div>

          <div style={{ display: 'flex', flexDirection: 'column', gap: 10, marginBottom: 20 }}>
            {[['대상 대본', '프리미엄 비건 에센스'], ['총 섹션', '4개 (오프닝 / 상품소개 / FAQ / 클로징)'], ['예상 시간', '~42분'], ['선택 아바타', AVATARS.find(a => a.id === selectedAvatar)?.name], ['TTS 음성', VOICES.find(v => v.id === selectedVoice)?.label]].map(([k, v]) => (
              <div key={k} style={{ display: 'flex', justifyContent: 'space-between', fontSize: 13 }}>
                <span style={{ color: C.textSub }}>{k}</span>
                <span style={{ fontWeight: 600 }}>{v}</span>
              </div>
            ))}
          </div>

          <button onClick={startRender} disabled={rendering} style={{ width: '100%', padding: '14px', borderRadius: 12, border: 'none', background: rendering ? C.surface2 : `linear-gradient(135deg, ${C.primary}, ${C.accent})`, color: rendering ? C.textSub : (jobStatus === 'completed' ? '#0F0F1A' : '#fff'), fontSize: 15, fontWeight: 700, marginBottom: 10, display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 8 }}>
            {rendering ? <><div style={{ width: 18, height: 18, border: `2px solid ${C.textSub}`, borderTopColor: C.primary, borderRadius: '50%', animation: 'spin 600ms linear infinite' }} />렌더링 중...</> : jobStatus === 'completed' ? '✓ 렌더링 완료' : '▶ 렌더링 시작'}
          </button>
          {jobStatus === 'completed' && (
            <button onClick={() => setPreviewModal(true)} style={{ width: '100%', padding: '12px', borderRadius: 12, border: `1px solid ${C.success}`, background: 'rgba(34,197,94,0.1)', color: C.success, fontSize: 14, fontWeight: 700 }}>
              📥 MP4 미리보기 및 다운로드
            </button>
          )}
        </div>

        <div style={{ background: C.surface, borderRadius: 16, padding: 20, border: `1px solid ${C.border}` }}>
          <div style={{ fontSize: 13, fontWeight: 700, marginBottom: 14, color: C.textSub }}>큐 현황 (Bull Queue)</div>
          {[['대기 중', 3, C.warning], ['처리 중', 1, C.accent], ['완료', 14, C.success]].map(([label, cnt, color]) => (
            <div key={label} style={{ marginBottom: 10 }}>
              <div style={{ display: 'flex', justifyContent: 'space-between', fontSize: 12, marginBottom: 4 }}>
                <span style={{ color }}>{label}</span>
                <span style={{ fontWeight: 700 }}>{cnt}개</span>
              </div>
              <div style={{ background: C.border, borderRadius: 4, height: 6 }}>
                <div style={{ height: '100%', background: color, width: `${cnt * 5}%`, borderRadius: 4, animation: 'barGrow 800ms ease both', '--target-width': `${cnt * 5}%` }} />
              </div>
            </div>
          ))}
        </div>
      </div>

      {previewModal && (
        <Modal title="MP4 미리보기 및 다운로드" onClose={() => setPreviewModal(false)} width={620}>
          <div style={{ display: 'flex', flexDirection: 'column', gap: 20 }}>
            <div style={{ background: C.surface2, borderRadius: 12, aspectRatio: '16/9', display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 48 }}>🎬</div>
            <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 12 }}>
              {[['파일명', '프리미엄비건에센스_20260510.mp4'], ['파일 크기', '1.24 GB'], ['영상 시간', '42분 17초'], ['해상도', '1920x1080 (FHD)'], ['코덱', 'H.264 / AAC'], ['병합 클립', '4개 분할 → 1개 병합']].map(([k, v]) => (
                <div key={k} style={{ background: C.surface, padding: '10px 14px', borderRadius: 8 }}>
                  <div style={{ fontSize: 11, color: C.textSub, marginBottom: 3 }}>{k}</div>
                  <div style={{ fontSize: 13, fontWeight: 600 }}>{v}</div>
                </div>
              ))}
            </div>
            <button onClick={() => { setPreviewModal(false); onToast('MP4 다운로드가 시작되었습니다.'); }} style={{ padding: '14px', borderRadius: 12, border: 'none', background: `linear-gradient(135deg, ${C.success}, #16A34A)`, color: '#fff', fontSize: 15, fontWeight: 700 }}>
              📥 MP4 다운로드
            </button>
          </div>
        </Modal>
      )}
    </div>
  );
}

function PipelinePage({ onToast }) {
  const [merging, setMerging] = useState(false);
  const [mergeProgress, setMergeProgress] = useState(65);
  const [logLines, setLogLines] = useState([
    '[FFmpeg] Input: clip_001.mp4 | Duration: 00:05:12 | Codec: AAC/H.264',
    '[FFmpeg] Input: clip_002.mp4 | Duration: 00:10:34 | Codec: AAC/H.264',
    '[Pipeline] 코덱 일치 확인 → concat demuxer 경로 선택 (재인코딩 스킵)',
    '[FFmpeg] Concat list: 4 clips | Total: 00:43:56',
    '[FFmpeg] Output: merged_output.mp4 | Progress: 65%',
  ]);

  const runMerge = () => {
    setMerging(true);
    let p = 65;
    const newLines = ['[Pipeline] 병합 재개 → 클립 3/4 처리 중...'];
    setLogLines(prev => [...prev, ...newLines]);
    const t = setInterval(() => {
      p += 5;
      if (p >= 100) {
        p = 100; clearInterval(t); setMerging(false);
        setLogLines(prev => [...prev, '[FFmpeg] ✓ 병합 완료 → S3 업로드 시작', '[S3] presigned URL 발급 → 업로드 중 (1.24GB)', '[S3] ✓ 업로드 완료 → CDN 전파 완료']);
        onToast('FFmpeg 병합이 완료되었습니다.');
      }
      setMergeProgress(p);
    }, 500);
  };

  const statusIcon = { done: '✓', merging: '⟳', waiting: '○' };
  const statusColor = { done: C.success, merging: C.accent, waiting: C.textMuted };

  return (
    <div style={{ display: 'grid', gridTemplateColumns: '1fr 360px', gap: 24 }}>
      <div style={{ display: 'flex', flexDirection: 'column', gap: 20 }}>
        {/* Pipeline viz */}
        <div style={{ background: C.surface, borderRadius: 16, padding: 24, border: `1px solid ${C.border}`, animation: 'slideUp 400ms ease 80ms both' }}>
          <h3 style={{ fontSize: 15, fontWeight: 700, marginBottom: 20 }}>FFmpeg 분할 병합 파이프라인</h3>
          <div style={{ display: 'flex', alignItems: 'stretch', gap: 0, marginBottom: 24 }}>
            {CLIP_LIST.map((clip, i) => (
              <React.Fragment key={clip.id}>
                <div style={{ flex: 1, background: statusColor[clip.status] + '18', border: `2px solid ${statusColor[clip.status]}`, borderRadius: 10, padding: '12px 10px', textAlign: 'center' }}>
                  <div style={{ fontSize: 18, marginBottom: 6 }}>{statusIcon[clip.status] === '⟳' ? <span style={{ display: 'inline-block', animation: 'spin 1s linear infinite' }}>⟳</span> : statusIcon[clip.status]}</div>
                  <div style={{ fontSize: 11, fontWeight: 700, marginBottom: 3, color: statusColor[clip.status] }}>{clip.name.replace('클립 ', '')}</div>
                  <div style={{ fontSize: 10, color: C.textMuted }}>{clip.duration}</div>
                  <div style={{ fontSize: 10, color: C.textMuted }}>{clip.size}</div>
                </div>
                {i < CLIP_LIST.length - 1 && <div style={{ display: 'flex', alignItems: 'center', padding: '0 4px', color: C.textMuted, fontSize: 20 }}>→</div>}
              </React.Fragment>
            ))}
            <div style={{ display: 'flex', alignItems: 'center', padding: '0 8px', color: C.textMuted, fontSize: 20 }}>→</div>
            <div style={{ width: 100, background: 'rgba(108,99,255,0.15)', border: `2px solid ${C.primary}`, borderRadius: 10, padding: '12px 10px', textAlign: 'center' }}>
              <div style={{ fontSize: 18, marginBottom: 6 }}>🎬</div>
              <div style={{ fontSize: 11, fontWeight: 700, color: C.primary }}>최종 MP4</div>
              <div style={{ fontSize: 10, color: C.textMuted }}>~43분</div>
            </div>
          </div>

          <div style={{ display: 'flex', flexDirection: 'column', gap: 12 }}>
            {CLIP_LIST.map((clip, i) => (
              <div key={clip.id} style={{ background: C.surface2, borderRadius: 10, padding: '14px 16px', display: 'flex', alignItems: 'center', gap: 14, animation: `slideUp 400ms ease ${i * 80}ms both` }}>
                <div style={{ width: 32, height: 32, borderRadius: 8, background: statusColor[clip.status] + '20', display: 'flex', alignItems: 'center', justifyContent: 'center', color: statusColor[clip.status], fontSize: 16 }}>
                  {clip.status === 'merging' ? <span style={{ animation: 'spin 1s linear infinite', display: 'inline-block' }}>⟳</span> : statusIcon[clip.status]}
                </div>
                <div style={{ flex: 1 }}>
                  <div style={{ fontSize: 13, fontWeight: 600, marginBottom: 2 }}>{clip.name}</div>
                  <div style={{ fontSize: 11, color: C.textSub }}>{clip.duration} · {clip.size} · {clip.codec}</div>
                </div>
                <span style={{ fontSize: 11, padding: '4px 10px', borderRadius: 20, background: statusColor[clip.status] + '20', color: statusColor[clip.status], fontWeight: 700 }}>
                  {clip.status === 'done' ? '완료' : clip.status === 'merging' ? '처리 중' : '대기'}
                </span>
              </div>
            ))}
          </div>
        </div>

        {/* Merge progress */}
        <div style={{ background: C.surface, borderRadius: 16, padding: 24, border: `1px solid ${C.border}`, animation: 'slideUp 400ms ease 200ms both' }}>
          <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 14 }}>
            <h3 style={{ fontSize: 15, fontWeight: 700 }}>병합 진행률</h3>
            <span style={{ fontSize: 20, fontWeight: 800, color: C.primary }}>{mergeProgress}%</span>
          </div>
          <div style={{ background: C.border, borderRadius: 6, height: 12, overflow: 'hidden', marginBottom: 12 }}>
            <div style={{ height: '100%', background: `linear-gradient(90deg, ${C.primary}, ${C.accent})`, width: `${mergeProgress}%`, transition: 'width 500ms ease', borderRadius: 6 }} />
          </div>
          <div style={{ display: 'flex', justifyContent: 'space-between', fontSize: 12, color: C.textSub, marginBottom: 16 }}>
            <span>병합 클립: 2/4</span>
            <span>경과 시간: 0:38</span>
            <span>예상 완료: ~1분 20초</span>
          </div>
          <button onClick={runMerge} disabled={merging || mergeProgress === 100} style={{ width: '100%', padding: '12px', borderRadius: 10, border: 'none', background: mergeProgress === 100 ? 'rgba(34,197,94,0.15)' : `linear-gradient(135deg, ${C.primary}, ${C.accent})`, color: mergeProgress === 100 ? C.success : '#fff', fontSize: 14, fontWeight: 700, display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 8 }}>
            {merging ? <><span style={{ display: 'inline-block', animation: 'spin 1s linear infinite' }}>⟳</span> 병합 진행 중...</> : mergeProgress === 100 ? '✓ 병합 완료' : '▶ 병합 재개'}
          </button>
        </div>
      </div>

      {/* Log console */}
      <div style={{ background: '#0A0A12', borderRadius: 16, padding: 0, border: `1px solid ${C.border}`, overflow: 'hidden', animation: 'slideUp 400ms ease 160ms both', display: 'flex', flexDirection: 'column' }}>
        <div style={{ background: C.surface2, padding: '12px 16px', borderBottom: `1px solid ${C.border}`, display: 'flex', alignItems: 'center', gap: 8 }}>
          <div style={{ width: 10, height: 10, borderRadius: '50%', background: '#EF4444' }} />
          <div style={{ width: 10, height: 10, borderRadius: '50%', background: C.warning }} />
          <div style={{ width: 10, height: 10, borderRadius: '50%', background: C.success }} />
          <span style={{ fontSize: 12, color: C.textSub, marginLeft: 8, fontFamily: 'monospace' }}>pipeline.log</span>
        </div>
        <div style={{ padding: '16px', flex: 1, overflowY: 'auto', fontFamily: 'monospace', fontSize: 11, lineHeight: 1.8 }}>
          {logLines.map((line, i) => (
            <div key={i} style={{ color: line.includes('✓') ? C.success : line.includes('Error') ? C.danger : line.includes('Pipeline') ? C.accent : '#8B8BAA', animation: `slideUp 200ms ease ${i * 50}ms both`, marginBottom: 2 }}>
              <span style={{ color: C.textMuted, marginRight: 8 }}>{String(i + 1).padStart(2, '0')}</span>{line}
            </div>
          ))}
          {merging && <div style={{ color: C.accent, animation: 'pulse 1s infinite' }}>_</div>}
        </div>
        <div style={{ padding: '12px 16px', borderTop: `1px solid ${C.border}` }}>
          <div style={{ display: 'flex', gap: 8 }}>
            <div style={{ flex: 1, background: C.surface2, borderRadius: 6, padding: '8px 12px', fontSize: 11, fontFamily: 'monospace', color: C.textSub }}>ffmpeg -f concat -safe 0 ...</div>
            <button onClick={() => onToast('로그가 복사되었습니다.')} style={{ padding: '8px 12px', borderRadius: 6, border: `1px solid ${C.border}`, background: 'transparent', color: C.textSub, fontSize: 11 }}>복사</button>
          </div>
        </div>
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════════════════

function HistoryPage({ onToast }) {
  const [search, setSearch] = useState('');
  const [filter, setFilter] = useState('all');
  const [detailItem, setDetailItem] = useState(null);
  const [reuseModal, setReuseModal] = useState(null);

  const filtered = HISTORY.filter(h => {
    const matchSearch = h.product.includes(search) || h.category.includes(search);
    const matchFilter = filter === 'all' || h.status === filter;
    return matchSearch && matchFilter;
  });

  const statusBadge = (s) => ({
    background: s === 'completed' ? 'rgba(34,197,94,0.15)' : 'rgba(239,68,68,0.15)',
    color: s === 'completed' ? C.success : C.danger,
    text: s === 'completed' ? '완료' : '실패',
  });

  return (
    <div style={{ animation: 'slideUp 400ms ease 80ms both' }}>
      <div style={{ display: 'flex', gap: 12, marginBottom: 20 }}>
        <div style={{ flex: 1, position: 'relative' }}>
          <span style={{ position: 'absolute', left: 12, top: '50%', transform: 'translateY(-50%)', color: C.textMuted, fontSize: 16 }}>🔍</span>
          <input value={search} onChange={e => setSearch(e.target.value)} placeholder="상품명, 카테고리 검색..." style={{ width: '100%', background: C.surface, border: `1px solid ${C.border}`, borderRadius: 10, padding: '10px 14px 10px 38px', color: C.text, fontSize: 14 }} />
        </div>
        {['all', 'completed', 'failed'].map(f => (
          <button key={f} onClick={() => setFilter(f)} style={{ padding: '10px 16px', borderRadius: 10, border: `1px solid ${filter === f ? C.primary : C.border}`, background: filter === f ? 'rgba(108,99,255,0.15)' : 'transparent', color: filter === f ? C.primary : C.textSub, fontSize: 13, fontWeight: 600 }}>
            {f === 'all' ? '전체' : f === 'completed' ? '완료' : '실패'}
          </button>
        ))}
      </div>

      <div style={{ background: C.surface, borderRadius: 16, border: `1px solid ${C.border}`, overflow: 'hidden' }}>
        <div style={{ display: 'grid', gridTemplateColumns: '2fr 1.2fr 1fr 0.8fr 0.8fr 1.2fr', padding: '12px 20px', background: C.surface2, fontSize: 12, color: C.textSub, fontWeight: 600 }}>
          {['상품명 / 카테고리', '생성일시', '상태', '영상 시간', '파일 크기', '액션'].map(h => <div key={h}>{h}</div>)}
        </div>
        {filtered.map((item, i) => {
          const badge = statusBadge(item.status);
          return (
            <div key={item.id} onClick={() => setDetailItem(item)} style={{ display: 'grid', gridTemplateColumns: '2fr 1.2fr 1fr 0.8fr 0.8fr 1.2fr', padding: '16px 20px', borderTop: `1px solid ${C.border}`, cursor: 'pointer', transition: 'background 150ms', animation: `slideUp 300ms ease ${i * 60}ms both' }}` }} onMouseEnter={e => e.currentTarget.style.background = C.surfaceHover} onMouseLeave={e => e.currentTarget.style.background = 'transparent'}>
              <div>
                <div style={{ fontSize: 14, fontWeight: 600, marginBottom: 2 }}>{item.product}</div>
                <div style={{ fontSize: 12, color: C.textSub }}>{item.category} · 아바타: {item.avatar}</div>
              </div>
              <div style={{ fontSize: 13, color: C.textSub, display: 'flex', alignItems: 'center' }}>{item.date}</div>
              <div style={{ display: 'flex', alignItems: 'center' }}>
                <span style={{ fontSize: 12, padding: '4px 10px', borderRadius: 20, background: badge.background, color: badge.color, fontWeight: 700 }}>{badge.text}</span>
              </div>
              <div style={{ fontSize: 13, color: C.textSub, display: 'flex', alignItems: 'center' }}>{item.duration}</div>
              <div style={{ fontSize: 13, color: C.textSub, display: 'flex', alignItems: 'center' }}>{item.fileSize}</div>
              <div style={{ display: 'flex', alignItems: 'center', gap: 8 }} onClick={e => e.stopPropagation()}>
                {item.status === 'completed' && <>
                  <button onClick={() => setReuseModal(item)} style={{ padding: '6px 10px', borderRadius: 8, border: `1px solid ${C.border}`, background: 'transparent', color: C.textSub, fontSize: 11 }}>재사용</button>
                  <button onClick={() => onToast(`${item.product} MP4 다운로드 시작`)} style={{ padding: '6px 10px', borderRadius: 8, border: `1px solid ${C.success}`, background: 'rgba(34,197,94,0.1)', color: C.success, fontSize: 11 }}>↓</button>
                </>}
                {item.status === 'failed' && <button onClick={() => onToast('재시도를 시작합니다.')} style={{ padding: '6px 10px', borderRadius: 8, border: `1px solid ${C.warning}`, background: 'rgba(245,158,11,0.1)', color: C.warning, fontSize: 11 }}>재시도</button>}
              </div>
            </div>
          );
        })}
        {filtered.length === 0 && <div style={{ padding: '48px', textAlign: 'center', color: C.textMuted, fontSize: 14 }}>검색 결과가 없습니다.</div>}
      </div>

      {detailItem && (
        <Modal title="생성 이력 상세" onClose={() => setDetailItem(null)}>
          <div style={{ display: 'flex', flexDirection: 'column', gap: 16 }}>
            <div style={{ background: C.surface2, borderRadius: 12, aspectRatio: '16/9', display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 40 }}>{detailItem.status === 'completed' ? '🎬' : '❌'}</div>
            <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 10 }}>
              {[['상품명', detailItem.product], ['카테고리', detailItem.category], ['생성일시', detailItem.date], ['아바타', detailItem.avatar], ['영상 시간', detailItem.duration], ['파일 크기', detailItem.fileSize]].map(([k, v]) => (
                <div key={k} style={{ background: C.surface, padding: '10px 14px', borderRadius: 8 }}>
                  <div style={{ fontSize: 11, color: C.textSub, marginBottom: 3 }}>{k}</div>
                  <div style={{ fontSize: 13, fontWeight: 600 }}>{v}</div>
                </div>
              ))}
            </div>
            <div style={{ display: 'flex', gap: 10 }}>
              <button onClick={() => { setReuseModal(detailItem); setDetailItem(null); }} style={{ flex: 1, padding: '12px', borderRadius: 10, border: `1px solid ${C.primary}`, background: 'rgba(108,99,255,0.1)', color: C.primary, fontSize: 14, fontWeight: 700 }}>대본 재사용</button>
              {detailItem.status === 'completed' && <button onClick={() => { setDetailItem(null); onToast('다운로드가 시작되었습니다.'); }} style={{ flex: 1, padding: '12px', borderRadius: 10, border: 'none', background: C.success, color: '#fff', fontSize: 14, fontWeight: 700 }}>MP4 다운로드</button>}
            </div>
          </div>
        </Modal>
      )}

      {reuseModal && (
        <Modal title="대본 재사용" onClose={() => setReuseModal(null)}>
          <div style={{ display: 'flex', flexDirection: 'column', gap: 16 }}>
            <div style={{ background: 'rgba(108,99,255,0.1)', border: `1px solid ${C.primary}`, borderRadius: 10, padding: 16 }}>
              <p style={{ fontSize: 13, color: C.text, lineHeight: 1.7 }}>'{reuseModal.product}' 대본을 새 생성 폼에 불러옵니다. 기존 입력값은 이 상품 정보로 교체됩니다.</p>
            </div>
            <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 10 }}>
              {[['상품명', reuseModal.product], ['카테고리', reuseModal.category]].map(([k, v]) => (
                <div key={k} style={{ background: C.surface2, padding: '10px 14px', borderRadius: 8 }}>
                  <div style={{ fontSize: 11, color: C.textSub, marginBottom: 3 }}>{k}</div>
                  <div style={{ fontSize: 13, fontWeight: 600 }}>{v}</div>
                </div>
              ))}
            </div>
            <div style={{ display: 'flex', gap: 10 }}>
              <button onClick={() => setReuseModal(null)} style={{ flex: 1, padding: '12px', borderRadius: 10, border: `1px solid ${C.border}`, background: 'transparent', color: C.textSub, fontSize: 14 }}>취소</button>
              <button onClick={() => { setReuseModal(null); onToast('대본이 로드되었습니다. 대본 생성 탭으로 이동합니다.'); }} style={{ flex: 1, padding: '12px', borderRadius: 10, border: 'none', background: C.primary, color: '#fff', fontSize: 14, fontWeight: 700 }}>대본 불러오기</button>
            </div>
          </div>
        </Modal>
      )}
    </div>
  );
}

/* ═══════════════════════════════════════════════════
   API 설정 TAB
═══════════════════════════════════════════════════ */
function SettingsPage({ onToast }) {
  const [openai, setOpenai] = useState({ key: 'sk-proj-••••••••••••••••••••••••••••••••••••', model: 'gpt-4o', status: 'connected' });
  const [heygen, setHeygen] = useState({ key: 'hg-••••••••••••••••••••••••••••••', plan: 'Business', status: 'connected' });
  const [s3, setS3] = useState({ bucket: 'livecm-video-prod', region: 'ap-northeast-2', status: 'connected' });
  const [testingOAI, setTestingOAI] = useState(false);
  const [testingHG, setTestingHG] = useState(false);
  const [concurrency, setConcurrency] = useState(2);
  const [maxRetry, setMaxRetry] = useState(3);

  const testConnection = (type) => {
    if (type === 'openai') { setTestingOAI(true); setTimeout(() => { setTestingOAI(false); onToast('OpenAI API 연결 성공 ✓'); }, 1500); }
    else { setTestingHG(true); setTimeout(() => { setTestingHG(false); onToast('HeyGen API 연결 성공 ✓'); }, 1500); }
  };

  const inputStyle = { width: '100%', background: C.surface2, border: `1px solid ${C.border}`, borderRadius: 8, padding: '10px 14px', color: C.text, fontSize: 13 };

  return (
    <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 20, animation: 'slideUp 400ms ease 80ms both' }}>
      {[
        { title: 'OpenAI API', icon: '🤖', status: openai.status, color: C.success, fields: [['API Key', openai.key, 'password'], ['기본 모델', openai.model, 'text']], onTest: () => testConnection('openai'), testing: testingOAI },
        { title: 'HeyGen API', icon: '🎭', status: heygen.status, color: C.success, fields: [['API Key', heygen.key, 'password'], ['구독 플랜', heygen.plan, 'text']], onTest: () => testConnection('heygen'), testing: testingHG },
      ].map(api => (
        <div key={api.title} style={{ background: C.surface, borderRadius: 16, padding: 24, border: `1px solid ${C.border}` }}>
          <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 20 }}>
            <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
              <span style={{ fontSize: 24 }}>{api.icon}</span>
              <div>
                <div style={{ fontSize: 15, fontWeight: 700 }}>{api.title}</div>
                <div style={{ fontSize: 11, color: api.color, display: 'flex', alignItems: 'center', gap: 4 }}>
                  <span>●</span> 연결됨
                </div>
              </div>
            </div>
          </div>
          {api.fields.map(([label, val, type]) => (
            <div key={label} style={{ marginBottom: 14 }}>
              <label style={{ fontSize: 12, color: C.textSub, marginBottom: 6, display: 'block' }}>{label}</label>
              <input type={type} style={inputStyle} defaultValue={val} />
            </div>
          ))}
          <div style={{ display: 'flex', gap: 8, marginTop: 16 }}>
            <button onClick={api.onTest} disabled={api.testing} style={{ flex: 1, padding: '10px', borderRadius: 8, border: `1px solid ${C.border}`, background: 'transparent', color: api.testing ? C.textMuted : C.textSub, fontSize: 13, display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 6 }}>
              {api.testing ? <><span style={{ display: 'inline-block', animation: 'spin 600ms linear infinite' }}>⟳</span> 테스트 중...</> : '연결 테스트'}
            </button>
            <button onClick={() => onToast(`${api.title} 설정이 저장되었습니다.`)} style={{ flex: 1, padding: '10px', borderRadius: 8, border: 'none', background: C.primary, color: '#fff', fontSize: 13, fontWeight: 700 }}>저장</button>
          </div>
        </div>
      ))}

      <div style={{ background: C.surface, borderRadius: 16, padding: 24, border: `1px solid ${C.border}` }}>
        <h3 style={{ fontSize: 15, fontWeight: 700, marginBottom: 20 }}>☁️ AWS S3 스토리지</h3>
        {[['버킷 이름', s3.bucket], ['리전', s3.region]].map(([label, val]) => (
          <div key={label} style={{ marginBottom: 14 }}>
            <label style={{ fontSize: 12, color: C.textSub, marginBottom: 6, display: 'block' }}>{label}</label>
            <input style={inputStyle} defaultValue={val} />
          </div>
        ))}
        <div style={{ display: 'flex', gap: 4, marginTop: 16 }}>
          <div style={{ fontSize: 11, color: C.success, background: 'rgba(34,197,94,0.1)', padding: '6px 12px', borderRadius: 20 }}>● 연결됨 · presigned URL 활성화</div>
        </div>
      </div>

      <div style={{ background: C.surface, borderRadius: 16, padding: 24, border: `1px solid ${C.border}` }}>
        <h3 style={{ fontSize: 15, fontWeight: 700, marginBottom: 20 }}>⚙️ Bull Queue 설정</h3>
        <div style={{ marginBottom: 16 }}>
          <label style={{ fontSize: 12, color: C.textSub, marginBottom: 10, display: 'flex', justifyContent: 'space-between' }}>
            <span>렌더링 동시성 (concurrency)</span>
            <span style={{ color: C.primary, fontWeight: 700 }}>{concurrency}개</span>
          </label>
          <input type="range" min={1} max={5} value={concurrency} onChange={e => setConcurrency(+e.target.value)} style={{ width: '100%', accentColor: C.primary }} />
          <div style={{ display: 'flex', justifyContent: 'space-between', fontSize: 11, color: C.textMuted, marginTop: 4 }}>
            {[1,2,3,4,5].map(n => <span key={n}>{n}</span>)}
          </div>
        </div>
        <div style={{ marginBottom: 20 }}>
          <label style={{ fontSize: 12, color: C.textSub, marginBottom: 10, display: 'flex', justifyContent: 'space-between' }}>
            <span>최대 재시도 횟수</span>
            <span style={{ color: C.accent, fontWeight: 700 }}>{maxRetry}회</span>
          </label>
          <input type="range" min={1} max={5} value={maxRetry} onChange={e => setMaxRetry(+e.target.value)} style={{ width: '100%', accentColor: C.accent }} />
        </div>
        <button onClick={() => onToast('Bull Queue 설정이 즉시 적용되었습니다. (재시작 불필요)')} style={{ width: '100%', padding: '10px', borderRadius: 8, border: 'none', background: `linear-gradient(135deg, ${C.primary}, ${C.accent})`, color: '#fff', fontSize: 13, fontWeight: 700 }}>설정 즉시 적용</button>
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════════════════
   MAIN APP
═══════════════════════════════════════════════════ */
const TABS = [
  { id: 'script', label: '대본 생성', title: '상품 정보 입력 및 AI 대본 자동 생성' },
  { id: 'render', label: '영상 렌더링', title: 'AI 아바타 영상 렌더링' },
  { id: 'pipeline', label: '영상 병합', title: 'FFmpeg 분할 병합 파이프라인' },
  { id: 'history', label: '생성 이력', title: '생성 이력 관리' },
  { id: 'settings', label: 'API 설정', title: 'API 설정' },
];

const PAGE_META = {
  script: { title: 'AI 대본 자동 생성', sub: 'OpenAI GPT-4o 기반 섹션별 라이브커머스 대본 생성', kpis: [{ label: '총 생성 대본', val: 127 }, { label: '오늘 생성', val: 5 }, { label: '평균 섹션 수', val: 4 }] },
  render: { title: 'AI 아바타 영상 렌더링', sub: 'HeyGen API · Bull Queue 비동기 파이프라인', kpis: [{ label: '완료된 영상', val: 89 }, { label: '처리 중', val: 1 }, { label: '큐 대기', val: 3 }] },
  pipeline: { title: 'FFmpeg 병합 파이프라인', sub: 'fluent-ffmpeg · 자동 코덱 통일 · S3 업로드', kpis: [{ label: '병합 완료', val: 89 }, { label: '오늘 처리', val: 5 }, { label: '총 용량', val: 98, suffix: 'GB' }] },
  history: { title: '생성 이력 관리', sub: 'Prisma 커서 페이지네이션 · React Query 무한스크롤', kpis: [{ label: '전체 이력', val: 127 }, { label: '성공률', val: 96, suffix: '%' }, { label: '이번 달', val: 34 }] },
  settings: { title: 'API Key 관리', sub: 'OpenAI · HeyGen · AWS S3 · Bull Queue 설정', kpis: [{ label: '연동 API', val: 3 }, { label: '큐 동시성', val: 2 }, { label: '최대 재시도', val: 3 }] },
};

function App() {
  const [tab, setTab] = useState('script');
  const [loading, setLoading] = useState(true);
  const [toast, setToast] = useState(null);
  const [contentKey, setContentKey] = useState(0);

  useEffect(() => { setTimeout(() => setLoading(false), 1200); }, []);

  const handleTabChange = (id) => { setTab(id); setContentKey(k => k + 1); };
  const handleToast = (msg, type = 'success') => { setToast({ msg, type }); };

  const meta = PAGE_META[tab];

  if (loading) return (
    <div style={{ display: 'flex', flexDirection: 'column', width: '100%', minHeight: '100vh' }}>
      <div style={{ height: 56, background: C.surface, borderBottom: `1px solid ${C.border}` }} />
      <div style={{ padding: 24 }}>
        {[...Array(3)].map((_, i) => (
          <div key={i} style={{ height: 120, borderRadius: 12, background: `linear-gradient(90deg, ${C.surface} 25%, ${C.surface2} 50%, ${C.surface} 75%)`, backgroundSize: '200% 100%', animation: 'shimmer 1.5s infinite', marginBottom: 16 }} />
        ))}
      </div>
    </div>
  );

  return (
    <div style={{ display: 'flex', flexDirection: 'column', width: '100%', minHeight: '100vh' }}>
      {/* Top Nav */}
      <header style={{ position: 'sticky', top: 0, zIndex: 100, background: C.surface, borderBottom: `1px solid ${C.border}`, display: 'flex', alignItems: 'center', height: 56, padding: '0 24px', gap: 0 }}>
        <div style={{ display: 'flex', alignItems: 'center', gap: 10, marginRight: 32, flexShrink: 0 }}>
          <div style={{ width: 28, height: 28, borderRadius: 8, background: `linear-gradient(135deg, ${C.primary}, ${C.accent})`, display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 14 }}>🎬</div>
          <span style={{ fontSize: 15, fontWeight: 800, letterSpacing: '-0.02em', background: `linear-gradient(135deg, ${C.primary}, ${C.accent})`, WebkitBackgroundClip: 'text', WebkitTextFillColor: 'transparent' }}>LiveCast AI</span>
        </div>
        <nav style={{ display: 'flex', gap: 2 }}>
          {TABS.map(t => (
            <button key={t.id} onClick={() => handleTabChange(t.id)} title={t.title} style={{ padding: '0 14px', height: 56, border: 'none', background: 'transparent', color: tab === t.id ? C.primary : C.textSub, fontSize: 13, fontWeight: tab === t.id ? 700 : 500, borderBottom: tab === t.id ? `2px solid ${C.primary}` : '2px solid transparent', transition: 'all 200ms', cursor: 'pointer', whiteSpace: 'nowrap' }}>
              {t.label}
            </button>
          ))}
        </nav>
        <div style={{ flex: 1 }} />
        <div style={{ display: 'flex', alignItems: 'center', gap: 16 }}>
          <div style={{ fontSize: 12, color: C.textSub, background: C.surface2, padding: '5px 12px', borderRadius: 20, border: `1px solid ${C.border}` }}>
            <span style={{ color: C.success }}>●</span> 시스템 정상
          </div>
          <div style={{ width: 32, height: 32, borderRadius: '50%', background: `linear-gradient(135deg, ${C.primary}, ${C.accent})`, display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 14 }}>김</div>
        </div>
      </header>

      {/* Hero Banner */}
      <div style={{ background: `linear-gradient(135deg, ${C.primary}CC, #1E1E3F, ${C.accent}33)`, padding: '24px 32px', borderBottom: `1px solid ${C.border}` }}>
        <div style={{ fontSize: 20, fontWeight: 800, marginBottom: 4 }}>{meta.title}</div>
        <div style={{ fontSize: 13, color: 'rgba(255,255,255,0.6)', marginBottom: 16 }}>{meta.sub}</div>
        <div style={{ display: 'flex', gap: 32 }}>
          {meta.kpis.map((k, i) => (
            <div key={k.label} style={{ animation: `slideUp 400ms ease ${i * 80}ms both` }}>
              <div style={{ fontSize: 26, fontWeight: 800 }}>
                <CountUp end={k.val} suffix={k.suffix || ''} />
              </div>
              <div style={{ fontSize: 12, color: 'rgba(255,255,255,0.6)', marginTop: 2 }}>{k.label}</div>
            </div>
          ))}
        </div>
      </div>

      {/* Content */}
      <main style={{ flex: 1, padding: '28px 32px', minHeight: 0 }}>
        <div key={contentKey} style={{ animation: 'fadeIn 300ms ease' }}>
          {tab === 'script' && <ScriptGenPage onToast={handleToast} />}
          {tab === 'render' && <RenderPage onToast={handleToast} />}
          {tab === 'pipeline' && <PipelinePage onToast={handleToast} />}
          {tab === 'history' && <HistoryPage onToast={handleToast} />}
          {tab === 'settings' && <SettingsPage onToast={handleToast} />}
        </div>
      </main>

      {toast && <Toast message={toast.msg} type={toast.type} onClose={() => setToast(null)} />}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
