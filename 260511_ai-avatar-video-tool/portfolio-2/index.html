function CountUp({ end, duration = 1200, suffix = '' }) {
  const [val, setVal] = useState(0);
  useEffect(() => {
    let s = 0; const step = end / (duration / 16);
    const t = setInterval(() => {
      s += step; if (s >= end) { setVal(end); clearInterval(t); } else setVal(Math.floor(s));
    }, 16);
    return () => clearInterval(t);
  }, [end]);
  return <span style={{ animation: 'countUp 400ms ease' }}>{val.toLocaleString()}{suffix}</span>;
}

function Toast({ message, type = 'success', onClose }) {
  useEffect(() => { const t = setTimeout(onClose, 3000); return () => clearTimeout(t); }, []);
  const bg = type === 'success' ? C.primary : type === 'error' ? C.danger : C.info;
  return (
    <div style={{ position: 'fixed', bottom: 28, right: 28, zIndex: 9999, background: bg, color: '#fff', padding: '13px 22px', borderRadius: 12, animation: 'slideUp 300ms ease', boxShadow: `0 8px 32px ${bg}44`, fontSize: 14, fontWeight: 700, display: 'flex', alignItems: 'center', gap: 8 }}>
      {type === 'success' ? '✓' : '!'} {message}
    </div>
  );
}

/* Chart component using Chart.js */
function LineChart({ data, labels }) {
  const ref = useRef(null);
  const chartRef = useRef(null);
  useEffect(() => {
    if (!ref.current) return;
    const ctx = ref.current.getContext('2d');
    if (chartRef.current) chartRef.current.destroy();
    chartRef.current = new Chart(ctx, {
      type: 'line',
      data: {
        labels,
        datasets: [{
          label: '렌더링 건수',
          data,
          borderColor: C.primary,
          backgroundColor: 'rgba(0,185,107,0.1)',
          fill: true,
          tension: 0.4,
          pointRadius: 4,
          pointBackgroundColor: C.primary,
        }]
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        plugins: { legend: { display: false }, tooltip: { backgroundColor: C.secondary } },
        scales: {
          x: { grid: { color: C.border }, ticks: { color: C.textSub, font: { size: 11 } } },
          y: { grid: { color: C.border }, ticks: { color: C.textSub, font: { size: 11 } } }
        }
      }
    });
    return () => chartRef.current?.destroy();
  }, []);
  return <div className="chart-wrap"><canvas ref={ref} /></div>;
}

function BarChart({ data, labels }) {
  const ref = useRef(null);

  useEffect(() => {
    if (!ref.current) return;
    const ctx = ref.current.getContext('2d');

          backgroundColor: [C.primary + 'CC', C.primary + '99', C.accent + 'CC', C.primary + '66', C.info + 'CC', C.primary + '80'],
          borderRadius: 8,
        }]
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        plugins: { legend: { display: false } },
        scales: {
          x: { grid: { color: 'transparent' }, ticks: { color: C.textSub, font: { size: 11 } } },
          y: { grid: { color: C.border }, ticks: { color: C.textSub, font: { size: 11 } } }
        }
      }
    });
    return () => chartRef.current?.destroy();
  }, []);
  return <div className="chart-wrap"><canvas ref={ref} /></div>;
}

function DonutChart({ data, labels }) {
  const ref = useRef(null);
  const chartRef = useRef(null);
  useEffect(() => {
    if (!ref.current) return;
    const ctx = ref.current.getContext('2d');
    if (chartRef.current) chartRef.current.destroy();
    chartRef.current = new Chart(ctx, {
      type: 'doughnut',
      data: {
        labels,
        datasets: [{ data, backgroundColor: [C.primary, C.accent, C.info, C.danger], borderWidth: 0 }]
      },
      options: {
        responsive: true, maintainAspectRatio: false, cutout: '65%',
        plugins: { legend: { position: 'right', labels: { color: C.text, font: { size: 12 }, padding: 16 } } }
      }
    });
    return () => chartRef.current?.destroy();
  }, []);
  return <div className="chart-wrap"><canvas ref={ref} /></div>;
}

/* ═══════════════════════════════════════════════════
   배치 영상 생성 큐 관리
═══════════════════════════════════════════════════ */
function QueuePage({ onToast }) {
  const [jobs, setJobs] = useState(QUEUE_DATA);
  const [filterStatus, setFilterStatus] = useState('all');
  const [detailJob, setDetailJob] = useState(null);
  const [bulkModal, setBulkModal] = useState(false);

  const filtered = filterStatus === 'all' ? jobs : jobs.filter(j => j.status === filterStatus);

  const retryJob = (id, e) => {
    e.stopPropagation();
    setJobs(prev => prev.map(j => j.id === id ? { ...j, status: 'waiting', progress: 0, eta: '20분' } : j));
    onToast('재시도 잡이 큐에 등록되었습니다.');
  };

  const cancelJob = (id, e) => {
    e.stopPropagation();
    setJobs(prev => prev.map(j => j.id === id ? { ...j, status: 'failed', eta: '취소됨' } : j));
    onToast('잡이 취소되었습니다.', 'error');
  };

  const statusBadge = { active: { bg: C.infoLight, color: C.info, label: '처리 중' }, waiting: { bg: C.accentLight, color: '#B87A00', label: '대기 중' }, completed: { bg: C.primaryLight, color: C.primaryDark, label: '완료' }, failed: { bg: C.dangerLight, color: C.danger, label: '실패' } };
  const priorityBadge = { urgent: { bg: 'rgba(239,68,68,0.08)', color: C.danger, label: '긴급' }, normal: { bg: C.surface2, color: C.textSub, label: '일반' }, low: { bg: C.surface2, color: C.textMuted, label: '낮음' } };

  const statusCounts = jobs.reduce((acc, j) => { acc[j.status] = (acc[j.status] || 0) + 1; return acc; }, {});

  return (
    <div>
      {/* Status summary */}
      <div style={{ display: 'grid', gridTemplateColumns: 'repeat(4, 1fr)', gap: 16, marginBottom: 24 }}>
        {[['waiting', '대기 중', C.accent], ['active', '처리 중', C.info], ['completed', '완료', C.primary], ['failed', '실패', C.danger]].map(([key, label, color]) => (
          <div key={key} onClick={() => setFilterStatus(key === filterStatus ? 'all' : key)} style={{ background: C.surface, borderRadius: 14, padding: '16px 20px', border: `1px solid ${filterStatus === key ? color : C.border}`, cursor: 'pointer', transition: 'all 150ms', animation: 'slideUp 400ms ease both' }}>
            <div style={{ fontSize: 26, fontWeight: 800, color }}>{statusCounts[key] || 0}</div>
            <div style={{ fontSize: 13, color: C.textSub, marginTop: 2 }}>{label}</div>
          </div>
        ))}
      </div>

      {/* Toolbar */}
      <div style={{ display: 'flex', gap: 10, marginBottom: 16, alignItems: 'center' }}>
        <button onClick={() => setFilterStatus('all')} style={{ padding: '8px 16px', borderRadius: 10, border: `1px solid ${C.border}`, background: filterStatus === 'all' ? C.primaryLight : 'transparent', color: filterStatus === 'all' ? C.primary : C.textSub, fontSize: 13, fontWeight: 700 }}>전체</button>
        <div style={{ flex: 1 }} />
        {jobs.some(j => j.status === 'failed') && (
          <button onClick={() => setBulkModal(true)} style={{ padding: '8px 16px', borderRadius: 10, border: `1px solid ${C.danger}`, background: C.dangerLight, color: C.danger, fontSize: 13, fontWeight: 700 }}>
            ↺ 실패 잡 일괄 재시도
          </button>
        )}
      </div>

      {/* Queue table */}
      <div style={{ background: C.surface, borderRadius: 16, border: `1px solid ${C.border}`, overflow: 'hidden', boxShadow: '0 2px 8px rgba(0,0,0,0.04)' }}>
        <div style={{ display: 'grid', gridTemplateColumns: '0.8fr 2fr 1fr 0.8fr 1fr 1fr 1.2fr', padding: '12px 20px', background: C.surface2, fontSize: 11, fontWeight: 700, color: C.textSub, textTransform: 'uppercase', letterSpacing: '0.04em' }}>
          {['잡 ID', '상품명', '아바타', '우선순위', '상태', '진행률', '액션'].map(h => <div key={h}>{h}</div>)}
        </div>
        {filtered.map((job, i) => {
          const sb = statusBadge[job.status]; const pb = priorityBadge[job.priority];
          return (
            <div key={job.id} onClick={() => setDetailJob(job)} style={{ display: 'grid', gridTemplateColumns: '0.8fr 2fr 1fr 0.8fr 1fr 1fr 1.2fr', padding: '16px 20px', borderTop: `1px solid ${C.border}`, cursor: 'pointer', transition: 'background 150ms', animation: `slideUp 300ms ease ${i * 50}ms both` }} onMouseEnter={e => e.currentTarget.style.background = C.surfaceHover} onMouseLeave={e => e.currentTarget.style.background = 'transparent'}>
              <div style={{ fontSize: 12, fontFamily: 'monospace', color: C.primary, display: 'flex', alignItems: 'center' }}>{job.id}</div>
              <div style={{ display: 'flex', flexDirection: 'column', justifyContent: 'center' }}>
                <div style={{ fontSize: 14, fontWeight: 600 }}>{job.product}</div>
                <div style={{ fontSize: 11, color: C.textSub }}>생성: {job.created} · ETA: {job.eta}</div>
              </div>
              <div style={{ fontSize: 13, display: 'flex', alignItems: 'center', color: C.textSub }}>{job.avatar}</div>
              <div style={{ display: 'flex', alignItems: 'center' }}>
                <span style={{ fontSize: 11, padding: '3px 8px', borderRadius: 20, background: pb.bg, color: pb.color, fontWeight: 700 }}>{pb.label}</span>
              </div>
              <div style={{ display: 'flex', alignItems: 'center' }}>
                <span style={{ fontSize: 11, padding: '3px 10px', borderRadius: 20, background: sb.bg, color: sb.color, fontWeight: 700, display: 'flex', alignItems: 'center', gap: 4 }}>
                  {job.status === 'active' && <span style={{ animation: 'spin 1s linear infinite', display: 'inline-block' }}>⟳</span>}
                  {sb.label}
                </span>
              </div>
              <div style={{ display: 'flex', alignItems: 'center', paddingRight: 12 }}>
                {job.status !== 'waiting' && job.status !== 'failed' ? (
                  <div style={{ width: '100%' }}>
                    <div style={{ background: C.border, borderRadius: 3, height: 6, overflow: 'hidden' }}>
                      <div style={{ height: '100%', background: job.status === 'completed' ? C.primary : C.info, width: `${job.progress}%`, borderRadius: 3, transition: 'width 1s ease', animation: 'barGrow 1000ms ease both', '--target-width': `${job.progress}%` }} />
                    </div>
                    <div style={{ fontSize: 10, color: C.textSub, marginTop: 3 }}>{job.progress}%</div>
                  </div>
                ) : <span style={{ fontSize: 12, color: C.textMuted }}>—</span>}
              </div>
              <div style={{ display: 'flex', alignItems: 'center', gap: 6 }} onClick={e => e.stopPropagation()}>
                {job.status === 'failed' && <button onClick={(e) => retryJob(job.id, e)} style={{ padding: '5px 10px', borderRadius: 7, border: `1px solid ${C.primary}`, background: C.primaryLight, color: C.primary, fontSize: 11, fontWeight: 700 }}>재시도</button>}
                {(job.status === 'waiting' || job.status === 'active') && <button onClick={(e) => cancelJob(job.id, e)} style={{ padding: '5px 10px', borderRadius: 7, border: `1px solid ${C.border}`, background: 'transparent', color: C.textSub, fontSize: 11 }}>취소</button>}
                {job.status === 'completed' && <button onClick={() => onToast('다운로드가 시작됩니다.')} style={{ padding: '5px 10px', borderRadius: 7, border: `1px solid ${C.primary}`, background: C.primaryLight, color: C.primary, fontSize: 11, fontWeight: 700 }}>↓ 다운로드</button>}
              </div>
            </div>
          );
        })}
      </div>

      {bulkModal && (
        <Modal title="실패 잡 일괄 재시도" onClose={() => setBulkModal(false)}>
          <div style={{ display: 'flex', flexDirection: 'column', gap: 16 }}>
            <div style={{ background: C.dangerLight, borderRadius: 10, padding: 14, fontSize: 13, color: C.danger }}>
              실패 잡 {jobs.filter(j => j.status === 'failed').length}건을 일괄 재시도합니다. 잡이 대기 큐에 추가됩니다.
            </div>
            {jobs.filter(j => j.status === 'failed').map(j => (
              <div key={j.id} style={{ display: 'flex', gap: 10, fontSize: 13, padding: '8px 12px', background: C.surface2, borderRadius: 8 }}>
                <span style={{ color: C.primary, fontFamily: 'monospace' }}>{j.id}</span>
                <span>{j.product}</span>
              </div>
            ))}
            <div style={{ display: 'flex', gap: 10 }}>
              <button onClick={() => setBulkModal(false)} style={{ flex: 1, padding: '12px', borderRadius: 10, border: `1px solid ${C.border}`, background: 'transparent', color: C.textSub, fontSize: 14 }}>취소</button>
              <button onClick={() => { setJobs(prev => prev.map(j => j.status === 'failed' ? { ...j, status: 'waiting', progress: 0, eta: '20분' } : j)); setBulkModal(false); onToast('실패 잡을 일괄 재시도합니다.'); }} style={{ flex: 1, padding: '12px', borderRadius: 10, border: 'none', background: C.primary, color: '#fff', fontSize: 14, fontWeight: 700 }}>일괄 재시도</button>
            </div>
          </div>
        </Modal>
      )}

      {detailJob && (
        <Modal title={`잡 상세 — ${detailJob.id}`} onClose={() => setDetailJob(null)}>
          <div style={{ display: 'flex', flexDirection: 'column', gap: 14 }}>
            <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 10 }}>
              {[['상품명', detailJob.product], ['아바타', detailJob.avatar], ['우선순위', priorityBadge[detailJob.priority]?.label], ['생성 시각', detailJob.created], ['진행률', `${detailJob.progress}%`], ['예상/완료', detailJob.eta]].map(([k, v]) => (
                <div key={k} style={{ background: C.surface2, padding: '10px 14px', borderRadius: 10 }}>
                  <div style={{ fontSize: 11, color: C.textSub, marginBottom: 3 }}>{k}</div>
                  <div style={{ fontSize: 14, fontWeight: 600 }}>{v}</div>
                </div>
              ))}
            </div>
            <div style={{ background: C.surface2, borderRadius: 10, padding: '12px 14px', fontFamily: 'monospace', fontSize: 11, color: C.textSub, lineHeight: 1.8 }}>
              [Bull] Job {detailJob.id} created at {detailJob.created}<br />
              [HeyGen] Video render request sent — avatar: {detailJob.avatar}<br />
              {detailJob.status === 'failed' ? '[Error] HeyGen API timeout after 30s — retry queued' : '[Progress] ' + detailJob.progress + '% complete'}
            </div>
          </div>
        </Modal>
      )}
    </div>
  );
}

        <div style={{ display: 'flex', gap: 8 }}>

            {testing.heygen ? <><span style={{ display: 'inline-block', animation: 'spin 600ms linear infinite' }}>⟳</span> 테스트 중</> : '연결 테스트'}
          </button>
          <button onClick={() => onToast('HeyGen 설정이 저장되었습니다.')} style={{ flex: 1, padding: '10px', borderRadius: 10, border: 'none', background: C.primary, color: '#fff', fontSize: 13, fontWeight: 700 }}>저장</button>
        </div>
      </div>

      {/* Queue settings */}
      <div style={{ background: C.surface, borderRadius: 16, padding: 24, border: `1px solid ${C.border}`, boxShadow: '0 2px 8px rgba(0,0,0,0.04)', animation: 'slideUp 400ms ease 240ms both' }}>
        <div style={{ fontSize: 16, fontWeight: 700, marginBottom: 22 }}>⚙️ Bull Queue 운영 설정</div>
        <div style={{ marginBottom: 20 }}>
          <label style={{ fontSize: 12, fontWeight: 600, color: C.textSub, display: 'flex', justifyContent: 'space-between', marginBottom: 10 }}>
            <span>렌더링 동시성 (concurrency)</span>
            <span style={{ color: C.primary, fontWeight: 800 }}>{concurrency}개</span>
          </label>
          <input type="range" min={1} max={5} value={concurrency} onChange={e => setConcurrency(+e.target.value)} style={{ width: '100%', accentColor: C.primary, height: 6 }} />
          <div style={{ display: 'flex', justifyContent: 'space-between', fontSize: 11, color: C.textMuted, marginTop: 6 }}>
            <span>1 (낮음)</span><span>3 (권장)</span><span>5 (최대)</span>
          </div>
        </div>
        <div style={{ marginBottom: 22 }}>
          <label style={{ fontSize: 12, fontWeight: 600, color: C.textSub, display: 'flex', justifyContent: 'space-between', marginBottom: 10 }}>
            <span>최대 재시도 횟수</span>
            <span style={{ color: C.accent, fontWeight: 800 }}>{maxRetry}회</span>
          </label>
          <input type="range" min={1} max={5} value={maxRetry} onChange={e => setMaxRetry(+e.target.value)} style={{ width: '100%', accentColor: C.accent, height: 6 }} />
        </div>
        <div style={{ background: C.accentLight, borderRadius: 10, padding: '10px 14px', marginBottom: 16, fontSize: 12, color: '#B87A00', border: `1px solid ${C.accent}44` }}>
          ⚡ 설정 즉시 적용 — Redis Pub/Sub 브로드캐스트로 서버 재시작 없이 반영됩니다
        </div>
        <button onClick={() => setConfirmApply(true)} style={{ width: '100%', padding: '11px', borderRadius: 10, border: 'none', background: `linear-gradient(135deg, ${C.primary}, ${C.primaryDark})`, color: '#fff', fontSize: 14, fontWeight: 700 }}>
          설정 즉시 적용
        </button>
      </div>

      {/* Audit log */}
      <div style={{ background: C.surface, borderRadius: 16, padding: 24, border: `1px solid ${C.border}`, boxShadow: '0 2px 8px rgba(0,0,0,0.04)', animation: 'slideUp 400ms ease 320ms both' }}>
        <div style={{ fontSize: 16, fontWeight: 700, marginBottom: 20 }}>📋 설정 변경 감사 로그</div>
        <div style={{ display: 'flex', flexDirection: 'column', gap: 12 }}>
          {AUDIT_LOG.map((log, i) => (
            <div key={i} style={{ display: 'flex', gap: 12, fontSize: 12, padding: '10px 12px', background: C.surface2, borderRadius: 10, animation: `slideUp 300ms ease ${i * 60}ms both` }}>
              <div style={{ color: C.textMuted, flexShrink: 0, fontFamily: 'monospace' }}>{log.time}</div>
              <div style={{ flex: 1 }}>
                <div style={{ fontWeight: 600, marginBottom: 3 }}>{log.user} · {log.action}</div>
                <div style={{ color: C.textSub }}>{log.target}: <span style={{ color: C.danger }}>{log.before}</span> → <span style={{ color: C.primary }}>{log.after}</span></div>
              </div>
            </div>
          ))}
        </div>
      </div>

      {confirmApply && (
        <Modal title="설정 적용 확인" onClose={() => setConfirmApply(false)} width={440}>
          <div style={{ display: 'flex', flexDirection: 'column', gap: 16 }}>
            <div style={{ background: C.accentLight, borderRadius: 10, padding: 14, fontSize: 13, color: '#B87A00' }}>
              동시성 {concurrency}개, 재시도 {maxRetry}회로 설정이 변경됩니다. 현재 진행 중인 잡에는 영향이 없습니다.
            </div>
            <div style={{ display: 'flex', gap: 10 }}>
              <button onClick={() => setConfirmApply(false)} style={{ flex: 1, padding: '12px', borderRadius: 10, border: `1px solid ${C.border}`, background: 'transparent', color: C.textSub, fontSize: 14 }}>취소</button>
              <button onClick={() => { setConfirmApply(false); onToast(`동시성 ${concurrency}개, 재시도 ${maxRetry}회 — 즉시 적용 완료`); }} style={{ flex: 1, padding: '12px', borderRadius: 10, border: 'none', background: C.primary, color: '#fff', fontSize: 14, fontWeight: 700 }}>적용</button>
            </div>
          </div>
        </Modal>
      )}
    </div>
  );
}

   사용량 통계

function StatsPage() {

  };

  return (
    <div>
      <div style={{ display: 'flex', gap: 10, marginBottom: 24, alignItems: 'center' }}>
        <h2 style={{ fontSize: 18, fontWeight: 700, flex: 1 }}>사용량 통계 분석</h2>
        {['7d', '30d'].map(p => (
          <button key={p} onClick={() => setPeriod(p)} style={{ padding: '8px 16px', borderRadius: 10, border: `1px solid ${period === p ? C.primary : C.border}`, background: period === p ? C.primaryLight : 'transparent', color: period === p ? C.primary : C.textSub, fontSize: 13, fontWeight: period === p ? 700 : 400 }}>
            {p === '7d' ? '최근 7일' : '최근 30일'}
          </button>
        ))}
      </div>

      {/* Summary KPIs */}
      <div style={{ display: 'grid', gridTemplateColumns: 'repeat(4, 1fr)', gap: 16, marginBottom: 24 }}>
        {[['총 렌더링', '127건', C.primary], ['성공률', '96.1%', C.primary], ['총 영상 시간', '88시간', C.accent], ['API 비용', '$284', '#9B59B6']].map(([label, val, color], i) => (
          <div key={label} style={{ background: C.surface, borderRadius: 14, padding: '18px 20px', border: `1px solid ${C.border}`, animation: `slideUp 400ms ease ${i * 80}ms both` }}>
            <div style={{ fontSize: 11, color: C.textSub, textTransform: 'uppercase', letterSpacing: '0.05em', marginBottom: 6 }}>{label}</div>
            <div style={{ fontSize: 26, fontWeight: 800, color }}>{val}</div>
          </div>
        ))}
      </div>

      <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 24 }}>
        <div style={{ background: C.surface, borderRadius: 16, padding: 24, border: `1px solid ${C.border}`, animation: 'slideUp 400ms ease 200ms both' }}>
          <h3 style={{ fontSize: 15, fontWeight: 700, marginBottom: 16 }}>일별 렌더링 건수</h3>
          <LineChart key={period} data={renderData.data} labels={renderData.labels} />
        </div>

        <div style={{ background: C.surface, borderRadius: 16, padding: 24, border: `1px solid ${C.border}`, animation: 'slideUp 400ms ease 280ms both' }}>
          <h3 style={{ fontSize: 15, fontWeight: 700, marginBottom: 16 }}>아바타별 사용 비율</h3>
          <DonutChart data={[34, 28, 19, 15, 12, 8, 5]} labels={['박지현', '이민준', '김수연', '최은영', 'Sarah', '정현우', '기타']} />
        </div>

        <div style={{ background: C.surface, borderRadius: 16, padding: 24, border: `1px solid ${C.border}`, animation: 'slideUp 400ms ease 360ms both' }}>
          <h3 style={{ fontSize: 15, fontWeight: 700, marginBottom: 16 }}>카테고리별 API 비용</h3>
          <BarChart data={[124, 98, 42, 20]} labels={['HeyGen 렌더링', 'OpenAI 대본', 'AWS S3', '기타']} />
        </div>

        <div style={{ background: C.surface, borderRadius: 16, padding: 24, border: `1px solid ${C.border}`, animation: 'slideUp 400ms ease 440ms both' }}>
          <h3 style={{ fontSize: 15, fontWeight: 700, marginBottom: 16 }}>월별 누적 통계</h3>
          <div style={{ display: 'flex', flexDirection: 'column', gap: 14, marginTop: 8 }}>
            {[['HeyGen API 렌더링', 127, 150, C.primary], ['OpenAI 대본 생성', 127, 200, C.info], ['FFmpeg 병합 처리', 112, 150, C.accent], ['S3 업로드 완료', 112, 150, '#9B59B6']].map(([label, val, max, color]) => (
              <div key={label}>
                <div style={{ display: 'flex', justifyContent: 'space-between', fontSize: 13, marginBottom: 6 }}>
                  <span style={{ fontWeight: 600 }}>{label}</span>
                  <span style={{ color: C.textSub }}>{val}건</span>
                </div>
                <div style={{ background: C.surface2, borderRadius: 4, height: 8, overflow: 'hidden' }}>
                  <div style={{ height: '100%', background: color, width: `${(val/max)*100}%`, borderRadius: 4, animation: 'barGrow 1000ms ease 200ms both', '--target-width': `${(val/max)*100}%` }} />

              </div>
            ))}
          </div>
        </div>
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════════════════
   MAIN APP (spa-modern)
═══════════════════════════════════════════════════ */
const NAV_ITEMS = [
  { id: 'home', label: '대시보드', exact: true },
  { id: 'avatar', label: '멀티 아바타 관리', exact: true },
  { id: 'queue', label: '배치 큐', title: '배치 영상 생성 큐 관리', exact: false },
  { id: 'config', label: '시스템 설정', title: '시스템 설정 및 API Key 관리', exact: false },
  { id: 'stats', label: '사용량 통계', exact: true },
];

function App() {
  const [route, setRoute] = useState('home');
  const [loading, setLoading] = useState(true);
  const [toast, setToast] = useState(null);
  const [contentKey, setContentKey] = useState(0);

  useEffect(() => { setTimeout(() => setLoading(false), 1400); }, []);

  const handleNav = (id) => { setRoute(id); setContentKey(k => k + 1); };
  const handleToast = (msg, type = 'success') => setToast({ msg, type });

  if (loading) return (
    <div style={{ width: '100%', minHeight: '100vh', background: C.bg }}>
      <div style={{ height: 64, background: C.surface, borderBottom: `1px solid ${C.border}` }} />
      <div style={{ padding: 32 }}>
        {[...Array(3)].map((_, i) => (
          <div key={i} style={{ height: 140, borderRadius: 16, background: `linear-gradient(90deg, #EDF2F0 25%, #E0EDE8 50%, #EDF2F0 75%)`, backgroundSize: '200% 100%', animation: 'shimmer 1.5s infinite', marginBottom: 20 }} />
        ))}
      </div>
    </div>
  );

  return (
    <div style={{ display: 'flex', flexDirection: 'column', width: '100%', minHeight: '100vh', background: C.bg }}>
      {/* Global Nav */}
      <header style={{ position: 'sticky', top: 0, zIndex: 100, background: C.surface, borderBottom: `1px solid ${C.border}`, display: 'flex', alignItems: 'center', height: 64, padding: '0 32px', gap: 8, boxShadow: '0 1px 4px rgba(0,0,0,0.04)' }}>
        <div style={{ display: 'flex', alignItems: 'center', gap: 10, marginRight: 28 }}>
          <div style={{ width: 34, height: 34, borderRadius: 10, background: `linear-gradient(135deg, ${C.primary}, ${C.primaryDark})`, display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 18 }}>📡</div>
          <div>
            <div style={{ fontSize: 15, fontWeight: 800, color: C.text, letterSpacing: '-0.02em' }}>BroadcastAI</div>
            <div style={{ fontSize: 10, color: C.textSub }}>라이브커머스 AI 플랫폼</div>
          </div>
        </div>
        <nav style={{ display: 'flex', gap: 2, flex: 1 }}>
          {NAV_ITEMS.map(item => (
            <button key={item.id} onClick={() => handleNav(item.id)}
              {...(item.title ? { title: item.title } : {})}
              style={{ padding: '8px 16px', borderRadius: 10, border: 'none', background: route === item.id ? C.primaryLight : 'transparent', color: route === item.id ? C.primary : C.textSub, fontSize: 14, fontWeight: route === item.id ? 700 : 500, transition: 'all 200ms', cursor: 'pointer', whiteSpace: 'nowrap' }}>
              {item.label}
            </button>
          ))}
        </nav>
        <div style={{ display: 'flex', alignItems: 'center', gap: 14 }}>
          <div style={{ fontSize: 12, color: C.primary, background: C.primaryLight, padding: '5px 12px', borderRadius: 20, fontWeight: 700, border: `1px solid ${C.primary}44` }}>
            ● 큐 정상
          </div>
          <div style={{ display: 'flex', alignItems: 'center', gap: 8, cursor: 'pointer' }}>
            <div style={{ width: 34, height: 34, borderRadius: '50%', background: `linear-gradient(135deg, ${C.primary}, ${C.accent})`, display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 14, color: '#fff', fontWeight: 700 }}>김</div>
            <div>
              <div style={{ fontSize: 13, fontWeight: 600 }}>김마케터</div>
              <div style={{ fontSize: 11, color: C.textSub }}>마케팅팀</div>
            </div>
          </div>
        </div>
      </header>

      {/* Main content */}
      <main style={{ flex: 1, padding: '32px', maxWidth: 1400, width: '100%', margin: '0 auto', boxSizing: 'border-box' }}>
        <div key={contentKey} style={{ animation: 'fadeIn 300ms ease' }}>
          {route === 'home' && <DashboardPage onNavigate={handleNav} />}
          {route === 'avatar' && <AvatarPage onToast={handleToast} />}
          {route === 'queue' && <QueuePage onToast={handleToast} />}
          {route === 'config' && <ConfigPage onToast={handleToast} />}
          {route === 'stats' && <StatsPage />}
        </div>
      </main>

      {/* Footer */}
      <footer style={{ background: C.secondary, color: 'rgba(255,255,255,0.8)', padding: '36px 32px 24px', marginTop: 48 }}>
        <div style={{ display: 'grid', gridTemplateColumns: '2fr 1fr 1fr 1fr', gap: 32, maxWidth: 1400, margin: '0 auto' }}>
          <div>
            <div style={{ fontSize: 18, fontWeight: 800, color: '#fff', marginBottom: 10 }}>📡 BroadcastAI</div>
            <p style={{ fontSize: 13, lineHeight: 1.7, opacity: 0.7 }}>OpenAI + HeyGen API 기반 라이브커머스<br />AI 쇼호스트 영상 자동 생성 플랫폼</p>
            <div style={{ display: 'flex', gap: 12, marginTop: 16 }}>
              {['OpenAI', 'HeyGen', 'FFmpeg'].map(b => <span key={b} style={{ fontSize: 11, padding: '3px 10px', borderRadius: 20, background: 'rgba(255,255,255,0.1)', color: 'rgba(255,255,255,0.7)' }}>{b}</span>)}
            </div>
          </div>
          {[['플랫폼', ['대본 생성', '영상 렌더링', '배치 처리', '사용량 분석']], ['지원', ['자주 묻는 질문', 'API 문서', '사용 가이드', '문의하기']], ['법적 고지', ['이용약관', '개인정보처리방침', '쿠키 정책', '면책 조항']]].map(([title, items]) => (
            <div key={title}>
              <div style={{ fontSize: 13, fontWeight: 700, color: '#fff', marginBottom: 14, textTransform: 'uppercase', letterSpacing: '0.05em' }}>{title}</div>
              {items.map(item => <div key={item} style={{ fontSize: 13, opacity: 0.6, marginBottom: 8, cursor: 'pointer' }}>{item}</div>)}
            </div>
          ))}
        </div>
        <div style={{ maxWidth: 1400, margin: '28px auto 0', paddingTop: 20, borderTop: '1px solid rgba(255,255,255,0.1)', display: 'flex', justifyContent: 'space-between', fontSize: 12, opacity: 0.5 }}>
          <span>© 2026 BroadcastAI. 자체 개발 프로젝트 구현 데모.</span>
          <span>React · Node.js · PostgreSQL · Redis · Chart.js</span>
        </div>
      </footer>

      {toast && <Toast message={toast.msg} type={toast.type} onClose={() => setToast(null)} />}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
