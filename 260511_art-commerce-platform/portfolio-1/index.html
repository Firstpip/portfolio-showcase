/* ─── CountUp ─── */
function CountUp({end,duration=1000,suffix='',prefix=''}) {
  const [val,setVal] = React.useState(0);
  React.useEffect(()=>{
    let s=0; const step=end/(duration/16);
    const t=setInterval(()=>{s+=step;if(s>=end){setVal(end);clearInterval(t);}else setVal(Math.floor(s));},16);
    return()=>clearInterval(t);
  },[end]);
  return <span style={{animation:'countUp 400ms ease'}}>{prefix}{val.toLocaleString()}{suffix}</span>;
}

/* ─── Toast ─── */
function Toast({message,onClose}) {
  React.useEffect(()=>{const t=setTimeout(onClose,3000);return()=>clearTimeout(t);},[]);
  return (
    <div style={{position:'fixed',bottom:24,right:24,zIndex:9999,background:C.secondary,color:'#fff',
      padding:'14px 24px',borderRadius:10,animation:'slideUp 300ms ease',
      boxShadow:'0 4px 20px rgba(0,0,0,0.25)',display:'flex',alignItems:'center',gap:10}}>
      <span style={{fontSize:18}}>✓</span>{message}
    </div>
  );
}

            display:'flex',alignItems:'center',justifyContent:'center',fontSize:16}}>🎨</div>
          <span style={{fontSize:16,fontWeight:800,color:C.textPrimary,letterSpacing:'-0.02em'}}>ArtNow</span>
        </div>
        {TABS.map(t=>(
          <button key={t.id} title={t.label} onClick={()=>setTab(t.id)} style={{
            padding:'8px 16px',borderRadius:8,border:'none',fontFamily:'Pretendard,sans-serif',
            background:tab===t.id?C.surfaceAlt:'transparent',
            color:tab===t.id?C.primary:C.textSecondary,
            fontWeight:tab===t.id?700:500,cursor:'pointer',fontSize:14,
            transition:'all 150ms',position:'relative'}}>
            {t.label}
            {t.id==='cart'&&cartCount>0&&<span style={{position:'absolute',top:4,right:4,
              width:16,height:16,borderRadius:'50%',background:C.accent,color:'#fff',
              fontSize:10,fontWeight:700,display:'flex',alignItems:'center',justifyContent:'center'}}>
              {cartCount}
            </span>}
          </button>
        ))}
        <div style={{flex:1}}/>
        <div style={{display:'flex',alignItems:'center',gap:12}}>
          <button style={{background:'none',border:'none',cursor:'pointer',fontSize:20,color:C.textSecondary}}>🔍</button>
          <button style={{background:'none',border:'none',cursor:'pointer',fontSize:20,color:C.textSecondary}}>🔔</button>
          <div style={{width:32,height:32,borderRadius:'50%',
            background:`linear-gradient(135deg,${C.primary},${C.accent})`,
            display:'flex',alignItems:'center',justifyContent:'center',cursor:'pointer',fontSize:16}}>👤</div>
        </div>
      </header>

      {/* 페이지 콘텐츠 */}
      <main style={{flex:1}}>
        {tab==='home'&&<GalleryPage onSelect={item=>setDrawer(item)}/>}
        {tab==='subscription'&&<SubscriptionPage onSubscribe={handleSubscribe}/>}
        {tab==='cart'&&<CartPage cartItems={cartItems} onRemove={removeFromCart} onCheckout={handleCheckout}/>}
        {tab==='mypage'&&<MyPage/>}
      </main>

      {/* 푸터 */}
      <footer style={{background:C.secondary,color:'rgba(255,255,255,0.7)',
        padding:'40px 40px 32px',marginTop:40}}>
        <div style={{maxWidth:1200,margin:'0 auto',display:'grid',gridTemplateColumns:'2fr 1fr 1fr 1fr',gap:32}}>
          <div>
            <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:12}}>
              <div style={{width:28,height:28,borderRadius:6,
                background:`linear-gradient(135deg,${C.primary},${C.accent})`,
                display:'flex',alignItems:'center',justifyContent:'center',fontSize:14}}>🎨</div>
              <span style={{fontSize:15,fontWeight:800,color:'#fff'}}>ArtNow</span>
            </div>
            <p style={{fontSize:13,lineHeight:1.8,opacity:0.7}}>
              국내 작가의 오리지널 미술품과 아트 매거진 정기구독 플랫폼입니다.
            </p>
          </div>
          {[{title:'서비스',items:['갤러리','정기구독','작가 소개','전시 일정']},
            {title:'고객지원',items:['자주 묻는 질문','1:1 문의','배송 안내','환불 정책']},
            {title:'회사',items:['소개','채용','제휴','개인정보처리방침']}].map((col,i)=>(
            <div key={i}>
              <h4 style={{fontSize:13,fontWeight:700,color:'rgba(255,255,255,0.5)',
                letterSpacing:'0.05em',textTransform:'uppercase',marginBottom:14}}>{col.title}</h4>
              <ul style={{listStyle:'none',display:'flex',flexDirection:'column',gap:8}}>
                {col.items.map((item,j)=>(
                  <li key={j} style={{fontSize:14,cursor:'pointer',transition:'color 150ms'}}
                    onMouseEnter={e=>e.currentTarget.style.color='#fff'}
                    onMouseLeave={e=>e.currentTarget.style.color='rgba(255,255,255,0.7)'}>{item}</li>
                ))}
              </ul>
            </div>
          ))}
        </div>
        <div style={{maxWidth:1200,margin:'24px auto 0',paddingTop:20,borderTop:'1px solid rgba(255,255,255,0.1)',
          display:'flex',justifyContent:'space-between',fontSize:12,opacity:0.5}}>
          <span>© 2025 ArtNow. All rights reserved.</span>
          <span>사업자번호: 123-45-67890 | 서울특별시 종로구 인사동길 12</span>
        </div>
      </footer>

      {/* Drawer */}
      {drawer&&<Drawer item={drawer} onClose={()=>setDrawer(null)} onAddCart={()=>{showToast(`'${drawer.title}'를 장바구니에 담았습니다`);setDrawer(null);}}/>}
      {toast&&<Toast message={toast} onClose={()=>setToast(null)}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
