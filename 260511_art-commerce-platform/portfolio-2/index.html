/* ─── utils ─── */
function CountUp({end,suffix='',prefix=''}) {
  const [val,setVal]=React.useState(0);
  React.useEffect(()=>{
    let s=0; const step=end/(1000/16);
    const t=setInterval(()=>{s+=step;if(s>=end){setVal(end);clearInterval(t);}else setVal(Math.floor(s));},16);
    return()=>clearInterval(t);
  },[end]);
  return <span style={{animation:'countUp 400ms ease'}}>{prefix}{val.toLocaleString()}{suffix}</span>;
}

function Toast({message,onClose}) {
  React.useEffect(()=>{const t=setTimeout(onClose,3000);return()=>clearTimeout(t);},[]);
  return (
    <div style={{position:'fixed',bottom:24,right:24,zIndex:9999,background:C.secondary,color:'#fff',
      padding:'14px 24px',borderRadius:10,animation:'slideUp 300ms ease',
      boxShadow:'0 4px 20px rgba(0,0,0,0.25)',display:'flex',alignItems:'center',gap:10}}>
      <span>✓</span>{message}
    </div>
  );
}

function Modal({title,onClose,children,width=560}) {
  return (
    <div style={{position:'fixed',inset:0,zIndex:500,display:'flex',alignItems:'center',justifyContent:'center'}}>
      <div onClick={onClose} style={{position:'absolute',inset:0,background:'rgba(0,0,0,0.45)',animation:'fadeIn 200ms ease'}}/>
      <div style={{position:'relative',width,maxHeight:'85vh',background:C.surface,borderRadius:14,zIndex:501,
        animation:'fadeInScale 200ms ease',display:'flex',flexDirection:'column',
        boxShadow:'0 20px 60px rgba(0,0,0,0.18)'}}>

          padding:'18px 24px',borderBottom:`1px solid ${C.border}`}}>

          <button onClick={onClose} style={{background:'none',border:'none',fontSize:20,cursor:'pointer',color:C.textLight}}>✕</button>
        </div>
        <div style={{padding:24,overflowY:'auto',flex:1}}>{children}</div>
      </div>
    </div>
  );
}

function StatusBadge({status}) {
  const map={
    '판매중':{bg:'#EFF6FF',color:C.primary},
    '품절':{bg:C.errorBg,color:C.error},
    'active':{bg:C.successBg,color:C.success},
    'paused':{bg:C.warningBg,color:C.warning},
    'cancelled':{bg:'#F1F5F9',color:C.textLight},
    '결제완료':{bg:'#EFF6FF',color:C.primary},
    '배송중':{bg:'#ECFDF5',color:'#059669'},
    '배송완료':{bg:C.successBg,color:C.success},
    '환불완료':{bg:C.errorBg,color:C.error},
  };
  const s=map[status]||{bg:'#F1F5F9',color:C.textSecondary};
  const labels={'active':'활성','paused':'일시정지','cancelled':'해지'};
  return (
    <span style={{fontSize:12,fontWeight:600,padding:'3px 10px',borderRadius:20,
      background:s.bg,color:s.color}}>
      {labels[status]||status}
    </span>
  );
}

/* ─── Subscribers Page ─── */
function SubscribersPage({showToast}) {
  const [subscribers,setSubscribers]=React.useState(SUBSCRIBERS);
  const [filterStatus,setFilterStatus]=React.useState('전체');
  const [selected,setSelected]=React.useState([]);
  const [retrying,setRetrying]=React.useState(false);
  const [retryProgress,setRetryProgress]=React.useState(0);
  const [detailSub,setDetailSub]=React.useState(null);

  const filtered=filterStatus==='전체'?subscribers:subscribers.filter(s=>s.status===filterStatus);
  const failedSubs=subscribers.filter(s=>s.failCount>0);

  const handleBulkRetry=()=>{
    if(selected.length===0)return;
    setRetrying(true);setRetryProgress(0);
    const interval=setInterval(()=>{
      setRetryProgress(p=>{if(p>=100){clearInterval(interval);setRetrying(false);showToast(`${selected.length}건 결제 재시도 완료`);setSelected([]);return 100;}return p+5;});
    },80);
  };

  const statusOptions=['전체','active','paused','cancelled'];
  const statusLabels={'전체':'전체','active':'활성','paused':'일시정지','cancelled':'해지'};

  return (
    <div style={{padding:28,animation:'fadeIn 300ms ease',height:'100%',overflowY:'auto'}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:20}}>
        <div>
          <h2 style={{fontSize:20,fontWeight:800,color:C.textPrimary,letterSpacing:'-0.02em'}}>구독관리</h2>
          <p style={{fontSize:13,color:C.textSecondary,marginTop:2}}>정기구독 활성 회원 현황 및 결제 관리</p>
        </div>
        {selected.length>0&&(
          <button onClick={handleBulkRetry} disabled={retrying} style={{
            padding:'10px 20px',borderRadius:10,border:'none',fontFamily:'Pretendard,sans-serif',
            background:retrying?C.border:C.warning,color:retrying?C.textSecondary:'#fff',
            fontWeight:700,cursor:retrying?'not-allowed':'pointer',fontSize:14}}>
            {retrying?`재시도 중... ${retryProgress}%`:`선택 ${selected.length}건 결제 재시도`}
          </button>
        )}
      </div>

      {/* 구독 KPI */}
      <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:12,marginBottom:20}}>
        {[{label:'전체 구독자',val:subscribers.filter(s=>s.status!=='cancelled').length,suffix:'명',color:C.primary},
          {label:'활성',val:subscribers.filter(s=>s.status==='active').length,suffix:'명',color:C.success},
          {label:'일시정지',val:subscribers.filter(s=>s.status==='paused').length,suffix:'명',color:C.warning},
          {label:'결제 실패',val:failedSubs.length,suffix:'건',color:C.error}].map((k,i)=>(
          <div key={i} style={{background:C.surface,borderRadius:10,padding:14,
            boxShadow:'0 1px 4px rgba(0,0,0,0.06)',animation:`slideUp 300ms ease ${i*60}ms both`}}>
            <div style={{fontSize:22,fontWeight:800,color:k.color,marginBottom:4}}>
              <CountUp end={k.val} suffix={k.suffix}/>
            </div>
            <div style={{fontSize:12,color:C.textSecondary}}>{k.label}</div>
          </div>
        ))}
      </div>

      {/* 해지율 차트 */}
      <div style={{background:C.surface,borderRadius:12,padding:20,boxShadow:'0 1px 4px rgba(0,0,0,0.06)',marginBottom:20}}>
        <h3 style={{fontSize:15,fontWeight:700,color:C.textPrimary,marginBottom:4}}>구독 해지율 추이</h3>
        <p style={{fontSize:12,color:C.textSecondary,marginBottom:12}}>최근 6개월 월별 해지 건수</p>
        <div style={{height:160}}>
          <ResponsiveContainer width="100%" height="100%">
            <BarChart data={CHURN_DATA}>
              <CartesianGrid strokeDasharray="3 3" stroke={C.border}/>
              <XAxis dataKey="month" tick={{fontSize:12,fill:C.textSecondary}}/>
              <YAxis tick={{fontSize:12,fill:C.textSecondary}}/>
              <Tooltip contentStyle={{borderRadius:8,border:`1px solid ${C.border}`,fontSize:12}}/>
              <Bar dataKey="해지" fill={C.error} radius={[4,4,0,0]}/>
            </BarChart>
          </ResponsiveContainer>
        </div>
      </div>

      {/* 필터 */}
      <div style={{display:'flex',gap:8,marginBottom:14}}>
        {statusOptions.map(s=>(
          <button key={s} onClick={()=>setFilterStatus(s)} style={{
            padding:'7px 16px',borderRadius:8,border:`1.5px solid ${filterStatus===s?C.primary:C.border}`,
            background:filterStatus===s?'#EFF6FF':'transparent',color:filterStatus===s?C.primary:C.textSecondary,
            fontWeight:filterStatus===s?700:400,cursor:'pointer',fontSize:13,fontFamily:'Pretendard,sans-serif'}}>
            {statusLabels[s]}
          </button>
        ))}
      </div>

      <div style={{background:C.surface,borderRadius:12,boxShadow:'0 1px 4px rgba(0,0,0,0.06)',overflow:'hidden'}}>
        <table style={{width:'100%',borderCollapse:'collapse'}}>
          <thead>
            <tr style={{background:C.surfaceAlt}}>
              <th style={{padding:'10px 14px',width:36}}>
                <input type="checkbox" onChange={e=>{
                  const fail=filtered.filter(s=>s.failCount>0);
                  setSelected(e.target.checked?fail.map(s=>s.id):[]);
                }} style={{cursor:'pointer'}}/>
              </th>
              {['구독 ID','이름','플랜','다음 결제일','상태','결제 실패'].map(h=>(
                <th key={h} style={{padding:'10px 14px',fontSize:12,fontWeight:700,color:C.textSecondary,
                  textAlign:'left',letterSpacing:'0.03em'}}>{h}</th>
              ))}
            </tr>
          </thead>
          <tbody>
            {filtered.map((sub,i)=>(
              <tr key={sub.id} onClick={()=>setDetailSub(sub)} style={{borderBottom:`1px solid ${C.border}`,cursor:'pointer',
                transition:'background 150ms',animation:`slideUp 300ms ease ${i*40}ms both`}}
                onMouseEnter={e=>e.currentTarget.style.background=C.surfaceAlt}
                onMouseLeave={e=>e.currentTarget.style.background='transparent'}>
                <td style={{padding:'12px 14px'}} onClick={e=>e.stopPropagation()}>
                  {sub.failCount>0&&<input type="checkbox" checked={selected.includes(sub.id)}
                    onChange={e=>setSelected(prev=>e.target.checked?[...prev,sub.id]:prev.filter(id=>id!==sub.id))}
                    style={{cursor:'pointer'}}/>}
                </td>
                <td style={{padding:'12px 14px',fontSize:12,color:C.textSecondary,fontFamily:'monospace'}}>{sub.id}</td>
                <td style={{padding:'12px 14px',fontSize:13,fontWeight:600,color:C.textPrimary}}>{sub.name}</td>
                <td style={{padding:'12px 14px',fontSize:13,color:C.textSecondary}}>{sub.plan} · {sub.amount.toLocaleString()}원/{sub.unit}</td>
                <td style={{padding:'12px 14px',fontSize:13,color:C.textSecondary}}>{sub.nextDate}</td>
                <td style={{padding:'12px 14px'}}><StatusBadge status={sub.status}/></td>
                <td style={{padding:'12px 14px'}}>
                  {sub.failCount>0?<span style={{fontSize:12,color:C.error,fontWeight:700}}>
                    {sub.failCount}회 실패
                  </span>:<span style={{fontSize:12,color:C.success}}>—</span>}
                </td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>

      {/* 구독자 상세 */}
      {detailSub&&(
        <Modal title="구독자 상세" onClose={()=>setDetailSub(null)} width={480}>
          <div>
            <div style={{display:'flex',alignItems:'center',gap:12,marginBottom:20}}>
              <div style={{width:44,height:44,borderRadius:'50%',background:`linear-gradient(135deg,${C.primary},${C.accent})`,
                display:'flex',alignItems:'center',justifyContent:'center',fontSize:20,flexShrink:0}}>👤</div>
              <div>
                <h3 style={{fontSize:17,fontWeight:700,color:C.textPrimary}}>{detailSub.name}</h3>
                <p style={{fontSize:13,color:C.textSecondary}}>{detailSub.id}</p>
              </div>
              <div style={{marginLeft:'auto'}}><StatusBadge status={detailSub.status}/></div>
            </div>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginBottom:16}}>
              {[{label:'구독 플랜',val:detailSub.plan},{label:'결제 금액',val:`${detailSub.amount.toLocaleString()}원/${detailSub.unit}`},
                {label:'가입일',val:detailSub.joinDate},{label:'다음 결제일',val:detailSub.nextDate}].map((f,i)=>(
                <div key={i} style={{background:C.surfaceAlt,borderRadius:9,padding:12}}>
                  <p style={{fontSize:11,color:C.textLight,marginBottom:3}}>{f.label}</p>
                  <p style={{fontSize:14,fontWeight:700,color:C.textPrimary}}>{f.val}</p>
                </div>
              ))}
            </div>
            {detailSub.failCount>0&&(
              <div style={{background:C.errorBg,borderRadius:10,padding:14,marginBottom:16,
                display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                <span style={{fontSize:13,color:C.error,fontWeight:600}}>결제 실패 {detailSub.failCount}회</span>
                <button onClick={()=>{setDetailSub(null);showToast('결제 재시도가 요청되었습니다');}} style={{
                  padding:'6px 14px',borderRadius:8,border:'none',
                  background:C.error,color:'#fff',fontWeight:600,cursor:'pointer',fontSize:12,fontFamily:'Pretendard,sans-serif'}}>
                  재시도
                </button>
              </div>
            )}
            <button onClick={()=>setDetailSub(null)} style={{width:'100%',padding:'12px',borderRadius:10,
              border:`1.5px solid ${C.border}`,background:'transparent',color:C.textSecondary,
              fontWeight:600,cursor:'pointer',fontFamily:'Pretendard,sans-serif'}}>닫기</button>
          </div>
        </Modal>
      )}
    </div>
  );
}

      {/* 주문 상세 모달 */}
      {selectedOrder&&!showRefundModal&&(
        <Modal title="주문 상세" onClose={()=>setSelectedOrder(null)} width={500}>
          <div>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginBottom:20}}>
              {[{label:'주문번호',val:selectedOrder.id},{label:'주문일',val:selectedOrder.date},
                {label:'고객',val:selectedOrder.customer},{label:'작품',val:selectedOrder.item},
                {label:'결제 금액',val:`${selectedOrder.amount.toLocaleString()}원`},{label:'결제 방법',val:selectedOrder.payType}].map((f,i)=>(
                <div key={i} style={{background:C.surfaceAlt,borderRadius:9,padding:12}}>
                  <p style={{fontSize:11,color:C.textLight,marginBottom:3}}>{f.label}</p>
                  <p style={{fontSize:14,fontWeight:700,color:C.textPrimary}}>{f.val}</p>
                </div>
              ))}
            </div>
            <h4 style={{fontSize:14,fontWeight:700,color:C.textPrimary,marginBottom:10}}>상태 변경 이력</h4>
            <div style={{display:'flex',flexDirection:'column',gap:8,marginBottom:20}}>
              {[{status:'결제완료',time:'2025.01.08 14:32',actor:'시스템'},
                ...(selectedOrder.status==='배송중'||selectedOrder.status==='배송완료'?[{status:'배송중',time:'2025.01.08 18:00',actor:'물류팀'}]:[]),
                ...(selectedOrder.status==='배송완료'?[{status:'배송완료',time:'2025.01.09 13:45',actor:'택배사'}]:[]),
                ...(selectedOrder.status==='환불완료'?[{status:'환불완료',time:'2025.01.08 15:10',actor:'관리자'}]:[])
              ].map((h,i)=>(
                <div key={i} style={{display:'flex',alignItems:'center',gap:10}}>
                  <div style={{width:8,height:8,borderRadius:'50%',background:C.primary,flexShrink:0}}/>
                  <div style={{flex:1}}>
                    <span style={{fontSize:13,fontWeight:600,color:C.textPrimary,marginRight:8}}>{h.status}</span>
                    <span style={{fontSize:12,color:C.textLight}}>{h.time} · {h.actor}</span>
                  </div>
                </div>
              ))}
            </div>
            <button onClick={()=>setSelectedOrder(null)} style={{width:'100%',padding:'12px',borderRadius:10,
              border:`1.5px solid ${C.border}`,background:'transparent',color:C.textSecondary,
              fontWeight:600,cursor:'pointer',fontFamily:'Pretendard,sans-serif'}}>닫기</button>
          </div>
        </Modal>
      )}

      {/* 환불 모달 */}
      {showRefundModal&&selectedOrder&&(
        <Modal title="환불 처리" onClose={()=>{setShowRefundModal(false);setSelectedOrder(null);}} width={440}>
          <div style={{textAlign:'center',padding:'8px 0'}}>
            <div style={{fontSize:40,marginBottom:12}}>💳</div>
            <p style={{fontSize:15,fontWeight:600,color:C.textPrimary,marginBottom:6}}>{selectedOrder.item}</p>
            <p style={{fontSize:24,fontWeight:800,color:C.error,marginBottom:6}}>{selectedOrder.amount.toLocaleString()}원</p>
            <p style={{fontSize:13,color:C.textSecondary,marginBottom:24}}>환불 처리 시 토스페이먼츠를 통해 자동으로 결제 취소됩니다.</p>
            <div style={{background:C.surfaceAlt,borderRadius:10,padding:14,marginBottom:20,textAlign:'left'}}>
              <p style={{fontSize:13,color:C.textSecondary}}>고객: <strong>{selectedOrder.customer}</strong></p>
              <p style={{fontSize:13,color:C.textSecondary,marginTop:4}}>주문: {selectedOrder.id}</p>
            </div>
            <div style={{display:'flex',gap:12}}>
              <button onClick={()=>{setShowRefundModal(false);setSelectedOrder(null);}} style={{flex:1,padding:'12px',
                borderRadius:10,border:`1.5px solid ${C.border}`,background:'transparent',
                color:C.textSecondary,fontWeight:600,cursor:'pointer',fontFamily:'Pretendard,sans-serif'}}>취소</button>
              <button onClick={()=>{
                setOrders(prev=>prev.map(o=>o.id===selectedOrder.id?{...o,status:'환불완료'}:o));
                setShowRefundModal(false);setSelectedOrder(null);showToast('환불 처리가 완료되었습니다');
              }} style={{flex:2,padding:'12px',borderRadius:10,border:'none',
                background:C.error,color:'#fff',fontWeight:700,cursor:'pointer',fontFamily:'Pretendard,sans-serif'}}>
                환불 확인
              </button>
            </div>
          </div>
        </Modal>
      )}
    </div>
  );
}

/* ─── Sidebar ─── */
function Sidebar({page,setPage}) {
  const NAV=[
    {id:'dashboard',label:'대시보드',icon:'📊'},
    {id:'inventory',label:'재고관리',icon:'🖼️'},
    {id:'subscribers',label:'구독관리',icon:'👥'},
    {id:'orders',label:'주문관리',icon:'📦'},
  ];
  return (
    <aside style={{width:220,background:C.secondary,flexShrink:0,display:'flex',flexDirection:'column',
      boxShadow:'2px 0 8px rgba(0,0,0,0.1)'}}>
      {/* 로고 */}
      <div style={{padding:'24px 20px',borderBottom:'1px solid rgba(255,255,255,0.08)'}}>
        <div style={{display:'flex',alignItems:'center',gap:10}}>
          <div style={{width:34,height:34,borderRadius:8,
            background:`linear-gradient(135deg,${C.primary},${C.accent})`,
            display:'flex',alignItems:'center',justifyContent:'center',fontSize:18}}>🎨</div>
          <div>
            <p style={{fontSize:15,fontWeight:800,color:'#fff',lineHeight:1.2}}>ArtNow</p>
            <p style={{fontSize:10,color:'rgba(255,255,255,0.4)',letterSpacing:'0.05em'}}>ADMIN</p>
          </div>
        </div>
      </div>
      {/* 네비 */}
      <nav style={{flex:1,padding:'12px 0'}}>
        {NAV.map(item=>(
          <button key={item.id} title={item.label} onClick={()=>setPage(item.id)} style={{
            width:'100%',padding:'12px 20px',border:'none',textAlign:'left',cursor:'pointer',
            background:page===item.id?`rgba(26,86,219,0.2)`:'transparent',
            color:page===item.id?'#fff':'rgba(255,255,255,0.55)',fontFamily:'Pretendard,sans-serif',
            display:'flex',alignItems:'center',gap:10,fontSize:14,fontWeight:page===item.id?700:400,
            transition:'all 150ms',borderLeft:page===item.id?`3px solid ${C.accent}`:'3px solid transparent'}}>
            <span style={{fontSize:18}}>{item.icon}</span>{item.label}
          </button>
        ))}
      </nav>
      {/* 사용자 */}
      <div style={{padding:'16px 20px',borderTop:'1px solid rgba(255,255,255,0.08)',
        display:'flex',alignItems:'center',gap:10}}>
        <div style={{width:32,height:32,borderRadius:'50%',
          background:`linear-gradient(135deg,${C.primary},${C.accent})`,
          display:'flex',alignItems:'center',justifyContent:'center',fontSize:16}}>👨‍💼</div>
        <div>
          <p style={{fontSize:13,fontWeight:600,color:'#fff'}}>운영자</p>
          <p style={{fontSize:11,color:'rgba(255,255,255,0.4)'}}>admin@artnow.kr</p>
        </div>
      </div>
    </aside>
  );
}

/* ─── TopBar ─── */
function TopBar({page}) {
  const titles={dashboard:'통합 대시보드',inventory:'재고관리',subscribers:'구독관리',orders:'주문관리'};
  return (
    <div style={{height:56,background:C.surface,borderBottom:`1px solid ${C.border}`,
      display:'flex',alignItems:'center',padding:'0 24px',gap:16,flexShrink:0}}>
      <div style={{flex:1}}>
        <h1 style={{fontSize:16,fontWeight:700,color:C.textPrimary}}>{titles[page]}</h1>
      </div>
      <div style={{display:'flex',alignItems:'center',gap:12}}>
        <div style={{position:'relative'}}>
          <span style={{fontSize:20}}>🔔</span>
          <span style={{position:'absolute',top:-4,right:-4,width:16,height:16,borderRadius:'50%',
            background:C.error,color:'#fff',fontSize:9,fontWeight:700,
            display:'flex',alignItems:'center',justifyContent:'center'}}>3</span>
        </div>
        <div style={{width:32,height:32,borderRadius:'50%',
          background:`linear-gradient(135deg,${C.primary},${C.accent})`,
          display:'flex',alignItems:'center',justifyContent:'center',fontSize:16,cursor:'pointer'}}>👤</div>
      </div>
    </div>
  );
}

/* ─── App ─── */
function App() {
  const [page,setPage]=React.useState('dashboard');
  const [toast,setToast]=React.useState(null);
  const [loading,setLoading]=React.useState(true);
  const showToast=msg=>{setToast(msg);setTimeout(()=>setToast(null),3200);};
  React.useEffect(()=>{setTimeout(()=>setLoading(false),1200);},[]);

  if(loading) return (
    <div style={{display:'flex',alignItems:'center',justifyContent:'center',
      height:'100vh',width:'100%',background:C.bg,flexDirection:'column',gap:16}}>
      <div style={{width:60,height:60,borderRadius:12,
        background:`linear-gradient(135deg,${C.primary},${C.accent})`,
        display:'flex',alignItems:'center',justifyContent:'center',fontSize:28}}>📊</div>
      {[0,1,2].map(i=>(
        <div key={i} style={{width:8,height:8,borderRadius:'50%',background:C.primary,display:'inline-block',margin:'0 4px',
          animation:`pulse 1.2s ease ${i*200}ms infinite`}}/>
      ))}
    </div>
  );

  return (
    <div style={{display:'flex',width:'100%',height:'100vh',overflow:'hidden',background:C.bg}}>
      <Sidebar page={page} setPage={setPage}/>
      <div style={{flex:1,display:'flex',flexDirection:'column',overflow:'hidden'}}>
        <TopBar page={page}/>
        <main style={{flex:1,overflow:'auto'}}>
          {page==='dashboard'&&<DashboardPage/>}
          {page==='inventory'&&<InventoryPage showToast={showToast}/>}
          {page==='subscribers'&&<SubscribersPage showToast={showToast}/>}
          {page==='orders'&&<OrdersPage showToast={showToast}/>}
        </main>
      </div>
      {toast&&<Toast message={toast} onClose={()=>setToast(null)}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
