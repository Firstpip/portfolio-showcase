<style>
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{width:100%;height:100%;font-family:'Pretendard',sans-serif;background:#F1F5F9}
  #root{display:flex;width:100%;height:100vh;overflow:hidden}
  @keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
  @keyframes fadeInScale{from{opacity:0;transform:scale(.88)}to{opacity:1;transform:scale(1)}}
  @keyframes slideInRight{from{opacity:0;transform:translateX(-18px)}to{opacity:1;transform:translateX(0)}}
  @keyframes slideUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
  @keyframes slideDown{from{opacity:0;transform:translateY(-10px)}to{opacity:1;transform:translateY(0)}}
  @keyframes ripple{0%{transform:scale(0);opacity:.35}100%{transform:scale(3.5);opacity:0}}
  @keyframes countUp{from{opacity:0;transform:translateY(6px) scale(.95)}to{opacity:1;transform:translateY(0) scale(1)}}
  @keyframes shimmer{0%{background-position:-400px 0}100%{background-position:400px 0}}
  @keyframes barGrow{from{width:0!important}to{width:var(--bar-w,100%)}}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
  @keyframes spin{to{transform:rotate(360deg)}}
  @keyframes modalIn{from{opacity:0;transform:scale(.94)}to{opacity:1;transform:scale(1)}}
  @keyframes toastIn{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
  .sidebar-item:hover{background:rgba(255,255,255,.08)!important;cursor:pointer}
  .sidebar-item.active{background:rgba(37,99,235,.25)!important;border-left:3px solid #2563EB}
  .btn-primary{background:#2563EB;color:#fff;border:none;border-radius:8px;padding:8px 18px;font-size:13px;font-weight:600;cursor:pointer;transition:background .15s}
  .btn-primary:hover{background:#1d4ed8}
  .btn-secondary{background:#fff;color:#374151;border:1px solid #E2E8F0;border-radius:8px;padding:8px 18px;font-size:13px;font-weight:600;cursor:pointer;transition:all .15s}
  .btn-secondary:hover{background:#F8FAFC;border-color:#CBD5E1}
  .btn-danger{background:#EF4444;color:#fff;border:none;border-radius:8px;padding:8px 18px;font-size:13px;font-weight:600;cursor:pointer}
  .card{background:#fff;border-radius:10px;box-shadow:0 1px 3px rgba(0,0,0,.08),0 1px 2px rgba(0,0,0,.04);padding:20px;animation:slideUp .35s ease both}
  .badge{display:inline-flex;align-items:center;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600;animation:fadeInScale .2s ease both}
  .notif-panel{animation:slideDown .2s ease}
  .kpi-value{animation:countUp .5s ease both}
  .progress-fill{animation:barGrow .8s ease both}
  .btn-primary{position:relative;overflow:hidden}
  .badge-green{background:#D1FAE5;color:#065F46}
  .badge-blue{background:#DBEAFE;color:#1E40AF}
  .badge-orange{background:#FEF3C7;color:#92400E}
  .badge-gray{background:#F3F4F6;color:#374151}
  .badge-red{background:#FEE2E2;color:#991B1B}
  .table-row:hover{background:#F8FAFC;cursor:pointer}
  input,select,textarea{font-family:'Pretendard',sans-serif}
  ::-webkit-scrollbar{width:5px;height:5px}
  ::-webkit-scrollbar-track{background:transparent}
  ::-webkit-scrollbar-thumb{background:#CBD5E1;border-radius:3px}
</style>

function Toast({ msg, onClose }) {
  useEffect(() => { const t = setTimeout(onClose, 2800); return () => clearTimeout(t); }, []);
  return (
    <div style={{ position:'fixed', bottom:28, right:28, zIndex:9999, background:'#0F172A', color:'#fff',
      borderRadius:10, padding:'12px 20px', fontSize:13, fontWeight:500,
      boxShadow:'0 8px 24px rgba(0,0,0,.2)', animation:'toastIn .25s ease', display:'flex', alignItems:'center', gap:8 }}>
      <span style={{ color:'#10B981' }}>✓</span> {msg}
    </div>
  );
}

  );
}

// ─── 원고 작성 화면 ───
function EditorPage({ setToast }) {
  const [tab, setTab] = useState('write');
  const [content, setContent] = useState('');
  const [keyword, setKeyword] = useState('');
  const [generating, setGenerating] = useState(false);
  const [progress, setProgress] = useState(0);
  const [images, setImages] = useState([
    { name:'패딩_메인.jpg', size:'2.1MB', status:'업로드됨' },
    { name:'코디_예시.jpg', size:'1.8MB', status:'업로드됨' },
  ]);
  const [showImageModal, setShowImageModal] = useState(false);

  const generateDraft = () => {
    if (!keyword) return;
    setGenerating(true); setProgress(0); setContent('');
    const draft = `# ${keyword} 완벽 가이드\n\n안녕하세요! 오늘은 "${keyword}"에 대해 자세히 알아보겠습니다.\n\n## 1. 핵심 포인트\n\n${keyword}를 선택할 때 가장 중요한 것은 자신의 상황과 목적에 맞는 선택입니다. 전문가들의 의견을 종합해보면 다음 3가지를 꼭 확인해야 합니다:\n\n- 첫 번째: 품질과 가성비 균형\n- 두 번째: 실제 사용 환경 고려\n- 세 번째: 장기적인 유지보수 비용\n\n## 2. 추천 선택 기준\n\n수많은 옵션 중에서 최선의 선택을 위해 다음 기준으로 평가해보세요. 무엇보다 중요한 것은 실제 후기와 전문가 리뷰를 함께 참고하는 것입니다.\n\n## 3. 마무리\n\n이번 가이드가 여러분의 선택에 도움이 되셨으면 좋겠습니다. 궁금한 점은 댓글로 남겨주세요!`;
    let idx = 0;
    const interval = setInterval(() => {
      idx += 12;
      setProgress(Math.min(100, Math.round((idx/draft.length)*100)));
      setContent(draft.slice(0, idx));
      if (idx >= draft.length) { clearInterval(interval); setGenerating(false); setProgress(100); }
    }, 40);
  };

  const PREVIEW_HTML = content.replace(/^# (.+)$/gm,'<h2 style="font-size:20px;font-weight:800;margin:16px 0 8px">$1</h2>')
    .replace(/^## (.+)$/gm,'<h3 style="font-size:15px;font-weight:700;margin:14px 0 6px;color:#2563EB">$1</h3>')
    .replace(/^- (.+)$/gm,'<li style="margin:4px 0;font-size:13px;color:#374151">$1</li>')
    .replace(/\n/g,'<br/>');

  return (
    <div style={{ animation:'fadeIn .3s ease' }}>
      <div style={{ display:'flex', gap:16, marginBottom:20, alignItems:'flex-end' }}>
        <div style={{ flex:1 }}>
          <label style={{ fontSize:12, fontWeight:700, color:C.textSecondary, display:'block', marginBottom:6 }}>키워드 선택</label>
          <select style={{ ...selectStyle, width:'100%' }} value={keyword} onChange={e => setKeyword(e.target.value)}>
            <option value="">-- 키워드를 선택하세요 --</option>
            {KEYWORDS.map(k => <option key={k.id} value={k.name}>{k.name}</option>)}
          </select>
        </div>
        <button className="btn-primary" onClick={generateDraft} disabled={!keyword || generating}
          style={{ background: generating ? '#93C5FD' : C.primary, display:'flex', alignItems:'center', gap:6, whiteSpace:'nowrap' }}>
          {generating ? <><span style={{ animation:'spin .8s linear infinite', display:'inline-block' }}>⟳</span> 생성 중 {progress}%</> : '✨ AI 초안 생성'}
        </button>
        <button className="btn-secondary" onClick={() => setShowImageModal(true)}>📎 이미지 첨부</button>
      </div>

      {generating && (
        <div style={{ height:4, background:'#E2E8F0', borderRadius:2, marginBottom:16, overflow:'hidden' }}>
          <div style={{ height:'100%', background:`linear-gradient(90deg,${C.primary},${C.accent})`, borderRadius:2, width:`${progress}%`, transition:'width .1s' }} />
        </div>
      )}

      {images.length > 0 && (
        <div style={{ display:'flex', gap:8, marginBottom:16 }}>
          {images.map((img,i) => (
            <div key={i} style={{ display:'flex', alignItems:'center', gap:6, padding:'5px 10px', background:'#EFF6FF', borderRadius:6, fontSize:12 }}>
              <span>🖼</span><span style={{ color:'#1D4ED8', fontWeight:500 }}>{img.name}</span>
              <span style={{ color:C.textSecondary }}>({img.size})</span>
              <span className="badge badge-green" style={{ fontSize:10 }}>✓</span>
            </div>
          ))}
        </div>
      )}

      {/* 에디터 탭 */}
      <div style={{ display:'flex', gap:0, marginBottom:0, borderBottom:`1px solid ${C.border}` }}>
        {['write','preview'].map(t => (
          <button key={t} onClick={() => setTab(t)} style={{
            border:'none', background:'none', padding:'10px 20px', fontSize:13, fontWeight:600, cursor:'pointer',
            color: tab===t ? C.primary : C.textSecondary,
            borderBottom: tab===t ? `2px solid ${C.primary}` : '2px solid transparent',
            marginBottom:-1,
          }}>{t==='write'?'✏️ 작성':'👁 네이버 미리보기'}</button>
        ))}
      </div>

      {tab === 'write' ? (
        <textarea value={content} onChange={e => setContent(e.target.value)}
          style={{ ...textareaStyle, minHeight:380, borderTop:'none', borderRadius:'0 0 8px 8px',
            fontFamily:'monospace', fontSize:13, lineHeight:1.8, background:generating?'#FAFAFA':'#fff' }}
          placeholder="AI 초안 생성 버튼을 클릭하거나 직접 원고를 작성하세요..." />
      ) : (
        <div style={{ minHeight:380, border:`1px solid ${C.border}`, borderTop:'none', borderRadius:'0 0 8px 8px',
          padding:20, background:'#FAFFFE', fontFamily:'sans-serif', lineHeight:1.8, fontSize:13 }}>
          <div style={{ maxWidth:640, margin:'0 auto', padding:'0 16px' }}>
            <div style={{ background:'#03C75A', color:'#fff', padding:'8px 16px', fontSize:11, fontWeight:700, marginBottom:16, borderRadius:4 }}>
              📌 네이버 블로그 미리보기
            </div>
            <div dangerouslySetInnerHTML={{ __html: PREVIEW_HTML || '<p style="color:#94A3B8;text-align:center;padding:40px 0">작성 탭에서 내용을 입력하면 미리보기가 표시됩니다</p>' }} />
          </div>
        </div>
      )}

      <div style={{ display:'flex', gap:8, justifyContent:'flex-end', marginTop:16 }}>
        <button className="btn-secondary">임시 저장</button>
        <button className="btn-primary" onClick={() => setToast('원고가 저장되었습니다')}>저장 완료</button>
      </div>

      {showImageModal && (
        <Modal title="이미지 첨부" onClose={() => setShowImageModal(false)}>
          <div style={{ border:`2px dashed ${C.border}`, borderRadius:10, padding:'32px 24px', textAlign:'center', marginBottom:16, cursor:'pointer',
            background:'#F8FAFC', transition:'all .15s' }}
            onMouseEnter={e => e.currentTarget.style.borderColor=C.primary}
            onMouseLeave={e => e.currentTarget.style.borderColor=C.border}
            onClick={() => { setImages(prev => [...prev, { name:`이미지_${Date.now()%1000}.jpg`, size:'1.5MB', status:'업로드됨' }]); setToast('이미지가 첨부되었습니다'); setShowImageModal(false); }}>
            <div style={{ fontSize:36, marginBottom:8 }}>📤</div>
            <div style={{ fontSize:13, fontWeight:600, color:C.textPrimary }}>클릭하거나 파일을 드래그하세요</div>
            <div style={{ fontSize:12, color:C.textSecondary, marginTop:4 }}>JPG, PNG, GIF · 최대 10MB</div>
          </div>
          <div style={{ display:'flex', gap:8, justifyContent:'flex-end' }}>
            <button className="btn-secondary" onClick={() => setShowImageModal(false)}>닫기</button>
          </div>
        </Modal>
      )}
    </div>
  );
}

            }}>{l}</button>
          ))}
        </div>
        <button className="btn-primary" onClick={() => tab==='naver' ? setShowAddAccount(true) : setShowAddStaff(true)}>
          + {tab==='naver'?'계정 등록':'직원 추가'}
        </button>
      </div>

      {tab === 'naver' && (
        <div className="card" style={{ padding:0 }}>
          <table style={{ width:'100%', borderCollapse:'collapse' }}>
            <thead>
              <tr style={{ borderBottom:`2px solid ${C.border}` }}>
                {['계정명','유형','쿨다운','발행 수','마지막 사용','상태','액션'].map(h => (
                  <th key={h} style={{ textAlign:'left', padding:'12px 16px', fontSize:11, fontWeight:700, color:C.textSecondary, textTransform:'uppercase', letterSpacing:'.5px' }}>{h}</th>
                ))}
              </tr>
            </thead>
            <tbody>
              {ACCOUNTS.map(a => (
                <tr key={a.id} className="table-row" style={{ borderBottom:`1px solid ${C.border}` }} onClick={() => setSelectedAccount(a)}>
                  <td style={{ padding:'12px 16px', fontFamily:'monospace', fontSize:13, fontWeight:600, color:C.textPrimary }}>{a.name}</td>
                  <td style={{ padding:'12px 16px', fontSize:12, color:C.textSecondary }}>{a.type}</td>
                  <td style={{ padding:'12px 16px', fontSize:12, color:C.textSecondary }}>{a.cooldown}</td>
                  <td style={{ padding:'12px 16px', fontSize:12, fontWeight:600, color:C.textPrimary }}>{a.postCount}건</td>
                  <td style={{ padding:'12px 16px', fontSize:12, color:C.textSecondary }}>{a.lastUsed}</td>
                  <td style={{ padding:'12px 16px' }}>
                    <span className={`badge ${a.status==='활성'?'badge-green':'badge-gray'}`}>{a.status}</span>
                  </td>
                  <td style={{ padding:'12px 16px' }}>
                    <button className="btn-secondary" style={{ fontSize:11, padding:'4px 10px' }}
                      onClick={e => { e.stopPropagation(); setToast(`${a.name} 상태가 변경되었습니다`); }}>
                      {a.status==='활성'?'비활성화':'활성화'}
                    </button>
                  </td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      )}

      {tab === 'staff' && (
        <div className="card" style={{ padding:0 }}>
          <table style={{ width:'100%', borderCollapse:'collapse' }}>
            <thead>
              <tr style={{ borderBottom:`2px solid ${C.border}` }}>
                {['이름','이메일','역할','배정 키워드','상태'].map(h => (
                  <th key={h} style={{ textAlign:'left', padding:'12px 16px', fontSize:11, fontWeight:700, color:C.textSecondary, textTransform:'uppercase', letterSpacing:'.5px' }}>{h}</th>
                ))}
              </tr>
            </thead>
            <tbody>
              {STAFF.map(s => (
                <tr key={s.id} className="table-row" style={{ borderBottom:`1px solid ${C.border}` }}>
                  <td style={{ padding:'12px 16px', fontSize:13, fontWeight:600, color:C.textPrimary }}>{s.name}</td>
                  <td style={{ padding:'12px 16px', fontSize:12, color:C.textSecondary }}>{s.email}</td>
                  <td style={{ padding:'12px 16px' }}>
                    <span className={`badge ${s.role==='팀장'?'badge-blue':'badge-gray'}`}>{s.role}</span>
                  </td>
                  <td style={{ padding:'12px 16px', fontSize:12, color:C.textSecondary }}>{s.assignedKeywords}개</td>
                  <td style={{ padding:'12px 16px' }}><span className="badge badge-green">{s.status}</span></td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      )}

      {/* 계정 상세 모달 */}
      {selectedAccount && (
        <Modal title="계정 상세 정보" onClose={() => setSelectedAccount(null)}>
          <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:12, marginBottom:16 }}>
            {[['계정명', selectedAccount.name],['유형', selectedAccount.type],['쿨다운', selectedAccount.cooldown],['발행 수', `${selectedAccount.postCount}건`],['마지막 사용', selectedAccount.lastUsed],['상태', selectedAccount.status]].map(([k,v]) => (
              <div key={k} style={{ padding:'10px 14px', background:'#F8FAFC', borderRadius:8 }}>
                <div style={{ fontSize:11, color:C.textSecondary, marginBottom:3 }}>{k}</div>
                <div style={{ fontSize:13, fontWeight:600, color:C.textPrimary }}>{v}</div>
              </div>
            ))}
          </div>
          <div style={{ padding:'10px 14px', background:'#FEF3C7', borderRadius:8, fontSize:12, color:'#92400E', marginBottom:16 }}>
            🔐 비밀번호는 AES-256 암호화로 저장됩니다. 마스킹 표시 이외의 방법으로는 조회되지 않습니다.
          </div>
          <div style={{ display:'flex', gap:8, justifyContent:'flex-end' }}>
            <button className="btn-secondary" onClick={() => setSelectedAccount(null)}>닫기</button>
            <button className="btn-primary" onClick={() => { setToast('계정 정보가 업데이트되었습니다'); setSelectedAccount(null); }}>수정</button>
          </div>
        </Modal>
      )}

      {/* 계정 등록 모달 */}
      {showAddAccount && (
        <Modal title="네이버 계정 등록" onClose={() => setShowAddAccount(false)}>
          <FormField label="계정 아이디">
            <input style={inputStyle} placeholder="예: naver_myaccount01" value={acForm.name} onChange={e => setAcForm({...acForm,name:e.target.value})} />
          </FormField>
          <FormField label="비밀번호">
            <input style={inputStyle} type="password" placeholder="••••••••" value={acForm.password} onChange={e => setAcForm({...acForm,password:e.target.value})} />
          </FormField>
          <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:12 }}>
            <FormField label="계정 유형">
              <select style={selectStyle} value={acForm.type} onChange={e => setAcForm({...acForm,type:e.target.value})}>
                {['블로그','카페','카페/블로그'].map(t => <option key={t}>{t}</option>)}
              </select>
            </FormField>
            <FormField label="쿨다운 (분)">
              <select style={selectStyle} value={acForm.cooldown} onChange={e => setAcForm({...acForm,cooldown:e.target.value})}>
                {['5','10','15','30'].map(t => <option key={t} value={t}>{t}분</option>)}
              </select>
            </FormField>
          </div>
          <div style={{ padding:'10px 14px', background:'#DBEAFE', borderRadius:8, fontSize:12, color:'#1D4ED8', marginBottom:8 }}>
            🔐 비밀번호는 AES-256으로 암호화되어 저장됩니다.
          </div>
          <div style={{ display:'flex', gap:8, justifyContent:'flex-end' }}>
            <button className="btn-secondary" onClick={() => setShowAddAccount(false)}>취소</button>
            <button className="btn-primary" onClick={() => { setToast('계정이 등록되었습니다'); setShowAddAccount(false); }}>등록</button>
          </div>
        </Modal>
      )}

      {/* 직원 추가 모달 */}
      {showAddStaff && (
        <Modal title="직원 추가" onClose={() => setShowAddStaff(false)}>
          <FormField label="이름">
            <input style={inputStyle} placeholder="예: 홍길동" value={staffForm.name} onChange={e => setStaffForm({...staffForm,name:e.target.value})} />
          </FormField>
          <FormField label="이메일">
            <input style={inputStyle} type="email" placeholder="example@company.com" value={staffForm.email} onChange={e => setStaffForm({...staffForm,email:e.target.value})} />
          </FormField>
          <FormField label="권한 역할">
            <select style={selectStyle} value={staffForm.role} onChange={e => setStaffForm({...staffForm,role:e.target.value})}>
              {['최고관리자','팀장','작업자'].map(r => <option key={r}>{r}</option>)}
            </select>
          </FormField>
          <div style={{ display:'flex', gap:8, justifyContent:'flex-end' }}>
            <button className="btn-secondary" onClick={() => setShowAddStaff(false)}>취소</button>
            <button className="btn-primary" onClick={() => { setToast('직원이 추가되었습니다'); setShowAddStaff(false); }}>추가</button>
          </div>
        </Modal>
      )}
    </div>
  );
}

// ─── 앱 루트 ───
const NAV_ITEMS = [
  { id:'main', label:'대시보드', icon:'📊' },
  { id:'editor', label:'원고 작성', icon:'✏️' },
  { id:'publish', label:'발행 관리', icon:'📤' },
  { id:'accounts', label:'계정 관리', icon:'👤' },
  { id:'keywords', label:'키워드 관리', icon:'🔑' },
];

const PAGE_TITLES = {
  main:'운영 대시보드', editor:'원고 작성', publish:'발행 관리', accounts:'계정 관리', keywords:'키워드 관리',
};

function App() {
  const [page, setPage] = useState('main');
  const [toast, setToast] = useState(null);
  const [notifOpen, setNotifOpen] = useState(false);

  return (
    <div style={{ display:'flex', width:'100%', height:'100vh', overflow:'hidden' }}>
      {/* 사이드바 */}
      <aside style={{ width:260, background:C.sidebarBg, flexShrink:0, display:'flex', flexDirection:'column', borderRight:'1px solid rgba(255,255,255,.06)' }}>
        {/* 로고 */}
        <div style={{ padding:'20px 20px 16px', borderBottom:'1px solid rgba(255,255,255,.06)' }}>
          <div style={{ display:'flex', alignItems:'center', gap:10 }}>
            <div style={{ width:32, height:32, borderRadius:8, background:`linear-gradient(135deg, ${C.primary}, ${C.accent})`, display:'flex', alignItems:'center', justifyContent:'center', fontSize:16 }}>📣</div>
            <div>
              <div style={{ fontSize:14, fontWeight:800, color:'#F1F5F9', letterSpacing:'-0.3px' }}>ContentCMS</div>
              <div style={{ fontSize:10, color:C.sidebarText }}>콘텐츠 마케팅 관리</div>
            </div>
          </div>
        </div>

        {/* 네비 메뉴 */}
        <nav style={{ flex:1, padding:'12px 10px', overflowY:'auto' }}>
          <div style={{ fontSize:10, fontWeight:700, color:'#475569', letterSpacing:'1px', padding:'8px 10px 4px', textTransform:'uppercase' }}>주요 메뉴</div>
          {NAV_ITEMS.map(item => (
            <div key={item.id} className={`sidebar-item ${page===item.id?'active':''}`}
              onClick={() => setPage(item.id)}
              style={{ display:'flex', alignItems:'center', gap:10, padding:'9px 12px', borderRadius:8, marginBottom:2,
                borderLeft: page===item.id ? `3px solid ${C.primary}` : '3px solid transparent',
                transition:'all .15s' }}>
              <span style={{ fontSize:16, flexShrink:0 }}>{item.icon}</span>
              <span style={{ fontSize:13, fontWeight:600, color: page===item.id ? '#F1F5F9' : C.sidebarText }}>{item.label}</span>
              {item.id==='publish' && <span style={{ marginLeft:'auto', background:'#EF4444', color:'#fff', borderRadius:10, fontSize:10, padding:'1px 6px', fontWeight:700 }}>1</span>}
            </div>
          ))}
        </nav>

        {/* 유저 정보 */}
        <div style={{ padding:'12px 10px', borderTop:'1px solid rgba(255,255,255,.06)' }}>
          <div style={{ display:'flex', alignItems:'center', gap:10, padding:'10px 12px', borderRadius:8, cursor:'pointer',
            transition:'background .15s' }}
            onMouseEnter={e => e.currentTarget.style.background='rgba(255,255,255,.05)'}
            onMouseLeave={e => e.currentTarget.style.background='transparent'}>
            <div style={{ width:32, height:32, borderRadius:'50%', background:`linear-gradient(135deg,${C.primary},${C.accent})`, display:'flex', alignItems:'center', justifyContent:'center', fontSize:14, color:'#fff', fontWeight:700 }}>김</div>
            <div>
              <div style={{ fontSize:13, fontWeight:600, color:'#F1F5F9' }}>김민준 팀장</div>
              <div style={{ fontSize:11, color:C.sidebarText }}>minjun@company.com</div>
            </div>
          </div>
        </div>
      </aside>

      {/* 메인 영역 */}
      <div style={{ flex:1, display:'flex', flexDirection:'column', minWidth:0 }}>
        {/* 탑바 */}
        <header style={{ height:56, background:'#fff', borderBottom:`1px solid ${C.border}`,
          display:'flex', alignItems:'center', padding:'0 24px', gap:12, flexShrink:0 }}>
          <h1 style={{ fontSize:16, fontWeight:700, color:C.textPrimary, flex:1 }}>{PAGE_TITLES[page]}</h1>
          {/* 검색 */}
          <div style={{ display:'flex', alignItems:'center', gap:8, background:'#F8FAFC', border:`1px solid ${C.border}`, borderRadius:8, padding:'6px 12px', width:220 }}>
            <span style={{ fontSize:14, color:C.textSecondary }}>🔍</span>
            <input style={{ border:'none', background:'transparent', outline:'none', fontSize:13, color:C.textPrimary, width:'100%', fontFamily:'Pretendard,sans-serif' }} placeholder="키워드, 원고 검색…" />
          </div>
          {/* 알림 */}
          <div style={{ position:'relative' }}>
            <button onClick={() => setNotifOpen(!notifOpen)} style={{ width:36, height:36, borderRadius:8, border:`1px solid ${C.border}`, background:'#fff', cursor:'pointer', fontSize:16, display:'flex', alignItems:'center', justifyContent:'center', position:'relative' }}>
              🔔
              <span style={{ position:'absolute', top:4, right:4, width:8, height:8, borderRadius:'50%', background:'#EF4444', border:'2px solid #fff' }} />
            </button>
            {notifOpen && (
              <div style={{ position:'absolute', top:42, right:0, background:'#fff', borderRadius:10, boxShadow:'0 8px 32px rgba(0,0,0,.12)', border:`1px solid ${C.border}`, width:280, zIndex:200 }}>
                <div style={{ padding:'12px 16px', borderBottom:`1px solid ${C.border}`, fontSize:13, fontWeight:700, color:C.textPrimary }}>알림</div>
                {[
                  { icon:'❌', msg:'자취 1년차 원고 발행 실패 (CAPTCHA)', time:'5분 전', color:'#FEE2E2' },
                  { icon:'✅', msg:'남성 패딩 추천 발행 성공', time:'1시간 전', color:'#D1FAE5' },
                  { icon:'⏰', msg:'홈트레이닝 예약 발행 3건 대기 중', time:'2시간 전', color:'#FEF3C7' },
                ].map((n,i) => (
                  <div key={i} style={{ padding:'10px 16px', borderBottom:`1px solid ${C.border}`, cursor:'pointer', background:n.color+'33', display:'flex', gap:10, alignItems:'flex-start' }}
                    onClick={() => setNotifOpen(false)}>
                    <span style={{ fontSize:16, flexShrink:0 }}>{n.icon}</span>
                    <div>
                      <div style={{ fontSize:12, fontWeight:600, color:C.textPrimary }}>{n.msg}</div>
                      <div style={{ fontSize:11, color:C.textSecondary, marginTop:2 }}>{n.time}</div>
                    </div>
                  </div>
                ))}
              </div>
            )}
          </div>
        </header>

        {/* 콘텐츠 */}
        <main style={{ flex:1, overflowY:'auto', padding:24, background:C.bg }}>
          {page === 'main' && <DashboardPage setPage={setPage} />}
          {page === 'editor' && <EditorPage setToast={setToast} />}
          {page === 'publish' && <PublishPage setToast={setToast} />}
          {page === 'accounts' && <AccountsPage setToast={setToast} />}
          {page === 'keywords' && <KeywordsPage setToast={setToast} />}
        </main>
      </div>

      {toast && <Toast msg={toast} onClose={() => setToast(null)} />}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
