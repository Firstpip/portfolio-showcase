<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<link rel="preconnect" href="https://cdn.jsdelivr.net" />
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" rel="stylesheet" />
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://unpkg.com/prop-types/prop-types.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/recharts@2.15.0/umd/Recharts.min.js"></script>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{width:100%;height:100%;font-family:'Pretendard',sans-serif;background:#0F172A}
  #root{display:flex;flex-direction:column;width:100%;min-height:100vh}
  @keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
  @keyframes fadeInScale{from{opacity:0;transform:scale(.88)}to{opacity:1;transform:scale(1)}}
  @keyframes slideInRight{from{opacity:0;transform:translateX(-16px)}to{opacity:1;transform:translateX(0)}}
  @keyframes slideUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
  @keyframes slideDown{from{opacity:0;transform:translateY(-10px)}to{opacity:1;transform:translateY(0)}}
  @keyframes ripple{0%{transform:scale(0);opacity:.35}100%{transform:scale(3.5);opacity:0}}
  @keyframes countUp{from{opacity:0;transform:translateY(8px) scale(.92)}to{opacity:1;transform:translateY(0) scale(1)}}
  @keyframes shimmer{0%{background-position:-400px 0}100%{background-position:400px 0}}
  @keyframes barGrow{from{width:0!important}to{width:var(--bar-w,100%)}}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
  @keyframes spin{to{transform:rotate(360deg)}}
  @keyframes slideLeft{from{transform:translateX(100%);opacity:0}to{transform:translateX(0);opacity:1}}
  @keyframes modalIn{from{opacity:0;transform:scale(.94)}to{opacity:1;transform:scale(1)}}
  @keyframes toastIn{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
  @keyframes glow{0%,100%{box-shadow:0 0 10px rgba(99,102,241,.3)}50%{box-shadow:0 0 20px rgba(99,102,241,.6)}}
  .nav-tab{border:none;background:none;padding:8px 16px;font-size:13px;font-weight:600;cursor:pointer;transition:all .15s;border-radius:8px;font-family:'Pretendard',sans-serif}
  .nav-tab:hover{background:rgba(255,255,255,.07)}
  .nav-tab.active{background:rgba(99,102,241,.2);color:#A5B4FC}
  .card-dark{background:#1E293B;border-radius:16px;border:1px solid rgba(255,255,255,.06);padding:24px;animation:slideUp .35s ease both}
  .card-dark:hover{border-color:rgba(99,102,241,.35);transform:scale(1.018);box-shadow:0 12px 32px rgba(99,102,241,.18);transition:all .2s ease}
  .badge{animation:fadeInScale .2s ease both}
  .kpi-val{animation:countUp .55s ease both}
  .shimmer-bar{background:linear-gradient(90deg,rgba(255,255,255,.04) 25%,rgba(255,255,255,.1) 50%,rgba(255,255,255,.04) 75%);background-size:800px 100%;animation:shimmer 1.6s infinite}
  .hero-kpi{animation:slideInRight .4s ease both}
  .nav-notif{animation:slideDown .2s ease}
  .bar-fill{animation:barGrow .8s ease both}
  .btn-primary{position:relative;overflow:hidden}
  .badge{display:inline-flex;align-items:center;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600}
  .badge-green{background:rgba(16,185,129,.15);color:#34D399}
  .badge-blue{background:rgba(99,102,241,.2);color:#A5B4FC}
  .badge-orange{background:rgba(251,191,36,.15);color:#FCD34D}
  .badge-gray{background:rgba(148,163,184,.1);color:#94A3B8}
  .badge-red{background:rgba(239,68,68,.15);color:#FCA5A5}
  .badge-cyan{background:rgba(6,182,212,.15);color:#67E8F9}
  .btn-primary{background:#6366F1;color:#fff;border:none;border-radius:10px;padding:8px 18px;font-size:13px;font-weight:600;cursor:pointer;transition:all .15s;font-family:'Pretendard',sans-serif}
  .btn-primary:hover{background:#4F46E5;box-shadow:0 4px 12px rgba(99,102,241,.4)}
  .btn-secondary{background:rgba(255,255,255,.06);color:#E2E8F0;border:1px solid rgba(255,255,255,.1);border-radius:10px;padding:8px 18px;font-size:13px;font-weight:600;cursor:pointer;transition:all .15s;font-family:'Pretendard',sans-serif}
  .btn-secondary:hover{background:rgba(255,255,255,.1)}
  .table-row-dark:hover{background:rgba(255,255,255,.04);cursor:pointer}
  .row-clickable{cursor:pointer;transition:background .1s}
  input,select,textarea{font-family:'Pretendard',sans-serif}
  ::-webkit-scrollbar{width:5px;height:5px}
  ::-webkit-scrollbar-track{background:transparent}
  ::-webkit-scrollbar-thumb{background:#334155;border-radius:3px}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">

  { id:4, keyword:'홈트레이닝 루틴', article:'집에서 20분으로 끝내는 전신 홈트', cafe:'건강/운동', noShow:false, comment:false, modified:false, lastCheck:'2025-05-10 14:20', flag:null },
  { id:5, keyword:'강아지 훈련 방법', article:'강아지 기초 훈련 완전 정복', cafe:'반려동물', noShow:true, comment:false, modified:false, lastCheck:'2025-05-10 14:18', flag:'재발행' },

  { name:'누락', value:5, color:'#EF4444' },
  { name:'재발행', value:3, color:'#F59E0B' },

const SHEETS_HISTORY = [
  { id:1, type:'Import', sheet:'키워드_마스터_v3.xlsx', rows:342, status:'완료', time:'2025-05-09 10:30', duration:'2분 14초' },
  { id:2, type:'Export', sheet:'발행현황_주간리포트', rows:156, status:'완료', time:'2025-05-08 17:00', duration:'45초' },

// ─── 공통 컴포넌트 ───
function Toast({ msg, onClose }) {
  useEffect(() => { const t = setTimeout(onClose, 2800); return () => clearTimeout(t); }, []);
  return (
    <div style={{ position:'fixed', bottom:28, right:28, zIndex:9999,
      background:'#1E293B', color:'#F1F5F9', border:`1px solid ${C.primary}`,
      borderRadius:12, padding:'12px 20px', fontSize:13, fontWeight:500,
      boxShadow:'0 8px 32px rgba(0,0,0,.4)', animation:'toastIn .25s ease', display:'flex', alignItems:'center', gap:8 }}>
      <span style={{ color:C.primary }}>✓</span> {msg}
    </div>
  );
}

function Drawer({ item, onClose, children }) {
  return (
    <>
      <div onClick={onClose} style={{ position:'fixed', inset:0, background:'rgba(0,0,0,.6)', zIndex:200 }} />
      <div style={{ position:'fixed', top:0, right:0, bottom:0, width:480,
        background:C.surface, borderLeft:`1px solid ${C.border}`, zIndex:201,
        overflowY:'auto', padding:28, animation:'slideLeft .2s ease' }}>
        <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:24 }}>
          <h3 style={{ fontSize:16, fontWeight:700, color:C.textPrimary }}>{item.title || item.keyword || '상세 정보'}</h3>
          <button onClick={onClose} style={{ background:'rgba(255,255,255,.08)', border:'none', borderRadius:8, width:32, height:32, cursor:'pointer', color:C.textPrimary, fontSize:16 }}>✕</button>
        </div>
        {children}
      </div>
    </>
  );
}

function Modal({ title, onClose, children, width=520 }) {
  return (
    <div style={{ position:'fixed', inset:0, background:'rgba(0,0,0,.65)', zIndex:1000, display:'flex', alignItems:'center', justifyContent:'center' }}
      onClick={e => e.target===e.currentTarget&&onClose()}>
      <div style={{ background:C.surface, borderRadius:16, width, maxHeight:'88vh', overflowY:'auto',
        border:`1px solid ${C.border}`, boxShadow:'0 24px 64px rgba(0,0,0,.4)', animation:'modalIn .2s ease' }}>
        <div style={{ padding:'20px 24px', borderBottom:`1px solid ${C.border}`, display:'flex', justifyContent:'space-between', alignItems:'center' }}>
          <h3 style={{ fontSize:16, fontWeight:700, color:C.textPrimary }}>{title}</h3>
          <button onClick={onClose} style={{ background:'none', border:'none', cursor:'pointer', fontSize:18, color:C.textSecondary }}>✕</button>
        </div>
        <div style={{ padding:'24px' }}>{children}</div>
      </div>
    </div>
  );
}

const inputStyle = { width:'100%', border:`1px solid ${C.border}`, borderRadius:8, padding:'9px 12px', fontSize:13, color:C.textPrimary, outline:'none', background:'rgba(255,255,255,.05)', fontFamily:'Pretendard,sans-serif' };
const selectStyle = { ...inputStyle, cursor:'pointer' };

function FormField({ label, children }) {

      <label style={{ display:'block', fontSize:12, fontWeight:600, color:C.textSecondary, marginBottom:6 }}>{label}</label>

}

// ─── 히어로 배너 ───
function HeroBanner({ tab }) {
  const META = {
    main:    { title:'통합 운영 대시보드', sub:'콘텐츠 마케팅 파이프라인 전체 현황을 실시간으로 파악합니다', kpis:[{l:'이번 주 발행',v:'72건'},{l:'순찰 완료',v:'340건'},{l:'누락 감지',v:'8건'}] },
    patrol:  { title:'순찰 크롤링 관리', sub:'Playwright 기반 자동 순찰로 게시글 노출 상태를 실시간으로 추적합니다', kpis:[{l:'오늘 순찰',v:'128건'},{l:'누락 감지',v:'5건'},{l:'재발행 큐',v:'5건'}] },
    analytics:{ title:'발행 분석 및 통계', sub:'키워드별·계정별 발행 성과를 심층 분석하여 운영 전략을 최적화합니다', kpis:[{l:'주간 발행률',v:'97.3%'},{l:'누락률',v:'1.8%'},{l:'AI 활용률',v:'67%'}] },
    sheets:  { title:'Google Sheets 연동', sub:'기존 스프레드시트 데이터를 가져오고 내보내는 양방향 동기화를 지원합니다', kpis:[{l:'총 Import',v:'831행'},{l:'총 Export',v:'576행'},{l:'마지막 동기화',v:'어제 17:00'}] },
    settings:{ title:'시스템 설정', sub:'자동화 파이프라인 구성, 알림 설정, 보안 정책을 관리합니다', kpis:[{l:'활성 스케줄러',v:'3개'},{l:'알림 설정',v:'ON'},{l:'보안 수준',v:'높음'}] },
  };
  const m = META[tab] || META.main;
  return (
    <div style={{ background:C.gradient, padding:'24px 32px 28px', flexShrink:0 }}>
      <h2 style={{ fontSize:22, fontWeight:800, color:'#fff', marginBottom:6, letterSpacing:'-0.3px' }}>{m.title}</h2>
      <p style={{ fontSize:13, color:'rgba(255,255,255,.75)', marginBottom:18 }}>{m.sub}</p>
      <div style={{ display:'flex', gap:28 }}>
        {m.kpis.map((k,i) => (
          <div key={i} style={{ borderLeft: i>0 ? '1px solid rgba(255,255,255,.2)' : 'none', paddingLeft: i>0 ? 28 : 0 }}>
            <div style={{ fontSize:22, fontWeight:800, color:'#fff', lineHeight:1 }}>{k.v}</div>
            <div style={{ fontSize:11, color:'rgba(255,255,255,.7)', marginTop:3, fontWeight:500 }}>{k.l}</div>
          </div>
        ))}
      </div>
    </div>
  );
}

// ─── 대시보드 화면 ───
function DashboardPage() {
  return (
    <div style={{ animation:'fadeIn .3s ease' }}>
      {/* 상태 카드 그리드 */}

      {/* 차트 영역 */}

        <div className="card-dark">
          <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:16 }}>

          </div>

        <div style={{ display:'grid', gridTemplateColumns:'repeat(4,1fr)', gap:10 }}>

            { name:'patrol-worker-1', tasks:'순찰 크롤링', queue:8, status:'실행중' },
            { name:'patrol-worker-2', tasks:'순찰 크롤링', queue:5, status:'실행중' },
            { name:'sheets-worker', tasks:'Sheets 동기화', queue:0, status:'대기' },

                </td>
                <td style={{ padding:'12px 16px', fontSize:12, color:C.textPrimary, fontWeight:500 }}>{h.sheet}</td>
                <td style={{ padding:'12px 16px', fontSize:12, fontWeight:600, color:C.textPrimary }}>{h.rows.toLocaleString()}행</td>
                <td style={{ padding:'12px 16px' }}><span className="badge badge-green">{h.status}</span></td>
                <td style={{ padding:'12px 16px', fontSize:11, color:C.textSecondary, fontFamily:'monospace' }}>{h.time}</td>
                <td style={{ padding:'12px 16px', fontSize:12, color:C.textSecondary }}>{h.duration}</td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>

      {/* Import 설정 모달 */}
      {showImportModal && (
        <Modal title="데이터 가져오기 (Import)" onClose={() => setShowImportModal(false)} width={540}>
          <FormField label="Google Sheets URL">
            <input style={inputStyle} placeholder="https://docs.google.com/spreadsheets/d/…" value={sheetUrl} onChange={e => setSheetUrl(e.target.value)} />
          </FormField>
          <FormField label="가져올 시트">
            <select style={selectStyle}>
              <option>키워드_마스터</option>
              <option>원고_목록</option>
              <option>발행_현황</option>
            </select>
          </FormField>
          <FormField label="중복 처리 방식">
            <select style={selectStyle}>
              <option>덮어쓰기 (기존 데이터 대체)</option>
              <option>건너뛰기 (기존 데이터 유지)</option>
              <option>병합 (충돌 시 확인)</option>
            </select>
          </FormField>
          <div style={{ padding:'10px 14px', background:'rgba(6,182,212,.1)', borderRadius:8, fontSize:12, color:'#67E8F9', marginBottom:8 }}>
            ℹ️ batchGet API를 사용하여 할당량 소비를 최소화합니다. 대용량은 백그라운드 처리됩니다.
          </div>
          <div style={{ display:'flex', gap:8, justifyContent:'flex-end' }}>
            <button className="btn-secondary" onClick={() => setShowImportModal(false)}>취소</button>
            <button className="btn-primary" onClick={startImport} disabled={!sheetUrl}>Import 시작</button>
          </div>
        </Modal>
      )}

      {/* 충돌 처리 모달 */}
      {showConflictModal && (
        <Modal title="중복 키워드 감지" onClose={() => setShowConflictModal(false)} width={520}>
          <div style={{ padding:'10px 14px', background:'rgba(251,191,36,.1)', borderRadius:8, fontSize:12, color:'#FCD34D', marginBottom:16, border:'1px solid rgba(251,191,36,.2)' }}>
            ⚠️ 가져오는 데이터 중 기존 데이터베이스와 중복되는 키워드가 12건 감지되었습니다.
          </div>
          <div style={{ marginBottom:16 }}>
            {['남성 패딩 추천','홈트레이닝 루틴','제주도 여행 코스'].map((k,i) => (
              <div key={i} style={{ display:'flex', justifyContent:'space-between', alignItems:'center', padding:'8px 12px', background:C.surface2, borderRadius:8, marginBottom:6 }}>
                <span style={{ fontSize:13, color:C.textPrimary, fontWeight:500 }}>{k}</span>
                <select style={{ ...selectStyle, width:'auto', padding:'4px 8px', fontSize:11 }}>
                  <option>덮어쓰기</option>
                  <option>건너뛰기</option>
                </select>
              </div>
            ))}
            <div style={{ fontSize:12, color:C.textSecondary, padding:'6px 12px' }}>+ 9건 더…</div>
          </div>
          <div style={{ display:'flex', gap:8, justifyContent:'flex-end' }}>
            <button className="btn-secondary" onClick={() => setShowConflictModal(false)}>취소</button>
            <button className="btn-primary" onClick={() => { setToast('Import가 완료되었습니다 (342행 처리)'); setShowConflictModal(false); }}>
              선택대로 처리 ({3}건 적용)
            </button>
          </div>
        </Modal>
      )}

      {/* 이력 상세 드로어 */}
      {selectedHistory && (
        <Drawer item={{ title:`${selectedHistory.type} 상세` }} onClose={() => setSelectedHistory(null)}>
          <div style={{ display:'grid', gap:10 }}>
            {[['유형', selectedHistory.type],['시트명', selectedHistory.sheet],['처리 행수', `${selectedHistory.rows.toLocaleString()}행`],['상태', selectedHistory.status],['실행 시간', selectedHistory.time],['소요 시간', selectedHistory.duration]].map(([k,v]) => (
              <div key={k} style={{ background:C.surface2, borderRadius:8, padding:'10px 14px', display:'flex', justifyContent:'space-between' }}>
                <span style={{ fontSize:12, color:C.textSecondary }}>{k}</span>
                <span style={{ fontSize:13, fontWeight:600, color:C.textPrimary }}>{v}</span>
              </div>
            ))}
          </div>
          <button className="btn-secondary" style={{ width:'100%', marginTop:16 }} onClick={() => setSelectedHistory(null)}>닫기</button>
        </Drawer>
      )}
    </div>
  );
}

// ─── 시스템 설정 화면 ───
function SettingsPage({ setToast }) {
  const [crawlInterval, setCrawlInterval] = useState('60');
  const [retryCount, setRetryCount] = useState('3');
  const [notifEnabled, setNotifEnabled] = useState(true);
  const [secLevel, setSecLevel] = useState('높음');

  return (
    <div style={{ animation:'fadeIn .3s ease' }}>
      <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:14 }}>
        {/* 자동화 설정 */}
        <div className="card-dark">
          <h3 style={{ fontSize:14, fontWeight:700, color:C.textPrimary, marginBottom:16 }}>자동화 파이프라인</h3>
          <FormField label="순찰 주기 (분)">
            <select style={selectStyle} value={crawlInterval} onChange={e => setCrawlInterval(e.target.value)}>
              {['30','60','120','240'].map(v => <option key={v} value={v}>{v}분마다</option>)}
            </select>
          </FormField>
          <FormField label="발행 실패 재시도 횟수">
            <select style={selectStyle} value={retryCount} onChange={e => setRetryCount(e.target.value)}>
              {['1','2','3','5'].map(v => <option key={v} value={v}>{v}회</option>)}
            </select>
          </FormField>
          <FormField label="Celery 동시 워커 수">
            <select style={selectStyle}>
              {['2','4','6','8'].map(v => <option key={v} value={v}>{v}개</option>)}
            </select>
          </FormField>
          <button className="btn-primary" style={{ width:'100%' }} onClick={() => setToast('파이프라인 설정이 저장되었습니다')}>저장</button>
        </div>

        {/* 알림 설정 */}
        <div className="card-dark">
          <h3 style={{ fontSize:14, fontWeight:700, color:C.textPrimary, marginBottom:16 }}>알림 및 보안</h3>
          <div style={{ marginBottom:14 }}>
            <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:12 }}>
              <div>
                <div style={{ fontSize:13, fontWeight:600, color:C.textPrimary }}>발행 실패 알림</div>
                <div style={{ fontSize:12, color:C.textSecondary }}>발행 실패 시 즉시 알림</div>
              </div>
              <div onClick={() => setNotifEnabled(!notifEnabled)} style={{ width:44, height:24, borderRadius:12, cursor:'pointer', transition:'background .2s', position:'relative',
                background: notifEnabled ? C.primary : 'rgba(255,255,255,.2)' }}>
                <div style={{ position:'absolute', top:2, transition:'left .2s', left: notifEnabled ? 22 : 2,
                  width:20, height:20, borderRadius:'50%', background:'#fff', boxShadow:'0 1px 4px rgba(0,0,0,.3)' }} />
              </div>
            </div>
            <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center' }}>
              <div>
                <div style={{ fontSize:13, fontWeight:600, color:C.textPrimary }}>누락 감지 즉시 알림</div>
                <div style={{ fontSize:12, color:C.textSecondary }}>순찰 누락 감지 시 알림</div>
              </div>
              <div style={{ width:44, height:24, borderRadius:12, cursor:'pointer', position:'relative', background:C.accent }}
                onClick={() => {}}>
                <div style={{ position:'absolute', top:2, left:22, width:20, height:20, borderRadius:'50%', background:'#fff' }} />
              </div>
            </div>
          </div>
          <FormField label="보안 수준">
            <select style={selectStyle} value={secLevel} onChange={e => setSecLevel(e.target.value)}>
              {['낮음','보통','높음'].map(v => <option key={v}>{v}</option>)}
            </select>
          </FormField>
          <div style={{ padding:'10px 14px', background:'rgba(99,102,241,.1)', borderRadius:8, fontSize:12, color:'#A5B4FC', marginBottom:12 }}>
            🔐 계정 자격증명은 AES-256 암호화로 보호됩니다.
          </div>
          <button className="btn-primary" style={{ width:'100%' }} onClick={() => setToast('설정이 저장되었습니다')}>저장</button>
        </div>
      </div>
    </div>
  );
}

// ─── 앱 루트 ───
const TABS = [
  { id:'main', label:'대시보드', icon:'📊' },
  { id:'patrol', label:'순찰 관리', icon:'🔍' },
  { id:'analytics', label:'발행 분석', icon:'📈' },
  { id:'sheets', label:'Sheets 연동', icon:'📋' },
  { id:'settings', label:'시스템 설정', icon:'⚙️' },
];

function App() {
  const [tab, setTab] = useState('main');
  const [toast, setToast] = useState(null);
  const [notifOpen, setNotifOpen] = useState(false);

  return (
    <div style={{ display:'flex', flexDirection:'column', width:'100%', minHeight:'100vh', background:C.bg }}>
      {/* 상단 네비 */}
      <header style={{ position:'sticky', top:0, zIndex:100, background:'rgba(15,23,42,.95)',
        backdropFilter:'blur(12px)', borderBottom:`1px solid ${C.border}`,
        display:'flex', alignItems:'center', height:56, padding:'0 24px', gap:4, flexShrink:0 }}>
        {/* 로고 */}
        <div style={{ display:'flex', alignItems:'center', gap:8, marginRight:16 }}>
          <div style={{ width:30, height:30, borderRadius:8, background:C.gradient, display:'flex', alignItems:'center', justifyContent:'center', fontSize:14 }}>📣</div>
          <span style={{ fontSize:14, fontWeight:800, color:C.textPrimary, letterSpacing:'-0.3px' }}>ContentPlatform</span>
        </div>
        {/* 탭 */}
        {TABS.map(t => (
          <button key={t.id} className={`nav-tab ${tab===t.id?'active':''}`} onClick={() => setTab(t.id)}
            style={{ color: tab===t.id ? '#A5B4FC' : C.textSecondary, display:'flex', alignItems:'center', gap:5 }}>
            <span style={{ fontSize:13 }}>{t.icon}</span> {t.label}
          </button>
        ))}
        <div style={{ flex:1 }} />
        {/* 검색 */}
        <div style={{ display:'flex', alignItems:'center', gap:6, background:'rgba(255,255,255,.06)', border:`1px solid ${C.border}`, borderRadius:8, padding:'5px 10px', width:190 }}>
          <span style={{ color:C.textSecondary, fontSize:13 }}>🔍</span>
          <input style={{ border:'none', background:'transparent', outline:'none', fontSize:12, color:C.textPrimary, width:'100%', fontFamily:'Pretendard,sans-serif' }} placeholder="검색…" />
        </div>
        {/* 알림 */}
        <div style={{ position:'relative' }}>
          <button onClick={() => setNotifOpen(!notifOpen)} style={{ width:34, height:34, borderRadius:8, border:`1px solid ${C.border}`, background:'rgba(255,255,255,.05)', cursor:'pointer', fontSize:14, display:'flex', alignItems:'center', justifyContent:'center', position:'relative' }}>
            🔔
            <span style={{ position:'absolute', top:4, right:4, width:7, height:7, borderRadius:'50%', background:'#EF4444', border:'2px solid #0F172A' }} />
          </button>
          {notifOpen && (
            <div style={{ position:'absolute', top:42, right:0, background:C.surface, borderRadius:12, boxShadow:'0 8px 32px rgba(0,0,0,.4)', border:`1px solid ${C.border}`, width:280, zIndex:200 }}>
              {[
                { icon:'⚠️', msg:'자취생 필수템 게시물 누락 감지 (생활정보 카페)', time:'방금' },
                { icon:'✅', msg:'순찰 완료 — 128건 중 5건 누락 발견', time:'14분 전' },
                { icon:'📥', msg:'Google Sheets Import 완료 (342행)', time:'1시간 전' },
              ].map((n,i) => (
                <div key={i} style={{ padding:'10px 14px', borderBottom:`1px solid ${C.border}`, cursor:'pointer', display:'flex', gap:8, alignItems:'flex-start' }}
                  onMouseEnter={e => e.currentTarget.style.background='rgba(255,255,255,.04)'}
                  onMouseLeave={e => e.currentTarget.style.background='transparent'}
                  onClick={() => setNotifOpen(false)}>
                  <span style={{ fontSize:14 }}>{n.icon}</span>
                  <div>
                    <div style={{ fontSize:12, fontWeight:600, color:C.textPrimary }}>{n.msg}</div>
                    <div style={{ fontSize:11, color:C.textSecondary, marginTop:2 }}>{n.time}</div>
                  </div>
                </div>
              ))}
            </div>
          )}
        </div>
        <div style={{ width:32, height:32, borderRadius:'50%', background:C.gradient, display:'flex', alignItems:'center', justifyContent:'center', fontSize:13, color:'#fff', fontWeight:700, cursor:'pointer', marginLeft:4 }}>김</div>
      </header>

      {/* 히어로 배너 */}
      <HeroBanner tab={tab} />

      {/* 콘텐츠 */}
      <main style={{ flex:1, padding:'24px 32px', background:C.bg }}>
        {tab === 'main' && <DashboardPage />}
        {tab === 'patrol' && <PatrolPage setToast={setToast} />}
        {tab === 'analytics' && <AnalyticsPage />}
        {tab === 'sheets' && <SheetsPage setToast={setToast} />}
        {tab === 'settings' && <SettingsPage setToast={setToast} />}
      </main>

      {toast && <Toast msg={toast} onClose={() => setToast(null)} />}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
