    @keyframes slideInRight { from{opacity:0;transform:translateX(30px)} to{opacity:1;transform:translateX(0)} }

    @keyframes countUp { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }

function CountUp({ end, suffix='', prefix='' }) {
  const [v, setV] = useState(0);
  useEffect(() => {
    let s=0; const step=end/60;
    const id=setInterval(()=>{ s+=step; if(s>=end){setV(end);clearInterval(id);}else setV(Math.floor(s)); },20);
    return ()=>clearInterval(id);
  },[end]);
  return <span style={{animation:'countUp 400ms ease'}}>{prefix}{v.toLocaleString()}{suffix}</span>;
}

function Toast({ msg, onClose }) {
  useEffect(()=>{ const t=setTimeout(onClose,3000); return()=>clearTimeout(t); },[]);
  return (
    <div style={{position:'fixed',bottom:24,right:24,zIndex:9999,background:C.textPrimary,color:'#fff',padding:'12px 24px',borderRadius:10,animation:'slideUp 300ms ease',boxShadow:'0 4px 16px rgba(0,0,0,0.2)',display:'flex',alignItems:'center',gap:8,fontSize:14}}>
      ✅ {msg}
    </div>
  );
}

// QR Scanner
function QrScanner({ onScan }) {
  const [state, setState] = useState('done'); // idle | scanning | done
  const start = () => {
    setState('scanning');
    setTimeout(()=>{ setState('done'); onScan(products[0]); }, 2200);
  };
  return (
    <div style={{display:'flex',flexDirection:'column',alignItems:'center',gap:16}}>
      <div style={{position:'relative',width:220,height:220,border:`3px solid ${state==='scanning'?C.primary:state==='done'?C.success:C.border}`,borderRadius:14,overflow:'hidden',background:state==='done'?'#ECFDF5':'#F1F5F9',transition:'all 300ms',animation:state==='scanning'?'borderPulse 1s infinite':undefined}}>
        {state==='idle' && <div style={{display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',height:'100%',gap:8}}><div style={{fontSize:44}}>📷</div><div style={{fontSize:12,color:C.textSecondary}}>카메라 대기 중</div></div>}
        {state==='scanning' && (
          <>
            <div style={{position:'absolute',left:0,right:0,height:3,background:`linear-gradient(90deg,transparent,${C.primary},transparent)`,animation:'scanLine 1.4s ease-in-out infinite alternate',top:'40%'}} />
            <div style={{display:'flex',alignItems:'center',justifyContent:'center',height:'100%',fontSize:44,opacity:0.25}}>📦</div>
            {[[0,0],[0,'auto'],['auto',0],['auto','auto']].map(([t,b],i)=>(
              <div key={i} style={{position:'absolute',top:t,bottom:b,left:i%2===0?8:undefined,right:i%2===1?8:undefined,width:22,height:22,
                borderTop:typeof t==='number'?`3px solid ${C.primary}`:undefined,
                borderBottom:typeof b==='number'?`3px solid ${C.primary}`:undefined,
                borderLeft:i%2===0?`3px solid ${C.primary}`:undefined,
                borderRight:i%2===1?`3px solid ${C.primary}`:undefined}} />
            ))}
          </>
        )}
        {state==='done' && <div style={{display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',height:'100%',gap:8}}><div style={{fontSize:44}}>✅</div><div style={{fontSize:13,color:C.success,fontWeight:700}}>스캔 완료!</div></div>}
      </div>
      <button onClick={state==='done'?()=>setState('idle'):start} disabled={state==='scanning'} style={{padding:'12px 28px',background:state==='scanning'?C.textSecondary:state==='done'?C.success:C.primary,color:'#fff',border:'none',borderRadius:12,fontWeight:700,fontSize:15,cursor:state==='scanning'?'default':'pointer',transition:'all 200ms',animation:state==='scanning'?'pulse 1s infinite':undefined}}>
        {state==='idle'?'QR 스캔 시작':state==='scanning'?'스캔 중...':'다시 스캔'}
      </button>
      {state==='done' && (
        <div style={{background:'#ECFDF5',border:'1px solid #6EE7B7',borderRadius:10,padding:14,width:'100%',animation:'fadeInScale 300ms ease',fontSize:13}}>
          <div style={{fontWeight:600,color:C.success,marginBottom:3}}>QR-001 | 제주한라농협 A-12 부스</div>
          <div style={{color:C.textSecondary,fontSize:12}}>상품 페이지 이동 준비 완료 → 하단에서 선택하세요</div>
        </div>
      )}
    </div>
  );
}

            {ticket && (
              <div style={{width:'100%',background:'#F0F9FF',border:'1px solid #BAE6FD',borderRadius:12,padding:16}}>
                <div style={{fontSize:12,fontWeight:600,color:'#0284C7',marginBottom:10}}>발급된 QR 입장권</div>
                <div style={{display:'flex',gap:12,alignItems:'center'}}>
                  <div style={{width:80,height:80,background:'#fff',borderRadius:8,border:'2px solid #0EA5E9',display:'grid',placeItems:'center',flexShrink:0}}>
                    <div style={{display:'grid',gridTemplateColumns:'repeat(6,1fr)',gap:1.5}}>
                      {Array.from({length:36}).map((_,i)=><div key={i} style={{width:7,height:7,background:Math.random()>0.5?'#0F172A':'transparent',borderRadius:0.5}} />)}
                    </div>
                  </div>
                  <div>
                    <div style={{fontSize:14,fontWeight:700}}>{ticket.name}</div>
                    <div style={{fontSize:12,color:C.textSecondary,marginTop:2}}>{ticket.company||'개인'}</div>
                    <div style={{fontSize:11,color:'#0284C7',marginTop:4,fontFamily:'monospace'}}>{ticket.id}</div>
                  </div>
                </div>
                <div style={{display:'flex',gap:8,marginTop:12}}>
                  <button onClick={()=>onToast('PNG로 저장되었습니다')} style={{flex:1,padding:'8px',background:'#0284C7',color:'#fff',border:'none',borderRadius:8,fontSize:12,fontWeight:600,cursor:'pointer'}}>PNG 저장</button>
                  <button onClick={()=>onToast('카카오톡 공유 링크 복사됨')} style={{flex:1,padding:'8px',background:'#FAE100',color:'#1A1A1A',border:'none',borderRadius:8,fontSize:12,fontWeight:600,cursor:'pointer'}}>카카오 공유</button>
                </div>
              </div>
            )}
            <button onClick={()=>{setDone(false);setForm({name:'',phone:'',company:'',interest:''});}} style={{padding:'10px 24px',background:C.surface,color:C.textPrimary,border:`1px solid ${C.border}`,borderRadius:10,fontWeight:600,cursor:'pointer',fontSize:13}}>추가 등록하기</button>
          </div>
        )}
      </div>

      <div style={{background:C.surface,borderRadius:16,padding:24,boxShadow:'0 4px 16px rgba(0,0,0,0.08)'}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:18}}>
          <div>
            <div style={{fontSize:16,fontWeight:700,color:C.textPrimary}}>사전등록 내역</div>
            <div style={{fontSize:12,color:C.textSecondary,marginTop:2}}>총 {list.length}명 등록</div>
          </div>
          <button onClick={()=>onToast('엑셀 파일 다운로드 완료')} style={{padding:'8px 14px',border:`1px solid ${C.border}`,borderRadius:8,fontSize:12,background:C.surface,cursor:'pointer',fontWeight:500,color:C.textPrimary}}>📊 엑셀 다운로드</button>
        </div>
        <div style={{display:'flex',flexDirection:'column',gap:10}}>
          {list.map((r,i)=>(
            <div key={r.id} onClick={()=>setModal(r)} style={{display:'flex',alignItems:'center',gap:12,padding:'13px',borderRadius:12,border:`1px solid ${C.border}`,cursor:'pointer',animation:`slideUp 300ms ease ${i*60}ms both`,transition:'all 200ms'}}
              onMouseEnter={e=>e.currentTarget.style.background=C.bg}
              onMouseLeave={e=>e.currentTarget.style.background='transparent'}>
              <div style={{width:38,height:38,borderRadius:'50%',background:`linear-gradient(135deg,${C.primary},${C.secondary})`,display:'flex',alignItems:'center',justifyContent:'center',color:'#fff',fontWeight:700,fontSize:14,flexShrink:0}}>{r.name[0]}</div>
              <div style={{flex:1}}>
                <div style={{fontSize:13,fontWeight:600,color:C.textPrimary}}>{r.name}</div>
                <div style={{fontSize:11,color:C.textSecondary}}>{r.company||'개인'} · {r.interest||'-'}</div>
              </div>
              <div style={{textAlign:'right'}}>
                <div style={{fontSize:11,fontFamily:'monospace',color:C.primary,fontWeight:600}}>{r.id}</div>
                <div style={{fontSize:11,color:C.textSecondary,marginTop:2}}>{r.date}</div>
              </div>
            </div>
          ))}
        </div>
      </div>

      {modal && (
        <Modal title="등록자 상세" onClose={()=>setModal(null)} width={420}>
          <div style={{display:'flex',flexDirection:'column',gap:12}}>
            <div style={{display:'flex',flexDirection:'column',alignItems:'center',gap:8,marginBottom:8}}>
              <div style={{width:56,height:56,borderRadius:'50%',background:`linear-gradient(135deg,${C.primary},${C.secondary})`,display:'flex',alignItems:'center',justifyContent:'center',color:'#fff',fontWeight:700,fontSize:20}}>{modal.name[0]}</div>
              <div style={{fontSize:17,fontWeight:700}}>{modal.name}</div>
              <div style={{fontSize:12,color:C.textSecondary}}>{modal.id}</div>
            </div>
            {[['연락처',modal.phone],['소속',modal.company||'개인'],['관심 카테고리',modal.interest||'-'],['등록일',modal.date]].map(([l,v])=>(
              <div key={l} style={{display:'flex',gap:12,padding:'10px 0',borderBottom:`1px solid ${C.border}`}}>
                <span style={{width:100,fontSize:12,color:C.textSecondary}}>{l}</span>
                <span style={{fontSize:13,fontWeight:600,color:C.textPrimary}}>{v}</span>
              </div>
            ))}
            <button onClick={()=>{setModal(null);onToast('입장 처리가 완료되었습니다');}} style={{padding:12,background:C.success,color:'#fff',border:'none',borderRadius:10,fontWeight:700,cursor:'pointer',marginTop:4}}>QR 입장 처리</button>
          </div>
        </Modal>
      )}
    </div>
  );
}

// === MAIN APP ===
const TABS = [
  {id:'main',label:'QR 주문 시작',icon:'🏷️'},
  {id:'product-mgmt',label:'상품 관리',icon:'📦'},
  {id:'order-mgmt',label:'주문 관리',icon:'📋'},
  {id:'prereg',label:'사전등록',icon:'🎫'},
];

const META = {
  'main':{title:'QR 스캔 주문 플랫폼',desc:'현장 QR 스캔으로 즉시 주문·결제 · jsQR + 토스페이먼츠',kpis:[{l:'오늘 주문',v:'216건'},{l:'총 매출',v:'942만원'},{l:'관람객',v:'1,847명'}]},
  'product-mgmt':{title:'상품 관리',desc:'참가업체 상품 등록 · 재고 · QR 코드 발급',kpis:[{l:'전체 상품',v:'48개'},{l:'판매중',v:'41개'},{l:'품절',v:'7개'}]},
  'order-mgmt':{title:'실시간 주문 접수',desc:'Socket.io 연결 · 실시간 주문 모니터링 및 상태 관리',kpis:[{l:'접수 대기',v:'12건'},{l:'처리중',v:'8건'},{l:'완료',v:'196건'}]},
  'prereg':{title:'사전등록 / QR 입장권',desc:'UUID 기반 QR 입장권 발급 · 카카오 공유 지원',kpis:[{l:'사전등록',v:'2,841명'},{l:'입장 완료',v:'1,847명'},{l:'대기중',v:'994명'}]},
};

function App() {
  const [tab, setTab] = useState('main');
  const [toast, setToast] = useState(null);
  const [loading, setLoading] = useState(true);

  useEffect(()=>{ setTimeout(()=>setLoading(false),1200); },[]);

  if(loading) return (
    <div style={{display:'flex',flexDirection:'column',width:'100%',minHeight:'100vh'}}>
      <div style={{height:56,background:C.surface,borderBottom:`1px solid ${C.border}`,display:'flex',alignItems:'center',padding:'0 24px',gap:8}}>
        {[100,80,60,70].map((w,i)=><div key={i} style={{width:w,height:16,borderRadius:4,background:'linear-gradient(90deg,#F1F5F9 25%,#E2E8F0 50%,#F1F5F9 75%)',backgroundSize:'200% 100%',animation:'shimmer 1.5s infinite'}} />)}
      </div>
      <div style={{height:90,background:`linear-gradient(135deg,${C.primary},${C.secondary})`}} />
      {[...Array(3)].map((_,i)=><div key={i} style={{height:100,margin:'16px 24px',borderRadius:12,background:'linear-gradient(90deg,#F1F5F9 25%,#E2E8F0 50%,#F1F5F9 75%)',backgroundSize:'200% 100%',animation:'shimmer 1.5s infinite'}} />)}
    </div>
  );

  const meta = META[tab];

  return (
    <div style={{display:'flex',flexDirection:'column',width:'100%',minHeight:'100vh',background:C.bg}}>
      {/* TopNav */}
      <header style={{position:'sticky',top:0,zIndex:100,background:C.surface,borderBottom:`1px solid ${C.border}`,display:'flex',alignItems:'center',height:56,padding:'0 24px',gap:2,boxShadow:'0 1px 3px rgba(0,0,0,0.04)'}}>
        <div style={{marginRight:16,display:'flex',alignItems:'center',gap:8}}>
          <div style={{width:28,height:28,borderRadius:8,background:`linear-gradient(135deg,${C.primary},${C.secondary})`,display:'flex',alignItems:'center',justifyContent:'center',color:'#fff',fontSize:14}}>📍</div>
          <span style={{fontSize:15,fontWeight:800,color:C.textPrimary}}>ExpoOrder</span>
        </div>
        {TABS.map(t=>(
          <button key={t.id} onClick={()=>setTab(t.id)} style={{padding:'6px 14px',borderRadius:8,border:'none',background:tab===t.id?`${C.primary}15`:'transparent',color:tab===t.id?C.primary:C.textSecondary,fontWeight:tab===t.id?700:500,fontSize:14,cursor:'pointer',transition:'all 150ms',display:'flex',alignItems:'center',gap:5}}>
            <span style={{fontSize:13}}>{t.icon}</span>{t.label}
          </button>
        ))}
        <div style={{flex:1}} />
        <div style={{display:'flex',alignItems:'center',gap:10}}>
          <button style={{background:'none',border:'none',fontSize:18,cursor:'pointer',color:C.textSecondary,position:'relative'}}>
            🔔<span style={{position:'absolute',top:0,right:0,width:7,height:7,borderRadius:'50%',background:C.success,animation:'pulse 2s infinite'}} />
          </button>
          <div style={{width:32,height:32,borderRadius:'50%',background:`linear-gradient(135deg,${C.primary},${C.secondary})`,display:'flex',alignItems:'center',justifyContent:'center',color:'#fff',fontSize:13,fontWeight:700,cursor:'pointer'}}>관</div>
        </div>
      </header>

      {/* Hero Banner */}
      <div style={{background:`linear-gradient(135deg,${C.primary},${C.secondary})`,padding:'22px 32px',color:'#fff'}}>
        <div style={{display:'flex',alignItems:'flex-start',justifyContent:'space-between',maxWidth:1200,margin:'0 auto'}}>
          <div>
            <h1 style={{fontSize:20,fontWeight:800,marginBottom:3}}>{meta.title}</h1>
            <p style={{fontSize:12,opacity:0.82}}>{meta.desc}</p>
          </div>
          <div style={{display:'flex',gap:28}}>
            {meta.kpis.map((k,i)=>(
              <div key={i} style={{textAlign:'right'}}>
                <div style={{fontSize:11,opacity:0.72}}>{k.l}</div>
                <div style={{fontSize:20,fontWeight:800,marginTop:1}}>{k.v}</div>
              </div>
            ))}
          </div>
        </div>
      </div>

      {/* Content */}
      <main style={{flex:1,padding:'24px 32px',maxWidth:1200,margin:'0 auto',width:'100%'}}>
        <div key={tab} style={{animation:'fadeIn 300ms ease'}}>
          {tab==='main' && <MainPage onToast={setToast} />}
          {tab==='product-mgmt' && <ProductMgmtPage onToast={setToast} />}
          {tab==='order-mgmt' && <OrderMgmtPage onToast={setToast} />}
          {tab==='prereg' && <PreRegPage onToast={setToast} />}
        </div>
      </main>

      {toast && <Toast msg={toast} onClose={()=>setToast(null)} />}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
