function CountUp({ end, suffix='', prefix='' }) {
  const [v, setV] = useState(0);
  useEffect(() => {
    let s=0; const step=end/60;
    const id=setInterval(()=>{ s+=step; if(s>=end){setV(end);clearInterval(id);}else setV(Math.floor(s)); },20);
    return ()=>clearInterval(id);
  },[end]);
  return <span style={{animation:'countUp 400ms ease'}}>{prefix}{v.toLocaleString()}{suffix}</span>;
}

function Toast({ msg, onClose }) {
  useEffect(()=>{ const t=setTimeout(onClose,3000); return()=>clearTimeout(t); },[]);
  return <div style={{position:'fixed',bottom:24,right:24,zIndex:9999,background:C.accent,color:'#fff',padding:'12px 24px',borderRadius:10,animation:'slideUp 300ms ease',boxShadow:'0 4px 20px rgba(16,185,129,0.4)',fontSize:14,fontWeight:600}}>✅ {msg}</div>;
}

function Modal({ title, onClose, children, width=580 }) {
  return (
    <div style={{position:'fixed',inset:0,zIndex:500,display:'flex',alignItems:'center',justifyContent:'center'}}>
      <div onClick={onClose} style={{position:'absolute',inset:0,background:'rgba(0,0,0,0.65)',animation:'fadeIn 200ms ease'}} />
      <div style={{position:'relative',width,maxHeight:'88vh',background:C.surface,borderRadius:16,zIndex:501,animation:'fadeInScale 200ms ease',display:'flex',flexDirection:'column',boxShadow:'0 24px 64px rgba(0,0,0,0.5)',border:`1px solid ${C.border}`}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'18px 24px',borderBottom:`1px solid ${C.border}`}}>
          <h3 style={{fontSize:17,fontWeight:700,color:C.textPrimary}}>{title}</h3>
          <button onClick={onClose} style={{background:'none',border:'none',fontSize:22,cursor:'pointer',color:C.textSecondary,lineHeight:1}}>✕</button>
        </div>
        <div style={{padding:24,overflowY:'auto',flex:1}}>{children}</div>

}

function KpiCard({ label, value, suffix='', prefix='', icon, color, sub, delay=0 }) {
  return (
    <div style={{background:C.surface,borderRadius:14,padding:'20px 22px',border:`1px solid ${C.border}`,animation:`slideUp 400ms ease ${delay}ms both`,transition:'all 200ms',cursor:'default'}}
      onMouseEnter={e=>{e.currentTarget.style.borderColor=color||C.primary;e.currentTarget.style.transform='translateY(-3px)';}}
      onMouseLeave={e=>{e.currentTarget.style.borderColor=C.border;e.currentTarget.style.transform='translateY(0)';}}>
      <div style={{display:'flex',justifyContent:'space-between',marginBottom:10}}>
        <div style={{fontSize:12,color:C.textSecondary,fontWeight:500}}>{label}</div>
        <div style={{fontSize:22}}>{icon}</div>
      </div>
      <div style={{fontSize:26,fontWeight:800,color:color||C.primary}}><CountUp end={value} suffix={suffix} prefix={prefix} /></div>
      {sub && <div style={{fontSize:11,color:C.textSecondary,marginTop:4}}>{sub}</div>}
    </div>
  );
}

function StatusBadge({ status }) {
  const cfg = {
    '진행중':[C.accent,'#064E3B'],'준비중':[C.warn,'#451A03'],'모집중':[C.primary,'#2E1065'],
    '완료':[C.textSecondary,C.surface2],'승인':[C.accent,'#064E3B'],'대기':['#F59E0B','#451A03'],
    '검토중':[C.primary,'#2E1065'],'미처리':[C.error,'#450A0A'],
  };
  const [col, bg] = cfg[status] || [C.textSecondary, C.surface2];
  return <span style={{background:bg,color:col,fontSize:11,fontWeight:700,padding:'3px 9px',borderRadius:999}}>{status}</span>;
}

              <button onClick={()=>setGenModal(false)} style={{flex:1,padding:13,background:'transparent',color:C.textSecondary,border:`1px solid ${C.border}`,borderRadius:10,fontWeight:600,cursor:'pointer'}}>취소</button>
            </div>
          </div>
        </Modal>
      )}
    </div>
  );
}
