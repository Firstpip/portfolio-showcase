<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>FLAVORAI — 맞춤 구현 데모</title>
<link rel="preconnect" href="https://cdn.jsdelivr.net"/>
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" rel="stylesheet"/>
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body,#root{width:100%;height:100%;font-family:'Pretendard',sans-serif;background:#0D0D0D;color:#FFF}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes fadeInScale{from{opacity:0;transform:scale(0.95)}to{opacity:1;transform:scale(1)}}
@keyframes slideInRight{from{opacity:0;transform:translateX(30px)}to{opacity:1;transform:translateX(0)}}
@keyframes slideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes ripple{0%{transform:scale(0);opacity:0.5}100%{transform:scale(4);opacity:0}}
@keyframes countUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.5}}
@keyframes barGrow{from{width:0%}to{width:var(--target-width)}}
@keyframes glow{0%,100%{box-shadow:0 0 20px rgba(255,90,31,0.3)}50%{box-shadow:0 0 40px rgba(255,90,31,0.6)}}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
@keyframes typing{from{width:0}to{width:100%}}
@keyframes gradientShift{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}
.chart-canvas-wrap{position:relative;height:260px}
.chart-canvas-wrap canvas{width:100%!important;height:100%!important}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const C = {
  bg:'#0D0D0D', surface:'#1A1A1A', card:'rgba(255,255,255,0.05)',
  primary:'#FF5A1F', secondary:'#E91E8C', accent:'#FFB347',
  text:'#FFFFFF', sub:'#B0B0B0', border:'rgba(255,255,255,0.1)',
  grad:'linear-gradient(135deg,#FF5A1F,#E91E8C)'
};

function Toast({message,onClose}){
  React.useEffect(()=>{const t=setTimeout(onClose,3000);return()=>clearTimeout(t)},[]);
  return(
    <div style={{position:'fixed',bottom:28,right:28,zIndex:9999,background:'rgba(255,90,31,0.95)',
      color:'#fff',padding:'12px 24px',borderRadius:10,animation:'slideUp 300ms ease',
      boxShadow:'0 4px 20px rgba(255,90,31,0.4)',fontWeight:600,fontSize:14}}>
      {message}
    </div>
  );
}

function CountUp({end,duration=1200,suffix=''}){
  const [val,setVal]=React.useState(0);
  React.useEffect(()=>{
    let s=0;const step=end/(duration/16);
    const t=setInterval(()=>{s+=step;if(s>=end){setVal(end);clearInterval(t);}else setVal(Math.floor(s));},16);
    return()=>clearInterval(t);
  },[end]);
  return <span style={{animation:'countUp 400ms ease'}}>{val.toLocaleString()}{suffix}</span>;
}

function Modal({title,onClose,children,width=560}){
  return(
    <div style={{position:'fixed',inset:0,zIndex:500,display:'flex',alignItems:'center',justifyContent:'center'}}>
      <div onClick={onClose} style={{position:'absolute',inset:0,background:'rgba(0,0,0,0.7)',animation:'fadeIn 200ms ease'}}/>
      <div style={{position:'relative',width,maxHeight:'85vh',background:C.surface,borderRadius:16,zIndex:501,
        animation:'fadeInScale 200ms ease',display:'flex',flexDirection:'column',
        boxShadow:'0 20px 60px rgba(0,0,0,0.5)',border:`1px solid ${C.border}`}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'20px 24px',
          borderBottom:`1px solid ${C.border}`}}>
          <h3 style={{fontSize:18,fontWeight:700,color:C.text}}>{title}</h3>
          <button onClick={onClose} style={{background:'none',border:'none',fontSize:22,cursor:'pointer',color:C.sub}}>✕</button>
        </div>
        <div style={{padding:24,overflowY:'auto',flex:1}}>{children}</div>
      </div>
    </div>
  );
}

function GlassCard({children,style={},onClick}){
  const [hov,setHov]=React.useState(false);
  return(
    <div onClick={onClick} onMouseEnter={()=>setHov(true)} onMouseLeave={()=>setHov(false)}
      style={{background:hov?'rgba(255,255,255,0.08)':'rgba(255,255,255,0.05)',
        borderRadius:16,border:`1px solid ${hov?'rgba(255,90,31,0.4)':C.border}`,
        backdropFilter:'blur(10px)',transition:'all 0.2s ease',
        transform:hov?'translateY(-2px)':'none',cursor:onClick?'pointer':'default',...style}}>
      {children}
    </div>
  );
}

function TagButton({label,active,onClick}){
  return(
    <button onClick={onClick} style={{padding:'6px 14px',borderRadius:20,border:`1px solid ${active?C.primary:'rgba(255,255,255,0.2)'}`,
      background:active?'rgba(255,90,31,0.2)':'transparent',color:active?C.primary:C.sub,
      fontSize:13,cursor:'pointer',transition:'all 0.15s ease',fontFamily:'Pretendard,sans-serif'}}>
      {label}
    </button>
  );
}

/* ─────────── HOME ─────────── */
function HomeView({setPage}){
  const features=[
    {icon:'🍽️',name:'Crave',desc:'취향·알러지 프로파일 수집 + Vision AI 음식 사진 분석',color:'#FF5A1F'},
    {icon:'📊',name:'Trace',desc:'SNS·블로그 K-푸드 트렌드 크롤링 & 인기 소스 랭킹',color:'#E91E8C'},
    {icon:'✨',name:'Formulate',desc:'Claude API 기반 맞춤형 소스 레시피 스트리밍 생성',color:'#FFB347'},
  ];
  return(
    <div style={{animation:'fadeIn 300ms ease'}}>
      {/* Hero */}
      <div style={{background:'linear-gradient(135deg,rgba(255,90,31,0.15),rgba(233,30,140,0.1))',
        borderBottom:`1px solid ${C.border}`,padding:'64px 60px 56px'}}>
        <div style={{fontSize:12,letterSpacing:3,color:C.primary,fontWeight:700,marginBottom:16}}>K-FOOD RECIPE AS A SERVICE</div>
        <h1 style={{fontSize:52,fontWeight:900,lineHeight:1.15,marginBottom:20,
          background:'linear-gradient(135deg,#FF5A1F,#E91E8C,#FFB347)',WebkitBackgroundClip:'text',
          WebkitTextFillColor:'transparent',backgroundSize:'200% auto',animation:'gradientShift 4s linear infinite'}}>
          AI가 만드는<br/>맞춤형 K-푸드 레시피
        </h1>
        <p style={{fontSize:18,color:C.sub,lineHeight:1.7,maxWidth:520,marginBottom:32}}>
          취향 분석 → 트렌드 크롤링 → AI 레시피 생성의<br/>3단계 파이프라인으로 세계 어디서나 K-푸드를 즐기도록 설계합니다.
        </p>
        <button onClick={()=>setPage('formulate')} style={{padding:'14px 36px',borderRadius:50,border:'none',
          background:'linear-gradient(135deg,#FF5A1F,#E91E8C)',color:'#fff',fontSize:16,fontWeight:700,
          cursor:'pointer',boxShadow:'0 4px 24px rgba(255,90,31,0.4)',animation:'glow 2s infinite',
          fontFamily:'Pretendard,sans-serif'}}>
          레시피 생성 체험하기 →
        </button>
      </div>
      {/* Stats */}
      <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:1,background:C.border}}>
        {[['847','수집된 트렌드 데이터','건'],['3단계','AI 파이프라인',''],['Claude','Vision API','연동'],['99','K-푸드 레시피 카테고리','종']].map(([n,l,s],i)=>(
          <div key={i} style={{background:C.surface,padding:'24px 28px',textAlign:'center'}}>
            <div style={{fontSize:28,fontWeight:900,color:i===0?C.primary:i===1?C.secondary:i===2?C.accent:'#7C3AED',marginBottom:4}}>
              {i===0?<CountUp end={847} suffix=""/>:n}
            </div>
            <div style={{fontSize:13,color:C.sub}}>{l}{s&&<span style={{color:C.primary,marginLeft:4}}>{s}</span>}</div>
          </div>
        ))}
      </div>
      {/* 3단계 파이프라인 */}
      <div style={{padding:'56px 60px'}}>
        <h2 style={{fontSize:28,fontWeight:800,marginBottom:8}}>3단계 AI 파이프라인</h2>
        <p style={{color:C.sub,marginBottom:40}}>취향부터 완성 레시피까지, 각 단계를 클릭하여 데모를 체험하세요</p>
        <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:24}}>
          {features.map((f,i)=>(
            <GlassCard key={i} style={{padding:32,animation:`slideUp 400ms ease ${i*100}ms both`}}
              onClick={()=>setPage(i===0?'crave':i===1?'trend':'formulate')}>
              <div style={{fontSize:40,marginBottom:16,animation:'float 3s ease infinite',animationDelay:`${i*0.5}s`}}>{f.icon}</div>
              <div style={{fontSize:24,fontWeight:800,marginBottom:8,color:f.color}}>{f.name}</div>
              <div style={{fontSize:15,color:C.sub,lineHeight:1.7,marginBottom:20}}>{f.desc}</div>
              <button style={{background:'transparent',border:`1px solid ${f.color}`,color:f.color,padding:'8px 20px',
                borderRadius:20,cursor:'pointer',fontSize:13,fontWeight:600,fontFamily:'Pretendard,sans-serif'}}>
                체험하기 →
              </button>
            </GlassCard>
          ))}
        </div>
      </div>
    </div>
  );
}

/* ─────────── CRAVE ─────────── */
function CraveView({setToast}){
  const [tasteTags,setTasteTags]=React.useState(['매콤','감칠맛']);
  const [allergyTags,setAllergyTags]=React.useState([]);
  const [imgFile,setImgFile]=React.useState(null);
  const [analyzing,setAnalyzing]=React.useState(false);
  const [analysisResult,setAnalysisResult]=React.useState(null);
  const [uploadProgress,setUploadProgress]=React.useState(0);

  const tastes=['달콤','매콤','감칠맛','짭조름','새콤','고소함','쫄깃함'];
  const allergies=['견과류','갑각류','밀/글루텐','유제품','계란','대두'];

  const handleUpload=(e)=>{
    const f=e.target.files[0];if(!f)return;
    setImgFile(URL.createObjectURL(f));
    setAnalyzing(true);setAnalysisResult(null);setUploadProgress(0);
    let p=0;
    const pi=setInterval(()=>{p+=10;setUploadProgress(p);if(p>=100)clearInterval(pi);},150);
    setTimeout(()=>{
      setAnalyzing(false);
      setAnalysisResult({
        ingredients:['간장','마늘','생강','참기름','고춧가루','설탕'],
        taste:['감칠맛','매콤','달콤'],
        cookingMethod:'볶음·조림',
        confidence:94,
        suggestion:'불고기 소스 또는 떡볶이 양념과 유사한 한식 소스 프로파일입니다.'
      });
    },2000);
  };

  const saveProfile=()=>{
    setToast('✅ 취향 프로파일이 저장되었습니다');
  };

  return(
    <div style={{padding:'40px 60px',animation:'fadeIn 300ms ease'}}>
      <div style={{marginBottom:32}}>
        <div style={{fontSize:12,letterSpacing:2,color:C.primary,fontWeight:700,marginBottom:8}}>STEP 1</div>
        <h2 style={{fontSize:32,fontWeight:900,marginBottom:8}}>Crave — 취향 프로파일</h2>
        <p style={{color:C.sub,fontSize:15}}>음식 취향과 알러지 정보를 입력하거나, 사진을 업로드하여 AI가 자동 분석합니다.</p>
      </div>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:32}}>
        {/* 취향 입력 */}
        <GlassCard style={{padding:32}}>
          <h3 style={{fontSize:18,fontWeight:700,marginBottom:24,display:'flex',alignItems:'center',gap:8}}>
            <span>🎯</span> 맛 선호도
          </h3>
          <div style={{display:'flex',flexWrap:'wrap',gap:10,marginBottom:32}}>
            {tastes.map(t=>(
              <TagButton key={t} label={t} active={tasteTags.includes(t)}
                onClick={()=>setTasteTags(p=>p.includes(t)?p.filter(x=>x!==t):[...p,t])}/>
            ))}
          </div>
          <h3 style={{fontSize:18,fontWeight:700,marginBottom:16,display:'flex',alignItems:'center',gap:8}}>
            <span>⚠️</span> 알러지 정보
          </h3>
          <div style={{display:'flex',flexWrap:'wrap',gap:10,marginBottom:32}}>
            {allergies.map(a=>(
              <TagButton key={a} label={a} active={allergyTags.includes(a)}
                onClick={()=>setAllergyTags(p=>p.includes(a)?p.filter(x=>x!==a):[...p,a])}/>
            ))}
          </div>
          <div style={{padding:'16px 20px',background:'rgba(255,90,31,0.1)',borderRadius:12,
            border:`1px solid rgba(255,90,31,0.3)`,marginBottom:24}}>
            <div style={{fontSize:13,color:C.sub,marginBottom:8}}>선택된 취향</div>
            <div style={{display:'flex',flexWrap:'wrap',gap:8}}>
              {tasteTags.length===0&&<span style={{color:C.sub,fontSize:13}}>선택 없음</span>}
              {tasteTags.map(t=>(
                <span key={t} style={{background:C.primary,color:'#fff',padding:'4px 12px',borderRadius:20,fontSize:13,fontWeight:600}}>{t}</span>
              ))}
            </div>
          </div>
          <button onClick={saveProfile} style={{width:'100%',padding:'14px',borderRadius:12,border:'none',
            background:C.grad,color:'#fff',fontSize:15,fontWeight:700,cursor:'pointer',fontFamily:'Pretendard,sans-serif'}}>
            프로파일 저장
          </button>
        </GlassCard>

        {/* 사진 분석 */}
        <GlassCard style={{padding:32}}>
          <h3 style={{fontSize:18,fontWeight:700,marginBottom:24,display:'flex',alignItems:'center',gap:8}}>
            <span>📸</span> 음식 사진 분석
          </h3>
          <label style={{display:'block',border:`2px dashed rgba(255,90,31,0.4)`,borderRadius:16,
            padding:'32px',textAlign:'center',cursor:'pointer',marginBottom:20,
            background:'rgba(255,90,31,0.05)',transition:'all 0.2s ease'}}>
            <input type="file" accept="image/*" onChange={handleUpload} style={{display:'none'}}/>
            {imgFile?(
              <div>
                <img src={imgFile} alt="upload" style={{maxHeight:140,borderRadius:8,marginBottom:12}}/>
                <div style={{fontSize:13,color:C.sub}}>이미지 분석 중...</div>
              </div>
            ):(
              <div>
                <div style={{fontSize:48,marginBottom:12}}>📁</div>
                <div style={{color:C.sub,fontSize:14}}>클릭하거나 사진을 드래그하여 업로드</div>
                <div style={{color:'rgba(255,255,255,0.3)',fontSize:12,marginTop:4}}>JPG, PNG, WEBP 지원</div>
              </div>
            )}
          </label>

          {imgFile&&(
            <div style={{marginBottom:20}}>
              <div style={{display:'flex',justifyContent:'space-between',marginBottom:8}}>
                <span style={{fontSize:13,color:C.sub}}>Vision API 분석</span>
                <span style={{fontSize:13,color:analyzing?C.accent:C.primary,fontWeight:600}}>
                  {analyzing?`${uploadProgress}%`:'완료'}
                </span>
              </div>
              <div style={{height:4,background:'rgba(255,255,255,0.1)',borderRadius:2}}>
                <div style={{height:'100%',borderRadius:2,background:C.grad,
                  width:`${uploadProgress}%`,transition:'width 0.15s ease'}}/>
              </div>
            </div>
          )}

          {analyzing&&(
            <div style={{display:'flex',gap:8,padding:'16px',background:'rgba(255,179,71,0.1)',borderRadius:12}}>
              <span style={{animation:'pulse 1s infinite'}}>⚡</span>
              <span style={{fontSize:13,color:C.accent}}>Claude Vision API 분석 중...</span>
            </div>
          )}

          {analysisResult&&!analyzing&&(
            <div style={{animation:'fadeInScale 400ms ease'}}>
              <div style={{padding:'20px',background:'rgba(255,90,31,0.08)',borderRadius:12,
                border:`1px solid rgba(255,90,31,0.2)`,marginBottom:16}}>
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12}}>
                  <span style={{fontSize:14,fontWeight:700,color:C.primary}}>분석 결과</span>
                  <span style={{fontSize:12,background:'rgba(255,90,31,0.2)',color:C.primary,
                    padding:'3px 10px',borderRadius:20,fontWeight:600}}>신뢰도 {analysisResult.confidence}%</span>
                </div>
                <div style={{marginBottom:12}}>
                  <div style={{fontSize:12,color:C.sub,marginBottom:6}}>감지된 식재료</div>
                  <div style={{display:'flex',flexWrap:'wrap',gap:6}}>
                    {analysisResult.ingredients.map(i=>(
                      <span key={i} style={{fontSize:12,background:'rgba(255,255,255,0.1)',padding:'4px 10px',
                        borderRadius:20,color:C.text}}>{i}</span>
                    ))}
                  </div>
                </div>
                <div style={{fontSize:12,color:C.sub,marginBottom:6}}>조리 방식: <span style={{color:C.accent}}>{analysisResult.cookingMethod}</span></div>
                <div style={{fontSize:13,color:C.sub,lineHeight:1.6}}>{analysisResult.suggestion}</div>
              </div>
              <button onClick={()=>{setTasteTags(p=>[...new Set([...p,...analysisResult.taste])]);setToast('✅ 분석 결과가 프로파일에 반영되었습니다');}}
                style={{width:'100%',padding:'12px',borderRadius:10,border:`1px solid ${C.primary}`,
                  background:'rgba(255,90,31,0.1)',color:C.primary,fontSize:14,fontWeight:600,
                  cursor:'pointer',fontFamily:'Pretendard,sans-serif'}}>
                프로파일에 반영하기
              </button>
            </div>
          )}
        </GlassCard>
      </div>
    </div>
  );
}

/* ─────────── TRACE (트렌드 분석) ─────────── */
function TraceView(){
  const [period,setPeriod]=React.useState('월간');
  const [chartKey,setChartKey]=React.useState(0);
  const chartRef=React.useRef(null);
  const chartInstance=React.useRef(null);

  const trendData={
    '주간':{labels:['간장','고추장','된장','참기름','마늘','생강','깻잎'],data:[87,76,65,58,72,61,44]},
    '월간':{labels:['간장','고추장','된장','참기름','마늘','생강','깻잎'],data:[340,280,230,195,260,182,155]},
    '분기':{labels:['간장','고추장','된장','참기름','마늘','생강','깻잎'],data:[1200,980,840,720,890,640,560]},
  };
  const lineData={
    '주간':[12,18,15,22,28,25,32],
    '월간':[89,102,118,95,134,128,147],
    '분기':[310,365,402,380,445,430,490],
  };

  React.useEffect(()=>{
    const ctx=chartRef.current?.getContext('2d');
    if(!ctx)return;
    if(chartInstance.current)chartInstance.current.destroy();
    const d=trendData[period];
    chartInstance.current=new Chart(ctx,{
      type:'bar',
      data:{labels:d.labels,
        datasets:[{data:d.data,backgroundColor:['rgba(255,90,31,0.8)','rgba(233,30,140,0.8)','rgba(255,179,71,0.8)',
          'rgba(124,58,237,0.8)','rgba(59,130,246,0.8)','rgba(16,185,129,0.8)','rgba(245,158,11,0.8)'],
          borderRadius:6,borderSkipped:false}]},
      options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},
        tooltip:{backgroundColor:'rgba(26,26,26,0.95)',titleColor:'#fff',bodyColor:'#B0B0B0',
          borderColor:'rgba(255,255,255,0.1)',borderWidth:1}},
        scales:{x:{grid:{color:'rgba(255,255,255,0.05)'},ticks:{color:'#B0B0B0'}},
          y:{grid:{color:'rgba(255,255,255,0.05)'},ticks:{color:'#B0B0B0'}}}}
    });
  },[period]);

  const rankings=[
    {rank:1,name:'간장 베이스 불고기 소스',change:'+12%',tags:['달콤','감칠맛'],mentions:1240},
    {rank:2,name:'고추장 떡볶이 양념',change:'+8%',tags:['매콤','달콤'],mentions:980},
    {rank:3,name:'된장 삼겹살 쌈장',change:'+5%',tags:['짭조름','감칠맛'],mentions:840},
    {rank:4,name:'참기름 나물 무침 드레싱',change:'+3%',tags:['고소함'],mentions:720},
    {rank:5,name:'갈비 양념 소스',change:'+2%',tags:['달콤','감칠맛','매콤'],mentions:680},
  ];

  return(
    <div style={{padding:'40px 60px',animation:'fadeIn 300ms ease'}}>

            </div>
          </GlassCard>

          {timerSec!==null&&(
            <GlassCard style={{padding:24,animation:'fadeInScale 300ms ease'}}>
              <h3 style={{fontSize:16,fontWeight:700,marginBottom:12}}>⏱️ 조리 타이머</h3>
              <div style={{textAlign:'center'}}>
                <div style={{fontSize:40,fontWeight:900,color:timerRunning?C.accent:C.text,
                  fontVariantNumeric:'tabular-nums',marginBottom:16}}>
                  {formatTime(timerSec)}
                </div>
                <div style={{display:'flex',gap:8,justifyContent:'center'}}>
                  <button onClick={()=>setTimerRunning(r=>!r)}
                    style={{padding:'8px 20px',borderRadius:10,border:'none',
                      background:timerRunning?C.secondary:C.primary,color:'#fff',
                      fontSize:14,fontWeight:600,cursor:'pointer',fontFamily:'Pretendard,sans-serif'}}>
                    {timerRunning?'일시정지':'시작'}
                  </button>
                  <button onClick={()=>{setTimerRunning(false);setTimerSec(null);}}
                    style={{padding:'8px 16px',borderRadius:10,border:`1px solid ${C.border}`,
                      background:'transparent',color:C.sub,fontSize:14,cursor:'pointer',fontFamily:'Pretendard,sans-serif'}}>
                    초기화
                  </button>
                </div>
              </div>
            </GlassCard>
          )}
        </div>
      </div>

      {/* 조리 순서 */}
      <GlassCard style={{padding:32}}>
        <h3 style={{fontSize:18,fontWeight:700,marginBottom:20}}>📋 조리 순서</h3>
        <div style={{display:'flex',flexDirection:'column',gap:16}}>
          {base.steps.map((step,i)=>(
            <div key={i} style={{display:'flex',gap:16,padding:'16px 20px',borderRadius:12,
              background:'rgba(255,255,255,0.03)',animation:`slideUp 300ms ease ${i*80}ms both`}}>
              <span style={{width:32,height:32,borderRadius:'50%',background:C.grad,
                display:'flex',alignItems:'center',justifyContent:'center',
                fontSize:14,fontWeight:700,flexShrink:0}}>{i+1}</span>
              <div style={{flex:1,paddingTop:4}}>
                <span style={{fontSize:15,color:C.text,lineHeight:1.7}}>{step.text}</span>
              </div>
              {step.timer&&(
                <button onClick={()=>{setTimerSec(step.timer);setTimerRunning(true);setToast(`⏱️ ${step.timer/60}분 타이머 시작`);}}
                  style={{padding:'6px 14px',borderRadius:8,border:`1px solid rgba(255,179,71,0.3)`,
                    background:'rgba(255,179,71,0.1)',color:C.accent,fontSize:12,fontWeight:600,
                    cursor:'pointer',flexShrink:0,fontFamily:'Pretendard,sans-serif'}}>
                  ⏱️ {step.timer>=60?`${step.timer/60}분`:`${step.timer}초`}
                </button>
              )}
            </div>
          ))}
        </div>
      </GlassCard>
    </div>
  );
}

/* ─────────── TOP NAV ─────────── */
function TopNav({page,setPage}){
  const tabs=[
    {id:'home',label:'홈'},
    {id:'crave',label:'Crave'},
    {id:'trend',label:'트렌드 분석'},
    {id:'formulate',label:'레시피 생성'},
    {id:'recipe-detail',label:'레시피 상세'},
  ];
  return(
    <nav style={{background:C.surface,borderBottom:`1px solid ${C.border}`,
      display:'flex',alignItems:'center',padding:'0 60px',height:60,position:'sticky',top:0,zIndex:100,
      backdropFilter:'blur(10px)'}}>
      <div style={{fontWeight:900,fontSize:20,background:C.grad,
        WebkitBackgroundClip:'text',WebkitTextFillColor:'transparent',marginRight:40,flexShrink:0}}>
        FLAVOR<span style={{color:C.accent}}>AI</span>
      </div>
      <div style={{display:'flex',gap:4,flex:1}}>
        {tabs.map(t=>(
          <button key={t.id} onClick={()=>setPage(t.id)}
            style={{padding:'8px 16px',border:'none',background:page===t.id?'rgba(255,90,31,0.2)':'transparent',
              color:page===t.id?C.primary:C.sub,fontSize:14,fontWeight:page===t.id?700:400,
              cursor:'pointer',borderRadius:8,transition:'all 0.15s ease',fontFamily:'Pretendard,sans-serif',
              borderBottom:page===t.id?`2px solid ${C.primary}`:'2px solid transparent'}}>
            {t.label}
          </button>
        ))}
      </div>
      <div style={{width:36,height:36,borderRadius:'50%',background:C.grad,
        display:'flex',alignItems:'center',justifyContent:'center',fontSize:14,fontWeight:700}}>
        AI
      </div>
    </nav>
  );
}

/* ─────────── APP ─────────── */
function App(){
  const [page,setPage]=React.useState('home');
  const [toast,setToast]=React.useState(null);
  const [loading,setLoading]=React.useState(true);

  React.useEffect(()=>{setTimeout(()=>setLoading(false),1200);},[]);

  if(loading){
    return(
      <div style={{display:'flex',alignItems:'center',justifyContent:'center',height:'100vh',
        background:C.bg,flexDirection:'column',gap:24}}>
        <div style={{fontSize:32,fontWeight:900,background:C.grad,
          WebkitBackgroundClip:'text',WebkitTextFillColor:'transparent'}}>FLAVORAI</div>
        <div style={{display:'flex',gap:8}}>
          {[0,1,2].map(i=>(
            <div key={i} style={{width:8,height:8,borderRadius:'50%',background:C.primary,
              animation:`pulse 1s infinite ${i*0.2}s`}}/>
          ))}
        </div>
        <div style={{color:C.sub,fontSize:14}}>AI 레시피 플랫폼 초기화 중...</div>
      </div>
    );
  }

  const views={
    home:<HomeView setPage={setPage}/>,
    crave:<CraveView setToast={setToast}/>,
    trend:<TraceView/>,
    formulate:<FormulateView setToast={setToast}/>,
    'recipe-detail':<RecipeDetailView setToast={setToast}/>,
  };

  return(
    <div style={{width:'100%',height:'100vh',display:'flex',flexDirection:'column',background:C.bg,overflow:'hidden'}}>
      <TopNav page={page} setPage={setPage}/>
      <div style={{flex:1,overflowY:'auto'}}>
        <div key={page} style={{animation:'fadeIn 300ms ease'}}>
          {views[page]||views.home}
        </div>
      </div>
      {toast&&<Toast message={toast} onClose={()=>setToast(null)}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
