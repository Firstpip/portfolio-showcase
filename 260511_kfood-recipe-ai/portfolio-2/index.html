<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>FLAVOR Studio — 구현 데모</title>
<link rel="preconnect" href="https://cdn.jsdelivr.net"/>
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" rel="stylesheet"/>
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://unpkg.com/prop-types/prop-types.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/recharts@2.15.0/umd/Recharts.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body,#root{width:100%;height:100%;font-family:'Pretendard',sans-serif;background:#F8FAFC;color:#0F172A}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes fadeInScale{from{opacity:0;transform:scale(0.95)}to{opacity:1;transform:scale(1)}}
@keyframes slideInRight{from{opacity:0;transform:translateX(30px)}to{opacity:1;transform:translateX(0)}}
@keyframes slideUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@keyframes ripple{0%{transform:scale(0);opacity:0.4}100%{transform:scale(4);opacity:0}}
@keyframes countUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}
@keyframes barGrow{from{width:0%}to{width:var(--target-width)}}
@keyframes progressFill{from{stroke-dashoffset:283}to{stroke-dashoffset:var(--dash-offset)}}
@keyframes slideDown{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}
@keyframes bounceIn{0%{transform:scale(0.8);opacity:0}60%{transform:scale(1.05)}100%{transform:scale(1);opacity:1}}
.chart-canvas-wrap{position:relative;height:240px}
.chart-canvas-wrap canvas{width:100%!important;height:100%!important}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {
  RadarChart,Radar,PolarGrid,PolarAngleAxis,PolarRadiusAxis,
  ResponsiveContainer,Tooltip,Legend,LineChart,Line,XAxis,YAxis,CartesianGrid,
  BarChart,Bar,PieChart,Pie,Cell
}=Recharts;

const C={
  bg:'#F8FAFC', surface:'#FFFFFF', card:'#FFFFFF',
  primary:'#2563EB', accent:'#38BDF8', secondary:'#0F172A',
  border:'#E2E8F0', text:'#0F172A', sub:'#64748B', light:'#F1F5F9',
  success:'#22C55E', warning:'#F59E0B', danger:'#EF4444'
};

function Toast({message,onClose}){
  React.useEffect(()=>{const t=setTimeout(onClose,3000);return()=>clearTimeout(t)},[]);
  return(
    <div style={{position:'fixed',bottom:24,right:24,zIndex:9999,background:C.secondary,
      color:'#fff',padding:'12px 20px',borderRadius:10,animation:'slideUp 300ms ease',
      boxShadow:'0 4px 20px rgba(15,23,42,0.2)',fontWeight:600,fontSize:14,
      display:'flex',alignItems:'center',gap:8}}>
      {message}
    </div>
  );
}

function CountUp({end,duration=1200,suffix='',prefix=''}){
  const [val,setVal]=React.useState(0);
  React.useEffect(()=>{
    let s=0;const step=end/(duration/16);
    const t=setInterval(()=>{s+=step;if(s>=end){setVal(end);clearInterval(t);}else setVal(Math.floor(s));},16);
    return()=>clearInterval(t);
  },[end]);
  return <span style={{animation:'countUp 400ms ease'}}>{prefix}{val.toLocaleString()}{suffix}</span>;
}

function Modal({title,onClose,children,width=560}){
  return(
    <div style={{position:'fixed',inset:0,zIndex:500,display:'flex',alignItems:'center',justifyContent:'center'}}>
      <div onClick={onClose} style={{position:'absolute',inset:0,background:'rgba(15,23,42,0.4)',animation:'fadeIn 200ms ease'}}/>
      <div style={{position:'relative',width,maxHeight:'85vh',background:C.surface,borderRadius:16,zIndex:501,
        animation:'fadeInScale 200ms ease',display:'flex',flexDirection:'column',
        boxShadow:'0 20px 60px rgba(15,23,42,0.15)',border:`1px solid ${C.border}`}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'20px 24px',
          borderBottom:`1px solid ${C.border}`}}>
          <h3 style={{fontSize:18,fontWeight:700,color:C.text}}>{title}</h3>
          <button onClick={onClose} style={{background:'none',border:'none',fontSize:20,cursor:'pointer',color:C.sub}}>✕</button>
        </div>
        <div style={{padding:24,overflowY:'auto',flex:1}}>{children}</div>
      </div>
    </div>
  );
}

function Card({children,style={},hoverable=false,onClick}){
  const [hov,setHov]=React.useState(false);
  return(
    <div onMouseEnter={()=>hoverable&&setHov(true)} onMouseLeave={()=>hoverable&&setHov(false)}
      onClick={onClick}
      style={{background:C.surface,borderRadius:12,border:`1px solid ${hov?C.primary:C.border}`,
        boxShadow:hov?'0 4px 24px rgba(37,99,235,0.12)':'0 1px 4px rgba(0,0,0,0.04)',
        transition:'all 0.2s ease',cursor:onClick?'pointer':'default',...style}}>
      {children}
    </div>
  );
}

function Badge({label,color='blue'}){
  const colors={blue:{bg:'#EFF6FF',text:'#1D4ED8'},green:{bg:'#F0FDF4',text:'#16A34A'},
    yellow:{bg:'#FFFBEB',text:'#B45309'},red:{bg:'#FEF2F2',text:'#B91C1C'},
    gray:{bg:'#F8FAFC',text:'#64748B'}};
  const cl=colors[color]||colors.blue;
  return(
    <span style={{padding:'3px 10px',borderRadius:20,background:cl.bg,color:cl.text,
      fontSize:12,fontWeight:600}}>{label}</span>
  );
}

/* ─────────── DASHBOARD ─────────── */
function DashboardView({setRoute,setToast}){
  const [filter,setFilter]=React.useState('전체');
  const [search,setSearch]=React.useState('');
  const [selected,setSelected]=React.useState([]);
  const [detailModal,setDetailModal]=React.useState(null);
  const [bulkModal,setBulkModal]=React.useState(false);

  const statuses=['전체','draft','review','approved'];

  const initRecipes=[
    {id:1,name:'제주 한라봉 불고기 소스',status:'approved',category:'불고기·구이',tags:['달콤','감칠맛'],updatedAt:'2026.05.10',views:342},
    {id:2,name:'고추장 라볶이 양념',status:'review',category:'분식',tags:['매콤','달콤'],updatedAt:'2026.05.09',views:218},
    {id:3,name:'된장 삼겹살 쌈장',status:'approved',category:'구이',tags:['짭조름','감칠맛'],updatedAt:'2026.05.08',views:195},
    {id:4,name:'참기름 시금치 나물 무침',status:'draft',category:'나물',tags:['고소함'],updatedAt:'2026.05.07',views:88},
    {id:5,name:'갈비찜 양념 소스',status:'review',category:'찜·탕',tags:['달콤','감칠맛','매콤'],updatedAt:'2026.05.06',views:167},
    {id:6,name:'유자 폰즈 소스',status:'approved',category:'드레싱',tags:['새콤','달콤'],updatedAt:'2026.05.05',views:143},
    {id:7,name:'마늘 버터 소스',status:'draft',category:'볶음',tags:['고소함','감칠맛'],updatedAt:'2026.05.04',views:72},
    {id:8,name:'매운 청양 타코 소스',status:'approved',category:'퓨전',tags:['매콤'],updatedAt:'2026.05.03',views:129},
  ];
  const [recipes,setRecipes]=React.useState(initRecipes);

  const filtered=recipes.filter(r=>{
    const matchF=filter==='전체'||r.status===filter;
    const matchS=!search||(r.name.includes(search)||r.category.includes(search));
    return matchF&&matchS;
  });

  const statusColor={draft:'gray',review:'yellow',approved:'green'};
  const statusLabel={draft:'초안',review:'검토 중',approved:'승인'};

  const bulkChangeStatus=(s)=>{
    setRecipes(r=>r.map(rec=>selected.includes(rec.id)?{...rec,status:s}:rec));
    setToast(`✅ ${selected.length}개 항목이 '${statusLabel[s]}'로 변경됐습니다`);
    setSelected([]);setBulkModal(false);
  };

  return(
    <div style={{padding:'32px',animation:'fadeIn 300ms ease'}}>
      {/* KPI */}
      <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:20,marginBottom:32}}>
        {[
          {label:'전체 레시피',value:847,icon:'📋',color:C.primary,suffix:'건'},
          {label:'승인 완료',value:312,icon:'✅',color:C.success,suffix:'건'},
          {label:'검토 대기',value:89,icon:'⏳',color:C.warning,suffix:'건'},
          {label:'이번 주 생성',value:47,icon:'✨',color:'#7C3AED',suffix:'건'},
        ].map((k,i)=>(
          <Card key={i} style={{padding:'20px 24px',animation:`slideUp 300ms ease ${i*80}ms both`}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start'}}>
              <div>
                <div style={{fontSize:13,color:C.sub,marginBottom:8}}>{k.label}</div>
                <div style={{fontSize:28,fontWeight:800,color:k.color}}>
                  <CountUp end={k.value} suffix={k.suffix}/>
                </div>
              </div>
              <span style={{fontSize:28,opacity:0.7}}>{k.icon}</span>
            </div>
          </Card>
        ))}
      </div>

      {/* Table */}
      <Card style={{padding:0,overflow:'hidden'}}>
        <div style={{padding:'20px 24px',borderBottom:`1px solid ${C.border}`,
          display:'flex',justifyContent:'space-between',alignItems:'center',flexWrap:'wrap',gap:12}}>
          <div style={{display:'flex',gap:8}}>
            {statuses.map(s=>(
              <button key={s} onClick={()=>setFilter(s)}
                style={{padding:'6px 16px',borderRadius:20,border:`1px solid ${filter===s?C.primary:C.border}`,
                  background:filter===s?'#EFF6FF':'transparent',color:filter===s?C.primary:C.sub,
                  fontSize:13,cursor:'pointer',fontFamily:'Pretendard,sans-serif'}}>
                {s==='전체'?s:statusLabel[s]}
              </button>
            ))}
          </div>
          <div style={{display:'flex',gap:10,alignItems:'center'}}>
            <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="레시피 검색..."
              style={{padding:'8px 14px',borderRadius:8,border:`1px solid ${C.border}`,fontSize:13,
                background:C.bg,fontFamily:'Pretendard,sans-serif',color:C.text,outline:'none',width:200}}/>
            {selected.length>0&&(
              <button onClick={()=>setBulkModal(true)}
                style={{padding:'8px 16px',borderRadius:8,border:'none',background:C.primary,
                  color:'#fff',fontSize:13,fontWeight:600,cursor:'pointer',fontFamily:'Pretendard,sans-serif'}}>
                {selected.length}개 일괄 변경
              </button>
            )}
          </div>
        </div>

        <table style={{width:'100%',borderCollapse:'collapse'}}>
          <thead>
            <tr style={{background:C.bg}}>
              <th style={{padding:'12px 16px',textAlign:'left',fontSize:12,color:C.sub,fontWeight:600,width:40}}>
                <input type="checkbox" onChange={e=>{setSelected(e.target.checked?filtered.map(r=>r.id):[]);}}
                  checked={selected.length>0&&selected.length===filtered.length}/>
              </th>
              {['레시피명','카테고리','태그','상태','조회','수정일',''].map((h,i)=>(
                <th key={i} style={{padding:'12px 16px',textAlign:'left',fontSize:12,color:C.sub,fontWeight:600}}>{h}</th>
              ))}
            </tr>
          </thead>
          <tbody>
            {filtered.map((r,i)=>(
              <tr key={r.id} style={{borderTop:`1px solid ${C.border}`,transition:'background 0.1s',
                animation:`slideUp 200ms ease ${i*40}ms both`}}
                onMouseEnter={e=>e.currentTarget.style.background=C.bg}
                onMouseLeave={e=>e.currentTarget.style.background='transparent'}>
                <td style={{padding:'12px 16px'}}>
                  <input type="checkbox" checked={selected.includes(r.id)}
                    onChange={e=>setSelected(p=>e.target.checked?[...p,r.id]:p.filter(x=>x!==r.id))}/>
                </td>
                <td style={{padding:'12px 16px'}}>
                  <button onClick={()=>setDetailModal(r)} style={{background:'none',border:'none',
                    fontSize:14,fontWeight:600,color:C.text,cursor:'pointer',fontFamily:'Pretendard,sans-serif',
                    textAlign:'left'}}>
                    {r.name}
                  </button>
                </td>
                <td style={{padding:'12px 16px'}}><span style={{fontSize:13,color:C.sub}}>{r.category}</span></td>
                <td style={{padding:'12px 16px'}}>
                  <div style={{display:'flex',gap:4}}>
                    {r.tags.map(t=>(
                      <span key={t} style={{fontSize:11,background:C.light,padding:'2px 8px',
                        borderRadius:20,color:C.sub}}>{t}</span>
                    ))}
                  </div>
                </td>
                <td style={{padding:'12px 16px'}}><Badge label={statusLabel[r.status]} color={statusColor[r.status]}/></td>
                <td style={{padding:'12px 16px'}}><span style={{fontSize:13,color:C.sub}}>{r.views.toLocaleString()}</span></td>
                <td style={{padding:'12px 16px'}}><span style={{fontSize:12,color:C.sub}}>{r.updatedAt}</span></td>
                <td style={{padding:'12px 16px'}}>
                  <button onClick={()=>setDetailModal(r)} style={{padding:'5px 12px',borderRadius:6,
                    border:`1px solid ${C.border}`,background:'transparent',fontSize:12,
                    cursor:'pointer',color:C.sub,fontFamily:'Pretendard,sans-serif'}}>
                    상세
                  </button>
                </td>
              </tr>
            ))}
          </tbody>
        </table>

        <div style={{padding:'12px 24px',borderTop:`1px solid ${C.border}`,
          display:'flex',justifyContent:'space-between',alignItems:'center'}}>
          <span style={{fontSize:13,color:C.sub}}>{filtered.length}개 항목</span>
          <div style={{display:'flex',gap:4}}>
            {[1,2,3,'...'].map((p,i)=>(
              <button key={i} style={{width:32,height:32,borderRadius:6,border:`1px solid ${p===1?C.primary:C.border}`,
                background:p===1?'#EFF6FF':'transparent',color:p===1?C.primary:C.sub,
                fontSize:13,cursor:'pointer',fontFamily:'Pretendard,sans-serif'}}>{p}</button>
            ))}
          </div>
        </div>
      </Card>

      {detailModal&&(
        <Modal title="레시피 상세" onClose={()=>setDetailModal(null)} width={520}>
          <div>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16}}>
              <h4 style={{fontSize:16,fontWeight:700}}>{detailModal.name}</h4>
              <Badge label={statusLabel[detailModal.status]} color={statusColor[detailModal.status]}/>
            </div>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12,marginBottom:20}}>
              {[['카테고리',detailModal.category],['수정일',detailModal.updatedAt],
                ['조회수',detailModal.views.toLocaleString()],['태그',detailModal.tags.join(', ')]].map(([k,v])=>(
                <div key={k} style={{padding:'12px',background:C.bg,borderRadius:8}}>
                  <div style={{fontSize:12,color:C.sub,marginBottom:4}}>{k}</div>
                  <div style={{fontSize:14,fontWeight:600,color:C.text}}>{v}</div>
                </div>
              ))}
            </div>
            <div style={{display:'flex',gap:8}}>
              <button onClick={()=>{setRecipes(r=>r.map(x=>x.id===detailModal.id?{...x,status:'approved'}:x));setDetailModal(null);setToast('✅ 상태가 승인으로 변경됐습니다');}}
                style={{flex:1,padding:'11px',borderRadius:8,border:'none',background:C.primary,
                  color:'#fff',fontSize:14,fontWeight:600,cursor:'pointer',fontFamily:'Pretendard,sans-serif'}}>
                승인
              </button>
              <button onClick={()=>setDetailModal(null)} style={{flex:1,padding:'11px',borderRadius:8,
                border:`1px solid ${C.border}`,background:'transparent',color:C.sub,
                fontSize:14,cursor:'pointer',fontFamily:'Pretendard,sans-serif'}}>
                닫기
              </button>
            </div>
          </div>
        </Modal>
      )}

      {bulkModal&&(
        <Modal title={`${selected.length}개 상태 일괄 변경`} onClose={()=>setBulkModal(false)} width={380}>
          <div style={{display:'flex',flexDirection:'column',gap:10}}>
            {Object.entries(statusLabel).map(([s,l])=>(
              <button key={s} onClick={()=>bulkChangeStatus(s)}
                style={{padding:'12px 16px',borderRadius:8,border:`1px solid ${C.border}`,
                  background:C.bg,fontSize:14,fontWeight:600,cursor:'pointer',
                  color:C.text,fontFamily:'Pretendard,sans-serif',textAlign:'left'}}>
                {l}으로 변경
              </button>
            ))}
          </div>
        </Modal>
      )}
    </div>
  );
}

/* ─────────── SAUCE OPTIMIZER ─────────── */

  const [ratios,setRatios]=React.useState({간장:40,고추장:20,설탕:15,마늘:10,참기름:10,생강:5});

  const [result,setResult]=React.useState(null);
  const [csvModal,setCsvModal]=React.useState(false);

  const totalRatio=Object.values(ratios).reduce((a,b)=>a+b,0);

  const getRadarData=()=>[
    {subject:'달콤',A:ratios.설탕*2.5+ratios.고추장*0.5,fullMark:100},
    {subject:'짭조름',A:ratios.간장*1.5,fullMark:100},
    {subject:'매콤',A:ratios.고추장*2+ratios.생강*1.5,fullMark:100},
    {subject:'감칠맛',A:ratios.간장*1.2+ratios.마늘*1.8,fullMark:100},
    {subject:'고소함',A:ratios.참기름*3.5,fullMark:100},
    {subject:'새콤',A:ratios.생강*2,fullMark:100},
  ];

  const analyze=()=>{
    setLoading(true);setResult(null);
    setTimeout(()=>{
      setLoading(false);
      setResult({
        dominant:'감칠맛·달콤',
        pairings:['삼겹살','닭구이','해산물'],
        suggestions:[
          {ratio:{간장:45,고추장:15,설탕:18,마늘:10,참기름:8,생강:4},score:94,label:'최적 균형'},
          {ratio:{간장:38,고추장:25,설탕:12,마늘:12,참기름:8,생강:5},score:89,label:'매콤 강화'},
          {ratio:{간장:42,고추장:18,설탕:20,마늘:8,참기름:9,생강:3},score:85,label:'달콤 강화'},
        ]
      });
    },1800);
  };

  return(
    <div style={{padding:'32px',animation:'fadeIn 300ms ease'}}>
      <div style={{marginBottom:28}}>
        <h2 style={{fontSize:28,fontWeight:800,marginBottom:6}}>🧪 소스 성분 최적화</h2>
        <p style={{color:C.sub,fontSize:14}}>성분 비율을 조정하고 Claude API 기반 맛 예측을 실시간으로 확인합니다.</p>
      </div>

      <div style={{display:'grid',gridTemplateColumns:'1fr 1.4fr',gap:28}}>
        {/* 슬라이더 */}
        <Card style={{padding:28}}>
          <h3 style={{fontSize:16,fontWeight:700,marginBottom:20}}>성분 비율 조정</h3>
          <div style={{display:'flex',flexDirection:'column',gap:16}}>
            {Object.entries(ratios).map(([name,val])=>(
              <div key={name}>
                <div style={{display:'flex',justifyContent:'space-between',marginBottom:6}}>

/* ─────────── BATCH PIPELINE ─────────── */
function BatchPipelineView({setToast}){
  const [config,setConfig]=React.useState({category:'불고기·구이',taste:'달콤',count:8});
  const [running,setRunning]=React.useState(false);
  const [progress,setProgress]=React.useState(0);
  const [completed,setCompleted]=React.useState([]);
  const [failed,setFailed]=React.useState([]);
  const [csvModal,setCsvModal]=React.useState(false);

  const recipeNames=[
    '제주 감귤 불고기 소스','숯불 향 갈비 양념','유자 간장 불고기','사과 배즙 양념','허니 마늘 불고기',
    '고구마 글레이즈 소스','대파 된장 불고기','생강 청주 마리네이드',
  ];

  const startBatch=()=>{
    setRunning(true);setProgress(0);setCompleted([]);setFailed([]);
    let done=0;const total=config.count;
    const t=setInterval(()=>{
      done++;
      const pct=Math.round(done/total*100);
      setProgress(pct);
      const isFail=done===5;
      if(isFail){
        setFailed(p=>[...p,{name:recipeNames[done-1],error:'API 레이트 리밋 초과'}]);
      } else {
        setCompleted(p=>[...p,{
          id:done,name:recipeNames[done-1]||`레시피 ${done}`,
          tags:['달콤','감칠맛'],category:config.category,createdAt:new Date().toLocaleTimeString('ko-KR')
        }]);
      }
      if(done>=total){
        clearInterval(t);setRunning(false);
        setToast(`✅ 배치 완료 — ${total-1}개 성공, 1개 실패`);
      }
    },900);
  };

  const totalDone=completed.length+failed.length;
  const pct=config.count>0?Math.round(totalDone/config.count*100):0;

  return(
    <div style={{padding:'32px',animation:'fadeIn 300ms ease'}}>
      <div style={{marginBottom:28}}>
        <h2 style={{fontSize:28,fontWeight:800,marginBottom:6}}>⚙️ 배치 레시피 생성 파이프라인</h2>
        <p style={{color:C.sub,fontSize:14}}>Celery + Redis 기반 비동기 Claude API 배치 생성 모니터링</p>
      </div>

      <div style={{display:'grid',gridTemplateColumns:'320px 1fr',gap:24}}>
        {/* 설정 */}
        <Card style={{padding:24,alignSelf:'start'}}>
          <h3 style={{fontSize:16,fontWeight:700,marginBottom:20}}>배치 설정</h3>
          <div style={{display:'flex',flexDirection:'column',gap:16}}>
            <div>
              <label style={{fontSize:13,fontWeight:600,color:C.text,display:'block',marginBottom:8}}>소스 카테고리</label>
              <select value={config.category} onChange={e=>setConfig(p=>({...p,category:e.target.value}))}
                style={{width:'100%',padding:'9px 12px',borderRadius:8,border:`1px solid ${C.border}`,
                  fontSize:13,fontFamily:'Pretendard,sans-serif',background:C.bg,color:C.text,outline:'none'}}>
                {['불고기·구이','분식','찜·탕','나물','드레싱','퓨전'].map(c=>(
                  <option key={c}>{c}</option>
                ))}
              </select>
            </div>
            <div>
              <label style={{fontSize:13,fontWeight:600,color:C.text,display:'block',marginBottom:8}}>타깃 맛 취향</label>
              <select value={config.taste} onChange={e=>setConfig(p=>({...p,taste:e.target.value}))}
                style={{width:'100%',padding:'9px 12px',borderRadius:8,border:`1px solid ${C.border}`,
                  fontSize:13,fontFamily:'Pretendard,sans-serif',background:C.bg,color:C.text,outline:'none'}}>
                {['달콤','매콤','감칠맛','짭조름','고소함','새콤'].map(t=>(
                  <option key={t}>{t}</option>
                ))}
              </select>
            </div>
            <div>
              <label style={{fontSize:13,fontWeight:600,color:C.text,display:'block',marginBottom:8}}>생성 수량: {config.count}개</label>
              <input type="range" min="2" max="16" value={config.count}
                onChange={e=>setConfig(p=>({...p,count:parseInt(e.target.value)}))}
                style={{width:'100%',accentColor:C.primary}}/>
            </div>
            <button onClick={startBatch} disabled={running}
              style={{padding:'12px',borderRadius:10,border:'none',
                background:running?C.border:C.primary,color:'#fff',
                fontSize:14,fontWeight:700,cursor:running?'default':'pointer',fontFamily:'Pretendard,sans-serif'}}>
              {running?'⚙️ 생성 중...':'🚀 배치 시작'}
            </button>
            {(completed.length>0||failed.length>0)&&!running&&(
              <button onClick={()=>setCsvModal(true)} style={{padding:'10px',borderRadius:8,
                border:`1px solid ${C.border}`,background:C.bg,fontSize:13,fontWeight:600,
                cursor:'pointer',color:C.text,fontFamily:'Pretendard,sans-serif'}}>
                📥 결과 CSV 내보내기
              </button>
            )}
          </div>
        </Card>

        {/* 진행 현황 */}
        <div style={{display:'flex',flexDirection:'column',gap:20}}>
          {/* 진행률 */}
          <Card style={{padding:24}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16}}>
              <h3 style={{fontSize:16,fontWeight:700}}>진행 현황</h3>
              <div style={{display:'flex',gap:16,fontSize:14}}>
                <span style={{color:C.success}}>✅ 성공: {completed.length}</span>
                <span style={{color:C.danger}}>❌ 실패: {failed.length}</span>
                <span style={{color:C.sub}}>총: {config.count}개</span>
              </div>
            </div>
            <div style={{height:10,background:C.light,borderRadius:5,marginBottom:10,overflow:'hidden'}}>
              <div style={{height:'100%',borderRadius:5,background:running?`linear-gradient(90deg,${C.primary},${C.accent})`:C.success,
                transition:'width 0.3s ease',width:`${pct}%`}}/>
            </div>
            <div style={{display:'flex',justifyContent:'space-between',fontSize:12,color:C.sub}}>
              <span>{running?<span style={{animation:'pulse 1s infinite',color:C.primary}}>⚡ Celery 워커 처리 중</span>:'대기 중'}</span>
              <span style={{fontWeight:700,color:C.text}}>{pct}%</span>
            </div>
          </Card>

          {/* 실패 */}
          {failed.length>0&&(
            <Card style={{padding:20,border:`1px solid rgba(239,68,68,0.3)`,background:'#FEF2F2',animation:'fadeInScale 300ms ease'}}>
              <h3 style={{fontSize:14,fontWeight:700,color:C.danger,marginBottom:12}}>⚠️ 실패 항목 ({failed.length}건)</h3>
              {failed.map((f,i)=>(
                <div key={i} style={{display:'flex',justifyContent:'space-between',alignItems:'center',
                  padding:'8px 12px',borderRadius:8,background:'rgba(239,68,68,0.08)'}}>
                  <div>
                    <div style={{fontSize:13,fontWeight:600,color:C.text}}>{f.name}</div>
                    <div style={{fontSize:12,color:C.danger}}>{f.error}</div>
                  </div>
                  <button onClick={()=>setToast(`🔄 ${f.name} 재시도 중`)} style={{padding:'5px 12px',borderRadius:6,
                    border:`1px solid ${C.danger}`,background:'transparent',fontSize:12,
                    cursor:'pointer',color:C.danger,fontFamily:'Pretendard,sans-serif'}}>
                    재시도
                  </button>
                </div>
              ))}
            </Card>
          )}

          {/* 결과 목록 */}
          <Card style={{padding:0,overflow:'hidden'}}>
            <div style={{padding:'14px 20px',borderBottom:`1px solid ${C.border}`}}>
              <h3 style={{fontSize:15,fontWeight:700}}>생성된 레시피 ({completed.length}건)</h3>
            </div>
            <div style={{maxHeight:300,overflowY:'auto'}}>
              {completed.length===0?(
                <div style={{padding:'32px',textAlign:'center',color:C.sub,fontSize:13}}>
                  배치 작업을 시작하면 레시피가 실시간으로 표시됩니다.
                </div>
              ):(
                completed.map((r,i)=>(
                  <div key={r.id} style={{display:'flex',justifyContent:'space-between',alignItems:'center',
                    padding:'12px 20px',borderBottom:`1px solid ${C.border}`,
                    animation:'slideUp 200ms ease both'}}>
                    <div style={{display:'flex',alignItems:'center',gap:12}}>
                      <span style={{width:24,height:24,borderRadius:'50%',background:'#F0FDF4',
                        display:'flex',alignItems:'center',justifyContent:'center',fontSize:12}}>✅</span>
                      <div>
                        <div style={{fontSize:14,fontWeight:600,color:C.text}}>{r.name}</div>
                        <div style={{fontSize:12,color:C.sub}}>{r.category} · {r.tags.join(', ')}</div>
                      </div>
                    </div>
                    <span style={{fontSize:11,color:C.sub}}>{r.createdAt}</span>
                  </div>
                ))
              )}
            </div>
          </Card>
        </div>
      </div>

      {csvModal&&(
        <Modal title="CSV 내보내기" onClose={()=>setCsvModal(false)} width={400}>
          <div style={{textAlign:'center',padding:'20px 0'}}>
            <div style={{fontSize:48,marginBottom:16}}>📊</div>
            <div style={{fontSize:15,fontWeight:700,marginBottom:8}}>배치 결과 내보내기</div>
            <div style={{fontSize:14,color:C.sub,marginBottom:24,lineHeight:1.7}}>
              {completed.length}개 성공, {failed.length}개 실패 결과가<br/>CSV 파일로 다운로드됩니다.
            </div>
            <button onClick={()=>{setCsvModal(false);setToast('✅ CSV 파일이 다운로드됩니다');}}
              style={{padding:'12px 32px',borderRadius:10,border:'none',background:C.primary,
                color:'#fff',fontSize:14,fontWeight:700,cursor:'pointer',fontFamily:'Pretendard,sans-serif'}}>
              다운로드
            </button>
          </div>
        </Modal>
      )}
    </div>
  );
}

      <div style={{width:'100%',height:'100vh',display:'flex',alignItems:'center',justifyContent:'center',
        background:C.bg,flexDirection:'column',gap:20}}>
        <div style={{fontSize:28,fontWeight:800,color:C.primary}}>FLAVOR <span style={{color:C.text}}>Studio</span></div>
        <div style={{display:'flex',gap:4}}>
          {[0,1,2].map(i=>(
            <div key={i} style={{width:6,height:6,borderRadius:'50%',background:C.primary,
              animation:`pulse 0.9s infinite ${i*0.15}s`}}/>
          ))}
        </div>
        <div style={{display:'flex',gap:12}}>
          {[...Array(4)].map((_,i)=>(
            <div key={i} style={{width:160,height:80,borderRadius:10,
              background:`linear-gradient(90deg, #E2E8F0 25%, #F1F5F9 50%, #E2E8F0 75%)`,
              backgroundSize:'200% 100%',animation:'shimmer 1.2s infinite'}}/>
          ))}
        </div>
      </div>
    );
  }

  const views={
    'dashboard':<DashboardView setRoute={setRoute} setToast={setToast}/>,
    'sauce-optimizer':<SauceOptimizerView setToast={setToast}/>,
    'trend-insight':<TrendInsightView/>,
    'batch-pipeline':<BatchPipelineView setToast={setToast}/>,
  };

  return(
    <div style={{width:'100%',height:'100vh',display:'flex',flexDirection:'column',background:C.bg,overflow:'hidden'}}>
      <GlobalNav route={route} setRoute={setRoute}/>
      <div style={{flex:1,overflowY:'auto'}}>
        <div key={route} style={{animation:'fadeIn 300ms ease',minHeight:'100%'}}>
          {views[route]}
        </div>
      </div>
      {toast&&<Toast message={toast} onClose={()=>setToast(null)}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
