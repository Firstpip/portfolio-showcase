function CountUp({end,duration=1200,suffix=''}) {
  const [val,setVal] = useState(0);
  useEffect(()=>{
    let start=0;const step=end/(duration/16);
    const timer=setInterval(()=>{
      start+=step;
      if(start>=end){setVal(end);clearInterval(timer);}
      else setVal(Math.floor(start));
    },16);
    return ()=>clearInterval(timer);
  },[end]);
  return <span style={{animation:'countUp 400ms ease'}}>{val.toLocaleString()}{suffix}</span>;
}

  return (

      padding:'12px 24px',borderRadius:12,animation:'slideUp 300ms ease',
      boxShadow:'0 4px 20px rgba(0,0,0,0.2)',fontSize:14,fontWeight:500,display:'flex',alignItems:'center',gap:8}}>
      <span>{type==='success'?'✓':'✕'}</span>{message}
    </div>
  );
}

function ChartLine() {
  const ref = useRef(null);
  const chartRef = useRef(null);
  useEffect(()=>{
    if(!ref.current||!window.Chart) return;
    if(chartRef.current) chartRef.current.destroy();
    const ctx = ref.current.getContext('2d');
    chartRef.current = new window.Chart(ctx, {
      type:'line',
      data:{
        labels: MONTHLY_ISSUES.map(d=>d.month),
        datasets:[{
          label:'발급 건수',
          data: MONTHLY_ISSUES.map(d=>d.count),
          borderColor:'#0D9488',backgroundColor:'rgba(13,148,136,0.08)',
          tension:0.4,fill:true,pointBackgroundColor:'#0D9488',pointRadius:5,pointHoverRadius:7,
        }],
      },
      options:{
        responsive:true,maintainAspectRatio:false,
        plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>`${ctx.raw}건`}}},
        scales:{
          x:{grid:{display:false},ticks:{font:{family:'Pretendard',size:12},color:'#64748B'}},
          y:{grid:{color:'#F1F5F9'},ticks:{font:{family:'Pretendard',size:11},color:'#64748B'},beginAtZero:false},
        },
      },
    });
    return ()=>{if(chartRef.current)chartRef.current.destroy();};
  },[]);
  return (
    <div className="chart-canvas-wrap">
      <canvas ref={ref}/>
    </div>
  );
}

function BatchPage({setDrawer,addToast}) {
  const [jobs,setJobs] = useState(BATCH_JOBS);
  const [modal,setModal] = useState(null);
  const [form,setForm] = useState({name:'',template:'재질 성적서',inspector:'',products:10});

  useEffect(()=>{
    const t = setInterval(()=>{
      setJobs(prev=>prev.map(j=>j.status==='처리중'&&j.progress<95?{...j,progress:Math.min(j.progress+3,100)}:j));
    },500);
    return ()=>clearInterval(t);
  },[]);

  function handleCreate() {
    if(!form.name){addToast('배치명을 입력해 주세요.','error');return;}
    const newJob = {id:`BATCH-00${jobs.length+1}`,name:form.name,products:Number(form.products),
      template:form.template,status:'처리중',progress:0,created:new Date().toLocaleString('ko'),completed:'-',inspector:form.inspector};
    setJobs(prev=>[newJob,...prev]);
    addToast('배치 작업이 등록되었습니다.');
    setModal(null);
  }
  function retryJob(id) {
    setJobs(prev=>prev.map(j=>j.id===id?{...j,status:'처리중',progress:0}:j));
    addToast('배치 작업을 재시도합니다.');
  }

  return (
    <div style={{padding:'24px 32px',maxWidth:1200,margin:'0 auto',animation:'fadeIn 300ms ease'}}>
      <div style={{display:'flex',justifyContent:'flex-end',marginBottom:20}}>
        <button className="btn-primary" onClick={()=>setModal({type:'create'})}>+ 새 배치 생성</button>
      </div>

      <div style={{display:'flex',flexDirection:'column',gap:16}}>
        {jobs.map((job,i)=>(
          <div key={job.id} className="card" style={{padding:20,cursor:'pointer',
            animation:`slideUp 400ms ease ${i*60}ms both`}}
            onClick={()=>setDrawer({title:job.name,data:job,type:'batch'})}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:12}}>
              <div style={{flex:1}}>
                <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:4}}>
                  <div style={{fontSize:15,fontWeight:700,color:C.textPrimary}}>{job.name}</div>
                  <Badge label={job.status}
                    color={job.status==='완료'?'green':job.status==='처리중'?'teal':job.status==='실패'?'red':'yellow'}/>
                </div>
                <div style={{fontSize:12,color:C.textSecondary}}>
                  {job.template} · 제품 {job.products}개 · 생성: {job.created}
                  {job.inspector&&` · 검사자: ${job.inspector}`}
                </div>
              </div>
              <div style={{display:'flex',gap:8,flexShrink:0,marginLeft:16}} onClick={e=>e.stopPropagation()}>
                {job.status==='완료'&&(
                  <button className="btn-secondary" onClick={()=>addToast('ZIP 파일을 다운로드합니다.')} style={{padding:'6px 14px',fontSize:12}}>
                    📥 다운로드
                  </button>
                )}
                {job.status==='실패'&&(
                  <button className="btn-primary" onClick={()=>retryJob(job.id)} style={{padding:'6px 14px',fontSize:12,background:'#EF4444'}}>
                    재시도
                  </button>
                )}
              </div>
            </div>

            <div style={{marginBottom:6}}>
              <div style={{display:'flex',justifyContent:'space-between',marginBottom:6}}>
                <span style={{fontSize:12,color:C.textSecondary}}>
                  {job.status==='처리중'?`처리 중 (${Math.floor(job.progress*job.products/100)}/${job.products}개 완료)`:
                   job.status==='완료'?`${job.products}개 완료 · ${job.completed}`:
                   job.status==='실패'?`${Math.floor(job.progress*job.products/100)}개 완료 후 실패`:
                   '대기 중 (큐 순번 대기)'}

                <div style={{height:'100%',borderRadius:5,transition:'width 0.5s ease',
                  background:job.status==='완료'?'#10B981':job.status==='실패'?'#EF4444':`linear-gradient(90deg,#0D9488,#14B8A6)`,
                  width:`${job.progress}%`}}/>

              </div>
              <div>
                <label style={{fontSize:13,fontWeight:700,color:C.textPrimary,display:'block',marginBottom:6}}>검사자</label>
                <input className="input-field" value={form.inspector} onChange={e=>setForm(f=>({...f,inspector:e.target.value}))} placeholder="성명 입력"/>

            </div>

              <div style={{fontSize:12,color:'#0F766E',fontWeight:600}}>📋 예상 처리 시간</div>
              <div style={{fontSize:12,color:'#475569',marginTop:4}}>

        <div style={{display:'flex',gap:10}}>
          <button className="btn-primary" style={{flex:1}} onClick={()=>addToast('Excel 파일을 다운로드합니다.')}>📥 Excel 다운로드</button>
          <button className="btn-secondary" style={{flex:1}} onClick={()=>addToast('PDF 파일을 다운로드합니다.')}>📄 PDF 다운로드</button>
        </div>
      </div>
    );
  }
  if(drawer.type==='batch') {
    const b = drawer.data;
    return (
      <div>
        <div style={{padding:16,background:'#F0FDFA',borderRadius:12,marginBottom:16}}>
          <div style={{fontSize:13,fontWeight:700,color:C.textPrimary,marginBottom:4}}>{b.name}</div>
          <div style={{display:'flex',gap:6,flexWrap:'wrap'}}>
            <Badge label={b.status} color={b.status==='완료'?'green':b.status==='처리중'?'teal':b.status==='실패'?'red':'yellow'}/>
            <Badge label={`${b.products}개 제품`} color='gray'/>
            <Badge label={b.template} color='blue'/>
          </div>
        </div>
        <div style={{marginBottom:16}}>
          <div style={{display:'flex',justifyContent:'space-between',marginBottom:6}}>
            <span style={{fontSize:13,fontWeight:700,color:C.textPrimary}}>처리 진행률</span>
            <span style={{fontSize:13,fontWeight:700,color:C.primary}}>{b.progress}%</span>
          </div>
          <div style={{height:12,background:'#E2E8F0',borderRadius:6,overflow:'hidden'}}>
            <div style={{height:'100%',background:`linear-gradient(90deg,#0D9488,#14B8A6)`,
              borderRadius:6,width:`${b.progress}%`,transition:'width 1s ease'}}/>
          </div>
        </div>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12,marginBottom:16}}>
          {[['생성일시',b.created],['완료일시',b.completed],['검사자',b.inspector||'미지정']].map(([k,v])=>(
            <div key={k} style={{background:'#F8FAFC',borderRadius:10,padding:12}}>
              <div style={{fontSize:11,color:C.textSecondary,fontWeight:700,marginBottom:3}}>{k}</div>
              <div style={{fontSize:12,fontWeight:600,color:C.textPrimary}}>{v}</div>
            </div>
          ))}
        </div>
        {b.status==='완료'&&(
          <button className="btn-primary" style={{width:'100%'}} onClick={()=>addToast('ZIP 파일을 다운로드합니다.')}>
            📥 전체 ZIP 다운로드
          </button>
        )}
      </div>
    );
  }
  return null;
}

const TABS = [
  {id:'dashboard',label:'대시보드'},
  {id:'batch',label:'배치 생성'},
  {id:'template-version',label:'템플릿 관리'},
  {id:'history',label:'발급 이력'},
];

function App() {
  const [tab,setTab] = useState('dashboard');
  const [drawer,setDrawer] = useState(null);
  const [toasts,setToasts] = useState([]);
  const [key,setKey] = useState(0);

  function addToast(message,type='success') {
    const id=Date.now();
    setToasts(t=>[...t,{id,message,type}]);
  }
  function removeToast(id){setToasts(t=>t.filter(x=>x.id!==id));}
  function handleTab(t){setTab(t);setKey(k=>k+1);setDrawer(null);}

  function renderPage() {
    switch(tab) {
      case 'dashboard': return <DashboardPage setDrawer={setDrawer}/>;
      case 'batch': return <BatchPage setDrawer={setDrawer} addToast={addToast}/>;
      case 'template-version': return <TemplateVersionPage setDrawer={setDrawer} addToast={addToast}/>;
      case 'history': return <HistoryPage setDrawer={setDrawer}/>;
      default: return <DashboardPage setDrawer={setDrawer}/>;
    }
  }

  return (
    <div style={{display:'flex',flexDirection:'column',width:'100%',minHeight:'100vh'}}>
      <header style={{position:'sticky',top:0,zIndex:100,background:'#fff',
        borderBottom:`1px solid ${C.border}`,display:'flex',alignItems:'stretch',
        height:56,padding:'0 32px',boxShadow:'0 1px 8px rgba(0,0,0,0.06)'}}>
        <div style={{display:'flex',alignItems:'center',gap:10,marginRight:32}}>
          <div style={{width:32,height:32,borderRadius:8,background:'linear-gradient(135deg,#0D9488,#134E4A)',
            display:'flex',alignItems:'center',justifyContent:'center',color:'#fff',fontSize:14,fontWeight:800}}>Q</div>
          <span style={{fontSize:14,fontWeight:800,color:C.textPrimary,letterSpacing:'-0.02em'}}>품질관리 플랫폼</span>
        </div>
        <nav style={{display:'flex',alignItems:'stretch',flex:1}}>
          {TABS.map(t=>(
            <button key={t.id} title={t.label}
              className={`tab-btn${tab===t.id?' active':''}`}
              onClick={()=>handleTab(t.id)}>
              {t.label}
            </button>
          ))}
        </nav>
        <div style={{display:'flex',alignItems:'center',gap:12}}>
          <div style={{position:'relative'}}>
            <input placeholder="검색..." className="input-field" style={{width:180,padding:'7px 12px 7px 32px',fontSize:13}}/>
            <span style={{position:'absolute',left:10,top:'50%',transform:'translateY(-50%)',color:C.textSecondary,fontSize:13}}>🔍</span>
          </div>
          <button style={{background:'none',border:'none',cursor:'pointer',fontSize:18,position:'relative'}}>
            🔔
            <span style={{position:'absolute',top:0,right:-2,width:8,height:8,background:C.error,borderRadius:'50%',border:'2px solid #fff'}}/>
          </button>
          <div style={{width:32,height:32,borderRadius:'50%',background:`linear-gradient(135deg,${C.primary},${C.accent})`,
            display:'flex',alignItems:'center',justifyContent:'center',color:'#fff',fontSize:12,fontWeight:800,cursor:'pointer'}}>
            이
          </div>
        </div>
      </header>

      <HeroBanner tab={tab}/>

      <main style={{flex:1}}>
        <div key={key} style={{animation:'fadeIn 300ms ease'}}>
          {renderPage()}
        </div>
      </main>

      {drawer&&(
        <Drawer item={drawer} onClose={()=>setDrawer(null)}>
          <DrawerContent drawer={drawer} addToast={addToast}/>
        </Drawer>
      )}

      {toasts.map(t=><Toast key={t.id} message={t.message} type={t.type} onClose={()=>removeToast(t.id)}/>)}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
