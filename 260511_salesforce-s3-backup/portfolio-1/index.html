/* ─── Utility Components ─── */
function CountUp({end,duration=1200,suffix='',prefix=''}){
  const [val,setVal]=useState(0);
  useEffect(()=>{
    let s=0;const step=end/(duration/16);
    const t=setInterval(()=>{s+=step;if(s>=end){setVal(end);clearInterval(t);}else setVal(Math.floor(s));},16);
    return()=>clearInterval(t);
  },[end]);
  return <span style={{animation:'countUp 400ms ease'}}>{prefix}{val.toLocaleString()}{suffix}</span>;
}

function Toast({message,type='success',onClose}){
  useEffect(()=>{const t=setTimeout(onClose,3200);return()=>clearTimeout(t);},[]);
  const bg=type==='success'?C.success:type==='danger'?C.danger:C.primary;
  return(
    <div style={{position:'fixed',bottom:28,right:28,zIndex:9999,background:bg,color:'#fff',padding:'13px 22px',
      borderRadius:10,animation:'slideUp 300ms ease',boxShadow:'0 6px 24px rgba(0,0,0,0.18)',
      display:'flex',alignItems:'center',gap:10,fontSize:14,fontWeight:500,minWidth:240}}>
      <span>{type==='success'?'✓':type==='danger'?'✕':'ℹ'}</span>
      <span>{message}</span>
    </div>
  );
}

                    <div style={{fontSize:11,color:C.textSub,fontFamily:'monospace'}}>{s.cron}</div>
                  </div>
                </div>
                <div style={{display:'flex',gap:8,alignItems:'center'}}>
                  <Badge label={s.status==='active'?'활성':'일시정지'} color={s.status}/>
                  <button onClick={e=>{e.stopPropagation();toggleStatus(s.id);}} style={{
                    background:s.status==='active'?'#FEF2F2':'#DCFCE7',
                    color:s.status==='active'?C.danger:C.success,
                    border:'none',padding:'5px 12px',borderRadius:7,fontSize:12,fontWeight:600,cursor:'pointer'}}>
                    {s.status==='active'?'일시정지':'재개'}
                  </button>
                </div>
              </div>
              <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:8}}>
                {[
                  {label:'다음 실행',value:s.nextRun},
                  {label:'마지막 실행',value:s.lastRun},
                  {label:'대상 Objects',value:`${s.objects}개`},
                  {label:'평균 소요',value:s.avgDuration},
                ].map(({label,value},j)=>(
                  <div key={j} style={{background:'#F8FAFC',borderRadius:7,padding:'8px 12px'}}>
                    <div style={{fontSize:10,color:C.textSub,marginBottom:2}}>{label}</div>
                    <div style={{fontSize:12,fontWeight:600,color:C.text}}>{value}</div>
                  </div>
                ))}
              </div>
            </div>
          ))}
        </div>
      </div>

      {/* Add Schedule Modal */}
      {showModal&&(
        <Modal title="스케줄 추가" onClose={()=>setShowModal(false)} width={540}>
          <div style={{display:'flex',flexDirection:'column',gap:14}}>
            {[
              {label:'스케줄 이름',key:'name',type:'text',placeholder:'예: 일별 전체 백업'},
              {label:'Cron 표현식',key:'cron',type:'text',placeholder:'0 2 * * *'},
            ].map(({label,key,type,placeholder})=>(
              <div key={key}>
                <label style={{fontSize:12,fontWeight:600,color:C.textSub,display:'block',marginBottom:6}}>{label}</label>
                <input type={type} value={form[key]} placeholder={placeholder}
                  onChange={e=>setForm(p=>({...p,[key]:e.target.value}))}
                  style={{width:'100%',padding:'9px 12px',borderRadius:8,border:`1px solid ${C.border}`,fontSize:13,outline:'none'}}
                  onFocus={e=>e.target.style.borderColor=C.primary} onBlur={e=>e.target.style.borderColor=C.border}/>
              </div>
            ))}
            <div>
              <label style={{fontSize:12,fontWeight:600,color:C.textSub,display:'block',marginBottom:6}}>백업 유형</label>
              <select value={form.type} onChange={e=>setForm(p=>({...p,type:e.target.value}))}
                style={{width:'100%',padding:'9px 12px',borderRadius:8,border:`1px solid ${C.border}`,fontSize:13}}>
                <option value="full">전체 백업 (Full)</option>
                <option value="incremental">증분 백업 (Incremental)</option>
                <option value="metadata">메타데이터 백업</option>
              </select>
            </div>
            <div style={{background:'#F0F9FF',borderRadius:8,padding:'10px 14px',fontSize:12,color:'#0369A1'}}>
              📅 다음 5회 예정: 내일 02:00 · 모레 02:00 · 5/14 02:00 · 5/15 02:00 · 5/16 02:00
            </div>
            <div style={{display:'flex',gap:8,justifyContent:'flex-end'}}>
              <button onClick={()=>{
                setSchedules(p=>[...p,{id:`SCH-00${p.length+1}`,name:form.name||'신규 스케줄',type:form.type,
                  cron:form.cron,nextRun:'내일 02:00',lastRun:'-',status:'active',objects:697,avgDuration:'계산 중'}]);
                setShowModal(false);toast('스케줄이 추가되었습니다','success');
              }} style={{background:C.primary,color:'#fff',border:'none',padding:'9px 18px',borderRadius:8,
                fontSize:13,fontWeight:600,cursor:'pointer'}}>스케줄 등록</button>
              <button onClick={()=>setShowModal(false)} style={{background:'#F1F5F9',color:C.text,border:'none',
                padding:'9px 18px',borderRadius:8,fontSize:13,cursor:'pointer'}}>취소</button>
            </div>
          </div>
        </Modal>
      )}

      {/* Detail Modal */}
      {selected&&(
        <Modal title={`스케줄 상세: ${selected.id}`} onClose={()=>setSelected(null)} width={500}>
          <div style={{display:'flex',flexDirection:'column',gap:12}}>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
              {[
                {label:'이름',value:selected.name},{label:'유형',value:selected.type},
                {label:'Cron',value:selected.cron},{label:'상태',value:<Badge label={selected.status==='active'?'활성':'일시정지'} color={selected.status}/>},
                {label:'다음 실행',value:selected.nextRun},{label:'마지막 실행',value:selected.lastRun},
              ].map((r,i)=>(
                <div key={i} style={{background:'#F8FAFC',borderRadius:8,padding:'10px 14px'}}>
                  <div style={{fontSize:11,color:C.textSub,marginBottom:3}}>{r.label}</div>
                  <div style={{fontSize:13,fontWeight:600}}>{r.value}</div>
                </div>
              ))}
            </div>
            <div style={{display:'flex',gap:8,justifyContent:'flex-end'}}>
              <button onClick={()=>{toast('스케줄이 수정되었습니다','success');setSelected(null);}} style={{
                background:C.primary,color:'#fff',border:'none',padding:'9px 18px',borderRadius:8,fontSize:13,fontWeight:600,cursor:'pointer'}}>수정</button>
              <button onClick={()=>setSelected(null)} style={{background:'#F1F5F9',color:C.text,border:'none',
                padding:'9px 18px',borderRadius:8,fontSize:13,cursor:'pointer'}}>닫기</button>
            </div>
          </div>
        </Modal>
      )}
    </div>
  );
}

/* ─── Logs Page ─── */
function LogsPage({toast}){
  const [logs,setLogs]=useState(LOGS);
  const [filter,setFilter]=useState({status:'all',object:''});
  const [selected,setSelected]=useState(null);
  const [exporting,setExporting]=useState(false);

  const filtered=logs.filter(l=>{
    if(filter.status!=='all'&&l.status!==filter.status)return false;
    if(filter.object&&!l.object.toLowerCase().includes(filter.object.toLowerCase()))return false;
    return true;
  });

  function handleExport(){
    setExporting(true);
    setTimeout(()=>{setExporting(false);toast('CSV 내보내기 완료 (logs_20260511.csv)','success');},1600);
  }

  return(
    <div style={{display:'flex',flexDirection:'column',gap:20,animation:'fadeIn 280ms ease'}}>
      {/* Summary Charts */}
      <div style={{display:'grid',gridTemplateColumns:'2fr 1fr',gap:16}}>
        <div style={{background:C.surface,borderRadius:12,padding:20,boxShadow:'0 1px 4px rgba(0,0,0,0.07)',border:`1px solid ${C.border}`}}>
          <div style={{fontSize:14,fontWeight:700,color:C.text,marginBottom:14}}>일별 백업 성공률 트렌드</div>
          <div style={{height:160}}>
            <ResponsiveContainer width="100%" height="100%">
              <AreaChart data={DAILY_DATA.map(d=>({...d,rate:Math.round(d.success/(d.success+d.failed)*100)}))}
                margin={{top:5,right:10,bottom:0,left:-20}}>
                <defs>
                  <linearGradient id="rateGrad" x1="0" y1="0" x2="0" y2="1">
                    <stop offset="0%" stopColor={C.success} stopOpacity={0.3}/>
                    <stop offset="100%" stopColor={C.success} stopOpacity={0}/>
                  </linearGradient>
                </defs>
                <CartesianGrid strokeDasharray="3 3" stroke="#F1F5F9"/>
                <XAxis dataKey="date" tick={{fontSize:11,fill:'#94A3B8'}} tickLine={false} axisLine={false}/>
                <YAxis tick={{fontSize:11,fill:'#94A3B8'}} tickLine={false} axisLine={false} domain={[90,100]}/>
                <Tooltip contentStyle={{fontSize:12,borderRadius:8}} formatter={(v)=>`${v}%`}/>
                <Area type="monotone" dataKey="rate" stroke={C.success} strokeWidth={2}
                  fill="url(#rateGrad)" name="성공률"/>
              </AreaChart>
            </ResponsiveContainer>
          </div>
        </div>
        <div style={{background:C.surface,borderRadius:12,padding:20,boxShadow:'0 1px 4px rgba(0,0,0,0.07)',border:`1px solid ${C.border}`}}>
          <div style={{fontSize:14,fontWeight:700,color:C.text,marginBottom:14}}>상태별 통계</div>
          <div style={{display:'flex',flexDirection:'column',gap:10,marginTop:8}}>
            {[
              {label:'성공',count:583,color:C.success,pct:97},
              {label:'경고',count:8,color:C.warning,pct:1.3},
              {label:'실패',count:14,color:C.danger,pct:2.3},
            ].map((item,i)=>(
              <div key={i}>
                <div style={{display:'flex',justifyContent:'space-between',fontSize:12,marginBottom:4}}>
                  <span style={{color:C.textSub,fontWeight:500}}>{item.label}</span>
                  <span style={{color:C.text,fontWeight:700}}>{item.count}건 ({item.pct}%)</span>
                </div>
                <div style={{height:6,background:'#E2E8F0',borderRadius:3,overflow:'hidden'}}>
                  <div style={{height:'100%',borderRadius:3,background:item.color,
                    animation:'barGrow 800ms ease both','--w':`${item.pct}%`,width:`${item.pct}%`}}/>
                </div>
              </div>
            ))}
          </div>
          <div style={{marginTop:14,paddingTop:14,borderTop:`1px solid ${C.border}`,
            display:'flex',justifyContent:'space-between',fontSize:12}}>
            <span style={{color:C.textSub}}>총 적재 용량</span>
            <span style={{fontWeight:700,color:C.text}}>2.3 TB</span>
          </div>
        </div>
      </div>

      {/* Log Table */}
      <div style={{background:C.surface,borderRadius:12,boxShadow:'0 1px 4px rgba(0,0,0,0.07)',border:`1px solid ${C.border}`}}>
        <div style={{padding:'16px 20px',borderBottom:`1px solid ${C.border}`,
          display:'flex',alignItems:'center',gap:12,flexWrap:'wrap'}}>
          <div style={{fontSize:14,fontWeight:700,color:C.text,flex:1}}>백업 실행 로그</div>
          <input placeholder="Object 검색..." value={filter.object}
            onChange={e=>setFilter(p=>({...p,object:e.target.value}))}
            style={{padding:'7px 12px',borderRadius:8,border:`1px solid ${C.border}`,fontSize:12,
              outline:'none',width:160}} onFocus={e=>e.target.style.borderColor=C.primary}
            onBlur={e=>e.target.style.borderColor=C.border}/>
          <select value={filter.status} onChange={e=>setFilter(p=>({...p,status:e.target.value}))}
            style={{padding:'7px 12px',borderRadius:8,border:`1px solid ${C.border}`,fontSize:12}}>
            <option value="all">전체 상태</option>
            <option value="success">성공</option>
            <option value="failed">실패</option>
            <option value="warning">경고</option>
          </select>
          <button onClick={handleExport} style={{
            background:exporting?'#F1F5F9':'#EFF6FF',color:exporting?C.textSub:C.primary,
            border:`1px solid ${exporting?C.border:'#BFDBFE'}`,
            padding:'7px 14px',borderRadius:7,fontSize:12,fontWeight:600,cursor:'pointer'}}>
            {exporting?'내보내는 중...':'CSV 내보내기'}
          </button>
        </div>
        <div style={{overflowX:'auto'}}>
          <table style={{width:'100%',borderCollapse:'collapse',minWidth:700}}>
            <thead>
              <tr style={{background:'#F8FAFC'}}>
                {['로그 ID','Object','상태','처리 건수','S3 경로','시작 시각','소요 시간','크기'].map((h,i)=>(
                  <th key={i} style={{padding:'10px 14px',textAlign:'left',fontSize:11,color:C.textSub,
                    fontWeight:600,letterSpacing:'0.04em',borderBottom:`1px solid ${C.border}`,whiteSpace:'nowrap'}}>{h}</th>
                ))}
              </tr>
            </thead>
            <tbody>
              {filtered.map((log,i)=>(
                <tr key={log.id} onClick={()=>setSelected(log)} style={{
                  borderBottom:`1px solid #F8FAFC`,cursor:'pointer',
                  animation:`slideUp 300ms ease ${i*40}ms both`,transition:'background 150ms'}}
                  onMouseEnter={e=>e.currentTarget.style.background='#F8FAFC'}
                  onMouseLeave={e=>e.currentTarget.style.background='transparent'}>
                  <td style={{padding:'11px 14px',fontSize:11,color:C.textSub,fontFamily:'monospace'}}>{log.id}</td>
                  <td style={{padding:'11px 14px'}}>
                    <div style={{fontSize:13,fontWeight:600,color:C.text}}>{log.object}</div>
                    <div style={{fontSize:11,color:C.textSub}}>{log.label}</div>
                  </td>
                  <td style={{padding:'11px 14px'}}>
                    <Badge label={log.status==='success'?'성공':log.status==='failed'?'실패':'경고'} color={log.status}/>
                  </td>
                  <td style={{padding:'11px 14px',fontSize:12,color:C.text}}>{log.records.toLocaleString()}</td>
                  <td style={{padding:'11px 14px',fontSize:11,color:C.textSub,fontFamily:'monospace',maxWidth:200,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{log.s3Path}</td>
                  <td style={{padding:'11px 14px',fontSize:12,color:C.textSub,whiteSpace:'nowrap'}}>{log.startedAt}</td>
                  <td style={{padding:'11px 14px',fontSize:12,color:C.textSub}}>{log.duration}</td>
                  <td style={{padding:'11px 14px',fontSize:12,color:C.textSub}}>{log.size}</td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      </div>

      {/* Log Detail Modal */}
      {selected&&(
        <Modal title={`로그 상세: ${selected.id}`} onClose={()=>setSelected(null)} width={580}>
          <div style={{display:'flex',flexDirection:'column',gap:14}}>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
              {[
                {label:'Job ID',value:selected.jobId},{label:'Object',value:`${selected.object} (${selected.label})`},
                {label:'상태',value:<Badge label={selected.status==='success'?'성공':selected.status==='failed'?'실패':'경고'} color={selected.status}/>},
                {label:'처리 레코드',value:selected.records.toLocaleString()},
                {label:'시작 시각',value:selected.startedAt},{label:'소요 시간',value:selected.duration},
                {label:'파일 크기',value:selected.size},
              ].map((r,i)=>(
                <div key={i} style={{background:'#F8FAFC',borderRadius:8,padding:'10px 14px'}}>
                  <div style={{fontSize:11,color:C.textSub,marginBottom:3}}>{r.label}</div>
                  <div style={{fontSize:13,fontWeight:600}}>{r.value}</div>
                </div>
              ))}
            </div>
            <div>
              <div style={{fontSize:12,fontWeight:600,color:C.textSub,marginBottom:6}}>S3 적재 경로</div>
              <div style={{background:'#F8FAFC',borderRadius:8,padding:'10px 14px',
                fontFamily:'monospace',fontSize:12,color:C.text,wordBreak:'break-all'}}>{selected.s3Path}</div>
            </div>
            {selected.error&&(
              <div style={{background:'#FEF2F2',border:'1px solid #FCA5A5',borderRadius:8,padding:'10px 14px'}}>
                <div style={{fontSize:12,fontWeight:700,color:C.danger,marginBottom:4}}>⚠ 오류/경고</div>
                <div style={{fontSize:12,color:'#7F1D1D'}}>{selected.error}</div>
              </div>
            )}
            <div style={{display:'flex',gap:8,justifyContent:'flex-end'}}>
              {selected.status==='failed'&&(
                <button onClick={()=>{toast('재시도 등록 완료','success');setSelected(null);}} style={{
                  background:C.primary,color:'#fff',border:'none',padding:'9px 18px',borderRadius:8,
                  fontSize:13,fontWeight:600,cursor:'pointer'}}>재시도 등록</button>
              )}
              <button onClick={()=>setSelected(null)} style={{background:'#F1F5F9',color:C.text,border:'none',
                padding:'9px 18px',borderRadius:8,fontSize:13,cursor:'pointer'}}>닫기</button>
            </div>
          </div>
        </Modal>
      )}
    </div>
  );
}

/* ─── App ─── */
function App(){
  const [page,setPage]=useState('dashboard');
  const [loading,setLoading]=useState(true);
  const [toastMsg,setToastMsg]=useState(null);
  const prevPage=useRef(page);

  useEffect(()=>{
    setTimeout(()=>setLoading(false),1400);
  },[]);

  function toast(msg,type='success'){setToastMsg({msg,type,id:Date.now()});}

  if(loading){
    return(
      <div style={{display:'flex',width:'100%',height:'100vh',overflow:'hidden'}}>
        <div className="shimmer-box" style={{width:248,flexShrink:0}}/>
        <div style={{flex:1,display:'flex',flexDirection:'column'}}>
          <div className="shimmer-box" style={{height:60,flexShrink:0}}/>
          <SkeletonLoader/>
        </div>
      </div>
    );
  }

  return(
    <div style={{display:'flex',width:'100%',height:'100vh',overflow:'hidden'}}>
      <Sidebar page={page} setPage={p=>{prevPage.current=page;setPage(p);}}/>
      <div style={{flex:1,display:'flex',flexDirection:'column',overflow:'hidden'}}>
        <TopBar page={page} toast={toast}/>
        <main style={{flex:1,overflow:'auto',padding:24,background:C.bg}}>
          {page==='dashboard'&&<DashboardPage toast={toast}/>}
          {page==='sf-config'&&<SFConfigPage toast={toast}/>}
          {page==='scheduler'&&<SchedulerPage toast={toast}/>}
          {page==='logs'&&<LogsPage toast={toast}/>}
          {page==='admin'&&(
            <div style={{display:'flex',alignItems:'center',justifyContent:'center',height:300,
              background:C.surface,borderRadius:12,border:`1px solid ${C.border}`,animation:'fadeIn 300ms ease'}}>
              <div style={{textAlign:'center'}}>
                <div style={{fontSize:40,marginBottom:12}}>👤</div>
                <div style={{fontSize:15,fontWeight:700,color:C.text}}>관리자 계정 관리</div>
                <div style={{fontSize:13,color:C.textSub,marginTop:6}}>계정 추가/삭제 및 권한 수준 제어 기능을 제공합니다</div>
              </div>
            </div>
          )}
          {page==='settings'&&(
            <div style={{display:'flex',alignItems:'center',justifyContent:'center',height:300,
              background:C.surface,borderRadius:12,border:`1px solid ${C.border}`,animation:'fadeIn 300ms ease'}}>
              <div style={{textAlign:'center'}}>
                <div style={{fontSize:40,marginBottom:12}}>⚙</div>
                <div style={{fontSize:15,fontWeight:700,color:C.text}}>시스템 설정</div>
                <div style={{fontSize:13,color:C.textSub,marginTop:6}}>알림, 보안, 로그 정책 등 전반적인 시스템 설정을 관리합니다</div>
              </div>
            </div>
          )}
        </main>
      </div>
      {toastMsg&&<Toast key={toastMsg.id} message={toastMsg.msg} type={toastMsg.type} onClose={()=>setToastMsg(null)}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
