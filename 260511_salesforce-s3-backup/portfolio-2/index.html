/* ─── Utility Components ─── */
function CountUp({end,duration=1100,suffix='',prefix=''}){
  const [v,setV]=useState(0);
  useEffect(()=>{let s=0;const step=end/(duration/16);const t=setInterval(()=>{s+=step;if(s>=end){setV(end);clearInterval(t);}else setV(Math.floor(s));},16);return()=>clearInterval(t);},[end]);
  return <span>{prefix}{v.toLocaleString()}{suffix}</span>;
}

function Toast({message,type='success',onClose}){
  useEffect(()=>{const t=setTimeout(onClose,3000);return()=>clearTimeout(t);},[]);
  const bg=type==='success'?'#0F766E':type==='danger'?'#991B1B':'#1D4ED8';
  return(
    <div style={{position:'fixed',bottom:24,right:24,zIndex:9999,background:bg,color:'#fff',
      padding:'12px 20px',borderRadius:10,animation:'slideUp 280ms ease',
      boxShadow:'0 8px 32px rgba(0,0,0,0.4)',display:'flex',alignItems:'center',gap:10,fontSize:14,fontWeight:500}}>
      <span>{type==='success'?'✓':'ℹ'}</span><span>{message}</span>
    </div>
  );
}

/* ─── Reports Page ─── */
function ReportsPage({toast}){
  const [tree,setTree]=useState(REPORT_TREE);
  const [selected,setSelected]=useState(null);
  const [backing,setBacking]=useState(false);

  function countSelected(nodes){return nodes.reduce((acc,n)=>acc+(n.type!=='folder'?n.selected?1:0:0)+
    (n.children?countSelected(n.children):0),0);}

  function toggleNode(nodes,id){
    return nodes.map(n=>{
      if(n.id===id){
        const ns=!n.selected;
        return {...n,selected:ns,children:n.children?n.children.map(c=>({...c,selected:ns,
          children:c.children?c.children.map(gc=>({...gc,selected:ns})):c.children})):n.children};
      }
      if(n.children)return {...n,children:toggleNode(n.children,id)};
      return n;
    });
  }

  function toggleExpand(nodes,id){
    return nodes.map(n=>{
      if(n.id===id)return {...n,expanded:!n.expanded};
      if(n.children)return {...n,children:toggleExpand(n.children,id)};
      return n;
    });
  }

  function renderNodes(nodes,depth=0){
    return nodes.map((node,i)=>(
      <div key={node.id} style={{animation:`slideUp 280ms ease ${i*30}ms both`}}>
        <div onClick={()=>{
          if(node.type==='folder')setTree(p=>toggleExpand(p,node.id));
          else setSelected(node);
        }} style={{
          display:'flex',alignItems:'center',gap:8,padding:`8px ${12+depth*20}px 8px 12px`,
          borderRadius:7,cursor:'pointer',marginBottom:2,
          background:selected?.id===node.id?'rgba(14,165,233,0.12)':'transparent',
          transition:'background 130ms'}}
          onMouseEnter={e=>e.currentTarget.style.background='rgba(255,255,255,0.04)'}
          onMouseLeave={e=>e.currentTarget.style.background=selected?.id===node.id?'rgba(14,165,233,0.12)':'transparent'}>
          <input type="checkbox" checked={node.selected||false}
            onChange={e=>{e.stopPropagation();setTree(p=>toggleNode(p,node.id));}}
            onClick={e=>e.stopPropagation()}
            style={{cursor:'pointer',accentColor:C.primary,width:14,height:14}}/>
          <span style={{fontSize:15,width:18}}>{node.type==='folder'?(node.expanded?'📂':'📁'):'📄'}</span>
          <span style={{flex:1,fontSize:13,color:node.type==='folder'?C.text:C.textSub,
            fontWeight:node.type==='folder'?600:400}}>{node.name}</span>
          {node.type!=='folder'&&(
            <span style={{fontSize:10,color:C.textLight,marginLeft:4}}>
              {node.format==='dashboard'?'대시보드':node.format==='matrix'?'매트릭스':node.format==='summary'?'요약':'표'}</span>
          )}
        </div>
        {node.type==='folder'&&node.expanded&&node.children&&(
          <div style={{paddingLeft:16}}>{renderNodes(node.children,depth+1)}</div>
        )}
      </div>
    ));
  }

  return(
    <div style={{display:'grid',gridTemplateColumns:'1fr 340px',height:'calc(100vh - 56px - 122px)',
      gap:0,animation:'fadeIn 280ms ease'}}>
      {/* Tree */}
      <div style={{background:C.surface,overflow:'auto',padding:16,borderRight:`1px solid ${C.border}`}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:14}}>
          <div style={{fontSize:14,fontWeight:700,color:C.text}}>보고서 폴더 구조</div>
          <div style={{fontSize:12,color:C.textSub}}>선택됨 <b style={{color:C.accent}}>{countSelected(tree)}</b>개</div>
        </div>
        {renderNodes(tree)}
      </div>

      {/* Panel */}
      <div style={{display:'flex',flexDirection:'column',gap:0,overflow:'auto'}}>
        {/* Selected detail */}
        <div style={{background:C.card,padding:20,borderBottom:`1px solid ${C.border}`}}>
          {selected?(
            <div style={{animation:'fadeIn 200ms ease'}}>
              <div style={{fontSize:14,fontWeight:700,color:C.text,marginBottom:12}}>{selected.name}</div>
              {[
                {label:'유형',value:selected.type==='dashboard'?'대시보드':'보고서'},
                {label:'형식',value:selected.format},
                {label:'최종 수정',value:selected.lastMod},
                {label:'백업 상태',value:selected.selected?'백업 대상':'미선택'},
              ].map((r,i)=>(
                <div key={i} style={{display:'flex',justifyContent:'space-between',
                  padding:'7px 0',borderBottom:`1px solid ${C.border}`,fontSize:12}}>
                  <span style={{color:C.textSub}}>{r.label}</span>
                  <span style={{color:C.text,fontWeight:600}}>{r.value}</span>
                </div>
              ))}
              <button onClick={()=>{toast(`${selected.name} 즉시 백업 요청됨`,'success');}} style={{
                width:'100%',marginTop:12,padding:'9px',background:C.primary,color:'#fff',
                border:'none',borderRadius:8,fontSize:13,fontWeight:600,cursor:'pointer'}}>선택 항목 즉시 백업</button>
            </div>
          ):(
            <div style={{textAlign:'center',padding:'20px 0',color:C.textSub}}>
              <div style={{fontSize:28,marginBottom:8}}>📄</div>
              <div style={{fontSize:12}}>좌측에서 보고서를 클릭하면<br/>상세 정보가 표시됩니다</div>
            </div>
          )}
        </div>
        {/* Backup stats */}
        <div style={{padding:20,flex:1}}>
          <div style={{fontSize:13,fontWeight:700,color:C.text,marginBottom:14}}>백업 통계</div>
          {[
            {label:'보고서',total:808,done:487,color:C.primary},
            {label:'대시보드',total:124,done:76,color:C.accent},
          ].map((item,i)=>(
            <div key={i} style={{marginBottom:14}}>
              <div style={{display:'flex',justifyContent:'space-between',fontSize:12,marginBottom:6}}>
                <span style={{color:C.textSub}}>{item.label}</span>
                <span style={{color:C.text,fontWeight:600}}>{item.done}/{item.total}</span>
              </div>
              <div style={{height:6,background:'rgba(255,255,255,0.08)',borderRadius:3}}>
                <div style={{height:'100%',borderRadius:3,background:item.color,
                  animation:'barGrow 800ms ease both','--w':`${Math.round(item.done/item.total*100)}%`,
                  width:`${Math.round(item.done/item.total*100)}%`}}/>
              </div>
            </div>
          ))}
          <div style={{background:'rgba(14,165,233,0.08)',border:'1px solid rgba(14,165,233,0.2)',borderRadius:8,padding:'10px 14px',fontSize:12,color:C.accent}}>
            ℹ 폴더 계층 구조를 그대로 유지하여 S3에 경로 매핑 저장됩니다
          </div>
          <button onClick={()=>{setBacking(true);setTimeout(()=>{setBacking(false);toast('보고서 백업 완료','success');},2000);}}
            disabled={backing} style={{width:'100%',marginTop:14,padding:'10px',
            background:backing?'rgba(14,165,233,0.3)':C.primary,color:'#fff',border:'none',borderRadius:9,
            fontSize:13,fontWeight:600,cursor:'pointer',transition:'all 200ms'}}>
            {backing?'백업 진행 중...':'선택된 항목 전체 백업'}
          </button>
        </div>
      </div>
    </div>
  );
}

            toast(`${sel.length}개 자동화 로직 백업 완료`,'success');
          }} style={{background:C.primary,color:'#fff',border:'none',padding:'7px 14px',borderRadius:7,fontSize:12,fontWeight:600,cursor:'pointer'}}>선택 백업</button>
        </div>
        <div style={{display:'flex',gap:8}}>
          {['전체','Flow','Workflow','Approval'].map(f=>(
            <button key={f} style={{padding:'4px 12px',borderRadius:6,border:'none',cursor:'pointer',fontSize:11,fontWeight:600,
              background:activeTab===f?C.primary:'rgba(255,255,255,0.06)',
              color:activeTab===f?'#fff':C.textSub,transition:'all 150ms'}}
              onClick={()=>setActiveTab(f)}>{f}</button>
          ))}
        </div>
        <div style={{flex:1,overflowY:'auto',display:'flex',flexDirection:'column',gap:8}}>
          {flows.filter(f=>activeTab==='전체'||f.type===activeTab||f.type===activeTab.replace('Approval','Approval')).map((f,i)=>(
            <div key={f.id} onClick={()=>setDrawer(f)} style={{
              border:`1px solid ${f.selected?C.borderBright:C.border}`,borderRadius:9,
              padding:'12px 14px',cursor:'pointer',transition:'all 150ms',
              background:f.selected?'rgba(14,165,233,0.06)':C.card,
              animation:`slideUp 250ms ease ${i*40}ms both`}}
              onMouseEnter={e=>{e.currentTarget.style.borderColor=C.primary;}}
              onMouseLeave={e=>{e.currentTarget.style.borderColor=f.selected?C.borderBright:C.border;}}>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:8}}>
                <div style={{display:'flex',alignItems:'center',gap:8}}>
                  <input type="checkbox" checked={f.selected}
                    onChange={e=>{e.stopPropagation();setFlows(p=>p.map(fl=>fl.id===f.id?{...fl,selected:!fl.selected}:fl));}}
                    onClick={e=>e.stopPropagation()} style={{cursor:'pointer',accentColor:C.primary,width:14,height:14}}/>
                  <span style={{fontSize:13,fontWeight:600,color:C.text}}>{f.name}</span>
                </div>
                <div style={{display:'flex',gap:6}}>
                  <Badge label={f.type} color={f.type==='Flow'?'Standard':f.type==='Workflow'?'Custom':'connected'}/>
                  <Badge label={f.status==='active'?'활성':'비활성'} color={f.status}/>
                </div>
              </div>
              <div style={{display:'flex',gap:16,fontSize:11,color:C.textSub}}>
                <span>트리거: {f.triggers}</span>
                <span>수정: {f.lastMod}</span>
              </div>
            </div>
          ))}
        </div>
      </div>

      {/* Drawer */}
      {drawer&&(
        <Drawer title={drawer.users?`프로필 상세: ${drawer.label}`:`자동화 로직: ${drawer.name}`} onClose={()=>setDrawer(null)}>
          <div style={{display:'flex',flexDirection:'column',gap:12}}>
            {drawer.users?[
              {label:'프로필명',value:drawer.name},{label:'한글명',value:drawer.label},
              {label:'사용자 수',value:`${drawer.users}명`},{label:'권한 수준',value:'상세 권한 설정 확인 필요'},
            ].map((r,i)=>(
              <div key={i} style={{background:C.card,borderRadius:8,padding:'10px 14px'}}>
                <div style={{fontSize:11,color:C.textSub,marginBottom:3}}>{r.label}</div>
                <div style={{fontSize:13,fontWeight:600,color:C.text}}>{r.value}</div>
              </div>
            )):[
              {label:'ID',value:drawer.id},{label:'이름',value:drawer.name},
              {label:'유형',value:drawer.type},{label:'상태',value:drawer.status==='active'?'활성':'비활성'},
              {label:'트리거',value:drawer.triggers},{label:'마지막 수정',value:drawer.lastMod},
            ].map((r,i)=>(
              <div key={i} style={{background:C.card,borderRadius:8,padding:'10px 14px'}}>
                <div style={{fontSize:11,color:C.textSub,marginBottom:3}}>{r.label}</div>
                <div style={{fontSize:13,fontWeight:600,color:C.text}}>{r.value}</div>
              </div>
            ))}
            <button onClick={()=>{toast('백업 완료','success');setDrawer(null);}} style={{
              background:C.primary,color:'#fff',border:'none',padding:'10px',borderRadius:8,
              fontSize:13,fontWeight:600,cursor:'pointer',width:'100%',marginTop:8}}>백업 실행</button>
          </div>
        </Drawer>
      )}
    </div>
  );
}

/* ─── Multi Env Page ─── */
function MultiEnvPage({toast}){
  const [envs,setEnvs]=useState(ENVS);
  const [selected,setSelected]=useState(null);
  const [showAdd,setShowAdd]=useState(false);
  const [range,setRange]=useState('7d');

  return(
    <div style={{padding:20,display:'flex',flexDirection:'column',gap:20,
      height:'calc(100vh - 56px - 122px)',overflowY:'auto',animation:'fadeIn 280ms ease'}}>
      {/* Env Cards */}
      <div style={{display:'grid',gridTemplateColumns:'repeat(2,1fr)',gap:16}}>
        {envs.map((env,i)=>(
          <div key={env.id} className="scale-card" onClick={()=>setSelected(env)} style={{
            background:C.surface,borderRadius:12,padding:20,cursor:'pointer',
            border:`1px solid ${selected?.id===env.id?C.borderBright:C.border}`,
            animation:`slideUp 320ms ease ${i*80}ms both`,transition:'all 200ms',
            boxShadow:selected?.id===env.id?`0 0 0 1px ${C.primary}40`:'none'}}
            onMouseEnter={e=>{if(selected?.id!==env.id)e.currentTarget.style.borderColor=C.primary;}}
            onMouseLeave={e=>{if(selected?.id!==env.id)e.currentTarget.style.borderColor=C.border;}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:16}}>
              <div style={{display:'flex',gap:10,alignItems:'center'}}>
                <div style={{width:44,height:44,borderRadius:10,
                  background:`${env.color}20`,display:'flex',alignItems:'center',justifyContent:'center',fontSize:22}}>{env.icon}</div>
                <div>
                  <div style={{fontSize:15,fontWeight:800,color:C.text}}>{env.name}</div>
                  <div style={{fontSize:12,color:C.textSub}}>{env.label}</div>
                </div>
              </div>
              <Badge label={env.status==='connected'?'연결됨':'연결 오류'} color={env.status}/>
            </div>
            <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:10}}>
              {[
                {label:'Objects',value:env.objects},
                {label:'레코드',value:env.records},
                {label:'저장 용량',value:env.storage},
                {label:'성공률',value:`${env.backupSuccess}%`},
              ].map(({label,value},j)=>(
                <div key={j} style={{background:C.card,borderRadius:8,padding:'8px 10px'}}>
                  <div style={{fontSize:10,color:C.textSub,marginBottom:3}}>{label}</div>
                  <div style={{fontSize:14,fontWeight:700,color:C.text}}>{value}</div>
                </div>
              ))}
            </div>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginTop:12,
              padding:'10px 0',borderTop:`1px solid ${C.border}`}}>
              <span style={{fontSize:11,color:C.textSub}}>마지막 동기화: {env.lastSync}</span>
              <div style={{display:'flex',gap:8}}>
                <button onClick={e=>{e.stopPropagation();toast(`${env.name} 즉시 백업 시작`,'success');}} style={{
                  background:'rgba(14,165,233,0.12)',color:C.accent,border:`1px solid rgba(14,165,233,0.2)`,
                  padding:'5px 12px',borderRadius:6,fontSize:12,fontWeight:600,cursor:'pointer'}}>즉시 백업</button>
                <button onClick={e=>{e.stopPropagation();
                  setEnvs(p=>p.map(ev=>ev.id===env.id?{...ev,status:ev.status==='connected'?'disconnected':'connected'}:ev));
                  toast('환경 상태 변경됨','success');}} style={{
                  background:'rgba(255,255,255,0.06)',color:C.textSub,border:`1px solid ${C.border}`,
                  padding:'5px 12px',borderRadius:6,fontSize:12,cursor:'pointer'}}>
                  {env.status==='connected'?'비활성화':'활성화'}
                </button>
              </div>
            </div>
          </div>
        ))}
        {/* Add Env */}
        <div onClick={()=>setShowAdd(true)} style={{
          background:'transparent',borderRadius:12,padding:20,cursor:'pointer',
          border:`2px dashed ${C.border}`,display:'flex',flexDirection:'column',
          alignItems:'center',justifyContent:'center',gap:10,minHeight:180,
          transition:'all 200ms'}}
          onMouseEnter={e=>{e.currentTarget.style.borderColor=C.primary;e.currentTarget.style.background='rgba(14,165,233,0.04)';}}
          onMouseLeave={e=>{e.currentTarget.style.borderColor=C.border;e.currentTarget.style.background='transparent';}}>
          <span style={{fontSize:32}}>+</span>
          <span style={{fontSize:13,color:C.textSub,fontWeight:600}}>환경 추가</span>
          <span style={{fontSize:11,color:C.textLight,textAlign:'center'}}>Sandbox · Production · Staging<br/>환경을 독립적으로 연결합니다</span>
        </div>
      </div>

      {/* Comparison Chart */}
      <div style={{background:C.surface,borderRadius:12,padding:20,border:`1px solid ${C.border}`}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16}}>
          <div>
            <div style={{fontSize:14,fontWeight:700,color:C.text}}>환경별 백업 성공률 비교</div>
            <div style={{fontSize:12,color:C.textSub}}>Production vs Sandbox 추이</div>
          </div>
          <div style={{display:'flex',gap:8}}>
            {['7d','30d'].map(r=>(
              <button key={r} onClick={()=>setRange(r)} style={{
                padding:'5px 12px',borderRadius:6,border:'none',cursor:'pointer',fontSize:11,fontWeight:600,
                background:range===r?C.primary:'rgba(255,255,255,0.06)',
                color:range===r?'#fff':C.textSub,transition:'all 150ms'}}>
                {r==='7d'?'최근 7일':'최근 30일'}
              </button>
            ))}
          </div>
        </div>
        <div style={{height:200}}>
          <ResponsiveContainer width="100%" height="100%">
            <ComposedChart data={ENV_COMPARE_DATA} margin={{top:5,right:10,bottom:0,left:-20}}>
              <CartesianGrid strokeDasharray="3 3" stroke="rgba(255,255,255,0.05)"/>
              <XAxis dataKey="date" tick={{fontSize:11,fill:'#64748B'}} tickLine={false} axisLine={false}/>
              <YAxis tick={{fontSize:11,fill:'#64748B'}} tickLine={false} axisLine={false} domain={[85,100]}/>
              <Tooltip contentStyle={{background:C.card,border:`1px solid ${C.border}`,borderRadius:8,fontSize:12}}
                labelStyle={{color:C.text}} itemStyle={{color:C.textSub}}
                formatter={(v)=>`${v}%`}/>
              <Line type="monotone" dataKey="prod" stroke={C.success} strokeWidth={2.5}
                dot={{fill:C.success,r:3}} name="Production"/>
              <Line type="monotone" dataKey="sandbox" stroke={C.warning} strokeWidth={2}
                strokeDasharray="5 3" dot={{fill:C.warning,r:3}} name="Sandbox"/>
            </ComposedChart>
          </ResponsiveContainer>
        </div>
        {/* S3 Storage usage */}
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12,marginTop:16,paddingTop:16,borderTop:`1px solid ${C.border}`}}>
          {envs.map((env,i)=>(
            <div key={i} style={{background:C.card,borderRadius:9,padding:'12px 14px'}}>
              <div style={{display:'flex',justifyContent:'space-between',fontSize:12,marginBottom:8}}>
                <span style={{color:C.textSub}}>{env.name} S3 용량</span>
                <span style={{color:env.color,fontWeight:700}}>{env.storage}</span>
              </div>
              <div style={{height:5,background:'rgba(255,255,255,0.08)',borderRadius:3}}>
                <div style={{height:'100%',borderRadius:3,background:env.color,
                  animation:'barGrow 1s ease both','--w':i===0?'76%':'22%',width:i===0?'76%':'22%'}}/>
              </div>
              <div style={{fontSize:10,color:C.textLight,marginTop:4}}>임계값: 3 TB · {i===0?'76%':'22%'} 사용</div>
            </div>
          ))}
        </div>
      </div>

      {/* Add Env Modal */}
      {showAdd&&(
        <Modal title="새 환경 연결" onClose={()=>setShowAdd(false)} width={480}>
          <div style={{display:'flex',flexDirection:'column',gap:14}}>
            {[
              {label:'환경 이름',placeholder:'예: Sandbox (Full)'},
              {label:'Salesforce Instance URL',placeholder:'https://myorg--test.sandbox.my.salesforce.com'},
              {label:'Client ID',placeholder:'3MVG9n_...'},
              {label:'Client Secret (암호화 저장)',placeholder:'••••••••••••'},
            ].map(({label,placeholder},i)=>(
              <div key={i}>
                <label style={{fontSize:12,fontWeight:600,color:C.textSub,display:'block',marginBottom:6}}>{label}</label>
                <input placeholder={placeholder} style={{width:'100%',padding:'9px 12px',borderRadius:8,
                  border:`1px solid ${C.border}`,fontSize:13,color:C.text,background:'rgba(255,255,255,0.05)',outline:'none'}}
                  onFocus={e=>e.target.style.borderColor=C.primary} onBlur={e=>e.target.style.borderColor=C.border}/>
              </div>
            ))}
            <div>
              <label style={{fontSize:12,fontWeight:600,color:C.textSub,display:'block',marginBottom:6}}>환경 유형</label>
              <select style={{width:'100%',padding:'9px 12px',borderRadius:8,border:`1px solid ${C.border}`,
                fontSize:13,color:C.text,background:'rgba(30,45,64,1)'}}>
                <option>Sandbox (Developer)</option>
                <option>Sandbox (Full)</option>
                <option>Production</option>
              </select>
            </div>
            <div style={{display:'flex',gap:8,justifyContent:'flex-end',marginTop:4}}>
              <button onClick={()=>{
                setEnvs(p=>[...p,{id:`env-new-${Date.now()}`,name:'Sandbox (Full)',label:'전체 샌드박스',icon:'🔬',status:'connected',lastSync:'연결 중...',objects:697,records:'1.8M',storage:'1.1 TB',backupSuccess:92.3,color:C.info}]);
                setShowAdd(false);toast('새 환경이 연결되었습니다','success');
              }} style={{background:C.primary,color:'#fff',border:'none',padding:'9px 18px',borderRadius:8,fontSize:13,fontWeight:600,cursor:'pointer'}}>연결 추가</button>
              <button onClick={()=>setShowAdd(false)} style={{background:'rgba(255,255,255,0.08)',color:C.textSub,
                border:`1px solid ${C.border}`,padding:'9px 18px',borderRadius:8,fontSize:13,cursor:'pointer'}}>취소</button>
            </div>
          </div>
        </Modal>
      )}

      {/* Env detail drawer */}
      {selected&&(
        <Drawer title={`${selected.name} 상세 현황`} onClose={()=>setSelected(null)}>
          <div style={{display:'flex',flexDirection:'column',gap:12}}>
            <div style={{width:44,height:44,borderRadius:10,background:`${selected.color}20`,
              display:'flex',alignItems:'center',justifyContent:'center',fontSize:24}}>{selected.icon}</div>
            {[
              {label:'환경 이름',value:selected.name},{label:'환경 유형',value:selected.label},
              {label:'연결 상태',value:<Badge label={selected.status==='connected'?'연결됨':'오류'} color={selected.status}/>},
              {label:'Objects 수',value:`${selected.objects}개`},
              {label:'총 레코드',value:selected.records},
              {label:'S3 용량',value:selected.storage},
              {label:'백업 성공률',value:`${selected.backupSuccess}%`},
              {label:'마지막 동기화',value:selected.lastSync},
            ].map((r,i)=>(
              <div key={i} style={{background:C.card,borderRadius:8,padding:'10px 14px'}}>
                <div style={{fontSize:11,color:C.textSub,marginBottom:3}}>{r.label}</div>
                <div style={{fontSize:13,fontWeight:600,color:C.text}}>{r.value}</div>
              </div>
            ))}
            <button onClick={()=>{toast(`${selected.name} 백업 시작`,'success');setSelected(null);}} style={{
              background:C.primary,color:'#fff',border:'none',padding:'10px',borderRadius:8,
              fontSize:13,fontWeight:600,cursor:'pointer',width:'100%',marginTop:8}}>즉시 백업 실행</button>
          </div>
        </Drawer>
      )}
    </div>
  );
}

/* ─── App ─── */
function App(){
  const [tab,setTab]=useState('metadata');
  const [loading,setLoading]=useState(true);
  const [toast,setToast]=useState(null);

  useEffect(()=>{setTimeout(()=>setLoading(false),1200);},[]);

  function showToast(msg,type='success'){setToast({msg,type,id:Date.now()});}

  if(loading){
    return(
      <div style={{display:'flex',flexDirection:'column',width:'100%',minHeight:'100vh'}}>
        <div className="shimmer-dark" style={{height:56,flexShrink:0}}/>
        <div className="shimmer-dark" style={{height:122,flexShrink:0}}/>
        <div style={{flex:1,padding:20,display:'flex',flexDirection:'column',gap:16}}>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:16}}>
            {[0,1].map(i=><div key={i} className="shimmer-dark" style={{height:180,borderRadius:12}}/>)}
          </div>
          <div className="shimmer-dark" style={{height:240,borderRadius:12}}/>
        </div>
      </div>
    );
  }

  return(
    <div style={{display:'flex',flexDirection:'column',width:'100%',minHeight:'100vh'}}>
      <TopNav tab={tab} setTab={t=>{setTab(t);}}/>
      <HeroBanner tab={tab}/>
      <main style={{flex:1}}>
        {tab==='metadata'&&<MetadataPage toast={showToast}/>}
        {tab==='reports'&&<ReportsPage toast={showToast}/>}
        {tab==='permissions'&&<PermissionsPage toast={showToast}/>}
        {tab==='multienv'&&<MultiEnvPage toast={showToast}/>}
      </main>
      {toast&&<Toast key={toast.id} message={toast.msg} type={toast.type} onClose={()=>setToast(null)}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
