// ── 유틸
function CountUp({ end, duration=1200, suffix='' }) {
  const [val, setVal] = useState(0);
  useEffect(()=>{
    let s=0; const step=end/(duration/16);
    const t=setInterval(()=>{ s+=step; if(s>=end){setVal(end);clearInterval(t);}else setVal(Math.floor(s)); },16);
    return ()=>clearInterval(t);
  },[end]);
  return <span style={{animation:'countUp 400ms ease'}}>{val.toLocaleString()}{suffix}</span>;
}

function Toast({ message, type='success', onClose }) {
  useEffect(()=>{ const t=setTimeout(onClose,3200); return ()=>clearTimeout(t); },[]);
  const bg = type==='success'?C.success:type==='error'?C.danger:type==='warning'?C.warning:C.primary;
  return (
    <div style={{position:'fixed',bottom:24,right:24,zIndex:9999,background:bg,color:'#fff',padding:'12px 20px',borderRadius:10,animation:'slideUp 300ms ease',boxShadow:'0 6px 24px rgba(0,0,0,0.35)',display:'flex',alignItems:'center',gap:8,fontSize:14,fontWeight:600}}>
      {message}
    </div>
  );
}

function Badge({ label, color, bg }) {
  return <span style={{display:'inline-block',padding:'3px 10px',borderRadius:999,fontSize:11,fontWeight:700,color,background:bg}}>{label}</span>;
}

function StatusBadge({ status }) {
  const map = {
    '처리중':{color:'#fff',bg:C.warning},
    '완료':{color:'#fff',bg:C.success},
    '대기':{color:'#fff',bg:C.textLight},
    '거부':{color:'#fff',bg:C.danger},
    '활성':{color:'#fff',bg:C.success},
    '일시정지':{color:'#fff',bg:C.danger},
  };
  const s=map[status]||{color:'#fff',bg:C.textLight};
  return <Badge label={status} color={s.color} bg={s.bg} />;
}

function PriorityBadge({ priority }) {
  if(priority==='긴급') return <Badge label="긴급" color="#fff" bg={C.danger} />;
  if(priority==='일반') return <Badge label="일반" color="#fff" bg={C.warning} />;
  return <Badge label="낮음" color={C.textSub} bg={C.border} />;
}

function PlanBadge({ plan }) {

    const org = { id:`ORG-00${orgs.length+1}`, name:newOrg.name||'신규 조직', plan:newOrg.plan, users:0, contents:0, infringements:0, apiCalls:0, status:'활성', since:'2026-05' };

          </select>
        </div>
        <button onClick={()=>setAddModal(true)} style={{padding:'8px 20px',borderRadius:8,border:'none',background:C.primary,color:C.bg,fontSize:13,cursor:'pointer',fontWeight:700}}>＋ 조직 등록</button>
      </div>

      <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:14}}>
        {orgs.map((org,i)=>(
          <div key={i} onClick={()=>setDrawer(org)} style={{background:C.surface,borderRadius:16,padding:20,boxShadow:C.cardShadow,cursor:'pointer',transition:'all 200ms',animation:`slideUp 400ms ease ${i*70}ms both`,border:`1px solid ${org.status==='일시정지'?`${C.danger}30`:'transparent'}`}}
            onMouseEnter={e=>{e.currentTarget.style.transform='scale(1.02)';e.currentTarget.style.boxShadow='0 8px 24px rgba(0,0,0,0.45)';}}
            onMouseLeave={e=>{e.currentTarget.style.transform='none';e.currentTarget.style.boxShadow=C.cardShadow;}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:14}}>
              <div style={{width:40,height:40,borderRadius:10,background:`linear-gradient(135deg,${C.primary}40,${C.accent}40)`,display:'flex',alignItems:'center',justifyContent:'center',fontSize:18,fontWeight:800,color:C.text}}>
                {org.name[0]}
              </div>
              <StatusBadge status={org.status} />
            </div>
            <div style={{fontSize:15,fontWeight:800,color:C.text,marginBottom:4,letterSpacing:'-0.01em'}}>{org.name}</div>
            <div style={{marginBottom:14}}><PlanBadge plan={org.plan} /></div>
            <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:8,borderTop:`1px solid ${C.border}`,paddingTop:12}}>
              {[
                {label:'사용자',value:`${org.users}명`},
                {label:'콘텐츠',value:`${org.contents}개`},
                {label:'탐지',value:`${org.infringements}건`},
              ].map(({label,value})=>(
                <div key={label} style={{textAlign:'center'}}>
                  <div style={{fontSize:13,fontWeight:700,color:C.text}}>{value}</div>
                  <div style={{fontSize:10,color:C.textSub,marginTop:1}}>{label}</div>
                </div>
              ))}
            </div>
          </div>
        ))}
      </div>

      {/* 조직 상세 Drawer */}
      {drawer && (
        <Drawer onClose={()=>setDrawer(null)}>
          <div style={{marginBottom:24}}>
            <div style={{display:'flex',alignItems:'center',gap:12,marginBottom:12}}>
              <div style={{width:48,height:48,borderRadius:12,background:`linear-gradient(135deg,${C.primary}40,${C.accent}40)`,display:'flex',alignItems:'center',justifyContent:'center',fontSize:22,fontWeight:800,color:C.text}}>
                {drawer.name[0]}
              </div>
              <div>
                <div style={{fontSize:20,fontWeight:800,color:C.text}}>{drawer.name}</div>
                <div style={{marginTop:4}}><PlanBadge plan={drawer.plan} /></div>
              </div>
            </div>
            <StatusBadge status={drawer.status} />
          </div>

          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginBottom:24}}>
            {[
              {label:'사용자 수',value:`${drawer.users}명`},
              {label:'콘텐츠 수',value:`${drawer.contents}개`},
              {label:'침해 탐지',value:`${drawer.infringements}건`},
              {label:'API 호출',value:drawer.apiCalls.toLocaleString()+'회'},
              {label:'가입일',value:drawer.since},
              {label:'구독 상태',value:drawer.status},
            ].map(({label,value})=>(
              <div key={label} style={{background:C.bg,borderRadius:8,padding:'12px 14px'}}>
                <div style={{fontSize:11,color:C.textSub,marginBottom:4,fontWeight:600}}>{label}</div>
                <div style={{fontSize:13,color:C.text,fontWeight:700}}>{value}</div>
              </div>
            ))}
          </div>

          <div style={{display:'flex',flexDirection:'column',gap:10}}>
            <button onClick={()=>{setDrawer(null);onToast(`${drawer.name} 플랜이 업데이트됐습니다`,'success');}} style={{width:'100%',padding:'10px',borderRadius:8,border:'none',background:C.primary,color:C.bg,fontSize:13,cursor:'pointer',fontWeight:700}}>플랜 변경</button>
            <button onClick={()=>handleSuspend(drawer)} style={{width:'100%',padding:'10px',borderRadius:8,border:`1px solid ${C.danger}40`,background:`${C.danger}10`,color:C.danger,fontSize:13,cursor:'pointer',fontWeight:600}}>
              {drawer.status==='활성'?'일시정지':'복구'}
            </button>
          </div>
        </Drawer>
      )}

      {/* 조직 등록 모달 */}
      {addModal && (
        <Modal title="조직 등록" onClose={()=>setAddModal(false)} width={460}>
          <div style={{display:'flex',flexDirection:'column',gap:14,marginBottom:24}}>
            <div>
              <label style={{fontSize:12,color:C.textSub,fontWeight:600,display:'block',marginBottom:4}}>조직명</label>
              <input value={newOrg.name} onChange={e=>setNewOrg({...newOrg,name:e.target.value})} placeholder="회사명 또는 팀명" style={{width:'100%',padding:'9px 12px',borderRadius:8,border:`1px solid ${C.border}`,fontSize:13,background:C.bg,color:C.text,outline:'none'}} />
            </div>
            <div>
              <label style={{fontSize:12,color:C.textSub,fontWeight:600,display:'block',marginBottom:4}}>구독 플랜</label>
              <select value={newOrg.plan} onChange={e=>setNewOrg({...newOrg,plan:e.target.value})} style={{width:'100%',padding:'9px 12px',borderRadius:8,border:`1px solid ${C.border}`,fontSize:13,background:C.bg,color:C.text,outline:'none'}}>
                <option>Enterprise</option><option>Pro</option><option>Basic</option>
              </select>
            </div>
          </div>
          <div style={{display:'flex',gap:10,justifyContent:'flex-end'}}>
            <button onClick={()=>setAddModal(false)} style={{padding:'9px 20px',borderRadius:8,border:`1px solid ${C.border}`,background:'transparent',fontSize:13,color:C.textSub,cursor:'pointer'}}>취소</button>
            <button onClick={handleAddOrg} style={{padding:'9px 20px',borderRadius:8,border:'none',background:C.primary,color:C.bg,fontSize:13,cursor:'pointer',fontWeight:700}}>등록</button>
          </div>
        </Modal>
      )}
    </div>
  );
}

// ── 메인 App
function App() {
  const [tab, setTab] = useState('main');
  const [toast, setToast] = useState(null);
  const [tabKey, setTabKey] = useState(0);
  const [loading, setLoading] = useState(true);

  useEffect(()=>{ setTimeout(()=>setLoading(false),1200); },[]);

  function navigate(t) { setTab(t); setTabKey(k=>k+1); }
  function onToast(msg, type='success') { setToast({ msg, type }); }

  const meta = PAGE_META[tab];

  if(loading) {
    return (
      <div style={{minHeight:'100vh',background:C.bg,display:'flex',flexDirection:'column'}}>
        <div style={{height:56,background:C.surface,borderBottom:`1px solid ${C.navBorder}`}} />
        <div style={{padding:32,display:'flex',flexDirection:'column',gap:16}}>
          {[1,2,3].map(i=>(
            <div key={i} style={{height:120,borderRadius:12,background:'linear-gradient(90deg,#1E293B 25%,#243147 50%,#1E293B 75%)',backgroundSize:'200% 100%',animation:'shimmer 1.5s infinite'}} />
          ))}
        </div>
      </div>
    );
  }

  return (
    <div style={{display:'flex',flexDirection:'column',width:'100%',minHeight:'100vh',background:C.bg}}>
      {/* 상단 네비 */}
      <header style={{position:'sticky',top:0,zIndex:100,background:C.nav,borderBottom:`1px solid ${C.navBorder}`,display:'flex',alignItems:'center',height:56,padding:'0 24px',gap:4}}>
        <div style={{display:'flex',alignItems:'center',gap:8,marginRight:24}}>
          <div style={{width:28,height:28,borderRadius:7,background:`linear-gradient(135deg,${C.primary},${C.accent})`,display:'flex',alignItems:'center',justifyContent:'center',fontSize:13}}>🛡️</div>
          <div style={{fontSize:14,fontWeight:800,color:C.text,letterSpacing:'-0.02em'}}>CopyGuard <span style={{fontSize:10,color:C.textSub,fontWeight:400}}>Enterprise</span></div>
        </div>
        {TABS.map(t=>(
          <button key={t.id} onClick={()=>navigate(t.id)} title={t.label}
            style={{padding:'7px 14px',borderRadius:8,border:'none',background:tab===t.id?`${C.primary}20`:'transparent',color:tab===t.id?C.primary:C.textSub,cursor:'pointer',fontSize:13,fontWeight:tab===t.id?700:500,transition:'all 150ms',display:'flex',alignItems:'center',gap:6}}>
            <span>{t.icon}</span>{t.label}
          </button>
        ))}
        <div style={{flex:1}} />
        <div style={{position:'relative',marginRight:8}}>
          <input placeholder="검색..." style={{padding:'6px 12px 6px 30px',borderRadius:20,border:`1px solid ${C.border}`,fontSize:12,background:'rgba(255,255,255,0.06)',color:C.text,outline:'none',width:160}} />
          <span style={{position:'absolute',left:10,top:'50%',transform:'translateY(-50%)',fontSize:11,color:C.textLight}}>🔍</span>
        </div>
        <div style={{width:30,height:30,borderRadius:'50%',background:`linear-gradient(135deg,${C.primary},${C.accent})`,display:'flex',alignItems:'center',justifyContent:'center',fontSize:12,fontWeight:800,color:C.bg,cursor:'pointer'}}>K</div>
      </header>

      {/* 히어로 배너 */}
      <div style={{background:meta.gradient,padding:'24px 32px'}}>
        <div style={{display:'flex',alignItems:'flex-start',justifyContent:'space-between'}}>
          <div>
            <div style={{fontSize:11,color:'rgba(255,255,255,0.5)',fontWeight:700,textTransform:'uppercase',letterSpacing:'0.1em',marginBottom:6}}>CopyGuard Enterprise</div>
            <div style={{fontSize:26,fontWeight:800,color:'#fff',letterSpacing:'-0.03em',marginBottom:4}}>{meta.title}</div>
            <div style={{fontSize:13,color:'rgba(255,255,255,0.55)'}}>{meta.subtitle}</div>
          </div>
          <div style={{display:'flex',gap:20}}>
            {meta.kpis.map((k,i)=>(
              <div key={i} style={{textAlign:'center',padding:'12px 18px',background:'rgba(255,255,255,0.07)',borderRadius:12,backdropFilter:'blur(8px)'}}>
                <div style={{fontSize:24,fontWeight:800,color:k.color}}><CountUp end={parseFloat(k.value)} suffix={k.suffix||''} /></div>
                <div style={{fontSize:10,color:'rgba(255,255,255,0.5)',marginTop:3,fontWeight:600}}>{k.label}</div>
              </div>
            ))}
          </div>
        </div>
      </div>

      {/* 콘텐츠 */}
      <main style={{flex:1,padding:'24px 32px'}}>
        <div key={tabKey} style={{animation:'fadeIn 300ms ease'}}>
          {tab==='main' && <TakedownPage onToast={onToast} />}
          {tab==='analytics' && <AnalyticsPage onToast={onToast} />}
          {tab==='notifications' && <NotificationsPage onToast={onToast} />}
          {tab==='organizations' && <OrganizationsPage onToast={onToast} />}
        </div>
      </main>

      {toast && <Toast message={toast.msg} type={toast.type} onClose={()=>setToast(null)} />}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
