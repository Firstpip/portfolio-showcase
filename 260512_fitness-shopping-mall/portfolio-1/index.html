@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes fadeInScale{from{opacity:0;transform:scale(0.95)}to{opacity:1;transform:scale(1)}}

@keyframes slideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes ripple{0%{transform:scale(0);opacity:0.5}100%{transform:scale(4);opacity:0}}

// ===== UTILS =====
function Badge({label, color='gray', small=false}) {
  const colors = {
    gray:{bg:'#F5F5F5',text:'#757575'}, orange:{bg:'#FBE9E7',text:'#E64A19'},
    blue:{bg:'#E3F2FD',text:'#1565C0'}, green:{bg:'#E8F5E9',text:'#2E7D32'},
    yellow:{bg:'#FFF8E1',text:'#E65100'}, red:{bg:'#FFEBEE',text:'#C62828'},
    purple:{bg:'#F3E5F5',text:'#6A1B9A'}, teal:{bg:'#E0F2F1',text:'#00695C'},
  };
  const s = colors[color] || colors.gray;
  return (
    <span style={{
      display:'inline-flex', alignItems:'center', gap:4,
      background:s.bg, color:s.text,
      fontSize:small?11:12, fontWeight:600, padding:small?'2px 8px':'3px 10px',
      borderRadius:20,
    }}>{label}</span>
  );
}

function Toast({msg, onClose}) {
  React.useEffect(()=>{const t=setTimeout(onClose,3000);return()=>clearTimeout(t);},[]);
  return (
    <div style={{
      position:'fixed',bottom:28,right:28,zIndex:9999,
      background:C.textPrimary,color:'#fff',padding:'12px 20px',
      borderRadius:10,fontSize:14,fontWeight:500,
      animation:'slideUp 300ms ease',boxShadow:'0 4px 20px rgba(0,0,0,0.2)',
      display:'flex',alignItems:'center',gap:8
    }}>
      ✅ {msg}
    </div>
  );
}

function Modal({title, onClose, children, width=600}) {
  return (
    <div style={{position:'fixed',inset:0,zIndex:500,display:'flex',alignItems:'center',justifyContent:'center'}}>
      <div onClick={onClose} style={{position:'absolute',inset:0,background:'rgba(0,0,0,0.45)',animation:'fadeIn 200ms ease'}}/>
      <div style={{
        position:'relative',width,maxWidth:'92vw',maxHeight:'88vh',background:C.surface,
        borderRadius:16,zIndex:501,animation:'fadeInScale 220ms ease',
        display:'flex',flexDirection:'column',boxShadow:'0 20px 60px rgba(0,0,0,0.18)'

        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'20px 24px',borderBottom:`1px solid ${C.border}`}}>
          <h3 style={{fontSize:17,fontWeight:700}}>{title}</h3>
          <button onClick={onClose} style={{background:'none',border:'none',fontSize:22,cursor:'pointer',color:C.textSecondary}}>✕</button>
        </div>
        <div style={{padding:24,overflowY:'auto',flex:1}}>{children}</div>
      </div>
    </div>
  );
}

                      width:'100%',marginTop:10,padding:'8px 0',background:C.primary,color:'#fff',

              borderRadius:12,display:'flex',alignItems:'center',justifyContent:'center',fontSize:80

            <div>
              <div style={{fontSize:12,color:C.textSecondary,marginBottom:4}}>{drawerProduct.brand}</div>
              <h3 style={{fontSize:20,fontWeight:800,marginBottom:8}}>{drawerProduct.name}</h3>
              <p style={{fontSize:14,color:C.textSecondary,lineHeight:1.7}}>{drawerProduct.desc}</p>
            </div>
            <div style={{display:'flex',flexDirection:'column',gap:10,background:C.bg,borderRadius:10,padding:16}}>

              <div style={{display:'flex',justifyContent:'space-between'}}><span style={{fontSize:13,color:C.textSecondary}}>결제 방식</span><Badge label={drawerProduct.type==='direct'?'즉시결제':'견적전용'} color={drawerProduct.type==='direct'?'orange':'blue'} small/></div>
              {drawerProduct.type === 'direct' && (
                <>
                  <div style={{display:'flex',justifyContent:'space-between'}}><span style={{fontSize:13,color:C.textSecondary}}>재고</span><span style={{fontSize:13,fontWeight:600}}>{drawerProduct.stock}개</span></div>
                  <div style={{display:'flex',justifyContent:'space-between'}}><span style={{fontSize:13,color:C.textSecondary}}>판매가</span><span style={{fontSize:17,fontWeight:800,color:C.primary}}>{drawerProduct.price.toLocaleString()}원</span></div>
                </>
              )}
            </div>
            {drawerProduct.type === 'direct' ? (
              <button onClick={()=>{addToCart(drawerProduct);setDrawerProduct(null);setToast(`"${drawerProduct.name}" 장바구니에 담았습니다`);}} style={{
                padding:'14px',background:C.primary,color:'#fff',border:'none',
                borderRadius:12,fontWeight:700,fontSize:15,cursor:'pointer',fontFamily:'Pretendard'
              }}>장바구니에 담기</button>
            ) : (
              <div style={{display:'flex',flexDirection:'column',gap:10}}>
                <button onClick={()=>{addToQuote(drawerProduct);setDrawerProduct(null);setToast(`"${drawerProduct.name}" 견적 바구니에 담았습니다`);}} style={{
                  padding:'14px',background:C.info,color:'#fff',border:'none',
                  borderRadius:12,fontWeight:700,fontSize:15,cursor:'pointer',fontFamily:'Pretendard'
                }}>견적 바구니에 담기</button>
                <p style={{fontSize:12,color:C.textSecondary,textAlign:'center',lineHeight:1.6}}>견적 요청 후 관리자가 최저가 패키지를 구성하여 알림톡으로 안내해 드립니다</p>
              </div>
            )}
          </div>
        </Drawer>
      )}

      {toast && <Toast msg={toast} onClose={()=>setToast(null)}/>}
    </div>
  );
}

// CHECKOUT PAGE
function CheckoutPage({cartItems, addToCart, removeFromCart}) {
  const [step, setStep] = React.useState('cart'); // cart | form | complete
  const [toast, setToast] = React.useState(null);
  const [key] = React.useState(Date.now());
  const [form, setForm] = React.useState({name:'김민수',phone:'010-1234-5678',addr:'서울시 강남구 테헤란로 123',payment:'card'});
  const [pgLoading, setPgLoading] = React.useState(false);
  const [drawerItem, setDrawerItem] = React.useState(null);

  const total = cartItems.reduce((s,i)=>s+i.price*i.qty,0);

  const handlePay = () => {
    setPgLoading(true);
    setTimeout(()=>{setPgLoading(false);setStep('complete');},2000);
  };

  return (
    <div key={key} style={{animation:'fadeIn 350ms ease'}}>
      {/* Hero */}
      <div style={{background:`linear-gradient(135deg, ${C.primary} 0%, ${C.accent} 100%)`,padding:'36px 40px',color:'#fff'}}>
        <div style={{maxWidth:1160,margin:'0 auto'}}>
          <div style={{fontSize:12,opacity:0.7,letterSpacing:'0.1em',textTransform:'uppercase',marginBottom:8}}>소형상품</div>
          <h1 style={{fontSize:28,fontWeight:800,marginBottom:6}}>즉시 결제</h1>
          <p style={{opacity:0.85,fontSize:14}}>매트·소도구 등 소형 상품을 장바구니에 담아 바로 결제하세요</p>
          {/* Step Indicator */}
          <div style={{display:'flex',gap:4,marginTop:20,alignItems:'center'}}>
            {['장바구니','주문 정보','결제 완료'].map((s,i)=>(
              <React.Fragment key={i}>
                <div style={{
                  display:'flex',alignItems:'center',gap:8,
                  opacity:['cart','form','complete'].indexOf(step)>=i?1:0.5
                }}>
                  <div style={{
                    width:24,height:24,borderRadius:'50%',display:'flex',alignItems:'center',justifyContent:'center',
                    background:['cart','form','complete'].indexOf(step)===i?'#fff':'rgba(255,255,255,0.3)',
                    color:['cart','form','complete'].indexOf(step)===i?C.primary:'#fff',
                    fontSize:12,fontWeight:700
                  }}>{i+1}</div>
                  <span style={{fontSize:13,fontWeight:600}}>{s}</span>
                </div>
                {i<2 && <div style={{width:32,height:2,background:'rgba(255,255,255,0.4)',margin:'0 4px'}}/>}
              </React.Fragment>
            ))}
          </div>
        </div>
      </div>

      <div style={{maxWidth:1160,margin:'32px auto',padding:'0 40px',display:'grid',gridTemplateColumns:'1fr 360px',gap:24,alignItems:'start'}}>
        {step === 'cart' && (
          <>
            <div>
              <h2 style={{fontSize:18,fontWeight:700,marginBottom:16}}>장바구니 ({cartItems.length}개)</h2>
              {cartItems.length === 0 ? (
                <div style={{background:C.surface,borderRadius:14,padding:48,textAlign:'center',border:`1px solid ${C.border}`}}>
                  <div style={{fontSize:48,marginBottom:12}}>🛒</div>
                  <p style={{color:C.textSecondary,fontSize:15}}>장바구니가 비어있습니다</p>
                  <p style={{color:C.textSecondary,fontSize:13,marginTop:6}}>상품 목록에서 즉시결제 상품을 담아보세요</p>
                </div>
              ) : (
                <div style={{display:'flex',flexDirection:'column',gap:12}}>
                  {cartItems.map(item=>(
                    <div key={item.id} onClick={()=>setDrawerItem(item)} style={{
                      background:C.surface,borderRadius:12,padding:'16px 20px',
                      display:'flex',alignItems:'center',gap:16,cursor:'pointer',
                      border:`1px solid ${C.border}`,transition:'all 200ms'

                    onMouseEnter={e=>{e.currentTarget.style.boxShadow='0 4px 16px rgba(0,0,0,0.1)';}}
                    onMouseLeave={e=>{e.currentTarget.style.boxShadow='none';}}>
                      <div style={{width:60,height:60,background:`linear-gradient(135deg,${C.primaryLight},${C.accentLight})`,borderRadius:10,display:'flex',alignItems:'center',justifyContent:'center',fontSize:28,flexShrink:0}}>{item.image}</div>
                      <div style={{flex:1}}>
                        <div style={{fontSize:14,fontWeight:700}}>{item.name}</div>
                        <div style={{fontSize:12,color:C.textSecondary,marginTop:2}}>{item.brand}</div>
                      </div>

                        <button onClick={e=>{e.stopPropagation();removeFromCart(item.id,-1);}} style={{width:28,height:28,border:`1px solid ${C.border}`,borderRadius:6,background:C.bg,cursor:'pointer',fontSize:16,display:'flex',alignItems:'center',justifyContent:'center'}}>-</button>

                    </div>
                  ))}
                </div>

                <div style={{marginTop:24}}>

                        <div style={{fontSize:32,marginBottom:8}}>{p.image}</div>
                        <div style={{fontSize:13,fontWeight:700,marginBottom:4}}>{p.name}</div>
                        <div style={{fontSize:15,fontWeight:800,color:C.primary,marginBottom:8}}>{p.price.toLocaleString()}원</div>
                        <button onClick={()=>{addToCart(p);setToast(`"${p.name}" 담았습니다`);}} style={{
                          width:'100%',padding:'7px 0',background:C.primary,color:'#fff',
                          border:'none',borderRadius:8,fontWeight:700,fontSize:12,cursor:'pointer',fontFamily:'Pretendard'
                        }}>담기</button>
                      </div>
                    ))}
                  </div>
                </div>

                <div style={{display:'flex',justifyContent:'space-between',fontSize:14}}><span style={{color:C.textSecondary}}>배송비</span><span style={{color:C.success}}>무료</span></div>
                <div style={{height:1,background:C.border,margin:'4px 0'}}/>
                <div style={{display:'flex',justifyContent:'space-between',fontSize:18,fontWeight:800}}><span>총 결제금액</span><span style={{color:C.primary}}>{total.toLocaleString()}원</span></div>
              </div>
              <button onClick={()=>cartItems.length>0?setStep('form'):setToast('상품을 먼저 담아주세요')} style={{
                width:'100%',padding:'14px',background:C.primary,color:'#fff',border:'none',
                borderRadius:12,fontWeight:700,fontSize:15,cursor:'pointer',fontFamily:'Pretendard',
                opacity:cartItems.length===0?0.5:1

        {step === 'form' && (
          <>
            <div style={{background:C.surface,borderRadius:14,padding:28,border:`1px solid ${C.border}`}}>
              <h2 style={{fontSize:18,fontWeight:700,marginBottom:20}}>주문 정보 입력</h2>
              <div style={{display:'flex',flexDirection:'column',gap:16}}>
                {[{label:'주문자 이름',key:'name'},{label:'연락처',key:'phone'},{label:'배송지 주소',key:'addr'}].map(f=>(
                  <div key={f.key}>
                    <label style={{display:'block',fontSize:13,fontWeight:600,marginBottom:6,color:C.textSecondary}}>{f.label}</label>

                  <label style={{display:'block',fontSize:13,fontWeight:600,marginBottom:6,color:C.textSecondary}}>결제 수단</label>

                      <button key={pm.id} onClick={()=>setForm({...form,payment:pm.id})} style={{
                        flex:1,padding:'10px 0',borderRadius:10,

            <div style={{background:C.surface,borderRadius:14,padding:24,border:`1px solid ${C.border}`,position:'sticky',top:80}}>

              {cartItems.map(i=>(
                <div key={i.id} style={{display:'flex',justifyContent:'space-between',fontSize:13,marginBottom:8}}>
                  <span style={{color:C.textSecondary}}>{i.name} ×{i.qty}</span>
                  <span>{(i.price*i.qty).toLocaleString()}원</span>

              <div style={{height:1,background:C.border,margin:'12px 0'}}/>
              <div style={{display:'flex',justifyContent:'space-between',fontSize:18,fontWeight:800,marginBottom:16}}>
                <span>최종 결제</span><span style={{color:C.primary}}>{total.toLocaleString()}원</span>

  );
}

    </div>
  );

                  <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                    <span style={{fontSize:13,color:C.textSecondary}}>{q.note||'별도 요청사항 없음'}</span>
                    <span style={{fontSize:16,fontWeight:800,color:q.status==='견적확정'?C.primary:C.textSecondary}}>{q.amount}</span>
                  </div>
                </div>
              ))}
            </div>
          </div>
        )}

        {activeTab === 'profile' && (
          <div style={{animation:'slideInRight 250ms ease',maxWidth:600}}>
            <div style={{background:C.surface,borderRadius:14,padding:28,border:`1px solid ${C.border}`}}>
              <h3 style={{fontSize:17,fontWeight:700,marginBottom:20}}>기본 정보</h3>
              <div style={{display:'flex',flexDirection:'column',gap:16}}>
                {[{label:'이름',val:USER.name},{label:'이메일',val:USER.email},{label:'연락처',val:USER.phone},{label:'가입일',val:USER.joinDate},{label:'회원 유형',val:USER.type==='B2C'?'일반 회원 (B2C)':'사업자 회원 (B2B)'}].map(f=>(
                  <div key={f.label} style={{display:'flex',gap:16,alignItems:'center',paddingBottom:12,borderBottom:`1px solid ${C.border}`}}>
                    <span style={{fontSize:13,color:C.textSecondary,width:100,flexShrink:0}}>{f.label}</span>
                    <span style={{fontSize:14,fontWeight:600}}>{f.val}</span>
                  </div>
                ))}
              </div>
              <button onClick={()=>setToast('정보가 저장되었습니다')} style={{
                marginTop:20,padding:'12px 28px',background:C.primary,color:'#fff',border:'none',
                borderRadius:10,fontWeight:700,fontSize:14,cursor:'pointer',fontFamily:'Pretendard'
              }}>정보 수정</button>
            </div>
            <div style={{background:C.surface,borderRadius:14,padding:28,border:`1px solid ${C.border}`,marginTop:16}}>
              <h3 style={{fontSize:17,fontWeight:700,marginBottom:8}}>B2B 사업자 전환</h3>
              <p style={{fontSize:13,color:C.textSecondary,lineHeight:1.7,marginBottom:16}}>사업자 회원으로 전환하면 대형 헬스기구 견적 요청 및 기업 전용 할인 혜택을 받으실 수 있습니다.</p>
              <button onClick={()=>setToast('B2B 전환 신청이 접수되었습니다. 영업일 기준 2일 내 심사 결과를 알려드립니다')} style={{
                padding:'10px 24px',background:'#E3F2FD',color:C.info,border:'none',
                borderRadius:10,fontWeight:700,fontSize:14,cursor:'pointer',fontFamily:'Pretendard'
              }}>B2B 전환 신청</button>
            </div>
          </div>
        )}
      </div>

      {modalOrder && (
        <Modal title="주문 상세" onClose={()=>setModalOrder(null)}>
          <div style={{display:'flex',flexDirection:'column',gap:16}}>
            <div style={{display:'flex',gap:4,alignItems:'center',marginBottom:4}}>
              <Badge label={modalOrder.status} color={statusColor[modalOrder.status]||'gray'}/>
              <span style={{fontSize:13,color:C.textSecondary,marginLeft:8}}>{modalOrder.id}</span>
            </div>
            {[{label:'상품명',val:modalOrder.product},{label:'주문일',val:modalOrder.date},{label:'결제금액',val:`${modalOrder.price.toLocaleString()}원`},{label:'운송장 번호',val:modalOrder.tracking}].map(f=>(
              <div key={f.label} style={{display:'flex',justifyContent:'space-between',fontSize:14,paddingBottom:10,borderBottom:`1px solid ${C.border}`}}>
                <span style={{color:C.textSecondary}}>{f.label}</span>
                <span style={{fontWeight:600}}>{f.val}</span>
              </div>
            ))}
            <div style={{display:'flex',gap:10,marginTop:8}}>
              <button onClick={()=>{setModalOrder(null);setToast('배송 조회 페이지로 이동합니다');}} style={{flex:1,padding:'11px',background:C.primary,color:'#fff',border:'none',borderRadius:10,fontWeight:700,cursor:'pointer',fontFamily:'Pretendard',fontSize:14}}>배송 조회</button>
              <button onClick={()=>{setModalOrder(null);setToast('교환/반품 신청이 접수되었습니다');}} style={{flex:1,padding:'11px',background:C.bg,color:C.textPrimary,border:`1px solid ${C.border}`,borderRadius:10,fontWeight:700,cursor:'pointer',fontFamily:'Pretendard',fontSize:14}}>교환·반품</button>
            </div>
          </div>
        </Modal>
      )}

      {modalQuote && (
        <Modal title="견적 상세" onClose={()=>setModalQuote(null)}>
          <div style={{display:'flex',flexDirection:'column',gap:16}}>
            <div style={{display:'flex',gap:4,alignItems:'center'}}>
              <Badge label={modalQuote.status} color={statusColor[modalQuote.status]||'gray'}/>
              <span style={{fontSize:13,color:C.textSecondary,marginLeft:8}}>{modalQuote.id}</span>
            </div>
            <div>
              <div style={{fontSize:13,fontWeight:600,color:C.textSecondary,marginBottom:8}}>요청 상품</div>
              {modalQuote.items.map((item,j)=>(
                <div key={j} style={{background:C.bg,borderRadius:8,padding:'10px 14px',marginBottom:6,fontSize:14,fontWeight:600}}>{item}</div>
              ))}
            </div>
            {[{label:'요청일',val:modalQuote.date},{label:'견적 금액',val:modalQuote.amount},{label:'비고',val:modalQuote.note||'없음'}].map(f=>(
              <div key={f.label} style={{display:'flex',justifyContent:'space-between',fontSize:14,paddingBottom:10,borderBottom:`1px solid ${C.border}`}}>
                <span style={{color:C.textSecondary}}>{f.label}</span>
                <span style={{fontWeight:600}}>{f.val}</span>
              </div>
            ))}
            {modalQuote.status === '견적확정' && (
              <button onClick={()=>{setModalQuote(null);setToast('결제 페이지로 이동합니다');}} style={{padding:'13px',background:C.primary,color:'#fff',border:'none',borderRadius:10,fontWeight:700,cursor:'pointer',fontFamily:'Pretendard',fontSize:15}}>
                견적 수락 및 결제하기
              </button>
            )}
          </div>
        </Modal>
      )}

      {toast && <Toast msg={toast} onClose={()=>setToast(null)}/>}
    </div>
  );
}

// ===== APP =====
function App() {
  const [tab, setTab] = React.useState('home');
  const [loading, setLoading] = React.useState(true);
  const [cartItems, setCartItems] = React.useState([]);
  const [quoteItems, setQuoteItems] = React.useState([]);

  React.useEffect(()=>{setTimeout(()=>setLoading(false),1400);},[]);

  const addToCart = (p) => {
    setCartItems(prev=>{
      const ex = prev.find(i=>i.id===p.id);
      if(ex) return prev.map(i=>i.id===p.id?{...i,qty:i.qty+1}:i);
      return [...prev, {...p, qty:1}];
    });
  };
  const removeFromCart = (id, op) => {
    if(op==='remove') { setCartItems(prev=>prev.filter(i=>i.id!==id)); return; }
    setCartItems(prev=>prev.map(i=>i.id===id?{...i,qty:Math.max(1,i.qty+op)}:i));
  };
  const addToQuote = (p) => {
    setQuoteItems(prev=>{
      if(prev.find(i=>i.id===p.id)) return prev;
      return [...prev, {...p, qty:1}];
    });
  };
  const removeFromQuote = (id) => setQuoteItems(prev=>prev.filter(i=>i.id!==id));

  const cartCount = cartItems.reduce((s,i)=>s+i.qty, 0);
  const quoteCount = quoteItems.length;

  if(loading) {
    return (
      <div style={{display:'flex',flexDirection:'column',width:'100%',minHeight:'100vh'}}>
        <div style={{height:56,background:C.surface,borderBottom:`1px solid ${C.border}`,padding:'0 40px',display:'flex',alignItems:'center',gap:16}}>
          <div style={{width:100,height:20,borderRadius:6,background:'linear-gradient(90deg,#F1F5F9 25%,#E2E8F0 50%,#F1F5F9 75%)',backgroundSize:'200% 100%',animation:'shimmer 1.5s infinite'}}/>
        </div>
        <div style={{padding:'32px 40px',display:'flex',flexDirection:'column',gap:16}}>
          {[200,160,200,160].map((h,i)=>(
            <div key={i} style={{height:h,borderRadius:12,background:'linear-gradient(90deg,#F1F5F9 25%,#E2E8F0 50%,#F1F5F9 75%)',backgroundSize:'200% 100%',animation:'shimmer 1.5s infinite'}}/>
          ))}
        </div>
      </div>
    );
  }

  return (
    <div style={{display:'flex',flexDirection:'column',width:'100%',minHeight:'100vh'}}>
      {/* Top Nav */}
      <header style={{
        position:'sticky',top:0,zIndex:100,
        background:C.surface,borderBottom:`1px solid ${C.border}`,
        display:'flex',alignItems:'center',height:56,padding:'0 40px',gap:8
      }}>
        {/* Logo */}
        <div onClick={()=>setTab('home')} style={{display:'flex',alignItems:'center',gap:8,cursor:'pointer',marginRight:16}}>
          <div style={{width:30,height:30,borderRadius:8,background:`linear-gradient(135deg,${C.primary},${C.accent})`,display:'flex',alignItems:'center',justifyContent:'center',fontSize:16}}>🏋️</div>
          <span style={{fontSize:17,fontWeight:800,color:C.textPrimary,letterSpacing:'-0.02em'}}>핏마켓</span>
        </div>
        {/* Tabs */}
        {TABS.map(t=>(
          <button key={t.id} onClick={()=>setTab(t.id)} style={{
            padding:'7px 16px',background:'none',border:'none',cursor:'pointer',fontFamily:'Pretendard',
            fontSize:14,fontWeight:tab===t.id?700:500,
            color:tab===t.id?C.primary:C.textSecondary,
            borderBottom:tab===t.id?`2.5px solid ${C.primary}`:'2.5px solid transparent',
            transition:'all 150ms',position:'relative'
          }}>
            {t.label}
            {t.id==='checkout' && cartCount>0 && <span style={{position:'absolute',top:2,right:4,width:16,height:16,borderRadius:'50%',background:C.primary,color:'#fff',fontSize:10,fontWeight:700,display:'flex',alignItems:'center',justifyContent:'center'}}>{cartCount}</span>}
            {t.id==='quote' && quoteCount>0 && <span style={{position:'absolute',top:2,right:4,width:16,height:16,borderRadius:'50%',background:C.info,color:'#fff',fontSize:10,fontWeight:700,display:'flex',alignItems:'center',justifyContent:'center'}}>{quoteCount}</span>}
          </button>
        ))}
        <div style={{flex:1}}/>
        {/* Right Actions */}
        <div style={{display:'flex',alignItems:'center',gap:12}}>
          <div style={{position:'relative',display:'flex',alignItems:'center'}}>
            <input placeholder="검색..." style={{padding:'6px 12px 6px 32px',borderRadius:8,border:`1.5px solid ${C.border}`,fontSize:13,fontFamily:'Pretendard',outline:'none',width:160}}/>
            <span style={{position:'absolute',left:10,fontSize:14}}>🔍</span>
          </div>
          <button style={{background:'none',border:'none',cursor:'pointer',fontSize:20,position:'relative'}} onClick={()=>setTab('checkout')}>
            🛒
            {cartCount>0 && <span style={{position:'absolute',top:-4,right:-4,width:16,height:16,borderRadius:'50%',background:C.primary,color:'#fff',fontSize:10,fontWeight:700,display:'flex',alignItems:'center',justifyContent:'center'}}>{cartCount}</span>}
          </button>
          <button onClick={()=>setTab('mypage')} style={{background:C.primaryLight,border:'none',borderRadius:20,padding:'6px 14px',cursor:'pointer',fontSize:13,fontWeight:700,color:C.primary,fontFamily:'Pretendard',display:'flex',alignItems:'center',gap:6}}>
            👤 {USER.name}
          </button>
        </div>
      </header>

      {/* Main Content */}
      <main style={{flex:1}}>
        {tab==='home' && <HomePage setTab={setTab} cartItems={cartItems} addToCart={addToCart} addToQuote={addToQuote}/>}
        {tab==='brands' && <BrandsPage setTab={setTab}/>}
        {tab==='checkout' && <CheckoutPage cartItems={cartItems} addToCart={addToCart} removeFromCart={removeFromCart}/>}
        {tab==='quote' && <QuotePage quoteItems={quoteItems} addToQuote={addToQuote} removeFromQuote={removeFromQuote}/>}
        {tab==='mypage' && <MyPage/>}
      </main>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
