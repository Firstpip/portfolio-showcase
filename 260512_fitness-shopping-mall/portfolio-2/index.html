function CountUp({end, duration=1200, suffix=''}) {
  const [val, setVal] = React.useState(0);
  React.useEffect(()=>{
    let start=0; const step=end/(duration/16);
    const timer=setInterval(()=>{
      start+=step;
      if(start>=end){setVal(end);clearInterval(timer);}
      else setVal(Math.floor(start));
    },16);
    return()=>clearInterval(timer);
  },[end]);
  return <span style={{animation:'countUp 400ms ease'}}>{val.toLocaleString()}{suffix}</span>;
}

function Badge({label, color='gray', small=false}) {
  const colors = {
    gray:{bg:'#ECEFF1',text:'#546E7A'},
    blue:{bg:'#E3F2FD',text:'#1565C0'},
    green:{bg:'#E8F5E9',text:'#2E7D32'},
    orange:{bg:'#FFF3E0',text:'#E65100'},
    red:{bg:'#FFEBEE',text:'#C62828'},
    teal:{bg:'#E0F2F1',text:'#00695C'},
    purple:{bg:'#F3E5F5',text:'#6A1B9A'},
    yellow:{bg:'#FFF9C4',text:'#F57F00'},
  };
  const s=colors[color]||colors.gray;
  return <span style={{display:'inline-flex',alignItems:'center',background:s.bg,color:s.text,fontSize:small?11:12,fontWeight:600,padding:small?'2px 8px':'3px 10px',borderRadius:20}}>{label}</span>;
}

function Toast({msg,onClose}) {
  React.useEffect(()=>{const t=setTimeout(onClose,3000);return()=>clearTimeout(t);},[]);
  return <div style={{position:'fixed',bottom:28,right:28,zIndex:9999,background:C.textPrimary,color:'#fff',padding:'12px 20px',borderRadius:10,fontSize:14,fontWeight:500,animation:'slideUp 300ms ease',boxShadow:'0 4px 20px rgba(0,0,0,0.2)',display:'flex',alignItems:'center',gap:8}}>✅ {msg}</div>;
}

function Modal({title,onClose,children,width=600}) {
  return (
    <div style={{position:'fixed',inset:0,zIndex:500,display:'flex',alignItems:'center',justifyContent:'center'}}>
      <div onClick={onClose} style={{position:'absolute',inset:0,background:'rgba(0,0,0,0.45)',animation:'fadeIn 200ms ease'}}/>

        <div style={{padding:24,overflowY:'auto',flex:1}}>{children}</div>

}

}

                  border:'none',borderRadius:10,fontWeight:700,fontSize:15,cursor:processing?'not-allowed':'pointer',fontFamily:'Pretendard',
                  display:'flex',alignItems:'center',justifyContent:'center',gap:8
                }}>
                  {processing?<><span style={{animation:'pulse 1s infinite'}}>⏳</span>처리 중...</>:'견적 확정 + 알림톡 발송'}
                </button>
                <button onClick={()=>handleReject(selected)} style={{
                  padding:'13px 20px',background:C.bg,color:C.danger,
                  border:`1.5px solid ${C.danger}`,borderRadius:10,fontWeight:700,fontSize:14,cursor:'pointer',fontFamily:'Pretendard'

              <div style={{padding:12,background:C.bg,borderRadius:10,fontSize:13,color:C.textSecondary,textAlign:'center'}}>

              </div>
            )}
          </div>
        </Modal>
      )}

      {toast && <Toast msg={toast} onClose={()=>setToast(null)}/>}
    </div>
  );
}

          </div>
          {[200,160].map((h,i)=>(
            <div key={i} style={{height:h,borderRadius:12,background:'linear-gradient(90deg,#F1F5F9 25%,#E2E8F0 50%,#F1F5F9 75%)',backgroundSize:'200% 100%',animation:'shimmer 1.5s infinite'}}/>
          ))}
        </div>
      </div>
    );
  }

  return (
    <div style={{display:'flex',flexDirection:'column',width:'100%',minHeight:'100vh',background:C.bg}}>
      {/* Global Nav */}
      <header style={{
        background:C.navBg,height:64,
        display:'flex',alignItems:'center',padding:'0 32px',gap:0,
        position:'sticky',top:0,zIndex:100,boxShadow:'0 2px 12px rgba(0,0,0,0.2)'
      }}>
        {/* Logo */}
        <div onClick={()=>setRoute('home')} style={{display:'flex',alignItems:'center',gap:10,cursor:'pointer',marginRight:32}}>
          <div style={{width:34,height:34,borderRadius:9,background:`linear-gradient(135deg,${C.secondary},${C.accent})`,display:'flex',alignItems:'center',justifyContent:'center',fontSize:18}}>🏋️</div>
          <div>
            <div style={{fontSize:15,fontWeight:800,color:'#fff',letterSpacing:'-0.01em'}}>핏마켓 플러스</div>
            <div style={{fontSize:10,color:'rgba(255,255,255,0.5)',letterSpacing:'0.05em'}}>ADMIN CONSOLE</div>
          </div>
        </div>

        {/* Nav Items */}
        <nav style={{display:'flex',gap:2,flex:1}}>
          {NAV.map(n=>(
            <button key={n.id} onClick={()=>setRoute(n.id)} style={{
              padding:'8px 16px',background:'none',border:'none',cursor:'pointer',fontFamily:'Pretendard',
              fontSize:14,fontWeight:route===n.id?700:400,
              color:route===n.id?'#fff':'rgba(255,255,255,0.6)',
              borderRadius:8,background:route===n.id?'rgba(255,255,255,0.15)':'none',
              transition:'all 150ms'
            }}
            onMouseEnter={e=>{if(route!==n.id)e.currentTarget.style.background='rgba(255,255,255,0.08)';}}
            onMouseLeave={e=>{if(route!==n.id)e.currentTarget.style.background='none';}}>
              {n.label}
            </button>
          ))}
        </nav>

        {/* Right */}
        <div style={{display:'flex',alignItems:'center',gap:12}}>
          <div style={{position:'relative'}}>
            <button onClick={()=>setNotifOpen(!notifOpen)} style={{background:'rgba(255,255,255,0.1)',border:'none',borderRadius:8,padding:'8px 10px',cursor:'pointer',color:'#fff',fontSize:18,position:'relative'}}>
              🔔
              <span style={{position:'absolute',top:4,right:4,width:8,height:8,borderRadius:'50%',background:C.accent,border:'1.5px solid '+C.navBg}}/>
            </button>
            {notifOpen && (
              <div style={{position:'absolute',top:'100%',right:0,marginTop:8,width:320,background:C.surface,borderRadius:12,boxShadow:'0 12px 40px rgba(0,0,0,0.2)',zIndex:200,animation:'slideDown 200ms ease',overflow:'hidden'}}>
                <div style={{padding:'14px 16px',borderBottom:`1px solid ${C.border}`,fontSize:14,fontWeight:700}}>운영 알림</div>
                {[{msg:'QT-2024-0315 — 새 견적 요청',time:'14분 전',icon:'📋'},{msg:'폼롤러 60cm — 재고 2개 남음',time:'28분 전',icon:'⚠️'},{msg:'정우성 — B2B 승인 대기',time:'1시간 전',icon:'👥'}].map((n,i)=>(
                  <div key={i} onClick={()=>{setNotifOpen(false);}} style={{padding:'12px 16px',display:'flex',gap:10,cursor:'pointer',transition:'background 150ms'}}
                    onMouseEnter={e=>e.currentTarget.style.background=C.bg}
                    onMouseLeave={e=>e.currentTarget.style.background='transparent'}>
                    <span style={{fontSize:18}}>{n.icon}</span>
                    <div style={{flex:1}}><div style={{fontSize:13,fontWeight:600}}>{n.msg}</div><div style={{fontSize:11,color:C.textSecondary,marginTop:2}}>{n.time}</div></div>
                  </div>
                ))}
              </div>
            )}
          </div>
          <div style={{position:'relative'}}>
            <button onClick={()=>setAdminMenuOpen(!adminMenuOpen)} style={{display:'flex',alignItems:'center',gap:8,background:'rgba(255,255,255,0.1)',border:'none',borderRadius:8,padding:'7px 14px',cursor:'pointer',color:'#fff',fontSize:13,fontWeight:600,fontFamily:'Pretendard'}}>
              👤 관리자
            </button>
            {adminMenuOpen && (
              <div style={{position:'absolute',top:'100%',right:0,marginTop:8,width:160,background:C.surface,borderRadius:10,boxShadow:'0 8px 24px rgba(0,0,0,0.15)',zIndex:200,animation:'slideDown 200ms ease',overflow:'hidden'}}>
                {['설정','로그아웃'].map(item=>(
                  <div key={item} onClick={()=>setAdminMenuOpen(false)} style={{padding:'11px 16px',fontSize:13,cursor:'pointer',transition:'background 150ms'}}
                    onMouseEnter={e=>e.currentTarget.style.background=C.bg}
                    onMouseLeave={e=>e.currentTarget.style.background='transparent'}>
                    {item}
                  </div>
                ))}
              </div>
            )}
          </div>
        </div>
      </header>

      {/* Main Content */}
      <main style={{flex:1}}>
        {route==='home' && <DashboardPage setRoute={setRoute}/>}
        {route==='product-admin' && <ProductAdminPage/>}
        {route==='quote-admin' && <QuoteAdminPage/>}
        {route==='analytics' && <AnalyticsPage/>}
        {route==='members' && <MembersPage/>}
      </main>

      {/* Footer */}
      <footer style={{background:C.navBg,color:'rgba(255,255,255,0.6)',padding:'20px 40px',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
        <div style={{fontSize:12}}>핏마켓 플러스 어드민 v2.0 · React 18 + Node.js + PostgreSQL + Redis + AWS S3</div>
        <div style={{fontSize:12}}>풀스택 개발 (기여도 100%) · 자체 개발 프로젝트</div>
      </footer>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
