function CountUp({ end, suffix='', prefix='' }) {
  const [val, setVal] = useState(0);
  useEffect(()=>{ let s=0; const step=end/75; const t=setInterval(()=>{ s+=step; if(s>=end){setVal(end);clearInterval(t);}else setVal(Math.floor(s)); },16); return ()=>clearInterval(t); },[end]);
  return <span style={{animation:'countUp 400ms ease'}}>{prefix}{val.toLocaleString()}{suffix}</span>;
}

function Toast({ msg, onClose }) {
  useEffect(()=>{const t=setTimeout(onClose,3000);return()=>clearTimeout(t);},[]);
  return <div style={{position:'fixed',bottom:24,right:24,zIndex:9999,background:'#1A1A2E',color:'#fff',padding:'12px 20px',borderRadius:8,animation:'slideUp 300ms ease',boxShadow:'0 4px 16px rgba(0,0,0,0.2)',fontSize:14,display:'flex',alignItems:'center',gap:8}}>✓ {msg}</div>;
}

function Drawer({ article, onClose }) {
  if (!article) return null;

      <div style={{position:'fixed',top:0,right:0,bottom:0,width:520,background:C.surface,zIndex:201,overflowY:'auto',animation:'slideInRight 200ms ease',boxShadow:'-8px 0 40px rgba(0,0,0,0.15)'}}>
        <div style={{position:'relative',height:260,overflow:'hidden'}}>
          <img src={article.img} style={{width:'100%',height:'100%',objectFit:'cover'}}/>
          <div style={{position:'absolute',inset:0,background:'linear-gradient(to top, rgba(0,0,0,0.75) 0%, transparent 60%)'}}/>
          <button onClick={onClose} style={{position:'absolute',top:16,right:16,width:32,height:32,borderRadius:'50%',background:'rgba(0,0,0,0.4)',color:'#fff',border:'none',cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',fontSize:16,backdropFilter:'blur(8px)'}}>✕</button>
          <div style={{position:'absolute',bottom:16,left:20}}>
            <span style={{background:C.primary,color:'#fff',fontSize:11,padding:'3px 9px',borderRadius:4,fontWeight:700}}>{article.cat}</span>
          </div>
        </div>
        <div style={{padding:'24px 28px'}}>
          <h2 style={{fontSize:20,fontWeight:800,lineHeight:1.4,marginBottom:12,color:C.textPrimary}}>{article.title}</h2>
          <div style={{display:'flex',gap:16,marginBottom:20,fontSize:12,color:C.textSecondary}}>
            <span>✍ {article.author}</span>
            <span>📅 {article.date}</span>
            <span>👁 {article.views.toLocaleString()}</span>
          </div>
          <p style={{fontSize:14,lineHeight:1.9,color:'#333',marginBottom:20}}>{article.body}</p>
          <div style={{display:'flex',gap:8,flexWrap:'wrap',marginBottom:24}}>
            {article.tags.map(t=><span key={t} style={{background:'#F3E8FF',color:C.secondary,padding:'4px 10px',borderRadius:999,fontSize:12,fontWeight:600}}>#{t}</span>)}

            {ARTICLES.filter(a=>a.cat===article.cat&&a.id!==article.id).slice(0,2).map(a=>(
              <div key={a.id} style={{display:'flex',gap:12,marginBottom:10,padding:8,borderRadius:8,cursor:'pointer',transition:'background 150ms',background:'transparent'}}
                onMouseEnter={e=>e.currentTarget.style.background='#F8F0FF'}
                onMouseLeave={e=>e.currentTarget.style.background='transparent'}>
                <img src={a.img} style={{width:60,height:60,borderRadius:6,objectFit:'cover',flexShrink:0}}/>
                <div style={{flex:1}}><div style={{fontSize:11,color:C.primary,fontWeight:700,marginBottom:3}}>{a.cat}</div><div style={{fontSize:12,fontWeight:600,lineHeight:1.4,color:C.textPrimary}}>{a.title}</div></div>
              </div>
            ))}

            <button onClick={()=>alert('SNS 공유가 완료되었습니다')} style={{flex:1,padding:10,borderRadius:8,border:'none',background:C.primary,color:'#fff',fontSize:13,fontWeight:700,cursor:'pointer'}}>📱 SNS 공유</button>

function ArticleCard({ a, index, onClick }) {
  const [h, setH] = useState(false);
  return (
    <div onClick={()=>onClick(a)} onMouseEnter={()=>setH(true)} onMouseLeave={()=>setH(false)}
      style={{background:C.surface,borderRadius:16,overflow:'hidden',cursor:'pointer',
        boxShadow:h?'0 8px 24px rgba(182,46,143,0.15)':'0 4px 16px rgba(0,0,0,0.08)',
        transform:h?'translateY(-4px)':'translateY(0)',transition:'all 200ms ease',
        animation:`slideUp 400ms ease ${index*80}ms both`}}>
      <div style={{position:'relative',height:180,overflow:'hidden'}}>
        <img src={a.img} style={{width:'100%',height:'100%',objectFit:'cover',transform:h?'scale(1.06)':'scale(1)',transition:'transform 300ms ease'}}/>
        <div style={{position:'absolute',inset:0,background:'linear-gradient(to top, rgba(0,0,0,0.5) 0%, transparent 60%)'}}/>
        {a.hot&&<div style={{position:'absolute',top:10,left:10,background:C.hot,color:'#fff',fontSize:10,padding:'2px 7px',borderRadius:4,fontWeight:800,letterSpacing:'0.05em'}}>HOT</div>}
        <div style={{position:'absolute',bottom:10,left:10}}>
          <span style={{background:C.primary,color:'#fff',fontSize:10,padding:'2px 7px',borderRadius:4,fontWeight:700}}>{a.cat}</span>
        </div>
      </div>
      <div style={{padding:'14px 16px'}}>
        <div style={{fontSize:13,fontWeight:700,lineHeight:1.4,color:C.textPrimary,marginBottom:8}}>{a.title}</div>
        <div style={{display:'flex',justifyContent:'space-between',fontSize:11,color:C.textSecondary}}>
          <span>{a.author}</span>
          <span>👁 {(a.views/1000).toFixed(1)}K</span>
        </div>
      </div>
    </div>
  );
}

            <p style={{fontSize:12,lineHeight:1.7,opacity:0.55}}>1825의 일상 취향을 다루는<br/>디지털 매거진 휙 공식 웹사이트</p>
          </div>
          {[['콘텐츠',['패션','뷰티','셀럽','라이프스타일','F&B','이슈']],['정보',['About','Mediakit','Contact','광고 문의']],['채널',['Instagram','YouTube','뉴스레터','팟캐스트']]].map(([title,items])=>(
            <div key={title}>
              <div style={{fontSize:11,fontWeight:700,letterSpacing:'0.06em',textTransform:'uppercase',color:'rgba(255,255,255,0.4)',marginBottom:12}}>{title}</div>
              {items.map(item=><div key={item} style={{fontSize:12,marginBottom:8,cursor:'pointer',transition:'color 150ms',opacity:0.75}}
                onMouseEnter={e=>e.currentTarget.style.opacity='1'} onMouseLeave={e=>e.currentTarget.style.opacity='0.75'}>{item}</div>)}
            </div>
          ))}
        </div>
        <div style={{borderTop:'1px solid rgba(255,255,255,0.1)',paddingTop:18,fontSize:11,opacity:0.4,display:'flex',justifyContent:'space-between'}}>
          <span>© 2025 HWEEK Magazine. All rights reserved.</span>
          <span>개인정보처리방침 · 이용약관</span>
        </div>
      </footer>

      <Drawer article={drawer} onClose={()=>setDrawer(null)}/>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
