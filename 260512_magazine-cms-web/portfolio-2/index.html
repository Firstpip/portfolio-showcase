// CountUp
function CountUp({ end, suffix='', prefix='' }) {
  const [v, setV] = useState(0);
  useEffect(()=>{ let s=0; const step=end/60; const t=setInterval(()=>{ s+=step; if(s>=end){setV(end);clearInterval(t);}else setV(Math.floor(s)); },16); return()=>clearInterval(t); },[end]);
  return <span style={{animation:'countUp 400ms ease'}}>{prefix}{v.toLocaleString()}{suffix}</span>;
}

// Toast
function Toast({ msg, type='success', onClose }) {
  useEffect(()=>{const t=setTimeout(onClose,3000);return()=>clearTimeout(t);},[]);
  const bg = type==='success' ? '#00897B' : type==='error' ? '#c62828' : '#F57F17';
  return <div style={{position:'fixed',bottom:24,right:24,zIndex:9999,background:bg,color:'#fff',padding:'12px 20px',borderRadius:8,animation:'slideUp 300ms ease',boxShadow:'0 4px 20px rgba(0,0,0,0.3)',fontSize:14,display:'flex',alignItems:'center',gap:8,minWidth:240}}>✓ {msg}</div>;
}

// Modal

      </div>

  );
}

/* ===== CONTENT PAGE ===== */
function ContentPage() {
  const [filter, setFilter] = useState('전체');
  const [toast, setToast] = useState(null);
  const [importing, setImporting] = useState(null);
  const [queue, setQueue] = useState(IMPORT_QUEUE);
  const [selected, setSelected] = useState([]);

  const statuses = ['전체','발행됨','예약됨','초안'];
  const filtered = filter==='전체' ? ARTICLES : ARTICLES.filter(a=>a.status===filter);

  const handleImport = (item) => {
    setImporting(item.id);
    setTimeout(()=>{
      setQueue(q=>q.map(i=>i.id===item.id?{...i,status:'완료',title:'임포트된 콘텐츠'}:i));
      setImporting(null);
      setToast({msg:'콘텐츠가 임포트되었습니다'});
    },2000);
  };

  const handleBulkTag = () => {
    if(selected.length===0){setToast({msg:'기사를 먼저 선택해주세요',type:'error'});return;}
    setToast({msg:`${selected.length}건의 기사 태그가 수정되었습니다`});
    setSelected([]);
  };

  return (
    <div style={{animation:'fadeIn 300ms ease'}}>
      {toast&&<Toast msg={toast.msg} type={toast.type||'success'} onClose={()=>setToast(null)}/>}
      <div style={{background:C.surface2,padding:'24px 32px',borderBottom:`1px solid ${C.border}`}}>
        <div style={{maxWidth:1200,margin:'0 auto',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
          <div>
            <div style={{fontSize:11,color:C.accent,fontWeight:700,letterSpacing:'0.08em',textTransform:'uppercase',marginBottom:4}}>콘텐츠 관리</div>
            <h2 style={{fontSize:20,fontWeight:800,color:C.textPrimary}}>전체 기사 목록</h2>
          </div>
          <div style={{display:'flex',gap:10}}>
            {selected.length>0&&<button onClick={handleBulkTag} style={{padding:'8px 16px',borderRadius:8,border:`1px solid ${C.accent}`,background:'transparent',color:C.accent,cursor:'pointer',fontSize:13,fontWeight:600}}>일괄 태그 수정 ({selected.length})</button>}
            <button onClick={()=>setToast({msg:'CSV 내보내기가 시작됩니다'})} style={{padding:'8px 16px',borderRadius:8,border:`1px solid ${C.border}`,background:'transparent',color:C.textSecondary,cursor:'pointer',fontSize:13,fontWeight:600}}>내보내기</button>
          </div>
        </div>
      </div>
      <div style={{maxWidth:1200,margin:'0 auto',padding:'32px',display:'grid',gridTemplateColumns:'1fr 300px',gap:24}}>
        <div>
          {/* Filter tabs */}
          <div style={{display:'flex',gap:4,marginBottom:20}}>
            {statuses.map(s=>(
              <button key={s} onClick={()=>setFilter(s)} style={{padding:'6px 14px',borderRadius:999,border:'none',background:filter===s?C.accent:'transparent',color:filter===s?'#000':C.textSecondary,fontWeight:filter===s?700:500,fontSize:12,cursor:'pointer',transition:'all 200ms'}}>{s}</button>
            ))}
          </div>
          {/* Article list */}
          <div style={{background:C.surface,borderRadius:12,overflow:'hidden'}}>
            {filtered.map((a,i)=>(
              <div key={a.id} style={{display:'flex',gap:16,padding:'14px 16px',borderBottom:i<filtered.length-1?`1px solid ${C.border}`:'none',animation:`slideUp 300ms ease ${i*50}ms both`,transition:'background 150ms'}}
                onMouseEnter={e=>e.currentTarget.style.background=C.surface2}
                onMouseLeave={e=>e.currentTarget.style.background='transparent'}>
                <input type="checkbox" checked={selected.includes(a.id)} onChange={e=>{
                  if(e.target.checked) setSelected(s=>[...s,a.id]);
                  else setSelected(s=>s.filter(x=>x!==a.id));
                }} style={{marginTop:2,accentColor:C.accent,flexShrink:0}}/>
                <img src={a.img} style={{width:56,height:56,borderRadius:6,objectFit:'cover',flexShrink:0}}/>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontSize:13,fontWeight:700,color:C.textPrimary,marginBottom:4,whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{a.title}</div>
                  <div style={{display:'flex',gap:10,fontSize:11,color:C.textSecondary}}>
                    <span style={{background:`${a.status==='발행됨'?C.success:a.status==='예약됨'?C.warning:C.border}30`,color:a.status==='발행됨'?C.success:a.status==='예약됨'?C.warning:C.textSecondary,padding:'1px 7px',borderRadius:4,fontWeight:700}}>{a.status}</span>
                    <span>{a.cat}</span>
                    <span>{a.author}</span>
                    <span>{a.date}</span>
                  </div>
                </div>
                <div style={{textAlign:'right',flexShrink:0}}>
                  <div style={{fontSize:13,fontWeight:700,color:C.textPrimary}}>{a.views>0?a.views.toLocaleString():'-'}</div>
                  <div style={{fontSize:10,color:C.textSecondary}}>페이지뷰</div>
                </div>
              </div>
            ))}
          </div>
        </div>
        {/* Import Queue */}
        <div>
          <div style={{background:C.surface,borderRadius:12,padding:20}}>
            <div style={{fontSize:14,fontWeight:700,color:C.textPrimary,marginBottom:4}}>SNS 콘텐츠 임포트</div>
            <div style={{fontSize:12,color:C.textSecondary,marginBottom:16}}>인스타그램 / 유튜브 콘텐츠를 불러옵니다</div>
            <div style={{display:'flex',gap:8,marginBottom:16}}>
              <input placeholder="SNS URL 입력..." style={{flex:1,padding:'8px 10px',borderRadius:6,border:`1px solid ${C.border}`,background:C.bg,color:C.textPrimary,fontSize:12,outline:'none'}}/>
              <button onClick={()=>{setQueue(q=>[...q,{id:Date.now(),url:'instagram.com/p/new',type:'인스타그램',status:'대기',title:'미정',ts:'방금 전'}]);}} style={{padding:'8px 12px',borderRadius:6,background:C.accent,color:'#000',border:'none',cursor:'pointer',fontSize:12,fontWeight:700}}>추가</button>
            </div>
            {queue.map((q,i)=>(
              <div key={q.id} style={{background:C.surface2,borderRadius:8,padding:12,marginBottom:8,animation:`slideUp 300ms ease ${i*60}ms both`}}>
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:4}}>
                  <div style={{fontSize:11,fontWeight:700,color:q.status==='완료'?C.success:q.status==='처리중'?C.warning:C.textSecondary}}>{q.status}</div>
                  <div style={{fontSize:10,color:C.textSecondary}}>{q.ts}</div>
                </div>
                <div style={{fontSize:12,color:C.textPrimary,marginBottom:6,whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{q.url}</div>
                <div style={{fontSize:11,color:C.textSecondary,marginBottom:8}}>{q.type} · {q.title}</div>
                {q.status==='처리중'&&importing===q.id&&(
                  <div style={{height:3,background:C.border,borderRadius:2,marginBottom:8}}>
                    <div style={{height:3,background:C.accent,borderRadius:2,animation:'progressFill 2000ms linear forwards'}}/>
                  </div>
                )}
                {q.status==='대기'&&(
                  <button onClick={()=>handleImport(q)} style={{width:'100%',padding:'6px',borderRadius:6,border:'none',background:`${C.accent}20`,color:C.accent,cursor:'pointer',fontSize:11,fontWeight:700}}>임포트 시작</button>
                )}
              </div>
            ))}
          </div>
        </div>
      </div>
    </div>
  );
}

    <div style={{animation:'fadeIn 300ms ease'}}>

      <div style={{maxWidth:1200,margin:'0 auto',padding:'32px',display:'grid',gridTemplateColumns:'1fr 1fr',gap:24}}>
        {/* GAM Slots */}
        <div>
          <div style={{fontSize:15,fontWeight:700,color:C.textPrimary,marginBottom:16}}>GAM 광고 슬롯 관리</div>

        {/* Main chart */}
        <div style={{background:C.surface,borderRadius:12,padding:24,marginBottom:24,boxShadow:'0 2px 8px rgba(0,0,0,0.2)'}}>
          <div style={{fontSize:14,fontWeight:700,color:C.textPrimary,marginBottom:20}}>트래픽 추이 ({period})</div>
          <ResponsiveContainer width="100%" height={240}>
            <LineChart data={TRAFFIC}>
              <CartesianGrid strokeDasharray="3 3" stroke={C.border}/>
              <XAxis dataKey="day" tick={{fill:C.textSecondary,fontSize:12}} axisLine={{stroke:C.border}}/>
              <YAxis tick={{fill:C.textSecondary,fontSize:12}} axisLine={{stroke:C.border}}/>
              <Tooltip contentStyle={{background:C.surface2,border:`1px solid ${C.border}`,borderRadius:8,color:C.textPrimary,fontSize:13}}/>
              <Line type="monotone" dataKey="pv" stroke={C.accent} strokeWidth={2.5} dot={{fill:C.accent,r:4}} name="페이지뷰"/>
              <Line type="monotone" dataKey="uv" stroke={C.purple} strokeWidth={2.5} dot={{fill:C.purple,r:4}} name="방문자"/>
            </LineChart>
          </ResponsiveContainer>
        </div>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:24}}>
          {/* Top articles */}
          <div style={{background:C.surface,borderRadius:12,padding:20,boxShadow:'0 2px 8px rgba(0,0,0,0.2)'}}>
            <div style={{fontSize:14,fontWeight:700,color:C.textPrimary,marginBottom:16}}>인기 기사 TOP 5</div>
            {ARTICLES.filter(a=>a.views>0).sort((a,b)=>b.views-a.views).slice(0,5).map((a,i)=>(
              <div key={a.id} style={{marginBottom:14,animation:`slideUp 300ms ease ${i*60}ms both`}}>
                <div style={{display:'flex',justifyContent:'space-between',marginBottom:4}}>
                  <div style={{fontSize:12,fontWeight:600,color:C.textPrimary,flex:1,paddingRight:12,whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{i+1}. {a.title}</div>
                  <div style={{fontSize:12,fontWeight:700,color:C.accent,flexShrink:0}}>{a.views.toLocaleString()}</div>
                </div>
                <div style={{height:4,background:C.border,borderRadius:2}}>
                  <div style={{height:4,background:i===0?C.accent:i===1?C.purple:C.textSecondary,borderRadius:2,animation:`barGrow 800ms ease ${i*150}ms both`,'--target-width':`${Math.round(a.views/42100*100)}%`,width:`${Math.round(a.views/42100*100)}%`}}/>
                </div>
              </div>
            ))}
          </div>
          {/* Category perf */}
          <div style={{background:C.surface,borderRadius:12,padding:20,boxShadow:'0 2px 8px rgba(0,0,0,0.2)'}}>
            <div style={{fontSize:14,fontWeight:700,color:C.textPrimary,marginBottom:16}}>카테고리별 조회수</div>
            <ResponsiveContainer width="100%" height={200}>
              <BarChart data={CATDIST.map(c=>({name:c.name,value:Math.round(c.value/100*41800)}))}>
                <CartesianGrid strokeDasharray="3 3" stroke={C.border}/>
                <XAxis dataKey="name" tick={{fill:C.textSecondary,fontSize:11}} axisLine={{stroke:C.border}}/>
                <YAxis tick={{fill:C.textSecondary,fontSize:11}} axisLine={{stroke:C.border}}/>
                <Tooltip contentStyle={{background:C.surface2,border:`1px solid ${C.border}`,borderRadius:8,color:C.textPrimary}}/>
                <Bar dataKey="value" fill={C.accent} radius={[4,4,0,0]} name="조회수">
                  {CATDIST.map((e,i)=><Cell key={i} fill={e.color}/>)}
                </Bar>
              </BarChart>
            </ResponsiveContainer>
          </div>
        </div>
      </div>
    </div>
  );
}

/* ===== APP ===== */

          {NAV.map(n=>(

        <div style={{display:'flex',alignItems:'center',gap:16}}>

          <div onClick={()=>setUserMenu(m=>!m)} style={{width:32,height:32,borderRadius:'50%',background:`linear-gradient(135deg,${C.accent},${C.purple})`,display:'flex',alignItems:'center',justifyContent:'center',color:'#fff',fontSize:13,fontWeight:700,cursor:'pointer',position:'relative'}}>
            K

                {['프로필 설정','비밀번호 변경','로그아웃'].map(item=>(
                  <div key={item} onClick={()=>{setUserMenu(false);}} style={{padding:'8px 12px',fontSize:13,color:item==='로그아웃'?C.danger:C.textPrimary,cursor:'pointer',borderRadius:6,transition:'background 150ms',fontWeight:500}}

      <footer style={{background:C.surface,borderTop:`1px solid ${C.border}`,padding:'24px 32px'}}>

}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
