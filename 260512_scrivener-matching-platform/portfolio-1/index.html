/* ===== UTILITY COMPONENTS ===== */
function LIcon({ name, size = 16, color = 'currentColor', style: s = {} }) {
  const ref = useRef(null);
  useEffect(() => {
    if (!ref.current || !window.lucide) return;
    const key = name.split('-').map(w => w.charAt(0).toUpperCase() + w.slice(1)).join('');
    const iconDef = window.lucide[key];
    if (!iconDef) return;
    ref.current.innerHTML = '';
    const el = window.lucide.createElement(iconDef, { width: size, height: size, color, 'stroke-width': '1.8' });
    if (!el) return;
    ref.current.appendChild(el);
  }, [name, size, color]);
  return <span ref={ref} style={{ display: 'inline-flex', alignItems: 'center', flexShrink: 0, ...s }} />;
}

}

function Stars({ rating, size = 13 }) {

  );
}

function Toast({ msg, onClose }) {
  useEffect(() => { const t = setTimeout(onClose, 3000); return () => clearTimeout(t); }, []);
  return (
    <div style={{
      position:'fixed', bottom:24, right:24, background:C.primary, color:'#fff',
      padding:'13px 20px', borderRadius:12, boxShadow:'0 4px 20px rgba(27,58,107,0.35)',
      zIndex:9999, animation:'toastSlideUp 0.3s ease', fontSize:14, fontWeight:600,
      display:'flex', alignItems:'center', gap:10, maxWidth:360,
    }}>
      <LIcon name="check-circle" size={16} color={C.accent} />
      {msg}
    </div>
  );
}

/* ===== CHAT VIEW ===== */
function ChatView() {
  const [selChat, setSelChat] = useState(MOCK_CHATS[0]);

  const [input, setInput] = useState('');
  const endRef = useRef(null);

  function send() {
    if (!input.trim()) return;
    const text = input.trim();
    setInput('');
    setMsgs(prev => [...prev, { id: Date.now(), from: 'me', text, time: '방금' }]);
    setTimeout(() => {
      setMsgs(prev => [...prev, { id: Date.now() + 1, from: 'scrivener', text: '확인했습니다. 검토 후 빠르게 답변드리겠습니다.', time: '방금' }]);
    }, 1100);
  }

    <div style={{ height: 'calc(100vh - 64px)', display: 'flex', animation: 'fadeInUp 0.32s ease' }}>
      {/* Sidebar */}
      <div style={{ width: 300, background: C.surface, borderRight: `1px solid ${C.border}`, display: 'flex', flexDirection: 'column' }}>

              width: '100%', padding: '9px 12px 9px 34px', border: `1px solid ${C.border}`, borderRadius: 9,

            }} />
            <span style={{ position: 'absolute', left: 10, top: '50%', transform: 'translateY(-50%)' }}>
              <LIcon name="search" size={14} color={C.textMuted} />
            </span>
          </div>
        </div>
        <div style={{ flex: 1, overflowY: 'auto' }}>
          {MOCK_CHATS.map(chat => (
            <div key={chat.id} onClick={() => setSelChat(chat)} style={{
              padding: '14px 16px', cursor: 'pointer', borderBottom: `1px solid ${C.borderLight}`,
              background: selChat?.id === chat.id ? C.infoBg : C.surface, transition: 'background 0.15s',
              borderLeft: `3px solid ${selChat?.id === chat.id ? C.primary : 'transparent'}`,
            }}>
              <div style={{ display: 'flex', gap: 10, alignItems: 'flex-start' }}>
                <div style={{ width: 38, height: 38, borderRadius: '50%', background: C.infoBg, display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0 }}>
                  <LIcon name="user" size={17} color={C.primary} />

                  <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: 4 }}>

                    <div style={{ display: 'flex', alignItems: 'center', gap: 6, flexShrink: 0 }}>
                      <span style={{ fontSize: 11, color: C.textMuted }}>{chat.time}</span>
                      {chat.unread > 0 && <span style={{ background: C.primary, color: '#fff', fontSize: 10, fontWeight: 700, padding: '1px 6px', borderRadius: 10 }}>{chat.unread}</span>}
                    </div>
                  </div>
                  <div style={{ fontSize: 11, color: C.textMuted, marginBottom: 4 }}>{chat.topic}</div>
                  <div style={{ fontSize: 13, color: C.textSecondary, overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>{chat.lastMsg}</div>
                </div>

  const NOTIFS = [

    { id: 3, msg: '이수연 행정사가 추가 서류를 요청했습니다.', time: '3일 전', read: true },

    <div style={{ maxWidth:920, margin:'0 auto', padding:'32px 24px', animation:'fadeInUp 0.32s ease' }}>

      </div>
      <div style={{ display:'grid', gridTemplateColumns:'1.4fr 1fr', gap:20, alignItems:'start' }}>
        <div style={{ display:'flex', flexDirection:'column', gap:14 }}>
          {reviews.map((r, i) => (
            <div key={r.id} style={{ background:C.surface, borderRadius:14, padding:'20px 24px', border:`1px solid ${C.border}`, boxShadow:'0 1px 5px rgba(0,0,0,0.05)', animation:`fadeInUp ${0.22 + i * 0.07}s ease both` }}>
              <div style={{ display:'flex', justifyContent:'space-between', marginBottom:12 }}>

              <p style={{ fontSize:14, color:C.textPrimary, lineHeight:1.7 }}>{r.text}</p>

            </div>
          ))}

        <div style={{ background:C.surface, borderRadius:14, padding:'20px 22px', border:`1px solid ${C.border}`, boxShadow:'0 1px 5px rgba(0,0,0,0.05)' }}>

      </header>

      {/* Content */}
      <main style={{ minHeight: 'calc(100vh - 64px)' }}>
        {activeTab === 'home'    && <HomeView onTabChange={setActiveTab} />}
        {activeTab === 'request' && <RequestView />}
        {activeTab === 'profile' && <ProfileView />}
        {activeTab === 'chat'    && <ChatView />}
        {activeTab === 'review'  && <ReviewView />}
      </main>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
