];

const Sidebar = ({ active, onChange }) => (
  <div style={{ width:220, minHeight:'100vh', background:C.surface, borderRight:`1px solid ${C.border}`, display:'flex', flexDirection:'column', flexShrink:0, animation:'slideInLeft 0.3s ease' }}>
    {/* Logo */}
    <div style={{ padding:'22px 20px 18px', borderBottom:`1px solid ${C.border}` }}>
      <div style={{ display:'flex', alignItems:'center', gap:10 }}>
        <div style={{ width:32, height:32, borderRadius:8, background:C.primary, display:'flex', alignItems:'center', justifyContent:'center', color:'#fff', animation:'pulseGlow 2.5s ease infinite' }}>
          <Icon name="shield" size={16} />
        </div>
        <div>
          <div style={{ fontSize:13, fontWeight:700 }}>AdminPanel</div>
          <div style={{ fontSize:10, color:C.muted }}>행정사 매칭 플랫폼</div>
        </div>
      </div>
    </div>

    {/* Nav */}
    <nav style={{ flex:1, padding:'10px 8px' }}>
      {NAV.map(n => {
        const on = active === n.key;
        return (
          <button key={n.key} onClick={() => onChange(n.key)} style={{
            width:'100%', display:'flex', alignItems:'center', gap:9,
            padding:'10px 12px', borderRadius:6, marginBottom:2,
            background:on ? C.primary+'22' : 'transparent',
            color:on ? C.pl : C.muted,
            border:'none', cursor:'pointer', textAlign:'left',
            fontSize:13, fontWeight:on ? 600 : 400,
            transition:'all 0.15s',
            borderLeft:on ? `2px solid ${C.primary}` : '2px solid transparent',
          }}>
            <Icon name={n.icon} size={15} />
            {n.label}
          </button>
        );
      })}
    </nav>

    {/* Footer */}
    <div style={{ padding:'14px 18px', borderTop:`1px solid ${C.border}` }}>
      <div style={{ display:'flex', alignItems:'center', gap:9 }}>
        <div style={{ width:30, height:30, borderRadius:'50%', background:C.s2, display:'flex', alignItems:'center', justifyContent:'center', color:C.muted }}>
          <Icon name="gear" size={13} />
        </div>
        <div>
          <div style={{ fontSize:12, fontWeight:600 }}>관리자</div>
          <div style={{ fontSize:10, color:C.muted }}>admin@platform.co.kr</div>
        </div>
      </div>
    </div>
  </div>
);

/* ── App ── */
const App = () => {
  const [page, setPage] = useState('dashboard');
  return (
    <div style={{ display:'flex', minHeight:'100vh', background:C.bg }}>
      <Sidebar active={page} onChange={setPage} />
      <main style={{ flex:1, overflow:'auto', background:C.bg }}>
        {page === 'dashboard' && <DashScreen />}
        {page === 'accounts'  && <AccountScreen />}
        {page === 'requests'  && <RequestScreen />}
        {page === 'notifs'    && <NotifScreen />}
      </main>
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
