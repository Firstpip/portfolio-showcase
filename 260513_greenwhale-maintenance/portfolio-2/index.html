<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>외부기관 협업 퀘스트 운영 플랫폼 — 구현 데모</title>
<link rel="preconnect" href="https://cdn.jsdelivr.net">
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" rel="stylesheet">
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://unpkg.com/prop-types@15/prop-types.min.js"></script>
<script src="https://unpkg.com/react-is@18/umd/react-is.production.min.js"></script>
<script src="https://unpkg.com/recharts@2/umd/Recharts.js"></script>

<script src="https://unpkg.com/@phosphor-icons/web"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body, #root { width: 100%; min-height: 100vh; }
body {
  font-family: 'Pretendard', -apple-system, sans-serif;
  background: #F2F4FB;
  color: #1B2150;
}
:root {
  --primary: #3A4FA8;
  --primary-dark: #273580;
  --accent: #6C8EF5;
  --bg: #F2F4FB;
  --surface: #FFFFFF;
  --text-primary: #1B2150;
  --text-secondary: #5A6490;
  --border: #DDE2F2;
  --radius: 8px;
  --radius-sm: 6px;
  --radius-lg: 12px;
}

@keyframes pageEnter {
  from { opacity: 0; transform: translateX(16px); }
  to { opacity: 1; transform: translateX(0); }
}
@keyframes cardRise {
  from { opacity: 0; transform: translateY(12px); }
  to { opacity: 1; transform: translateY(0); }
}
@keyframes slideUp {
  from { opacity: 0; transform: translateY(24px); }
  to { opacity: 1; transform: translateY(0); }
}
@keyframes toastSlide {
  from { opacity: 0; transform: translateY(16px) scale(0.96); }
  to { opacity: 1; transform: translateY(0) scale(1); }
}
@keyframes spin {
  to { transform: rotate(360deg); }
}
@keyframes countUp {
  from { opacity: 0.3; }
  to { opacity: 1; }
}
@keyframes shimmer {
  0% { background-position: -200% 0; }
  100% { background-position: 200% 0; }
}

.page-enter { animation: pageEnter 0.3s ease both; }
.card-rise-1 { animation: cardRise 0.35s 0.05s ease both; }
.card-rise-2 { animation: cardRise 0.35s 0.1s ease both; }
.card-rise-3 { animation: cardRise 0.35s 0.15s ease both; }
.card-rise-4 { animation: cardRise 0.35s 0.2s ease both; }

/* Global Nav */
.global-nav {
  background: var(--primary-dark);
  position: sticky; top: 0; z-index: 100;
}
.nav-top {
  display: flex; align-items: center;
  padding: 0 32px; height: 56px;
  border-bottom: 1px solid rgba(255,255,255,0.1);
}
.nav-brand {
  display: flex; align-items: center; gap: 10px;
  color: white; font-size: 16px; font-weight: 800;
  letter-spacing: -0.3px; margin-right: 36px;
}
.nav-brand-icon {
  width: 30px; height: 30px; border-radius: 8px;
  background: var(--accent);
  display: flex; align-items: center; justify-content: center;
}
.nav-links { display: flex; gap: 4px; flex: 1; }
.nav-link {
  display: flex; align-items: center; gap: 7px;
  padding: 8px 14px; border-radius: var(--radius-sm);
  color: rgba(255,255,255,0.7); font-size: 13.5px; font-weight: 500;
  cursor: pointer; border: none; background: none; font-family: inherit;
  transition: all 0.18s; white-space: nowrap;
}
.nav-link:hover { color: white; background: rgba(255,255,255,0.1); }
.nav-link.active { color: white; background: rgba(108,142,245,0.3); font-weight: 700; }
.nav-right {
  margin-left: auto;
  display: flex; align-items: center; gap: 12px;
}
.nav-badge {
  padding: 4px 10px; border-radius: 20px;
  background: rgba(108,142,245,0.25); color: rgba(255,255,255,0.9);
  font-size: 12px; font-weight: 600;
  display: flex; align-items: center; gap: 5px;
}
.nav-avatar {
  width: 32px; height: 32px; border-radius: 50%;
  background: var(--accent); color: white;
  display: flex; align-items: center; justify-content: center;
  font-size: 12px; font-weight: 800; cursor: pointer; border: none;
}

/* Breadcrumb */
.breadcrumb {
  padding: 10px 32px;
  background: var(--primary-dark);
  display: flex; align-items: center; gap: 8px;
  color: rgba(255,255,255,0.6); font-size: 12.5px;
  border-bottom: 1px solid rgba(255,255,255,0.06);
}
.breadcrumb-current { color: rgba(255,255,255,0.9); font-weight: 600; }

/* Page wrapper */
.page-content { padding: 28px 32px; }

/* KPI */
.kpi-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; margin-bottom: 24px; }
.kpi-card {
  background: var(--surface); border-radius: var(--radius);
  padding: 18px 20px;
  box-shadow: 0 2px 8px rgba(58,79,168,0.08), 0 0 0 1px var(--border);
  cursor: pointer; transition: all 0.2s;
}
.kpi-card:hover { box-shadow: 0 6px 20px rgba(58,79,168,0.14); transform: translateY(-2px); }
.kpi-icon {
  width: 36px; height: 36px; border-radius: var(--radius-sm);
  display: flex; align-items: center; justify-content: center;
  margin-bottom: 12px;
}
.kpi-label { font-size: 12px; color: var(--text-secondary); font-weight: 500; margin-bottom: 4px; }
.kpi-value { font-size: 24px; font-weight: 800; color: var(--text-primary); }
.kpi-change { font-size: 12px; margin-top: 4px; font-weight: 500; }

/* Content grid */
.content-grid { display: grid; grid-template-columns: 1fr 340px; gap: 20px; margin-bottom: 24px; }
.content-grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; }

/* Card */
.card {
  background: var(--surface); border-radius: var(--radius);
  box-shadow: 0 2px 8px rgba(58,79,168,0.07), 0 0 0 1px var(--border);
  overflow: hidden;
}
.card-header {
  padding: 14px 20px; border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
}
.card-title { font-size: 14px; font-weight: 700; }
.card-body { padding: 20px; }

/* Org table */
.org-table { width: 100%; border-collapse: collapse; }
.org-table th {
  padding: 9px 16px; text-align: left;
  font-size: 11.5px; font-weight: 600; color: var(--text-secondary);
  background: var(--bg); border-bottom: 1px solid var(--border);
}
.org-table td { padding: 11px 16px; font-size: 13px; border-bottom: 1px solid var(--border); }
.org-table tr:last-child td { border-bottom: none; }
.org-table tbody tr { cursor: pointer; transition: background 0.15s; }
.org-table tbody tr:hover { background: #F5F7FF; }

/* Status badges */
.badge {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 2px 8px; border-radius: 20px;
  font-size: 11px; font-weight: 600;
}
.badge-active { background: #E8EDF8; color: var(--primary); }
.badge-pending { background: #FFF3E0; color: #E65100; }
.badge-done { background: #E8F5E9; color: #2E7D32; }
.badge-fail { background: #FFEBEE; color: #C62828; }
.badge-draft { background: #F3F4F6; color: #6B7280; }
.badge-info { background: #E3F2FD; color: #1565C0; }

/* Chart wrapper */
.chart-box { position: relative; height: 220px; width: 100%; }
.chart-box-sm { position: relative; height: 160px; width: 100%; }

/* Tabs */
.tab-bar { display: flex; gap: 2px; border-bottom: 1px solid var(--border); padding: 0 20px; }
.tab-item {
  padding: 12px 16px; font-size: 13px; font-weight: 500;
  color: var(--text-secondary); cursor: pointer; border: none; background: none;
  border-bottom: 2px solid transparent; font-family: inherit;
  transition: all 0.18s;
}
.tab-item:hover { color: var(--primary); }
.tab-item.active { color: var(--primary); font-weight: 700; border-bottom-color: var(--primary); }

/* Form */
.form-group { margin-bottom: 14px; }
.form-label { font-size: 12px; font-weight: 600; color: var(--text-secondary); margin-bottom: 5px; display: block; }
.form-input {
  width: 100%; padding: 9px 12px; border-radius: var(--radius-sm);
  border: 1.5px solid var(--border); font-size: 13.5px;
  font-family: inherit; transition: border-color 0.18s; background: var(--bg);
}
.form-input:focus { outline: none; border-color: var(--primary); background: white; }
.form-select {
  width: 100%; padding: 9px 12px; border-radius: var(--radius-sm);
  border: 1.5px solid var(--border); font-size: 13.5px;
  font-family: inherit; background: var(--bg); cursor: pointer;
}
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

/* Buttons */
.btn-primary {
  padding: 9px 20px; border-radius: var(--radius-sm);
  background: var(--primary); color: white;
  border: none; font-size: 13px; font-weight: 700;
  cursor: pointer; font-family: inherit; transition: background 0.18s;
  display: inline-flex; align-items: center; gap: 6px;
}
.btn-primary:hover { background: var(--primary-dark); }
.btn-outline {
  padding: 7px 16px; border-radius: var(--radius-sm);
  border: 1.5px solid var(--border); color: var(--text-secondary);
  background: var(--surface); font-size: 13px; font-weight: 600;
  cursor: pointer; font-family: inherit; transition: all 0.18s;
}
.btn-outline:hover { border-color: var(--primary); color: var(--primary); }
.btn-sm {
  padding: 5px 12px; border-radius: var(--radius-sm);
  font-size: 12px; font-weight: 600; cursor: pointer; font-family: inherit;
  border: none; transition: all 0.18s;
}
.btn-sm-primary { background: var(--primary); color: white; }
.btn-sm-primary:hover { background: var(--primary-dark); }
.btn-sm-outline { background: var(--surface); color: var(--text-secondary); border: 1px solid var(--border); }
.btn-sm-outline:hover { border-color: var(--primary); color: var(--primary); }
.btn-sm-danger { background: #FFEBEE; color: #C62828; border: 1px solid #FFCDD2; }
.btn-sm-danger:hover { background: #FFCDD2; }

/* Modal */
.modal-overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.45);
  z-index: 300;
  display: flex; align-items: center; justify-content: center;
}
.modal {
  background: var(--surface); border-radius: var(--radius-lg);
  width: 560px; max-width: 90vw; max-height: 85vh;
  overflow-y: auto;
  animation: slideUp 0.25s ease;
  box-shadow: 0 24px 64px rgba(27,33,80,0.2);
}
.modal-header {
  padding: 18px 24px; border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
  position: sticky; top: 0; background: var(--surface); z-index: 1;
}
.modal-body { padding: 22px 24px; }
.modal-footer {
  padding: 14px 24px; border-top: 1px solid var(--border);
  display: flex; justify-content: flex-end; gap: 10px;
  position: sticky; bottom: 0; background: var(--surface);
}
.close-btn {
  width: 30px; height: 30px; border-radius: var(--radius-sm);
  border: none; background: var(--bg); cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  color: var(--text-secondary); transition: background 0.18s;
}
.close-btn:hover { background: var(--border); }

/* Toast */
.toast-wrap {
  position: fixed; bottom: 24px; right: 24px; z-index: 500;
  display: flex; flex-direction: column; gap: 8px;
}
.toast {
  padding: 11px 16px; border-radius: var(--radius);
  background: var(--primary-dark); color: white;
  font-size: 13.5px; font-weight: 500;
  display: flex; align-items: center; gap: 8px;
  animation: toastSlide 0.28s ease;
  box-shadow: 0 4px 16px rgba(27,33,80,0.25);
  min-width: 240px;
}
.toast-ok { background: #2E7D32; }
.toast-warn { background: #E65100; }

/* Panel list */
.panel-list { display: flex; flex-direction: column; }
.panel-item {
  display: flex; align-items: center; gap: 12px;
  padding: 12px 20px; border-bottom: 1px solid var(--border);
  cursor: pointer; transition: background 0.15s;
}
.panel-item:last-child { border-bottom: none; }
.panel-item:hover { background: #F5F7FF; }
.panel-icon {
  width: 36px; height: 36px; border-radius: var(--radius-sm);
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.panel-text { flex: 1; }
.panel-title { font-size: 13.5px; font-weight: 700; margin-bottom: 2px; }
.panel-sub { font-size: 12px; color: var(--text-secondary); }

/* Timeline */
.timeline { display: flex; flex-direction: column; gap: 0; }
.timeline-item { display: flex; gap: 14px; }
.timeline-line { display: flex; flex-direction: column; align-items: center; }
.timeline-dot {
  width: 10px; height: 10px; border-radius: 50%;
  border: 2px solid; flex-shrink: 0; margin-top: 5px;
}
.timeline-connector { width: 2px; flex: 1; min-height: 24px; margin: 4px 0; }
.timeline-content { padding-bottom: 16px; flex: 1; }
.timeline-time { font-size: 11px; color: var(--text-secondary); margin-bottom: 3px; }
.timeline-desc { font-size: 13px; font-weight: 600; margin-bottom: 2px; }
.timeline-detail { font-size: 12px; color: var(--text-secondary); }

/* Queue item */
.queue-item {
  display: flex; align-items: center; justify-content: space-between;
  padding: 10px 14px; border-radius: var(--radius-sm);
  border: 1px solid var(--border); margin-bottom: 8px;
  transition: background 0.15s;
}
.queue-item:hover { background: #F5F7FF; }
.queue-item-left { display: flex; align-items: center; gap: 10px; }
.queue-status-dot {
  width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
}

/* Report preview */
.report-preview {
  background: var(--surface); border: 2px solid var(--border);
  border-radius: var(--radius); padding: 24px;
}
.report-header { border-bottom: 2px solid var(--primary); padding-bottom: 14px; margin-bottom: 20px; }
.report-org { font-size: 11px; color: var(--text-secondary); margin-bottom: 4px; }
.report-title { font-size: 18px; font-weight: 800; color: var(--primary); margin-bottom: 4px; }
.report-period { font-size: 12px; color: var(--text-secondary); }
.report-section { margin-bottom: 20px; }
.report-section-title { font-size: 13px; font-weight: 700; margin-bottom: 10px; padding-bottom: 6px; border-bottom: 1px solid var(--border); }
.report-row { display: flex; justify-content: space-between; padding: '4px 0'; font-size: '13px'; }
.report-kpi-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 16px; }
.report-kpi {
  text-align: center; padding: 10px;
  background: var(--bg); border-radius: var(--radius-sm);
}
.report-kpi-num { font-size: 20px; font-weight: 800; color: var(--primary); }
.report-kpi-label { font-size: 11px; color: var(--text-secondary); margin-top: 2px; }

/* Progress bar */
.progress-bar { height: 5px; background: var(--border); border-radius: 3px; overflow: hidden; }
.progress-fill { height: 100%; border-radius: 3px; background: linear-gradient(90deg, var(--primary), var(--accent)); transition: width 0.7s ease; }

/* Spinner */
.spinner {
  width: 18px; height: 18px; border: 2px solid rgba(255,255,255,0.3);
  border-top-color: white; border-radius: 50%;
  animation: spin 0.7s linear infinite;
}

/* Footer */
.site-footer {
  background: var(--primary-dark); color: rgba(255,255,255,0.6);
  padding: 20px 32px; font-size: 12px;
  display: flex; align-items: center; justify-content: space-between;
  margin-top: 40px;
}

@media (max-width: 1024px) {
  .kpi-row { grid-template-columns: repeat(2, 1fr); }
  .content-grid { grid-template-columns: 1fr; }
  .content-grid-3 { grid-template-columns: 1fr 1fr; }
}
@media (max-width: 768px) {
  .page-content { padding: 20px 16px; }
  .nav-top { padding: 0 16px; }
  .content-grid-3 { grid-template-columns: 1fr; }
  .nav-links .nav-link { padding: 6px 8px; font-size: 12px; }
}
@media (max-width: 480px) {
  .kpi-row { grid-template-columns: 1fr 1fr; }
  .form-row { grid-template-columns: 1fr; }
}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;
const {
  BarChart, Bar, LineChart, Line, AreaChart, Area,
  XAxis, YAxis, CartesianGrid, Tooltip, ResponsiveContainer, PieChart, Pie, Cell, Legend

// ── Phosphor icon helper ──────────────────────────────────────
function Ph({ name, size = 16, weight = 'regular', color = 'currentColor', style = {} }) {
  return <i className={`ph-${weight === 'bold' ? 'bold' : weight === 'fill' ? 'fill' : 'regular'} ph-${name}`} style={{ fontSize: size, color, display: 'inline-flex', alignItems: 'center', ...style }} />;
}

// Toast
function Toasts({ toasts }) {
  return (
    <div className="toast-wrap">
      {toasts.map(t => (
        <div key={t.id} className={`toast ${t.type === 'ok' ? 'toast-ok' : t.type === 'warn' ? 'toast-warn' : ''}`}>
          <Ph name={t.type === 'ok' ? 'check-circle' : t.type === 'warn' ? 'warning' : 'info'} size={15} />
          {t.msg}
        </div>
      ))}
    </div>
  );
}

function MonitorScreen({ addToast }) {

  const statusMap = { active: { color: '#2196F3', label: '처리 중' }, waiting: { color: '#FF9800', label: '대기' }, done: { color: '#4CAF50', label: '완료' }, failed: { color: '#F44336', label: '실패' } };

  function handleRetry(id) {
    setQueue(prev => prev.map(q => q.id === id ? { ...q, status: 'active' } : q));
    setTimeout(() => setQueue(prev => prev.map(q => q.id === id ? { ...q, status: 'done' } : q)), 1500);
    addToast('재처리를 시작했습니다.');
  }
  function handleClearDone() {
    setQueue(prev => prev.filter(q => q.status !== 'done'));
    addToast('완료 항목을 정리했습니다.', 'ok');
  }
  function handleAddIncident(e) {
    e.preventDefault();
    setIncidents(prev => [...prev, { id: Date.now(), type: '기타', occurred: '2026.05.13 09:00', content: '신규 장애 등록 테스트', action: '조치 계획 작성 중', status: '처리중' }]);

          { label: '처리 중', val: queue.filter(q => q.status === 'active').length, color: '#1565C0' },
          { label: '대기 중', val: queue.filter(q => q.status === 'waiting').length, color: '#E65100' },
          { label: '실패', val: queue.filter(q => q.status === 'failed').length, color: '#C62828' },

                    { day: '금', 성공: 63, 실패: 4 }, { day: '토', 성공: 28, 실패: 0 },
                    { day: '일', 성공: 19, 실패: 0 },

                    <CartesianGrid strokeDasharray="3 3" stroke="#DDE2F2" />
                    <XAxis dataKey="day" tick={{ fontSize: 11 }} />
                    <YAxis tick={{ fontSize: 11 }} />

          <div className="modal">

              <button className="close-btn" onClick={() => setSelectedIncident(null)}><Ph name="x" size={15} /></button>
            </div>
            <div className="modal-body">

                <span className="badge badge-info">{selectedIncident.type}</span>

    '외부기관 캠페인 연동 관리': '캠페인 관리',
    '월간 운영 보고서 자동 생성': '보고서',
    '알림 큐 및 장애 이력 관리': '모니터링',
  };

  function renderPage() {
    switch (page) {
      case '협업 퀘스트 연동 대시보드': return <DashboardScreen addToast={addToast} />;
      case '외부기관 캠페인 연동 관리': return <CampaignScreen addToast={addToast} />;
      case '월간 운영 보고서 자동 생성': return <ReportScreen addToast={addToast} />;
      case '알림 큐 및 장애 이력 관리': return <MonitorScreen addToast={addToast} />;
      default: return null;
    }
  }

  return (
    <div style={{ width: '100%', minHeight: '100vh', background: 'var(--bg)', display: 'flex', flexDirection: 'column' }}>
      <nav className="global-nav">
        <div className="nav-top">
          <div className="nav-brand">
            <div className="nav-brand-icon"><Ph name="leaf" size={16} color="white" weight="fill" /></div>
            GreenWhale Ops
          </div>
          <div className="nav-links">
            {navItems.map(item => (
              <button
                key={item.label}
                className={`nav-link ${page === item.label ? 'active' : ''}`}
                onClick={() => setPage(item.label)}
              >
                <Ph name={item.icon} size={14} />
                {item.label}
              </button>
            ))}
          </div>
          <div className="nav-right">
            <div className="nav-badge"><Ph name="circles-three" size={13} />시스템 정상</div>
            <button className="nav-avatar">관</button>
          </div>
        </div>
        <div className="breadcrumb">
          <Ph name="house" size={12} />
          <span>GreenWhale</span>
          <Ph name="caret-right" size={11} />
          <span className="breadcrumb-current">{breadcrumbMap[page]}</span>
        </div>
      </nav>

      <main style={{ flex: 1 }}>
        <div className="page-content">
          {renderPage()}
        </div>
      </main>

      <footer className="site-footer">
        <div>GreenWhale 협업 퀘스트 운영 플랫폼 — 구현 데모</div>
        <div>React 18 + Next.js 14 + Node.js + PostgreSQL + Redis / Bull Queue</div>
      </footer>

      <Toasts toasts={toasts} />
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
