function Icon({name,size=16,color='currentColor',style={}}){
  const ref=useRef(null);
  useEffect(()=>{
    if(ref.current&&window.lucide){
      ref.current.innerHTML='';
      const iconFn=window.lucide[name.replace(/-([a-z])/g,(_,c)=>c.toUpperCase())];
      if(iconFn){
        const svgStr=iconFn([size,size,[],'currentColor','round','round',2]);
        if(typeof svgStr==='string'){ref.current.innerHTML=svgStr;}
        else{
          const el=document.createElementNS('http://www.w3.org/2000/svg','svg');
          el.setAttribute('width',size);el.setAttribute('height',size);
          el.setAttribute('viewBox','0 0 24 24');el.setAttribute('fill','none');
          el.setAttribute('stroke',color);el.setAttribute('stroke-width','2');
          el.setAttribute('stroke-linecap','round');el.setAttribute('stroke-linejoin','round');
          ref.current.appendChild(el);
        }
      }
    }
  },[name,size,color]);
  return <span ref={ref} style={{display:'inline-flex',alignItems:'center',flexShrink:0,...style}}/>;
}

          </div>
        )}
      </div>
    </div>
  );
}

function ApplicantView({showToast}){
  const [applicants,setApplicants]=useState(APPLICANTS);
  const [selected,setSelected]=useState([]);
  const [detail,setDetail]=useState(null);
  const [filterStatus,setFilterStatus]=useState('전체');
  const [detailDrawer,setDetailDrawer]=useState(false);

  const filtered=applicants.filter(a=>filterStatus==='전체'||a.status===filterStatus);
  const toggleSelect=(id)=>setSelected(s=>s.includes(id)?s.filter(x=>x!==id):[...s,id]);

  const handleBulkSelect=()=>{
    const pendingIds=filtered.filter(a=>a.status==='pending').map(a=>a.id);
    setApplicants(prev=>prev.map(a=>selected.includes(a.id)&&a.status==='pending'?{...a,status:'selected'}:a));
    setSelected([]);
    showToast(`${selected.filter(id=>filtered.find(a=>a.id===id&&a.status==='pending')).length}명을 선정했습니다`,'success');
  };

  const handleReject=(id)=>{
    setApplicants(prev=>prev.map(a=>a.id===id?{...a,status:'rejected'}:a));
    showToast('거절 처리 완료','success');
  };

  return(
    <div style={{padding:'32px 40px'}} className="anim-slide">
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:24}}>
        <div>
          <h2 style={{fontSize:22,fontWeight:800,marginBottom:6}}>지원자 관리</h2>
          <p style={{color:'#8C7B72',fontSize:14}}>강남 브런치 카페 신메뉴 체험단 · 총 {applicants.length}명 지원</p>
        </div>
        <div style={{display:'flex',gap:10}}>
          {selected.length>0&&(
            <button className="btn btn-primary btn-sm" onClick={handleBulkSelect}>

          )}
          <select style={{width:'auto',padding:'8px 14px',fontSize:13}} value={filterStatus} onChange={e=>setFilterStatus(e.target.value)}>
            <option>전체</option>
            <option value="pending">검토중</option>
            <option value="selected">선정완료</option>
            <option value="rejected">미선정</option>
          </select>
        </div>
      </div>

      <div style={{display:'grid',gap:12}}>
        {filtered.map((a,i)=>(
          <div key={a.id} className="card" style={{padding:'16px 20px',display:'flex',alignItems:'center',gap:16,animation:`cardAppear .3s ease ${i*.05}s both`,cursor:'pointer'}}
            onClick={()=>{setDetail(a);setDetailDrawer(true);}}>
            <input type="checkbox" checked={selected.includes(a.id)} onChange={()=>toggleSelect(a.id)} onClick={e=>e.stopPropagation()}
              style={{width:18,height:18,accentColor:'#E8501A',cursor:'pointer'}}/>
            <div style={{width:44,height:44,borderRadius:'50%',background:`hsl(${a.id*47},60%,75%)`,display:'flex',alignItems:'center',justifyContent:'center',fontWeight:800,color:'#fff',fontSize:16,flexShrink:0}}>
              {a.name[0]}
            </div>
            <div style={{flex:1}}>
              <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:4}}>
                <span style={{fontWeight:700,fontSize:15}}>{a.name}</span>
                <span style={{fontSize:13,color:'#8C7B72'}}>{a.handle}</span>
                <span className={`badge ${a.status==='pending'?'badge-pending':a.status==='selected'?'badge-selected':'badge-rejected'}`} style={{fontSize:11}}>
                  {STATUS_LABEL[a.status]}
                </span>
              </div>
              <div style={{display:'flex',gap:12,fontSize:13,color:'#6B5C55'}}>
                {a.channels.map(c=><span key={c} style={{background:'#FFF0EB',color:'#E8501A',padding:'2px 8px',borderRadius:12,fontSize:12,fontWeight:600}}>{c}</span>)}

      </div>

      {/* Detail Drawer */}
      {detailDrawer&&detail&&(
        <div style={{position:'fixed',inset:0,zIndex:1000,display:'flex'}} className="anim-fade">

          <div style={{width:400,background:'#fff',overflowY:'auto',animation:'slideInRight .3s ease',boxShadow:'-4px 0 24px rgba(0,0,0,.12)'}}>

              <div style={{fontWeight:800,fontSize:17}}>인플루언서 프로필</div>

            </div>
            <div style={{padding:24}}>
              <div style={{display:'flex',gap:16,alignItems:'center',marginBottom:24}}>
                <div style={{width:64,height:64,borderRadius:'50%',background:`hsl(${detail.id*47},60%,75%)`,display:'flex',alignItems:'center',justifyContent:'center',fontWeight:900,color:'#fff',fontSize:24}}>
                  {detail.name[0]}
                </div>
                <div>
                  <div style={{fontWeight:800,fontSize:18,marginBottom:4}}>{detail.name}</div>
                  <div style={{color:'#8C7B72',fontSize:14}}>{detail.handle}</div>
                  <span className={`badge ${detail.status==='pending'?'badge-pending':detail.status==='selected'?'badge-selected':'badge-rejected'}`} style={{marginTop:6}}>
                    {STATUS_LABEL[detail.status]}

                </div>

              <div style={{background:'#FFF8F5',borderRadius:10,padding:16,marginBottom:20}}>
                <p style={{fontSize:14,color:'#3A3030',lineHeight:1.6}}>{detail.bio}</p>
              </div>
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12,marginBottom:20}}>
                {[['팔로워',`${detail.followers.toLocaleString()}명`],['주 매체',detail.media],['활동 지역',detail.region],['영향력 지수',`${detail.score}점`]].map(([k,v])=>(
                  <div key={k} style={{background:'#f9f5f3',borderRadius:8,padding:'10px 14px'}}>
                    <div style={{fontSize:12,color:'#8C7B72',marginBottom:4}}>{k}</div>
                    <div style={{fontWeight:700,fontSize:14}}>{v}</div>

                ))}
              </div>
              <div style={{marginBottom:20}}>
                <div style={{fontSize:13,fontWeight:700,color:'#6B5C55',marginBottom:8}}>보유 채널</div>
                <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
                  {detail.channels.map(c=>(
                    <span key={c} style={{background:'#FFF0EB',color:'#E8501A',padding:'5px 14px',borderRadius:20,fontSize:13,fontWeight:600}}>{c}</span>
                  ))}
                </div>
              </div>
              {detail.status==='pending'&&(
                <div style={{display:'flex',gap:10}}>
                  <button className="btn btn-primary" style={{flex:1}} onClick={()=>{
                    setApplicants(prev=>prev.map(a=>a.id===detail.id?{...a,status:'selected'}:a));
                    setDetail(d=>({...d,status:'selected'}));
                    showToast(`${detail.name}님을 선정했습니다`,'success');
                  }}>선정하기</button>
                  <button className="btn btn-ghost" style={{flex:1}} onClick={()=>{
                    handleReject(detail.id);
                    setDetailDrawer(false);
                  }}>거절하기</button>
                </div>
              )}
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

          <div style={{display:'grid',gap:18}}>
            <div>
              <label>리워드 유형 *</label>

                    <div style={{fontWeight:700,fontSize:14,color:form.rewardType===v?'#E8501A':'#3A3030',marginBottom:4}}>{v==='free'?'무료 제공':'프리미엄'}</div>
                    <div style={{fontSize:13,color:'#6B5C55'}}>{label}</div>
                  </div>
                ))}
              </div>
            </div>
            {form.rewardType==='premium'&&(
              <div><label>1인당 리워드 금액 (원) *</label>
                <input type="number" value={form.reward} onChange={e=>set('reward',Number(e.target.value))} placeholder="50000" min={0}/>
                <div style={{fontSize:12,color:'#8C7B72',marginTop:6}}>총 지급액: {(form.reward*form.slots).toLocaleString()}원 (인원 {form.slots}명)</div>

            )}
            <div style={{background:'#FFF8F5',borderRadius:10,padding:16}}>
              <div style={{fontSize:13,fontWeight:700,color:'#E8501A',marginBottom:8}}>플랫폼 수수료 안내</div>
              <div style={{fontSize:13,color:'#6B5C55',lineHeight:1.7}}>
                결제 금액의 20%가 플랫폼 수수료로 자동 공제됩니다.<br/>
                {form.rewardType==='premium'&&form.reward>0&&`예상 총 결제액: ${Math.round(form.reward*form.slots*1.2).toLocaleString()}원`}

            </div>
          </div>
          <div style={{display:'flex',gap:12,marginTop:24}}>
            <button className="btn btn-ghost" style={{flex:1,padding:'13px'}} onClick={()=>setStep(1)}>이전</button>
            <button className="btn btn-primary" style={{flex:2,padding:'13px'}} onClick={()=>setStep(3)}>다음 단계</button>

          <div style={{marginBottom:20}}>
            <div style={{fontWeight:700,fontSize:15,marginBottom:12,color:'#3A3030'}}>캠페인 정보 확인</div>
            <div style={{display:'grid',gap:10}}>
              {[['캠페인 제목',form.title||'(미입력)'],['카테고리',form.category||'(미입력)'],['지역',form.region||'(미입력)'],['모집 인원',`${form.slots}명`],['마감일',form.deadline||'(미입력)'],['리워드 유형',form.rewardType==='premium'?'프리미엄':'무료 제공']].map(([k,v])=>(
                <div key={k} style={{display:'flex',justifyContent:'space-between',padding:'10px 0',borderBottom:'1px solid #f0ebe8'}}>
                  <span style={{color:'#6B5C55',fontSize:14}}>{k}</span>
                  <span style={{fontWeight:600,fontSize:14}}>{v}</span>
                </div>
              ))}
            </div>
          </div>
          {form.rewardType==='premium'&&form.reward>0&&(
            <div style={{background:'#FFF8F5',borderRadius:10,padding:16,marginBottom:20}}>
              <div style={{display:'flex',justifyContent:'space-between',marginBottom:8,fontSize:14}}>
                <span style={{color:'#6B5C55'}}>리워드 합계</span>
                <span style={{fontWeight:600}}>{(form.reward*form.slots).toLocaleString()}원</span>
              </div>
              <div style={{display:'flex',justifyContent:'space-between',marginBottom:8,fontSize:14}}>
                <span style={{color:'#6B5C55'}}>플랫폼 수수료 (20%)</span>
                <span style={{fontWeight:600}}>{Math.round(form.reward*form.slots*0.2).toLocaleString()}원</span>
              </div>
              <div style={{display:'flex',justifyContent:'space-between',fontSize:16,fontWeight:800,borderTop:'1.5px solid #f0ebe8',paddingTop:8}}>
                <span>총 결제 금액</span>
                <span style={{color:'#E8501A'}}>{Math.round(form.reward*form.slots*1.2).toLocaleString()}원</span>
              </div>
            </div>
          )}
          {paying?(
            <div style={{textAlign:'center',padding:'20px 0'}}>
              <div style={{width:32,height:32,border:'3px solid #f0ebe8',borderTopColor:'#E8501A',borderRadius:'50%',animation:'spinPulse .8s linear infinite',margin:'0 auto 14px'}}/>
              <div style={{fontWeight:600,color:'#E8501A'}}>결제 처리 중...</div>
            </div>
          ):(
            <div style={{display:'flex',gap:12}}>
              <button className="btn btn-ghost" style={{flex:1,padding:'13px'}} onClick={()=>setStep(2)}>이전</button>
              <button className="btn btn-primary" style={{flex:2,padding:'13px'}} onClick={handlePay}>
                {form.rewardType==='premium'&&form.reward>0?'결제하고 등록하기':'캠페인 등록하기'}
              </button>
            </div>
          )}
        </div>
      )}

      {step===4&&(
        <div className="card" style={{padding:48,textAlign:'center'}} key="step4">
          <div style={{width:64,height:64,borderRadius:'50%',background:'#E6F5EE',display:'flex',alignItems:'center',justifyContent:'center',margin:'0 auto 20px',fontSize:28}}>✓</div>
          <div style={{fontWeight:800,fontSize:22,marginBottom:12}}>캠페인 등록 완료</div>
          <div style={{color:'#6B5C55',fontSize:15,lineHeight:1.7,marginBottom:28}}>캠페인이 성공적으로 등록되었습니다.<br/>지원자가 들어오면 알림으로 안내해 드립니다.</div>
          <button className="btn btn-primary" style={{padding:'12px 32px'}} onClick={()=>setStep(1)}>새 캠페인 등록</button>
        </div>
      )}
    </div>
  );
}

function MypageView({showToast}){
  const [apps,setApps]=useState(MY_APPS);
  const [reviewModal,setReviewModal]=useState(false);
  const [selectedApp,setSelectedApp]=useState(null);
  const [reviewUrl,setReviewUrl]=useState('');

  const submitReview=()=>{
    if(!reviewUrl){showToast('리뷰 URL을 입력해주세요','error');return;}
    setApps(prev=>prev.map(a=>a.id===selectedApp.id?{...a,reviewUrl,status:'done'}:a));
    setReviewModal(false);
    setReviewUrl('');
    showToast('리뷰 링크가 제출되었습니다','success');
  };

  const statusColor={pending:'#B47800',selected:'#1A7A45',review:'#1A4CC7',done:'#555'};

  return(
    <div style={{padding:'32px 40px'}} className="anim-slide">
      <div style={{display:'flex',gap:20,marginBottom:28,flexWrap:'wrap'}}>
        <div style={{flex:'0 0 280px'}}>
          <div className="card" style={{padding:24,background:'linear-gradient(135deg,#E8501A,#F97C4A)',color:'#fff'}}>
            <div style={{display:'flex',gap:16,alignItems:'center',marginBottom:20}}>
              <div style={{width:52,height:52,borderRadius:'50%',background:'rgba(255,255,255,.25)',display:'flex',alignItems:'center',justifyContent:'center',fontWeight:900,fontSize:20}}>김</div>
              <div>
                <div style={{fontWeight:800,fontSize:18}}>김수연</div>
                <div style={{fontSize:13,opacity:.85}}>@suyeon_blog</div>
              </div>
            </div>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>
              {[['참여 중',apps.filter(a=>a.status!=='done').length+'건'],['완료',apps.filter(a=>a.status==='done').length+'건'],['누적 리워드',apps.filter(a=>a.status==='done').reduce((s,a)=>s+a.reward,0).toLocaleString()+'원'],['영향력 지수','82점']].map(([k,v])=>(
                <div key={k} style={{background:'rgba(255,255,255,.15)',borderRadius:8,padding:'10px 12px'}}>
                  <div style={{fontSize:11,opacity:.8,marginBottom:4}}>{k}</div>
                  <div style={{fontWeight:800,fontSize:15}}>{v}</div>
                </div>
              ))}
            </div>
          </div>
        </div>
        <div style={{flex:1,minWidth:300}}>
          <h2 style={{fontSize:18,fontWeight:800,marginBottom:16}}>마이페이지</h2>
          <div style={{display:'grid',gap:12}}>
            {apps.map((a,i)=>(
              <div key={a.id} className="card" style={{padding:'16px 20px',animation:`cardAppear .3s ease ${i*.06}s both`}}>
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:10}}>
                  <div>
                    <div style={{fontWeight:700,fontSize:14,marginBottom:4}}>{a.campaign}</div>
                    <div style={{fontSize:13,color:'#8C7B72'}}>{a.brand} · 지원 {a.appliedAt}</div>
                  </div>
                  <span className={`badge ${STATUS_BADGE[a.status]}`}>{STATUS_LABEL[a.status]}</span>
                </div>
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                  <div style={{fontSize:13,color:'#6B5C55'}}>마감 {a.deadline} · 리워드 <b style={{color:'#E8501A'}}>{a.reward.toLocaleString()}원</b></div>
                  {a.status==='review'&&!a.reviewUrl&&(
                    <button className="btn btn-primary btn-sm" onClick={()=>{setSelectedApp(a);setReviewModal(true);}}>리뷰 제출</button>
                  )}
                  {a.status==='done'&&a.reviewUrl&&(
                    <a href="#" style={{fontSize:12,color:'#1A4CC7',textDecoration:'underline'}} onClick={e=>e.preventDefault()}>리뷰 확인</a>
                  )}
                </div>
                {/* Status timeline */}
                <div style={{marginTop:14,display:'flex',gap:0}}>
                  {['지원','선정','리뷰제출','정산완료'].map((stage,idx)=>{
                    const stages=['pending','selected','review','done'];
                    const current=stages.indexOf(a.status);
                    const done=idx<=current;
                    return(
                      <React.Fragment key={stage}>
                        <div style={{display:'flex',flexDirection:'column',alignItems:'center',gap:4}}>
                          <div style={{width:20,height:20,borderRadius:'50%',background:done?statusColor[a.status]:'#f0ebe8',display:'flex',alignItems:'center',justifyContent:'center',fontSize:11,color:done?'#fff':'#aaa',transition:'all .3s'}}>
                            {done?'✓':''}
                          </div>
                          <span style={{fontSize:11,color:done?statusColor[a.status]:'#aaa',fontWeight:done?700:400}}>{stage}</span>
                        </div>
                        {idx<3&&<div style={{flex:1,height:2,background:idx<current?statusColor[a.status]:'#f0ebe8',margin:'9px 4px 0',transition:'background .3s'}}/>}
                      </React.Fragment>
                    );
                  })}
                </div>
              </div>
            ))}
          </div>
        </div>
      </div>

      {reviewModal&&(
        <div style={{position:'fixed',inset:0,zIndex:1000,display:'flex',alignItems:'center',justifyContent:'center',background:'rgba(0,0,0,.35)'}} className="anim-fade">
          <div className="card" style={{padding:28,width:440,animation:'slideUp .3s ease'}}>
            <div style={{fontWeight:800,fontSize:17,marginBottom:6}}>리뷰 링크 제출</div>
            <div style={{color:'#8C7B72',fontSize:14,marginBottom:20}}>{selectedApp?.campaign}</div>
            <label>콘텐츠 URL *</label>
            <input value={reviewUrl} onChange={e=>setReviewUrl(e.target.value)} placeholder="https://blog.naver.com/..." style={{marginBottom:8}}/>
            <div style={{fontSize:12,color:'#8C7B72',marginBottom:20}}>블로그 포스팅, 인스타그램 게시물, 유튜브 영상 URL을 입력하세요.</div>
            <div style={{display:'flex',gap:10}}>
              <button className="btn btn-ghost" style={{flex:1}} onClick={()=>setReviewModal(false)}>취소</button>
              <button className="btn btn-primary" style={{flex:2}} onClick={submitReview}>제출하기</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

function SettlementView({showToast}){
  const [items]=useState([{id:2,campaign:'신제품 스킨케어 세럼 리뷰 체험단',brand:'루미에르 스킨',reward:60000,fee:12000,net:48000,status:'available'}]);
  const [bankModal,setBankModal]=useState(false);
  const [bank,setBank]=useState({bankName:'',account:'',holder:''});
  const [submitting,setSubmitting]=useState(false);
  const [submitted,setSubmitted]=useState(false);

  const handleSubmit=()=>{
    if(!bank.bankName||!bank.account||!bank.holder){showToast('계좌 정보를 모두 입력해주세요','error');return;}
    setSubmitting(true);
    setTimeout(()=>{setSubmitting(false);setSubmitted(true);setBankModal(false);showToast('정산 신청이 완료되었습니다','success');},1500);
  };

  return(
    <div style={{padding:'32px 40px',maxWidth:680,margin:'0 auto'}} className="anim-slide">
      <h2 style={{fontSize:22,fontWeight:800,marginBottom:6}}>정산 신청</h2>
      <p style={{color:'#8C7B72',fontSize:14,marginBottom:24}}>완료된 캠페인의 리워드를 출금 신청하세요</p>
      <div className="card" style={{padding:20,marginBottom:20,background:'linear-gradient(135deg,#FFF8F5,#FFF0EB)',border:'1.5px solid #FFD4C0'}}>
        <div style={{display:'flex',gap:24,flexWrap:'wrap'}}>
          {[['출금 가능',`${items[0].net.toLocaleString()}원`],['신청 대기','0원'],['이번 달 수령','48,000원']].map(([k,v])=>(
            <div key={k}><div style={{fontSize:12,color:'#8C7B72',marginBottom:4}}>{k}</div><div style={{fontWeight:800,fontSize:20,color:'#E8501A'}}>{v}</div></div>
          ))}
        </div>
      </div>

      {items.map(item=>(
        <div key={item.id} className="card" style={{padding:20,marginBottom:16}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:14}}>
            <div>
              <div style={{fontWeight:700,fontSize:15,marginBottom:4}}>{item.campaign}</div>
              <div style={{fontSize:13,color:'#8C7B72'}}>{item.brand}</div>
            </div>
            <span className={submitted?'badge badge-pending':'badge badge-active'}>{submitted?'승인 대기':'출금 가능'}</span>
          </div>
          <div style={{background:'#f9f5f3',borderRadius:8,padding:14,marginBottom:14}}>
            <div style={{display:'flex',justifyContent:'space-between',marginBottom:6,fontSize:14}}><span style={{color:'#6B5C55'}}>총 리워드</span><span style={{fontWeight:600}}>{item.reward.toLocaleString()}원</span></div>
            <div style={{display:'flex',justifyContent:'space-between',marginBottom:6,fontSize:14}}><span style={{color:'#6B5C55'}}>플랫폼 수수료 (20%)</span><span style={{fontWeight:600,color:'#C51A1A'}}>-{item.fee.toLocaleString()}원</span></div>
            <div style={{display:'flex',justifyContent:'space-between',borderTop:'1px solid #e5d8d3',paddingTop:8,fontSize:16,fontWeight:800}}>
              <span>실수령 금액</span><span style={{color:'#E8501A'}}>{item.net.toLocaleString()}원</span>
            </div>
          </div>
          {!submitted?(
            <button className="btn btn-primary" style={{width:'100%',padding:'12px'}} onClick={()=>setBankModal(true)}>출금 신청하기</button>
          ):(
            <div style={{background:'#FFF9E6',borderRadius:8,padding:'12px',textAlign:'center',color:'#B47800',fontWeight:700,fontSize:14}}>관리자 승인 대기 중</div>
          )}
        </div>
      ))}

      {bankModal&&(
        <div style={{position:'fixed',inset:0,zIndex:1000,display:'flex',alignItems:'center',justifyContent:'center',background:'rgba(0,0,0,.35)'}} className="anim-fade">
          <div className="card" style={{padding:28,width:420,animation:'slideUp .3s ease'}}>
            <div style={{fontWeight:800,fontSize:17,marginBottom:20}}>출금 계좌 입력</div>
            <div style={{display:'grid',gap:16,marginBottom:20}}>
              <div><label>은행 *</label>
                <select value={bank.bankName} onChange={e=>setBank(b=>({...b,bankName:e.target.value}))}>
                  <option value="">은행 선택</option>
                  {['국민은행','신한은행','우리은행','하나은행','카카오뱅크','토스뱅크'].map(b=><option key={b}>{b}</option>)}
                </select>
              </div>
              <div><label>계좌번호 *</label><input value={bank.account} onChange={e=>setBank(b=>({...b,account:e.target.value}))} placeholder="'-' 없이 입력"/></div>
              <div><label>예금주 *</label><input value={bank.holder} onChange={e=>setBank(b=>({...b,holder:e.target.value}))} placeholder="예금주명"/></div>
            </div>
            <div style={{background:'#FFF8F5',borderRadius:8,padding:'10px 14px',marginBottom:16,fontSize:13,color:'#6B5C55',lineHeight:1.6}}>
              실수령 금액: <b style={{color:'#E8501A'}}>{items[0].net.toLocaleString()}원</b><br/>
              관리자 검토 후 영업일 기준 3~5일 내 입금됩니다.
            </div>
            <div style={{display:'flex',gap:10}}>
              <button className="btn btn-ghost" style={{flex:1}} onClick={()=>setBankModal(false)}>취소</button>
              <button className="btn btn-primary" style={{flex:2}} onClick={handleSubmit} disabled={submitting}>
                {submitting?'처리 중...':'신청 완료'}
              </button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

function App(){
  const [tab,setTab]=useState('explore');
  const [drawerCampaign,setDrawerCampaign]=useState(null);
  const [toast,setToast]=useState(null);

  const showToast=(msg,type='success')=>{
    setToast({msg,type});
    setTimeout(()=>setToast(null),3000);
  };

  const TABS=[
    {id:'explore',label:'캠페인 탐색'},
    {id:'apply',label:'지원자 관리'},
    {id:'register',label:'캠페인 등록'},
    {id:'mypage',label:'마이페이지'},
    {id:'payment',label:'정산 신청'},
  ];

  return(
    <div style={{width:'100%',minHeight:'100vh',display:'flex',flexDirection:'column'}}>
      {/* TopNav */}
      <nav style={{background:'#fff',borderBottom:'1.5px solid #f0ebe8',position:'sticky',top:0,zIndex:100,boxShadow:'0 2px 8px rgba(60,30,10,.06)'}}>
        <div style={{maxWidth:1200,margin:'0 auto',padding:'0 40px',display:'flex',alignItems:'center',height:60}}>
          <div style={{fontWeight:900,fontSize:18,color:'#E8501A',marginRight:48,letterSpacing:-0.5}}>
            매칭픽
          </div>
          <div style={{display:'flex',gap:4,flex:1}}>
            {TABS.map(t=>(
              <button key={t.id} onClick={()=>setTab(t.id)}
                style={{padding:'8px 18px',borderRadius:8,fontSize:14,fontWeight:700,cursor:'pointer',border:'none',transition:'all .15s',
                  background:tab===t.id?'#FFF0EB':'transparent',
                  color:tab===t.id?'#E8501A':'#6B5C55',
                  borderBottom:tab===t.id?'2.5px solid #E8501A':'2.5px solid transparent'}}>
                {t.label}
              </button>
            ))}
          </div>
          <div style={{display:'flex',gap:10,alignItems:'center'}}>
            <div style={{width:34,height:34,borderRadius:'50%',background:'linear-gradient(135deg,#E8501A,#FFB347)',display:'flex',alignItems:'center',justifyContent:'center',color:'#fff',fontWeight:800,fontSize:15}}>김</div>
          </div>
        </div>
      </nav>

      {/* Content */}
      <main style={{flex:1,overflowX:'hidden'}}>
        {tab==='explore'&&<ExploreView onCampaignClick={c=>{setDrawerCampaign(c);}}/>}
        {tab==='apply'&&<ApplicantView showToast={showToast}/>}
        {tab==='register'&&<RegisterView showToast={showToast}/>}
        {tab==='mypage'&&<MypageView showToast={showToast}/>}
        {tab==='payment'&&<SettlementView showToast={showToast}/>}
      </main>

      {/* Campaign Drawer */}
      {drawerCampaign&&(
        <CampaignDrawer
          campaign={drawerCampaign}
          onClose={()=>setDrawerCampaign(null)}
          onApply={()=>{showToast('캠페인에 지원했습니다','success');setTimeout(()=>setDrawerCampaign(null),1500);}}
        />
      )}

      {/* Toast */}
      {toast&&<Toast msg={toast.msg} type={toast.type}/>}
    </div>
  );
}

const root=ReactDOM.createRoot(document.getElementById('root'));
root.render(<App/>);
</script>
</body>
</html>
