<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>인플루언서 매칭 관리자 시스템 — 구현 데모</title>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://unpkg.com/prop-types@15.8.1/prop-types.min.js"></script>
<script src="https://unpkg.com/react-is@18.2.0/umd/react-is.production.min.js"></script>
<script src="https://unpkg.com/recharts@2.10.3/umd/Recharts.js"></script>
<link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/regular/style.css">
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body,#root{width:100%;min-height:100vh}
body{font-family:'Pretendard',-apple-system,sans-serif;background:#F4F3FA;color:#1C1A2E;-webkit-font-smoothing:antialiased}

@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@keyframes pageEnter{from{opacity:0;transform:translateX(14px)}to{opacity:1;transform:translateX(0)}}
@keyframes toastIn{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
@keyframes countUp{from{opacity:0;transform:scale(.85)}to{opacity:1;transform:scale(1)}}
@keyframes barGrow{from{transform:scaleX(0)}to{transform:scaleX(1)}}

.anim-fade{animation:fadeIn .25s ease}
.anim-page{animation:pageEnter .3s ease}
.anim-card{animation:countUp .4s ease}

button{cursor:pointer;border:none;font-family:inherit}
.btn{border-radius:6px;font-size:13px;font-weight:600;padding:8px 16px;transition:all .15s}
.btn-primary{background:#3B2F8F;color:#fff}
.btn-primary:hover{background:#2E2470;box-shadow:0 3px 10px rgba(59,47,143,.3)}
.btn-secondary{background:#fff;color:#3B2F8F;border:1.5px solid #C8C3E8}
.btn-secondary:hover{background:#F0EEF9}
.btn-ghost{background:transparent;color:#5A576E;border:1.5px solid #D8D5E8}
.btn-ghost:hover{background:#EEEDF5}
.btn-danger{background:#C51A1A;color:#fff}
.btn-danger:hover{background:#A81515}
.btn-sm{padding:5px 12px;font-size:12px}
.btn-xs{padding:4px 10px;font-size:12px}

.badge{display:inline-flex;align-items:center;gap:4px;padding:3px 8px;border-radius:4px;font-size:12px;font-weight:600}
.badge-active{background:#EAF5F0;color:#16734A}
.badge-pending{background:#FFF8E6;color:#A06500}
.badge-blocked{background:#FDEAEA;color:#C51A1A}
.badge-advertiser{background:#EAF0FB;color:#2553A0}
.badge-influencer{background:#F3EEFF;color:#5533A0}
.badge-campaign-active{background:#EAF5F0;color:#16734A}
.badge-campaign-review{background:#EAF0FB;color:#2553A0}
.badge-campaign-done{background:#F0F0F0;color:#5A576E}
.badge-campaign-stopped{background:#FDEAEA;color:#C51A1A}

.card{background:#fff;border-radius:8px;box-shadow:0 1px 4px rgba(30,20,80,.07),0 4px 16px rgba(30,20,80,.05)}

input,select,textarea{font-family:inherit;font-size:13px;border:1.5px solid #D8D5E8;border-radius:6px;padding:8px 12px;width:100%;background:#fff;color:#1C1A2E;outline:none;transition:border-color .15s}
input:focus,select:focus,textarea:focus{border-color:#5B4EC7;box-shadow:0 0 0 3px rgba(91,78,199,.1)}
label{display:block;font-size:12px;font-weight:600;color:#5A576E;margin-bottom:5px}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useRef}=React;
const {BarChart,Bar,LineChart,Line,AreaChart,Area,XAxis,YAxis,CartesianGrid,Tooltip,Legend,ResponsiveContainer,PieChart,Pie,Cell}=Recharts;

const WEEKLY=[
  {week:'5/1주',ad:24,inf:38,fee:2850000},

  {week:'5/4주',ad:36,inf:61,fee:4320000},

  {month:'2월',revenue:19800000,fee:3960000},
  {month:'3월',revenue:25600000,fee:5120000},
  {month:'4월',revenue:31200000,fee:6240000},
  {month:'5월',revenue:28700000,fee:5740000},

const MEMBERS=[
  {id:1,name:'김철수',email:'chulsoo@company.kr',role:'advertiser',region:'서울',campaigns:8,joinedAt:'2025.12.10',status:'active',memo:'전자기기 브랜드 운영'},
  {id:2,name:'이수연',email:'suyeon@blog.kr',role:'influencer',region:'서울',campaigns:14,joinedAt:'2025.11.22',status:'active',memo:'뷰티/맛집 블로거 팔로워 1.2만'},
  {id:3,name:'박준호',email:'junho@studio.kr',role:'advertiser',region:'경기',campaigns:3,joinedAt:'2026.01.05',status:'active',memo:'식품 제조사 마케팅팀'},
  {id:4,name:'최민서',email:'minseo.kr@gmail.com',role:'influencer',region:'서울',campaigns:22,joinedAt:'2025.09.14',status:'active',memo:'인스타그램 팔로워 4.5만'},
  {id:5,name:'정도윤',email:'doyoon@cafe.kr',role:'advertiser',region:'부산',campaigns:1,joinedAt:'2026.02.18',status:'blocked',memo:'허위 광고 정책 위반'},
  {id:6,name:'윤서아',email:'seoa_blog@naver.com',role:'influencer',region:'대전',campaigns:5,joinedAt:'2026.01.30',status:'active',memo:'여행/라이프스타일 블로거'},
  {id:7,name:'강민준',email:'minjun@foods.kr',role:'advertiser',region:'서울',campaigns:12,joinedAt:'2025.10.07',status:'active',memo:'프랜차이즈 카페 본사'},
  {id:8,name:'한지수',email:'jisu_insta@naver.com',role:'influencer',region:'서울',campaigns:31,joinedAt:'2025.08.20',status:'active',memo:'뷰티 인플루언서 구독자 2.8만'},
];
const CAMPAIGNS_DATA=[
  {id:101,title:'강남 브런치 카페 신메뉴 체험단',advertiser:'로제타 커피',media:'블로그',region:'서울',slots:5,applied:18,selected:4,reviewed:2,status:'review',createdAt:'2026.05.01',deadline:'2026.06.10',reward:250000},
  {id:102,title:'홍대 오마카세 코스 체험',advertiser:'오이시 다이닝',media:'인스타그램',region:'서울',slots:3,applied:24,selected:3,reviewed:1,status:'active',createdAt:'2026.04.28',deadline:'2026.06.05',reward:240000},
  {id:103,title:'경기도 스파 리조트 1박 체험단',advertiser:'힐링 리조트',media:'블로그',region:'경기',slots:2,applied:41,selected:2,reviewed:0,status:'active',createdAt:'2026.05.05',deadline:'2026.06.20',reward:240000},
  {id:104,title:'신제품 스킨케어 리뷰 체험단',advertiser:'루미에르 스킨',media:'유튜브',region:'전국',slots:8,applied:35,selected:7,reviewed:7,status:'done',createdAt:'2026.04.15',deadline:'2026.05.31',reward:480000},
  {id:105,title:'부산 루프탑 카페 음료 체험',advertiser:'스카이뷰 부산',media:'인스타그램',region:'부산',slots:10,applied:12,selected:0,reviewed:0,status:'stopped',createdAt:'2026.05.10',deadline:'2026.06.25',reward:0},
  {id:106,title:'대구 헬스클럽 이용권 체험단',advertiser:'파워짐 대구',media:'블로그',region:'대구',slots:4,applied:7,selected:3,reviewed:1,status:'review',createdAt:'2026.05.03',deadline:'2026.07.01',reward:0},
];
const SETTLEMENTS=[
  {id:1,influencer:'이수연',campaign:'신제품 스킨케어 리뷰 체험단',reward:60000,fee:12000,net:48000,requestedAt:'2026.06.02',status:'pending'},
  {id:2,influencer:'최민서',campaign:'신제품 스킨케어 리뷰 체험단',reward:60000,fee:12000,net:48000,requestedAt:'2026.06.02',status:'pending'},
  {id:3,influencer:'한지수',campaign:'신제품 스킨케어 리뷰 체험단',reward:60000,fee:12000,net:48000,requestedAt:'2026.06.03',status:'approved'},
  {id:4,influencer:'윤서아',campaign:'강남 브런치 카페 신메뉴',reward:50000,fee:10000,net:40000,requestedAt:'2026.06.05',status:'pending'},
];

const CAMP_STATUS_LABEL={active:'모집중',review:'리뷰중',done:'정산완료',stopped:'강제중단'};
const CAMP_STATUS_BADGE={active:'badge-campaign-active',review:'badge-campaign-review',done:'badge-campaign-done',stopped:'badge-campaign-stopped'};

function Toast({msg,type}){
  const bg=type==='success'?'#16734A':type==='error'?'#C51A1A':'#A06500';
  return<div style={{position:'fixed',bottom:28,right:28,zIndex:9999,background:bg,color:'#fff',borderRadius:6,padding:'11px 18px',boxShadow:'0 4px 16px rgba(0,0,0,.2)',animation:'toastIn .3s ease',fontWeight:600,fontSize:13}}>{msg}</div>;
}

function KpiCard({label,value,sub,icon,accent}){
  return(
    <div className="card anim-card" style={{padding:20,display:'flex',flexDirection:'column',gap:12}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
        <span style={{fontSize:13,color:'#5A576E',fontWeight:600}}>{label}</span>
        <div style={{width:36,height:36,borderRadius:8,background:accent+'22',display:'flex',alignItems:'center',justifyContent:'center',fontSize:18,color:accent}}>
          <i className={`ph ${icon}`}/>
        </div>
      </div>
      <div style={{fontSize:26,fontWeight:900,color:'#1C1A2E',letterSpacing:-1}}>{value}</div>
      {sub&&<div style={{fontSize:12,color:'#5A576E'}}>{sub}</div>}
    </div>
  );
}

function DashboardView(){
  const totalFee=MONTHLY.reduce((s,m)=>s+m.fee,0);
  const pendingCount=SETTLEMENTS.filter(s=>s.status==='pending').length;
  return(
    <div style={{padding:28}} className="anim-page">
      <div style={{marginBottom:24}}>
        <h1 style={{fontSize:20,fontWeight:900,marginBottom:4}}>관리자 대시보드</h1>
        <p style={{fontSize:13,color:'#5A576E'}}>2026년 5월 기준 플랫폼 전체 현황</p>
      </div>

      {/* KPI Grid */}
      <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:16,marginBottom:28}}>
        <KpiCard label="총 가입 회원" value="4,821명" sub="이번 달 +119명" icon="ph-users" accent="#3B2F8F"/>
        <KpiCard label="활성 캠페인" value={`${CAMPAIGNS_DATA.filter(c=>c.status==='active'||c.status==='review').length}건`} sub="리뷰 중 2건 포함" icon="ph-megaphone" accent="#16734A"/>
        <KpiCard label="누적 수수료 수익" value={`${Math.round(totalFee/10000)}만원`} sub="6개월 누계" icon="ph-currency-krw" accent="#5B4EC7"/>
        <KpiCard label="출금 신청 대기" value={`${pendingCount}건`} sub={`${SETTLEMENTS.filter(s=>s.status==='pending').reduce((s,i)=>s+i.net,0).toLocaleString()}원 대기 중`} icon="ph-clock" accent="#A06500"/>
      </div>

      {/* Charts */}
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:20,marginBottom:28}}>
        <div className="card" style={{padding:20}}>
          <div style={{fontWeight:700,fontSize:14,marginBottom:16}}>주간 신규 가입 추이</div>
          <div style={{height:200,position:'relative'}}>
            <ResponsiveContainer width="100%" height="100%">
              <BarChart data={WEEKLY}>
                <CartesianGrid strokeDasharray="3 3" stroke="#EEEDF5"/>
                <XAxis dataKey="week" tick={{fontSize:11,fill:'#5A576E'}} axisLine={false} tickLine={false}/>
                <YAxis tick={{fontSize:11,fill:'#5A576E'}} axisLine={false} tickLine={false}/>
                <Tooltip contentStyle={{borderRadius:6,fontSize:12,border:'1px solid #D8D5E8'}}/>
                <Legend wrapperStyle={{fontSize:12}}/>
                <Bar dataKey="ad" name="광고주" fill="#5B4EC7" radius={[4,4,0,0]}/>
                <Bar dataKey="inf" name="인플루언서" fill="#7C6FE0" radius={[4,4,0,0]}/>
              </BarChart>
            </ResponsiveContainer>
          </div>
        </div>
        <div className="card" style={{padding:20}}>
          <div style={{fontWeight:700,fontSize:14,marginBottom:16}}>월별 수수료 수익 추이</div>
          <div style={{height:200,position:'relative'}}>
            <ResponsiveContainer width="100%" height="100%">
              <AreaChart data={MONTHLY}>
                <defs>
                  <linearGradient id="feeGrad" x1="0" y1="0" x2="0" y2="1">
                    <stop offset="5%" stopColor="#5B4EC7" stopOpacity={0.2}/>
                    <stop offset="95%" stopColor="#5B4EC7" stopOpacity={0}/>
                  </linearGradient>
                </defs>
                <CartesianGrid strokeDasharray="3 3" stroke="#EEEDF5"/>
                <XAxis dataKey="month" tick={{fontSize:11,fill:'#5A576E'}} axisLine={false} tickLine={false}/>
                <YAxis tickFormatter={v=>Math.round(v/10000)+'만'} tick={{fontSize:11,fill:'#5A576E'}} axisLine={false} tickLine={false}/>
                <Tooltip formatter={v=>[v.toLocaleString()+'원','수수료']} contentStyle={{borderRadius:6,fontSize:12,border:'1px solid #D8D5E8'}}/>
                <Area type="monotone" dataKey="fee" stroke="#5B4EC7" strokeWidth={2} fill="url(#feeGrad)"/>
              </AreaChart>
            </ResponsiveContainer>
          </div>
        </div>
      </div>

      {/* Recent Activity */}
      <div className="card" style={{padding:20}}>
        <div style={{fontWeight:700,fontSize:14,marginBottom:16}}>최근 캠페인 현황</div>
        <table style={{width:'100%',borderCollapse:'collapse',fontSize:13}}>
          <thead>
            <tr style={{borderBottom:'2px solid #F4F3FA'}}>
              {['캠페인명','광고주','지원','선정','리뷰','상태'].map(h=>(
                <th key={h} style={{textAlign:'left',padding:'8px 12px',color:'#5A576E',fontWeight:600,fontSize:12}}>{h}</th>
              ))}
            </tr>
          </thead>
          <tbody>
            {CAMPAIGNS_DATA.slice(0,4).map(c=>(
              <tr key={c.id} style={{borderBottom:'1px solid #F4F3FA'}}>
                <td style={{padding:'10px 12px',fontWeight:600,maxWidth:200}}><div style={{overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{c.title}</div></td>
                <td style={{padding:'10px 12px',color:'#5A576E'}}>{c.advertiser}</td>

                <td style={{padding:'10px 12px'}}>{c.selected}명</td>

                <td style={{padding:'10px 12px'}}><span className={`badge ${CAMP_STATUS_BADGE[c.status]}`}>{CAMP_STATUS_LABEL[c.status]}</span></td>

    </div>

}

function MembersView({showToast}){
  const [members,setMembers]=useState(MEMBERS);
  const [filter,setFilter]=useState({role:'전체',status:'전체',keyword:''});
  const [detail,setDetail]=useState(null);
  const [blockModal,setBlockModal]=useState(false);
  const [blockTarget,setBlockTarget]=useState(null);
  const [blockReason,setBlockReason]=useState('');

  const filtered=members.filter(m=>
    (filter.role==='전체'||m.role===(filter.role==='광고주'?'advertiser':'influencer'))&&
    (filter.status==='전체'||(filter.status==='활성'&&m.status==='active')||(filter.status==='차단'&&m.status==='blocked'))&&
    (!filter.keyword||m.name.includes(filter.keyword)||m.email.includes(filter.keyword))
  );

  const handleBlock=()=>{
    if(!blockReason){showToast('차단 사유를 입력해주세요','error');return;}
    setMembers(prev=>prev.map(m=>m.id===blockTarget.id?{...m,status:'blocked'}:m));
    if(detail&&detail.id===blockTarget.id)setDetail(d=>({...d,status:'blocked'}));
    setBlockModal(false);setBlockReason('');
    showToast(`${blockTarget.name}님을 차단했습니다`,'success');
  };

  const handleUnblock=(m)=>{
    setMembers(prev=>prev.map(x=>x.id===m.id?{...x,status:'active'}:x));
    if(detail&&detail.id===m.id)setDetail(d=>({...d,status:'active'}));
    showToast(`${m.name}님의 차단을 해제했습니다`,'success');
  };

  return(
    <div style={{padding:28}} className="anim-page">
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:20}}>
        <div>
          <h1 style={{fontSize:20,fontWeight:900,marginBottom:4}}>회원 통합 관리</h1>
          <p style={{fontSize:13,color:'#5A576E'}}>총 {members.length}명 · 활성 {members.filter(m=>m.status==='active').length}명 · 차단 {members.filter(m=>m.status==='blocked').length}명</p>
        </div>
      </div>

      {/* Filters */}
      <div style={{display:'flex',gap:10,marginBottom:16,flexWrap:'wrap',alignItems:'center'}}>
        <input value={filter.keyword} onChange={e=>setFilter(f=>({...f,keyword:e.target.value}))} placeholder="이름 또는 이메일 검색" style={{width:220}}/>
        <select value={filter.role} onChange={e=>setFilter(f=>({...f,role:e.target.value}))} style={{width:'auto',padding:'8px 12px'}}>
          {['전체','광고주','인플루언서'].map(r=><option key={r}>{r}</option>)}
        </select>
        <select value={filter.status} onChange={e=>setFilter(f=>({...f,status:e.target.value}))} style={{width:'auto',padding:'8px 12px'}}>
          {['전체','활성','차단'].map(s=><option key={s}>{s}</option>)}
        </select>
        <div style={{marginLeft:'auto',fontSize:13,color:'#5A576E'}}>총 <b style={{color:'#3B2F8F'}}>{filtered.length}</b>명</div>
      </div>

      <div style={{display:'flex',gap:20}}>
        {/* List */}
        <div style={{flex:1}}>
          <div className="card" style={{overflow:'hidden'}}>
            <table style={{width:'100%',borderCollapse:'collapse',fontSize:13}}>
              <thead>
                <tr style={{background:'#F8F7FC',borderBottom:'1.5px solid #EEEDF5'}}>
                  {['회원명','이메일','구분','지역','참여 캠페인','가입일','상태','관리'].map(h=>(
                    <th key={h} style={{textAlign:'left',padding:'10px 14px',color:'#5A576E',fontWeight:600,fontSize:12,whiteSpace:'nowrap'}}>{h}</th>
                  ))}
                </tr>
              </thead>
              <tbody>
                {filtered.map((m,i)=>(
                  <tr key={m.id} style={{borderBottom:'1px solid #F4F3FA',cursor:'pointer',background:detail?.id===m.id?'#F8F7FC':'#fff',transition:'background .1s'}}
                    onMouseEnter={e=>e.currentTarget.style.background='#F8F7FC'}
                    onMouseLeave={e=>e.currentTarget.style.background=detail?.id===m.id?'#F8F7FC':'#fff'}
                    onClick={()=>setDetail(m)}>
                    <td style={{padding:'10px 14px',fontWeight:700}}>{m.name}</td>
                    <td style={{padding:'10px 14px',color:'#5A576E',fontSize:12}}>{m.email}</td>
                    <td style={{padding:'10px 14px'}}><span className={`badge ${m.role==='advertiser'?'badge-advertiser':'badge-influencer'}`}>{m.role==='advertiser'?'광고주':'인플루언서'}</span></td>
                    <td style={{padding:'10px 14px',color:'#5A576E'}}>{m.region}</td>
                    <td style={{padding:'10px 14px',textAlign:'center'}}>{m.campaigns}건</td>
                    <td style={{padding:'10px 14px',color:'#5A576E',fontSize:12}}>{m.joinedAt}</td>
                    <td style={{padding:'10px 14px'}}><span className={`badge ${m.status==='active'?'badge-active':'badge-blocked'}`}>{m.status==='active'?'활성':'차단'}</span></td>
                    <td style={{padding:'10px 14px'}} onClick={e=>e.stopPropagation()}>
                      {m.status==='active'?(
                        <button className="btn btn-danger btn-xs" onClick={()=>{setBlockTarget(m);setBlockModal(true);}}>차단</button>

function CampaignsView({showToast}){
  const [campaigns,setCampaigns]=useState(CAMPAIGNS_DATA);

    setCampaigns(prev=>prev.map(c=>c.id===stopTarget.id?{...c,status:'stopped'}:c));

function RevenueView({showToast}){
  const [period,setPeriod]=useState('6개월');
  const [settlements,setSettlements]=useState(SETTLEMENTS);
  const [approveTarget,setApproveTarget]=useState(null);

  const data=period==='1개월'?MONTHLY.slice(-1):period==='3개월'?MONTHLY.slice(-3):MONTHLY;
  const totalFee=data.reduce((s,m)=>s+m.fee,0);
  const totalRev=data.reduce((s,m)=>s+m.revenue,0);

  const handleApprove=(item)=>{
    setSettlements(prev=>prev.map(s=>s.id===item.id?{...s,status:'approved'}:s));
    setApproveTarget(null);
    showToast(`${item.influencer}님의 정산을 승인했습니다`,'success');
  };

  return(
    <div style={{padding:28}} className="anim-page">
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:20}}>
        <div>
          <h1 style={{fontSize:20,fontWeight:900,marginBottom:4}}>수익·정산 분석</h1>
          <p style={{fontSize:13,color:'#5A576E'}}>플랫폼 수수료 수익 및 출금 신청 관리</p>
        </div>
        <div style={{display:'flex',gap:8}}>
          {['1개월','3개월','6개월'].map(p=>(
            <button key={p} onClick={()=>setPeriod(p)} className="btn btn-sm"
              style={{background:period===p?'#3B2F8F':'#fff',color:period===p?'#fff':'#5A576E',border:'1.5px solid',borderColor:period===p?'#3B2F8F':'#D8D5E8'}}>
              {p}
            </button>
          ))}
        </div>
      </div>

      {/* Summary */}
      <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:16,marginBottom:24}}>
        {[['총 결제액',`${Math.round(totalRev/10000)}만원`,`${period} 누계`],['수수료 수익',`${Math.round(totalFee/10000)}만원`,`평균 수수료율 20%`],['출금 대기',`${settlements.filter(s=>s.status==='pending').reduce((s,i)=>s+i.net,0).toLocaleString()}원`,`${settlements.filter(s=>s.status==='pending').length}건 처리 대기`]].map(([k,v,s])=>(
          <div key={k} className="card" style={{padding:20}}>
            <div style={{fontSize:12,color:'#5A576E',fontWeight:600,marginBottom:8}}>{k}</div>
            <div style={{fontSize:24,fontWeight:900,color:'#3B2F8F',marginBottom:4}}>{v}</div>
            <div style={{fontSize:12,color:'#5A576E'}}>{s}</div>
          </div>
        ))}
      </div>

      {/* Revenue Chart */}
      <div className="card" style={{padding:20,marginBottom:24}}>
        <div style={{fontWeight:700,fontSize:14,marginBottom:16}}>월별 결제액 및 수수료 추이</div>
        <div style={{height:220,position:'relative'}}>
          <ResponsiveContainer width="100%" height="100%">
            <BarChart data={data}>
              <CartesianGrid strokeDasharray="3 3" stroke="#EEEDF5"/>
              <XAxis dataKey="month" tick={{fontSize:11,fill:'#5A576E'}} axisLine={false} tickLine={false}/>
              <YAxis tickFormatter={v=>Math.round(v/10000)+'만'} tick={{fontSize:11,fill:'#5A576E'}} axisLine={false} tickLine={false}/>
              <Tooltip formatter={v=>[v.toLocaleString()+'원']} contentStyle={{borderRadius:6,fontSize:12,border:'1px solid #D8D5E8'}}/>
              <Legend wrapperStyle={{fontSize:12}}/>
              <Bar dataKey="revenue" name="총 결제액" fill="#C8C3E8" radius={[4,4,0,0]}/>
              <Bar dataKey="fee" name="수수료 수익" fill="#3B2F8F" radius={[4,4,0,0]}/>
            </BarChart>
          </ResponsiveContainer>
        </div>
      </div>

      {/* Settlement List */}
      <div className="card" style={{padding:20}}>
        <div style={{fontWeight:700,fontSize:14,marginBottom:16}}>출금 신청 목록</div>
        <table style={{width:'100%',borderCollapse:'collapse',fontSize:13}}>
          <thead>
            <tr style={{background:'#F8F7FC',borderBottom:'1.5px solid #EEEDF5'}}>
              {['인플루언서','캠페인','리워드','수수료(20%)','실수령액','신청일','상태','처리'].map(h=>(
                <th key={h} style={{textAlign:'left',padding:'10px 14px',color:'#5A576E',fontWeight:600,fontSize:12,whiteSpace:'nowrap'}}>{h}</th>
              ))}
            </tr>
          </thead>
          <tbody>
            {settlements.map(s=>(
              <tr key={s.id} style={{borderBottom:'1px solid #F4F3FA'}}>
                <td style={{padding:'10px 14px',fontWeight:700}}>{s.influencer}</td>
                <td style={{padding:'10px 14px',color:'#5A576E',maxWidth:180}}><div style={{overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{s.campaign}</div></td>
                <td style={{padding:'10px 14px'}}>{s.reward.toLocaleString()}원</td>
                <td style={{padding:'10px 14px',color:'#C51A1A'}}>-{s.fee.toLocaleString()}원</td>
                <td style={{padding:'10px 14px',fontWeight:700,color:'#3B2F8F'}}>{s.net.toLocaleString()}원</td>
                <td style={{padding:'10px 14px',color:'#5A576E',fontSize:12}}>{s.requestedAt}</td>
                <td style={{padding:'10px 14px'}}>
                  <span className={`badge ${s.status==='pending'?'badge-pending':'badge-active'}`}>
                    {s.status==='pending'?'승인 대기':'승인 완료'}
                  </span>
                </td>
                <td style={{padding:'10px 14px'}}>
                  {s.status==='pending'&&(
                    <button className="btn btn-primary btn-xs" onClick={()=>setApproveTarget(s)}>승인</button>
                  )}
                </td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>

      {approveTarget&&(
        <div style={{position:'fixed',inset:0,zIndex:1000,display:'flex',alignItems:'center',justifyContent:'center',background:'rgba(0,0,0,.4)'}} className="anim-fade">
          <div className="card" style={{padding:24,width:360,animation:'slideUp .3s ease'}}>
            <div style={{fontWeight:800,fontSize:16,marginBottom:6}}>출금 승인</div>
            <div style={{fontSize:13,color:'#5A576E',marginBottom:16}}>
              {approveTarget.influencer}님의 출금 신청을 승인합니다.
            </div>
            <div style={{background:'#F8F7FC',borderRadius:6,padding:'14px',marginBottom:20}}>
              <div style={{display:'flex',justifyContent:'space-between',marginBottom:6,fontSize:13}}><span style={{color:'#5A576E'}}>리워드</span><span style={{fontWeight:600}}>{approveTarget.reward.toLocaleString()}원</span></div>
              <div style={{display:'flex',justifyContent:'space-between',marginBottom:6,fontSize:13}}><span style={{color:'#5A576E'}}>수수료</span><span style={{color:'#C51A1A',fontWeight:600}}>-{approveTarget.fee.toLocaleString()}원</span></div>
              <div style={{display:'flex',justifyContent:'space-between',fontSize:15,fontWeight:800,borderTop:'1px solid #EEEDF5',paddingTop:8}}>
                <span>실수령액</span><span style={{color:'#3B2F8F'}}>{approveTarget.net.toLocaleString()}원</span>
              </div>
            </div>
            <div style={{display:'flex',gap:10}}>
              <button className="btn btn-ghost" style={{flex:1}} onClick={()=>setApproveTarget(null)}>취소</button>
              <button className="btn btn-primary" style={{flex:1}} onClick={()=>handleApprove(approveTarget)}>승인 확정</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

                <YAxis domain={[60,90]} tickFormatter={v=>v+'%'} tick={{fontSize:11,fill:'#5A576E'}} axisLine={false} tickLine={false}/>
                <Tooltip formatter={v=>[v+'%','완료율']} contentStyle={{borderRadius:6,fontSize:12,border:'1px solid #D8D5E8'}}/>
                <Line type="monotone" dataKey="rate" stroke="#3B2F8F" strokeWidth={2.5} dot={{fill:'#3B2F8F',r:4}} activeDot={{r:6}}/>
              </LineChart>
            </ResponsiveContainer>
          </div>
        </div>
      </div>
    </div>
  );
}

function App(){
  const [page,setPage]=useState('dashboard');
  const [toast,setToast]=useState(null);

  const showToast=(msg,type='success')=>{
    setToast({msg,type});
    setTimeout(()=>setToast(null),3000);
  };

  const NAV=[
    {id:'dashboard',label:'대시보드',icon:'ph-squares-four'},
    {id:'members',label:'회원 관리',icon:'ph-users'},
    {id:'campaigns',label:'캠페인 모니터링',icon:'ph-megaphone'},
    {id:'revenue',label:'수익·정산',icon:'ph-currency-krw'},
    {id:'analytics',label:'성과 분석',icon:'ph-chart-bar'},
  ];

  return(
    <div style={{width:'100%',minHeight:'100vh',display:'flex',flexDirection:'column'}}>
      {/* Global Nav */}
      <header style={{background:'#231C6B',position:'sticky',top:0,zIndex:100,boxShadow:'0 2px 12px rgba(20,14,80,.25)'}}>
        <div style={{maxWidth:1280,margin:'0 auto',padding:'0 32px',display:'flex',alignItems:'center',height:56}}>
          <div style={{display:'flex',alignItems:'center',gap:10,marginRight:40}}>
            <div style={{width:28,height:28,background:'linear-gradient(135deg,#7C6FE0,#5B4EC7)',borderRadius:6,display:'flex',alignItems:'center',justifyContent:'center'}}>
              <i className="ph ph-squares-four" style={{color:'#fff',fontSize:16}}/>
            </div>
            <span style={{fontWeight:900,fontSize:16,color:'#fff',letterSpacing:-0.3}}>매칭픽 어드민</span>
          </div>
          <nav style={{display:'flex',gap:2,flex:1}}>
            {NAV.map(n=>(
              <button key={n.id} onClick={()=>setPage(n.id)}
                style={{display:'flex',alignItems:'center',gap:7,padding:'8px 16px',borderRadius:6,fontSize:13,fontWeight:600,cursor:'pointer',border:'none',transition:'all .15s',
                  background:page===n.id?'rgba(255,255,255,.15)':'transparent',
                  color:page===n.id?'#fff':'rgba(255,255,255,.6)'}}>
                <i className={n.icon} style={{fontSize:15}}/>
                {n.label}
              </button>
            ))}
          </nav>
          <div style={{display:'flex',alignItems:'center',gap:10}}>
            <div style={{width:32,height:32,borderRadius:6,background:'rgba(255,255,255,.15)',display:'flex',alignItems:'center',justifyContent:'center',color:'rgba(255,255,255,.8)',fontSize:14,fontWeight:800,cursor:'pointer'}}>관</div>
            <div>
              <div style={{color:'#fff',fontSize:13,fontWeight:700}}>관리자</div>
              <div style={{color:'rgba(255,255,255,.5)',fontSize:11}}>superadmin</div>
            </div>
          </div>
        </div>
      </header>

      {/* Main */}
      <main style={{flex:1,maxWidth:1280,width:'100%',margin:'0 auto',padding:'0 32px',boxSizing:'border-box'}}>
        {page==='dashboard'&&<DashboardView/>}
        {page==='members'&&<MembersView showToast={showToast}/>}
        {page==='campaigns'&&<CampaignsView showToast={showToast}/>}
        {page==='revenue'&&<RevenueView showToast={showToast}/>}
        {page==='analytics'&&<AnalyticsView/>}
      </main>

      {/* Footer */}
      <footer style={{background:'#1C1632',color:'rgba(255,255,255,.4)',textAlign:'center',padding:'16px 32px',fontSize:12,marginTop:32}}>
        <div style={{maxWidth:1280,margin:'0 auto',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
          <span style={{fontWeight:700,color:'rgba(255,255,255,.6)'}}>매칭픽 관리자 시스템</span>
          <span>플랫폼 운영자 전용 관리 도구 · v1.0.0</span>
        </div>
      </footer>

      {toast&&<Toast msg={toast.msg} type={toast.type}/>}
    </div>
  );
}

const root=ReactDOM.createRoot(document.getElementById('root'));
root.render(<App/>);
</script>
</body>
</html>
