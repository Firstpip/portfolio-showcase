/* ── 아이콘 헬퍼 ── */
function Icon({ name, size = 16, color = 'currentColor', style = {} }) {
  const ref = useRef(null);
  useEffect(() => {
    if (ref.current && window.lucide) {
      ref.current.innerHTML = '';
      const el = document.createElement('i');
      el.setAttribute('data-lucide', name);
      el.style.width = size + 'px';
      el.style.height = size + 'px';
      ref.current.appendChild(el);
      window.lucide.createIcons({ icons: window.lucide.icons, nameAttr: 'data-lucide', attrs: { width: size, height: size, stroke: color } });
    }
  }, [name, size, color]);
  return <span ref={ref} style={{ display: 'inline-flex', alignItems: 'center', ...style }} />;
}

/* ── 배지 ── */
function Badge({ status, label }) {
  const map = {
    danger: { bg: '#FEE2E2', color: '#991B1B', text: label || '위험' },
    warn:   { bg: '#FEF3C7', color: '#92400E', text: label || '주의' },
    ok:     { bg: '#D1FAE5', color: '#065F46', text: label || '정상' },
    fail:   { bg: '#FEE2E2', color: '#991B1B', text: label || '실패' },
    pending:{ bg: '#E0E7FF', color: '#3730A3', text: label || '예정' },
    error:  { bg: '#FEE2E2', color: '#991B1B', text: label || '오류' },
  };
  const m = map[status] || map.ok;
  return (
    <span style={{ background: m.bg, color: m.color, fontSize: 11, fontWeight: 600, padding: '2px 8px', borderRadius: 4, letterSpacing: '0.02em' }}>
      {m.text}
    </span>
  );
}

/* ── 토스트 ── */
function Toast({ msg, onClose }) {
  useEffect(() => { const t = setTimeout(onClose, 2800); return () => clearTimeout(t); }, []);
  return (
    <div style={{
      position: 'fixed', bottom: 24, right: 24, zIndex: 9999,
      background: C.primary, color: '#fff', padding: '12px 20px',
      borderRadius: 6, fontSize: 13, fontWeight: 500,
      boxShadow: '0 4px 16px rgba(26,77,60,0.35)',
      animation: 'toastSlideIn 0.25s ease',
      display: 'flex', alignItems: 'center', gap: 8,
    }}>
      <Icon name="check-circle" size={15} color="#4CAF82" />
      {msg}
    </div>
  );
}

}

/* ── 공급처 조회 화면 ── */
function SupplierScreen({ onToast }) {
  const [crawling, setCrawling] = useState(false);
  const [crawlDone, setCrawlDone] = useState(false);
  const [progress, setProgress] = useState(0);
  const [selectedSupplier, setSelectedSupplier] = useState(null);
  const [compareModal, setCompareModal] = useState(null);

  function startCrawl() {
    setCrawling(true); setCrawlDone(false); setProgress(0);
    let p = 0;
    const t = setInterval(() => {
      p += Math.floor(Math.random() * 15) + 5;
      if (p >= 100) { p = 100; clearInterval(t); setCrawling(false); setCrawlDone(true); onToast('공급처 조회가 완료됐습니다'); }
      setProgress(p);
    }, 400);
  }

  return (
    <div className="fade-in">
      <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 14, marginBottom: 14 }}>
        {/* 공급처 목록 */}
        <div style={{ background: C.surface, border: `1px solid ${C.border}`, borderRadius: 6 }}>
          <div style={{ padding: '12px 16px', borderBottom: `1px solid ${C.border}`, display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
            <span style={{ fontWeight: 600, fontSize: 13 }}>등록 공급처 (5/25)</span>
            <button onClick={startCrawl} disabled={crawling}
              style={{ background: crawling ? C.border : C.primary, color: crawling ? C.textSub : '#fff', border: 'none', borderRadius: 5, padding: '6px 14px', fontSize: 11, fontWeight: 600, cursor: crawling ? 'not-allowed' : 'pointer' }}>
              {crawling ? '조회 중...' : '전체 조회 시작'}
            </button>
          </div>
          {crawling && (
            <div style={{ padding: '10px 16px', borderBottom: `1px solid ${C.border}` }}>
              <div style={{ display: 'flex', justifyContent: 'space-between', fontSize: 11, color: C.textSub, marginBottom: 5 }}>
                <span>조회 진행률</span><span>{progress}%</span>
              </div>
              <div style={{ height: 5, background: C.border, borderRadius: 10, overflow: 'hidden' }}>
                <div style={{ height: '100%', width: progress + '%', background: C.accent, borderRadius: 10, transition: 'width 0.3s' }} />
              </div>
            </div>
          )}
          {SUPPLIERS.map(s => (
            <div key={s.id} onClick={() => setSelectedSupplier(s === selectedSupplier ? null : s)}
              style={{ padding: '12px 16px', borderBottom: `1px solid ${C.border}`, cursor: 'pointer', background: selectedSupplier?.id === s.id ? C.accentLight : 'transparent', transition: 'background 0.15s' }}
              onMouseEnter={e => { if (selectedSupplier?.id !== s.id) e.currentTarget.style.background = '#F9FBF9'; }}
              onMouseLeave={e => { if (selectedSupplier?.id !== s.id) e.currentTarget.style.background = 'transparent'; }}>
              <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
                <div>
                  <div style={{ fontWeight: 600, fontSize: 13 }}>{s.name}</div>
                  <div style={{ fontSize: 11, color: C.textSub, marginTop: 2 }}>{s.url} · 품목 {s.products}개</div>
                </div>
                <div style={{ textAlign: 'right' }}>
                  <Badge status={s.status} label={s.status === 'fail' ? '실패' : s.status === 'warn' ? '주의' : '정상'} />
                  <div style={{ fontSize: 11, color: C.textSub, marginTop: 3 }}>성공률 {s.successRate}%</div>
                </div>
              </div>
            </div>
          ))}
        </div>

        {/* 공급처 상세 or 안내 */}
        <div>
          {selectedSupplier ? (
            <div className="slide-in" style={{ background: C.surface, border: `1px solid ${C.border}`, borderRadius: 6, padding: 16 }}>
              <div style={{ fontWeight: 600, fontSize: 14, marginBottom: 14 }}>{selectedSupplier.name} 상세</div>
              <div style={{ display: 'grid', gap: 8, marginBottom: 14 }}>
                {[
                  ['URL', selectedSupplier.url],
                  ['등록 품목 수', selectedSupplier.products + '개'],
                  ['조회 성공률', selectedSupplier.successRate + '%'],
                  ['마지막 동기화', selectedSupplier.lastSync],
                ].map(([k, v]) => (
                  <div key={k} style={{ display: 'flex', justifyContent: 'space-between', fontSize: 12, padding: '8px 12px', background: C.bg, borderRadius: 5 }}>
                    <span style={{ color: C.textSub }}>{k}</span>
                    <span style={{ fontWeight: 600 }}>{v}</span>
                  </div>
                ))}
              </div>
              <div style={{ display: 'flex', gap: 8 }}>
                <button onClick={() => { onToast(selectedSupplier.name + ' 재연결 중...'); }}
                  style={{ flex: 1, background: C.primary, color: '#fff', border: 'none', borderRadius: 5, padding: '8px 0', fontSize: 12, fontWeight: 600, cursor: 'pointer' }}>
                  재연결
                </button>
                <button onClick={() => { setSelectedSupplier(null); onToast('공급처 설정으로 이동합니다'); }}
                  style={{ flex: 1, background: '#F0F0F0', color: C.textMain, border: 'none', borderRadius: 5, padding: '8px 0', fontSize: 12, cursor: 'pointer' }}>
                  설정 편집
                </button>
              </div>
            </div>
          ) : (
            <div style={{ background: C.surface, border: `1px solid ${C.border}`, borderRadius: 6, padding: 20, textAlign: 'center', color: C.textSub }}>
              <Icon name="store" size={32} color={C.border} />
              <div style={{ marginTop: 10, fontSize: 12 }}>공급처를 선택하면 상세 정보를 확인합니다</div>
            </div>
          )}

          {/* 가격 비교 */}
          <div style={{ background: C.surface, border: `1px solid ${C.border}`, borderRadius: 6, marginTop: 14 }}>
            <div style={{ padding: '12px 16px', borderBottom: `1px solid ${C.border}`, fontWeight: 600, fontSize: 13 }}>최저가 비교 결과</div>
            {crawlDone ? PRICE_COMPARE.map((item, i) => (
              <div key={i} onClick={() => setCompareModal(item)}
                style={{ padding: '10px 16px', borderBottom: `1px solid ${C.border}`, cursor: 'pointer', transition: 'background 0.15s' }}
                onMouseEnter={e => e.currentTarget.style.background = C.accentLight}
                onMouseLeave={e => e.currentTarget.style.background = 'transparent'}>
                <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
                  <div>
                    <div style={{ fontSize: 12, fontWeight: 600 }}>{item.name}</div>
                    <div style={{ fontSize: 11, color: C.textSub, marginTop: 2 }}>최저가: {item.best}</div>
                  </div>
                  <div style={{ fontWeight: 700, color: C.primary, fontSize: 13 }}>{item.price.toLocaleString()}원</div>
                </div>
              </div>
            )) : (
              <div style={{ padding: 20, textAlign: 'center', fontSize: 12, color: C.textSub }}>
                조회 후 가격 비교 결과가 표시됩니다
              </div>
            )}
          </div>
        </div>
      </div>

      {compareModal && (
        <Modal title={compareModal.name + ' 가격 비교'} onClose={() => setCompareModal(null)} width={440}>
          <table style={{ width: '100%', borderCollapse: 'collapse', fontSize: 12 }}>
            <thead>
              <tr style={{ background: C.bg }}>
                {['공급처', '단가', '재고 여부', ''].map(h => (
                  <th key={h} style={{ padding: '8px 12px', textAlign: 'left', color: C.textSub, fontWeight: 600 }}>{h}</th>
                ))}
              </tr>
            </thead>
            <tbody>
              {compareModal.prices.map((p, i) => (
                <tr key={i} style={{ borderTop: `1px solid ${C.border}`, background: p.supplier === compareModal.best ? C.accentLight : 'transparent' }}>
                  <td style={{ padding: '9px 12px', fontWeight: p.supplier === compareModal.best ? 700 : 400 }}>{p.supplier}</td>
                  <td style={{ padding: '9px 12px', fontWeight: 700, color: p.supplier === compareModal.best ? C.primary : C.textMain }}>{p.price.toLocaleString()}원</td>
                  <td style={{ padding: '9px 12px' }}><Badge status={p.stock === '재고 있음' ? 'ok' : 'danger'} label={p.stock} /></td>
                  <td style={{ padding: '9px 12px' }}>{p.supplier === compareModal.best && <span style={{ fontSize: 11, color: C.primary, fontWeight: 700 }}>최저가</span>}</td>
                </tr>
              ))}
            </tbody>
          </table>
          <div style={{ display: 'flex', gap: 8, marginTop: 14 }}>
            <button onClick={() => { setCompareModal(null); onToast('발주 목록에 추가됐습니다'); }}
              style={{ flex: 1, background: C.primary, color: '#fff', border: 'none', borderRadius: 5, padding: '9px 0', fontSize: 12, fontWeight: 600, cursor: 'pointer' }}>
              최저가로 발주 추가
            </button>
            <button onClick={() => setCompareModal(null)}
              style={{ flex: 1, background: '#F0F0F0', color: C.textMain, border: 'none', borderRadius: 5, padding: '9px 0', fontSize: 12, cursor: 'pointer' }}>
              닫기
            </button>
          </div>
        </Modal>
      )}
    </div>
  );
}

/* ── 신고 스케줄 화면 ── */
function ScheduleScreen({ onToast }) {
  const [schedules, setSchedules] = useState(SCHEDULES);
  const [selected, setSelected] = useState(null);
  const [logModal, setLogModal] = useState(false);
  const [addModal, setAddModal] = useState(false);

  function handleRun(s) {
    setSchedules(prev => prev.map(x => x.id === s.id ? { ...x, status: 'ok', lastRun: '방금 전' } : x));
    onToast(s.name + ' 수동 실행이 완료됐습니다');
    setSelected(null);
  }

  const typeColor = { '매출신고': '#3B82F6', '공급내역': '#10B981', '마약류': '#EF4444', 'EDB': '#8B5CF6' };

  return (
    <div className="fade-in">
      <div style={{ display: 'grid', gridTemplateColumns: '1fr 320px', gap: 14 }}>
        {/* 스케줄 목록 */}
        <div style={{ background: C.surface, border: `1px solid ${C.border}`, borderRadius: 6 }}>
          <div style={{ padding: '12px 16px', borderBottom: `1px solid ${C.border}`, display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
            <span style={{ fontWeight: 600, fontSize: 13 }}>신고 스케줄 목록</span>
            <button onClick={() => setAddModal(true)}
              style={{ background: C.primary, color: '#fff', border: 'none', borderRadius: 5, padding: '6px 14px', fontSize: 11, fontWeight: 600, cursor: 'pointer' }}>
              태스크 추가
            </button>
          </div>
          {schedules.map(s => (
            <div key={s.id} onClick={() => setSelected(s === selected ? null : s)}
              style={{ padding: '12px 16px', borderBottom: `1px solid ${C.border}`, cursor: 'pointer', background: selected?.id === s.id ? C.accentLight : 'transparent', transition: 'background 0.15s' }}
              onMouseEnter={e => { if (selected?.id !== s.id) e.currentTarget.style.background = '#F9FBF9'; }}
              onMouseLeave={e => { if (selected?.id !== s.id) e.currentTarget.style.background = 'transparent'; }}>
              <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
                <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
                  <div style={{ width: 3, height: 36, borderRadius: 2, background: typeColor[s.type] || C.accent }} />
                  <div>
                    <div style={{ fontWeight: 600, fontSize: 12 }}>{s.name}</div>
                    <div style={{ fontSize: 11, color: C.textSub, marginTop: 2 }}>{s.time} · {s.days}</div>
                  </div>
                </div>
                <div style={{ textAlign: 'right' }}>
                  <Badge status={s.status} label={s.status === 'ok' ? '완료' : s.status === 'error' ? '오류' : '예정'} />
                  <div style={{ fontSize: 11, color: C.textSub, marginTop: 3 }}>다음: {s.nextRun}</div>
                </div>
              </div>
            </div>
          ))}
        </div>

        {/* 선택된 태스크 상세 */}
        <div>
          {selected ? (
            <div className="slide-in" style={{ background: C.surface, border: `1px solid ${C.border}`, borderRadius: 6, padding: 16, marginBottom: 12 }}>
              <div style={{ fontWeight: 600, fontSize: 13, marginBottom: 12 }}>{selected.name}</div>
              <div style={{ display: 'grid', gap: 8, marginBottom: 14 }}>
                {[
                  ['실행 시간', selected.time],
                  ['실행 요일', selected.days],
                  ['신고 유형', selected.type],
                  ['마지막 실행', selected.lastRun],
                  ['다음 실행', selected.nextRun],
                ].map(([k, v]) => (
                  <div key={k} style={{ display: 'flex', justifyContent: 'space-between', fontSize: 12, padding: '7px 10px', background: C.bg, borderRadius: 4 }}>
                    <span style={{ color: C.textSub }}>{k}</span><span style={{ fontWeight: 600 }}>{v}</span>
                  </div>
                ))}
              </div>
              {selected.status === 'error' && (
                <div style={{ background: '#FEE2E2', borderRadius: 5, padding: '8px 12px', fontSize: 11, color: '#991B1B', marginBottom: 10 }}>
                  오류: 스카이젯 서버 응답 지연 (타임아웃 30초 초과)

                <label style={{ fontSize: 12, color: C.textSub, display: 'block', marginBottom: 5 }}>실행 요일</label>
                <select style={{ width: '100%', border: `1px solid ${C.border}`, borderRadius: 5, padding: '7px 10px', fontSize: 12 }}>
                  <option>매일</option><option>월-금</option><option>월-목</option><option>금</option>
                </select>
              </div>
            </div>
          </div>
          <div style={{ display: 'flex', gap: 8 }}>
            <button onClick={() => { setAddModal(false); onToast('신고 태스크가 추가됐습니다'); }}
              style={{ flex: 1, background: C.primary, color: '#fff', border: 'none', borderRadius: 5, padding: '9px 0', fontSize: 12, fontWeight: 600, cursor: 'pointer' }}>
              추가
            </button>
            <button onClick={() => setAddModal(false)}
              style={{ flex: 1, background: '#F0F0F0', color: C.textMain, border: 'none', borderRadius: 5, padding: '9px 0', fontSize: 12, cursor: 'pointer' }}>
              취소
            </button>
          </div>
        </Modal>
      )}
    </div>
  );
}

/* ── 발주 관리 화면 ── */
function OrderScreen({ onToast }) {
  const [orders, setOrders] = useState(ORDERS);
  const [selected, setSelected] = useState(null);
  const [confirmModal, setConfirmModal] = useState(null);
  const [reportModal, setReportModal] = useState(false);
  const [generating, setGenerating] = useState(false);

  function handleConfirm(order) {
    setOrders(prev => prev.map(o => o.id === order.id ? { ...o, status: '확정' } : o));
    setConfirmModal(null); setSelected(null);
    onToast('발주가 확정됐습니다 — ' + order.supplier);
  }

  function generateReport(format) {
    setGenerating(true);
    setTimeout(() => { setGenerating(false); setReportModal(false); onToast(format + ' 보고서 생성이 완료됐습니다'); }, 2000);
  }

  return (
    <div className="fade-in">
      <div style={{ display: 'grid', gridTemplateColumns: '1fr 320px', gap: 14 }}>
        {/* 발주 목록 */}
        <div style={{ background: C.surface, border: `1px solid ${C.border}`, borderRadius: 6 }}>
          <div style={{ padding: '12px 16px', borderBottom: `1px solid ${C.border}`, display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
            <span style={{ fontWeight: 600, fontSize: 13 }}>발주 목록</span>
            <button onClick={() => setReportModal(true)}
              style={{ background: C.primary, color: '#fff', border: 'none', borderRadius: 5, padding: '6px 14px', fontSize: 11, fontWeight: 600, cursor: 'pointer' }}>
              보고서 생성
            </button>
          </div>
          <table style={{ width: '100%', borderCollapse: 'collapse', fontSize: 12 }}>
            <thead>
              <tr style={{ background: '#F9FBF9' }}>
                {['발주번호', '발주일', '공급처', '품목 수', '합계', '상태', ''].map(h => (
                  <th key={h} style={{ padding: '8px 12px', textAlign: 'left', color: C.textSub, fontWeight: 600, borderBottom: `1px solid ${C.border}` }}>{h}</th>
                ))}
              </tr>
            </thead>
            <tbody>
              {orders.map(o => (
                <tr key={o.id} onClick={() => setSelected(o === selected ? null : o)}
                  style={{ cursor: 'pointer', borderBottom: `1px solid ${C.border}`, background: selected?.id === o.id ? C.accentLight : 'transparent', transition: 'background 0.15s' }}
                  onMouseEnter={e => { if (selected?.id !== o.id) e.currentTarget.style.background = '#F9FBF9'; }}
                  onMouseLeave={e => { if (selected?.id !== o.id) e.currentTarget.style.background = 'transparent'; }}>
                  <td style={{ padding: '9px 12px', fontWeight: 500, color: C.primary2, fontSize: 11 }}>{o.id}</td>
                  <td style={{ padding: '9px 12px', color: C.textSub }}>{o.date}</td>
                  <td style={{ padding: '9px 12px', fontWeight: 500 }}>{o.supplier}</td>
                  <td style={{ padding: '9px 12px' }}>{o.items}건</td>
                  <td style={{ padding: '9px 12px', fontWeight: 600 }}>{o.total.toLocaleString()}원</td>
                  <td style={{ padding: '9px 12px' }}><Badge status={o.status === '완료' ? 'ok' : o.status === '확정' ? 'ok' : 'pending'} label={o.status} /></td>
                  <td style={{ padding: '9px 12px' }}><Icon name="chevron-right" size={14} color={C.textSub} /></td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>

        {/* 선택 상세 */}
        <div>
          {selected ? (
            <div className="slide-in" style={{ background: C.surface, border: `1px solid ${C.border}`, borderRadius: 6, padding: 16 }}>
              <div style={{ fontWeight: 600, fontSize: 13, marginBottom: 12 }}>{selected.id}</div>
              <div style={{ display: 'grid', gap: 8, marginBottom: 14 }}>
                {[['발주일', selected.date], ['공급처', selected.supplier], ['품목 수', selected.items + '건'], ['합계', selected.total.toLocaleString() + '원']].map(([k, v]) => (
                  <div key={k} style={{ display: 'flex', justifyContent: 'space-between', fontSize: 12, padding: '7px 10px', background: C.bg, borderRadius: 4 }}>
                    <span style={{ color: C.textSub }}>{k}</span><span style={{ fontWeight: 600 }}>{v}</span>
                  </div>
                ))}
              </div>
              {selected.status === '대기' && (
                <button onClick={() => setConfirmModal(selected)}
                  style={{ width: '100%', background: C.primary, color: '#fff', border: 'none', borderRadius: 5, padding: '9px 0', fontSize: 12, fontWeight: 600, cursor: 'pointer', marginBottom: 8 }}>
                  발주 확정
                </button>
              )}
              <button onClick={() => { onToast('발주서 PDF를 다운로드합니다'); }}
                style={{ width: '100%', background: '#F0F0F0', color: C.textMain, border: 'none', borderRadius: 5, padding: '9px 0', fontSize: 12, cursor: 'pointer' }}>
                발주서 PDF 다운로드
              </button>
            </div>
          ) : (
            <div style={{ background: C.surface, border: `1px solid ${C.border}`, borderRadius: 6, padding: 24, textAlign: 'center', color: C.textSub }}>
              <Icon name="file-text" size={28} color={C.border} />
              <div style={{ marginTop: 8, fontSize: 12 }}>발주 항목을 선택하면 상세 정보를 확인합니다</div>
            </div>
          )}
        </div>
      </div>

      {confirmModal && (
        <Modal title="발주 확정" onClose={() => setConfirmModal(null)} width={380}>
          <div style={{ textAlign: 'center', padding: '8px 0 16px' }}>
            <Icon name="alert-triangle" size={32} color={C.warn} />
            <div style={{ fontSize: 14, fontWeight: 600, marginTop: 10 }}>{confirmModal.supplier}</div>
            <div style={{ fontSize: 13, color: C.textSub, marginTop: 4 }}>{confirmModal.total.toLocaleString()}원 · {confirmModal.items}건</div>
            <div style={{ fontSize: 12, color: C.textSub, marginTop: 10 }}>발주를 확정하시겠습니까?</div>
          </div>
          <div style={{ display: 'flex', gap: 8 }}>
            <button onClick={() => handleConfirm(confirmModal)}
              style={{ flex: 1, background: C.primary, color: '#fff', border: 'none', borderRadius: 5, padding: '9px 0', fontSize: 12, fontWeight: 600, cursor: 'pointer' }}>
              확정
            </button>
            <button onClick={() => setConfirmModal(null)}
              style={{ flex: 1, background: '#F0F0F0', color: C.textMain, border: 'none', borderRadius: 5, padding: '9px 0', fontSize: 12, cursor: 'pointer' }}>
              취소
            </button>
          </div>
        </Modal>
      )}

      {reportModal && (
        <Modal title="보고서 자동 생성" onClose={() => !generating && setReportModal(false)} width={400}>
          {generating ? (
            <div style={{ textAlign: 'center', padding: '20px 0' }}>
              <div style={{ fontSize: 13, color: C.textSub, marginBottom: 16 }}>보고서 생성 중...</div>
              <div style={{ height: 6, background: C.border, borderRadius: 10, overflow: 'hidden' }}>
                <div style={{ height: '100%', width: '65%', background: C.accent, borderRadius: 10, animation: 'shimmer 1.2s infinite' }} />
              </div>
            </div>
          ) : (
            <>
              <div style={{ marginBottom: 14 }}>
                <label style={{ fontSize: 12, color: C.textSub, display: 'block', marginBottom: 6 }}>보고서 종류</label>
                <select style={{ width: '100%', border: `1px solid ${C.border}`, borderRadius: 5, padding: '7px 10px', fontSize: 12 }}>
                  <option>발주 관리 보고서</option><option>반품매입 미결 현황</option><option>공급처별 발주 현황</option>
                </select>
              </div>
              <div style={{ marginBottom: 16 }}>
                <label style={{ fontSize: 12, color: C.textSub, display: 'block', marginBottom: 6 }}>기간</label>
                <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 8 }}>
                  <input type="date" defaultValue="2024-05-01" style={{ border: `1px solid ${C.border}`, borderRadius: 5, padding: '7px 10px', fontSize: 12 }} />
                  <input type="date" defaultValue="2024-05-13" style={{ border: `1px solid ${C.border}`, borderRadius: 5, padding: '7px 10px', fontSize: 12 }} />
                </div>
              </div>
              <div style={{ display: 'flex', gap: 8 }}>
                <button onClick={() => generateReport('PDF')}
                  style={{ flex: 1, background: C.primary, color: '#fff', border: 'none', borderRadius: 5, padding: '9px 0', fontSize: 12, fontWeight: 600, cursor: 'pointer' }}>
                  PDF 생성
                </button>
                <button onClick={() => generateReport('Excel')}
                  style={{ flex: 1, background: C.primary2, color: '#fff', border: 'none', borderRadius: 5, padding: '9px 0', fontSize: 12, fontWeight: 600, cursor: 'pointer' }}>
                  Excel 생성
                </button>
              </div>
            </>
          )}
        </Modal>
      )}
    </div>
  );
}

/* ── 메인 앱 ── */
function App() {
  const [activeMenu, setActiveMenu] = useState('대시보드');
  const [toast, setToast] = useState(null);

  const menuItems = [
    { label: '대시보드', icon: 'layout-dashboard' },
    { label: '공급처 조회', icon: 'store' },
    { label: '신고 스케줄', icon: 'calendar-clock' },
    { label: '발주 관리', icon: 'shopping-cart' },
    { label: '시스템 로그', icon: 'scroll-text' },
    { label: '설정', icon: 'settings' },
  ];

  function onToast(msg) { setToast(msg); }

  const screenProps = { products: PRODUCTS, onToast };

  return (
    <div style={{ display: 'flex', width: '100%', height: '100vh', overflow: 'hidden' }}>
      {/* 사이드바 */}
      <div style={{ width: 220, background: C.sidebarBg, display: 'flex', flexDirection: 'column', flexShrink: 0 }}>
        <div style={{ padding: '18px 16px 14px', borderBottom: '1px solid rgba(255,255,255,0.08)' }}>
          <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
            <div style={{ width: 28, height: 28, background: C.accent, borderRadius: 6, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
              <Icon name="activity" size={14} color="#fff" />
            </div>
            <div>
              <div style={{ color: '#fff', fontSize: 13, fontWeight: 700, lineHeight: 1.2 }}>MedStock</div>
              <div style={{ color: C.sidebarText, fontSize: 10 }}>재고 자동화 관리</div>
            </div>
          </div>
        </div>

        <nav style={{ flex: 1, padding: '12px 8px' }}>
          {menuItems.map(m => (
            <div key={m.label} onClick={() => setActiveMenu(m.label)}
              style={{
                display: 'flex', alignItems: 'center', gap: 10, padding: '9px 10px', borderRadius: 5,
                marginBottom: 2, cursor: 'pointer',
                background: activeMenu === m.label ? C.sidebarActive : 'transparent',
                color: activeMenu === m.label ? C.sidebarTextActive : C.sidebarText,
                transition: 'all 0.15s',
              }}
              onMouseEnter={e => { if (activeMenu !== m.label) e.currentTarget.style.background = 'rgba(255,255,255,0.06)'; }}
              onMouseLeave={e => { if (activeMenu !== m.label) e.currentTarget.style.background = 'transparent'; }}>
              <Icon name={m.icon} size={15} color={activeMenu === m.label ? C.accent : C.sidebarText} />
              <span style={{ fontSize: 13, fontWeight: activeMenu === m.label ? 600 : 400 }}>{m.label}</span>
            </div>
          ))}
        </nav>

        <div style={{ padding: '12px 16px', borderTop: '1px solid rgba(255,255,255,0.08)' }}>
          <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
            <div style={{ width: 28, height: 28, background: C.primary2, borderRadius: '50%', display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
              <span style={{ color: '#fff', fontSize: 11, fontWeight: 700 }}>김</span>
            </div>
            <div>
              <div style={{ color: '#fff', fontSize: 12, fontWeight: 500 }}>김민준</div>
              <div style={{ color: C.sidebarText, fontSize: 10 }}>시스템 관리자</div>
            </div>
          </div>
        </div>
      </div>

      {/* 메인 영역 */}
      <div style={{ flex: 1, display: 'flex', flexDirection: 'column', overflow: 'hidden' }}>
        {/* 탑바 */}
        <div style={{ height: 52, background: C.surface, borderBottom: `1px solid ${C.border}`, display: 'flex', alignItems: 'center', justifyContent: 'space-between', padding: '0 20px', flexShrink: 0 }}>
          <div>
            <span style={{ fontSize: 15, fontWeight: 700 }}>{activeMenu}</span>
            <span style={{ fontSize: 12, color: C.textSub, marginLeft: 10 }}>2024.05.13 (월) 기준</span>
          </div>
          <div style={{ display: 'flex', alignItems: 'center', gap: 12 }}>
            <div style={{ width: 8, height: 8, borderRadius: '50%', background: C.accent, animation: 'pulse 2s infinite' }} />
            <span style={{ fontSize: 11, color: C.textSub }}>자동화 실행 중</span>
            <button style={{ background: 'none', border: `1px solid ${C.border}`, borderRadius: 5, padding: '5px 10px', fontSize: 11, cursor: 'pointer', display: 'flex', alignItems: 'center', gap: 5 }}>
              <Icon name="bell" size={13} color={C.textSub} /> 알림 2
            </button>
          </div>
        </div>

        {/* 콘텐츠 */}
        <div style={{ flex: 1, overflow: 'auto', padding: 16 }}>
          {activeMenu === '대시보드' && <DashboardScreen {...screenProps} />}
          {activeMenu === '공급처 조회' && <SupplierScreen onToast={onToast} />}
          {activeMenu === '신고 스케줄' && <ScheduleScreen onToast={onToast} />}
          {activeMenu === '발주 관리' && <OrderScreen onToast={onToast} />}
          {(activeMenu === '시스템 로그' || activeMenu === '설정') && (
            <div className="fade-in" style={{ background: C.surface, border: `1px solid ${C.border}`, borderRadius: 6, padding: 32, textAlign: 'center', color: C.textSub }}>
              <Icon name={activeMenu === '설정' ? 'settings' : 'scroll-text'} size={32} color={C.border} />
              <div style={{ marginTop: 12, fontSize: 13, fontWeight: 500 }}>{activeMenu}</div>
              <div style={{ fontSize: 12, marginTop: 6 }}>해당 화면을 표시합니다</div>
            </div>
          )}
        </div>
      </div>

      {toast && <Toast msg={toast} onClose={() => setToast(null)} />}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
