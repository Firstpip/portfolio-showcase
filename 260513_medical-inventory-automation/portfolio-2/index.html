/* ── 공통 컴포넌트 ── */
function PIcon({ name, size = 16, color = 'currentColor' }) {
  return <i className={`ph ph-${name}`} style={{ fontSize: size, color, lineHeight: 1 }} />;
}

function Badge2({ status, label }) {
  const map = {
    success: { bg: '#D1FAE5', color: '#065F46' },
    fail:    { bg: '#FEE2E2', color: '#9B2C2C' },
    warn:    { bg: '#FEF3C7', color: '#92400E' },
    up:      { bg: '#DBEAFE', color: '#1E40AF' },
    down:    { bg: '#FEE2E2', color: '#9B2C2C' },
    stable:  { bg: '#F3F4F6', color: '#374151' },
    ok:      { bg: '#D1FAE5', color: '#065F46' },
    urgent:  { bg: '#FEE2E2', color: '#9B2C2C' },
  };
  const m = map[status] || map.ok;
  return (
    <span style={{ background: m.bg, color: m.color, fontSize: 11, fontWeight: 600, padding: '2px 8px', borderRadius: 4 }}>
      {label}
    </span>
  );
}

function Toast2({ msg, onClose }) {
  useEffect(() => { const t = setTimeout(onClose, 2800); return () => clearTimeout(t); }, []);
  return (
    <div style={{ position: 'fixed', bottom: 24, right: 24, zIndex: 9999, background: C.accent, color: '#fff', padding: '12px 20px', borderRadius: 10, fontSize: 13, fontWeight: 500, boxShadow: '0 4px 16px rgba(224,120,48,0.4)', animation: 'toastUp 0.25s ease', display: 'flex', alignItems: 'center', gap: 8 }}>
      <PIcon name="check-circle" size={15} color="#fff" />{msg}
    </div>
  );
}

                <YAxis tick={{ fontSize: 11 }} tickFormatter={v => (v/1000).toFixed(0) + 'K'} />
                <Tooltip formatter={v => v.toLocaleString() + '원'} />
                <Line dataKey="메디팜" stroke="#1B2B4D" strokeWidth={2} dot={{ r: 3 }} />
                <Line dataKey="동아약품" stroke={C.accent} strokeWidth={2} dot={{ r: 3 }} />
                <Line dataKey="한국의료용품" stroke="#4A6FA5" strokeWidth={2} dot={{ r: 3 }} />
              </LineChart>
            </ResponsiveContainer>
          </div>
          <div style={{ display: 'flex', gap: 14, marginTop: 8, fontSize: 11, flexWrap: 'wrap' }}>
            {[['#1B2B4D', '메디팜'], ['#E07830', '동아약품'], ['#4A6FA5', '한국의료용품']].map(([c, n]) => (
              <div key={n} style={{ display: 'flex', alignItems: 'center', gap: 5 }}>
                <div style={{ width: 16, height: 3, background: c, borderRadius: 2 }} />
                <span style={{ color: C.textSub }}>{n}</span>
              </div>
            ))}
          </div>
        </div>
      </div>

      {selectedSupplier && (
        <Drawer title={selectedSupplier.name + ' 상세 분석'} onClose={() => setSelectedSupplier(null)}>
          <div style={{ display: 'grid', gap: 10, marginBottom: 16 }}>
            {[['신뢰도 점수', selectedSupplier.score + ' / 100'], ['조회 성공률', selectedSupplier.successRate + '%'], ['평균 단가', selectedSupplier.avgPrice.toLocaleString() + '원'], ['추세', selectedSupplier.trend === 'up' ? '상승' : selectedSupplier.trend === 'down' ? '하락' : '유지']].map(([k, v]) => (
              <div key={k} style={{ display: 'flex', justifyContent: 'space-between', fontSize: 13, padding: '10px 14px', background: C.bg, borderRadius: 8 }}>
                <span style={{ color: C.textSub }}>{k}</span><span style={{ fontWeight: 700 }}>{v}</span>
              </div>
            ))}
          </div>
          <div style={{ background: '#FEF3EA', borderRadius: 8, padding: '12px 14px', marginBottom: 16, fontSize: 12, color: '#92400E' }}>
            <strong>점수 산출 기준:</strong> 조회 성공률(70%) × 가격 경쟁력(30%) 가중 합산
          </div>
          <button onClick={() => { setSelectedSupplier(null); onToast(selectedSupplier.name + '을 우선 발주 공급처로 설정했습니다'); }}
            style={{ width: '100%', background: C.accent, color: '#fff', border: 'none', borderRadius: 8, padding: '10px 0', fontSize: 13, fontWeight: 700, cursor: 'pointer' }}>
            우선 발주 공급처 설정
          </button>
        </Drawer>
      )}
    </div>
  );
}

/* ── 자동화 로그 화면 ── */
function AutoLogScreen({ onToast }) {
  const [selected, setSelected] = useState(null);
  const [filter, setFilter] = useState('전체');

  const filtered = filter === '전체' ? AUTO_LOGS : AUTO_LOGS.filter(l => (filter === '성공' ? l.status === 'success' : l.status === 'fail'));
  const failCount = AUTO_LOGS.filter(l => l.status === 'fail').length;

  /* 히트맵 데이터: 요일 × 시간대 오류 빈도 (가상) */
  const HEATMAP_DAYS = ['월', '화', '수', '목', '금', '토', '일'];
  const HEATMAP_HOURS = ['09', '12', '14', '17', '19', '22'];
  const HEATMAP = {
    '월_17': 2, '화_22': 1, '수_22': 3, '목_17': 1, '금_12': 1, '금_19': 2, '일_22': 1,
  };

  return (
    <div className="fade-up">
      {/* 경고 배너 */}
      {failCount >= 2 && (
        <div className="slide-down" style={{ background: '#FEE2E2', border: '1px solid #FCA5A5', borderRadius: 8, padding: '10px 16px', marginBottom: 14, display: 'flex', alignItems: 'center', gap: 10 }}>
          <PIcon name="warning" size={18} color="#C53030" />
          <span style={{ fontSize: 13, color: '#9B2C2C', fontWeight: 600 }}>최근 실행에서 {failCount}건의 오류가 감지됐습니다. 아래 로그를 확인하세요.</span>
        </div>
      )}

      <div style={{ display: 'grid', gridTemplateColumns: '1fr 340px', gap: 16 }}>
        {/* 로그 목록 */}
        <div style={{ background: C.surface, border: `1px solid ${C.border}`, borderRadius: 10, boxShadow: '0 2px 8px rgba(27,43,77,0.06)' }}>
          <div style={{ padding: '12px 16px', borderBottom: `1px solid ${C.border}`, display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
            <span style={{ fontWeight: 700, fontSize: 13 }}>실행 이력</span>
            <div style={{ display: 'flex', gap: 5 }}>
              {['전체', '성공', '실패'].map(f => (
                <button key={f} onClick={() => setFilter(f)}
                  style={{ background: filter === f ? C.primary : '#F0F2F5', color: filter === f ? '#fff' : C.textSub, border: 'none', borderRadius: 5, padding: '4px 10px', fontSize: 11, fontWeight: 600, cursor: 'pointer' }}>
                  {f}
                </button>
              ))}
            </div>
          </div>
          <table style={{ width: '100%', borderCollapse: 'collapse', fontSize: 12 }}>
            <thead>
              <tr style={{ background: '#F7F9FC' }}>
                {['로그 ID', '태스크', '실행 시각', '소요', '상태', ''].map(h => (
                  <th key={h} style={{ padding: '8px 14px', textAlign: 'left', color: C.textSub, fontWeight: 600, borderBottom: `1px solid ${C.border}` }}>{h}</th>
                ))}
              </tr>
            </thead>
            <tbody>
              {filtered.map((l, i) => (
                <tr key={i} onClick={() => setSelected(l === selected ? null : l)}
                  style={{ cursor: 'pointer', borderBottom: `1px solid ${C.border}`, background: selected === l ? C.accentLight : 'transparent', transition: 'background 0.15s' }}
                  onMouseEnter={e => { if (selected !== l) e.currentTarget.style.background = '#F7F9FC'; }}
                  onMouseLeave={e => { if (selected !== l) e.currentTarget.style.background = 'transparent'; }}>
                  <td style={{ padding: '9px 14px', color: C.textSub, fontSize: 11 }}>{l.id}</td>
                  <td style={{ padding: '9px 14px', fontWeight: 500 }}>{l.type}</td>
                  <td style={{ padding: '9px 14px', color: C.textSub }}>{l.time}</td>
                  <td style={{ padding: '9px 14px', color: C.textSub }}>{l.duration}</td>
                  <td style={{ padding: '9px 14px' }}><Badge2 status={l.status} label={l.status === 'success' ? '성공' : '실패'} /></td>
                  <td style={{ padding: '9px 14px' }}><PIcon name="caret-right" size={14} color={C.textSub} /></td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>

        {/* 히트맵 + 상세 */}
        <div>
          <div style={{ background: C.surface, border: `1px solid ${C.border}`, borderRadius: 10, padding: 16, marginBottom: 12, boxShadow: '0 2px 8px rgba(27,43,77,0.06)' }}>
            <div style={{ fontWeight: 700, fontSize: 12, marginBottom: 10 }}>오류 빈도 히트맵 (요일 × 시간)</div>
            <div style={{ display: 'flex', gap: 3, alignItems: 'flex-start' }}>
              <div style={{ display: 'flex', flexDirection: 'column', gap: 3, paddingTop: 18 }}>
                {HEATMAP_DAYS.map(d => <div key={d} style={{ height: 24, width: 16, fontSize: 10, color: C.textSub, display: 'flex', alignItems: 'center' }}>{d}</div>)}
              </div>
              <div>
                <div style={{ display: 'flex', gap: 3, marginBottom: 3 }}>
                  {HEATMAP_HOURS.map(h => <div key={h} style={{ width: 32, fontSize: 9, color: C.textSub, textAlign: 'center' }}>{h}시</div>)}
                </div>
                {HEATMAP_DAYS.map(day => (
                  <div key={day} style={{ display: 'flex', gap: 3, marginBottom: 3 }}>
                    {HEATMAP_HOURS.map(hour => {
                      const cnt = HEATMAP[day + '_' + hour] || 0;
                      const intensity = cnt === 0 ? '#F0F2F5' : cnt === 1 ? '#FEF3C7' : cnt === 2 ? '#FDE68A' : '#F59E0B';
                      return (
                        <div key={hour} style={{ width: 32, height: 24, borderRadius: 4, background: intensity, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
                          {cnt > 0 && <span style={{ fontSize: 10, fontWeight: 700, color: '#92400E' }}>{cnt}</span>}
                        </div>
                      );
                    })}
                  </div>
                ))}
              </div>
            </div>
          </div>

          {selected && (
            <div className="slide-down" style={{ background: C.surface, border: `1px solid ${C.border}`, borderRadius: 10, padding: 16, boxShadow: '0 2px 8px rgba(27,43,77,0.06)' }}>
              <div style={{ fontWeight: 700, fontSize: 12, marginBottom: 10 }}>{selected.id}</div>
              {[['태스크', selected.type], ['실행 시각', selected.time], ['소요 시간', selected.duration], ['상태', selected.status === 'success' ? '성공' : '실패']].map(([k, v]) => (
                <div key={k} style={{ display: 'flex', justifyContent: 'space-between', fontSize: 12, padding: '7px 10px', background: C.bg, borderRadius: 6, marginBottom: 5 }}>
                  <span style={{ color: C.textSub }}>{k}</span><span style={{ fontWeight: 600 }}>{v}</span>
                </div>
              ))}
              {selected.error && (
                <div style={{ background: '#FEE2E2', borderRadius: 6, padding: '8px 10px', marginTop: 8, fontSize: 11, color: '#9B2C2C' }}>
                  오류: {selected.error}
                </div>
              )}
              {selected.status === 'fail' && (
                <button onClick={() => { setSelected(null); onToast(selected.type + ' 재실행이 완료됐습니다'); }}
                  style={{ width: '100%', marginTop: 10, background: C.accent, color: '#fff', border: 'none', borderRadius: 6, padding: '8px 0', fontSize: 12, fontWeight: 700, cursor: 'pointer' }}>
                  재실행
                </button>
              )}
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

            </div>
            <div style={{ fontSize: 12, color: '#A0B4CC' }}>
              {activeTab === '재고 예측' && '7·30일 이동평균 기반 재고 소진 예정일 예측 및 발주 권고'}
              {activeTab === '공급처 분석' && '성공률·가격 경쟁력 기반 공급처 신뢰도 점수 산출 및 랭킹'}
              {activeTab === '발주 트렌드' && '월별·공급처별 발주 금액 추세 및 PDF 리포트 자동 생성'}
              {activeTab === '자동화 로그' && '전체 자동화 태스크 실행 이력 통합 모니터링'}
            </div>
          </div>
          <div style={{ display: 'flex', gap: 20 }}>
            {[
              { label: '자동화 실행 중', value: '3개', color: '#4CAF82' },
              { label: '오늘 처리', value: '7건', color: '#A0B4CC' },
              { label: '오류', value: '2건', color: '#FC8181' },
            ].map(x => (
              <div key={x.label} style={{ textAlign: 'center' }}>
                <div style={{ fontSize: 20, fontWeight: 700, color: x.color }}>{x.value}</div>
                <div style={{ fontSize: 10, color: '#A0B4CC', marginTop: 2 }}>{x.label}</div>
              </div>
            ))}
          </div>
        </div>
      </div>

      {/* 콘텐츠 */}
      <div style={{ maxWidth: 1200, margin: '0 auto', padding: '20px 24px' }}>
        {activeTab === '재고 예측' && <PredictionScreen onToast={msg => setToast(msg)} />}
        {activeTab === '공급처 분석' && <SupplierAnalyticsScreen onToast={msg => setToast(msg)} />}
        {activeTab === '발주 트렌드' && <OrderTrendScreen onToast={msg => setToast(msg)} />}
        {activeTab === '자동화 로그' && <AutoLogScreen onToast={msg => setToast(msg)} />}
      </div>

      {toast && <Toast2 msg={toast} onClose={() => setToast(null)} />}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
