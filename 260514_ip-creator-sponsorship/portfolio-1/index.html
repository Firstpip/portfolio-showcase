<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>팬 하트 후원 플랫폼 — 맞춤 구현 데모</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://unpkg.com/prop-types/prop-types.min.js"></script>
<script src="https://unpkg.com/react-is/umd/react-is.production.min.js"></script>
<script src="https://unpkg.com/recharts/umd/Recharts.js"></script>
<link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/regular/style.css">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body,#root{width:100%;min-height:100vh;font-family:'Pretendard',sans-serif;background:#FFF5F8}
:root{
  --pink:#E8306A;--pink2:#FF6B9D;--accent:#FFB347;
  --bg:#FFF5F8;--surface:#FFFFFF;
  --txt:#1A0A10;--txt2:#7A3F55;
  --border:#F3C6D4;--radius:16px;
}
@keyframes fadeIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideDown{from{opacity:0;transform:translateY(-10px)}to{opacity:1;transform:translateY(0)}}
@keyframes heartBeat{0%,100%{transform:scale(1)}40%{transform:scale(1.18)}70%{transform:scale(0.94)}}
@keyframes countUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
@keyframes toastIn{from{opacity:0;transform:translateX(60px)}to{opacity:1;transform:translateX(0)}}
@keyframes barGrow{from{height:0}to{height:var(--h)}}

.fade-in{animation:fadeIn .35s ease forwards}
.skeleton{background:linear-gradient(90deg,#f3c6d4 25%,#fce4ec 50%,#f3c6d4 75%);background-size:200% 100%;animation:shimmer 1.4s infinite}

/* Topnav */
.topnav{position:fixed;top:0;left:0;right:0;z-index:100;background:rgba(255,245,248,.92);backdrop-filter:blur(14px);border-bottom:1px solid var(--border);height:62px;display:flex;align-items:center;padding:0 28px;gap:8px}
.topnav-logo{display:flex;align-items:center;gap:8px;font-size:18px;font-weight:800;color:var(--pink);margin-right:16px;cursor:pointer;flex-shrink:0}
.topnav-logo i{font-size:22px;animation:heartBeat 2s infinite}
.nav-tabs{display:flex;gap:4px;flex:1}
.nav-tab{display:flex;align-items:center;gap:6px;padding:7px 14px;border-radius:10px;font-size:14px;font-weight:500;color:var(--txt2);cursor:pointer;transition:all .2s;background:transparent;border:none;white-space:nowrap}
.nav-tab:hover{background:#fce4ec;color:var(--pink)}
.nav-tab.active{background:var(--pink);color:#fff;font-weight:600}
.nav-tab i{font-size:16px}
.topnav-right{display:flex;align-items:center;gap:12px}
.charge-btn{display:flex;align-items:center;gap:6px;padding:8px 18px;background:linear-gradient(135deg,var(--pink),#c41d5a);color:#fff;border:none;border-radius:12px;font-size:13px;font-weight:700;cursor:pointer;transition:all .2s;white-space:nowrap}
.charge-btn:hover{transform:translateY(-1px);box-shadow:0 4px 16px rgba(232,48,106,.4)}
.charge-btn i{font-size:15px}
.heart-balance-chip{display:flex;align-items:center;gap:6px;padding:7px 14px;background:var(--surface);border:1.5px solid var(--border);border-radius:24px;font-size:14px;font-weight:700;color:var(--pink)}
.heart-balance-chip i{font-size:16px;color:var(--pink)}
.avatar-chip{width:34px;height:34px;border-radius:50%;background:linear-gradient(135deg,var(--pink),var(--pink2));color:#fff;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;cursor:pointer}

/* Main layout */
.main-wrap{padding-top:62px;min-height:100vh;width:100%}
.page{display:none;animation:fadeIn .3s ease}
.page.active{display:block}

/* Hero */
.hero{background:linear-gradient(135deg,#FFF0F5 0%,#FFD6E7 50%,#FFECD5 100%);padding:48px 28px 40px;position:relative;overflow:hidden}
.hero::before{content:'';position:absolute;top:-60px;right:-60px;width:280px;height:280px;border-radius:50%;background:radial-gradient(circle,rgba(232,48,106,.12),transparent 70%)}
.hero-inner{max-width:960px;margin:0 auto;display:flex;align-items:center;gap:40px}
.hero-text{flex:1}
.hero-greeting{font-size:13px;font-weight:600;color:var(--pink);letter-spacing:.04em;margin-bottom:8px}
.hero-title{font-size:28px;font-weight:800;color:var(--txt);line-height:1.35;margin-bottom:10px}
.hero-title span{color:var(--pink)}
.hero-sub{font-size:14px;color:var(--txt2);line-height:1.65}
.hero-balance-card{background:var(--surface);border-radius:20px;padding:24px 28px;min-width:240px;box-shadow:0 8px 32px rgba(232,48,106,.14)}
.hero-balance-label{font-size:12px;color:var(--txt2);font-weight:500;margin-bottom:6px}
.hero-balance-val{font-size:32px;font-weight:800;color:var(--pink);display:flex;align-items:center;gap:8px;margin-bottom:14px;animation:countUp .6s ease}
.hero-balance-val i{font-size:28px}
.hero-balance-actions{display:flex;gap:8px}
.hb-action{flex:1;padding:9px;border-radius:10px;font-size:13px;font-weight:600;cursor:pointer;transition:all .2s;border:none;text-align:center}
.hb-action.primary{background:var(--pink);color:#fff}
.hb-action.primary:hover{background:#c41d5a}
.hb-action.outline{background:transparent;border:1.5px solid var(--border);color:var(--txt2)}
.hb-action.outline:hover{background:#fce4ec;color:var(--pink)}

/* Section */
.section{max-width:960px;margin:0 auto;padding:32px 28px}
.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
.section-title{font-size:17px;font-weight:700;color:var(--txt);display:flex;align-items:center;gap:8px}
.section-title i{font-size:18px;color:var(--pink)}
.section-more{font-size:13px;color:var(--pink);font-weight:500;cursor:pointer}
.section-more:hover{text-decoration:underline}

/* Creator cards */
.creator-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:16px}
.creator-card{background:var(--surface);border-radius:var(--radius);padding:20px;cursor:pointer;transition:all .25s;box-shadow:0 2px 12px rgba(232,48,106,.08);border:1px solid var(--border)}
.creator-card:hover{transform:translateY(-4px);box-shadow:0 8px 28px rgba(232,48,106,.18)}
.creator-avatar{width:56px;height:56px;border-radius:50%;background:linear-gradient(135deg,var(--pink),#c41d5a);display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:800;color:#fff;margin:0 auto 12px;position:relative}
.creator-live{position:absolute;bottom:0;right:0;background:#E8306A;color:#fff;font-size:10px;font-weight:700;padding:2px 5px;border-radius:6px}
.creator-name{font-size:14px;font-weight:700;color:var(--txt);text-align:center;margin-bottom:4px}
.creator-category{font-size:11px;color:var(--txt2);text-align:center;margin-bottom:10px}
.creator-hearts{display:flex;align-items:center;justify-content:center;gap:4px;font-size:12px;color:var(--pink);font-weight:600;margin-bottom:12px}
.creator-hearts i{font-size:13px}
.sponsor-quick-btn{width:100%;padding:8px;background:linear-gradient(135deg,var(--pink),#c41d5a);color:#fff;border:none;border-radius:10px;font-size:13px;font-weight:600;cursor:pointer;transition:all .2s}
.sponsor-quick-btn:hover{opacity:.9}

/* Sponsor page */
.sponsor-search{display:flex;align-items:center;gap:10px;margin-bottom:24px}
.sponsor-search-input{flex:1;padding:11px 16px;border:1.5px solid var(--border);border-radius:12px;font-size:14px;color:var(--txt);background:var(--surface);outline:none;font-family:inherit}
.sponsor-search-input:focus{border-color:var(--pink)}
.sponsor-filter-wrap{display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap}
.filter-pill{padding:6px 14px;border-radius:20px;font-size:12px;font-weight:600;cursor:pointer;transition:all .2s;border:1.5px solid var(--border);background:var(--surface);color:var(--txt2)}
.filter-pill:hover{border-color:var(--pink);color:var(--pink)}
.filter-pill.active{background:var(--pink);color:#fff;border-color:var(--pink)}
.creator-list-item{background:var(--surface);border-radius:var(--radius);padding:16px 20px;display:flex;align-items:center;gap:16px;cursor:pointer;transition:all .2s;box-shadow:0 1px 6px rgba(232,48,106,.07);border:1px solid var(--border);margin-bottom:10px}
.creator-list-item:hover{transform:translateX(4px);box-shadow:0 4px 16px rgba(232,48,106,.15)}
.cli-avatar{width:48px;height:48px;border-radius:50%;background:linear-gradient(135deg,var(--pink),#c41d5a);display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:800;color:#fff;flex-shrink:0}
.cli-info{flex:1}
.cli-name{font-size:15px;font-weight:700;color:var(--txt)}
.cli-desc{font-size:12px;color:var(--txt2);margin-top:2px}
.cli-stats{display:flex;align-items:center;gap:12px}
.cli-stat{font-size:12px;color:var(--txt2);display:flex;align-items:center;gap:4px}
.cli-stat i{font-size:13px;color:var(--pink)}
.cli-btn{padding:8px 18px;background:var(--pink);color:#fff;border:none;border-radius:10px;font-size:13px;font-weight:600;cursor:pointer;transition:all .2s;flex-shrink:0}
.cli-btn:hover{background:#c41d5a}

/* History page */
.history-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:24px}
.hist-stat-card{background:var(--surface);border-radius:14px;padding:16px 18px;border:1px solid var(--border)}
.hist-stat-label{font-size:11px;color:var(--txt2);font-weight:500;margin-bottom:6px}
.hist-stat-val{font-size:20px;font-weight:800;color:var(--txt);display:flex;align-items:center;gap:6px}
.hist-stat-val i{font-size:18px;color:var(--pink)}
.hist-filter-row{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap}
.hist-filter{padding:7px 14px;border-radius:20px;font-size:13px;cursor:pointer;border:1.5px solid var(--border);background:var(--surface);color:var(--txt2);font-weight:500;transition:all .2s}
.hist-filter.active{background:var(--pink);color:#fff;border-color:var(--pink)}
.hist-table{background:var(--surface);border-radius:var(--radius);overflow:hidden;border:1px solid var(--border)}
.hist-thead{display:grid;grid-template-columns:1fr 100px 90px 100px;padding:12px 20px;background:#FFF0F5;font-size:12px;font-weight:700;color:var(--txt2);border-bottom:1px solid var(--border)}
.hist-row{display:grid;grid-template-columns:1fr 100px 90px 100px;padding:14px 20px;border-bottom:1px solid #FFF0F5;cursor:pointer;transition:all .2s;align-items:center}
.hist-row:last-child{border-bottom:none}
.hist-row:hover{background:#FFF5F8}
.hist-row-icon{display:flex;align-items:center;gap:10px}
.hist-icon{width:34px;height:34px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.hist-icon.charge{background:#FFE4EE;color:var(--pink)}
.hist-icon.sponsor{background:#FFECD5;color:var(--accent)}
.hist-icon.refund{background:#E8F5E9;color:#43A047}
.hist-txt-main{font-size:14px;font-weight:500;color:var(--txt)}
.hist-txt-sub{font-size:11px;color:var(--txt2);margin-top:1px}
.hist-amount{font-size:14px;font-weight:700}
.hist-amount.plus{color:#43A047}
.hist-amount.minus{color:var(--pink)}
.hist-status{padding:4px 10px;border-radius:20px;font-size:11px;font-weight:600;text-align:center}
.hist-status.done{background:#E8F5E9;color:#388E3C}
.hist-status.pending{background:#FFF3E0;color:#F57C00}
.hist-date{font-size:12px;color:var(--txt2)}

/* Earnings page */
.earnings-kpi{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:28px}
.kpi-card{background:var(--surface);border-radius:14px;padding:18px 20px;border:1px solid var(--border);animation:countUp .5s ease both}
.kpi-card:nth-child(1){animation-delay:.05s}
.kpi-card:nth-child(2){animation-delay:.1s}
.kpi-card:nth-child(3){animation-delay:.15s}
.kpi-card:nth-child(4){animation-delay:.2s}
.kpi-label{font-size:11px;color:var(--txt2);font-weight:500;margin-bottom:6px;display:flex;align-items:center;gap:5px}
.kpi-label i{font-size:13px;color:var(--pink)}
.kpi-val{font-size:20px;font-weight:800;color:var(--txt)}
.kpi-sub{font-size:11px;color:var(--txt2);margin-top:4px}
.chart-container{background:var(--surface);border-radius:var(--radius);padding:24px;border:1px solid var(--border);margin-bottom:20px}
.chart-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
.chart-title{font-size:15px;font-weight:700;color:var(--txt)}
.period-tabs{display:flex;gap:4px}
.period-tab{padding:5px 12px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;border:1.5px solid var(--border);background:transparent;color:var(--txt2);transition:all .2s}
.period-tab.active{background:var(--pink);color:#fff;border-color:var(--pink)}
.top-fans{background:var(--surface);border-radius:var(--radius);padding:20px;border:1px solid var(--border)}
.fan-item{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid #FFF0F5}
.fan-item:last-child{border-bottom:none}
.fan-rank{width:24px;text-align:center;font-size:13px;font-weight:800;color:var(--txt2)}
.fan-rank.top1{color:var(--accent)}
.fan-rank.top2{color:#9E9E9E}
.fan-rank.top3{color:#CD7F32}
.fan-avatar-sm{width:34px;height:34px;border-radius:50%;background:linear-gradient(135deg,#FF6B9D,var(--pink));display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:#fff;flex-shrink:0}
.fan-info{flex:1}
.fan-name{font-size:14px;font-weight:600;color:var(--txt)}
.fan-hearts{font-size:12px;color:var(--txt2);margin-top:1px;display:flex;align-items:center;gap:4px}
.fan-hearts i{font-size:12px;color:var(--pink)}
.fan-amount{font-size:14px;font-weight:700;color:var(--pink)}

/* Charge page */
.charge-header{text-align:center;padding:28px 0 20px;animation:fadeIn .4s ease}
.charge-header-icon{font-size:48px;color:var(--pink);margin-bottom:12px;display:block;animation:heartBeat 2s infinite}
.charge-header-title{font-size:20px;font-weight:800;color:var(--txt);margin-bottom:6px}
.charge-header-sub{font-size:13px;color:var(--txt2)}
.charge-packages{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:28px}
.pkg-card{background:var(--surface);border-radius:var(--radius);padding:22px 16px;text-align:center;cursor:pointer;border:2px solid var(--border);transition:all .25s;position:relative}
.pkg-card:hover{border-color:var(--pink);box-shadow:0 4px 20px rgba(232,48,106,.18)}
.pkg-card.selected{border-color:var(--pink);background:#FFF0F5}
.pkg-card.popular::before{content:'인기';position:absolute;top:-10px;left:50%;transform:translateX(-50%);background:var(--accent);color:#fff;font-size:10px;font-weight:700;padding:3px 10px;border-radius:20px}
.pkg-hearts{font-size:28px;font-weight:800;color:var(--pink);margin-bottom:4px;display:flex;align-items:center;justify-content:center;gap:6px}
.pkg-hearts i{font-size:24px}
.pkg-name{font-size:12px;color:var(--txt2);font-weight:500;margin-bottom:8px}
.pkg-price{font-size:16px;font-weight:700;color:var(--txt)}
.pkg-bonus{font-size:11px;color:var(--accent);font-weight:600;margin-top:4px}
.pay-methods{display:flex;gap:10px;margin-bottom:24px;flex-wrap:wrap}
.pay-method{display:flex;align-items:center;gap:8px;padding:12px 18px;border-radius:12px;border:2px solid var(--border);cursor:pointer;transition:all .2s;background:var(--surface);font-size:13px;font-weight:600;color:var(--txt2)}
.pay-method.selected{border-color:var(--pink);color:var(--pink);background:#FFF0F5}
.pay-method i{font-size:17px}
.charge-cta{text-align:center}
.charge-cta-btn{padding:14px 52px;background:linear-gradient(135deg,var(--pink),#c41d5a);color:#fff;border:none;border-radius:14px;font-size:16px;font-weight:700;cursor:pointer;transition:all .2s;box-shadow:0 4px 20px rgba(232,48,106,.35)}
.charge-cta-btn:hover{transform:translateY(-2px);box-shadow:0 8px 28px rgba(232,48,106,.45)}
.charge-cta-sub{font-size:12px;color:var(--txt2);margin-top:10px}

/* Modal */
.modal-overlay{position:fixed;inset:0;background:rgba(26,10,16,.5);z-index:300;display:flex;align-items:center;justify-content:center;animation:fadeIn .2s ease}
.modal{background:var(--surface);border-radius:20px;padding:28px;max-width:420px;width:90%;max-height:85vh;overflow-y:auto;animation:slideDown .25s ease;position:relative}
.modal-close{position:absolute;top:16px;right:16px;width:30px;height:30px;border-radius:8px;border:none;background:#FFF0F5;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--txt2);font-size:16px;transition:all .2s}
.modal-close:hover{background:#fce4ec;color:var(--pink)}
.modal-title{font-size:17px;font-weight:800;color:var(--txt);margin-bottom:18px;padding-right:40px}
.sponsor-target{display:flex;align-items:center;gap:12px;padding:14px;background:#FFF5F8;border-radius:12px;margin-bottom:18px}
.sponsor-target-avatar{width:44px;height:44px;border-radius:50%;background:linear-gradient(135deg,var(--pink),#c41d5a);display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:800;color:#fff}
.sponsor-target-info .name{font-size:15px;font-weight:700;color:var(--txt)}
.sponsor-target-info .cat{font-size:12px;color:var(--txt2)}
.amount-selector{margin-bottom:16px}
.amount-label{font-size:13px;font-weight:600;color:var(--txt2);margin-bottom:8px}
.amount-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.amt-btn{padding:10px;border-radius:10px;border:1.5px solid var(--border);background:var(--surface);font-size:13px;font-weight:600;cursor:pointer;transition:all .2s;color:var(--txt);display:flex;align-items:center;justify-content:center;gap:4px}
.amt-btn.selected{background:var(--pink);color:#fff;border-color:var(--pink)}
.amt-btn i{font-size:13px}
.msg-input{width:100%;padding:10px 14px;border:1.5px solid var(--border);border-radius:10px;font-size:13px;font-family:inherit;resize:none;height:72px;outline:none;color:var(--txt);margin-top:8px}
.msg-input:focus{border-color:var(--pink)}
.msg-label{font-size:13px;font-weight:600;color:var(--txt2);margin-bottom:8px;display:block;margin-top:14px}
.modal-actions{display:flex;gap:8px;margin-top:20px}
.modal-btn-cancel{flex:1;padding:11px;border-radius:12px;border:1.5px solid var(--border);background:transparent;font-size:14px;font-weight:600;cursor:pointer;color:var(--txt2)}
.modal-btn-confirm{flex:2;padding:11px;border-radius:12px;border:none;background:linear-gradient(135deg,var(--pink),#c41d5a);color:#fff;font-size:14px;font-weight:700;cursor:pointer;transition:all .2s}
.modal-btn-confirm:hover{opacity:.9}
.sponsor-confirm-wrap{text-align:center;padding:12px 0 8px}
.sponsor-confirm-icon{font-size:52px;color:var(--pink);margin-bottom:12px;display:block;animation:heartBeat 1.5s infinite}
.sponsor-confirm-main{font-size:20px;font-weight:800;color:var(--txt);margin-bottom:6px}
.sponsor-confirm-sub{font-size:13px;color:var(--txt2)}
.sponsor-confirm-badge{display:inline-flex;align-items:center;gap:6px;margin:14px auto 0;padding:8px 18px;background:#FFF0F5;border-radius:20px;font-size:14px;font-weight:700;color:var(--pink)}
.sponsor-confirm-badge i{font-size:16px}

/* Detail Drawer */
.drawer-overlay{position:fixed;inset:0;background:rgba(26,10,16,.4);z-index:200;animation:fadeIn .2s ease}
.drawer{position:fixed;top:0;right:0;bottom:0;width:380px;background:var(--surface);z-index:201;padding:28px;overflow-y:auto;animation:slideDown .25s ease;box-shadow:-8px 0 32px rgba(232,48,106,.1)}
.drawer-close{position:absolute;top:18px;right:20px;width:32px;height:32px;border-radius:9px;border:none;background:#FFF0F5;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--txt2);font-size:17px}
.drawer-close:hover{background:#fce4ec;color:var(--pink)}
.drawer-title{font-size:16px;font-weight:800;color:var(--txt);margin-bottom:20px;padding-right:40px}
.detail-row{display:flex;align-items:flex-start;justify-content:space-between;padding:10px 0;border-bottom:1px solid #FFF0F5}
.detail-row:last-child{border-bottom:none}
.detail-key{font-size:13px;color:var(--txt2);font-weight:500}
.detail-val{font-size:13px;color:var(--txt);font-weight:600;text-align:right;max-width:200px}

/* Toast */
.toast-wrap{position:fixed;top:78px;right:24px;z-index:500;display:flex;flex-direction:column;gap:8px}
.toast{display:flex;align-items:center;gap:10px;padding:12px 16px;background:var(--surface);border-radius:12px;box-shadow:0 4px 24px rgba(26,10,16,.15);border:1px solid var(--border);min-width:240px;max-width:320px;animation:toastIn .3s ease}
.toast i{font-size:18px;flex-shrink:0}
.toast.success i{color:#43A047}
.toast.error i{color:#E53935}
.toast.info i{color:var(--pink)}
.toast-content .title{font-size:13px;font-weight:700;color:var(--txt)}
.toast-content .desc{font-size:12px;color:var(--txt2);margin-top:2px}

/* Payment step */
.pay-step-wrap{text-align:center;padding:16px 0}
.pay-loading{display:flex;flex-direction:column;align-items:center;gap:14px}
.pay-spinner{width:48px;height:48px;border:4px solid #FFD6E7;border-top-color:var(--pink);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.pay-loading-txt{font-size:15px;font-weight:600;color:var(--txt)}
.pay-loading-sub{font-size:13px;color:var(--txt2)}
.pay-success-icon{font-size:56px;color:#43A047;animation:heartBeat 1s ease}
.pay-success-title{font-size:19px;font-weight:800;color:var(--txt);margin-top:12px;margin-bottom:6px}
.pay-success-sub{font-size:13px;color:var(--txt2)}
.pay-success-detail{background:#F1F8E9;border-radius:12px;padding:14px 18px;margin:16px 0;text-align:left}
.pay-success-detail-row{display:flex;justify-content:space-between;align-items:center;padding:4px 0}
.pay-success-detail-row span{font-size:13px;color:var(--txt2)}
.pay-success-detail-row strong{font-size:13px;font-weight:700;color:var(--txt)}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useRef} = React;
const {BarChart,Bar,LineChart,Line,ComposedChart,Area,AreaChart,XAxis,YAxis,CartesianGrid,Tooltip,ResponsiveContainer} = Recharts;

const CREATORS = [
  {id:1,initial:'박',name:'박미래',cat:'일러스트',hearts:'2,840',followers:'14.2K',live:true},
  {id:2,initial:'이',name:'이서현',cat:'뮤지션',hearts:'3,120',followers:'22.8K',live:false},
  {id:3,initial:'김',name:'김준호',cat:'게임/BJ',hearts:'1,990',followers:'9.4K',live:true},
  {id:4,initial:'최',name:'최유나',cat:'웹툰작가',hearts:'4,350',followers:'31.5K',live:false},
  {id:5,initial:'정',name:'정태우',cat:'요리/푸드',hearts:'1,660',followers:'7.1K',live:false},
  {id:6,initial:'강',name:'강소영',cat:'뷰티/패션',hearts:'2,210',followers:'18.3K',live:true},
];
const HISTORY_DATA = [
  {id:1,type:'charge',icon:'ph-heart',label:'하트 충전',sub:'토스페이먼츠',amount:'+3,000',status:'done',date:'2026.05.14'},
  {id:2,type:'sponsor',icon:'ph-star',label:'박미래 후원',sub:'응원합니다!',amount:'-500',status:'done',date:'2026.05.13'},
  {id:3,type:'sponsor',icon:'ph-star',label:'이서현 후원',sub:'최고예요 언니',amount:'-200',status:'done',date:'2026.05.12'},
  {id:4,type:'charge',icon:'ph-heart',label:'하트 충전',sub:'토스페이먼츠',amount:'+1,000',status:'done',date:'2026.05.10'},
  {id:5,type:'refund',icon:'ph-arrow-counter-clockwise',label:'환불 처리',sub:'이벤트 취소',amount:'+200',status:'done',date:'2026.05.09'},
  {id:6,type:'sponsor',icon:'ph-star',label:'최유나 후원',sub:'연재 응원해요!',amount:'-100',status:'done',date:'2026.05.08'},
  {id:7,type:'sponsor',icon:'ph-star',label:'강소영 후원',sub:'화이팅~',amount:'-300',status:'done',date:'2026.05.07'},
  {id:8,type:'charge',icon:'ph-heart',label:'하트 충전',sub:'카카오페이',amount:'+2,000',status:'done',date:'2026.05.05'},
];
const EARNINGS_DATA = [
  {day:'5/8',hearts:240},{day:'5/9',hearts:320},{day:'5/10',hearts:180},
  {day:'5/11',hearts:560},{day:'5/12',hearts:430},{day:'5/13',hearts:680},{day:'5/14',hearts:520},
];
const TOP_FANS = [
  {initial:'김',name:'김민수',total:'3,200',rank:1},
  {initial:'이',name:'이지은',total:'2,850',rank:2},
  {initial:'박',name:'박현준',total:'1,940',rank:3},
  {initial:'최',name:'최서연',total:'1,430',rank:4},
  {initial:'오',name:'오승민',total:'980',rank:5},
];
const PACKAGES = [
  {hearts:500,name:'스타터',price:'990원',bonus:'',popular:false},
  {hearts:2000,name:'팬클럽',price:'3,900원',bonus:'+200 보너스',popular:true},
  {hearts:5000,name:'서포터',price:'9,500원',bonus:'+600 보너스',popular:false},
  {hearts:10000,name:'골드팬',price:'18,000원',bonus:'+1,500 보너스',popular:false},
  {hearts:30000,name:'다이아',price:'49,000원',bonus:'+5,000 보너스',popular:false},
  {hearts:100000,name:'레전드',price:'150,000원',bonus:'+20,000 보너스',popular:false},
];

function App(){
  const [tab,setTab]=useState('main');
  const [toasts,setToasts]=useState([]);
  const [modal,setModal]=useState(null);
  const [drawer,setDrawer]=useState(null);
  const [balance,setBalance]=useState(5240);
  const [selectedCreator,setSelectedCreator]=useState(null);
  const [sponsorAmt,setSponsorAmt]=useState(100);
  const [sponsorMsg,setSponsorMsg]=useState('');
  const [sponsorStep,setSponsorStep]=useState('form');
  const [selectedPkg,setSelectedPkg]=useState(1);
  const [payMethod,setPayMethod]=useState('toss');
  const [payStep,setPayStep]=useState('select');
  const [histFilter,setHistFilter]=useState('all');
  const [period,setPeriod]=useState('7일');
  const [filterCat,setFilterCat]=useState('전체');

  const addToast=(type,title,desc)=>{
    const id=Date.now();
    setToasts(p=>[...p,{id,type,title,desc}]);
    setTimeout(()=>setToasts(p=>p.filter(t=>t.id!==id)),3200);
  };

  const openSponsor=(creator)=>{
    setSelectedCreator(creator);
    setSponsorAmt(100);
    setSponsorMsg('');
    setSponsorStep('form');
    setModal('sponsor');
  };
  const doSponsor=()=>{
    if(balance<sponsorAmt){addToast('error','잔액 부족','하트가 부족합니다. 충전 후 후원해주세요.');return;}
    setBalance(p=>p-sponsorAmt);
    setSponsorStep('done');
    setTimeout(()=>{
      setModal(null);
      addToast('success','후원 완료!',`${selectedCreator?.name}님께 ♥ ${sponsorAmt.toLocaleString()} 하트를 전달했습니다.`);
    },2200);
  };
  const doCharge=()=>{
    const pkg=PACKAGES[selectedPkg];
    setPayStep('loading');
    setTimeout(()=>setPayStep('done'),2000);
  };
  const finishCharge=()=>{
    const bonus=PACKAGES[selectedPkg].bonus?parseInt(PACKAGES[selectedPkg].bonus.replace(/[^0-9]/g,'')):0;
    setBalance(p=>p+PACKAGES[selectedPkg].hearts+bonus);
    setModal(null);
    setPayStep('select');
    addToast('success','충전 완료!',`♥ ${(PACKAGES[selectedPkg].hearts+(bonus||0)).toLocaleString()} 하트가 충전되었습니다.`);
  };

  const filteredHistory=HISTORY_DATA.filter(h=>histFilter==='all'||h.type===histFilter);
  const filteredCreators=CREATORS.filter(c=>filterCat==='전체'||c.cat===filterCat);

  return (
    <div style={{width:'100%',minHeight:'100vh',background:'#FFF5F8'}}>
      {/* Topnav */}
      <nav className="topnav">
        <div className="topnav-logo" onClick={()=>setTab('main')}>
          <i className="ph ph-heart-fill"></i>
          HeartFan
        </div>
        <div className="nav-tabs">
          {[
            {key:'main',icon:'ph ph-house',label:'홈'},
            {key:'sponsor',icon:'ph ph-heart',label:'후원하기'},
            {key:'history',icon:'ph ph-clock-clockwise',label:'내역'},
            {key:'earnings',icon:'ph ph-chart-bar',label:'수익 현황'},
          ].map(t=>(
            <button key={t.key} className={`nav-tab${tab===t.key?' active':''}`} onClick={()=>setTab(t.key)}>
              <i className={t.icon}></i>{t.label}
            </button>
          ))}
        </div>
        <div className="topnav-right">
          <div className="heart-balance-chip">
            <i className="ph ph-heart-fill"></i>
            {balance.toLocaleString()}
          </div>
          <button className="charge-btn" onClick={()=>{setPayStep('select');setModal('charge')}}>
            <i className="ph ph-plus-circle"></i>하트 충전
          </button>
          <div className="avatar-chip">김</div>
        </div>
      </nav>

      <div className="main-wrap">
        {/* ===== HOME ===== */}
        <div className={`page${tab==='main'?' active':''}`}>
          <div className="hero">
            <div className="hero-inner">
              <div className="hero-text fade-in">
                <div className="hero-greeting">안녕하세요, 김지민님</div>
                <div className="hero-title">좋아하는 크리에이터를<br/><span>하트</span>로 응원하세요</div>
                <div className="hero-sub">하트를 충전하고 크리에이터에게 직접<br/>후원 메시지와 함께 전달할 수 있어요.</div>
              </div>
              <div className="hero-balance-card fade-in">
                <div className="hero-balance-label">내 하트 잔액</div>
                <div className="hero-balance-val">
                  <i className="ph ph-heart-fill"></i>
                  {balance.toLocaleString()}
                </div>
                <div className="hero-balance-actions">
                  <button className="hb-action primary" onClick={()=>{setTab('sponsor')}}>후원하기</button>
                  <button className="hb-action outline" onClick={()=>{setPayStep('select');setModal('charge')}}>충전</button>
                </div>
              </div>
            </div>
          </div>
          <div className="section">
            <div className="section-header">
              <div className="section-title"><i className="ph ph-fire"></i>인기 크리에이터</div>
              <div className="section-more" onClick={()=>setTab('sponsor')}>전체 보기</div>
            </div>
            <div className="creator-grid">
              {CREATORS.map(c=>(
                <div key={c.id} className="creator-card fade-in" onClick={()=>openSponsor(c)}>
                  <div className="creator-avatar">
                    {c.initial}
                    {c.live&&<span className="creator-live">LIVE</span>}
                  </div>
                  <div className="creator-name">{c.name}</div>
                  <div className="creator-category">{c.cat}</div>
                  <div className="creator-hearts">
                    <i className="ph ph-heart-fill"></i>{c.hearts} 이번 달
                  </div>
                  <button className="sponsor-quick-btn">후원하기</button>
                </div>
              ))}
            </div>
          </div>
        </div>

        {/* ===== SPONSOR ===== */}
        <div className={`page${tab==='sponsor'?' active':''}`}>
          <div className="section">
            <div style={{paddingBottom:'8px',borderBottom:'1px solid #F3C6D4',marginBottom:'20px'}}>
              <div style={{fontSize:'20px',fontWeight:'800',color:'var(--txt)'}}>크리에이터 후원하기</div>
              <div style={{fontSize:'13px',color:'var(--txt2)',marginTop:'4px'}}>응원하는 크리에이터에게 하트와 메시지를 전달하세요</div>
            </div>
            <div className="sponsor-search">
              <input className="sponsor-search-input" placeholder="크리에이터 이름 검색..." defaultValue=""/>
              <button style={{padding:'11px 18px',background:'var(--pink)',color:'#fff',border:'none',borderRadius:'12px',font:'600 14px Pretendard',cursor:'pointer'}}>
                <i className="ph ph-magnifying-glass" style={{fontSize:'16px'}}></i>
              </button>
            </div>
            <div className="sponsor-filter-wrap">
              {['전체','일러스트','뮤지션','게임/BJ','웹툰작가','요리/푸드','뷰티/패션'].map(cat=>(
                <div key={cat} className={`filter-pill${filterCat===cat?' active':''}`} onClick={()=>setFilterCat(cat)}>{cat}</div>
              ))}
            </div>
            {filteredCreators.map(c=>(
              <div key={c.id} className="creator-list-item" onClick={()=>openSponsor(c)}>
                <div className="cli-avatar">{c.initial}</div>
                <div className="cli-info">
                  <div className="cli-name">{c.name} {c.live&&<span style={{background:'#E8306A',color:'#fff',fontSize:'10px',fontWeight:'700',padding:'2px 6px',borderRadius:'4px',marginLeft:'4px'}}>LIVE</span>}</div>
                  <div className="cli-desc">{c.cat}</div>
                </div>
                <div className="cli-stats">
                  <div className="cli-stat"><i className="ph ph-users"></i>{c.followers}</div>
                  <div className="cli-stat"><i className="ph ph-heart-fill"></i>{c.hearts}</div>
                </div>
                <button className="cli-btn" onClick={e=>{e.stopPropagation();openSponsor(c)}}>후원하기</button>
              </div>
            ))}
          </div>
        </div>

        {/* ===== HISTORY ===== */}
        <div className={`page${tab==='history'?' active':''}`}>
          <div className="section">
            <div style={{paddingBottom:'8px',borderBottom:'1px solid #F3C6D4',marginBottom:'20px'}}>
              <div style={{fontSize:'20px',fontWeight:'800',color:'var(--txt)'}}>내역</div>
              <div style={{fontSize:'13px',color:'var(--txt2)',marginTop:'4px'}}>하트 충전 및 후원 내역을 확인하세요</div>
            </div>
            <div className="history-stats">
              <div className="hist-stat-card">
                <div className="hist-stat-label">이번 달 충전</div>
                <div className="hist-stat-val"><i className="ph ph-heart-fill"></i>6,000</div>
              </div>
              <div className="hist-stat-card">
                <div className="hist-stat-label">이번 달 후원</div>
                <div className="hist-stat-val"><i className="ph ph-star-fill" style={{color:'var(--accent)'}}></i>1,100</div>
              </div>
              <div className="hist-stat-card">
                <div className="hist-stat-label">현재 잔액</div>
                <div className="hist-stat-val"><i className="ph ph-wallet"></i>{balance.toLocaleString()}</div>
              </div>
            </div>
            <div className="hist-filter-row">
              {[{key:'all',label:'전체'},{key:'charge',label:'충전'},{key:'sponsor',label:'후원'},{key:'refund',label:'환불'}].map(f=>(
                <div key={f.key} className={`hist-filter${histFilter===f.key?' active':''}`} onClick={()=>setHistFilter(f.key)}>{f.label}</div>
              ))}
            </div>
            <div className="hist-table">
              <div className="hist-thead">
                <div>내용</div><div>금액</div><div>상태</div><div>날짜</div>
              </div>
              {filteredHistory.map(h=>(
                <div key={h.id} className="hist-row" onClick={()=>setDrawer(h)}>
                  <div className="hist-row-icon">
                    <div className={`hist-icon ${h.type}`}><i className={`ph ${h.icon}-fill`}></i></div>
                    <div>
                      <div className="hist-txt-main">{h.label}</div>
                      <div className="hist-txt-sub">{h.sub}</div>
                    </div>
                  </div>
                  <div className={`hist-amount ${h.amount.startsWith('+')?'plus':'minus'}`}>{h.amount}</div>
                  <div><span className="hist-status done">완료</span></div>
                  <div className="hist-date">{h.date}</div>
                </div>
              ))}
            </div>
          </div>
        </div>

        {/* ===== EARNINGS ===== */}
        <div className={`page${tab==='earnings'?' active':''}`}>
          <div className="section">
            <div style={{paddingBottom:'8px',borderBottom:'1px solid #F3C6D4',marginBottom:'24px'}}>
              <div style={{fontSize:'20px',fontWeight:'800',color:'var(--txt)'}}>수익 현황</div>
              <div style={{fontSize:'13px',color:'var(--txt2)',marginTop:'4px'}}>후원 수익과 정산 예정액을 확인하세요</div>
            </div>
            <div className="earnings-kpi">
              <div className="kpi-card">
                <div className="kpi-label"><i className="ph ph-heart-fill"></i>총 누적 후원</div>
                <div className="kpi-val">42,380</div>
                <div className="kpi-sub">전월 대비 +2,140</div>
              </div>
              <div className="kpi-card">
                <div className="kpi-label"><i className="ph ph-calendar"></i>이번 달 후원</div>
                <div className="kpi-val">2,930</div>
                <div className="kpi-sub">2026년 5월</div>
              </div>
              <div className="kpi-card">
                <div className="kpi-label"><i className="ph ph-bank"></i>정산 예정액</div>
                <div className="kpi-val">38,700원</div>
                <div className="kpi-sub">5월 말 정산</div>
              </div>
              <div className="kpi-card">
                <div className="kpi-label"><i className="ph ph-users"></i>후원자 수</div>
                <div className="kpi-val">87명</div>
                <div className="kpi-sub">이번 달 기준</div>
              </div>
            </div>
            <div className="chart-container">
              <div className="chart-header">
                <div className="chart-title">일별 후원 추세</div>
                <div className="period-tabs">
                  {['7일','30일','90일'].map(p=>(
                    <button key={p} className={`period-tab${period===p?' active':''}`} onClick={()=>setPeriod(p)}>{p}</button>
                  ))}
                </div>
              </div>
              <div style={{height:'220px'}}>
                <ResponsiveContainer width="100%" height="100%">
                  <ComposedChart data={EARNINGS_DATA}>
                    <CartesianGrid strokeDasharray="3 3" stroke="#F3C6D4" vertical={false}/>
                    <XAxis dataKey="day" tick={{fontSize:12,fill:'#7A3F55'}} axisLine={false} tickLine={false}/>
                    <YAxis tick={{fontSize:12,fill:'#7A3F55'}} axisLine={false} tickLine={false}/>
                    <Tooltip contentStyle={{borderRadius:'10px',border:'1px solid #F3C6D4',background:'#fff',fontSize:'12px'}}/>
                    <Bar dataKey="hearts" name="후원 하트" fill="#E8306A" radius={[6,6,0,0]} maxBarSize={36}/>
                    <Line type="monotone" dataKey="hearts" stroke="#FFB347" strokeWidth={2.5} dot={false}/>
                  </ComposedChart>
                </ResponsiveContainer>
              </div>
            </div>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'16px'}}>
              <div className="top-fans">
                <div className="section-header" style={{marginBottom:'14px'}}>
                  <div className="section-title" style={{fontSize:'14px'}}><i className="ph ph-crown-simple"></i>상위 후원자 TOP 5</div>
                </div>
                {TOP_FANS.map(f=>(
                  <div key={f.rank} className="fan-item">
                    <div className={`fan-rank top${f.rank}`}>{f.rank}</div>
                    <div className="fan-avatar-sm">{f.initial}</div>
                    <div className="fan-info">
                      <div className="fan-name">{f.name}</div>
                      <div className="fan-hearts"><i className="ph ph-heart-fill"></i>{f.total}</div>
                    </div>
                    <div className="fan-amount">{f.total}</div>
                  </div>
                ))}
              </div>
              <div className="top-fans">
                <div className="section-header" style={{marginBottom:'14px'}}>
                  <div className="section-title" style={{fontSize:'14px'}}><i className="ph ph-clock"></i>최근 후원 내역</div>
                </div>
                {[
                  {name:'김민수',hearts:500,msg:'오늘도 화이팅!',time:'5분 전'},
                  {name:'이지은',hearts:200,msg:'응원합니다',time:'23분 전'},
                  {name:'박현준',hearts:100,msg:'좋은 작품 감사해요',time:'1시간 전'},
                  {name:'최서연',hearts:300,msg:'항상 응원해요',time:'2시간 전'},
                  {name:'오승민',hearts:50,msg:'',time:'3시간 전'},
                ].map((r,i)=>(
                  <div key={i} className="fan-item">
                    <div className="fan-avatar-sm">{r.name[0]}</div>
                    <div className="fan-info">
                      <div className="fan-name">{r.name}</div>
                      <div style={{fontSize:'11px',color:'var(--txt2)',marginTop:'1px'}}>{r.msg||'—'}</div>
                    </div>
                    <div style={{textAlign:'right'}}>
                      <div className="fan-amount">♥ {r.hearts}</div>
                      <div style={{fontSize:'11px',color:'var(--txt2)',marginTop:'2px'}}>{r.time}</div>
                    </div>
                  </div>
                ))}
              </div>
            </div>
          </div>
        </div>
      </div>

      {/* ===== SPONSOR MODAL ===== */}
      {modal==='sponsor'&&(
        <div className="modal-overlay" onClick={()=>setModal(null)}>
          <div className="modal" onClick={e=>e.stopPropagation()}>
            <button className="modal-close" onClick={()=>setModal(null)}><i className="ph ph-x"></i></button>
            {sponsorStep==='form'&&(
              <>
                <div className="modal-title">크리에이터 후원하기</div>
                <div className="sponsor-target">
                  <div className="sponsor-target-avatar">{selectedCreator?.initial}</div>
                  <div className="sponsor-target-info">
                    <div className="name">{selectedCreator?.name}</div>
                    <div className="cat">{selectedCreator?.cat}</div>
                  </div>
                </div>
                <div className="amount-selector">
                  <div className="amount-label">후원 하트 선택</div>
                  <div className="amount-grid">
                    {[50,100,200,500,1000,2000].map(a=>(
                      <button key={a} className={`amt-btn${sponsorAmt===a?' selected':''}`} onClick={()=>setSponsorAmt(a)}>
                        <i className="ph ph-heart-fill"></i>{a.toLocaleString()}
                      </button>
                    ))}
                  </div>
                </div>
                <label className="msg-label">응원 메시지 (선택)</label>
                <textarea className="msg-input" placeholder="크리에이터에게 전할 메시지를 입력해주세요" value={sponsorMsg} onChange={e=>setSponsorMsg(e.target.value)}></textarea>
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'12px 0 4px',fontSize:'13px'}}>
                  <span style={{color:'var(--txt2)'}}>보유 하트</span>
                  <span style={{fontWeight:'700',color:'var(--pink)',display:'flex',alignItems:'center',gap:'4px'}}>
                    <i className="ph ph-heart-fill" style={{fontSize:'14px'}}></i>{balance.toLocaleString()}
                  </span>
                </div>
                <div className="modal-actions">
                  <button className="modal-btn-cancel" onClick={()=>setModal(null)}>취소</button>
                  <button className="modal-btn-confirm" onClick={doSponsor}>
                    ♥ {sponsorAmt.toLocaleString()} 하트 후원
                  </button>
                </div>
              </>
            )}
            {sponsorStep==='done'&&(
              <div className="sponsor-confirm-wrap">
                <i className="ph ph-heart-fill sponsor-confirm-icon"></i>
                <div className="sponsor-confirm-main">후원이 전달되었습니다!</div>
                <div className="sponsor-confirm-sub">{selectedCreator?.name}님께 메시지가 전달됩니다</div>
                {sponsorMsg&&<div style={{margin:'12px 0',padding:'10px 14px',background:'#FFF0F5',borderRadius:'10px',fontSize:'13px',color:'var(--txt2)',fontStyle:'italic'}}>"{sponsorMsg}"</div>}
                <div className="sponsor-confirm-badge"><i className="ph ph-heart-fill"></i>♥ {sponsorAmt.toLocaleString()} 하트</div>
              </div>
            )}
          </div>
        </div>
      )}

      {/* ===== CHARGE MODAL ===== */}
      {modal==='charge'&&(
        <div className="modal-overlay" onClick={()=>{setModal(null);setPayStep('select')}}>
          <div className="modal" style={{maxWidth:'520px'}} onClick={e=>e.stopPropagation()}>
            <button className="modal-close" onClick={()=>{setModal(null);setPayStep('select')}}><i className="ph ph-x"></i></button>
            {payStep==='select'&&(
              <>
                <div className="charge-header">
                  <i className="ph ph-heart-fill charge-header-icon"></i>
                  <div className="charge-header-title">하트 충전</div>
                  <div className="charge-header-sub">원하는 하트 패키지를 선택해주세요</div>
                </div>
                <div className="charge-packages">
                  {PACKAGES.map((p,i)=>(
                    <div key={i} className={`pkg-card${selectedPkg===i?' selected':''}${p.popular?' popular':''}`} onClick={()=>setSelectedPkg(i)}>
                      <div className="pkg-hearts"><i className="ph ph-heart-fill"></i>{p.hearts.toLocaleString()}</div>
                      <div className="pkg-name">{p.name}</div>
                      <div className="pkg-price">{p.price}</div>
                      {p.bonus&&<div className="pkg-bonus">{p.bonus}</div>}
                    </div>
                  ))}
                </div>
                <div style={{marginBottom:'12px',fontSize:'13px',fontWeight:'600',color:'var(--txt2)'}}>결제 수단</div>
                <div className="pay-methods">
                  {[
                    {key:'toss',icon:'ph ph-bolt',label:'토스페이'},
                    {key:'kakao',icon:'ph ph-chat-circle',label:'카카오페이'},
                    {key:'card',icon:'ph ph-credit-card',label:'신용카드'},
                  ].map(m=>(
                    <div key={m.key} className={`pay-method${payMethod===m.key?' selected':''}`} onClick={()=>setPayMethod(m.key)}>
                      <i className={m.icon}></i>{m.label}
                    </div>
                  ))}
                </div>
                <div className="charge-cta">
                  <button className="charge-cta-btn" onClick={doCharge}>
                    {PACKAGES[selectedPkg].price} 결제하기
                  </button>
                  <div className="charge-cta-sub">토스페이먼츠 보안 결제 · 즉시 충전</div>
                </div>
              </>
            )}
            {payStep==='loading'&&(
              <div className="pay-step-wrap">
                <div className="pay-loading">
                  <div className="pay-spinner"></div>
                  <div className="pay-loading-txt">결제 처리 중...</div>
                  <div className="pay-loading-sub">잠시만 기다려주세요</div>
                </div>
              </div>
            )}
            {payStep==='done'&&(
              <div className="pay-step-wrap">
                <i className="ph ph-check-circle pay-success-icon" style={{fontSize:'56px',color:'#43A047'}}></i>
                <div className="pay-success-title">충전 완료!</div>
                <div className="pay-success-sub">하트가 성공적으로 충전되었습니다</div>
                <div className="pay-success-detail">
                  <div className="pay-success-detail-row"><span>충전 패키지</span><strong>{PACKAGES[selectedPkg].name}</strong></div>
                  <div className="pay-success-detail-row"><span>충전 하트</span><strong>♥ {PACKAGES[selectedPkg].hearts.toLocaleString()}</strong></div>
                  {PACKAGES[selectedPkg].bonus&&<div className="pay-success-detail-row"><span>보너스</span><strong style={{color:'var(--accent)'}}>{PACKAGES[selectedPkg].bonus}</strong></div>}
                  <div className="pay-success-detail-row"><span>결제 금액</span><strong>{PACKAGES[selectedPkg].price}</strong></div>
                </div>
                <button style={{width:'100%',padding:'12px',background:'var(--pink)',color:'#fff',border:'none',borderRadius:'12px',font:'700 14px Pretendard',cursor:'pointer'}} onClick={finishCharge}>확인</button>
              </div>
            )}
          </div>
        </div>
      )}

      {/* ===== HISTORY DETAIL DRAWER ===== */}
      {drawer&&(
        <>
          <div className="drawer-overlay" onClick={()=>setDrawer(null)}></div>
          <div className="drawer">
            <button className="drawer-close" onClick={()=>setDrawer(null)}><i className="ph ph-x"></i></button>
            <div className="drawer-title">거래 상세 내역</div>
            <div style={{display:'flex',alignItems:'center',gap:'12px',padding:'14px',background:'#FFF5F8',borderRadius:'12px',marginBottom:'20px'}}>
              <div className={`hist-icon ${drawer.type}`} style={{width:'40px',height:'40px',borderRadius:'12px',fontSize:'18px'}}><i className={`ph ${drawer.icon}-fill`}></i></div>
              <div>
                <div style={{fontSize:'15px',fontWeight:'700',color:'var(--txt)'}}>{drawer.label}</div>
                <div style={{fontSize:'12px',color:'var(--txt2)',marginTop:'2px'}}>{drawer.sub}</div>
              </div>
            </div>
            {[
              {key:'거래 유형',val:drawer.type==='charge'?'하트 충전':drawer.type==='sponsor'?'크리에이터 후원':'환불'},
              {key:'하트 수량',val:drawer.amount},
              {key:'거래 상태',val:'완료'},
              {key:'거래 일시',val:drawer.date+' 14:32'},
              {key:'거래 ID',val:'TXN-2026-'+Math.floor(Math.random()*900000+100000)},
              {key:'결제 수단',val:drawer.type==='charge'?'토스페이먼츠':'—'},
            ].map(r=>(
              <div key={r.key} className="detail-row">
                <span className="detail-key">{r.key}</span>
                <span className="detail-val">{r.val}</span>
              </div>
            ))}
            <div style={{marginTop:'20px',display:'flex',gap:'8px'}}>
              <button style={{flex:1,padding:'11px',border:'1.5px solid var(--border)',borderRadius:'12px',background:'transparent',font:'600 13px Pretendard',cursor:'pointer',color:'var(--txt2)'}} onClick={()=>setDrawer(null)}>닫기</button>
              {drawer.type==='sponsor'&&<button style={{flex:2,padding:'11px',background:'var(--pink)',color:'#fff',border:'none',borderRadius:'12px',font:'600 13px Pretendard',cursor:'pointer'}} onClick={()=>{setDrawer(null);addToast('info','영수증','영수증이 이메일로 발송됩니다.')}}>영수증 발송</button>}
            </div>
          </div>
        </>
      )}

      {/* TOASTS */}
      <div className="toast-wrap">
        {toasts.map(t=>(
          <div key={t.id} className={`toast ${t.type}`}>
            <i className={`ph ${t.type==='success'?'ph-check-circle-fill':t.type==='error'?'ph-x-circle-fill':'ph-info-fill'}`}></i>
            <div className="toast-content">
              <div className="title">{t.title}</div>
              {t.desc&&<div className="desc">{t.desc}</div>}
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
