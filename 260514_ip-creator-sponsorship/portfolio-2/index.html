<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>크리에이터 수익화 통합 플랫폼 — 구현 데모</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://unpkg.com/prop-types/prop-types.min.js"></script>

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body,#root{width:100%;min-height:100vh;font-family:'Pretendard',sans-serif;background:#0F0A1E;color:#F0EAFF}
:root{
  --purple:#6C3FC5;--purple2:#9B6EE8;--mint:#34D4A0;
  --bg:#0F0A1E;--surface:#1C1432;--surface2:#241852;
  --txt:#F0EAFF;--txt2:#9B8FC0;
  --border:#2E1F5A;--radius:8px;
}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideRight{from{opacity:0;transform:translateX(-14px)}to{opacity:1;transform:translateX(0)}}
@keyframes glowPulse{0%,100%{box-shadow:0 0 0 0 rgba(108,63,197,.4)}50%{box-shadow:0 0 0 8px rgba(108,63,197,0)}}
@keyframes toastSlide{from{opacity:0;transform:translateX(50px)}to{opacity:1;transform:translateX(0)}}
@keyframes countUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
@keyframes barFill{from{width:0}to{width:var(--w)}}
@keyframes spinLoop{to{transform:rotate(360deg)}}
@keyframes shimmerDark{0%{background-position:-200% 0}100%{background-position:200% 0}}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.4}}

.fade-in{animation:fadeIn .3s ease forwards}
.slide-right{animation:slideRight .3s ease forwards}

/* Global Nav */
.gnav{position:fixed;top:0;left:0;right:0;z-index:100;height:60px;background:rgba(15,10,30,.9);backdrop-filter:blur(16px);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 24px;gap:8px}
.gnav-logo{display:flex;align-items:center;gap:8px;font-size:17px;font-weight:800;color:#F0EAFF;cursor:pointer;margin-right:20px;flex-shrink:0}
.gnav-logo-dot{width:8px;height:8px;border-radius:50%;background:var(--mint);margin-left:2px;animation:blink 2s infinite}
.gnav-tabs{display:flex;gap:2px;flex:1}
.gnav-tab{display:flex;align-items:center;gap:6px;padding:7px 14px;border-radius:6px;font-size:13px;font-weight:500;color:var(--txt2);cursor:pointer;transition:all .2s;background:transparent;border:none;white-space:nowrap}
.gnav-tab:hover{color:var(--txt);background:rgba(108,63,197,.18)}
.gnav-tab.active{background:rgba(108,63,197,.28);color:#F0EAFF;font-weight:600}
.gnav-tab i{font-size:16px}
.gnav-right{display:flex;align-items:center;gap:10px}
.gnav-badge{display:flex;align-items:center;gap:5px;padding:5px 12px;background:rgba(52,212,160,.12);border:1px solid rgba(52,212,160,.25);border-radius:20px;font-size:12px;font-weight:600;color:var(--mint)}
.gnav-avatar{width:32px;height:32px;border-radius:6px;background:linear-gradient(135deg,var(--purple),var(--purple2));display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:#fff;cursor:pointer}

/* Main wrap */
.main-wrap{padding-top:60px;min-height:100vh;width:100%}
.page{display:none;animation:fadeIn .3s ease}
.page.active{display:block}
.section{max-width:1080px;margin:0 auto;padding:28px 24px}
.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
.section-title{font-size:16px;font-weight:700;color:var(--txt);display:flex;align-items:center;gap:8px}
.section-title i{font-size:17px;color:var(--purple2)}

/* KPI Grid */
.kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:24px}
.kpi-card{background:var(--surface);border-radius:var(--radius);padding:16px 18px;border:1px solid var(--border);animation:countUp .5s ease both}
.kpi-card:nth-child(1){animation-delay:.05s}
.kpi-card:nth-child(2){animation-delay:.1s}
.kpi-card:nth-child(3){animation-delay:.15s}
.kpi-card:nth-child(4){animation-delay:.2s}
.kpi-label{font-size:11px;color:var(--txt2);font-weight:500;margin-bottom:5px;display:flex;align-items:center;gap:4px}
.kpi-label i{font-size:13px;color:var(--purple2)}
.kpi-val{font-size:22px;font-weight:800;color:var(--txt)}
.kpi-sub{font-size:11px;color:var(--txt2);margin-top:3px}
.kpi-card.highlight .kpi-val{color:var(--mint)}

/* Chart box */
.chart-box{background:var(--surface);border-radius:var(--radius);padding:20px;border:1px solid var(--border);margin-bottom:16px}
.chart-box-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.chart-box-title{font-size:14px;font-weight:700;color:var(--txt)}
.period-tabs{display:flex;gap:4px}
.period-tab{padding:4px 10px;border-radius:5px;font-size:11px;font-weight:600;cursor:pointer;border:1px solid var(--border);background:transparent;color:var(--txt2);transition:all .2s}
.period-tab.active{background:var(--purple);color:#fff;border-color:var(--purple)}

/* Table */
.data-table{background:var(--surface);border-radius:var(--radius);overflow:hidden;border:1px solid var(--border)}
.table-head{display:grid;padding:11px 16px;background:var(--surface2);font-size:11px;font-weight:700;color:var(--txt2);border-bottom:1px solid var(--border);letter-spacing:.04em}
.table-row{display:grid;padding:12px 16px;border-bottom:1px solid rgba(46,31,90,.6);cursor:pointer;transition:all .18s;align-items:center}
.table-row:last-child{border-bottom:none}
.table-row:hover{background:rgba(108,63,197,.1)}
.badge{display:inline-flex;align-items:center;gap:4px;padding:3px 8px;border-radius:4px;font-size:11px;font-weight:600}
.badge.green{background:rgba(52,212,160,.15);color:var(--mint)}
.badge.yellow{background:rgba(255,183,77,.15);color:#FFB74D}
.badge.red{background:rgba(244,67,54,.15);color:#F44336}
.badge.blue{background:rgba(108,63,197,.2);color:var(--purple2)}
.badge.grey{background:rgba(155,143,192,.15);color:var(--txt2)}

/* Settlement page */
.settle-creator-row{grid-template-columns:2fr 1fr 1fr 1fr 80px 80px}
.settle-header{grid-template-columns:2fr 1fr 1fr 1fr 80px 80px}

/* Analytics page */
.analytics-tabs{display:flex;gap:6px;margin-bottom:20px}
.analytics-tab{padding:8px 16px;border-radius:6px;font-size:13px;font-weight:600;cursor:pointer;border:1px solid var(--border);background:transparent;color:var(--txt2);transition:all .2s}
.analytics-tab.active{background:var(--purple);color:#fff;border-color:var(--purple)}
.segment-card{background:var(--surface);border-radius:var(--radius);padding:16px;border:1px solid var(--border)}
.segment-bar-wrap{margin-bottom:10px}
.segment-bar-label{display:flex;justify-content:space-between;align-items:center;margin-bottom:5px;font-size:12px}
.segment-bar-label span:first-child{color:var(--txt2)}
.segment-bar-label span:last-child{color:var(--txt);font-weight:700}
.segment-bar-track{height:7px;background:rgba(155,143,192,.2);border-radius:4px;overflow:hidden}
.segment-bar-fill{height:100%;border-radius:4px;transition:width .6s ease}

/* Users page */
.users-head{grid-template-columns:2fr 1fr 80px 100px 80px}
.users-row{grid-template-columns:2fr 1fr 80px 100px 80px}
.user-cell-name{display:flex;align-items:center;gap:10px}
.user-avatar-mini{width:30px;height:30px;border-radius:5px;background:linear-gradient(135deg,var(--purple),var(--purple2));display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#fff;flex-shrink:0}

/* Notifications page */
.notif-rule-card{background:var(--surface);border-radius:var(--radius);padding:16px 18px;border:1px solid var(--border);margin-bottom:10px;display:flex;align-items:center;gap:14px;cursor:pointer;transition:all .2s}
.notif-rule-card:hover{border-color:var(--purple);background:rgba(108,63,197,.08)}
.notif-rule-icon{width:38px;height:38px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.notif-rule-icon.purple{background:rgba(108,63,197,.2);color:var(--purple2)}
.notif-rule-icon.mint{background:rgba(52,212,160,.15);color:var(--mint)}
.notif-rule-icon.yellow{background:rgba(255,183,77,.15);color:#FFB74D}
.notif-rule-icon.red{background:rgba(244,67,54,.15);color:#F44336}
.notif-rule-info{flex:1}
.notif-rule-name{font-size:14px;font-weight:600;color:var(--txt);margin-bottom:3px}
.notif-rule-desc{font-size:12px;color:var(--txt2)}
.toggle-wrap{display:flex;align-items:center;gap:8px;flex-shrink:0}
.toggle{width:40px;height:22px;border-radius:11px;cursor:pointer;transition:all .2s;position:relative;flex-shrink:0}
.toggle.on{background:var(--mint)}
.toggle.off{background:rgba(155,143,192,.3)}
.toggle::after{content:'';position:absolute;top:3px;width:16px;height:16px;border-radius:50%;background:#fff;transition:all .2s}
.toggle.on::after{left:21px}
.toggle.off::after{left:3px}

/* Modal */
.modal-overlay{position:fixed;inset:0;background:rgba(5,2,14,.7);z-index:300;display:flex;align-items:center;justify-content:center;animation:fadeIn .2s ease}
.modal{background:#1C1432;border-radius:12px;padding:24px;max-width:460px;width:90%;max-height:85vh;overflow-y:auto;animation:fadeIn .25s ease;position:relative;border:1px solid var(--border)}
.modal-close{position:absolute;top:14px;right:14px;width:28px;height:28px;border-radius:6px;border:none;background:var(--surface2);cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--txt2);font-size:15px;transition:all .2s}
.modal-close:hover{background:rgba(108,63,197,.3);color:var(--txt)}
.modal-title{font-size:16px;font-weight:700;color:var(--txt);margin-bottom:16px;padding-right:36px}
.form-label{font-size:12px;font-weight:600;color:var(--txt2);margin-bottom:5px;display:block;margin-top:12px}
.form-input{width:100%;padding:9px 12px;background:var(--surface2);border:1px solid var(--border);border-radius:6px;font-size:13px;color:var(--txt);font-family:inherit;outline:none;transition:all .2s}
.form-input:focus{border-color:var(--purple)}
.form-select{width:100%;padding:9px 12px;background:var(--surface2);border:1px solid var(--border);border-radius:6px;font-size:13px;color:var(--txt);font-family:inherit;outline:none;appearance:none}
.form-select option{background:#1C1432}
.form-textarea{width:100%;padding:9px 12px;background:var(--surface2);border:1px solid var(--border);border-radius:6px;font-size:13px;color:var(--txt);font-family:inherit;outline:none;resize:none;height:72px}
.form-textarea:focus{border-color:var(--purple)}
.modal-actions{display:flex;gap:8px;margin-top:18px}
.modal-btn-cancel{flex:1;padding:10px;border-radius:7px;border:1px solid var(--border);background:transparent;font-size:13px;font-weight:600;cursor:pointer;color:var(--txt2)}
.modal-btn-confirm{flex:2;padding:10px;border-radius:7px;border:none;background:var(--purple);color:#fff;font-size:13px;font-weight:700;cursor:pointer;transition:all .2s}
.modal-btn-confirm:hover{background:var(--purple2)}
.modal-btn-danger{flex:2;padding:10px;border-radius:7px;border:none;background:#C62828;color:#fff;font-size:13px;font-weight:700;cursor:pointer}

/* Drawer */
.drawer-overlay{position:fixed;inset:0;background:rgba(5,2,14,.6);z-index:200;animation:fadeIn .2s ease}
.drawer{position:fixed;top:0;right:0;bottom:0;width:380px;background:#1C1432;z-index:201;padding:24px;overflow-y:auto;animation:slideRight .25s ease;box-shadow:-8px 0 32px rgba(0,0,0,.4);border-left:1px solid var(--border)}
.drawer-close{position:absolute;top:16px;right:16px;width:30px;height:30px;border-radius:7px;border:none;background:var(--surface2);cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--txt2);font-size:15px}
.drawer-close:hover{color:var(--txt);background:rgba(108,63,197,.3)}
.drawer-title{font-size:15px;font-weight:700;color:var(--txt);margin-bottom:18px;padding-right:38px}
.detail-row{display:flex;align-items:flex-start;justify-content:space-between;padding:9px 0;border-bottom:1px solid rgba(46,31,90,.7)}
.detail-row:last-child{border-bottom:none}
.detail-key{font-size:12px;color:var(--txt2)}
.detail-val{font-size:12px;color:var(--txt);font-weight:600;text-align:right;max-width:220px}

/* Toast */
.toast-wrap{position:fixed;top:72px;right:20px;z-index:500;display:flex;flex-direction:column;gap:6px}
.toast{display:flex;align-items:center;gap:10px;padding:11px 14px;background:#1C1432;border-radius:8px;box-shadow:0 4px 20px rgba(0,0,0,.4);border:1px solid var(--border);min-width:220px;max-width:300px;animation:toastSlide .3s ease}
.toast i{font-size:17px;flex-shrink:0}
.toast.success i{color:var(--mint)}
.toast.error i{color:#F44336}
.toast.info i{color:var(--purple2)}
.toast-content .title{font-size:13px;font-weight:600;color:var(--txt)}
.toast-content .desc{font-size:12px;color:var(--txt2);margin-top:2px}

/* Footer */
.footer{background:var(--surface);border-top:1px solid var(--border);padding:20px 24px;text-align:center;margin-top:40px}
.footer-txt{font-size:12px;color:var(--txt2)}
.footer-tags{display:flex;justify-content:center;gap:8px;margin-top:8px;flex-wrap:wrap}
.footer-tag{padding:3px 10px;background:rgba(108,63,197,.15);border-radius:4px;font-size:11px;color:var(--purple2)}

/* Live dot */
.live-dot{width:7px;height:7px;border-radius:50%;background:var(--mint);animation:glowPulse 2s infinite;flex-shrink:0}

/* Settlement queue */
.queue-item{display:flex;align-items:center;gap:10px;padding:10px 14px;background:var(--surface2);border-radius:6px;margin-bottom:6px;cursor:pointer;transition:all .2s;border:1px solid transparent}
.queue-item:hover{border-color:var(--purple)}
.queue-status-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.queue-status-dot.running{background:var(--mint);animation:blink 1.5s infinite}
.queue-status-dot.done{background:var(--purple2)}
.queue-status-dot.wait{background:#FFB74D}
.queue-status-dot.error{background:#F44336}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useRef} = React;
const {AreaChart,Area,BarChart,Bar,ComposedChart,Line,RadarChart,Radar,PolarGrid,PolarAngleAxis,XAxis,YAxis,CartesianGrid,Tooltip,ResponsiveContainer,Legend} = Recharts;

const SETTLE_DATA = [
  {id:1,name:'박미래',cat:'일러스트',totalHeart:4200,fee:420,tax:378,settle:3402,status:'pending'},
  {id:2,name:'이서현',cat:'뮤지션',totalHeart:6800,fee:680,tax:612,settle:5508,status:'done'},
  {id:3,name:'김준호',cat:'게임/BJ',totalHeart:3100,fee:310,tax:279,settle:2511,status:'pending'},

  {id:6,name:'강소영',cat:'뷰티/패션',totalHeart:5500,fee:550,tax:495,settle:4455,status:'done'},

const AREA_DATA = [
  {month:'1월',후원:820000,정산:738000},{month:'2월',후원:1040000,정산:936000},
  {month:'3월',후원:960000,정산:864000},{month:'4월',후원:1380000,정산:1242000},
  {month:'5월',후원:1620000,정산:1458000},
];
const USERS_DATA = [
  {id:1,name:'박미래',email:'miraep@example.com',role:'creator',status:'active',join:'2025.08.12'},

  {id:4,name:'최유나',email:'chyuna@example.com',role:'creator',status:'active',join:'2025.07.18'},
  {id:5,name:'정현우',email:'hwchung@example.com',role:'fan',status:'suspended',join:'2026.03.14'},

  {id:7,name:'이민준',email:'lee.mj@example.com',role:'fan',status:'active',join:'2026.04.05'},
];
const RADAR_DATA = [
  {subject:'월~화',A:85,B:60},{subject:'수~목',A:72,B:55},{subject:'금',A:95,B:80},
  {subject:'토',A:100,B:90},{subject:'일',A:88,B:72},
];
const NOTIF_RULES = [
  {id:1,name:'정산 완료 알림',desc:'크리에이터 월 정산 처리 완료 시 이메일 발송',icon:'ti ti-mail-check',iconCls:'mint',on:true},
  {id:2,name:'이상 거래 경고',desc:'단시간 대량 후원(30분 내 5만 하트 이상) 감지 시',icon:'ti ti-alert-triangle',iconCls:'red',on:true},
  {id:3,name:'신규 크리에이터',desc:'크리에이터 신청 접수 시 운영자에게 알림',icon:'ti ti-user-plus',iconCls:'purple',on:true},
  {id:4,name:'Dead-letter 큐 알림',desc:'정산 배치 실패 후 DLQ 이동 시 즉시 알림',icon:'ti ti-bug',iconCls:'yellow',on:false},
  {id:5,name:'환불 요청 접수',desc:'사용자 환불 요청 접수 시 운영자 인앱 알림',icon:'ti ti-arrow-back',iconCls:'purple',on:true},
];
const QUEUE_JOBS = [
  {id:'JOB-2605-0001',creator:'최유나',amount:'7,452원',status:'running',time:'방금 시작'},
  {id:'JOB-2605-0002',creator:'이서현',amount:'5,508원',status:'done',time:'2분 전'},
  {id:'JOB-2605-0003',creator:'강소영',amount:'4,455원',status:'done',time:'3분 전'},
  {id:'JOB-2605-0004',creator:'정태우',amount:'1,944원',status:'error',time:'5분 전'},
  {id:'JOB-2605-0005',creator:'박미래',amount:'3,402원',status:'wait',time:'대기 중'},
];

function App(){
  const [tab,setTab]=useState('main');
  const [toasts,setToasts]=useState([]);
  const [modal,setModal]=useState(null);
  const [drawer,setDrawer]=useState(null);
  const [period,setPeriod]=useState('30일');
  const [analyticsSeg,setAnalyticsSeg]=useState('VIP');
  const [settleFilter,setSettleFilter]=useState('all');
  const [roleFilter,setRoleFilter]=useState('all');
  const [notifRules,setNotifRules]=useState(NOTIF_RULES);
  const [selectedRow,setSelectedRow]=useState(null);
  const [feeRate,setFeeRate]=useState('10');
  const [taxRate,setTaxRate]=useState('9');

  const addToast=(type,title,desc)=>{
    const id=Date.now();
    setToasts(p=>[...p,{id,type,title,desc}]);
    setTimeout(()=>setToasts(p=>p.filter(t=>t.id!==id)),3200);
  };
  const toggleNotif=(id)=>{
    setNotifRules(p=>p.map(r=>r.id===id?{...r,on:!r.on}:r));
    addToast('info','설정 저장','알림 규칙이 업데이트되었습니다.');
  };
  const filteredSettle=SETTLE_DATA.filter(s=>settleFilter==='all'||s.status===settleFilter);
  const filteredUsers=USERS_DATA.filter(u=>roleFilter==='all'||u.role===roleFilter);

  const StatusBadge=({status})=>{
    const map={done:{cls:'green',label:'완료'},pending:{cls:'yellow',label:'대기'},error:{cls:'red',label:'오류'},active:{cls:'green',label:'활성'},suspended:{cls:'red',label:'정지'},creator:{cls:'blue',label:'크리에이터'},fan:{cls:'grey',label:'팬'}};
    const s=map[status]||{cls:'grey',label:status};
    return <span className={`badge ${s.cls}`}>{s.label}</span>;
  };

  return (
    <div style={{width:'100%',minHeight:'100vh',background:'var(--bg)'}}>

                {[{ch:'이메일',sent:124,fail:3,icon:'ti ti-mail'},{ch:'인앱 알림',sent:892,fail:8,icon:'ti ti-bell'},{ch:'Dead-letter',sent:4,fail:0,icon:'ti ti-bug'}].map(c=>(
                  <div key={c.ch} style={{background:'var(--surface2)',borderRadius:'6px',padding:'12px 14px'}}>
                    <div style={{display:'flex',alignItems:'center',gap:'6px',marginBottom:'6px'}}>
                      <i className={c.icon} style={{fontSize:'15px',color:'var(--purple2)'}}></i>
                      <span style={{fontSize:'12px',color:'var(--txt2)'}}>{c.ch}</span>
                    </div>
                    <div style={{fontSize:'20px',fontWeight:'800',color:'var(--txt)'}}>{c.sent}건</div>
                    <div style={{fontSize:'11px',color:c.fail>0?'#F44336':'var(--txt2)',marginTop:'3px'}}>실패 {c.fail}건</div>
                  </div>
                ))}
              </div>
            </div>
            {notifRules.map(r=>(
              <div key={r.id} className="notif-rule-card" onClick={()=>setModal('notif-detail')}>
                <div className={`notif-rule-icon ${r.iconCls}`}><i className={r.icon}></i></div>
                <div className="notif-rule-info">
                  <div className="notif-rule-name">{r.name}</div>
                  <div className="notif-rule-desc">{r.desc}</div>
                </div>
                <div className="toggle-wrap" onClick={e=>e.stopPropagation()}>
                  <span style={{fontSize:'11px',color:'var(--txt2)',fontWeight:'500'}}>{r.on?'활성':'비활성'}</span>
                  <div className={`toggle ${r.on?'on':'off'}`} onClick={()=>toggleNotif(r.id)}></div>
                </div>
              </div>
            ))}
            <div style={{marginTop:'20px'}}>
              <div style={{fontSize:'13px',fontWeight:'700',color:'var(--txt)',marginBottom:'12px'}}>최근 발송 이력</div>
              <div className="data-table">
                <div className="table-head" style={{gridTemplateColumns:'1fr 80px 80px 100px'}}>
                  <div>알림 내용</div><div>채널</div><div>상태</div><div>발송 시각</div>
                </div>
                {[
                  {msg:'박미래 정산 완료 안내',ch:'이메일',status:'done',time:'14:52'},
                  {msg:'이상 거래 감지 — @unknown_fan01',ch:'이메일',status:'done',time:'14:32'},
                  {msg:'정태우 정산 배치 오류',ch:'Dead-letter',status:'error',time:'14:30'},
                  {msg:'신규 크리에이터 신청',ch:'인앱',status:'done',time:'13:21'},
                  {msg:'이서현 정산 완료 안내',ch:'이메일',status:'done',time:'13:05'},
                ].map((n,i)=>(
                  <div key={i} className="table-row" style={{gridTemplateColumns:'1fr 80px 80px 100px'}} onClick={()=>addToast('info','발송 상세','발송 로그 상세를 표시합니다.')}>
                    <div style={{fontSize:'12px',color:'var(--txt)'}}>{n.msg}</div>
                    <div style={{fontSize:'12px',color:'var(--txt2)'}}>{n.ch}</div>
                    <StatusBadge status={n.status}/>
                    <div style={{fontSize:'11px',color:'var(--txt2)'}}>{n.time}</div>
                  </div>
                ))}
              </div>
            </div>
          </div>
        </div>
      </div>

      {/* Footer */}
      <div className="footer">
        <div className="footer-txt">크리에이터 수익화 통합 플랫폼 — 구현 데모 · React + Node.js + PostgreSQL + Redis</div>
        <div className="footer-tags">
          <span className="footer-tag">Bull Queue</span>
          <span className="footer-tag">Strategy Pattern</span>
          <span className="footer-tag">RBAC 3단계</span>
          <span className="footer-tag">Materialized View</span>
          <span className="footer-tag">AWS S3</span>
        </div>
      </div>

      {/* ===== MODALS ===== */}
      {modal==='fee-rule'&&(
        <div className="modal-overlay" onClick={()=>setModal(null)}>
          <div className="modal" onClick={e=>e.stopPropagation()}>
            <button className="modal-close" onClick={()=>setModal(null)}><i className="ti ti-x"></i></button>
            <div className="modal-title">수수료 규칙 설정</div>
            <div style={{background:'rgba(108,63,197,.1)',border:'1px solid rgba(108,63,197,.3)',borderRadius:'6px',padding:'10px 12px',marginBottom:'14px',fontSize:'12px',color:'var(--purple2)'}}>
              <i className="ti ti-info-circle" style={{marginRight:'5px'}}></i>
              Strategy 패턴으로 관리 — 저장 시 다음 정산부터 자동 적용됩니다
            </div>
            <label className="form-label">플랫폼 수수료율 (%)</label>
            <input className="form-input" type="number" value={feeRate} onChange={e=>setFeeRate(e.target.value)} min="1" max="30"/>
            <label className="form-label">세금 공제율 (%)</label>
            <input className="form-input" type="number" value={taxRate} onChange={e=>setTaxRate(e.target.value)} min="0" max="50"/>
            <label className="form-label">최소 정산 기준액</label>
            <input className="form-input" defaultValue="10,000원" readOnly/>
            <label className="form-label">정산 주기</label>
            <select className="form-select"><option>월말 정산</option><option>격주 정산</option></select>
            <div className="modal-actions">
              <button className="modal-btn-cancel" onClick={()=>setModal(null)}>취소</button>
              <button className="modal-btn-confirm" onClick={()=>{setModal(null);addToast('success','규칙 저장','수수료 규칙이 업데이트되었습니다.')}}>저장</button>
            </div>
          </div>
        </div>
      )}
      {modal==='retry-job'&&(
        <div className="modal-overlay" onClick={()=>setModal(null)}>
          <div className="modal" onClick={e=>e.stopPropagation()}>
            <button className="modal-close" onClick={()=>setModal(null)}><i className="ti ti-x"></i></button>
            <div className="modal-title">정산 오류 재처리</div>
            <div style={{background:'rgba(244,67,54,.08)',border:'1px solid rgba(244,67,54,.25)',borderRadius:'6px',padding:'10px 12px',marginBottom:'14px',fontSize:'12px',color:'#F44336'}}>
              <i className="ti ti-alert-triangle" style={{marginRight:'5px'}}></i>JOB-2605-0004 (정태우) — Dead-letter 큐 이동됨
            </div>
            <div style={{fontSize:'13px',color:'var(--txt2)',marginBottom:'14px'}}>정산 실패 원인: 크리에이터 계좌 정보 미등록<br/><br/>재시도 시 계좌 정보를 먼저 등록 후 처리해야 합니다.</div>
            <label className="form-label">처리 메모</label>
            <textarea className="form-textarea" placeholder="내부 처리 메모를 입력하세요 (선택)"></textarea>
            <div className="modal-actions">
              <button className="modal-btn-cancel" onClick={()=>setModal(null)}>닫기</button>
              <button className="modal-btn-confirm" onClick={()=>{setModal(null);addToast('info','재처리 시작','정산 재처리 작업을 큐에 등록했습니다.')}}>재처리 등록</button>
            </div>
          </div>
        </div>
      )}
      {modal==='suspend-user'&&(
        <div className="modal-overlay" onClick={()=>setModal(null)}>
          <div className="modal" onClick={e=>e.stopPropagation()}>
            <button className="modal-close" onClick={()=>setModal(null)}><i className="ti ti-x"></i></button>
            <div className="modal-title">계정 정지</div>
            <div style={{background:'rgba(244,67,54,.08)',border:'1px solid rgba(244,67,54,.2)',borderRadius:'6px',padding:'10px 12px',marginBottom:'14px',fontSize:'12px',color:'#F44336'}}>
              <i className="ti ti-alert-triangle" style={{marginRight:'5px'}}></i>{selectedRow?.name} 계정을 정지하면 활성 세션이 즉시 만료됩니다
            </div>
            <label className="form-label">정지 사유</label>
            <select className="form-select"><option>이용 약관 위반</option><option>이상 거래 의심</option><option>본인 요청</option><option>기타</option></select>
            <label className="form-label">상세 메모</label>
            <textarea className="form-textarea" placeholder="정지 처리에 대한 상세 내용을 입력해주세요"></textarea>
            <div className="modal-actions">
              <button className="modal-btn-cancel" onClick={()=>setModal(null)}>취소</button>
              <button className="modal-btn-danger" onClick={()=>{setModal(null);addToast('info','계정 정지',`${selectedRow?.name} 계정이 정지 처리되었습니다.`)}}>정지 처리</button>
            </div>
          </div>
        </div>
      )}
      {modal==='invite-user'&&(
        <div className="modal-overlay" onClick={()=>setModal(null)}>
          <div className="modal" onClick={e=>e.stopPropagation()}>
            <button className="modal-close" onClick={()=>setModal(null)}><i className="ti ti-x"></i></button>
            <div className="modal-title">계정 초대</div>
            <label className="form-label">이메일</label>
            <input className="form-input" placeholder="example@email.com"/>
            <label className="form-label">역할</label>
            <select className="form-select"><option>크리에이터</option><option>팬</option><option>운영자</option></select>
            <label className="form-label">초대 메시지 (선택)</label>
            <textarea className="form-textarea" placeholder="초대 이메일에 포함할 메시지를 입력하세요"></textarea>
            <div className="modal-actions">
              <button className="modal-btn-cancel" onClick={()=>setModal(null)}>취소</button>
              <button className="modal-btn-confirm" onClick={()=>{setModal(null);addToast('success','초대 완료','초대 이메일이 발송되었습니다.')}}>초대 발송</button>
            </div>
          </div>
        </div>
      )}
      {modal==='notif-detail'&&(
        <div className="modal-overlay" onClick={()=>setModal(null)}>
          <div className="modal" onClick={e=>e.stopPropagation()}>
            <button className="modal-close" onClick={()=>setModal(null)}><i className="ti ti-x"></i></button>
            <div className="modal-title">알림 규칙 상세 설정</div>
            <label className="form-label">이메일 발송 대상</label>
            <select className="form-select"><option>슈퍼관리자</option><option>운영자 전체</option><option>관련 크리에이터</option></select>
            <label className="form-label">발송 임계값 (선택)</label>
            <input className="form-input" defaultValue="50,000 하트"/>
            <label className="form-label">재시도 정책</label>
            <select className="form-select"><option>긴급 — 즉시 재시도 3회</option><option>일반 — 5분 간격 3회</option><option>재시도 없음</option></select>
            <div className="modal-actions">
              <button className="modal-btn-cancel" onClick={()=>setModal(null)}>취소</button>
              <button className="modal-btn-confirm" onClick={()=>{setModal(null);addToast('success','설정 저장','알림 규칙이 저장되었습니다.')}}>저장</button>
            </div>
          </div>
        </div>
      )}

      {/* ===== DRAWERS ===== */}
      {drawer==='settle'&&selectedRow&&(
        <>
          <div className="drawer-overlay" onClick={()=>setDrawer(null)}></div>
          <div className="drawer">
            <button className="drawer-close" onClick={()=>setDrawer(null)}><i className="ti ti-x"></i></button>
            <div className="drawer-title">정산 상세 — {selectedRow.name}</div>
            <div style={{display:'flex',alignItems:'center',gap:'10px',padding:'12px',background:'var(--surface2)',borderRadius:'7px',marginBottom:'18px'}}>
              <div className="user-avatar-mini" style={{width:'40px',height:'40px',fontSize:'16px'}}>{selectedRow.name[0]}</div>
              <div>
                <div style={{fontSize:'14px',fontWeight:'700',color:'var(--txt)'}}>{selectedRow.name}</div>
                <div style={{fontSize:'12px',color:'var(--txt2)'}}>{selectedRow.cat}</div>
              </div>
              <StatusBadge status={selectedRow.status}/>
            </div>
            {[
              {key:'총 후원 하트',val:`♥ ${selectedRow.totalHeart.toLocaleString()}`},
              {key:'수수료 (10%)',val:`${selectedRow.fee.toLocaleString()}원`},
              {key:'세금 공제 (9%)',val:`${selectedRow.tax.toLocaleString()}원`},
              {key:'정산 예정액',val:`${selectedRow.settle.toLocaleString()}원`},
              {key:'정산 기준월',val:'2026년 5월'},
              {key:'처리 상태',val:selectedRow.status==='done'?'완료':selectedRow.status==='pending'?'대기':'오류'},
            ].map(r=>(
              <div key={r.key} className="detail-row">
                <span className="detail-key">{r.key}</span>
                <span className="detail-val" style={r.key==='정산 예정액'?{color:'var(--mint)'}:{}}>{r.val}</span>
              </div>
            ))}
            <div style={{marginTop:'20px',display:'flex',gap:'8px'}}>
              <button style={{flex:1,padding:'10px',border:'1px solid var(--border)',borderRadius:'7px',background:'transparent',font:'600 12px Pretendard',cursor:'pointer',color:'var(--txt2)'}} onClick={()=>setDrawer(null)}>닫기</button>
              {selectedRow.status!=='done'&&<button style={{flex:2,padding:'10px',background:'var(--purple)',color:'#fff',border:'none',borderRadius:'7px',font:'600 12px Pretendard',cursor:'pointer'}} onClick={()=>{setDrawer(null);addToast('info','정산 처리',`${selectedRow.name} 정산을 수동 처리합니다.`)}}>수동 처리</button>}
            </div>
          </div>
        </>
      )}
      {drawer==='user'&&selectedRow&&(
        <>
          <div className="drawer-overlay" onClick={()=>setDrawer(null)}></div>
          <div className="drawer">
            <button className="drawer-close" onClick={()=>setDrawer(null)}><i className="ti ti-x"></i></button>
            <div className="drawer-title">계정 상세 — {selectedRow.name}</div>
            <div style={{display:'flex',alignItems:'center',gap:'10px',padding:'12px',background:'var(--surface2)',borderRadius:'7px',marginBottom:'18px'}}>
              <div className="user-avatar-mini" style={{width:'40px',height:'40px',fontSize:'16px'}}>{selectedRow.name[0]}</div>
              <div style={{flex:1}}>
                <div style={{fontSize:'14px',fontWeight:'700',color:'var(--txt)'}}>{selectedRow.name}</div>
                <div style={{fontSize:'12px',color:'var(--txt2)'}}>{selectedRow.email}</div>
              </div>
              <StatusBadge status={selectedRow.status}/>
            </div>
            {[
              {key:'역할',val:selectedRow.role==='creator'?'크리에이터':'팬'},
              {key:'계정 상태',val:selectedRow.status==='active'?'활성':'정지'},
              {key:'가입일',val:selectedRow.join},
              {key:'최근 로그인',val:'2026.05.14 09:41'},
              {key:'활성 세션 수',val:'1개'},
            ].map(r=>(
              <div key={r.key} className="detail-row">
                <span className="detail-key">{r.key}</span>
                <span className="detail-val">{r.val}</span>
              </div>
            ))}
            <div style={{marginTop:'18px',display:'flex',gap:'8px',flexWrap:'wrap'}}>
              <button style={{flex:1,padding:'9px',border:'1px solid var(--border)',borderRadius:'7px',background:'transparent',font:'600 11px Pretendard',cursor:'pointer',color:'var(--txt2)',minWidth:'80px'}} onClick={()=>setDrawer(null)}>닫기</button>
              <button style={{flex:1,padding:'9px',background:'rgba(108,63,197,.2)',color:'var(--purple2)',border:'1px solid var(--border)',borderRadius:'7px',font:'600 11px Pretendard',cursor:'pointer',minWidth:'80px'}} onClick={()=>{setDrawer(null);addToast('info','세션 만료',`${selectedRow.name} 활성 세션이 만료 처리되었습니다.`)}}>세션 만료</button>
              {selectedRow.status==='active'&&<button style={{flex:1,padding:'9px',background:'rgba(244,67,54,.12)',color:'#F44336',border:'1px solid rgba(244,67,54,.25)',borderRadius:'7px',font:'600 11px Pretendard',cursor:'pointer',minWidth:'80px'}} onClick={()=>{setDrawer(null);setModal('suspend-user')}}>계정 정지</button>}
            </div>
          </div>
        </>
      )}

      {/* TOASTS */}
      <div className="toast-wrap">
        {toasts.map(t=>(
          <div key={t.id} className={`toast ${t.type}`}>
            <i className={`ti ${t.type==='success'?'ti-circle-check':t.type==='error'?'ti-circle-x':'ti-info-circle'}`}></i>
            <div className="toast-content">
              <div className="title">{t.title}</div>
              {t.desc&&<div className="desc">{t.desc}</div>}
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
