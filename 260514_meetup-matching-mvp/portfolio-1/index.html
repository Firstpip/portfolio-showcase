<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>모임ON 소셜 매칭 플랫폼 — 맞춤 구현 데모</title>
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" rel="stylesheet" />
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://unpkg.com/lucide@latest"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { width: 100%; min-height: 100vh; background: #FDF6F0; font-family: 'Pretendard', -apple-system, sans-serif; }
#root { width: 100%; min-height: 100vh; }

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(8px); }
  to   { opacity: 1; transform: translateY(0); }
}
@keyframes slideUp {
  from { opacity: 0; transform: translateY(24px); }
  to   { opacity: 1; transform: translateY(0); }
}
@keyframes scaleIn {
  from { opacity: 0; transform: scale(0.94); }
  to   { opacity: 1; transform: scale(1); }
}
@keyframes slideRight {
  from { opacity: 0; transform: translateX(100%); }
  to   { opacity: 1; transform: translateX(0); }
}
@keyframes matchPop {
  0%   { transform: scale(0.6); opacity: 0; }
  60%  { transform: scale(1.08); opacity: 1; }
  100% { transform: scale(1); }
}
@keyframes pulse {
  0%, 100% { opacity: 1; }
  50%       { opacity: 0.5; }
}
@keyframes badgePop {
  0%   { transform: scale(0); }
  70%  { transform: scale(1.2); }
  100% { transform: scale(1); }
}

.fade-in    { animation: fadeIn 0.3s ease both; }
.slide-up   { animation: slideUp 0.35s ease both; }
.scale-in   { animation: scaleIn 0.25s ease both; }
.slide-right { animation: slideRight 0.3s cubic-bezier(.32,.72,0,1) both; }

.card {
  background: #fff;
  border-radius: 16px;
  box-shadow: 0 2px 12px rgba(196,97,74,0.08);
  transition: box-shadow 0.2s, transform 0.2s;
  cursor: pointer;
}
.card:hover {
  box-shadow: 0 8px 24px rgba(196,97,74,0.16);
  transform: translateY(-2px);
}

.btn-primary {
  background: #C4614A;
  color: #fff;
  border: none;
  border-radius: 12px;
  padding: 10px 20px;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  transition: background 0.2s, transform 0.15s;
  font-family: 'Pretendard', sans-serif;
}
.btn-primary:hover { background: #b0563f; transform: scale(1.02); }
.btn-primary:disabled { background: #d4a89a; cursor: not-allowed; transform: none; }

.btn-outline {
  background: transparent;
  color: #C4614A;
  border: 1.5px solid #C4614A;
  border-radius: 12px;
  padding: 9px 20px;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  transition: background 0.2s;
  font-family: 'Pretendard', sans-serif;
}
.btn-outline:hover { background: rgba(196,97,74,0.06); }

.badge {
  display: inline-flex;
  align-items: center;
  padding: 3px 10px;
  border-radius: 99px;
  font-size: 12px;
  font-weight: 600;
}
.badge-green  { background: #dcfce7; color: #166534; }
.badge-orange { background: #fff7ed; color: #9a3412; }
.badge-gray   { background: #f1f5f9; color: #475569; }
.badge-red    { background: #fef2f2; color: #991b1b; }
.badge-blue   { background: #eff6ff; color: #1e40af; }

.overlay {
  position: fixed; inset: 0;
  background: rgba(44,26,20,0.45);
  backdrop-filter: blur(2px);
  z-index: 200;
  display: flex; align-items: center; justify-content: center;
}
.modal {
  background: #fff;
  border-radius: 20px;
  padding: 28px;
  width: 90%;
  max-width: 460px;
  max-height: 85vh;
  overflow-y: auto;
  animation: scaleIn 0.25s ease;
}
.drawer {
  position: fixed; top: 0; right: 0; bottom: 0;
  width: 340px;
  background: #fff;
  box-shadow: -4px 0 24px rgba(44,26,20,0.12);
  overflow-y: auto;
  z-index: 300;
  animation: slideRight 0.3s cubic-bezier(.32,.72,0,1);
}

.topnav {
  position: sticky; top: 0; z-index: 100;
  background: rgba(253,246,240,0.95);
  backdrop-filter: blur(8px);
  border-bottom: 1px solid rgba(196,97,74,0.1);
}
.nav-tab {
  padding: 12px 20px;
  font-size: 14px;
  font-weight: 600;
  color: #7A5048;
  border: none;
  background: none;
  cursor: pointer;
  border-bottom: 2.5px solid transparent;
  transition: color 0.2s, border-color 0.2s;
  font-family: 'Pretendard', sans-serif;
  display: flex; align-items: center; gap: 6px;
  white-space: nowrap;
}
.nav-tab.active { color: #C4614A; border-bottom-color: #C4614A; }
.nav-tab:hover:not(.active) { color: #C4614A; }

.hero {
  background: linear-gradient(135deg, #C4614A 0%, #E8907A 60%, #F2B8A0 100%);
  padding: 32px 24px 28px;
  color: #fff;
}
.hero h1 { font-size: 26px; font-weight: 800; margin-bottom: 6px; letter-spacing: -0.5px; }
.hero p  { font-size: 14px; opacity: 0.88; }

.star-btn {
  background: none; border: none; cursor: pointer;
  padding: 4px;
  font-size: 22px;
  line-height: 1;
  transition: transform 0.15s;
}
.star-btn:hover { transform: scale(1.2); }
.star-btn.active { color: #f59e0b; }
.star-btn:not(.active) { color: #d1d5db; }

.toast {
  position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
  background: #2C1A14;
  color: #fff;
  border-radius: 12px;
  padding: 12px 20px;
  font-size: 14px;
  font-weight: 500;
  z-index: 999;
  animation: slideUp 0.3s ease;
  white-space: nowrap;
  box-shadow: 0 4px 16px rgba(44,26,20,0.25);
}

.input-field {
  width: 100%;
  padding: 10px 14px;
  border: 1.5px solid #e8d8d2;
  border-radius: 10px;
  font-size: 14px;
  font-family: 'Pretendard', sans-serif;
  background: #fdf6f0;
  color: #2C1A14;
  outline: none;
  transition: border-color 0.2s;
}
.input-field:focus { border-color: #C4614A; }

.select-field {
  width: 100%;
  padding: 10px 14px;
  border: 1.5px solid #e8d8d2;
  border-radius: 10px;
  font-size: 14px;
  font-family: 'Pretendard', sans-serif;
  background: #fdf6f0;
  color: #2C1A14;
  outline: none;
  cursor: pointer;
}

.profile-avatar {
  width: 42px; height: 42px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 15px; font-weight: 700;
  flex-shrink: 0;
}

.chat-bubble {
  max-width: 68%;
  padding: 10px 14px;
  border-radius: 16px;
  font-size: 14px;
  line-height: 1.5;
  margin-bottom: 10px;
}
.chat-bubble.mine   { background: #C4614A; color: #fff; border-radius: 16px 4px 16px 16px; align-self: flex-end; }
.chat-bubble.theirs { background: #fff; color: #2C1A14; border-radius: 4px 16px 16px 16px; align-self: flex-start; box-shadow: 0 1px 6px rgba(0,0,0,0.07); }

.skeleton {
  background: linear-gradient(90deg, #f0e8e4 25%, #ffe8e0 50%, #f0e8e4 75%);
  background-size: 200% 100%;
  animation: pulse 1.5s ease infinite;
  border-radius: 8px;
}
</style>
</head>
<body>
<div id="root"></div>

  { id:4, title:'보드게임 & 친목 — 홍대 플레이카페', date:'2025.10.22', time:'18:00', loc:'서울 마포구', category:'게임/취미', cap:10, joined:6, fee:'10,000원', desc:'다양한 보드게임을 즐기며 새로운 친구를 만들어 보세요. 보드게임 초보자도 환영합니다!', tags:['보드게임','취미','실내'], host:'운영팀' },
  { id:5, title:'쿠킹 클래스 & 소셜 다이닝', date:'2025.10.25', time:'15:00', loc:'서울 서초구', category:'음식/음료', cap:8, joined:3, fee:'45,000원', desc:'전문 셰프와 함께하는 이탈리안 쿠킹 클래스입니다. 직접 만든 요리로 함께 식사하는 시간을 가집니다.', tags:['요리','쿠킹','소셜'], host:'운영팀' },
  { id:6, title:'사진 산책 — 서촌 골목 투어', date:'2025.10.28', time:'10:00', loc:'서울 종로구', category:'취미/문화', cap:12, joined:9, fee:'무료', desc:'카메라나 스마트폰으로 서촌 골목을 담는 느린 산책입니다. 사진 초보자도 함께해요.', tags:['사진','산책','문화'], host:'운영팀' },

  { id:3, name:'박지훈', age:48, gender:'남', loc:'경기 분당', rating:3.8, joined:5, matched:1, status:'active', bio:'자영업을 하고 있습니다. 보드게임과 사진이 취미입니다.', color:'#5C8A5C' },
  { id:4, name:'정예은', age:38, gender:'여', loc:'서울 서초', rating:4.9, joined:20, matched:9, status:'active', bio:'교사입니다. 독서 모임과 문화 활동을 즐깁니다.', color:'#8B5CF6' },
  { id:5, name:'최성호', age:52, gender:'남', loc:'서울 용산', rating:4.0, joined:6, matched:2, status:'pending', bio:'금융업에 종사합니다. 와인 애호가입니다.', color:'#D97706' },
  { id:6, name:'오하린', age:33, gender:'여', loc:'서울 성동', rating:4.7, joined:15, matched:6, status:'active', bio:'디자이너입니다. 사진과 전시 관람을 좋아합니다.', color:'#EC4899' },
  { id:7, name:'강도현', age:45, gender:'남', loc:'경기 판교', rating:3.5, joined:3, matched:0, status:'suspended', bio:'개발자입니다. 등산과 커피를 즐깁니다.', color:'#0891B2' },
  { id:8, name:'윤서아', age:42, gender:'여', loc:'서울 송파', rating:4.3, joined:10, matched:4, status:'active', bio:'간호사입니다. 요리와 독서를 좋아합니다.', color:'#059669' },

const MATCHING_PARTICIPANTS = [
  { id:1, name:'이수연', age:35, gender:'여', loc:'서울 마포', rating:4.6, myScore:0, color:'#7B8FA1' },
  { id:2, name:'정예은', age:38, gender:'여', loc:'서울 서초', rating:4.9, myScore:0, color:'#8B5CF6' },
  { id:3, name:'오하린', age:33, gender:'여', loc:'서울 성동', rating:4.7, myScore:0, color:'#EC4899' },
  { id:4, name:'윤서아', age:42, gender:'여', loc:'서울 송파', rating:4.3, myScore:0, color:'#059669' },

const CHAT_ROOMS = [
  { id:1, name:'이수연', color:'#7B8FA1', lastMsg:'네, 다음 모임에서 봬요!', time:'14:32', unread:2, matched:'10월 15일 독서 모임' },
  { id:2, name:'정예은', color:'#8B5CF6', lastMsg:'요즘 어떻게 지내세요?', time:'어제', unread:0, matched:'10월 18일 와인 테이스팅' },
  { id:3, name:'오하린', color:'#EC4899', lastMsg:'사진 정말 예쁘게 나왔어요', time:'10/10', unread:0, matched:'10월 28일 사진 산책' },
];

const MESSAGES_1 = [
  { id:1, mine:false, text:'안녕하세요! 독서 모임에서 뵈었죠? 반가웠어요.', time:'14:20' },
  { id:2, mine:true,  text:'네, 정말 즐거운 시간이었습니다! 책 추천 감사했어요.', time:'14:22' },
  { id:3, mine:false, text:'혹시 다음 달 모임도 참가하실 건가요?', time:'14:25' },
  { id:4, mine:true,  text:'네! 이미 신청해뒀어요. 이번엔 어떤 책으로 하나요?', time:'14:28' },
  { id:5, mine:false, text:'아직 미정이에요. 같이 추천해봐요!', time:'14:30' },
  { id:6, mine:false, text:'네, 다음 모임에서 봬요!', time:'14:32' },
];

const ADMIN_TABS = ['회원 관리', '모임 관리', '신고 내역'];

/* ── 유틸 ──────────────────────────────────────────── */
function Avatar({ name, color, size=42 }) {
  return (
    <div className="profile-avatar" style={{ width:size, height:size, background:`${color}20`, color }}>
      {name[0]}
    </div>
  );
}

function StarRating({ value, onChange, readonly=false }) {
  const [hover, setHover] = useState(0);
  return (
    <div style={{ display:'flex', gap:2 }}>
      {[1,2,3,4,5].map(s => (
        <button key={s} className={`star-btn ${(hover||value)>=s?'active':''}`}
          onClick={()=>!readonly&&onChange&&onChange(s)}
          onMouseEnter={()=>!readonly&&setHover(s)}
          onMouseLeave={()=>!readonly&&setHover(0)}
          style={{ cursor: readonly?'default':'pointer' }}>
          &#9733;
        </button>
      ))}
    </div>
  );
}

function Toast({ msg, onDone }) {
  useEffect(() => { const t=setTimeout(onDone,2500); return ()=>clearTimeout(t); }, []);
  return <div className="toast">{msg}</div>;
}

/* ── 화면별 컴포넌트 ──────────────────────────────────── */

/* 모임 화면 */
function MeetupView() {
  const [filter, setFilter] = useState('전체');
  const [selectedMeetup, setSelectedMeetup] = useState(null);
  const [applied, setApplied] = useState([]);
  const [toast, setToast] = useState('');
  const [showApplyModal, setShowApplyModal] = useState(false);
  const cats = ['전체','독서/문화','음식/음료','야외/스포츠','게임/취미','취미/문화'];

  const filtered = filter==='전체' ? MEETUPS : MEETUPS.filter(m=>m.category===filter);
  const isApplied = id => applied.includes(id);
  const isFull    = m  => m.joined >= m.cap;

  function handleApply(m) {
    if (isApplied(m.id)) { setToast('이미 신청한 모임입니다'); return; }
    if (isFull(m))        { setToast('정원이 마감된 모임입니다'); return; }
    setSelectedMeetup(m);
    setShowApplyModal(true);
  }

  function confirmApply() {
    setApplied(a => [...a, selectedMeetup.id]);
    setShowApplyModal(false);
    setToast(`"${selectedMeetup.title.slice(0,12)}..." 신청이 완료됐습니다`);
    setSelectedMeetup(null);
  }

  return (
    <div style={{ padding:'20px 16px' }}>
      {/* 카테고리 필터 */}
      <div style={{ display:'flex', gap:8, overflowX:'auto', paddingBottom:4, marginBottom:20 }}>
        {cats.map(c => (
          <button key={c} onClick={()=>setFilter(c)}
            style={{ flexShrink:0, padding:'7px 14px', borderRadius:99, border:'none', cursor:'pointer',
              background: filter===c ? '#C4614A' : '#fff',
              color: filter===c ? '#fff' : '#7A5048',
              fontSize:13, fontWeight:600, fontFamily:'Pretendard,sans-serif',
              boxShadow:'0 1px 6px rgba(196,97,74,0.1)',
              transition:'background 0.2s, color 0.2s' }}>
            {c}
          </button>
        ))}
      </div>

      {/* 모임 카드 목록 */}
      <div style={{ display:'flex', flexDirection:'column', gap:14 }}>
        {filtered.map((m,i) => (
          <div key={m.id} className="card fade-in" style={{ animationDelay:`${i*60}ms`, padding:'18px 20px' }}
            onClick={()=>setSelectedMeetup(m)}>
            <div style={{ display:'flex', justifyContent:'space-between', alignItems:'flex-start' }}>
              <div style={{ flex:1 }}>
                <span className="badge badge-gray" style={{ marginBottom:8, fontSize:11 }}>{m.category}</span>
                <div style={{ fontSize:16, fontWeight:700, color:'#2C1A14', marginBottom:6, lineHeight:1.35 }}>{m.title}</div>
                <div style={{ fontSize:13, color:'#7A5048', display:'flex', gap:12, flexWrap:'wrap' }}>
                  <span>{m.date} {m.time}</span>
                  <span>{m.loc}</span>
                </div>
              </div>
              {isApplied(m.id) && (
                <span className="badge badge-green" style={{ flexShrink:0, marginLeft:8, animation:'badgePop 0.3s ease' }}>신청완료</span>
              )}
            </div>
            <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginTop:14, paddingTop:12, borderTop:'1px solid #f4ebe7' }}>
              <div style={{ display:'flex', gap:16 }}>
                <span style={{ fontSize:13, color:'#7A5048' }}>
                  정원 <strong style={{ color: isFull(m)?'#dc2626':'#C4614A' }}>{m.joined}/{m.cap}명</strong>
                </span>
                <span style={{ fontSize:13, color:'#7A5048' }}>참가비 <strong style={{ color:'#2C1A14' }}>{m.fee}</strong></span>
              </div>
              <button className={isApplied(m.id)||isFull(m)?"btn-outline":"btn-primary"}
                style={{ padding:'7px 16px', fontSize:13 }}
                disabled={isApplied(m.id)||isFull(m)}
                onClick={e=>{e.stopPropagation();handleApply(m);}}>
                {isApplied(m.id)?'신청완료':isFull(m)?'마감':'신청하기'}
              </button>
            </div>
          </div>
        ))}
      </div>

      {/* 상세 Drawer */}
      {selectedMeetup && !showApplyModal && (
        <>
          <div className="overlay" onClick={()=>setSelectedMeetup(null)} />
          <div className="drawer">
            <div style={{ padding:'24px 24px 32px' }}>
              <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:20 }}>
                <h2 style={{ fontSize:18, fontWeight:700, color:'#2C1A14' }}>모임 상세</h2>

/* 매칭 화면 */
function MatchingView() {
  const [participants, setParticipants] = useState(MATCHING_PARTICIPANTS);
  const [matched, setMatched] = useState(null);
  const [toast, setToast] = useState('');
  const [selectedUser, setSelectedUser] = useState(null);
  const [showRateModal, setShowRateModal] = useState(false);
  const [tempScore, setTempScore] = useState(0);

  function openRateModal(p) { setSelectedUser(p); setTempScore(p.myScore); setShowRateModal(true); }

  function submitRating() {
    setParticipants(prev => prev.map(p => p.id===selectedUser.id ? {...p, myScore:tempScore} : p));
    setShowRateModal(false);
    if (tempScore >= 3) {
      setTimeout(() => { setMatched(selectedUser); }, 400);
    } else {
      setToast(`${selectedUser.name}님께 호감도를 전달했습니다`);
    }
  }

  function closeMatch() { setMatched(null); setToast('매칭이 완료됐습니다! 채팅 탭에서 대화를 시작해 보세요'); }

  const scored = participants.filter(p=>p.myScore>0).length;

  return (
    <div style={{ padding:'20px 16px' }}>
      {/* 안내 배너 */}
      <div style={{ background:'linear-gradient(135deg,rgba(196,97,74,0.12),rgba(242,184,160,0.1))', border:'1.5px solid rgba(196,97,74,0.18)', borderRadius:16, padding:'16px 18px', marginBottom:20 }}>
        <div style={{ fontSize:14, fontWeight:700, color:'#C4614A', marginBottom:4 }}>10월 15일 독서 모임 — 참가자 평가</div>
        <div style={{ fontSize:13, color:'#7A5048' }}>참가자에게 호감도를 입력해주세요. 상호 3점 이상이면 자동 매칭됩니다.</div>
        <div style={{ marginTop:10, display:'flex', gap:6, alignItems:'center' }}>
          <div style={{ height:6, borderRadius:99, background:'#e8d8d2', flex:1, overflow:'hidden' }}>
            <div style={{ height:'100%', borderRadius:99, background:'#C4614A', width:`${(scored/participants.length)*100}%`, transition:'width 0.4s' }} />
          </div>
          <span style={{ fontSize:12, color:'#7A5048', fontWeight:600 }}>{scored}/{participants.length}명</span>
        </div>
      </div>

      {/* 참가자 카드 */}
      <div style={{ display:'flex', flexDirection:'column', gap:12 }}>
        {participants.map((p,i) => (
          <div key={p.id} className="card fade-in" style={{ animationDelay:`${i*70}ms`, padding:'18px 20px' }}>
            <div style={{ display:'flex', alignItems:'center', gap:14 }}>
              <Avatar name={p.name} color={p.color} size={52} />
              <div style={{ flex:1 }}>
                <div style={{ fontSize:16, fontWeight:700, color:'#2C1A14' }}>{p.name}</div>
                <div style={{ fontSize:13, color:'#7A5048' }}>{p.age}세 · {p.gender} · {p.loc}</div>
                <div style={{ display:'flex', alignItems:'center', gap:6, marginTop:4 }}>
                  <span style={{ fontSize:12, color:'#7A5048' }}>평균 평점</span>
                  <span style={{ fontSize:13, fontWeight:700, color:'#C4614A' }}>★ {p.rating.toFixed(1)}</span>
                </div>
              </div>
              {p.myScore > 0 ? (
                <div style={{ textAlign:'center' }}>
                  <div style={{ fontSize:12, color:'#7A5048', marginBottom:2 }}>내 평가</div>
                  <div style={{ fontSize:22, fontWeight:800, color:'#C4614A', animation:'badgePop 0.3s ease' }}>{'★'.repeat(p.myScore)}</div>
                </div>
              ) : (
                <button className="btn-primary" style={{ padding:'8px 16px', fontSize:13 }} onClick={()=>openRateModal(p)}>
                  평가하기
                </button>
              )}
            </div>
            {p.myScore > 0 && (
              <div style={{ marginTop:12, paddingTop:10, borderTop:'1px solid #f4ebe7', display:'flex', justifyContent:'space-between', alignItems:'center' }}>
                <StarRating value={p.myScore} readonly={true} />
                <button className="btn-outline" style={{ padding:'5px 14px', fontSize:12 }} onClick={()=>openRateModal(p)}>
                  수정
                </button>
              </div>
            )}
          </div>
        ))}
      </div>

      {/* 평가 모달 */}
      {showRateModal && selectedUser && (
        <div className="overlay">
          <div className="modal scale-in">
            <div style={{ textAlign:'center', marginBottom:20 }}>
              <Avatar name={selectedUser.name} color={selectedUser.color} size={64} />
              <h3 style={{ marginTop:12, fontSize:18, fontWeight:700, color:'#2C1A14' }}>{selectedUser.name}님 평가</h3>
              <p style={{ fontSize:13, color:'#7A5048', marginTop:4 }}>{selectedUser.age}세 · {selectedUser.gender} · {selectedUser.loc}</p>
            </div>
            <p style={{ fontSize:13, color:'#7A5048', textAlign:'center', marginBottom:20 }}>
              1~5점 척도로 호감도를 입력해주세요.<br/>상호 3점 이상이면 매칭이 성사됩니다.
            </p>
            <div style={{ display:'flex', justifyContent:'center', marginBottom:24 }}>
              <StarRating value={tempScore} onChange={setTempScore} />
            </div>
            <div style={{ textAlign:'center', fontSize:14, color:'#7A5048', marginBottom:20, height:20 }}>
              {tempScore ? <span style={{ color:'#C4614A', fontWeight:700 }}>{tempScore}점 — {['','아쉬워요','보통이에요','좋아요!','매력있어요!','최고예요!'][tempScore]}</span> : '별을 선택해주세요'}
            </div>
            <div style={{ display:'flex', gap:8 }}>
              <button className="btn-outline" style={{ flex:1 }} onClick={()=>setShowRateModal(false)}>취소</button>
              <button className="btn-primary" style={{ flex:1 }} disabled={!tempScore} onClick={submitRating}>평가 완료</button>
            </div>
          </div>
        </div>
      )}

      {/* 매칭 성공 팝업 */}
      {matched && (
        <div className="overlay">
          <div style={{ textAlign:'center', animation:'matchPop 0.5s cubic-bezier(.22,.61,.36,1)' }}>
            <div style={{ background:'linear-gradient(135deg,#C4614A,#E8907A)', borderRadius:28, padding:'40px 36px', maxWidth:320, margin:'0 16px' }}>
              <div style={{ fontSize:48, marginBottom:8 }}>&#x2764;</div>
              <h2 style={{ fontSize:24, fontWeight:800, color:'#fff', marginBottom:8 }}>매칭 성사!</h2>
              <p style={{ fontSize:14, color:'rgba(255,255,255,0.9)', marginBottom:20, lineHeight:1.6 }}>
                <strong>{matched.name}</strong>님과 상호 호감도가 확인됐습니다.<br/>채팅방이 개설됐습니다!
              </p>
              <div style={{ display:'flex', justifyContent:'center', marginBottom:20 }}>
                <Avatar name={matched.name} color="#fff" size={64} />
              </div>
              <button onClick={closeMatch}
                style={{ width:'100%', background:'#fff', color:'#C4614A', border:'none', borderRadius:14, padding:'13px', fontSize:15, fontWeight:700, cursor:'pointer', fontFamily:'Pretendard,sans-serif' }}>
                채팅 시작하기
              </button>
            </div>
          </div>
        </div>
      )}

      {toast && <Toast msg={toast} onDone={()=>setToast('')} />}
    </div>
  );
}

/* 채팅 화면 */
function ChatView() {
  const [selectedRoom, setSelectedRoom] = useState(null);
  const [newMsg, setNewMsg] = useState('');
  const [messages, setMessages] = useState(MESSAGES_1);
  const [rooms, setRooms] = useState(CHAT_ROOMS);
  const [showReportModal, setShowReportModal] = useState(false);
  const [reportReason, setReportReason] = useState('');
  const [toast, setToast] = useState('');
  const msgEnd = useRef(null);

  useEffect(() => { msgEnd.current?.scrollIntoView({behavior:'smooth'}); }, [messages, selectedRoom]);

  function sendMsg() {
    if (!newMsg.trim()) return;
    setMessages(m => [...m, { id:Date.now(), mine:true, text:newMsg, time:new Date().toLocaleTimeString('ko',{hour:'2-digit',minute:'2-digit'}) }]);
    setNewMsg('');
    setTimeout(() => {
      setMessages(m => [...m, { id:Date.now()+1, mine:false, text:'네, 좋아요! 다음에 또 만나요 :)', time:new Date().toLocaleTimeString('ko',{hour:'2-digit',minute:'2-digit'}) }]);
    }, 1000);
  }

  function submitReport() {
    setShowReportModal(false);
    setToast('신고가 접수됐습니다. 검토 후 처리됩니다.');
    setReportReason('');
  }

  if (selectedRoom) {
    return (
      <div style={{ display:'flex', flexDirection:'column', height:'calc(100vh - 120px)' }}>
        {/* 채팅방 헤더 */}
        <div style={{ display:'flex', alignItems:'center', gap:12, padding:'14px 16px', background:'#fff', borderBottom:'1px solid #f0e8e4' }}>
          <button onClick={()=>setSelectedRoom(null)} style={{ background:'none', border:'none', cursor:'pointer', color:'#7A5048', padding:4 }}>
            &#8592;
          </button>
          <Avatar name={selectedRoom.name} color={MEMBERS.find(m=>m.name===selectedRoom.name)?.color||'#C4614A'} size={38} />
          <div style={{ flex:1 }}>
            <div style={{ fontSize:15, fontWeight:700, color:'#2C1A14' }}>{selectedRoom.name}</div>
            <div style={{ fontSize:11, color:'#7A5048' }}>매칭 · {selectedRoom.matched}</div>
          </div>
          <button onClick={()=>setShowReportModal(true)} style={{ background:'none', border:'none', cursor:'pointer', color:'#dc2626', fontSize:13, fontWeight:600, padding:'6px 12px', border:'1px solid #fee2e2', borderRadius:8, fontFamily:'Pretendard,sans-serif' }}>
            신고
          </button>
        </div>

        {/* 메시지 목록 */}
        <div style={{ flex:1, overflowY:'auto', padding:'16px', display:'flex', flexDirection:'column' }}>
          {messages.map((m,i) => (
            <div key={m.id} className="fade-in" style={{ display:'flex', flexDirection:'column', alignItems: m.mine?'flex-end':'flex-start', animationDelay:`${i*30}ms` }}>
              <div className={`chat-bubble ${m.mine?'mine':'theirs'}`}>{m.text}</div>
              <span style={{ fontSize:11, color:'#b0a8a5', marginBottom:4 }}>{m.time}</span>
            </div>
          ))}
          <div ref={msgEnd} />
        </div>

        {/* 메시지 입력 */}
        <div style={{ padding:'12px 16px', background:'#fff', borderTop:'1px solid #f0e8e4', display:'flex', gap:10 }}>
          <input className="input-field" value={newMsg} onChange={e=>setNewMsg(e.target.value)}
            onKeyDown={e=>e.key==='Enter'&&sendMsg()}
            placeholder="메시지를 입력하세요..." style={{ flex:1 }} />
          <button className="btn-primary" style={{ padding:'10px 18px' }} onClick={sendMsg}>전송</button>
        </div>

        {/* 신고 모달 */}
        {showReportModal && (
          <div className="overlay">
            <div className="modal scale-in">
              <h3 style={{ fontSize:17, fontWeight:700, color:'#2C1A14', marginBottom:16 }}>사용자 신고</h3>
              <p style={{ fontSize:14, color:'#7A5048', marginBottom:16 }}><strong>{selectedRoom.name}</strong>님을 신고하는 사유를 선택해주세요.</p>
              {['욕설 및 비방','불건전한 대화 시도','개인정보 요청','사기 의심','기타'].map(r => (
                <label key={r} style={{ display:'flex', alignItems:'center', gap:10, padding:'10px 14px', borderRadius:10, cursor:'pointer', background: reportReason===r?'rgba(196,97,74,0.08)':'transparent', marginBottom:6, border:'1.5px solid', borderColor: reportReason===r?'#C4614A':'transparent' }}>
                  <input type="radio" name="report" value={r} checked={reportReason===r} onChange={()=>setReportReason(r)} style={{ accentColor:'#C4614A' }} />
                  <span style={{ fontSize:14, color:'#2C1A14' }}>{r}</span>
                </label>
              ))}
              <div style={{ display:'flex', gap:8, marginTop:20 }}>
                <button className="btn-outline" style={{ flex:1 }} onClick={()=>setShowReportModal(false)}>취소</button>
                <button className="btn-primary" style={{ flex:1 }} disabled={!reportReason} onClick={submitReport}>신고 접수</button>
              </div>
            </div>
          </div>
        )}

        {toast && <Toast msg={toast} onDone={()=>setToast('')} />}
      </div>
    );
  }

  return (
    <div style={{ padding:'20px 16px' }}>
      {rooms.length === 0 ? (
        <div style={{ textAlign:'center', padding:'60px 20px', color:'#7A5048' }}>
          <div style={{ fontSize:48, marginBottom:16, opacity:0.3 }}>&#x1F4AC;</div>
          <p>아직 매칭된 대화 상대가 없습니다.</p>
          <p style={{ fontSize:13, marginTop:8 }}>모임에 참가하고 호감도를 입력해보세요!</p>
        </div>
      ) : (
        <div style={{ display:'flex', flexDirection:'column', gap:2 }}>
          {rooms.map((r,i) => {
            const member = MEMBERS.find(m=>m.name===r.name);
            return (
              <div key={r.id} className="fade-in" style={{ animationDelay:`${i*60}ms`, display:'flex', alignItems:'center', gap:14, padding:'14px 16px', background:'#fff', borderRadius:16, cursor:'pointer', transition:'background 0.15s' }}
                onClick={()=>{ setSelectedRoom(r); setRooms(prev=>prev.map(x=>x.id===r.id?{...x,unread:0}:x)); }}>
                <div style={{ position:'relative' }}>
                  <Avatar name={r.name} color={member?.color||'#C4614A'} size={48} />
                  {r.unread > 0 && (
                    <div style={{ position:'absolute', top:-2, right:-2, width:18, height:18, background:'#dc2626', borderRadius:'50%', border:'2px solid #fff', display:'flex', alignItems:'center', justifyContent:'center', fontSize:10, color:'#fff', fontWeight:700, animation:'badgePop 0.3s ease' }}>
                      {r.unread}
                    </div>
                  )}
                </div>
                <div style={{ flex:1, minWidth:0 }}>
                  <div style={{ display:'flex', justifyContent:'space-between', marginBottom:3 }}>
                    <span style={{ fontSize:15, fontWeight:700, color:'#2C1A14' }}>{r.name}</span>
                    <span style={{ fontSize:12, color:'#b0a8a5' }}>{r.time}</span>
                  </div>
                  <div style={{ fontSize:13, color:'#7A5048', overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap' }}>{r.lastMsg}</div>
                  <div style={{ fontSize:11, color:'#C4614A', marginTop:2 }}>매칭 · {r.matched}</div>
                </div>
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}

    { id:3, reporter:'오하린', target:'강도현', reason:'욕설 및 비방',       date:'2025.10.05', status:'처리완료' },
  ]);

              <div style={{ display:'flex', alignItems:'center', gap:12 }}>

                <div style={{ flex:1 }}>
                  <div style={{ display:'flex', alignItems:'center', gap:8, marginBottom:3 }}>
                    <span style={{ fontSize:15, fontWeight:700, color:'#2C1A14' }}>{m.name}</span>
                    <span className={`badge ${statusBadge[m.status]}`}>{statusMap[m.status]}</span>
                  </div>
                  <div style={{ fontSize:12, color:'#7A5048' }}>{m.age}세 · {m.gender} · {m.loc} · 평점 ★{m.rating}</div>
                </div>
                <span style={{ fontSize:12, color:'#7A5048' }}>모임 {m.joined}회</span>
              </div>
            </div>
          ))}
        </div>
      )}

      {/* 모임 관리 */}
      {activeAdminTab==='모임 관리' && (
        <>
          <button className="btn-primary" style={{ width:'100%', marginBottom:16 }} onClick={()=>setShowCreateModal(true)}>
            새 모임 생성
          </button>
          <div style={{ display:'flex', flexDirection:'column', gap:10 }}>
            {meetups.map((m,i) => (
              <div key={m.id} className="card fade-in" style={{ animationDelay:`${i*50}ms`, padding:'14px 18px' }}>
                <div style={{ display:'flex', justifyContent:'space-between', alignItems:'flex-start' }}>
                  <div style={{ flex:1 }}>
                    <div style={{ fontSize:15, fontWeight:700, color:'#2C1A14', marginBottom:4, lineHeight:1.3 }}>{m.title}</div>
                    <div style={{ fontSize:12, color:'#7A5048' }}>{m.date} · {m.loc} · {m.joined}/{m.cap}명</div>
                  </div>
                  <button onClick={()=>deleteMeetup(m.id)}
                    style={{ background:'none', border:'none', cursor:'pointer', color:'#dc2626', fontSize:12, padding:'4px 8px', fontFamily:'Pretendard,sans-serif' }}>
                    삭제
                  </button>
                </div>
              </div>
            ))}
          </div>
        </>
      )}

      {/* 신고 내역 */}
      {activeAdminTab==='신고 내역' && (
        <div style={{ display:'flex', flexDirection:'column', gap:10 }}>
          {reports.map((r,i) => (
            <div key={r.id} className="card fade-in" style={{ animationDelay:`${i*50}ms`, padding:'16px 18px' }}>
              <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:10 }}>
                <span className={`badge ${r.status==='처리완료'?'badge-green':'badge-orange'}`}>{r.status}</span>
                <span style={{ fontSize:12, color:'#b0a8a5' }}>{r.date}</span>
              </div>
              <div style={{ fontSize:14, color:'#2C1A14', marginBottom:4 }}>
                <strong>{r.reporter}</strong>님이 <strong style={{ color:'#dc2626' }}>{r.target}</strong>님 신고
              </div>
              <div style={{ fontSize:13, color:'#7A5048' }}>사유: {r.reason}</div>
            </div>
          ))}
        </div>
      )}

      {/* 회원 상세 모달 */}
      {selectedMember && (
        <div className="overlay">
          <div className="modal scale-in">
            <div style={{ textAlign:'center', marginBottom:20 }}>
              <Avatar name={selectedMember.name} color={selectedMember.color} size={60} />
              <h3 style={{ marginTop:12, fontSize:18, fontWeight:700, color:'#2C1A14' }}>{selectedMember.name}</h3>
              <span className={`badge ${statusBadge[selectedMember.status]}`} style={{ marginTop:6 }}>{statusMap[selectedMember.status]}</span>
            </div>
            <p style={{ fontSize:14, color:'#7A5048', lineHeight:1.7, marginBottom:16, padding:'12px 14px', background:'#fdf6f0', borderRadius:10 }}>{selectedMember.bio}</p>
            {[
              ['나이·성별', `${selectedMember.age}세 · ${selectedMember.gender}`],
              ['지역',      selectedMember.loc],
              ['평균 평점', `★ ${selectedMember.rating}`],
              ['모임 참가', `${selectedMember.joined}회`],
              ['매칭 성사', `${selectedMember.matched}건`],
            ].map(([k,v]) => (
              <div key={k} style={{ display:'flex', justifyContent:'space-between', padding:'8px 0', borderBottom:'1px solid #f0e8e4', fontSize:14 }}>
                <span style={{ color:'#7A5048' }}>{k}</span>
                <span style={{ color:'#2C1A14', fontWeight:600 }}>{v}</span>
              </div>
            ))}
            <div style={{ display:'flex', flexDirection:'column', gap:8, marginTop:20 }}>
              {selectedMember.status==='pending' && (
                <button className="btn-primary" onClick={()=>handleMemberAction(selectedMember,'approve')}>가입 승인</button>
              )}
              {selectedMember.status==='active' && (
                <button style={{ ...{}, background:'#dc2626', color:'#fff', border:'none', borderRadius:12, padding:'10px 20px', fontSize:14, fontWeight:600, cursor:'pointer', fontFamily:'Pretendard,sans-serif' }}
                  onClick={()=>handleMemberAction(selectedMember,'suspend')}>이용정지 처리</button>
              )}
              {selectedMember.status==='suspended' && (
                <button className="btn-primary" onClick={()=>handleMemberAction(selectedMember,'activate')}>이용정지 해제</button>
              )}
              <button className="btn-outline" onClick={()=>setSelectedMember(null)}>닫기</button>
            </div>
          </div>
        </div>
      )}

      {/* 모임 생성 모달 */}
      {showCreateModal && (
        <div className="overlay">
          <div className="modal scale-in" style={{ maxWidth:420 }}>
            <h3 style={{ fontSize:17, fontWeight:700, color:'#2C1A14', marginBottom:20 }}>새 모임 생성</h3>
            {[
              ['모임 제목', 'title', 'text'],
              ['날짜 (예: 2025.11.01)', 'date', 'text'],
              ['장소', 'loc', 'text'],
              ['참가비', 'fee', 'text'],
            ].map(([label, key, type]) => (
              <div key={key} style={{ marginBottom:14 }}>
                <label style={{ fontSize:13, color:'#7A5048', display:'block', marginBottom:6 }}>{label}</label>
                <input className="input-field" type={type} value={newMeetup[key]} onChange={e=>setNewMeetup(p=>({...p,[key]:e.target.value}))} placeholder={label} />
              </div>
            ))}
            <div style={{ marginBottom:14 }}>
              <label style={{ fontSize:13, color:'#7A5048', display:'block', marginBottom:6 }}>카테고리</label>
              <select className="select-field" value={newMeetup.category} onChange={e=>setNewMeetup(p=>({...p,category:e.target.value}))}>
                {['독서/문화','음식/음료','야외/스포츠','게임/취미','취미/문화'].map(c=><option key={c}>{c}</option>)}
              </select>
            </div>
            <div style={{ marginBottom:20 }}>
              <label style={{ fontSize:13, color:'#7A5048', display:'block', marginBottom:6 }}>정원 ({newMeetup.cap}명)</label>
              <input type="range" min={4} max={30} value={newMeetup.cap} onChange={e=>setNewMeetup(p=>({...p,cap:+e.target.value}))}
                style={{ width:'100%', accentColor:'#C4614A' }} />
            </div>
            <div style={{ display:'flex', gap:8 }}>
              <button className="btn-outline" style={{ flex:1 }} onClick={()=>setShowCreateModal(false)}>취소</button>
              <button className="btn-primary" style={{ flex:1 }} onClick={handleCreateMeetup}>생성하기</button>
            </div>
          </div>
        </div>
      )}

      {toast && <Toast msg={toast} onDone={()=>setToast('')} />}
    </div>
  );
}

/* ── 메인 앱 ──────────────────────────────────────────── */
const NAV_ITEMS = ['모임', '매칭', '채팅', '어드민'];

function App() {
  const [activeTab, setActiveTab] = useState('모임');

  const views = {
    '모임':    <MeetupView />,
    '매칭':    <MatchingView />,
    '채팅':    <ChatView />,
    '어드민':  <AdminView />,
  };

  const heroContent = {
    '모임':   { title:'오프라인 모임 찾기', sub:'가까운 지역의 모임에 참가해 새로운 인연을 만들어 보세요' },
    '매칭':   { title:'호감도 평가', sub:'모임 참가자에게 호감도를 입력하고 매칭을 기다려보세요' },
    '채팅':   { title:'매칭 채팅', sub:'매칭된 상대와 대화를 나눠보세요' },
    '어드민': { title:'운영자 대시보드', sub:'회원·모임·신고 내역을 통합 관리합니다' },
  };

  return (
    <div style={{ width:'100%', minHeight:'100vh', background:'#FDF6F0' }}>
      {/* 탑바 */}
      <div className="topnav">
        <div style={{ maxWidth:680, margin:'0 auto' }}>
          <div style={{ display:'flex', alignItems:'center', padding:'14px 16px 0' }}>
            <div style={{ fontSize:20, fontWeight:800, color:'#C4614A', letterSpacing:'-0.5px' }}>모임ON</div>
            <div style={{ fontSize:12, color:'#7A5048', marginLeft:8 }}>30·40·50대 소셜 매칭</div>
          </div>
          <div style={{ display:'flex', overflowX:'auto' }}>
            {NAV_ITEMS.map(item => (
              <button key={item} className={`nav-tab ${activeTab===item?'active':''}`}
                onClick={()=>setActiveTab(item)}>
                {item}
              </button>
            ))}
          </div>
        </div>
      </div>

      <div style={{ maxWidth:680, margin:'0 auto' }}>
        {/* 히어로 */}
        <div className="hero slide-up" key={activeTab}>
          <h1>{heroContent[activeTab].title}</h1>
          <p>{heroContent[activeTab].sub}</p>
        </div>

        {/* 콘텐츠 */}
        <div key={`view-${activeTab}`} className="fade-in">
          {views[activeTab]}
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
