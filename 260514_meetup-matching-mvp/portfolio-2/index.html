<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>모임ON 운영 분석 플랫폼 — 구현 데모</title>
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" rel="stylesheet" />
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://unpkg.com/prop-types@15/prop-types.min.js"></script>
<script src="https://unpkg.com/react-is@18/umd/react-is.production.min.js"></script>
<script src="https://unpkg.com/recharts@2/umd/Recharts.js"></script>
<script src="https://unpkg.com/@phosphor-icons/web@2/src/index.js" type="module"></script>
<link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2/src/bold/style.css" />
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { width: 100%; min-height: 100vh; background: #0F172A; font-family: 'Pretendard', -apple-system, sans-serif; color: #F1F5F9; }
#root { width: 100%; min-height: 100vh; }

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(10px); }
  to   { opacity: 1; transform: translateY(0); }
}
@keyframes slideDown {
  from { opacity: 0; transform: translateY(-8px); }
  to   { opacity: 1; transform: translateY(0); }
}
@keyframes growUp {
  from { transform: scaleY(0); }
  to   { transform: scaleY(1); }
}
@keyframes countUp {
  from { opacity: 0; transform: translateY(8px) scale(0.95); }
  to   { opacity: 1; transform: translateY(0) scale(1); }
}
@keyframes shimmer {
  0%   { background-position: -200% 0; }
  100% { background-position: 200% 0; }
}
@keyframes scaleIn {
  from { opacity: 0; transform: scale(0.96); }
  to   { opacity: 1; transform: scale(1); }
}

.fade-in    { animation: fadeIn 0.35s ease both; }
.slide-down { animation: slideDown 0.28s ease both; }

.nav-link {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 14px;
  border-radius: 10px;
  font-size: 14px; font-weight: 600;
  color: #94A3B8;
  cursor: pointer;
  text-decoration: none;
  border: none; background: none;
  transition: background 0.15s, color 0.15s;
  width: 100%; text-align: left;
  font-family: 'Pretendard', sans-serif;
  white-space: nowrap;
}
.nav-link:hover   { background: rgba(79,106,240,0.1); color: #7B93F5; }
.nav-link.active  { background: rgba(79,106,240,0.15); color: #4F6AF0; }
.nav-link i { font-size: 18px; flex-shrink: 0; }

.kpi-card {
  background: #1E293B;
  border: 1px solid rgba(148,163,184,0.1);
  border-radius: 12px;
  padding: 20px;
  animation: countUp 0.4s ease both;
}
.kpi-card:hover { border-color: rgba(79,106,240,0.3); transition: border-color 0.2s; }

.data-card {
  background: #1E293B;
  border: 1px solid rgba(148,163,184,0.08);
  border-radius: 12px;
  padding: 20px;
}

.btn-primary {
  background: #4F6AF0;
  color: #fff;
  border: none;
  border-radius: 8px;
  padding: 9px 18px;
  font-size: 13px; font-weight: 600;
  cursor: pointer;
  font-family: 'Pretendard', sans-serif;
  transition: background 0.2s, transform 0.15s;
}
.btn-primary:hover { background: #3b55d4; transform: scale(1.02); }

.btn-outline {
  background: transparent;
  color: #7B93F5;
  border: 1.5px solid rgba(123,147,245,0.35);
  border-radius: 8px;
  padding: 8px 18px;
  font-size: 13px; font-weight: 600;
  cursor: pointer;
  font-family: 'Pretendard', sans-serif;
  transition: background 0.2s;
}
.btn-outline:hover { background: rgba(79,106,240,0.1); }

.badge {
  display: inline-flex;
  align-items: center;
  padding: 3px 10px;
  border-radius: 99px;
  font-size: 11px; font-weight: 700;
}
.badge-blue   { background: rgba(79,106,240,0.2);  color: #7B93F5; }
.badge-green  { background: rgba(16,185,129,0.2);  color: #34D399; }
.badge-yellow { background: rgba(245,158,11,0.2);  color: #FCD34D; }
.badge-red    { background: rgba(239,68,68,0.2);   color: #FCA5A5; }
.badge-slate  { background: rgba(148,163,184,0.15); color: #94A3B8; }

.table-row {
  display: grid;
  align-items: center;
  padding: 12px 16px;
  border-bottom: 1px solid rgba(148,163,184,0.06);
  transition: background 0.15s;
  cursor: pointer;
  gap: 12px;
}
.table-row:hover { background: rgba(79,106,240,0.06); }
.table-header {
  display: grid;
  align-items: center;
  padding: 10px 16px;
  gap: 12px;
  font-size: 11px; font-weight: 700; color: #94A3B8;
  text-transform: uppercase; letter-spacing: 0.05em;
  border-bottom: 1px solid rgba(148,163,184,0.1);
}

.overlay {
  position: fixed; inset: 0;
  background: rgba(15,23,42,0.75);
  backdrop-filter: blur(4px);
  z-index: 200;
  display: flex; align-items: center; justify-content: center;
}
.modal {
  background: #1E293B;
  border: 1px solid rgba(148,163,184,0.15);
  border-radius: 16px;
  padding: 28px;
  width: 90%; max-width: 480px;
  max-height: 85vh; overflow-y: auto;
  animation: scaleIn 0.25s ease;
}

.input-field {
  width: 100%;
  padding: 9px 14px;
  background: #0F172A;
  border: 1.5px solid rgba(148,163,184,0.2);
  border-radius: 8px;
  font-size: 13px;
  font-family: 'Pretendard', sans-serif;
  color: #F1F5F9;
  outline: none;
  transition: border-color 0.2s;
}
.input-field:focus { border-color: #4F6AF0; }

.select-field {
  width: 100%;
  padding: 9px 14px;
  background: #0F172A;
  border: 1.5px solid rgba(148,163,184,0.2);
  border-radius: 8px;
  font-size: 13px;
  font-family: 'Pretendard', sans-serif;
  color: #F1F5F9;
  outline: none; cursor: pointer;
}

.toast {
  position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
  background: #1E293B;
  color: #F1F5F9;
  border: 1px solid rgba(79,106,240,0.3);
  border-radius: 10px;
  padding: 11px 20px;
  font-size: 13px; font-weight: 500;
  z-index: 999;
  animation: slideDown 0.3s ease;
  white-space: nowrap;
}

.heat-cell {
  display: flex; align-items: center; justify-content: center;
  border-radius: 4px;
  font-size: 11px; font-weight: 700;
  height: 32px;
  transition: transform 0.15s;
  cursor: default;
}
.heat-cell:hover { transform: scale(1.1); }

.slider-input {
  -webkit-appearance: none;
  width: 100%; height: 4px;
  border-radius: 2px;
  background: #334155;
  outline: none;
  cursor: pointer;
}
.slider-input::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 16px; height: 16px;
  border-radius: 50%;
  background: #4F6AF0;
  cursor: pointer;
  box-shadow: 0 0 0 3px rgba(79,106,240,0.3);
}

.section-title {
  font-size: 16px; font-weight: 700; color: #F1F5F9; margin-bottom: 16px;
}
.label { font-size: 12px; font-weight: 600; color: #64748B; margin-bottom: 6px; display: block; }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useRef } = React;
const {
  LineChart, Line, BarChart, Bar, RadarChart, Radar, PolarGrid,
  PolarAngleAxis, ScatterChart, Scatter, XAxis, YAxis, CartesianGrid,
  Tooltip, ResponsiveContainer, Legend
} = Recharts;

/* ── 더미 데이터 ──────────────────────────────────────── */
const DAILY_STATS = [
  { date:'10/01', signups:4, matches:3, chats:8  },
  { date:'10/05', signups:7, matches:5, chats:15 },
  { date:'10/10', signups:5, matches:4, chats:12 },
  { date:'10/15', signups:12,matches:9, chats:24 },
  { date:'10/20', signups:8, matches:6, chats:18 },
  { date:'10/25', signups:15,matches:11,chats:32 },
  { date:'10/30', signups:10,matches:7, chats:22 },
];

const AGE_RADAR = [
  { subject:'30대', 성사율:65, 참가율:80 },
  { subject:'40대', 성사율:72, 참가율:75 },
  { subject:'50대', 성사율:55, 참가율:60 },
  { subject:'서울', 성사율:70, 참가율:85 },
  { subject:'경기', 성사율:60, 참가율:65 },
  { subject:'기타', 성사율:48, 참가율:55 },
];

const SCORE_DIST = [
  { score:'1점', count:12 },
  { score:'2점', count:24 },
  { score:'3점', count:58 },
  { score:'4점', count:81 },
  { score:'5점', count:45 },
];

const CATEGORY_MATCH = [
  { cat:'독서/문화', rate:68, cnt:42 },
  { cat:'음식/음료', rate:62, cnt:38 },
  { cat:'야외/스포츠',rate:57, cnt:31 },
  { cat:'게임/취미', rate:71, cnt:29 },
  { cat:'취미/문화', rate:55, cnt:22 },
];

const RECOMMEND_USERS = [
  { id:1, name:'이수연', age:35, loc:'서울 마포', recs:['가을 독서 모임','보드게임 & 친목'], reasons:['참가 패턴','연령대 유사도'], score:0.92 },
  { id:2, name:'박지훈', age:48, loc:'경기 분당', recs:['등산 & 친목','보드게임 & 친목'], reasons:['지역 근접성','연령대 유사도'], score:0.87 },
  { id:3, name:'정예은', age:38, loc:'서울 서초', recs:['가을 독서 모임','쿠킹 클래스'], reasons:['참가 패턴','카테고리 선호'], score:0.84 },
  { id:4, name:'최성호', age:52, loc:'서울 용산', recs:['와인 테이스팅','사진 산책'], reasons:['연령대 유사도','지역 근접성'], score:0.79 },
];

const COHORT_DATA = [
  [100, 78, 65, 54, 48, 42, 38],
  [100, 82, 70, 59, 52, 47, null],
  [100, 75, 63, 51, 45, null, null],
  [100, 85, 72, 61, null, null, null],
  [100, 80, 68, null, null, null, null],
  [100, 77, null, null, null, null, null],
  [100, null, null, null, null, null, null],
];
const COHORT_LABELS = ['10월 1주','10월 2주','10월 3주','10월 4주','11월 1주','11월 2주','11월 3주'];

const MEMBERS_LIST = [
  { id:1, name:'김민준', age:41, gender:'남', status:'active',  joined:8, matches:3 },
  { id:2, name:'이수연', age:35, gender:'여', status:'active',  joined:12,matches:5 },
  { id:3, name:'박지훈', age:48, gender:'남', status:'active',  joined:5, matches:1 },
  { id:4, name:'정예은', age:38, gender:'여', status:'active',  joined:20,matches:9 },
  { id:5, name:'최성호', age:52, gender:'남', status:'pending', joined:6, matches:2 },
  { id:6, name:'오하린', age:33, gender:'여', status:'active',  joined:15,matches:6 },
  { id:7, name:'강도현', age:45, gender:'남', status:'suspended',joined:3,matches:0 },
  { id:8, name:'윤서아', age:42, gender:'여', status:'active',  joined:10,matches:4 },
];

/* ── 유틸 ──────────────────────────────────────────── */
function Toast({ msg, onDone }) {
  useEffect(()=>{ const t=setTimeout(onDone,2500); return()=>clearTimeout(t); },[]);
  return <div className="toast">{msg}</div>;
}

function heatColor(v) {
  if (v === null) return 'rgba(30,41,59,0.5)';
  if (v >= 80) return 'rgba(79,106,240,0.85)';
  if (v >= 60) return 'rgba(79,106,240,0.6)';
  if (v >= 40) return 'rgba(79,106,240,0.38)';
  if (v >= 20) return 'rgba(79,106,240,0.2)';
  return 'rgba(79,106,240,0.08)';
}

/* ── 대시보드 화면 ──────────────────────────────────── */
function DashboardView() {
  const [range, setRange] = useState('30일');
  const kpis = [
    { label:'신규 가입', value:'61명', sub:'이번 달 누적', color:'#4F6AF0' },
    { label:'매칭 성사', value:'45건', sub:'신청 대비 74%',    color:'#10B981' },
    { label:'모임 참가율', value:'82%', sub:'평균 참가 비율', color:'#38BDF8' },
    { label:'활성 채팅', value:'128개', sub:'현재 진행 중',  color:'#F59E0B' },
  ];

  return (
    <div>
      {/* 범위 필터 */}
      <div style={{ display:'flex', gap:6, marginBottom:24 }}>
        {['7일','30일','90일'].map(r => (
          <button key={r} onClick={()=>setRange(r)}
            style={{ padding:'6px 16px', borderRadius:8, border:'none', cursor:'pointer', fontSize:13, fontWeight:600, fontFamily:'Pretendard,sans-serif',
              background: range===r ? '#4F6AF0' : 'rgba(148,163,184,0.1)',
              color: range===r ? '#fff' : '#94A3B8',
              transition:'background 0.2s' }}>
            {r}
          </button>
        ))}
      </div>

      {/* KPI 카드 */}
      <div style={{ display:'grid', gridTemplateColumns:'repeat(2,1fr)', gap:12, marginBottom:28 }}>
        {kpis.map((k,i) => (
          <div key={k.label} className="kpi-card" style={{ animationDelay:`${i*80}ms` }}>
            <div style={{ fontSize:12, color:'#64748B', marginBottom:8, fontWeight:600, textTransform:'uppercase', letterSpacing:'0.04em' }}>{k.label}</div>
            <div style={{ fontSize:28, fontWeight:800, color: k.color, letterSpacing:'-0.5px' }}>{k.value}</div>
            <div style={{ fontSize:11, color:'#64748B', marginTop:4 }}>{k.sub}</div>
          </div>
        ))}
      </div>

      {/* 매칭 추이 차트 */}
      <div className="data-card" style={{ marginBottom:20 }}>
        <div className="section-title">일별 매칭 추이</div>
        <div style={{ height:200 }}>
          <ResponsiveContainer width="100%" height="100%">
            <LineChart data={DAILY_STATS} margin={{top:5,right:10,bottom:5,left:-20}}>
              <CartesianGrid strokeDasharray="3 3" stroke="rgba(148,163,184,0.08)" />
              <XAxis dataKey="date" tick={{fontSize:11,fill:'#64748B'}} axisLine={false} tickLine={false} />
              <YAxis tick={{fontSize:11,fill:'#64748B'}} axisLine={false} tickLine={false} />
              <Tooltip contentStyle={{ background:'#1E293B', border:'1px solid rgba(148,163,184,0.15)', borderRadius:8, fontSize:12 }} />
              <Line type="monotone" dataKey="signups" stroke="#4F6AF0" strokeWidth={2} dot={false} name="신규 가입" />
              <Line type="monotone" dataKey="matches"  stroke="#10B981" strokeWidth={2} dot={false} name="매칭 성사" />
              <Line type="monotone" dataKey="chats"    stroke="#38BDF8" strokeWidth={2} dot={false} name="채팅" />
              <Legend wrapperStyle={{ fontSize:12, color:'#94A3B8' }} />
            </LineChart>
          </ResponsiveContainer>
        </div>
      </div>

      {/* 모임 카테고리 성사 비율 */}
      <div className="data-card">
        <div className="section-title">카테고리별 매칭 성사 비율</div>
        <div style={{ height:180 }}>
          <ResponsiveContainer width="100%" height="100%">
            <BarChart data={CATEGORY_MATCH} margin={{top:5,right:10,bottom:5,left:-20}} layout="vertical">
              <CartesianGrid strokeDasharray="3 3" stroke="rgba(148,163,184,0.08)" horizontal={false} />
              <XAxis type="number" tick={{fontSize:11,fill:'#64748B'}} axisLine={false} tickLine={false} domain={[0,100]} unit="%" />
              <YAxis type="category" dataKey="cat" tick={{fontSize:11,fill:'#64748B'}} axisLine={false} tickLine={false} width={72} />
              <Tooltip contentStyle={{ background:'#1E293B', border:'1px solid rgba(148,163,184,0.15)', borderRadius:8, fontSize:12 }} formatter={v=>[`${v}%`, '성사율']} />
              <Bar dataKey="rate" fill="#4F6AF0" radius={[0,4,4,0]} />
            </BarChart>
          </ResponsiveContainer>
        </div>
      </div>
    </div>
  );
}

/* ── 매칭 통계 화면 ──────────────────────────────────── */
function StatisticsView() {
  const [genderFilter, setGenderFilter] = useState('전체');
  const [selectedBar, setSelectedBar] = useState(null);

  return (
    <div>
      {/* 필터 */}
      <div style={{ display:'flex', gap:6, marginBottom:24, flexWrap:'wrap' }}>
        {['전체','남성','여성'].map(g => (
          <button key={g} onClick={()=>setGenderFilter(g)}
            style={{ padding:'6px 14px', borderRadius:8, border:'none', cursor:'pointer', fontSize:13, fontWeight:600, fontFamily:'Pretendard,sans-serif',
              background: genderFilter===g ? '#4F6AF0' : 'rgba(148,163,184,0.1)',
              color: genderFilter===g ? '#fff' : '#94A3B8', transition:'background 0.2s' }}>
            {g}
          </button>
        ))}
      </div>

      {/* 레이더 차트 */}
      <div className="data-card" style={{ marginBottom:20 }}>
        <div className="section-title">연령대·지역별 매칭 성사율</div>
        <div style={{ height:220 }}>
          <ResponsiveContainer width="100%" height="100%">
            <RadarChart data={AGE_RADAR} cx="50%" cy="50%" outerRadius={80}>
              <PolarGrid stroke="rgba(148,163,184,0.12)" />
              <PolarAngleAxis dataKey="subject" tick={{fontSize:12,fill:'#94A3B8'}} />
              <Radar name="성사율" dataKey="성사율" stroke="#4F6AF0" fill="#4F6AF0" fillOpacity={0.25} />
              <Radar name="참가율" dataKey="참가율" stroke="#38BDF8" fill="#38BDF8" fillOpacity={0.15} />
              <Tooltip contentStyle={{ background:'#1E293B', border:'1px solid rgba(148,163,184,0.15)', borderRadius:8, fontSize:12 }} />
              <Legend wrapperStyle={{ fontSize:12, color:'#94A3B8' }} />
            </RadarChart>
          </ResponsiveContainer>
        </div>
      </div>

      {/* 호감도 분포 */}
      <div className="data-card" style={{ marginBottom:20 }}>
        <div className="section-title">호감도 점수 분포</div>
        <div style={{ height:160 }}>
          <ResponsiveContainer width="100%" height="100%">
            <BarChart data={SCORE_DIST} margin={{top:5,right:10,bottom:5,left:-20}} onClick={e=>e&&setSelectedBar(e.activePayload?.[0]?.payload)}>
              <CartesianGrid strokeDasharray="3 3" stroke="rgba(148,163,184,0.08)" />
              <XAxis dataKey="score" tick={{fontSize:12,fill:'#64748B'}} axisLine={false} tickLine={false} />
              <YAxis tick={{fontSize:11,fill:'#64748B'}} axisLine={false} tickLine={false} />
              <Tooltip contentStyle={{ background:'#1E293B', border:'1px solid rgba(148,163,184,0.15)', borderRadius:8, fontSize:12 }} formatter={v=>[`${v}명`,'인원']} />
              <Bar dataKey="count" fill="#7B93F5" radius={[4,4,0,0]} cursor="pointer" />
            </BarChart>
          </ResponsiveContainer>
        </div>
        {selectedBar && (
          <div style={{ marginTop:12, padding:'10px 14px', background:'rgba(79,106,240,0.08)', borderRadius:8, border:'1px solid rgba(79,106,240,0.2)', fontSize:13, color:'#7B93F5' }}>
            <strong>{selectedBar.score}</strong>를 준 사용자: <strong>{selectedBar.count}명</strong>
          </div>
        )}
      </div>

      {/* 카테고리 성사 비율 테이블 */}
      <div className="data-card">
        <div className="section-title">카테고리별 매칭 성사 비율</div>
        <div style={{ overflowX:'auto' }}>
          <div className="table-header" style={{ gridTemplateColumns:'1fr 80px 80px' }}>
            <span>카테고리</span><span>성사율</span><span>건수</span>
          </div>
          {[...CATEGORY_MATCH].sort((a,b)=>b.rate-a.rate).map((r,i) => (
            <div key={r.cat} className="table-row fade-in" style={{ gridTemplateColumns:'1fr 80px 80px', animationDelay:`${i*50}ms` }}>
              <span style={{ fontSize:14, color:'#F1F5F9' }}>{r.cat}</span>
              <div style={{ display:'flex', alignItems:'center', gap:8 }}>
                <div style={{ flex:1, height:4, background:'rgba(148,163,184,0.12)', borderRadius:99, overflow:'hidden', minWidth:40 }}>
                  <div style={{ height:'100%', width:`${r.rate}%`, background:'#4F6AF0', borderRadius:99, transition:'width 0.6s' }} />
                </div>
                <span style={{ fontSize:13, color:'#4F6AF0', fontWeight:700 }}>{r.rate}%</span>
              </div>
              <span style={{ fontSize:13, color:'#64748B' }}>{r.cnt}건</span>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

/* ── 모임 추천 관리 화면 ─────────────────────────────── */
function RecommendView() {
  const [weights, setWeights] = useState({ distance:70, ageGroup:80, category:60 });
  const [blacklist, setBlacklist] = useState([]);
  const [selectedUser, setSelectedUser] = useState(null);
  const [toast, setToast] = useState('');
  const MEETUP_OPTIONS = ['가을 독서 모임','와인 테이스팅','등산 & 친목','보드게임 & 친목','쿠킹 클래스','사진 산책'];

  function toggleBlacklist(meetup) {
    setBlacklist(prev => prev.includes(meetup) ? prev.filter(x=>x!==meetup) : [...prev,meetup]);
  }

  return (
    <div>
      {/* 가중치 설정 */}
      <div className="data-card" style={{ marginBottom:20 }}>
        <div className="section-title">추천 가중치 설정</div>
        <p style={{ fontSize:13, color:'#64748B', marginBottom:20 }}>슬라이더를 조정하면 추천 결과 미리보기에 즉시 반영됩니다.</p>
        {[
          { key:'distance', label:'지역 근접성', color:'#4F6AF0' },
          { key:'ageGroup', label:'연령대 유사도', color:'#10B981' },
          { key:'category', label:'카테고리 선호도', color:'#38BDF8' },
        ].map(w => (
          <div key={w.key} style={{ marginBottom:18 }}>
            <div style={{ display:'flex', justifyContent:'space-between', marginBottom:8 }}>
              <span style={{ fontSize:13, color:'#94A3B8', fontWeight:600 }}>{w.label}</span>
              <span style={{ fontSize:14, fontWeight:800, color: w.color }}>{weights[w.key]}%</span>
            </div>
            <input type="range" className="slider-input" min={0} max={100} value={weights[w.key]}
              style={{ '--thumb-color': w.color }}
              onChange={e=>setWeights(p=>({...p,[w.key]:+e.target.value}))} />
          </div>
        ))}
      </div>

      {/* 블랙리스트 */}
      <div className="data-card" style={{ marginBottom:20 }}>
        <div className="section-title">추천 제외 모임 (블랙리스트)</div>
        <div style={{ display:'flex', flexWrap:'wrap', gap:8 }}>
          {MEETUP_OPTIONS.map(m => (
            <button key={m} onClick={()=>toggleBlacklist(m)}
              style={{ padding:'6px 12px', borderRadius:8, border:'1.5px solid', cursor:'pointer', fontSize:12, fontWeight:600, fontFamily:'Pretendard,sans-serif', transition:'all 0.2s',
                borderColor: blacklist.includes(m) ? '#dc2626' : 'rgba(148,163,184,0.2)',
                background: blacklist.includes(m) ? 'rgba(220,38,38,0.12)' : 'transparent',
                color: blacklist.includes(m) ? '#FCA5A5' : '#94A3B8' }}>
              {blacklist.includes(m) ? '제외됨: ' : ''}{m.slice(0,8)}
            </button>
          ))}
        </div>
        {blacklist.length > 0 && (
          <p style={{ fontSize:12, color:'#64748B', marginTop:12 }}>블랙리스트 {blacklist.length}개 모임이 전체 추천에서 제외됩니다.</p>
        )}
      </div>

      {/* 추천 결과 미리보기 */}
      <div className="data-card">
        <div className="section-title">추천 결과 미리보기</div>
        <div style={{ display:'flex', flexDirection:'column', gap:12 }}>
          {RECOMMEND_USERS.map((u,i) => {
            const score = Math.min(0.99, u.score * (weights.distance + weights.ageGroup + weights.category) / 210);
            const filteredRecs = u.recs.filter(r=>!blacklist.some(b=>r.includes(b.slice(0,4))));
            return (
              <div key={u.id} className="data-card fade-in" style={{ animationDelay:`${i*60}ms`, background:'rgba(15,23,42,0.6)', cursor:'pointer', transition:'border-color 0.2s', border:'1px solid rgba(148,163,184,0.06)' }}
                onClick={()=>setSelectedUser(u)}>
                <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:10 }}>
                  <div>
                    <span style={{ fontSize:15, fontWeight:700, color:'#F1F5F9' }}>{u.name}</span>
                    <span style={{ fontSize:13, color:'#64748B', marginLeft:8 }}>{u.age}세 · {u.loc}</span>
                  </div>
                  <span style={{ fontSize:16, fontWeight:800, color:'#4F6AF0' }}>{(score*100).toFixed(0)}점</span>
                </div>
                <div style={{ display:'flex', gap:6, flexWrap:'wrap', marginBottom:10 }}>
                  {u.reasons.map(r => <span key={r} className="badge badge-blue">{r}</span>)}
                </div>
                <div style={{ fontSize:12, color:'#64748B' }}>
                  추천 모임: {filteredRecs.length > 0 ? filteredRecs.join(', ') : <span style={{ color:'#FCA5A5' }}>제외됨 (블랙리스트)</span>}
                </div>
              </div>
            );
          })}
        </div>
      </div>

      {/* 사용자 상세 모달 */}
      {selectedUser && (
        <div className="overlay">
          <div className="modal">
            <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:20 }}>
              <h3 style={{ fontSize:17, fontWeight:700 }}>{selectedUser.name}님 추천 상세</h3>
              <button onClick={()=>setSelectedUser(null)} style={{ background:'none', border:'none', cursor:'pointer', color:'#64748B', fontSize:22 }}>&#x2715;</button>
            </div>
            <div style={{ fontSize:14, color:'#94A3B8', marginBottom:16 }}>{selectedUser.age}세 · {selectedUser.loc}</div>
            <div style={{ marginBottom:16 }}>
              <span className="label">추천 이유</span>
              <div style={{ display:'flex', gap:6, flexWrap:'wrap' }}>
                {selectedUser.reasons.map(r=><span key={r} className="badge badge-blue">{r}</span>)}
              </div>
            </div>
            <div style={{ marginBottom:20 }}>
              <span className="label">추천 모임</span>
              {selectedUser.recs.map(r => (
                <div key={r} style={{ padding:'8px 12px', background:'rgba(79,106,240,0.08)', borderRadius:8, marginBottom:6, fontSize:13, color:'#7B93F5' }}>{r}</div>
              ))}
            </div>
            <button className="btn-primary" style={{ width:'100%' }} onClick={()=>{ setSelectedUser(null); setToast('추천 확정 처리됐습니다'); }}>추천 확정</button>
          </div>
        </div>
      )}

      {toast && <Toast msg={toast} onDone={()=>setToast('')} />}
    </div>
  );
}

/* ── 코호트 분석 화면 ────────────────────────────────── */
function CohortView() {
  const [period, setPeriod] = useState('월별');
  const [hovered, setHovered] = useState(null);

  return (
    <div>
      {/* 기간 필터 */}
      <div style={{ display:'flex', gap:6, marginBottom:24 }}>
        {['월별','분기별'].map(p => (
          <button key={p} onClick={()=>setPeriod(p)}
            style={{ padding:'6px 14px', borderRadius:8, border:'none', cursor:'pointer', fontSize:13, fontWeight:600, fontFamily:'Pretendard,sans-serif',
              background: period===p ? '#4F6AF0' : 'rgba(148,163,184,0.1)',
              color: period===p ? '#fff' : '#94A3B8', transition:'background 0.2s' }}>
            {p}
          </button>
        ))}
      </div>

      {/* 코호트 히트맵 */}
      <div className="data-card" style={{ marginBottom:20 }}>
        <div className="section-title">가입 코호트별 재참가율 히트맵</div>
        <p style={{ fontSize:12, color:'#64748B', marginBottom:16 }}>각 셀에 마우스를 올리면 상세 수치를 확인할 수 있습니다.</p>

        <div style={{ overflowX:'auto' }}>
          {/* 헤더 */}
          <div style={{ display:'grid', gridTemplateColumns:`120px repeat(7,1fr)`, gap:3, marginBottom:3, minWidth:600 }}>
            <div style={{ fontSize:10, color:'#475569', display:'flex', alignItems:'center' }}>가입 코호트</div>
            {['0주','1주','2주','3주','4주','5주','6주'].map(w => (
              <div key={w} style={{ fontSize:10, color:'#475569', textAlign:'center', padding:'2px 0' }}>{w}</div>
            ))}
          </div>

          {/* 데이터 행 */}
          {COHORT_DATA.map((row, ri) => (
            <div key={ri} style={{ display:'grid', gridTemplateColumns:`120px repeat(7,1fr)`, gap:3, marginBottom:3, minWidth:600 }}>
              <div style={{ fontSize:11, color:'#94A3B8', display:'flex', alignItems:'center', paddingRight:8, whiteSpace:'nowrap' }}>
                {COHORT_LABELS[ri]}
              </div>
              {row.map((val, ci) => (
                <div key={ci}
                  className="heat-cell"
                  style={{ background: hovered?.ri===ri&&hovered?.ci===ci ? '#4F6AF0' : heatColor(val), color: val!==null ? '#F1F5F9' : '#334155' }}
                  onMouseEnter={()=>val!==null&&setHovered({ri,ci,val})}
                  onMouseLeave={()=>setHovered(null)}>
                  {val !== null ? `${val}%` : '—'}
                </div>
              ))}
            </div>
          ))}
        </div>

        {/* 툴팁 */}
        {hovered && (
          <div style={{ marginTop:12, padding:'10px 14px', background:'rgba(79,106,240,0.1)', borderRadius:8, border:'1px solid rgba(79,106,240,0.25)', fontSize:13 }}>
            <strong style={{ color:'#7B93F5' }}>{COHORT_LABELS[hovered.ri]}</strong> 코호트
            — {hovered.ci}주차 재참가율: <strong style={{ color:'#4F6AF0', fontSize:16 }}>{hovered.val}%</strong>
          </div>
        )}

        {/* 범례 */}
        <div style={{ display:'flex', gap:8, marginTop:16, alignItems:'center', flexWrap:'wrap' }}>
          <span style={{ fontSize:11, color:'#64748B' }}>재참가율</span>
          {[['낮음','rgba(79,106,240,0.08)'], ['중간','rgba(79,106,240,0.38)'], ['높음','rgba(79,106,240,0.85)']].map(([l,c]) => (
            <div key={l} style={{ display:'flex', alignItems:'center', gap:4 }}>
              <div style={{ width:14, height:14, borderRadius:3, background:c }} />
              <span style={{ fontSize:11, color:'#64748B' }}>{l}</span>
            </div>
          ))}
        </div>
      </div>

      {/* 코호트 요약 테이블 */}
      <div className="data-card">
        <div className="section-title">코호트 요약</div>
        <div style={{ overflowX:'auto' }}>
          <div className="table-header" style={{ gridTemplateColumns:'1fr 60px 70px 70px' }}>
            <span>코호트</span><span>초기</span><span>4주 재참가</span><span>추세</span>
          </div>
          {COHORT_LABELS.slice(0,5).map((label,i) => {
            const val4 = COHORT_DATA[i][4];
            return (
              <div key={label} className="table-row fade-in" style={{ gridTemplateColumns:'1fr 60px 70px 70px', animationDelay:`${i*50}ms` }}>
                <span style={{ fontSize:13, color:'#F1F5F9' }}>{label}</span>
                <span style={{ fontSize:13, color:'#64748B' }}>100%</span>
                <span style={{ fontSize:13, color: val4 ? '#4F6AF0' : '#64748B', fontWeight:700 }}>{val4 ? `${val4}%` : '—'}</span>
                <span style={{ fontSize:13, color: i===3 ? '#10B981' : '#64748B' }}>{i===3 ? '상승' : i===2 ? '유지' : '하락'}</span>
              </div>
            );
          })}
        </div>
      </div>
    </div>
  );
}

/* ── 메인 앱 (spa-modern) ────────────────────────────── */
const NAV = [
  { key:'대시보드',  icon:'ph-chart-line-bold' },
  { key:'매칭 통계', icon:'ph-intersect-bold' },
  { key:'모임 추천', icon:'ph-star-bold' },
  { key:'코호트 분석', icon:'ph-squares-four-bold' },
];

function App() {
  const [page, setPage] = useState('대시보드');
  const [sidebarOpen, setSidebarOpen] = useState(false);

  const views = {
    '대시보드':   <DashboardView />,
    '매칭 통계':  <StatisticsView />,
    '모임 추천':  <RecommendView />,
    '코호트 분석': <CohortView />,
  };

  return (
    <div style={{ width:'100%', minHeight:'100vh', display:'flex', flexDirection:'column' }}>
      {/* 글로벌 탑바 */}
      <header style={{ background:'rgba(15,23,42,0.95)', backdropFilter:'blur(8px)', borderBottom:'1px solid rgba(148,163,184,0.08)', position:'sticky', top:0, zIndex:100 }}>
        <div style={{ maxWidth:1100, margin:'0 auto', padding:'0 20px', height:58, display:'flex', alignItems:'center', gap:16 }}>
          <div style={{ fontSize:18, fontWeight:800, color:'#4F6AF0', letterSpacing:'-0.5px', flexShrink:0 }}>모임ON</div>
          <div style={{ fontSize:12, color:'#64748B', flexShrink:0 }}>운영 분석 플랫폼</div>
          <div style={{ flex:1 }} />
          {/* 데스크톱 네비 */}
          <nav style={{ display:'flex', gap:4 }}>
            {NAV.map(n => (
              <button key={n.key} className={`nav-link ${page===n.key?'active':''}`}
                style={{ padding:'7px 14px' }}
                onClick={()=>setPage(n.key)}>
                <i className={n.icon} style={{ fontSize:16 }} />
                {n.key}
              </button>
            ))}
          </nav>
          <div style={{ display:'flex', alignItems:'center', gap:10, marginLeft:8 }}>
            <div style={{ width:34, height:34, borderRadius:'50%', background:'rgba(79,106,240,0.2)', display:'flex', alignItems:'center', justifyContent:'center', fontSize:14, fontWeight:700, color:'#7B93F5' }}>관</div>
          </div>
        </div>
      </header>

      {/* 본문 */}
      <div style={{ flex:1, maxWidth:1100, margin:'0 auto', width:'100%', padding:'28px 20px' }}>
        {/* 페이지 헤더 */}
        <div style={{ marginBottom:28 }}>
          <h1 style={{ fontSize:22, fontWeight:800, color:'#F1F5F9', letterSpacing:'-0.4px' }}>{page}</h1>
          <p style={{ fontSize:13, color:'#64748B', marginTop:4 }}>
            {{
              '대시보드':   '플랫폼 핵심 지표와 매칭 추이를 실시간으로 확인합니다',
              '매칭 통계':  '연령대·지역·카테고리별 매칭 성사 비율을 다차원으로 분석합니다',
              '모임 추천':  '가중치 기반 개인화 추천 로직을 관리하고 결과를 미리 확인합니다',
              '코호트 분석': '가입 시점별 코호트 그룹의 재참가율 패턴을 히트맵으로 분석합니다',
            }[page]}
          </p>
        </div>

        {/* 컨텐츠 */}
        <div key={page} className="fade-in">
          {views[page]}
        </div>
      </div>

      {/* 푸터 */}
      <footer style={{ borderTop:'1px solid rgba(148,163,184,0.06)', padding:'16px 20px', textAlign:'center' }}>
        <p style={{ fontSize:12, color:'#334155' }}>모임ON 운영 분석 플랫폼 — 구현 데모</p>
      </footer>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
