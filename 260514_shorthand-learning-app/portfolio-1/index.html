<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>속기사 학습 자동 채점 시스템</title>
  <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" rel="stylesheet" />
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://unpkg.com/prop-types@15/prop-types.min.js"></script>
  <script src="https://unpkg.com/react-is@18/umd/react-is.production.min.js"></script>
  <script src="https://unpkg.com/recharts@2.12.7/umd/Recharts.js"></script>
  <link rel="stylesheet" href="https://unpkg.com/lucide@latest/font/lucide.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body, #root { width: 100%; min-height: 100vh; font-family: 'Pretendard', sans-serif; }
    body { background: #F5F6FA; color: #1A1F3C; }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(6px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeInScale {
      from { opacity: 0; transform: scale(0.95); }
      to { opacity: 1; transform: scale(1); }
    }
    @keyframes slideInRight {
      from { opacity: 0; transform: translateX(32px); }
      to { opacity: 1; transform: translateX(0); }
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }
    @keyframes countUp {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes progressBar {
      from { width: 0; }
      to { width: var(--progress-width, 72%); }
    }
    @keyframes waveform {
      0%, 100% { height: 4px; }
      50% { height: 20px; }
    }

    .app-wrap { display: flex; flex-direction: column; min-height: 100vh; width: 100%; }

    /* Topnav */
    .topnav {
      width: 100%; background: #2D3A6B; border-bottom: 1px solid #3d4d85;
      position: sticky; top: 0; z-index: 100;
    }
    .topnav-inner {
      max-width: 1280px; margin: 0 auto; padding: 0 32px;
      display: flex; align-items: center; height: 60px; gap: 8px;
    }
    .nav-logo {
      font-size: 16px; font-weight: 700; color: #fff; margin-right: 16px;
      white-space: nowrap; letter-spacing: -0.3px;
    }
    .nav-logo span { color: #1AB8A8; }
    .nav-tabs { display: flex; align-items: center; gap: 2px; flex: 1; }
    .nav-tab {
      padding: 8px 16px; border-radius: 6px; cursor: pointer;
      font-size: 14px; font-weight: 500; color: rgba(255,255,255,0.65);
      transition: all 0.18s; border: none; background: transparent;
      white-space: nowrap;
    }
    .nav-tab:hover { background: rgba(255,255,255,0.1); color: #fff; }
    .nav-tab.active {
      background: rgba(26,184,168,0.2); color: #1AB8A8;
      font-weight: 600;
    }
    .nav-right { margin-left: auto; display: flex; align-items: center; gap: 12px; }
    .badge-grade {
      background: #1AB8A8; color: #fff; font-size: 12px; font-weight: 700;
      padding: 3px 10px; border-radius: 20px;
    }

    /* Hero */
    .hero {
      background: linear-gradient(135deg, #2D3A6B 0%, #1c2750 60%, #0f1a3a 100%);
      padding: 48px 32px 44px; color: #fff; position: relative; overflow: hidden;
    }
    .hero::after {
      content: ''; position: absolute; bottom: -40px; right: -40px;
      width: 280px; height: 280px; border-radius: 50%;
      background: radial-gradient(circle, rgba(26,184,168,0.12) 0%, transparent 70%);
      pointer-events: none;
    }
    .hero-inner { max-width: 1280px; margin: 0 auto; }
    .hero-tag {
      display: inline-flex; align-items: center; gap: 6px;
      background: rgba(26,184,168,0.15); border: 1px solid rgba(26,184,168,0.3);
      color: #1AB8A8; font-size: 12px; font-weight: 600;
      padding: 4px 12px; border-radius: 20px; margin-bottom: 16px;
      letter-spacing: 0.5px; text-transform: uppercase;
    }
    .hero h1 { font-size: 28px; font-weight: 800; margin-bottom: 8px; letter-spacing: -0.5px; }
    .hero p { font-size: 15px; color: rgba(255,255,255,0.7); max-width: 520px; line-height: 1.6; }
    .hero-stats {
      display: flex; gap: 32px; margin-top: 28px;
    }
    .hero-stat { display: flex; flex-direction: column; gap: 2px; }
    .hero-stat-val {
      font-size: 24px; font-weight: 800; color: #1AB8A8;
      animation: countUp 0.6s ease forwards;
    }
    .hero-stat-label { font-size: 12px; color: rgba(255,255,255,0.55); font-weight: 500; }

    /* Main content */
    .main-content { max-width: 1280px; margin: 0 auto; padding: 32px 32px; width: 100%; }

    /* Cards */
    .card {
      background: #fff; border-radius: 10px; padding: 24px;
      box-shadow: 0 2px 8px rgba(45,58,107,0.08);
      transition: box-shadow 0.2s, transform 0.2s;
    }
    .card:hover { box-shadow: 0 6px 20px rgba(45,58,107,0.14); transform: translateY(-2px); }

    /* View screens */
    .view { animation: fadeIn 0.3s ease forwards; }

    /* ===== 지문 입력 VIEW ===== */
    .input-grid { display: grid; grid-template-columns: 1fr 360px; gap: 24px; }
    .section-title { font-size: 16px; font-weight: 700; color: #1A1F3C; margin-bottom: 4px; }
    .section-sub { font-size: 13px; color: #6B7280; margin-bottom: 16px; }
    .text-area {
      width: 100%; min-height: 240px; border: 1.5px solid #e2e5f0; border-radius: 8px;
      padding: 16px; font-size: 15px; font-family: 'Pretendard', sans-serif;
      line-height: 1.7; resize: vertical; color: #1A1F3C; background: #fafbfe;
      transition: border-color 0.2s;
    }
    .text-area:focus { outline: none; border-color: #4A5899; background: #fff; }
    .char-counter {
      display: flex; justify-content: space-between; align-items: center;
      margin-top: 10px; font-size: 13px; color: #6B7280;
    }
    .char-count-val { font-weight: 700; color: #2D3A6B; font-size: 16px; }
    .grade-selector { margin-bottom: 20px; }
    .grade-label { font-size: 13px; font-weight: 600; color: #1A1F3C; margin-bottom: 10px; }
    .grade-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
    .grade-btn {
      padding: 10px 6px; border: 2px solid #e2e5f0; border-radius: 8px;
      cursor: pointer; text-align: center; transition: all 0.18s; background: #fff;
    }
    .grade-btn.active {
      border-color: #2D3A6B; background: #2D3A6B; color: #fff;
    }
    .grade-btn:hover:not(.active) { border-color: #4A5899; }
    .grade-val { font-size: 16px; font-weight: 800; }
    .grade-unit { font-size: 10px; color: #6B7280; margin-top: 2px; }
    .grade-btn.active .grade-unit { color: rgba(255,255,255,0.7); }
    .mode-toggle { margin-bottom: 20px; }
    .toggle-row {
      display: flex; align-items: center; justify-content: space-between;
      padding: 12px 16px; background: #f5f6fa; border-radius: 8px;
      margin-bottom: 8px; cursor: pointer; transition: background 0.15s;
    }
    .toggle-row:hover { background: #eef0f8; }
    .toggle-label-text { font-size: 13px; font-weight: 600; color: #1A1F3C; }
    .toggle-desc { font-size: 11px; color: #6B7280; margin-top: 2px; }
    .toggle-switch {
      width: 40px; height: 22px; border-radius: 11px; background: #e2e5f0;
      position: relative; transition: background 0.2s; flex-shrink: 0;
    }
    .toggle-switch.on { background: #2D3A6B; }
    .toggle-switch::after {
      content: ''; position: absolute; top: 3px; left: 3px;
      width: 16px; height: 16px; border-radius: 50%; background: #fff;
      transition: transform 0.2s;
    }
    .toggle-switch.on::after { transform: translateX(18px); }
    .calc-box {
      background: linear-gradient(135deg, #2D3A6B, #3d4d85); border-radius: 8px;
      padding: 16px; color: #fff; margin-bottom: 16px;
    }
    .calc-title { font-size: 12px; color: rgba(255,255,255,0.6); font-weight: 500; margin-bottom: 8px; }
    .calc-val { font-size: 26px; font-weight: 800; color: #1AB8A8; }
    .calc-sub { font-size: 12px; color: rgba(255,255,255,0.6); margin-top: 2px; }
    .btn-primary {
      width: 100%; padding: 14px; background: #2D3A6B; color: #fff;
      border: none; border-radius: 8px; font-size: 15px; font-weight: 700;
      cursor: pointer; transition: all 0.2s; font-family: 'Pretendard', sans-serif;
      display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    .btn-primary:hover { background: #1c2750; transform: translateY(-1px); }
    .sample-btns { display: flex; gap: 8px; margin-bottom: 12px; flex-wrap: wrap; }
    .sample-btn {
      padding: 6px 12px; background: #f0f2fa; border: 1px solid #e2e5f0; border-radius: 20px;
      font-size: 12px; font-weight: 500; color: #4A5899; cursor: pointer;
      transition: all 0.15s;
    }
    .sample-btn:hover { background: #e8ebf8; border-color: #4A5899; }

    /* ===== 오디오 플레이어 VIEW ===== */
    .player-grid { display: grid; grid-template-columns: 1fr 340px; gap: 24px; }
    .player-card { }
    .tts-status-bar {
      display: flex; align-items: center; gap: 12px; padding: 12px 16px;
      background: #f0f2fa; border-radius: 8px; margin-bottom: 20px;
    }
    .tts-dot {
      width: 10px; height: 10px; border-radius: 50%; background: #1AB8A8;
      animation: pulse 1.2s ease-in-out infinite;
    }
    .tts-status-text { font-size: 13px; font-weight: 600; color: #2D3A6B; }
    .tts-grade-badge {
      margin-left: auto; background: #2D3A6B; color: #fff;
      font-size: 12px; font-weight: 700; padding: 3px 10px; border-radius: 20px;
    }
    .waveform-wrap {
      height: 60px; background: #f5f6fa; border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      gap: 3px; padding: 0 16px; margin-bottom: 16px; overflow: hidden;
    }
    .wave-bar {
      width: 3px; border-radius: 2px; background: #4A5899; min-height: 4px;
    }
    .wave-bar.active {
      background: #1AB8A8;
      animation: waveform 0.5s ease-in-out infinite;
    }
    .progress-section { margin-bottom: 20px; }
    .progress-meta {
      display: flex; justify-content: space-between; font-size: 12px;
      color: #6B7280; margin-bottom: 6px; font-weight: 500;
    }
    .progress-track {
      height: 6px; background: #e2e5f0; border-radius: 3px; overflow: hidden;
    }
    .progress-fill {
      height: 100%; border-radius: 3px; background: linear-gradient(90deg, #1AB8A8, #2D3A6B);
      width: 0; animation: progressBar 0.8s ease forwards 0.3s;
      --progress-width: 42%;
    }
    .player-controls {
      display: flex; align-items: center; justify-content: center; gap: 12px;
      padding: 16px 0;
    }
    .ctrl-btn {
      display: flex; align-items: center; justify-content: center;
      width: 42px; height: 42px; border-radius: 50%; border: 2px solid #e2e5f0;
      background: #fff; cursor: pointer; transition: all 0.18s; color: #4A5899;
      font-size: 16px;
    }
    .ctrl-btn:hover { border-color: #4A5899; background: #f0f2fa; transform: scale(1.05); }
    .ctrl-btn-primary {
      width: 54px; height: 54px; background: #2D3A6B; color: #fff;
      border: none; font-size: 20px;
    }
    .ctrl-btn-primary:hover { background: #1c2750; }
    .ctrl-label { font-size: 10px; text-align: center; color: #6B7280; margin-top: 4px; }
    .ctrl-wrap { display: flex; flex-direction: column; align-items: center; }
    .dictation-section { }
    .dictation-label {
      font-size: 13px; font-weight: 600; color: #1A1F3C; margin-bottom: 8px;
    }
    .dictation-area {
      width: 100%; min-height: 200px; border: 1.5px solid #e2e5f0; border-radius: 8px;
      padding: 14px; font-size: 15px; font-family: 'Pretendard', sans-serif;
      line-height: 1.8; resize: none; background: #fafbfe; color: #1A1F3C;
      transition: border-color 0.2s;
    }
    .dictation-area:focus { outline: none; border-color: #2D3A6B; background: #fff; }
    .dictation-hint { font-size: 12px; color: #6B7280; margin-top: 8px; line-height: 1.5; }
    .origin-text-box {
      background: #f5f6fa; border-radius: 8px; padding: 14px;
      font-size: 14px; line-height: 1.8; color: #1A1F3C; margin-bottom: 16px;
      max-height: 180px; overflow-y: auto; border: 1px solid #e2e5f0;
    }
    .origin-label { font-size: 11px; font-weight: 600; color: #6B7280; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px; }
    .grade-speed-row {
      display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 16px;
    }
    .mini-stat-box {
      background: #f5f6fa; border-radius: 8px; padding: 12px;
      text-align: center;
    }
    .mini-stat-val { font-size: 18px; font-weight: 800; color: #2D3A6B; }
    .mini-stat-label { font-size: 11px; color: #6B7280; margin-top: 2px; }
    .btn-score {
      width: 100%; padding: 13px; background: #1AB8A8; color: #fff;
      border: none; border-radius: 8px; font-size: 14px; font-weight: 700;
      cursor: pointer; font-family: 'Pretendard', sans-serif;
      transition: all 0.2s; display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    .btn-score:hover { background: #13a599; transform: translateY(-1px); }

    /* ===== 채점 결과 VIEW ===== */
    .scoring-grid { display: grid; grid-template-columns: 1fr 320px; gap: 24px; }
    .score-summary-row {
      display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 24px;
    }
    .score-kpi {
      background: #fff; border-radius: 10px; padding: 20px 16px; text-align: center;
      box-shadow: 0 2px 8px rgba(45,58,107,0.07);
      animation: countUp 0.5s ease forwards;
    }
    .score-kpi-val { font-size: 30px; font-weight: 900; color: #2D3A6B; }
    .score-kpi-val.accent { color: #1AB8A8; }
    .score-kpi-val.error-red { color: #ef4444; }
    .score-kpi-val.error-blue { color: #3b82f6; }
    .score-kpi-val.error-green { color: #22c55e; }
    .score-kpi-label { font-size: 12px; color: #6B7280; margin-top: 4px; font-weight: 500; }
    .result-compare { background: #fff; border-radius: 10px; padding: 24px; box-shadow: 0 2px 8px rgba(45,58,107,0.07); }
    .compare-label {
      display: flex; gap: 16px; margin-bottom: 14px; align-items: center;
    }
    .legend-dot { width: 10px; height: 10px; border-radius: 50%; }
    .legend-text { font-size: 12px; color: #6B7280; font-weight: 500; }
    .text-compare-area {
      background: #f8f9ff; border-radius: 8px; padding: 16px;
      font-size: 15px; line-height: 2; max-height: 300px; overflow-y: auto;
      border: 1px solid #e8ebf8;
    }
    .hi-correct { color: #1A1F3C; }
    .hi-error { background: rgba(239,68,68,0.12); color: #dc2626; border-radius: 3px; padding: 0 2px; font-weight: 600; }
    .hi-missing { background: rgba(59,130,246,0.12); color: #2563eb; border-radius: 3px; padding: 0 2px; font-weight: 600; text-decoration: underline dotted; }
    .hi-extra { background: rgba(34,197,94,0.12); color: #16a34a; border-radius: 3px; padding: 0 2px; font-weight: 600; }
    .mode-indicator {
      display: flex; align-items: center; gap: 8px; font-size: 12px;
      color: #6B7280; padding: 8px 12px; background: #f5f6fa;
      border-radius: 6px; margin-bottom: 16px;
    }
    .retry-btns { display: flex; flex-direction: column; gap: 8px; margin-bottom: 16px; }
    .btn-outline {
      width: 100%; padding: 11px; background: transparent; border: 2px solid #2D3A6B;
      border-radius: 8px; color: #2D3A6B; font-size: 14px; font-weight: 600;
      cursor: pointer; font-family: 'Pretendard', sans-serif; transition: all 0.18s;
    }
    .btn-outline:hover { background: #2D3A6B; color: #fff; }
    .error-breakdown { background: #fff; border-radius: 10px; padding: 20px; box-shadow: 0 2px 8px rgba(45,58,107,0.07); }
    .breakdown-title { font-size: 14px; font-weight: 700; color: #1A1F3C; margin-bottom: 16px; }
    .breakdown-row {
      display: flex; align-items: center; gap: 12px; margin-bottom: 12px;
    }
    .breakdown-label { font-size: 13px; font-weight: 600; width: 56px; flex-shrink: 0; }
    .breakdown-bar { flex: 1; height: 8px; background: #f0f2fa; border-radius: 4px; overflow: hidden; }
    .breakdown-fill { height: 100%; border-radius: 4px; }
    .breakdown-count { font-size: 13px; font-weight: 700; width: 40px; text-align: right; }

    /* ===== 학습 이력 VIEW ===== */
    .history-grid { display: grid; grid-template-columns: 1fr 280px; gap: 24px; }
    .history-list-item {
      display: flex; align-items: center; padding: 14px 16px;
      border-bottom: 1px solid #f0f2fa; cursor: pointer; transition: background 0.15s;
      gap: 14px;
    }
    .history-list-item:hover { background: #f8f9ff; }
    .history-num { font-size: 13px; font-weight: 700; color: #6B7280; width: 32px; }
    .history-grade-badge {
      background: #eef0f8; color: #2D3A6B; font-size: 11px; font-weight: 700;
      padding: 3px 8px; border-radius: 4px; flex-shrink: 0;
    }
    .history-text-preview {
      font-size: 13px; color: #6B7280; flex: 1; overflow: hidden;
      text-overflow: ellipsis; white-space: nowrap;
    }
    .history-accuracy { font-size: 16px; font-weight: 800; }
    .history-date { font-size: 11px; color: #6B7280; margin-top: 2px; }
    .trend-card { }
    .trend-title { font-size: 14px; font-weight: 700; color: #1A1F3C; margin-bottom: 16px; }
    .accuracy-big {
      text-align: center; padding: 20px 0; border-bottom: 1px solid #f0f2fa; margin-bottom: 16px;
    }
    .accuracy-big-val { font-size: 48px; font-weight: 900; color: #2D3A6B; line-height: 1; }
    .accuracy-big-label { font-size: 13px; color: #6B7280; margin-top: 6px; }
    .mini-breakdown { }
    .mini-break-row {
      display: flex; justify-content: space-between; padding: 8px 0;
      border-bottom: 1px solid #f5f6fa; font-size: 13px;
    }
    .mini-break-row:last-child { border-bottom: none; }

    /* Drawer */
    .drawer-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.35);
      z-index: 200; display: flex; align-items: center; justify-content: flex-end;
    }
    .drawer {
      width: 480px; height: 100vh; background: #fff;
      box-shadow: -8px 0 32px rgba(0,0,0,0.15);
      overflow-y: auto; animation: slideInRight 0.28s ease;
      display: flex; flex-direction: column;
    }
    .drawer-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 20px 24px; border-bottom: 1px solid #f0f2fa; flex-shrink: 0;
    }
    .drawer-title { font-size: 16px; font-weight: 700; color: #1A1F3C; }
    .drawer-close {
      width: 32px; height: 32px; border-radius: 50%; border: none; background: #f5f6fa;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      font-size: 14px; color: #6B7280; transition: background 0.15s;
    }
    .drawer-close:hover { background: #e8ebf8; }
    .drawer-body { padding: 24px; flex: 1; }
    .drawer-stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 20px; }
    .d-stat { background: #f8f9ff; border-radius: 8px; padding: 14px; text-align: center; }
    .d-stat-val { font-size: 22px; font-weight: 800; color: #2D3A6B; }
    .d-stat-label { font-size: 11px; color: #6B7280; margin-top: 3px; }
    .drawer-text-block { background: #f5f6fa; border-radius: 8px; padding: 14px; font-size: 14px; line-height: 1.8; color: #1A1F3C; margin-bottom: 12px; }
    .drawer-sub-label { font-size: 12px; font-weight: 600; color: #6B7280; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.4px; }

    /* Toast */
    .toast-wrap { position: fixed; bottom: 28px; right: 28px; z-index: 300; display: flex; flex-direction: column; gap: 10px; }
    .toast {
      background: #1c2750; color: #fff; border-radius: 10px; padding: 14px 20px;
      font-size: 14px; font-weight: 500; box-shadow: 0 4px 20px rgba(0,0,0,0.2);
      animation: fadeIn 0.25s ease; display: flex; align-items: center; gap: 10px;
      max-width: 300px; border-left: 4px solid #1AB8A8;
    }
    .toast-icon { color: #1AB8A8; }

    /* Utility */
    .flex-row { display: flex; align-items: center; gap: 12px; }
    .flex-between { display: flex; align-items: center; justify-content: space-between; }
    .mt-4 { margin-top: 4px; }
    .mt-8 { margin-top: 8px; }
    .mt-12 { margin-top: 12px; }
    .mb-16 { margin-bottom: 16px; }
    .text-sm { font-size: 13px; }
    .text-muted { color: #6B7280; }
    .divider { height: 1px; background: #f0f2fa; margin: 20px 0; }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef } = React;

function waveBarColor(i, playing, total) {
  const active = playing && (i % 4 < 2);
  return active ? 'active' : '';
}

function computeHighlight(original, answer) {
  const result = [];
  const ori = original.replace(/\s+/g, ' ').trim();
  const ans = answer.replace(/\s+/g, ' ').trim();
  let i = 0, j = 0;
  while (i < ori.length || j < ans.length) {
    if (i >= ori.length) {
      result.push({ type: 'extra', char: ans[j] });
      j++;
    } else if (j >= ans.length) {
      result.push({ type: 'missing', char: ori[i] });
      i++;
    } else if (ori[i] === ans[j]) {
      result.push({ type: 'correct', char: ori[i] });
      i++; j++;
    } else {
      result.push({ type: 'error', char: ans[j], expected: ori[i] });
      i++; j++;
    }
  }
  return result;
}

function App() {

    const chars = text.replace(/\s/g, '').length;

    const seconds = Math.round((chars / gradeVal) * 60);
    return `${Math.floor(seconds / 60)}분 ${seconds % 60}초`;

  function handleScoring() {
    if (!dictation.trim()) { addToast('받아쓰기 내용을 입력해 주세요.'); return; }

    const ans = ignoreSpace ? dictation.replace(/\s/g, '') : dictation;

    const typo = hl.filter(x => x.type === 'error').length;
    const missing = hl.filter(x => x.type === 'missing').length;
    const extra = hl.filter(x => x.type === 'extra').length;
    const total = ori.replace(/\s/g,'').length;
    const accuracy = total ? Math.max(0, Math.round(((total - typo - missing) / total) * 100 * 10) / 10) : 0;
    setScoreData({ hl, typo, missing, extra, total, accuracy, ori });

    setActiveTab('채점 결과');

  function ViewHistory() {
    const avg = Math.round(HISTORY_DATA.reduce((s, d) => s + d.accuracy, 0) / HISTORY_DATA.length * 10) / 10;
    const latest = HISTORY_DATA[HISTORY_DATA.length - 1];
    return (

        <div className="history-grid">

                    <defs>
                      <linearGradient id="accGrad" x1="0" y1="0" x2="0" y2="1">
                        <stop offset="5%" stopColor="#1AB8A8" stopOpacity={0.25} />
                        <stop offset="95%" stopColor="#1AB8A8" stopOpacity={0} />
                      </linearGradient>
                    </defs>
                    <CartesianGrid strokeDasharray="3 3" stroke="#f0f2fa" />
                    <XAxis dataKey="round" tickFormatter={v => `${v}회`} tick={{ fontSize: 11, fill: '#6B7280' }} />
                    <YAxis domain={[60, 100]} tick={{ fontSize: 11, fill: '#6B7280' }} unit="%" />
                    <Tooltip formatter={(v) => [`${v}%`, '정확도']} />
                    <Area type="monotone" dataKey="accuracy" stroke="#1AB8A8" strokeWidth={2} fill="url(#accGrad)" />
                  </AreaChart>
                </ResponsiveContainer>
              </div>
              {HISTORY_DATA.map(item => (
                <div key={item.round} className="history-list-item" onClick={() => setDrawer(item)}>
                  <div className="history-num">{item.round}회</div>
                  <div className="history-grade-badge">{item.grade}자/분</div>
                  <div className="history-text-preview">{item.text}</div>
                  <div>
                    <div className="history-accuracy" style={{ color: item.accuracy >= 85 ? '#16a34a' : item.accuracy >= 75 ? '#2D3A6B' : '#dc2626', textAlign: 'right' }}>{item.accuracy}%</div>
                    <div className="history-date" style={{ textAlign: 'right' }}>{item.date}</div>
                  </div>
                </div>
              ))}
            </div>
          </div>

          <div style={{ display: 'flex', flexDirection: 'column', gap: 16 }}>
            <div className="card trend-card">
              <div className="trend-title">전체 요약</div>
              <div className="accuracy-big">
                <div className="accuracy-big-val">{avg}%</div>
                <div className="accuracy-big-label">7회 평균 정확도</div>
              </div>
              <div className="mini-breakdown">
                <div className="mini-break-row">
                  <span className="text-sm" style={{ color: '#dc2626', fontWeight: 600 }}>평균 오자</span>
                  <span className="text-sm" style={{ fontWeight: 700 }}>
                    {Math.round(HISTORY_DATA.reduce((s,d)=>s+d.errors.typo,0)/HISTORY_DATA.length*10)/10}개/회
                  </span>
                </div>
                <div className="mini-break-row">
                  <span className="text-sm" style={{ color: '#2563eb', fontWeight: 600 }}>평균 탈자</span>
                  <span className="text-sm" style={{ fontWeight: 700 }}>
                    {Math.round(HISTORY_DATA.reduce((s,d)=>s+d.errors.missing,0)/HISTORY_DATA.length*10)/10}개/회
                  </span>
                </div>
                <div className="mini-break-row">
                  <span className="text-sm" style={{ color: '#16a34a', fontWeight: 600 }}>평균 첨자</span>
                  <span className="text-sm" style={{ fontWeight: 700 }}>
                    {Math.round(HISTORY_DATA.reduce((s,d)=>s+d.errors.extra,0)/HISTORY_DATA.length*10)/10}개/회
                  </span>
                </div>
                <div className="mini-break-row">
                  <span className="text-sm text-muted">최근 급수</span>
                  <span className="text-sm" style={{ fontWeight: 700 }}>{latest.grade}자/분</span>
                </div>
                <div className="mini-break-row">
                  <span className="text-sm text-muted">총 훈련 횟수</span>
                  <span className="text-sm" style={{ fontWeight: 700 }}>{HISTORY_DATA.length}회</span>
                </div>
              </div>
            </div>
          </div>
        </div>

        {drawer && (
          <div className="drawer-overlay" onClick={e => { if (e.target.className === 'drawer-overlay') setDrawer(null); }}>
            <div className="drawer">
              <div className="drawer-header">
                <div className="drawer-title">{drawer.round}회차 채점 상세</div>
                <button className="drawer-close" onClick={() => setDrawer(null)}>
                  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#6B7280" strokeWidth="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                </button>
              </div>
              <div className="drawer-body">
                <div className="drawer-stat-grid">
                  <div className="d-stat"><div className="d-stat-val" style={{ color: '#1AB8A8' }}>{drawer.accuracy}%</div><div className="d-stat-label">정확도</div></div>
                  <div className="d-stat"><div className="d-stat-val">{drawer.grade}자/분</div><div className="d-stat-label">훈련 급수</div></div>
                  <div className="d-stat"><div className="d-stat-val" style={{ color: '#dc2626' }}>{drawer.errors.typo}</div><div className="d-stat-label">오자</div></div>
                  <div className="d-stat"><div className="d-stat-val" style={{ color: '#2563eb' }}>{drawer.errors.missing}</div><div className="d-stat-label">탈자</div></div>
                </div>
                <div className="drawer-sub-label">훈련 지문 미리보기</div>
                <div className="drawer-text-block">{drawer.text}</div>
                <div className="drawer-sub-label">훈련 일시</div>
                <div style={{ fontSize: 14, color: '#1A1F3C', fontWeight: 600 }}>{drawer.date}</div>
                <div className="divider" />
                <button className="btn-primary" onClick={() => { setDrawer(null); addToast('같은 조건으로 훈련을 시작합니다.'); setActiveTab('지문 입력'); }}>
                  이 조건으로 다시 훈련
                </button>
              </div>
            </div>
          </div>
        )}
      </div>
    );
  }

  const viewMap = {
    '지문 입력': <ViewInput />,
    '오디오 플레이어': <ViewPlayer />,
    '채점 결과': <ViewScoring />,
    '학습 이력': <ViewHistory />,
  };

  return (
    <div className="app-wrap">
      <nav className="topnav">
        <div className="topnav-inner">
          <div className="nav-logo">속기<span>Learn</span></div>
          <div className="nav-tabs">
            {tabs.map(t => (
              <button key={t} className={`nav-tab${activeTab === t ? ' active' : ''}`} onClick={() => setActiveTab(t)}>
                {t}
              </button>
            ))}
          </div>
          <div className="nav-right">
            <div className="badge-grade">{grade}자/분</div>
          </div>
        </div>
      </nav>

      <div className="hero">
        <div className="hero-inner">
          <div className="hero-tag">속기사 학습 시스템 — 맞춤 구현 데모</div>
          <h1>TTS 기반 자동 채점 학습 시스템</h1>
          <p>Naver Clova Voice TTS 낭독 생성, Levenshtein 알고리즘 기반 오자·탈자·첨자 자동 채점, 학습 이력 시각화를 통합한 속기사 수험생 전용 훈련 시스템입니다.</p>
          <div className="hero-stats">
            <div className="hero-stat"><div className="hero-stat-val">3종</div><div className="hero-stat-label">오류 유형 분류</div></div>
            <div className="hero-stat"><div className="hero-stat-val">8단계</div><div className="hero-stat-label">급수 지원</div></div>
            <div className="hero-stat"><div className="hero-stat-val">100%</div><div className="hero-stat-label">자동 채점</div></div>
          </div>
        </div>
      </div>

      <div className="main-content">
        {viewMap[activeTab]}
      </div>

      <div className="toast-wrap">
        {toasts.map(t => (
          <div key={t.id} className="toast">
            <svg width="14" height="14" className="toast-icon" viewBox="0 0 24 24" fill="none" stroke="#1AB8A8" strokeWidth="2.5"><polyline points="20 6 9 17 4 12"/></svg>
            {t.msg}
          </div>
        ))}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
