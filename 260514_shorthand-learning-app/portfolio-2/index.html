  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body, #root { width: 100%; min-height: 100vh; font-family: 'Pretendard', sans-serif; }
    body { background: #FBF7F0; color: #2C1C0A; }

    @keyframes fadeSlideIn {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(24px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes scaleIn {
      from { opacity: 0; transform: scale(0.96); }
      to { opacity: 1; transform: scale(1); }
    }
    @keyframes countUp {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes shimmer {
      0% { background-position: -200px 0; }
      100% { background-position: calc(200px + 100%) 0; }
    }
    @keyframes progressFill {
      from { width: 0; }
      to { width: var(--w, 60%); }

    .layout { display: flex; flex-direction: column; min-height: 100vh; width: 100%; }

    /* Global Nav */

    .passage-card {

    .passage-header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 10px; }

    .modal-close:hover { background: #e8dfd0; }
    .form-group { margin-bottom: 16px; }

    .form-input, .form-textarea, .form-select {
      width: 100%; padding: 10px 14px; border: 1.5px solid #e8dfd0;

    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

    .modal-passage-text {

      border: 1px solid #e8dfd0; max-height: 200px; overflow-y: auto;
    }
    .info-row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #f5ede0; font-size: 13px; }
    .info-row:last-child { border-bottom: none; }
    .info-key { color: #7A6450; }
    .info-val { font-weight: 600; color: #2C1C0A; }

    /* ===== 시험 세션 VIEW ===== */
    .session-grid { display: grid; grid-template-columns: 1fr 320px; gap: 24px; }
    .session-list { }
    .session-item {
      background: #fff; border: 1px solid #e8dfd0; border-radius: 6px;
      padding: 18px 20px; margin-bottom: 12px; cursor: pointer;
      transition: all 0.2s; display: grid; grid-template-columns: 1fr auto; gap: 16px;
    }
    .session-item:hover { border-color: #7B4F1E; box-shadow: 0 3px 12px rgba(123,79,30,0.1); }
    .session-code {
      font-size: 20px; font-weight: 900; color: #7B4F1E; letter-spacing: 4px;

    }
    .session-title { font-size: 15px; font-weight: 700; color: #2C1C0A; margin-bottom: 4px; }
    .session-meta { font-size: 12px; color: #7A6450; }
    .session-stats { display: flex; gap: 12px; margin-top: 10px; }
    .session-stat { font-size: 12px; color: #7A6450; display: flex; align-items: center; gap: 4px; }
    .session-right { display: flex; flex-direction: column; align-items: flex-end; justify-content: space-between; }
    .participant-count { font-size: 22px; font-weight: 900; color: #2C1C0A; text-align: right; }
    .participant-label { font-size: 11px; color: #7A6450; text-align: right; }
    .create-session-card { }
    .cs-title { font-size: 15px; font-weight: 700; color: #2C1C0A; margin-bottom: 16px; }
    .session-detail-modal { }
    .participant-table { width: 100%; border-collapse: collapse; margin-top: 12px; }
    .participant-table th {
      text-align: left; padding: 10px 12px; font-size: 12px; font-weight: 700;
      color: #7A6450; background: #f9f5ef; border-bottom: 1px solid #e8dfd0;
    }
    .participant-table td { padding: 10px 12px; font-size: 13px; border-bottom: 1px solid #f5ede0; }
    .participant-table tr:last-child td { border-bottom: none; }

    .accuracy-bar { height: 6px; background: #f0ebe4; border-radius: 3px; overflow: hidden; margin-top: 4px; }
    .accuracy-fill { height: 100%; border-radius: 3px; background: #D4A843; }

    /* ===== 학습 분석 VIEW ===== */
    .analytics-kpi-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 24px; }
    .kpi-card {
      background: #fff; border: 1px solid #e8dfd0; border-radius: 6px;
      padding: 20px 16px; animation: countUp 0.5s ease forwards;

    .kpi-icon { font-size: 20px; margin-bottom: 8px; color: #7B4F1E; }
    .kpi-val { font-size: 28px; font-weight: 900; color: #7B4F1E; line-height: 1; }
    .kpi-label { font-size: 12px; color: #7A6450; margin-top: 4px; font-weight: 500; }
    .analytics-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
    .chart-card { background: #fff; border: 1px solid #e8dfd0; border-radius: 6px; padding: 20px; }
    .chart-title { font-size: 14px; font-weight: 700; color: #2C1C0A; margin-bottom: 16px; }
    .student-table-wrap { background: #fff; border: 1px solid #e8dfd0; border-radius: 6px; overflow: hidden; }

    .student-table th {

    }
    .student-table td { padding: 12px 16px; font-size: 13px; border-bottom: 1px solid #f5ede0; cursor: pointer; }
    .student-table tr:hover td { background: #faf7f2; }
    .student-table tr:last-child td { border-bottom: none; }
    .trend-badge { display: flex; align-items: center; gap: 3px; font-size: 12px; font-weight: 700; }

    /* ===== 리포트 VIEW ===== */
    .report-grid { display: grid; grid-template-columns: 1fr 320px; gap: 24px; }
    .report-list { }
    .report-item {
      background: #fff; border: 1px solid #e8dfd0; border-radius: 6px;
      padding: 18px 20px; margin-bottom: 10px; display: flex; align-items: center;
      gap: 16px; cursor: pointer; transition: all 0.18s;
    }
    .report-item:hover { border-color: #7B4F1E; box-shadow: 0 3px 12px rgba(123,79,30,0.08); }
    .report-icon {
      width: 44px; height: 44px; border-radius: 6px; background: #f5ede0;

    .report-info { flex: 1; }
    .report-name { font-size: 14px; font-weight: 700; color: #2C1C0A; }
    .report-meta { font-size: 12px; color: #7A6450; margin-top: 3px; }
    .report-right { display: flex; flex-direction: column; align-items: flex-end; gap: 6px; }
    .report-size { font-size: 12px; color: #7A6450; }

      padding: 6px 14px; background: #D4A843; color: #fff; border: none;
      border-radius: 5px; font-size: 12px; font-weight: 700; cursor: pointer;

      display: flex; align-items: center; gap: 5px;

    .btn-download:hover { background: #be9230; }
    .generate-panel { }
    .gen-title { font-size: 15px; font-weight: 700; color: #2C1C0A; margin-bottom: 16px; }
    .report-type-options { display: flex; flex-direction: column; gap: 8px; margin-bottom: 16px; }
    .report-type-opt {
      display: flex; align-items: center; gap: 10px; padding: 12px 14px;
      border: 2px solid #e8dfd0; border-radius: 6px; cursor: pointer; transition: all 0.15s;
    }
    .report-type-opt:hover { border-color: #7B4F1E; }
    .report-type-opt.selected { border-color: #7B4F1E; background: #f5ede0; }
    .report-type-label { font-size: 13px; font-weight: 600; color: #2C1C0A; }
    .report-type-desc { font-size: 12px; color: #7A6450; }

    .report-type-opt.selected .report-radio { border-color: #7B4F1E; background: #7B4F1E; }

    .toast-wrap { position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%); z-index: 300; display: flex; flex-direction: column; gap: 10px; align-items: center; }
    .toast {
      background: #2C1C0A; color: #fff; border-radius: 8px; padding: 12px 20px;

    .flex-row { display: flex; align-items: center; gap: 8px; }

<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef } = React;
const {
  ComposedChart, AreaChart, Area, BarChart, Bar, LineChart, Line,
  PieChart, Pie, Cell, XAxis, YAxis, CartesianGrid, Tooltip, Legend, ResponsiveContainer
} = Recharts;

const PASSAGES = [
  { id: 1, title: '행정문서 — 공문서 처리 절차', category: '행정', grade: 150, difficulty: '중급', chars: 132, text: '행정기관의 공문서는 처리 절차에 따라 기안, 검토, 협조, 결재, 시행 단계를 거쳐 완성되며, 각 단계에서 담당자의 서명과 직인이 요구됩니다.', addedAt: '2026.04.12' },
  { id: 2, title: '법원 — 대법원 상고심 심사', category: '법원', grade: 180, difficulty: '고급', chars: 148, text: '대법원은 상고심으로서 원심판결의 법령 위반 여부를 심사하고, 헌법 및 법률의 해석에 관한 중요 사항을 판단하여 하급심을 기속하는 역할을 합니다.', addedAt: '2026.04.15' },
  { id: 3, title: '국회 — 의사진행 및 발언 절차', category: '국회', grade: 200, difficulty: '고급', chars: 168, text: '국회의장은 개의를 선포하고, 의원이 발언을 요청하는 경우 발언자 명단을 작성하여 순서에 따라 발언 기회를 부여합니다. 의결 정족수는 재적 과반수 출석입니다.', addedAt: '2026.04.18' },
  { id: 4, title: '세무 — 납세의무 및 신고기한', category: '행정', grade: 150, difficulty: '중급', chars: 141, text: '납세의무자는 각 세목별로 정해진 신고기한 내에 과세표준과 세액을 신고·납부하여야 하며, 기한 내 미신고 시 가산세가 부과됩니다.', addedAt: '2026.04.20' },
  { id: 5, title: '형사소송 — 구속 요건과 절차', category: '법원', grade: 180, difficulty: '고급', chars: 152, text: '피의자를 구속하려면 법관이 발부한 구속영장이 필요하며, 긴급체포 후 48시간 이내에 구속영장을 청구하지 않으면 즉시 석방하여야 합니다.', addedAt: '2026.04.22' },
  { id: 6, title: '민사소송 — 소장 접수와 답변서', category: '법원', grade: 120, difficulty: '초급', chars: 118, text: '원고가 소장을 법원에 제출하면 법원은 피고에게 소장 부본을 송달하고, 피고는 30일 이내에 답변서를 제출하여야 합니다.', addedAt: '2026.04.25' },

          </div>
          <table className="student-table">
            <thead>
              <tr>
                <th>수험생</th>
                <th>훈련 세션</th>
                <th>현재 정확도</th>
                <th>추이</th>
                <th>달성 급수</th>
                <th>상세</th>
              </tr>
            </thead>
            <tbody>
              {TOP_STUDENTS.map((s, i) => (
                <tr key={i} onClick={() => setSelectedStudent(s)}>
                  <td style={{ fontWeight: 600 }}>{s.name}</td>
                  <td>{s.sessions}회</td>
                  <td>
                    <div style={{ fontWeight: 700, color: s.accuracy >= 88 ? '#16a34a' : '#7B4F1E' }}>{s.accuracy}%</div>
                    <div className="accuracy-bar" style={{ maxWidth: 80, marginTop: 4 }}>
                      <div className="accuracy-fill" style={{ width: `${s.accuracy}%` }} />
                    </div>
                  </td>
                  <td>
                    <div className="trend-badge" style={{ color: s.trend.startsWith('+') ? '#16a34a' : '#dc2626' }}>
                      <i className={`ph ph-trend-${s.trend.startsWith('+') ? 'up' : 'down'}`} style={{ fontSize: 12 }} />
                      {s.trend}%
                    </div>
                  </td>
                  <td><span className="badge badge-amber">{s.grade}자/분</span></td>
                  <td>
                    <button className="btn-secondary btn-sm" style={{ padding: '4px 12px', fontSize: 12 }}>상세 보기</button>
                  </td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>

        {selectedStudent && (
          <div className="modal-overlay" onClick={e => { if (e.currentTarget === e.target) setSelectedStudent(null); }}>
            <div className="modal">
              <div className="modal-header">
                <div className="modal-title">{selectedStudent.name} 학습 현황</div>
                <button className="modal-close" onClick={() => setSelectedStudent(null)}><i className="ph ph-x" /></button>
              </div>
              <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr 1fr', gap: 12, marginBottom: 20 }}>
                <div className="d-stat" style={{ background: '#f9f5ef', borderRadius: 6, padding: 14, textAlign: 'center' }}>
                  <div style={{ fontSize: 22, fontWeight: 800, color: '#7B4F1E' }}>{selectedStudent.accuracy}%</div>
                  <div style={{ fontSize: 11, color: '#7A6450', marginTop: 3 }}>현재 정확도</div>
                </div>
                <div className="d-stat" style={{ background: '#f9f5ef', borderRadius: 6, padding: 14, textAlign: 'center' }}>
                  <div style={{ fontSize: 22, fontWeight: 800, color: '#7B4F1E' }}>{selectedStudent.sessions}</div>
                  <div style={{ fontSize: 11, color: '#7A6450', marginTop: 3 }}>총 훈련 횟수</div>
                </div>
                <div className="d-stat" style={{ background: '#f9f5ef', borderRadius: 6, padding: 14, textAlign: 'center' }}>
                  <div style={{ fontSize: 22, fontWeight: 800, color: '#D4A843' }}>{selectedStudent.grade}자/분</div>
                  <div style={{ fontSize: 11, color: '#7A6450', marginTop: 3 }}>달성 급수</div>
                </div>
              </div>
              <div style={{ height: 180 }}>
                <ResponsiveContainer width="100%" height="100%">
                  <AreaChart data={ANALYTICS_DATA.slice(-6)} margin={{ top: 8, right: 8, bottom: 8, left: -10 }}>
                    <CartesianGrid strokeDasharray="3 3" stroke="#f0ebe4" />
                    <XAxis dataKey="date" tick={{ fontSize: 11, fill: '#7A6450' }} />
                    <YAxis domain={[65, 100]} tick={{ fontSize: 11, fill: '#7A6450' }} unit="%" />
                    <Tooltip formatter={(v) => [`${v}%`, '정확도']} />
                    <Area type="monotone" dataKey="accuracy" stroke="#7B4F1E" strokeWidth={2} fill="rgba(123,79,30,0.1)" />
                  </AreaChart>
                </ResponsiveContainer>
              </div>
              <div className="form-actions">
                <button className="btn-secondary btn-sm" onClick={() => setSelectedStudent(null)}>닫기</button>
                <button className="btn-primary btn-sm" onClick={() => { setSelectedStudent(null); addToast('개인 리포트를 생성합니다.'); setPage('리포트'); }}>
                  리포트 생성
                </button>
              </div>
            </div>
          </div>
        )}
      </div>
    );
  }

  function PageReport() {
    return (
      <div className="page-enter">
        <div className="section-bar">
          <div>
            <div className="page-title">리포트</div>
            <div className="page-sub">채점 이력을 PDF·CSV로 내보내어 학습 성과를 관리합니다.</div>
          </div>
        </div>
        <div className="report-grid">
          <div className="report-list">
            {REPORTS.map(r => (
              <div key={r.id} className="report-item">
                <div className="report-icon">
                  <i className={`ph ph-file-${r.type === 'session' ? 'csv' : 'pdf'}`} />
                </div>
                <div className="report-info">
                  <div className="report-name">{r.name}</div>
                  <div className="report-meta">대상: {r.student} · {r.date} · {r.size}</div>
                </div>
                <div className="report-right">
                  <span className={`badge ${r.type === 'individual' ? 'badge-brown' : 'badge-amber'}`}>
                    {r.type === 'individual' ? '개인' : '세션'}
                  </span>
                  <button className="btn-download" onClick={() => addToast(`${r.name} 다운로드를 시작합니다.`)}>
                    <i className="ph ph-download-simple" style={{ fontSize: 12 }} />다운로드
                  </button>
                </div>
              </div>
            ))}
          </div>

          <div className="card-flat generate-panel">
            <div className="gen-title">새 리포트 생성</div>
            <div className="report-type-options">
              <div className={`report-type-opt${selectedReportType === 'individual' ? ' selected' : ''}`} onClick={() => setSelectedReportType('individual')}>
                <div className="report-radio" />
                <div>
                  <div className="report-type-label">개인 학습 리포트 (PDF)</div>
                  <div className="report-type-desc">수험생별 회차 이력 + 오류 분석</div>
                </div>
              </div>
              <div className={`report-type-opt${selectedReportType === 'session' ? ' selected' : ''}`} onClick={() => setSelectedReportType('session')}>
                <div className="report-radio" />
                <div>
                  <div className="report-type-label">세션 성적표 (CSV)</div>
                  <div className="report-type-desc">세션 전체 수험생 채점 결과</div>
                </div>
              </div>
            </div>

            {selectedReportType === 'individual' ? (
              <div className="form-group">
                <label className="form-label">수험생 선택</label>
                <select className="form-select">
                  {TOP_STUDENTS.map(s => <option key={s.name}>{s.name}</option>)}
                </select>
              </div>
            ) : (
              <div className="form-group">
                <label className="form-label">세션 선택</label>
                <select className="form-select">
                  {SESSIONS.filter(s => s.students.length > 0).map(s => <option key={s.id}>{s.title}</option>)}
                </select>
              </div>
            )}

            <div className="form-group">
              <label className="form-label">기간 필터</label>
              <div style={{ display: 'flex', gap: 8 }}>
                <input type="date" className="form-input" defaultValue="2026-04-01" />
                <input type="date" className="form-input" defaultValue="2026-05-14" />
              </div>
            </div>

            {generating && (
              <div style={{ marginBottom: 14 }}>
                <div style={{ fontSize: 12, color: '#7A6450', marginBottom: 6 }}>생성 중... {genProgress}%</div>
                <div className="progress-gen-bar"><div className="progress-gen-fill" style={{ width: `${genProgress}%` }} /></div>
              </div>
            )}

            <button className="btn-primary" style={{ width: '100%', justifyContent: 'center' }}
              onClick={handleGenerate} disabled={generating}>
              <i className={`ph ph-${generating ? 'spinner' : 'file-arrow-down'}`} style={{ fontSize: 14 }} />
              {generating ? '생성 중...' : '리포트 생성'}
            </button>
          </div>
        </div>
      </div>
    );
  }

  const pageMap = {
    '지문 라이브러리': <PageLibrary />,
    '시험 세션': <PageSession />,
    '학습 분석': <PageAnalytics />,
    '리포트': <PageReport />,
  };

  return (
    <div className="layout">
      <nav className="gnav">
        <div className="gnav-inner">
          <div className="gnav-logo">속기<span>Pro</span></div>
          <div className="gnav-links">
            {pages.map(p => (
              <button key={p} className={`gnav-link${page === p ? ' active' : ''}`} onClick={() => setPage(p)}>
                {p}
              </button>
            ))}
          </div>
          <div className="gnav-right">
            <div className="gnav-role"><div className="role-dot" />강사 계정</div>
          </div>
        </div>
      </nav>

      <main className="page-content">
        {pageMap[page]}
      </main>

      <footer className="footer">
        <div className="footer-inner">
          <div className="footer-logo">속기<span>Pro</span></div>
          <div className="footer-text">속기사 학습 플랫폼 — 구현 데모</div>
        </div>
      </footer>

      <div className="toast-wrap">
        {toasts.map(t => (
          <div key={t.id} className="toast">
            <i className="ph ph-check-circle" style={{ color: '#D4A843', fontSize: 15 }} />
            {t.msg}
          </div>
        ))}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
