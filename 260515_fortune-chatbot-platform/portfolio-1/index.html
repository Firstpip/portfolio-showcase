<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>청월당 AI 운세 챗봇 서비스 — 맞춤 구현 데모</title>
<link rel="preconnect" href="https://cdn.jsdelivr.net">
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" rel="stylesheet">
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://unpkg.com/prop-types@15/prop-types.min.js"></script>
<script src="https://unpkg.com/react-is@18/umd/react-is.production.min.js"></script>
<script src="https://unpkg.com/recharts@2.8.0/umd/Recharts.js"></script>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body,#root{width:100%;min-height:100vh;font-family:'Pretendard',sans-serif;background:#0D0C0A;color:#F2EDD7}
:root{
  --gold:#C9973A;--gold-light:#F5C842;--gold-dim:#8B6914;
  --bg:#0D0C0A;--surface:#1A1713;--surface2:#221E18;
  --text:#F2EDD7;--text2:#A89060;--border:rgba(201,151,58,0.18);
}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideUp{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
@keyframes goldGlow{0%,100%{box-shadow:0 0 12px rgba(201,151,58,.15)}50%{box-shadow:0 0 28px rgba(201,151,58,.35)}}
@keyframes typing{0%{width:0}100%{width:100%}}
@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
@keyframes scaleIn{from{opacity:0;transform:scale(.95)}to{opacity:1;transform:scale(1)}}

/* Topnav */
.topnav{position:fixed;top:0;left:0;right:0;height:64px;background:rgba(13,12,10,.92);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 32px;z-index:100;backdrop-filter:blur(12px)}
.topnav-logo{display:flex;align-items:center;gap:10px;font-size:18px;font-weight:700;color:var(--gold);letter-spacing:-.3px;margin-right:40px}
.topnav-logo span{color:var(--text)}
.topnav-tabs{display:flex;gap:4px;flex:1}
.nav-tab{padding:8px 18px;border-radius:8px;font-size:14px;font-weight:500;cursor:pointer;transition:all .2s;color:var(--text2);background:transparent;border:none;font-family:'Pretendard',sans-serif}
.nav-tab:hover{color:var(--text);background:rgba(201,151,58,.08)}
.nav-tab.active{color:var(--gold);background:rgba(201,151,58,.12);border:1px solid rgba(201,151,58,.2)}
.topnav-right{display:flex;align-items:center;gap:12px}
.btn-login{padding:8px 20px;border-radius:8px;font-size:13px;font-weight:500;cursor:pointer;background:transparent;border:1px solid var(--border);color:var(--text2);font-family:'Pretendard',sans-serif;transition:all .2s}
.btn-login:hover{border-color:var(--gold);color:var(--gold)}
.btn-start{padding:8px 20px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;background:var(--gold);border:none;color:#0D0C0A;font-family:'Pretendard',sans-serif;transition:all .2s}
.btn-start:hover{background:var(--gold-light);transform:translateY(-1px)}

/* Main content */
.main{padding-top:64px;min-height:100vh}
.screen{animation:fadeIn .3s ease}

/* Hero */
.hero{text-align:center;padding:72px 32px 56px;background:radial-gradient(ellipse at 50% 0%,rgba(201,151,58,.12) 0%,transparent 60%)}
.hero-badge{display:inline-flex;align-items:center;gap:6px;padding:6px 14px;border-radius:20px;border:1px solid rgba(201,151,58,.3);background:rgba(201,151,58,.08);font-size:12px;color:var(--gold);margin-bottom:24px;font-weight:500}
.hero h1{font-size:42px;font-weight:800;color:var(--text);line-height:1.2;margin-bottom:16px;letter-spacing:-1px}
.hero h1 em{color:var(--gold);font-style:normal}
.hero p{font-size:16px;color:var(--text2);line-height:1.7;max-width:500px;margin:0 auto 36px}
.hero-actions{display:flex;gap:12px;justify-content:center}
.btn-primary{padding:14px 32px;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer;background:var(--gold);border:none;color:#0D0C0A;font-family:'Pretendard',sans-serif;transition:all .25s;animation:goldGlow 3s infinite}
.btn-primary:hover{background:var(--gold-light);transform:translateY(-2px)}
.btn-secondary{padding:14px 28px;border-radius:10px;font-size:15px;font-weight:600;cursor:pointer;background:transparent;border:1px solid var(--border);color:var(--text);font-family:'Pretendard',sans-serif;transition:all .2s}
.btn-secondary:hover{border-color:var(--gold);color:var(--gold)}

/* Cards */
.features-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:20px;max-width:900px;margin:0 auto;padding:0 32px 60px}
.feat-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:28px;cursor:pointer;transition:all .25s;animation:slideUp .4s ease both}
.feat-card:hover{border-color:var(--gold);box-shadow:0 0 20px rgba(201,151,58,.15);transform:translateY(-3px)}
.feat-icon{width:44px;height:44px;border-radius:10px;background:rgba(201,151,58,.12);border:1px solid rgba(201,151,58,.2);display:flex;align-items:center;justify-content:center;margin-bottom:16px;color:var(--gold)}
.feat-card h3{font-size:15px;font-weight:700;color:var(--text);margin-bottom:8px}
.feat-card p{font-size:13px;color:var(--text2);line-height:1.6}

/* Chat screen */
.chat-layout{display:grid;grid-template-columns:280px 1fr;gap:0;height:calc(100vh - 64px)}
.chat-sidebar{background:var(--surface);border-right:1px solid var(--border);padding:24px 16px;overflow-y:auto}
.sidebar-title{font-size:12px;font-weight:600;color:var(--text2);letter-spacing:.08em;text-transform:uppercase;margin-bottom:12px;padding:0 8px}
.history-item{padding:12px 10px;border-radius:8px;cursor:pointer;transition:all .2s;margin-bottom:4px;border:1px solid transparent}
.history-item:hover{background:rgba(201,151,58,.06);border-color:var(--border)}
.history-item.active{background:rgba(201,151,58,.1);border-color:rgba(201,151,58,.2)}
.history-item h4{font-size:13px;font-weight:600;color:var(--text);margin-bottom:4px}
.history-item p{font-size:12px;color:var(--text2)}
.new-chat-btn{width:100%;padding:10px;border-radius:8px;background:rgba(201,151,58,.1);border:1px solid rgba(201,151,58,.2);color:var(--gold);font-size:13px;font-weight:600;cursor:pointer;font-family:'Pretendard',sans-serif;margin-bottom:20px;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:6px}
.new-chat-btn:hover{background:rgba(201,151,58,.18)}

.chat-main{display:flex;flex-direction:column;background:var(--bg)}
.chat-header{padding:20px 28px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px}
.chat-avatar{width:40px;height:40px;border-radius:50%;background:linear-gradient(135deg,var(--gold),var(--gold-dim));display:flex;align-items:center;justify-content:center;color:#0D0C0A;font-size:16px;font-weight:700}
.chat-header h2{font-size:16px;font-weight:700;color:var(--text)}
.chat-header p{font-size:12px;color:var(--gold)}
.messages{flex:1;overflow-y:auto;padding:24px 28px;display:flex;flex-direction:column;gap:16px}
.msg{display:flex;gap:12px;animation:slideUp .3s ease}
.msg.user{flex-direction:row-reverse}
.msg-avatar{width:34px;height:34px;border-radius:50%;background:var(--surface2);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;flex-shrink:0;color:var(--text2);font-size:12px;font-weight:700}
.msg-avatar.ai{background:linear-gradient(135deg,rgba(201,151,58,.3),rgba(201,151,58,.1));color:var(--gold)}
.msg-bubble{max-width:520px;padding:14px 18px;border-radius:16px;font-size:14px;line-height:1.65}
.msg.ai .msg-bubble{background:var(--surface2);border:1px solid var(--border);color:var(--text);border-radius:4px 16px 16px 16px}
.msg.user .msg-bubble{background:var(--gold);color:#0D0C0A;border-radius:16px 4px 16px 16px}
.typing-indicator{display:flex;gap:4px;padding:14px 18px;background:var(--surface2);border:1px solid var(--border);border-radius:4px 16px 16px 16px;width:fit-content}
.typing-dot{width:6px;height:6px;border-radius:50%;background:var(--text2);animation:pulse 1.2s infinite}
.typing-dot:nth-child(2){animation-delay:.2s}
.typing-dot:nth-child(3){animation-delay:.4s}
.result-card{background:rgba(201,151,58,.06);border:1px solid rgba(201,151,58,.2);border-radius:12px;padding:18px;margin-top:8px}
.result-card h4{font-size:14px;font-weight:700;color:var(--gold);margin-bottom:12px}
.result-row{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid rgba(255,255,255,.05);font-size:13px}
.result-row:last-child{border-bottom:none}
.result-row span:first-child{color:var(--text2)}
.result-row span:last-child{color:var(--text);font-weight:600}
.chat-input-area{padding:16px 28px;border-top:1px solid var(--border);display:flex;gap:10px}
.chat-input{flex:1;background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:12px 16px;color:var(--text);font-family:'Pretendard',sans-serif;font-size:14px;outline:none;resize:none;transition:border-color .2s;min-height:48px}
.chat-input:focus{border-color:var(--gold)}
.chat-send-btn{padding:12px 20px;border-radius:12px;background:var(--gold);border:none;color:#0D0C0A;cursor:pointer;font-size:13px;font-weight:700;font-family:'Pretendard',sans-serif;transition:all .2s;display:flex;align-items:center;gap:6px}
.chat-send-btn:hover{background:var(--gold-light)}

/* Analysis screen */
.analysis-layout{max-width:1100px;margin:0 auto;padding:36px 32px}
.analysis-header{margin-bottom:32px}
.analysis-header h2{font-size:26px;font-weight:800;color:var(--text);margin-bottom:6px}
.analysis-header p{font-size:14px;color:var(--text2)}
.analysis-grid{display:grid;grid-template-columns:360px 1fr;gap:24px}
.input-panel{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:28px}
.input-panel h3{font-size:16px;font-weight:700;color:var(--text);margin-bottom:20px;display:flex;align-items:center;gap:8px}
.form-group{margin-bottom:18px}
.form-label{font-size:13px;font-weight:600;color:var(--text2);margin-bottom:8px;display:block}
.form-input{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:10px 14px;color:var(--text);font-family:'Pretendard',sans-serif;font-size:14px;outline:none;transition:border-color .2s}
.form-input:focus{border-color:var(--gold)}
.form-select{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:10px 14px;color:var(--text);font-family:'Pretendard',sans-serif;font-size:14px;outline:none;cursor:pointer}
.form-select option{background:var(--surface2)}
.analyze-btn{width:100%;padding:14px;border-radius:10px;background:var(--gold);border:none;color:#0D0C0A;font-size:15px;font-weight:700;cursor:pointer;font-family:'Pretendard',sans-serif;transition:all .25s;margin-top:8px;display:flex;align-items:center;justify-content:center;gap:8px}
.analyze-btn:hover{background:var(--gold-light);transform:translateY(-1px)}
.result-panel{display:flex;flex-direction:column;gap:20px}
.result-section{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:24px}
.result-section h3{font-size:15px;font-weight:700;color:var(--gold);margin-bottom:16px;display:flex;align-items:center;gap:8px}
.saju-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:16px}
.saju-cell{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:14px;text-align:center}
.saju-cell .label{font-size:11px;color:var(--text2);margin-bottom:6px}
.saju-cell .heavenly{font-size:22px;font-weight:800;color:var(--gold)}
.saju-cell .earthly{font-size:18px;font-weight:700;color:var(--text)}
.element-badge{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;border-radius:20px;font-size:12px;font-weight:600;margin:4px}
.e-wood{background:rgba(52,211,153,.12);color:#34d399;border:1px solid rgba(52,211,153,.2)}
.e-fire{background:rgba(239,68,68,.12);color:#ef4444;border:1px solid rgba(239,68,68,.2)}
.e-earth{background:rgba(245,200,66,.12);color:#f5c842;border:1px solid rgba(245,200,66,.2)}
.e-metal{background:rgba(156,163,175,.12);color:#9ca3af;border:1px solid rgba(156,163,175,.2)}
.e-water{background:rgba(59,130,246,.12);color:#3b82f6;border:1px solid rgba(59,130,246,.2)}
.name-analysis{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
.name-char{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:14px;text-align:center}
.name-char .char{font-size:28px;font-weight:800;color:var(--text);margin-bottom:8px}
.name-char .strokes{font-size:12px;color:var(--text2);margin-bottom:4px}
.name-char .score{font-size:14px;font-weight:700;color:var(--gold)}
.analyzing-overlay{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px;gap:16px}
.analyzing-spinner{width:48px;height:48px;border:3px solid var(--border);border-top-color:var(--gold);border-radius:50%;animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* Report screen */
.report-layout{max-width:1000px;margin:0 auto;padding:36px 32px}
.report-header{margin-bottom:32px}
.report-header h2{font-size:26px;font-weight:800;color:var(--text);margin-bottom:6px}
.pricing-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:20px;margin-bottom:32px}
.price-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:28px;cursor:pointer;transition:all .25s;position:relative}
.price-card:hover{transform:translateY(-4px);border-color:var(--gold-dim)}
.price-card.featured{border-color:var(--gold);background:rgba(201,151,58,.06)}
.price-badge{position:absolute;top:-10px;left:50%;transform:translateX(-50%);background:var(--gold);color:#0D0C0A;font-size:11px;font-weight:700;padding:4px 12px;border-radius:20px}
.price-name{font-size:14px;font-weight:700;color:var(--text2);margin-bottom:8px}
.price-amount{font-size:32px;font-weight:800;color:var(--text);margin-bottom:4px}
.price-amount span{font-size:16px;color:var(--text2);font-weight:500}
.price-desc{font-size:12px;color:var(--text2);margin-bottom:16px;line-height:1.5}
.price-features{list-style:none;margin-bottom:20px}
.price-features li{font-size:13px;color:var(--text);padding:4px 0;display:flex;align-items:center;gap:6px}
.price-features li::before{content:'';width:4px;height:4px;border-radius:50%;background:var(--gold);flex-shrink:0}
.buy-btn{width:100%;padding:12px;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;font-family:'Pretendard',sans-serif;transition:all .2s}
.buy-btn.featured{background:var(--gold);border:none;color:#0D0C0A}
.buy-btn.normal{background:transparent;border:1px solid var(--border);color:var(--text)}
.buy-btn:hover{opacity:.85;transform:translateY(-1px)}
.report-preview{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:28px}
.report-preview h3{font-size:16px;font-weight:700;color:var(--text);margin-bottom:20px}
.preview-sections{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
.preview-sec{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:14px;text-align:center;cursor:pointer;transition:all .2s}
.preview-sec:hover{border-color:var(--gold);background:rgba(201,151,58,.06)}
.preview-sec .sec-icon{width:36px;height:36px;border-radius:8px;background:rgba(201,151,58,.1);margin:0 auto 8px;display:flex;align-items:center;justify-content:center;color:var(--gold)}
.preview-sec p{font-size:12px;font-weight:600;color:var(--text)}

/* Dashboard screen */
.dashboard-layout{max-width:1100px;margin:0 auto;padding:36px 32px}
.dashboard-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:28px}
.dashboard-header h2{font-size:24px;font-weight:800;color:var(--text)}
.dashboard-header p{font-size:13px;color:var(--text2);margin-top:4px}
.kpi-row{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:24px}
.kpi-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:20px;cursor:pointer;transition:all .2s}
.kpi-card:hover{border-color:var(--gold-dim);transform:translateY(-2px)}
.kpi-label{font-size:12px;color:var(--text2);margin-bottom:8px;font-weight:500}
.kpi-value{font-size:26px;font-weight:800;color:var(--text)}
.kpi-sub{font-size:12px;color:var(--gold);margin-top:4px;font-weight:500}
.charts-grid{display:grid;grid-template-columns:1fr 280px;gap:20px;margin-bottom:24px}
.chart-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:24px}
.chart-card h3{font-size:14px;font-weight:700;color:var(--text);margin-bottom:20px;display:flex;align-items:center;gap:8px}
.history-table{background:var(--surface);border:1px solid var(--border);border-radius:14px;overflow:hidden}
.table-header{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.table-header h3{font-size:14px;font-weight:700;color:var(--text)}
.table-search{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:6px 12px;color:var(--text);font-family:'Pretendard',sans-serif;font-size:13px;outline:none;width:200px}
.table-head{display:grid;grid-template-columns:1fr 1fr 1fr 80px 100px;padding:10px 20px;background:var(--surface2);font-size:12px;color:var(--text2);font-weight:600}
.table-row{display:grid;grid-template-columns:1fr 1fr 1fr 80px 100px;padding:14px 20px;border-bottom:1px solid rgba(255,255,255,.04);font-size:13px;cursor:pointer;transition:background .15s;align-items:center}
.table-row:hover{background:rgba(201,151,58,.04)}
.table-row:last-child{border-bottom:none}
.status-badge{display:inline-flex;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600}
.s-complete{background:rgba(52,211,153,.1);color:#34d399;border:1px solid rgba(52,211,153,.2)}
.s-pending{background:rgba(245,200,66,.1);color:#f5c842;border:1px solid rgba(245,200,66,.2)}
.download-btn{padding:4px 10px;border-radius:6px;background:rgba(201,151,58,.1);border:1px solid rgba(201,151,58,.2);color:var(--gold);font-size:11px;font-weight:600;cursor:pointer;font-family:'Pretendard',sans-serif;transition:all .2s}
.download-btn:hover{background:rgba(201,151,58,.2)}

/* Overlay/Modal */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;display:flex;align-items:center;justify-content:center;animation:fadeIn .2s ease}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:18px;padding:32px;max-width:520px;width:90%;max-height:85vh;overflow-y:auto;animation:scaleIn .25s ease;box-shadow:0 20px 60px rgba(0,0,0,.5)}
.modal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:24px}
.modal-header h3{font-size:18px;font-weight:800;color:var(--text)}
.modal-close{width:32px;height:32px;border-radius:8px;background:var(--surface2);border:1px solid var(--border);cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text2);transition:all .2s}
.modal-close:hover{border-color:var(--gold);color:var(--gold)}
.modal-section{margin-bottom:20px}
.modal-section h4{font-size:13px;font-weight:700;color:var(--text2);margin-bottom:10px;text-transform:uppercase;letter-spacing:.06em}
.info-row{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid rgba(255,255,255,.05);font-size:14px}
.info-row:last-child{border-bottom:none}
.info-row .label{color:var(--text2)}
.info-row .value{color:var(--text);font-weight:600}
.modal-actions{display:flex;gap:10px;margin-top:24px}
.modal-btn{flex:1;padding:12px;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;font-family:'Pretendard',sans-serif;transition:all .2s}
.modal-btn.primary{background:var(--gold);border:none;color:#0D0C0A}
.modal-btn.secondary{background:transparent;border:1px solid var(--border);color:var(--text)}
.modal-btn:hover{opacity:.85}

/* Toast */
.toast{position:fixed;bottom:28px;right:28px;z-index:300;background:var(--surface2);border:1px solid rgba(52,211,153,.3);border-radius:12px;padding:14px 20px;display:flex;align-items:center;gap:10px;font-size:14px;color:var(--text);animation:slideUp .3s ease;box-shadow:0 8px 24px rgba(0,0,0,.3)}
.toast-icon{color:#34d399}

/* Drawer */
.drawer{position:fixed;right:0;top:64px;bottom:0;width:380px;background:var(--surface);border-left:1px solid var(--border);z-index:150;padding:28px;overflow-y:auto;animation:slideFromRight .3s ease;box-shadow:-8px 0 32px rgba(0,0,0,.3)}
@keyframes slideFromRight{from{transform:translateX(100%)}to{transform:translateX(0)}}
.drawer-title{font-size:18px;font-weight:800;color:var(--text);margin-bottom:24px;display:flex;justify-content:space-between;align-items:center}
.detail-row{display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid rgba(255,255,255,.05);font-size:14px}
.detail-row:last-child{border-bottom:none}
.detail-row .dk{color:var(--text2)}
.detail-row .dv{color:var(--text);font-weight:600}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef } = React;
const { RadarChart, Radar, PolarGrid, PolarAngleAxis, LineChart, Line, XAxis, YAxis, CartesianGrid, Tooltip, ResponsiveContainer } = Recharts;

// --- Mock Data ---
const chatHistory = [
  { id:1, name:'이민준 님 사주 분석', date:'2025.05.14' },
  { id:2, name:'김서연 님 성명학', date:'2025.05.12' },
  { id:3, name:'박지호 님 2025 운세', date:'2025.05.10' },
  { id:4, name:'최유리 님 이름 풀이', date:'2025.05.08' },
];

const botMessages = [
  { role:'ai', text:'안녕하세요. 저는 청월당 AI 분석관입니다. 사주와 성명학을 바탕으로 정밀한 운세 분석을 도와드립니다.' },
  { role:'ai', text:'분석을 시작하려면 생년월일(양력/음력)과 태어난 시간을 알려주세요.' },
];

const analysisResult = {
  saju: [
    { label:'년주(年柱)', heaven:'甲', earth:'子', element:'木·水' },
    { label:'월주(月柱)', heaven:'庚', earth:'子', element:'金·水' },
    { label:'일주(日柱)', heaven:'丙', earth:'午', element:'火·火' },
    { label:'시주(時柱)', heaven:'甲', earth:'寅', element:'木·木' },
  ],
  name: { name:'이민준', chars: [
    { char:'이', strokes:6, score:91 },
    { char:'민', strokes:5, score:88 },
    { char:'준', strokes:12, score:94 },
  ]},
  elements: ['木', '木', '水', '火', '火', '火', '木', '金'],
  summary: '일간이 丙火로 강한 화기가 있으며, 木의 도움을 받아 안정적인 기운을 형성합니다. 2025년은 사업·재물운이 상승하는 시기입니다.',
};

const radarData = [
  { element:'목(木)', value:65 },
  { element:'화(火)', value:85 },
  { element:'토(土)', value:40 },
  { element:'금(金)', value:30 },
  { element:'수(水)', value:55 },
];

const fortuneData = [
  { month:'1월', score:62 }, { month:'2월', score:70 }, { month:'3월', score:75 },
  { month:'4월', score:68 }, { month:'5월', score:82 }, { month:'6월', score:88 },
  { month:'7월', score:79 }, { month:'8월', score:85 }, { month:'9월', score:90 },
  { month:'10월', score:83 }, { month:'11월', score:77 }, { month:'12월', score:80 },
];

const historyData = [
  { id:1, date:'2025.05.14', type:'종합 운세', name:'이민준', status:'complete' },
  { id:2, date:'2025.05.12', type:'성명학 분석', name:'김서연', status:'complete' },
  { id:3, date:'2025.05.10', type:'2025년 대운', name:'박지호', status:'complete' },
  { id:4, date:'2025.05.08', type:'이름 풀이', name:'최유리', status:'pending' },
  { id:5, date:'2025.05.06', type:'종합 운세', name:'정승현', status:'complete' },
];

// --- Components ---
function Toast({ msg, onClose }) {
  useEffect(() => { const t = setTimeout(onClose, 2800); return () => clearTimeout(t); }, []);
  return (
    <div className="toast">
      <span className="toast-icon"><i data-lucide="check-circle" style={{width:18,height:18}}></i></span>
      {msg}
    </div>
  );
}

function DrawerDetail({ item, onClose }) {
  return (
    <div className="drawer">
      <div className="drawer-title">
        분석 상세
        <button className="modal-close" onClick={onClose} style={{width:32,height:32,flexShrink:0}}>
          <i data-lucide="x" style={{width:16,height:16}}></i>
        </button>
      </div>
      <div className="detail-row"><span className="dk">분석 일자</span><span className="dv">{item.date}</span></div>
      <div className="detail-row"><span className="dk">분석 유형</span><span className="dv">{item.type}</span></div>
      <div className="detail-row"><span className="dk">대상자</span><span className="dv">{item.name}</span></div>
      <div className="detail-row"><span className="dk">상태</span><span className="dv" style={{color: item.status==='complete'?'#34d399':'#f5c842'}}>{item.status==='complete'?'분석 완료':'처리 중'}</span></div>
      <div style={{marginTop:24,padding:'16px',background:'var(--surface2)',borderRadius:10,border:'1px solid var(--border)'}}>
        <div style={{fontSize:13,fontWeight:700,color:'var(--gold)',marginBottom:8}}>분석 요약</div>
        <div style={{fontSize:13,color:'var(--text2)',lineHeight:1.7}}>{analysisResult.summary}</div>
      </div>
      <div style={{display:'flex',gap:10,marginTop:20}}>
        <button className="modal-btn primary" style={{flex:1}} onClick={onClose}>PDF 다운로드</button>
        <button className="modal-btn secondary" style={{flex:1}} onClick={onClose}>닫기</button>
      </div>
    </div>
  );
}

function PaymentModal({ plan, onClose, onDone }) {
  const [step, setStep] = useState(1);
  const [loading, setLoading] = useState(false);
  const handlePay = () => {
    setLoading(true);
    setTimeout(() => { setLoading(false); onDone(); }, 1800);
  };
  return (
    <div className="overlay" onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div className="modal">
        <div className="modal-header">
          <h3>{plan.name} 리포트 구매</h3>
          <button className="modal-close" onClick={onClose}><i data-lucide="x" style={{width:16,height:16}}></i></button>
        </div>
        {step===1 && <>
          <div className="modal-section">
            <h4>결제 금액</h4>
            <div style={{fontSize:28,fontWeight:800,color:'var(--gold)',marginBottom:4}}>{plan.price}</div>
            <div style={{fontSize:13,color:'var(--text2)'}}>부가세 포함</div>
          </div>
          <div className="modal-section">
            <h4>구매자 정보</h4>
            <input className="form-input" placeholder="이름" style={{marginBottom:10}} defaultValue="이민준" readOnly/>
            <input className="form-input" placeholder="이메일" defaultValue="minjun.lee@example.com" readOnly/>
          </div>
          <div className="modal-section">
            <h4>결제 수단</h4>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8}}>
              {['카카오페이','토스페이','신용카드','무통장입금'].map(m=>(
                <div key={m} onClick={()=>setStep(2)} style={{padding:'12px',background:'var(--surface2)',border:'1px solid var(--border)',borderRadius:8,cursor:'pointer',fontSize:13,textAlign:'center',color:'var(--text)',transition:'all .2s'}}
                  onMouseEnter={e=>{e.target.style.borderColor='var(--gold)';e.target.style.color='var(--gold)'}}
                  onMouseLeave={e=>{e.target.style.borderColor='var(--border)';e.target.style.color='var(--text)'}}
                >{m}</div>
              ))}
            </div>
          </div>
        </>}
        {step===2 && <>
          <div style={{textAlign:'center',padding:'20px 0'}}>
            <div style={{width:60,height:60,borderRadius:'50%',background:'rgba(201,151,58,.1)',border:'2px solid var(--gold)',display:'flex',alignItems:'center',justifyContent:'center',margin:'0 auto 16px',color:'var(--gold)'}}>
              <i data-lucide="smartphone" style={{width:28,height:28}}></i>
            </div>
            <div style={{fontSize:16,fontWeight:700,color:'var(--text)',marginBottom:8}}>카카오페이 결제</div>
            <div style={{fontSize:13,color:'var(--text2)',marginBottom:24}}>결제 금액: {plan.price}</div>
            {loading
              ? <div style={{display:'flex',flexDirection:'column',alignItems:'center',gap:12}}>
                  <div className="analyzing-spinner"></div>
                  <div style={{fontSize:13,color:'var(--text2)'}}>결제 처리 중...</div>
                </div>
              : <button className="modal-btn primary" style={{width:'100%'}} onClick={handlePay}>결제 확인</button>
            }
          </div>
        </>}
        {step===1 && <button className="modal-btn secondary" style={{width:'100%',marginTop:12}} onClick={onClose}>취소</button>}
      </div>
    </div>
  );
}

// --- Screens ---
function HeroScreen({ onNav }) {
  return (
    <div className="screen">
      <div className="hero">
        <div className="hero-badge"><i data-lucide="sparkles" style={{width:12,height:12}}></i> AI 기반 사주·성명학 분석</div>
        <h1>운명을 읽는<br/><em>AI 분석관</em>과의 대화</h1>
        <p>생년월일과 이름 하나로 천간·지지·오행을 분석하고<br/>맞춤형 운세 리포트를 즉시 PDF로 받아보세요</p>
        <div className="hero-actions">
          <button className="btn-primary" onClick={()=>onNav('main')}>AI 챗봇 상담 시작</button>
          <button className="btn-secondary" onClick={()=>onNav('analysis')}>사주 분석 체험</button>
        </div>
      </div>
      <div className="features-grid">
        {[
          {icon:'message-circle',title:'AI 챗봇 인터페이스',desc:'분석관과 자연어 대화로 사주·성명학 분석을 요청합니다. 타이핑 애니메이션과 결과 카드가 실시간 렌더링됩니다.'},
          {icon:'cpu',title:'사주·성명학 분석 엔진',desc:'만세력 외부 API와 클라이언트 제공 성명학 규칙 엔진이 연동되어 정밀한 운세 데이터를 산출합니다.'},
          {icon:'file-text',title:'PDF 리포트 자동 생성',desc:'분석 결과를 바탕으로 차트·그래프가 포함된 8섹션 프리미엄 리포트를 자동 생성합니다.'},
        ].map((f,i)=>(
          <div className="feat-card" key={i} style={{animationDelay:`${i*0.1}s`}} onClick={()=>onNav(i===0?'main':i===1?'analysis':'report')}>
            <div className="feat-icon"><i data-lucide={f.icon} style={{width:20,height:20}}></i></div>
            <h3>{f.title}</h3>
            <p>{f.desc}</p>
          </div>
        ))}
      </div>
    </div>
  );
}

function ChatScreen({ onToast }) {
  const [messages, setMessages] = useState(botMessages);
  const [input, setInput] = useState('');
  const [typing, setTyping] = useState(false);
  const [activeHist, setActiveHist] = useState(1);
  const msgEnd = useRef(null);

  const handleSend = () => {
    if (!input.trim()) return;
    const userMsg = { role:'user', text: input };
    setMessages(m=>[...m, userMsg]);
    setInput('');
    setTyping(true);
    setTimeout(() => {
      setTyping(false);
      setMessages(m=>[...m, { role:'ai', text:'말씀하신 생년월일을 기반으로 사주팔자를 분석 중입니다.', isCard:true }]);
    }, 1600);
  };

  useEffect(() => { msgEnd.current?.scrollIntoView({ behavior:'smooth' }); }, [messages, typing]);

  return (
    <div className="chat-layout screen">
      <div className="chat-sidebar">
        <button className="new-chat-btn"><i data-lucide="plus" style={{width:14,height:14}}></i> 새 분석 시작</button>
        <div className="sidebar-title">최근 상담 내역</div>
        {chatHistory.map(h=>(
          <div key={h.id} className={`history-item${activeHist===h.id?' active':''}`} onClick={()=>setActiveHist(h.id)}>
            <h4>{h.name}</h4>
            <p>{h.date}</p>
          </div>
        ))}
      </div>
      <div className="chat-main">
        <div className="chat-header">
          <div className="chat-avatar">청</div>
          <div>
            <h2>청월당 AI 분석관</h2>
            <p>사주·성명학 전문 분석</p>
          </div>
        </div>
        <div className="messages">
          {messages.map((m,i)=>(
            <div key={i} className={`msg ${m.role}`}>
              {m.role==='ai' && <div className="msg-avatar ai">AI</div>}
              <div>
                <div className="msg-bubble">{m.text}</div>
                {m.isCard && (
                  <div className="result-card" style={{marginTop:10}}>
                    <h4>사주팔자 초기 분석 결과</h4>
                    {[['일간(日干)','丙火 (양력 1990.03.15)'],['대운','35세 庚子 대운'],['2025 세운','乙巳年 — 財星 활성화'],['주요 오행','火 과다, 木·金 보완 필요']].map(([k,v])=>(
                      <div className="result-row" key={k}><span>{k}</span><span>{v}</span></div>
                    ))}
                  </div>
                )}
              </div>
              {m.role==='user' && <div className="msg-avatar">나</div>}
            </div>
          ))}
          {typing && (
            <div className="msg ai">
              <div className="msg-avatar ai">AI</div>
              <div className="typing-indicator">
                <div className="typing-dot"></div>
                <div className="typing-dot"></div>
                <div className="typing-dot"></div>
              </div>
            </div>
          )}
          <div ref={msgEnd}/>
        </div>
        <div className="chat-input-area">
          <textarea className="chat-input" placeholder="생년월일, 이름을 입력하거나 궁금한 것을 질문하세요..." value={input} onChange={e=>setInput(e.target.value)} onKeyDown={e=>e.key==='Enter'&&!e.shiftKey&&(e.preventDefault(),handleSend())} rows={1}/>
          <button className="chat-send-btn" onClick={handleSend}>
            <i data-lucide="send" style={{width:14,height:14}}></i>
            전송
          </button>
        </div>
      </div>
    </div>
  );
}

function AnalysisScreen({ onToast }) {
  const [analyzing, setAnalyzing] = useState(false);
  const [result, setResult] = useState(null);
  const handleAnalyze = () => {
    setAnalyzing(true);
    setResult(null);
    setTimeout(() => { setAnalyzing(false); setResult(analysisResult); }, 2000);
  };
  return (
    <div className="analysis-layout screen">
      <div className="analysis-header">
        <h2>사주·성명학 분석 엔진</h2>
        <p>생년월일과 이름을 입력하면 만세력 API와 성명학 알고리즘이 연동되어 정밀 분석 결과를 제공합니다</p>
      </div>
      <div className="analysis-grid">
        <div className="input-panel">
          <h3><i data-lucide="user" style={{width:16,height:16,color:'var(--gold)'}}></i> 분석 정보 입력</h3>
          <div className="form-group">
            <label className="form-label">이름</label>
            <input className="form-input" placeholder="홍길동" defaultValue="이민준"/>
          </div>
          <div className="form-group">
            <label className="form-label">생년월일</label>
            <input className="form-input" type="date" defaultValue="1990-03-15"/>
          </div>
          <div className="form-group">
            <label className="form-label">출생 시간</label>
            <select className="form-select">
              <option>자시 (23:00 ~ 01:00)</option>
              <option>축시 (01:00 ~ 03:00)</option>
              <option selected>묘시 (05:00 ~ 07:00)</option>
              <option>오시 (11:00 ~ 13:00)</option>
            </select>
          </div>
          <div className="form-group">
            <label className="form-label">양력/음력</label>
            <select className="form-select"><option>양력</option><option>음력</option></select>
          </div>
          <div className="form-group">
            <label className="form-label">성별</label>
            <select className="form-select"><option>남성</option><option>여성</option></select>
          </div>
          <button className="analyze-btn" onClick={handleAnalyze}>
            <i data-lucide="zap" style={{width:16,height:16}}></i>
            분석 시작
          </button>
        </div>
        <div className="result-panel">
          {!analyzing && !result && (
            <div style={{background:'var(--surface)',border:'1px solid var(--border)',borderRadius:14,padding:40,textAlign:'center',color:'var(--text2)'}}>
              <i data-lucide="search" style={{width:48,height:48,marginBottom:16,color:'var(--border)'}}></i>
              <div style={{fontSize:14}}>분석 정보를 입력하고 시작 버튼을 누르면<br/>사주팔자와 성명학 결과를 확인할 수 있습니다</div>
            </div>
          )}
          {analyzing && (
            <div style={{background:'var(--surface)',border:'1px solid var(--border)',borderRadius:14}} className="analyzing-overlay">
              <div className="analyzing-spinner"></div>
              <div style={{fontSize:15,fontWeight:700,color:'var(--text)'}}>만세력 API 분석 중</div>
              <div style={{fontSize:13,color:'var(--text2)'}}>천간·지지·오행 데이터를 계산하고 있습니다...</div>
            </div>
          )}
          {result && <>
            <div className="result-section">
              <h3><i data-lucide="grid" style={{width:14,height:14}}></i> 사주팔자</h3>
              <div className="saju-grid">
                {result.saju.map((s,i)=>(
                  <div key={i} className="saju-cell">
                    <div className="label">{s.label}</div>
                    <div className="heavenly">{s.heaven}</div>
                    <div className="earthly">{s.earth}</div>
                    <div style={{fontSize:11,color:'var(--text2)',marginTop:4}}>{s.element}</div>
                  </div>
                ))}
              </div>
              <div>
                {[{label:'목(木)',cls:'e-wood'},{label:'화(火)',cls:'e-fire'},{label:'토(土)',cls:'e-earth'},{label:'금(金)',cls:'e-metal'},{label:'수(水)',cls:'e-water'}].map(e=>(
                  <span key={e.label} className={`element-badge ${e.cls}`}>{e.label}</span>
                ))}
              </div>
            </div>
            <div className="result-section">
              <h3><i data-lucide="type" style={{width:14,height:14}}></i> 성명학 분석 — {result.name.name}</h3>
              <div className="name-analysis">
                {result.name.chars.map((c,i)=>(
                  <div key={i} className="name-char">
                    <div className="char">{c.char}</div>
                    <div className="strokes">획수: {c.strokes}획</div>
                    <div className="score">점수: {c.score}점</div>
                  </div>
                ))}
              </div>
              <div style={{marginTop:14,padding:'12px 14px',background:'var(--surface2)',borderRadius:8,fontSize:13,color:'var(--text2)',lineHeight:1.6}}>
                {result.summary}
              </div>
            </div>
            <div className="result-section">
              <h3><i data-lucide="bar-chart-2" style={{width:14,height:14}}></i> 오행 균형</h3>
              <div style={{height:200}}>
                <ResponsiveContainer width="100%" height="100%">
                  <RadarChart data={radarData} margin={{top:5,right:5,bottom:5,left:5}}>
                    <PolarGrid stroke="rgba(201,151,58,.2)"/>
                    <PolarAngleAxis dataKey="element" tick={{fill:'#A89060',fontSize:12}}/>
                    <Radar name="오행" dataKey="value" stroke="#C9973A" fill="#C9973A" fillOpacity={0.25}/>
                  </RadarChart>
                </ResponsiveContainer>
              </div>
            </div>
            <div style={{display:'flex',gap:10}}>
              <button className="analyze-btn" style={{flex:1}} onClick={()=>onToast('PDF 리포트 생성이 시작됩니다')}>PDF 리포트 생성</button>
              <button className="analyze-btn" style={{flex:1,background:'transparent',border:'1px solid var(--border)',color:'var(--text)'}} onClick={handleAnalyze}>재분석</button>
            </div>
          </>}
        </div>
      </div>
    </div>
  );
}

function ReportScreen({ onToast }) {
  const [payModal, setPayModal] = useState(null);
  const plans = [
    { name:'기본 리포트', price:'9,900원', desc:'사주팔자·오행 분석, PDF 1장', features:['사주팔자 분석','오행 균형 차트','이달의 운세'] },
    { name:'프리미엄 리포트', price:'29,900원', desc:'전체 8섹션 분석 + 성명학', features:['사주팔자·대운·세운','성명학 완전 분석','PDF 8섹션 리포트','연간 운세 차트'], featured:true },
    { name:'디럭스 리포트', price:'59,900원', desc:'PDF + 1:1 전문가 해설', features:['프리미엄 전체 포함','전문가 해설 영상','1회 추가 분석 쿠폰','우선 처리'] },
  ];
  return (
    <div className="report-layout screen">
      <div className="report-header">
        <h2>리포트 구매</h2>
        <p style={{fontSize:14,color:'var(--text2)',marginTop:6}}>분석 결과를 바탕으로 Puppeteer PDF 엔진이 차트·그래프가 포함된 맞춤형 리포트를 자동 생성합니다</p>
      </div>
      <div className="pricing-grid">
        {plans.map((p,i)=>(
          <div key={i} className={`price-card${p.featured?' featured':''}`}>
            {p.featured && <div className="price-badge">가장 인기</div>}
            <div className="price-name">{p.name}</div>
            <div className="price-amount">{p.price.split('원')[0]}<span>원</span></div>
            <div className="price-desc">{p.desc}</div>
            <ul className="price-features">{p.features.map(f=><li key={f}>{f}</li>)}</ul>
            <button className={`buy-btn${p.featured?' featured':' normal'}`} onClick={()=>setPayModal(p)}>구매하기</button>
          </div>
        ))}
      </div>
      <div className="report-preview">
        <h3>리포트 구성 미리보기</h3>
        <div className="preview-sections">
          {[
            {icon:'sun',label:'사주팔자'},
            {icon:'type',label:'성명학 분석'},
            {icon:'bar-chart-2',label:'오행 균형'},
            {icon:'trending-up',label:'대운·세운'},
            {icon:'calendar',label:'연간 운세'},
            {icon:'moon',label:'월별 운세'},
            {icon:'user',label:'성격 분석'},
            {icon:'star',label:'종합 제언'},
          ].map((s,i)=>(
            <div key={i} className="preview-sec" onClick={()=>onToast(`${s.label} 섹션 미리보기`)}>
              <div className="preview-sec-icon" style={{width:36,height:36,borderRadius:8,background:'rgba(201,151,58,.1)',margin:'0 auto 8px',display:'flex',alignItems:'center',justifyContent:'center',color:'var(--gold)'}}>
                <i data-lucide={s.icon} style={{width:18,height:18}}></i>
              </div>
              <p>{s.label}</p>
            </div>
          ))}
        </div>
      </div>
      {payModal && (
        <PaymentModal
          plan={payModal}
          onClose={()=>setPayModal(null)}
          onDone={()=>{ setPayModal(null); onToast('결제가 완료되었습니다. PDF 리포트를 생성합니다.'); }}
        />
      )}
    </div>
  );
}

function DashboardScreen({ onToast }) {
  const [drawer, setDrawer] = useState(null);
  const [search, setSearch] = useState('');
  const filtered = historyData.filter(h=>h.name.includes(search)||h.type.includes(search));
  return (
    <div className="dashboard-layout screen">
      <div className="dashboard-header">
        <div>
          <h2>내 대시보드</h2>
          <p>운세 분석 이력과 리포트를 관리합니다</p>
        </div>
        <button className="btn-start" onClick={()=>onToast('새 분석을 시작합니다')}>새 분석 시작</button>
      </div>
      <div className="kpi-row">
        {[
          {label:'총 분석 횟수',value:'12건',sub:'이번 달 3건'},
          {label:'완료 리포트',value:'8건',sub:'PDF 다운로드 가능'},
          {label:'사용 포인트',value:'2,400P',sub:'잔여 1,200P'},
          {label:'다음 대운',value:'2027년',sub:'庚子 대운 진입'},
        ].map((k,i)=>(
          <div key={i} className="kpi-card" onClick={()=>onToast(k.label)}>
            <div className="kpi-label">{k.label}</div>
            <div className="kpi-value">{k.value}</div>
            <div className="kpi-sub">{k.sub}</div>
          </div>
        ))}
      </div>
      <div className="charts-grid">
        <div className="chart-card">
          <h3><i data-lucide="trending-up" style={{width:14,height:14,color:'var(--gold)'}}></i> 2025년 월별 운세 지수</h3>
          <div style={{height:220}}>
            <ResponsiveContainer width="100%" height="100%">
              <LineChart data={fortuneData} margin={{top:5,right:10,bottom:5,left:-10}}>
                <CartesianGrid strokeDasharray="3 3" stroke="rgba(255,255,255,.06)"/>
                <XAxis dataKey="month" tick={{fill:'#A89060',fontSize:11}}/>
                <YAxis tick={{fill:'#A89060',fontSize:11}} domain={[40,100]}/>
                <Tooltip contentStyle={{background:'#1A1713',border:'1px solid rgba(201,151,58,.2)',borderRadius:8,color:'#F2EDD7'}}/>
                <Line type="monotone" dataKey="score" stroke="#C9973A" strokeWidth={2.5} dot={{fill:'#C9973A',r:3}} activeDot={{r:5}}/>
              </LineChart>
            </ResponsiveContainer>
          </div>
        </div>
        <div className="chart-card">
          <h3><i data-lucide="pie-chart" style={{width:14,height:14,color:'var(--gold)'}}></i> 오행 균형</h3>
          <div style={{height:220}}>
            <ResponsiveContainer width="100%" height="100%">
              <RadarChart data={radarData} margin={{top:5,right:5,bottom:5,left:5}}>
                <PolarGrid stroke="rgba(201,151,58,.2)"/>
                <PolarAngleAxis dataKey="element" tick={{fill:'#A89060',fontSize:11}}/>
                <Radar dataKey="value" stroke="#C9973A" fill="#C9973A" fillOpacity={0.2} strokeWidth={2}/>
              </RadarChart>
            </ResponsiveContainer>
          </div>
        </div>
      </div>
      <div className="history-table">
        <div className="table-header">
          <h3>분석 이력</h3>
          <input className="table-search" placeholder="이름 또는 분석 유형 검색" value={search} onChange={e=>setSearch(e.target.value)}/>
        </div>
        <div className="table-head">
          <span>분석 일자</span><span>유형</span><span>대상자</span><span>상태</span><span>리포트</span>
        </div>
        {filtered.map(h=>(
          <div key={h.id} className="table-row" onClick={()=>setDrawer(h)}>
            <span style={{color:'var(--text2)'}}>{h.date}</span>
            <span>{h.type}</span>
            <span>{h.name}</span>
            <span><span className={`status-badge ${h.status==='complete'?'s-complete':'s-pending'}`}>{h.status==='complete'?'완료':'처리 중'}</span></span>
            <span><button className="download-btn" onClick={e=>{e.stopPropagation();onToast('PDF 다운로드를 시작합니다')}}>다운로드</button></span>
          </div>
        ))}
      </div>
      {drawer && <DrawerDetail item={drawer} onClose={()=>setDrawer(null)}/>}
    </div>
  );
}

// --- App ---
function App() {
  const [activeTab, setActiveTab] = useState('hero');
  const [toast, setToast] = useState(null);
  const showToast = (msg) => { setToast(msg); };

  useEffect(() => {
    if (window.lucide) lucide.createIcons();
  });

  const tabs = [
    { id:'main', label:'AI 챗봇 상담' },
    { id:'analysis', label:'사주 분석' },
    { id:'report', label:'리포트 구매' },
    { id:'dashboard', label:'내 대시보드' },
  ];

  const handleNav = (tab) => { setActiveTab(tab); };

  return (
    <div style={{width:'100%',minHeight:'100vh',background:'var(--bg)'}}>
      <nav className="topnav">
        <div className="topnav-logo">
          <i data-lucide="moon-star" style={{width:20,height:20}}></i>
          <span>청월당</span>
        </div>
        <div className="topnav-tabs">
          {tabs.map(t=>(
            <button key={t.id} className={`nav-tab${activeTab===t.id?' active':''}`} onClick={()=>handleNav(t.id)}>
              {t.label}
            </button>
          ))}
        </div>
        <div className="topnav-right">
          <button className="btn-login">로그인</button>
          <button className="btn-start" onClick={()=>handleNav('main')}>무료 체험</button>
        </div>
      </nav>
      <div className="main">
        {activeTab==='hero' && <HeroScreen onNav={handleNav}/>}
        {activeTab==='main' && <ChatScreen onToast={showToast}/>}
        {activeTab==='analysis' && <AnalysisScreen onToast={showToast}/>}
        {activeTab==='report' && <ReportScreen onToast={showToast}/>}
        {activeTab==='dashboard' && <DashboardScreen onToast={showToast}/>}
      </div>
      {toast && <Toast msg={toast} onClose={()=>setToast(null)}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
