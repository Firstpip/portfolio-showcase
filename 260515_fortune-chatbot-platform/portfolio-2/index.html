<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>운세 플랫폼 통합 관리 시스템 — 구현 데모</title>
<link rel="preconnect" href="https://cdn.jsdelivr.net">
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/@tabler/icons-webfont@latest/dist/tabler-icons.min.css">
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://unpkg.com/prop-types@15/prop-types.min.js"></script>
<script src="https://unpkg.com/react-is@18/umd/react-is.production.min.js"></script>
<script src="https://unpkg.com/recharts@2.8.0/umd/Recharts.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body,#root{width:100%;min-height:100vh;font-family:'Pretendard',sans-serif;background:#0F172A;color:#F1F5F9}
:root{
  --blue:#2B7FFF;--cyan:#22D3EE;--sky:#0EA5E9;
  --bg:#0F172A;--surface:#1E293B;--surface2:#263246;
  --text:#F1F5F9;--text2:#94A3B8;--border:#334155;--border2:#2D3D55;
}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideInLeft{from{opacity:0;transform:translateX(-16px)}to{opacity:1;transform:translateX(0)}}
@keyframes countUp{from{opacity:0;transform:scale(.9)}to{opacity:1;transform:scale(1)}}
@keyframes barGrow{from{transform:scaleY(0)}to{transform:scaleY(1)}}
@keyframes scaleIn{from{opacity:0;transform:scale(.96)}to{opacity:1;transform:scale(1)}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}

/* Layout */
.app-shell{display:flex;flex-direction:column;min-height:100vh;width:100%}
.global-nav{position:fixed;top:0;left:0;right:0;height:56px;background:var(--bg);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 24px;z-index:100;gap:16px}
.nav-brand{display:flex;align-items:center;gap:8px;font-size:16px;font-weight:800;color:var(--text);text-decoration:none;margin-right:8px}
.nav-brand .dot{width:8px;height:8px;border-radius:2px;background:var(--blue)}
.nav-breadcrumb{display:flex;align-items:center;gap:6px;font-size:13px;color:var(--text2)}
.nav-breadcrumb .sep{color:var(--border)}
.nav-breadcrumb .current{color:var(--text);font-weight:600}
.nav-spacer{flex:1}
.nav-chip{display:flex;align-items:center;gap:6px;padding:5px 12px;border-radius:20px;background:rgba(43,127,255,.1);border:1px solid rgba(43,127,255,.2);color:var(--sky);font-size:12px;font-weight:600}
.nav-avatar{width:32px;height:32px;border-radius:8px;background:var(--blue);display:flex;align-items:center;justify-content:center;color:#fff;font-size:13px;font-weight:700;cursor:pointer;transition:opacity .2s}
.nav-avatar:hover{opacity:.85}

/* Section tabs */
.section-tabs{position:fixed;top:56px;left:0;right:0;height:48px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 24px;gap:4px;z-index:90;overflow-x:auto}
.sec-tab{display:flex;align-items:center;gap:6px;padding:7px 16px;border-radius:7px;font-size:13px;font-weight:500;cursor:pointer;transition:all .2s;color:var(--text2);background:transparent;border:none;font-family:'Pretendard',sans-serif;white-space:nowrap}
.sec-tab:hover{color:var(--text);background:rgba(255,255,255,.05)}
.sec-tab.active{color:var(--blue);background:rgba(43,127,255,.1);border:1px solid rgba(43,127,255,.18)}
.sec-tab .ti{font-size:15px}

/* Content */
.content{margin-top:104px;padding:28px 28px 64px;flex:1;animation:fadeIn .25s ease}
.page{animation:slideUp .3s ease}

/* Footer */
.footer{background:var(--surface);border-top:1px solid var(--border);padding:20px 28px;display:flex;align-items:center;justify-content:space-between;font-size:12px;color:var(--text2)}
.footer-links{display:flex;gap:16px}
.footer-links span{cursor:pointer;transition:color .2s}
.footer-links span:hover{color:var(--text)}

/* Cards & layouts */
.page-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:24px}
.page-title{font-size:20px;font-weight:800;color:var(--text)}
.page-sub{font-size:13px;color:var(--text2);margin-top:4px}
.btn-blue{padding:8px 18px;border-radius:8px;background:var(--blue);border:none;color:#fff;font-size:13px;font-weight:700;cursor:pointer;font-family:'Pretendard',sans-serif;transition:all .2s;display:inline-flex;align-items:center;gap:6px}
.btn-blue:hover{background:#1a6de0;transform:translateY(-1px)}
.btn-outline{padding:8px 16px;border-radius:8px;background:transparent;border:1px solid var(--border);color:var(--text);font-size:13px;font-weight:600;cursor:pointer;font-family:'Pretendard',sans-serif;transition:all .2s;display:inline-flex;align-items:center;gap:6px}
.btn-outline:hover{border-color:var(--blue);color:var(--blue)}

/* KPI cards */
.kpi-row{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:24px}
.kpi{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:18px;cursor:pointer;transition:all .2s;animation:countUp .35s ease both}
.kpi:hover{border-color:var(--blue);transform:translateY(-2px)}
.kpi-label{font-size:12px;color:var(--text2);margin-bottom:6px;display:flex;align-items:center;gap:6px}
.kpi-value{font-size:24px;font-weight:800;color:var(--text)}
.kpi-change{font-size:12px;margin-top:4px}
.kpi-change.up{color:#34d399}
.kpi-change.down{color:#f87171}
.kpi-change.neutral{color:var(--text2)}

/* Charts */
.charts-row{display:grid;grid-template-columns:2fr 1fr;gap:16px;margin-bottom:24px}
.chart-box{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:20px}
.chart-box h3{font-size:13px;font-weight:700;color:var(--text);margin-bottom:16px;display:flex;align-items:center;gap:6px}
.chart-box h3 .ti{color:var(--blue);font-size:16px}

/* Tables */
.table-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;overflow:hidden;margin-bottom:20px}
.tc-header{padding:14px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap}
.tc-title{font-size:13px;font-weight:700;color:var(--text);display:flex;align-items:center;gap:6px}
.tc-title .ti{color:var(--blue);font-size:16px}
.tc-controls{display:flex;align-items:center;gap:8px}
.search-box{background:var(--bg);border:1px solid var(--border);border-radius:7px;padding:6px 12px;color:var(--text);font-family:'Pretendard',sans-serif;font-size:13px;outline:none;width:200px;transition:border-color .2s}
.search-box:focus{border-color:var(--blue)}
.filter-select{background:var(--bg);border:1px solid var(--border);border-radius:7px;padding:6px 10px;color:var(--text);font-family:'Pretendard',sans-serif;font-size:13px;outline:none;cursor:pointer}
.th{display:grid;padding:10px 18px;background:rgba(255,255,255,.02);font-size:11px;color:var(--text2);font-weight:700;letter-spacing:.05em;border-bottom:1px solid var(--border)}
.tr{padding:13px 18px;border-bottom:1px solid rgba(255,255,255,.04);cursor:pointer;transition:background .15s;font-size:13px}
.tr:hover{background:rgba(43,127,255,.04)}
.tr:last-child{border-bottom:none}
.tr-grid{display:grid;align-items:center}
.cell-text{color:var(--text)}
.cell-sub{color:var(--text2);font-size:12px;margin-top:2px}
.badge{display:inline-flex;padding:2px 9px;border-radius:20px;font-size:11px;font-weight:600}
.b-green{background:rgba(52,211,153,.1);color:#34d399;border:1px solid rgba(52,211,153,.2)}
.b-yellow{background:rgba(250,204,21,.1);color:#facc15;border:1px solid rgba(250,204,21,.2)}
.b-red{background:rgba(248,113,113,.1);color:#f87171;border:1px solid rgba(248,113,113,.2)}
.b-blue{background:rgba(43,127,255,.1);color:#60a5fa;border:1px solid rgba(43,127,255,.2)}
.action-btn{padding:4px 10px;border-radius:6px;background:rgba(43,127,255,.1);border:1px solid rgba(43,127,255,.2);color:#60a5fa;font-size:11px;font-weight:600;cursor:pointer;font-family:'Pretendard',sans-serif;transition:all .2s}
.action-btn:hover{background:rgba(43,127,255,.2)}

/* Modal */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:200;display:flex;align-items:center;justify-content:center;animation:fadeIn .2s ease}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:28px;max-width:540px;width:92%;max-height:88vh;overflow-y:auto;animation:scaleIn .22s ease;box-shadow:0 20px 50px rgba(0,0,0,.4)}
.modal-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:22px}
.modal-head h3{font-size:17px;font-weight:800;color:var(--text)}
.close-btn{width:30px;height:30px;border-radius:7px;background:var(--surface2);border:1px solid var(--border);cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text2);font-size:16px;transition:all .2s}
.close-btn:hover{border-color:var(--blue);color:var(--blue)}
.modal-row{display:flex;justify-content:space-between;padding:9px 0;border-bottom:1px solid rgba(255,255,255,.05);font-size:13px}
.modal-row:last-child{border-bottom:none}
.modal-row .mk{color:var(--text2)}
.modal-row .mv{color:var(--text);font-weight:600}
.modal-actions{display:flex;gap:8px;margin-top:20px}
.m-btn{flex:1;padding:10px;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;font-family:'Pretendard',sans-serif;transition:all .2s}
.m-btn.primary{background:var(--blue);border:none;color:#fff}
.m-btn.secondary{background:transparent;border:1px solid var(--border);color:var(--text)}
.m-btn:hover{opacity:.85}

/* Toast */
.toast{position:fixed;bottom:24px;right:24px;z-index:300;background:var(--surface2);border:1px solid rgba(52,211,153,.3);border-radius:10px;padding:12px 18px;display:flex;align-items:center;gap:8px;font-size:13px;color:var(--text);animation:slideUp .25s ease;box-shadow:0 6px 20px rgba(0,0,0,.3)}

/* Mobile demo */
.mobile-preview{display:grid;grid-template-columns:1fr 1fr;gap:24px;align-items:start}
.phone-frame{background:var(--surface2);border:2px solid var(--border);border-radius:28px;padding:8px;max-width:280px;margin:0 auto;position:relative;box-shadow:0 20px 40px rgba(0,0,0,.3)}
.phone-notch{width:60px;height:20px;background:var(--surface);border-radius:10px;margin:0 auto 8px;display:flex;align-items:center;justify-content:center}
.phone-screen{background:var(--bg);border-radius:20px;overflow:hidden;min-height:480px;position:relative}
.phone-topbar{background:var(--surface);padding:12px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px}
.phone-topbar .app-name{font-size:13px;font-weight:700;color:var(--text)}
.phone-content{padding:14px}
.phone-chat-bubble{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:10px 12px;margin-bottom:8px;font-size:12px;color:var(--text);line-height:1.5}
.phone-chat-bubble.user{background:rgba(43,127,255,.15);border-color:rgba(43,127,255,.2);text-align:right}
.phone-bottom-nav{background:var(--surface);border-top:1px solid var(--border);display:flex;justify-content:space-around;padding:8px 0}
.phone-nav-item{display:flex;flex-direction:column;align-items:center;gap:2px;font-size:10px;color:var(--text2);cursor:pointer;padding:4px 12px;border-radius:8px;transition:all .2s}
.phone-nav-item.active{color:var(--blue);background:rgba(43,127,255,.08)}
.phone-nav-item .ti{font-size:20px}
.arch-info{flex:1}
.arch-info h3{font-size:16px;font-weight:800;color:var(--text);margin-bottom:12px}
.arch-section{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:16px;margin-bottom:14px}
.arch-section h4{font-size:13px;font-weight:700;color:var(--sky);margin-bottom:10px}
.arch-item{display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid rgba(255,255,255,.04);font-size:13px;color:var(--text)}
.arch-item:last-child{border-bottom:none}
.arch-item .tag{display:inline-flex;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:600;background:rgba(43,127,255,.1);color:#60a5fa;border:1px solid rgba(43,127,255,.2);margin-left:auto;white-space:nowrap}
.queue-item{display:flex;align-items:center;gap:10px;padding:8px;background:var(--bg);border-radius:8px;margin-bottom:6px;border:1px solid var(--border)}
.queue-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.queue-dot.active{background:#34d399;animation:blink 1.5s infinite}
.queue-dot.waiting{background:#facc15}
.queue-dot.done{background:var(--text2)}
.queue-label{font-size:12px;color:var(--text);flex:1}
.queue-status{font-size:11px;color:var(--text2)}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useCallback } = React;
const { BarChart, Bar, LineChart, Line, XAxis, YAxis, CartesianGrid, Tooltip, ResponsiveContainer, PieChart, Pie, Cell } = Recharts;

// --- Mock Data ---
const revenueData = [
  { day:'5/9', revenue:142, orders:18 }, { day:'5/10', revenue:198, orders:24 },
  { day:'5/11', revenue:167, orders:21 }, { day:'5/12', revenue:234, orders:30 },
  { day:'5/13', revenue:189, orders:25 }, { day:'5/14', revenue:312, orders:41 },
  { day:'5/15', revenue:278, orders:37 },
];

const pieData = [
  { name:'종합 운세', value:42, color:'#2B7FFF' },
  { name:'성명학 분석', value:28, color:'#22D3EE' },
  { name:'2025 대운', value:18, color:'#0EA5E9' },
  { name:'이름 풀이', value:12, color:'#7C3AED' },
];

const orderData = [
  { id:'ORD-2841', user:'이민준', type:'프리미엄 리포트', amount:'29,900원', status:'complete', date:'2025.05.15 14:22' },
  { id:'ORD-2840', user:'김서연', type:'기본 리포트', amount:'9,900원', status:'pending', date:'2025.05.15 13:45' },
  { id:'ORD-2839', user:'박지호', type:'디럭스 리포트', amount:'59,900원', status:'complete', date:'2025.05.15 11:30' },
  { id:'ORD-2838', user:'최유리', type:'프리미엄 리포트', amount:'29,900원', status:'refund', date:'2025.05.14 17:12' },
  { id:'ORD-2837', user:'정승현', type:'기본 리포트', amount:'9,900원', status:'complete', date:'2025.05.14 15:08' },
  { id:'ORD-2836', user:'강미현', type:'종합 패키지', amount:'79,900원', status:'complete', date:'2025.05.14 10:25' },
];

const customerData = [
  { id:'USR-0421', name:'이민준', email:'minjun.lee@gmail.com', joined:'2025.04.01', reports:5, spend:'149,500원', status:'active' },
  { id:'USR-0420', name:'김서연', email:'seoyeon.kim@naver.com', joined:'2025.04.05', reports:3, spend:'89,700원', status:'active' },
  { id:'USR-0419', name:'박지호', email:'jiho.park@kakao.com', joined:'2025.04.08', reports:7, spend:'278,300원', status:'vip' },
  { id:'USR-0418', name:'최유리', email:'yuri.choi@gmail.com', joined:'2025.04.10', reports:2, spend:'39,800원', status:'inactive' },
  { id:'USR-0417', name:'정승현', email:'seung.jeong@naver.com', joined:'2025.04.15', reports:4, spend:'119,600원', status:'active' },
  { id:'USR-0416', name:'강미현', email:'mihyun.kang@gmail.com', joined:'2025.04.20', reports:9, spend:'419,100원', status:'vip' },
];

const queueJobs = [
  { label:'이민준 님 PDF 생성 (ORD-2841)', status:'active' },
  { label:'김서연 님 PDF 대기 (ORD-2840)', status:'waiting' },
  { label:'박지호 님 엑셀 내보내기', status:'done' },
  { label:'환불 처리 배치 (ORD-2838)', status:'done' },
];

// --- Components ---
function Toast({ msg, onClose }) {
  useEffect(() => { const t = setTimeout(onClose, 2600); return () => clearTimeout(t); }, []);
  return (
    <div className="toast">
      <i className="ti ti-circle-check" style={{fontSize:16,color:'#34d399'}}></i>
      {msg}
    </div>
  );
}

function OrderModal({ item, onClose, onToast }) {
  const [confirming, setConfirming] = useState(false);
  return (
    <div className="overlay" onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div className="modal">
        <div className="modal-head">
          <h3>주문 상세 — {item.id}</h3>
          <button className="close-btn" onClick={onClose}><i className="ti ti-x"></i></button>
        </div>
        {[['주문 번호',item.id],['고객명',item.user],['리포트 유형',item.type],['결제 금액',item.amount],['주문 일시',item.date]].map(([k,v])=>(
          <div key={k} className="modal-row"><span className="mk">{k}</span><span className="mv">{v}</span></div>
        ))}
        <div className="modal-row">
          <span className="mk">상태</span>
          <span className={`badge ${item.status==='complete'?'b-green':item.status==='pending'?'b-yellow':'b-red'}`}>
            {item.status==='complete'?'결제 완료':item.status==='pending'?'처리 중':'환불 완료'}
          </span>
        </div>
        {!confirming
          ? <div className="modal-actions">
              <button className="m-btn primary" onClick={()=>{ onToast('PDF 리포트를 재발송합니다'); onClose(); }}>PDF 재발송</button>
              {item.status==='complete' && <button className="m-btn secondary" onClick={()=>setConfirming(true)}>환불 처리</button>}
              <button className="m-btn secondary" onClick={onClose}>닫기</button>
            </div>
          : <div style={{marginTop:20,padding:16,background:'rgba(248,113,113,.06)',border:'1px solid rgba(248,113,113,.2)',borderRadius:8}}>
              <div style={{fontSize:13,color:'#f87171',marginBottom:12}}>정말로 환불 처리하시겠습니까? 이 작업은 되돌릴 수 없습니다.</div>
              <div style={{display:'flex',gap:8}}>
                <button className="m-btn primary" style={{background:'#ef4444'}} onClick={()=>{onToast('환불 처리가 완료되었습니다');onClose();}}>환불 확인</button>
                <button className="m-btn secondary" onClick={()=>setConfirming(false)}>취소</button>
              </div>
            </div>
        }
      </div>
    </div>
  );
}

function CustomerModal({ item, onClose, onToast }) {
  return (
    <div className="overlay" onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div className="modal">
        <div className="modal-head">
          <h3>고객 상세 — {item.name}</h3>
          <button className="close-btn" onClick={onClose}><i className="ti ti-x"></i></button>
        </div>
        {[['고객 ID',item.id],['이름',item.name],['이메일',item.email],['가입일',item.joined],['분석 횟수',`${item.reports}회`],['누적 결제',item.spend]].map(([k,v])=>(
          <div key={k} className="modal-row"><span className="mk">{k}</span><span className="mv">{v}</span></div>
        ))}
        <div className="modal-row">
          <span className="mk">등급</span>
          <span className={`badge ${item.status==='vip'?'b-yellow':item.status==='active'?'b-green':'b-red'}`}>
            {item.status==='vip'?'VIP':item.status==='active'?'활성':'비활성'}
          </span>
        </div>
        <div className="modal-actions">
          <button className="m-btn primary" onClick={()=>{ onToast('분석 이력을 엑셀로 내보냅니다'); onClose(); }}>엑셀 내보내기</button>
          <button className="m-btn secondary" onClick={()=>{ onToast('고객에게 분석 재알림을 발송합니다'); onClose(); }}>재알림 발송</button>
          <button className="m-btn secondary" onClick={onClose}>닫기</button>
        </div>
      </div>
    </div>
  );
}

// --- Pages ---
function DashboardPage({ onToast }) {
  return (
    <div className="page">
      <div className="page-header">
        <div>
          <div className="page-title">대시보드</div>
          <div className="page-sub">2025년 5월 15일 기준 운영 현황</div>
        </div>
        <div style={{display:'flex',gap:8}}>

// --- App ---
function App() {
  const [activeSec, setActiveSec] = useState('dashboard');
  const [toast, setToast] = useState(null);
  const showToast = (msg) => setToast(msg);

  const sections = [
    { id:'dashboard', label:'대시보드', icon:'ti-layout-dashboard' },
    { id:'orders', label:'결제·주문 관리', icon:'ti-credit-card' },
    { id:'customers', label:'고객 관리', icon:'ti-users' },
    { id:'mobile', label:'모바일 앱 미리보기', icon:'ti-device-mobile' },
  ];
  const active = sections.find(s=>s.id===activeSec);

  return (
    <div className="app-shell">
      <nav className="global-nav">
        <div className="nav-brand">
          <div className="dot"></div>
          운세 플랫폼 관리
        </div>
        <div className="nav-breadcrumb">
          <span>운세 플랫폼</span>
          <span className="sep">/</span>
          <span className="current">{active?.label}</span>
        </div>
        <div className="nav-spacer"></div>
        <div className="nav-chip"><i className="ti ti-activity" style={{fontSize:14}}></i> 서비스 정상</div>
        <div className="nav-avatar" onClick={()=>showToast('관리자 프로필 설정')}>관</div>
      </nav>

      <div className="section-tabs">
        {sections.map(s=>(
          <button key={s.id} className={`sec-tab${activeSec===s.id?' active':''}`} onClick={()=>setActiveSec(s.id)}>
            <i className={`ti ${s.icon} sec-tab-icon`}></i>
            {s.label}
          </button>
        ))}
      </div>

      <div className="content">
        {activeSec==='dashboard' && <DashboardPage onToast={showToast}/>}
        {activeSec==='orders' && <OrdersPage onToast={showToast}/>}
        {activeSec==='customers' && <CustomersPage onToast={showToast}/>}
        {activeSec==='mobile' && <MobilePage onToast={showToast}/>}
      </div>

      <footer className="footer">
        <span>운세 플랫폼 통합 관리 시스템 v2.0.0</span>
        <div className="footer-links">
          <span onClick={()=>showToast('API 문서로 이동합니다')}>API 문서</span>
          <span onClick={()=>showToast('Bull Queue 모니터로 이동합니다')}>큐 모니터</span>
          <span onClick={()=>showToast('시스템 로그를 확인합니다')}>시스템 로그</span>
        </div>
      </footer>

      {toast && <Toast msg={toast} onClose={()=>setToast(null)}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
