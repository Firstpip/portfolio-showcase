<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body,#root{width:100%;min-height:100vh;font-family:'Pretendard',-apple-system,BlinkMacSystemFont,sans-serif}
body{background:#F8F9FB;color:#1A1F2E}
@keyframes fadeInUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideInRight{from{opacity:0;transform:translateX(100%)}to{opacity:1;transform:translateX(0)}}
@keyframes toastIn{from{opacity:0;transform:translateY(-12px) scale(.96)}to{opacity:1;transform:translateY(0) scale(1)}}
@keyframes pulseDot{0%,100%{opacity:1}50%{opacity:.4}}
@keyframes cardAppear{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

.nav-top{position:fixed;top:0;left:0;right:0;height:60px;background:#fff;border-bottom:1px solid #EAECF0;display:flex;align-items:center;padding:0 24px;z-index:100;gap:0}
.nav-logo{font-size:17px;font-weight:800;color:#E84A6A;letter-spacing:-0.5px;margin-right:40px;white-space:nowrap}
.nav-logo span{color:#1A1F2E}
.nav-tabs{display:flex;gap:4px;flex:1;overflow:hidden}
.nav-tab{padding:6px 14px;border-radius:8px;border:none;background:transparent;cursor:pointer;font-size:14px;font-weight:500;color:#6B7280;transition:all .15s;white-space:nowrap;font-family:inherit}
.nav-tab:hover{background:#FDF2F4;color:#E84A6A}
.nav-tab.active{background:#E84A6A;color:#fff;font-weight:600}
.nav-right{display:flex;align-items:center;gap:12px;margin-left:auto;flex-shrink:0}
.nav-avatar{width:34px;height:34px;border-radius:50%;background:linear-gradient(135deg,#E84A6A,#FF7A9A);display:flex;align-items:center;justify-content:center;color:#fff;font-size:13px;font-weight:700;cursor:pointer}
.nav-badge{background:#E84A6A;color:#fff;border-radius:10px;font-size:11px;padding:2px 7px;font-weight:600}

.page-wrap{margin-top:60px;min-height:calc(100vh - 60px)}
.content-area{animation:fadeInUp .22s ease}

.hero{background:linear-gradient(125deg,#E84A6A 0%,#FF7A9A 50%,#FFA5B4 100%);padding:40px 32px;color:#fff;position:relative;overflow:hidden}
.hero::before{content:'';position:absolute;top:-60px;right:-60px;width:260px;height:260px;border-radius:50%;background:rgba(255,255,255,.1)}
.hero::after{content:'';position:absolute;bottom:-80px;left:30%;width:200px;height:200px;border-radius:50%;background:rgba(255,255,255,.07)}
.hero-title{font-size:26px;font-weight:800;margin-bottom:8px;position:relative}
.hero-sub{font-size:15px;opacity:.88;margin-bottom:28px;position:relative}
.hero-kpis{display:flex;gap:20px;position:relative;flex-wrap:wrap}
.hero-kpi{background:rgba(255,255,255,.2);border-radius:12px;padding:14px 20px;backdrop-filter:blur(6px);min-width:130px}
.hero-kpi-val{font-size:26px;font-weight:800;line-height:1}
.hero-kpi-label{font-size:12px;opacity:.85;margin-top:4px}

.section{padding:24px 28px}
.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px}
.section-title{font-size:16px;font-weight:700;color:#1A1F2E}

.btn-primary{background:#E84A6A;color:#fff}

.filter-bar{display:flex;gap:10px;margin-bottom:20px;flex-wrap:wrap;align-items:center}
.filter-select{padding:7px 12px;border:1.5px solid #E5E7EB;border-radius:9px;font-size:13px;font-family:inherit;color:#374151;background:#fff;cursor:pointer;outline:none}

.search-input{flex:1;max-width:260px;padding:7px 13px;border:1.5px solid #E5E7EB;border-radius:9px;font-size:13px;font-family:inherit;outline:none}

.campaigns-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px}

.campaign-card:nth-child(2){animation-delay:.06s}
.campaign-card:nth-child(3){animation-delay:.09s}
.campaign-card:nth-child(4){animation-delay:.12s}
.campaign-card:nth-child(5){animation-delay:.15s}

.card-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px}
.card-title{font-size:14.5px;font-weight:700;color:#1A1F2E;line-height:1.4}
.badge{display:inline-flex;align-items:center;padding:3px 9px;border-radius:20px;font-size:11.5px;font-weight:600;white-space:nowrap}

.card-desc{font-size:13px;color:#6B7280;line-height:1.6;margin-bottom:14px}

.influencers-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:16px}
.influencer-card{background:#fff;border-radius:14px;padding:20px;cursor:pointer;border:1.5px solid #F3F4F6;transition:all .2s;animation:cardAppear .3s ease both;text-align:center}

.influencer-avatar{width:62px;height:62px;border-radius:50%;margin:0 auto 12px;display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:800;color:#fff}

.influencer-category{font-size:12.5px;color:#6B7280;margin-bottom:10px}
.influencer-stats{display:flex;justify-content:center;gap:16px;border-top:1px solid #F3F4F6;padding-top:10px}

.influencer-stat-val{font-size:14px;font-weight:700;color:#E84A6A}
.influencer-stat-label{font-size:11px;color:#9CA3AF}
.verified-badge{display:inline-flex;align-items:center;gap:3px;background:#DBEAFE;color:#1D4ED8;border-radius:10px;padding:2px 7px;font-size:11px;font-weight:600;margin-bottom:8px}

.recommend-wrap{padding:28px}

.recommend-select-row{display:flex;gap:12px;align-items:flex-end;flex-wrap:wrap}
.form-group{display:flex;flex-direction:column;gap:6px}
.form-label{font-size:13px;font-weight:600;color:#374151}
.form-select{padding:9px 13px;border:1.5px solid #E5E7EB;border-radius:9px;font-size:13px;font-family:inherit;outline:none;background:#fff}

.recommend-results{animation:fadeInUp .25s ease}
.recommend-title{font-size:14px;font-weight:700;color:#1A1F2E;margin-bottom:14px}
.recommend-card{background:#fff;border-radius:14px;padding:18px;border:1.5px solid #F3F4F6;cursor:pointer;transition:all .2s;display:flex;gap:14px;align-items:flex-start;margin-bottom:10px}

.recommend-avatar{width:48px;height:48px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:17px;font-weight:800;color:#fff;flex-shrink:0}
.recommend-info{flex:1}
.recommend-name-row{display:flex;align-items:center;gap:8px;margin-bottom:4px}
.recommend-name{font-size:14.5px;font-weight:700}
.match-score{font-size:12px;font-weight:700;color:#E84A6A;background:#FDF2F4;border-radius:8px;padding:2px 8px}
.recommend-reasons{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
.reason-tag{background:#F8F9FB;border:1px solid #E5E7EB;border-radius:6px;padding:3px 9px;font-size:11.5px;color:#6B7280}

.loading-wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 20px;gap:14px}
.spinner{width:36px;height:36px;border:3px solid #F3F4F6;border-top-color:#E84A6A;border-radius:50%;animation:spin .7s linear infinite}
.loading-text{font-size:14px;color:#6B7280}

.chat-wrap{display:flex;height:calc(100vh - 130px);min-height:480px}
.chat-sidebar{width:260px;border-right:1px solid #EAECF0;flex-shrink:0;overflow-y:auto}
.chat-sidebar-header{padding:16px 16px 10px;font-size:13.5px;font-weight:700;border-bottom:1px solid #EAECF0}
.chat-room{padding:12px 16px;cursor:pointer;transition:background .15s;border-bottom:1px solid #F3F4F6}
.chat-room:hover{background:#FDF2F4}
.chat-room.active{background:#FDF2F4}
.chat-room-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:3px}
.chat-room-name{font-size:13.5px;font-weight:600}
.chat-room-time{font-size:11px;color:#9CA3AF}
.chat-room-msg{font-size:12.5px;color:#6B7280;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:180px}
.chat-unread{background:#E84A6A;color:#fff;border-radius:10px;font-size:11px;padding:1px 7px;font-weight:700}

.chat-main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.chat-header{padding:14px 20px;border-bottom:1px solid #EAECF0;display:flex;align-items:center;gap:10px;flex-shrink:0}
.chat-peer-name{font-size:14.5px;font-weight:700}
.chat-peer-status{font-size:12px;color:#10B981;display:flex;align-items:center;gap:4px}
.status-dot{width:7px;height:7px;border-radius:50%;background:#10B981;animation:pulseDot 2s ease infinite}
.chat-messages{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:12px}
.msg-row{display:flex;gap:8px;align-items:flex-end}
.msg-row.mine{flex-direction:row-reverse}
.msg-bubble{max-width:65%;padding:10px 14px;border-radius:14px;font-size:13.5px;line-height:1.6}
.msg-bubble.peer{background:#F3F4F6;color:#1A1F2E;border-bottom-left-radius:4px}
.msg-bubble.mine{background:#E84A6A;color:#fff;border-bottom-right-radius:4px}
.msg-time{font-size:11px;color:#9CA3AF;align-self:flex-end;white-space:nowrap}
.chat-input-area{padding:12px 16px;border-top:1px solid #EAECF0;display:flex;gap:10px;flex-shrink:0}
.chat-input{flex:1;padding:9px 14px;border:1.5px solid #E5E7EB;border-radius:10px;font-size:13.5px;font-family:inherit;outline:none;resize:none}
.chat-input:focus{border-color:#E84A6A}
.chat-send-btn{padding:9px 18px;background:#E84A6A;color:#fff;border:none;border-radius:10px;cursor:pointer;font-size:13.5px;font-weight:600;font-family:inherit;transition:background .15s}
.chat-send-btn:hover{background:#C93558}

.register-wrap{max-width:700px;margin:0 auto;padding:24px}
.register-card{background:#fff;border-radius:16px;padding:28px;border:1.5px solid #F3F4F6}
.register-title{font-size:16px;font-weight:700;margin-bottom:22px}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.form-full{grid-column:1/-1}
.form-input{width:100%;padding:9px 13px;border:1.5px solid #E5E7EB;border-radius:10px;font-size:13.5px;font-family:inherit;outline:none}
.form-input:focus{border-color:#E84A6A}
.form-textarea{width:100%;padding:10px 13px;border:1.5px solid #E5E7EB;border-radius:10px;font-size:13.5px;font-family:inherit;outline:none;resize:vertical;min-height:100px;line-height:1.6}
.form-textarea:focus{border-color:#E84A6A}
.form-actions{margin-top:20px;display:flex;gap:10px;justify-content:flex-end}

.drawer-overlay{position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:200;display:flex;justify-content:flex-end;align-items:stretch;animation:fadeInUp .18s ease}
.drawer{width:min(480px,95vw);background:#fff;height:100%;overflow-y:auto;box-shadow:-4px 0 30px rgba(0,0,0,.12);animation:slideInRight .22s ease;display:flex;flex-direction:column}
.drawer-header{padding:20px 22px;border-bottom:1px solid #EAECF0;display:flex;justify-content:space-between;align-items:center;flex-shrink:0}
.drawer-title{font-size:16px;font-weight:700}
.drawer-close{width:30px;height:30px;border-radius:8px;border:none;background:#F3F4F6;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#6B7280}

.drawer-body{padding:22px;flex:1}
.drawer-section{margin-bottom:22px}
.drawer-section-title{font-size:12.5px;font-weight:700;color:#9CA3AF;text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px}
.drawer-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid #F9FAFB;font-size:13.5px}
.drawer-row-label{color:#6B7280}
.drawer-row-val{font-weight:600}
.drawer-desc{font-size:13.5px;line-height:1.7;color:#374151}
.drawer-footer{padding:16px 22px;border-top:1px solid #EAECF0;display:flex;gap:10px;flex-shrink:0}
.applicants-list{display:flex;flex-direction:column;gap:8px}
.applicant-item{display:flex;align-items:center;gap:10px;padding:10px 12px;background:#F8F9FB;border-radius:10px;font-size:13px}
.applicant-avatar{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-size:11px;font-weight:700;flex-shrink:0}
.applicant-name{font-weight:600;flex:1}
.applicant-status{font-size:12px;font-weight:600}

.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:300;display:flex;align-items:center;justify-content:center;animation:fadeInUp .18s ease;padding:20px}
.modal{background:#fff;border-radius:16px;width:min(480px,100%);max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.2)}
.modal-header{padding:20px 22px;border-bottom:1px solid #EAECF0;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;background:#fff;z-index:1}
.modal-title{font-size:15.5px;font-weight:700}
.modal-body{padding:22px}
.modal-footer{padding:16px 22px;border-top:1px solid #EAECF0;display:flex;gap:10px;justify-content:flex-end}
.modal-field{margin-bottom:14px}
.modal-label{font-size:13px;font-weight:600;margin-bottom:5px}
.modal-input{width:100%;padding:9px 12px;border:1.5px solid #E5E7EB;border-radius:9px;font-size:13.5px;font-family:inherit;outline:none}
.modal-input:focus{border-color:#E84A6A}

.toast-container{position:fixed;top:76px;right:20px;z-index:500;display:flex;flex-direction:column;gap:8px}
.toast{background:#1A1F2E;color:#fff;border-radius:12px;padding:13px 18px;font-size:13.5px;font-weight:500;box-shadow:0 8px 20px rgba(0,0,0,.2);animation:toastIn .25s ease;min-width:220px;display:flex;align-items:center;gap:8px}

.empty-state{display:flex;flex-direction:column;align-items:center;padding:60px 20px;gap:12px;color:#9CA3AF}

.profile-big-avatar{width:72px;height:72px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:26px;font-weight:800;color:#fff;flex-shrink:0}
.profile-info{flex:1}
.profile-name{font-size:18px;font-weight:800;margin-bottom:4px}
.profile-cat{font-size:13px;color:#6B7280;margin-bottom:6px}
.profile-sns-links{display:flex;gap:6px;flex-wrap:wrap}
.sns-link{display:inline-flex;align-items:center;gap:4px;background:#F3F4F6;border-radius:8px;padding:4px 10px;font-size:12px;color:#374151;font-weight:500}

.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:18px}
.stat-card{background:#F8F9FB;border-radius:10px;padding:14px;text-align:center}
.stat-val{font-size:20px;font-weight:800;color:#E84A6A}
.stat-label{font-size:12px;color:#9CA3AF;margin-top:2px}
</style>
</head>

const statusBadgeClass = (s) => ({
  '진행중':'badge-active','모집중':'badge-recruiting','검토중':'badge-review','종료':'badge-ended'
}[s] || 'badge-ended');

function getBadgeLabel(s){return s;}

function useToast(){
  const [toasts,setToasts]=useState([]);
  const show=(msg,type='success')=>{
    const id=Date.now();
    setToasts(t=>[...t,{id,msg,type}]);
    setTimeout(()=>setToasts(t=>t.filter(x=>x.id!==id)),3000);
  };
  return {toasts,show};
}

function Toast({toasts}){
  return(
    <div className="toast-container">
      {toasts.map(t=>(
        <div key={t.id} className={`toast toast-${t.type}`}>
          <i data-lucide="check-circle" style={{width:18,height:18,flexShrink:0}}></i>
          {t.msg}
        </div>
      ))}
    </div>
  );
}

      {loading&&(
        <div className="loading-wrap">
          <div className="spinner"></div>
          <div className="loading-text">캠페인 조건에 맞는 인플루언서를 분석하고 있습니다...</div>
        </div>
      )}
      {results&&(
        <div className="recommend-results">
          <div className="recommend-title">추천 인플루언서 {results.length}명</div>
          {results.map((r,i)=>(
            <div key={i} className="recommend-card" onClick={()=>setSelected(r.inf)}>
              <div className="recommend-avatar" style={{background:avatarColor(r.inf.avatar)}}>{r.inf.name[0]}</div>
              <div className="recommend-info">
                <div className="recommend-name-row">
                  <span className="recommend-name">{r.inf.name}</span>
                  <span className="match-score">매칭 {r.score}%</span>
                  {r.inf.verified&&<span className="verified-badge" style={{fontSize:11}}><i data-lucide="check-circle" style={{width:11,height:11}}></i>인증</span>}
                </div>
                <div style={{fontSize:12.5,color:'#6B7280',marginBottom:6}}>{r.inf.category} · {r.inf.platform} · 팔로워 {r.inf.followers}</div>
                <div className="recommend-reasons">
                  {r.reasons.map((rs,j)=><span key={j} className="reason-tag">{rs}</span>)}
                </div>
              </div>
            </div>
          ))}
        </div>
      )}
      {!loading&&!results&&!campaignId&&(
        <div className="empty-state">
          <i data-lucide="users" style={{width:48,height:48,opacity:.3}}></i>
          <div className="empty-text">캠페인을 선택하고 추천 실행 버튼을 눌러주세요.</div>
        </div>
      )}
      {selected&&<InfluencerDrawer inf={selected} onClose={()=>setSelected(null)} toast={toast}/>}
    </div>
  );
}

function ChatTab(){
  const [activeRoom,setActiveRoom]=useState(chatRooms[0]);
  const [input,setInput]=useState('');
  const [messages,setMessages]=useState(chatRooms[0].messages);
  const msgEndRef=useRef(null);

  useEffect(()=>{
    setMessages(activeRoom.messages);
  },[activeRoom]);

  useEffect(()=>{
    msgEndRef.current?.scrollIntoView({behavior:'smooth'});
  },[messages]);

  function send(){
    if(!input.trim())return;
    const newMsg={id:Date.now(),mine:true,text:input,time:'방금'};
    setMessages(m=>[...m,newMsg]);
    setInput('');
    setTimeout(()=>{
      const reply={id:Date.now()+1,mine:false,text:'확인했습니다. 빠르게 검토 후 연락드릴게요.',time:'방금'};
      setMessages(m=>[...m,reply]);
    },1000);
  }

  function handleKey(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send();}}

  return(
    <div className="chat-wrap">
      <div className="chat-sidebar">
        <div className="chat-sidebar-header">채팅</div>
        {chatRooms.map(r=>(
          <div key={r.id} className={`chat-room ${activeRoom.id===r.id?'active':''}`} onClick={()=>setActiveRoom(r)}>
            <div className="chat-room-top">
              <span className="chat-room-name">{r.peer}</span>
              <div style={{display:'flex',gap:6,alignItems:'center'}}>
                {r.unread>0&&<span className="chat-unread">{r.unread}</span>}
                <span className="chat-room-time">{r.time}</span>
              </div>
            </div>
            <div className="chat-room-msg">{r.lastMsg}</div>
          </div>
        ))}
      </div>
      <div className="chat-main">
        <div className="chat-header">
          <div className="influencer-avatar" style={{background:avatarColor(0),width:36,height:36,fontSize:14}}>{activeRoom.peer[0]}</div>
          <div>
            <div className="chat-peer-name">{activeRoom.peer}</div>
            <div className="chat-peer-status"><span className="status-dot"></span>온라인</div>
          </div>
          <div style={{marginLeft:'auto',display:'flex',gap:8}}>
            <button className="btn btn-ghost btn-sm"><i data-lucide="user" style={{width:13,height:13}}></i>프로필</button>
          </div>
        </div>
        <div className="chat-messages">
          {messages.map(m=>(
            <div key={m.id} className={`msg-row ${m.mine?'mine':''}`}>
              {!m.mine&&<div className="influencer-avatar" style={{background:avatarColor(0),width:32,height:32,fontSize:12,flexShrink:0}}>{activeRoom.peer[0]}</div>}
              <div>
                <div className={`msg-bubble ${m.mine?'mine':'peer'}`}>{m.text}</div>
                <div className="msg-time" style={{textAlign:m.mine?'right':'left'}}>{m.time}</div>
              </div>
            </div>
          ))}
          <div ref={msgEndRef}></div>
        </div>
        <div className="chat-input-area">
          <textarea className="chat-input" rows={1} value={input} onChange={e=>setInput(e.target.value)} onKeyDown={handleKey} placeholder="메시지 입력... (Enter 전송)"></textarea>
          <button className="chat-send-btn" onClick={send}><i data-lucide="send" style={{width:15,height:15}}></i></button>
        </div>
      </div>
    </div>
  );
}

function RegisterTab({toast}){
  const [form,setForm]=useState({title:'',category:'뷰티',platform:'Instagram',budget:'',recruits:'',startDate:'',endDate:'',desc:'',reqFollowers:'1만 이상'});
  const [submitting,setSubmitting]=useState(false);

  function submit(e){
    e.preventDefault();
    if(!form.title.trim()||!form.budget.trim()||!form.desc.trim())return;
    setSubmitting(true);
    setTimeout(()=>{
      setSubmitting(false);
      toast('캠페인이 성공적으로 등록되었습니다!');
      setForm({title:'',category:'뷰티',platform:'Instagram',budget:'',recruits:'',startDate:'',endDate:'',desc:'',reqFollowers:'1만 이상'});
    },1400);
  }
  function upd(k,v){setForm(f=>({...f,[k]:v}));}

  return(
    <div style={{padding:'24px 28px'}}>
      <div className="register-card">
        <div className="register-title">새 캠페인 등록</div>
        <form className="form-grid" onSubmit={submit}>
          <div className="form-full">
            <div className="form-group">
              <label className="form-label">캠페인 제목 *</label>
              <input className="form-input" value={form.title} onChange={e=>upd('title',e.target.value)} placeholder="예: 봄 뷰티 체험단 모집"/>
            </div>
          </div>
          <div>
            <div className="form-group">
              <label className="form-label">카테고리</label>
              <select className="form-input" value={form.category} onChange={e=>upd('category',e.target.value)}>
                {['뷰티','음식/맛집','패션','건강','라이프','테크'].map(c=><option key={c}>{c}</option>)}
              </select>
            </div>
          </div>
          <div>
            <div className="form-group">
              <label className="form-label">SNS 채널</label>
              <select className="form-input" value={form.platform} onChange={e=>upd('platform',e.target.value)}>
                {['Instagram','YouTube','Blog','TikTok'].map(p=><option key={p}>{p}</option>)}
              </select>
            </div>
          </div>
          <div>
            <div className="form-group">
              <label className="form-label">활동비 *</label>
              <input className="form-input" value={form.budget} onChange={e=>upd('budget',e.target.value)} placeholder="예: 300,000원"/>
            </div>
          </div>
          <div>
            <div className="form-group">
              <label className="form-label">모집 인원</label>
              <input className="form-input" type="number" min="1" value={form.recruits} onChange={e=>upd('recruits',e.target.value)} placeholder="예: 5"/>
            </div>
          </div>
          <div>
            <div className="form-group">
              <label className="form-label">모집 시작일</label>
              <input className="form-input" type="date" value={form.startDate} onChange={e=>upd('startDate',e.target.value)}/>
            </div>
          </div>
          <div>
            <div className="form-group">
              <label className="form-label">모집 마감일</label>
              <input className="form-input" type="date" value={form.endDate} onChange={e=>upd('endDate',e.target.value)}/>
            </div>
          </div>
          <div>
            <div className="form-group">
              <label className="form-label">최소 팔로워</label>
              <select className="form-input" value={form.reqFollowers} onChange={e=>upd('reqFollowers',e.target.value)}>
                {['제한없음','1만 이상','3만 이상','5만 이상','10만 이상'].map(f=><option key={f}>{f}</option>)}
              </select>
            </div>
          </div>
          <div className="form-full">
            <div className="form-group">
              <label className="form-label">캠페인 소개 *</label>
              <textarea className="form-textarea" value={form.desc} onChange={e=>upd('desc',e.target.value)} placeholder="캠페인 목적, 협찬 내용, 가이드라인 등 상세 정보를 입력해 주세요."></textarea>
            </div>
          </div>
          <div className="form-full form-actions">
            <button type="button" className="btn btn-ghost" onClick={()=>setForm({title:'',category:'뷰티',platform:'Instagram',budget:'',recruits:'',startDate:'',endDate:'',desc:'',reqFollowers:'1만 이상'})}>초기화</button>
            <button type="submit" className="btn btn-primary" disabled={submitting} style={{minWidth:120}}>
              {submitting?<><div style={{width:14,height:14,border:'2px solid rgba(255,255,255,.4)',borderTopColor:'#fff',borderRadius:'50%',animation:'spin .7s linear infinite'}}></div>등록 중...</>:<><i data-lucide="plus-circle" style={{width:14,height:14}}></i>캠페인 등록</>}
            </button>
          </div>
        </form>
      </div>
    </div>
  );
}

function Hero(){
  return(
    <div className="hero">
      <div className="hero-title">광고주와 인플루언서를 연결합니다</div>
      <div className="hero-sub">SNS 데이터 기반 정밀 매칭 · 캠페인 통합 관리 · 실시간 협업</div>
      <div className="hero-kpis">
        <div className="hero-kpi"><div className="hero-kpi-val">4</div><div className="hero-kpi-label">진행중 캠페인</div></div>
        <div className="hero-kpi"><div className="hero-kpi-val">73</div><div className="hero-kpi-label">이번 달 총 지원</div></div>
        <div className="hero-kpi"><div className="hero-kpi-val">6명</div><div className="hero-kpi-label">등록 인플루언서</div></div>
        <div className="hero-kpi"><div className="hero-kpi-val">4.9</div><div className="hero-kpi-label">평균 만족도</div></div>
      </div>
    </div>
  );
}

function App(){
  const [activeTab,setActiveTab]=useState('캠페인 목록');
  const {toasts,show}=useToast();
  const tabs=['캠페인 목록','인플루언서 검색','추천 인플루언서','채팅','캠페인 등록'];

  useEffect(()=>{
    if(window.lucide) window.lucide.createIcons();
  });

  return(
    <div style={{width:'100%',minHeight:'100vh',display:'flex',flexDirection:'column'}}>
      <nav className="nav-top">
        <div className="nav-logo">Influp<span>Match</span></div>
        <div className="nav-tabs">
          {tabs.map(t=>(
            <button key={t} className={`nav-tab ${activeTab===t?'active':''}`} onClick={()=>setActiveTab(t)}>{t}</button>
          ))}
        </div>
        <div className="nav-right">
          <span className="nav-badge">베타</span>
          <div className="nav-avatar">최</div>
        </div>
      </nav>
      <div className="page-wrap" style={{flex:1,display:'flex',flexDirection:'column'}}>
        <div className="content-area" key={activeTab} style={{flex:1,display:'flex',flexDirection:'column'}}>
          {activeTab==='캠페인 목록'&&<><Hero/><CampaignListTab toast={show}/></>}
          {activeTab==='인플루언서 검색'&&<InfluencerSearchTab toast={show}/>}
          {activeTab==='추천 인플루언서'&&<RecommendTab toast={show}/>}
          {activeTab==='채팅'&&<ChatTab/>}
          {activeTab==='캠페인 등록'&&<RegisterTab toast={show}/>}
        </div>
      </div>
      <Toast toasts={toasts}/>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
