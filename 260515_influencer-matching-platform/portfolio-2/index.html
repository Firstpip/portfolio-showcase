<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body,#root{width:100%;min-height:100vh;font-family:'Pretendard',-apple-system,BlinkMacSystemFont,sans-serif}
body{background:#F8FAFC;color:#0F172A}

@keyframes fadeInUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes scaleIn{from{opacity:0;transform:scale(.97)}to{opacity:1;transform:scale(1)}}
@keyframes toastUp{from{opacity:0;transform:translateY(12px) scale(.96)}to{opacity:1;transform:translateY(0) scale(1)}}
@keyframes shimmer{0%{background-position:-400px 0}100%{background-position:400px 0}}
@keyframes barGrow{from{transform:scaleY(0)}to{transform:scaleY(1)}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes pulseTeal{0%,100%{box-shadow:0 0 0 0 rgba(13,148,136,.3)}70%{box-shadow:0 0 0 7px rgba(13,148,136,0)}}

.topnav-links{display:flex;gap:2px;flex:1;overflow:hidden}
.topnav-link{padding:5px 13px;border-radius:6px;border:none;background:transparent;cursor:pointer;font-size:13.5px;font-weight:500;color:#94A3B8;transition:all .15s;white-space:nowrap;font-family:inherit}
.topnav-link:hover{background:rgba(255,255,255,.08);color:#E2E8F0}

.topnav-avatar{width:30px;height:30px;border-radius:50%;background:#0D9488;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#fff}

.page-body{margin-top:52px;min-height:calc(100vh - 52px);padding:24px;animation:fadeInUp .2s ease}
.page-title{font-size:20px;font-weight:800;color:#0F172A;margin-bottom:4px}
.page-sub{font-size:13px;color:#64748B;margin-bottom:22px}

.kpi-row{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:14px;margin-bottom:22px}
.kpi-card{background:#fff;border-radius:8px;padding:18px;border:1px solid #E2E8F0;transition:all .18s;animation:scaleIn .25s ease both}

.kpi-val{font-size:26px;font-weight:800;color:#0D9488;line-height:1}
.kpi-label{font-size:12px;color:#64748B;margin-top:5px}
.kpi-trend{display:inline-flex;align-items:center;gap:3px;font-size:11.5px;font-weight:600;margin-top:6px}

.kpi-trend.down{color:#DC2626}

.chart-row{display:grid;grid-template-columns:2fr 1fr;gap:16px;margin-bottom:22px}
.chart-card{background:#fff;border-radius:8px;border:1px solid #E2E8F0;padding:18px}
.chart-title{font-size:13.5px;font-weight:700;color:#0F172A;margin-bottom:16px}
.chart-wrap{position:relative;height:220px}

.table-card{background:#fff;border-radius:8px;border:1px solid #E2E8F0;overflow:hidden}

.data-table{width:100%;border-collapse:collapse}

.data-table td{padding:11px 14px;font-size:13.5px;border-bottom:1px solid #F8FAFC;vertical-align:middle}
.data-table tr:last-child td{border-bottom:none}
.data-table tbody tr{cursor:pointer;transition:background .12s}
.data-table tbody tr:hover{background:#F0FDFA}

.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:20px;font-size:11.5px;font-weight:600;white-space:nowrap}
.badge-done{background:#DCFCE7;color:#166534}
.badge-processing{background:#DBEAFE;color:#1D4ED8}
.badge-pending{background:#FEF9C3;color:#854D0E}
.badge-active{background:#CCFBF1;color:#0F766E}
.badge-danger{background:#FEE2E2;color:#991B1B}
.badge-neutral{background:#F1F5F9;color:#475569}

.btn{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:7px;border:none;cursor:pointer;font-size:13px;font-weight:600;font-family:inherit;transition:all .15s}
.btn-teal{background:#0D9488;color:#fff}
.btn-teal:hover{background:#0A7B70;transform:scale(1.01)}
.btn-outline{background:#fff;color:#0D9488;border:1.5px solid #0D9488}

.btn-ghost{background:transparent;color:#64748B;border:1px solid #E2E8F0}
.btn-ghost:hover{background:#F8FAFC}
.btn-sm{padding:5px 11px;font-size:12px}
.btn-danger{background:#DC2626;color:#fff}

.search-row{display:flex;gap:10px;align-items:center;padding:12px 18px;border-bottom:1px solid #E2E8F0;background:#F8FAFC}
.search-input{flex:1;max-width:280px;padding:7px 12px;border:1px solid #E2E8F0;border-radius:7px;font-size:13px;font-family:inherit;outline:none;background:#fff}

.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:300;display:flex;align-items:center;justify-content:center;animation:fadeInUp .15s ease;padding:16px}
.modal{background:#fff;border-radius:10px;width:min(500px,100%);max-height:90vh;overflow-y:auto;box-shadow:0 20px 50px rgba(0,0,0,.18)}
.modal-header{padding:18px 20px;border-bottom:1px solid #E2E8F0;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;background:#fff;z-index:1}

.modal-close{width:28px;height:28px;border-radius:6px;border:none;background:#F1F5F9;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#64748B}

.modal-body{padding:18px 20px}
.modal-footer{padding:14px 20px;border-top:1px solid #E2E8F0;display:flex;gap:8px;justify-content:flex-end}

.sns-platform{font-size:14px;font-weight:700;margin-bottom:4px}
.sns-follower{font-size:22px;font-weight:800;color:#0D9488;margin-bottom:2px}
.sns-label{font-size:11.5px;color:#64748B}
.sns-meta{display:flex;gap:12px;margin-top:10px;padding-top:10px;border-top:1px solid #F1F5F9}

.sns-meta-val{font-size:13px;font-weight:700;color:#0F172A}

.admin-tabs{display:flex;gap:0;border-bottom:2px solid #E2E8F0;margin-bottom:16px}
.admin-tab{padding:9px 18px;border:none;background:transparent;cursor:pointer;font-size:13px;font-weight:500;color:#64748B;border-bottom:2px solid transparent;margin-bottom:-2px;font-family:inherit;transition:all .15s}

.toast-container{position:fixed;bottom:24px;right:20px;z-index:500;display:flex;flex-direction:column;gap:8px;align-items:flex-end}
.toast{background:#134E4A;color:#F0FDFA;border-radius:10px;padding:11px 16px;font-size:13px;font-weight:500;box-shadow:0 6px 20px rgba(13,148,136,.3);animation:toastUp .22s ease;display:flex;align-items:center;gap:8px}

.stat-row{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:16px}
.stat-item{text-align:center;background:#F0FDFA;border-radius:8px;padding:12px}

.funnel-bar{display:flex;align-items:center;gap:12px;margin-bottom:10px}
.funnel-label{font-size:12.5px;color:#374151;min-width:60px;text-align:right}
.funnel-track{flex:1;height:22px;background:#F1F5F9;border-radius:4px;overflow:hidden}
.funnel-fill{height:100%;background:linear-gradient(90deg,#0D9488,#10B981);border-radius:4px;display:flex;align-items:center;justify-content:flex-end;padding-right:8px;font-size:11px;font-weight:700;color:#fff;transition:width .8s ease}

.perf-wrap{background:#F0FDFA;border-radius:8px;padding:14px;margin-top:16px}
.perf-title{font-size:13px;font-weight:700;margin-bottom:10px;color:#0F172A}

.empty-state{display:flex;flex-direction:column;align-items:center;padding:48px 20px;gap:10px;color:#94A3B8}
.spinner{width:28px;height:28px;border:3px solid #E2E8F0;border-top-color:#0D9488;border-radius:50%;animation:spin .7s linear infinite}

footer{background:#0F172A;color:#64748B;text-align:center;font-size:12px;padding:16px;margin-top:auto}
footer span{color:#0D9488;font-weight:600}
</style>
</head>
<body>

function statusBadge(s){
  const map={
    '정산완료':'badge-done','처리중':'badge-processing','미정산':'badge-pending',
    '활성':'badge-active','비활성':'badge-neutral','검토중':'badge-pending','처리완료':'badge-done',
    '인플루언서':'badge-active','광고주':'badge-processing'
  };
  return map[s]||'badge-neutral';
}

function useToast(){
  const [toasts,setToasts]=useState([]);
  const show=(msg)=>{
    const id=Date.now();
    setToasts(t=>[...t,{id,msg}]);
    setTimeout(()=>setToasts(t=>t.filter(x=>x.id!==id)),3200);
  };
  return{toasts,show};
}

function Toast({toasts}){
  return(
    <div className="toast-container">
      {toasts.map(t=>(
        <div key={t.id} className="toast">
          <i className="ph ph-check-circle" style={{fontSize:17}}></i>{t.msg}
        </div>
      ))}
    </div>
  );
}

  function analyze(){
    if(!campaignSel)return;
    setLoading(true);setLoaded(false);
    setTimeout(()=>{setLoading(false);setLoaded(true);},1800);
  }

  const funnel=[
    {label:'조회',count:1240,pct:100},{label:'지원',count:18,pct:85},{label:'서류',count:12,pct:58},
    {label:'선정',count:5,pct:24},{label:'완료',count:4,pct:19},
  ];

  return(
    <div className="page-body" key="campaign-analysis">
      <div className="page-title">캠페인 분석</div>
      <div className="page-sub">개별 캠페인 성과 및 지원자 현황 심층 분석</div>
      <div style={{display:'flex',gap:10,marginBottom:22,flexWrap:'wrap'}}>
        <select className="filter-sel" style={{minWidth:220}} value={campaignSel} onChange={e=>setCampaignSel(e.target.value)}>
          <option value="">분석할 캠페인 선택...</option>
          {campaigns5.map(c=><option key={c.id} value={c.id}>{c.title}</option>)}
        </select>
        <button className="btn btn-teal" onClick={analyze} disabled={!campaignSel||loading}>
          {loading?<><div className="spinner" style={{width:14,height:14,borderWidth:2}}></div>분석 중...</>:<><i className="ph ph-chart-bar" style={{fontSize:14}}></i>분석 실행</>}
        </button>
      </div>

      {loading&&(
        <div style={{display:'flex',flexDirection:'column',alignItems:'center',padding:60,gap:14,color:'#64748B'}}>
          <div className="spinner"></div>
          <span style={{fontSize:14}}>캠페인 데이터를 분석하고 있습니다...</span>
        </div>
      )}

      {loaded&&(
        <div style={{animation:'fadeInUp .25s ease'}}>
          <div className="kpi-row" style={{gridTemplateColumns:'repeat(4,1fr)'}}>
            {[
              {val:'1,240',label:'캠페인 노출'},
              {val:'18명',label:'총 지원자'},
              {val:'5명',label:'최종 선정'},
              {val:'27.8%',label:'선정 전환율'},
            ].map((k,i)=>(
              <div key={i} className="kpi-card"><div className="kpi-val">{k.val}</div><div className="kpi-label">{k.label}</div></div>
            ))}
          </div>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:16,marginBottom:16}}>
            <div className="chart-card">
              <div className="chart-title">지원자 전환 퍼널</div>
              {funnel.map((f,i)=>(
                <div key={i} className="funnel-bar">
                  <span className="funnel-label">{f.label}</span>
                  <div className="funnel-track">
                    <div className="funnel-fill" style={{width:`${f.pct}%`}}>{f.count}명</div>
                  </div>
                </div>
              ))}
            </div>
            <div className="chart-card">
              <div className="chart-title">일별 지원 현황 (지난 7일)</div>
              <div className="chart-wrap" style={{height:190}}>
                <ResponsiveContainer width="100%" height="100%">
                  <AreaChart data={[
                    {day:'5/8',count:2},{day:'5/9',count:5},{day:'5/10',count:3},{day:'5/11',count:1},
                    {day:'5/12',count:4},{day:'5/13',count:2},{day:'5/14',count:1},
                  ]} margin={{top:5,right:5,left:-25,bottom:0}}>
                    <CartesianGrid strokeDasharray="3 3" stroke="#F1F5F9"/>
                    <XAxis dataKey="day" tick={{fontSize:11.5,fill:'#94A3B8'}} axisLine={false} tickLine={false}/>
                    <YAxis tick={{fontSize:11,fill:'#94A3B8'}} axisLine={false} tickLine={false}/>
                    <Tooltip contentStyle={{borderRadius:7,fontSize:12,border:'1px solid #E2E8F0'}}/>
                    <Area type="monotone" dataKey="count" name="지원자" stroke={TEAL} fill="#CCFBF1" strokeWidth={2} dot={{r:3,fill:TEAL}}/>
                  </AreaChart>
                </ResponsiveContainer>
              </div>
            </div>
          </div>
          <div className="table-card">
            <div className="table-header">
              <span className="table-title">지원자 목록</span>
            </div>
            <table className="data-table">
              <thead>
                <tr><th>인플루언서</th><th>카테고리</th><th>팔로워</th><th>참여율</th><th>지원일</th><th>상태</th></tr>
              </thead>
              <tbody>
                {[
                  {name:'김예진',cat:'뷰티',followers:'82,400',eng:'4.8%',date:'2026-05-10',status:'선정'},
                  {name:'이민준',cat:'음식/맛집',followers:'124,000',eng:'6.2%',date:'2026-05-09',status:'검토중'},
                  {name:'박서연',cat:'패션',followers:'56,700',eng:'5.1%',date:'2026-05-11',status:'대기'},
                ].map((a,i)=>(
                  <tr key={i} onClick={()=>{}}>
                    <td style={{fontWeight:600}}>{a.name}</td>
                    <td style={{color:'#64748B'}}>{a.cat}</td>
                    <td>{a.followers}</td>
                    <td style={{color:TEAL,fontWeight:600}}>{a.eng}</td>
                    <td style={{color:'#64748B',fontSize:12.5}}>{a.date}</td>
                    <td><span className={`badge ${statusBadge(a.status)}`}>{a.status}</span></td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        </div>
      )}

      {!loading&&!loaded&&(
        <div className="empty-state">
          <i className="ph ph-chart-line" style={{fontSize:48,opacity:.3}}></i>
          <span style={{fontSize:14}}>분석할 캠페인을 선택하고 분석 실행 버튼을 눌러주세요.</span>
        </div>
      )}
    </div>
  );
}

function App(){
  const [page,setPage]=useState('성과 분석');
  const {toasts,show}=useToast();
  const tabs=['성과 분석','정산 관리','SNS 모니터링','어드민 관리','캠페인 분석'];

  const renderPage=()=>{
    switch(page){
      case '성과 분석': return <AnalyticsPage/>;
      case '정산 관리': return <SettlementPage toast={show}/>;
      case 'SNS 모니터링': return <SNSMonitorPage/>;
      case '어드민 관리': return <AdminPage toast={show}/>;
      case '캠페인 분석': return <CampaignAnalysisPage/>;
      default: return <AnalyticsPage/>;
    }
  };

  return(
    <div style={{width:'100%',minHeight:'100vh',display:'flex',flexDirection:'column'}}>
      <nav className="topnav">
        <div className="topnav-logo">Influp<span>Ops</span></div>
        <div className="topnav-links">
          {tabs.map(t=>(
            <button key={t} className={`topnav-link ${page===t?'active':''}`} onClick={()=>setPage(t)}>{t}</button>
          ))}
        </div>
        <div className="topnav-right">
          <div className="topnav-user">
            <div className="topnav-avatar">운</div>
            <span className="topnav-username">운영자</span>
          </div>
        </div>
      </nav>
      <div style={{flex:1,display:'flex',flexDirection:'column'}} key={page}>
        {renderPage()}
      </div>
      <footer><span>InflupOps</span> 인플루언서 플랫폼 통합 운영 대시보드 — 구현 데모</footer>
      <Toast toasts={toasts}/>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
