<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>현장 수리 증빙 관리 시스템 — 맞춤 구현 데모</title>
  <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" rel="stylesheet">
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://unpkg.com/prop-types@15.8.1/prop-types.min.js"></script>
  <script src="https://unpkg.com/react-is@18.2.0/umd/react-is.production.min.js"></script>
  <script src="https://unpkg.com/recharts@2.12.7/umd/Recharts.js"></script>
  <link rel="stylesheet" href="https://unpkg.com/@tabler/icons-webfont@3.31.0/dist/tabler-icons.min.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; font-family: 'Pretendard', sans-serif; background: #F0F2F7; }
    #root { width: 100%; height: 100%; }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideInLeft {
      from { transform: translateX(-16px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideUp {
      from { transform: translateY(12px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }
    @keyframes toastIn {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes progressBar {
      from { width: 0%; }
      to { width: 100%; }
    }
    @keyframes countUp {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .sidebar { width: 240px; min-width: 240px; background: #2C3E6B; display: flex; flex-direction: column; height: 100vh; position: fixed; top: 0; left: 0; z-index: 100; }
    .main-layout { margin-left: 240px; display: flex; flex-direction: column; min-height: 100vh; }
    .topbar { background: #fff; height: 60px; display: flex; align-items: center; justify-content: space-between; padding: 0 24px; border-bottom: 1px solid #E5E8EF; position: sticky; top: 0; z-index: 50; }
    .content-area { padding: 24px; flex: 1; }

    .nav-item { display: flex; align-items: center; gap: 10px; padding: 10px 20px; cursor: pointer; color: rgba(255,255,255,0.7); font-size: 14px; font-weight: 500; transition: background 0.15s, color 0.15s; border-left: 3px solid transparent; }
    .nav-item:hover { background: rgba(255,255,255,0.08); color: #fff; }
    .nav-item.active { background: rgba(232,98,26,0.18); color: #fff; border-left-color: #E8621A; }

    .kpi-card { background: #fff; border-radius: 6px; padding: 20px; border: 1px solid #E5E8EF; box-shadow: 0 1px 4px rgba(0,0,0,0.08); animation: slideUp 0.35s ease both; transition: transform 0.18s, box-shadow 0.18s; }
    .kpi-card:hover { transform: translateY(-3px); box-shadow: 0 6px 16px rgba(44,62,107,0.16); }
    .kpi-card:nth-child(1) { animation-delay: 0.05s; }
    .kpi-card:nth-child(2) { animation-delay: 0.1s; }
    .kpi-card:nth-child(3) { animation-delay: 0.15s; }
    .kpi-card:nth-child(4) { animation-delay: 0.2s; }

    .kpi-value { font-size: 28px; font-weight: 700; color: #1A2240; animation: countUp 0.4s ease both; }
    .kpi-label { font-size: 13px; color: #5A6888; margin-top: 4px; }
    .kpi-sub { font-size: 12px; color: #8A9BBB; margin-top: 6px; display: flex; align-items: center; gap: 4px; }

    .table-row { cursor: pointer; transition: background 0.12s; }
    .table-row:hover { background: #F5F7FC; }

    .badge { display: inline-flex; align-items: center; padding: 2px 10px; border-radius: 4px; font-size: 12px; font-weight: 600; }
    .badge-success { background: #E6F7EE; color: #1A6B3C; }
    .badge-warning { background: #FFF4E5; color: #B45C00; }
    .badge-error { background: #FCEAEA; color: #B91C1C; }
    .badge-info { background: #E8EEFF; color: #2C3E6B; }
    .badge-pending { background: #F3F4F6; color: #6B7280; }

    .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.45); z-index: 200; display: flex; align-items: center; justify-content: center; animation: fadeIn 0.2s; }
    .modal-box { background: #fff; border-radius: 8px; width: 640px; max-width: 95vw; max-height: 88vh; overflow-y: auto; box-shadow: 0 8px 32px rgba(0,0,0,0.18); animation: slideUp 0.25s ease; }
    .modal-header { display: flex; align-items: center; justify-content: space-between; padding: 20px 24px; border-bottom: 1px solid #E5E8EF; }
    .modal-body { padding: 24px; }

    .btn { display: inline-flex; align-items: center; gap: 6px; padding: 8px 16px; border-radius: 6px; font-size: 14px; font-weight: 600; cursor: pointer; border: none; transition: filter 0.15s, transform 0.1s; }
    .btn:hover { filter: brightness(0.94); }
    .btn:active { transform: scale(0.97); }
    .btn-primary { background: #E8621A; color: #fff; }
    .btn-secondary { background: #F0F2F7; color: #1A2240; border: 1px solid #D1D5E0; }
    .btn-ghost { background: transparent; color: #5A6888; border: 1px solid #D1D5E0; }
    .btn-danger { background: #B91C1C; color: #fff; }
    .btn-sm { padding: 5px 12px; font-size: 13px; }

    .input-field { width: 100%; padding: 9px 12px; border: 1px solid #D1D5E0; border-radius: 6px; font-size: 14px; font-family: 'Pretendard', sans-serif; background: #fff; color: #1A2240; outline: none; transition: border-color 0.15s; }
    .input-field:focus { border-color: #2C3E6B; box-shadow: 0 0 0 2px rgba(44,62,107,0.1); }

    .select-field { padding: 9px 12px; border: 1px solid #D1D5E0; border-radius: 6px; font-size: 14px; font-family: 'Pretendard', sans-serif; background: #fff; color: #1A2240; cursor: pointer; outline: none; }
    .select-field:focus { border-color: #2C3E6B; }

    .chart-wrapper { position: relative; height: 220px; }

    .toast { position: fixed; bottom: 28px; right: 28px; background: #1A2240; color: #fff; padding: 13px 20px; border-radius: 8px; font-size: 14px; font-weight: 500; box-shadow: 0 4px 16px rgba(0,0,0,0.25); animation: toastIn 0.3s ease; z-index: 1000; display: flex; align-items: center; gap: 10px; }
    .toast.success { background: #1A6B3C; }

    .photo-pair { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .photo-placeholder { background: #E8EAEF; border-radius: 6px; display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 8px; color: #8A9BBB; font-size: 12px; }

    .skeleton { background: linear-gradient(90deg, #E8EAEF 25%, #F0F2F7 50%, #E8EAEF 75%); background-size: 200% 100%; animation: pulse 1.4s infinite; border-radius: 4px; }

    .sidebar-group-label { font-size: 11px; font-weight: 700; letter-spacing: 0.08em; color: rgba(255,255,255,0.35); padding: 16px 20px 6px; text-transform: uppercase; }

    .section-card { background: #fff; border-radius: 6px; border: 1px solid #E5E8EF; box-shadow: 0 1px 4px rgba(0,0,0,0.06); overflow: hidden; animation: slideUp 0.3s ease both; }
    .section-card-header { padding: 16px 20px; border-bottom: 1px solid #F0F2F7; display: flex; align-items: center; justify-content: space-between; }
    .section-card-body { padding: 0; }

    table { width: 100%; border-collapse: collapse; }
    th { background: #F5F7FC; color: #5A6888; font-size: 12px; font-weight: 600; padding: 10px 14px; text-align: left; border-bottom: 1px solid #E5E8EF; }
    td { padding: 11px 14px; font-size: 14px; color: #1A2240; border-bottom: 1px solid #F0F2F7; }
    tr:last-child td { border-bottom: none; }

    .sync-row:hover { background: #F5F7FC; }
    .sync-device { display: flex; align-items: center; gap: 10px; }
    .sync-dot { width: 8px; height: 8px; border-radius: 50%; }
    .dot-online { background: #16A34A; }
    .dot-offline { background: #9CA3AF; }
    .dot-warning { background: #D97706; }

    .filter-bar { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; padding: 16px 20px; border-bottom: 1px solid #F0F2F7; background: #FAFBFF; }

    .photo-thumb { width: 100%; aspect-ratio: 4/3; object-fit: cover; border-radius: 4px; background: #D1D5E0; display: flex; align-items: center; justify-content: center; flex-direction: column; color: #8A9BBB; font-size: 11px; gap: 6px; cursor: pointer; transition: opacity 0.15s; }
    .photo-thumb:hover { opacity: 0.82; }

    .gallery-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; padding: 20px; }
    .gallery-item { border: 1px solid #E5E8EF; border-radius: 6px; overflow: hidden; cursor: pointer; transition: box-shadow 0.15s; }
    .gallery-item:hover { box-shadow: 0 4px 12px rgba(44,62,107,0.15); }
    .gallery-meta { padding: 10px 12px; }
    .gallery-meta .code { font-size: 13px; font-weight: 700; color: #2C3E6B; }
    .gallery-meta .time { font-size: 11px; color: #8A9BBB; margin-top: 2px; }

    .progress-bar-wrap { background: #E8EAEF; border-radius: 4px; height: 6px; overflow: hidden; }
    .progress-bar-fill { height: 100%; background: #E8621A; border-radius: 4px; animation: progressBar 1.2s ease both; }
    .progress-bar-fill.full { background: #16A34A; }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect } = React;
const { BarChart, Bar, LineChart, Line, PieChart, Pie, Cell, XAxis, YAxis, CartesianGrid, Tooltip, ResponsiveContainer, Legend } = Recharts;

// ─── Mock Data ───────────────────────────────────────────────────────────────
const REPAIR_TYPES = ['프레임 균열 수리', '도어 실 교체', '바닥 패널 보수', '루프 보강', '게이트 힌지 교체'];
const WORKERS = ['김민수', '이재호', '박성진', '최현우', '장동원'];
const LOCATIONS = ['부산항 1게이트', '인천항 3구역', '평택항 CY', '광양항 2구역'];

const mockWorkHistory = Array.from({ length: 22 }, (_, i) => ({
  id: `WK-${2400 + i}`,
  barcode: `CAXU${(3000000 + i * 1337).toString().padStart(7, '0')}-${i % 9 + 1}`,
  repairType: REPAIR_TYPES[i % 5],
  worker: WORKERS[i % 5],
  location: LOCATIONS[i % 4],
  date: `2026-05-${String(15 - (i % 14)).padStart(2, '0')}`,
  syncStatus: i % 7 === 0 ? 'pending' : i % 11 === 0 ? 'failed' : 'synced',
  imageCount: 2,
  amount: (45000 + (i * 7300) % 80000),
}));

const mockSyncDevices = [
  { id: 'CK65-001', worker: '김민수', location: '부산항 1게이트', pending: 0, lastSync: '2026-05-15 14:32', status: 'online', failCount: 0 },
  { id: 'CK65-002', worker: '이재호', location: '인천항 3구역', pending: 3, lastSync: '2026-05-15 13:55', status: 'warning', failCount: 1 },
  { id: 'CK65-003', worker: '박성진', location: '평택항 CY', pending: 0, lastSync: '2026-05-15 14:28', status: 'online', failCount: 0 },
  { id: 'CK65-004', worker: '최현우', location: '광양항 2구역', pending: 7, lastSync: '2026-05-15 11:14', status: 'offline', failCount: 3 },
  { id: 'CK65-005', worker: '장동원', location: '부산항 1게이트', pending: 0, lastSync: '2026-05-15 14:41', status: 'online', failCount: 0 },
];

const mockGallery = Array.from({ length: 9 }, (_, i) => ({
  id: `IMG-${i + 1}`,
  barcode: `CAXU${(3000000 + i * 1337).toString().padStart(7, '0')}-${i % 9 + 1}`,
  repairType: REPAIR_TYPES[i % 5],
  worker: WORKERS[i % 5],
  date: `2026-05-${String(15 - (i % 8)).padStart(2, '0')} ${String(9 + (i % 8)).padStart(2, '0')}:${String(i * 7 % 60).padStart(2, '0')}`,
  watermarked: true,
}));

const trendData = [
  { day: '5/9', count: 18, failed: 1 },
  { day: '5/10', count: 22, failed: 0 },
  { day: '5/11', count: 15, failed: 2 },
  { day: '5/12', count: 27, failed: 0 },
  { day: '5/13', count: 19, failed: 1 },
  { day: '5/14', count: 24, failed: 0 },
  { day: '5/15', count: 31, failed: 3 },
];

const typeData = [
  { name: '프레임 균열', value: 38, fill: '#2C3E6B' },
  { name: '도어 실 교체', value: 27, fill: '#E8621A' },
  { name: '바닥 패널', value: 19, fill: '#3D8EDE' },
  { name: '루프 보강', value: 11, fill: '#16A34A' },
  { name: '힌지 교체', value: 9, fill: '#9B59B6' },
];

// ─── Tabler Icons ─────────────────────────────────────────────────────────────
function Icon({ name, size = 16, color = 'currentColor' }) {
  const nameMap = {
    'layout-dashboard': 'layout-dashboard',
    'clipboard-list': 'clipboard-list',
    'image': 'photo',
    'cloud-lightning': 'cloud-storm',
    'settings': 'settings',
    'refresh-cw': 'refresh',
    'filter': 'filter',
    'search': 'search',
    'x': 'x',
    'bell': 'bell',
    'home': 'home',
    'download': 'download',
    'check-circle': 'circle-check',
    'info': 'info-circle',
    'shield-check': 'shield-check',
    'wifi': 'wifi',
    'clock': 'clock',
    'wifi-off': 'wifi-off',
    'minus': 'minus',
    'trending-up': 'trending-up',
    'cloud-upload': 'cloud-upload',
    'grid': 'layout-grid',
    'list': 'list',
    'grid': 'grid-dots',
  };
  const iconName = nameMap[name] || name;
  return <i className={`ti ti-${iconName}`} style={{ fontSize: size, color, lineHeight: 1, display: 'inline-flex', alignItems: 'center' }} />;
}

// ─── Toast ────────────────────────────────────────────────────────────────────
function Toast({ msg, type = 'default', onClose }) {
  useEffect(() => { const t = setTimeout(onClose, 2800); return () => clearTimeout(t); }, []);
  return (
    <div className={`toast ${type === 'success' ? 'success' : ''}`}>
      {type === 'success'
        ? <Icon name="check-circle" size={16} color="#fff" />
        : <Icon name="info" size={16} color="#fff" />}
      {msg}
    </div>
  );
}

// ─── Modal ────────────────────────────────────────────────────────────────────
function Modal({ onClose, children }) {
  return (
    <div className="overlay" onClick={e => e.target === e.currentTarget && onClose()}>
      <div className="modal-box">{children}</div>
    </div>
  );
}

// ─── Dashboard Screen ─────────────────────────────────────────────────────────
function DashboardScreen({ onNavigate }) {
  const [refreshing, setRefreshing] = useState(false);

  const handleRefresh = () => {
    setRefreshing(true);
    setTimeout(() => setRefreshing(false), 1200);
  };

  return (
    <div style={{ animation: 'fadeIn 0.3s ease' }}>
      <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 20 }}>
        <div>
          <h2 style={{ fontSize: 20, fontWeight: 700, color: '#1A2240' }}>현장 작업 증빙 대시보드</h2>
          <p style={{ fontSize: 13, color: '#8A9BBB', marginTop: 2 }}>2026년 5월 15일 목요일 기준 · 30초 자동 갱신</p>
        </div>
        <button className="btn btn-secondary btn-sm" onClick={handleRefresh} style={{ display: 'flex', alignItems: 'center', gap: 6 }}>
          <Icon name="refresh-cw" size={14} color={refreshing ? '#E8621A' : '#5A6888'} />
          {refreshing ? '갱신 중...' : '새로고침'}
        </button>
      </div>

      {/* KPI Cards */}
      <div style={{ display: 'grid', gridTemplateColumns: 'repeat(4, 1fr)', gap: 14, marginBottom: 20 }}>
        {[
          { label: '총 작업 건수', value: '1,284', sub: '이번 달 누계', icon: 'clipboard-list', color: '#2C3E6B' },
          { label: '오늘 처리 건수', value: '31', sub: '전일 대비 +7', icon: 'trending-up', color: '#16A34A' },
          { label: '동기화 대기', value: '10', sub: '3개 단말 대기 중', icon: 'cloud-upload', color: '#D97706' },
          { label: '이미지 용량', value: '4.7 GB', sub: '총 2,568장 업로드', icon: 'image', color: '#E8621A' },
        ].map((item, i) => (
          <div key={i} className="kpi-card" style={{ animationDelay: `${i * 0.07}s` }}>
            <div style={{ display: 'flex', alignItems: 'flex-start', justifyContent: 'space-between' }}>
              <div>
                <div className="kpi-value">{item.value}</div>
                <div className="kpi-label">{item.label}</div>
                <div className="kpi-sub">
                  <Icon name="minus" size={10} color="#8A9BBB" />
                  {item.sub}
                </div>
              </div>
              <div style={{ width: 40, height: 40, borderRadius: 8, background: `${item.color}18`, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
                <Icon name={item.icon} size={20} color={item.color} />
              </div>
            </div>
          </div>
        ))}
      </div>

      {/* Charts Row */}
      <div style={{ display: 'grid', gridTemplateColumns: '2fr 1fr', gap: 14, marginBottom: 20 }}>
        <div className="section-card">
          <div className="section-card-header">
            <span style={{ fontSize: 15, fontWeight: 600, color: '#1A2240' }}>일별 작업 처리 추이</span>
            <span style={{ fontSize: 12, color: '#8A9BBB' }}>최근 7일</span>
          </div>
          <div style={{ padding: '16px 16px 8px' }}>
            <div className="chart-wrapper">
              <ResponsiveContainer width="100%" height="100%">
                <BarChart data={trendData} margin={{ top: 4, right: 8, left: -16, bottom: 0 }}>
                  <CartesianGrid strokeDasharray="3 3" stroke="#F0F2F7" vertical={false} />
                  <XAxis dataKey="day" tick={{ fontSize: 12, fill: '#8A9BBB' }} axisLine={false} tickLine={false} />
                  <YAxis tick={{ fontSize: 12, fill: '#8A9BBB' }} axisLine={false} tickLine={false} />
                  <Tooltip contentStyle={{ fontSize: 13, borderRadius: 6, border: '1px solid #E5E8EF' }} />
                  <Bar dataKey="count" name="처리 건수" fill="#2C3E6B" radius={[3, 3, 0, 0]} />
                  <Bar dataKey="failed" name="동기화 실패" fill="#E8621A" radius={[3, 3, 0, 0]} />
                </BarChart>
              </ResponsiveContainer>
            </div>
          </div>
        </div>

        <div className="section-card">
          <div className="section-card-header">
            <span style={{ fontSize: 15, fontWeight: 600, color: '#1A2240' }}>수리 유형 분포</span>
          </div>
          <div style={{ padding: '8px', display: 'flex', flexDirection: 'column', alignItems: 'center' }}>
            <div className="chart-wrapper" style={{ width: '100%' }}>
              <ResponsiveContainer width="100%" height="100%">
                <PieChart>
                  <Pie data={typeData} cx="50%" cy="50%" innerRadius={55} outerRadius={80} dataKey="value" paddingAngle={2}>
                    {typeData.map((entry, i) => <Cell key={i} fill={entry.fill} />)}
                  </Pie>
                  <Tooltip contentStyle={{ fontSize: 12, borderRadius: 6 }} formatter={(v, n) => [`${v}건`, n]} />
                </PieChart>
              </ResponsiveContainer>
            </div>
            <div style={{ display: 'flex', flexDirection: 'column', gap: 4, padding: '0 12px 12px', width: '100%' }}>
              {typeData.map((d, i) => (
                <div key={i} style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', fontSize: 12 }}>
                  <div style={{ display: 'flex', alignItems: 'center', gap: 6 }}>
                    <div style={{ width: 10, height: 10, borderRadius: 2, background: d.fill }} />
                    <span style={{ color: '#5A6888' }}>{d.name}</span>
                  </div>
                  <span style={{ fontWeight: 600, color: '#1A2240' }}>{d.value}건</span>
                </div>
              ))}
            </div>
          </div>
        </div>
      </div>

      {/* Recent Work Table */}
      <div className="section-card">
        <div className="section-card-header">
          <span style={{ fontSize: 15, fontWeight: 600, color: '#1A2240' }}>최근 작업 현황</span>
          <button className="btn btn-ghost btn-sm" onClick={() => onNavigate('work-history')}>
            전체 보기
          </button>
        </div>
        <div className="section-card-body">
          <table>
            <thead>
              <tr>
                <th>바코드 번호</th>
                <th>수리 유형</th>
                <th>작업자</th>
                <th>작업일</th>
                <th>동기화</th>
                <th>금액</th>
              </tr>
            </thead>
            <tbody>
              {mockWorkHistory.slice(0, 6).map((row, i) => (
                <tr key={i} className="table-row" onClick={() => onNavigate('work-history')}>
                  <td><span style={{ fontFamily: 'monospace', fontSize: 13, color: '#2C3E6B', fontWeight: 600 }}>{row.barcode}</span></td>
                  <td>{row.repairType}</td>
                  <td>{row.worker}</td>
                  <td style={{ color: '#8A9BBB', fontSize: 13 }}>{row.date}</td>
                  <td>
                    <span className={`badge ${row.syncStatus === 'synced' ? 'badge-success' : row.syncStatus === 'failed' ? 'badge-error' : 'badge-warning'}`}>

    setSelected(null);

  const dotClass = { online: 'dot-online', offline: 'dot-offline', warning: 'dot-warning' };

            <div style={{ display: 'flex', gap: 8, justifyContent: 'flex-end' }}>
              {(selected.status === 'warning' || selected.status === 'offline') && (
                <button className="btn btn-primary btn-sm" onClick={() => handleRetry(selected)}>
                  <Icon name="refresh-cw" size={14} color="#fff" />
                  동기화 재시도
                </button>
              )}
              <button className="btn btn-ghost btn-sm" onClick={() => setSelected(null)}>닫기</button>
            </div>
          </div>
        </Modal>
      )}

      {toast && <Toast msg={toast.msg} type={toast.type} onClose={() => setToast(null)} />}
    </div>
  );
}

// ─── Sidebar ──────────────────────────────────────────────────────────────────
function Sidebar({ activeScreen, onNavigate }) {
  const navItems = [
    { key: 'dashboard', label: '대시보드', icon: 'layout-dashboard' },
    { key: 'work-history', label: '작업 기록', icon: 'clipboard-list' },
    { key: 'photo-gallery', label: '증빙 갤러리', icon: 'image' },
    { key: 'sync-status', label: '동기화 현황', icon: 'cloud-lightning' },
    { key: 'settings', label: '설정', icon: 'settings' },
  ];

  return (
    <div className="sidebar">
      {/* Logo */}
      <div style={{ padding: '22px 20px 18px', borderBottom: '1px solid rgba(255,255,255,0.1)' }}>
        <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
          <div style={{ width: 34, height: 34, borderRadius: 8, background: '#E8621A', display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
            <Icon name="shield-check" size={18} color="#fff" />
          </div>
          <div>
            <div style={{ fontSize: 14, fontWeight: 700, color: '#fff' }}>FieldProof</div>
            <div style={{ fontSize: 11, color: 'rgba(255,255,255,0.45)' }}>현장 증빙 관리</div>
          </div>
        </div>
      </div>

      <div style={{ flex: 1, overflowY: 'auto', paddingTop: 8 }}>
        <div className="sidebar-group-label">메뉴</div>
        {navItems.slice(0, 4).map(item => (
          <div
            key={item.key}
            className={`nav-item ${activeScreen === item.key || (activeScreen === 'dashboard' && item.key === 'dashboard') ? 'active' : ''}`}
            onClick={() => onNavigate(item.key)}
          >
            <Icon name={item.icon} size={16} color="currentColor" />
            {item.label}
          </div>
        ))}
        <div className="sidebar-group-label">시스템</div>
        <div className="nav-item" style={{ color: 'rgba(255,255,255,0.5)' }}>
          <Icon name="settings" size={16} color="currentColor" />
          설정
        </div>
      </div>

      {/* User */}
      <div style={{ borderTop: '1px solid rgba(255,255,255,0.1)', padding: '14px 18px', display: 'flex', alignItems: 'center', gap: 10 }}>
        <div style={{ width: 32, height: 32, borderRadius: '50%', background: '#E8621A', display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 13, fontWeight: 700, color: '#fff' }}>관</div>
        <div>
          <div style={{ fontSize: 13, fontWeight: 600, color: '#fff' }}>관리자</div>
          <div style={{ fontSize: 11, color: 'rgba(255,255,255,0.45)' }}>admin@fieldproof.kr</div>
        </div>
      </div>
    </div>
  );
}

// ─── App ──────────────────────────────────────────────────────────────────────
function App() {

  const screenMap = {

  return (
    <div style={{ display: 'flex', width: '100%', minHeight: '100vh' }}>
      <Sidebar activeScreen={screen} onNavigate={setScreen} />
      <div className="main-layout">
        <div className="topbar">
          <div style={{ display: 'flex', alignItems: 'center', gap: 12, fontSize: 14, color: '#5A6888' }}>
            <Icon name="home" size={14} color="#8A9BBB" />
            <span style={{ color: '#C0C8D8' }}>/</span>
            <span style={{ color: '#1A2240', fontWeight: 500 }}>
              {{
                dashboard: '대시보드',
                'work-history': '작업 기록',
                'photo-gallery': '증빙 갤러리',

              <Icon name="bell" size={18} color="#5A6888" />
              <div style={{ position: 'absolute', top: -3, right: -3, width: 8, height: 8, background: '#E8621A', borderRadius: '50%' }} />
            </div>
            <div style={{ fontSize: 13, color: '#8A9BBB' }}>2026.05.15 목</div>
          </div>
        </div>
        <div className="content-area">

}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
