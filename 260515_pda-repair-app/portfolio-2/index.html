<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>현장 수리 QC 통합 플랫폼 — 구현 데모</title>
  <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" rel="stylesheet">
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://unpkg.com/prop-types@15.8.1/prop-types.min.js"></script>
  <script src="https://unpkg.com/react-is@18.2.0/umd/react-is.production.min.js"></script>
  <script src="https://unpkg.com/recharts@2.12.7/umd/Recharts.js"></script>
  <link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/regular/style.css">
  <link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/fill/style.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; min-height: 100%; font-family: 'Pretendard', sans-serif; background: #F4F7F5; }
    #root { width: 100%; }

    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes slideDown { from { transform: translateY(-10px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    @keyframes slideUp { from { transform: translateY(14px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    @keyframes slideInRight { from { transform: translateX(100%); } to { transform: translateX(0); } }
    @keyframes toastIn { from { transform: translateX(20px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    @keyframes shimmer { from { background-position: -200% 0; } to { background-position: 200% 0; } }
    @keyframes growBar { from { transform: scaleX(0); transform-origin: left; } to { transform: scaleX(1); } }
    @keyframes ripple { 0% { box-shadow: 0 0 0 0 rgba(26,107,90,0.3); } 70% { box-shadow: 0 0 0 8px rgba(26,107,90,0); } 100% { box-shadow: 0 0 0 0 rgba(26,107,90,0); } }

    /* Topnav */
    .topnav { background: #fff; border-bottom: 1px solid #D6E8E2; position: sticky; top: 0; z-index: 100; }
    .topnav-inner { max-width: 1280px; margin: 0 auto; padding: 0 28px; display: flex; align-items: center; justify-content: space-between; height: 62px; }
    .logo-wrap { display: flex; align-items: center; gap: 10px; }
    .logo-icon { width: 36px; height: 36px; background: #1A6B5A; border-radius: 10px; display: flex; align-items: center; justify-content: center; }
    .logo-name { font-size: 16px; font-weight: 800; color: #112D26; }
    .logo-sub { font-size: 11px; color: #7A9990; margin-top: 1px; }

    .tab-bar { display: flex; align-items: center; gap: 2px; background: #F0F5F3; border-radius: 10px; padding: 4px; }
    .tab-item { padding: 8px 18px; border-radius: 7px; font-size: 14px; font-weight: 600; cursor: pointer; color: #6A8A84; border: none; background: transparent; transition: all 0.15s; display: flex; align-items: center; gap: 6px; }
    .tab-item.active { background: #fff; color: #1A6B5A; box-shadow: 0 2px 8px rgba(26,107,90,0.12); }
    .tab-item:hover:not(.active) { color: #1A6B5A; background: rgba(255,255,255,0.6); }

    /* Hero */
    .hero-banner { background: linear-gradient(135deg, #1A6B5A 0%, #237A67 60%, #2A8A76 100%); padding: 28px 28px 0; color: #fff; }
    .hero-inner { max-width: 1280px; margin: 0 auto; }
    .hero-title { font-size: 22px; font-weight: 800; margin-bottom: 4px; }
    .hero-sub { font-size: 14px; color: rgba(255,255,255,0.75); }
    .hero-stats { display: flex; gap: 32px; margin-top: 20px; }
    .hero-stat { text-align: center; }
    .hero-stat-val { font-size: 24px; font-weight: 800; }
    .hero-stat-label { font-size: 12px; color: rgba(255,255,255,0.65); margin-top: 2px; }

    /* Content */
    .page-content { max-width: 1280px; margin: 0 auto; padding: 24px 28px; }

    /* Cards */
    .card { background: #fff; border-radius: 12px; box-shadow: 0 4px 16px rgba(0,0,0,0.08); overflow: hidden; }
    .card-header { padding: 18px 22px; border-bottom: 1px solid #EAF0EE; display: flex; align-items: center; justify-content: space-between; }
    .card-title { font-size: 15px; font-weight: 700; color: #112D26; display: flex; align-items: center; gap: 8px; }
    .card-body { padding: 22px; }

    .kpi-card-2 { background: #fff; border-radius: 12px; padding: 20px 22px; box-shadow: 0 4px 16px rgba(0,0,0,0.07); animation: slideUp 0.35s ease both; border-top: 4px solid transparent; transition: box-shadow 0.18s, transform 0.18s; }
    .kpi-card-2:hover { transform: scale(1.02); box-shadow: 0 8px 28px rgba(26,107,90,0.18); }
    .kpi-val { font-size: 26px; font-weight: 800; color: #112D26; }
    .kpi-lbl { font-size: 13px; color: #6A8A84; margin-top: 4px; }
    .kpi-trend { font-size: 12px; margin-top: 8px; display: flex; align-items: center; gap: 4px; }
    .kpi-up { color: #16A34A; }
    .kpi-down { color: #DC2626; }

    /* Drawer */
    .drawer-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.38); z-index: 300; animation: fadeIn 0.2s; }
    .drawer-panel { position: fixed; right: 0; top: 0; bottom: 0; width: 480px; max-width: 96vw; background: #fff; box-shadow: -4px 0 24px rgba(0,0,0,0.15); z-index: 301; animation: slideInRight 0.28s cubic-bezier(0.23,1,0.32,1); display: flex; flex-direction: column; }
    .drawer-header { padding: 20px 24px; border-bottom: 1px solid #EAF0EE; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
    .drawer-body { padding: 22px 24px; overflow-y: auto; flex: 1; }
    .drawer-footer { padding: 16px 24px; border-top: 1px solid #EAF0EE; display: flex; gap: 10px; justify-content: flex-end; flex-shrink: 0; }

    /* Modal */
    .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.42); z-index: 200; display: flex; align-items: center; justify-content: center; animation: fadeIn 0.2s; }
    .modal-box { background: #fff; border-radius: 16px; width: 600px; max-width: 96vw; max-height: 88vh; overflow-y: auto; box-shadow: 0 12px 40px rgba(0,0,0,0.18); animation: slideUp 0.25s ease; }
    .modal-header { padding: 22px 24px; border-bottom: 1px solid #EAF0EE; display: flex; align-items: center; justify-content: space-between; }
    .modal-body { padding: 24px; }

    /* Buttons */
    .btn { display: inline-flex; align-items: center; gap: 6px; padding: 9px 18px; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; border: none; transition: filter 0.15s, transform 0.1s, box-shadow 0.15s; font-family: 'Pretendard', sans-serif; }
    .btn:hover { filter: brightness(0.93); }
    .btn:active { transform: scale(0.97); }
    .btn-primary { background: #1A6B5A; color: #fff; animation: ripple 2s infinite; }
    .btn-accent { background: #F0C842; color: #112D26; }
    .btn-ghost { background: #F0F5F3; color: #4A6860; border: 1px solid #C8DDD8; }
    .btn-danger { background: #DC2626; color: #fff; }
    .btn-sm { padding: 6px 13px; font-size: 13px; border-radius: 7px; }

    /* Inputs */
    .input-f { width: 100%; padding: 10px 13px; border: 1.5px solid #C8DDD8; border-radius: 8px; font-size: 14px; font-family: 'Pretendard', sans-serif; color: #112D26; outline: none; transition: border-color 0.15s, box-shadow 0.15s; background: #fff; }
    .input-f:focus { border-color: #1A6B5A; box-shadow: 0 0 0 3px rgba(26,107,90,0.12); }
    .select-f { padding: 9px 12px; border: 1.5px solid #C8DDD8; border-radius: 8px; font-size: 14px; font-family: 'Pretendard', sans-serif; color: #112D26; background: #fff; cursor: pointer; outline: none; }
    .select-f:focus { border-color: #1A6B5A; }

    /* Badge */
    .badge { display: inline-flex; align-items: center; padding: 3px 10px; border-radius: 20px; font-size: 12px; font-weight: 600; }
    .badge-green { background: #DCFCE7; color: #15803D; }
    .badge-yellow { background: #FEF9C3; color: #854D0E; }
    .badge-red { background: #FEE2E2; color: #B91C1C; }
    .badge-blue { background: #DBEAFE; color: #1D4ED8; }
    .badge-teal { background: #CCFBF1; color: #0F766E; }
    .badge-gray { background: #F3F4F6; color: #6B7280; }

    table { width: 100%; border-collapse: collapse; }
    th { font-size: 12px; font-weight: 700; color: #6A8A84; padding: 11px 14px; text-align: left; border-bottom: 2px solid #EAF0EE; text-transform: uppercase; letter-spacing: 0.04em; }
    td { padding: 13px 14px; font-size: 14px; color: #112D26; border-bottom: 1px solid #F0F5F3; }
    tr:hover td { background: #F8FCF9; }

    /* Toast */
    .toast { position: fixed; bottom: 28px; right: 28px; background: #112D26; color: #fff; padding: 14px 20px; border-radius: 10px; font-size: 14px; font-weight: 500; box-shadow: 0 6px 20px rgba(0,0,0,0.22); animation: toastIn 0.3s ease; z-index: 1000; display: flex; align-items: center; gap: 10px; }
    .toast.success { background: #1A6B5A; }
    .toast.info { background: #237A67; }

    /* Chart wrap */
    .chart-wrap { position: relative; height: 240px; }
    .chart-wrap-sm { position: relative; height: 180px; }

    /* Progress */
    .prog-bar { height: 8px; background: #EAF0EE; border-radius: 10px; overflow: hidden; }
    .prog-fill { height: 100%; border-radius: 10px; animation: growBar 0.8s ease both; }

    .label-sm { font-size: 12px; color: #6A8A84; margin-bottom: 6px; font-weight: 500; }
    .form-row { margin-bottom: 16px; }

    /* Timeline */
    .timeline-item { display: flex; gap: 14px; padding: 14px 0; border-bottom: 1px solid #F0F5F3; }
    .timeline-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; margin-top: 5px; }
    .timeline-line { width: 2px; background: #EAF0EE; flex-shrink: 0; margin: 16px auto 0; }

    .qc-btn { padding: 5px 14px; border-radius: 20px; font-size: 12px; font-weight: 700; cursor: pointer; border: none; transition: all 0.15s; }
    .qc-pass { background: #DCFCE7; color: #15803D; }
    .qc-pass:hover { background: #BBF7D0; }
    .qc-fail { background: #FEE2E2; color: #B91C1C; }
    .qc-fail:hover { background: #FECACA; }

    .api-log-item { display: flex; align-items: center; gap: 10px; padding: 9px 0; border-bottom: 1px solid #F0F5F3; font-size: 13px; }
    .code-chip { background: #F0F5F3; border-radius: 5px; padding: 3px 8px; font-family: monospace; font-size: 12px; font-weight: 600; }
    .code-chip.ok { color: #15803D; background: #DCFCE7; }
    .code-chip.err { color: #B91C1C; background: #FEE2E2; }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useCallback } = React;
const { AreaChart, Area, BarChart, Bar, LineChart, Line, ComposedChart, XAxis, YAxis, CartesianGrid, Tooltip, ResponsiveContainer, Legend } = Recharts;

// ─── Mock Data ───────────────────────────────────────────────────────────────
const REPAIR_TYPES = ['프레임 균열', '도어 실 교체', '바닥 패널 보수', '루프 보강', '게이트 힌지'];
const UNIT_PRICES = [85000, 45000, 62000, 94000, 38000];
const WORKERS = ['김민수', '이재호', '박성진', '최현우', '장동원'];
const LOCATIONS = ['부산항 1게이트', '인천항 3구역', '평택항 CY', '광양항 2구역'];

const monthlyTrend = [
  { mon: '1월', amount: 8420, qcPass: 92 },
  { mon: '2월', amount: 9180, qcPass: 88 },
  { mon: '3월', amount: 11240, qcPass: 94 },
  { mon: '4월', amount: 10670, qcPass: 91 },
  { mon: '5월', amount: 6830, qcPass: 96 },
];

const costByType = REPAIR_TYPES.map((name, i) => ({
  name, amount: UNIT_PRICES[i] * (60 + i * 17), count: 60 + i * 17,
}));

const mockRepairs = Array.from({ length: 20 }, (_, i) => ({
  id: `WK-${2400 + i}`,
  barcode: `CAXU${(3000000 + i * 1337).toString().padStart(7, '0')}-${i % 9 + 1}`,
  repairType: REPAIR_TYPES[i % 5],
  unitPrice: UNIT_PRICES[i % 5],
  worker: WORKERS[i % 5],
  location: LOCATIONS[i % 4],
  date: `2026-05-${String(15 - (i % 12)).padStart(2, '0')}`,
  qcStatus: i % 8 === 0 ? 'reject' : i % 5 === 0 ? 'pending' : 'pass',
  amount: UNIT_PRICES[i % 5],
}));

const exportHistory = [
  { id: 'EXP-018', period: '2026-05-01 ~ 2026-05-14', status: 'confirmed', rows: 284, createdAt: '2026-05-15 09:22', total: 18420000 },
  { id: 'EXP-017', period: '2026-04-01 ~ 2026-04-30', status: 'confirmed', rows: 412, createdAt: '2026-05-02 11:07', total: 23670000 },
  { id: 'EXP-016', period: '2026-03-01 ~ 2026-03-31', status: 'confirmed', rows: 388, createdAt: '2026-04-03 09:48', total: 21140000 },
];

const apiLogs = [
  { time: '14:38:12', method: 'POST', path: '/api/v1/webhook/sync', status: 200, ms: 142 },
  { time: '14:35:07', method: 'POST', path: '/api/v1/webhook/sync', status: 200, ms: 118 },
  { time: '14:28:55', method: 'GET', path: '/api/v1/export/monthly', status: 200, ms: 87 },
  { time: '13:52:33', method: 'POST', path: '/api/v1/webhook/sync', status: 503, ms: 5021 },
  { time: '13:51:01', method: 'POST', path: '/api/v1/webhook/sync', status: 200, ms: 154 },
];

const unitPriceTable = REPAIR_TYPES.map((t, i) => ({ type: t, price: UNIT_PRICES[i], cnt: 60 + i * 17 }));

// ─── Toast ─────────────────────────────────────────────────────────────────
function Toast({ msg, type = 'default', onClose }) {
  useEffect(() => { const t = setTimeout(onClose, 3000); return () => clearTimeout(t); }, []);
  return (
    <div className={`toast ${type}`}>
      <i className="ph ph-check-circle" style={{ fontSize: 18 }} />
      {msg}
    </div>
  );
}

// ─── Drawer ────────────────────────────────────────────────────────────────
function Drawer({ title, subtitle, onClose, children, footer }) {
  return (
    <>
      <div className="drawer-overlay" onClick={onClose} />
      <div className="drawer-panel">
        <div className="drawer-header">
          <div>
            <div style={{ fontSize: 16, fontWeight: 700, color: '#112D26' }}>{title}</div>
            {subtitle && <div style={{ fontSize: 12, color: '#6A8A84', marginTop: 2 }}>{subtitle}</div>}
          </div>
          <button className="btn btn-ghost btn-sm" onClick={onClose}>
            <i className="ph ph-x" style={{ fontSize: 16 }} />
          </button>
        </div>
        <div className="drawer-body">{children}</div>
        {footer && <div className="drawer-footer">{footer}</div>}
      </div>
    </>
  );
}

// ─── Modal ─────────────────────────────────────────────────────────────────
function Modal({ onClose, children }) {
  return (
    <div className="overlay" onClick={e => e.target === e.currentTarget && onClose()}>
      <div className="modal-box">{children}</div>
    </div>
  );
}

// ─── Dashboard Screen ──────────────────────────────────────────────────────
function DashboardScreen() {
  return (
    <div style={{ animation: 'fadeIn 0.3s ease' }}>
      {/* Hero */}
      <div className="hero-banner">
        <div className="hero-inner">
          <div style={{ display: 'flex', alignItems: 'flex-start', justifyContent: 'space-between' }}>
            <div>
              <div className="hero-title">통합 분석 대시보드</div>
              <div className="hero-sub">2026년 1월 ~ 5월 15일 누계 현황</div>
            </div>
            <div style={{ display: 'flex', gap: 8 }}>
              {['주간', '월간', '분기'].map((p, i) => (
                <button key={p} className="btn btn-sm" style={{ background: i === 1 ? 'rgba(255,255,255,0.22)' : 'rgba(255,255,255,0.1)', color: '#fff', border: 'none', fontSize: 13 }}>
                  {p}
                </button>
              ))}
            </div>
          </div>
          <div className="hero-stats">
            {[
              { val: '46,340', label: '총 작업 건수' },
              { val: '96%', label: 'QC 통과율' },
              { val: '5.63억', label: '정산 합계' },
              { val: '5개', label: '연동 현장' },
            ].map((s, i) => (
              <div key={i} className="hero-stat" style={{ animationDelay: `${i * 0.08}s`, animation: 'slideDown 0.4s ease both' }}>
                <div className="hero-stat-val">{s.val}</div>
                <div className="hero-stat-label">{s.label}</div>
              </div>
            ))}
          </div>
          <div style={{ height: 20 }} />
        </div>
      </div>

      <div className="page-content">
        {/* KPI cards */}
        <div style={{ display: 'grid', gridTemplateColumns: 'repeat(4, 1fr)', gap: 16, marginBottom: 22 }}>
          {[
            { label: '이번 달 정산 합계', val: '6,830만원', trend: '+14.2% 전월 대비', up: true, color: '#1A6B5A', icon: 'currency-circle-dollar' },
            { label: 'QC 통과율', val: '96.2%', trend: '+2.1%p 전월 대비', up: true, color: '#15803D', icon: 'shield-check' },
            { label: '오늘 작업 건수', val: '31건', trend: '어제 24건 대비', up: true, color: '#237A67', icon: 'clipboard-text' },
            { label: '평균 처리 단가', val: '64,800원', trend: '전월 61,200원', up: true, color: '#F0C842', icon: 'chart-line-up' },
          ].map((k, i) => (
            <div key={i} className="kpi-card-2" style={{ animationDelay: `${i * 0.07}s`, borderTopColor: k.color }}>
              <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start' }}>
                <div>
                  <div className="kpi-val">{k.val}</div>
                  <div className="kpi-lbl">{k.label}</div>
                </div>
                <div style={{ width: 40, height: 40, borderRadius: 10, background: `${k.color}18`, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
                  <i className={`ph ph-${k.icon}`} style={{ fontSize: 22, color: k.color }} />
                </div>
              </div>
              <div className={`kpi-trend ${k.up ? 'kpi-up' : 'kpi-down'}`}>
                <i className={`ph ph-trend-${k.up ? 'up' : 'down'}`} />
                {k.trend}
              </div>
            </div>
          ))}
        </div>

        {/* Charts row */}
        <div style={{ display: 'grid', gridTemplateColumns: '3fr 2fr', gap: 18, marginBottom: 22 }}>
          <div className="card">
            <div className="card-header">
              <span className="card-title">
                <i className="ph ph-chart-line" style={{ color: '#1A6B5A' }} />
                월별 정산 금액 추이
              </span>
            </div>
            <div style={{ padding: '16px 20px 12px' }}>
              <div className="chart-wrap">
                <ResponsiveContainer width="100%" height="100%">
                  <AreaChart data={monthlyTrend} margin={{ top: 4, right: 8, left: -10, bottom: 0 }}>
                    <defs>
                      <linearGradient id="tealGrad" x1="0" y1="0" x2="0" y2="1">
                        <stop offset="0%" stopColor="#1A6B5A" stopOpacity={0.25} />
                        <stop offset="100%" stopColor="#1A6B5A" stopOpacity={0.02} />
                      </linearGradient>
                    </defs>
                    <CartesianGrid strokeDasharray="3 3" stroke="#EAF0EE" vertical={false} />
                    <XAxis dataKey="mon" tick={{ fontSize: 12, fill: '#6A8A84' }} axisLine={false} tickLine={false} />
                    <YAxis tick={{ fontSize: 12, fill: '#6A8A84' }} axisLine={false} tickLine={false} tickFormatter={v => `${v.toLocaleString()}`} />
                    <Tooltip contentStyle={{ fontSize: 13, borderRadius: 8, border: '1px solid #EAF0EE' }} formatter={v => `${v.toLocaleString()}만원`} />
                    <Area type="monotone" dataKey="amount" name="정산 금액" fill="url(#tealGrad)" stroke="#1A6B5A" strokeWidth={2.5} dot={{ r: 4, fill: '#1A6B5A', strokeWidth: 0 }} />
                  </AreaChart>
                </ResponsiveContainer>
              </div>
            </div>
          </div>

          <div className="card">
            <div className="card-header">
              <span className="card-title">
                <i className="ph ph-bar-chart" style={{ color: '#237A67' }} />
                수리 유형별 정산 금액
              </span>
            </div>
            <div style={{ padding: '16px 20px 12px' }}>
              <div className="chart-wrap">
                <ResponsiveContainer width="100%" height="100%">
                  <BarChart data={costByType} margin={{ top: 4, right: 8, left: -10, bottom: 0 }} layout="vertical">
                    <CartesianGrid strokeDasharray="3 3" stroke="#EAF0EE" horizontal={false} />
                    <XAxis type="number" tick={{ fontSize: 11, fill: '#6A8A84' }} axisLine={false} tickLine={false} tickFormatter={v => `${(v / 10000).toFixed(0)}만`} />
                    <YAxis type="category" dataKey="name" tick={{ fontSize: 11, fill: '#6A8A84' }} width={72} axisLine={false} tickLine={false} />
                    <Tooltip contentStyle={{ fontSize: 12, borderRadius: 8 }} formatter={v => `${v.toLocaleString()}원`} />
                    <Bar dataKey="amount" name="정산 금액" fill="#1A6B5A" radius={[0, 4, 4, 0]} />
                  </BarChart>
                </ResponsiveContainer>
              </div>
            </div>
          </div>
        </div>

        {/* QC rate table */}
        <div className="card">
          <div className="card-header">
            <span className="card-title">

                    </td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>
      </div>

  );

              <div style={{ marginBottom: 16 }}>
                <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 8 }}>
                  <div style={{ fontSize: 14, fontWeight: 600, color: '#112D26' }}>지수 백오프 재시도</div>
                  <div style={{ width: 40, height: 22, background: '#1A6B5A', borderRadius: 11, cursor: 'pointer', position: 'relative' }}>
                    <div style={{ position: 'absolute', right: 3, top: 3, width: 16, height: 16, background: '#fff', borderRadius: '50%' }} />
                  </div>
                </div>
                <div style={{ fontSize: 12, color: '#6A8A84' }}>전송 실패 시 최대 3회 재시도 (1s → 4s → 16s)</div>
              </div>
              <div style={{ background: '#F0F5F3', borderRadius: 8, padding: 12, fontSize: 13 }}>
                <div style={{ fontWeight: 700, color: '#112D26', marginBottom: 4 }}>허용 IP 범위</div>
                <div style={{ fontFamily: 'monospace', fontSize: 12, color: '#6A8A84' }}>203.0.113.0/24, 198.51.100.0/24</div>
              </div>
            </div>
          </div>
        </div>

        {/* Log table */}
        <div className="card">
          <div className="card-header">
            <span className="card-title"><i className="ph ph-list-bullets" style={{ color: '#1A6B5A' }} />전송 이력 (최근 50건)</span>
            <button className="btn btn-ghost btn-sm" onClick={() => setAddModal(true)}>
              <i className="ph ph-plus" />
              엔드포인트 추가
            </button>
          </div>
          <table>
            <thead>
              <tr><th>시각</th><th>메서드</th><th>경로</th><th>상태</th><th>응답시간</th></tr>
            </thead>
            <tbody>
              {apiLogs.map((log, i) => (
                <tr key={i}>
                  <td style={{ fontFamily: 'monospace', fontSize: 13, color: '#6A8A84' }}>{log.time}</td>
                  <td><span className="code-chip" style={{ background: '#DBEAFE', color: '#1D4ED8' }}>{log.method}</span></td>
                  <td style={{ fontFamily: 'monospace', fontSize: 13 }}>{log.path}</td>
                  <td><span className={`code-chip ${log.status < 300 ? 'ok' : 'err'}`}>{log.status}</span></td>
                  <td style={{ fontSize: 13, color: log.ms > 3000 ? '#DC2626' : '#6A8A84' }}>{log.ms.toLocaleString()}ms</td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      </div>

      {addModal && (
        <div className="overlay" onClick={e => e.target === e.currentTarget && setAddModal(false)}>
          <div className="modal-box">
            <div className="modal-header">
              <div style={{ fontSize: 16, fontWeight: 700, color: '#112D26' }}>엔드포인트 추가</div>
              <button className="btn btn-ghost btn-sm" onClick={() => setAddModal(false)}>
                <i className="ph ph-x" style={{ fontSize: 16 }} />
              </button>
            </div>
            <div className="modal-body">
              {[['엔드포인트 이름', 'text', '예: 정산 ERP 연동'], ['URL', 'url', 'https://...'], ['API 키', 'text', 'Bearer 토큰 또는 X-API-Key']].map(([label, type, placeholder]) => (
                <div key={label} className="form-row">
                  <div className="label-sm">{label}</div>
                  <input type={type} className="input-f" placeholder={placeholder} />
                </div>
              ))}
              <div className="form-row">
                <div className="label-sm">이벤트 트리거</div>
                <select className="select-f" style={{ width: '100%' }}>
                  <option>작업 동기화 완료 시</option>
                  <option>정산 확정 시</option>
                  <option>QC 판정 완료 시</option>
                </select>
              </div>
              <div style={{ display: 'flex', gap: 8, justifyContent: 'flex-end' }}>
                <button className="btn btn-ghost btn-sm" onClick={() => setAddModal(false)}>취소</button>
                <button className="btn btn-primary btn-sm" onClick={() => { setAddModal(false); setToast({ msg: '새 엔드포인트가 추가되었습니다.', type: 'success' }); }}>
                  추가
                </button>
              </div>
            </div>
          </div>
        </div>
      )}

      {toast && <Toast msg={toast.msg} type={toast.type} onClose={() => setToast(null)} />}
    </div>
  );
}

// ─── Topnav ────────────────────────────────────────────────────────────────
function TopNav({ activeTab, onTabChange }) {
  const tabs = [
    { key: 'dashboard', label: '대시보드', icon: 'chart-pie' },
    { key: 'cost-export', label: '비용 정산', icon: 'currency-circle-dollar' },
    { key: 'repair-list', label: '수리 이력', icon: 'barcode' },
    { key: 'api-integration', label: 'API 연동', icon: 'webhooks-logo' },
  ];

  return (
    <div className="topnav">
      <div className="topnav-inner">
        <div className="logo-wrap">
          <div className="logo-icon">
            <i className="ph-fill ph-factory" style={{ fontSize: 20, color: '#fff' }} />
          </div>
          <div>
            <div className="logo-name">QCField Pro</div>
            <div className="logo-sub">현장 수리 QC 통합 플랫폼</div>
          </div>
        </div>
        <div className="tab-bar">
          {tabs.map(tab => (
            <button
              key={tab.key}
              className={`tab-item ${activeTab === tab.key ? 'active' : ''}`}
              onClick={() => onTabChange(tab.key)}
            >
              <i className={`ph ph-${tab.icon}`} style={{ fontSize: 16 }} />
              {tab.label}
            </button>
          ))}
        </div>
        <div style={{ display: 'flex', alignItems: 'center', gap: 12 }}>
          <div style={{ position: 'relative', cursor: 'pointer' }}>
            <i className="ph ph-bell" style={{ fontSize: 20, color: '#4A6860' }} />
            <div style={{ position: 'absolute', top: -2, right: -2, width: 7, height: 7, background: '#F0C842', borderRadius: '50%' }} />
          </div>
          <div style={{ width: 34, height: 34, borderRadius: '50%', background: '#1A6B5A', display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 13, fontWeight: 700, color: '#fff' }}>관</div>
        </div>
      </div>
    </div>
  );
}

// ─── App ──────────────────────────────────────────────────────────────────
function App() {
  const [tab, setTab] = useState('dashboard');

  const screens = {
    dashboard: <DashboardScreen />,
    'cost-export': <CostExportScreen />,
    'repair-list': <RepairListScreen />,
    'api-integration': <ApiIntegrationScreen />,
  };

  return (
    <div style={{ width: '100%', minHeight: '100vh' }}>
      <TopNav activeTab={tab} onTabChange={setTab} />
      {screens[tab] || screens['dashboard']}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
