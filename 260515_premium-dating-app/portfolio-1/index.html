<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>해시태그 데이팅 플랫폼 — 맞춤 구현 데모</title>
  <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" rel="stylesheet" />
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://unpkg.com/prop-types/prop-types.min.js"></script>
  <script src="https://unpkg.com/react-is@18/umd/react-is.production.min.js"></script>
  <script src="https://unpkg.com/recharts/umd/Recharts.js"></script>
  <script src="https://unpkg.com/@phosphor-icons/web"></script>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html,body,#root{width:100%;min-height:100vh}
    body{font-family:'Pretendard',-apple-system,sans-serif;background:#0F0A0D;color:#F2EBE9;-webkit-font-smoothing:antialiased}
    ::-webkit-scrollbar{width:6px}
    ::-webkit-scrollbar-track{background:#1C1018}
    ::-webkit-scrollbar-thumb{background:#3A2030;border-radius:3px}

    @keyframes fadeIn{from{opacity:0}to{opacity:1}}
    @keyframes slideInUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}
    @keyframes slideInRight{from{opacity:0;transform:translateX(40px)}to{opacity:1;transform:translateX(0)}}
    @keyframes pulseGlow{0%,100%{box-shadow:0 0 0 0 rgba(139,34,82,0.4)}50%{box-shadow:0 0 0 8px rgba(139,34,82,0)}}
    @keyframes swipeLeftOut{from{opacity:1;transform:translateX(0) rotate(0deg)}to{opacity:0;transform:translateX(-160px) rotate(-20deg)}}
    @keyframes swipeRightOut{from{opacity:1;transform:translateX(0) rotate(0deg)}to{opacity:0;transform:translateX(160px) rotate(20deg)}}
    @keyframes matchPop{0%{opacity:0;transform:scale(0.5)}60%{transform:scale(1.1)}100%{opacity:1;transform:scale(1)}}
    @keyframes heartBeat{0%,100%{transform:scale(1)}15%{transform:scale(1.25)}30%{transform:scale(1)}45%{transform:scale(1.15)}60%{transform:scale(1)}}
    @keyframes toastIn{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
    @keyframes toastOut{from{opacity:1;transform:translateY(0)}to{opacity:0;transform:translateY(16px)}}
    @keyframes shimmer{0%{background-position:-400px 0}100%{background-position:400px 0}}
    @keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
    @keyframes diamondGlow{0%,100%{filter:drop-shadow(0 0 4px #C8934A)}50%{filter:drop-shadow(0 0 12px #C8934A)}}
    @keyframes progressFill{from{width:0}to{width:var(--target-width)}}
    @keyframes cardAppear{from{opacity:0;transform:scale(0.92) translateY(16px)}to{opacity:1;transform:scale(1) translateY(0)}}

    .page-enter{animation:fadeIn 0.25s ease-out,slideInUp 0.3s ease-out}
    .card-hover{transition:transform 0.2s ease,box-shadow 0.2s ease}
    .card-hover:hover{transform:translateY(-4px);box-shadow:0 16px 40px rgba(0,0,0,0.5)!important}
    .btn-hover{transition:all 0.15s ease}
    .btn-hover:hover{filter:brightness(1.12);transform:scale(1.02)}
    .btn-hover:active{transform:scale(0.97)}
    .tab-btn{transition:all 0.2s ease;position:relative}
    .tab-btn::after{content:'';position:absolute;bottom:-1px;left:0;right:0;height:2px;background:#8B2252;transform:scaleX(0);transition:transform 0.25s ease;transform-origin:center}
    .tab-btn.active::after{transform:scaleX(1)}
    .swipe-card{animation:cardAppear 0.35s ease-out}
    .swipe-left{animation:swipeLeftOut 0.4s ease-in forwards}
    .swipe-right{animation:swipeRightOut 0.4s ease-in forwards}
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef } = React;
const { LineChart, Line, XAxis, YAxis, Tooltip, ResponsiveContainer } = Recharts;

const C = {
  bg:'#0F0A0D', surface:'#1C1018', surfaceHigh:'#261820',
  primary:'#8B2252', primaryLight:'#B5386D', primaryDark:'#611640',
  accent:'#C8934A', accentLight:'#D4A86A',
  border:'#3A2030', borderLight:'#4A2A3A',
  textPrimary:'#F2EBE9', textSecondary:'#A08898', textMuted:'#6A5060',
  success:'#4CAF82', error:'#E85A5A', warning:'#E8A84A',

const profiles = [
  {id:1,name:'이서연',age:29,job:'마케팅 매니저',loc:'서초구',match:94,tags:['와인','여행','독서'],verified:true,grad:'linear-gradient(145deg,#8B2252,#C8934A)'},
  {id:2,name:'박지현',age:31,job:'의사',loc:'강남구',match:87,tags:['요가','영화','등산'],verified:true,grad:'linear-gradient(145deg,#4A2070,#8B2252)'},
  {id:3,name:'김민아',age:28,job:'UX 디자이너',loc:'용산구',match:91,tags:['사진','캠핑','음악'],verified:true,grad:'linear-gradient(145deg,#1B3A6B,#4A90C8)'},
  {id:4,name:'정수진',age:30,job:'변호사',loc:'마포구',match:89,tags:['독서','재즈','미술'],verified:true,grad:'linear-gradient(145deg,#2D5F3F,#4CAF82)'},
];

const docTypes = [
  {id:'id',label:'신분증',desc:'주민등록증 / 운전면허증'},
  {id:'employment',label:'재직증명서',desc:'3개월 이내 발급'},
  {id:'income',label:'소득금액증명원',desc:'국세청 발급'},
  {id:'car',label:'자동차등록증',desc:'차량 등록 증빙'},
  {id:'cert',label:'자격증',desc:'전문 자격 증빙'},
];

const packages = [
  {id:1,diamonds:10,price:'5,000',tag:''},
  {id:2,diamonds:30,price:'12,000',tag:'인기'},
  {id:3,diamonds:50,price:'18,000',tag:'추천'},
  {id:4,diamonds:100,price:'32,000',tag:'최대 할인'},
];

const txHistory = [
  {date:'2026.05.14',type:'충전',amount:'+50 다이아',price:'18,000원'},
  {date:'2026.05.13',type:'외모 채널 열람',amount:'-5 다이아',price:''},
  {date:'2026.05.13',type:'프로필 채널 열람',amount:'-10 다이아',price:''},
  {date:'2026.05.12',type:'충전',amount:'+30 다이아',price:'12,000원'},
  {date:'2026.05.11',type:'호감 전송',amount:'-30 다이아',price:''},
];

const recentMatches = [
  {name:'이서연',age:29,job:'마케팅 매니저',time:'방금 전',match:94,grad:'linear-gradient(145deg,#8B2252,#C8934A)'},
  {name:'정수진',age:30,job:'변호사',time:'12분 전',match:89,grad:'linear-gradient(145deg,#2D5F3F,#4CAF82)'},
  {name:'최유진',age:27,job:'스타트업 PM',time:'1시간 전',match:85,grad:'linear-gradient(145deg,#6B3A1B,#C8934A)'},
];

function Avatar({grad,name,size=48,fontSize=18}) {
  return (
    <div style={{width:size,height:size,borderRadius:'50%',background:grad,display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0,fontSize,fontWeight:700,color:'#fff',textShadow:'0 1px 4px rgba(0,0,0,0.4)'}}>
      {name[0]}
    </div>
  );
}

function Toast({msg,onDone}) {
  useEffect(()=>{const t=setTimeout(onDone,2800);return()=>clearTimeout(t);},[]);
  return (
    <div style={{position:'fixed',bottom:32,left:'50%',transform:'translateX(-50%)',background:C.surfaceHigh,border:`1px solid ${C.border}`,borderRadius:12,padding:'12px 20px',color:C.textPrimary,fontSize:14,fontWeight:500,zIndex:9999,animation:'toastIn 0.25s ease-out',whiteSpace:'nowrap',boxShadow:'0 8px 24px rgba(0,0,0,0.5)'}}>
      {msg}
    </div>
  );
}

function TopNav({page,setPage,diamonds}) {
  const tabs=[
    {id:'main',label:'매칭 홈'},
    {id:'swipe',label:'카드 스와이프 매칭'},
    {id:'verification',label:'서류 인증'},
    {id:'payment',label:'다이아 충전'},
  ];
  return (
    <div style={{position:'sticky',top:0,zIndex:100,background:C.surface,borderBottom:`1px solid ${C.border}`,backdropFilter:'blur(12px)'}}>
      <div style={{maxWidth:1100,margin:'0 auto',padding:'0 24px',display:'flex',alignItems:'center',gap:0,height:64}}>
        <div style={{fontWeight:800,fontSize:22,color:C.accent,letterSpacing:-0.5,marginRight:40,flexShrink:0}}>
          <span style={{color:C.primary}}>#</span> 해시태그
        </div>
        <div style={{display:'flex',gap:4,flex:1}}>
          {tabs.map(t=>(
            <button key={t.id}
              className={`tab-btn ${page===t.id?'active':''}`}
              onClick={()=>setPage(t.id)}
              style={{background:'none',border:'none',cursor:'pointer',padding:'20px 16px',color:page===t.id?C.textPrimary:C.textSecondary,fontWeight:page===t.id?700:500,fontSize:14,fontFamily:'Pretendard',whiteSpace:'nowrap'}}>
              {t.label}
            </button>
          ))}
        </div>
        <div style={{display:'flex',alignItems:'center',gap:16,flexShrink:0}}>
          <div style={{display:'flex',alignItems:'center',gap:6,background:C.surfaceHigh,border:`1px solid ${C.border}`,borderRadius:20,padding:'6px 14px',animation:'diamondGlow 2.5s ease-in-out infinite'}}>
            <i className="ph ph-diamond" style={{color:C.accent,fontSize:16}}></i>
            <span style={{color:C.accent,fontWeight:700,fontSize:14}}>{diamonds}</span>
          </div>
          <div style={{display:'flex',alignItems:'center',gap:8,cursor:'pointer'}}>
            <div style={{width:36,height:36,borderRadius:'50%',background:'linear-gradient(145deg,#8B2252,#C8934A)',display:'flex',alignItems:'center',justifyContent:'center',color:'#fff',fontWeight:700,fontSize:14}}>나</div>
          </div>
        </div>
      </div>
    </div>
  );
}

function MainPage({setPage,showProfile}) {
  const channels = [
    {id:'swipe',icon:'ph-cards',title:'외모 중심 매칭',desc:'카드 스와이프로 직관적인 첫인상 매칭',cost:5,color:C.primary,active:312},
    {id:'profile',icon:'ph-user-list',title:'프로필 중심 매칭',desc:'해시태그·직업·관심사 기반 스펙 매칭',cost:10,color:'#6B2A8B',active:198},
    {id:'community',icon:'ph-chat-circle-dots',title:'커뮤니티 매칭',desc:'익명 게시판에서 취향 공유 후 대화 신청',cost:20,color:'#1B5E8B',active:87},
  ];
  const stats = [
    {label:'인증 완료 회원',val:'12,834',icon:'ph-shield-check'},
    {label:'오늘 매칭 성사',val:'247',icon:'ph-heart'},
    {label:'평균 매칭 점수',val:'91점',icon:'ph-star'},
    {label:'평균 응답 시간',val:'4분',icon:'ph-clock'},
  ];
  return (
    <div className="page-enter" style={{maxWidth:1100,margin:'0 auto',padding:'40px 24px 60px'}}>
      <div style={{background:'linear-gradient(135deg,#1C1018 0%,#261820 100%)',borderRadius:24,padding:'48px 40px',marginBottom:32,position:'relative',overflow:'hidden',border:`1px solid ${C.border}`}}>
        <div style={{position:'absolute',top:-40,right:-40,width:200,height:200,background:`radial-gradient(circle,${C.primary}30 0%,transparent 70%)`,pointerEvents:'none'}}></div>
        <div style={{position:'absolute',bottom:-30,left:60,width:150,height:150,background:`radial-gradient(circle,${C.accent}20 0%,transparent 70%)`,pointerEvents:'none'}}></div>
        <div style={{position:'relative',zIndex:1}}>
          <div style={{fontSize:13,color:C.accent,fontWeight:600,letterSpacing:1.5,marginBottom:12,textTransform:'uppercase'}}>Premium Dating Platform</div>
          <h1 style={{fontSize:34,fontWeight:800,lineHeight:1.25,marginBottom:16,letterSpacing:-0.5}}>검증된 신뢰로 만나는<br/><span style={{color:C.primary}}>프리미엄 매칭 경험</span></h1>
          <p style={{fontSize:15,color:C.textSecondary,lineHeight:1.7,maxWidth:480,marginBottom:28}}>철저한 서류 심사를 통과한 신뢰도 높은 회원 간 3가지 채널로 원하는 방식의 만남을 설계합니다.</p>
          <div style={{display:'flex',gap:12}}>
            <button className="btn-hover" onClick={()=>setPage('swipe')} style={{background:C.primary,border:'none',borderRadius:12,padding:'12px 28px',color:'#fff',fontWeight:700,fontSize:14,cursor:'pointer',fontFamily:'Pretendard'}}>
              매칭 시작하기
            </button>
            <button className="btn-hover" onClick={()=>setPage('verification')} style={{background:C.surfaceHigh,border:`1px solid ${C.border}`,borderRadius:12,padding:'12px 28px',color:C.textSecondary,fontWeight:600,fontSize:14,cursor:'pointer',fontFamily:'Pretendard'}}>
              서류 인증 진행
            </button>
          </div>
        </div>
      </div>
      <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:16,marginBottom:32}}>
        {stats.map((s,i)=>(
          <div key={i} className="card-hover" style={{background:C.surface,borderRadius:16,padding:'20px 16px',border:`1px solid ${C.border}`,boxShadow:'0 4px 20px rgba(0,0,0,0.3)'}}>
            <i className={`ph ${s.icon}`} style={{fontSize:22,color:C.primary,marginBottom:10,display:'block'}}></i>
            <div style={{fontSize:24,fontWeight:800,color:C.textPrimary,marginBottom:4}}>{s.val}</div>
            <div style={{fontSize:12,color:C.textSecondary}}>{s.label}</div>
          </div>
        ))}
      </div>
      <h2 style={{fontSize:18,fontWeight:700,marginBottom:16}}>매칭 채널 선택</h2>
      <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:16,marginBottom:32}}>
        {channels.map(ch=>(
          <div key={ch.id} className="card-hover" onClick={()=>ch.id==='swipe'&&setPage('swipe')} style={{background:C.surface,borderRadius:20,padding:24,border:`1px solid ${C.border}`,boxShadow:'0 4px 20px rgba(0,0,0,0.3)',cursor:'pointer',position:'relative',overflow:'hidden'}}>
            <div style={{position:'absolute',top:-12,right:-12,width:80,height:80,background:`radial-gradient(circle,${ch.color}25 0%,transparent 70%)`,pointerEvents:'none'}}></div>
            <i className={`ph ${ch.icon}`} style={{fontSize:28,color:ch.color,marginBottom:14,display:'block'}}></i>
            <div style={{fontWeight:700,fontSize:16,marginBottom:6}}>{ch.title}</div>
            <div style={{fontSize:13,color:C.textSecondary,lineHeight:1.6,marginBottom:16}}>{ch.desc}</div>
            <div style={{display:'flex',alignItems:'center',justifyContent:'space-between'}}>
              <div style={{display:'flex',alignItems:'center',gap:4,fontSize:13,color:C.accent}}>
                <i className="ph ph-diamond" style={{fontSize:14}}></i>
                <span style={{fontWeight:600}}>열람 {ch.cost}다이아</span>
              </div>
              <div style={{fontSize:12,color:C.textMuted}}>접속 {ch.active}명</div>
            </div>
          </div>
        ))}
      </div>
      <h2 style={{fontSize:18,fontWeight:700,marginBottom:16}}>최근 매칭</h2>
      <div style={{display:'flex',flexDirection:'column',gap:12}}>
        {recentMatches.map((m,i)=>(
          <div key={i} className="card-hover" onClick={()=>showProfile(m)} style={{background:C.surface,borderRadius:16,padding:'16px 20px',border:`1px solid ${C.border}`,display:'flex',alignItems:'center',gap:16,cursor:'pointer',boxShadow:'0 4px 16px rgba(0,0,0,0.25)'}}>
            <Avatar grad={m.grad} name={m.name} size={48} />
            <div style={{flex:1}}>
              <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:2}}>
                <span style={{fontWeight:700,fontSize:15}}>{m.name}</span>
                <span style={{fontSize:13,color:C.textSecondary}}>{m.age}세</span>
                <i className="ph ph-seal-check" style={{color:C.success,fontSize:14}}></i>
              </div>
              <div style={{fontSize:13,color:C.textSecondary}}>{m.job}</div>
            </div>
            <div style={{textAlign:'right'}}>
              <div style={{fontSize:13,fontWeight:700,color:C.primary,marginBottom:4}}>매칭 {m.match}%</div>

          </div>
        ))}
      </div>

}

function SwipePage({diamonds,setDiamonds,showToast}) {
  const [cardIdx,setCardIdx] = useState(0);
  const [anim,setAnim] = useState(null);
  const [showMatch,setShowMatch] = useState(false);
  const [liked,setLiked] = useState([]);

  const current = profiles[cardIdx % profiles.length];

  const doSwipe = (dir) => {
    if(anim) return;
    setAnim(dir);
    if(dir==='right') {
      setDiamonds(d=>Math.max(0,d-5));
      const isMatch = Math.random()>0.5;
      setTimeout(()=>{
        setAnim(null);
        setCardIdx(i=>i+1);
        if(isMatch) setShowMatch(true);
      },420);
    } else {
      setTimeout(()=>{setAnim(null);setCardIdx(i=>i+1);},420);
    }
  };

  return (
    <div className="page-enter" style={{maxWidth:480,margin:'0 auto',padding:'40px 24px 60px'}}>
      <div style={{textAlign:'center',marginBottom:24}}>
        <div style={{fontSize:22,fontWeight:800,marginBottom:6}}>외모 중심 매칭</div>
        <div style={{fontSize:13,color:C.textSecondary}}>카드를 스와이프하여 첫인상 매칭을 진행합니다</div>
      </div>
      <div style={{position:'relative',height:480,marginBottom:28}}>
        {[2,1,0].map(offset=>{
          const idx = (cardIdx+offset) % profiles.length;
          const p = profiles[idx];
          const isTop = offset===0;
          return (
            <div key={cardIdx+offset} className={isTop&&anim?`swipe-${anim}`:isTop?'swipe-card':''}
              style={{position:'absolute',top:offset*8,left:offset*4,right:offset*4,height:460-offset*16,background:`${p.grad},${C.surface}`,borderRadius:24,border:`1px solid ${C.border}`,overflow:'hidden',boxShadow:`0 ${8+offset*4}px ${24+offset*8}px rgba(0,0,0,0.5)`,zIndex:3-offset,cursor:isTop?'grab':'default',transition:'box-shadow 0.2s'}}>
              <div style={{height:260,background:p.grad,display:'flex',alignItems:'center',justifyContent:'center',position:'relative'}}>
                <div style={{width:100,height:100,borderRadius:'50%',background:'rgba(255,255,255,0.15)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:40,fontWeight:800,color:'#fff',backdropFilter:'blur(8px)'}}>
                  {p.name[0]}
                </div>
                <div style={{position:'absolute',top:16,right:16}}>
                  {p.verified&&<div style={{background:'rgba(76,207,130,0.2)',border:'1px solid #4CAF82',borderRadius:20,padding:'4px 10px',fontSize:12,color:'#4CAF82',fontWeight:600,display:'flex',alignItems:'center',gap:4}}>
                    <i className="ph ph-seal-check"></i> 인증 완료
                  </div>}
                </div>
                <div style={{position:'absolute',bottom:16,left:20}}>
                  <div style={{fontSize:22,fontWeight:800,color:'#fff',marginBottom:2}}>{p.name}, {p.age}세</div>
                  <div style={{fontSize:14,color:'rgba(255,255,255,0.8)'}}>{p.job}</div>
                </div>
              </div>
              <div style={{padding:'20px 20px'}}>
                <div style={{display:'flex',alignItems:'center',gap:6,marginBottom:12,color:C.textSecondary,fontSize:13}}>
                  <i className="ph ph-map-pin" style={{color:C.primary}}></i>
                  <span>위치 정보 — 프로필 채널에서 공개</span>
                </div>
                <div style={{display:'flex',flexWrap:'wrap',gap:8,marginBottom:16}}>
                  {p.tags.map(t=><span key={t} style={{background:C.surfaceHigh,border:`1px solid ${C.border}`,borderRadius:20,padding:'5px 12px',fontSize:12,color:C.textSecondary}}>#{t}</span>)}
                </div>
                <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',background:C.surfaceHigh,borderRadius:12,padding:'12px 16px'}}>
                  <span style={{fontSize:13,color:C.textSecondary}}>매칭 점수</span>
                  <div style={{display:'flex',alignItems:'center',gap:6}}>
                    <div style={{width:80,height:6,borderRadius:3,background:C.border,overflow:'hidden'}}>
                      <div style={{width:`${p.match}%`,height:'100%',background:`linear-gradient(90deg,${C.primary},${C.accent})`,borderRadius:3}}></div>
                    </div>
                    <span style={{fontWeight:700,color:C.accent,fontSize:14}}>{p.match}%</span>
                  </div>
                </div>
              </div>
            </div>
          );
        })}
      </div>
      <div style={{display:'flex',alignItems:'center',justifyContent:'center',gap:24}}>
        <button className="btn-hover" onClick={()=>doSwipe('left')}

function VerificationPage({showToast}) {
  const [step,setStep] = useState(1);
  const [docType,setDocType] = useState('');
  const [uploadState,setUploadState] = useState('idle');
  const [progress,setProgress] = useState(0);

  const handleUpload = () => {
    setUploadState('uploading');
    let p=0;
    const iv = setInterval(()=>{
      p += Math.random()*18+8;
      if(p>=100){p=100;clearInterval(iv);setUploadState('done');setStep(3);showToast('서류가 암호화되어 안전하게 저장되었습니다');}
      setProgress(Math.min(100,p));
    },200);
  };

  const steps=[{n:1,label:'서류 선택'},{n:2,label:'파일 업로드'},{n:3,label:'심사 대기'}];
  return (
    <div className="page-enter" style={{maxWidth:680,margin:'0 auto',padding:'40px 24px 60px'}}>
      <div style={{marginBottom:32}}>
        <div style={{fontSize:22,fontWeight:800,marginBottom:6}}>서류 인증</div>
        <div style={{fontSize:14,color:C.textSecondary}}>서류 심사를 통과하면 인증 배지와 함께 상위 매칭 우선권이 부여됩니다</div>
      </div>
      <div style={{display:'flex',alignItems:'center',marginBottom:36,gap:0}}>
        {steps.map((s,i)=>(
          <React.Fragment key={s.n}>
            <div style={{display:'flex',flexDirection:'column',alignItems:'center',gap:6}}>
              <div style={{width:36,height:36,borderRadius:'50%',background:step>=s.n?C.primary:C.surfaceHigh,border:`2px solid ${step>=s.n?C.primary:C.border}`,display:'flex',alignItems:'center',justifyContent:'center',color:step>=s.n?'#fff':C.textMuted,fontWeight:700,fontSize:14,transition:'all 0.3s'}}>
                {step>s.n?<i className="ph ph-check" style={{fontSize:16}}></i>:s.n}
              </div>
              <span style={{fontSize:12,color:step>=s.n?C.textPrimary:C.textMuted,fontWeight:step===s.n?700:400}}>{s.label}</span>
            </div>
            {i<steps.length-1&&<div style={{flex:1,height:2,background:step>s.n?C.primary:C.border,marginBottom:24,transition:'all 0.3s'}}></div>}
          </React.Fragment>
        ))}
      </div>

      {step===1&&(
        <div style={{animation:'slideInUp 0.3s ease-out'}}>
          <div style={{fontSize:16,fontWeight:700,marginBottom:16}}>제출할 서류 유형을 선택하세요</div>
          <div style={{display:'flex',flexDirection:'column',gap:10,marginBottom:28}}>
            {docTypes.map(d=>(
              <div key={d.id} onClick={()=>setDocType(d.id)}
                style={{background:docType===d.id?`${C.primary}18`:C.surface,border:`2px solid ${docType===d.id?C.primary:C.border}`,borderRadius:14,padding:'16px 20px',cursor:'pointer',display:'flex',alignItems:'center',gap:14,transition:'all 0.2s'}}>
                <div style={{width:40,height:40,borderRadius:10,background:docType===d.id?`${C.primary}30`:C.surfaceHigh,display:'flex',alignItems:'center',justifyContent:'center'}}>
                  <i className="ph ph-file-text" style={{fontSize:20,color:docType===d.id?C.primary:C.textMuted}}></i>
                </div>
                <div>
                  <div style={{fontWeight:600,fontSize:15,marginBottom:2,color:docType===d.id?C.textPrimary:C.textPrimary}}>{d.label}</div>
                  <div style={{fontSize:12,color:C.textSecondary}}>{d.desc}</div>
                </div>
                {docType===d.id&&<i className="ph ph-check-circle-fill" style={{marginLeft:'auto',color:C.primary,fontSize:22}}></i>}
              </div>
            ))}
          </div>
          <button className="btn-hover" disabled={!docType} onClick={()=>setStep(2)}
            style={{width:'100%',background:docType?C.primary:'#2A1820',border:'none',borderRadius:14,padding:'14px',color:docType?'#fff':C.textMuted,fontWeight:700,fontSize:15,cursor:docType?'pointer':'not-allowed',fontFamily:'Pretendard',transition:'all 0.2s'}}>
            다음 단계
          </button>
        </div>
      )}

      {step===2&&(
        <div style={{animation:'slideInUp 0.3s ease-out'}}>
          <div style={{fontSize:16,fontWeight:700,marginBottom:16}}>{docTypes.find(d=>d.id===docType)?.label} 파일 업로드</div>
          {uploadState==='idle'&&(
            <div onClick={handleUpload} style={{border:`2px dashed ${C.border}`,borderRadius:20,padding:'48px 24px',textAlign:'center',cursor:'pointer',background:C.surface,marginBottom:20,transition:'all 0.2s'}} onMouseEnter={e=>{e.currentTarget.style.borderColor=C.primary;e.currentTarget.style.background=C.surfaceHigh}} onMouseLeave={e=>{e.currentTarget.style.borderColor=C.border;e.currentTarget.style.background=C.surface}}>
              <i className="ph ph-upload-simple" style={{fontSize:40,color:C.primary,display:'block',marginBottom:12}}></i>
              <div style={{fontWeight:600,fontSize:15,marginBottom:6}}>파일을 드래그하거나 클릭하여 업로드</div>
              <div style={{fontSize:13,color:C.textSecondary}}>JPG, PNG, PDF — 최대 10MB</div>
            </div>
          )}
          {uploadState==='uploading'&&(
            <div style={{background:C.surface,borderRadius:20,padding:24,marginBottom:20}}>
              <div style={{display:'flex',alignItems:'center',gap:12,marginBottom:16}}>
                <i className="ph ph-file-pdf" style={{fontSize:28,color:C.primary}}></i>
                <div style={{flex:1}}>
                  <div style={{fontWeight:600,fontSize:14,marginBottom:4}}>문서.pdf</div>
                  <div style={{fontSize:12,color:C.textSecondary}}>암호화 처리 중...</div>
                </div>
                <div style={{fontSize:13,fontWeight:700,color:C.primary}}>{Math.round(progress)}%</div>
              </div>
              <div style={{height:6,background:C.border,borderRadius:3,overflow:'hidden'}}>
                <div style={{height:'100%',background:`linear-gradient(90deg,${C.primary},${C.accent})`,borderRadius:3,width:`${progress}%`,transition:'width 0.2s'}}></div>
              </div>
            </div>
          )}
          <div style={{background:`${C.success}15`,border:`1px solid ${C.success}40`,borderRadius:14,padding:'14px 18px',display:'flex',gap:10,alignItems:'flex-start'}}>
            <i className="ph ph-shield-check" style={{color:C.success,fontSize:18,marginTop:1,flexShrink:0}}></i>
            <div style={{fontSize:13,color:C.textSecondary,lineHeight:1.6}}>업로드된 서류는 AES-256 암호화 후 AWS KMS 관리형 키로 보호되며, 관리자 확인 즉시 자동 파기 스케줄러에 등록됩니다.</div>
          </div>
        </div>
      )}

      {step===3&&(
        <div style={{animation:'slideInUp 0.3s ease-out',textAlign:'center',padding:'24px 0'}}>
          <div style={{width:72,height:72,borderRadius:'50%',background:`${C.success}20`,border:`2px solid ${C.success}`,margin:'0 auto 20px',display:'flex',alignItems:'center',justifyContent:'center'}}>
            <i className="ph ph-check" style={{fontSize:36,color:C.success}}></i>
          </div>
          <div style={{fontSize:20,fontWeight:800,marginBottom:8}}>서류 제출 완료</div>
          <p style={{fontSize:14,color:C.textSecondary,lineHeight:1.7,marginBottom:24}}>제출하신 서류를 검토 중입니다.<br/>평균 1~2 영업일 내에 심사 결과를 알려드립니다.</p>
          <div style={{background:C.surface,borderRadius:16,padding:'16px 20px',display:'flex',alignItems:'center',justifyContent:'space-between',border:`1px solid ${C.border}`}}>
            <div style={{display:'flex',alignItems:'center',gap:10}}>
              <i className="ph ph-hourglass-medium" style={{color:C.warning,fontSize:22}}></i>
              <div>
                <div style={{fontWeight:600,fontSize:14}}>심사 진행 중</div>
                <div style={{fontSize:12,color:C.textSecondary}}>예상 완료: 1~2 영업일</div>
              </div>
            </div>
            <div style={{background:`${C.warning}20`,border:`1px solid ${C.warning}40`,borderRadius:20,padding:'4px 12px',fontSize:12,color:C.warning,fontWeight:600}}>대기 중</div>
          </div>
        </div>
      )}
    </div>
  );
}

          </div>
          <div style={{display:'flex',gap:10}}>
            <button className="btn-hover" style={{flex:1,background:C.surfaceHigh,border:`1px solid ${C.border}`,borderRadius:12,padding:'12px',color:C.textSecondary,fontWeight:600,cursor:'pointer',fontFamily:'Pretendard',fontSize:14}}>패스</button>
            <button className="btn-hover" style={{flex:2,background:C.primary,border:'none',borderRadius:12,padding:'12px',color:'#fff',fontWeight:700,cursor:'pointer',fontFamily:'Pretendard',fontSize:14,display:'flex',alignItems:'center',justifyContent:'center',gap:6}}>
              <i className="ph ph-heart"></i>호감 보내기
            </button>
          </div>
        </div>
      </div>
    </div>
  );
}

function App() {
  const [page,setPage] = useState('main');
  const [diamonds,setDiamonds] = useState(45);
  const [toast,setToast] = useState(null);
  const [profileDrawer,setProfileDrawer] = useState(null);

  const showToast = (msg) => {
    setToast(msg);
    setTimeout(()=>setToast(null),3000);
  };

  return (
    <div style={{width:'100%',minHeight:'100vh',background:C.bg,color:C.textPrimary,fontFamily:'Pretendard,-apple-system,sans-serif'}}>
      <TopNav page={page} setPage={setPage} diamonds={diamonds} />
      {page==='main'&&<MainPage setPage={setPage} showProfile={setProfileDrawer} />}
      {page==='swipe'&&<SwipePage diamonds={diamonds} setDiamonds={setDiamonds} showToast={showToast} />}
      {page==='verification'&&<VerificationPage showToast={showToast} />}
      {page==='payment'&&<PaymentPage diamonds={diamonds} setDiamonds={setDiamonds} showToast={showToast} />}
      {profileDrawer&&<ProfileDrawer profile={profileDrawer} onClose={()=>setProfileDrawer(null)} />}
      {toast&&<Toast msg={toast} onDone={()=>setToast(null)} />}
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
