<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>해시태그 매칭 어드민 — 구현 데모</title>
  <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" rel="stylesheet" />
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://unpkg.com/prop-types/prop-types.min.js"></script>
  <script src="https://unpkg.com/react-is@18/umd/react-is.production.min.js"></script>
  <script src="https://unpkg.com/recharts/umd/Recharts.js"></script>
  <link rel="stylesheet" href="https://unpkg.com/@tabler/icons-webfont/dist/tabler-icons.min.css" />
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html,body,#root{width:100%;min-height:100vh}
    body{font-family:'Pretendard',-apple-system,sans-serif;background:#F0F4FA;color:#0D1B2E;-webkit-font-smoothing:antialiased}
    ::-webkit-scrollbar{width:6px}
    ::-webkit-scrollbar-track{background:#F0F4FA}
    ::-webkit-scrollbar-thumb{background:#D0DCF0;border-radius:3px}

    @keyframes fadeIn{from{opacity:0}to{opacity:1}}
    @keyframes slideInUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
    @keyframes slideInLeft{from{opacity:0;transform:translateX(-20px)}to{opacity:1;transform:translateX(0)}}
    @keyframes slideInRight{from{opacity:0;transform:translateX(320px)}to{opacity:1;transform:translateX(0)}}
    @keyframes countUp{from{opacity:0;transform:scale(0.8)}to{opacity:1;transform:scale(1)}}
    @keyframes barGrow{from{height:0}to{height:var(--bar-h)}}
    @keyframes toastIn{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
    @keyframes toastOut{from{opacity:1;transform:translateY(0)}to{opacity:0;transform:translateY(16px)}}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:0.5}}
    @keyframes rowEnter{from{opacity:0;transform:translateX(-8px)}to{opacity:1;transform:translateX(0)}}
    @keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
    @keyframes chipPop{from{opacity:0;transform:scale(0.8)}to{opacity:1;transform:scale(1)}}
    @keyframes borderFlash{0%,100%{border-color:#D0DCF0}50%{border-color:#4A90C8}}
    @keyframes statusDot{0%,100%{transform:scale(1)}50%{transform:scale(1.4)}}

    .page-enter{animation:fadeIn 0.2s ease-out,slideInUp 0.3s ease-out}
    .row-hover{transition:background 0.15s ease,transform 0.1s ease}
    .row-hover:hover{background:#EEF3FB!important;transform:translateX(2px)}
    .card-hover{transition:transform 0.2s ease,box-shadow 0.2s ease}
    .card-hover:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(27,58,107,0.12)!important}
    .btn-hover{transition:all 0.15s ease}
    .btn-hover:hover{filter:brightness(0.92)}
    .btn-hover:active{transform:scale(0.97)}
    .nav-item{transition:all 0.2s ease;position:relative}
    .nav-item.active::before{content:'';position:absolute;left:0;top:50%;transform:translateY(-50%);height:20px;width:3px;background:#1B3A6B;border-radius:0 2px 2px 0}
    .tab-filter{transition:all 0.2s ease}
    .tab-filter.active{background:#1B3A6B!important;color:#fff!important}
    .risk-badge{animation:chipPop 0.25s ease-out}
  </style>
</head>
<body>

const statusLabel = {pending:'대기 중',approved:'승인',rejected:'반려'};

const riskLabel = {high:'고위험',medium:'주의',low:'관찰'};
const riskColor = {high:{bg:C.errorBg,text:C.error},medium:{bg:C.warningBg,text:C.warning},low:{bg:C.infoBg,text:C.info}};
const actionLabel = {active:'활성',warned:'경고',suspended:'정지'};

function Avatar({grad,name,size=36,fontSize=14}) {
  return <div style={{width:size,height:size,borderRadius:'50%',background:grad,display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0,fontSize,fontWeight:700,color:'#fff',textShadow:'0 1px 3px rgba(0,0,0,0.3)'}}>{name[0]}</div>;
}

function StatusBadge({status}) {
  const sc = statusColor[status]||{bg:C.infoBg,text:C.info};
  return <span style={{background:sc.bg,color:sc.text,borderRadius:6,padding:'3px 10px',fontSize:12,fontWeight:600}}>{statusLabel[status]||status}</span>;
}

function RiskBadge({risk}) {
  const rc = riskColor[risk]||{bg:C.infoBg,text:C.info};
  return <span className="risk-badge" style={{background:rc.bg,color:rc.text,borderRadius:6,padding:'3px 10px',fontSize:12,fontWeight:600}}>{riskLabel[risk]||risk}</span>;
}

function Toast({msg,onDone}) {
  useEffect(()=>{const t=setTimeout(onDone,2800);return()=>clearTimeout(t);},[]);
  return <div style={{position:'fixed',bottom:32,left:'50%',transform:'translateX(-50%)',background:C.primary,borderRadius:10,padding:'12px 20px',color:'#fff',fontSize:14,fontWeight:500,zIndex:9999,animation:'toastIn 0.25s ease-out',whiteSpace:'nowrap',boxShadow:'0 8px 24px rgba(27,58,107,0.3)'}}>{msg}</div>;
}

function GlobalNav({page,setPage}) {

function DocumentReviewPage({showToast}) {
  const [filter,setFilter] = useState('all');
  const [docs,setDocs] = useState(docList);
  const [selected,setSelected] = useState(null);
  const [acting,setActing] = useState(null);

  const filtered = filter==='all'?docs:docs.filter(d=>d.status===filter);

  const doAction = (id,action) => {
    setActing(`${id}-${action}`);
    setTimeout(()=>{
      setDocs(prev=>prev.map(d=>d.id===id?{...d,status:action==='approve'?'approved':'rejected'}:d));
      setSelected(null);
      setActing(null);
      showToast(action==='approve'?'서류를 승인했습니다. 회원 등급이 자동 변경됩니다':'서류를 반려했습니다. 회원에게 알림이 발송됩니다');
    },1500);
  };

  const filterTabs=[{id:'all',label:'전체',count:docs.length},{id:'pending',label:'대기 중',count:docs.filter(d=>d.status==='pending').length},{id:'approved',label:'승인',count:docs.filter(d=>d.status==='approved').length},{id:'rejected',label:'반려',count:docs.filter(d=>d.status==='rejected').length}];

  return (
    <div className="page-enter" style={{maxWidth:1200,margin:'0 auto',padding:'32px 24px 60px'}}>
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:24}}>
        <div>
          <div style={{fontSize:22,fontWeight:800,marginBottom:4}}>서류 심사</div>
          <div style={{fontSize:14,color:C.textSecondary}}>신규 회원 서류 승인·반려 및 파기 예약 현황</div>
        </div>
        <div style={{display:'flex',alignItems:'center',gap:8,background:C.warningBg,border:`1px solid ${C.warning}50`,borderRadius:10,padding:'10px 16px'}}>
          <i className="ti ti-clock" style={{color:C.warning,fontSize:18}}></i>
          <span style={{fontSize:14,color:C.warning,fontWeight:600}}>파기 예정 3건 — 48시간 이내</span>
        </div>
      </div>
      <div style={{display:'flex',gap:8,marginBottom:20}}>
        {filterTabs.map(ft=>(
          <button key={ft.id} className={`tab-filter${filter===ft.id?' active':''}`}
            onClick={()=>setFilter(ft.id)}
            style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:8,padding:'7px 14px',fontSize:13,fontWeight:500,cursor:'pointer',color:filter===ft.id?'#fff':C.textSecondary,fontFamily:'Pretendard',display:'flex',alignItems:'center',gap:6}}>
            {ft.label}
            <span style={{background:filter===ft.id?'rgba(255,255,255,0.25)':C.bg,borderRadius:4,padding:'1px 7px',fontSize:11,fontWeight:700}}>{ft.count}</span>
          </button>
        ))}
      </div>
      <div style={{background:C.surface,borderRadius:14,border:`1px solid ${C.border}`,overflow:'hidden',boxShadow:'0 2px 8px rgba(27,58,107,0.06)'}}>
        <div style={{display:'grid',gridTemplateColumns:'2fr 1.5fr 1.5fr 1fr 1fr',padding:'12px 20px',borderBottom:`1px solid ${C.border}`,background:C.bg}}>
          {['회원 정보','서류 유형','제출 일시','상태','파기 예정일'].map(h=><div key={h} style={{fontSize:12,fontWeight:700,color:C.textMuted,textTransform:'uppercase',letterSpacing:0.3}}>{h}</div>)}

                </button>
              )}
              <button className="btn-hover" onClick={()=>doAction(selected.id,'delete')} style={{flex:1,background:C.errorBg,border:`1px solid ${C.error}30`,borderRadius:10,padding:'11px',color:C.error,fontWeight:700,cursor:'pointer',fontFamily:'Pretendard',fontSize:14,display:'flex',alignItems:'center',justifyContent:'center',gap:6}}>
                {acting===`${selected.id}-delete`?<i className="ti ti-loader-2" style={{animation:'spin 0.8s linear infinite'}}></i>:<i className="ti ti-trash"></i>}삭제
              </button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

function Footer() {
  return (
    <footer style={{borderTop:`1px solid ${C.border}`,background:C.surface,padding:'20px 24px'}}>
      <div style={{maxWidth:1200,margin:'0 auto',display:'flex',alignItems:'center',justifyContent:'space-between'}}>
        <div style={{fontSize:13,color:C.textMuted}}>해시태그 매칭 어드민 · 맞춤 구현 데모</div>
        <div style={{display:'flex',gap:16,fontSize:13,color:C.textMuted}}>
          <span>v2.4.1</span>
          <span>Node.js + Express + PostgreSQL + Redis</span>
        </div>
      </div>
    </footer>
  );
}

function App() {
  const [page,setPage] = useState('main');
  const [toast,setToast] = useState(null);
  const showToast = (msg) => {setToast(msg);setTimeout(()=>setToast(null),3000);};

  return (
    <div style={{width:'100%',minHeight:'100vh',background:C.bg,display:'flex',flexDirection:'column',fontFamily:'Pretendard,-apple-system,sans-serif'}}>
      <GlobalNav page={page} setPage={setPage} />
      <div style={{flex:1}}>
        {page==='main'&&<DashboardPage />}
        {page==='document-review'&&<DocumentReviewPage showToast={showToast} />}
        {page==='moderation'&&<ModerationPage showToast={showToast} />}
        {page==='community'&&<CommunityPage showToast={showToast} />}
      </div>
      <Footer />
      {toast&&<Toast msg={toast} onDone={()=>setToast(null)} />}
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
