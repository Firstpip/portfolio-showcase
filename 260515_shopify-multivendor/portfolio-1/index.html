const Badge=({s})=>(

// ── KPI Card ───────────────────────────────────────────────
const KpiCard=({icon,label,value,delta,color})=>{
  const [shown,setShown]=useState(false);
  useEffect(()=>{const t=setTimeout(()=>setShown(true),200);return()=>clearTimeout(t);},[]);
  return(
    <div style={{background:C.surface,borderRadius:14,padding:'22px 24px',boxShadow:'0 2px 12px rgba(13,122,95,0.08)',
      border:`1px solid ${C.border}`,transition:'transform 0.2s,box-shadow 0.2s',cursor:'default',
      animation:'fadeInUp 0.4s ease',
      ':hover':{transform:'translateY(-2px)'}}}
      onMouseEnter={e=>{e.currentTarget.style.transform='translateY(-3px)';e.currentTarget.style.boxShadow='0 8px 24px rgba(13,122,95,0.14)';}}
      onMouseLeave={e=>{e.currentTarget.style.transform='translateY(0)';e.currentTarget.style.boxShadow='0 2px 12px rgba(13,122,95,0.08)';}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start'}}>
        <div>
          <p style={{fontSize:13,color:C.t2,marginBottom:8}}>{label}</p>
          <p style={{fontSize:28,fontWeight:700,color:C.t1,animation:shown?'countUp 0.4s ease':'none'}}>{value}</p>
          {delta&&<p style={{fontSize:12,color:delta>0?C.success:C.error,marginTop:4,display:'flex',alignItems:'center',gap:3}}>
            <Ic n={delta>0?'trend':'down'} sz={12} cl={delta>0?C.success:C.error}/>
            전주 대비 {delta>0?'+':''}{delta}%
          </p>}
        </div>
        <div style={{background:color+'18',borderRadius:12,padding:12}}>
          <Ic n={icon} sz={22} cl={color}/>
        </div>
      </div>
    </div>
  );
};

// ── Chart Component ────────────────────────────────────────
const SalesChart=()=>{
  const ref=useRef(null);
  const chartRef=useRef(null);
  useEffect(()=>{
    if(!ref.current)return;
    if(chartRef.current)chartRef.current.destroy();
    chartRef.current=new Chart(ref.current,{
      type:'line',
      data:{
        labels:['5/9','5/10','5/11','5/12','5/13','5/14','5/15'],
        datasets:[{
          label:'매출',
          data:[1240000,1890000,1650000,2340000,1980000,2760000,3180000],
          borderColor:C.primary,backgroundColor:'rgba(13,122,95,0.08)',
          fill:true,tension:0.42,pointBackgroundColor:C.primary,pointRadius:5,pointHoverRadius:7,
        }]
      },
      options:{responsive:true,maintainAspectRatio:false,
        plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>`매출: ${ctx.raw.toLocaleString()}원`}}},
        scales:{
          y:{beginAtZero:false,grid:{color:'#E8F2EF'},ticks:{callback:v=>`${(v/10000).toFixed(0)}만`}},
          x:{grid:{display:false}},
        }
      }
    });
    return()=>{if(chartRef.current)chartRef.current.destroy();};
  },[]);
  return <div style={{position:'relative',height:220}}><canvas ref={ref}/></div>;
};

const CategoryChart=()=>{
  const ref=useRef(null);

      type:'doughnut',

        labels:['의류','주방','공예','잡화','식품','홈'],

          data:[34,22,18,12,9,5],
          backgroundColor:['#0D7A5F','#10B981','#34D399','#6EE7B7','#A7F3D0','#D1FAE5'],
          borderWidth:0,
        }]
      },
      options:{responsive:true,maintainAspectRatio:false,
        plugins:{legend:{position:'right',labels:{font:{size:12},color:C.t2,padding:10}}}}
    });
    return()=>{if(chartRef.current)chartRef.current.destroy();};
  },[]);
  return <div style={{position:'relative',height:180}}><canvas ref={ref}/></div>;
};

const AddProductModal=({onClose,onAdd})=>{
  const [form,setForm]=useState({name:'',category:'의류',price:'',stock:'',desc:''});
  const [imgFile,setImgFile]=useState(null);
  const [progress,setProgress]=useState(0);
  const up=k=>e=>setForm(f=>({...f,[k]:e.target.value}));
  const handleImg=e=>{
    setImgFile(e.target.files[0]?.name);
    let p=0;const t=setInterval(()=>{p+=20;setProgress(p);if(p>=100)clearInterval(t);},100);
  };
  const submit=e=>{
    e.preventDefault();
    if(!form.name||!form.price||!form.stock){alert('필수 항목을 입력해주세요.');return;}
    onAdd({id:`P${String(PRODUCTS.length+1).padStart(3,'0')}`,name:form.name,category:form.category,
      price:parseInt(form.price),stock:parseInt(form.stock),status:'판매중',seller:'김민수 스토어',img:form.category});
    onClose();
  };
  const inputStyle={width:'100%',padding:'9px 12px',borderRadius:8,border:`1.5px solid ${C.border}`,
    fontSize:14,color:C.t1,outline:'none',background:'#FAFCFB',transition:'border 0.15s'};

    <div style={{position:'fixed',inset:0,zIndex:1000,display:'flex',alignItems:'center',justifyContent:'center',background:'rgba(15,41,34,0.4)',backdropFilter:'blur(4px)'}}

        boxShadow:'0 24px 48px rgba(13,122,95,0.2)',animation:'fadeInUp 0.28s ease'}}>

            <Ic n='x' sz={20} cl={C.t2}/>
          </button>
        </div>
        <form onSubmit={submit} style={{padding:'24px 28px'}}>
          <div style={{display:'grid',gap:16}}>
            <div>
              <label style={{fontSize:13,fontWeight:600,color:C.t1,display:'block',marginBottom:6}}>상품명 <span style={{color:C.error}}>*</span></label>
              <input value={form.name} onChange={up('name')} placeholder='예: 수제 원목 도마' style={inputStyle}
                onFocus={e=>e.target.style.borderColor=C.primary} onBlur={e=>e.target.style.borderColor=C.border}/>
            </div>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>
              <div>
                <label style={{fontSize:13,fontWeight:600,color:C.t1,display:'block',marginBottom:6}}>카테고리</label>
                <select value={form.category} onChange={up('category')} style={{...inputStyle,cursor:'pointer'}}>
                  {['의류','주방','공예','잡화','식품','홈'].map(c=><option key={c}>{c}</option>)}
                </select>
              </div>
              <div>
                <label style={{fontSize:13,fontWeight:600,color:C.t1,display:'block',marginBottom:6}}>판매가 <span style={{color:C.error}}>*</span></label>
                <input type='number' value={form.price} onChange={up('price')} placeholder='원 단위 입력' style={inputStyle}
                  onFocus={e=>e.target.style.borderColor=C.primary} onBlur={e=>e.target.style.borderColor=C.border}/>
              </div>
            </div>
            <div>
              <label style={{fontSize:13,fontWeight:600,color:C.t1,display:'block',marginBottom:6}}>재고 수량 <span style={{color:C.error}}>*</span></label>
              <input type='number' value={form.stock} onChange={up('stock')} placeholder='재고 수량 입력' style={inputStyle}

            </div>
            <div>
              <label style={{fontSize:13,fontWeight:600,color:C.t1,display:'block',marginBottom:6}}>상품 이미지</label>
              <div style={{border:`2px dashed ${C.border}`,borderRadius:10,padding:20,textAlign:'center',cursor:'pointer',position:'relative',
                background:'#FAFCFB',transition:'border-color 0.15s',':hover':{borderColor:C.primary}}}
                onMouseEnter={e=>e.currentTarget.style.borderColor=C.primary}
                onMouseLeave={e=>e.currentTarget.style.borderColor=C.border}>
                <input type='file' accept='image/*' onChange={handleImg} style={{position:'absolute',inset:0,opacity:0,cursor:'pointer'}}/>

                  <div style={{marginTop:10,background:'#E8F7F3',borderRadius:4,height:6,overflow:'hidden'}}>
                    <div style={{height:'100%',background:C.primary,width:`${progress}%`,transition:'width 0.1s'}}/>

            <button type='submit' style={{padding:'10px 24px',borderRadius:9,background:C.primary,border:'none',

          </div>
        </form>
      </div>
    </div>
  );
};

const ProductsView=({products,setProducts,showToast})=>{

    setProducts(prev=>[prod,...prev]);

          </div>
        </div>

                    <span style={{fontSize:12,color:C.t3}}>→</span>

              </div>
              {[
                {label:'주문 상품',value:detail.product,icon:'package'},
                {label:'구매자',value:detail.buyer,icon:'user'},
                {label:'수량',value:`${detail.qty}개`,icon:'info'},
                {label:'결제 금액',value:`${detail.amount.toLocaleString()}원`,icon:'dollar'},
                {label:'주문일',value:detail.date,icon:'clock'},
                {label:'배송지',value:detail.addr,icon:'truck'},
              ].map(r=>(
                <div key={r.label} style={{display:'flex',alignItems:'flex-start',gap:12,padding:'12px 0',borderBottom:`1px solid ${C.borderLight}`}}>
                  <div style={{background:C.primaryLight,borderRadius:8,padding:8,flexShrink:0}}>
                    <Ic n={r.icon} sz={15} cl={C.primary}/>
                  </div>
                  <div>
                    <p style={{fontSize:12,color:C.t3,marginBottom:2}}>{r.label}</p>
                    <p style={{fontSize:14,color:C.t1,fontWeight:r.label==='결제 금액'?600:400}}>{r.value}</p>
                  </div>
                </div>
              ))}
              <div style={{marginTop:20}}>
                <p style={{fontSize:13,fontWeight:600,color:C.t1,marginBottom:10}}>메모</p>
                <textarea placeholder='주문에 대한 메모를 입력하세요' rows={3} style={{width:'100%',padding:'10px 12px',borderRadius:8,
                  border:`1.5px solid ${C.border}`,fontSize:13,resize:'none',outline:'none',fontFamily:'inherit'}}
                  onFocus={e=>e.target.style.borderColor=C.primary} onBlur={e=>e.target.style.borderColor=C.border}/>
              </div>
            </div>
            <div style={{padding:'16px 24px',borderTop:`1px solid ${C.border}`,display:'flex',gap:10,flexShrink:0}}>
              {detail.status==='신규'&&(
                <button onClick={()=>handleStatusChange(detail.id,'처리중')} style={{flex:1,padding:'10px',borderRadius:9,
                  background:C.primary,border:'none',cursor:'pointer',fontWeight:600,fontSize:14,color:'#fff'}}>처리 시작</button>
              )}
              {detail.status==='처리중'&&(
                <button onClick={()=>handleStatusChange(detail.id,'배송중')} style={{flex:1,padding:'10px',borderRadius:9,
                  background:'#8B5CF6',border:'none',cursor:'pointer',fontWeight:600,fontSize:14,color:'#fff'}}>배송 처리</button>
              )}
              {detail.status==='배송중'&&(
                <button onClick={()=>handleStatusChange(detail.id,'완료')} style={{flex:1,padding:'10px',borderRadius:9,
                  background:C.success,border:'none',cursor:'pointer',fontWeight:600,fontSize:14,color:'#fff'}}>완료 처리</button>
              )}
              <button onClick={()=>setDetail(null)} style={{padding:'10px 16px',borderRadius:9,border:`1.5px solid ${C.border}`,
                background:'transparent',cursor:'pointer',fontSize:14,color:C.t2}}>닫기</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
};

// ── App ─────────────────────────────────────────────────────
function App(){
  const [tab,setTab]=useState('대시보드');
  const [products,setProducts]=useState(PRODUCTS);
  const [orders,setOrders]=useState(ORDERS);
  const [toast,setToast]=useState(null);
  const showToast=useCallback((msg,type='success')=>{
    setToast({msg,type});
    setTimeout(()=>setToast(null),3000);
  },[]);
  const tabs=['대시보드','상품 관리','주문 관리','마켓플레이스'];
  return(
    <div style={{width:'100%',minHeight:'100vh',background:C.bg}}>
      <header style={{position:'sticky',top:0,zIndex:100,background:'rgba(255,255,255,0.95)',backdropFilter:'blur(10px)',
        borderBottom:`1px solid ${C.border}`,boxShadow:'0 2px 8px rgba(13,122,95,0.06)'}}>
        <div style={{maxWidth:1280,margin:'0 auto',padding:'0 24px',height:60,display:'flex',alignItems:'center',gap:0}}>
          <div style={{display:'flex',alignItems:'center',gap:10,marginRight:32}}>
            <div style={{background:C.primary,borderRadius:9,padding:8}}>
              <Ic n='layers' sz={20} cl='#fff'/>
            </div>
            <div>
              <p style={{fontSize:16,fontWeight:800,color:C.t1,lineHeight:1}}>MarketHub</p>
              <p style={{fontSize:10,color:C.t3,lineHeight:1}}>Seller Dashboard</p>
            </div>
          </div>
          <nav style={{display:'flex',gap:2,flex:1}}>
            <button onClick={()=>setTab('대시보드')} style={{padding:'8px 18px',borderRadius:9,border:'none',cursor:'pointer',
              fontFamily:'inherit',fontSize:14,fontWeight:tab==='대시보드'?600:400,
              background:tab==='대시보드'?C.primaryLight:'transparent',color:tab==='대시보드'?C.primary:C.t2,
              transition:'all 0.15s'}}
              onMouseEnter={e=>{if(tab!=='대시보드')e.currentTarget.style.background='#F0FAF7';}}
              onMouseLeave={e=>{if(tab!=='대시보드')e.currentTarget.style.background='transparent';}}>대시보드</button>
            {tabs.slice(1).map(t=>(
              <button key={t} onClick={()=>setTab(t)} style={{padding:'8px 18px',borderRadius:9,border:'none',cursor:'pointer',
                fontFamily:'inherit',fontSize:14,fontWeight:tab===t?600:400,
                background:tab===t?C.primaryLight:'transparent',color:tab===t?C.primary:C.t2,
                transition:'all 0.15s'}}
                onMouseEnter={e=>{if(tab!==t)e.currentTarget.style.background='#F0FAF7';}}
                onMouseLeave={e=>{if(tab!==t)e.currentTarget.style.background='transparent';}}>{t}</button>
            ))}
          </nav>
          <div style={{display:'flex',alignItems:'center',gap:14}}>
            <button style={{background:'none',border:'none',cursor:'pointer',position:'relative',padding:4}}>
              <Ic n='bell' sz={18} cl={C.t2}/>
              <span style={{position:'absolute',top:1,right:1,width:8,height:8,borderRadius:'50%',background:C.error,border:'2px solid #fff',animation:'pulseGreen 2s infinite'}}/>
            </button>
            <div style={{display:'flex',alignItems:'center',gap:8,cursor:'pointer',padding:'6px 10px',borderRadius:9,
              transition:'background 0.15s',background:'transparent'}}
              onMouseEnter={e=>e.currentTarget.style.background=C.primaryLight}
              onMouseLeave={e=>e.currentTarget.style.background='transparent'}>
              <div style={{width:30,height:30,borderRadius:'50%',background:`linear-gradient(135deg,${C.primary},#1A9E7A)`,
                display:'flex',alignItems:'center',justifyContent:'center'}}>
                <span style={{fontSize:12,fontWeight:700,color:'#fff'}}>김</span>
              </div>
              <div>
                <p style={{fontSize:13,fontWeight:600,color:C.t1}}>김민수</p>
                <p style={{fontSize:11,color:C.t3}}>그린라이프샵</p>
              </div>
              <Ic n='down' sz={14} cl={C.t3}/>
            </div>
          </div>
        </div>
      </header>
      {tab==='대시보드'&&(
        <div style={{background:`linear-gradient(135deg,${C.primary} 0%,#1A9E7A 100%)`,padding:'28px 24px'}}>
          <div style={{maxWidth:1280,margin:'0 auto',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
            <div>
              <p style={{fontSize:13,color:'rgba(255,255,255,0.75)',marginBottom:6}}>안녕하세요</p>
              <h1 style={{fontSize:26,fontWeight:800,color:'#fff',marginBottom:6}}>김민수 판매자님의 스토어</h1>
              <p style={{fontSize:14,color:'rgba(255,255,255,0.85)'}}>오늘도 좋은 판매 되세요. 오늘 신규 주문이 <strong>3건</strong> 있습니다.</p>
            </div>
            <div style={{display:'flex',gap:12}}>
              {[{label:'이번달 매출',value:'1,284만원'},{label:'처리 필요 주문',value:'5건'},{label:'품절 상품',value:'2개'}].map(s=>(
                <div key={s.label} style={{background:'rgba(255,255,255,0.15)',backdropFilter:'blur(8px)',borderRadius:12,
                  padding:'14px 20px',textAlign:'center',border:'1px solid rgba(255,255,255,0.2)'}}>
                  <p style={{fontSize:11,color:'rgba(255,255,255,0.7)',marginBottom:4}}>{s.label}</p>
                  <p style={{fontSize:22,fontWeight:700,color:'#fff'}}>{s.value}</p>
                </div>
              ))}
            </div>
          </div>
        </div>
      )}
      <main style={{maxWidth:1280,margin:'0 auto',padding:'24px'}}>
        {tab==='대시보드'&&<DashboardView orders={orders} products={products}/>}
        {tab==='상품 관리'&&<ProductsView products={products} setProducts={setProducts} showToast={showToast}/>}
        {tab==='주문 관리'&&<OrdersView orders={orders} setOrders={setOrders} showToast={showToast}/>}
        {tab==='마켓플레이스'&&<MarketplaceView/>}
      </main>
      {toast&&<Toast msg={toast.msg} type={toast.type}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
</script>
</body>
