// ── StatCard ───────────────────────────────────────────────
const StatCard=({icon,label,value,sub,delta,color,delay=0})=>{
  const [vis,setVis]=useState(false);
  useEffect(()=>{const t=setTimeout(()=>setVis(true),delay);return()=>clearTimeout(t);},[]);
  return(
    <div style={{...glassCard,padding:'20px 22px',animation:vis?'slideUp 0.4s ease':'none',opacity:vis?1:0,transition:'opacity 0.1s'}}
      onMouseEnter={e=>{e.currentTarget.style.border=`1px solid rgba(124,58,237,0.4)`;e.currentTarget.style.boxShadow=`0 8px 24px ${D.primaryGlow}`;}}
      onMouseLeave={e=>{e.currentTarget.style.border=`1px solid ${D.border}`;e.currentTarget.style.boxShadow='none';}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:14}}>
        <div style={{background:`${color}18`,borderRadius:8,padding:10,border:`1px solid ${color}30`}}>
          <Ph n={icon} sz={20} cl={color}/>
        </div>
        {delta!==null&&<span style={{fontSize:12,fontWeight:600,color:delta>0?D.success:D.error,
          background:delta>0?'rgba(16,185,129,0.1)':'rgba(239,68,68,0.1)',padding:'3px 8px',borderRadius:12,
          display:'flex',alignItems:'center',gap:3}}>
          <Ph n={delta>0?'trend':'down'} sz={10} cl={delta>0?D.success:D.error}/>
          {delta>0?'+':''}{delta}%
        </span>}
      </div>
      <p style={{fontSize:24,fontWeight:700,color:D.t1,marginBottom:4,animation:vis?'fadeInPage 0.5s ease':'none'}}>{value}</p>
      <p style={{fontSize:12,color:D.t2}}>{label}</p>
      {sub&&<p style={{fontSize:11,color:D.t3,marginTop:3}}>{sub}</p>}
    </div>
  );
};

const GmvChart=()=>{

const SettlementView=({showToast})=>{

                style={{flex:1,padding:'9px',borderRadius:8,border:`1px solid ${status==='활성'?D.error:D.success}`,
                  background:status==='활성'?'rgba(239,68,68,0.1)':'rgba(16,185,129,0.1)',
                  cursor:'pointer',fontSize:13,fontWeight:600,color:status==='활성'?D.error:D.success}}>
                {status==='활성'?'비활성화':'활성화'}
              </button>
              <button style={{flex:1,padding:'9px',borderRadius:8,border:`1px solid ${D.primaryLight}`,
                background:'rgba(124,58,237,0.1)',cursor:'pointer',fontSize:13,fontWeight:600,color:D.primaryLight}}>
                메시지
              </button>
            </div>
          </div>
          <div style={{...glassCard,padding:20}}>
            <h4 style={{fontSize:14,fontWeight:600,color:D.t1,marginBottom:12}}>판매자 정보</h4>
            {[
              {l:'대표자',v:vendor.owner},{l:'입점일',v:vendor.joined},{l:'등록 상품',v:`${vendor.products}개`},
              {l:'별점',v:`★ ${vendor.rating}`},{l:'판매자 ID',v:vendor.id}
            ].map(r=>(
              <div key={r.l} style={{display:'flex',justifyContent:'space-between',padding:'8px 0',borderBottom:`1px solid ${D.borderLight}`}}>
                <span style={{fontSize:12,color:D.t3}}>{r.l}</span>
                <span style={{fontSize:12,fontWeight:500,color:D.t1}}>{r.v}</span>
              </div>
            ))}
          </div>
        </div>
        <div style={{display:'flex',flexDirection:'column',gap:14}}>
          <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:12}}>
            {[
              {l:'총 매출',v:`${(vendor.sales/10000).toFixed(0)}만원`,icon:'coin',c:D.primaryLight},
              {l:'총 주문',v:`${vendor.orders}건`,icon:'chart-bar',c:D.accent},
              {l:'등록 상품',v:`${vendor.products}개`,icon:'grid',c:D.success},
            ].map(s=>(
              <div key={s.l} style={{...glassCard,padding:'16px 18px'}}>
                <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:8}}>
                  <Ph n={s.icon} sz={14} cl={s.c}/>
                  <span style={{fontSize:12,color:D.t3}}>{s.l}</span>
                </div>
                <p style={{fontSize:20,fontWeight:700,color:D.t1}}>{s.v}</p>
              </div>
            ))}
          </div>
          <div style={{...glassCard,padding:20}}>
            <h4 style={{fontSize:14,fontWeight:600,color:D.t1,marginBottom:14}}>최근 주문 현황</h4>
            <table style={{width:'100%',borderCollapse:'collapse'}}>
              <thead><tr>
                {['주문번호','상품','금액','상태','일자'].map(h=>(
                  <th key={h} style={{padding:'8px 10px',textAlign:'left',fontSize:11,color:D.t3,borderBottom:`1px solid ${D.border}`}}>{h}</th>
                ))}
              </tr></thead>
              <tbody>
                {[
                  {id:'ORD-0072',product:vendor.name+'의 베스트상품',amount:48000,status:'완료',date:'2024.05.15'},
                  {id:'ORD-0071',product:vendor.name+'의 신상품',amount:32000,status:'배송중',date:'2024.05.14'},
                  {id:'ORD-0070',product:vendor.name+'의 인기상품',amount:65000,status:'처리중',date:'2024.05.13'},
                ].map(o=>(
                  <tr key={o.id} style={{borderBottom:`1px solid ${D.borderLight}`}}>
                    <td style={{padding:'10px',fontSize:12,color:D.primaryLight}}>{o.id}</td>
                    <td style={{padding:'10px',fontSize:12,color:D.t1,maxWidth:160,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{o.product}</td>
                    <td style={{padding:'10px',fontSize:12,fontWeight:600,color:D.t1}}>{o.amount.toLocaleString()}원</td>
                    <td style={{padding:'10px'}}>
                      <span style={{padding:'2px 8px',borderRadius:12,fontSize:11,fontWeight:600,
                        color:{완료:D.success,배송중:'#8B5CF6',처리중:D.warning}[o.status],
                        background:{완료:'rgba(16,185,129,0.12)',배송중:'rgba(139,92,246,0.12)',처리중:'rgba(245,158,11,0.12)'}[o.status]}}>{o.status}</span>
                    </td>
                    <td style={{padding:'10px',fontSize:11,color:D.t3}}>{o.date}</td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
          <div style={{...glassCard,padding:20}}>
            <h4 style={{fontSize:14,fontWeight:600,color:D.t1,marginBottom:14}}>관리자 메모</h4>
            <textarea placeholder='이 판매자에 대한 메모를 입력하세요 (내부용)' rows={3}
              style={{width:'100%',background:'transparent',border:`1px solid ${D.border}`,borderRadius:8,
                padding:'10px 12px',color:D.t2,fontSize:13,resize:'none',outline:'none',fontFamily:'inherit'}}
              onFocus={e=>e.target.style.borderColor=D.primaryLight}
              onBlur={e=>e.target.style.borderColor=D.border}/>
            <div style={{display:'flex',justifyContent:'flex-end',marginTop:10}}>
              <button onClick={()=>showToast('메모가 저장되었습니다.')} style={{padding:'7px 16px',borderRadius:7,
                background:D.primaryLight,border:'none',cursor:'pointer',fontSize:13,fontWeight:600,color:'#fff'}}>저장</button>
            </div>
          </div>
        </div>
      </div>
    </div>
  );
};

const VendorsView=({showToast})=>{
  const [search,setSearch]=useState('');
  const [statusFilter,setStatusFilter]=useState('전체');
  const [detailVendor,setDetailVendor]=useState(null);
  const filtered=VENDORS.filter(v=>
    (statusFilter==='전체'||v.status===statusFilter)&&
    (v.name.includes(search)||v.owner.includes(search)||v.category.includes(search)));
  if(detailVendor)return <VendorDetailPage vendor={detailVendor} onBack={()=>setDetailVendor(null)} showToast={showToast}/>;
  return(
    <div style={{animation:'fadeInPage 0.35s ease'}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:22}}>
        <div>
          <h1 style={{fontSize:22,fontWeight:700,color:D.t1}}>판매자 관리</h1>
          <p style={{fontSize:13,color:D.t3,marginTop:4}}>총 {VENDORS.length}개 판매자</p>
        </div>
        <button style={{display:'flex',alignItems:'center',gap:7,padding:'9px 18px',borderRadius:8,
          border:`1px solid ${D.primaryLight}`,background:'rgba(124,58,237,0.1)',cursor:'pointer',
          fontSize:13,fontWeight:500,color:D.primaryLight}}>
          <Ph n='plus' sz={14} cl={D.primaryLight}/>판매자 초대
        </button>
      </div>
      <div style={{...glassCard,padding:'13px 16px',marginBottom:16,display:'flex',gap:14,alignItems:'center',flexWrap:'wrap'}}>
        <div style={{position:'relative',flex:1,minWidth:200}}>
          <Ph n='search' sz={14} cl={D.t3} st={{position:'absolute',left:10,top:'50%',transform:'translateY(-50%)'}}/>
          <input value={search} onChange={e=>setSearch(e.target.value)} placeholder='판매자명, 대표자, 카테고리 검색'
            style={{width:'100%',padding:'8px 12px 8px 32px',borderRadius:7,border:`1px solid ${D.border}`,
              background:D.bg2,color:D.t1,fontSize:13,outline:'none'}}
            onFocus={e=>e.target.style.borderColor=D.primaryLight}
            onBlur={e=>e.target.style.borderColor=D.border}/>
        </div>
        <div style={{display:'flex',gap:6}}>
          {['전체','활성','검토중','비활성'].map(s=>(
            <button key={s} onClick={()=>setStatusFilter(s)} style={{padding:'5px 12px',borderRadius:20,border:`1px solid ${statusFilter===s?stColor[s]||D.primaryLight:D.border}`,
              background:statusFilter===s?`${stColor[s]||D.primaryLight}15`:'transparent',cursor:'pointer',fontSize:12,
              color:statusFilter===s?stColor[s]||D.primaryLight:D.t2,fontWeight:statusFilter===s?600:400}}>{s}</button>
          ))}
        </div>
      </div>
      <div style={{...glassCard,overflow:'hidden'}}>
        <table style={{width:'100%',borderCollapse:'collapse'}}>
          <thead><tr style={{background:'rgba(255,255,255,0.03)'}}>
            {['판매자','카테고리','총 매출','주문','상품','등급','상태','가입일','관리'].map(h=>(
              <th key={h} style={{padding:'10px 14px',textAlign:'left',fontSize:11,color:D.t3,fontWeight:600,borderBottom:`1px solid ${D.border}`}}>{h}</th>
            ))}
          </tr></thead>
          <tbody>
            {filtered.map(v=>(
              <tr key={v.id} style={{borderBottom:`1px solid ${D.borderLight}`,cursor:'pointer',transition:'background 0.15s'}}
                onMouseEnter={e=>e.currentTarget.style.background='rgba(124,58,237,0.06)'}
                onMouseLeave={e=>e.currentTarget.style.background='transparent'}
                onClick={()=>setDetailVendor(v)}>
                <td style={{padding:'13px 14px'}}>
                  <div style={{display:'flex',alignItems:'center',gap:10}}>
                    <div style={{width:34,height:34,borderRadius:9,background:`linear-gradient(135deg,${D.primary},${D.primaryLight})`,
                      display:'flex',alignItems:'center',justifyContent:'center',fontSize:14,fontWeight:700,color:'#fff',flexShrink:0}}>
                      {v.name[0]}
                    </div>
                    <div>
                      <p style={{fontSize:13,fontWeight:600,color:D.t1}}>{v.name}</p>
                      <p style={{fontSize:11,color:D.t3}}>{v.owner}</p>
                    </div>
                  </div>
                </td>
                <td style={{padding:'13px 14px',fontSize:12,color:D.t2}}>{v.category}</td>
                <td style={{padding:'13px 14px',fontSize:13,fontWeight:600,color:D.t1}}>{(v.sales/10000).toFixed(0)}만원</td>
                <td style={{padding:'13px 14px',fontSize:13,color:D.t2}}>{v.orders}건</td>
                <td style={{padding:'13px 14px',fontSize:13,color:D.t2}}>{v.products}개</td>
                <td style={{padding:'13px 14px'}}>
                  <span style={{fontSize:12,fontWeight:700,color:gradeColor[v.grade]}}>{v.grade}</span>
                </td>
                <td style={{padding:'13px 14px'}}>
                  <span style={{padding:'3px 10px',borderRadius:20,fontSize:12,fontWeight:600,color:stColor[v.status],background:stBg[v.status]}}>{v.status}</span>
                </td>
                <td style={{padding:'13px 14px',fontSize:12,color:D.t3}}>{v.joined}</td>
                <td style={{padding:'13px 14px'}} onClick={e=>e.stopPropagation()}>
                  <button onClick={()=>setDetailVendor(v)} style={{display:'flex',alignItems:'center',gap:5,padding:'5px 12px',
                    borderRadius:6,border:`1px solid ${D.border}`,background:'transparent',cursor:'pointer',fontSize:12,color:D.t2}}>
                    <Ph n='eye' sz={12} cl={D.t2}/>상세
                  </button>
                </td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>
    </div>
  );
};

// ── App ─────────────────────────────────────────────────────
function App(){
  const [page,setPage]=useState('통합 대시보드');
  const [toast,setToast]=useState(null);
  const showToast=useCallback((msg,type='success')=>{setToast({msg,type});setTimeout(()=>setToast(null),3000);},[]);
  const navItems=[
    {label:'통합 대시보드',icon:'squares'},
    {label:'매출 분석',icon:'chart-bar'},
    {label:'정산 관리',icon:'wallet'},
    {label:'판매자 관리',icon:'users'},
  ];
  return(
    <div style={{width:'100%',minHeight:'100vh',background:D.bg}}>
      <header style={{position:'sticky',top:0,zIndex:100,background:'rgba(15,10,30,0.92)',backdropFilter:'blur(16px)',
        borderBottom:`1px solid ${D.border}`}}>
        <div style={{maxWidth:1360,margin:'0 auto',padding:'0 28px',height:62,display:'flex',alignItems:'center',gap:0}}>
          <div style={{display:'flex',alignItems:'center',gap:10,marginRight:36}}>
            <div style={{background:`linear-gradient(135deg,${D.primary},${D.primaryLight})`,borderRadius:10,padding:'8px 10px',
              boxShadow:`0 4px 12px ${D.primaryGlow}`}}>
              <Ph n='squares' sz={18} cl='#fff'/>
            </div>
            <div>
              <p style={{fontSize:16,fontWeight:800,color:D.t1,lineHeight:1}}>AdminHub</p>
              <p style={{fontSize:10,color:D.t3,lineHeight:1}}>Marketplace Operations</p>
            </div>
          </div>
          <nav style={{display:'flex',gap:2,flex:1}}>
            {navItems.map(({label,icon})=>(
              <button key={label} onClick={()=>setPage(label)} style={{display:'flex',alignItems:'center',gap:7,padding:'7px 16px',
                borderRadius:8,border:'none',cursor:'pointer',fontFamily:'inherit',fontSize:13,fontWeight:page===label?600:400,
                background:page===label?'rgba(124,58,237,0.15)':'transparent',color:page===label?D.primaryLight:D.t3,
                transition:'all 0.15s'}}
                onMouseEnter={e=>{if(page!==label){e.currentTarget.style.background='rgba(255,255,255,0.05)';e.currentTarget.style.color=D.t2;}}}
                onMouseLeave={e=>{if(page!==label){e.currentTarget.style.background='transparent';e.currentTarget.style.color=D.t3;}}}>
                <Ph n={icon} sz={14} cl={page===label?D.primaryLight:D.t3}/>
                {label}
              </button>
            ))}
          </nav>
          <div style={{display:'flex',alignItems:'center',gap:12}}>
            <button style={{background:'rgba(255,255,255,0.04)',border:`1px solid ${D.border}`,borderRadius:8,cursor:'pointer',padding:'7px 10px',
              position:'relative'}}>
              <Ph n='bell' sz={16} cl={D.t2}/>
              <span style={{position:'absolute',top:5,right:5,width:7,height:7,borderRadius:'50%',background:D.accent,animation:'glow 2s infinite'}}/>
            </button>
            <button style={{background:'rgba(255,255,255,0.04)',border:`1px solid ${D.border}`,borderRadius:8,cursor:'pointer',padding:'7px 10px'}}>
              <Ph n='gear' sz={16} cl={D.t2}/>
            </button>
            <div style={{display:'flex',alignItems:'center',gap:8,padding:'6px 12px',borderRadius:9,border:`1px solid ${D.border}`,cursor:'pointer',
              background:'rgba(255,255,255,0.03)'}}>
              <div style={{width:28,height:28,borderRadius:'50%',background:`linear-gradient(135deg,${D.primary},${D.accent})`,
                display:'flex',alignItems:'center',justifyContent:'center'}}>
                <span style={{fontSize:12,fontWeight:700,color:'#fff'}}>A</span>
              </div>
              <div>
                <p style={{fontSize:12,fontWeight:600,color:D.t1}}>Admin</p>
                <p style={{fontSize:10,color:D.t3}}>마스터 관리자</p>
              </div>
            </div>
          </div>
        </div>
      </header>
      <main style={{maxWidth:1360,margin:'0 auto',padding:'28px'}}>
        {page==='통합 대시보드'&&<MainView/>}
        {page==='매출 분석'&&<AnalyticsView showToast={showToast}/>}
        {page==='정산 관리'&&<SettlementView showToast={showToast}/>}
        {page==='판매자 관리'&&<VendorsView showToast={showToast}/>}
      </main>
      <footer style={{borderTop:`1px solid ${D.border}`,padding:'20px 28px',textAlign:'center',marginTop:20}}>
        <p style={{fontSize:12,color:D.t3}}>AdminHub Marketplace Operations Platform · 구현 데모 v1.0</p>
      </footer>
      {toast&&<Toast msg={toast.msg} type={toast.type}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
</script>
</body>
</html>
