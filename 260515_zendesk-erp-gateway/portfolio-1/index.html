    synced_ticket: { bg: '#DCFCE7', color: '#15803D', label: '연동됨' },
    failed: { bg: '#FEE2E2', color: '#B91C1C', label: '연동실패' },
    SUCCESS: { bg: '#DCFCE7', color: '#15803D', label: 'SUCCESS' },

  };
  const s = styles[status] || { bg: '#F3F4F6', color: '#6B7280', label: status };
  return (
    <span style={{ display: 'inline-flex', alignItems: 'center', padding: '2px 8px', borderRadius: 4, fontSize: 11, fontWeight: 600, background: s.bg, color: s.color }}>
      {s.label}
    </span>
  );
}

function PriorityBadge({ priority }) {
  const s = { high: { color: '#DC2626', label: '긴급' }, medium: { color: '#D97706', label: '보통' }, low: { color: '#6B7280', label: '낮음' } };
  const p = s[priority] || s.low;
  return <span style={{ fontSize: 11, fontWeight: 600, color: p.color }}>{p.label}</span>;
}

function Toast({ message, type, onClose }) {
  useEffect(() => {
    const t = setTimeout(onClose, 3500);
    return () => clearTimeout(t);
  }, []);
  const typeColor = { success: COLORS.success, error: COLORS.danger, info: COLORS.info };
  return (
    <div style={{ position: 'fixed', top: 20, right: 20, zIndex: 1000, display: 'flex', alignItems: 'center', gap: 10, padding: '12px 16px', background: COLORS.surface, border: `1px solid ${COLORS.border}`, borderRadius: 6, boxShadow: '0 4px 16px rgba(0,0,0,0.12)', animation: 'toastSlide 0.3s ease', minWidth: 280 }}>
      <Icon name={type === 'success' ? 'checkCircle' : 'alert'} size={16} color={typeColor[type] || COLORS.info} />
      <span style={{ fontSize: 13, color: COLORS.textPrimary }}>{message}</span>
      <button onClick={onClose} style={{ marginLeft: 'auto', background: 'none', border: 'none', cursor: 'pointer', padding: 2 }}>
        <Icon name="x" size={14} color={COLORS.textSecondary} />
      </button>
    </div>
  );
}

function Modal({ title, onClose, children, width = 600 }) {
  return (
    <div style={{ position: 'fixed', inset: 0, zIndex: 500, background: 'rgba(0,0,0,0.4)', display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
      <div style={{ background: COLORS.surface, borderRadius: 8, width, maxWidth: '90vw', maxHeight: '85vh', display: 'flex', flexDirection: 'column', animation: 'modalFadeIn 0.2s ease', boxShadow: '0 20px 60px rgba(0,0,0,0.2)' }}>
        <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', padding: '16px 20px', borderBottom: `1px solid ${COLORS.border}` }}>
          <span style={{ fontSize: 15, fontWeight: 600, color: COLORS.textPrimary }}>{title}</span>
          <button onClick={onClose} style={{ background: 'none', border: 'none', cursor: 'pointer', padding: 4, borderRadius: 4 }}>
            <Icon name="x" size={16} color={COLORS.textSecondary} />
          </button>
        </div>
        <div style={{ flex: 1, overflowY: 'auto', padding: '20px' }}>
          {children}
        </div>
      </div>
    </div>
  );
}

// 티켓 연동 관리 페이지
function TicketPage({ showToast }) {
  const [tab, setTab] = useState('all');
  const [selectedTicket, setSelectedTicket] = useState(null);
  const [retrying, setRetrying] = useState(false);

  const tabs = [
    { id: 'all', label: '전체', count: ticketData.length },
    { id: 'active', label: '처리중', count: ticketData.filter(t => t.status === '처리중').length },
    { id: 'failed', label: '연동 실패', count: ticketData.filter(t => t.syncStatus === 'failed').length },
  ];

  const filteredTickets = tab === 'all' ? ticketData
    : tab === 'active' ? ticketData.filter(t => t.status === '처리중')
    : ticketData.filter(t => t.syncStatus === 'failed');

    setRetrying(true);

      setRetrying(false);

      showToast('재처리 요청이 큐에 추가됐습니다.', 'success');

                { time: '14:32:15', event: '내부 시스템 요청 수신', status: 'success' },
                { time: '14:32:14', event: 'API 게이트웨이 라우팅', status: 'success' },
              ].map((h, i) => (
                <div key={i} style={{ display: 'flex', alignItems: 'center', gap: 10, marginBottom: 6 }}>
                  <Icon name={h.status === 'success' ? 'check' : 'alert'} size={13} color={h.status === 'success' ? COLORS.success : COLORS.danger} />
                  <span style={{ fontSize: 11, color: COLORS.textSecondary, width: 60 }}>{h.time}</span>
                  <span style={{ fontSize: 12, color: COLORS.textPrimary }}>{h.event}</span>

      )}

  );
}

      <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 20 }}>
        <div>
          <h1 style={{ fontSize: 20, fontWeight: 700, color: COLORS.textPrimary }}>사용자 및 조직 관리</h1>
          <p style={{ fontSize: 13, color: COLORS.textSecondary, marginTop: 4 }}>Zendesk 사용자·조직 CRUD 및 외부 DB 동기화</p>
        </div>
        <div style={{ display: 'flex', gap: 10 }}>
          <button onClick={handleBulkSync} disabled={syncing} style={{ display: 'flex', alignItems: 'center', gap: 6, padding: '8px 14px', background: COLORS.surface, color: syncing ? COLORS.textSecondary : COLORS.primary, border: `1px solid ${COLORS.primary}`, borderRadius: 6, fontSize: 13, fontWeight: 500, cursor: syncing ? 'wait' : 'pointer' }}>
            <Icon name="refresh" size={14} color={syncing ? COLORS.textSecondary : COLORS.primary} />
            {syncing ? '동기화 중...' : '일괄 동기화'}
          </button>
          <button onClick={() => setShowAddUser(true)} style={{ display: 'flex', alignItems: 'center', gap: 6, padding: '8px 14px', background: COLORS.primary, color: '#fff', border: 'none', borderRadius: 6, fontSize: 13, fontWeight: 500, cursor: 'pointer' }}>
            <Icon name="plus" size={14} color="#fff" />
            사용자 추가
          </button>
        </div>
      </div>

      {/* 동기화 현황 배지 */}
      <div style={{ display: 'flex', gap: 12, marginBottom: 16 }}>
        {[
          { label: '동기화됨', count: 4, color: COLORS.success, bg: '#DCFCE7' },
          { label: '불일치', count: 1, color: COLORS.warning, bg: '#FEF9C3' },
          { label: '미연동', count: 1, color: COLORS.textSecondary, bg: '#F3F4F6' },
        ].map((s, i) => (
          <div key={i} style={{ display: 'flex', alignItems: 'center', gap: 8, padding: '6px 14px', background: s.bg, borderRadius: 20, cursor: 'default' }}>
            <span style={{ fontSize: 18, fontWeight: 700, color: s.color }}>{s.count}</span>
            <span style={{ fontSize: 12, color: s.color }}>{s.label}</span>
          </div>
        ))}
      </div>

      {/* 탭 */}
      <div style={{ display: 'flex', gap: 0, borderBottom: `2px solid ${COLORS.border}`, marginBottom: 16 }}>
        {[{ id: 'users', label: '사용자', count: userData.length }, { id: 'orgs', label: '조직', count: orgData.length }].map(t => (
          <button key={t.id} onClick={() => setTab(t.id)} style={{ padding: '8px 18px', background: 'none', border: 'none', fontSize: 13, fontWeight: tab === t.id ? 600 : 400, color: tab === t.id ? COLORS.primary : COLORS.textSecondary, cursor: 'pointer', borderBottom: tab === t.id ? `2px solid ${COLORS.primary}` : '2px solid transparent', marginBottom: -2, transition: 'all 0.15s' }}>
            {t.label} ({t.count})
          </button>
        ))}
      </div>

      {tab === 'users' && (
        <div style={{ background: COLORS.surface, border: `1px solid ${COLORS.border}`, borderRadius: 6, overflow: 'hidden' }}>
          <div style={{ display: 'grid', gridTemplateColumns: '90px 110px 200px 100px 100px 90px 80px', padding: '8px 16px', background: '#F9FAFB', borderBottom: `1px solid ${COLORS.border}`, fontSize: 11, fontWeight: 600, color: COLORS.textSecondary, textTransform: 'uppercase', letterSpacing: 0.5 }}>
            <span>ID</span><span>이름</span><span>이메일</span><span>조직</span><span>ZD ID</span><span>권한</span><span>동기화</span>
          </div>
          {userData.map((u, i) => (
            <div key={u.id} onClick={() => setSelectedUser(u)} style={{ display: 'grid', gridTemplateColumns: '90px 110px 200px 100px 100px 90px 80px', padding: '11px 16px', borderBottom: i < userData.length - 1 ? `1px solid ${COLORS.border}` : 'none', fontSize: 12, color: COLORS.textPrimary, cursor: 'pointer', alignItems: 'center', transition: 'background 0.1s' }}
              onMouseEnter={e => e.currentTarget.style.background = '#F9FAFB'}
              onMouseLeave={e => e.currentTarget.style.background = ''}>
              <span style={{ fontSize: 11, color: COLORS.textSecondary }}>{u.id}</span>
              <span style={{ fontWeight: 500 }}>{u.name}</span>
              <span style={{ color: COLORS.textSecondary, fontSize: 11 }}>{u.email}</span>
              <span>{u.org}</span>
              <span style={{ fontSize: 11, color: u.zdId ? COLORS.textPrimary : COLORS.textSecondary }}>{u.zdId || '—'}</span>
              <span style={{ fontSize: 11, color: COLORS.textSecondary }}>{u.role}</span>
              <StatusBadge status={u.syncStatus} />
            </div>
          ))}
        </div>
      )}

      {tab === 'orgs' && (
        <div style={{ background: COLORS.surface, border: `1px solid ${COLORS.border}`, borderRadius: 6, overflow: 'hidden' }}>
          <div style={{ display: 'grid', gridTemplateColumns: '100px 150px 160px 70px 100px 90px', padding: '8px 16px', background: '#F9FAFB', borderBottom: `1px solid ${COLORS.border}`, fontSize: 11, fontWeight: 600, color: COLORS.textSecondary, textTransform: 'uppercase', letterSpacing: 0.5 }}>
            <span>ORG ID</span><span>조직명</span><span>도메인</span><span>멤버</span><span>ZD Org ID</span><span>동기화</span>
          </div>
          {orgData.map((o, i) => (
            <div key={o.id} style={{ display: 'grid', gridTemplateColumns: '100px 150px 160px 70px 100px 90px', padding: '11px 16px', borderBottom: i < orgData.length - 1 ? `1px solid ${COLORS.border}` : 'none', fontSize: 12, color: COLORS.textPrimary, cursor: 'pointer', alignItems: 'center', transition: 'background 0.1s' }}
              onMouseEnter={e => e.currentTarget.style.background = '#F9FAFB'}
              onMouseLeave={e => e.currentTarget.style.background = ''}
              onClick={() => showToast(`${o.name} 조직 상세를 조회합니다.`, 'info')}>
              <span style={{ fontSize: 11, color: COLORS.textSecondary }}>{o.id}</span>
              <span style={{ fontWeight: 500 }}>{o.name}</span>
              <span style={{ color: COLORS.textSecondary, fontSize: 11 }}>{o.domain}</span>
              <span style={{ textAlign: 'center' }}>{o.memberCount}명</span>
              <span style={{ fontSize: 11, color: o.zdId ? COLORS.textPrimary : COLORS.textSecondary }}>{o.zdId || '—'}</span>
              <StatusBadge status={o.syncStatus} />
            </div>
          ))}
        </div>
      )}

      {/* 사용자 추가 모달 */}
      {showAddUser && (
        <Modal title="사용자 추가" onClose={() => setShowAddUser(false)} width={460}>
          <div style={{ display: 'flex', flexDirection: 'column', gap: 14 }}>
            {[
              { label: '이름 *', key: 'name', placeholder: '홍길동' },
              { label: '이메일 *', key: 'email', placeholder: 'hong@company.co.kr' },
              { label: '소속 조직', key: 'org', placeholder: '기술지원팀' },
            ].map(f => (
              <div key={f.key}>
                <label style={{ display: 'block', fontSize: 12, color: COLORS.textSecondary, marginBottom: 5 }}>{f.label}</label>
                <input placeholder={f.placeholder} value={newUser[f.key]} onChange={e => setNewUser(p => ({ ...p, [f.key]: e.target.value }))} style={{ width: '100%', padding: '8px 10px', borderRadius: 4, border: `1px solid ${COLORS.border}`, fontSize: 13, color: COLORS.textPrimary, outline: 'none' }} />
              </div>
            ))}
            <div>
              <label style={{ display: 'block', fontSize: 12, color: COLORS.textSecondary, marginBottom: 5 }}>권한</label>
              <select value={newUser.role} onChange={e => setNewUser(p => ({ ...p, role: e.target.value }))} style={{ width: '100%', padding: '8px 10px', borderRadius: 4, border: `1px solid ${COLORS.border}`, fontSize: 13, color: COLORS.textPrimary, background: COLORS.surface }}>
                <option>상담사</option>
                <option>관리자</option>
              </select>
            </div>
            <div style={{ display: 'flex', gap: 10, paddingTop: 4 }}>
              <button onClick={() => setShowAddUser(false)} style={{ flex: 1, padding: '9px 0', background: COLORS.surface, color: COLORS.textSecondary, border: `1px solid ${COLORS.border}`, borderRadius: 6, fontSize: 13, cursor: 'pointer' }}>취소</button>
              <button onClick={handleAddUser} style={{ flex: 1, padding: '9px 0', background: COLORS.primary, color: '#fff', border: 'none', borderRadius: 6, fontSize: 13, fontWeight: 500, cursor: 'pointer' }}>Zendesk에 추가</button>
            </div>
          </div>
        </Modal>
      )}

      {/* 사용자 상세 모달 */}
      {selectedUser && (
        <Modal title={`사용자 상세 — ${selectedUser.id}`} onClose={() => setSelectedUser(null)} width={480}>
          <div style={{ display: 'flex', flexDirection: 'column', gap: 14 }}>
            <div style={{ display: 'flex', alignItems: 'center', gap: 14, padding: 14, background: '#F9FAFB', borderRadius: 6 }}>
              <div style={{ width: 48, height: 48, borderRadius: '50%', background: COLORS.primary, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
                <span style={{ fontSize: 18, fontWeight: 700, color: '#fff' }}>{selectedUser.name[0]}</span>
              </div>
              <div>
                <div style={{ fontSize: 16, fontWeight: 700, color: COLORS.textPrimary }}>{selectedUser.name}</div>
                <div style={{ fontSize: 12, color: COLORS.textSecondary }}>{selectedUser.email}</div>
              </div>
            </div>
            {[
              ['소속 조직', selectedUser.org],
              ['권한', selectedUser.role],
              ['Zendesk ID', selectedUser.zdId || '미연동'],
              ['동기화 상태', <StatusBadge status={selectedUser.syncStatus} />],
              ['최종 업데이트', selectedUser.updated],
            ].map(([k, v], i) => (
              <div key={i} style={{ display: 'flex', alignItems: 'center', gap: 12 }}>
                <div style={{ width: 100, fontSize: 11, color: COLORS.textSecondary }}>{k}</div>
                <div style={{ fontSize: 13, color: COLORS.textPrimary, fontWeight: 500 }}>{v}</div>
              </div>
            ))}
            <div style={{ display: 'flex', gap: 10, paddingTop: 6 }}>
              <button onClick={() => { setSelectedUser(null); showToast(`${selectedUser.name} 동기화 요청을 전송했습니다.`, 'success'); }} style={{ flex: 1, padding: '9px 0', background: COLORS.surface, color: COLORS.primary, border: `1px solid ${COLORS.primary}`, borderRadius: 6, fontSize: 13, fontWeight: 500, cursor: 'pointer' }}>동기화</button>
              <button onClick={() => { setSelectedUser(null); showToast('사용자 정보를 편집합니다.', 'info'); }} style={{ flex: 1, padding: '9px 0', background: COLORS.primary, color: '#fff', border: 'none', borderRadius: 6, fontSize: 13, fontWeight: 500, cursor: 'pointer' }}>편집</button>
            </div>
          </div>
        </Modal>
      )}
    </div>
  );
}

// 메인 App
function App() {
  const [currentPage, setCurrentPage] = useState('main');
  const [toast, setToast] = useState(null);

  const showToast = (message, type = 'success') => setToast({ message, type });

  const navItems = [
    { id: 'main', label: '통합 대시보드', icon: 'dashboard' },
    { id: 'ticket', label: '티켓 연동 관리', icon: 'ticket' },
    { id: 'audit', label: '감사로그 조회', icon: 'audit' },
    { id: 'users', label: '사용자 및 조직 관리', icon: 'users' },
  ];

  const secondaryNav = [
    { id: 'settings', label: '설정', icon: 'settings' },
  ];

  const pageComponents = {
    main: <DashboardPage showToast={showToast} />,
    ticket: <TicketPage showToast={showToast} />,
    audit: <AuditPage showToast={showToast} />,
    users: <UsersPage showToast={showToast} />,
  };

  return (
    <div style={{ display: 'flex', height: '100vh', width: '100%', overflow: 'hidden' }}>
      {/* 사이드바 */}
      <div style={{ width: 232, background: COLORS.primary, display: 'flex', flexDirection: 'column', flexShrink: 0 }}>
        {/* 로고 */}
        <div style={{ padding: '20px 16px 16px', borderBottom: '1px solid rgba(255,255,255,0.1)' }}>
          <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
            <div style={{ width: 32, height: 32, background: '#fff', borderRadius: 6, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
              <Icon name="server" size={16} color={COLORS.primary} />
            </div>
            <div>
              <div style={{ fontSize: 13, fontWeight: 700, color: '#fff', lineHeight: 1.2 }}>API Gateway</div>
              <div style={{ fontSize: 10, color: 'rgba(255,255,255,0.5)' }}>관리 콘솔 v2.1</div>
            </div>
          </div>
        </div>

        {/* 환경 배지 */}
        <div style={{ padding: '10px 16px' }}>
          <span style={{ fontSize: 10, fontWeight: 600, padding: '3px 8px', borderRadius: 10, background: '#16A34A', color: '#fff' }}>PRODUCTION</span>
        </div>

        {/* 네비게이션 */}
        <div style={{ flex: 1, padding: '4px 8px', overflowY: 'auto' }}>
          <div style={{ fontSize: 10, fontWeight: 600, color: 'rgba(255,255,255,0.4)', padding: '4px 8px 8px', letterSpacing: 1, textTransform: 'uppercase' }}>메뉴</div>
          {navItems.map((item, i) => {
            const active = currentPage === item.id;
            return (
              <button key={item.id} onClick={() => setCurrentPage(item.id)}
                style={{ width: '100%', display: 'flex', alignItems: 'center', gap: 10, padding: '9px 10px', borderRadius: 6, background: active ? 'rgba(255,255,255,0.15)' : 'none', border: 'none', color: active ? '#fff' : 'rgba(255,255,255,0.65)', cursor: 'pointer', fontSize: 13, fontWeight: active ? 600 : 400, textAlign: 'left', transition: 'all 0.15s', marginBottom: 2, animation: `slideInLeft 0.18s ${i * 0.04}s both` }}
                onMouseEnter={e => { if (!active) e.currentTarget.style.background = 'rgba(255,255,255,0.08)'; }}
                onMouseLeave={e => { if (!active) e.currentTarget.style.background = 'none'; }}>
                <Icon name={item.icon} size={15} color={active ? '#fff' : 'rgba(255,255,255,0.65)'} />
                {item.label}
                {active && <Icon name="chevronRight" size={12} color="rgba(255,255,255,0.6)" style={{ marginLeft: 'auto' }} />}
              </button>
            );
          })}

          <div style={{ fontSize: 10, fontWeight: 600, color: 'rgba(255,255,255,0.4)', padding: '12px 8px 8px', letterSpacing: 1, textTransform: 'uppercase' }}>시스템</div>
          {secondaryNav.map(item => (
            <button key={item.id} onClick={() => showToast('설정 페이지로 이동합니다.', 'info')}
              style={{ width: '100%', display: 'flex', alignItems: 'center', gap: 10, padding: '9px 10px', borderRadius: 6, background: 'none', border: 'none', color: 'rgba(255,255,255,0.55)', cursor: 'pointer', fontSize: 13, textAlign: 'left', transition: 'all 0.15s', marginBottom: 2 }}
              onMouseEnter={e => e.currentTarget.style.background = 'rgba(255,255,255,0.08)'}
              onMouseLeave={e => e.currentTarget.style.background = 'none'}>
              <Icon name={item.icon} size={15} color="rgba(255,255,255,0.55)" />
              {item.label}
            </button>
          ))}
        </div>

        {/* 사용자 정보 */}
        <div style={{ padding: '12px 16px', borderTop: '1px solid rgba(255,255,255,0.1)', display: 'flex', alignItems: 'center', gap: 10 }}>
          <div style={{ width: 30, height: 30, borderRadius: '50%', background: 'rgba(255,255,255,0.2)', display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
            <span style={{ fontSize: 12, fontWeight: 700, color: '#fff' }}>관</span>
          </div>
          <div style={{ flex: 1, minWidth: 0 }}>
            <div style={{ fontSize: 12, fontWeight: 600, color: '#fff', overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>시스템 관리자</div>
            <div style={{ fontSize: 10, color: 'rgba(255,255,255,0.5)' }}>admin@corp.co.kr</div>
          </div>
          <button onClick={() => showToast('로그아웃합니다.', 'info')} style={{ background: 'none', border: 'none', cursor: 'pointer', padding: 4 }}>
            <Icon name="logOut" size={14} color="rgba(255,255,255,0.5)" />
          </button>
        </div>
      </div>

      {/* 메인 영역 */}
      <div style={{ flex: 1, display: 'flex', flexDirection: 'column', overflow: 'hidden' }}>
        {/* 탑바 */}
        <div style={{ height: 52, background: COLORS.surface, borderBottom: `1px solid ${COLORS.border}`, display: 'flex', alignItems: 'center', padding: '0 24px', gap: 16, flexShrink: 0 }}>
          <div style={{ flex: 1, display: 'flex', alignItems: 'center', gap: 8, padding: '6px 10px', background: '#F9FAFB', borderRadius: 6, border: `1px solid ${COLORS.border}`, maxWidth: 280 }}>
            <Icon name="search" size={13} color={COLORS.textSecondary} />
            <input placeholder="티켓 ID, 사용자 검색..." style={{ background: 'none', border: 'none', outline: 'none', fontSize: 12, color: COLORS.textPrimary, width: '100%' }} />
          </div>
          <button onClick={() => showToast('알림이 없습니다.', 'info')} style={{ background: 'none', border: 'none', cursor: 'pointer', padding: 6, borderRadius: 6, position: 'relative' }}>
            <Icon name="bell" size={16} color={COLORS.textSecondary} />
            <span style={{ position: 'absolute', top: 4, right: 4, width: 7, height: 7, borderRadius: '50%', background: COLORS.danger, border: `2px solid ${COLORS.surface}` }} />
          </button>
          <div style={{ display: 'flex', alignItems: 'center', gap: 8, fontSize: 12, color: COLORS.textSecondary }}>
            <div style={{ width: 6, height: 6, borderRadius: '50%', background: COLORS.success }} />
            시스템 정상
          </div>
        </div>

        {/* 콘텐츠 영역 */}
        <div style={{ flex: 1, overflowY: 'auto' }}>
          {pageComponents[currentPage] || pageComponents.main}
        </div>
      </div>

      {/* 토스트 */}
      {toast && <Toast message={toast.message} type={toast.type} onClose={() => setToast(null)} />}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
