function Badge({ status }) {
  const map = {
    processed: { bg: '#D1FAE5', color: '#065F46', text: '처리완료' },
    failed: { bg: '#FEE2E2', color: '#991B1B', text: '실패' },

    success: { bg: '#D1FAE5', color: '#065F46', text: '성공' },
    active: { bg: '#CFFAFE', color: '#155E75', text: '활성' },
    expiring: { bg: '#FEF3C7', color: '#92400E', text: '만료임박' },
    expired: { bg: '#FEE2E2', color: '#991B1B', text: '만료' },
    running: { bg: '#DBEAFE', color: '#1E40AF', text: '실행중' },
    stopped: { bg: '#F3F4F6', color: '#6B7280', text: '중단' },
  };
  const s = map[status] || { bg: '#F3F4F6', color: '#6B7280', text: status };
  return <span style={{ display: 'inline-flex', alignItems: 'center', padding: '2px 8px', borderRadius: 4, fontSize: 11, fontWeight: 600, background: s.bg, color: s.color }}>{s.text}</span>;
}

function Toast({ message, type, onClose }) {
  useEffect(() => { const t = setTimeout(onClose, 3500); return () => clearTimeout(t); }, []);
  const icons = { success: 'ti-circle-check', error: 'ti-alert-circle', info: 'ti-info-circle' };
  const colors = { success: C.success, error: C.danger, info: C.info };
  return (
    <div style={{ position: 'fixed', top: 72, right: 20, zIndex: 1000, display: 'flex', alignItems: 'center', gap: 10, padding: '12px 16px', background: C.surface, border: `1px solid ${C.border}`, borderRadius: 8, boxShadow: '0 8px 24px rgba(13,110,110,0.15)', animation: 'toastPop 0.3s ease', minWidth: 280 }}>
      <i className={`ti ${icons[type] || 'ti-info-circle'}`} style={{ fontSize: 18, color: colors[type] || C.info }} />
      <span style={{ fontSize: 13, color: C.text }}>{message}</span>
      <button onClick={onClose} style={{ marginLeft: 'auto', background: 'none', border: 'none', cursor: 'pointer', padding: 2 }}>
        <i className="ti ti-x" style={{ fontSize: 15, color: C.textMuted }} />
      </button>
    </div>
  );
}

// ERP 연동 관리
function ErpPage({ showToast }) {
  const [selected, setSelected] = useState(null);
  const [retrying, setRetrying] = useState(false);
  const [typeFilter, setTypeFilter] = useState('all');
  const [statusFilter, setStatusFilter] = useState('all');

  const filtered = erpEventData.filter(e =>
    (typeFilter === 'all' || e.type.startsWith(typeFilter)) &&
    (statusFilter === 'all' || e.status === statusFilter)
  );

  const handleRetry = () => {
    setRetrying(true);
    setTimeout(() => {
      setRetrying(false);
      setSelected(null);

        <select value={typeFilter} onChange={e => setTypeFilter(e.target.value)} style={{ padding: '6px 10px', borderRadius: 6, border: `1px solid ${C.border}`, fontSize: 12, color: C.text, background: C.surface }}>

          <option value="CUSTOMER">고객 관련</option>

          <option value="all">전체 상태</option>
          <option value="processed">처리완료</option>
          <option value="failed">실패</option>

        </div>
        {filtered.map((ev, i) => (
          <div key={ev.id} onClick={() => setSelected(ev)} style={{ display: 'grid', gridTemplateColumns: '100px 160px 140px 1fr 80px 80px', padding: '12px 18px', borderBottom: i < filtered.length - 1 ? `1px solid ${C.border}` : 'none', fontSize: 12, color: C.text, cursor: 'pointer', alignItems: 'center', transition: 'background 0.12s' }}
            onMouseEnter={e => e.currentTarget.style.background = '#F0F9F9'}
            onMouseLeave={e => e.currentTarget.style.background = ''}>
            <span style={{ fontWeight: 600, color: C.primary, fontSize: 11 }}>{ev.id}</span>
            <span style={{ color: C.textMuted, fontSize: 11 }}>{ev.time.split(' ')[1]}</span>
            <span style={{ fontFamily: 'monospace', fontSize: 11, fontWeight: 500 }}>{ev.type}</span>
            <span style={{ overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap', paddingRight: 12 }}>{ev.payload}</span>
            <span style={{ fontSize: 11, color: ev.status === 'processed' ? C.textMuted : C.danger }}>{ev.status === 'processed' ? `${ev.latency}ms` : '—'}</span>
            <Badge status={ev.status} />
          </div>
        ))}
      </div>

      {/* Drawer */}
      {selected && (
        <Drawer title={`ERP 이벤트 상세 — ${selected.id}`} onClose={() => setSelected(null)}>
          <div style={{ display: 'flex', flexDirection: 'column', gap: 16 }}>
            <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 14 }}>
              {[
                ['이벤트 ID', selected.id],
                ['수신 시각', selected.time],
                ['이벤트 유형', selected.type],
                ['응답시간', selected.status === 'processed' ? `${selected.latency}ms` : '—'],
                ['처리 상태', <Badge status={selected.status} />],
              ].map(([k, v], i) => (
                <div key={i}>
                  <div style={{ fontSize: 11, color: C.textMuted, marginBottom: 4 }}>{k}</div>
                  <div style={{ fontSize: 13, fontWeight: 500, color: C.text }}>{v}</div>
                </div>
              ))}
            </div>

            <div>
              <div style={{ fontSize: 12, fontWeight: 600, color: C.text, marginBottom: 8 }}>원본 페이로드</div>
              <div style={{ background: '#0F2C2C', borderRadius: 6, padding: 16, fontFamily: 'monospace', fontSize: 11, color: '#94A3B8', lineHeight: 1.8 }}>
                <div style={{ color: '#34D399' }}>{'{'}</div>
                <div>&nbsp;&nbsp;<span style={{ color: '#67E8F9' }}>"eventId"</span>: <span style={{ color: '#FCD34D' }}>"{selected.id}"</span>,</div>
                <div>&nbsp;&nbsp;<span style={{ color: '#67E8F9' }}>"type"</span>: <span style={{ color: '#FCD34D' }}>"{selected.type}"</span>,</div>
                <div>&nbsp;&nbsp;<span style={{ color: '#67E8F9' }}>"summary"</span>: <span style={{ color: '#FCD34D' }}>"{selected.payload}"</span>,</div>
                <div>&nbsp;&nbsp;<span style={{ color: '#67E8F9' }}>"receivedAt"</span>: <span style={{ color: '#FCD34D' }}>"{selected.time}"</span>,</div>
                <div>&nbsp;&nbsp;<span style={{ color: '#67E8F9' }}>"attempts"</span>: <span style={{ color: '#A78BFA' }}>{selected.status === 'dlq' ? 3 : 1}</span></div>
                <div style={{ color: '#34D399' }}>{'}'}</div>
              </div>
            </div>

            <div>
              <div style={{ fontSize: 12, fontWeight: 600, color: C.text, marginBottom: 8 }}>처리 이력</div>
              {(selected.status === 'dlq'
                ? [{ t: '14:14:52', s: 'received', l: '이벤트 수신' }, { t: '14:14:53', s: 'fail', l: '1차 처리 실패 (timeout)' }, { t: '14:15:23', s: 'fail', l: '2차 재시도 실패 (timeout)' }, { t: '14:16:23', s: 'fail', l: '3차 재시도 실패 → DLQ 격리' }]
                : selected.status === 'failed'
                ? [{ t: selected.time.split(' ')[1], s: 'received', l: '이벤트 수신' }, { t: selected.time.split(' ')[1], s: 'fail', l: '처리 실패 (연결 오류)' }]
                : [{ t: selected.time.split(' ')[1], s: 'received', l: '이벤트 수신' }, { t: selected.time.split(' ')[1], s: 'success', l: `처리 완료 (${selected.latency}ms)` }]
              ).map((h, i) => (
                <div key={i} style={{ display: 'flex', alignItems: 'center', gap: 10, marginBottom: 8 }}>
                  <i className={`ti ${h.s === 'success' ? 'ti-circle-check' : h.s === 'fail' ? 'ti-circle-x' : 'ti-clock'}`} style={{ fontSize: 15, color: h.s === 'success' ? C.success : h.s === 'fail' ? C.danger : C.textMuted }} />
                  <span style={{ fontSize: 11, color: C.textMuted, width: 60, flexShrink: 0 }}>{h.t}</span>
                  <span style={{ fontSize: 12, color: C.text }}>{h.l}</span>
                </div>
              ))}
            </div>

            {(selected.status === 'failed' || selected.status === 'dlq') && (
              <button onClick={handleRetry} disabled={retrying} style={{ display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 8, padding: '10px 0', background: retrying ? '#E5E7EB' : C.primary, color: retrying ? C.textMuted : '#fff', border: 'none', borderRadius: 8, fontSize: 13, fontWeight: 500, cursor: retrying ? 'wait' : 'pointer', marginTop: 4 }}>
                <i className={`ti ti-refresh`} style={{ fontSize: 15, animation: retrying ? 'pulse 1s infinite' : 'none' }} />
                {retrying ? '재처리 중...' : 'Dead Letter Queue에서 재처리'}
              </button>
            )}
          </div>
        </Drawer>
      )}
    </div>
  );
}

// 배치 작업 스케줄러
function BatchPage({ showToast }) {
  const [jobs, setJobs] = useState(batchJobData);
  const [selectedJob, setSelectedJob] = useState(null);
  const [showManual, setShowManual] = useState(false);
  const [running, setRunning] = useState(null);

  const toggleActive = (id) => {
    setJobs(prev => prev.map(j => j.id === id ? { ...j, active: !j.active } : j));
    const job = jobs.find(j => j.id === id);
    showToast(`${job.name} 스케줄을 ${job.active ? '중단' : '활성화'}했습니다.`, 'success');
  };

  const handleManualRun = (job) => {
    setRunning(job.id);
    setTimeout(() => {
      setRunning(null);
      showToast(`${job.name} 수동 실행이 완료됐습니다.`, 'success');
      setShowManual(false);
    }, 2800);
  };

  return (
    <div style={{ padding: '28px 40px' }} className="page-fade">
      <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 20 }}>
        <div>
          <h2 style={{ fontSize: 20, fontWeight: 700, color: C.text }}>배치 작업 스케줄러</h2>
          <p style={{ fontSize: 13, color: C.textMuted, marginTop: 4 }}>정기 배치 스케줄 관리, 수동 실행, 실행 로그 조회</p>
        </div>
        <button onClick={() => setShowManual(true)} style={{ display: 'flex', alignItems: 'center', gap: 6, padding: '8px 16px', background: C.primary, color: '#fff', border: 'none', borderRadius: 8, fontSize: 13, fontWeight: 500, cursor: 'pointer' }}>
          <i className="ti ti-player-play" style={{ fontSize: 15 }} />
          수동 실행
        </button>
      </div>

      {/* 통계 요약 */}
      <div style={{ display: 'grid', gridTemplateColumns: 'repeat(4, 1fr)', gap: 14, marginBottom: 22 }}>
        {[
          { label: '활성 배치', value: jobs.filter(j => j.active).length + '개', icon: 'ti-clock-play', color: C.primary },
          { label: '오늘 총 실행', value: '87회', icon: 'ti-repeat', color: C.accent },
          { label: '성공률', value: '96.2%', icon: 'ti-chart-bar', color: C.success },
          { label: '실패 작업', value: jobs.filter(j => j.status === 'failed').length + '개', icon: 'ti-alert-triangle', color: C.warning },
        ].map((s, i) => (
          <div key={i} className="card-up" style={{ animationDelay: `${i * 0.04}s`, background: C.surface, borderRadius: 10, padding: '16px 18px', border: `1px solid ${C.border}`, boxShadow: '0 2px 8px rgba(13,110,110,0.06)', display: 'flex', alignItems: 'center', gap: 14 }}>
            <div style={{ width: 40, height: 40, borderRadius: 10, background: `${s.color}18`, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
              <i className={`ti ${s.icon}`} style={{ fontSize: 20, color: s.color }} />
            </div>
            <div>
              <div style={{ fontSize: 22, fontWeight: 700, color: C.text }}>{s.value}</div>
              <div style={{ fontSize: 11, color: C.textMuted }}>{s.label}</div>
            </div>
          </div>
        ))}
      </div>

      {/* 배치 작업 목록 */}
      <div style={{ background: C.surface, borderRadius: 10, border: `1px solid ${C.border}`, overflow: 'hidden', boxShadow: '0 2px 12px rgba(13,110,110,0.06)' }}>
        <div style={{ display: 'grid', gridTemplateColumns: '180px 120px 140px 100px 80px 80px 100px', padding: '9px 18px', background: '#E8F5F5', borderBottom: `1px solid ${C.border}`, fontSize: 11, fontWeight: 600, color: C.textMuted, textTransform: 'uppercase', letterSpacing: 0.5 }}>
          <span>작업명</span><span>크론 스케줄</span><span>마지막 실행</span><span>소요 시간</span><span>처리 건수</span><span>결과</span><span>액션</span>
        </div>
        {jobs.map((job, i) => (
          <div key={job.id} style={{ display: 'grid', gridTemplateColumns: '180px 120px 140px 100px 80px 80px 100px', padding: '13px 18px', borderBottom: i < jobs.length - 1 ? `1px solid ${C.border}` : 'none', fontSize: 12, color: C.text, alignItems: 'center', transition: 'background 0.12s' }}
            onMouseEnter={e => e.currentTarget.style.background = '#F0F9F9'}
            onMouseLeave={e => e.currentTarget.style.background = ''}>
            <div>
              <div style={{ fontWeight: 600, display: 'flex', alignItems: 'center', gap: 6 }}>
                <div style={{ width: 7, height: 7, borderRadius: '50%', background: job.active ? C.success : C.textMuted, animation: job.active && running === job.id ? 'pulse 1s infinite' : 'none' }} />
                {job.name}
              </div>
            </div>
            <span style={{ fontFamily: 'monospace', fontSize: 11, color: C.textMuted }}>{job.cron}</span>
            <span style={{ fontSize: 11, color: C.textMuted }}>{job.lastRun.split(' ')[1]}</span>
            <span style={{ fontSize: 11 }}>{running === job.id ? '실행 중...' : job.duration}</span>
            <span style={{ textAlign: 'center' }}>{running === job.id ? '—' : job.processed.toLocaleString()}</span>
            <Badge status={running === job.id ? 'running' : job.status} />
            <div style={{ display: 'flex', gap: 6 }}>
              <button onClick={() => handleManualRun(job)} disabled={!!running || !job.active} style={{ padding: '4px 10px', background: !!running || !job.active ? '#F3F4F6' : `${C.primary}18`, color: !!running || !job.active ? C.textMuted : C.primary, border: 'none', borderRadius: 4, fontSize: 11, fontWeight: 500, cursor: !!running || !job.active ? 'not-allowed' : 'pointer' }}>
                실행
              </button>
              <button onClick={() => toggleActive(job.id)} style={{ padding: '4px 8px', background: 'none', border: `1px solid ${C.border}`, borderRadius: 4, fontSize: 11, color: C.textMuted, cursor: 'pointer' }}>
                {job.active ? '중단' : '활성'}
              </button>
            </div>
          </div>
        ))}
      </div>

      {/* 수동 실행 모달 */}
      {showManual && (
        <Modal title="배치 작업 수동 실행" onClose={() => setShowManual(false)}>
          <div style={{ display: 'flex', flexDirection: 'column', gap: 10 }}>
            <p style={{ fontSize: 13, color: C.textMuted, marginBottom: 8 }}>실행할 배치 작업을 선택하세요.</p>
            {jobs.map(job => (
              <div key={job.id} style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', padding: '12px 16px', background: '#F0F9F9', borderRadius: 8, border: `1px solid ${C.border}` }}>
                <div>
                  <div style={{ fontSize: 13, fontWeight: 600, color: C.text }}>{job.name}</div>
                  <div style={{ fontSize: 11, color: C.textMuted, marginTop: 2 }}>{job.cron} · 마지막 실행: {job.lastRun.split(' ')[1]}</div>
                </div>
                <button onClick={() => handleManualRun(job)} disabled={!!running} style={{ padding: '7px 16px', background: running === job.id ? '#E5E7EB' : C.primary, color: running === job.id ? C.textMuted : '#fff', border: 'none', borderRadius: 6, fontSize: 12, fontWeight: 500, cursor: !!running ? 'wait' : 'pointer' }}>
                  {running === job.id ? '실행 중...' : '실행'}
                </button>
              </div>
            ))}
          </div>
        </Modal>
      )}
    </div>
  );
}

            onMouseLeave={e => e.currentTarget.style.background = ''}>
            <span style={{ fontWeight: 600, color: C.primary, fontSize: 11 }}>{lic.id}</span>
            <span style={{ fontWeight: 500 }}>{lic.product}</span>
            <span>{lic.customer}</span>
            <span style={{ fontSize: 11, color: C.textMuted }}>{lic.issued}</span>
            <span style={{ fontSize: 11, color: lic.status === 'expiring' ? C.warning : lic.status === 'expired' ? C.danger : C.textMuted, fontWeight: lic.status !== 'active' ? 600 : 400 }}>{lic.expires}</span>
            <span style={{ textAlign: 'center' }}>{lic.seats}석</span>
            <Badge status={lic.status} />
          </div>
        ))}
      </div>

      {/* 라이선스 발급 모달 */}
      {showIssue && (
        <Modal title="라이선스 신규 발급" onClose={() => setShowIssue(false)}>
          <div style={{ display: 'flex', flexDirection: 'column', gap: 16 }}>
            <div>
              <label style={{ display: 'block', fontSize: 12, color: C.textMuted, marginBottom: 6 }}>제품 유형</label>
              <select value={newLic.product} onChange={e => setNewLic(p => ({ ...p, product: e.target.value }))} style={{ width: '100%', padding: '9px 12px', borderRadius: 6, border: `1px solid ${C.border}`, fontSize: 13, color: C.text, background: C.surface }}>
                <option>Enterprise Suite</option>
                <option>Professional</option>
                <option>Standard</option>
              </select>
            </div>
            <div>
              <label style={{ display: 'block', fontSize: 12, color: C.textMuted, marginBottom: 6 }}>고객사 *</label>
              <input placeholder="예: 삼광솔루션즈" value={newLic.customer} onChange={e => setNewLic(p => ({ ...p, customer: e.target.value }))} style={{ width: '100%', padding: '9px 12px', borderRadius: 6, border: `1px solid ${C.border}`, fontSize: 13, color: C.text, outline: 'none' }} />
            </div>
            <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 12 }}>
              <div>
                <label style={{ display: 'block', fontSize: 12, color: C.textMuted, marginBottom: 6 }}>좌석 수</label>
                <input type="number" min="1" value={newLic.seats} onChange={e => setNewLic(p => ({ ...p, seats: e.target.value }))} style={{ width: '100%', padding: '9px 12px', borderRadius: 6, border: `1px solid ${C.border}`, fontSize: 13, color: C.text, outline: 'none' }} />
              </div>
              <div>
                <label style={{ display: 'block', fontSize: 12, color: C.textMuted, marginBottom: 6 }}>유효 기간 (개월)</label>
                <select value={newLic.duration} onChange={e => setNewLic(p => ({ ...p, duration: e.target.value }))} style={{ width: '100%', padding: '9px 12px', borderRadius: 6, border: `1px solid ${C.border}`, fontSize: 13, color: C.text, background: C.surface }}>
                  <option value="3">3개월</option>
                  <option value="6">6개월</option>
                  <option value="12">12개월</option>
                  <option value="24">24개월</option>
                </select>
              </div>
            </div>
            <div style={{ padding: '12px 14px', background: '#F0F9F9', borderRadius: 6, border: `1px solid ${C.border}` }}>
              <div style={{ fontSize: 11, color: C.textMuted, marginBottom: 6 }}>발급 정보 미리보기</div>
              <div style={{ fontSize: 12, color: C.text }}>
                {newLic.product} · {newLic.customer || '고객사 미입력'} · {newLic.seats}석 · {newLic.duration}개월
              </div>
              <div style={{ fontSize: 11, color: C.textMuted, marginTop: 4 }}>라이선스 키: {newLic.product.substring(0,3).toUpperCase()}-****-****-XXXX (자동 생성)</div>
            </div>
            <div style={{ display: 'flex', gap: 10 }}>
              <button onClick={() => setShowIssue(false)} style={{ flex: 1, padding: '10px 0', background: C.surface, color: C.textMuted, border: `1px solid ${C.border}`, borderRadius: 8, fontSize: 13, cursor: 'pointer' }}>취소</button>
              <button onClick={handleIssue} disabled={issuing} style={{ flex: 1, padding: '10px 0', background: issuing ? '#E5E7EB' : C.primary, color: issuing ? C.textMuted : '#fff', border: 'none', borderRadius: 8, fontSize: 13, fontWeight: 600, cursor: issuing ? 'wait' : 'pointer' }}>
                {issuing ? '발급 중...' : '라이선스 발급'}
              </button>
            </div>
          </div>
        </Modal>
      )}

      {/* 상세 Drawer */}
      {selectedLic && (
        <Drawer title={`라이선스 상세 — ${selectedLic.id}`} onClose={() => setSelectedLic(null)}>
          <div style={{ display: 'flex', flexDirection: 'column', gap: 16 }}>
            <div style={{ padding: '14px 16px', background: '#F0F9F9', borderRadius: 8, border: `1px solid ${C.border}` }}>
              <div style={{ fontSize: 12, color: C.textMuted, marginBottom: 4 }}>라이선스 키</div>
              <div style={{ fontFamily: 'monospace', fontSize: 14, fontWeight: 700, color: C.primary, letterSpacing: 1 }}>{selectedLic.key}</div>
            </div>
            {[
              ['제품', selectedLic.product],
              ['고객사', selectedLic.customer],
              ['좌석 수', `${selectedLic.seats}석`],
              ['발급일', selectedLic.issued],
              ['만료일', selectedLic.expires],
              ['상태', <Badge status={selectedLic.status} />],
            ].map(([k, v], i) => (
              <div key={i} style={{ display: 'flex', alignItems: 'center', gap: 12 }}>
                <div style={{ width: 80, fontSize: 11, color: C.textMuted }}>{k}</div>
                <div style={{ fontSize: 13, fontWeight: 500, color: C.text }}>{v}</div>
              </div>
            ))}
            <div style={{ display: 'flex', gap: 10, marginTop: 8 }}>
              <button onClick={() => { setSelectedLic(null); showToast(`${selectedLic.id} 갱신 처리를 시작합니다.`, 'info'); }} style={{ flex: 1, padding: '10px 0', background: C.surface, color: C.primary, border: `1px solid ${C.primary}`, borderRadius: 8, fontSize: 13, fontWeight: 500, cursor: 'pointer' }}>갱신</button>
              <button onClick={() => { setSelectedLic(null); showToast(`${selectedLic.id}가 취소됐습니다.`, 'success'); }} style={{ flex: 1, padding: '10px 0', background: C.danger, color: '#fff', border: 'none', borderRadius: 8, fontSize: 13, fontWeight: 500, cursor: 'pointer' }}>취소</button>
            </div>
          </div>
        </Drawer>
      )}
    </div>
  );
}

// 메인 App
function App() {
  const [currentPage, setCurrentPage] = useState('main');
  const [toast, setToast] = useState(null);

  const showToast = (message, type = 'success') => setToast({ message, type });

  const navTabs = [
    { id: 'main', label: '운영 대시보드', icon: 'ti-dashboard' },
    { id: 'erp', label: 'ERP 연동 관리', icon: 'ti-plug-connected' },
    { id: 'batch', label: '배치 작업 스케줄러', icon: 'ti-clock-play' },
    { id: 'license', label: '라이선스 발급 관리', icon: 'ti-license' },
  ];

  const pages = {
    main: <DashboardPage showToast={showToast} />,
    erp: <ErpPage showToast={showToast} />,
    batch: <BatchPage showToast={showToast} />,
    license: <LicensePage showToast={showToast} />,
  };

  return (
    <div style={{ display: 'flex', flexDirection: 'column', height: '100vh', width: '100%', overflow: 'hidden' }}>
      {/* 탑 네비게이션 */}
      <div style={{ background: C.surface, borderBottom: `2px solid ${C.primary}22`, boxShadow: '0 2px 12px rgba(13,110,110,0.08)', flexShrink: 0, zIndex: 100 }}>
        {/* 로고 + 계정 영역 */}
        <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', padding: '12px 40px', borderBottom: `1px solid ${C.border}` }}>
          <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
            <div style={{ width: 34, height: 34, background: C.primary, borderRadius: 8, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
              <i className="ti ti-api" style={{ fontSize: 18, color: '#fff' }} />
            </div>
            <div>
              <div style={{ fontSize: 14, fontWeight: 700, color: C.text }}>통합 운영 플랫폼</div>
              <div style={{ fontSize: 10, color: C.textMuted }}>ERP · Zendesk Integration Hub v3.0</div>
            </div>
          </div>
          <div style={{ display: 'flex', alignItems: 'center', gap: 16 }}>
            <div style={{ display: 'flex', alignItems: 'center', gap: 6, padding: '4px 12px', background: '#D1FAE5', borderRadius: 20 }}>
              <div style={{ width: 7, height: 7, borderRadius: '50%', background: C.success }} />
              <span style={{ fontSize: 11, color: C.success, fontWeight: 600 }}>PROD 정상</span>
            </div>
            <button onClick={() => showToast('알림 3건이 있습니다.', 'info')} style={{ background: 'none', border: 'none', cursor: 'pointer', padding: 6, position: 'relative' }}>
              <i className="ti ti-bell" style={{ fontSize: 18, color: C.textMuted }} />
              <span style={{ position: 'absolute', top: 2, right: 2, width: 8, height: 8, borderRadius: '50%', background: C.danger, border: `2px solid ${C.surface}` }} />
            </button>
            <div style={{ display: 'flex', alignItems: 'center', gap: 8, cursor: 'pointer' }}>
              <div style={{ width: 30, height: 30, borderRadius: '50%', background: C.primary, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
                <span style={{ fontSize: 12, fontWeight: 700, color: '#fff' }}>관</span>
              </div>
              <span style={{ fontSize: 12, color: C.text, fontWeight: 500 }}>운영관리자</span>
            </div>
          </div>
        </div>

        {/* 탭 네비게이션 */}
        <div style={{ display: 'flex', padding: '0 40px', gap: 0 }}>
          {navTabs.map(tab => {
            const active = currentPage === tab.id;
            return (
              <button key={tab.id} onClick={() => setCurrentPage(tab.id)} style={{ display: 'flex', alignItems: 'center', gap: 7, padding: '11px 18px', background: 'none', border: 'none', cursor: 'pointer', fontSize: 13, fontWeight: active ? 600 : 400, color: active ? C.primary : C.textMuted, borderBottom: active ? `2px solid ${C.primary}` : '2px solid transparent', marginBottom: -2, transition: 'all 0.15s', whiteSpace: 'nowrap' }}
                onMouseEnter={e => { if (!active) e.currentTarget.style.color = C.text; }}
                onMouseLeave={e => { if (!active) e.currentTarget.style.color = C.textMuted; }}>
                <i className={`ti ${tab.icon}`} style={{ fontSize: 15 }} />
                {tab.label}
              </button>
            );
          })}
        </div>
      </div>

      {/* 콘텐츠 영역 */}
      <div style={{ flex: 1, overflowY: 'auto' }}>
        {pages[currentPage] || pages.main}
      </div>

      {/* 토스트 */}
      {toast && <Toast message={toast.message} type={toast.type} onClose={() => setToast(null)} />}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
