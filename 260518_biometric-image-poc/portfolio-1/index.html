<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>생체 이미지 AI 분석 파이프라인 — 맞춤 구현 데모</title>
  <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" rel="stylesheet">
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://unpkg.com/prop-types/prop-types.min.js"></script>
  <script src="https://unpkg.com/react-is@18/umd/react-is.production.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body, #root { width: 100%; min-height: 100vh; }
    body { font-family: 'Pretendard', -apple-system, sans-serif; background: #0D1B35; color: #E8EDF7; }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes slideInRight {
      from { transform: translateX(100%); opacity: 0; }
      to   { transform: translateX(0);    opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.4; }
    }
    @keyframes scaleIn {
      from { opacity: 0; transform: scale(0.96); }
      to   { opacity: 1; transform: scale(1); }
    }
    @keyframes progressFill {
      from { width: 0; }
      to   { width: 100%; }
    }

    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: #0D1B35; }
    ::-webkit-scrollbar-thumb { background: #2D3E6B; border-radius: 3px; }

    .tab-btn { padding: 0 18px; height: 56px; background: none; border: none; cursor: pointer; font-size: 13px; font-family: 'Pretendard', sans-serif; transition: color 0.15s; border-bottom: 2px solid transparent; }
    .tab-btn:hover { color: #C5D4F0; }

    .row-hover:hover { background: #1A2B4A !important; }
    .card-hover { transition: border-color 0.2s, transform 0.2s; }
    .card-hover:hover { border-color: #4DABF7 !important; transform: translateY(-2px); }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

/* ── 더미 데이터 ── */
const IMAGES = [
  { id:1, name:'palm_scan_001.jpg', status:'done',       at:'2026.05.18 09:32', sz:'2.4 MB', stage:null,   prog:100, result:{ ratio:0.9243, lines:8,  avgLen:142.3, moles:3, molePos:'(287, 134)', out:'금성형 A2' } },
  { id:2, name:'palm_scan_002.jpg', status:'done',       at:'2026.05.18 09:35', sz:'2.1 MB', stage:null,   prog:100, result:{ ratio:1.0817, lines:7,  avgLen:128.7, moles:1, molePos:'(152, 301)', out:'목성형 B1' } },
  { id:3, name:'biometric_003.jpg', status:'processing', at:'2026.05.18 10:05', sz:'3.2 MB', stage:'특징 추출', prog:64,  result:null },
  { id:4, name:'palm_scan_004.jpg', status:'pending',    at:'2026.05.18 10:08', sz:'1.8 MB', stage:null,   prog:0,   result:null },
  { id:5, name:'biometric_005.jpg', status:'error',      at:'2026.05.18 09:58', sz:'0.3 MB', stage:null,   prog:0,   result:null, err:'손 미검출 — 이미지 해상도 부족 (320×240)' },
  { id:6, name:'palm_scan_006.jpg', status:'done',       at:'2026.05.18 08:44', sz:'2.8 MB', stage:null,   prog:100, result:{ ratio:0.8931, lines:9,  avgLen:165.4, moles:0, molePos:'없음',      out:'토성형 C3' } },
  { id:7, name:'biometric_007.jpg', status:'done',       at:'2026.05.18 08:21', sz:'2.2 MB', stage:null,   prog:100, result:{ ratio:0.9654, lines:6,  avgLen:119.8, moles:2, molePos:'(201, 87)',  out:'수성형 D1' } },
  { id:8, name:'palm_scan_008.jpg', status:'processing', at:'2026.05.18 10:09', sz:'2.6 MB', stage:'전처리',   prog:30,  result:null },
];

const STATUS = {
  done:       { label:'완료',   color:'#2ECC71', bg:'rgba(46,204,113,0.12)'  },
  processing: { label:'처리 중', color:'#4DABF7', bg:'rgba(77,171,247,0.12)' },
  pending:    { label:'대기',   color:'#8FA3C8', bg:'rgba(143,163,200,0.1)'  },
  error:      { label:'오류',   color:'#FF6B6B', bg:'rgba(255,107,107,0.12)' },
};

const STAGES = ['업로드', '전처리', '특징 추출', '결과 산출'];

/* ── Icon ── */
const Icon = ({ name, size=16, color, style:s={} }) => (
  <i data-lucide={name} style={{ width:size, height:size, display:'inline-block', color, verticalAlign:'middle', ...s }} />
);

/* ── Badge ── */
const Badge = ({ status }) => {
  const st = STATUS[status] || STATUS.pending;
  return (
    <span style={{ display:'inline-flex', alignItems:'center', gap:5, padding:'3px 8px', borderRadius:4, fontSize:11, fontWeight:600, color:st.color, background:st.bg, border:`1px solid ${st.color}30` }}>
      <span style={{ width:5, height:5, borderRadius:'50%', background:st.color, flexShrink:0 }} />{st.label}
    </span>
  );
};

/* ── Toast ── */
const Toast = ({ msg, onClose }) => {
  useEffect(() => { const t = setTimeout(onClose, 3000); return () => clearTimeout(t); }, [onClose]);
  return (
    <div style={{ position:'fixed', bottom:28, right:28, zIndex:9999, background:'#1E2D5A', border:'1px solid #3B5BDB', borderRadius:8, padding:'11px 18px', fontSize:13, fontWeight:500, animation:'fadeIn .25s ease', boxShadow:'0 4px 20px rgba(0,0,0,.4)', display:'flex', alignItems:'center', gap:8 }}>
      <Icon name="check-circle" size={15} color="#4DABF7" />{msg}
    </div>
  );
};

/* ── KPI Card ── */
const KpiCard = ({ label, value, icon, color, sub }) => (
  <div style={{ background:'#162040', border:'1px solid #2A3B62', borderRadius:6, padding:'16px 20px', animation:'fadeIn .4s ease both', display:'flex', flexDirection:'column', gap:6 }}>
    <div style={{ display:'flex', justifyContent:'space-between', alignItems:'flex-start' }}>
      <span style={{ fontSize:12, color:'#8FA3C8', fontWeight:500 }}>{label}</span>
      <Icon name={icon} size={15} color={color} />
    </div>
    <div style={{ fontSize:28, fontWeight:800, color, letterSpacing:'-0.5px' }}>{typeof value==='number' ? value.toLocaleString() : value}</div>
    {sub && <div style={{ fontSize:11, color:'#8FA3C8' }}>{sub}</div>}
  </div>
);

/* ── Drawer ── */
const Drawer = ({ item, onClose, onToast }) => {
  if (!item) return null;
  const stageIdx = item.stage ? STAGES.indexOf(item.stage) : -1;
  return (
    <div style={{ position:'fixed', inset:0, zIndex:400, display:'flex', justifyContent:'flex-end' }} onClick={e => e.target===e.currentTarget && onClose()}>
      <div style={{ width:430, height:'100%', background:'#111E38', borderLeft:'1px solid #2A3B62', overflowY:'auto', animation:'slideInRight .25s ease', padding:24 }}>
        <div style={{ display:'flex', justifyContent:'space-between', alignItems:'flex-start', marginBottom:18 }}>
          <div>
            <div style={{ fontSize:14, fontWeight:700, marginBottom:6 }}>{item.name}</div>
            <Badge status={item.status} />
          </div>
          <button onClick={onClose} style={{ background:'none', border:'none', cursor:'pointer', color:'#8FA3C8', padding:4 }}><Icon name="x" size={20} /></button>
        </div>
        <div style={{ fontSize:12, color:'#8FA3C8', marginBottom:16 }}>업로드: {item.at} &nbsp;|&nbsp; {item.sz}</div>

        {item.status==='processing' && (
          <div style={{ marginBottom:20 }}>
            <div style={{ display:'flex', gap:0, marginBottom:10 }}>
              {STAGES.map((s,i) => {
                const done=i<stageIdx, cur=i===stageIdx;
                return (
                  <React.Fragment key={s}>
                    <div style={{ flex:1, textAlign:'center', padding:'7px 4px', fontSize:10, fontWeight:cur?700:500, color:done?'#2ECC71':cur?'#4DABF7':'#3B4E74', background:cur?'rgba(77,171,247,.1)':'transparent', borderRadius:4 }}>{s}</div>
                    {i<3 && <div style={{ width:1, background:'#2A3B62', flexShrink:0 }} />}
                  </React.Fragment>
                );
              })}
            </div>
            <div style={{ background:'#0D1B35', borderRadius:4, height:6, overflow:'hidden', marginBottom:5 }}>
              <div style={{ height:'100%', width:`${item.prog}%`, background:'linear-gradient(90deg,#3B5BDB,#4DABF7)', borderRadius:4, transition:'width .5s ease' }} />
            </div>
            <div style={{ fontSize:11, color:'#8FA3C8' }}>{item.prog}% 완료 — {item.stage} 단계</div>
          </div>
        )}

        {item.status==='error' && (
          <div style={{ background:'rgba(255,107,107,.08)', border:'1px solid rgba(255,107,107,.25)', borderRadius:6, padding:14, marginBottom:18 }}>
            <div style={{ fontSize:12, fontWeight:600, color:'#FF6B6B', marginBottom:6 }}>오류 내용</div>
            <div style={{ fontSize:12 }}>{item.err}</div>
            <button onClick={() => { onToast(`${item.name} 재처리 요청이 등록되었습니다`); onClose(); }} style={{ marginTop:10, padding:'6px 14px', background:'rgba(255,107,107,.15)', border:'1px solid rgba(255,107,107,.35)', borderRadius:4, color:'#FF6B6B', cursor:'pointer', fontSize:12, fontWeight:600 }}>재처리 요청</button>
          </div>
        )}

        {item.result && (
          <>
            <div style={{ background:'#0D1B35', border:'1px solid #2A3B62', borderRadius:6, height:190, marginBottom:16, display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', gap:8, color:'#3B4E74' }}>
              <Icon name="scan" size={38} color="#3B5BDB" />
              <span style={{ fontSize:11, color:'#4DABF7' }}>키포인트 21개 · 선 {item.result.lines}개 · 점 {item.result.moles}개 마킹</span>
            </div>
            <div style={{ fontSize:10, fontWeight:700, color:'#8FA3C8', letterSpacing:'0.07em', textTransform:'uppercase', marginBottom:8 }}>추출된 특징값</div>
            {[
              ['검지/중지 비율', item.result.ratio.toFixed(4)],
              ['검출된 선 수', `${item.result.lines}개`],
              ['주요 선 평균 길이', `${item.result.avgLen} px`],
              ['점 개수', `${item.result.moles}개`],
              ['점 중심 좌표', item.result.molePos],
            ].map(([k,v]) => (
              <div key={k} style={{ display:'flex', justifyContent:'space-between', padding:'8px 0', borderBottom:'1px solid #1E2D5A', fontSize:12 }}>
                <span style={{ color:'#8FA3C8' }}>{k}</span>
                <span style={{ fontWeight:700, fontFamily:'monospace', color:'#E8EDF7' }}>{v}</span>
              </div>
            ))}
            <div style={{ marginTop:16, background:'rgba(59,91,219,.14)', border:'1px solid rgba(77,171,247,.28)', borderRadius:6, padding:14 }}>
              <div style={{ fontSize:10, fontWeight:700, color:'#4DABF7', letterSpacing:'0.07em', textTransform:'uppercase', marginBottom:6 }}>공식 대입 결과</div>
              <div style={{ fontSize:22, fontWeight:800 }}>{item.result.out}</div>
              <div style={{ fontSize:11, color:'#8FA3C8', marginTop:4 }}>특징값 → 고객사 연산식 → 결과 분류</div>
            </div>
          </>
        )}
      </div>
    </div>
  );
};

/* ── Upload Modal ── */
const UploadModal = ({ onClose, onSuccess }) => {
  const [drag, setDrag] = useState(false);
  const [files, setFiles] = useState([]);
  const [prog, setProg] = useState(0);
  const [uploading, setUploading] = useState(false);

  const onDrop = e => { e.preventDefault(); setDrag(false); setFiles(Array.from(e.dataTransfer.files).slice(0,10).map(f => ({ name:f.name, sz:((f.size/1024/1024).toFixed(1)+'MB') }))); };

  const handleUpload = () => {
    setUploading(true);
    let p=0;
    const iv = setInterval(() => { p += Math.random()*18; if(p>=100){ p=100; clearInterval(iv); setTimeout(() => { onSuccess(); onClose(); }, 400); } setProg(Math.round(p)); }, 180);
  };

  return (
    <div style={{ position:'fixed', inset:0, zIndex:500, background:'rgba(0,0,0,.65)', display:'flex', alignItems:'center', justifyContent:'center' }} onClick={e => e.target===e.currentTarget && onClose()}>
      <div style={{ width:480, background:'#162040', borderRadius:10, border:'1px solid #2A3B62', padding:26, animation:'scaleIn .2s ease' }}>
        <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:20 }}>
          <div style={{ fontSize:16, fontWeight:700 }}>이미지 업로드</div>
          <button onClick={onClose} style={{ background:'none', border:'none', cursor:'pointer', color:'#8FA3C8' }}><Icon name="x" size={20} /></button>
        </div>
        <div onDragOver={e => { e.preventDefault(); setDrag(true); }} onDragLeave={() => setDrag(false)} onDrop={onDrop}
          style={{ border:`2px dashed ${drag?'#4DABF7':'#2A3B62'}`, borderRadius:8, padding:'30px 20px', textAlign:'center', background:drag?'rgba(77,171,247,.07)':'#0D1B35', cursor:'pointer', marginBottom:16, transition:'all .2s' }}>
          <Icon name="upload-cloud" size={34} color="#4DABF7" s={{ marginBottom:8 }} />
          <div style={{ marginTop:8, fontSize:13, marginBottom:4 }}>이미지를 드래그하거나 클릭하여 업로드</div>
          <div style={{ fontSize:11, color:'#8FA3C8' }}>JPG, PNG, WEBP 지원 — 최대 50장</div>
        </div>
        {files.length>0 && !uploading && (
          <div style={{ marginBottom:14 }}>{files.map((f,i) => (
            <div key={i} style={{ display:'flex', justifyContent:'space-between', padding:'6px 10px', background:'#0D1B35', borderRadius:4, marginBottom:3, fontSize:12 }}>
              <span>{f.name}</span><span style={{ color:'#8FA3C8' }}>{f.sz}</span>
            </div>
          ))}</div>
        )}
        {uploading && (
          <div style={{ marginBottom:14 }}>
            <div style={{ background:'#0D1B35', borderRadius:4, height:6, overflow:'hidden', marginBottom:5 }}>
              <div style={{ height:'100%', width:`${prog}%`, background:'linear-gradient(90deg,#3B5BDB,#4DABF7)', borderRadius:4, transition:'width .2s ease' }} />
            </div>
            <div style={{ fontSize:11, color:'#4DABF7', textAlign:'center' }}>업로드 및 전처리 준비 중... {prog}%</div>
          </div>
        )}
        <div style={{ display:'flex', gap:8, justifyContent:'flex-end' }}>
          <button onClick={onClose} style={{ padding:'8px 20px', background:'transparent', border:'1px solid #2A3B62', borderRadius:4, color:'#8FA3C8', cursor:'pointer', fontSize:13 }}>취소</button>
          <button onClick={files.length>0 ? handleUpload : undefined} disabled={uploading} style={{ padding:'8px 20px', background:'#3B5BDB', border:'none', borderRadius:4, color:'#E8EDF7', cursor:'pointer', fontSize:13, fontWeight:600, opacity:files.length===0?0.5:1 }}>
            {uploading ? '업로드 중...' : `${files.length>0?files.length+'개 ':''}업로드 시작`}
          </button>
        </div>
      </div>
    </div>
  );
};

/* ── Tab: 대시보드 ── */
const TabDashboard = ({ onUpload, onSelect }) => {
  const chartRef = useRef(null);
  const ci = useRef(null);
  useEffect(() => {
    if (!chartRef.current) return;
    if (ci.current) ci.current.destroy();
    ci.current = new Chart(chartRef.current.getContext('2d'), {
      type: 'doughnut',
      data: { labels:['완료','처리 중','오류','대기'], datasets:[{ data:[14312,3,5,0], backgroundColor:['rgba(46,204,113,.75)','rgba(77,171,247,.75)','rgba(255,107,107,.75)','rgba(143,163,200,.4)'], borderColor:['#2ECC71','#4DABF7','#FF6B6B','#8FA3C8'], borderWidth:1 }] },
      options: { responsive:true, maintainAspectRatio:false, cutout:'68%', plugins:{ legend:{ position:'bottom', labels:{ color:'#8FA3C8', font:{ size:11 } } } } }
    });
    return () => ci.current?.destroy();
  }, []);

  return (
    <div style={{ animation:'fadeIn .3s ease' }}>
      <div style={{ display:'grid', gridTemplateColumns:'repeat(4,1fr)', gap:12, marginBottom:22 }}>
        <KpiCard label="총 이미지"  value={14320} icon="image"        color="#E8EDF7" sub="전체 처리 대상" />
        <KpiCard label="처리 완료"  value={14312} icon="check-circle" color="#2ECC71" sub="99.9% 처리율"   />
        <KpiCard label="처리 중"   value={3}     icon="loader"       color="#4DABF7" sub="실시간 진행"    />
        <KpiCard label="오류"     value={5}     icon="alert-circle" color="#FF6B6B" sub="재처리 필요"    />
      </div>
      <div style={{ display:'grid', gridTemplateColumns:'1fr 280px', gap:16 }}>
        <div style={{ background:'#162040', border:'1px solid #2A3B62', borderRadius:6 }}>
          <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', padding:'13px 16px', borderBottom:'1px solid #1E2D5A' }}>
            <span style={{ fontSize:13, fontWeight:600 }}>최근 처리 이미지</span>
            <button onClick={onUpload} style={{ display:'flex', alignItems:'center', gap:5, padding:'6px 13px', background:'#3B5BDB', border:'none', borderRadius:4, color:'#E8EDF7', cursor:'pointer', fontSize:12, fontWeight:600 }}>
              <Icon name="upload" size={13} />이미지 업로드
            </button>
          </div>
          <table style={{ width:'100%', borderCollapse:'collapse' }}>
            <thead>
              <tr style={{ background:'#0D1B35' }}>
                {['파일명','업로드 시각','크기','상태','결과'].map(h => (
                  <th key={h} style={{ padding:'8px 12px', textAlign:'left', fontSize:11, color:'#8FA3C8', fontWeight:600 }}>{h}</th>
                ))}
              </tr>
            </thead>
            <tbody>
              {IMAGES.map(img => (
                <tr key={img.id} className="row-hover" onClick={() => onSelect(img)} style={{ cursor:'pointer', borderBottom:'1px solid #1A2B4A' }}>
                  <td style={{ padding:'9px 12px', fontSize:12 }}>{img.name}</td>
                  <td style={{ padding:'9px 12px', fontSize:12, color:'#8FA3C8' }}>{img.at}</td>
                  <td style={{ padding:'9px 12px', fontSize:12, color:'#8FA3C8' }}>{img.sz}</td>
                  <td style={{ padding:'9px 12px' }}><Badge status={img.status} /></td>
                  <td style={{ padding:'9px 12px', fontSize:12, color:img.result?'#4DABF7':'#4A5E84' }}>{img.result?img.result.out:(img.stage||'—')}</td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
        <div style={{ background:'#162040', border:'1px solid #2A3B62', borderRadius:6, padding:16 }}>
          <div style={{ fontSize:13, fontWeight:600, marginBottom:12 }}>처리 상태 분포</div>
          <div style={{ position:'relative', height:220 }}><canvas ref={chartRef} /></div>
        </div>
      </div>
    </div>
  );
};

/* ── Tab: 파이프라인 현황 ── */
const TabPipeline = ({ onSelect }) => {
  const [showFeat, setShowFeat] = useState(false);
  const active = IMAGES.filter(i => ['processing','pending'].includes(i.status));
  return (
    <div style={{ animation:'fadeIn .3s ease' }}>
      <div style={{ background:'#162040', border:'1px solid #2A3B62', borderRadius:6, padding:20, marginBottom:16 }}>
        <div style={{ fontSize:13, fontWeight:600, marginBottom:16 }}>처리 파이프라인 단계</div>
        <div style={{ display:'flex', alignItems:'center' }}>
          {[
            { name:'업로드', icon:'upload-cloud', count:14320, color:'#2ECC71' },
            { name:'전처리', icon:'settings-2',   count:14318, color:'#4DABF7' },
            { name:'특징 추출', icon:'scan',          count:14313, color:'#A78BFA' },
            { name:'결과 산출', icon:'file-text',     count:14312, color:'#F59E0B' },
          ].map((s,i) => (
            <React.Fragment key={s.name}>
              <div style={{ flex:1, background:'#0D1B35', border:`1px solid ${s.color}35`, borderRadius:6, padding:'16px 12px', textAlign:'center' }}>
                <Icon name={s.icon} size={22} color={s.color} />
                <div style={{ fontSize:11, fontWeight:700, margin:'8px 0 3px' }}>{s.name}</div>
                <div style={{ fontSize:22, fontWeight:800, color:s.color }}>{s.count.toLocaleString()}</div>
                <div style={{ fontSize:10, color:'#8FA3C8', marginTop:2 }}>처리됨</div>
              </div>
              {i<3 && <div style={{ padding:'0 6px', color:'#3B4E74' }}><Icon name="chevron-right" size={18} /></div>}
            </React.Fragment>
          ))}
        </div>
      </div>
      <div style={{ background:'#162040', border:'1px solid #2A3B62', borderRadius:6, padding:20, marginBottom:16 }}>
        <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center' }}>
          <div>
            <div style={{ fontSize:13, fontWeight:700, marginBottom:3 }}>MediaPipe/OpenCV 기반 키포인트·선·점 특징 추출 파이프라인</div>
            <div style={{ fontSize:11, color:'#8FA3C8' }}>손바닥 21 키포인트 · 생명선/지능선 측정 · 점(Blob) 위치 검출 알고리즘 구성</div>
          </div>
          <button onClick={() => setShowFeat(v => !v)} style={{ padding:'5px 14px', background:'rgba(59,91,219,.15)', border:'1px solid rgba(59,91,219,.3)', borderRadius:4, color:'#4DABF7', cursor:'pointer', fontSize:12, fontWeight:600, flexShrink:0, marginLeft:16 }}>
            {showFeat ? '닫기' : '알고리즘 설정'}
          </button>
        </div>
        {showFeat && (
          <div style={{ marginTop:16, display:'grid', gridTemplateColumns:'repeat(3,1fr)', gap:10, animation:'scaleIn .2s ease' }}>
            {[
              { title:'키포인트 검출', desc:'MediaPipe Hands — 21개 랜드마크 추출, 검지·중지 길이 비율 산출', color:'#A78BFA' },
              { title:'선 길이 측정', desc:'OpenCV Canny→HoughLinesP — 생명선·지능선 픽셀 길이 측정', color:'#4DABF7' },
              { title:'점 위치 파악', desc:'OpenCV SimpleBlobDetector — 좌표(x,y) 및 면적 검출', color:'#2ECC71' },
            ].map(a => (
              <div key={a.title} style={{ background:'#0D1B35', border:`1px solid ${a.color}25`, borderRadius:6, padding:12 }}>
                <div style={{ fontSize:12, fontWeight:700, color:a.color, marginBottom:5 }}>{a.title}</div>
                <div style={{ fontSize:11, color:'#8FA3C8', lineHeight:1.55 }}>{a.desc}</div>
              </div>
            ))}
          </div>
        )}
      </div>
      <div style={{ background:'#162040', border:'1px solid #2A3B62', borderRadius:6 }}>
        <div style={{ padding:'13px 16px', borderBottom:'1px solid #1E2D5A', fontSize:13, fontWeight:600 }}>
          처리 중 / 대기 ({active.length}건)
        </div>
        {active.map(img => (
          <div key={img.id} className="row-hover" onClick={() => onSelect(img)} style={{ padding:'12px 16px', borderBottom:'1px solid #1A2B4A', cursor:'pointer', display:'flex', alignItems:'center', gap:12 }}>
            <div style={{ flex:1 }}>
              <div style={{ fontSize:12, fontWeight:600, marginBottom:5 }}>{img.name}</div>
              <Badge status={img.status} />
            </div>
            {img.stage && (
              <div style={{ textAlign:'right', minWidth:140 }}>
                <div style={{ fontSize:11, color:'#4DABF7', marginBottom:4 }}>{img.stage} 처리 중</div>
                <div style={{ width:'100%', background:'#0D1B35', borderRadius:4, height:4, overflow:'hidden' }}>
                  <div style={{ height:'100%', width:`${img.prog}%`, background:'linear-gradient(90deg,#3B5BDB,#4DABF7)', borderRadius:4 }} />
                </div>
                <div style={{ fontSize:10, color:'#8FA3C8', marginTop:2 }}>{img.prog}%</div>
              </div>
            )}
          </div>
        ))}
      </div>
    </div>
  );
};

/* ── Tab: 결과 확인 ── */
const TabResults = ({ onSelect }) => {
  const done = IMAGES.filter(i => i.status==='done');
  return (
    <div style={{ animation:'fadeIn .3s ease' }}>
      <div style={{ display:'grid', gridTemplateColumns:'repeat(3,1fr)', gap:14 }}>
        {done.map(img => (
          <div key={img.id} className="card-hover" onClick={() => onSelect(img)} style={{ background:'#162040', border:'1px solid #2A3B62', borderRadius:6, overflow:'hidden', cursor:'pointer' }}>
            <div style={{ height:115, background:'#0D1B35', display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', gap:7, color:'#3B4E74' }}>
              <Icon name="scan" size={32} color="#3B5BDB" />
              <span style={{ fontSize:10, color:'#4DABF7', fontWeight:600 }}>선 {img.result.lines}개 · 점 {img.result.moles}개</span>
            </div>
            <div style={{ padding:12 }}>
              <div style={{ fontSize:11, fontWeight:600, marginBottom:5, overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap' }}>{img.name}</div>
              <div style={{ display:'flex', justifyContent:'space-between', marginBottom:8, fontSize:10, color:'#8FA3C8' }}>
                <span>비율: {img.result.ratio.toFixed(4)}</span><span>점: {img.result.moles}개</span>
              </div>
              <div style={{ background:'rgba(59,91,219,.18)', borderRadius:4, padding:'6px 8px', fontSize:12, fontWeight:700, color:'#4DABF7', textAlign:'center' }}>{img.result.out}</div>
            </div>
          </div>
        ))}
      </div>
    </div>
  );
};

/* ── Tab: 모니터링 ── */
const TabMonitoring = ({ onToast }) => {
  const chartRef = useRef(null);
  const ci = useRef(null);
  const errors = IMAGES.filter(i => i.status==='error');

  useEffect(() => {
    if (!chartRef.current) return;
    if (ci.current) ci.current.destroy();
    ci.current = new Chart(chartRef.current.getContext('2d'), {
      type: 'bar',
      data: { labels:['08:00','08:30','09:00','09:30','10:00','10:30'], datasets:[{ label:'처리 수', data:[423,419,612,593,371,167], backgroundColor:'rgba(59,91,219,.7)', borderColor:'#3B5BDB', borderWidth:1, borderRadius:4 }] },
      options: { responsive:true, maintainAspectRatio:false, plugins:{ legend:{ display:false } }, scales:{ x:{ ticks:{ color:'#8FA3C8', font:{ size:10 } }, grid:{ color:'#1E2D5A' } }, y:{ ticks:{ color:'#8FA3C8', font:{ size:10 } }, grid:{ color:'#1E2D5A' } } } }
    });
    return () => ci.current?.destroy();
  }, []);

  return (
    <div style={{ animation:'fadeIn .3s ease' }}>
      <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:16, marginBottom:16 }}>
        <div style={{ background:'#162040', border:'1px solid #2A3B62', borderRadius:6, padding:16 }}>
          <div style={{ fontSize:13, fontWeight:600, marginBottom:12 }}>시간대별 처리량</div>
          <div style={{ position:'relative', height:200 }}><canvas ref={chartRef} /></div>
        </div>
        <div style={{ background:'#162040', border:'1px solid #2A3B62', borderRadius:6, padding:16 }}>
          <div style={{ fontSize:13, fontWeight:600, marginBottom:12 }}>단계별 처리 성능</div>
          {[
            { label:'평균 전처리 시간',  val:'0.34s / 장', color:'#4DABF7' },
            { label:'평균 특징 추출 시간', val:'1.82s / 장', color:'#A78BFA' },
            { label:'평균 결과 산출 시간', val:'0.08s / 장', color:'#F59E0B' },
            { label:'현재 처리량',     val:'41장 / 분',   color:'#2ECC71' },
          ].map(r => (
            <div key={r.label} style={{ display:'flex', justifyContent:'space-between', padding:'10px 0', borderBottom:'1px solid #1E2D5A', fontSize:12 }}>
              <span style={{ color:'#8FA3C8' }}>{r.label}</span>
              <span style={{ fontWeight:700, color:r.color, fontFamily:'monospace' }}>{r.val}</span>
            </div>
          ))}
        </div>
      </div>
      <div style={{ background:'#162040', border:'1px solid #2A3B62', borderRadius:6 }}>
        <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', padding:'13px 16px', borderBottom:'1px solid #1E2D5A' }}>
          <span style={{ fontSize:13, fontWeight:600 }}>오류 이미지 ({errors.length}건)</span>
          <button onClick={() => onToast('전체 오류 항목 재처리 요청이 등록되었습니다')} style={{ padding:'5px 12px', background:'rgba(255,107,107,.12)', border:'1px solid rgba(255,107,107,.28)', borderRadius:4, color:'#FF6B6B', cursor:'pointer', fontSize:12 }}>전체 재처리</button>
        </div>
        {errors.map(img => (
          <div key={img.id} style={{ padding:'12px 16px', borderBottom:'1px solid #1A2B4A', display:'flex', alignItems:'center', gap:12 }}>
            <div style={{ flex:1 }}>
              <div style={{ fontSize:12, fontWeight:600, marginBottom:4 }}>{img.name}</div>
              <div style={{ fontSize:11, color:'#FF6B6B' }}>{img.err}</div>
            </div>
            <button onClick={() => onToast(`${img.name} 재처리 요청이 등록되었습니다`)} style={{ padding:'5px 12px', background:'#162040', border:'1px solid #2A3B62', borderRadius:4, color:'#8FA3C8', cursor:'pointer', fontSize:12, whiteSpace:'nowrap' }}>재처리</button>
          </div>
        ))}
      </div>
    </div>
  );
};

/* ── App ── */
const App = () => {
  const [tab, setTab] = useState('대시보드');
  const [selected, setSelected] = useState(null);
  const [showUpload, setShowUpload] = useState(false);
  const [toast, setToast] = useState(null);
  const tabs = ['대시보드','파이프라인 현황','결과 확인','모니터링'];

  useEffect(() => { if (window.lucide) window.lucide.createIcons(); });

  return (
    <div style={{ width:'100%', minHeight:'100vh', background:'#0D1B35', color:'#E8EDF7' }}>
      {/* 탑바 */}
      <div style={{ height:56, background:'#0D1B35', borderBottom:'1px solid #1E2D5A', display:'flex', alignItems:'center', paddingInline:24, position:'sticky', top:0, zIndex:100 }}>
        <div style={{ display:'flex', alignItems:'center', gap:8, marginRight:32 }}>
          <div style={{ background:'#3B5BDB', borderRadius:6, padding:'5px 6px', display:'flex', alignItems:'center' }}><Icon name="scan-face" size={16} color="#fff" /></div>
          <span style={{ fontSize:14, fontWeight:700, letterSpacing:'-0.3px' }}>BioVision PoC</span>
        </div>
        <div style={{ display:'flex' }}>
          {tabs.map(t => (
            <button key={t} className="tab-btn" onClick={() => setTab(t)} style={{ color:tab===t?'#4DABF7':'#8FA3C8', fontWeight:tab===t?700:400, borderBottomColor:tab===t?'#4DABF7':'transparent' }}>{t}</button>
          ))}
        </div>
        <div style={{ marginLeft:'auto', display:'flex', alignItems:'center', gap:10 }}>
          <div style={{ display:'flex', alignItems:'center', gap:6, background:'rgba(77,171,247,.08)', border:'1px solid rgba(77,171,247,.25)', borderRadius:4, padding:'4px 10px', fontSize:11 }}>
            <span style={{ width:6, height:6, borderRadius:'50%', background:'#4DABF7', animation:'pulse 1.5s ease-in-out infinite' }} />처리 중 3건
          </div>
          <div style={{ width:28, height:28, borderRadius:'50%', background:'#1E2D5A', display:'flex', alignItems:'center', justifyContent:'center', cursor:'pointer' }}><Icon name="user" size={13} color="#8FA3C8" /></div>
        </div>
      </div>

      {/* 히어로 (대시보드 탭만) */}
      {tab==='대시보드' && (
        <div style={{ background:'linear-gradient(135deg,#1E2D5A 0%,#0D1B35 55%,#0A0E22 100%)', borderBottom:'1px solid #1E2D5A', padding:'26px 24px' }}>
          <div style={{ fontSize:11, color:'#4DABF7', fontWeight:700, marginBottom:8, letterSpacing:'0.08em', textTransform:'uppercase' }}>AI 파이프라인 PoC — 맞춤 구현 데모</div>
          <h1 style={{ fontSize:24, fontWeight:800, letterSpacing:'-0.5px', lineHeight:1.35, marginBottom:10 }}>생체 이미지 AI 특징 추출 파이프라인</h1>
          <p style={{ fontSize:13, color:'#8FA3C8', lineHeight:1.65, maxWidth:680 }}>MediaPipe·OpenCV 기반 손바닥 키포인트·선·점 검출부터 고객사 공식 대입 결과 산출까지 전체 PoC 파이프라인을 단일 시스템으로 구현합니다.</p>
        </div>
      )}

      {/* 컨텐츠 */}
      <div style={{ padding:'20px 24px' }}>
        {tab==='대시보드'     && <TabDashboard onUpload={() => setShowUpload(true)} onSelect={setSelected} />}
        {tab==='파이프라인 현황' && <TabPipeline onSelect={setSelected} />}
        {tab==='결과 확인'    && <TabResults onSelect={setSelected} />}
        {tab==='모니터링'     && <TabMonitoring onToast={setToast} />}
      </div>

      {selected && <Drawer item={selected} onClose={() => setSelected(null)} onToast={setToast} />}
      {showUpload && <UploadModal onClose={() => setShowUpload(false)} onSuccess={() => setToast('이미지 업로드 완료. 파이프라인 처리를 시작합니다')} />}
      {toast && <Toast msg={toast} onClose={() => setToast(null)} />}
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
