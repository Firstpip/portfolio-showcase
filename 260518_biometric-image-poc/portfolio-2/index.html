<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>생체 이미지 배치 처리 플랫폼 — 구현 데모</title>
  <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/regular/style.css">
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://unpkg.com/prop-types/prop-types.min.js"></script>
  <script src="https://unpkg.com/react-is@18/umd/react-is.production.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body, #root { width: 100%; min-height: 100vh; }
    body { font-family: 'Pretendard', -apple-system, sans-serif; background: #F0FAF8; color: #0F2E2C; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes slideLeft {
      from { opacity: 0; transform: translateX(20px); }
      to   { opacity: 1; transform: translateX(0); }
    }
    @keyframes fadeInModal {
      from { opacity: 0; transform: scale(0.97); }
      to   { opacity: 1; transform: scale(1); }
    }
    @keyframes shimmer {
      0%   { background-position: -400px 0; }
      100% { background-position: 400px 0; }
    }

    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #E5F5F2; }
    ::-webkit-scrollbar-thumb { background: #9DD5CC; border-radius: 3px; }

    .nav-item { display:flex; align-items:center; gap:10px; padding:10px 16px; border-radius:10px; cursor:pointer; width:100%; border:none; background:transparent; font-size:13px; font-family:'Pretendard',sans-serif; color:#4A7C78; text-align:left; transition:background .15s, color .15s; }
    .nav-item:hover { background:#E0F5F1; color:#0D7377; }
    .nav-item.active { background:#CCF0EA; color:#0D7377; font-weight:700; }

    .row-hover:hover { background: #F5FFFE !important; }
    .card-lift { transition: box-shadow .2s, transform .2s; }
    .card-lift:hover { box-shadow: 0 6px 20px rgba(13,115,119,.15) !important; transform: translateY(-2px); }
    .btn-primary { background:#0D7377; border:none; color:#fff; border-radius:10px; cursor:pointer; font-size:13px; font-family:'Pretendard',sans-serif; font-weight:600; padding:9px 20px; transition:background .15s; }
    .btn-primary:hover { background:#0A5E62; }
    .btn-ghost  { background:transparent; border:1px solid #9DD5CC; color:#0D7377; border-radius:10px; cursor:pointer; font-size:13px; font-family:'Pretendard',sans-serif; font-weight:500; padding:9px 20px; transition:background .15s; }
    .btn-ghost:hover { background:#E0F5F1; }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef } = React;

/* ── 더미 데이터 ── */
const BATCHES = [
  { id:'B-2405-001', name:'1차 전체 스캔 배치', status:'done',    total:5000, done:5000, fail:3,  priority:'high',   startAt:'2026.05.17 09:00', endAt:'2026.05.17 18:44', duration:'9시간 44분' },
  { id:'B-2405-002', name:'2차 보완 배치',    status:'running',  total:3200, done:1847, fail:2,  priority:'normal', startAt:'2026.05.18 08:30', endAt:null,              duration:null },
  { id:'B-2405-003', name:'품질 검증 배치',   status:'paused',   total:1500, done:920,  fail:0,  priority:'low',    startAt:'2026.05.18 09:15', endAt:null,              duration:null },
  { id:'B-2405-004', name:'신규 데이터 배치',  status:'queued',   total:4620, done:0,    fail:0,  priority:'normal', startAt:null,              endAt:null,              duration:null },
];

const WEBHOOKS = [
  { id:'WH-001', url:'https://api.example.co.kr/biometric/result', event:'batch_complete', status:'active',   lastAt:'2026.05.18 09:01', successRate:'99.2%' },
  { id:'WH-002', url:'https://crm.internal.net/webhook/feature',  event:'item_complete',  status:'active',   lastAt:'2026.05.18 10:03', successRate:'97.8%' },
  { id:'WH-003', url:'https://staging.partner.io/sync',           event:'batch_complete', status:'inactive', lastAt:'2026.05.15 14:22', successRate:'—' },
];

const API_KEYS = [
  { id:'AK-001', name:'운영 서버 연동', scope:'full',     created:'2026.04.01', expires:'2027.04.01', lastUsed:'2026.05.18 10:09', status:'active' },
  { id:'AK-002', name:'데이터 분석팀',  scope:'readonly', created:'2026.04.15', expires:'2026.10.15', lastUsed:'2026.05.17 16:30', status:'active' },
  { id:'AK-003', name:'외부 파트너',   scope:'readonly', created:'2026.03.01', expires:'2026.06.01', lastUsed:'2026.05.10 11:00', status:'expiring' },
];

const BSTATUS = {
  done:    { label:'완료',   color:'#059669', bg:'#D1FAE5' },
  running: { label:'실행 중', color:'#0D7377', bg:'#CCF0EA' },
  paused:  { label:'일시정지', color:'#D97706', bg:'#FEF3C7' },
  queued:  { label:'대기',   color:'#6B7280', bg:'#F3F4F6' },
};

/* ── Badge ── */
const Badge = ({ status, map }) => {
  const s = map[status] || map.queued;
  return <span style={{ display:'inline-flex', alignItems:'center', gap:4, padding:'3px 9px', borderRadius:99, fontSize:11, fontWeight:600, color:s.color, background:s.bg }}>{s.label}</span>;
};

/* ── Toast ── */
const Toast = ({ msg, onClose }) => {
  useEffect(() => { const t = setTimeout(onClose, 3000); return () => clearTimeout(t); }, [onClose]);
  return (
    <div style={{ position:'fixed', bottom:28, right:28, zIndex:9999, background:'#fff', border:'1px solid #B2E8E2', borderRadius:12, padding:'12px 20px', fontSize:13, fontWeight:500, color:'#0F2E2C', animation:'fadeUp .25s ease', boxShadow:'0 6px 24px rgba(13,115,119,.18)', display:'flex', alignItems:'center', gap:8 }}>
      <i className="ph ph-check-circle" style={{ color:'#0D7377', fontSize:16 }} />{msg}
    </div>
  );
};

/* ── 상단 헤더 ── */
const Header = ({ page }) => (
  <div style={{ height:56, background:'#fff', borderBottom:'1px solid #D1F0EB', display:'flex', alignItems:'center', paddingInline:28, gap:8 }}>
    <i className="ph ph-squares-four" style={{ color:'#0D7377', fontSize:20 }} />
    <span style={{ fontSize:14, fontWeight:700, color:'#0F2E2C', marginRight:8 }}>BioVision Platform</span>
    <span style={{ color:'#9DD5CC', fontSize:16 }}>/</span>
    <span style={{ fontSize:13, color:'#4A7C78', fontWeight:500, marginLeft:6 }}>{page}</span>
    <div style={{ marginLeft:'auto', display:'flex', alignItems:'center', gap:10 }}>
      <div style={{ display:'flex', alignItems:'center', gap:6, padding:'5px 12px', background:'#F0FAF8', border:'1px solid #B2E8E2', borderRadius:8, fontSize:12, color:'#0D7377', fontWeight:600 }}>
        <i className="ph ph-database" style={{ fontSize:14 }} />Redis 큐 정상
      </div>
      <div style={{ width:30, height:30, borderRadius:'50%', background:'#E0F5F1', display:'flex', alignItems:'center', justifyContent:'center', cursor:'pointer' }}>
        <i className="ph ph-user" style={{ fontSize:15, color:'#0D7377' }} />
      </div>
    </div>
  </div>
);

/* ── 배치 상세 모달 ── */
const BatchModal = ({ batch, onClose, onToast }) => {
  if (!batch) return null;
  const pct = batch.total > 0 ? Math.round(batch.done / batch.total * 100) : 0;
  return (
    <div style={{ position:'fixed', inset:0, zIndex:400, background:'rgba(15,46,44,.35)', display:'flex', alignItems:'center', justifyContent:'center' }} onClick={e => e.target===e.currentTarget && onClose()}>
      <div style={{ width:560, background:'#fff', borderRadius:18, padding:28, animation:'fadeInModal .22s ease', boxShadow:'0 16px 60px rgba(13,115,119,.2)' }}>
        <div style={{ display:'flex', justifyContent:'space-between', alignItems:'flex-start', marginBottom:18 }}>
          <div>
            <div style={{ fontSize:15, fontWeight:700, marginBottom:5 }}>{batch.name}</div>
            <Badge status={batch.status} map={BSTATUS} />
          </div>
          <button onClick={onClose} style={{ background:'none', border:'none', cursor:'pointer', color:'#4A7C78', fontSize:22, lineHeight:1 }}>&times;</button>
        </div>
        <div style={{ display:'grid', gridTemplateColumns:'repeat(3,1fr)', gap:12, marginBottom:20 }}>
          {[['전체', batch.total.toLocaleString(),'ph-images'],['완료', batch.done.toLocaleString(),'ph-check-circle'],['오류', batch.fail.toLocaleString(),'ph-warning']].map(([l,v,ic]) => (
            <div key={l} style={{ background:'#F0FAF8', borderRadius:10, padding:'14px 16px' }}>
              <div style={{ display:'flex', alignItems:'center', gap:6, fontSize:11, color:'#4A7C78', marginBottom:5 }}>
                <i className={`ph ${ic}`} style={{ fontSize:14 }} />{l}
              </div>
              <div style={{ fontSize:24, fontWeight:800, color:'#0F2E2C' }}>{v}</div>
            </div>
          ))}
        </div>
        <div style={{ marginBottom:18 }}>
          <div style={{ display:'flex', justifyContent:'space-between', fontSize:12, color:'#4A7C78', marginBottom:6 }}>
            <span>전체 진행률</span><span style={{ fontWeight:700, color:'#0D7377' }}>{pct}%</span>
          </div>
          <div style={{ background:'#E0F5F1', borderRadius:99, height:8, overflow:'hidden' }}>
            <div style={{ height:'100%', width:`${pct}%`, background:'linear-gradient(90deg,#0D7377,#2ECC9A)', borderRadius:99, transition:'width .5s ease' }} />
          </div>
        </div>
        {batch.startAt && (
          <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:10, marginBottom:20, fontSize:12 }}>
            <div style={{ background:'#F0FAF8', borderRadius:8, padding:'10px 12px' }}><div style={{ color:'#4A7C78', marginBottom:3 }}>시작</div><div style={{ fontWeight:600 }}>{batch.startAt}</div></div>
            <div style={{ background:'#F0FAF8', borderRadius:8, padding:'10px 12px' }}><div style={{ color:'#4A7C78', marginBottom:3 }}>완료</div><div style={{ fontWeight:600 }}>{batch.endAt || '진행 중'}</div></div>
          </div>
        )}
        <div style={{ display:'flex', gap:8, justifyContent:'flex-end' }}>
          {batch.status==='running' && <button className="btn-ghost" onClick={() => { onToast(`${batch.name} 배치를 일시정지했습니다`); onClose(); }}>일시정지</button>}
          {batch.status==='paused'  && <button className="btn-primary" onClick={() => { onToast(`${batch.name} 배치를 재개했습니다`); onClose(); }}>재개</button>}
          <button className="btn-ghost" onClick={onClose}>닫기</button>
        </div>
      </div>
    </div>
  );
};

/* ── 신규 배치 생성 모달 ── */
const NewBatchModal = ({ onClose, onToast }) => {
  const [form, setForm] = useState({ name:'', range:'', priority:'normal' });
  const update = k => e => setForm(p => ({ ...p, [k]:e.target.value }));
  const handleSubmit = () => {
    if (!form.name.trim()) return;
    onToast(`"${form.name}" 배치가 생성되어 큐에 등록되었습니다`);
    onClose();
  };
  const inp = { background:'#F0FAF8', border:'1px solid #B2E8E2', borderRadius:10, padding:'10px 14px', fontSize:13, color:'#0F2E2C', width:'100%', fontFamily:'Pretendard,sans-serif', outline:'none' };
  return (
    <div style={{ position:'fixed', inset:0, zIndex:400, background:'rgba(15,46,44,.35)', display:'flex', alignItems:'center', justifyContent:'center' }} onClick={e => e.target===e.currentTarget && onClose()}>
      <div style={{ width:480, background:'#fff', borderRadius:18, padding:28, animation:'fadeInModal .22s ease', boxShadow:'0 16px 60px rgba(13,115,119,.2)' }}>
        <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:22 }}>
          <div style={{ fontSize:16, fontWeight:700 }}>새 배치 작업 생성</div>
          <button onClick={onClose} style={{ background:'none', border:'none', cursor:'pointer', color:'#4A7C78', fontSize:22, lineHeight:1 }}>&times;</button>
        </div>
        <div style={{ display:'flex', flexDirection:'column', gap:14, marginBottom:22 }}>
          <div>
            <label style={{ fontSize:12, fontWeight:600, color:'#4A7C78', marginBottom:5, display:'block' }}>배치 이름</label>
            <input value={form.name} onChange={update('name')} placeholder="예: 3차 전체 스캔 배치" style={inp} />
          </div>
          <div>
            <label style={{ fontSize:12, fontWeight:600, color:'#4A7C78', marginBottom:5, display:'block' }}>이미지 범위 (ID)</label>
            <input value={form.range} onChange={update('range')} placeholder="예: 14001 ~ 18000" style={inp} />
          </div>
          <div>
            <label style={{ fontSize:12, fontWeight:600, color:'#4A7C78', marginBottom:5, display:'block' }}>우선순위</label>
            <select value={form.priority} onChange={update('priority')} style={{ ...inp }}>
              <option value="high">높음 (high)</option>
              <option value="normal">보통 (normal)</option>
              <option value="low">낮음 (low)</option>
            </select>
          </div>
        </div>
        <div style={{ display:'flex', gap:8, justifyContent:'flex-end' }}>
          <button className="btn-ghost" onClick={onClose}>취소</button>
          <button className="btn-primary" onClick={handleSubmit}>배치 생성</button>
        </div>
      </div>
    </div>
  );
};

/* ── Page: 배치 관리 ── */
const PageBatch = ({ onToast }) => {
  const [selected, setSelected] = useState(null);
  const [showNew, setShowNew] = useState(false);
  return (
    <div style={{ animation:'fadeUp .3s ease' }}>
      {selected && <BatchModal batch={selected} onClose={() => setSelected(null)} onToast={onToast} />}
      {showNew  && <NewBatchModal onClose={() => setShowNew(false)} onToast={onToast} />}
      <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:20 }}>
        <div>
          <h2 style={{ fontSize:20, fontWeight:800, marginBottom:4 }}>배치 관리</h2>
          <p style={{ fontSize:13, color:'#4A7C78' }}>Redis 큐 기반 대규모 이미지 배치 처리 작업을 생성하고 관리합니다</p>
        </div>
        <button className="btn-primary" onClick={() => setShowNew(true)} style={{ display:'flex', alignItems:'center', gap:7 }}>
          <i className="ph ph-plus" style={{ fontSize:15 }} />새 배치 생성
        </button>
      </div>
      <div style={{ display:'grid', gridTemplateColumns:'repeat(4,1fr)', gap:12, marginBottom:24 }}>
        {[
          { label:'전체 배치', value:'4', icon:'ph-stack', color:'#0D7377' },
          { label:'완료',     value:'1', icon:'ph-check-circle', color:'#059669' },
          { label:'처리 중',  value:'2', icon:'ph-arrows-clockwise', color:'#0D7377' },
          { label:'총 이미지', value:'14,320', icon:'ph-images', color:'#4A7C78' },
        ].map((c, i) => (
          <div key={c.label} className="card-lift" style={{ background:'#fff', border:'1px solid #D1F0EB', borderRadius:14, padding:'18px 20px', boxShadow:'0 1px 4px rgba(13,115,119,.06)', animation:`slideLeft .3s ease ${i*0.07}s both` }}>
            <div style={{ display:'flex', justifyContent:'space-between', alignItems:'flex-start', marginBottom:8 }}>
              <span style={{ fontSize:12, color:'#4A7C78', fontWeight:500 }}>{c.label}</span>
              <i className={`ph ${c.icon}`} style={{ fontSize:18, color:c.color }} />
            </div>
            <div style={{ fontSize:28, fontWeight:800, color:c.color }}>{c.value}</div>
          </div>
        ))}
      </div>
      <div style={{ background:'#fff', border:'1px solid #D1F0EB', borderRadius:14, boxShadow:'0 1px 4px rgba(13,115,119,.06)', overflow:'hidden' }}>
        <div style={{ padding:'14px 20px', borderBottom:'1px solid #E8F8F5', fontSize:13, fontWeight:700 }}>배치 목록</div>
        <table style={{ width:'100%', borderCollapse:'collapse' }}>
          <thead>
            <tr style={{ background:'#F8FDFC' }}>
              {['배치 ID','이름','우선순위','진행','상태','시작','동작'].map(h => (
                <th key={h} style={{ padding:'10px 16px', textAlign:'left', fontSize:11, color:'#4A7C78', fontWeight:700 }}>{h}</th>
              ))}
            </tr>
          </thead>
          <tbody>
            {BATCHES.map(b => {
              const pct = b.total>0 ? Math.round(b.done/b.total*100) : 0;
              const pri = { high:'높음', normal:'보통', low:'낮음' }[b.priority];
              return (
                <tr key={b.id} className="row-hover" style={{ borderBottom:'1px solid #EEF9F7', cursor:'pointer' }} onClick={() => setSelected(b)}>
                  <td style={{ padding:'12px 16px', fontSize:12, color:'#4A7C78', fontFamily:'monospace' }}>{b.id}</td>
                  <td style={{ padding:'12px 16px', fontSize:13, fontWeight:600 }}>{b.name}</td>
                  <td style={{ padding:'12px 16px', fontSize:12, color:'#4A7C78' }}>{pri}</td>
                  <td style={{ padding:'12px 16px', minWidth:140 }}>
                    <div style={{ display:'flex', alignItems:'center', gap:8 }}>
                      <div style={{ flex:1, background:'#E0F5F1', borderRadius:99, height:5, overflow:'hidden' }}>
                        <div style={{ height:'100%', width:`${pct}%`, background: b.status==='running' ? 'linear-gradient(90deg,#0D7377 0%,#2ECC9A 50%,#0D7377 100%)' : '#0D7377', backgroundSize:'400px 100%', animation: b.status==='running' ? 'shimmer 1.5s linear infinite' : 'none', borderRadius:99 }} />
                      </div>
                      <span style={{ fontSize:11, color:'#0D7377', fontWeight:700, minWidth:28 }}>{pct}%</span>
                    </div>
                  </td>
                  <td style={{ padding:'12px 16px' }}><Badge status={b.status} map={BSTATUS} /></td>
                  <td style={{ padding:'12px 16px', fontSize:11, color:'#4A7C78' }}>{b.startAt || '—'}</td>
                  <td style={{ padding:'12px 16px' }}>
                    <button onClick={e => { e.stopPropagation(); setSelected(b); }} style={{ background:'#F0FAF8', border:'1px solid #B2E8E2', borderRadius:7, padding:'4px 12px', fontSize:12, color:'#0D7377', cursor:'pointer', fontFamily:'Pretendard,sans-serif' }}>상세 보기</button>
                  </td>
                </tr>
              );
            })}
          </tbody>
        </table>
      </div>
    </div>
  );
};

/* ── Page: 인프라 모니터링 ── */
const PageInfra = () => {
  const chartRef = useRef(null);
  const ci = useRef(null);

  useEffect(() => {
    if (!chartRef.current) return;
    if (ci.current) ci.current.destroy();
    ci.current = new Chart(chartRef.current.getContext('2d'), {
      type: 'line',
      data: {
        labels: ['08:00','08:30','09:00','09:30','10:00','10:30'],
        datasets: [
          { label:'처리 완료', data:[423,419,612,593,371,167], borderColor:'#0D7377', backgroundColor:'rgba(13,115,119,.1)', fill:true, tension:0.4, borderWidth:2, pointRadius:4 },
          { label:'처리 오류', data:[2,1,3,2,1,0], borderColor:'#EF4444', backgroundColor:'rgba(239,68,68,.08)', fill:true, tension:0.4, borderWidth:2, pointRadius:4 },
        ]
      },
      options: { responsive:true, maintainAspectRatio:false, plugins:{ legend:{ labels:{ color:'#4A7C78', font:{ size:11 } } } }, scales:{ x:{ ticks:{ color:'#4A7C78', font:{ size:10 } }, grid:{ color:'#E8F8F5' } }, y:{ ticks:{ color:'#4A7C78', font:{ size:10 } }, grid:{ color:'#E8F8F5' } } } }
    });
    return () => ci.current?.destroy();
  }, []);

  return (
    <div style={{ animation:'fadeUp .3s ease' }}>
      <div style={{ marginBottom:20 }}>
        <h2 style={{ fontSize:20, fontWeight:800, marginBottom:4 }}>인프라 모니터링</h2>
        <p style={{ fontSize:13, color:'#4A7C78' }}>Redis 큐 상태 및 파이프라인 처리량을 실시간으로 관찰합니다</p>
      </div>
      <div style={{ display:'grid', gridTemplateColumns:'repeat(4,1fr)', gap:12, marginBottom:22 }}>
        {[
          { label:'Redis 큐 대기', value:'167', unit:'건',   color:'#D97706', icon:'ph-queue' },
          { label:'현재 처리량',   value:'41',  unit:'장/분', color:'#0D7377', icon:'ph-lightning' },
          { label:'큐 메모리',    value:'82',  unit:'MB',   color:'#4A7C78', icon:'ph-database' },
          { label:'소비자 수',    value:'4',   unit:'개',   color:'#059669', icon:'ph-cpu' },
        ].map(c => (
          <div key={c.label} className="card-lift" style={{ background:'#fff', border:'1px solid #D1F0EB', borderRadius:14, padding:'18px 20px', boxShadow:'0 1px 4px rgba(13,115,119,.06)' }}>
            <div style={{ display:'flex', justifyContent:'space-between', alignItems:'flex-start', marginBottom:8 }}>
              <span style={{ fontSize:12, color:'#4A7C78', fontWeight:500 }}>{c.label}</span>
              <i className={`ph ${c.icon}`} style={{ fontSize:18, color:c.color }} />
            </div>
            <div style={{ fontSize:26, fontWeight:800, color:c.color }}>{c.value} <span style={{ fontSize:13, fontWeight:500 }}>{c.unit}</span></div>
          </div>
        ))}
      </div>

        <div style={{ background:'#fff', border:'1px solid #D1F0EB', borderRadius:14, padding:'18px 20px', boxShadow:'0 1px 4px rgba(13,115,119,.06)' }}>
          <div style={{ fontSize:13, fontWeight:700, marginBottom:14 }}>단계별 처리 시간</div>
          {[

            { stage:'특징 추출', time:'1.82s', pct:92, color:'#7C3AED' },
            { stage:'결과 산출', time:'0.08s', pct:4,  color:'#059669' },
          ].map(r => (
            <div key={r.stage} style={{ marginBottom:16 }}>
              <div style={{ display:'flex', justifyContent:'space-between', fontSize:12, marginBottom:5 }}>
                <span style={{ color:'#4A7C78' }}>{r.stage}</span>
                <span style={{ fontWeight:700, color:r.color, fontFamily:'monospace' }}>{r.time}</span>
              </div>
              <div style={{ background:'#E0F5F1', borderRadius:99, height:7, overflow:'hidden' }}>
                <div style={{ height:'100%', width:`${r.pct}%`, background:r.color, borderRadius:99 }} />
              </div>
            </div>
          ))}
          <div style={{ marginTop:18, padding:'12px', background:'#FEF3C7', borderRadius:10, display:'flex', alignItems:'flex-start', gap:8 }}>
            <i className="ph ph-warning" style={{ color:'#D97706', fontSize:16, flexShrink:0, marginTop:1 }} />
            <div style={{ fontSize:11, color:'#92400E' }}>특징 추출 단계가 전체 처리 시간의 약 83%를 차지합니다. 소비자 수 증가를 검토하세요.</div>
          </div>
        </div>
      </div>
    </div>
  );
};

/* ── Page: 통계 분석 ── */
const PageAnalytics = () => {
  const chartRef = useRef(null);
  const ci = useRef(null);

  useEffect(() => {
    if (!chartRef.current) return;
    if (ci.current) ci.current.destroy();
    ci.current = new Chart(chartRef.current.getContext('2d'), {
      type: 'bar',
      data: {
        labels: ['0.80~0.85','0.85~0.90','0.90~0.95','0.95~1.00','1.00~1.05','1.05~1.10','1.10+'],
        datasets: [{ label:'이미지 수', data:[412,1823,4201,3984,2387,1105,400], backgroundColor:'rgba(13,115,119,.65)', borderColor:'#0D7377', borderWidth:1, borderRadius:5 }]
      },
      options: { responsive:true, maintainAspectRatio:false, plugins:{ legend:{ display:false } }, scales:{ x:{ ticks:{ color:'#4A7C78', font:{ size:10 } }, grid:{ color:'#E8F8F5' } }, y:{ ticks:{ color:'#4A7C78', font:{ size:10 } }, grid:{ color:'#E8F8F5' } } } }
    });
    return () => ci.current?.destroy();
  }, []);

  return (
    <div style={{ animation:'fadeUp .3s ease' }}>
      <div style={{ marginBottom:20 }}>
        <h2 style={{ fontSize:20, fontWeight:800, marginBottom:4 }}>통계 분석</h2>
        <p style={{ fontSize:13, color:'#4A7C78' }}>누적 처리 이미지의 특징값 분포와 패턴을 분석합니다</p>
      </div>
      <div style={{ display:'grid', gridTemplateColumns:'repeat(3,1fr)', gap:12, marginBottom:22 }}>
        {[
          { label:'검지/중지 비율 평균', value:'0.9631', desc:'std: 0.0782', color:'#0D7377' },
          { label:'주요 선 길이 평균',  value:'138.4 px', desc:'min: 82 / max: 221', color:'#7C3AED' },
          { label:'점 검출 평균',      value:'1.4개',    desc:'미검출 비율: 32.1%', color:'#059669' },
        ].map(c => (
          <div key={c.label} className="card-lift" style={{ background:'#fff', border:'1px solid #D1F0EB', borderRadius:14, padding:'18px 20px', boxShadow:'0 1px 4px rgba(13,115,119,.06)' }}>
            <div style={{ fontSize:11, color:'#4A7C78', fontWeight:600, marginBottom:8 }}>{c.label}</div>
            <div style={{ fontSize:26, fontWeight:800, color:c.color, marginBottom:4 }}>{c.value}</div>
            <div style={{ fontSize:11, color:'#4A7C78' }}>{c.desc}</div>
          </div>
        ))}
      </div>
      <div style={{ display:'grid', gridTemplateColumns:'2fr 1fr', gap:16 }}>
        <div style={{ background:'#fff', border:'1px solid #D1F0EB', borderRadius:14, padding:'18px 20px', boxShadow:'0 1px 4px rgba(13,115,119,.06)' }}>
          <div style={{ fontSize:13, fontWeight:700, marginBottom:14 }}>검지/중지 비율 분포 (전체 14,312건)</div>
          <div style={{ position:'relative', height:220 }}><canvas ref={chartRef} /></div>
        </div>
        <div style={{ background:'#fff', border:'1px solid #D1F0EB', borderRadius:14, padding:'18px 20px', boxShadow:'0 1px 4px rgba(13,115,119,.06)' }}>
          <div style={{ fontSize:13, fontWeight:700, marginBottom:14 }}>결과 유형 분포</div>
          {[
            { label:'금성형',  pct:28, count:'4,007건' },
            { label:'목성형',  pct:22, count:'3,149건' },
            { label:'토성형',  pct:19, count:'2,719건' },
            { label:'수성형',  pct:17, count:'2,433건' },
            { label:'기타',   pct:14, count:'2,004건' },
          ].map((r,i) => {
            const colors = ['#0D7377','#14A085','#2ECC9A','#7C3AED','#D97706'];
            return (
              <div key={r.label} style={{ marginBottom:12 }}>
                <div style={{ display:'flex', justifyContent:'space-between', fontSize:12, marginBottom:5 }}>
                  <span style={{ fontWeight:500 }}>{r.label}</span>
                  <span style={{ color:'#4A7C78', fontSize:11 }}>{r.count} ({r.pct}%)</span>
                </div>
                <div style={{ background:'#E0F5F1', borderRadius:99, height:6, overflow:'hidden' }}>
                  <div style={{ height:'100%', width:`${r.pct}%`, background:colors[i], borderRadius:99 }} />
                </div>
              </div>
            );
          })}
        </div>
      </div>
    </div>
  );
};

/* ── Page: 연동 설정 ── */
const PageSettings = ({ onToast }) => {
  const [activeSection, setActiveSection] = useState('webhook');
  const [showApiKeyModal, setShowApiKeyModal] = useState(false);

  const inp = { background:'#F0FAF8', border:'1px solid #B2E8E2', borderRadius:10, padding:'10px 14px', fontSize:13, color:'#0F2E2C', width:'100%', fontFamily:'Pretendard,sans-serif', outline:'none' };

  return (
    <div style={{ animation:'fadeUp .3s ease' }}>
      <div style={{ marginBottom:20 }}>
        <h2 style={{ fontSize:20, fontWeight:800, marginBottom:4 }}>연동 설정</h2>
        <p style={{ fontSize:13, color:'#4A7C78' }}>Webhook 및 API 키를 관리하여 외부 시스템과 분석 결과를 연동합니다</p>
      </div>
      {showApiKeyModal && (
        <div style={{ position:'fixed', inset:0, zIndex:400, background:'rgba(15,46,44,.35)', display:'flex', alignItems:'center', justifyContent:'center' }} onClick={e => e.target===e.currentTarget && setShowApiKeyModal(false)}>
          <div style={{ width:480, background:'#fff', borderRadius:18, padding:28, animation:'fadeInModal .22s ease', boxShadow:'0 16px 60px rgba(13,115,119,.2)' }}>
            <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:22 }}>
              <div style={{ fontSize:16, fontWeight:700 }}>새 API 키 발급</div>
              <button onClick={() => setShowApiKeyModal(false)} style={{ background:'none', border:'none', cursor:'pointer', color:'#4A7C78', fontSize:22, lineHeight:1 }}>&times;</button>
            </div>
            <div style={{ display:'flex', flexDirection:'column', gap:14, marginBottom:22 }}>
              <div>
                <label style={{ fontSize:12, fontWeight:600, color:'#4A7C78', marginBottom:5, display:'block' }}>키 이름</label>
                <input placeholder="예: 분석 시스템 연동" style={inp} />
              </div>
              <div>
                <label style={{ fontSize:12, fontWeight:600, color:'#4A7C78', marginBottom:5, display:'block' }}>권한 범위</label>
                <select style={{ ...inp }}>
                  <option value="full">전체 (읽기/쓰기)</option>
                  <option value="readonly">읽기 전용</option>
                </select>
              </div>
              <div>
                <label style={{ fontSize:12, fontWeight:600, color:'#4A7C78', marginBottom:5, display:'block' }}>만료일</label>
                <input type="date" defaultValue="2027-05-18" style={inp} />
              </div>
            </div>
            <div style={{ display:'flex', gap:8, justifyContent:'flex-end' }}>
              <button className="btn-ghost" onClick={() => setShowApiKeyModal(false)}>취소</button>
              <button className="btn-primary" onClick={() => { onToast('새 API 키가 발급되었습니다'); setShowApiKeyModal(false); }}>발급</button>
            </div>
          </div>
        </div>
      )}
      <div style={{ display:'flex', gap:0, marginBottom:20, background:'#E0F5F1', borderRadius:12, padding:3 }}>
        {[['webhook','Webhook 설정'],['apikey','API 키 관리']].map(([k,l]) => (
          <button key={k} onClick={() => setActiveSection(k)} style={{ flex:1, padding:'9px 0', background:activeSection===k?'#fff':'transparent', border:'none', borderRadius:10, cursor:'pointer', fontSize:13, fontFamily:'Pretendard,sans-serif', fontWeight:activeSection===k?700:500, color:activeSection===k?'#0D7377':'#4A7C78', boxShadow:activeSection===k?'0 1px 4px rgba(13,115,119,.1)':'none', transition:'all .15s' }}>
            {l}
          </button>
        ))}
      </div>

      {activeSection==='webhook' && (
        <div>
          <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:14 }}>
            <span style={{ fontSize:13, fontWeight:700 }}>등록된 Webhook ({WEBHOOKS.length}개)</span>
            <button className="btn-primary" onClick={() => onToast('Webhook 등록 기능 — 실제 배포 환경에서 동작합니다')} style={{ display:'flex', alignItems:'center', gap:6 }}>
              <i className="ph ph-plus" style={{ fontSize:14 }} />Webhook 추가
            </button>
          </div>
          <div style={{ display:'flex', flexDirection:'column', gap:12 }}>
            {WEBHOOKS.map(wh => (
              <div key={wh.id} className="card-lift" style={{ background:'#fff', border:'1px solid #D1F0EB', borderRadius:14, padding:'18px 20px', boxShadow:'0 1px 4px rgba(13,115,119,.06)' }}>
                <div style={{ display:'flex', justifyContent:'space-between', alignItems:'flex-start', marginBottom:10 }}>
                  <div style={{ flex:1 }}>
                    <div style={{ fontSize:12, fontFamily:'monospace', color:'#0D7377', marginBottom:5, wordBreak:'break-all' }}>{wh.url}</div>
                    <div style={{ display:'flex', gap:8, alignItems:'center', flexWrap:'wrap' }}>
                      <span style={{ fontSize:11, background:'#E0F5F1', color:'#0D7377', padding:'2px 8px', borderRadius:99, fontWeight:600 }}>{wh.event}</span>
                      <span style={{ fontSize:11, color:'#4A7C78' }}>마지막 전송: {wh.lastAt}</span>
                      <span style={{ fontSize:11, color:'#4A7C78' }}>성공률: {wh.successRate}</span>
                    </div>
                  </div>
                  <div style={{ display:'flex', gap:6, marginLeft:12, flexShrink:0 }}>
                    <button onClick={() => onToast('테스트 전송 완료 (200 OK)')} style={{ padding:'5px 12px', background:'#F0FAF8', border:'1px solid #B2E8E2', borderRadius:8, color:'#0D7377', cursor:'pointer', fontSize:12, fontFamily:'Pretendard,sans-serif' }}>테스트</button>
                    <span style={{ display:'inline-flex', alignItems:'center', padding:'3px 9px', borderRadius:99, fontSize:11, fontWeight:600, color:wh.status==='active'?'#059669':'#6B7280', background:wh.status==='active'?'#D1FAE5':'#F3F4F6' }}>{wh.status==='active'?'활성':'비활성'}</span>
                  </div>
                </div>
              </div>
            ))}
          </div>
        </div>
      )}

      {activeSection==='apikey' && (
        <div>
          <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:14 }}>
            <span style={{ fontSize:13, fontWeight:700 }}>API 키 목록 ({API_KEYS.length}개)</span>

          <div style={{ background:'#fff', border:'1px solid #D1F0EB', borderRadius:14, boxShadow:'0 1px 4px rgba(13,115,119,.06)', overflow:'hidden' }}>
            <table style={{ width:'100%', borderCollapse:'collapse' }}>
              <thead>
                <tr style={{ background:'#F8FDFC' }}>
                  {['이름','권한 범위','마지막 사용','만료일','상태','동작'].map(h => (
                    <th key={h} style={{ padding:'10px 16px', textAlign:'left', fontSize:11, color:'#4A7C78', fontWeight:700 }}>{h}</th>
                  ))}
                </tr>
              </thead>
              <tbody>
                {API_KEYS.map(ak => (
                  <tr key={ak.id} className="row-hover" style={{ borderBottom:'1px solid #EEF9F7' }}>
                    <td style={{ padding:'12px 16px', fontSize:13, fontWeight:600 }}>{ak.name}</td>
                    <td style={{ padding:'12px 16px' }}>
                      <span style={{ fontSize:11, background: ak.scope==='full'?'rgba(13,115,119,.1)':'#F0FAF8', color:ak.scope==='full'?'#0D7377':'#4A7C78', padding:'2px 8px', borderRadius:99, fontWeight:600 }}>
                        {ak.scope==='full'?'전체':'읽기 전용'}
                      </span>
                    </td>
                    <td style={{ padding:'12px 16px', fontSize:12, color:'#4A7C78' }}>{ak.lastUsed}</td>
                    <td style={{ padding:'12px 16px', fontSize:12, color: ak.status==='expiring'?'#D97706':'#4A7C78', fontWeight: ak.status==='expiring'?600:400 }}>{ak.expires}</td>
                    <td style={{ padding:'12px 16px' }}>
                      <span style={{ fontSize:11, fontWeight:600, padding:'3px 9px', borderRadius:99, color:ak.status==='active'?'#059669':ak.status==='expiring'?'#D97706':'#6B7280', background:ak.status==='active'?'#D1FAE5':ak.status==='expiring'?'#FEF3C7':'#F3F4F6' }}>
                        {ak.status==='active'?'활성':ak.status==='expiring'?'만료 임박':'비활성'}
                      </span>
                    </td>
                    <td style={{ padding:'12px 16px' }}>
                      <button onClick={() => onToast(`${ak.name} API 키가 폐기되었습니다`)} style={{ padding:'4px 12px', background:'rgba(239,68,68,.08)', border:'1px solid rgba(239,68,68,.2)', borderRadius:8, color:'#EF4444', cursor:'pointer', fontSize:12, fontFamily:'Pretendard,sans-serif' }}>폐기</button>
                    </td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        </div>
      )}
    </div>
  );
};

/* ── App ── */
const PAGES = [
  { key:'배치 관리',    icon:'ph-stack',           Comp: null },
  { key:'인프라 모니터링', icon:'ph-chart-line-up',    Comp: null },
  { key:'통계 분석',    icon:'ph-chart-bar',         Comp: null },
  { key:'연동 설정',    icon:'ph-plugs-connected',    Comp: null },
];

const App = () => {
  const [page, setPage] = useState('배치 관리');
  const [toast, setToast] = useState(null);

  return (
    <div style={{ width:'100%', minHeight:'100vh', display:'flex', flexDirection:'column', background:'#F0FAF8' }}>
      <Header page={page} />
      <div style={{ display:'flex', flex:1 }}>
        {/* 사이드바 */}
        <div style={{ width:220, background:'#fff', borderRight:'1px solid #D1F0EB', padding:'16px 12px', display:'flex', flexDirection:'column', gap:4 }}>
          <div style={{ fontSize:10, fontWeight:700, color:'#9DD5CC', letterSpacing:'0.1em', textTransform:'uppercase', padding:'4px 8px', marginBottom:4 }}>메인 메뉴</div>
          {[
            { key:'배치 관리',     icon:'ph-stack' },
            { key:'인프라 모니터링', icon:'ph-chart-line-up' },
            { key:'통계 분석',     icon:'ph-chart-bar' },
            { key:'연동 설정',     icon:'ph-plugs-connected' },
          ].map(m => (
            <button key={m.key} className={`nav-item${page===m.key?' active':''}`} onClick={() => setPage(m.key)}>
              <i className={`ph ${m.icon}`} style={{ fontSize:17, flexShrink:0 }} />{m.key}
            </button>
          ))}
          <div style={{ marginTop:'auto', padding:'12px 8px 4px', borderTop:'1px solid #D1F0EB' }}>
            <div style={{ fontSize:11, color:'#4A7C78', marginBottom:6 }}>시스템 상태</div>
            <div style={{ display:'flex', gap:5, alignItems:'center', fontSize:11, color:'#059669', fontWeight:600 }}>
              <span style={{ width:6, height:6, borderRadius:'50%', background:'#059669' }} />전체 정상
            </div>
          </div>
        </div>
        {/* 컨텐츠 */}
        <div style={{ flex:1, padding:'24px 28px', overflowY:'auto', maxHeight:'calc(100vh - 56px)' }}>
          {page==='배치 관리'     && <PageBatch    onToast={setToast} />}
          {page==='인프라 모니터링' && <PageInfra />}
          {page==='통계 분석'     && <PageAnalytics />}
          {page==='연동 설정'     && <PageSettings  onToast={setToast} />}
        </div>
      </div>
      {/* 푸터 */}
      <div style={{ background:'#fff', borderTop:'1px solid #D1F0EB', padding:'10px 28px', display:'flex', justifyContent:'space-between', alignItems:'center' }}>
        <span style={{ fontSize:11, color:'#9DD5CC' }}>BioVision Platform — 구현 데모</span>
        <span style={{ fontSize:11, color:'#9DD5CC' }}>FastAPI + MediaPipe + OpenCV + React 18 + PostgreSQL + Redis</span>
      </div>
      {toast && <Toast msg={toast} onClose={() => setToast(null)} />}
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
