<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SoleShop Admin — 신발 자사몰 통합 관리 어드민 확장 데모</title>
  <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/packages/pretendard/dist/web/static/pretendard.css" rel="stylesheet"/>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://unpkg.com/prop-types/prop-types.min.js"></script>
  <script src="https://unpkg.com/react-is@18/umd/react-is.production.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@3.9.1/dist/chart.min.js"></script>
  <script src="https://unpkg.com/@phosphor-icons/web@2.1.1"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body, #root { width: 100%; min-height: 100vh; }
    body { font-family: 'Pretendard', 'Apple SD Gothic Neo', sans-serif; background: #F4F5FB; color: #1C1E3A; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes slideInRight {
      from { opacity: 0; transform: translateX(20px); }
      to   { opacity: 1; transform: translateX(0); }
    }
    @keyframes scaleIn {
      from { opacity: 0; transform: scale(0.96); }
      to   { opacity: 1; transform: scale(1); }
    }
    @keyframes toastIn {
      from { opacity: 0; transform: translateX(32px); }
      to   { opacity: 1; transform: translateX(0); }
    }
    @keyframes barGrow {
      from { transform: scaleY(0); }
      to   { transform: scaleY(1); }
    }
    @keyframes overlayFade {
      from { opacity: 0; }
      to   { opacity: 1; }
    }
    @keyframes panelSlide {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .page-enter { animation: fadeUp 0.35s ease forwards; }

    .kpi-card {
      background: #fff;
      border-radius: 10px;
      padding: 20px 22px;
      border: 1px solid rgba(43,45,126,0.07);
      box-shadow: 0 1px 4px rgba(43,45,126,0.06);
      transition: box-shadow 0.2s, transform 0.2s;
    }
    .kpi-card:hover {
      box-shadow: 0 4px 14px rgba(43,45,126,0.12);
      transform: translateY(-2px);
    }

    .table-row {
      display: grid;
      align-items: center;
      padding: 14px 18px;
      border-bottom: 1px solid #F0F1F8;
      transition: background 0.15s;
      cursor: pointer;
    }
    .table-row:hover { background: #F8F9FF; }

    .status-badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      border-radius: 20px;
      padding: 3px 10px;
      font-size: 12px;
      font-weight: 600;
    }
    .status-green  { background: #EAFAF0; color: #1A7340; }
    .status-blue   { background: #EBF0FF; color: #2B2D7E; }
    .status-orange { background: #FFF3EB; color: #C94208; }
    .status-gray   { background: #F0F1F5; color: #666; }
    .status-red    { background: #FFF0F0; color: #C0392B; }
    .status-purple { background: #F4F0FF; color: #6B46C1; }

    .btn-primary {
      background: #2B2D7E;
      color: #fff;
      border: none;
      border-radius: 7px;
      padding: 10px 20px;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      font-family: 'Pretendard', sans-serif;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      transition: background 0.18s, transform 0.15s;
    }
    .btn-primary:hover { background: #1F2160; transform: translateY(-1px); }

    .btn-outline {
      background: none;
      border: 1.5px solid #DDE0F0;
      border-radius: 7px;
      padding: 9px 18px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      color: #555;
      font-family: 'Pretendard', sans-serif;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      transition: border-color 0.18s, color 0.18s;
    }
    .btn-outline:hover { border-color: #2B2D7E; color: #2B2D7E; }

    .nav-link {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 16px;
      font-size: 14px;
      font-weight: 500;
      color: #6B6E8F;
      border: none;
      background: none;
      cursor: pointer;
      border-radius: 8px;
      transition: all 0.18s;
      font-family: 'Pretendard', sans-serif;
      white-space: nowrap;
    }
    .nav-link:hover { background: #ECEEFF; color: #2B2D7E; }
    .nav-link.active { background: #ECEEFF; color: #2B2D7E; font-weight: 700; }

    .overlay {
      position: fixed; inset: 0;
      background: rgba(28,30,58,0.45);
      z-index: 500;
      display: flex; align-items: center; justify-content: center;
      animation: overlayFade 0.22s ease;
    }
    .modal-panel {
      background: #fff;
      border-radius: 14px;
      padding: 28px 32px;
      width: 520px;
      max-width: 95vw;
      max-height: 88vh;
      overflow-y: auto;
      animation: panelSlide 0.3s ease;
    }

    .toast {
      position: fixed; bottom: 24px; right: 24px;
      background: #1C1E3A; color: #fff;
      padding: 12px 18px; border-radius: 8px;
      font-size: 13px; font-weight: 600;
      animation: toastIn 0.3s ease;
      z-index: 9999;
    }

    .toggle-switch {
      width: 38px; height: 22px;
      border-radius: 11px;
      border: none; cursor: pointer;
      position: relative;
      transition: background 0.25s;
    }
    .toggle-switch::after {
      content: '';
      position: absolute;
      width: 16px; height: 16px;
      border-radius: 50%;
      background: #fff;
      top: 3px;
      transition: left 0.25s;
    }
    .toggle-switch.on { background: #2B2D7E; }
    .toggle-switch.on::after { left: 19px; }
    .toggle-switch.off { background: #CCC; }
    .toggle-switch.off::after { left: 3px; }

    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: #f0f1f8; }
    ::-webkit-scrollbar-thumb { background: #C5C8E0; border-radius: 3px; }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

/* ── 더미 데이터 ── */
const PRODUCTS_DATA = [
  { id:1, name:'에어 쿠션 런닝화', cat:'운동화', price:89000, stock:{ '240':5,'245':12,'250':8,'255':14,'260':3 }, samDay:true,  status:'판매중' },
  { id:2, name:'클래식 슬립온',     cat:'운동화', price:59000, stock:{ '240':0,'245':9, '250':15,'255':6, '260':2 }, samDay:true,  status:'판매중' },
  { id:3, name:'첼시 앵클 부츠',    cat:'부츠',   price:129000,stock:{ '240':22,'245':18,'250':11,'255':7 },          samDay:false, status:'판매중' },
  { id:4, name:'오픈토 플랫 샌들',  cat:'샌들',   price:45000, stock:{ '235':0,'240':3, '245':20,'250':16 },          samDay:true,  status:'숨김'   },
  { id:5, name:'메모리폼 슬리퍼',   cat:'슬리퍼', price:32000, stock:{ 'S':45,'M':38,'L':12 },                         samDay:true,  status:'판매중' },
  { id:6, name:'하이탑 캔버스',     cat:'운동화', price:75000, stock:{ '250':0,'255':4, '260':8, '265':1  },           samDay:false, status:'품절'   },
];

const ORDERS_DATA = [
  { id:'ORD-20240525-001', name:'김민수', product:'에어 쿠션 런닝화 255', qty:1, total:89000, status:'배송중',     date:'2026-05-25 09:12', samDay:true,  tracking:'CJ1234567890' },
  { id:'ORD-20240525-002', name:'이지은', product:'메모리폼 슬리퍼 M',    qty:2, total:64000, status:'준비중',     date:'2026-05-25 08:44', samDay:true,  tracking:null         },
  { id:'ORD-20240524-003', name:'박도현', product:'첼시 앵클 부츠 245',   qty:1, total:129000,status:'배송완료',   date:'2026-05-24 14:22', samDay:false, tracking:'KG9876543210' },
  { id:'ORD-20240524-004', name:'최서연', product:'클래식 슬립온 250',    qty:1, total:59000, status:'결제완료',   date:'2026-05-24 11:05', samDay:false, tracking:null         },
  { id:'ORD-20240523-005', name:'정우진', product:'오픈토 플랫 샌들 245', qty:2, total:90000, status:'반품처리중', date:'2026-05-23 16:30', samDay:true,  tracking:null         },
  { id:'ORD-20240523-006', name:'한소희', product:'하이탑 캔버스 260',    qty:1, total:75000, status:'배송완료',   date:'2026-05-23 10:18', samDay:false, tracking:'CJ0011223344' },
];

const COUPONS_DATA = [
  { id:1, code:'SOLE10',    type:'정률', value:'10%',    minOrder:30000,  usage:142, total:500, expire:'2026-06-30', active:true  },
  { id:2, code:'WELCOME5K', type:'정액', value:'5,000원',minOrder:50000,  usage:88,  total:200, expire:'2026-07-15', active:true  },
  { id:3, code:'SUMMER20',  type:'정률', value:'20%',    minOrder:80000,  usage:316, total:300, expire:'2026-05-31', active:false },
  { id:4, code:'NEWMEM10K', type:'정액', value:'10,000원',minOrder:60000, usage:55,  total:100, expire:'2026-08-01', active:true  },
];

const BANNERS_DATA = [
  { id:1, title:'여름 신상 샌들 컬렉션',    target:'샌들 카테고리', period:'2026-06-01 ~ 2026-06-30', active:true  },
  { id:2, title:'런닝화 특가 이벤트',       target:'운동화 카테고리', period:'2026-05-20 ~ 2026-06-15', active:true  },
  { id:3, title:'신규 회원 웰컴 쿠폰',      target:'메인 팝업',     period:'2026-05-01 ~ 2026-07-31', active:false },
];

const MONTHLY_SALES = [
  { month:'1월', sales:3420 }, { month:'2월', sales:2980 }, { month:'3월', sales:4120 },
  { month:'4월', sales:3860 }, { month:'5월', sales:5240 }, { month:'6월', sales:0 },
];

const CAT_SALES = [
  { cat:'운동화', pct:45, color:'#2B2D7E' },
  { cat:'부츠',   pct:22, color:'#7C83F7' },
  { cat:'샌들',   pct:18, color:'#4F51B5' },
  { cat:'슬리퍼', pct:15, color:'#C5C8E0' },
];

/* ── 차트 컴포넌트 ── */
function SalesChart() {
  const ref = useRef(null);
  const chartRef = useRef(null);
  useEffect(() => {
    if (!ref.current) return;
    if (chartRef.current) chartRef.current.destroy();
    chartRef.current = new window.Chart(ref.current, {
      type: 'bar',
      data: {
        labels: MONTHLY_SALES.map(d => d.month),
        datasets: [{
          label: '매출 (만원)',
          data: MONTHLY_SALES.map(d => d.sales),
          backgroundColor: MONTHLY_SALES.map((d,i) => i===4 ? '#2B2D7E' : '#ECEEFF'),
          borderRadius: 6,
          borderSkipped: false,
        }]
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        plugins: { legend: { display: false }, tooltip: { callbacks: { label: ctx => `${ctx.raw.toLocaleString()}만원` } } },
        scales: {
          x: { grid: { display: false }, ticks: { font: { family: 'Pretendard', size: 12 } } },
          y: { grid: { color: '#F0F1F8' }, ticks: { font: { family: 'Pretendard', size: 11 }, callback: v => `${v.toLocaleString()}` } },
        }
      }
    });
    return () => { if (chartRef.current) chartRef.current.destroy(); };
  }, []);
  return (
    <div style={{ position:'relative', height:220 }}>
      <canvas ref={ref}/>
    </div>
  );
}

function DonutChart() {
  const ref = useRef(null);
  const chartRef = useRef(null);
  useEffect(() => {
    if (!ref.current) return;
    if (chartRef.current) chartRef.current.destroy();
    chartRef.current = new window.Chart(ref.current, {
      type: 'doughnut',
      data: {
        labels: CAT_SALES.map(d => d.cat),
        datasets: [{
          data: CAT_SALES.map(d => d.pct),
          backgroundColor: CAT_SALES.map(d => d.color),
          borderWidth: 0,
          hoverOffset: 6,
        }]
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        cutout: '65%',
        plugins: { legend: { position: 'right', labels: { font: { family: 'Pretendard', size: 12 }, padding: 12 } } },
      }
    });
    return () => { if (chartRef.current) chartRef.current.destroy(); };
  }, []);
  return (
    <div style={{ position:'relative', height:200 }}>
      <canvas ref={ref}/>
    </div>
  );
}

/* ── KPI 카드 ── */
function KpiCard({ label, value, sub, color, icon }) {
  return (
    <div className="kpi-card">
      <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:12 }}>
        <span style={{ fontSize:13, color:'#6B6E8F', fontWeight:500 }}>{label}</span>
        <div style={{ width:34, height:34, borderRadius:8, background:color+'18',
          display:'flex', alignItems:'center', justifyContent:'center' }}>
          <i className={`ph ph-${icon}`} style={{ fontSize:18, color }}></i>
        </div>
      </div>
      <div style={{ fontSize:26, fontWeight:900, color:'#1C1E3A', marginBottom:4 }}>{value}</div>
      <div style={{ fontSize:12, color:'#A0A3BA' }}>{sub}</div>
    </div>
  );
}

/* ── 주문 상태 배지 ── */
function OrderStatus({ s }) {
  const map = {
    '결제완료':  'status-blue',
    '준비중':    'status-orange',
    '배송중':    'status-purple',
    '배송완료':  'status-green',
    '반품처리중':'status-red',
  };
  return <span className={`status-badge ${map[s]||'status-gray'}`}>{s}</span>;
}

/* ── 앱 ── */
function App() {
  const [page, setPage]       = useState('dashboard');
  const [toast, setToast]     = useState(null);
  const [orderDetail, setOrderDetail] = useState(null);
  const [showCouponModal, setShowCouponModal] = useState(false);
  const [orderTab, setOrderTab] = useState('전체');
  const [banners, setBanners]  = useState(BANNERS_DATA);
  const [coupons, setCoupons]  = useState(COUPONS_DATA);
  const [trackingNum, setTrackingNum] = useState('');
  const [newCoupon, setNewCoupon] = useState({ code:'', type:'정률', value:'', minOrder:'', expire:'' });

  const showToast = msg => {
    setToast(msg);
    setTimeout(() => setToast(null), 2500);
  };

  const toggleBanner = (id) => {
    setBanners(prev => prev.map(b => b.id===id ? {...b, active:!b.active} : b));
    showToast('배너 상태가 변경되었습니다');
  };

  const toggleCoupon = (id) => {
    setCoupons(prev => prev.map(c => c.id===id ? {...c, active:!c.active} : c));
  };

  const createCoupon = () => {
    if (!newCoupon.code || !newCoupon.value) { showToast('쿠폰 코드와 할인값을 입력해주세요'); return; }

    setShowCouponModal(false);
    setNewCoupon({ code:'', type:'정률', value:'', minOrder:'', expire:'' });
    showToast(`${newCoupon.code} 쿠폰이 생성되었습니다`);
  };

  const filteredOrders = orderTab === '전체'
    ? ORDERS_DATA
    : ORDERS_DATA.filter(o => o.status === orderTab);

  return (
    <div style={{ width:'100%', minHeight:'100vh', display:'flex', flexDirection:'column' }}>

      {/* ── GLOBAL NAV ── */}
      <header style={{ background:'#fff', borderBottom:'1px solid #E8EAF4', position:'sticky', top:0, zIndex:200 }}>
        <div style={{ maxWidth:1280, margin:'0 auto', padding:'0 24px', display:'flex', alignItems:'center', justifyContent:'space-between', height:58 }}>
          {/* Logo + Nav */}
          <div style={{ display:'flex', alignItems:'center', gap:4 }}>
            <div style={{ display:'flex', alignItems:'center', gap:8, marginRight:24, cursor:'pointer' }}
              onClick={() => setPage('dashboard')}>
              <div style={{ width:30, height:30, background:'#2B2D7E', borderRadius:7,
                display:'flex', alignItems:'center', justifyContent:'center' }}>
                <i className="ph ph-lightning" style={{ fontSize:17, color:'#fff' }}></i>
              </div>
              <span style={{ fontSize:16, fontWeight:900, color:'#2B2D7E', letterSpacing:-0.3 }}>SoleShop</span>
              <span style={{ fontSize:11, fontWeight:600, color:'#7C83F7', background:'#F0F0FF', borderRadius:4, padding:'2px 6px' }}>Admin</span>
            </div>
            {[
              { key:'dashboard',   label:'매출 분석',    icon:'chart-bar'       },
              { key:'inventory',   label:'상품 관리',    icon:'package'         },
              { key:'orders',      label:'주문 관리',    icon:'shopping-bag'    },
              { key:'promotions',  label:'프로모션 관리',icon:'tag'             },
            ].map(nav => (
              <button key={nav.key}
                className={`nav-link ${page===nav.key?'active':''}`}
                onClick={() => setPage(nav.key)}>
                <i className={`ph ph-${nav.icon}`} style={{ fontSize:16 }}></i>
                {nav.label}
              </button>
            ))}
          </div>
          {/* Right */}
          <div style={{ display:'flex', alignItems:'center', gap:10 }}>
            <button style={{ background:'none', border:'none', cursor:'pointer', color:'#6B6E8F', position:'relative' }}>
              <i className="ph ph-bell" style={{ fontSize:20 }}></i>
              <span style={{ position:'absolute', top:0, right:0, width:8, height:8, background:'#E8540A', borderRadius:'50%' }}/>
            </button>
            <div style={{ width:32, height:32, background:'#ECEEFF', borderRadius:'50%',
              display:'flex', alignItems:'center', justifyContent:'center', cursor:'pointer' }}>
              <i className="ph ph-user" style={{ fontSize:16, color:'#2B2D7E' }}></i>
            </div>
          </div>
        </div>
      </header>

      {/* ── CONTENT ── */}
      <main style={{ flex:1, maxWidth:1280, margin:'0 auto', width:'100%', padding:'28px 24px' }}>

        {/* ── DASHBOARD (매출 분석) ── */}
        {page === 'dashboard' && (
          <div className="page-enter">
            <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:24 }}>
              <div>
                <h1 style={{ fontSize:22, fontWeight:900 }}>매출 분석</h1>
                <div style={{ fontSize:13, color:'#A0A3BA', marginTop:3 }}>2026년 5월 기준 · 오전 9:30 업데이트</div>
              </div>
              <div style={{ display:'flex', gap:8 }}>
                {['오늘','이번 주','이번 달'].map((t,i) => (
                  <button key={i} style={{ padding:'7px 16px', borderRadius:7, border:'1.5px solid', fontSize:13, fontWeight:500, cursor:'pointer', fontFamily:'Pretendard, sans-serif',
                    background: i===2?'#2B2D7E':'none', color: i===2?'#fff':'#6B6E8F', borderColor: i===2?'#2B2D7E':'#DDE0F0' }}>
                    {t}
                  </button>
                ))}
              </div>
            </div>

            {/* KPI cards */}
            <div style={{ display:'grid', gridTemplateColumns:'repeat(4,1fr)', gap:14, marginBottom:24 }}>
              <KpiCard label="이번 달 매출"    value="5,240만원"  sub="전월 대비 +35.8%"  color="#2B2D7E" icon="currency-krw"/>
              <KpiCard label="총 주문 수"      value="1,284건"    sub="오늘 42건"          color="#4F51B5" icon="shopping-bag"/>
              <KpiCard label="당일 발송 처리"  value="38건"       sub="마감까지 2h 14m"    color="#E8540A" icon="truck"/>
              <KpiCard label="쿠폰 사용률"     value="28.4%"      sub="SOLE10 142회 사용"  color="#52B788" icon="tag"/>
            </div>

            {/* Charts */}
            <div style={{ display:'grid', gridTemplateColumns:'1.6fr 1fr', gap:16, marginBottom:24 }}>
              <div style={{ background:'#fff', borderRadius:12, padding:24, border:'1px solid rgba(43,45,126,0.07)' }}>
                <div style={{ display:'flex', justifyContent:'space-between', marginBottom:18 }}>
                  <div>
                    <div style={{ fontSize:15, fontWeight:700 }}>월별 매출 추이</div>
                    <div style={{ fontSize:12, color:'#A0A3BA', marginTop:2 }}>2026년 1~5월</div>
                  </div>
                  <button className="btn-outline" style={{ fontSize:12, padding:'6px 12px' }}>
                    <i className="ph ph-download-simple" style={{ fontSize:14 }}></i>
                    내보내기
                  </button>
                </div>
                <SalesChart/>
              </div>
              <div style={{ background:'#fff', borderRadius:12, padding:24, border:'1px solid rgba(43,45,126,0.07)' }}>
                <div style={{ fontSize:15, fontWeight:700, marginBottom:4 }}>카테고리별 판매 비중</div>
                <div style={{ fontSize:12, color:'#A0A3BA', marginBottom:18 }}>이번 달 기준</div>
                <DonutChart/>
              </div>
            </div>

            {/* Recent orders */}
            <div style={{ background:'#fff', borderRadius:12, padding:24, border:'1px solid rgba(43,45,126,0.07)' }}>
              <div style={{ display:'flex', justifyContent:'space-between', marginBottom:18 }}>
                <div style={{ fontSize:15, fontWeight:700 }}>당일 발송 주문 현황</div>
                <button className="btn-outline" style={{ fontSize:12, padding:'6px 14px' }}
                  onClick={() => setPage('orders')}>
                  주문 관리 이동
                </button>
              </div>
              <div style={{ display:'grid', gridTemplateColumns:'1fr 1.5fr 0.8fr 0.8fr 1fr', gap:0 }}>
                {['주문번호','상품','금액','상태','주문일시'].map(h => (
                  <div key={h} style={{ padding:'8px 12px', fontSize:12, fontWeight:600, color:'#A0A3BA', borderBottom:'2px solid #F0F1F8' }}>{h}</div>
                ))}
                {ORDERS_DATA.filter(o=>o.samDay).map(o => (
                  <React.Fragment key={o.id}>
                    <div style={{ padding:'12px 12px', fontSize:13, borderBottom:'1px solid #F5F6FC', color:'#2B2D7E', fontWeight:600 }}>{o.id}</div>
                    <div style={{ padding:'12px 12px', fontSize:13, borderBottom:'1px solid #F5F6FC' }}>{o.product}</div>
                    <div style={{ padding:'12px 12px', fontSize:13, borderBottom:'1px solid #F5F6FC', fontWeight:600 }}>{o.total.toLocaleString()}원</div>
                    <div style={{ padding:'12px 12px', borderBottom:'1px solid #F5F6FC' }}><OrderStatus s={o.status}/></div>
                    <div style={{ padding:'12px 12px', fontSize:12, color:'#A0A3BA', borderBottom:'1px solid #F5F6FC' }}>{o.date}</div>
                  </React.Fragment>
                ))}
              </div>
            </div>
          </div>
        )}

        {/* ── INVENTORY (상품 관리) ── */}
        {page === 'inventory' && (
          <div className="page-enter">
            <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:24 }}>
              <h1 style={{ fontSize:22, fontWeight:900 }}>상품 관리</h1>
              <button className="btn-primary">
                <i className="ph ph-plus" style={{ fontSize:16 }}></i>
                상품 등록
              </button>
            </div>

            {/* Filters */}
            <div style={{ background:'#fff', borderRadius:12, padding:'14px 18px', marginBottom:16,
              display:'flex', gap:10, alignItems:'center', flexWrap:'wrap',
              border:'1px solid rgba(43,45,126,0.07)' }}>
              <div style={{ display:'flex', gap:6, background:'#F4F5FB', borderRadius:8, padding:4 }}>
                {['전체','운동화','부츠','샌들','슬리퍼'].map(cat => (
                  <button key={cat} style={{ padding:'6px 14px', borderRadius:6, border:'none',
                    background: cat==='전체'?'#fff':'none', fontSize:13, cursor:'pointer',
                    fontWeight: cat==='전체'?600:400, boxShadow: cat==='전체'?'0 1px 4px rgba(0,0,0,0.08)':'none',
                    fontFamily:'Pretendard, sans-serif', color: cat==='전체'?'#1C1E3A':'#777' }}>
                    {cat}
                  </button>
                ))}
              </div>
              <div style={{ display:'flex', alignItems:'center', gap:6, border:'1.5px solid #E8EAF4', borderRadius:8, padding:'7px 12px', flex:1, maxWidth:240 }}>
                <i className="ph ph-magnifying-glass" style={{ fontSize:15, color:'#AAA' }}></i>
                <input placeholder="상품명 검색" style={{ border:'none', outline:'none', fontSize:13, fontFamily:'Pretendard, sans-serif', flex:1, background:'transparent' }}/>
              </div>
              <button className="btn-outline" style={{ fontSize:12 }}>
                <i className="ph ph-faders-horizontal" style={{ fontSize:14 }}></i>
                필터
              </button>
            </div>

            {/* Table */}
            <div style={{ background:'#fff', borderRadius:12, overflow:'hidden', border:'1px solid rgba(43,45,126,0.07)' }}>
              <div style={{ display:'grid', gridTemplateColumns:'0.3fr 1.8fr 0.8fr 0.8fr 1.8fr 0.9fr 0.9fr',
                padding:'10px 18px', background:'#F8F9FF', borderBottom:'2px solid #ECEEFF' }}>
                {['','상품명','카테고리','판매가','사이즈별 재고','당일발송','상태'].map((h,i) => (
                  <div key={i} style={{ fontSize:12, fontWeight:700, color:'#6B6E8F' }}>{h}</div>
                ))}
              </div>
              {PRODUCTS_DATA.map(prod => {
                const minStock = Math.min(...Object.values(prod.stock));
                const totalStock = Object.values(prod.stock).reduce((a,b)=>a+b,0);
                return (
                  <div key={prod.id} className="table-row"
                    style={{ display:'grid', gridTemplateColumns:'0.3fr 1.8fr 0.8fr 0.8fr 1.8fr 0.9fr 0.9fr' }}
                    onClick={() => showToast(`${prod.name} 상세 편집 창이 열립니다`)}>
                    <div><input type="checkbox" style={{ cursor:'pointer' }} onClick={e=>e.stopPropagation()}/></div>
                    <div>
                      <div style={{ fontSize:14, fontWeight:700 }}>{prod.name}</div>
                      {minStock <= 5 && minStock >= 0 && (
                        <span className="status-badge status-orange" style={{ fontSize:10, marginTop:4 }}>
                          재고 임박
                        </span>
                      )}
                    </div>
                    <div style={{ fontSize:13, color:'#6B6E8F' }}>{prod.cat}</div>
                    <div style={{ fontSize:14, fontWeight:700 }}>{prod.price.toLocaleString()}원</div>
                    <div style={{ display:'flex', flexWrap:'wrap', gap:3 }}>
                      {Object.entries(prod.stock).map(([sz, qty]) => (
                        <span key={sz} style={{ fontSize:11, padding:'2px 6px', borderRadius:4,
                          background: qty===0?'#FFF0F0': qty<=5?'#FFF3EB':'#EBF0FF',
                          color: qty===0?'#C0392B': qty<=5?'#C94208':'#2B2D7E',
                          fontWeight:600 }}>
                          {sz}: {qty}
                        </span>
                      ))}
                    </div>
                    <div>
                      <button className={`toggle-switch ${prod.samDay?'on':'off'}`}
                        onClick={e => { e.stopPropagation(); showToast(`${prod.name} 당일발송 ${prod.samDay?'비활성화':'활성화'}`); }}/>
                    </div>
                    <div>
                      <span className={`status-badge ${prod.status==='판매중'?'status-green':prod.status==='품절'?'status-red':'status-gray'}`}>
                        {prod.status}
                      </span>
                    </div>
                  </div>
                );
              })}
            </div>
          </div>
        )}

        {/* ── ORDERS (주문 관리) ── */}
        {page === 'orders' && (
          <div className="page-enter">
            <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:24 }}>
              <h1 style={{ fontSize:22, fontWeight:900 }}>주문 관리</h1>
              <div style={{ display:'flex', gap:8 }}>
                <button className="btn-outline" style={{ fontSize:13 }}>
                  <i className="ph ph-download-simple" style={{ fontSize:15 }}></i>
                  엑셀 내보내기
                </button>
                <button className="btn-primary">
                  <i className="ph ph-arrows-clockwise" style={{ fontSize:15 }}></i>
                  새로고침
                </button>
              </div>
            </div>

            {/* Tabs */}
            <div style={{ display:'flex', gap:4, marginBottom:16, background:'#fff',
              borderRadius:10, padding:6, width:'fit-content',
              border:'1px solid rgba(43,45,126,0.07)' }}>
              {['전체','준비중','배송중','배송완료','반품처리중'].map(tab => (
                <button key={tab} onClick={() => setOrderTab(tab)}
                  style={{ padding:'7px 18px', borderRadius:7, border:'none',
                    background: orderTab===tab?'#2B2D7E':'none',
                    color: orderTab===tab?'#fff':'#6B6E8F',
                    fontSize:13, fontWeight: orderTab===tab?700:400,
                    cursor:'pointer', fontFamily:'Pretendard, sans-serif',
                    transition:'all 0.18s' }}>
                  {tab}
                  {tab==='준비중' && <span style={{ marginLeft:6, background:orderTab==='준비중'?'rgba(255,255,255,0.3)':'#EBF0FF', color:orderTab==='준비중'?'#fff':'#2B2D7E', borderRadius:10, padding:'1px 6px', fontSize:11, fontWeight:700 }}>2</span>}
                </button>
              ))}
            </div>

            {/*당일발송 highlight */}
            <div style={{ background:'#FFF7F3', border:'1px solid #FFDDD0', borderRadius:10,
              padding:'12px 18px', marginBottom:16, display:'flex', alignItems:'center', gap:10 }}>
              <i className="ph ph-lightning" style={{ fontSize:18, color:'#E8540A' }}></i>
              <span style={{ fontSize:13, color:'#C94208', fontWeight:600 }}>당일 발송 마감 02:14:33 남음 — 준비중 주문 2건 즉시 처리 필요</span>
            </div>

            {/* Table */}
            <div style={{ background:'#fff', borderRadius:12, overflow:'hidden', border:'1px solid rgba(43,45,126,0.07)' }}>
              <div style={{ display:'grid', gridTemplateColumns:'0.3fr 1.4fr 2fr 0.8fr 1fr 0.8fr',
                padding:'10px 18px', background:'#F8F9FF', borderBottom:'2px solid #ECEEFF' }}>
                {['','주문번호','상품','금액','상태','일시'].map((h,i) => (
                  <div key={i} style={{ fontSize:12, fontWeight:700, color:'#6B6E8F' }}>{h}</div>
                ))}
              </div>
              {filteredOrders.map(order => (
                <div key={order.id} className="table-row"
                  style={{ display:'grid', gridTemplateColumns:'0.3fr 1.4fr 2fr 0.8fr 1fr 0.8fr' }}
                  onClick={() => setOrderDetail(order)}>
                  <div><input type="checkbox" style={{ cursor:'pointer' }} onClick={e=>e.stopPropagation()}/></div>
                  <div>
                    <div style={{ fontSize:13, fontWeight:700, color:'#2B2D7E' }}>{order.id}</div>
                    <div style={{ fontSize:12, color:'#A0A3BA', marginTop:2 }}>{order.name}</div>
                    {order.samDay && <span className="status-badge status-orange" style={{ fontSize:10, marginTop:4 }}>당일발송</span>}
                  </div>
                  <div>
                    <div style={{ fontSize:13, fontWeight:600 }}>{order.product}</div>
                    <div style={{ fontSize:12, color:'#A0A3BA', marginTop:2 }}>수량: {order.qty}개</div>
                  </div>
                  <div style={{ fontSize:14, fontWeight:800 }}>{order.total.toLocaleString()}원</div>
                  <div><OrderStatus s={order.status}/></div>
                  <div style={{ fontSize:12, color:'#A0A3BA' }}>{order.date.split(' ')[0]}</div>
                </div>
              ))}
            </div>
          </div>
        )}

        {/* ── PROMOTIONS (프로모션 관리) ── */}
        {page === 'promotions' && (
          <div className="page-enter">
            <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:24 }}>
              <h1 style={{ fontSize:22, fontWeight:900 }}>프로모션 관리</h1>
              <button className="btn-primary" onClick={() => setShowCouponModal(true)}>
                <i className="ph ph-plus" style={{ fontSize:16 }}></i>
                쿠폰 생성
              </button>
            </div>

            {/* Coupon list */}
            <div style={{ background:'#fff', borderRadius:12, padding:24, marginBottom:20, border:'1px solid rgba(43,45,126,0.07)' }}>
              <h2 style={{ fontSize:16, fontWeight:800, marginBottom:16 }}>할인 쿠폰 목록</h2>
              <div style={{ display:'grid', gridTemplateColumns:'1.2fr 0.7fr 0.8fr 0.9fr 1.2fr 0.8fr 0.7fr', gap:0 }}>
                {['쿠폰코드','유형','할인값','최소주문','유효기간','사용현황','상태'].map(h => (
                  <div key={h} style={{ padding:'8px 10px', fontSize:12, fontWeight:700, color:'#A0A3BA', borderBottom:'2px solid #F0F1F8' }}>{h}</div>
                ))}
                {coupons.map(c => (
                  <React.Fragment key={c.id}>
                    <div style={{ padding:'14px 10px', fontSize:14, fontWeight:800, color:'#2B2D7E', borderBottom:'1px solid #F5F6FC', display:'flex', alignItems:'center', gap:8 }}>
                      <i className="ph ph-tag" style={{ fontSize:14, color:'#7C83F7' }}></i>
                      {c.code}
                    </div>
                    <div style={{ padding:'14px 10px', fontSize:13, borderBottom:'1px solid #F5F6FC' }}>
                      <span className="status-badge status-blue" style={{ fontSize:11 }}>{c.type}</span>
                    </div>
                    <div style={{ padding:'14px 10px', fontSize:14, fontWeight:700, borderBottom:'1px solid #F5F6FC' }}>{c.value}</div>
                    <div style={{ padding:'14px 10px', fontSize:13, color:'#6B6E8F', borderBottom:'1px solid #F5F6FC' }}>{(c.minOrder).toLocaleString()}원~</div>
                    <div style={{ padding:'14px 10px', fontSize:12, color:'#A0A3BA', borderBottom:'1px solid #F5F6FC' }}>{c.expire}</div>
                    <div style={{ padding:'14px 10px', fontSize:13, borderBottom:'1px solid #F5F6FC' }}>
                      <span style={{ fontWeight:700 }}>{c.usage}</span>
                      <span style={{ color:'#A0A3BA' }}>/{c.total}</span>
                    </div>
                    <div style={{ padding:'14px 10px', borderBottom:'1px solid #F5F6FC', display:'flex', alignItems:'center' }}>
                      <button className={`toggle-switch ${c.active?'on':'off'}`}
                        onClick={() => toggleCoupon(c.id)}/>
                    </div>
                  </React.Fragment>
                ))}
              </div>
            </div>

            {/* Event banners */}
            <div style={{ background:'#fff', borderRadius:12, padding:24, border:'1px solid rgba(43,45,126,0.07)' }}>
              <h2 style={{ fontSize:16, fontWeight:800, marginBottom:16 }}>이벤트 배너 관리</h2>
              {banners.map(b => (
                <div key={b.id} style={{ display:'flex', alignItems:'center', justifyContent:'space-between',
                  padding:'16px 0', borderBottom:'1px solid #F5F6FC', gap:16 }}>
                  <div style={{ flex:1 }}>
                    <div style={{ fontSize:14, fontWeight:700 }}>{b.title}</div>
                    <div style={{ fontSize:12, color:'#A0A3BA', marginTop:3 }}>
                      {b.target} · {b.period}
                    </div>
                  </div>
                  <div style={{ display:'flex', alignItems:'center', gap:10 }}>
                    <span className={`status-badge ${b.active?'status-green':'status-gray'}`}>{b.active?'노출 중':'중지'}</span>
                    <button className={`toggle-switch ${b.active?'on':'off'}`}
                      onClick={() => toggleBanner(b.id)}/>
                  </div>
                </div>
              ))}
            </div>
          </div>
        )}
      </main>

      {/* ── FOOTER ── */}
      <footer style={{ background:'#fff', borderTop:'1px solid #E8EAF4', padding:'16px 24px', marginTop:'auto' }}>
        <div style={{ maxWidth:1280, margin:'0 auto', display:'flex', justifyContent:'space-between', alignItems:'center' }}>
          <span style={{ fontSize:12, color:'#A0A3BA' }}>SoleShop Admin v1.0 — 자체 개발 프로젝트 구현 데모</span>
          <span style={{ fontSize:12, color:'#A0A3BA' }}>© 2026 SoleShop</span>
        </div>
      </footer>

      {/* ── ORDER DETAIL MODAL ── */}
      {orderDetail && (
        <div className="overlay" onClick={() => setOrderDetail(null)}>
          <div className="modal-panel" onClick={e => e.stopPropagation()} style={{ width:480 }}>
            <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:22 }}>
              <h2 style={{ fontSize:18, fontWeight:800 }}>주문 상세</h2>
              <button onClick={() => setOrderDetail(null)}
                style={{ background:'none', border:'none', cursor:'pointer', color:'#AAA' }}>
                <i className="ph ph-x" style={{ fontSize:20 }}></i>
              </button>
            </div>
            <div style={{ background:'#F8F9FF', borderRadius:10, padding:16, marginBottom:20 }}>
              <div style={{ fontSize:13, fontWeight:700, color:'#2B2D7E', marginBottom:6 }}>{orderDetail.id}</div>
              <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:8 }}>
                {[
                  ['주문자', orderDetail.name],
                  ['상품', orderDetail.product],
                  ['수량', `${orderDetail.qty}개`],
                  ['결제금액', `${orderDetail.total.toLocaleString()}원`],
                  ['주문일시', orderDetail.date],
                  ['당일발송', orderDetail.samDay?'해당':'미해당'],
                ].map(([k,v],i) => (
                  <div key={i}>
                    <div style={{ fontSize:11, color:'#A0A3BA', fontWeight:600, marginBottom:2 }}>{k}</div>
                    <div style={{ fontSize:13, fontWeight:600 }}>{v}</div>
                  </div>
                ))}
              </div>
            </div>
            <div style={{ marginBottom:20 }}>
              <div style={{ fontSize:14, fontWeight:700, marginBottom:10 }}>주문 상태</div>
              <OrderStatus s={orderDetail.status}/>
            </div>
            {/* Tracking */}
            <div style={{ marginBottom:20 }}>
              <div style={{ fontSize:14, fontWeight:700, marginBottom:10 }}>송장번호</div>
              {orderDetail.tracking
                ? <div style={{ fontSize:14, fontWeight:700, color:'#2B2D7E', background:'#ECEEFF', padding:'10px 14px', borderRadius:8 }}>{orderDetail.tracking}</div>
                : (
                  <div style={{ display:'flex', gap:8 }}>
                    <input value={trackingNum} onChange={e=>setTrackingNum(e.target.value)}
                      placeholder="송장번호 입력"
                      style={{ flex:1, border:'1.5px solid #E8EAF4', borderRadius:8, padding:'9px 12px', fontSize:13, outline:'none', fontFamily:'Pretendard, sans-serif' }}/>
                    <button className="btn-primary" style={{ padding:'9px 16px' }}
                      onClick={() => { showToast(`송장번호 ${trackingNum} 등록됐습니다`); setOrderDetail(null); }}>
                      등록
                    </button>
                  </div>
                )
              }
            </div>
            <div style={{ display:'flex', gap:8 }}>
              <button className="btn-primary" style={{ flex:1 }}
                onClick={() => { showToast('발송 완료 처리됐습니다'); setOrderDetail(null); }}>
                발송 완료 처리
              </button>
              <button className="btn-outline" style={{ flex:1 }}
                onClick={() => setOrderDetail(null)}>
                닫기
              </button>
            </div>
          </div>
        </div>
      )}

      {/* ── COUPON CREATE MODAL ── */}
      {showCouponModal && (
        <div className="overlay" onClick={() => setShowCouponModal(false)}>
          <div className="modal-panel" onClick={e => e.stopPropagation()}>
            <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:22 }}>
              <h2 style={{ fontSize:18, fontWeight:800 }}>신규 쿠폰 생성</h2>
              <button onClick={() => setShowCouponModal(false)}
                style={{ background:'none', border:'none', cursor:'pointer', color:'#AAA' }}>
                <i className="ph ph-x" style={{ fontSize:20 }}></i>
              </button>
            </div>
            {[
              { label:'쿠폰 코드', key:'code', placeholder:'예: SUMMER15', type:'text' },
              { label:'할인값 (예: 15%, 10000원)', key:'value', placeholder:'15% 또는 10000원', type:'text' },
              { label:'최소 주문 금액 (원)', key:'minOrder', placeholder:'30000', type:'number' },
              { label:'유효 기간', key:'expire', placeholder:'', type:'date' },
            ].map(f => (
              <div key={f.key} style={{ marginBottom:16 }}>
                <div style={{ fontSize:13, fontWeight:700, marginBottom:6 }}>{f.label}</div>
                <input value={newCoupon[f.key]} type={f.type}
                  placeholder={f.placeholder}
                  onChange={e => setNewCoupon(p => ({...p, [f.key]:e.target.value}))}
                  style={{ width:'100%', border:'1.5px solid #E8EAF4', borderRadius:8,
                    padding:'10px 14px', fontSize:14, outline:'none',
                    fontFamily:'Pretendard, sans-serif', transition:'border-color 0.18s' }}
                  onFocus={e=>e.target.style.borderColor='#2B2D7E'}
                  onBlur={e=>e.target.style.borderColor='#E8EAF4'}/>
              </div>
            ))}
            <div style={{ marginBottom:20 }}>
              <div style={{ fontSize:13, fontWeight:700, marginBottom:6 }}>할인 유형</div>
              <div style={{ display:'flex', gap:8 }}>
                {['정률','정액'].map(t => (
                  <button key={t} onClick={() => setNewCoupon(p=>({...p,type:t}))}
                    style={{ padding:'8px 22px', borderRadius:8, border:'1.5px solid',
                      background: newCoupon.type===t?'#2B2D7E':'none',
                      color: newCoupon.type===t?'#fff':'#6B6E8F',
                      borderColor: newCoupon.type===t?'#2B2D7E':'#DDE0F0',
                      fontSize:14, fontWeight:600, cursor:'pointer',
                      fontFamily:'Pretendard, sans-serif' }}>
                    {t}
                  </button>
                ))}
              </div>
            </div>
            <div style={{ display:'flex', gap:8 }}>
              <button className="btn-primary" style={{ flex:1, justifyContent:'center', padding:'12px 0' }}
                onClick={createCoupon}>
                쿠폰 생성
              </button>
              <button className="btn-outline" style={{ flex:1, justifyContent:'center', padding:'12px 0' }}
                onClick={() => setShowCouponModal(false)}>
                취소
              </button>
            </div>
          </div>
        </div>
      )}

      {/* ── TOAST ── */}
      {toast && <div className="toast">{toast}</div>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
