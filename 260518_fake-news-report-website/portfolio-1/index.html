<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>

<link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700&display=swap" rel="stylesheet"/>

<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

<style>
*{box-sizing:border-box;margin:0;padding:0;}
html,body,#root{width:100%;min-height:100vh;font-family:'Pretendard',sans-serif;background:#F4F6FA;color:#111827;}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideDown{from{opacity:0;transform:translateY(-12px)}to{opacity:1;transform:translateY(0)}}
@keyframes drawerSlide{from{opacity:0;transform:translateX(100%)}to{opacity:1;transform:translateX(0)}}
@keyframes toastPop{from{opacity:0;transform:translateY(12px) scale(0.95)}to{opacity:1;transform:translateY(0) scale(1)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.5}}
@keyframes shimmer{from{background-position:-200% 0}to{background-position:200% 0}}
@keyframes countUp{from{opacity:0;transform:scale(0.8)}to{opacity:1;transform:scale(1)}}
.fade-in{animation:fadeIn 0.35s ease both}
.slide-down{animation:slideDown 0.25s ease both}
.stagger-1{animation-delay:0.05s}
.stagger-2{animation-delay:0.1s}
.stagger-3{animation-delay:0.15s}
.stagger-4{animation-delay:0.2s}
.count-up{animation:countUp 0.5s ease both}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useRef} = React;
const {LineChart,Line,BarChart,Bar,XAxis,YAxis,CartesianGrid,Tooltip,ResponsiveContainer,PieChart,Pie,Cell} = Recharts;

/* ── 색상 ── */
const P = {
  primary:'#1E3A6E', secondary:'#2D5FA0', accent:'#E8A020',
  bg:'#F4F6FA', surface:'#FFFFFF', border:'#E2E8F0',
  text:'#111827', textSub:'#4B5563', success:'#16A34A', danger:'#DC2626', warn:'#D97706'
};

/* ── 더미 데이터 ── */
const REPORTS = [
  {id:1,title:'중앙일보 경제 기사 수치 오류 제보',status:'검토중',date:'2026-05-15',private:false,author:'김민수',type:'회원',url:'https://example.com/article/123',desc:'기사 본문 3분기 GDP 수치가 통계청 공식 발표와 다름. 2.1% → 실제 1.8%',images:['report-img-01.jpg'],contact:null},
  {id:2,title:'SNS 허위 정치 광고 유포 신고',status:'처리완료',date:'2026-05-14',private:false,author:'이지은',type:'회원',url:'https://example.com/sns/456',desc:'페이스북에 특정 후보 사칭 계정이 가짜 공약을 홍보 중. 원본 발언과 다름.',images:[],contact:null},
  {id:3,title:'유튜브 허위 의학 정보 영상',status:'접수',date:'2026-05-13',private:true,author:'비회원',type:'비회원',url:'https://example.com/yt/789',desc:'근거 없는 치료법을 의학적 사실처럼 주장. 출처 없음.',images:['evidence-01.jpg','evidence-02.jpg'],contact:'010-5678-9012'},
  {id:4,title:'지방 선거 투표율 왜곡 보도',status:'접수',date:'2026-05-12',private:false,author:'박준호',type:'회원',url:'https://example.com/news/321',desc:'투표율 통계를 특정 지역만 발췌해 전체인 양 보도.',images:[],contact:null},
  {id:5,title:'악성 루머 카카오톡 단체방 유포',status:'거절',date:'2026-05-11',private:false,author:'최서연',type:'회원',url:'',desc:'근거 없는 특정인 관련 루머가 단체방에서 확산 중.',images:[],contact:null},
  {id:6,title:'포털 메인 뉴스 사진 오보',status:'검토중',date:'2026-05-10',private:true,author:'비회원',type:'비회원',url:'https://example.com/portal/555',desc:'2018년 사진을 2026년 최근 사건 사진으로 사용.',images:['evidence-03.jpg'],contact:'park@example.com'},
];

const MEMBERS = [
  {id:1,name:'김민수',email:'minsu@example.com',role:'회원',status:'활성',reports:4,joined:'2026-03-01'},
  {id:2,name:'이지은',email:'jieun@example.com',role:'회원',status:'활성',reports:7,joined:'2026-03-15'},
  {id:3,name:'박준호',email:'junho@example.com',role:'회원',status:'활성',reports:2,joined:'2026-04-02'},
  {id:4,name:'최서연',email:'seoyeon@example.com',role:'관리자',status:'활성',reports:1,joined:'2026-02-10'},
  {id:5,name:'정태양',email:'taeyang@example.com',role:'회원',status:'비활성',reports:0,joined:'2026-04-20'},
];

const TREND_DATA = [
  {date:'5/9',접수:3},{date:'5/10',접수:5},{date:'5/11',접수:2},{date:'5/12',접수:7},{date:'5/13',접수:4},{date:'5/14',접수:9},{date:'5/15',접수:6},
];

const STATUS_COLORS = {접수:'#E8A020',검토중:'#2D5FA0',처리완료:P.success,거절:'#9CA3AF'};
const STATUS_BG = {접수:'#FEF3C7',검토중:'#DBEAFE',처리완료:'#DCFCE7',거절:'#F3F4F6'};

/* ── 공통 컴포넌트 ── */
function Badge({status}){
  return(
    <span style={{padding:'2px 10px',borderRadius:20,fontSize:12,fontWeight:600,
      background:STATUS_BG[status]||'#F3F4F6',color:STATUS_COLORS[status]||P.textSub}}>
      {status}
    </span>
  );
}

function Toast({msg,onClose}){
  useEffect(()=>{const t=setTimeout(onClose,2800);return()=>clearTimeout(t);},[]);
  return(
    <div style={{position:'fixed',bottom:28,right:28,zIndex:9999,
      background:P.primary,color:'#fff',padding:'12px 20px',borderRadius:10,
      fontSize:14,boxShadow:'0 4px 20px rgba(0,0,0,0.2)',
      animation:'toastPop 0.3s ease both'}}>
      {msg}
    </div>
  );
}

/* ── Drawer (상세 보기) ── */
function ReportDrawer({report,onClose,onStatusChange}){
  const [status,setStatus]=useState(report.status);
  const [note,setNote]=useState('');
  if(!report)return null;
  return(
    <div style={{position:'fixed',inset:0,zIndex:800}} onClick={onClose}>
      <div style={{position:'absolute',inset:0,background:'rgba(0,0,0,0.35)'}}/>
      <div onClick={e=>e.stopPropagation()} style={{
        position:'absolute',top:0,right:0,width:480,height:'100%',
        background:P.surface,boxShadow:'-4px 0 24px rgba(0,0,0,0.15)',
        display:'flex',flexDirection:'column',animation:'drawerSlide 0.3s ease both'}}>
        {/* 헤더 */}
        <div style={{padding:'20px 24px',borderBottom:`1px solid ${P.border}`,display:'flex',justifyContent:'space-between',alignItems:'center'}}>
          <div>
            <span style={{fontSize:11,color:P.textSub,marginRight:8}}>[제보 #{report.id}]</span>
            <Badge status={status}/>
          </div>
          <button onClick={onClose} style={{background:'none',border:'none',cursor:'pointer',color:P.textSub}}>
            <i data-lucide="x" style={{width:20,height:20}}/>
          </button>
        </div>
        {/* 본문 */}
        <div style={{flex:1,overflowY:'auto',padding:24,display:'flex',flexDirection:'column',gap:16}}>
          <h3 style={{fontSize:16,fontWeight:700,color:P.text,lineHeight:1.5}}>{report.title}</h3>
          <div style={{display:'flex',gap:12,flexWrap:'wrap'}}>
            <span style={{fontSize:12,color:P.textSub}}><strong>유형:</strong> {report.type}</span>
            <span style={{fontSize:12,color:P.textSub}}><strong>제출:</strong> {report.date}</span>
            <span style={{fontSize:12,color:P.textSub}}><strong>제보자:</strong> {report.author}</span>
            {report.private&&<span style={{fontSize:12,color:P.danger,fontWeight:600}}>비공개</span>}
          </div>
          {report.url&&(
            <div style={{background:'#F8FAFC',borderRadius:8,padding:12,border:`1px solid ${P.border}`}}>
              <p style={{fontSize:11,color:P.textSub,marginBottom:4}}>첨부 URL</p>
              <a href={report.url} style={{fontSize:13,color:P.secondary,wordBreak:'break-all'}}>{report.url}</a>
            </div>
          )}
          <div style={{background:'#F8FAFC',borderRadius:8,padding:12,border:`1px solid ${P.border}`}}>
            <p style={{fontSize:11,color:P.textSub,marginBottom:6}}>제보 내용</p>
            <p style={{fontSize:14,lineHeight:1.7,color:P.text}}>{report.desc}</p>
          </div>
          {report.images.length>0&&(
            <div>
              <p style={{fontSize:11,color:P.textSub,marginBottom:8}}>첨부 이미지 ({report.images.length}장)</p>
              <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
                {report.images.map((img,i)=>(
                  <div key={i} style={{width:80,height:60,borderRadius:6,background:'#E5E7EB',
                    display:'flex',alignItems:'center',justifyContent:'center',fontSize:10,color:P.textSub,border:`1px solid ${P.border}`}}>
                    이미지 {i+1}
                  </div>
                ))}
              </div>
            </div>
          )}
          {report.contact&&(
            <div style={{background:'#FFF7ED',borderRadius:8,padding:12,border:'1px solid #FED7AA'}}>
              <p style={{fontSize:11,color:'#92400E',marginBottom:4}}>비회원 연락처</p>
              <p style={{fontSize:14,color:'#78350F',fontWeight:600}}>{report.contact}</p>
            </div>
          )}
          {/* 상태 변경 */}
          <div style={{background:'#F8FAFC',borderRadius:8,padding:12,border:`1px solid ${P.border}`}}>
            <p style={{fontSize:11,color:P.textSub,marginBottom:8}}>처리 상태 변경</p>
            <select value={status} onChange={e=>setStatus(e.target.value)} style={{
              width:'100%',padding:'8px 12px',borderRadius:6,border:`1px solid ${P.border}`,
              fontSize:13,background:P.surface,color:P.text,marginBottom:10}}>
              {['접수','검토중','처리완료','거절'].map(s=><option key={s} value={s}>{s}</option>)}
            </select>
            <textarea value={note} onChange={e=>setNote(e.target.value)}
              placeholder="처리 메모를 입력하세요..."
              rows={3} style={{width:'100%',padding:'8px 12px',borderRadius:6,
                border:`1px solid ${P.border}`,fontSize:13,resize:'vertical',fontFamily:'inherit'}}/>
          </div>
        </div>
        {/* 액션 버튼 */}
        <div style={{padding:'16px 24px',borderTop:`1px solid ${P.border}`,display:'flex',gap:8}}>
          <button onClick={()=>{onStatusChange(report.id,status);onClose();}} style={{
            flex:1,padding:'10px',borderRadius:8,border:'none',cursor:'pointer',
            background:P.primary,color:'#fff',fontWeight:600,fontSize:14,fontFamily:'inherit'}}>
            상태 저장
          </button>
          <button onClick={onClose} style={{
            padding:'10px 16px',borderRadius:8,border:`1px solid ${P.border}`,
            cursor:'pointer',background:P.surface,color:P.text,fontSize:14,fontFamily:'inherit'}}>
            닫기
          </button>
        </div>
      </div>
    </div>
  );
}

/* ── 제보 폼 모달 ── */
function ReportFormModal({onClose,onSubmit,userType}){
  const [title,setTitle]=useState('');
  const [content,setContent]=useState('');
  const [url,setUrl]=useState('');
  const [contact,setContact]=useState('');
  const [agreed,setAgreed]=useState(false);
  const [files,setFiles]=useState([]);
  const [uploading,setUploading]=useState(false);
  const [progress,setProgress]=useState(0);
  const [captchaOk,setCaptchaOk]=useState(false);

  function handleFile(e){
    const arr=Array.from(e.target.files||[]).slice(0,5);
    setFiles(arr);
    if(arr.length>0){
      setUploading(true);setProgress(0);
      const timer=setInterval(()=>{
        setProgress(p=>{if(p>=100){clearInterval(timer);setUploading(false);return 100;}return p+20;});
      },180);
    }
  }

  function handleSubmit(){
    if(!title.trim()||!content.trim()){return;}
    if(userType==='비회원'&&!agreed){return;}
    onSubmit();
  }

  return(
    <div style={{position:'fixed',inset:0,zIndex:900,display:'flex',alignItems:'center',justifyContent:'center'}} onClick={onClose}>
      <div style={{position:'absolute',inset:0,background:'rgba(0,0,0,0.4)'}}/>
      <div onClick={e=>e.stopPropagation()} style={{
        position:'relative',width:'100%',maxWidth:560,maxHeight:'90vh',overflow:'auto',
        background:P.surface,borderRadius:16,boxShadow:'0 8px 40px rgba(0,0,0,0.2)',
        animation:'fadeIn 0.25s ease both'}}>
        <div style={{padding:'20px 24px',borderBottom:`1px solid ${P.border}`,display:'flex',justifyContent:'space-between',alignItems:'center'}}>
          <div>
            <h3 style={{fontSize:17,fontWeight:700,color:P.text}}>제보하기</h3>
            <span style={{fontSize:12,color:P.textSub}}>
              {userType==='회원'?'회원 제보 — 제보 내역에서 결과를 확인할 수 있습니다':'비회원 제보 — 연락처로 결과를 안내드립니다'}
            </span>
          </div>
          <button onClick={onClose} style={{background:'none',border:'none',cursor:'pointer',color:P.textSub}}>
            <i data-lucide="x" style={{width:20,height:20}}/>
          </button>
        </div>
        <div style={{padding:24,display:'flex',flexDirection:'column',gap:14}}>
          <div>
            <label style={{fontSize:12,fontWeight:600,color:P.textSub,display:'block',marginBottom:6}}>제목 <span style={{color:P.danger}}>*</span></label>
            <input value={title} onChange={e=>setTitle(e.target.value)} placeholder="허위사실 또는 가짜뉴스 제목을 입력하세요"
              style={{width:'100%',padding:'10px 12px',borderRadius:8,border:`1px solid ${P.border}`,fontSize:14,fontFamily:'inherit'}}/>
          </div>
          <div>
            <label style={{fontSize:12,fontWeight:600,color:P.textSub,display:'block',marginBottom:6}}>내용 <span style={{color:P.danger}}>*</span></label>
            <textarea value={content} onChange={e=>setContent(e.target.value)} rows={4}
              placeholder="허위사실의 구체적인 내용을 입력하세요. 원본과 다른 부분을 명확히 설명해 주세요."
              style={{width:'100%',padding:'10px 12px',borderRadius:8,border:`1px solid ${P.border}`,fontSize:14,resize:'vertical',fontFamily:'inherit'}}/>
          </div>
          <div>
            <label style={{fontSize:12,fontWeight:600,color:P.textSub,display:'block',marginBottom:6}}>출처 URL</label>
            <input value={url} onChange={e=>setUrl(e.target.value)} placeholder="https://example.com/article/..."
              style={{width:'100%',padding:'10px 12px',borderRadius:8,border:`1px solid ${P.border}`,fontSize:14,fontFamily:'inherit'}}/>
          </div>
          {/* 이미지 업로드 */}
          <div>
            <label style={{fontSize:12,fontWeight:600,color:P.textSub,display:'block',marginBottom:6}}>이미지 첨부 (최대 5장, 파일당 5MB 이하)</label>
            <label style={{display:'flex',alignItems:'center',gap:8,padding:'10px 14px',borderRadius:8,
              border:`2px dashed ${P.border}`,cursor:'pointer',background:'#F8FAFC'}}>
              <i data-lucide="image-plus" style={{width:16,height:16,color:P.secondary}}/>
              <span style={{fontSize:13,color:P.textSub}}>{files.length>0?`${files.length}개 선택됨`:'클릭하여 이미지 선택'}</span>
              <input type="file" accept="image/*" multiple onChange={handleFile} style={{display:'none'}}/>
            </label>
            {uploading&&(
              <div style={{marginTop:8}}>
                <div style={{height:4,background:'#E5E7EB',borderRadius:2,overflow:'hidden'}}>
                  <div style={{height:'100%',background:P.secondary,borderRadius:2,
                    width:`${progress}%`,transition:'width 0.18s ease'}}/>
                </div>
                <p style={{fontSize:11,color:P.textSub,marginTop:4}}>이미지 압축 및 업로드 중... {progress}%</p>
              </div>
            )}
          </div>
          {/* 비회원 연락처 */}
          {userType==='비회원'&&(
            <div style={{background:'#FFF7ED',borderRadius:10,padding:14,border:'1px solid #FED7AA'}}>
              <label style={{fontSize:12,fontWeight:600,color:'#92400E',display:'block',marginBottom:6}}>
                연락처 (처리 결과 안내용)
              </label>
              <input value={contact} onChange={e=>setContact(e.target.value)} placeholder="이메일 또는 휴대폰 번호"
                style={{width:'100%',padding:'10px 12px',borderRadius:8,border:'1px solid #FED7AA',
                  fontSize:14,background:'#FFFBEB',fontFamily:'inherit',marginBottom:10}}/>
              <label style={{display:'flex',alignItems:'flex-start',gap:8,cursor:'pointer'}}>
                <input type="checkbox" checked={agreed} onChange={e=>setAgreed(e.target.checked)}
                  style={{marginTop:2,width:14,height:14,accentColor:P.primary}}/>
                <span style={{fontSize:12,color:'#92400E',lineHeight:1.6}}>
                  개인정보 수집·이용에 동의합니다.<br/>
                  <span style={{color:'#B45309'}}>수집 항목: 연락처 / 보유 기간: 처리 완료 후 1년</span>
                </span>
              </label>
            </div>
          )}
          {/* reCAPTCHA 시뮬 */}
          <div style={{border:`1px solid ${P.border}`,borderRadius:8,padding:'12px 14px',
            display:'flex',alignItems:'center',gap:12,background:'#F8FAFC'}}>
            <input type="checkbox" checked={captchaOk} onChange={e=>setCaptchaOk(e.target.checked)}
              style={{width:18,height:18,accentColor:P.primary}}/>
            <span style={{fontSize:13,color:P.text}}>로봇이 아닙니다</span>
            <span style={{marginLeft:'auto',fontSize:10,color:'#9CA3AF'}}>reCAPTCHA v3</span>
          </div>
        </div>
        <div style={{padding:'16px 24px',borderTop:`1px solid ${P.border}`,display:'flex',gap:8}}>
          <button onClick={handleSubmit} style={{
            flex:1,padding:'12px',borderRadius:8,border:'none',cursor:'pointer',
            background:P.primary,color:'#fff',fontWeight:700,fontSize:15,fontFamily:'inherit'}}>
            제보 제출
          </button>
          <button onClick={onClose} style={{
            padding:'12px 16px',borderRadius:8,border:`1px solid ${P.border}`,
            cursor:'pointer',background:P.surface,color:P.text,fontSize:14,fontFamily:'inherit'}}>
            취소
          </button>
        </div>
      </div>
    </div>
  );
}

/* ── 회원 관리 모달 ── */
function MemberModal({member,onClose,onSave}){
  const [role,setRole]=useState(member.role);
  const [status,setStatus]=useState(member.status);
  return(

      <div onClick={e=>e.stopPropagation()} style={{
        position:'relative',width:420,background:P.surface,borderRadius:14,
        boxShadow:'0 8px 40px rgba(0,0,0,0.18)',animation:'fadeIn 0.25s ease both'}}>
        <div style={{padding:'18px 22px',borderBottom:`1px solid ${P.border}`,display:'flex',justifyContent:'space-between',alignItems:'center'}}>
          <h3 style={{fontSize:16,fontWeight:700}}>회원 정보 수정</h3>
          <button onClick={onClose} style={{background:'none',border:'none',cursor:'pointer',color:P.textSub}}>
            <i data-lucide="x" style={{width:18,height:18}}/>
          </button>

        <div style={{padding:22,display:'flex',flexDirection:'column',gap:14}}>

              <p style={{fontSize:12,color:P.textSub,marginBottom:4}}>이름</p>

            </div>
            <div style={{flex:1}}>
              <p style={{fontSize:12,color:P.textSub,marginBottom:4}}>이메일</p>
              <p style={{fontSize:13}}>{member.email}</p>

            <div style={{background:P.surface,borderRadius:12,border:`1px solid ${P.border}`,overflow:'hidden'}}>
              <div style={{display:'grid',gridTemplateColumns:'1fr 1.5fr 1fr 1fr 1fr auto',
                padding:'11px 20px',background:'#F8FAFC',borderBottom:`1px solid ${P.border}`,
                fontSize:12,fontWeight:600,color:P.textSub}}>
                <span>이름</span><span>이메일</span><span>역할</span><span>상태</span><span>제보 수</span><span>관리</span>
              </div>
              {members.map((m,i)=>(
                <div key={m.id} className={`fade-in stagger-${Math.min(i+1,4)}`} style={{
                  display:'grid',gridTemplateColumns:'1fr 1.5fr 1fr 1fr 1fr auto',
                  padding:'13px 20px',borderBottom:`1px solid ${P.border}`,alignItems:'center'}}>
                  <span style={{fontSize:14,fontWeight:600,color:P.text}}>{m.name}</span>
                  <span style={{fontSize:13,color:P.textSub}}>{m.email}</span>
                  <span style={{fontSize:12}}>
                    <span style={{padding:'3px 10px',borderRadius:20,
                      background:m.role==='관리자'?'#EDE9FE':'#DBEAFE',
                      color:m.role==='관리자'?'#6D28D9':P.secondary,fontWeight:600}}>
                      {m.role}
                    </span>
                  </span>
                  <span style={{fontSize:12}}>
                    <span style={{padding:'3px 10px',borderRadius:20,
                      background:m.status==='활성'?'#DCFCE7':'#F3F4F6',
                      color:m.status==='활성'?P.success:'#9CA3AF',fontWeight:600}}>
                      {m.status}
                    </span>
                  </span>
                  <span style={{fontSize:13,color:P.text,fontWeight:600}}>{m.reports}건</span>
                  <button onClick={()=>setMemberModal(m)} style={{
                    padding:'5px 12px',borderRadius:6,border:`1px solid ${P.border}`,
                    cursor:'pointer',background:P.surface,color:P.text,fontSize:12,fontFamily:'inherit',
                    transition:'background 0.12s'}}
                    onMouseEnter={e=>e.target.style.background='#F8FAFC'}
                    onMouseLeave={e=>e.target.style.background=P.surface}>
                    수정
                  </button>
                </div>
              ))}
            </div>
          </div>
        )}
      </main>

      {/* ── 오버레이 ── */}
      {drawer&&<ReportDrawer report={drawer} onClose={()=>setDrawer(null)} onStatusChange={handleStatusChange}/>}
      {reportForm&&<ReportFormModal userType={reportForm} onClose={()=>setReportForm(null)} onSubmit={()=>{setReportForm(null);showToast('제보가 접수되었습니다. 검토 후 결과를 안내드립니다.');}}/>}
      {memberModal&&<MemberModal member={memberModal} onClose={()=>setMemberModal(null)} onSave={handleMemberSave}/>}
      {toast&&<Toast msg={toast} onClose={()=>setToast(null)}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
