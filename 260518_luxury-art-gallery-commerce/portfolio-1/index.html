<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>럭셔리 아트 갤러리 커머스 — 맞춤 구현 데모</title>
  <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" rel="stylesheet" />
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://unpkg.com/prop-types/prop-types.min.js"></script>
  <script src="https://unpkg.com/react-is@18/umd/react-is.production.min.js"></script>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body, #root { width: 100%; min-height: 100vh; background: #0D0D0D; font-family: 'Pretendard', -apple-system, sans-serif; }

    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes slideUp { from { opacity: 0; transform: translateY(18px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes scaleIn { from { opacity: 0; transform: scale(0.96); } to { opacity: 1; transform: scale(1); } }
    @keyframes glowPulse { 0%,100% { box-shadow: 0 0 0 0 rgba(201,168,76,0); } 50% { box-shadow: 0 0 24px 6px rgba(201,168,76,0.25); } }
    @keyframes toastIn { from { opacity: 0; transform: translateX(32px); } to { opacity: 1; transform: translateX(0); } }
    @keyframes stagger { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }

    .page-anim { animation: fadeIn 0.35s ease; }
    .card-stagger { animation: stagger 0.45s ease both; }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: #1A1A1A; }
    ::-webkit-scrollbar-thumb { background: #3A3A3A; border-radius: 2px; }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef } = React;

const C = {
  bg: '#0D0D0D', surface: '#1A1A1A', surface2: '#232323', border: '#2C2C2C',
  gold: '#C9A84C', goldLight: '#E8D5A3', goldDim: '#7A6430',
  text: '#F5F0E8', textSub: '#9E9E8A', textDim: '#5C5C50',
  green: '#4ADE80', red: '#F87171',
};

// ── Lucide 아이콘 헬퍼
const Icon = ({ name, size = 18, color = 'currentColor', sw = 1.5 }) => {
  const ref = useRef(null);
  useEffect(() => {
    if (!ref.current || !window.lucide) return;
    ref.current.innerHTML = '';
    const kebab = name.replace(/([A-Z])/g, (m, c, idx) => (idx > 0 ? '-' : '') + c.toLowerCase());
    const i = document.createElement('i');
    i.setAttribute('data-lucide', kebab);
    ref.current.appendChild(i);
    window.lucide.createIcons();
    const svg = ref.current.querySelector('svg');
    if (svg) {
      svg.setAttribute('width', size);
      svg.setAttribute('height', size);
      svg.setAttribute('stroke', color);
      svg.setAttribute('stroke-width', String(sw));
      svg.style.minWidth = size + 'px';
    }
  }, [name, size, color, sw]);
  return <span ref={ref} style={{ display: 'inline-flex', alignItems: 'center', flexShrink: 0 }} />;
};

// ── 작품 데이터
const ARTWORKS = [
  { id: 1, title: '빛의 소나타 No. 3', artist: '알렉상드르 뒤보아', year: 2019, cat: '회화', price: 12800000, size: '120 × 90 cm', medium: '유화 on 캔버스', edition: '1/1', desc: '르와르 강변의 황혼을 포착한 대형 추상 유화. 금박 텍스처와 두터운 임파스토 기법으로 빛의 진동을 표현합니다.' },
  { id: 2, title: '파리의 고요한 아침', artist: '마르가리타 로시', year: 2021, cat: '사진', price: 3400000, size: '80 × 60 cm', medium: '아카이벌 피그먼트 프린트', edition: '3/10', desc: '파리 마레 지구 새벽 5시를 담은 한정판 사진 작품. 아르쉬 수채화지에 피그먼트 잉크로 인쇄합니다.' },
  { id: 3, title: '검은 달의 의식', artist: '김지수', year: 2022, cat: '조각', price: 28500000, size: '45 × 45 × 80 cm', medium: '황동 주조', edition: '1/3', desc: '한국 무속 의례에서 영감받은 황동 조각. 중공 주조 기법으로 내부 공간의 울림을 담습니다.' },
  { id: 4, title: '식물의 시간', artist: '에마 베르나르', year: 2020, cat: '회화', price: 8900000, size: '100 × 80 cm', medium: '아크릴 on 리넨', edition: '1/1', desc: '자연과 시간의 관계를 탐구한 식물 추상화. 레이어드 아크릴로 생명력과 쇠락을 동시에 표현합니다.' },
  { id: 5, title: '군도 연작 V', artist: '박현우', year: 2023, cat: '판화', price: 2200000, size: '60 × 50 cm', medium: '에칭 + 아쿠아틴트', edition: '7/20', desc: '한국 서남해 군도를 모티프로 한 동판화 연작. 에칭과 아쿠아틴트의 조합으로 섬의 질감을 재현합니다.' },
  { id: 6, title: '코스모스 스터디 XI', artist: '루카 페리니', year: 2021, cat: '드로잉', price: 1800000, size: '42 × 59 cm', medium: '그라파이트 on 종이', edition: '1/1', desc: '우주의 구조를 세밀한 그라파이트 선으로 탐구한 드로잉. 수학적 패턴과 유기적 형태를 결합합니다.' },
];

const CATS = ['전체', '회화', '조각', '사진', '판화', '드로잉'];

const PALETTES = [
  ['#1A0F00','#C9A84C','#7A4A20'], ['#0A0A1A','#4A6BAA','#1A2A5A'],
  ['#0F0F0F','#6A6A6A','#2A2A2A'], ['#080A0A','#2A5A4A','#1A3A2A'],
  ['#120808','#7A3A2A','#4A1A10'], ['#0A080A','#5A3A6A','#2A1A4A'],
];

const ArtBox = ({ id, w = '100%' }) => {
  const pal = PALETTES[(id - 1) % PALETTES.length];
  return (
    <div style={{ width: w, aspectRatio: '4/3', background: `linear-gradient(135deg, ${pal[0]} 0%, ${pal[1]} 65%, ${pal[2]} 100%)`, position: 'relative', overflow: 'hidden' }}>
      <div style={{ position: 'absolute', inset: 0, backgroundImage: 'repeating-linear-gradient(45deg, transparent, transparent 3px, rgba(255,255,255,0.015) 3px, rgba(255,255,255,0.015) 6px)' }} />
      <div style={{ position: 'absolute', inset: 0, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
        <span style={{ color: 'rgba(255,255,255,0.12)', fontSize: 10, fontWeight: 700, letterSpacing: 4, textTransform: 'uppercase' }}>ARTWORK</span>
      </div>
    </div>
  );
};

const Toast = ({ msg, onDone }) => {
  useEffect(() => { const t = setTimeout(onDone, 2500); return () => clearTimeout(t); }, []);
  return (
    <div style={{ position: 'fixed', bottom: 32, right: 32, zIndex: 3000, background: C.surface2, border: `1px solid ${C.gold}`, color: C.text, padding: '12px 20px', borderRadius: 2, fontSize: 14, display: 'flex', alignItems: 'center', gap: 10, animation: 'toastIn 0.3s ease' }}>
      <span style={{ color: C.gold, display: 'flex' }}><Icon name="Check" size={15} color={C.gold} /></span>
      {msg}
    </div>
  );
};

// ── 라이트박스 (줌 + 뷰어)
const Lightbox = ({ art, onClose }) => {
  const [zoom, setZoom] = useState(1);
  const handleWheel = (e) => { e.preventDefault(); setZoom(z => Math.min(3, Math.max(1, z + (e.deltaY < 0 ? 0.15 : -0.15)))); };
  return (
    <div style={{ position: 'fixed', inset: 0, background: 'rgba(0,0,0,0.95)', zIndex: 2000, display: 'flex', alignItems: 'center', justifyContent: 'center', animation: 'fadeIn 0.25s ease' }} onClick={onClose} onWheel={handleWheel}>
      <div style={{ position: 'absolute', top: 20, right: 24, display: 'flex', gap: 10 }}>
        {[['ZoomIn', () => setZoom(z => Math.min(3, z + 0.3))], ['ZoomOut', () => setZoom(z => Math.max(1, z - 0.3))], ['X', onClose]].map(([ic, fn]) => (
          <button key={ic} onClick={e => { e.stopPropagation(); fn(); }} style={{ width: 40, height: 40, background: C.surface, border: `1px solid ${C.border}`, color: C.textSub, borderRadius: 2, cursor: 'pointer', display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
            <Icon name={ic} size={15} />
          </button>
        ))}
      </div>
      <div onClick={e => e.stopPropagation()} style={{ display: 'flex', gap: 40, padding: 40, maxWidth: '90vw' }}>
        <div style={{ transform: `scale(${zoom})`, transformOrigin: 'center', transition: 'transform 0.2s', cursor: zoom > 1 ? 'grab' : 'zoom-in' }}>
          <ArtBox id={art.id} w="460px" />
        </div>
        <div style={{ width: 280, flexShrink: 0 }}>
          <div style={{ fontSize: 10, color: C.gold, letterSpacing: 4, textTransform: 'uppercase', marginBottom: 10 }}>{art.cat}</div>
          <div style={{ fontSize: 22, fontWeight: 600, color: C.text, lineHeight: 1.3, marginBottom: 6 }}>{art.title}</div>
          <div style={{ fontSize: 14, color: C.textSub, marginBottom: 24 }}>{art.artist} · {art.year}</div>
          <div style={{ borderTop: `1px solid ${C.border}`, paddingTop: 20, marginBottom: 20 }}>
            <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 16 }}>
              {[['규격', art.size], ['재료', art.medium], ['에디션', art.edition], ['가격', `${art.price.toLocaleString()}원`]].map(([k, v]) => (
                <div key={k}><div style={{ fontSize: 9, color: C.textDim, letterSpacing: 3, textTransform: 'uppercase', marginBottom: 4 }}>{k}</div><div style={{ fontSize: 13, color: C.text }}>{v}</div></div>
              ))}
            </div>
          </div>
          <div style={{ fontSize: 13, color: C.textSub, lineHeight: 1.7, marginBottom: 24 }}>{art.desc}</div>
          <button style={{ width: '100%', padding: '13px 0', background: C.gold, color: '#000', border: 'none', borderRadius: 2, fontSize: 13, fontWeight: 700, cursor: 'pointer', letterSpacing: 2, textTransform: 'uppercase' }}>소장 문의</button>
        </div>
      </div>
      <div style={{ position: 'absolute', bottom: 20, left: '50%', transform: 'translateX(-50%)', fontSize: 11, color: C.textDim }}>마우스 휠로 확대/축소</div>
    </div>
  );
};

// ── 홈 화면
const HomeScreen = () => {
  const [lb, setLb] = useState(null);
  return (
    <div className="page-anim">
      {/* 히어로 */}
      <div style={{ minHeight: 540, background: 'linear-gradient(155deg, #0D0D0D 0%, #161000 55%, #0D0D0D 100%)', display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', padding: '80px 40px', textAlign: 'center', position: 'relative', overflow: 'hidden' }}>
        <div style={{ position: 'absolute', inset: 0, backgroundImage: 'radial-gradient(ellipse 55% 35% at 50% 50%, rgba(201,168,76,0.06) 0%, transparent 70%)' }} />
        <div style={{ position: 'relative' }}>
          <div style={{ fontSize: 10, color: C.gold, letterSpacing: 6, textTransform: 'uppercase', marginBottom: 20 }}>Global Luxury Gallery · Since 2018</div>
          <h1 style={{ fontSize: 50, fontWeight: 300, color: C.text, lineHeight: 1.15, marginBottom: 18, letterSpacing: -1 }}>
            세계의 작품,<br /><em style={{ fontStyle: 'italic', color: C.gold, fontWeight: 400 }}>당신의 공간으로.</em>
          </h1>
          <p style={{ fontSize: 15, color: C.textSub, maxWidth: 480, lineHeight: 1.85, margin: '0 auto 40px' }}>
            유럽과 한국의 동시대 작가 원화·판화·조각을 엄선합니다. Stripe 글로벌 결제와 영어·한국어 이중 언어로 어디서나 안전하게 소장하세요.
          </p>
          <div style={{ display: 'flex', gap: 14, justifyContent: 'center' }}>
            <button style={{ padding: '13px 36px', background: C.gold, color: '#000', border: 'none', borderRadius: 2, fontSize: 13, fontWeight: 700, cursor: 'pointer', letterSpacing: 2, textTransform: 'uppercase' }}>컬렉션 보기</button>
            <button style={{ padding: '13px 36px', background: 'transparent', color: C.text, border: `1px solid ${C.border}`, borderRadius: 2, fontSize: 13, cursor: 'pointer', letterSpacing: 1 }}>갤러리 소개</button>
          </div>
        </div>
      </div>

      {/* 카테고리 탭 */}
      <div style={{ padding: '28px 40px 0', borderBottom: `1px solid ${C.border}` }}>
        <div style={{ display: 'flex' }}>
          {CATS.map((c, i) => (
            <button key={c} style={{ padding: '10px 18px', background: 'transparent', color: i === 0 ? C.gold : C.textSub, border: 'none', borderBottom: i === 0 ? `2px solid ${C.gold}` : '2px solid transparent', fontSize: 13, cursor: 'pointer', fontFamily: 'inherit' }}>{c}</button>
          ))}
        </div>
      </div>

      {/* 작품 그리드 */}
      <div style={{ padding: '36px 40px', display: 'grid', gridTemplateColumns: 'repeat(3,1fr)', gap: 22 }}>
        {ARTWORKS.map((art, i) => (
          <div key={art.id} className="card-stagger" style={{ animationDelay: `${i * 0.07}s`, background: C.surface, borderRadius: 2, overflow: 'hidden', cursor: 'pointer', transition: 'transform 0.3s, box-shadow 0.3s' }}
            onClick={() => setLb(art)}
            onMouseEnter={e => { e.currentTarget.style.transform = 'translateY(-4px)'; e.currentTarget.style.boxShadow = `0 12px 36px rgba(201,168,76,0.18)`; }}
            onMouseLeave={e => { e.currentTarget.style.transform = ''; e.currentTarget.style.boxShadow = ''; }}>
            <ArtBox id={art.id} />
            <div style={{ padding: '18px 20px 22px' }}>
              <div style={{ fontSize: 9, color: C.gold, letterSpacing: 4, textTransform: 'uppercase', marginBottom: 6 }}>{art.cat}</div>
              <div style={{ fontSize: 15, fontWeight: 600, color: C.text, marginBottom: 3 }}>{art.title}</div>
              <div style={{ fontSize: 12, color: C.textSub, marginBottom: 14 }}>{art.artist} · {art.year}</div>
              <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
                <div style={{ fontSize: 16, color: C.goldLight, fontWeight: 500 }}>{art.price.toLocaleString()}원</div>
                <div style={{ fontSize: 10, color: C.textDim }}>에디션 {art.edition}</div>
              </div>
            </div>
          </div>
        ))}
      </div>

      {/* 뉴스레터 */}
      <div style={{ margin: '0 40px 48px', padding: '36px 40px', background: C.surface, border: `1px solid ${C.border}`, borderRadius: 2, display: 'flex', alignItems: 'center', justifyContent: 'space-between', gap: 32 }}>
        <div>
          <div style={{ fontSize: 9, color: C.gold, letterSpacing: 4, textTransform: 'uppercase', marginBottom: 10 }}>Newsletter · Mailchimp 연동</div>
          <div style={{ fontSize: 19, color: C.text, fontWeight: 400, marginBottom: 6 }}>신작 소식과 프라이빗 뷰잉 초대를 받아보세요.</div>
          <div style={{ fontSize: 12, color: C.textSub }}>언제든지 구독 해지 가능 — 스팸 없음</div>
        </div>
        <div style={{ display: 'flex', flexShrink: 0 }}>
          <input type="email" placeholder="이메일 주소를 입력하세요" style={{ width: 260, padding: '12px 16px', background: C.bg, border: `1px solid ${C.border}`, borderRight: 'none', color: C.text, borderRadius: '2px 0 0 2px', fontSize: 13, fontFamily: 'inherit' }} />
          <button style={{ padding: '12px 24px', background: C.gold, color: '#000', border: 'none', borderRadius: '0 2px 2px 0', fontSize: 13, fontWeight: 700, cursor: 'pointer' }}>구독</button>
        </div>
      </div>

      {lb && <Lightbox art={lb} onClose={() => setLb(null)} />}
    </div>
  );
};

// ── 갤러리 화면
const GalleryScreen = () => {
  const [cat, setCat] = useState('전체');
  const [lb, setLb] = useState(null);
  const [sort, setSort] = useState('newest');
  const filtered = ARTWORKS.filter(a => cat === '전체' || a.cat === cat);
  return (
    <div className="page-anim" style={{ padding: '40px' }}>
      <div style={{ marginBottom: 30 }}>
        <div style={{ fontSize: 9, color: C.gold, letterSpacing: 5, textTransform: 'uppercase', marginBottom: 10 }}>Collection</div>
        <h2 style={{ fontSize: 30, fontWeight: 300, color: C.text, marginBottom: 6 }}>전체 컬렉션</h2>
        <div style={{ fontSize: 13, color: C.textSub }}>총 {filtered.length}점 · 라이트박스 갤러리 뷰어 (줌 지원)</div>
      </div>
      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 26, paddingBottom: 18, borderBottom: `1px solid ${C.border}` }}>
        <div style={{ display: 'flex', gap: 8 }}>
          {CATS.map(c => (
            <button key={c} onClick={() => setCat(c)} style={{ padding: '7px 14px', borderRadius: 2, cursor: 'pointer', fontSize: 12, background: cat === c ? C.gold : C.surface, color: cat === c ? '#000' : C.textSub, border: `1px solid ${cat === c ? C.gold : C.border}`, fontFamily: 'inherit', fontWeight: cat === c ? 700 : 400 }}>{c}</button>
          ))}
        </div>
        <select value={sort} onChange={e => setSort(e.target.value)} style={{ padding: '7px 12px', background: C.surface, border: `1px solid ${C.border}`, color: C.textSub, borderRadius: 2, fontSize: 12, fontFamily: 'inherit', cursor: 'pointer' }}>
          <option value="newest">최신순</option>
          <option value="priceAsc">가격 낮은순</option>
          <option value="priceDesc">가격 높은순</option>
        </select>
      </div>
      <div style={{ display: 'grid', gridTemplateColumns: 'repeat(3,1fr)', gap: 22 }}>
        {filtered.map((art, i) => (
          <div key={art.id} className="card-stagger" style={{ animationDelay: `${i * 0.06}s`, background: C.surface, borderRadius: 2, overflow: 'hidden', cursor: 'pointer', transition: 'transform 0.28s, box-shadow 0.28s' }}
            onClick={() => setLb(art)}
            onMouseEnter={e => { e.currentTarget.style.transform = 'translateY(-5px)'; e.currentTarget.style.boxShadow = `0 16px 40px rgba(201,168,76,0.16)`; }}
            onMouseLeave={e => { e.currentTarget.style.transform = ''; e.currentTarget.style.boxShadow = ''; }}>
            <div style={{ position: 'relative' }}>
              <ArtBox id={art.id} />
              <div style={{ position: 'absolute', top: 10, right: 10, background: 'rgba(0,0,0,0.75)', color: C.gold, fontSize: 10, padding: '4px 8px', borderRadius: 1, display: 'flex', alignItems: 'center', gap: 4 }}>
                <Icon name="ZoomIn" size={11} color={C.gold} />줌 뷰어
              </div>
            </div>
            <div style={{ padding: '15px 18px 20px' }}>
              <div style={{ fontSize: 9, color: C.gold, letterSpacing: 4, textTransform: 'uppercase', marginBottom: 5 }}>{art.cat}</div>
              <div style={{ fontSize: 14, fontWeight: 600, color: C.text, marginBottom: 3 }}>{art.title}</div>
              <div style={{ fontSize: 12, color: C.textSub, marginBottom: 12 }}>{art.artist} · {art.medium}</div>
              <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
                <div style={{ fontSize: 15, color: C.goldLight }}>{art.price.toLocaleString()}원</div>
                <div style={{ fontSize: 10, color: C.textDim }}>{art.edition}</div>
              </div>
            </div>
          </div>
        ))}
      </div>
      {lb && <Lightbox art={lb} onClose={() => setLb(null)} />}
    </div>
  );
};

// ── 언어 전환 화면
const LanguageScreen = () => {
  const [lang, setLang] = useState('ko');
  const [saved, setSaved] = useState(false);
  const LANGS = [
    { code: 'ko', name: '한국어', sub: '한국어 콘텐츠 · KRW 가격 표시 · /ko/ URL', flag: 'KR' },
    { code: 'en', name: 'English', sub: 'English content · USD price display · /en/ URL', flag: 'EN' },
  ];
  return (
    <div className="page-anim" style={{ padding: '40px', maxWidth: 780 }}>
      <div style={{ marginBottom: 36 }}>
        <div style={{ fontSize: 9, color: C.gold, letterSpacing: 5, textTransform: 'uppercase', marginBottom: 10 }}>Language &amp; Region</div>
        <h2 style={{ fontSize: 28, fontWeight: 300, color: C.text, marginBottom: 8 }}>다국어 시스템 — WPML 연동</h2>
        <div style={{ fontSize: 13, color: C.textSub }}>언어 선택 시 URL 구조(/ko/, /en/)와 전체 콘텐츠가 동시에 전환됩니다.</div>
      </div>
      <div style={{ display: 'flex', flexDirection: 'column', gap: 14, marginBottom: 36 }}>
        {LANGS.map(l => (
          <div key={l.code} onClick={() => setLang(l.code)} style={{ padding: '22px 26px', background: C.surface, border: `2px solid ${lang === l.code ? C.gold : C.border}`, borderRadius: 2, cursor: 'pointer', display: 'flex', justifyContent: 'space-between', alignItems: 'center', transition: 'border-color 0.2s' }}>
            <div style={{ display: 'flex', alignItems: 'center', gap: 18 }}>
              <div style={{ width: 44, height: 30, background: C.surface2, border: `1px solid ${C.border}`, borderRadius: 2, display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 11, fontWeight: 700, color: lang === l.code ? C.gold : C.textSub }}>{l.flag}</div>
              <div>
                <div style={{ fontSize: 17, fontWeight: 600, color: lang === l.code ? C.gold : C.text, marginBottom: 4 }}>{l.name}</div>
                <div style={{ fontSize: 12, color: C.textSub }}>{l.sub}</div>
              </div>
            </div>
            <div style={{ width: 22, height: 22, borderRadius: '50%', border: `2px solid ${lang === l.code ? C.gold : C.border}`, background: lang === l.code ? C.gold : 'transparent', display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
              {lang === l.code && <Icon name="Check" size={12} color="#000" />}
            </div>
          </div>
        ))}
      </div>
      <div style={{ background: '#0A0A0A', border: `1px solid ${C.border}`, borderRadius: 2, padding: '22px 24px', marginBottom: 28 }}>
        <div style={{ fontSize: 9, color: C.gold, letterSpacing: 4, textTransform: 'uppercase', marginBottom: 14 }}>Hreflang SEO 태그 자동 생성 (WPML)</div>
        <pre style={{ fontSize: 12, color: '#6DBF6D', lineHeight: 1.85, fontFamily: 'monospace', overflow: 'auto' }}>{`<link rel="alternate" hreflang="ko" href="https://arthaus.com/ko/" />\n<link rel="alternate" hreflang="en" href="https://arthaus.com/en/" />\n<link rel="alternate" hreflang="x-default" href="https://arthaus.com/en/" />`}</pre>
      </div>
      <div style={{ background: '#0A0A0A', border: `1px solid ${C.border}`, borderRadius: 2, padding: '22px 24px', marginBottom: 32 }}>
        <div style={{ fontSize: 9, color: C.gold, letterSpacing: 4, textTransform: 'uppercase', marginBottom: 14 }}>WooCommerce 상품 언어 동기화</div>
        <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 16 }}>
          {[['한국어 (현재)', '빛의 소나타 No. 3 · 12,800,000원'], ['English', 'Light Sonata No. 3 · $9,481']].map(([l, v]) => (
            <div key={l} style={{ padding: '14px', background: C.surface, border: `1px solid ${C.border}`, borderRadius: 2 }}>
              <div style={{ fontSize: 10, color: C.textDim, marginBottom: 6, textTransform: 'uppercase', letterSpacing: 2 }}>{l}</div>
              <div style={{ fontSize: 12, color: C.textSub }}>{v}</div>
            </div>
          ))}
        </div>
      </div>
      <button onClick={() => setSaved(true)} style={{ padding: '13px 36px', background: C.gold, color: '#000', border: 'none', borderRadius: 2, fontSize: 13, fontWeight: 700, cursor: 'pointer', letterSpacing: 2, textTransform: 'uppercase' }}>언어 설정 저장</button>
      {saved && <Toast msg="언어 설정이 적용되었습니다." onDone={() => setSaved(false)} />}
    </div>
  );
};

// ── 결제 화면
const CheckoutScreen = () => {
  const [step, setStep] = useState(1);
  const [cardNum, setCardNum] = useState('');
  const [expiry, setExpiry] = useState('');
  const [cvc, setCvc] = useState('');
  const [cardName, setCardName] = useState('');
  const [processing, setProcessing] = useState(false);
  const cartItem = ARTWORKS[1];

  const handlePay = () => {
    setProcessing(true);
    setTimeout(() => { setProcessing(false); setStep(3); }, 1800);
  };

  return (
    <div className="page-anim" style={{ padding: '40px', maxWidth: 960, margin: '0 auto' }}>
      {step === 1 && (
        <div>
          <div style={{ marginBottom: 30 }}>
            <div style={{ fontSize: 9, color: C.gold, letterSpacing: 5, textTransform: 'uppercase', marginBottom: 10 }}>Cart · WooCommerce</div>
            <h2 style={{ fontSize: 28, fontWeight: 300, color: C.text }}>장바구니</h2>
          </div>
          <div style={{ background: C.surface, border: `1px solid ${C.border}`, borderRadius: 2, overflow: 'hidden', marginBottom: 22 }}>
            <div style={{ padding: '22px 26px', display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
              <div style={{ display: 'flex', alignItems: 'center', gap: 18 }}>
                <ArtBox id={cartItem.id} w="88px" />
                <div>
                  <div style={{ fontSize: 15, color: C.text, fontWeight: 500, marginBottom: 3 }}>{cartItem.title}</div>
                  <div style={{ fontSize: 12, color: C.textSub, marginBottom: 3 }}>{cartItem.artist} · {cartItem.medium}</div>
                  <div style={{ fontSize: 11, color: C.textDim }}>에디션 {cartItem.edition}</div>
                </div>
              </div>
              <div style={{ fontSize: 17, color: C.goldLight, fontWeight: 500 }}>{cartItem.price.toLocaleString()}원</div>
            </div>
          </div>
          <div style={{ background: C.surface, border: `1px solid ${C.border}`, borderRadius: 2, padding: '18px 26px', marginBottom: 24, display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
            <div style={{ color: C.textSub, fontSize: 14 }}>소계 (배송비 별도)</div>
            <div style={{ color: C.text, fontSize: 18, fontWeight: 600 }}>{cartItem.price.toLocaleString()}원</div>
          </div>
          <button onClick={() => setStep(2)} style={{ padding: '14px 44px', background: C.gold, color: '#000', border: 'none', borderRadius: 2, fontSize: 14, fontWeight: 700, cursor: 'pointer', letterSpacing: 2, textTransform: 'uppercase' }}>결제하기</button>
        </div>
      )}
      {step === 2 && (
        <div>
          <div style={{ marginBottom: 30 }}>
            <div style={{ fontSize: 9, color: C.gold, letterSpacing: 5, textTransform: 'uppercase', marginBottom: 10 }}>Stripe Elements · PCI-DSS 준수</div>
            <h2 style={{ fontSize: 28, fontWeight: 300, color: C.text, marginBottom: 6 }}>결제 정보 입력</h2>
            <div style={{ fontSize: 12, color: C.textSub, display: 'flex', alignItems: 'center', gap: 6 }}>
              <Icon name="Lock" size={13} color={C.textSub} />TLS 암호화 연결 · Stripe 서버에만 카드 정보 전송
            </div>
          </div>
          <div style={{ display: 'grid', gridTemplateColumns: '1fr 340px', gap: 28 }}>
            <div style={{ background: C.surface, border: `1px solid ${C.border}`, borderRadius: 2, padding: '26px' }}>
              <div style={{ fontSize: 9, color: C.gold, letterSpacing: 4, textTransform: 'uppercase', marginBottom: 20 }}>카드 정보</div>
              <div style={{ display: 'flex', flexDirection: 'column', gap: 16 }}>
                <div>
                  <div style={{ fontSize: 11, color: C.textSub, marginBottom: 7 }}>카드 번호</div>
                  <input value={cardNum} onChange={e => setCardNum(e.target.value.replace(/\D/g, '').slice(0, 16).replace(/(.{4})/g, '$1 ').trim())} placeholder="1234 5678 9012 3456" style={{ width: '100%', padding: '12px 14px', background: C.bg, border: `1px solid ${C.border}`, color: C.text, borderRadius: 2, fontSize: 15, fontFamily: 'monospace' }} />
                </div>
                <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 12 }}>
                  <div>
                    <div style={{ fontSize: 11, color: C.textSub, marginBottom: 7 }}>만료일</div>
                    <input value={expiry} onChange={e => setExpiry(e.target.value)} placeholder="MM/YY" style={{ width: '100%', padding: '12px 14px', background: C.bg, border: `1px solid ${C.border}`, color: C.text, borderRadius: 2, fontSize: 15, fontFamily: 'inherit' }} />
                  </div>
                  <div>
                    <div style={{ fontSize: 11, color: C.textSub, marginBottom: 7 }}>CVC</div>
                    <input value={cvc} onChange={e => setCvc(e.target.value.slice(0, 3))} placeholder="123" style={{ width: '100%', padding: '12px 14px', background: C.bg, border: `1px solid ${C.border}`, color: C.text, borderRadius: 2, fontSize: 15, fontFamily: 'inherit' }} />
                  </div>
                </div>
                <div>
                  <div style={{ fontSize: 11, color: C.textSub, marginBottom: 7 }}>카드 소지인 이름</div>
                  <input value={cardName} onChange={e => setCardName(e.target.value)} placeholder="GILDONG HONG" style={{ width: '100%', padding: '12px 14px', background: C.bg, border: `1px solid ${C.border}`, color: C.text, borderRadius: 2, fontSize: 15, fontFamily: 'inherit' }} />
                </div>
              </div>
              <div style={{ marginTop: 20, padding: '14px', background: C.bg, border: `1px solid ${C.border}`, borderRadius: 2 }}>
                <div style={{ fontSize: 10, color: C.textDim, marginBottom: 8, letterSpacing: 2 }}>지원 결제 수단</div>
                <div style={{ display: 'flex', gap: 8 }}>
                  {['VISA', 'Mastercard', 'AMEX', 'JCB', 'UnionPay'].map(c => <span key={c} style={{ padding: '3px 8px', background: C.surface2, border: `1px solid ${C.border}`, borderRadius: 1, fontSize: 10, color: C.textSub, fontWeight: 700 }}>{c}</span>)}
                </div>
              </div>
            </div>
            <div>
              <div style={{ background: C.surface, border: `1px solid ${C.border}`, borderRadius: 2, padding: '22px' }}>
                <div style={{ fontSize: 9, color: C.gold, letterSpacing: 4, textTransform: 'uppercase', marginBottom: 16 }}>주문 요약</div>
                <div style={{ marginBottom: 14, paddingBottom: 14, borderBottom: `1px solid ${C.border}` }}>
                  <div style={{ fontSize: 13, color: C.text, marginBottom: 2 }}>{cartItem.title}</div>
                  <div style={{ fontSize: 12, color: C.textSub }}>{cartItem.price.toLocaleString()}원</div>
                </div>
                <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: 8 }}>
                  <div style={{ color: C.textSub, fontSize: 12 }}>배송비</div>
                  <div style={{ color: C.textSub, fontSize: 12 }}>협의</div>
                </div>
                <div style={{ display: 'flex', justifyContent: 'space-between', marginTop: 10, paddingTop: 12, borderTop: `1px solid ${C.border}` }}>
                  <div style={{ color: C.text, fontWeight: 600, fontSize: 14 }}>합계</div>
                  <div style={{ color: C.goldLight, fontWeight: 600, fontSize: 15 }}>{cartItem.price.toLocaleString()}원</div>
                </div>
                <button onClick={handlePay} disabled={processing} style={{ width: '100%', marginTop: 18, padding: '14px 0', background: processing ? C.goldDim : C.gold, color: '#000', border: 'none', borderRadius: 2, fontSize: 14, fontWeight: 700, cursor: processing ? 'wait' : 'pointer', letterSpacing: 1 }}>
                  {processing ? '결제 처리 중...' : '결제 완료'}
                </button>
              </div>
            </div>
          </div>
        </div>
      )}
      {step === 3 && (
        <div className="page-anim" style={{ textAlign: 'center', padding: '80px 0' }}>
          <div style={{ width: 72, height: 72, borderRadius: '50%', background: 'rgba(201,168,76,0.1)', border: `2px solid ${C.gold}`, display: 'flex', alignItems: 'center', justifyContent: 'center', margin: '0 auto 24px', animation: 'glowPulse 2s infinite' }}>
            <Icon name="Check" size={32} color={C.gold} sw={2} />
          </div>
          <div style={{ fontSize: 24, color: C.text, fontWeight: 300, marginBottom: 8 }}>결제가 완료되었습니다.</div>
          <div style={{ fontSize: 13, color: C.textSub, marginBottom: 6 }}>주문 확인 이메일이 발송되었습니다.</div>
          <div style={{ fontSize: 12, color: C.textDim }}>Stripe 결제 ID: pi_3R4xKG... · WooCommerce 주문 상태: <span style={{ color: C.green }}>결제 완료</span></div>
        </div>
      )}
    </div>
  );
};

// ── 앱
const App = () => {
  const [screen, setScreen] = useState('home');
  const TABS = [{ id: 'home', label: '홈' }, { id: 'gallery', label: '갤러리' }, { id: 'checkout', label: '결제하기' }, { id: 'language', label: '언어 전환' }];
  return (
    <div style={{ width: '100%', minHeight: '100vh', background: C.bg, color: C.text }}>
      {/* 탑바 */}
      <div style={{ height: 60, background: C.bg, borderBottom: `1px solid ${C.border}`, display: 'flex', alignItems: 'center', justifyContent: 'space-between', padding: '0 40px', position: 'sticky', top: 0, zIndex: 500 }}>
        <div style={{ display: 'flex', alignItems: 'center', gap: 36 }}>
          <div style={{ fontSize: 14, fontWeight: 800, letterSpacing: 4, textTransform: 'uppercase' }}>
            <span style={{ color: C.gold }}>A</span>RTHAUS
          </div>
          <nav style={{ display: 'flex' }}>
            {TABS.map(t => (
              <button key={t.id} onClick={() => setScreen(t.id)} style={{ padding: '0 18px', height: 60, background: 'transparent', color: screen === t.id ? C.gold : C.textSub, border: 'none', borderBottom: screen === t.id ? `2px solid ${C.gold}` : '2px solid transparent', fontSize: 14, cursor: 'pointer', fontFamily: 'inherit', transition: 'color 0.2s', display: 'flex', alignItems: 'center' }}>{t.label}</button>
            ))}
          </nav>
        </div>
        <div style={{ display: 'flex', alignItems: 'center', gap: 16 }}>
          <span style={{ fontSize: 11, color: C.textDim }}>한국어 / KRW</span>
          <button onClick={() => setScreen('checkout')} style={{ background: 'transparent', border: `1px solid ${C.border}`, borderRadius: 2, padding: '7px 14px', cursor: 'pointer', color: C.textSub, display: 'flex', alignItems: 'center', gap: 6, fontSize: 13, fontFamily: 'inherit' }}>
            <Icon name="ShoppingBag" size={14} /><span>1</span>
          </button>
        </div>
      </div>
      {screen === 'home' && <HomeScreen />}
      {screen === 'gallery' && <GalleryScreen />}
      {screen === 'language' && <LanguageScreen />}
      {screen === 'checkout' && <CheckoutScreen />}
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
