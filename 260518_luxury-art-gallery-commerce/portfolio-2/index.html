<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>럭셔리 아트 갤러리 커머스 — 확장 데모</title>
  <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" rel="stylesheet" />
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://unpkg.com/prop-types/prop-types.min.js"></script>
  <script src="https://unpkg.com/react-is@18/umd/react-is.production.min.js"></script>
  <script src="https://unpkg.com/recharts@2.12.7/umd/Recharts.js"></script>
  <link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/regular/style.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body, #root { width: 100%; min-height: 100vh; background: #0F1628; font-family: 'Pretendard', -apple-system, sans-serif; }

    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes slideRight { from { opacity: 0; transform: translateX(-16px); } to { opacity: 1; transform: translateX(0); } }
    @keyframes slideUp { from { opacity: 0; transform: translateY(14px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes modalIn { from { opacity: 0; transform: scale(0.97); } to { opacity: 1; transform: scale(1); } }
    @keyframes toastIn { from { opacity: 0; transform: translateX(28px); } to { opacity: 1; transform: translateX(0); } }
    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.5; } }

    .page-anim { animation: slideRight 0.3s ease; }
    .card-up { animation: slideUp 0.4s ease both; }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: #1A2540; }
    ::-webkit-scrollbar-thumb { background: #2A3D6A; border-radius: 4px; }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef } = React;
const { LineChart, Line, BarChart, Bar, XAxis, YAxis, CartesianGrid, Tooltip, ResponsiveContainer, PieChart, Pie, Cell } = Recharts;

const C = {
  bg: '#0F1628', surface: '#1A2540', surface2: '#1F2D4E', border: '#263356',
  primary: '#1B2C5E', accent: '#6B8FD4', accentLight: '#A8C0F0',
  text: '#F0F4FF', textSub: '#8B9EC8', textDim: '#4A5A80',
  green: '#34D399', red: '#F87171', amber: '#FBBF24', blue: '#60A5FA',
};

const PH = ({ name, size = 18 }) => <i className={`ph ph-${name}`} style={{ fontSize: size }} />;

const Toast = ({ msg, onDone }) => {
  useEffect(() => { const t = setTimeout(onDone, 2400); return () => clearTimeout(t); }, []);
  return <div style={{ position: 'fixed', bottom: 28, right: 28, zIndex: 3000, background: C.surface2, border: `1px solid ${C.accent}`, color: C.text, padding: '12px 20px', borderRadius: 8, fontSize: 14, display: 'flex', alignItems: 'center', gap: 10, animation: 'toastIn 0.3s ease' }}><PH name="check-circle" size={17} />{msg}</div>;
};

// ── 매출 데이터
const SALES_DATA = [
  { m: '1월', sales: 3200, orders: 4 }, { m: '2월', sales: 4100, orders: 5 },
  { m: '3월', sales: 2800, orders: 3 }, { m: '4월', sales: 6700, orders: 8 },
  { m: '5월', sales: 5400, orders: 6 }, { m: '6월', sales: 8900, orders: 11 },
];
const STATUS_PIE = [
  { name: '결제 완료', value: 42, color: C.green },
  { name: '배송 준비', value: 18, color: C.accent },
  { name: '배송 중', value: 9, color: C.amber },
  { name: '환불 요청', value: 3, color: C.red },
];
const RECENT_ORDERS = [
  { id: '#4821', buyer: '마르코 로시', art: '빛의 소나타 No. 3', currency: 'EUR', amount: 8640, status: '결제 완료', date: '2025.05.14', gateway: 'Stripe' },
  { id: '#4820', buyer: 'Sophie Martin', art: '파리의 고요한 아침', currency: 'EUR', amount: 2320, status: '배송 준비', date: '2025.05.13', gateway: 'Mollie' },
  { id: '#4819', buyer: '김민수', art: '군도 연작 V', currency: 'KRW', amount: 2200000, status: '결제 완료', date: '2025.05.12', gateway: 'Stripe' },
  { id: '#4818', buyer: 'Jan van den Berg', art: '식물의 시간', currency: 'EUR', amount: 5940, status: '배송 중', date: '2025.05.11', gateway: 'Mollie' },
  { id: '#4817', buyer: 'Emma Clarke', art: '코스모스 스터디 XI', currency: 'USD', amount: 1280, status: '결제 완료', date: '2025.05.10', gateway: 'Stripe' },
];
const GA4_TRAFFIC = [
  { d: '5/9', users: 148 }, { d: '5/10', users: 203 }, { d: '5/11', users: 176 },
  { d: '5/12', users: 289 }, { d: '5/13', users: 312 }, { d: '5/14', users: 245 }, { d: '5/15', users: 198 },
];

// ── 대시보드 화면 (main)
const DashboardScreen = () => {
  const [selOrder, setSelOrder] = useState(null);
  const KPIs = [
    { label: '이번 달 매출', value: '€ 29,480', sub: '주문 11건', icon: 'currency-eur' },
    { label: '신규 방문자', value: '1,771', sub: '7일 누적 · GA4', icon: 'chart-line-up' },
    { label: '처리 대기', value: '5건', sub: '배송 준비 + 환불 요청', icon: 'clock-countdown' },
    { label: '이번 달 환율', value: '1 EUR = 1,487원', sub: 'ExchangeRate-API', icon: 'arrow-left-right' },
  ];
  const statusColor = { '결제 완료': C.green, '배송 준비': C.accent, '배송 중': C.amber, '환불 요청': C.red };

  return (
    <div className="page-anim" style={{ padding: '32px' }}>
      <div style={{ marginBottom: 28 }}>
        <div style={{ fontSize: 11, color: C.accent, letterSpacing: 3, textTransform: 'uppercase', marginBottom: 8 }}>WooCommerce 관리자 대시보드</div>
        <h2 style={{ fontSize: 26, fontWeight: 300, color: C.text }}>매출 · 주문 · 방문자 통합 현황</h2>
      </div>

      {/* KPI 카드 */}
      <div style={{ display: 'grid', gridTemplateColumns: 'repeat(4,1fr)', gap: 16, marginBottom: 28 }}>
        {KPIs.map((k, i) => (
          <div key={k.label} className="card-up" style={{ animationDelay: `${i * 0.06}s`, background: C.surface, border: `1px solid ${C.border}`, borderRadius: 8, padding: '20px 22px', cursor: 'default', transition: 'border-color 0.2s, transform 0.2s' }}
            onMouseEnter={e => { e.currentTarget.style.borderColor = C.accent; e.currentTarget.style.transform = 'translateY(-2px)'; }}
            onMouseLeave={e => { e.currentTarget.style.borderColor = C.border; e.currentTarget.style.transform = ''; }}>
            <div style={{ display: 'flex', alignItems: 'center', gap: 10, marginBottom: 14 }}>
              <div style={{ width: 36, height: 36, borderRadius: 8, background: `rgba(107,143,212,0.12)`, display: 'flex', alignItems: 'center', justifyContent: 'center', color: C.accent }}>
                <PH name={k.icon} size={18} />
              </div>
              <div style={{ fontSize: 11, color: C.textSub, fontWeight: 500 }}>{k.label}</div>
            </div>
            <div style={{ fontSize: 22, fontWeight: 700, color: C.text, marginBottom: 4 }}>{k.value}</div>
            <div style={{ fontSize: 11, color: C.textDim }}>{k.sub}</div>
          </div>
        ))}
      </div>

      {/* 차트 행 */}
      <div style={{ display: 'grid', gridTemplateColumns: '1fr 260px', gap: 16, marginBottom: 28 }}>
        <div style={{ background: C.surface, border: `1px solid ${C.border}`, borderRadius: 8, padding: '22px' }}>
          <div style={{ fontSize: 11, color: C.accent, letterSpacing: 2, textTransform: 'uppercase', marginBottom: 6 }}>GA4 방문자 추이 (최근 7일)</div>
          <div style={{ fontSize: 14, color: C.textSub, marginBottom: 18 }}>Measurement Protocol 연동</div>
          <div style={{ position: 'relative', height: 180 }}>
            <ResponsiveContainer width="100%" height="100%">
              <LineChart data={GA4_TRAFFIC} margin={{ top: 4, right: 8, bottom: 0, left: -10 }}>
                <CartesianGrid strokeDasharray="3 3" stroke={C.border} />
                <XAxis dataKey="d" tick={{ fill: C.textDim, fontSize: 11 }} axisLine={false} tickLine={false} />
                <YAxis tick={{ fill: C.textDim, fontSize: 11 }} axisLine={false} tickLine={false} />
                <Tooltip contentStyle={{ background: C.surface2, border: `1px solid ${C.border}`, borderRadius: 6, color: C.text, fontSize: 12 }} />
                <Line type="monotone" dataKey="users" stroke={C.accent} strokeWidth={2} dot={{ fill: C.accent, r: 3 }} activeDot={{ r: 5 }} />
              </LineChart>
            </ResponsiveContainer>
          </div>
        </div>
        <div style={{ background: C.surface, border: `1px solid ${C.border}`, borderRadius: 8, padding: '22px' }}>
          <div style={{ fontSize: 11, color: C.accent, letterSpacing: 2, textTransform: 'uppercase', marginBottom: 18 }}>주문 상태 분포</div>
          <div style={{ position: 'relative', height: 140, display: 'flex', justifyContent: 'center' }}>
            <ResponsiveContainer width="100%" height="100%">
              <PieChart>
                <Pie data={STATUS_PIE} dataKey="value" innerRadius={42} outerRadius={65} paddingAngle={3}>
                  {STATUS_PIE.map((e, i) => <Cell key={i} fill={e.color} />)}
                </Pie>
                <Tooltip contentStyle={{ background: C.surface2, border: `1px solid ${C.border}`, borderRadius: 6, color: C.text, fontSize: 12 }} />
              </PieChart>
            </ResponsiveContainer>
          </div>
          <div style={{ display: 'flex', flexDirection: 'column', gap: 6, marginTop: 10 }}>
            {STATUS_PIE.map(s => (
              <div key={s.name} style={{ display: 'flex', alignItems: 'center', gap: 8, fontSize: 11 }}>
                <div style={{ width: 8, height: 8, borderRadius: 2, background: s.color, flexShrink: 0 }} />
                <span style={{ color: C.textSub, flex: 1 }}>{s.name}</span>
                <span style={{ color: C.text, fontWeight: 600 }}>{s.value}건</span>
              </div>
            ))}
          </div>
        </div>
      </div>

      {/* 최근 주문 테이블 */}
      <div style={{ background: C.surface, border: `1px solid ${C.border}`, borderRadius: 8, overflow: 'hidden' }}>
        <div style={{ padding: '18px 22px', borderBottom: `1px solid ${C.border}`, display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
          <div style={{ fontSize: 13, color: C.text, fontWeight: 600 }}>최근 주문 내역</div>
          <div style={{ fontSize: 11, color: C.textDim }}>Stripe + Mollie 통합</div>
        </div>
        <table style={{ width: '100%', borderCollapse: 'collapse' }}>
          <thead>
            <tr style={{ background: C.bg }}>
              {['주문 ID', '구매자', '작품', '통화', '금액', '결제', '게이트웨이', '날짜'].map(h => (
                <th key={h} style={{ padding: '10px 18px', textAlign: 'left', fontSize: 10, color: C.textDim, fontWeight: 600, letterSpacing: 2, textTransform: 'uppercase', borderBottom: `1px solid ${C.border}` }}>{h}</th>
              ))}
            </tr>
          </thead>
          <tbody>
            {RECENT_ORDERS.map((o, i) => (
              <tr key={o.id} onClick={() => setSelOrder(o)} style={{ cursor: 'pointer', transition: 'background 0.15s', borderBottom: i < RECENT_ORDERS.length - 1 ? `1px solid ${C.border}` : 'none' }}
                onMouseEnter={e => e.currentTarget.style.background = C.surface2}
                onMouseLeave={e => e.currentTarget.style.background = 'transparent'}>
                <td style={{ padding: '14px 18px', fontSize: 13, color: C.accent, fontFamily: 'monospace' }}>{o.id}</td>
                <td style={{ padding: '14px 18px', fontSize: 13, color: C.text }}>{o.buyer}</td>
                <td style={{ padding: '14px 18px', fontSize: 12, color: C.textSub, maxWidth: 160, overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>{o.art}</td>
                <td style={{ padding: '14px 18px', fontSize: 12, color: C.textDim, fontFamily: 'monospace' }}>{o.currency}</td>
                <td style={{ padding: '14px 18px', fontSize: 13, color: C.text, fontWeight: 600, fontFamily: 'monospace' }}>{typeof o.amount === 'number' && o.currency === 'KRW' ? `₩${o.amount.toLocaleString()}` : `${o.currency === 'EUR' ? '€' : '$'}${o.amount.toLocaleString()}`}</td>
                <td style={{ padding: '14px 18px' }}>
                  <span style={{ padding: '3px 10px', borderRadius: 4, fontSize: 11, fontWeight: 600, background: `${statusColor[o.status]}22`, color: statusColor[o.status] }}>{o.status}</span>
                </td>
                <td style={{ padding: '14px 18px' }}>
                  <span style={{ padding: '3px 8px', borderRadius: 4, fontSize: 10, background: C.bg, color: C.textDim, border: `1px solid ${C.border}` }}>{o.gateway}</span>
                </td>
                <td style={{ padding: '14px 18px', fontSize: 12, color: C.textDim }}>{o.date}</td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>

      {/* 주문 상세 모달 */}
      {selOrder && (
        <div style={{ position: 'fixed', inset: 0, background: 'rgba(0,0,0,0.7)', display: 'flex', alignItems: 'center', justifyContent: 'center', zIndex: 900, animation: 'fadeIn 0.2s ease' }}>
          <div className="modal-box" style={{ background: C.surface, border: `1px solid ${C.border}`, borderRadius: 12, padding: '28px', width: 420, animation: 'modalIn 0.22s ease' }}>
            <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 20 }}>
              <div style={{ fontSize: 16, fontWeight: 700, color: C.text }}>주문 상세</div>
              <button onClick={() => setSelOrder(null)} style={{ background: 'transparent', border: 'none', color: C.textSub, cursor: 'pointer', fontSize: 18 }}><PH name="x" size={20} /></button>
            </div>
            <div style={{ display: 'flex', flexDirection: 'column', gap: 12 }}>
              {[['주문 ID', selOrder.id], ['구매자', selOrder.buyer], ['작품', selOrder.art], ['결제 수단', selOrder.gateway], ['통화/금액', `${selOrder.currency} ${typeof selOrder.amount === 'number' && selOrder.currency === 'KRW' ? selOrder.amount.toLocaleString() + '원' : selOrder.amount}`], ['날짜', selOrder.date]].map(([k, v]) => (
                <div key={k} style={{ display: 'flex', justifyContent: 'space-between', padding: '10px 0', borderBottom: `1px solid ${C.border}` }}>
                  <span style={{ fontSize: 12, color: C.textSub }}>{k}</span>
                  <span style={{ fontSize: 13, color: C.text, fontWeight: 500 }}>{v}</span>
                </div>
              ))}
              <div style={{ display: 'flex', justifyContent: 'space-between', padding: '10px 0' }}>
                <span style={{ fontSize: 12, color: C.textSub }}>상태</span>
                <span style={{ padding: '3px 10px', borderRadius: 4, fontSize: 12, fontWeight: 600, background: `${C.green}22`, color: C.green }}>{selOrder.status}</span>
              </div>
            </div>
            <button onClick={() => setSelOrder(null)} style={{ width: '100%', marginTop: 20, padding: '12px 0', background: C.accent, color: '#000', border: 'none', borderRadius: 8, fontSize: 13, fontWeight: 700, cursor: 'pointer' }}>닫기</button>
          </div>
        </div>
      )}
    </div>
  );
};

// ── 결제 수단 화면 (payment)
const PaymentScreen = () => {
  const [currency, setCurrency] = useState('EUR');
  const [method, setMethod] = useState('ideal');
  const [toast, setToast] = useState('');

  const METHODS = [
    { id: 'ideal', name: 'iDEAL', sub: '네덜란드 인터넷 뱅킹', flag: 'NL', available: true },
    { id: 'bancontact', name: 'Bancontact', sub: '벨기에 직불 결제', flag: 'BE', available: true },
    { id: 'sepa', name: 'SEPA Direct Debit', sub: 'EU 계좌 직접 이체', flag: 'EU', available: true },
    { id: 'giropay', name: 'giropay', sub: '독일 온라인 뱅킹', flag: 'DE', available: false },
  ];
  const RATES = { EUR: 1487.3, USD: 1372.4, KRW: 1 };
  const BASE_EUR = 8640;
  const converted = currency === 'EUR' ? `€ ${BASE_EUR.toLocaleString()}` : currency === 'USD' ? `$ ${Math.round(BASE_EUR * RATES.EUR / RATES.USD).toLocaleString()}` : `₩ ${Math.round(BASE_EUR * RATES.EUR).toLocaleString()}`;

  return (
    <div className="page-anim" style={{ padding: '32px' }}>
      <div style={{ marginBottom: 28 }}>
        <div style={{ fontSize: 11, color: C.accent, letterSpacing: 3, textTransform: 'uppercase', marginBottom: 8 }}>Mollie API · 유럽 결제 연동</div>
        <h2 style={{ fontSize: 26, fontWeight: 300, color: C.text, marginBottom: 6 }}>결제 수단 관리 — 다통화 지원</h2>
        <div style={{ fontSize: 13, color: C.textSub }}>Mollie REST API PHP SDK 기반 커스텀 WooCommerce 게이트웨이 플러그인</div>
      </div>

      <div style={{ display: 'grid', gridTemplateColumns: '1fr 360px', gap: 22 }}>
        <div>
          {/* 유럽 결제 수단 */}
          <div style={{ background: C.surface, border: `1px solid ${C.border}`, borderRadius: 8, padding: '22px', marginBottom: 18 }}>
            <div style={{ fontSize: 11, color: C.accent, letterSpacing: 2, textTransform: 'uppercase', marginBottom: 16 }}>Mollie 지원 결제 수단</div>
            <div style={{ display: 'flex', flexDirection: 'column', gap: 12 }}>
              {METHODS.map(m => (
                <div key={m.id} onClick={() => m.available && setMethod(m.id)} style={{ padding: '16px 18px', background: method === m.id ? `rgba(107,143,212,0.1)` : C.bg, border: `2px solid ${method === m.id ? C.accent : C.border}`, borderRadius: 8, cursor: m.available ? 'pointer' : 'not-allowed', opacity: m.available ? 1 : 0.4, display: 'flex', justifyContent: 'space-between', alignItems: 'center', transition: 'border-color 0.2s, background 0.2s' }}>
                  <div style={{ display: 'flex', alignItems: 'center', gap: 14 }}>
                    <div style={{ width: 40, height: 26, background: C.surface2, border: `1px solid ${C.border}`, borderRadius: 4, display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 10, fontWeight: 700, color: method === m.id ? C.accent : C.textSub }}>{m.flag}</div>
                    <div>
                      <div style={{ fontSize: 14, fontWeight: 600, color: method === m.id ? C.text : C.textSub, marginBottom: 2 }}>{m.name}</div>
                      <div style={{ fontSize: 11, color: C.textDim }}>{m.sub}</div>
                    </div>
                  </div>
                  {!m.available && <span style={{ fontSize: 10, color: C.textDim, padding: '2px 8px', border: `1px solid ${C.border}`, borderRadius: 4 }}>준비 중</span>}
                  {m.available && method === m.id && <PH name="check-circle" size={18} style={{ color: C.accent }} />}
                </div>
              ))}
            </div>
            <button onClick={() => setToast('Mollie 결제 수단 설정이 저장되었습니다.')} style={{ marginTop: 18, padding: '12px 28px', background: C.accent, color: '#000', border: 'none', borderRadius: 8, fontSize: 13, fontWeight: 700, cursor: 'pointer' }}>설정 저장</button>
          </div>

          {/* Mollie Webhook */}
          <div style={{ background: '#080E1A', border: `1px solid ${C.border}`, borderRadius: 8, padding: '20px' }}>
            <div style={{ fontSize: 10, color: C.accent, letterSpacing: 3, textTransform: 'uppercase', marginBottom: 12 }}>Mollie Webhook PHP 핸들러 구조</div>
            <pre style={{ fontSize: 11, color: '#6DBF6D', lineHeight: 1.8, fontFamily: 'monospace', overflow: 'auto' }}>{`// WooCommerce 주문 상태 자동 동기화
add_action('woocommerce_api_mollie_gateway', function() {
  $payment = $mollie->payments->get($_POST['id']);
  $order   = wc_get_order($payment->metadata->order_id);

  match ($payment->status) {
    'paid'    => $order->payment_complete($payment->id),
    'failed'  => $order->update_status('failed'),
    'expired' => $order->update_status('cancelled'),
    default   => null,
  };
});`}</pre>
          </div>
        </div>

        {/* 다통화 패널 */}
        <div>
          <div style={{ background: C.surface, border: `1px solid ${C.border}`, borderRadius: 8, padding: '22px', marginBottom: 16 }}>
            <div style={{ fontSize: 11, color: C.accent, letterSpacing: 2, textTransform: 'uppercase', marginBottom: 16 }}>다통화 자동 변환</div>
            <div style={{ display: 'flex', flexDirection: 'column', gap: 8, marginBottom: 18 }}>
              {['EUR', 'USD', 'KRW'].map(c => (
                <button key={c} onClick={() => setCurrency(c)} style={{ padding: '12px 16px', background: currency === c ? `rgba(107,143,212,0.15)` : C.bg, border: `2px solid ${currency === c ? C.accent : C.border}`, borderRadius: 8, cursor: 'pointer', display: 'flex', justifyContent: 'space-between', alignItems: 'center', fontFamily: 'inherit', color: currency === c ? C.text : C.textSub, transition: 'all 0.18s' }}>
                  <span style={{ fontSize: 13, fontWeight: currency === c ? 600 : 400 }}>{c === 'EUR' ? '유로 (EUR)' : c === 'USD' ? '미국 달러 (USD)' : '한국 원 (KRW)'}</span>
                  <span style={{ fontSize: 11, color: C.textDim, fontFamily: 'monospace' }}>1 EUR = {c === 'EUR' ? '1' : c === 'USD' ? (RATES.EUR / RATES.USD).toFixed(4) : RATES.EUR.toFixed(0)}</span>
                </button>
              ))}
            </div>

      <div style={{ height: 58, background: C.surface, borderBottom: `1px solid ${C.border}`, display: 'flex', alignItems: 'center', justifyContent: 'space-between', padding: '0 32px', position: 'sticky', top: 0, zIndex: 500 }}>
        <div style={{ display: 'flex', alignItems: 'center', gap: 36 }}>
          <div style={{ fontSize: 14, fontWeight: 800, letterSpacing: 3, textTransform: 'uppercase', color: C.text }}>
            <span style={{ color: C.accent }}>A</span>RTHAUS <span style={{ fontSize: 10, color: C.textDim, fontWeight: 400, letterSpacing: 2 }}>Admin</span>
          </div>
          <nav style={{ display: 'flex', gap: 4 }}>
            {NAV.map(n => (
              <button key={n.id} onClick={() => setScreen(n.id)} style={{ padding: '7px 16px', background: screen === n.id ? `rgba(107,143,212,0.12)` : 'transparent', color: screen === n.id ? C.accent : C.textSub, border: 'none', borderRadius: 6, fontSize: 13, cursor: 'pointer', fontFamily: 'inherit', display: 'flex', alignItems: 'center', gap: 7, transition: 'all 0.18s', fontWeight: screen === n.id ? 600 : 400 }}>
                <PH name={n.icon} size={15} />{n.label}
              </button>
            ))}
          </nav>
        </div>
        <div style={{ display: 'flex', alignItems: 'center', gap: 12 }}>
          <span style={{ fontSize: 11, color: C.textDim }}>WordPress 관리자</span>
          <div style={{ width: 32, height: 32, borderRadius: '50%', background: C.primary, border: `2px solid ${C.accent}`, display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 13, fontWeight: 700, color: C.text }}>A</div>
        </div>
      </div>

      {/* 컨텐츠 */}
      <div>
        {screen === 'main' && <DashboardScreen />}
        {screen === 'payment' && <PaymentScreen />}
        {screen === 'booking' && <BookingScreen />}
        {screen === 'seo' && <SeoScreen />}
      </div>

      {/* 푸터 */}
      <div style={{ padding: '24px 32px', borderTop: `1px solid ${C.border}`, display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginTop: 40 }}>
        <div style={{ fontSize: 12, color: C.textDim }}>ARTHAUS Admin · WordPress + WooCommerce + Mollie · MySQL + Redis 캐싱</div>
        <div style={{ fontSize: 11, color: C.textDim }}>v2.4.1 · 자체 개발 프로젝트</div>
      </div>
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
