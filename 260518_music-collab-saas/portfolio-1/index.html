<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SoundCollab — 음원 협업 SaaS 맞춤 구현 데모</title>
<link rel="preconnect" href="https://cdn.jsdelivr.net">
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" rel="stylesheet">
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://unpkg.com/prop-types@15.8.1/prop-types.min.js"></script>

<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { width: 100%; height: 100%; font-family: 'Pretendard', -apple-system, sans-serif; background: #0F0F14; color: #F0EEFF; }
#root { width: 100%; min-height: 100vh; }

@keyframes fadeIn {
  from { opacity: 0; }
  to { opacity: 1; }
}
@keyframes slideUp {
  from { opacity: 0; transform: translateY(16px); }
  to { opacity: 1; transform: translateY(0); }
}
@keyframes slideInRight {
  from { opacity: 0; transform: translateX(32px); }
  to { opacity: 1; transform: translateX(0); }
}
@keyframes pulseGlow {
  0%, 100% { box-shadow: 0 0 0 0 rgba(124,58,237,0.3); }
  50% { box-shadow: 0 0 0 6px rgba(124,58,237,0); }
}
@keyframes waveBar {
  0%, 100% { transform: scaleY(0.4); }
  50% { transform: scaleY(1); }
}
@keyframes toastSlide {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}

.page-enter { animation: fadeIn 0.25s ease; }
.card-appear { animation: slideUp 0.3s ease forwards; }
.drawer-enter { animation: slideInRight 0.3s cubic-bezier(0.25,0.46,0.45,0.94); }

::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: #1A1A24; }
::-webkit-scrollbar-thumb { background: #3D3558; border-radius: 3px; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef } = React;
const { AreaChart, Area, BarChart, Bar, XAxis, YAxis, CartesianGrid, Tooltip, ResponsiveContainer, RadialBarChart, RadialBar } = Recharts;

const COLORS = {
  primary: '#7C3AED', secondary: '#A855F7', accent: '#EC4899',
  bg: '#0F0F14', surface: '#1A1A24', surface2: '#222232',
  border: '#2E2A42', textPrimary: '#F0EEFF', textSecondary: '#8B84A8',
  success: '#22C55E', warning: '#F59E0B', error: '#EF4444'
};

const toKebab = n => n.replace(/([A-Z])/g,(m,l,o)=>o===0?l.toLowerCase():'-'+l.toLowerCase()).replace(/\d+/g,d=>'-'+d);
const Icon = ({ name, size=16, color, style={} }) => {
  const ref = useRef(null);
  const kebab = toKebab(name);
  useEffect(() => {
    if (ref.current && window.lucide) window.lucide.createIcons({ elements: [ref.current] });
  }, [name]);
  return <i ref={ref} data-lucide={kebab} style={{ display:'inline-flex', alignItems:'center', width:size, height:size, color: color||'currentColor', flexShrink:0, ...style }} />;
};

const Toast = ({ msg, onClose }) => {
  useEffect(() => { const t = setTimeout(onClose, 3000); return () => clearTimeout(t); }, []);
  return (
    <div style={{ position:'fixed', bottom:24, right:24, background:'#2E2A42', border:`1px solid ${COLORS.primary}`, borderRadius:8, padding:'12px 20px', display:'flex', alignItems:'center', gap:10, zIndex:9999, animation:'toastSlide 0.3s ease', boxShadow:'0 8px 32px rgba(0,0,0,0.5)' }}>
      <Icon name="CheckCircle" size={16} color={COLORS.success} />
      <span style={{ fontSize:14, color:COLORS.textPrimary }}>{msg}</span>
      <button onClick={onClose} style={{ background:'none', border:'none', cursor:'pointer', color:COLORS.textSecondary, marginLeft:8 }}><Icon name="X" size={14} /></button>
    </div>
  );
};

const Modal = ({ title, onClose, children, width=520 }) => (
  <div style={{ position:'fixed', inset:0, background:'rgba(0,0,0,0.75)', zIndex:1000, display:'flex', alignItems:'center', justifyContent:'center', animation:'fadeIn 0.2s ease' }}>
    <div style={{ background:COLORS.surface, border:`1px solid ${COLORS.border}`, borderRadius:12, width, maxWidth:'95vw', maxHeight:'85vh', overflow:'hidden', display:'flex', flexDirection:'column', boxShadow:'0 24px 64px rgba(0,0,0,0.6)' }}>
      <div style={{ padding:'20px 24px', borderBottom:`1px solid ${COLORS.border}`, display:'flex', alignItems:'center', justifyContent:'space-between' }}>
        <h3 style={{ fontSize:16, fontWeight:600, color:COLORS.textPrimary }}>{title}</h3>
        <button onClick={onClose} style={{ background:'none', border:'none', cursor:'pointer', color:COLORS.textSecondary, padding:4, borderRadius:4 }}><Icon name="X" size={18} /></button>
      </div>
      <div style={{ overflowY:'auto', flex:1 }}>{children}</div>
    </div>
  </div>
);

const Badge = ({ text, type='default' }) => {
  const colors = { default: { bg:'#2E2A42', text:COLORS.textSecondary }, active: { bg:'rgba(124,58,237,0.2)', text:COLORS.primary }, success: { bg:'rgba(34,197,94,0.15)', text:COLORS.success }, warning: { bg:'rgba(245,158,11,0.15)', text:COLORS.warning }, error: { bg:'rgba(239,68,68,0.15)', text:COLORS.error } };
  const c = colors[type] || colors.default;
  return <span style={{ background:c.bg, color:c.text, padding:'2px 8px', borderRadius:4, fontSize:11, fontWeight:500 }}>{text}</span>;
};

function FeedbackView({ onToast }) {
  const [selected, setSelected] = useState(feedbackData[0]);
  const [newText, setNewText] = useState('');
  const [filter, setFilter] = useState('전체');

  const filtered = filter === '전체' ? feedbackData : feedbackData.filter(f => f.status === filter);

          <div style={{ display:'flex', alignItems:'center', justifyContent:'center', height:'100%', color:COLORS.textSecondary, fontSize:14 }}>피드백을 선택하세요</div>

}

function ChannelView({ onToast }) {
  const [activeChannel, setActiveChannel] = useState(channels[0]);
  const [input, setInput] = useState('');
  const [msgs, setMsgs] = useState(channels[0].msgs);

  const switchChannel = (ch) => {
    setActiveChannel(ch);
    setMsgs(ch.msgs);
  };

  const send = () => {
    if (!input.trim()) return;
    setMsgs(prev => [...prev, { author:'나', text:input, time: new Date().toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit'}), self:true }]);
    setInput('');
    setTimeout(() => {
      setMsgs(prev => [...prev, { author:'김민수', text:'확인했습니다! 반영해볼게요.', time: new Date().toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit'}), self:false }]);
    }, 1200);
  };

  return (
    <div style={{ display:'flex', height:'calc(100vh - 112px)', animation:'fadeIn 0.25s ease' }}>
      <div style={{ width:220, borderRight:`1px solid ${COLORS.border}`, padding:'16px 12px', flexShrink:0 }}>
        <div style={{ fontSize:12, fontWeight:600, color:COLORS.textSecondary, marginBottom:8, padding:'0 4px' }}>채널</div>
        {channels.map(ch => (
          <div key={ch.id} onClick={() => switchChannel(ch)} style={{ display:'flex', alignItems:'center', gap:8, padding:'8px 10px', borderRadius:6, cursor:'pointer', background: activeChannel.id===ch.id ? 'rgba(124,58,237,0.15)' : 'none', color: activeChannel.id===ch.id ? COLORS.primary : COLORS.textSecondary, marginBottom:2, transition:'all 0.15s' }}>
            <Icon name="Hash" size={14} />
            <span style={{ fontSize:13, fontWeight: activeChannel.id===ch.id ? 600 : 400 }}>{ch.name}</span>
          </div>
        ))}
        <div style={{ marginTop:16, borderTop:`1px solid ${COLORS.border}`, paddingTop:12 }}>
          <div style={{ fontSize:12, fontWeight:600, color:COLORS.textSecondary, marginBottom:8, padding:'0 4px' }}>다이렉트</div>
          {['김민수','이지은','박서연'].map((u,i)=>(
            <div key={i} onClick={() => onToast(`${u}와 다이렉트 채널을 열었습니다`)} style={{ display:'flex', alignItems:'center', gap:8, padding:'8px 10px', borderRadius:6, cursor:'pointer', color:COLORS.textSecondary, marginBottom:2 }}
              onMouseEnter={e=>e.currentTarget.style.background='rgba(255,255,255,0.05)'}
              onMouseLeave={e=>e.currentTarget.style.background='none'}>
              <div style={{ width:8, height:8, borderRadius:'50%', background:COLORS.success }} />
              <span style={{ fontSize:13 }}>{u}</span>
            </div>
          ))}
        </div>
      </div>

      <div style={{ flex:1, display:'flex', flexDirection:'column' }}>
        <div style={{ padding:'14px 20px', borderBottom:`1px solid ${COLORS.border}`, display:'flex', alignItems:'center', gap:10 }}>
          <Icon name="Hash" size={16} color={COLORS.textSecondary} />
          <span style={{ fontSize:14, fontWeight:600, color:COLORS.textPrimary }}>{activeChannel.name}</span>
          <div style={{ marginLeft:'auto', display:'flex', gap:8 }}>
            <button onClick={() => onToast('채널 멤버 목록을 불러옵니다')} style={{ background:'none', border:`1px solid ${COLORS.border}`, borderRadius:6, padding:'5px 12px', fontSize:12, color:COLORS.textSecondary, cursor:'pointer', display:'flex', alignItems:'center', gap:4 }}>
              <Icon name="Users" size={12} /> 멤버
            </button>
          </div>
        </div>

        <div style={{ flex:1, overflowY:'auto', padding:'20px' }}>
          {msgs.map((msg, i) => (
            <div key={i} style={{ display:'flex', justifyContent: msg.self ? 'flex-end' : 'flex-start', marginBottom:12, animation:'slideUp 0.2s ease' }}>
              {!msg.self && (
                <div style={{ width:30, height:30, borderRadius:'50%', background:`hsl(${i*60+180},55%,45%)`, display:'flex', alignItems:'center', justifyContent:'center', fontSize:11, fontWeight:700, color:'#fff', marginRight:8, flexShrink:0, alignSelf:'flex-end' }}>{msg.author[0]}</div>
              )}
              <div style={{ maxWidth:'70%' }}>
                {!msg.self && <div style={{ fontSize:11, color:COLORS.textSecondary, marginBottom:3 }}>{msg.author}</div>}
                <div style={{ background: msg.self ? COLORS.primary : COLORS.surface2, color: msg.self ? '#fff' : COLORS.textPrimary, borderRadius: msg.self ? '12px 12px 4px 12px' : '12px 12px 12px 4px', padding:'10px 14px', fontSize:13, lineHeight:1.5 }}>{msg.text}</div>
                <div style={{ fontSize:10, color:COLORS.textSecondary, marginTop:3, textAlign: msg.self?'right':'left' }}>{msg.time}</div>

        <div style={{ padding:'12px 16px', borderTop:`1px solid ${COLORS.border}`, display:'flex', gap:10, alignItems:'flex-end' }}>
          <button onClick={() => onToast('파일을 첨부했습니다')} style={{ background:'none', border:`1px solid ${COLORS.border}`, borderRadius:6, padding:'8px', cursor:'pointer', color:COLORS.textSecondary, flexShrink:0 }}><Icon name="Paperclip" size={16} /></button>
          <div style={{ flex:1, position:'relative' }}>
            <textarea value={input} onChange={e=>setInput(e.target.value)} onKeyDown={e => { if(e.key==='Enter' && !e.shiftKey){e.preventDefault();send();} }} placeholder={`#${activeChannel.name}에 메시지 보내기`} rows={1} style={{ width:'100%', background:COLORS.surface2, border:`1px solid ${COLORS.border}`, borderRadius:6, padding:'10px 12px', fontSize:13, color:COLORS.textPrimary, outline:'none', resize:'none', fontFamily:'Pretendard,sans-serif' }} />
          </div>
          <button onClick={send} style={{ background:COLORS.primary, color:'#fff', border:'none', borderRadius:6, padding:'8px 16px', fontSize:13, fontWeight:600, cursor:'pointer', flexShrink:0 }}>
            <Icon name="Send" size={16} color="#fff" />
          </button>
        </div>
      </div>
    </div>
  );
}

              <div style={{ display:'flex', gap:10, marginTop:20 }}>

                }

          </div>
        </div>
      )}

  );
}

          </div>
        </div>
        <button onClick={() => onToast('프로필이 저장됐습니다')} style={{ background:COLORS.primary, color:'#fff', border:'none', borderRadius:6, padding:'8px 20px', fontSize:13, fontWeight:600, cursor:'pointer' }}>변경사항 저장</button>
      </div>

      <div style={{ background:COLORS.surface, border:`1px solid ${COLORS.border}`, borderRadius:8, padding:24 }}>
        <h3 style={{ fontSize:15, fontWeight:700, color:COLORS.textPrimary, marginBottom:18 }}>알림 설정</h3>
        <div style={{ display:'flex', flexDirection:'column', gap:14 }}>
          {[
            ['feedback','새 피드백 등록 시 알림'],
            ['upload','트랙 업로드 시 알림'],
            ['mention','멘션(@) 알림'],
            ['weekly','주간 활동 요약 이메일'],
          ].map(([key, label]) => (
            <div key={key} style={{ display:'flex', alignItems:'center', justifyContent:'space-between', paddingBottom:14, borderBottom:`1px solid ${COLORS.border}` }}>
              <div>
                <div style={{ fontSize:13, fontWeight:500, color:COLORS.textPrimary }}>{label}</div>
              </div>
              <button onClick={() => { setNotifications(prev => ({...prev,[key]:!prev[key]})); onToast('알림 설정이 저장됐습니다'); }} style={{ width:44, height:24, borderRadius:12, background: notifications[key] ? COLORS.primary : '#2E2A42', border:'none', cursor:'pointer', position:'relative', transition:'background 0.2s' }}>
                <div style={{ width:18, height:18, borderRadius:'50%', background:'#fff', position:'absolute', top:3, left: notifications[key] ? 23 : 3, transition:'left 0.2s' }} />
              </button>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

function App() {
  const [activeTab, setActiveTab] = useState('대시보드');
  const [toast, setToast] = useState(null);

  const tabs = ['대시보드', '피드백', '채널', '프로젝트', '설정'];

  useEffect(() => { if (window.lucide) window.lucide.createIcons(); });

  const showToast = (msg) => setToast(msg);
  const hideToast = () => setToast(null);

  const screenMap = {
    '대시보드': <DashboardView onToast={showToast} />,
    '피드백': <FeedbackView onToast={showToast} />,
    '채널': <ChannelView onToast={showToast} />,
    '프로젝트': <ProjectView onToast={showToast} />,
    '설정': <SettingsView onToast={showToast} />,
  };
  const renderContent = () => screenMap[activeTab] || null;

  return (
    <div style={{ width:'100%', minHeight:'100vh', background:COLORS.bg, display:'flex', flexDirection:'column' }}>
      <nav style={{ background:COLORS.surface, borderBottom:`1px solid ${COLORS.border}`, position:'sticky', top:0, zIndex:100 }}>
        <div style={{ maxWidth:1280, margin:'0 auto', padding:'0 24px', display:'flex', alignItems:'center', height:56 }}>
          <div style={{ display:'flex', alignItems:'center', gap:8, marginRight:32 }}>
            <div style={{ width:28, height:28, borderRadius:6, background:`linear-gradient(135deg,${COLORS.primary},${COLORS.accent})`, display:'flex', alignItems:'center', justifyContent:'center' }}>
              <Icon name="Music2" size={14} color="#fff" />
            </div>
            <span style={{ fontSize:15, fontWeight:800, color:COLORS.textPrimary, letterSpacing:-0.5 }}>SoundCollab</span>
          </div>
          <div style={{ display:'flex', gap:2 }}>
            {tabs.map(tab => (
              <button key={tab} onClick={() => setActiveTab(tab)} style={{ background: activeTab===tab ? 'rgba(124,58,237,0.15)' : 'none', color: activeTab===tab ? COLORS.primary : COLORS.textSecondary, border:'none', borderRadius:6, padding:'6px 14px', fontSize:13, fontWeight: activeTab===tab ? 600 : 400, cursor:'pointer', transition:'all 0.15s' }}>
                {tab}
              </button>
            ))}
          </div>
          <div style={{ marginLeft:'auto', display:'flex', alignItems:'center', gap:10 }}>
            <button onClick={() => showToast('알림이 없습니다')} style={{ background:'none', border:`1px solid ${COLORS.border}`, borderRadius:6, padding:'6px 8px', cursor:'pointer', color:COLORS.textSecondary, position:'relative' }}>
              <Icon name="Bell" size={16} />
              <div style={{ width:6, height:6, borderRadius:'50%', background:COLORS.accent, position:'absolute', top:5, right:5 }} />
            </button>
            <div style={{ width:30, height:30, borderRadius:'50%', background:`linear-gradient(135deg,${COLORS.primary},${COLORS.accent})`, display:'flex', alignItems:'center', justifyContent:'center', fontSize:12, fontWeight:700, color:'#fff', cursor:'pointer' }}>김</div>
          </div>
        </div>

        <div style={{ borderTop:`1px solid ${COLORS.border}`, background:`linear-gradient(135deg, rgba(124,58,237,0.08), rgba(236,72,153,0.05))`, padding:'16px 24px' }}>
          <div style={{ maxWidth:1280, margin:'0 auto', display:'flex', alignItems:'center', justifyContent:'space-between' }}>
            <div>
              <h1 style={{ fontSize:22, fontWeight:800, color:COLORS.textPrimary, marginBottom:4 }}>음원 협업 SaaS — 맞춤 구현 데모</h1>
              <p style={{ fontSize:13, color:COLORS.textSecondary }}>Next.js + TypeScript + Socket.io 기반 음원 제작 협업 플랫폼 프로토타입</p>
            </div>
            <div style={{ display:'flex', gap:10 }}>
              <div style={{ background:'rgba(124,58,237,0.15)', border:`1px solid rgba(124,58,237,0.3)`, borderRadius:6, padding:'6px 14px', fontSize:12, fontWeight:600, color:COLORS.primary }}>Next.js</div>
              <div style={{ background:'rgba(236,72,153,0.1)', border:`1px solid rgba(236,72,153,0.3)`, borderRadius:6, padding:'6px 14px', fontSize:12, fontWeight:600, color:COLORS.accent }}>Socket.io</div>
              <div style={{ background:'rgba(168,85,247,0.1)', border:`1px solid rgba(168,85,247,0.3)`, borderRadius:6, padding:'6px 14px', fontSize:12, fontWeight:600, color:COLORS.secondary }}>TypeScript</div>
            </div>
          </div>
        </div>
      </nav>

      <main style={{ flex:1 }}>
        {renderContent()}
      </main>

      {toast && <Toast msg={toast} onClose={hideToast} />}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
</script>
</body>
</html>
