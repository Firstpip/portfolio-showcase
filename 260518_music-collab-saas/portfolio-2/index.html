<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { width: 100%; min-height: 100%; font-family: 'Pretendard', -apple-system, sans-serif; background: #F0FDFA; color: #0F2723; }
#root { width: 100%; }

@keyframes fadeSlideUp {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}
@keyframes fadeIn {
  from { opacity: 0; }
  to { opacity: 1; }
}
@keyframes scaleIn {
  from { opacity: 0; transform: scale(0.96); }
  to { opacity: 1; transform: scale(1); }
}
@keyframes progressFill {
  from { width: 0%; }
  to { width: var(--target-width); }
}
@keyframes toastPop {
  0% { opacity: 0; transform: translateY(12px) scale(0.95); }
  100% { opacity: 1; transform: translateY(0) scale(1); }
}
@keyframes notifPulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.6; }
}

.page-fade { animation: fadeSlideUp 0.3s ease; }
.card-rise { animation: fadeSlideUp 0.35s ease forwards; opacity: 0; }

::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-track { background: #E6FEFA; }
::-webkit-scrollbar-thumb { background: #99E6DA; border-radius: 3px; }

const Toast = ({ msg, onClose }) => {
  useEffect(() => { const t = setTimeout(onClose, 3000); return () => clearTimeout(t); }, []);
  return (
    <div style={{ position:'fixed', bottom:28, right:28, background:C.surface, border:`1.5px solid ${C.primary}`, borderRadius:14, padding:'12px 20px', display:'flex', alignItems:'center', gap:10, zIndex:9999, animation:'toastPop 0.3s ease', boxShadow:'0 8px 32px rgba(13,148,136,0.18)' }}>
      <i className="ph ph-check-circle" style={{ fontSize:18, color:C.success }} />
      <span style={{ fontSize:13, color:C.text, fontWeight:500 }}>{msg}</span>
      <button onClick={onClose} style={{ background:'none', border:'none', cursor:'pointer', color:C.textLight, marginLeft:8 }}><i className="ph ph-x" style={{ fontSize:14 }} /></button>
    </div>
  );
};

const Modal = ({ title, onClose, children, width=540 }) => (

    <div style={{ background:C.surface, borderRadius:20, width, maxWidth:'95vw', maxHeight:'87vh', overflow:'hidden', display:'flex', flexDirection:'column', boxShadow:'0 24px 64px rgba(13,148,136,0.15), 0 4px 16px rgba(0,0,0,0.1)', border:`1px solid ${C.border}` }}>

        <h3 style={{ fontSize:16, fontWeight:700, color:C.text }}>{title}</h3>
        <button onClick={onClose} style={{ background:`${C.bg}`, border:`1px solid ${C.border}`, cursor:'pointer', color:C.textMid, padding:6, borderRadius:8 }}><i className="ph ph-x" style={{ fontSize:16 }} /></button>
      </div>
      <div style={{ overflowY:'auto', flex:1 }}>{children}</div>
    </div>
  </div>
);

const Badge = ({ text, type='default' }) => {
  const map = {
    default: { bg: C.surface2, color: C.textMid, border: C.border },
    primary: { bg: C.primaryLight, color: C.primaryDark, border: C.primaryLight },
    success: { bg: '#D1FAE5', color: '#065F46', border: '#D1FAE5' },
    warning: { bg: '#FEF3C7', color: '#92400E', border: '#FEF3C7' },
    error: { bg: '#FEE2E2', color: '#991B1B', border: '#FEE2E2' },
  };
  const s = map[type] || map.default;
  return <span style={{ background:s.bg, color:s.color, border:`1px solid ${s.border}`, borderRadius:6, padding:'3px 9px', fontSize:11, fontWeight:600 }}>{text}</span>;
};

function AssetsView({ onToast }) {
  const [search, setSearch] = useState('');
  const [typeFilter, setTypeFilter] = useState('전체');
  const [showUpload, setShowUpload] = useState(false);
  const [selectedAsset, setSelectedAsset] = useState(null);
  const [uploadProgress, setUploadProgress] = useState(0);
  const [uploading, setUploading] = useState(false);
  const [uploadFile, setUploadFile] = useState('');

  const types = ['전체', '드럼', '보컬', '신스', '베이스', '기타', '피아노'];
  const filtered = assets.filter(a => {
    const matchType = typeFilter === '전체' || a.type === typeFilter;
    const matchSearch = !search || a.name.toLowerCase().includes(search.toLowerCase()) || a.tags.some(t => t.includes(search));
    return matchType && matchSearch;
  });

  const simulateUpload = () => {
    setUploading(true);
    setUploadProgress(0);
    let p = 0;
    const interval = setInterval(() => {
      p += Math.random() * 18 + 5;
      if (p >= 100) {
        p = 100;
        clearInterval(interval);
        setTimeout(() => { setUploading(false); setShowUpload(false); setUploadProgress(0); setUploadFile(''); onToast('에셋이 성공적으로 업로드됐습니다'); }, 500);
      }
      setUploadProgress(Math.min(p, 100));
    }, 200);
  };

  return (
    <div style={{ padding:'32px 24px', maxWidth:1200, margin:'0 auto', animation:'fadeSlideUp 0.3s ease' }}>
      <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:24 }}>
        <div>
          <h2 style={{ fontSize:24, fontWeight:800, color:C.text, marginBottom:6 }}>음원 에셋 라이브러리</h2>
          <p style={{ fontSize:14, color:C.textMid }}>팀에서 공유하는 샘플, 루프, 사운드 프리셋을 관리합니다</p>
        </div>
        <button onClick={() => setShowUpload(true)} style={{ background:C.primary, color:'#fff', border:'none', borderRadius:12, padding:'10px 20px', fontSize:13, fontWeight:700, cursor:'pointer', display:'flex', alignItems:'center', gap:8, boxShadow:'0 4px 12px rgba(13,148,136,0.3)' }}>
          <i className="ph ph-upload-simple" style={{ fontSize:16 }} /> 에셋 업로드
        </button>
      </div>

      <div style={{ display:'flex', gap:12, marginBottom:20, flexWrap:'wrap' }}>
        <div style={{ flex:1, minWidth:240, position:'relative' }}>
          <i className="ph ph-magnifying-glass" style={{ position:'absolute', left:12, top:'50%', transform:'translateY(-50%)', fontSize:16, color:C.textLight }} />
          <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="에셋명, 태그로 검색..." style={{ width:'100%', background:C.surface, border:`1.5px solid ${C.border}`, borderRadius:10, padding:'10px 12px 10px 38px', fontSize:13, color:C.text, outline:'none', transition:'border-color 0.2s' }}
            onFocus={e=>e.target.style.borderColor=C.primary}
            onBlur={e=>e.target.style.borderColor=C.border} />
        </div>
        <div style={{ display:'flex', gap:6 }}>
          {types.map(t => (
            <button key={t} onClick={() => setTypeFilter(t)} style={{ background: typeFilter===t ? C.primary : C.surface, color: typeFilter===t ? '#fff' : C.textMid, border:`1.5px solid ${typeFilter===t ? C.primary : C.border}`, borderRadius:8, padding:'8px 14px', fontSize:12, fontWeight:500, cursor:'pointer', transition:'all 0.15s', whiteSpace:'nowrap' }}>{t}</button>
          ))}
        </div>
      </div>

      <div style={{ display:'grid', gridTemplateColumns:'repeat(3, 1fr)', gap:14 }}>
        {filtered.map((asset, i) => (
          <div key={asset.id} onClick={() => setSelectedAsset(asset)} style={{ background:C.surface, border:`1.5px solid ${C.border}`, borderRadius:16, padding:20, cursor:'pointer', transition:'all 0.2s', animation:`fadeSlideUp 0.35s ease ${i*0.06}s both`, opacity:0, boxShadow:'0 2px 8px rgba(13,148,136,0.04)' }}

function NotificationsView({ onToast }) {
  const [filter, setFilter] = useState('전체');
  const [items, setItems] = useState(notifications);

  const filters = ['전체','업로드','피드백','시스템'];
  const typeMap = { 'upload':'업로드', 'feedback':'피드백', 'member':'멤버', 'system':'시스템' };
  const filtered = filter === '전체' ? items : items.filter(n => typeMap[n.type] === filter);

  const markRead = (id) => setItems(prev => prev.map(n => n.id===id ? {...n, read:true} : n));
  const markAllRead = () => { setItems(prev => prev.map(n => ({...n, read:true}))); onToast('모든 알림을 읽음으로 표시했습니다'); };

  const severityColor = { info: C.primary, success: C.success, warning: C.accent, error: C.error };

  return (
    <div style={{ padding:'32px 24px', maxWidth:800, margin:'0 auto', animation:'fadeSlideUp 0.3s ease' }}>
      <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:24 }}>
        <div>
          <h2 style={{ fontSize:24, fontWeight:800, color:C.text, marginBottom:6 }}>협업 알림</h2>
          <p style={{ fontSize:14, color:C.textMid }}>협업 이벤트와 시스템 알림을 확인하세요</p>
        </div>
        <button onClick={markAllRead} style={{ background:C.surface, border:`1.5px solid ${C.border}`, color:C.textMid, borderRadius:10, padding:'8px 16px', fontSize:12, fontWeight:600, cursor:'pointer', display:'flex', alignItems:'center', gap:6 }}>
          <i className="ph ph-check-circle" style={{ fontSize:15 }} /> 모두 읽음
        </button>
      </div>

      <div style={{ display:'flex', gap:8, marginBottom:20 }}>
        {filters.map(f => (
          <button key={f} onClick={() => setFilter(f)} style={{ background: filter===f ? C.primary : C.surface, color: filter===f ? '#fff' : C.textMid, border:`1.5px solid ${filter===f ? C.primary : C.border}`, borderRadius:8, padding:'7px 16px', fontSize:12, fontWeight:600, cursor:'pointer', transition:'all 0.15s' }}>{f}</button>
        ))}
        <div style={{ marginLeft:'auto', display:'flex', alignItems:'center', gap:6 }}>
          <div style={{ width:8, height:8, borderRadius:'50%', background:C.accent, animation:'notifPulse 2s infinite' }} />
          <span style={{ fontSize:12, color:C.textMid }}>미읽음 {items.filter(n=>!n.read).length}건</span>
        </div>
      </div>

      <div style={{ display:'flex', flexDirection:'column', gap:10 }}>
        {filtered.map((notif, i) => (
          <div key={notif.id} onClick={() => markRead(notif.id)} style={{ background:C.surface, border:`1.5px solid ${notif.read ? C.border : C.primary}`, borderRadius:14, padding:'16px 20px', cursor:'pointer', transition:'all 0.2s', opacity: notif.read ? 0.7 : 1, animation:`fadeSlideUp 0.3s ease ${i*0.07}s both`, display:'flex', gap:14, alignItems:'flex-start', boxShadow: notif.read ? 'none' : `0 2px 12px rgba(13,148,136,0.1)` }}
            onMouseEnter={e => { e.currentTarget.style.transform='translateX(4px)'; }}
            onMouseLeave={e => { e.currentTarget.style.transform='translateX(0)'; }}>
            <div style={{ width:40, height:40, borderRadius:12, background:`${severityColor[notif.severity]}18`, display:'flex', alignItems:'center', justifyContent:'center', flexShrink:0 }}>
              <i className={`ph ${notif.icon}`} style={{ fontSize:20, color:severityColor[notif.severity] }} />
            </div>
            <div style={{ flex:1 }}>
              <div style={{ display:'flex', alignItems:'center', gap:8, marginBottom:4 }}>
                <span style={{ fontSize:14, fontWeight:700, color:C.text }}>{notif.title}</span>
                {!notif.read && <div style={{ width:7, height:7, borderRadius:'50%', background:C.primary, flexShrink:0 }} />}
              </div>
              <div style={{ fontSize:13, color:C.textMid, marginBottom:4 }}>{notif.desc}</div>
              <div style={{ fontSize:11, color:C.textLight }}>{notif.time}</div>
            </div>
            <Badge text={typeMap[notif.type]} type={notif.severity==='success'?'success':notif.severity==='warning'?'warning':'primary'} />
          </div>
        ))}
      </div>
    </div>
  );
}

  return (
    <div style={{ padding:'32px 24px', maxWidth:1100, margin:'0 auto', animation:'fadeSlideUp 0.3s ease' }}>
      <div style={{ marginBottom:24 }}>
        <h2 style={{ fontSize:24, fontWeight:800, color:C.text, marginBottom:6 }}>상세 분석</h2>
        <p style={{ fontSize:14, color:C.textMid }}>프로젝트별 진행 현황과 팀 성과를 분석합니다</p>
      </div>

      <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:20, marginBottom:20 }}>
        <div style={{ background:C.surface, border:`1.5px solid ${C.border}`, borderRadius:16, padding:24 }}>
          <div style={{ fontSize:15, fontWeight:700, color:C.text, marginBottom:16 }}>프로젝트 완료율</div>
          {projectProgress.map((p, i) => (
            <div key={p.name} style={{ marginBottom:16, animation:`fadeSlideUp 0.35s ease ${i*0.07}s both`, opacity:0 }}>
              <div style={{ display:'flex', justifyContent:'space-between', marginBottom:6 }}>
                <span style={{ fontSize:13, fontWeight:600, color:C.text }}>{p.name}</span>
                <span style={{ fontSize:12, fontWeight:700, color:p.color }}>{p.completion}%</span>
              </div>
              <div style={{ height:8, background:C.border, borderRadius:4, overflow:'hidden' }}>
                <div style={{ height:'100%', background:p.color, borderRadius:4, width:`${p.completion}%`, transition:'width 0.8s ease' }} />
              </div>
              <div style={{ display:'flex', gap:12, marginTop:5 }}>
                <span style={{ fontSize:11, color:C.textLight }}>{p.tracks} 트랙</span>
                <span style={{ fontSize:11, color:C.textLight }}>{p.feedback} 피드백</span>
              </div>
            </div>
          ))}
        </div>

        <div style={{ background:C.surface, border:`1.5px solid ${C.border}`, borderRadius:16, padding:24 }}>
          <div style={{ fontSize:15, fontWeight:700, color:C.text, marginBottom:16 }}>주간 트렌드</div>
          <div style={{ height:250 }}>
            <ResponsiveContainer width="100%" height="100%">
              <LineChart data={weeklyActivity}>
                <CartesianGrid strokeDasharray="3 3" stroke={C.border} />
                <XAxis dataKey="week" tick={{ fill:C.textMid, fontSize:11 }} axisLine={false} tickLine={false} />
                <YAxis tick={{ fill:C.textMid, fontSize:11 }} axisLine={false} tickLine={false} />
                <Tooltip contentStyle={{ background:C.surface, border:`1px solid ${C.border}`, borderRadius:10, color:C.text, fontSize:12 }} />
                <Line type="monotone" dataKey="comments" stroke={C.primary} strokeWidth={2.5} dot={{ fill:C.primary, r:4 }} name="코멘트" />
                <Line type="monotone" dataKey="feedback" stroke={C.accent} strokeWidth={2} strokeDasharray="4 2" dot={{ fill:C.accent, r:3 }} name="피드백" />
              </LineChart>
            </ResponsiveContainer>
          </div>
        </div>
      </div>

      <div style={{ background:C.surface, border:`1.5px solid ${C.border}`, borderRadius:16, padding:24 }}>
        <div style={{ fontSize:15, fontWeight:700, color:C.text, marginBottom:16 }}>멤버 활동 지표</div>
        <div style={{ overflowX:'auto' }}>
          <table style={{ width:'100%', borderCollapse:'collapse' }}>
            <thead>
              <tr style={{ background:C.bg }}>
                {['멤버','업로드','피드백','코멘트','총 기여'].map(h => (
                  <th key={h} style={{ padding:'10px 16px', textAlign:'left', fontSize:11, fontWeight:700, color:C.textLight, borderBottom:`1px solid ${C.border}` }}>{h}</th>
                ))}
              </tr>
            </thead>
            <tbody>
              {members.map((m, i) => (
                <tr key={m.id} style={{ borderBottom: i<members.length-1 ? `1px solid ${C.border}` : 'none', transition:'background 0.1s' }}
                  onMouseEnter={e => e.currentTarget.style.background=C.bg}
                  onMouseLeave={e => e.currentTarget.style.background='transparent'}>
                  <td style={{ padding:'12px 16px', display:'flex', alignItems:'center', gap:10 }}>
                    <div style={{ width:28, height:28, borderRadius:'50%', background:m.color, display:'flex', alignItems:'center', justifyContent:'center', fontSize:11, fontWeight:700, color:'#fff' }}>{m.avatar}</div>
                    <span style={{ fontSize:13, fontWeight:600, color:C.text }}>{m.name}</span>
                  </td>
                  <td style={{ padding:'12px 16px', fontSize:13, color:C.text }}>{Math.floor(m.contributions * 0.4)}</td>
                  <td style={{ padding:'12px 16px', fontSize:13, color:C.text }}>{Math.floor(m.contributions * 0.35)}</td>
                  <td style={{ padding:'12px 16px', fontSize:13, color:C.text }}>{Math.floor(m.contributions * 0.25)}</td>
                  <td style={{ padding:'12px 16px' }}>
                    <span style={{ fontSize:13, fontWeight:700, color:C.primary }}>{m.contributions}건</span>
                  </td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      </div>
    </div>
  );
}

function App() {
  const [activePage, setActivePage] = useState('홈');
  const [toast, setToast] = useState(null);

  const navItems = ['홈', '에셋', '알림', '멤버', '분석'];

  const showToast = msg => setToast(msg);
  const hideToast = () => setToast(null);

  const renderPage = () => {
    switch(activePage) {
      case '홈': return <MainView onToast={showToast} />;
      case '에셋': return <AssetsView onToast={showToast} />;
      case '알림': return <NotificationsView onToast={showToast} />;
      case '멤버': return <MembersView onToast={showToast} />;
      case '분석': return <AnalyticsView onToast={showToast} />;
      default: return null;
    }
  };

  return (
    <div style={{ width:'100%', minHeight:'100vh', background:C.bg, display:'flex', flexDirection:'column' }}>
      <header style={{ background:C.surface, borderBottom:`1.5px solid ${C.border}`, position:'sticky', top:0, zIndex:100, boxShadow:'0 2px 12px rgba(13,148,136,0.08)' }}>
        <div style={{ maxWidth:1200, margin:'0 auto', padding:'0 24px', display:'flex', alignItems:'center', height:60 }}>
          <div style={{ display:'flex', alignItems:'center', gap:10, marginRight:40 }}>
            <div style={{ width:32, height:32, borderRadius:10, background:`linear-gradient(135deg,${C.primary},${C.secondary})`, display:'flex', alignItems:'center', justifyContent:'center' }}>
              <i className="ph ph-wave-sine" style={{ fontSize:18, color:'#fff' }} />
            </div>
            <span style={{ fontSize:16, fontWeight:800, color:C.text, letterSpacing:-0.5 }}>WaveSync</span>
          </div>
          <nav style={{ display:'flex', gap:2, flex:1 }}>
            {navItems.map(item => (
              <button key={item} onClick={() => setActivePage(item)} style={{ background: activePage===item ? C.primaryLight : 'none', color: activePage===item ? C.primaryDark : C.textMid, border:'none', borderRadius:8, padding:'7px 16px', fontSize:13, fontWeight: activePage===item ? 700 : 500, cursor:'pointer', transition:'all 0.15s' }}>
                {item}
              </button>
            ))}
          </nav>
          <div style={{ display:'flex', alignItems:'center', gap:10 }}>
            <button onClick={() => showToast('새 알림 3건')} style={{ background:'none', border:`1.5px solid ${C.border}`, borderRadius:8, padding:'6px 8px', cursor:'pointer', color:C.textMid, position:'relative' }}>
              <i className="ph ph-bell" style={{ fontSize:18 }} />
              <div style={{ width:8, height:8, borderRadius:'50%', background:C.accent, position:'absolute', top:4, right:4, border:`2px solid ${C.surface}` }} />
            </button>
            <div style={{ width:34, height:34, borderRadius:'50%', background:`linear-gradient(135deg,${C.primary},${C.secondary})`, display:'flex', alignItems:'center', justifyContent:'center', fontSize:13, fontWeight:700, color:'#fff', cursor:'pointer' }}>김</div>
          </div>
        </div>
      </header>

      <main style={{ flex:1 }}>
        {renderPage()}
      </main>

      <footer style={{ background:C.surface, borderTop:`1.5px solid ${C.border}`, padding:'20px 24px' }}>
        <div style={{ maxWidth:1200, margin:'0 auto', display:'flex', alignItems:'center', justifyContent:'space-between' }}>
          <div style={{ display:'flex', alignItems:'center', gap:8 }}>
            <div style={{ width:22, height:22, borderRadius:6, background:`linear-gradient(135deg,${C.primary},${C.secondary})`, display:'flex', alignItems:'center', justifyContent:'center' }}>
              <i className="ph ph-wave-sine" style={{ fontSize:12, color:'#fff' }} />
            </div>
            <span style={{ fontSize:13, fontWeight:700, color:C.text }}>WaveSync</span>
            <span style={{ fontSize:12, color:C.textLight }}> — 음악 제작 협업 플랫폼 확장 구현 데모</span>
          </div>
          <div style={{ display:'flex', gap:20 }}>
            {['Next.js','TypeScript','Redis','AWS S3'].map(t => (
              <span key={t} style={{ fontSize:11, color:C.textLight, fontWeight:500 }}>{t}</span>
            ))}
          </div>
        </div>
      </footer>

      {toast && <Toast msg={toast} onClose={hideToast} />}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
</script>
</body>
</html>
