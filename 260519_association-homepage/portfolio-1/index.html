* { margin: 0; padding: 0; box-sizing: border-box; }
html, body, #root { width: 100%; min-height: 100vh; }
body { font-family: 'Pretendard', -apple-system, sans-serif; background: #F7F8FA; color: #1A202C; }

@keyframes fadeIn {
  from { opacity: 0; }
  to { opacity: 1; }
}
@keyframes slideInRight {
  from { transform: translateX(100%); }
  to { transform: translateX(0); }
}
@keyframes slideUp {
  from { opacity: 0; transform: translateY(18px); }
  to { opacity: 1; transform: translateY(0); }
}
@keyframes toastDrop {
  from { opacity: 0; transform: translateY(-12px); }
  to { opacity: 1; transform: translateY(0); }
}
@keyframes barGrow {
  from { transform: scaleX(0); }
  to { transform: scaleX(1); }
}

.page-fade { animation: fadeIn 0.28s ease; }
.drawer-slide { animation: slideInRight 0.3s cubic-bezier(0.4,0,0.2,1); }
.card-appear { animation: slideUp 0.38s ease both; }
.toast-anim { animation: toastDrop 0.28s ease; }

::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: #F0F0F0; }
::-webkit-scrollbar-thumb { background: #CBD5E0; border-radius: 3px; }

// ── Toast 컴포넌트
function Toast({ msg, type }) {
  const bg = type === 'error' ? '#FED7D7' : type === 'warn' ? '#FEEBC8' : '#C6F6D5';
  const tc = type === 'error' ? C.danger : type === 'warn' ? C.warn : C.success;
  return (
    <div className="toast-anim" style={{
      position: 'fixed', top: 80, right: 24, zIndex: 9999,
      background: bg, color: tc, border: `1px solid ${tc}30`,
      borderRadius: 8, padding: '12px 20px', fontSize: 14, fontWeight: 500,
      boxShadow: '0 4px 12px rgba(0,0,0,0.12)', maxWidth: 320,
    }}>
      {msg}
    </div>
  );
}

// ── 공지 Drawer
function NoticeDrawer({ notice, onClose, onDownload }) {
  if (!notice) return null;
  return (
    <div style={{ position: 'fixed', inset: 0, zIndex: 500, display: 'flex' }}>
      <div onClick={onClose} style={{ flex: 1, background: 'rgba(0,0,0,0.35)' }} />
      <div className="drawer-slide" style={{
        width: 480, background: C.surface, height: '100%', overflowY: 'auto',

          <button onClick={onClose} style={{ background: 'none', border: 'none', cursor: 'pointer', color: C.textLight, display: 'flex', alignItems: 'center' }}>
            <Ic n="x" s={20} />
          </button>
        </div>
        <div style={{ padding: '24px', flex: 1 }}>
          <h2 style={{ fontSize: 18, fontWeight: 700, color: C.text, lineHeight: 1.5, marginBottom: 12 }}>{notice.title}</h2>

// ── 성과 현황 페이지
function PerformancePage({ showToast }) {
  const targets = { 회원사: 347, 연간행사: 28, 보고서: 156, 협력기관: 42 };
  const [kpi, setKpi] = useState({ 회원사: 0, 연간행사: 0, 보고서: 0, 협력기관: 0 });

  useEffect(() => {
    const duration = 1600;
    const steps = 60;
    let step = 0;
    const timer = setInterval(() => {
      step++;
      const progress = Math.min(step / steps, 1);
      const ease = 1 - Math.pow(1 - progress, 3);
      setKpi({
        회원사: Math.round(targets.회원사 * ease),
        연간행사: Math.round(targets.연간행사 * ease),
        보고서: Math.round(targets.보고서 * ease),
        협력기관: Math.round(targets.협력기관 * ease),
      });
      if (step >= steps) clearInterval(timer);
    }, duration / steps);
    return () => clearInterval(timer);
  }, []);

  const kpiCards = [

                padding: '9px 16px', borderRadius: 6, fontSize: 13, fontWeight: filter === f ? 600 : 400,
                background: filter === f ? C.primary : C.surface,
                color: filter === f ? '#fff' : C.textSub,
                border: `1px solid ${filter === f ? C.primary : C.border}`,
                cursor: 'pointer',
              }}>{f}</button>
            ))}
          </div>
        </div>

        {/* 목록 */}
        <div style={{ background: C.surface, border: `1px solid ${C.border}`, borderRadius: 6, overflow: 'hidden', boxShadow: '0 1px 3px rgba(0,0,0,0.06)' }}>
          {allItems.length === 0 && (
            <div style={{ padding: '48px', textAlign: 'center', color: C.textLight, fontSize: 14 }}>검색 결과가 없습니다.</div>
          )}
          {allItems.map((n, i) => (
            <div key={n.id} onClick={() => setDrawer(n)}
              style={{
                display: 'flex', alignItems: 'center', padding: '16px 20px', gap: 14,
                borderBottom: i < allItems.length-1 ? `1px solid ${C.border}` : 'none',
                cursor: 'pointer', background: n.pinned ? '#FAFBFF' : C.surface,
                transition: 'background 0.15s',
              }}
              onMouseEnter={e => e.currentTarget.style.background = C.bg}
              onMouseLeave={e => e.currentTarget.style.background = n.pinned ? '#FAFBFF' : C.surface}>
              <span style={{ fontSize: 11, fontWeight: 600, padding: '3px 8px', borderRadius: 3, flexShrink: 0,
                background: n.cat === '중요' ? '#FED7D7' : '#EBF8FF',
                color: n.cat === '중요' ? C.danger : C.secondary
              }}>{n.cat}</span>
              {n.pinned && <Ic n="pin" s={14} c={C.accent} />}
              <span style={{ flex: 1, fontSize: 14, fontWeight: n.pinned ? 600 : 400, color: C.text, lineHeight: 1.4 }}>{n.title}</span>
              <span style={{ fontSize: 12, color: C.textLight, flexShrink: 0 }}>{n.date}</span>
              <Ic n="chevRight" s={16} c={C.textLight} />
            </div>
          ))}
        </div>

        {/* 페이지네이션 */}
        {totalPages > 1 && (
          <div style={{ display: 'flex', justifyContent: 'center', gap: 6, marginTop: 20 }}>
            <button onClick={() => setPage(p => Math.max(1, p-1))} disabled={page === 1}
              style={{ width: 34, height: 34, display: 'flex', alignItems: 'center', justifyContent: 'center', border: `1px solid ${C.border}`, borderRadius: 6, background: C.surface, cursor: 'pointer', opacity: page === 1 ? 0.4 : 1 }}>
              <Ic n="chevLeft" s={16} />
            </button>
            {Array.from({ length: totalPages }, (_, i) => i+1).map(p => (
              <button key={p} onClick={() => setPage(p)} style={{
                width: 34, height: 34, border: `1px solid ${p === page ? C.primary : C.border}`,
                borderRadius: 6, background: p === page ? C.primary : C.surface,
                color: p === page ? '#fff' : C.text, fontSize: 13, cursor: 'pointer',
              }}>{p}</button>
            ))}
            <button onClick={() => setPage(p => Math.min(totalPages, p+1))} disabled={page === totalPages}
              style={{ width: 34, height: 34, display: 'flex', alignItems: 'center', justifyContent: 'center', border: `1px solid ${C.border}`, borderRadius: 6, background: C.surface, cursor: 'pointer', opacity: page === totalPages ? 0.4 : 1 }}>
              <Ic n="chevRight" s={16} />
            </button>
          </div>
        )}
      </div>
      <NoticeDrawer notice={drawer} onClose={() => setDrawer(null)} onDownload={name => { setDrawer(null); showToast(`"${name}" 다운로드가 시작됩니다.`); }} />
    </div>
  );
}

// ── 관리자 페이지
function AdminPage({ showToast }) {
  const [tab, setTab] = useState('성과지표');
  const [kpiEdit, setKpiEdit] = useState({ 회원사: 347, 연간행사: 28, 보고서: 156, 협력기관: 42 });
  const [notices, setNotices] = useState(NOTICES_DATA);
  const [showNoticeModal, setShowNoticeModal] = useState(null); // null | 'new' | notice object
  const [files, setFiles] = useState(FILES_DATA);
  const [dragOver, setDragOver] = useState(false);

  const saveKpi = () => showToast('성과지표가 저장되었습니다.');
  const deleteNotice = (id) => { setNotices(n => n.filter(x => x.id !== id)); showToast('공지가 삭제되었습니다.'); };
  const addNotice = (form) => {
    setNotices(n => [{ id: Date.now(), ...form, date: new Date().toLocaleDateString('ko-KR', { year: 'numeric', month: '2-digit', day: '2-digit' }).replace(/\. /g, '.').replace('.', ''), pinned: false }, ...n]);
    setShowNoticeModal(null);
    showToast('공지가 등록되었습니다.');
  };
  const deleteFile = (id) => { setFiles(f => f.filter(x => x.id !== id)); showToast('파일이 삭제되었습니다.'); };

  const adminTabs = ['성과지표', '공지사항 관리', '자료실 관리'];

  return (
    <div className="page-fade">
      <div style={{ maxWidth: 960, margin: '0 auto', padding: '32px 40px 60px' }}>
        <div style={{ marginBottom: 24 }}>
          <h2 style={{ fontSize: 22, fontWeight: 700, color: C.text }}>관리자</h2>
          <p style={{ fontSize: 13, color: C.textSub, marginTop: 3 }}>홈페이지 콘텐츠와 성과지표를 관리합니다.</p>
        </div>

        <div style={{ display: 'flex', gap: 8, marginBottom: 24 }}>
          {adminTabs.map(t => (
            <button key={t} onClick={() => setTab(t)} style={{
              padding: '9px 20px', borderRadius: 6, fontSize: 13, fontWeight: tab === t ? 600 : 400,
              background: tab === t ? C.primary : C.surface,
              color: tab === t ? '#fff' : C.textSub,
              border: `1px solid ${tab === t ? C.primary : C.border}`,
              cursor: 'pointer',
            }}>{t}</button>
          ))}
        </div>

        {tab === '성과지표' && (
          <div style={{ background: C.surface, borderRadius: 6, border: `1px solid ${C.border}`, padding: 24, boxShadow: '0 1px 3px rgba(0,0,0,0.06)' }}>
            <div style={{ fontSize: 15, fontWeight: 700, color: C.text, marginBottom: 4 }}>메인 페이지 성과지표 수치 편집</div>
            <div style={{ fontSize: 13, color: C.textSub, marginBottom: 20 }}>수정 후 저장하면 메인 페이지 KPI 카드에 즉시 반영됩니다.</div>
            <div style={{ display: 'grid', gridTemplateColumns: 'repeat(2,1fr)', gap: 16, marginBottom: 24 }}>
              {Object.entries(kpiEdit).map(([k, v]) => (
                <div key={k}>
                  <label style={{ fontSize: 13, fontWeight: 600, color: C.textSub, display: 'block', marginBottom: 6 }}>{k}</label>
                  <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
                    <input type="number" value={v} onChange={e => setKpiEdit(prev => ({ ...prev, [k]: Number(e.target.value) }))}
                      style={{ flex: 1, padding: '10px 12px', border: `1px solid ${C.border}`, borderRadius: 6, fontSize: 15, fontWeight: 600, fontFamily: 'inherit', outline: 'none' }} />
                    <span style={{ fontSize: 13, color: C.textSub }}>{k === '연간행사' ? '회' : k === '협력기관' ? '개' : k === '보고서' ? '건' : '개사'}</span>
                  </div>
                </div>
              ))}
            </div>
            <button onClick={saveKpi} style={{ padding: '11px 28px', background: C.primary, color: '#fff', border: 'none', borderRadius: 6, fontSize: 14, fontWeight: 600, cursor: 'pointer' }}>저장</button>
          </div>
        )}

        {tab === '공지사항 관리' && (
          <div style={{ background: C.surface, borderRadius: 6, border: `1px solid ${C.border}`, overflow: 'hidden', boxShadow: '0 1px 3px rgba(0,0,0,0.06)' }}>
            <div style={{ padding: '16px 20px', borderBottom: `1px solid ${C.border}`, display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
              <span style={{ fontWeight: 600, fontSize: 14 }}>공지사항 목록 ({notices.length}건)</span>
              <button onClick={() => setShowNoticeModal('new')} style={{ display: 'flex', alignItems: 'center', gap: 6, padding: '8px 16px', background: C.primary, color: '#fff', border: 'none', borderRadius: 6, fontSize: 13, fontWeight: 600, cursor: 'pointer' }}>
                <Ic n="plus" s={15} c="#fff" /> 공지 등록
              </button>
            </div>
            {notices.map((n, i) => (
              <div key={n.id} style={{ display: 'flex', alignItems: 'center', padding: '14px 20px', gap: 12, borderBottom: i < notices.length-1 ? `1px solid ${C.border}` : 'none' }}>
                <span style={{ fontSize: 11, fontWeight: 600, padding: '2px 7px', borderRadius: 3, flexShrink: 0,
                  background: n.cat === '중요' ? '#FED7D7' : '#EBF8FF',
                  color: n.cat === '중요' ? C.danger : C.secondary }}>{n.cat}</span>
                <span style={{ flex: 1, fontSize: 13, color: C.text }}>{n.title}</span>
                <span style={{ fontSize: 11, color: C.textLight, flexShrink: 0 }}>{n.date}</span>
                <div style={{ display: 'flex', gap: 6 }}>
                  <button onClick={() => setShowNoticeModal(n)} style={{ padding: '6px 12px', background: C.bg, border: `1px solid ${C.border}`, borderRadius: 4, fontSize: 12, cursor: 'pointer', display: 'flex', alignItems: 'center', gap: 4 }}>
                    <Ic n="edit" s={12} /> 수정
                  </button>
                  <button onClick={() => deleteNotice(n.id)} style={{ padding: '6px 12px', background: '#FFF5F5', border: `1px solid #FED7D7`, borderRadius: 4, fontSize: 12, color: C.danger, cursor: 'pointer', display: 'flex', alignItems: 'center', gap: 4 }}>
                    <Ic n="trash" s={12} c={C.danger} /> 삭제
                  </button>
                </div>
              </div>
            ))}
          </div>
        )}

        {tab === '자료실 관리' && (
          <div>
            <div style={{ border: `2px dashed ${dragOver ? C.primary : C.border}`, borderRadius: 8, padding: '36px', textAlign: 'center', marginBottom: 20, background: dragOver ? C.primary + '08' : C.surface, transition: 'all 0.2s', cursor: 'pointer' }}
              onDragOver={e => { e.preventDefault(); setDragOver(true); }}
              onDragLeave={() => setDragOver(false)}
              onDrop={e => { e.preventDefault(); setDragOver(false); showToast('파일 업로드가 시작됩니다.'); }}>
              <div style={{ display: 'flex', justifyContent: 'center', marginBottom: 10 }}>
                <Ic n="upload" s={32} c={dragOver ? C.primary : C.textLight} />
              </div>
              <div style={{ fontSize: 14, fontWeight: 600, color: dragOver ? C.primary : C.text, marginBottom: 4 }}>파일을 드래그하거나 클릭하여 업로드</div>
              <div style={{ fontSize: 12, color: C.textLight }}>PDF, DOC, HWP 지원 · 최대 50MB</div>
            </div>
            <div style={{ background: C.surface, border: `1px solid ${C.border}`, borderRadius: 6, overflow: 'hidden', boxShadow: '0 1px 3px rgba(0,0,0,0.06)' }}>
              {files.map((f, i) => (
                <div key={f.id} style={{ display: 'flex', alignItems: 'center', padding: '14px 20px', gap: 12, borderBottom: i < files.length-1 ? `1px solid ${C.border}` : 'none' }}>
                  <Ic n="file" s={18} c={C.primary} />
                  <span style={{ flex: 1, fontSize: 13, color: C.text }}>{f.name}</span>
                  <span style={{ fontSize: 11, color: C.textLight }}>{f.size}</span>
                  <span style={{ fontSize: 11, color: C.textLight }}>{f.date}</span>
                  <span style={{ fontSize: 11, fontWeight: 600, color: C.secondary, background: '#EBF8FF', padding: '2px 7px', borderRadius: 3 }}>{f.type}</span>
                  <button onClick={() => deleteFile(f.id)} style={{ padding: '5px 10px', background: '#FFF5F5', border: `1px solid #FED7D7`, borderRadius: 4, fontSize: 11, color: C.danger, cursor: 'pointer' }}>삭제</button>
                </div>
              ))}
            </div>
          </div>
        )}
      </div>

      {showNoticeModal && (
        <NoticeModal
          onClose={() => setShowNoticeModal(null)}
          onSave={addNotice}
        />
      )}
    </div>
  );
}

// ── 메인 앱
function App() {
  const [page, setPage] = useState('성과 현황');
  const [toast, setToast] = useState(null);

  const showToast = useCallback((msg, type = 'success') => {
    setToast({ msg, type });
    setTimeout(() => setToast(null), 3000);
  }, []);

  const NAV = [
    { label: '성과 현황', icon: 'chart' },
    { label: '포커스 페이지', icon: 'book' },
    { label: '공지사항', icon: 'bell' },
    { label: '관리자', icon: 'cog' },
  ];

  return (
    <div style={{ width: '100%', minHeight: '100vh', background: C.bg }}>
      {/* 상단 네비바 */}
      <header style={{
        position: 'sticky', top: 0, zIndex: 100,
        background: C.surface, borderBottom: `1px solid ${C.border}`,
        boxShadow: '0 1px 4px rgba(0,0,0,0.06)',
      }}>
        <div style={{ maxWidth: 960, margin: '0 auto', padding: '0 40px', height: 64, display: 'flex', alignItems: 'center', gap: 0 }}>
          <div style={{ display: 'flex', alignItems: 'center', gap: 10, marginRight: 40 }}>
            <div style={{ width: 32, height: 32, borderRadius: 6, background: C.primary, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
              <Ic n="award" s={18} c="#fff" />
            </div>
            <div>
              <div style={{ fontSize: 14, fontWeight: 800, color: C.primary, lineHeight: 1.1 }}>한국산업기술협회</div>
              <div style={{ fontSize: 10, color: C.textLight, letterSpacing: '0.05em' }}>KITA</div>
            </div>
          </div>

          <nav style={{ display: 'flex', flex: 1 }}>
            {NAV.map(({ label, icon }) => (
              <button key={label} onClick={() => setPage(label)} style={{
                display: 'flex', alignItems: 'center', gap: 7,
                padding: '0 18px', height: 64, fontSize: 14, fontWeight: page === label ? 700 : 400,
                color: page === label ? C.primary : C.textSub, background: 'none', border: 'none',
                borderBottom: `3px solid ${page === label ? C.primary : 'transparent'}`,
                cursor: 'pointer', transition: 'color 0.15s',
              }}>
                <Ic n={icon} s={16} c={page === label ? C.primary : C.textSub} />
                {label}
              </button>
            ))}
          </nav>

          <button onClick={() => showToast('회원 가입 페이지로 이동합니다.')} style={{
            padding: '8px 18px', background: C.primary, color: '#fff',
            border: 'none', borderRadius: 6, fontSize: 13, fontWeight: 600, cursor: 'pointer',
          }}>회원 가입</button>
        </div>
      </header>

      {/* 페이지 콘텐츠 */}
      {page === '성과 현황' && <PerformancePage showToast={showToast} />}
      {page === '포커스 페이지' && <FocusPage showToast={showToast} />}
      {page === '공지사항' && <NoticePage showToast={showToast} />}
      {page === '관리자' && <AdminPage showToast={showToast} />}

      {toast && <Toast msg={toast.msg} type={toast.type} />}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
