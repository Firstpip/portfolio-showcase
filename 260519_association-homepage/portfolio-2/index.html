<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/regular/style.css">
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body, #root { width: 100%; min-height: 100vh; }
body { font-family: 'Pretendard', -apple-system, sans-serif; background: #1A1A2E; color: #F0F0F5; }

@keyframes fadeInUp {
  from { opacity: 0; transform: translateY(24px); }
  to { opacity: 1; transform: translateY(0); }
}
@keyframes scaleIn {
  from { opacity: 0; transform: scale(0.95); }
  to { opacity: 1; transform: scale(1); }
}
@keyframes slideLeft {
  from { opacity: 0; transform: translateX(-20px); }
  to { opacity: 1; transform: translateX(0); }
}
@keyframes toastUp {
  from { opacity: 0; transform: translateY(16px); }
  to { opacity: 1; transform: translateY(0); }
}
@keyframes shimmer {
  0% { background-position: -400px 0; }
  100% { background-position: 400px 0; }
}

.page-up { animation: fadeInUp 0.35s ease both; }
.scale-in { animation: scaleIn 0.3s cubic-bezier(0.4,0,0.2,1); }
.slide-left { animation: slideLeft 0.3s ease both; }
.toast-up { animation: toastUp 0.28s ease; }
.stagger-1 { animation-delay: 0.05s; }
.stagger-2 { animation-delay: 0.1s; }
.stagger-3 { animation-delay: 0.15s; }
.stagger-4 { animation-delay: 0.2s; }

::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-track { background: #242438; }
::-webkit-scrollbar-thumb { background: #3D3D5C; border-radius: 3px; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;
const { AreaChart, Area, BarChart, Bar, XAxis, YAxis, CartesianGrid, Tooltip, Legend, ResponsiveContainer } = Recharts;

// ── 컬러 팔레트 (다크 버건디)
const D = {
  primary: '#7B1D3F', sec: '#A0294F', accent: '#E8A0B4',
  bg: '#1A1A2E', surface: '#242438', surface2: '#2E2E48',
  border: '#3D3D5C', text: '#F0F0F5', textSub: '#A0A0B8', textLight: '#6E6E8A',
  success: '#2ECC71', warn: '#F39C12', danger: '#E74C3C',
};

// ── Phosphor icon helper (웹폰트 방식)
function Pi({ n, s = 18, c = 'currentColor' }) {
  return <i className={`ph ph-${n}`} style={{ fontSize: s, color: c, display: 'inline-block', lineHeight: 1 }} />;
}

  { name: '글로벌 콘퍼', 신청: 63, 참석: 58 },
];

const MEMBERS_DATA = [
  { id: 1, name: '김도윤', org: '(주)테크솔루션', email: 'kdoyoon@techsol.com', status: '대기', applied: '2025.05.14' },
  { id: 2, name: '이서연', org: '한국혁신연구원', email: 'sylee@kiri.or.kr', status: '대기', applied: '2025.05.12' },
  { id: 3, name: '박민준', org: '(주)그린에너지', email: 'mjpark@green.co.kr', status: '승인', applied: '2025.05.08' },
  { id: 4, name: '최지원', org: '서울경영대학원', email: 'jwchoi@sgsb.ac.kr', status: '승인', applied: '2025.05.05' },
  { id: 5, name: '정하윤', org: '(주)이노베이션랩', email: 'hayoon@ilab.co.kr', status: '반려', applied: '2025.04.29' },
];

const EVENTS_DATA = [
  { id: 1, title: '2025 산업 혁신 포럼', date: '2025.09.15', time: '오전 10:00', loc: '서울 코엑스 그랜드볼룸', capacity: 300, registered: 142, status: '접수 중' },
  { id: 2, title: 'ESG 경영 전략 세미나', date: '2025.06.20', time: '오후 2:00', loc: '협회 대강당', capacity: 150, registered: 87, status: '접수 중' },
  { id: 3, title: '글로벌 파트너십 콘퍼런스', date: '2025.07.10', time: '오전 9:00', loc: 'KINTEX 제1전시장', capacity: 200, registered: 63, status: '사전 예약' },
  { id: 4, title: '청년 창업 경진대회 본선', date: '2025.05.30', time: '오전 10:00', loc: '협회 대강당', capacity: 80, registered: 80, status: '마감' },
];

const ARCHIVE_DATA = [
  { id: 1, name: '2025 1분기 산업경쟁력 보고서', type: '보고서', year: '2025', size: '4.2MB', date: '2025.05.01', downloads: 328, memberOnly: false },
  { id: 2, name: 'ESG 경영 인증 가이드라인 v2.0', type: '가이드', year: '2025', size: '2.1MB', date: '2025.04.15', downloads: 215, memberOnly: false },
  { id: 3, name: '2025년 회원사 조사 결과 보고서', type: '보고서', year: '2025', size: '7.8MB', date: '2025.04.02', downloads: 174, memberOnly: true },

  { id: 6, name: '2024 연차 보고서', type: '보고서', year: '2024', size: '12.8MB', date: '2024.12.31', downloads: 512, memberOnly: false },
  { id: 7, name: '산업 표준 가이드북 2024', type: '가이드', year: '2024', size: '5.3MB', date: '2024.11.15', downloads: 423, memberOnly: false },
  { id: 8, name: '하반기 회비 납부 안내서', type: '양식', year: '2024', size: '234KB', date: '2024.06.30', downloads: 298, memberOnly: false },

// ── Toast
function Toast({ msg, type }) {
  const bg = type === 'error' ? '#4A0A0A' : type === 'warn' ? '#4A3000' : '#0A3A20';
  const border = type === 'error' ? D.danger : type === 'warn' ? D.warn : D.success;
  return (
    <div className="toast-up" style={{
      position: 'fixed', bottom: 24, right: 24, zIndex: 9999,
      background: bg, color: border, border: `1px solid ${border}40`,
      borderRadius: 10, padding: '12px 20px', fontSize: 14, fontWeight: 500,
      boxShadow: '0 8px 24px rgba(0,0,0,0.4)', maxWidth: 320,
    }}>
      {msg}
    </div>
  );
}

// ── 통합 관리자 대시보드
function DashboardPage({ members, setMembers, showToast }) {
  const [kpi, setKpi] = useState({ total: 0, newThis: 0, events: 0, downloads: 0 });

  useEffect(() => {
    const targets = { total: 347, newThis: 15, events: 4, downloads: 2185 };
    const steps = 50;
    let step = 0;
    const timer = setInterval(() => {
      step++;
      const ease = Math.min(step / steps, 1);
      const eased = 1 - Math.pow(1 - ease, 3);
      setKpi({
        total: Math.round(targets.total * eased),
        newThis: Math.round(targets.newThis * eased),
        events: Math.round(targets.events * eased),
        downloads: Math.round(targets.downloads * eased),
      });
      if (step >= steps) clearInterval(timer);
    }, 30);
    return () => clearInterval(timer);
  }, []);

  const kpiCards = [
    { label: '전체 회원', value: kpi.total.toLocaleString(), unit: '명', icon: 'users', color: D.accent },
    { label: '이번 달 신규', value: kpi.newThis, unit: '명', icon: 'user-plus', color: D.success },
    { label: '예정 행사', value: kpi.events, unit: '건', icon: 'calendar-check', color: D.warn },
    { label: '자료 다운로드', value: kpi.downloads.toLocaleString(), unit: '건', icon: 'download-simple', color: '#9B59B6' },
  ];

  const pending = members.filter(m => m.status === '대기');

  const approve = (id) => {
    setMembers(ms => ms.map(m => m.id === id ? { ...m, status: '승인' } : m));
    showToast('회원 가입이 승인되었습니다.');
  };
  const reject = (id) => {
    setMembers(ms => ms.map(m => m.id === id ? { ...m, status: '반려' } : m));
    showToast('회원 가입이 반려되었습니다.', 'warn');
  };

  return (
    <div className="page-up">
      {/* KPI 카드 */}
      <div style={{ display: 'grid', gridTemplateColumns: 'repeat(4,1fr)', gap: 16, marginBottom: 24 }}>
        {kpiCards.map((k, i) => (
          <div key={k.label} className={`page-up stagger-${i+1}`} style={{
            background: D.surface, border: `1px solid ${D.border}`, borderRadius: 14,
            padding: '20px', position: 'relative', overflow: 'hidden',
            transition: 'transform 0.2s, box-shadow 0.2s',
          }}
          onMouseEnter={e => { e.currentTarget.style.transform = 'scale(1.03)'; e.currentTarget.style.boxShadow = `0 8px 24px rgba(0,0,0,0.3)`; }}
          onMouseLeave={e => { e.currentTarget.style.transform = 'scale(1)'; e.currentTarget.style.boxShadow = 'none'; }}>
            <div style={{ position: 'absolute', top: -20, right: -20, width: 80, height: 80, borderRadius: '50%', background: k.color + '15' }} />
            <div style={{ marginBottom: 12 }}>
              <Pi n={k.icon} s={22} c={k.color} />
            </div>
            <div style={{ fontSize: 28, fontWeight: 800, color: D.text, fontVariantNumeric: 'tabular-nums' }}>{k.value}<span style={{ fontSize: 13, fontWeight: 500, marginLeft: 2, color: D.textSub }}>{k.unit}</span></div>
            <div style={{ fontSize: 12, color: D.textSub, marginTop: 4 }}>{k.label}</div>
          </div>
        ))}
      </div>

      {/* 차트 2개 */}
      <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 20, marginBottom: 24 }}>
        <div style={{ background: D.surface, border: `1px solid ${D.border}`, borderRadius: 14, padding: '20px' }}>
          <div style={{ fontSize: 14, fontWeight: 700, color: D.text, marginBottom: 3 }}>월별 회원 현황</div>
          <div style={{ fontSize: 11, color: D.textLight, marginBottom: 16 }}>신규 가입 및 탈퇴 추이</div>
          <div style={{ height: 200, position: 'relative' }}>
            <ResponsiveContainer width="100%" height="100%">
              <AreaChart data={MONTHLY_MEMBERS} margin={{ top: 5, right: 5, left: -20, bottom: 0 }}>
                <defs>
                  <linearGradient id="gNew" x1="0" y1="0" x2="0" y2="1">
                    <stop offset="5%" stopColor={D.accent} stopOpacity={0.4}/>
                    <stop offset="95%" stopColor={D.accent} stopOpacity={0}/>
                  </linearGradient>
                </defs>
                <CartesianGrid strokeDasharray="3 3" stroke="#2E2E4A" />
                <XAxis dataKey="month" tick={{ fontSize: 11, fill: D.textLight }} />
                <YAxis tick={{ fontSize: 10, fill: D.textLight }} />
                <Tooltip contentStyle={{ background: D.surface2, border: `1px solid ${D.border}`, borderRadius: 8, fontSize: 12, color: D.text }} />
                <Area type="monotone" dataKey="신규" stroke={D.accent} fill="url(#gNew)" strokeWidth={2} dot={{ r: 3, fill: D.accent }} />
                <Area type="monotone" dataKey="탈퇴" stroke={D.danger} fill="transparent" strokeWidth={1.5} strokeDasharray="4 2" dot={{ r: 2, fill: D.danger }} />
              </AreaChart>
            </ResponsiveContainer>
          </div>
        </div>
        <div style={{ background: D.surface, border: `1px solid ${D.border}`, borderRadius: 14, padding: '20px' }}>
          <div style={{ fontSize: 14, fontWeight: 700, color: D.text, marginBottom: 3 }}>행사별 참석 현황</div>
          <div style={{ fontSize: 11, color: D.textLight, marginBottom: 16 }}>신청 대비 실제 참석 비율</div>
          <div style={{ height: 200, position: 'relative' }}>
            <ResponsiveContainer width="100%" height="100%">
              <BarChart data={EVENT_ATTEND} margin={{ top: 5, right: 5, left: -20, bottom: 0 }}>
                <CartesianGrid strokeDasharray="3 3" stroke="#2E2E4A" />
                <XAxis dataKey="name" tick={{ fontSize: 10, fill: D.textLight }} />
                <YAxis tick={{ fontSize: 10, fill: D.textLight }} />
                <Tooltip contentStyle={{ background: D.surface2, border: `1px solid ${D.border}`, borderRadius: 8, fontSize: 12, color: D.text }} />
                <Bar dataKey="신청" fill={D.primary} radius={[4,4,0,0]} />
                <Bar dataKey="참석" fill={D.accent} radius={[4,4,0,0]} />
              </BarChart>
            </ResponsiveContainer>
          </div>
        </div>
      </div>

      {/* 가입 승인 대기 */}
      <div style={{ background: D.surface, border: `1px solid ${D.border}`, borderRadius: 14, padding: '20px' }}>
        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 16 }}>
          <div style={{ fontSize: 14, fontWeight: 700, color: D.text }}>회원 가입 승인 대기 <span style={{ fontSize: 12, color: D.warn, fontWeight: 600 }}>({pending.length}건)</span></div>
        </div>
        {pending.length === 0 && <div style={{ textAlign: 'center', padding: '20px', color: D.textLight, fontSize: 13 }}>대기 중인 가입 신청이 없습니다.</div>}
        {pending.map(m => (
          <div key={m.id} style={{ display: 'flex', alignItems: 'center', gap: 12, padding: '12px 0', borderBottom: `1px solid ${D.border}` }}>
            <div style={{ width: 36, height: 36, borderRadius: '50%', background: D.primary + '40', display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0 }}>
              <Pi n="user" s={18} c={D.accent} />
            </div>
            <div style={{ flex: 1 }}>
              <div style={{ fontSize: 13, fontWeight: 600, color: D.text }}>{m.name}</div>
              <div style={{ fontSize: 11, color: D.textSub }}>{m.org} · {m.email}</div>
            </div>
            <div style={{ fontSize: 11, color: D.textLight }}>{m.applied}</div>
            <div style={{ display: 'flex', gap: 6 }}>
              <button onClick={() => approve(m.id)} style={{ padding: '6px 14px', background: D.success + '20', border: `1px solid ${D.success}50`, borderRadius: 6, fontSize: 12, fontWeight: 600, color: D.success, cursor: 'pointer' }}>승인</button>
              <button onClick={() => reject(m.id)} style={{ padding: '6px 14px', background: D.danger + '15', border: `1px solid ${D.danger}40`, borderRadius: 6, fontSize: 12, fontWeight: 600, color: D.danger, cursor: 'pointer' }}>반려</button>
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}

// ── 회원 포털
function MemberPage({ members, setMembers, showToast }) {
  const [view, setView] = useState('list'); // 'list' | 'apply' | 'mypage'
  const [form, setForm] = useState({ name: '', org: '', email: '', type: '정회원', purpose: '' });
  const [submitted, setSubmitted] = useState(false);

  const set = (k, v) => setForm(f => ({ ...f, [k]: v }));

  const submitApply = () => {
    if (!form.name || !form.org || !form.email) { showToast('필수 항목을 입력해주세요.', 'error'); return; }
    const newMember = { id: Date.now(), ...form, status: '대기', applied: '2025.05.19' };
    setMembers(ms => [...ms, newMember]);
    setSubmitted(true);
    showToast('가입 신청이 완료되었습니다. 이메일 인증 후 심사가 진행됩니다.');
  };

  const statusColor = s => s === '승인' ? D.success : s === '반려' ? D.danger : D.warn;
  const statusBg = s => s === '승인' ? D.success + '20' : s === '반려' ? D.danger + '15' : D.warn + '20';

  return (
    <div className="page-up">
      <div style={{ display: 'flex', gap: 8, marginBottom: 24 }}>
        {[['list', '회원 현황'], ['apply', '가입 신청'], ['mypage', '마이페이지']].map(([v, label]) => (
          <button key={v} onClick={() => { setView(v); setSubmitted(false); }} style={{
            padding: '9px 20px', borderRadius: 8, fontSize: 13, fontWeight: view === v ? 700 : 400,
            background: view === v ? D.primary : D.surface, color: view === v ? '#fff' : D.textSub,
            border: `1px solid ${view === v ? D.primary : D.border}`, cursor: 'pointer',
          }}>{label}</button>
        ))}
      </div>

      {view === 'list' && (
        <div style={{ background: D.surface, border: `1px solid ${D.border}`, borderRadius: 14, overflow: 'hidden' }}>
          <div style={{ padding: '16px 20px', borderBottom: `1px solid ${D.border}`, fontSize: 14, fontWeight: 700, color: D.text }}>
            전체 회원 신청 현황 ({members.length}건)
          </div>
          {members.map((m, i) => (
            <div key={m.id} style={{ display: 'flex', alignItems: 'center', gap: 12, padding: '14px 20px', borderBottom: i < members.length-1 ? `1px solid ${D.border}` : 'none' }}>
              <div style={{ width: 36, height: 36, borderRadius: '50%', background: D.primary + '40', display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0 }}>
                <Pi n="user" s={18} c={D.accent} />
              </div>
              <div style={{ flex: 1 }}>
                <div style={{ fontSize: 13, fontWeight: 600, color: D.text }}>{m.name}</div>
                <div style={{ fontSize: 11, color: D.textSub }}>{m.org} · {m.email}</div>
              </div>
              <span style={{ fontSize: 11, color: D.textLight }}>{m.applied}</span>
              <span style={{ fontSize: 11, fontWeight: 700, padding: '3px 10px', borderRadius: 5, background: statusBg(m.status), color: statusColor(m.status) }}>{m.status}</span>
            </div>
          ))}
        </div>
      )}

      {view === 'apply' && !submitted && (
        <div style={{ background: D.surface, border: `1px solid ${D.border}`, borderRadius: 14, padding: '28px', maxWidth: 560 }}>
          <div style={{ fontSize: 16, fontWeight: 700, color: D.text, marginBottom: 4 }}>회원 가입 신청</div>
          <div style={{ fontSize: 13, color: D.textSub, marginBottom: 24 }}>심사 완료 후 이메일로 결과를 안내드립니다.</div>
          {[
            { k: 'name', label: '성명', placeholder: '홍길동' },
            { k: 'org', label: '소속 기관/기업', placeholder: '(주)예시기업' },
            { k: 'email', label: '이메일', placeholder: 'example@company.com' },
          ].map(({ k, label, placeholder }) => (
            <div key={k} style={{ marginBottom: 16 }}>
              <label style={{ fontSize: 12, fontWeight: 600, color: D.textSub, display: 'block', marginBottom: 6 }}>{label} <span style={{ color: D.danger }}>*</span></label>
              <input value={form[k]} onChange={e => set(k, e.target.value)} placeholder={placeholder}
                style={{ width: '100%', padding: '11px 14px', background: D.surface2, border: `1px solid ${D.border}`, borderRadius: 8, fontSize: 14, color: D.text, fontFamily: 'inherit', outline: 'none' }} />
            </div>
          ))}
          <div style={{ marginBottom: 16 }}>
            <label style={{ fontSize: 12, fontWeight: 600, color: D.textSub, display: 'block', marginBottom: 6 }}>회원 유형</label>
            <select value={form.type} onChange={e => set('type', e.target.value)}
              style={{ width: '100%', padding: '11px 14px', background: D.surface2, border: `1px solid ${D.border}`, borderRadius: 8, fontSize: 14, color: D.text, fontFamily: 'inherit' }}>
              <option>정회원</option>
              <option>준회원</option>
              <option>특별회원</option>
            </select>
          </div>
          <div style={{ marginBottom: 24 }}>

// ── 행사 일정 페이지
function EventPage({ showToast }) {
  const [events, setEvents] = useState(EVENTS_DATA);
  const [selected, setSelected] = useState(null);
  const [regModal, setRegModal] = useState(null);
  const [regForm, setRegForm] = useState({ name: '', email: '' });
  const [month, setMonth] = useState(5);

  const regSet = (k, v) => setRegForm(f => ({ ...f, [k]: v }));

  const register = () => {
    if (!regForm.name || !regForm.email) { showToast('이름과 이메일을 입력해주세요.', 'error'); return; }
    if (regModal.registered >= regModal.capacity) { showToast('정원이 초과되었습니다.', 'error'); return; }
    setEvents(es => es.map(e => e.id === regModal.id ? { ...e, registered: e.registered + 1 } : e));
    setRegModal(null);
    setSelected(prev => prev && prev.id === regModal.id ? { ...prev, registered: prev.registered + 1 } : prev);
    showToast(`"${regModal.title}" 신청이 완료되었습니다. 확인 이메일을 발송합니다.`);
    setRegForm({ name: '', email: '' });
  };

  return (
    <div className="page-up">
      {/* 달 선택 */}
      <div style={{ display: 'flex', alignItems: 'center', gap: 16, marginBottom: 24 }}>
        <div style={{ fontSize: 18, fontWeight: 700, color: D.text }}>2025년</div>
        <div style={{ display: 'flex', gap: 6 }}>
          {[4,5,6,7,8,9].map(m => (
            <button key={m} onClick={() => setMonth(m)} style={{
              width: 44, height: 36, borderRadius: 8, fontSize: 13, fontWeight: month === m ? 700 : 400,
              background: month === m ? D.primary : D.surface, color: month === m ? '#fff' : D.textSub,
              border: `1px solid ${month === m ? D.primary : D.border}`, cursor: 'pointer',
            }}>{m}월</button>
          ))}
        </div>
      </div>

      <div style={{ display: 'grid', gridTemplateColumns: selected ? '1fr 360px' : '1fr', gap: 20 }}>
        {/* 행사 목록 */}
        <div style={{ display: 'flex', flexDirection: 'column', gap: 12 }}>
          {events.map((ev, i) => {
            const full = ev.registered >= ev.capacity;
            const pct = Math.round(ev.registered / ev.capacity * 100);
            return (
              <div key={ev.id} className={`slide-left stagger-${i+1}`} onClick={() => setSelected(ev)} style={{
                background: D.surface, border: `2px solid ${selected?.id === ev.id ? D.primary : D.border}`,
                borderRadius: 14, padding: '20px', cursor: 'pointer',
                transition: 'border-color 0.2s, transform 0.2s, box-shadow 0.2s',
              }}
              onMouseEnter={e => { if (selected?.id !== ev.id) { e.currentTarget.style.transform = 'scale(1.01)'; e.currentTarget.style.boxShadow = '0 4px 16px rgba(0,0,0,0.25)'; }}}
              onMouseLeave={e => { e.currentTarget.style.transform = 'scale(1)'; e.currentTarget.style.boxShadow = 'none'; }}>
                <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', marginBottom: 10 }}>
                  <h3 style={{ fontSize: 15, fontWeight: 700, color: D.text, lineHeight: 1.4 }}>{ev.title}</h3>
                  <span style={{ fontSize: 11, fontWeight: 700, padding: '3px 10px', borderRadius: 5, flexShrink: 0, marginLeft: 8,
                    background: ev.status === '마감' ? D.danger + '20' : ev.status === '접수 중' ? D.success + '20' : D.warn + '20',
                    color: ev.status === '마감' ? D.danger : ev.status === '접수 중' ? D.success : D.warn
                  }}>{ev.status}</span>
                </div>
                <div style={{ display: 'flex', gap: 16, fontSize: 12, color: D.textSub, marginBottom: 12 }}>
                  <span><Pi n="calendar" s={13} /> {ev.date} {ev.time}</span>
                  <span><Pi n="map-pin" s={13} /> {ev.loc}</span>
                </div>
                <div>
                  <div style={{ display: 'flex', justifyContent: 'space-between', fontSize: 12, color: D.textSub, marginBottom: 6 }}>
                    <span>신청 현황</span>
                    <span style={{ color: full ? D.danger : D.text, fontWeight: 600 }}>{ev.registered} / {ev.capacity}명 ({pct}%)</span>
                  </div>
                  <div style={{ height: 5, background: D.surface2, borderRadius: 3, overflow: 'hidden' }}>
                    <div style={{ height: '100%', width: `${pct}%`, background: full ? D.danger : pct > 80 ? D.warn : D.success, borderRadius: 3, transition: 'width 0.8s ease' }} />
                  </div>
                </div>
              </div>
            );
          })}
        </div>

        {/* 행사 상세 패널 */}
        {selected && (
          <div className="slide-left" style={{ background: D.surface, border: `1px solid ${D.border}`, borderRadius: 14, padding: '24px', height: 'fit-content', position: 'sticky', top: 80 }}>
            <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: 16 }}>
              <span style={{ fontSize: 12, fontWeight: 700, padding: '3px 10px', borderRadius: 5,
                background: selected.status === '마감' ? D.danger + '20' : D.success + '20',
                color: selected.status === '마감' ? D.danger : D.success }}>{selected.status}</span>
              <button onClick={() => setSelected(null)} style={{ background: 'none', border: 'none', cursor: 'pointer', color: D.textLight }}>
                <Pi n="x" s={20} />
              </button>
            </div>
            <h2 style={{ fontSize: 17, fontWeight: 700, color: D.text, lineHeight: 1.4, marginBottom: 16 }}>{selected.title}</h2>
            {[
              { icon: 'calendar', label: '일시', val: `${selected.date} ${selected.time}` },
              { icon: 'map-pin', label: '장소', val: selected.loc },
              { icon: 'users', label: '정원', val: `${selected.capacity}명` },
              { icon: 'ticket', label: '신청', val: `${selected.registered}명 (${Math.round(selected.registered/selected.capacity*100)}%)` },
            ].map(({ icon, label, val }) => (
              <div key={label} style={{ display: 'flex', gap: 10, marginBottom: 10, alignItems: 'flex-start' }}>
                <Pi n={icon} s={16} c={D.accent} />
                <div>
                  <div style={{ fontSize: 11, color: D.textSub }}>{label}</div>
                  <div style={{ fontSize: 13, color: D.text, fontWeight: 500 }}>{val}</div>
                </div>
              </div>
            ))}
            <div style={{ marginTop: 20, paddingTop: 20, borderTop: `1px solid ${D.border}` }}>
              <button
                onClick={() => selected.registered < selected.capacity ? setRegModal(selected) : showToast('정원이 마감되었습니다.', 'error')}
                style={{ width: '100%', padding: '12px', background: selected.registered >= selected.capacity ? D.border : `linear-gradient(135deg, ${D.primary}, ${D.sec})`, color: selected.registered >= selected.capacity ? D.textLight : '#fff', border: 'none', borderRadius: 8, fontSize: 14, fontWeight: 700, cursor: 'pointer' }}>
                {selected.registered >= selected.capacity ? '정원 마감' : '사전 등록 신청'}
              </button>
            </div>
          </div>
        )}
      </div>

      {/* 등록 모달 */}
      {regModal && (
        <div style={{ position: 'fixed', inset: 0, zIndex: 600, background: 'rgba(0,0,0,0.65)', display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
          <div className="scale-in" style={{ background: D.surface, borderRadius: 16, width: 440, padding: '28px', boxShadow: '0 20px 60px rgba(0,0,0,0.5)' }}>
            <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 20 }}>
              <h3 style={{ fontSize: 15, fontWeight: 700, color: D.text }}>사전 등록 신청</h3>
              <button onClick={() => setRegModal(null)} style={{ background: 'none', border: 'none', cursor: 'pointer', color: D.textLight }}><Pi n="x" s={20} /></button>
            </div>
            <div style={{ background: D.surface2, borderRadius: 8, padding: '12px 14px', marginBottom: 20, fontSize: 13, color: D.textSub }}>
              <Pi n="calendar-check" s={14} c={D.accent} /> &nbsp;{regModal.title}
            </div>
            {[{ k: 'name', label: '성명', ph: '홍길동' }, { k: 'email', label: '이메일', ph: 'example@company.com' }].map(({ k, label, ph }) => (
              <div key={k} style={{ marginBottom: 14 }}>
                <label style={{ fontSize: 12, fontWeight: 600, color: D.textSub, display: 'block', marginBottom: 5 }}>{label} <span style={{ color: D.danger }}>*</span></label>
                <input value={regForm[k]} onChange={e => regSet(k, e.target.value)} placeholder={ph}
                  style={{ width: '100%', padding: '10px 13px', background: D.surface2, border: `1px solid ${D.border}`, borderRadius: 8, fontSize: 14, color: D.text, fontFamily: 'inherit', outline: 'none' }} />
              </div>
            ))}
            <div style={{ display: 'flex', gap: 10, marginTop: 20 }}>
              <button onClick={() => setRegModal(null)} style={{ flex: 1, padding: '11px', background: D.surface2, border: `1px solid ${D.border}`, borderRadius: 8, fontSize: 13, color: D.textSub, cursor: 'pointer' }}>취소</button>
              <button onClick={register} style={{ flex: 2, padding: '11px', background: `linear-gradient(135deg, ${D.primary}, ${D.sec})`, color: '#fff', border: 'none', borderRadius: 8, fontSize: 13, fontWeight: 700, cursor: 'pointer' }}>신청 완료</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// ── 자료실 페이지
function ArchivePage({ showToast }) {
  const [archives, setArchives] = useState(ARCHIVE_DATA);
  const [typeFilter, setTypeFilter] = useState('전체');
  const [yearFilter, setYearFilter] = useState('전체');
  const [search, setSearch] = useState('');
  const [downloadModal, setDownloadModal] = useState(null);
  const [loggedIn] = useState(false);

  const types = ['전체', '보고서', '가이드', '양식', '연구'];
  const years = ['전체', '2025', '2024'];

  const filtered = archives.filter(a =>
    (typeFilter === '전체' || a.type === typeFilter) &&
    (yearFilter === '전체' || a.year === yearFilter) &&
    a.name.includes(search)
  );

  const download = (item) => {
    if (item.memberOnly && !loggedIn) { showToast('회원 전용 자료입니다. 로그인이 필요합니다.', 'warn'); return; }
    setDownloadModal(item);
  };

  const confirmDownload = () => {
    setArchives(as => as.map(a => a.id === downloadModal.id ? { ...a, downloads: a.downloads + 1 } : a));
    showToast(`"${downloadModal.name}" 다운로드가 시작됩니다.`);
    setDownloadModal(null);
  };

  const typeColor = t => ({ '보고서': D.danger, '가이드': D.accent, '양식': D.warn, '연구': '#9B59B6' }[t] || D.textSub);

  return (
    <div className="page-up">
      {/* 필터 */}
      <div style={{ display: 'flex', gap: 12, marginBottom: 20, flexWrap: 'wrap', alignItems: 'center' }}>
        <div style={{ position: 'relative', flex: 1, minWidth: 200 }}>
          <Pi n="magnifying-glass" s={16} c={D.textLight} />
          <input value={search} onChange={e => setSearch(e.target.value)} placeholder="자료 검색"
            style={{ width: '100%', padding: '10px 12px 10px 36px', background: D.surface, border: `1px solid ${D.border}`, borderRadius: 8, fontSize: 14, color: D.text, fontFamily: 'inherit', outline: 'none', paddingLeft: 36 }} />
          <span style={{ position: 'absolute', left: 10, top: '50%', transform: 'translateY(-50%)' }}><Pi n="magnifying-glass" s={16} c={D.textLight} /></span>
        </div>
        <div style={{ display: 'flex', gap: 5 }}>
          {types.map(t => (
            <button key={t} onClick={() => setTypeFilter(t)} style={{
              padding: '8px 14px', borderRadius: 7, fontSize: 12, fontWeight: typeFilter === t ? 700 : 400,
              background: typeFilter === t ? D.primary : D.surface, color: typeFilter === t ? '#fff' : D.textSub,
              border: `1px solid ${typeFilter === t ? D.primary : D.border}`, cursor: 'pointer',
            }}>{t}</button>
          ))}
        </div>
        <div style={{ display: 'flex', gap: 5 }}>
          {years.map(y => (
            <button key={y} onClick={() => setYearFilter(y)} style={{
              padding: '8px 14px', borderRadius: 7, fontSize: 12, fontWeight: yearFilter === y ? 700 : 400,
              background: yearFilter === y ? D.surface2 : D.surface, color: yearFilter === y ? D.text : D.textSub,
              border: `1px solid ${yearFilter === y ? D.accent : D.border}`, cursor: 'pointer',
            }}>{y}</button>
          ))}
        </div>
      </div>

      <div style={{ background: D.surface, border: `1px solid ${D.border}`, borderRadius: 14, overflow: 'hidden' }}>
        <div style={{ padding: '14px 20px', borderBottom: `1px solid ${D.border}`, fontSize: 12, color: D.textSub }}>
          총 {filtered.length}건의 자료
        </div>
        {filtered.length === 0 && (
          <div style={{ padding: '40px', textAlign: 'center', color: D.textLight, fontSize: 14 }}>검색 결과가 없습니다.</div>
        )}
        {filtered.map((item, i) => (
          <div key={item.id} style={{ display: 'flex', alignItems: 'center', gap: 14, padding: '16px 20px', borderBottom: i < filtered.length-1 ? `1px solid ${D.border}` : 'none',
            transition: 'background 0.15s', cursor: 'pointer' }}
            onMouseEnter={e => e.currentTarget.style.background = D.surface2}
            onMouseLeave={e => e.currentTarget.style.background = 'transparent'}>
            <div style={{ width: 36, height: 36, borderRadius: 8, background: typeColor(item.type) + '20', display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0 }}>
              <Pi n="file-pdf" s={18} c={typeColor(item.type)} />
            </div>
            <div style={{ flex: 1 }}>
              <div style={{ display: 'flex', gap: 8, alignItems: 'center', marginBottom: 3 }}>
                <span style={{ fontSize: 14, fontWeight: 500, color: D.text }}>{item.name}</span>
                {item.memberOnly && <span style={{ fontSize: 10, fontWeight: 700, color: D.warn, background: D.warn + '20', padding: '2px 6px', borderRadius: 4 }}>회원 전용</span>}
              </div>
              <div style={{ display: 'flex', gap: 14, fontSize: 11, color: D.textLight }}>
                <span style={{ color: typeColor(item.type), fontWeight: 600 }}>{item.type}</span>
                <span>{item.year}년</span>
                <span>{item.size}</span>
                <span>{item.date}</span>
                <span><Pi n="download-simple" s={11} /> {item.downloads.toLocaleString()}회</span>
              </div>
            </div>
            <button onClick={() => download(item)} style={{
              display: 'flex', alignItems: 'center', gap: 6, padding: '8px 16px',
              background: item.memberOnly && !loggedIn ? D.surface2 : `linear-gradient(135deg, ${D.primary}, ${D.sec})`,
              color: item.memberOnly && !loggedIn ? D.textSub : '#fff',
              border: `1px solid ${item.memberOnly && !loggedIn ? D.border : D.primary}`,
              borderRadius: 7, fontSize: 12, fontWeight: 600, cursor: 'pointer', flexShrink: 0,
            }}>
              <Pi n={item.memberOnly && !loggedIn ? 'lock' : 'download-simple'} s={14} />
              {item.memberOnly && !loggedIn ? '로그인 필요' : '다운로드'}
            </button>
          </div>
        ))}
      </div>

      {/* 다운로드 확인 모달 */}
      {downloadModal && (
        <div style={{ position: 'fixed', inset: 0, zIndex: 600, background: 'rgba(0,0,0,0.65)', display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
          <div className="scale-in" style={{ background: D.surface, borderRadius: 16, width: 400, padding: '28px', boxShadow: '0 20px 60px rgba(0,0,0,0.5)' }}>
            <div style={{ display: 'flex', justifyContent: 'center', marginBottom: 16 }}>
              <Pi n="download-simple" s={40} c={D.accent} />
            </div>
            <h3 style={{ textAlign: 'center', fontSize: 15, fontWeight: 700, color: D.text, marginBottom: 8 }}>자료 다운로드</h3>
            <p style={{ textAlign: 'center', fontSize: 13, color: D.textSub, marginBottom: 24 }}>{downloadModal.name}<br />{downloadModal.size} · {downloadModal.date}</p>
            <div style={{ display: 'flex', gap: 10 }}>
              <button onClick={() => setDownloadModal(null)} style={{ flex: 1, padding: '11px', background: D.surface2, border: `1px solid ${D.border}`, borderRadius: 8, fontSize: 13, color: D.textSub, cursor: 'pointer' }}>취소</button>
              <button onClick={confirmDownload} style={{ flex: 2, padding: '11px', background: `linear-gradient(135deg, ${D.primary}, ${D.sec})`, color: '#fff', border: 'none', borderRadius: 8, fontSize: 13, fontWeight: 700, cursor: 'pointer' }}>다운로드 확인</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

function App() {
  const [page, setPage] = useState('통합 대시보드');
  const [toast, setToast] = useState(null);
  const [members, setMembers] = useState(MEMBERS_DATA);

  const showToast = useCallback((msg, type = 'success') => {
    setToast({ msg, type });
    setTimeout(() => setToast(null), 3200);
  }, []);

  const NAV = [
    { label: '통합 대시보드', icon: 'squares-four' },
    { label: '회원 포털', icon: 'users' },
    { label: '행사 일정', icon: 'calendar' },
    { label: '자료실', icon: 'folders' },
  ];

  return (
    <div style={{ width: '100%', minHeight: '100vh', background: D.bg, display: 'flex', flexDirection: 'column' }}>
      {/* 글로벌 네비 */}
      <header style={{ background: D.surface, borderBottom: `1px solid ${D.border}`, position: 'sticky', top: 0, zIndex: 100, boxShadow: '0 2px 12px rgba(0,0,0,0.3)' }}>
        <div style={{ maxWidth: 1080, margin: '0 auto', padding: '0 32px', height: 64, display: 'flex', alignItems: 'center', gap: 0 }}>
          <div style={{ display: 'flex', alignItems: 'center', gap: 10, marginRight: 36 }}>
            <div style={{ width: 34, height: 34, borderRadius: 8, background: `linear-gradient(135deg, ${D.primary}, ${D.sec})`, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
              <Pi n="buildings" s={18} c="#fff" />
            </div>
            <div>
              <div style={{ fontSize: 13, fontWeight: 800, color: D.text, lineHeight: 1.1 }}>한국산업기술협회</div>
              <div style={{ fontSize: 9, color: D.textLight, letterSpacing: '0.06em' }}>EXTENDED PLATFORM</div>
            </div>
          </div>
          <nav style={{ display: 'flex', flex: 1 }}>
            {NAV.map(({ label, icon }) => (
              <button key={label} onClick={() => setPage(label)} style={{
                display: 'flex', alignItems: 'center', gap: 7,
                padding: '0 18px', height: 64, fontSize: 13, fontWeight: page === label ? 700 : 400,
                color: page === label ? D.accent : D.textSub, background: 'none', border: 'none',
                borderBottom: `3px solid ${page === label ? D.accent : 'transparent'}`,
                cursor: 'pointer', transition: 'color 0.15s',
              }}>
                <Pi n={icon} s={16} c={page === label ? D.accent : D.textSub} />
                {label}
              </button>
            ))}
          </nav>
          <button onClick={() => showToast('로그인 페이지로 이동합니다.')} style={{
            padding: '8px 18px', background: `linear-gradient(135deg, ${D.primary}, ${D.sec})`,
            color: '#fff', border: 'none', borderRadius: 8, fontSize: 13, fontWeight: 600, cursor: 'pointer',
          }}>로그인</button>
        </div>
      </header>

      {/* 페이지 콘텐츠 */}
      <main style={{ flex: 1, maxWidth: 1080, margin: '0 auto', width: '100%', padding: '32px 32px 60px' }}>
        {page === '통합 대시보드' && <DashboardPage members={members} setMembers={setMembers} showToast={showToast} />}
        {page === '회원 포털' && <MemberPage members={members} setMembers={setMembers} showToast={showToast} />}
        {page === '행사 일정' && <EventPage showToast={showToast} />}
        {page === '자료실' && <ArchivePage showToast={showToast} />}
      </main>

      {/* 푸터 */}
      <footer style={{ background: D.surface, borderTop: `1px solid ${D.border}`, padding: '24px 32px' }}>
        <div style={{ maxWidth: 1080, margin: '0 auto', display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
          <div style={{ fontSize: 12, color: D.textLight }}>한국산업기술협회 · 서울특별시 강남구 테헤란로 100 · 02-1234-5678</div>
          <div style={{ fontSize: 12, color: D.textLight }}>개인정보처리방침 · 이용약관</div>
        </div>
      </footer>

      {toast && <Toast msg={toast.msg} type={toast.type} />}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
