/* ───── Chart.js helpers ───── */
const BarChart = ({ labels, values, color }) => {
  const ref = useRef(null);
  const chartRef = useRef(null);
  useEffect(() => {
    if (!ref.current) return;
    if (chartRef.current) { chartRef.current.destroy(); }
    chartRef.current = new Chart(ref.current, {
      type: 'bar',
      data: {
        labels,
        datasets: [{ data: values, backgroundColor: color || `${C.primary}CC`, borderRadius: 6, borderSkipped: false }],
      },
      options: {
        responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } },
        scales: { y: { beginAtZero: true, grid: { color: '#F0EDE9' }, ticks: { font: { size: 11 }, color: C.textSecondary } }, x: { grid: { display: false }, ticks: { font: { size: 11 }, color: C.textSecondary } } },
        animation: { duration: 800, easing: 'easeOutQuart' },
      },
    });
    return () => { if (chartRef.current) chartRef.current.destroy(); };
  }, [labels, values, color]);
  return <canvas ref={ref} style={{ width:'100%' }} />;
};

const LineChart = ({ labels, datasets }) => {
  const ref = useRef(null);
  const chartRef = useRef(null);
  useEffect(() => {
    if (!ref.current) return;
    if (chartRef.current) { chartRef.current.destroy(); }
    chartRef.current = new Chart(ref.current, {
      type: 'line',
      data: { labels, datasets: datasets.map(d => ({ ...d, borderWidth: 2.5, pointRadius: 3, tension: 0.4, fill: d.fill || false })) },
      options: {
        responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'bottom', labels: { font: { size: 11 }, color: C.textSecondary, padding: 16, boxWidth: 12 } } },
        scales: { y: { beginAtZero: true, grid: { color: '#F0EDE9' }, ticks: { font: { size: 11 }, color: C.textSecondary } }, x: { grid: { display: false }, ticks: { font: { size: 11 }, color: C.textSecondary } } },
        animation: { duration: 900, easing: 'easeOutQuart' },
      },
    });
    return () => { if (chartRef.current) chartRef.current.destroy(); };
  }, [labels, datasets]);
  return <canvas ref={ref} style={{ width:'100%' }} />;
};

const DonutChart = ({ labels, values, colors }) => {
  const ref = useRef(null);
  const chartRef = useRef(null);
  useEffect(() => {
    if (!ref.current) return;
    if (chartRef.current) { chartRef.current.destroy(); }
    chartRef.current = new Chart(ref.current, {
      type: 'doughnut',
      data: { labels, datasets: [{ data: values, backgroundColor: colors, borderWidth: 2, borderColor: C.surface, hoverOffset: 6 }] },
      options: {
        responsive: true, maintainAspectRatio: false,
        plugins: { legend: { position: 'right', labels: { font: { size: 11 }, color: C.textSecondary, padding: 12, boxWidth: 12 } } },
        animation: { duration: 800, easing: 'easeOutQuart' },
      },
    });
    return () => { if (chartRef.current) chartRef.current.destroy(); };
  }, [labels, values, colors]);
  return <canvas ref={ref} style={{ width:'100%' }} />;
};

/* ───── Toast ───── */
function Toast({ toasts }) {
  return (
    <div style={{ position:'fixed', top:72, right:20, zIndex:9999, display:'flex', flexDirection:'column', gap:8 }}>
      {toasts.map(t => (
        <div key={t.id} style={{
          background: t.type === 'success' ? C.success : t.type === 'error' ? C.danger : C.primary,
          color:'#fff', padding:'10px 16px', borderRadius:8, fontSize:13, fontWeight:500,
          animation:'toastIn 0.25s ease', boxShadow:'0 6px 20px rgba(0,0,0,0.12)',
          display:'flex', alignItems:'center', gap:8, minWidth:240,
        }}>
          <i className={`ph${t.type === 'success' ? '-check-circle' : t.type === 'error' ? '-x-circle' : '-info'}-bold ph-icon`} style={{fontSize:15}} />
          {t.message}
        </div>
      ))}
    </div>
  );
}

/* ───── Defect History ───── */
function DefectHistoryView({ showToast }) {
  const [filterRule, setFilterRule] = useState('전체');
  const [filterStatus, setFilterStatus] = useState('전체');
  const [filterWorker, setFilterWorker] = useState('전체');
  const [selectedDefect, setSelectedDefect] = useState(null);
  const [drawerOpen, setDrawerOpen] = useState(false);
  const [tagModal, setTagModal] = useState(null);
  const [tags, setTags] = useState({ 'DEF-0519-001': null, 'DEF-0519-002': '라벨 인쇄 오류', 'DEF-0518-012': '부착 위치 오류', 'DEF-0518-013': '라벨 인쇄 오류', 'DEF-0517-005': '원자재 이슈' });
  const [newTag, setNewTag] = useState('');

  const rules = ['전체', '규칙 1 위반', '규칙 2 위반', '규칙 3 위반', '복합 위반'];
  const statuses = ['전체', '미처리', '원인분석중', '처리완료'];
  const workerNames = ['전체', '김민준', '이서연', '박도현', '최유진'];

  const filtered = defects.filter(d => {
    if (filterRule !== '전체' && !d.rule.includes(filterRule.replace(' 위반',''))) return false;
    if (filterStatus !== '전체' && d.status !== filterStatus) return false;
    if (filterWorker !== '전체' && d.worker !== filterWorker) return false;
    return true;
  });

  const openDetail = (d) => { setSelectedDefect(d); setDrawerOpen(true); };

  const openTagModal = (defect) => {
    setTagModal(defect);
    setNewTag(tags[defect.id] || '');
  };

  const saveTag = () => {
    if (tagModal) {
      setTags(prev => ({ ...prev, [tagModal.id]: newTag }));
      showToast('원인 태그가 저장됩니다', 'success');
      setTagModal(null);
    }
  };

  const statusStyle = (s) => ({
    '미처리': { bg:C.dangerBg, color:C.danger },
    '원인분석중': { bg:C.warningBg, color:C.warning },
    '처리완료': { bg:C.successBg, color:C.success },
  }[s] || { bg:'#F5F5F4', color:C.textSecondary });

  return (
    <div style={{ padding:'32px 40px' }} className="page-fade">
      <div style={{ marginBottom:24 }}>
        <div style={{ fontSize:20, fontWeight:800, color:C.textPrimary }}>불량 패턴 이력 관리</div>
        <div style={{ fontSize:13, color:C.textSecondary, marginTop:4 }}>규칙 유형·날짜·작업자 복합 필터 · URL 상태 동기화</div>
      </div>

      {/* Filters */}
      <div style={{ display:'flex', gap:12, marginBottom:20, flexWrap:'wrap', alignItems:'center', padding:'16px 20px', background:C.surface, borderRadius:12, border:`1px solid ${C.border}`, boxShadow:'0 1px 6px rgba(0,0,0,0.05)' }}>
        {[
          { label:'규칙 위반', options:rules, value:filterRule, set:setFilterRule },
          { label:'처리 상태', options:statuses, value:filterStatus, set:setFilterStatus },
          { label:'작업자', options:workerNames, value:filterWorker, set:setFilterWorker },
        ].map(f => (
          <div key={f.label} style={{ display:'flex', alignItems:'center', gap:8 }}>
            <span style={{ fontSize:12, color:C.textSecondary, fontWeight:600 }}>{f.label}</span>
            <select value={f.value} onChange={e => f.set(e.target.value)} style={{
              padding:'6px 10px', borderRadius:7, border:`1px solid ${C.border}`, background:C.surface,
              fontSize:13, color:C.textPrimary, cursor:'pointer', outline:'none',
            }}>
              {f.options.map(o => <option key={o}>{o}</option>)}

          </div>
        ))}

  ]);
  const [alertSettingOpen, setAlertSettingOpen] = useState(false);
  const [threshold, setThreshold] = useState(90);

  const generateReport = () => {
    setGenerating(true);

        p = 100;

    <div style={{ padding:'32px 40px' }} className="page-fade">
      <div style={{ marginBottom:24 }}>
        <div style={{ fontSize:20, fontWeight:800, color:C.textPrimary }}>알림 및 리포트 자동화</div>
        <div style={{ fontSize:13, color:C.textSecondary, marginTop:4 }}>Bull Queue 크론 · Web Push · jsPDF 자동 생성</div>
      </div>

      <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:24 }}>
        {/* PDF Generator */}
        <div style={{ background:C.surface, borderRadius:12, border:`1px solid ${C.border}`, overflow:'hidden', boxShadow:'0 2px 12px rgba(0,0,0,0.06)' }}>
          <div style={{ background:`linear-gradient(135deg, ${C.primary} 0%, ${C.primary2} 100%)`, padding:'20px 24px' }}>
            <div style={{ fontSize:15, fontWeight:800, color:'#fff', display:'flex', alignItems:'center', gap:8 }}>
              <i className="ph-file-pdf-bold ph-icon" style={{fontSize:20}} /> 품질 리포트 생성
            </div>
            <div style={{ fontSize:12, color:'rgba(255,255,255,0.75)', marginTop:4 }}>주간 · 라인별 합격률 + 불량 이력 요약 포함</div>
          </div>
          <div style={{ padding:'24px' }}>
            <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:12, marginBottom:20 }}>
              {[
                { label:'리포트 유형', options:['주간 리포트', '일별 리포트', '월간 요약'] },
                { label:'대상 라인', options:['전체 라인', '라인 1', '라인 2', '라인 3'] },
              ].map(f => (
                <div key={f.label}>
                  <div style={{ fontSize:12, fontWeight:600, color:C.textSecondary, marginBottom:6 }}>{f.label}</div>
                  <select style={{ width:'100%', padding:'8px 10px', borderRadius:8, border:`1px solid ${C.border}`, fontSize:13, outline:'none', background:C.surface }}>
                    {f.options.map(o => <option key={o}>{o}</option>)}
                  </select>
                </div>
              ))}
            </div>

            {/* Preview content */}
            <div style={{ padding:'14px 16px', borderRadius:10, background:'#FAFAF7', border:`1px dashed ${C.border}`, marginBottom:16 }}>
              <div style={{ fontSize:12, fontWeight:700, color:C.textPrimary, marginBottom:10 }}>리포트 포함 내용</div>
              <div style={{ display:'flex', flexDirection:'column', gap:6 }}>
                {['합격률 트렌드 차트 (7일)', '라인별 검수 현황 바 차트', '불량 유형 분포 도넛 차트', '불량 이력 상세 테이블', '작업자별 성과 요약'].map(item => (
                  <div key={item} style={{ display:'flex', alignItems:'center', gap:7, fontSize:12, color:C.textSecondary }}>
                    <i className="ph-check-circle-bold ph-icon" style={{ fontSize:13, color:C.success }} /> {item}
                  </div>
                ))}
              </div>
            </div>

            {generating && (
              <div style={{ marginBottom:16, animation:'fadeUp 0.2s ease' }}>
                <div style={{ display:'flex', justifyContent:'space-between', marginBottom:6, fontSize:12 }}>
                  <span style={{ color:C.textPrimary, fontWeight:500 }}>PDF 생성 중...</span>
                  <span style={{ color:C.primary, fontWeight:700 }}>{Math.round(progress)}%</span>
                </div>
                <div style={{ height:8, background:'#F0EDE9', borderRadius:4, overflow:'hidden' }}>
                  <div style={{
                    height:'100%', background:`linear-gradient(90deg, ${C.secondary}, ${C.primary})`,
                    borderRadius:4, width:`${progress}%`, transition:'width 0.18s linear',
                  }} />
                </div>
                <div style={{ marginTop:6, fontSize:11, color:C.textSecondary }}>jsPDF + html2canvas 차트 렌더링 중...</div>
              </div>
            )}

            <button onClick={generateReport} disabled={generating} style={{
              width:'100%', padding:'12px 0', borderRadius:8, border:'none',
              background: generating ? '#D0C4B8' : C.primary, color:'#fff',
              fontSize:14, fontWeight:700, cursor: generating ? 'not-allowed' : 'pointer',
              display:'flex', alignItems:'center', justifyContent:'center', gap:8,
            }}>
              <i className={`ph-${generating ? 'spinner' : generated ? 'download-simple' : 'file-pdf'}-bold ph-icon`} style={{ fontSize:16, animation: generating ? 'spinLoader 1s linear infinite' : 'none' }} />
              {generating ? 'PDF 생성 중...' : generated ? '다운로드' : 'PDF 생성'}
            </button>

            {generated && (
              <div style={{ marginTop:12, padding:'10px 12px', borderRadius:8, background:C.successBg, fontSize:12, color:C.success, display:'flex', alignItems:'center', gap:8, animation:'fadeUp 0.2s ease' }}>
                <i className="ph-check-circle-bold ph-icon" style={{fontSize:15}} />
                주간_품질_리포트_20260519.pdf (2.4MB)
              </div>
            )}
          </div>
        </div>

        {/* Alert settings + history */}
        <div style={{ display:'flex', flexDirection:'column', gap:20 }}>
          <div style={{ background:C.surface, borderRadius:12, border:`1px solid ${C.border}`, overflow:'hidden', boxShadow:'0 2px 12px rgba(0,0,0,0.06)' }}>
            <div style={{ padding:'16px 20px', borderBottom:`1px solid ${C.border}`, display:'flex', alignItems:'center', justifyContent:'space-between' }}>
              <div style={{ fontSize:14, fontWeight:700, color:C.textPrimary, display:'flex', alignItems:'center', gap:8 }}>
                <i className="ph-bell-ringing-bold ph-icon" style={{ fontSize:16, color:C.primary }} /> 알림 설정
              </div>
              <button onClick={() => setAlertSettingOpen(p => !p)} style={{
                padding:'4px 10px', borderRadius:6, border:`1px solid ${C.border}`, background:C.surface,
                color:C.primary, fontSize:12, cursor:'pointer', fontWeight:600,
              }}>{alertSettingOpen ? '접기' : '설정'}</button>
            </div>
            <div style={{ padding:'16px 20px' }}>
              {alertSettingOpen ? (
                <div style={{ animation:'fadeUp 0.2s ease' }}>
                  <div style={{ fontSize:12, color:C.textSecondary, marginBottom:10 }}>합격률 경보 기준치 (%)</div>
                  <div style={{ display:'flex', alignItems:'center', gap:12, marginBottom:16 }}>
                    <input type="range" min={80} max={99} value={threshold} onChange={e => setThreshold(Number(e.target.value))} style={{ flex:1, accentColor:C.primary }} />
                    <span style={{ fontSize:16, fontWeight:800, color:C.primary, width:40 }}>{threshold}%</span>
                  </div>
                  <button onClick={() => { setAlertSettingOpen(false); showToast('알림 설정이 저장됩니다', 'success'); }} style={{
                    width:'100%', padding:'9px 0', borderRadius:7, border:'none', background:C.primary, color:'#fff', fontSize:13, fontWeight:700, cursor:'pointer',
                  }}>저장</button>
                </div>
              ) : (
                <div style={{ display:'flex', flexDirection:'column', gap:10 }}>
                  {[
                    { label:'합격률 기준치', value:`${threshold}% 이하 경보`, icon:'chart-line-down', color:C.danger },
                    { label:'연속 불합격', value:'3건 이상 감지 시 경보', icon:'warning', color:C.warning },
                    { label:'알림 채널', value:'Web Push 활성화됨', icon:'device-mobile', color:C.accent },
                    { label:'발송 주기', value:'1시간 집계 (Bull Queue)', icon:'clock', color:C.primary },
                  ].map(a => (
                    <div key={a.label} style={{ display:'flex', alignItems:'center', gap:10, padding:'8px 10px', borderRadius:8, background:'#FAFAF7', border:`1px solid ${C.border}` }}>
                      <i className={`ph-${a.icon}-bold ph-icon`} style={{ fontSize:16, color:a.color }} />
                      <div>
                        <div style={{ fontSize:11, color:C.textSecondary }}>{a.label}</div>
                        <div style={{ fontSize:12, fontWeight:700, color:C.textPrimary }}>{a.value}</div>
                      </div>
                    </div>
                  ))}
                </div>
              )}
            </div>
          </div>

          {/* Alert history */}
          <div style={{ background:C.surface, borderRadius:12, border:`1px solid ${C.border}`, overflow:'hidden', boxShadow:'0 2px 12px rgba(0,0,0,0.06)', flex:1 }}>
            <div style={{ padding:'16px 20px', borderBottom:`1px solid ${C.border}` }}>
              <div style={{ fontSize:14, fontWeight:700, color:C.textPrimary, display:'flex', alignItems:'center', gap:8 }}>
                <i className="ph-bell-bold ph-icon" style={{ fontSize:16, color:C.primary }} /> 알림 발송 이력 ({alertHistory.length}건)
              </div>
            </div>
            <div>
              {alertHistory.map(a => (
                <div key={a.id} style={{ padding:'14px 20px', borderBottom:`1px solid ${C.border}`, display:'flex', alignItems:'flex-start', gap:12 }}>
                  <div style={{ width:36, height:36, borderRadius:8, background:`${a.type.includes('합격률') ? C.danger : C.warning}14`, display:'flex', alignItems:'center', justifyContent:'center', flexShrink:0 }}>
                    <i className={`ph-${a.type.includes('합격률') ? 'chart-line-down' : 'warning'}-bold ph-icon`} style={{ fontSize:16, color:a.type.includes('합격률') ? C.danger : C.warning }} />
                  </div>
                  <div style={{ flex:1 }}>
                    <div style={{ fontSize:13, fontWeight:700, color:C.textPrimary }}>{a.type}</div>
                    <div style={{ fontSize:12, color:C.textSecondary, marginTop:2 }}>{a.desc}</div>
                    <div style={{ fontSize:11, color:C.textSecondary, marginTop:4 }}>{a.time} · {a.line}</div>
                  </div>
                  <span style={{ fontSize:11, fontWeight:700, padding:'2px 8px', borderRadius:20, background:C.successBg, color:C.success, flexShrink:0 }}>발송됨</span>
                </div>
              ))}
            </div>
          </div>
        </div>
      </div>
    </div>
  );
}

/* ───── App ───── */
function App() {
  const pages = [
    { key:'main', label:'대시보드', icon:'squares-four', View:DashboardView },
    { key:'defect-history', label:'불량 이력', icon:'warning-circle', View:DefectHistoryView },
    { key:'team', label:'팀 관리', icon:'users-three', View:TeamView },
    { key:'report', label:'리포트', icon:'file-text', View:ReportView },
  ];
  const [activePage, setActivePage] = useState('main');
  const [toasts, setToasts] = useState([]);

  const showToast = (message, type='info') => {
    const id = Date.now();
    setToasts(prev => [...prev, { id, message, type }]);
    setTimeout(() => setToasts(prev => prev.filter(t => t.id !== id)), 3000);
  };

  const { View } = pages.find(p => p.key === activePage);

  return (
    <div style={{ width:'100%', minHeight:'100vh', background:C.bg, display:'flex', flexDirection:'column' }}>
      {/* Global navbar */}
      <header style={{
        position:'sticky', top:0, zIndex:100, background:C.surface,
        borderBottom:`1px solid ${C.border}`, boxShadow:'0 1px 8px rgba(180,83,9,0.06)',
      }}>
        <div style={{ maxWidth:1200, margin:'0 auto', padding:'0 40px', display:'flex', alignItems:'center', height:64 }}>
          {/* Logo */}
          <div style={{ display:'flex', alignItems:'center', gap:10, marginRight:48 }}>
            <div style={{ width:36, height:36, borderRadius:10, background:`linear-gradient(135deg, ${C.primary} 0%, ${C.primary2} 100%)`, display:'flex', alignItems:'center', justifyContent:'center' }}>
              <i className="ph-chart-bar-bold ph-icon" style={{ fontSize:19, color:'#fff' }} />
            </div>
            <div>
              <div style={{ fontSize:14, fontWeight:800, color:C.textPrimary, letterSpacing:'-0.3px' }}>QA Analytics</div>
              <div style={{ fontSize:10, color:C.textSecondary }}>검수 이력 분석 플랫폼</div>
            </div>
          </div>

          {/* Nav links */}
          <nav style={{ display:'flex', gap:4, flex:1 }}>
            {pages.map(p => (
              <button key={p.key} onClick={() => setActivePage(p.key)} className="nav-link" style={{
                padding:'8px 18px', borderRadius:8, border:'none', cursor:'pointer',
                background: activePage === p.key ? `${C.primary}12` : 'transparent',
                color: activePage === p.key ? C.primary : C.textSecondary,
                fontSize:14, fontWeight: activePage === p.key ? 700 : 400,
                display:'flex', alignItems:'center', gap:8,
                transition:'all 0.15s',
              }}>
                <i className={`ph-${p.icon}${activePage === p.key ? '-bold' : ''} ph-icon`} style={{ fontSize:16 }} />
                {p.label}
              </button>
            ))}
          </nav>

          {/* Right */}
          <div style={{ display:'flex', alignItems:'center', gap:14 }}>
            <button onClick={() => showToast('Web Push 알림이 활성화됩니다', 'info')} style={{
              width:36, height:36, borderRadius:8, border:`1px solid ${C.border}`, background:C.surface, cursor:'pointer', display:'flex', alignItems:'center', justifyContent:'center', position:'relative',
            }}>
              <i className="ph-bell-bold ph-icon" style={{ fontSize:17, color:C.textSecondary }} />
              <div style={{ position:'absolute', top:6, right:6, width:7, height:7, borderRadius:'50%', background:C.danger, border:`1.5px solid ${C.surface}` }} />
            </button>
            <div style={{ display:'flex', alignItems:'center', gap:8 }}>
              <div style={{ textAlign:'right' }}>
                <div style={{ fontSize:13, fontWeight:700, color:C.textPrimary }}>관리자</div>
                <div style={{ fontSize:11, color:C.textSecondary }}>전체 라인 접근</div>
              </div>
              <div style={{ width:34, height:34, borderRadius:'50%', background:`linear-gradient(135deg, ${C.primary} 0%, ${C.secondary} 100%)`, display:'flex', alignItems:'center', justifyContent:'center' }}>
                <i className="ph-user-bold ph-icon" style={{ fontSize:16, color:'#fff' }} />
              </div>
            </div>
          </div>
        </div>
      </header>

      {/* Main content */}
      <main style={{ flex:1, maxWidth:1200, width:'100%', margin:'0 auto' }}>
        <View key={activePage} showToast={showToast} />
      </main>

      {/* Footer */}
      <footer style={{ background:C.surface, borderTop:`1px solid ${C.border}`, padding:'16px 40px' }}>
        <div style={{ maxWidth:1200, margin:'0 auto', display:'flex', alignItems:'center', justifyContent:'space-between' }}>
          <div style={{ fontSize:12, color:C.textSecondary }}>
            라벨 검수 이력 분석 플랫폼 — 구현 데모
          </div>
          <div style={{ display:'flex', gap:16, fontSize:12, color:C.textSecondary }}>
            {['Node.js + Express', 'PostgreSQL + Prisma', 'Redis + Bull Queue'].map(t => (
              <span key={t} style={{ padding:'3px 8px', borderRadius:5, background:`${C.primary}10`, color:C.primary, fontWeight:600 }}>{t}</span>
            ))}
          </div>
        </div>
      </footer>

      <Toast toasts={toasts} />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
