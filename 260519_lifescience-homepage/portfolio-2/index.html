<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>바이오라이프 통합 CMS·IR 대시보드 — 구현 데모</title>
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" rel="stylesheet">
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://unpkg.com/prop-types@15/prop-types.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
<link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/regular/style.css">
<link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/bold/style.css">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body, #root { width: 100%; min-height: 100vh; font-family: 'Pretendard', sans-serif; background: #FFFBF4; color: #1C1208; }

  :root {
    --primary: #7C4B1C;
    --primary-d: #5A3410;
    --secondary: #B07D45;
    --accent: #F59E0B;
    --accent-l: #FCD34D;
    --bg: #FFFBF4;
    --surface: #FFFFFF;
    --surface2: #FFF8ED;
    --border: #E8D5B5;
    --text: #1C1208;
    --text-sub: #6B5038;
    --shadow: 0 2px 16px rgba(124,75,28,0.10);
    --shadow-m: 0 6px 32px rgba(124,75,28,0.14);
  }

  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes drawerIn { from { transform: translateX(100%); } to { transform: translateX(0); } }
  @keyframes modalIn { from { opacity: 0; transform: scale(0.94); } to { opacity: 1; transform: scale(1); } }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.5; } }
  @keyframes toastSlide { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes barGrow { from { height: 0; } to { height: var(--h); } }
  @keyframes shimmer { 0% { background-position: -400px 0; } 100% { background-position: 400px 0; } }

  /* ── TOPNAV ── */
  .topnav {
    position: fixed; top: 0; left: 0; width: 100%; z-index: 200;
    background: var(--primary);
    display: flex; align-items: center; gap: 0;
    height: 56px; padding: 0 32px;
    box-shadow: 0 2px 16px rgba(92,52,16,0.25);
  }
  .tn-logo { display: flex; align-items: center; gap: 10px; margin-right: 32px; text-decoration: none; flex-shrink: 0; }
  .tn-logo-icon { width: 32px; height: 32px; border-radius: 8px; background: rgba(255,255,255,0.15); display: flex; align-items: center; justify-content: center; }
  .tn-logo-text { font-size: 15px; font-weight: 800; color: #fff; white-space: nowrap; }
  .tn-logo-text span { color: var(--accent-l); }
  .tn-tabs { display: flex; gap: 2px; flex: 1; }
  .tn-tab {
    padding: 0 20px; height: 56px; display: flex; align-items: center;
    font-size: 13px; font-weight: 600; color: rgba(255,255,255,0.65);
    cursor: pointer; border: none; background: transparent;
    transition: color 0.15s, background 0.15s;
    border-bottom: 3px solid transparent; letter-spacing: 0.3px;
    white-space: nowrap;
  }
  .tn-tab:hover { color: rgba(255,255,255,0.9); background: rgba(255,255,255,0.06); }
  .tn-tab.active { color: #fff; border-bottom-color: var(--accent); background: rgba(245,158,11,0.12); }
  .tn-right { display: flex; align-items: center; gap: 12px; margin-left: 24px; }
  .tn-btn { background: var(--accent); color: #fff; font-size: 13px; font-weight: 700; padding: 7px 16px; border-radius: 8px; border: none; cursor: pointer; transition: background 0.2s; white-space: nowrap; }
  .tn-btn:hover { background: var(--accent-l); color: var(--primary); }

  /* ── 레이아웃 ── */
  .layout { padding-top: 56px; width: 100%; }

  /* ── HERO ── */
  .hero-banner {
    width: 100%; min-height: 420px; padding: 60px 48px 48px;
    background: linear-gradient(135deg, #5A3410 0%, #7C4B1C 40%, #9A6030 70%, #F59E0B 100%);
    position: relative; overflow: hidden;
    display: flex; align-items: center; gap: 56px;
  }
  .hero-bg-shape {
    position: absolute; border-radius: 50%; background: rgba(255,255,255,0.05);
    pointer-events: none;
  }
  .hero-text { flex: 1; position: relative; z-index: 1; }
  .hero-eyebrow { font-size: 12px; font-weight: 700; color: var(--accent-l); letter-spacing: 2px; text-transform: uppercase; margin-bottom: 14px; }
  .hero-h { font-size: clamp(28px, 4vw, 48px); font-weight: 800; color: #fff; line-height: 1.18; letter-spacing: -1px; margin-bottom: 16px; }
  .hero-h span { color: var(--accent-l); }
  .hero-p { font-size: 15px; color: rgba(255,255,255,0.72); line-height: 1.8; max-width: 500px; margin-bottom: 28px; }
  .hero-stats { display: flex; gap: 32px; flex-wrap: wrap; }
  .hero-stat-num { font-size: 28px; font-weight: 800; color: #fff; }
  .hero-stat-unit { font-size: 14px; color: var(--accent-l); font-weight: 700; }
  .hero-stat-label { font-size: 12px; color: rgba(255,255,255,0.6); margin-top: 2px; }
  .hero-cards { display: grid; grid-template-columns: repeat(3, 180px); gap: 14px; flex-shrink: 0; position: relative; z-index: 1; }
  .hero-mini-card {
    background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.18);
    border-radius: 14px; padding: 20px 16px; cursor: pointer;
    transition: background 0.2s, transform 0.2s;
    animation: slideUp 0.5s ease both;
  }
  .hero-mini-card:hover { background: rgba(255,255,255,0.18); transform: translateY(-4px); }
  .hero-mini-card:nth-child(1) { animation-delay: 0.05s; }
  .hero-mini-card:nth-child(2) { animation-delay: 0.15s; }
  .hero-mini-card:nth-child(3) { animation-delay: 0.25s; }
  .hero-mini-icon { width: 36px; height: 36px; border-radius: 10px; background: rgba(245,158,11,0.25); display: flex; align-items: center; justify-content: center; margin-bottom: 12px; }
  .hero-mini-icon i { font-size: 18px; color: var(--accent-l); }
  .hero-mini-title { font-size: 13px; font-weight: 700; color: #fff; margin-bottom: 4px; }
  .hero-mini-tag { font-size: 11px; color: rgba(255,255,255,0.6); }

  /* ── 섹션 ── */
  .section { padding: 48px; max-width: 1200px; margin: 0 auto; animation: fadeIn 0.3s ease; }
  .sec-title-row { display: flex; align-items: flex-end; justify-content: space-between; margin-bottom: 32px; flex-wrap: wrap; gap: 12px; }
  .sec-tag { font-size: 11px; font-weight: 700; color: var(--accent); letter-spacing: 2px; text-transform: uppercase; margin-bottom: 6px; }
  .sec-title { font-size: clamp(22px, 3vw, 32px); font-weight: 800; color: var(--primary); letter-spacing: -0.5px; }
  .sec-btn { background: var(--primary); color: #fff; font-size: 13px; font-weight: 700; padding: 9px 18px; border-radius: 8px; border: none; cursor: pointer; display: flex; align-items: center; gap: 6px; transition: background 0.2s; }
  .sec-btn:hover { background: var(--primary-d); }

  /* ── 카드 (BUSINESS) ── */
  .biz-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 48px; }
  .biz-card {
    background: var(--surface); border: 1.5px solid var(--border); border-radius: 14px; padding: 28px;
    cursor: pointer; transition: border-color 0.2s, box-shadow 0.15s, transform 0.15s;
    position: relative; overflow: hidden;
  }
  .biz-card::after {
    content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 4px;
    background: var(--accent); border-radius: 4px 0 0 4px;
    transform: scaleY(0); transition: transform 0.25s ease;
  }
  .biz-card:hover { border-color: var(--accent); box-shadow: var(--shadow-m); transform: translateY(-4px); }
  .biz-card:hover::after { transform: scaleY(1); }
  .biz-icon { width: 44px; height: 44px; border-radius: 12px; background: #FFF3D6; display: flex; align-items: center; justify-content: center; margin-bottom: 16px; }
  .biz-icon i { font-size: 22px; color: var(--primary); }
  .biz-label { font-size: 10px; font-weight: 700; color: var(--accent); letter-spacing: 1.5px; text-transform: uppercase; margin-bottom: 6px; }
  .biz-h { font-size: 18px; font-weight: 800; color: var(--primary); margin-bottom: 10px; }
  .biz-p { font-size: 13px; color: var(--text-sub); line-height: 1.75; margin-bottom: 16px; }
  .biz-tags { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 16px; }
  .biz-tag { font-size: 11px; font-weight: 600; background: var(--surface2); color: var(--primary); padding: 4px 10px; border-radius: 6px; border: 1px solid var(--border); }
  .biz-action { display: flex; align-items: center; gap: 6px; font-size: 13px; font-weight: 700; color: var(--accent); }
  .biz-action i { transition: transform 0.2s; }
  .biz-card:hover .biz-action i { transform: translateX(4px); }

  /* ── CAREERS ── */
  .talent-banner { background: linear-gradient(135deg, #7C4B1C, #B07D45); border-radius: 16px; padding: 36px 40px; margin-bottom: 32px; display: flex; gap: 32px; align-items: center; color: #fff; }
  .talent-text h3 { font-size: 24px; font-weight: 800; margin-bottom: 8px; }
  .talent-text p { font-size: 14px; color: rgba(255,255,255,0.78); line-height: 1.7; }
  .welfare-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; margin-bottom: 40px; }
  .welfare-item { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 18px; text-align: center; }
  .welfare-item i { font-size: 24px; color: var(--primary); margin-bottom: 8px; display: block; }
  .welfare-name { font-size: 13px; font-weight: 700; color: var(--primary); margin-bottom: 4px; }
  .welfare-desc { font-size: 11px; color: var(--text-sub); }
  .job-filter-row { display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; }
  .job-filter-btn {
    font-size: 12px; font-weight: 600; padding: 7px 14px; border-radius: 8px;
    border: 1.5px solid var(--border); background: var(--surface);
    color: var(--text-sub); cursor: pointer; transition: all 0.15s;
  }
  .job-filter-btn.active { background: var(--primary); color: #fff; border-color: var(--primary); }
  .job-list { display: flex; flex-direction: column; gap: 12px; }
  .job-item {
    background: var(--surface); border: 1.5px solid var(--border); border-radius: 12px; padding: 20px 24px;
    display: flex; align-items: center; gap: 16px; cursor: pointer;
    transition: border-color 0.2s, box-shadow 0.15s;
  }
  .job-item:hover { border-color: var(--accent); box-shadow: var(--shadow); }
  .job-badge { padding: 4px 10px; border-radius: 6px; font-size: 11px; font-weight: 700; flex-shrink: 0; }
  .job-badge.open { background: #EDF7EE; color: #1E7E34; }
  .job-badge.closed { background: #F3F4F6; color: #9CA3AF; }
  .job-title { font-size: 15px; font-weight: 700; color: var(--primary); }
  .job-meta { font-size: 12px; color: var(--text-sub); margin-top: 3px; }
  .job-dept { font-size: 11px; font-weight: 600; background: #FFF3D6; color: var(--primary); padding: 3px 8px; border-radius: 6px; flex-shrink: 0; }
  .job-deadline { font-size: 12px; color: var(--text-sub); margin-left: auto; white-space: nowrap; flex-shrink: 0; }
  .job-arrow { color: var(--accent); font-size: 16px; flex-shrink: 0; }

  /* ── PR/IR ── */
  .ir-top { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; margin-bottom: 40px; }
  .ir-chart-card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 28px; }
  .ir-chart-title { font-size: 16px; font-weight: 800; color: var(--primary); margin-bottom: 20px; }
  .chart-wrap { position: relative; height: 220px; }
  .dart-card { background: linear-gradient(135deg, #7C4B1C, #B07D45); border-radius: 16px; padding: 28px; display: flex; flex-direction: column; justify-content: space-between; }
  .dart-label { font-size: 11px; font-weight: 700; color: rgba(255,255,255,0.7); letter-spacing: 2px; margin-bottom: 10px; }
  .dart-title { font-size: 22px; font-weight: 800; color: #fff; margin-bottom: 8px; }
  .dart-desc { font-size: 13px; color: rgba(255,255,255,0.75); line-height: 1.7; margin-bottom: 24px; }
  .dart-btn { background: rgba(255,255,255,0.15); color: #fff; font-size: 13px; font-weight: 700; padding: 10px 18px; border-radius: 9px; border: 1px solid rgba(255,255,255,0.3); cursor: pointer; display: flex; align-items: center; gap: 8px; transition: background 0.2s; width: fit-content; }
  .dart-btn:hover { background: rgba(255,255,255,0.25); }
  .press-search { display: flex; gap: 10px; margin-bottom: 20px; }
  .press-search input { flex: 1; padding: 10px 14px; border-radius: 10px; border: 1.5px solid var(--border); font-size: 14px; font-family: 'Pretendard', sans-serif; outline: none; background: var(--surface); }
  .press-search input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(245,158,11,0.12); }
  .press-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; }
  .press-card {
    background: var(--surface); border: 1.5px solid var(--border); border-radius: 12px; overflow: hidden;
    cursor: pointer; transition: border-color 0.2s, box-shadow 0.15s;
  }
  .press-card:hover { border-color: var(--accent); box-shadow: var(--shadow); }
  .press-thumb { height: 120px; display: flex; align-items: center; justify-content: center; }
  .press-body { padding: 16px; }
  .press-tag { font-size: 10px; font-weight: 700; color: var(--accent); letter-spacing: 1px; text-transform: uppercase; margin-bottom: 6px; }
  .press-title { font-size: 14px; font-weight: 700; color: var(--primary); margin-bottom: 6px; line-height: 1.5; }
  .press-date { font-size: 12px; color: var(--text-sub); }

  /* ── CONTACT ── */
  .location-tabs { display: flex; gap: 8px; margin-bottom: 24px; }
  .loc-tab { font-size: 13px; font-weight: 700; padding: 8px 18px; border-radius: 9px; border: 1.5px solid var(--border); background: var(--surface); color: var(--text-sub); cursor: pointer; transition: all 0.15s; }
  .loc-tab.active { background: var(--primary); color: #fff; border-color: var(--primary); }
  .location-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }
  .map-box { background: linear-gradient(135deg, #5A3410, #9A6030); border-radius: 16px; min-height: 280px; display: flex; align-items: center; justify-content: center; position: relative; overflow: hidden; }
  .map-grid-bg { position: absolute; inset: 0; background-image: linear-gradient(rgba(255,255,255,0.05) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,0.05) 1px, transparent 1px); background-size: 40px 40px; }
  .map-pin { position: absolute; top: 45%; left: 52%; transform: translate(-50%, -50%); }
  .map-pin-dot { width: 20px; height: 20px; background: var(--accent); border-radius: 50% 50% 50% 0; transform: rotate(-45deg); box-shadow: 0 0 0 6px rgba(245,158,11,0.25); }
  .map-pin-ring { position: absolute; inset: -8px; border-radius: 50%; border: 2px solid rgba(245,158,11,0.4); animation: pulse 2s ease-in-out infinite; }
  .map-info { background: rgba(255,255,255,0.15); border-radius: 12px; padding: 12px 16px; position: absolute; bottom: 16px; left: 16px; right: 16px; }
  .map-info-name { font-size: 14px; font-weight: 700; color: #fff; }
  .map-info-addr { font-size: 12px; color: rgba(255,255,255,0.75); margin-top: 2px; }
  .location-detail { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 28px; display: flex; flex-direction: column; gap: 16px; }
  .location-info-row { display: flex; gap: 14px; align-items: flex-start; }
  .location-info-icon { width: 36px; height: 36px; border-radius: 10px; background: var(--surface2); display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .location-info-icon i { font-size: 18px; color: var(--primary); }
  .location-info-label { font-size: 12px; color: var(--text-sub); margin-bottom: 2px; }
  .location-info-val { font-size: 14px; font-weight: 700; color: var(--primary); }
  .gallery-masonry { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 32px; }
  .gallery-item { border-radius: 10px; overflow: hidden; cursor: pointer; transition: transform 0.2s, box-shadow 0.2s; position: relative; }
  .gallery-item:hover { transform: scale(1.03); box-shadow: var(--shadow-m); }
  .gallery-item.tall { grid-row: span 2; }
  .gallery-img { width: 100%; height: 100%; min-height: 100px; object-fit: cover; display: flex; align-items: center; justify-content: center; }
  .gallery-overlay { position: absolute; inset: 0; background: linear-gradient(0deg, rgba(92,52,16,0.8) 0%, transparent 60%); opacity: 0; transition: opacity 0.2s; display: flex; align-items: flex-end; padding: 12px; }
  .gallery-item:hover .gallery-overlay { opacity: 1; }
  .gallery-overlay-text { font-size: 12px; font-weight: 700; color: #fff; }

  /* ── Drawer ── */
  .drawer-overlay { position: fixed; inset: 0; background: rgba(28,18,8,0.5); z-index: 500; display: flex; justify-content: flex-end; }
  .drawer { width: 440px; max-width: 90vw; background: var(--surface); height: 100vh; overflow-y: auto; padding: 32px 28px; animation: drawerIn 0.3s ease; }
  .drawer-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 28px; }
  .drawer-title { font-size: 20px; font-weight: 800; color: var(--primary); }
  .drawer-close { background: none; border: none; cursor: pointer; padding: 4px; }
  .drawer-close i { font-size: 22px; color: var(--text-sub); }
  .drawer-section-title { font-size: 12px; font-weight: 700; color: var(--text-sub); letter-spacing: 1px; text-transform: uppercase; margin-bottom: 10px; margin-top: 24px; }
  .drawer-badge { display: inline-flex; align-items: center; gap: 6px; padding: 6px 12px; border-radius: 8px; font-size: 13px; font-weight: 700; margin-bottom: 16px; }
  .drawer-action-row { display: flex; gap: 10px; margin-top: 28px; }
  .drawer-primary-btn { flex: 1; background: var(--primary); color: #fff; font-size: 14px; font-weight: 700; padding: 12px; border-radius: 10px; border: none; cursor: pointer; transition: background 0.2s; }
  .drawer-primary-btn:hover { background: var(--primary-d); }
  .drawer-outline-btn { flex: 1; background: transparent; color: var(--primary); font-size: 14px; font-weight: 700; padding: 12px; border-radius: 10px; border: 1.5px solid var(--border); cursor: pointer; }

  /* ── 모달 ── */
  .modal-overlay { position: fixed; inset: 0; background: rgba(28,18,8,0.5); z-index: 600; display: flex; align-items: center; justify-content: center; padding: 24px; }
  .modal-box { background: var(--surface); border-radius: 20px; padding: 36px; max-width: 520px; width: 100%; animation: modalIn 0.25s ease; max-height: 90vh; overflow-y: auto; }
  .modal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px; }
  .modal-title { font-size: 20px; font-weight: 800; color: var(--primary); }
  .modal-close { background: none; border: none; cursor: pointer; }
  .modal-close i { font-size: 20px; color: #9CA3AF; }
  .form-row { margin-bottom: 14px; }
  .form-label { font-size: 12px; font-weight: 700; color: var(--primary); margin-bottom: 5px; display: block; letter-spacing: 0.3px; }
  .form-input { width: 100%; padding: 10px 13px; border-radius: 9px; border: 1.5px solid var(--border); font-size: 14px; font-family: 'Pretendard', sans-serif; outline: none; background: var(--bg); color: var(--text); transition: border-color 0.2s, box-shadow 0.2s; }
  .form-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(245,158,11,0.12); }
  textarea.form-input { min-height: 80px; resize: vertical; }
  select.form-input { appearance: none; cursor: pointer; }
  .form-grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .modal-submit { width: 100%; background: var(--primary); color: #fff; font-size: 15px; font-weight: 700; padding: 13px; border-radius: 10px; border: none; cursor: pointer; margin-top: 8px; transition: background 0.2s; }
  .modal-submit:hover { background: var(--primary-d); }

  /* ── 토스트 ── */
  .toast { position: fixed; bottom: 28px; right: 28px; z-index: 9999; background: var(--primary); color: #fff; padding: 12px 20px; border-radius: 10px; font-size: 14px; font-weight: 600; display: flex; align-items: center; gap: 10px; box-shadow: 0 6px 28px rgba(124,75,28,0.3); animation: toastSlide 0.3s ease; max-width: 300px; }
  .toast-icon { width: 22px; height: 22px; background: var(--accent); border-radius: 50%; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .toast-icon i { font-size: 12px; color: #fff; }

  /* ── 반응형 ── */
  @media (max-width: 1024px) {
    .hero-cards { grid-template-columns: repeat(3, 1fr); }
    .hero-banner { flex-direction: column; gap: 32px; }
    .ir-top { grid-template-columns: 1fr; }
    .location-grid { grid-template-columns: 1fr; }
  }
  @media (max-width: 768px) {
    .section { padding: 32px 20px; }
    .topnav { padding: 0 16px; }
    .biz-grid { grid-template-columns: 1fr; }
    .welfare-grid { grid-template-columns: repeat(2, 1fr); }
    .press-grid { grid-template-columns: 1fr; }
    .gallery-masonry { grid-template-columns: repeat(2, 1fr); }
    .hero-banner { padding: 40px 24px 32px; }
    .hero-cards { grid-template-columns: 1fr; }
    .tn-tab { padding: 0 12px; font-size: 12px; }

function Toast({ msg, onDone }) {
  useEffect(() => { const t = setTimeout(onDone, 3800); return () => clearTimeout(t); }, []);

    <div className="toast">
      <div className="toast-icon"><i className="ph-bold ph-check" /></div>

    </div>
  );
}

function IRChart() {
  const ref = useRef(null);
  const chartRef = useRef(null);
  useEffect(() => {
    if (chartRef.current) chartRef.current.destroy();
    const ctx = ref.current.getContext('2d');
    chartRef.current = new Chart(ctx, {
      type: 'bar',
      data: {
        labels: irData.labels,
        datasets: [
          { label: '매출액 (억원)', data: irData.revenue, backgroundColor: 'rgba(124,75,28,0.82)', borderRadius: 6, borderSkipped: false },
          { label: '영업이익 (억원)', data: irData.profit, backgroundColor: 'rgba(245,158,11,0.82)', borderRadius: 6, borderSkipped: false },
        ]
      },
      options: {
        responsive: true, maintainAspectRatio: false, animation: { duration: 900 },
        plugins: { legend: { labels: { font: { family: 'Pretendard', size: 12 }, color: '#6B5038' } } },
        scales: {
          x: { grid: { display: false }, ticks: { font: { family: 'Pretendard', size: 12 }, color: '#6B5038' } },
          y: { grid: { color: '#F0E8D8' }, ticks: { font: { family: 'Pretendard', size: 11 }, color: '#6B5038' } }
        }
      }
    });
    return () => { if (chartRef.current) chartRef.current.destroy(); };
  }, []);
  return <div className="chart-wrap"><canvas ref={ref} /></div>;
}

        <div>
          <div style={{ display: 'flex', gap: '8px', marginBottom: '20px', flexWrap: 'wrap' }}>
            <span className={'drawer-badge ' + (j.open ? 'open' : 'closed')} style={{ background: j.open ? '#EDF7EE' : '#F3F4F6', color: j.open ? '#1E7E34' : '#9CA3AF', padding: '5px 12px', borderRadius: '8px', fontSize: '13px', fontWeight: 700 }}>{j.open ? '모집중' : '마감'}</span>
            <span style={{ background: '#FFF3D6', color: '#7C4B1C', padding: '5px 12px', borderRadius: '8px', fontSize: '13px', fontWeight: 700 }}>{j.dept}</span>
            <span style={{ background: '#F3F4F6', color: '#6B5038', padding: '5px 12px', borderRadius: '8px', fontSize: '13px', fontWeight: 600 }}>{j.type}</span>
          </div>
          <div className="drawer-section-title">채용 조건</div>
          <p style={{ fontSize: '14px', color: '#6B5038', marginBottom: '6px' }}>경력 요건: <strong style={{ color: '#1C1208' }}>{j.exp}</strong></p>
          <p style={{ fontSize: '14px', color: '#6B5038', marginBottom: '20px' }}>지원 마감: <strong style={{ color: '#1C1208' }}>{j.deadline}</strong></p>
          <div className="drawer-section-title">담당 업무</div>
          <p style={{ fontSize: '14px', color: '#6B5038', lineHeight: '1.8', marginBottom: '24px' }}>{j.desc}</p>
          <div className="drawer-action-row">
            <button className="drawer-primary-btn" onClick={() => { setDrawer(null); showToast('지원서 제출이 완료되었습니다.'); }} disabled={!j.open} style={{ opacity: j.open ? 1 : 0.5 }}>지원하기</button>
            <button className="drawer-outline-btn" onClick={() => setDrawer(null)}>닫기</button>
          </div>
        </div>
      )
    });
  }

  function handleAddJob() {
    setNewJob({ title: '', dept: '', type: '정규직', exp: '', deadline: '', desc: '' });
    setModal('addJob');
  }

  function submitJob(e) {
    e.preventDefault();
    if (!newJob.title || !newJob.dept) return;
    setJobs(prev => [...prev, { ...newJob, id: Date.now(), open: true }]);
    setModal(null);
    showToast('채용 공고가 등록되었습니다.');
  }

  function handlePressClick(p) {
    setDrawer({
      title: p.title,
      content: (
        <div>
          <div style={{ display: 'flex', gap: '8px', marginBottom: '20px' }}>
            <span style={{ background: '#FFF3D6', color: '#7C4B1C', padding: '5px 12px', borderRadius: '8px', fontSize: '12px', fontWeight: 700 }}>{p.tag}</span>
          </div>
          <div style={{ height: '140px', borderRadius: '12px', background: `linear-gradient(135deg, ${p.color}BB, ${p.color}44)`, display: 'flex', alignItems: 'center', justifyContent: 'center', marginBottom: '24px' }}>
            <i className="ph-bold ph-newspaper" style={{ fontSize: '48px', color: '#fff', opacity: 0.7 }} />
          </div>
          <div className="drawer-section-title">발행일</div>
          <p style={{ fontSize: '14px', color: '#6B5038', marginBottom: '20px' }}>{p.date}</p>
          <div className="drawer-section-title">내용 요약</div>
          <p style={{ fontSize: '14px', color: '#6B5038', lineHeight: '1.8', marginBottom: '24px' }}>본 기사는 바이오라이프 사이언스의 최신 소식을 담고 있습니다. 상세 내용은 언론사 원문 링크에서 확인하실 수 있습니다. IR 담당자에게 문의하시면 추가 자료를 제공합니다.</p>
          <div className="drawer-action-row">
            <button className="drawer-primary-btn" onClick={() => { setDrawer(null); showToast('원문 링크로 연결합니다.'); }}>원문 보기</button>
            <button className="drawer-outline-btn" onClick={() => setDrawer(null)}>닫기</button>
          </div>
        </div>
      )
    });
  }

  return (
    <div style={{ width: '100%' }}>
      {/* TOPNAV */}
      <nav className="topnav">
        <a className="tn-logo" href="#">
          <div className="tn-logo-icon">
            <i className="ph-bold ph-atom" style={{ fontSize: '16px', color: '#FCD34D' }} />
          </div>
          <span className="tn-logo-text">바이오라이프<span>사이언스</span></span>
        </a>
        <div className="tn-tabs">
          {tabs.map(t => (
            <button key={t} className={'tn-tab' + (tab === t ? ' active' : '')} onClick={() => setTab(t)}>{t}</button>
          ))}
        </div>
        <div className="tn-right">
          <button className="tn-btn" onClick={() => { setTab('CONTACT'); }}>문의하기</button>
        </div>
      </nav>

      {/* 레이아웃 */}
      <div className="layout">
        {/* 히어로 배너 — BUSINESS 탭에만 표시 */}
        {tab === 'BUSINESS' && (
          <div className="hero-banner">
            <div className="hero-bg-shape" style={{ width: 600, height: 600, top: -200, right: -100 }} />
            <div className="hero-bg-shape" style={{ width: 300, height: 300, bottom: -100, left: -50 }} />
            <div className="hero-text">
              <div className="hero-eyebrow">Connecting Science to Life's Value</div>
              <h2 className="hero-h">생명과학 기술로<br /><span>비즈니스 가치</span>를 창출합니다</h2>
              <p className="hero-p">동물 영양, 펫 케어, 건강식품 전 영역에서 과학적 근거 중심의 원료·솔루션·ODM/OEM 서비스를 제공합니다. 파트너사의 제품 경쟁력을 함께 설계합니다.</p>
              <div className="hero-stats">
                <div>
                  <div className="hero-stat-num">50<span className="hero-stat-unit">+</span></div>
                  <div className="hero-stat-label">B2B 파트너사</div>
                </div>
                <div>
                  <div className="hero-stat-num">47<span className="hero-stat-unit">건</span></div>
                  <div className="hero-stat-label">특허 등록</div>
                </div>
                <div>
                  <div className="hero-stat-num">4<span className="hero-stat-unit">개국</span></div>
                  <div className="hero-stat-label">수출 국가</div>
                </div>
              </div>
            </div>
            <div className="hero-cards">
              {[
                { icon: 'ph-leaf', t: 'Animal Nutrition', s: 'ODM·원료 공급' },
                { icon: 'ph-paw-print', t: 'Pet Care', s: 'ODM/OEM 제조' },
                { icon: 'ph-flower', t: 'Health & Food', s: '기능성 원료' },
              ].map(c => (
                <div key={c.t} className="hero-mini-card" onClick={() => setTab('BUSINESS')}>
                  <div className="hero-mini-icon"><i className={'ph-bold ' + c.icon} /></div>
                  <div className="hero-mini-title">{c.t}</div>
                  <div className="hero-mini-tag">{c.s}</div>
                </div>
              ))}
            </div>
          </div>
        )}

        {/* 탭 콘텐츠 */}
        <div className="section">
          {tab === 'BUSINESS' && (
            <div>
              <div className="sec-title-row">
                <div><div className="sec-tag">Business Area</div><div className="sec-title">사업 영역</div></div>
              </div>
              <BusinessView onCardClick={handleBizCard} />
            </div>
          )}
          {tab === 'CAREERS' && (
            <CareersView onJobClick={handleJobClick} onAddJob={handleAddJob} jobs={jobs} />
          )}
          {tab === 'PR·IR' && (
            <IRView onPressClick={handlePressClick} />
          )}
          {tab === 'CONTACT' && <ContactView />}
        </div>
      </div>

      {/* Drawer */}
      {drawer && (
        <div className="drawer-overlay" onClick={() => setDrawer(null)}>
          <div className="drawer" onClick={e => e.stopPropagation()}>
            <div className="drawer-header">
              <div className="drawer-title">{drawer.title}</div>
              <button className="drawer-close" onClick={() => setDrawer(null)}><i className="ph-bold ph-x" /></button>
            </div>
            {drawer.content}
          </div>
        </div>
      )}

      {/* 채용 공고 등록 모달 */}
      {modal === 'addJob' && (
        <div className="modal-overlay" onClick={() => setModal(null)}>
          <div className="modal-box" onClick={e => e.stopPropagation()}>
            <div className="modal-header">
              <div className="modal-title">채용 공고 등록</div>
              <button className="modal-close" onClick={() => setModal(null)}><i className="ph-bold ph-x" /></button>
            </div>
            <form onSubmit={submitJob}>
              <div className="form-row">
                <label className="form-label">공고 제목</label>
                <input className="form-input" value={newJob.title} onChange={e => setNewJob({ ...newJob, title: e.target.value })} placeholder="예) R&D 연구원 (동물 영양)" required />
              </div>
              <div className="form-grid2">
                <div className="form-row">
                  <label className="form-label">부서</label>
                  <input className="form-input" value={newJob.dept} onChange={e => setNewJob({ ...newJob, dept: e.target.value })} placeholder="R&D팀" required />
                </div>
                <div className="form-row">
                  <label className="form-label">고용 형태</label>
                  <select className="form-input" value={newJob.type} onChange={e => setNewJob({ ...newJob, type: e.target.value })}>
                    <option>정규직</option><option>계약직</option><option>인턴십</option>
                  </select>
                </div>
              </div>
              <div className="form-grid2">
                <div className="form-row">
                  <label className="form-label">경력 요건</label>
                  <input className="form-input" value={newJob.exp} onChange={e => setNewJob({ ...newJob, exp: e.target.value })} placeholder="경력 3년 이상" />
                </div>
                <div className="form-row">
                  <label className="form-label">마감일</label>
                  <input type="date" className="form-input" value={newJob.deadline} onChange={e => setNewJob({ ...newJob, deadline: e.target.value })} />
                </div>
              </div>
              <div className="form-row">
                <label className="form-label">담당 업무</label>
                <textarea className="form-input" value={newJob.desc} onChange={e => setNewJob({ ...newJob, desc: e.target.value })} placeholder="주요 담당 업무를 입력하세요." />
              </div>
              <button type="submit" className="modal-submit">공고 등록하기</button>
            </form>
          </div>
        </div>
      )}

      {/* 토스트 */}
      {toast && <Toast msg={toast} onDone={() => setToast(null)} />}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
