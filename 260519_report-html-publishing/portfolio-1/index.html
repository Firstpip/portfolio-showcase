<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" rel="stylesheet" />
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body, #root { width: 100%; min-height: 100vh; }
    body { font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, sans-serif; background: #F4F6FA; color: #1A2333; }

    @keyframes fadeIn        { from { opacity: 0; }                          to { opacity: 1; } }
    @keyframes fadeOut       { from { opacity: 1; }                          to { opacity: 0; } }
    @keyframes slideDown     { from { opacity: 0; transform: translateY(-14px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes slideUp       { from { opacity: 0; transform: translateY(14px); }  to { opacity: 1; transform: translateY(0); } }
    @keyframes slideInRight  { from { opacity: 0; transform: translateX(20px); }  to { opacity: 1; transform: translateX(0); } }
    @keyframes slideInLeft   { from { opacity: 0; transform: translateX(-20px); } to { opacity: 1; transform: translateX(0); } }
    @keyframes staggerIn     { from { opacity: 0; transform: translateY(10px); }  to { opacity: 1; transform: translateY(0); } }
    @keyframes pulse         { 0%, 100% { opacity: 1; } 50% { opacity: 0.45; } }
    @keyframes progressFill  { from { width: 0; } to { width: var(--w, 100%); } }
    @keyframes popIn         { from { opacity: 0; transform: scale(0.9); }   to { opacity: 1; transform: scale(1); } }
    @keyframes shimmer       { 0% { background-position: -400px 0; } 100% { background-position: 400px 0; } }
    @keyframes toastSlide    { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes spin          { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

/* ── Lucide icon wrapper ── */
const Icon = ({ name, size = 16, color, style = {} }) => {
  const ref = useRef(null);
  useEffect(() => {
    if (!ref.current || !window.lucide) return;
    ref.current.innerHTML = '';
    const el = document.createElement('i');
    el.setAttribute('data-lucide', name);
    Object.assign(el.style, { width: size + 'px', height: size + 'px', display: 'block', ...(color ? { color } : {}) });
    ref.current.appendChild(el);
    lucide.createIcons({ nodes: [el] });
  }, [name, size, color]);
  return <span ref={ref} style={{ display: 'inline-flex', alignItems: 'center', flexShrink: 0, ...style }} />;
};

/* ── Toast ── */
const Toast = ({ msg }) => (
  <div style={{
    position: 'fixed', bottom: 28, right: 28, zIndex: 9999, display: 'flex', alignItems: 'center', gap: 10,
    background: '#1A2333', color: '#fff', padding: '12px 20px', borderRadius: 6, fontSize: 13, fontWeight: 500,
    boxShadow: '0 6px 24px rgba(0,0,0,0.22)', animation: 'toastSlide .25s ease',
  }}>
    <Icon name="check-circle-2" size={15} color="#4ADE80" />
    {msg}
  </div>
);

/* ── Badge ── */
const Badge = ({ text, color = '#4E6080', bg = '#F0F4FA' }) => (
  <span style={{ fontSize: 11, fontWeight: 600, color, background: bg, padding: '2px 8px', borderRadius: 20, whiteSpace: 'nowrap' }}>{text}</span>
);

/* ── Data ── */

    { id: '2-4', title: '2.4 국가별 비교 분석' },

    { id: '3-3', title: '3.3 온라인 침해 사례' },
    { id: '3-4', title: '3.4 분쟁 해결 절차' },
  ]},

  { chapter: '제4장 영업비밀 및 저작권', pages: 95,  done: 78, errors: 12, status: '처리중' },
  { chapter: '부록 I 국가별 법령 비교',  pages: 80,  done: 62, errors: 18, status: '처리중' },

  { id: 'ERR-003', chapter: '제4장', page: 12, type: '표 구조 이상', desc: '다단 헤더 행 경계 모호 — 재검토 필요' },
  { id: 'ERR-004', chapter: '부록 I', page: 8, type: '인코딩 오류',  desc: 'UTF-8 변환 실패 특수문자 — 원본 확인 필요' },

const STATUS_STYLE = {

  '검수필요': { color: '#D97706', bg: '#FFFBEB' },

/* ── Report Viewer ── */

  const toggle = (id) => setExpanded(p => p.includes(id) ? p.filter(x => x !== id) : [...p, id]);

                border: 'none', borderLeft: active === s.id ? '3px solid #1B3A6B' : '3px solid transparent',

              }} onMouseOver={e => { if (active !== s.id) e.currentTarget.style.background = '#F8FAFC'; }}

            ))}

        ))}
        <div style={{ borderTop: '1px solid #E4E9F0', marginTop: 8, padding: '12px 14px' }}>
          <div style={{ fontSize: 10, fontWeight: 700, color: '#9CA3AF', letterSpacing: '0.1em', textTransform: 'uppercase', marginBottom: 6 }}>부록</div>

          '최근 디지털 전환 가속화와 함께 인공지능 생성 콘텐츠, 메타버스 환경에서의 지식재산 보호 등 새로운 유형의 지식재산 이슈가 부각되고 있다. 이에 따라 각국의 지식재산 법제도 변화하고 있으며, 국제적인 조화를 위한 논의가 지속되고 있다.',
        ].map((p, i) => <p key={i} style={{ fontSize: 14.5, lineHeight: 1.9, color: '#2A3A50', marginBottom: 18 }}>{p}</p>)}

/* ── Pipeline View ── */
const PipelineView = () => {
  const [toast, setToast] = useState(null);
  const fireToast = (m) => { setToast(m); setTimeout(() => setToast(null), 2500); };

  const total = PIPELINE_ROWS.reduce((s, r) => s + r.pages, 0);
  const done  = PIPELINE_ROWS.reduce((s, r) => s + r.done, 0);
  const errs  = PIPELINE_ROWS.reduce((s, r) => s + r.errors, 0);

  return (
    <div style={{ padding: '32px 40px', animation: 'slideInRight .3s ease' }}>
      {toast && <Toast msg={toast} />}
      {/* KPI */}
      <div style={{ display: 'grid', gridTemplateColumns: 'repeat(4,1fr)', gap: 14, marginBottom: 24 }}>
        {[
          { label: '전체 페이지', val: total+'p', icon: 'file-text', sub: '본편+부록' },
          { label: '변환 완료',   val: done+'p',  icon: 'check-circle-2', sub: Math.round(done/total*100)+'% 완료' },
          { label: '처리 오류',   val: errs+'건', icon: 'alert-triangle', sub: '수동 검수 필요' },
          { label: '챕터 수',     val: PIPELINE_ROWS.length+'개', icon: 'layers', sub: '본편4+부록2' },
        ].map((s, i) => (
          <div key={i} style={{ background: '#fff', border: '1px solid #E4E9F0', borderRadius: 6, padding: '18px 20px', boxShadow: '0 1px 4px rgba(27,58,107,0.06)', animation: `staggerIn .3s ease ${i*.06}s both` }}>
            <div style={{ display: 'flex', alignItems: 'center', gap: 7, marginBottom: 10 }}>
              <Icon name={s.icon} size={15} color="#2E5FAB" />
              <span style={{ fontSize: 11, color: '#4E6080', fontWeight: 500 }}>{s.label}</span>
            </div>
            <div style={{ fontSize: 26, fontWeight: 700, color: '#1A2333', marginBottom: 4 }}>{s.val}</div>
            <div style={{ fontSize: 11, color: '#9CA3AF' }}>{s.sub}</div>
          </div>
        ))}
      </div>

      {/* Progress */}
      <div style={{ background: '#fff', border: '1px solid #E4E9F0', borderRadius: 6, padding: '18px 24px', marginBottom: 20 }}>
        <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: 8 }}>
          <span style={{ fontSize: 13, fontWeight: 600 }}>전체 변환 진행률</span>
          <span style={{ fontSize: 13, fontWeight: 700, color: '#1B3A6B' }}>{Math.round(done/total*100)}%</span>
        </div>
        <div style={{ height: 8, background: '#E4E9F0', borderRadius: 4, overflow: 'hidden' }}>
          <div style={{ height: '100%', width: Math.round(done/total*100)+'%', background: 'linear-gradient(90deg, #1B3A6B, #2E5FAB)', borderRadius: 4, animation: 'progressFill .9s ease' }} />
        </div>
      </div>

      {/* Chapter table */}
      <div style={{ background: '#fff', border: '1px solid #E4E9F0', borderRadius: 6, overflow: 'hidden', marginBottom: 20 }}>
        <div style={{ padding: '14px 20px', borderBottom: '1px solid #E4E9F0', display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
          <span style={{ fontSize: 14, fontWeight: 600 }}>챕터별 변환 현황</span>
          <button onClick={() => fireToast('오류 항목 재처리 작업이 큐에 등록되었습니다')} style={{
            display: 'flex', alignItems: 'center', gap: 6, padding: '6px 14px',
            background: '#1B3A6B', color: '#fff', border: 'none', borderRadius: 6, fontSize: 12, fontWeight: 600, cursor: 'pointer',

            <Icon name="refresh-cw" size={13} /> 오류 항목 재처리

        </div>

            <tr style={{ background: '#F8FAFC', borderBottom: '1px solid #E4E9F0' }}>

      {options.map(({v,l}) => (
        <button key={v} onClick={() => onChange(v)} style={{
          padding: '6px 14px', border: `1px solid ${value===v?'#1B3A6B':'#D4DCE8'}`,
          background: value===v?'#EEF3FB':'#fff', color: value===v?'#1B3A6B':'#4E6080',
          borderRadius: 6, fontSize: 12, fontWeight: value===v?600:400, cursor: 'pointer', transition: 'all .15s',
        }}>{l}</button>
      ))}
    </div>
  );

  return (
    <div style={{ padding: '32px 40px', animation: 'slideInRight .3s ease', maxWidth: 660 }}>
      {toast && <Toast msg={toast} />}
      <h2 style={{ fontSize: 18, fontWeight: 700, marginBottom: 24 }}>뷰어 설정</h2>
      {[
        {
          label: '본문 글자 크기', sub: '보고서 본문 텍스트의 기본 크기를 설정합니다',
          content: <OptionGroup options={[{v:'small',l:'작게'},{v:'medium',l:'보통'},{v:'large',l:'크게'}]} value={cfg.fontSize} onChange={v => setCfg(c => ({...c, fontSize: v}))} />,
        },
        {
          label: '목차 너비', sub: '좌측 목차 패널의 기본 너비를 설정합니다',
          content: <OptionGroup options={[{v:'narrow',l:'좁게(220px)'},{v:'normal',l:'기본(272px)'},{v:'wide',l:'넓게(340px)'}]} value={cfg.tocWidth} onChange={v => setCfg(c => ({...c, tocWidth: v}))} />,
        },
        {
          label: '인쇄 시 헤더 포함', sub: '인쇄 및 PDF 내보내기 시 보고서 헤더를 포함합니다',
          content: <Toggle on={cfg.printHeader} onToggle={() => setCfg(c => ({...c, printHeader: !c.printHeader}))} />,
        },
        {
          label: '검색어 하이라이팅', sub: '검색 결과에서 검색어를 배경색으로 강조합니다',
          content: <Toggle on={cfg.highlight} onToggle={() => setCfg(c => ({...c, highlight: !c.highlight}))} />,
        },
      ].map((item, i) => (
        <div key={i} style={{ background: '#fff', border: '1px solid #E4E9F0', borderRadius: 6, padding: '18px 22px', marginBottom: 10, display: 'flex', justifyContent: 'space-between', alignItems: 'center', gap: 20, animation: `staggerIn .3s ease ${i*.07}s both` }}>
          <div>
            <div style={{ fontSize: 14, fontWeight: 600, marginBottom: 3 }}>{item.label}</div>
            <div style={{ fontSize: 12, color: '#4E6080' }}>{item.sub}</div>
          </div>
          {item.content}
        </div>
      ))}
      <button onClick={() => fireToast('설정이 저장되었습니다')} style={{
        marginTop: 8, padding: '10px 26px', background: '#1B3A6B', color: '#fff', border: 'none',
        borderRadius: 7, fontSize: 14, fontWeight: 600, cursor: 'pointer', transition: 'opacity .15s',
      }} onMouseOver={e => e.currentTarget.style.opacity='.85'} onMouseOut={e => e.currentTarget.style.opacity='1'}>
        설정 저장
      </button>
    </div>
  );
};

/* ── App ── */
function App() {
  const [tab, setTab] = useState('viewer');

  const TABS = [
    { k: 'viewer',     l: '보고서 뷰어', icon: 'book-open' },
    { k: 'pipeline',   l: '파싱 현황',   icon: 'cpu' },
    { k: 'table',      l: '표 최적화',   icon: 'table-2' },
    { k: 'responsive', l: '반응형',       icon: 'monitor-smartphone' },
    { k: 'settings',   l: '설정',         icon: 'settings-2' },
  ];

  return (
    <div style={{ width: '100%', minHeight: '100vh', display: 'flex', flexDirection: 'column' }}>
      {/* Header */}
      <header style={{ background: '#1B3A6B', position: 'sticky', top: 0, zIndex: 100, boxShadow: '0 2px 12px rgba(27,58,107,.28)' }}>
        <div style={{ display: 'flex', alignItems: 'center', padding: '0 28px', height: 56 }}>
          <div style={{ display: 'flex', alignItems: 'center', gap: 9, marginRight: 28, flexShrink: 0 }}>
            <Icon name="book-open" size={19} color="#C8922A" />
            <span style={{ color: '#fff', fontSize: 14, fontWeight: 700, letterSpacing: '-.02em' }}>공공보고서 웹 퍼블리싱 시스템</span>
            <span style={{ background: '#C8922A', color: '#fff', fontSize: 9, fontWeight: 700, padding: '2px 6px', borderRadius: 3 }}>DEMO</span>
          </div>
          <nav style={{ display: 'flex', flex: 1, gap: 0 }}>
            {TABS.map(t => (
              <button key={t.k} onClick={() => setTab(t.k)} style={{
                display: 'flex', alignItems: 'center', gap: 6, padding: '0 14px', height: 56,
                background: tab===t.k?'rgba(255,255,255,.12)':'none', border: 'none', cursor: 'pointer',
                fontSize: 13, fontWeight: tab===t.k?600:400, color: tab===t.k?'#fff':'rgba(255,255,255,.65)',
                borderBottom: tab===t.k?'2px solid #C8922A':'2px solid transparent', transition: 'all .15s',
              }}
              onMouseOver={e => { if (tab!==t.k) { e.currentTarget.style.color='#fff'; e.currentTarget.style.background='rgba(255,255,255,.07)'; }}}
              onMouseOut={e => { if (tab!==t.k) { e.currentTarget.style.color='rgba(255,255,255,.65)'; e.currentTarget.style.background='none'; }}}>
                <Icon name={t.icon} size={14} /> {t.l}
              </button>
            ))}
          </nav>
          <div style={{ display: 'flex', gap: 10, alignItems: 'center', flexShrink: 0 }}>
            <span style={{ fontSize: 11, color: 'rgba(255,255,255,.55)' }}>지식재산 보호 가이드북</span>
            <div style={{ width: 1, height: 18, background: 'rgba(255,255,255,.2)' }} />
            <span style={{ fontSize: 11, color: 'rgba(255,255,255,.55)' }}>v1.0</span>
          </div>
        </div>
      </header>

      {/* Hero (viewer only) */}
      {tab === 'viewer' && (
        <div style={{ background: 'linear-gradient(135deg, #1B3A6B 0%, #2E5FAB 100%)', padding: '24px 36px', animation: 'slideDown .4s ease' }}>
          <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
            <div>
              <div style={{ fontSize: 10, color: 'rgba(255,255,255,.6)', marginBottom: 5, letterSpacing: '.06em' }}>지식재산보호 종합포털 | 국가별 가이드북</div>
              <h2 style={{ fontSize: 20, fontWeight: 700, color: '#fff', marginBottom: 5 }}>지식재산 보호 종합 가이드북 2024</h2>
              <div style={{ display: 'flex', gap: 16, fontSize: 12, color: 'rgba(255,255,255,.7)' }}>
                <span>총 540페이지 | 본편 380p + 부록 160p</span>
                <span>4장 16챕터</span>
                <span>최종 수정: 2024.08.14</span>
              </div>
            </div>
            <div style={{ display: 'flex', gap: 8 }}>
              <button style={{ display: 'flex', alignItems: 'center', gap: 6, padding: '8px 16px', background: 'rgba(255,255,255,.15)', color: '#fff', border: '1px solid rgba(255,255,255,.3)', borderRadius: 7, fontSize: 12, fontWeight: 500, cursor: 'pointer', transition: 'background .15s' }}
                onMouseOver={e => e.currentTarget.style.background='rgba(255,255,255,.22)'} onMouseOut={e => e.currentTarget.style.background='rgba(255,255,255,.15)'}>
                <Icon name="download" size={13} /> 전체 PDF
              </button>
              <button style={{ display: 'flex', alignItems: 'center', gap: 6, padding: '8px 16px', background: '#C8922A', color: '#fff', border: 'none', borderRadius: 7, fontSize: 12, fontWeight: 600, cursor: 'pointer', transition: 'opacity .15s' }}
                onMouseOver={e => e.currentTarget.style.opacity='.85'} onMouseOut={e => e.currentTarget.style.opacity='1'}>
                <Icon name="search" size={13} /> 본문 검색
              </button>
            </div>
          </div>
        </div>
      )}

      {/* Content */}
      <main style={{ flex: 1 }}>
        {tab === 'viewer'     && <ReportViewer />}
        {tab === 'pipeline'   && <PipelineView />}
        {tab === 'table'      && <TableView />}
        {tab === 'responsive' && <ResponsiveView />}
        {tab === 'settings'   && <SettingsView />}
      </main>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
