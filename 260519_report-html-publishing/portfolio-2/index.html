    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    @keyframes fadeIn       { from { opacity: 0; }                           to { opacity: 1; } }
    @keyframes fadeOut      { from { opacity: 1; }                           to { opacity: 0; } }
    @keyframes slideUp      { from { opacity: 0; transform: translateY(16px); }  to { opacity: 1; transform: translateY(0); } }
    @keyframes slideDown    { from { opacity: 0; transform: translateY(-14px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes slideInRight { from { opacity: 0; transform: translateX(20px); }  to { opacity: 1; transform: translateX(0); } }

    @keyframes staggerIn    { from { opacity: 0; transform: translateY(12px); }  to { opacity: 1; transform: translateY(0); } }

    @keyframes toastSlide   { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes shimmer      { 0% { background-position: -400px 0; } 100% { background-position: 400px 0; } }
    @keyframes scaleUp      { from { opacity: 0; transform: scale(0.93); }   to { opacity: 1; transform: scale(1); } }

/* ── Helper ── */
const highlight = (text, q) => {
  if (!q || q.trim() === '') return text;
  const parts = text.split(new RegExp(`(${q})`, 'gi'));
  return parts.map((p, i) => p.toLowerCase() === q.toLowerCase()
    ? <mark key={i} style={{ background: '#F0A500', color: '#0F1E17', borderRadius: 2, padding: '0 2px' }}>{p}</mark>
    : p
  );
};

/* ── Search View ── */
const SearchView = () => {
  const [query, setQuery] = useState('특허');
  const [filter, setFilter] = useState('전체');
  const [toast, setToast] = useState(null);
  const fireToast = (m) => { setToast(m); setTimeout(() => setToast(null), 2500); };

  return (
    <div style={{ maxWidth: 860, margin: '0 auto', padding: '36px 24px', animation: 'slideUp .35s ease' }}>
      {toast && <Toast msg={toast} />}
      {/* Search input */}
      <div style={{ position: 'relative', marginBottom: 24 }}>
        <i className="ph ph-magnifying-glass" style={{ position: 'absolute', left: 16, top: '50%', transform: 'translateY(-50%)', fontSize: 20, color: '#7BAF93' }} />

          onChange={e => setQuery(e.target.value)}
          placeholder="보고서 전체 본문 검색..."

            border: '1.5px solid rgba(46,139,103,.3)', borderRadius: 10, fontSize: 15,

          onFocus={e => e.target.style.borderColor='#2E8B67'}

        />

          <button onClick={() => setQuery('')} style={{ position: 'absolute', right: 14, top: '50%', transform: 'translateY(-50%)', background: 'none', border: 'none', cursor: 'pointer', color: '#7BAF93' }}>

      </div>

            background: filter===ch?'#1F5C45':'transparent', color: filter===ch?'#E8F5EE':'#7BAF93',
            fontSize: 12, fontWeight: filter===ch?600:400, cursor: 'pointer', transition: 'all .2s',
          }}>{ch}</button>
        ))}
        <span style={{ marginLeft: 'auto', fontSize: 12, color: '#4A7A5E', alignSelf: 'center' }}>검색 결과 {SEARCH_RESULTS.length}건</span>
      </div>

      {/* Results */}
      <div style={{ display: 'flex', flexDirection: 'column', gap: 14 }}>
        {SEARCH_RESULTS.map((r, i) => (
          <div key={i} style={{
            background: '#1A2E22', border: '1px solid rgba(255,255,255,.08)', borderRadius: 12,
            padding: '20px 22px', cursor: 'pointer', transition: 'all .2s',
            animation: `staggerIn .35s ease ${i*.08}s both`,

          onMouseOver={e => { e.currentTarget.style.borderColor='rgba(46,139,103,.4)'; e.currentTarget.style.transform='translateY(-2px) scale(1.02)'; e.currentTarget.style.boxShadow='0 6px 24px rgba(0,0,0,.35)'; }}
          onMouseOut={e => { e.currentTarget.style.borderColor='rgba(255,255,255,.08)'; e.currentTarget.style.transform=''; e.currentTarget.style.boxShadow='none'; }}>
            <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', marginBottom: 8 }}>

                <h3 style={{ fontSize: 15, fontWeight: 600, color: '#E8F5EE', marginTop: 2 }}>{r.sec}</h3>
              </div>
              <span style={{ fontSize: 11, background: 'rgba(46,139,103,.2)', color: '#2E8B67', padding: '3px 8px', borderRadius: 12, fontWeight: 600, whiteSpace: 'nowrap' }}>

/* ── Export View ── */
const ExportView = () => {
  const [selected, setSelected] = useState([1, 2, 3]);
  const [format, setFormat] = useState('pdf');
  const [loading, setLoading] = useState(false);
  const [done, setDone] = useState(false);
  const [toast, setToast] = useState(null);
  const fireToast = (m) => { setToast(m); setTimeout(() => setToast(null), 2500); };

  const toggle = (id) => setSelected(p => p.includes(id) ? p.filter(x => x !== id) : [...p, id]);
  const totalPages = CHAPTERS.filter(c => selected.includes(c.id)).reduce((s, c) => s + c.pages, 0);

  const handleExport = () => {
    setLoading(true); setDone(false);
    setTimeout(() => { setLoading(false); setDone(true); fireToast(`PDF 파일이 생성되었습니다 (${totalPages}p)`); }, 2200);
  };

  return (
    <div style={{ maxWidth: 820, margin: '0 auto', padding: '36px 24px', animation: 'slideUp .35s ease' }}>
      {toast && <Toast msg={toast} />}
      <div style={{ marginBottom: 24 }}>
        <h2 style={{ fontSize: 20, fontWeight: 700, marginBottom: 6 }}>챕터 인쇄 · PDF 내보내기</h2>
        <p style={{ fontSize: 13, color: '#7BAF93' }}>내보낼 챕터를 선택하고 형식을 지정하면 서버에서 PDF를 생성합니다.</p>
      </div>

      <div style={{ display: 'grid', gridTemplateColumns: '1fr 320px', gap: 20 }}>
        {/* Chapter list */}
        <div style={{ background: '#1A2E22', border: '1px solid rgba(255,255,255,.08)', borderRadius: 12, overflow: 'hidden' }}>
          <div style={{ padding: '14px 18px', borderBottom: '1px solid rgba(255,255,255,.06)', display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
            <span style={{ fontSize: 13, fontWeight: 600 }}>챕터 선택</span>
            <div style={{ display: 'flex', gap: 8 }}>
              <button onClick={() => setSelected(CHAPTERS.map(c=>c.id))} style={{ fontSize: 11, color: '#2E8B67', background: 'none', border: 'none', cursor: 'pointer', fontWeight: 600 }}>전체 선택</button>
              <button onClick={() => setSelected([])} style={{ fontSize: 11, color: '#7BAF93', background: 'none', border: 'none', cursor: 'pointer' }}>전체 해제</button>
            </div>
          </div>
          {CHAPTERS.map((ch, i) => (
            <div key={ch.id} onClick={() => toggle(ch.id)} style={{
              padding: '14px 18px', borderBottom: i < CHAPTERS.length-1 ? '1px solid rgba(255,255,255,.05)' : 'none',
              display: 'flex', alignItems: 'center', gap: 12, cursor: 'pointer', transition: 'background .15s',
            }}
            onMouseOver={e => e.currentTarget.style.background='rgba(255,255,255,.03)'}
            onMouseOut={e => e.currentTarget.style.background='none'}>
              <div style={{
                width: 18, height: 18, borderRadius: 5, border: `2px solid ${selected.includes(ch.id)?'#2E8B67':'rgba(255,255,255,.2)'}`,
                background: selected.includes(ch.id)?'#2E8B67':'transparent', display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0, transition: 'all .15s',
              }}>
                {selected.includes(ch.id) && <i className="ph ph-check" style={{ fontSize: 11, color: '#fff', fontWeight: 700 }} />}
              </div>
              <div style={{ flex: 1 }}>
                <div style={{ fontSize: 13, fontWeight: 500, color: selected.includes(ch.id)?'#E8F5EE':'#7BAF93', transition: 'color .15s' }}>{ch.title}</div>
                <div style={{ fontSize: 11, color: '#4A7A5E', marginTop: 2 }}>{ch.pages}페이지</div>
              </div>
            </div>
          ))}
        </div>

        {/* Options panel */}
        <div style={{ display: 'flex', flexDirection: 'column', gap: 14 }}>
          <div style={{ background: '#1A2E22', border: '1px solid rgba(255,255,255,.08)', borderRadius: 12, padding: '18px' }}>
            <div style={{ fontSize: 13, fontWeight: 600, marginBottom: 14 }}>내보내기 형식</div>
            {[
              { v: 'pdf', l: 'PDF 문서', sub: 'Puppeteer 서버사이드 렌더링', icon: 'file-pdf' },
              { v: 'html', l: 'HTML 소스', sub: '웹 표준 단일 파일', icon: 'code' },
            ].map(fmt => (
              <div key={fmt.v} onClick={() => setFormat(fmt.v)} style={{
                display: 'flex', gap: 10, padding: '12px 14px', borderRadius: 10, cursor: 'pointer',
                background: format===fmt.v?'rgba(46,139,103,.15)':'transparent',
                border: `1px solid ${format===fmt.v?'rgba(46,139,103,.4)':'rgba(255,255,255,.07)'}`,
                marginBottom: 8, transition: 'all .2s',
              }}>
                <i className={`ph ph-${fmt.icon}`} style={{ fontSize: 18, color: format===fmt.v?'#2E8B67':'#7BAF93', marginTop: 1 }} />

          <div style={{ background: '#1A2E22', border: '1px solid rgba(255,255,255,.08)', borderRadius: 12, padding: '18px' }}>
            <div style={{ fontSize: 12, color: '#7BAF93', marginBottom: 6 }}>선택 요약</div>
            <div style={{ fontSize: 24, fontWeight: 700, color: '#E8F5EE', marginBottom: 4 }}>{selected.length}개 챕터</div>
            <div style={{ fontSize: 13, color: '#4A7A5E' }}>총 {totalPages}페이지</div>

          <button onClick={handleExport} disabled={selected.length === 0 || loading} style={{
            padding: '13px 0', background: loading?'#1F5C45':'linear-gradient(135deg, #1F5C45, #2E8B67)',
            border: 'none', borderRadius: 10, color: '#E8F5EE', fontSize: 14, fontWeight: 700, cursor: selected.length===0?'not-allowed':'pointer',
            opacity: selected.length===0?0.5:1, display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 8,
            transition: 'opacity .2s', animation: !loading && !done ? 'glowPulse 2.5s infinite' : 'none',
          }}>
            {loading
              ? <><i className="ph ph-circle-notch" style={{ fontSize: 16, animation: 'spin 1s linear infinite' }} /> 생성 중...</>
              : done
              ? <><i className="ph ph-download-simple" style={{ fontSize: 16 }} /> 다운로드</>
              : <><i className="ph ph-file-arrow-down" style={{ fontSize: 16 }} /> 내보내기</>
            }
          </button>

          {done && (
            <div style={{ background: 'rgba(46,139,103,.12)', border: '1px solid rgba(46,139,103,.3)', borderRadius: 10, padding: '12px 14px', fontSize: 12, color: '#2E8B67', display: 'flex', gap: 8 }}>

/* ── CMS View ── */
const CmsView = () => {
  const [activeChapter, setActiveChapter] = useState('2-1');
  const [content, setContent] = useState(SAMPLE_HTML);
  const [saving, setSaving] = useState(false);
  const [toast, setToast] = useState(null);
  const fireToast = (m) => { setToast(m); setTimeout(() => setToast(null), 2500); };

  const handleSave = () => {
    setSaving(true);
    setTimeout(() => { setSaving(false); fireToast('변경 사항이 저장되고 검색 색인이 갱신되었습니다'); }, 1400);
  };

  const STATUS_STYLE = {
    '발행중': { color: '#16A34A', bg: 'rgba(22,163,74,.15)' },
    '편집중': { color: '#F0A500', bg: 'rgba(240,165,0,.15)' },
    '검토중': { color: '#3B82F6', bg: 'rgba(59,130,246,.15)' },
  };

  return (
    <div style={{ height: 'calc(100vh - 64px)', display: 'flex', animation: 'slideUp .35s ease' }}>
      {toast && <Toast msg={toast} />}
      {/* Chapter list */}
      <aside style={{ width: 260, flexShrink: 0, background: '#0F1E17', borderRight: '1px solid rgba(255,255,255,.08)', overflowY: 'auto', display: 'flex', flexDirection: 'column' }}>
        <div style={{ padding: '16px', borderBottom: '1px solid rgba(255,255,255,.06)' }}>
          <div style={{ fontSize: 11, fontWeight: 700, color: '#4A7A5E', letterSpacing: '.1em', textTransform: 'uppercase', marginBottom: 10 }}>콘텐츠 관리</div>
          <button style={{ width: '100%', display: 'flex', alignItems: 'center', gap: 8, padding: '8px 12px', background: 'rgba(46,139,103,.15)', border: '1px solid rgba(46,139,103,.3)', borderRadius: 7, color: '#2E8B67', fontSize: 12, fontWeight: 600, cursor: 'pointer' }}>
            <i className="ph ph-plus" style={{ fontSize: 14 }} /> 새 챕터 추가
          </button>
        </div>
        <div style={{ flex: 1, padding: '8px 0' }}>
          {CMS_CHAPTERS.map((ch, i) => (
            <button key={ch.id} onClick={() => setActiveChapter(ch.id)} style={{
              width: '100%', padding: '12px 14px', background: activeChapter===ch.id?'rgba(31,92,69,.3)':'none',
              border: 'none', borderLeft: activeChapter===ch.id?'3px solid #2E8B67':'3px solid transparent',
              cursor: 'pointer', textAlign: 'left', transition: 'all .15s', animation: `staggerIn .3s ease ${i*.06}s both`,
            }}
            onMouseOver={e => { if (activeChapter!==ch.id) e.currentTarget.style.background='rgba(255,255,255,.04)'; }}
            onMouseOut={e => { if (activeChapter!==ch.id) e.currentTarget.style.background='none'; }}>
              <div style={{ fontSize: 12, color: activeChapter===ch.id?'#E8F5EE':'#7BAF93', fontWeight: activeChapter===ch.id?600:400, marginBottom: 4 }}>{ch.title}</div>
              <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
                <span style={{ fontSize: 10, fontWeight: 600, color: STATUS_STYLE[ch.status].color, background: STATUS_STYLE[ch.status].bg, padding: '2px 6px', borderRadius: 10 }}>{ch.status}</span>
                <span style={{ fontSize: 10, color: '#4A7A5E' }}>{ch.words.toLocaleString()}자</span>
              </div>
            </button>
          ))}
        </div>
        <div style={{ padding: '14px', borderTop: '1px solid rgba(255,255,255,.06)' }}>
          <div style={{ fontSize: 11, color: '#4A7A5E', display: 'flex', justifyContent: 'space-between' }}>
            <span>전체 {CMS_CHAPTERS.length}개 챕터</span>
            <span>{CMS_CHAPTERS.reduce((s,c) => s+c.words,0).toLocaleString()}자</span>

        </div>
      </aside>

      {/* Editor */}

              </button>
            ))}
          </div>
          <div style={{ width: 1, height: 20, background: 'rgba(255,255,255,.1)', margin: '0 4px' }} />
          <div style={{ display: 'flex', gap: 4, marginLeft: 'auto' }}>
            <button style={{ display: 'flex', alignItems: 'center', gap: 6, padding: '6px 12px', background: 'transparent', border: '1px solid rgba(255,255,255,.1)', borderRadius: 6, color: '#7BAF93', fontSize: 12, cursor: 'pointer' }}
              onClick={() => fireToast('미리보기 모드로 전환됩니다')}>
              <i className="ph ph-eye" style={{ fontSize: 13 }} /> 미리보기
            </button>
            <button onClick={handleSave} disabled={saving} style={{
              display: 'flex', alignItems: 'center', gap: 6, padding: '6px 16px',
              background: saving?'#1F5C45':'#2E8B67', border: 'none', borderRadius: 6,
              color: '#fff', fontSize: 12, fontWeight: 600, cursor: 'pointer', transition: 'background .15s',
            }}>
              {saving ? <><i className="ph ph-circle-notch" style={{ fontSize: 13, animation: 'spin 1s linear infinite' }} /> 저장 중...</> : <><i className="ph ph-floppy-disk" style={{ fontSize: 13 }} /> 저장 및 발행</>}
            </button>
          </div>
        </div>

        {/* Editor area */}
        <div style={{ flex: 1, overflow: 'hidden', display: 'flex' }}>
          <textarea
            value={content}
            onChange={e => setContent(e.target.value)}
            spellCheck={false}
            style={{
              flex: 1, padding: '24px', background: '#1A2E22', border: 'none', outline: 'none',
              color: '#E8F5EE', fontSize: 13, lineHeight: 1.85, fontFamily: 'Menlo, Monaco, Consolas, monospace',
              resize: 'none', overflowY: 'auto',
            }}
          />
          {/* Preview panel */}
          <div style={{ width: '45%', background: '#0F1E17', borderLeft: '1px solid rgba(255,255,255,.08)', padding: '24px', overflowY: 'auto' }}>
            <div style={{ fontSize: 10, fontWeight: 700, color: '#4A7A5E', letterSpacing: '.1em', textTransform: 'uppercase', marginBottom: 16 }}>미리보기</div>
            <div style={{ fontSize: 14, color: '#E8F5EE', lineHeight: 1.8 }}>

              <p style={{ marginBottom: 14, color: '#A8C4B0' }}>특허 출원은 특허청에 서면으로 제출하는 것을 원칙으로 하되, 현재는 전자 출원 시스템을 통해 온라인으로도 제출 가능하다.</p>
              <div style={{ fontSize: 14, fontWeight: 700, marginBottom: 8, color: '#E8F5EE' }}>2.1.1 출원 서류 구성</div>
              <p style={{ marginBottom: 10, color: '#A8C4B0' }}>출원서에는 다음 사항이 포함되어야 한다:</p>
              <ul style={{ marginLeft: 18, marginBottom: 14, color: '#A8C4B0' }}>
                {['발명의 명칭','발명자 및 출원인','특허청구범위','발명의 상세한 설명 (명세서)','도면 (필요한 경우)'].map((t,i) => <li key={i} style={{ marginBottom: 4, fontSize: 13 }}>{t}</li>)}
              </ul>
              <table style={{ width: '100%', borderCollapse: 'collapse', fontSize: 12, marginTop: 8 }}>
                <thead><tr style={{ background: '#1F5C45' }}>{['구분','제출 기한','비고'].map(h=><th key={h} style={{ padding: '8px 10px', color: '#E8F5EE', textAlign: 'left' }}>{h}</th>)}</tr></thead>
                <tbody>{[['출원일','접수 즉시','우선권 기산일'],['심사 청구','출원일로부터 3년','청구 없으면 취하 간주']].map((r,i)=><tr key={i} style={{ borderBottom: '1px solid rgba(255,255,255,.08)' }}>{r.map((c,j)=><td key={j} style={{ padding: '8px 10px', color: '#A8C4B0' }}>{c}</td>)}</tr>)}</tbody>
              </table>
            </div>
          </div>
        </div>

        {/* Status bar */}
        <div style={{ padding: '8px 20px', background: '#0F1E17', borderTop: '1px solid rgba(255,255,255,.06)', display: 'flex', gap: 16, fontSize: 11, color: '#4A7A5E', flexShrink: 0 }}>
          <span><i className="ph ph-pencil" style={{ fontSize: 12, marginRight: 4 }} />{content.split('\n').length}줄</span>
          <span>{content.length.toLocaleString()}자</span>
          <span style={{ marginLeft: 'auto', color: '#2E8B67' }}>PostgreSQL FTS 자동 갱신 활성</span>
        </div>
      </main>
    </div>
  );
};
