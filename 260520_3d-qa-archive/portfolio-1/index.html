function Toast({msg,onClose}){
  useEffect(()=>{const t=setTimeout(onClose,2800);return()=>clearTimeout(t)},[]);
  return <div className="toast">{msg}</div>;
}

function Icon({name,size=16,color,style}){
  const ref=useRef(null);
  useEffect(()=>{
    if(ref.current&&window.lucide){
      ref.current.innerHTML='';
      const el=document.createElement('i');
      el.setAttribute('data-lucide',name);
      el.style.display='inline-block';
      ref.current.appendChild(el);
      window.lucide.createIcons({nodes:[el]});
    }
  },[name]);
  return <span ref={ref} style={{display:'inline-flex',alignItems:'center',color:color||'currentColor',width:size,height:size,...style}}/>;
}

// Simulated 3D model viewer using Canvas
function ThreeDViewer({model,annotations,onPinClick,selectedPin,watermarkUser}){
  const canvasRef=useRef(null);
  const [rotation,setRotation]=useState({x:15,y:30});
  const [dragging,setDragging]=useState(false);
  const [dragStart,setDragStart]=useState({x:0,y:0});
  const [zoom,setZoom]=useState(1);
  const [lighting,setLighting]=useState(1.2);

  useEffect(()=>{
    const canvas=canvasRef.current;
    if(!canvas)return;
    const ctx=canvas.getContext('2d');
    const W=canvas.width=canvas.offsetWidth;
    const H=canvas.height=canvas.offsetHeight;
    ctx.clearRect(0,0,W,H);

    // Background
    ctx.fillStyle='#0A1A12';
    ctx.fillRect(0,0,W,H);

    // Grid
    ctx.strokeStyle='rgba(45,107,82,0.3)';
    ctx.lineWidth=1;
    const gs=30;
    for(let x=0;x<W;x+=gs){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke();}
    for(let y=0;y<H;y+=gs){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();}

    // Central glow
    const grd=ctx.createRadialGradient(W/2,H/2,0,W/2,H/2,180);
    grd.addColorStop(0,'rgba(26,77,56,0.4)');
    grd.addColorStop(1,'transparent');
    ctx.fillStyle=grd;
    ctx.fillRect(0,0,W,H);

    const cx=W/2,cy=H/2+20;
    const ry=rotation.y*(Math.PI/180);
    const rx=rotation.x*(Math.PI/180);
    const s=zoom*90;

    function proj3d(x,y,z){
      const x2=x*Math.cos(ry)+z*Math.sin(ry);
      const z2=-x*Math.sin(ry)+z*Math.cos(ry);
      const y2=y*Math.cos(rx)-z2*Math.sin(rx);
      const z3=y*Math.sin(rx)+z2*Math.cos(rx);
      const fov=600;const dz=fov/(fov+z3*0.3);
      return{px:cx+x2*s*dz,py:cy-y2*s*dz,depth:z3};
    }

    // Draw figure silhouette (stylized toy figure)
    // Body
    const bodyPts=[[-0.3,-0.8,0],[0.3,-0.8,0],[0.4,-0.2,0],[0.35,0.5,0],[0,0.6,0],[-0.35,0.5,0],[-0.4,-0.2,0]];
    ctx.beginPath();
    bodyPts.forEach((p,i)=>{const {px,py}=proj3d(...p);i===0?ctx.moveTo(px,py):ctx.lineTo(px,py);});
    ctx.closePath();
    ctx.fillStyle=`rgba(45,107,82,${0.3*lighting})`;
    ctx.fill();
    ctx.strokeStyle=`rgba(74,222,128,${0.7*lighting})`;
    ctx.lineWidth=1.5;ctx.stroke();

    // Head
    const headPts=[];
    for(let a=0;a<Math.PI*2;a+=0.3){
      headPts.push([Math.cos(a)*0.28,Math.sin(a)*0.28-1.15,Math.sin(a)*0.1]);
    }
    ctx.beginPath();
    headPts.forEach((p,i)=>{const {px,py}=proj3d(...p);i===0?ctx.moveTo(px,py):ctx.lineTo(px,py);});
    ctx.closePath();
    ctx.fillStyle=`rgba(26,77,56,${0.5*lighting})`;
    ctx.fill();ctx.strokeStyle=`rgba(74,222,128,${0.8*lighting})`;ctx.lineWidth=1.5;ctx.stroke();

    // Arms
    [[-1,0.4,-0.5,0],[1,0.4,0.5,0]].forEach(([sx,sy,ex,ey])=>{
      const s2=proj3d(sx,-0.25,0);const e2=proj3d(ex,-0.1,0);
      ctx.beginPath();ctx.moveTo(s2.px,s2.py);ctx.lineTo(e2.px,e2.py);
      ctx.strokeStyle=`rgba(74,222,128,${0.65*lighting})`;ctx.lineWidth=8;ctx.stroke();
      ctx.strokeStyle=`rgba(74,222,128,${0.9*lighting})`;ctx.lineWidth=2;ctx.stroke();
    });

    // Legs
    [[-0.25,0.55,0.5,-0.25,1.1,0],[0.25,0.55,0.5,0.25,1.1,0]].forEach(([x1,y1,z1,x2,y2,z2])=>{
      const a=proj3d(x1,-y1,z1);const b=proj3d(x2,-y2,z2);
      ctx.beginPath();ctx.moveTo(a.px,a.py);ctx.lineTo(b.px,b.py);
      ctx.strokeStyle=`rgba(74,222,128,${0.6*lighting})`;ctx.lineWidth=10;ctx.stroke();
      ctx.strokeStyle=`rgba(74,222,128,${0.85*lighting})`;ctx.lineWidth=2;ctx.stroke();
    });

    // Shadow
    ctx.beginPath();
    const shd=proj3d(0,0.55,0);
    ctx.ellipse(shd.px,shd.py+20,s*0.35,s*0.08,0,0,Math.PI*2);
    ctx.fillStyle='rgba(0,0,0,0.35)';ctx.fill();

    // Coordinate axes
    const o=proj3d(0,0,0);
    [[[0.7,0,0],'rgba(239,68,68,0.8)','X'],[[0,0.7,0],'rgba(74,222,128,0.8)','Y'],[[0,0,0.7],'rgba(96,165,250,0.8)','Z']].forEach(([pt,col,lbl])=>{
      const p2=proj3d(...pt);
      ctx.beginPath();ctx.moveTo(o.px,o.py);ctx.lineTo(p2.px,p2.py);
      ctx.strokeStyle=col;ctx.lineWidth=2;ctx.stroke();
      ctx.fillStyle=col;ctx.font='11px Pretendard';ctx.fillText(lbl,p2.px+3,p2.py-3);
    });

    // Watermark
    ctx.save();ctx.globalAlpha=0.12;ctx.fillStyle='#E8F5EE';ctx.font='bold 13px Pretendard';
    ctx.translate(W/2,H/2);ctx.rotate(-Math.PI/6);
    for(let i=-3;i<=3;i++)for(let j=-3;j<=3;j++){
      ctx.fillText(`${watermarkUser} · 2026.05.20`,i*180,j*80);
    }
    ctx.restore();

  },[rotation,zoom,lighting,model]);

  const onMouseDown=e=>{setDragging(true);setDragStart({x:e.clientX,y:e.clientY});};
  const onMouseMove=e=>{
    if(!dragging)return;
    const dx=e.clientX-dragStart.x,dy=e.clientY-dragStart.y;
    setRotation(r=>({x:r.x+dy*0.3,y:r.y+dx*0.4}));
    setDragStart({x:e.clientX,y:e.clientY});
  };
  const onMouseUp=()=>setDragging(false);

  return(
    <div style={{position:'relative',width:'100%',height:'100%',background:'#0A1A12',borderRadius:4,overflow:'hidden',cursor:dragging?'grabbing':'crosshair',userSelect:'none'}} onMouseDown={onMouseDown} onMouseMove={onMouseMove} onMouseUp={onMouseUp}>
      <canvas ref={canvasRef} style={{width:'100%',height:'100%',display:'block'}}/>
      {/* Annotation pins */}
      {annotations.map(a=>(
        <div key={a.id} onClick={e=>{e.stopPropagation();onPinClick(a);}} style={{position:'absolute',left:`${a.x}%`,top:`${a.y}%`,transform:'translate(-50%,-50%)',zIndex:10,cursor:'pointer'}}>
          <div style={{width:22,height:22,borderRadius:'50%',background:a.status==='완료'?'rgba(74,222,128,0.9)':'rgba(251,191,36,0.9)',border:'2px solid #E8F5EE',display:'flex',alignItems:'center',justifyContent:'center',fontSize:10,fontWeight:700,color:'#0D1F18',animation:'pulseDot 2.2s infinite',boxShadow:'0 0 10px rgba(74,222,128,0.5)'}}>
            {a.label}
          </div>
          <div style={{position:'absolute',top:24,left:'50%',transform:'translateX(-50%)',background:'rgba(13,31,24,0.9)',border:'1px solid #2D4A38',borderRadius:3,padding:'3px 7px',whiteSpace:'nowrap',fontSize:10,color:C.muted,pointerEvents:'none'}}>
            {a.status}
          </div>
        </div>
      ))}
      {/* Viewer controls */}
      <div style={{position:'absolute',top:12,right:12,display:'flex',flexDirection:'column',gap:6,zIndex:5}}>
        {[['zoom-in',()=>setZoom(z=>Math.min(z+0.15,2.5))],['zoom-out',()=>setZoom(z=>Math.max(z-0.15,0.4))],['rotate-ccw',()=>setRotation(r=>({...r,y:r.y-30}))],['refresh-cw',()=>{setRotation({x:15,y:30});setZoom(1);}]].map(([ic,fn])=>(
          <button key={ic} onClick={fn} style={{width:32,height:32,borderRadius:4,background:'rgba(22,46,34,0.9)',border:'1px solid #2D4A38',cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',transition:'all .15s'}} onMouseEnter={e=>e.currentTarget.style.borderColor='#4ADE80'} onMouseLeave={e=>e.currentTarget.style.borderColor='#2D4A38'}>
            <Icon name={ic} size={14} color={C.muted}/>
          </button>
        ))}
      </div>
      {/* Model info bar */}
      <div style={{position:'absolute',bottom:0,left:0,right:0,background:'rgba(13,31,24,0.92)',borderTop:'1px solid #2D4A38',padding:'8px 14px',display:'flex',gap:20,alignItems:'center',fontSize:12}}>
        <span style={{color:C.muted}}>모델:</span><span style={{color:C.text,fontWeight:500}}>{model?.name||'피규어-드래곤 v2.3'}</span>
        <span style={{color:C.muted}}>포맷:</span><span className="tag tag-green">{model?.format||'OBJ'}</span>
        <span style={{color:C.muted}}>크기:</span><span style={{color:C.text}}>{model?.size||'14.2MB'}</span>
        <span style={{color:C.muted}}>주석:</span><span style={{color:C.warn,fontWeight:600}}>{annotations.length}개</span>
        <div style={{marginLeft:'auto',display:'flex',gap:8,alignItems:'center'}}>
          <span style={{color:C.muted,fontSize:11}}>조명:</span>
          <input type="range" min="0.3" max="2" step="0.1" value={lighting} onChange={e=>setLighting(parseFloat(e.target.value))} style={{width:70,accentColor:'#4ADE80'}}/>
        </div>
      </div>
    </div>
  );
}

  const partnerStatusColor=s=>s==='승인'?C.accent:s==='반려'?C.err:C.warn;

  return(
    <div style={{display:'flex',flexDirection:'column',width:'100%',height:'100%',background:C.bg,overflow:'hidden'}}>
      {/* Header */}
      <div style={{background:'#0F2A1E',borderBottom:'1px solid #2D4A38',padding:'0 24px',flexShrink:0}}>
        <div style={{display:'flex',alignItems:'center',height:56}}>
          <div style={{display:'flex',alignItems:'center',gap:10,marginRight:32}}>
            <div style={{width:28,height:28,borderRadius:5,background:C.primary,border:'1px solid #4ADE80',display:'flex',alignItems:'center',justifyContent:'center'}}>
              <Icon name="scan-3d" size={16} color={C.accent}/>
            </div>
            <span style={{fontWeight:700,fontSize:15,color:C.text,letterSpacing:'-.3px'}}>QA Archive</span>
            <span style={{fontSize:11,color:C.muted,background:'rgba(74,222,128,.1)',border:'1px solid rgba(74,222,128,.25)',borderRadius:3,padding:'1px 6px'}}>v2.3</span>
          </div>
          {/* Tabs */}
          <div style={{display:'flex',gap:2,flex:1}}>
            {TABS.map(t=>(
              <button key={t.key} onClick={()=>setTab(t.key)} style={{padding:'0 18px',height:56,background:'transparent',border:'none',borderBottom:tab===t.key?`2px solid ${C.accent}`:'2px solid transparent',color:tab===t.key?C.accent:C.muted,cursor:'pointer',fontFamily:'inherit',fontSize:13,fontWeight:tab===t.key?600:400,transition:'all .15s',whiteSpace:'nowrap'}}>
                {t.label}
              </button>
            ))}
          </div>
          <div style={{display:'flex',gap:8,alignItems:'center'}}>
            <button onClick={()=>showToast('알림이 없습니다.')} style={{width:32,height:32,borderRadius:4,background:'transparent',border:'1px solid #2D4A38',cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center'}}><Icon name="bell" size={15} color={C.muted}/></button>
            <div style={{width:30,height:30,borderRadius:'50%',background:'#2D6B52',display:'flex',alignItems:'center',justifyContent:'center',fontSize:12,fontWeight:600,color:C.accent}}>김</div>
            <div>
              <div style={{fontSize:12,fontWeight:600,color:C.text}}>김민준</div>
              <div style={{fontSize:10,color:C.muted}}>내부직원</div>
            </div>
          </div>
        </div>
      </div>

      {/* Content */}
      <div style={{flex:1,overflow:'hidden',display:'flex',flexDirection:'column'}}>

        {/* MAIN - 3D Viewer */}
        {tab==='main'&&(
          <div style={{flex:1,display:'flex',gap:0,overflow:'hidden',animation:'fadeIn .25s ease'}}>
            {/* Model list sidebar */}
            <div style={{width:220,borderRight:'1px solid #2D4A38',display:'flex',flexDirection:'column',background:'#0F2A1E',overflow:'hidden'}}>
              <div style={{padding:'12px 14px',borderBottom:'1px solid #2D4A38'}}>
                <div style={{fontSize:11,color:C.muted,fontWeight:600,letterSpacing:'.5px',marginBottom:8}}>모델 목록</div>
                <div style={{position:'relative'}}>
                  <input placeholder="모델 검색..." style={{width:'100%',background:'#162E22',border:'1px solid #2D4A38',borderRadius:4,padding:'6px 10px 6px 28px',color:C.text,fontSize:12,fontFamily:'inherit',outline:'none'}}/>
                  <Icon name="search" size={12} color={C.muted} style={{position:'absolute',left:8,top:'50%',transform:'translateY(-50%)'}}/>
                </div>
              </div>
              <div style={{flex:1,overflowY:'auto',padding:'8px 0'}}>
                {MODELS.map(m=>(
                  <div key={m.id} onClick={()=>setSelectedModel(m)} style={{padding:'10px 14px',cursor:'pointer',background:selectedModel?.id===m.id?'rgba(26,77,56,0.6)':'transparent',borderLeft:selectedModel?.id===m.id?`3px solid ${C.accent}`:'3px solid transparent',transition:'all .15s',animation:'staggerIn .3s ease both'}} onMouseEnter={e=>e.currentTarget.style.background='rgba(26,77,56,0.35)'} onMouseLeave={e=>e.currentTarget.style.background=selectedModel?.id===m.id?'rgba(26,77,56,0.6)':'transparent'}>
                    <div style={{fontSize:12,fontWeight:500,color:C.text,marginBottom:3,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{m.name}</div>
                    <div style={{display:'flex',gap:6,alignItems:'center'}}>
                      <span className="tag tag-green" style={{fontSize:10}}>{m.format}</span>
                      <span style={{fontSize:10,color:m.status==='완료'?C.accent:m.status==='감수중'?C.warn:C.info}}>{m.status}</span>
                    </div>
                  </div>
                ))}
              </div>
            </div>

            {/* 3D Viewer main area */}
            <div style={{flex:1,display:'flex',flexDirection:'column',overflow:'hidden'}}>
              <div style={{padding:'10px 16px',borderBottom:'1px solid #2D4A38',display:'flex',alignItems:'center',gap:12,background:'#0F2A1E'}}>
                <Icon name="box" size={14} color={C.muted}/>
                <span style={{fontSize:13,color:C.text,fontWeight:500}}>{selectedModel?.name}</span>
                <span className={`tag tag-${selectedModel?.status==='완료'?'green':selectedModel?.status==='감수중'?'yellow':'blue'}`}>{selectedModel?.status}</span>
                <span style={{fontSize:12,color:C.muted}}>담당: {selectedModel?.assignee}</span>
                <div style={{marginLeft:'auto',display:'flex',gap:8}}>
                  <button className="btn-ghost" onClick={()=>{setTab('annotation');}} style={{fontSize:12,padding:'4px 12px'}}>주석 보기</button>
                  <button className="btn-primary" onClick={()=>showToast('감수 완료 처리되었습니다.')} style={{fontSize:12,padding:'4px 12px'}}>감수 완료</button>
                </div>
              </div>
              <div style={{flex:1,padding:16,overflow:'hidden'}}>
                <ThreeDViewer model={selectedModel} annotations={annotations.filter(a=>true)} onPinClick={handlePinClick} selectedPin={selectedPin} watermarkUser="김민준"/>
              </div>
            </div>

            {/* Right panel */}
            <div style={{width:230,borderLeft:'1px solid #2D4A38',display:'flex',flexDirection:'column',background:'#0F2A1E'}}>
              <div style={{padding:'12px 14px',borderBottom:'1px solid #2D4A38'}}>
                <div style={{fontSize:11,color:C.muted,fontWeight:600,letterSpacing:'.5px',marginBottom:12}}>모델 정보</div>
                {[['카테고리',selectedModel?.category],['포맷',selectedModel?.format],['파일 크기',selectedModel?.size],['등록일',selectedModel?.date],['담당자',selectedModel?.reviewer],].map(([k,v])=>(
                  <div key={k} style={{display:'flex',justifyContent:'space-between',marginBottom:8,fontSize:12}}>
                    <span style={{color:C.muted}}>{k}</span>
                    <span style={{color:C.text,fontWeight:500}}>{v}</span>
                  </div>
                ))}
              </div>
              <div style={{padding:'12px 14px',borderBottom:'1px solid #2D4A38'}}>
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10}}>
                  <span style={{fontSize:11,color:C.muted,fontWeight:600,letterSpacing:'.5px'}}>주석 현황</span>
                  <button onClick={()=>{setShowNewAnnot(true);}} style={{background:'transparent',border:'none',cursor:'pointer',color:C.accent,fontSize:11}}>+ 추가</button>
                </div>
                {annotations.map(a=>(
                  <div key={a.id} onClick={()=>handlePinClick(a)} style={{padding:'8px 10px',background:'#162E22',borderRadius:4,marginBottom:6,cursor:'pointer',border:'1px solid #2D4A38',transition:'all .15s'}} onMouseEnter={e=>e.currentTarget.style.borderColor=C.accent} onMouseLeave={e=>e.currentTarget.style.borderColor='#2D4A38'}>
                    <div style={{display:'flex',justifyContent:'space-between',marginBottom:3}}>
                      <span style={{fontSize:11,fontWeight:600,color:C.accent}}>{a.label}</span>
                      <span style={{fontSize:10,color:a.status==='완료'?C.accent:C.warn}}>{a.status}</span>
                    </div>
                    <div style={{fontSize:11,color:C.muted,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{a.text}</div>
                    <div style={{fontSize:10,color:C.muted,marginTop:3}}>댓글 {a.comments.length}개</div>
                  </div>
                ))}
              </div>
              <div style={{padding:'12px 14px'}}>
                <div style={{fontSize:11,color:C.muted,fontWeight:600,letterSpacing:'.5px',marginBottom:10}}>팬톤 색상 참조</div>
                <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:4}}>
                  {PANTONE_SAMPLES.slice(0,8).map(p=>(
                    <div key={p.code} title={p.code} style={{aspectRatio:1,borderRadius:3,background:p.hex,cursor:'pointer',border:'1px solid rgba(255,255,255,0.1)',transition:'transform .15s'}} onMouseEnter={e=>e.currentTarget.style.transform='scale(1.15)'} onMouseLeave={e=>e.currentTarget.style.transform='scale(1)'}/>
                  ))}
                </div>
              </div>
            </div>
          </div>
        )}

        {/* ANNOTATION TAB */}
        {tab==='annotation'&&(
          <div style={{flex:1,display:'flex',overflow:'hidden',animation:'fadeIn .25s ease'}}>
            <div style={{flex:1,padding:'16px 20px',overflowY:'auto'}}>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16}}>
                <div>
                  <h2 style={{fontSize:16,fontWeight:700,color:C.text}}>주석 피드백</h2>
                  <p style={{fontSize:12,color:C.muted,marginTop:2}}>피규어-드래곤 v2.3 · 주석 {annotations.length}개</p>
                </div>
                <div style={{display:'flex',gap:8}}>
                  <select style={{background:'#162E22',border:'1px solid #2D4A38',borderRadius:4,padding:'5px 10px',color:C.text,fontSize:12,fontFamily:'inherit',outline:'none'}} defaultValue="전체">
                    <option>전체</option><option>미완료</option><option>완료</option>
                  </select>
                  <button className="btn-primary" onClick={()=>setShowNewAnnot(true)} style={{fontSize:12}}>주석 추가</button>
                </div>
              </div>
              {annotations.map(a=>(
                <div key={a.id} style={{background:'#162E22',border:'1px solid #2D4A38',borderRadius:6,padding:'14px 16px',marginBottom:12,animation:'fadeIn .3s ease'}}>
                  <div style={{display:'flex',gap:12,alignItems:'flex-start',marginBottom:10}}>
                    <div style={{width:28,height:28,borderRadius:'50%',background:a.status==='완료'?'rgba(74,222,128,.2)':'rgba(251,191,36,.2)',border:`2px solid ${a.status==='완료'?C.accent:C.warn}`,display:'flex',alignItems:'center',justifyContent:'center',fontSize:11,fontWeight:700,color:a.status==='완료'?C.accent:C.warn,flexShrink:0}}>
                      {a.label}
                    </div>
                    <div style={{flex:1}}>
                      <div style={{fontSize:13,color:C.text,fontWeight:500,marginBottom:4}}>{a.text}</div>
                      <div style={{display:'flex',gap:10,fontSize:11,color:C.muted}}>
                        <span>{a.author}</span><span>·</span><span>{a.role}</span><span>·</span><span>{a.time}</span>
                      </div>
                    </div>
                    <span style={{fontSize:11,padding:'2px 8px',borderRadius:3,background:a.status==='완료'?'rgba(74,222,128,.15)':'rgba(251,191,36,.12)',color:a.status==='완료'?C.accent:C.warn,border:`1px solid ${a.status==='완료'?'rgba(74,222,128,.3)':'rgba(251,191,36,.3)'}`,whiteSpace:'nowrap'}}>{a.status}</span>
                  </div>
                  {/* Comment thread */}
                  {a.comments.length>0&&(
                    <div style={{borderLeft:'2px solid #2D4A38',paddingLeft:16,marginLeft:14,marginBottom:10}}>
                      {a.comments.map(c=>(
                        <div key={c.id} style={{marginBottom:8,padding:'8px 10px',background:'rgba(13,31,24,0.5)',borderRadius:4}}>
                          <div style={{display:'flex',gap:8,alignItems:'center',marginBottom:4}}>
                            <span style={{fontSize:12,fontWeight:600,color:C.text}}>{c.author}</span>
                            <span className="tag tag-blue" style={{fontSize:10}}>{c.role}</span>
                            <span style={{fontSize:10,color:C.muted,marginLeft:'auto'}}>{c.time}</span>
                          </div>
                          <div style={{fontSize:12,color:C.muted}}>{c.text}</div>
                        </div>
                      ))}
                    </div>
                  )}
                  {/* Add comment */}
                  <div style={{display:'flex',gap:8,alignItems:'center',marginLeft:40}}>
                    <input value={newComment} onChange={e=>setNewComment(e.target.value)} placeholder="댓글 입력..." style={{flex:1,background:'#0D1F18',border:'1px solid #2D4A38',borderRadius:4,padding:'6px 10px',color:C.text,fontSize:12,fontFamily:'inherit',outline:'none'}} onFocus={e=>e.target.style.borderColor=C.accent} onBlur={e=>e.target.style.borderColor='#2D4A38'}/>
                    <button className="btn-primary" onClick={()=>{if(newComment.trim()){showToast('댓글이 등록되었습니다.');setNewComment('');}}} style={{fontSize:12,padding:'6px 12px'}}>등록</button>
                    {a.status!=='완료'&&<button className="btn-ghost" onClick={()=>{setAnnotations(l=>l.map(x=>x.id===a.id?{...x,status:'완료'}:x));showToast('감수 완료 처리되었습니다.');}} style={{fontSize:12,padding:'6px 10px',color:C.accent}}>완료 처리</button>}
                  </div>
                </div>
              ))}
            </div>
          </div>
        )}

        {/* 360 VIEWER */}
        {tab==='viewer360'&&(
          <div style={{flex:1,display:'flex',overflow:'hidden',animation:'fadeIn .25s ease'}}>
            <div style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',padding:24,position:'relative'}}>
              <div style={{marginBottom:16,textAlign:'center'}}>
                <h2 style={{fontSize:16,fontWeight:700,color:C.text,marginBottom:4}}>360도 뷰어</h2>
                <p style={{fontSize:12,color:C.muted}}>마우스를 좌우로 드래그하여 360도 회전 · 프레임 {frame360+1}/36</p>
              </div>
              <div style={{width:500,height:400,background:'#0A1A12',border:'2px solid #2D4A38',borderRadius:8,position:'relative',cursor:'ew-resize',overflow:'hidden',userSelect:'none'}} onMouseDown={handle360MouseDown} onMouseMove={handle360MouseMove} onMouseUp={()=>setDragging360(false)} onMouseLeave={()=>setDragging360(false)}>
                {/* Simulated 360 frame */}
                <div style={{position:'absolute',inset:0,display:'flex',alignItems:'center',justifyContent:'center',background:`hsl(${frame360*10},20%,8%)`}}>
                  {/* Rotating figure silhouette */}
                  <svg viewBox="0 0 200 300" width="200" height="300">
                    <g transform={`translate(100,150) rotate(${frame360*10})`}>
                      <ellipse cx="0" cy="-80" rx="30" ry="35" fill="none" stroke="#4ADE80" strokeWidth="1.5" opacity="0.7"/>
                      <rect x="-25" y="-50" width="50" height="80" rx="5" fill="none" stroke="#4ADE80" strokeWidth="1.5" opacity="0.7"/>
                      <line x1="-25" y1="-35" x2="-55" y2="10" stroke="#4ADE80" strokeWidth="8" strokeLinecap="round" opacity="0.6"/>
                      <line x1="25" y1="-35" x2="55" y2="10" stroke="#4ADE80" strokeWidth="8" strokeLinecap="round" opacity="0.6"/>
                      <line x1="-15" y1="30" x2="-15" y2="90" stroke="#4ADE80" strokeWidth="10" strokeLinecap="round" opacity="0.6"/>
                      <line x1="15" y1="30" x2="15" y2="90" stroke="#4ADE80" strokeWidth="10" strokeLinecap="round" opacity="0.6"/>
                    </g>
                  </svg>
                </div>
                {/* Scan line animation */}
                <div style={{position:'absolute',left:0,right:0,height:2,background:'rgba(74,222,128,0.4)',animation:'scanLine 2s linear infinite',pointerEvents:'none'}}/>
                {/* Watermark */}
                <div style={{position:'absolute',inset:0,display:'flex',alignItems:'center',justifyContent:'center',pointerEvents:'none',opacity:.08}}>
                  <div style={{transform:'rotate(-20deg)',fontSize:13,color:'#E8F5EE',letterSpacing:2,whiteSpace:'nowrap'}}>김민준 · 2026.05.20</div>
                </div>
                {/* Frame indicator */}
                <div style={{position:'absolute',bottom:12,left:'50%',transform:'translateX(-50%)',display:'flex',gap:2}}>
                  {Array.from({length:12},(_,i)=>(
                    <div key={i} style={{width:20,height:3,borderRadius:2,background:Math.floor(frame360/3)===i?C.accent:'rgba(74,222,128,0.2)',transition:'background .15s'}}/>
                  ))}
                </div>
                {/* Drag hint */}
                {!dragging360&&<div style={{position:'absolute',top:'50%',left:'50%',transform:'translate(-50%,-50%)',pointerEvents:'none',display:'flex',alignItems:'center',gap:8,background:'rgba(13,31,24,0.7)',padding:'8px 14px',borderRadius:6}}>
                  <Icon name="move-horizontal" size={16} color={C.accent}/>
                  <span style={{fontSize:12,color:C.muted}}>드래그로 360도 회전</span>
                </div>}
              </div>
              <div style={{marginTop:14,display:'flex',gap:10}}>
                <button className="btn-ghost" onClick={()=>setFrame360(f=>(f-1+36)%36)} style={{fontSize:12}}>이전 프레임</button>
                <span style={{fontSize:12,color:C.muted,padding:'6px 0'}}>{frame360+1} / 36</span>
                <button className="btn-ghost" onClick={()=>setFrame360(f=>(f+1)%36)} style={{fontSize:12}}>다음 프레임</button>
              </div>
            </div>
            <div style={{width:280,borderLeft:'1px solid #2D4A38',padding:'16px',background:'#0F2A1E',overflowY:'auto'}}>
              <h3 style={{fontSize:13,fontWeight:700,color:C.text,marginBottom:12}}>다각도 사진 목록</h3>
              <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:6,marginBottom:14}}>
                {Array.from({length:12},(_,i)=>(
                  <div key={i} onClick={()=>setFrame360(i*3)} style={{aspectRatio:1,background:`hsl(${i*30},18%,${8+i%3*3}%)`,borderRadius:4,cursor:'pointer',border:`2px solid ${Math.floor(frame360/3)===i?C.accent:'#2D4A38'}`,display:'flex',alignItems:'center',justifyContent:'center',fontSize:10,color:C.muted,transition:'all .15s'}} onMouseEnter={e=>e.currentTarget.style.borderColor=C.accent} onMouseLeave={e=>e.currentTarget.style.borderColor=Math.floor(frame360/3)===i?C.accent:'#2D4A38'}>
                    {i*30}°
                  </div>
                ))}
              </div>
              <button className="btn-primary" onClick={()=>showToast('사진 업로드 화면으로 이동합니다.')} style={{width:'100%',fontSize:12,padding:'8px'}}>+ 사진 추가 업로드</button>
              <div style={{marginTop:16,padding:'12px',background:'#162E22',borderRadius:6,fontSize:12}}>
                <div style={{color:C.text,fontWeight:600,marginBottom:6}}>봉제인형-북극곰 v1.0</div>
                <div style={{color:C.muted,marginBottom:3}}>총 36장 / STL</div>
                <div style={{color:C.muted}}>마지막 업데이트: 2026.05.15</div>
              </div>
            </div>
          </div>
        )}

        {/* AUTH ADMIN */}
        {tab==='auth-admin'&&(
          <div style={{flex:1,padding:'16px 24px',overflowY:'auto',animation:'fadeIn .25s ease'}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16}}>
              <div>
                <h2 style={{fontSize:16,fontWeight:700,color:C.text}}>권한 관리</h2>
                <p style={{fontSize:12,color:C.muted,marginTop:2}}>협력사 가입 신청 · 역할 기반 접근 제어</p>
              </div>
              <div style={{display:'flex',gap:8}}>
                <div style={{display:'flex',gap:6}}>
                  {['전체','대기','승인','반려'].map(s=>(
                    <button key={s} onClick={()=>setFilterCat(s)} style={{padding:'5px 12px',borderRadius:4,border:`1px solid ${filterCat===s?C.accent:'#2D4A38'}`,background:filterCat===s?'rgba(74,222,128,.15)':'transparent',color:filterCat===s?C.accent:C.muted,cursor:'pointer',fontSize:12,fontFamily:'inherit'}}>{s}</button>
                  ))}
                </div>
              </div>
            </div>
            {/* Stats cards */}
            <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:12,marginBottom:16}}>
              {[['전체 협력사',partnerList.length,'users',C.info],['승인 완료',partnerList.filter(p=>p.status==='승인').length,'check-circle',C.accent],['승인 대기',partnerList.filter(p=>p.status==='대기').length,'clock',C.warn],['반려',partnerList.filter(p=>p.status==='반려').length,'x-circle',C.err]].map(([lbl,val,ic,col])=>(
                <div key={lbl} style={{background:'#162E22',border:'1px solid #2D4A38',borderRadius:6,padding:'14px 16px',display:'flex',gap:12,alignItems:'center'}}>
                  <div style={{width:36,height:36,borderRadius:6,background:`rgba(${col==='#4ADE80'?'74,222,128':col==='#FCD34D'?'252,211,77':col==='#F87171'?'248,113,113':'147,197,253'},.15)`,display:'flex',alignItems:'center',justifyContent:'center'}}>
                    <Icon name={ic} size={18} color={col}/>
                  </div>
                  <div>
                    <div style={{fontSize:20,fontWeight:700,color:col}}>{val}</div>
                    <div style={{fontSize:11,color:C.muted}}>{lbl}</div>
                  </div>
                </div>
              ))}
            </div>
            {/* Table */}
            <div style={{background:'#162E22',border:'1px solid #2D4A38',borderRadius:6,overflow:'hidden'}}>
              <table style={{width:'100%',borderCollapse:'collapse'}}>
                <thead>
                  <tr style={{borderBottom:'1px solid #2D4A38'}}>
                    {['협력사명','담당자','이메일','신청일','카테고리','상태','액션'].map(h=>(
                      <th key={h} style={{padding:'10px 14px',textAlign:'left',fontSize:11,color:C.muted,fontWeight:600,letterSpacing:'.4px'}}>{h}</th>
                    ))}
                  </tr>
                </thead>
                <tbody>
                  {partnerList.filter(p=>filterCat==='전체'||p.status===filterCat).map((p,i)=>(
                    <tr key={p.id} style={{borderBottom:'1px solid rgba(45,74,56,0.5)',transition:'background .15s'}} onMouseEnter={e=>e.currentTarget.style.background='rgba(26,77,56,0.2)'} onMouseLeave={e=>e.currentTarget.style.background='transparent'}>
                      <td style={{padding:'12px 14px',fontSize:13,color:C.text,fontWeight:500}}>{p.name}</td>
                      <td style={{padding:'12px 14px',fontSize:12,color:C.muted}}>{p.contact}</td>
                      <td style={{padding:'12px 14px',fontSize:12,color:C.muted}}>{p.email}</td>
                      <td style={{padding:'12px 14px',fontSize:12,color:C.muted}}>{p.requestDate}</td>
                      <td style={{padding:'12px 14px'}}><span className="tag tag-blue" style={{fontSize:10}}>{p.category}</span></td>
                      <td style={{padding:'12px 14px'}}><span style={{fontSize:11,padding:'3px 8px',borderRadius:3,background:`rgba(${p.status==='승인'?'74,222,128':p.status==='반려'?'248,113,113':'252,211,77'},.12)`,color:partnerStatusColor(p.status),border:`1px solid rgba(${p.status==='승인'?'74,222,128':p.status==='반려'?'248,113,113':'252,211,77'},.3)`}}>{p.status}</span></td>
                      <td style={{padding:'12px 14px'}}>
                        {p.status==='대기'?(
                          <div style={{display:'flex',gap:6}}>
                            <button className="btn-primary" onClick={()=>setPartnerModal({...p,action:'approve'})} style={{fontSize:11,padding:'3px 10px'}}>승인</button>
                            <button className="btn-ghost" onClick={()=>setPartnerModal({...p,action:'reject'})} style={{fontSize:11,padding:'3px 10px',color:C.err,borderColor:'rgba(248,113,113,.3)'}}>반려</button>
                          </div>
                        ):(
                          <button className="btn-ghost" onClick={()=>setPartnerModal(p)} style={{fontSize:11,padding:'3px 10px'}}>상세</button>
                        )}
                      </td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          </div>
        )}

        {/* FILE UPLOAD */}
        {tab==='upload'&&(
          <div style={{flex:1,padding:'24px',overflowY:'auto',animation:'fadeIn .25s ease'}}>
            <div style={{maxWidth:700,margin:'0 auto'}}>
              <h2 style={{fontSize:16,fontWeight:700,color:C.text,marginBottom:4}}>파일 업로드</h2>
              <p style={{fontSize:12,color:C.muted,marginBottom:20}}>3D 모델(OBJ·STL) 및 다각도 사진 업로드</p>
              {/* Drop zone */}
              <div style={{border:'2px dashed #2D4A38',borderRadius:8,padding:'40px 24px',textAlign:'center',marginBottom:20,cursor:'pointer',transition:'all .2s',background:'rgba(22,46,34,0.3)'}} onMouseEnter={e=>{e.currentTarget.style.borderColor=C.accent;e.currentTarget.style.background='rgba(26,77,56,0.25)';}} onMouseLeave={e=>{e.currentTarget.style.borderColor='#2D4A38';e.currentTarget.style.background='rgba(22,46,34,0.3)';}} onClick={()=>{
                const fakeFiles=[{name:'figure_dragon_v2.4.obj',size:'16.8MB',type:'OBJ'},{name:'bear_plush_angles.zip',size:'34.2MB',type:'사진묶음'}];
                setUploadFiles(fakeFiles);
                fakeFiles.forEach(f=>simulateUpload(f.name));
              }}>
                <Icon name="upload-cloud" size={32} color={C.muted} style={{marginBottom:12}}/>
                <div style={{fontSize:14,color:C.text,fontWeight:500,marginBottom:6}}>파일을 드래그하거나 클릭하여 업로드</div>
                <div style={{fontSize:12,color:C.muted}}>OBJ · STL · ZIP (최대 500MB) · JPG · PNG</div>
              </div>
              {/* Upload list */}
              {uploadFiles.map(f=>(
                <div key={f.name} style={{background:'#162E22',border:'1px solid #2D4A38',borderRadius:6,padding:'14px 16px',marginBottom:10}}>
                  <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:8}}>
                    <div style={{display:'flex',gap:10,alignItems:'center'}}>
                      <Icon name="file-3d" size={16} color={C.accent}/>
                      <span style={{fontSize:13,color:C.text,fontWeight:500}}>{f.name}</span>
                      <span className="tag tag-green" style={{fontSize:10}}>{f.type}</span>
                    </div>
                    <span style={{fontSize:11,color:C.muted}}>{f.size}</span>
                  </div>
                  <div style={{background:'#0D1F18',borderRadius:3,height:6,overflow:'hidden'}}>
                    <div style={{height:'100%',background:`linear-gradient(90deg, ${C.accent}, #2D6B52)`,borderRadius:3,width:`${uploadProgress[f.name]||0}%`,transition:'width .2s ease',animation:!uploadProgress[f.name]?'progressBar 3s ease forwards':undefined}}/>
                  </div>
                  <div style={{marginTop:6,display:'flex',justifyContent:'space-between',fontSize:11,color:C.muted}}>
                    <span>{uploadProgress[f.name]>=100?'업로드 완료':`업로드 중... ${Math.round(uploadProgress[f.name]||0)}%`}</span>
                    {uploadProgress[f.name]>=100&&<span style={{color:C.accent}}>처리 완료</span>}
                  </div>
                </div>
              ))}
              {/* Form */}
              <div style={{background:'#162E22',border:'1px solid #2D4A38',borderRadius:6,padding:'16px'}}>
                <h3 style={{fontSize:13,fontWeight:600,color:C.text,marginBottom:14}}>모델 정보 입력</h3>
                <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12,marginBottom:12}}>
                  {[['모델명','피규어-드래곤 v2.4'],['카테고리','피규어'],['담당 협력사','(주)아트팩토리'],['팬톤 색상코드','PANTONE 485 C']].map(([lbl,ph])=>(
                    <div key={lbl}>
                      <label style={{display:'block',fontSize:11,color:C.muted,marginBottom:4,fontWeight:500}}>{lbl}</label>
                      <input defaultValue={ph} style={{width:'100%',background:'#0D1F18',border:'1px solid #2D4A38',borderRadius:4,padding:'8px 10px',color:C.text,fontSize:12,fontFamily:'inherit',outline:'none'}} onFocus={e=>e.target.style.borderColor=C.accent} onBlur={e=>e.target.style.borderColor='#2D4A38'}/>
                    </div>
                  ))}
                </div>
                <button className="btn-primary" onClick={()=>showToast('모델 등록이 완료되었습니다.')} style={{fontSize:13,padding:'8px 20px'}}>모델 등록</button>
              </div>
            </div>
          </div>
        )}
      </div>

      {/* Partner Modal */}
      {partnerModal&&(
        <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.7)',display:'flex',alignItems:'center',justifyContent:'center',zIndex:1000}} onClick={()=>setPartnerModal(null)}>
          <div style={{background:'#162E22',border:'1px solid #2D4A38',borderRadius:8,padding:'24px',width:400,animation:'fadeIn .2s ease',boxShadow:'0 8px 32px rgba(0,0,0,.5)'}} onClick={e=>e.stopPropagation()}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:20}}>
              <h3 style={{fontSize:15,fontWeight:700,color:C.text}}>협력사 {partnerModal.action==='approve'?'승인':partnerModal.action==='reject'?'반려':'상세'}</h3>
              <button onClick={()=>setPartnerModal(null)} style={{background:'transparent',border:'none',cursor:'pointer',color:C.muted}}><Icon name="x" size={18}/></button>
            </div>
            {[['협력사명',partnerModal.name],['담당자',partnerModal.contact],['이메일',partnerModal.email],['신청일',partnerModal.requestDate],['전문 카테고리',partnerModal.category]].map(([k,v])=>(
              <div key={k} style={{display:'flex',justifyContent:'space-between',marginBottom:10,fontSize:13}}>
                <span style={{color:C.muted}}>{k}</span>
                <span style={{color:C.text,fontWeight:500}}>{v}</span>
              </div>
            ))}
            {(partnerModal.action==='approve'||partnerModal.action==='reject')&&(
              <div style={{marginTop:16,padding:'12px',background:'rgba(251,191,36,.08)',border:'1px solid rgba(251,191,36,.25)',borderRadius:4,fontSize:12,color:C.warn,marginBottom:16}}>
                {partnerModal.action==='approve'?'승인 시 해당 협력사는 배정된 모델의 3D 뷰어에 접근할 수 있습니다.':'반려 시 해당 협력사는 시스템에 접근할 수 없습니다.'}
              </div>
            )}
            <div style={{display:'flex',gap:10,justifyContent:'flex-end',marginTop:16}}>
              <button className="btn-ghost" onClick={()=>setPartnerModal(null)} style={{fontSize:13}}>취소</button>
              {partnerModal.action==='approve'&&<button className="btn-primary" onClick={()=>handleApprove(partnerModal.id)} style={{fontSize:13,color:C.accent}}>승인 처리</button>}
              {partnerModal.action==='reject'&&<button onClick={()=>handleReject(partnerModal.id)} style={{fontSize:13,padding:'6px 14px',borderRadius:4,border:'1px solid rgba(248,113,113,.3)',background:'rgba(248,113,113,.1)',color:C.err,cursor:'pointer',fontFamily:'inherit'}}>반려 처리</button>}
              {!partnerModal.action&&partnerModal.status==='승인'&&<button className="btn-ghost" onClick={()=>{handleReject(partnerModal.id);}} style={{fontSize:13,color:C.err}}>접근 정지</button>}
            </div>
          </div>
        </div>
      )}

      {/* New Annotation Modal */}
      {showNewAnnot&&(
        <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.7)',display:'flex',alignItems:'center',justifyContent:'center',zIndex:1000}} onClick={()=>setShowNewAnnot(false)}>
          <div style={{background:'#162E22',border:'1px solid #2D4A38',borderRadius:8,padding:'24px',width:420,animation:'fadeIn .2s ease',boxShadow:'0 8px 32px rgba(0,0,0,.5)'}} onClick={e=>e.stopPropagation()}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16}}>
              <h3 style={{fontSize:15,fontWeight:700,color:C.text}}>주석 추가</h3>
              <button onClick={()=>setShowNewAnnot(false)} style={{background:'transparent',border:'none',cursor:'pointer',color:C.muted}}><Icon name="x" size={18}/></button>
            </div>
            <div style={{marginBottom:12}}>
              <label style={{display:'block',fontSize:11,color:C.muted,marginBottom:4}}>주석 내용</label>
              <textarea value={newAnnotText} onChange={e=>setNewAnnotText(e.target.value)} placeholder="감수 메모를 입력하세요..." style={{width:'100%',background:'#0D1F18',border:'1px solid #2D4A38',borderRadius:4,padding:'8px 10px',color:C.text,fontSize:12,fontFamily:'inherit',outline:'none',resize:'vertical',minHeight:80}} onFocus={e=>e.target.style.borderColor=C.accent} onBlur={e=>e.target.style.borderColor='#2D4A38'}/>
            </div>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginBottom:16}}>
              {[['X 좌표 (%)','52'],['Y 좌표 (%)','44']].map(([lbl,ph])=>(
                <div key={lbl}>
                  <label style={{display:'block',fontSize:11,color:C.muted,marginBottom:4}}>{lbl}</label>
                  <input defaultValue={ph} style={{width:'100%',background:'#0D1F18',border:'1px solid #2D4A38',borderRadius:4,padding:'7px 10px',color:C.text,fontSize:12,fontFamily:'inherit',outline:'none'}} onFocus={e=>e.target.style.borderColor=C.accent} onBlur={e=>e.target.style.borderColor='#2D4A38'}/>
                </div>
              ))}
            </div>
            <div style={{display:'flex',gap:10,justifyContent:'flex-end'}}>
              <button className="btn-ghost" onClick={()=>setShowNewAnnot(false)} style={{fontSize:13}}>취소</button>
              <button className="btn-primary" onClick={()=>{
                if(newAnnotText.trim()){
                  const newId=annotations.length+1;
                  setAnnotations(l=>[...l,{id:newId,x:52,y:44,label:`A${newId}`,text:newAnnotText,author:'김민준',role:'내부직원',time:'2026.05.20 현재',status:'미완료',comments:[]}]);
                  showToast('주석이 등록되었습니다.');
                  setNewAnnotText('');setShowNewAnnot(false);
                }
              }} style={{fontSize:13}}>등록</button>
            </div>
          </div>
        </div>
      )}

      {/* Annotation Drawer */}
      {showAnnotDrawer&&activeAnnot&&(
        <div style={{position:'fixed',top:0,right:0,bottom:0,width:360,background:'#162E22',border:'1px solid #2D4A38',boxShadow:'-4px 0 20px rgba(0,0,0,.5)',zIndex:900,animation:'slideInRight .25s ease',overflow:'auto',padding:'20px'}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16}}>
            <div>
              <span style={{fontWeight:700,fontSize:15,color:C.text}}>{activeAnnot.label}</span>
              <span style={{marginLeft:10,fontSize:11,padding:'2px 8px',borderRadius:3,background:activeAnnot.status==='완료'?'rgba(74,222,128,.15)':'rgba(251,191,36,.12)',color:activeAnnot.status==='완료'?C.accent:C.warn,border:`1px solid ${activeAnnot.status==='완료'?'rgba(74,222,128,.3)':'rgba(251,191,36,.3)'}`}}>{activeAnnot.status}</span>
            </div>
            <button onClick={()=>setShowAnnotDrawer(false)} style={{background:'transparent',border:'none',cursor:'pointer',color:C.muted}}><Icon name="x" size={18}/></button>
          </div>
          <div style={{background:'#0D1F18',borderRadius:6,padding:'12px',marginBottom:14,fontSize:13,color:C.text,lineHeight:1.6}}>{activeAnnot.text}</div>
          <div style={{fontSize:11,color:C.muted,marginBottom:16}}>작성자: {activeAnnot.author} · {activeAnnot.role} · {activeAnnot.time}</div>
          <div style={{borderTop:'1px solid #2D4A38',paddingTop:14,marginBottom:14}}>
            <div style={{fontSize:11,color:C.muted,fontWeight:600,marginBottom:10}}>댓글 스레드 ({activeAnnot.comments.length})</div>
            {activeAnnot.comments.map(c=>(
              <div key={c.id} style={{padding:'10px',background:'#0D1F18',borderRadius:4,marginBottom:8,borderLeft:`3px solid ${C.primary}`}}>
                <div style={{display:'flex',gap:8,marginBottom:4}}>
                  <span style={{fontSize:12,fontWeight:600,color:C.text}}>{c.author}</span>
                  <span className="tag tag-blue" style={{fontSize:10}}>{c.role}</span>
                </div>
                <div style={{fontSize:12,color:C.muted,marginBottom:4}}>{c.text}</div>
                <div style={{fontSize:10,color:'rgba(123,189,160,0.5)'}}>{c.time}</div>
              </div>
            ))}
          </div>
          <div>
            <textarea placeholder="댓글 입력..." style={{width:'100%',background:'#0D1F18',border:'1px solid #2D4A38',borderRadius:4,padding:'8px 10px',color:C.text,fontSize:12,fontFamily:'inherit',outline:'none',resize:'none',height:72,marginBottom:8}} onFocus={e=>e.target.style.borderColor=C.accent} onBlur={e=>e.target.style.borderColor='#2D4A38'}/>
            <div style={{display:'flex',gap:8}}>
              <button className="btn-primary" onClick={()=>showToast('댓글이 등록되었습니다.')} style={{fontSize:12,flex:1}}>댓글 등록</button>
              {activeAnnot.status!=='완료'&&<button className="btn-ghost" onClick={()=>{setAnnotations(l=>l.map(x=>x.id===activeAnnot.id?{...x,status:'완료'}:x));setActiveAnnot(a=>({...a,status:'완료'}));showToast('완료 처리되었습니다.');}} style={{fontSize:12,color:C.accent}}>완료 처리</button>}
            </div>
          </div>
        </div>
      )}

      {toast&&<Toast msg={toast} onClose={()=>setToast(null)}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
