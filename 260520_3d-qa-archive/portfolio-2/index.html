<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>3D 감수 데이터 관리 플랫폼 — 구현 데모</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://unpkg.com/prop-types/prop-types.min.js"></script>
<script src="https://unpkg.com/react-is@18/umd/react-is.production.min.js"></script>
<script src="https://unpkg.com/recharts/umd/Recharts.js"></script>
<script src="https://unpkg.com/@phosphor-icons/web@2.1.1/src/index.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body,#root{width:100%;height:100%;background:#1A1100;font-family:'Pretendard',sans-serif;color:#FEF3C7}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes pageSlide{from{opacity:0;transform:translateX(16px)}to{opacity:1;transform:translateX(0)}}
@keyframes countUp{from{opacity:0;transform:scale(0.85)}to{opacity:1;transform:scale(1)}}
@keyframes cardRise{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes glowPulse{0%,100%{box-shadow:0 0 0 0 rgba(245,158,11,0.3)}50%{box-shadow:0 0 16px 4px rgba(245,158,11,0.12)}}
::-webkit-scrollbar{width:5px;background:#1A1100}::-webkit-scrollbar-thumb{background:#7C4A00;border-radius:3px}
.btn-amber{background:linear-gradient(135deg,#7C4A00,#A86200);border:none;color:#FEF3C7;padding:8px 18px;border-radius:8px;cursor:pointer;font-family:inherit;font-size:13px;font-weight:600;transition:all .2s;box-shadow:0 2px 8px rgba(124,74,0,.35)}
.btn-amber:hover{background:linear-gradient(135deg,#A86200,#CC7A00);box-shadow:0 4px 16px rgba(245,158,11,.3);transform:translateY(-1px)}
.btn-outline{background:transparent;border:1.5px solid #7C4A00;color:#D9A84A;padding:7px 16px;border-radius:8px;cursor:pointer;font-family:inherit;font-size:13px;font-weight:500;transition:all .2s}
.btn-outline:hover{border-color:#F59E0B;color:#FEF3C7;background:rgba(245,158,11,.08)}
.card{background:#271A00;border:1px solid #3D2800;border-radius:10px;transition:all .22s}
.card:hover{border-color:#7C4A00;box-shadow:0 4px 20px rgba(124,74,0,.2);transform:translateY(-2px)}
.badge{display:inline-flex;align-items:center;padding:2px 9px;border-radius:12px;font-size:11px;font-weight:600}
.badge-amber{background:rgba(245,158,11,.15);color:#F59E0B;border:1px solid rgba(245,158,11,.3)}
.badge-green{background:rgba(52,211,153,.12);color:#34D399;border:1px solid rgba(52,211,153,.25)}
.badge-red{background:rgba(248,113,113,.12);color:#F87171;border:1px solid rgba(248,113,113,.25)}
.badge-blue{background:rgba(147,197,253,.1);color:#93C5FD;border:1px solid rgba(147,197,253,.2)}
.badge-gray{background:rgba(156,163,175,.1);color:#9CA3AF;border:1px solid rgba(156,163,175,.2)}
.toast-amber{position:fixed;bottom:28px;right:28px;background:#271A00;border:1px solid #7C4A00;color:#FEF3C7;padding:12px 20px;border-radius:10px;font-size:13px;z-index:9999;animation:fadeIn .2s ease;box-shadow:0 4px 20px rgba(0,0,0,.5)}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useRef}=React;
const {BarChart,Bar,XAxis,YAxis,Tooltip,ResponsiveContainer,RadarChart,Radar,PolarGrid,PolarAngleAxis,LineChart,Line,CartesianGrid,Legend,PieChart,Pie,Cell}=Recharts;

const C={
  bg:'#1A1100',surface:'#271A00',surface2:'#331E00',
  border:'#3D2800',border2:'#5A3A00',
  amber:'#F59E0B',gold:'#D9A84A',primary:'#7C4A00',
  text:'#FEF3C7',muted:'#D9A84A',subtle:'#8B6914',
  green:'#34D399',red:'#F87171',blue:'#93C5FD',
};

const MODELS_DATA=[
  {id:1,name:'피규어-드래곤 v2.3',category:'피규어',status:'감수중',partner:'(주)아트팩토리',date:'2026.05.18',annotCount:7,format:'OBJ',pantone:'PANTONE 485 C',pantoneHex:'#DA291C'},
  {id:2,name:'봉제인형-북극곰 v1.0',category:'봉제인형',status:'완료',partner:'협력사A',date:'2026.05.15',annotCount:12,format:'STL',pantone:'PANTONE 300 C',pantoneHex:'#005FA7'},
  {id:3,name:'배지-벚꽃 한정판',category:'뱃지',status:'대기',partner:'(주)디자인코',date:'2026.05.20',annotCount:0,format:'OBJ',pantone:'PANTONE 217 C',pantoneHex:'#E8A0B4'},
  {id:4,name:'피규어-우주비행사 v3.1',category:'피규어',status:'완료',partner:'협력사B',date:'2026.05.10',annotCount:15,format:'OBJ',pantone:'PANTONE 7686 C',pantoneHex:'#2C4770'},
  {id:5,name:'봉제인형-판다 v2.0',category:'봉제인형',status:'감수중',partner:'(주)소프트웍스',date:'2026.05.19',annotCount:4,format:'STL',pantone:'PANTONE Black C',pantoneHex:'#2B2B2B'},
  {id:6,name:'뱃지-여름 시리즈',category:'뱃지',status:'완료',partner:'협력사A',date:'2026.05.08',annotCount:9,format:'OBJ',pantone:'PANTONE 116 C',pantoneHex:'#FFC72C'},
  {id:7,name:'피규어-마법사 v1.5',category:'피규어',status:'대기',partner:'(주)아트팩토리',date:'2026.05.21',annotCount:0,format:'STL',pantone:'PANTONE 2736 C',pantoneHex:'#3D2B96'},
  {id:8,name:'봉제인형-쿠마 v3.2',category:'봉제인형',status:'완료',partner:'협력사B',date:'2026.05.12',annotCount:18,format:'OBJ',pantone:'PANTONE 7524 C',pantoneHex:'#C4AFA0'},
];

const PARTNER_STATS=[
  {name:'(주)아트팩토리',models:24,avgDays:6.2,annotations:187,completionRate:92,responseRate:96,quality:88},
  {name:'협력사A',models:18,avgDays:8.4,annotations:142,completionRate:83,responseRate:91,quality:79},
  {name:'협력사B',models:21,avgDays:5.8,annotations:203,completionRate:95,responseRate:98,quality:94},
  {name:'(주)소프트웍스',models:11,avgDays:10.1,annotations:89,completionRate:72,responseRate:85,quality:71},
  {name:'(주)디자인코',models:15,avgDays:7.3,annotations:121,completionRate:87,responseRate:90,quality:82},
];

const MONTHLY_DATA=[
  {month:'12월',완료:18,감수중:7,대기:4},
  {month:'1월',완료:22,감수중:9,대기:5},
  {month:'2월',완료:19,감수중:11,대기:6},
  {month:'3월',완료:31,감수중:8,대기:4},
  {month:'4월',완료:28,감수중:12,대기:7},
  {month:'5월',완료:15,감수중:9,대기:6},
];

const PANTONE_COLORS=[
  {code:'PANTONE 485 C',hex:'#DA291C',name:'빨강'},
  {code:'PANTONE 021 C',hex:'#FE5000',name:'오렌지'},
  {code:'PANTONE 116 C',hex:'#FFC72C',name:'노랑'},
  {code:'PANTONE 354 C',hex:'#00A94F',name:'초록'},
  {code:'PANTONE 300 C',hex:'#005FA7',name:'파랑'},
  {code:'PANTONE 2736 C',hex:'#3D2B96',name:'보라'},
  {code:'PANTONE 211 C',hex:'#F9A8D4',name:'핑크'},
  {code:'PANTONE 217 C',hex:'#E8A0B4',name:'연핑크'},
  {code:'PANTONE 7524 C',hex:'#C4AFA0',name:'베이지'},
  {code:'PANTONE 425 C',hex:'#555959',name:'다크그레이'},
  {code:'PANTONE 7686 C',hex:'#2C4770',name:'딥블루'},
  {code:'PANTONE Black C',hex:'#2B2B2B',name:'블랙'},
  {code:'PANTONE 144 C',hex:'#E8811A',name:'골든오렌지'},
  {code:'PANTONE 7722 C',hex:'#2D6A4F',name:'포레스트그린'},
  {code:'PANTONE 264 C',hex:'#C084FC',name:'라벤더'},
  {code:'PANTONE 127 C',hex:'#F7D060',name:'옐로우'},
  {code:'PANTONE 7637 C',hex:'#8B3A3A',name:'버건디'},
  {code:'PANTONE 279 C',hex:'#6CA0DC',name:'스카이블루'},
  {code:'PANTONE 342 C',hex:'#007A5E',name:'에메랄드'},
  {code:'PANTONE 717 C',hex:'#E8916A',name:'살구'},
];

const ADMIN_DATA=[...MODELS_DATA];

function Toast({msg,onClose}){
  useEffect(()=>{const t=setTimeout(onClose,2800);return()=>clearTimeout(t)},[]);
  return <div className="toast-amber">{msg}</div>;
}

function StatCard({icon,label,value,sub,color,delay}){
  return(
    <div className="card" style={{padding:'18px 20px',display:'flex',gap:14,alignItems:'center',animation:`countUp .4s ease ${delay||0}s both`}}>
      <div style={{width:44,height:44,borderRadius:10,background:`rgba(${color||'245,158,11'},.12)`,display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0,border:`1px solid rgba(${color||'245,158,11'},.2)`}}>
        <i className={`ph ph-${icon}`} style={{fontSize:22,color:`rgb(${color||'245,158,11'})`}}/>
      </div>
      <div>
        <div style={{fontSize:24,fontWeight:700,color:C.text,letterSpacing:'-1px'}}>{value}</div>
        <div style={{fontSize:12,color:C.muted,marginTop:1}}>{label}</div>
        {sub&&<div style={{fontSize:10,color:C.subtle,marginTop:1}}>{sub}</div>}
      </div>
    </div>
  );
}

function App(){
  const [page,setPage]=useState('main');
  const [filterCat,setFilterCat]=useState('전체');
  const [filterPantone,setFilterPantone]=useState(null);
  const [filterStatus,setFilterStatus]=useState('전체');
  const [selectedPartner,setSelectedPartner]=useState(null);
  const [toast,setToast]=useState(null);
  const [modelDetail,setModelDetail]=useState(null);
  const [editModal,setEditModal]=useState(null);
  const [deleteConfirm,setDeleteConfirm]=useState(null);
  const [adminModels,setAdminModels]=useState(ADMIN_DATA);
  const [reportLoading,setReportLoading]=useState(false);
  const [reportGenerated,setReportGenerated]=useState(false);
  const [selectedPantone,setSelectedPantone]=useState(null);
  const [searchQuery,setSearchQuery]=useState('');
  const [partnerPeriod,setPartnerPeriod]=useState('3개월');
  const [addModal,setAddModal]=useState(false);

  const showToast=msg=>setToast(msg);

  const filteredModels=MODELS_DATA.filter(m=>{
    if(filterCat!=='전체'&&m.category!==filterCat)return false;
    if(filterPantone&&!m.pantone.toLowerCase().includes(filterPantone.toLowerCase()))return false;
    if(searchQuery&&!m.name.includes(searchQuery)&&!m.partner.includes(searchQuery))return false;
    return true;
  });

  const radarData=(partner)=>[
    {subject:'처리 속도',value:Math.round(100-(partner.avgDays-3)*8),fullMark:100},
    {subject:'주석 품질',value:partner.quality,fullMark:100},
    {subject:'응답률',value:partner.responseRate,fullMark:100},
    {subject:'완료율',value:partner.completionRate,fullMark:100},
  ];

  const NAV=[
    {key:'main',label:'아카이브',icon:'archive'},
    {key:'report',label:'감수 리포트',icon:'file-text'},
    {key:'collab-stats',label:'협력사 분석',icon:'chart-bar'},
    {key:'admin-crud',label:'데이터 관리',icon:'sliders'},
    {key:'pantone',label:'색상표 조회',icon:'palette'},
  ];

  const statusBadge=(s)=>{
    if(s==='완료')return<span className="badge badge-green">{s}</span>;
    if(s==='감수중')return<span className="badge badge-amber">{s}</span>;
    if(s==='대기')return<span className="badge badge-gray">{s}</span>;
    return<span className="badge badge-blue">{s}</span>;
  };

  return(
    <div style={{display:'flex',flexDirection:'column',width:'100%',height:'100%',background:C.bg,overflow:'hidden'}}>
      {/* Global Nav */}
      <nav style={{background:'#1F1200',borderBottom:'1px solid #3D2800',padding:'0 24px',height:58,display:'flex',alignItems:'center',gap:0,flexShrink:0}}>
        <div style={{display:'flex',alignItems:'center',gap:10,marginRight:36,flexShrink:0}}>
          <div style={{width:30,height:30,borderRadius:7,background:'linear-gradient(135deg,#7C4A00,#A86200)',display:'flex',alignItems:'center',justifyContent:'center',border:'1px solid rgba(245,158,11,.3)'}}>
            <i className="ph ph-cube" style={{fontSize:16,color:C.amber}}/>
          </div>
          <span style={{fontWeight:700,fontSize:15,color:C.text,letterSpacing:'-.3px'}}>QA Archive</span>
          <span style={{fontSize:10,color:C.subtle,background:'rgba(245,158,11,.08)',border:'1px solid rgba(245,158,11,.18)',borderRadius:3,padding:'1px 6px'}}>Pro</span>
        </div>
        <div style={{display:'flex',gap:2,flex:1}}>
          {NAV.map(n=>(
            <button key={n.key} onClick={()=>setPage(n.key)} style={{display:'flex',alignItems:'center',gap:6,padding:'0 14px',height:58,background:'transparent',border:'none',borderBottom:page===n.key?`2px solid ${C.amber}`:'2px solid transparent',color:page===n.key?C.amber:C.muted,cursor:'pointer',fontFamily:'inherit',fontSize:13,fontWeight:page===n.key?600:400,transition:'all .15s',whiteSpace:'nowrap'}}>
              <i className={`ph ph-${n.icon}`} style={{fontSize:16}}/>
              {n.label}
            </button>
          ))}
        </div>
        <div style={{display:'flex',gap:10,alignItems:'center',flexShrink:0}}>
          <div style={{position:'relative'}}>
            <input value={searchQuery} onChange={e=>setSearchQuery(e.target.value)} placeholder="모델·협력사 검색..." style={{background:'#271A00',border:'1px solid #3D2800',borderRadius:8,padding:'6px 12px 6px 32px',color:C.text,fontSize:12,fontFamily:'inherit',outline:'none',width:180}} onFocus={e=>e.target.style.borderColor=C.amber} onBlur={e=>e.target.style.borderColor='#3D2800'}/>
            <i className="ph ph-magnifying-glass" style={{position:'absolute',left:10,top:'50%',transform:'translateY(-50%)',fontSize:14,color:C.subtle}}/>
          </div>
          <button onClick={()=>showToast('알림이 없습니다.')} style={{width:34,height:34,borderRadius:8,background:'transparent',border:'1px solid #3D2800',cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center'}} onMouseEnter={e=>e.currentTarget.style.borderColor=C.amber} onMouseLeave={e=>e.currentTarget.style.borderColor='#3D2800'}>
            <i className="ph ph-bell" style={{fontSize:17,color:C.muted}}/>
          </button>
          <div style={{display:'flex',alignItems:'center',gap:7,padding:'5px 10px',background:'rgba(124,74,0,.15)',border:'1px solid rgba(245,158,11,.2)',borderRadius:8,cursor:'pointer'}}>
            <div style={{width:24,height:24,borderRadius:'50%',background:'linear-gradient(135deg,#7C4A00,#A86200)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:11,fontWeight:700,color:C.text}}>김</div>
            <div>
              <div style={{fontSize:12,fontWeight:600,color:C.text,lineHeight:1.2}}>김민준</div>
              <div style={{fontSize:10,color:C.subtle}}>관리자</div>
            </div>
          </div>
        </div>
      </nav>

      {/* Page Content */}
      <div style={{flex:1,overflow:'auto'}}>

        {/* MAIN - Archive Dashboard */}
        {page==='main'&&(
          <div style={{padding:'24px',animation:'pageSlide .25s ease'}}>
            {/* Stats */}
            <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:14,marginBottom:24}}>
              <StatCard icon="cube" label="전체 모델" value={MODELS_DATA.length} sub="이번 달 +3" color="245,158,11" delay={0}/>
              <StatCard icon="check-circle" label="감수 완료" value={MODELS_DATA.filter(m=>m.status==='완료').length} sub="완료율 62.5%" color="52,211,153" delay={.05}/>
              <StatCard icon="clock" label="감수 진행중" value={MODELS_DATA.filter(m=>m.status==='감수중').length} sub="평균 7.2일 소요" color="251,191,36" delay={.1}/>
              <StatCard icon="users" label="협력사" value={PARTNER_STATS.length} sub="활성 협력사" color="147,197,253" delay={.15}/>
            </div>
            {/* Filters */}
            <div style={{display:'flex',gap:12,marginBottom:18,alignItems:'center',flexWrap:'wrap'}}>
              <div style={{display:'flex',gap:6}}>
                {['전체','피규어','봉제인형','뱃지'].map(c=>(
                  <button key={c} onClick={()=>setFilterCat(c)} style={{padding:'6px 14px',borderRadius:20,border:`1px solid ${filterCat===c?C.amber:'#3D2800'}`,background:filterCat===c?'rgba(245,158,11,.15)':'transparent',color:filterCat===c?C.amber:C.muted,cursor:'pointer',fontSize:12,fontFamily:'inherit',transition:'all .15s',fontWeight:filterCat===c?600:400}}>
                    {c}
                  </button>
                ))}
              </div>
              <div style={{width:1,height:20,background:'#3D2800'}}/>
              {filterPantone?<button onClick={()=>setFilterPantone(null)} style={{display:'flex',alignItems:'center',gap:6,padding:'5px 10px',borderRadius:16,border:'1px solid rgba(245,158,11,.4)',background:'rgba(245,158,11,.1)',color:C.amber,cursor:'pointer',fontSize:11,fontFamily:'inherit'}}>
                <div style={{width:10,height:10,borderRadius:2,background:PANTONE_COLORS.find(p=>p.name===filterPantone)?.hex||'#ccc'}}/>
                팬톤: {filterPantone} ×
              </button>:null}
              <div style={{marginLeft:'auto',fontSize:12,color:C.subtle}}>{filteredModels.length}개 모델</div>
            </div>
            {/* Model Grid */}
            <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:14}}>
              {filteredModels.map((m,i)=>(
                <div key={m.id} className="card" onClick={()=>setModelDetail(m)} style={{padding:'16px',cursor:'pointer',animation:`cardRise .35s ease ${i*.05}s both`}}>
                  <div style={{height:130,background:`linear-gradient(135deg,#271A00,#1A1100)`,borderRadius:7,marginBottom:12,display:'flex',alignItems:'center',justifyContent:'center',position:'relative',overflow:'hidden',border:'1px solid #3D2800'}}>
                    <svg viewBox="0 0 100 100" width="70" height="70" opacity="0.7">
                      <ellipse cx="50" cy="35" rx="18" ry="20" fill="none" stroke={C.amber} strokeWidth="1.5"/>
                      <rect x="32" y="52" width="36" height="28" rx="4" fill="none" stroke={C.amber} strokeWidth="1.5"/>
                      <line x1="32" y1="62" x2="18" y2="75" stroke={C.amber} strokeWidth="5" strokeLinecap="round" opacity="0.8"/>
                      <line x1="68" y1="62" x2="82" y2="75" stroke={C.amber} strokeWidth="5" strokeLinecap="round" opacity="0.8"/>
                      <line x1="40" y1="80" x2="40" y2="96" stroke={C.amber} strokeWidth="6" strokeLinecap="round" opacity="0.8"/>
                      <line x1="60" y1="80" x2="60" y2="96" stroke={C.amber} strokeWidth="6" strokeLinecap="round" opacity="0.8"/>
                    </svg>
                    <div style={{position:'absolute',top:8,left:8,display:'flex',gap:4}}>
                      <span style={{fontSize:10,padding:'2px 6px',borderRadius:3,background:'rgba(0,0,0,.5)',color:C.gold}}>{m.format}</span>
                    </div>
                    <div style={{position:'absolute',bottom:8,right:8,width:14,height:14,borderRadius:2,background:m.pantoneHex,border:'1px solid rgba(255,255,255,.2)'}} title={m.pantone}/>
                  </div>
                  <div style={{fontSize:13,fontWeight:600,color:C.text,marginBottom:6,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{m.name}</div>
                  <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:6}}>
                    {statusBadge(m.status)}
                    <span style={{fontSize:10,color:C.subtle}}>{m.date}</span>
                  </div>
                  <div style={{fontSize:11,color:C.subtle,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{m.partner}</div>
                  {m.annotCount>0&&<div style={{marginTop:6,fontSize:10,color:C.gold}}>주석 {m.annotCount}개</div>}
                </div>
              ))}
            </div>
          </div>
        )}

        {/* REPORT PAGE */}
        {page==='report'&&(
          <div style={{padding:'24px',animation:'pageSlide .25s ease'}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:24}}>
              <div>
                <h1 style={{fontSize:20,fontWeight:700,color:C.text,marginBottom:4}}>감수 리포트</h1>
                <p style={{fontSize:13,color:C.muted}}>감수 데이터 집계 · 자동 리포트 생성 · 이력 관리</p>

              <button onClick={()=>setModelDetail(null)} style={{background:'transparent',border:'none',cursor:'pointer',color:C.subtle}}><i className="ph ph-x" style={{fontSize:20}}/></button>
            </div>
            <div style={{display:'flex',gap:12,marginBottom:18}}>
              <div style={{width:100,height:100,background:'#1A1100',borderRadius:8,display:'flex',alignItems:'center',justifyContent:'center',border:'1px solid #3D2800',flexShrink:0,position:'relative'}}>
                <svg viewBox="0 0 100 100" width="60" height="60" opacity="0.8">
                  <ellipse cx="50" cy="32" rx="16" ry="18" fill="none" stroke={C.amber} strokeWidth="1.5"/>
                  <rect x="34" y="47" width="32" height="26" rx="4" fill="none" stroke={C.amber} strokeWidth="1.5"/>
                  <line x1="34" y1="55" x2="22" y2="68" stroke={C.amber} strokeWidth="4" strokeLinecap="round" opacity="0.8"/>
                  <line x1="66" y1="55" x2="78" y2="68" stroke={C.amber} strokeWidth="4" strokeLinecap="round" opacity="0.8"/>
                  <line x1="42" y1="73" x2="42" y2="88" stroke={C.amber} strokeWidth="5" strokeLinecap="round" opacity="0.8"/>
                  <line x1="58" y1="73" x2="58" y2="88" stroke={C.amber} strokeWidth="5" strokeLinecap="round" opacity="0.8"/>
                </svg>
                <div style={{position:'absolute',bottom:6,right:6,width:14,height:14,borderRadius:2,background:modelDetail.pantoneHex,border:'1px solid rgba(255,255,255,.2)'}}/>
              </div>
              <div style={{flex:1}}>
                {[['카테고리',modelDetail.category],['파일 포맷',modelDetail.format],['담당 협력사',modelDetail.partner],['등록일',modelDetail.date],['팬톤 색상',modelDetail.pantone]].map(([k,v])=>(
                  <div key={k} style={{display:'flex',justifyContent:'space-between',marginBottom:7,fontSize:12}}>
                    <span style={{color:C.muted}}>{k}</span>
                    <span style={{color:C.text,fontWeight:500}}>{v}</span>
                  </div>
                ))}
              </div>
            </div>
            {modelDetail.annotCount>0&&(
              <div style={{background:'rgba(245,158,11,.08)',border:'1px solid rgba(245,158,11,.2)',borderRadius:8,padding:'10px 14px',marginBottom:16,fontSize:12,color:C.muted}}>
                <i className="ph ph-chat-circle-text" style={{marginRight:6,color:C.amber}}/> 주석 {modelDetail.annotCount}개 · 미처리 주석 검토 필요
              </div>
            )}
            <div style={{display:'flex',gap:10,justifyContent:'flex-end'}}>
              <button className="btn-outline" onClick={()=>setModelDetail(null)} style={{fontSize:13}}>닫기</button>
              <button className="btn-outline" onClick={()=>{setEditModal(modelDetail);setModelDetail(null);}} style={{fontSize:13,display:'flex',alignItems:'center',gap:5}}>
                <i className="ph ph-pencil"/>수정
              </button>
              <button className="btn-amber" onClick={()=>{showToast('3D 뷰어로 이동합니다.');setModelDetail(null);}} style={{fontSize:13,display:'flex',alignItems:'center',gap:5}}>
                <i className="ph ph-cube"/>뷰어 열기
              </button>
            </div>
          </div>
        </div>
      )}

      {/* Edit Modal */}
      {editModal&&(
        <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,.75)',display:'flex',alignItems:'center',justifyContent:'center',zIndex:1000}} onClick={()=>setEditModal(null)}>
          <div style={{background:'#271A00',border:'1px solid #3D2800',borderRadius:12,padding:'26px',width:440,animation:'fadeIn .2s ease',boxShadow:'0 12px 40px rgba(0,0,0,.6)'}} onClick={e=>e.stopPropagation()}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:20}}>
              <h3 style={{fontSize:15,fontWeight:700,color:C.text}}>모델 정보 수정</h3>
              <button onClick={()=>setEditModal(null)} style={{background:'transparent',border:'none',cursor:'pointer',color:C.subtle}}><i className="ph ph-x" style={{fontSize:20}}/></button>
            </div>
            <div style={{display:'flex',flexDirection:'column',gap:12}}>
              {[['모델명',editModal.name],['카테고리',editModal.category],['담당 협력사',editModal.partner],['팬톤 색상코드',editModal.pantone]].map(([lbl,val])=>(
                <div key={lbl}>
                  <label style={{display:'block',fontSize:11,color:C.muted,marginBottom:4,fontWeight:500}}>{lbl}</label>
                  <input defaultValue={val} style={{width:'100%',background:'#1A1100',border:'1px solid #3D2800',borderRadius:8,padding:'9px 12px',color:C.text,fontSize:13,fontFamily:'inherit',outline:'none'}} onFocus={e=>e.target.style.borderColor=C.amber} onBlur={e=>e.target.style.borderColor='#3D2800'}/>
                </div>
              ))}
              <div>
                <label style={{display:'block',fontSize:11,color:C.muted,marginBottom:4,fontWeight:500}}>감수 상태</label>
                <select defaultValue={editModal.status} style={{width:'100%',background:'#1A1100',border:'1px solid #3D2800',borderRadius:8,padding:'9px 12px',color:C.text,fontSize:13,fontFamily:'inherit',outline:'none',appearance:'none'}}>
                  <option>대기</option><option>감수중</option><option>완료</option>
                </select>
              </div>
            </div>
            <div style={{display:'flex',gap:10,justifyContent:'flex-end',marginTop:20}}>
              <button className="btn-outline" onClick={()=>setEditModal(null)} style={{fontSize:13}}>취소</button>
              <button className="btn-amber" onClick={()=>{showToast('모델 정보가 수정되었습니다.');setEditModal(null);}} style={{fontSize:13}}>저장</button>
            </div>
          </div>
        </div>
      )}

      {/* Delete Confirm */}
      {deleteConfirm&&(
        <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,.75)',display:'flex',alignItems:'center',justifyContent:'center',zIndex:1000}} onClick={()=>setDeleteConfirm(null)}>
          <div style={{background:'#271A00',border:'1px solid rgba(248,113,113,.35)',borderRadius:12,padding:'28px',width:380,animation:'fadeIn .2s ease',boxShadow:'0 12px 40px rgba(0,0,0,.6)'}} onClick={e=>e.stopPropagation()}>
            <div style={{display:'flex',gap:12,alignItems:'flex-start',marginBottom:18}}>
              <div style={{width:40,height:40,borderRadius:8,background:'rgba(248,113,113,.1)',border:'1px solid rgba(248,113,113,.3)',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>
                <i className="ph ph-warning" style={{fontSize:20,color:C.red}}/>
              </div>
              <div>
                <h3 style={{fontSize:15,fontWeight:700,color:C.text,marginBottom:4}}>모델 삭제</h3>
                <p style={{fontSize:13,color:C.muted}}>"{deleteConfirm.name}"을(를) 삭제하시겠습니까? 관련 주석 및 감수 이력도 함께 삭제됩니다.</p>
              </div>
            </div>
            <div style={{display:'flex',gap:10,justifyContent:'flex-end'}}>
              <button className="btn-outline" onClick={()=>setDeleteConfirm(null)} style={{fontSize:13}}>취소</button>
              <button onClick={()=>{setAdminModels(l=>l.filter(m=>m.id!==deleteConfirm.id));showToast(`${deleteConfirm.name}이 삭제되었습니다.`);setDeleteConfirm(null);}} style={{padding:'7px 16px',borderRadius:8,border:'none',background:C.red,color:'#fff',cursor:'pointer',fontFamily:'inherit',fontSize:13,fontWeight:600}}>삭제 확인</button>
            </div>
          </div>
        </div>
      )}

      {/* Add Model Modal */}
      {addModal&&(
        <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,.75)',display:'flex',alignItems:'center',justifyContent:'center',zIndex:1000}} onClick={()=>setAddModal(false)}>
          <div style={{background:'#271A00',border:'1px solid #3D2800',borderRadius:12,padding:'26px',width:460,animation:'fadeIn .2s ease',boxShadow:'0 12px 40px rgba(0,0,0,.6)'}} onClick={e=>e.stopPropagation()}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:20}}>
              <h3 style={{fontSize:15,fontWeight:700,color:C.text}}>모델 등록</h3>
              <button onClick={()=>setAddModal(false)} style={{background:'transparent',border:'none',cursor:'pointer',color:C.subtle}}><i className="ph ph-x" style={{fontSize:20}}/></button>
            </div>
            {/* Drop zone */}
            <div style={{border:'2px dashed #5A3A00',borderRadius:10,padding:'24px',textAlign:'center',marginBottom:16,cursor:'pointer',transition:'all .2s'}} onMouseEnter={e=>{e.currentTarget.style.borderColor=C.amber;e.currentTarget.style.background='rgba(124,74,0,.1)';}} onMouseLeave={e=>{e.currentTarget.style.borderColor='#5A3A00';e.currentTarget.style.background='transparent';}}>
              <i className="ph ph-upload-simple" style={{fontSize:28,color:C.subtle,marginBottom:8}}/>
              <div style={{fontSize:13,color:C.muted,marginBottom:4}}>파일을 드래그하거나 클릭</div>
              <div style={{fontSize:11,color:C.subtle}}>OBJ · STL · ZIP (최대 500MB)</div>
            </div>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12,marginBottom:16}}>
              {[['모델명','피규어-신규 v1.0'],['카테고리','피규어'],['담당 협력사','(주)아트팩토리'],['팬톤 색상코드','PANTONE 485 C']].map(([lbl,ph])=>(
                <div key={lbl}>
                  <label style={{display:'block',fontSize:11,color:C.muted,marginBottom:4,fontWeight:500}}>{lbl}</label>
                  <input placeholder={ph} style={{width:'100%',background:'#1A1100',border:'1px solid #3D2800',borderRadius:8,padding:'8px 11px',color:C.text,fontSize:12,fontFamily:'inherit',outline:'none'}} onFocus={e=>e.target.style.borderColor=C.amber} onBlur={e=>e.target.style.borderColor='#3D2800'}/>
                </div>
              ))}
            </div>
            <div style={{display:'flex',gap:10,justifyContent:'flex-end'}}>
              <button className="btn-outline" onClick={()=>setAddModal(false)} style={{fontSize:13}}>취소</button>
              <button className="btn-amber" onClick={()=>{showToast('모델이 등록되었습니다.');setAddModal(false);}} style={{fontSize:13}}>등록</button>
            </div>
          </div>
        </div>
      )}

      {/* Footer */}
      <div style={{background:'#1F1200',borderTop:'1px solid #3D2800',padding:'10px 24px',display:'flex',justifyContent:'space-between',alignItems:'center',flexShrink:0}}>
        <span style={{fontSize:11,color:C.subtle}}>QA Archive Pro — 3D 감수 데이터 관리 플랫폼</span>
        <div style={{display:'flex',gap:16,fontSize:11,color:C.subtle}}>
          <span>API 서버: 정상</span>
          <span>·</span>
          <span>마지막 동기화: 방금 전</span>
          <span>·</span>
          <span>v2.0.0</span>
        </div>
      </div>

      {toast&&<Toast msg={toast} onClose={()=>setToast(null)}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
