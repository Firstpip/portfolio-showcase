// ── STYLES ──
const css = `
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Pretendard', sans-serif; background: #F5F6F8; color: #1A1F2E; overflow-x: hidden; }

/* NAV */

}

.btn-solid {

}

}

}

}

.hs-num { font-size: 28px; font-weight: 800; color: #2E4057; letter-spacing: -1px; line-height: 1; }
.hs-label { font-size: 12px; color: #5A6478; margin-top: 4px; }
.hero-accent-bar {
  position: absolute; right: -10px; top: 40px;

  font-size: 10px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: #fff;
}

/* PAGE CONTAINER */
.page-container { max-width: 1280px; margin: 0 auto; padding: 80px 48px; }
.page-header { margin-bottom: 56px; }
.page-tag {
  font-size: 11px; font-weight: 700; letter-spacing: 4px; text-transform: uppercase;
  color: #00B2A9; display: flex; align-items: center; gap: 8px; margin-bottom: 12px;
}
.page-tag::before { content: ''; width: 20px; height: 1px; background: #00B2A9; }
.page-title { font-size: clamp(28px, 3vw, 40px); font-weight: 800; letter-spacing: -1px; line-height: 1.2; }
.page-desc { font-size: 16px; color: #5A6478; margin-top: 12px; max-width: 500px; line-height: 1.7; }

/* SAFETY PAGE */
.safety-kpi-row {
  display: grid; grid-template-columns: repeat(4, 1fr); gap: 2px; margin-bottom: 48px;
}
.kpi-card {
  background: #fff; padding: 28px 24px;
  border-top: 3px solid transparent;
  transition: border-top-color 0.3s, box-shadow 0.3s;
  border-radius: 14px;
  box-shadow: 0 2px 8px rgba(46,64,87,0.06);
  animation: fadeUp 0.5s ease both;
}
.kpi-card:hover { border-top-color: #00B2A9; box-shadow: 0 8px 24px rgba(46,64,87,0.12); }
.kpi-icon { font-size: 28px; color: #00B2A9; margin-bottom: 12px; }
.kpi-num { font-size: 32px; font-weight: 800; color: #2E4057; letter-spacing: -1px; line-height: 1; margin-bottom: 4px; }
.kpi-label { font-size: 12px; color: #5A6478; }
.charts-grid {
  display: grid; grid-template-columns: 1fr 1fr; gap: 24px; margin-bottom: 48px;
}
.chart-card { background: #fff; border: 1px solid #D8DCE6; padding: 28px; }
.chart-card-title {
  font-size: 15px; font-weight: 700; margin-bottom: 4px;
}
.chart-card-desc { font-size: 12px; color: #5A6478; margin-bottom: 24px; }
.safety-flow {
  background: #fff; border: 1px solid #D8DCE6; padding: 40px;
}
.flow-title { font-size: 16px; font-weight: 700; margin-bottom: 32px; }
.flow-steps {
  display: flex; gap: 0; align-items: stretch;
}
.flow-step {
  flex: 1; text-align: center; padding: 28px 16px;
  background: #EEF0F4; position: relative;
}
.flow-step:not(:last-child)::after {
  content: '';
  position: absolute; right: -12px; top: 50%; transform: translateY(-50%);
  width: 0; height: 0;
  border-top: 12px solid transparent;
  border-bottom: 12px solid transparent;
  border-left: 12px solid #00B2A9;
  z-index: 10;
}
.flow-step:nth-child(odd) { background: #2E4057; }
.flow-step:nth-child(odd) .fs-num { color: #00B2A9; }
.flow-step:nth-child(odd) .fs-label { color: rgba(255,255,255,0.8); }
.flow-step:nth-child(odd) .fs-icon { color: rgba(0,178,169,0.6); }
.fs-num { font-size: 11px; font-weight: 700; letter-spacing: 2px; color: #00B2A9; margin-bottom: 8px; }
.fs-icon { font-size: 28px; color: #2E4057; margin-bottom: 8px; }
.fs-label { font-size: 12px; font-weight: 600; color: #5A6478; }

/* PORTFOLIO PAGE */
.pf-filter { display: flex; gap: 8px; margin-bottom: 36px; }
.pf-filter-btn {
  padding: 8px 20px;
  background: transparent; border: 1px solid #D8DCE6;
  color: #5A6478; font-family: 'Pretendard', sans-serif; font-size: 13px; font-weight: 600;
  cursor: pointer; transition: all 0.2s;
}
.pf-filter-btn.active { background: #2E4057; border-color: #2E4057; color: #fff; }
.pf-filter-btn:hover:not(.active) { border-color: #00B2A9; color: #00B2A9; }
.pf-grid {
  display: grid; grid-template-columns: repeat(3, 1fr); gap: 2px;
}
.pf-card {
  background: #fff; border: 1px solid #D8DCE6;
  cursor: pointer; transition: box-shadow 0.2s, border-color 0.2s;
  overflow: hidden;
  border-radius: 14px;
  box-shadow: 0 2px 8px rgba(46,64,87,0.06);
  animation: cardReveal 0.4s ease both;
}
.pf-card:hover { box-shadow: 0 12px 36px rgba(46,64,87,0.16); border-color: #00B2A9; }
.pf-card-img {
  height: 180px; display: flex; align-items: center; justify-content: center;
  font-size: 56px; position: relative; overflow: hidden;
}
.pf-card-img.civil { background: linear-gradient(135deg, #2E4057, #1e2f42); color: rgba(0,178,169,0.3); }
.pf-card-img.private { background: linear-gradient(135deg, #1a3020, #0f1f14); color: rgba(0,178,169,0.25); }
.pf-card-img.plant { background: linear-gradient(135deg, #3d2a10, #251a08); color: rgba(201,162,39,0.25); }
.pf-card-body { padding: 20px; }
.pf-card-cat {
  font-size: 10px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase;
  color: #00B2A9; margin-bottom: 6px;
}
.pf-card-name { font-size: 15px; font-weight: 700; margin-bottom: 6px; color: #1A1F2E; }
.pf-card-meta { font-size: 12px; color: #5A6478; }
.pf-card-arrow {
  display: flex; justify-content: flex-end; padding: 12px 20px;
  border-top: 1px solid #EEF0F4; color: #00B2A9; font-size: 18px;
}

/* PF MODAL */
.pf-modal-backdrop {
  position: fixed; inset: 0; z-index: 500;
  background: rgba(26,31,46,0.7); backdrop-filter: blur(8px);
  display: flex; align-items: center; justify-content: center; padding: 40px;
}
.pf-modal {
  background: #fff; max-width: 680px; width: 100%;
  border-top: 4px solid #00B2A9; max-height: 90vh; overflow-y: auto;
}
.pf-modal-header {

  display: flex; justify-content: space-between; align-items: flex-start;

}

}
.pf-modal-close:hover { border-color: #00B2A9; color: #00B2A9; }
.pf-modal-cat { font-size: 10px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: #00B2A9; margin-bottom: 6px; }
.pf-modal-title { font-size: 20px; font-weight: 800; }
.pf-modal-body { padding: 28px 32px; }
.pf-modal-img {
  height: 200px; margin-bottom: 28px;
  display: flex; align-items: center; justify-content: center; font-size: 64px; color: #D8DCE6;
  border: 1px solid #D8DCE6; background: #EEF0F4;
}
.pf-modal-specs {
  display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin-bottom: 20px;
}
.pf-spec-label { font-size: 10px; font-weight: 600; letter-spacing: 2px; text-transform: uppercase; color: #5A6478; margin-bottom: 4px; }
.pf-spec-value { font-size: 14px; font-weight: 700; }
.pf-modal-desc { font-size: 14px; color: #5A6478; line-height: 1.7; }
.pf-modal-tag-row { display: flex; gap: 8px; margin-top: 16px; flex-wrap: wrap; }
.pf-tag {
  padding: 4px 12px; background: #EEF0F4;
  font-size: 11px; font-weight: 600; color: #5A6478;
}
.pf-tag.accent { background: #e6f9f8; color: #00B2A9; }

/* RECRUIT PAGE */
.recruit-intro {
  display: grid; grid-template-columns: 1fr 1fr; gap: 60px; align-items: start; margin-bottom: 56px;
}
.recruit-why { }
.recruit-why-title { font-size: 18px; font-weight: 700; margin-bottom: 16px; }
.why-list { display: flex; flex-direction: column; gap: 12px; }
.why-item {
  display: flex; gap: 12px; align-items: flex-start;
  padding: 16px; background: #fff; border: 1px solid #D8DCE6;
  border-radius: 14px;
  box-shadow: 0 2px 8px rgba(46,64,87,0.05);
  animation: fadeUp 0.5s ease both;
}
.why-icon { font-size: 20px; color: #00B2A9; flex-shrink: 0; margin-top: 2px; }
.why-text .title { font-size: 14px; font-weight: 700; margin-bottom: 2px; }
.why-text .desc { font-size: 12px; color: #5A6478; }
.recruit-benefits { }
.recruit-benefits-title { font-size: 18px; font-weight: 700; margin-bottom: 16px; }
.benefit-chips { display: flex; flex-wrap: wrap; gap: 8px; }
.benefit-chip {
  padding: 8px 16px; background: #EEF0F4;
  font-size: 13px; font-weight: 600; color: #2E4057;
  border: 1px solid #D8DCE6;
}
.jobs-section-title { font-size: 18px; font-weight: 700; margin-bottom: 20px; }
.job-list { display: flex; flex-direction: column; gap: 2px; }
.job-item {
  background: #fff; border: 1px solid #D8DCE6; overflow: hidden;
  transition: border-color 0.2s;
}
.job-item.open { border-color: #00B2A9; }
.job-header {
  padding: 20px 24px;
  display: flex; justify-content: space-between; align-items: center;
  cursor: pointer;
}
.job-title-area { display: flex; gap: 12px; align-items: center; }
.job-badge {
  padding: 4px 10px; font-size: 11px; font-weight: 700; letter-spacing: 1px;
}
.job-badge.new { background: #e6f9f8; color: #00B2A9; }
.job-badge.reg { background: #EEF0F4; color: #5A6478; }
.job-name { font-size: 15px; font-weight: 700; }
.job-meta { display: flex; gap: 16px; align-items: center; }
.job-dept { font-size: 12px; color: #5A6478; }
.job-arrow { font-size: 20px; color: #00B2A9; transition: transform 0.3s; }
.job-item.open .job-arrow { transform: rotate(180deg); }
.job-detail {
  display: none; padding: 0 24px 24px;
  border-top: 1px solid #EEF0F4; padding-top: 20px;
}
.job-item.open .job-detail { display: block; }
.jd-section { margin-bottom: 16px; }
.jd-section-title { font-size: 12px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; color: #00B2A9; margin-bottom: 8px; }
.jd-list { list-style: none; display: flex; flex-direction: column; gap: 4px; }
.jd-list li { font-size: 14px; color: #5A6478; padding-left: 16px; position: relative; }
.jd-list li::before { content: '·'; position: absolute; left: 4px; color: #00B2A9; }
.job-apply-btn {
  margin-top: 16px;
  background: #00B2A9; color: #fff; border: none;
  padding: 12px 28px;
  font-family: 'Pretendard', sans-serif; font-size: 13px; font-weight: 700; cursor: pointer;
  transition: background 0.2s;
}
.job-apply-btn:hover { background: #00c9bf; }

/* APPLY MODAL */
.apply-modal-backdrop {
  position: fixed; inset: 0; z-index: 600;
  background: rgba(26,31,46,0.7); backdrop-filter: blur(8px);
  display: flex; align-items: center; justify-content: center; padding: 40px;
}
.apply-modal {
  background: #fff; max-width: 560px; width: 100%;
  border-top: 4px solid #00B2A9; max-height: 90vh; overflow-y: auto;
}
.apply-modal-header {
  padding: 24px 28px; border-bottom: 1px solid #D8DCE6;
  display: flex; justify-content: space-between; align-items: center;
}
.apply-modal-title { font-size: 18px; font-weight: 800; }
.apply-modal-body { padding: 28px; }
.aform-row { margin-bottom: 14px; }
.aform-label {
  display: block; font-size: 11px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase;
  color: #5A6478; margin-bottom: 6px;
}
.aform-input, .aform-textarea {
  width: 100%; padding: 12px 14px;
  background: #F5F6F8; border: 1px solid #D8DCE6;
  font-family: 'Pretendard', sans-serif; font-size: 14px; color: #1A1F2E;
  outline: none; transition: border-color 0.2s;
}
.aform-input:focus, .aform-textarea:focus { border-color: #00B2A9; }
.aform-textarea { height: 100px; resize: vertical; }
.aform-row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.aform-submit {
  width: 100%; background: #00B2A9; color: #fff; border: none;
  padding: 14px;
  font-family: 'Pretendard', sans-serif; font-size: 14px; font-weight: 700; cursor: pointer;
  margin-top: 4px; transition: background 0.2s;
}
.aform-submit:hover { background: #00c9bf; }
.apply-success {
  padding: 32px; text-align: center;
}
.apply-success-icon { font-size: 48px; color: #00B2A9; margin-bottom: 12px; }
.apply-success p { font-size: 14px; color: #5A6478; }

/* HOME (main) */
.home-content { padding: 64px 0; }

/* SECTION DIVIDER */
.section-divider {
  height: 1px; background: #D8DCE6; margin: 0 0 48px;
}

/* TOAST */
.toast-wrap {
  position: fixed; bottom: 24px; right: 24px; z-index: 9999;
  display: flex; flex-direction: column; gap: 8px;
}
.toast-item {
  background: #fff; border: 1px solid #D8DCE6; border-left: 3px solid #00B2A9;
  padding: 12px 16px; font-size: 13px;
  display: flex; align-items: center; gap: 8px; min-width: 260px;
  box-shadow: 0 4px 20px rgba(26,31,46,0.1);
  border-radius: 14px;
  animation: toastIn 0.3s ease;
}
@keyframes toastIn {
  from { opacity: 0; transform: translateX(20px); }
  to { opacity: 1; transform: translateX(0); }
}
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}
@keyframes cardReveal {
  from { opacity: 0; transform: scale(0.97); }
  to { opacity: 1; transform: scale(1); }
}
.toast-icon { color: #00B2A9; font-size: 16px; }

/* RESPONSIVE */
@media (max-width: 1024px) {

              <div className="job-meta">

                <i className="ph ph-caret-down job-arrow" />
              </div>
            </div>
            <div className="job-detail">
              <div className="jd-section">
                <div className="jd-section-title">지원 자격</div>
                <ul className="jd-list">{job.qualifications.map(q => <li key={q}>{q}</li>)}</ul>
              </div>
              <div className="jd-section">
                <div className="jd-section-title">주요 업무</div>
                <ul className="jd-list">{job.tasks.map(t => <li key={t}>{t}</li>)}</ul>
              </div>
              <div className="jd-section">
                <div className="jd-section-title">우대 혜택</div>
                <ul className="jd-list">{job.benefits.map(b => <li key={b}>{b}</li>)}</ul>
              </div>
              <button className="job-apply-btn" onClick={() => { setApplyModal(job); setSubmitted(false); }}>
                이 직무에 지원하기
              </button>
            </div>
          </div>
        ))}
      </div>

      {applyModal && (
        <div className="apply-modal-backdrop" onClick={e => e.target === e.currentTarget && setApplyModal(null)}>
          <div className="apply-modal">
            <div className="apply-modal-header">
              <div className="apply-modal-title">{applyModal.title} 지원</div>
              <button className="pf-modal-close" onClick={() => setApplyModal(null)}>
                <i className="ph ph-x" />
              </button>
            </div>
            <div className="apply-modal-body">
              {submitted ? (
                <div className="apply-success">
                  <div className="apply-success-icon"><i className="ph ph-check-circle" /></div>
                  <p>지원서가 접수되었습니다. 서류 검토 후 영업일 5일 이내 연락드립니다.</p>
                </div>
              ) : (
                <form onSubmit={handleApply}>
                  <div className="aform-row-2">
                    <div className="aform-row">
                      <label className="aform-label">이름</label>
                      <input className="aform-input" type="text" placeholder="홍길동" required />
                    </div>
                    <div className="aform-row">
                      <label className="aform-label">연락처</label>
                      <input className="aform-input" type="tel" placeholder="010-1234-5678" required />
                    </div>
                  </div>
                  <div className="aform-row">
                    <label className="aform-label">이메일</label>
                    <input className="aform-input" type="email" placeholder="applicant@email.com" required />
                  </div>
                  <div className="aform-row">
                    <label className="aform-label">경력 요약</label>
                    <textarea className="aform-textarea" placeholder="관련 경력 및 주요 프로젝트를 간략히 작성해 주세요." required />
                  </div>
                  <button type="submit" className="aform-submit">지원서 제출하기</button>
                </form>
              )}
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// ── APP ──
function App() {
  const [page, setPage] = useState('main');
  const [elevated, setElevated] = useState(false);
  const [toasts, setToasts] = useState([]);

  useEffect(() => {
    const handler = () => setElevated(window.scrollY > 10);
    window.addEventListener('scroll', handler);
    return () => window.removeEventListener('scroll', handler);
  }, []);

  const showToast = useCallback((msg) => {
    const id = Date.now();
    setToasts(prev => [...prev, { id, msg }]);
    setTimeout(() => setToasts(prev => prev.filter(t => t.id !== id)), 3500);
  }, []);

  const TABS = [
    { key: 'main', label: '홈' },
    { key: 'safety', label: '안전·품질' },
    { key: 'portfolio', label: '공사 실적' },
    { key: 'recruit', label: '채용안내' },
  ];

  return (
    <>
      <style>{css}</style>
      <nav className={`topnav${elevated ? ' elevated' : ''}`}>
        <div className="nav-inner">
          <div className="nav-brand" onClick={() => setPage('main')}>
            <div className="nav-brand-mark"><span>HC</span></div>
            <div className="nav-brand-text">
              <span className="ko">한국종합건설</span>
              <span className="en">Hankook Construction</span>
            </div>
          </div>
          <div className="nav-tabs">
            {TABS.map(t => (
              <button
                key={t.key}
                className={`nav-tab${page === t.key ? ' active' : ''}`}
                onClick={() => { setPage(t.key); window.scrollTo({ top: 0, behavior: 'smooth' }); }}
              >
                {t.label}
              </button>
            ))}
          </div>
          <button className="nav-action" onClick={() => { setPage('recruit'); window.scrollTo({ top: 0, behavior: 'smooth' }); }}>
            채용 지원
          </button>
        </div>
      </nav>

      <div style={{ paddingTop: 64 }}>
        {page === 'main' && <HomePage setPage={p => { setPage(p); window.scrollTo({ top: 0, behavior: 'smooth' }); }} />}
        {page === 'safety' && <SafetyPage />}
        {page === 'portfolio' && <PortfolioPage />}
        {page === 'recruit' && <RecruitPage showToast={showToast} />}
      </div>

      <footer style={{
        background: '#1A1F2E', color: '#fff', padding: '48px 0 32px',
        marginTop: 0, borderTop: '1px solid #2a3548'
      }}>
        <div style={{ maxWidth: 1280, margin: '0 auto', padding: '0 48px' }}>
          <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', marginBottom: 32 }}>
            <div>
              <div style={{ display: 'flex', alignItems: 'center', gap: 10, marginBottom: 12 }}>
                <div style={{ width: 28, height: 28, background: '#00B2A9', display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 11, fontWeight: 800 }}>HC</div>
                <span style={{ fontSize: 14, fontWeight: 700 }}>한국종합건설(주)</span>
              </div>
              <div style={{ fontSize: 12, color: '#5A6478', lineHeight: 1.7 }}>
                울산 기반 종합건설사 — 토목·건축·플랜트 전문<br />
                사업자등록번호 123-45-67890
              </div>
            </div>
            <div style={{ display: 'flex', gap: 48 }}>
              {[
                { title: '바로가기', links: ['기업소개', '공사 실적', '안전·품질', '채용안내'] },
                { title: '문의', links: ['프로젝트 문의', '협력사 등록', '오시는 길'] },
              ].map(col => (
                <div key={col.title}>
                  <div style={{ fontSize: 10, fontWeight: 700, letterSpacing: 2, textTransform: 'uppercase', color: '#00B2A9', marginBottom: 16 }}>{col.title}</div>
                  <div style={{ display: 'flex', flexDirection: 'column', gap: 10 }}>
                    {col.links.map(l => (
                      <span key={l} style={{ fontSize: 13, color: '#5A6478', cursor: 'pointer' }}>{l}</span>
                    ))}
                  </div>
                </div>
              ))}
            </div>
          </div>
          <div style={{ paddingTop: 24, borderTop: '1px solid #2a3548', display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
            <div style={{ fontSize: 12, color: '#5A6478' }}>© 2024 한국종합건설(주). All Rights Reserved.</div>
            <div style={{ display: 'flex', gap: 12 }}>
              {['ISO 9001', 'ISO 14001', 'ISO 45001'].map(c => (
                <div key={c} style={{ fontSize: 10, color: '#5A6478', border: '1px solid #2a3548', padding: '4px 10px' }}>{c}</div>
              ))}
            </div>
          </div>
        </div>
      </footer>

      <Toast toasts={toasts} />
    </>
  );
}

const root = ReactDOM.createRoot(document.getElementById('app'));
root.render(<App />);
</script>
</body>
</html>
