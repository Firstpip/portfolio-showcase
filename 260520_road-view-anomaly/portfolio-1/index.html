<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body, #root { width: 100%; min-height: 100vh; }
body {
  font-family: 'Pretendard', -apple-system, sans-serif;
  background: #0D1B2A;
  color: #E8F0F9;
}
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}
@keyframes slideInRight {
  from { transform: translateX(100%); opacity: 0; }
  to { transform: translateX(0); opacity: 1; }
}
@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.5; }
}
@keyframes scanLine {
  0% { top: 0; opacity: 0.6; }
  100% { top: 100%; opacity: 0; }
}
@keyframes markerPulse {
  0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(56, 189, 248, 0.6); }
  70% { transform: scale(1.1); box-shadow: 0 0 0 8px rgba(56, 189, 248, 0); }
  100% { transform: scale(1); }
}
@keyframes toastSlide {
  from { transform: translateX(120%); opacity: 0; }
  to { transform: translateX(0); opacity: 1; }
}
@keyframes progressFill {
  from { width: 0%; }
  to { width: var(--target-width); }
}
@keyframes countUp {
  from { opacity: 0; transform: translateY(4px); }
  to { opacity: 1; transform: translateY(0); }
}
.fade-in { animation: fadeIn 0.3s ease forwards; }
.page-transition { animation: fadeIn 0.25s ease forwards; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">

const { AreaChart, Area, BarChart, Bar, XAxis, YAxis, CartesianGrid, Tooltip, ResponsiveContainer, PieChart, Pie, Cell, LineChart, Line } = Recharts;

/* ─── 색상 팔레트 ─── */

  primaryHover: '#2A6BA3',

/* ─── 더미 데이터 ─── */
const EVENTS = [
  { id: 1, type: '배관 누출 의심', location: '3공단 A-12 구역', grade: '위험', status: '신규', assignee: '김철수', date: '2026.05.20 09:31', lat: 35.8514, lng: 128.6175, img: null },

  { id: 3, type: '시설물 이상', location: '2공단 B-07 배전반', grade: '주의', status: '조치완료', assignee: '박민준', date: '2026.05.19 17:45', lat: 35.8530, lng: 128.6200, img: null },
  { id: 4, type: '공사중/작업구역', location: '3공단 C-21 진입로', grade: '주의', status: '조치완료', assignee: '최수진', date: '2026.05.19 14:20', lat: 35.8480, lng: 128.6155, img: null },
  { id: 5, type: '배관 누출 의심', location: '1공단 D-05 가스관', grade: '위험', status: '검토중', assignee: '정우진', date: '2026.05.19 11:15', lat: 35.8510, lng: 128.6180, img: null },
  { id: 6, type: '기타 이상 후보', location: '2공단 E-18 창고동', grade: '경고', status: '신규', assignee: '한지원', date: '2026.05.18 16:30', lat: 35.8520, lng: 128.6165, img: null },
];

const ROADVIEW_POINTS = [
  { id: 1, name: 'RV-001', location: '3공단 A구역 북측', date: '2026.05.18', gps: '35.8514, 128.6175', size: '245 MB', type: '360 이미지' },
  { id: 2, name: 'RV-002', location: '1공단 메인로 북쪽', date: '2026.05.18', gps: '35.8495, 128.6142', size: '312 MB', type: '360 영상' },
  { id: 3, name: 'RV-003', location: '2공단 B구역 입구', date: '2026.05.15', gps: '35.8530, 128.6200', size: '198 MB', type: '360 이미지' },
  { id: 4, name: 'RV-004', location: '3공단 C구역 남측', date: '2026.05.15', gps: '35.8480, 128.6155', size: '278 MB', type: '360 이미지' },
];

const UPLOADS = [
  { id: 1, filename: '20260518_3공단A구역_001.jpg', size: '245 MB', gps: '자동 추출', status: '완료', date: '2026.05.18 09:00' },
  { id: 2, filename: '20260518_1공단메인로_001.mp4', size: '1.2 GB', gps: '자동 추출', status: '완료', date: '2026.05.18 09:15' },
  { id: 3, filename: '20260515_2공단B구역_003.jpg', size: '198 MB', gps: '수동 입력', status: '완료', date: '2026.05.15 14:30' },
  { id: 4, filename: '20260512_초음파_D구역.png', size: '8.5 MB', gps: 'EXIF 없음', status: '좌표 필요', date: '2026.05.12 11:20' },
];

const ALARMS = [
  { id: 1, title: '배관 누출 의심 — 미조치 72시간 경과', grade: '위험', status: '긴급', location: '3공단 A-12', date: '2026.05.17' },
  { id: 2, title: '도로 파손 — 신규 이벤트 등록', grade: '경고', status: '신규', location: '1공단 메인로', date: '2026.05.20' },
  { id: 3, title: '가스관 누출 의심 — 미조치 48시간', grade: '위험', status: '긴급', location: '1공단 D-05', date: '2026.05.18' },
  { id: 4, title: '배전반 이상 징후 — 장기 미처리', grade: '경고', status: '대기', location: '2공단 B-07', date: '2026.05.16' },
];

const MAP_MARKERS = [
  { id: 1, x: 30, y: 40, grade: '위험', type: '배관 누출', label: 'A-12' },
  { id: 2, x: 55, y: 60, grade: '경고', type: '도로 파손', label: '메인로' },
  { id: 3, x: 70, y: 30, grade: '주의', type: '시설물', label: 'B-07' },
  { id: 4, x: 20, y: 70, grade: '주의', type: '공사중', label: 'C-21' },
  { id: 5, x: 45, y: 50, grade: '위험', type: '배관', label: 'D-05' },
  { id: 6, x: 80, y: 55, grade: 'RV', type: '로드뷰', label: 'RV-001' },
  { id: 7, x: 35, y: 25, grade: 'RV', type: '로드뷰', label: 'RV-002' },
  { id: 8, x: 65, y: 75, grade: 'RV', type: '로드뷰', label: 'RV-003' },
];

const CHART_DATA = [
  { date: '05/14', events: 2 },
  { date: '05/15', events: 4 },
  { date: '05/16', events: 3 },
  { date: '05/17', events: 6 },
  { date: '05/18', events: 5 },
  { date: '05/19', events: 8 },
  { date: '05/20', events: 3 },
];

const GRADE_COLOR = { '위험': C.danger, '경고': C.warning, '주의': '#22C55E', '정상': C.textMuted, 'RV': C.accent };
const STATUS_COLOR = { '신규': C.info, '검토중': C.warning, '조치완료': C.success, '종료': C.textMuted };

/* ─── 공통 컴포넌트 ─── */
function Badge({ color, children }) {
  return (
    <span style={{
      display: 'inline-flex', alignItems: 'center', padding: '2px 8px',
      background: color + '22', color, border: `1px solid ${color}44`,
      borderRadius: 4, fontSize: 11, fontWeight: 600, whiteSpace: 'nowrap',
    }}>{children}</span>
  );
}

function Toast({ message, type = 'success', onClose }) {
  useEffect(() => { const t = setTimeout(onClose, 3000); return () => clearTimeout(t); }, []);
  const bg = type === 'success' ? C.success : type === 'error' ? C.danger : C.accent;
  return (
    <div style={{
      position: 'fixed', bottom: 24, right: 24, zIndex: 9999,
      background: C.surface2, border: `1px solid ${bg}44`, borderLeft: `3px solid ${bg}`,
      color: C.textPrimary, padding: '12px 16px', borderRadius: 6,
      boxShadow: '0 8px 24px rgba(0,0,0,0.4)', animation: 'toastSlide 0.3s ease forwards',
      display: 'flex', alignItems: 'center', gap: 10, minWidth: 260,
    }}>
      <span style={{ color: bg, fontSize: 16 }}>
        {type === 'success' ? '✓' : type === 'error' ? '✗' : 'i'}
      </span>
      <span style={{ fontSize: 14 }}>{message}</span>
    </div>
  );
}

function Drawer({ title, children, onClose }) {
  return (
    <div style={{
      position: 'fixed', inset: 0, zIndex: 500, display: 'flex',
    }}>
      <div onClick={onClose} style={{ flex: 1, background: 'rgba(0,0,0,0.5)' }} />
      <div style={{
        width: 480, background: C.surface, borderLeft: `1px solid ${C.border}`,
        height: '100%', overflowY: 'auto', animation: 'slideInRight 0.3s ease forwards',
      }}>
        <div style={{ padding: '20px 24px', borderBottom: `1px solid ${C.border}`, display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
          <span style={{ fontWeight: 700, fontSize: 16 }}>{title}</span>
          <button onClick={onClose} style={{ background: 'none', border: 'none', color: C.textSecondary, cursor: 'pointer', fontSize: 20 }}>×</button>
        </div>
        <div style={{ padding: 24 }}>{children}</div>
      </div>
    </div>
  );
}

function Modal({ title, children, onClose, width = 560 }) {
  return (
    <div style={{
      position: 'fixed', inset: 0, zIndex: 600,
      display: 'flex', alignItems: 'center', justifyContent: 'center',
      background: 'rgba(0,0,0,0.65)',
    }}>
      <div style={{
        background: C.surface, border: `1px solid ${C.border}`,
        borderRadius: 8, width, maxWidth: '95vw', maxHeight: '90vh',
        overflowY: 'auto', animation: 'fadeIn 0.2s ease',
        boxShadow: '0 20px 60px rgba(0,0,0,0.5)',
      }}>
        <div style={{ padding: '20px 24px', borderBottom: `1px solid ${C.border}`, display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
          <span style={{ fontWeight: 700, fontSize: 16 }}>{title}</span>
          <button onClick={onClose} style={{ background: 'none', border: 'none', color: C.textSecondary, cursor: 'pointer', fontSize: 20 }}>×</button>
        </div>
        <div style={{ padding: 24 }}>{children}</div>
      </div>
    </div>
  );
}

function StatCard({ label, value, sub, color }) {
  return (
    <div style={{
      background: C.surface, border: `1px solid ${C.border}`, borderRadius: 6,
      padding: '16px 20px', transition: 'border-color 0.2s',
      cursor: 'default',
    }}
    onMouseEnter={e => e.currentTarget.style.borderColor = color || C.accent}
    onMouseLeave={e => e.currentTarget.style.borderColor = C.border}
    >
      <div style={{ fontSize: 12, color: C.textSecondary, marginBottom: 6 }}>{label}</div>
      <div style={{ fontSize: 28, fontWeight: 700, color: color || C.textPrimary, animation: 'countUp 0.5s ease' }}>{value}</div>
      {sub && <div style={{ fontSize: 11, color: C.textMuted, marginTop: 4 }}>{sub}</div>}
    </div>
  );
}

/* ─── GIS 지도 컴포넌트 ─── */
function GisMap({ onMarkerClick, selectedLayer }) {
  const [hoveredMarker, setHoveredMarker] = useState(null);

  const visibleMarkers = MAP_MARKERS.filter(m => {
    if (selectedLayer.event && (m.grade === '위험' || m.grade === '경고' || m.grade === '주의')) return true;
    if (selectedLayer.roadview && m.grade === 'RV') return true;
    if (selectedLayer.facility) return true;
    return false;
  });

  return (
    <div style={{ position: 'relative', width: '100%', height: '100%', background: '#0A1520', borderRadius: 6, overflow: 'hidden' }}>
      {/* 그리드 배경 */}
      <svg width="100%" height="100%" style={{ position: 'absolute', inset: 0 }}>
        <defs>
          <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
            <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1A2D40" strokeWidth="0.5"/>
          </pattern>
        </defs>
        <rect width="100%" height="100%" fill="url(#grid)" />
        {/* 도로 라인 */}
        <line x1="20%" y1="0" x2="20%" y2="100%" stroke="#1F3347" strokeWidth="8" strokeOpacity="0.6"/>
        <line x1="0" y1="35%" x2="100%" y2="35%" stroke="#1F3347" strokeWidth="6" strokeOpacity="0.6"/>
        <line x1="60%" y1="0" x2="60%" y2="100%" stroke="#1F3347" strokeWidth="6" strokeOpacity="0.5"/>
        <line x1="0" y1="70%" x2="100%" y2="70%" stroke="#1F3347" strokeWidth="5" strokeOpacity="0.5"/>
        {/* 배관 라인 */}
        <polyline points="25%,10% 25%,90%" stroke="#2A6BA3" strokeWidth="2" strokeDasharray="6,4" strokeOpacity="0.6"/>
        <polyline points="10%,40% 90%,40%" stroke="#2A6BA3" strokeWidth="2" strokeDasharray="6,4" strokeOpacity="0.6"/>
        {/* 구역 표시 */}
        <rect x="5%" y="5%" width="30%" height="28%" fill="none" stroke="#1C4F82" strokeWidth="1" strokeOpacity="0.4" strokeDasharray="4,4"/>
        <rect x="40%" y="5%" width="35%" height="28%" fill="none" stroke="#1C4F82" strokeWidth="1" strokeOpacity="0.4" strokeDasharray="4,4"/>
        <rect x="5%" y="40%" width="30%" height="30%" fill="none" stroke="#1C4F82" strokeWidth="1" strokeOpacity="0.4" strokeDasharray="4,4"/>
        {/* 구역 라벨 */}
        <text x="7%" y="11%" fill="#4A6B8A" fontSize="11" fontFamily="Pretendard">1공단</text>
        <text x="42%" y="11%" fill="#4A6B8A" fontSize="11" fontFamily="Pretendard">2공단</text>
        <text x="7%" y="45%" fill="#4A6B8A" fontSize="11" fontFamily="Pretendard">3공단</text>
        {/* 스캔 라인 효과 */}
        <line x1="0" y1="30%" x2="100%" y2="30%" stroke="#38BDF8" strokeWidth="0.5" strokeOpacity="0.1"/>
      </svg>
      {/* 마커들 */}
      {visibleMarkers.map(m => (
        <div
          key={m.id}
          onClick={() => onMarkerClick(m)}
          onMouseEnter={() => setHoveredMarker(m.id)}
          onMouseLeave={() => setHoveredMarker(null)}
          style={{
            position: 'absolute',
            left: `${m.x}%`, top: `${m.y}%`,
            transform: 'translate(-50%, -50%)',
            cursor: 'pointer',
            zIndex: 10,
          }}
        >
          <div style={{
            width: m.grade === 'RV' ? 28 : 24,
            height: m.grade === 'RV' ? 28 : 24,
            borderRadius: m.grade === 'RV' ? 6 : '50%',
            background: GRADE_COLOR[m.grade] + '33',
            border: `2px solid ${GRADE_COLOR[m.grade]}`,
            display: 'flex', alignItems: 'center', justifyContent: 'center',
            animation: m.grade === '위험' ? 'markerPulse 2s infinite' : 'none',
            transition: 'transform 0.15s',
            transform: hoveredMarker === m.id ? 'scale(1.3)' : 'scale(1)',
          }}>
            <div style={{ width: 8, height: 8, borderRadius: '50%', background: GRADE_COLOR[m.grade] }} />
          </div>
          {hoveredMarker === m.id && (
            <div style={{
              position: 'absolute', bottom: '110%', left: '50%', transform: 'translateX(-50%)',
              background: C.surface2, border: `1px solid ${C.border}`,
              padding: '4px 8px', borderRadius: 4, fontSize: 11, whiteSpace: 'nowrap',
              color: C.textPrimary, zIndex: 20,
            }}>
              {m.label} — {m.type}
            </div>
          )}
        </div>
      ))}
      {/* 범례 */}
      <div style={{
        position: 'absolute', bottom: 12, right: 12,
        background: 'rgba(13,27,42,0.9)', border: `1px solid ${C.border}`,
        borderRadius: 6, padding: '8px 12px', fontSize: 11,
      }}>
        {[['위험', C.danger], ['경고', C.warning], ['주의', C.success], ['로드뷰', C.accent]].map(([label, color]) => (
          <div key={label} style={{ display: 'flex', alignItems: 'center', gap: 6, marginBottom: 4 }}>
            <div style={{ width: 10, height: 10, borderRadius: '50%', background: color }} />
            <span style={{ color: C.textSecondary }}>{label}</span>
          </div>
        ))}
      </div>
      {/* 좌표 표시 */}
      <div style={{ position: 'absolute', bottom: 12, left: 12, fontSize: 11, color: C.textMuted }}>
        35.8514°N 128.6175°E | Zoom 15
      </div>
    </div>
  );
}

/* ─── 화면들 ─── */
function GisDashboard({ setToast }) {
  const [selectedMarker, setSelectedMarker] = useState(null);
  const [layers, setLayers] = useState({ event: true, roadview: true, facility: true });

  const toggleLayer = (key) => setLayers(prev => ({ ...prev, [key]: !prev[key] }));

  return (
    <div style={{ display: 'flex', gap: 16, height: 600, animation: 'fadeIn 0.3s ease' }}>
      {/* 메인 지도 */}
      <div style={{ flex: 1, display: 'flex', flexDirection: 'column', gap: 12 }}>
        {/* 레이어 토글 */}
        <div style={{ display: 'flex', gap: 8, alignItems: 'center' }}>
          <span style={{ fontSize: 12, color: C.textSecondary, marginRight: 4 }}>레이어</span>
          {[['event', '이벤트'], ['roadview', '로드뷰'], ['facility', '시설물']].map(([key, label]) => (
            <button
              key={key}
              onClick={() => toggleLayer(key)}
              style={{
                padding: '4px 10px', borderRadius: 4, fontSize: 12, cursor: 'pointer',
                background: layers[key] ? C.accentDim : 'transparent',
                border: `1px solid ${layers[key] ? C.accent : C.border}`,
                color: layers[key] ? C.accent : C.textMuted,
                transition: 'all 0.2s',
              }}
            >{label}</button>
          ))}
          <div style={{ marginLeft: 'auto', display: 'flex', gap: 6 }}>
            <button onClick={() => setToast({ msg: '지도가 새로고침되었습니다.', type: 'success' })}
              style={{ padding: '4px 10px', borderRadius: 4, fontSize: 12, cursor: 'pointer', background: 'transparent', border: `1px solid ${C.border}`, color: C.textSecondary }}>
              새로고침
            </button>
          </div>
        </div>
        <GisMap onMarkerClick={setSelectedMarker} selectedLayer={layers} />
      </div>

      {/* 우측 패널 */}
      <div style={{ width: 280, display: 'flex', flexDirection: 'column', gap: 12, overflowY: 'auto' }}>
        {/* KPI */}
        <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 8 }}>
          <StatCard label="전체 이벤트" value={EVENTS.length} sub="오늘 기준" color={C.accent} />
          <StatCard label="위험 등급" value={EVENTS.filter(e => e.grade === '위험').length} sub="즉시 조치 필요" color={C.danger} />
          <StatCard label="미조치" value={EVENTS.filter(e => e.status === '신규' || e.status === '검토중').length} sub="처리 대기 중" color={C.warning} />
          <StatCard label="로드뷰 포인트" value={ROADVIEW_POINTS.length} sub="총 촬영 지점" color={C.success} />
        </div>

        {/* 최근 이벤트 */}
        <div style={{ background: C.surface, border: `1px solid ${C.border}`, borderRadius: 6, padding: 16, flex: 1 }}>
          <div style={{ fontSize: 13, fontWeight: 600, marginBottom: 12 }}>최근 이벤트</div>
          {EVENTS.slice(0, 4).map(ev => (
            <div
              key={ev.id}
              onClick={() => setSelectedMarker({ id: ev.id, label: ev.location, type: ev.type, grade: ev.grade, event: ev })}
              style={{
                padding: '10px 0', borderBottom: `1px solid ${C.border}`, cursor: 'pointer',
                transition: 'background 0.15s',
              }}
              onMouseEnter={e => e.currentTarget.style.background = C.surface2}
              onMouseLeave={e => e.currentTarget.style.background = 'transparent'}
            >
              <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: 4 }}>
                <span style={{ fontSize: 12, fontWeight: 600 }}>{ev.type}</span>

              </button>
              <button
                onClick={() => { setSelectedMarker(null); }}
                style={{ padding: '10px 16px', borderRadius: 6, cursor: 'pointer', background: 'transparent', border: `1px solid ${C.border}`, color: C.textSecondary, fontSize: 13 }}>
                닫기
              </button>
            </div>
          </div>
        </Drawer>
      )}
    </div>
  );
}

function EventScreen({ setToast }) {
  const [events, setEvents] = useState(EVENTS);
  const [filter, setFilter] = useState({ grade: '전체', status: '전체' });
  const [selectedEvent, setSelectedEvent] = useState(null);
  const [showRegister, setShowRegister] = useState(false);
  const [form, setForm] = useState({ type: '배관 누출 의심', grade: '경고', assignee: '', desc: '' });

  const filtered = events.filter(e => {
    if (filter.grade !== '전체' && e.grade !== filter.grade) return false;
    if (filter.status !== '전체' && e.status !== filter.status) return false;
    return true;
  });

  const handleStatusChange = (ev, newStatus) => {
    setEvents(prev => prev.map(e => e.id === ev.id ? { ...e, status: newStatus } : e));
    setSelectedEvent(null);
    setToast({ msg: `이벤트 상태가 '${newStatus}'으로 변경되었습니다.`, type: 'success' });
  };

  const handleRegister = () => {
    const newEvent = {
      id: events.length + 1,
      type: form.type, grade: form.grade, status: '신규',
      location: '신규 등록 위치', assignee: form.assignee || '미배정',
      date: '2026.05.20 ' + new Date().toTimeString().slice(0,5),
      lat: 35.85, lng: 128.62,
    };
    setEvents(prev => [newEvent, ...prev]);
    setShowRegister(false);
    setForm({ type: '배관 누출 의심', grade: '경고', assignee: '', desc: '' });
    setToast({ msg: '이상징후 이벤트가 등록되었습니다.', type: 'success' });
  };

  return (
    <div style={{ animation: 'fadeIn 0.3s ease' }}>
      {/* 필터 바 */}
      <div style={{ display: 'flex', gap: 8, marginBottom: 16, alignItems: 'center' }}>
        {[['grade', '위험등급', ['전체', '위험', '경고', '주의']], ['status', '상태', ['전체', '신규', '검토중', '조치완료']]].map(([key, label, opts]) => (
          <select key={key}
            value={filter[key]}
            onChange={e => setFilter(prev => ({ ...prev, [key]: e.target.value }))}
            style={{ padding: '6px 12px', borderRadius: 4, background: C.surface, border: `1px solid ${C.border}`, color: C.textPrimary, fontSize: 12, cursor: 'pointer' }}>
            {opts.map(o => <option key={o}>{o}</option>)}
          </select>
        ))}
        <div style={{ flex: 1 }} />
        <button
          onClick={() => setShowRegister(true)}
          style={{ padding: '8px 16px', borderRadius: 6, cursor: 'pointer', background: C.primary, border: 'none', color: C.textPrimary, fontWeight: 600, fontSize: 13 }}>
          이벤트 등록
        </button>
      </div>

      {/* 요약 카드 */}
      <div style={{ display: 'grid', gridTemplateColumns: 'repeat(4, 1fr)', gap: 10, marginBottom: 16 }}>
        {[
          { label: '전체', value: events.length, color: C.accent },
          { label: '위험', value: events.filter(e => e.grade === '위험').length, color: C.danger },
          { label: '미조치', value: events.filter(e => e.status === '신규').length, color: C.warning },
          { label: '조치완료', value: events.filter(e => e.status === '조치완료').length, color: C.success },
        ].map(item => (
          <div key={item.label} style={{ background: C.surface, border: `1px solid ${C.border}`, borderRadius: 6, padding: '12px 16px' }}>
            <div style={{ fontSize: 11, color: C.textSecondary }}>{item.label}</div>
            <div style={{ fontSize: 22, fontWeight: 700, color: item.color }}>{item.value}</div>
          </div>
        ))}
      </div>

      {/* 테이블 */}
      <div style={{ background: C.surface, border: `1px solid ${C.border}`, borderRadius: 6, overflow: 'hidden' }}>

            <tr style={{ background: C.surface2 }}>

                <th key={h} style={{ padding: '10px 14px', textAlign: 'left', color: C.textSecondary, fontWeight: 600, fontSize: 12, borderBottom: `1px solid ${C.border}` }}>{h}</th>
              ))}
            </tr>
          </thead>
          <tbody>
            {filtered.map(ev => (
              <tr
                key={ev.id}
                onClick={() => setSelectedEvent(ev)}

                onMouseLeave={e => e.currentTarget.style.background = 'transparent'}

                <td style={{ padding: '10px 14px' }}><Badge color={STATUS_COLOR[ev.status]}>{ev.status}</Badge></td>
                <td style={{ padding: '10px 14px', color: C.textSecondary }}>{ev.assignee}</td>
                <td style={{ padding: '10px 14px', color: C.textMuted, fontSize: 11 }}>{ev.date}</td>

        <Drawer title={`이벤트 #${selectedEvent.id} — ${selectedEvent.type}`} onClose={() => setSelectedEvent(null)}>

              <Badge color={STATUS_COLOR[selectedEvent.status]}>{selectedEvent.status}</Badge>
            </div>
            {[
              ['위치', selectedEvent.location],
              ['담당자', selectedEvent.assignee],
              ['GPS 좌표', `${selectedEvent.lat}, ${selectedEvent.lng}`],
              ['등록일시', selectedEvent.date],
            ].map(([k, v]) => (
              <div key={k} style={{ display: 'flex', justifyContent: 'space-between', padding: '8px 0', borderBottom: `1px solid ${C.border}` }}>
                <span style={{ fontSize: 13, color: C.textSecondary }}>{k}</span>
                <span style={{ fontSize: 13 }}>{v}</span>
              </div>
            ))}

            <div style={{ marginTop: 8 }}>

  const [uploads, setUploads] = useState(UPLOADS);
  const [uploading, setUploading] = useState(false);
  const [progress, setProgress] = useState({});
  const [dragOver, setDragOver] = useState(false);
  const [selectedUpload, setSelectedUpload] = useState(null);

  const handleUpload = () => {
    const files = ['20260520_3공단북측_001.jpg', '20260520_3공단북측_002.jpg'];
    setUploading(true);
    files.forEach((f, i) => setProgress(prev => ({ ...prev, [f]: 0 })));
    files.forEach((f, i) => {
      let p = 0;
      const interval = setInterval(() => {
        p += Math.random() * 20;
        if (p >= 100) {
          p = 100;
          clearInterval(interval);
          if (i === files.length - 1) {
            setTimeout(() => {
              setUploading(false);
              setUploads(prev => [
                { id: prev.length + 1, filename: files[0], size: '215 MB', gps: '자동 추출', status: '완료', date: '2026.05.20 ' + new Date().toTimeString().slice(0,5) },
                { id: prev.length + 2, filename: files[1], size: '188 MB', gps: '자동 추출', status: '완료', date: '2026.05.20 ' + new Date().toTimeString().slice(0,5) },
                ...prev,
              ]);
              setProgress({});
              setToast({ msg: '파일 2개 업로드 완료. GPS 좌표가 자동 추출되었습니다.', type: 'success' });
            }, 500);
          }
        }
        setProgress(prev => ({ ...prev, [f]: Math.min(p, 100) }));
      }, 200 + i * 50);
    });
  };

  return (
    <div style={{ animation: 'fadeIn 0.3s ease' }}>
      {/* 업로드 영역 */}
      <div
        onDragOver={e => { e.preventDefault(); setDragOver(true); }}
        onDragLeave={() => setDragOver(false)}
        onDrop={e => { e.preventDefault(); setDragOver(false); handleUpload(); }}
        onClick={handleUpload}
        style={{
          border: `2px dashed ${dragOver ? C.accent : C.border}`,
          borderRadius: 8, padding: '32px', textAlign: 'center', cursor: 'pointer',
          background: dragOver ? C.accentDim : C.surface, marginBottom: 16,
          transition: 'all 0.2s',
        }}
      >
        <div style={{ fontSize: 36, marginBottom: 8, color: C.accent }}>+</div>
        <div style={{ fontSize: 14, fontWeight: 600, marginBottom: 6 }}>360 이미지·영상 파일을 드래그하거나 클릭하여 업로드</div>
        <div style={{ fontSize: 12, color: C.textSecondary }}>지원 형식: JPG, PNG, MP4, HEVC · GPS EXIF 자동 추출</div>
      </div>

      {/* 진행 중 파일 */}
      {Object.entries(progress).map(([filename, pct]) => (
        <div key={filename} style={{ background: C.surface, border: `1px solid ${C.border}`, borderRadius: 6, padding: '12px 16px', marginBottom: 8 }}>
          <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: 6 }}>
            <span style={{ fontSize: 13 }}>{filename}</span>
            <span style={{ fontSize: 12, color: C.accent }}>{Math.round(pct)}%</span>
          </div>
          <div style={{ height: 4, background: C.surface2, borderRadius: 2 }}>
            <div style={{ height: '100%', width: `${pct}%`, background: C.accent, borderRadius: 2, transition: 'width 0.2s', animation: 'progressFill 0.3s ease' }} />
          </div>
          <div style={{ fontSize: 11, color: C.textMuted, marginTop: 4 }}>GPS EXIF 추출 중...</div>
        </div>
      ))}

      {/* 파일 목록 */}
      <div style={{ background: C.surface, border: `1px solid ${C.border}`, borderRadius: 6, overflow: 'hidden' }}>
        <div style={{ padding: '12px 16px', borderBottom: `1px solid ${C.border}`, display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
          <span style={{ fontWeight: 600, fontSize: 14 }}>업로드 목록</span>
          <Badge color={C.accent}>{uploads.length}개</Badge>
        </div>
        <table style={{ width: '100%', borderCollapse: 'collapse', fontSize: 13 }}>
          <thead>
            <tr style={{ background: C.surface2 }}>
              {['파일명', '크기', 'GPS', '상태', '업로드일'].map(h => (
                <th key={h} style={{ padding: '10px 14px', textAlign: 'left', color: C.textSecondary, fontWeight: 600, fontSize: 12, borderBottom: `1px solid ${C.border}` }}>{h}</th>
              ))}
            </tr>
          </thead>
          <tbody>
            {uploads.map(u => (
              <tr
                key={u.id}
                onClick={() => setSelectedUpload(u)}
                style={{ cursor: 'pointer', borderBottom: `1px solid ${C.border}`, transition: 'background 0.1s' }}
                onMouseEnter={e => e.currentTarget.style.background = C.surface2}
                onMouseLeave={e => e.currentTarget.style.background = 'transparent'}
              >
                <td style={{ padding: '10px 14px', fontWeight: 500, maxWidth: 200, overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>{u.filename}</td>
                <td style={{ padding: '10px 14px', color: C.textSecondary }}>{u.size}</td>
                <td style={{ padding: '10px 14px' }}>
                  <Badge color={u.gps === '자동 추출' ? C.success : u.gps === '수동 입력' ? C.warning : C.danger}>{u.gps}</Badge>
                </td>
                <td style={{ padding: '10px 14px' }}>
                  <Badge color={u.status === '완료' ? C.success : C.warning}>{u.status}</Badge>
                </td>
                <td style={{ padding: '10px 14px', color: C.textMuted, fontSize: 11 }}>{u.date}</td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>

      {selectedUpload && (
        <Drawer title={`파일 상세: ${selectedUpload.filename}`} onClose={() => setSelectedUpload(null)}>
          <div style={{ display: 'flex', flexDirection: 'column', gap: 14 }}>
            {[['파일명', selectedUpload.filename], ['크기', selectedUpload.size], ['GPS 처리', selectedUpload.gps], ['상태', selectedUpload.status], ['업로드일', selectedUpload.date]].map(([k, v]) => (
              <div key={k} style={{ display: 'flex', justifyContent: 'space-between', padding: '8px 0', borderBottom: `1px solid ${C.border}` }}>
                <span style={{ fontSize: 13, color: C.textSecondary }}>{k}</span>
                <span style={{ fontSize: 13 }}>{v}</span>
              </div>
            ))}
            {selectedUpload.gps === 'EXIF 없음' && (
              <div style={{ background: C.accentDim, border: `1px solid ${C.accent}44`, borderRadius: 6, padding: 12 }}>
                <div style={{ fontSize: 12, color: C.accent, marginBottom: 8 }}>GPS 좌표 수동 입력 필요</div>
                <div style={{ height: 100, background: C.surface2, borderRadius: 4, display: 'flex', alignItems: 'center', justifyContent: 'center', color: C.textMuted, fontSize: 12 }}>
                  지도 클릭으로 위치 지정
                </div>
                <div style={{ display: 'flex', gap: 8, marginTop: 8 }}>
                  <input placeholder="위도" style={{ flex: 1, padding: '6px 10px', borderRadius: 4, background: C.surface, border: `1px solid ${C.border}`, color: C.textPrimary, fontSize: 12 }} />
                  <input placeholder="경도" style={{ flex: 1, padding: '6px 10px', borderRadius: 4, background: C.surface, border: `1px solid ${C.border}`, color: C.textPrimary, fontSize: 12 }} />
                </div>
              </div>
            )}
            <button
              onClick={() => { setSelectedUpload(null); setToast({ msg: '파일 정보가 저장되었습니다.', type: 'success' }); }}
              style={{ padding: '10px', borderRadius: 6, cursor: 'pointer', background: C.primary, border: 'none', color: C.textPrimary, fontWeight: 600, fontSize: 13 }}>
              저장
            </button>
          </div>
        </Drawer>
      )}
    </div>
  );
}

function AlarmScreen({ setToast }) {
  const [alarms, setAlarms] = useState(ALARMS);
  const [showSettings, setShowSettings] = useState(false);
  const [settings, setSettings] = useState({ threshold: '48', email: true, push: true });

  const handleDismiss = (id) => {
    setAlarms(prev => prev.filter(a => a.id !== id));
    setToast({ msg: '알람이 처리되었습니다.', type: 'success' });
  };

  return (
    <div style={{ animation: 'fadeIn 0.3s ease' }}>
      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 16 }}>
        <div style={{ display: 'flex', gap: 8 }}>
          <Badge color={C.danger}>{alarms.filter(a => a.grade === '위험').length} 위험</Badge>
          <Badge color={C.warning}>{alarms.filter(a => a.grade === '경고').length} 경고</Badge>
        </div>
        <button
          onClick={() => setShowSettings(true)}
          style={{ padding: '8px 16px', borderRadius: 6, cursor: 'pointer', background: 'transparent', border: `1px solid ${C.border}`, color: C.textSecondary, fontSize: 13 }}>
          알람 설정
        </button>
      </div>

      {/* 긴급 알람 */}
      <div style={{ marginBottom: 20 }}>
        <div style={{ fontSize: 12, color: C.danger, fontWeight: 600, marginBottom: 10, display: 'flex', alignItems: 'center', gap: 6 }}>
          <span>긴급 미조치 알람</span>
        </div>
        {alarms.filter(a => a.status === '긴급').map(alarm => (
          <div key={alarm.id} style={{
            background: 'rgba(239,68,68,0.08)', border: `1px solid ${C.danger}44`, borderLeft: `3px solid ${C.danger}`,
            borderRadius: 6, padding: '12px 16px', marginBottom: 8, display: 'flex', justifyContent: 'space-between', alignItems: 'center',
          }}>
            <div>
              <div style={{ fontSize: 13, fontWeight: 600, marginBottom: 4 }}>{alarm.title}</div>
              <div style={{ fontSize: 11, color: C.textSecondary }}>{alarm.location} · {alarm.date}</div>
            </div>
            <div style={{ display: 'flex', gap: 8 }}>
              <Badge color={C.danger}>{alarm.grade}</Badge>
              <button
                onClick={() => handleDismiss(alarm.id)}
                style={{ padding: '6px 12px', borderRadius: 4, cursor: 'pointer', background: C.danger, border: 'none', color: '#fff', fontSize: 12 }}>
                조치
              </button>
            </div>
          </div>
        ))}
      </div>

      {/* 일반 알람 */}
      <div>
        <div style={{ fontSize: 12, color: C.textSecondary, fontWeight: 600, marginBottom: 10 }}>전체 알람</div>
        {alarms.map(alarm => (
          <div key={alarm.id} style={{
            background: C.surface, border: `1px solid ${C.border}`,
            borderLeft: `3px solid ${GRADE_COLOR[alarm.grade]}`,
            borderRadius: 6, padding: '12px 16px', marginBottom: 8, display: 'flex', justifyContent: 'space-between', alignItems: 'center',
          }}
          onMouseEnter={e => e.currentTarget.style.background = C.surface2}
          onMouseLeave={e => e.currentTarget.style.background = C.surface}
          >
            <div>
              <div style={{ fontSize: 13, fontWeight: 600, marginBottom: 4 }}>{alarm.title}</div>
              <div style={{ fontSize: 11, color: C.textSecondary }}>{alarm.location} · {alarm.date}</div>
            </div>
            <div style={{ display: 'flex', gap: 8, alignItems: 'center' }}>
              <Badge color={GRADE_COLOR[alarm.grade]}>{alarm.grade}</Badge>
              <Badge color={STATUS_COLOR[alarm.status] || C.textMuted}>{alarm.status}</Badge>
              <button
                onClick={() => handleDismiss(alarm.id)}
                style={{ padding: '5px 10px', borderRadius: 4, cursor: 'pointer', background: 'transparent', border: `1px solid ${C.border}`, color: C.textSecondary, fontSize: 12 }}>
                처리
              </button>
            </div>
          </div>
        ))}
        {alarms.length === 0 && (
          <div style={{ textAlign: 'center', padding: 40, color: C.textMuted }}>처리할 알람이 없습니다.</div>
        )}
      </div>

      {showSettings && (
        <Modal title="알람 설정" onClose={() => setShowSettings(false)}>
          <div style={{ display: 'flex', flexDirection: 'column', gap: 16 }}>
            <div>
              <label style={{ fontSize: 12, color: C.textSecondary, display: 'block', marginBottom: 6 }}>미처리 알람 임계값 (시간)</label>
              <input
                type="number" value={settings.threshold}
                onChange={e => setSettings(prev => ({ ...prev, threshold: e.target.value }))}
                style={{ width: '100%', padding: '8px 12px', borderRadius: 4, background: C.surface2, border: `1px solid ${C.border}`, color: C.textPrimary, fontSize: 13 }}
              />
            </div>
            {[['이메일 알람', 'email'], ['화면 알람', 'push']].map(([label, key]) => (
              <div key={key} style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
                <span style={{ fontSize: 13 }}>{label}</span>
                <div
                  onClick={() => setSettings(prev => ({ ...prev, [key]: !prev[key] }))}
                  style={{
                    width: 44, height: 24, borderRadius: 12,
                    background: settings[key] ? C.accent : C.border,
                    position: 'relative', cursor: 'pointer', transition: 'background 0.2s',
                  }}>
                  <div style={{
                    position: 'absolute', top: 3, left: settings[key] ? 23 : 3,
                    width: 18, height: 18, borderRadius: '50%', background: '#fff',
                    transition: 'left 0.2s',
                  }} />
                </div>
              </div>
            ))}
            <button
              onClick={() => { setShowSettings(false); setToast({ msg: '알람 설정이 저장되었습니다.', type: 'success' }); }}
              style={{ padding: '10px', borderRadius: 6, cursor: 'pointer', background: C.primary, border: 'none', color: C.textPrimary, fontWeight: 600, fontSize: 13 }}>
              저장
            </button>
          </div>
        </Modal>
      )}
    </div>
  );
}

/* ─── 메인 앱 ─── */
const TABS = [
  { id: 'main', label: 'GIS 대시보드' },
  { id: 'roadview', label: '360 로드뷰' },
  { id: 'event', label: '이벤트 관리' },
  { id: 'upload', label: '데이터 업로드' },
  { id: 'alarm', label: '알람 관리' },
];

function App() {
  const [activeTab, setActiveTab] = useState('main');
  const [toast, setToast] = useState(null);

  const renderContent = () => {
    const props = { setToast: (t) => setToast(t) };
    switch (activeTab) {
      case 'main': return <GisDashboard {...props} />;
      case 'roadview': return <RoadviewScreen {...props} />;
      case 'event': return <EventScreen {...props} />;
      case 'upload': return <UploadScreen {...props} />;
      case 'alarm': return <AlarmScreen {...props} />;
      default: return null;
    }
  };

  return (
    <div style={{ width: '100%', minHeight: '100vh', background: C.bg, color: C.textPrimary }}>
      {/* 탑바 */}
      <div style={{ background: C.surface, borderBottom: `1px solid ${C.border}`, padding: '0 24px' }}>
        <div style={{ display: 'flex', alignItems: 'center', height: 52 }}>
          <div style={{ display: 'flex', alignItems: 'center', gap: 10, marginRight: 32 }}>
            <div style={{ width: 28, height: 28, background: C.primary, borderRadius: 6, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
              <div style={{ width: 12, height: 12, borderRadius: '50%', border: '2px solid #fff', position: 'relative' }}>
                <div style={{ position: 'absolute', top: '50%', left: '50%', transform: 'translate(-50%,-50%)', width: 4, height: 4, background: '#fff', borderRadius: '50%' }} />
              </div>
            </div>
            <span style={{ fontWeight: 700, fontSize: 15 }}>GIS 현장 점검 플랫폼</span>
          </div>

          {/* 탭 */}
          <nav style={{ display: 'flex', gap: 2, flex: 1 }}>
            {TABS.map(tab => (
              <button
                key={tab.id}
                onClick={() => setActiveTab(tab.id)}
                style={{
                  padding: '0 16px', height: 52, background: 'none', border: 'none', cursor: 'pointer',
                  color: activeTab === tab.id ? C.accent : C.textSecondary,
                  fontWeight: activeTab === tab.id ? 600 : 400,
                  fontSize: 13, position: 'relative', whiteSpace: 'nowrap',
                  borderBottom: activeTab === tab.id ? `2px solid ${C.accent}` : '2px solid transparent',
                  transition: 'color 0.15s',
                }}
              >{tab.label}</button>
            ))}
          </nav>

          {/* 우측 */}
          <div style={{ display: 'flex', alignItems: 'center', gap: 12 }}>
            <div style={{ display: 'flex', alignItems: 'center', gap: 6 }}>
              <div style={{ width: 8, height: 8, borderRadius: '50%', background: C.success, animation: 'pulse 2s infinite' }} />
              <span style={{ fontSize: 11, color: C.textSecondary }}>시스템 정상</span>
            </div>
            <div style={{ width: 32, height: 32, borderRadius: '50%', background: C.primary, display: 'flex', alignItems: 'center', justifyContent: 'center', cursor: 'pointer', fontSize: 13, fontWeight: 700 }}>
              관
            </div>
          </div>
        </div>
      </div>

      {/* 서브헤더 */}
      <div style={{ background: C.surface2, borderBottom: `1px solid ${C.border}`, padding: '10px 24px', display: 'flex', alignItems: 'center', gap: 12 }}>
        <span style={{ fontSize: 13, color: C.textSecondary }}>한국산업단지공단 현장 점검 시스템 v1.0</span>
        <span style={{ color: C.border }}>|</span>
        <span style={{ fontSize: 12, color: C.textMuted }}>최종 갱신: 2026.05.20 14:35</span>
        <div style={{ marginLeft: 'auto', display: 'flex', gap: 8 }}>
          <Badge color={C.danger}>위험 {EVENTS.filter(e => e.grade === '위험').length}건</Badge>
          <Badge color={C.warning}>미조치 {EVENTS.filter(e => e.status === '신규' || e.status === '검토중').length}건</Badge>
        </div>
      </div>

      {/* 콘텐츠 */}
      <div style={{ padding: 24 }}>
        {renderContent()}
      </div>

      {/* 토스트 */}
      {toast && <Toast message={toast.msg} type={toast.type} onClose={() => setToast(null)} />}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
