<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GIS 기반 현장 이상징후 통합 관제 플랫폼 — 구현 데모</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://unpkg.com/prop-types/prop-types.min.js"></script>
<script src="https://unpkg.com/react-is@18/umd/react-is.production.min.js"></script>
<script src="https://unpkg.com/recharts/umd/Recharts.js"></script>
<script src="https://unpkg.com/@phosphor-icons/web"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body, #root { width: 100%; min-height: 100vh; }
body {
  font-family: 'Pretendard', -apple-system, sans-serif;
  background: #1A1208;
  color: #FDF3DC;
}
@keyframes fadeSlideUp {
  from { opacity: 0; transform: translateY(16px); }
  to { opacity: 1; transform: translateY(0); }
}
@keyframes glowPulse {
  0%, 100% { box-shadow: 0 0 6px rgba(245,158,11,0.3); }
  50% { box-shadow: 0 0 18px rgba(245,158,11,0.6); }
}
@keyframes alertBlink {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.6; }
}
@keyframes slideInModal {
  from { opacity: 0; transform: scale(0.95); }
  to { opacity: 1; transform: scale(1); }
}
@keyframes toastPop {
  from { transform: translateY(20px); opacity: 0; }
  to { transform: translateY(0); opacity: 1; }
}
@keyframes barGrow {
  from { transform: scaleY(0); transform-origin: bottom; }
  to { transform: scaleY(1); transform-origin: bottom; }
}
@keyframes spinnerRing {
  to { transform: rotate(360deg); }
}
.page-enter { animation: fadeSlideUp 0.3s ease forwards; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;
const { BarChart, Bar, XAxis, YAxis, CartesianGrid, Tooltip, ResponsiveContainer, PieChart, Pie, Cell, LineChart, Line, ComposedChart, Area, AreaChart, Legend } = Recharts;

/* ─── 색상 팔레트 ─── */
const C = {
  bg: '#1A1208',
  surface: '#271B0E',
  surface2: '#321F10',
  border: '#3D2A14',
  primary: '#B45309',
  primaryHover: '#D97706',
  accent: '#F59E0B',
  accentDim: 'rgba(245,158,11,0.12)',
  textPrimary: '#FDF3DC',
  textSecondary: '#C9A35A',
  textMuted: '#7A5C2E',
  danger: '#EF4444',
  warning: '#F97316',
  success: '#22C55E',
  info: '#38BDF8',
};

/* ─── 더미 데이터 ─── */
const ALARM_ITEMS = [
  { id: 1, title: '3공단 A-12 배관 누출 의심', grade: '위험', status: '긴급', location: '3공단 A-12', since: '72시간', assignee: '김철수', site: '한국산업단지' },
  { id: 2, title: '1공단 D-05 가스관 이상', grade: '위험', status: '긴급', location: '1공단 D-05', since: '48시간', assignee: '정우진', site: '한국산업단지' },
  { id: 3, title: '1공단 메인로 도로 파손', grade: '경고', status: '신규', location: '1공단 메인로', since: '2시간', assignee: '이영희', site: '부산진구 산단' },
  { id: 4, title: '2공단 E-18 기타 이상 후보', grade: '경고', status: '대기', location: '2공단 E-18', since: '24시간', assignee: '한지원', site: '한국산업단지' },
  { id: 5, title: '3공단 C-21 공사중 구역', grade: '주의', status: '처리중', location: '3공단 C-21', since: '5시간', assignee: '최수진', site: '부산진구 산단' },
];

const AI_LOGS = [
  { id: 1, ts: '2026.05.20 14:32', confidence: 0.92, type: '배관 누출 의심', location: '3공단 A-12', status: '이벤트 생성', eventId: 1 },
  { id: 2, ts: '2026.05.20 14:18', confidence: 0.76, type: '도로 파손', location: '1공단 메인로', status: '이벤트 생성', eventId: 3 },
  { id: 3, ts: '2026.05.20 13:55', confidence: 0.45, type: '시설물 이상', location: '2공단 B-07', status: '임계값 미달', eventId: null },
  { id: 4, ts: '2026.05.20 13:30', confidence: 0.88, type: '가스관 이상', location: '1공단 D-05', status: '이벤트 생성', eventId: 2 },
  { id: 5, ts: '2026.05.20 12:45', confidence: 0.51, type: '배관 누출 의심', location: '2공단 C-14', status: '임계값 미달', eventId: null },
  { id: 6, ts: '2026.05.20 11:20', confidence: 0.95, type: '공사중/작업구역', location: '3공단 C-21', status: '이벤트 생성', eventId: 5 },
];

const REPORT_DATA = {
  daily: [
    { date: '05/14', events: 2, resolved: 2 },
    { date: '05/15', events: 4, resolved: 3 },
    { date: '05/16', events: 3, resolved: 2 },
    { date: '05/17', events: 6, resolved: 5 },
    { date: '05/18', events: 5, resolved: 4 },
    { date: '05/19', events: 8, resolved: 6 },
    { date: '05/20', events: 3, resolved: 1 },
  ],
  byType: [
    { name: '배관 누출', value: 8, color: '#EF4444' },
    { name: '도로 파손', value: 5, color: '#F97316' },
    { name: '시설물 이상', value: 7, color: '#F59E0B' },
    { name: '공사중', value: 4, color: '#22C55E' },
    { name: '기타', value: 3, color: '#38BDF8' },
  ],
  bySite: [
    { site: '한국산단', events: 15, resolved: 12 },
    { site: '부산진', events: 8, resolved: 7 },
    { site: '인천남', events: 4, resolved: 3 },
  ],
};

const GRADE_COLOR = { '위험': C.danger, '경고': C.warning, '주의': C.success };
const STATUS_COLOR = {
  '긴급': C.danger, '신규': C.info, '대기': C.warning, '처리중': C.accent, '완료': C.success,
  '이벤트 생성': C.success, '임계값 미달': C.textMuted, '처리 오류': C.danger,
};

/* ─── 공통 컴포넌트 ─── */
function Badge({ color, children }) {
  return (
    <span style={{
      display: 'inline-flex', alignItems: 'center', padding: '3px 10px',
      background: color + '20', color, border: `1px solid ${color}40`,
      borderRadius: 20, fontSize: 11, fontWeight: 600, whiteSpace: 'nowrap',
    }}>{children}</span>
  );
}

function Toast({ message, type, onClose }) {
  useEffect(() => { const t = setTimeout(onClose, 3200); return () => clearTimeout(t); }, []);
  const color = type === 'success' ? C.success : type === 'error' ? C.danger : C.accent;
  return (
    <div style={{
      position: 'fixed', bottom: 28, right: 28, zIndex: 9999,
      background: C.surface2, border: `1px solid ${color}44`,
      borderRadius: 10, padding: '14px 18px',
      boxShadow: `0 8px 28px rgba(0,0,0,0.5), 0 0 0 1px ${color}22`,
      animation: 'toastPop 0.3s ease forwards',
      display: 'flex', alignItems: 'center', gap: 12, minWidth: 280,
    }}>
      <div style={{ width: 8, height: 8, borderRadius: '50%', background: color, flexShrink: 0 }} />
      <span style={{ fontSize: 14, color: C.textPrimary }}>{message}</span>
    </div>
  );
}

function Modal({ title, children, onClose, width = 600 }) {
  return (
    <div style={{
      position: 'fixed', inset: 0, zIndex: 600,
      display: 'flex', alignItems: 'center', justifyContent: 'center',
      background: 'rgba(0,0,0,0.7)',
    }}>
      <div style={{
        background: C.surface, border: `1px solid ${C.border}`,
        borderRadius: 12, width, maxWidth: '95vw', maxHeight: '90vh',
        overflowY: 'auto', animation: 'slideInModal 0.2s ease',
        boxShadow: `0 24px 64px rgba(0,0,0,0.6), 0 0 0 1px ${C.accent}22`,
      }}>
        <div style={{ padding: '20px 24px', borderBottom: `1px solid ${C.border}`, display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
          <span style={{ fontWeight: 700, fontSize: 16 }}>{title}</span>
          <button onClick={onClose} style={{ background: 'none', border: 'none', color: C.textSecondary, cursor: 'pointer', fontSize: 22, lineHeight: 1 }}>×</button>
        </div>
        <div style={{ padding: 24 }}>{children}</div>
      </div>
    </div>
  );
}

function KpiCard({ label, value, sub, color, icon }) {
  return (
    <div style={{
      background: C.surface, border: `1px solid ${C.border}`, borderRadius: 12,
      padding: '20px 24px', position: 'relative', overflow: 'hidden',
      transition: 'border-color 0.2s, transform 0.15s',
      cursor: 'default',
    }}
    onMouseEnter={e => { e.currentTarget.style.borderColor = color; e.currentTarget.style.transform = 'translateY(-2px)'; }}
    onMouseLeave={e => { e.currentTarget.style.borderColor = C.border; e.currentTarget.style.transform = 'translateY(0)'; }}
    >
      <div style={{ position: 'absolute', top: 0, left: 0, right: 0, height: 3, background: `linear-gradient(90deg, ${color}, ${color}44)`, borderRadius: '12px 12px 0 0' }} />
      <div style={{ fontSize: 12, color: C.textSecondary, marginBottom: 8, fontWeight: 500 }}>{label}</div>
      <div style={{ fontSize: 32, fontWeight: 700, color, animation: 'fadeSlideUp 0.5s ease' }}>{value}</div>
      {sub && <div style={{ fontSize: 12, color: C.textMuted, marginTop: 6 }}>{sub}</div>}
    </div>
  );
}

/* ─── 실시간 알람 대시보드 ─── */
function AlarmDashboard({ setToast, navigate }) {
  const [alarms, setAlarms] = useState(ALARM_ITEMS);
  const [newAlarmCount, setNewAlarmCount] = useState(0);
  const [realtimeActive, setRealtimeActive] = useState(true);

  useEffect(() => {
    if (!realtimeActive) return;
    const t = setInterval(() => {
      if (Math.random() > 0.7) {
        const types = ['배관 누출 의심', '시설물 이상', '도로 파손'];
        const grades = ['경고', '주의'];
        setNewAlarmCount(n => n + 1);
      }
    }, 4000);
    return () => clearInterval(t);
  }, [realtimeActive]);

  const handleDismiss = (id) => {
    setAlarms(prev => prev.map(a => a.id === id ? { ...a, status: '완료' } : a));
    setToast({ msg: '알람이 처리 완료로 변경되었습니다.', type: 'success' });
  };

  const handleBatchDismiss = () => {
    setAlarms(prev => prev.map(a => a.status === '긴급' ? { ...a, status: '처리중' } : a));
    setToast({ msg: '긴급 알람이 모두 처리중으로 변경되었습니다.', type: 'success' });
  };

  return (
    <div className="page-enter">
      {/* KPI 행 */}
      <div style={{ display: 'grid', gridTemplateColumns: 'repeat(4, 1fr)', gap: 16, marginBottom: 24 }}>
        <KpiCard label="실시간 활성 알람" value={alarms.filter(a => a.status !== '완료').length} sub="처리 대기 중" color={C.accent} />
        <KpiCard label="긴급 미조치" value={alarms.filter(a => a.status === '긴급').length} sub="즉시 대응 필요" color={C.danger} />
        <KpiCard label="오늘 수신 AI 탐지" value={AI_LOGS.length} sub={`신뢰도 평균 ${(AI_LOGS.reduce((s,l)=>s+l.confidence,0)/AI_LOGS.length*100).toFixed(0)}%`} color={C.info} />
        <KpiCard label="이번 주 처리율" value="78%" sub="31건 / 40건 처리" color={C.success} />
      </div>

      <div style={{ display: 'grid', gridTemplateColumns: '2fr 1fr', gap: 16 }}>
        {/* 알람 목록 */}
        <div>
          <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 12 }}>
            <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
              <span style={{ fontWeight: 700, fontSize: 15 }}>알람 목록</span>
              {realtimeActive && (
                <div style={{ display: 'flex', alignItems: 'center', gap: 6 }}>
                  <div style={{ width: 8, height: 8, borderRadius: '50%', background: C.success, animation: 'alertBlink 1.5s infinite' }} />
                  <span style={{ fontSize: 11, color: C.success }}>실시간</span>
                </div>
              )}
            </div>
            <div style={{ display: 'flex', gap: 8 }}>
              <button
                onClick={handleBatchDismiss}
                style={{ padding: '6px 14px', borderRadius: 8, cursor: 'pointer', background: C.accentDim, border: `1px solid ${C.accent}44`, color: C.accent, fontSize: 12 }}>
                긴급 일괄 처리
              </button>
              <button
                onClick={() => setRealtimeActive(p => !p)}
                style={{ padding: '6px 14px', borderRadius: 8, cursor: 'pointer', background: 'transparent', border: `1px solid ${C.border}`, color: C.textSecondary, fontSize: 12 }}>
                {realtimeActive ? '일시정지' : '재개'}
              </button>
            </div>
          </div>

          <div style={{ display: 'flex', flexDirection: 'column', gap: 8 }}>
            {alarms.map((alarm) => (
              <div key={alarm.id} style={{
                background: C.surface, border: `1px solid ${alarm.status === '긴급' ? C.danger + '66' : C.border}`,
                borderLeft: `4px solid ${GRADE_COLOR[alarm.grade] || C.textMuted}`,
                borderRadius: 10, padding: '14px 18px',
                display: 'flex', justifyContent: 'space-between', alignItems: 'center',
                animation: alarm.status === '긴급' ? 'glowPulse 2.5s infinite' : 'none',
                opacity: alarm.status === '완료' ? 0.5 : 1,
                transition: 'all 0.2s',
              }}
              onMouseEnter={e => { if (alarm.status !== '완료') e.currentTarget.style.background = C.surface2; }}
              onMouseLeave={e => { if (alarm.status !== '완료') e.currentTarget.style.background = C.surface; }}
              >
                <div style={{ flex: 1 }}>
                  <div style={{ display: 'flex', alignItems: 'center', gap: 8, marginBottom: 6 }}>
                    <span style={{ fontSize: 13, fontWeight: 600 }}>{alarm.title}</span>
                    <Badge color={GRADE_COLOR[alarm.grade]}>{alarm.grade}</Badge>
                    <Badge color={STATUS_COLOR[alarm.status]}>{alarm.status}</Badge>
                  </div>
                  <div style={{ display: 'flex', gap: 16, fontSize: 11, color: C.textSecondary }}>
                    <span>{alarm.location}</span>
                    <span>담당: {alarm.assignee}</span>
                    <span>경과: {alarm.since}</span>
                  </div>
                </div>
                {alarm.status !== '완료' && (
                  <div style={{ display: 'flex', gap: 8, marginLeft: 12 }}>
                    <button
                      onClick={() => handleDismiss(alarm.id)}
                      style={{ padding: '6px 14px', borderRadius: 8, cursor: 'pointer', background: C.primary, border: 'none', color: C.textPrimary, fontSize: 12, fontWeight: 600 }}>
                      처리완료
                    </button>
                    <button
                      onClick={() => navigate('report')}
                      style={{ padding: '6px 14px', borderRadius: 8, cursor: 'pointer', background: 'transparent', border: `1px solid ${C.border}`, color: C.textSecondary, fontSize: 12 }}>
                      이력보기
                    </button>
                  </div>
                )}
              </div>
            ))}
          </div>
        </div>

        {/* 우측: 실시간 차트 */}
        <div style={{ display: 'flex', flexDirection: 'column', gap: 16 }}>
          <div style={{ background: C.surface, border: `1px solid ${C.border}`, borderRadius: 12, padding: 20 }}>
            <div style={{ fontSize: 13, fontWeight: 600, marginBottom: 16 }}>유형별 현황</div>
            <div style={{ position: 'relative', height: 180 }}>
              <ResponsiveContainer width="100%" height="100%">
                <PieChart>
                  <Pie data={REPORT_DATA.byType} cx="50%" cy="50%" innerRadius={50} outerRadius={80} paddingAngle={3} dataKey="value">
                    {REPORT_DATA.byType.map((entry, i) => <Cell key={i} fill={entry.color} />)}
                  </Pie>
                  <Tooltip contentStyle={{ background: C.surface2, border: `1px solid ${C.border}`, borderRadius: 8, fontSize: 12 }} />
                </PieChart>
              </ResponsiveContainer>
            </div>
            <div style={{ display: 'flex', flexDirection: 'column', gap: 6, marginTop: 8 }}>
              {REPORT_DATA.byType.map(item => (
                <div key={item.name} style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', fontSize: 12 }}>
                  <div style={{ display: 'flex', alignItems: 'center', gap: 6 }}>
                    <div style={{ width: 8, height: 8, borderRadius: 2, background: item.color }} />
                    <span style={{ color: C.textSecondary }}>{item.name}</span>
                  </div>
                  <span style={{ fontWeight: 600 }}>{item.value}건</span>
                </div>
              ))}
            </div>
          </div>

          <div style={{ background: C.surface, border: `1px solid ${C.border}`, borderRadius: 12, padding: 20 }}>
            <div style={{ fontSize: 13, fontWeight: 600, marginBottom: 4 }}>AI 탐지 신뢰도</div>
            <div style={{ fontSize: 11, color: C.textMuted, marginBottom: 12 }}>최근 수신 {AI_LOGS.length}건</div>
            {AI_LOGS.slice(0, 4).map(log => (
              <div key={log.id} style={{ marginBottom: 8 }}>
                <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: 3, fontSize: 11 }}>
                  <span style={{ color: C.textSecondary }}>{log.type}</span>
                  <span style={{ color: log.confidence >= 0.7 ? C.success : C.warning }}>{(log.confidence * 100).toFixed(0)}%</span>
                </div>
                <div style={{ height: 6, background: C.surface2, borderRadius: 3 }}>
                  <div style={{ height: '100%', width: `${log.confidence * 100}%`, background: log.confidence >= 0.7 ? C.success : C.warning, borderRadius: 3 }} />
                </div>
              </div>
            ))}
          </div>
        </div>
      </div>
    </div>
  );
}

/* ─── 분석 리포트 ─── */
function ReportScreen({ setToast }) {
  const [period, setPeriod] = useState('7일');
  const [exporting, setExporting] = useState(false);
  const [selectedSite, setSelectedSite] = useState('전체');

  const handleExport = () => {
    setExporting(true);
    setTimeout(() => {
      setExporting(false);
      setToast({ msg: 'PDF 리포트가 생성되어 다운로드됩니다.', type: 'success' });
    }, 2200);
  };

  return (
    <div className="page-enter">
      {/* 컨트롤 */}
      <div style={{ display: 'flex', gap: 12, alignItems: 'center', marginBottom: 24 }}>
        <div style={{ display: 'flex', background: C.surface, border: `1px solid ${C.border}`, borderRadius: 8, overflow: 'hidden' }}>
          {['7일', '30일', '90일', '직접입력'].map(p => (
            <button key={p} onClick={() => setPeriod(p)} style={{
              padding: '8px 16px', border: 'none', cursor: 'pointer', fontSize: 13,
              background: period === p ? C.accent : 'transparent',
              color: period === p ? C.bg : C.textSecondary,
              fontWeight: period === p ? 700 : 400,
              transition: 'all 0.15s',
            }}>{p}</button>
          ))}
        </div>
        {period === '직접입력' && (
          <div style={{ display: 'flex', gap: 8, alignItems: 'center' }}>
            <input type="date" defaultValue="2026-05-13" style={{ padding: '7px 10px', borderRadius: 6, background: C.surface, border: `1px solid ${C.border}`, color: C.textPrimary, fontSize: 13 }} />
            <span style={{ color: C.textMuted }}>~</span>
            <input type="date" defaultValue="2026-05-20" style={{ padding: '7px 10px', borderRadius: 6, background: C.surface, border: `1px solid ${C.border}`, color: C.textPrimary, fontSize: 13 }} />
          </div>
        )}
        <select value={selectedSite} onChange={e => setSelectedSite(e.target.value)} style={{ padding: '8px 12px', borderRadius: 8, background: C.surface, border: `1px solid ${C.border}`, color: C.textPrimary, fontSize: 13, cursor: 'pointer' }}>
          {['전체', '한국산업단지', '부산진구 산단', '인천남 산단'].map(s => <option key={s}>{s}</option>)}
        </select>
        <div style={{ flex: 1 }} />
        <button
          onClick={handleExport}
          disabled={exporting}
          style={{ padding: '8px 20px', borderRadius: 8, cursor: 'pointer', background: exporting ? C.surface2 : C.primary, border: `1px solid ${exporting ? C.border : C.primary}`, color: C.textPrimary, fontWeight: 600, fontSize: 13, display: 'flex', alignItems: 'center', gap: 8 }}>
          {exporting ? (
            <>
              <div style={{ width: 14, height: 14, border: `2px solid ${C.textMuted}`, borderTop: `2px solid ${C.accent}`, borderRadius: '50%', animation: 'spinnerRing 0.8s linear infinite' }} />
              PDF 생성 중...
            </>
          ) : 'PDF 내보내기'}
        </button>
      </div>

      {/* 요약 KPI */}
      <div style={{ display: 'grid', gridTemplateColumns: 'repeat(4, 1fr)', gap: 14, marginBottom: 24 }}>
        {[
          { label: '총 이벤트', value: 31, color: C.accent },
          { label: '조치완료', value: 23, color: C.success },
          { label: '조치완료율', value: '74%', color: C.info },

/* ─── 알람 조치 ─── */
function AlarmActionScreen({ setToast }) {
  const [alarms, setAlarms] = useState(ALARM_ITEMS);
  const [tab, setTab] = useState('미조치');
  const [selected, setSelected] = useState([]);
  const [detailAlarm, setDetailAlarm] = useState(null);

  const filtered = {
    '미조치': alarms.filter(a => a.status === '긴급' || a.status === '신규' || a.status === '대기'),
    '처리중': alarms.filter(a => a.status === '처리중'),
    '완료': alarms.filter(a => a.status === '완료'),
  }[tab] || [];

  const handleBatchAssign = () => {
    setAlarms(prev => prev.map(a => selected.includes(a.id) ? { ...a, assignee: '이영희', status: '처리중' } : a));
    setSelected([]);
    setToast({ msg: `${selected.length}건의 이벤트가 이영희 담당자에게 배정되었습니다.`, type: 'success' });
  };

  return (
    <div className="page-enter">
      {/* 탭 */}
      <div style={{ display: 'flex', background: C.surface, border: `1px solid ${C.border}`, borderRadius: 10, overflow: 'hidden', marginBottom: 20, width: 'fit-content' }}>
        {['미조치', '처리중', '완료'].map(t => (
          <button key={t} onClick={() => setTab(t)} style={{
            padding: '9px 24px', border: 'none', cursor: 'pointer', fontSize: 13, fontWeight: tab === t ? 700 : 400,
            background: tab === t ? C.accent : 'transparent',
            color: tab === t ? C.bg : C.textSecondary,
            transition: 'all 0.15s',
          }}>
            {t}
            <span style={{ marginLeft: 6, fontSize: 11, background: tab === t ? 'rgba(0,0,0,0.2)' : C.surface2, padding: '1px 6px', borderRadius: 10 }}>
              {(filtered.length)}
            </span>
          </button>
        ))}
      </div>

      {/* 일괄 액션 */}
      {selected.length > 0 && (
        <div style={{ background: C.accentDim, border: `1px solid ${C.accent}44`, borderRadius: 8, padding: '10px 16px', marginBottom: 14, display: 'flex', alignItems: 'center', gap: 12 }}>
          <span style={{ fontSize: 13, color: C.accent }}>{selected.length}건 선택됨</span>
          <button onClick={handleBatchAssign} style={{ padding: '6px 14px', borderRadius: 6, cursor: 'pointer', background: C.primary, border: 'none', color: C.textPrimary, fontSize: 12, fontWeight: 600 }}>일괄 담당자 배정</button>
          <button onClick={() => setSelected([])} style={{ padding: '6px 14px', borderRadius: 6, cursor: 'pointer', background: 'transparent', border: `1px solid ${C.border}`, color: C.textSecondary, fontSize: 12 }}>선택 해제</button>
        </div>
      )}

      {/* 목록 */}
      <div style={{ display: 'flex', flexDirection: 'column', gap: 8 }}>
        {filtered.map(alarm => (
          <div key={alarm.id} style={{
            background: C.surface, border: `1px solid ${selected.includes(alarm.id) ? C.accent : C.border}`,
            borderRadius: 10, padding: '14px 18px', display: 'flex', alignItems: 'center', gap: 14,
            cursor: 'pointer', transition: 'all 0.15s',
          }}
          onMouseEnter={e => e.currentTarget.style.background = C.surface2}
          onMouseLeave={e => e.currentTarget.style.background = C.surface}
          >
            <input type="checkbox"
              checked={selected.includes(alarm.id)}
              onChange={e => { e.stopPropagation(); setSelected(prev => e.target.checked ? [...prev, alarm.id] : prev.filter(id => id !== alarm.id)); }}
              style={{ width: 16, height: 16, accentColor: C.accent, cursor: 'pointer', flexShrink: 0 }}
            />
            <div style={{ flex: 1 }} onClick={() => setDetailAlarm(alarm)}>
              <div style={{ display: 'flex', alignItems: 'center', gap: 8, marginBottom: 5 }}>
                <span style={{ fontSize: 13, fontWeight: 600 }}>{alarm.title}</span>
                <Badge color={GRADE_COLOR[alarm.grade]}>{alarm.grade}</Badge>
                <Badge color={STATUS_COLOR[alarm.status]}>{alarm.status}</Badge>
              </div>
              <div style={{ display: 'flex', gap: 16, fontSize: 11, color: C.textSecondary }}>
                <span>위치: {alarm.location}</span>
                <span>담당: {alarm.assignee}</span>
                <span>경과: {alarm.since}</span>
              </div>
            </div>
            <button

              style={{ padding: '6px 14px', borderRadius: 8, cursor: 'pointer', background: 'transparent', border: `1px solid ${C.border}`, color: C.textSecondary, fontSize: 12, whiteSpace: 'nowrap' }}>
              완료 처리

        ))}
        {filtered.length === 0 && (
          <div style={{ textAlign: 'center', padding: 48, color: C.textMuted, fontSize: 14 }}>해당 상태의 알람이 없습니다.</div>

      </div>

      {/* 상세 Modal */}

        <Modal title={`알람 상세: ${detailAlarm.title}`} onClose={() => setDetailAlarm(null)}>

              <Badge color={GRADE_COLOR[detailAlarm.grade]}>{detailAlarm.grade}</Badge>
              <Badge color={STATUS_COLOR[detailAlarm.status]}>{detailAlarm.status}</Badge>
            </div>
            {[['위치', detailAlarm.location], ['현장', detailAlarm.site], ['담당자', detailAlarm.assignee], ['경과', detailAlarm.since]].map(([k, v]) => (

                <span style={{ fontSize: 13, color: C.textSecondary }}>{k}</span>
                <span style={{ fontSize: 13 }}>{v}</span>
              </div>
            ))}
            <div>
              <label style={{ fontSize: 12, color: C.textSecondary, display: 'block', marginBottom: 6 }}>조치 메모</label>
              <textarea placeholder="조치 내용을 입력하세요..." style={{ width: '100%', height: 80, background: C.surface2, border: `1px solid ${C.border}`, borderRadius: 6, color: C.textPrimary, padding: '8px 12px', fontSize: 13, resize: 'none' }} />
            </div>
            <div style={{ display: 'flex', gap: 8 }}>
              <button onClick={() => { setAlarms(prev => prev.map(a => a.id === detailAlarm.id ? { ...a, status: '조치완료' } : a)); setDetailAlarm(null); setToast({ msg: '조치 완료로 변경되었습니다.', type: 'success' }); }}
                style={{ flex: 1, padding: '10px', borderRadius: 8, cursor: 'pointer', background: C.primary, border: 'none', color: C.textPrimary, fontWeight: 600, fontSize: 13 }}>
                조치완료 처리
              </button>
              <button onClick={() => setDetailAlarm(null)} style={{ padding: '10px 16px', borderRadius: 8, cursor: 'pointer', background: 'transparent', border: `1px solid ${C.border}`, color: C.textSecondary, fontSize: 13 }}>닫기</button>
            </div>
          </div>
        </Modal>
      )}
    </div>
  );
}

/* ─── 알람 설정 ─── */
function SettingsScreen({ setToast }) {
  const [settings, setSettings] = useState({ threshold: '48', webSocket: true, email: true, emailAddr: 'admin@company.co.kr', smsEnabled: false, gradeFilter: ['위험', '경고'] });
  const [saved, setSaved] = useState(false);

  const handleSave = () => {
    setSaved(true);
    setTimeout(() => setSaved(false), 2000);
    setToast({ msg: '알람 설정이 저장되었습니다.', type: 'success' });
  };

  return (
    <div className="page-enter" style={{ maxWidth: 680 }}>
      <div style={{ fontSize: 15, fontWeight: 700, marginBottom: 24 }}>알람 설정</div>

      {[
        {
          title: '임계값 설정',
          content: (
            <div style={{ display: 'flex', flexDirection: 'column', gap: 14 }}>
              <div>
                <label style={{ fontSize: 12, color: C.textSecondary, display: 'block', marginBottom: 6 }}>미처리 알람 임계값 (시간)</label>
                <div style={{ display: 'flex', gap: 10, alignItems: 'center' }}>
                  <input type="number" value={settings.threshold}
                    onChange={e => setSettings(p => ({ ...p, threshold: e.target.value }))}
                    style={{ width: 100, padding: '8px 12px', borderRadius: 6, background: C.surface2, border: `1px solid ${C.border}`, color: C.textPrimary, fontSize: 13 }} />
                  <span style={{ fontSize: 13, color: C.textSecondary }}>시간 경과 시 긴급 알람으로 전환</span>
                </div>
              </div>
              <div>
                <label style={{ fontSize: 12, color: C.textSecondary, display: 'block', marginBottom: 8 }}>알람 발송 위험등급 필터</label>
                <div style={{ display: 'flex', gap: 8 }}>
                  {['위험', '경고', '주의'].map(g => (
                    <div key={g} onClick={() => setSettings(p => ({ ...p, gradeFilter: p.gradeFilter.includes(g) ? p.gradeFilter.filter(x => x !== g) : [...p.gradeFilter, g] }))}
                      style={{ padding: '6px 14px', borderRadius: 20, cursor: 'pointer', fontSize: 12, fontWeight: 600, background: settings.gradeFilter.includes(g) ? GRADE_COLOR[g] + '22' : 'transparent', border: `1px solid ${settings.gradeFilter.includes(g) ? GRADE_COLOR[g] : C.border}`, color: settings.gradeFilter.includes(g) ? GRADE_COLOR[g] : C.textMuted, transition: 'all 0.15s' }}>
                      {g}
                    </div>
                  ))}
                </div>
              </div>
            </div>
          )
        },
        {
          title: '알람 채널 설정',
          content: (
            <div style={{ display: 'flex', flexDirection: 'column', gap: 14 }}>
              {[
                { key: 'webSocket', label: '화면 실시간 알람 (WebSocket)', desc: '브라우저 화면에 팝업 알람 표시' },
                { key: 'email', label: '이메일 알람', desc: '담당자 이메일로 즉시 발송' },
                { key: 'smsEnabled', label: 'SMS 알람', desc: '위험 등급만 SMS 발송 (선택)' },
              ].map(item => (
                <div key={item.key} style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', padding: '10px 0', borderBottom: `1px solid ${C.border}` }}>
                  <div>
                    <div style={{ fontSize: 13 }}>{item.label}</div>
                    <div style={{ fontSize: 11, color: C.textMuted, marginTop: 2 }}>{item.desc}</div>
                  </div>
                  <div onClick={() => setSettings(p => ({ ...p, [item.key]: !p[item.key] }))}
                    style={{ width: 44, height: 24, borderRadius: 12, background: settings[item.key] ? C.accent : C.border, position: 'relative', cursor: 'pointer', transition: 'background 0.2s' }}>
                    <div style={{ position: 'absolute', top: 3, left: settings[item.key] ? 23 : 3, width: 18, height: 18, borderRadius: '50%', background: '#fff', transition: 'left 0.2s' }} />
                  </div>
                </div>
              ))}
              {settings.email && (
                <div>
                  <label style={{ fontSize: 12, color: C.textSecondary, display: 'block', marginBottom: 6 }}>수신 이메일</label>
                  <input type="email" value={settings.emailAddr}
                    onChange={e => setSettings(p => ({ ...p, emailAddr: e.target.value }))}
                    style={{ width: '100%', padding: '8px 12px', borderRadius: 6, background: C.surface2, border: `1px solid ${C.border}`, color: C.textPrimary, fontSize: 13 }} />
                </div>
              )}
            </div>
          )
        }
      ].map(section => (
        <div key={section.title} style={{ background: C.surface, border: `1px solid ${C.border}`, borderRadius: 12, overflow: 'hidden', marginBottom: 16 }}>
          <div style={{ padding: '14px 20px', borderBottom: `1px solid ${C.border}`, fontWeight: 600, fontSize: 14 }}>{section.title}</div>
          <div style={{ padding: 20 }}>{section.content}</div>
        </div>
      ))}

      <button onClick={handleSave} style={{ width: '100%', padding: '12px', borderRadius: 10, cursor: 'pointer', background: saved ? C.success : C.primary, border: 'none', color: C.textPrimary, fontWeight: 700, fontSize: 14, transition: 'background 0.3s' }}>
        {saved ? '저장 완료' : '설정 저장'}
      </button>
    </div>
  );
}

/* ─── 네비게이션 ─── */
const NAV_ITEMS = [
  { id: 'main', label: '실시간 알람', icon: 'ph-bell-ringing' },
  { id: 'report', label: '분석 리포트', icon: 'ph-chart-bar' },
  { id: 'ai-endpoint', label: 'AI 연동 관리', icon: 'ph-robot' },
  { id: 'alarm', label: '알람 조치', icon: 'ph-shield-check' },
  { id: 'settings', label: '알람 설정', icon: 'ph-gear' },
];

/* ─── 메인 앱 ─── */
function App() {
  const [page, setPage] = useState('main');
  const [toast, setToast] = useState(null);
  const [mobileMenuOpen, setMobileMenuOpen] = useState(false);

  const navigate = (id) => { setPage(id); setMobileMenuOpen(false); };

  const renderPage = () => {
    const props = { setToast: (t) => setToast(t), navigate };
    switch (page) {
      case 'main': return <AlarmDashboard {...props} />;
      case 'report': return <ReportScreen {...props} />;
      case 'ai-endpoint': return <AiEndpointScreen {...props} />;
      case 'alarm': return <AlarmActionScreen {...props} />;
      case 'settings': return <SettingsScreen {...props} />;
      default: return null;
    }
  };

  const activeNav = NAV_ITEMS.find(n => n.id === page);

  return (
    <div style={{ width: '100%', minHeight: '100vh', background: C.bg, color: C.textPrimary }}>
      {/* 글로벌 탑바 */}
      <header style={{ background: C.surface, borderBottom: `1px solid ${C.border}`, position: 'sticky', top: 0, zIndex: 100 }}>
        <div style={{ maxWidth: 1280, margin: '0 auto', padding: '0 24px', height: 58, display: 'flex', alignItems: 'center', gap: 24 }}>
          {/* 로고 */}
          <div style={{ display: 'flex', alignItems: 'center', gap: 10, flexShrink: 0 }}>
            <div style={{ width: 32, height: 32, background: `linear-gradient(135deg, ${C.primary}, ${C.accent})`, borderRadius: 8, display: 'flex', alignItems: 'center', justifyContent: 'center', boxShadow: `0 0 12px ${C.accent}44` }}>
              <i className="ph-shield-warning" style={{ fontSize: 18, color: '#fff' }} />
            </div>
            <div>
              <div style={{ fontSize: 14, fontWeight: 700, lineHeight: 1.2 }}>GIS 이상징후 관제</div>
              <div style={{ fontSize: 10, color: C.textMuted }}>Integrated Anomaly Platform</div>
            </div>
          </div>

          {/* 네비게이션 */}
          <nav style={{ display: 'flex', gap: 4, flex: 1 }}>
            {NAV_ITEMS.map(item => (
              <button
                key={item.id}
                onClick={() => navigate(item.id)}
                style={{
                  padding: '7px 14px', borderRadius: 8, border: 'none', cursor: 'pointer',
                  display: 'flex', alignItems: 'center', gap: 7, fontSize: 13,
                  background: page === item.id ? C.accentDim : 'transparent',
                  color: page === item.id ? C.accent : C.textSecondary,
                  fontWeight: page === item.id ? 600 : 400,
                  transition: 'all 0.15s',
                }}
                onMouseEnter={e => { if (page !== item.id) e.currentTarget.style.background = C.surface2; }}
                onMouseLeave={e => { if (page !== item.id) e.currentTarget.style.background = 'transparent'; }}
              >
                <i className={item.icon} style={{ fontSize: 16 }} />
                {item.label}
              </button>
            ))}
          </nav>

          {/* 우측 */}
          <div style={{ display: 'flex', alignItems: 'center', gap: 14, flexShrink: 0 }}>
            <div style={{ display: 'flex', alignItems: 'center', gap: 6 }}>
              <div style={{ width: 8, height: 8, borderRadius: '50%', background: C.success, animation: 'alertBlink 2s infinite' }} />
              <span style={{ fontSize: 11, color: C.textSecondary }}>실시간 모니터링</span>
            </div>
            <div style={{ width: 34, height: 34, borderRadius: '50%', background: `linear-gradient(135deg, ${C.primary}, ${C.accent})`, display: 'flex', alignItems: 'center', justifyContent: 'center', cursor: 'pointer', fontWeight: 700, fontSize: 13 }}>관</div>
          </div>
        </div>
      </header>

      {/* 서브 브레드크럼 */}
      <div style={{ background: C.surface2, borderBottom: `1px solid ${C.border}44`, padding: '8px 24px', display: 'flex', alignItems: 'center', gap: 8 }}>
        <span style={{ fontSize: 12, color: C.textMuted }}>한국산업단지공단</span>
        <span style={{ color: C.border }}>›</span>
        <span style={{ fontSize: 12, color: C.accent, fontWeight: 600 }}>
          <i className={activeNav?.icon} style={{ marginRight: 4, fontSize: 13 }} />
          {activeNav?.label}
        </span>
        <div style={{ marginLeft: 'auto', fontSize: 11, color: C.textMuted }}>최종 갱신: 2026.05.20 14:35</div>
      </div>

      {/* 콘텐츠 */}
      <main style={{ maxWidth: 1280, margin: '0 auto', padding: '24px' }}>
        {renderPage()}
      </main>

      {/* 푸터 */}
      <footer style={{ borderTop: `1px solid ${C.border}`, padding: '16px 24px', display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
        <span style={{ fontSize: 12, color: C.textMuted }}>GIS 기반 현장 이상징후 통합 관제 플랫폼 v2.0</span>
        <span style={{ fontSize: 12, color: C.textMuted }}>React · Node.js · PostgreSQL · Redis · AWS S3</span>
      </footer>

      {/* 토스트 */}
      {toast && <Toast message={toast.msg} type={toast.type} onClose={() => setToast(null)} />}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
