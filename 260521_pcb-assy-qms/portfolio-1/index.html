<style>

html,body,#root{width:100%;height:100%;font-family:'Pretendard',sans-serif}
body{background:#F5F6F8;color:#1A2332}

.sidebar{width:230px;min-height:100vh;background:#112D26;display:flex;flex-direction:column;position:fixed;left:0;top:0;bottom:0;z-index:100}
.sidebar-logo{padding:20px 20px 16px;border-bottom:1px solid rgba(255,255,255,0.08);display:flex;align-items:center;gap:10px}

.sidebar-logo-badge{background:#1B6B5A;border-radius:4px;padding:4px 7px;color:#fff;font-size:10px;font-weight:600}
.sidebar-nav{flex:1;padding:12px 0;overflow-y:auto}
.nav-section{padding:6px 16px 4px;font-size:10.5px;color:rgba(255,255,255,0.35);font-weight:600;letter-spacing:0.06em;text-transform:uppercase}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 16px;color:rgba(255,255,255,0.6);font-size:13.5px;cursor:pointer;transition:all 0.15s;border-left:2px solid transparent;margin:1px 0}
.nav-item:hover{background:rgba(255,255,255,0.06);color:rgba(255,255,255,0.9)}
.nav-item.active{background:rgba(27,107,90,0.3);color:#fff;border-left-color:#2E8B72}
.nav-item i{width:17px;height:17px;opacity:0.8}
.sidebar-footer{padding:14px 16px;border-top:1px solid rgba(255,255,255,0.08);display:flex;align-items:center;gap:10px}
.sidebar-user-avatar{width:30px;height:30px;border-radius:50%;background:#1B6B5A;display:flex;align-items:center;justify-content:center;color:#fff;font-size:12px;font-weight:600;flex-shrink:0}
.sidebar-user-name{color:rgba(255,255,255,0.75);font-size:12.5px;font-weight:500}

.main-wrap{margin-left:230px;min-height:100vh;display:flex;flex-direction:column;flex:1;min-width:0;width:calc(100% - 230px)}
.topbar{background:#fff;border-bottom:1px solid #E8EBF0;padding:0 24px;height:54px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50}
.topbar-title{font-size:14.5px;font-weight:600;color:#1A2332}
.topbar-right{display:flex;align-items:center;gap:10px}
.topbar-badge{background:#F0F9F6;border:1px solid #B7DDD4;border-radius:4px;padding:4px 10px;font-size:12px;color:#1B6B5A;font-weight:600}
.topbar-notif{width:34px;height:34px;border-radius:6px;background:#F5F6F8;display:flex;align-items:center;justify-content:center;cursor:pointer;position:relative}
.notif-dot{width:7px;height:7px;background:#F0A500;border-radius:50%;position:absolute;top:7px;right:7px;border:1.5px solid #fff}

.content{padding:22px 24px;flex:1;animation:fadeIn 0.3s ease}
.page-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
.page-title{font-size:18px;font-weight:700;color:#1A2332}
.page-subtitle{font-size:12.5px;color:#5A6B7E;margin-top:3px}
.btn-primary{background:#1B6B5A;color:#fff;border:none;border-radius:6px;padding:9px 16px;font-size:13px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:6px;transition:background 0.15s}

.btn-secondary{background:#fff;color:#1A2332;border:1px solid #D1D9E0;border-radius:6px;padding:8px 14px;font-size:13px;font-weight:500;cursor:pointer;display:flex;align-items:center;gap:6px;transition:all 0.15s}

.kpi-label{font-size:11.5px;color:#5A6B7E;font-weight:500;margin-bottom:8px;display:flex;align-items:center;gap:5px}
.kpi-value{font-size:26px;font-weight:700;color:#1A2332;line-height:1}

.table-wrap{overflow-x:auto}

.defect-bar-row{display:flex;align-items:center;gap:10px;margin-bottom:10px;animation:slideInLeft 0.35s ease both}
.defect-bar-label{font-size:12px;color:#1A2332;width:110px;flex-shrink:0}
.defect-bar-track{flex:1;background:#F0F2F5;border-radius:3px;height:9px;overflow:hidden}
.defect-bar-fill{height:100%;border-radius:3px;background:#1B6B5A;animation:barGrow 0.6s ease both}
.defect-bar-count{font-size:12px;color:#5A6B7E;width:40px;text-align:right;flex-shrink:0}

.timeline{display:flex;flex-direction:column;gap:0}
.timeline-item{display:flex;gap:12px;padding-bottom:16px;position:relative;animation:slideUp 0.35s ease both}
.timeline-item::before{content:'';position:absolute;left:16px;top:32px;bottom:0;width:1px;background:#E8EBF0}

.overlay{position:fixed;inset:0;background:rgba(0,0,0,0.45);z-index:200;display:flex;align-items:center;justify-content:center;animation:fadeIn 0.2s ease}
.modal{background:#fff;border-radius:8px;width:600px;max-width:92vw;max-height:88vh;display:flex;flex-direction:column;animation:slideUp 0.25s ease}

.form-group{margin-bottom:14px}
.form-label{font-size:12.5px;font-weight:600;color:#1A2332;margin-bottom:6px;display:block}
.form-input{width:100%;border:1px solid #D1D9E0;border-radius:6px;padding:9px 12px;font-size:13px;font-family:inherit;color:#1A2332;outline:none;transition:border 0.15s}

.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}

.toast{position:fixed;bottom:28px;right:24px;background:#1A2332;color:#fff;border-radius:8px;padding:12px 18px;font-size:13px;font-weight:500;z-index:500;display:flex;align-items:center;gap:8px;animation:toastIn 0.3s ease;box-shadow:0 8px 24px rgba(0,0,0,0.18)}

.toast.warn{background:#D97706}

.approval-card{background:#fff;border:1px solid #E8EBF0;border-radius:6px;padding:14px 16px;margin-bottom:10px;cursor:pointer;transition:all 0.15s;animation:slideUp 0.3s ease both}
.approval-card:hover{border-color:#2E8B72;box-shadow:0 2px 8px rgba(27,107,90,0.12)}

.step-flow{display:flex;align-items:center;gap:0;margin:14px 0}
.step-node{display:flex;flex-direction:column;align-items:center;gap:4px}
.step-circle{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700}
.step-circle.done{background:#E8F7F3;color:#1B6B5A;border:2px solid #2E8B72}
.step-circle.active{background:#1B6B5A;color:#fff;animation:pulseGreen 2s infinite}
.step-circle.idle{background:#F5F6F8;color:#9AABBA;border:2px solid #E8EBF0}
.step-label{font-size:10.5px;color:#5A6B7E;text-align:center;max-width:56px}
.step-line{flex:1;height:2px;background:#E8EBF0;min-width:20px}
.step-line.done{background:#2E8B72}

.aql-result-box{background:#F0F9F6;border:1px solid #B7DDD4;border-radius:6px;padding:14px 16px;display:flex;align-items:center;gap:14px}
.aql-result-num{font-size:28px;font-weight:800;color:#1B6B5A}
.aql-result-label{font-size:12.5px;color:#1A2332;font-weight:600}
.aql-result-sub{font-size:11.5px;color:#5A6B7E}

.report-preview{border:1px solid #E8EBF0;border-radius:6px;overflow:hidden}
.report-preview-head{background:#1B6B5A;color:#fff;padding:12px 16px;font-size:13px;font-weight:700;display:flex;align-items:center;justify-content:space-between}
.report-preview-body{padding:14px 16px}
.report-row{display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid #F0F2F5;font-size:12.5px}
.report-row:last-child{border-bottom:none}
.report-row-label{color:#5A6B7E;font-weight:500}
.report-row-value{color:#1A2332;font-weight:600}

.progress-bar{background:#F0F2F5;border-radius:20px;height:8px;overflow:hidden;margin-top:4px}
.progress-fill{height:100%;border-radius:20px;background:#1B6B5A;animation:barGrow 0.8s ease both}
</style>
</head>
<body>

<script type="text/babel">
const {useState,useEffect,useRef}=React;
const {BarChart,Bar,LineChart,Line,XAxis,YAxis,CartesianGrid,Tooltip,ResponsiveContainer,PieChart,Pie,Cell,Legend}=Recharts;

function Icon({name,size=16,color}){
  const ref=useRef(null);
  useEffect(()=>{if(ref.current&&window.lucide)window.lucide.createIcons({nodes:[ref.current]});},[name]);
  return <i ref={ref} data-lucide={name} style={{width:size,height:size,display:'inline-block',flexShrink:0,color:color||'currentColor'}}></i>;
}

function Toast({msg,type,onClose}){
  useEffect(()=>{const t=setTimeout(onClose,3000);return()=>clearTimeout(t);},[]);
  return <div className={`toast ${type}`}><Icon name="check-circle" size={15}/>{msg}</div>;
}

function Overlay({children,onClose}){
  return <div className="overlay" onClick={e=>{if(e.target===e.currentTarget)onClose()}}>{children}</div>;
}

function AQLModal({onClose,onToast}){
  const [qty,setQty]=useState('');
  const [supplier,setSupplier]=useState('한국기판(주)');
  const [aqlLevel,setAqlLevel]=useState('II');
  const [result,setResult]=useState(null);

  function calcAQL(){
    const q=parseInt(qty)||0;
    let n=0;
    if(q<=150)n=13;
    else if(q<=280)n=20;
    else if(q<=500)n=32;
    else if(q<=1200)n=50;
    else if(q<=3200)n=80;
    else if(q<=10000)n=125;
    else if(q<=35000)n=200;
    else n=315;
    const ac=aqlLevel==='I'?1:aqlLevel==='II'?2:3;
    setResult({n,ac,re:ac+1});
  }

  return <Overlay onClose={onClose}>
    <div className="modal" style={{width:560}}>
      <div className="modal-header">
        <div className="modal-title">AQL 샘플 수 자동 산출</div>
        <button className="close-btn" onClick={onClose}><Icon name="x" size={14}/></button>
      </div>
      <div className="modal-body">
        <div className="form-row">
          <div className="form-group">
            <label className="form-label">입고 수량 (개)</label>
            <input className="form-input" type="number" placeholder="예: 2400" value={qty} onChange={e=>setQty(e.target.value)}/>
            <div className="form-hint">로트 단위 총 수량</div>
          </div>
          <div className="form-group">
            <label className="form-label">협력사</label>
            <select className="form-input filter-select" value={supplier} onChange={e=>setSupplier(e.target.value)}>
              <option>한국기판(주)</option><option>서울PCB(주)</option><option>대전전자(주)</option><option>인천PCB텍</option>
            </select>
          </div>
        </div>
        <div className="form-row">
          <div className="form-group">
            <label className="form-label">AQL 검사 수준</label>
            <select className="form-input filter-select" value={aqlLevel} onChange={e=>setAqlLevel(e.target.value)}>

function ApprovalModal({item,onClose,onToast}){

        {page==='aql'&&<>
          <div className="page-header">
            <div><div className="page-title">AQL 샘플링 관리</div>
              <div className="page-subtitle">협력사별 AQL 등급 설정 및 샘플 수 자동 산출</div>
            </div>
            <button className="btn-primary" onClick={()=>setModal({type:'aql'})}>
              <Icon name="calculator" size={15}/>샘플 수 계산
            </button>
          </div>
          <div className="kpi-grid" style={{gridTemplateColumns:'repeat(3,1fr)'}}>
            {[
              {label:'등록 협력사',val:'8개사',sub:'AQL 등급 설정 완료'},
              {label:'이번 달 입고 검사',val:'47건',sub:'로트 단위'},
              {label:'조건부 합격률',val:'8.5%',sub:'이번 달 기준'},
            ].map((k,i)=><div className="kpi-card" key={i} style={{animationDelay:`${i*0.07}s`}}>
              <div className="kpi-label">{k.label}</div>
              <div className="kpi-value">{k.val}</div>
              <div className="kpi-sub">{k.sub}</div>
            </div>)}
          </div>
          <div className="card">
            <div className="card-header">
              <div className="card-title"><Icon name="shield" size={15}/>협력사별 AQL 기준</div>
              <button className="btn-secondary btn-sm" onClick={()=>showToast('협력사 기준 CSV를 내보냅니다')}>
                <Icon name="download" size={13}/>내보내기
              </button>
            </div>
            <div className="card-body" style={{padding:0}}>
              <table>
                <thead><tr><th>협력사</th><th>AQL 수준</th><th>기본 등급</th><th>허용 불량률</th><th>이번달 검사</th><th>합격률</th></tr></thead>
                <tbody>
                  {[
                    {name:'한국기판(주)',level:'수준 II',grade:'AQL 1.0',rate:'1.0%',cnt:14,pass:'92.9%'},
                    {name:'서울PCB(주)',level:'수준 II',grade:'AQL 1.5',rate:'1.5%',cnt:10,pass:'80.0%'},
                    {name:'대전전자(주)',level:'수준 I',grade:'AQL 0.65',rate:'0.65%',cnt:8,pass:'100%'},
                    {name:'인천PCB텍',level:'수준 III',grade:'AQL 2.5',rate:'2.5%',cnt:6,pass:'66.7%'},
                  ].map((r,i)=><tr key={i} style={{animationDelay:`${i*0.06}s`}} onClick={()=>showToast(`${r.name} AQL 기준 편집 화면을 엽니다`)}>
                    <td style={{fontWeight:600}}>{r.name}</td>
                    <td><span className="badge badge-gray">{r.level}</span></td>
                    <td style={{fontWeight:600,color:TEAL}}>{r.grade}</td>
                    <td>{r.rate}</td>
                    <td>{r.cnt}건</td>
                    <td style={{fontWeight:600,color:parseFloat(r.pass)>=90?TEAL:'#D97706'}}>{r.pass}</td>
                  </tr>)}
                </tbody>
              </table>
            </div>
          </div>
        </>}

        {/* Approval Page */}
        {page==='approval'&&<>
          <div className="page-header">
            <div><div className="page-title">결재 관리</div>
              <div className="page-subtitle">조건부 합격 및 특채 승인 워크플로우</div>
            </div>
            <div style={{display:'flex',gap:8}}>
              <button className="btn-secondary" onClick={()=>showToast('결재 현황을 Excel로 내보냅니다')}><Icon name="download" size={14}/>내보내기</button>
            </div>
          </div>
          <div className="kpi-grid" style={{gridTemplateColumns:'repeat(4,1fr)',marginBottom:16}}>
            {[
              {label:'결재 대기',val:'2건',type:'warn'},
              {label:'검토 중',val:'1건',type:'warn'},
              {label:'이번 달 승인',val:'12건',type:'good'},
              {label:'이번 달 반려',val:'2건',type:'danger'},
            ].map((k,i)=><div className="kpi-card" key={i}>
              <div className="kpi-label">{k.label}</div>
              <div className="kpi-value">{k.val}</div>
              <div className={`kpi-badge ${k.type}`}>{k.type==='warn'?'처리 필요':k.type==='good'?'정상':'확인 필요'}</div>
            </div>)}
          </div>
          {approvalItems.map((item,i)=><div key={i} className="approval-card" onClick={()=>setModal({type:'approval',data:item})}>
            <div style={{display:'flex',alignItems:'flex-start',justifyContent:'space-between',marginBottom:8}}>
              <div>
                <span style={{fontSize:13,fontWeight:700,color:TEXT,marginRight:8}}>{item.id}</span>
                <span className={`badge ${item.step==='완료'?'badge-done':'badge-cond'}`}>{item.type}</span>
                {item.priority==='high'&&<span className="badge badge-fail" style={{marginLeft:4}}>긴급</span>}
              </div>
              <span style={{fontSize:11.5,color:MUTED}}>{item.date}</span>
            </div>
            <div style={{fontSize:12.5,color:MUTED,marginBottom:10}}>{item.lot} · 신청자: {item.requester}</div>
            <div className="step-flow" style={{margin:0}}>
              {['검사자 요청','품질관리자 검토','팀장 최종 승인','완료'].map((s,si)=>{
                const activeIdx=item.step==='품질관리자 검토'?1:item.step==='팀장 최종 승인'?2:item.step==='완료'?3:0;
                return <React.Fragment key={si}>
                  <div className="step-node">
                    <div className={`step-circle ${si<activeIdx?'done':si===activeIdx?'active':'idle'}`} style={{width:24,height:24,fontSize:10}}>
                      {si<activeIdx?<Icon name="check" size={10}/>:si+1}
                    </div>
                    <div className="step-label" style={{fontSize:10}}>{s}</div>
                  </div>
                  {si<3&&<div className={`step-line ${si<activeIdx?'done':''}`}/>}
                </React.Fragment>;
              })}
            </div>
          </div>)}
        </>}

        {/* Report Page */}
        {page==='report'&&<>
          <div className="page-header">
            <div><div className="page-title">성적서 발행</div>
              <div className="page-subtitle">PDF 성적서 자동 생성 및 이메일 발송 관리</div>
            </div>
            <button className="btn-primary" onClick={()=>showToast('새 성적서 생성 화면을 엽니다')}>
              <Icon name="file-plus" size={15}/>성적서 생성
            </button>
          </div>
          <div className="kpi-grid" style={{gridTemplateColumns:'repeat(3,1fr)'}}>
            {[{label:'오늘 발행',val:'3건'},{label:'이메일 발송',val:'3건'},{label:'이번 달 합계',val:'47건'}].map((k,i)=>(
              <div className="kpi-card" key={i}><div className="kpi-label">{k.label}</div><div className="kpi-value">{k.val}</div></div>
            ))}
          </div>
          <div className="card">
            <div className="card-header">
              <div className="card-title"><Icon name="file-text" size={15}/>발행 이력</div>
            </div>
            <div className="card-body" style={{padding:0}}>
              <table>
                <thead><tr><th>성적서 번호</th><th>납품처</th><th>검사자</th><th>판정</th><th>발행일시</th><th>이메일</th></tr></thead>
                <tbody>
                  {reportData.map((r,i)=><tr key={i} style={{animationDelay:`${i*0.06}s`}} onClick={()=>setModal({type:'report',data:r})}>
                    <td style={{fontWeight:600,color:TEAL}}>{r.id}</td>
                    <td>{r.customer}</td>
                    <td>{r.inspector}</td>
                    <td><span className="badge badge-pass">{r.result}</span></td>
                    <td style={{fontSize:12,color:MUTED}}>{r.issued}</td>
                    <td><span className="badge badge-done"><Icon name="mail" size={11}/>발송완료</span></td>
                  </tr>)}
                </tbody>
              </table>
            </div>
          </div>
        </>}

        {/* Incoming Inspection */}
        {(page==='incoming'||page==='process'||page==='outgoing')&&<>
          <div className="page-header">
            <div><div className="page-title">{page==='incoming'?'입고 검사':page==='process'?'공정 검사':'출하 검사'} 목록</div>
              <div className="page-subtitle">전체 {filtered.length}건</div>
            </div>
            <div style={{display:'flex',gap:8}}>
              <button className="btn-secondary"><Icon name="download" size={14}/>내보내기</button>
              <button className="btn-primary" onClick={()=>setModal({type:'aql'})}>
                <Icon name="plus" size={15}/>검사 등록
              </button>
            </div>
          </div>
          <div className="filter-bar">
            <input className="search-input" placeholder="LOT번호 또는 협력사 검색" value={search} onChange={e=>setSearch(e.target.value)}/>
            <select className="filter-select" value={filterStatus} onChange={e=>setFilterStatus(e.target.value)}>
              <option value="all">전체</option><option value="pass">합격</option><option value="cond">조건부</option><option value="fail">불합격</option>
            </select>
            <button className="btn-secondary btn-sm" onClick={()=>{setSearch('');setFilterStatus('all');}}><Icon name="rotate-ccw" size={13}/>초기화</button>
          </div>
          <div className="card">
            <div className="card-body" style={{padding:0}}>
              <table>
                <thead><tr><th>검사번호</th><th>LOT번호</th><th>협력사</th><th>입고수량</th><th>샘플수</th><th>불량수</th><th>불량률</th><th>판정</th><th>일자</th></tr></thead>
                <tbody>
                  {filtered.map((r,i)=><tr key={i} style={{animationDelay:`${i*0.06}s`}} onClick={()=>setModal({type:'inspDetail',data:r})}>
                    <td style={{fontWeight:600,color:TEAL}}>{r.id}</td>
                    <td style={{fontFamily:'monospace',fontSize:12}}>{r.lot}</td>
                    <td>{r.supplier}</td>
                    <td>{r.qty.toLocaleString()}</td>
                    <td>{r.sample}</td>
                    <td>{r.defects}</td>
                    <td style={{fontWeight:600,color:r.status==='pass'?TEAL:r.status==='cond'?'#D97706':'#DC2626'}}>{r.rate}</td>
                    <td><span className={`badge badge-${r.status}`}>{r.status==='pass'?'합격':r.status==='cond'?'조건부':'불합격'}</span></td>
                    <td style={{fontSize:12,color:MUTED}}>{r.date}</td>
                  </tr>)}
                </tbody>
              </table>
            </div>
          </div>
        </>}

        {/* Master Settings */}
        {page==='master'&&<>
          <div className="page-header">
            <div><div className="page-title">마스터 설정</div>
              <div className="page-subtitle">기초 정보 및 시스템 마스터 데이터 관리</div>
            </div>
          </div>
          <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:14}}>
            {masterData.map((m,i)=><div key={i} className="card" style={{cursor:'pointer',transition:'box-shadow 0.15s',animationDelay:`${i*0.07}s`}}
              onClick={()=>setModal({type:'master',data:m})}>
              <div className="card-body">
                <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:10}}>
                  <div style={{width:36,height:36,borderRadius:6,background:'#E8F7F3',display:'flex',alignItems:'center',justifyContent:'center'}}>
                    <Icon name={i===0?'building-2':i===1?'truck':i===2?'layers':i===3?'alert-triangle':i===4?'users':'settings'} size={18} color={TEAL}/>
                  </div>
                  <div style={{fontWeight:600,fontSize:14,color:TEXT}}>{m.cat}</div>
                </div>
                <div style={{fontSize:24,fontWeight:800,color:TEAL,marginBottom:4}}>{m.count}<span style={{fontSize:14,fontWeight:400,color:MUTED}}> 개</span></div>
                <div style={{fontSize:11.5,color:MUTED}}>최근: {m.last}</div>
                <div style={{marginTop:10}}>
                  <div className="progress-bar"><div className="progress-fill" style={{width:Math.min(100,m.count*2)+'%'}}/></div>
                </div>
              </div>
            </div>)}
          </div>
        </>}
      </div>
    </div>

    {/* Modals */}
    {modal?.type==='aql'&&<AQLModal onClose={()=>setModal(null)} onToast={showToast}/>}
    {modal?.type==='approval'&&<ApprovalModal item={modal.data} onClose={()=>setModal(null)} onToast={showToast}/>}
    {modal?.type==='report'&&<ReportModal item={modal.data} onClose={()=>setModal(null)} onToast={showToast}/>}
    {modal?.type==='master'&&<MasterModal item={modal.data} onClose={()=>setModal(null)} onToast={showToast}/>}
    {modal?.type==='inspDetail'&&<InspectionDetailModal row={modal.data} onClose={()=>setModal(null)} onToast={showToast}/>}

    {toast&&<Toast msg={toast.msg} type={toast.type} onClose={()=>setToast(null)}/>}
  </div>;
}

const root=ReactDOM.createRoot(document.getElementById('root'));
root.render(<App/>);
</script>
</body>
</html>
