function PHIcon({name,size=16,color}){
  return <i className={`ph ph-${name}`} style={{fontSize:size,lineHeight:1,color:color||'currentColor',flexShrink:0}}/>;
}

function Toast({msg,type,onClose}){
  useEffect(()=>{const t=setTimeout(onClose,3000);return()=>clearTimeout(t);},[]);
  return <div className={`toast ${type}`}><PHIcon name="check-circle"/>{msg}</div>;
}

function Overlay({children,onClose}){
  return <div className="overlay" onClick={e=>{if(e.target===e.currentTarget)onClose();}}>{children}</div>;
}

  const [activeRule,setActiveRule]=useState(null);

              <PHIcon name="bell" size={11} color={MUTED}/>
              <span style={{fontSize:11.5,color:MUTED}}>{r.channel}</span>
              <span className={`badge ${r.corp==='KR'?'badge-indigo':r.corp==='VN'?'badge-green':'badge-gray'}`} style={{fontSize:10,padding:'1px 6px'}}>{r.corp}</span>

                <span className="badge badge-amber">80/20 법칙 적용</span>
              </div>
            </div>
          </div>
        </div>
        <div className="card">
          <div className="card-head">
            <div className="card-title"><PHIcon name="bell" size={15}/>현재 활성 알림 규칙</div>
            <button className="btn-secondary btn-sm" onClick={()=>setDrawer({type:'alert'})}>
              <PHIcon name="gear"/>설정 관리
            </button>
          </div>
          <div className="card-body">
            {alertRules.filter(r=>r.active).map((r,i)=><div className="alert-rule-row" key={i} onClick={()=>setDrawer({type:'alert'})}>
              <div className="rule-status" style={{background:GREEN,animation:'glowPulse 2s infinite'}}/>
              <div style={{flex:1}}>
                <div style={{fontSize:13,fontWeight:600,color:TEXT}}>{r.name}</div>
                <div style={{fontSize:12,color:MUTED,marginTop:2}}>{r.cond} · {r.channel}</div>
              </div>
              <span className={`badge ${r.corp==='KR'?'badge-indigo':r.corp==='VN'?'badge-green':'badge-gray'}`}>{r.corp}</span>
            </div>)}
          </div>
        </div>
      </>}

      {/* Google Sync */}
      {tab==='google'&&<>
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:20}}>
          <div>
            <div style={{fontSize:20,fontWeight:800,color:TEXT}}>Google 연동</div>
            <div style={{fontSize:13,color:MUTED,marginTop:2}}>Google Sheets 자동 수집 및 데이터 동기화 관리</div>
          </div>
          <button className="btn-primary" onClick={()=>showToast('새 시트 연동 설정 화면을 엽니다')}>
            <PHIcon name="plus"/>시트 연동 추가
          </button>
        </div>
        <div className="grid-3" style={{marginBottom:20}}>
          {[{label:'연동 시트',val:'4개',icon:'table',color:INDIGO},{label:'오늘 수집 행',val:'30행',icon:'arrows-clockwise',color:GREEN},{label:'오류 건',val:'2건',icon:'warning',color:AMBER}].map((k,i)=>(
            <div className="card" key={i} style={{cursor:'default'}}>
              <div className="card-body" style={{display:'flex',alignItems:'center',gap:14}}>
                <div style={{width:42,height:42,borderRadius:10,background:`${k.color}18`,display:'flex',alignItems:'center',justifyContent:'center'}}>
                  <PHIcon name={k.icon} size={20} color={k.color}/>
                </div>
                <div><div style={{fontSize:22,fontWeight:800,color:TEXT}}>{k.val}</div>
                  <div style={{fontSize:12,color:MUTED}}>{k.label}</div>
                </div>
              </div>
            </div>
          ))}
        </div>
        <div className="card">
          <div className="card-head">
            <div className="card-title"><PHIcon name="table" size={15}/>연동 시트 목록</div>
          </div>
          <div className="card-body" style={{padding:0}}>
            {syncSheets.map((s,i)=><div className="sync-row" style={{padding:'14px 20px',animationDelay:`${i*0.07}s`}} key={i} onClick={()=>setDrawer({type:'sync',data:s})}>
              <div className="sync-icon-wrap" style={{background:s.status==='ok'?'#D1FAE5':'#FEF3C7'}}>
                <PHIcon name="google-logo" size={18} color={s.status==='ok'?GREEN:AMBER}/>
              </div>
              <div style={{flex:1}}>
                <div className="sync-name">{s.name}</div>
                <div className="sync-meta">{s.range} · 마지막 수집 {s.lastSync}</div>
              </div>
              <div className="sync-status">
                <span className={`badge ${s.status==='ok'?'badge-green':'badge-amber'}`}>
                  {s.status==='ok'?'정상':'경고'}
                </span>
                <span style={{fontSize:11.5,color:MUTED}}>+{s.newRows}행 {s.errorRows>0?`/ 오류 ${s.errorRows}건`:''}</span>
              </div>
              <PHIcon name="caret-right" size={14} color={MUTED}/>
            </div>)}
          </div>
        </div>
      </>}

      {/* Document Portal */}
      {tab==='docs'&&<>
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:20}}>
          <div>
            <div style={{fontSize:20,fontWeight:800,color:TEXT}}>문서 포털</div>
            <div style={{fontSize:13,color:MUTED,marginTop:2}}>QR 코드 기반 현장 표준문서 열람 시스템</div>
          </div>
          <button className="btn-primary" onClick={()=>showToast('새 표준문서 등록 화면을 엽니다')}>
            <PHIcon name="plus"/>문서 등록
          </button>
        </div>
        <div style={{display:'flex',gap:10,marginBottom:18}}>
          <input style={{flex:1,border:'1px solid #E8EBF0',borderRadius:8,padding:'9px 14px',fontSize:13,fontFamily:'inherit',color:TEXT,outline:'none'}}
            placeholder="문서명 또는 공정 검색" value={docSearch} onChange={e=>setDocSearch(e.target.value)}/>
          <select style={{border:'1px solid #E8EBF0',borderRadius:8,padding:'9px 12px',fontSize:13,fontFamily:'inherit',background:'#fff',cursor:'pointer',outline:'none'}}>
            <option>전체 법인</option><option>한국본사</option><option>베트남법인</option>
          </select>
        </div>
        <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:14}}>
          {filteredDocs.map((d,i)=><div key={i} className="doc-card" style={{animationDelay:`${i*0.06}s`}} onClick={()=>setDrawer({type:'doc',data:d})}>
            <div style={{display:'flex',gap:12,alignItems:'flex-start'}}>
              <div className="doc-qr" style={{fontSize:9,color:MUTED}}>QR<br/>{d.id}</div>
              <div style={{flex:1}}>
                <div className="doc-title">{d.title}</div>
                <div className="doc-meta">{d.process}</div>
                <div style={{display:'flex',gap:6,marginTop:6,flexWrap:'wrap'}}>
                  <div className="doc-version"><PHIcon name="git-branch" size={11}/>{d.ver}</div>
                  <span className={`badge ${d.corp.includes('VN')&&d.corp.includes('KR')?'badge-gray':d.corp==='KR'?'badge-indigo':'badge-green'}`} style={{fontSize:10,padding:'2px 7px'}}>{d.corp}</span>
                </div>
                <div style={{fontSize:11.5,color:MUTED,marginTop:5}}>조회 {d.views}회 · {d.updated}</div>
              </div>
            </div>
          </div>)}
        </div>
        {filteredDocs.length===0&&<div className="empty-state">
          <div className="empty-icon"><PHIcon name="file-dashed" size={28} color={MUTED}/></div>
          <div style={{fontSize:13,color:MUTED}}>검색 결과가 없습니다</div>
        </div>}
      </>}

      {/* Corp Settings */}
      {tab==='settings'&&<>
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:20}}>
          <div>
            <div style={{fontSize:20,fontWeight:800,color:TEXT}}>법인 설정</div>
            <div style={{fontSize:13,color:MUTED,marginTop:2}}>한국/베트남 법인별 시스템 구성 관리</div>
          </div>
          <button className="btn-primary" onClick={()=>setDrawer({type:'corpSettings'})}>
            <PHIcon name="pencil-simple"/>설정 편집
          </button>
        </div>
        <div className="grid-2">
          {[{corp:'한국본사',tag:'KR',color:INDIGO,data:corpSettings.map(s=>({label:s.key,val:s.kr}))},
            {corp:'베트남법인',tag:'VN',color:GREEN,data:corpSettings.map(s=>({label:s.key,val:s.vn}))}].map((c,i)=>(
            <div className="card" key={i}>
              <div className="card-head">
                <div className="card-title">
                  <span className={`corp-pill corp-${c.tag.toLowerCase()}`}>{c.corp}</span>
                </div>
                <button className="btn-secondary btn-sm" onClick={()=>setDrawer({type:'corpSettings'})}>
                  <PHIcon name="gear"/>편집
                </button>
              </div>
              <div className="card-body">
                {c.data.map((item,j)=><div className="stat-row" key={j} style={{animationDelay:`${j*0.05}s`}}>
                  <span className="stat-label" style={{color:MUTED}}>{item.label}</span>
                  <span className="stat-val">{item.val}</span>
                </div>)}
              </div>
            </div>
          ))}
        </div>
        <div className="card">
          <div className="card-head"><div className="card-title"><PHIcon name="activity" size={15}/>Materialized View 갱신 현황</div></div>
          <div className="card-body">
            {[
              {name:'법인별 일별 KPI 집계',last:'2026-05-21 10:30',status:'ok'},
              {name:'공정별 불량률 주간 집계',last:'2026-05-21 10:00',status:'ok'},
              {name:'협력사별 합격률 월간 집계',last:'2026-05-21 09:00',status:'ok'},
              {name:'파레토 분석 누적 집계',last:'2026-05-21 10:30',status:'ok'},
            ].map((v,i)=><div className="stat-row" key={i} style={{animationDelay:`${i*0.05}s`}}>
              <span className="stat-label"><div style={{width:8,height:8,borderRadius:'50%',background:GREEN,flexShrink:0}}/>{v.name}</span>
              <div style={{display:'flex',alignItems:'center',gap:8}}>
                <span style={{fontSize:12,color:MUTED}}>{v.last}</span>
                <span className="badge badge-green">정상</span>
              </div>
            </div>)}
          </div>
        </div>
      </>}
    </div>

    {/* Drawers */}
    {drawer?.type==='alert'&&<AlertDrawer onClose={()=>setDrawer(null)} onToast={showToast}/>}
    {drawer?.type==='sync'&&<SyncDrawer sheet={drawer.data} onClose={()=>setDrawer(null)} onToast={showToast}/>}
    {drawer?.type==='doc'&&<DocDrawer doc={drawer.data} onClose={()=>setDrawer(null)} onToast={showToast}/>}
    {drawer?.type==='corpSettings'&&<CorpSettingsDrawer onClose={()=>setDrawer(null)} onToast={showToast}/>}
    {toast&&<Toast msg={toast.msg} type={toast.type} onClose={()=>setToast(null)}/>}
  </div>;
}

const root=ReactDOM.createRoot(document.getElementById('root'));
root.render(<App/>);
</script>
</body>
</html>
