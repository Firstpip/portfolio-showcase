/* ────────── ICON HELPER ────────── */
function Icon({name,size=16,color="currentColor",style={}}) {
  const ref = useRef(null);
  useEffect(() => {
    if(ref.current && window.lucide) {
      ref.current.innerHTML = '';
      const el = document.createElement('i');
      el.setAttribute('data-lucide', name);
      ref.current.appendChild(el);
      window.lucide.createIcons({icons:window.lucide.icons,nameAttr:'data-lucide',attrs:{width:String(size),height:String(size),stroke:color}});
    }
  },[name,size,color]);
  return <span ref={ref} style={{display:'inline-flex',alignItems:'center',...style}}/>;
}

    "불일치":{bg:"#FEF2F2",text:"#DC2626"},
    "처리중":{bg:"#EBF2FC",text:"#1D5CB8"},

    "진행중":{bg:"#EBF2FC",text:"#1D5CB8"},
  };
  const c = colors[status] || {bg:"#F1F5F9",text:"#64748B"};
  return <span style={{display:'inline-block',padding:'2px 8px',borderRadius:12,fontSize:11,fontWeight:600,background:c.bg,color:c.text}}>{status}</span>;
}

    setInput('');

      let reply = {id:Date.now()+1,role:'agent',text:'',tools:[]};
      if(msg.includes('이메일')||msg.includes('발송')) {
        reply.text='8개 공급처에 마감 내역 이메일을 발송합니다.';
        reply.tools=[
          {name:"send_bulk_email",status:"완료",desc:"8개 업체 이메일 발송 완료"},
          {name:"track_replies",status:"진행중",desc:"회신 추적 모니터링 시작"},
        ];
      } else if(msg.includes('검증')||msg.includes('대사')) {
        reply.text='신진물산, 우성기계부품 2개 업체에서 불일치가 감지되었습니다.';
        reply.tools=[
          {name:"verify_replies",status:"완료",desc:"6개 회신 파일 검증 완료"},
          {name:"flag_discrepancies",status:"완료",desc:"불일치 2건 플래그 처리"},
        ];
      } else {
        reply.text='네, 처리하겠습니다. 추가 명령이 있으시면 말씀해 주세요.';
      }
      setMessages(prev=>[...prev,reply]);
      setToast('Agent가 작업을 완료했습니다');
    },1600);
  };

  useEffect(()=>scrollBottom(),[messages,isTyping]);

  const QUICK_CMDS = ['이메일 발송해줘','회신 검증 실행해줘','마감 현황 보여줘'];

  return (
    <div style={{display:'flex',flexDirection:'column',height:'calc(100vh - 112px)'}}>

        {messages.map((msg,i)=>(

            <div style={{maxWidth:'72%'}}>
              <div style={{
                background:msg.role==='user'?'var(--primary)':'var(--surface)',
                color:msg.role==='user'?'#fff':'var(--text)',
                padding:'10px 14px',borderRadius:msg.role==='user'?'12px 12px 4px 12px':'12px 12px 12px 4px',
                fontSize:14,lineHeight:1.6,boxShadow:'var(--shadow-sm)',
                border:msg.role==='agent'?'1px solid var(--border)':'none',
              }}>{msg.text}</div>
              {msg.tools && msg.tools.length>0 && (
                <div style={{marginTop:8,display:'flex',flexDirection:'column',gap:4}}>
                  {msg.tools.map((tool,j)=>(
                    <div key={j} style={{background:'var(--bg)',border:'1px solid var(--border)',borderRadius:8,padding:'8px 12px',display:'flex',alignItems:'center',gap:8}}>
                      <div style={{width:20,height:20,borderRadius:4,background:tool.status==='완료'?'var(--accent-subtle)':tool.status==='진행중'?'var(--primary-subtle)':'#FEF3C7',display:'flex',alignItems:'center',justifyContent:'center'}}>
                        <Icon name={tool.status==='완료'?'check':'loader'}size={11}color={tool.status==='완료'?'var(--accent)':tool.status==='진행중'?'var(--primary)':'#D97706'}/>
                      </div>
                      <div style={{flex:1}}>

                      </div>
                      <Badge status={tool.status}/>
                    </div>
                  ))}
                </div>
              )}
            </div>
            {msg.role==='user' && (
              <div style={{width:32,height:32,borderRadius:'50%',background:'var(--primary)',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0,marginTop:2,color:'#fff',fontSize:12,fontWeight:700}}>김</div>

        {isTyping && (

              {[0,1,2].map(i=>(
                <div key={i} style={{width:6,height:6,borderRadius:'50%',background:'var(--primary)',animation:`typingDot 1.2s ease-in-out ${i*0.2}s infinite`}}/>
              ))}
            </div>
          </div>
        )}
        <div ref={endRef}/>
      </div>
      {!showHero && messages.length===0 && (
        <div style={{display:'flex',gap:6,marginBottom:8,flexWrap:'wrap'}}>
          {QUICK_CMDS.map((cmd,i)=>(
            <button key={i} onClick={()=>{setInput(cmd);setTimeout(()=>document.getElementById('chatInput')?.focus(),50)}}

            </button>

          <Icon name="send" size={18} color="#fff"/>

      </div>

    </div>
  );
}

          <div style={{marginBottom:20}}>
            <label style={{fontSize:13,fontWeight:600,color:'var(--text)',display:'block',marginBottom:6}}>메일 본문</label>
            <textarea rows={4} style={{width:'100%',resize:'none'}} defaultValue="안녕하세요. 2026년 5월 구매 마감 내역에 대한 회신이 아직 접수되지 않았습니다. 빠른 시일 내에 검토 후 회신 부탁드립니다."/>
          </div>
          <div style={{display:'flex',gap:8,justifyContent:'flex-end'}}>
            <button onClick={()=>setShowModal(false)} style={{padding:'10px 16px',border:'1px solid var(--border)',borderRadius:8,fontSize:13,background:'var(--surface)',color:'var(--text)'}}>취소</button>
            <button onClick={sendReminder} style={{padding:'10px 20px',background:'var(--primary)',borderRadius:8,fontSize:13,color:'#fff',fontWeight:600}}>발송</button>
          </div>
        </Modal>
      )}
      {toast && <Toast msg={toast} onClose={()=>setToast('')}/>}
    </div>
  );
}

/* ────────── VERIFICATION SCREEN ────────── */
function VerificationScreen() {
  const [uploaded, setUploaded] = useState(false);
  const [loading, setLoading] = useState(false);
  const [progress, setProgress] = useState(0);
  const [toast, setToast] = useState('');
  const [selectedRow, setSelectedRow] = useState(null);

  const handleUpload = () => {
    setLoading(true);
    setProgress(0);
    const interval = setInterval(()=>{
      setProgress(p=>{
        if(p>=100){clearInterval(interval);setLoading(false);setUploaded(true);return 100;}
        return p+12;
      });
    },180);
  };

  return (
    <div className="fade-in">
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:20}}>
        <div>
          <h2 style={{fontSize:18,fontWeight:700}}>엑셀 검증</h2>
          <p style={{fontSize:13,color:'var(--text-secondary)',marginTop:2}}>업체 회신 엑셀 vs ERP 원천 데이터 자동 대사</p>
        </div>
        {uploaded && (
          <button onClick={()=>setToast('검증 결과 리포트를 다운로드합니다')} style={{display:'flex',alignItems:'center',gap:6,padding:'8px 14px',background:'var(--primary)',borderRadius:8,fontSize:13,color:'#fff',fontWeight:600}}>
            <Icon name="download" size={14} color="#fff"/>리포트 다운로드
          </button>
        )}
      </div>
      {!uploaded ? (
        <div>
          <div style={{border:'2px dashed var(--border)',borderRadius:12,padding:'48px 24px',textAlign:'center',marginBottom:16,background:'var(--surface)',transition:'all 0.2s',cursor:'pointer'}}
            onMouseEnter={e=>{e.currentTarget.style.borderColor='var(--primary)';e.currentTarget.style.background='var(--primary-subtle)'}}
            onMouseLeave={e=>{e.currentTarget.style.borderColor='var(--border)';e.currentTarget.style.background='var(--surface)'}}>
            <Icon name="upload-cloud" size={40} color="var(--border)" style={{marginBottom:12,display:'block',margin:'0 auto 12px'}}/>
            <div style={{fontSize:15,fontWeight:600,color:'var(--text)',marginBottom:4}}>업체 회신 엑셀 파일을 업로드하세요</div>
            <div style={{fontSize:13,color:'var(--text-secondary)',marginBottom:16}}>ERP 원천 데이터와 자동으로 비교합니다</div>
            <button onClick={handleUpload} style={{padding:'10px 24px',background:'var(--primary)',borderRadius:8,fontSize:13,color:'#fff',fontWeight:600}}>파일 선택</button>
          </div>
          {loading && (
            <div style={{background:'var(--surface)',border:'1px solid var(--border)',borderRadius:'var(--radius)',padding:'20px 24px',boxShadow:'var(--shadow-sm)'}}>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10}}>
                <div style={{display:'flex',gap:8,alignItems:'center'}}>
                  <Icon name="loader" size={16} color="var(--primary)" style={{animation:'pulse 1s ease infinite'}}/>
                  <span style={{fontSize:13,fontWeight:500,color:'var(--text)'}}>신진물산_5월회신.xlsx 분석 중...</span>
                </div>
                <span style={{fontSize:12,color:'var(--primary)',fontWeight:600}}>{progress}%</span>
              </div>
              <div style={{height:6,background:'var(--bg)',borderRadius:3,overflow:'hidden'}}>
                <div style={{height:'100%',background:'var(--primary)',borderRadius:3,width:`${progress}%`,transition:'width 0.18s'}}/>
              </div>
              <div style={{marginTop:8,fontSize:11,color:'var(--text-secondary)'}}>
                {progress<40?'컬럼 매핑 분석 중...':progress<70?'ERP 원천 데이터와 비교 중...':'불일치 항목 분류 중...'}
              </div>
            </div>
          )}
        </div>
      ) : (
        <div>
          <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:12,marginBottom:16}}>
            {[
              {label:"총 검증 품목",value:"6개",icon:"list",color:"var(--primary)"},
              {label:"일치",value:"4개",icon:"check-circle-2",color:"var(--accent)"},
              {label:"불일치 발견",value:"2개",icon:"alert-triangle",color:"#EF4444"},
            ].map((s,i)=>(
              <div key={i} style={{background:'var(--surface)',border:`1px solid ${i===2?'#FECACA':'var(--border)'}`,borderRadius:'var(--radius)',padding:'14px 18px',display:'flex',gap:10,alignItems:'center',boxShadow:'var(--shadow-sm)'}}>
                <div style={{width:36,height:36,borderRadius:8,background:`${s.color}18`,display:'flex',alignItems:'center',justifyContent:'center'}}>
                  <Icon name={s.icon} size={18} color={s.color}/>
                </div>
                <div>
                  <div style={{fontSize:11,color:'var(--text-secondary)'}}>{s.label}</div>
                  <div style={{fontSize:20,fontWeight:800,color:s.color}}>{s.value}</div>
                </div>
              </div>
            ))}
          </div>
          <div style={{background:'var(--surface)',border:'1px solid var(--border)',borderRadius:'var(--radius)',boxShadow:'var(--shadow-sm)'}}>
            <div style={{padding:'14px 20px',borderBottom:'1px solid var(--border)',display:'flex',gap:8,alignItems:'center'}}>
              <Icon name="file-spreadsheet" size={16} color="var(--primary)"/>
              <span style={{fontSize:13,fontWeight:600,color:'var(--text)',flex:1}}>신진물산 — 회신 데이터 검증 결과</span>
              <div style={{display:'flex',gap:6}}>
                <div style={{display:'flex',gap:4,alignItems:'center',fontSize:11,color:'var(--accent)'}}>
                  <div style={{width:8,height:8,borderRadius:2,background:'var(--accent)'}}/>일치
                </div>
                <div style={{display:'flex',gap:4,alignItems:'center',fontSize:11,color:'#EF4444'}}>
                  <div style={{width:8,height:8,borderRadius:2,background:'#EF4444'}}/>불일치
                </div>
              </div>
            </div>
            <table style={{width:'100%',borderCollapse:'collapse',fontSize:12}}>
              <thead>
                <tr style={{background:'var(--bg)'}}>
                  {["품목명","ERP 수량","회신 수량","ERP 단가","회신 단가","ERP 부가세","회신 부가세","검증"].map(h=>(
                    <th key={h} style={{padding:'8px 14px',textAlign:'right',fontSize:10,fontWeight:600,color:'var(--text-secondary)',':first-child':{textAlign:'left'}}}
                      style={{padding:'8px 14px',textAlign:h==="품목명"?'left':'right',fontSize:10,fontWeight:600,color:'var(--text-secondary)'}}>{h}</th>
                  ))}
                </tr>
              </thead>
              <tbody>
                {VERIFY_DATA.map((r,i)=>(
                  <tr key={i} onClick={()=>setSelectedRow(r)}
                    style={{borderTop:'1px solid var(--border)',cursor:'pointer',background:r.diff?'#FFF5F5':'transparent',transition:'filter 0.1s'}}
                    onMouseEnter={e=>e.currentTarget.style.filter='brightness(0.97)'}
                    onMouseLeave={e=>e.currentTarget.style.filter='none'}>
                    <td style={{padding:'10px 14px',fontWeight:r.diff?600:400,color:'var(--text)'}}>{r.item}</td>
                    <td style={{padding:'10px 14px',textAlign:'right',color:'var(--text)'}}>{r.erpQty}</td>
                    <td style={{padding:'10px 14px',textAlign:'right',fontWeight:r.diffField==="수량"?700:400,color:r.diffField==="수량"?"#DC2626":'var(--text)'}}>{r.replyQty}</td>
                    <td style={{padding:'10px 14px',textAlign:'right',color:'var(--text)'}}>{r.erpPrice.toLocaleString()}</td>
                    <td style={{padding:'10px 14px',textAlign:'right',fontWeight:r.diffField==="단가"?700:400,color:r.diffField==="단가"?"#DC2626":'var(--text)'}}>{r.replyPrice.toLocaleString()}</td>
                    <td style={{padding:'10px 14px',textAlign:'right',color:'var(--text)'}}>{r.erpVat.toLocaleString()}</td>
                    <td style={{padding:'10px 14px',textAlign:'right',fontWeight:r.diff?700:400,color:r.diff?"#DC2626":'var(--text)'}}>{r.replyVat.toLocaleString()}</td>
                    <td style={{padding:'10px 14px',textAlign:'center'}}>
                      {r.diff ? (
                        <span style={{display:'inline-flex',gap:4,alignItems:'center',fontSize:11,fontWeight:600,color:'#DC2626',background:'#FEF2F2',padding:'2px 8px',borderRadius:4}}>
                          <Icon name="alert-circle" size={11} color="#DC2626"/>{r.diffField} 불일치
                        </span>
                      ) : (
                        <span style={{display:'inline-flex',gap:4,alignItems:'center',fontSize:11,fontWeight:600,color:'var(--accent)',background:'var(--accent-subtle)',padding:'2px 8px',borderRadius:4}}>
                          <Icon name="check" size={11} color="var(--accent)"/>일치
                        </span>
                      )}
                    </td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
          {selectedRow && (
            <Modal title={`검증 상세 — ${selectedRow.item}`} onClose={()=>setSelectedRow(null)}>
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12,marginBottom:16}}>
                {[
                  {label:"ERP 수량",val:selectedRow.erpQty,diff:selectedRow.diffField==="수량"},
                  {label:"회신 수량",val:selectedRow.replyQty,diff:selectedRow.diffField==="수량"},
                  {label:"ERP 단가",val:selectedRow.erpPrice.toLocaleString()+"원",diff:selectedRow.diffField==="단가"},
                  {label:"회신 단가",val:selectedRow.replyPrice.toLocaleString()+"원",diff:selectedRow.diffField==="단가"},
                ].map(({label,val,diff},i)=>(
                  <div key={i} style={{background:diff?'#FEF2F2':'var(--bg)',border:`1px solid ${diff?'#FECACA':'var(--border)'}`,borderRadius:6,padding:'12px 14px'}}>
                    <div style={{fontSize:11,color:diff?'#DC2626':'var(--text-secondary)',fontWeight:diff?600:400,marginBottom:3}}>{label}</div>
                    <div style={{fontSize:16,fontWeight:700,color:diff?'#DC2626':'var(--text)'}}>{val}</div>
                  </div>
                ))}
              </div>
              {selectedRow.diff && (
                <div style={{background:'#FEF2F2',border:'1px solid #FECACA',borderRadius:6,padding:'10px 14px',marginBottom:16,fontSize:12,color:'#7F1D1D'}}>
                  {selectedRow.diffField} 항목에서 불일치가 감지되었습니다. 공급처와 확인이 필요합니다.
                </div>
              )}
              <div style={{display:'flex',gap:8,justifyContent:'flex-end'}}>
                <button onClick={()=>setSelectedRow(null)} style={{padding:'8px 16px',border:'1px solid var(--border)',borderRadius:6,fontSize:13,background:'var(--surface)',color:'var(--text)'}}>닫기</button>
                <button onClick={()=>{setSelectedRow(null);setToast('담당자에게 확인 요청을 발송합니다');}} style={{padding:'8px 16px',background:'var(--primary)',borderRadius:6,fontSize:13,color:'#fff',fontWeight:600}}>확인 요청</button>
              </div>
            </Modal>
          )}
        </div>
      )}
      {toast && <Toast msg={toast} onClose={()=>setToast('')}/>}
    </div>
  );
}

/* ────────── APP ────────── */
function App() {
  const [tab, setTab] = useState('main');
  const screens = {main:<ChatScreen/>,dashboard:<DashboardScreen/>,email:<EmailScreen/>,verification:<VerificationScreen/>};
  return (
    <div style={{width:'100%',minHeight:'100vh',background:'var(--bg)'}}>
      <TopNav activeTab={tab} onTabChange={setTab}/>
      <main style={{maxWidth:1280,margin:'0 auto',padding:'24px 24px 40px'}}>
        {screens[tab]}
      </main>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
