<!DOCTYPE html>

<link rel="preconnect" href="https://cdn.jsdelivr.net">

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body,#root{width:100%;min-height:100vh;font-family:'Pretendard',sans-serif;background:#FAFAF7;color:#221A0F}
:root{
  --primary:#D96A1A;--primary-light:#F0A050;--primary-subtle:#FEF3E6;
  --accent:#6B48C8;--accent-subtle:#EDE8FA;
  --surface:#FFFFFF;--bg:#FAFAF7;--border:#E8E0D8;
  --text:#221A0F;--text-secondary:#7A6A58;--text-muted:#B0A090;
  --shadow-sm:0 2px 6px rgba(217,106,26,0.08);
  --shadow-md:0 8px 24px rgba(217,106,26,0.14);
  --radius:12px;
}
button{cursor:pointer;border:none;outline:none;font-family:'Pretendard',sans-serif}
input,textarea,select{font-family:'Pretendard',sans-serif;outline:none;border:1px solid var(--border);border-radius:var(--radius);padding:10px 14px;font-size:14px;color:var(--text);background:#fff}
input:focus,textarea:focus,select:focus{border-color:var(--primary);box-shadow:0 0 0 3px rgba(217,106,26,0.12)}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideRight{from{opacity:0;transform:translateX(-16px)}to{opacity:1;transform:translateX(0)}}
@keyframes scaleIn{from{opacity:0;transform:scale(0.94)}to{opacity:1;transform:scale(1)}}
@keyframes growBar{from{width:0}to{width:var(--w)}}
@keyframes spinIcon{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
@keyframes popIn{0%{transform:scale(0.8);opacity:0}70%{transform:scale(1.05)}100%{transform:scale(1);opacity:1}}
@keyframes glow{0%,100%{box-shadow:0 0 8px rgba(217,106,26,0.3)}50%{box-shadow:0 0 20px rgba(217,106,26,0.6)}}
.fade-up{animation:fadeUp 0.35s ease forwards}
.scale-in{animation:scaleIn 0.25s ease forwards}
i.ti{font-size:inherit;line-height:1}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">

  {time:"12:00",tokens:890,cost:0.018},{time:"13:00",tokens:2450,cost:0.049},{time:"13:30",tokens:3680,cost:0.074},

  {id:"r002",title:"2026년 3월 마감 보고서",type:"PDF",size:"1.8MB",created:"2026-03-31 16:45",status:"완료"},
  {id:"r003",title:"2026년 2월 마감 보고서",type:"PPT",size:"2.1MB",created:"2026-02-29 17:10",status:"완료"},

const INVOICE_DATA = {

  issueDate:"2026-05-15",

  amount:"22,180,000",
  vat:"2,218,000",
  total:"24,398,000",
  items:[
    {name:"스텐 와셔 Φ20",qty:320,price:150,total:48000},
    {name:"배관 커플링 2인치",qty:50,price:9000,total:450000},
    {name:"씰링 가스켓",qty:100,price:2800,total:280000},
  ]
};

/* ────────── TOAST ────────── */
function Toast({msg,type="success",onClose}) {
  useEffect(()=>{const t=setTimeout(onClose,3200);return()=>clearTimeout(t);},[]);
  const colors = {success:{bg:"#1E1209",icon:"ti ti-check",color:"#F0A050"},error:{bg:"#1F0E0E",icon:"ti ti-x",color:"#EF4444"}};
  const c = colors[type];
  return (
    <div className="scale-in" style={{position:'fixed',bottom:28,right:28,background:c.bg,color:'#fff',padding:'12px 20px',borderRadius:10,fontSize:13,zIndex:9999,display:'flex',alignItems:'center',gap:10,boxShadow:'0 12px 40px rgba(0,0,0,0.3)',border:`1px solid ${c.color}40`}}>
      <i className={c.icon} style={{color:c.color,fontSize:16}}/>
      {msg}
    </div>
  );
}

/* ────────── MODAL ────────── */
function Modal({title,onClose,children,width=540}) {
  return (
    <div style={{position:'fixed',inset:0,zIndex:600,display:'flex',alignItems:'center',justifyContent:'center'}}>
      <div onClick={onClose} style={{position:'absolute',inset:0,background:'rgba(34,26,15,0.5)',backdropFilter:'blur(4px)'}}/>
      <div className="scale-in" style={{position:'relative',background:'var(--surface)',borderRadius:16,width,maxHeight:'85vh',overflow:'auto',boxShadow:'0 24px 80px rgba(217,106,26,0.25)',border:'1px solid var(--border)'}}>
        <div style={{padding:'22px 28px',borderBottom:'1px solid var(--border)',display:'flex',justifyContent:'space-between',alignItems:'center',position:'sticky',top:0,background:'var(--surface)',zIndex:1}}>
          <div style={{fontSize:17,fontWeight:700,color:'var(--text)'}}>{title}</div>
          <button onClick={onClose} style={{background:'none',padding:6,borderRadius:8,color:'var(--text-secondary)',fontSize:20}}><i className="ti ti-x"/></button>
        </div>
        <div style={{padding:28}}>{children}</div>
      </div>
    </div>
  );
}

/* ────────── BADGE ────────── */
function Badge({status,size="sm"}) {
  const map={
    "완료":{bg:"#E8F5EF",text:"#1E7B52"},"진행중":{bg:"#FEF3E6",text:"#D96A1A"},
    "대기":{bg:"#F3F0FA",text:"#7B5EA7"},"오류":{bg:"#FEF2F2",text:"#DC2626"},
    "승인대기":{bg:"#FEF3E6",text:"#D96A1A"},"승인완료":{bg:"#E8F5EF",text:"#1E7B52"},
  };
  const c=map[status]||{bg:"#F5F0EB",text:"#7A6A58"};
  return <span style={{display:'inline-block',padding:size==="sm"?'2px 8px':'4px 12px',borderRadius:20,fontSize:size==="sm"?11:12,fontWeight:600,background:c.bg,color:c.text}}>{status}</span>;
}

/* ────────── GLOBAL NAV ────────── */
function GlobalNav({active,onNav}) {
  const [scrolled,setScrolled] = useState(false);
  useEffect(()=>{
    const h=()=>setScrolled(window.scrollY>10);
    window.addEventListener('scroll',h);
    return()=>window.removeEventListener('scroll',h);
  },[]);
  const navItems = [
    {id:'main',label:'워크플로우 현황',icon:'ti-layout-dashboard'},
    {id:'invoice',label:'세금계산서 등록',icon:'ti-file-invoice'},
    {id:'report',label:'보고서 생성',icon:'ti-file-chart'},
    {id:'monitoring',label:'Agent 모니터링',icon:'ti-activity'},
  ];
  return (
    <header style={{background:scrolled?'rgba(250,250,247,0.96)':'var(--surface)',borderBottom:'1px solid var(--border)',position:'sticky',top:0,zIndex:100,backdropFilter:scrolled?'blur(8px)':'none',transition:'all 0.25s',boxShadow:scrolled?'var(--shadow-sm)':'none'}}>
      <div style={{maxWidth:1320,margin:'0 auto',padding:'0 32px',display:'flex',alignItems:'center',height:60,gap:32}}>
        <div style={{display:'flex',alignItems:'center',gap:10,flexShrink:0}}>

            <i className="ti ti-robot" style={{color:'#fff',fontSize:18}}/>
          </div>
          <div>
            <div style={{fontSize:14,fontWeight:800,color:'var(--text)',letterSpacing:'-0.3px'}}>구매 자동화 플랫폼</div>
            <div style={{fontSize:10,color:'var(--text-secondary)',letterSpacing:'0.5px',textTransform:'uppercase'}}>Powered by Langgraph</div>
          </div>
        </div>
        <nav style={{display:'flex',gap:4,flex:1}}>
          {navItems.map(item=>(
            <button key={item.id} onClick={()=>onNav(item.id)}
              style={{display:'flex',alignItems:'center',gap:7,padding:'8px 16px',borderRadius:8,fontSize:13,fontWeight:active===item.id?600:400,
                color:active===item.id?'var(--primary)':'var(--text-secondary)',
                background:active===item.id?'var(--primary-subtle)':'transparent',
                transition:'all 0.18s',border:'none'}}>
              <i className={`ti ${item.icon}`} style={{fontSize:15}}/>
              {item.label}
            </button>
          ))}
        </nav>
        <div style={{display:'flex',alignItems:'center',gap:12,flexShrink:0}}>
          <div style={{display:'flex',alignItems:'center',gap:6,background:'var(--primary-subtle)',borderRadius:8,padding:'5px 10px',fontSize:11,fontWeight:600,color:'var(--primary)'}}>
            <span style={{width:7,height:7,borderRadius:'50%',background:'var(--primary)',display:'inline-block',animation:'glow 2s ease infinite'}}/>

          </div>
          <div style={{width:34,height:34,borderRadius:10,background:'linear-gradient(135deg,var(--primary),#E8A060)',display:'flex',alignItems:'center',justifyContent:'center',color:'#fff',fontSize:13,fontWeight:800}}>김</div>
        </div>
      </div>
    </header>
  );
}

function InvoiceScreen() {
  const [step, setStep] = useState('upload');
  const [progress, setProgress] = useState(0);
  const [parsing, setParsing] = useState(false);
  const [stagingStatus, setStagingStatus] = useState('대기');
  const [toast, setToast] = useState('');
  const [showApproval, setShowApproval] = useState(false);

  const handleUpload = () => {
    setParsing(true);
    setProgress(0);
    const iv = setInterval(()=>{
      setProgress(p=>{if(p>=100){clearInterval(iv);setParsing(false);setStep('parsed');return 100;}return p+14;});
    },200);
  };

  const handleStaging = () => {
    setStagingStatus('처리중');
    setTimeout(()=>{setStagingStatus('승인대기');setShowApproval(true);},1800);
  };

  return (
    <div style={{maxWidth:1320,margin:'0 auto',padding:'32px 32px 48px'}}>
      <div style={{marginBottom:28}}>
        <div style={{fontSize:12,color:'var(--text-secondary)',fontWeight:600,letterSpacing:'1px',textTransform:'uppercase',marginBottom:6}}>세금계산서 등록</div>
        <h1 style={{fontSize:24,fontWeight:800,marginBottom:4}}>세금계산서 파싱 및 ERP 연계</h1>
        <p style={{fontSize:14,color:'var(--text-secondary)'}}>PDF/이미지 세금계산서를 업로드하면 핵심 데이터를 자동 추출하고 ERP Staging Table에 적재합니다</p>
      </div>

      <div style={{display:'flex',gap:12,marginBottom:28}}>
        {[{s:'upload',l:'1. 파일 업로드'},{s:'parsed',l:'2. 파싱 결과'},{s:'staging',l:'3. ERP 적재'}].map((st,i)=>(
          <div key={i} style={{display:'flex',alignItems:'center',gap:8}}>
            <div style={{display:'flex',alignItems:'center',gap:8,padding:'7px 16px',borderRadius:20,background:step===st.s?'var(--primary)':'var(--bg)',color:step===st.s?'#fff':'var(--text-secondary)',fontSize:12,fontWeight:600,border:`1px solid ${step===st.s?'var(--primary)':'var(--border)'}`,transition:'all 0.2s'}}>
              {st.l}
            </div>
            {i<2 && <i className="ti ti-chevron-right" style={{color:'var(--text-muted)',fontSize:14}}/>}
          </div>
        ))}
      </div>

      {step==='upload' && (
        <div className="fade-up">
          <div style={{border:'2px dashed var(--border)',borderRadius:16,padding:'60px 40px',textAlign:'center',background:'var(--surface)',cursor:'pointer',transition:'all 0.2s',marginBottom:16}}
            onMouseEnter={e=>{e.currentTarget.style.borderColor='var(--primary)';e.currentTarget.style.background='var(--primary-subtle)'}}
            onMouseLeave={e=>{e.currentTarget.style.borderColor='var(--border)';e.currentTarget.style.background='var(--surface)'}}>
            <div style={{width:60,height:60,borderRadius:16,background:'var(--bg)',border:'1px solid var(--border)',display:'flex',alignItems:'center',justifyContent:'center',margin:'0 auto 16px'}}>
              <i className="ti ti-cloud-upload" style={{fontSize:28,color:'var(--text-muted)'}}/>
            </div>
            <div style={{fontSize:16,fontWeight:700,color:'var(--text)',marginBottom:6}}>세금계산서 파일을 업로드하세요</div>
            <div style={{fontSize:13,color:'var(--text-secondary)',marginBottom:20}}>PDF, JPG, PNG 형식 지원 — 드래그하거나 클릭하여 선택</div>
            <button onClick={handleUpload} style={{padding:'12px 28px',background:'var(--primary)',borderRadius:10,fontSize:14,color:'#fff',fontWeight:700,boxShadow:'0 4px 12px rgba(217,106,26,0.3)'}}>파일 선택</button>
          </div>
          {parsing && (
            <div style={{background:'var(--surface)',border:'1px solid var(--border)',borderRadius:14,padding:'20px 24px',boxShadow:'var(--shadow-sm)'}}>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10}}>
                <div style={{display:'flex',gap:8,alignItems:'center'}}>
                  <i className="ti ti-loader" style={{color:'var(--primary)',fontSize:16,animation:'spinIcon 1s linear infinite'}}/>
                  <span style={{fontSize:13,fontWeight:600,color:'var(--text)'}}>신진물산_세금계산서_202605.pdf 분석 중...</span>
                </div>
                <span style={{fontSize:12,fontWeight:700,color:'var(--primary)'}}>{progress}%</span>
              </div>
              <div style={{height:8,background:'var(--bg)',borderRadius:4,overflow:'hidden'}}>
                <div style={{height:'100%',background:'linear-gradient(90deg,var(--primary),#E8A060)',borderRadius:4,width:`${progress}%`,transition:'width 0.2s'}}/>
              </div>
              <div style={{marginTop:8,fontSize:11,color:'var(--text-secondary)'}}>
                {progress<30?'PDF 텍스트 레이어 추출 중...':progress<60?'OCR 엔진으로 이미지 분석 중...':progress<85?'공급자 정보 매핑 중...':'신뢰도 점수 계산 중...'}
              </div>
            </div>
          )}
        </div>
      )}

      {step==='parsed' && (
        <div className="fade-up" style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:16}}>
          <div style={{background:'var(--surface)',border:'1px solid var(--border)',borderRadius:14,padding:'22px',boxShadow:'var(--shadow-sm)'}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16}}>
              <div style={{fontSize:14,fontWeight:700,color:'var(--text)'}}>파싱 결과</div>
              <div style={{display:'flex',gap:4,alignItems:'center',fontSize:11,fontWeight:600,color:'#1E7B52',background:'#E8F5EF',padding:'3px 10px',borderRadius:20}}>
                <i className="ti ti-check" style={{fontSize:12}}/> 신뢰도 94%
              </div>
            </div>
            <div style={{display:'flex',flexDirection:'column',gap:10}}>
              {[
                {field:"공급자",val:INVOICE_DATA.supplier,ok:true},
                {field:"발행일",val:INVOICE_DATA.issueDate,ok:true},
                {field:"계산서 번호",val:INVOICE_DATA.invoiceNo,ok:true},
                {field:"공급가액",val:INVOICE_DATA.amount+"원",ok:true},
                {field:"부가세",val:INVOICE_DATA.vat+"원",ok:true},
                {field:"합계",val:INVOICE_DATA.total+"원",ok:true},
              ].map(({field,val,ok},i)=>(
                <div key={i} style={{display:'flex',gap:10,alignItems:'center',padding:'10px 12px',background:'var(--bg)',borderRadius:8}}>
                  <div style={{width:6,height:6,borderRadius:'50%',background:ok?"#1E7B52":"#F59E0B",flexShrink:0}}/>
                  <div style={{fontSize:11,color:'var(--text-secondary)',width:90,flexShrink:0}}>{field}</div>
                  <div style={{fontSize:13,fontWeight:600,color:'var(--text)',flex:1}}>{val}</div>
                  <i className={`ti ${ok?'ti-check':'ti-alert-triangle'}`} style={{color:ok?"#1E7B52":"#F59E0B",fontSize:13}}/>
                </div>
              ))}
            </div>
          </div>
          <div style={{background:'var(--surface)',border:'1px solid var(--border)',borderRadius:14,padding:'22px',boxShadow:'var(--shadow-sm)'}}>
            <div style={{fontSize:14,fontWeight:700,color:'var(--text)',marginBottom:16}}>품목 내역</div>
            <table style={{width:'100%',borderCollapse:'collapse',fontSize:12,marginBottom:16}}>
              <thead>
                <tr style={{background:'var(--bg)'}}>
                  {["품목명","수량","단가","공급가액"].map(h=>(
                    <th key={h} style={{padding:'8px 10px',textAlign:h==="품목명"?'left':'right',fontSize:10,fontWeight:600,color:'var(--text-secondary)'}}>{h}</th>
                  ))}
                </tr>
              </thead>
              <tbody>
                {INVOICE_DATA.items.map((item,i)=>(
                  <tr key={i} style={{borderTop:'1px solid var(--border)'}}>
                    <td style={{padding:'9px 10px',fontWeight:500,color:'var(--text)'}}>{item.name}</td>
                    <td style={{padding:'9px 10px',textAlign:'right',color:'var(--text)'}}>{item.qty}</td>
                    <td style={{padding:'9px 10px',textAlign:'right',color:'var(--text)'}}>{item.price.toLocaleString()}</td>
                    <td style={{padding:'9px 10px',textAlign:'right',fontWeight:600,color:'var(--text)'}}>{item.total.toLocaleString()}</td>
                  </tr>
                ))}
              </tbody>
            </table>
            <div style={{display:'flex',gap:8}}>
              <button onClick={()=>setStep('upload')} style={{flex:1,padding:'10px',border:'1px solid var(--border)',borderRadius:10,fontSize:13,background:'var(--surface)',color:'var(--text)',fontWeight:500}}>다시 업로드</button>
              <button onClick={()=>setStep('staging')} style={{flex:1,padding:'10px',background:'var(--primary)',borderRadius:10,fontSize:13,color:'#fff',fontWeight:700}}>ERP 적재 진행</button>
            </div>
          </div>
        </div>
      )}

      {step==='staging' && (
        <div className="fade-up">
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:16}}>
            <div style={{background:'var(--surface)',border:'1px solid var(--border)',borderRadius:14,padding:'22px',boxShadow:'var(--shadow-sm)'}}>
              <div style={{fontSize:14,fontWeight:700,marginBottom:16}}>Staging Table 적재 현황</div>
              <div style={{display:'flex',flexDirection:'column',gap:10,marginBottom:20}}>
                {[
                  {step:"데이터 검증",status:"완료",desc:"공급가액·세액 수식 검증 통과"},
                  {step:"중복 확인",status:"완료",desc:"기존 등록 내역과 중복 없음"},
                  {step:"Staging 적재",status:stagingStatus==="대기"?"대기":"완료",desc:stagingStatus!=="대기"?"Staging Table 적재 완료":"대기 중"},
                  {step:"담당자 승인",status:stagingStatus==="승인대기"?"승인대기":stagingStatus==="승인완료"?"승인완료":"대기",desc:stagingStatus==="승인완료"?"ERP 반영 완료":"담당자 검수 필요"},
                ].map((s,i)=>(
                  <div key={i} style={{display:'flex',gap:10,alignItems:'center',padding:'10px 12px',background:'var(--bg)',borderRadius:8}}>
                    <div style={{width:28,height:28,borderRadius:8,display:'flex',alignItems:'center',justifyContent:'center',
                      background:s.status==="완료"||s.status==="승인완료"?"#E8F5EF":s.status==="승인대기"?"var(--primary-subtle)":"var(--bg)",
                      border:`1px solid ${s.status==="완료"||s.status==="승인완료"?"#1E7B5240":s.status==="승인대기"?"var(--primary)":"var(--border)"}`}}>
                      {s.status==="완료"||s.status==="승인완료"
                        ? <i className="ti ti-check" style={{color:"#1E7B52",fontSize:12}}/>
                        : s.status==="승인대기"
                        ? <i className="ti ti-clock" style={{color:"var(--primary)",fontSize:12}}/>
                        : <span style={{fontSize:10,color:'var(--text-muted)',fontWeight:700}}>{i+1}</span>
                      }
                    </div>
                    <div style={{flex:1}}>
                      <div style={{fontSize:12,fontWeight:600,color:'var(--text)'}}>{s.step}</div>
                      <div style={{fontSize:11,color:'var(--text-secondary)'}}>{s.desc}</div>
                    </div>
                    <Badge status={s.status}/>
                  </div>
                ))}
              </div>
              {stagingStatus==="대기" && (
                <button onClick={handleStaging} style={{width:'100%',padding:'12px',background:'var(--primary)',borderRadius:10,fontSize:13,color:'#fff',fontWeight:700,boxShadow:'0 4px 12px rgba(217,106,26,0.25)'}}>ERP Staging 적재 시작</button>
              )}
              {stagingStatus==="승인대기" && (
                <button onClick={()=>{setStagingStatus('승인완료');setShowApproval(false);setToast('ERP에 반영되었습니다');}} style={{width:'100%',padding:'12px',background:'#1E7B52',borderRadius:10,fontSize:13,color:'#fff',fontWeight:700}}>담당자 승인 완료</button>
              )}
            </div>
            <div style={{background:'var(--surface)',border:'1px solid var(--border)',borderRadius:14,padding:'22px',boxShadow:'var(--shadow-sm)'}}>
              <div style={{fontSize:14,fontWeight:700,marginBottom:16}}>Staging 테이블 미리보기</div>
              <div style={{background:'#1E1209',borderRadius:10,padding:'14px',fontFamily:'monospace',fontSize:11,color:'#E8D4B0',lineHeight:1.8,marginBottom:16}}>
                <div style={{color:'#F0A050'}}>-- ERP_STAGING_TABLE (검수 후 반영)</div>
                <div><span style={{color:'#6B9FD4'}}>INSERT INTO</span> TB_PURCHASE_STAGING</div>
                <div>(<span style={{color:'#2CAE8A'}}>SUP_CD, INV_NO, SUP_AMT, VAT_AMT, STATUS</span>)</div>
                <div><span style={{color:'#6B9FD4'}}>VALUES</span></div>
                <div>(<span style={{color:'#F0A050'}}>'SHJIN01', '2026-05-0042',</span></div>
                <div style={{paddingLeft:16}}><span style={{color:'#F0A050'}}>22180000, 2218000, 'PENDING'</span>);</div>
              </div>
              <div style={{background:'var(--primary-subtle)',border:'1px solid #F0A05040',borderRadius:8,padding:'10px 14px',fontSize:12,color:'var(--primary)'}}>
                <i className="ti ti-info-circle" style={{fontSize:14,marginRight:6}}/>
                ERP 직접 쓰기 없이 Staging Table에 준비 후, 담당자 승인 시에만 ERP에 반영됩니다.
              </div>
            </div>
          </div>
        </div>
      )}
      {toast && <Toast msg={toast} onClose={()=>setToast('')}/>}
    </div>
  );
}

/* ────────── REPORT SCREEN ────────── */
function ReportScreen() {
  const [generating, setGenerating] = useState(false);
  const [genProgress, setGenProgress] = useState(0);
  const [reportType, setReportType] = useState('PPT');
  const [toast, setToast] = useState('');
  const [showPreview, setShowPreview] = useState(null);

  const handleGenerate = () => {
    setGenerating(true);
    setGenProgress(0);
    const iv = setInterval(()=>{
      setGenProgress(p=>{
        if(p>=100){clearInterval(iv);setGenerating(false);setToast(`${reportType} 보고서가 생성되었습니다`);return 100;}
        return p+10;
      });
    },250);
  };

  return (
    <div style={{maxWidth:1320,margin:'0 auto',padding:'32px 32px 48px'}}>
      <div style={{marginBottom:28}}>
        <div style={{fontSize:12,color:'var(--text-secondary)',fontWeight:600,letterSpacing:'1px',textTransform:'uppercase',marginBottom:6}}>보고서 생성</div>
        <h1 style={{fontSize:24,fontWeight:800,marginBottom:4}}>마감 보고서 자동 생성</h1>
        <p style={{fontSize:14,color:'var(--text-secondary)'}}>마감 집계 결과를 PPT 또는 PDF 보고서로 자동 생성합니다</p>
      </div>

      <div style={{display:'grid',gridTemplateColumns:'2fr 3fr',gap:16,marginBottom:24}}>
        <div style={{background:'var(--surface)',border:'1px solid var(--border)',borderRadius:14,padding:'22px',boxShadow:'var(--shadow-sm)'}}>
          <div style={{fontSize:14,fontWeight:700,marginBottom:16}}>보고서 설정</div>
          <div style={{marginBottom:14}}>
            <label style={{fontSize:12,fontWeight:600,color:'var(--text-secondary)',display:'block',marginBottom:6}}>보고서 형식</label>
            <div style={{display:'flex',gap:8}}>
              {['PPT','PDF'].map(t=>(
                <button key={t} onClick={()=>setReportType(t)} style={{flex:1,padding:'10px',borderRadius:8,fontSize:13,fontWeight:600,border:`2px solid ${reportType===t?'var(--primary)':'var(--border)'}`,background:reportType===t?'var(--primary-subtle)':'var(--bg)',color:reportType===t?'var(--primary)':'var(--text-secondary)',transition:'all 0.15s'}}>
                  <i className={`ti ${t==='PPT'?'ti-presentation':'ti-file-text'}`} style={{marginRight:4}}/>{t}
                </button>
              ))}
            </div>
          </div>
          <div style={{marginBottom:14}}>
            <label style={{fontSize:12,fontWeight:600,color:'var(--text-secondary)',display:'block',marginBottom:6}}>보고서 제목</label>
            <input defaultValue="2026년 5월 구매 마감 결과 보고서" style={{width:'100%'}}/>
          </div>
          <div style={{marginBottom:14}}>
            <label style={{fontSize:12,fontWeight:600,color:'var(--text-secondary)',display:'block',marginBottom:6}}>포함 항목</label>
            {["공급처별 집계 테이블","데이터 대사 결과 요약","불일치 항목 명세","ERP 전표 현황"].map((item,i)=>(
              <label key={i} style={{display:'flex',gap:8,alignItems:'center',padding:'7px 0',fontSize:12,cursor:'pointer',borderBottom:i<3?'1px solid var(--border)':'none'}}>
                <input type="checkbox" defaultChecked style={{width:14,height:14}}/>{item}
              </label>
            ))}
          </div>
          {generating ? (
            <div>
              <div style={{display:'flex',justifyContent:'space-between',fontSize:12,marginBottom:6}}>
                <span style={{color:'var(--text)',fontWeight:500}}>생성 중...</span>
                <span style={{fontWeight:700,color:'var(--primary)'}}>{genProgress}%</span>
              </div>
              <div style={{height:8,background:'var(--bg)',borderRadius:4,overflow:'hidden'}}>
                <div style={{height:'100%',background:'linear-gradient(90deg,var(--primary),var(--accent))',borderRadius:4,width:`${genProgress}%`,transition:'width 0.25s'}}/>
              </div>
              <div style={{fontSize:11,color:'var(--text-secondary)',marginTop:6}}>
                {genProgress<40?'슬라이드 레이아웃 설정 중...':genProgress<70?'데이터 시각화 렌더링 중...':'파일 패키징 중...'}
              </div>
            </div>
          ) : (
            <button onClick={handleGenerate} style={{width:'100%',padding:'12px',background:'var(--primary)',borderRadius:10,fontSize:13,color:'#fff',fontWeight:700,boxShadow:'0 4px 12px rgba(217,106,26,0.25)',display:'flex',alignItems:'center',justifyContent:'center',gap:8}}>
              <i className="ti ti-file-plus" style={{fontSize:16}}/>보고서 생성
            </button>
          )}
        </div>
        <div style={{background:'var(--surface)',border:'1px solid var(--border)',borderRadius:14,padding:'22px',boxShadow:'var(--shadow-sm)'}}>
          <div style={{fontSize:14,fontWeight:700,marginBottom:16}}>보고서 미리보기</div>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginBottom:16}}>
            {[
              {slide:"슬라이드 1",title:"표지",desc:"제목 · 작성일 · 담당부서"},
              {slide:"슬라이드 2",title:"공급처별 집계",desc:"8개 공급처 금액 요약 테이블"},
              {slide:"슬라이드 3",title:"대사 결과",desc:"불일치 2건 하이라이트 포함"},
            ].map((s,i)=>(
              <div key={i} style={{background:'var(--bg)',border:'1px solid var(--border)',borderRadius:10,padding:'14px',cursor:'pointer',transition:'all 0.15s'}}
                onMouseEnter={e=>{e.currentTarget.style.border='1px solid var(--primary)';e.currentTarget.style.background='var(--primary-subtle)'}}
                onMouseLeave={e=>{e.currentTarget.style.border='1px solid var(--border)';e.currentTarget.style.background='var(--bg)'}}>
                <div style={{fontSize:10,color:'var(--text-secondary)',marginBottom:4,fontWeight:600,textTransform:'uppercase'}}>{s.slide}</div>
                <div style={{fontSize:13,fontWeight:700,color:'var(--text)',marginBottom:3}}>{s.title}</div>
                <div style={{fontSize:11,color:'var(--text-secondary)'}}>{s.desc}</div>
              </div>
            ))}
            <div style={{background:'var(--bg)',border:'2px dashed var(--border)',borderRadius:10,padding:'14px',display:'flex',alignItems:'center',justifyContent:'center',cursor:'pointer'}}>
              <div style={{textAlign:'center',color:'var(--text-muted)',fontSize:12}}>
                <i className="ti ti-plus" style={{fontSize:20,display:'block',marginBottom:4}}/>
                슬라이드 추가
              </div>
            </div>
          </div>
          <div style={{background:'var(--bg)',borderRadius:8,padding:'12px 14px',fontSize:12,color:'var(--text-secondary)',lineHeight:1.6}}>
            <i className="ti ti-bulb" style={{color:'var(--primary)',marginRight:6}}/>
            <strong>python-pptx</strong> 슬라이드 마스터 기반으로 생성되어 회사 CI 변경 시 템플릿만 수정하면 됩니다.
          </div>
        </div>
      </div>

      <div style={{background:'var(--surface)',border:'1px solid var(--border)',borderRadius:14,boxShadow:'var(--shadow-sm)'}}>
        <div style={{padding:'16px 22px',borderBottom:'1px solid var(--border)',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
          <div style={{fontSize:13,fontWeight:700}}>생성 이력</div>
          <span style={{fontSize:12,color:'var(--text-secondary)'}}>{REPORT_HISTORY.length}개 보고서</span>
        </div>
        {REPORT_HISTORY.map((r,i)=>(
          <div key={i} style={{padding:'14px 22px',borderTop:i>0?'1px solid var(--border)':'none',display:'flex',gap:12,alignItems:'center',transition:'background 0.1s',cursor:'pointer'}}
            onMouseEnter={e=>e.currentTarget.style.background='var(--bg)'}
            onMouseLeave={e=>e.currentTarget.style.background='transparent'}>
            <div style={{width:36,height:36,borderRadius:8,background:r.type==='PPT'?'var(--primary-subtle)':'var(--accent-subtle)',display:'flex',alignItems:'center',justifyContent:'center'}}>
              <i className={`ti ${r.type==='PPT'?'ti-presentation':'ti-file-text'}`} style={{color:r.type==='PPT'?'var(--primary)':'var(--accent)',fontSize:18}}/>
            </div>
            <div style={{flex:1}}>

              <button onClick={(e)=>{e.stopPropagation();setToast(`${r.title}을 다운로드합니다`);}} style={{padding:'6px 10px',border:'1px solid var(--border)',borderRadius:8,fontSize:12,background:'var(--surface)',color:'var(--text)'}}>

              </button>
            </div>
          </div>
        ))}
      </div>
      {toast && <Toast msg={toast} onClose={()=>setToast('')}/>}
    </div>
  );
}
