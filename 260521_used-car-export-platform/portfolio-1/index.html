const Toast = ({ msg, onClose }) => {
  useEffect(() => { const t = setTimeout(onClose, 3000); return () => clearTimeout(t); }, []);

    <div className="toast-wrap">

              const isDone = i < cur; const isActive = i === cur;
              return (
                <div key={s.key} className="step-item">
                  <div className="step-line-wrap">
                    <div className={`step-dot${isDone?' done':isActive?' active':''}`}>{isDone && <span style={{color:'#fff',fontSize:9,display:'flex',alignItems:'center',justifyContent:'center',height:'100%'}}><Ic.Check /></span>}</div>
                    {i < steps.length-1 && <div className={`step-connector${isDone?' done':''}`} />}

                  <div className="step-content">
                    <div className={`step-label${!isDone&&!isActive?' inactive':''}`}>{s.label}</div>

                    {!s.ts && isActive && <div className="step-ts" style={{color:'#C8960C'}}>진행 중</div>}
                  </div>
                </div>
              );

          {o.status === 'BALANCE_WAIT' && (
            <div style={{background:'#EFF6FF',border:'1px solid #BFDBFE',borderRadius:8,padding:'14px 16px',marginTop:16}}>

              <div className="form-group">

                <select className="form-control" value={country} onChange={e=>setCountry(e.target.value)}>
                  {Object.keys(logistics).map(c=><option key={c}>{c}</option>)}
                </select>
              </div>
              <div style={{background:'linear-gradient(135deg,#1B3A6B,#2E5FA3)',borderRadius:8,height:130,display:'flex',alignItems:'center',justifyContent:'center',marginTop:8}}>
                <CarSvg type={v.type} />
              </div>
              <div style={{marginTop:12,padding:'10px 0'}}>
                <div style={{fontSize:13,color:'#4A5E7A'}}>{v.brand} {v.model} · {v.year}년식 · {v.fuel}</div>
                <div style={{fontWeight:700,fontSize:16,color:'#0F1D35',marginTop:2}}>{fmtKm(v.km)} 주행</div>
              </div>
            </div>
          </div>
          <div>
            <div className="section-card">
              <div className="section-title">비용 상세 내역</div>
              {chartData.map((d,i)=>(
                <div key={d.name} style={{marginBottom:12}}>
                  <div style={{display:'flex',justifyContent:'space-between',marginBottom:5,fontSize:13}}>
                    <span style={{color:'#4A5E7A'}}>{d.name}</span>
                    <span style={{fontWeight:600,color:'#0F1D35'}}>{fmtUSD(d.value)}</span>
                  </div>
                  <div className="progress-bar-wrap">
                    <div className="progress-bar" style={{'--target-w':Math.round(d.value/total*100)+'%',background:COST_CHART_COLORS[i]}} />
                  </div>
                </div>
              ))}
              <div style={{borderTop:'2px solid #1B3A6B',marginTop:16,paddingTop:16}}>
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                  <span style={{fontWeight:700,fontSize:14,color:'#0F1D35'}}>총 수출 가격</span>
                  <span style={{fontWeight:800,fontSize:22,color:'#1B3A6B',animation:'countUp 0.4s ease both'}}>{fmtUSD(total)}</span>
                </div>
                <div style={{fontSize:11,color:'#4A5E7A',marginTop:4,display:'flex',alignItems:'center',gap:4}}>
                  <Ic.MapPin />{country} 도착 기준 · 관세 별도
                </div>
              </div>
            </div>
            <div style={{display:'flex',gap:10,marginTop:4}}>
              <button className="btn-whatsapp" style={{flex:1}} onClick={()=>alert('WhatsApp으로 견적서를 전달합니다.')}>
                <Ic.MessageCircle />WhatsApp 문의
              </button>
              <button className="btn-primary" style={{flex:1}} onClick={()=>setQuoted(true)}>
                {quoted ? '견적 확정됨' : '견적 확정'}
              </button>
            </div>
            {quoted && (
              <div style={{background:'#DCFCE7',borderRadius:8,padding:'12px 16px',marginTop:12,fontSize:13,color:'#166534',fontWeight:600,display:'flex',alignItems:'center',gap:8,animation:'scaleIn 0.2s ease both'}}>
                <Ic.Check />견적이 확정되었습니다. 담당자가 24시간 내 WhatsApp으로 연락드립니다.
              </div>
            )}
          </div>
        </div>
      </div>
    </div>
  );
};

// ── PAGE: 주문 관리 ────────────────────────────────────────────────────
const OrderPage = ({ onOrderSelect }) => {
  const [filter, setFilter] = useState('all');
  const filtered = filter === 'all' ? ORDERS : ORDERS.filter(o=>o.status===filter);
  return (
    <div className="page-enter">
      <div className="page-header" style={{maxWidth:960,margin:'0 auto'}}>
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',paddingBottom:16}}>
          <div style={{display:'flex',alignItems:'center',gap:10}}>
            <div style={{background:'#1B3A6B',borderRadius:8,padding:8,color:'#fff',display:'flex'}}><Ic.ClipboardList /></div>
            <div><div className="page-title">주문 관리</div><div className="page-sub">수출 주문 현황 및 결제 프로세스 관리</div></div>
          </div>
        </div>
        <div style={{display:'flex',gap:8,paddingBottom:16,flexWrap:'wrap'}}>
          {[['all','전체'],['DEPOSIT_WAIT','선금 대기'],['DEPOSIT_CONFIRMED','선금 확인'],['SHIPPED','선적 완료'],['BALANCE_WAIT','잔금 대기'],['COMPLETED','거래 완료']].map(([k,l])=>(
            <button key={k} onClick={()=>setFilter(k)} style={{padding:'5px 14px',borderRadius:20,border:'1px solid',borderColor:filter===k?'#1B3A6B':'#D1D9E6',background:filter===k?'#1B3A6B':'#fff',color:filter===k?'#fff':'#4A5E7A',fontSize:12,fontWeight:600,cursor:'pointer'}}>{l}</button>
          ))}
        </div>
      </div>
      <div className="content-area" style={{maxWidth:960,margin:'0 auto'}}>
        <div className="table-wrap">
          <table>
            <thead>
              <tr>
                <th>주문번호</th><th>차량</th><th>국가</th><th>상태</th><th>금액</th><th>주문일</th>
              </tr>
            </thead>
            <tbody>
              {filtered.map(o=>(
                <tr key={o.id} onClick={()=>onOrderSelect(o)}>
                  <td><span style={{fontWeight:600,color:'#1B3A6B',fontFamily:'monospace',fontSize:12}}>{o.id}</span></td>
                  <td><span style={{fontWeight:600,fontSize:13}}>{o.vehicleName}</span><div style={{fontSize:11,color:'#4A5E7A'}}>{o.buyer}</div></td>
                  <td><span style={{display:'flex',alignItems:'center',gap:4,fontSize:13}}><Ic.Globe />{o.country}</span></td>
                  <td><StatusBadge status={o.status} /></td>
                  <td><span style={{fontWeight:700,fontSize:13,color:'#1B3A6B'}}>{fmtUSD(o.amount)}</span></td>
                  <td><span style={{fontSize:12,color:'#4A5E7A'}}>{o.date}</span></td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      </div>
    </div>
  );
};

// ── PAGE: 물류 트래킹 ──────────────────────────────────────────────────
const TrackingPage = () => {
  const [selectedId, setSelectedId] = useState('ORD-2024-001');
  const o = ORDERS.find(x=>x.id===selectedId) || ORDERS[0];
  const TRACK_STEPS = [
    { label: '차량 매입 완료', sub: '부산 집결지 입고 확인', done: true, ts: o.date },
    { label: '선적 준비', sub: '컨테이너 배정 및 서류 준비', done: ['SHIPPED','BALANCE_WAIT','COMPLETED'].includes(o.status)||o.depositDate!=null, ts: o.depositDate },
    { label: '선적 진행', sub: '부산항 → 목적지 항구', done: ['SHIPPED','BALANCE_WAIT','COMPLETED'].includes(o.status), ts: o.shippedDate },
    { label: '잔금 결제', sub: '선하증권 발급 전 잔금 확인', done: ['COMPLETED','BALANCE_WAIT'].includes(o.status)&&o.status!=='BALANCE_WAIT', ts: o.status==='COMPLETED'?'잔금 확인 완료':null },
    { label: '선하증권 발급', sub: '거래 완료 및 문서 전달', done: o.status==='COMPLETED', ts: o.status==='COMPLETED'?'선하증권 발급 완료':null },
  ];
  const activeIdx = TRACK_STEPS.findIndex(s=>!s.done);
  return (
    <div className="page-enter">
      <div className="page-header" style={{maxWidth:960,margin:'0 auto'}}>
        <div style={{display:'flex',alignItems:'center',gap:10,paddingBottom:20}}>
          <div style={{background:'#1B3A6B',borderRadius:8,padding:8,color:'#fff',display:'flex'}}><Ic.Truck /></div>
          <div><div className="page-title">물류 트래킹</div><div className="page-sub">주문번호로 수출 진행 현황을 실시간으로 확인합니다</div></div>
        </div>
      </div>
      <div className="content-area" style={{maxWidth:960,margin:'0 auto'}}>
        <div style={{display:'grid',gridTemplateColumns:'320px 1fr',gap:20}}>
          <div>
            <div className="section-card">
              <div className="section-title">주문 선택</div>
              <select className="select-full" value={selectedId} onChange={e=>setSelectedId(e.target.value)}>
                {ORDERS.map(x=><option key={x.id} value={x.id}>{x.id}</option>)}
              </select>
              <div style={{fontSize:13,marginBottom:10}}>
                <div style={{color:'#4A5E7A',marginBottom:4}}>차량</div>
                <div style={{fontWeight:700}}>{o.vehicleName}</div>
              </div>
              <div style={{fontSize:13,marginBottom:10}}>
                <div style={{color:'#4A5E7A',marginBottom:4}}>바이어</div>
                <div style={{fontWeight:700}}>{o.buyer}</div>
              </div>
              <div style={{fontSize:13,marginBottom:10}}>
                <div style={{color:'#4A5E7A',marginBottom:4}}>목적지</div>
                <div style={{fontWeight:700,display:'flex',alignItems:'center',gap:4}}><Ic.Globe />{o.country}</div>
              </div>
              {o.eta && (
                <div style={{background:'#EFF6FF',borderRadius:8,padding:'12px 14px',marginTop:8}}>
                  <div style={{fontSize:12,color:'#1E40AF',fontWeight:600}}>예상 도착일</div>
                  <div style={{fontSize:18,fontWeight:800,color:'#1E3A8A',marginTop:4}}>{o.eta}</div>
                </div>
              )}
            </div>
          </div>
          <div className="section-card">
            <div className="section-title" style={{marginBottom:24}}>물류 진행 현황</div>
            <div style={{display:'flex',justifyContent:'space-between',marginBottom:24,position:'relative'}}>
              <div style={{position:'absolute',top:14,left:'10%',right:'10%',height:2,background:'#E8EEF6',zIndex:0}} />
              {TRACK_STEPS.map((s,i)=>{
                const isDone=s.done; const isActive=i===activeIdx;
                return (
                  <div key={i} style={{display:'flex',flexDirection:'column',alignItems:'center',flex:1,position:'relative',zIndex:1}}>
                    <div style={{width:28,height:28,borderRadius:'50%',background:isDone?'#1B3A6B':isActive?'#C8960C':'#E8EEF6',border:isActive?'2px solid #C8960C':'2px solid '+(isDone?'#1B3A6B':'#D1D9E6'),display:'flex',alignItems:'center',justifyContent:'center',animation:isActive?'pulseDot 1.6s ease infinite':undefined,transition:'all 0.3s'}}>
                      {isDone && <span style={{color:'#fff',fontSize:10,display:'flex'}}><Ic.Check /></span>}
                      {isActive && <span style={{width:8,height:8,borderRadius:'50%',background:'#fff',display:'block'}} />}
                    </div>
                    <div style={{marginTop:8,textAlign:'center'}}>
                      <div style={{fontSize:11,fontWeight:700,color:isDone||isActive?'#0F1D35':'#94A3B8',lineHeight:1.3,maxWidth:80}}>{s.label}</div>
                      {s.ts && <div style={{fontSize:10,color:'#4A5E7A',marginTop:2}}>{s.ts}</div>}
                      {isActive && <div style={{fontSize:10,color:'#C8960C',marginTop:2,fontWeight:600}}>진행 중</div>}
                    </div>
                  </div>
                );
              })}
            </div>
            <div style={{background:'#F8FAFC',borderRadius:8,padding:'14px 16px',marginTop:16}}>
              <div style={{fontSize:13,color:'#4A5E7A',lineHeight:1.7}}>
                <div style={{fontWeight:700,color:'#0F1D35',marginBottom:6}}>현재 상태: <StatusBadge status={o.status} /></div>
                <div style={{fontSize:12}}>현재 단계의 진행 상황은 담당자가 직접 업데이트합니다. 문의 사항은 WhatsApp을 통해 확인하세요.</div>
              </div>
              <button className="btn-whatsapp" style={{marginTop:12,width:'100%'}} onClick={()=>alert('담당자 WhatsApp 연결')}>
                <Ic.MessageCircle />담당자에게 문의하기
              </button>
            </div>
          </div>
        </div>
      </div>
    </div>
  );
};

// ── TOP NAV ───────────────────────────────────────────────────────────
const TopNav = ({ page, setPage }) => (
  <div className="topnav">
    <div className="topnav-logo">AUTO<span>XPORT</span></div>
    <button className={`nav-btn${page==='main'?' active':''}`} onClick={()=>setPage('main')}>차량 검색</button>
    <button className={`nav-btn${page==='quote'?' active':''}`} onClick={()=>setPage('quote')}>견적 계산</button>
    <button className={`nav-btn${page==='order'?' active':''}`} onClick={()=>setPage('order')}>주문 관리</button>
    <button className={`nav-btn${page==='tracking'?' active':''}`} onClick={()=>setPage('tracking')}>물류 트래킹</button>
    <div className="topnav-spacer" />
    <button className="btn-whatsapp" style={{padding:'7px 14px',fontSize:13}} onClick={()=>alert('WhatsApp 채널로 연결합니다.')}>
      <Ic.MessageCircle />WhatsApp 문의
    </button>
  </div>
);

// ── APP ───────────────────────────────────────────────────────────────
const App = () => {
  const [page, setPage] = useState('main');
  const [vehicleDrawer, setVehicleDrawer] = useState(null);
  const [orderDrawer, setOrderDrawer] = useState(null);
  const [selectedVehicle, setSelectedVehicle] = useState(null);
  const [toast, setToast] = useState(null);

  const goToQuote = useCallback(v => { setSelectedVehicle(v); setPage('quote'); }, []);

  return (
    <div style={{width:'100%',minHeight:'100vh',background:'#F5F7FA',fontFamily:"'Pretendard',-apple-system,sans-serif"}}>
      <TopNav page={page} setPage={setPage} />
      <div style={{paddingBottom:40}}>
        {page==='main' && <VehicleListPage onVehicleSelect={setVehicleDrawer} onStartQuote={goToQuote} />}
        {page==='quote' && <QuotePage selectedVehicle={selectedVehicle} />}
        {page==='order' && <OrderPage onOrderSelect={setOrderDrawer} />}
        {page==='tracking' && <TrackingPage />}
      </div>
      {vehicleDrawer && <VehicleDrawer vehicle={vehicleDrawer} onClose={()=>setVehicleDrawer(null)} onQuote={goToQuote} />}
      {orderDrawer && <OrderDrawer order={orderDrawer} onClose={()=>setOrderDrawer(null)} onToast={msg=>{setOrderDrawer(null);setToast(msg);}} />}
      {toast && <Toast msg={toast} onClose={()=>setToast(null)} />}
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
