    .page-content { max-width: 1100px; margin: 0 auto; padding: 32px 40px 60px; }
    .page-title-wrap { margin-bottom: 24px; }
    .page-title { font-size: 22px; font-weight: 800; color: #062E22; }
    .page-sub { font-size: 13px; color: #3A6457; margin-top: 4px; }

    /* Cards */
    .card { background: #fff; border-radius: 12px; border: 1px solid #C8E6DC; padding: 24px; box-shadow: 0 2px 8px rgba(10,107,84,0.06); }
    .card-hover:hover { box-shadow: 0 8px 24px rgba(10,107,84,0.15); transform: scale(1.02); transition: all 0.2s; }

    /* KPI */
    .kpi-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 24px; }
    .kpi-val { font-size: 26px; font-weight: 900; color: #062E22; }
    .kpi-label { font-size: 12px; color: #3A6457; margin-top: 4px; }
    .kpi-badge { font-size: 11px; font-weight: 700; padding: 2px 8px; border-radius: 20px; margin-top: 8px; display: inline-block; }

    /* Buttons */
    .btn-primary { background: #0A6B54; color: #fff; border: none; border-radius: 8px; padding: 9px 18px; font-family: inherit; font-size: 13px; font-weight: 700; cursor: pointer; transition: all 0.15s; }

    .tbl { width: 100%; border-collapse: collapse; }

    .tbl-row:hover td { background: #F7FDF9; cursor: pointer; }

    .tbl-row:nth-child(3) { animation-delay: 0.1s; }
    .tbl-row:nth-child(4) { animation-delay: 0.15s; }

    .toast-wrap { position: fixed; bottom: 28px; right: 28px; z-index: 200; }

    .section-h { font-size: 14px; font-weight: 800; color: #062E22; margin-bottom: 16px; }
    .chart-container { position: relative; height: 240px; }
    .info-row { display: flex; justify-content: space-between; align-items: center; padding: 9px 0; border-bottom: 1px solid #E8F4EF; font-size: 13px; }

            {items.map(p=>(
              <tr key={p.id} className="tbl-row">
                <td style={{fontWeight:700,display:'flex',alignItems:'center',gap:6}}><Ph.Globe />{p.country}</td>
                <td><span style={{fontWeight:700,color:C.primary}}>{p.logisticsRate}%</span></td>
                <td style={{fontWeight:600}}>{fmtUSD(p.minMargin)}</td>
                <td style={{fontSize:12,color:C.textSecondary}}>{p.dutyNote}</td>
                <td><span className="badge badge-gray">{p.currency}</span></td>
                <td><span className={`badge ${p.active?'badge-green':'badge-gray'}`}>{p.active?'활성':'비활성'}</span></td>
                <td>
                  <div style={{display:'flex',gap:4}}>
                    <button className="btn-ghost" style={{padding:'4px 10px',fontSize:11}} onClick={()=>openEdit(p)}>수정</button>
                    <button className="btn-icon" onClick={()=>{setItems(prev=>prev.map(x=>x.id===p.id?{...x,active:!x.active}:x));onToast(`${p.country} 정책이 ${p.active?'비활성화':'활성화'}되었습니다.`);}}>
                      {p.active ? <span style={{color:'#DC2626',fontSize:10,fontWeight:700}}>OFF</span> : <span style={{color:C.primary,fontSize:10,fontWeight:700}}>ON</span>}
                    </button>
                  </div>
                </td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>

      {(editing !== null || showAdd) && (
        <div className="modal-overlay" onClick={e=>e.target===e.currentTarget&&(setEditing(null),setShowAdd(false))}>
          <div className="modal-box">
            <div className="modal-header">
              <div className="modal-title">{showAdd ? '신규 국가 추가' : `${form.country} 가격 정책 수정`}</div>
              <button className="btn-icon" onClick={()=>{setEditing(null);setShowAdd(false);}}><Ph.X /></button>
            </div>
            {showAdd && <div className="form-group"><label className="form-label">국가명</label><input className="form-control" value={form.country||''} onChange={e=>setForm(f=>({...f,country:e.target.value}))} placeholder="온두라스" /></div>}
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>
              <div className="form-group"><label className="form-label">물류비율 (%)</label><input className="form-control" value={form.logisticsRate||''} onChange={e=>setForm(f=>({...f,logisticsRate:e.target.value}))} placeholder="22.3" /></div>
              <div className="form-group"><label className="form-label">최소 마진 (USD)</label><input className="form-control" value={form.minMargin||''} onChange={e=>setForm(f=>({...f,minMargin:Number(e.target.value)||0}))} placeholder="800" /></div>
            </div>
            <div className="form-group"><label className="form-label">관세 안내</label><input className="form-control" value={form.dutyNote||''} onChange={e=>setForm(f=>({...f,dutyNote:e.target.value}))} placeholder="관세 25%" /></div>
            <div style={{background:'#F0F9F5',borderRadius:8,padding:'10px 14px',fontSize:12,color:C.textSecondary,marginTop:8}}>
              변경 시 감사 로그에 이전값·변경값·타임스탬프가 자동 기록됩니다.
            </div>
            <div className="modal-footer">
              <button className="btn-secondary" onClick={()=>{setEditing(null);setShowAdd(false);}}>취소</button>
              <button className="btn-primary" onClick={()=>{if(showAdd){setItems(prev=>[...prev,{...form,id:Date.now(),active:true}]);setShowAdd(false);onToast(`${form.country} 가격 정책이 추가되었습니다.`);}else saveEdit();}}>저장</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
};

// ── GLOBAL NAV ────────────────────────────────────────────────────────
const GlobalNav = ({ page, setPage }) => (
  <nav className="global-nav">
    <div className="nav-logo">AUTO<span>XPORT</span> <span style={{fontSize:11,fontWeight:500,color:'rgba(255,255,255,0.5)',marginLeft:4}}>Admin</span></div>
    <div className="nav-links">
      <button className={`nav-link${page==='main'?' active':''}`} onClick={()=>setPage('main')}>대시보드</button>
      <button className={`nav-link${page==='inventory'?' active':''}`} onClick={()=>setPage('inventory')}>차량 관리</button>
      <button className={`nav-link${page==='margin'?' active':''}`} onClick={()=>setPage('margin')}>비용·마진 분석</button>
      <button className={`nav-link${page==='pricing'?' active':''}`} onClick={()=>setPage('pricing')}>가격 정책</button>
    </div>
    <div className="nav-spacer" />
    <div className="nav-user">
      <div className="nav-avatar">김</div>
      <span>김관리자</span>
    </div>
  </nav>
);

// ── FOOTER ─────────────────────────────────────────────────────────────
const Footer = () => (
  <footer className="site-footer">
    <span>중고차 수출 관리 플랫폼 — 구현 데모 · React + Node.js + PostgreSQL + Prisma + Redis + AWS S3</span>
    <span>풀스택 개발 (기여도 100%)</span>
  </footer>
);

// ── APP ───────────────────────────────────────────────────────────────
const App = () => {
  const [page, setPage] = useState('main');
  const [toast, setToast] = useState(null);
  const showToast = useCallback(msg => setToast(msg), []);

  return (
    <div style={{width:'100%',minHeight:'100vh',background:C.bg,display:'flex',flexDirection:'column',fontFamily:"'Pretendard',-apple-system,sans-serif"}}>
      <GlobalNav page={page} setPage={setPage} />
      <main style={{flex:1}}>
        <div className="page-content">
          {page==='main' && <DashboardPage />}
          {page==='inventory' && <InventoryPage onToast={showToast} />}
          {page==='margin' && <MarginPage onToast={showToast} />}
          {page==='pricing' && <PricingPage onToast={showToast} />}
        </div>
      </main>
      <Footer />
      {toast && <Toast msg={toast} onClose={()=>setToast(null)} />}
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
