<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>여행 AI 챗봇 컨시어지 — 맞춤 구현 데모</title>
<link rel="preconnect" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css"/>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css"/>
<link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.0.3/src/regular/style.css"/>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://unpkg.com/prop-types@15.8.1/prop-types.min.js"></script>
<script src="https://unpkg.com/react-is@18.2.0/umd/react-is.production.min.js"></script>
<script src="https://unpkg.com/recharts@2.8.0/umd/Recharts.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
html,body{width:100%;min-height:100vh;font-family:'Pretendard',sans-serif;background:#FDF7EF;}
#root{width:100%;min-height:100vh;}

:root{
  --primary:#E8650A;
  --primary-light:#FF8C3A;
  --secondary:#F5A623;
  --accent:#2B7EC9;
  --bg:#FDF7EF;
  --surface:#FFFFFF;
  --surface2:#FFF8F0;
  --border:#EDE0D0;
  --text1:#1A1A2E;
  --text2:#6B6B7B;
  --text3:#9E9E9E;
  --radius:16px;
  --radius-sm:10px;
  --shadow-card:0 2px 12px rgba(232,101,10,0.10),0 1px 4px rgba(0,0,0,0.06);
  --shadow-elevated:0 6px 24px rgba(232,101,10,0.14),0 2px 8px rgba(0,0,0,0.08);
}

/* Topnav */
.topnav{
  position:fixed;top:0;left:0;right:0;z-index:100;
  background:rgba(253,247,239,0.92);
  backdrop-filter:blur(12px);
  border-bottom:1px solid var(--border);
  height:60px;
  display:flex;align-items:center;
  padding:0 24px;
  gap:0;
}
.topnav-logo{
  display:flex;align-items:center;gap:8px;
  font-size:17px;font-weight:700;color:var(--primary);
  margin-right:32px;
  white-space:nowrap;
}
.topnav-logo i{font-size:22px;}
.nav-tabs{display:flex;align-items:center;gap:2px;flex:1;}
.nav-tab{
  padding:7px 16px;border-radius:8px;
  font-size:14px;font-weight:500;color:var(--text2);
  cursor:pointer;
  transition:all 0.18s;
  white-space:nowrap;
  border:none;background:transparent;
}
.nav-tab:hover{background:rgba(232,101,10,0.08);color:var(--primary);}
.nav-tab.active{
  background:var(--primary);color:#fff;
  box-shadow:0 2px 8px rgba(232,101,10,0.3);
}
.topnav-right{
  display:flex;align-items:center;gap:12px;margin-left:auto;
}
.lang-btn{
  padding:5px 12px;border-radius:20px;
  font-size:12px;font-weight:600;
  border:1.5px solid var(--border);
  background:var(--surface);color:var(--text2);
  cursor:pointer;
  transition:all 0.18s;
}
.lang-btn:hover{border-color:var(--primary);color:var(--primary);}
.avatar{
  width:34px;height:34px;border-radius:50%;
  background:linear-gradient(135deg,var(--primary),var(--secondary));
  display:flex;align-items:center;justify-content:center;
  color:#fff;font-size:13px;font-weight:700;cursor:pointer;
}

/* Main layout */
.main-area{
  padding-top:60px;
  width:100%;min-height:100vh;
  display:flex;flex-direction:column;
}

/* Hero (only on chat page) */
.hero{
  background:linear-gradient(135deg,#FFF3E8 0%,#FDF7EF 60%,#FFF0E0 100%);
  padding:40px 40px 0;
  position:relative;overflow:hidden;
}
.hero-inner{max-width:900px;margin:0 auto;}
.hero-badge{
  display:inline-flex;align-items:center;gap:6px;
  padding:4px 12px;border-radius:20px;
  background:rgba(232,101,10,0.1);
  color:var(--primary);font-size:12px;font-weight:600;
  margin-bottom:14px;
}
.hero-title{
  font-size:28px;font-weight:800;color:var(--text1);
  line-height:1.35;margin-bottom:8px;
}
.hero-title span{color:var(--primary);}
.hero-sub{font-size:15px;color:var(--text2);margin-bottom:24px;line-height:1.6;}

/* Chat view */
.chat-wrap{
  max-width:900px;margin:0 auto;
  padding:24px 40px 40px;
  width:100%;
}
.chat-container{
  background:var(--surface);
  border-radius:var(--radius);
  box-shadow:var(--shadow-elevated);
  overflow:hidden;
  border:1px solid var(--border);
}
.chat-header{
  padding:16px 20px;
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:12px;
}
.chat-ai-icon{
  width:38px;height:38px;border-radius:12px;
  background:linear-gradient(135deg,var(--primary),var(--secondary));
  display:flex;align-items:center;justify-content:center;
  color:#fff;
}
.chat-ai-icon i{font-size:18px;}
.chat-ai-name{font-size:14px;font-weight:700;color:var(--text1);}
.chat-ai-status{font-size:12px;color:var(--text2);display:flex;align-items:center;gap:4px;}
.status-dot{width:6px;height:6px;border-radius:50%;background:#22c55e;animation:pulse 2s infinite;}
.lang-pills{display:flex;gap:6px;margin-left:auto;}
.lang-pill{
  padding:3px 8px;border-radius:12px;font-size:11px;font-weight:600;
  border:1.5px solid var(--border);background:transparent;cursor:pointer;
  color:var(--text2);transition:all 0.15s;
}
.lang-pill.active{border-color:var(--primary);color:var(--primary);background:rgba(232,101,10,0.08);}
.chat-messages{
  padding:20px;
  height:360px;overflow-y:auto;
  display:flex;flex-direction:column;gap:14px;
}
.msg-row{display:flex;gap:10px;align-items:flex-end;}
.msg-row.user{flex-direction:row-reverse;}
.msg-avatar{
  width:32px;height:32px;border-radius:10px;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  font-size:12px;font-weight:700;
}
.msg-avatar.ai{background:linear-gradient(135deg,var(--primary),var(--secondary));color:#fff;}
.msg-avatar.user{background:var(--accent);color:#fff;}
.msg-bubble{
  max-width:68%;padding:12px 16px;border-radius:16px;
  font-size:14px;line-height:1.6;
}
.msg-bubble.ai{
  background:var(--surface2);color:var(--text1);
  border-bottom-left-radius:4px;
  border:1px solid var(--border);
}
.msg-bubble.user{
  background:var(--primary);color:#fff;
  border-bottom-right-radius:4px;
}
.msg-time{font-size:11px;color:var(--text3);margin-top:4px;padding:0 4px;}
.recommendation-card{
  background:var(--surface);border:1.5px solid var(--border);
  border-radius:12px;padding:14px 16px;margin-top:8px;
  cursor:pointer;transition:all 0.18s;
}
.recommendation-card:hover{border-color:var(--primary);box-shadow:var(--shadow-card);}
.rec-header{display:flex;align-items:center;gap:8px;margin-bottom:8px;}
.rec-icon{
  width:32px;height:32px;border-radius:8px;
  background:rgba(232,101,10,0.1);
  display:flex;align-items:center;justify-content:center;
  color:var(--primary);
}
.rec-title{font-size:13px;font-weight:700;color:var(--text1);}
.rec-days{font-size:11px;color:var(--text2);}
.rec-tags{display:flex;gap:6px;flex-wrap:wrap;}
.rec-tag{
  padding:2px 8px;border-radius:10px;font-size:11px;
  background:rgba(232,101,10,0.1);color:var(--primary);font-weight:600;
}
.typing-indicator{display:flex;gap:4px;align-items:center;padding:4px 0;}
.typing-dot{
  width:7px;height:7px;border-radius:50%;
  background:var(--text3);
  animation:typing 1.4s infinite;
}
.typing-dot:nth-child(2){animation-delay:0.2s;}
.typing-dot:nth-child(3){animation-delay:0.4s;}
.chat-input-area{
  padding:14px 20px;
  border-top:1px solid var(--border);
  display:flex;gap:10px;align-items:center;
  background:var(--surface);
}
.chat-input{
  flex:1;padding:10px 16px;border-radius:12px;
  border:1.5px solid var(--border);
  font-size:14px;color:var(--text1);
  background:var(--bg);
  outline:none;font-family:inherit;
  transition:border-color 0.15s;
}
.chat-input:focus{border-color:var(--primary);}
.send-btn{
  width:42px;height:42px;border-radius:12px;
  background:var(--primary);color:#fff;border:none;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:all 0.18s;
  box-shadow:0 2px 8px rgba(232,101,10,0.35);
}
.send-btn:hover{background:var(--primary-light);transform:scale(1.04);}
.quick-chips{
  padding:0 20px 14px;
  display:flex;gap:8px;flex-wrap:wrap;
}
.quick-chip{
  padding:6px 14px;border-radius:20px;font-size:12px;font-weight:600;
  border:1.5px solid var(--border);background:var(--surface);
  color:var(--text2);cursor:pointer;transition:all 0.15s;
}
.quick-chip:hover{border-color:var(--primary);color:var(--primary);}

/* Itinerary view */
.page-view{padding:32px 40px;max-width:1100px;margin:0 auto;width:100%;}
.page-title{
  font-size:22px;font-weight:800;color:var(--text1);margin-bottom:6px;
  display:flex;align-items:center;gap:10px;
}
.page-title i{color:var(--primary);}
.page-subtitle{font-size:14px;color:var(--text2);margin-bottom:28px;}
.itinerary-grid{display:grid;grid-template-columns:1fr 1.3fr;gap:24px;}
.day-list{display:flex;flex-direction:column;gap:12px;}
.day-card{
  background:var(--surface);border-radius:var(--radius);
  border:1.5px solid var(--border);padding:16px;
  cursor:pointer;transition:all 0.18s;
  box-shadow:var(--shadow-card);
}
.day-card:hover{border-color:var(--primary);transform:translateY(-2px);box-shadow:var(--shadow-elevated);}
.day-card.active{border-color:var(--primary);box-shadow:var(--shadow-elevated);}
.day-header{display:flex;align-items:center;gap:10px;margin-bottom:12px;}
.day-badge{
  padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700;
  background:var(--primary);color:#fff;
}
.day-name{font-size:14px;font-weight:700;color:var(--text1);}
.day-date{font-size:12px;color:var(--text2);}
.place-list{display:flex;flex-direction:column;gap:8px;}
.place-item{
  display:flex;align-items:center;gap:10px;
  padding:8px 12px;border-radius:10px;background:var(--bg);
}
.place-time{font-size:11px;color:var(--text2);width:42px;flex-shrink:0;}
.place-dot{
  width:8px;height:8px;border-radius:50%;
  background:var(--primary);flex-shrink:0;
}
.place-name{font-size:13px;font-weight:600;color:var(--text1);flex:1;}
.place-cat{
  font-size:11px;color:var(--text2);
  padding:2px 7px;border-radius:8px;background:var(--surface2);
}
.map-panel{
  background:var(--surface);border-radius:var(--radius);
  border:1.5px solid var(--border);overflow:hidden;
  box-shadow:var(--shadow-card);
}
.map-toolbar{
  padding:14px 16px;border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
}
.map-toolbar-title{font-size:14px;font-weight:700;color:var(--text1);}
.map-actions{display:flex;gap:8px;}
.map-btn{
  padding:6px 14px;border-radius:8px;font-size:12px;font-weight:600;
  border:1.5px solid var(--border);background:transparent;
  color:var(--text2);cursor:pointer;transition:all 0.15s;
  display:flex;align-items:center;gap:5px;
}
.map-btn:hover{border-color:var(--primary);color:var(--primary);}
.map-btn.primary-btn{background:var(--primary);color:#fff;border-color:var(--primary);}
.map-btn.primary-btn:hover{background:var(--primary-light);}
.map-placeholder{
  height:320px;
  background:linear-gradient(180deg,#E8F4EA 0%,#D4ECDA 40%,#C8E6C9 100%);
  position:relative;overflow:hidden;
}
.map-grid{
  position:absolute;inset:0;
  background-image:
    linear-gradient(rgba(0,0,0,0.04) 1px,transparent 1px),
    linear-gradient(90deg,rgba(0,0,0,0.04) 1px,transparent 1px);
  background-size:32px 32px;
}
.map-road{
  position:absolute;background:rgba(255,255,255,0.7);border-radius:4px;
}
.map-pin{
  position:absolute;
  display:flex;flex-direction:column;align-items:center;
  cursor:pointer;
  animation:pinBounce 0.4s ease-out;
}
.pin-icon{
  width:32px;height:32px;border-radius:50% 50% 50% 0;
  transform:rotate(-45deg);
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 3px 8px rgba(0,0,0,0.25);
}
.pin-icon i{transform:rotate(45deg);font-size:14px;}
.pin-label{
  margin-top:6px;padding:2px 8px;border-radius:6px;
  background:rgba(255,255,255,0.95);font-size:10px;font-weight:700;
  color:var(--text1);white-space:nowrap;box-shadow:0 1px 4px rgba(0,0,0,0.15);
}
.map-legend{
  position:absolute;bottom:12px;left:12px;
  background:rgba(255,255,255,0.92);border-radius:10px;
  padding:8px 12px;font-size:11px;color:var(--text2);
  backdrop-filter:blur(6px);
}
.route-line{
  position:absolute;border-top:2.5px dashed rgba(232,101,10,0.5);
}

/* Travel info view */
.info-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:18px;}
.info-card{
  background:var(--surface);border-radius:var(--radius);
  border:1.5px solid var(--border);padding:20px;
  box-shadow:var(--shadow-card);
}
.info-card-header{
  display:flex;align-items:center;gap:10px;margin-bottom:16px;
}
.info-card-icon{
  width:40px;height:40px;border-radius:12px;
  display:flex;align-items:center;justify-content:center;
  font-size:20px;
}
.info-card-title{font-size:14px;font-weight:700;color:var(--text1);}
.info-card-sub{font-size:12px;color:var(--text2);}
.weather-city{font-size:18px;font-weight:800;color:var(--text1);margin-bottom:4px;}
.weather-temp{font-size:42px;font-weight:300;color:var(--primary);line-height:1;}
.weather-desc{font-size:14px;color:var(--text2);margin-top:4px;}
.weather-row{display:flex;gap:16px;margin-top:12px;}
.weather-item{font-size:12px;color:var(--text2);display:flex;align-items:center;gap:4px;}
.currency-list{display:flex;flex-direction:column;gap:10px;}
.currency-item{
  display:flex;align-items:center;justify-content:space-between;
  padding:8px 12px;border-radius:10px;background:var(--bg);cursor:pointer;
  transition:background 0.15s;
}
.currency-item:hover{background:rgba(232,101,10,0.08);}
.currency-flag{font-size:20px;margin-right:8px;}
.currency-name{font-size:13px;font-weight:600;color:var(--text1);}
.currency-code{font-size:11px;color:var(--text2);}
.currency-rate{font-size:14px;font-weight:700;color:var(--primary);}
.currency-change{font-size:11px;color:#22c55e;}
.booking-links{display:flex;flex-direction:column;gap:10px;}
.booking-link{
  display:flex;align-items:center;gap:12px;
  padding:12px 14px;border-radius:12px;
  border:1.5px solid var(--border);cursor:pointer;
  transition:all 0.18s;background:var(--surface);
}
.booking-link:hover{border-color:var(--primary);transform:translateX(4px);}
.booking-link-icon{
  width:36px;height:36px;border-radius:10px;
  display:flex;align-items:center;justify-content:center;
  font-size:18px;
}
.booking-link-name{font-size:13px;font-weight:600;color:var(--text1);}
.booking-link-desc{font-size:11px;color:var(--text2);}
.booking-arrow{margin-left:auto;color:var(--text3);}

/* Search view */
.search-header{margin-bottom:24px;}
.search-bar{
  display:flex;align-items:center;gap:10px;
  background:var(--surface);border-radius:var(--radius);
  border:2px solid var(--border);padding:12px 18px;
  margin-bottom:16px;
  box-shadow:var(--shadow-card);
  transition:border-color 0.18s;
}
.search-bar:focus-within{border-color:var(--primary);}
.search-bar input{
  flex:1;border:none;outline:none;
  font-size:15px;color:var(--text1);background:transparent;
  font-family:inherit;
}
.search-icon{color:var(--text2);font-size:20px;}
.search-filters{display:flex;gap:8px;flex-wrap:wrap;}
.filter-tag{
  padding:5px 14px;border-radius:20px;font-size:12px;font-weight:600;
  border:1.5px solid var(--border);background:var(--surface);
  color:var(--text2);cursor:pointer;transition:all 0.15s;
}
.filter-tag.active{background:var(--primary);color:#fff;border-color:var(--primary);}
.search-results-grid{
  display:grid;grid-template-columns:repeat(3,1fr);gap:16px;
}
.dest-card{
  background:var(--surface);border-radius:var(--radius);
  overflow:hidden;cursor:pointer;
  box-shadow:var(--shadow-card);
  transition:all 0.22s;
  border:1.5px solid var(--border);
}
.dest-card:hover{transform:translateY(-4px);box-shadow:var(--shadow-elevated);}
.dest-thumb{
  height:140px;position:relative;
  display:flex;align-items:center;justify-content:center;
  overflow:hidden;
}
.dest-thumb-city{
  font-size:52px;font-weight:900;opacity:0.12;color:var(--text1);
  position:absolute;
}
.dest-thumb-overlay{
  position:absolute;inset:0;
  background:linear-gradient(180deg,transparent 40%,rgba(0,0,0,0.4) 100%);
}
.dest-thumb-label{
  position:absolute;bottom:10px;left:12px;
  font-size:18px;font-weight:800;color:#fff;
}
.dest-match{
  position:absolute;top:10px;right:10px;
  padding:3px 8px;border-radius:8px;
  background:rgba(232,101,10,0.85);color:#fff;
  font-size:11px;font-weight:700;
}
.dest-body{padding:14px;}
.dest-name{font-size:14px;font-weight:700;color:var(--text1);margin-bottom:4px;}
.dest-tags{display:flex;gap:6px;flex-wrap:wrap;}
.dest-tag{
  font-size:11px;padding:2px 7px;border-radius:8px;
  background:rgba(232,101,10,0.08);color:var(--primary);font-weight:600;
}
.dest-rating{display:flex;align-items:center;gap:4px;font-size:12px;color:var(--text2);margin-top:8px;}

/* Profile/My Trips view */
.trips-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:18px;margin-bottom:28px;}
.trip-card{
  background:var(--surface);border-radius:var(--radius);
  border:1.5px solid var(--border);overflow:hidden;
  cursor:pointer;box-shadow:var(--shadow-card);
  transition:all 0.2s;
}
.trip-card:hover{transform:translateY(-3px);box-shadow:var(--shadow-elevated);}
.trip-thumb{
  height:110px;position:relative;
  display:flex;align-items:center;justify-content:center;
}
.trip-thumb-label{
  font-size:48px;font-weight:900;opacity:0.14;color:#fff;
  position:absolute;
}
.trip-thumb-overlay{
  position:absolute;inset:0;
  background:linear-gradient(180deg,transparent 30%,rgba(0,0,0,0.5) 100%);
}
.trip-thumb-city{
  position:absolute;bottom:10px;left:14px;
  font-size:16px;font-weight:800;color:#fff;
}
.trip-body{padding:14px;}
.trip-name{font-size:14px;font-weight:700;color:var(--text1);margin-bottom:4px;}
.trip-meta{font-size:12px;color:var(--text2);display:flex;gap:10px;}
.trip-status{
  padding:2px 8px;border-radius:8px;font-size:11px;font-weight:600;
}

/* Toast */
.toast{
  position:fixed;bottom:28px;right:28px;
  background:var(--text1);color:#fff;
  padding:12px 20px;border-radius:12px;
  font-size:13px;font-weight:600;
  box-shadow:0 4px 16px rgba(0,0,0,0.3);
  animation:toastIn 0.3s ease-out;
  z-index:9999;display:flex;align-items:center;gap:8px;
}

/* Modal */
.modal-overlay{
  position:fixed;inset:0;z-index:1000;
  background:rgba(26,26,46,0.55);backdrop-filter:blur(4px);
  display:flex;align-items:center;justify-content:center;
  animation:fadeIn 0.2s;
}
.modal{
  background:var(--surface);border-radius:var(--radius);
  width:520px;max-width:92vw;max-height:80vh;
  overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,0.2);
  animation:modalIn 0.25s ease-out;
}
.modal-header{
  padding:18px 20px;border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
}
.modal-title{font-size:16px;font-weight:700;color:var(--text1);}
.modal-close{
  width:28px;height:28px;border-radius:8px;
  border:none;background:var(--bg);cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  color:var(--text2);font-size:16px;
}
.modal-body{padding:20px;overflow-y:auto;max-height:calc(80vh - 120px);}
.modal-footer{
  padding:14px 20px;border-top:1px solid var(--border);
  display:flex;justify-content:flex-end;gap:10px;
}
.btn{
  padding:9px 20px;border-radius:10px;font-size:13px;font-weight:600;
  cursor:pointer;border:none;transition:all 0.18s;font-family:inherit;
}
.btn-primary{background:var(--primary);color:#fff;box-shadow:0 2px 8px rgba(232,101,10,0.3);}
.btn-primary:hover{background:var(--primary-light);}
.btn-outline{background:transparent;border:1.5px solid var(--border);color:var(--text2);}
.btn-outline:hover{border-color:var(--primary);color:var(--primary);}

/* Detail panel */
.detail-row{display:flex;gap:12px;align-items:flex-start;margin-bottom:14px;}
.detail-label{font-size:12px;color:var(--text2);width:80px;flex-shrink:0;padding-top:2px;}
.detail-value{font-size:14px;color:var(--text1);font-weight:600;flex:1;}
.tag-list{display:flex;gap:6px;flex-wrap:wrap;}
.tag{padding:3px 9px;border-radius:8px;background:rgba(232,101,10,0.1);color:var(--primary);font-size:12px;font-weight:600;}

@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes modalIn{from{opacity:0;transform:scale(0.93)translateY(12px)}to{opacity:1;transform:none}}
@keyframes toastIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}
@keyframes typing{0%,100%{transform:translateY(0);opacity:0.5}50%{transform:translateY(-4px);opacity:1}}
@keyframes pinBounce{0%{transform:translateY(-8px);opacity:0}60%{transform:translateY(3px)}100%{transform:translateY(0);opacity:1}}
@keyframes cardFadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}
@keyframes shimmer{0%{background-position:-400px 0}100%{background-position:400px 0}}

.card-enter{animation:cardFadeUp 0.35s ease-out both;}

}

function ChatView(){
  const [msgs,setMsgs]=useState(CHATS);
  const [input,setInput]=useState('');
  const [lang,setLang]=useState('한국어');
  const [typing,setTyping]=useState(false);

  const messagesEndRef=useRef(null);
  const LANGS=['한국어','English','Bahasa'];

  useEffect(()=>{
    messagesEndRef.current?.scrollIntoView({behavior:'smooth'});
  },[msgs,typing]);

  function sendMsg(){
    if(!input.trim())return;
    const userMsg={id:Date.now(),role:'user',text:input,time:'오전 10:'+String(Math.floor(Math.random()*59)).padStart(2,'0')};
    setMsgs(p=>[...p,userMsg]);
    setInput('');
    setTyping(true);
    setTimeout(()=>{
      setTyping(false);
      setMsgs(p=>[...p,{id:Date.now()+1,role:'ai',text:`"${userMsg.text.slice(0,18)}..."에 대한 맞춤 정보를 안내드릴게요. 발리 현지 기준 최적의 여행 옵션을 준비했습니다.`,time:'오전 10:'+String(Math.floor(Math.random()*59)).padStart(2,'0')}]);
    },1400);
  }

        </div>
      </div>
      <div className="chat-wrap">
        <div className="chat-container">
          <div className="chat-header">
            <div className="chat-ai-icon"><i className="ph ph-robot" style={{fontSize:18}}/></div>
            <div>
              <div className="chat-ai-name">트래블 AI 컨시어지</div>
              <div className="chat-ai-status"><span className="status-dot"/>응답 대기 중</div>
            </div>
            <div className="lang-pills">
              {LANGS.map(l=><button key={l} className={`lang-pill${lang===l?' active':''}`} onClick={()=>{setLang(l);setToast(`언어가 ${l}(으)로 전환됩니다`);}}>{l}</button>)}
            </div>
          </div>
          <div className="chat-messages">
            {msgs.map(m=>(
              <div key={m.id} className="msg-row" style={{flexDirection:m.role==='user'?'row-reverse':'row'}}>
                <div className={`msg-avatar ${m.role}`}>{m.role==='ai'?<i className="ph ph-robot" style={{fontSize:14}}/> : '이'}</div>
                <div>
                  <div className={`msg-bubble ${m.role}`}>
                    {m.text}
                    {m.recs && <div style={{marginTop:10,display:'flex',flexDirection:'column',gap:8}}>
                      {m.recs.map(r=>(
                        <div key={r.id} className="recommendation-card" onClick={()=>openRec(r)}>
                          <div className="rec-header">
                            <div className="rec-icon"><i className="ph ph-map-trifold"/></div>
                            <div>
                              <div className="rec-title">{r.title}</div>
                              <div className="rec-days">여행 {r.days}일 · {r.budget}</div>
                            </div>
                          </div>
                          <div className="rec-tags">{r.tags.map(t=><span key={t} className="rec-tag">{t}</span>)}</div>
                        </div>
                      ))}
                    </div>}
                  </div>
                  <div className="msg-time">{m.time}</div>
                </div>
              </div>
            ))}
            {typing && (
              <div className="msg-row">
                <div className="msg-avatar ai"><i className="ph ph-robot" style={{fontSize:14}}/></div>
                <div className="msg-bubble ai"><div className="typing-indicator"><div className="typing-dot"/><div className="typing-dot"/><div className="typing-dot"/></div></div>
              </div>
            )}
            <div ref={messagesEndRef}/>

          <div className="quick-chips">

            <input className="chat-input" value={input} onChange={e=>setInput(e.target.value)}
              onKeyDown={e=>e.key==='Enter'&&sendMsg()}
              placeholder="여행지, 기간, 예산을 자유롭게 입력하세요..."/>
            <button className="send-btn" onClick={sendMsg}><i className="ph ph-paper-plane-tilt" style={{fontSize:18}}/></button>

        </div>
      </div>
      {toast && <Toast msg={toast} onDone={()=>setToast('')}/>}
      {modal && (
        <div className="modal-overlay" onClick={()=>setModal(null)}>
          <div className="modal" onClick={e=>e.stopPropagation()}>

              <div className="modal-title">{modal.title}</div>
              <button className="modal-close" onClick={()=>setModal(null)}><i className="ph ph-x"/></button>
            </div>
            <div className="modal-body">

              <div className="detail-row"><span className="detail-label">예산(1인)</span><span className="detail-value">{modal.budget}</span></div>

            </div>
          </div>
        </div>
      )}
    </div>
  );
}

          <div className="info-card">
            <div className="info-card-header">
              <div className="info-card-icon" style={{background:'rgba(43,126,201,0.1)',color:'var(--accent)'}}><i className="ph ph-currency-circle-dollar" style={{fontSize:20}}/></div>
              <div><div className="info-card-title">실시간 환율</div><div className="info-card-sub">ExchangeRate API · 1시간 갱신</div></div>
            </div>
            <div className="currency-list">
              {CURRENCIES.map((c,i)=>(
                <div key={i} className="currency-item" onClick={()=>setToast(`${c.code} 환율 상세 정보를 조회합니다`)}>
                  <span style={{fontSize:18}}>{c.flag}</span>
                  <div style={{flex:1}}>
                    <div className="currency-name">{c.name}</div>
                    <div className="currency-code">{c.code}</div>
                  </div>
                  <div>
                    <div className="currency-rate">{c.rate}</div>
                    <div className="currency-change">{c.change}</div>
                  </div>
                </div>
              ))}
            </div>
          </div>
          <div className="info-card" style={{gridColumn:'span 2'}}>
            <div className="info-card-header">
              <div className="info-card-icon" style={{background:'rgba(232,101,10,0.1)',color:'var(--primary)'}}><i className="ph ph-airplane" style={{fontSize:20}}/></div>
              <div><div className="info-card-title">항공·호텔·액티비티 예약</div><div className="info-card-sub">파트너 예약 링크 연동</div></div>
            </div>
            <div className="booking-links" style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:12}}>
              {BOOKING_LINKS.map((b,i)=>(
                <div key={i} className="booking-link" onClick={()=>setToast(`${b.name} 파트너 사이트로 이동합니다`)}>
                  <div className="booking-link-icon" style={{background:b.bg,color:b.color}}><i className={`ph ${b.icon}`}/></div>
                  <div>
                    <div className="booking-link-name">{b.name}</div>
                    <div className="booking-link-desc">{b.desc}</div>
                  </div>
                  <div className="booking-arrow"><i className="ph ph-arrow-right" style={{color:'var(--text3)'}}/></div>
                </div>
              ))}
            </div>
          </div>
        </div>
      </div>
      {toast && <Toast msg={toast} onDone={()=>setToast('')}/>}
    </div>
  );
}

function SearchView(){
  const [q,setQ]=useState('커플 여행 추천');
  const [filter,setFilter]=useState('전체');
  const [modal,setModal]=useState(null);
  const FILTERS=['전체','해변','문화','도시','자연','음식'];
  const filtered=DESTINATIONS.filter(d=>filter==='전체'||d.tags.includes(filter));

  return (
    <div className="main-area">
      <div className="page-view">
        <div className="page-title"><i className="ph ph-magnifying-glass-plus"/>다국어 AI 추천 검색</div>
        <div className="page-subtitle">한국어·영어·인도네시아어로 의미 기반 여행지 검색</div>
        <div className="search-header">
          <div className="search-bar">
            <i className="ph ph-magnifying-glass search-icon"/>
            <input value={q} onChange={e=>setQ(e.target.value)} placeholder="여행지, 테마, 분위기를 자유롭게 입력하세요..."/>
            <button className="btn btn-primary" style={{padding:'7px 16px',borderRadius:10,fontSize:13}}><i className="ph ph-sparkle" style={{marginRight:5}}/>AI 검색</button>
          </div>
          <div className="search-filters">
            {FILTERS.map(f=><button key={f} className={`filter-tag${filter===f?' active':''}`} onClick={()=>setFilter(f)}>{f}</button>)}
          </div>
        </div>
        <div className="search-results-grid">
          {filtered.map((d,i)=>(
            <div key={d.id} className="dest-card card-enter" style={{animationDelay:`${i*0.07}s`}} onClick={()=>setModal(d)}>
              <div className="dest-thumb" style={{background:d.bg}}>
                <div className="dest-thumb-city">{d.city[0]}</div>
                <div className="dest-thumb-overlay"/>
                <div className="dest-thumb-label">{d.city}</div>
                <div className="dest-match">{d.match} 일치</div>
              </div>
              <div className="dest-body">
                <div className="dest-name">{d.city}, {d.country}</div>
                <div className="dest-tags">{d.tags.map(t=><span key={t} className="dest-tag">{t}</span>)}</div>
                <div className="dest-rating"><i className="ph ph-star-fill" style={{color:d.id===1?'#f59e0b':'var(--text3)',fontSize:13}}/>{d.rating} ({d.reviews})</div>
              </div>
            </div>
          ))}
        </div>
      </div>
      {modal && (
        <div className="modal-overlay" onClick={()=>setModal(null)}>
          <div className="modal" onClick={e=>e.stopPropagation()}>
            <div className="modal-header">
              <div className="modal-title">{modal.city}, {modal.country}</div>
              <button className="modal-close" onClick={()=>setModal(null)}><i className="ph ph-x"/></button>
            </div>
            <div className="modal-body">
              <div style={{height:120,borderRadius:12,background:modal.bg,marginBottom:16,display:'flex',alignItems:'center',justifyContent:'center',position:'relative',overflow:'hidden'}}>
                <span style={{fontSize:64,fontWeight:900,opacity:0.15,color:'#fff'}}>{modal.city[0]}</span>
                <span style={{position:'absolute',fontSize:22,fontWeight:800,color:'#fff'}}>{modal.city}</span>
              </div>
              <div className="detail-row"><span className="detail-label">국가</span><span className="detail-value">{modal.country}</span></div>
              <div className="detail-row"><span className="detail-label">AI 일치율</span><span className="detail-value" style={{color:'var(--primary)'}}>{modal.match}</span></div>
              <div className="detail-row"><span className="detail-label">평점</span><span className="detail-value">{modal.rating} ({modal.reviews}개 리뷰)</span></div>
              <div className="detail-row"><span className="detail-label">추천 태그</span><div className="tag-list">{modal.tags.map(t=><span key={t} className="tag">{t}</span>)}</div></div>
            </div>
            <div className="modal-footer">
              <button className="btn btn-outline" onClick={()=>setModal(null)}>닫기</button>
              <button className="btn btn-primary" onClick={()=>{setModal(null);}}><i className="ph ph-calendar-plus" style={{marginRight:5}}/>일정 만들기</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

function ProfileView(){
  const [modal,setModal]=useState(null);
  const [toast,setToast]=useState('');
  return (
    <div className="main-area">
      <div className="page-view">
        <div style={{display:'flex',alignItems:'center',gap:16,marginBottom:28}}>
          <div style={{width:64,height:64,borderRadius:20,background:'linear-gradient(135deg,var(--primary),var(--secondary))',display:'flex',alignItems:'center',justifyContent:'center',color:'#fff',fontSize:24,fontWeight:700}}>이</div>
          <div>
            <div style={{fontSize:20,fontWeight:800,color:'var(--text1)'}}>이지은</div>
            <div style={{fontSize:13,color:'var(--text2)',marginTop:2}}>e.jieun@email.com · 여행 {MY_TRIPS.length}건</div>
          </div>
        </div>
        <div className="page-title" style={{marginBottom:16}}><i className="ph ph-suitcase-rolling"/>내 여행 기록</div>
        <div className="trips-grid">
          {MY_TRIPS.map((t,i)=>(
            <div key={t.id} className="trip-card card-enter" style={{animationDelay:`${i*0.08}s`}} onClick={()=>setModal(t)}>
              <div className="trip-thumb" style={{background:t.bg}}>
                <div className="trip-thumb-label">{t.city[0]}</div>
                <div className="trip-thumb-overlay"/>
                <div className="trip-thumb-city">{t.city}</div>
              </div>
              <div className="trip-body">
                <div className="trip-name">{t.name}</div>
                <div className="trip-meta">
                  <span>{t.date}</span>
                  <span>{t.days}일</span>
                  <span className="trip-status" style={{background:`${t.statusColor}22`,color:t.statusColor}}>{t.status}</span>
                </div>
              </div>
            </div>
          ))}
        </div>
      </div>
      {toast && <Toast msg={toast} onDone={()=>setToast('')}/>}
      {modal && (
        <div className="modal-overlay" onClick={()=>setModal(null)}>
          <div className="modal" onClick={e=>e.stopPropagation()}>
            <div className="modal-header">
              <div className="modal-title">{modal.name}</div>
              <button className="modal-close" onClick={()=>setModal(null)}><i className="ph ph-x"/></button>
            </div>
            <div className="modal-body">
              <div className="detail-row"><span className="detail-label">여행지</span><span className="detail-value">{modal.city}</span></div>
              <div className="detail-row"><span className="detail-label">기간</span><span className="detail-value">{modal.date} ({modal.days}일)</span></div>
              <div className="detail-row"><span className="detail-label">상태</span><span className="detail-value" style={{color:modal.statusColor}}>{modal.status}</span></div>
              <div className="detail-row"><span className="detail-label">일정 공유</span><span className="detail-value" style={{color:'var(--accent)',cursor:'pointer'}} onClick={()=>setToast('공유 링크가 복사됩니다')}>링크 복사</span></div>
            </div>
            <div className="modal-footer">
              <button className="btn btn-outline" onClick={()=>setModal(null)}>닫기</button>
              <button className="btn btn-primary" onClick={()=>{setModal(null);setToast('PDF 일정표가 생성 중입니다...');}}><i className="ph ph-file-pdf" style={{marginRight:5}}/>PDF 내보내기</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

function App(){
  const [tab,setTab]=useState('AI 챗봇');
  const TABS=['AI 챗봇','일정 관리','여행 정보','여행지 검색','내 여행'];

  const VIEW={
    'AI 챗봇':<ChatView/>,
    '일정 관리':<ItineraryView/>,
    '여행 정보':<TravelInfoView/>,
    '여행지 검색':<SearchView/>,
    '내 여행':<ProfileView/>,
  };

  return (
    <div style={{width:'100%',minHeight:'100vh',display:'flex',flexDirection:'column',background:'var(--bg)'}}>
      <nav className="topnav">
        <div className="topnav-logo">
          <i className="ph ph-airplane"/>트래블AI
        </div>
        <div className="nav-tabs">
          {TABS.map(t=>(
            <button key={t} className={`nav-tab${tab===t?' active':''}`} onClick={()=>setTab(t)}>{t}</button>
          ))}
        </div>
        <div className="topnav-right">
          <button className="lang-btn">KO</button>
          <div className="avatar">이</div>
        </div>
      </nav>
      {VIEW[tab]}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
