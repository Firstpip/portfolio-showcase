<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<style>
*{box-sizing:border-box;margin:0;padding:0;}
html,body{width:100%;min-height:100vh;font-family:'Pretendard',sans-serif;background:#0F0E1A;color:#F0EEFF;}
#root{width:100%;min-height:100vh;}

:root{
  --primary:#7B5CF0;
  --primary-dim:rgba(123,92,240,0.18);
  --primary-hover:#9B7AF8;
  --secondary:#4F46B8;
  --accent:#F5A623;
  --bg:#0F0E1A;
  --bg2:#161428;
  --surface:#1A1830;
  --surface2:#22203A;
  --border:rgba(240,238,255,0.08);
  --border2:rgba(240,238,255,0.14);
  --text1:#F0EEFF;
  --text2:#9B96C8;
  --text3:#5C5880;
  --danger:#f43f5e;
  --success:#4ade80;
  --warn:#fbbf24;
  --radius:8px;
  --radius-sm:5px;
}

/* Global Nav (spa-modern) */
.global-nav{
  position:fixed;top:0;left:0;right:0;z-index:200;
  background:rgba(15,14,26,0.9);backdrop-filter:blur(14px);
  border-bottom:1px solid var(--border);
  height:54px;
  display:flex;align-items:center;
  padding:0 28px;
}
.nav-logo{
  display:flex;align-items:center;gap:8px;
  font-size:15px;font-weight:800;color:var(--primary);
  margin-right:36px;
}
.nav-links{display:flex;align-items:center;gap:2px;flex:1;}
.nav-link{
  padding:6px 14px;border-radius:var(--radius-sm);
  font-size:13px;font-weight:500;color:var(--text2);
  cursor:pointer;transition:all 0.18s;
  border:none;background:transparent;
  white-space:nowrap;
  display:flex;align-items:center;gap:6px;
}
.nav-link:hover{background:var(--surface);color:var(--text1);}
.nav-link.active{background:var(--primary-dim);color:var(--primary);font-weight:600;}
.nav-link i{font-size:15px;}
.nav-right{
  display:flex;align-items:center;gap:10px;margin-left:auto;
}
.status-badge{
  padding:4px 10px;border-radius:20px;font-size:11px;font-weight:700;
  background:rgba(74,222,128,0.12);color:var(--success);
  border:1px solid rgba(74,222,128,0.2);
  display:flex;align-items:center;gap:5px;
}
.status-dot-green{width:5px;height:5px;border-radius:50%;background:var(--success);}
.admin-avatar{
  width:30px;height:30px;border-radius:var(--radius-sm);
  background:var(--primary);display:flex;align-items:center;
  justify-content:center;font-size:12px;font-weight:700;cursor:pointer;
}

/* SPA layout */
.spa-wrap{
  padding-top:54px;width:100%;min-height:100vh;
}
.page-body{
  max-width:1160px;margin:0 auto;
  padding:32px 28px;
}
.page-head{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:6px;
}
.page-h1{font-size:20px;font-weight:800;color:var(--text1);display:flex;align-items:center;gap:10px;}
.page-h1 i{color:var(--primary);font-size:20px;}
.page-desc{font-size:13px;color:var(--text2);margin-bottom:24px;}

/* Cards / panels */
.panel{
  background:var(--surface);border-radius:var(--radius);
  border:1px solid var(--border2);
}
.panel-header{
  padding:14px 18px;border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
}
.panel-title{font-size:13px;font-weight:700;color:var(--text1);display:flex;align-items:center;gap:7px;}
.panel-title i{color:var(--primary);}
.panel-body{padding:18px;}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
.grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;}

/* Prompt editor view */
.editor-layout{display:grid;grid-template-columns:1.2fr 1fr;gap:16px;margin-top:20px;}
.editor-area{
  background:var(--bg2);border-radius:var(--radius);
  border:1px solid var(--border2);overflow:hidden;
}
.editor-toolbar{
  padding:10px 14px;border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:8px;background:var(--surface);
}
.editor-tab{
  padding:4px 10px;border-radius:var(--radius-sm);font-size:11px;font-weight:600;
  cursor:pointer;border:none;background:transparent;color:var(--text2);
  transition:all 0.15s;
}
.editor-tab.active{background:var(--primary-dim);color:var(--primary);}
.editor-content{
  padding:16px;font-family:'Courier New',monospace;font-size:12px;
  color:#c9c3ff;line-height:1.8;min-height:260px;
}
.line-num{color:var(--text3);margin-right:14px;user-select:none;min-width:20px;display:inline-block;}
.kw-system{color:#7dd3fc;}
.kw-string{color:#a5f3a0;}
.kw-comment{color:var(--text3);}
.kw-var{color:var(--accent);}
.version-list{display:flex;flex-direction:column;gap:8px;}
.version-item{
  padding:12px 14px;border-radius:var(--radius);
  border:1px solid var(--border);cursor:pointer;
  transition:all 0.18s;background:var(--bg2);
}
.version-item:hover{border-color:var(--primary);background:var(--primary-dim);}
.version-item.current{border-color:var(--primary);background:var(--primary-dim);}
.version-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px;}
.version-id{font-size:12px;font-weight:700;color:var(--text1);}
.version-badge{
  padding:2px 7px;border-radius:10px;font-size:10px;font-weight:700;
  background:rgba(74,222,128,0.15);color:var(--success);
}
.version-meta{font-size:11px;color:var(--text2);}
.deploy-btn{
  display:flex;align-items:center;gap:6px;
  padding:8px 16px;border-radius:var(--radius);
  font-size:12px;font-weight:700;cursor:pointer;border:none;
  transition:all 0.18s;font-family:inherit;
}
.deploy-btn.primary{background:var(--primary);color:#fff;}
.deploy-btn.primary:hover{background:var(--primary-hover);}
.deploy-btn.outline{background:transparent;border:1.5px solid var(--border2);color:var(--text2);}
.deploy-btn.outline:hover{border-color:var(--primary);color:var(--primary);}
.blocklist-row{
  display:flex;gap:8px;flex-wrap:wrap;margin-top:10px;
}
.block-tag{
  padding:4px 10px;border-radius:20px;font-size:11px;font-weight:600;
  background:rgba(244,63,94,0.12);color:var(--danger);
  border:1px solid rgba(244,63,94,0.2);
  display:flex;align-items:center;gap:4px;
  cursor:pointer;
}
.block-tag i{font-size:12px;}
.diff-row{display:flex;gap:0;font-size:11px;font-family:'Courier New',monospace;line-height:1.8;}
.diff-del{background:rgba(244,63,94,0.15);color:#fb7185;padding:1px 6px;flex:1;}
.diff-add{background:rgba(74,222,128,0.12);color:var(--success);padding:1px 6px;flex:1;}

/* Conversation logs view */
.logs-toolbar{
  display:flex;align-items:center;gap:10px;margin-bottom:18px;
  flex-wrap:wrap;
}
.search-box{
  display:flex;align-items:center;gap:8px;
  background:var(--surface);border:1px solid var(--border2);
  border-radius:var(--radius);padding:8px 14px;flex:1;min-width:200px;
}
.search-box input{
  border:none;outline:none;background:transparent;
  font-size:13px;color:var(--text1);font-family:inherit;flex:1;
}
.search-box input::placeholder{color:var(--text3);}
.filter-select{
  padding:8px 12px;border-radius:var(--radius);
  border:1px solid var(--border2);background:var(--surface);
  font-size:12px;color:var(--text2);font-family:inherit;cursor:pointer;
}
.log-table{width:100%;border-collapse:collapse;}
.log-table th{
  padding:10px 14px;font-size:11px;font-weight:700;
  color:var(--text2);text-align:left;
  border-bottom:1px solid var(--border2);
  background:var(--bg2);
}
.log-table td{
  padding:11px 14px;font-size:12px;color:var(--text1);
  border-bottom:1px solid var(--border);vertical-align:middle;
}
.log-table tr{cursor:pointer;transition:background 0.15s;}
.log-table tr:hover td{background:var(--primary-dim);}
.status-tag{
  padding:3px 8px;border-radius:10px;font-size:10px;font-weight:700;
}
.status-ok{background:rgba(74,222,128,0.14);color:var(--success);}
.status-err{background:rgba(244,63,94,0.14);color:var(--danger);}
.status-skip{background:rgba(251,191,36,0.14);color:var(--warn);}

/* Chart area */
.chart-box{height:200px;position:relative;}
.stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:18px;}
.stat-card{
  background:var(--surface);border-radius:var(--radius);
  border:1px solid var(--border);padding:14px 16px;
}
.stat-value{font-size:26px;font-weight:800;color:var(--text1);}
.stat-label{font-size:11px;color:var(--text2);margin-top:2px;}
.stat-delta{font-size:11px;margin-top:6px;display:flex;align-items:center;gap:3px;}
.stat-up{color:var(--success);}
.stat-down{color:var(--danger);}

/* Content/FAQ view */
.faq-layout{display:grid;grid-template-columns:2fr 1fr;gap:16px;}
.faq-list{display:flex;flex-direction:column;gap:8px;}
.faq-row{
  padding:12px 16px;border-radius:var(--radius);
  border:1px solid var(--border);cursor:pointer;
  transition:all 0.18s;background:var(--bg2);
  display:flex;align-items:center;gap:12px;
}
.faq-row:hover{border-color:var(--primary);background:var(--primary-dim);}
.faq-row.selected{border-color:var(--primary);background:var(--primary-dim);}
.faq-num{
  width:24px;height:24px;border-radius:var(--radius-sm);
  background:var(--surface2);color:var(--text2);
  display:flex;align-items:center;justify-content:center;
  font-size:10px;font-weight:700;flex-shrink:0;
}
.faq-q{font-size:13px;font-weight:600;color:var(--text1);flex:1;}
.faq-cat{font-size:10px;color:var(--text2);padding:2px 6px;border-radius:6px;background:var(--surface2);}
.faq-edit-area{background:var(--surface);border-radius:var(--radius);padding:16px;border:1px solid var(--border2);}
.faq-label{font-size:11px;font-weight:700;color:var(--text2);margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px;}
.faq-textarea{
  width:100%;padding:10px 12px;border-radius:var(--radius-sm);
  border:1px solid var(--border2);background:var(--bg2);
  color:var(--text1);font-size:13px;font-family:inherit;
  resize:vertical;min-height:80px;outline:none;
  transition:border-color 0.15s;
}
.faq-textarea:focus{border-color:var(--primary);}

/* Toast */
.toast{
  position:fixed;bottom:24px;right:24px;
  background:var(--surface2);color:var(--text1);
  padding:11px 18px;border-radius:var(--radius);
  font-size:12px;font-weight:600;
  box-shadow:0 4px 20px rgba(0,0,0,0.5);
  border:1px solid var(--border2);
  animation:toastSlide 0.28s ease-out;
  z-index:9999;display:flex;align-items:center;gap:7px;
}

/* Modal */
.modal-overlay{
  position:fixed;inset:0;z-index:1000;
  background:rgba(0,0,0,0.65);backdrop-filter:blur(6px);
  display:flex;align-items:center;justify-content:center;
  animation:fadeIn 0.2s;
}
.modal{
  background:var(--surface);border-radius:var(--radius);
  width:560px;max-width:92vw;max-height:82vh;
  overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,0.6);
  border:1px solid var(--border2);
  animation:modalPop 0.25s ease-out;
}
.modal-header{
  padding:16px 18px;border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
}
.modal-title{font-size:15px;font-weight:700;color:var(--text1);}
.modal-close{
  width:26px;height:26px;border-radius:var(--radius-sm);
  border:none;background:var(--surface2);cursor:pointer;
  color:var(--text2);font-size:15px;display:flex;align-items:center;justify-content:center;
}
.modal-body{padding:18px;overflow-y:auto;max-height:calc(82vh - 115px);}
.modal-footer{
  padding:13px 18px;border-top:1px solid var(--border);
  display:flex;justify-content:flex-end;gap:8px;
}
.detail-row{display:flex;gap:12px;align-items:flex-start;margin-bottom:12px;}
.detail-label{font-size:11px;color:var(--text2);width:78px;flex-shrink:0;padding-top:2px;}
.detail-value{font-size:13px;color:var(--text1);font-weight:600;flex:1;}
.detail-pre{
  font-family:'Courier New',monospace;font-size:11px;
  background:var(--bg2);padding:12px;border-radius:var(--radius-sm);
  color:#c9c3ff;line-height:1.7;border:1px solid var(--border);
  white-space:pre-wrap;max-height:180px;overflow-y:auto;
}

/* Drawer */
.drawer-overlay{
  position:fixed;inset:0;z-index:500;
  background:rgba(0,0,0,0.5);
  animation:fadeIn 0.2s;
}
.drawer{
  position:fixed;right:0;top:54px;bottom:0;
  width:400px;background:var(--surface);
  border-left:1px solid var(--border2);
  z-index:600;overflow-y:auto;
  animation:slideInRight 0.25s ease-out;
}
.drawer-header{
  padding:16px 18px;border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;background:var(--surface);z-index:1;
}
.drawer-title{font-size:14px;font-weight:700;color:var(--text1);}
.drawer-body{padding:16px 18px;}

/* Footer */
.site-footer{
  background:var(--surface);border-top:1px solid var(--border);
  padding:16px 28px;
  display:flex;align-items:center;justify-content:space-between;
  margin-top:40px;
}
.footer-left{font-size:12px;color:var(--text3);}
.footer-links{display:flex;gap:16px;}
.footer-link{font-size:12px;color:var(--text3);cursor:pointer;transition:color 0.15s;}
.footer-link:hover{color:var(--text2);}

@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes modalPop{from{opacity:0;transform:scale(0.94)translateY(10px)}to{opacity:1;transform:none}}
@keyframes toastSlide{from{opacity:0;transform:translateX(16px)}to{opacity:1;transform:none}}
@keyframes slideInRight{from{opacity:0;transform:translateX(24px)}to{opacity:1;transform:none}}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.5}}
@keyframes barGrow{from{transform:scaleY(0);transform-origin:bottom}to{transform:scaleY(1)}}

.fade-up{animation:fadeUp 0.3s ease-out both;}
</style>
</head>

// --- Components ---
function Toast({msg,onDone}){
  useEffect(()=>{const t=setTimeout(onDone,2400);return()=>clearTimeout(t);},[]);
  return <div className="toast"><i className="ti ti-circle-check" style={{color:'var(--success)',fontSize:15}}/>{msg}</div>;

// Prompt management view
function PromptView(){
  const [activeVer,setActiveVer]=useState(0);

              <div className="detail-row"><span className="detail-label">대화 턴</span><span className="detail-value">{drawer.turns}턴</span></div>
              <div style={{marginBottom:12}}>
                <div className="faq-label" style={{marginBottom:8}}>대화 내용</div>
                <div style={{display:'flex',flexDirection:'column',gap:8}}>
                  <div style={{padding:'8px 12px',borderRadius:6,background:'var(--bg2)',fontSize:12,color:'var(--text2)'}}>
                    <span style={{color:'var(--text3)',marginRight:6}}>사용자:</span>{drawer.q}
                  </div>
                  <div style={{padding:'8px 12px',borderRadius:6,background:'var(--primary-dim)',border:'1px solid rgba(123,92,240,0.2)',fontSize:12,color:'var(--text1)'}}>
                    <span style={{color:'var(--primary)',marginRight:6}}>AI:</span>안녕하세요! {drawer.q.slice(0,20)}...에 대한 정보를 안내드릴게요.
                  </div>
                </div>
              </div>
              <button className="deploy-btn outline" style={{width:'100%',justifyContent:'center'}} onClick={()=>{setDrawer(null);setToast('해당 세션이 오류로 신고됩니다');}}>
                <i className="ti ti-alert-triangle"/>오류 신고
              </button>
            </div>
          </div>
        </>
      )}
    </div>
  );
}

              border:period===p?'none':'1.5px solid var(--border2)',
              padding:'6px 14px',borderRadius:'var(--radius)',fontSize:12
            }} onClick={()=>setPeriod(p)}>{p}</button>
          ))}
          <button className="deploy-btn outline" onClick={()=>setToast('주간 리포트가 CSV로 내보내집니다')}><i className="ti ti-download"/>내보내기</button>
        </div>
      </div>
      <div className="stat-grid fade-up">
        {[
          {v:'10,842',l:'이번 주 총 대화',d:'+8.2%',up:true},
          {v:'3개국',l:'지원 언어',d:'4개 예정',up:true},
          {v:'4.7분',l:'평균 세션 시간',d:'+0.3분',up:true},
          {v:'87.4%',l:'재방문율',d:'+2.1%',up:true},
        ].map((s,i)=>(
          <div key={i} className="stat-card fade-up" style={{animationDelay:`${i*0.05}s`}}>
            <div className="stat-value">{s.v}</div>
            <div className="stat-label">{s.l}</div>
            <div className={`stat-delta ${s.up?'stat-up':'stat-down'}`}>{s.up?<i className="ti ti-trending-up"/>:<i className="ti ti-trending-down"/>}{s.d}</div>
          </div>
        ))}
      </div>
      <div className="grid-2" style={{marginBottom:18}}>
        <div className="panel fade-up" style={{animationDelay:'0.1s'}}>
          <div className="panel-header"><div className="panel-title"><i className="ti ti-chart-bar"/>주간 대화량 추이</div></div>
          <div className="panel-body">
            <div className="chart-box" style={{height:190}}>
              <ResponsiveContainer width="100%" height="100%">
                <BarChart data={WEEK_STATS} margin={{top:4,right:4,left:-20,bottom:0}}>
                  <CartesianGrid strokeDasharray="3 3" stroke="rgba(240,238,255,0.06)"/>
                  <XAxis dataKey="day" tick={{fill:'#9B96C8',fontSize:11}}/>
                  <YAxis tick={{fill:'#9B96C8',fontSize:11}}/>
                  <Tooltip contentStyle={{background:'#1A1830',border:'1px solid rgba(240,238,255,0.14)',borderRadius:6,color:'#F0EEFF',fontSize:12}}/>
                  <Bar dataKey="conv" fill="#7B5CF0" radius={[4,4,0,0]} name="대화 수"/>
                </BarChart>
              </ResponsiveContainer>
            </div>
          </div>
        </div>
        <div className="panel fade-up" style={{animationDelay:'0.15s'}}>
          <div className="panel-header"><div className="panel-title"><i className="ti ti-map-pin"/>인기 여행지 Top 5</div></div>
          <div className="panel-body">
            <div style={{display:'flex',flexDirection:'column',gap:10}}>
              {TOP_DEST.map((d,i)=>(
                <div key={i} style={{display:'flex',alignItems:'center',gap:10}} onClick={()=>setToast(`${d.city} 관련 대화 로그로 이동합니다`)} className="faq-row" style={{cursor:'pointer',padding:'8px 12px'}}>
                  <div style={{width:18,height:18,borderRadius:5,background:i===0?'var(--accent)':'var(--surface2)',color:i===0?'#fff':'var(--text2)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:10,fontWeight:700,flexShrink:0}}>{i+1}</div>
                  <div style={{flex:1,fontSize:13,fontWeight:600,color:'var(--text1)'}}>{d.city}</div>
                  <div style={{width:90,height:6,borderRadius:3,background:'var(--surface2)',overflow:'hidden'}}>
                    <div style={{height:'100%',borderRadius:3,background:'var(--primary)',width:`${d.pct*5}%`}}/>
                  </div>
                  <div style={{fontSize:11,color:'var(--text2)',width:40,textAlign:'right'}}>{d.cnt}건</div>
                </div>
              ))}
            </div>
          </div>
        </div>
      </div>
      <div className="panel fade-up" style={{animationDelay:'0.2s'}}>
        <div className="panel-header">
          <div className="panel-title"><i className="ti ti-chart-line"/>언어별 일간 대화량 추이</div>
        </div>
        <div className="panel-body">
          <div style={{height:180,position:'relative'}}>
            <ResponsiveContainer width="100%" height="100%">
              <LineChart data={CONV_DATA} margin={{top:4,right:4,left:-20,bottom:0}}>
                <CartesianGrid strokeDasharray="3 3" stroke="rgba(240,238,255,0.06)"/>
                <XAxis dataKey="time" tick={{fill:'#9B96C8',fontSize:10}}/>
                <YAxis tick={{fill:'#9B96C8',fontSize:10}}/>
                <Tooltip contentStyle={{background:'#1A1830',border:'1px solid rgba(240,238,255,0.14)',borderRadius:6,color:'#F0EEFF',fontSize:12}}/>
                <Line type="monotone" dataKey="total" stroke="#7B5CF0" strokeWidth={2} dot={false} name="한국어"/>
                <Line type="monotone" dataKey="err" stroke="#F5A623" strokeWidth={2} dot={false} name="영어"/>
              </LineChart>
            </ResponsiveContainer>
          </div>
        </div>
      </div>
      {toast && <Toast msg={toast} onDone={()=>setToast('')}/>}
    </div>
  );
}

function App(){
  const [page,setPage]=useState('프롬프트 설정');
  const NAV=[
    {label:'프롬프트 설정',icon:'ti-terminal-2'},
    {label:'대화 로그',icon:'ti-message-dots'},
    {label:'콘텐츠 관리',icon:'ti-files'},
    {label:'운영 통계',icon:'ti-chart-arcs'},
  ];
  const VIEWS={
    '프롬프트 설정':<PromptView/>,
    '대화 로그':<LogsView/>,
    '콘텐츠 관리':<ContentView/>,
    '운영 통계':<StatsView/>,
  };

  return (
    <div style={{width:'100%',minHeight:'100vh',display:'flex',flexDirection:'column',background:'var(--bg)'}}>
      <nav className="global-nav">
        <div className="nav-logo"><i className="ti ti-adjustments-cog" style={{fontSize:18}}/>어드민 콘솔</div>
        <div className="nav-links">
          {NAV.map(n=>(
            <button key={n.label} className={`nav-link${page===n.label?' active':''}`} onClick={()=>setPage(n.label)}>
              <i className={`ti ${n.icon}`}/>{n.label}
            </button>
          ))}
        </div>
        <div className="nav-right">
          <div className="status-badge"><div className="status-dot-green"/>시스템 정상</div>
          <div className="admin-avatar">관</div>
        </div>
      </nav>
      <main style={{flex:1,width:'100%'}}>
        {VIEWS[page]}
      </main>
      <footer className="site-footer">
        <div className="footer-left">여행 플랫폼 관리 콘솔 v2.4.1 · PostgreSQL + Redis + Bull Queue</div>
        <div className="footer-links">
          {['API 문서','배포 이력','시스템 상태','설정'].map(l=>(
            <span key={l} className="footer-link">{l}</span>
          ))}
        </div>
      </footer>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
