<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI 여행 컨시어지 플랫폼 — 맞춤 구현 데모</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://unpkg.com/prop-types@15/prop-types.min.js"></script>
<script src="https://unpkg.com/react-is@18/umd/react-is.production.min.js"></script>
<script src="https://unpkg.com/recharts@2/umd/Recharts.js"></script>
<link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/regular/style.css">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 100%; min-height: 100vh; font-family: 'Pretendard', -apple-system, sans-serif; background: #F0F9FF; color: #0F172A; }
  #root { width: 100%; min-height: 100vh; }

  @keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }
  @keyframes slideUp {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }
  @keyframes shimmer {
    0% { background-position: -200% 0; }
    100% { background-position: 200% 0; }
  }
  @keyframes typing {
    0%, 60%, 100% { transform: translateY(0); }
    30% { transform: translateY(-4px); }
  }
  @keyframes progressFill {
    from { width: 0%; }
    to { width: 100%; }
  }
  @keyframes countUp {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .app-wrap { width: 100%; min-height: 100vh; display: flex; flex-direction: column; }

  /* Topnav */
  .topnav {
    width: 100%; height: 64px; background: #fff;
    border-bottom: 1px solid #E0F2FE;
    display: flex; align-items: center;
    padding: 0 32px; gap: 0;
    position: sticky; top: 0; z-index: 100;
    box-shadow: 0 1px 8px rgba(14,165,233,0.08);
  }
  .topnav-brand { display: flex; align-items: center; gap: 10px; margin-right: 40px; text-decoration: none; }
  .topnav-logo {
    width: 36px; height: 36px; border-radius: 10px;
    background: linear-gradient(135deg, #0EA5E9, #06B6D4);
    display: flex; align-items: center; justify-content: center;
    color: #fff; font-size: 18px;
  }
  .topnav-title { font-size: 17px; font-weight: 700; color: #0F172A; }
  .topnav-title span { color: #0EA5E9; }
  .topnav-tabs { display: flex; align-items: center; gap: 4px; flex: 1; }
  .tab-btn {
    padding: 8px 18px; border-radius: 8px; border: none; background: transparent;
    font-size: 14px; font-weight: 500; color: #64748B; cursor: pointer;
    display: flex; align-items: center; gap: 7px;
    transition: all 0.18s; white-space: nowrap;
  }
  .tab-btn:hover { background: #F0F9FF; color: #0EA5E9; }
  .tab-btn.active { background: #EFF6FF; color: #0EA5E9; font-weight: 600; }
  .topnav-right { display: flex; align-items: center; gap: 12px; }
  .lang-badge {
    padding: 5px 12px; border-radius: 20px; background: #F0F9FF;
    border: 1px solid #BAE6FD; font-size: 12px; color: #0EA5E9; font-weight: 600;
  }
  .avatar {
    width: 36px; height: 36px; border-radius: 50%;
    background: linear-gradient(135deg, #0EA5E9, #06B6D4);
    display: flex; align-items: center; justify-content: center;
    color: #fff; font-size: 13px; font-weight: 700; cursor: pointer;
  }

  /* Main content area */
  .main-content { flex: 1; width: 100%; animation: fadeIn 0.3s ease; }

  /* Hero section */
  .hero {
    width: 100%; background: linear-gradient(135deg, #0EA5E9 0%, #06B6D4 50%, #0EA5E9 100%);
    padding: 48px 32px; color: #fff; position: relative; overflow: hidden;
  }
  .hero::before {
    content: ''; position: absolute; inset: 0;
    background: radial-gradient(circle at 30% 50%, rgba(255,255,255,0.15) 0%, transparent 60%);
  }
  .hero-inner { max-width: 1200px; margin: 0 auto; position: relative; z-index: 1; }
  .hero-badge {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 6px 14px; border-radius: 20px; background: rgba(255,255,255,0.2);
    font-size: 12px; font-weight: 600; margin-bottom: 16px; animation: slideUp 0.4s ease;
  }
  .hero h1 { font-size: 32px; font-weight: 800; margin-bottom: 12px; line-height: 1.3; animation: slideUp 0.5s ease; }
  .hero p { font-size: 16px; opacity: 0.9; max-width: 520px; line-height: 1.7; animation: slideUp 0.6s ease; }
  .hero-chips { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 20px; animation: slideUp 0.7s ease; }
  .hero-chip {
    padding: 6px 14px; border-radius: 20px; background: rgba(255,255,255,0.18);
    border: 1px solid rgba(255,255,255,0.3); font-size: 12px; font-weight: 500;
  }

  /* Content sections */
  .section { max-width: 1200px; margin: 0 auto; padding: 32px; }

  /* Chat UI */
  .chat-layout { display: grid; grid-template-columns: 300px 1fr; gap: 24px; align-items: start; }
  .chat-sidebar { background: #fff; border-radius: 16px; border: 1px solid #E0F2FE; overflow: hidden; }
  .chat-sidebar-header { padding: 18px 20px; border-bottom: 1px solid #F0F9FF; font-size: 13px; font-weight: 700; color: #64748B; display: flex; align-items: center; gap: 8px; }
  .chat-history-item {
    padding: 14px 20px; border-bottom: 1px solid #F8FAFC; cursor: pointer;
    transition: background 0.15s;
  }
  .chat-history-item:hover { background: #F0F9FF; }
  .chat-history-item.active { background: #EFF6FF; border-left: 3px solid #0EA5E9; }
  .chat-history-title { font-size: 13px; font-weight: 600; color: #1E293B; margin-bottom: 3px; }
  .chat-history-sub { font-size: 11px; color: #94A3B8; }
  .chat-new-btn {
    width: calc(100% - 32px); margin: 16px; padding: 10px; border-radius: 10px;
    background: linear-gradient(135deg, #0EA5E9, #06B6D4); border: none; color: #fff;
    font-size: 13px; font-weight: 600; cursor: pointer; display: flex; align-items: center;
    justify-content: center; gap: 7px; transition: opacity 0.2s;
  }
  .chat-new-btn:hover { opacity: 0.88; }

  .chat-main { background: #fff; border-radius: 16px; border: 1px solid #E0F2FE; display: flex; flex-direction: column; height: 600px; }
  .chat-topbar { padding: 16px 20px; border-bottom: 1px solid #F0F9FF; display: flex; align-items: center; gap: 12px; }
  .ai-avatar {
    width: 38px; height: 38px; border-radius: 12px;
    background: linear-gradient(135deg, #0EA5E9, #06B6D4);
    display: flex; align-items: center; justify-content: center; color: #fff; font-size: 18px;
  }
  .ai-info h3 { font-size: 14px; font-weight: 700; color: #0F172A; }
  .ai-info p { font-size: 11px; color: #10B981; font-weight: 500; }
  .online-dot { width: 8px; height: 8px; border-radius: 50%; background: #10B981; display: inline-block; margin-right: 4px; animation: pulse 2s infinite; }

  .chat-messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 16px; }
  .msg { display: flex; gap: 10px; animation: slideUp 0.3s ease; }
  .msg.user { flex-direction: row-reverse; }
  .msg-avatar { width: 32px; height: 32px; border-radius: 10px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 14px; }
  .msg-avatar.ai { background: linear-gradient(135deg, #0EA5E9, #06B6D4); color: #fff; }
  .msg-avatar.user { background: #F1F5F9; color: #64748B; }
  .msg-bubble { max-width: 72%; padding: 12px 16px; border-radius: 14px; font-size: 13.5px; line-height: 1.6; }
  .msg-bubble.ai { background: #F0F9FF; color: #1E293B; border: 1px solid #E0F2FE; border-radius: 14px 14px 14px 2px; }
  .msg-bubble.user { background: linear-gradient(135deg, #0EA5E9, #06B6D4); color: #fff; border-radius: 14px 14px 2px 14px; }
  .typing-indicator { display: flex; gap: 5px; align-items: center; padding: 12px 16px; }
  .typing-dot { width: 7px; height: 7px; border-radius: 50%; background: #0EA5E9; animation: typing 1.2s infinite; }
  .typing-dot:nth-child(2) { animation-delay: 0.2s; }
  .typing-dot:nth-child(3) { animation-delay: 0.4s; }

  .quick-suggestions { padding: 12px 20px; border-top: 1px solid #F0F9FF; display: flex; gap: 8px; flex-wrap: wrap; }
  .suggestion-chip {
    padding: 6px 12px; border-radius: 20px; background: #F0F9FF;
    border: 1px solid #BAE6FD; font-size: 12px; color: #0369A1; cursor: pointer;
    transition: all 0.15s; white-space: nowrap;
  }
  .suggestion-chip:hover { background: #0EA5E9; color: #fff; border-color: #0EA5E9; }

  .chat-input-area { padding: 16px 20px; border-top: 1px solid #F0F9FF; display: flex; gap: 10px; align-items: flex-end; }
  .chat-input {
    flex: 1; padding: 12px 16px; border-radius: 12px; border: 1.5px solid #BAE6FD;
    font-size: 14px; font-family: inherit; resize: none; outline: none;
    transition: border-color 0.2s; min-height: 44px; max-height: 120px;
    background: #FAFEFF; color: #0F172A;
  }
  .chat-input:focus { border-color: #0EA5E9; }
  .chat-send-btn {
    width: 44px; height: 44px; border-radius: 12px;
    background: linear-gradient(135deg, #0EA5E9, #06B6D4); border: none; color: #fff;
    font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center;
    transition: opacity 0.2s; flex-shrink: 0;
  }
  .chat-send-btn:hover { opacity: 0.85; }

  /* Feature card */
  .feature-info { background: linear-gradient(135deg, #F0F9FF, #E0F2FE); border-radius: 16px; padding: 20px; margin-top: 20px; border: 1px solid #BAE6FD; animation: slideUp 0.4s ease; }
  .feature-info h3 { font-size: 15px; font-weight: 700; color: #0369A1; margin-bottom: 10px; display: flex; align-items: center; gap: 8px; }
  .feature-tags { display: flex; gap: 8px; flex-wrap: wrap; }
  .feature-tag { padding: 4px 12px; border-radius: 20px; background: #fff; border: 1px solid #BAE6FD; font-size: 11px; color: #0369A1; font-weight: 500; }

  /* Recommend */
  .filter-row { display: flex; gap: 16px; flex-wrap: wrap; margin-bottom: 28px; }
  .purpose-filters { display: flex; gap: 10px; flex-wrap: wrap; }
  .purpose-btn {
    padding: 10px 20px; border-radius: 10px; border: 1.5px solid #E0F2FE;
    background: #fff; font-size: 13px; font-weight: 500; color: #475569; cursor: pointer;
    transition: all 0.18s; display: flex; align-items: center; gap: 8px;
  }
  .purpose-btn:hover, .purpose-btn.active { background: #0EA5E9; border-color: #0EA5E9; color: #fff; }
  .budget-slider-wrap { background: #fff; border-radius: 12px; padding: 18px; border: 1px solid #E0F2FE; }
  .budget-slider-wrap label { font-size: 13px; font-weight: 600; color: #64748B; display: block; margin-bottom: 10px; }
  .range-input { width: 100%; accent-color: #0EA5E9; }
  .budget-display { font-size: 15px; font-weight: 700; color: #0EA5E9; margin-top: 6px; }

  .cards-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 20px; }
  .dest-card {
    background: #fff; border-radius: 16px; overflow: hidden; cursor: pointer;
    border: 1px solid #E0F2FE; transition: all 0.22s;
    animation: slideUp 0.4s ease both;
  }
  .dest-card:hover { transform: translateY(-4px); box-shadow: 0 12px 32px rgba(14,165,233,0.18); border-color: #BAE6FD; }
  .dest-card-img { height: 150px; display: flex; align-items: center; justify-content: center; font-size: 48px; }
  .dest-card-body { padding: 16px; }
  .dest-card-country { font-size: 12px; color: #0EA5E9; font-weight: 600; margin-bottom: 4px; }
  .dest-card-title { font-size: 15px; font-weight: 700; color: #0F172A; margin-bottom: 6px; }
  .dest-card-desc { font-size: 12px; color: #64748B; line-height: 1.5; margin-bottom: 10px; }
  .dest-card-footer { display: flex; align-items: center; justify-content: space-between; }
  .dest-card-price { font-size: 14px; font-weight: 700; color: #0EA5E9; }
  .dest-card-days { font-size: 11px; color: #94A3B8; }
  .ai-reason { font-size: 11px; color: #0369A1; background: #F0F9FF; padding: 6px 10px; border-radius: 8px; margin-top: 8px; display: flex; gap: 5px; align-items: flex-start; }

  /* Drawer */
  .drawer-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.3); z-index: 200; display: flex; justify-content: flex-end; animation: fadeIn 0.2s ease; }
  .drawer { width: 420px; height: 100%; background: #fff; padding: 28px; overflow-y: auto; animation: slideFromRight 0.3s ease; border-left: 1px solid #E0F2FE; }
  @keyframes slideFromRight { from { transform: translateX(100%); } to { transform: translateX(0); } }
  .drawer-close { position: absolute; top: 20px; right: 20px; cursor: pointer; color: #94A3B8; font-size: 22px; border: none; background: none; }
  .drawer-header { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; padding-bottom: 16px; border-bottom: 1px solid #F0F9FF; }
  .drawer-flag { font-size: 40px; }
  .drawer-title h2 { font-size: 20px; font-weight: 800; color: #0F172A; }
  .drawer-title p { font-size: 13px; color: #64748B; }
  .detail-section { margin-bottom: 20px; }
  .detail-section h4 { font-size: 13px; font-weight: 700; color: #64748B; margin-bottom: 10px; display: flex; align-items: center; gap: 6px; }
  .detail-row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #F8FAFC; font-size: 13px; }
  .detail-label { color: #64748B; }
  .detail-value { font-weight: 600; color: #0F172A; }
  .booking-btn {
    width: 100%; padding: 14px; border-radius: 12px;
    background: linear-gradient(135deg, #0EA5E9, #06B6D4); border: none; color: #fff;
    font-size: 15px; font-weight: 700; cursor: pointer; transition: opacity 0.2s;
    display: flex; align-items: center; justify-content: center; gap: 8px;
  }
  .booking-btn:hover { opacity: 0.88; }

  /* Itinerary */
  .itinerary-layout { display: grid; grid-template-columns: 280px 1fr; gap: 24px; }
  .itin-list { background: #fff; border-radius: 16px; border: 1px solid #E0F2FE; }
  .itin-list-header { padding: 18px 20px; border-bottom: 1px solid #F0F9FF; display: flex; align-items: center; justify-content: space-between; }
  .itin-list-header h3 { font-size: 14px; font-weight: 700; }
  .new-itin-btn {
    padding: 7px 14px; border-radius: 8px; background: #0EA5E9; border: none;
    color: #fff; font-size: 12px; font-weight: 600; cursor: pointer;
    display: flex; align-items: center; gap: 5px; transition: opacity 0.2s;
  }
  .new-itin-btn:hover { opacity: 0.88; }
  .itin-item { padding: 14px 20px; border-bottom: 1px solid #F8FAFC; cursor: pointer; transition: background 0.15s; }
  .itin-item:hover { background: #F0F9FF; }
  .itin-item.active { background: #EFF6FF; border-left: 3px solid #0EA5E9; }
  .itin-item-name { font-size: 13px; font-weight: 700; color: #1E293B; margin-bottom: 3px; }
  .itin-item-meta { font-size: 11px; color: #94A3B8; display: flex; gap: 8px; }

  .itin-detail { background: #fff; border-radius: 16px; border: 1px solid #E0F2FE; }
  .itin-detail-header { padding: 20px 24px; border-bottom: 1px solid #F0F9FF; display: flex; align-items: center; justify-content: space-between; }
  .itin-detail-title h2 { font-size: 18px; font-weight: 800; color: #0F172A; }
  .itin-detail-title p { font-size: 12px; color: #64748B; margin-top: 2px; }
  .itin-actions { display: flex; gap: 8px; }
  .itin-btn {
    padding: 8px 16px; border-radius: 8px; border: 1.5px solid #E0F2FE;
    background: #fff; font-size: 12px; font-weight: 600; color: #475569; cursor: pointer;
    display: flex; align-items: center; gap: 6px; transition: all 0.18s;
  }
  .itin-btn.primary { background: linear-gradient(135deg, #0EA5E9, #06B6D4); color: #fff; border-color: transparent; }
  .itin-btn:hover { border-color: #0EA5E9; color: #0EA5E9; }
  .itin-btn.primary:hover { opacity: 0.88; color: #fff; }

  .timeline { padding: 24px; }
  .day-block { margin-bottom: 28px; }
  .day-label { font-size: 13px; font-weight: 700; color: #0EA5E9; margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
  .day-date { font-size: 11px; color: #94A3B8; font-weight: 400; }
  .timeline-item { display: flex; gap: 16px; margin-bottom: 12px; }
  .timeline-line { display: flex; flex-direction: column; align-items: center; }
  .tl-dot { width: 10px; height: 10px; border-radius: 50%; background: #0EA5E9; flex-shrink: 0; margin-top: 5px; }
  .tl-connector { width: 2px; flex: 1; background: #E0F2FE; margin: 4px 0; min-height: 20px; }
  .tl-card { flex: 1; background: #FAFEFF; border-radius: 12px; padding: 12px 16px; border: 1px solid #E0F2FE; margin-bottom: 0; }
  .tl-time { font-size: 11px; color: #0EA5E9; font-weight: 600; margin-bottom: 3px; }
  .tl-place { font-size: 13px; font-weight: 700; color: #0F172A; margin-bottom: 3px; }
  .tl-note { font-size: 11px; color: #64748B; }
  .tl-badge { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 10px; font-weight: 600; margin-left: 6px; }
  .tl-badge.food { background: #FEF3C7; color: #D97706; }
  .tl-badge.sight { background: #DBEAFE; color: #1D4ED8; }
  .tl-badge.move { background: #F3F4F6; color: #6B7280; }

  /* Destination */
  .dest-search-wrap { background: #fff; border-radius: 16px; border: 1px solid #E0F2FE; padding: 24px; margin-bottom: 24px; }
  .dest-search-row { display: flex; gap: 12px; align-items: center; }
  .dest-search-input {
    flex: 1; padding: 12px 16px; border-radius: 10px; border: 1.5px solid #BAE6FD;
    font-size: 14px; outline: none; font-family: inherit; transition: border-color 0.2s;
  }
  .dest-search-input:focus { border-color: #0EA5E9; }
  .dest-search-btn {
    padding: 12px 24px; border-radius: 10px; background: linear-gradient(135deg, #0EA5E9, #06B6D4);
    border: none; color: #fff; font-size: 14px; font-weight: 600; cursor: pointer;
    transition: opacity 0.2s;
  }
  .dest-search-btn:hover { opacity: 0.88; }
  .popular-chips { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 14px; }
  .popular-chip { padding: 6px 14px; border-radius: 20px; background: #F0F9FF; border: 1px solid #BAE6FD; font-size: 12px; color: #0369A1; cursor: pointer; transition: all 0.15s; }
  .popular-chip:hover { background: #0EA5E9; color: #fff; }

  .dest-content { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }
  .dest-info-card { background: #fff; border-radius: 16px; border: 1px solid #E0F2FE; overflow: hidden; }
  .dest-info-header { padding: 18px 20px; background: linear-gradient(135deg, #0EA5E9, #06B6D4); color: #fff; display: flex; align-items: center; gap: 14px; }
  .dest-flag { font-size: 40px; }
  .dest-country-name { font-size: 20px; font-weight: 800; }
  .dest-tabs { display: flex; border-bottom: 1px solid #F0F9FF; }
  .dest-tab { flex: 1; padding: 12px; text-align: center; font-size: 12px; font-weight: 600; color: #94A3B8; cursor: pointer; transition: all 0.15s; border-bottom: 2px solid transparent; }
  .dest-tab.active { color: #0EA5E9; border-bottom-color: #0EA5E9; }
  .dest-tab-content { padding: 16px; }
  .info-row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #F8FAFC; font-size: 12.5px; }
  .info-label { color: #64748B; }
  .info-value { font-weight: 600; color: #0F172A; }
  .badge-ok { padding: 2px 8px; border-radius: 6px; background: #DCFCE7; color: #15803D; font-size: 11px; font-weight: 600; }
  .badge-warn { padding: 2px 8px; border-radius: 6px; background: #FEF3C7; color: #B45309; font-size: 11px; font-weight: 600; }
  .badge-caution { padding: 2px 8px; border-radius: 6px; background: #FEE2E2; color: #B91C1C; font-size: 11px; font-weight: 600; }

  .weather-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
  .weather-card { background: #F0F9FF; border-radius: 10px; padding: 12px; text-align: center; }
  .weather-icon { font-size: 24px; margin-bottom: 4px; }
  .weather-day { font-size: 11px; color: #64748B; margin-bottom: 2px; }
  .weather-temp { font-size: 16px; font-weight: 800; color: #0369A1; }
  .weather-label { font-size: 10px; color: #94A3B8; }

  .map-placeholder { background: linear-gradient(135deg, #E0F2FE, #BAE6FD); border-radius: 16px; height: 320px; display: flex; flex-direction: column; align-items: center; justify-content: center; border: 1px solid #BAE6FD; gap: 12px; }
  .map-icon { font-size: 40px; color: #0EA5E9; }
  .map-label { font-size: 14px; font-weight: 600; color: #0369A1; }
  .map-sub { font-size: 12px; color: #64748B; }

  /* Toast */

            </button>
          </div>
          {ITINERARIES.map(it=>(
            <div key={it.id} className={`itin-item ${selected.id===it.id?'active':''}`} onClick={()=>setSelected(it)}>
              <div className="itin-item-name">{it.name}</div>
              <div className="itin-item-meta"><span>{it.country}</span><span>{it.dates}</span></div>
            </div>
          ))}
        </div>
        <div className="itin-detail">
          <div className="itin-detail-header">
            <div className="itin-detail-title">
              <h2>{selected.name}</h2>
              <p>{selected.dates}</p>
            </div>
            <div className="itin-actions">
              <button className="itin-btn" onClick={()=>setToast('공유 링크가 복사되었습니다')}>
                <i className="ph ph-share-network"></i> 공유
              </button>
              <button className="itin-btn" onClick={()=>setToast('PDF 일정표를 생성하고 있습니다...')}>
                <i className="ph ph-file-pdf"></i> PDF
              </button>
              <button className="itin-btn primary" onClick={()=>setToast('일정을 수정합니다')}>
                <i className="ph ph-pencil"></i> 편집
              </button>
            </div>
          </div>
          <div className="timeline">
            {selected.days.map((day,di)=>(
              <div key={di} className="day-block">
                <div className="day-label">
                  <i className="ph ph-calendar-check"></i> {day.day}
                  <span className="day-date">({day.date})</span>
                </div>
                {day.items.map((item,ii)=>(
                  <div key={ii} className="timeline-item">
                    <div className="timeline-line">
                      <div className="tl-dot"></div>
                      {ii < day.items.length-1 && <div className="tl-connector"></div>}
                    </div>
                    <div className="tl-card">
                      <div className="tl-time">{item.time}</div>
                      <div className="tl-place">
                        {item.place}
                        <span className={`tl-badge ${item.type}`}>{item.type==='food'?'식사':item.type==='move'?'이동':'관광'}</span>
                      </div>
                      <div className="tl-note">{item.note}</div>
                    </div>
                  </div>
                ))}
              </div>
            ))}
          </div>
        </div>
      </div>
      {showModal && (
        <div className="modal-overlay" onClick={e=>{if(e.target===e.currentTarget)setShowModal(false)}}>
          <div className="modal">
            <div className="modal-header">
              <h3>새 일정 만들기</h3>
              <button className="modal-close" onClick={()=>setShowModal(false)}><i className="ph ph-x"></i></button>
            </div>
            <div className="form-field"><label className="form-label">여행지</label><input className="form-input" placeholder="예: 오사카" /></div>
            <div className="form-field"><label className="form-label">출발일</label><input type="date" className="form-input" /></div>
            <div className="form-field"><label className="form-label">기간 (박)</label><input type="number" className="form-input" placeholder="3" min={1} /></div>
            <button className="form-submit" onClick={()=>{setShowModal(false);setToast('AI가 일정을 생성하고 있습니다...');}}>AI로 일정 생성</button>
          </div>
        </div>
      )}
      {toast && <Toast msg={toast} onClose={()=>setToast(null)} />}
    </div>
  );
}

function DestinationScreen() {
  const [query, setQuery] = useState('');
  const [selected, setSelected] = useState(COUNTRIES[0]);
  const [activeTab, setActiveTab] = useState('visa');

  const handleSearch = (q) => {
    const found = COUNTRIES.find(c => c.name.includes(q || query));
    if (found) setSelected(found);
  };

  return (
    <div className="section" style={{paddingTop:28}}>
      <div style={{marginBottom:20}}>
        <h2 style={{fontSize:20,fontWeight:800,marginBottom:6}}>여행지 정보</h2>
        <p style={{fontSize:13,color:'#64748B'}}>목적지 국가의 비자·치안·날씨·긴급연락처를 한눈에 확인하세요</p>
      </div>
      <div className="dest-search-wrap">
        <div className="dest-search-row">
          <input className="dest-search-input" placeholder="국가명을 입력하세요 (예: 일본, 태국)" value={query} onChange={e=>setQuery(e.target.value)} onKeyDown={e=>e.key==='Enter'&&handleSearch()} />
          <button className="dest-search-btn" onClick={()=>handleSearch()}><i className="ph ph-magnifying-glass"></i> 검색</button>
        </div>
        <div className="popular-chips">
          {COUNTRIES.map(c=>(
            <button key={c.name} className="popular-chip" onClick={()=>{setSelected(c);setQuery(c.name);}}>
              {c.flag} {c.name}
            </button>
          ))}
        </div>
      </div>
      {selected && (
        <div className="dest-content">
          <div className="dest-info-card">
            <div className="dest-info-header">
              <span className="dest-flag">{selected.flag}</span>
              <div><div className="dest-country-name">{selected.name}</div><div style={{fontSize:13,opacity:0.85}}>여행 정보 요약</div></div>
            </div>
            <div className="dest-tabs">
              {[['visa','비자 정보'],['security','치안·안전'],['weather','날씨'],['emergency','긴급 연락']].map(([k,l])=>(
                <div key={k} className={`dest-tab ${activeTab===k?'active':''}`} onClick={()=>setActiveTab(k)}>{l}</div>
              ))}
            </div>
            <div className="dest-tab-content">
              {activeTab==='visa' && (
                <div>
                  {[['비자 종류',selected.visa],['유효기간','입국일 기준 적용'],['신청 방법','주한 대사관 또는 온라인 신청']].map(([l,v])=>(
                    <div key={l} className="info-row"><span className="info-label">{l}</span><span className="info-value">{v}</span></div>
                  ))}
                  <div style={{background:'#F0F9FF',borderRadius:10,padding:12,marginTop:12,fontSize:12,color:'#0369A1',lineHeight:1.6}}>
                    RAG 기반 검색으로 최신 비자 정책을 실시간 조회합니다. 출국 전 반드시 공식 대사관 홈페이지에서 확인하세요.
                  </div>
                </div>
              )}
              {activeTab==='security' && (
                <div>
                  <div className="info-row"><span className="info-label">치안 수준</span><span className={`badge-${selected.security==='낮음'?'ok':selected.security==='보통'?'warn':'caution'}`}>{selected.security}</span></div>
                  <div className="info-row"><span className="info-label">예방접종</span><span className="info-value">{selected.vaccine||'불필요'}</span></div>
                  <div className="info-row"><span className="info-label">문화 주의</span><span className="info-value">{selected.culture.substring(0,20)}...</span></div>
                  <div style={{background:'#FFF7ED',borderRadius:10,padding:12,marginTop:12,fontSize:12,color:'#92400E',lineHeight:1.6}}>
                    {selected.culture}
                  </div>
                </div>
              )}
              {activeTab==='weather' && (
                <div>
                  <p style={{fontSize:12,color:'#64748B',marginBottom:12}}>향후 3일 예보 (외부 날씨 API 연동)</p>
                  <div className="weather-grid">
                    {['오늘','내일','모레'].map((d,i)=>(
                      <div key={d} className="weather-card">
                        <div className="weather-day">{d}</div>
                        <div className="weather-temp">{selected.temps[i]}</div>
                        <div className="weather-label">{selected.conds[i]}</div>
                      </div>
                    ))}
                  </div>
                </div>
              )}
              {activeTab==='emergency' && (
                <div>
                  {[['현지 응급전화',selected.hospital],['주한 대사관',selected.embassy],['여행자보험','출국 전 가입 권장']].map(([l,v])=>(
                    <div key={l} className="info-row"><span className="info-label">{l}</span><span className="info-value">{v}</span></div>
                  ))}
                </div>
              )}
            </div>
          </div>
          <div className="map-placeholder">
            <div className="map-icon"><i className="ph ph-map-trifold" style={{fontSize:48,color:'#0EA5E9'}}></i></div>
            <div className="map-label">Google Maps 연동 여행 동선 지도</div>
            <div className="map-sub">주요 관광지 마커 및 경로 시각화</div>
            <div style={{display:'flex',gap:8,marginTop:8,flexWrap:'wrap',justifyContent:'center'}}>
              {['교통 레이어','관광지 마커','숙소 위치'].map(l=>(
                <span key={l} style={{padding:'4px 10px',borderRadius:20,background:'rgba(14,165,233,0.1)',border:'1px solid #BAE6FD',fontSize:11,color:'#0369A1'}}>{l}</span>
              ))}
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

function App() {
  const [activeTab, setActiveTab] = useState('AI 챗봇');
  const tabs = [
    { name:'AI 챗봇', icon:'ph-robot' },
    { name:'여행 추천', icon:'ph-compass' },
    { name:'내 일정', icon:'ph-calendar-blank' },
    { name:'여행지 정보', icon:'ph-globe' },
  ];

  const renderContent = () => {
    if (activeTab === 'AI 챗봇') return <ChatScreen />;
    if (activeTab === '여행 추천') return <RecommendScreen />;
    if (activeTab === '내 일정') return <ItineraryScreen />;
    if (activeTab === '여행지 정보') return <DestinationScreen />;
  };

  return (
    <div className="app-wrap" style={{width:'100%'}}>
      <nav className="topnav">
        <a className="topnav-brand" href="#">
          <div className="topnav-logo"><i className="ph ph-airplane-tilt"></i></div>
          <span className="topnav-title">트래블<span>AI</span></span>
        </a>
        <div className="topnav-tabs">
          {tabs.map(t=>(
            <button key={t.name} className={`tab-btn ${activeTab===t.name?'active':''}`} onClick={()=>setActiveTab(t.name)}>
              <i className={`ph ${t.icon}`}></i> {t.name}
            </button>
          ))}
        </div>
        <div className="topnav-right">
          <span className="lang-badge">KO · EN · ID</span>
          <div className="avatar">김</div>
        </div>
      </nav>
      {activeTab === 'AI 챗봇' && (
        <div className="hero">
          <div className="hero-inner">
            <div className="hero-badge"><i className="ph ph-sparkle"></i> LangChain + LangGraph 기반 AI 워크플로우</div>
            <h1>AI 여행 컨시어지 플랫폼</h1>
            <p>자연어로 여행 정보를 묻고, 맞춤 일정을 추천받고, 목적지 정보를 한 번에 확인하는 B2C AI 여행 서비스 구현 데모입니다.</p>
            <div className="hero-chips">
              {['RAG 검색 파이프라인','외부 API 연동','다국어 지원 (한·영·인도네시아어)','일정 공유 · PDF 출력'].map(c=>(
                <span key={c} className="hero-chip">{c}</span>
              ))}
            </div>
          </div>
        </div>
      )}
      <main className="main-content">
        {renderContent()}
      </main>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
