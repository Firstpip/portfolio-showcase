  .hd-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; padding-bottom: 16px; border-bottom: 1px solid #2A2A42; }

  .chat-thread { display: flex; flex-direction: column; gap: 8px; }

  .handoff-btn {

  /* Analytics */
  .analytics-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin-bottom: 24px; }

  /* KPI donut */
  .donut-wrap { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 180px; gap: 10px; }

  .donut-value { font-size: 28px; font-weight: 800; color: #F1F5F9; }
  .donut-label { font-size: 12px; color: #64748B; }

  /* Prompt */
  .prompt-layout { display: grid; grid-template-columns: 220px 1fr; gap: 20px; }
  .prompt-nav { background: #1A1A2E; border-radius: 12px; border: 1px solid #2A2A42; overflow: hidden; }

<script type="text/babel">
const { useState, useEffect, useRef } = React;
const { LineChart, Line, BarChart, Bar, XAxis, YAxis, CartesianGrid, Tooltip, ResponsiveContainer, PieChart, Pie, Cell } = Recharts;

const QUEUE = [
  { id:'Q-1042', name:'박현우', preview:'방콕 3박 4일 항공권 문의입니다. 출발일 변경 가능한...', time:'방금', cat:'항공', catKey:'air', status:'new' },

          <div className="card-body" style={{display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center'}}>
            <div className="chart-wrap" style={{height:160}}>
              <ResponsiveContainer width="100%" height="100%">
                <PieChart>
                  <Pie data={[{name:'AI 자동',value:78},{name:'상담원',value:22}]} cx="50%" cy="50%" innerRadius={45} outerRadius={70} dataKey="value">
                    <Cell fill="#6366F1" /><Cell fill="#34D399" />
                  </Pie>
                  <Tooltip contentStyle={{background:'#1A1A2E',border:'1px solid #2A2A42',borderRadius:8,color:'#E2E8F0'}} />
                </PieChart>
              </ResponsiveContainer>
            </div>
            <div style={{display:'flex',gap:16,marginTop:8}}>
              {[['AI 자동 처리','78%','#6366F1'],['상담원 처리','22%','#34D399']].map(([l,v,c])=>(
                <div key={l} style={{textAlign:'center'}}>
                  <div style={{fontSize:18,fontWeight:800,color:c}}>{v}</div>
                  <div style={{fontSize:11,color:'#64748B'}}>{l}</div>
                </div>
              ))}
            </div>
          </div>
        </div>
      </div>
    </div>
  );
}

function PromptPage() {
  const [activePrompt, setActivePrompt] = useState(0);
  const [promptText, setPromptText] = useState(DEFAULT_PROMPT);
  const [activeTab, setActiveTab] = useState('prompt');
  const [toast, setToast] = useState(null);
  const [showModal, setShowModal] = useState(false);

  return (
    <div className="page">
      <div className="page-header">
        <div className="page-title">
          <h2>프롬프트 및 FAQ 관리</h2>
          <p>AI 시스템 프롬프트 버전 관리 및 FAQ 질답 관리</p>
        </div>
        <div style={{display:'flex',gap:8}}>
          {['프롬프트','FAQ','금칙어'].map((t,i)=>(
            <button key={t} className={`filter-btn ${activeTab===['prompt','faq','forbidden'][i]?'active':''}`} onClick={()=>setActiveTab(['prompt','faq','forbidden'][i])}>{t}</button>
          ))}
        </div>
      </div>
      {activeTab === 'prompt' && (
        <div className="prompt-layout">
          <div className="prompt-nav">
            {PROMPTS.map((p,i)=>(
              <div key={i} className={`prompt-nav-item ${activePrompt===i?'active':''}`} onClick={()=>setActivePrompt(i)}>
                <i className="ti ti-file-code"></i>
                <div>
                  <div style={{fontSize:12,fontWeight:700}}>{p.name}</div>
                  <div style={{fontSize:10,color:'#475569',marginTop:1}}>{p.version}</div>
                </div>
                {p.active && <span style={{fontSize:9,fontWeight:700,color:'#34D399',marginLeft:'auto'}}>활성</span>}
              </div>
            ))}
          </div>
          <div className="prompt-editor">
            <div className="pe-header">
              <div>
                <div className="pe-title">{PROMPTS[activePrompt].name}</div>
                <div style={{fontSize:11,color:'#475569',marginTop:2}}>{PROMPTS[activePrompt].time}</div>
              </div>
              <div className="pe-actions">
                <button className="pe-btn" onClick={()=>setToast('이전 버전으로 롤백했습니다')}>
                  <i className="ti ti-history"></i> 롤백
                </button>
                <button className="pe-btn primary" onClick={()=>setToast('프롬프트가 AI에 즉시 반영되었습니다')}>
                  <i className="ti ti-device-floppy"></i> 저장 및 적용
                </button>
              </div>
            </div>
            <div className="pe-body">
              <textarea className="pe-textarea" value={promptText} onChange={e=>setPromptText(e.target.value)} style={{minHeight:240}} />
              <div style={{marginTop:16}}>
                <div style={{fontSize:12,fontWeight:700,color:'#475569',marginBottom:10,display:'flex',alignItems:'center',gap:6}}>
                  <i className="ti ti-versions"></i> 버전 이력
                </div>
                <div className="version-list">
                  {[{v:'v2.3',t:'2025.07.20 14:30',a:true},{v:'v2.2',t:'2025.07.15 10:12',a:false},{v:'v2.1',t:'2025.07.08 09:22',a:false}].map((ver,i)=>(
                    <div key={i} className="version-item" onClick={()=>setToast(`${ver.v} 버전을 불러왔습니다`)}>
                      <div className="v-info"><div className="v-name">{ver.v}</div><div className="v-time">{ver.t}</div></div>
                      {ver.a ? <span className="v-active">현재</span> : <span style={{fontSize:10,color:'#475569'}}>이전</span>}
                    </div>
                  ))}
                </div>
              </div>
            </div>
          </div>
        </div>
      )}
      {activeTab === 'faq' && (
        <div>
          <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:16}}>
            <p style={{fontSize:13,color:'#64748B'}}>AI FAQ 응답 체인에 등록된 질답 목록</p>
            <button className="add-btn" onClick={()=>setShowModal(true)}>
              <i className="ti ti-plus"></i> FAQ 추가
            </button>
          </div>
          <div className="faq-grid">
            {FAQ_DATA.map((f,i)=>(
              <div key={i} className="faq-card" onClick={()=>setToast('FAQ 편집 창을 엽니다')}>
                <div className="faq-q">{f.q}</div>
                <div className="faq-a">{f.a}</div>
                <span className="faq-cat" style={{background:f.catColor==='indigo'?'rgba(99,102,241,0.15)':f.catColor==='red'?'rgba(239,68,68,0.15)':f.catColor==='green'?'rgba(52,211,153,0.15)':'rgba(59,130,246,0.15)',color:f.catColor==='indigo'?'#818CF8':f.catColor==='red'?'#F87171':f.catColor==='green'?'#34D399':'#60A5FA'}}>{f.cat}</span>
              </div>
            ))}
          </div>
        </div>
      )}
      {activeTab === 'forbidden' && (
        <div className="card">
          <div className="card-header">
            <h3><i className="ti ti-ban"></i> 금칙어 목록</h3>
            <button className="add-btn" onClick={()=>setToast('금칙어를 추가합니다')}>
              <i className="ti ti-plus"></i> 추가
            </button>
          </div>
          <div className="card-body">
            <div style={{display:'flex',flexWrap:'wrap',gap:8}}>
              {['경쟁사명1','경쟁사명2','비속어A','비속어B','광고성 단어C','불법 키워드D'].map(w=>(
                <div key={w} style={{padding:'6px 14px',borderRadius:8,background:'rgba(239,68,68,0.12)',border:'1px solid rgba(239,68,68,0.2)',color:'#F87171',fontSize:13,fontWeight:500,display:'flex',gap:8,alignItems:'center',cursor:'pointer'}} onClick={()=>setToast(`'${w}' 금칙어를 삭제합니다`)}>
                  {w} <i className="ti ti-x" style={{fontSize:12}}></i>
                </div>
              ))}
            </div>
            <p style={{fontSize:12,color:'#475569',marginTop:16}}>금칙어 등록 시 AI 응답에서 해당 단어가 자동 필터링됩니다.</p>
          </div>
        </div>
      )}
      {showModal && (
        <div className="modal-overlay" onClick={e=>{if(e.target===e.currentTarget)setShowModal(false)}}>
          <div className="modal">
            <div className="modal-header">
              <h3>FAQ 추가</h3>
              <button className="modal-close" onClick={()=>setShowModal(false)}><i className="ti ti-x"></i></button>
            </div>
            <div className="form-field"><label className="form-label">질문</label><input className="form-input" placeholder="고객이 자주 묻는 질문을 입력하세요" /></div>
            <div className="form-field"><label className="form-label">답변</label><textarea className="form-input" placeholder="AI가 제공할 답변을 입력하세요" rows={3} style={{resize:'vertical'}} /></div>
            <div className="form-field">
              <label className="form-label">카테고리</label>
              <select className="form-input">
                {['비자','환불','상품','보험','기타'].map(c=><option key={c}>{c}</option>)}
              </select>
            </div>
            <button className="form-submit" onClick={()=>{setShowModal(false);setToast('FAQ가 AI 응답 체인에 즉시 반영되었습니다');}}>FAQ 등록 및 반영</button>
          </div>
        </div>
      )}
      {toast && <Toast msg={toast} onClose={()=>setToast(null)} />}
    </div>
  );
}

function App() {
  const [activePage, setActivePage] = useState('상담 대시보드');
  const navItems = [
    { name:'상담 대시보드', icon:'ti-dashboard' },
    { name:'상담 히스토리', icon:'ti-history' },
    { name:'통계 현황', icon:'ti-chart-bar' },
    { name:'프롬프트 관리', icon:'ti-code' },
  ];

  const renderPage = () => {
    if (activePage === '상담 대시보드') return <DashboardPage />;
    if (activePage === '상담 히스토리') return <HistoryPage />;
    if (activePage === '통계 현황') return <AnalyticsPage />;
    if (activePage === '프롬프트 관리') return <PromptPage />;
  };

  return (
    <div className="app-wrap" style={{width:'100%'}}>
      <nav className="global-nav">
        <div className="nav-brand">
          <div className="nav-logo"><i className="ti ti-headset"></i></div>
          <span className="nav-title">여행사 <span>상담 관리</span></span>
        </div>
        <div className="nav-links">
          {navItems.map(n=>(
            <button key={n.name} className={`nav-link ${activePage===n.name?'active':''}`} onClick={()=>setActivePage(n.name)}>
              <i className={`ti ${n.icon}`}></i> {n.name}
            </button>
          ))}
        </div>
        <div className="nav-right">
          <div className="online-indicator"><div className="online-dot"></div> 실시간 연결</div>
          <div className="agent-badge"><i className="ti ti-robot"></i> LangGraph v2.3</div>
          <button className="user-btn">김</button>
        </div>
      </nav>
      <main className="spa-main">
        {renderPage()}
      </main>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
