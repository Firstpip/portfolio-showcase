  @keyframes slideInRight{from{opacity:0;transform:translateX(20px);}to{opacity:1;transform:translateX(0);}}
  @keyframes pulse{0%,100%{opacity:1;}50%{opacity:.45;}}
  @keyframes progressFill{from{width:0%;}to{width:var(--target-width,60%);}}
  @keyframes countUp{from{opacity:0;}to{opacity:1;}}
  @keyframes toastIn{from{opacity:0;transform:translateY(20px);}to{opacity:1;transform:translateY(0);}}

  .sidebar{
    position:fixed;left:0;top:0;bottom:0;width:240px;
    background:#1A2744;color:#CDD8EE;
    display:flex;flex-direction:column;
    border-right:1px solid #243055;z-index:100;
  }
  .sidebar-logo{
    padding:20px 20px 16px;
    border-bottom:1px solid #243055;
  }
  .sidebar-logo h1{font-size:13px;font-weight:700;color:#E8EDF5;letter-spacing:.02em;}
  .sidebar-logo p{font-size:10px;color:#6B7FA3;margin-top:2px;}
  .sidebar-nav{flex:1;padding:12px 0;overflow-y:auto;}
  .nav-section-label{font-size:9px;font-weight:600;color:#4A5E82;letter-spacing:.08em;text-transform:uppercase;padding:10px 20px 4px;}
  .nav-item{
    display:flex;align-items:center;gap:10px;
    padding:9px 20px;cursor:pointer;
    font-size:13px;font-weight:500;color:#9AABCC;
    transition:background .15s,color .15s;
    border-left:3px solid transparent;
  }
  .nav-item:hover{background:#243055;color:#CDD8EE;}
  .nav-item.active{background:#1E3562;color:#E8EDF5;border-left-color:#4CAF82;}
  .nav-item i{font-size:16px;width:18px;text-align:center;}
  .nav-badge{
    margin-left:auto;background:#4CAF82;color:#fff;
    font-size:9px;font-weight:700;border-radius:10px;padding:1px 6px;
  }
  .nav-badge.warn{background:#E8A040;}
  .sidebar-footer{padding:16px 20px;border-top:1px solid #243055;}
  .status-dot{
    display:inline-block;width:8px;height:8px;border-radius:50%;
    background:#4CAF82;animation:pulse 2s infinite;margin-right:6px;
  }
  .status-text{font-size:11px;color:#6B7FA3;}

  .main-wrap{
    margin-left:240px;min-height:100vh;

  }
  .topbar{
    background:#fff;border-bottom:1px solid #E0E8F5;
    padding:0 24px;height:56px;
    display:flex;align-items:center;justify-content:space-between;
    position:sticky;top:0;z-index:50;

  .topbar-left{display:flex;align-items:center;gap:12px;}
  .page-title{font-size:15px;font-weight:700;color:#1A2744;}
  .breadcrumb{font-size:12px;color:#8A9EC0;}
  .topbar-right{display:flex;align-items:center;gap:12px;}
  .btn-sm{

    padding:7px 14px;border-radius:4px;font-size:12px;font-weight:600;
    border:none;cursor:pointer;transition:background .15s,transform .1s;
  }
  .btn-sm:active{transform:scale(.97);}
  .btn-primary{background:#2C4A7C;color:#fff;}

  .btn-outline{background:#F2F5FB;color:#5A6E8C;border:1px solid #D0DBED;}
  .btn-outline:hover{background:#E8EDF5;}
  .btn-green{background:#4CAF82;color:#fff;}
  .btn-green:hover{background:#3D9A71;}

  .page-content{flex:1;padding:20px 24px;}

  .kpi-card{

  .badge-red{background:#FEF0EE;color:#C04030;}
  .badge-blue{background:#EBF0F9;color:#2C4A7C;}

  .log-status{font-size:10px;font-weight:600;padding:2px 8px;border-radius:10px;flex-shrink:0;align-self:center;}

    padding:14px 16px;margin-bottom:10px;

  .collect-brand{font-size:13px;font-weight:700;color:#1A2744;}
  .collect-sub{font-size:11px;color:#8A9EC0;margin-top:2px;}
  .collect-metrics{display:flex;gap:12px;margin-top:8px;}

  .collect-metric-val{font-size:16px;font-weight:800;color:#2C4A7C;}

  .pipeline-steps{display:flex;gap:0;margin-bottom:20px;overflow:hidden;border-radius:4px;border:1px solid #D8E4F0;}

  .step-label{font-size:11px;color:#6B7FA3;margin-top:3px;}

  .form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px;}
  .form-group{display:flex;flex-direction:column;gap:5px;}
  .form-label{font-size:12px;font-weight:600;color:#4A5E82;}
  .form-input{

  }

  .modal-overlay{
    position:fixed;inset:0;background:rgba(15,25,55,.55);
    display:flex;align-items:center;justify-content:center;z-index:200;
  }
  .modal-box{
    background:#fff;border-radius:4px;border:1px solid #D8E4F0;
    width:520px;max-width:92vw;max-height:85vh;overflow-y:auto;
    box-shadow:0 8px 32px rgba(44,74,124,.18);

  }
  .modal-header{
    display:flex;align-items:center;justify-content:space-between;
    padding:16px 20px;border-bottom:1px solid #E8EDF5;
  }
  .modal-title{font-size:14px;font-weight:700;color:#1A2744;}
  .modal-body{padding:20px;}
  .modal-close{
    width:28px;height:28px;border-radius:4px;border:none;
    background:#F2F5FB;cursor:pointer;display:flex;align-items:center;justify-content:center;
    color:#8A9EC0;font-size:14px;transition:background .12s;
  }
  .modal-close:hover{background:#E0E8F5;}
  .detail-row{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid #F0F4FA;font-size:12px;}
  .detail-label{color:#8A9EC0;font-weight:500;}
  .detail-value{color:#1A2744;font-weight:600;}

  .toast{
    position:fixed;bottom:24px;right:24px;
    background:#1A2744;color:#E8EDF5;
    padding:11px 18px;border-radius:4px;font-size:12px;font-weight:600;
    box-shadow:0 4px 14px rgba(26,39,68,.25);
    animation:toastIn .25s ease;z-index:500;
    display:flex;align-items:center;gap:8px;
  }
  .toast-success{border-left:3px solid #4CAF82;}
  .toast-warn{border-left:3px solid #E8A040;}

  .empty-state{
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    padding:40px;color:#9AABCC;text-align:center;
  }
  .empty-state i{font-size:36px;margin-bottom:10px;color:#CDD8EE;}
  .empty-state p{font-size:12px;}

  .tag{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:3px;font-size:11px;font-weight:600;}
  .tag-naver{background:#E8F2E8;color:#2D7A4A;}

  .tag-community{background:#EBF0F9;color:#2C4A7C;}
  .tag-x{background:#F0EEFA;color:#5C3FCC;}

  .skeleton{background:linear-gradient(90deg,#E8EDF5 25%,#F4F7FC 50%,#E8EDF5 75%);background-size:200% 100%;animation:pulse 1.2s infinite;border-radius:3px;}
</style>
</head>

// ─── 토스트 ───
function Toast({msg,type,onClose}){
  useEffect(()=>{const t=setTimeout(onClose,2800);return()=>clearTimeout(t);},[]);
  return <div className={`toast toast-${type}`}><i className={`ti ti-${type==='success'?'circle-check':'alert-triangle'}`}/>{msg}</div>;
}

// ─── 모달 ───
function Modal({title,children,onClose}){
  return(
    <div className="modal-overlay" onClick={e=>{if(e.target===e.currentTarget)onClose();}}>
      <div className="modal-box">
        <div className="modal-header">
          <span className="modal-title">{title}</span>
          <button className="modal-close" onClick={onClose}><i className="ti ti-x"/></button>
        </div>
        <div className="modal-body">{children}</div>
      </div>
    </div>
  );
}

                <div className="log-meta">{l.meta}</div>
              </div>
              <span style={{fontSize:10,fontWeight:700,padding:'3px 8px',borderRadius:10,background:l.status==='완료'?'#EBF9F1':l.status==='경고'?'#FEF3E2':l.status==='재시도'?'#FEF3E2':'#FEF0EE',color:l.status==='완료'?'#2D8A5A':'#B8740A'}}>{l.status}</span>
            </div>
          ))}
        </div>
      </div>
      {selected&&(
        <Modal title="로그 상세" onClose={()=>setSelected(null)}>
          <div className="detail-row"><span className="detail-label">로그 ID</span><span className="detail-value">{selected.id}</span></div>
          <div className="detail-row"><span className="detail-label">내용</span><span className="detail-value" style={{fontSize:11}}>{selected.title}</span></div>
          <div className="detail-row"><span className="detail-label">상태</span><span className="detail-value">{selected.status}</span></div>
          <div className="detail-row"><span className="detail-label">메타</span><span className="detail-value" style={{fontSize:11}}>{selected.meta}</span></div>
          <button className="btn-sm btn-outline" style={{width:'100%',marginTop:14,justifyContent:'center'}} onClick={()=>setSelected(null)}>닫기</button>
        </Modal>
      )}
    </div>
  );
}

// ─── 앱 ───
function App(){

    {id:'pipeline',icon:'filter',label:'정제 파이프라인'},

  return(
    <div style={{display:'flex',width:'100%',minHeight:'100vh'}}>

          {navItems.map((item,i)=>
            item.section
              ?<div key={i} className="nav-section-label">{item.section}</div>

                <i className={`ti ti-${item.icon}`}/>

                {item.badge&&<span className={`nav-badge ${item.badgeClass||''}`}>{item.badge}</span>}

        <div className="sidebar-footer">
          <div style={{marginBottom:6}}>
            <span className="status-dot"/><span className="status-text">크롤러 3/4 실행 중</span>
          </div>
          <div style={{fontSize:10,color:'#4A5E82'}}>마지막 수집: 2026-05-22 09:28</div>
          <div style={{fontSize:10,color:'#4A5E82'}}>다음 수집: 2026-05-22 10:00</div>
        </div>
      </aside>
      <main className="main-wrap">
        <div className="topbar">
          <div className="topbar-left">
            <div>
              <div className="page-title">{pageTitle[page]}</div>

            </div>
          </div>
          <div className="topbar-right">
            <button className="btn-sm btn-outline" onClick={()=>showToast('전체 크롤러 새로고침 완료','success')}><i className="ti ti-refresh"/>새로고침</button>
            <button className="btn-sm btn-primary" onClick={()=>showToast('전체 수집 작업 수동 시작','success')}><i className="ti ti-player-play"/>전체 수집 시작</button>
          </div>
        </div>
        <div className="page-content">
          {page==='main'&&<MainDashboard showToast={showToast}/>}
          {page==='collection'&&<CollectionPage showToast={showToast}/>}
          {page==='pipeline'&&<PipelinePage showToast={showToast}/>}
          {page==='export'&&<ExportPage showToast={showToast}/>}
          {page==='logs'&&<LogsPage showToast={showToast}/>}

                  <div key={i} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'10px 0',borderBottom:'1px solid #F0F4FA'}}>

          )}

      </main>

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
