<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ESG 소셜 데이터 리서치 플랫폼</title>
<link rel="preconnect" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css"/>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css"/>
<link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/regular/style.css"/>
<link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/fill/style.css"/>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://unpkg.com/prop-types/prop-types.min.js"></script>
<script src="https://unpkg.com/react-is@18/umd/react-is.production.min.js"></script>
<script src="https://unpkg.com/recharts/umd/Recharts.js"></script>
<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body,#root{width:100%;min-height:100vh;}
  body{font-family:'Pretendard',sans-serif;background:#1A1F2E;color:#E8EDF5;}

  @keyframes fadeUp{from{opacity:0;transform:translateY(16px);}to{opacity:1;transform:translateY(0);}}
  @keyframes fadeIn{from{opacity:0;}to{opacity:1;}}
  @keyframes glow{0%,100%{box-shadow:0 0 8px rgba(232,168,76,.15);}50%{box-shadow:0 0 18px rgba(232,168,76,.35);}}
  @keyframes slideDown{from{opacity:0;transform:translateY(-12px);}to{opacity:1;transform:translateY(0);}}
  @keyframes toastPop{from{opacity:0;transform:translateX(20px);}to{opacity:1;transform:translateX(0);}}
  @keyframes pulse{0%,100%{opacity:1;}50%{opacity:.4;}}
  @keyframes barGrow{from{width:0;}to{width:100%;}}

  .topnav{
    width:100%;background:#111521;border-bottom:1px solid #2A3147;
    position:sticky;top:0;z-index:100;
  }
  .nav-inner{
    max-width:1280px;margin:0 auto;padding:0 28px;
    display:flex;align-items:center;height:58px;gap:0;
  }
  .brand-logo{
    display:flex;align-items:center;gap:10px;margin-right:32px;flex-shrink:0;cursor:pointer;
  }
  .brand-logo-icon{
    width:30px;height:30px;border-radius:8px;background:linear-gradient(135deg,#E8A84C,#C47A28);
    display:flex;align-items:center;justify-content:center;
    box-shadow:0 2px 8px rgba(232,168,76,.3);
  }
  .brand-logo h1{font-size:13px;font-weight:800;color:#E8EDF5;letter-spacing:-.01em;}
  .brand-logo p{font-size:10px;color:#6B7FA3;}
  .nav-tabs{display:flex;gap:0;flex:1;}
  .nav-tab{
    padding:18px 20px;font-size:13px;font-weight:600;color:#7A8FA8;
    cursor:pointer;border-bottom:2px solid transparent;
    transition:color .15s,border-color .15s;white-space:nowrap;
  }
  .nav-tab:hover{color:#CDD8EE;}
  .nav-tab.active{color:#E8A84C;border-bottom-color:#E8A84C;}
  .nav-actions{display:flex;align-items:center;gap:10px;margin-left:auto;flex-shrink:0;}

  .btn{
    display:inline-flex;align-items:center;gap:7px;
    padding:8px 16px;border-radius:8px;font-size:13px;font-weight:600;
    border:none;cursor:pointer;transition:all .15s;font-family:'Pretendard',sans-serif;
  }
  .btn:active{transform:scale(.97);}
  .btn-amber{background:#E8A84C;color:#1A1F2E;}
  .btn-amber:hover{background:#D4924A;box-shadow:0 2px 8px rgba(232,168,76,.3);}
  .btn-ghost{background:rgba(255,255,255,.06);color:#CDD8EE;border:1px solid #2A3147;}
  .btn-ghost:hover{background:rgba(255,255,255,.10);}
  .btn-sm{padding:7px 13px;font-size:12px;border-radius:6px;}

  .hero{
    background:linear-gradient(160deg,#1E2436 0%,#1A1F2E 60%,#151A28 100%);
    padding:36px 28px;width:100%;
    border-bottom:1px solid #2A3147;
  }
  .hero-inner{max-width:1280px;margin:0 auto;}
  .hero-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:20px;}
  .hero-title{font-size:22px;font-weight:800;color:#E8EDF5;letter-spacing:-.02em;animation:fadeUp .5s ease both;}
  .hero-sub{font-size:13px;color:#7A8FA8;margin-top:4px;animation:fadeUp .5s .08s ease both;}
  .hero-kpi{display:flex;gap:16px;animation:fadeUp .5s .15s ease both;}
  .kpi-pill{
    display:flex;align-items:center;gap:8px;
    background:#242B3D;border:1px solid #2A3147;
    border-radius:10px;padding:10px 16px;
    transition:box-shadow .2s;
  }
  .kpi-pill:hover{box-shadow:0 4px 16px rgba(0,0,0,.3);}
  .kpi-icon{
    width:34px;height:34px;border-radius:8px;display:flex;align-items:center;justify-content:center;
    font-size:16px;flex-shrink:0;
  }
  .kpi-text-val{font-size:18px;font-weight:800;color:#E8EDF5;line-height:1;}
  .kpi-text-label{font-size:10px;color:#6B7FA3;margin-top:2px;}
  .badge{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:5px;font-size:11px;font-weight:600;}
  .badge-amber{background:rgba(232,168,76,.15);color:#E8A84C;}
  .badge-green{background:rgba(76,175,130,.15);color:#4CAF82;}
  .badge-red{background:rgba(220,80,60,.12);color:#E05040;}
  .badge-blue{background:rgba(91,155,213,.15);color:#5B9BD5;}

  .content-area{max-width:1280px;margin:0 auto;padding:24px 28px;width:100%;}

  .card{
    background:#242B3D;border:1px solid #2A3147;border-radius:12px;
    padding:20px;transition:box-shadow .2s;
    box-shadow:0 2px 8px rgba(0,0,0,.2);
  }
  .card:hover{box-shadow:0 6px 20px rgba(0,0,0,.35);}
  .card-title{font-size:13px;font-weight:700;color:#CDD8EE;margin-bottom:14px;display:flex;align-items:center;gap:8px;}
  .card-title i{color:#E8A84C;font-size:16px;}

  .grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:20px;}
  .grid-2{display:grid;grid-template-columns:3fr 2fr;gap:16px;margin-bottom:20px;}
  .grid-2-eq{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:20px;}

  .data-table{width:100%;border-collapse:collapse;font-size:12px;}
  .data-table th{background:#1E2436;padding:9px 12px;color:#6B7FA3;font-weight:600;text-align:left;border-bottom:1px solid #2A3147;}
  .data-table td{padding:9px 12px;border-bottom:1px solid #1E2436;color:#CDD8EE;}
  .data-table tr:hover td{background:rgba(255,255,255,.02);cursor:pointer;}

  .filter-row{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;align-items:center;}
  .filter-label{font-size:11px;color:#6B7FA3;font-weight:600;}
  .filter-select{
    padding:7px 11px;border-radius:7px;border:1px solid #2A3147;
    background:#1E2436;color:#CDD8EE;font-family:'Pretendard',sans-serif;
    font-size:12px;cursor:pointer;
  }
  .filter-select:focus{outline:none;border-color:#E8A84C;}

  .progress-row{display:flex;align-items:center;gap:10px;margin-bottom:8px;}
  .progress-label{font-size:11px;color:#7A8FA8;width:70px;flex-shrink:0;}
  .progress-bar-bg{flex:1;height:6px;background:#1E2436;border-radius:4px;overflow:hidden;}
  .progress-fill{height:100%;border-radius:4px;transition:width .6s ease;}
  .progress-val{font-size:11px;color:#7A8FA8;width:36px;text-align:right;flex-shrink:0;}

  .spike-marker{
    display:inline-flex;align-items:center;gap:4px;
    background:rgba(220,80,60,.15);border:1px solid rgba(220,80,60,.3);
    border-radius:4px;padding:2px 7px;font-size:10px;color:#E05040;font-weight:600;
  }

  .quality-meter{
    display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid #1E2436;
  }
  .quality-name{font-size:12px;color:#CDD8EE;width:90px;flex-shrink:0;}
  .quality-bar-bg{flex:1;height:8px;background:#1E2436;border-radius:4px;overflow:hidden;}
  .quality-fill{height:100%;border-radius:4px;}
  .quality-val{font-size:12px;font-weight:700;width:40px;text-align:right;flex-shrink:0;}

  .drawer-overlay{
    position:fixed;inset:0;background:rgba(10,14,26,.6);z-index:200;
    display:flex;justify-content:flex-end;
  }
  .drawer{
    width:440px;height:100%;background:#1E2436;
    border-left:1px solid #2A3147;overflow-y:auto;
    animation:slideDown .25s ease;box-shadow:-8px 0 32px rgba(0,0,0,.4);
  }
  .drawer-header{
    padding:20px 22px;border-bottom:1px solid #2A3147;
    display:flex;align-items:center;justify-content:space-between;
    position:sticky;top:0;background:#1E2436;z-index:10;
  }
  .drawer-title{font-size:14px;font-weight:700;color:#E8EDF5;}
  .drawer-body{padding:20px 22px;}
  .drawer-close{
    width:30px;height:30px;border-radius:7px;border:1px solid #2A3147;
    background:#242B3D;cursor:pointer;display:flex;align-items:center;justify-content:center;
    color:#7A8FA8;font-size:14px;transition:background .12s;
  }
  .drawer-close:hover{background:#2A3147;}
  .drawer-row{display:flex;justify-content:space-between;padding:9px 0;border-bottom:1px solid #2A3147;font-size:12px;}
  .drawer-label{color:#6B7FA3;font-weight:500;}
  .drawer-value{color:#CDD8EE;font-weight:600;}

  .toast{
    position:fixed;top:24px;right:24px;z-index:500;
    background:#242B3D;color:#CDD8EE;border:1px solid #2A3147;
    padding:12px 18px;border-radius:10px;font-size:12px;font-weight:600;
    box-shadow:0 8px 24px rgba(0,0,0,.4);
    animation:toastPop .25s ease;
    display:flex;align-items:center;gap:8px;
  }
  .toast-amber{border-left:3px solid #E8A84C;}
  .toast-green{border-left:3px solid #4CAF82;}

  .report-preview{
    background:#1A1F2E;border:1px solid #2A3147;border-radius:8px;
    padding:16px;font-size:11px;color:#7A8FA8;
    margin-bottom:14px;min-height:120px;
  }
  .report-section{margin-bottom:12px;}
  .report-section-title{font-size:12px;font-weight:700;color:#E8A84C;margin-bottom:6px;}
  .report-row{display:flex;justify-content:space-between;padding:3px 0;font-size:11px;border-bottom:1px solid #2A3147;}
  .report-row-label{color:#7A8FA8;}
  .report-row-val{color:#CDD8EE;font-weight:600;}

  .brand-btn{
    display:inline-flex;align-items:center;gap:6px;
    padding:6px 12px;border-radius:7px;border:1px solid #2A3147;
    background:#1E2436;color:#7A8FA8;font-size:12px;font-weight:600;
    cursor:pointer;transition:all .12s;margin:3px;
  }
  .brand-btn:hover,.brand-btn.selected{background:#E8A84C;color:#1A1F2E;border-color:#E8A84C;}

  .analy-stat{
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    padding:14px;background:#1E2436;border-radius:8px;border:1px solid #2A3147;text-align:center;
  }
  .analy-val{font-size:22px;font-weight:800;color:#E8A84C;}
  .analy-label{font-size:10px;color:#6B7FA3;margin-top:4px;}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useRef,useCallback} = React;
const {LineChart,Line,BarChart,Bar,XAxis,YAxis,CartesianGrid,Tooltip,Legend,ResponsiveContainer,AreaChart,Area,RadarChart,Radar,PolarGrid,PolarAngleAxis,PolarRadiusAxis} = Recharts;

// ─── 더미 데이터 ───
const BRANDS_ALL = ['나이키','아디다스','자라','H&M','유니클로','무신사','스파오','에잇세컨즈','탑텐','빈폴','MLB','폴로','리바이스','캘빈클라인'];
const MONTHS_29 = ['24.01','24.02','24.03','24.04','24.05','24.06','24.07','24.08','24.09','24.10','24.11','24.12','25.01','25.02','25.03','25.04','25.05','25.06','25.07','25.08','25.09','25.10','25.11','25.12','26.01','26.02','26.03','26.04','26.05'];

function genTrend(base,spike){
  return MONTHS_29.map((m,i)=>{
    const v=base+Math.floor(Math.sin(i/3)*80)+Math.floor(Math.random()*60);
    return {month:m,value:spike&&spike===i?v+420:v};
  });
}

const brandTrends={
  '나이키':genTrend(380,12),
  '아디다스':genTrend(310,18),
  '무신사':genTrend(420,7),
  '유니클로':genTrend(280,24),
  '자라':genTrend(260,15),
};

const qualityData=[
  {brand:'나이키',precision:98.2,recall:94.6,dedup:97.8,mask:99.1},
  {brand:'아디다스',precision:97.6,recall:93.2,dedup:97.1,mask:98.7},
  {brand:'무신사',precision:96.8,recall:91.4,dedup:96.2,mask:98.2},
  {brand:'유니클로',precision:95.4,recall:89.7,dedup:95.8,mask:97.9},
  {brand:'자라',precision:94.1,recall:87.3,dedup:94.6,mask:97.4},
  {brand:'H&M',precision:96.2,recall:92.1,dedup:96.7,mask:98.5},
  {brand:'스파오',precision:93.8,recall:86.9,dedup:93.2,mask:97.1},
];

const channelShare=[
  {name:'네이버 뉴스',naver:38,youtube:24,community:31,x:7},
  {name:'아디다스',naver:34,youtube:28,community:30,x:8},
  {name:'무신사',naver:29,youtube:22,community:38,x:11},
];

const insightCards=[
  {brand:'나이키',total:'142,380',delta:'+8.4%',spike:'25.12월 스파이크 감지',channels:{naver:38,youtube:26,community:28,x:8},score:98},
  {brand:'아디다스',total:'118,240',delta:'+5.1%',spike:null,channels:{naver:36,youtube:24,community:32,x:8},score:97},
  {brand:'무신사',total:'156,820',delta:'+12.3%',spike:'25.07월 스파이크 감지',channels:{naver:29,youtube:20,community:40,x:11},score:96},
  {brand:'유니클로',total:'98,340',delta:'-2.1%',spike:null,channels:{naver:40,youtube:22,community:28,x:10},score:95},
  {brand:'자라',total:'89,120',delta:'-1.4%',spike:'24.03월 스파이크 감지',channels:{naver:38,youtube:26,community:28,x:8},score:94},
  {brand:'H&M',total:'112,840',delta:'+3.7%',spike:null,channels:{naver:37,youtube:25,community:30,x:8},score:96},
];

const reportHistory=[
  {name:'패션 ESG 전체 분석 리포트 (2024.01-2026.05)',brands:14,size:'2.4MB',date:'2026-05-20'},
  {name:'나이키·아디다스 비교 분석 (2025.01-2025.12)',brands:2,size:'0.8MB',date:'2026-05-15'},
  {name:'커뮤니티 채널 집중 분석 (2024)',brands:14,size:'1.6MB',date:'2026-05-10'},
];

// ─── 토스트 ───
function Toast({msg,type='amber',onClose}){
  useEffect(()=>{const t=setTimeout(onClose,2800);return()=>clearTimeout(t);},[]);
  return <div className={`toast toast-${type}`}><i className={`ph-fill ph-${type==='green'?'check-circle':'bell'}`}/>{msg}</div>;
}

// ─── Drawer ───
function Drawer({title,children,onClose}){
  return(
    <div className="drawer-overlay" onClick={e=>{if(e.target===e.currentTarget)onClose();}}>
      <div className="drawer">
        <div className="drawer-header">
          <span className="drawer-title">{title}</span>
          <button className="drawer-close" onClick={onClose}><i className="ph ph-x"/></button>
        </div>
        <div className="drawer-body">{children}</div>
      </div>
    </div>
  );
}

// ─── 인사이트 대시보드 ───
function InsightPage({showToast}){
  const [selected,setSelected]=useState(null);
  return(
    <div>
      <div style={{marginBottom:20}}>
        <div className="grid-3">
          {[
            {label:'총 수집 건수',value:'2,184,320',icon:'database',color:'#E8A84C'},
            {label:'분석 대상 브랜드',value:'14개',icon:'tag',color:'#5B9BD5'},
            {label:'분석 기간',value:'29개월',icon:'calendar',color:'#4CAF82'},
          ].map((k,i)=>(
            <div className="analy-stat" key={i}>
              <i className={`ph-fill ph-${k.icon}`} style={{fontSize:22,color:k.color,marginBottom:6}}/>
              <div className="analy-val" style={{color:k.color}}>{k.value}</div>
              <div className="analy-label">{k.label}</div>
            </div>
          ))}
        </div>
      </div>
      <div className="card" style={{marginBottom:20}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:14}}>
          <div className="card-title" style={{marginBottom:0}}><i className="ph-fill ph-chart-line-up"/>ESG 언급량 추이 (상위 5개 브랜드)</div>
          <div style={{display:'flex',gap:8}}>
            <select className="filter-select"><option>전체 기간</option><option>2024년</option><option>2025년</option><option>2026년</option></select>
            <select className="filter-select"><option>전체 채널</option><option>네이버 뉴스</option><option>유튜브</option><option>커뮤니티</option><option>X/트위터</option></select>
          </div>
        </div>
        <div style={{height:200,position:'relative'}}>
          <ResponsiveContainer width="100%" height="100%">
            <AreaChart data={brandTrends['나이키'].slice(0,12)} margin={{top:4,right:8,bottom:0,left:-16}}>
              <CartesianGrid strokeDasharray="3 3" stroke="#2A3147"/>
              <XAxis dataKey="month" tick={{fontSize:10,fill:'#6B7FA3'}}/>
              <YAxis tick={{fontSize:10,fill:'#6B7FA3'}}/>
              <Tooltip contentStyle={{background:'#242B3D',border:'1px solid #2A3147',borderRadius:8,fontSize:11}} labelStyle={{color:'#CDD8EE'}}/>
              <Area type="monotone" dataKey="value" name="나이키" stroke="#E8A84C" fill="rgba(232,168,76,.1)" strokeWidth={2}/>
            </AreaChart>
          </ResponsiveContainer>
        </div>
      </div>
      <div style={{marginBottom:16,fontSize:13,fontWeight:700,color:'#CDD8EE'}}>브랜드별 ESG 소셜 언급 현황</div>
      <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:12}}>
        {insightCards.map((card,i)=>(
          <div className="card" key={i} style={{cursor:'pointer',animationDelay:`${i*.06}s`}} onClick={()=>setSelected(card)}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:12}}>
              <div>
                <div style={{fontSize:14,fontWeight:800,color:'#E8EDF5'}}>{card.brand}</div>
                <div style={{fontSize:11,color:'#6B7FA3',marginTop:2}}>ESG 언급 총 {card.total}건</div>
              </div>
              <div style={{textAlign:'right'}}>
                <div style={{fontSize:13,fontWeight:700,color:card.delta.startsWith('+')?'#4CAF82':'#E05040'}}>{card.delta}</div>
                {card.spike&&<div className="spike-marker" style={{marginTop:4}}><i className="ph-fill ph-warning"/>스파이크</div>}
              </div>
            </div>
            <div style={{display:'flex',gap:6,flexWrap:'wrap'}}>
              {[{l:'뉴스',v:card.channels.naver,c:'#5B9BD5'},{l:'유튜브',v:card.channels.youtube,c:'#E05040'},{l:'커뮤니티',v:card.channels.community,c:'#4CAF82'},{l:'X',v:card.channels.x,c:'#7B5EA7'}].map((ch,j)=>(
                <div key={j} style={{flex:1,minWidth:40,background:'#1E2436',borderRadius:6,padding:'5px 6px',textAlign:'center'}}>
                  <div style={{fontSize:13,fontWeight:700,color:ch.c}}>{ch.v}%</div>
                  <div style={{fontSize:9,color:'#6B7FA3'}}>{ch.l}</div>
                </div>
              ))}
            </div>
          </div>
        ))}
      </div>
      {selected&&(
        <Drawer title={`${selected.brand} — ESG 인사이트 상세`} onClose={()=>setSelected(null)}>

  );
}

// ─── 앱 ───
function App(){
  const [page,setPage]=useState('main');
  const [toast,setToast]=useState(null);
  const showToast=(msg,type='amber')=>setToast({msg,type,key:Date.now()});

  const tabs=[
    {id:'main',label:'인사이트'},
    {id:'trends',label:'트렌드 분석'},
    {id:'brands',label:'브랜드 비교'},
    {id:'quality',label:'데이터 품질'},
    {id:'report',label:'리포트'},
  ];
  const pageTitle={main:'ESG 소셜 인사이트',trends:'브랜드별 시계열 트렌드',brands:'브랜드 비교 분석',quality:'데이터 품질 현황',report:'연구용 리포트 생성'};

  return(
    <div style={{display:'flex',flexDirection:'column',width:'100%',minHeight:'100vh'}}>
      <nav className="topnav">
        <div className="nav-inner">
          <div className="brand-logo" onClick={()=>setPage('main')}>
            <div className="brand-logo-icon"><i className="ph-fill ph-chart-line-up" style={{color:'#1A1F2E',fontSize:16}}/></div>
            <div><h1>ESG 리서치 플랫폼</h1><p>패션 브랜드 소셜 데이터 분석</p></div>
          </div>
          <div className="nav-tabs">
            {tabs.map(t=>(
              <div key={t.id} className={`nav-tab ${page===t.id?'active':''}`} onClick={()=>setPage(t.id)}>{t.label}</div>
            ))}
          </div>
          <div className="nav-actions">
            <button className="btn btn-ghost btn-sm" onClick={()=>showToast('데이터 동기화 완료','green')}><i className="ph ph-arrows-clockwise"/>동기화</button>
            <button className="btn btn-amber btn-sm" onClick={()=>{setPage('report');}}><i className="ph ph-file-pdf"/>리포트 생성</button>
          </div>
        </div>
      </nav>
      <div className="hero">
        <div className="hero-inner">
          <div className="hero-top">
            <div>
              <div className="hero-title">{pageTitle[page]}</div>
              <div className="hero-sub">수집 기간: 2024.01 ~ 2026.05 · 14개 패션 브랜드 · 4개 소셜 채널</div>
            </div>
            <div style={{display:'flex',gap:8,animation:'fadeIn .4s ease'}}>
              <span className="badge badge-green"><i className="ph-fill ph-check-circle"/>데이터 정제 완료</span>
              <span className="badge badge-amber"><i className="ph-fill ph-database"/>2,184,320건</span>
            </div>
          </div>
          <div className="hero-kpi">
            {[
              {label:'분석 브랜드',val:'14개',icon:'tag',color:'#5B9BD5'},
              {label:'평균 정밀도',val:'96.3%',icon:'shield-check',color:'#4CAF82'},
              {label:'스파이크 감지',val:'3건',icon:'warning',color:'#E8A84C'},
              {label:'비식별화율',val:'98.4%',icon:'user-minus',color:'#9B72CF'},
            ].map((k,i)=>(
              <div className="kpi-pill" key={i}>
                <div className="kpi-icon" style={{background:`rgba(${k.color==='#5B9BD5'?'91,155,213':k.color==='#4CAF82'?'76,175,130':k.color==='#E8A84C'?'232,168,76':'155,114,207'},.15)`}}>
                  <i className={`ph-fill ph-${k.icon}`} style={{color:k.color}}/>
                </div>
                <div><div className="kpi-text-val">{k.val}</div><div className="kpi-text-label">{k.label}</div></div>
              </div>
            ))}
          </div>
        </div>
      </div>
      <main style={{flex:1,width:'100%'}}>
        <div className="content-area">
          {page==='main'&&<InsightPage showToast={showToast}/>}
          {page==='trends'&&<TrendsPage showToast={showToast}/>}
          {page==='brands'&&<BrandsPage showToast={showToast}/>}
          {page==='quality'&&<QualityPage showToast={showToast}/>}
          {page==='report'&&<ReportPage showToast={showToast}/>}
        </div>
      </main>
      {toast&&<Toast key={toast.key} msg={toast.msg} type={toast.type} onClose={()=>setToast(null)}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
