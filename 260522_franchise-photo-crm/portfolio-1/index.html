<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>프랜차이즈 기념사진 QR 전송 플랫폼 — 맞춤 구현 데모</title>
<link rel="preconnect" href="https://cdn.jsdelivr.net">
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/@tabler/icons-webfont@latest/tabler-icons.min.css">
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://unpkg.com/prop-types@15/prop-types.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body,#root{width:100%;min-height:100vh;font-family:'Pretendard Variable',Pretendard,-apple-system,sans-serif;background:#FDF6EE;color:#2C1A0E}

@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes qrPulse{0%,100%{box-shadow:0 0 0 0 rgba(200,90,46,.35)}50%{box-shadow:0 0 0 14px rgba(200,90,46,0)}}
@keyframes progressAnim{from{width:0}to{width:100%}}
@keyframes toastIn{from{opacity:0;transform:translateX(16px)}to{opacity:1;transform:translateX(0)}}
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
@keyframes staggerIn{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
@keyframes checkBounce{0%{transform:scale(0)}70%{transform:scale(1.2)}100%{transform:scale(1)}}

.page-enter{animation:fadeIn .3s ease both}
.stagger-1{animation:staggerIn .35s .05s ease both}
.stagger-2{animation:staggerIn .35s .12s ease both}
.stagger-3{animation:staggerIn .35s .19s ease both}
.stagger-4{animation:staggerIn .35s .26s ease both}
.stagger-5{animation:staggerIn .35s .33s ease both}

.toast-wrap{position:fixed;top:20px;right:20px;z-index:9000;display:flex;flex-direction:column;gap:8px}
.toast{animation:toastIn .3s ease;background:#fff;border-radius:12px;padding:12px 16px;min-width:260px;box-shadow:0 4px 20px rgba(0,0,0,.12);display:flex;align-items:center;gap:10px;border-left:4px solid #C85A2E;font-size:14px}
.toast.success{border-left-color:#22C55E}
.toast.error{border-left-color:#EF4444}

.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:1000;display:flex;align-items:center;justify-content:center;animation:fadeIn .2s ease}
.modal-box{background:#fff;border-radius:20px;padding:32px;width:500px;max-width:90vw;max-height:85vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.15);animation:slideUp .3s ease}

.topnav{background:#fff;border-bottom:1.5px solid #F0E4D8;position:sticky;top:0;z-index:100;width:100%}
.topnav-inner{max-width:1280px;margin:0 auto;padding:0 32px;height:64px;display:flex;align-items:center}
.nav-logo{font-size:18px;font-weight:800;color:#C85A2E;margin-right:36px;white-space:nowrap;letter-spacing:-.5px;display:flex;align-items:center;gap:8px}
.nav-tabs{display:flex;align-items:center;gap:4px;flex:1}
.nav-tab{padding:8px 16px;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;transition:all .2s;color:#7A4830;border:none;background:transparent;font-family:inherit;white-space:nowrap}
.nav-tab.active{background:#FDF0E8;color:#C85A2E}
.nav-tab:hover:not(.active){background:#FFF9F4}
.nav-right{display:flex;align-items:center;gap:12px;margin-left:auto}
.store-badge{background:#FDF0E8;color:#C85A2E;padding:6px 14px;border-radius:8px;font-size:13px;font-weight:700}

.hero{background:linear-gradient(135deg,#C85A2E 0%,#E8874A 55%,#F5C842 100%);padding:52px 32px;color:#fff;text-align:center}
.hero h1{font-size:32px;font-weight:800;margin-bottom:12px;letter-spacing:-.5px}
.hero p{font-size:17px;opacity:.9;line-height:1.65;max-width:600px;margin:0 auto}

.content{max-width:1280px;margin:0 auto;padding:36px 32px}

.card{background:#fff;border:1.5px solid #F0E4D8;border-radius:16px;padding:24px;transition:border-color .2s,transform .2s}
.card:hover{border-color:#E8874A;transform:translateY(-2px)}
.card-plain{background:#fff;border:1.5px solid #F0E4D8;border-radius:16px;padding:24px}

.btn-primary{background:#C85A2E;color:#fff;border:none;padding:11px 22px;border-radius:12px;font-size:14px;font-weight:700;cursor:pointer;transition:background .2s,transform .1s;font-family:inherit;display:inline-flex;align-items:center;gap:6px}
.btn-primary:hover{background:#B34F26}
.btn-primary:active{transform:scale(.97)}
.btn-secondary{background:transparent;color:#C85A2E;border:1.5px solid #C85A2E;padding:10px 20px;border-radius:12px;font-size:14px;font-weight:700;cursor:pointer;transition:all .2s;font-family:inherit;display:inline-flex;align-items:center;gap:6px}
.btn-secondary:hover{background:#FDF0E8}
.btn-icon{background:none;border:none;cursor:pointer;padding:6px;color:#7A4830;border-radius:8px;transition:background .2s;display:flex;align-items:center}
.btn-icon:hover{background:#F0E4D8}

.tag{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;border-radius:6px;font-size:12px;font-weight:600}
.tag-orange{background:#FEF3E8;color:#C85A2E}
.tag-green{background:#ECFDF5;color:#059669}
.tag-yellow{background:#FEFCE8;color:#B45309}
.tag-gray{background:#F3F4F6;color:#6B7280}

.stat-card{background:#fff;border:1.5px solid #F0E4D8;border-radius:16px;padding:22px;display:flex;flex-direction:column;gap:6px}
.stat-num{font-size:30px;font-weight:800;color:#2C1A0E}
.stat-label{font-size:13px;color:#7A4830}

.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:20px}
.grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
.grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:16px}

.upload-zone{border:2px dashed #E8874A;border-radius:16px;padding:40px 24px;text-align:center;cursor:pointer;transition:all .2s;background:#FFF9F4}
.upload-zone:hover{border-color:#C85A2E;background:#FDF0E8}

.progress-wrap{width:100%;height:8px;background:#F0E4D8;border-radius:4px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,#C85A2E,#E8874A);border-radius:4px;transition:width .35s ease}

.qr-box{width:148px;height:148px;background:#fff;border:2.5px solid #C85A2E;border-radius:14px;display:flex;align-items:center;justify-content:center;animation:qrPulse 2s ease-in-out infinite;flex-shrink:0}

.step-dot{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;flex-shrink:0;transition:all .3s}
.step-dot.active{background:#C85A2E;color:#fff}
.step-dot.done{background:#22C55E;color:#fff;animation:checkBounce .4s ease}
.step-dot.pending{background:#F0E4D8;color:#9CA3AF}
.step-line{flex:1;height:2px;border-radius:2px;transition:background .3s}
.step-line.done{background:#22C55E}
.step-line.pending{background:#F0E4D8}

.spinner{display:inline-block;width:18px;height:18px;border:2.5px solid rgba(200,90,46,.2);border-top-color:#C85A2E;border-radius:50%;animation:spin .7s linear infinite}

table{width:100%;border-collapse:collapse}
thead th{background:#FFF9F4;padding:12px 16px;text-align:left;font-size:13px;font-weight:600;color:#7A4830;border-bottom:1.5px solid #F0E4D8}
tbody tr{border-bottom:1px solid #F8F0E8;cursor:pointer;transition:background .15s}
tbody tr:hover{background:#FFF9F4}
tbody td{padding:12px 16px;font-size:14px}

input,select,textarea{width:100%;padding:10px 14px;border:1.5px solid #E5E7EB;border-radius:10px;font-size:14px;font-family:inherit;outline:none;transition:border-color .2s;background:#fff;color:#2C1A0E}
input:focus,select:focus,textarea:focus{border-color:#C85A2E}
label{font-size:13px;font-weight:600;color:#7A4830;display:block;margin-bottom:6px}
.form-group{display:flex;flex-direction:column;gap:4px;margin-bottom:14px}

.consent-box{display:flex;align-items:flex-start;gap:10px;padding:14px;border-radius:10px;border:1.5px solid #E5E7EB;cursor:pointer;transition:border-color .2s;margin-bottom:10px}
.consent-box:hover{border-color:#C85A2E}
.consent-box.checked{border-color:#C85A2E;background:#FFF9F4}
.checkbox{width:20px;height:20px;border-radius:5px;border:2px solid;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .2s}

.section-title{font-size:20px;font-weight:700;color:#2C1A0E}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef } = React;

/* ── 더미 데이터 ── */
const OCCASIONS = ['생일','상견례','기념일','돌잔치','졸업','취업 축하'];
const HISTORY = [
  {id:1,time:'14:32',name:'김민지',occasion:'생일',status:'collected',qr:'QR-A8B2-0001'},
  {id:2,time:'13:15',name:'이서준',occasion:'상견례',status:'downloaded',qr:'QR-A8B2-0002'},
  {id:3,time:'11:48',name:'박지현',occasion:'기념일',status:'pending',qr:'QR-A8B2-0003'},
  {id:4,time:'10:22',name:'최현우',occasion:'생일',status:'collected',qr:'QR-A8B2-0004'},
  {id:5,time:'09:05',name:'정수빈',occasion:'기념일',status:'downloaded',qr:'QR-A8B2-0005'},
];

/* ── Toast ── */
function useToast() {
  const [list,setList]=useState([]);
  const show=(msg,type='info')=>{
    const id=Date.now();
    setList(p=>[...p,{id,msg,type}]);
    setTimeout(()=>setList(p=>p.filter(t=>t.id!==id)),3200);
  };
  return{list,show};
}
function ToastList({list}){
  return <div className="toast-wrap">{list.map(t=>(
    <div key={t.id} className={`toast ${t.type}`}>
      <i className={`ti ${t.type==='success'?'ti-circle-check':t.type==='error'?'ti-circle-x':'ti-info-circle'}`}
         style={{fontSize:18,color:t.type==='success'?'#22C55E':t.type==='error'?'#EF4444':'#C85A2E'}}/>
      <span>{t.msg}</span>
    </div>
  ))}</div>;
}

/* ── QR SVG ── */
function QRVisual({token}){
  const seed=token.split('').reduce((a,c)=>a+c.charCodeAt(0),0);
  const cells=[];
  for(let r=0;r<9;r++)for(let c=0;c<9;c++){
    if((r<3&&c<3)||(r<3&&c>5)||(r>5&&c<3))continue;
    if(((seed+r*9+c)*17)%5!==0)cells.push({r,c});
  }
  return (
    <svg width="120" height="120" viewBox="0 0 90 90" xmlns="http://www.w3.org/2000/svg">
      <rect width="90" height="90" fill="#fff"/>
      {/* position squares */}
      {[[1,1],[1,61],[61,1]].map(([x,y],i)=>(
        <g key={i}>
          <rect x={x} y={y} width="26" height="26" fill="none" stroke="#C85A2E" strokeWidth="2.5"/>
          <rect x={x+5} y={y+5} width="16" height="16" fill="#C85A2E"/>
        </g>
      ))}
      {cells.map(({r,c})=>(
        <rect key={`${r}${c}`} x={30+c*4} y={r*4+1} width="3" height="3" fill="#C85A2E" opacity=".85"/>
      ))}
    </svg>
  );
}

/* ── Chart (Bar) ── */
function WeeklyChart(){
  const ref=useRef(null);
  const inst=useRef(null);
  useEffect(()=>{
    if(!ref.current)return;
    if(inst.current)inst.current.destroy();
    inst.current=new Chart(ref.current,{
      type:'bar',
      data:{
        labels:['월','화','수','목','금','토','일'],
        datasets:[{
          label:'업로드',
          data:[14,22,18,27,20,34,25],
          backgroundColor:'rgba(200,90,46,.72)',
          borderColor:'#C85A2E',
          borderWidth:2,
          borderRadius:6,
        }]
      },
      options:{
        responsive:true,maintainAspectRatio:false,
        plugins:{legend:{display:false}},
        scales:{
          y:{grid:{color:'#F0E4D8'},ticks:{color:'#7A4830',font:{family:'Pretendard Variable'}},border:{display:false}},
          x:{grid:{display:false},ticks:{color:'#7A4830',font:{family:'Pretendard Variable'}},border:{display:false}}
        }
      }
    });
    return()=>inst.current?.destroy();
  },[]);
  return <div style={{position:'relative',height:200}}><canvas ref={ref}/></div>;
}

/* ── 사진 업로드 탭 ── */
function UploadScreen({toast}){
  const [step,setStep]=useState(0);
  const [progress,setProgress]=useState(0);
  const [file,setFile]=useState(null);
  const [occasion,setOccasion]=useState('생일');
  const [qrToken,setQrToken]=useState('');
  const [drag,setDrag]=useState(false);
  const [detail,setDetail]=useState(null);

  const pickFile=()=>setFile({name:'기념사진_강남점.jpg',size:'3.2 MB'});
  const startUpload=()=>{
    setStep(1);setProgress(0);
    let p=0;
    const iv=setInterval(()=>{
      p+=Math.random()*12+5;
      if(p>=100){
        p=100;clearInterval(iv);setProgress(100);
        setTimeout(()=>{
          setStep(2);
          setTimeout(()=>{
            const tok='QR-'+Math.random().toString(36).slice(2,6).toUpperCase()+'-'+Date.now().toString(36).slice(-4).toUpperCase();
            setQrToken(tok);setStep(3);
            toast.show('QR 코드 발급 완료 — 고객에게 스캔을 안내하세요','success');
          },1800);
        },400);
      }else setProgress(Math.round(p));
    },130);
  };
  const reset=()=>{setStep(0);setProgress(0);setFile(null);setQrToken('');};

  return (
    <div className="content page-enter">
      <div className="grid-2" style={{gap:24,alignItems:'start'}}>
        {/* 업로드 패널 */}
        <div className="card-plain" style={{display:'flex',flexDirection:'column',gap:20}}>
          <div style={{display:'flex',alignItems:'center',gap:10}}>
            <i className="ti ti-camera-up" style={{fontSize:22,color:'#C85A2E'}}/>
            <span className="section-title" style={{fontSize:18}}>사진 업로드 및 QR 자동 생성</span>
          </div>

          {/* 단계 인디케이터 */}
          <div style={{display:'flex',alignItems:'center',gap:6}}>
            {['업로드','이미지 합성','QR 발급'].map((s,i)=>(
              <React.Fragment key={i}>
                {i>0&&<div className={`step-line ${step>i?'done':'pending'}`}/>}
                <div style={{display:'flex',flexDirection:'column',alignItems:'center',gap:3}}>
                  <div className={`step-dot ${step>i?'done':step===i?'active':'pending'}`}>
                    {step>i?<i className="ti ti-check" style={{fontSize:13}}/>:i+1}
                  </div>
                  <span style={{fontSize:10,color:step>=i?'#C85A2E':'#9CA3AF',fontWeight:600,whiteSpace:'nowrap'}}>{s}</span>
                </div>
              </React.Fragment>
            ))}
          </div>

          {/* 기념일 */}
          <div className="form-group" style={{marginBottom:0}}>
            <label>기념일 종류</label>
            <select value={occasion} onChange={e=>setOccasion(e.target.value)} disabled={step>0}>
              {OCCASIONS.map(o=><option key={o}>{o}</option>)}
            </select>
          </div>

          {/* 업로드 영역 */}
          {!file?(
            <div className={`upload-zone ${drag?'dragging':''}`}
              onDragEnter={()=>setDrag(true)} onDragLeave={()=>setDrag(false)}
              onDrop={e=>{e.preventDefault();setDrag(false);pickFile();}}
              onClick={pickFile}>
              <i className="ti ti-photo-up" style={{fontSize:42,color:'#E8874A',display:'block',marginBottom:12}}/>
              <p style={{fontWeight:700,color:'#7A4830',marginBottom:6}}>사진을 드래그하거나 클릭하여 선택</p>
              <p style={{fontSize:13,color:'#9CA3AF'}}>JPG·PNG 지원 · 최대 20MB</p>
            </div>
          ):(
            <div style={{border:'1.5px solid #F0E4D8',borderRadius:12,padding:16}}>
              <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:step===1?12:0}}>
                <i className="ti ti-photo" style={{fontSize:22,color:'#C85A2E'}}/>
                <div style={{flex:1}}>
                  <div style={{fontWeight:600,fontSize:14}}>{file.name}</div>
                  <div style={{fontSize:12,color:'#7A4830'}}>{file.size}</div>
                </div>
                {step===0&&<button className="btn-secondary" style={{padding:'5px 12px',fontSize:12}} onClick={reset}>변경</button>}
              </div>
              {step===1&&(
                <div>
                  <div style={{display:'flex',justifyContent:'space-between',marginBottom:6}}>
                    <span style={{fontSize:12,color:'#7A4830'}}>S3 업로드 중...</span>
                    <span style={{fontSize:12,color:'#C85A2E',fontWeight:700}}>{progress}%</span>
                  </div>
                  <div className="progress-wrap"><div className="progress-fill" style={{width:`${progress}%`}}/></div>
                </div>
              )}
              {step===2&&(
                <div style={{display:'flex',alignItems:'center',gap:10,padding:'8px 0'}}>
                  <div className="spinner"/>
                  <span style={{fontSize:13,color:'#7A4830'}}>브랜드 프레임 자동 오버레이 합성 중... (Bull Queue)</span>
                </div>
              )}
            </div>
          )}

          {step===0&&file&&(
            <button className="btn-primary" onClick={startUpload} style={{width:'100%',justifyContent:'center',padding:'13px'}}>
              <i className="ti ti-upload"/>업로드 및 QR 생성
            </button>
          )}
          {step===3&&(
            <button className="btn-secondary" onClick={reset} style={{width:'100%',justifyContent:'center'}}>
              <i className="ti ti-plus"/>새 사진 업로드
            </button>
          )}

          {/* 현재 브랜드 프레임 */}
          <div style={{background:'#FFF9F4',borderRadius:10,padding:'12px 14px',border:'1px solid #F0E4D8'}}>
            <div style={{fontSize:12,color:'#7A4830',fontWeight:600,marginBottom:8}}>현재 매장 브랜드 프레임</div>
            <div style={{display:'flex',alignItems:'center',gap:10}}>
              <div style={{width:38,height:38,borderRadius:8,background:'linear-gradient(135deg,#C85A2E,#E8874A)',display:'flex',alignItems:'center',justifyContent:'center'}}>
                <i className="ti ti-brand-abstract-filled" style={{color:'#fff',fontSize:18}}/>
              </div>
              <div>
                <div style={{fontSize:13,fontWeight:700}}>한우마루 프레임 v2.1</div>
                <div style={{fontSize:11,color:'#9CA3AF'}}>2025.04.10 교체 · 1920×1280px</div>
              </div>
            </div>
          </div>
        </div>

        {/* QR 패널 */}
        <div className="card-plain" style={{display:'flex',flexDirection:'column',gap:20,minHeight:400,alignItems:'center',justifyContent:step===3?'flex-start':'center'}}>
          {step<3?(
            <div style={{textAlign:'center',color:'#9CA3AF'}}>
              <i className="ti ti-qrcode" style={{fontSize:72,display:'block',marginBottom:16,color:'#F0E4D8'}}/>
              <p style={{fontWeight:700,color:'#7A4830',marginBottom:6}}>사진 업로드 후 QR 코드가 생성됩니다</p>
              <p style={{fontSize:13}}>고객에게 스캔을 안내하면 합성 사진 수령 플로우가 시작됩니다</p>
              <div style={{marginTop:16,padding:'12px 16px',background:'#FFF9F4',borderRadius:10,textAlign:'left',fontSize:13,color:'#7A4830',lineHeight:1.7}}>
                <strong>처리 순서:</strong><br/>
                1. S3 presigned URL 업로드<br/>
                2. Bull Queue에 합성 작업 적재<br/>
                3. Sharp composite API로 프레임 오버레이<br/>
                4. UUID v4 기반 1회성 QR 토큰 발급
              </div>
            </div>
          ):(
            <div style={{width:'100%',animation:'slideUp .4s ease'}}>
              <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:16}}>
                <div style={{width:10,height:10,borderRadius:'50%',background:'#22C55E',animation:'qrPulse 2s infinite'}}/>
                <span style={{fontWeight:700,color:'#22C55E',fontSize:15}}>QR 코드 발급 완료</span>
              </div>
              <div style={{display:'flex',gap:20,alignItems:'flex-start',marginBottom:16}}>
                <div className="qr-box"><QRVisual token={qrToken}/></div>
                <div style={{flex:1}}>
                  <div style={{marginBottom:12}}>
                    <div style={{fontSize:12,color:'#7A4830',fontWeight:600,marginBottom:4}}>QR 토큰 ID</div>
                    <div style={{fontFamily:'monospace',fontSize:13,fontWeight:700,color:'#C85A2E',background:'#FDF0E8',padding:'6px 10px',borderRadius:6}}>{qrToken}</div>
                  </div>

/* ── 사진 수령 탭 ── */

        </div>
      </div>
    </div>
  );

        <div className="grid-3" style={{marginBottom:28}}>

            {icon:'ti-camera-up',title:'사진 업로드 및 QR 생성',desc:'스마트폰·태블릿으로 사진을 업로드하면 브랜드 프레임이 자동 합성되고, UUID 기반 1회성 QR 코드를 즉시 발급합니다.',btn:'upload'},
            {icon:'ti-device-mobile',title:'고객 QR 랜딩',desc:'고객이 QR 스캔 후 개인정보 동의, 이름·연락처·기념일 입력, 합성 사진 다운로드·카카오톡 공유를 한 플로우에서 완료합니다.',btn:'customer'},
            {icon:'ti-chart-bar',title:'매장 대시보드',desc:'당일 업로드 건수, QR 발급 현황, 고객 DB 수집 건수를 실시간으로 확인하고 계정 관리를 수행합니다.',btn:'dashboard'},
          ].map((c,i)=>(
            <div key={i} className={`card stagger-${i+1}`}>
              <div style={{width:46,height:46,borderRadius:12,background:'#FDF0E8',display:'flex',alignItems:'center',justifyContent:'center',marginBottom:14}}>
                <i className={`ti ${c.icon}`} style={{fontSize:22,color:'#C85A2E'}}/>
              </div>
              <h3 style={{fontWeight:700,marginBottom:8,fontSize:15}}>{c.title}</h3>
              <p style={{fontSize:13,color:'#7A4830',lineHeight:1.7,marginBottom:16}}>{c.desc}</p>
              <button className="btn-primary" style={{fontSize:13,padding:'8px 14px'}} onClick={()=>setTab(c.btn)}>
                바로가기
              </button>
            </div>
          ))}
        </div>
        <div style={{background:'linear-gradient(135deg,#C85A2E,#E8874A)',borderRadius:16,padding:'24px 28px',color:'#fff',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
          <div>
            <div style={{fontSize:13,opacity:.85,marginBottom:6}}>오늘 (2025.05.22) 현황</div>
            <div style={{fontSize:24,fontWeight:800}}>업로드 12건 · 고객 DB 수집 9건</div>
          </div>
          <button style={{background:'rgba(255,255,255,.2)',border:'none',color:'#fff',padding:'10px 20px',borderRadius:10,cursor:'pointer',fontWeight:700,fontFamily:'inherit',fontSize:14}} onClick={()=>setTab('dashboard')}>
            대시보드 보기
          </button>
        </div>
        <div style={{marginTop:20,padding:'16px 20px',background:'#FFF9F4',borderRadius:12,border:'1px solid #F0E4D8'}}>
          <div style={{fontSize:13,fontWeight:700,marginBottom:8}}>기술 구성</div>
          <div style={{display:'flex',flexWrap:'wrap',gap:8}}>
            {['React 18','TypeScript','Tailwind CSS','Node.js + Express','PostgreSQL + Prisma','AWS S3','Bull Queue','Sharp','Kakao JS SDK'].map(t=>(
              <span key={t} className="tag tag-orange" style={{fontSize:11}}>{t}</span>
            ))}
          </div>
        </div>
      </div>
    </div>
  );
}

/* ── App ── */
function App(){
  const [tab,setTab]=useState('home');
  const toast=useToast();

  return (
    <div style={{width:'100%',minHeight:'100vh',display:'flex',flexDirection:'column'}}>
      <ToastList list={toast.list}/>

      <header className="topnav">
        <div className="topnav-inner">
          <div className="nav-logo">
            <i className="ti ti-camera-filled" style={{fontSize:20}}/>FrameQ
          </div>
          <nav className="nav-tabs">
            <button className={`nav-tab ${tab==='home'?'active':''}`} onClick={()=>setTab('home')}>홈</button>
            <button className={`nav-tab ${tab==='upload'?'active':''}`} onClick={()=>setTab('upload')}>사진 업로드</button>
            <button className={`nav-tab ${tab==='customer'?'active':''}`} onClick={()=>setTab('customer')}>사진 수령</button>
            <button className={`nav-tab ${tab==='dashboard'?'active':''}`} onClick={()=>setTab('dashboard')}>대시보드</button>
          </nav>
          <div className="nav-right">
            <span className="store-badge">한우마루 강남점</span>
            <button className="btn-icon"><i className="ti ti-logout" style={{fontSize:18}}/></button>
          </div>
        </div>
      </header>

      <main style={{flex:1,width:'100%'}}>
        {tab==='home'&&<HomeScreen setTab={setTab}/>}
        {tab==='upload'&&<UploadScreen toast={toast}/>}
        {tab==='customer'&&<CustomerScreen toast={toast}/>}
        {tab==='dashboard'&&<DashboardScreen toast={toast}/>}
      </main>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
