html,body,#root{width:100%;min-height:100vh;font-family:'Pretendard Variable',Pretendard,-apple-system,sans-serif;background:#F0F7F7;color:#0C2E2E}

@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideRight{from{opacity:0;transform:translateX(-16px)}to{opacity:1;transform:translateX(0)}}
@keyframes drawIn{from{opacity:0;transform:translateX(100%)}to{opacity:1;transform:translateX(0)}}
@keyframes toastIn{from{opacity:0;transform:translateX(14px)}to{opacity:1;transform:translateX(0)}}
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
@keyframes pulseGreen{0%,100%{box-shadow:0 0 0 0 rgba(5,150,105,.4)}50%{box-shadow:0 0 0 8px rgba(5,150,105,0)}}
@keyframes barGrow{from{opacity:0;transform:scaleY(0)}to{opacity:1;transform:scaleY(1)}}
@keyframes countUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

.page-enter{animation:fadeIn .28s ease both}
.slide-right{animation:slideRight .25s ease both}
.delay-1{animation-delay:.05s}.delay-2{animation-delay:.1s}.delay-3{animation-delay:.15s}.delay-4{animation-delay:.2s}

.toast-wrap{position:fixed;top:20px;right:20px;z-index:9000;display:flex;flex-direction:column;gap:8px}
.toast{animation:toastIn .3s ease;background:#fff;border-radius:4px;padding:11px 16px;min-width:260px;box-shadow:0 4px 16px rgba(0,0,0,.12);display:flex;align-items:center;gap:10px;border-left:3px solid #0F6B6B;font-size:14px}
.toast.success{border-left-color:#059669}
.toast.error{border-left-color:#DC2626}
.toast.warn{border-left-color:#F0A500}

.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:1000;display:flex;align-items:center;justify-content:center;animation:fadeIn .2s ease}
.modal-box{background:#fff;border-radius:4px;padding:28px;width:480px;max-width:90vw;max-height:88vh;overflow-y:auto;box-shadow:0 16px 48px rgba(0,0,0,.18);animation:fadeIn .25s ease}

.drawer-overlay{position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:1000;display:flex;justify-content:flex-end;animation:fadeIn .2s ease}
.drawer{background:#fff;width:460px;max-width:90vw;height:100vh;overflow-y:auto;padding:28px 24px;box-shadow:-6px 0 24px rgba(0,0,0,.12);animation:drawIn .28s ease}

.topnav{background:#0C2E2E;width:100%;position:sticky;top:0;z-index:100}
.topnav-inner{max-width:1440px;margin:0 auto;padding:0 28px;height:60px;display:flex;align-items:center}
.nav-logo{font-size:17px;font-weight:800;color:#fff;margin-right:32px;letter-spacing:-.4px;white-space:nowrap;display:flex;align-items:center;gap:8px}
.nav-logo span{color:#1A9898}
.nav-items{display:flex;align-items:center;gap:2px;flex:1}
.nav-item{padding:7px 14px;border-radius:3px;font-size:14px;font-weight:600;cursor:pointer;color:rgba(255,255,255,.65);border:none;background:transparent;font-family:inherit;white-space:nowrap;transition:all .2s}
.nav-item.active{background:#0F6B6B;color:#fff}
.nav-item:hover:not(.active){background:rgba(255,255,255,.08);color:#fff}
.nav-right{display:flex;align-items:center;gap:12px;margin-left:auto}
.admin-badge{background:rgba(26,152,152,.25);color:#7ECECE;padding:5px 12px;border-radius:3px;font-size:12px;font-weight:700}

.content{max-width:1440px;margin:0 auto;padding:28px 28px}

.card{background:#fff;border-radius:4px;padding:20px;box-shadow:0 2px 8px rgba(15,107,107,.08),0 0 0 1px rgba(15,107,107,.06);transition:box-shadow .2s,transform .2s}
.card:hover{box-shadow:0 4px 16px rgba(15,107,107,.12),0 0 0 1px rgba(15,107,107,.1)}
.card-flat{background:#fff;border-radius:4px;padding:20px;border:1px solid rgba(15,107,107,.12)}

.btn-primary{background:#0F6B6B;color:#fff;border:none;padding:9px 18px;border-radius:3px;font-size:13px;font-weight:700;cursor:pointer;transition:background .2s;font-family:inherit;display:inline-flex;align-items:center;gap:6px}

.btn-secondary{background:transparent;color:#0F6B6B;border:1.5px solid #0F6B6B;padding:8px 16px;border-radius:3px;font-size:13px;font-weight:700;cursor:pointer;transition:all .2s;font-family:inherit;display:inline-flex;align-items:center;gap:6px}

.tag{display:inline-flex;align-items:center;padding:3px 8px;border-radius:2px;font-size:11px;font-weight:700}
.tag-teal{background:rgba(15,107,107,.1);color:#0F6B6B}
.tag-green{background:#ECFDF5;color:#059669}
.tag-amber{background:#FFFBEB;color:#B45309}
.tag-red{background:#FEF2F2;color:#DC2626}
.tag-gray{background:#F3F4F6;color:#6B7280}

.stat-card{background:#fff;border-radius:4px;padding:18px 20px;box-shadow:0 2px 8px rgba(15,107,107,.08),0 0 0 1px rgba(15,107,107,.06);animation:countUp .4s ease both}

.stat-label{font-size:12px;color:#3D6B6B;font-weight:600}

.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}

table{width:100%;border-collapse:collapse}
thead th{background:#F0F7F7;padding:10px 14px;text-align:left;font-size:12px;font-weight:700;color:#3D6B6B;border-bottom:1.5px solid rgba(15,107,107,.12);white-space:nowrap}
tbody tr{border-bottom:1px solid rgba(15,107,107,.06);cursor:pointer;transition:background .12s}
tbody tr:hover{background:rgba(15,107,107,.04)}
tbody td{padding:10px 14px;font-size:13px}

input,select,textarea{width:100%;padding:9px 12px;border:1.5px solid #D1D5DB;border-radius:3px;font-size:13px;font-family:inherit;outline:none;transition:border-color .2s;background:#fff;color:#0C2E2E}

.run-indicator{display:flex;align-items:center;gap:8px}

/* ── Toast ── */
function useToast(){
  const [list,setList]=useState([]);
  const show=(msg,type='info')=>{
    const id=Date.now();
    setList(p=>[...p,{id,msg,type}]);
    setTimeout(()=>setList(p=>p.filter(t=>t.id!==id)),3200);
  };
  return{list,show};
}
function ToastList({list}){
  return <div className="toast-wrap">{list.map(t=>(
    <div key={t.id} className={`toast ${t.type}`}>
      <i className={`ph ${t.type==='success'?'ph-check-circle':t.type==='error'?'ph-x-circle':'ph-info'}`}
         style={{fontSize:17,color:t.type==='success'?'#059669':t.type==='error'?'#DC2626':t.type==='warn'?'#F0A500':'#0F6B6B'}}/>
      <span>{t.msg}</span>
    </div>
  ))}</div>;
}

/* ── 고객 DB 뷰 ── */
function CustomerDBView({toast}){
  const [brandFilter,setBrandFilter]=useState('all');

  const [marketingFilter,setMarketingFilter]=useState('all');
  const [searchName,setSearchName]=useState('');
  const [detail,setDetail]=useState(null);
  const [showSegModal,setShowSegModal]=useState(false);
  const [downloading,setDownloading]=useState(false);

  const filtered=CUSTOMERS.filter(c=>{
    if(brandFilter!=='all'&&c.brand!==brandFilter)return false;
    if(occasionFilter!=='all'&&c.occasion!==occasionFilter)return false;
    if(marketingFilter==='agreed'&&!c.marketing)return false;
    if(marketingFilter==='not'&&c.marketing)return false;
    if(searchName&&!c.name.includes(searchName))return false;
    return true;
  });

  const handleCSV=()=>{
    setDownloading(true);
    setTimeout(()=>{setDownloading(false);toast.show('CSV 파일 다운로드가 시작되었습니다 (마케팅 미동의 연락처 제외)','success');},1600);
  };

  return (

function SchedulerView({toast}){
  const [showConfirm,setShowConfirm]=useState(false);
  const [running,setRunning]=useState(false);
  const [logDetail,setLogDetail]=useState(null);
  const [logs,setLogs]=useState(SCHED_LOG);

  const handleManualRun=()=>{
    setShowConfirm(false);setRunning(true);
    setTimeout(()=>{
      const newLog={id:Date.now(),date:'2025.05.22 15:35 (수동)',deleted:12,duration:'1.0s',status:'success'};
      setLogs(p=>[newLog,...p]);
      setRunning(false);
      toast.show('스케줄러 수동 실행 완료 — 12건 삭제','success');
    },3000);
  };

  const nextRun='2025.05.23 00:00';

  return (
    <div className="content page-enter">
      <h2 className="section-title" style={{fontSize:18,marginBottom:20}}>7일 자동 삭제 스케줄러 및 시스템 모니터링</h2>

      {/* 상태 카드 */}
      <div className="grid-3" style={{marginBottom:20}}>
        {[
          {label:'스케줄러 상태',value:running?'실행 중':'대기 중',icon:'ph-timer',color:running?'#059669':'#0F6B6B',status:running?'running':'idle'},
          {label:'다음 실행 예정',value:nextRun,icon:'ph-clock',color:'#0F6B6B',status:'idle'},
          {label:'총 삭제 처리',value:'200건 (7일치)',icon:'ph-trash',color:'#DC2626',status:'idle'},
        ].map((s,i)=>(
          <div key={i} className={`card delay-${i+1}`} style={{display:'flex',flexDirection:'column',gap:8}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
              <i className={`ph-bold ${s.icon}`} style={{fontSize:22,color:s.color}}/>
              <div className="run-indicator">
                <div className={`run-dot ${s.status}`}/>
                <span style={{fontSize:11,color:'#3D6B6B',fontWeight:600}}>
                  {s.status==='running'?'실행 중':'대기'}
                </span>
              </div>
            </div>
            <div style={{fontSize:13,fontWeight:700,color:'#0C2E2E'}}>{s.value}</div>
            <div className="stat-label">{s.label}</div>
          </div>
        ))}
      </div>

      <div className="grid-2" style={{gap:16,marginBottom:20}}>
        {/* 스케줄러 설정 정보 */}
        <div className="card">
          <h3 style={{fontSize:14,fontWeight:700,marginBottom:14}}>스케줄러 설정</h3>
          {[
            ['실행 주기','매일 자정 (00:00 KST)'],
            ['처리 대상','7일 경과 사진·QR 토큰·고객 정보'],
            ['삭제 방식','S3 deleteObjects 일괄 + Prisma DB 삭제'],
            ['큐 엔진','Bull Repeatable Job (Redis 기반)'],
            ['멱등성','재실행 시 중복 삭제 없음 (Job ID 고정)'],
            ['실패 처리','자동 재시도 3회, 이후 dead-letter 큐'],
          ].map(([k,v])=>(
            <div key={k} style={{display:'flex',gap:12,padding:'8px 0',borderBottom:'1px solid rgba(15,107,107,.06)',fontSize:13}}>
              <div style={{width:110,color:'#3D6B6B',fontWeight:600,flexShrink:0}}>{k}</div>
              <div>{v}</div>
            </div>
          ))}
          <div style={{marginTop:16,display:'flex',gap:8}}>
            <button className="btn-primary" onClick={()=>setShowConfirm(true)} disabled={running}>
              {running?<><div className="spinner" style={{borderTopColor:'#fff',borderColor:'rgba(255,255,255,.2)'}}/>실행 중...</>
                :<><i className="ph ph-play"/>수동 실행</>}
            </button>
            <button className="btn-secondary" onClick={()=>toast.show('스케줄러 설정이 저장되었습니다','success')}>
              <i className="ph ph-gear"/>설정 저장
            </button>
          </div>
        </div>

        {/* 삭제 현황 mini chart */}
        <div className="card">
          <h3 style={{fontSize:14,fontWeight:700,marginBottom:14}}>최근 7일 삭제 건수</h3>
          <div style={{width:'100%',height:160}}>
            <ResponsiveContainer width="100%" height="100%">
              <BarChart data={SCHED_LOG.slice().reverse().map(l=>({날짜:l.date.slice(5,10),삭제:l.deleted}))}
                margin={{top:4,right:8,left:-20,bottom:0}}>
                <CartesianGrid strokeDasharray="3 3" stroke="rgba(15,107,107,.1)"/>
                <XAxis dataKey="날짜" tick={{fontSize:10,fill:'#3D6B6B'}} axisLine={false} tickLine={false}/>
                <YAxis tick={{fontSize:10,fill:'#3D6B6B'}} axisLine={false} tickLine={false}/>
                <Tooltip contentStyle={{borderRadius:3,border:'1px solid rgba(15,107,107,.15)',fontSize:12}}/>
                <Bar dataKey="삭제" fill="#DC2626" opacity={0.7} radius={[2,2,0,0]} maxBarSize={24}/>
              </BarChart>
            </ResponsiveContainer>
          </div>
          <div style={{marginTop:10,padding:'8px 12px',background:'#FEF2F2',borderRadius:3,fontSize:12,color:'#DC2626'}}>
            삭제된 데이터는 복구 불가 — S3 객체와 DB 레코드가 함께 제거됩니다
          </div>
        </div>
      </div>

      {/* 실행 이력 */}
      <div className="card-flat" style={{padding:0,overflow:'hidden'}}>
        <div style={{padding:'16px 16px 10px',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
          <h3 style={{fontSize:14,fontWeight:700}}>실행 이력 (감사 로그)</h3>
          <span className="tag tag-teal">{logs.length}건</span>
        </div>
        <table>
          <thead><tr><th>실행 시각</th><th>삭제 건수</th><th>소요 시간</th><th>상태</th><th>상세</th></tr></thead>
          <tbody>
            {logs.map((l,i)=>(
              <tr key={l.id} className={`slide-right delay-${Math.min(i+1,4)}`} onClick={()=>setLogDetail(l)}>
                <td style={{fontFamily:'monospace',fontSize:12}}>{l.date}</td>
                <td style={{fontWeight:700}}>{l.deleted}건</td>
                <td style={{color:'#3D6B6B'}}>{l.duration}</td>
                <td><span className={`tag ${l.status==='success'?'tag-green':'tag-red'}`} style={{fontSize:10}}>
                  {l.status==='success'?'성공':'실패'}
                </span></td>
                <td><button className="btn-icon" onClick={e=>{e.stopPropagation();setLogDetail(l);}}><i className="ph ph-list" style={{fontSize:13}}/></button></td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>

      {/* 수동 실행 확인 모달 */}
      {showConfirm&&(
        <div className="modal-overlay" onClick={()=>setShowConfirm(false)}>
          <div className="modal-box" onClick={e=>e.stopPropagation()} style={{maxWidth:380}}>
            <div style={{textAlign:'center',marginBottom:20}}>
              <div style={{width:56,height:56,borderRadius:'50%',background:'#FEF2F2',display:'flex',alignItems:'center',justifyContent:'center',margin:'0 auto 14px'}}>
                <i className="ph-bold ph-warning" style={{fontSize:28,color:'#DC2626'}}/>
              </div>
              <h3 style={{fontSize:17,fontWeight:800,marginBottom:8}}>스케줄러 수동 실행</h3>
              <p style={{fontSize:13,color:'#3D6B6B',lineHeight:1.65}}>
                7일 경과 사진·QR 토큰·고객 개인정보를 <strong>즉시 삭제</strong>합니다.<br/>
                삭제된 데이터는 복구할 수 없습니다.
              </p>
            </div>
            <div style={{display:'flex',gap:8}}>
              <button className="btn-secondary" style={{flex:1,justifyContent:'center'}} onClick={()=>setShowConfirm(false)}>취소</button>
              <button className="btn-danger" style={{flex:1,justifyContent:'center',padding:'10px'}} onClick={handleManualRun}>
                <i className="ph ph-play"/>즉시 실행
              </button>
            </div>
          </div>
        </div>
      )}

      {/* 로그 상세 모달 */}
      {logDetail&&(
        <div className="modal-overlay" onClick={()=>setLogDetail(null)}>
          <div className="modal-box" onClick={e=>e.stopPropagation()}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:20}}>
              <h3 style={{fontSize:16,fontWeight:800}}>실행 로그 상세</h3>
              <button className="btn-icon" onClick={()=>setLogDetail(null)}><i className="ph ph-x" style={{fontSize:18}}/></button>
            </div>
            <div style={{background:'#0C2E2E',borderRadius:3,padding:'14px 16px',fontFamily:'monospace',fontSize:12,color:'#7ECECE',lineHeight:1.8}}>
              <div style={{color:'rgba(255,255,255,.4)',marginBottom:4}}># {logDetail.date} 실행 로그</div>
              <div>[INFO] Bull Repeatable Job 시작 (jobId: sched-daily-cleanup)</div>
              <div>[INFO] Prisma 쿼리: 7일 경과 레코드 조회 → {logDetail.deleted}건 발견</div>
              <div>[INFO] S3 deleteObjects 일괄 삭제 시작...</div>
              <div>[INFO] S3 삭제 완료 → {logDetail.deleted}개 객체 제거</div>
              <div>[INFO] Prisma 트랜잭션: DB 레코드 삭제 완료</div>
              <div style={{color:'#86EFAC'}}>[SUCCESS] 스케줄 완료 — {logDetail.deleted}건 / {logDetail.duration}</div>
            </div>
            <button className="btn-primary" style={{marginTop:16,width:'100%',justifyContent:'center'}} onClick={()=>setLogDetail(null)}>닫기</button>
          </div>
        </div>
      )}
    </div>
  );
}

/* ── App ── */
function App(){
  const [view,setView]=useState('dashboard');
  const toast=useToast();

  return (
    <div style={{width:'100%',minHeight:'100vh',display:'flex',flexDirection:'column'}}>
      <ToastList list={toast.list}/>

      <header className="topnav">
        <div className="topnav-inner">
          <div className="nav-logo">
            <i className="ph-bold ph-database" style={{fontSize:18}}/>
            CRM<span>Platform</span>
          </div>
          <nav className="nav-items">
            <button className={`nav-item ${view==='dashboard'?'active':''}`} onClick={()=>setView('dashboard')}>대시보드</button>
            <button className={`nav-item ${view==='customer-db'?'active':''}`} onClick={()=>setView('customer-db')}>고객 DB</button>
            <button className={`nav-item ${view==='brand-store-mgmt'?'active':''}`} onClick={()=>setView('brand-store-mgmt')}>브랜드·매장 관리</button>
            <button className={`nav-item ${view==='scheduler'?'active':''}`} onClick={()=>setView('scheduler')}>스케줄러</button>
          </nav>
          <div className="nav-right">
            <span className="admin-badge">본사 관리자</span>
            <button className="btn-icon" style={{color:'rgba(255,255,255,.6)'}}><i className="ph ph-user-circle" style={{fontSize:22}}/></button>
            <button className="btn-icon" style={{color:'rgba(255,255,255,.6)'}}><i className="ph ph-sign-out" style={{fontSize:18}}/></button>
          </div>
        </div>
      </header>

      <main style={{flex:1,width:'100%'}}>
        {view==='dashboard'&&<DashboardView/>}
        {view==='customer-db'&&<CustomerDBView toast={toast}/>}
        {view==='brand-store-mgmt'&&<BrandStoreView toast={toast}/>}
        {view==='scheduler'&&<SchedulerView toast={toast}/>}
      </main>

      <footer>
        <div style={{maxWidth:1440,margin:'0 auto',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
          <span>프랜차이즈 고객 마케팅 CRM 통합 플랫폼 — 구현 데모</span>
          <div style={{display:'flex',gap:8}}>
            {['React 18','TypeScript','Node.js + Express','PostgreSQL + Prisma','Bull Queue + Redis','AWS S3','Recharts'].map(t=>(
              <span key={t} style={{background:'rgba(26,152,152,.2)',color:'#7ECECE',padding:'2px 8px',borderRadius:2,fontSize:11,fontWeight:600}}>{t}</span>
            ))}
          </div>
        </div>
      </footer>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
