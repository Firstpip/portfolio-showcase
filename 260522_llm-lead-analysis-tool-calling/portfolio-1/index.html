<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI 태양광 리드 분석 오케스트레이터 — 맞춤 구현 데모</title>
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.8/dist/web/static/pretendard.min.css" rel="stylesheet">
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://unpkg.com/prop-types@15.8.1/prop-types.min.js"></script>
<script src="https://unpkg.com/react-is@18.2.0/umd/react-is.production.min.js"></script>
<script src="https://unpkg.com/recharts@2.12.7/umd/Recharts.js"></script>
<script src="https://unpkg.com/lucide-react@latest/dist/umd/lucide-react.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body,#root{width:100%;min-height:100vh;}
body{font-family:'Pretendard',-apple-system,sans-serif;background:#F7F8FB;color:#1A2332;}

@keyframes fadeIn{from{opacity:0;}to{opacity:1;}}
@keyframes slideUp{from{opacity:0;transform:translateY(16px);}to{opacity:1;transform:translateY(0);}}
@keyframes pulse{0%,100%{opacity:.5;}50%{opacity:1;}}
@keyframes spin{from{transform:rotate(0deg);}to{transform:rotate(360deg);}}
@keyframes blink{0%,80%,100%{opacity:0;}40%{opacity:1;}}
@keyframes barGrow{from{transform:scaleX(0);}to{transform:scaleX(1);}}

.app-wrap{width:100%;min-height:100vh;display:flex;flex-direction:column;}

/* Topnav */
.topnav{width:100%;background:#1B4F8A;padding:0 28px;height:58px;display:flex;align-items:center;gap:16px;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.15);}
.nav-brand{font-size:15px;font-weight:800;color:#fff;display:flex;align-items:center;gap:8px;white-space:nowrap;}
.nav-tag{background:#F59E0B;color:#fff;font-size:11px;font-weight:700;padding:2px 7px;border-radius:4px;margin-left:4px;}
.nav-meta{margin-left:auto;font-size:12px;color:rgba(255,255,255,.6);}

/* Hero tab bar */
.tab-bar{width:100%;background:linear-gradient(135deg,#1B4F8A 0%,#2563C0 100%);padding:14px 28px;border-bottom:1px solid rgba(255,255,255,.1);}
.tab-bar-inner{display:flex;gap:6px;max-width:1300px;margin:0 auto;flex-wrap:wrap;}
.tab-btn{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.18);border-radius:7px;color:rgba(255,255,255,.8);padding:8px 16px;font-size:13px;font-weight:600;cursor:pointer;transition:all .2s;font-family:inherit;white-space:nowrap;}
.tab-btn:hover{background:rgba(255,255,255,.2);color:#fff;}
.tab-btn.active{background:#fff;color:#1B4F8A;font-weight:800;border-color:#fff;box-shadow:0 2px 8px rgba(0,0,0,.1);}

/* Content */
.content{flex:1;width:100%;padding:28px;max-width:1300px;margin:0 auto;}
.screen-wrap{animation:fadeIn .25s ease;}

.section-title{font-size:20px;font-weight:800;color:#1A2332;display:flex;align-items:center;gap:9px;margin-bottom:4px;}
.section-sub{font-size:13px;color:#5A6478;margin-bottom:22px;}

/* Cards */
.card{background:#fff;border-radius:8px;box-shadow:0 2px 14px rgba(27,79,138,.08),0 1px 3px rgba(0,0,0,.04);padding:20px;}
.card-hover{transition:transform .18s,box-shadow .18s;}
.card-hover:hover{transform:translateY(-3px);box-shadow:0 8px 28px rgba(27,79,138,.13);}

/* Badge */
.badge{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:700;}
.badge-green{background:#DCFCE7;color:#15803D;}
.badge-amber{background:#FEF3C7;color:#B45309;}
.badge-red{background:#FEE2E2;color:#B91C1C;}
.badge-blue{background:#DBEAFE;color:#1D4ED8;}
.badge-gray{background:#F3F4F6;color:#6B7280;}

/* Chat layout */
.chat-grid{display:grid;grid-template-columns:1fr 370px;gap:20px;}
.chat-panel{display:flex;flex-direction:column;height:520px;border-radius:8px;overflow:hidden;box-shadow:0 2px 14px rgba(27,79,138,.08);}
.chat-header{padding:12px 16px;background:#F7F8FB;border-bottom:1px solid #E8EDF4;display:flex;align-items:center;gap:8px;}
.chat-dot{width:8px;height:8px;border-radius:50%;}
.chat-messages{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:12px;background:#fff;}
.msg{display:flex;gap:9px;animation:slideUp .25s ease;}
.msg.user{flex-direction:row-reverse;}
.avatar{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;flex-shrink:0;}
.ai-avatar{background:#1B4F8A;color:#fff;}
.user-avatar{background:#F59E0B;color:#fff;}
.bubble{max-width:78%;padding:10px 14px;border-radius:10px;font-size:13.5px;line-height:1.6;}
.ai-bubble{background:#F0F4FB;color:#1A2332;border-top-left-radius:3px;}
.user-bubble{background:#1B4F8A;color:#fff;border-top-right-radius:3px;}
.chat-input-row{padding:12px 14px;background:#fff;border-top:1px solid #E8EDF4;display:flex;gap:8px;}
.chat-input{flex:1;border:1.5px solid #D0D8E8;border-radius:8px;padding:9px 13px;font-size:13.5px;font-family:inherit;outline:none;color:#1A2332;}
.chat-input:focus{border-color:#1B4F8A;box-shadow:0 0 0 3px rgba(27,79,138,.1);}
.send-btn{background:#1B4F8A;color:#fff;border:none;border-radius:8px;padding:9px 15px;cursor:pointer;font-family:inherit;font-size:13px;font-weight:700;display:flex;align-items:center;gap:5px;transition:background .2s;}
.send-btn:hover{background:#2563C0;}
.dot-typing span{display:inline-block;width:5px;height:5px;border-radius:50%;background:#5A6478;animation:blink 1.2s infinite;margin:0 1.5px;}
.dot-typing span:nth-child(2){animation-delay:.2s;}
.dot-typing span:nth-child(3){animation-delay:.4s;}

/* JSON panel */
.json-panel{display:flex;flex-direction:column;gap:14px;}
.code-box{background:#0B1929;border-radius:8px;padding:14px 16px;font-size:12px;font-family:'Courier New',monospace;color:#C8D8E8;line-height:1.75;overflow-y:auto;}
.jk{color:#7DD3FC;}.jv-str{color:#86EFAC;}.jv-num{color:#FCD34D;}.jv-bool{color:#F87171;}.jv-null{color:#94A3B8;}

/* Pipeline */
.pipeline-step{display:flex;gap:14px;align-items:flex-start;padding:15px 16px;border-radius:8px;border-left:4px solid #E8EDF4;background:#fff;box-shadow:0 1px 6px rgba(27,79,138,.06);cursor:pointer;transition:all .2s;}
.pipeline-step:hover{box-shadow:0 4px 14px rgba(27,79,138,.1);}
.pipeline-step.s-done{border-left-color:#22C55E;}
.pipeline-step.s-fallback{border-left-color:#F59E0B;background:#FFFBEB;}
.pipeline-step.s-running{border-left-color:#1B4F8A;background:#EFF6FF;}
.pipeline-step.s-idle{border-left-color:#E8EDF4;opacity:.55;}
.step-icon-wrap{width:38px;height:38px;border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.step-connector{width:2px;height:18px;margin:0 18px;background:#E8EDF4;}
.step-connector.active{background:#22C55E;}
.step-io-box{background:#F7F8FB;border-radius:6px;padding:9px 12px;font-size:11.5px;font-family:monospace;color:#1A2332;margin-top:8px;word-break:break-all;line-height:1.65;}

/* API */
.api-card{background:#fff;border-radius:8px;border:1px solid #E8EDF4;padding:16px;display:flex;flex-direction:column;gap:10px;box-shadow:0 1px 5px rgba(27,79,138,.05);}
.fallback-box{background:linear-gradient(135deg,#FFFBEB,#FEF3C7);border:1px solid rgba(245,158,11,.25);border-radius:8px;padding:13px 14px;}
.toggle{width:42px;height:24px;border-radius:12px;background:#D0D8E8;cursor:pointer;position:relative;transition:background .2s;flex-shrink:0;}
.toggle.on{background:#1B4F8A;}
.toggle::after{content:'';width:20px;height:20px;border-radius:50%;background:#fff;position:absolute;top:2px;left:2px;transition:transform .2s;box-shadow:0 1px 3px rgba(0,0,0,.2);}
.toggle.on::after{transform:translateX(18px);}

/* KPI */
.kpi-row{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:24px;}
.kpi-card{background:#fff;border-radius:8px;padding:20px;border-top:4px solid;box-shadow:0 2px 10px rgba(27,79,138,.07);}
.kpi-label{font-size:11px;font-weight:700;color:#5A6478;text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px;}
.kpi-value{font-size:30px;font-weight:900;line-height:1;}
.kpi-unit{font-size:14px;font-weight:600;color:#5A6478;margin-left:3px;}
.kpi-note{font-size:11px;color:#5A6478;margin-top:5px;}

/* Table */
.tbl{width:100%;border-collapse:collapse;}
.tbl th{background:#F7F8FB;padding:10px 14px;text-align:left;font-size:11.5px;font-weight:700;color:#5A6478;text-transform:uppercase;letter-spacing:.3px;border-bottom:2px solid #E8EDF4;}
.tbl td{padding:12px 14px;font-size:13px;border-bottom:1px solid #F0F2F5;vertical-align:middle;}
.tbl tr:hover td{background:#F7F8FB;}
.tbl tr{cursor:pointer;}

/* Modal */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.45);display:flex;align-items:center;justify-content:center;z-index:999;animation:fadeIn .18s;}
.modal{background:#fff;border-radius:12px;padding:28px;width:440px;max-width:90vw;box-shadow:0 24px 64px rgba(0,0,0,.18);}

/* Buttons */
.btn-primary{background:#1B4F8A;color:#fff;border:none;border-radius:8px;padding:10px 20px;cursor:pointer;font-family:inherit;font-size:13.5px;font-weight:700;display:inline-flex;align-items:center;gap:7px;transition:background .2s;}
.btn-primary:hover{background:#2563C0;}
.btn-ghost{background:#F7F8FB;color:#1A2332;border:1px solid #E8EDF4;border-radius:8px;padding:10px 18px;cursor:pointer;font-family:inherit;font-size:13.5px;font-weight:600;transition:background .2s;}
.btn-ghost:hover{background:#EFF6FF;}
.spinner{width:14px;height:14px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite;}

/* Run button */
.run-btn{background:linear-gradient(90deg,#1B4F8A,#2563C0);color:#fff;border:none;border-radius:8px;padding:10px 20px;cursor:pointer;font-family:inherit;font-size:13.5px;font-weight:700;display:inline-flex;align-items:center;gap:8px;box-shadow:0 3px 12px rgba(27,79,138,.3);transition:opacity .2s;}
.run-btn:hover{opacity:.88;}
.run-btn:disabled{opacity:.6;cursor:not-allowed;}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef, Component } = React;
const { LineChart, Line, XAxis, YAxis, CartesianGrid, Tooltip, ResponsiveContainer, BarChart, Bar } = Recharts;
const LR = window.LucideReact || {};
const Sun = LR.Sun || LR.SunIcon, Send = LR.Send || LR.SendIcon, Zap = LR.Zap || LR.ZapIcon,
  Globe = LR.Globe || LR.GlobeIcon, BarChart3 = LR.BarChart3 || LR.BarChart2,
  CheckCircle2 = LR.CheckCircle2 || LR.CheckCircle || LR.CircleCheckBig,
  AlertTriangle = LR.AlertTriangle || LR.TriangleAlert,
  Clock = LR.Clock || LR.ClockIcon, Play = LR.Play || LR.PlayIcon,
  Database = LR.Database || LR.DatabaseIcon, RefreshCw = LR.RefreshCw || LR.RotateCw,
  X = LR.X || LR.XIcon, MessageSquare = LR.MessageSquare || LR.MessageSquareIcon,
  ChevronDown = LR.ChevronDown || LR.ChevronDownIcon, Building2 = LR.Building2 || LR.Building;

class ErrorBoundary extends Component {
  constructor(p) { super(p); this.state = {err:false}; }
  static getDerivedStateFromError() { return {err:true}; }
  componentDidCatch(e) { console.error('Screen render error:', e.message); }
  render() {
    if (this.state.err) return <div style={{padding:32,textAlign:'center',color:'#5A6478'}}>화면을 불러오는 중입니다...</div>;
    return this.props.children;
  }
}

/* ─────────── Mock Data ─────────── */
const CHAT = [
  {id:1,role:'ai',text:'안녕하세요. 태양광 발전사업 관련 문의를 자연어로 입력해 주시면 자동으로 분석해 드립니다.'},
  {id:2,role:'user',text:'경기도 화성시에 산업용 500kW 규모 태양광 발전소를 설치하고 싶어요. 예산은 8억원 정도 생각하고 있습니다.'},
  {id:3,role:'ai',text:'입력하신 내용을 분석했습니다.\n\n다음 정보가 필요합니다:\n지붕형(옥상 설치)과 지상형(야외 설치) 중 어느 유형을 원하시나요?'},
  {id:4,role:'user',text:'지상형으로 검토하고 있습니다.'},
  {id:5,role:'ai',text:'리드 정보 추출이 완료되었습니다. 우측 패널에서 구조화된 JSON을 확인할 수 있습니다.'},
];

const JSON_DATA = [
  ['location','경기도 화성시'],['capacity_kw',500],['type','지상형'],
  ['purpose','산업용'],['budget_krw',800000000],['status','COMPLETE'],
  ['confidence',0.96],['clarifications',1],['missing_fields','[]'],
];

const STEPS = [
  {id:1,name:'리드 추출 엔진 (모듈 1)',tool:'LeadExtractorTool',color:'#1B4F8A',status:'done',dur:'0.8s',
    input:'자연어 문의 텍스트 (사용자 입력)',
    output:'{"location":"경기도 화성시","capacity_kw":500,"type":"지상형","purpose":"산업용"}',
    note:'GPT-4o Function Calling으로 4개 핵심 필드 추출 완료'},
  {id:2,name:'공공 API 연동 (일사량)',tool:'PublicAPITool',color:'#22C55E',status:'done',dur:'1.2s',
    input:'{"region":"경기도 화성시","period":"2024-01~2024-12"}',
    output:'{"avg_irradiance":4.23,"peak":"June 5.81 kWh/m²/day","source":"기상청"}',
    note:'기상청 태양 일사량 API 정상 응답'},
  {id:3,name:'외부 API 통합 레이어',tool:'ExternalAPITool',color:'#F59E0B',status:'fallback',dur:'5.1s',
    input:'{"capacity_kw":500,"type":"지상형","budget":800000000}',
    output:'{"fallback":true,"reason":"timeout>5s","estimated_match_count":12}',
    note:'클라이언트 매칭 API 타임아웃 → LLM Fallback 응답 생성'},
  {id:4,name:'Dummy RAG Tool (확장 준비)',tool:'DummyRAGTool',color:'#8B5CF6',status:'done',dur:'0.2s',
    input:'{"query":"지상형 500kW 경기도 시공사"}',
    output:'{"matched_docs":0,"interface":"ready","note":"RAG 인터페이스 사전 정의 완료"}',
    note:'향후 지식베이스 연동을 위한 인터페이스 실행 확인'},
];

const APIS = [
  {id:1,name:'기상청 일사량 API',ep:'/api/solar/irradiance',status:'online',latency:'142ms',last:'2분 전'},
  {id:2,name:'한국에너지공단 API',ep:'/api/energy/stats',status:'online',latency:'231ms',last:'7분 전'},
  {id:3,name:'클라이언트 매칭 API',ep:'/api/client/match',status:'timeout',latency:'5,000ms+',last:'18분 전'},
];

const IRRADIANCE = [
  {m:'1월',v:2.14},{m:'2월',v:2.87},{m:'3월',v:3.81},{m:'4월',v:4.52},
  {m:'5월',v:5.23},{m:'6월',v:5.81},{m:'7월',v:4.92},{m:'8월',v:4.74},
  {m:'9월',v:4.31},{m:'10월',v:3.52},{m:'11월',v:2.63},{m:'12월',v:2.14},
];

const CONTRACTORS = [
  {id:1,name:'한양솔라에너지',region:'경기도',exp:'산업용 설치 87건',rating:'4.8',tag:'추천'},
  {id:2,name:'그린파워시스템즈',region:'서울/경기',exp:'산업용 설치 64건',rating:'4.7',tag:'추천'},
  {id:3,name:'한국에너지솔루션',region:'전국',exp:'대형 프로젝트 23건',rating:'4.6',tag:'검토'},
  {id:4,name:'서울에코솔라',region:'수도권',exp:'산업용 설치 41건',rating:'4.5',tag:'검토'},
];

/* ─────────── Chatbot Screen ─────────── */
function ChatScreen() {
  const [msgs, setMsgs] = useState(CHAT);
  const [input, setInput] = useState('');
  const [typing, setTyping] = useState(false);
  const bottomRef = useRef(null);

  useEffect(() => { bottomRef.current?.scrollIntoView({behavior:'smooth'}); }, [msgs, typing]);

  const send = () => {
    if (!input.trim()) return;
    const txt = input.trim();
    setInput('');
    setMsgs(p => [...p, {id:p.length+1, role:'user', text:txt}]);
    setTyping(true);
    setTimeout(() => {
      setTyping(false);
      setMsgs(p => [...p, {id:p.length+1, role:'ai', text:'추가 정보를 처리 중입니다. 설치 면적 제약이나 계통 연계 조건이 있으시면 알려주세요.'}]);
    }, 1700);
  };

  return (
    <div className="screen-wrap">
      <div className="section-title">{MessageSquare && <MessageSquare size={20} color="#1B4F8A"/>}자연어 리드 입력 및 추출</div>
      <div className="section-sub">GPT-4o Function Calling으로 자연어 문의에서 핵심 필드를 자동 추출하고 구조화합니다</div>
      <div className="chat-grid">
        <div className="chat-panel">
          <div className="chat-header">
            <div className="chat-dot" style={{background:'#22C55E'}}/>
            <span style={{fontSize:13,fontWeight:700}}>AI 리드 분석 에이전트</span>
            <span style={{marginLeft:'auto'}}><span className="badge badge-green">분석 준비 완료</span></span>
          </div>
          <div className="chat-messages">
            {msgs.map(m => (
              <div key={m.id} className={`msg ${m.role}`}>
                <div className={`avatar ${m.role==='ai'?'ai-avatar':'user-avatar'}`}>{m.role==='ai'?'AI':'나'}</div>
                <div className={`bubble ${m.role==='ai'?'ai-bubble':'user-bubble'}`} style={{whiteSpace:'pre-line'}}>{m.text}</div>
              </div>
            ))}
            {typing && (
              <div className="msg ai">
                <div className="avatar ai-avatar">AI</div>
                <div className="bubble ai-bubble"><span className="dot-typing"><span/><span/><span/></span></div>
              </div>
            )}
            <div ref={bottomRef}/>
          </div>
          <div className="chat-input-row">
            <input className="chat-input" value={input} onChange={e=>setInput(e.target.value)} onKeyDown={e=>e.key==='Enter'&&send()} placeholder="태양광 발전 관련 문의를 자연어로 입력하세요..."/>
            <button className="send-btn" onClick={send}>{Send&&<Send size={14}/>}전송</button>
          </div>
        </div>
        <div className="json-panel">
          <div className="card" style={{padding:16}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12}}>
              <span style={{fontSize:13,fontWeight:700}}>추출된 리드 JSON</span>
              <span className="badge badge-green">완료 (신뢰도 96%)</span>
            </div>
            <div className="code-box" style={{maxHeight:220}}>
              <span>{'{'}</span><br/>
              {JSON_DATA.map(([k,v],i) => (
                <div key={k} style={{paddingLeft:14}}>
                  <span className="jk">"{k}"</span>{': '}
                  {typeof v === 'string'?<span className="jv-str">"{v}"</span>:typeof v === 'number'?<span className="jv-num">{v}</span>:<span className="jv-str">{String(v)}</span>}{i<JSON_DATA.length-1?',':''}
                </div>
              ))}
              <span>{'}'}</span>
            </div>
          </div>
          <div className="card" style={{padding:16}}>
            <div style={{fontSize:13,fontWeight:700,marginBottom:10}}>Clarification 이력</div>
            <div style={{display:'flex',flexDirection:'column',gap:8}}>
              <div style={{padding:'8px 12px',background:'#F0F4FB',borderRadius:7,fontSize:12}}>
                <div style={{fontWeight:600,marginBottom:3}}>누락 필드: type (설치 유형)</div>

/* ─────────── Tool Pipeline Screen ─────────── */
function PipelineScreen() {
  const [running, setRunning] = useState(false);
  const [active, setActive] = useState(4);
  const [open, setOpen] = useState(null);

  const run = () => {
    setRunning(true); setActive(0); setOpen(null);
    let i = 0;
    const t = setInterval(() => {
      i++;
      setActive(i);
      if (i >= STEPS.length) { clearInterval(t); setRunning(false); setActive(99); }
    }, 950);
  };

  const getClass = (step, idx) => {
    if (running && idx >= active) return 's-idle';
    if (running && idx === active-1) return 's-running';
    if (step.status === 'fallback') return 's-fallback';
    return 's-done';
  };

  return (
    <div className="screen-wrap">
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:22}}>
        <div>
          <div className="section-title">{Zap&&<Zap size={20} color="#1B4F8A"/>}에이전틱 오케스트레이터 Tool Calling 파이프라인</div>
          <div className="section-sub">LangChain ReAct Agent가 리드 분석 결과에 따라 Tool을 자동 선택·호출합니다</div>
        </div>
        <button className="run-btn" onClick={run} disabled={running}>
          {running ? <><div className="spinner"/>실행 중...</> : <>{Play&&<Play size={14}/>}파이프라인 실행</>}
        </button>
      </div>
      <div style={{display:'grid',gridTemplateColumns:'1fr 300px',gap:20}}>
        <div style={{display:'flex',flexDirection:'column',gap:0}}>
          {STEPS.map((step, idx) => {
            const cls = getClass(step, idx);
            return (
              <div key={step.id}>
                <div className={`pipeline-step ${cls}`} onClick={()=>setOpen(open===step.id?null:step.id)}>
                  <div className="step-icon-wrap" style={{background:step.color+'1A'}}>
                    {idx===0?(MessageSquare?<MessageSquare size={17} color={step.color}/>:null):
                      idx===1?(Globe?<Globe size={17} color={step.color}/>:null):
                      idx===2?(RefreshCw?<RefreshCw size={17} color={step.color}/>:null):
                      (Database?<Database size={17} color={step.color}/>:null)}
                  </div>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                      <span style={{fontSize:14,fontWeight:700}}>{step.name}</span>
                      <div style={{display:'flex',alignItems:'center',gap:7,flexShrink:0}}>
                        <span style={{fontSize:11,color:'#5A6478'}}>{step.dur}</span>
                        {cls==='s-done'?(CheckCircle2?<CheckCircle2 size={15} color="#22C55E"/>:<span style={{color:'#22C55E',fontWeight:700,fontSize:13}}>✓</span>):
                         cls==='s-fallback'?(AlertTriangle?<AlertTriangle size={15} color="#F59E0B"/>:<span style={{color:'#F59E0B',fontWeight:700,fontSize:13}}>!</span>):
                         cls==='s-running'?<div className="spinner" style={{borderTopColor:'#1B4F8A',borderColor:'rgba(27,79,138,.25)'}}/>:
                         (Clock?<Clock size={15} color="#D0D8E8"/>:<span style={{color:'#D0D8E8',fontSize:13}}>○</span>)}
                      </div>
                    </div>
                    <div style={{fontSize:12,color:'#5A6478',marginTop:2}}>{step.note}</div>
                    {open===step.id && (
                      <div style={{marginTop:10}}>
                        <div className="step-io-box" style={{marginBottom:6}}><b>Input: </b>{step.input}</div>
                        <div className="step-io-box"><b>Output: </b>{step.output}</div>
                      </div>
                    )}
                  </div>
                </div>
                {idx < STEPS.length-1 && <div className={`step-connector ${cls!=='s-idle'?'active':''}`}/>}
              </div>
            );
          })}
          <div style={{marginTop:10,fontSize:12,color:'#5A6478'}}>각 단계 카드를 클릭하면 입력/출력 상세를 확인할 수 있습니다</div>
        </div>
        <div style={{display:'flex',flexDirection:'column',gap:14}}>
          <div className="card" style={{padding:16}}>
            <div style={{fontSize:13,fontWeight:700,marginBottom:12}}>실행 결과 요약</div>
            {[{label:'완료',n:3,c:'#22C55E'},{label:'Fallback',n:1,c:'#F59E0B'},{label:'대기',n:0,c:'#D0D8E8'}].map(s=>(
              <div key={s.label} style={{display:'flex',justifyContent:'space-between',padding:'7px 10px',background:'#F7F8FB',borderRadius:6,marginBottom:6,fontSize:13}}>
                <div style={{display:'flex',alignItems:'center',gap:7}}>
                  <div style={{width:8,height:8,borderRadius:'50%',background:s.c}}/>
                  <span>{s.label}</span>
                </div>
                <span style={{fontWeight:800,fontSize:16}}>{s.n}</span>
              </div>
            ))}
          </div>
          <div className="card" style={{padding:16}}>
            <div style={{fontSize:13,fontWeight:700,marginBottom:10}}>Tool 레지스트리</div>
            {STEPS.map(s=>(
              <div key={s.id} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'7px 0',borderBottom:'1px solid #F0F2F5',fontSize:12}}>
                <span style={{color:'#5A6478',fontSize:11}}>{s.tool}</span>
                <span className={`badge ${s.status==='done'?'badge-green':s.status==='fallback'?'badge-amber':'badge-gray'}`} style={{fontSize:10}}>
                  {s.status}
                </span>
              </div>
            ))}
          </div>
          <div className="card" style={{padding:16}}>
            <div style={{fontSize:12,fontWeight:700,color:'#5A6478',marginBottom:8}}>총 실행 시간</div>
            <div style={{fontSize:22,fontWeight:800,color:'#1B4F8A'}}>7.3<span style={{fontSize:13,fontWeight:600,color:'#5A6478'}}> 초</span></div>
            <div style={{fontSize:11,color:'#5A6478',marginTop:4}}>Fallback 포함 전체 파이프라인</div>
          </div>
        </div>
      </div>
    </div>
  );
}

        ))}
      </div>

      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:18}}>

          <div style={{fontSize:13,fontWeight:700,marginBottom:10}}>정상 응답 (기상청 일사량 API)</div>

{`{

          <div className="fallback-box">
            <div style={{fontSize:11.5,fontWeight:700,color:'#B45309',marginBottom:6}}>LLM 생성 Fallback 응답 (5.1초 후 활성화)</div>
            <div style={{fontSize:12.5,color:'#78350F',lineHeight:1.7}}>
