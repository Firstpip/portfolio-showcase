<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>태양광 AI 에이전트 플랫폼 — 구현 데모</title>
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.8/dist/web/static/pretendard.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/regular/style.css">
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://unpkg.com/prop-types@15.8.1/prop-types.min.js"></script>
<script src="https://unpkg.com/react-is@18.2.0/umd/react-is.production.min.js"></script>
<script src="https://unpkg.com/recharts@2.12.7/umd/Recharts.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body,#root{width:100%;min-height:100vh;}
body{font-family:'Pretendard',-apple-system,sans-serif;background:#F0FAF6;color:#0F2920;}

@keyframes fadeIn{from{opacity:0;}to{opacity:1;}}
@keyframes slideRight{from{opacity:0;transform:translateX(-20px);}to{opacity:1;transform:translateX(0);}}
@keyframes float{0%,100%{transform:translateY(0);}50%{transform:translateY(-6px);}}
@keyframes spin{from{transform:rotate(0deg);}to{transform:rotate(360deg);}}
@keyframes blink{0%,80%,100%{opacity:0;}40%{opacity:1;}}
@keyframes glow{0%,100%{box-shadow:0 0 0 0 rgba(14,122,94,.25);}50%{box-shadow:0 0 0 8px rgba(14,122,94,0);}}
@keyframes progressFill{from{width:0%;}to{width:var(--w);}}
@keyframes nodeActivate{from{transform:scale(0.85);opacity:0;}to{transform:scale(1);opacity:1;}}

.app-wrap{width:100%;min-height:100vh;display:flex;flex-direction:column;}

/* Global Nav (spa-modern) */
.global-nav{width:100%;background:rgba(255,255,255,.9);backdrop-filter:blur(16px);border-bottom:1px solid rgba(14,122,94,.1);padding:0 32px;height:62px;display:flex;align-items:center;gap:20px;position:sticky;top:0;z-index:100;box-shadow:0 1px 16px rgba(14,122,94,.06);}
.brand{font-size:16px;font-weight:800;color:#0E7A5E;display:flex;align-items:center;gap:9px;margin-right:12px;white-space:nowrap;}
.brand-dot{width:10px;height:10px;border-radius:50%;background:linear-gradient(135deg,#0E7A5E,#6366F1);animation:glow 2s infinite;}
.nav-links{display:flex;gap:2px;flex:1;}
.nav-link{background:none;border:none;padding:9px 16px;border-radius:10px;font-size:13.5px;font-weight:600;cursor:pointer;color:#4A6B60;font-family:inherit;transition:all .18s;white-space:nowrap;}
.nav-link:hover{background:#F0FAF6;color:#0E7A5E;}
.nav-link.active{background:linear-gradient(135deg,#0E7A5E20,#6366F110);color:#0E7A5E;font-weight:800;}
.nav-right{margin-left:auto;display:flex;align-items:center;gap:10px;}
.ws-badge{font-size:11px;font-weight:700;padding:4px 10px;border-radius:20px;background:#DCFCE7;color:#15803D;display:flex;align-items:center;gap:5px;}
.ws-dot{width:6px;height:6px;border-radius:50%;background:#22C55E;animation:glow 1.5s infinite;}

/* Page */
.page{flex:1;width:100%;padding:32px;max-width:1320px;margin:0 auto;animation:fadeIn .22s ease;}

.h1{font-size:24px;font-weight:900;color:#0F2920;margin-bottom:4px;}
.sub{font-size:13.5px;color:#4A6B60;margin-bottom:26px;}

/* Glass card */
.glass{background:rgba(255,255,255,.82);backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,.95);border-radius:16px;box-shadow:0 2px 16px rgba(14,122,94,.07);}
.glass-hover{transition:transform .18s,box-shadow .18s;}
.glass-hover:hover{transform:translateY(-4px);box-shadow:0 10px 32px rgba(14,122,94,.12);}

/* Badge */
.badge{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:700;}
.b-green{background:#DCFCE7;color:#15803D;}
.b-indigo{background:#EDE9FE;color:#6D28D9;}
.b-amber{background:#FEF3C7;color:#B45309;}
.b-slate{background:#F1F5F9;color:#475569;}
.b-teal{background:#CCFBF1;color:#0F766E;}

/* Agent graph */
.agent-graph{display:grid;grid-template-columns:1fr 80px 1fr 80px 1fr;align-items:center;gap:0;margin:24px 0;}
.agent-node{background:rgba(255,255,255,.9);border-radius:16px;padding:20px 16px;text-align:center;border:2px solid rgba(14,122,94,.15);animation:nodeActivate .4s ease;box-shadow:0 4px 16px rgba(14,122,94,.08);}
.agent-node.active{border-color:#0E7A5E;box-shadow:0 0 0 3px rgba(14,122,94,.15),0 4px 20px rgba(14,122,94,.12);}
.agent-node.idle{opacity:.45;}
.agent-icon{width:52px;height:52px;border-radius:14px;display:flex;align-items:center;justify-content:center;margin:0 auto 10px;font-size:24px;}
.agent-name{font-size:13px;font-weight:800;color:#0F2920;margin-bottom:4px;}
.agent-role{font-size:11px;color:#4A6B60;}
.agent-tools{margin-top:10px;display:flex;flex-wrap:wrap;gap:5px;justify-content:center;}
.tool-chip{font-size:10.5px;font-weight:600;padding:3px 8px;border-radius:6px;background:#F0FAF6;color:#0E7A5E;border:1px solid rgba(14,122,94,.15);}
.pipe-connector{display:flex;align-items:center;justify-content:center;position:relative;}
.pipe-line{width:60px;height:3px;background:linear-gradient(90deg,#0E7A5E,#6366F1);border-radius:2px;position:relative;}
.pipe-arrow{position:absolute;right:-6px;width:0;height:0;border-top:6px solid transparent;border-bottom:6px solid transparent;border-left:10px solid #6366F1;}
.pipe-label{position:absolute;top:-20px;font-size:10px;font-weight:700;color:#4A6B60;white-space:nowrap;}

/* Tool cards */
.tool-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px;}
.tool-card{padding:18px;display:flex;flex-direction:column;gap:10px;cursor:pointer;}
.tool-status{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
.tool-stat-bar{height:6px;border-radius:3px;background:#E8F5F0;overflow:hidden;}
.tool-stat-fill{height:100%;border-radius:3px;background:linear-gradient(90deg,#0E7A5E,#16A37E);}

/* Streaming chat */
.chat-wrap{display:grid;grid-template-columns:1fr 300px;gap:18px;}
.s-chat{display:flex;flex-direction:column;height:540px;border-radius:16px;overflow:hidden;}
.s-chat-header{padding:14px 18px;background:linear-gradient(135deg,#0E7A5E,#16A37E);color:#fff;display:flex;align-items:center;gap:10px;}
.s-messages{flex:1;overflow-y:auto;padding:18px;background:rgba(255,255,255,.85);display:flex;flex-direction:column;gap:13px;}
.s-msg{display:flex;gap:9px;animation:slideRight .22s ease;}
.s-msg.user{flex-direction:row-reverse;}
.s-avatar{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;flex-shrink:0;}
.s-bubble{max-width:76%;padding:11px 15px;border-radius:12px;font-size:13.5px;line-height:1.65;}
.ai-s{background:rgba(14,122,94,.1);color:#0F2920;border-top-left-radius:4px;}
.user-s{background:linear-gradient(135deg,#0E7A5E,#16A37E);color:#fff;border-top-right-radius:4px;}
.tool-inline{background:rgba(99,102,241,.08);border:1px solid rgba(99,102,241,.2);border-radius:9px;padding:9px 12px;margin:4px 0;font-size:12px;}
.stream-cursor{display:inline-block;width:2px;height:14px;background:#0E7A5E;margin-left:2px;animation:blink .8s infinite;}
.s-input-row{padding:13px 16px;background:rgba(255,255,255,.9);border-top:1px solid rgba(14,122,94,.1);display:flex;gap:8px;}
.s-input{flex:1;border:1.5px solid rgba(14,122,94,.2);border-radius:10px;padding:10px 14px;font-size:13.5px;font-family:inherit;outline:none;background:rgba(255,255,255,.9);}
.s-input:focus{border-color:#0E7A5E;box-shadow:0 0 0 3px rgba(14,122,94,.1);}
.s-send{background:linear-gradient(135deg,#0E7A5E,#16A37E);color:#fff;border:none;border-radius:10px;padding:10px 16px;cursor:pointer;font-family:inherit;font-size:13px;font-weight:700;display:flex;align-items:center;gap:5px;}

/* Analytics */
.filter-row{display:flex;gap:10px;margin-bottom:20px;align-items:center;}
.filter-select{border:1.5px solid rgba(14,122,94,.2);border-radius:9px;padding:8px 13px;font-size:13px;font-family:inherit;background:#fff;color:#0F2920;outline:none;cursor:pointer;}
.kpi-row{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:24px;}
.kpi-card{padding:18px;border-radius:16px;border-left:4px solid;}
.kpi-label{font-size:11px;font-weight:700;color:#4A6B60;text-transform:uppercase;letter-spacing:.4px;margin-bottom:6px;}
.kpi-val{font-size:26px;font-weight:900;line-height:1;}
.kpi-u{font-size:13px;font-weight:600;color:#4A6B60;margin-left:2px;}
.kpi-note{font-size:11px;color:#4A6B60;margin-top:4px;}

/* Modal */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);display:flex;align-items:center;justify-content:center;z-index:999;animation:fadeIn .18s;backdrop-filter:blur(3px);}
.modal{background:#fff;border-radius:20px;padding:28px;width:460px;max-width:90vw;box-shadow:0 24px 64px rgba(0,0,0,.15);}

/* Buttons */
.btn-teal{background:linear-gradient(135deg,#0E7A5E,#16A37E);color:#fff;border:none;border-radius:10px;padding:10px 20px;cursor:pointer;font-family:inherit;font-size:13.5px;font-weight:700;display:inline-flex;align-items:center;gap:7px;}
.btn-outline{background:none;border:1.5px solid rgba(14,122,94,.3);border-radius:10px;padding:10px 18px;cursor:pointer;font-family:inherit;font-size:13.5px;font-weight:600;color:#0E7A5E;}
.spinner{width:14px;height:14px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite;}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef } = React;
const { AreaChart, Area, BarChart, Bar, XAxis, YAxis, CartesianGrid, Tooltip, Legend, ResponsiveContainer, RadarChart, Radar, PolarGrid, PolarAngleAxis } = Recharts;

/* ─────────── Mock Data ─────────── */
const AGENTS = [
  {id:1,name:'리드 분석 에이전트',role:'자연어 → JSON 구조화',icon:'ph ph-brain',color:'#0E7A5E',tools:['LeadExtractorTool','ClarificationTool'],active:true},
  {id:2,name:'매칭 에이전트',role:'시공사 후보 선별',icon:'ph ph-handshake',color:'#6366F1',tools:['ExternalAPITool','RankingTool'],active:true},
  {id:3,name:'추정 에이전트',role:'수익·비용 추정',icon:'ph ph-chart-line-up',color:'#F59E0B',tools:['PublicAPITool','EstimationTool'],active:false},
];

const TOOLS = [
  {id:1,name:'LeadExtractorTool',desc:'자연어 리드 추출 및 JSON 구조화',status:'online',calls:147,avgMs:820,health:96},
  {id:2,name:'PublicAPITool',desc:'기상청 일사량 공공 API 연동',status:'online',calls:132,avgMs:230,health:100},
  {id:3,name:'ExternalAPITool',desc:'클라이언트 매칭/수익 API 연동',status:'degraded',calls:98,avgMs:3200,health:61},
  {id:4,name:'DummyRAGTool',desc:'RAG 지식베이스 연동 인터페이스 (준비)',status:'ready',calls:0,avgMs:0,health:100},
  {id:5,name:'ClarificationTool',desc:'누락 필드 자동 Clarification 생성',status:'online',calls:89,avgMs:410,health:98},
  {id:6,name:'EstimationTool',desc:'태양광 발전량·ROI 추정 (Dummy)',status:'ready',calls:12,avgMs:180,health:100},
];

const STREAM_MSGS = [
  {id:1,role:'ai',text:'안녕하세요. 어떤 태양광 발전 프로젝트를 구상하고 계신가요?',streaming:false},
  {id:2,role:'user',text:'서울 강동구에 200kW 규모로 설치하고 싶은데, 예산이 4억원입니다.',streaming:false},
  {id:3,role:'tool',name:'LeadExtractorTool',result:'{"location":"서울 강동구","capacity_kw":200,"budget_krw":400000000}',streaming:false},
  {id:4,role:'ai',text:'리드 정보를 추출했습니다. 지붕형과 지상형 중 어느 것을 원하시나요?',streaming:false},
  {id:5,role:'user',text:'건물 옥상 설치입니다.',streaming:false},
  {id:6,role:'tool',name:'PublicAPITool',result:'{"avg_irradiance":3.87,"region":"서울 강동구","unit":"kWh/m²/day"}',streaming:false},
];

const AREA_DATA = [
  {d:'5/16',leads:12,success:10},{d:'5/17',leads:19,success:16},{d:'5/18',leads:8,success:7},
  {d:'5/19',leads:24,success:21},{d:'5/20',leads:17,success:15},{d:'5/21',leads:31,success:27},{d:'5/22',leads:14,success:12},
];

const TOOL_CALLS = [
  {name:'LeadExtractor',calls:147},{name:'PublicAPI',calls:132},{name:'ExternalAPI',calls:98},
  {name:'Clarification',calls:89},{name:'Estimation',calls:12},{name:'DummyRAG',calls:0},
];

const RADAR_DATA = [
  {region:'수도권',value:78},{region:'부산/경남',value:45},{region:'대구/경북',value:52},
  {region:'전라',value:38},{region:'강원',value:28},{region:'충청',value:61},
];

/* ─────────── Agent Pipeline Screen (main) ─────────── */
function AgentPipelineScreen() {
  const [running, setRunning] = useState(false);
  const [step, setStep] = useState(0);
  const [showNew, setShowNew] = useState(false);
  const [newAgent, setNewAgent] = useState('');

  const runPipeline = () => {
    setRunning(true); setStep(0);
    let s = 0;
    const t = setInterval(() => {
      s++;
      setStep(s);
      if (s >= 3) { clearInterval(t); setRunning(false); setStep(3); }
    }, 1100);
  };

  return (
    <div>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:6}}>
        <div>
          <div className="h1">다중 에이전트 협업 파이프라인</div>
          <div className="sub">LangChain LCEL Chain으로 전문 에이전트가 역할별 Tool을 독립 실행하고 결과를 집계합니다</div>
        </div>
        <button className="btn-teal" onClick={runPipeline} disabled={running}>
          {running ? <><div className="spinner"/>실행 중...</> : <><i className="ph ph-play"/>파이프라인 실행</>}
        </button>
      </div>

      <div className="glass" style={{padding:'24px 20px',marginBottom:20}}>
        <div className="agent-graph">
          {AGENTS.map((agent, idx) => (
            <>
              <div key={agent.id} className={`agent-node ${(step>idx||!running&&step===3)?'active':'idle'}`}
                   style={{animationDelay:`${idx*0.15}s`}}>
                <div className="agent-icon" style={{background:`${agent.color}18`}}>
                  <i className={agent.icon} style={{fontSize:26,color:agent.color}}/>
                </div>
                <div className="agent-name">{agent.name}</div>
                <div className="agent-role">{agent.role}</div>
                <div className="agent-tools">
                  {agent.tools.map(t=><span key={t} className="tool-chip">{t}</span>)}
                </div>
                {(step>idx||!running&&step===3) && (
                  <div style={{marginTop:10}}><span className="badge b-green"><i className="ph ph-check-circle"/> 실행 완료</span></div>
                )}
              </div>
              {idx < AGENTS.length-1 && (
                <div className="pipe-connector" key={`c${idx}`}>
                  <div className="pipe-line">
                    <span className="pipe-label">컨텍스트 전달</span>
                    <div className="pipe-arrow"/>
                  </div>
                </div>
              )}
            </>
          ))}
        </div>
      </div>

      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:18}}>
        <div className="glass" style={{padding:20}}>
          <div style={{fontSize:13,fontWeight:700,marginBottom:14}}>파이프라인 실행 결과</div>
          {step >= 3 || (!running && step===3) ? (
            <div style={{display:'flex',flexDirection:'column',gap:8}}>
              {[
                ['리드 분석','경기도 화성시 500kW 지상형 추출 완료','b-green'],
                ['시공사 매칭','12개사 후보 선별 (Fallback 포함)','b-teal'],
                ['수익 추정','연간 발전량 620,000 kWh 추정 (준비)','b-amber'],
              ].map(([k,v,b])=>(
                <div key={k} style={{padding:'10px 14px',background:'#F0FAF6',borderRadius:10,display:'flex',justifyContent:'space-between',alignItems:'center',fontSize:13}}>
                  <span style={{fontWeight:600}}>{k}</span>
                  <div style={{display:'flex',alignItems:'center',gap:8}}>
                    <span style={{fontSize:12,color:'#4A6B60'}}>{v}</span>
                    <span className={`badge ${b}`}><i className="ph ph-check"/></span>
                  </div>
                </div>
              ))}
            </div>
          ) : (
            <div style={{textAlign:'center',padding:'28px 0',color:'#4A6B60',fontSize:13}}>
              <i className="ph ph-play-circle" style={{fontSize:36,display:'block',marginBottom:8,color:'#0E7A5E'}}/>
              파이프라인 실행 버튼을 클릭하면 에이전트 협업을 시연합니다
            </div>
          )}
        </div>
        <div className="glass" style={{padding:20}}>
          <div style={{fontSize:13,fontWeight:700,marginBottom:14,display:'flex',justifyContent:'space-between',alignItems:'center'}}>
            에이전트 관리
            <button className="btn-outline" onClick={()=>setShowNew(true)} style={{fontSize:12,padding:'6px 12px'}}>
              <i className="ph ph-plus"/> 에이전트 추가
            </button>
          </div>
          {AGENTS.map(agent=>(
            <div key={agent.id} style={{display:'flex',alignItems:'center',gap:12,padding:'10px 0',borderBottom:'1px solid rgba(14,122,94,.08)'}}>
              <div style={{width:36,height:36,borderRadius:10,background:`${agent.color}18`,display:'flex',alignItems:'center',justifyContent:'center'}}>
                <i className={agent.icon} style={{fontSize:18,color:agent.color}}/>
              </div>
              <div style={{flex:1,minWidth:0}}>
                <div style={{fontSize:13,fontWeight:700}}>{agent.name}</div>
                <div style={{fontSize:11,color:'#4A6B60'}}>{agent.role}</div>
              </div>
              <span className={`badge ${agent.active?'b-green':'b-slate'}`}>{agent.active?'활성':'준비'}</span>
            </div>
          ))}
        </div>
      </div>

      {showNew && (
        <div className="overlay" onClick={()=>setShowNew(false)}>
          <div className="modal" onClick={e=>e.stopPropagation()}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:20}}>
              <div style={{fontSize:18,fontWeight:800}}>새 에이전트 등록</div>
              <button onClick={()=>setShowNew(false)} style={{background:'none',border:'none',cursor:'pointer',fontSize:20,color:'#4A6B60'}}>&times;</button>
            </div>
            {[['에이전트 이름','예: 추천 리포트 에이전트'],['역할 설명','예: 최종 리포트 생성 및 포맷팅'],['연동 Tool','예: ReportTool, PDFExportTool']].map(([label,ph])=>(
              <div key={label} style={{marginBottom:14}}>
                <div style={{fontSize:13,fontWeight:700,marginBottom:6}}>{label}</div>
                <input placeholder={ph} style={{width:'100%',border:'1.5px solid rgba(14,122,94,.2)',borderRadius:10,padding:'10px 13px',fontSize:13,fontFamily:'inherit',outline:'none'}}/>
              </div>
            ))}
            <div style={{display:'flex',gap:10,marginTop:4}}>
              <button className="btn-teal" onClick={()=>setShowNew(false)} style={{flex:1}}>에이전트 등록</button>
              <button className="btn-outline" onClick={()=>setShowNew(false)} style={{flex:1}}>취소</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

/* ─────────── Tool Dashboard Screen ─────────── */
function ToolDashboardScreen() {
  const [selected, setSelected] = useState(null);
  const [showAdd, setShowAdd] = useState(false);

  return (
    <div>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:6}}>
        <div>
          <div className="h1">Tool 인터페이스 관리 대시보드</div>
          <div className="sub">동적 Tool 레지스트리로 신규 Tool을 등록하고 호출 통계를 실시간 모니터링합니다</div>
        </div>
        <button className="btn-teal" onClick={()=>setShowAdd(true)}><i className="ph ph-plus"/>Tool 등록</button>

/* ─────────── Streaming Chat Screen ─────────── */
function StreamingChatScreen() {
  const [msgs, setMsgs] = useState(STREAM_MSGS);
  const [input, setInput] = useState('');
  const [streaming, setStreaming] = useState(false);
  const [wsStatus, setWsStatus] = useState('connected');
  const bottomRef = useRef(null);

  useEffect(() => { bottomRef.current?.scrollIntoView({behavior:'smooth'}); }, [msgs, streaming]);

  const send = () => {
    if (!input.trim() || streaming) return;
    const txt = input.trim(); setInput('');
    setMsgs(p=>[...p,{id:Date.now(),role:'user',text:txt,streaming:false}]);
    setStreaming(true);
    setTimeout(() => {
      setMsgs(p=>[...p,{id:Date.now()+1,role:'tool',name:'LeadExtractorTool',result:`{"location":"입력 지역","capacity_kw":"파싱 중..."}`,streaming:false}]);
    }, 800);
    setTimeout(() => {
      const reply = '요청하신 내용을 분석했습니다. 추가 정보를 수집하여 최적의 시공사를 매칭해 드리겠습니다.';
      let i = 0;
      const newId = Date.now()+2;
      setMsgs(p=>[...p,{id:newId,role:'ai',text:'',streaming:true}]);
      const t = setInterval(() => {
        i += 4;
        setMsgs(p=>p.map(m=>m.id===newId?{...m,text:reply.substring(0,i)}:m));
        if (i >= reply.length) { clearInterval(t); setStreaming(false); setMsgs(p=>p.map(m=>m.id===newId?{...m,streaming:false}:m)); }
      }, 40);
    }, 1600);
  };

  return (
    <div>
      <div className="h1">실시간 스트리밍 응답 인터페이스</div>
      <div className="sub">WebSocket 기반 LLM 토큰 스트리밍과 Tool 호출 중간 결과를 인라인 카드로 시각화합니다</div>

      <div className="chat-wrap">
        <div className="s-chat glass">
          <div className="s-chat-header">
            <div className={`ws-dot`} style={{flexShrink:0}}/>
            <span style={{fontWeight:700,fontSize:13}}>WebSocket 스트리밍 챗</span>
            <span className="badge b-green" style={{marginLeft:'auto',background:'rgba(255,255,255,.2)',color:'#fff'}}>{wsStatus==='connected'?'연결됨':'연결 중...'}</span>
          </div>
          <div className="s-messages">
            {msgs.map(m=>(
              <div key={m.id} className={`s-msg ${m.role==='user'?'user':''}`}>
                {m.role==='tool' ? (
                  <div className="tool-inline" style={{width:'100%'}}>
                    <div style={{fontSize:11.5,fontWeight:700,color:'#6366F1',marginBottom:4}}>
                      <i className="ph ph-wrench"/> Tool 호출: {m.name}
                    </div>
                    <div style={{fontSize:11,fontFamily:'monospace',color:'#4A6B60'}}>{m.result}</div>
                  </div>
                ) : (
                  <>
                    <div className={`s-avatar ${m.role==='ai'?'':'user-avatar'}`} style={{background:m.role==='ai'?'#0E7A5E20':'linear-gradient(135deg,#0E7A5E,#16A37E)'}}>
                      {m.role==='ai'?<i className="ph ph-robot" style={{fontSize:14,color:'#0E7A5E'}}/>:<span style={{color:'#fff',fontSize:12,fontWeight:800}}>나</span>}
                    </div>
                    <div className={`s-bubble ${m.role==='ai'?'ai-s':'user-s'}`}>
                      {m.text}{m.streaming && <span className="stream-cursor"/>}
                    </div>
                  </>
                )}
              </div>
            ))}
            <div ref={bottomRef}/>
          </div>
          <div className="s-input-row">
            <input className="s-input" value={input} onChange={e=>setInput(e.target.value)} onKeyDown={e=>e.key==='Enter'&&send()} disabled={streaming} placeholder={streaming?'AI 응답 생성 중...':'태양광 발전 프로젝트 관련 문의를 입력하세요...'}/>
            <button className="s-send" onClick={send} disabled={streaming}><i className="ph ph-paper-plane-tilt"/>전송</button>
          </div>
        </div>

        <div style={{display:'flex',flexDirection:'column',gap:14}}>
          <div className="glass" style={{padding:16}}>
            <div style={{fontSize:13,fontWeight:700,marginBottom:12}}>WebSocket 연결 상태</div>
            {[['연결 상태','Connected'],['스트리밍','활성'],['평균 첫 토큰','0.9초'],['연결 시간','23분 41초']].map(([k,v])=>(
              <div key={k} style={{display:'flex',justifyContent:'space-between',padding:'7px 0',borderBottom:'1px solid rgba(14,122,94,.08)',fontSize:12.5}}>
                <span style={{color:'#4A6B60'}}>{k}</span>
                <span style={{fontWeight:700,color:k==='스트리밍'?'#0E7A5E':'#0F2920'}}>{v}</span>
              </div>
            ))}
          </div>
          <div className="glass" style={{padding:16}}>
            <div style={{fontSize:13,fontWeight:700,marginBottom:10}}>이 세션의 Tool 호출</div>
            {[{tool:'LeadExtractorTool',n:3},{tool:'PublicAPITool',n:2},{tool:'ClarificationTool',n:1}].map(item=>(
              <div key={item.tool} style={{display:'flex',alignItems:'center',gap:9,padding:'7px 0',borderBottom:'1px solid rgba(14,122,94,.06)',fontSize:12}}>
                <i className="ph ph-wrench" style={{color:'#6366F1',fontSize:14}}/>
                <span style={{flex:1,color:'#4A6B60',fontSize:11.5}}>{item.tool}</span>
                <span style={{fontWeight:700,background:'#EDE9FE',color:'#6D28D9',padding:'2px 7px',borderRadius:6,fontSize:11}}>{item.n}회</span>
              </div>
            ))}
          </div>
          <div className="glass" style={{padding:16}}>
            <div style={{fontSize:12,fontWeight:700,color:'#4A6B60',marginBottom:8}}>구현 기술</div>
            {['FastAPI WebSocket','LLM 토큰 스트리밍','Zustand 상태 관리','인라인 Tool 카드'].map(t=>(
              <div key={t} style={{fontSize:12,padding:'5px 0',borderBottom:'1px solid rgba(14,122,94,.06)'}}>{t}</div>
            ))}
          </div>
        </div>
      </div>
    </div>
  );
}
