<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>거시경제 방어형 미국 주식 자동매매 시스템 — 맞춤 구현 데모</title>
<link rel="preconnect" href="https://cdn.jsdelivr.net">
<link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://unpkg.com/prop-types/prop-types.min.js"></script>
<script src="https://unpkg.com/react-is@18/umd/react-is.production.min.js"></script>
<script src="https://unpkg.com/recharts/umd/Recharts.js"></script>
<link rel="stylesheet" href="https://unpkg.com/@tabler/icons-webfont@latest/tabler-icons.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
html,body,#root{width:100%;min-height:100vh;font-family:'Pretendard',sans-serif;}
body{background:#0D1117;color:#F0F6FC;}
:root{
  --primary:#3B9EE8;--secondary:#1D6FAF;--accent:#F97316;
  --bg:#0D1117;--surface:#161B22;--surface2:#21262D;
  --text:#F0F6FC;--text2:#8B949E;
  --success:#3FB950;--warning:#D29922;--danger:#F85149;
  --border:#30363D;--radius:4px;
}

/* ─── Keyframes ─── */
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideInRight{from{opacity:0;transform:translateX(100%)}to{opacity:1;transform:translateX(0)}}
@keyframes slideOutRight{from{opacity:0;transform:translateX(0)}to{opacity:0;transform:translateX(100%)}}
@keyframes fadeInScale{from{opacity:0;transform:scale(0.95)}to{opacity:1;transform:scale(1)}}
@keyframes pulseDot{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.6;transform:scale(1.3)}}
@keyframes shimmer{0%{background-position:-400px 0}100%{background-position:400px 0}}
@keyframes barGrow{from{width:0}to{width:var(--bar-w,100%)}}
@keyframes toastSlide{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes spinRotate{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
@keyframes statusPulse{0%,100%{box-shadow:0 0 0 0 rgba(59,158,232,.4)}70%{box-shadow:0 0 0 8px rgba(59,158,232,0)}}

/* ─── Layout ─── */
.app-wrap{display:flex;flex-direction:column;width:100%;min-height:100vh;background:var(--bg);}
.topnav{display:flex;align-items:center;height:56px;background:var(--surface);border-bottom:1px solid var(--border);padding:0 24px;gap:0;position:sticky;top:0;z-index:100;flex-shrink:0;}
.brand{display:flex;align-items:center;gap:8px;font-weight:700;font-size:15px;color:var(--text);min-width:180px;white-space:nowrap;}
.brand .logo-dot{width:8px;height:8px;border-radius:50%;background:var(--primary);animation:pulseDot 2s ease-in-out infinite;}
.tab-bar{display:flex;flex:1;height:100%;gap:0;overflow-x:auto;scrollbar-width:none;}
.tab-bar::-webkit-scrollbar{display:none;}
.tab-btn{display:flex;align-items:center;height:100%;padding:0 16px;font-size:13px;font-weight:500;color:var(--text2);cursor:pointer;border:none;background:none;border-bottom:2px solid transparent;white-space:nowrap;transition:color .2s,border-color .2s;gap:6px;flex-shrink:0;}
.tab-btn:hover{color:var(--text);}
.tab-btn.active{color:var(--primary);border-bottom-color:var(--primary);}
.status-badge{display:flex;align-items:center;gap:6px;font-size:12px;font-weight:600;padding:4px 10px;border-radius:20px;min-width:80px;justify-content:center;flex-shrink:0;}
.status-badge.active{background:rgba(63,185,80,.15);color:var(--success);}
.status-badge.dormant{background:rgba(210,153,34,.15);color:var(--warning);}
.status-badge.killswitch{background:rgba(248,81,73,.15);color:var(--danger);animation:statusPulse 1.5s infinite;}
.status-dot{width:7px;height:7px;border-radius:50%;background:currentColor;}

.main-area{flex:1;width:100%;padding:24px;animation:fadeIn .3s ease;}
.page-content{animation:slideUp .3s ease;}

/* ─── Cards & UI ─── */
.kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:24px;}
.kpi-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px;cursor:pointer;transition:transform .2s,box-shadow .2s;position:relative;overflow:hidden;}
.kpi-card:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,.4);}
.kpi-card::after{content:'';position:absolute;inset:0;border-radius:var(--radius);opacity:0;background:linear-gradient(135deg,rgba(59,158,232,.06),transparent);transition:opacity .2s;}
.kpi-card:hover::after{opacity:1;}
.kpi-label{font-size:12px;color:var(--text2);margin-bottom:8px;display:flex;align-items:center;gap:6px;}
.kpi-value{font-size:24px;font-weight:700;color:var(--text);}
.kpi-value.positive{color:var(--success);}
.kpi-value.negative{color:var(--danger);}
.kpi-sub{font-size:11px;color:var(--text2);margin-top:4px;}

.section-title{font-size:14px;font-weight:600;color:var(--text);margin-bottom:16px;display:flex;align-items:center;gap:8px;}
.live-dot{width:6px;height:6px;border-radius:50%;background:var(--success);animation:pulseDot 1.5s ease-in-out infinite;}

.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px;margin-bottom:16px;}
.two-col{display:grid;grid-template-columns:1fr 380px;gap:20px;}

/* ─── Table ─── */
.data-table{width:100%;border-collapse:collapse;}
.data-table th{font-size:11px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.5px;padding:8px 12px;border-bottom:1px solid var(--border);text-align:left;}
.data-table td{font-size:13px;color:var(--text);padding:12px;border-bottom:1px solid var(--border);vertical-align:middle;}
.data-table tr:last-child td{border-bottom:none;}
.data-table tbody tr{cursor:pointer;transition:background .15s;}
.data-table tbody tr:hover{background:var(--surface2);}
.badge{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:3px;font-size:11px;font-weight:600;}
.badge-success{background:rgba(63,185,80,.15);color:var(--success);}
.badge-warning{background:rgba(210,153,34,.15);color:var(--warning);}
.badge-danger{background:rgba(248,81,73,.15);color:var(--danger);}
.badge-primary{background:rgba(59,158,232,.15);color:var(--primary);}
.badge-neutral{background:var(--surface2);color:var(--text2);}

.btn{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:var(--radius);font-size:13px;font-weight:600;cursor:pointer;border:none;transition:all .15s;}
.btn-primary{background:var(--primary);color:#fff;}
.btn-primary:hover{background:#2d8fd4;}
.btn-danger{background:var(--danger);color:#fff;}
.btn-danger:hover{background:#e0443c;}
.btn-ghost{background:transparent;color:var(--text2);border:1px solid var(--border);}
.btn-ghost:hover{background:var(--surface2);color:var(--text);}
.btn-sm{padding:5px 10px;font-size:12px;}

/* ─── Drawer ─── */
.drawer-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:200;display:flex;align-items:stretch;justify-content:flex-end;}
.drawer{width:460px;background:var(--surface);border-left:1px solid var(--border);height:100%;overflow-y:auto;animation:slideInRight .25s ease;}
.drawer-header{display:flex;align-items:center;justify-content:space-between;padding:20px 24px;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--surface);z-index:1;}
.drawer-body{padding:24px;}
.drawer-row{display:flex;justify-content:space-between;align-items:center;padding:12px 0;border-bottom:1px solid var(--border);}
.drawer-row:last-child{border-bottom:none;}
.drawer-label{font-size:12px;color:var(--text2);}
.drawer-value{font-size:13px;font-weight:600;color:var(--text);}

/* ─── Modal ─── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:300;display:flex;align-items:center;justify-content:center;}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:6px;width:480px;max-width:calc(100vw - 48px);animation:fadeInScale .2s ease;}
.modal-header{display:flex;align-items:center;justify-content:space-between;padding:20px 24px;border-bottom:1px solid var(--border);}
.modal-body{padding:24px;}
.modal-footer{padding:16px 24px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:8px;}
.form-label{font-size:12px;font-weight:600;color:var(--text2);margin-bottom:6px;display:block;}
.form-input{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);padding:8px 12px;color:var(--text);font-size:13px;font-family:inherit;margin-bottom:16px;}
.form-input:focus{outline:none;border-color:var(--primary);}

/* ─── Indicators ─── */
.indicator-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:24px;}
.indicator-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px;cursor:pointer;transition:transform .2s,box-shadow .2s;}
.indicator-card:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,.4);}
.indicator-name{font-size:13px;font-weight:600;color:var(--text2);margin-bottom:12px;}
.indicator-value{font-size:28px;font-weight:700;color:var(--text);margin-bottom:4px;}
.indicator-sub{font-size:12px;color:var(--text2);margin-bottom:12px;}
.condition-list{display:flex;flex-direction:column;gap:10px;}
.condition-item{display:flex;align-items:center;gap:10px;padding:12px 16px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);}
.condition-icon{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0;}
.condition-icon.ok{background:rgba(63,185,80,.15);color:var(--success);}
.condition-icon.warn{background:rgba(210,153,34,.15);color:var(--warning);}
.condition-text{font-size:13px;color:var(--text);}

/* ─── Progress ─── */
.progress-bar-wrap{height:6px;background:var(--surface2);border-radius:3px;overflow:hidden;flex:1;}
.progress-bar{height:100%;border-radius:3px;animation:barGrow .8s ease forwards;}

/* ─── TWAP table ─── */
.diff-positive{color:var(--danger);}
.diff-negative{color:var(--success);}

/* ─── Toggle ─── */
.toggle{width:38px;height:21px;background:var(--border);border-radius:11px;position:relative;cursor:pointer;transition:background .2s;border:none;}
.toggle.on{background:var(--primary);}
.toggle::after{content:'';position:absolute;top:3px;left:3px;width:15px;height:15px;border-radius:50%;background:#fff;transition:transform .2s;}
.toggle.on::after{transform:translateX(17px);}

/* ─── Toast ─── */
.toast-container{position:fixed;bottom:24px;right:24px;z-index:500;display:flex;flex-direction:column;gap:8px;}
.toast{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);padding:12px 16px;font-size:13px;color:var(--text);animation:toastSlide .25s ease;display:flex;align-items:center;gap:8px;min-width:240px;}
.toast.success{border-color:var(--success);}
.toast.danger{border-color:var(--danger);}

/* ─── Misc ─── */
.text-muted{color:var(--text2);font-size:12px;}
.icon-btn{background:none;border:none;cursor:pointer;color:var(--text2);padding:4px;border-radius:var(--radius);display:flex;align-items:center;justify-content:center;transition:color .15s,background .15s;}
.icon-btn:hover{color:var(--text);background:var(--surface2);}
.section-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;}
.alert-list{display:flex;flex-direction:column;gap:8px;}
.alert-item{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);padding:12px;font-size:12px;color:var(--text2);border-left:3px solid var(--primary);}
.alert-time{font-size:11px;color:var(--text2);margin-bottom:2px;}
.spinner{width:18px;height:18px;border:2px solid var(--border);border-top-color:var(--primary);border-radius:50%;animation:spinRotate .8s linear infinite;}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useRef} = React;
const {AreaChart,Area,LineChart,Line,XAxis,YAxis,CartesianGrid,Tooltip,ResponsiveContainer,BarChart,Bar} = Recharts;

  ]},

    {t:'1주',v:24.1},{t:'2주',v:22.8},{t:'3주',v:21.5},{t:'4주',v:20.1},{t:'5주',v:19.2},{t:'6주',v:18.4}

    {t:'1주',v:-0.21},{t:'2주',v:-0.15},{t:'3주',v:-0.08},{t:'4주',v:0.01},{t:'5주',v:0.07},{t:'6주',v:0.12}
  ]},

const alerts = [
  {time:'2025.05.22 04:55',msg:'QQQ 일일 점검 완료: -0.31% (임계값 미달)'},
  {time:'2025.05.21 04:55',msg:'QQQ 일일 점검 완료: +0.85% (임계값 미달)'},

// Toast hook
function useToast(){
  const [toasts,setToasts]=useState([]);
  function addToast(msg,type='success'){
    const id=Date.now();
    setToasts(t=>[...t,{id,msg,type}]);
    setTimeout(()=>setToasts(t=>t.filter(x=>x.id!==id)),3000);
  }
  return {toasts,addToast};
}

// KillSwitch Drawer
function KillswitchDrawer({item,onClose}){
  return(
    <div className="drawer-overlay" onClick={e=>{if(e.target===e.currentTarget)onClose();}}>
      <div className="drawer">
        <div className="drawer-header">

          </div>

// Add Stock Modal
function AddStockModal({onClose,addToast}){
  const [ticker,setTicker]=useState('');
  const [weight,setWeight]=useState('');
  const [period,setPeriod]=useState('일 1회');
  function submit(){
    if(!ticker||!weight){addToast('종목 티커와 목표 비중을 입력해주세요.','danger');return;}
    addToast(`${ticker.toUpperCase()} 등록 완료 (목표 비중: ${weight}%)`);;
    onClose();
  }
  return(
    <div className="modal-overlay">
      <div className="modal">
        <div className="modal-header">
          <span style={{fontWeight:700,fontSize:15}}>종목 등록</span>
          <button className="icon-btn" onClick={onClose}><i className="ti ti-x"/></button>
        </div>
        <div className="modal-body">
          <label className="form-label">종목 티커</label>
          <input className="form-input" placeholder="예: AAPL, MSFT" value={ticker} onChange={e=>setTicker(e.target.value)}/>
          <label className="form-label">목표 비중 (%)</label>
          <input className="form-input" type="number" placeholder="예: 25" value={weight} onChange={e=>setWeight(e.target.value)}/>
          <label className="form-label">리밸런싱 주기</label>
          <select className="form-input" value={period} onChange={e=>setPeriod(e.target.value)}>
            <option>일 1회</option><option>일 2회</option><option>수동</option>
          </select>
          <div style={{background:'rgba(59,158,232,.08)',border:'1px solid rgba(59,158,232,.25)',borderRadius:'var(--radius)',padding:'10px 14px',fontSize:12,color:'var(--primary)'}}>
            <i className="ti ti-info-circle" style={{fontSize:13,marginRight:6}}/>
            API 자격증명은 AWS Secrets Manager에서 런타임에 자동 조회됩니다.
          </div>
        </div>
        <div className="modal-footer">

// Rebalancing Modal
function RebalancingModal({onClose,addToast}){
  const [selected,setSelected]=useState(['NVO']);
  const [twapCount,setTwapCount]=useState('10');
  function toggle(t){setSelected(s=>s.includes(t)?s.filter(x=>x!==t):[...s,t]);}
  function submit(){
    addToast(`TWAP 리밸런싱 시작: ${selected.join(', ')} (${twapCount}회 분할)`);
    onClose();
  }
  return(
    <div className="modal-overlay">

            {['NVO','MSTR','TSLA','LLY'].map(t=>(

}

            </div>
            <div style={{flex:1}}>
              <div style={{fontWeight:600,fontSize:14,marginBottom:4}}>{c.title}</div>
              <div style={{fontSize:12,color:'var(--text2)',marginBottom:8}}>{c.sub}</div>
              <button className="btn btn-ghost btn-sm" onClick={e=>{e.stopPropagation();addToast(`${c.title} 설정을 엽니다.`);}}>{c.action}</button>
            </div>
          </div>
        ))}
      </div>

      {/* Stock detail drawer */}
      {selected && (
        <div className="drawer-overlay" onClick={e=>{if(e.target===e.currentTarget)setSelected(null);}}>
          <div className="drawer">
            <div className="drawer-header">
              <span style={{fontWeight:700,fontSize:15}}>{selected.ticker} 설정 상세</span>
              <button className="icon-btn" onClick={()=>setSelected(null)}><i className="ti ti-x"/></button>
            </div>
            <div className="drawer-body">
              {[['티커',selected.ticker],['종목명',selected.name],['목표 비중',`${selected.targetPct}%`],
                ['현재 비중',`${selected.currentPct}%`],['리밸런싱 주기',selected.period],
                ['킬스위치 대피 계좌','대피계좌 A (KRW)'],['API 자격증명','AWS Secrets Manager (런타임 조회)'],
                ['Celery 워커','독립 워커 · 격리 실행 중']].map(([l,v])=>(
                <div className="drawer-row" key={l}>
                  <span className="drawer-label">{l}</span>
                  <span className="drawer-value">{v}</span>
                </div>
              ))}
              <div style={{marginTop:20,display:'flex',gap:8}}>
                <button className="btn btn-primary" style={{flex:1}} onClick={()=>{addToast(`${selected.ticker} 설정이 저장되었습니다.`);setSelected(null);}}>설정 저장</button>
                <button className="btn btn-danger btn-sm" onClick={()=>{addToast(`${selected.ticker} 종목이 삭제되었습니다.`,'danger');setSelected(null);}}>삭제</button>
              </div>
            </div>
          </div>
        </div>
      )}

      {showAdd && <AddStockModal onClose={()=>setShowAdd(false)} addToast={addToast}/>}
      {showStop && <EmergencyModal onClose={()=>setShowStop(false)} addToast={addToast}/>}
    </div>
  );
}

function App(){
  const [activeTab,setActiveTab]=useState(TABS[0].label);
  const {toasts,addToast}=useToast();

  return(
    <div className="app-wrap">
      <nav className="topnav">
        <div className="brand">
          <span className="logo-dot"/>
          AutoTrade
        </div>
        <div className="tab-bar">
          {TABS.map(t=>(
            <button key={t.label} className={`tab-btn ${activeTab===t.label?'active':''}`} onClick={()=>setActiveTab(t.label)}>
              <i className={`ti ${t.icon}`}/>
              {t.label}
            </button>
          ))}
        </div>
        <span className={`status-badge ${activeTab.includes('킬스위치')&&false?'killswitch':'active'}`}>
          <span className="status-dot"/>ACTIVE
        </span>
      </nav>

      <div className="main-area">
        {activeTab===TABS[0].label && <KillSwitchDashboard addToast={addToast}/>}
        {activeTab===TABS[1].label && <MacroIndicators addToast={addToast}/>}
        {activeTab===TABS[2].label && <TwapRebalancing addToast={addToast}/>}
        {activeTab===TABS[3].label && <PortfolioControl addToast={addToast}/>}
      </div>

      <div className="toast-container">
        {toasts.map(t=>(
          <div key={t.id} className={`toast ${t.type}`}>
            <i className={`ti ${t.type==='danger'?'ti-alert-circle':'ti-circle-check'}`} style={{color:t.type==='danger'?'var(--danger)':'var(--success)'}}/>
            {t.msg}
          </div>
        ))}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
