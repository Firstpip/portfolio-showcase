<style>
*{box-sizing:border-box;margin:0;padding:0;}
html,body,#root{width:100%;min-height:100vh;font-family:'Pretendard',sans-serif;}
body{background:#FAFAF8;color:#1C1917;}
:root{
  --primary:#B45309;--primary-light:rgba(180,83,9,.08);
  --secondary:#D97706;--accent:#0EA5E9;
  --bg:#FAFAF8;--surface:#FFFFFF;--surface2:#F5F1EC;
  --text:#1C1917;--text2:#57534E;
  --success:#15803D;--warning:#D97706;--danger:#DC2626;
  --border:#E5E0D8;--radius:12px;
}

@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes fadeInUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeInScale{from{opacity:0;transform:scale(0.96)}to{opacity:1;transform:scale(1)}}
@keyframes slideInUp{from{opacity:0;transform:translateY(40px)}to{opacity:1;transform:translateY(0)}}
@keyframes scaleCard{from{transform:scale(0.97);opacity:0}to{transform:scale(1);opacity:1}}
@keyframes progressFill{from{width:0}to{width:var(--pw,100%)}}
@keyframes toastSlide{from{opacity:0;transform:translateX(40px)}to{opacity:1;transform:translateX(0)}}
@keyframes navIndicator{from{transform:scaleX(0)}to{transform:scaleX(1)}}
@keyframes rotateIn{from{opacity:0;transform:rotate(-8deg) scale(.95)}to{opacity:1;transform:rotate(0) scale(1)}}
@keyframes shimmerLight{0%{background-position:-400px 0}100%{background-position:400px 0}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}

.app-wrap{display:flex;flex-direction:column;width:100%;min-height:100vh;background:var(--bg);}

/* ─── Global Nav ─── */
.global-nav{display:flex;align-items:center;height:60px;background:var(--surface);border-bottom:1px solid var(--border);padding:0 32px;gap:0;position:sticky;top:0;z-index:100;box-shadow:0 1px 3px rgba(0,0,0,.06);flex-shrink:0;}
.nav-logo{display:flex;align-items:center;gap:8px;font-weight:800;font-size:15px;color:var(--primary);min-width:160px;}
.nav-logo-mark{width:32px;height:32px;background:var(--primary);border-radius:8px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:14px;font-weight:800;}
.nav-links{display:flex;flex:1;height:100%;gap:0;overflow-x:auto;scrollbar-width:none;padding:0 16px;}
.nav-links::-webkit-scrollbar{display:none;}
.nav-link{display:flex;align-items:center;height:100%;padding:0 14px;font-size:13px;font-weight:500;color:var(--text2);cursor:pointer;border:none;background:none;border-bottom:2px solid transparent;white-space:nowrap;transition:color .2s,border-color .2s;position:relative;gap:6px;flex-shrink:0;}
.nav-link:hover{color:var(--text);}
.nav-link.active{color:var(--primary);border-bottom-color:var(--primary);}
.nav-link.active::after{content:'';position:absolute;bottom:-1px;left:0;right:0;height:2px;background:var(--primary);transform-origin:left;animation:navIndicator .25s ease;}
.nav-actions{display:flex;align-items:center;gap:12px;min-width:120px;justify-content:flex-end;}
.avatar{width:34px;height:34px;border-radius:50%;background:var(--primary-light);border:2px solid var(--primary);display:flex;align-items:center;justify-content:center;color:var(--primary);font-weight:700;font-size:13px;cursor:pointer;}

/* ─── Main ─── */
.main-content{flex:1;width:100%;}
.section-wrap{width:100%;max-width:1180px;margin:0 auto;padding:32px 32px;animation:fadeIn .25s ease;}

/* ─── Cards ─── */
.kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:28px;}
.kpi-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px;cursor:pointer;transition:transform .2s,box-shadow .2s;}
.kpi-card:hover{transform:translateY(-3px);box-shadow:0 10px 30px rgba(180,83,9,.1);}
.kpi-icon{width:40px;height:40px;border-radius:10px;background:var(--primary-light);display:flex;align-items:center;justify-content:center;margin-bottom:12px;font-size:20px;color:var(--primary);}
.kpi-label{font-size:12px;color:var(--text2);margin-bottom:4px;}
.kpi-value{font-size:22px;font-weight:700;color:var(--text);}
.kpi-value.positive{color:var(--success);}
.kpi-value.negative{color:var(--danger);}

.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:24px;margin-bottom:20px;}
.card-sm{padding:16px;}
.two-col{display:grid;grid-template-columns:360px 1fr;gap:24px;align-items:start;}
.three-col{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;}

.section-title{font-size:15px;font-weight:700;color:var(--text);margin-bottom:16px;display:flex;align-items:center;gap:8px;}
.section-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;}
.page-title{font-size:22px;font-weight:800;color:var(--text);margin-bottom:6px;}
.page-sub{font-size:13px;color:var(--text2);margin-bottom:28px;}

/* ─── Buttons ─── */
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;border:none;transition:all .15s;font-family:inherit;}
.btn-primary{background:var(--primary);color:#fff;}
.btn-primary:hover{background:#9A4508;}
.btn-ghost{background:transparent;color:var(--text2);border:1px solid var(--border);}
.btn-ghost:hover{background:var(--surface2);color:var(--text);}
.btn-outline{background:transparent;color:var(--primary);border:1px solid var(--primary);}
.btn-outline:hover{background:var(--primary-light);}
.btn-sm{padding:5px 10px;font-size:12px;}
.btn-danger{background:var(--danger);color:#fff;}

/* ─── Table ─── */
.data-table{width:100%;border-collapse:collapse;}
.data-table th{font-size:11px;font-weight:600;color:var(--text2);padding:8px 14px;border-bottom:2px solid var(--border);text-align:left;text-transform:uppercase;letter-spacing:.4px;}
.data-table td{font-size:13px;color:var(--text);padding:13px 14px;border-bottom:1px solid var(--border);vertical-align:middle;}
.data-table tr:last-child td{border-bottom:none;}
.data-table tbody tr{cursor:pointer;transition:background .15s;}
.data-table tbody tr:hover{background:var(--surface2);}

/* ─── Badge ─── */
.badge{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:100px;font-size:11px;font-weight:600;}
.badge-success{background:rgba(21,128,61,.1);color:var(--success);}
.badge-warning{background:rgba(217,119,6,.1);color:var(--warning);}
.badge-danger{background:rgba(220,38,38,.1);color:var(--danger);}
.badge-info{background:rgba(14,165,233,.1);color:var(--accent);}
.badge-neutral{background:var(--surface2);color:var(--text2);}
.badge-primary{background:var(--primary-light);color:var(--primary);}

/* ─── Form ─── */
.form-label{display:block;font-size:12px;font-weight:600;color:var(--text2);margin-bottom:6px;}
.form-input{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:9px 12px;color:var(--text);font-size:13px;font-family:inherit;margin-bottom:14px;}
.form-input:focus{outline:none;border-color:var(--primary);}
.form-select{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:9px 12px;color:var(--text);font-size:13px;font-family:inherit;margin-bottom:14px;}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;}

/* ─── Modal ─── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:300;display:flex;align-items:center;justify-content:center;}
.modal{background:var(--surface);border-radius:16px;width:520px;max-width:calc(100vw - 40px);animation:slideInUp .25s ease;box-shadow:0 24px 64px rgba(0,0,0,.15);}
.modal-header{display:flex;align-items:center;justify-content:space-between;padding:20px 24px;border-bottom:1px solid var(--border);}
.modal-body{padding:24px;}
.modal-footer{padding:16px 24px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:8px;}
.icon-btn{background:none;border:none;cursor:pointer;color:var(--text2);width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;transition:color .15s,background .15s;font-size:18px;}
.icon-btn:hover{color:var(--text);background:var(--surface2);}

/* ─── Toast ─── */
.toast-container{position:fixed;bottom:24px;right:24px;z-index:500;display:flex;flex-direction:column;gap:8px;}
.toast{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 16px;font-size:13px;color:var(--text);animation:toastSlide .3s ease;display:flex;align-items:center;gap:10px;min-width:260px;box-shadow:0 8px 24px rgba(0,0,0,.12);}
.toast.success{border-left:3px solid var(--success);}
.toast.danger{border-left:3px solid var(--danger);}

/* ─── Progress ─── */
.progress-wrap{height:8px;background:var(--surface2);border-radius:4px;overflow:hidden;}
.progress-bar{height:100%;border-radius:4px;background:var(--primary);animation:progressFill .6s ease forwards;}

/* ─── Timeline ─── */
.timeline{display:flex;flex-direction:column;gap:0;}
.timeline-item{display:flex;gap:16px;padding-bottom:20px;position:relative;}
.timeline-item::before{content:'';position:absolute;left:15px;top:32px;bottom:0;width:1px;background:var(--border);}
.timeline-item:last-child::before{display:none;}
.timeline-dot{width:32px;height:32px;border-radius:50%;background:var(--primary-light);border:2px solid var(--primary);display:flex;align-items:center;justify-content:center;color:var(--primary);font-size:14px;flex-shrink:0;margin-top:2px;}
.timeline-content{flex:1;padding-bottom:4px;}
.timeline-title{font-size:13px;font-weight:600;color:var(--text);margin-bottom:3px;}
.timeline-sub{font-size:12px;color:var(--text2);}

/* ─── Account card ─── */
.account-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:16px;margin-bottom:20px;}
.account-card{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius);padding:20px;cursor:pointer;transition:all .2s;animation:scaleCard .3s ease both;}
.account-card:hover{border-color:var(--primary);box-shadow:0 8px 24px rgba(180,83,9,.1);}
.account-card.active-card{border-color:var(--primary);}
.account-num{font-size:11px;color:var(--text2);margin-bottom:4px;}
.account-name{font-size:15px;font-weight:700;color:var(--text);margin-bottom:12px;}
.account-stat{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.stat-item{background:var(--surface2);border-radius:8px;padding:10px 12px;}
.stat-label{font-size:11px;color:var(--text2);margin-bottom:2px;}
.stat-val{font-size:14px;font-weight:700;color:var(--text);}

/* ─── Filter bar ─── */
.filter-bar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px;}
.filter-chip{padding:5px 12px;border-radius:100px;font-size:12px;font-weight:600;cursor:pointer;border:1px solid var(--border);background:var(--surface);color:var(--text2);transition:all .15s;}
.filter-chip:hover{border-color:var(--primary);color:var(--primary);}
.filter-chip.on{background:var(--primary);color:#fff;border-color:var(--primary);}

/* ─── Misc ─── */
.divider{height:1px;background:var(--border);margin:20px 0;}
.text-muted{color:var(--text2);font-size:12px;}
.empty-state{text-align:center;padding:48px;color:var(--text2);}
.spinner{width:20px;height:20px;border:2px solid var(--border);border-top-color:var(--primary);border-radius:50%;animation:pulse 1s ease-in-out infinite;}

/* ─── Footer ─── */
.footer{background:var(--surface);border-top:1px solid var(--border);padding:20px 32px;font-size:12px;color:var(--text2);display:flex;justify-content:space-between;align-items:center;}
</style>
</head>
<body>

function useToast(){
  const [toasts,setToasts]=useState([]);
  function addToast(msg,type='success'){
    const id=Date.now();
    setToasts(t=>[...t,{id,msg,type}]);
    setTimeout(()=>setToasts(t=>t.filter(x=>x.id!==id)),3500);
  }
  return {toasts,addToast};
}

// Chart component using Chart.js
function LineChartJS({data,addToast}){
  const canvasRef=useRef(null);
  const chartRef=useRef(null);
  useEffect(()=>{
    if(!canvasRef.current) return;
    if(chartRef.current) chartRef.current.destroy();
    const ctx=canvasRef.current.getContext('2d');
    const grad=ctx.createLinearGradient(0,0,0,200);
    grad.addColorStop(0,'rgba(180,83,9,.25)');
    grad.addColorStop(1,'rgba(180,83,9,.01)');
    chartRef.current=new window.Chart(ctx,{
      type:'line',
      data:{
        labels:data.labels,
        datasets:[{label:'누적 수익률 (%)',data:data.values,borderColor:'#B45309',backgroundColor:grad,borderWidth:2,fill:true,tension:.4,pointRadius:3,pointBackgroundColor:'#B45309',pointBorderColor:'#fff',pointBorderWidth:2}]
      },
      options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>`${c.parsed.y>0?'+':''}${c.parsed.y}%`}}},scales:{x:{grid:{color:'#E5E0D8'},ticks:{color:'#57534E',font:{size:11}}},y:{grid:{color:'#E5E0D8'},ticks:{color:'#57534E',font:{size:11},callback:v=>`${v}%`}}}}
    });
    return()=>{if(chartRef.current)chartRef.current.destroy();};
  },[data]);
  return <div style={{position:'relative',height:220}}><canvas ref={canvasRef}/></div>;
}

              <div className="card">

                <table className="data-table">
                  <thead>

                  </thead>
                  <tbody>
                    {backtestResults.windows.map(w=>(
                      <tr key={w.period} onClick={()=>addToast(`${w.period} 구간 상세 분석 데이터를 확인합니다.`)}>
                        <td style={{fontWeight:700}}>{w.period}</td>
                        <td style={{fontFamily:'monospace',fontSize:12,color:'var(--text2)'}}>{w.훈련}</td>
                        <td style={{fontWeight:700,color:w.수익률.startsWith('+')?'var(--success)':'var(--danger)'}}>{w.수익률}</td>
                        <td style={{color:'var(--danger)',fontFamily:'monospace'}}>{w.MDD}</td>
                        <td><span className={`badge badge-${w.판정==='통과'?'success':'warning'}`}>{w.판정}</span></td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

                  <span style={{fontSize:13,fontWeight:600,color:'var(--text)',maxWidth:300,textAlign:'right'}}>{v}</span>
                </div>

// Add Account Modal
function AddAccountModal({onClose,addToast}){
  const [name,setName]=useState('');
  const [accountId,setAccountId]=useState('');
  function submit(){
    if(!name||!accountId){addToast('계좌명과 계좌번호를 입력해주세요.','danger');return;}
    addToast(`계좌 "${name}" 등록 완료 — AWS Secrets Manager에 자격증명이 저장됩니다.`);
    onClose();
  }
  return(
    <div className="modal-overlay">
      <div className="modal">
        <div className="modal-header">
          <span style={{fontWeight:700,fontSize:15}}>계좌 등록</span>
          <button className="icon-btn" onClick={onClose}><i className="ph ph-x"/></button>
        </div>
        <div className="modal-body">
          <label className="form-label">계좌 별칭</label>
          <input className="form-input" placeholder="예: 주력 포트폴리오" value={name} onChange={e=>setName(e.target.value)}/>
          <label className="form-label">하나증권 계좌번호</label>
          <input className="form-input" placeholder="예: 1234567890" value={accountId} onChange={e=>setAccountId(e.target.value)}/>
          <label className="form-label">킬스위치 대피 계좌</label>
          <select className="form-select">
            <option>대피계좌 A (KRW)</option>
            <option>대피계좌 B (KRW)</option>
            <option>직접 입력</option>
          </select>
          <div style={{padding:'12px',background:'rgba(14,165,233,.08)',borderRadius:8,border:'1px solid rgba(14,165,233,.2)',fontSize:12,color:'var(--accent)'}}>
            <i className="ph ph-info" style={{marginRight:6}}/>하나증권 API 자격증명은 AWS Secrets Manager에 계좌 ID 기반으로 분리 저장됩니다. 평문 저장 없음.
          </div>
        </div>
        <div className="modal-footer">
          <button className="btn btn-ghost" onClick={onClose}>취소</button>
          <button className="btn btn-primary" onClick={submit}><i className="ph ph-plus"/>계좌 등록</button>
        </div>
      </div>
    </div>
  );
}

        </div>
      )}
      {showAdd && <AddAccountModal onClose={()=>setShowAdd(false)} addToast={addToast}/>}
    </div>
  );
}

function App(){
  const [active,setActive]=useState(SECTIONS[0]);
  const {toasts,addToast}=useToast();

  return(
    <div className="app-wrap">
      <nav className="global-nav">
        <div className="nav-logo">
          <div className="nav-logo-mark">AT</div>
          Analytics
        </div>
        <div className="nav-links">
          {SECTIONS.map(s=>(
            <button key={s} className={`nav-link ${active===s?'active':''}`} onClick={()=>setActive(s)}>
              <i className={`ph ${secIcons[s]}`}/>
              {s}
            </button>
          ))}
        </div>
        <div className="nav-actions">
          <button className="btn btn-ghost btn-sm" onClick={()=>addToast('시스템 상태 리포트를 생성합니다.')}><i className="ph ph-bell"/>알림</button>
          <div className="avatar" onClick={()=>addToast('프로필 설정 화면을 엽니다.')}>관</div>
        </div>
      </nav>

      <div className="main-content">
        {active===SECTIONS[0] && <BacktestSection addToast={addToast}/>}
        {active===SECTIONS[1] && <PerformanceSection addToast={addToast}/>}
        {active===SECTIONS[2] && <AuditSection addToast={addToast}/>}
        {active===SECTIONS[3] && <AccountSection addToast={addToast}/>}
      </div>

      <footer className="footer">
        <span>거시경제 방어형 미국 주식 자동매매 시스템 — 구현 데모 · 자체 개발 프로젝트</span>
        <span>Python 3.10+ · FastAPI · TimescaleDB · Redis · Celery · AWS EC2</span>
      </footer>

      <div className="toast-container">
        {toasts.map(t=>(
          <div key={t.id} className={`toast ${t.type}`}>
            <i className={`ph ${t.type==='danger'?'ph-warning-circle':'ph-check-circle'}`} style={{fontSize:18,color:t.type==='danger'?'var(--danger)':'var(--success)'}}/>
            {t.msg}
          </div>
        ))}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
