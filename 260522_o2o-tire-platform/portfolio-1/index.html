                  <div className="hero-map-grid"></div>
                  <div className="map-road-h" style={{top:'40%',left:0,right:0}}></div>
                  <div className="map-road-h" style={{top:'65%',left:0,right:0}}></div>
                  <div className="map-road-v" style={{left:'35%',top:0,bottom:0}}></div>
                  <div className="map-road-v" style={{left:'62%',top:0,bottom:0}}></div>
                  <div className="map-radius" style={{width:100,height:100,top:'50%',left:'48%',transform:'translate(-50%,-50%)',opacity:0.5}}></div>
                  <div style={{position:'absolute',top:'48%',left:'47%',transform:'translate(-50%,-50%)',zIndex:4}}>
                    <div className="map-me-ring"></div>
                    <div className="map-me"></div>
                  </div>
                  <div className="map-pin map-pin-red" style={{top:'22%',left:'28%'}}><div className="map-pin-inner"></div></div>
                  <div className="map-label" style={{top:'8%',left:'18%'}}>한성 타이어</div>
                  <div className="map-pin map-pin-orange" style={{top:'30%',left:'56%'}}><div className="map-pin-inner"></div></div>
                  <div className="map-pin map-pin-red" style={{top:'60%',left:'42%'}}><div className="map-pin-inner"></div></div>
                  <div className="map-pin map-pin-orange" style={{top:'55%',left:'68%'}}><div className="map-pin-inner"></div></div>
                </div>
              </div>
            </div>

            <div className="stats-bar">
              <div className="stats-bar-inner">
                {[
                  { icon: 'map-pin', color: '#D92B2B', bg: '#FEF2F2', value: '247개', label: '전국 가맹 장착점' },
                  { icon: 'calendar-check', color: '#16A34A', bg: '#F0FDF4', value: '1,284건', label: '이번 달 예약' },
                  { icon: 'star', color: '#F59E0B', bg: '#FEFCE8', value: '4.7점', label: '평균 만족도' },
                  { icon: 'clock', color: '#1D4ED8', bg: '#EFF6FF', value: '1분', label: '평균 예약 소요시간' },
                ].map((s, i) => (
                  <div key={i} className="stat-item" style={{paddingLeft: i>0 ? 24 : 0}}>
                    <div className="stat-icon" style={{background:s.bg}}>
                      <i data-lucide={s.icon} style={{width:18,height:18,color:s.color}}></i>
                    </div>
                    <div className="stat-info">
                      <div className="stat-value">{s.value}</div>
                      <div className="stat-label">{s.label}</div>
                    </div>
                  </div>
                ))}
              </div>
            </div>

            <div className="main-content">
              <div className="section-header">
                <div className="section-title">내 주변 장착점 ({filtered.length}개)</div>
                <button className="section-link">지도에서 보기 <i data-lucide="chevron-right" style={{width:14,height:14}}></i></button>
              </div>
              <div className="filter-row">
                {filters.map(f => (
                  <button key={f} className={`filter-btn ${filter === f ? 'active' : ''}`} onClick={() => setFilter(f)}>{f}</button>
                ))}
              </div>
              <div className="shop-grid">
                {filtered.map(shop => (
                  <ShopCard key={shop.id} shop={shop} onClick={() => setSelectedShop(shop)} />
                ))}
              </div>
            </div>
          </div>
        )}

        {tab === 'booking' && (
          <div className="page-enter">
            <div className="hero" style={{padding:'40px 0 32px'}}>
              <div className="hero-inner">
                <div className="hero-text">
                  <div className="hero-badge"><i data-lucide="zap" style={{width:12,height:12}}></i> 1분 간편 예약</div>
                  <div className="hero-title">회원 가입 없이<br />바로 <span>예약</span>하세요</div>
                  <div className="hero-desc">차량번호와 휴대전화 번호만으로 예약이 가능합니다. 예약 완료 후 카카오 알림톡으로 확인 메시지가 발송됩니다.</div>
                  <div className="hero-actions">
                    <button className="hero-cta" onClick={() => setBookingShop(shops[0])}>예약하기</button>
                  </div>
                </div>
              </div>
            </div>
            <div className="main-content">
              <div className="section-title" style={{marginBottom:20}}>빠른 예약 — 장착점 선택</div>
              <div className="shop-grid">
                {shops.filter(s => s.open).slice(0, 3).map(shop => (
                  <ShopCard key={shop.id} shop={shop} onClick={() => setBookingShop(shop)} />
                ))}
              </div>
            </div>
          </div>
        )}

        {tab === 'mybooking' && (
          <div className="page-enter">
            <div className="main-content" style={{maxWidth:640,margin:'40px auto 60px',padding:'0 32px'}}>
              <div style={{fontSize:22,fontWeight:800,color:'#1A1A1A',marginBottom:6}}>예약 내역 조회</div>
              <div style={{fontSize:14,color:'#888',marginBottom:28}}>차량 번호로 본인의 예약 내역을 조회할 수 있습니다.</div>
              <div className="form-group">
                <label className="form-label">차량 번호 입력</label>
                <div style={{display:'flex',gap:8}}>
                  <input className="form-input" defaultValue="12가 3456" style={{flex:1}} />
                  <button className="topnav-btn" style={{padding:'10px 20px'}} onClick={() => setShowMyBooking(true)}>예약 내역 확인</button>
                </div>
              </div>
            </div>
          </div>
        )}

        {tab === 'price' && (
          <div className="page-enter">
            <div className="main-content">
              <div style={{fontSize:22,fontWeight:800,color:'#1A1A1A',marginBottom:6}}>표준 공임비 안내</div>
              <div style={{fontSize:14,color:'#888',marginBottom:28}}>전국 가맹 장착점의 표준 공임비 기준표입니다. 장착점별로 소폭 차이가 있을 수 있습니다.</div>
              <div style={{background:'#fff',borderRadius:14,overflow:'hidden',boxShadow:'0 2px 12px rgba(0,0,0,0.07)',marginBottom:24}}>
                <div style={{background:'#1A1A1A',color:'#fff',padding:'16px 24px',fontWeight:700,fontSize:16}}>국산차 기준 공임비 (4본 기준)</div>
                <div style={{padding:'0 0 8px'}}>
                  <table className="labor-table" style={{margin:0}}>
                    <thead><tr><th>타이어 규격</th><th>기본 장착</th><th>질소 충전 포함</th><th>TPMS 포함</th></tr></thead>
                    <tbody>
                      {[
                        ['14인치', '24,000원~30,000원', '32,000원~38,000원', '40,000원~48,000원'],
                        ['15인치', '28,000원~35,000원', '36,000원~44,000원', '45,000원~55,000원'],
                        ['16인치', '32,000원~40,000원', '40,000원~50,000원', '50,000원~62,000원'],
                        ['17인치', '36,000원~45,000원', '44,000원~56,000원', '55,000원~70,000원'],
                        ['18인치', '40,000원~50,000원', '50,000원~62,000원', '62,000원~78,000원'],
                        ['19인치', '45,000원~55,000원', '56,000원~68,000원', '70,000원~86,000원'],
                      ].map(([size, basic, nitro, tpms]) => (
                        <tr key={size}><td>{size}</td><td className="price">{basic}</td><td>{nitro}</td><td>{tpms}</td></tr>
                      ))}
                    </tbody>
                  </table>
                </div>
              </div>
              <div style={{background:'#FEF2F2',borderRadius:12,padding:'16px 20px',fontSize:13,color:'#555',display:'flex',gap:10,alignItems:'flex-start'}}>
                <i data-lucide="info" style={{width:16,height:16,color:'#D92B2B',flexShrink:0,marginTop:1}}></i>
                <span>수입차 공임비는 동일 규격 기준 약 <strong>20~30%</strong> 추가 적용됩니다. 정확한 가격은 장착점 상세 페이지에서 확인하거나 예약 전 장착점에 문의하시기 바랍니다.</span>
              </div>
            </div>
          </div>
        )}
      </div>

      {selectedShop && (
        <ShopDrawer shop={selectedShop} onClose={() => setSelectedShop(null)} onBook={() => { setBookingShop(selectedShop); setSelectedShop(null); }} />
      )}
      {bookingShop && (
        <BookingModal shop={bookingShop} onClose={() => setBookingShop(null)} onSuccess={handleBookingSuccess} />
      )}
      {showAlimtalk && (
        <AlimtalkModal shop={showAlimtalk} onClose={() => { setShowAlimtalk(null); showToast('예약이 완료되었습니다. 알림톡이 발송되었습니다.'); }} />
      )}
      {showMyBooking && <MyBookingModal onClose={() => setShowMyBooking(false)} />}
      {toast && <Toast msg={toast} onHide={() => setToast(null)} />}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
<script>
  window.addEventListener('load', () => {
    if (window.lucide) window.lucide.createIcons();
    setInterval(() => { if (window.lucide) window.lucide.createIcons(); }, 500);
  });
</script>
</body>
</html>
