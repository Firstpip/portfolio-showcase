// 아이콘 헬퍼
function Icon({ name, size=16, color='currentColor', style={} }) {
  const ref = useRef(null);
  useEffect(() => {
    if (ref.current && window.lucide) {
      ref.current.innerHTML = '';
      const svg = window.lucide.createElement(name);
      if (svg) {
        svg.setAttribute('width', size);
        svg.setAttribute('height', size);
        svg.setAttribute('stroke', color);
        svg.setAttribute('stroke-width', '2');
        svg.setAttribute('fill', 'none');
        svg.setAttribute('stroke-linecap', 'round');
        svg.setAttribute('stroke-linejoin', 'round');
        ref.current.appendChild(svg);
      }
    }
  }, [name, size, color]);
  return <span ref={ref} style={{display:'inline-flex',alignItems:'center',...style}}/>;
}

function StarRating({ rating }) {
  return (
    <span style={{display:'flex',alignItems:'center',gap:2}}>
      {[1,2,3,4,5].map(i => (
        <svg key={i} width="12" height="12" viewBox="0 0 24 24" fill={i <= Math.round(rating) ? C.accent : '#E5E7EB'} stroke="none">
          <path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/>
        </svg>
      ))}
      <span style={{fontSize:12,color:C.textSub,marginLeft:2}}>{rating}</span>
    </span>
  );
}

function Badge({ children, color='default', small=false }) {
  const colors = {
    default:{bg:'#F3F4F6',text:'#374151'},
    success:{bg:'#D1FAE5',text:'#065F46'},
    warning:{bg:'#FEF3C7',text:'#92400E'},
    danger:{bg:'#FEE2E2',text:'#991B1B'},
    info:{bg:'#DBEAFE',text:'#1E40AF'},
    primary:{bg:'#FEE2D4',text:'#9A2D08'},
  };
  const s = colors[color] || colors.default;
  return (
    <span style={{display:'inline-block',padding:small?'2px 6px':'3px 10px',borderRadius:6,fontSize:small?10:12,fontWeight:600,background:s.bg,color:s.text}}>
      {children}
    </span>
  );
}

function Toast({ msg, onClose }) {
  useEffect(() => { const t = setTimeout(onClose, 2800); return () => clearTimeout(t); }, []);
  return (
    <div style={{position:'fixed',bottom:32,left:'50%',transform:'translateX(-50%)',zIndex:9999,
      background:C.text,color:'#fff',padding:'12px 24px',borderRadius:10,fontWeight:600,
      fontSize:14,animation:'fadeIn 0.25s ease',boxShadow:'0 8px 24px rgba(0,0,0,0.18)',
      display:'flex',alignItems:'center',gap:8}}>
      <Icon name="check-circle" size={16} color="#10B981"/> {msg}
    </div>
  );
}

// 공임비 테이블 화면
function FeeTableScreen() {
  const [carType, setCarType] = useState('domestic');
  const [inch, setInch] = useState(2);
  const data = FEE_DATA[carType];
  const chartData = data.labels.map((l, i) => ({
    name: l,
    removal: data.removal[i],
    install: data.install[i],
    balance: data.balance[i],
  }));
  const total = (data.removal[inch] + data.install[inch] + data.balance[inch]) * 4;
  const chartRef = useRef(null);

    if (chartInstance.current) { chartInstance.current.destroy(); }
    chartInstance.current = new Chart(chartRef.current, {
      type: 'bar',
      data: {
        labels: chartData.map(d => d.name),
        datasets: [
          { label: '탈거', data: chartData.map(d => d.removal), backgroundColor: '#F59E0B', borderRadius: 4 },
          { label: '장착', data: chartData.map(d => d.install), backgroundColor: C.primary, borderRadius: 4 },

          tooltip: { callbacks: { label: ctx => `${ctx.dataset.label}: ${ctx.raw.toLocaleString()}원` } }

          y: { grid: { color: '#F3F4F6' }, ticks: { color: C.textSub, font: { size: 11 }, callback: v => v >= 10000 ? `${v/10000}만` : `${v}` } }
        }

    });
    return () => { if (chartInstance.current) { chartInstance.current.destroy(); chartInstance.current = null; } };

        </div>
        <div style={{display:'flex',gap:8}}>

// 비회원 예약 화면
function ReservationScreen({ toast, setToast }) {
  const [step, setStep] = useState(1);
  const [carNum, setCarNum] = useState('');
  const [phone, setPhone] = useState('');
  const [otp, setOtp] = useState('');
  const [otpSent, setOtpSent] = useState(false);
  const [otpVerified, setOtpVerified] = useState(false);
  const [selectedStore, setSelectedStore] = useState(null);
  const [selectedDate, setSelectedDate] = useState('');
  const [selectedTime, setSelectedTime] = useState('');
  const [done, setDone] = useState(false);

  const timeSlots = ['09:00','10:00','11:00','13:00','14:00','15:00','16:00','17:00','18:00'];

  function handleSendOtp() {
    if (phone.length < 10) return;
    setOtpSent(true);
    setToast('인증번호가 발송되었습니다.');
  }

  function handleVerifyOtp() {
    if (otp.length < 4) return;
    setOtpVerified(true);
    setStep(2);
    setToast('휴대폰 인증이 완료되었습니다.');
  }

  function handleSubmit() {
    setDone(true);
    setToast('예약 완료! 카카오 알림톡으로 확인 메시지를 발송했습니다.');
  }

  if (done) {
    return (
      <div className="scale-up" style={{maxWidth:500,margin:'40px auto',padding:'0 24px'}}>
        <div style={{background:C.surface,borderRadius:20,padding:'40px 36px',textAlign:'center',
          border:`1px solid ${C.border}`,boxShadow:'0 8px 32px rgba(0,0,0,0.06)'}}>
          <div style={{width:72,height:72,borderRadius:'50%',background:'#D1FAE5',display:'flex',
            alignItems:'center',justifyContent:'center',margin:'0 auto 20px'}}>
            <Icon name="check-circle" size={36} color="#10B981"/>
          </div>
          <h2 style={{fontSize:22,fontWeight:800,marginBottom:8}}>예약이 완료되었습니다!</h2>
          <p style={{fontSize:14,color:C.textSub,marginBottom:24}}>카카오 알림톡으로 예약 확인 메시지를 발송했습니다.</p>
          <div style={{background:C.bg,borderRadius:12,padding:'16px 20px',textAlign:'left',marginBottom:24}}>
            {[
              {label:'예약 번호',value:`R-2025-${Math.floor(Math.random()*9000+1000)}`},
              {label:'장착점',value:selectedStore?.name || '강남 타이어킹'},
              {label:'예약 일시',value:`${selectedDate || '2025-05-28'} ${selectedTime || '14:00'}`},
              {label:'차량 번호',value:carNum || '12가3456'},
            ].map(r => (
              <div key={r.label} style={{display:'flex',justifyContent:'space-between',padding:'6px 0',borderBottom:`1px solid ${C.border}`,fontSize:13}}>
                <span style={{color:C.textSub}}>{r.label}</span>
                <span style={{fontWeight:600,color:C.text}}>{r.value}</span>
              </div>
            ))}
          </div>
          <button onClick={() => { setDone(false); setStep(1); setCarNum(''); setPhone(''); setOtp(''); setOtpSent(false); setOtpVerified(false); }}
            style={{width:'100%',padding:'14px',borderRadius:12,background:C.primary,color:'#fff',
              border:'none',cursor:'pointer',fontWeight:700,fontSize:15,boxShadow:`0 4px 12px rgba(232,75,26,0.3)`}}>
            새 예약하기
          </button>
        </div>
      </div>
    );
  }

  return (
    <div className="fade-in" style={{maxWidth:600,margin:'0 auto',padding:'24px 24px'}}>
      {/* 스텝 인디케이터 */}

        {[1,2,3].map((s,i) => (
          <React.Fragment key={s}>
            <div style={{display:'flex',alignItems:'center',gap:8}}>
              <div style={{width:32,height:32,borderRadius:'50%',
                background:step>=s?C.primary:'#E5E7EB',
                color:step>=s?'#fff':C.textSub,
                display:'flex',alignItems:'center',justifyContent:'center',
                fontWeight:700,fontSize:13,transition:'all 0.3s'}}>
                {step>s ? <Icon name="check" size={14} color="#fff"/> : s}
              </div>
              <span style={{fontSize:13,fontWeight:step===s?700:400,color:step>=s?C.text:C.textSub}}>

            {i<2 && <div style={{flex:1,height:2,background:step>s?C.primary:'#E5E7EB',margin:'0 12px',transition:'all 0.3s'}}/>}

      </div>

      <div style={{background:C.surface,borderRadius:16,padding:'28px 28px',border:`1px solid ${C.border}`,boxShadow:'0 4px 16px rgba(0,0,0,0.06)'}}>

          <div className="fade-in">
            <h3 style={{fontWeight:700,fontSize:18,marginBottom:20}}>차량 및 연락처 확인</h3>

              <div style={{display:'flex',alignItems:'center',gap:8,background:C.bg,borderRadius:10,padding:'12px 16px',border:`1px solid ${C.border}`}}>
                <Icon name="car" size={16} color={C.primary}/>
                <input value={carNum} onChange={e=>setCarNum(e.target.value)}
                  placeholder="예) 123가4567" maxLength={9}
                  style={{flex:1,border:'none',background:'transparent',fontSize:14,outline:'none',fontWeight:600}}/>
              </div>
            </div>
            <div style={{marginBottom:20}}>
              <label style={{fontSize:13,fontWeight:600,color:C.textSub,display:'block',marginBottom:6}}>휴대폰 번호</label>
              <div style={{display:'flex',gap:8}}>
                <div style={{flex:1,display:'flex',alignItems:'center',gap:8,background:C.bg,borderRadius:10,padding:'12px 16px',border:`1px solid ${C.border}`}}>
                  <Icon name="smartphone" size={16} color={C.primary}/>
                  <input value={phone} onChange={e=>setPhone(e.target.value)}

                <button onClick={handleSendOtp}

                    background:phone.length>=10?C.primary:'#E5E7EB',color:phone.length>=10?'#fff':C.textSub,border:'none'}}>
                  {otpSent?'재발송':'인증 발송'}

            </div>
            {otpSent && !otpVerified && (

        )}

        {step === 2 && (
          <div className="fade-in">
            <h3 style={{fontWeight:700,fontSize:18,marginBottom:20}}>장착점 및 일시 선택</h3>

              <label style={{fontSize:13,fontWeight:600,color:C.textSub,display:'block',marginBottom:8}}>장착점 선택</label>

                      border:`2px solid ${selectedStore?.id===store.id?C.primary:C.border}`,

            </div>

        <div style={{display:'flex',flexDirection:'column',gap:8}}>

              border:`1px solid ${C.border}`,display:'flex',justifyContent:'space-between',alignItems:'center'}}>

            </div>
          ))}
        </div>
      </div>
    </div>
  );

                    background:copied===`url-${w.id}`?'#D1FAE5':'#fff',border:`1px solid ${C.border}`,
                    cursor:'pointer',fontSize:12,fontWeight:600,color:copied===`url-${w.id}`?'#065F46':C.textSub}}>
                  <Icon name={copied===`url-${w.id}`?'check':'copy'} size={12} color={copied===`url-${w.id}`?'#065F46':C.textSub}/>
                  {copied===`url-${w.id}`?'복사됨':'URL 복사'}
                </button>
              </div>
              <div style={{background:'#1E293B',borderRadius:8,padding:'10px 14px',marginBottom:12,display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                <code style={{fontSize:11,color:'#94A3B8',fontFamily:'monospace'}}>
                  {`<iframe src="${w.url}" width="100%" height="420" frameborder="0"></iframe>`}
                </code>
                <button onClick={() => handleCopy('iframe', `iframe-${w.id}`)}
                  style={{flexShrink:0,marginLeft:12,display:'flex',alignItems:'center',gap:4,padding:'4px 10px',borderRadius:6,
                    background:'rgba(255,255,255,0.1)',border:'1px solid rgba(255,255,255,0.15)',
                    cursor:'pointer',fontSize:12,fontWeight:600,color:copied===`iframe-${w.id}`?'#34D399':'#94A3B8'}}>
                  <Icon name={copied===`iframe-${w.id}`?'check':'copy'} size={12} color={copied===`iframe-${w.id}`?'#34D399':'#94A3B8'}/>
                  {copied===`iframe-${w.id}`?'복사됨':'코드 복사'}
                </button>
              </div>
              <div style={{display:'flex',gap:16,fontSize:13,color:C.textSub}}>
                <span style={{display:'flex',alignItems:'center',gap:4}}>
                  <Icon name="eye" size={13} color={C.textSub}/> 조회 {w.visits.toLocaleString()}회
                </span>
                <span style={{display:'flex',alignItems:'center',gap:4}}>
                  <Icon name="calendar-check" size={13} color={C.textSub}/> 예약 전환 {w.conversions}건
                </span>
              </div>
            </div>
          </div>
        ))}
      </div>

      {/* 신규 발급 모달 */}
      {newModalOpen && (
        <div style={{position:'fixed',inset:0,zIndex:200,display:'flex',alignItems:'center',justifyContent:'center',background:'rgba(0,0,0,0.4)'}}>
          <div className="scale-up" style={{background:C.surface,borderRadius:16,padding:'28px',width:440,boxShadow:'0 20px 60px rgba(0,0,0,0.2)'}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:20}}>
              <h3 style={{fontWeight:700,fontSize:18}}>위젯 신규 발급</h3>
              <button onClick={() => setNewModalOpen(false)} style={{background:'none',border:'none',cursor:'pointer',padding:4}}>
                <Icon name="x" size={20} color={C.textSub}/>
              </button>
            </div>
            <div style={{marginBottom:20}}>
              <label style={{fontSize:13,fontWeight:600,color:C.textSub,display:'block',marginBottom:6}}>셀러 업체명</label>
              <input value={newSeller} onChange={e=>setNewSeller(e.target.value)}
                placeholder="예) (주)타이어온라인"
                style={{width:'100%',padding:'11px 14px',borderRadius:10,border:`1px solid ${C.border}`,fontSize:14,outline:'none',fontFamily:'Pretendard'}}/>
            </div>
            <div style={{background:'#FFF8F4',borderRadius:10,padding:'12px 14px',fontSize:12,color:'#7C3400',marginBottom:20,display:'flex',gap:6}}>
              <Icon name="info" size={14} color={C.primary} style={{flexShrink:0,marginTop:1}}/>
              발급된 위젯 URL은 셀러의 스마트스토어 상세페이지 HTML 편집기에 삽입합니다.
            </div>
            <div style={{display:'flex',gap:10}}>
              <button onClick={() => setNewModalOpen(false)}
                style={{flex:1,padding:'12px',borderRadius:10,border:`1px solid ${C.border}`,background:C.bg,cursor:'pointer',fontWeight:600,fontSize:14,color:C.textSub}}>
                취소
              </button>
              <button onClick={handleCreate}
                disabled={!newSeller.trim()}
                style={{flex:1,padding:'12px',borderRadius:10,border:'none',
                  background:newSeller.trim()?C.primary:'#E5E7EB',
                  color:newSeller.trim()?'#fff':C.textSub,cursor:newSeller.trim()?'pointer':'not-allowed',
                  fontWeight:700,fontSize:14}}>
                위젯 발급
              </button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// 메인 앱
function App() {
  const [activeTab, setActiveTab] = useState('장착점 검색');
  const [toast, setToast] = useState(null);

  const tabs = ['장착점 검색','공임비 안내','예약하기','셀러 위젯'];

  return (
    <div style={{width:'100%',minHeight:'100vh',display:'flex',flexDirection:'column',background:C.bg}}>
      {/* 헤더 */}
      <header style={{background:C.surface,borderBottom:`1px solid ${C.border}`,position:'sticky',top:0,zIndex:50,
        boxShadow:'0 1px 8px rgba(0,0,0,0.06)'}}>
        <div style={{maxWidth:1200,margin:'0 auto',padding:'0 24px',display:'flex',alignItems:'center',height:64}}>
          <div style={{display:'flex',alignItems:'center',gap:10,marginRight:40}}>
            <div style={{width:36,height:36,borderRadius:10,background:`linear-gradient(135deg,${C.primary},${C.secondary})`,
              display:'flex',alignItems:'center',justifyContent:'center'}}>
              <Icon name="circle-dot" size={18} color="#fff"/>
            </div>
            <div>
              <span style={{fontWeight:800,fontSize:17,color:C.text}}>타이어</span>
              <span style={{fontWeight:800,fontSize:17,color:C.primary}}>바로</span>
            </div>
          </div>
          <nav style={{display:'flex',gap:4,flex:1}}>
            {tabs.map(tab => (
              <button key={tab} onClick={() => setActiveTab(tab)}
                style={{padding:'8px 18px',borderRadius:8,fontWeight:600,fontSize:14,cursor:'pointer',transition:'all 0.2s',
                  background:activeTab===tab?'#FFF4F0':C.surface,
                  color:activeTab===tab?C.primary:C.textSub,
                  border:activeTab===tab?`1px solid #FFDAC8`:`1px solid transparent`}}>
                {tab}
              </button>
            ))}
          </nav>
          <div style={{display:'flex',alignItems:'center',gap:12}}>
            <button style={{display:'flex',alignItems:'center',gap:6,padding:'8px 16px',borderRadius:8,
              background:C.primary,color:'#fff',border:'none',cursor:'pointer',fontWeight:600,fontSize:13}}>
              <Icon name="store" size={14} color="#fff"/> 장착점 등록
            </button>
          </div>
        </div>
      </header>

      {/* 히어로 (장착점 검색 탭일 때만) */}
      {activeTab === '장착점 검색' && (
        <div style={{background:`linear-gradient(135deg,#E84B1A 0%,#FF7A40 50%,#FFC300 100%)`,padding:'32px 24px 0'}}>
          <div style={{maxWidth:1200,margin:'0 auto',display:'flex',alignItems:'flex-end',justifyContent:'space-between'}}>
            <div style={{color:'#fff',paddingBottom:24}}>
              <div style={{fontSize:13,fontWeight:600,opacity:0.85,marginBottom:8,display:'flex',alignItems:'center',gap:6}}>
                <Icon name="map-pin" size={14} color="#fff"/> 내 위치 기준
              </div>
              <h1 style={{fontSize:30,fontWeight:800,lineHeight:1.3,marginBottom:12}}>
                내 타이어,<br/>가장 가까운 장착점에서
              </h1>
              <p style={{fontSize:15,opacity:0.9,marginBottom:0}}>
                회원가입 없이 · 1분 예약 · 카카오 알림톡 확인
              </p>
            </div>
            <div style={{display:'flex',gap:16,paddingBottom:16}}>
              {[
                {icon:'map-pin',label:'전국 가맹점',value:'2,140+'},
                {icon:'calendar-check',label:'이번 달 예약',value:'18,430'},
                {icon:'star',label:'평균 평점',value:'4.7'},
              ].map(s => (
                <div key={s.label} style={{background:'rgba(255,255,255,0.15)',backdropFilter:'blur(10px)',
                  borderRadius:12,padding:'14px 20px',textAlign:'center',border:'1px solid rgba(255,255,255,0.25)'}}>
                  <Icon name={s.icon} size={18} color="#fff" style={{marginBottom:6}}/>
                  <div style={{fontSize:20,fontWeight:800,color:'#fff'}}>{s.value}</div>
                  <div style={{fontSize:11,color:'rgba(255,255,255,0.8)'}}>{s.label}</div>
                </div>
              ))}
            </div>
          </div>
        </div>
      )}

      {/* 컨텐츠 */}
      <main style={{flex:1,width:'100%'}}>
        {activeTab==='장착점 검색' && <SearchScreen/>}
        {activeTab==='공임비 안내' && <FeeTableScreen/>}
        {activeTab==='예약하기' && <ReservationScreen toast={toast} setToast={setToast}/>}
        {activeTab==='셀러 위젯' && <WidgetScreen toast={toast} setToast={setToast}/>}
      </main>

      {toast && <Toast msg={toast} onClose={() => setToast(null)}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
