// Phosphor 아이콘
function Ph({ name, size=16, color='currentColor', weight='regular', style={} }) {
  const cls = `ph-${name}`;
  return <i className={cls} style={{fontSize:size,color:color,display:'inline-flex',alignItems:'center',...style}}/>;
}

// 배지
function Badge({ children, color='default', small=false }) {
  const m = {
    default:{bg:'rgba(100,116,139,0.2)',text:'#94A3B8'},
    success:{bg:'rgba(16,185,129,0.15)',text:'#34D399'},
    warning:{bg:'rgba(245,158,11,0.15)',text:'#FBBF24'},
    danger:{bg:'rgba(239,68,68,0.15)',text:'#F87171'},
    info:{bg:'rgba(56,189,248,0.15)',text:'#38BDF8'},
    primary:{bg:'rgba(30,110,204,0.2)',text:'#60A5FA'},
    teal:{bg:'rgba(13,148,136,0.2)',text:'#2DD4BF'},
  };
  const s = m[color]||m.default;
  return (
    <span style={{display:'inline-block',padding:small?'2px 7px':'3px 10px',borderRadius:6,fontSize:small?10:12,fontWeight:600,background:s.bg,color:s.text,border:`1px solid ${s.text}30`}}>
      {children}
    </span>
  );
}

function Toast({ msg, type='success', onClose }) {
  useEffect(() => { const t = setTimeout(onClose, 2800); return () => clearTimeout(t); }, []);
  const ic = type==='success'?'check-circle':type==='info'?'info':'warning-circle';
  const cl = type==='success'?C.success:type==='info'?C.accent:C.warning;
  return (
    <div style={{position:'fixed',bottom:32,right:32,zIndex:9999,
      background:C.surface,border:`1px solid ${C.border}`,
      padding:'14px 20px',borderRadius:12,fontWeight:600,
      fontSize:14,animation:'fadeSlide 0.25s ease',boxShadow:'0 8px 32px rgba(0,0,0,0.5)',
      display:'flex',alignItems:'center',gap:10,color:C.text,
      borderLeft:`3px solid ${cl}`}}>
      <Ph name={ic} size={18} color={cl}/> {msg}
    </div>
  );
}

      {/* 예약 상세 모달 */}

function SettlementScreen({ setToast }) {
  const [period, setPeriod] = useState('month');
  const [filter, setFilter] = useState('all');
  const [detailOpen, setDetailOpen] = useState(null);

  const items = filter === 'all' ? SETTLEMENT_DATA.items :
    SETTLEMENT_DATA.items.filter(i => filter === 'done' ? i.status === '정산완료' : i.status === '정산예정');

  const totalAmount = items.reduce((a,b) => a + b.amount, 0);

                  <td style={{padding:'12px 16px',fontSize:12,color:C.textSub}}>{s.addr}</td>
                  <td style={{padding:'12px 16px',fontSize:13,color:C.text}}>{s.owner}</td>
                  <td style={{padding:'12px 16px',fontSize:12,color:C.textSub,fontFamily:'monospace'}}>{s.phone}</td>
                  <td style={{padding:'12px 16px',fontSize:13,color:C.text}}>{s.lifts}대</td>
                  <td style={{padding:'12px 16px',fontSize:12,color:C.textSub}}>{s.requested}</td>
                  <td style={{padding:'12px 16px'}}>
                    <Badge color={s.status==='승인완료'?'success':s.status==='승인거부'?'danger':s.status==='검토중'?'info':'warning'} small>{s.status}</Badge>
                  </td>
                  <td style={{padding:'12px 16px'}}>
                    {(s.status==='승인대기'||s.status==='검토중') && (
                      <div style={{display:'flex',gap:6}}>
                        <button onClick={() => handleApproveStore(s.id)}
                          style={{padding:'4px 10px',borderRadius:6,border:`1px solid ${C.success}`,
                            background:'rgba(16,185,129,0.1)',color:'#34D399',cursor:'pointer',fontSize:11,fontWeight:600}}>
                          승인
                        </button>
                        <button onClick={() => handleRejectStore(s.id)}
                          style={{padding:'4px 10px',borderRadius:6,border:`1px solid ${C.danger}`,
                            background:'rgba(239,68,68,0.1)',color:'#F87171',cursor:'pointer',fontSize:11,fontWeight:600}}>
                          거부
                        </button>
                      </div>
                    )}
                  </td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      )}

      {(activeSection === 'overview' || activeSection === 'sellers') && (
        <div style={{background:C.surface,borderRadius:14,border:`1px solid ${C.border}`}}>
          <div style={{padding:'14px 18px',borderBottom:`1px solid ${C.border}`,display:'flex',justifyContent:'space-between',alignItems:'center'}}>
            <div style={{fontWeight:700,fontSize:15}}>셀러 가입 신청</div>
            <Badge color='primary'>{sellers.filter(s=>s.status==='승인대기'||s.status==='서류검토').length}건</Badge>
          </div>
          <table style={{width:'100%',borderCollapse:'collapse'}}>
            <thead>
              <tr style={{borderBottom:`1px solid ${C.border}`}}>
                {['업체명','이메일','스마트스토어','플랜','신청일','상태','처리'].map(h => (
                  <th key={h} style={{padding:'10px 16px',textAlign:'left',fontSize:12,color:C.textSub,fontWeight:600}}>{h}</th>
                ))}
              </tr>
            </thead>
            <tbody>
              {sellers.map(s => (
                <tr key={s.id} style={{borderBottom:`1px solid ${C.border}`}}>
                  <td style={{padding:'12px 16px',fontSize:13,fontWeight:600,color:C.text}}>{s.seller}</td>
                  <td style={{padding:'12px 16px',fontSize:12,color:C.textSub}}>{s.email}</td>
                  <td style={{padding:'12px 16px',fontSize:12,color:C.accent,fontFamily:'monospace'}}>{s.store.replace('https://smartstore.naver.com/','../')}</td>
                  <td style={{padding:'12px 16px'}}><Badge color='primary' small>{s.plan}</Badge></td>
                  <td style={{padding:'12px 16px',fontSize:12,color:C.textSub}}>{s.requested}</td>
                  <td style={{padding:'12px 16px'}}><Badge color={s.status==='승인완료'?'success':s.status==='서류검토'?'info':'warning'} small>{s.status}</Badge></td>
                  <td style={{padding:'12px 16px'}}>
                    {(s.status==='승인대기'||s.status==='서류검토') && (
                      <div style={{display:'flex',gap:6}}>
                        <button onClick={() => handleApproveSeller(s.id)}
                          style={{padding:'4px 12px',borderRadius:6,border:`1px solid ${C.primary}`,
                            background:'rgba(30,110,204,0.15)',color:C.accent,cursor:'pointer',fontSize:11,fontWeight:600}}>
                          승인
                        </button>
                      </div>
                    )}
                  </td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      )}
    </div>
  );
}

// 글로벌 네비게이션 (spa-modern)
function GlobalNav({ page, setPage }) {
  const [scrolled, setScrolled] = useState(false);
  useEffect(() => {
    const el = document.getElementById('main-content');
    if (!el) return;
    const onScroll = () => setScrolled(el.scrollTop > 20);
    el.addEventListener('scroll', onScroll);
    return () => el.removeEventListener('scroll', onScroll);
  }, []);

  const navItems = [
    {key:'예약 캘린더',icon:'calendar'},
    {key:'정산 내역',icon:'receipt'},
    {key:'구독 관리',icon:'credit-card'},
    {key:'어드민 제어',icon:'shield-check'},
  ];

  return (
    <header style={{
      position:'sticky',top:0,zIndex:50,
      background:scrolled?'rgba(15,23,42,0.95)':'rgba(15,23,42,0.8)',
      backdropFilter:'blur(12px)',
      borderBottom:`1px solid ${scrolled?C.border:'transparent'}`,
      transition:'all 0.2s',
      width:'100%'}}>
      <div style={{maxWidth:1200,margin:'0 auto',padding:'0 24px',display:'flex',alignItems:'center',height:64}}>
        {/* 로고 */}
        <div style={{display:'flex',alignItems:'center',gap:10,marginRight:48}}>
          <div style={{width:34,height:34,borderRadius:9,background:`linear-gradient(135deg,${C.primary},${C.teal})`,
            display:'flex',alignItems:'center',justifyContent:'center'}}>
            <Ph name="gear-six" size={18} color="#fff" weight="bold"/>
          </div>
          <div>
            <span style={{fontWeight:800,fontSize:15,color:C.text}}>타이어바로</span>
            <span style={{fontWeight:600,fontSize:12,color:C.textSub,marginLeft:4}}>파트너 어드민</span>
          </div>
        </div>

        {/* 네비 */}
        <nav style={{display:'flex',gap:2,flex:1}}>
          {navItems.map(item => (
            <button key={item.key} onClick={() => setPage(item.key)}
              style={{display:'flex',alignItems:'center',gap:7,padding:'8px 16px',borderRadius:8,
                fontWeight:600,fontSize:13,cursor:'pointer',transition:'all 0.2s',
                background:page===item.key?'rgba(30,110,204,0.18)':'transparent',
                color:page===item.key?C.accent:C.textSub,
                border:page===item.key?`1px solid rgba(30,110,204,0.3)`:'1px solid transparent'}}>
              <Ph name={item.icon} size={14} color={page===item.key?C.accent:C.textSub}/>
              {item.key}
            </button>
          ))}
        </nav>

        {/* 우측 */}
        <div style={{display:'flex',alignItems:'center',gap:10}}>
          <div style={{width:36,height:36,borderRadius:10,background:'rgba(30,110,204,0.15)',
            display:'flex',alignItems:'center',justifyContent:'center'}}>
            <Ph name="user" size={16} color={C.primary}/>
          </div>
          <div style={{display:'none'}}>
            <div style={{fontSize:13,fontWeight:600,color:C.text}}>박민준</div>
            <div style={{fontSize:11,color:C.textSub}}>강남 타이어킹</div>
          </div>
        </div>
      </div>

      {/* 페이지 서브 탭 */}
      <div style={{borderTop:`1px solid ${C.border}`,background:'rgba(30,41,59,0.5)'}}>
        <div style={{maxWidth:1200,margin:'0 auto',padding:'0 24px',display:'flex',alignItems:'center',height:36,gap:4}}>
          <Ph name="house" size={13} color={C.textMuted}/>
          <span style={{fontSize:12,color:C.textMuted}}>홈</span>
          <Ph name="caret-right" size={11} color={C.textMuted}/>
          <span style={{fontSize:12,color:C.textSub}}>{page}</span>
        </div>
      </div>
    </header>
  );
}

// 메인 앱
function App() {
  const [page, setPage] = useState('예약 캘린더');
  const [toast, setToast] = useState(null);

  const renderPage = () => {
    switch(page) {
      case '예약 캘린더': return <CalendarScreen setToast={setToast}/>;
      case '정산 내역': return <SettlementScreen setToast={setToast}/>;
      case '구독 관리': return <BillingScreen setToast={setToast}/>;
      case '어드민 제어': return <AdminScreen setToast={setToast}/>;
      default: return <CalendarScreen setToast={setToast}/>;
    }
  };

  return (
    <div style={{width:'100%',minHeight:'100vh',display:'flex',flexDirection:'column',background:C.bg}}>
      <GlobalNav page={page} setPage={setPage}/>
      <main id="main-content" style={{flex:1,width:'100%',overflowY:'auto'}}>
        {renderPage()}
      </main>

      {/* 하단 푸터 */}
      <footer style={{borderTop:`1px solid ${C.border}`,padding:'14px 24px',background:C.surface}}>
        <div style={{maxWidth:1200,margin:'0 auto',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
          <div style={{display:'flex',gap:24}}>
            {['이용약관','개인정보처리방침','파트너 지원'].map(l => (
              <span key={l} style={{fontSize:12,color:C.textMuted,cursor:'pointer'}}>{l}</span>
            ))}
          </div>
          <span style={{fontSize:12,color:C.textMuted}}>타이어바로 파트너 어드민 © 2025</span>
        </div>
      </footer>

      {toast && <Toast msg={toast} onClose={() => setToast(null)}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
