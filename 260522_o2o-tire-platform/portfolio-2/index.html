            <div className="content">
              <div className="grid-2">
                <div>
                  <div className="section-header" style={{marginBottom:16}}>
                    <div><div className="section-title">신규 가맹점 승인 대기</div><div className="section-subtitle">{pendingShops.length}건 검토 필요</div></div>
                  </div>
                  <div style={{display:'flex',flexDirection:'column',gap:10}}>
                    {pendingShops.filter(s => !approvedShops.includes(s.id)).map(shop => (
                      <div key={shop.id} className="approval-card" onClick={() => setShowApproval(shop)}>
                        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:4}}>
                          <span className="badge badge-orange"><i className="ph ph-clock" style={{fontSize:10}}></i> 승인대기</span>
                          <span style={{fontSize:11,color:'#64748B'}}>{shop.id}</span>
                        </div>
                        <div className="shop-approval-name">{shop.name}</div>
                        <div className="shop-approval-meta">
                          <span><i className="ph ph-map-pin" style={{fontSize:12}}></i> {shop.addr}</span>
                          <span>리프트 {shop.lifts}대</span>
                        </div>
                        <div className="approval-actions">
                          <button className="btn-approve" onClick={e => { e.stopPropagation(); setShowApproval(shop); }}>승인</button>
                          <button className="btn-reject" onClick={e => { e.stopPropagation(); showToast(`${shop.name} 반려 처리되었습니다.`); }}>반려</button>
                        </div>
                      </div>
                    ))}
                    {pendingShops.every(s => approvedShops.includes(s.id)) && (
                      <div className="card" style={{textAlign:'center',color:'#4ADE80',padding:'32px 20px'}}>
                        <i className="ph ph-check-circle" style={{fontSize:40,marginBottom:8,display:'block'}}></i>
                        모든 신청 건이 처리되었습니다.
                      </div>
                    )}
                  </div>
                </div>
                <div>
                  <div className="section-header" style={{marginBottom:16}}>
                    <div className="section-title">공임비 기준 테이블 편집</div>
                  </div>
                  <div className="card">
                    <div style={{fontSize:12,color:'#64748B',marginBottom:14}}>수정 후 저장하면 Redis 캐시가 즉시 갱신됩니다.</div>
                    {[
                      { size: '14인치', domestic: '24,000~30,000', import_: '29,000~36,000' },
                      { size: '15인치', domestic: '28,000~35,000', import_: '34,000~42,000' },
                      { size: '16인치', domestic: '32,000~40,000', import_: '39,000~48,000' },
                      { size: '17인치', domestic: '36,000~45,000', import_: '44,000~54,000' },
                    ].map(r => (
                      <div key={r.size} style={{display:'grid',gridTemplateColumns:'80px 1fr 1fr',gap:8,marginBottom:8,alignItems:'center'}}>
                        <span style={{fontSize:13,fontWeight:700,color:'#F1F5F9'}}>{r.size}</span>
                        <input className="form-input" defaultValue={r.domestic} style={{fontSize:12,padding:'7px 10px'}} />
                        <input className="form-input" defaultValue={r.import_} style={{fontSize:12,padding:'7px 10px'}} />
                      </div>
                    ))}
                    <button className="btn-primary" style={{width:'100%',marginTop:12}} onClick={() => showToast('공임비 테이블이 업데이트되었습니다. Redis 캐시 무효화 완료.')}>
                      변경사항 저장 & 캐시 갱신
                    </button>
                  </div>
                </div>
              </div>
            </div>
          </div>
        )}
      </main>

      <footer className="footer">
        <div className="footer-logo">타이어 플랫폼 B2B Admin v2.4.1</div>
        <div className="footer-links">
          {['API 문서','운영 가이드','보안 정책','고객지원'].map(l => <button key={l} className="footer-link">{l}</button>)}
        </div>
      </footer>

      {showWidget && <WidgetModal onClose={() => setShowWidget(false)} onSuccess={() => { setShowWidget(false); showToast('위젯 URL이 발급되었습니다.'); }} />}
      {showSettle && <SettleModal item={showSettle} onClose={() => setShowSettle(null)} />}
      {showApproval && <AdminApprovalModal shop={showApproval} onClose={() => setShowApproval(null)}
        onApprove={() => { setApprovedShops(p => [...p, showApproval.id]); setShowApproval(null); showToast(`${showApproval.name} 가맹 승인 완료.`); }} />}
      {toast && <Toast msg={toast} onHide={() => setToast(null)} />}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
