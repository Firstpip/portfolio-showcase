<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>열전도도 측정 제어 소프트웨어 — 맞춤 구현 데모</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://unpkg.com/prop-types@15/prop-types.min.js"></script>
<script src="https://unpkg.com/react-is@18/umd/react-is.production.min.js"></script>
<script src="https://unpkg.com/recharts@2.12.7/umd/Recharts.js"></script>
<script src="https://unpkg.com/lucide@latest"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Pretendard', -apple-system, sans-serif; background: #F0F7F8; color: #1A2E32; }
  :root {
    --primary: #1A7A85;
    --primary-light: #2DA89B;
    --primary-dark: #145E67;
    --accent: #0EA891;
    --bg: #F0F7F8;
    --surface: #FFFFFF;
    --text-primary: #1A2E32;
    --text-secondary: #4A7078;
    --border: #BDD8DC;
    --sidebar-w: 240px;
    --topbar-h: 52px;
    --radius: 10px;
    --shadow: 0 2px 12px rgba(26,122,133,0.10), 0 1px 3px rgba(26,122,133,0.06);
    --shadow-hover: 0 6px 24px rgba(26,122,133,0.16), 0 2px 8px rgba(26,122,133,0.08);
  }

  /* Layout */
  #root { display: flex; width: 100%; min-height: 100vh; }
  .sidebar {
    position: fixed; left: 0; top: 0; bottom: 0;
    width: var(--sidebar-w);
    background: var(--primary-dark);
    display: flex; flex-direction: column;
    z-index: 100;
  }
  .main-wrap {
    margin-left: var(--sidebar-w);
    flex: 1;
    min-width: 0;
    width: calc(100% - var(--sidebar-w));
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }
  .topbar {
    position: sticky; top: 0; z-index: 50;
    height: var(--topbar-h);
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 24px;
    box-shadow: 0 1px 4px rgba(26,122,133,0.06);
  }
  .content { flex: 1; padding: 28px 32px; }

  /* Sidebar */
  .sidebar-brand {
    padding: 18px 20px 14px;
    border-bottom: 1px solid rgba(255,255,255,0.10);
  }
  .sidebar-brand-label {
    font-size: 11px; font-weight: 600; letter-spacing: 0.08em;
    color: rgba(255,255,255,0.50); text-transform: uppercase; margin-bottom: 4px;
  }
  .sidebar-brand-name {
    font-size: 14px; font-weight: 700; color: #FFFFFF; line-height: 1.3;
  }
  .sidebar-section-label {
    padding: 20px 20px 6px;
    font-size: 10px; font-weight: 600; letter-spacing: 0.09em;
    color: rgba(255,255,255,0.38); text-transform: uppercase;
  }
  .sidebar-nav { flex: 1; padding: 6px 12px; }
  .nav-item {
    display: flex; align-items: center; gap: 10px;
    padding: 9px 12px;
    border-radius: 8px;
    cursor: pointer;
    color: rgba(255,255,255,0.72);
    font-size: 13.5px; font-weight: 500;
    transition: all 0.15s;
    margin-bottom: 2px;
  }
  .nav-item:hover { background: rgba(255,255,255,0.10); color: #fff; }
  .nav-item.active { background: rgba(14,168,145,0.28); color: #fff; font-weight: 600; }
  .nav-item.active .nav-dot { background: var(--accent); }
  .nav-dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: rgba(255,255,255,0.25);
    flex-shrink: 0;
    margin-left: auto;
    transition: background 0.15s;
  }
  .sidebar-status {
    padding: 14px 16px;
    margin: 10px 12px;
    background: rgba(255,255,255,0.07);
    border-radius: 8px;
    border: 1px solid rgba(255,255,255,0.10);
  }
  .status-label { font-size: 10px; color: rgba(255,255,255,0.45); font-weight: 600; text-transform: uppercase; letter-spacing: 0.07em; }
  .status-value { font-size: 13px; color: #fff; margin-top: 4px; font-weight: 500; }
  .status-badge {
    display: inline-flex; align-items: center; gap: 5px;
    padding: 2px 8px; border-radius: 20px;
    font-size: 11px; font-weight: 600; margin-top: 6px;
  }
  .status-badge.connected { background: rgba(14,168,145,0.25); color: #4CE8C8; }
  .status-badge.disconnected { background: rgba(255,100,100,0.20); color: #FF8080; }
  .status-dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; }

  /* Topbar */
  .topbar-title { font-size: 15px; font-weight: 700; color: var(--text-primary); }
  .topbar-subtitle { font-size: 12px; color: var(--text-secondary); margin-top: 1px; }
  .topbar-right { display: flex; align-items: center; gap: 10px; }
  .topbar-btn {
    display: flex; align-items: center; gap: 6px;
    padding: 6px 14px; border-radius: 8px;
    font-size: 13px; font-weight: 600;
    cursor: pointer; border: none;
    transition: all 0.15s;
  }
  .topbar-btn.primary { background: var(--primary); color: #fff; }
  .topbar-btn.primary:hover { background: var(--primary-light); }
  .topbar-btn.secondary { background: var(--bg); color: var(--text-secondary); border: 1px solid var(--border); }
  .topbar-btn.secondary:hover { border-color: var(--primary); color: var(--primary); }

  /* Cards */
  .card {
    background: var(--surface);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    border: 1px solid rgba(189,216,220,0.60);
    transition: box-shadow 0.18s;
  }
  .card:hover { box-shadow: var(--shadow-hover); }
  .card-header {
    padding: 18px 22px 14px;
    border-bottom: 1px solid #EAF3F4;
    display: flex; align-items: center; justify-content: space-between;
  }
  .card-title { font-size: 14px; font-weight: 700; color: var(--text-primary); }
  .card-subtitle { font-size: 12px; color: var(--text-secondary); margin-top: 2px; }
  .card-body { padding: 20px 22px; }

  /* Stat cards */
  .stat-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 24px; }
  .stat-card {
    background: var(--surface);
    border-radius: var(--radius);
    padding: 18px 20px;
    box-shadow: var(--shadow);
    border: 1px solid rgba(189,216,220,0.60);
    position: relative;
    overflow: hidden;
  }
  .stat-card::before {
    content: '';
    position: absolute; top: 0; left: 0; right: 0;
    height: 3px;
  }
  .stat-card.teal::before { background: var(--primary); }
  .stat-card.green::before { background: #22C55E; }
  .stat-card.amber::before { background: #F59E0B; }
  .stat-card.red::before { background: #EF4444; }
  .stat-label { font-size: 11px; font-weight: 600; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.07em; }
  .stat-value { font-size: 26px; font-weight: 700; color: var(--text-primary); margin: 6px 0 4px; font-variant-numeric: tabular-nums; }
  .stat-unit { font-size: 13px; color: var(--text-secondary); }
  .stat-trend { font-size: 12px; color: var(--text-secondary); display: flex; align-items: center; gap: 4px; }

  /* Table */
  .data-table { width: 100%; border-collapse: collapse; }
  .data-table th {
    text-align: left; padding: 10px 14px;
    font-size: 11px; font-weight: 700; text-transform: uppercase;
    letter-spacing: 0.07em; color: var(--text-secondary);
    background: #F4FAFB;
    border-bottom: 1px solid var(--border);
  }
  .data-table td {
    padding: 11px 14px;
    font-size: 13.5px; color: var(--text-primary);
    border-bottom: 1px solid #EDF5F6;
  }
  .data-table tr:hover td { background: #F4FAFB; }
  .data-table tr:last-child td { border-bottom: none; }
  .data-table tr { cursor: pointer; }

  /* Badge */
  .badge {
    display: inline-flex; align-items: center;
    padding: 2px 8px; border-radius: 20px;
    font-size: 11px; font-weight: 600;
  }
  .badge-teal { background: rgba(26,122,133,0.12); color: var(--primary-dark); }
  .badge-green { background: rgba(34,197,94,0.12); color: #16A34A; }
  .badge-amber { background: rgba(245,158,11,0.12); color: #D97706; }
  .badge-red { background: rgba(239,68,68,0.12); color: #DC2626; }
  .badge-gray { background: rgba(100,116,139,0.10); color: #64748B; }

  /* Grid layout */
  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
  .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; }

  /* Device panel */
  .device-panel {
    background: #E8F5F7;
    border: 2px solid var(--primary);
    border-radius: var(--radius);
    padding: 20px;
    margin-bottom: 18px;
  }
  .device-id { font-size: 12px; color: var(--text-secondary); font-weight: 600; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.06em; }
  .device-name { font-size: 18px; font-weight: 700; color: var(--text-primary); }

  /* Form controls */
  .form-row { display: flex; align-items: center; gap: 12px; margin-bottom: 14px; }
  .form-label { font-size: 12px; font-weight: 600; color: var(--text-secondary); width: 120px; flex-shrink: 0; }
  .form-select, .form-input {
    flex: 1; padding: 8px 12px;
    border: 1px solid var(--border); border-radius: 7px;
    font-size: 13px; color: var(--text-primary);
    background: var(--surface);
    font-family: inherit;
    outline: none;
  }
  .form-select:focus, .form-input:focus { border-color: var(--primary); }
  .btn {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 8px 16px; border-radius: 8px;
    font-size: 13px; font-weight: 600;
    cursor: pointer; border: none;
    transition: all 0.15s;
  }
  .btn-primary { background: var(--primary); color: #fff; }
  .btn-primary:hover { background: var(--primary-light); }
  .btn-secondary { background: #F0F7F8; color: var(--text-secondary); border: 1px solid var(--border); }
  .btn-secondary:hover { border-color: var(--primary); color: var(--primary); }
  .btn-danger { background: #FEF2F2; color: #DC2626; border: 1px solid #FECACA; }
  .btn-danger:hover { background: #DC2626; color: #fff; }
  .btn-success { background: #F0FDF4; color: #16A34A; border: 1px solid #BBF7D0; }
  .btn-success:hover { background: #16A34A; color: #fff; }

  /* Progress bar */
  .progress-bar { height: 8px; background: #E2EFF0; border-radius: 4px; overflow: hidden; }
  .progress-fill { height: 100%; background: var(--primary); border-radius: 4px; transition: width 0.4s; }

  /* Realtime monitor */
  .monitor-value {
    font-size: 32px; font-weight: 700; font-variant-numeric: tabular-nums;
    color: var(--text-primary); line-height: 1.1;
  }
  .monitor-unit { font-size: 14px; color: var(--text-secondary); font-weight: 500; }

  /* Toast */
  .toast-container {
    position: fixed; top: 20px; right: 24px; z-index: 9999;
    display: flex; flex-direction: column; gap: 8px;
  }
  .toast {
    background: #1A2E32; color: #fff;
    padding: 12px 18px; border-radius: 10px;
    font-size: 13px; font-weight: 500;
    box-shadow: 0 4px 20px rgba(0,0,0,0.18);
    display: flex; align-items: center; gap: 10px;
    animation: slideIn 0.22s ease;
    max-width: 320px;
  }
  .toast.success { border-left: 3px solid #22C55E; }
  .toast.warning { border-left: 3px solid #F59E0B; }
  .toast.error { border-left: 3px solid #EF4444; }
  @keyframes slideIn { from { transform: translateX(20px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

  /* Modal */
  .modal-overlay {
    position: fixed; inset: 0; background: rgba(26,46,50,0.45);
    display: flex; align-items: center; justify-content: center; z-index: 500;
    animation: fadeIn 0.18s;
  }
  .modal {
    background: var(--surface); border-radius: 14px;
    box-shadow: 0 20px 60px rgba(26,46,50,0.22);
    width: 520px; max-width: 92vw;
    animation: modalIn 0.20s ease;
  }
  .modal-header {
    padding: 20px 24px 16px;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
  }
  .modal-title { font-size: 16px; font-weight: 700; }
  .modal-body { padding: 20px 24px; }
  .modal-footer { padding: 14px 24px; border-top: 1px solid var(--border); display: flex; gap: 10px; justify-content: flex-end; }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  @keyframes modalIn { from { transform: scale(0.95) translateY(10px); opacity: 0; } to { transform: scale(1) translateY(0); opacity: 1; } }
  .close-btn { background: none; border: none; cursor: pointer; color: var(--text-secondary); padding: 4px; border-radius: 6px; display: flex; }
  .close-btn:hover { background: var(--bg); color: var(--text-primary); }

  /* Recipe params */
  .param-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 12px; }
  .param-item { background: #F4FAFB; border-radius: 8px; padding: 10px 14px; }
  .param-key { font-size: 11px; color: var(--text-secondary); font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; }
  .param-val { font-size: 15px; font-weight: 700; color: var(--text-primary); margin-top: 2px; }

  /* Chart wrapper */
  .chart-wrap { width: 100%; height: 220px; }
  .chart-mini { width: 100%; height: 130px; }

  /* Segment control */
  .segment {
    display: inline-flex; background: #E8F5F7;
    border-radius: 8px; padding: 3px; gap: 2px;
  }
  .seg-btn {
    padding: 5px 14px; border-radius: 6px;
    font-size: 12.5px; font-weight: 600;
    cursor: pointer; border: none; background: transparent;
    color: var(--text-secondary); transition: all 0.14s;
  }
  .seg-btn.active { background: var(--primary); color: #fff; }

  /* Animate */
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }
  .pulse { animation: pulse 1.8s infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .spin { animation: spin 1.2s linear infinite; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;
const { LineChart, Line, XAxis, YAxis, CartesianGrid, Tooltip, Legend, ResponsiveContainer, AreaChart, Area } = Recharts;

// ──────────────── Mock Data ────────────────
const RECIPES = [
  { id: 1, name: '표준 측정 A', temp: 25, voltage: 3.3, sampling: 100, duration: 60, unit: 'ms', updated: '2026-05-20' },
  { id: 2, name: '고온 측정 B', temp: 80, voltage: 5.0, sampling: 50, duration: 120, unit: 'ms', updated: '2026-05-18' },
  { id: 3, name: '저온 측정 C', temp: -10, voltage: 3.3, sampling: 200, duration: 90, unit: 'ms', updated: '2026-05-15' },
  { id: 4, name: '정밀 측정 D', temp: 25, voltage: 3.3, sampling: 20, duration: 180, unit: 'ms', updated: '2026-05-12' },
  { id: 5, name: '빠른 스캔 E', temp: 40, voltage: 5.0, sampling: 500, duration: 30, unit: 'ms', updated: '2026-05-10' },
];

const MEAS_DATA = Array.from({ length: 30 }, (_, i) => ({
  t: `${String(Math.floor(i * 2)).padStart(2, '0')}:${String((i % 30) * 2).padStart(2, '0')}`,
  conductivity: +(0.58 + Math.sin(i * 0.4) * 0.04 + (Math.random() - 0.5) * 0.015).toFixed(4),
  temperature: +(24.8 + Math.sin(i * 0.25) * 0.6 + (Math.random() - 0.5) * 0.2).toFixed(2),
  voltage: +(3.28 + (Math.random() - 0.5) * 0.06).toFixed(3),
}));

const RESULTS = [
  { id: 'SES-001', recipe: '표준 측정 A', sample: 'SiO₂-α', conductivity: '0.5814 W/m·K', status: '완료', time: '10:23' },
  { id: 'SES-002', recipe: '고온 측정 B', sample: 'Al₂O₃-β', conductivity: '0.6102 W/m·K', status: '완료', time: '11:45' },
  { id: 'SES-003', recipe: '표준 측정 A', sample: 'SiC-γ', conductivity: '—', status: '진행중', time: '13:20' },
  { id: 'SES-004', recipe: '정밀 측정 D', sample: 'Al₂O₃-δ', conductivity: '0.5977 W/m·K', status: '완료', time: '14:05' },
];

// ──────────────── Components ────────────────
function Icon({ name, size = 16, ...props }) {
  const ref = React.useRef(null);
  React.useEffect(() => {
    if (ref.current && window.lucide) window.lucide.createIcons({ nodes: [ref.current] });
  }, [name, size]);
  return <i ref={ref} data-lucide={name} style={{ width: size, height: size, display: 'inline-flex', flexShrink: 0, ...props.style }} />;
}

function Toast({ toasts }) {
  return (
    <div className="toast-container">
      {toasts.map(t => (
        <div key={t.id} className={`toast ${t.type}`}>
          {t.type === 'success' && <Icon name="check-circle" size={16} style={{ color: '#22C55E', flexShrink: 0 }} />}
          {t.type === 'warning' && <Icon name="alert-triangle" size={16} style={{ color: '#F59E0B', flexShrink: 0 }} />}
          {t.type === 'error' && <Icon name="x-circle" size={16} style={{ color: '#EF4444', flexShrink: 0 }} />}
          {t.msg}
        </div>
      ))}
    </div>
  );
}

function useToast() {
  const [toasts, setToasts] = useState([]);
  const push = useCallback((msg, type = 'success') => {
    const id = Date.now();
    setToasts(p => [...p, { id, msg, type }]);
    setTimeout(() => setToasts(p => p.filter(t => t.id !== id)), 2800);
  }, []);
  return { toasts, push };
}

// ──────────────── Screens ────────────────
function DeviceControlScreen({ push }) {
  const [port, setPort] = useState('COM3');
  const [connected, setConnected] = useState(false);
  const [connecting, setConnecting] = useState(false);
  const [warmupProgress, setWarmupProgress] = useState(0);
  const [calProgress, setCalProgress] = useState(0);
  const [warmupRunning, setWarmupRunning] = useState(false);
  const [calRunning, setCalRunning] = useState(false);
  const [liveTemp, setLiveTemp] = useState(24.8);
  const [liveVolt, setLiveVolt] = useState(3.28);

  useEffect(() => {
    if (!connected) return;
    const iv = setInterval(() => {
      setLiveTemp(t => +(t + (Math.random() - 0.5) * 0.12).toFixed(2));
      setLiveVolt(v => +(v + (Math.random() - 0.5) * 0.03).toFixed(3));
    }, 1500);
    return () => clearInterval(iv);
  }, [connected]);

  function handleConnect() {
    setConnecting(true);
    setTimeout(() => { setConnecting(false); setConnected(true); push(`${port} 장비 연결 완료`, 'success'); }, 1600);
  }
  function handleDisconnect() { setConnected(false); setWarmupProgress(0); setCalProgress(0); push('장비 연결 해제', 'warning'); }
  function runWarmup() {
    setWarmupRunning(true); setWarmupProgress(0);
    let p = 0;
    const iv = setInterval(() => {
      p += 4; setWarmupProgress(Math.min(p, 100));
      if (p >= 100) { clearInterval(iv); setWarmupRunning(false); push('Warm-up 완료 — 안정화됨', 'success'); }
    }, 200);
  }
  function runCalibration() {
    setCalRunning(true); setCalProgress(0);
    let p = 0;
    const iv = setInterval(() => {
      p += 6; setCalProgress(Math.min(p, 100));
      if (p >= 100) { clearInterval(iv); setCalRunning(false); push('Calibration 완료 — 0점 보정 완료', 'success'); }
    }, 150);
  }

  return (
    <div>
      <div className="stat-grid">
        <div className="stat-card teal">
          <div className="stat-label">장비 온도</div>
          <div className="stat-value">{liveTemp}<span className="stat-unit"> °C</span></div>
          <div className="stat-trend"><Icon name="thermometer" size={13} /> 실시간 폴링</div>
        </div>
        <div className="stat-card green">
          <div className="stat-label">공급 전압</div>
          <div className="stat-value">{liveVolt}<span className="stat-unit"> V</span></div>
          <div className="stat-trend"><Icon name="zap" size={13} /> USB 측정</div>
        </div>
        <div className="stat-card" style={{border: connected ? '1px solid rgba(34,197,94,0.30)' : '1px solid rgba(189,216,220,0.60)'}}>
          <div className="stat-label">연결 상태</div>
          <div className="stat-value" style={{fontSize:'18px', marginTop:'8px'}}>
            <span className={`status-badge ${connected ? 'connected' : 'disconnected'}`} style={{fontSize:'13px'}}>
              <span className="status-dot" />
              {connected ? '연결됨' : '연결 안 됨'}
            </span>
          </div>
          <div className="stat-trend" style={{marginTop:'6px'}}>{connected ? port : '—'}</div>
        </div>
        <div className="stat-card amber">
          <div className="stat-label">마지막 Calibration</div>
          <div className="stat-value" style={{fontSize:'18px', marginTop:'8px'}}>
            {calProgress === 100 ? '방금 완료' : '13:25'}
          </div>
          <div className="stat-trend"><Icon name="clock" size={13} /> 오늘</div>
        </div>
      </div>

      <div className="grid-2">
        <div className="card">

{`{

            </div>
            <div className="modal-footer">
              <button className="btn btn-secondary" onClick={() => setShowAdd(false)}>취소</button>
              <button className="btn btn-primary" onClick={addRecipe}><Icon name="plus" size={13} /> 추가</button>

function MeasurementControlScreen({ push }) {
  const [running, setRunning] = useState(false);
  const [elapsed, setElapsed] = useState(0);
  const [data, setData] = useState(MEAS_DATA.slice(0, 8));
  const [activeRecipe, setActiveRecipe] = useState('표준 측정 A');
  const [algStatus, setAlgStatus] = useState('대기 중');
  const [sampleName, setSampleName] = useState('SiO₂-α');

  useEffect(() => {
    if (!running) return;
    setAlgStatus('분석 중...');
    const iv = setInterval(() => {
      setElapsed(e => e + 1);
      setData(prev => {
        if (prev.length >= 30) return prev;
        const last = prev[prev.length - 1];
        const idx = prev.length;
        return [...prev, {
          t: `${String(Math.floor(idx * 2)).padStart(2, '0')}:${String((idx % 30) * 2).padStart(2, '0')}`,
          conductivity: +(0.58 + Math.sin(idx * 0.4) * 0.04 + (Math.random() - 0.5) * 0.015).toFixed(4),
          temperature: +(24.8 + Math.sin(idx * 0.25) * 0.6 + (Math.random() - 0.5) * 0.2).toFixed(2),
          voltage: +(3.28 + (Math.random() - 0.5) * 0.06).toFixed(3),
        }];
      });
    }, 1000);
    return () => { clearInterval(iv); setAlgStatus('대기 중'); };
  }, [running]);

  function startMeas() { setRunning(true); setElapsed(0); setData(MEAS_DATA.slice(0, 8)); push('측정 시작 — Python 알고리즘 연동 중', 'success'); }
  function stopMeas() { setRunning(false); push(`측정 완료 — ${elapsed}초간 ${data.length}개 샘플 수집`, 'success'); }

  const last = data[data.length - 1];

  return (
    <div>
      <div style={{ display: 'flex', gap: '12px', marginBottom: '24px', alignItems: 'flex-end' }}>
        <div style={{ flex: 1, background: 'var(--surface)', border: '1px solid var(--border)', borderRadius: 'var(--radius)', padding: '14px 20px' }}>
          <div style={{ fontSize: '11px', color: 'var(--text-secondary)', fontWeight: 600, marginBottom: '4px' }}>활성 레시피</div>
          <select className="form-select" value={activeRecipe} onChange={e => setActiveRecipe(e.target.value)} disabled={running} style={{ padding: '6px 10px', fontSize: '14px', fontWeight: 600, border: 'none', background: 'transparent' }}>
            {RECIPES.map(r => <option key={r.id}>{r.name}</option>)}
          </select>
        </div>
        <div style={{ background: 'var(--surface)', border: '1px solid var(--border)', borderRadius: 'var(--radius)', padding: '14px 20px' }}>
          <div style={{ fontSize: '11px', color: 'var(--text-secondary)', fontWeight: 600, marginBottom: '4px' }}>샘플명</div>
          <input className="form-input" value={sampleName} onChange={e => setSampleName(e.target.value)} disabled={running} style={{ border: 'none', background: 'transparent', fontWeight: 600, fontSize: '14px', padding: '0' }} />
        </div>
        <button className={`btn ${running ? 'btn-danger' : 'btn-primary'}`} style={{ padding: '12px 24px', fontSize: '14px' }} onClick={running ? stopMeas : startMeas}>
          {running ? <><Icon name="square" size={15} /> 측정 중지</> : <><Icon name="play" size={15} /> 측정 시작</>}
        </button>
      </div>

      <div className="stat-grid" style={{ marginBottom: '20px' }}>
        <div className="stat-card teal">
          <div className="stat-label">현재 열전도도</div>
          <div className="stat-value" style={{ fontSize: '22px' }}>{last?.conductivity ?? '—'}<span className="stat-unit"> W/m·K</span></div>
        </div>
        <div className="stat-card green">
          <div className="stat-label">측정 온도</div>
          <div className="stat-value" style={{ fontSize: '22px' }}>{last?.temperature ?? '—'}<span className="stat-unit"> °C</span></div>
        </div>
        <div className="stat-card amber">
          <div className="stat-label">경과 시간</div>
          <div className="stat-value" style={{ fontSize: '22px' }}>{elapsed}<span className="stat-unit"> s</span></div>
        </div>
        <div className="stat-card">
          <div className="stat-label">알고리즘 상태</div>
          <div style={{ marginTop: '8px' }}>
            <span className={`badge ${running ? 'badge-teal' : 'badge-gray'}`} style={{ fontSize: '13px' }}>
              {running && <span className="pulse" style={{ marginRight: '4px' }}>●</span>}
              {algStatus}
            </span>
          </div>
          <div style={{ fontSize: '12px', color: 'var(--text-secondary)', marginTop: '8px' }}>수집: {data.length}개 샘플</div>
        </div>
      </div>

      <div className="card">
        <div className="card-header"><div className="card-title">실시간 측정 데이터</div><div className="card-subtitle">Raw Data → Python 알고리즘 → 열전도도 계산</div></div>
        <div className="card-body" style={{ paddingTop: '8px' }}>
          <div className="chart-wrap">
            <ResponsiveContainer width="100%" height="100%">
              <AreaChart data={data} margin={{ top: 5, right: 20, bottom: 5, left: 0 }}>
                <defs>
                  <linearGradient id="condGrad" x1="0" y1="0" x2="0" y2="1">
                    <stop offset="5%" stopColor="#1A7A85" stopOpacity={0.15} />
                    <stop offset="95%" stopColor="#1A7A85" stopOpacity={0} />
                  </linearGradient>
                </defs>
                <CartesianGrid strokeDasharray="3 3" stroke="#E2EFF0" />
                <XAxis dataKey="t" tick={{ fontSize: 11, fill: '#4A7078' }} />
                <YAxis tick={{ fontSize: 11, fill: '#4A7078' }} domain={[0.55, 0.63]} />
                <Tooltip contentStyle={{ fontSize: '12px', borderRadius: '8px', border: '1px solid #BDD8DC' }} />
                <Legend wrapperStyle={{ fontSize: '12px' }} />
                <Area type="monotone" dataKey="conductivity" name="열전도도 (W/m·K)" stroke="#1A7A85" strokeWidth={2} fill="url(#condGrad)" dot={false} />
              </AreaChart>
            </ResponsiveContainer>
          </div>
        </div>
      </div>
    </div>
  );
}

                  <td style={{ fontFamily: 'monospace', fontSize: '12px' }}>{r.id}</td>
                  <td>{r.recipe}</td>
                  <td>{r.sample}</td>
                  <td style={{ fontWeight: 600 }}>{r.conductivity}</td>
                  <td>
                    <span className={`badge ${r.status === '완료' ? 'badge-green' : 'badge-teal'}`}>
                      {r.status === '진행중' && <span className="pulse" style={{ marginRight: '4px' }}>●</span>}
                      {r.status}
                    </span>
                  </td>
                  <td style={{ color: 'var(--text-secondary)', fontSize: '12px' }}>{r.time}</td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      )}
    </div>
  );
}
