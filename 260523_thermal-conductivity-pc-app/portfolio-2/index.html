<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>열전도도 분석 워크스테이션 — 구현 데모</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://unpkg.com/prop-types@15/prop-types.min.js"></script>
<script src="https://unpkg.com/react-is@18/umd/react-is.production.min.js"></script>
<script src="https://unpkg.com/recharts@2.12.7/umd/Recharts.js"></script>
<link rel="stylesheet" href="https://unpkg.com/@tabler/icons-webfont@latest/dist/tabler-icons.min.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Pretendard', -apple-system, sans-serif; background: #FBF6ED; color: #2E1F06; }
  :root {
    --primary: #C87A18;
    --primary-light: #E0963A;
    --primary-dark: #9E5E0E;
    --accent: #F5A623;
    --bg: #FBF6ED;
    --surface: #FFFFFF;
    --text-primary: #2E1F06;
    --text-secondary: #7A5620;
    --border: #E8D8B8;
    --topbar-h: 54px;
    --subnav-h: 44px;
    --radius: 4px;
    --shadow-card: 0 1px 3px rgba(46,31,6,0.06);
  }

  /* Layout */
  #root { display: flex; flex-direction: column; width: 100%; min-height: 100vh; }
  .topnav {
    position: sticky; top: 0; z-index: 100;
    background: var(--surface);
    border-bottom: 2px solid var(--primary);
    height: var(--topbar-h);
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 28px;
  }
  .subnav {
    position: sticky; top: var(--topbar-h); z-index: 90;
    background: var(--bg);
    border-bottom: 1px solid var(--border);
    height: var(--subnav-h);
    display: flex; align-items: center;
    padding: 0 28px;
    gap: 4px;
  }
  .main-content { flex: 1; width: 100%; padding: 28px 32px; }

  /* Topnav */
  .brand { display: flex; align-items: center; gap: 10px; }
  .brand-icon {
    width: 34px; height: 34px;
    background: var(--primary);
    border-radius: 3px;
    display: flex; align-items: center; justify-content: center;
    color: #fff; font-size: 16px;
  }
  .brand-text { font-size: 15px; font-weight: 800; color: var(--text-primary); letter-spacing: -0.3px; }
  .brand-sub { font-size: 10px; color: var(--text-secondary); font-weight: 500; letter-spacing: 0.05em; text-transform: uppercase; }
  .topnav-right { display: flex; align-items: center; gap: 10px; }
  .icon-btn {
    width: 34px; height: 34px;
    display: flex; align-items: center; justify-content: center;
    border-radius: var(--radius); border: 1px solid var(--border);
    background: transparent; cursor: pointer; color: var(--text-secondary);
    transition: all 0.14s; font-size: 18px;
  }
  .icon-btn:hover { background: var(--bg); color: var(--primary); border-color: var(--primary); }
  .topnav-badge {
    background: var(--primary); color: #fff;
    font-size: 10px; font-weight: 700; border-radius: 10px;
    padding: 1px 6px; position: absolute; top: 8px; right: 6px;
  }

  /* Subnav tabs */
  .tab-item {
    display: flex; align-items: center; gap: 7px;
    padding: 6px 14px; border-radius: 3px;
    font-size: 13px; font-weight: 600;
    cursor: pointer; border: none; background: transparent;
    color: var(--text-secondary);
    transition: all 0.14s;
    white-space: nowrap;
  }
  .tab-item:hover { background: rgba(200,122,24,0.08); color: var(--primary-dark); }
  .tab-item.active { background: rgba(200,122,24,0.15); color: var(--primary-dark); }
  .tab-item i { font-size: 16px; }

  /* Cards */
  .card {
    background: var(--surface);
    border-radius: var(--radius);
    border: 1px solid var(--border);
    box-shadow: var(--shadow-card);
  }
  .card-header {
    padding: 14px 18px;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
  }
  .card-title { font-size: 13px; font-weight: 700; color: var(--text-primary); }
  .card-subtitle { font-size: 11px; color: var(--text-secondary); margin-top: 2px; }
  .card-body { padding: 18px; }

  /* Stat */
  .stat-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; margin-bottom: 20px; }
  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 16px;
    box-shadow: var(--shadow-card);
  }
  .stat-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-secondary); }
  .stat-value { font-size: 24px; font-weight: 800; color: var(--text-primary); margin: 5px 0 3px; font-variant-numeric: tabular-nums; }
  .stat-unit { font-size: 11px; font-weight: 500; color: var(--text-secondary); }
  .stat-note { font-size: 11px; color: var(--text-secondary); }

  /* Table */
  .data-table { width: 100%; border-collapse: collapse; font-size: 13px; }
  .data-table th { padding: 9px 14px; text-align: left; font-size: 10px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-secondary); background: #FAF4E8; border-bottom: 1px solid var(--border); }
  .data-table td { padding: 10px 14px; border-bottom: 1px solid #F2EAD8; color: var(--text-primary); }
  .data-table tr:last-child td { border-bottom: none; }
  .data-table tr:hover td { background: #FAF4E8; cursor: pointer; }

  /* Badge */
  .badge { display: inline-flex; align-items: center; gap: 4px; padding: 2px 7px; border-radius: 2px; font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; }
  .badge-amber { background: rgba(245,166,35,0.15); color: #9E5E0E; }
  .badge-green { background: rgba(34,197,94,0.12); color: #15803D; }
  .badge-blue { background: rgba(59,130,246,0.12); color: #1D4ED8; }
  .badge-gray { background: rgba(100,116,139,0.10); color: #475569; }
  .badge-red { background: rgba(239,68,68,0.10); color: #B91C1C; }

  /* Btn */
  .btn { display: inline-flex; align-items: center; gap: 5px; padding: 7px 14px; border-radius: var(--radius); font-size: 12.5px; font-weight: 700; cursor: pointer; border: none; transition: all 0.14s; font-family: inherit; }
  .btn-primary { background: var(--primary); color: #fff; }
  .btn-primary:hover { background: var(--primary-dark); }
  .btn-outline { background: transparent; color: var(--text-secondary); border: 1px solid var(--border); }
  .btn-outline:hover { border-color: var(--primary); color: var(--primary); }
  .btn-ghost { background: transparent; color: var(--text-secondary); border: none; padding: 7px 10px; }
  .btn-ghost:hover { background: #F2EAD8; color: var(--text-primary); }
  .btn-danger { background: #FEF2F2; color: #B91C1C; border: 1px solid #FECACA; }
  .btn-danger:hover { background: #B91C1C; color: #fff; }

  /* Form */
  .form-label { font-size: 11px; font-weight: 700; color: var(--text-secondary); display: block; margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.06em; }
  .form-input, .form-select { width: 100%; padding: 7px 10px; border: 1px solid var(--border); border-radius: var(--radius); font-size: 13px; color: var(--text-primary); background: var(--surface); font-family: inherit; outline: none; }
  .form-input:focus, .form-select:focus { border-color: var(--primary); }
  .form-group { margin-bottom: 14px; }

  /* Session tab strip */
  .session-strip {
    display: flex; align-items: center; gap: 0;
    border-bottom: 2px solid var(--border);
    margin-bottom: 20px;
  }
  .sess-tab {
    display: flex; align-items: center; gap: 6px;
    padding: 8px 16px;
    font-size: 12.5px; font-weight: 600;
    color: var(--text-secondary);
    cursor: pointer; border-bottom: 2px solid transparent; margin-bottom: -2px;
    transition: all 0.13s; white-space: nowrap;
  }
  .sess-tab:hover { color: var(--primary); }
  .sess-tab.active { color: var(--primary); border-bottom-color: var(--primary); }
  .sess-tab .close-x { font-size: 12px; opacity: 0.5; margin-left: 4px; }
  .sess-tab .close-x:hover { opacity: 1; color: #B91C1C; }
  .add-sess-btn {
    padding: 6px 10px; background: none; border: none;
    color: var(--text-secondary); cursor: pointer; font-size: 18px;
    margin-left: 4px;
  }
  .add-sess-btn:hover { color: var(--primary); }

  /* Progress */
  .prog-bar { height: 6px; background: #F2EAD8; border-radius: 2px; overflow: hidden; }
  .prog-fill { height: 100%; background: var(--primary); border-radius: 2px; transition: width 0.4s; }

  /* Modal */
  .modal-overlay { position: fixed; inset: 0; background: rgba(46,31,6,0.40); display: flex; align-items: center; justify-content: center; z-index: 500; animation: fadeIn 0.16s; }
  .modal { background: var(--surface); border-radius: 6px; box-shadow: 0 20px 60px rgba(46,31,6,0.20); width: 500px; max-width: 92vw; animation: modalIn 0.18s ease; }
  .modal-hd { padding: 18px 22px 14px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
  .modal-bd { padding: 18px 22px; }
  .modal-ft { padding: 12px 22px; border-top: 1px solid var(--border); display: flex; gap: 8px; justify-content: flex-end; }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  @keyframes modalIn { from { transform: translateY(12px) scale(0.96); opacity: 0; } to { transform: translateY(0) scale(1); opacity: 1; } }

  /* Toast */
  .toast-wrap { position: fixed; bottom: 24px; right: 24px; z-index: 9999; display: flex; flex-direction: column-reverse; gap: 8px; }
  .toast-item {
    background: #2E1F06; color: #fff;
    padding: 11px 16px; border-radius: 4px; font-size: 12.5px;
    display: flex; align-items: center; gap: 8px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.20);
    animation: toastIn 0.20s ease; max-width: 320px;
  }
  .toast-item.success { border-left: 3px solid #22C55E; }
  .toast-item.info { border-left: 3px solid var(--primary); }
  @keyframes toastIn { from { transform: translateY(16px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

  /* Layout helpers */
  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; }
  .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; }
  .flex-between { display: flex; align-items: center; justify-content: space-between; }
  .flex-gap { display: flex; align-items: center; gap: 8px; }

  /* Chart */
  .chart-h280 { width: 100%; height: 280px; }
  .chart-h200 { width: 100%; height: 200px; }
  .chart-h160 { width: 100%; height: 160px; }

  /* Toolbar */
  .toolbar { display: flex; align-items: center; gap: 8px; margin-bottom: 18px; flex-wrap: wrap; }

  /* Filter chip */
  .chip { display: inline-flex; align-items: center; gap: 4px; padding: 4px 10px; border-radius: 2px; font-size: 11.5px; font-weight: 600; border: 1px solid var(--border); background: var(--surface); color: var(--text-secondary); cursor: pointer; }
  .chip.active { background: rgba(200,122,24,0.12); border-color: var(--primary); color: var(--primary-dark); }

  /* Animate */
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.35; } }
  .pulse { animation: pulse 1.6s infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .spin-el { animation: spin 1.1s linear infinite; display: inline-block; }

  /* Summary panel */
  .summary-panel { background: #FAF4E8; border: 1px solid var(--border); border-radius: var(--radius); padding: 14px; margin-top: 14px; }
  .summary-title { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.07em; color: var(--text-secondary); margin-bottom: 10px; }
  .summary-row { display: flex; justify-content: space-between; align-items: center; padding: 5px 0; border-bottom: 1px solid #EDE4CE; font-size: 12.5px; }
  .summary-row:last-child { border-bottom: none; }
  .summary-key { color: var(--text-secondary); }
  .summary-val { font-weight: 700; color: var(--text-primary); }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;
const { LineChart, Line, XAxis, YAxis, CartesianGrid, Tooltip, Legend, ResponsiveContainer, AreaChart, Area, BarChart, Bar, ScatterChart, Scatter } = Recharts;

// ──────────────── Mock Data ────────────────
const SESSIONS = [
  { id: 'SES-2026-001', name: '표준 측정 A', sample: 'SiO₂-α', recipe: '표준 측정 A', status: '완료', date: '2026-05-21', conductivity: 0.5814, temp: 24.8, samples: 30 },
  { id: 'SES-2026-002', name: '고온 측정 B', sample: 'Al₂O₃-β', recipe: '고온 측정 B', status: '완료', date: '2026-05-21', conductivity: 0.6102, temp: 79.4, samples: 60 },
  { id: 'SES-2026-003', name: '저온 측정 C', sample: 'SiC-γ', recipe: '저온 측정 C', status: '완료', date: '2026-05-22', conductivity: 0.5421, temp: -9.8, samples: 45 },
  { id: 'SES-2026-004', name: '정밀 측정 D', sample: 'Al₂O₃-δ', recipe: '정밀 측정 D', status: '완료', date: '2026-05-22', conductivity: 0.5977, temp: 24.9, samples: 90 },
  { id: 'SES-2026-005', name: '빠른 스캔 E', sample: 'SiO₂-β', recipe: '빠른 스캔 E', status: '완료', date: '2026-05-23', conductivity: 0.5738, temp: 39.6, samples: 15 },
  { id: 'SES-2026-006', name: '표준 측정 A-2', sample: 'SiO₂-γ', recipe: '표준 측정 A', status: '진행중', date: '2026-05-23', conductivity: null, temp: 24.8, samples: 12 },
];

const MULTI_TREND = Array.from({ length: 20 }, (_, i) => ({
  t: `T+${i * 3}m`,
  'SiO₂-α': +(0.5814 + Math.sin(i * 0.3) * 0.008 + (Math.random() - 0.5) * 0.004).toFixed(4),
  'Al₂O₃-β': +(0.6102 + Math.sin(i * 0.25) * 0.012 + (Math.random() - 0.5) * 0.005).toFixed(4),
  'SiC-γ': +(0.5421 + Math.sin(i * 0.4) * 0.006 + (Math.random() - 0.5) * 0.003).toFixed(4),
}));

const HIST_DATA = [
  { range: '0.52~0.54', count: 3 }, { range: '0.54~0.56', count: 7 },
  { range: '0.56~0.58', count: 12 }, { range: '0.58~0.60', count: 18 },
  { range: '0.60~0.62', count: 14 }, { range: '0.62~0.64', count: 8 },
];

// ──────────────── Toast ────────────────
function useToast() {
  const [toasts, setToasts] = useState([]);
  const push = useCallback((msg, type = 'success') => {
    const id = Date.now();
    setToasts(p => [...p, { id, msg, type }]);
    setTimeout(() => setToasts(p => p.filter(t => t.id !== id)), 2800);
  }, []);
  return { toasts, push };
}
function ToastWrap({ toasts }) {
  return (
    <div className="toast-wrap">
      {toasts.map(t => (
        <div key={t.id} className={`toast-item ${t.type}`}>
          <i className={`ti ${t.type === 'success' ? 'ti-check' : 'ti-info-circle'}`} style={{ fontSize: 16, flexShrink: 0, color: t.type === 'success' ? '#22C55E' : 'var(--primary)' }} />
          {t.msg}
        </div>
      ))}
    </div>
  );
}

// ──────────────── Session Manager Screen ────────────────
function SessionManagerScreen({ push }) {
  const [sessions, setSessions] = useState(SESSIONS);
  const [activeSess, setActiveSess] = useState('SES-2026-001');
  const [showNew, setShowNew] = useState(false);
  const [newSample, setNewSample] = useState('');
  const [showDetail, setShowDetail] = useState(null);

  function addSession() {
    if (!newSample.trim()) return;
    const ns = { id: `SES-2026-00${sessions.length + 1}`, name: '표준 측정 A', sample: newSample, recipe: '표준 측정 A', status: '대기', date: '2026-05-23', conductivity: null, temp: 25.0, samples: 0 };
    setSessions(p => [...p, ns]);
    setActiveSess(ns.id);
    setNewSample(''); setShowNew(false);
    push(`세션 "${ns.sample}" 생성 완료`, 'success');
  }

  const cur = sessions.find(s => s.id === activeSess);

  return (
    <div>
      {/* Session tab strip */}
      <div className="session-strip">
        {sessions.map(s => (
          <div key={s.id} className={`sess-tab ${activeSess === s.id ? 'active' : ''}`} onClick={() => setActiveSess(s.id)}>
            <i className={`ti ti-${s.status === '진행중' ? 'activity' : s.status === '완료' ? 'check' : 'clock'}`} style={{ fontSize: 13 }} />
            {s.sample}
            {activeSess === s.id && (
              <span className="close-x" onClick={e => { e.stopPropagation(); setSessions(p => p.filter(x => x.id !== s.id)); setActiveSess(sessions[0]?.id); }}>×</span>
            )}
          </div>
        ))}
        <button className="add-sess-btn" onClick={() => setShowNew(true)} title="새 세션 추가">
          <i className="ti ti-plus" />
        </button>
      </div>

      {cur && (
        <div>
          <div className="stat-row">
            <div className="stat-card">
              <div className="stat-label">세션 ID</div>
              <div style={{ fontFamily: 'monospace', fontSize: '13px', fontWeight: 700, marginTop: '6px' }}>{cur.id}</div>
              <div className="stat-note" style={{ marginTop: '4px' }}>{cur.date}</div>
            </div>
            <div className="stat-card">
              <div className="stat-label">열전도도</div>
              <div className="stat-value" style={{ fontSize: '22px' }}>{cur.conductivity ?? '—'}<span className="stat-unit"> W/m·K</span></div>
            </div>
            <div className="stat-card">
              <div className="stat-label">측정 온도</div>
              <div className="stat-value" style={{ fontSize: '22px' }}>{cur.temp}<span className="stat-unit"> °C</span></div>
            </div>
            <div className="stat-card">
              <div className="stat-label">샘플 수 / 상태</div>
              <div style={{ marginTop: '6px' }}>
                <span className={`badge ${cur.status === '완료' ? 'badge-green' : cur.status === '진행중' ? 'badge-amber' : 'badge-gray'}`}>
                  {cur.status === '진행중' && <span className="pulse">●</span>}
                  {cur.status}
                </span>
              </div>
              <div className="stat-note" style={{ marginTop: '6px' }}>{cur.samples}개 수집</div>
            </div>
          </div>

          <div className="grid-2">
            <div className="card">
              <div className="card-header"><div className="card-title">세션 메타데이터</div></div>
              <div className="card-body">
                {[['샘플명', cur.sample], ['적용 레시피', cur.recipe], ['측정 날짜', cur.date], ['알고리즘 모듈', 'thermal_calc_v2.py']].map(([k, v]) => (
                  <div key={k} className="summary-row"><span className="summary-key">{k}</span><span className="summary-val">{v}</span></div>
                ))}
                <div style={{ marginTop: '14px', display: 'flex', gap: '8px' }}>
                  <button className="btn btn-outline" onClick={() => push(`세션 ${cur.id} 복제 완료`, 'success')} style={{ flex: 1 }}>
                    <i className="ti ti-copy" /> 세션 복제
                  </button>
                  <button className="btn btn-primary" onClick={() => push(`세션 ${cur.id} SQLite 저장 완료`, 'success')} style={{ flex: 1 }}>
                    <i className="ti ti-device-floppy" /> 저장
                  </button>
                </div>
              </div>
            </div>
            <div className="card">
              <div className="card-header"><div className="card-title">세션 목록 ({sessions.length})</div></div>
              <div style={{ overflowY: 'auto', maxHeight: '240px' }}>
                <table className="data-table">
                  <thead><tr><th>샘플</th><th>상태</th><th>날짜</th></tr></thead>
                  <tbody>
                    {sessions.map(s => (
                      <tr key={s.id} onClick={() => setActiveSess(s.id)} style={{ background: s.id === activeSess ? '#FAF4E8' : '' }}>
                        <td style={{ fontWeight: s.id === activeSess ? 700 : 400 }}>{s.sample}</td>
                        <td><span className={`badge ${s.status === '완료' ? 'badge-green' : s.status === '진행중' ? 'badge-amber' : 'badge-gray'}`}>{s.status}</span></td>
                        <td style={{ fontSize: '12px', color: 'var(--text-secondary)' }}>{s.date}</td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
            </div>
          </div>
        </div>
      )}

      {showNew && (
        <div className="modal-overlay" onClick={() => setShowNew(false)}>
          <div className="modal" onClick={e => e.stopPropagation()}>
            <div className="modal-hd"><span style={{ fontWeight: 700 }}>새 측정 세션 생성</span><button style={{ background: 'none', border: 'none', cursor: 'pointer', fontSize: '18px', color: 'var(--text-secondary)' }} onClick={() => setShowNew(false)}>×</button></div>
            <div className="modal-bd">
              <div className="form-group"><label className="form-label">샘플명</label><input className="form-input" value={newSample} onChange={e => setNewSample(e.target.value)} placeholder="예: TiO₂-α" /></div>

// ──────────────── Batch Analysis Screen ────────────────
function BatchAnalysisScreen({ push }) {
  const [selected, setSelected] = useState(['SES-2026-001', 'SES-2026-002', 'SES-2026-003']);
  const [running, setRunning] = useState(false);
  const [progress, setProgress] = useState(0);
  const [done, setDone] = useState(false);

  function toggle(id) { setSelected(p => p.includes(id) ? p.filter(x => x !== id) : [...p, id]); }

  function runBatch() {
    setRunning(true); setProgress(0); setDone(false);
    let p = 0;
    const iv = setInterval(() => {
      p += 7; setProgress(Math.min(p, 100));
      if (p >= 100) { clearInterval(iv); setRunning(false); setDone(true); push(`배치 분석 완료 — ${selected.length}개 세션 처리`, 'success'); }
    }, 140);

  const completedSessions = SESSIONS.filter(s => s.status === '완료');

  return (

            <button className="btn btn-primary" onClick={runBatch} disabled={running || selected.length === 0}>
              {running ? <><span className="spin-el"><i className="ti ti-loader" /></span> 분석 중...</> : <><i className="ti ti-player-play" /> 배치 분석 실행</>}

                <i className={`ti ${selected.includes(s.id) ? 'ti-checkbox' : 'ti-square'}`} style={{ color: selected.includes(s.id) ? 'var(--primary)' : 'var(--border)', fontSize: '18px', flexShrink: 0 }} />
                <div style={{ flex: 1 }}>
                  <div style={{ fontSize: '13px', fontWeight: 600 }}>{s.sample}</div>
                  <div style={{ fontSize: '11px', color: 'var(--text-secondary)' }}>{s.id} • {s.date}</div>

                  <span style={{ fontSize: '12px', color: 'var(--text-secondary)' }}>Python 알고리즘 모듈 실행 중</span>
                  <span style={{ fontSize: '12px', fontWeight: 700 }}>{progress}%</span>
                </div>
                <div className="prog-bar"><div className="prog-fill" style={{ width: progress + '%' }} /></div>
                {done && (
                  <div style={{ marginTop: '12px', background: 'rgba(34,197,94,0.08)', border: '1px solid rgba(34,197,94,0.20)', borderRadius: '4px', padding: '10px 14px', fontSize: '13px', color: '#15803D', fontWeight: 600 }}>

                  ['총 샘플 수', selected.length > 0 ? `${SESSIONS.filter(s => selected.includes(s.id)).reduce((a, s) => a + s.samples, 0)}개` : '—'],

            <div className="grid-2">
              <div className="card">
                <div className="card-header"><div className="card-title">세션별 열전도도 비교</div></div>
                <div className="card-body" style={{ paddingTop: '8px' }}>
                  <div className="chart-h200">
                    <ResponsiveContainer width="100%" height="100%">
                      <BarChart data={SESSIONS.filter(s => s.conductivity).map(s => ({ name: s.sample, value: s.conductivity }))} margin={{ top: 5, right: 10, bottom: 20, left: -20 }}>
                        <CartesianGrid strokeDasharray="3 3" stroke="#F2EAD8" vertical={false} />
                        <XAxis dataKey="name" tick={{ fontSize: 11, fill: '#7A5620' }} angle={-30} textAnchor="end" />
                        <YAxis domain={[0.50, 0.63]} tick={{ fontSize: 11, fill: '#7A5620' }} />
                        <Tooltip contentStyle={{ fontSize: '11px', borderRadius: '4px', border: '1px solid var(--border)' }} formatter={v => [v + ' W/m·K', '열전도도']} />
                        <Bar dataKey="value" fill="#C87A18" radius={[2, 2, 0, 0]} fillOpacity={0.85} />
                      </BarChart>
                    </ResponsiveContainer>
                  </div>
                </div>
              </div>
              <div className="card" style={{ overflow: 'hidden' }}>
                <div className="card-header"><div className="card-title">최근 세션 현황</div></div>
                <table className="data-table">
                  <thead><tr><th>샘플</th><th>열전도도</th><th>상태</th></tr></thead>
                  <tbody>
                    {SESSIONS.slice(0, 5).map(s => (
                      <tr key={s.id} onClick={() => setActiveTab('session-manager')}>
                        <td style={{ fontWeight: 600 }}>{s.sample}</td>
                        <td style={{ fontWeight: 700 }}>{s.conductivity ?? '—'}</td>
                        <td><span className={`badge ${s.status === '완료' ? 'badge-green' : s.status === '진행중' ? 'badge-amber' : 'badge-gray'}`}>{s.status}</span></td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
            </div>
          </div>
        );
    }
  }

  return (
    <>
      <div className="topnav">
        <div className="brand">
          <div className="brand-icon"><i className="ti ti-brand-python" /></div>
          <div>
            <div className="brand-text">열전도도 분석 워크스테이션</div>
            <div className="brand-sub">구현 데모 v2.0 · PySide6 기반</div>
          </div>
        </div>
        <div className="topnav-right">
          <button className="icon-btn" onClick={() => push('데이터베이스 동기화 완료', 'success')} title="DB 동기화">
            <i className="ti ti-refresh" />
          </button>
          <button className="icon-btn" onClick={() => push('설정 패널 열림', 'info')} title="설정">
            <i className="ti ti-settings" />
          </button>
          <button className="btn btn-primary" onClick={() => setActiveTab('session-manager')}>
            <i className="ti ti-plus" /> 새 세션
          </button>
        </div>
      </div>

      <div className="subnav">
        {TABS.map(t => (
          <button key={t.id} className={`tab-item ${activeTab === t.id ? 'active' : ''}`} onClick={() => setActiveTab(t.id)}>
            <i className={`ti ${t.icon}`} />
            {t.label}
          </button>
        ))}
      </div>

      <div className="main-content" style={{ flex: 1, width: '100%' }}>
        {renderScreen()}
      </div>

      <ToastWrap toasts={toasts} />
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
