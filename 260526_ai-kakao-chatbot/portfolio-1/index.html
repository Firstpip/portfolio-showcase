function Badge({ s }) {

  return <span style={{ background: bg, color, fontSize: 11, fontWeight: 700, padding: '3px 10px', borderRadius: 20 }}>{s}</span>;
}

function Toast({ msg }) {
  return msg ? (
    <div style={{
      position: 'fixed', bottom: 28, left: '50%', transform: 'translateX(-50%)',
      background: '#1E293B', color: '#fff', padding: '12px 24px', borderRadius: 10,

      boxShadow: '0 8px 24px rgba(0,0,0,0.2)'

  ) : null;
}

function Modal({ children, onClose }) {

  const [tab, setTab] = useState('대시보드');
  const tabs = ['대시보드', '챗봇 API', '공공 API', '관리자'];
  const screens = { '대시보드': <MainScreen />, '챗봇 API': <ChatbotScreen />, '공공 API': <PublicAPIScreen />, '관리자': <AdminScreen /> };

  return (
    <div style={{ width: '100%', minHeight: '100vh', display: 'flex', flexDirection: 'column', background: C.bg }}>
      <header style={{
        width: '100%', height: 58, background: '#fff', borderBottom: `1px solid ${C.border}`,
        display: 'flex', alignItems: 'center', padding: '0 40px',
        boxShadow: '0 1px 6px rgba(13,148,136,0.07)', position: 'sticky', top: 0, zIndex: 50
      }}>
        <div style={{ display: 'flex', alignItems: 'center', gap: 10, marginRight: 36 }}>
          <div style={{ width: 32, height: 32, borderRadius: 8, background: C.primary, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
            <i className="ph-heartbeat" style={{ color: '#fff', fontSize: 18 }}></i>
          </div>
          <span style={{ fontSize: 15, fontWeight: 800, color: C.textPrimary }}>헬스챗봇 MVP</span>
        </div>
        <nav style={{ display: 'flex', gap: 2 }}>
          {tabs.map(t => (
            <button key={t} onClick={() => setTab(t)} style={{
              padding: '6px 16px', borderRadius: 7, border: 'none', cursor: 'pointer',
              fontSize: 13, fontWeight: tab === t ? 700 : 500,
              background: tab === t ? C.primary : 'transparent',
              color: tab === t ? '#fff' : '#64748B', transition: 'all 0.13s'
            }}
            onMouseEnter={e => { if (tab !== t) e.currentTarget.style.background = C.accent; }}
            onMouseLeave={e => { if (tab !== t) e.currentTarget.style.background = 'transparent'; }}>{t}</button>
          ))}
        </nav>
        <div style={{ marginLeft: 'auto', display: 'flex', alignItems: 'center', gap: 14 }}>
          <div style={{ display: 'flex', alignItems: 'center', gap: 6 }}>
            <div style={{ width: 7, height: 7, borderRadius: 4, background: '#10B981', animation: 'pulse 2s infinite' }}/>
            <span style={{ fontSize: 12, color: C.textSec }}>시스템 정상</span>
          </div>
          <div style={{ width: 32, height: 32, borderRadius: 16, background: C.surface, display: 'flex', alignItems: 'center', justifyContent: 'center', cursor: 'pointer', color: C.primary }}>
            <i className="ph-user-circle" style={{ fontSize: 18 }}></i>
          </div>
        </div>
      </header>
      <main style={{ flex: 1, width: '100%' }}>
        {screens[tab]}
      </main>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
