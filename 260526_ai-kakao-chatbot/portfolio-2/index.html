// Lucide icons helper
function Icon({ name, size = 16, color = 'currentColor', style: s = {} }) {
  const ref = useRef(null);
  useEffect(() => {
    if (ref.current && window.lucide) {
      ref.current.innerHTML = '';
      try {
        const iconName = name.split('-').map((w, i) => i === 0 ? w : w[0].toUpperCase() + w.slice(1)).join('');
        const icons = window.lucide;
        const key = Object.keys(icons).find(k => k.toLowerCase() === iconName.toLowerCase());
        if (key) {
          const el = document.createElement('div');
          el.style.display = 'inline-flex';
          el.style.alignItems = 'center';
          el.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" width="${size}" height="${size}" viewBox="0 0 24 24" fill="none" stroke="${color}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">${icons[key][2].map(([tag, attrs]) => { const a = Object.entries(attrs).map(([k, v]) => `${k}="${v}"`).join(' '); return `<${tag} ${a}/>`; }).join('')}</svg>`;
          ref.current.appendChild(el);
        }
      } catch(e) {}
    }
  }, [name, size, color]);
  return <span ref={ref} style={{ display: 'inline-flex', alignItems: 'center', ...s }}/>;
}

function StatCard({ label, value, sub, icon, col, delta }) {
  return (
    <div style={{
      background: C.cardBg, borderRadius: 8, padding: '18px 20px',
      border: `1px solid ${C.border}`, flex: 1, minWidth: 150,
      animation: 'fadeIn 0.35s ease both',

      <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 10 }}>
        <span style={{ fontSize: 12, color: C.textSec, fontWeight: 600 }}>{label}</span>
        <div style={{ width: 28, height: 28, borderRadius: 6, background: (col || C.primary) + '18', display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
          <Icon name={icon} size={14} color={col || C.primary} />
        </div>
      </div>
      <div style={{ fontSize: 26, fontWeight: 800, color: C.textPrimary, letterSpacing: -0.5 }}>{value}</div>
      {sub && <div style={{ fontSize: 11, color: delta > 0 ? C.success : delta < 0 ? C.danger : '#94A3B8', marginTop: 4, fontWeight: 600 }}>{sub}</div>}
    </div>
  );
}

function Badge({ s }) {
  const m = { '활성': ['#D1FAE5', '#065F46'], '비활성': ['#FEE2E2', '#991B1B'], '완료': ['#EDE9FE', '#5B21B6'] };
  const [bg, color] = m[s] || ['#F1F5F9', '#475569'];
  return <span style={{ background: bg, color, fontSize: 11, fontWeight: 700, padding: '2px 9px', borderRadius: 20 }}>{s}</span>;
}

function Toast({ msg }) {

    <div style={{
      position: 'fixed', bottom: 24, left: '50%', transform: 'translateX(-50%)',

}

      }}>
        <div style={{ display: 'flex', alignItems: 'center', gap: 10, marginRight: 32 }}>
          <div style={{ width: 30, height: 30, borderRadius: 7, background: C.primary, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
            <Icon name="activity" size={16} color="#fff" />
          </div>
          <span style={{ fontSize: 15, fontWeight: 800, color: C.textPrimary }}>헬스챗봇 플랫폼</span>
        </div>
        <nav style={{ display: 'flex', gap: 0 }}>
          {navItems.map(nav => (
            <button key={nav.label} onClick={() => setPage(nav.label)} style={{
              display: 'flex', alignItems: 'center', gap: 6,
              padding: '6px 14px', border: 'none', cursor: 'pointer',
              background: 'transparent', fontSize: 13, fontWeight: page === nav.label ? 700 : 500,
              color: page === nav.label ? C.primary : '#64748B',
              borderBottom: page === nav.label ? `2px solid ${C.primary}` : '2px solid transparent',
              transition: 'all 0.13s', marginBottom: -1
            }}
            onMouseEnter={e => { if (page !== nav.label) { e.currentTarget.style.color = C.primary; } }}
            onMouseLeave={e => { if (page !== nav.label) { e.currentTarget.style.color = '#64748B'; } }}>
              <Icon name={nav.icon} size={14} color={page === nav.label ? C.primary : '#94A3B8'} />
              {nav.label}
            </button>
          ))}
        </nav>
        <div style={{ marginLeft: 'auto', display: 'flex', alignItems: 'center', gap: 14 }}>
          <div style={{ display: 'flex', alignItems: 'center', gap: 5 }}>
            <div style={{ width: 7, height: 7, borderRadius: 4, background: C.success }}/>
            <span style={{ fontSize: 12, color: C.textSec }}>정상 운영</span>
          </div>
          <div style={{ width: 30, height: 30, borderRadius: 15, background: C.surface, display: 'flex', alignItems: 'center', justifyContent: 'center', cursor: 'pointer', color: C.primary }}>
            <Icon name="user-circle" size={16} color={C.primary} />
          </div>
        </div>
      </header>

      <main style={{ flex: 1, width: '100%' }}>
        {screens[page]}
      </main>

      {/* Footer (spa-modern 특징) */}
      <footer style={{
        width: '100%', background: '#fff', borderTop: `1px solid ${C.border}`,
        padding: '14px 40px', display: 'flex', alignItems: 'center', justifyContent: 'space-between'
      }}>
        <span style={{ fontSize: 12, color: '#94A3B8' }}>헬스케어 챗봇 플랫폼 — 구현 데모 · Node.js + Express + PostgreSQL + Redis</span>
        <span style={{ fontSize: 12, color: '#94A3B8' }}>OpenAI GPT-4o · 카카오 알림톡 API · Node-cron</span>
      </footer>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
