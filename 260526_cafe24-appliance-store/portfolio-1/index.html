function catIcon(cat){
  if(cat==='이동식 에어컨') return 'ti-air-conditioning';
  if(cat==='포터블 제습기') return 'ti-droplet';
  return 'ti-tools';
}

function optPrice(opt){
  const m=opt.match(/\+([0-9,]+)/);
  return m?parseInt(m[1].replace(/,/g,''),10):0;
}

/* ── Toast ── */
function Toast({msg,onDone}){
  useEffect(()=>{const t=setTimeout(onDone,2600);return()=>clearTimeout(t);},[]);
  return(
    <div style={{position:'fixed',bottom:24,right:24,zIndex:9999,background:C.primary,color:'#fff',
      padding:'12px 20px',borderRadius:6,fontSize:14,fontWeight:500,
      animation:'toastEnter .3s ease',boxShadow:'0 4px 16px rgba(26,43,74,.35)'}}>
      <i className="ti ti-check" style={{marginRight:8,color:C.accent}}/>{msg}
    </div>
  );
}

/* ── ProductDrawer ── */
function ProductDrawer({product:p,onClose,onAddCart}){
  const[selOpt,setSelOpt]=useState(0);
  const[qty,setQty]=useState(1);
  const extra=optPrice(p.opts[selOpt]);
  const total=(p.price+extra)*qty;
  return(
    <div style={{position:'fixed',inset:0,zIndex:1000,display:'flex'}}>
      <div style={{flex:1,background:'rgba(0,0,0,.38)'}} onClick={onClose}/>

            <i className="ti ti-x"/>

            color:'#fff',fontSize:11,fontWeight:700,padding:'3px 10px',borderRadius:4}}>{p.badge}</span>}
        </div>
        <div style={{padding:'20px 24px',flex:1}}>

          <h2 style={{fontSize:20,fontWeight:700,color:C.text,marginBottom:8}}>{p.name}</h2>
          <div style={{display:'flex',alignItems:'center',gap:6,marginBottom:12}}>
            <span style={{color:C.warn,fontSize:13}}>{'★'.repeat(Math.floor(p.rating))}</span>
            <span style={{fontSize:12,color:C.muted}}>{p.rating} ({p.rev.toLocaleString()}명 리뷰)</span>
          </div>
          <div style={{display:'flex',alignItems:'baseline',gap:8,marginBottom:14}}>
            <span style={{fontSize:22,fontWeight:800,color:C.primary}}>{p.price.toLocaleString()}원</span>
            {p.orig&&<span style={{fontSize:13,color:C.muted,textDecoration:'line-through'}}>{p.orig.toLocaleString()}원</span>}
          </div>
          <p style={{fontSize:13,color:C.muted,lineHeight:1.75,marginBottom:20}}>{p.desc}</p>

          <div style={{background:C.bg,borderRadius:6,border:`1px solid ${C.border}`,padding:16,marginBottom:20}}>
            <div style={{fontWeight:600,fontSize:13,marginBottom:10}}>제품 사양</div>
            {Object.entries(p.specs).map(([k,v])=>(
              <div key={k} style={{display:'flex',justifyContent:'space-between',
                fontSize:12,padding:'5px 0',borderBottom:`1px solid ${C.border}`}}>
                <span style={{color:C.muted}}>{k}</span>
                <span style={{fontWeight:500}}>{v}</span>
              </div>
            ))}
          </div>

          {p.opts.length>1&&(
            <div style={{marginBottom:20}}>
              <div style={{fontWeight:600,fontSize:13,marginBottom:8}}>설치 옵션 선택</div>
              {p.opts.map((opt,i)=>(
                <label key={i} onClick={()=>setSelOpt(i)} style={{
                  display:'flex',alignItems:'center',gap:10,padding:'10px 14px',
                  borderRadius:6,cursor:'pointer',marginBottom:6,
                  border:`1px solid ${selOpt===i?C.primary:C.border}`,
                  background:selOpt===i?`${C.primary}0A`:C.surface}}>
                  <input type="radio" readOnly checked={selOpt===i}
                    style={{accentColor:C.primary,pointerEvents:'none'}}/>
                  <span style={{fontSize:13,color:C.text}}>{opt}</span>
                </label>
              ))}
            </div>
          )}

          <div style={{display:'flex',alignItems:'center',gap:12,marginBottom:20}}>
            <span style={{fontSize:13,fontWeight:600}}>수량</span>
            <div style={{display:'flex',alignItems:'center',
              border:`1px solid ${C.border}`,borderRadius:6,overflow:'hidden'}}>
              <button onClick={()=>setQty(q=>Math.max(1,q-1))} style={{
                width:34,height:34,background:'none',border:'none',cursor:'pointer',
                fontSize:18,color:C.muted}}>-</button>

            padding:'14px 0',borderTop:`1px solid ${C.border}`,marginBottom:14}}>

            <span style={{fontSize:20,fontWeight:800,color:C.primary}}>{total.toLocaleString()}원</span>
          </div>
          <button onClick={()=>{onAddCart(p,p.opts[selOpt],extra,qty);onClose();}}
            style={{width:'100%',background:C.primary,color:'#fff',border:'none',borderRadius:6,
              padding:'13px 0',fontSize:15,fontWeight:700,cursor:'pointer',
              display:'flex',alignItems:'center',justifyContent:'center',gap:8}}>

          </button>
        </div>
      </div>
    </div>
  );
}

/* ── OrderDetail Modal ── */
function OrderModal({order,onClose}){
  const steps=['주문 접수','결제 완료','상품 준비','배송 중','배송 완료'];
  const cur=4;

      background:'rgba(0,0,0,.4)',animation:'fadeIn .2s ease'}}>

        overflowY:'auto',animation:'slideUp .25s ease'}}>
        <div style={{padding:'18px 24px',borderBottom:`1px solid ${C.border}`,
          display:'flex',justifyContent:'space-between',alignItems:'center'}}>
          <span style={{fontWeight:700,fontSize:15}}>주문 상세 — {order.id}</span>
          <button onClick={onClose} style={{background:'none',border:'none',cursor:'pointer',
            color:C.muted,fontSize:20,display:'flex'}}><i className="ti ti-x"/></button>
        </div>
        <div style={{padding:'24px'}}>
          <div style={{fontWeight:600,fontSize:13,marginBottom:16}}>배송 현황</div>
          <div style={{display:'flex',alignItems:'center',marginBottom:28}}>
            {steps.map((s,i)=>(
              <React.Fragment key={i}>
                <div style={{display:'flex',flexDirection:'column',alignItems:'center',gap:4,flex:1,minWidth:0}}>
                  <div style={{width:28,height:28,borderRadius:'50%',
                    background:i<=cur?C.primary:C.border,
                    display:'flex',alignItems:'center',justifyContent:'center'}}>
                    {i<cur?<i className="ti ti-check" style={{color:'#fff',fontSize:13}}/>
                     :i===cur?<i className="ti ti-truck" style={{color:'#fff',fontSize:13}}/>
                     :<span style={{width:8,height:8,borderRadius:'50%',background:'#fff',opacity:.5}}/>}
                  </div>
                  <span style={{fontSize:10,color:i<=cur?C.primary:C.muted,fontWeight:i<=cur?600:400,textAlign:'center',lineHeight:1.3}}>{s}</span>
                </div>
                {i<steps.length-1&&<div style={{flex:1,height:2,background:i<cur?C.primary:C.border,marginBottom:22,maxWidth:32}}/>}
              </React.Fragment>
            ))}
          </div>
          {[['주문번호',order.id],['주문일자',order.date],['상품명',order.name],
            ['옵션',order.opt],['결제금액',order.amt.toLocaleString()+'원'],['배송정보',order.track]
          ].map(([k,v])=>(
            <div key={k} style={{display:'flex',padding:'10px 0',borderBottom:`1px solid ${C.border}`}}>
              <span style={{width:72,fontSize:12,color:C.muted,flexShrink:0}}>{k}</span>
              <span style={{fontSize:13,color:C.text,fontWeight:500}}>{v}</span>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

              {icon:'ti-certificate',t:'공식 AS 보장',d:'전국 400개 이상 AS 센터 운영'},
              {icon:'ti-truck-delivery',t:'무료 배송',d:'30만원 이상 구매 시 전국 무료'},
              {icon:'ti-shield-check',t:'2년 품질보증',d:'제조사 직접 품질보증 제공'},
              {icon:'ti-headset',t:'전담 설치팀',d:'전국 설치 전문가 파견 서비스'},
            ].map(f=>(
              <div key={f.t} style={{textAlign:'center'}}>
                <div style={{width:46,height:46,borderRadius:6,
                  border:'1px solid rgba(255,255,255,.2)',
                  display:'flex',alignItems:'center',justifyContent:'center',
                  margin:'0 auto 12px',background:'rgba(255,255,255,.07)'}}>
                  <i className={`ti ${f.icon}`} style={{fontSize:20,color:'rgba(255,255,255,.9)'}}/>
                </div>
                <div style={{fontSize:13,fontWeight:700,color:'#fff',marginBottom:5}}>{f.t}</div>
                <div style={{fontSize:11,color:'rgba(255,255,255,.6)',lineHeight:1.6}}>{f.d}</div>
              </div>
            ))}
          </div>
        </div>
      </div>
    </div>
  );
}

/* ── Screen: 상품 목록 ── */
function ProductScreen({onOpenDetail,onAddCart}){
  const[filter,setFilter]=useState('전체');
  const cats=['전체','이동식 에어컨','포터블 제습기','액세서리'];
  const list=filter==='전체'?PRODUCTS:PRODUCTS.filter(p=>p.cat===filter);
  return(
    <div style={{padding:'32px 48px',maxWidth:1200,margin:'0 auto',width:'100%',animation:'fadeIn .3s ease'}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:20}}>
        <h2 style={{fontSize:18,fontWeight:700}}>상품 목록</h2>
        <span style={{fontSize:12,color:C.muted}}>총 {list.length}개 상품</span>
      </div>
      <div style={{display:'flex',gap:8,marginBottom:22}}>
        {cats.map(c=>(
          <button key={c} onClick={()=>setFilter(c)} style={{
            padding:'6px 16px',borderRadius:6,fontSize:12,fontWeight:filter===c?600:400,
            border:`1px solid ${filter===c?C.primary:C.border}`,
            background:filter===c?C.primary:C.surface,
            color:filter===c?'#fff':C.muted,cursor:'pointer',transition:'all .15s'}}>
            {c}
          </button>
        ))}
      </div>
      <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:14}}>
        {list.map(p=>(
          <div key={p.id} onClick={()=>onOpenDetail(p)} style={{
            background:C.surface,border:`1px solid ${C.border}`,borderRadius:6,
            overflow:'hidden',cursor:'pointer',animation:'slideUp .3s ease',
            transition:'border-color .15s'}}>
            <div style={{height:170,background:`linear-gradient(135deg,${C.bg},#E8EEF5)`,
              display:'flex',alignItems:'center',justifyContent:'center',position:'relative'}}>
              <i className={`ti ${catIcon(p.cat)}`} style={{fontSize:72,color:C.secondary,opacity:.42}}/>
              {p.badge&&<span style={{position:'absolute',top:12,left:12,background:C.accent,
                color:'#fff',fontSize:11,fontWeight:700,padding:'3px 10px',borderRadius:4}}>{p.badge}</span>}
            </div>
            <div style={{padding:'14px 16px'}}>
              <div style={{fontSize:11,color:C.muted,marginBottom:3}}>{p.cat}</div>
              <div style={{fontSize:13,fontWeight:600,marginBottom:6,lineHeight:1.4}}>{p.name}</div>
              <div style={{display:'flex',alignItems:'center',gap:5,marginBottom:10}}>
                <span style={{fontSize:11,color:C.warn}}>{'★'.repeat(Math.floor(p.rating))}</span>
                <span style={{fontSize:11,color:C.muted}}>{p.rating} ({p.rev})</span>
              </div>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                <div>
                  <span style={{fontSize:15,fontWeight:800,color:C.primary}}>{p.price.toLocaleString()}원</span>
                  {p.orig&&<span style={{fontSize:11,color:C.muted,textDecoration:'line-through',marginLeft:5}}>{p.orig.toLocaleString()}원</span>}
                </div>
                <button onClick={e=>{e.stopPropagation();onAddCart(p,p.opts[0],0,1);}} style={{
                  background:C.primary,color:'#fff',border:'none',borderRadius:4,
                  padding:'6px 10px',fontSize:13,cursor:'pointer'}}>
                  <i className="ti ti-shopping-cart-plus"/>
                </button>
              </div>
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}

/* ── Screen: 장바구니 ── */
function CartScreen({cart,setCart}){
  const[payMethod,setPayMethod]=useState('card');
  const[done,setDone]=useState(false);
  const subtotal=cart.reduce((s,i)=>(s+(i.p.price+i.extra)*i.qty),0);
  const ship=subtotal>=300000?0:3500;
  const total=subtotal+ship;
  const methods=[
    {id:'card',label:'신용카드',icon:'ti-credit-card'},
    {id:'npay',label:'네이버페이',icon:'ti-brand-naver'},
    {id:'kakaopay',label:'카카오페이',icon:'ti-brand-kakao'},
    {id:'bank',label:'무통장 입금',icon:'ti-building-bank'},
  ];
  if(done) return(
    <div style={{padding:'80px 48px',textAlign:'center',animation:'fadeIn .3s ease'}}>
      <div style={{width:80,height:80,borderRadius:'50%',
        background:`${C.success}18`,border:`2px solid ${C.success}`,
        display:'flex',alignItems:'center',justifyContent:'center',margin:'0 auto 24px'}}>
        <i className="ti ti-check" style={{fontSize:38,color:C.success}}/>
      </div>
      <h2 style={{fontSize:22,fontWeight:700,marginBottom:12}}>주문이 완료되었습니다</h2>
      <p style={{fontSize:13,color:C.muted,lineHeight:1.8,marginBottom:28}}>
        주문번호: ORD-2024-0520<br/>
        결제 방법: {methods.find(m=>m.id===payMethod)?.label}<br/>
        결제 금액: {total.toLocaleString()}원
      </p>
      <button onClick={()=>{setDone(false);setCart([]);}} style={{
        background:C.primary,color:'#fff',border:'none',borderRadius:6,
        padding:'12px 32px',fontSize:14,fontWeight:700,cursor:'pointer'}}>
        쇼핑 계속하기
      </button>
    </div>
  );
  return(
    <div style={{padding:'32px 48px',maxWidth:1100,margin:'0 auto',width:'100%',animation:'fadeIn .3s ease'}}>
      <h2 style={{fontSize:18,fontWeight:700,marginBottom:22}}>장바구니 &amp; 결제</h2>
      <div style={{display:'grid',gridTemplateColumns:'1fr 330px',gap:22}}>
        <div>
          {/* 장바구니 상품 목록 */}
          {cart.length===0?(
            <div style={{textAlign:'center',padding:'48px 0',color:C.muted,
              background:C.surface,border:`1px solid ${C.border}`,borderRadius:6,marginBottom:14}}>
              <i className="ti ti-shopping-cart" style={{fontSize:40,display:'block',marginBottom:10,opacity:.3}}/>
              <div style={{fontSize:13}}>장바구니가 비어 있습니다</div>
            </div>
          ):cart.map(item=>(
            <div key={item.id} style={{
              background:C.surface,border:`1px solid ${C.border}`,borderRadius:6,
              padding:'16px',marginBottom:10,display:'flex',gap:14,alignItems:'center'}}>
              <div style={{width:64,height:64,background:C.bg,borderRadius:6,
                display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>
                <i className={`ti ${catIcon(item.p.cat)}`} style={{fontSize:28,color:C.secondary,opacity:.6}}/>
              </div>
              <div style={{flex:1}}>
                <div style={{fontSize:13,fontWeight:600,marginBottom:3}}>{item.p.name}</div>
                <div style={{fontSize:11,color:C.muted,marginBottom:8}}>{item.opt}</div>
                <div style={{display:'flex',alignItems:'center',gap:8}}>
                  <div style={{display:'flex',alignItems:'center',
                    border:`1px solid ${C.border}`,borderRadius:4,overflow:'hidden'}}>
                    <button onClick={()=>setCart(c=>c.map(i=>i.id===item.id?{...i,qty:Math.max(1,i.qty-1)}:i))}
                      style={{width:26,height:26,background:'none',border:'none',cursor:'pointer',fontSize:15}}>-</button>
                    <span style={{width:28,textAlign:'center',fontSize:12,fontWeight:600}}>{item.qty}</span>
                    <button onClick={()=>setCart(c=>c.map(i=>i.id===item.id?{...i,qty:i.qty+1}:i))}
                      style={{width:26,height:26,background:'none',border:'none',cursor:'pointer',fontSize:15}}>+</button>
                  </div>
                  <button onClick={()=>setCart(c=>c.filter(i=>i.id!==item.id))}
                    style={{background:'none',border:'none',cursor:'pointer',color:C.danger,fontSize:12,display:'flex',alignItems:'center',gap:3}}>
                    <i className="ti ti-trash" style={{fontSize:13}}/> 삭제
                  </button>
                </div>
              </div>
              <div style={{fontSize:15,fontWeight:800,color:C.primary,flexShrink:0}}>
                {((item.p.price+item.extra)*item.qty).toLocaleString()}원
              </div>
            </div>
          ))}
          {/* 결제 수단 선택 — 상품 목록과 함께 항상 표시 */}
          <div style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:6,padding:'20px',marginTop:4}}>
            <div style={{fontWeight:700,fontSize:14,marginBottom:14,display:'flex',alignItems:'center',gap:7}}>
              <i className="ti ti-credit-card" style={{color:C.primary,fontSize:16}}/> 결제 수단 선택
            </div>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
              {methods.map(m=>(
                <label key={m.id} onClick={()=>setPayMethod(m.id)} style={{
                  display:'flex',alignItems:'center',gap:10,padding:'12px 14px',
                  borderRadius:6,cursor:'pointer',
                  border:`1px solid ${payMethod===m.id?C.primary:C.border}`,
                  background:payMethod===m.id?`${C.primary}0A`:C.surface}}>
                  <input type="radio" readOnly checked={payMethod===m.id}
                    style={{accentColor:C.primary,pointerEvents:'none'}}/>
                  <i className={`ti ${m.icon}`} style={{fontSize:17,color:payMethod===m.id?C.primary:C.muted}}/>
                  <span style={{fontSize:13,fontWeight:payMethod===m.id?600:400,
                    color:payMethod===m.id?C.primary:C.text}}>{m.label}</span>
                </label>
              ))}
            </div>
            {payMethod==='bank'&&(
              <div style={{marginTop:12,padding:'12px 14px',background:C.bg,
                borderRadius:6,border:`1px solid ${C.border}`}}>
                <div style={{fontSize:12,fontWeight:600,marginBottom:6}}>입금 계좌 안내</div>
                <div style={{fontSize:12,color:C.muted,lineHeight:1.85}}>
                  국민은행 123-456-789012 · 예금주: (주)쿨에어코리아<br/>입금 기한: 주문일로부터 24시간 이내
                </div>
              </div>
            )}
          </div>
        </div>
        <div>
          <div style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:6,
            padding:'18px',position:'sticky',top:72}}>
            <div style={{fontWeight:700,fontSize:14,marginBottom:14}}>주문 요약</div>
            {[['상품 금액',subtotal.toLocaleString()+'원'],
              ['배송비',ship===0?'무료':ship.toLocaleString()+'원'],
              ['총 결제 금액',total.toLocaleString()+'원']
            ].map(([k,v],i)=>(
              <div key={k} style={{display:'flex',justifyContent:'space-between',
                padding:'8px 0',fontSize:i===2?15:12,fontWeight:i===2?700:400,
                borderBottom:i===1?`1px solid ${C.border}`:'none',
                color:i===2?C.primary:undefined}}>
                <span style={{color:i===2?C.primary:C.muted}}>{k}</span>
                <span>{v}</span>
              </div>
            ))}
            {ship===0&&<div style={{fontSize:11,color:C.success,marginTop:4,textAlign:'right'}}>30만원 이상 무료 배송 적용</div>}
            <div style={{marginTop:12,padding:'10px 12px',background:C.bg,borderRadius:6,
              fontSize:11,color:C.muted,display:'flex',alignItems:'center',gap:6}}>
              <i className="ti ti-shield-check" style={{color:C.success,fontSize:14}}/>
              토스페이먼츠 PG 보안 결제
            </div>
            <button onClick={()=>{if(cart.length>0)setDone(true);}}
              disabled={cart.length===0}
              style={{width:'100%',marginTop:12,background:cart.length===0?C.border:C.primary,
                color:'#fff',border:'none',borderRadius:6,padding:'12px 0',
                fontSize:13,fontWeight:700,cursor:cart.length===0?'not-allowed':'pointer'}}>
              {total>0?`${total.toLocaleString()}원 결제하기`:'결제하기'}
            </button>
          </div>
        </div>
      </div>
    </div>
  );
}

/* ── Screen: 마이페이지 ── */
function MypageScreen(){
  const[selOrder,setSelOrder]=useState(null);
  const statusColor={'배송 완료':C.success,'배송 중':C.accent,'상품 준비':C.warn};
  return(
    <div style={{padding:'32px 48px',maxWidth:960,margin:'0 auto',width:'100%',animation:'fadeIn .3s ease'}}>
      {selOrder&&<OrderModal order={selOrder} onClose={()=>setSelOrder(null)}/>}
      <div style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:6,
        padding:'22px',marginBottom:20,display:'flex',alignItems:'center',gap:18}}>
        <div style={{width:60,height:60,borderRadius:'50%',
          background:`linear-gradient(135deg,${C.primary},${C.secondary})`,
          display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>
          <i className="ti ti-user" style={{fontSize:26,color:'#fff'}}/>
        </div>
        <div style={{flex:1}}>
          <div style={{fontSize:17,fontWeight:700}}>김민준 님</div>
          <div style={{fontSize:12,color:C.muted,marginTop:2}}>minj@example.com</div>
        </div>
        <div style={{textAlign:'right'}}>
          <span style={{background:`${C.secondary}20`,color:C.secondary,fontSize:11,
            fontWeight:700,padding:'4px 12px',borderRadius:4}}>VIP 회원</span>
          <div style={{fontSize:12,color:C.muted,marginTop:8}}>
            보유 포인트 <strong style={{color:C.primary}}>12,500P</strong>
          </div>
        </div>
      </div>
      <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:10,marginBottom:20}}>
        {[['총 주문','3건'],['이번달 구매액','0원'],['보유 포인트','12,500P']].map(([k,v])=>(
          <div key={k} style={{background:C.surface,border:`1px solid ${C.border}`,
            borderRadius:6,padding:'14px 18px',textAlign:'center'}}>
            <div style={{fontSize:11,color:C.muted,marginBottom:5}}>{k}</div>
            <div style={{fontSize:17,fontWeight:800,color:C.primary,animation:'countPop .5s ease'}}>{v}</div>
          </div>
        ))}
      </div>
      <div style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:6,overflow:'hidden'}}>
        <div style={{padding:'14px 18px',borderBottom:`1px solid ${C.border}`,fontWeight:700,fontSize:14}}>주문 내역</div>
        {ORDERS.map(o=>(
          <div key={o.id} onClick={()=>setSelOrder(o)} style={{
            padding:'14px 18px',borderBottom:`1px solid ${C.border}`,cursor:'pointer',
            display:'flex',justifyContent:'space-between',alignItems:'center',
            transition:'background .12s'}}>
            <div>
              <div style={{fontSize:13,fontWeight:600,marginBottom:3}}>{o.name}</div>
              <div style={{fontSize:11,color:C.muted}}>{o.id} · {o.date}</div>
            </div>
            <div style={{textAlign:'right',display:'flex',flexDirection:'column',alignItems:'flex-end',gap:4}}>
              <span style={{fontSize:11,fontWeight:600,
                color:statusColor[o.status]||C.muted,
                background:`${statusColor[o.status]||C.muted}18`,
                padding:'2px 8px',borderRadius:4}}>{o.status}</span>
              <span style={{fontSize:13,fontWeight:700}}>{o.amt.toLocaleString()}원</span>
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}

/* ── App ── */
function App(){
  const[tab,setTab]=useState('main');
  const[cart,setCart]=useState([
    {id:1,p:PRODUCTS[0],opt:'기본 설치 포함 (+89,000원)',extra:89000,qty:1},
    {id:2,p:PRODUCTS[2],opt:'항균 필터 2개 포함 (+39,000원)',extra:39000,qty:1},
  ]);
  const[detail,setDetail]=useState(null);
  const[toast,setToast]=useState(null);

  const addToCart=(p,opt,extra,qty)=>{
    setCart(c=>[...c,{id:Date.now(),p,opt,extra,qty}]);
    setToast(`${p.name}이(가) 장바구니에 담겼습니다.`);
  };

  const navItems=[
    {key:'main',label:'메인',icon:'ti-home'},
    {key:'product',label:'상품 목록',icon:'ti-layout-grid'},
    {key:'cart',label:'장바구니',icon:'ti-shopping-cart'},
    {key:'mypage',label:'마이페이지',icon:'ti-user'},
  ];

  return(
    <div style={{width:'100%',minHeight:'100vh',display:'flex',flexDirection:'column',background:C.bg}}>
      {toast&&<Toast msg={toast} onDone={()=>setToast(null)}/>}
      {detail&&<ProductDrawer product={detail} onClose={()=>setDetail(null)} onAddCart={addToCart}/>}

      <header style={{width:'100%',background:C.surface,borderBottom:`1px solid ${C.border}`,
        position:'sticky',top:0,zIndex:100}}>
        <div style={{maxWidth:1200,margin:'0 auto',padding:'0 48px',
          display:'flex',alignItems:'center',height:58}}>
          <div style={{display:'flex',alignItems:'center',gap:8,marginRight:44,flexShrink:0}}>
            <i className="ti ti-air-conditioning" style={{fontSize:20,color:C.primary}}/>
            <span style={{fontSize:16,fontWeight:900,color:C.primary,letterSpacing:'-0.5px'}}>COOLAIR</span>
          </div>
          <nav style={{display:'flex',flex:1}}>
            {navItems.map(item=>(
              <button key={item.key} onClick={()=>setTab(item.key)} style={{
                padding:'0 16px',height:58,background:'none',border:'none',cursor:'pointer',
                fontSize:13,fontWeight:tab===item.key?700:400,
                color:tab===item.key?C.primary:C.muted,
                borderBottom:tab===item.key?`2px solid ${C.primary}`:'2px solid transparent',
                transition:'all .15s',display:'flex',alignItems:'center',gap:5}}>
                <i className={`ti ${item.icon}`} style={{fontSize:15}}/>
                {item.label}
              </button>
            ))}
          </nav>
          <button onClick={()=>setTab('cart')} style={{position:'relative',background:'none',
            border:'none',cursor:'pointer',padding:8,color:C.muted,display:'flex'}}>
            <i className="ti ti-shopping-cart" style={{fontSize:20}}/>
            {cart.length>0&&<span style={{position:'absolute',top:4,right:4,
              background:C.accent,color:'#fff',fontSize:9,fontWeight:700,
              width:14,height:14,borderRadius:'50%',display:'flex',alignItems:'center',justifyContent:'center'}}>
              {cart.length}
            </span>}
          </button>
        </div>
      </header>

      <main style={{flex:1,width:'100%'}}>
        {tab==='main'&&<MainScreen onNav={setTab}/>}
        {tab==='product'&&<ProductScreen onOpenDetail={setDetail} onAddCart={addToCart}/>}
        {tab==='cart'&&<CartScreen cart={cart} setCart={setCart}/>}
        {tab==='mypage'&&<MypageScreen/>}
      </main>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
