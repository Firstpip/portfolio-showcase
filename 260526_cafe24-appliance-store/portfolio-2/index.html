/* ── Toast ── */
function Toast({msg,type='success',onDone}){
  useEffect(()=>{const t=setTimeout(onDone,2600);return()=>clearTimeout(t);},[]);
  return(
    <div style={{position:'fixed',bottom:24,right:24,zIndex:9999,
      background:type==='success'?C.success:C.primary,color:'#fff',
      padding:'11px 18px',borderRadius:20,fontSize:13,fontWeight:500,
      display:'flex',alignItems:'center',gap:8,
      animation:'cardIn .3s ease',boxShadow:'0 8px 24px rgba(232,96,60,.3)'}}>
      <LIcon name={type==='success'?'circle-check':'info-circle'} size={16} color='#fff'/>
      {msg}
    </div>
  );
}

/* ── Status Badge ── */
function Badge({label,color,bg}){
  return(
    <span style={{fontSize:11,fontWeight:700,padding:'3px 10px',borderRadius:20,
      background:bg,color}}>
      {label}
    </span>
  );
}

/* ── Inventory Screen ── */
function InventoryScreen({toast}){
  const[products,setProducts]=useState(PRODUCTS_ADMIN);
  const[filter,setFilter]=useState('전체');
  const[showAdd,setShowAdd]=useState(false);

  const[form,setForm]=useState({name:'',cat:'이동식 에어컨',price:'',stock:''});

  const submitAdd=()=>{
    if(!form.name||!form.price) return;
    const np={id:Date.now(),name:form.name,cat:form.cat,
      price:parseInt(form.price.replace(/,/g,''),10)||0,
      stock:parseInt(form.stock)||0,minStock:5,status:'정상'};
    setProducts(p=>[np,...p]);
    setShowAdd(false);
    setForm({name:'',cat:'이동식 에어컨',price:'',stock:''});
    toast('상품이 등록되었습니다.');
  };

  return(
    <div style={{animation:'fadeIn .3s ease'}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:24}}>
        <div>
          <h1 style={{fontSize:22,fontWeight:800,marginBottom:3}}>상품 및 재고 관리</h1>
          <p style={{fontSize:13,color:C.muted}}>총 {products.length}개 상품 · 재고 부족 {products.filter(p=>p.status!=='정상').length}건</p>
        </div>
        <button onClick={()=>setShowAdd(true)} style={{
          background:C.primary,color:'#fff',border:'none',borderRadius:20,
          padding:'10px 20px',fontSize:13,fontWeight:700,cursor:'pointer',
          display:'flex',alignItems:'center',gap:6}}>
          <LIcon name="plus" size={14} color='#fff'/> 상품 등록
        </button>
      </div>

      <div style={{display:'flex',gap:8,marginBottom:20}}>
        {cats.map(c=>(
          <button key={c} onClick={()=>setFilter(c)} style={{
            padding:'6px 16px',borderRadius:20,fontSize:12,fontWeight:filter===c?700:400,
            border:`1px solid ${filter===c?C.primary:C.border}`,
            background:filter===c?C.primary:C.surface,
            color:filter===c?'#fff':C.muted,cursor:'pointer',transition:'all .15s'}}>
            {c}
          </button>
        ))}
      </div>

      <div style={{background:C.surface,borderRadius:20,boxShadow:'0 4px 16px rgba(232,96,60,.08)',overflow:'hidden'}}>
        <table style={{width:'100%',borderCollapse:'collapse'}}>
          <thead>
            <tr style={{fontSize:11,color:C.muted,background:C.bg}}>
              {['상품명','카테고리','판매가','현재 재고','최소 재고','상태','관리'].map(h=>(

            </tr>
          </thead>
          <tbody>
            {filtered.map((p,i)=>(
              <tr key={p.id} style={{fontSize:13,borderBottom:`1px solid ${C.border}`,

                <td style={{padding:'14px 16px',fontWeight:600}}>{p.name}</td>

                <td style={{padding:'14px 16px',fontWeight:700}}>{p.price.toLocaleString()}원</td>

                <td style={{padding:'14px 16px'}}>

              {label:'초기 재고',key:'stock',type:'number',placeholder:'예: 20'},

              </div>

            <div style={{marginBottom:20}}>
              <label style={{fontSize:12,fontWeight:600,color:C.muted,display:'block',marginBottom:6}}>카테고리</label>
              <select value={form.cat} onChange={e=>setForm(v=>({...v,cat:e.target.value}))}
                style={{width:'100%',padding:'10px 14px',borderRadius:12,
                  border:`1px solid ${C.border}`,fontSize:13,background:C.bg,fontFamily:'inherit'}}>
                <option>이동식 에어컨</option>
                <option>포터블 제습기</option>
                <option>액세서리</option>
              </select>
            </div>
            <div style={{display:'flex',gap:10}}>
              <button onClick={()=>setShowAdd(false)} style={{flex:1,padding:'11px 0',
                borderRadius:20,border:`1px solid ${C.border}`,background:C.surface,
                fontSize:13,fontWeight:600,cursor:'pointer',color:C.muted}}>취소</button>
              <button onClick={submitAdd} style={{flex:2,padding:'11px 0',
                borderRadius:20,border:'none',background:C.primary,
                fontSize:13,fontWeight:700,cursor:'pointer',color:'#fff'}}>등록하기</button>
            </div>
          </div>
        </div>
      )}

      {/* Edit Product Modal */}
      {editProd&&(
        <div style={{position:'fixed',inset:0,zIndex:1000,display:'flex',
          alignItems:'center',justifyContent:'center',background:'rgba(0,0,0,.4)'}}>
          <div style={{background:C.surface,borderRadius:24,width:400,padding:'28px',
            animation:'cardIn .25s ease',boxShadow:'0 20px 60px rgba(0,0,0,.2)'}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:20}}>
              <span style={{fontWeight:700,fontSize:16}}>재고 수정 — {editProd.name.slice(0,14)}</span>
              <button onClick={()=>setEditProd(null)} style={{background:'none',border:'none',cursor:'pointer',color:C.muted,display:'flex'}}><LIcon name="x" size={18}/></button>
            </div>
            <div style={{marginBottom:16}}>
              <label style={{fontSize:12,fontWeight:600,color:C.muted,display:'block',marginBottom:6}}>현재 재고 수량</label>
              <input type="number" defaultValue={editProd.stock}
                id="editStock"
                style={{width:'100%',padding:'10px 14px',borderRadius:12,
                  border:`1px solid ${C.border}`,fontSize:15,fontWeight:700,
                  outline:'none',background:C.bg,fontFamily:'inherit'}}/>
            </div>
            <div style={{marginBottom:20}}>
              <label style={{fontSize:12,fontWeight:600,color:C.muted,display:'block',marginBottom:6}}>재고 부족 알림 임계값</label>
              <input type="number" defaultValue={editProd.minStock}
                style={{width:'100%',padding:'10px 14px',borderRadius:12,
                  border:`1px solid ${C.border}`,fontSize:13,outline:'none',background:C.bg,fontFamily:'inherit'}}/>
            </div>
            <button onClick={()=>{
              const newStock=parseInt(document.getElementById('editStock').value)||0;
              setProducts(ps=>ps.map(p=>p.id===editProd.id?{...p,stock:newStock,status:newStock===0?'품절':newStock<=p.minStock?'재고 부족':'정상'}:p));
              setEditProd(null);
              toast('재고가 업데이트되었습니다.');
            }} style={{width:'100%',padding:'11px 0',borderRadius:20,border:'none',
              background:C.primary,fontSize:13,fontWeight:700,cursor:'pointer',color:'#fff'}}>
              저장하기
            </button>
          </div>
        </div>
      )}
    </div>
  );
}

/* ── Orders Screen ── */
function OrdersScreen({toast}){
  const[orders,setOrders]=useState(ORDERS_ADMIN);
  const[filter,setFilter]=useState('전체');
  const[selOrder,setSelOrder]=useState(null);
  const statuses=['전체','결제 완료','상품 준비','배송 중','배송 완료'];
  const filtered=filter==='전체'?orders:orders.filter(o=>o.status===filter);

  const updateStatus=(id,newStatus)=>{
    setOrders(os=>os.map(o=>o.id===id?{...o,status:newStatus}:o));
    setSelOrder(null);
    toast('주문 상태가 변경되었습니다.');
  };

  return(
    <div style={{animation:'fadeIn .3s ease'}}>
      <div style={{marginBottom:24}}>
        <h1 style={{fontSize:22,fontWeight:800,marginBottom:3}}>주문 및 배송 관리</h1>
        <p style={{fontSize:13,color:C.muted}}>총 {orders.length}건 · 미처리 {orders.filter(o=>o.status!=='배송 완료').length}건</p>
      </div>

      <div style={{display:'flex',gap:8,marginBottom:20}}>
        {statuses.map(s=>(
          <button key={s} onClick={()=>setFilter(s)} style={{
            padding:'6px 14px',borderRadius:20,fontSize:12,fontWeight:filter===s?700:400,
            border:`1px solid ${filter===s?C.primary:C.border}`,
            background:filter===s?C.primary:C.surface,
            color:filter===s?'#fff':C.muted,cursor:'pointer',transition:'all .15s'}}>
            {s} {s!=='전체'&&<span style={{opacity:.7}}>({orders.filter(o=>o.status===s).length})</span>}
          </button>
        ))}
      </div>

      <div style={{background:C.surface,borderRadius:20,boxShadow:'0 4px 16px rgba(232,96,60,.08)',overflow:'hidden'}}>
        <table style={{width:'100%',borderCollapse:'collapse'}}>
          <thead>
            <tr style={{fontSize:11,color:C.muted,background:C.bg}}>
              {['주문번호','주문일','고객명','상품','금액','상태','관리'].map(h=>(
                <th key={h} style={{textAlign:'left',padding:'12px 16px',fontWeight:600,borderBottom:`1px solid ${C.border}`}}>{h}</th>
              ))}
            </tr>
          </thead>
          <tbody>
            {filtered.map((o,i)=>(
              <tr key={o.id} style={{fontSize:13,borderBottom:`1px solid ${C.border}`,
                animation:`cardIn .3s ease ${i*0.06}s both`,cursor:'pointer'}}
                onClick={()=>setSelOrder(o)}>
                <td style={{padding:'13px 16px',color:C.muted,fontSize:11}}>{o.id}</td>
                <td style={{padding:'13px 16px',color:C.muted,fontSize:11}}>{o.date}</td>
                <td style={{padding:'13px 16px',fontWeight:600}}>{o.customer}</td>
                <td style={{padding:'13px 16px',color:C.muted,fontSize:12}}>{o.product.slice(0,14)}...</td>
                <td style={{padding:'13px 16px',fontWeight:700}}>{o.amt.toLocaleString()}원</td>
                <td style={{padding:'13px 16px'}}>
                  <Badge label={o.status} {...(ORDER_STATUS[o.status]||{color:C.muted,bg:C.bg})}/>
                </td>
                <td style={{padding:'13px 16px'}}>
                  <button onClick={e=>{e.stopPropagation();setSelOrder(o);}} style={{
                    background:'none',border:`1px solid ${C.border}`,borderRadius:20,
                    padding:'4px 10px',fontSize:11,cursor:'pointer',color:C.muted,
                    display:'inline-flex',alignItems:'center',gap:3}}>
                    <LIcon name="eye" size={11} color={C.muted}/> 상세
                  </button>
                </td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>

      {selOrder&&(
        <div style={{position:'fixed',inset:0,zIndex:1000,display:'flex',
          alignItems:'center',justifyContent:'center',background:'rgba(0,0,0,.4)'}}>
          <div style={{background:C.surface,borderRadius:24,width:500,
            maxHeight:'80vh',overflowY:'auto',
            animation:'cardIn .25s ease',boxShadow:'0 20px 60px rgba(0,0,0,.2)'}}>
            <div style={{padding:'22px 24px',borderBottom:`1px solid ${C.border}`,
              display:'flex',justifyContent:'space-between',alignItems:'center'}}>
              <span style={{fontWeight:700,fontSize:16}}>주문 상세 — {selOrder.id}</span>
              <button onClick={()=>setSelOrder(null)} style={{background:'none',border:'none',cursor:'pointer',display:'flex',color:C.muted}}><LIcon name="x" size={20}/></button>
            </div>
            <div style={{padding:'22px 24px'}}>
              <div style={{marginBottom:20}}>
                <Badge label={selOrder.status} {...(ORDER_STATUS[selOrder.status]||{})}/>
              </div>
              {[['주문번호',selOrder.id],['주문일자',selOrder.date],['고객명',selOrder.customer],
                ['상품명',selOrder.product],['결제금액',selOrder.amt.toLocaleString()+'원'],
                ['배송정보',selOrder.track||'운송장 미등록'],
              ].map(([k,v])=>(
                <div key={k} style={{display:'flex',padding:'10px 0',borderBottom:`1px solid ${C.border}`}}>
                  <span style={{width:80,fontSize:12,color:C.muted,flexShrink:0}}>{k}</span>
                  <span style={{fontSize:13,fontWeight:500}}>{v}</span>
                </div>
              ))}
              <div style={{marginTop:20}}>
                <div style={{fontSize:12,fontWeight:600,color:C.muted,marginBottom:10}}>상태 변경</div>
                <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
                  {['상품 준비','배송 중','배송 완료','취소'].map(s=>(
                    <button key={s} onClick={()=>updateStatus(selOrder.id,s)} style={{
                      padding:'7px 14px',borderRadius:20,fontSize:12,fontWeight:600,
                      border:`1px solid ${selOrder.status===s?C.primary:C.border}`,
                      background:selOrder.status===s?C.primary:C.surface,
                      color:selOrder.status===s?'#fff':C.muted,cursor:'pointer'}}>
                      {s}
                    </button>
                  ))}
                </div>
              </div>
              {selOrder.status==='배송 완료'&&(
                <div style={{marginTop:16,padding:'12px 14px',borderRadius:12,
                  background:'#FEE2E2',border:`1px solid #FECACA`}}>
                  <div style={{display:'flex',alignItems:'center',gap:6,fontSize:12,fontWeight:600,color:C.danger,marginBottom:6}}>
                    <LIcon name="alert-triangle" size={13} color={C.danger}/> 취소/환불 처리
                  </div>
                  <button onClick={()=>{updateStatus(selOrder.id,'취소');toast('취소/환불 처리되었습니다.');}} style={{
                    background:C.danger,color:'#fff',border:'none',borderRadius:20,
                    padding:'8px 16px',fontSize:12,fontWeight:700,cursor:'pointer'}}>
                    환불 처리하기
                  </button>
                </div>
              )}
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

/* ── Customers Screen ── */
function CustomersScreen({toast}){
  const[customers,setCustomers]=useState(CUSTOMERS);
  const[search,setSearch]=useState('');
  const[selCust,setSelCust]=useState(null);
  const filtered=search?customers.filter(c=>c.name.includes(search)||c.email.includes(search)):customers;

  return(
    <div style={{animation:'fadeIn .3s ease'}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:24}}>
        <div>
          <h1 style={{fontSize:22,fontWeight:800,marginBottom:3}}>고객 관리</h1>
          <p style={{fontSize:13,color:C.muted}}>총 {customers.length}명 · 미답변 Q&A {QNA.filter(q=>!q.answered).length}건</p>
        </div>
      </div>

      <div style={{display:'grid',gridTemplateColumns:'1fr 360px',gap:16}}>
        <div>
          <div style={{marginBottom:14}}>
            <div style={{position:'relative'}}>
              <LIcon name="search" size={15} color={C.muted} style={{position:'absolute',left:12,top:'50%',transform:'translateY(-50%)'}}/>
              <input type="text" placeholder="이름 또는 이메일로 검색"
                value={search} onChange={e=>setSearch(e.target.value)}
                style={{width:'100%',padding:'10px 14px 10px 36px',borderRadius:20,
                  border:`1px solid ${C.border}`,fontSize:13,outline:'none',
                  background:C.surface,fontFamily:'inherit'}}/>
            </div>
          </div>
          <div style={{background:C.surface,borderRadius:20,boxShadow:'0 4px 16px rgba(232,96,60,.08)',overflow:'hidden'}}>
            <table style={{width:'100%',borderCollapse:'collapse'}}>
              <thead>
                <tr style={{fontSize:11,color:C.muted,background:C.bg}}>
                  {['고객명','이메일','등급','구매액','주문수','가입일'].map(h=>(
                    <th key={h} style={{textAlign:'left',padding:'12px 14px',fontWeight:600,borderBottom:`1px solid ${C.border}`}}>{h}</th>
                  ))}
                </tr>
              </thead>
              <tbody>
                {filtered.map((c,i)=>(
                  <tr key={c.id} onClick={()=>setSelCust(c)} style={{
                    fontSize:13,borderBottom:`1px solid ${C.border}`,cursor:'pointer',
                    animation:`cardIn .3s ease ${i*0.05}s both`,
                    background:selCust?.id===c.id?C.primaryLight:'transparent'}}>
                    <td style={{padding:'12px 14px',fontWeight:600}}>{c.name}</td>
                    <td style={{padding:'12px 14px',color:C.muted,fontSize:11}}>{c.email}</td>
                    <td style={{padding:'12px 14px'}}>
                      <Badge label={c.grade} {...(GRADE_STATUS[c.grade]||{color:C.muted,bg:C.bg})}/>
                    </td>
                    <td style={{padding:'12px 14px',fontWeight:700}}>{c.purchase.toLocaleString()}원</td>
                    <td style={{padding:'12px 14px',color:C.muted}}>{c.orders}건</td>
                    <td style={{padding:'12px 14px',color:C.muted,fontSize:11}}>{c.join}</td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        </div>

        {/* Q&A panel */}
        <div>
          <div style={{background:C.surface,borderRadius:20,boxShadow:'0 4px 16px rgba(232,96,60,.08)',padding:'18px',marginBottom:16}}>
            <div style={{fontWeight:700,fontSize:14,marginBottom:14,display:'flex',alignItems:'center',gap:6}}>
              <LIcon name="message-2" size={15} color={C.primary}/>
              미답변 Q&A
              <span style={{background:C.primary,color:'#fff',fontSize:10,fontWeight:700,
                padding:'1px 6px',borderRadius:20,marginLeft:4}}>
                {QNA.filter(q=>!q.answered).length}
              </span>
            </div>
            {QNA.filter(q=>!q.answered).map(q=>(
              <div key={q.id} style={{padding:'12px',borderRadius:12,
                border:`1px solid ${C.border}`,marginBottom:10,background:C.bg}}>
                <div style={{fontSize:11,color:C.muted,marginBottom:4}}>{q.product.slice(0,18)} · {q.date}</div>
                <div style={{fontSize:12,fontWeight:600,color:C.text,marginBottom:6,lineHeight:1.5}}>{q.question}</div>
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                  <span style={{fontSize:11,color:C.muted}}>작성자: {q.user}</span>
                  <button onClick={()=>{
                    toast(`${q.user}님의 질문에 답변 등록 완료`);
                  }} style={{background:C.primary,color:'#fff',border:'none',
                    borderRadius:20,padding:'4px 12px',fontSize:11,fontWeight:700,cursor:'pointer'}}>
                    답변하기
                  </button>
                </div>
              </div>
            ))}
          </div>

          {selCust&&(
            <div style={{background:C.surface,borderRadius:20,
              boxShadow:'0 4px 16px rgba(232,96,60,.08)',padding:'18px',
              animation:'slideRight .25s ease'}}>
              <div style={{fontWeight:700,fontSize:14,marginBottom:14}}>고객 상세 — {selCust.name}</div>
              {[['이메일',selCust.email],['연락처',selCust.phone],['회원 등급',selCust.grade],
                ['누적 구매',selCust.purchase.toLocaleString()+'원'],
                ['주문 건수',selCust.orders+'건'],['보유 포인트',selCust.points.toLocaleString()+'P'],
                ['가입일',selCust.join]
              ].map(([k,v])=>(
                <div key={k} style={{display:'flex',justifyContent:'space-between',
                  padding:'8px 0',borderBottom:`1px solid ${C.border}`,fontSize:12}}>
                  <span style={{color:C.muted}}>{k}</span>
                  <span style={{fontWeight:600,color:k==='회원 등급'?C.primary:C.text}}>{v}</span>
                </div>
              ))}
              <div style={{marginTop:14}}>
                <div style={{fontSize:11,fontWeight:600,color:C.muted,marginBottom:8}}>등급 변경</div>
                <div style={{display:'flex',gap:6}}>
                  {['일반','VIP','VVIP'].map(g=>(
                    <button key={g} onClick={()=>{
                      setCustomers(cs=>cs.map(c=>c.id===selCust.id?{...c,grade:g}:c));
                      setSelCust(s=>({...s,grade:g}));
                      toast(`${selCust.name}님을 ${g} 등급으로 변경했습니다.`);
                    }} style={{
                      padding:'5px 12px',borderRadius:20,fontSize:11,fontWeight:600,
                      border:`1px solid ${selCust.grade===g?C.primary:C.border}`,
                      background:selCust.grade===g?C.primary:C.surface,
                      color:selCust.grade===g?'#fff':C.muted,cursor:'pointer'}}>
                      {g}
                    </button>
                  ))}
                </div>
              </div>
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

/* ── App ── */
function App(){
  const[page,setPage]=useState('main');
  const[toast,setToast]=useState(null);

  const showToast=(msg)=>setToast(msg);

  const navItems=[
    {key:'main',label:'대시보드',icon:'layout-dashboard'},
    {key:'inventory',label:'상품 관리',icon:'package'},
    {key:'orders',label:'주문 관리',icon:'shopping-cart'},
    {key:'customers',label:'고객 관리',icon:'users'},
  ];

  return(
    <div style={{width:'100%',minHeight:'100vh',display:'flex',flexDirection:'column',background:C.bg}}>
      {toast&&<Toast msg={toast} onDone={()=>setToast(null)}/>}

      {/* Top Nav */}
      <header style={{width:'100%',background:C.surface,
        boxShadow:'0 2px 20px rgba(232,96,60,.12)',position:'sticky',top:0,zIndex:100}}>
        <div style={{maxWidth:1280,margin:'0 auto',padding:'0 40px',
          display:'flex',alignItems:'center',height:64}}>
          <div style={{display:'flex',alignItems:'center',gap:10,marginRight:48}}>
            <div style={{width:36,height:36,borderRadius:12,background:C.primary,
              display:'flex',alignItems:'center',justifyContent:'center'}}>
              <LIcon name="wind" size={18} color='#fff'/>
            </div>
            <div>
              <div style={{fontSize:15,fontWeight:900,color:C.text,letterSpacing:'-0.5px'}}>COOLAIR</div>
              <div style={{fontSize:10,color:C.muted,letterSpacing:'0.5px',fontWeight:600}}>관리자 센터</div>
            </div>
          </div>
          <nav style={{display:'flex',flex:1,gap:4}}>
            {navItems.map(item=>(
              <button key={item.key} onClick={()=>setPage(item.key)} style={{
                padding:'8px 16px',height:40,background:page===item.key?C.primaryLight:'none',
                border:page===item.key?`1px solid ${C.secondary}`:'1px solid transparent',
                borderRadius:20,cursor:'pointer',
                fontSize:13,fontWeight:page===item.key?700:500,
                color:page===item.key?C.primary:C.muted,
                transition:'all .15s',display:'flex',alignItems:'center',gap:6}}>
                <LIcon name={item.icon} size={14} color={page===item.key?C.primary:C.muted}/>
                {item.label}
              </button>
            ))}
          </nav>
          <div style={{display:'flex',alignItems:'center',gap:12}}>
            <div style={{position:'relative'}}>
              <div style={{width:36,height:36,borderRadius:'50%',
                background:`linear-gradient(135deg,${C.primary},${C.secondary})`,
                display:'flex',alignItems:'center',justifyContent:'center'}}>
                <LIcon name="user" size={16} color='#fff'/>
              </div>
              <span style={{position:'absolute',top:-2,right:-2,width:10,height:10,
                borderRadius:'50%',background:C.success,border:`2px solid ${C.surface}`}}/>
            </div>
            <div style={{lineHeight:1.3}}>
              <div style={{fontSize:12,fontWeight:700}}>관리자</div>
              <div style={{fontSize:10,color:C.muted}}>admin@coolair.co.kr</div>
            </div>
          </div>
        </div>
      </header>

      {/* Main content */}
      <main style={{flex:1,width:'100%'}}>
        <div style={{maxWidth:1280,margin:'0 auto',padding:'32px 40px'}}>
          {page==='main'&&<DashboardScreen/>}
          {page==='inventory'&&<InventoryScreen toast={showToast}/>}
          {page==='orders'&&<OrdersScreen toast={showToast}/>}
          {page==='customers'&&<CustomersScreen toast={showToast}/>}
        </div>
      </main>

      {/* Footer */}
      <footer style={{background:C.surface,borderTop:`1px solid ${C.border}`,
        padding:'16px 40px'}}>
        <div style={{maxWidth:1280,margin:'0 auto',display:'flex',
          justifyContent:'space-between',alignItems:'center'}}>
          <span style={{fontSize:11,color:C.muted}}>COOLAIR 관리자 플랫폼 · 구현 데모</span>
          <span style={{fontSize:11,color:C.muted}}>Node.js · Express · PostgreSQL · Redis · Recharts</span>
        </div>
      </footer>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
