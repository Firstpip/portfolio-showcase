<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>클럽 DJ 팬덤 투표 랭킹 플랫폼 — 맞춤 구현 데모</title>
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" rel="stylesheet">
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://unpkg.com/prop-types@15/prop-types.min.js"></script>
<script src="https://unpkg.com/react-is@18/umd/react-is.production.min.js"></script>
<script src="https://unpkg.com/recharts@2/umd/Recharts.js"></script>
<link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/regular/style.css">
<link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/fill/style.css">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body, #root { width: 100%; min-height: 100vh; }
  body { font-family: 'Pretendard', -apple-system, sans-serif; background: #0A080F; }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes neonPulse {
    0%, 100% { box-shadow: 0 0 8px #9B30FF80, 0 0 24px #9B30FF30; }
    50%       { box-shadow: 0 0 18px #9B30FFB0, 0 0 48px #9B30FF60; }
  }
  @keyframes rankSlide {
    from { transform: translateX(-20px); opacity: 0; }
    to   { transform: translateX(0);     opacity: 1; }
  }
  @keyframes voteCount {
    0%   { transform: scale(1); color: #F0ECF8; }
    50%  { transform: scale(1.25); color: #00E5CC; }
    100% { transform: scale(1); color: #F0ECF8; }
  }
  @keyframes glowAppear {
    from { opacity: 0; box-shadow: 0 0 0 transparent; }
    to   { opacity: 1; box-shadow: 0 0 32px #FF2D6B40; }
  }
  @keyframes toastIn {
    from { opacity: 0; transform: translateY(-12px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes spinRing {
    to { transform: rotate(360deg); }
  }

  .topnav {
    position: sticky; top: 0; z-index: 100;
    width: 100%;
    background: rgba(10,8,15,0.92);
    backdrop-filter: blur(16px);
    border-bottom: 1px solid rgba(155,48,255,0.25);
  }
  .topnav-inner {
    max-width: 1280px; margin: 0 auto;
    display: flex; align-items: center; gap: 0;
    padding: 0 24px; height: 60px;
  }
  .logo {
    font-size: 17px; font-weight: 800; letter-spacing: 0.08em;
    color: #9B30FF; text-transform: uppercase;
    margin-right: 36px; flex-shrink: 0;
  }
  .logo span { color: #FF2D6B; }
  .nav-tabs { display: flex; gap: 2px; flex: 1; }
  .nav-tab {
    padding: 8px 16px; font-size: 13px; font-weight: 600;
    border-radius: 2px; border: none; cursor: pointer;
    background: transparent; color: #8B82A8;
    transition: color 0.2s, background 0.2s;
    white-space: nowrap;
  }
  .nav-tab:hover { color: #F0ECF8; background: rgba(155,48,255,0.12); }
  .nav-tab.active {
    color: #9B30FF;
    background: rgba(155,48,255,0.15);
    border-bottom: 2px solid #9B30FF;
  }
  .nav-right { margin-left: auto; }
  .btn-primary {
    padding: 8px 18px; font-size: 13px; font-weight: 700;
    border-radius: 2px; border: 1px solid #9B30FF;
    background: #9B30FF20; color: #9B30FF; cursor: pointer;
    transition: background 0.2s, box-shadow 0.2s;
  }
  .btn-primary:hover { background: #9B30FF40; box-shadow: 0 0 12px #9B30FF60; }
  .btn-accent {
    padding: 10px 22px; font-size: 14px; font-weight: 700;
    border-radius: 2px; border: none;
    background: linear-gradient(135deg, #9B30FF, #FF2D6B);
    color: #fff; cursor: pointer;
    transition: opacity 0.2s, box-shadow 0.2s;
    animation: neonPulse 2.5s ease-in-out infinite;
  }
  .btn-accent:hover { opacity: 0.88; box-shadow: 0 0 24px #9B30FF80; }
  .btn-vote {
    padding: 12px 32px; font-size: 15px; font-weight: 800;
    border-radius: 2px; border: 2px solid #FF2D6B;
    background: rgba(255,45,107,0.15); color: #FF2D6B; cursor: pointer;
    transition: background 0.2s, box-shadow 0.2s;
    letter-spacing: 0.04em;
  }
  .btn-vote:hover { background: rgba(255,45,107,0.3); box-shadow: 0 0 18px #FF2D6B60; }
  .btn-vote:disabled {
    opacity: 0.4; cursor: not-allowed;
    animation: none; box-shadow: none;
  }

  .hero {
    width: 100%;
    background: linear-gradient(180deg, #13101E 0%, #0A080F 100%);
    border-bottom: 1px solid rgba(155,48,255,0.15);
    padding: 48px 24px 40px;
    text-align: center;
  }
  .hero-tag {
    display: inline-block; padding: 4px 14px;
    border: 1px solid #00E5CC40; color: #00E5CC;
    font-size: 11px; font-weight: 700; letter-spacing: 0.12em;
    text-transform: uppercase; border-radius: 2px; margin-bottom: 16px;
  }
  .hero-title {
    font-size: 44px; font-weight: 900; letter-spacing: -0.02em;
    line-height: 1.15;
    background: linear-gradient(135deg, #F0ECF8 30%, #9B30FF);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 10px;
  }
  .hero-sub {
    font-size: 15px; color: #8B82A8; font-weight: 400;
    margin-bottom: 28px;
  }
  .hero-timer {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 10px 20px; border-radius: 2px;
    border: 1px solid rgba(155,48,255,0.3);
    background: rgba(155,48,255,0.08);
    color: #9B30FF; font-size: 14px; font-weight: 700;
  }

  .section-wrap { max-width: 1280px; margin: 0 auto; padding: 32px 24px; }
  .section-title {
    font-size: 18px; font-weight: 800; color: #F0ECF8;
    margin-bottom: 20px; display: flex; align-items: center; gap: 8px;
  }
  .section-title .accent { color: #9B30FF; }

  .dj-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
    gap: 16px;
  }
  .dj-card {
    background: #13101E; border: 1px solid rgba(155,48,255,0.2);
    border-radius: 2px; padding: 20px;
    cursor: pointer;
    transition: border-color 0.25s, box-shadow 0.25s, transform 0.2s;
    animation: fadeIn 0.4s ease both;
  }
  .dj-card:hover {
    border-color: #9B30FF80;
    box-shadow: 0 0 20px rgba(155,48,255,0.25);
    transform: translateY(-3px);
  }
  .dj-card-top { display: flex; align-items: center; gap: 14px; margin-bottom: 14px; }
  .dj-avatar {
    width: 52px; height: 52px; border-radius: 2px;
    background: linear-gradient(135deg, #9B30FF, #FF2D6B);
    display: flex; align-items: center; justify-content: center;
    font-size: 20px; font-weight: 900; color: #fff; flex-shrink: 0;
    font-style: normal;
  }
  .dj-rank-badge {
    position: absolute; top: -6px; left: -6px;
    width: 22px; height: 22px; border-radius: 50%;
    background: #FF2D6B; color: #fff;
    font-size: 11px; font-weight: 800;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 0 8px #FF2D6B80;
  }
  .dj-name { font-size: 15px; font-weight: 800; color: #F0ECF8; }
  .dj-genre { font-size: 12px; color: #8B82A8; margin-top: 2px; }
  .dj-stats { display: flex; justify-content: space-between; align-items: center; }
  .vote-count { font-size: 22px; font-weight: 900; color: #9B30FF; }
  .vote-label { font-size: 11px; color: #8B82A8; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; }
  .rank-change {
    display: flex; align-items: center; gap: 4px;
    font-size: 12px; font-weight: 700;
  }
  .rank-up { color: #00E5CC; }
  .rank-down { color: #FF2D6B; }
  .rank-same { color: #8B82A8; }

  .screen-wrap { animation: fadeIn 0.3s ease; }

  .detail-view {
    max-width: 800px; margin: 0 auto; padding: 32px 24px;
    animation: fadeIn 0.35s ease;
  }
  .player-mock {
    background: #13101E; border: 1px solid rgba(155,48,255,0.25);
    border-radius: 2px; padding: 24px; margin-bottom: 24px;
    animation: glowAppear 0.5s ease;
  }
  .player-top { display: flex; align-items: center; gap: 16px; margin-bottom: 20px; }
  .player-cover {
    width: 80px; height: 80px; border-radius: 2px;
    background: linear-gradient(135deg, #FF2D6B, #9B30FF);
    flex-shrink: 0;
  }
  .player-info h2 { font-size: 20px; font-weight: 800; color: #F0ECF8; margin-bottom: 4px; }
  .player-info p  { font-size: 13px; color: #8B82A8; }
  .player-bar-wrap { background: rgba(155,48,255,0.1); border-radius: 2px; height: 4px; margin-bottom: 12px; }
  .player-bar { height: 4px; background: linear-gradient(90deg, #9B30FF, #FF2D6B); border-radius: 2px; width: 38%; transition: width 0.3s; }
  .player-controls { display: flex; align-items: center; gap: 16px; }
  .player-btn {
    background: none; border: none; color: #8B82A8; cursor: pointer;
    font-size: 22px; padding: 4px; transition: color 0.2s;
    display: flex; align-items: center; justify-content: center;
  }
  .player-btn:hover { color: #9B30FF; }
  .player-btn.play {
    width: 44px; height: 44px; border-radius: 50%;
    background: linear-gradient(135deg, #9B30FF, #FF2D6B);
    color: #fff; font-size: 18px;
  }
  .player-time { font-size: 12px; color: #8B82A8; margin-left: auto; font-variant-numeric: tabular-nums; }
  .mixcloud-badge {
    display: inline-flex; align-items: center; gap: 6px;
    font-size: 11px; color: #8B82A8; margin-top: 8px;
  }
  .mixcloud-badge span { color: #FF5500; font-weight: 700; }

  .vote-section {
    background: #13101E; border: 1px solid rgba(255,45,107,0.2);
    border-radius: 2px; padding: 24px; text-align: center;
  }
  .vote-big-count {
    font-size: 56px; font-weight: 900; color: #9B30FF;
    line-height: 1; margin-bottom: 6px;
  }
  .vote-big-count.animate { animation: voteCount 0.5s ease; }
  .daily-ticket {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 6px 14px; border-radius: 2px;
    background: rgba(0,229,204,0.1); border: 1px solid rgba(0,229,204,0.25);
    color: #00E5CC; font-size: 12px; font-weight: 700; margin-bottom: 20px;
  }
  .used-ticket { color: #8B82A8; border-color: rgba(139,130,168,0.25); background: rgba(139,130,168,0.08); }

  .ranking-screen { padding: 32px 24px; max-width: 1280px; margin: 0 auto; }
  .ranking-list { display: flex; flex-direction: column; gap: 10px; }
  .rank-row {
    display: flex; align-items: center; gap: 16px;
    background: #13101E; border: 1px solid rgba(155,48,255,0.15);
    border-radius: 2px; padding: 14px 20px;
    animation: rankSlide 0.35s ease both;
    transition: border-color 0.2s;
  }
  .rank-row:hover { border-color: #9B30FF50; }
  .rank-no {
    font-size: 22px; font-weight: 900; color: #9B30FF;
    width: 36px; text-align: center; flex-shrink: 0;
  }
  .rank-no.top1 { color: #FFD700; text-shadow: 0 0 12px #FFD70060; }
  .rank-no.top2 { color: #C0C0C0; }
  .rank-no.top3 { color: #CD7F32; }
  .rank-name { flex: 1; font-size: 15px; font-weight: 700; color: #F0ECF8; }
  .rank-genre { font-size: 12px; color: #8B82A8; }
  .rank-votes { font-size: 18px; font-weight: 800; color: #9B30FF; width: 90px; text-align: right; }
  .rank-bar-wrap { flex: 1; max-width: 200px; background: rgba(155,48,255,0.1); border-radius: 2px; height: 6px; }
  .rank-bar { height: 6px; background: linear-gradient(90deg, #9B30FF, #FF2D6B); border-radius: 2px; transition: width 0.5s ease; }

  .auth-screen {
    max-width: 420px; margin: 48px auto; padding: 0 24px;
    animation: fadeIn 0.35s ease;
  }
  .auth-card {
    background: #13101E; border: 1px solid rgba(155,48,255,0.25);
    border-radius: 2px; padding: 36px;
  }
  .auth-title { font-size: 22px; font-weight: 800; color: #F0ECF8; margin-bottom: 6px; }
  .auth-sub { font-size: 13px; color: #8B82A8; margin-bottom: 28px; }
  .auth-tabs { display: flex; border-bottom: 1px solid rgba(155,48,255,0.2); margin-bottom: 24px; }
  .auth-tab {
    flex: 1; text-align: center; padding: 10px;
    font-size: 14px; font-weight: 700; cursor: pointer; border: none; background: none;
    color: #8B82A8; border-bottom: 2px solid transparent; transition: color 0.2s;
  }
  .auth-tab.active { color: #9B30FF; border-bottom-color: #9B30FF; }
  .social-btns { display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; }
  .social-btn {
    width: 100%; padding: 13px 16px; border-radius: 2px; border: none;
    font-size: 14px; font-weight: 700; cursor: pointer;
    display: flex; align-items: center; justify-content: center; gap: 10px;
    transition: opacity 0.2s;
  }
  .social-btn:hover { opacity: 0.85; }
  .kakao-btn { background: #FEE500; color: #181600; }
  .naver-btn { background: #03C75A; color: #fff; }
  .divider { display: flex; align-items: center; gap: 12px; margin: 18px 0; color: #8B82A8; font-size: 12px; }
  .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: rgba(155,48,255,0.2); }
  .input-wrap { margin-bottom: 14px; }
  .input-label { font-size: 12px; font-weight: 700; color: #8B82A8; margin-bottom: 6px; display: block; text-transform: uppercase; letter-spacing: 0.06em; }
  .input-field {
    width: 100%; padding: 11px 14px; border-radius: 2px;
    background: rgba(155,48,255,0.08); border: 1px solid rgba(155,48,255,0.2);
    color: #F0ECF8; font-size: 14px; font-family: inherit;
    outline: none; transition: border-color 0.2s;
  }
  .input-field:focus { border-color: #9B30FF; box-shadow: 0 0 8px rgba(155,48,255,0.2); }
  .input-field::placeholder { color: #8B82A8; }
  .btn-full { width: 100%; }

  .toast {
    position: fixed; top: 72px; left: 50%; transform: translateX(-50%);
    background: #13101E; border: 1px solid #00E5CC40;
    color: #00E5CC; font-size: 13px; font-weight: 700;
    padding: 12px 22px; border-radius: 2px;
    animation: toastIn 0.3s ease;
    z-index: 999; white-space: nowrap;
    box-shadow: 0 0 18px rgba(0,229,204,0.2);
  }
  .toast.error { border-color: #FF2D6B40; color: #FF2D6B; box-shadow: 0 0 18px rgba(255,45,107,0.15); }

  .chart-wrap {
    background: #13101E; border: 1px solid rgba(155,48,255,0.2);
    border-radius: 2px; padding: 20px;
    margin-bottom: 24px; animation: fadeIn 0.4s ease;
  }
  .chart-title { font-size: 13px; font-weight: 700; color: #8B82A8; margin-bottom: 14px; text-transform: uppercase; letter-spacing: 0.08em; }
  .chart-container { position: relative; height: 260px; }

  .live-badge {
    display: inline-flex; align-items: center; gap: 5px;
    font-size: 10px; font-weight: 800; color: #FF2D6B;
    text-transform: uppercase; letter-spacing: 0.1em;
  }
  .live-dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: #FF2D6B;
    animation: neonPulse 1.2s ease-in-out infinite;
  }

  .grid-2col { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  @media (max-width: 720px) { .grid-2col { grid-template-columns: 1fr; } }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;
const { BarChart, Bar, XAxis, YAxis, CartesianGrid, Tooltip, ResponsiveContainer, Cell } = Recharts;

const DJ_DATA = [
  { id:1, name:'DJ 하이퍼', genre:'Tech House', rank:1, votes:28410, change:+2, initials:'H', gradient:'linear-gradient(135deg,#9B30FF,#FF2D6B)', tracks:['Deep in the Underground','Neon Protocol','Warehouse 109'], verified:true },
  { id:2, name:'DJ 아스트로',genre:'Minimal Techno',rank:2, votes:26850, change:-1, initials:'A', gradient:'linear-gradient(135deg,#FF2D6B,#FF7800)', tracks:['Signal Loss','Astro Code v2','Dark Matter'] },
  { id:3, name:'DJ 네온',  genre:'Acid House',  rank:3, votes:24330, change:0,  initials:'N', gradient:'linear-gradient(135deg,#00E5CC,#9B30FF)', tracks:['303 Ritual','Neon Acid Loop','Electric Church'] },
  { id:4, name:'DJ 섀도우', genre:'Drum & Bass',  rank:4, votes:21700, change:+1, initials:'S', gradient:'linear-gradient(135deg,#9B30FF,#00E5CC)', tracks:['Shadow Protocol','Sub Frequency','Jungle Rave 24'] },
  { id:5, name:'DJ 크롬',  genre:'Trance',       rank:5, votes:19990, change:-2, initials:'C', gradient:'linear-gradient(135deg,#FF2D6B,#9B30FF)', tracks:['Chrome 140','Eternal Sunrise','Atmosphere X'] },
  { id:6, name:'DJ 볼텍스', genre:'Industrial',   rank:6, votes:17340, change:+3, initials:'V', gradient:'linear-gradient(135deg,#00E5CC,#FF2D6B)', tracks:['Vortex Engine','Steel & Smoke','Noise Garden'] },
  { id:7, name:'DJ 엑소',  genre:'Progressive',  rank:7, votes:15680, change:0,  initials:'X', gradient:'linear-gradient(135deg,#9B30FF,#FF2D6B)', tracks:['Exo Drift','Outer Limits','Cosmic Descent'] },
  { id:8, name:'DJ 루나',  genre:'Deep Tech',    rank:8, votes:13420, change:+1, initials:'L', gradient:'linear-gradient(135deg,#FF2D6B,#00E5CC)', tracks:['Lunar Phase','Night Bloom','After Hours'] },
];

function Timer() {
  const [time, setTime] = useState({ d:2, h:14, m:37, s:22 });
  useEffect(() => {
    const id = setInterval(() => {
      setTime(t => {
        let { d, h, m, s } = t;
        s--;
        if (s < 0) { s = 59; m--; }
        if (m < 0) { m = 59; h--; }
        if (h < 0) { h = 23; d--; }
        return { d: Math.max(0,d), h, m, s };
      });
    }, 1000);
    return () => clearInterval(id);
  }, []);
  const pad = n => String(n).padStart(2,'0');
  return (
    <div className="hero-timer">
      <i className="ph ph-clock" style={{fontSize:16}} />
      <span>주간 리셋까지</span>
      <strong style={{letterSpacing:'0.05em', fontVariantNumeric:'tabular-nums'}}>
        {time.d}일 {pad(time.h)}:{pad(time.m)}:{pad(time.s)}
      </strong>
    </div>
  );
}

function Toast({ msg, type, onClose }) {
  useEffect(() => {
    const t = setTimeout(onClose, 3000);
    return () => clearTimeout(t);
  }, []);
  return <div className={`toast${type==='error'?' error':''}`}>{msg}</div>;
}

function Topnav({ screen, setScreen, openAuth }) {
  const tabs = [
    { key:'main', label:'랭킹 홈' },
    { key:'dj-vote', label:'DJ 상세 & 투표' },
    { key:'ranking', label:'실시간 랭킹 차트' },
    { key:'auth', label:'소셜 로그인 & 회원가입' },
  ];
  return (
    <nav className="topnav">
      <div className="topnav-inner">
        <div className="logo">BE THE <span>CHAMP</span></div>
        <div className="nav-tabs">
          {tabs.map(t => (
            <button key={t.key} className={`nav-tab${screen===t.key?' active':''}`} onClick={() => setScreen(t.key)}>
              {t.label}
            </button>
          ))}
        </div>
        <div className="nav-right">
          <button className="btn-primary" onClick={() => setScreen('auth')}>
            <i className="ph ph-user" style={{marginRight:6}} />로그인
          </button>
        </div>
      </div>
    </nav>
  );
}

function DJCard({ dj, rank, onClick, style }) {
  const initColor = ['#9B30FF','#FF2D6B','#00E5CC','#FF7800'];
  return (
    <div className="dj-card" style={{animationDelay:`${rank*0.05}s`, ...style}} onClick={() => onClick(dj)}>
      <div className="dj-card-top">
        <div style={{position:'relative', flexShrink:0}}>
          <div className="dj-avatar" style={{background: dj.gradient, fontStyle:'normal'}}>{dj.initials}</div>
          <div className="dj-rank-badge">{rank}</div>
        </div>
        <div>
          <div className="dj-name">{dj.name}</div>
          <div className="dj-genre">{dj.genre}</div>
        </div>
      </div>
      <div className="dj-stats">
        <div>
          <div className="vote-count">{dj.votes.toLocaleString()}</div>
          <div className="vote-label">투표</div>
        </div>
        <div className={`rank-change ${dj.change>0?'rank-up':dj.change<0?'rank-down':'rank-same'}`}>
          {dj.change>0 && <><i className="ph ph-trend-up" style={{fontSize:14}} />{dj.change}</>}
          {dj.change<0 && <><i className="ph ph-trend-down" style={{fontSize:14}} />{Math.abs(dj.change)}</>}
          {dj.change===0 && <><i className="ph ph-minus" style={{fontSize:14}} />0</>}
        </div>
      </div>
    </div>
  );
}

function MainScreen({ setScreen, setSelectedDJ }) {
  const handleDJClick = (dj) => {
    setSelectedDJ(dj);
    setScreen('dj-vote');
  };
  return (
    <div className="screen-wrap">
      <div className="hero">
        <div className="hero-tag">
          <i className="ph-fill ph-lightning" style={{marginRight:4}} />이태원 로컬 클럽 씬
        </div>
        <h1 className="hero-title">BE THE CHAMP</h1>
        <p className="hero-sub">좋아하는 DJ에게 투표하고 챔피언을 만들어보세요</p>
        <Timer />
      </div>
      <div className="section-wrap">
        <div className="section-title">
          <div className="live-badge"><div className="live-dot" /><span>LIVE</span></div>
          <span>이번 주 <span className="accent">랭킹</span></span>
          <span style={{marginLeft:'auto', fontSize:13, color:'#8B82A8', fontWeight:500}}>
            총 {DJ_DATA.reduce((s,d)=>s+d.votes,0).toLocaleString()} 투표
          </span>
        </div>
        <div className="dj-grid">
          {DJ_DATA.map((dj, i) => (
            <DJCard key={dj.id} dj={dj} rank={i+1} onClick={handleDJClick} />
          ))}
        </div>
      </div>
    </div>
  );
}

function PlayerMock({ dj }) {
  const [playing, setPlaying] = useState(false);
  const [progress, setProgress] = useState(38);
  const [trackIdx, setTrackIdx] = useState(0);
  useEffect(() => {
    if (!playing) return;
    const id = setInterval(() => setProgress(p => p >= 100 ? 0 : p + 0.3), 300);
    return () => clearInterval(id);
  }, [playing]);
  return (
    <div className="player-mock">
      <div className="player-top">
        <div className="player-cover" style={{background: dj.gradient}} />
        <div className="player-info">
          <h2>{dj.tracks[trackIdx]}</h2>
          <p style={{marginBottom:2}}>{dj.name} · Mixcloud</p>
          <div className="mixcloud-badge">
            <i className="ph ph-cloud" style={{fontSize:13}} />
            <span>Mixcloud</span>
            <span style={{color:'#8B82A8'}}>oEmbed 연동 플레이어</span>
          </div>
        </div>
      </div>
      <div className="player-bar-wrap">
        <div className="player-bar" style={{width:`${progress}%`}} />
      </div>
      <div className="player-controls">
        <button className="player-btn" onClick={() => setTrackIdx(i => Math.max(0,i-1))}>
          <i className="ph ph-skip-back" />
        </button>
        <button className="player-btn play" onClick={() => setPlaying(p => !p)}>
          <i className={`ph ph-${playing?'pause':'play'}`} />
        </button>
        <button className="player-btn" onClick={() => setTrackIdx(i => Math.min(dj.tracks.length-1,i+1))}>
          <i className="ph ph-skip-forward" />
        </button>
        <div className="player-time">
          {Math.floor(progress/100*187)}:{String(Math.floor(((progress/100*187)%1)*60)).padStart(2,'0')} / 3:07
        </div>
      </div>
      <div style={{marginTop:14, display:'flex', gap:8, flexWrap:'wrap'}}>
        {dj.tracks.map((t,i) => (
          <button key={i} onClick={() => { setTrackIdx(i); setProgress(0); setPlaying(true); }}
            style={{
              padding:'5px 12px', borderRadius:2, border:'1px solid rgba(155,48,255,0.3)',
              background: trackIdx===i ? 'rgba(155,48,255,0.2)':'transparent',
              color: trackIdx===i ? '#9B30FF':'#8B82A8', fontSize:12, cursor:'pointer', fontFamily:'inherit'
            }}>
            {t}
          </button>
        ))}
      </div>
    </div>
  );
}

function DJVoteScreen({ selectedDJ }) {
  const dj = selectedDJ || DJ_DATA[0];
  const [votes, setVotes] = useState(dj.votes);
  const [voted, setVoted] = useState(false);
  const [animating, setAnimating] = useState(false);
  const [toast, setToast] = useState(null);

  const handleVote = () => {
    if (voted) { setToast({ msg:'오늘 이미 투표했습니다. 내일 다시 도전해주세요.', type:'error' }); return; }
    setVotes(v => v + 1);
    setVoted(true);
    setAnimating(true);
    setToast({ msg:`${dj.name}에게 투표했습니다!`, type:'ok' });
    setTimeout(() => setAnimating(false), 600);
  };

  return (
    <div className="detail-view screen-wrap">
      {toast && <Toast msg={toast.msg} type={toast.type} onClose={() => setToast(null)} />}

      <div style={{display:'flex', alignItems:'center', gap:8, marginBottom:24}}>
        <div className="dj-avatar" style={{background:dj.gradient, width:56, height:56, fontSize:22, fontStyle:'normal'}}>{dj.initials}</div>
        <div>
          <h1 style={{fontSize:26, fontWeight:900, color:'#F0ECF8'}}>{dj.name}</h1>
          <span style={{fontSize:13, color:'#8B82A8'}}>{dj.genre}</span>
          {dj.verified && <span style={{
            marginLeft:8, fontSize:11, fontWeight:700, padding:'2px 8px',
            background:'rgba(0,229,204,0.15)', border:'1px solid rgba(0,229,204,0.3)', color:'#00E5CC', borderRadius:2
          }}>인증 DJ</span>}
        </div>
        <div style={{marginLeft:'auto', textAlign:'right'}}>
          <div style={{fontSize:13, color:'#8B82A8', marginBottom:2}}>현재 순위</div>
          <div style={{fontSize:28, fontWeight:900, color:'#FF2D6B'}}>#{dj.rank}</div>
        </div>
      </div>

      <PlayerMock dj={dj} />

      <div className="vote-section">
        <div className={`vote-big-count${animating?' animate':''}`}>
          {votes.toLocaleString()}
        </div>
        <div style={{fontSize:13, color:'#8B82A8', marginBottom:12}}>이번 주 누적 투표</div>
        <div className={`daily-ticket${voted?' used-ticket':''}`}>
          <i className={`ph ph-${voted?'check-circle':'ticket'}`} style={{fontSize:14}} />
          {voted ? '오늘 투표권 사용 완료' : '오늘 무료 투표권 1장 남음'}
        </div>
        <br/>
        <button className="btn-vote" disabled={voted} onClick={handleVote}>
          <i className={`ph ph-${voted?'check':'heart'}`} style={{marginRight:8, fontSize:16}} />
          {voted ? '투표 완료' : `${dj.name} 에게 투표하기`}
        </button>
        <div style={{marginTop:14, fontSize:12, color:'#8B82A8'}}>
          매일 자정에 투표권이 1장 충전됩니다.
        </div>
      </div>

      <div style={{marginTop:24, background:'#13101E', border:'1px solid rgba(155,48,255,0.15)', borderRadius:2, padding:20}}>
        <div style={{fontSize:13, fontWeight:700, color:'#8B82A8', marginBottom:14, textTransform:'uppercase', letterSpacing:'0.08em'}}>공연 정보</div>
        <div style={{display:'flex', flexDirection:'column', gap:10}}>
          {[
            { venue:'Club Octagon, 이태원', date:'2026.06.14 (토) 22:00', link:'네이버 예약' },
            { venue:'CAKESHOP, 이태원', date:'2026.06.28 (토) 23:00', link:'네이버 예약' },
          ].map((ev,i) => (
            <div key={i} style={{display:'flex', alignItems:'center', justifyContent:'space-between', padding:'12px 0', borderBottom: i<1 ? '1px solid rgba(155,48,255,0.1)':'none'}}>
              <div>
                <div style={{fontSize:14, fontWeight:700, color:'#F0ECF8'}}>{ev.venue}</div>
                <div style={{fontSize:12, color:'#8B82A8', marginTop:2}}>{ev.date}</div>
              </div>
              <button style={{
                padding:'7px 14px', borderRadius:2, border:'1px solid rgba(155,48,255,0.3)',
                background:'transparent', color:'#9B30FF', fontSize:12, cursor:'pointer', fontFamily:'inherit',
                fontWeight:700
              }}>
                <i className="ph ph-arrow-square-out" style={{marginRight:5}} />{ev.link}
              </button>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

function RankingScreen({ setScreen, setSelectedDJ }) {
  const [rankings, setRankings] = useState(DJ_DATA.map(d => ({ ...d })));
  const [tick, setTick] = useState(0);

  useEffect(() => {
    const id = setInterval(() => {
      setRankings(prev => {
        const updated = prev.map(dj => ({
          ...dj,
          votes: dj.votes + Math.floor(Math.random() * 12)
        }));
        return [...updated].sort((a,b) => b.votes - a.votes).map((dj,i) => ({ ...dj, rank:i+1 }));
      });
      setTick(t => t + 1);
    }, 2800);
    return () => clearInterval(id);
  }, []);

  const maxVotes = rankings[0]?.votes || 1;

  const chartData = rankings.slice(0,6).map(dj => ({
    name: dj.name.replace('DJ ',''),
    투표수: dj.votes,
  }));

  const COLORS = ['#9B30FF','#FF2D6B','#00E5CC','#FF7800','#9B30FF90','#FF2D6B70'];

  return (
    <div className="ranking-screen screen-wrap">
      <div className="section-title" style={{marginBottom:20}}>
        <div className="live-badge"><div className="live-dot" /><span>LIVE</span></div>
        <span>실시간 랭킹 <span className="accent">차트</span></span>
        <span style={{marginLeft:'auto', fontSize:12, color:'#8B82A8'}}>
          업데이트 #{tick} · 2.8초마다 갱신
        </span>
      </div>

      <div className="grid-2col" style={{marginBottom:24}}>
        <div className="chart-wrap">
          <div className="chart-title">DJ별 주간 투표 현황 (상위 6)</div>
          <div className="chart-container">
            <ResponsiveContainer width="100%" height="100%">
              <BarChart data={chartData} margin={{top:8, right:8, bottom:8, left:0}}>
                <CartesianGrid strokeDasharray="3 3" stroke="rgba(155,48,255,0.1)" />
                <XAxis dataKey="name" tick={{fill:'#8B82A8', fontSize:11}} axisLine={false} tickLine={false} />
                <YAxis tick={{fill:'#8B82A8', fontSize:11}} axisLine={false} tickLine={false} tickFormatter={v => `${(v/1000).toFixed(0)}K`} />
                <Tooltip
                  contentStyle={{ background:'#13101E', border:'1px solid rgba(155,48,255,0.3)', borderRadius:2, color:'#F0ECF8', fontSize:12 }}
                  formatter={v => [v.toLocaleString(), '투표수']}
                />
                <Bar dataKey="투표수" radius={[2,2,0,0]}>
                  {chartData.map((_, i) => <Cell key={i} fill={COLORS[i % COLORS.length]} />)}
                </Bar>
              </BarChart>
            </ResponsiveContainer>
          </div>
        </div>

        <div style={{background:'#13101E', border:'1px solid rgba(155,48,255,0.2)', borderRadius:2, padding:'20px'}}>
          <div className="chart-title" style={{marginBottom:16}}>주간 투표 추이</div>
          {['월','화','수','목','금','토','일'].map((day, i) => {
            const val = [42,58,67,81,93,100,87][i];
            return (
              <div key={day} style={{display:'flex', alignItems:'center', gap:10, marginBottom:8}}>
                <span style={{width:24, fontSize:11, color:'#8B82A8', textAlign:'center'}}>{day}</span>
                <div style={{flex:1, background:'rgba(155,48,255,0.1)', borderRadius:2, height:8}}>
                  <div style={{height:8, borderRadius:2, width:`${val}%`, background:'linear-gradient(90deg,#9B30FF,#FF2D6B)', transition:'width 0.4s'}} />
                </div>
                <span style={{width:40, fontSize:11, color:'#9B30FF', textAlign:'right', fontWeight:700}}>{val}%</span>
              </div>
            );
          })}
        </div>
      </div>

      <div className="ranking-list">
        {rankings.map((dj, i) => (
          <div key={dj.id} className="rank-row"
            style={{animationDelay:`${i*0.04}s`, cursor:'pointer'}}
            onClick={() => { setSelectedDJ(dj); setScreen('dj-vote'); }}
          >
            <div className={`rank-no ${i===0?'top1':i===1?'top2':i===2?'top3':''}`}>{i+1}</div>
            <div className="dj-avatar" style={{background:dj.gradient, width:36, height:36, borderRadius:2, fontSize:14, fontStyle:'normal', display:'flex', alignItems:'center', justifyContent:'center', color:'#fff', fontWeight:900, flexShrink:0}}>
              {dj.initials}
            </div>
            <div style={{flex:1}}>
              <div className="rank-name">{dj.name}</div>
              <div className="rank-genre">{dj.genre}</div>
            </div>
            <div className="rank-bar-wrap">
              <div className="rank-bar" style={{width:`${(dj.votes/maxVotes)*100}%`}} />
            </div>
            <div className="rank-votes">{dj.votes.toLocaleString()}</div>
            <div className={`rank-change ${dj.change>0?'rank-up':dj.change<0?'rank-down':'rank-same'}`} style={{width:40, textAlign:'right', fontSize:12, fontWeight:700}}>
              {dj.change>0?`+${dj.change}`:dj.change===0?'-':dj.change}
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}

function AuthScreen() {
  const [tab, setTab] = useState('login');
  const [toast, setToast] = useState(null);
  const [form, setForm] = useState({ email:'', password:'', nickname:'' });

  const handleSocial = (type) => {
    setToast({ msg:`${type} 로그인 처리 중...`, type:'ok' });
  };
  const handleSubmit = (e) => {
    e.preventDefault();
    if (tab === 'login') setToast({ msg:'로그인 성공! 메인 화면으로 이동합니다.', type:'ok' });
    else setToast({ msg:'회원가입 완료! 이메일 인증 메일을 확인해주세요.', type:'ok' });
  };

  return (
    <div className="auth-screen screen-wrap">
      {toast && <Toast msg={toast.msg} type={toast.type} onClose={() => setToast(null)} />}
      <div className="auth-card">
        <div className="auth-title">BE THE CHAMP</div>
        <div className="auth-sub">로그인하고 좋아하는 DJ에게 투표하세요</div>
        <div className="auth-tabs">
          <button className={`auth-tab${tab==='login'?' active':''}`} onClick={() => setTab('login')}>로그인</button>
          <button className={`auth-tab${tab==='signup'?' active':''}`} onClick={() => setTab('signup')}>회원가입</button>
        </div>

        <div className="social-btns">
          <button className="social-btn kakao-btn" onClick={() => handleSocial('카카오')}>
            <svg width="18" height="18" viewBox="0 0 24 24" fill="#181600"><path d="M12 3C7.03 3 3 6.36 3 10.5c0 2.6 1.59 4.88 4 6.22l-.64 2.78 3.13-1.96c.8.15 1.63.23 2.51.23 4.97 0 9-3.36 9-7.5S16.97 3 12 3z"/></svg>
            카카오로 로그인
          </button>
          <button className="social-btn naver-btn" onClick={() => handleSocial('네이버')}>
            <svg width="18" height="18" viewBox="0 0 24 24" fill="white"><path d="M3 3h7.2l4.8 6.96V3H21v18h-7.2L9 14.04V21H3V3z"/></svg>
            네이버로 로그인
          </button>
        </div>

        <div className="divider">또는 이메일로</div>

        <form onSubmit={handleSubmit}>
          {tab === 'signup' && (
            <div className="input-wrap">
              <label className="input-label">닉네임</label>
              <input className="input-field" type="text" placeholder="클럽에서 불릴 닉네임" value={form.nickname} onChange={e => setForm({...form, nickname:e.target.value})} />
            </div>
          )}
          <div className="input-wrap">
            <label className="input-label">이메일</label>
            <input className="input-field" type="email" placeholder="your@email.com" value={form.email} onChange={e => setForm({...form, email:e.target.value})} />
          </div>
          <div className="input-wrap">
            <label className="input-label">비밀번호</label>
            <input className="input-field" type="password" placeholder="8자 이상" value={form.password} onChange={e => setForm({...form, password:e.target.value})} />
          </div>
          {tab === 'signup' && (
            <div className="input-wrap">
              <label className="input-label">비밀번호 확인</label>
              <input className="input-field" type="password" placeholder="비밀번호 재입력" />
            </div>
          )}
          <button type="submit" className="btn-accent btn-full" style={{marginTop:4}}>
            {tab === 'login' ? '로그인' : '회원가입'}
          </button>
        </form>

        {tab === 'login' && (
          <div style={{marginTop:16, textAlign:'center', fontSize:12, color:'#8B82A8'}}>
            아직 계정이 없으신가요?{' '}
            <span style={{color:'#9B30FF', cursor:'pointer', fontWeight:700}} onClick={() => setTab('signup')}>회원가입</span>
          </div>
        )}
      </div>
    </div>
  );
}

function App() {
  const [screen, setScreen] = useState('main');
  const [selectedDJ, setSelectedDJ] = useState(null);

  return (
    <div style={{width:'100%', minHeight:'100vh', display:'flex', flexDirection:'column', background:'#0A080F', color:'#F0ECF8', fontFamily:"'Pretendard', -apple-system, sans-serif"}}>
      <Topnav screen={screen} setScreen={setScreen} />
      <main style={{flex:1, width:'100%'}}>
        {screen === 'main' && <MainScreen setScreen={setScreen} setSelectedDJ={setSelectedDJ} />}
        {screen === 'dj-vote' && <DJVoteScreen selectedDJ={selectedDJ} />}
        {screen === 'ranking' && <RankingScreen setScreen={setScreen} setSelectedDJ={setSelectedDJ} />}
        {screen === 'auth' && <AuthScreen />}
      </main>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
