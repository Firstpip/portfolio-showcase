}

function ArtistMgmtScreen() {
  const [djs, setDjs] = useState(DJ_LIST);
  const [search, setSearch] = useState('');
  const [showAdd, setShowAdd] = useState(false);
  const [selected, setSelected] = useState(null);
  const [toast, setToast] = useState(null);
  const [urlStatus, setUrlStatus] = useState(null);
  const [newDJ, setNewDJ] = useState({ name:'', genre:'', mixcloud:'', tracks:0 });

  const filtered = djs.filter(d => d.name.includes(search) || d.genre.includes(search));

  const checkUrl = (url) => {
    setUrlStatus('checking');
    setTimeout(() => {
      setUrlStatus(url.startsWith('https://mixcloud.com') ? 'ok' : 'fail');
    }, 1200);
  };

  const handleAdd = () => {
    if (!newDJ.name) return;
    const added = { ...newDJ, id: Date.now(), votes:0, status:'active', joinDate:new Date().toISOString().slice(0,10), verified:false };
    setDjs(prev => [added, ...prev]);
    setShowAdd(false);
    setNewDJ({ name:'', genre:'', mixcloud:'', tracks:0 });
    setUrlStatus(null);
    setToast({ msg:`DJ ${newDJ.name} 등록 완료`, type:'success' });
  };

  const handleVerify = (dj) => {
    setDjs(prev => prev.map(d => d.id===dj.id ? {...d, verified:!d.verified} : d));
    setSelected(s => s ? {...s, verified:!s.verified} : s);
    setToast({ msg:`인증 상태 업데이트됨`, type:'success' });
  };
  const handleToggle = (dj) => {
    const ns = dj.status==='active'?'inactive':'active';
    setDjs(prev => prev.map(d => d.id===dj.id ? {...d, status:ns} : d));
    setSelected(s => s ? {...s, status:ns} : s);
  };

  return (
    <div className="page-wrap">
      {toast && <Toast msg={toast.msg} type={toast.type} onClose={()=>setToast(null)} />}

      <div className="page-header" style={{display:'flex', justifyContent:'space-between', alignItems:'flex-start'}}>
        <div>
          <div className="page-title">DJ 아티스트 관리</div>
          <div className="page-sub">등록 DJ 관리, Mixcloud 링크 매핑, 인증 설정</div>
        </div>
        <button className="btn-main" onClick={() => setShowAdd(true)}>
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><path d="M12 5v14M5 12h14"/></svg>
          DJ 등록
        </button>
      </div>

      <div className="toolbar">
        <input className="search-input" placeholder="이름, 장르 검색..." value={search} onChange={e=>setSearch(e.target.value)} />

          <option>전체 상태</option><option>활성</option><option>비활성</option>

        <span style={{fontSize:12, color:'#7A6A5A', marginLeft:'auto'}}>{filtered.length}명</span>

      <div className="card" style={{padding:0}}>
        <div className="table-wrap">
          <table>
            <thead><tr>
              <th>DJ명</th><th>장르</th><th>Mixcloud</th><th>트랙 수</th><th>총 투표</th><th>상태</th><th>인증</th><th>액션</th>
            </tr></thead>
            <tbody>
              {filtered.map(dj => (
                <tr key={dj.id} onClick={() => setSelected(dj)}>
                  <td style={{fontWeight:700}}>{dj.name}</td>
                  <td style={{color:'#7A6A5A'}}>{dj.genre}</td>
                  <td><span style={{fontSize:11, color:AMBER, fontWeight:600}}>연동됨</span></td>
                  <td>{dj.tracks}개</td>
                  <td style={{fontWeight:700}}>{dj.votes.toLocaleString()}</td>
                  <td><span className={`status-badge ${dj.status==='active'?'s-active':'s-inactive'}`}>{dj.status==='active'?'활성':'비활성'}</span></td>
                  <td>
                    {dj.verified

                      : <span className="status-badge s-block">미인증</span>}
                  </td>
                  <td onClick={e=>e.stopPropagation()}>
                    <div style={{display:'flex', gap:6}}>
                      <button className="btn-sm btn-outline-sm" onClick={()=>setSelected(dj)}>편집</button>
                      <button className="btn-sm btn-danger-sm" onClick={() => { setDjs(prev=>prev.filter(d=>d.id!==dj.id)); setToast({msg:'DJ 삭제됨', type:'err'}); }}>삭제</button>
                    </div>
                  </td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      </div>

      {showAdd && (
        <div className="modal-overlay" onClick={() => setShowAdd(false)}>
          <div className="modal-box" onClick={e=>e.stopPropagation()}>

              </button>
            </div>
            <div className="form-group">
              <label className="form-label">DJ 이름</label>
              <input className="form-input" placeholder="예: DJ 신예" value={newDJ.name} onChange={e=>setNewDJ({...newDJ, name:e.target.value})} />
            </div>
            <div className="form-group">
              <label className="form-label">장르</label>
              <input className="form-input" placeholder="예: Tech House" value={newDJ.genre} onChange={e=>setNewDJ({...newDJ, genre:e.target.value})} />
            </div>
            <div className="form-group">
              <label className="form-label">Mixcloud 프로필 URL</label>
              <input className="form-input" placeholder="https://mixcloud.com/dj-name" value={newDJ.mixcloud}

              />
              {urlStatus==='checking' && <div className="url-check url-checking"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>Mixcloud URL 확인 중...</div>}
              {urlStatus==='ok'    && <div className="url-check url-ok"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M20 6L9 17l-5-5"/></svg>유효한 Mixcloud URL</div>}
              {urlStatus==='fail'  && <div className="url-check url-fail"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="12" cy="12" r="10"/><path d="M15 9l-6 6M9 9l6 6"/></svg>Mixcloud URL을 확인해주세요</div>}
            </div>
            <div className="form-group">
              <label className="form-label">초기 트랙 수</label>
              <input className="form-input" type="number" placeholder="0" value={newDJ.tracks} onChange={e=>setNewDJ({...newDJ, tracks:Number(e.target.value)})} />
            </div>
            <div className="modal-footer">
              <button className="btn-sm btn-outline-sm" style={{padding:'9px 18px', borderRadius:10}} onClick={()=>setShowAdd(false)}>취소</button>
              <button className="btn-main" onClick={handleAdd}>등록 완료</button>
            </div>
          </div>
        </div>
      )}

      {selected && (
        <div className="drawer-overlay" onClick={() => setSelected(null)}>
          <div className="drawer-box" onClick={e=>e.stopPropagation()}>
            <div className="drawer-top">
              <h3 style={{fontSize:17, fontWeight:800}}>{selected.name}</h3>
              <button className="modal-close" onClick={()=>setSelected(null)}>
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M18 6L6 18M6 6l12 12"/></svg>
              </button>
            </div>
            <div className="detail-section">
              {[['장르', selected.genre],['가입일', selected.joinDate],['총 투표', selected.votes.toLocaleString()+'표'],['상태', selected.status==='active'?'활성':'비활성'],['인증', selected.verified?'인증 완료':'미인증']].map(([k,v])=>(
                <div key={k} className="detail-row"><span className="detail-key">{k}</span><span className="detail-val">{v}</span></div>
              ))}

              <button className="btn-main" style={{width:'100%', justifyContent:'center'}} onClick={() => handleVerify(selected)}>
                {selected.verified ? '인증 취소' : 'DJ 인증 처리'}

              <button className="btn-sm btn-outline-sm" style={{padding:'10px', borderRadius:10, fontSize:13}} onClick={() => handleToggle(selected)}>
                {selected.status==='active' ? 'DJ 비활성화' : 'DJ 활성화'}
              </button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

function AbuseMembersScreen() {
  const [logs, setLogs] = useState(ABUSE_LOG);
  const [filter, setFilter] = useState('전체');
  const [search, setSearch] = useState('');
  const [selected, setSelected] = useState(null);
  const [toast, setToast] = useState(null);
  const [confirmItem, setConfirmItem] = useState(null);

  const filtered = logs.filter(l => (filter==='전체' || l.type.includes(filter)) && (l.userId.includes(search)||l.ip.includes(search)||l.dj.includes(search)));

  const statusLabel = s => ({ block:'차단됨', warn:'경고', review:'검토 필요', ok:'처리 완료' })[s] || s;
  const statusClass = s => ({ block:'s-block', warn:'s-warn', review:'s-review', ok:'s-active' })[s] || '';

  const doBlock = (item) => {
    setLogs(prev => prev.map(l => l.id===item.id ? {...l, status:'block'} : l));
    setSelected(s => s ? {...s, status:'block'} : s);
    setToast({ msg:`${item.userId} 계정 차단 완료`, type:'success' });
    setConfirmItem(null);
  };
  const doInvalidate = (item) => {
    setLogs(prev => prev.map(l => l.id===item.id ? {...l, status:'ok'} : l));
    setSelected(null);
    setToast({ msg:'투표 무효 처리 완료. 랭킹 집계에서 제외됩니다.', type:'success' });
    setConfirmItem(null);
  };

  return (
    <div className="page-wrap">
      {toast && <Toast msg={toast.msg} type={toast.type} onClose={()=>setToast(null)} />}

      <div className="page-header" style={{display:'flex', justifyContent:'space-between', alignItems:'flex-start'}}>
        <div>
          <div className="page-title">투표 어뷰징 감지 & 회원 관리</div>

        <div style={{display:'flex', gap:8, alignItems:'center'}}>
          <span className={`status-badge s-warn`} style={{fontSize:12, padding:'6px 14px', animation:'pulseAmber 1.5s infinite'}}>
            미처리 {logs.filter(l=>l.status==='review'||l.status==='warn').length}건
          </span>
        </div>
      </div>

      <div className="toolbar">
        <input className="search-input" placeholder="userId, IP, DJ명 검색..." value={search} onChange={e=>setSearch(e.target.value)} />
        <select className="filter-select" value={filter} onChange={e=>setFilter(e.target.value)}>
          <option>전체</option><option value="다계정">다계정</option><option value="IP">IP 기반</option><option value="봇">봇 패턴</option><option value="VPN">VPN</option>
        </select>
      </div>

      <div className="card" style={{padding:0}}>
        <div className="table-wrap">
          <table>
            <thead><tr>
              <th>감지 ID</th><th>사용자</th><th>IP 주소</th><th>유형</th><th>감지 횟수</th><th>대상 DJ</th><th>감지 시각</th><th>상태</th><th>액션</th>
            </tr></thead>
            <tbody>
              {filtered.map(l => (
                <tr key={l.id} onClick={() => setSelected(l)}>
                  <td style={{fontSize:11, fontWeight:700, color:'#7A6A5A', fontFamily:'monospace'}}>{l.id}</td>
                  <td style={{fontWeight:700, fontFamily:'monospace', fontSize:12}}>{l.userId}</td>
                  <td style={{fontSize:11, color:'#7A6A5A', fontFamily:'monospace'}}>{l.ip}</td>
                  <td><span className={`status-badge ${l.type.includes('봇')||l.count>30?'s-review':'s-warn'}`} style={{fontSize:11}}>{l.type}</span></td>
                  <td style={{fontWeight:800, color:l.count>30?'#DC2626':AMBER}}>{l.count}회</td>
                  <td>{l.dj}</td>
                  <td style={{fontSize:11, color:'#7A6A5A'}}>{l.detectedAt}</td>
                  <td><span className={`status-badge ${statusClass(l.status)}`}>{statusLabel(l.status)}</span></td>
                  <td onClick={e=>e.stopPropagation()}>
                    <div style={{display:'flex', gap:6}}>
                      {l.status!=='block' && <button className="btn-sm btn-danger-sm" onClick={() => setConfirmItem({item:l, action:'block'})}>차단</button>}
                      {l.status!=='ok'    && <button className="btn-sm btn-outline-sm" onClick={() => setConfirmItem({item:l, action:'invalidate'})}>무효화</button>}
                    </div>
                  </td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      </div>

      {selected && (
        <div className="drawer-overlay" onClick={()=>setSelected(null)}>
          <div className="drawer-box" onClick={e=>e.stopPropagation()}>
            <div className="drawer-top">
              <h3 style={{fontSize:17, fontWeight:800}}>어뷰징 상세</h3>
              <button className="modal-close" onClick={()=>setSelected(null)}>
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M18 6L6 18M6 6l12 12"/></svg>
              </button>
            </div>
            <div className="detail-section">
              {[
                ['감지 ID', selected.id], ['사용자', selected.userId],
                ['IP 주소', selected.ip], ['감지 유형', selected.type],
                ['감지 횟수', `${selected.count}회`], ['대상 DJ', selected.dj],
                ['감지 시각', selected.detectedAt], ['현재 상태', statusLabel(selected.status)],
              ].map(([k,v])=>(
                <div key={k} className="detail-row"><span className="detail-key">{k}</span><span className="detail-val">{v}</span></div>
              ))}

            <div style={{background:'rgba(244,160,32,0.06)', borderRadius:10, padding:'14px 16px', marginBottom:16}}>
              <div style={{fontSize:12, fontWeight:700, color:'#7A6A5A', marginBottom:8}}>감지 근거</div>
              <div style={{fontSize:12, color:'#1C1308', lineHeight:1.7}}>

                임계값(15분 10회) 초과로 자동 플래그 처리되었습니다.
              </div>
            </div>
            <div style={{display:'flex', flexDirection:'column', gap:10}}>
              {selected.status !== 'block' && <button className="btn-main" style={{width:'100%', justifyContent:'center', background:'#DC2626'}} onClick={()=>doBlock(selected)}>계정 차단</button>}
              {selected.status !== 'ok'    && <button className="btn-sm btn-outline-sm" style={{padding:'10px', borderRadius:10, fontSize:13, width:'100%'}} onClick={()=>doInvalidate(selected)}>투표 무효 처리</button>}
            </div>
          </div>
        </div>
      )}

      {confirmItem && (
        <div className="modal-overlay" onClick={()=>setConfirmItem(null)}>
          <div className="modal-box" style={{maxWidth:380}} onClick={e=>e.stopPropagation()}>
            <div style={{fontSize:16, fontWeight:800, marginBottom:12}}>
              {confirmItem.action==='block' ? '계정 차단 확인' : '투표 무효화 확인'}
            </div>
            <div style={{fontSize:13, color:'#7A6A5A', marginBottom:20, lineHeight:1.6}}>
              {confirmItem.action==='block'
                ? `${confirmItem.item.userId} 계정을 차단하시겠습니까? 해당 사용자는 이후 투표가 불가합니다.`
                : `${confirmItem.item.userId}의 투표를 무효 처리하시겠습니까? 랭킹 집계에서 즉시 제외됩니다.`}
            </div>
            <div style={{display:'flex', gap:10, justifyContent:'flex-end'}}>
              <button className="btn-sm btn-outline-sm" style={{padding:'9px 18px', borderRadius:10}} onClick={()=>setConfirmItem(null)}>취소</button>
              <button className="btn-main" style={confirmItem.action==='block'?{background:'#DC2626'}:{}} onClick={()=>confirmItem.action==='block'?doBlock(confirmItem.item):doInvalidate(confirmItem.item)}>
                {confirmItem.action==='block' ? '차단 실행' : '무효 처리'}
              </button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

          <div style={{display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:14}}>
            <h3 style={{fontSize:16, fontWeight:800}}>투표 시즌 관리</h3>
            <button className="btn-main" style={{fontSize:13, padding:'8px 16px'}} onClick={()=>setShowNewSeason(true)}>
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><path d="M12 5v14M5 12h14"/></svg>
              새 시즌 예약
            </button>
          </div>
          {seasons.map((s,i) => (
            <div key={s.id} className={`season-card${s.current?' current':''}`} style={{animationDelay:`${i*0.06}s`}}>
              <div className="season-header">
                <div>
                  <div className="season-title">{s.label}</div>
                  <div className="season-period">{s.start} ~ {s.end}</div>
                </div>
                {s.current
                  ? <span className="status-badge s-active" style={{fontSize:12, animation:'pulseAmber 1.8s infinite'}}>진행 중</span>
                  : <span className="status-badge s-block" style={{fontSize:12}}>종료</span>}
              </div>
              <div style={{display:'flex', justifyContent:'space-between', alignItems:'center'}}>
                <div style={{fontSize:13, color:'#7A6A5A'}}>
                  총 투표 <strong style={{color:AMBER}}>{s.votes.toLocaleString()}표</strong>
                </div>
                {s.winner
                  ? <div className="winner-chip"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>우승: {s.winner}</div>
                  : <div style={{fontSize:12, color:'#7A6A5A'}}>집계 진행 중</div>}
              </div>
            </div>
          ))}
        </div>

        <div>
          <div style={{display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:14}}>
            <h3 style={{fontSize:16, fontWeight:800}}>공연 이벤트</h3>
            <button className="btn-main" style={{fontSize:13, padding:'8px 16px'}} onClick={()=>setShowNewEvent(true)}>
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><path d="M12 5v14M5 12h14"/></svg>
              이벤트 추가
            </button>
          </div>
          {events.map((ev,i) => (
            <div key={ev.id} className="card" style={{marginBottom:10, animationDelay:`${i*0.07}s`, padding:'16px 18px'}}>
              <div style={{display:'flex', justifyContent:'space-between', alignItems:'flex-start', marginBottom:8}}>
                <div style={{fontWeight:800, fontSize:14}}>{ev.dj}</div>
                <span className="status-badge s-active" style={{fontSize:11}}>예정</span>
              </div>
              <div style={{fontSize:13, color:'#7A6A5A', marginBottom:4}}>{ev.venue}</div>
              <div style={{display:'flex', justifyContent:'space-between', alignItems:'center'}}>
                <div style={{fontSize:12, color:'#7A6A5A'}}>{ev.date} {ev.time}</div>
                <a href={ev.link} style={{fontSize:12, color:AMBER, fontWeight:700, textDecoration:'none'}} onClick={e=>e.preventDefault()}>
                  예매 링크
                  <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" style={{marginLeft:4, verticalAlign:'middle'}}><path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6M15 3h6v6M10 14L21 3"/></svg>
                </a>
              </div>
            </div>
          ))}
        </div>
      </div>

      {showNewSeason && (
        <div className="modal-overlay" onClick={()=>setShowNewSeason(false)}>
          <div className="modal-box" onClick={e=>e.stopPropagation()}>
            <div className="modal-title">
              새 시즌 예약
              <button className="modal-close" onClick={()=>setShowNewSeason(false)}><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M18 6L6 18M6 6l12 12"/></svg></button>
            </div>
            <div className="form-group">
              <label className="form-label">시작일</label>
              <input className="form-input" type="date" value={newSeason.start} onChange={e=>setNewSeason({...newSeason, start:e.target.value})} />
            </div>
            <div className="form-group">
              <label className="form-label">종료일</label>
              <input className="form-input" type="date" value={newSeason.end} onChange={e=>setNewSeason({...newSeason, end:e.target.value})} />
            </div>
            <div style={{padding:'12px 14px', background:'rgba(244,160,32,0.08)', borderRadius:8, fontSize:12, color:'#7A6A5A', marginBottom:8}}>
              시즌 종료 시 node-cron 스케줄러가 Redis Sorted Set을 스냅샷하여 최종 순위를 자동 기록합니다.
            </div>
            <div className="modal-footer">
              <button className="btn-sm btn-outline-sm" style={{padding:'9px 18px', borderRadius:10}} onClick={()=>setShowNewSeason(false)}>취소</button>
              <button className="btn-main" onClick={handleAddSeason}>시즌 예약 완료</button>
            </div>
          </div>
        </div>
      )}

      {showNewEvent && (
        <div className="modal-overlay" onClick={()=>setShowNewEvent(false)}>
          <div className="modal-box" onClick={e=>e.stopPropagation()}>
            <div className="modal-title">
              공연 이벤트 등록
              <button className="modal-close" onClick={()=>setShowNewEvent(false)}><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M18 6L6 18M6 6l12 12"/></svg></button>
            </div>
            <div className="form-group">
              <label className="form-label">출연 DJ</label>
              <select className="form-input" value={newEvent.dj} onChange={e=>setNewEvent({...newEvent, dj:e.target.value})}>
                <option value="">선택</option>
                {DJ_LIST.map(d=><option key={d.id} value={d.name}>{d.name}</option>)}
              </select>
            </div>
            <div className="form-group">
              <label className="form-label">공연 장소</label>
              <input className="form-input" placeholder="예: Club Octagon, 이태원" value={newEvent.venue} onChange={e=>setNewEvent({...newEvent, venue:e.target.value})} />
            </div>
            <div className="form-group" style={{display:'grid', gridTemplateColumns:'1fr 1fr', gap:10}}>
              <div>
                <label className="form-label">공연 날짜</label>
                <input className="form-input" type="date" value={newEvent.date} onChange={e=>setNewEvent({...newEvent, date:e.target.value})} />
              </div>
              <div>
                <label className="form-label">공연 시간</label>
                <input className="form-input" type="time" value={newEvent.time} onChange={e=>setNewEvent({...newEvent, time:e.target.value})} />
              </div>
            </div>
            <div className="form-group">
              <label className="form-label">예매 링크 (네이버 예약 등)</label>
              <input className="form-input" placeholder="https://naver.me/..." value={newEvent.link} onChange={e=>setNewEvent({...newEvent, link:e.target.value})} />
            </div>
            <div className="modal-footer">
              <button className="btn-sm btn-outline-sm" style={{padding:'9px 18px', borderRadius:10}} onClick={()=>setShowNewEvent(false)}>취소</button>
              <button className="btn-main" onClick={handleAddEvent}>이벤트 등록</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

function App() {
  const [screen, setScreen] = useState('main');
  return (
    <div style={{width:'100%', minHeight:'100vh', display:'flex', flexDirection:'column', background:'#FFF8EE', fontFamily:"'Pretendard', -apple-system, sans-serif", color:'#1C1308'}}>
      <GlobalNav screen={screen} setScreen={setScreen} />
      <main style={{flex:1, width:'100%'}}>
        {screen === 'main'          && <DashboardScreen />}
        {screen === 'artist-mgmt'   && <ArtistMgmtScreen />}
        {screen === 'abuse-members' && <AbuseMembersScreen />}
        {screen === 'season-events' && <SeasonEventsScreen />}
      </main>
      <footer className="footer">
        <div className="footer-inner">
          <span>BE THE CHAMP OPS Dashboard — 운영 분석 구현 데모</span>
          <span>Node.js · Express · PostgreSQL · Redis · React 18</span>
        </div>
      </footer>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
