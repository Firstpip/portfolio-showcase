<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>파인아트 프린팅 주문 자동화 시스템 — 맞춤 구현 데모</title>
<link rel="preconnect" href="https://cdn.jsdelivr.net"/>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css"/>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.2.0/tabler-icons.min.css"/>
<script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --primary:#2C2C2C;--secondary:#6B5B45;--accent:#D4A853;
  --bg:#FBF7F0;--surface:#F3EDE3;--border:#DDD5C5;
  --text:#1A1A1A;--text-muted:#6B6058;
  --radius:2px;--font:'Pretendard Variable',Pretendard,sans-serif;
}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
/* NAV */
.nav{position:fixed;top:0;left:0;right:0;z-index:100;background:rgba(251,247,240,0.96);backdrop-filter:blur(12px);border-bottom:1px solid var(--border)}
.nav-inner{max-width:1280px;margin:0 auto;padding:0 32px;display:flex;align-items:center;height:64px;gap:40px}
.logo{font-size:15px;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;color:var(--primary)}
.logo span{color:var(--accent)}
.nav-links{display:flex;gap:28px;flex:1}
.nav-links button{background:none;border:none;font-family:var(--font);font-size:12px;letter-spacing:0.1em;text-transform:uppercase;color:var(--text-muted);cursor:pointer;padding:4px 0;position:relative;transition:color 0.2s}
.nav-links button:hover,.nav-links button.active{color:var(--primary)}
.nav-links button.active::after{content:'';position:absolute;bottom:-2px;left:0;right:0;height:1px;background:var(--accent)}
.nav-actions{display:flex;gap:12px;align-items:center}
.btn{font-family:var(--font);font-size:12px;letter-spacing:0.08em;text-transform:uppercase;cursor:pointer;border-radius:var(--radius);transition:all 0.2s;display:inline-flex;align-items:center;gap:6px}
.btn-outline{background:none;border:1px solid var(--primary);color:var(--primary);padding:8px 16px}
.btn-outline:hover{background:var(--primary);color:#fff}
.btn-primary{background:var(--primary);border:1px solid var(--primary);color:#fff;padding:8px 20px}
.btn-primary:hover{background:var(--secondary);border-color:var(--secondary)}
.btn-accent{background:var(--accent);border:1px solid var(--accent);color:#fff;padding:10px 24px;font-size:13px}
.btn-accent:hover{background:#c49740;border-color:#c49740}
/* SCREEN */
.screen{display:none;padding-top:64px;min-height:100vh}
.screen.active{display:block}
/* HERO */
.hero{display:grid;grid-template-columns:1fr 1fr;min-height:calc(100vh - 64px)}
.hero-left{display:flex;flex-direction:column;justify-content:center;padding:80px 64px;border-right:1px solid var(--border)}
.hero-eyebrow{font-size:10px;letter-spacing:0.2em;text-transform:uppercase;color:var(--accent);margin-bottom:20px}
.hero-title{font-size:clamp(36px,4vw,56px);font-weight:300;line-height:1.1;letter-spacing:-0.02em;color:var(--primary);margin-bottom:24px}
.hero-title strong{font-weight:700}
.hero-desc{font-size:15px;line-height:1.7;color:var(--text-muted);max-width:460px;margin-bottom:40px}
.hero-cta{display:flex;gap:12px;align-items:center}
.hero-note{font-size:11px;color:var(--text-muted);letter-spacing:0.05em}
.hero-right{position:relative;overflow:hidden;background:#1A1714}
.hero-gallery{display:grid;grid-template-columns:1fr 1fr;height:100%;gap:1px;background:var(--border)}
.gallery-cell{background:#2C2622;display:flex;align-items:center;justify-content:center;overflow:hidden;position:relative}
.gallery-cell img-placeholder{width:100%;height:100%;object-fit:cover}
.art-block{width:100%;height:100%;position:relative}
.art-block::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,#3a2e22 0%,#1a1410 100%)}
.art-text{position:absolute;bottom:20px;left:20px;right:20px;z-index:1}
.art-text .art-title{font-size:11px;letter-spacing:0.15em;text-transform:uppercase;color:var(--accent);margin-bottom:4px}
.art-text .art-sub{font-size:10px;color:rgba(240,232,208,0.5);letter-spacing:0.08em}
.canvas-art{width:100%;height:100%;background:linear-gradient(160deg,#4A3728 0%,#2C1E12 60%,#1A1008 100%)}
.canvas-art-2{background:linear-gradient(160deg,#1C2B3A 0%,#0E1B26 60%,#060E14 100%)}
.canvas-art-3{background:linear-gradient(160deg,#2E1A1A 0%,#1A0E0E 60%,#100808 100%)}
.canvas-art-4{background:linear-gradient(160deg,#1A2E1A 0%,#0E1A0E 60%,#081008 100%)}
/* STATS */
.stats-bar{background:var(--primary);padding:20px 0}
.stats-inner{max-width:1280px;margin:0 auto;padding:0 64px;display:grid;grid-template-columns:repeat(4,1fr);gap:40px}
.stat-item{text-align:center}
.stat-num{font-size:28px;font-weight:700;color:var(--accent);letter-spacing:-0.02em}
.stat-label{font-size:10px;letter-spacing:0.15em;text-transform:uppercase;color:rgba(240,232,208,0.6);margin-top:4px}
/* SECTION */
.section{max-width:1280px;margin:0 auto;padding:80px 64px}
.section-header{display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:48px;border-bottom:1px solid var(--border);padding-bottom:24px}
.section-eyebrow{font-size:10px;letter-spacing:0.2em;text-transform:uppercase;color:var(--accent);margin-bottom:8px}
.section-title{font-size:28px;font-weight:300;color:var(--primary)}
.section-title strong{font-weight:700}
/* FUNNEL */
.funnel-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:1px;background:var(--border);border:1px solid var(--border)}
.funnel-step{background:var(--bg);padding:28px 20px;position:relative;transition:background 0.2s}
.funnel-step:hover{background:var(--surface)}
.funnel-step.active{background:var(--primary)}
.funnel-step.active .step-num,.funnel-step.active .step-name,.funnel-step.active .step-desc{color:#F0E8D0}
.funnel-step.active .step-num{color:var(--accent)}
.step-num{font-size:11px;letter-spacing:0.15em;text-transform:uppercase;color:var(--accent);margin-bottom:12px;font-weight:600}
.step-name{font-size:14px;font-weight:600;color:var(--primary);margin-bottom:8px;line-height:1.3}
.step-desc{font-size:12px;color:var(--text-muted);line-height:1.5}
/* ORDER DETAIL */
.order-detail{display:grid;grid-template-columns:3fr 2fr;gap:32px;margin-top:48px}
.upload-zone{border:1px dashed var(--border);border-radius:var(--radius);padding:48px;text-align:center;background:var(--surface);transition:border-color 0.2s;cursor:pointer}
.upload-zone:hover{border-color:var(--accent)}
.upload-icon{width:56px;height:56px;background:var(--border);border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 16px;color:var(--secondary);font-size:24px}
.upload-title{font-size:14px;font-weight:600;color:var(--primary);margin-bottom:6px}
.upload-hint{font-size:12px;color:var(--text-muted)}
.format-tags{display:flex;gap:8px;justify-content:center;margin-top:16px}
.tag{display:inline-flex;align-items:center;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);padding:4px 10px;font-size:10px;letter-spacing:0.1em;text-transform:uppercase;color:var(--text-muted)}
.options-panel{background:var(--surface);border:1px solid var(--border);padding:28px;border-radius:var(--radius)}
.options-title{font-size:13px;font-weight:600;color:var(--primary);margin-bottom:20px;letter-spacing:0.05em;text-transform:uppercase}
.option-row{margin-bottom:16px}
.option-label{font-size:11px;letter-spacing:0.1em;text-transform:uppercase;color:var(--text-muted);margin-bottom:6px}
.option-select{width:100%;padding:10px 12px;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);font-family:var(--font);font-size:13px;color:var(--primary);appearance:none;cursor:pointer}
.size-inputs{display:grid;grid-template-columns:1fr auto 1fr;gap:8px;align-items:center}
.size-input{width:100%;padding:10px 12px;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);font-family:var(--font);font-size:13px;color:var(--primary);text-align:center}
.size-sep{font-size:12px;color:var(--text-muted);text-align:center}
/* CANVAS PREVIEW */
.preview-panel{background:var(--primary);padding:28px;border-radius:var(--radius)}
.preview-label{font-size:10px;letter-spacing:0.15em;text-transform:uppercase;color:rgba(240,232,208,0.5);margin-bottom:16px}
.canvas-wrap{width:100%;aspect-ratio:1;display:flex;align-items:center;justify-content:center;background:#1A1714;border-radius:var(--radius);overflow:hidden}
/* QUOTE */
.quote-panel{background:var(--surface);border:1px solid var(--border)}
.quote-header{padding:20px 24px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.quote-title{font-size:13px;font-weight:600;color:var(--primary);text-transform:uppercase;letter-spacing:0.05em}
.quote-badge{background:var(--accent);color:#fff;font-size:10px;letter-spacing:0.1em;text-transform:uppercase;padding:3px 8px;border-radius:var(--radius)}
.quote-rows{padding:20px 24px}
.quote-row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--border);font-size:13px}
.quote-row:last-child{border-bottom:none}
.quote-row.total{font-weight:700;font-size:15px;color:var(--primary)}
.quote-row.total .price{color:var(--accent)}
.q-label{color:var(--text-muted)}
.price{color:var(--primary)}
/* QUOTE SCREEN */
.quote-screen{max-width:1280px;margin:0 auto;padding:80px 64px}
.quote-hero{text-align:center;margin-bottom:64px}
.quote-hero .eyebrow{font-size:10px;letter-spacing:0.2em;text-transform:uppercase;color:var(--accent);margin-bottom:12px}
.quote-hero h2{font-size:40px;font-weight:300;color:var(--primary);margin-bottom:16px}
.quote-hero h2 strong{font-weight:700}
.quote-hero p{font-size:15px;color:var(--text-muted)}
.quote-layout{display:grid;grid-template-columns:2fr 1fr;gap:40px}
.spec-table{border:1px solid var(--border);border-radius:var(--radius);overflow:hidden}
.spec-thead{background:var(--primary);padding:16px 24px;display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:16px}
.spec-th{font-size:10px;letter-spacing:0.12em;text-transform:uppercase;color:rgba(240,232,208,0.6)}
.spec-row{padding:16px 24px;display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:16px;border-bottom:1px solid var(--border);background:var(--bg);transition:background 0.15s}
.spec-row:hover{background:var(--surface)}
.spec-row:last-child{border-bottom:none}
.spec-cell{font-size:13px;color:var(--text)}
.spec-cell.label{font-weight:600;color:var(--primary)}
.spec-cell.price{color:var(--accent);font-weight:600}
.final-quote{background:var(--primary);padding:28px;border-radius:var(--radius)}
.fq-label{font-size:10px;letter-spacing:0.15em;text-transform:uppercase;color:rgba(240,232,208,0.5);margin-bottom:8px}
.fq-amount{font-size:36px;font-weight:700;color:var(--accent);letter-spacing:-0.02em;margin-bottom:4px}
.fq-note{font-size:12px;color:rgba(240,232,208,0.6);margin-bottom:24px}
.fq-breakdown{margin-bottom:24px}
.fq-row{display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid rgba(255,255,255,0.08);font-size:13px}
.fq-row:last-child{border-bottom:none}
.fq-key{color:rgba(240,232,208,0.6)}
.fq-val{color:#F0E8D0;font-weight:500}
.fq-val.accent{color:var(--accent)}
.debounce-indicator{display:flex;align-items:center;gap:8px;background:rgba(212,168,83,0.1);border:1px solid rgba(212,168,83,0.3);border-radius:var(--radius);padding:8px 12px;margin-bottom:16px;font-size:11px;color:var(--accent)}
.pulse{width:8px;height:8px;background:var(--accent);border-radius:50%;animation:pulse 1.5s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:0.5;transform:scale(0.8)}}
/* UPLOAD SCREEN */
.upload-screen{max-width:1280px;margin:0 auto;padding:80px 64px}
.upload-layout{display:grid;grid-template-columns:3fr 2fr;gap:40px;margin-top:48px}
.upload-main .upload-zone-lg{border:2px dashed var(--border);padding:64px;text-align:center;background:var(--surface);cursor:pointer;transition:all 0.2s;border-radius:var(--radius)}
.upload-main .upload-zone-lg:hover{border-color:var(--accent);background:#F9F3E8}
.upload-icon-lg{width:72px;height:72px;background:var(--border);border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 20px;font-size:32px;color:var(--secondary)}
.upload-zone-title{font-size:18px;font-weight:500;color:var(--primary);margin-bottom:8px}
.upload-zone-hint{font-size:13px;color:var(--text-muted);margin-bottom:20px;line-height:1.6}
.format-grid{display:flex;gap:8px;justify-content:center;flex-wrap:wrap}
.validation-panel{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden}
.validation-header{padding:16px 20px;border-bottom:1px solid var(--border);background:var(--primary)}
.validation-header-title{font-size:12px;letter-spacing:0.12em;text-transform:uppercase;color:#F0E8D0}
.validation-list{padding:20px}
.validation-item{display:flex;align-items:flex-start;gap:12px;padding:14px 0;border-bottom:1px solid var(--border)}
.validation-item:last-child{border-bottom:none}
.vi-icon{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.vi-icon.pass{background:#E8F5E9;color:#2E7D32}
.vi-icon.fail{background:#FBE9E7;color:#C62828}
.vi-icon.warn{background:#FFF8E1;color:#F57F17}
.vi-icon.pending{background:var(--border);color:var(--text-muted)}
.vi-content .vi-title{font-size:13px;font-weight:600;color:var(--primary);margin-bottom:3px}
.vi-content .vi-desc{font-size:12px;color:var(--text-muted);line-height:1.5}
.recent-uploads{margin-top:32px}
.recent-title{font-size:12px;letter-spacing:0.12em;text-transform:uppercase;color:var(--text-muted);margin-bottom:16px}
.recent-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
.recent-card{border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;cursor:pointer;transition:border-color 0.2s}
.recent-card:hover{border-color:var(--accent)}
.recent-thumb{height:80px;display:flex;align-items:center;justify-content:center;font-size:24px}
.recent-info{padding:10px;background:var(--bg)}
.recent-name{font-size:11px;font-weight:600;color:var(--primary);margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.recent-meta{font-size:10px;color:var(--text-muted)}
/* B2B SCREEN */
.b2b-screen{max-width:1280px;margin:0 auto;padding:80px 64px}
.b2b-hero{display:grid;grid-template-columns:1fr 1fr;gap:64px;align-items:center;margin-bottom:72px;padding-bottom:72px;border-bottom:1px solid var(--border)}
.b2b-left .eyebrow{font-size:10px;letter-spacing:0.2em;text-transform:uppercase;color:var(--accent);margin-bottom:16px}
.b2b-left h2{font-size:40px;font-weight:300;color:var(--primary);margin-bottom:20px;line-height:1.15}
.b2b-left h2 strong{font-weight:700}
.b2b-left p{font-size:15px;color:var(--text-muted);line-height:1.7;margin-bottom:28px}
.grade-cards{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
.grade-card{border:1px solid var(--border);border-radius:var(--radius);padding:20px;background:var(--bg);text-align:center;transition:all 0.2s}
.grade-card:hover{border-color:var(--accent)}
.grade-card.gold{border-color:var(--accent);background:linear-gradient(135deg,#FBF7F0 0%,#F9F0DC 100%)}
.grade-icon{font-size:28px;margin-bottom:10px}
.grade-name{font-size:12px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:var(--primary);margin-bottom:6px}
.grade-discount{font-size:22px;font-weight:700;color:var(--accent)}
.grade-note{font-size:11px;color:var(--text-muted);margin-top:4px}
.b2b-form{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden}
.b2b-form-header{padding:24px 28px;border-bottom:1px solid var(--border);background:var(--primary)}
.b2b-form-title{font-size:14px;font-weight:600;color:#F0E8D0;letter-spacing:0.05em}
.b2b-form-sub{font-size:12px;color:rgba(240,232,208,0.6);margin-top:4px}
.b2b-form-body{padding:28px}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px}
.form-field{display:flex;flex-direction:column;gap:6px}
.form-field.full{grid-column:1/-1}
.field-label{font-size:11px;letter-spacing:0.1em;text-transform:uppercase;color:var(--text-muted)}
.field-input{padding:12px 14px;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);font-family:var(--font);font-size:13px;color:var(--primary);transition:border-color 0.2s}
.field-input:focus{outline:none;border-color:var(--accent)}
.field-textarea{resize:vertical;min-height:100px;line-height:1.6}
.field-select{appearance:none;cursor:pointer}
.b2b-features{display:grid;grid-template-columns:repeat(3,1fr);gap:24px;margin-top:72px}
.b2b-feature{border-left:2px solid var(--accent);padding:0 0 0 20px}
.bf-title{font-size:14px;font-weight:600;color:var(--primary);margin-bottom:8px}
.bf-desc{font-size:13px;color:var(--text-muted);line-height:1.6}
/* CANVAS DEMO */
.canvas-demo-wrap{margin-top:24px;text-align:center}
.canvas-demo-wrap canvas{border-radius:var(--radius);box-shadow:0 0 0 1px var(--border)}
.canvas-label{font-size:10px;letter-spacing:0.1em;text-transform:uppercase;color:var(--text-muted);margin-top:12px}
/* TECH BADGE */
.tech-bar{border-top:1px solid var(--border);padding:48px 64px;background:var(--surface)}
.tech-bar-inner{max-width:1280px;margin:0 auto}
.tech-bar-title{font-size:10px;letter-spacing:0.15em;text-transform:uppercase;color:var(--text-muted);margin-bottom:20px}
.tech-tags{display:flex;flex-wrap:wrap;gap:10px}
.tech-tag{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);padding:6px 14px;font-size:11px;color:var(--text-muted);letter-spacing:0.06em}
.tech-tag.highlight{border-color:var(--accent);color:var(--accent);background:rgba(212,168,83,0.06)}
/* ANIMATIONS */
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
.fade-up{animation:fadeUp 0.5s ease both}
.shimmer-bar{background:linear-gradient(90deg,var(--border) 25%,rgba(212,168,83,0.2) 50%,var(--border) 75%);background-size:200% 100%;animation:shimmer 1.8s linear infinite;border-radius:2px;height:3px}
.shimmer-text{background:linear-gradient(90deg,var(--surface) 25%,rgba(212,168,83,0.15) 50%,var(--surface) 75%);background-size:200% 100%;animation:shimmer 1.8s linear infinite;border-radius:2px;color:transparent;display:inline-block}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState, useRef, useEffect} = React;

// ── 더미 데이터 ──
const STEPS = [
  {num:'01', name:'파일 업로드', desc:'JPG·PNG·TIFF 원본 업로드 및 파일 형식 검증'},
  {num:'02', name:'해상도 검토', desc:'DPI·색상 프로파일 자동 분석 및 인쇄 적합성 판별'},
  {num:'03', name:'옵션 선택', desc:'지류·크기·여백·액자·매트·유리 옵션 다중 구성'},
  {num:'04', name:'미리보기', desc:'Canvas 기반 실시간 2D 뷰어로 작품 배치 확인'},
  {num:'05', name:'1차 견적', desc:'MySQL 단가 매핑 기반 실시간 견적 자동 산출'},
  {num:'06', name:'쿠폰 적용', desc:'회원 등급별 자동 할인 + 쿠폰 코드 실시간 차감'},

// ── Canvas 프리뷰 드로어 ──
function ArtCanvas({width=280, height=200, material='캔버스', frameColor='월넛', matColor='아이보리'}){
  const ref = useRef(null);
  useEffect(()=>{
    const c = ref.current; if(!c) return;
    const ctx = c.getContext('2d');
    ctx.clearRect(0,0,width,height);
    // 배경
    ctx.fillStyle='#1A1714';
    ctx.fillRect(0,0,width,height);
    // 액자
    const fw=14, fx=20, fy=16, fw2=width-40, fh2=height-32;
    ctx.strokeStyle=frameColor==='월넛'?'#5C3D2E':'#2C2C2C';
    ctx.lineWidth=fw;
    ctx.strokeRect(fx+fw/2,fy+fw/2,fw2-fw,fh2-fw);
    // 매트
    if(matColor!=='없음'){
      ctx.fillStyle='#F5F0E8';
      ctx.fillRect(fx+fw,fy+fw,fw2-fw*2,fh2-fw*2);
    }
    // 작품 영역
    const ax=fx+fw+12, ay=fy+fw+12, aw=fw2-fw*2-24, ah=fh2-fw*2-24;
    const grad=ctx.createLinearGradient(ax,ay,ax+aw,ay+ah);
    grad.addColorStop(0,'#4A3525');
    grad.addColorStop(0.3,'#2A1F15');
    grad.addColorStop(0.6,'#3D2E1E');
    grad.addColorStop(1,'#1A1208');
    ctx.fillStyle=grad;
    ctx.fillRect(ax,ay,aw,ah);
    // 장식 라인
    ctx.strokeStyle='rgba(212,168,83,0.4)';
    ctx.lineWidth=0.5;
    ctx.strokeRect(ax+8,ay+8,aw-16,ah-16);
    // 텍스트
    ctx.fillStyle='rgba(212,168,83,0.7)';
    ctx.font='bold 9px Pretendard Variable, sans-serif';
    ctx.textAlign='center';
    ctx.fillText(material, ax+aw/2, ay+ah/2-6);
    ctx.fillStyle='rgba(240,232,208,0.4)';
    ctx.font='8px Pretendard Variable, sans-serif';
    ctx.fillText('60 × 80 cm', ax+aw/2, ay+ah/2+10);
  }, [material, frameColor, matColor]);
  return <canvas ref={ref} width={width} height={height} style={{borderRadius:'2px'}}/>;
}

                  <div key={g.grade} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'8px 0',borderBottom:'1px solid var(--border)',fontSize:'13px'}}>
                    <span style={{color:'var(--text-muted)'}}>{g.grade} 회원</span>
                    <span style={{color:'var(--accent)',fontWeight:700}}>{g.pct}</span>
                    <code style={{fontSize:'11px',background:'var(--border)',padding:'2px 8px',borderRadius:'2px',color:'var(--secondary)'}}>{g.code}</code>
                  </div>
                ))}
              </div>
            </div>
          </div>
        </div>
      </div>

      {/* ══ UPLOAD SCREEN ══ */}
      <div className={`screen ${screen==='upload'?'active':''}`}>
        <div className="upload-screen">
          <div>
            <div className="section-eyebrow">Step 01 — File Upload</div>
            <div className="section-title" style={{fontSize:'36px',marginBottom:'8px',fontWeight:300}}>파일 <strong>업로드</strong> 및 해상도 검증</div>
            <p style={{fontSize:'15px',color:'var(--text-muted)',lineHeight:'1.7',maxWidth:'560px',marginBottom:'8px'}}>
              PHP 기반 이미지 검증 엔진이 업로드 즉시 DPI·색상 프로파일을 분석하여 인쇄 품질 기준을 자동으로 판별합니다.
            </p>
          </div>
          <div className="upload-layout">
            <div className="upload-main">
              <div className="upload-zone-lg">
                <div className="upload-icon-lg"><i className="ti ti-cloud-upload"></i></div>
                <div className="upload-zone-title">파일을 드래그하거나 클릭하여 업로드</div>
                <div className="upload-zone-hint">
                  JPG · PNG · TIFF 원본 파일을 업로드해 주세요<br/>
                  인쇄 권장 해상도: 최소 150 DPI 이상 (300 DPI 권장)
                </div>
                <div className="format-grid">
                  <span className="tag">.jpg</span><span className="tag">.png</span><span className="tag">.tiff</span><span className="tag">최대 200MB</span>
                </div>
                <button className="btn btn-accent" style={{margin:'20px auto 0',display:'flex',padding:'12px 28px'}}>
                  <i className="ti ti-folder-open"></i>&nbsp; 파일 선택
                </button>
              </div>
              <div className="recent-uploads">
                <div className="recent-title"><i className="ti ti-history"></i>&nbsp; 최근 업로드 파일</div>
                <div className="recent-grid">
                  {RECENT_FILES.map((f,i)=>(
                    <div key={i} className="recent-card">
                      <div className="recent-thumb" style={{background:i%2===0?'#2C2C2C':'#3A2E22'}}>{f.thumb}</div>
                      <div className="recent-info">
                        <div className="recent-name">{f.name}</div>
                        <div className="recent-meta">{f.size} · {f.dpi}</div>
                        <div style={{marginTop:'4px',fontSize:'10px',fontWeight:700,color:f.status==='pass'?'#2E7D32':f.status==='warn'?'#F57F17':'#C62828',letterSpacing:'0.08em',textTransform:'uppercase'}}>{f.status==='pass'?'검증 통과':f.status==='warn'?'주의 필요':'검증 실패'}</div>
                      </div>
                    </div>
                  ))}
                </div>
              </div>
            </div>
            <div>
              <div className="validation-panel">
                <div className="validation-header">
                  <div className="validation-header-title"><i className="ti ti-shield-check" style={{color:'var(--accent)'}}></i>&nbsp; 인쇄 적합성 자동 검증</div>
                </div>
                <div className="validation-list">
                  {VALIDATIONS.map((v,i)=>(
                    <div key={i} className="validation-item">
                      <div className={`vi-icon ${v.status}`}>{v.icon}</div>
                      <div className="vi-content">
                        <div className="vi-title">{v.title}</div>
                        <div className="vi-desc">{v.desc}</div>
                      </div>
                    </div>
                  ))}
                </div>
              </div>
              <div style={{marginTop:'16px',padding:'20px',background:'rgba(212,168,83,0.08)',border:'1px solid rgba(212,168,83,0.3)',borderRadius:'2px'}}>
                <div style={{fontSize:'12px',fontWeight:700,color:'var(--accent)',letterSpacing:'0.1em',textTransform:'uppercase',marginBottom:'8px'}}>
                  <i className="ti ti-info-circle"></i>&nbsp; 검증 엔진 구현 방식
                </div>
                <p style={{fontSize:'12px',color:'var(--text-muted)',lineHeight:'1.6'}}>
                  PHP exif_read_data + getimagesize로 업로드 즉시 DPI·색공간 메타를 추출하고, TIFF 멀티레이어는 레이어 수·압축 방식을 사전 필터링하여 인쇄 가능 여부를 판별하는 구조를 설계합니다.
                </p>
              </div>
              <button className="btn btn-primary" style={{width:'100%',justifyContent:'center',padding:'14px',marginTop:'16px'}} onClick={()=>setScreen('main')}>
                <i className="ti ti-arrow-right"></i>&nbsp; 다음 단계로 (옵션 선택)
              </button>
            </div>
          </div>
        </div>
      </div>

      {/* ══ ORDER CONFIGURATOR SCREEN ══ */}
      <div className={`screen ${screen==='order'?'active':''}`}>
        <div className="section" style={{paddingTop:'80px'}}>
          <div className="section-header">
            <div>
              <div className="section-eyebrow">Order Configuration</div>
              <div className="section-title"><strong>주문 구성하기</strong> — 10단계 자동화 퍼널</div>
            </div>
            <button className="btn btn-primary" onClick={()=>setScreen('upload')}>
              <i className="ti ti-cloud-upload"></i>&nbsp;파일 업로드 시작
            </button>
          </div>
          <div style={{marginBottom:'32px'}}>
            <div className="shimmer-bar" style={{width:'100%',marginBottom:'8px'}}></div>
            <div style={{display:'flex',gap:'8px',alignItems:'center',fontSize:'12px',color:'var(--text-muted)',letterSpacing:'0.08em'}}>
              <div className="pulse"></div>
              단계를 클릭하여 각 단계 상세를 확인하세요
            </div>
          </div>
          <div className="funnel-grid">
            {STEPS.map((s,i)=>(
              <div key={i} className={`funnel-step${activeStep===i?' active':''}`} onClick={()=>setActiveStep(i)} style={{cursor:'pointer'}}>
                <div className="step-num">Step {s.num}</div>
                <div className="step-name">{s.name}</div>
                <div className="step-desc">{s.desc}</div>
              </div>
            ))}
          </div>
          <div className="order-detail" style={{marginTop:'48px'}}>
            <div>
              <div className="options-panel">
                <div className="options-title"><i className="ti ti-adjustments-horizontal"></i>&nbsp;인쇄 옵션 구성</div>
                <div className="option-row">
                  <div className="option-label">지류 종류</div>
                  <select className="option-select" value={material} onChange={handleOptionChange(setMaterial)}>
                    <option>파인아트 캔버스 (400g)</option>
                    <option>크롬코팅 아트지 (200g)</option>
                    <option>바리타 페이퍼 (290g)</option>
                    <option>플렉시블 캔버스</option>
                  </select>
                </div>
                <div className="option-row">
                  <div className="option-label">출력 크기 (cm)</div>
                  <div className="size-inputs">
                    <input type="number" className="size-input" defaultValue="60" min="10" max="200"/>
                    <div className="size-sep">×</div>
                    <input type="number" className="size-input" defaultValue="80" min="10" max="200"/>
                  </div>
                </div>
                <div className="option-row">
                  <div className="option-label">액자 몰딩</div>
                  <select className="option-select" value={frame} onChange={handleOptionChange(setFrame)}>
                    <option>월넛</option>
                    <option>블랙 알루미늄</option>
                    <option>화이트 MDF</option>
                    <option>없음</option>
                  </select>
                </div>
                <div className="option-row">
                  <div className="option-label">매트 컬러</div>
                  <select className="option-select" value={mat} onChange={handleOptionChange(setMat)}>
                    <option>아이보리</option>
                    <option>화이트</option>
                    <option>블랙</option>
                    <option>없음</option>
                  </select>
                </div>
                <div className="option-row">
                  <div className="option-label">쿠폰 코드</div>
                  <input className="option-select" placeholder="GOLD15 / SILVER10 / BRONZE5" value={coupon} onChange={e=>setCoupon(e.target.value)} style={{fontFamily:'var(--font)'}}/>
                </div>
              </div>
              <div className="quote-panel" style={{marginTop:'16px'}}>
                <div className="quote-header">
                  <div className="quote-title">실시간 견적</div>
                  <div className="quote-badge">{quoteUpdating?'계산 중…':'확정'}</div>
                </div>
                <div className="quote-rows">
                  <div className="quote-row"><span className="q-label">인쇄비</span><span className="price">{priceRaw.toLocaleString()}원</span></div>
                  {discountRate>0&&<div className="quote-row" style={{color:'#2E7D32'}}><span className="q-label">쿠폰 할인 ({(discountRate*100).toFixed(0)}%)</span><span>-{priceDisc.toLocaleString()}원</span></div>}
                  <div className="quote-row"><span className="q-label">배송비</span><span className="price">{priceDelivery.toLocaleString()}원</span></div>
                  <div className="quote-row total"><span>합계</span><span className="price">{priceTotal.toLocaleString()}원</span></div>
                </div>
              </div>
            </div>
            <div>
              <div className="preview-panel">
                <div className="preview-label">Canvas 2D 실시간 미리보기</div>
                <div className="canvas-wrap">
                  <ArtCanvas material={material} frameColor={frame} matColor={mat}/>
                </div>
                <p style={{fontSize:'11px',color:'rgba(240,232,208,0.5)',marginTop:'12px',textAlign:'center',lineHeight:'1.5'}}>
                  HTML5 Canvas API 기반 클라이언트 사이드 렌더링<br/>API 호출 없이 즉각적인 옵션 시각화를 구현합니다
                </p>
              </div>
              <div style={{marginTop:'16px',padding:'16px 20px',background:'var(--surface)',border:'1px solid var(--border)',borderRadius:'var(--radius)'}}>
                <div style={{fontSize:'11px',letterSpacing:'0.1em',textTransform:'uppercase',color:'var(--accent)',marginBottom:'8px',fontWeight:600}}>
                  Step {STEPS[activeStep].num} — {STEPS[activeStep].name}
                </div>
                <p style={{fontSize:'13px',color:'var(--text-muted)',lineHeight:'1.6'}}>{STEPS[activeStep].desc}</p>
              </div>
            </div>
          </div>
        </div>
      </div>

      {/* ══ B2B SCREEN ══ */}
      <div className={`screen ${screen==='b2b'?'active':''}`}>
        <div className="b2b-screen">
          <div className="b2b-hero">
            <div className="b2b-left">
              <div className="eyebrow">B2B Partner Program</div>
              <h2>기업·갤러리·작가를 위한<br/><strong>전용 견적 시스템</strong></h2>
              <p>
                대량 인쇄 발주, 갤러리 납품, 드랍쉬핑 파트너십을 위한 전용 B2B 계정을 제공합니다.
                견적 요청 폼 제출 시 PHP가 PDF 견적서를 자동 생성하여 Google Drive로 전달합니다.
              </p>
              <div className="grade-cards">
                <div className="grade-card">
                  <div className="grade-icon">🥉</div>
                  <div className="grade-name">브론즈</div>
                  <div className="grade-discount">5%</div>
                  <div className="grade-note">신규 파트너</div>
                </div>
                <div className="grade-card">
                  <div className="grade-icon">🥈</div>
                  <div className="grade-name">실버</div>
                  <div className="grade-discount">10%</div>
                  <div className="grade-note">기존 파트너</div>
                </div>
                <div className="grade-card gold">
                  <div className="grade-icon">🥇</div>
                  <div className="grade-name">골드</div>
                  <div className="grade-discount">15%</div>
                  <div className="grade-note">프리미엄 파트너</div>
                </div>
              </div>
            </div>
            <div>
              <div className="b2b-form">
                <div className="b2b-form-header">
                  <div className="b2b-form-title">B2B 견적 요청 폼</div>
                  <div className="b2b-form-sub">제출 즉시 PDF 견적서를 Google Drive로 전달합니다</div>
                </div>
                <div className="b2b-form-body">
                  <div className="form-grid">
                    <div className="form-field">
                      <div className="field-label">담당자 이름</div>
                      <input className="field-input" placeholder="홍길동"/>
                    </div>
                    <div className="form-field">
                      <div className="field-label">회사/기관명</div>
                      <input className="field-input" placeholder="갤러리 이름 또는 기업명"/>
                    </div>
                    <div className="form-field">
                      <div className="field-label">이메일</div>
                      <input className="field-input" placeholder="example@gallery.kr"/>
                    </div>
                    <div className="form-field">
                      <div className="field-label">연락처</div>
                      <input className="field-input" placeholder="010-0000-0000"/>
                    </div>
                    <div className="form-field">
                      <div className="field-label">계정 유형</div>
                      <select className="field-input field-select">
                        <option>PRO 작가 계정</option>
                        <option>드랍쉬핑 파트너</option>
                        <option>B2B 프로젝트 (후불제)</option>
                      </select>
                    </div>
                    <div className="form-field">
                      <div className="field-label">예상 월 주문량</div>
                      <select className="field-input field-select">
                        <option>10~50점</option>
                        <option>50~200점</option>
                        <option>200점 이상</option>
                      </select>
                    </div>
                    <div className="form-field full">
                      <div className="field-label">주요 납품 대상 및 요구사항</div>
                      <textarea className="field-input field-textarea" placeholder="갤러리 납품, 대량 인쇄 사양, 특수 요청 사항 등을 자유롭게 기재해 주세요"/>
                    </div>
                  </div>
                  <button className="btn btn-accent" style={{width:'100%',justifyContent:'center',padding:'14px',fontSize:'14px'}}>
                    <i className="ti ti-send"></i>&nbsp; 견적 요청 제출 (PDF 자동 생성)
                  </button>
                </div>
              </div>
            </div>
          </div>
          <div className="b2b-features">
            <div className="b2b-feature">
              <div className="bf-title">PDF 견적서 자동 발행</div>
              <div className="bf-desc">B2B 견적 폼 제출과 동시에 PHP가 PDF를 생성하고 Google Drive API v3로 파트너 공유 폴더에 자동 업로드하는 파이프라인을 설계합니다.</div>
            </div>
            <div className="b2b-feature">
              <div className="bf-title">다국어 라우팅 지원</div>
              <div className="bf-desc">한국어·영어 URL 분리 + 콘텐츠 자동 전환 구조로 해외 갤러리·해외 작가와의 B2B 거래를 지원하는 다국어 워드프레스 구조를 구현합니다.</div>
            </div>
            <div className="b2b-feature">
              <div className="bf-title">3대 세그먼트 계정</div>
              <div className="bf-desc">PRO 작가 / 드랍쉬핑 / 프로젝트(B2B 후불) 계정으로 분리하며, 드랍쉬핑 전용 UI는 추후 확장 가능한 구조로 사전 바인딩하여 설계합니다.</div>
            </div>
          </div>
        </div>
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App/>);
</script>
</body>
</html>
