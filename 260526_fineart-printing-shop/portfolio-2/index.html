<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>파인아트 프린팅 운영 관리 플랫폼 — 구현 데모</title>
<link rel="preconnect" href="https://cdn.jsdelivr.net"/>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css"/>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
/* Phosphor icons via SVG inline — key icons */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --gold:#D4A853;--gold-dim:rgba(212,168,83,0.15);--gold-border:rgba(212,168,83,0.25);
  --bronze:#A07850;--cream:#F0E8D0;--cream-dim:rgba(240,232,208,0.6);--cream-fade:rgba(240,232,208,0.3);
  --bg:#1A1714;--surface:#252018;--surface2:#2E2820;--border:rgba(255,255,255,0.08);
  --danger:#E57373;--success:#81C784;--warn:#FFB74D;
  --radius:8px;--font:'Pretendard Variable',Pretendard,sans-serif;
}
body{font-family:var(--font);background:var(--bg);color:var(--cream);min-height:100vh;display:flex;overflow-x:hidden}
/* ── SPA LAYOUT ── */
.sidebar{width:220px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;position:fixed;top:0;left:0;bottom:0;z-index:50}
.sidebar-logo{padding:24px 20px;border-bottom:1px solid var(--border)}
.logo-main{font-size:14px;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;color:var(--cream)}
.logo-main span{color:var(--gold)}
.logo-sub{font-size:10px;color:var(--cream-fade);letter-spacing:0.08em;margin-top:3px}
.sidebar-nav{padding:16px 0;flex:1;overflow-y:auto}
.nav-section-label{font-size:9px;letter-spacing:0.18em;text-transform:uppercase;color:var(--cream-fade);padding:12px 20px 6px}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 20px;cursor:pointer;font-size:13px;color:var(--cream-dim);transition:all 0.15s;border-left:2px solid transparent;position:relative}
.nav-item:hover{color:var(--cream);background:rgba(255,255,255,0.04)}
.nav-item.active{color:var(--gold);background:var(--gold-dim);border-left-color:var(--gold)}
.nav-item .nav-icon{font-size:16px;width:20px;text-align:center}
.nav-badge{margin-left:auto;background:var(--gold);color:var(--bg);font-size:10px;font-weight:700;padding:1px 6px;border-radius:10px}
.sidebar-footer{padding:16px 20px;border-top:1px solid var(--border)}
.user-chip{display:flex;align-items:center;gap:10px}
.user-avatar{width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,var(--gold),var(--bronze));display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:var(--bg);flex-shrink:0}
.user-name{font-size:12px;font-weight:600;color:var(--cream)}
.user-role{font-size:10px;color:var(--cream-fade);margin-top:1px}
/* ── MAIN ── */
.main-area{margin-left:220px;flex:1;min-height:100vh;display:flex;flex-direction:column}
.topbar{height:56px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 28px;gap:16px;position:sticky;top:0;z-index:40}
.topbar-breadcrumb{font-size:12px;color:var(--cream-fade);letter-spacing:0.05em}
.topbar-breadcrumb span{color:var(--cream)}
.topbar-right{margin-left:auto;display:flex;align-items:center;gap:12px}
.notif-btn{width:32px;height:32px;border-radius:var(--radius);background:none;border:1px solid var(--border);cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--cream-dim);font-size:16px;position:relative;transition:all 0.15s}
.notif-btn:hover{color:var(--cream);border-color:var(--gold-border)}
.notif-dot{position:absolute;top:4px;right:4px;width:7px;height:7px;background:var(--gold);border-radius:50%;border:1.5px solid var(--surface)}
.date-chip{font-size:11px;color:var(--cream-fade);background:rgba(255,255,255,0.04);padding:5px 10px;border-radius:var(--radius);border:1px solid var(--border)}
.content{padding:28px;flex:1}
/* ── KPI CARDS ── */
.kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:24px}
.kpi-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px;position:relative;overflow:hidden;transition:border-color 0.2s}
.kpi-card:hover{border-color:var(--gold-border)}
.kpi-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--gold),var(--bronze))}
.kpi-label{font-size:10px;letter-spacing:0.14em;text-transform:uppercase;color:var(--cream-fade);margin-bottom:10px}
.kpi-value{font-size:28px;font-weight:700;color:var(--cream);letter-spacing:-0.02em;line-height:1}
.kpi-sub{font-size:11px;color:var(--cream-fade);margin-top:6px;display:flex;align-items:center;gap:4px}
.kpi-sub .up{color:var(--success)}
.kpi-sub .down{color:var(--danger)}
.kpi-icon{position:absolute;right:16px;top:16px;width:36px;height:36px;border-radius:var(--radius);background:var(--gold-dim);display:flex;align-items:center;justify-content:center;font-size:18px;color:var(--gold)}
/* ── CHART AREA ── */
.chart-grid{display:grid;grid-template-columns:2fr 1fr;gap:16px;margin-bottom:24px}
.chart-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px}
.chart-card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.chart-title{font-size:13px;font-weight:600;color:var(--cream)}
.chart-subtitle{font-size:11px;color:var(--cream-fade);margin-top:2px}
.chart-badge{background:var(--gold-dim);border:1px solid var(--gold-border);border-radius:4px;padding:3px 8px;font-size:10px;color:var(--gold);letter-spacing:0.06em}
.chart-filter{display:flex;gap:6px}
.filter-btn{background:none;border:1px solid var(--border);border-radius:4px;padding:4px 10px;font-size:10px;color:var(--cream-fade);cursor:pointer;font-family:var(--font);transition:all 0.15s;letter-spacing:0.06em}
.filter-btn.active,.filter-btn:hover{border-color:var(--gold-border);color:var(--gold);background:var(--gold-dim)}
/* ── TABLE ── */
.table-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius)}
.table-header{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px}
.table-title-text{font-size:13px;font-weight:600;color:var(--cream)}
.table-search{flex:1;max-width:240px;margin-left:auto}
.search-input{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);padding:8px 12px;font-family:var(--font);font-size:12px;color:var(--cream);transition:border-color 0.15s}
.search-input:focus{outline:none;border-color:var(--gold-border)}
.search-input::placeholder{color:var(--cream-fade)}
.table-filter-row{display:flex;gap:8px;flex-wrap:wrap;padding:12px 20px;border-bottom:1px solid var(--border)}
.filter-chip{background:none;border:1px solid var(--border);border-radius:20px;padding:4px 12px;font-size:11px;color:var(--cream-fade);cursor:pointer;font-family:var(--font);transition:all 0.15s}
.filter-chip.active,.filter-chip:hover{border-color:var(--gold);color:var(--gold);background:var(--gold-dim)}
.t-thead{display:grid;padding:10px 20px;border-bottom:1px solid var(--border)}
.t-th{font-size:10px;letter-spacing:0.12em;text-transform:uppercase;color:var(--cream-fade);font-weight:500}
.t-row{display:grid;padding:14px 20px;border-bottom:1px solid var(--border);align-items:center;cursor:pointer;transition:background 0.15s}
.t-row:last-child{border-bottom:none}
.t-row:hover{background:rgba(255,255,255,0.03)}
.t-cell{font-size:13px;color:var(--cream)}
.t-cell.muted{color:var(--cream-fade);font-size:12px}
.t-cell.gold{color:var(--gold);font-weight:600}
/* STATUS BADGE */
.badge{display:inline-flex;align-items:center;gap:4px;border-radius:20px;padding:3px 10px;font-size:10px;font-weight:600;letter-spacing:0.06em;text-transform:uppercase}
.badge.processing{background:rgba(255,183,77,0.15);color:var(--warn);border:1px solid rgba(255,183,77,0.3)}
.badge.printing{background:rgba(100,181,246,0.12);color:#64B5F6;border:1px solid rgba(100,181,246,0.25)}
.badge.shipping{background:rgba(129,199,132,0.12);color:var(--success);border:1px solid rgba(129,199,132,0.25)}
.badge.complete{background:rgba(212,168,83,0.12);color:var(--gold);border:1px solid var(--gold-border)}
.badge.pending{background:rgba(240,232,208,0.06);color:var(--cream-fade);border:1px solid var(--border)}
/* MEMBER TABLE */
.grade-label{display:inline-flex;align-items:center;gap:4px;background:var(--gold-dim);border:1px solid var(--gold-border);border-radius:4px;padding:2px 8px;font-size:10px;font-weight:700;color:var(--gold);letter-spacing:0.08em}
.grade-label.silver{background:rgba(192,192,192,0.1);border-color:rgba(192,192,192,0.3);color:#C0C0C0}
.grade-label.bronze{background:rgba(160,120,80,0.12);border-color:rgba(160,120,80,0.3);color:var(--bronze)}
/* SIMULATOR */
.simulator-wrap{display:grid;grid-template-columns:1fr 1fr;gap:24px;margin-top:0}
.sim-left{display:flex;flex-direction:column;gap:16px}
.sim-space-select{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
.space-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px;text-align:center;cursor:pointer;transition:all 0.2s}
.space-card:hover,.space-card.active{border-color:var(--gold);background:var(--gold-dim)}
.space-icon{font-size:28px;margin-bottom:8px}
.space-name{font-size:12px;font-weight:600;color:var(--cream);margin-bottom:3px}
.space-desc{font-size:10px;color:var(--cream-fade)}
.sim-viewport{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;aspect-ratio:16/9;position:relative;display:flex;align-items:center;justify-content:center}
.sim-room{width:100%;height:100%;position:relative;background:linear-gradient(180deg,#2A2520 0%,#1E1A14 60%,#151210 100%)}
.sim-wall{position:absolute;top:0;left:0;right:0;height:60%;background:linear-gradient(180deg,#2E2822 0%,#252018 100%);border-bottom:2px solid rgba(212,168,83,0.2)}
.sim-floor{position:absolute;bottom:0;left:0;right:0;height:42%;background:linear-gradient(0deg,#1A1512 0%,#221E18 100%)}
.sim-artwork{position:absolute;top:50%;left:50%;transform:translate(-50%,-60%);width:140px;height:100px;box-shadow:0 8px 40px rgba(0,0,0,0.8),0 0 0 8px #5C3D2E,0 0 0 12px rgba(92,61,46,0.5);border-radius:1px}
.sim-artwork-img{width:100%;height:100%;background:linear-gradient(135deg,#4A3525 0%,#2A1F15 50%,#1A1208 100%);display:flex;align-items:center;justify-content:center;font-size:28px}
.sim-artwork-label{position:absolute;bottom:-28px;left:50%;transform:translateX(-50%);white-space:nowrap;font-size:10px;color:var(--gold);letter-spacing:0.1em}
.sim-info{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px}
.sim-info-title{font-size:13px;font-weight:600;color:var(--cream);margin-bottom:16px;border-bottom:1px solid var(--border);padding-bottom:10px}
.sim-row{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border);font-size:12px}
.sim-row:last-child{border-bottom:none}
.sim-key{color:var(--cream-fade)}
.sim-val{color:var(--cream);font-weight:500}
.sim-val.gold{color:var(--gold)}
/* PIPELINE */
.pipeline-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px;margin-top:16px}
.pipeline-title{font-size:12px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:var(--cream-dim);margin-bottom:16px}
.pipeline-flow{display:flex;align-items:center;gap:0;overflow-x:auto;padding-bottom:4px}
.pipe-step{flex-shrink:0;display:flex;flex-direction:column;align-items:center;gap:6px;min-width:90px}
.pipe-step .ps-icon{width:40px;height:40px;border-radius:50%;border:2px solid;display:flex;align-items:center;justify-content:center;font-size:16px;background:var(--bg)}
.pipe-step.done .ps-icon{border-color:var(--success);color:var(--success)}
.pipe-step.active .ps-icon{border-color:var(--gold);color:var(--gold);animation:glow 1.5s ease-in-out infinite}
.pipe-step.waiting .ps-icon{border-color:var(--border);color:var(--cream-fade)}
.pipe-step .ps-label{font-size:10px;color:var(--cream-fade);text-align:center;letter-spacing:0.06em;line-height:1.4}
.pipe-arrow{font-size:14px;color:var(--border);margin:0 -4px;flex-shrink:0;padding-bottom:20px}
@keyframes glow{0%,100%{box-shadow:0 0 0 0 rgba(212,168,83,0.4)}50%{box-shadow:0 0 0 6px rgba(212,168,83,0)}}
/* WEBHOOK LOG */
.webhook-log{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);padding:16px;font-family:'SF Mono',Consolas,monospace;font-size:11px;max-height:160px;overflow-y:auto}
.log-line{color:var(--cream-fade);line-height:1.7;display:flex;gap:12px}
.log-line .ts{color:rgba(212,168,83,0.5);flex-shrink:0}
.log-line.ok .msg{color:var(--success)}
.log-line.warn .msg{color:var(--warn)}
.log-line.info .msg{color:#64B5F6}
/* SECTION NAV TITLE */
.page-header{margin-bottom:24px}
.page-eyebrow{font-size:10px;letter-spacing:0.18em;text-transform:uppercase;color:var(--gold);margin-bottom:6px}
.page-title{font-size:24px;font-weight:700;color:var(--cream);letter-spacing:-0.01em}
.page-desc{font-size:13px;color:var(--cream-fade);margin-top:6px;line-height:1.6}
/* STAT MINI */
.stat-mini-row{display:flex;gap:12px;margin-bottom:16px}
.stat-mini{flex:1;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);padding:14px}
.sm-val{font-size:20px;font-weight:700;color:var(--gold)}
.sm-label{font-size:10px;color:var(--cream-fade);margin-top:3px;letter-spacing:0.08em}
/* DONUT LEGEND */
.donut-legend{display:flex;flex-direction:column;gap:10px;justify-content:center}
.legend-item{display:flex;align-items:center;gap:10px;font-size:12px}
.legend-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.legend-key{color:var(--cream-dim)}
.legend-pct{color:var(--cream);font-weight:600;margin-left:auto}
/* TECH IMPL */
.impl-banner{background:linear-gradient(135deg,var(--surface) 0%,rgba(37,32,24,0.5) 100%);border:1px solid var(--gold-border);border-radius:var(--radius);padding:20px 24px;margin-top:20px}
.impl-banner-title{font-size:11px;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;color:var(--gold);margin-bottom:10px}
.impl-tags{display:flex;flex-wrap:wrap;gap:8px}
.impl-tag{background:rgba(255,255,255,0.04);border:1px solid var(--border);border-radius:4px;padding:4px 12px;font-size:11px;color:var(--cream-dim)}
/* SCROLL */
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.1);border-radius:2px}
/* ANIMATION */
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.fade-in{animation:fadeIn 0.3s ease both}
@keyframes slideUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
.stagger-item:nth-child(1){animation:slideUp 0.35s ease both 0.05s}
.stagger-item:nth-child(2){animation:slideUp 0.35s ease both 0.12s}
.stagger-item:nth-child(3){animation:slideUp 0.35s ease both 0.19s}
.stagger-item:nth-child(4){animation:slideUp 0.35s ease both 0.26s}
</style>
</head>

<div id="root"></div>
<script type="text/babel">
const {useState,useRef,useEffect} = React;

// ── 더미 데이터 ──
const ORDERS = [

  {id:'#24-0891',customer:'김서아',type:'B2B',specs:'크롬코팅 아트지 30×40 ×5',status:'shipping',amount:'₩ 142,000',date:'2024-05-25',s3:'완료'},
  {id:'#24-0890',customer:'박도현',type:'B2C',specs:'바리타 페이퍼 50×70 + 프레임',status:'printing',amount:'₩ 218,000',date:'2024-05-24',s3:'처리중'},
  {id:'#24-0889',customer:'최지원',type:'B2B',specs:'파인아트 캔버스 ×12 대량',status:'processing',amount:'₩ 1,480,000',date:'2024-05-24',s3:'대기'},
  {id:'#24-0888',customer:'정하은',type:'B2C',specs:'크롬코팅 아트지 60×80',status:'complete',amount:'₩ 95,000',date:'2024-05-23',s3:'완료'},
  {id:'#24-0887',customer:'강민서',type:'PRO',specs:'바리타 페이퍼 ×8 한정판',status:'shipping',amount:'₩ 624,000',date:'2024-05-23',s3:'완료'},
];

const MEMBERS = [
  {name:'이민준',email:'lmj@example.kr',type:'B2C',grade:'gold',orders:24,total:'₩ 5,280,000',joined:'2023-08-12',lastOrder:'2024-05-25'},
  {name:'갤러리 아트스페이스',email:'info@artspace.co.kr',type:'B2B',grade:'gold',orders:156,total:'₩ 42,100,000',joined:'2022-03-01',lastOrder:'2024-05-25'},
  {name:'박도현',email:'pdh@design.kr',type:'PRO',grade:'silver',orders:38,total:'₩ 8,240,000',joined:'2023-02-14',lastOrder:'2024-05-24'},
  {name:'최지원',email:'cjw@studio.kr',type:'B2B',grade:'silver',orders:72,total:'₩ 18,560,000',joined:'2022-11-05',lastOrder:'2024-05-24'},
  {name:'정하은',email:'jhe@photo.kr',type:'B2C',grade:'bronze',orders:5,total:'₩ 412,000',joined:'2024-03-18',lastOrder:'2024-05-23'},
  {name:'아트프린트 스튜디오',email:'hello@aps.kr',type:'드랍쉬핑',grade:'gold',orders:312,total:'₩ 87,500,000',joined:'2021-06-20',lastOrder:'2024-05-22'},
];

const STATUS_MAP = {
  complete:{label:'완료',cls:'complete'},
  shipping:{label:'배송중',cls:'shipping'},
  printing:{label:'인쇄중',cls:'printing'},
  processing:{label:'접수',cls:'processing'},
  pending:{label:'대기',cls:'pending'},
};
const GRADE_MAP = {
  gold:{label:'골드',cls:''},
  silver:{label:'실버',cls:'silver'},
  bronze:{label:'브론즈',cls:'bronze'},
};

// ── Chart 컴포넌트 ──
function SalesChart({filter}){
  const ref = useRef(null);
  const chartRef = useRef(null);
  const labels = filter==='today'
    ? ['09:00','10:00','11:00','12:00','13:00','14:00','15:00','16:00','17:00']
    : filter==='week'
    ? ['월','화','수','목','금','토','일']
    : ['1주','2주','3주','4주'];

  const b2cData = filter==='today'
    ? [0,1,2,1,3,2,4,2,1]
    : filter==='week'
    ? [4,7,5,9,12,6,3]
    : [28,35,42,31];
  const b2bData = filter==='today'
    ? [0,0,1,0,1,1,2,1,0]
    : filter==='week'
    ? [2,1,3,2,5,1,0]
    : [12,18,14,22];

  useEffect(()=>{
    if(chartRef.current) chartRef.current.destroy();
    const ctx = ref.current.getContext('2d');
    chartRef.current = new Chart(ctx,{
      type:'bar',
      data:{
        labels,
        datasets:[
          {label:'B2C',data:b2cData,backgroundColor:'rgba(212,168,83,0.7)',borderColor:'#D4A853',borderWidth:1,borderRadius:4},
          {label:'B2B',data:b2bData,backgroundColor:'rgba(160,120,80,0.5)',borderColor:'#A07850',borderWidth:1,borderRadius:4},
        ]
      },
      options:{
        responsive:true,maintainAspectRatio:false,
        plugins:{legend:{display:false},tooltip:{backgroundColor:'#252018',titleColor:'#F0E8D0',bodyColor:'rgba(240,232,208,0.7)',borderColor:'rgba(212,168,83,0.3)',borderWidth:1}},
        scales:{
          x:{ticks:{color:'rgba(240,232,208,0.4)',font:{size:10}},grid:{color:'rgba(255,255,255,0.04)'},border:{color:'rgba(255,255,255,0.08)'}},
          y:{ticks:{color:'rgba(240,232,208,0.4)',font:{size:10}},grid:{color:'rgba(255,255,255,0.04)'},border:{color:'rgba(255,255,255,0.08)'}},
        }
      }
    });
    return()=>{if(chartRef.current) chartRef.current.destroy()};
  },[filter]);
  return <canvas ref={ref} style={{width:'100%',height:'200px'}}/>;
}

function DonutChart(){
  const ref = useRef(null);
  const chartRef = useRef(null);
  useEffect(()=>{
    if(chartRef.current) chartRef.current.destroy();
    const ctx = ref.current.getContext('2d');
    chartRef.current = new Chart(ctx,{
      type:'doughnut',
      data:{
        labels:['B2C 일반','B2B 기업','PRO 작가','드랍쉬핑'],
        datasets:[{data:[42,31,18,9],backgroundColor:['rgba(212,168,83,0.8)','rgba(160,120,80,0.7)','rgba(100,181,246,0.6)','rgba(129,199,132,0.6)'],borderColor:['#D4A853','#A07850','#64B5F6','#81C784'],borderWidth:1.5,hoverOffset:4}]
      },
      options:{
        responsive:true,maintainAspectRatio:false,cutout:'72%',
        plugins:{legend:{display:false},tooltip:{backgroundColor:'#252018',titleColor:'#F0E8D0',bodyColor:'rgba(240,232,208,0.7)',borderColor:'rgba(212,168,83,0.3)',borderWidth:1}},
      }
    });
    return()=>{if(chartRef.current) chartRef.current.destroy()};
  },[]);
  return <canvas ref={ref} style={{width:'100%',height:'160px'}}/>;
}
