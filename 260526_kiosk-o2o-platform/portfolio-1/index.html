<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1280">
<title>야외 키오스크 무인 주문 O2O 플랫폼 — 맞춤 구현 데모</title>
<link rel="preconnect" href="https://cdn.jsdelivr.net">
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/regular/style.css">
<link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/fill/style.css">
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Pretendard',sans-serif;background:#FDF6ED;color:#1C1008;min-height:100vh}
:root{
  --primary:#E8650A;--primary-light:#FBE8D8;--primary-dark:#C4520A;
  --secondary:#F5A623;--accent:#2E7D32;
  --bg:#FDF6ED;--surface:#FFFFFF;
  --text1:#1C1008;--text2:#6B4423;
  --border:#E8D5B0;--radius:16px;
  --shadow:0 4px 20px rgba(232,101,10,0.12);
  --shadow-lg:0 8px 40px rgba(232,101,10,0.18);
}
button{cursor:pointer;border:none;outline:none;font-family:inherit}

@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}
@keyframes scanLine{0%{top:0}50%{top:90%}100%{top:0}}
@keyframes timerPulse{0%,100%{box-shadow:0 0 0 0 rgba(232,101,10,0.4)}70%{box-shadow:0 0 0 12px rgba(232,101,10,0)}}
@keyframes notifSlide{from{opacity:0;transform:translateX(-16px)}to{opacity:1;transform:translateX(0)}}
@keyframes checkmarkDraw{from{stroke-dashoffset:60}to{stroke-dashoffset:0}}
@keyframes dotBounce{0%,100%{transform:scale(1)}50%{transform:scale(1.4)}}
@keyframes shimmer{0%{background-position:-400px 0}100%{background-position:400px 0}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes floatUp{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
@keyframes badgePop{0%{transform:scale(0.6)}80%{transform:scale(1.15)}100%{transform:scale(1)}}

.fade-in{animation:fadeIn 0.35s ease both}
.slide-up{animation:slideUp 0.4s ease both}

/* Topnav */
.topnav{
  position:fixed;top:0;left:0;right:0;z-index:100;
  background:#FFFFFF;border-bottom:1px solid var(--border);
  height:64px;display:flex;align-items:center;justify-content:space-between;
  padding:0 32px;box-shadow:0 2px 12px rgba(232,101,10,0.08);
}
.nav-logo{display:flex;align-items:center;gap:10px;text-decoration:none}
.nav-logo-icon{
  width:38px;height:38px;background:linear-gradient(135deg,var(--primary),var(--secondary));
  border-radius:10px;display:flex;align-items:center;justify-content:center;
  font-size:20px;animation:floatUp 3s ease-in-out infinite;
}
.nav-logo-text{font-size:18px;font-weight:800;color:var(--text1);letter-spacing:-0.5px}
.nav-logo-text span{color:var(--primary)}
.nav-tabs{display:flex;gap:4px;align-items:center}
.nav-tab{
  padding:8px 20px;border-radius:10px;font-size:14px;font-weight:600;
  color:var(--text2);background:transparent;transition:all 0.2s;
}
.nav-tab:hover{background:var(--primary-light);color:var(--primary)}
.nav-tab.active{background:var(--primary);color:#FFF}
.nav-right{display:flex;align-items:center;gap:12px}
.kiosk-badge{
  background:var(--primary-light);color:var(--primary);
  padding:5px 12px;border-radius:20px;font-size:12px;font-weight:700;
  border:1px solid rgba(232,101,10,0.3);display:flex;align-items:center;gap:5px;
}
.status-dot{
  width:7px;height:7px;border-radius:50%;background:var(--accent);
  animation:dotBounce 2s ease-in-out infinite;
}

/* Hero */
.hero{
  background:linear-gradient(135deg,var(--primary) 0%,var(--secondary) 100%);
  padding:36px 48px 40px;position:relative;overflow:hidden;
}
.hero::before{
  content:'';position:absolute;right:-60px;top:-60px;width:280px;height:280px;
  border-radius:50%;background:rgba(255,255,255,0.1);
}
.hero::after{
  content:'';position:absolute;right:80px;bottom:-40px;width:160px;height:160px;
  border-radius:50%;background:rgba(255,255,255,0.08);
}
.hero-title{font-size:28px;font-weight:800;color:#FFF;margin-bottom:8px;position:relative;z-index:1}
.hero-sub{font-size:14px;color:rgba(255,255,255,0.85);margin-bottom:20px;position:relative;z-index:1}
.hero-cta{
  background:#FFF;color:var(--primary);padding:10px 24px;border-radius:12px;
  font-size:14px;font-weight:700;display:inline-flex;align-items:center;gap:8px;
  transition:transform 0.2s,box-shadow 0.2s;box-shadow:0 4px 16px rgba(0,0,0,0.15);
  position:relative;z-index:1;
}
.hero-cta:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,0.2)}
.hero-stats{
  display:flex;gap:24px;margin-top:20px;position:relative;z-index:1;
}
.hero-stat{text-align:left}
.hero-stat-val{font-size:22px;font-weight:800;color:#FFF}
.hero-stat-label{font-size:11px;color:rgba(255,255,255,0.8);margin-top:1px}

/* Content area */
.content{padding:28px 32px;margin-top:64px}

/* Category tabs */
.cat-tabs{display:flex;gap:8px;margin-bottom:24px;flex-wrap:wrap}
.cat-tab{
  padding:8px 18px;border-radius:20px;font-size:13px;font-weight:600;
  background:var(--surface);color:var(--text2);border:1.5px solid var(--border);
  transition:all 0.2s;
}
.cat-tab:hover{border-color:var(--primary);color:var(--primary)}
.cat-tab.active{background:var(--primary);color:#FFF;border-color:var(--primary)}

/* Product grid */
.product-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:18px}
.product-card{
  background:var(--surface);border-radius:var(--radius);padding:20px;
  box-shadow:var(--shadow);border:1px solid var(--border);
  transition:all 0.25s;cursor:pointer;position:relative;overflow:hidden;
}
.product-card:hover{transform:translateY(-4px);box-shadow:var(--shadow-lg)}
.product-card.selected{border-color:var(--primary);box-shadow:0 0 0 2px rgba(232,101,10,0.2)}
.product-img{
  height:100px;border-radius:12px;display:flex;align-items:center;justify-content:center;
  font-size:44px;margin-bottom:14px;position:relative;overflow:hidden;
}
.product-badge{
  position:absolute;top:8px;right:8px;background:var(--accent);color:#FFF;
  font-size:10px;font-weight:700;padding:3px 8px;border-radius:8px;
  animation:badgePop 0.3s ease;
}
.product-name{font-size:15px;font-weight:700;color:var(--text1);margin-bottom:4px}
.product-origin{font-size:11px;color:var(--text2);margin-bottom:10px}
.product-price{font-size:20px;font-weight:800;color:var(--primary);margin-bottom:14px}
.product-price span{font-size:12px;font-weight:400;color:var(--text2)}
.add-btn{
  width:100%;padding:10px;border-radius:10px;
  background:var(--primary);color:#FFF;font-size:13px;font-weight:700;
  display:flex;align-items:center;justify-content:center;gap:6px;
  transition:all 0.2s;
}
.add-btn:hover{background:var(--primary-dark);transform:scale(1.02)}
.qty-ctrl{
  display:flex;align-items:center;gap:0;width:100%;border-radius:10px;
  overflow:hidden;border:2px solid var(--primary);
}
.qty-btn{
  flex:1;padding:9px;background:var(--primary-light);color:var(--primary);
  font-size:18px;font-weight:700;transition:background 0.15s;
}
.qty-btn:hover{background:rgba(232,101,10,0.2)}
.qty-num{
  flex:1;text-align:center;font-size:16px;font-weight:800;color:var(--primary);
  background:#FFF;padding:9px 0;
}

/* Checkout */
.checkout-wrap{max-width:900px;margin:0 auto;padding-top:8px}
.step-bar{display:flex;align-items:center;margin-bottom:32px}
.step-item{display:flex;align-items:center;gap:8px;flex:1;position:relative}
.step-circle{
  width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;
  font-size:13px;font-weight:700;border:2px solid var(--border);color:var(--text2);
  background:var(--surface);flex-shrink:0;
}
.step-circle.done{background:var(--accent);border-color:var(--accent);color:#FFF}
.step-circle.active{background:var(--primary);border-color:var(--primary);color:#FFF}
.step-label{font-size:13px;font-weight:600;color:var(--text2)}
.step-label.active{color:var(--primary);font-weight:700}
.step-line{flex:1;height:2px;background:var(--border);margin:0 8px}
.step-line.done{background:var(--primary)}

.checkout-grid{display:grid;grid-template-columns:1fr 1fr;gap:24px}
.checkout-card{background:var(--surface);border-radius:var(--radius);padding:28px;box-shadow:var(--shadow)}
.checkout-title{font-size:16px;font-weight:800;color:var(--text1);margin-bottom:20px;display:flex;align-items:center;gap:8px}
.order-item{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid var(--border)}
.order-item:last-child{border-bottom:none}
.order-item-icon{font-size:28px;width:44px;height:44px;display:flex;align-items:center;justify-content:center;background:var(--bg);border-radius:10px}
.order-item-name{font-size:14px;font-weight:600;color:var(--text1)}
.order-item-qty{font-size:12px;color:var(--text2)}
.order-item-price{margin-left:auto;font-size:15px;font-weight:700;color:var(--primary)}
.order-total{
  margin-top:16px;padding-top:16px;border-top:2px solid var(--border);
  display:flex;justify-content:space-between;align-items:center;
}
.order-total-label{font-size:14px;font-weight:600;color:var(--text2)}
.order-total-price{font-size:24px;font-weight:800;color:var(--primary)}

/* QR payment */
.qr-section{display:flex;flex-direction:column;align-items:center;gap:16px}
.qr-timer{
  display:flex;align-items:center;gap:8px;padding:8px 16px;
  background:rgba(232,101,10,0.08);border-radius:20px;
  animation:timerPulse 2s ease-in-out infinite;
}
.qr-timer-text{font-size:13px;font-weight:600;color:var(--primary)}
.qr-timer-val{font-size:16px;font-weight:800;color:var(--primary)}
.qr-box{
  width:180px;height:180px;background:var(--surface);border-radius:16px;
  border:3px solid var(--primary);padding:12px;position:relative;overflow:hidden;
  box-shadow:0 8px 32px rgba(232,101,10,0.2);
}
.qr-inner{
  width:100%;height:100%;display:grid;grid-template-columns:repeat(8,1fr);gap:2px;
}
.qr-cell{border-radius:2px}
.qr-scan{
  position:absolute;left:0;right:0;height:2px;background:var(--secondary);
  box-shadow:0 0 8px rgba(245,166,35,0.8);animation:scanLine 2.5s linear infinite;
}
.payment-methods{display:flex;gap:10px;width:100%}
.pay-btn{
  flex:1;padding:12px;border-radius:12px;font-size:13px;font-weight:700;
  display:flex;align-items:center;justify-content:center;gap:6px;
  border:2px solid var(--border);color:var(--text1);background:var(--surface);
  transition:all 0.2s;
}
.pay-btn:hover{border-color:var(--primary);color:var(--primary);background:var(--primary-light)}
.pay-btn.kakao{border-color:#FEE500;background:#FEE500;color:#3C1E1E}
.pay-btn.kakao:hover{background:#FADA00}
.pay-instruction{font-size:13px;color:var(--text2);text-align:center;line-height:1.6}
.checkout-nav{display:flex;gap:10px;margin-top:24px}
.btn-secondary{
  flex:1;padding:14px;border-radius:12px;border:2px solid var(--border);
  color:var(--text2);font-size:14px;font-weight:600;background:var(--surface);
  transition:all 0.2s;
}
.btn-secondary:hover{border-color:var(--primary);color:var(--primary)}
.btn-primary{
  flex:2;padding:14px;border-radius:12px;background:var(--primary);color:#FFF;
  font-size:14px;font-weight:700;transition:all 0.2s;
}
.btn-primary:hover{background:var(--primary-dark);transform:scale(1.01)}

/* Notifications */
.notif-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:24px}
.notif-stat{
  background:var(--surface);border-radius:var(--radius);padding:20px;
  box-shadow:var(--shadow);text-align:center;
}
.notif-stat-val{font-size:26px;font-weight:800;color:var(--primary)}
.notif-stat-label{font-size:12px;color:var(--text2);margin-top:4px}
.filter-bar{display:flex;gap:8px;margin-bottom:20px}
.filter-btn{
  padding:7px 16px;border-radius:20px;font-size:13px;font-weight:600;
  background:var(--surface);color:var(--text2);border:1.5px solid var(--border);transition:all 0.2s;
}
.filter-btn.active{background:var(--primary);color:#FFF;border-color:var(--primary)}
.notif-list{display:flex;flex-direction:column;gap:12px}
.notif-item{
  background:var(--surface);border-radius:var(--radius);padding:18px 22px;
  box-shadow:var(--shadow);display:flex;align-items:center;gap:16px;
  border-left:4px solid transparent;animation:notifSlide 0.4s ease both;
  cursor:pointer;transition:box-shadow 0.2s;
}
.notif-item:hover{box-shadow:var(--shadow-lg)}
.notif-item.success{border-left-color:var(--accent)}
.notif-item.fallback{border-left-color:var(--secondary)}
.notif-item.fail{border-left-color:#C62828}
.notif-icon{
  width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;
  font-size:20px;flex-shrink:0;
}
.notif-icon.success{background:#E8F5E9}
.notif-icon.fallback{background:#FFF8E1}
.notif-icon.fail{background:#FFEBEE}
.notif-body{flex:1}
.notif-order-id{font-size:11px;font-weight:600;color:var(--text2)}
.notif-msg{font-size:14px;font-weight:600;color:var(--text1);margin:2px 0}
.notif-detail{font-size:12px;color:var(--text2)}
.notif-badge{
  padding:4px 10px;border-radius:20px;font-size:11px;font-weight:700;flex-shrink:0;
}
.badge-success{background:#E8F5E9;color:var(--accent)}
.badge-fallback{background:#FFF8E1;color:#E65100}
.badge-fail{background:#FFEBEE;color:#C62828}
.notif-time{font-size:11px;color:var(--text2);flex-shrink:0;text-align:right;line-height:1.5}

/* Admin */
.admin-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:24px}
.admin-stat{
  background:var(--surface);border-radius:var(--radius);padding:20px;
  box-shadow:var(--shadow);display:flex;align-items:center;gap:14px;
}
.admin-stat-icon{
  width:48px;height:48px;border-radius:14px;display:flex;align-items:center;justify-content:center;
  font-size:22px;flex-shrink:0;
}
.admin-stat-val{font-size:24px;font-weight:800;color:var(--text1);line-height:1}
.admin-stat-label{font-size:12px;color:var(--text2);margin-top:3px}
.admin-grid{display:grid;grid-template-columns:1.6fr 1fr;gap:20px;margin-bottom:20px}
.admin-card{background:var(--surface);border-radius:var(--radius);padding:22px;box-shadow:var(--shadow)}
.admin-card-title{font-size:15px;font-weight:800;color:var(--text1);margin-bottom:18px;display:flex;align-items:center;gap:8px}
.chart-wrap{height:200px;position:relative}
.table{width:100%;border-collapse:collapse;font-size:13px}
.table th{
  text-align:left;padding:10px 12px;font-size:11px;font-weight:700;color:var(--text2);
  text-transform:uppercase;letter-spacing:0.5px;border-bottom:2px solid var(--border);background:var(--bg);
}
.table td{padding:11px 12px;border-bottom:1px solid var(--border);color:var(--text1);vertical-align:middle}
.table tr:last-child td{border-bottom:none}
.table tr:hover td{background:#FFFAF5}
.action-btns{display:flex;gap:6px}
.action-btn{
  padding:5px 12px;border-radius:8px;font-size:11px;font-weight:700;border:1.5px solid;transition:all 0.15s;
}
.action-btn.edit{border-color:var(--primary);color:var(--primary)}
.action-btn.edit:hover{background:var(--primary);color:#FFF}
.action-btn.del{border-color:#C62828;color:#C62828}
.action-btn.del:hover{background:#C62828;color:#FFF}
.stock-badge{
  padding:3px 10px;border-radius:10px;font-size:11px;font-weight:700;
}
.stock-ok{background:#E8F5E9;color:var(--accent)}
.stock-low{background:#FFF8E1;color:#E65100}

/* Product status badges */
.status-paid{background:#E8F5E9;color:var(--accent);padding:3px 10px;border-radius:10px;font-size:11px;font-weight:700}
.status-pending{background:#FFF8E1;color:#E65100;padding:3px 10px;border-radius:10px;font-size:11px;font-weight:700}
.status-cancel{background:#FFEBEE;color:#C62828;padding:3px 10px;border-radius:10px;font-size:11px;font-weight:700}

/* Modal */
.modal-overlay{
  position:fixed;inset:0;background:rgba(28,16,8,0.5);z-index:200;
  display:flex;align-items:center;justify-content:center;animation:fadeIn 0.2s ease;
}
.modal{
  background:var(--surface);border-radius:20px;padding:32px;width:440px;max-height:90vh;
  overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,0.3);animation:slideUp 0.25s ease;
}
.modal-title{font-size:18px;font-weight:800;color:var(--text1);margin-bottom:24px;display:flex;align-items:center;gap:8px}
.form-group{margin-bottom:18px}
.form-label{font-size:12px;font-weight:700;color:var(--text2);margin-bottom:6px;display:block;text-transform:uppercase;letter-spacing:0.5px}
.form-input{
  width:100%;padding:12px 14px;border-radius:12px;border:2px solid var(--border);
  font-size:14px;font-family:inherit;color:var(--text1);outline:none;transition:border-color 0.2s;background:var(--bg);
}
.form-input:focus{border-color:var(--primary)}
.modal-btns{display:flex;gap:10px;margin-top:24px}
.modal-cancel{flex:1;padding:12px;border-radius:12px;border:2px solid var(--border);color:var(--text2);font-size:14px;font-weight:600;background:var(--surface)}
.modal-save{flex:1;padding:12px;border-radius:12px;background:var(--primary);color:#FFF;font-size:14px;font-weight:700}
.modal-save:hover{background:var(--primary-dark)}

/* Toast */
.toast{
  position:fixed;bottom:32px;right:32px;background:var(--text1);color:#FFF;
  padding:14px 20px;border-radius:14px;font-size:14px;font-weight:600;
  display:flex;align-items:center;gap:10px;animation:slideUp 0.3s ease;
  box-shadow:0 8px 32px rgba(0,0,0,0.3);z-index:300;
}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

/* ── mock data ── */
const PRODUCTS = [
  { id:1, name:'황금 사과 박스', weight:'5kg', price:32000, category:'과일', emoji:'🍎', stock:12, origin:'경북 청송 직배송', color:'#FFF0F0' },
  { id:2, name:'제주 감귤 선물세트', weight:'3kg', price:18500, category:'과일', emoji:'🍊', stock:8, origin:'제주 서귀포 직배송', color:'#FFF5E0' },
  { id:3, name:'무농약 유기농 쌀', weight:'10kg', price:45000, category:'곡류', emoji:'🌾', stock:20, origin:'충남 당진 직배송', color:'#FFFDE0' },
  { id:4, name:'유기농 시금치', weight:'500g', price:6800, category:'채소', emoji:'🥬', stock:3, origin:'남양주 유기농 농장', color:'#F0FFF0' },
  { id:5, name:'국내산 혼합 견과류', weight:'1kg', price:22000, category:'견과류', emoji:'🥜', stock:15, origin:'전남 완도 직배송', color:'#FFF4E0' },
  { id:6, name:'제주 옥돔 신선 세트', weight:'2마리', price:58000, category:'수산', emoji:'🐟', stock:5, origin:'제주 한림항 직배송', color:'#F0F8FF' },
  { id:7, name:'고창 복분자 청', weight:'750ml', price:28000, category:'가공', emoji:'🫐', stock:9, origin:'전북 고창 직배송', color:'#F5F0FF' },
  { id:8, name:'문경 한우 1++ 등심', weight:'500g', price:89000, category:'육류', emoji:'🥩', stock:4, origin:'경북 문경 직배송', color:'#FFF0F0' },

        <div className="admin-card">
          <div className="admin-card-title"><i className="ph ph-chart-line" style={{color:Colors.primary}} />시간대별 주문 현황</div>
          <div className="chart-wrap"><canvas ref={chartRef} /></div>
        </div>
        <div className="admin-card">
          <div className="admin-card-title"><i className="ph ph-clock" style={{color:Colors.primary}} />최근 주문</div>
          {ORDERS.map(o=>(
            <div key={o.id} style={{display:'flex',alignItems:'center',gap:10,padding:'10px 0',borderBottom:`1px solid ${Colors.border}`}}>
              <div style={{flex:1}}>
                <div style={{fontSize:13,fontWeight:600}}>{o.product}</div>
                <div style={{fontSize:11,color:Colors.text2}}>{o.id} · {o.time}</div>
              </div>
              <div style={{fontSize:13,fontWeight:700,color:Colors.primary}}>{o.amount}</div>
              <span className={`status-${o.status}`}>{o.status==='paid'?'결제완료':o.status==='pending'?'처리중':'취소'}</span>
            </div>
          ))}
        </div>
      </div>

      <div className="admin-card">
        <div className="admin-card-title" style={{display:'flex',alignItems:'center',justifyContent:'space-between'}}>
          <span style={{display:'flex',alignItems:'center',gap:8}}><i className="ph ph-package" style={{color:Colors.primary}} />상품 관리</span>
          <button style={{background:Colors.primary,color:'#FFF',padding:'7px 16px',borderRadius:10,fontSize:13,fontWeight:700,display:'flex',alignItems:'center',gap:6}}
            onClick={()=>setEditModal({id:0,name:'',price:'',stock:''})}>
            <i className="ph ph-plus" /> 상품 추가
          </button>
        </div>
        <table className="table">
          <thead><tr><th>상품명</th><th>판매가</th><th>재고</th><th>상태</th><th>관리</th></tr></thead>
          <tbody>
            {products.map(p=>(
              <tr key={p.id}>
                <td style={{fontWeight:600}}>{p.name}</td>
                <td style={{fontWeight:700,color:Colors.primary}}>₩{p.price}</td>
                <td>{p.stock}개</td>
                <td><span className={`stock-badge stock-${p.status}`}>{p.status==='ok'?'정상':'재고부족'}</span></td>
                <td>
                  <div className="action-btns">
                    <button className="action-btn edit" onClick={()=>setEditModal(p)}>수정</button>
                    <button className="action-btn del" onClick={()=>{setProducts(pr=>pr.filter(x=>x.id!==p.id));showToast('상품이 삭제되었습니다')}}>삭제</button>
                  </div>
                </td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>

      {editModal&&(
        <div className="modal-overlay" onClick={e=>e.target===e.currentTarget&&setEditModal(null)}>
          <div className="modal">
            <div className="modal-title"><i className="ph ph-pencil" style={{color:Colors.primary}} />{editModal.id?'상품 수정':'상품 추가'}</div>
            {[['상품명','name','예: 제주 감귤 선물세트'],['판매가','price','예: 18,500'],['재고 수량','stock','예: 12'],['원산지','origin','예: 제주 서귀포 직배송']].map(([l,k,ph])=>(
              <div key={k} className="form-group">
                <label className="form-label">{l}</label>
                <input className="form-input" placeholder={ph} defaultValue={editModal[k]||''} />
              </div>
            ))}
            <div className="modal-btns">
              <button className="modal-cancel" onClick={()=>setEditModal(null)}>취소</button>
              <button className="modal-save" onClick={()=>{setEditModal(null);showToast('상품 정보가 저장되었습니다')}}>저장</button>
            </div>
          </div>
        </div>
      )}
      {toast&&<div className="toast"><i className="ph ph-check-circle" />{toast}</div>}
    </div>
  );
};

/* ── App ── */
const App = () => {
  const [activeTab, setActiveTab] = useState('main');

  return (
    <div style={{width:'100%',minHeight:'100vh',display:'flex',flexDirection:'column',background:'#FDF6ED'}}>
      <nav className="topnav">
        <div className="nav-logo">
          <div className="nav-logo-icon">🥬</div>
          <div className="nav-logo-text">직배달<span>장</span></div>
        </div>
        <div className="nav-tabs">
          {[
            {key:'main',label:'상품 목록',icon:'ph-storefront'},
            {key:'checkout',label:'주문하기',icon:'ph-shopping-cart'},
            {key:'notification',label:'알림 내역',icon:'ph-bell'},
            {key:'admin',label:'관리자',icon:'ph-sliders'},
          ].map(t=>(
            <button key={t.key} className={`nav-tab${activeTab===t.key?' active':''}`} onClick={()=>setActiveTab(t.key)}>
              <i className={`ph ${t.icon}`} style={{marginRight:5}} />{t.label}
            </button>
          ))}
        </div>
        <div className="nav-right">
          <div className="kiosk-badge"><div className="status-dot" />키오스크 운영 중</div>
        </div>
      </nav>

      <main style={{flex:1,width:'100%'}}>
        {activeTab==='main'&&<ProductList onOrder={()=>setActiveTab('checkout')} />}
        {activeTab==='checkout'&&<Checkout />}
        {activeTab==='notification'&&<Notifications />}
        {activeTab==='admin'&&<Admin />}
      </main>
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
