<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1280">
<title>멀티 키오스크 O2O 통합 운영 플랫폼 — 구현 데모</title>
<link rel="preconnect" href="https://cdn.jsdelivr.net">
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.11.0/dist/tabler-icons.min.css">
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Pretendard',sans-serif;background:#0B1120;color:#E8F4F1;min-height:100vh}
:root{
  --primary:#0D9373;--primary-dim:rgba(13,147,115,0.15);--primary-glow:rgba(13,147,115,0.4);
  --secondary:#00B8A9;--accent:#F5A623;
  --bg:#0B1120;--surface:#131E30;--surface2:#1A2540;--surface3:#1F2D47;
  --text1:#E8F4F1;--text2:#7BA99A;--border:rgba(13,147,115,0.2);
  --border2:rgba(232,244,241,0.08);--radius:4px;
  --red:#EF5350;--yellow:#F5A623;--green:#0D9373;
}
button{cursor:pointer;border:none;outline:none;font-family:inherit}
input,select{font-family:inherit}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:var(--surface)}::-webkit-scrollbar-thumb{background:var(--primary);border-radius:2px}

@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideIn{from{opacity:0;transform:translateX(-12px)}to{opacity:1;transform:translateX(0)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.5}}
@keyframes blink{0%,100%{background:var(--primary)}50%{background:transparent}}
@keyframes scanPulse{0%{box-shadow:0 0 0 0 var(--primary-glow)}100%{box-shadow:0 0 0 12px transparent}}
@keyframes countUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes glow{0%,100%{text-shadow:0 0 8px var(--primary-glow)}50%{text-shadow:0 0 20px var(--primary-glow)}}
@keyframes tickerScroll{from{transform:translateX(0)}to{transform:translateX(-50%)}}
@keyframes barFill{from{width:0}to{width:var(--w)}}
@keyframes spinCW{to{transform:rotate(360deg)}}
@keyframes statusPing{0%{transform:scale(1);opacity:1}100%{transform:scale(2);opacity:0}}

.fade-in{animation:fadeIn 0.3s ease both}
.slide-in{animation:slideIn 0.35s ease both}

/* === GLOBAL NAV (spa-modern) === */
.global-nav{
  position:fixed;top:0;left:0;right:0;z-index:100;
  background:var(--surface);border-bottom:1px solid var(--border);height:56px;
  display:flex;align-items:center;gap:0;
}
.nav-brand{
  display:flex;align-items:center;gap:10px;padding:0 24px;border-right:1px solid var(--border2);
  height:100%;min-width:220px;
}
.nav-brand-logo{
  width:32px;height:32px;background:linear-gradient(135deg,var(--primary),var(--secondary));
  border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:16px;
}
.nav-brand-text{font-size:14px;font-weight:800;color:var(--text1);letter-spacing:-0.3px}
.nav-brand-sub{font-size:10px;color:var(--primary);font-weight:600;letter-spacing:1px;text-transform:uppercase}
.nav-links{display:flex;align-items:stretch;flex:1;padding:0 8px;gap:2px}
.nav-link{
  display:flex;align-items:center;gap:7px;padding:0 16px;font-size:13px;font-weight:600;
  color:var(--text2);border-bottom:2px solid transparent;transition:all 0.2s;cursor:pointer;
  background:transparent;border-radius:0;border-left:none;border-right:none;border-top:none;
}
.nav-link:hover{color:var(--text1);background:rgba(255,255,255,0.04)}
.nav-link.active{color:var(--primary);border-bottom-color:var(--primary)}
.nav-right{display:flex;align-items:center;gap:12px;padding:0 20px;border-left:1px solid var(--border2)}
.live-badge{
  display:flex;align-items:center;gap:6px;background:var(--primary-dim);
  border:1px solid var(--border);border-radius:3px;padding:4px 10px;font-size:11px;font-weight:700;color:var(--primary);
}
.live-dot{width:6px;height:6px;border-radius:50%;background:var(--primary);position:relative}
.live-dot::after{
  content:'';position:absolute;inset:0;border-radius:50%;
  animation:statusPing 1.5s ease-out infinite;background:var(--primary);
}
.alert-btn{
  width:34px;height:34px;border-radius:4px;background:var(--surface2);border:1px solid var(--border2);
  color:var(--text2);display:flex;align-items:center;justify-content:center;transition:all 0.2s;
}
.alert-btn:hover{color:var(--text1);border-color:var(--border)}
.user-avatar{
  width:34px;height:34px;border-radius:50%;background:linear-gradient(135deg,var(--primary),var(--secondary));
  display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:#FFF;flex-shrink:0;
}

/* Ticker */
.ticker{
  background:var(--primary-dim);border-bottom:1px solid var(--border);
  height:28px;display:flex;align-items:center;overflow:hidden;font-size:11px;color:var(--primary);
}
.ticker-label{padding:0 12px;font-weight:700;background:var(--primary);color:#FFF;height:100%;display:flex;align-items:center;flex-shrink:0;font-size:11px}
.ticker-inner{display:flex;gap:40px;white-space:nowrap;animation:tickerScroll 20s linear infinite}
.ticker-item{display:flex;align-items:center;gap:6px}

/* === CONTENT === */
.main-content{margin-top:84px;padding:20px 24px 80px;min-height:calc(100vh - 84px)}

/* Stats grid */
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px}
.stat-card{
  background:var(--surface);border:1px solid var(--border2);border-radius:var(--radius);
  padding:16px 18px;position:relative;overflow:hidden;
}
.stat-card::before{
  content:'';position:absolute;top:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,var(--primary),var(--secondary));
}
.stat-card-label{font-size:10px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:0.8px;margin-bottom:8px}
.stat-card-value{font-size:26px;font-weight:800;color:var(--text1);line-height:1;animation:glow 3s ease-in-out infinite}
.stat-card-sub{font-size:11px;color:var(--text2);margin-top:6px;display:flex;align-items:center;gap:4px}
.stat-delta-up{color:var(--primary);font-weight:600}
.stat-delta-down{color:var(--red);font-weight:600}

/* Grids */
.dash-grid{display:grid;grid-template-columns:2fr 1fr;gap:14px;margin-bottom:14px}
.dash-grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;margin-bottom:14px}
.panel{background:var(--surface);border:1px solid var(--border2);border-radius:var(--radius);padding:18px}
.panel-title{font-size:12px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:0.8px;margin-bottom:16px;display:flex;align-items:center;gap:6px}
.panel-title-bar{width:2px;height:12px;background:var(--primary);border-radius:1px;flex-shrink:0}

/* Chart */
.chart-wrap{height:200px;position:relative}

/* Order feed */
.order-feed{display:flex;flex-direction:column;gap:6px;max-height:280px;overflow-y:auto}
.order-row{
  display:flex;align-items:center;gap:10px;padding:9px 12px;background:var(--surface2);
  border-radius:var(--radius);font-size:12px;transition:background 0.15s;
  animation:slideIn 0.3s ease;
}
.order-row:hover{background:var(--surface3)}
.order-id{font-family:monospace;font-size:11px;color:var(--primary);min-width:90px}
.order-product{flex:1;color:var(--text1);font-weight:600;overflow:hidden;white-space:nowrap;text-overflow:ellipsis}
.order-amount{color:var(--accent);font-weight:700;min-width:80px;text-align:right}
.status-pill{
  padding:2px 7px;border-radius:2px;font-size:10px;font-weight:700;flex-shrink:0;
}
.s-paid{background:rgba(13,147,115,0.15);color:var(--primary);border:1px solid rgba(13,147,115,0.3)}
.s-pending{background:rgba(245,166,35,0.15);color:var(--yellow);border:1px solid rgba(245,166,35,0.3)}
.s-cancel{background:rgba(239,83,80,0.15);color:var(--red);border:1px solid rgba(239,83,80,0.3)}

/* Device cards */
.device-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
.device-card{
  background:var(--surface);border:1px solid var(--border2);border-radius:var(--radius);padding:18px;
  position:relative;cursor:pointer;transition:all 0.2s;
}
.device-card:hover{border-color:var(--primary);background:var(--surface2)}
.device-card.selected{border-color:var(--primary);box-shadow:0 0 0 1px var(--primary)}
.device-name{font-size:14px;font-weight:700;color:var(--text1);margin-bottom:4px}
.device-loc{font-size:11px;color:var(--text2);margin-bottom:12px}
.device-status-badge{
  display:inline-flex;align-items:center;gap:5px;padding:3px 8px;border-radius:2px;font-size:10px;font-weight:700;
}
.ds-online{background:rgba(13,147,115,0.15);color:var(--primary);border:1px solid rgba(13,147,115,0.3)}
.ds-offline{background:rgba(239,83,80,0.12);color:var(--red);border:1px solid rgba(239,83,80,0.25)}
.ds-warning{background:rgba(245,166,35,0.12);color:var(--yellow);border:1px solid rgba(245,166,35,0.25)}
.device-metrics{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:14px}
.device-metric{background:var(--surface2);border-radius:var(--radius);padding:8px 10px}
.device-metric-label{font-size:9px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:0.5px}
.device-metric-val{font-size:15px;font-weight:800;color:var(--text1);margin-top:2px}

/* Product mapping table in device management */
.mapping-table{width:100%;border-collapse:collapse;font-size:12px}
.mapping-table th{
  text-align:left;padding:8px 12px;font-size:10px;font-weight:700;color:var(--text2);
  text-transform:uppercase;letter-spacing:0.5px;border-bottom:1px solid var(--border2);background:var(--bg);
}
.mapping-table td{padding:9px 12px;border-bottom:1px solid rgba(232,244,241,0.04);color:var(--text1);vertical-align:middle}
.mapping-table tr:hover td{background:var(--surface2)}
.toggle-switch{
  width:36px;height:20px;background:var(--border2);border-radius:10px;position:relative;cursor:pointer;transition:background 0.2s;
}
.toggle-switch.on{background:var(--primary)}
.toggle-knob{
  position:absolute;top:2px;left:2px;width:16px;height:16px;border-radius:50%;background:#FFF;
  transition:transform 0.2s;
}
.toggle-switch.on .toggle-knob{transform:translateX(16px)}

/* Supplier analytics */
.supplier-grid{display:grid;grid-template-columns:1.5fr 1fr;gap:14px;margin-bottom:14px}
.bar-chart-custom{display:flex;flex-direction:column;gap:8px}
.bar-row{display:flex;align-items:center;gap:10px;font-size:12px}
.bar-label{width:100px;text-align:right;color:var(--text2);font-size:11px;overflow:hidden;white-space:nowrap;text-overflow:ellipsis}
.bar-track{flex:1;height:20px;background:var(--surface2);border-radius:2px;position:relative;overflow:hidden}
.bar-fill{height:100%;background:linear-gradient(90deg,var(--primary),var(--secondary));border-radius:2px;transition:width 0.6s ease}
.bar-val{min-width:70px;text-align:right;color:var(--accent);font-weight:700;font-size:11px}
.supplier-table{width:100%;border-collapse:collapse;font-size:12px}
.supplier-table th{
  text-align:left;padding:8px 12px;font-size:10px;font-weight:700;color:var(--text2);
  text-transform:uppercase;letter-spacing:0.5px;border-bottom:1px solid var(--border2);background:var(--bg);
}
.supplier-table td{padding:9px 12px;border-bottom:1px solid rgba(232,244,241,0.04);color:var(--text1)}
.supplier-table tr:hover td{background:var(--surface2)}
.success-rate{display:flex;align-items:center;gap:6px}
.rate-bar{flex:1;height:4px;background:var(--surface3);border-radius:2px}
.rate-fill{height:100%;border-radius:2px}

/* Settlement */
.settle-header{display:flex;align-items:center;gap:12px;margin-bottom:20px;flex-wrap:wrap}
.period-select{
  background:var(--surface2);border:1px solid var(--border2);border-radius:var(--radius);
  color:var(--text1);padding:7px 12px;font-size:12px;
}
.settle-summary{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:20px}
.settle-stat{
  background:var(--surface);border:1px solid var(--border2);border-radius:var(--radius);padding:14px 16px;text-align:center;
}
.settle-stat-label{font-size:10px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:6px}
.settle-stat-val{font-size:20px;font-weight:800}
.settle-table{width:100%;border-collapse:collapse;font-size:12px;margin-bottom:14px}
.settle-table th{
  text-align:left;padding:9px 14px;font-size:10px;font-weight:700;color:var(--text2);
  text-transform:uppercase;letter-spacing:0.5px;border-bottom:1px solid var(--border2);background:var(--bg);
}
.settle-table td{padding:9px 14px;border-bottom:1px solid rgba(232,244,241,0.04);color:var(--text1);vertical-align:middle}
.settle-table tr:hover td{background:var(--surface2)}

/* Buttons */
.btn-primary{
  display:inline-flex;align-items:center;gap:6px;padding:7px 14px;background:var(--primary);
  color:#FFF;border-radius:var(--radius);font-size:12px;font-weight:700;transition:all 0.2s;
}
.btn-primary:hover{background:var(--secondary);transform:translateY(-1px)}
.btn-ghost{
  display:inline-flex;align-items:center;gap:6px;padding:6px 12px;
  background:transparent;border:1px solid var(--border);color:var(--text2);
  border-radius:var(--radius);font-size:12px;font-weight:600;transition:all 0.2s;
}
.btn-ghost:hover{border-color:var(--primary);color:var(--primary)}
.btn-warn{
  display:inline-flex;align-items:center;gap:6px;padding:6px 12px;
  background:rgba(245,166,35,0.12);border:1px solid rgba(245,166,35,0.3);color:var(--yellow);
  border-radius:var(--radius);font-size:12px;font-weight:700;transition:all 0.2s;
}
.btn-warn:hover{background:rgba(245,166,35,0.2)}

/* Modal */
.modal-overlay{
  position:fixed;inset:0;background:rgba(11,17,32,0.75);z-index:200;
  display:flex;align-items:center;justify-content:center;animation:fadeIn 0.2s ease;
}
.modal{
  background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:28px;width:420px;
  box-shadow:0 20px 60px rgba(0,0,0,0.6);animation:fadeIn 0.25s ease;
}
.modal-title{font-size:16px;font-weight:700;color:var(--text1);margin-bottom:20px;display:flex;align-items:center;gap:8px}
.form-group{margin-bottom:14px}
.form-label{font-size:10px;font-weight:700;color:var(--text2);margin-bottom:5px;display:block;text-transform:uppercase;letter-spacing:0.5px}
.form-input{
  width:100%;padding:9px 12px;border-radius:var(--radius);background:var(--surface2);border:1px solid var(--border2);
  color:var(--text1);font-size:13px;outline:none;transition:border-color 0.2s;
}
.form-input:focus{border-color:var(--primary)}
.modal-btns{display:flex;gap:8px;margin-top:20px;justify-content:flex-end}

/* Toast */
.toast{
  position:fixed;bottom:24px;right:24px;background:var(--surface3);border:1px solid var(--primary);
  color:var(--text1);padding:12px 18px;border-radius:4px;font-size:13px;font-weight:600;
  display:flex;align-items:center;gap:8px;animation:slideIn 0.3s ease;box-shadow:0 8px 24px rgba(0,0,0,0.4);z-index:300;
}

/* Footer */
.footer{
  background:var(--surface);border-top:1px solid var(--border2);padding:20px 24px;
  display:flex;align-items:center;justify-content:space-between;font-size:11px;color:var(--text2);
  position:relative;bottom:0;width:100%;
}

/* Section tabs (inside pages) */
.section-tabs{display:flex;gap:2px;margin-bottom:16px;background:var(--surface2);border-radius:var(--radius);padding:3px;width:fit-content}
.section-tab{
  padding:6px 14px;border-radius:2px;font-size:12px;font-weight:600;color:var(--text2);background:transparent;transition:all 0.2s;
}
.section-tab.active{background:var(--primary);color:#FFF}
</style>
</head>
