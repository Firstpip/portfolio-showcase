<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>모바일 요금 비교 플랫폼 — 구현 데모</title>
<link rel="preconnect" href="https://cdn.jsdelivr.net"/>
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" rel="stylesheet"/>
<link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/regular/style.css"/>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://unpkg.com/prop-types@15.8.1/prop-types.min.js"></script>
<script src="https://unpkg.com/react-is@18.2.0/umd/react-is.production.min.js"></script>
<script src="https://unpkg.com/recharts@2.12.7/umd/Recharts.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body,#root{width:100%;min-height:100vh;font-family:'Pretendard',-apple-system,sans-serif;}
body{background:#0F0A1E;color:#F0EAFF;}

@keyframes fadeUp{from{opacity:0;transform:translateY(14px);}to{opacity:1;transform:translateY(0);}}
@keyframes fadeIn{from{opacity:0;}to{opacity:1;}}
@keyframes slideLeft{from{opacity:0;transform:translateX(20px);}to{opacity:1;transform:translateX(0);}}
@keyframes glowPulse{0%,100%{box-shadow:0 0 0 0 rgba(124,58,237,0);}50%{box-shadow:0 0 12px 3px rgba(124,58,237,0.3);}}
@keyframes barGrow{from{transform:scaleY(0);}to{transform:scaleY(1);}}
@keyframes lineExpand{from{stroke-dashoffset:1000;}to{stroke-dashoffset:0;}}

.fade-up{animation:fadeUp 0.4s ease both;}
.fade-in{animation:fadeIn 0.3s ease both;}
.slide-left{animation:slideLeft 0.35s ease both;}

/* Global Nav */
.gnav{width:100%;background:#1A1333;border-bottom:1px solid rgba(124,58,237,0.2);position:sticky;top:0;z-index:100;}
.gnav-inner{max-width:1280px;margin:0 auto;padding:0 32px;display:flex;align-items:center;height:62px;gap:36px;}
.gnav-logo{display:flex;align-items:center;gap:10px;font-size:17px;font-weight:800;color:#F0EAFF;letter-spacing:-0.4px;text-decoration:none;}
.gnav-logo-icon{width:32px;height:32px;background:linear-gradient(135deg,#7C3AED,#A78BFA);border-radius:8px;display:flex;align-items:center;justify-content:center;}
.gnav-menu{display:flex;gap:4px;flex:1;}
.gnav-item{padding:8px 16px;border:none;background:transparent;cursor:pointer;font-size:14px;font-weight:500;color:#9D8EC0;border-radius:7px;transition:all 0.18s;white-space:nowrap;font-family:'Pretendard',sans-serif;}
.gnav-item:hover{background:rgba(124,58,237,0.12);color:#A78BFA;}
.gnav-item.active{background:rgba(124,58,237,0.18);color:#A78BFA;font-weight:600;}
.gnav-right{display:flex;align-items:center;gap:10px;}
.gnav-avatar{width:34px;height:34px;border-radius:8px;background:linear-gradient(135deg,#7C3AED,#A78BFA);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:#fff;cursor:pointer;}
.gnav-badge{padding:3px 10px;background:rgba(52,211,153,0.15);color:#34D399;border:1px solid rgba(52,211,153,0.3);border-radius:20px;font-size:11px;font-weight:700;}

/* Layout */
.page-wrap{max-width:1280px;margin:0 auto;padding:36px 32px;}
.page-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:28px;}
.page-title{font-size:22px;font-weight:800;color:#F0EAFF;letter-spacing:-0.4px;}
.page-desc{font-size:13px;color:#9D8EC0;margin-top:3px;}

/* Cards */
.card{background:#1A1333;border:1px solid rgba(124,58,237,0.18);border-radius:14px;padding:24px;}
.card:hover{border-color:rgba(124,58,237,0.35);transition:border-color 0.2s;}
.stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:28px;}
.stat-card{background:#1A1333;border:1px solid rgba(124,58,237,0.18);border-radius:12px;padding:20px;}
.stat-card:hover{border-color:rgba(124,58,237,0.4);animation:glowPulse 1.5s ease infinite;}
.stat-icon{width:38px;height:38px;border-radius:9px;display:flex;align-items:center;justify-content:center;margin-bottom:12px;font-size:18px;}
.stat-value{font-size:26px;font-weight:800;color:#F0EAFF;letter-spacing:-0.5px;margin-bottom:3px;}
.stat-label{font-size:12px;color:#9D8EC0;}

/* Table */
.data-table{width:100%;border-collapse:collapse;}
.data-table th{padding:12px 16px;font-size:12px;font-weight:600;color:#9D8EC0;text-align:left;text-transform:uppercase;letter-spacing:0.4px;border-bottom:1px solid rgba(124,58,237,0.15);}
.data-table td{padding:13px 16px;font-size:14px;color:#E2D9FF;border-bottom:1px solid rgba(255,255,255,0.05);}
.data-table tr:hover td{background:rgba(124,58,237,0.06);}
.data-table tr:last-child td{border-bottom:none;}

/* Badges */
.badge{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700;}
.badge-violet{background:rgba(124,58,237,0.2);color:#A78BFA;border:1px solid rgba(124,58,237,0.3);}
.badge-green{background:rgba(52,211,153,0.15);color:#34D399;border:1px solid rgba(52,211,153,0.25);}
.badge-orange{background:rgba(251,146,60,0.15);color:#FB923C;border:1px solid rgba(251,146,60,0.25);}
.badge-blue{background:rgba(96,165,250,0.15);color:#60A5FA;border:1px solid rgba(96,165,250,0.25);}

/* Buttons */
.btn-v{padding:9px 18px;background:linear-gradient(135deg,#7C3AED,#6D28D9);color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;font-family:'Pretendard',sans-serif;transition:all 0.18s;}
.btn-v:hover{transform:translateY(-1px);box-shadow:0 6px 18px rgba(124,58,237,0.4);}
.btn-ghost-v{padding:9px 18px;background:transparent;color:#A78BFA;border:1px solid rgba(124,58,237,0.35);border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;font-family:'Pretendard',sans-serif;transition:all 0.18s;}
.btn-ghost-v:hover{background:rgba(124,58,237,0.1);border-color:#7C3AED;}
.btn-danger{padding:9px 18px;background:rgba(239,68,68,0.12);color:#F87171;border:1px solid rgba(239,68,68,0.25);border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;font-family:'Pretendard',sans-serif;transition:all 0.18s;}
.btn-danger:hover{background:rgba(239,68,68,0.2);}

/* Sub tabs */
.sub-tabs{display:flex;gap:2px;border-bottom:1px solid rgba(124,58,237,0.15);margin-bottom:24px;}
.sub-tab{padding:9px 18px;border:none;background:transparent;font-size:13px;font-weight:500;color:#9D8EC0;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;transition:all 0.18s;font-family:'Pretendard',sans-serif;}
.sub-tab:hover{color:#A78BFA;}
.sub-tab.active{color:#A78BFA;border-bottom-color:#7C3AED;font-weight:700;}

/* Modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.7);display:flex;align-items:center;justify-content:center;z-index:200;padding:20px;}
.modal-box{background:#1A1333;border:1px solid rgba(124,58,237,0.3);border-radius:16px;width:100%;max-width:540px;max-height:85vh;overflow-y:auto;box-shadow:0 24px 60px rgba(0,0,0,0.5);animation:fadeUp 0.25s ease;}
.modal-header{padding:24px 24px 0;display:flex;justify-content:space-between;align-items:center;}
.modal-title{font-size:18px;font-weight:700;color:#F0EAFF;letter-spacing:-0.3px;}
.modal-close{width:32px;height:32px;border:none;background:rgba(124,58,237,0.15);border-radius:8px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#9D8EC0;transition:all 0.15s;font-size:16px;}
.modal-close:hover{background:rgba(124,58,237,0.3);color:#F0EAFF;}
.modal-body{padding:24px;}
.modal-footer{padding:0 24px 24px;display:flex;gap:10px;justify-content:flex-end;}

/* Form */
.form-group{margin-bottom:16px;}
.form-label{font-size:12px;font-weight:600;color:#9D8EC0;text-transform:uppercase;letter-spacing:0.4px;margin-bottom:6px;}
.form-input{width:100%;padding:10px 14px;background:#0F0A1E;border:1px solid rgba(124,58,237,0.25);border-radius:8px;font-size:14px;color:#F0EAFF;outline:none;font-family:'Pretendard',sans-serif;transition:border-color 0.15s;}
.form-input:focus{border-color:#7C3AED;box-shadow:0 0 0 3px rgba(124,58,237,0.15);}
.form-input::placeholder{color:#4B3F6B;}
.form-select{width:100%;padding:10px 14px;background:#0F0A1E;border:1px solid rgba(124,58,237,0.25);border-radius:8px;font-size:14px;color:#F0EAFF;outline:none;font-family:'Pretendard',sans-serif;-webkit-appearance:none;cursor:pointer;}
.form-select:focus{border-color:#7C3AED;}

/* History */
.history-item{background:#1A1333;border:1px solid rgba(124,58,237,0.15);border-radius:12px;padding:18px;cursor:pointer;transition:all 0.2s;margin-bottom:12px;}
.history-item:hover{border-color:rgba(124,58,237,0.4);transform:translateX(3px);}
.history-time{font-size:11px;color:#4B3F6B;margin-bottom:6px;}
.history-devices{font-size:14px;font-weight:700;color:#F0EAFF;margin-bottom:6px;}
.history-meta{display:flex;gap:10px;flex-wrap:wrap;}

/* Share */
.share-link-box{background:#0F0A1E;border:1px solid rgba(124,58,237,0.3);border-radius:10px;padding:14px 16px;display:flex;align-items:center;gap:10px;margin-bottom:16px;}
.share-link-text{flex:1;font-size:13px;color:#A78BFA;font-family:'Pretendard',sans-serif;word-break:break-all;}
.copy-btn{padding:6px 14px;background:rgba(124,58,237,0.2);color:#A78BFA;border:1px solid rgba(124,58,237,0.35);border-radius:6px;font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap;font-family:'Pretendard',sans-serif;transition:all 0.15s;}
.copy-btn:hover{background:rgba(124,58,237,0.35);}

/* Chart wrap */
.chart-wrap{background:#1A1333;border:1px solid rgba(124,58,237,0.15);border-radius:12px;padding:22px;}
.chart-title{font-size:14px;font-weight:700;color:#F0EAFF;margin-bottom:6px;}
.chart-sub{font-size:12px;color:#9D8EC0;margin-bottom:18px;}
.chart-container{position:relative;height:240px;width:100%;}

/* Toast */
.toast{position:fixed;bottom:32px;right:32px;background:#7C3AED;color:#fff;padding:13px 20px;border-radius:10px;font-size:14px;font-weight:500;z-index:300;animation:slideLeft 0.3s ease;box-shadow:0 4px 20px rgba(124,58,237,0.4);}

/* Footer */
.gnav-footer{background:#0A0715;border-top:1px solid rgba(124,58,237,0.12);padding:24px 32px;text-align:center;font-size:12px;color:#4B3F6B;}

/* Responsive */
@media(max-width:768px){
  .stat-grid{grid-template-columns:1fr 1fr;}
  .gnav-inner{padding:0 16px;}
  .page-wrap{padding:24px 16px;}
}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect } = React;
const { LineChart, Line, BarChart, Bar, XAxis, YAxis, CartesianGrid, Tooltip, Legend, ResponsiveContainer } = Recharts;

function Toast({msg,onHide}){
  useEffect(()=>{const t=setTimeout(onHide,2600);return()=>clearTimeout(t);},[]);
  return <div className="toast">{msg}</div>;
}

/* ─── 데이터 관리 ─── */
const DEVICES_DATA=[
  {id:1,name:'갤럭시 S25',brand:'삼성',price:'1,350,000',carrier:'전 통신사',status:'활성'},
  {id:2,name:'아이폰 16',brand:'애플',price:'1,250,000',carrier:'전 통신사',status:'활성'},
  {id:3,name:'갤럭시 A55',brand:'삼성',price:'650,000',carrier:'전 통신사',status:'활성'},
  {id:4,name:'갤럭시 S25+',brand:'삼성',price:'1,550,000',carrier:'전 통신사',status:'활성'},
  {id:5,name:'아이폰 16 Pro',brand:'애플',price:'1,550,000',carrier:'전 통신사',status:'검토 중'},
];
const PLANS_DATA=[
  {id:1,name:'5G 시그니처',carrier:'SKT',fee:'100,000',data:'무제한',status:'활성'},
  {id:2,name:'5G 프리미어 에센셜',carrier:'SKT',fee:'80,000',data:'110GB',status:'활성'},
  {id:3,name:'5G 프리미어 슈퍼',carrier:'KT',fee:'100,000',data:'무제한',status:'활성'},
  {id:4,name:'5G 스탠다드',carrier:'LGU+',fee:'60,000',data:'30GB',status:'활성'},
  {id:5,name:'5G 라이트',carrier:'LGU+',fee:'45,000',data:'5GB',status:'검토 중'},
];
const SUBSIDY_DATA=[
  {id:1,device:'갤럭시 S25',carrier:'SKT',public:'300,000',store:'150,000',updated:'2026.05.24'},
  {id:2,device:'갤럭시 S25',carrier:'KT',public:'280,000',store:'120,000',updated:'2026.05.24'},
  {id:3,device:'아이폰 16',carrier:'SKT',public:'200,000',store:'80,000',updated:'2026.05.22'},
  {id:4,device:'아이폰 16',carrier:'LGU+',public:'160,000',store:'60,000',updated:'2026.05.22'},
  {id:5,device:'갤럭시 A55',carrier:'KT',public:'180,000',store:'90,000',updated:'2026.05.20'},
];

function AdminScreen(){
  const [subTab,setSubTab]=useState('단말기');
  const [showAddModal,setShowAddModal]=useState(false);
  const [showDeleteConfirm,setShowDeleteConfirm]=useState(null);
  const [editItem,setEditItem]=useState(null);
  const [toast,setToast]=useState(null);
  const [devices,setDevices]=useState(DEVICES_DATA);
  const [plans,setPlans]=useState(PLANS_DATA);
  const [subsidies,setSubsidies]=useState(SUBSIDY_DATA);

  const handleDelete=(id)=>{
    if(subTab==='단말기') setDevices(d=>d.filter(x=>x.id!==id));
    if(subTab==='요금제') setPlans(d=>d.filter(x=>x.id!==id));
    if(subTab==='지원금') setSubsidies(d=>d.filter(x=>x.id!==id));
    setShowDeleteConfirm(null);
    setToast('항목이 삭제되었습니다.');
  };
  const handleAdd=()=>{setShowAddModal(false);setToast('새 항목이 등록되었습니다.');};

  const currentData=subTab==='단말기'?devices:subTab==='요금제'?plans:subsidies;

  return(
    <div className="page-wrap">
      <div className="page-header">
        <div><div className="page-title">데이터 관리</div><div className="page-desc">단말기·요금제·지원금 데이터를 관리합니다.</div></div>
        <button className="btn-v" onClick={()=>setShowAddModal(true)}><i className="ph ph-plus"/> 새 항목 추가</button>
      </div>
      <div className="stat-grid">
        {[
          {label:'등록 단말기',value:devices.length+'개',icon:'ph-device-mobile',color:'rgba(124,58,237,0.15)',ic:'#A78BFA'},
          {label:'등록 요금제',value:plans.length+'개',icon:'ph-sim-card',color:'rgba(52,211,153,0.1)',ic:'#34D399'},
          {label:'지원금 항목',value:subsidies.length+'건',icon:'ph-currency-krw',color:'rgba(96,165,250,0.1)',ic:'#60A5FA'},
          {label:'최근 업데이트',value:'2026.05.24',icon:'ph-calendar-check',color:'rgba(251,146,60,0.1)',ic:'#FB923C'},
        ].map(s=>(
          <div key={s.label} className="stat-card fade-up">
            <div className="stat-icon" style={{background:s.color}}><i className={`ph ${s.icon}`} style={{color:s.ic,fontSize:18}}/></div>
            <div className="stat-value">{s.value}</div>
            <div className="stat-label">{s.label}</div>
          </div>
        ))}
      </div>
      <div className="card">
        <div className="sub-tabs">
          {['단말기','요금제','지원금'].map(t=>(
            <button key={t} className={`sub-tab ${subTab===t?'active':''}`} onClick={()=>setSubTab(t)}>{t}</button>
          ))}
        </div>
        <table className="data-table">
          <thead>
            <tr>
              {subTab==='단말기'&&<><th>단말기명</th><th>제조사</th><th>출고가</th><th>통신사</th><th>상태</th><th></th></>}
              {subTab==='요금제'&&<><th>요금제명</th><th>통신사</th><th>월 요금</th><th>데이터</th><th>상태</th><th></th></>}
              {subTab==='지원금'&&<><th>단말기</th><th>통신사</th><th>공시지원금</th><th>매장지원금</th><th>갱신일</th><th></th></>}
            </tr>
          </thead>
          <tbody>
            {currentData.map(row=>(
              <tr key={row.id}>
                {subTab==='단말기'&&<>
                  <td style={{fontWeight:600}}>{row.name}</td><td>{row.brand}</td>
                  <td>{row.price}원</td><td>{row.carrier}</td>
                  <td><span className={`badge ${row.status==='활성'?'badge-green':'badge-orange'}`}>{row.status}</span></td>
                </>}
                {subTab==='요금제'&&<>
                  <td style={{fontWeight:600}}>{row.name}</td><td><span className="badge badge-violet">{row.carrier}</span></td>
                  <td>{row.fee}원</td><td>{row.data}</td>
                  <td><span className={`badge ${row.status==='활성'?'badge-green':'badge-orange'}`}>{row.status}</span></td>
                </>}
                {subTab==='지원금'&&<>
                  <td style={{fontWeight:600}}>{row.device}</td><td><span className="badge badge-violet">{row.carrier}</span></td>
                  <td style={{color:'#34D399',fontWeight:700}}>{row.public}원</td>
                  <td>{row.store}원</td><td style={{color:'#9D8EC0'}}>{row.updated}</td>
                </>}
                <td>
                  <div style={{display:'flex',gap:6}}>
                    <button className="btn-ghost-v" style={{padding:'5px 10px',fontSize:12}} onClick={()=>setEditItem(row)}>수정</button>
                    <button className="btn-danger" style={{padding:'5px 10px',fontSize:12}} onClick={()=>setShowDeleteConfirm(row.id)}>삭제</button>
                  </div>
                </td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>

      {showAddModal&&(
        <div className="modal-overlay" onClick={e=>e.target===e.currentTarget&&setShowAddModal(false)}>
          <div className="modal-box">
            <div className="modal-header">
              <div className="modal-title">{subTab} 추가</div>
              <button className="modal-close" onClick={()=>setShowAddModal(false)}>×</button>
            </div>
            <div className="modal-body">
              {subTab==='단말기'&&<>
                <div className="form-group"><div className="form-label">단말기명</div><input className="form-input" placeholder="예: 갤럭시 S26"/></div>
                <div className="form-group"><div className="form-label">제조사</div><select className="form-select"><option>삼성</option><option>애플</option><option>LG</option></select></div>
                <div className="form-group"><div className="form-label">출고가 (원)</div><input className="form-input" type="number" placeholder="1350000"/></div>
              </>}
              {subTab==='요금제'&&<>
                <div className="form-group"><div className="form-label">요금제명</div><input className="form-input" placeholder="예: 5G 라이트 플러스"/></div>
                <div className="form-group"><div className="form-label">통신사</div><select className="form-select"><option>SKT</option><option>KT</option><option>LGU+</option></select></div>
                <div className="form-group"><div className="form-label">월 요금 (원)</div><input className="form-input" type="number" placeholder="55000"/></div>
                <div className="form-group"><div className="form-label">데이터</div><input className="form-input" placeholder="예: 15GB 또는 무제한"/></div>
              </>}
              {subTab==='지원금'&&<>
                <div className="form-group"><div className="form-label">단말기</div><select className="form-select"><option>갤럭시 S25</option><option>아이폰 16</option></select></div>
                <div className="form-group"><div className="form-label">통신사</div><select className="form-select"><option>SKT</option><option>KT</option><option>LGU+</option></select></div>
                <div className="form-group"><div className="form-label">공시지원금 (원)</div><input className="form-input" type="number" placeholder="300000"/></div>
                <div className="form-group"><div className="form-label">매장지원금 (원)</div><input className="form-input" type="number" placeholder="150000"/></div>
              </>}
            </div>
            <div className="modal-footer">
              <button className="btn-ghost-v" onClick={()=>setShowAddModal(false)}>취소</button>
              <button className="btn-v" onClick={handleAdd}>등록</button>
            </div>
          </div>
        </div>
      )}

      {showDeleteConfirm&&(
        <div className="modal-overlay" onClick={e=>e.target===e.currentTarget&&setShowDeleteConfirm(null)}>
          <div className="modal-box" style={{maxWidth:400}}>

          </div>
        </div>
      )}
      {toast&&<Toast msg={toast} onHide={()=>setToast(null)}/>}
    </div>
  );
}
