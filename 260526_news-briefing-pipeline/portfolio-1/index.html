<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body, #root {
  width: 100%; height: 100%;
  font-family: 'Pretendard', 'Apple SD Gothic Neo', sans-serif;
  background: #F4F7FA;
  color: #1A2E3B;
}
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(6px); }
  to { opacity: 1; transform: translateY(0); }
}
@keyframes slideInRight {
  from { opacity: 0; transform: translateX(20px); }
  to { opacity: 1; transform: translateX(0); }
}
@keyframes pulseDot {
  0%, 100% { opacity: 1; transform: scale(1); }
  50% { opacity: 0.5; transform: scale(1.3); }
}
@keyframes countUp {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}
@keyframes slideInDrawer {
  from { transform: translateX(100%); }
  to { transform: translateX(0); }
}
@keyframes toastIn {
  from { opacity: 0; transform: translateY(-12px); }
  to { opacity: 1; transform: translateY(0); }
}
@keyframes spinLoader {
  to { transform: rotate(360deg); }
}
.animate-fade { animation: fadeIn 0.3s ease both; }
.animate-slide { animation: slideInRight 0.3s ease both; }
.stagger-1 { animation-delay: 0.05s; }
.stagger-2 { animation-delay: 0.10s; }
.stagger-3 { animation-delay: 0.15s; }
.stagger-4 { animation-delay: 0.20s; }
</style>
</head>

function StatusBadge({ status, size = 'sm' }) {
  const styles = {
    completed: { bg: '#E8F5ED', color: '#2D8A5F', label: '완료' },
    running: { bg: '#EAF3F7', color: '#2A6E8C', label: '실행 중' },
    waiting: { bg: '#F2F4F6', color: '#8B9CAA', label: '대기' },
    failed: { bg: '#FDECEA', color: '#C03030', label: '실패' },
    retry: { bg: '#FEF3E2', color: '#D97706', label: '재시도' },
    pending: { bg: '#FEF3E2', color: '#D97706', label: '대기 중' },
  };
  const s = styles[status] || styles.waiting;
  return (
    <span style={{
      background: s.bg, color: s.color,
      padding: size === 'sm' ? '2px 8px' : '4px 12px',
      borderRadius: 4, fontSize: size === 'sm' ? 11 : 12,
      fontWeight: 600, display: 'inline-flex', alignItems: 'center', gap: 4,
    }}>
      {status === 'running' && (
        <span style={{
          width: 6, height: 6, borderRadius: '50%', background: s.color,
          animation: 'pulseDot 1.2s ease-in-out infinite',
          display: 'inline-block',
        }} />
      )}
      {s.label}
    </span>
  );
}

function LevelBadge({ level }) {
  const styles = { INFO: { bg: '#EAF3F7', color: '#2A6E8C' }, WARNING: { bg: '#FEF3E2', color: '#D97706' }, ERROR: { bg: '#FDECEA', color: '#C03030' } };
  const s = styles[level] || styles.INFO;
  return <span style={{ background: s.bg, color: s.color, padding: '2px 7px', borderRadius: 3, fontSize: 10, fontWeight: 700 }}>{level}</span>;
}

function Toast({ message, onClose }) {
  useEffect(() => {
    const t = setTimeout(onClose, 3000);
    return () => clearTimeout(t);
  }, []);
  return (
    <div style={{
      position: 'fixed', top: 72, right: 24, zIndex: 1000,
      background: COLORS.textPrimary, color: '#fff',
      padding: '12px 20px', borderRadius: 8,
      fontSize: 14, fontWeight: 500,
      animation: 'toastIn 0.25s ease',
      display: 'flex', alignItems: 'center', gap: 10,
      boxShadow: '0 4px 16px rgba(0,0,0,0.18)',
    }}>
      <span style={{ width: 8, height: 8, borderRadius: '50%', background: COLORS.success, display: 'inline-block' }} />
      {message}
    </div>
  );
}

function Drawer({ title, onClose, children }) {
  return (
    <div style={{ position: 'fixed', inset: 0, zIndex: 500 }}>
      <div onClick={onClose} style={{ position: 'absolute', inset: 0, background: 'rgba(26,46,59,0.3)' }} />
      <div style={{
        position: 'absolute', right: 0, top: 0, bottom: 0, width: 480,
        background: COLORS.surface, display: 'flex', flexDirection: 'column',
        animation: 'slideInDrawer 0.3s ease',
        boxShadow: '-4px 0 24px rgba(0,0,0,0.12)',
      }}>
        <div style={{ padding: '20px 24px', borderBottom: `1px solid ${COLORS.border}`, display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
          <span style={{ fontWeight: 700, fontSize: 16, color: COLORS.textPrimary }}>{title}</span>
          <button onClick={onClose} style={{ background: 'none', border: 'none', cursor: 'pointer', color: COLORS.textSecondary, display: 'flex' }}>
            <i data-lucide="x" style={{ width: 20, height: 20 }} />
          </button>
        </div>
        <div style={{ flex: 1, overflowY: 'auto', padding: 24 }}>{children}</div>
      </div>
    </div>
  );
}

function KpiCard({ label, value, unit, icon, color, delay }) {

      borderRadius: 8, padding: 20,
      display: 'flex', flexDirection: 'column', gap: 12,
    }}>
      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start' }}>
        <span style={{ fontSize: 13, color: COLORS.textSecondary, fontWeight: 500 }}>{label}</span>
        <span style={{ width: 32, height: 32, borderRadius: 6, background: color + '18', display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
          <i data-lucide={icon} style={{ width: 16, height: 16, color }} />
        </span>
      </div>
      <div style={{ display: 'flex', alignItems: 'baseline', gap: 4 }}>
        <span style={{ fontSize: 28, fontWeight: 700, color: COLORS.textPrimary, animation: 'countUp 0.5s ease' }}>{value}</span>
        {unit && <span style={{ fontSize: 13, color: COLORS.textSecondary }}>{unit}</span>}
      </div>
    </div>
  );
}

            textAlign: 'left', transition: 'all 0.2s',
          }}>
            <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: 8 }}>
              <span style={{ fontSize: 12, fontWeight: 700, color: COLORS.primary }}>{stage.id}단계</span>

                  <Tooltip />

            <div style={{ display: 'grid', gridTemplateColumns: 'repeat(3, 1fr)', gap: 10 }}>
              {[
                { label: '입력 건수', val: selectedStage.input != null ? `${selectedStage.input}건` : '-' },
                { label: '출력 건수', val: selectedStage.output != null ? `${selectedStage.output}건` : '-' },
                { label: '처리 시간', val: selectedStage.duration || '-' },

          <span style={{ fontSize: 14, fontWeight: 700 }}>실행 로그</span>

}

function RetryMonitorView() {
  const [items, setItems] = useState(RETRY_QUEUE);
  const [toast, setToast] = useState(null);

  const handleRetry = (id) => {
    setItems(prev => prev.map(it => it.id === id ? { ...it, nextRetry: '즉시', status: 'running' } : it));
    setToast('즉시 재시도 요청이 등록되었습니다.');
    setTimeout(() => setItems(prev => prev.map(it => it.id === id ? { ...it, status: 'pending', nextRetry: '06:31:30' } : it)), 2000);
  };

  const handleSkip = (id) => {
    setItems(prev => prev.map(it => it.id === id ? { ...it, status: 'skipped' } : it));
    setToast('해당 항목이 skip 처리되었습니다.');
  };

  return (
    <div className="animate-fade" style={{ display: 'flex', flexDirection: 'column', gap: 20 }}>
      {toast && <Toast message={toast} onClose={() => setToast(null)} />}
      <div>
        <h2 style={{ fontSize: 20, fontWeight: 700, color: COLORS.textPrimary }}>지수 백오프 재시도 관리</h2>
        <p style={{ fontSize: 13, color: COLORS.textSecondary, marginTop: 2 }}>API 호출 실패 및 외부 서비스 오류에 대한 재시도 현황을 관리합니다.</p>
      </div>

      <div style={{ display: 'grid', gridTemplateColumns: 'repeat(3, 1fr)', gap: 14 }}>
        {[
          { label: '대기 중', value: items.filter(i => i.status === 'pending').length, color: COLORS.warning, icon: 'clock' },
          { label: '최대 초과 (실패)', value: items.filter(i => i.status === 'failed').length, color: COLORS.error, icon: 'x-circle' },
          { label: 'Skip 처리', value: items.filter(i => i.status === 'skipped').length, color: COLORS.textSecondary, icon: 'skip-forward' },
        ].map((item, i) => (
          <div key={i} style={{ background: COLORS.surface, border: `1px solid ${COLORS.border}`, borderRadius: 8, padding: '16px 20px', display: 'flex', alignItems: 'center', gap: 14 }}>
            <span style={{ width: 36, height: 36, borderRadius: 8, background: item.color + '18', display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
              <i data-lucide={item.icon} style={{ width: 18, height: 18, color: item.color }} />
            </span>
            <div>
              <div style={{ fontSize: 22, fontWeight: 700, color: COLORS.textPrimary }}>{item.value}</div>
              <div style={{ fontSize: 12, color: COLORS.textSecondary }}>{item.label}</div>
            </div>
          </div>
        ))}
      </div>

      <div style={{ background: COLORS.surface, border: `1px solid ${COLORS.border}`, borderRadius: 8 }}>
        <div style={{ padding: '14px 20px', borderBottom: `1px solid ${COLORS.border}` }}>
          <span style={{ fontSize: 14, fontWeight: 700 }}>재시도 대기 목록</span>
        </div>
        <div>
          {items.map((item, i) => (
            <div key={item.id} style={{
              padding: '16px 20px', borderBottom: i < items.length - 1 ? `1px solid ${COLORS.border}` : 'none',
              display: 'flex', alignItems: 'center', gap: 16,
              textDecoration: item.status === 'skipped' ? 'line-through' : 'none',
              opacity: item.status === 'skipped' ? 0.5 : 1,
            }}>
              <div style={{ flex: 1 }}>
                <div style={{ display: 'flex', alignItems: 'center', gap: 8, marginBottom: 4 }}>
                  <span style={{ fontSize: 13, fontWeight: 700, color: COLORS.textPrimary }}>{item.stage}</span>
                  <StatusBadge status={item.status === 'skipped' ? 'waiting' : item.status} />
                </div>
                <div style={{ display: 'flex', gap: 16, fontSize: 12, color: COLORS.textSecondary }}>
                  <span>에러: <strong style={{ color: COLORS.error }}>{item.errorCode}</strong></span>
                  <span>시도 {item.attempts}/{item.maxAttempts}회</span>
                  <span>백오프 {item.backoff}</span>
                  <span>다음 시도: {item.nextRetry}</span>
                </div>
              </div>
              {item.status !== 'failed' && item.status !== 'skipped' && (
                <div style={{ display: 'flex', gap: 8 }}>
                  <button onClick={() => handleRetry(item.id)} style={{
                    padding: '6px 12px', fontSize: 12, borderRadius: 6, cursor: 'pointer', fontWeight: 600,
                    background: COLORS.primary, color: '#fff', border: 'none',
                    display: 'flex', alignItems: 'center', gap: 5,
                  }}>
                    <i data-lucide="refresh-cw" style={{ width: 12, height: 12 }} />
                    즉시 재시도
                  </button>
                  <button onClick={() => handleSkip(item.id)} style={{
                    padding: '6px 12px', fontSize: 12, borderRadius: 6, cursor: 'pointer', fontWeight: 600,
                    background: COLORS.bg, color: COLORS.textSecondary,
                    border: `1px solid ${COLORS.border}`,
                    display: 'flex', alignItems: 'center', gap: 5,
                  }}>
                    <i data-lucide="skip-forward" style={{ width: 12, height: 12 }} />
                    Skip
                  </button>
                </div>
              )}
              {item.status === 'failed' && (
                <span style={{ fontSize: 12, fontWeight: 700, color: COLORS.error, background: '#FDECEA', padding: '4px 10px', borderRadius: 4 }}>FAIL (최대 초과)</span>
              )}
            </div>
          ))}
        </div>
      </div>

      <div style={{ background: COLORS.surface, border: `1px solid ${COLORS.border}`, borderRadius: 8, padding: 20 }}>
        <h3 style={{ fontSize: 14, fontWeight: 700, marginBottom: 12 }}>백오프 지수 공식</h3>
        <div style={{ fontFamily: 'monospace', background: COLORS.bg, borderRadius: 6, padding: '12px 16px', fontSize: 13, color: COLORS.textSecondary }}>
          next_retry_at = now + (2^attempt × base_delay)<br />
          <span style={{ color: COLORS.primary }}>base_delay = 15s</span> | 최대 시도 = 3회 | 최대 대기 = 120s
        </div>
      </div>
    </div>
  );
}

function SettingsView() {
  const [settings, setSettings] = useState(SETTINGS_CONFIG);
  const [editing, setEditing] = useState(null);
  const [editVal, setEditVal] = useState('');
  const [toast, setToast] = useState(null);

  const handleEdit = (setting) => { setEditing(setting.key); setEditVal(setting.masked ? '' : setting.value); };
  const handleSave = (key) => {
    setSettings(prev => prev.map(s => s.key === key ? { ...s, value: editVal || s.value } : s));
    setEditing(null);
    setToast('설정이 저장되었습니다. 다음 파이프라인 실행에 적용됩니다.');
  };

  return (
    <div className="animate-fade" style={{ display: 'flex', flexDirection: 'column', gap: 20 }}>
      {toast && <Toast message={toast} onClose={() => setToast(null)} />}
      <div>
        <h2 style={{ fontSize: 20, fontWeight: 700, color: COLORS.textPrimary }}>환경변수 및 파이프라인 설정</h2>
        <p style={{ fontSize: 13, color: COLORS.textSecondary, marginTop: 2 }}>민감정보와 운영 파라미터를 안전하게 관리합니다.</p>
      </div>

      <div style={{ background: '#FEF3E2', border: '1px solid #F5D999', borderRadius: 8, padding: '12px 16px', display: 'flex', gap: 10, alignItems: 'flex-start' }}>
        <i data-lucide="shield" style={{ width: 16, height: 16, color: COLORS.accent, flexShrink: 0, marginTop: 1 }} />
        <p style={{ fontSize: 13, color: '#92610A' }}>민감 정보(API 키)는 마스킹 표시되며, UI에서 원본 값은 노출되지 않습니다. pydantic-settings를 통해 환경변수로 안전하게 관리됩니다.</p>
      </div>

      <div style={{ background: COLORS.surface, border: `1px solid ${COLORS.border}`, borderRadius: 8 }}>
        <div style={{ padding: '14px 20px', borderBottom: `1px solid ${COLORS.border}` }}>
          <span style={{ fontSize: 14, fontWeight: 700 }}>설정 항목</span>
        </div>
        {settings.map((setting, i) => (
          <div key={setting.key} style={{
            padding: '16px 20px', borderBottom: i < settings.length - 1 ? `1px solid ${COLORS.border}` : 'none',
            display: 'flex', alignItems: 'center', gap: 16,
          }}>
            <div style={{ flex: 1 }}>
              <div style={{ fontSize: 13, fontWeight: 600, color: COLORS.textPrimary }}>{setting.label}</div>
              <div style={{ fontSize: 12, color: COLORS.textSecondary, marginTop: 2 }}>{setting.key}</div>
            </div>
            {editing === setting.key ? (
              <div style={{ display: 'flex', gap: 8, alignItems: 'center' }}>
                <input
                  type={setting.masked ? 'password' : 'text'}
                  value={editVal}
                  onChange={e => setEditVal(e.target.value)}
                  placeholder={setting.masked ? '새 값 입력...' : setting.value}
                  style={{
                    padding: '6px 12px', border: `1px solid ${COLORS.primary}`, borderRadius: 6, fontSize: 13,
                    outline: 'none', width: 200,
                  }}
                />
                <button onClick={() => handleSave(setting.key)} style={{
                  padding: '6px 12px', fontSize: 12, borderRadius: 6, cursor: 'pointer',
                  background: COLORS.primary, color: '#fff', border: 'none', fontWeight: 600,
                }}>저장</button>
                <button onClick={() => setEditing(null)} style={{
                  padding: '6px 10px', fontSize: 12, borderRadius: 6, cursor: 'pointer',
                  background: COLORS.bg, color: COLORS.textSecondary, border: `1px solid ${COLORS.border}`,
                }}>취소</button>
              </div>
            ) : (
              <div style={{ display: 'flex', gap: 12, alignItems: 'center' }}>
                <code style={{
                  fontSize: 13, fontFamily: 'monospace',
                  background: setting.masked ? '#F2F4F6' : COLORS.bg,
                  padding: '4px 10px', borderRadius: 4,
                  color: setting.masked ? COLORS.textSecondary : COLORS.textPrimary,
                  letterSpacing: setting.masked ? 2 : 0,
                }}>
                  {setting.value}
                </code>
                {setting.masked && <span style={{ fontSize: 10, padding: '2px 6px', background: '#E8F5ED', color: '#2D8A5F', borderRadius: 3, fontWeight: 700 }}>MASKED</span>}
                <button onClick={() => handleEdit(setting)} style={{
                  padding: '5px 10px', fontSize: 12, borderRadius: 5, cursor: 'pointer',
                  background: COLORS.bg, color: COLORS.textSecondary,
                  border: `1px solid ${COLORS.border}`, display: 'flex', alignItems: 'center', gap: 4,
                }}>
                  <i data-lucide="edit-2" style={{ width: 12, height: 12 }} />
                  편집
                </button>
              </div>
            )}
          </div>
        ))}
      </div>
    </div>
  );
}
