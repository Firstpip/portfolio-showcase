<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body, #root {
  width: 100%; height: 100%;
  font-family: 'Pretendard', 'Apple SD Gothic Neo', sans-serif;
  background: #10131A;
  color: #E8EAF0;
}
@keyframes fadeInUp {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}
@keyframes glassAppear {
  from { opacity: 0; transform: scale(0.97); }
  to { opacity: 1; transform: scale(1); }
}
@keyframes slideLeft {
  from { opacity: 0; transform: translateX(-16px); }
  to { opacity: 1; transform: translateX(0); }
}
@keyframes shimmer {
  0% { background-position: -400px 0; }
  100% { background-position: 400px 0; }
}
@keyframes toastSlide {
  from { opacity: 0; transform: translateY(12px); }
  to { opacity: 1; transform: translateY(0); }
}
@keyframes barGrow {
  from { transform: scaleY(0); }
  to { transform: scaleY(1); }
}
.page-enter { animation: fadeInUp 0.35s ease both; }
.stagger-1 { animation-delay: 0.05s; }
.stagger-2 { animation-delay: 0.12s; }
.stagger-3 { animation-delay: 0.19s; }
.stagger-4 { animation-delay: 0.26s; }

function GlassCard({ children, style = {}, className = '' }) {
  return (
    <div className={`page-enter ${className}`} style={{
      background: C.card,
      border: `1px solid ${C.border}`,
      borderRadius: 12,
      backdropFilter: 'blur(8px)',
      ...style,
    }}>
      {children}
    </div>
  );
}

function Badge({ label, color, icon }) {
  return (
    <span style={{
      display: 'inline-flex', alignItems: 'center', gap: 4,
      padding: '3px 9px', borderRadius: 6, fontSize: 11, fontWeight: 600,
      background: color + '22', color,
    }}>
      {icon && <i className={icon} style={{ fontSize: 11 }} />}
      {label}
    </span>
  );
}

function Toast({ msg, onClose }) {
  useEffect(() => { const t = setTimeout(onClose, 3000); return () => clearTimeout(t); }, []);
  return (
    <div style={{
      position: 'fixed', bottom: 32, right: 24, zIndex: 999,
      background: C.card, border: `1px solid ${C.primary}`,
      padding: '12px 20px', borderRadius: 10,
      color: C.text, fontSize: 13, fontWeight: 500,
      animation: 'toastSlide 0.25s ease',
      boxShadow: `0 4px 24px rgba(123,92,196,0.3)`,
      display: 'flex', alignItems: 'center', gap: 10,
    }}>
      <i className="ph-check-circle" style={{ color: C.accent, fontSize: 16 }} />
      {msg}
    </div>
  );
}

function Modal({ title, onClose, children }) {
  return (
    <div style={{ position: 'fixed', inset: 0, zIndex: 600, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
      <div onClick={onClose} style={{ position: 'absolute', inset: 0, background: 'rgba(10,12,20,0.75)' }} />
      <div style={{
        position: 'relative', width: 600, maxHeight: '80vh',
        background: C.surface, border: `1px solid ${C.border}`,
        borderRadius: 16, overflow: 'hidden',
        animation: 'glassAppear 0.25s ease',
        boxShadow: '0 24px 64px rgba(0,0,0,0.5)',
      }}>
        <div style={{ padding: '20px 24px', borderBottom: `1px solid ${C.border}`, display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
          <span style={{ fontWeight: 700, fontSize: 16 }}>{title}</span>
          <button onClick={onClose} style={{ background: 'none', border: 'none', cursor: 'pointer', color: C.textSub, fontSize: 18 }}>
            <i className="ph-x" />
          </button>
        </div>
        <div style={{ overflowY: 'auto', maxHeight: 'calc(80vh - 65px)', padding: 24 }}>{children}</div>
      </div>
    </div>
  );
}

function ArchiveView() {
  const [query, setQuery] = useState('');
  const [category, setCategory] = useState('전체');
  const [modal, setModal] = useState(null);

  const filtered = ARCHIVE_DATA.filter(b =>
    (query === '' || b.title.includes(query)) &&
    (category === '전체' || b.categories.includes(category))
  );

  return (
    <div className="page-enter" style={{ display: 'flex', flexDirection: 'column', gap: 20 }}>
      <div>
        <h2 style={{ fontSize: 22, fontWeight: 700 }}>뉴스 브리핑 아카이브 검색</h2>

        <div style={{ display: 'flex', gap: 12, alignItems: 'center' }}>
          <div style={{ flex: 1, position: 'relative' }}>
            <i className="ph-magnifying-glass" style={{ position: 'absolute', left: 12, top: '50%', transform: 'translateY(-50%)', color: C.textSub, fontSize: 16 }} />
            <input
              value={query}
              onChange={e => setQuery(e.target.value)}
              placeholder="키워드 검색 (예: 반도체, 금리...)"
              style={{
                width: '100%', padding: '10px 14px 10px 38px',
                background: C.bg, border: `1px solid ${C.border}`,
                borderRadius: 8, color: C.text, fontSize: 14, outline: 'none',
              }}
            />
          </div>
          <div style={{ display: 'flex', gap: 6 }}>
            {['전체', '경제', '금융', '기술', '정치'].map(cat => (
              <button key={cat} onClick={() => setCategory(cat)} style={{
                padding: '8px 14px', borderRadius: 8, cursor: 'pointer', fontSize: 13, fontWeight: 600,
                background: category === cat ? C.primary : C.bg,
                color: category === cat ? '#fff' : C.textSub,
                border: `1px solid ${category === cat ? C.primary : C.border}`,
                transition: 'all 0.15s',
              }}>{cat}</button>
            ))}
          </div>
          <button style={{
            padding: '10px 18px', borderRadius: 8, cursor: 'pointer', fontWeight: 600, fontSize: 13,
            background: C.primary, color: '#fff', border: 'none',
            display: 'flex', alignItems: 'center', gap: 6,
          }}>
            <i className="ph-database" style={{ fontSize: 14 }} />
            검색
          </button>
        </div>
      </GlassCard>

      <div style={{ display: 'flex', flexDirection: 'column', gap: 10 }}>
        {filtered.map((brief, i) => (
          <div key={brief.id} onClick={() => setModal(brief)} className={`page-enter stagger-${Math.min(i + 1, 4)}`} style={{
            background: C.card, border: `1px solid ${C.border}`,
            borderRadius: 12, padding: '16px 20px', cursor: 'pointer',
            display: 'flex', alignItems: 'center', gap: 16,
            transition: 'all 0.2s ease',
            ':hover': { borderColor: C.primary },
          }}
            onMouseEnter={e => e.currentTarget.style.borderColor = C.primary}
            onMouseLeave={e => e.currentTarget.style.borderColor = C.border}
          >
            <div style={{ width: 48, height: 48, borderRadius: 10, background: C.primary + '22', display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0 }}>
              <i className="ph-newspaper" style={{ color: C.primary, fontSize: 22 }} />
            </div>
            <div style={{ flex: 1 }}>
              <div style={{ fontSize: 15, fontWeight: 600, color: C.text, marginBottom: 6, lineHeight: 1.4 }}>{brief.title}</div>
              <div style={{ display: 'flex', gap: 10, alignItems: 'center', flexWrap: 'wrap' }}>
                <span style={{ fontSize: 12, color: C.textSub }}>{brief.date}</span>
                <span style={{ fontSize: 12, color: C.textSub }}>수록 {brief.count}건</span>

                {brief.categories.map(c => <Badge key={c} label={c} color={C.secondary} />)}
              </div>
            </div>
            <i className="ph-arrow-right" style={{ color: C.textSub, fontSize: 18 }} />
          </div>
        ))}
        {filtered.length === 0 && (
          <div style={{ padding: '48px 24px', textAlign: 'center', color: C.textSub }}>
            <i className="ph-magnifying-glass" style={{ fontSize: 40, marginBottom: 12, display: 'block' }} />

          </div>
        )}
      </div>

      {modal && (
        <Modal title={`브리핑 상세 — ${modal.id}`} onClose={() => setModal(null)}>
          <div style={{ display: 'flex', flexDirection: 'column', gap: 16 }}>
            <div>
              <div style={{ fontSize: 11, color: C.textSub, marginBottom: 6 }}>브리핑 제목</div>
              <div style={{ fontSize: 16, fontWeight: 600, lineHeight: 1.5 }}>{modal.title}</div>
            </div>
            <div style={{ display: 'grid', gridTemplateColumns: 'repeat(3, 1fr)', gap: 10 }}>
              {[{ label: '생성 일자', val: modal.date }, { label: '수록 뉴스', val: `${modal.count}건` }, { label: '처리 시간', val: modal.duration }].map((item, i) => (
                <div key={i} style={{ background: C.bg, borderRadius: 8, padding: '12px 14px' }}>
                  <div style={{ fontSize: 11, color: C.textSub }}>{item.label}</div>
                  <div style={{ fontSize: 16, fontWeight: 700, marginTop: 4 }}>{item.val}</div>
                </div>
              ))}
            </div>
            <div>
              <div style={{ fontSize: 11, color: C.textSub, marginBottom: 8 }}>뉴스 카테고리 분포</div>
              <div style={{ height: 160 }}>
                <ResponsiveContainer width="100%" height="100%">
                  <PieChart>
                    <Pie data={modal.categories.map((c, i) => ({ name: c, value: Math.round(modal.count / modal.categories.length) }))} cx="50%" cy="50%" outerRadius={60} dataKey="value" label={({ name, value }) => `${name} ${value}건`} fontSize={12}>
                      {[C.primary, C.accent, C.warning].map((c, i) => <Cell key={i} fill={c} />)}
                    </Pie>
                    <Tooltip contentStyle={{ background: C.surface, border: `1px solid ${C.border}`, fontSize: 12 }} />
                  </PieChart>
                </ResponsiveContainer>
              </div>
            </div>
            <div style={{ background: C.bg, borderRadius: 8, padding: 14 }}>
              <div style={{ fontSize: 11, color: C.textSub, marginBottom: 6 }}>단계별 처리 현황</div>
              {[
                { stage: '1단계 JSON 필터링', input: 42, output: 38 },
                { stage: '2단계 분류·적격성', input: 38, output: modal.count + 8 },
                { stage: '3단계 등급 환산', input: modal.count + 8, output: modal.count },
              ].map((s, i) => (
                <div key={i} style={{ display: 'flex', justifyContent: 'space-between', padding: '6px 0', borderBottom: i < 2 ? `1px solid ${C.border}` : 'none', fontSize: 13 }}>
                  <span style={{ color: C.textSub }}>{s.stage}</span>
                  <span>{s.input}건 → <strong style={{ color: C.accent }}>{s.output}건</strong></span>
                </div>
              ))}
            </div>
          </div>
        </Modal>
      )}
    </div>
  );
}

            {KEYWORD_DATA.map((kw, i) => (

                <span style={{ width: 80, fontSize: 13, fontWeight: 600, color: C.text, textAlign: 'right' }}>{kw.keyword}</span>
                <div style={{ flex: 1, height: 8, borderRadius: 4, background: C.bg, overflow: 'hidden' }}>
                  <div style={{
                    height: '100%', borderRadius: 4,
                    background: `linear-gradient(90deg, ${C.primary}, ${C.secondary})`,
                    width: `${(kw.count / 20) * 100}%`,
                    transition: 'width 0.6s ease',
                  }} />
                </div>
                <span style={{ width: 30, fontSize: 12, color: C.textSub, textAlign: 'right' }}>{kw.count}</span>
                <i className={kw.trend === 'up' ? 'ph-trend-up' : kw.trend === 'down' ? 'ph-trend-down' : 'ph-minus'} style={{
                  fontSize: 14,
                  color: kw.trend === 'up' ? C.accent : kw.trend === 'down' ? C.error : C.textSub,
                }} />
              </div>
            ))}
          </div>
        </GlassCard>

        <GlassCard style={{ padding: 24 }}>
          <h3 style={{ fontSize: 14, fontWeight: 700, marginBottom: 4, color: C.textSub }}>카테고리 적격/비적격 비율</h3>
          <p style={{ fontSize: 11, color: C.textSub, marginBottom: 16 }}>Materialized View 최종 갱신: 2026.05.26 00:00</p>
          <div style={{ height: 200 }}>
            <ResponsiveContainer width="100%" height="100%">
              <BarChart data={[
                { cat: '경제', eligible: 72, notEligible: 28 },
                { cat: '금융', eligible: 65, notEligible: 35 },
                { cat: '기술', eligible: 80, notEligible: 20 },
                { cat: '정치', eligible: 58, notEligible: 42 },
              ]} barSize={24}>
                <CartesianGrid strokeDasharray="3 3" stroke={C.border} />
                <XAxis dataKey="cat" tick={{ fontSize: 12, fill: C.textSub }} />
                <YAxis tick={{ fontSize: 12, fill: C.textSub }} domain={[0, 100]} />
                <Tooltip contentStyle={{ background: C.surface, border: `1px solid ${C.border}`, fontSize: 12 }} formatter={v => `${v}%`} />
                <Bar dataKey="eligible" fill={C.accent} name="적격률" radius={[4, 4, 0, 0]} />
                <Bar dataKey="notEligible" fill={C.error + '66'} name="비적격률" radius={[4, 4, 0, 0]} />
              </BarChart>
            </ResponsiveContainer>
          </div>
        </GlassCard>
      </div>
    </div>
  );
}

function PromptEditorView() {
  const [activeType, setActiveType] = useState('prompt_1');
  const [editing, setEditing] = useState(null);
  const [editorContent, setEditorContent] = useState('');
  const [toast, setToast] = useState(null);
  const [showNew, setShowNew] = useState(false);

  const filtered = PROMPT_VERSIONS.filter(v => v.type === activeType);

  const sampleContent = {
    prompt_1: `당신은 뉴스 분류 전문가입니다.\n\n주어진 뉴스 항목을 분석하여:\n1. 카테고리 분류 (경제/금융/기술/정치/기타)\n2. 적격성 판정 (적격/비적격/중복)\n3. 우선순위 등급 (A/B/C)\n\n입력 데이터:\n{{news_items}}\n\n처리 날짜: {{date}}\n\nJSON 형식으로 응답하세요.`,
    prompt_2: `선별된 뉴스에 대한 심층 요약과 시사점을 작성합니다.\n\n수록 뉴스 목록:\n{{selected_news}}\n\n각 뉴스별:\n- 주요 내용 3줄 요약\n- 경제/사회적 시사점\n- 관련 키워드 3개\n\n전문가 수준으로 작성해주세요.`,
  };

  const handleEdit = (version) => {
    setEditing(version);
    setEditorContent(sampleContent[version.type] || '');
  };

  const handleSave = () => {
    setEditing(null);
    setToast('새 버전이 활성화되었습니다. 다음 파이프라인 실행에 적용됩니다.');
  };

  return (
    <div className="page-enter" style={{ display: 'flex', flexDirection: 'column', gap: 20 }}>
      {toast && <Toast msg={toast} onClose={() => setToast(null)} />}
      <div>
        <h2 style={{ fontSize: 22, fontWeight: 700 }}>프롬프트 템플릿 버전 관리</h2>
        <p style={{ fontSize: 13, color: C.textSub, marginTop: 4 }}>Claude API 프롬프트 버전 이력과 성능 지표를 관리합니다.</p>
      </div>

      <div style={{ display: 'flex', gap: 8 }}>
        {['prompt_1', 'prompt_2', 'prompt_3'].map(type => (
          <button key={type} onClick={() => setActiveType(type)} style={{
            padding: '8px 16px', borderRadius: 8, cursor: 'pointer', fontSize: 13, fontWeight: 600,
            background: activeType === type ? C.primary : C.card,
            color: activeType === type ? '#fff' : C.textSub,
            border: `1px solid ${activeType === type ? C.primary : C.border}`,
          }}>
            {type === 'prompt_1' ? '분류·적격성' : type === 'prompt_2' ? '요약·시사점' : '음성 스크립트'}
          </button>
        ))}
        <button onClick={() => setShowNew(true)} style={{
          marginLeft: 'auto', padding: '8px 16px', borderRadius: 8, cursor: 'pointer', fontSize: 13, fontWeight: 600,
          background: 'transparent', color: C.accent, border: `1px solid ${C.accent}`,
          display: 'flex', alignItems: 'center', gap: 6,
        }}>
          <i className="ph-plus" style={{ fontSize: 14 }} />
          새 버전 작성
        </button>
      </div>

      <GlassCard style={{ overflow: 'hidden' }}>
        <table style={{ width: '100%', borderCollapse: 'collapse' }}>
          <thead>
            <tr style={{ borderBottom: `1px solid ${C.border}` }}>
              {['버전', '프롬프트 유형', '적용 날짜', '평균 적격률', 'API 성공률', '상태', '액션'].map(h => (
                <th key={h} style={{ padding: '12px 16px', textAlign: 'left', fontSize: 12, fontWeight: 600, color: C.textSub }}>{h}</th>
              ))}
            </tr>
          </thead>
          <tbody>
            {(filtered.length > 0 ? filtered : PROMPT_VERSIONS.slice(0, 3)).map((v, i) => (
              <tr key={v.id} style={{ borderBottom: `1px solid ${C.border}` }}
                onMouseEnter={e => e.currentTarget.style.background = C.bg + '80'}
                onMouseLeave={e => e.currentTarget.style.background = 'transparent'}
              >
                <td style={{ padding: '14px 16px', fontSize: 13, fontFamily: 'monospace', color: C.secondary, fontWeight: 700 }}>{v.id}</td>
                <td style={{ padding: '14px 16px', fontSize: 13, color: C.text }}>{v.label}</td>
                <td style={{ padding: '14px 16px', fontSize: 13, color: C.textSub }}>{v.activatedAt}</td>
                <td style={{ padding: '14px 16px' }}>
                  <span style={{ fontSize: 14, fontWeight: 700, color: v.eligibleRate >= 60 ? C.accent : C.text }}>{v.eligibleRate}%</span>
                </td>
                <td style={{ padding: '14px 16px' }}>
                  <span style={{ fontSize: 14, fontWeight: 700, color: C.accent }}>{v.apiSuccess}%</span>
                </td>
                <td style={{ padding: '14px 16px' }}>
                  {v.active ? <Badge label="활성" color={C.accent} icon="ph-check-circle" /> : <Badge label="비활성" color={C.textSub} />}
                </td>
                <td style={{ padding: '14px 16px' }}>
                  <div style={{ display: 'flex', gap: 6 }}>
                    <button onClick={() => handleEdit(v)} style={{
                      padding: '5px 10px', borderRadius: 6, cursor: 'pointer', fontSize: 12, fontWeight: 600,
                      background: C.primary + '22', color: C.secondary, border: `1px solid ${C.primary + '44'}`,
                    }}>편집</button>
                    {!v.active && (
                      <button onClick={() => setToast(`${v.id} 버전으로 롤백되었습니다.`)} style={{
                        padding: '5px 10px', borderRadius: 6, cursor: 'pointer', fontSize: 12, fontWeight: 600,
                        background: C.warning + '22', color: C.warning, border: `1px solid ${C.warning + '44'}`,
                      }}>롤백</button>
                    )}
                  </div>
                </td>
              </tr>
            ))}
          </tbody>
        </table>
      </GlassCard>

      {editing && (
        <Modal title={`프롬프트 편집 — ${editing.id}`} onClose={() => setEditing(null)}>
          <div style={{ display: 'flex', flexDirection: 'column', gap: 14 }}>
            <div style={{ background: '#1A1E2E', borderRadius: 8, padding: 16, position: 'relative' }}>
              <div style={{ display: 'flex', gap: 8, marginBottom: 10, fontSize: 11, color: C.textSub }}>
                <Badge label="{{news_items}}" color={C.accent} />
                <Badge label="{{date}}" color={C.accent} />
                <Badge label="{{selected_news}}" color={C.accent} />
              </div>
              <textarea
                value={editorContent}
                onChange={e => setEditorContent(e.target.value)}
                style={{
                  width: '100%', minHeight: 200, background: 'transparent',
                  border: 'none', color: C.text, fontSize: 13, fontFamily: 'monospace',
                  resize: 'vertical', outline: 'none', lineHeight: 1.7,
                }}
              />
            </div>
            <div style={{ display: 'flex', gap: 8, justifyContent: 'flex-end' }}>
              <button onClick={() => setEditing(null)} style={{
                padding: '9px 18px', borderRadius: 8, cursor: 'pointer', fontSize: 13, fontWeight: 600,
                background: C.card, color: C.textSub, border: `1px solid ${C.border}`,
              }}>취소</button>
              <button onClick={handleSave} style={{
                padding: '9px 18px', borderRadius: 8, cursor: 'pointer', fontSize: 13, fontWeight: 600,
                background: C.primary, color: '#fff', border: 'none',
              }}>새 버전으로 저장</button>
            </div>
          </div>
        </Modal>
      )}

      {showNew && (
        <Modal title="새 프롬프트 버전 작성" onClose={() => setShowNew(false)}>
          <div style={{ display: 'flex', flexDirection: 'column', gap: 14 }}>
            <div>
              <label style={{ fontSize: 12, color: C.textSub, marginBottom: 6, display: 'block' }}>프롬프트 유형</label>
              <select style={{ width: '100%', padding: '8px 12px', background: C.bg, border: `1px solid ${C.border}`, borderRadius: 8, color: C.text, fontSize: 13 }}>
                <option>분류·적격성 판정 (prompt_1)</option>
                <option>요약·시사점 생성 (prompt_2)</option>
                <option>음성 스크립트 생성 (prompt_3)</option>
              </select>
            </div>
            <div>
              <label style={{ fontSize: 12, color: C.textSub, marginBottom: 6, display: 'block' }}>프롬프트 내용</label>
              <textarea style={{ width: '100%', minHeight: 180, background: C.bg, border: `1px solid ${C.border}`, borderRadius: 8, color: C.text, fontSize: 13, fontFamily: 'monospace', padding: 12, outline: 'none', resize: 'vertical' }} placeholder="프롬프트 내용을 입력하세요. {{news_items}}, {{date}} 등의 변수를 활용할 수 있습니다." />
            </div>
            <div style={{ display: 'flex', gap: 8, justifyContent: 'flex-end' }}>
              <button onClick={() => setShowNew(false)} style={{ padding: '9px 18px', borderRadius: 8, cursor: 'pointer', fontSize: 13, fontWeight: 600, background: C.card, color: C.textSub, border: `1px solid ${C.border}` }}>취소</button>
              <button onClick={() => { setShowNew(false); setToast('새 버전이 저장되어 다음 실행에 적용됩니다.'); }} style={{ padding: '9px 18px', borderRadius: 8, cursor: 'pointer', fontSize: 13, fontWeight: 600, background: C.primary, color: '#fff', border: 'none' }}>저장</button>
            </div>
          </div>
        </Modal>
      )}
    </div>
  );
}

function KakaoReportView() {
  const [selected, setSelected] = useState([]);
  const [toast, setToast] = useState(null);

  const toggleSelect = (phone) => {
    setSelected(prev => prev.includes(phone) ? prev.filter(p => p !== phone) : [...prev, phone]);
  };

  const handleResend = () => {
    setSelected([]);
    setToast(`${selected.length}명에게 재발송 요청이 Bull Queue에 등록되었습니다.`);
  };

  return (
    <div className="page-enter" style={{ display: 'flex', flexDirection: 'column', gap: 20 }}>
      {toast && <Toast msg={toast} onClose={() => setToast(null)} />}
      <div>
        <h2 style={{ fontSize: 22, fontWeight: 700 }}>카카오톡 발송 통계 리포트</h2>
        <p style={{ fontSize: 13, color: C.textSub, marginTop: 4 }}>뉴스 브리핑 카카오톡 발송 이력과 수신자별 성공률을 분석합니다.</p>
      </div>

      <div style={{ display: 'grid', gridTemplateColumns: '2fr 1fr', gap: 16 }}>
        <GlassCard style={{ padding: 24 }}>
          <h3 style={{ fontSize: 14, fontWeight: 700, marginBottom: 16, color: C.textSub }}>일별 발송 현황</h3>
          <div style={{ height: 200 }}>
            <ResponsiveContainer width="100%" height="100%">
              <BarChart data={KAKAO_DAILY} barSize={20}>
                <CartesianGrid strokeDasharray="3 3" stroke={C.border} />
                <XAxis dataKey="date" tick={{ fontSize: 12, fill: C.textSub }} />
                <YAxis tick={{ fontSize: 12, fill: C.textSub }} />
                <Tooltip contentStyle={{ background: C.surface, border: `1px solid ${C.border}`, fontSize: 12 }} />
                <Bar dataKey="success" fill={C.accent} name="성공" radius={[4, 4, 0, 0]} />
                <Bar dataKey="failed" fill={C.error} name="실패" radius={[4, 4, 0, 0]} />
              </BarChart>
            </ResponsiveContainer>
          </div>
        </GlassCard>
        <GlassCard style={{ padding: 24 }}>
          <h3 style={{ fontSize: 14, fontWeight: 700, marginBottom: 16, color: C.textSub }}>실패 유형 분포</h3>
          <div style={{ height: 160 }}>
            <ResponsiveContainer width="100%" height="100%">
              <PieChart>
                <Pie data={FAIL_TYPE} cx="50%" cy="50%" outerRadius={60} dataKey="value" label={({ name, value }) => `${name} ${value}`} fontSize={11}>
                  {[C.error, C.warning, C.primary].map((c, i) => <Cell key={i} fill={c} />)}
                </Pie>
                <Tooltip contentStyle={{ background: C.surface, border: `1px solid ${C.border}`, fontSize: 12 }} />
              </PieChart>
            </ResponsiveContainer>
          </div>
        </GlassCard>
      </div>

      <GlassCard style={{ overflow: 'hidden' }}>
        <div style={{ padding: '14px 20px', borderBottom: `1px solid ${C.border}`, display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
          <span style={{ fontSize: 14, fontWeight: 700 }}>수신자별 발송 성공률</span>
          {selected.length > 0 && (
            <button onClick={handleResend} style={{
              padding: '7px 14px', borderRadius: 8, cursor: 'pointer', fontSize: 12, fontWeight: 600,
              background: C.primary, color: '#fff', border: 'none',
              display: 'flex', alignItems: 'center', gap: 6,
            }}>
              <i className="ph-paper-plane-right" style={{ fontSize: 14 }} />
              {selected.length}명 일괄 재발송
            </button>
          )}
        </div>
        <div>
          {KAKAO_RECEIVERS.map((r, i) => (
            <div key={r.phone} onClick={() => toggleSelect(r.phone)} style={{
              padding: '14px 20px', borderBottom: i < KAKAO_RECEIVERS.length - 1 ? `1px solid ${C.border}` : 'none',
              display: 'flex', alignItems: 'center', gap: 14, cursor: 'pointer',
              background: selected.includes(r.phone) ? C.primary + '15' : 'transparent',
              transition: 'background 0.15s',
            }}>
              <div style={{
                width: 20, height: 20, borderRadius: 6, border: `2px solid ${selected.includes(r.phone) ? C.primary : C.border}`,
                background: selected.includes(r.phone) ? C.primary : 'transparent',
                display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0,
              }}>
                {selected.includes(r.phone) && <i className="ph-check" style={{ color: '#fff', fontSize: 12 }} />}
              </div>
              <div style={{ flex: 1 }}>
                <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
                  <span style={{ fontSize: 14, fontWeight: 600 }}>{r.name}</span>
                  <span style={{ fontSize: 12, color: C.textSub }}>{r.phone}</span>
                  {r.rate < 90 && <Badge label="주의" color={C.warning} icon="ph-warning" />}
                </div>
                <div style={{ display: 'flex', gap: 8, alignItems: 'center', marginTop: 6 }}>
                  <div style={{ flex: 1, height: 6, borderRadius: 3, background: C.bg, overflow: 'hidden' }}>
                    <div style={{ height: '100%', borderRadius: 3, background: r.rate >= 90 ? C.accent : C.warning, width: `${r.rate}%`, transition: 'width 0.5s ease' }} />
                  </div>
                  <span style={{ fontSize: 12, fontWeight: 700, color: r.rate >= 90 ? C.accent : C.warning }}>{r.rate.toFixed(1)}%</span>
                  <span style={{ fontSize: 12, color: C.textSub }}>{r.success}/{r.total}건</span>
                </div>
              </div>
            </div>
          ))}
        </div>
      </GlassCard>
    </div>
  );
}

  const renderPage = () => {
    switch (route) {
      case 'main': return <ArchiveView />;

    <div style={{ width: '100%', minHeight: '100vh', display: 'flex', flexDirection: 'column', background: C.bg }}>

            </div>
            <div>
              <div style={{ fontWeight: 700, fontSize: 14, color: C.text }}>BriefAnalytics</div>

            </div>
          </div>
          <nav style={{ display: 'flex', gap: 4, flex: 1 }}>
            {ROUTES.map(r => (
              <button key={r.id} onClick={() => setRoute(r.id)} style={{
                padding: '8px 14px', borderRadius: 8, cursor: 'pointer', border: 'none', fontSize: 13,
                background: route === r.id ? C.primary + '28' : 'transparent',
                color: route === r.id ? C.secondary : C.textSub,

              <i className="ph-bell" style={{ fontSize: 20 }} />

              <i className="ph-user" style={{ color: C.secondary, fontSize: 18 }} />
            </div>
          </div>
        </div>
      </header>

      {/* Main Content */}
      <main style={{ flex: 1, width: '100%' }}>
        <div style={{ maxWidth: 1280, margin: '0 auto', padding: '28px 24px' }}>
          {renderPage()}
        </div>
      </main>

      {/* Footer */}
      <footer style={{ borderTop: `1px solid ${C.border}`, padding: '18px 24px', background: C.surface }}>
        <div style={{ maxWidth: 1280, margin: '0 auto', display: 'grid', gridTemplateColumns: '1fr 1fr 1fr', gap: 24 }}>
          <div>
            <div style={{ fontWeight: 700, fontSize: 14, color: C.text, marginBottom: 6 }}>BriefAnalytics</div>
            <div style={{ fontSize: 12, color: C.textSub }}>Python + FastAPI + React 기반 뉴스 브리핑 콘텐츠 분석 플랫폼</div>
          </div>
          <div>
            <div style={{ fontSize: 12, fontWeight: 600, color: C.textSub, marginBottom: 8 }}>기능</div>
            {['아카이브 검색', '키워드 트렌드 분석', '프롬프트 버전 관리', '발송 통계 리포트'].map(f => (
              <div key={f} style={{ fontSize: 12, color: C.textSub, marginBottom: 4 }}>{f}</div>
            ))}
          </div>
          <div>
            <div style={{ fontSize: 12, fontWeight: 600, color: C.textSub, marginBottom: 8 }}>기술 스택</div>
            {['Python + FastAPI', 'PostgreSQL + SQLAlchemy', 'Redis + Bull Queue', 'React + Recharts'].map(t => (
              <div key={t} style={{ fontSize: 12, color: C.textSub, marginBottom: 4 }}>{t}</div>

          뉴스 브리핑 콘텐츠 분석 플랫폼 — 구현 데모 | Claude API + Materialized View 기반 분석 인프라
