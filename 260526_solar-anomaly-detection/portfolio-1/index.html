<html lang="ko">
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>

<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body, #root { width: 100%; min-height: 100vh; }
  body { font-family: 'Pretendard', -apple-system, sans-serif; background: #F0F4F8; color: #0F172A; }

  @keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }
  @keyframes slideUp {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes slideInRight {
    from { opacity: 0; transform: translateX(100%); }
    to { opacity: 1; transform: translateX(0); }
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.5; }
  }
  @keyframes spin {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
  }
  @keyframes countUp {
    from { opacity: 0; transform: translateY(4px); }
    to { opacity: 1; transform: translateY(0); }

  .sidebar {
    position: fixed; left: 0; top: 0; bottom: 0;
    width: 240px;
    background: #1E3A5F;
    display: flex; flex-direction: column;
    z-index: 100;
    box-shadow: 2px 0 8px rgba(0,0,0,0.15);
  }
  .sidebar-logo {
    padding: 20px 20px 16px;
    border-bottom: 1px solid rgba(255,255,255,0.08);
  }
  .sidebar-logo-title {
    color: #F59E0B;
    font-size: 15px;
    font-weight: 700;
    letter-spacing: -0.3px;
  }
  .sidebar-logo-sub {
    color: rgba(255,255,255,0.5);
    font-size: 11px;
    margin-top: 2px;
  }
  .sidebar-nav { flex: 1; padding: 12px 0; overflow-y: auto; }
  .nav-group-label {
    padding: 16px 20px 6px;
    font-size: 10px;
    font-weight: 600;
    color: rgba(255,255,255,0.35);
    letter-spacing: 0.8px;
    text-transform: uppercase;
  }
  .nav-item {
    display: flex; align-items: center; gap: 10px;
    padding: 9px 20px;
    cursor: pointer;
    color: rgba(255,255,255,0.65);
    font-size: 13.5px;
    font-weight: 500;
    transition: background 0.15s, color 0.15s;
    border-left: 2px solid transparent;
    position: relative;
  }
  .nav-item:hover { background: rgba(255,255,255,0.06); color: #fff; }
  .nav-item.active {
    background: rgba(245,158,11,0.15);
    color: #F59E0B;
    border-left-color: #F59E0B;
  }
  .nav-item .nav-icon { flex-shrink: 0; }
  .sidebar-footer {

    border-top: 1px solid rgba(255,255,255,0.08);

  .sidebar-avatar {

    font-size: 13px; font-weight: 600; color: #1E3A5F;
    flex-shrink: 0;
  }
  .sidebar-user-name { color: #fff; font-size: 13px; font-weight: 500; }
  .sidebar-user-role { color: rgba(255,255,255,0.45); font-size: 11px; }

  .main-wrap {
    margin-left: 240px;
    min-height: 100vh;
    flex: 1;
    min-width: 0;
    width: calc(100% - 240px);
    display: flex;
    flex-direction: column;
  }
  .topbar {
    height: 56px;
    background: #fff;
    border-bottom: 1px solid #E2E8F0;
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 24px;
    position: sticky; top: 0; z-index: 50;
  }
  .topbar-title { font-size: 15px; font-weight: 600; color: #0F172A; }
  .topbar-actions { display: flex; align-items: center; gap: 8px; }
  .topbar-btn {
    display: flex; align-items: center; gap: 6px;
    padding: 6px 12px;
    border-radius: 4px;
    border: 1px solid #E2E8F0;
    background: #fff;
    font-size: 13px; font-weight: 500; color: #475569;
    cursor: pointer;
    transition: background 0.15s, border-color 0.15s;
  }
  .topbar-btn:hover { background: #F8FAFC; border-color: #CBD5E1; }
  .topbar-badge {
    display: flex; align-items: center; justify-content: center;
    width: 18px; height: 18px; border-radius: 9px;
    background: #EF4444;
    font-size: 10px; font-weight: 600; color: #fff;
  }

  .content { padding: 24px; animation: fadeIn 0.25s ease; }

  .kpi-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; margin-bottom: 24px; }
  .kpi-card {
    background: #fff;
    border: 1px solid #E2E8F0;
    border-radius: 4px;
    padding: 16px;
    animation: slideUp 0.3s ease both;
  }
  .kpi-card:nth-child(1) { animation-delay: 0s; }
  .kpi-card:nth-child(2) { animation-delay: 0.05s; }
  .kpi-card:nth-child(3) { animation-delay: 0.1s; }
  .kpi-card:nth-child(4) { animation-delay: 0.15s; }
  .kpi-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
  .kpi-label { font-size: 12px; font-weight: 500; color: #64748B; }
  .kpi-icon { width: 30px; height: 30px; border-radius: 4px; display: flex; align-items: center; justify-content: center; }
  .kpi-value { font-size: 24px; font-weight: 700; color: #0F172A; letter-spacing: -0.5px; animation: countUp 0.4s ease; }
  .kpi-meta { display: flex; align-items: center; gap: 4px; margin-top: 4px; }
  .kpi-badge {
    display: inline-flex; align-items: center; gap: 3px;
    padding: 1px 6px; border-radius: 3px;
    font-size: 11px; font-weight: 500;
  }
  .badge-red { background: #FEF2F2; color: #DC2626; }
  .badge-green { background: #F0FDF4; color: #16A34A; }
  .badge-amber { background: #FFFBEB; color: #D97706; }
  .badge-blue { background: #EFF6FF; color: #2563EB; }
  .badge-gray { background: #F1F5F9; color: #64748B; }

  .section-row { display: grid; grid-template-columns: 2fr 1fr; gap: 14px; margin-bottom: 24px; }
  .chart-card {
    background: #fff;
    border: 1px solid #E2E8F0;
    border-radius: 4px;
    padding: 16px;
  }
  .card-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
  .card-title { font-size: 14px; font-weight: 600; color: #0F172A; }
  .chart-wrap { position: relative; height: 220px; }

  .event-list { display: flex; flex-direction: column; gap: 8px; }
  .event-item {
    display: flex; align-items: flex-start; gap: 10px;
    padding: 10px 12px;
    border-radius: 4px;
    border: 1px solid #E2E8F0;
    cursor: pointer;
    transition: background 0.12s, border-color 0.12s;
    animation: slideUp 0.3s ease both;
  }
  .event-item:hover { background: #F8FAFC; border-color: #CBD5E1; }
  .event-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; margin-top: 4px; }
  .event-dot-red { background: #EF4444; animation: pulse 2s infinite; }
  .event-dot-amber { background: #F59E0B; }
  .event-dot-blue { background: #3B82F6; }
  .event-site { font-size: 12px; font-weight: 600; color: #0F172A; }
  .event-desc { font-size: 11px; color: #64748B; margin-top: 1px; }
  .event-time { font-size: 11px; color: #94A3B8; margin-left: auto; flex-shrink: 0; }

  .table-card {
    background: #fff;
    border: 1px solid #E2E8F0;
    border-radius: 4px;
    overflow: hidden;
    margin-bottom: 24px;
  }
  .table-toolbar {
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 16px;
    border-bottom: 1px solid #E2E8F0;
  }
  table { width: 100%; border-collapse: collapse; }
  th { padding: 9px 14px; font-size: 11px; font-weight: 600; color: #64748B; text-align: left; border-bottom: 1px solid #E2E8F0; background: #F8FAFC; text-transform: uppercase; letter-spacing: 0.5px; }
  td { padding: 10px 14px; font-size: 13px; color: #0F172A; border-bottom: 1px solid #F1F5F9; }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: #F8FAFC; cursor: pointer; }

  .status-badge {
    display: inline-flex; align-items: center; gap: 4px;
    padding: 2px 8px; border-radius: 3px;
    font-size: 11px; font-weight: 500;
  }
  .status-dot { width: 5px; height: 5px; border-radius: 50%; }

  .filter-row { display: flex; gap: 8px; }
  .filter-select {
    padding: 6px 10px;
    border: 1px solid #E2E8F0;
    border-radius: 5px;
    font-size: 13px;
    font-family: inherit;
    color: #475569;
    background: #fff;
    cursor: pointer;
  }

  .action-btn {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 7px 14px;
    border-radius: 4px;
    border: none;
    font-size: 13px; font-weight: 500;
    cursor: pointer;
    transition: background 0.15s, transform 0.1s;
  }
  .action-btn:active { transform: scale(0.97); }
  .btn-primary { background: #1E3A5F; color: #fff; }
  .btn-primary:hover { background: #2D5F8A; }
  .btn-amber { background: #F59E0B; color: #1E3A5F; }
  .btn-amber:hover { background: #D97706; }
  .btn-outline { background: #fff; color: #475569; border: 1px solid #E2E8F0; }
  .btn-outline:hover { background: #F8FAFC; }

  /* Pipeline screen */
  .pipeline-stages { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 20px; }
  .pipeline-stage {
    background: #fff;
    border: 1px solid #E2E8F0;
    border-radius: 4px;
    padding: 14px;
    position: relative;
    animation: slideUp 0.3s ease both;
  }
  .stage-step { font-size: 10px; font-weight: 600; color: #94A3B8; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px; }
  .stage-name { font-size: 13px; font-weight: 600; color: #0F172A; margin-bottom: 8px; }
  .stage-count { font-size: 22px; font-weight: 700; }
  .stage-arrow { position: absolute; right: -14px; top: 50%; transform: translateY(-50%); color: #CBD5E1; z-index: 1; }
  .progress-bar-wrap { height: 4px; background: #F1F5F9; border-radius: 2px; margin-top: 8px; }
  .progress-bar { height: 100%; border-radius: 2px; transition: width 1s ease; }

  .upload-zone {
    border: 2px dashed #CBD5E1;
    border-radius: 8px;
    padding: 32px;
    text-align: center;
    cursor: pointer;
    transition: border-color 0.2s, background 0.2s;
    background: #FAFAFA;
  }
  .upload-zone:hover { border-color: #1E3A5F; background: #F0F4F8; }
  .upload-zone-text { font-size: 14px; font-weight: 500; color: #475569; margin-top: 10px; }
  .upload-zone-sub { font-size: 12px; color: #94A3B8; margin-top: 4px; }

  /* Inspector screen */
  .pwa-preview {
    display: grid; grid-template-columns: 340px 1fr; gap: 20px;
  }
  .phone-frame {
    background: #1E3A5F;
    border-radius: 32px;
    padding: 16px;
    box-shadow: 0 8px 32px rgba(30,58,95,0.3);
    position: relative;
  }
  .phone-screen {
    background: #F0F4F8;
    border-radius: 20px;
    overflow: hidden;
    min-height: 520px;
  }
  .phone-status {
    background: #1E3A5F;
    padding: 8px 14px;
    display: flex; justify-content: space-between;
    font-size: 11px; color: rgba(255,255,255,0.7);
  }
  .phone-content { padding: 14px; }

  .pwa-task-card {
    background: #fff;
    border-radius: 10px;
    padding: 14px;
    margin-bottom: 10px;
    border: 1px solid #E2E8F0;
    cursor: pointer;
    transition: box-shadow 0.15s;
  }
  .pwa-task-card:hover { box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
  .pwa-task-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 6px; }
  .pwa-task-site { font-size: 13px; font-weight: 600; color: #0F172A; }
  .pwa-task-address { font-size: 11px; color: #64748B; margin-bottom: 8px; }
  .pwa-task-meta { display: flex; gap: 6px; }
  .pwa-chip {
    padding: 2px 7px; border-radius: 12px;
    font-size: 10px; font-weight: 500;
  }

  /* Report screen */
  .report-grid { display: grid; grid-template-columns: 260px 1fr; gap: 20px; }
  .report-list { display: flex; flex-direction: column; gap: 8px; }
  .report-item {
    background: #fff;
    border: 1px solid #E2E8F0;
    border-radius: 4px;
    padding: 12px;
    cursor: pointer;
    transition: background 0.12s, border-color 0.12s;
    animation: slideUp 0.25s ease both;
  }
  .report-item:hover { background: #F8FAFC; border-color: #1E3A5F; }
  .report-item.selected { border-color: #1E3A5F; background: #F0F4F8; }
  .report-item-title { font-size: 13px; font-weight: 600; color: #0F172A; }
  .report-item-meta { font-size: 11px; color: #64748B; margin-top: 2px; }
  .report-preview {
    background: #fff;
    border: 1px solid #E2E8F0;
    border-radius: 4px;
    padding: 20px;
  }
  .report-preview-title { font-size: 16px; font-weight: 700; color: #0F172A; margin-bottom: 4px; }
  .report-preview-period { font-size: 12px; color: #64748B; margin-bottom: 16px; padding-bottom: 14px; border-bottom: 1px solid #E2E8F0; }
  .report-section-title { font-size: 13px; font-weight: 600; color: #1E3A5F; margin: 14px 0 8px; }
  .report-summary-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
  .report-summary-box {
    background: #F8FAFC;
    border: 1px solid #E2E8F0;
    border-radius: 5px;
    padding: 10px 12px;
  }
  .report-summary-label { font-size: 10px; color: #94A3B8; margin-bottom: 2px; }
  .report-summary-val { font-size: 18px; font-weight: 700; color: #0F172A; }

  /* Modal */
  .modal-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.4);
    display: flex; align-items: center; justify-content: center;
    z-index: 200;
    animation: fadeIn 0.2s ease;
  }
  .modal-box {
    background: #fff;
    border-radius: 10px;
    width: 560px;
    max-width: 90vw;
    max-height: 85vh;
    overflow-y: auto;
    box-shadow: 0 20px 60px rgba(0,0,0,0.2);
    animation: slideUp 0.25s ease;
  }
  .modal-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 18px 20px;
    border-bottom: 1px solid #E2E8F0;
    position: sticky; top: 0; background: #fff; z-index: 1;
  }
  .modal-title { font-size: 15px; font-weight: 600; color: #0F172A; }
  .modal-close {
    width: 28px; height: 28px; border-radius: 4px;
    border: 1px solid #E2E8F0; background: #fff;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; color: #64748B;
  }
  .modal-close:hover { background: #F1F5F9; }
  .modal-body { padding: 20px; }
  .modal-footer {
    display: flex; gap: 8px; justify-content: flex-end;
    padding: 14px 20px;
    border-top: 1px solid #E2E8F0;
  }

  .detail-row { display: flex; margin-bottom: 12px; }
  .detail-label { width: 120px; flex-shrink: 0; font-size: 12px; color: #64748B; font-weight: 500; padding-top: 2px; }
  .detail-value { font-size: 13px; color: #0F172A; flex: 1; }

  .form-group { margin-bottom: 14px; }
  .form-label { display: block; font-size: 12px; font-weight: 500; color: #64748B; margin-bottom: 5px; }
  .form-input {
    width: 100%; padding: 8px 10px;
    border: 1px solid #E2E8F0; border-radius: 4px;
    font-size: 13px; font-family: inherit; color: #0F172A;
    outline: none; transition: border-color 0.15s;
  }
  .form-input:focus { border-color: #1E3A5F; }
  .form-select {
    width: 100%; padding: 8px 10px;
    border: 1px solid #E2E8F0; border-radius: 4px;
    font-size: 13px; font-family: inherit; color: #0F172A;
    background: #fff; outline: none;
  }
  .form-textarea {
    width: 100%; padding: 8px 10px;
    border: 1px solid #E2E8F0; border-radius: 4px;
    font-size: 13px; font-family: inherit; color: #0F172A;
    resize: vertical; min-height: 80px; outline: none;
  }

  /* Toast */
  .toast {
    position: fixed; bottom: 24px; right: 24px;
    background: #0F172A; color: #fff;
    padding: 12px 16px; border-radius: 8px;
    font-size: 13px; font-weight: 500;
    box-shadow: 0 8px 24px rgba(0,0,0,0.25);
    z-index: 300;
    animation: slideUp 0.25s ease;
    display: flex; align-items: center; gap: 8px;
  }

  .loader { animation: spin 1s linear infinite; }

  .ai-result {
    background: linear-gradient(135deg, #F0F4F8, #EEF2FF);
    border: 1px solid #C7D2FE;
    border-radius: 4px;
    padding: 12px 14px;
    margin-top: 12px;
  }
  .ai-result-label { font-size: 10px; font-weight: 600; color: #4F46E5; margin-bottom: 6px; letter-spacing: 0.5px; text-transform: uppercase; }
  .ai-result-text { font-size: 13px; color: #0F172A; line-height: 1.6; }
</style>
</head>
<body>
<div id="root"></div>

function StatusBadge({ status }) {
  const map = {
    '이상': { cls: 'badge-red', dot: '#EF4444' },
    '주의': { cls: 'badge-amber', dot: '#F59E0B' },
    '정상': { cls: 'badge-green', dot: '#16A34A' },
    '완료': { cls: 'badge-green', dot: '#16A34A' },
    '진행중': { cls: 'badge-blue', dot: '#3B82F6' },
    '실패': { cls: 'badge-red', dot: '#EF4444' },
    '대기': { cls: 'badge-gray', dot: '#94A3B8' },
  };
  const m = map[status] || { cls: 'badge-gray', dot: '#94A3B8' };
  return (
    <span className={`status-badge ${m.cls}`}>
      <span className="status-dot" style={{ background: m.dot }} />
      {status}
    </span>
  );
}

function LucideIcon({ name, size = 16, color = 'currentColor' }) {
  const ref = useRef(null);
  useEffect(() => {
    if (ref.current && window.lucide) window.lucide.createIcons({ nodes: [ref.current] });
  }, [name]);
  return <i ref={ref} data-lucide={name} style={{ width: size, height: size, display: 'inline-block', flexShrink: 0, color: color || 'currentColor' }} />;
}

function Toast({ msg, onClose }) {
  useEffect(() => { const t = setTimeout(onClose, 3000); return () => clearTimeout(t); }, []);
  return (
    <div className="toast">
      <LucideIcon name="check-circle" size={16} color="#4ADE80" />
      {msg}
    </div>
  );
}

                이메일 발송

            </div>
          </div>
        )}
      </div>
      {genModal && <ReportGenModal onClose={() => setGenModal(false)} onSuccess={msg => { setGenModal(false); setToast(msg); }} />}
    </div>
  );
}

function App() {
  const [activeMenu, setActiveMenu] = useState('dashboard');
  const [modal, setModal] = useState(null);
  const [toast, setToast] = useState(null);

  const titles = {
    dashboard: '이상탐지 대시보드',
    pipeline: '데이터 파이프라인 관리',
    inspector: '점검원 PWA 앱',
    report: '보고서 자동생성',
  };

  return (
    <div style={{ display: 'flex', width: '100%', minHeight: '100vh' }}>
      <aside className="sidebar">
        <div className="sidebar-logo">
          <div className="sidebar-logo-title">SolarGuard AI</div>
          <div className="sidebar-logo-sub">태양광 이상탐지 플랫폼</div>
        </div>
        <nav className="sidebar-nav">
          <div className="nav-group-label">운영 모니터링</div>
          {SIDEBAR_MENUS.map(menu => (
            <div key={menu.key} className={`nav-item ${activeMenu === menu.key ? 'active' : ''}`} onClick={() => setActiveMenu(menu.key)}>
              <span className="nav-icon"><LucideIcon name={menu.icon} size={16} color={activeMenu === menu.key ? '#F59E0B' : 'rgba(255,255,255,0.65)'} /></span>
              {menu.label}
            </div>
          ))}
        </nav>
        <div className="sidebar-footer">
          <div className="sidebar-avatar">김</div>
          <div>
            <div className="sidebar-user-name">김태환</div>
            <div className="sidebar-user-role">발전사업주</div>
          </div>
        </div>
      </aside>

      <main className="main-wrap">
        <div className="topbar">
          <span className="topbar-title">{titles[activeMenu]}</span>
          <div className="topbar-actions">
            <button className="topbar-btn" style={{ position: 'relative' }}>
              <LucideIcon name="bell" size={15} />
              <span style={{ position: 'absolute', top: 4, right: 4, width: 6, height: 6, borderRadius: 3, background: '#EF4444' }} />
            </button>
            <button className="topbar-btn">
              <LucideIcon name="settings" size={15} />
            </button>
          </div>
        </div>

        {activeMenu === 'dashboard' && <DashboardScreen setModal={setModal} />}
        {activeMenu === 'pipeline' && <PipelineScreen setModal={setModal} setToast={msg => setToast(msg)} />}
        {activeMenu === 'inspector' && <InspectorScreen setModal={setModal} />}
        {activeMenu === 'report' && <ReportScreen setModal={setModal} setToast={msg => setToast(msg)} />}
      </main>

      {modal?.type === 'site' && <SiteDetailModal site={modal.data} onClose={() => setModal(null)} />}
      {modal?.type === 'event' && <EventDetailModal event={modal.data} onClose={() => setModal(null)} />}
      {modal?.type === 'pipelineJob' && <PipelineJobModal job={modal.data} onClose={() => setModal(null)} />}

      {toast && <Toast msg={toast} onClose={() => setToast(null)} />}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
