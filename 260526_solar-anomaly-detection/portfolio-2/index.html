function Toast({ msg, onClose }) {
  useEffect(() => { const t = setTimeout(onClose, 3200); return () => clearTimeout(t); }, []);
  return <div className="toast"><i className="ph-check-circle-bold" style={{ color: '#4ADE80', fontSize: 16 }} />{msg}</div>;
}

function DrawerWrapper({ title, onClose, children, footer }) {
  return (
    <>
      <div className="drawer-overlay" onClick={onClose} />
      <div className="drawer">
        <div className="drawer-header">
          <span className="drawer-title">{title}</span>
          <button className="close-btn" onClick={onClose}><i className="ph-x-bold" style={{ fontSize: 14 }} /></button>
        </div>
        <div className="drawer-body">{children}</div>
        {footer && <div className="drawer-footer">{footer}</div>}
      </div>
    </>
  );
}

function ComparisonScreen({ setDrawer, setToast }) {
  const [selected, setSelected] = useState(['해남 1호기', '고창 2단지', '신안 수상']);

  const toggle = (name) => {
    if (selected.includes(name)) {
      if (selected.length > 1) setSelected(selected.filter(s => s !== name));
    } else {
      if (selected.length < 4) setSelected([...selected, name]);
    }
  };

  const filtered = SITES_COMPARE.filter(s => selected.includes(s.name));

  const radarData = [
    { subject: '효율', ...Object.fromEntries(filtered.map(s => [s.name, s.efficiency])) },
    { subject: 'ML 정확도', ...Object.fromEntries(filtered.map(s => [s.name, s.mlAccuracy])) },
    { subject: '기상 지수', ...Object.fromEntries(filtered.map(s => [s.name, s.weather])) },
    { subject: '이상 없음', ...Object.fromEntries(filtered.map(s => [s.name, Math.max(0, 100 - s.anomalies * 5)])) },
  ];

  const COLORS = ['#16A34A', '#6366F1', '#F59E0B', '#EF4444'];

  return (
    <div className="content">
      <div className="card" style={{ marginBottom: 16, padding: '14px 18px' }}>
        <div style={{ display: 'flex', alignItems: 'center', gap: 8, flexWrap: 'wrap' }}>
          <span style={{ fontSize: 13, fontWeight: 500, color: '#475569', marginRight: 4 }}>비교 사이트 선택 (최대 4개):</span>
          {SITES_COMPARE.map(s => (
            <button key={s.name} onClick={() => toggle(s.name)} style={{ padding: '4px 12px', borderRadius: 20, border: `1px solid ${selected.includes(s.name) ? '#16A34A' : '#E2E8F0'}`, background: selected.includes(s.name) ? '#F0FDF4' : '#fff', color: selected.includes(s.name) ? '#16A34A' : '#64748B', fontSize: 12, fontWeight: 500, cursor: 'pointer', fontFamily: 'inherit' }}>
              {s.name}
            </button>
          ))}
          <button className="action-btn btn-sm btn-outline" style={{ marginLeft: 'auto' }} onClick={() => setToast('비교 결과를 CSV로 내보냈습니다')}>
            <i className="ph-download-bold" style={{ fontSize: 12 }} /> CSV 내보내기
          </button>
        </div>
      </div>

      <div className="grid-2">
        <div className="card">
          <div className="card-pad">
            <div className="card-header"><span className="card-title">종합 성과 비교 (레이더)</span></div>
            <div className="chart-wrap-tall">
              <ResponsiveContainer width="100%" height="100%">
                <RadarChart data={radarData}>
                  <PolarGrid stroke="#F1F5F9" />
                  <PolarAngleAxis dataKey="subject" tick={{ fontSize: 11, fontFamily: 'Pretendard' }} />
                  {filtered.map((s, i) => (
                    <Radar key={s.name} name={s.name} dataKey={s.name} stroke={COLORS[i]} fill={COLORS[i]} fillOpacity={0.1} strokeWidth={2} />
                  ))}
                  <Tooltip contentStyle={{ fontFamily: 'Pretendard', fontSize: 12, borderRadius: 8 }} />
                  <Legend wrapperStyle={{ fontFamily: 'Pretendard', fontSize: 11 }} />
                </RadarChart>
              </ResponsiveContainer>
            </div>
          </div>
        </div>
        <div className="card">
          <div className="card-pad">
            <div className="card-header"><span className="card-title">이상탐지 이벤트 수 비교</span></div>
            <div className="chart-wrap-tall">
              <ResponsiveContainer width="100%" height="100%">
                <BarChart data={filtered} layout="vertical" margin={{ top: 4, right: 20, bottom: 0, left: 20 }}>
                  <CartesianGrid strokeDasharray="3 3" stroke="#F1F5F9" horizontal={false} />
                  <XAxis type="number" tick={{ fontSize: 11, fontFamily: 'Pretendard' }} />
                  <YAxis type="category" dataKey="name" tick={{ fontSize: 11, fontFamily: 'Pretendard' }} width={70} />
                  <Tooltip contentStyle={{ fontFamily: 'Pretendard', fontSize: 12, borderRadius: 8 }} formatter={v => v + '건'} />
                  <Bar dataKey="anomalies" name="이상 이벤트" fill="#EF4444" radius={[0, 4, 4, 0]} />
                </BarChart>
              </ResponsiveContainer>
            </div>
          </div>
        </div>
      </div>

      <div className="table-card">
        <div className="table-header">
          <span className="card-title">사이트별 상세 성과 비교</span>
          <span style={{ fontSize: 12, color: '#94A3B8' }}>기상 보정 계수 적용 결과</span>
        </div>
        <table>
          <thead>
            <tr><th>사이트</th><th>설비 용량</th><th>발전 효율</th><th>이상 이벤트</th><th>추정 손실 (30일)</th><th>ML 정확도</th><th>점검 우선순위</th></tr>
          </thead>
          <tbody>
            {SITES_COMPARE.map((s, i) => {
              const isSelected = selected.includes(s.name);
              const priority = s.efficiency < 70 ? '긴급' : s.efficiency < 85 ? '높음' : '낮음';
              return (
                <tr key={s.name} style={{ background: isSelected ? '#FAFFFE' : undefined }} onClick={() => setDrawer({ type: 'siteCompare', data: s })}>
                  <td style={{ fontWeight: 600, color: COLORS[selected.indexOf(s.name)] || '#0F172A' }}>{s.name}</td>
                  <td>{s.capacity}MW</td>
                  <td style={{ color: s.efficiency < 70 ? '#DC2626' : s.efficiency < 85 ? '#D97706' : '#16A34A', fontWeight: 600 }}>{s.efficiency}%</td>
                  <td style={{ color: s.anomalies > 10 ? '#DC2626' : '#0F172A', fontWeight: s.anomalies > 5 ? 600 : 400 }}>{s.anomalies}건</td>
                  <td style={{ color: s.loss > 5000 ? '#DC2626' : '#0F172A' }}>₩{s.loss.toLocaleString()}</td>
                  <td style={{ color: s.mlAccuracy >= 95 ? '#16A34A' : '#D97706', fontWeight: 600 }}>{s.mlAccuracy}%</td>
                  <td><span className={`badge ${priority === '긴급' ? 'badge-red' : priority === '높음' ? 'badge-amber' : 'badge-green'}`}>{priority}</span></td>
                </tr>
              );
            })}
          </tbody>
        </table>
      </div>
    </div>
  );
}

                  <div style={{ display: 'flex', gap: 4, flexWrap: 'wrap' }}>
                    {Object.entries(role.permissions).map(([key, val]) => (
                      <span key={key} className={`badge ${val ? 'badge-green' : 'badge-gray'}`} style={{ fontSize: 10 }}>{val ? '' : ''}{key}</span>
                    ))}
                  </div>
                </div>
              ))}
            </div>
          </div>
        </div>
      </div>
    </div>
  );
}

function MLJobDrawer({ job, onClose }) {

      <>
        <button className="action-btn btn-outline" onClick={onClose}>닫기</button>

      </>
    }>
      <div className="detail-row"><span className="detail-label">잡 ID</span><span className="detail-value" style={{ fontFamily: 'monospace', fontSize: 12 }}>{job.id}</span></div>
      <div className="detail-row"><span className="detail-label">모델 버전</span><span className="detail-value"><span className="badge badge-indigo">{job.model}</span></span></div>
      <div className="detail-row"><span className="detail-label">상태</span><div className="detail-value"><StatusBadge status={job.status} /></div></div>
      <div className="detail-row"><span className="detail-label">시작 시각</span><span className="detail-value">{job.started}</span></div>
      <div className="detail-row"><span className="detail-label">소요 시간</span><span className="detail-value">{job.duration}</span></div>
      <div className="detail-row"><span className="detail-label">입력 레코드</span><span className="detail-value">{job.inputRecords > 0 ? job.inputRecords.toLocaleString() + '건' : '-'}</span></div>
      <div className="detail-row"><span className="detail-label">이상 탐지 건수</span><span className="detail-value" style={{ color: job.anomalies > 0 ? '#DC2626' : '#16A34A', fontWeight: 600 }}>{job.anomalies > 0 ? job.anomalies + '건' : '이상 없음'}</span></div>
      <div className="detail-row"><span className="detail-label">정확도</span><span className="detail-value" style={{ color: job.accuracy >= 95 ? '#16A34A' : job.accuracy >= 90 ? '#D97706' : '#EF4444', fontWeight: 600 }}>{job.accuracy > 0 ? job.accuracy + '%' : '-'}</span></div>
      {job.status === '실패' && (
        <div style={{ background: '#FEF2F2', border: '1px solid #FCA5A5', borderRadius: 8, padding: '12px', marginTop: 12 }}>
          <div style={{ fontSize: 12, fontWeight: 600, color: '#DC2626', marginBottom: 6 }}>오류 로그</div>
          <div style={{ fontSize: 11, color: '#7F1D1D', fontFamily: 'monospace', lineHeight: 1.7 }}>
            ERROR: SageMaker BatchTransform timeout after 300s<br />
            Cause: Network connectivity to endpoint failed<br />
            Retry schedule: 09:15 (1회차), 09:30 (2회차)
          </div>
        </div>
      )}
    </DrawerWrapper>
  );
}

function AddAlertDrawer({ onClose, onSuccess }) {
  return (
    <DrawerWrapper title="알림 규칙 추가" onClose={onClose} footer={
      <>
        <button className="action-btn btn-outline" onClick={onClose}>취소</button>
        <button className="action-btn btn-primary" onClick={() => { onClose(); onSuccess('알림 규칙이 추가되었습니다'); }}>저장</button>
      </>
    }>
      <div className="form-group">
        <label className="form-label">이벤트 유형</label>
        <select className="form-select">
          <option>ML 정확도 임계값 초과</option>
          <option>ETL 잡 실패</option>
          <option>이상탐지 이벤트 (긴급)</option>

        </select>
      </div>
      <div className="form-group">
        <label className="form-label">임계값 (ML 정확도 기준)</label>
        <input className="form-input" type="number" defaultValue="90" min="0" max="100" />
      </div>
      <div className="form-group">
        <label className="form-label">이메일 수신자 (;로 구분)</label>
        <input className="form-input" placeholder="user@company.com; user2@company.com" />
      </div>
      <div className="form-group">
        <label className="form-label">활성화</label>
        <label className="toggle" style={{ display: 'block', marginTop: 4 }}>
          <input type="checkbox" defaultChecked />
          <span className="toggle-slider" />
        </label>
      </div>
    </DrawerWrapper>
  );
}

function RbacDrawer({ role, onClose, onSuccess }) {
  return (
    <DrawerWrapper title={`${role.role} 권한 편집`} onClose={onClose} footer={
      <>
        <button className="action-btn btn-outline" onClick={onClose}>취소</button>
        <button className="action-btn btn-primary" onClick={() => { onClose(); onSuccess('권한 설정이 저장되었습니다'); }}>저장</button>
      </>
    }>
      <div style={{ marginBottom: 14, fontSize: 13, color: '#475569' }}>해당 역할의 메뉴별 접근 권한을 ON/OFF로 조정합니다.</div>
      {Object.entries(role.permissions).map(([key, val]) => (
        <div key={key} style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', padding: '10px 0', borderBottom: '1px solid #F1F5F9' }}>
          <span style={{ fontSize: 13, fontWeight: 500, color: '#0F172A' }}>{key}</span>
          <label className="toggle">
            <input type="checkbox" defaultChecked={val} />
            <span className="toggle-slider" />
          </label>
        </div>
      ))}
    </DrawerWrapper>
  );
}

function ApiKeyDrawer({ apiKey, onClose, onSuccess }) {
  return (
    <DrawerWrapper title="API 키 상세" onClose={onClose} footer={
      <>
        <button className="action-btn btn-outline" onClick={onClose}>닫기</button>
        <button className="action-btn btn-indigo" onClick={() => { onClose(); onSuccess('API 키가 갱신되었습니다'); }}>키 갱신</button>
      </>
    }>
      <div className="detail-row"><span className="detail-label">이름</span><span className="detail-value">{apiKey.name}</span></div>
      <div className="detail-row"><span className="detail-label">API 키</span><span className="detail-value" style={{ fontFamily: 'monospace', fontSize: 12 }}>{apiKey.key}</span></div>
      <div className="detail-row"><span className="detail-label">권한 범위</span><div className="detail-value"><span className={`badge ${apiKey.scope === '읽기 전용' ? 'badge-blue' : 'badge-indigo'}`}>{apiKey.scope}</span></div></div>
      <div className="detail-row"><span className="detail-label">만료일</span><span className="detail-value">{apiKey.expires}</span></div>
      <div className="detail-row"><span className="detail-label">마지막 사용</span><span className="detail-value">{apiKey.lastUsed}</span></div>
      <div className="detail-row"><span className="detail-label">총 호출 수</span><span className="detail-value" style={{ fontWeight: 600 }}>{apiKey.calls.toLocaleString()}회</span></div>
      <div style={{ marginTop: 14 }}>
        <div className="form-label" style={{ marginBottom: 6 }}>새 만료일 설정</div>
        <input className="form-input" type="date" defaultValue={apiKey.expires} />
      </div>
    </DrawerWrapper>
  );
}

function SiteCompareDrawer({ site, onClose }) {
  return (
    <DrawerWrapper title={`${site.name} 상세 분석`} onClose={onClose} footer={<button className="action-btn btn-outline" onClick={onClose}>닫기</button>}>
      <div className="detail-row"><span className="detail-label">설비 용량</span><span className="detail-value">{site.capacity}MW</span></div>
      <div className="detail-row"><span className="detail-label">발전 효율</span><span className="detail-value" style={{ color: site.efficiency < 70 ? '#DC2626' : '#16A34A', fontWeight: 600 }}>{site.efficiency}%</span></div>
      <div className="detail-row"><span className="detail-label">이상 이벤트</span><span className="detail-value" style={{ color: site.anomalies > 10 ? '#DC2626' : '#0F172A', fontWeight: 600 }}>{site.anomalies}건</span></div>
      <div className="detail-row"><span className="detail-label">30일 손실 추정</span><span className="detail-value" style={{ color: '#D97706', fontWeight: 600 }}>₩{site.loss.toLocaleString()}</span></div>
      <div className="detail-row"><span className="detail-label">ML 정확도</span><span className="detail-value" style={{ color: '#16A34A', fontWeight: 600 }}>{site.mlAccuracy}%</span></div>
      <div style={{ marginTop: 16 }}>
        <div style={{ fontSize: 13, fontWeight: 600, color: '#0F172A', marginBottom: 10 }}>기상 보정 효율 비교</div>
        <div className="compare-bar-wrap">
          <div className="compare-bar-label"><span style={{ fontSize: 12, color: '#64748B' }}>보정 전 효율</span><span style={{ fontSize: 12, fontWeight: 600 }}>{site.efficiency}%</span></div>
          <div className="compare-bar-track"><div className="compare-bar-fill" style={{ width: site.efficiency + '%', background: '#6366F1' }} /></div>
        </div>
        <div className="compare-bar-wrap">
          <div className="compare-bar-label"><span style={{ fontSize: 12, color: '#64748B' }}>기상 보정 지수</span><span style={{ fontSize: 12, fontWeight: 600 }}>{site.weather}%</span></div>
          <div className="compare-bar-track"><div className="compare-bar-fill" style={{ width: site.weather + '%', background: '#16A34A' }} /></div>
        </div>
        <div className="compare-bar-wrap">
          <div className="compare-bar-label"><span style={{ fontSize: 12, color: '#64748B' }}>ML 정확도</span><span style={{ fontSize: 12, fontWeight: 600 }}>{site.mlAccuracy}%</span></div>
          <div className="compare-bar-track"><div className="compare-bar-fill" style={{ width: site.mlAccuracy + '%', background: '#F59E0B' }} /></div>
        </div>
      </div>
    </DrawerWrapper>
  );
}

function ETLJobDrawer({ job, onClose, onSuccess }) {
  return (
    <DrawerWrapper title="ETL 잡 상세" onClose={onClose} footer={
      <>
        <button className="action-btn btn-outline" onClick={onClose}>닫기</button>
        {job.status === '실패' && <button className="action-btn btn-primary" onClick={() => { onClose(); onSuccess('ETL 잡 재시도가 시작되었습니다'); }}>재시도</button>}
      </>
    }>
      <div className="detail-row"><span className="detail-label">잡 ID</span><span className="detail-value" style={{ fontFamily: 'monospace', fontSize: 12 }}>{job.id}</span></div>
      <div className="detail-row"><span className="detail-label">유형</span><span className="detail-value">{job.type}</span></div>
      <div className="detail-row"><span className="detail-label">사이트</span><span className="detail-value">{job.site}</span></div>
      <div className="detail-row"><span className="detail-label">상태</span><div className="detail-value"><StatusBadge status={job.status} /></div></div>
      <div className="detail-row"><span className="detail-label">시작</span><span className="detail-value">{job.started}</span></div>
      <div className="detail-row"><span className="detail-label">처리 레코드</span><span className="detail-value">{job.inputRows.toLocaleString()} → {job.outputRows.toLocaleString()}</span></div>
      <div className="detail-row"><span className="detail-label">스키마 검증</span><span className="detail-value">{job.schemaOk ? <span className="badge badge-green">통과</span> : <span className="badge badge-red">오류</span>}</span></div>
      {job.rate > 0 && (
        <div style={{ marginTop: 12 }}>
          <div style={{ fontSize: 12, fontWeight: 500, color: '#64748B', marginBottom: 4 }}>정합성 검증 ({job.rate}%)</div>
          <div style={{ background: '#F1F5F9', borderRadius: 4, height: 8 }}>
            <div style={{ height: '100%', borderRadius: 4, background: job.rate === 100 ? '#16A34A' : '#3B82F6', width: job.rate + '%', transition: 'width 1s ease' }} />
          </div>
        </div>
      )}
    </DrawerWrapper>
  );
}

// Recharts ReferenceLine shim
const ReferenceLine = ({ y, stroke, strokeDasharray, label }) => null;

function App() {
  const [activeTab, setActiveTab] = useState('mlops');
  const [drawer, setDrawer] = useState(null);
  const [toast, setToast] = useState(null);

  const heroData = {
    mlops: { title: 'MLOps 모델 모니터링', sub: 'SageMaker 배치 추론 결과 · 정확도 트래킹 · 드리프트 감지' },
    etl: { title: 'Glue ETL 파이프라인 관리', sub: '배치 잡 상태 · Parquet 검증 · 스케줄 운영' },
    comparison: { title: '멀티사이트 비교 분석', sub: '기상 보정 계수 적용 · 설비 성과 다차원 비교' },
    settings: { title: '알림 및 권한 관리', sub: '이메일 알림 규칙 · RBAC · API 키 관리' },
  };

  const h = heroData[activeTab];

  return (
    <div style={{ width: '100%', minHeight: '100vh', display: 'flex', flexDirection: 'column' }}>
      <header className="topnav">
        <div className="topnav-inner">
          <div className="brand">
            <div className="brand-icon">
              <i className="ph-sun-bold" style={{ fontSize: 18, color: '#fff' }} />
            </div>
            <div>
              <div className="brand-name">SolarOps</div>
            </div>
          </div>
          <nav className="nav-tabs">
            {NAV_TABS.map(tab => (
              <div key={tab.key} className={`nav-tab ${activeTab === tab.key ? 'active' : ''}`} onClick={() => setActiveTab(tab.key)}>
                <i className={tab.icon} style={{ fontSize: 14 }} />
                {tab.label}
              </div>
            ))}
          </nav>
          <div className="nav-right">
            <div className="icon-btn"><i className="ph-bell-bold" style={{ fontSize: 15 }} /></div>
            <div className="user-avatar">박</div>
          </div>
        </div>
      </header>

      <div className="hero">
        <div className="hero-inner">
          <div>
            <div className="hero-title">{h.title}</div>
            <div className="hero-sub">{h.sub}</div>
          </div>
          <div className="hero-kpis">
            <div className="hero-kpi">
              <div className="hero-kpi-val" style={{ color: '#16A34A' }}>94.2%</div>
              <div className="hero-kpi-label">ML 정확도 (최근)</div>
            </div>
            <div className="hero-kpi">
              <div className="hero-kpi-val" style={{ color: '#6366F1' }}>6개</div>
              <div className="hero-kpi-label">모니터링 사이트</div>
            </div>
            <div className="hero-kpi">
              <div className="hero-kpi-val" style={{ color: '#D97706' }}>5건</div>
              <div className="hero-kpi-label">미처리 이상 이벤트</div>
            </div>
          </div>
        </div>
      </div>

      <main style={{ flex: 1, width: '100%' }}>
        {activeTab === 'mlops' && <MLOpsScreen setDrawer={setDrawer} setToast={msg => setToast(msg)} />}
        {activeTab === 'etl' && <ETLScreen setDrawer={setDrawer} setToast={msg => setToast(msg)} />}
        {activeTab === 'comparison' && <ComparisonScreen setDrawer={setDrawer} setToast={msg => setToast(msg)} />}
        {activeTab === 'settings' && <SettingsScreen setDrawer={setDrawer} setToast={msg => setToast(msg)} />}
      </main>

      {drawer?.type === 'mlJob' && <MLJobDrawer job={drawer.data} onClose={() => setDrawer(null)} />}
      {drawer?.type === 'etlJob' && <ETLJobDrawer job={drawer.data} onClose={() => setDrawer(null)} onSuccess={msg => setToast(msg)} />}
      {drawer?.type === 'addAlert' && <AddAlertDrawer onClose={() => setDrawer(null)} onSuccess={msg => { setDrawer(null); setToast(msg); }} />}
      {drawer?.type === 'rbac' && <RbacDrawer role={drawer.data} onClose={() => setDrawer(null)} onSuccess={msg => { setDrawer(null); setToast(msg); }} />}
      {drawer?.type === 'apiKey' && <ApiKeyDrawer apiKey={drawer.data} onClose={() => setDrawer(null)} onSuccess={msg => { setDrawer(null); setToast(msg); }} />}
      {drawer?.type === 'addApiKey' && <AddAlertDrawer onClose={() => setDrawer(null)} onSuccess={msg => { setDrawer(null); setToast(msg); }} />}
      {drawer?.type === 'siteCompare' && <SiteCompareDrawer site={drawer.data} onClose={() => setDrawer(null)} />}

      {toast && <Toast msg={toast} onClose={() => setToast(null)} />}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
