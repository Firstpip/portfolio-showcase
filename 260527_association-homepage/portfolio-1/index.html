<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>협회·법인 홈페이지 통합 플랫폼 — 맞춤 구현 데모</title>
<link rel="preconnect" href="https://cdn.jsdelivr.net">
<link rel="stylesheet" as="style" onload="this.onload=null;this.rel='stylesheet'" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body,#root{width:100%;min-height:100vh}
body{font-family:'Pretendard',-apple-system,BlinkMacSystemFont,sans-serif;background:#FAFCFF;color:#1A2B45;-webkit-font-smoothing:antialiased}

@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideRight{from{opacity:0;transform:translateX(20px)}to{opacity:1;transform:translateX(0)}}
@keyframes scaleIn{from{opacity:0;transform:scale(0.95)}to{opacity:1;transform:scale(1)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes progressFill{from{width:0}to{width:var(--fill-w)}}

.topnav{position:sticky;top:0;z-index:100;width:100%;height:64px;background:#fff;border-bottom:1px solid #D0DDEF;display:flex;align-items:center;padding:0 32px;box-shadow:0 1px 4px rgba(27,79,138,.06)}
.nav-logo{font-size:17px;font-weight:800;color:#1B4F8A;margin-right:40px;letter-spacing:-.3px;white-space:nowrap}
.nav-logo span{color:#F97316}
.nav-tabs{display:flex;gap:2px;flex:1}
.nav-tab{padding:8px 18px;border-radius:6px;font-size:14px;font-weight:500;color:#5A7399;cursor:pointer;border:none;background:none;font-family:inherit;transition:all .15s}
.nav-tab:hover{color:#1B4F8A;background:#EEF5FF}
.nav-tab.active{color:#1B4F8A;background:#EEF5FF;font-weight:700}
.nav-right{display:flex;gap:8px;align-items:center}
.btn-ghost{padding:7px 16px;border:1.5px solid #1B4F8A;border-radius:6px;color:#1B4F8A;font-size:13px;font-weight:600;cursor:pointer;background:none;font-family:inherit;transition:all .15s}
.btn-ghost:hover{background:#EEF5FF}
.btn-navy{padding:7px 16px;border:none;border-radius:6px;background:#1B4F8A;color:#fff;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;transition:all .15s}
.btn-navy:hover{background:#153F70}

.view-wrap{width:100%;min-height:calc(100vh - 64px);animation:fadeUp .25s ease}

/* hero */
.hero{width:100%;background:linear-gradient(140deg,#1B4F8A 0%,#1e5ba0 50%,#0D3362 100%);padding:72px 32px 56px;color:#fff;position:relative;overflow:hidden}
.hero::after{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 70% 20%,rgba(249,115,22,.18) 0%,transparent 55%);pointer-events:none}
.hero-inner{max-width:680px;margin:0 auto;text-align:center;position:relative}
.hero-eyebrow{display:inline-flex;align-items:center;gap:6px;background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.22);border-radius:20px;padding:5px 14px;font-size:12px;color:rgba(255,255,255,.85);margin-bottom:20px}
.hero-dot{width:7px;height:7px;border-radius:50%;background:#F97316}
.hero-h1{font-size:40px;font-weight:900;line-height:1.2;margin-bottom:16px;letter-spacing:-.5px}
.hero-h1 em{color:#FED7AA;font-style:normal}
.hero-lead{font-size:16px;color:rgba(255,255,255,.75);line-height:1.7;margin-bottom:36px}
.hero-btns{display:flex;gap:12px;justify-content:center;flex-wrap:wrap}
.hero-btn-primary{padding:13px 28px;background:#F97316;border:none;border-radius:8px;color:#fff;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;transition:all .2s}
.hero-btn-primary:hover{background:#E56708;transform:translateY(-2px);box-shadow:0 6px 20px rgba(249,115,22,.35)}
.hero-btn-sec{padding:13px 28px;background:rgba(255,255,255,.1);border:1.5px solid rgba(255,255,255,.3);border-radius:8px;color:#fff;font-size:15px;font-weight:600;cursor:pointer;font-family:inherit;transition:all .2s}
.hero-btn-sec:hover{background:rgba(255,255,255,.2)}
.stats-strip{display:flex;justify-content:center;gap:56px;margin-top:52px;padding-top:40px;border-top:1px solid rgba(255,255,255,.15)}
.stat-item{text-align:center}
.stat-n{font-size:30px;font-weight:900;color:#FED7AA;letter-spacing:-1px}
.stat-l{font-size:12px;color:rgba(255,255,255,.6);margin-top:2px}

/* content wrappers */
.wrap{max-width:1200px;margin:0 auto;padding:44px 32px}

/* section header */
.sec-hd{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:20px}
.sec-title{font-size:18px;font-weight:800;color:#1A2B45}
.sec-more{font-size:12px;font-weight:600;color:#1B4F8A;background:none;border:none;cursor:pointer;font-family:inherit}

/* home grid */
.home-grid{display:grid;grid-template-columns:1fr 1fr;gap:28px;margin-bottom:40px}
.biz-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:40px}

/* biz card */
.biz-card{background:#fff;border-radius:10px;border:1px solid #D0DDEF;padding:22px;box-shadow:0 1px 4px rgba(27,79,138,.05);transition:all .2s;animation:fadeUp .3s ease;cursor:pointer}
.biz-card:hover{box-shadow:0 6px 20px rgba(27,79,138,.1);border-color:#B0C9E8;transform:translateY(-3px)}
.biz-icon{width:44px;height:44px;border-radius:10px;display:flex;align-items:center;justify-content:center;margin-bottom:14px}
.biz-name{font-size:14px;font-weight:700;color:#1A2B45;margin-bottom:6px}
.biz-desc{font-size:12px;color:#5A7399;line-height:1.6}

/* notice list */
.notice-list{background:#fff;border-radius:10px;border:1px solid #D0DDEF;overflow:hidden;box-shadow:0 1px 4px rgba(27,79,138,.05)}
.notice-row{display:flex;align-items:center;gap:10px;padding:13px 18px;border-bottom:1px solid #EEF3FA;cursor:pointer;transition:background .15s}
.notice-row:last-child{border-bottom:none}
.notice-row:hover{background:#F4F8FF}
.nbadge{padding:2px 7px;border-radius:4px;font-size:11px;font-weight:700;white-space:nowrap}
.nb-notice{background:#DBEAFE;color:#1D4ED8}
.nb-data{background:#DCFCE7;color:#15803D}
.nb-new{background:#FEE2E2;color:#DC2626}
.ntitle{flex:1;font-size:13px;color:#1A2B45;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ndate{font-size:12px;color:#8BA3C1;white-space:nowrap}

/* events upcoming */
.ev-card{background:#fff;border-radius:10px;border:1px solid #D0DDEF;padding:14px 16px;box-shadow:0 1px 4px rgba(27,79,138,.05);cursor:pointer;transition:all .2s;margin-bottom:10px}
.ev-card:last-child{margin-bottom:0}
.ev-card:hover{border-color:#B0C9E8;box-shadow:0 4px 12px rgba(27,79,138,.1);transform:translateY(-1px)}
.ev-row{display:flex;align-items:flex-start;justify-content:space-between;gap:10px}
.ev-title{font-size:13px;font-weight:700;color:#1A2B45}
.ev-sub{font-size:11px;color:#5A7399;margin-top:3px}
.ev-seats{font-size:12px;font-weight:700;white-space:nowrap}
.seats-bar{height:5px;border-radius:3px;background:#E8F0FB;margin-top:8px}
.seats-fill{height:100%;border-radius:3px;background:#F97316;transition:width .6s ease}

/* page views */
.page-view{animation:fadeUp .22s ease}
.pg-hd{margin-bottom:28px}
.pg-title{font-size:24px;font-weight:900;color:#1A2B45;letter-spacing:-.3px}
.pg-sub{font-size:14px;color:#5A7399;margin-top:5px}

/* board */
.board-ctrl{display:flex;align-items:center;gap:10px;margin-bottom:14px;flex-wrap:wrap}
.board-tabs-grp{display:flex;gap:4px}
.btab{padding:8px 16px;border-radius:6px;font-size:13px;font-weight:500;cursor:pointer;border:1px solid #D0DDEF;background:#fff;color:#5A7399;font-family:inherit;transition:all .15s}
.btab.active{background:#1B4F8A;color:#fff;border-color:#1B4F8A}
.board-search-wrap{position:relative;flex:1;max-width:300px}
.board-search{width:100%;padding:9px 12px 9px 34px;border:1.5px solid #D0DDEF;border-radius:7px;font-size:13px;font-family:inherit;outline:none;color:#1A2B45;background:#fff;transition:border-color .15s}
.board-search:focus{border-color:#1B4F8A;box-shadow:0 0 0 3px rgba(27,79,138,.08)}
.srch-icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:#8BA3C1}
.board-tbl{width:100%;border-radius:10px;border:1px solid #D0DDEF;overflow:hidden;border-collapse:collapse;background:#fff}
.board-tbl th{background:#F4F8FF;padding:11px 16px;font-size:12px;font-weight:700;color:#5A7399;text-align:left;border-bottom:1px solid #D0DDEF}
.board-tbl td{padding:13px 16px;font-size:13px;color:#1A2B45;border-bottom:1px solid #EEF3FA}
.board-tbl tr:last-child td{border-bottom:none}
.board-tbl tr:hover td{background:#F4F8FF;cursor:pointer}
.pagination{display:flex;justify-content:center;gap:4px;margin-top:20px}
.page-btn{width:32px;height:32px;border-radius:6px;border:1px solid #D0DDEF;background:#fff;color:#5A7399;font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.page-btn.cur{background:#1B4F8A;color:#fff;border-color:#1B4F8A}

/* calendar */
.cal-layout{display:grid;grid-template-columns:1fr 300px;gap:24px}
.cal-card{background:#fff;border-radius:10px;border:1px solid #D0DDEF;padding:24px;box-shadow:0 1px 4px rgba(27,79,138,.05)}
.cal-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
.cal-month{font-size:18px;font-weight:800;color:#1A2B45}
.cal-arrow{width:32px;height:32px;border-radius:6px;border:1px solid #D0DDEF;background:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#5A7399;transition:all .15s}
.cal-arrow:hover{background:#EEF5FF;border-color:#B0C9E8}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);border:1px solid #D0DDEF;border-radius:8px;overflow:hidden}
.cal-dh{background:#F4F8FF;padding:10px 0;text-align:center;font-size:12px;font-weight:700;color:#5A7399;border-bottom:1px solid #D0DDEF}
.cal-cell{min-height:82px;padding:8px;border-right:1px solid #EEF3FA;border-bottom:1px solid #EEF3FA;cursor:pointer;transition:background .15s}
.cal-cell:nth-child(7n){border-right:none}
.cal-cell:hover{background:#F4F8FF}
.cal-cell.today{background:#EEF5FF}
.cnum{font-size:13px;font-weight:600;color:#1A2B45;margin-bottom:4px;display:inline-block}
.cnum.t{background:#1B4F8A;color:#fff;width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px}
.chip{background:#DBEAFE;color:#1D4ED8;font-size:10px;padding:2px 5px;border-radius:3px;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;display:block}
.chip.orange{background:#FEF3EC;color:#B45309}

.ev-side{background:#fff;border-radius:10px;border:1px solid #D0DDEF;padding:20px;box-shadow:0 1px 4px rgba(27,79,138,.05)}
.ev-side-title{font-size:14px;font-weight:800;color:#1A2B45;margin-bottom:14px}
.ev-item{padding:12px 0;border-bottom:1px solid #EEF3FA;cursor:pointer;transition:background .15s}
.ev-item:last-child{border-bottom:none}
.ev-item:hover{opacity:.8}
.ev-dt{display:inline-block;background:#1B4F8A;color:#fff;font-size:10px;font-weight:700;padding:2px 7px;border-radius:4px;margin-bottom:5px}
.ev-name{font-size:13px;font-weight:700;color:#1A2B45}
.ev-note{font-size:11px;color:#5A7399;margin-top:2px}

/* member form */
.member-wrap{max-width:560px;margin:0 auto}
.step-row{display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:32px}
.step-circle{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;transition:all .2s}
.step-circle.done{background:#1B4F8A;color:#fff}
.step-circle.active{background:#1B4F8A;color:#fff}
.step-circle.idle{background:#E8F0FB;color:#8BA3C1}
.step-label{font-size:13px;font-weight:600}
.step-div{height:1px;width:32px;background:#D0DDEF}
.form-card{background:#fff;border-radius:12px;border:1px solid #D0DDEF;padding:36px;box-shadow:0 2px 12px rgba(27,79,138,.07)}
.fgroup{margin-bottom:18px}
.flabel{display:block;font-size:13px;font-weight:700;color:#1A2B45;margin-bottom:6px}
.finput{width:100%;padding:10px 13px;border:1.5px solid #D0DDEF;border-radius:7px;font-size:14px;font-family:inherit;color:#1A2B45;outline:none;transition:all .15s;background:#fff}
.finput:focus{border-color:#1B4F8A;box-shadow:0 0 0 3px rgba(27,79,138,.1)}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.fselect{width:100%;padding:10px 13px;border:1.5px solid #D0DDEF;border-radius:7px;font-size:14px;font-family:inherit;color:#1A2B45;background:#fff;outline:none;cursor:pointer}
.cbtn{width:100%;padding:13px;background:#1B4F8A;color:#fff;border:none;border-radius:8px;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;transition:all .2s;margin-top:6px}
.cbtn:hover{background:#153F70}
.obtn{width:100%;padding:12px;background:#fff;color:#1B4F8A;border:1.5px solid #1B4F8A;border-radius:8px;font-size:15px;font-weight:600;cursor:pointer;font-family:inherit;transition:all .15s}
.obtn:hover{background:#EEF5FF}
.agree-row{display:flex;align-items:center;gap:8px;cursor:pointer;margin-bottom:12px}
.chk{width:18px;height:18px;border-radius:4px;border:2px solid;display:flex;align-items:center;justify-content:center;transition:all .15s;flex-shrink:0}
.info-box{background:#F4F8FF;border-radius:7px;padding:12px 14px;font-size:12px;color:#5A7399;line-height:1.65;margin-bottom:16px}

/* apply */
.apply-layout{display:grid;grid-template-columns:1fr 300px;gap:24px;align-items:start}
.ev-picker-card{background:#fff;border-radius:10px;border:1px solid #D0DDEF;padding:20px;box-shadow:0 1px 4px rgba(27,79,138,.05)}
.ev-opt{padding:12px 14px;border-radius:8px;border:1.5px solid #D0DDEF;margin-bottom:10px;cursor:pointer;transition:all .15s}
.ev-opt:hover{border-color:#1B4F8A;background:#F4F8FF}
.ev-opt.sel{border-color:#1B4F8A;background:#EEF5FF}
.ev-opt:last-child{margin-bottom:0}
.ev-opt-nm{font-size:13px;font-weight:700;color:#1A2B45}
.ev-opt-dt{font-size:12px;color:#5A7399;margin-top:2px}
.ev-closed{font-size:12px;color:#DC2626;font-weight:700;margin-top:4px}
.apply-form-card{background:#fff;border-radius:12px;border:1px solid #D0DDEF;padding:32px;box-shadow:0 2px 12px rgba(27,79,138,.07)}
.sel-ev-banner{background:#EEF5FF;border-radius:8px;padding:12px 16px;margin-bottom:24px;display:flex;justify-content:space-between;align-items:center}
.sel-ev-name{font-size:14px;font-weight:700;color:#1B4F8A}
.sel-ev-info{font-size:12px;color:#5A7399;margin-top:2px}
.success-view{text-align:center;padding:60px 20px;animation:scaleIn .3s ease}
.suc-circle{width:72px;height:72px;border-radius:50%;background:#DCFCE7;display:flex;align-items:center;justify-content:center;margin:0 auto 20px}
.suc-title{font-size:24px;font-weight:800;color:#1A2B45;margin-bottom:8px}
.suc-sub{font-size:14px;color:#5A7399;line-height:1.7;margin-bottom:28px}

/* modal */
.modal-bg{position:fixed;inset:0;background:rgba(10,20,40,.45);display:flex;align-items:center;justify-content:center;z-index:500;padding:16px;animation:fadeIn .15s ease}
.modal{background:#fff;border-radius:14px;width:100%;max-width:580px;max-height:82vh;overflow-y:auto;padding:32px;animation:scaleIn .2s ease;box-shadow:0 20px 60px rgba(0,0,0,.2)}
.modal-hd{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:20px;gap:12px}
.modal-ttl{font-size:18px;font-weight:800;color:#1A2B45;line-height:1.3}
.modal-x{width:30px;height:30px;border-radius:7px;background:#F4F8FF;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#5A7399;flex-shrink:0;transition:background .15s}
.modal-x:hover{background:#E8F0FB}
.modal-body{font-size:14px;color:#3A5070;line-height:1.75}
.modal-body p{margin-bottom:12px}
.modal-ft{display:flex;gap:8px;justify-content:flex-end;margin-top:24px}

/* toast */
.toast{position:fixed;bottom:24px;right:24px;background:#1A2B45;color:#fff;padding:12px 18px;border-radius:9px;font-size:13px;font-weight:600;z-index:600;animation:slideRight .25s ease;box-shadow:0 6px 24px rgba(0,0,0,.2);display:flex;align-items:center;gap:8px;border-left:3px solid #22C55E}

@media(max-width:900px){
  .biz-grid{grid-template-columns:repeat(2,1fr)}
  .home-grid{grid-template-columns:1fr}
  .cal-layout{grid-template-columns:1fr}
  .apply-layout{grid-template-columns:1fr}
}
@media(max-width:600px){
  .hero-h1{font-size:28px}
  .stats-strip{gap:24px}
  .wrap{padding:28px 16px}
  .biz-grid{grid-template-columns:1fr 1fr}
}
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script type="text/babel">
const {useState,useEffect,useRef} = React;

/* ---- mock data ---- */
const NOTICES = [
  {id:1,type:'공지',title:'2026년 상반기 디지털 역량 교육 프로그램 수강생 모집 안내',date:'2026.05.22',views:342,isNew:true},
  {id:2,type:'공지',title:'제15회 한국디지털산업 대상 수상 기업 선정 결과 발표',date:'2026.05.20',views:218},
  {id:3,type:'자료',title:'2026년 디지털 전환 트렌드 심층 분석 보고서 (PDF)',date:'2026.05.15',views:891},
  {id:4,type:'공지',title:'2026년 정기총회 개최 안내 및 사전 참석 신청 방법',date:'2026.05.12',views:576},
  {id:5,type:'자료',title:'스타트업 법인 설립 절차 완전 가이드북 V2.0',date:'2026.05.08',views:1203},
  {id:6,type:'공지',title:'협회 홈페이지 전면 개편 일정 안내 (6월 오픈 예정)',date:'2026.05.01',views:445},
  {id:7,type:'자료',title:'2026 디지털 뉴딜 정책 요약 자료집 배포',date:'2026.04.28',views:672},
  {id:8,type:'공지',title:'신규 정회원 가입 혜택 안내 — 2026년 상반기 특별 프로모션',date:'2026.04.20',views:389},
];
const EVENTS = [
  {id:1,date:'2026-05-28',title:'스타트업 네트워킹 데이',desc:'수도권 스타트업 60여 개사 참여 예정',seats:80,filled:73,color:'orange'},
  {id:2,date:'2026-06-05',title:'디지털 전환 컨퍼런스 2026',desc:'기조연설 및 분야별 패널 토론',seats:200,filled:178},
  {id:3,date:'2026-06-12',title:'법인 창업 아카데미 1기',desc:'8주 과정 — 사전신청 마감 임박',seats:30,filled:30},
  {id:4,date:'2026-06-18',title:'정기 이사회 및 총회',desc:'2025년 결산 및 사업계획 심의·의결',seats:50,filled:32},
  {id:5,date:'2026-06-25',title:'해외 진출 지원 세미나',desc:'ASEAN 시장 진출 전략 공유 세션',seats:60,filled:41},
];

/* ---- SVG icons (Lucide style) ---- */
const Ic = ({d,size=16,...p}) => (
  <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.75" strokeLinecap="round" strokeLinejoin="round" {...p}>
    {Array.isArray(d)?d.map((pd,i)=><path key={i} d={pd}/>):<path d={d}/>}
  </svg>

function CalendarView({goApply}){
  const [month,setMonth]=useState(4);
  const [year,setYear]=useState(2026);
  const [selEv,setSelEv]=useState(null);
  const MN=['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
  const DN=['일','월','화','수','목','금','토'];
  const cells=()=>{
    const f=new Date(year,month,1).getDay();
    const last=new Date(year,month+1,0).getDate();
    const arr=[];
    for(let i=0;i<f;i++)arr.push(null);
    for(let d=1;d<=last;d++)arr.push(d);
    return arr;
  };
  const evDay=(d)=>{
    if(!d)return[];
    const ds=`${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    return EVENTS.filter(e=>e.date===ds);
  };
  return(
    <div className="page-view">
      <div className="pg-hd"><div className="pg-title">행사 캘린더</div><div className="pg-sub">협회 주요 행사 및 일정을 확인하세요</div></div>
      <div className="cal-layout">
        <div className="cal-card">
          <div className="cal-nav">
            <button className="cal-arrow" onClick={()=>{if(month===0){setMonth(11);setYear(y=>y-1);}else setMonth(m=>m-1);}}><IcChL/></button>
            <div className="cal-month">{year}년 {MN[month]}</div>
            <button className="cal-arrow" onClick={()=>{if(month===11){setMonth(0);setYear(y=>y+1);}else setMonth(m=>m+1);}}><IcChR/></button>
          </div>
          <div className="cal-grid">
            {DN.map(d=><div key={d} className="cal-dh">{d}</div>)}
            {cells().map((day,i)=>{
              const evs=evDay(day);
              const isT=day===27&&month===4&&year===2026;
              return(
                <div key={i} className={`cal-cell${isT?' today':''}`} onClick={()=>evs.length&&setSelEv(evs[0])}>
                  {day&&(isT?<div className="cnum t">{day}</div>:<div className="cnum">{day}</div>)}
                  {evs.map(ev=><span key={ev.id} className={`chip${ev.color==='orange'?' orange':''}`}>{ev.title}</span>)}
                </div>
              );
            })}
          </div>
        </div>
        <div className="ev-side">
          <div className="ev-side-title">다가오는 행사</div>
          {EVENTS.map(ev=>(
            <div key={ev.id} className="ev-item" onClick={()=>setSelEv(ev)}>
              <span className="ev-dt">{ev.date}</span>
              <div className="ev-name">{ev.title}</div>
              <div className="ev-note">{ev.desc}</div>
              <div className="seats-bar"><div className="seats-fill" style={{width:`${Math.round(ev.filled/ev.seats*100)}%`}}></div></div>
              <div style={{fontSize:11,color:'#8BA3C1',marginTop:3}}>{ev.filled}/{ev.seats}명</div>
            </div>
          ))}
        </div>
      </div>
      {selEv&&<EventModal ev={selEv} onClose={()=>setSelEv(null)} goApply={(ev)=>{goApply(ev);}}/>}
    </div>
  );
}

  const [done,setDone]=useState(false);
  const upd=k=>e=>setF({...f,[k]:e.target.value});
  const avail=EVENTS.filter(e=>e.filled<e.seats);
  const submit=()=>{
    if(!sel||!f.name||!f.email)return;
    setDone(true);
    toast(`${sel.title} 사전신청이 완료되었습니다.`);
  };
  if(done)return(
    <div className="page-view">
      <div className="success-view">
        <div className="suc-circle"><svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#16A34A" strokeWidth="2.5" strokeLinecap="round"><polyline points="20 6 9 17 4 12"/></svg></div>
        <div className="suc-title">신청 완료</div>
        <div className="suc-sub">사전신청이 성공적으로 접수되었습니다.<br/>확인 이메일이 순차적으로 발송될 예정입니다.</div>
        <button className="btn-navy" style={{padding:'11px 28px'}} onClick={()=>{setDone(false);setSel(null);setF({name:'',email:'',phone:'',org:'',cnt:'1',memo:''});}}>다른 행사 신청하기</button>
      </div>
    </div>
  );
  return(
    <div className="page-view">
      <div className="pg-hd"><div className="pg-title">사전신청</div><div className="pg-sub">참여하실 행사를 선택하고 신청 정보를 입력해주세요</div></div>
      <div className="apply-layout">
        <div className="apply-form-card">
          {!sel?(
            <div style={{textAlign:'center',padding:'48px 20px',color:'#8BA3C1',fontSize:14}}>
              우측에서 신청할 행사를 선택해주세요.
            </div>
          ):(
            <>
              <div className="sel-ev-banner">
                <div><div className="sel-ev-name">{sel.title}</div><div className="sel-ev-info">{sel.date} · 정원 {sel.seats}명</div></div>
                <button style={{background:'none',border:'none',cursor:'pointer',color:'#8BA3C1'}} onClick={()=>setSel(null)}><IcX/></button>
              </div>
              <div className="frow">
                <div className="fgroup"><label className="flabel">이름 *</label><input className="finput" placeholder="김민수" value={f.name} onChange={upd('name')}/></div>
                <div className="fgroup"><label className="flabel">연락처 *</label><input className="finput" placeholder="010-0000-0000" value={f.phone} onChange={upd('phone')}/></div>
              </div>
              <div className="fgroup"><label className="flabel">이메일 *</label><input className="finput" type="email" placeholder="name@company.com" value={f.email} onChange={upd('email')}/></div>
              <div className="frow">
                <div className="fgroup"><label className="flabel">소속 기관</label><input className="finput" placeholder="(주)회사명" value={f.org} onChange={upd('org')}/></div>
                <div className="fgroup"><label className="flabel">신청 인원</label>
                  <select className="fselect" value={f.cnt} onChange={upd('cnt')}>{[1,2,3,4,5].map(n=><option key={n}>{n}</option>)}</select>
                </div>
              </div>
              <div className="fgroup"><label className="flabel">요청사항</label><textarea className="finput" rows="3" style={{resize:'vertical'}} placeholder="특이사항을 입력해주세요" value={f.memo} onChange={upd('memo')}></textarea></div>
              <button className="cbtn" onClick={submit}>신청 완료</button>
            </>
          )}
        </div>
        <div className="ev-picker-card">
          <div style={{fontSize:14,fontWeight:800,color:'#1A2B45',marginBottom:14}}>신청 가능 행사</div>
          {avail.map(ev=>(
            <div key={ev.id} className={`ev-opt${sel?.id===ev.id?' sel':''}`} onClick={()=>setSel(ev)}>
              <div className="ev-opt-nm">{ev.title}</div>
              <div className="ev-opt-dt">{ev.date}</div>
              <div className="seats-bar" style={{marginTop:7}}><div className="seats-fill" style={{width:`${Math.round(ev.filled/ev.seats*100)}%`}}></div></div>
              <div style={{fontSize:11,color:'#8BA3C1',marginTop:3}}>잔여 {ev.seats-ev.filled}석</div>
            </div>
          ))}
          {EVENTS.filter(e=>e.filled>=e.seats).map(ev=>(
            <div key={ev.id} className="ev-opt" style={{opacity:.55,cursor:'not-allowed'}}>
              <div className="ev-opt-nm">{ev.title}</div>
              <div className="ev-opt-dt">{ev.date}</div>
              <div className="ev-closed">신청 마감</div>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

/* ---- App ---- */
function App(){
  const [view,setView]=useState('main');
  const [applyPreset,setApplyPreset]=useState(null);
  const [toast,setToast]=useState(null);
  const showToast=msg=>{setToast(msg);setTimeout(()=>setToast(null),3100);};
  const nav=(v,data)=>{setView(v);if(data)setApplyPreset(data);};
  const TABS=[{k:'main',l:'협회 소개'},{k:'board',l:'공지사항'},{k:'calendar',l:'행사 캘린더'},{k:'apply',l:'사전신청'}];
  return(
    <div style={{width:'100%',minHeight:'100vh',display:'flex',flexDirection:'column'}}>
      <header className="topnav">
        <div className="nav-logo">한국디지털<span>산업</span>협회</div>
        <nav className="nav-tabs">
          {TABS.map(t=><button key={t.k} className={`nav-tab${view===t.k?' active':''}`} onClick={()=>nav(t.k)}>{t.l}</button>)}
        </nav>
        <div className="nav-right">
          <button className="btn-ghost" onClick={()=>nav('member')}>회원가입</button>
          <button className="btn-navy">로그인</button>
        </div>
      </header>
      <main style={{flex:1,width:'100%'}}>
        {view==='main'&&<HomeView nav={nav}/>}
        {view==='board'&&<div className="wrap"><BoardView/></div>}
        {view==='calendar'&&<div className="wrap"><CalendarView goApply={ev=>nav('apply',ev)}/></div>}
        {view==='member'&&<div className="wrap"><MemberView toast={showToast}/></div>}
        {view==='apply'&&<div className="wrap"><ApplyView preset={applyPreset} toast={showToast}/></div>}
      </main>
      {toast&&<Toast msg={toast}/>}
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
