<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>협회 통합 관리자 대시보드 — 구현 데모</title>
<link rel="preconnect" href="https://cdn.jsdelivr.net">
<link rel="stylesheet" as="style" onload="this.onload=null;this.rel='stylesheet'" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body,#root{width:100%;min-height:100vh}
body{font-family:'Pretendard',-apple-system,BlinkMacSystemFont,sans-serif;background:#F4FAF7;color:#1C3329;-webkit-font-smoothing:antialiased}

@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideLeft{from{opacity:0;transform:translateX(-16px)}to{opacity:1;transform:translateX(0)}}
@keyframes scaleIn{from{opacity:0;transform:scale(0.94)}to{opacity:1;transform:scale(1)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes growBar{from{height:0}to{height:var(--bh)}}

/* global nav */
.gnav{width:100%;height:60px;background:#fff;border-bottom:1px solid #B7D9C8;display:flex;align-items:center;padding:0 28px;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(45,106,79,.08)}
.gnav-logo{font-size:15px;font-weight:900;color:#2D6A4F;margin-right:36px;white-space:nowrap;letter-spacing:-.2px}
.gnav-logo span{color:#B5179E}
.gnav-tabs{display:flex;gap:2px;flex:1}
.gtab{padding:8px 18px;border-radius:7px;font-size:14px;font-weight:500;color:#4A7A62;cursor:pointer;border:none;background:none;font-family:inherit;transition:all .15s;display:flex;align-items:center;gap:6px}
.gtab:hover{color:#2D6A4F;background:#D8F3E8}
.gtab.active{color:#2D6A4F;background:#D8F3E8;font-weight:700}
.gnav-right{display:flex;align-items:center;gap:10px}
.avatar{width:34px;height:34px;border-radius:50%;background:#2D6A4F;color:#fff;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;cursor:pointer}
.notif-btn{width:34px;height:34px;border-radius:7px;background:#F4FAF7;border:1px solid #B7D9C8;display:flex;align-items:center;justify-content:center;cursor:pointer;color:#4A7A62;position:relative;transition:all .15s}
.notif-btn:hover{background:#D8F3E8}
.notif-dot{position:absolute;top:6px;right:6px;width:8px;height:8px;border-radius:50%;background:#B5179E;border:1.5px solid #fff}

/* page area */
.page-area{width:100%;min-height:calc(100vh - 60px);animation:fadeUp .22s ease}
.container{max-width:1280px;margin:0 auto;padding:32px 28px}
.pg-hd{margin-bottom:28px}
.pg-title{font-size:22px;font-weight:900;color:#1C3329;letter-spacing:-.3px}
.pg-sub{font-size:13px;color:#4A7A62;margin-top:4px}

/* KPI cards */
.kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:28px}
.kpi-card{background:#fff;border-radius:12px;padding:22px 20px;box-shadow:0 3px 12px rgba(45,106,79,.1);border:1px solid #B7D9C8;animation:fadeUp .25s ease;transition:all .2s}
.kpi-card:hover{box-shadow:0 6px 20px rgba(45,106,79,.14);transform:translateY(-2px)}
.kpi-row{display:flex;align-items:flex-start;justify-content:space-between}
.kpi-icon{width:42px;height:42px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px}
.kpi-change{font-size:12px;font-weight:700;padding:2px 7px;border-radius:4px}
.kpi-n{font-size:28px;font-weight:900;color:#1C3329;margin:10px 0 4px;letter-spacing:-1px}
.kpi-l{font-size:13px;color:#4A7A62}
.kpi-bar{height:3px;border-radius:2px;background:#D8F3E8;margin-top:12px}
.kpi-fill{height:100%;border-radius:2px;background:#2D6A4F;transition:width .8s ease}

/* chart area */
.chart-grid{display:grid;grid-template-columns:2fr 1fr;gap:20px;margin-bottom:28px}
.chart-card{background:#fff;border-radius:12px;padding:24px;box-shadow:0 3px 12px rgba(45,106,79,.08);border:1px solid #B7D9C8}
.chart-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
.chart-title{font-size:15px;font-weight:800;color:#1C3329}
.chart-select{padding:5px 10px;border:1px solid #B7D9C8;border-radius:6px;font-size:12px;font-family:inherit;color:#4A7A62;background:#fff;cursor:pointer;outline:none}

/* custom bar chart */
.bar-chart{display:flex;align-items:flex-end;gap:10px;height:180px;padding-bottom:24px;position:relative;border-bottom:1px solid #D8F3E8}
.bar-wrap{display:flex;flex-direction:column;align-items:center;flex:1}
.bar{width:100%;border-radius:5px 5px 0 0;background:linear-gradient(to top,#2D6A4F,#4CAF80);cursor:pointer;transition:all .2s;animation:fadeIn .4s ease}
.bar:hover{opacity:.8;transform:scale(1.05)}
.bar-label{font-size:10px;color:#4A7A62;margin-top:6px;white-space:nowrap}
.bar-val{font-size:10px;font-weight:700;color:#2D6A4F;margin-bottom:3px}

/* donut chart (custom SVG) */
.donut-wrap{display:flex;flex-direction:column;align-items:center;gap:14px}
.donut-legend{display:flex;flex-direction:column;gap:8px;width:100%}
.legend-row{display:flex;align-items:center;gap:8px;font-size:12px;color:#4A7A62}
.legend-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}

/* recent events */
.recent-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:28px}
.list-card{background:#fff;border-radius:12px;padding:22px;box-shadow:0 3px 12px rgba(45,106,79,.08);border:1px solid #B7D9C8}
.list-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.list-title{font-size:14px;font-weight:800;color:#1C3329}
.list-more{font-size:12px;font-weight:700;color:#2D6A4F;background:none;border:none;cursor:pointer;font-family:inherit}
.list-row{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid #E8F5EF;cursor:pointer;transition:all .15s}
.list-row:last-child{border-bottom:none}
.list-row:hover{background:#F4FAF7;margin:0 -6px;padding:10px 6px;border-radius:6px}
.badge{padding:2px 7px;border-radius:4px;font-size:11px;font-weight:700;white-space:nowrap}
.bg-pending{background:#FEF9C3;color:#A16207}
.bg-done{background:#DCFCE7;color:#15803D}
.bg-reject{background:#FEE2E2;color:#DC2626}
.bg-info{background:#DBEAFE;color:#1D4ED8}
.bg-warn{background:#FEF3EC;color:#C2570B}

/* members page */
.toolbar{display:flex;align-items:center;gap:10px;margin-bottom:16px;flex-wrap:wrap}
.search-wrap{position:relative;flex:1;max-width:280px}
.search-input{width:100%;padding:9px 12px 9px 34px;border:1.5px solid #B7D9C8;border-radius:8px;font-size:13px;font-family:inherit;outline:none;color:#1C3329;background:#fff;transition:all .15s}
.search-input:focus{border-color:#2D6A4F;box-shadow:0 0 0 3px rgba(45,106,79,.1)}
.si-icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:#4A7A62}
.filter-select{padding:8px 12px;border:1.5px solid #B7D9C8;border-radius:8px;font-size:13px;font-family:inherit;color:#1C3329;background:#fff;cursor:pointer;outline:none;transition:all .15s}
.filter-select:focus{border-color:#2D6A4F}
.action-btn{padding:8px 16px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;transition:all .15s;border:none}
.btn-green{background:#2D6A4F;color:#fff}
.btn-green:hover{background:#24573F}
.btn-outline-green{background:#fff;color:#2D6A4F;border:1.5px solid #2D6A4F}
.btn-outline-green:hover{background:#D8F3E8}
.data-table{width:100%;border-radius:12px;border:1px solid #B7D9C8;overflow:hidden;border-collapse:collapse;background:#fff}
.data-table th{background:#EAF5EF;padding:11px 16px;font-size:12px;font-weight:700;color:#4A7A62;text-align:left;border-bottom:1px solid #B7D9C8}
.data-table td{padding:13px 16px;font-size:13px;color:#1C3329;border-bottom:1px solid #D8F3E8}
.data-table tr:last-child td{border-bottom:none}
.data-table tr:hover td{background:#F4FAF7;cursor:pointer}
.chk-box{width:16px;height:16px;accent-color:#2D6A4F;cursor:pointer}
.pagination{display:flex;justify-content:center;gap:4px;margin-top:18px}
.pgbtn{width:32px;height:32px;border-radius:7px;border:1px solid #B7D9C8;background:#fff;color:#4A7A62;font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-family:inherit;transition:all .15s}
.pgbtn.cur{background:#2D6A4F;color:#fff;border-color:#2D6A4F}
.pgbtn:hover:not(.cur){background:#D8F3E8}

/* content page */
.content-grid{display:grid;grid-template-columns:1fr 320px;gap:20px;align-items:start}
.post-list{background:#fff;border-radius:12px;border:1px solid #B7D9C8;overflow:hidden;box-shadow:0 3px 12px rgba(45,106,79,.08)}
.post-item{display:flex;align-items:center;gap:12px;padding:14px 18px;border-bottom:1px solid #D8F3E8;cursor:pointer;transition:background .15s}
.post-item:last-child{border-bottom:none}
.post-item:hover{background:#F4FAF7}
.post-thumb{width:40px;height:40px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.post-name{font-size:13px;font-weight:700;color:#1C3329}
.post-meta{font-size:12px;color:#4A7A62;margin-top:2px}
.banner-card{background:#fff;border-radius:12px;border:1px solid #B7D9C8;padding:20px;box-shadow:0 3px 12px rgba(45,106,79,.08)}
.banner-item{background:#F4FAF7;border-radius:8px;border:1px solid #B7D9C8;padding:12px;margin-bottom:10px;cursor:pointer;transition:all .15s}
.banner-item:hover{border-color:#2D6A4F;background:#EAF5EF}
.banner-item:last-child{margin-bottom:0}
.banner-name{font-size:13px;font-weight:700;color:#1C3329}
.banner-sch{font-size:11px;color:#4A7A62;margin-top:3px}
.toggle-wrap{display:flex;align-items:center;justify-content:space-between;margin-top:6px}
.toggle{width:36px;height:20px;border-radius:10px;position:relative;cursor:pointer;transition:background .2s}
.toggle-knob{position:absolute;top:2px;width:16px;height:16px;border-radius:50%;background:#fff;box-shadow:0 1px 3px rgba(0,0,0,.2);transition:left .2s}

/* news page */
.news-src-card{background:#fff;border-radius:12px;border:1px solid #B7D9C8;padding:20px;box-shadow:0 3px 12px rgba(45,106,79,.08);margin-bottom:20px}
.src-item{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid #D8F3E8}
.src-item:last-child{border-bottom:none}
.src-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.src-name{flex:1;font-size:13px;font-weight:600;color:#1C3329}
.src-count{font-size:12px;color:#4A7A62}
.news-queue{background:#fff;border-radius:12px;border:1px solid #B7D9C8;overflow:hidden;box-shadow:0 3px 12px rgba(45,106,79,.08)}
.news-item{display:flex;align-items:flex-start;gap:12px;padding:14px 18px;border-bottom:1px solid #D8F3E8;cursor:pointer;transition:background .15s}
.news-item:last-child{border-bottom:none}
.news-item:hover{background:#F4FAF7}
.news-title{font-size:13px;font-weight:600;color:#1C3329;margin-bottom:4px;line-height:1.4}
.news-origin{font-size:11px;color:#4A7A62}
.news-actions{display:flex;gap:6px;margin-left:auto;flex-shrink:0}
.nact-btn{padding:4px 10px;border-radius:5px;font-size:12px;font-weight:700;cursor:pointer;border:none;font-family:inherit;transition:all .15s}
.nact-pub{background:#DCFCE7;color:#15803D}
.nact-pub:hover{background:#BBF7D0}
.nact-rej{background:#FEE2E2;color:#DC2626}
.nact-rej:hover{background:#FECACA}

/* settings page */
.settings-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px}
.settings-card{background:#fff;border-radius:12px;border:1px solid #B7D9C8;padding:24px;box-shadow:0 3px 12px rgba(45,106,79,.08)}
.sc-title{font-size:15px;font-weight:800;color:#1C3329;margin-bottom:16px;display:flex;align-items:center;gap:8px}
.form-group{margin-bottom:16px}
.form-label{display:block;font-size:13px;font-weight:700;color:#1C3329;margin-bottom:6px}
.form-input{width:100%;padding:9px 12px;border:1.5px solid #B7D9C8;border-radius:8px;font-size:13px;font-family:inherit;color:#1C3329;outline:none;background:#fff;transition:all .15s}
.form-input:focus{border-color:#2D6A4F;box-shadow:0 0 0 3px rgba(45,106,79,.1)}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.pop-preview{background:#F4FAF7;border-radius:8px;border:2px dashed #B7D9C8;padding:20px;text-align:center;margin-bottom:16px;color:#4A7A62;font-size:13px}

/* drawer */
.drawer-bg{position:fixed;inset:0;background:rgba(10,26,20,.4);z-index:500;display:flex;justify-content:flex-end;animation:fadeIn .15s ease}
.drawer{width:400px;background:#fff;height:100%;overflow-y:auto;padding:28px;animation:slideLeft .2s ease;box-shadow:-8px 0 32px rgba(0,0,0,.15)}
.drawer-hd{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:22px;gap:12px}
.drawer-title{font-size:18px;font-weight:800;color:#1C3329}
.drawer-x{width:30px;height:30px;border-radius:7px;background:#F4FAF7;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#4A7A62;transition:background .15s;flex-shrink:0}
.drawer-x:hover{background:#D8F3E8}
.info-row{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid #D8F3E8;font-size:13px}
.info-key{color:#4A7A62;font-weight:600}
.info-val{color:#1C3329;text-align:right}
.drawer-actions{display:flex;gap:8px;margin-top:22px}
.da-btn{flex:1;padding:10px;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;border:none;font-family:inherit;transition:all .15s}

/* modal */
.modal-bg{position:fixed;inset:0;background:rgba(10,26,20,.45);display:flex;align-items:center;justify-content:center;z-index:600;padding:16px;animation:fadeIn .15s ease}
.modal{background:#fff;border-radius:14px;width:100%;max-width:520px;max-height:82vh;overflow-y:auto;padding:28px;animation:scaleIn .2s ease;box-shadow:0 20px 60px rgba(0,0,0,.18)}
.modal-hd{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:18px;gap:12px}
.modal-title{font-size:17px;font-weight:800;color:#1C3329}
.modal-x{width:28px;height:28px;border-radius:6px;background:#F4FAF7;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#4A7A62;flex-shrink:0}
.modal-x:hover{background:#D8F3E8}

/* toast */
.toast{position:fixed;bottom:24px;right:24px;background:#1C3329;color:#fff;padding:12px 18px;border-radius:10px;font-size:13px;font-weight:600;z-index:700;animation:fadeUp .25s ease;box-shadow:0 6px 24px rgba(0,0,0,.2);display:flex;align-items:center;gap:8px;border-left:3px solid #4CAF80}

/* footer */
footer{background:#fff;border-top:1px solid #B7D9C8;padding:16px 28px;text-align:center;font-size:12px;color:#4A7A62}

@media(max-width:900px){
  .kpi-grid{grid-template-columns:repeat(2,1fr)}
  .chart-grid{grid-template-columns:1fr}
  .recent-grid{grid-template-columns:1fr}
  .content-grid{grid-template-columns:1fr}
  .settings-grid{grid-template-columns:1fr}
  .drawer{width:320px}
}
</style>
</head>

/* ---- components ---- */
function Toast({msg}){
  return(
    <div className="toast">
      <i className="ph ph-check-circle" style={{fontSize:16}}></i>
      {msg}
    </div>
  );
}

function MemberDrawer({m,onClose,onToast}){
  const statusColor={활성:'bg-done',승인대기:'bg-pending',비활성:'bg-reject'}[m.status];
  return(
    <div className="drawer-bg" onClick={onClose}>
      <div className="drawer" onClick={e=>e.stopPropagation()}>
        <div className="drawer-hd">
          <div>
            <div className="drawer-title">{m.name}</div>
            <div style={{fontSize:13,color:'#4A7A62',marginTop:2}}>{m.email}</div>
          </div>
          <button className="drawer-x" onClick={onClose}><i className="ph ph-x" style={{fontSize:14}}></i></button>
        </div>
        <div style={{marginBottom:20}}>
          {[['소속 기관',m.org],['회원 유형',m.type],['등급',m.grade],['가입일',m.joined],['최근 로그인',m.lastLogin]].map(([k,v])=>(
            <div key={k} className="info-row"><span className="info-key">{k}</span><span className="info-val">{v}</span></div>
          ))}
          <div className="info-row">
            <span className="info-key">상태</span>
            <span className={`badge ${statusColor}`}>{m.status}</span>
          </div>
        </div>
        <div className="drawer-actions">
          {m.status==='승인대기'&&<button className="da-btn" style={{background:'#DCFCE7',color:'#15803D'}} onClick={()=>{onToast(`${m.name} 회원을 승인했습니다.`);onClose();}}>
            <i className="ph ph-check"></i> 승인
          </button>}
          <button className="da-btn" style={{background:'#EAF5EF',color:'#2D6A4F'}} onClick={()=>{onToast('등급이 변경되었습니다.');onClose();}}>

        </div>
      </div>
    </div>
  );
}

function MembersView({onToast}){
  const [q,setQ]=useState('');
  const [grade,setGrade]=useState('전체');
  const [status,setStatus]=useState('전체');
  const [sel,setSel]=useState(null);
  const [chk,setChk]=useState([]);
  const rows=MEMBERS.filter(m=>{
    if(q&&!m.name.includes(q)&&!m.email.includes(q)&&!m.org.includes(q))return false;
    if(grade!=='전체'&&m.grade!==grade)return false;
    if(status!=='전체'&&m.status!==status)return false;
    return true;
  });
  const stColor={활성:'bg-done',승인대기:'bg-pending',비활성:'bg-reject'};
  return(
    <div className="page-area">
      <div className="container">
        <div className="pg-hd"><div className="pg-title">회원 관리</div><div className="pg-sub">가입 회원을 조회하고 상태를 관리하세요</div></div>
        <div className="toolbar">
          <div className="search-wrap">
            <span className="si-icon"><i className="ph ph-magnifying-glass" style={{fontSize:15}}></i></span>
            <input className="search-input" placeholder="이름, 이메일, 소속 검색" value={q} onChange={e=>setQ(e.target.value)}/>
          </div>
          <select className="filter-select" value={grade} onChange={e=>setGrade(e.target.value)}>
            {['전체','준회원','일반','정회원','이사'].map(g=><option key={g}>{g}</option>)}
          </select>
          <select className="filter-select" value={status} onChange={e=>setStatus(e.target.value)}>
            {['전체','활성','승인대기','비활성'].map(s=><option key={s}>{s}</option>)}
          </select>
          {chk.length>0&&<button className="action-btn btn-green" onClick={()=>{onToast(`${chk.length}명 일괄 승인 완료`);setChk([]);}}>
            <i className="ph ph-check-circle"></i> 일괄 승인 ({chk.length})
          </button>}
          <button className="action-btn btn-outline-green" onClick={()=>onToast('엑셀 파일이 다운로드됩니다.')}>
            <i className="ph ph-export"></i> 엑셀 내보내기
          </button>
        </div>
        <table className="data-table">
          <thead><tr>
            <th style={{width:40}}><input type="checkbox" className="chk-box" onChange={e=>setChk(e.target.checked?MEMBERS.filter(m=>m.status==='승인대기').map(m=>m.id):[])}/></th>
            <th>이름</th><th>소속 기관</th><th>등급</th><th>상태</th><th>가입일</th><th>최근 로그인</th>
          </tr></thead>
          <tbody>
            {rows.map(m=>(
              <tr key={m.id} onClick={()=>setSel(m)}>
                <td onClick={e=>e.stopPropagation()}><input type="checkbox" className="chk-box" checked={chk.includes(m.id)} onChange={e=>{e.stopPropagation();setChk(c=>c.includes(m.id)?c.filter(i=>i!==m.id):[...c,m.id]);}}/></td>
                <td><div style={{fontWeight:700}}>{m.name}</div><div style={{fontSize:11,color:'#4A7A62'}}>{m.email}</div></td>
                <td>{m.org}</td>
                <td><span className="badge bg-info">{m.grade}</span></td>
                <td><span className={`badge ${stColor[m.status]}`}>{m.status}</span></td>
                <td style={{color:'#4A7A62'}}>{m.joined}</td>
                <td style={{color:'#4A7A62'}}>{m.lastLogin}</td>
              </tr>
            ))}
          </tbody>
        </table>
        <div className="pagination">
          {[1,2,3,4,5].map(p=><button key={p} className={`pgbtn${p===1?' cur':''}`}>{p}</button>)}
        </div>
      </div>
      {sel&&<MemberDrawer m={sel} onClose={()=>setSel(null)} onToast={onToast}/>}
    </div>
  );
}

          <div style={{fontSize:14,fontWeight:800,color:'#1C3329',marginBottom:14,display:'flex',alignItems:'center',justifyContent:'space-between'}}>
            뉴스 소스 관리
            <button className="action-btn btn-green" style={{padding:'6px 12px',fontSize:12}} onClick={()=>onToast('RSS 수집이 시작되었습니다.')}>
              <i className="ph ph-arrow-clockwise"></i> 즉시 수집
            </button>
          </div>
          {NEWS_SOURCES.map(s=>(
            <div key={s.id} className="src-item">
              <div className="src-dot" style={{background:s.active?s.color:'#B7D9C8'}}></div>
              <div className="src-name">{s.name}</div>
              <span className="badge bg-info" style={{fontSize:10}}>{s.type}</span>
              <div className="src-count">{s.active?`수집 ${s.count}건`:'비활성'}</div>
              <div className="toggle" style={{background:s.active?s.color:'#B7D9C8',marginLeft:8}} onClick={()=>onToast(s.active?`${s.name} 비활성화됨`:`${s.name} 활성화됨`)}>
                <div className="toggle-knob" style={{left:s.active?'16px':'2px'}}></div>
              </div>
            </div>
          ))}
        </div>
        <div className="pg-hd" style={{marginBottom:14}}><div style={{fontSize:15,fontWeight:800,color:'#1C3329'}}>검수 대기 목록</div></div>
        <div className="news-queue">
          {queue.map(n=>(
            <div key={n.id} className="news-item">
              <div style={{flex:1,minWidth:0}}>
                <div className="news-title">{n.title}</div>
                <div className="news-origin">{n.source} · {n.date}</div>
              </div>
              <span className={`badge ${n.status==='대기'?'bg-pending':n.status==='검수중'?'bg-warn':n.status==='발행됨'?'bg-done':'bg-reject'}`} style={{marginRight:8}}>{n.status}</span>
              {(n.status==='대기'||n.status==='검수중')&&(
                <div className="news-actions">
                  <button className="nact-btn nact-pub" onClick={()=>publish(n.id)}>발행</button>
                  <button className="nact-btn nact-rej" onClick={()=>reject(n.id)}>반려</button>
                </div>
              )}
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

function SettingsView({onToast}){
  const [popupEnabled,setPopupEnabled]=useState(true);
  return(
    <div className="page-area">
      <div className="container">
        <div className="pg-hd"><div className="pg-title">배너·팝업</div><div className="pg-sub">홈페이지 배너 및 팝업 노출을 관리하세요</div></div>
        <div className="settings-grid">
          <div className="settings-card">
            <div className="sc-title"><i className="ph ph-image" style={{fontSize:18,color:'#2D6A4F'}}></i>메인 배너 설정</div>
            <div className="form-group"><label className="form-label">배너 제목</label><input className="form-input" defaultValue="디지털 전환 컨퍼런스 2026 — 지금 신청하세요"/></div>
            <div className="form-row">
              <div className="form-group"><label className="form-label">노출 시작일</label><input className="form-input" type="date" defaultValue="2026-05-20"/></div>
              <div className="form-group"><label className="form-label">노출 종료일</label><input className="form-input" type="date" defaultValue="2026-06-10"/></div>
            </div>
            <div className="form-group"><label className="form-label">연결 URL</label><input className="form-input" defaultValue="/events/conference-2026"/></div>
            <div className="pop-preview" style={{background:'linear-gradient(135deg,#2D6A4F,#4CAF80)',color:'#fff',borderStyle:'solid',borderColor:'#B7D9C8'}}>
              <div style={{fontSize:16,fontWeight:700}}>디지털 전환 컨퍼런스 2026</div>
              <div style={{fontSize:12,opacity:.8,marginTop:4}}>배너 미리보기</div>
            </div>
            <button className="action-btn btn-green" style={{width:'100%'}} onClick={()=>onToast('배너 설정이 저장되었습니다.')}>변경 사항 저장</button>
          </div>
          <div className="settings-card">
            <div className="sc-title"><i className="ph ph-browser" style={{fontSize:18,color:'#B5179E'}}></i>팝업 설정</div>
            <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:16}}>
              <span style={{fontSize:14,fontWeight:700,color:'#1C3329'}}>팝업 활성화</span>
              <div className="toggle" style={{background:popupEnabled?'#B5179E':'#B7D9C8'}} onClick={()=>{setPopupEnabled(!popupEnabled);onToast(popupEnabled?'팝업이 비활성화되었습니다.':'팝업이 활성화되었습니다.');}}>
                <div className="toggle-knob" style={{left:popupEnabled?'16px':'2px'}}></div>
              </div>
            </div>
            <div className="form-group"><label className="form-label">팝업 제목</label><input className="form-input" defaultValue="정기총회 참석 신청 안내"/></div>
            <div className="form-group"><label className="form-label">팝업 내용</label><textarea className="form-input" rows="3" defaultValue="2026년 정기총회가 6월 18일 개최됩니다. 사전 참석 신청을 해주세요." style={{resize:'vertical'}}></textarea></div>
            <div className="form-row">
              <div className="form-group"><label className="form-label">노출 시작</label><input className="form-input" type="date" defaultValue="2026-06-01"/></div>
              <div className="form-group"><label className="form-label">노출 종료</label><input className="form-input" type="date" defaultValue="2026-06-18"/></div>
            </div>
            <div className="pop-preview">
              <div style={{fontSize:14,fontWeight:700,color:'#1C3329',marginBottom:4}}>정기총회 참석 신청 안내</div>
              <div style={{fontSize:12,color:'#4A7A62'}}>팝업 미리보기입니다.</div>
            </div>
            <button className="action-btn btn-green" style={{width:'100%',background:'#B5179E'}} onClick={()=>onToast('팝업 설정이 저장되었습니다.')}>팝업 설정 저장</button>
          </div>
        </div>
      </div>
    </div>
  );
}

/* ---- App ---- */
function App(){
  const [view,setView]=useState('main');
  const [toast,setToast]=useState(null);
  const showToast=msg=>{setToast(msg);setTimeout(()=>setToast(null),3100);};
  const TABS=[
    {k:'main',l:'대시보드',ic:'ph-chart-pie'},
    {k:'members',l:'회원 관리',ic:'ph-users-three'},
    {k:'content',l:'콘텐츠 관리',ic:'ph-newspaper'},
    {k:'news',l:'뉴스 관리',ic:'ph-rss'},
    {k:'settings',l:'배너·팝업',ic:'ph-layout'},
  ];
  return(
    <div style={{width:'100%',minHeight:'100vh',display:'flex',flexDirection:'column'}}>
      <header className="gnav">
        <div className="gnav-logo">협회관리<span>시스템</span></div>
        <nav className="gnav-tabs">
          {TABS.map(t=>(
            <button key={t.k} className={`gtab${view===t.k?' active':''}`} onClick={()=>setView(t.k)}>
              <i className={`ph ${t.ic}`} style={{fontSize:16}}></i>{t.l}
            </button>
          ))}
        </nav>
        <div className="gnav-right">
          <div className="notif-btn"><i className="ph ph-bell" style={{fontSize:16}}></i><div className="notif-dot"></div></div>
          <div className="avatar">관</div>
        </div>
      </header>
      <main style={{flex:1,width:'100%'}}>
        {view==='main'&&<DashboardView/>}
        {view==='members'&&<MembersView onToast={showToast}/>}
        {view==='content'&&<ContentView onToast={showToast}/>}
        {view==='news'&&<NewsView onToast={showToast}/>}
        {view==='settings'&&<SettingsView onToast={showToast}/>}
      </main>
      <footer>한국디지털산업협회 통합 관리자 시스템 · 관리자 전용 페이지 · 2026 협회 맞춤 구현 데모</footer>
      {toast&&<Toast msg={toast}/>}
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
