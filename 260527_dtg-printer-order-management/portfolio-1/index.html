<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DTG 주문 출력 관리 시스템 — 맞춤 구현 데모</title>
  <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.0.3/src/regular/style.css">
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body, #root { width: 100%; min-height: 100vh; font-family: 'Pretendard', -apple-system, sans-serif; background: #F9F5EE; }

    @keyframes fadeIn { from { opacity:0 } to { opacity:1 } }
    @keyframes slideDown { from { opacity:0; transform:translateY(-10px) } to { opacity:1; transform:translateY(0) } }
    @keyframes toastUp { from { opacity:0; transform:translateY(12px) } to { opacity:1; transform:translateY(0) } }
    @keyframes pulse { 0%,100% { opacity:1 } 50% { opacity:0.35 } }
    @keyframes spinOnce { from { transform:rotate(0deg) } to { transform:rotate(360deg) } }

    .sidebar {
      position: fixed; left:0; top:0; bottom:0;
      width: 240px; background: #2C1810;
      display:flex; flex-direction:column; z-index:100;
    }
    .main-wrap {
      margin-left: 240px;
      flex: 1; min-width: 0;
      width: calc(100% - 240px);
      min-height: 100vh;
      display: flex; flex-direction: column;
    }
    .app-root { display:flex; width:100%; min-height:100vh; }

    .nav-item {
      display:flex; align-items:center; gap:10px;
      padding: 11px 18px; color:#B89070; cursor:pointer;
      font-size:13.5px; border-left:3px solid transparent;
      transition: background 0.12s, color 0.12s;
    }
    .nav-item:hover { background:rgba(255,255,255,0.06); color:#F9F5EE; }
    .nav-item.active { background:rgba(160,82,45,0.22); color:#F9F5EE; border-left-color:#E8A44A; }
    .nav-item i { font-size:17px; flex-shrink:0; }

    .page-topbar {
      background:#FFFFFF; border-bottom:1px solid #EDE8E2;
      padding:14px 28px; display:flex; align-items:center;
      justify-content:space-between; position:sticky; top:0; z-index:50;
    }
    .page-body { padding:24px 28px; }

    .card {
      background:#FFFFFF; border-radius:8px;
      box-shadow:0 2px 10px rgba(44,24,16,0.09), 0 1px 2px rgba(44,24,16,0.05);
      padding:20px;
    }

    .kpi-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:16px; }
    .kpi-card {
      background:#FFFFFF; border-radius:8px;
      box-shadow:0 2px 10px rgba(44,24,16,0.09);
      padding:18px 20px;
    }
    .kpi-label { font-size:11.5px; color:#7A5C48; font-weight:700; text-transform:uppercase; letter-spacing:.05em; }
    .kpi-val { font-size:28px; font-weight:800; margin-top:6px; }
    .kpi-sub { font-size:12px; color:#7A5C48; margin-top:3px; }

    .data-table { width:100%; border-collapse:collapse; font-size:13.5px; }
    .data-table th {
      text-align:left; padding:9px 14px; color:#7A5C48;
      font-size:11.5px; font-weight:700; text-transform:uppercase;
      letter-spacing:.04em; border-bottom:1px solid #EDE8E2;
    }
    .data-table td { padding:11px 14px; border-bottom:1px solid #F2EDE7; vertical-align:middle; }
    .data-table tbody tr:hover td { background:#FDF9F4; cursor:pointer; }
    .data-table tbody tr:last-child td { border-bottom:none; }

    .badge {
      display:inline-flex; align-items:center;
      padding:3px 9px; border-radius:20px;
      font-size:12px; font-weight:700;
    }
    .b-wait   { background:#FEF3E2; color:#8B5E0A; }
    .b-ready  { background:#E8F4FD; color:#1565A0; }
    .b-print  { background:#E8F8F2; color:#0C6B4D; }
    .b-done   { background:#E9FAF1; color:#1A6B3C; }
    .b-fail   { background:#FDECEB; color:#9C2215; }
    .b-cancel { background:#F0F0F0; color:#606060; }
    .b-error  { background:#FDECEB; color:#9C2215; }
    .b-warn   { background:#FEF3E2; color:#8B5E0A; }
    .b-info   { background:#E8F4FD; color:#1565A0; }

    .btn-primary {
      display:inline-flex; align-items:center; gap:6px;
      padding:9px 16px; background:#A0522D; color:#FFFFFF;
      border:none; border-radius:6px; font-size:13.5px;
      font-weight:700; font-family:inherit; cursor:pointer;
      transition:background .12s, transform .1s;
    }
    .btn-primary:hover { background:#8B4521; }
    .btn-primary:active { transform:scale(.97); }
    .btn-secondary {
      display:inline-flex; align-items:center; gap:6px;
      padding:9px 16px; background:transparent; color:#2C1810;
      border:1.5px solid #DDD4C8; border-radius:6px;
      font-size:13.5px; font-weight:600; font-family:inherit; cursor:pointer;
      transition:background .12s;
    }
    .btn-secondary:hover { background:#F0EBE4; }
    .btn-sm { padding:5px 12px; font-size:12.5px; }

    .modal-overlay {
      position:fixed; inset:0; background:rgba(44,24,16,.48);
      display:flex; align-items:center; justify-content:center;
      z-index:200; animation:fadeIn .15s ease;
    }
    .modal-box {
      background:#FFFFFF; border-radius:10px;
      box-shadow:0 20px 60px rgba(44,24,16,.22);
      width:540px; max-width:94vw; max-height:88vh;
      overflow-y:auto; animation:slideDown .2s ease;
    }
    .modal-head {
      padding:18px 22px; border-bottom:1px solid #EDE8E2;
      display:flex; align-items:center; justify-content:space-between;
    }
    .modal-body { padding:20px 22px; }

    .form-group { margin-bottom:14px; }
    .form-label { display:block; font-size:12.5px; font-weight:700; color:#7A5C48; margin-bottom:5px; }
    .form-input, .form-select {
      width:100%; padding:9px 12px; border:1.5px solid #DDD4C8;
      border-radius:6px; font-size:13.5px; font-family:inherit;
      color:#2C1810; background:#FFFFFF; outline:none;
      transition:border-color .12s;
    }
    .form-input:focus, .form-select:focus { border-color:#A0522D; }

    .toast {
      position:fixed; bottom:22px; right:22px;
      background:#2C1810; color:#FFFFFF;
      padding:11px 18px; border-radius:7px;
      font-size:13.5px; z-index:300;
      animation:toastUp .2s ease;
      box-shadow:0 4px 18px rgba(44,24,16,.22);
      display:flex; align-items:center; gap:8px;
    }

    .pulse-dot {
      width:8px; height:8px; border-radius:50%;
      display:inline-block;
      animation:pulse 1.8s infinite;
    }

    .screen-wrap { animation:fadeIn .18s ease; }

    .filter-btn {
      padding:5px 13px; border-radius:18px;
      font-size:12.5px; font-weight:600; font-family:inherit;
      cursor:pointer; border:1.5px solid #DDD4C8;
      background:#FFFFFF; color:#7A5C48;
      transition:all .12s;
    }
    .filter-btn.factive { background:#2C1810; color:#FFFFFF; border-color:#2C1810; }
    .filter-btn.f-err   { background:#FDECEB; color:#9C2215; border-color:#9C2215; }
    .filter-btn.f-warn  { background:#FEF3E2; color:#8B5E0A; border-color:#C4874A; }
    .filter-btn.f-info  { background:#E8F4FD; color:#1565A0; border-color:#1565A0; }

    .tag {
      display:inline-block; padding:2px 8px; border-radius:4px;
      font-size:11.5px; font-weight:700;
      background:#F0EBE4; color:#7A5C48;
    }

    .settings-section {
      background:#FFFFFF; border-radius:8px;
      box-shadow:0 2px 10px rgba(44,24,16,.09);
      padding:20px; margin-bottom:20px;
    }
    .settings-section-title {
      font-size:14px; font-weight:800; color:#2C1810;
      padding-bottom:12px; margin-bottom:14px;
      border-bottom:1px solid #F0EBE4;
      display:flex; align-items:center; justify-content:space-between;
    }

    .info-grid {
      display:grid; grid-template-columns:repeat(2,1fr); gap:10px;
    }
    .info-cell {
      background:#F9F5EE; padding:10px 14px; border-radius:6px;
    }
    .info-cell-label { font-size:11px; color:#7A5C48; font-weight:700; text-transform:uppercase; letter-spacing:.04em; margin-bottom:4px; }
    .info-cell-val { font-size:13.5px; color:#2C1810; font-weight:600; }

    @media (max-width:1100px) { .kpi-grid { grid-template-columns:repeat(2,1fr); } }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef } = React;

/* ── Mock Data ── */
const ORDERS = [
  { id:'ORD-2405-001', customer:'김민수', size:'XL', color:'화이트', design:'클래식 로고 A', status:'완료', created:'09:12', file:'design_A_xl_white.png', note:'당일 출력 요청' },
  { id:'ORD-2405-002', customer:'이지은', size:'M', color:'블랙', design:'그래픽 B-03', status:'출력 중', created:'09:34', file:'design_B03_m_black.png', note:'' },
  { id:'ORD-2405-003', customer:'박준형', size:'L', color:'네이비', design:'클래식 로고 A', status:'출력 준비', created:'09:51', file:'design_A_l_navy.png', note:'사이즈 재확인 필요' },
  { id:'ORD-2405-004', customer:'최서연', size:'S', color:'그레이', design:'플로럴 C', status:'대기', created:'10:05', file:'', note:'' },
  { id:'ORD-2405-005', customer:'정우진', size:'XL', color:'화이트', design:'빈티지 D', status:'실패', created:'10:18', file:'design_D_xl_white.png', note:'파일 전달 실패' },
  { id:'ORD-2405-006', customer:'한소희', size:'M', color:'블랙', design:'그래픽 B-03', status:'완료', created:'10:33', file:'design_B03_m_black.png', note:'' },
  { id:'ORD-2405-007', customer:'오민준', size:'L', color:'화이트', design:'클래식 로고 A', status:'완료', created:'10:47', file:'design_A_l_white.png', note:'' },
  { id:'ORD-2405-008', customer:'신예린', size:'M', color:'네이비', design:'플로럴 C', status:'취소', created:'11:02', file:'', note:'고객 요청 취소' },
];
const FILES = [
  { id:'F001', name:'design_A_xl_white.png', order:'ORD-2405-001', size:'2.3 MB', status:'완료', time:'09:14', retries:0 },
  { id:'F002', name:'design_B03_m_black.png', order:'ORD-2405-002', size:'1.8 MB', status:'처리 중', time:'09:36', retries:0 },
  { id:'F003', name:'design_A_l_navy.png', order:'ORD-2405-003', size:'2.1 MB', status:'대기', time:'09:53', retries:0 },
  { id:'F004', name:'design_D_xl_white.png', order:'ORD-2405-005', size:'3.4 MB', status:'실패', time:'10:20', retries:2 },
  { id:'F005', name:'design_B03_m_black.png', order:'ORD-2405-006', size:'1.8 MB', status:'완료', time:'10:35', retries:0 },
  { id:'F006', name:'design_A_l_white.png', order:'ORD-2405-007', size:'2.3 MB', status:'완료', time:'10:49', retries:0 },
];
const LOGS = [
  { id:1, time:'10:47:23', level:'정보', module:'HotFolder', msg:'design_A_l_white.png 파일 전달 완료 → ORD-2405-007', detail:'파일명 파싱 성공. 주문 매핑: ORD-2405-007. 복사 완료. 소요: 0.8s' },
  { id:2, time:'10:35:11', level:'정보', module:'HotFolder', msg:'design_B03_m_black.png 전달 완료 → ORD-2405-006', detail:'MD5: 8c7d9a12... 중복 없음. 소요: 0.6s' },
  { id:3, time:'10:20:44', level:'오류', module:'HotFolder', msg:'design_D_xl_white.png 전달 실패 (2회째)', detail:'오류: RIP Hot Folder 경로 접근 거부 (Permission denied). 재시도 대기 중. 최대 재시도: 3회' },
  { id:4, time:'10:18:30', level:'경고', module:'OrderManager', msg:'ORD-2405-005 출력 파일 전달 실패 감지', detail:'주문 상태 → 실패 업데이트. 운영자 확인 필요.' },
  { id:5, time:'10:05:19', level:'정보', module:'OrderManager', msg:'신규 주문 ORD-2405-004 등록 완료', detail:'고객: 최서연 / 사이즈: S / 색상: 그레이 / 디자인: 플로럴 C' },
  { id:6, time:'09:51:07', level:'정보', module:'OrderManager', msg:'ORD-2405-003 상태 변경: 대기 → 출력 준비', detail:'운영자: admin / 파일 연결: design_A_l_navy.png' },
  { id:7, time:'09:34:55', level:'정보', module:'HotFolder', msg:'design_B03_m_black.png 감지 → 대기열 등록', detail:'chokidar add 이벤트. 주문 자동 매핑 시도 중' },
  { id:8, time:'09:12:01', level:'정보', module:'System', msg:'DTG 관리 서버 시작. Hot Folder 감시 시작', detail:'포트: 4000. DB: SQLite ./data/dtg.db. Hot Folder: C:/DTG/hotfolder' },
];

const STATUS_CLS = { '대기':'b-wait','출력 준비':'b-ready','출력 중':'b-print','완료':'b-done','실패':'b-fail','취소':'b-cancel' };
const LOG_CLS = { '오류':'b-error','경고':'b-warn','정보':'b-info' };

function Badge({ label, clsMap }) {
  return <span className={`badge ${clsMap[label] || 'b-info'}`}>{label}</span>;
}

function Toast({ msg, onDone }) {
  useEffect(() => { const t = setTimeout(onDone, 2800); return () => clearTimeout(t); }, []);
  return <div className="toast"><i className="ph ph-check-circle"></i>{msg}</div>;
}

/* ── OrderModal ── */
function OrderModal({ order, onClose, onStatus }) {
  const [status, setStatus] = useState(order.status);
  const CAN = { '대기':['출력 준비','취소'],'출력 준비':['출력 중','취소'],'출력 중':['완료','실패'],'완료':[],'실패':['출력 준비'],'취소':[] };
  return (
    <div className="modal-overlay" onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div className="modal-box">
        <div className="modal-head">
          <div>
            <div style={{fontSize:15,fontWeight:800,color:'#2C1810'}}>{order.id}</div>
            <div style={{fontSize:12,color:'#7A5C48',marginTop:2}}>주문 상세 정보</div>
          </div>
          <button onClick={onClose} style={{background:'none',border:'none',cursor:'pointer',color:'#7A5C48',fontSize:20}}>
            <i className="ph ph-x"></i>
          </button>
        </div>
        <div className="modal-body">
          <div className="info-grid" style={{marginBottom:18}}>
            {[['고객명',order.customer],['사이즈',order.size],['색상',order.color],['디자인',order.design],['접수 시각',order.created],['출력 파일',order.file||'미연결']].map(([l,v])=>(
              <div key={l} className="info-cell">
                <div className="info-cell-label">{l}</div>
                <div className="info-cell-val">{v}</div>
              </div>
            ))}
          </div>
          <div style={{marginBottom:16}}>
            <div style={{fontSize:12,color:'#7A5C48',fontWeight:700,marginBottom:6}}>현재 상태</div>
            <Badge label={status} clsMap={STATUS_CLS} />
          </div>
          {order.note && (
            <div style={{background:'#FEF3E2',border:'1px solid #E8D5B0',borderRadius:6,padding:'10px 14px',marginBottom:16,fontSize:13,color:'#8B5E0A'}}>
              <i className="ph ph-note" style={{marginRight:6}}></i>{order.note}
            </div>
          )}
          {CAN[status]?.length > 0 && (
            <div>
              <div style={{fontSize:12,color:'#7A5C48',fontWeight:700,marginBottom:8}}>상태 전이</div>
              <div style={{display:'flex',gap:8}}>
                {CAN[status].map(s=>(
                  <button key={s} className={s==='취소'?'btn-secondary':'btn-primary'} style={{padding:'7px 14px',fontSize:13}}
                    onClick={()=>{setStatus(s);onStatus(order.id,s);}}>
                    {s}로 변경
                  </button>
                ))}
              </div>
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

/* ── NewOrderModal ── */
function NewOrderModal({ onClose, onSave }) {
  const [f, setF] = useState({ customer:'', size:'M', color:'화이트', design:'클래식 로고 A' });
  const up = k => e => setF(p=>({...p,[k]:e.target.value}));
  return (
    <div className="modal-overlay" onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div className="modal-box">
        <div className="modal-head">
          <div style={{fontSize:15,fontWeight:800,color:'#2C1810'}}>신규 주문 등록</div>
          <button onClick={onClose} style={{background:'none',border:'none',cursor:'pointer',color:'#7A5C48',fontSize:20}}>
            <i className="ph ph-x"></i>
          </button>
        </div>
        <div className="modal-body">
          <div className="form-group">
            <label className="form-label">고객명</label>
            <input className="form-input" value={f.customer} onChange={up('customer')} placeholder="고객 이름 입력" />
          </div>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:14}}>
            <div className="form-group">
              <label className="form-label">사이즈</label>
              <select className="form-select" value={f.size} onChange={up('size')}>
                {['XS','S','M','L','XL','XXL'].map(s=><option key={s}>{s}</option>)}
              </select>
            </div>
            <div className="form-group">
              <label className="form-label">색상</label>
              <select className="form-select" value={f.color} onChange={up('color')}>
                {['화이트','블랙','네이비','그레이','레드','옐로우'].map(c=><option key={c}>{c}</option>)}
              </select>
            </div>
          </div>
          <div className="form-group">
            <label className="form-label">디자인 파일 선택</label>
            <select className="form-select" value={f.design} onChange={up('design')}>
              {['클래식 로고 A','그래픽 B-03','플로럴 C','빈티지 D','모던 E-02'].map(d=><option key={d}>{d}</option>)}
            </select>
          </div>
          <div className="form-group">
            <label className="form-label">비고 (선택)</label>
            <input className="form-input" placeholder="특이사항 또는 요청사항 입력" />
          </div>
          <div style={{display:'flex',justifyContent:'flex-end',gap:8,paddingTop:4}}>
            <button className="btn-secondary" onClick={onClose}>취소</button>
            <button className="btn-primary" onClick={()=>{onSave(f);onClose();}}>
              <i className="ph ph-plus"></i>주문 등록
            </button>
          </div>
        </div>
      </div>
    </div>
  );
}

/* ── FileModal ── */
function FileModal({ file, onClose, onRetry }) {
  return (
    <div className="modal-overlay" onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div className="modal-box" style={{width:480}}>
        <div className="modal-head">
          <div>
            <div style={{fontSize:14,fontWeight:800,color:'#2C1810'}}>파일 처리 상세</div>
            <div style={{fontSize:12,color:'#7A5C48',marginTop:2}}>{file.name}</div>
          </div>
          <button onClick={onClose} style={{background:'none',border:'none',cursor:'pointer',color:'#7A5C48',fontSize:20}}>
            <i className="ph ph-x"></i>
          </button>
        </div>
        <div className="modal-body">
          <div className="info-grid" style={{marginBottom:16}}>
            {[['파일명',file.name],['크기',file.size],['연결 주문',file.order],['재시도',file.retries+'회'],['상태',file.status],['처리 시각',file.time]].map(([l,v])=>(
              <div key={l} className="info-cell">
                <div className="info-cell-label">{l}</div>
                <div className="info-cell-val">{v}</div>
              </div>
            ))}
          </div>
          {file.status==='실패' && (
            <div style={{background:'#FDECEB',borderRadius:6,padding:'11px 14px',marginBottom:14,fontSize:13,color:'#9C2215'}}>
              <i className="ph ph-warning-circle" style={{marginRight:6}}></i>

/* ── Chart ── */
function DashChart() {
  const ref = useRef(null);
  const chart = useRef(null);
  useEffect(()=>{
    if(!ref.current) return;
    if(chart.current) chart.current.destroy();
    chart.current = new Chart(ref.current, {
      type:'bar',
      data:{
        labels:['05/21','05/22','05/23','05/24','05/25','05/26','05/27'],
        datasets:[
          { label:'완료', data:[14,18,22,16,25,20,18], backgroundColor:'rgba(160,82,45,.72)', borderRadius:4, borderSkipped:false },
          { label:'실패', data:[1,0,2,1,0,1,2], backgroundColor:'rgba(156,34,21,.50)', borderRadius:4, borderSkipped:false },
        ],
      },
      options:{
        responsive:true, maintainAspectRatio:false,
        plugins:{ legend:{ position:'bottom', labels:{ font:{family:'Pretendard',size:12}, color:'#7A5C48' } } },
        scales:{
          x:{ grid:{display:false}, ticks:{color:'#7A5C48',font:{family:'Pretendard',size:11.5}} },
          y:{ grid:{color:'#F0EBE4'}, ticks:{color:'#7A5C48',font:{family:'Pretendard',size:11.5}} },
        },
      },
    });
    return ()=>{ if(chart.current) chart.current.destroy(); };
  },[]);
  return <div style={{position:'relative',height:210}}><canvas ref={ref}></canvas></div>;
}

    {key:'main',label:'주문 현황',icon:'ph-clipboard-text'},
    {key:'hotfolder',label:'Hot Folder 연동',icon:'ph-folder-open'},
    {key:'logs',label:'로그 조회',icon:'ph-list-bullets'},
    {key:'settings',label:'시스템 설정',icon:'ph-gear'},
  ];
  return (
    <div className="app-root" style={{width:'100%',minHeight:'100vh'}}>
      <aside className="sidebar">
        <div style={{padding:'22px 18px 16px',borderBottom:'1px solid rgba(255,255,255,.08)'}}>
          <div style={{display:'flex',alignItems:'center',gap:10}}>
            <div style={{width:34,height:34,borderRadius:7,background:'#A0522D',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>
              <i className="ph ph-printer" style={{fontSize:18,color:'#FFFFFF'}}></i>
            </div>
            <div>
              <div style={{fontSize:15,fontWeight:800,color:'#FFFFFF',lineHeight:1}}>TeeBooth</div>
              <div style={{fontSize:11,color:'#B89070',marginTop:2}}>DTG 주문 관리</div>
            </div>
          </div>
        </div>
        <div style={{padding:'10px 0'}}>
          <div style={{padding:'6px 18px 4px',fontSize:10,color:'#7A5C48',fontWeight:700,textTransform:'uppercase',letterSpacing:'.08em'}}>관리</div>
          {nav.map(n=>(
            <div key={n.key} className={`nav-item${screen===n.key?' active':''}`} onClick={()=>setScreen(n.key)}>
              <i className={`ph ${n.icon}`}></i>
              <span>{n.label}</span>
            </div>
          ))}
        </div>
        <div style={{marginTop:'auto',padding:'14px 18px',borderTop:'1px solid rgba(255,255,255,.08)'}}>
          <div style={{display:'flex',alignItems:'center',gap:10}}>
            <div style={{width:32,height:32,borderRadius:'50%',background:'#A0522D',display:'flex',alignItems:'center',justifyContent:'center',fontSize:13,fontWeight:800,color:'#FFFFFF',flexShrink:0}}>관</div>
            <div>
              <div style={{fontSize:13,color:'#C4A08A',fontWeight:600}}>관리자</div>
              <div style={{fontSize:11,color:'#7A5C48'}}>administrator</div>
            </div>
          </div>
        </div>
      </aside>
      <main className="main-wrap">
        <Scr toast={toast} />
      </main>
      {toastMsg && <Toast msg={toastMsg} onDone={()=>setToastMsg(null)} />}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
