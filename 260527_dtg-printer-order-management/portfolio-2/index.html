<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DTG 프린팅 관리 플랫폼 — 구현 데모</title>
  <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/@tabler/icons-webfont/dist/tabler-icons.min.css">
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://unpkg.com/prop-types/prop-types.min.js"></script>
  <script src="https://unpkg.com/react-is@18/umd/react-is.production.min.js"></script>
  <script src="https://unpkg.com/recharts/umd/Recharts.js"></script>
  <style>
    *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
    html, body, #root { width:100%; min-height:100vh; font-family:'Pretendard',-apple-system,sans-serif; background:#0F172A; color:#F1F5F9; }

    @keyframes fadeIn   { from{opacity:0}           to{opacity:1} }
    @keyframes slideUp  { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
    @keyframes slideFromRight { from{transform:translateX(100%)} to{transform:translateX(0)} }
    @keyframes livePulse{ 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.4;transform:scale(.85)} }
    @keyframes toastUp  { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }

    .app-wrap { display:flex; flex-direction:column; width:100%; min-height:100vh; }

    /* ── Topnav ── */
    .topnav {
      width:100%; background:#1E293B;
      border-bottom:1px solid rgba(255,255,255,.08);
      position:sticky; top:0; z-index:100;
      display:flex; align-items:center;
      padding:0 28px; height:56px; gap:0;
    }
    .topnav-brand { display:flex; align-items:center; gap:10px; margin-right:28px; }
    .topnav-brand-icon { width:30px; height:30px; border-radius:4px; background:#0D9488; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
    .topnav-tabs { display:flex; align-items:stretch; gap:0; height:56px; }
    .topnav-tab {
      display:flex; align-items:center; gap:7px;
      padding:0 16px; cursor:pointer;
      font-size:13.5px; color:#94A3B8; font-weight:600;
      border-bottom:2px solid transparent;
      transition:color .12s, border-color .12s;
      white-space:nowrap;
    }
    .topnav-tab:hover { color:#F1F5F9; }
    .topnav-tab.active { color:#0D9488; border-bottom-color:#0D9488; }
    .topnav-tab i { font-size:16px; }
    .topnav-right { margin-left:auto; display:flex; align-items:center; gap:12px; }
    .avatar { width:32px; height:32px; border-radius:50%; background:#0D9488; display:flex; align-items:center; justify-content:center; font-size:13px; font-weight:800; color:#FFFFFF; cursor:pointer; }

    /* ── Hero ── */
    .hero {
      background:linear-gradient(135deg, #0D9488 0%, #0F766E 60%, #115E59 100%);
      padding:24px 28px 20px;
    }
    .hero-title { font-size:20px; font-weight:800; color:#FFFFFF; }
    .hero-sub { font-size:13px; color:rgba(255,255,255,.72); margin-top:3px; }
    .hero-kpi { display:flex; gap:28px; margin-top:18px; }
    .hero-kpi-item { text-align:center; }
    .hero-kpi-val { font-size:26px; font-weight:800; color:#FFFFFF; line-height:1; }
    .hero-kpi-label { font-size:11.5px; color:rgba(255,255,255,.72); margin-top:3px; font-weight:600; text-transform:uppercase; letter-spacing:.04em; }

    /* ── Page body ── */
    .page-body { padding:24px 28px; flex:1; width:100%; }
    main { flex:1; width:100%; }

    /* ── Cards ── */
    .card {
      background:#1E293B; border-radius:4px;
      border:1px solid rgba(255,255,255,.1);
      padding:18px;
    }
    .card-title { font-size:13.5px; font-weight:800; color:#F1F5F9; margin-bottom:14px; display:flex; align-items:center; justify-content:space-between; }

    /* ── Data table ── */
    .data-table { width:100%; border-collapse:collapse; font-size:13px; }
    .data-table th { text-align:left; padding:8px 12px; color:#64748B; font-size:11.5px; font-weight:700; text-transform:uppercase; letter-spacing:.04em; border-bottom:1px solid rgba(255,255,255,.1); }
    .data-table td { padding:10px 12px; border-bottom:1px solid rgba(255,255,255,.06); vertical-align:middle; color:#E2E8F0; }
    .data-table tbody tr:hover td { background:rgba(255,255,255,.04); cursor:pointer; }
    .data-table tbody tr:last-child td { border-bottom:none; }

    /* ── Badges ── */
    .badge { display:inline-flex; align-items:center; padding:3px 9px; border-radius:3px; font-size:11.5px; font-weight:700; }
    .b-ok     { background:rgba(13,148,136,.25); color:#2DD4BF; }
    .b-warn   { background:rgba(245,158,11,.20); color:#FCD34D; }
    .b-err    { background:rgba(239,68,68,.20); color:#FCA5A5; }
    .b-off    { background:rgba(148,163,184,.15); color:#94A3B8; }
    .b-info   { background:rgba(99,102,241,.20); color:#A5B4FC; }
    .b-read   { background:rgba(148,163,184,.12); color:#64748B; }

    /* ── Buttons ── */
    .btn-primary { display:inline-flex; align-items:center; gap:6px; padding:8px 15px; background:#0D9488; color:#FFFFFF; border:none; border-radius:4px; font-size:13px; font-weight:700; font-family:inherit; cursor:pointer; transition:background .12s, transform .1s; }
    .btn-primary:hover { background:#0F766E; }
    .btn-primary:active { transform:scale(.97); }
    .btn-ghost { display:inline-flex; align-items:center; gap:6px; padding:8px 15px; background:transparent; color:#94A3B8; border:1px solid rgba(255,255,255,.15); border-radius:4px; font-size:13px; font-weight:600; font-family:inherit; cursor:pointer; transition:background .12s, color .12s; }
    .btn-ghost:hover { background:rgba(255,255,255,.08); color:#F1F5F9; }
    .btn-sm { padding:5px 11px; font-size:12px; }

    /* ── Filter tabs ── */
    .ftab { display:inline-flex; align-items:center; gap:5px; padding:5px 12px; border-radius:3px; font-size:12.5px; font-weight:600; font-family:inherit; cursor:pointer; border:1px solid rgba(255,255,255,.12); background:transparent; color:#64748B; transition:all .12s; }
    .ftab.fa  { background:#0D9488; color:#FFFFFF; border-color:#0D9488; }
    .ftab.fe  { background:rgba(239,68,68,.20); color:#FCA5A5; border-color:rgba(239,68,68,.4); }
    .ftab.fw  { background:rgba(245,158,11,.20); color:#FCD34D; border-color:rgba(245,158,11,.4); }
    .ftab.fi  { background:rgba(99,102,241,.20); color:#A5B4FC; border-color:rgba(99,102,241,.4); }

    /* ── Modal ── */
    .modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,.6); display:flex; align-items:center; justify-content:center; z-index:200; animation:fadeIn .15s; }
    .modal-box { background:#1E293B; border:1px solid rgba(255,255,255,.12); border-radius:4px; width:500px; max-width:94vw; max-height:88vh; overflow-y:auto; animation:slideUp .2s; }
    .modal-head { padding:16px 20px; border-bottom:1px solid rgba(255,255,255,.1); display:flex; align-items:center; justify-content:space-between; }
    .modal-body { padding:18px 20px; }
    .modal-title { font-size:15px; font-weight:800; color:#F1F5F9; }

    /* ── Form ── */
    .form-group { margin-bottom:13px; }
    .form-label { display:block; font-size:12px; font-weight:700; color:#64748B; margin-bottom:5px; text-transform:uppercase; letter-spacing:.04em; }
    .form-input, .form-select { width:100%; padding:8px 11px; background:#0F172A; border:1px solid rgba(255,255,255,.18); border-radius:4px; font-size:13.5px; font-family:inherit; color:#F1F5F9; outline:none; transition:border-color .12s; }
    .form-input:focus, .form-select:focus { border-color:#0D9488; }
    .form-select option { background:#1E293B; }

    /* ── Drawer ── */
    .drawer-overlay { position:fixed; inset:0; background:rgba(0,0,0,.5); z-index:200; animation:fadeIn .15s; }
    .drawer { position:fixed; top:0; right:0; bottom:0; width:380px; background:#1E293B; border-left:1px solid rgba(255,255,255,.12); z-index:201; animation:slideFromRight .2s ease; overflow-y:auto; display:flex; flex-direction:column; }
    .drawer-head { padding:16px 20px; border-bottom:1px solid rgba(255,255,255,.1); display:flex; align-items:center; justify-content:space-between; flex-shrink:0; }
    .drawer-body { padding:18px 20px; flex:1; }

    /* ── Live dot ── */
    .live-dot { width:8px; height:8px; border-radius:50%; display:inline-block; animation:livePulse 2s infinite; }

    /* ── Toast ── */
    .toast { position:fixed; bottom:22px; right:22px; background:#0D9488; color:#FFFFFF; padding:11px 18px; border-radius:4px; font-size:13.5px; z-index:300; animation:toastUp .2s; box-shadow:0 4px 16px rgba(13,148,136,.3); display:flex; align-items:center; gap:8px; }

    /* ── Device card ── */
    .device-card { background:#263245; border-radius:4px; border:1px solid rgba(255,255,255,.1); padding:16px; cursor:pointer; transition:border-color .12s, background .12s; }
    .device-card:hover { border-color:#0D9488; background:#2A3A52; }

    /* ── Info row ── */
    .info-row { display:flex; justify-content:space-between; align-items:center; padding:8px 0; border-bottom:1px solid rgba(255,255,255,.07); font-size:13px; }
    .info-row:last-child { border-bottom:none; }
    .info-key { color:#64748B; font-weight:600; font-size:12px; }

    /* ── Screen anim ── */
    .screen-wrap { animation:fadeIn .18s; display:flex; flex-direction:column; }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;
const { ComposedChart, Bar, Line, XAxis, YAxis, CartesianGrid, Tooltip, Legend, ResponsiveContainer, AreaChart, Area } = Recharts;

/* ── Mock Data ── */
const DEVICES = [
  { id:'DTG-001', name:'DTG 프린터 A1', model:'Brother GTX-422', loc:'1호 부스', status:'정상', jobs:148, fail:2, last:'10:47' },
  { id:'DTG-002', name:'DTG 프린터 B1', model:'Brother GTX-422', loc:'2호 부스', status:'출력 중', jobs:87, fail:0, last:'11:02' },
  { id:'DTG-003', name:'DTG 프린터 C1', model:'Epson SC-F2200', loc:'3호 부스', status:'점검 필요', jobs:213, fail:8, last:'09:55' },
  { id:'DTG-004', name:'DTG 프린터 D1', model:'Kornit Avalanche', loc:'4호 부스', status:'오프라인', jobs:0, fail:0, last:'어제 18:30' },
];
const CHART_DATA = [
  { date:'05/21', production:14, failRate:7.1 },
  { date:'05/22', production:18, failRate:0 },
  { date:'05/23', production:22, failRate:9.1 },
  { date:'05/24', production:16, failRate:6.3 },
  { date:'05/25', production:25, failRate:0 },
  { date:'05/26', production:20, failRate:5.0 },
  { date:'05/27', production:18, failRate:11.1 },
];
const NOTIFS = [
  { id:1, level:'오류', title:'DTG-003 불량률 임계값 초과', body:'불량률 11.1% — 임계값(10%)를 초과했습니다. 즉시 점검이 필요합니다.', time:'11:03', read:false },
  { id:2, level:'경고', title:'DTG-003 점검 예정일 3일 전', body:'2025-05-30 정기 점검 예정. 준비 절차를 진행해 주세요.', time:'09:00', read:false },
  { id:3, level:'정보', title:'DTG-002 출력 시작됨', body:'ORD-2405-002 파일 출력이 시작되었습니다. 예상 완료: 11분', time:'10:35', read:true },
  { id:4, level:'오류', title:'Hot Folder 파일 전달 실패', body:'design_D_xl_white.png 2회 재시도 모두 실패. 수동 처리가 필요합니다.', time:'10:20', read:true },
  { id:5, level:'정보', title:'DTG-001 일별 목표 달성', body:'오늘 목표(15건)를 달성했습니다. 누적 148건 처리 중.', time:'09:48', read:true },
  { id:6, level:'경고', title:'DTG-004 연결 끊김', body:'마지막 하트비트 이후 30초 경과. 연결 상태를 확인하세요.', time:'어제 18:30', read:true },
];
const DEVICE_STATUS_CLR = { '정상':'b-ok','출력 중':'b-info','점검 필요':'b-warn','오프라인':'b-off' };
const NOTIF_LEVEL_CLR = { '오류':'b-err','경고':'b-warn','정보':'b-info' };

function Toast({ msg, onDone }) {
  useEffect(()=>{ const t = setTimeout(onDone,2800); return ()=>clearTimeout(t); },[]);
  return <div className="toast"><i className="ti ti-check"></i>{msg}</div>;
}

/* ── DeviceDrawer ── */
function DeviceDrawer({ dev, onClose, toast }) {
  const [apiKey, setApiKey] = useState('dtg-api-xxx-yyy-zzz');
  const [showKeyEdit, setShowKeyEdit] = useState(false);
  return (
    <>
      <div className="drawer-overlay" onClick={onClose}></div>
      <div className="drawer">
        <div className="drawer-head">
          <div>
            <div style={{fontSize:15,fontWeight:800,color:'#F1F5F9'}}>{dev.name}</div>
            <div style={{fontSize:12,color:'#64748B',marginTop:2}}>{dev.model} — {dev.loc}</div>
          </div>
          <button onClick={onClose} style={{background:'none',border:'none',cursor:'pointer',color:'#64748B',fontSize:20}}>
            <i className="ti ti-x"></i>
          </button>
        </div>
        <div className="drawer-body">
          <div style={{marginBottom:16}}>
            <span className={`badge ${DEVICE_STATUS_CLR[dev.status]||'b-off'}`}>{dev.status}</span>
          </div>
          <div style={{background:'#0F172A',borderRadius:4,padding:'14px',marginBottom:16}}>
            {[['장치 ID',dev.id],['모델명',dev.model],['설치 위치',dev.loc],['총 처리 건',dev.jobs+'건'],['누적 실패',dev.fail+'건'],['마지막 활동',dev.last]].map(([k,v])=>(
              <div key={k} className="info-row">
                <span className="info-key">{k}</span>
                <span style={{fontSize:13,color:'#E2E8F0',fontWeight:600}}>{v}</span>
              </div>
            ))}
          </div>
          <div style={{marginBottom:16}}>
            <div style={{fontSize:12,color:'#64748B',fontWeight:700,marginBottom:8,textTransform:'uppercase',letterSpacing:'.04em'}}>API 키</div>
            {showKeyEdit ? (
              <div style={{display:'flex',gap:6}}>
                <input className="form-input" value={apiKey} onChange={e=>setApiKey(e.target.value)} style={{flex:1}} />
                <button className="btn-primary btn-sm" onClick={()=>{setShowKeyEdit(false);toast('API 키가 저장되었습니다');}}>저장</button>
              </div>
            ) : (
              <div style={{display:'flex',alignItems:'center',gap:8}}>
                <code style={{background:'#0F172A',padding:'7px 10px',borderRadius:4,fontSize:12,color:'#94A3B8',fontFamily:'monospace',flex:1,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{apiKey}</code>
                <button className="btn-ghost btn-sm" onClick={()=>setShowKeyEdit(true)}><i className="ti ti-edit"></i></button>
              </div>
            )}
          </div>
          <div style={{display:'flex',gap:8,paddingTop:4}}>
            <button className="btn-ghost" style={{flex:1}} onClick={()=>{toast(`${dev.id} API 키를 폐기했습니다`);}}>
              <i className="ti ti-key"></i>키 폐기
            </button>
            <button className="btn-primary" style={{flex:1}} onClick={()=>{toast(`${dev.name} 점검 일정을 등록했습니다`);}}>
              <i className="ti ti-calendar"></i>점검 등록
            </button>
          </div>
        </div>
      </div>
    </>
  );
}

/* ── AddDeviceModal ── */
function AddDeviceModal({ onClose, onSave }) {
  const [f, setF] = useState({ name:'', model:'Brother GTX-422', loc:'' });
  const up = k => e => setF(p=>({...p,[k]:e.target.value}));
  return (
    <div className="modal-overlay" onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div className="modal-box">
        <div className="modal-head">
          <div className="modal-title">장비 추가</div>
          <button onClick={onClose} style={{background:'none',border:'none',cursor:'pointer',color:'#64748B',fontSize:20}}>
            <i className="ti ti-x"></i>
          </button>
        </div>
        <div className="modal-body">
          <div className="form-group">
            <label className="form-label">장비 이름</label>
            <input className="form-input" value={f.name} onChange={up('name')} placeholder="예: DTG 프린터 E1" />
          </div>
          <div className="form-group">
            <label className="form-label">모델명</label>
            <select className="form-select" value={f.model} onChange={up('model')}>
              {['Brother GTX-422','Epson SC-F2200','Kornit Avalanche','Kornit Atlas','Brother GTX Pro'].map(m=><option key={m}>{m}</option>)}
            </select>
          </div>
          <div className="form-group">
            <label className="form-label">설치 위치</label>
            <input className="form-input" value={f.loc} onChange={up('loc')} placeholder="예: 5호 부스" />
          </div>
          <div style={{background:'rgba(13,148,136,.12)',border:'1px solid rgba(13,148,136,.3)',borderRadius:4,padding:'11px 14px',marginBottom:14,fontSize:12.5,color:'#2DD4BF'}}>
            <i className="ti ti-info-circle" style={{marginRight:6}}></i>
            장비 등록 후 UUID 기반 API 키가 자동 발급됩니다.
          </div>
          <div style={{display:'flex',justifyContent:'flex-end',gap:8}}>
            <button className="btn-ghost" onClick={onClose}>취소</button>
            <button className="btn-primary" onClick={()=>{onSave(f);onClose();}}>
              <i className="ti ti-plus"></i>장비 등록
            </button>
          </div>
        </div>
      </div>
    </div>
  );
}

/* ── Dashboard Screen ── */
function DashboardScreen({ toast }) {
  const [liveCount, setLiveCount] = useState({ total:23, done:18, printing:1, fail:2 });
  useEffect(()=>{
    const t = setInterval(()=>{
      setLiveCount(p=>({
        ...p,
        printing: p.printing===3?1:p.printing+1,
        done: p.done + (Math.random()>.7 ? 1 : 0),
      }));
    }, 3500);
    return ()=>clearInterval(t);
  },[]);
  return (
    <div className="screen-wrap">
      <div className="hero">
        <div style={{display:'flex',alignItems:'flex-start',justifyContent:'space-between'}}>
          <div>
            <div className="hero-title">관리자 대시보드</div>
            <div className="hero-sub">실시간 DTG 프린팅 운영 현황을 모니터링합니다</div>
          </div>
          <div style={{display:'flex',alignItems:'center',gap:7,background:'rgba(255,255,255,.12)',padding:'6px 12px',borderRadius:4}}>
            <span className="live-dot" style={{background:'#A7F3D0'}}></span>
            <span style={{fontSize:12,color:'rgba(255,255,255,.9)',fontWeight:700}}>실시간 연결</span>
          </div>
        </div>
        <div className="hero-kpi">
          {[
            { label:'오늘 총 주문', val:liveCount.total },
            { label:'완료', val:liveCount.done },
            { label:'출력 중', val:liveCount.printing },
            { label:'실패', val:liveCount.fail },
          ].map(k=>(
            <div key={k.label} className="hero-kpi-item">
              <div className="hero-kpi-val">{k.val}</div>
              <div className="hero-kpi-label">{k.label}</div>
            </div>
          ))}
        </div>
      </div>
      <div className="page-body">
        <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:14,marginBottom:20}}>
          {DEVICES.map(d=>(
            <div key={d.id} className="device-card" onClick={()=>toast(`${d.name} 상세 정보를 조회합니다`)}>
              <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:8}}>
                <i className="ti ti-printer" style={{fontSize:20,color:'#0D9488'}}></i>
                <span className={`badge ${DEVICE_STATUS_CLR[d.status]||'b-off'}`}>{d.status}</span>
              </div>
              <div style={{fontSize:13.5,fontWeight:800,color:'#F1F5F9',marginBottom:2}}>{d.name}</div>
              <div style={{fontSize:11.5,color:'#64748B',marginBottom:10}}>{d.loc}</div>
              <div style={{display:'flex',justifyContent:'space-between',fontSize:12,color:'#94A3B8'}}>
                <span>처리 <strong style={{color:'#F1F5F9'}}>{d.jobs}</strong></span>
                <span>실패 <strong style={{color:d.fail>0?'#FCA5A5':'#94A3B8'}}>{d.fail}</strong></span>
              </div>
            </div>
          ))}
        </div>
        <div style={{display:'grid',gridTemplateColumns:'2fr 1fr',gap:16}}>

                  <div style={{fontSize:13,color:'#E2E8F0'}}>{e.msg}</div>
                </div>
                <span style={{fontSize:11.5,color:'#475569',whiteSpace:'nowrap'}}>{e.t}</span>

          <div className="card">

                  <div style={{width:8,height:8,borderRadius:'50%',background:s.color,flexShrink:0}}></div>

              <i className="ti ti-device-desktop"></i>장비 관리 이동
            </button>
          </div>
        </div>
      </div>
    </div>
  );
}

/* ── Analytics Screen ── */
function AnalyticsScreen({ toast }) {
  const [range, setRange] = useState('7d');
  return (
    <div className="screen-wrap">
      <div className="hero">
        <div className="hero-title">통계 분석</div>
        <div className="hero-sub">기간별 생산량과 불량률을 분석하고 리포트를 내보냅니다</div>
      </div>
      <div className="page-body">
        <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:18}}>
          <div style={{display:'flex',gap:6}}>
            {[{l:'7일',v:'7d'},{l:'30일',v:'30d'},{l:'90일',v:'90d'}].map(r=>(
              <button key={r.v} className={`ftab${range===r.v?' fa':''}`} onClick={()=>setRange(r.v)}>{r.l}</button>
            ))}
          </div>
          <button className="btn-ghost btn-sm" style={{marginLeft:'auto'}} onClick={()=>toast('CSV 리포트 내보내기를 시작합니다')}>
            <i className="ti ti-download"></i>CSV 내보내기
          </button>
        </div>
        <div className="card" style={{marginBottom:18}}>
          <div className="card-title">일별 생산량 및 불량률</div>
          <div style={{height:260}}>
            <ResponsiveContainer width="100%" height="100%">
              <ComposedChart data={CHART_DATA} margin={{top:5,right:20,left:0,bottom:5}}>
                <CartesianGrid stroke="rgba(255,255,255,.06)" vertical={false} />
                <XAxis dataKey="date" tick={{fill:'#64748B',fontSize:12,fontFamily:'Pretendard'}} axisLine={false} tickLine={false} />
                <YAxis yAxisId="left" tick={{fill:'#64748B',fontSize:12,fontFamily:'Pretendard'}} axisLine={false} tickLine={false} />
                <YAxis yAxisId="right" orientation="right" unit="%" tick={{fill:'#64748B',fontSize:12,fontFamily:'Pretendard'}} axisLine={false} tickLine={false} />
                <Tooltip contentStyle={{background:'#263245',border:'1px solid rgba(255,255,255,.12)',borderRadius:4,color:'#F1F5F9',fontSize:12.5}} />
                <Legend wrapperStyle={{fontSize:12.5,color:'#94A3B8',fontFamily:'Pretendard'}} />
                <Bar yAxisId="left" dataKey="production" name="생산 건수" fill="#0D9488" opacity={0.85} radius={[2,2,0,0]} />
                <Line yAxisId="right" dataKey="failRate" name="불량률 %" stroke="#F59E0B" strokeWidth={2} dot={{fill:'#F59E0B',r:3}} />
              </ComposedChart>
            </ResponsiveContainer>
          </div>
        </div>
        <div className="card">
          <div className="card-title">장비별 통계</div>
          <table className="data-table">
            <thead><tr><th>장비</th><th>총 처리</th><th>실패</th><th>불량률</th><th>상태</th></tr></thead>
            <tbody>
              {DEVICES.map(d=>(
                <tr key={d.id} onClick={()=>toast(`${d.name} 상세 분석을 조회합니다`)}>
                  <td style={{fontWeight:700}}>{d.name}</td>
                  <td style={{color:'#2DD4BF',fontWeight:700}}>{d.jobs}</td>
                  <td style={{color:d.fail>0?'#FCA5A5':'#94A3B8',fontWeight:700}}>{d.fail}</td>
                  <td>
                    <span style={{color:d.jobs>0&&d.fail/d.jobs>.1?'#FCA5A5':'#94A3B8',fontWeight:700}}>
                      {d.jobs>0?((d.fail/d.jobs)*100).toFixed(1):'0.0'}%
                    </span>
                  </td>
                  <td><span className={`badge ${DEVICE_STATUS_CLR[d.status]||'b-off'}`}>{d.status}</span></td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      </div>
    </div>
  );
}

/* ── Devices Screen ── */
function DevicesScreen({ toast }) {
  const [devices, setDevices] = useState(DEVICES);
  const [sel, setSel] = useState(null);
  const [showAdd, setShowAdd] = useState(false);
  return (
    <div className="screen-wrap">
      <div className="hero">
        <div style={{display:'flex',alignItems:'flex-start',justifyContent:'space-between'}}>
          <div>
            <div className="hero-title">장비 관리</div>
            <div className="hero-sub">등록된 DTG 프린터 장비를 중앙에서 관리합니다</div>
          </div>
          <button className="btn-primary" onClick={()=>setShowAdd(true)}>
            <i className="ti ti-plus"></i>장비 추가
          </button>
        </div>
      </div>
      <div className="page-body">
        <div style={{display:'grid',gridTemplateColumns:'repeat(2,1fr)',gap:16}}>
          {devices.map(d=>(
            <div key={d.id} className="device-card" onClick={()=>setSel(d)}>
              <div style={{display:'flex',alignItems:'flex-start',justifyContent:'space-between',marginBottom:12}}>
                <div style={{display:'flex',alignItems:'center',gap:10}}>
                  <div style={{width:38,height:38,borderRadius:4,background:'rgba(13,148,136,.18)',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>
                    <i className="ti ti-printer" style={{fontSize:20,color:'#0D9488'}}></i>
                  </div>
                  <div>
                    <div style={{fontSize:14,fontWeight:800,color:'#F1F5F9'}}>{d.name}</div>
                    <div style={{fontSize:12,color:'#64748B',marginTop:2}}>{d.model}</div>
                  </div>
                </div>
                <span className={`badge ${DEVICE_STATUS_CLR[d.status]||'b-off'}`}>{d.status}</span>
              </div>
              <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:8}}>
                {[['위치',d.loc],['총 처리',d.jobs+'건'],['실패',d.fail+'건']].map(([k,v])=>(
                  <div key={k} style={{background:'#0F172A',padding:'8px 10px',borderRadius:4}}>
                    <div style={{fontSize:10.5,color:'#475569',fontWeight:700,textTransform:'uppercase',marginBottom:3}}>{k}</div>
                    <div style={{fontSize:13,color:'#E2E8F0',fontWeight:600}}>{v}</div>
                  </div>
                ))}
              </div>
              <div style={{marginTop:10,fontSize:11.5,color:'#475569'}}>
                <i className="ti ti-clock" style={{marginRight:5}}></i>
                마지막 활동: {d.last}
              </div>
            </div>
          ))}
        </div>
      </div>
      {sel && <DeviceDrawer dev={sel} onClose={()=>setSel(null)} toast={toast} />}
      {showAdd && <AddDeviceModal onClose={()=>setShowAdd(false)} onSave={f=>toast(`${f.name||'새 장비'}가 등록되었습니다`)} />}
    </div>
  );
}

/* ── Notifications Screen ── */
function NotificationsScreen({ toast }) {
  const [notifs, setNotifs] = useState(NOTIFS);
  const [lf, setLf] = useState('전체');
  const [showSettings, setShowSettings] = useState(false);
  const visible = lf==='전체' ? notifs : notifs.filter(n=>n.level===lf);
  const unread = notifs.filter(n=>!n.read).length;
  const fBtns = [{l:'전체',cls:''},{l:'오류',cls:'fe'},{l:'경고',cls:'fw'},{l:'정보',cls:'fi'}];
  const ICON = {'오류':'ti-alert-triangle','경고':'ti-alert-triangle','정보':'ti-info-circle'};
  const CLR = {'오류':'#FCA5A5','경고':'#FCD34D','정보':'#A5B4FC'};
  return (
    <div className="screen-wrap">
      <div className="hero">
        <div style={{display:'flex',alignItems:'flex-start',justifyContent:'space-between'}}>
          <div>
            <div style={{display:'flex',alignItems:'center',gap:10}}>
              <div className="hero-title">알림 관리</div>
              {unread>0&&<span style={{background:'#EF4444',color:'#FFFFFF',borderRadius:10,padding:'2px 8px',fontSize:12,fontWeight:800}}>{unread}</span>}
            </div>
            <div className="hero-sub">장비 오류, 불량률 초과, 파일 처리 실패 알림을 관리합니다</div>
          </div>
          <div style={{display:'flex',gap:8}}>
            <button className="btn-ghost btn-sm" onClick={()=>{setNotifs(p=>p.map(n=>({...n,read:true})));toast('모든 알림을 읽음 처리했습니다');}}>
              <i className="ti ti-checks"></i>모두 읽음
            </button>
            <button className="btn-ghost btn-sm" onClick={()=>setShowSettings(!showSettings)}>
              <i className="ti ti-settings"></i>알림 설정
            </button>
          </div>
        </div>
      </div>
      <div className="page-body">
        {showSettings && (
          <div className="card" style={{marginBottom:16}}>
            <div className="card-title">알림 수신 설정</div>
            {[{l:'장비 오류 알림',v:true},{l:'불량률 임계값 초과',v:true},{l:'파일 처리 실패',v:true},{l:'점검 예정일 알림',v:true}].map((s,i)=>(
              <div key={i} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'10px 0',borderBottom:i<3?'1px solid rgba(255,255,255,.07)':'none'}}>
                <span style={{fontSize:13,color:'#E2E8F0'}}>{s.l}</span>
                <div style={{width:36,height:20,background:s.v?'#0D9488':'#334155',borderRadius:10,cursor:'pointer',position:'relative',transition:'background .2s'}} onClick={()=>toast(`${s.l} 설정을 변경했습니다`)}>
                  <div style={{position:'absolute',top:2,left:s.v?18:2,width:16,height:16,borderRadius:'50%',background:'#FFFFFF',transition:'left .2s'}}></div>
                </div>
              </div>
            ))}
          </div>
        )}
        <div style={{display:'flex',gap:8,marginBottom:14}}>
          {fBtns.map(b=>(
            <button key={b.l} className={`ftab${lf===b.l?(b.cls?' '+b.cls:' fa'):''}`} onClick={()=>setLf(b.l)}>
              {b.l}
              <span style={{marginLeft:5,fontSize:11,fontWeight:800}}>
                {b.l==='전체'?notifs.length:notifs.filter(x=>x.level===b.l).length}
              </span>
            </button>
          ))}
        </div>
        <div className="card">
          {visible.map((n,i)=>(
            <div key={n.id} style={{display:'flex',gap:12,padding:'13px 0',borderBottom:i<visible.length-1?'1px solid rgba(255,255,255,.07)':'none',cursor:'pointer',opacity:n.read?.7:1,transition:'opacity .12s'}}
              onClick={()=>{setNotifs(p=>p.map(x=>x.id===n.id?{...x,read:true}:x));}}>
              <div style={{width:32,height:32,borderRadius:4,background:`rgba(${n.level==='오류'?'239,68,68':n.level==='경고'?'245,158,11':'99,102,241'},.18)`,display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0,marginTop:1}}>
                <i className={`ti ${ICON[n.level]}`} style={{fontSize:16,color:CLR[n.level]}}></i>
              </div>
              <div style={{flex:1}}>
                <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:3}}>
                  <span style={{fontSize:13.5,fontWeight:700,color:n.read?'#94A3B8':'#F1F5F9'}}>{n.title}</span>
                  {!n.read&&<span style={{width:7,height:7,borderRadius:'50%',background:'#0D9488',flexShrink:0}}></span>}
                </div>
                <div style={{fontSize:12.5,color:'#64748B',lineHeight:1.5}}>{n.body}</div>
              </div>
              <span style={{fontSize:11.5,color:'#475569',whiteSpace:'nowrap',flexShrink:0}}>{n.time}</span>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

/* ── App ── */
function App() {
  const [screen, setScreen] = useState('main');
  const [toastMsg, setToastMsg] = useState(null);
  const toast = msg => setToastMsg(msg);
  const SCREENS = { main:DashboardScreen, analytics:AnalyticsScreen, devices:DevicesScreen, notifications:NotificationsScreen };
  const Scr = SCREENS[screen];
  const nav = [
    {key:'main',label:'대시보드',icon:'ti-dashboard'},
    {key:'analytics',label:'통계 분석',icon:'ti-chart-bar'},
    {key:'devices',label:'장비 관리',icon:'ti-device-desktop'},
    {key:'notifications',label:'알림 관리',icon:'ti-bell'},
  ];
  return (
    <div className="app-wrap" style={{width:'100%',minHeight:'100vh'}}>
      <header className="topnav">
        <div className="topnav-brand">
          <div className="topnav-brand-icon">
            <i className="ti ti-printer" style={{fontSize:16,color:'#FFFFFF'}}></i>
          </div>
          <div>
            <div style={{fontSize:14,fontWeight:800,color:'#F1F5F9',lineHeight:1}}>TeeBooth Platform</div>
            <div style={{fontSize:10.5,color:'#64748B',marginTop:2}}>DTG 프린팅 관리</div>
          </div>
        </div>
        <nav className="topnav-tabs">
          {nav.map(n=>(
            <button key={n.key} className={`topnav-tab${screen===n.key?' active':''}`} onClick={()=>setScreen(n.key)}>
              <i className={`ti ${n.icon}`}></i>
              {n.label}
            </button>
          ))}
        </nav>
        <div className="topnav-right">
          <button style={{background:'none',border:'none',cursor:'pointer',color:'#64748B',fontSize:18,position:'relative'}} onClick={()=>toast('알림 패널을 열겠습니다')}>
            <i className="ti ti-bell"></i>
            <span style={{position:'absolute',top:-2,right:-2,width:8,height:8,borderRadius:'50%',background:'#EF4444'}}></span>
          </button>
          <div className="avatar">관</div>
        </div>
      </header>
      <main style={{flex:1,width:'100%'}}>
        <Scr toast={toast} />
      </main>
      {toastMsg && <Toast msg={toastMsg} onDone={()=>setToastMsg(null)} />}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
