            </div>
            {filtered.map(l => (
              <div key={l.id} className="table-row table-cols-license" onClick={() => setSelectedLicense(l)}>
                <div>
                  <div style={{fontWeight:500,fontSize:14}}>{l.type} ({l.code})</div>
                  <div style={{fontSize:12,color:'#94A3B8'}}>발급: {l.issued} · 만료: {l.expires}</div>
                </div>
                <span>{l.owner}</span>
                <span>{l.area}</span>
                <span style={{fontWeight:600,color:'#0E7490'}}>{l.price}</span>
                <span><span className={`badge ${statusClasses[l.status]}`}>{statusLabels[l.status]}</span></span>
                <button className="row-action-btn" onClick={e => { e.stopPropagation(); setSelectedLicense(l); }}>상세</button>
              </div>
            ))}
          </div>
          {filtered.length === 0 && (
            <div className="empty-state" style={{marginTop:20}}>
              <div style={{color:'#94A3B8',fontSize:14}}>해당 유형의 허가권 매물이 없습니다.</div>
            </div>
          )}
        </div>
      </div>

      {selectedLicense && (
        <div className="drawer-overlay" onClick={e => e.target === e.currentTarget && setSelectedLicense(null)}>
          <div className="drawer-panel">
            <div className="drawer-header">
              <span className="drawer-title">허가권 상세</span>
              <button className="drawer-close" onClick={() => setSelectedLicense(null)}>
                <i data-lucide="x" style={{width:16,height:16}} />
              </button>
            </div>
            <div className="drawer-body">
              <div style={{marginBottom:8}}><span className={`badge ${statusClasses[selectedLicense.status]}`}>{statusLabels[selectedLicense.status]}</span></div>
              <div style={{fontSize:20,fontWeight:700,marginBottom:4}}>{selectedLicense.type}</div>
              <div style={{fontSize:13,color:'#64748B',marginBottom:16}}>{selectedLicense.code}</div>
              <div className="detail-grid">
                <div className="detail-row"><div className="detail-label">소유자</div><div className="detail-val">{selectedLicense.owner}</div></div>
                <div className="detail-row"><div className="detail-label">지역</div><div className="detail-val">{selectedLicense.area}</div></div>
                <div className="detail-row"><div className="detail-label">발급일</div><div className="detail-val">{selectedLicense.issued}</div></div>
                <div className="detail-row"><div className="detail-label">만료일</div><div className="detail-val">{selectedLicense.expires}</div></div>
              </div>
              <div style={{padding:'14px 0',borderTop:'1px solid #F1F5F9',marginTop:8}}>
                <div style={{fontSize:22,fontWeight:700,color:'#0E7490'}}>{selectedLicense.price}</div>
                <div style={{fontSize:12,color:'#94A3B8',marginTop:3}}>허가권 이전 수수료 별도 협의</div>
              </div>
              <div style={{marginTop:12}}>
                <div className="form-label" style={{marginBottom:8}}>이전 필수 서류</div>
                <div className="license-checklist">
                  {['어업허가증 원본', '어선 등록원부', '양도 동의서', '인감증명서 2부'].map(doc => (
                    <div key={doc} className="checklist-item">
                      <input type="checkbox" id={`license-${doc}`} />
                      <label htmlFor={`license-${doc}`}>{doc}</label>
                    </div>
                  ))}
                </div>
              </div>
            </div>
            <div className="drawer-footer">
              <button className="btn-inquiry" onClick={() => { setSelectedLicense(null); setToast({ msg: '허가권 거래 상담 신청이 완료되었습니다.', type: 'success' }); setTimeout(() => setToast(null), 3000); }}>거래 상담 신청</button>
            </div>
          </div>
        </div>
      )}

      {addOpen && (
        <div className="modal-overlay" onClick={e => e.target === e.currentTarget && setAddOpen(false)}>
          <div className="modal-box">
            <div className="modal-header">
              <span className="modal-title">허가권 거래 신청</span>
              <button className="drawer-close" onClick={() => setAddOpen(false)}>
                <i data-lucide="x" style={{width:16,height:16}} />
              </button>
            </div>
            <div className="modal-body">
              <div className="form-group">
                <label className="form-label">허가권 유형</label>
                <select className="form-select">
                  <option>연안어업</option>
                  <option>근해어업</option>
                </select>
              </div>
              <div className="form-group">
                <label className="form-label">허가 지역</label>
                <input className="form-input" placeholder="예: 강원 속초" />
              </div>
              <div className="form-row">
                <div className="form-group">
                  <label className="form-label">허가 코드</label>
                  <input className="form-input" placeholder="허가증 번호" />
                </div>
                <div className="form-group">
                  <label className="form-label">거래 희망가</label>
                  <input className="form-input" placeholder="1,200만원" />
                </div>
              </div>
              <div className="form-group">
                <label className="form-label">필수 서류 확인</label>
                <div className="license-checklist">
                  {['어업허가증 원본 보유', '어선 등록원부 발급 가능', '양도 동의 의사 확인'].map(doc => (
                    <div key={doc} className="checklist-item">
                      <input type="checkbox" id={`new-${doc}`} />
                      <label htmlFor={`new-${doc}`}>{doc}</label>
                    </div>
                  ))}
                </div>
              </div>
            </div>
            <div className="modal-footer">
              <button className="btn-cancel" onClick={() => setAddOpen(false)}>취소</button>
              <button className="btn-submit" onClick={handleAdd}>신청 완료</button>
            </div>
          </div>
        </div>
      )}

      {toast && <Toast msg={toast.msg} type={toast.type} />}
    </>
  );
}

function AdminScreen() {
  const [reviewQueue, setReviewQueue] = useState(REVIEW_QUEUE);
  const [members, setMembers] = useState(MEMBERS);
  const [toast, setToast] = useState(null);

  const approve = (id) => {
    setReviewQueue(q => q.filter(r => r.id !== id));
    setToast({ msg: '매물이 승인되어 게시되었습니다. 인증 마크가 부여됩니다.', type: 'success' });
    setTimeout(() => setToast(null), 3000);
  };
  const reject = (id) => {
    setReviewQueue(q => q.filter(r => r.id !== id));
    setToast({ msg: '매물이 반려되었습니다. 판매자에게 알림이 발송됩니다.', type: 'error' });
    setTimeout(() => setToast(null), 3000);
  };

  return (
    <>
      <div className="page-wrap">
        <div className="content-area" style={{paddingTop:32}}>
          <div style={{fontSize:20,fontWeight:700,color:'#0F172A',marginBottom:20}}>관리자 대시보드</div>
          <div className="stats-grid">
            {[
              { label:'검수 대기', val: reviewQueue.length, icon:'inbox', color:'#FEF9C3', text:'#854D0E', sub:'신규 매물 요청' },
              { label:'이번 달 승인', val: 24, icon:'check-circle', color:'#DCFCE7', text:'#166534', sub:'전월 대비 +4' },
              { label:'총 등록 매물', val: 328, icon:'anchor', color:'#E0F2FE', text:'#0E7490', sub:'활성 매물 213건' },
              { label:'신규 회원', val: members.length, icon:'users', color:'#F3F4F6', text:'#374151', sub:'이번 주 가입' },
            ].map((s, i) => (
              <div key={i} className="stat-card" style={{animationDelay: `${i*0.08}s`}}>
                <div className="stat-card-label">
                  <div style={{width:24,height:24,borderRadius:6,background:s.color,display:'flex',alignItems:'center',justifyContent:'center'}}>
                    <i data-lucide={s.icon} style={{width:13,height:13,color:s.text}} />
                  </div>
                  {s.label}
                </div>
                <div className="stat-card-val">{s.val}</div>
                <div className="stat-card-sub">{s.sub}</div>
              </div>
            ))}
          </div>
          <div className="admin-grid">
            <div>
              <div className="admin-panel">
                <div className="admin-panel-header">
                  <span>검수 대기 매물</span>
                  <span style={{fontSize:12,color:'#94A3B8'}}>{reviewQueue.length}건 대기 중</span>
                </div>
                <div className="admin-panel-body">
                  {reviewQueue.length === 0 && (
                    <div style={{padding:'32px 20px',textAlign:'center',color:'#94A3B8',fontSize:14}}>
                      모든 매물 검수가 완료되었습니다.
                    </div>
                  )}
                  {reviewQueue.map(r => (
                    <div key={r.id} className="review-item" style={{animationDelay:`${r.id * 0.06}s`}}>
                      <div className="review-item-info">
                        <div className="review-item-name">{r.name}</div>
                        <div className="review-item-sub">{r.seller} · {r.submitted} {r.flags > 0 && '· 허위 의심 플래그'}</div>
                      </div>
                      <div className="review-actions">
                        <button className="btn-approve" onClick={e => { e.stopPropagation(); approve(r.id); }}>승인</button>
                        <button className="btn-reject" onClick={e => { e.stopPropagation(); reject(r.id); }}>반려</button>
                      </div>
                    </div>
                  ))}
                </div>
              </div>
              <div className="admin-panel" style={{marginTop:16}}>
                <div className="admin-panel-header">
                  <span>월별 매물 등록 추이</span>
                </div>
                <div style={{padding:'12px 16px 16px'}}>
                  <div className="chart-wrap">
                    <ResponsiveContainer width="100%" height="100%">
                      <BarChart data={MONTH_STATS}>
                        <CartesianGrid strokeDasharray="3 3" stroke="#F1F5F9" />
                        <XAxis dataKey="m" tick={{fontSize:12}} />
                        <YAxis tick={{fontSize:12}} />
                        <Tooltip />
                        <Bar dataKey="listings" fill="#0E7490" radius={[4,4,0,0]} name="신규 매물" />
                        <Bar dataKey="deals" fill="#7DD3EA" radius={[4,4,0,0]} name="거래 완료" />
                      </BarChart>
                    </ResponsiveContainer>
                  </div>
                </div>
              </div>
            </div>
            <div>
              <div className="admin-panel">
                <div className="admin-panel-header">
                  <span>최근 가입 회원</span>
                </div>
                <div className="admin-panel-body">
                  {members.map(m => (
                    <div key={m.id} className="member-item">
                      <div className="member-avatar-sm">{m.name[0]}</div>
                      <div style={{flex:1}}>
                        <div className="member-name">{m.name}</div>
                        <div className="member-role">{m.joined}</div>
                      </div>
                      <span className={m.role === '판매자' ? 'badge-role-seller' : 'badge-role-buyer'}>{m.role}</span>
                    </div>
                  ))}
                </div>
              </div>
              <div className="admin-panel" style={{marginTop:16}}>
                <div className="admin-panel-header"><span>문의 응답 현황</span></div>
                <div style={{padding:'12px 16px 16px'}}>
                  <div className="chart-wrap">
                    <ResponsiveContainer width="100%" height="100%">
                      <LineChart data={MONTH_STATS}>
                        <CartesianGrid strokeDasharray="3 3" stroke="#F1F5F9" />
                        <XAxis dataKey="m" tick={{fontSize:12}} />
                        <YAxis tick={{fontSize:12}} />
                        <Tooltip />
                        <Line type="monotone" dataKey="inquiries" stroke="#0E7490" strokeWidth={2} dot={{r:3}} name="문의 건수" />
                      </LineChart>
                    </ResponsiveContainer>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
      {toast && <Toast msg={toast.msg} type={toast.type} />}
    </>
  );
}

function App() {
  const [page, setPage] = useState('매물 검색');
  const [selectedDrawer, setSelectedDrawer] = useState(null);
  const tabs = ['매물 검색', '매물 상세', '허가권 거래', '관리자'];
  const tabIcons = { '매물 검색': 'search', '매물 상세': 'file-text', '허가권 거래': 'anchor', '관리자': 'shield' };

  useEffect(() => { createIcons(); }, [page, selectedDrawer]);

  const renderPage = () => {
    switch(page) {
      case '매물 검색': return <SearchScreen onSelectListing={setSelectedDrawer} selectedDrawer={selectedDrawer} />;
      case '매물 상세': return <ListingDetailScreen onSelectListing={setSelectedDrawer} setPage={setPage} />;
      case '허가권 거래': return <LicenseScreen />;
      case '관리자': return <AdminScreen />;
      default: return null;
    }
  };

  return (
    <div style={{width:'100%', minHeight:'100vh', display:'flex', flexDirection:'column'}}>
      <header className="topnav">
        <div className="topnav-brand">
          <i data-lucide="anchor" style={{width:20,height:20}} />
          어선마켓
        </div>
        <div className="topnav-tabs">
          {tabs.map(t => (
            <button key={t} className={`tab-btn${page === t ? ' active' : ''}`} onClick={() => setPage(t)}>
              <i data-lucide={tabIcons[t]} style={{width:14,height:14}} />
              {t}
            </button>
          ))}
        </div>
        <div className="topnav-right">
          <div style={{position:'relative',cursor:'pointer'}}>
            <i data-lucide="bell" style={{width:18,height:18,color:'#64748B'}} />
            <div style={{position:'absolute',top:-4,right:-4,width:8,height:8,borderRadius:'50%',background:'#EF4444'}} />
          </div>
          <div className="topnav-avatar">관</div>
        </div>
      </header>
      <main style={{flex:1,width:'100%'}}>
        {renderPage()}
      </main>
      {selectedDrawer && page === '매물 검색' && <ListingDrawer item={selectedDrawer} onClose={() => setSelectedDrawer(null)} />}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
