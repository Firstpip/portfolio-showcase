              </div>
            </div>
            <div className="panel" style={{marginTop:14}}>
              <div className="panel-head">SMS 발송 이력</div>
              <div style={{padding:'12px 16px 12px'}}>
                <div className="sms-log">
                  {SMS_LOGS.map((s, i) => (
                    <div key={s.id} className="sms-item" style={{animationDelay:`${i*0.06}s`}}>
                      <div>
                        <div style={{fontSize:12,fontWeight:600}}>[{s.type}] {s.to}</div>
                        <div style={{fontSize:11,color:'#78716C',marginTop:2}}>{s.content.substring(0,32)}...</div>
                        <div style={{fontSize:11,color:'#A8A29E'}}>{s.time}</div>
                      </div>
                      <span className={s.status === 'ok' ? 'sms-status-ok' : 'sms-status-fail'}>
                        {s.status === 'ok' ? '발송 완료' : '실패'}
                      </span>
                    </div>
                  ))}
                </div>
              </div>
            </div>
          </div>
          <div>
            {selected && (
              <div className="notif-content-wrap">
                <div style={{fontSize:15,fontWeight:700,marginBottom:4}}>{selected.title}</div>
                <div style={{fontSize:13,color:'#78716C',marginBottom:16}}>{selected.msg}</div>
                {selected.thread.length > 0 ? (
                  <>
                    <div style={{fontSize:12,fontWeight:600,color:'#92400E',marginBottom:10}}>상담 스레드</div>
                    <div style={{maxHeight:240,overflowY:'auto'}}>
                      {messages.map((m, i) => (
                        <div key={i} className={`thread-msg${m.role === 'buyer' ? ' thread-msg-buyer' : ' thread-msg-seller'}`}
                          style={{animationDelay:`${i*0.08}s`}}>
                          <div className="thread-sender">{m.sender}</div>
                          <div>{m.msg}</div>
                        </div>
                      ))}
                    </div>
                    <div className="thread-input-row">
                      <input className="thread-input" value={threadMsg} onChange={e => setThreadMsg(e.target.value)}
                        placeholder="답변을 입력하세요..." onKeyDown={e => e.key === 'Enter' && sendMsg()} />
                      <button className="thread-send" onClick={sendMsg}>전송</button>
                    </div>
                  </>
                ) : (
                  <div style={{padding:'24px 0',textAlign:'center',color:'#A8A29E',fontSize:13}}>
                    <i className="ph ph-check-circle" style={{fontSize:28,color:'#D97706',display:'block',marginBottom:8}} />
                    처리 완료된 알림입니다.
                  </div>
                )}
              </div>
            )}
          </div>
        </div>
      </div>
      {toast && <Toast msg={toast.msg} type={toast.type} />}
    </div>
  );
}

function TransactionScreen() {
  const [selectedTx, setSelectedTx] = useState(TRANSACTIONS[0]);
  const [checklist, setChecklist] = useState(TRANSACTIONS[0].checklist);

  const toggleCheck = (id) => {
    setChecklist(prev => prev.map(c => c.id === id ? {...c, done: !c.done} : c));
  };

  const selectTx = (tx) => {
    setSelectedTx(tx);
    setChecklist(tx.checklist);
  };

  const doneCount = checklist.filter(c => c.done).length;
  const progress = Math.round((doneCount / checklist.length) * 100);

  return (
    <div className="full-page">
      <div className="container" style={{paddingTop:28}}>
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:20}}>
          <div>
            <div style={{fontSize:20,fontWeight:800}}>거래 현황</div>
            <div style={{fontSize:13,color:'#78716C',marginTop:2}}>진행 중인 거래의 단계별 현황을 추적합니다</div>
          </div>
        </div>
        <div style={{display:'flex',gap:10,marginBottom:20}}>
          {TRANSACTIONS.map((tx, i) => (
            <button key={tx.id} onClick={() => selectTx(tx)}
              style={{padding:'10px 18px',borderRadius:6,border:`2px solid ${selectedTx.id === tx.id ? '#D97706' : '#FDE68A'}`,
                background: selectedTx.id === tx.id ? '#FEF3C7' : '#fff',
                color: selectedTx.id === tx.id ? '#92400E' : '#57534E',
                fontFamily:'inherit',fontWeight:selectedTx.id === tx.id ? 700 : 500,
                fontSize:13,cursor:'pointer',transition:'all 0.15s',animationDelay:`${i*0.07}s`}}>
              {tx.listing.substring(0,12)}...
            </button>
          ))}
        </div>
        <div className="tracker-layout">
          <div className="timeline-wrap">
            <div className="panel">
              <div className="panel-head">
                진행 단계 타임라인
                <div style={{display:'flex',alignItems:'center',gap:8}}>
                  <span style={{fontSize:13,fontWeight:700,color:'#D97706'}}>{selectedTx.buyer} 구매자</span>
                  <span style={{fontSize:12,color:'#78716C'}}>· {selectedTx.price}</span>
                </div>
              </div>
              <div style={{padding:'20px 20px'}}>
                {selectedTx.steps.map((s, i) => (
                  <div key={i} className="timeline-item" style={{animationDelay:`${i*0.1}s`}}>
                    <div className={`timeline-dot${s.done ? ' done' : s.current ? ' current' : ''}`}>
                      {s.done ? <i className="ph ph-check" style={{fontSize:14,color:'#fff'}} /> :
                        s.current ? <i className="ph ph-spinner" style={{fontSize:14,color:'#D97706'}} /> :
                        <i className="ph ph-circle" style={{fontSize:14,color:'#D4D0CE'}} />}
                    </div>
                    <div className="timeline-content">
                      <div className="timeline-phase" style={{color: s.done ? '#1C1917' : s.current ? '#D97706' : '#A8A29E'}}>{s.phase}</div>
                      <div className="timeline-date">{s.date}</div>
                      <div className="timeline-desc">{s.desc}</div>
                    </div>
                  </div>
                ))}
              </div>
            </div>
          </div>
          <div className="checklist-panel">
            <div className="panel">
              <div className="panel-head">
                서류 체크리스트
                <span style={{fontSize:12,color:'#78716C'}}>{doneCount}/{checklist.length} 완료</span>
              </div>
              <div style={{padding:'14px 16px'}}>
                <div style={{marginBottom:14}}>
                  <div style={{display:'flex',justifyContent:'space-between',fontSize:12,color:'#78716C',marginBottom:5}}>
                    <span>진행률</span><span style={{fontWeight:700,color:'#D97706'}}>{progress}%</span>
                  </div>
                  <div className="progress-wrap" style={{height:8}}>
                    <div className="progress-bar" style={{'--progress-w':`${progress}%`, width:`${progress}%`}} />
                  </div>
                </div>
                {checklist.map((c, i) => (
                  <div key={c.id} className={`check-item${c.done ? ' checked' : ''}`}
                    style={{animationDelay:`${i*0.07}s`}} onClick={() => toggleCheck(c.id)}>
                    <div className={`check-circle${c.done ? ' checked' : ''}`}>
                      {c.done && <i className="ph ph-check" style={{fontSize:11,color:'#fff'}} />}
                    </div>
                    <span className={`check-text${c.done ? ' checked' : ''}`}>{c.text}</span>
                  </div>
                ))}
                {progress === 100 && (
                  <div style={{marginTop:14,padding:'12px 14px',background:'#FEF3C7',borderRadius:6,textAlign:'center',border:'1px solid #FDE68A'}}>
                    <div style={{fontSize:13,fontWeight:700,color:'#92400E'}}>모든 서류가 완료되었습니다</div>
                    <div style={{fontSize:12,color:'#78716C',marginTop:2}}>다음 단계로 진행해 주세요</div>
                  </div>
                )}
              </div>
            </div>
            <div className="panel" style={{marginTop:14}}>
              <div className="panel-head">거래 안내</div>
              <div style={{padding:'14px 16px'}}>
                {['어업허가권 이전은 관할 관청 신청 후 약 2~4주 소요됩니다.',
                  '서류 미비 시 담당 중개사가 직접 안내 드립니다.',
                  '대금 정산은 에스크로 방식으로 진행됩니다.',
                ].map((t, i) => (
                  <div key={i} style={{display:'flex',gap:8,fontSize:12,color:'#57534E',marginBottom:10,alignItems:'flex-start'}}>
                    <i className="ph ph-info" style={{fontSize:14,color:'#D97706',flexShrink:0,marginTop:1}} />
                    {t}
                  </div>
                ))}
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  );
}

function App() {
  const [page, setPage] = useState('매물 탐색');
  const navItems = [
    { name: '매물 탐색', icon: 'magnifying-glass' },
    { name: '판매자', icon: 'storefront' },
    { name: '알림', icon: 'bell' },
    { name: '거래 현황', icon: 'arrows-left-right' },
  ];

  const renderPage = () => {
    switch(page) {
      case '매물 탐색': return <ExploreScreen setPage={setPage} />;
      case '판매자': return <SellerScreen />;
      case '알림': return <NotificationScreen />;
      case '거래 현황': return <TransactionScreen />;
      default: return null;
    }
  };

  return (
    <div className="app-layout">
      <nav className="global-nav">
        <div className="nav-inner">
          <div className="nav-brand">
            <i className="ph ph-anchor" style={{fontSize:20}} />
            어선마켓 Pro
          </div>
          <div className="nav-links">
            {navItems.map(n => (
              <button key={n.name} className={`nav-link${page === n.name ? ' active' : ''}`}
                onClick={() => setPage(n.name)}>
                <i className={`ph ph-${n.icon}`} style={{fontSize:15}} />
                {n.name}
              </button>
            ))}
          </div>
          <div className="nav-right">
            <button className="nav-notify-btn" onClick={() => setPage('알림')}>
              <i className="ph ph-bell" style={{fontSize:16,color:'#D97706'}} />
              <div className="notify-dot" />
            </button>
            <div className="nav-user">
              <div className="user-avatar">김</div>
              <span className="user-name">김민수</span>
            </div>
          </div>
        </div>
      </nav>
      <main style={{flex:1, width:'100%'}}>
        {renderPage()}
      </main>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
