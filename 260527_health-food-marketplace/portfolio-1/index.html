function Badge({ children, color = "green" }) {
  const colors = {
    green: { bg: "var(--primary-pale)", text: "var(--primary)" },
    orange: { bg: "var(--accent-light)", text: "var(--accent)" },
    blue: { bg: "#E8F0FF", text: "#3D6FFF" },
    gray: { bg: "#F0F0F0", text: "#666" },
    red: { bg: "#FFE8E8", text: "#D63535" },
  };
  const c = colors[color] || colors.green;
  return (
    <span style={{ background: c.bg, color: c.text, padding: "2px 10px", borderRadius: 20, fontSize: 11, fontWeight: 700, letterSpacing: 0.3, ...(color === "orange" && { animation: "pulse 2s ease infinite" }) }}>
      {children}
    </span>
  );
}

function StarRating({ rating }) {
  return (
    <span style={{ color: "#F5A623", fontSize: 12, fontWeight: 600 }}>
      {"★".repeat(Math.floor(rating))}{rating % 1 ? "☆" : ""} {rating}
    </span>
  );
}

function ProductCard({ p, onAddCart }) {
  const [added, setAdded] = useState(false);
  const disc = Math.round((1 - p.price / p.original) * 100);

      onMouseEnter={e => { e.currentTarget.style.transform = "translateY(-4px)"; e.currentTarget.style.boxShadow = "var(--shadow)"; }}
      onMouseLeave={e => { e.currentTarget.style.transform = "translateY(0)"; e.currentTarget.style.boxShadow = "var(--shadow-sm)"; }}>
      <div style={{ background: p.color, height: 160, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 64, position: "relative" }}>
        {p.icon}

                {catOptions.map(c => (
                  <label key={c} style={{ display: "flex", alignItems: "center", gap: 10, padding: "12px 14px", background: form.cats.includes(c) ? "var(--primary-pale)" : "var(--bg)", border: `1.5px solid ${form.cats.includes(c) ? "var(--primary)" : "var(--border)"}`, borderRadius: "var(--radius-sm)", cursor: "pointer", transition: "all .2s" }}>
                    <input type="checkbox" checked={form.cats.includes(c)}
                      onChange={() => setForm({...form, cats: form.cats.includes(c) ? form.cats.filter(x=>x!==c) : [...form.cats, c]})}
                      style={{ accentColor: "var(--primary)" }} />
                    <span style={{ fontSize: 13, fontWeight: 600, color: form.cats.includes(c) ? "var(--primary)" : "var(--text)" }}>{c}</span>
                  </label>
                ))}
              </div>
            </div>
          )}

          {step === 3 && (
            <div style={{ animation: "fadeIn 0.3s ease" }}>
              <h3 style={{ fontWeight: 700, fontSize: 17, marginBottom: 20 }}>필수 서류를 업로드해주세요</h3>
              {[
                { name: "사업자등록증 *", desc: "PDF 또는 이미지 파일 (최대 10MB)", icon: "ph-file-text" },
                { name: "통신판매업신고증 *", desc: "미보유 시 신청 후 추후 제출 가능", icon: "ph-certificate" },
                { name: "건강기능식품 판매업 영업신고증", desc: "(해당 시) PDF 또는 이미지 파일", icon: "ph-first-aid" },
              ].map((f, i) => (
                <div key={i} style={{ border: "2px dashed var(--border)", borderRadius: "var(--radius-sm)", padding: "24px", textAlign: "center", marginBottom: 14, cursor: "pointer", transition: "border-color .2s" }}
                  onMouseEnter={e => e.currentTarget.style.borderColor = "var(--primary)"}
                  onMouseLeave={e => e.currentTarget.style.borderColor = "var(--border)"}>
                  <i className={`ph ${f.icon}`} style={{ fontSize: 32, color: "var(--primary)", marginBottom: 8, display: "block" }} />
                  <div style={{ fontWeight: 600, fontSize: 14 }}>{f.name}</div>
                  <div style={{ fontSize: 12, color: "var(--text3)", marginTop: 4 }}>{f.desc}</div>
                  <button style={{ marginTop: 12, background: "var(--primary-pale)", color: "var(--primary)", borderRadius: 20, padding: "6px 18px", fontSize: 12, fontWeight: 600 }}>
                    <i className="ph ph-upload-simple" /> 파일 선택
                  </button>
                </div>
              ))}
            </div>
          )}

          {step === 4 && (
            <div style={{ animation: "fadeIn 0.3s ease" }}>
              <h3 style={{ fontWeight: 700, fontSize: 17, marginBottom: 20 }}>신청 내용을 확인해주세요</h3>
              {[
                { label: "상호명", value: form.bizName || "(주)그린헬스" },
                { label: "사업자등록번호", value: form.bizNum || "123-45-67890" },
                { label: "대표자", value: form.ceo || "홍길동" },
                { label: "연락처", value: form.phone || "010-1234-5678" },
                { label: "이메일", value: form.email || "seller@greenhealth.com" },
                { label: "취급 품목", value: form.cats.length > 0 ? form.cats.join(", ") : "비타민/미네랄, 오메가3/지방산" },
              ].map(r => (
                <div key={r.label} style={{ display: "flex", gap: 16, padding: "12px 0", borderBottom: "1px solid var(--border)" }}>
                  <div style={{ width: 120, fontSize: 13, color: "var(--text3)", fontWeight: 600, flexShrink: 0 }}>{r.label}</div>
                  <div style={{ fontSize: 13, color: "var(--text)", flex: 1 }}>{r.value}</div>
                </div>
              ))}
              <div style={{ marginTop: 20, padding: "14px 16px", background: "var(--bg)", borderRadius: "var(--radius-sm)", fontSize: 13, color: "var(--text3)" }}>
                <i className="ph ph-info" style={{ marginRight: 6, color: "var(--primary)" }} />
                검토 후 영업일 기준 3-5일 이내 입점 심사 결과를 이메일로 안내해 드립니다.
              </div>
            </div>
          )}

          <div style={{ display: "flex", justifyContent: "space-between", marginTop: 28 }}>
            <button onClick={() => setStep(Math.max(0, step-1))} disabled={step===0}
              style={{ background: "var(--bg)", color: "var(--text2)", borderRadius: 10, padding: "11px 22px", fontWeight: 600, fontSize: 14, opacity: step===0?0.4:1, border: "1.5px solid var(--border)" }}>
              이전 단계
            </button>
            <button onClick={() => step < APPLY_STEPS.length - 1 ? setStep(step+1) : setStep(APPLY_STEPS.length)}
              style={{ background: "var(--primary)", color: "#fff", borderRadius: 10, padding: "11px 28px", fontWeight: 700, fontSize: 14, boxShadow: "0 4px 12px rgba(46,125,106,0.3)" }}>
              {step < APPLY_STEPS.length - 1 ? "다음 단계" : "신청 완료하기"}
            </button>
          </div>
        </div>
      )}
    </div>
  );
}

function App() {
  const [tab, setTab] = useState("main");
  const [cartItems, setCartItems] = useState([]);
  const [cartOpen, setCartOpen] = useState(false);

  const addToCart = (p) => {
    setCartItems(prev => {
      const ex = prev.find(i => i.id === p.id);
      return ex ? prev.map(i => i.id === p.id ? {...i, qty: i.qty+1} : i) : [...prev, {...p, qty:1}];
    });
  };

  const totalQty = cartItems.reduce((s,i)=>s+i.qty,0);

  const navItems = [
    { key: "main", label: "홈", icon: "ph-house" },
    { key: "coupon", label: "쿠폰·적립금", icon: "ph-ticket" },
    { key: "seller", label: "판매자 센터", icon: "ph-store" },
    { key: "apply", label: "입점 신청", icon: "ph-user-plus" },
  ];

  return (
    <div style={{ minHeight: "100vh", background: "var(--bg)" }}>
      {/* TopNav */}
      <nav style={{ position: "sticky", top: 0, zIndex: 100, background: "rgba(255,255,255,0.96)", backdropFilter: "blur(10px)", borderBottom: "1px solid var(--border)", boxShadow: "0 1px 8px rgba(46,125,106,0.08)" }}>
        <div style={{ maxWidth: 1200, margin: "0 auto", padding: "0 24px", display: "flex", alignItems: "center", gap: 0, height: 60 }}>
          {/* Logo */}
          <div style={{ display: "flex", alignItems: "center", gap: 8, marginRight: 32, flexShrink: 0 }}>
            <div style={{ width: 34, height: 34, background: "var(--primary)", borderRadius: 10, display: "flex", alignItems: "center", justifyContent: "center" }}>
              <i className="ph ph-leaf" style={{ color: "#fff", fontSize: 18 }} />
            </div>
            <div>
              <span style={{ fontWeight: 800, fontSize: 16, color: "var(--text)" }}>헬스마켓</span>
              <span style={{ fontSize: 10, background: "var(--primary-pale)", color: "var(--primary)", borderRadius: 4, padding: "1px 5px", marginLeft: 6, fontWeight: 700 }}>BETA</span>
            </div>
          </div>

          {/* Nav tabs */}
          <div style={{ display: "flex", gap: 2, flex: 1 }}>
            {navItems.map(n => (
              <button key={n.key} onClick={() => setTab(n.key)}
                title={n.label}
                style={{ padding: "8px 16px", borderRadius: 8, fontWeight: 600, fontSize: 13.5, display: "flex", alignItems: "center", gap: 6, transition: "all .2s", whiteSpace: "nowrap",
                  background: tab===n.key ? "var(--primary-pale)" : "transparent",
                  color: tab===n.key ? "var(--primary)" : "var(--text2)" }}>
                <i className={`ph ${n.icon}`} />
                <span style={{ display: "none" }}>{n.label}</span>
                <span style={{ "@media (min-width: 640px)": { display: "inline" } }}>{n.label}</span>
              </button>
            ))}
          </div>

          {/* Right actions */}
          <div style={{ display: "flex", alignItems: "center", gap: 10, marginLeft: 16 }}>
            <button style={{ background: "none", display: "flex", alignItems: "center", gap: 6, color: "var(--text2)", fontSize: 13, fontWeight: 600 }}>
              <i className="ph ph-user-circle" style={{ fontSize: 20 }} />
              <span style={{ display: "none" }}>로그인</span>
            </button>
            <button onClick={() => setCartOpen(!cartOpen)} style={{ background: "none", position: "relative", display: "flex", alignItems: "center", color: "var(--text2)" }}>
              <i className="ph ph-shopping-cart" style={{ fontSize: 22 }} />
              {totalQty > 0 && (
                <span style={{ position: "absolute", top: -6, right: -6, background: "var(--accent)", color: "#fff", borderRadius: "50%", width: 18, height: 18, fontSize: 10, fontWeight: 800, display: "flex", alignItems: "center", justifyContent: "center", animation: "bounceIn 0.3s ease" }}>
                  {totalQty}
                </span>
              )}
            </button>
          </div>
        </div>
      </nav>

      {/* Cart Drawer */}
      {cartOpen && (
        <div style={{ position: "fixed", inset: 0, zIndex: 200 }}>
          <div style={{ position: "absolute", inset: 0, background: "rgba(0,0,0,0.3)" }} onClick={() => setCartOpen(false)} />
          <div style={{ position: "absolute", right: 0, top: 0, bottom: 0, width: 360, background: "var(--surface)", boxShadow: "-4px 0 24px rgba(0,0,0,0.15)", padding: "24px", display: "flex", flexDirection: "column", animation: "slideDown 0.25s ease" }}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 24 }}>
              <h3 style={{ fontWeight: 800, fontSize: 17 }}>장바구니 ({totalQty})</h3>
              <button onClick={() => setCartOpen(false)} style={{ background: "none", fontSize: 22, color: "var(--text3)" }}><i className="ph ph-x" /></button>
            </div>
            {cartItems.length === 0 ? (
              <div style={{ textAlign: "center", color: "var(--text3)", padding: "40px 0" }}>
                <i className="ph ph-shopping-cart" style={{ fontSize: 48, display: "block", marginBottom: 12 }} />
                장바구니가 비어 있습니다
              </div>
            ) : (
              <>
                <div style={{ flex: 1, overflowY: "auto", display: "flex", flexDirection: "column", gap: 12 }}>
                  {cartItems.map(i => (
                    <div key={i.id} style={{ display: "flex", gap: 12, padding: "12px", background: "var(--bg)", borderRadius: 10 }}>
                      <div style={{ width: 48, height: 48, background: i.color, borderRadius: 10, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 22, flexShrink: 0 }}>{i.icon}</div>
                      <div style={{ flex: 1 }}>
                        <div style={{ fontSize: 13, fontWeight: 700 }}>{i.name}</div>
                        <div style={{ fontSize: 12, color: "var(--text3)" }}>{i.sub}</div>
                        <div style={{ fontSize: 14, fontWeight: 800, color: "var(--text)", marginTop: 4 }}>{(i.price * i.qty).toLocaleString()}원</div>
                      </div>
                      <div style={{ display: "flex", flexDirection: "column", alignItems: "center", gap: 4 }}>
                        <button onClick={() => setCartItems(prev => prev.map(x => x.id===i.id ? {...x, qty: x.qty+1} : x))} style={{ background: "var(--primary-pale)", color: "var(--primary)", borderRadius: 6, width: 26, height: 26, fontWeight: 800 }}>+</button>
                        <span style={{ fontSize: 13, fontWeight: 700 }}>{i.qty}</span>
                        <button onClick={() => setCartItems(prev => i.qty===1 ? prev.filter(x=>x.id!==i.id) : prev.map(x=>x.id===i.id?{...x,qty:x.qty-1}:x))} style={{ background: "var(--bg)", color: "var(--text2)", borderRadius: 6, width: 26, height: 26, fontWeight: 800, border: "1px solid var(--border)" }}>-</button>
                      </div>
                    </div>
                  ))}
                </div>
                <div style={{ borderTop: "1px solid var(--border)", paddingTop: 16, marginTop: 16 }}>
                  <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 16 }}>
                    <span style={{ fontSize: 14, color: "var(--text2)" }}>합계</span>
                    <span style={{ fontSize: 18, fontWeight: 800 }}>{cartItems.reduce((s,i)=>s+i.price*i.qty,0).toLocaleString()}원</span>
                  </div>
                  <button style={{ width: "100%", background: "var(--primary)", color: "#fff", borderRadius: 12, padding: "14px", fontWeight: 800, fontSize: 15, boxShadow: "0 4px 12px rgba(46,125,106,0.3)" }}>
                    결제하기
                  </button>
                </div>
              </>
            )}
          </div>
        </div>
      )}

      {/* Main Content */}
      <main>
        {tab === "main" && <HomeView onCartAdd={addToCart} />}
        {tab === "coupon" && <CouponView />}
        {tab === "seller" && <SellerView />}
        {tab === "apply" && <ApplyView />}
      </main>

      {/* Footer */}
      <footer style={{ background: "var(--text)", color: "rgba(255,255,255,0.6)", padding: "32px 24px", marginTop: 60 }}>
        <div style={{ maxWidth: 1200, margin: "0 auto", display: "flex", justifyContent: "space-between", flexWrap: "wrap", gap: 20 }}>
          <div>
            <div style={{ color: "#fff", fontWeight: 800, fontSize: 15, marginBottom: 8, display: "flex", alignItems: "center", gap: 6 }}>
              <i className="ph ph-leaf" style={{ color: "var(--secondary)" }} /> 헬스마켓
            </div>
            <div style={{ fontSize: 12, lineHeight: 1.8 }}>
              건강기능식품 전문 다중 입점몰<br />
              구현 데모 포트폴리오
            </div>
          </div>
          <div style={{ display: "flex", gap: 40, flexWrap: "wrap" }}>
            {[["서비스","홈","카테고리","이벤트"],["판매자","입점 신청","판매자 센터","정산 안내"],["고객지원","공지사항","자주 묻는 질문","1:1 문의"]].map(([title,...items]) => (
              <div key={title}>
                <div style={{ color: "#fff", fontWeight: 700, fontSize: 12, marginBottom: 10 }}>{title}</div>
                {items.map(i => <div key={i} style={{ fontSize: 12, marginBottom: 6, cursor: "pointer" }}>{i}</div>)}
              </div>
            ))}
          </div>
        </div>
      </footer>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
