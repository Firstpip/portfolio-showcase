function useCountUp(value, duration = 1200) {
  const num = parseFloat(String(value).replace(/[^0-9.]/g, '')) || 0;
  const [count, setCount] = React.useState(0);
  React.useEffect(() => {
    let current = 0;
    const step = num / 30;
    const timer = setInterval(() => {
      current = Math.min(current + step, num);
      setCount(Math.round(current));
      if (current >= num) clearInterval(timer);
    }, 40);
    return () => clearInterval(timer);
  }, [num]);
  return count;
}

function StatCard({ icon, label, value, sub, color, trend }) {
  const num = parseFloat(String(value).replace(/[^0-9.]/g, '')) || 0;
  const animatedNum = useCountUp(num);
  const displayValue = String(value).replace(/[\d,]+/, animatedNum.toLocaleString());
  return (
    <div style={{ background: "var(--surface)", border: "1px solid var(--border)", borderRadius: "var(--radius)", padding: "20px 22px", position: "relative", overflow: "hidden", animation: "fadeIn 0.4s ease" }}>
      <div style={{ position: "absolute", top: 0, left: 0, width: 3, height: "100%", background: color, borderRadius: "4px 0 0 4px" }} />
      <div style={{ display: "flex", alignItems: "flex-start", justifyContent: "space-between" }}>
        <div style={{ width: 40, height: 40, background: color + "20", borderRadius: "var(--radius)", display: "flex", alignItems: "center", justifyContent: "center" }}>
          <i className={`ti ${icon}`} style={{ color, fontSize: 20 }} />
        </div>
        {trend !== undefined && (
          <span style={{ fontSize: 12, fontWeight: 700, color: trend >= 0 ? "var(--accent)" : "var(--danger)", background: (trend >= 0 ? "var(--accent-dim)" : "var(--danger-dim)"), borderRadius: 4, padding: "3px 8px" }}>
            {trend >= 0 ? "↑" : "↓"} {Math.abs(trend)}%
          </span>
        )}
      </div>
      <div style={{ marginTop: 14 }}>
        <div style={{ fontSize: 24, fontWeight: 800, color: "var(--text)", letterSpacing: -0.5, animation: "countUp 0.8s ease" }}>{displayValue}</div>
        <div style={{ fontSize: 12, color: "var(--text2)", marginTop: 2 }}>{label}</div>
        {sub && <div style={{ fontSize: 11, color: "var(--text3)", marginTop: 3 }}>{sub}</div>}
      </div>
    </div>
  );
}

              <div style={{ display: "flex", gap: 8 }}>
                <input placeholder="이름, 이메일 검색..."
                  style={{ background: "var(--surface2)", border: "1px solid var(--border2)", borderRadius: "var(--radius)", padding: "6px 12px", fontSize: 12, color: "var(--text)", outline: "none", width: 200 }} />
                <button style={{ background: "var(--primary-dim)", color: "var(--primary)", border: "1px solid rgba(79,124,255,0.3)", borderRadius: "var(--radius)", padding: "6px 14px", fontSize: 12, fontWeight: 700 }}>
                  <i className="ti ti-coins" /> 적립금 일괄 지급
                </button>
              </div>
            </div>
            <table style={{ width: "100%", borderCollapse: "collapse" }}>
              <thead>
                <tr style={{ background: "var(--bg)" }}>
                  {["회원ID","이름","이메일","등급","보유 적립금","주문 횟수","가입일","상태","관리"].map(h =>
                    <th key={h} style={{ padding: "8px 12px", fontSize: 11, fontWeight: 700, color: "var(--text3)", textAlign: "left", borderBottom: "1px solid var(--border2)", whiteSpace: "nowrap" }}>{h}</th>)}
                </tr>
              </thead>
              <tbody>
                {MEMBERS_DATA.map(m => {
                  const gradeColor = { BRONZE: "#CD7F32", SILVER: "#A8A9AD", GOLD: "#FFD700", VIP: "#4F7CFF" }[m.grade];
                  return (
                    <tr key={m.id} style={{ borderBottom: "1px solid rgba(255,255,255,0.03)", transition: "background .15s" }}
                      onMouseEnter={e => e.currentTarget.style.background = "var(--surface2)"}
                      onMouseLeave={e => e.currentTarget.style.background = ""}>
                      <td style={{ padding: "10px 12px", fontSize: 11, color: "var(--text3)", fontFamily: "monospace" }}>{m.id}</td>
                      <td style={{ padding: "10px 12px", fontSize: 12, fontWeight: 700, color: "var(--text)" }}>{m.name}</td>
                      <td style={{ padding: "10px 12px", fontSize: 12, color: "var(--text2)" }}>{m.email}</td>
                      <td style={{ padding: "10px 12px" }}>
                        <span style={{ fontSize: 11, fontWeight: 800, color: gradeColor, background: gradeColor + "20", borderRadius: 3, padding: "3px 8px" }}>{m.grade}</span>
                      </td>
                      <td style={{ padding: "10px 12px", fontSize: 12, fontWeight: 700, color: "var(--accent)" }}>{m.points.toLocaleString()}P</td>
                      <td style={{ padding: "10px 12px", fontSize: 12, textAlign: "center" }}>{m.orders}</td>
                      <td style={{ padding: "10px 12px", fontSize: 11, color: "var(--text3)" }}>{m.joined}</td>
                      <td style={{ padding: "10px 12px" }}><StatusBadge status={m.status} /></td>
                      <td style={{ padding: "10px 12px" }}>
                        <div style={{ display: "flex", gap: 4 }}>
                          <button style={{ fontSize: 11, color: "var(--primary)", fontWeight: 600, background: "none", padding: "3px 8px", border: "1px solid var(--primary-dim)", borderRadius: 3 }}>수정</button>
                          {m.status === "활성" && <button style={{ fontSize: 11, color: "var(--danger)", background: "none", padding: "3px 8px", border: "1px solid var(--danger-dim)", borderRadius: 3 }}>정지</button>}
                        </div>
                      </td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </div>
        </div>
      )}

      {policyTab === "coupons" && (
        <div style={{ animation: "fadeIn 0.3s ease" }}>
          <div style={{ display: "flex", justifyContent: "flex-end", marginBottom: 14 }}>
            <button onClick={() => setAddCoupon(!addCoupon)}
              style={{ background: "var(--primary)", color: "#fff", borderRadius: "var(--radius)", padding: "9px 18px", fontWeight: 700, fontSize: 13, display: "flex", alignItems: "center", gap: 6 }}>
              <i className="ti ti-plus" /> 쿠폰 정책 추가
            </button>
          </div>

          {addCoupon && (
            <div style={{ background: "var(--surface)", border: "1px solid var(--primary)", borderRadius: "var(--radius)", padding: "20px 22px", marginBottom: 16, animation: "fadeIn 0.25s ease" }}>
              <h4 style={{ fontWeight: 700, fontSize: 14, marginBottom: 16, color: "var(--primary)" }}>새 쿠폰 정책 설정</h4>
              <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12 }}>
                {[
                  { label: "정책명", ph: "예: 구매 확정 감사 쿠폰" },
                  { label: "발급 트리거", ph: "예: 구매 확정 즉시" },
                  { label: "할인 유형", ph: "정률(%) / 정액(원)" },
                  { label: "할인값", ph: "예: 10 (%) 또는 3000 (원)" },
                  { label: "최소 주문금액", ph: "예: 30000" },
                  { label: "유효 기간", ph: "발급일로부터 N일" },
                ].map(f => (
                  <div key={f.label}>
                    <label style={{ fontSize: 12, fontWeight: 600, color: "var(--text3)", display: "block", marginBottom: 4 }}>{f.label}</label>
                    <input placeholder={f.ph}
                      style={{ width: "100%", background: "var(--surface2)", border: "1px solid var(--border2)", borderRadius: "var(--radius)", padding: "8px 12px", fontSize: 13, color: "var(--text)", outline: "none" }} />
                  </div>
                ))}
              </div>
              <div style={{ display: "flex", justifyContent: "flex-end", gap: 8, marginTop: 16 }}>
                <button onClick={() => setAddCoupon(false)} style={{ background: "var(--surface2)", color: "var(--text2)", border: "1px solid var(--border2)", borderRadius: "var(--radius)", padding: "8px 16px", fontSize: 12, fontWeight: 600 }}>취소</button>
                <button style={{ background: "var(--primary)", color: "#fff", borderRadius: "var(--radius)", padding: "8px 18px", fontSize: 12, fontWeight: 700 }}>정책 저장</button>
              </div>
            </div>
          )}

          <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
            {COUPONS_POLICY.map(c => (
              <div key={c.id} style={{ background: "var(--surface)", border: "1px solid var(--border)", borderRadius: "var(--radius)", padding: "16px 20px" }}>
                <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", flexWrap: "wrap", gap: 10 }}>
                  <div style={{ display: "flex", alignItems: "center", gap: 14 }}>
                    <div style={{ width: 42, height: 42, background: c.status==="활성" ? "var(--primary-glow)" : "rgba(255,255,255,0.04)", borderRadius: "var(--radius)", display: "flex", alignItems: "center", justifyContent: "center" }}>
                      <i className="ti ti-ticket" style={{ fontSize: 20, color: c.status==="활성" ? "var(--primary)" : "var(--text3)" }} />
                    </div>
                    <div>
                      <div style={{ fontWeight: 700, fontSize: 14, color: "var(--text)" }}>{c.name}</div>
                      <div style={{ fontSize: 12, color: "var(--text3)", marginTop: 2 }}>
                        트리거: {c.trigger} · 대상: {c.target} · 최소: {c.minOrder}
                      </div>
                    </div>
                  </div>
                  <div style={{ display: "flex", alignItems: "center", gap: 14 }}>
                    <div style={{ textAlign: "right" }}>
                      <div style={{ fontSize: 20, fontWeight: 800, color: "var(--accent)" }}>{c.discount}</div>
                      <div style={{ fontSize: 11, color: "var(--text3)" }}>발급 {c.used.toLocaleString()}건 / 잔량 {c.remain}</div>
                    </div>
                    <StatusBadge status={c.status} />
                    {c.status === "활성" && (
                      <div style={{ display: "flex", gap: 4 }}>
                        <button style={{ background: "var(--surface2)", color: "var(--text2)", border: "1px solid var(--border2)", borderRadius: 3, padding: "6px 12px", fontSize: 11, fontWeight: 600 }}>수정</button>
                        <button style={{ background: "var(--danger-dim)", color: "var(--danger)", border: "1px solid rgba(255,91,91,0.2)", borderRadius: 3, padding: "6px 12px", fontSize: 11, fontWeight: 600 }}>비활성화</button>
                      </div>
                    )}
                  </div>
                </div>
              </div>
            ))}
          </div>
        </div>
      )}

      {policyTab === "points" && (
        <div style={{ animation: "fadeIn 0.3s ease", display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(280px, 1fr))", gap: 14 }}>
          {[
            { title: "기본 적립률", desc: "구매 금액의 기본 적립률 설정", current: "2%", type: "구매 결제 완료 시" },
            { title: "리뷰 작성 적립", desc: "상품 리뷰 작성 시 지급 적립금", current: "300P", type: "리뷰 등록 즉시" },
            { title: "친구 추천 보상", desc: "추천인과 피추천인 모두에게 지급", current: "1,000P각", type: "피추천인 첫 구매 완료" },
            { title: "생일 보너스", desc: "생일 월에 추가 할인 쿠폰 자동 발급", current: "5% 쿠폰", type: "생일월 1일 자동 지급" },
            { title: "적립금 만료 정책", desc: "사용하지 않은 적립금 유효 기간", current: "12개월", type: "마지막 적립일 기준" },
            { title: "최소 사용 금액", desc: "적립금 사용 가능 최소 주문금액", current: "10,000원", type: "주문 시 검증" },
          ].map(p => (
            <div key={p.title} style={{ background: "var(--surface)", border: "1px solid var(--border)", borderRadius: "var(--radius)", padding: "20px" }}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 10 }}>
                <div style={{ fontWeight: 700, fontSize: 14, color: "var(--text)" }}>{p.title}</div>
                <button style={{ background: "var(--primary-dim)", color: "var(--primary)", border: "1px solid rgba(79,124,255,0.25)", borderRadius: 3, padding: "4px 10px", fontSize: 11, fontWeight: 600 }}>수정</button>
              </div>
              <div style={{ fontSize: 12, color: "var(--text3)", marginBottom: 12 }}>{p.desc}</div>
              <div style={{ padding: "12px 14px", background: "var(--surface2)", borderRadius: "var(--radius)" }}>
                <div style={{ fontSize: 22, fontWeight: 800, color: "var(--accent)" }}>{p.current}</div>
                <div style={{ fontSize: 11, color: "var(--text3)", marginTop: 4 }}>{p.type}</div>
              </div>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

const NAV_ITEMS = [
  { key: "main", label: "대시보드", icon: "ti-layout-dashboard" },
  { key: "review", label: "입점 심사", icon: "ti-user-check", badge: 7 },
  { key: "orders", label: "주문 모니터링", icon: "ti-shopping-cart", badge: null },
  { key: "policy", label: "정책 관리", icon: "ti-settings" },
];

function App() {
  const [view, setView] = useState("main");
  const [sideOpen, setSideOpen] = useState(true);

  return (
    <div style={{ display: "flex", minHeight: "100vh", background: "var(--bg)" }}>
      {/* Sidebar */}
      <aside style={{ width: sideOpen ? 220 : 60, background: "var(--bg2)", borderRight: "1px solid var(--border)", display: "flex", flexDirection: "column", transition: "width .25s ease", position: "sticky", top: 0, height: "100vh", flexShrink: 0, overflow: "hidden" }}>
        {/* Logo */}
        <div style={{ padding: sideOpen ? "20px 20px 16px" : "20px 10px 16px", borderBottom: "1px solid var(--border)", display: "flex", alignItems: "center", gap: 10, justifyContent: sideOpen ? "flex-start" : "center" }}>
          <div style={{ width: 32, height: 32, background: "var(--primary)", borderRadius: "var(--radius)", display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0, animation: "glow 3s ease-in-out infinite" }}>
            <i className="ti ti-leaf" style={{ color: "#fff", fontSize: 17 }} />
          </div>
          {sideOpen && (
            <div>
              <div style={{ fontWeight: 800, fontSize: 14, color: "var(--text)", lineHeight: 1.2 }}>헬스마켓</div>
              <div style={{ fontSize: 10, color: "var(--text3)" }}>ADMIN CONSOLE</div>
            </div>
          )}
        </div>

        {/* Nav */}
        <nav style={{ padding: "12px 0", flex: 1 }}>
          {NAV_ITEMS.map((n, idx) => (
            <button key={n.key} onClick={() => setView(n.key)}
              title={n.label}
              style={{ width: "100%", padding: sideOpen ? "10px 18px" : "10px 0", display: "flex", alignItems: "center", gap: 10, justifyContent: sideOpen ? "flex-start" : "center", background: view===n.key ? "var(--primary-glow)" : "transparent", borderLeft: `3px solid ${view===n.key ? "var(--primary)" : "transparent"}`, color: view===n.key ? "var(--primary)" : "var(--text2)", transition: "all .18s", position: "relative", animation: `slideIn 0.3s ease ${idx * 60}ms both` }}>
              <i className={`ti ${n.icon}`} style={{ fontSize: 19 }} />
              {sideOpen && <span style={{ fontWeight: view===n.key ? 700 : 500, fontSize: 13 }}>{n.label}</span>}
              {n.badge && sideOpen && (
                <span style={{ marginLeft: "auto", background: "var(--warn)", color: "var(--bg)", borderRadius: 10, padding: "2px 7px", fontSize: 10, fontWeight: 800 }}>{n.badge}</span>
              )}
              {n.badge && !sideOpen && (
                <span style={{ position: "absolute", top: 6, right: 6, background: "var(--warn)", color: "var(--bg)", borderRadius: "50%", width: 14, height: 14, fontSize: 9, fontWeight: 800, display: "flex", alignItems: "center", justifyContent: "center" }}>{n.badge}</span>
              )}
            </button>
          ))}
        </nav>

        {/* Sidebar toggle */}
        <div style={{ padding: "12px", borderTop: "1px solid var(--border)" }}>
          <button onClick={() => setSideOpen(!sideOpen)}
            style={{ width: "100%", padding: "8px", background: "var(--surface)", border: "1px solid var(--border)", borderRadius: "var(--radius)", color: "var(--text2)", display: "flex", alignItems: "center", justifyContent: "center", gap: 6, fontSize: 12 }}>
            <i className={`ti ${sideOpen ? "ti-chevrons-left" : "ti-chevrons-right"}`} />
            {sideOpen && <span>접기</span>}
          </button>
        </div>
      </aside>

      {/* Main */}
      <div style={{ flex: 1, display: "flex", flexDirection: "column", overflow: "auto" }}>
        {/* TopBar */}
        <header style={{ background: "var(--bg2)", borderBottom: "1px solid var(--border)", padding: "0 24px", height: 54, display: "flex", alignItems: "center", justifyContent: "space-between", position: "sticky", top: 0, zIndex: 50 }}>
          <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
            <div style={{ fontSize: 13, color: "var(--text3)" }}>
              {NAV_ITEMS.find(n => n.key === view)?.label}
            </div>
          </div>
          <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
            <div style={{ display: "flex", alignItems: "center", gap: 6, padding: "4px 10px", background: "var(--accent-dim)", borderRadius: "var(--radius)", position: "relative", overflow: "hidden" }}>
              <div style={{ position: "absolute", inset: 0, background: "linear-gradient(90deg, transparent, rgba(52,217,164,0.15), transparent)", backgroundSize: "200% 100%", animation: "shimmer 2.5s linear infinite" }} />
              <div style={{ width: 6, height: 6, background: "var(--accent)", borderRadius: "50%", animation: "pulse 2s ease infinite", position: "relative" }} />
              <span style={{ fontSize: 11, color: "var(--accent)", fontWeight: 700, position: "relative" }}>실시간 연결</span>
              <div style={{ position: "absolute", bottom: 0, left: 0, right: 0, height: 2, background: "linear-gradient(to right, transparent, var(--accent), transparent)", animation: "scanLine 1.5s linear infinite" }} />
            </div>
            <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
              <div style={{ width: 30, height: 30, background: "var(--primary)", borderRadius: "50%", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 13, fontWeight: 800, color: "#fff" }}>A</div>
              <span style={{ fontSize: 13, color: "var(--text2)", fontWeight: 600 }}>최고관리자</span>
            </div>
          </div>
        </header>

        {/* Content */}
        <main style={{ flex: 1, padding: "28px 28px" }}>
          {view === "main" && <DashboardView />}
          {view === "review" && <ReviewView />}
          {view === "orders" && <OrdersView />}
          {view === "policy" && <PolicyView />}
        </main>

        {/* Footer */}
        <footer style={{ borderTop: "1px solid var(--border)", padding: "14px 28px", display: "flex", justifyContent: "space-between", alignItems: "center" }}>
          <span style={{ fontSize: 11, color: "var(--text3)" }}>헬스마켓 통합 운영 플랫폼 · 구현 데모 포트폴리오</span>
          <div style={{ display: "flex", gap: 20 }}>
            {["이용약관","개인정보처리방침","운영 매뉴얼"].map(l => (
              <span key={l} style={{ fontSize: 11, color: "var(--text3)", cursor: "pointer" }}>{l}</span>
            ))}
          </div>
        </footer>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
