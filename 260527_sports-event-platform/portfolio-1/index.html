<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>스포츠 행사 매칭 플랫폼 MVP — 맞춤 구현 데모</title>
  <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" rel="stylesheet">
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html,body,#root{width:100%;min-height:100vh}
    body{font-family:'Pretendard',-apple-system,sans-serif;background:#FAFAF8;color:#1A1A1A}

    @keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
    @keyframes slideRight{from{transform:translateX(100%)}to{transform:translateX(0)}}
    @keyframes staggerUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
    @keyframes toastIn{from{opacity:0;transform:scale(.92)}to{opacity:1;transform:scale(1)}}
    @keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}

    .topnav{background:#fff;border-bottom:1px solid #EDEBE5;position:sticky;top:0;z-index:100;box-shadow:0 1px 8px rgba(0,0,0,.04)}
    .topnav-inner{max-width:1280px;margin:0 auto;display:flex;align-items:center;padding:0 24px;height:62px;gap:8px}
    .logo{font-size:18px;font-weight:800;color:#E8500A;margin-right:32px;letter-spacing:-.3px;white-space:nowrap}
    .nav-tabs{display:flex;gap:4px}
    .nav-tab{padding:8px 16px;border-radius:8px;cursor:pointer;font-size:14px;font-weight:500;border:none;background:transparent;color:#6B6B6B;transition:all .18s;font-family:inherit}
    .nav-tab:hover{background:#FFF3EE;color:#E8500A}
    .nav-tab.active{background:#E8500A;color:#fff}
    .nav-spacer{flex:1}
    .nav-user{display:flex;align-items:center;gap:8px;font-size:14px;color:#6B6B6B}

    .view{animation:fadeIn .28s ease;width:100%}

    /* Hero */
    .hero{background:linear-gradient(135deg,#E8500A 0%,#FF6B35 55%,#F7C948 100%);color:#fff;padding:80px 24px 72px}
    .hero-inner{max-width:760px;margin:0 auto;text-align:center}
    .hero h1{font-size:42px;font-weight:800;line-height:1.2;margin-bottom:14px;letter-spacing:-.5px}
    .hero p{font-size:17px;opacity:.92;margin-bottom:36px;line-height:1.6}
    .hero-cta{display:flex;gap:12px;justify-content:center;flex-wrap:wrap}
    .btn-hero{background:#fff;color:#E8500A;padding:14px 32px;border-radius:12px;font-size:15px;font-weight:700;cursor:pointer;border:none;transition:all .2s;font-family:inherit}
    .btn-hero:hover{background:#FFF3EE;transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,.18)}
    .btn-hero-ghost{background:rgba(255,255,255,.18);color:#fff;border:2px solid rgba(255,255,255,.55);padding:14px 32px;border-radius:12px;font-size:15px;font-weight:700;cursor:pointer;transition:all .2s;font-family:inherit}
    .btn-hero-ghost:hover{background:rgba(255,255,255,.28)}

    /* Section */
    .section{padding:60px 24px}
    .section-inner{max-width:1280px;margin:0 auto}
    .section-title{font-size:28px;font-weight:800;text-align:center;margin-bottom:8px;letter-spacing:-.3px}
    .section-sub{font-size:15px;color:#6B6B6B;text-align:center;margin-bottom:44px}

    .steps-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:20px}
    .step-card{background:#fff;border-radius:12px;padding:28px 24px;text-align:center;box-shadow:0 2px 12px rgba(0,0,0,.06);border:1px solid #F0EEE8;animation:staggerUp .4s ease both}
    .step-card:nth-child(1){animation-delay:.08s}
    .step-card:nth-child(2){animation-delay:.18s}
    .step-card:nth-child(3){animation-delay:.28s}
    .step-icon-wrap{width:60px;height:60px;border-radius:14px;background:linear-gradient(135deg,#E8500A,#F7C948);margin:0 auto 18px;display:flex;align-items:center;justify-content:center}
    .step-title{font-size:17px;font-weight:700;margin-bottom:8px}
    .step-desc{font-size:13px;color:#6B6B6B;line-height:1.65}

    .value-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
    .value-card{background:#fff;border-radius:12px;padding:24px;border:1px solid #F0EEE8;transition:all .2s;cursor:default}
    .value-card:hover{border-color:#E8500A;box-shadow:0 4px 20px rgba(232,80,10,.08);transform:translateY(-2px)}
    .value-icon{margin-bottom:12px}
    .value-title{font-size:15px;font-weight:700;margin-bottom:6px}
    .value-desc{font-size:13px;color:#6B6B6B;line-height:1.6}

    /* Form */
    .form-wrap{max-width:640px;margin:0 auto;padding:40px 24px}
    .form-heading{font-size:22px;font-weight:800;margin-bottom:4px}
    .form-subheading{font-size:14px;color:#6B6B6B;margin-bottom:28px}
    .progress-row{display:flex;align-items:center;gap:0;margin-bottom:28px}
    .progress-node{display:flex;align-items:center;gap:8px}
    .pnode-dot{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;transition:all .2s}
    .pnode-dot.done{background:#22C55E;color:#fff}
    .pnode-dot.active{background:#E8500A;color:#fff}
    .pnode-dot.idle{background:#EDEBE5;color:#999}
    .pnode-label{font-size:13px;font-weight:500}
    .pnode-label.active{color:#E8500A;font-weight:600}
    .progress-line{flex:1;height:2px;background:#EDEBE5;margin:0 8px}
    .progress-line.done{background:#22C55E}

    .form-card{background:#fff;border-radius:16px;padding:28px;box-shadow:0 2px 16px rgba(0,0,0,.06);border:1px solid #F0EEE8}
    .field{margin-bottom:22px}
    .field-label{font-size:13px;font-weight:600;color:#1A1A1A;margin-bottom:8px;display:block}
    .field-input{width:100%;padding:12px 16px;border:1.5px solid #EDEBE5;border-radius:10px;font-size:15px;font-family:inherit;color:#1A1A1A;background:#fff;transition:border-color .18s;outline:none}
    .field-input:focus{border-color:#E8500A}
    .field-input::placeholder{color:#B0ADA6}

    .radio-stack{display:flex;flex-direction:column;gap:10px}
    .radio-row{display:flex;align-items:center;gap:12px;padding:12px 16px;border:1.5px solid #EDEBE5;border-radius:10px;cursor:pointer;transition:all .18s}
    .radio-row.sel{border-color:#E8500A;background:#FFF3EE}
    .radio-dot{width:20px;height:20px;border-radius:50%;border:2px solid #CCC9C1;flex-shrink:0;transition:all .18s;display:flex;align-items:center;justify-content:center}
    .radio-dot.sel{border-color:#E8500A;background:#E8500A}
    .radio-dot-inner{width:8px;height:8px;border-radius:50%;background:#fff}
    .radio-label{font-size:14px;font-weight:500}

    .chips{display:flex;flex-wrap:wrap;gap:8px}
    .chip{padding:8px 16px;border-radius:100px;border:1.5px solid #EDEBE5;font-size:13px;font-weight:500;cursor:pointer;transition:all .18s;background:#fff;color:#6B6B6B}
    .chip.sel{border-color:#E8500A;background:#E8500A;color:#fff}

    .check-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}
    .check-row{display:flex;align-items:center;gap:10px;padding:10px 14px;border:1.5px solid #EDEBE5;border-radius:10px;cursor:pointer;transition:all .18s}
    .check-row.sel{border-color:#E8500A;background:#FFF3EE}
    .check-box{width:18px;height:18px;border-radius:4px;border:2px solid #CCC9C1;flex-shrink:0;transition:all .18s;display:flex;align-items:center;justify-content:center}
    .check-box.sel{border-color:#E8500A;background:#E8500A}
    .check-label{font-size:13px;font-weight:500}
    .field-textarea{width:100%;padding:12px 16px;border:1.5px solid #EDEBE5;border-radius:10px;font-size:14px;font-family:inherit;color:#1A1A1A;outline:none;resize:vertical;transition:border-color .18s}
    .field-textarea:focus{border-color:#E8500A}

    .form-actions{display:flex;justify-content:space-between;margin-top:28px;gap:12px}
    .btn-next{background:#E8500A;color:#fff;padding:13px 28px;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer;border:none;font-family:inherit;transition:all .18s;display:flex;align-items:center;gap:6px}
    .btn-next:hover{background:#C74008;transform:translateY(-1px)}
    .btn-back{background:#F0EEE8;color:#6B6B6B;padding:13px 28px;border-radius:10px;font-size:15px;font-weight:600;cursor:pointer;border:none;font-family:inherit;transition:all .18s}
    .btn-back:hover{background:#E8E6E0}

    /* Mypage */
    .mypage-wrap{max-width:800px;margin:0 auto;padding:36px 24px}
    .profile-card{background:#fff;border-radius:14px;padding:22px 24px;border:1px solid #F0EEE8;box-shadow:0 2px 10px rgba(0,0,0,.05);display:flex;align-items:center;gap:16px;margin-bottom:28px}
    .avatar{width:52px;height:52px;border-radius:50%;background:linear-gradient(135deg,#E8500A,#F7C948);display:flex;align-items:center;justify-content:center;color:#fff;font-size:20px;font-weight:800;flex-shrink:0}
    .profile-info h2{font-size:17px;font-weight:700}
    .profile-info p{font-size:13px;color:#6B6B6B;margin-top:3px}
    .list-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
    .list-title{font-size:16px;font-weight:700}
    .count-badge{color:#E8500A;font-weight:700;margin-left:6px}
    .inq-list{display:flex;flex-direction:column;gap:12px}
    .inq-card{background:#fff;border-radius:12px;padding:18px 22px;border:1.5px solid transparent;box-shadow:0 1px 8px rgba(0,0,0,.05);cursor:pointer;transition:all .2s;display:flex;align-items:center;gap:14px}
    .inq-card:hover{border-color:#E8500A;box-shadow:0 4px 18px rgba(232,80,10,.1);transform:translateY(-2px)}
    .inq-icon{width:44px;height:44px;border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
    .inq-content{flex:1;min-width:0}
    .inq-title{font-size:15px;font-weight:700;margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .inq-meta{font-size:12px;color:#6B6B6B}
    .inq-tags{display:flex;flex-wrap:wrap;gap:5px;margin-top:7px}
    .inq-tag{background:#F5F3EE;border-radius:100px;padding:2px 10px;font-size:11px;color:#888}
    .status-col{text-align:right;flex-shrink:0}
    .see-more{font-size:11px;color:#E8500A;margin-top:5px}

    .badge{display:inline-flex;align-items:center;padding:4px 10px;border-radius:100px;font-size:12px;font-weight:600}
    .badge-wait{background:#F3F4F6;color:#6B7280}
    .badge-prog{background:#FEF9C3;color:#A16207}
    .badge-done{background:#DCFCE7;color:#15803D}

    /* Slide-over */
    .overlay{position:fixed;inset:0;background:rgba(0,0,0,.38);z-index:200;display:flex;justify-content:flex-end}
    .slideover{background:#fff;width:440px;height:100%;overflow-y:auto;animation:slideRight .28s ease;padding:24px}
    .slideover-head{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:22px;padding-bottom:16px;border-bottom:1px solid #F0EEE8}
    .slideover-title{font-size:18px;font-weight:800}
    .slideover-sub{font-size:13px;color:#6B6B6B;margin-top:3px}
    .close-btn{width:32px;height:32px;border-radius:8px;background:#F0EEE8;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#6B6B6B;flex-shrink:0;transition:background .15s}
    .close-btn:hover{background:#E8E6E0}

    .mod-card{background:#FFF3EE;border:1px solid #F8D5C0;border-radius:12px;padding:16px;margin-bottom:10px}
    .mod-name{font-size:15px;font-weight:700;margin-bottom:3px}
    .mod-desc{font-size:13px;color:#666;line-height:1.55}
    .mod-tags{display:flex;flex-wrap:wrap;gap:5px;margin-top:9px}
    .mod-tag{background:#fff;border:1px solid #F8D5C0;border-radius:100px;padding:3px 10px;font-size:12px;color:#E8500A}
    .budget-box{background:#E8500A;color:#fff;border-radius:12px;padding:18px;margin-top:16px;text-align:center}
    .budget-label{font-size:12px;opacity:.8;margin-bottom:4px}
    .budget-amount{font-size:26px;font-weight:800}
    .btn-contract{width:100%;background:#1A1A1A;color:#fff;padding:14px;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;border:none;font-family:inherit;margin-top:14px;transition:background .18s}
    .btn-contract:hover{background:#333}

    /* Admin */
    .admin-wrap{max-width:1280px;margin:0 auto;padding:32px 24px}
    .admin-head{margin-bottom:22px}
    .admin-title{font-size:22px;font-weight:800}
    .admin-sub{font-size:13px;color:#6B6B6B;margin-top:4px}
    .filter-row{display:flex;gap:10px;margin-bottom:18px;flex-wrap:wrap;align-items:center}
    .filter-sel{padding:10px 16px;border:1.5px solid #EDEBE5;border-radius:10px;font-size:13px;font-family:inherit;background:#fff;color:#1A1A1A;cursor:pointer;outline:none;transition:border-color .18s}
    .filter-sel:focus{border-color:#E8500A}
    .count-info{margin-left:auto;font-size:13px;color:#999}
    .table-box{background:#fff;border-radius:12px;border:1px solid #F0EEE8;overflow:hidden;box-shadow:0 1px 8px rgba(0,0,0,.04)}
    .table{width:100%;border-collapse:collapse}
    .table th{padding:13px 20px;text-align:left;font-size:12px;font-weight:600;color:#888;background:#FAFAF8;border-bottom:1px solid #F0EEE8}
    .table td{padding:15px 20px;font-size:14px;border-bottom:1px solid #F5F3EE}
    .table tbody tr:last-child td{border-bottom:none}
    .table tbody tr{cursor:pointer;transition:background .14s}
    .table tbody tr:hover{background:#FFF3EE}
    .table tbody tr.row-sel{background:#FFF3EE}
    .col-title{font-weight:600}
    .col-sub{color:#888}

    .split{display:grid;grid-template-columns:1fr 400px;gap:20px;align-items:start}
    .mod-panel{background:#fff;border-radius:12px;border:1px solid #F0EEE8;padding:22px;box-shadow:0 1px 8px rgba(0,0,0,.04);animation:fadeIn .25s ease}
    .mod-panel-title{font-size:15px;font-weight:800;margin-bottom:6px}
    .mod-panel-sub{font-size:12px;color:#888;margin-bottom:16px}
    .mod-sel-list{display:flex;flex-direction:column;gap:8px;max-height:320px;overflow-y:auto}
    .mod-sel-item{display:flex;align-items:center;gap:12px;padding:11px 14px;border:1.5px solid #EDEBE5;border-radius:10px;cursor:pointer;transition:all .18s}
    .mod-sel-item.checked{border-color:#E8500A;background:#FFF3EE}
    .mod-sel-item.unavail{opacity:.4;cursor:not-allowed}
    .mod-chk{width:20px;height:20px;border-radius:4px;border:2px solid #CCC9C1;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .18s}
    .mod-chk.sel{border-color:#E8500A;background:#E8500A}
    .mod-item-name{font-size:13px;font-weight:600;flex:1}
    .mod-item-detail{font-size:12px;color:#888}
    .mod-item-budget{font-size:13px;color:#E8500A;font-weight:700;flex-shrink:0}
    .confirm-bar{margin-top:14px;border-top:1px solid #F0EEE8;padding-top:14px}
    .total-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
    .total-label{font-size:13px;color:#888}
    .total-amount{font-size:20px;font-weight:800;color:#E8500A}
    .btn-confirm{width:100%;background:#E8500A;color:#fff;padding:14px;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;border:none;font-family:inherit;transition:all .18s}
    .btn-confirm:hover{background:#C74008}
    .btn-confirm:disabled{background:#E8E6E0;color:#B0ADA6;cursor:not-allowed}

    /* Toast */
    .toast-zone{position:fixed;top:80px;right:24px;z-index:500;display:flex;flex-direction:column;gap:8px;pointer-events:none}
    .toast{background:#1A1A1A;color:#fff;padding:13px 18px;border-radius:12px;font-size:13px;font-weight:500;animation:toastIn .25s ease;min-width:260px;display:flex;align-items:center;gap:8px;box-shadow:0 6px 20px rgba(0,0,0,.22)}
    .toast.ok{background:#15803D}

    @media(max-width:768px){
      .steps-grid,.value-grid{grid-template-columns:1fr}
      .check-grid{grid-template-columns:1fr}
      .split{grid-template-columns:1fr}
      .hero h1{font-size:28px}
      .slideover{width:100%}
    }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState, useEffect, useRef} = React;

/* ── SVG Icons (Lucide-style, stroke-width 2) ── */
const Ico = ({d, size=18, style={}}) => (
  <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24"
    fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"
    style={{display:'inline-block',verticalAlign:'middle',flexShrink:0,...style}}>
    {d}
  </svg>
);

const Home = p => <Ico {...p} d={<><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></>} />;
const Clip = p => <Ico {...p} d={<><rect width="8" height="4" x="8" y="2" rx="1"/><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/></>} />;
const User = p => <Ico {...p} d={<><circle cx="12" cy="8" r="5"/><path d="M20 21a8 8 0 1 0-16 0"/></>} />;
const Cal  = p => <Ico {...p} d={<><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></>} />;
const Chk  = p => <Ico {...p} d={<polyline points="20 6 9 17 4 12"/>} />;
const Xmark= p => <Ico {...p} d={<><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></>} />;
const Zap  = p => <Ico {...p} d={<polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/>} />;
const Shield=p => <Ico {...p} d={<path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>} />;
const Stars= p => <Ico {...p} d={<polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>} />;
const Arr  = p => <Ico {...p} d={<><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></>} />;
const Medal= p => <Ico {...p} d={<><circle cx="12" cy="8" r="6"/><path d="M15.477 12.89 17 22l-5-3-5 3 1.523-9.11"/></>} />;

/* ── Mock Data ── */
const PERF_TYPES = ['댄스퍼포먼스','밴드공연','마술쇼','치어리딩','스포츠시범','서커스/아크로바틱','DJ/파티','비보잉'];
const AGE_OPTS   = ['어린이(~12세)','청소년(13~18세)','20~30대','40대 이상','전 연령'];
const BUDGETS    = ['100만원 이하','100~300만원','300~500만원','500만원 이상'];

const INQUIRIES = [
  {id:1,title:'2025 한강 시민 스포츠 페스티벌',event_date:'2025.06.20',budget:'300~500만원',
   types:['댄스퍼포먼스','치어리딩'],status:'done',created:'2025.03.10',
   modules:[
     {name:'K-팝 댄스팀 "리듬웨이브"',type:'댄스퍼포먼스',team:'8명',time:'40분',budget:'120만원',desc:'전문 안무가 포함 8인조 K-팝 퍼포먼스팀. 관객 참여 섹션 포함 구성.'},
     {name:'치어리딩팀 "스파크"',type:'치어리딩',team:'12명',time:'30분',budget:'150만원',desc:'고등학교 치어리딩 챔피언십 출신. 피라미드·텀블링 포함.'},

/* ── InquiryView ── */
function InquiryView({go, toast}) {
  const [step, setStep] = useState(1);
  const [form, setForm] = useState({name:'',date:'',attendees:'',budget:'',ages:[],types:[],notes:''});
  const toggle = (k,v) => setForm(f=>({...f,[k]:f[k].includes(v)?f[k].filter(x=>x!==v):[...f[k],v]}));

  const next = () => {
    if(!form.name||!form.date||!form.budget){toast({msg:'필수 항목을 모두 입력해주세요'});return;}
    setStep(2);
  };
  const submit = () => {
    if(!form.ages.length||!form.types.length){toast({msg:'연령층과 퍼포먼스 유형을 선택해주세요'});return;}
    toast({msg:'상담 신청이 접수되었습니다',ok:true});
    setTimeout(()=>go('mypage'),900);
  };

  return (
    <div className="view">
      <div className="form-wrap">
        <div className="form-heading">스포츠 행사 상담 신청</div>
        <div className="form-subheading">행사 요건 기반 상담 신청 폼 — 최적의 퍼포먼스팀을 매칭해드립니다</div>

        <div className="progress-row">
          <div className="progress-node">
            <div className={`pnode-dot ${step>1?'done':'active'}`}>{step>1?<Chk size={13}/>:'1'}</div>
            <span className={`pnode-label ${step===1?'active':''}`}>행사 기본 정보</span>
          </div>
          <div className={`progress-line ${step>1?'done':''}`}/>
          <div className="progress-node">
            <div className={`pnode-dot ${step===2?'active':'idle'}`}>2</div>
            <span className={`pnode-label ${step===2?'active':''}`}>퍼포먼스 선호도</span>
          </div>
        </div>

        <div className="form-card">
          {step===1 ? <>
            <div className="field">
              <label className="field-label">행사명 *</label>
              <input className="field-input" placeholder="예: 2025 한강 시민 스포츠 페스티벌" value={form.name} onChange={e=>setForm(f=>({...f,name:e.target.value}))}/>
            </div>
            <div className="field">
              <label className="field-label">행사 일자 *</label>
              <input type="date" className="field-input" value={form.date} onChange={e=>setForm(f=>({...f,date:e.target.value}))}/>
            </div>
            <div className="field">
              <label className="field-label">예상 참여 인원</label>
              <input className="field-input" placeholder="예: 500명" value={form.attendees} onChange={e=>setForm(f=>({...f,attendees:e.target.value}))}/>
            </div>
            <div className="field">
              <label className="field-label">퍼포먼스 예산 범위 *</label>
              <div className="radio-stack">
                {BUDGETS.map(b=>(
                  <div key={b} className={`radio-row ${form.budget===b?'sel':''}`} onClick={()=>setForm(f=>({...f,budget:b}))}>
                    <div className={`radio-dot ${form.budget===b?'sel':''}`}>{form.budget===b&&<div className="radio-dot-inner"/>}</div>
                    <span className="radio-label">{b}</span>
                  </div>
                ))}
              </div>
            </div>
            <div className="form-actions" style={{justifyContent:'flex-end'}}>
              <button className="btn-next" onClick={next}>다음 단계 <Arr size={15}/></button>
            </div>
          </> : <>
            <div className="field">
              <label className="field-label">참여 대상 연령층 * (복수 선택)</label>
              <div className="chips">
                {AGE_OPTS.map(a=><div key={a} className={`chip ${form.ages.includes(a)?'sel':''}`} onClick={()=>toggle('ages',a)}>{a}</div>)}
              </div>
            </div>
            <div className="field">
              <label className="field-label">선호 퍼포먼스 유형 * (복수 선택)</label>
              <div className="check-grid">
                {PERF_TYPES.map(t=>(
                  <div key={t} className={`check-row ${form.types.includes(t)?'sel':''}`} onClick={()=>toggle('types',t)}>
                    <div className={`check-box ${form.types.includes(t)?'sel':''}`}>{form.types.includes(t)&&<Chk size={11} style={{color:'#fff'}}/>}</div>
                    <span className="check-label">{t}</span>
                  </div>
                ))}
              </div>
            </div>
            <div className="field">
              <label className="field-label">추가 요청사항</label>
              <textarea className="field-textarea" rows={4} placeholder="행사 특성, 장소 조건, 선호 스타일 등을 자유롭게 작성해주세요" value={form.notes} onChange={e=>setForm(f=>({...f,notes:e.target.value}))}/>
            </div>
            <div className="form-actions">
              <button className="btn-back" onClick={()=>setStep(1)}>이전</button>
              <button className="btn-next" onClick={submit}>신청 완료</button>
            </div>
          </>}
        </div>
      </div>
    </div>
  );
}

/* ── AdminView ── */
function AdminView({toast}) {
  const [fStat, setFStat] = useState('all');
  const [fBudget, setFBudget] = useState('all');
  const [selRow, setSelRow] = useState(null);
  const [selMods, setSelMods] = useState([]);
  const [rows, setRows] = useState(ADMIN_ROWS);

  const toggleMod = m => {
    if(!m.ok) return;
    setSelMods(prev=>prev.find(x=>x.id===m.id)?prev.filter(x=>x.id!==m.id):[...prev,m]);
  };
  const total = selMods.reduce((s,m)=>s+m.val,0);

  const confirm = () => {
    if(!selRow||!selMods.length) return;
    setRows(prev=>prev.map(r=>r.id===selRow.id?{...r,status:'done'}:r));
    toast({msg:`매칭 제안서 발행 완료 — 모듈 ${selMods.length}개`,ok:true});
    setSelRow(null);setSelMods([]);
  };

  const filtered = rows.filter(r=>{
    if(fStat!=='all'&&r.status!==fStat) return false;
    if(fBudget!=='all'&&r.budget!==fBudget) return false;
    return true;
  });

  return (
    <div className="view">
      <div className="admin-wrap">
        <div className="admin-head">
          <div className="admin-title">관리자 수동 모듈 조합 및 매칭 제안서 발행</div>
          <div className="admin-sub">접수된 상담 신청을 검토하고 퍼포먼스 모듈을 조합하여 매칭 제안서를 발행합니다</div>
        </div>

        <div className="filter-row">
          <select className="filter-sel" value={fStat} onChange={e=>{setFStat(e.target.value);setSelRow(null);setSelMods([])}}>
            <option value="all">전체 상태</option>
            <option value="wait">접수 대기</option>
            <option value="prog">매칭 중</option>
            <option value="done">매칭 완료</option>
          </select>
          <select className="filter-sel" value={fBudget} onChange={e=>{setFBudget(e.target.value);setSelRow(null);setSelMods([])}}>
            <option value="all">전체 예산</option>
            {BUDGETS.map(b=><option key={b} value={b}>{b}</option>)}
          </select>
          <span className="count-info">{filtered.length}건</span>
        </div>

        <div className={selRow?'split':''}>
          <div>
            <div className="table-box">
              <table className="table">
                <thead>
                  <tr><th>행사명</th><th>신청기관</th><th>행사일</th><th>예산</th><th>상태</th></tr>
                </thead>
                <tbody>
                  {filtered.map(r=>{
                    const s=STATUS[r.status];
                    return (
                      <tr key={r.id} className={selRow?.id===r.id?'row-sel':''} onClick={()=>{setSelRow(r);setSelMods([])}}>
                        <td className="col-title">{r.title}</td>
                        <td className="col-sub">{r.org}</td>
                        <td>{r.event_date}</td>
                        <td>{r.budget}</td>
                        <td><span className={`badge ${s.cls}`}>{s.label}</span></td>
                      </tr>
                    );
                  })}
                </tbody>
              </table>
            </div>
          </div>

          {selRow && (
            <div className="mod-panel">
              <div className="mod-panel-title">퍼포먼스 모듈 선택</div>
              <div className="mod-panel-sub">{selRow.title}에 연결할 모듈을 선택하세요</div>
              <div className="mod-sel-list">
                {MODULES.map(m=>(
                  <div key={m.id} className={`mod-sel-item ${selMods.find(x=>x.id===m.id)?'checked':''} ${!m.ok?'unavail':''}`} onClick={()=>toggleMod(m)}>
                    <div className={`mod-chk ${selMods.find(x=>x.id===m.id)?'sel':''}`}>
                      {selMods.find(x=>x.id===m.id)&&<Chk size={11} style={{color:'#fff'}}/>}
                    </div>
                    <div style={{flex:1,minWidth:0}}>
                      <div className="mod-item-name">{m.name}</div>
                      <div className="mod-item-detail">{m.type} · {m.team}{!m.ok&&' · 예약 불가'}</div>
                    </div>
                    <div className="mod-item-budget">{m.budget}</div>
                  </div>
                ))}
              </div>
              <div className="confirm-bar">
                <div className="total-row">
                  <span className="total-label">선택 모듈 {selMods.length}개</span>
                  <span className="total-amount">{total}만원</span>
                </div>
                <button className="btn-confirm" onClick={confirm} disabled={!selMods.length}>매칭 제안서 발행</button>
              </div>
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

/* ── App ── */
function App() {
  const [view, setView] = useState('main');
  const [toasts, setToasts] = useState([]);
  const toast = t => {
    setToasts(p=>[...p,t]);
    setTimeout(()=>setToasts(p=>p.slice(1)),3000);
  };

  const NAV = [
    {key:'main',label:'홈'},
    {key:'inquiry',label:'상담 신청'},
    {key:'mypage',label:'마이페이지'},
    {key:'manage',label:'관리자 페이지'},
  ];

  return (
    <div style={{width:'100%',minHeight:'100vh',display:'flex',flexDirection:'column'}}>
      <nav className="topnav">
        <div className="topnav-inner">
          <div className="logo">SportMatch</div>
          <div className="nav-tabs">
            {NAV.map(n=>(
              <button key={n.key} className={`nav-tab ${view===n.key?'active':''}`} onClick={()=>setView(n.key)}>{n.label}</button>
            ))}
          </div>
          <div className="nav-spacer"/>
          <div className="nav-user"><User size={15}/>김민수</div>
        </div>
      </nav>
      <main style={{flex:1,width:'100%'}}>
        {view==='main'    && <HomeView go={setView}/>}
        {view==='inquiry' && <InquiryView go={setView} toast={toast}/>}
        {view==='mypage'  && <MypageView go={setView}/>}
        {view==='manage'  && <AdminView toast={toast}/>}
      </main>
      <ToastZone toasts={toasts}/>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
