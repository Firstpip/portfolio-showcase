<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>스포츠 매칭 플랫폼 AI 확장 아키텍처 — 구현 데모</title>
  <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" rel="stylesheet">
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://unpkg.com/prop-types@15.8.1/prop-types.min.js"></script>
  <script src="https://unpkg.com/react-is@18.2.0/umd/react-is.production.min.js"></script>
  <script src="https://unpkg.com/recharts@2.12.7/umd/Recharts.js"></script>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html,body,#root{width:100%;min-height:100vh}
    body{font-family:'Pretendard',-apple-system,sans-serif;background:#F0F7FF;color:#0F2A4A}

    @keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
    @keyframes scaleIn{from{opacity:0;transform:scale(.94)}to{opacity:1;transform:scale(1)}}
    @keyframes slideLeft{from{opacity:0;transform:translateX(24px)}to{opacity:1;transform:translateX(0)}}
    @keyframes pulseRing{0%,100%{box-shadow:0 0 0 0 rgba(26,111,212,.35)}50%{box-shadow:0 0 0 6px rgba(26,111,212,0)}}
    @keyframes barGrow{from{width:0}to{width:var(--w)}}

    /* ── Global Nav ── */
    .gnav{background:rgba(255,255,255,.88);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border-bottom:1px solid rgba(26,111,212,.1);position:sticky;top:0;z-index:100;box-shadow:0 2px 16px rgba(15,42,74,.06)}
    .gnav-inner{max-width:1360px;margin:0 auto;display:flex;align-items:center;padding:0 32px;height:64px}
    .glogo{font-size:17px;font-weight:800;color:#1A6FD4;margin-right:48px;letter-spacing:-.4px;display:flex;align-items:center;gap:8px}
    .glogo-badge{background:#1A6FD4;color:#fff;font-size:9px;font-weight:700;padding:2px 6px;border-radius:4px;letter-spacing:.5px}
    .gnav-links{display:flex;gap:0}
    .gnav-link{padding:0 18px;height:64px;display:flex;align-items:center;font-size:14px;font-weight:500;color:#4A6A8A;cursor:pointer;border:none;background:none;font-family:inherit;border-bottom:2px solid transparent;transition:all .18s;position:relative}
    .gnav-link:hover{color:#1A6FD4;background:rgba(26,111,212,.04)}
    .gnav-link.active{color:#1A6FD4;font-weight:700;border-bottom-color:#1A6FD4}
    .gnav-spacer{flex:1}
    .gnav-user{display:flex;align-items:center;gap:8px;font-size:13px;color:#4A6A8A}
    .gnav-avatar{width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,#1A6FD4,#38BFA8);display:flex;align-items:center;justify-content:center;color:#fff;font-size:13px;font-weight:700}

    .view{animation:fadeUp .3s ease;width:100%}
    .page{max-width:1360px;margin:0 auto;padding:36px 32px}

    /* Glass card */
    .glass{background:rgba(255,255,255,.78);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);border:1px solid rgba(255,255,255,.85);border-radius:16px;box-shadow:0 4px 24px rgba(15,42,74,.08)}
    .glass:hover{transform:scale(1.008);box-shadow:0 8px 40px rgba(15,42,74,.12);transition:all .22s}

    /* Buttons */
    .btn-primary{background:#1A6FD4;color:#fff;padding:11px 24px;border-radius:12px;font-size:14px;font-weight:700;cursor:pointer;border:none;font-family:inherit;transition:all .18s;display:inline-flex;align-items:center;gap:6px}
    .btn-primary:hover{background:#155AB0;transform:scale(1.02);box-shadow:0 4px 16px rgba(26,111,212,.3)}
    .btn-secondary{background:rgba(26,111,212,.08);color:#1A6FD4;padding:11px 24px;border-radius:12px;font-size:14px;font-weight:600;cursor:pointer;border:1px solid rgba(26,111,212,.2);font-family:inherit;transition:all .18s}
    .btn-secondary:hover{background:rgba(26,111,212,.14)}
    .btn-danger{background:rgba(239,68,68,.08);color:#DC2626;padding:8px 16px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;border:1px solid rgba(239,68,68,.2);font-family:inherit;transition:all .18s}
    .btn-danger:hover{background:rgba(239,68,68,.14)}
    .btn-success{background:rgba(34,197,94,.08);color:#15803D;padding:8px 16px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;border:1px solid rgba(34,197,94,.2);font-family:inherit;transition:all .18s}
    .btn-success:hover{background:rgba(34,197,94,.14)}

    /* KPI */
    .kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:24px}
    .kpi-card{padding:24px;border-radius:16px;border:1px solid rgba(255,255,255,.85);background:rgba(255,255,255,.78)}
    .kpi-label{font-size:12px;font-weight:600;color:#4A6A8A;margin-bottom:8px;text-transform:uppercase;letter-spacing:.5px}
    .kpi-value{font-size:32px;font-weight:800;line-height:1;margin-bottom:4px}
    .kpi-sub{font-size:12px;color:#4A6A8A}

    /* Charts row */
    .charts-row{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:24px}
    .chart-card{padding:24px;border-radius:16px;background:rgba(255,255,255,.78);border:1px solid rgba(255,255,255,.85);box-shadow:0 2px 16px rgba(15,42,74,.06)}
    .chart-title{font-size:14px;font-weight:700;margin-bottom:4px;color:#0F2A4A}
    .chart-sub{font-size:12px;color:#4A6A8A;margin-bottom:16px}
    .chart-wrap{position:relative;height:220px}

    /* Recent table */
    .recent-card{padding:24px;border-radius:16px;background:rgba(255,255,255,.78);border:1px solid rgba(255,255,255,.85)}
    .section-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
    .section-label{font-size:14px;font-weight:700}
    .mini-table{width:100%;border-collapse:collapse}
    .mini-table th{padding:10px 16px;text-align:left;font-size:11px;font-weight:600;color:#4A6A8A;background:rgba(26,111,212,.04);border-bottom:1px solid rgba(26,111,212,.08)}
    .mini-table td{padding:12px 16px;font-size:13px;border-bottom:1px solid rgba(26,111,212,.06)}
    .mini-table tbody tr:last-child td{border-bottom:none}
    .mini-table tbody tr:hover{background:rgba(26,111,212,.04)}

    /* Badge */
    .badge{display:inline-flex;align-items:center;padding:3px 10px;border-radius:100px;font-size:11px;font-weight:600}
    .badge-wait{background:#F3F4F6;color:#6B7280}
    .badge-prog{background:#EFF6FF;color:#1D4ED8}
    .badge-done{background:#DCFCE7;color:#15803D}
    .badge-pend{background:#FEF9C3;color:#A16207}
    .badge-reject{background:#FEE2E2;color:#DC2626}

    /* ── Matching ── */
    .match-grid{display:grid;grid-template-columns:280px 1fr 300px;gap:16px;align-items:start}
    .panel{padding:20px;border-radius:16px;background:rgba(255,255,255,.78);border:1px solid rgba(255,255,255,.85);box-shadow:0 2px 12px rgba(15,42,74,.06)}
    .panel-title{font-size:13px;font-weight:700;color:#0F2A4A;margin-bottom:14px;padding-bottom:10px;border-bottom:1px solid rgba(26,111,212,.1)}
    .inq-item{padding:12px;border-radius:12px;cursor:pointer;transition:all .18s;border:1.5px solid transparent;margin-bottom:8px}
    .inq-item:hover{border-color:rgba(26,111,212,.2);background:rgba(26,111,212,.04)}
    .inq-item.active-inq{border-color:#1A6FD4;background:rgba(26,111,212,.08)}
    .inq-item-title{font-size:13px;font-weight:600;margin-bottom:3px}
    .inq-item-meta{font-size:11px;color:#4A6A8A}
    .tabs{display:flex;background:rgba(26,111,212,.06);border-radius:10px;padding:3px;margin-bottom:16px;gap:3px}
    .tab{flex:1;padding:8px;text-align:center;font-size:13px;font-weight:600;border-radius:8px;cursor:pointer;border:none;font-family:inherit;transition:all .18s;color:#4A6A8A;background:transparent}
    .tab.active-tab{background:#fff;color:#1A6FD4;box-shadow:0 1px 6px rgba(15,42,74,.1)}
    .ai-rec-card{border:1px solid rgba(26,111,212,.12);border-radius:12px;padding:16px;margin-bottom:10px;background:rgba(255,255,255,.6);transition:all .18s;animation:scaleIn .25s ease}
    .ai-rec-card:hover{border-color:#1A6FD4;background:rgba(255,255,255,.9)}
    .ai-rec-name{font-size:14px;font-weight:700;margin-bottom:6px}
    .confidence-bar{height:6px;border-radius:3px;background:rgba(26,111,212,.12);overflow:hidden;margin:8px 0}
    .confidence-fill{height:100%;border-radius:3px;background:linear-gradient(90deg,#38BFA8,#1A6FD4)}
    .ai-actions{display:flex;gap:6px;margin-top:10px}
    .ai-btn{padding:6px 12px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;border:none;font-family:inherit;transition:all .18s}
    .ai-btn-acc{background:#EFF6FF;color:#1D4ED8}
    .ai-btn-acc:hover{background:#1A6FD4;color:#fff}
    .ai-btn-mod{background:#F0FDF4;color:#15803D}
    .ai-btn-mod:hover{background:#15803D;color:#fff}
    .ai-btn-rej{background:#FEF2F2;color:#DC2626}
    .ai-btn-rej:hover{background:#DC2626;color:#fff}
    .man-mod-item{display:flex;align-items:center;gap:10px;padding:10px 14px;border:1.5px solid rgba(26,111,212,.12);border-radius:10px;cursor:pointer;margin-bottom:8px;transition:all .18s}
    .man-mod-item.mc{border-color:#1A6FD4;background:rgba(26,111,212,.06)}
    .mchk{width:18px;height:18px;border-radius:4px;border:2px solid #B0C4DE;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .18s}
    .mchk.msel{border-color:#1A6FD4;background:#1A6FD4}
    .preview-panel{animation:slideLeft .3s ease}
    .prev-mod-card{background:rgba(26,111,212,.06);border:1px solid rgba(26,111,212,.12);border-radius:12px;padding:14px;margin-bottom:10px}
    .prev-mod-name{font-size:13px;font-weight:700;margin-bottom:2px}
    .prev-mod-meta{font-size:12px;color:#4A6A8A}
    .total-box{background:linear-gradient(135deg,#1A6FD4,#38BFA8);border-radius:12px;padding:18px;color:#fff;margin:16px 0;text-align:center}
    .total-box-label{font-size:12px;opacity:.85;margin-bottom:4px}
    .total-box-val{font-size:26px;font-weight:800}
    .btn-issue{width:100%;background:#1A6FD4;color:#fff;padding:14px;border-radius:12px;font-size:14px;font-weight:700;cursor:pointer;border:none;font-family:inherit;transition:all .18s}
    .btn-issue:hover{background:#155AB0;box-shadow:0 4px 16px rgba(26,111,212,.3)}
    .btn-issue:disabled{background:#D0DDE9;color:#8CA0B4;cursor:not-allowed}

    /* ── Providers ── */
    .prov-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:16px}
    .prov-card{padding:24px;border-radius:16px;background:rgba(255,255,255,.78);border:1px solid rgba(255,255,255,.85);cursor:pointer;transition:all .22s;box-shadow:0 2px 12px rgba(15,42,74,.06)}
    .prov-card:hover{transform:scale(1.015);box-shadow:0 8px 32px rgba(15,42,74,.12);border-color:rgba(26,111,212,.2)}
    .prov-head{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:14px}
    .prov-name{font-size:16px;font-weight:800}
    .prov-type{font-size:12px;color:#4A6A8A;margin-top:2px}
    .prov-meta-row{display:flex;gap:16px;margin-top:14px}
    .prov-meta-item{flex:1}
    .prov-meta-label{font-size:11px;color:#4A6A8A;margin-bottom:3px}
    .prov-meta-val{font-size:14px;font-weight:700}

    /* Modal */
    .modal-overlay{position:fixed;inset:0;background:rgba(15,42,74,.4);z-index:300;display:flex;align-items:center;justify-content:center}
    .modal{background:#fff;border-radius:20px;padding:32px;width:520px;max-height:90vh;overflow-y:auto;animation:scaleIn .25s ease;box-shadow:0 20px 60px rgba(15,42,74,.2)}
    .modal-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:24px}
    .modal-title{font-size:18px;font-weight:800}
    .close-btn{width:32px;height:32px;border-radius:8px;background:#F0F7FF;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#4A6A8A;transition:background .15s}
    .close-btn:hover{background:#DDEEFF}
    .field{margin-bottom:18px}
    .field-label{font-size:12px;font-weight:600;color:#0F2A4A;margin-bottom:7px;display:block}
    .field-input{width:100%;padding:11px 16px;border:1.5px solid #DDEEFF;border-radius:10px;font-size:14px;font-family:inherit;outline:none;transition:border-color .18s;color:#0F2A4A}
    .field-input:focus{border-color:#1A6FD4}
    .field-sel{width:100%;padding:11px 16px;border:1.5px solid #DDEEFF;border-radius:10px;font-size:14px;font-family:inherit;outline:none;background:#fff;color:#0F2A4A;cursor:pointer}
    .modal-actions{display:flex;justify-content:flex-end;gap:10px;margin-top:24px;border-top:1px solid #EEF4FF;padding-top:20px}

    /* Drawer */
    .drawer-overlay{position:fixed;inset:0;background:rgba(15,42,74,.35);z-index:200;display:flex;justify-content:flex-end}
    .drawer{background:#fff;width:420px;height:100%;overflow-y:auto;padding:28px;box-shadow:-8px 0 32px rgba(15,42,74,.12);animation:slideLeft .28s ease}
    .drawer-head{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:22px;padding-bottom:16px;border-bottom:1px solid #EEF4FF}
    .drawer-title{font-size:18px;font-weight:800;color:#0F2A4A}
    .drawer-sub{font-size:13px;color:#4A6A8A;margin-top:3px}
    .info-row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid #F0F7FF}
    .info-row:last-child{border-bottom:none}
    .info-key{font-size:13px;color:#4A6A8A}
    .info-val{font-size:13px;font-weight:600;color:#0F2A4A}
    .drawer-actions{display:flex;gap:10px;margin-top:20px;padding-top:16px;border-top:1px solid #EEF4FF}

    /* Analytics */
    .analytics-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-top:20px}
    .roadmap-timeline{display:flex;flex-direction:column;gap:0}
    .roadmap-item{display:flex;gap:16px;position:relative}
    .roadmap-item:not(:last-child)::after{content:'';position:absolute;left:19px;top:40px;bottom:-8px;width:2px;background:linear-gradient(180deg,#1A6FD4,rgba(26,111,212,.15))}
    .roadmap-dot{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:14px;font-weight:800;margin-top:4px}
    .roadmap-dot.done{background:#1A6FD4;color:#fff;animation:pulseRing 2s infinite}
    .roadmap-dot.prog{background:#38BFA8;color:#fff}
    .roadmap-dot.plan{background:rgba(26,111,212,.12);color:#4A6A8A}
    .roadmap-content{padding-bottom:24px;flex:1}
    .roadmap-phase{font-size:14px;font-weight:700;margin-bottom:4px}
    .roadmap-desc{font-size:13px;color:#4A6A8A;line-height:1.55}
    .roadmap-tag{display:inline-block;font-size:10px;font-weight:700;padding:2px 8px;border-radius:100px;margin-bottom:6px}
    .tag-done{background:#EFF6FF;color:#1D4ED8}
    .tag-prog{background:#ECFDF5;color:#059669}
    .tag-plan{background:#F3F4F6;color:#6B7280}

    .progress-list{display:flex;flex-direction:column;gap:14px}
    .prog-row{display:flex;flex-direction:column;gap:6px}
    .prog-label-row{display:flex;justify-content:space-between;align-items:center}
    .prog-label{font-size:13px;font-weight:600;color:#0F2A4A}
    .prog-pct{font-size:13px;font-weight:700;color:#1A6FD4}
    .prog-bar-wrap{height:8px;border-radius:4px;background:rgba(26,111,212,.1);overflow:hidden}
    .prog-bar-fill{height:100%;border-radius:4px;background:linear-gradient(90deg,#1A6FD4,#38BFA8);width:var(--w);animation:barGrow .8s ease}

    /* Toast */
    .toast-zone{position:fixed;top:80px;right:28px;z-index:600;display:flex;flex-direction:column;gap:8px}
    .toast{background:#0F2A4A;color:#fff;padding:13px 18px;border-radius:12px;font-size:13px;font-weight:500;animation:scaleIn .22s ease;min-width:260px;display:flex;align-items:center;gap:8px;box-shadow:0 6px 20px rgba(0,0,0,.2)}
    .toast.ok{background:#15803D}

    .empty-hint{text-align:center;padding:40px;color:#4A6A8A;font-size:14px}

    /* Footer */
    .gfooter{background:rgba(255,255,255,.6);border-top:1px solid rgba(26,111,212,.08);padding:20px 32px;font-size:12px;color:#4A6A8A;text-align:center}

    @media(max-width:1024px){
      .match-grid{grid-template-columns:1fr;gap:12px}
      .kpi-grid{grid-template-columns:repeat(2,1fr)}
      .charts-row,.analytics-grid{grid-template-columns:1fr}
      .prov-grid{grid-template-columns:1fr}
    }
    @media(max-width:768px){
      .page{padding:24px 16px}
      .gnav-inner{padding:0 16px}
      .kpi-grid{grid-template-columns:repeat(2,1fr)}
      .drawer{width:100%}
      .modal{width:calc(100% - 32px)}
    }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState, useEffect} = React;
const {BarChart, Bar, PieChart, Pie, Cell, XAxis, YAxis, CartesianGrid, Tooltip, Legend, ResponsiveContainer} = Recharts;

/* ── SVG Icons (Phosphor-style, stroke-width 1.5) ── */
const Ph = ({d, size=18, style={}}) => (
  <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24"
    fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"
    style={{display:'inline-block',verticalAlign:'middle',flexShrink:0,...style}}>
    {d}
  </svg>
);
const PhDash  = p=><Ph {...p} d={<><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></>}/>;
const PhMatch = p=><Ph {...p} d={<><circle cx="9" cy="9" r="4"/><circle cx="15" cy="15" r="4"/><line x1="13" y1="5" x2="19" y2="5"/><line x1="16" y1="2" x2="16" y2="8"/><line x1="5" y1="19" x2="11" y2="19"/><line x1="8" y1="16" x2="8" y2="22"/></>}/>;
const PhProv  = p=><Ph {...p} d={<><path d="M3 9h18M3 15h18M9 3v18M15 3v18"/><rect x="3" y="3" width="18" height="18" rx="2"/></>}/>;
const PhAI    = p=><Ph {...p} d={<><path d="M12 2a4 4 0 0 1 4 4v1h2a2 2 0 0 1 2 2v2a2 2 0 0 1-2 2h-2v1a4 4 0 0 1-8 0v-1H6a2 2 0 0 1-2-2V9a2 2 0 0 1 2-2h2V6a4 4 0 0 1 4-4z"/><circle cx="9" cy="10" r="1" fill="currentColor"/><circle cx="15" cy="10" r="1" fill="currentColor"/></>}/>;
const PhUser  = p=><Ph {...p} d={<><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></>}/>;
const PhPlus  = p=><Ph {...p} d={<><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></>}/>;
const PhChk   = p=><Ph {...p} d={<polyline points="20 6 9 17 4 12"/>}/>;
const PhX     = p=><Ph {...p} d={<><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></>}/>;
const PhArrow = p=><Ph {...p} d={<><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></>}/>;
const PhChart = p=><Ph {...p} d={<><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></>}/>;

/* ── Mock Data ── */
const PIE_DATA = [
  {name:'접수 대기',value:12,color:'#94A3B8'},
  {name:'매칭 중',value:8,color:'#38BFA8'},
  {name:'매칭 완료',value:23,color:'#1A6FD4'},
];
const BAR_DATA = [
  {period:'3월 1주',신청:4},{period:'3월 2주',신청:7},{period:'3월 3주',신청:5},
  {period:'3월 4주',신청:9},{period:'4월 1주',신청:6},{period:'4월 2주',신청:11},

/* ── Matching View ── */
function MatchingView({toast}) {
  const [selInq, setSelInq] = useState(INQUIRIES[0]);
  const [tab, setTab] = useState('ai');
  const [accepted, setAccepted] = useState([]);
  const [manSel, setManSel] = useState([]);
  const [recStates, setRecStates] = useState({});

  const toggleMan = m => setManSel(prev=>prev.find(x=>x.id===m.id)?prev.filter(x=>x.id!==m.id):[...prev,m]);
  const actRec = (id,action) => {
    setRecStates(prev=>({...prev,[id]:action}));
    if(action==='accept') setAccepted(prev=>prev.find(x=>x.id===id)?prev:([...prev,AI_RECS.find(x=>x.id===id)]));
    if(action==='reject') setAccepted(prev=>prev.filter(x=>x.id!==id));
  };
  const preview = tab==='ai' ? accepted : manSel;
  const total = preview.reduce((s,m)=>s+m.val,0);

  const issue = () => {
    if(!preview.length) return;
    toast({msg:`매칭 제안서 발행 완료 — ${preview.length}개 모듈`,ok:true});
    setAccepted([]);setManSel([]);setRecStates({});
  };

  return (
    <div className="view">
      <div className="page">
        <div style={{marginBottom:'20px'}}>
          <div style={{fontSize:'22px',fontWeight:'800',color:'#0F2A4A'}}>AI 매칭 관리</div>
          <div style={{fontSize:'13px',color:'#4A6A8A',marginTop:'4px'}}>AI 추천 + 수동 조합 하이브리드 매칭 워크플로우</div>
        </div>
        <div className="match-grid">
          {/* Left: inquiry list */}
          <div className="panel">
            <div className="panel-title">상담 신청 목록</div>
            {INQUIRIES.map(inq=>(
              <div key={inq.id} className={`inq-item ${selInq?.id===inq.id?'active-inq':''}`} onClick={()=>{setSelInq(inq);setAccepted([]);setManSel([]);setRecStates({})}}>
                <div className="inq-item-title">{inq.title}</div>
                <div className="inq-item-meta">{inq.budget} · {inq.event_date}</div>
                <div style={{marginTop:'5px'}}><span className={`badge ${STATUS_MAP[inq.status].cls}`}>{STATUS_MAP[inq.status].label}</span></div>
              </div>
            ))}
          </div>

          {/* Center: AI / Manual tabs */}
          <div className="panel">
            <div className="panel-title">
              {selInq?.title || '신청 건을 선택하세요'}
            </div>
            <div className="tabs">
              <button className={`tab ${tab==='ai'?'active-tab':''}`} onClick={()=>setTab('ai')}>AI 추천 결과</button>
              <button className={`tab ${tab==='manual'?'active-tab':''}`} onClick={()=>setTab('manual')}>수동 조합</button>
            </div>

            {tab==='ai' ? (
              <>
                <div style={{fontSize:'12px',color:'#4A6A8A',marginBottom:'14px'}}>AI 추천 신뢰도 기준 정렬 · 수락/수정/거부로 최종 조합을 구성합니다</div>
                {AI_RECS.map(rec=>{
                  const state=recStates[rec.id];
                  return (
                    <div key={rec.id} className="ai-rec-card" style={{opacity:state==='reject'?.4:1}}>
                      <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start'}}>
                        <div className="ai-rec-name">{rec.name}</div>
                        <div style={{fontSize:'13px',fontWeight:'700',color:'#1A6FD4'}}>{rec.budget}</div>
                      </div>
                      <div style={{fontSize:'12px',color:'#4A6A8A'}}>{rec.type}</div>
                      <div style={{fontSize:'12px',color:'#4A6A8A',margin:'8px 0 2px'}}>AI 신뢰도: {rec.confidence}%</div>
                      <div className="confidence-bar"><div className="confidence-fill" style={{width:`${rec.confidence}%`}}/></div>
                      <div className="ai-actions">
                        <button className="ai-btn ai-btn-acc" onClick={()=>actRec(rec.id,'accept')} style={{background:state==='accept'?'#1A6FD4':undefined,color:state==='accept'?'#fff':undefined}}>수락</button>
                        <button className="ai-btn ai-btn-mod" onClick={()=>actRec(rec.id,'modify')}>수정 요청</button>
                        <button className="ai-btn ai-btn-rej" onClick={()=>actRec(rec.id,'reject')}>거부</button>
                      </div>
                    </div>
                  );
                })}
              </>
            ) : (
              <>
                <div style={{fontSize:'12px',color:'#4A6A8A',marginBottom:'14px'}}>모듈을 직접 선택하여 조합을 구성합니다</div>
                {MAN_MODULES.map(m=>(
                  <div key={m.id} className={`man-mod-item ${manSel.find(x=>x.id===m.id)?'mc':''}`} onClick={()=>toggleMan(m)}>
                    <div className={`mchk ${manSel.find(x=>x.id===m.id)?'msel':''}`}>{manSel.find(x=>x.id===m.id)&&<PhChk size={11} style={{color:'#fff'}}/>}</div>
                    <div style={{flex:1}}>
                      <div style={{fontSize:'13px',fontWeight:'600'}}>{m.name}</div>
                      <div style={{fontSize:'12px',color:'#4A6A8A'}}>{m.type}</div>
                    </div>
                    <div style={{fontSize:'13px',fontWeight:'700',color:'#1A6FD4'}}>{m.budget}</div>
                  </div>
                ))}
              </>
            )}
          </div>

          {/* Right: Preview */}
          <div className="panel preview-panel">
            <div className="panel-title">선택 모듈 미리보기</div>
            {preview.length===0 ? (
              <div className="empty-hint">모듈을 수락하거나<br/>선택하면 여기 표시됩니다</div>
            ) : (
              <>
                {preview.map(m=>(
                  <div key={m.id} className="prev-mod-card">
                    <div className="prev-mod-name">{m.name}</div>
                    <div className="prev-mod-meta">{m.type} · {m.budget}</div>
                  </div>
                ))}
                <div className="total-box">
                  <div className="total-box-label">총 예산 합계</div>
                  <div className="total-box-val">{total}만원</div>
                </div>
                <button className="btn-issue" onClick={issue} disabled={!preview.length}>매칭 제안서 발행</button>
              </>
            )}
          </div>
        </div>
      </div>
    </div>
  );
}

/* ── Providers View ── */

  const approve = id => {setProviders(prev=>prev.map(p=>p.id===id?{...p,status:'done'}:p));toast({msg:'공급자가 승인되었습니다',ok:true});setSelProv(null);};

            </div>
          </div>
        </div>
      )}

      {selProv && (
        <div className="drawer-overlay" onClick={()=>setSelProv(null)}>
          <div className="drawer" onClick={e=>e.stopPropagation()}>
            <div className="drawer-head">
              <div><div className="drawer-title">{selProv.name}</div><div className="drawer-sub">{selProv.type}</div></div>
              <button className="close-btn" onClick={()=>setSelProv(null)}><PhX size={15}/></button>
            </div>
            <div style={{fontSize:'13px',color:'#4A6A8A',lineHeight:'1.6',marginBottom:'16px'}}>{selProv.desc}</div>
            {[{k:'팀 규모',v:selProv.team},{k:'활동 지역',v:selProv.region},{k:'예산/회',v:selProv.budget},{k:'현재 상태',v:STATUS_MAP[selProv.status].label}].map(({k,v})=>(
              <div key={k} className="info-row"><span className="info-key">{k}</span><span className="info-val">{v}</span></div>
            ))}
            <div style={{background:'#F0F7FF',borderRadius:'10px',padding:'14px',marginTop:'16px',fontSize:'12px',color:'#4A6A8A'}}>
              S3 미디어: 이미지 3장 · 영상 1개 업로드 완료<br/>모듈 속성: 팀규모/장비/소요시간/예산 표준화 완료
            </div>
            {selProv.status==='pend' && (
              <div className="drawer-actions">
                <button className="btn-danger" style={{flex:1}} onClick={()=>reject(selProv.id)}>반려</button>
                <button className="btn-success" style={{flex:1}} onClick={()=>approve(selProv.id)}>승인</button>
              </div>
            )}
          </div>
        </div>
      )}
    </div>
  );
}

/* ── Analytics View ── */
function AnalyticsView() {
  const fbData = [{name:'수락',value:68,color:'#1A6FD4'},{name:'수정',value:22,color:'#38BFA8'},{name:'거부',value:10,color:'#F87171'}];
  const ROADMAP = [
    {num:'01',phase:'API 명세 수립 완료',desc:'외부 AI API 어댑터 인터페이스 정의, 표준 요청/응답 스키마 확정, 모의 스텁 구현으로 전체 플로우 검증 완료.',state:'done',tag:'완료'},
    {num:'02',phase:'어댑터 패턴 구현 중',desc:'AI 엔진 교체 없이 확장 가능한 어댑터 레이어 구현. 관리자 검증 워크플로우(수락/수정/거부) API 개발 진행 중.',state:'prog',tag:'진행 중'},
    {num:'03',phase:'pgvector 통합 설계 예정',desc:'벡터 임베딩 컬럼 확장 스키마 설계 및 기존 관계형 스키마와의 하이브리드 쿼리 구조 설계 예정.',state:'plan',tag:'예정'},
  ];
  const READINESS = [
    {label:'모듈 속성 표준화',pct:84},{label:'데이터 정합성 검증',pct:76},{label:'AI API 명세 문서화',pct:100},{label:'pgvector 스키마 준비',pct:45},
  ];

  return (
    <div className="view">
      <div className="page">
        <div style={{marginBottom:'22px'}}>
          <div style={{fontSize:'22px',fontWeight:'800',color:'#0F2A4A'}}>AI 매칭 로드맵 및 데이터 품질 분석</div>
          <div style={{fontSize:'13px',color:'#4A6A8A',marginTop:'4px'}}>pgvector 대비 DB 스키마 준비 상태 및 피드백 품질 지표</div>
        </div>

        <div className="kpi-grid" style={{gridTemplateColumns:'repeat(3,1fr)'}}>
          {[
            {label:'AI 연동 진행률',value:'67%',sub:'3단계 중 1.5단계 완료',color:'#1A6FD4'},
            {label:'피드백 수락률',value:'68%',sub:'수정 22% · 거부 10%',color:'#38BFA8'},
            {label:'데이터 표준화율',value:'76%',sub:'모듈 34/45개 완료',color:'#15803D'},
          ].map((k,i)=>(
            <div key={i} className="kpi-card" style={{boxShadow:'0 2px 16px rgba(15,42,74,.06)'}}>
              <div className="kpi-label">{k.label}</div>
              <div className="kpi-value" style={{color:k.color}}>{k.value}</div>
              <div className="kpi-sub">{k.sub}</div>
            </div>
          ))}
        </div>

        <div className="analytics-grid">
          <div className="chart-card">
            <div className="chart-title">AI 연동 로드맵 타임라인</div>
            <div className="chart-sub">3단계 구현 계획 및 진행 현황</div>
            <div className="roadmap-timeline" style={{marginTop:'12px'}}>
              {ROADMAP.map((r,i)=>(
                <div key={i} className="roadmap-item">
                  <div className={`roadmap-dot ${r.state}`}>{r.num}</div>
                  <div className="roadmap-content">
                    <span className={`roadmap-tag ${{done:'tag-done',prog:'tag-prog',plan:'tag-plan'}[r.state]}`}>{r.tag}</span>
                    <div className="roadmap-phase">{r.phase}</div>
                    <div className="roadmap-desc">{r.desc}</div>
                  </div>
                </div>
              ))}
            </div>
          </div>

          <div>
            <div className="chart-card" style={{marginBottom:'16px'}}>
              <div className="chart-title">매칭 피드백 품질 지표</div>
              <div className="chart-sub">AI 추천 수락/수정/거부 비율 분포</div>
              <div className="chart-wrap" style={{height:'180px'}}>
                <ResponsiveContainer width="100%" height="100%">
                  <BarChart data={fbData} layout="vertical" margin={{top:5,right:20,bottom:5,left:30}}>
                    <CartesianGrid strokeDasharray="3 3" stroke="rgba(26,111,212,.1)" horizontal={false}/>
                    <XAxis type="number" tick={{fontSize:11,fill:'#4A6A8A'}} domain={[0,100]} tickFormatter={v=>`${v}%`}/>
                    <YAxis type="category" dataKey="name" tick={{fontSize:12,fill:'#4A6A8A'}} width={28}/>
                    <Tooltip formatter={v=>[`${v}%`]}/>
                    <Bar dataKey="value" radius={[0,4,4,0]}>
                      {fbData.map((e,i)=><Cell key={i} fill={e.color}/>)}
                    </Bar>
                  </BarChart>
                </ResponsiveContainer>
              </div>
            </div>

            <div className="chart-card">
              <div className="chart-title">pgvector 대비 데이터 준비 현황</div>
              <div className="chart-sub">AI 도입 대비 표준화 진행률</div>
              <div className="progress-list" style={{marginTop:'16px'}}>
                {READINESS.map(r=>(
                  <div key={r.label} className="prog-row">
                    <div className="prog-label-row">
                      <span className="prog-label">{r.label}</span>
                      <span className="prog-pct">{r.pct}%</span>
                    </div>
                    <div className="prog-bar-wrap">
                      <div className="prog-bar-fill" style={{'--w':`${r.pct}%`}}/>
                    </div>
                  </div>
                ))}
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  );
}

/* ── App ── */
function App() {
  const [view, setView] = useState('main');
  const [toasts, setToasts] = useState([]);
  const toast = t => {
    setToasts(p=>[...p,t]);
    setTimeout(()=>setToasts(p=>p.slice(1)),3000);
  };

  const NAV = [
    {key:'main',   label:'대시보드',  icon:<PhDash size={16}/>},
    {key:'matching',label:'매칭 관리', icon:<PhMatch size={16}/>},
    {key:'providers',label:'공급자 관리',icon:<PhProv size={16}/>},
    {key:'analytics',label:'AI 분석',  icon:<PhAI size={16}/>},
  ];

  return (
    <div style={{width:'100%',minHeight:'100vh',display:'flex',flexDirection:'column'}}>
      <nav className="gnav">
        <div className="gnav-inner">
          <div className="glogo">
            <PhChart size={20}/>
            SportMatch<span className="glogo-badge">AI</span>
          </div>
          <div className="gnav-links">
            {NAV.map(n=>(
              <button key={n.key} className={`gnav-link ${view===n.key?'active':''}`} onClick={()=>setView(n.key)}>
                <span style={{marginRight:'6px'}}>{n.icon}</span>{n.label}
              </button>
            ))}
          </div>
          <div className="gnav-spacer"/>
          <div className="gnav-user">
            <div className="gnav-avatar">박</div>
            박지현 관리자
          </div>
        </div>
      </nav>

      <main style={{flex:1,width:'100%'}}>
        {view==='main'      && <DashboardView/>}
        {view==='matching'  && <MatchingView toast={toast}/>}
        {view==='providers' && <ProvidersView toast={toast}/>}
        {view==='analytics' && <AnalyticsView/>}
      </main>

      <footer className="gfooter">SportMatch AI — 스포츠 행사 매칭 플랫폼 AI 확장 아키텍처 구현 데모</footer>
      <ToastZone toasts={toasts}/>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
