  '마이클 윤': { '09:00': 'avail', '10:00': 'off', '11:00': 'off', '13:00': 'off', '14:00': 'avail', '15:00': 'booked', '16:00': 'avail' },

function Toast({ msg, onClose }) {
  useEffect(() => { const t = setTimeout(onClose, 3000); return () => clearTimeout(t); }, []);
  return (
    <div className="toast">
      <i className="ti ti-check" />
      {msg}
    </div>
  );
}

function ContentManagement({ onToast }) {
  const [uploadModal, setUploadModal] = useState(false);
  const [selectedNoti, setSelectedNoti] = useState(null);
  const [progress, setProgress] = useState(0);
  const [uploading, setUploading] = useState(false);

  function handleUpload() {
    setUploading(true);
    setProgress(0);
    const interval = setInterval(() => {
      setProgress(prev => {
        if (prev >= 100) {
          clearInterval(interval);
          setUploading(false);
          setUploadModal(false);
          onToast('교재가 업로드되었습니다.');
          return 100;
        }
        return prev + 12;
      });
    }, 200);
  }

    <div style={{ animation: 'fadeUp 0.3s ease-out' }}>

        <div>
          <div className="page-title">콘텐츠 관리</div>

          <i className="ti ti-upload" /> 교재 업로드
        </button>
      </div>

      <div className="card-grid-2">
        <div className="dark-card">
          <div className="card-head">
            <span className="card-title"><i className="ti ti-file-type-pdf" style={{ color: '#F07340' }} /> 교재 목록</span>
            <span className="badge badge-orange">{MATERIALS.length}개 파일</span>

            <div key={m.id} style={{ display: 'flex', gap: 12, alignItems: 'center', padding: '12px 0', borderBottom: '1px solid rgba(103,87,232,0.08)', cursor: 'pointer' }}
              onClick={() => onToast(`${m.name} 교재 상세를 확인합니다.`)}>

              </div>
              <div style={{ flex: 1, minWidth: 0 }}>
                <div style={{ fontWeight: 600, fontSize: 13, color: '#EAE8FC', marginBottom: 2, overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>{m.name}</div>
                <div style={{ fontSize: 11, color: '#8A87B8' }}>{m.size} · 배정 {m.assignedTo}명 · {m.uploaded}</div>
              </div>
              <button className="btn-ghost" style={{ fontSize: 11, padding: '5px 10px', whiteSpace: 'nowrap' }} onClick={e => { e.stopPropagation(); onToast('교재가 배정되었습니다.'); }}>
                배정
              </button>
            </div>
          ))}
        </div>

        <div className="dark-card">
          <div className="card-head">
            <span className="card-title"><i className="ti ti-brand-kakao" style={{ color: '#F7E600' }} /> 알림톡 발송 이력</span>
            <span className="badge badge-red">실패 2건</span>
          </div>
          {NOTI_LOGS.map(log => (
            <div key={log.id} style={{ display: 'flex', gap: 12, alignItems: 'center', padding: '11px 0', borderBottom: '1px solid rgba(103,87,232,0.08)', cursor: 'pointer' }}
              onClick={() => setSelectedNoti(log)}>
              <div style={{ width: 8, height: 8, borderRadius: '50%', background: log.status === 'sent' ? '#38D9C4' : '#EF4444', flexShrink: 0 }} />
              <div style={{ flex: 1 }}>
                <div style={{ fontWeight: 600, fontSize: 13, color: '#EAE8FC' }}>{log.type} → {log.recipient}</div>
                <div style={{ fontSize: 11, color: '#8A87B8', marginTop: 2 }}>{log.time} · {log.channel}</div>
              </div>
              <span className={`badge ${log.status === 'sent' ? 'badge-teal' : 'badge-red'}`}>{log.status === 'sent' ? '발송 완료' : '실패'}</span>
              {log.status === 'failed' && (
                <button className="btn-ghost" style={{ fontSize: 11, padding: '5px 10px' }} onClick={e => { e.stopPropagation(); onToast('알림톡이 재발송되었습니다.'); }}>
                  재발송
                </button>
              )}
            </div>
          ))}
        </div>
      </div>

      {uploadModal && (
        <div className="modal-overlay" onClick={() => !uploading && setUploadModal(false)}>
          <div className="modal-box" onClick={e => e.stopPropagation()}>
            <div className="modal-title">
              교재 업로드
              {!uploading && <button className="modal-close" onClick={() => setUploadModal(false)}><i className="ti ti-x" style={{ fontSize: 13 }} /></button>}
            </div>
            <div className="form-group">
              <label className="form-label">교재명</label>
              <input className="form-input" defaultValue="비즈니스 영어 Unit 9 — Email Writing" />
            </div>
            <div className="form-group">
              <label className="form-label">대상 과목</label>
              <select className="form-select">
                <option>비즈니스 영어</option>
                <option>일상 회화</option>
                <option>발음 교정</option>
              </select>
            </div>
            <div className="upload-zone" onClick={() => !uploading && onToast('파일 선택 창이 열립니다.')}>
              <i className="ti ti-cloud-upload" style={{ fontSize: 32, color: '#6757E8', marginBottom: 10 }} />
              <div style={{ fontWeight: 600, color: '#EAE8FC', marginBottom: 4 }}>PDF 파일을 드래그하거나 클릭하여 업로드</div>
              <div style={{ fontSize: 12, color: '#8A87B8' }}>최대 20MB, PDF 형식만 허용</div>
            </div>
            {uploading && (
              <div style={{ marginTop: 16 }}>
                <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: 6, fontSize: 12, color: '#8A87B8' }}>
                  <span>업로드 중...</span><span>{progress}%</span>
                </div>
                <div className="progress-track">
                  <div className="progress-fill" style={{ width: `${progress}%` }} />
                </div>
              </div>
            )}
            {!uploading && (
              <div style={{ display: 'flex', gap: 8, justifyContent: 'flex-end', marginTop: 16 }}>
                <button className="btn-ghost" onClick={() => setUploadModal(false)}>취소</button>
                <button className="btn-primary" onClick={handleUpload}><i className="ti ti-upload" /> 업로드</button>
              </div>
            )}
          </div>
        </div>
      )}
    </div>
  );
}

function ScheduleMonitoring({ onToast }) {
  const [migModal, setMigModal] = useState(false);
  const [migStep, setMigStep] = useState(0);
  const [migProgress, setMigProgress] = useState(0);
  const [selectedLesson, setSelectedLesson] = useState(null);

  const steps = ['파일 업로드', '스키마 검증', '미리보기', '이관 실행'];

  function startMigration() {
    setMigStep(3);
    setMigProgress(0);
    const interval = setInterval(() => {
      setMigProgress(prev => {
        if (prev >= 100) {
          clearInterval(interval);
          setMigModal(false);
          setMigStep(0);
          onToast('데이터 이관이 완료되었습니다. 총 847건 이관 성공.');
          return 100;
        }
        return prev + 4;
      });
    }, 100);
  }

  return (
    <div style={{ animation: 'fadeUp 0.3s ease-out' }}>
      <div className="page-header">
        <div>
          <div className="page-title">일정 모니터링</div>
          <div className="page-sub">오늘의 수업 현황 및 데이터 이관</div>
        </div>
        <button className="btn-primary" onClick={() => setMigModal(true)}>
          <i className="ti ti-database-import" /> 데이터 이관
        </button>
      </div>

      <div className="kpi-grid">
        {[
          { label: '오늘 수업', value: '5건', delta: '완료 1 / 진행 1 / 예정 3', icon: 'ti-school' },
          { label: '전체 예약', value: '183건', delta: '이번 달', icon: 'ti-calendar' },
          { label: '취소율', value: '4.3%', delta: '전월 대비 -1.2%p', icon: 'ti-calendar-x' },
          { label: '완료율', value: '96.7%', delta: '이번 달', icon: 'ti-circle-check' },
        ].map(({ label, value, delta, icon }) => (
          <div key={label} className="kpi-card">
            <div className="kpi-label"><i className={`ti ${icon}`} />{label}</div>
            <div className="kpi-value">{value}</div>
            <div className="kpi-delta">{delta}</div>
          </div>
        ))}
      </div>

      <div className="dark-card card-full">
        <div className="card-head">
          <span className="card-title"><i className="ti ti-clock" style={{ color: '#38D9C4' }} /> 오늘 수업 타임라인 (2026.05.27)</span>
          <span className="badge badge-teal">실시간</span>
        </div>
        {SCHEDULE.map(lesson => (
          <div key={lesson.id} style={{ display: 'grid', gridTemplateColumns: '60px 1fr', gap: 12, marginBottom: 8, cursor: 'pointer' }}
            onClick={() => setSelectedLesson(lesson)}>
            <div style={{ fontWeight: 700, fontSize: 13, color: '#8A87B8', paddingTop: 6 }}>{lesson.time}</div>
            <div className={`timeline-block ${lesson.status}`}>
              <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
                <div>
                  <span style={{ fontWeight: 700, color: '#EAE8FC' }}>{lesson.teacher}</span>
                  <span style={{ color: '#8A87B8', margin: '0 8px' }}>→</span>
                  <span style={{ color: '#EAE8FC' }}>{lesson.student}</span>
                  <span className="badge badge-gray" style={{ marginLeft: 10, fontSize: 10 }}>{lesson.topic}</span>
                </div>
                <span className={`badge ${lesson.status === 'done' ? 'badge-gray' : lesson.status === 'active' ? 'badge-teal' : 'badge-blue'}`}>
                  {lesson.status === 'done' ? '완료' : lesson.status === 'active' ? '진행 중' : '예정'}
                </span>
              </div>
            </div>
          </div>
        ))}
      </div>

      {selectedLesson && (
        <div className="modal-overlay" onClick={() => setSelectedLesson(null)}>
          <div className="modal-box" onClick={e => e.stopPropagation()}>
            <div className="modal-title">
              수업 상세
              <button className="modal-close" onClick={() => setSelectedLesson(null)}><i className="ti ti-x" style={{ fontSize: 13 }} /></button>
            </div>
            <div style={{ background: 'rgba(103,87,232,0.1)', borderRadius: 10, padding: 18, marginBottom: 18 }}>
              <div style={{ fontWeight: 800, fontSize: 16, color: '#EAE8FC', marginBottom: 4 }}>{selectedLesson.teacher} → {selectedLesson.student}</div>
              <div style={{ fontSize: 14, color: '#8B7CF0' }}>{selectedLesson.time} · {selectedLesson.topic}</div>
              <span className={`badge ${selectedLesson.status === 'done' ? 'badge-gray' : selectedLesson.status === 'active' ? 'badge-teal' : 'badge-blue'}`} style={{ marginTop: 8, display: 'inline-block' }}>
                {selectedLesson.status === 'done' ? '완료' : selectedLesson.status === 'active' ? '진행 중' : '예정'}
              </span>
            </div>
            <div style={{ display: 'flex', gap: 8, justifyContent: 'flex-end' }}>
              <button className="btn-ghost" onClick={() => { setSelectedLesson(null); onToast('수업이 취소되었습니다.'); }}>
                <i className="ti ti-calendar-x" /> 수업 취소
              </button>
            </div>
          </div>
        </div>
      )}

      {migModal && (
        <div className="modal-overlay" onClick={() => migStep < 3 && setMigModal(false)}>
          <div className="modal-box" onClick={e => e.stopPropagation()}>
            <div className="modal-title">
              MySQL → PostgreSQL 데이터 이관
              {migStep < 3 && <button className="modal-close" onClick={() => setMigModal(false)}><i className="ti ti-x" style={{ fontSize: 13 }} /></button>}
            </div>
            <div style={{ display: 'flex', gap: 0, marginBottom: 24 }}>
              {steps.map((s, i) => (
                <div key={s} style={{ flex: 1, textAlign: 'center', position: 'relative' }}>
                  <div style={{ width: 24, height: 24, borderRadius: '50%', background: i <= migStep ? '#6757E8' : 'rgba(103,87,232,0.2)', color: i <= migStep ? '#FFFFFF' : '#8A87B8', display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 11, fontWeight: 700, margin: '0 auto 6px' }}>{i+1}</div>
                  <div style={{ fontSize: 11, color: i <= migStep ? '#8B7CF0' : '#8A87B8' }}>{s}</div>
                  {i < 3 && <div style={{ position: 'absolute', top: 12, left: '60%', right: '-40%', height: 2, background: i < migStep ? '#6757E8' : 'rgba(103,87,232,0.2)' }} />}
                </div>
              ))}
            </div>
            {migStep === 0 && (
              <>
                <div className="upload-zone" style={{ marginBottom: 16 }}>
                  <i className="ti ti-file-spreadsheet" style={{ fontSize: 28, color: '#6757E8', marginBottom: 8 }} />
                  <div style={{ fontWeight: 600, color: '#EAE8FC', marginBottom: 4 }}>WordPress 백업 CSV 파일 업로드</div>
                  <div style={{ fontSize: 12, color: '#8A87B8' }}>members.csv, payments.csv, lessons.csv</div>
                </div>
                <button className="btn-primary" onClick={() => setMigStep(1)}>파일 선택 (시뮬레이션)</button>
              </>
            )}
            {migStep === 1 && (
              <>
                <div style={{ background: 'rgba(56,217,196,0.08)', borderRadius: 10, padding: 16, marginBottom: 16 }}>
                  <div style={{ fontWeight: 700, color: '#38D9C4', marginBottom: 8 }}>스키마 검증 완료</div>
                  {[['members.csv', '847건', '오류 0건'], ['payments.csv', '1,203건', '오류 0건'], ['lessons.csv', '2,891건', '오류 2건 (날짜 형식)']].map(([f,r,e]) => (
                    <div key={f} style={{ display: 'flex', justifyContent: 'space-between', fontSize: 12, color: '#EAE8FC', marginBottom: 4 }}>
                      <span style={{ color: '#8A87B8' }}>{f}</span>
                      <span>{r}</span>
                      <span style={{ color: e.includes('0건') ? '#38D9C4' : '#F07340' }}>{e}</span>
                    </div>
                  ))}
                </div>
                <button className="btn-primary" onClick={() => setMigStep(2)}>미리보기 확인</button>
              </>
            )}
            {migStep === 2 && (
              <>
                <div style={{ fontWeight: 700, fontSize: 13, color: '#EAE8FC', marginBottom: 10 }}>회원 데이터 샘플 (상위 5건)</div>
                <table className="data-table" style={{ marginBottom: 16 }}>
                  <thead><tr><th>ID</th><th>이름</th><th>이메일</th><th>가입일</th></tr></thead>
                  <tbody>
                    {[['101','김민수','minsu@corp.com','2024.03.12'],['102','이서연','seoyeon@startup.io','2024.03.15'],['103','박재혁','jaehyuk@company.co','2024.03.18']].map(([id,n,e,d]) => (
                      <tr key={id}><td style={{fontSize:12,color:'#8A87B8'}}>{id}</td><td style={{fontWeight:600}}>{n}</td><td style={{fontSize:12,color:'#8A87B8'}}>{e}</td><td style={{fontSize:12,color:'#8A87B8'}}>{d}</td></tr>
                    ))}
                  </tbody>
                </table>
                <button className="btn-primary" onClick={startMigration}><i className="ti ti-database-import" /> 이관 실행</button>
              </>
            )}
            {migStep === 3 && (
              <div>
                <div style={{ textAlign: 'center', marginBottom: 16 }}>
                  <div style={{ fontWeight: 700, color: '#EAE8FC', marginBottom: 6 }}>이관 진행 중... {migProgress}%</div>
                  <div style={{ fontSize: 12, color: '#8A87B8' }}>3,941건 처리 중 (청크 500건 단위)</div>
                </div>
                <div className="progress-track" style={{ height: 8 }}>
                  <div className="progress-fill" style={{ width: `${migProgress}%` }} />
                </div>
              </div>
            )}
          </div>
        </div>
      )}
    </div>
  );
}

function App() {
  const [page, setPage] = useState('회원 관리');
  const [toast, setToast] = useState(null);

  const NAV_ITEMS = PAGES;

  return (
    <div style={{ width: '100%', minHeight: '100vh', display: 'flex', flexDirection: 'column' }}>
      <nav className="global-nav">
        <div className="nav-logo">
          <i className="ti ti-device-desktop-analytics" style={{ color: '#6757E8', fontSize: 20 }} />
          EduTalk Admin
          <span className="nav-logo-badge">관리자</span>
        </div>
        <div className="nav-links">
          {NAV_ITEMS.map(p => (
            <button key={p} className={`nav-link ${page === p ? 'active' : ''}`} onClick={() => setPage(p)}>
              <i className={`ti ${PAGE_ICONS[p]}`} />
              {p}
            </button>
          ))}
        </div>
        <div className="nav-right">
          <div style={{ display: 'flex', alignItems: 'center', gap: 6, fontSize: 12, color: '#8A87B8' }}>
            <span className="status-dot" />
            시스템 정상
          </div>
          <div className="admin-badge">
            <i className="ti ti-shield-check" />
            최고 관리자
          </div>
        </div>
      </nav>

      <div className="main-wrap">
        {page === '회원 관리' && <MemberManagement onToast={m => setToast(m)} />}
        {page === '결제 관리' && <BillingManagement onToast={m => setToast(m)} />}
        {page === '콘텐츠 관리' && <ContentManagement onToast={m => setToast(m)} />}
        {page === '일정 모니터링' && <ScheduleMonitoring onToast={m => setToast(m)} />}
      </div>

      {toast && <Toast msg={toast} onClose={() => setToast(null)} />}
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
