function Toast({ msg, onDone }) {
  useEffect(() => { const t = setTimeout(onDone, 2800); return () => clearTimeout(t); }, []);
  return (
    <div style={{
      position:'fixed', bottom:28, right:28, background:'#0F172A', color:'#fff',
      padding:'12px 20px', borderRadius:10, zIndex:999, fontSize:14, fontWeight:500,

      display:'flex', alignItems:'center', gap:8,
    }}>
      <i className="ph ph-check-circle" style={{fontSize:18, color:'#4ADE80'}}></i>
      {msg}
    </div>
  );
}

function TatBar({ val, max }) {
  const pct = Math.min(100, Math.round(val / max * 100));
  const color = pct > 80 ? '#EF4444' : pct > 50 ? '#F59E0B' : '#0E7490';
  return (
    <div>
      <div style={{display:'flex', justifyContent:'space-between', fontSize:12, color:'#475569', marginBottom:3}}>
        <span>{val}분 경과</span><span>{max}분 기준</span>
      </div>
      <div className="progress-bar-track">
        <div className="progress-bar-fill" style={{'--target-width': pct+'%', background: color, width: pct+'%'}} />
      </div>
    </div>
  );
}

// ── 의뢰 접수 화면 ─────────────────────────────────────────────────
function ReferralScreen({ onToast }) {
  const [dragOver, setDragOver] = useState(false);
  const [files, setFiles] = useState([
    { name: 'DICOM_20260528_봄이_복부CT.zip', size: '2.3 GB', progress: 72, done: false },
  ]);
  const [form, setForm] = useState({ patient: '', species: 'dog', age: '', clinic: '', vet: '', type: '', cc: '', note: '' });
  const [submitting, setSubmitting] = useState(false);

  function handleAddFile() {
    const newFile = { name: 'DICOM_20260528_초코_흉부CT.dcm', size: '1.8 GB', progress: 0, done: false };
    setFiles(f => [...f, newFile]);
    let p = 0;
    const t = setInterval(() => {
      p += 7;
      setFiles(prev => prev.map((fi, i) => i === prev.length - 1 ? { ...fi, progress: Math.min(100, p), done: p >= 100 } : fi));
      if (p >= 100) clearInterval(t);
    }, 180);
  }

  function handleSubmit() {
    setSubmitting(true);
    setTimeout(() => { setSubmitting(false); onToast('의뢰 접수 완료 — VET-2026-0482 번호가 발급되었습니다'); }, 1400);
  }

    <div className="page-enter" style={{padding:'28px 32px', maxWidth:820, margin:'0 auto'}}>

        <h2 style={{fontSize:22, fontWeight:700, color:'#0F172A'}}>판독 의뢰 접수</h2>

          DICOM / ZIP 파일 업로드

          className={`upload-zone${dragOver ? ' drag-over' : ''}`}
          onClick={handleAddFile}
          onDragOver={e => { e.preventDefault(); setDragOver(true); }}
          onDragLeave={() => setDragOver(false)}
          onDrop={e => { e.preventDefault(); setDragOver(false); handleAddFile(); }}
        >
          <i className="ph ph-folder-open" style={{fontSize:40, color:'#94A3B8', display:'block', marginBottom:8}}></i>
          <p style={{fontSize:14, fontWeight:600, color:'#475569'}}>파일을 드래그하거나 클릭하여 업로드</p>
          <p style={{fontSize:12, color:'#94A3B8', marginTop:4}}>DICOM, ZIP 형식 지원 · 최대 10GB/파일</p>
        </div>
        {files.length > 0 && (
          <div style={{marginTop:16, display:'flex', flexDirection:'column', gap:10}}>
            {files.map((f, i) => (
              <div key={i} style={{background:'#F8FAFC', borderRadius:8, padding:'12px 14px', border:'1px solid #E2E8F0'}}>
                <div style={{display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:6}}>
                  <div style={{display:'flex', alignItems:'center', gap:8}}>
                    <i className="ph ph-file-cloud" style={{fontSize:16, color:'#0E7490'}}></i>
                    <span style={{fontSize:13, fontWeight:500, color:'#334155'}}>{f.name}</span>
                    <span style={{fontSize:12, color:'#94A3B8'}}>{f.size}</span>
                  </div>
                  {f.done
                    ? <span style={{fontSize:12, fontWeight:600, color:'#16A34A'}}>업로드 완료</span>
                    : <span style={{fontSize:12, color:'#64748B'}}>{f.progress}%</span>}
                </div>
                <div className="progress-bar-track">
                  <div className="progress-bar-fill" style={{'--target-width': f.progress+'%', width: f.progress+'%', background: f.done ? '#16A34A' : '#0E7490'}} />
                </div>
              </div>
            ))}
          </div>
        )}
      </div>

      {/* Referral Form */}
      <div style={{background:'#fff', borderRadius:12, padding:24, boxShadow:'0 1px 4px rgba(0,0,0,0.06)', marginBottom:20}}>
        <h3 style={{fontSize:15, fontWeight:600, marginBottom:16, color:'#0F172A', display:'flex', alignItems:'center', gap:6}}>
          <i className="ph ph-clipboard-text" style={{fontSize:18, color:'#0E7490'}}></i>
          의뢰 정보 입력
        </h3>
        <div style={{display:'grid', gridTemplateColumns:'1fr 1fr', gap:14}}>
          {[
            ['환자명', 'patient', '예: 봄이', 'text'],
            ['수의사명', 'vet', '예: 김민수 수의사', 'text'],
            ['병원명', 'clinic', '예: 강남동물병원', 'text'],
            ['촬영 부위', 'type', '예: CT 복부', 'text'],
          ].map(([label, key, ph, type]) => (
            <div key={key}>

              <input type={type} className="input-field" placeholder={ph}

            </div>

          <div style={{gridColumn:'span 2'}}>
            <label style={{fontSize:12, fontWeight:600, color:'#475569', display:'block', marginBottom:5}}>주요 증상 및 CC</label>
            <textarea className="input-field" placeholder="예: 3일째 식욕부진, 복부팽만, 구토 증상"
              value={form.cc} onChange={e => setForm(f => ({...f, cc: e.target.value}))} />

          <div style={{gridColumn:'span 2'}}>

            <textarea className="input-field" placeholder="긴급 판독 요청, 특이 사항 등"
              value={form.note} onChange={e => setForm(f => ({...f, note: e.target.value}))} style={{minHeight:60}} />
          </div>
        </div>
      </div>

      <div style={{display:'flex', justifyContent:'flex-end', gap:10}}>
        <button className="btn-ghost" onClick={() => setForm({ patient:'', species:'dog', age:'', clinic:'', vet:'', type:'', cc:'', note:'' })}>초기화</button>
        <button className="btn-primary" onClick={handleSubmit} disabled={submitting}
          style={{opacity: submitting ? 0.7 : 1, display:'flex', alignItems:'center', gap:8}}>
          {submitting
            ? <><i className="ph ph-spinner" style={{fontSize:14, animation:'spin 1s linear infinite'}}></i>접수 중...</>
            : <><i className="ph ph-paper-plane-tilt" style={{fontSize:14}}></i>판독 의뢰 접수</>}
        </button>
      </div>
    </div>
  );
}

// ── 결과 조회 화면 ─────────────────────────────────────────────────
function ResultDeliveryScreen({ onToast }) {
  const [thread, setThread] = useState([
    { from: '강남동물병원 · 김민수 수의사', msg: '판독 보고서 수령하였습니다. 감사합니다. 종괴 관련하여 추가 조직검사 권고가 필요할까요?', time: '10:15', me: false },
    { from: '판독팀', msg: '네, 발견된 소장 종괴는 조직검사를 통한 확진이 필요합니다. 가능한 빠른 조직검사를 권장드립니다.', time: '10:28', me: true },
  ]);
  const [newMsg, setNewMsg] = useState('');
  const [selectedResult, setSelectedResult] = useState(null);
  const [pdfLoading, setPdfLoading] = useState(false);

  function sendMsg() {
    if (!newMsg.trim()) return;
    setThread(t => [...t, { from: '나 (의뢰자)', msg: newMsg, time: '지금', me: false }]);
    setNewMsg('');
  }

  function handlePdf(id) {
    setPdfLoading(id);
    setTimeout(() => { setPdfLoading(false); onToast('PDF 보고서 다운로드 준비 완료'); }, 1500);
  }

  return (
    <div className="page-enter" style={{padding:'28px 32px'}}>
      <h2 style={{fontSize:22, fontWeight:700, color:'#0F172A', marginBottom:6}}>결과 조회 및 회신</h2>
      <p style={{fontSize:14, color:'#64748B', marginBottom:20}}>완료된 판독 보고서를 열람하고 케이스별 커뮤니케이션을 진행합니다.</p>

      <div style={{display:'flex', gap:20}}>
        <div style={{flex:1}}>
          {RESULTS.map(r => (
            <div key={r.id} className="card-hover" onClick={() => setSelectedResult(r)}
              style={{background:'#fff', borderRadius:12, padding:'18px 20px', border: selectedResult?.id === r.id ? '2px solid #0E7490' : '1px solid #E2E8F0', marginBottom:12, cursor:'pointer', boxShadow:'0 1px 4px rgba(0,0,0,0.06)'}}>
              <div style={{display:'flex', justifyContent:'space-between', alignItems:'flex-start', marginBottom:8}}>
                <div>
                  <div style={{fontSize:14, fontWeight:700, color:'#0E7490'}}>{r.id}</div>
                  <div style={{fontSize:13, fontWeight:500, color:'#0F172A', marginTop:2}}>{r.patient}</div>
                  <div style={{fontSize:12, color:'#64748B', marginTop:1}}>{r.type} · 담당: {r.reader}</div>
                </div>
                <span className="badge badge-complete">완료</span>
              </div>
              <div style={{display:'flex', justifyContent:'space-between', alignItems:'center', marginTop:10}}>
                <span style={{fontSize:11, color:'#94A3B8'}}>완료: {r.completedAt}</span>
                <div style={{display:'flex', gap:8, alignItems:'center'}}>
                  {r.unread > 0 && (
                    <span style={{background:'#EF4444', color:'#fff', fontSize:11, fontWeight:700, borderRadius:10, padding:'1px 8px'}}>{r.unread} 미확인</span>
                  )}
                  <button className="btn-primary" style={{fontSize:12, padding:'5px 14px'}}
                    onClick={e => { e.stopPropagation(); handlePdf(r.id); }}>
                    {pdfLoading === r.id
                      ? '생성 중...'
                      : <><i className="ph ph-file-pdf" style={{marginRight:4}}></i>PDF 다운로드</>}
                  </button>
                </div>
              </div>
            </div>
          ))}
        </div>

        {selectedResult && (
          <div style={{width:360, flexShrink:0, background:'#fff', borderRadius:12, border:'1px solid #E2E8F0', padding:20, display:'flex', flexDirection:'column', height:380}}>
            <h3 style={{fontSize:14, fontWeight:600, color:'#334155', marginBottom:12}}>
              메시지 스레드 — {selectedResult.id}
              {selectedResult.unread > 0 && (
                <span style={{background:'#EF4444', color:'#fff', fontSize:11, borderRadius:8, padding:'1px 7px', marginLeft:8}}>{selectedResult.unread}</span>
              )}
            </h3>
            <div style={{flex:1, overflowY:'auto', display:'flex', flexDirection:'column', gap:10, marginBottom:12}}>
              {thread.map((m, i) => (
                <div key={i} style={{display:'flex', flexDirection:'column', alignItems: m.me ? 'flex-end' : 'flex-start'}}>
                  <div style={{fontSize:11, color:'#94A3B8', marginBottom:2}}>{m.from} · {m.time}</div>
                  <div style={{
                    maxWidth:'85%', background: m.me ? '#0E7490' : '#F1F5F9',
                    color: m.me ? '#fff' : '#0F172A', borderRadius:10, padding:'8px 12px', fontSize:13, lineHeight:1.5,
                  }}>{m.msg}</div>
                </div>
              ))}
            </div>
            <div style={{display:'flex', gap:8}}>
              <input className="input-field" placeholder="메시지 입력..." value={newMsg}
                onChange={e => setNewMsg(e.target.value)}
                onKeyDown={e => e.key === 'Enter' && sendMsg()} style={{flex:1, fontSize:13}} />
              <button className="btn-primary" onClick={sendMsg} style={{fontSize:13, padding:'8px 14px'}}>
                <i className="ph ph-paper-plane-tilt" style={{fontSize:14}}></i>
              </button>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

          </div>
          <nav style={{display:'flex', gap:2, flex:1}}>
            {NAV_TABS.map(t => (
              <button key={t.id} onClick={() => setTab(t.id)}
                style={{
                  padding:'6px 16px', borderRadius:8, border:'none', cursor:'pointer', fontFamily:'inherit',
                  fontSize:13, fontWeight:600, display:'flex', alignItems:'center', gap:6,
                  transition:'all 0.15s',
                  background: tab === t.id ? '#E0F9FD' : 'transparent',
                  color: tab === t.id ? '#0E7490' : '#64748B',
                  borderBottom: tab === t.id ? '2px solid #0E7490' : '2px solid transparent',
                }}>
                <i className={`ph ${t.icon}`} style={{fontSize:15}}></i>
                {t.label}
              </button>
            ))}
          </nav>
          <div style={{display:'flex', alignItems:'center', gap:12}}>
            <button style={{background:'none', border:'none', cursor:'pointer', color:'#64748B', position:'relative'}}>
              <i className="ph ph-bell" style={{fontSize:20}}></i>
              <span style={{position:'absolute', top:-2, right:-2, width:8, height:8, background:'#EF4444', borderRadius:'50%', display:'block'}}></span>
            </button>
            <div style={{width:32, height:32, background:'linear-gradient(135deg,#0E7490,#06B6D4)', borderRadius:'50%', display:'flex', alignItems:'center', justifyContent:'center', color:'#fff', fontSize:13, fontWeight:700}}>
              김
            </div>
          </div>
        </div>
      </header>

      {/* 히어로 배너 */}
      {tab === 'home' && (
        <div style={{background:'linear-gradient(135deg,#0E7490 0%,#0891B2 60%,#06B6D4 100%)', color:'#fff', padding:'28px 32px'}}>
          <div style={{maxWidth:1280, margin:'0 auto'}}>
            <h1 style={{fontSize:26, fontWeight:700, marginBottom:4}}>동물 의료영상 판독 워크플로우 플랫폼</h1>
            <p style={{fontSize:14, opacity:0.85}}>CT DICOM 업로드부터 판독 완료 결과 수신까지 — 원스톱 판독 의뢰 시스템</p>
            <div style={{display:'flex', gap:20, marginTop:16}}>
              {[['6', '오늘 접수'], ['2', '판독 완료'], ['2', '진행 중'], ['82분', '평균 TAT']].map(([v, l]) => (
                <div key={l} style={{textAlign:'center'}}>
                  <div style={{fontSize:22, fontWeight:700}}>{v}</div>
                  <div style={{fontSize:12, opacity:0.8}}>{l}</div>
                </div>
              ))}
            </div>
          </div>
        </div>
      )}

      {/* 메인 콘텐츠 */}
      <main style={{flex:1, width:'100%'}}>
        <div style={{maxWidth:1280, margin:'0 auto'}}>
          {tab === 'home'     && <ReferralScreen onToast={msg => setToast(msg)} />}
          {tab === 'status'   && <StatusTrackerScreen onSelectCase={c => setSelectedCase(c)} />}
          {tab === 'workspace' && <RadiologistWorkspace onToast={msg => setToast(msg)} />}
          {tab === 'results'  && <ResultDeliveryScreen onToast={msg => setToast(msg)} />}
        </div>
      </main>

      {selectedCase && <CaseDrawer c={selectedCase} onClose={() => setSelectedCase(null)} />}
      {toast && <Toast msg={toast} onDone={() => setToast(null)} />}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
