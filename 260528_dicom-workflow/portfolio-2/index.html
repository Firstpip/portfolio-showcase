<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>동물 의료영상 판독 플랫폼 — 운영 관제 시스템</title>
<link rel="preconnect" href="https://cdn.jsdelivr.net">
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" rel="stylesheet">
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://unpkg.com/prop-types/prop-types.min.js"></script>
<script src="https://unpkg.com/react-is@18/umd/react-is.production.min.js"></script>
<script src="https://unpkg.com/recharts/umd/Recharts.js"></script>
<link rel="stylesheet" href="https://unpkg.com/@tabler/icons-webfont@3.0.0/dist/tabler-icons.min.css">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 100%; min-height: 100vh; background: #0F172A; }
  body { font-family: 'Pretendard', -apple-system, sans-serif; color: #F1F5F9; }
  #root { width: 100%; min-height: 100vh; }

  @keyframes fadeSlide {
    from { opacity: 0; transform: translateX(-12px); }
    to   { opacity: 1; transform: translateX(0); }
  }
  @keyframes slideUp {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes alertPulse {
    0%, 100% { box-shadow: 0 0 0 0 rgba(217,119,6,0.6); }
    50% { box-shadow: 0 0 0 6px rgba(217,119,6,0); }
  }
  @keyframes barGrow {
    from { height: 0; }
    to   { height: var(--bar-h); }
  }
  @keyframes fadeInOverlay {
    from { opacity: 0; }
    to   { opacity: 1; }
  }
  @keyframes scaleIn {
    from { opacity: 0; transform: scale(0.94); }
    to   { opacity: 1; transform: scale(1); }
  }
  @keyframes countUp {
    from { opacity: 0; transform: translateY(6px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .page-enter { animation: fadeSlide 0.2s ease both; }
  .card-base {
    background: #1E293B; border: 1px solid #334155; border-radius: 4px;
    transition: border-color 0.2s ease;
  }
  .card-base:hover { border-color: #D97706; }
  .btn-amber {
    background: #D97706; color: #0F172A; border: none;
    padding: 7px 18px; border-radius: 4px; cursor: pointer; font-size: 13px; font-weight: 700;
    font-family: inherit; transition: background 0.15s ease;
  }
  .btn-amber:hover { background: #B45309; }
  .btn-outline {
    background: transparent; color: #94A3B8; border: 1px solid #334155;
    padding: 6px 14px; border-radius: 4px; cursor: pointer; font-size: 13px; font-weight: 500;
    font-family: inherit; transition: all 0.15s ease;
  }
  .btn-outline:hover { border-color: #D97706; color: #F1F5F9; }
  .btn-icon {
    background: transparent; border: none; cursor: pointer; color: #64748B;
    display: flex; align-items: center; justify-content: center; padding: 6px; border-radius: 4px;
    transition: color 0.15s, background 0.15s;
  }
  .btn-icon:hover { color: #F1F5F9; background: #334155; }

  .badge-sm {
    display: inline-flex; align-items: center; padding: 2px 8px; border-radius: 3px;
    font-size: 11px; font-weight: 700; white-space: nowrap;
  }
  .b-ok     { background: rgba(22,163,74,0.2);  color: #4ADE80; }
  .b-warn   { background: rgba(245,158,11,0.2); color: #FCD34D; }
  .b-alert  { background: rgba(239,68,68,0.2);  color: #FCA5A5; animation: alertPulse 2s ease infinite; }
  .b-info   { background: rgba(14,116,144,0.2); color: #67E8F9; }

  .input-dark {
    background: #0F172A; border: 1px solid #334155; color: #F1F5F9; border-radius: 4px;
    padding: 7px 10px; font-family: inherit; font-size: 13px; outline: none;
    transition: border-color 0.15s ease;
  }
  .input-dark:focus { border-color: #D97706; }
  textarea.input-dark { resize: vertical; min-height: 70px; }

  .table-row-dark { transition: background 0.12s ease; }
  .table-row-dark:hover { background: rgba(255,255,255,0.04); cursor: pointer; }

  .overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 200;
    display: flex; align-items: center; justify-content: center;
    animation: fadeInOverlay 0.2s ease;
  }
  .modal-dark {
    background: #1E293B; border: 1px solid #475569; border-radius: 6px;
    width: 480px; max-width: 94vw; max-height: 85vh; overflow-y: auto;
    box-shadow: 0 24px 60px rgba(0,0,0,0.5);
    animation: scaleIn 0.2s ease;
  }

  ::-webkit-scrollbar { width: 5px; height: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #334155; border-radius: 3px; }

  .metric-row { display: flex; align-items: center; justify-content: space-between; padding: 9px 0; border-bottom: 1px solid #1E293B; }
  .metric-row:last-child { border-bottom: none; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef } = React;
const { BarChart, Bar, XAxis, YAxis, CartesianGrid, Tooltip, ResponsiveContainer, PieChart, Pie, Cell, LineChart, Line, Area, AreaChart } = Recharts;

// ── 더미 데이터 ──────────────────────────────────────────────────
const KPI = { total: 142, inProgress: 18, completed: 119, delayed: 5, avgTat: 73, todayNew: 23 };

const TAT_TREND = [
  { date: '5/22', avg: 89, target: 120 }, { date: '5/23', avg: 95, target: 120 },
  { date: '5/24', avg: 78, target: 120 }, { date: '5/25', avg: 68, target: 120 },
  { date: '5/26', avg: 72, target: 120 }, { date: '5/27', avg: 65, target: 120 },
  { date: '5/28', avg: 73, target: 120 },
];

const READER_STATS = [
  { name: '박지원 판독의', cases: 38, avgTat: 65, status: 'active', specialty: '복부·흉부' },
  { name: '최현우 판독의', cases: 31, avgTat: 79, status: 'active', specialty: '신경계·두경부' },
  { name: '이수영 판독의', cases: 27, avgTat: 82, status: 'active', specialty: '근골격계' },
  { name: '정민아 판독의', cases: 23, avgTat: 74, status: 'active', specialty: '복부·비뇨기' },
  { name: '김태준 판독의', cases: 0, avgTat: 0, status: 'inactive', specialty: '흉부' },
];

const DELAY_CAUSES = [
  { name: '파일 전송 지연', value: 2, color: '#F59E0B' },
  { name: '배정 지연', value: 1, color: '#EF4444' },
  { name: '초안 수정 반복', value: 1, color: '#8B5CF6' },
  { name: '기타', value: 1, color: '#64748B' },
];

const USERS = [
  { id: 'USR-001', name: '김민수 수의사', clinic: '강남동물병원', cases: 18, lastActive: '2026-05-28 11:02', status: 'active' },
  { id: 'USR-002', name: '이지은 수의사', clinic: '서울반려동물메디컬센터', cases: 14, lastActive: '2026-05-28 09:45', status: 'active' },
  { id: 'USR-003', name: '정승호 수의사', clinic: '분당펫클리닉', cases: 11, lastActive: '2026-05-27 18:30', status: 'active' },
  { id: 'USR-004', name: '한소희 수의사', clinic: '마포동물의료센터', cases: 9, lastActive: '2026-05-27 16:00', status: 'inactive' },
  { id: 'USR-005', name: '오지훈 수의사', clinic: '이태원고양이병원', cases: 7, lastActive: '2026-05-26 12:00', status: 'active' },
];

const SYS_METRICS = {
  s3: { used: 68.4, total: 100, unit: 'GB', pct: 68, threshold: 80 },
  redis: { hitRate: 94.2, memory: 41, memThreshold: 70 },
  db: { conns: 12, maxConns: 50, avgQuery: 42, queryThreshold: 200 },
  api: [
    { endpoint: '/api/cases', avg: 38, p95: 85 },
    { endpoint: '/api/upload/presign', avg: 12, p95: 28 },
    { endpoint: '/api/reports/pdf', avg: 890, p95: 1420 },
    { endpoint: '/api/stats/tat', avg: 210, p95: 380 },
    { endpoint: '/api/users', avg: 18, p95: 42 },
  ],
};

const ALERTS = [
  { id: 1, level: 'alert', msg: 'VET-2026-0476 TAT 임박 — 잔여 14분', time: '11:12' },
  { id: 2, level: 'warn',  msg: '/api/reports/pdf 응답 지연 890ms (임계값: 500ms)', time: '10:58' },
  { id: 3, level: 'info',  msg: 'S3 버킷 사용량 68.4GB (80GB 임계값 대비 85%)', time: '10:00' },
];

const HOUR_DATA = Array.from({length:12}, (_, i) => ({
  hour: `${9+i}시`, received: Math.round(3 + Math.random()*5), completed: Math.round(2 + Math.random()*4)
}));

// ── Toast ────────────────────────────────────────────────────────
function Toast({ msg, onDone }) {
  useEffect(() => { const t = setTimeout(onDone, 2800); return () => clearTimeout(t); }, []);
  return (
    <div style={{
      position:'fixed', bottom:24, right:24, background:'#D97706', color:'#0F172A',
      padding:'11px 18px', borderRadius:4, zIndex:999, fontSize:13, fontWeight:700,
      boxShadow:'0 8px 24px rgba(0,0,0,0.4)', animation:'slideUp 0.2s ease',
      display:'flex', alignItems:'center', gap:8,
    }}>
      <i className="ti ti-check" style={{fontSize:16}}></i>
      {msg}
    </div>
  );
}

// ── 메인 대시보드 ─────────────────────────────────────────────────
function MainDashboard() {
  return (
    <div className="page-enter" style={{padding:'24px 28px'}}>
      {/* 경보 배너 */}
      {ALERTS.filter(a => a.level === 'alert').length > 0 && (
        <div style={{background:'rgba(239,68,68,0.12)', border:'1px solid rgba(239,68,68,0.35)', borderRadius:4, padding:'10px 16px', marginBottom:16, display:'flex', alignItems:'center', gap:10, animation:'alertPulse 2s ease infinite'}}>
          <i className="ti ti-alert-triangle" style={{fontSize:16, color:'#FCA5A5'}}></i>
          <span style={{fontSize:13, color:'#FCA5A5', fontWeight:600}}>
            긴급 알림 {ALERTS.filter(a => a.level === 'alert').length}건 — {ALERTS.find(a => a.level === 'alert')?.msg}
          </span>
        </div>
      )}

      {/* KPI 카드 */}
      <div style={{display:'grid', gridTemplateColumns:'repeat(6, 1fr)', gap:10, marginBottom:18}}>
        {[
          { label:'전체 케이스', val: KPI.total, icon:'ti-folder', color:'#67E8F9' },
          { label:'진행 중', val: KPI.inProgress, icon:'ti-activity', color:'#FCD34D' },
          { label:'완료', val: KPI.completed, icon:'ti-circle-check', color:'#4ADE80' },
          { label:'지연', val: KPI.delayed, icon:'ti-alert-circle', color:'#FCA5A5' },
          { label:'평균 TAT', val: KPI.avgTat+'분', icon:'ti-clock', color:'#D97706' },
          { label:'오늘 신규', val: KPI.todayNew, icon:'ti-plus', color:'#A78BFA' },
        ].map((k, i) => (
          <div key={i} className="card-base" style={{padding:'14px 16px', animation:`countUp 0.3s ${i*0.05}s ease both`}}>
            <div style={{display:'flex', justifyContent:'space-between', alignItems:'flex-start', marginBottom:6}}>
              <span style={{fontSize:11, color:'#64748B', fontWeight:500}}>{k.label}</span>
              <i className={`ti ${k.icon}`} style={{fontSize:14, color: k.color}}></i>
            </div>
            <div style={{fontSize:22, fontWeight:700, color: k.color}}>{k.val}</div>
          </div>
        ))}
      </div>

      <div style={{display:'grid', gridTemplateColumns:'2fr 1fr', gap:14, marginBottom:14}}>
        {/* TAT 추이 차트 */}
        <div className="card-base" style={{padding:'16px 18px'}}>
          <h3 style={{fontSize:13, fontWeight:600, color:'#94A3B8', marginBottom:12, display:'flex', alignItems:'center', gap:6}}>
            <i className="ti ti-chart-line" style={{fontSize:14, color:'#D97706'}}></i>주간 평균 TAT 추이 (분)
          </h3>
          <div style={{height:160}}>
            <ResponsiveContainer width="100%" height="100%">
              <LineChart data={TAT_TREND}>
                <CartesianGrid strokeDasharray="3 3" stroke="#1E293B" />
                <XAxis dataKey="date" tick={{fontSize:11, fill:'#475569'}} />
                <YAxis tick={{fontSize:11, fill:'#475569'}} domain={[0, 140]} />
                <Tooltip contentStyle={{background:'#1E293B', border:'1px solid #334155', borderRadius:4, fontSize:12}} />
                <Line type="monotone" dataKey="avg" stroke="#D97706" strokeWidth={2.5} dot={{fill:'#D97706', r:3}} name="실제 TAT" />
                <Line type="monotone" dataKey="target" stroke="#475569" strokeWidth={1} strokeDasharray="4 4" dot={false} name="목표(120분)" />
              </LineChart>
            </ResponsiveContainer>
          </div>
        </div>

        {/* 알림 목록 */}
        <div className="card-base" style={{padding:'16px 18px'}}>
          <h3 style={{fontSize:13, fontWeight:600, color:'#94A3B8', marginBottom:12, display:'flex', alignItems:'center', gap:6}}>
            <i className="ti ti-bell" style={{fontSize:14, color:'#D97706'}}></i>실시간 알림
          </h3>
          <div style={{display:'flex', flexDirection:'column', gap:8}}>
            {ALERTS.map(a => (
              <div key={a.id} style={{background:'#0F172A', borderRadius:4, padding:'9px 12px', borderLeft:`3px solid ${a.level === 'alert' ? '#EF4444' : a.level === 'warn' ? '#F59E0B' : '#0E7490'}`}}>
                <div style={{fontSize:12, color:'#94A3B8', marginBottom:3}}>{a.time}</div>
                <div style={{fontSize:12, color:'#CBD5E1', lineHeight:1.5}}>{a.msg}</div>
              </div>
            ))}
          </div>
        </div>
      </div>

      {/* 시간대별 바 차트 */}
      <div className="card-base" style={{padding:'16px 18px'}}>
        <h3 style={{fontSize:13, fontWeight:600, color:'#94A3B8', marginBottom:12, display:'flex', alignItems:'center', gap:6}}>
          <i className="ti ti-chart-bar" style={{fontSize:14, color:'#D97706'}}></i>시간대별 접수·완료 현황 (오늘)
        </h3>
        <div style={{height:130}}>
          <ResponsiveContainer width="100%" height="100%">
            <BarChart data={HOUR_DATA}>
              <CartesianGrid strokeDasharray="3 3" stroke="#1E293B" />
              <XAxis dataKey="hour" tick={{fontSize:10, fill:'#475569'}} />
              <YAxis tick={{fontSize:10, fill:'#475569'}} />
              <Tooltip contentStyle={{background:'#1E293B', border:'1px solid #334155', borderRadius:4, fontSize:12}} />
              <Bar dataKey="received" fill="#0E7490" name="접수" radius={[2,2,0,0]} />
              <Bar dataKey="completed" fill="#D97706" name="완료" radius={[2,2,0,0]} />
            </BarChart>
          </ResponsiveContainer>
        </div>
      </div>
    </div>
  );
}

// ── TAT 분석 ──────────────────────────────────────────────────────
function TatAnalyticsScreen({ onToast }) {
  const [period, setPeriod] = useState('week');
  const [selected, setSelected] = useState(null);

  return (
    <div className="page-enter" style={{padding:'24px 28px'}}>
      <div style={{display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:18}}>
        <div>
          <h2 style={{fontSize:20, fontWeight:700, color:'#F1F5F9'}}>TAT 분석 및 성과 리포트</h2>
          <p style={{fontSize:13, color:'#64748B', marginTop:3}}>판독자별·기간별 TAT 통계와 지연 케이스 분석</p>
        </div>
        <div style={{display:'flex', gap:6}}>
          {[['day','일별'], ['week','주별'], ['month','월별']].map(([val, label]) => (
            <button key={val} onClick={() => setPeriod(val)}
              style={{
                padding:'5px 14px', borderRadius:4, border:'1px solid #334155', cursor:'pointer', fontFamily:'inherit',
                fontSize:12, fontWeight:600, transition:'all 0.15s',
                background: period === val ? '#D97706' : 'transparent',
                color: period === val ? '#0F172A' : '#64748B',
              }}>{label}</button>
          ))}
        </div>
      </div>

      <div style={{display:'grid', gridTemplateColumns:'2fr 1fr', gap:14, marginBottom:14}}>
        {/* TAT 추이 */}
        <div className="card-base" style={{padding:'16px 18px'}}>
          <h3 style={{fontSize:13, fontWeight:600, color:'#94A3B8', marginBottom:10}}>TAT 추이 (목표: 120분)</h3>
          <div style={{height:200}}>
            <ResponsiveContainer width="100%" height="100%">
              <AreaChart data={TAT_TREND}>
                <CartesianGrid strokeDasharray="3 3" stroke="#1E293B" />
                <XAxis dataKey="date" tick={{fontSize:11, fill:'#475569'}} />
                <YAxis tick={{fontSize:11, fill:'#475569'}} domain={[0,140]} />
                <Tooltip contentStyle={{background:'#1E293B', border:'1px solid #334155', borderRadius:4, fontSize:12}} />
                <Area type="monotone" dataKey="avg" stroke="#D97706" fill="rgba(217,119,6,0.15)" strokeWidth={2} name="평균 TAT" />
                <Area type="monotone" dataKey="target" stroke="#475569" fill="none" strokeWidth={1} strokeDasharray="4 4" name="목표" />
              </AreaChart>
            </ResponsiveContainer>
          </div>
        </div>

        {/* 지연 원인 */}
        <div className="card-base" style={{padding:'16px 18px'}}>
          <h3 style={{fontSize:13, fontWeight:600, color:'#94A3B8', marginBottom:10}}>지연 원인 분류</h3>
          <div style={{height:140, marginBottom:10}}>
            <ResponsiveContainer width="100%" height="100%">
              <PieChart>
                <Pie data={DELAY_CAUSES} dataKey="value" cx="50%" cy="50%" innerRadius={35} outerRadius={60} paddingAngle={3}>
                  {DELAY_CAUSES.map((d, i) => <Cell key={i} fill={d.color} />)}
                </Pie>
                <Tooltip contentStyle={{background:'#1E293B', border:'1px solid #334155', borderRadius:4, fontSize:12}} />
              </PieChart>
            </ResponsiveContainer>
          </div>
          {DELAY_CAUSES.map((d, i) => (
            <div key={i} style={{display:'flex', alignItems:'center', gap:6, marginBottom:5}}>
              <div style={{width:8, height:8, borderRadius:'50%', background:d.color, flexShrink:0}}></div>
              <span style={{fontSize:11, color:'#94A3B8', flex:1}}>{d.name}</span>
              <span style={{fontSize:11, fontWeight:700, color:'#F1F5F9'}}>{d.value}건</span>
            </div>
          ))}
        </div>
      </div>

      {/* 판독자별 성과 테이블 */}
      <div className="card-base" style={{overflow:'hidden'}}>
        <div style={{padding:'14px 18px', borderBottom:'1px solid #334155'}}>
          <h3 style={{fontSize:13, fontWeight:600, color:'#94A3B8'}}>판독자별 성과 지표</h3>
        </div>
        <table style={{width:'100%', borderCollapse:'collapse'}}>
          <thead>
            <tr style={{background:'#0F172A'}}>
              {['판독의', '전문 분야', '처리 건수', '평균 TAT', '상태', '상세'].map((h, i) => (
                <th key={i} style={{padding:'9px 16px', textAlign:'left', fontSize:11, fontWeight:600, color:'#475569'}}>{h}</th>
              ))}
            </tr>
          </thead>
          <tbody>
            {READER_STATS.map((r, i) => (
              <tr key={i} className="table-row-dark" style={{borderBottom:'1px solid #1E293B'}}
                onClick={() => { setSelected(r); onToast(`${r.name} 상세 이력 조회 완료`); }}>
                <td style={{padding:'11px 16px'}}>
                  <div style={{display:'flex', alignItems:'center', gap:8}}>
                    <div style={{width:28, height:28, borderRadius:'50%', background:'rgba(217,119,6,0.2)', display:'flex', alignItems:'center', justifyContent:'center', fontSize:11, fontWeight:700, color:'#D97706', flexShrink:0}}>
                      {r.name[0]}
                    </div>
                    <span style={{fontSize:13, fontWeight:500, color:'#F1F5F9'}}>{r.name}</span>
                  </div>
                </td>
                <td style={{padding:'11px 16px', fontSize:12, color:'#94A3B8'}}>{r.specialty}</td>
                <td style={{padding:'11px 16px', fontSize:14, fontWeight:700, color:'#F1F5F9'}}>{r.cases}</td>
                <td style={{padding:'11px 16px'}}>
                  {r.avgTat > 0 ? (
                    <span style={{fontSize:13, fontWeight:600, color: r.avgTat > 90 ? '#FCA5A5' : '#4ADE80'}}>{r.avgTat}분</span>
                  ) : <span style={{color:'#475569'}}>-</span>}
                </td>
                <td style={{padding:'11px 16px'}}>
                  <span className={`badge-sm ${r.status === 'active' ? 'b-ok' : 'b-info'}`}>
                    {r.status === 'active' ? '활성' : '비활성'}
                  </span>
                </td>
                <td style={{padding:'11px 16px'}}>
                  <button className="btn-outline" style={{fontSize:11, padding:'3px 10px'}}>이력 조회</button>
                </td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>
    </div>
  );
}

// ── 사용자 관리 ──────────────────────────────────────────────────
function UserManagementScreen({ onToast }) {
  const [users, setUsers] = useState(USERS);
  const [search, setSearch] = useState('');
  const [addModal, setAddModal] = useState(false);
  const [deactivateModal, setDeactivateModal] = useState(null);
  const [form, setForm] = useState({ name:'', clinic:'', role:'referrer' });

  const filtered = users.filter(u => u.name.includes(search) || u.clinic.includes(search));

  function handleDeactivate(u) {
    setUsers(prev => prev.map(usr => usr.id === u.id ? {...usr, status: usr.status === 'active' ? 'inactive' : 'active'} : usr));
    setDeactivateModal(null);
    onToast(`${u.name} 계정이 ${u.status === 'active' ? '비활성화' : '활성화'}되었습니다`);
  }

  function handleAdd() {
    setUsers(prev => [...prev, {
      id: `USR-00${prev.length+1}`, name: form.name, clinic: form.clinic,
      cases: 0, lastActive: '방금', status: 'active',
    }]);
    setAddModal(false);
    setForm({ name:'', clinic:'', role:'referrer' });
    onToast('신규 사용자 등록 완료');
  }

  return (
    <div className="page-enter" style={{padding:'24px 28px'}}>
      <div style={{display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:16}}>
        <div>
          <h2 style={{fontSize:20, fontWeight:700, color:'#F1F5F9'}}>사용자 및 판독자 관리</h2>
          <p style={{fontSize:13, color:'#64748B', marginTop:3}}>의뢰자 계정 및 판독자 Pool 관리</p>
        </div>
        <button className="btn-amber" onClick={() => setAddModal(true)}>
          <i className="ti ti-user-plus" style={{marginRight:6, fontSize:14}}></i>사용자 추가
        </button>
      </div>

      {/* 검색 */}
      <div style={{position:'relative', marginBottom:14, maxWidth:340}}>
        <i className="ti ti-search" style={{position:'absolute', left:10, top:'50%', transform:'translateY(-50%)', fontSize:14, color:'#475569'}}></i>
        <input className="input-dark" placeholder="이름 또는 병원명 검색..." value={search}
          onChange={e => setSearch(e.target.value)}
          style={{paddingLeft:32, width:'100%'}} />
      </div>

      {/* 사용자 테이블 */}
      <div className="card-base" style={{overflow:'hidden'}}>
        <table style={{width:'100%', borderCollapse:'collapse'}}>
          <thead>
            <tr style={{background:'#0F172A'}}>
              {['사용자', '소속 병원', '총 의뢰 건수', '최근 활동', '상태', '액션'].map((h, i) => (
                <th key={i} style={{padding:'9px 16px', textAlign:'left', fontSize:11, fontWeight:600, color:'#475569'}}>{h}</th>
              ))}
            </tr>
          </thead>
          <tbody>
            {filtered.map((u, i) => (
              <tr key={u.id} className="table-row-dark" style={{borderBottom:'1px solid #0F172A'}}>
                <td style={{padding:'11px 16px'}}>
                  <div style={{display:'flex', alignItems:'center', gap:8}}>
                    <div style={{width:28, height:28, borderRadius:'50%', background:'rgba(14,116,144,0.25)', display:'flex', alignItems:'center', justifyContent:'center', fontSize:11, fontWeight:700, color:'#67E8F9', flexShrink:0}}>
                      {u.name[0]}
                    </div>
                    <span style={{fontSize:13, fontWeight:500, color:'#F1F5F9'}}>{u.name}</span>
                  </div>
                </td>
                <td style={{padding:'11px 16px', fontSize:13, color:'#94A3B8'}}>{u.clinic}</td>
                <td style={{padding:'11px 16px', fontSize:14, fontWeight:700, color:'#F1F5F9'}}>{u.cases}</td>
                <td style={{padding:'11px 16px', fontSize:12, color:'#64748B'}}>{u.lastActive}</td>
                <td style={{padding:'11px 16px'}}>
                  <span className={`badge-sm ${u.status === 'active' ? 'b-ok' : 'b-info'}`}>
                    {u.status === 'active' ? '활성' : '비활성'}
                  </span>
                </td>
                <td style={{padding:'11px 16px'}}>
                  <button className="btn-outline" style={{fontSize:11, padding:'3px 10px'}}
                    onClick={() => setDeactivateModal(u)}>
                    {u.status === 'active' ? '비활성화' : '활성화'}
                  </button>
                </td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>

      {/* 사용자 추가 모달 */}
      {addModal && (
        <div className="overlay" onClick={() => setAddModal(false)}>
          <div className="modal-dark" style={{padding:24}} onClick={e => e.stopPropagation()}>
            <div style={{display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:18}}>
              <h3 style={{fontSize:16, fontWeight:700, color:'#F1F5F9'}}>신규 사용자 등록</h3>
              <button className="btn-icon" onClick={() => setAddModal(false)}><i className="ti ti-x" style={{fontSize:18}}></i></button>
            </div>
            <div style={{display:'flex', flexDirection:'column', gap:12}}>
              {[['이름', 'name', '예: 박서연 수의사'], ['소속 병원', 'clinic', '예: 판교동물병원']].map(([l, k, p]) => (
                <div key={k}>
                  <label style={{fontSize:12, fontWeight:600, color:'#64748B', display:'block', marginBottom:4}}>{l}</label>
                  <input className="input-dark" placeholder={p} value={form[k]}
                    onChange={e => setForm(f => ({...f, [k]: e.target.value}))} style={{width:'100%'}} />
                </div>
              ))}
              <div>
                <label style={{fontSize:12, fontWeight:600, color:'#64748B', display:'block', marginBottom:4}}>역할</label>
                <select className="input-dark" value={form.role} onChange={e => setForm(f => ({...f, role: e.target.value}))} style={{width:'100%'}}>
                  <option value="referrer">의뢰자 (수의사)</option>
                  <option value="radiologist">판독의</option>
                  <option value="admin">관리자</option>
                </select>
              </div>
            </div>
            <div style={{display:'flex', gap:8, justifyContent:'flex-end', marginTop:20}}>
              <button className="btn-outline" onClick={() => setAddModal(false)}>취소</button>
              <button className="btn-amber" onClick={handleAdd}>등록 완료</button>
            </div>
          </div>
        </div>
      )}

      {/* 비활성화 확인 모달 */}
      {deactivateModal && (
        <div className="overlay" onClick={() => setDeactivateModal(null)}>
          <div className="modal-dark" style={{padding:24, width:380}} onClick={e => e.stopPropagation()}>
            <h3 style={{fontSize:16, fontWeight:700, color:'#F1F5F9', marginBottom:10}}>
              {deactivateModal.status === 'active' ? '계정 비활성화' : '계정 활성화'}
            </h3>
            {deactivateModal.status === 'active' && (
              <div style={{background:'rgba(239,68,68,0.1)', border:'1px solid rgba(239,68,68,0.3)', borderRadius:4, padding:'10px 12px', marginBottom:12}}>
                <p style={{fontSize:12, color:'#FCA5A5', lineHeight:1.6}}>
                  <i className="ti ti-alert-triangle" style={{marginRight:4}}></i>
                  진행 중인 케이스가 있을 경우 비활성화 전 재배정이 필요합니다.
                </p>
              </div>
            )}
            <p style={{fontSize:14, color:'#94A3B8', lineHeight:1.6}}>
              {deactivateModal.name}({deactivateModal.clinic}) 계정을
              {deactivateModal.status === 'active' ? ' 비활성화' : ' 활성화'}하시겠습니까?
            </p>
            <div style={{display:'flex', gap:8, justifyContent:'flex-end', marginTop:18}}>
              <button className="btn-outline" onClick={() => setDeactivateModal(null)}>취소</button>
              <button className="btn-amber" onClick={() => handleDeactivate(deactivateModal)}>확인</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// ── 시스템 모니터링 ──────────────────────────────────────────────
function SystemMonitorScreen() {
  const m = SYS_METRICS;

  function MetricCard({ title, icon, children, alerting }) {
    return (
      <div className="card-base" style={{padding:'16px 18px', borderColor: alerting ? 'rgba(239,68,68,0.5)' : '#334155', animation: alerting ? 'alertPulse 2s ease infinite' : 'none'}}>
        <h3 style={{fontSize:13, fontWeight:600, color:'#94A3B8', marginBottom:12, display:'flex', alignItems:'center', gap:6}}>
          <i className={`ti ${icon}`} style={{fontSize:14, color: alerting ? '#FCA5A5' : '#D97706'}}></i>
          {title}
          {alerting && <span className="badge-sm b-alert" style={{marginLeft:6}}>임계값 초과</span>}
        </h3>
        {children}
      </div>
    );
  }

  function GaugeBar({ pct, threshold, label }) {
    const over = pct >= threshold;
    return (
      <div style={{marginBottom:12}}>
        <div style={{display:'flex', justifyContent:'space-between', fontSize:12, color:'#64748B', marginBottom:4}}>
          <span>{label}</span><span style={{color: over ? '#FCA5A5' : '#94A3B8', fontWeight:700}}>{pct}%</span>
        </div>
        <div style={{background:'#0F172A', borderRadius:3, height:8, overflow:'hidden'}}>
          <div style={{
            height:'100%', borderRadius:3, transition:'width 0.8s ease',
            width: pct+'%', background: over ? '#EF4444' : pct > threshold * 0.8 ? '#F59E0B' : '#D97706',
          }} />
        </div>
        {over && <div style={{fontSize:11, color:'#FCA5A5', marginTop:3}}>임계값({threshold}%) 초과 — 모니터링 강화 필요</div>}
      </div>
    );
  }

  return (
    <div className="page-enter" style={{padding:'24px 28px'}}>
      <div style={{marginBottom:18}}>
        <h2 style={{fontSize:20, fontWeight:700, color:'#F1F5F9'}}>시스템 모니터링</h2>
        <p style={{fontSize:13, color:'#64748B', marginTop:3}}>S3·Redis·DB·API 핵심 지표 실시간 현황</p>
      </div>

      <div style={{display:'grid', gridTemplateColumns:'1fr 1fr 1fr', gap:14, marginBottom:14}}>
        <MetricCard title="AWS S3 스토리지" icon="ti-cloud" alerting={m.s3.pct >= m.s3.threshold}>
          <GaugeBar pct={m.s3.pct} threshold={m.s3.threshold} label={`${m.s3.used}GB / ${m.s3.total}GB`} />
          {[['버킷', 'vet-imaging-prod'], ['리전', 'ap-northeast-2'], ['오브젝트 수', '12,481개']].map(([k, v]) => (
            <div key={k} className="metric-row">
              <span style={{fontSize:12, color:'#475569'}}>{k}</span>
              <span style={{fontSize:12, color:'#94A3B8'}}>{v}</span>
            </div>
          ))}
        </MetricCard>

        <MetricCard title="Redis 캐시" icon="ti-database" alerting={false}>
          <GaugeBar pct={m.redis.memory} threshold={m.redis.memThreshold} label="메모리 사용률" />
          {[['캐시 히트율', `${m.redis.hitRate}%`], ['연결 수', '8 / 50'], ['키 수', '3,421개']].map(([k, v]) => (
            <div key={k} className="metric-row">
              <span style={{fontSize:12, color:'#475569'}}>{k}</span>
              <span style={{fontSize:12, fontWeight:600, color: k === '캐시 히트율' ? '#4ADE80' : '#94A3B8'}}>{v}</span>
            </div>
          ))}
        </MetricCard>

        <MetricCard title="PostgreSQL DB" icon="ti-server" alerting={false}>
          <GaugeBar pct={Math.round(m.db.conns/m.db.maxConns*100)} threshold={80} label={`연결 ${m.db.conns}/${m.db.maxConns}`} />
          {[['평균 쿼리', `${m.db.avgQuery}ms`], ['느린 쿼리', '0건'], ['DB 크기', '4.2GB']].map(([k, v]) => (
            <div key={k} className="metric-row">
              <span style={{fontSize:12, color:'#475569'}}>{k}</span>
              <span style={{fontSize:12, color:'#94A3B8'}}>{v}</span>
            </div>
          ))}
        </MetricCard>
      </div>

      {/* API 응답 시간 */}
      <div className="card-base" style={{padding:'16px 18px'}}>
        <h3 style={{fontSize:13, fontWeight:600, color:'#94A3B8', marginBottom:12, display:'flex', alignItems:'center', gap:6}}>
          <i className="ti ti-api" style={{fontSize:14, color:'#D97706'}}></i>API 엔드포인트 응답 시간 (ms)
        </h3>
        <table style={{width:'100%', borderCollapse:'collapse'}}>
          <thead>
            <tr>
              {['엔드포인트', '평균', 'P95', '상태'].map(h => (
                <th key={h} style={{padding:'8px 12px', textAlign:'left', fontSize:11, fontWeight:600, color:'#475569', borderBottom:'1px solid #1E293B'}}>{h}</th>
              ))}
            </tr>
          </thead>
          <tbody>
            {m.api.map((a, i) => {
              const over = a.avg > 500;
              return (
                <tr key={i} className="table-row-dark" style={{borderBottom:'1px solid #0F172A'}}>
                  <td style={{padding:'9px 12px', fontSize:12, fontFamily:'monospace', color:'#67E8F9'}}>{a.endpoint}</td>
                  <td style={{padding:'9px 12px', fontSize:12, fontWeight:600, color: over ? '#FCA5A5' : '#4ADE80'}}>{a.avg}ms</td>
                  <td style={{padding:'9px 12px', fontSize:12, color:'#94A3B8'}}>{a.p95}ms</td>
                  <td style={{padding:'9px 12px'}}>
                    <span className={`badge-sm ${over ? 'b-alert' : 'b-ok'}`}>{over ? '지연' : '정상'}</span>
                  </td>
                </tr>
              );
            })}
          </tbody>
        </table>
      </div>
    </div>
  );
}

// ── 메인 앱 ──────────────────────────────────────────────────────

            </div>
            <span style={{fontSize:14, fontWeight:700, color:'#F1F5F9'}}>VetImaging <span style={{color:'#475569', fontWeight:400}}>관제</span></span>
          </div>
          <nav style={{display:'flex', gap:2, flex:1}}>
            {NAV.map(n => (
              <button key={n.id} onClick={() => setPage(n.id)}
                style={{
                  padding:'6px 14px', borderRadius:3, border:'none', cursor:'pointer', fontFamily:'inherit',
                  fontSize:12, fontWeight:600, display:'flex', alignItems:'center', gap:5,
                  transition:'all 0.15s',
                  background: page === n.id ? 'rgba(217,119,6,0.15)' : 'transparent',
                  color: page === n.id ? '#D97706' : '#64748B',

            <button style={{background:'none', border:'none', cursor:'pointer', color:'#64748B', position:'relative'}}>
              <i className="ti ti-bell" style={{fontSize:18}}></i>
              <span style={{position:'absolute', top:-1, right:-1, width:7, height:7, background:'#EF4444', borderRadius:'50%', display:'block'}}></span>
            </button>
            <div style={{width:28, height:28, background:'rgba(217,119,6,0.2)', borderRadius:'50%', display:'flex', alignItems:'center', justifyContent:'center', fontSize:11, fontWeight:700, color:'#D97706'}}>
              관

          </div>

      </header>

      {/* 메인 콘텐츠 */}
      <main style={{flex:1, width:'100%'}}>
        <div style={{maxWidth:1280, margin:'0 auto'}}>
          {page === 'dashboard' && <MainDashboard />}
          {page === 'tat'       && <TatAnalyticsScreen onToast={msg => setToast(msg)} />}

      {/* 푸터 */}
      <footer style={{borderTop:'1px solid #1E293B', padding:'14px 28px', background:'#0F172A'}}>
        <div style={{maxWidth:1280, margin:'0 auto', display:'flex', justifyContent:'space-between', alignItems:'center'}}>
          <span style={{fontSize:11, color:'#334155'}}>VetImaging 운영 관제 시스템 — 동물 의료영상 판독 플랫폼</span>
          <div style={{display:'flex', gap:16, fontSize:11, color:'#334155'}}>

            <span>PostgreSQL + Redis</span>

      </footer>

      {toast && <Toast msg={toast} onDone={() => setToast(null)} />}

  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
