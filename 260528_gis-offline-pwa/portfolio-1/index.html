// ---- Icon helper ----
const LucideIcon = ({ name, size = 14, color = 'currentColor' }) => {
  const ref = useRef(null);
  useEffect(() => {
    if (!ref.current || !window.lucide) return;
    ref.current.innerHTML = '';
    const el = document.createElement('i');
    el.setAttribute('data-lucide', name);
    el.style.width = size + 'px';
    el.style.height = size + 'px';
    el.style.color = color;
    el.style.display = 'block';
    ref.current.appendChild(el);
    window.lucide.createIcons({ nodes: [ref.current] });
  }, [name, size, color]);
  return <span ref={ref} style={{display:'inline-flex',alignItems:'center',justifyContent:'center'}} />;
};

// ---- Toast ----

// ---- Sub components ----
const StatusBadge = ({ status }) => {
  const map = { published: ['badge-success','발행됨'], processing: ['badge-warning','처리중'], failed: ['badge-error','실패'], done: ['badge-success','완료'], active: ['badge-info','진행중'], pending: ['badge-warning','승인대기'] };
  const [cls, label] = map[status] || ['badge-neutral', status];
  return <span className={`badge ${cls}`}>{label}</span>;
};
const RoleBadge = ({ role }) => {
  const map = { superadmin: ['badge-superadmin','최고관리자'], manager: ['badge-manager','담당자'], field: ['badge-field','현장조사원'] };
  const [cls, label] = map[role] || ['badge-neutral', role];
  return <span className={`badge ${cls}`}>{label}</span>;
};
const StepIndicator = ({ step, status }) => {
  const steps = ['업로드','변환','적재','발행'];
  return (
    <div style={{display:'flex',alignItems:'center',gap:0}}>
      {steps.map((s,i) => {
        let cls = '';
        if (status === 'done') cls = 'done';
        else if (status === 'failed' && i+1 === step) cls = 'fail';
        else if (status === 'active' && i+1 === step) cls = 'active';
        else if (i+1 < step) cls = 'done';
        return (
          <React.Fragment key={i}>
            <div className={`pipeline-step ${cls}`}>
              {cls === 'done' && <LucideIcon name="check" size={10} />}
              {cls === 'active' && <LucideIcon name="loader" size={10} />}
              {cls === 'fail' && <LucideIcon name="x" size={10} />}
              <span>{s}</span>
            </div>
            {i < 3 && <div style={{width:12,height:1,background:'#D0DCF0'}}/>}
          </React.Fragment>
        );
      })}
    </div>
  );
};

                      <LucideIcon name="chevrons-down" size={11} /> 이전 이력 더 보기
                    </button>
                  </>
                )}
              </div>
            </div>
          ) : (
            <div className="panel-card">
              <div className="empty-state">
                <LucideIcon name="mouse-pointer" size={28} color="#B0C4DE" />
                <div className="empty-state-title">피처를 선택하세요</div>
                <div className="empty-state-desc">좌측 지도 또는 피처 목록에서<br/>항목을 클릭하면 속성 정보와 이력이 표시됩니다</div>
              </div>
            </div>
          )}
        </div>
      </div>
    </div>
  );
};

        <button className="btn-sm btn-primary" onClick={onAddUser}><LucideIcon name="user-plus" size={11} color="#fff"/> 사용자 추가</button>

        <div className="panel-card">
          <div className="panel-header">
            <div className="section-title">사용자 목록</div>

            <thead><tr><th>이름</th><th>부서</th><th>권한</th><th>기기</th><th>최근 접속</th><th>상태</th></tr></thead>
            <tbody>
              {USERS.map(u => (
                <tr key={u.id} onClick={()=>setSelectedUser(u)} style={{background: selectedUser?.id === u.id ? '#EEF3FA' : ''}}>

        </div>
        <div>

              <div className="panel-header">
                <div style={{display:'flex',alignItems:'center',gap:10}}>
                  <div className="user-avatar" style={{width:34,height:34,fontSize:13}}>{selectedUser.name[0]}</div>
                  <div>
                    <div style={{fontWeight:700,fontSize:13}}>{selectedUser.name}</div>
                    <div style={{fontSize:10.5,color:'#4A6080'}}>{selectedUser.dept}</div>
                  </div>
                </div>
                <RoleBadge role={selectedUser.role} />
              </div>
              <div className="panel-body">
                <div className="divider" />
                <div style={{marginBottom:14}}>
                  <div style={{fontSize:10.5,fontWeight:700,color:'#4A6080',marginBottom:8,textTransform:'uppercase',letterSpacing:'0.08em'}}>계정 정보</div>
                  {[
                    ['사용자 ID', selectedUser.id],
                    ['소속 부서', selectedUser.dept],
                    ['권한 레벨', selectedUser.role === 'superadmin' ? '1단계 (최고관리자)' : selectedUser.role === 'manager' ? '2단계 (담당자)' : '3단계 (현장조사원)'],
                    ['최근 접속', selectedUser.lastLogin],
                  ].map(([k,v]) => (
                    <div key={k} className="stat-row"><span className="stat-label">{k}</span><span className="stat-value">{v}</span></div>
                  ))}
                </div>
                <div>
                  <div style={{fontSize:10.5,fontWeight:700,color:'#4A6080',marginBottom:8,textTransform:'uppercase',letterSpacing:'0.08em'}}>등록 디바이스 ({selectedUser.devices}대)</div>
                  {selectedUser.devices > 0 ? (
                    <div style={{display:'flex',flexWrap:'wrap',gap:4}}>
                      {Array.from({length:selectedUser.devices}).map((_,i) => (
                        <div key={i} className={`device-chip ${i===0?'verified':'pending'}`}>
                          <LucideIcon name="smartphone" size={9} />

                      ))}

                    <div style={{fontSize:11,color:'#8A9CC0'}}>등록된 디바이스가 없습니다</div>

                <div style={{display:'flex',gap:8}}>

                  <button className="btn-sm btn-outline" style={{marginLeft:8}} onClick={()=>showToast('비밀번호 초기화 메일이 발송됩니다')}>비밀번호 초기화</button>
                  {selectedUser.status === 'pending' && (
                    <button className="btn-sm btn-primary" style={{marginLeft:8}} onClick={()=>showToast('계정이 활성화되었습니다')}>계정 활성화</button>
                  )}
                </div>
              </div>
            </div>
          ) : (
            <div className="panel-card">
              <div className="empty-state">
                <LucideIcon name="user" size={28} color="#B0C4DE" />
                <div className="empty-state-title">사용자를 선택하세요</div>
                <div className="empty-state-desc">좌측 목록에서 사용자를 클릭하면<br/>계정 정보와 디바이스 현황이 표시됩니다</div>
              </div>
            </div>
          )}
          <div className="panel-card" style={{marginTop:14}}>
            <div className="panel-header"><div className="section-title">권한 계층 구조</div></div>
            <div style={{padding:'14px 18px'}}>
              {[
                { role: 'superadmin', label: '1단계 — 최고 관리자', desc: '모든 레이어·사용자 관리, 시스템 설정, 감사 로그 조회', count: 2 },
                { role: 'manager', label: '2단계 — 담당자', desc: '관할 구역 레이어 편집, 현장 데이터 승인, 파이프라인 실행', count: 8 },
                { role: 'field', label: '3단계 — 현장 조사원', desc: '모바일 PWA 접근, 데이터 수집, 읽기 전용 레이어 조회', count: 14 },
              ].map(r => (
                <div key={r.role} style={{padding:'10px 0',borderBottom:'1px solid #EEF3FA',display:'flex',gap:12,alignItems:'flex-start'}}>
                  <RoleBadge role={r.role} />
                  <div>
                    <div style={{fontSize:11.5,fontWeight:600,color:'#1A2540'}}>{r.label}</div>
                    <div style={{fontSize:10.5,color:'#4A6080',marginTop:2}}>{r.desc}</div>
                  </div>
                  <div style={{marginLeft:'auto',fontSize:11,color:'#8A9CC0',flexShrink:0}}>{r.count}명</div>
                </div>
              ))}
            </div>
          </div>
        </div>
      </div>
    </div>
  );
};

// ---- Modals ----
const LayerDetailModal = ({ layer, onClose }) => (
  <div className="modal-overlay" onClick={e=>{if(e.target===e.currentTarget)onClose();}}>
    <div className="modal-box">
      <div className="modal-header">
        <div className="modal-title">{layer.name}</div>
        <button className="modal-close" onClick={onClose}><LucideIcon name="x" size={13} /></button>
      </div>
      <div className="modal-body">
        <div style={{marginBottom:16,display:'flex',gap:8}}>
          <span className="tag">{layer.type}</span>
          <span className="tag" style={{fontFamily:'monospace'}}>{layer.source}</span>
          <StatusBadge status={layer.status} />
        </div>
        {[['레이어 ID',layer.id],['피처 수',layer.featureCount.toLocaleString()+'개'],['마지막 갱신',layer.updated]].map(([k,v])=>(
          <div key={k} className="stat-row"><span className="stat-label">{k}</span><span className="stat-value">{v}</span></div>
        ))}
        <div className="divider"/>
        <div style={{fontSize:10.5,fontWeight:700,color:'#4A6080',marginBottom:8,textTransform:'uppercase',letterSpacing:'0.08em'}}>GeoServer 발행 정보</div>
        {[['워크스페이스','gis_internal'],['데이터스토어','postgis_main'],['WMS URL','/geoserver/wms'],['WFS URL','/geoserver/wfs']].map(([k,v])=>(
          <div key={k} className="stat-row"><span className="stat-label">{k}</span><span className="stat-value" style={{fontFamily:'monospace',fontSize:11}}>{v}</span></div>
        ))}
      </div>
      <div className="modal-footer">
        <button className="btn-sm btn-outline" onClick={onClose}>닫기</button>
        <button className="btn-sm btn-primary" onClick={()=>{showToast('레이어 재발행 요청이 접수되었습니다');onClose();}}>재발행 요청</button>
      </div>
    </div>
  </div>
);

const JobDetailModal = ({ job, onClose }) => (
  <div className="modal-overlay" onClick={e=>{if(e.target===e.currentTarget)onClose();}}>
    <div className="modal-box">
      <div className="modal-header">
        <div className="modal-title">파이프라인 작업 상세</div>
        <button className="modal-close" onClick={onClose}><LucideIcon name="x" size={13} /></button>
      </div>
      <div className="modal-body">
        <div style={{marginBottom:14,display:'flex',gap:8,alignItems:'center'}}>
          <span style={{fontFamily:'monospace',fontSize:11,background:'#F0F4FA',padding:'2px 6px',borderRadius:2,border:'1px solid #D0DCF0'}}>{job.id}</span>
          <StatusBadge status={job.status} />
        </div>
        {[['파일명',job.file],['크기',job.size],['시작 시각',job.started],['소요 시간',job.dur]].map(([k,v])=>(
          <div key={k} className="stat-row"><span className="stat-label">{k}</span><span className="stat-value">{v}</span></div>
        ))}
        <div className="divider"/>
        <div style={{marginBottom:10,fontSize:10.5,fontWeight:700,color:'#4A6080',textTransform:'uppercase',letterSpacing:'0.08em'}}>파이프라인 단계</div>
        <StepIndicator step={job.step} status={job.status} />
        {job.status==='failed' && (
          <div style={{marginTop:12,padding:'10px 14px',background:'#FFEBEE',borderRadius:2,border:'1px solid #FFCDD2',fontSize:11,color:'#C62828'}}>
            <strong>오류:</strong> 입력 파일의 좌표계를 자동으로 감지하지 못했습니다. 파일의 .prj 파일을 확인하거나, 업로드 시 좌표계를 직접 지정해 주세요.
          </div>
        )}
      </div>
      <div className="modal-footer">
        <button className="btn-sm btn-outline" onClick={onClose}>닫기</button>
        {job.status==='failed' && <button className="btn-sm btn-primary" onClick={()=>{showToast('파이프라인 재시도가 시작되었습니다');onClose();}}>재시도</button>}
      </div>
    </div>
  </div>
);

const AddUserModal = ({ onClose }) => {
  const [form, setForm] = useState({ name:'', dept:'', role:'field', email:'' });
  const submit = () => {
    if (!form.name || !form.dept) { showToast('이름과 부서를 입력해 주세요'); return; }
    showToast(`${form.name} 사용자가 등록되었습니다`); onClose();
  };
  return (
    <div className="modal-overlay" onClick={e=>{if(e.target===e.currentTarget)onClose();}}>
      <div className="modal-box">
        <div className="modal-header">
          <div className="modal-title">사용자 추가</div>
          <button className="modal-close" onClick={onClose}><LucideIcon name="x" size={13} /></button>
        </div>
        <div className="modal-body">
          <div className="form-row"><div className="label">이름 *</div><input className="input-field" placeholder="홍길동" value={form.name} onChange={e=>setForm({...form,name:e.target.value})} /></div>
          <div className="form-row"><div className="label">소속 부서 *</div><input className="input-field" placeholder="도로관리과" value={form.dept} onChange={e=>setForm({...form,dept:e.target.value})} /></div>
          <div className="form-row">
            <div className="label">권한 레벨 *</div>
            <select className="input-field" value={form.role} onChange={e=>setForm({...form,role:e.target.value})}>
              <option value="field">3단계 — 현장 조사원</option>
              <option value="manager">2단계 — 담당자</option>
              <option value="superadmin">1단계 — 최고 관리자</option>
            </select>
          </div>
          <div className="form-row"><div className="label">이메일 (선택)</div><input className="input-field" type="email" placeholder="user@agency.go.kr" value={form.email} onChange={e=>setForm({...form,email:e.target.value})} /></div>
          <div style={{padding:'10px 14px',background:'#E3F2FD',borderRadius:2,border:'1px solid #90CAF9',fontSize:11,color:'#0D47A1'}}>
            사용자 추가 후 해당 기기에서 처음 로그인 시 디바이스 바인딩 승인이 필요합니다.
          </div>
        </div>
        <div className="modal-footer">
          <button className="btn-sm btn-outline" onClick={onClose}>취소</button>
          <button className="btn-sm btn-primary" onClick={submit}>사용자 추가</button>
        </div>
      </div>
    </div>
  );
};

// ---- App ----
const SCREENS = [
  { id: 'main', label: '대시보드', icon: 'layout-dashboard' },
  { id: 'pipeline', label: '파이프라인 관리', icon: 'git-branch' },
  { id: 'feature-edit', label: '피처 편집', icon: 'map-pin' },
  { id: 'user-mgmt', label: '사용자 관리', icon: 'users' },
];
const BOTTOM_SCREENS = [
  { id: 'settings', label: '시스템 설정', icon: 'settings' },
  { id: 'audit', label: '감사 로그', icon: 'scroll-text' },
];

function App() {
  const [screen, setScreen] = useState('main');
  const [modal, setModal] = useState(null);
  const [layerData, setLayerData] = useState(null);
  const [jobData, setJobData] = useState(null);

  const current = SCREENS.find(s=>s.id===screen) || {label:'대시보드'};

  const openLayerModal = (l) => { setLayerData(l); setModal('layer'); };
  const openJobModal = (j) => { setJobData(j); setModal('job'); };
  const openAddUser = () => setModal('adduser');
  const closeModal = () => { setModal(null); setLayerData(null); setJobData(null); };

  return (
    <div style={{display:'flex',width:'100%',minHeight:'100vh'}}>
      <aside className="sidebar">
        <div className="sidebar-logo">
          <div className="logo-badge">내부망 GIS</div>
          <div className="logo-title">GIS 통합 관리 플랫폼</div>
          <div className="logo-sub">망분리 환경 · PostGIS · GeoServer</div>
        </div>
        <nav className="sidebar-nav">
          <div className="nav-section-label">메인 메뉴</div>
          {SCREENS.map(s => (
            <div key={s.id} className={`nav-item ${screen===s.id?'active':''}`} onClick={()=>setScreen(s.id)}>
              <span className="nav-icon"><LucideIcon name={s.icon} size={14} color={screen===s.id?'#1B4B82':'#4A6080'}/></span>
              {s.label}
            </div>
          ))}
          <div className="nav-section-label" style={{marginTop:12}}>시스템</div>
          {BOTTOM_SCREENS.map(s => (
            <div key={s.id} className="nav-item" onClick={()=>showToast(`${s.label} 화면으로 이동합니다`)}>
              <span className="nav-icon"><LucideIcon name={s.icon} size={14} color="#4A6080"/></span>
              {s.label}
            </div>
          ))}
        </nav>
        <div className="sidebar-bottom">
          <div className="user-info">
            <div className="user-avatar">박</div>
            <div>
              <div className="user-name">박인호 관리자</div>
              <div className="user-role">도로관리과</div>
              <div className="net-badge">내부망</div>
            </div>
          </div>
        </div>
      </aside>

      <main className="main-wrap">
        <div className="topbar">
          <div className="breadcrumb">
            <span>GIS 관리 플랫폼</span>
            <span style={{color:'#C8D8F0'}}>·</span>
            <span className="breadcrumb-current">{current.label}</span>
          </div>
          <div className="topbar-actions">
            <div className="net-indicator">내부망 연결됨</div>
            <div className="icon-btn" onClick={()=>showToast('알림함: 미확인 3건')}><LucideIcon name="bell" size={14} color="#4A6080"/></div>
            <div className="icon-btn" onClick={()=>showToast('도움말 패널이 열립니다')}><LucideIcon name="help-circle" size={14} color="#4A6080"/></div>
          </div>
        </div>
        <div className="content-area">
          {screen === 'main' && <DashboardScreen onLayerClick={openLayerModal} onJobClick={openJobModal} />}
          {screen === 'pipeline' && <PipelineScreen onJobClick={openJobModal} />}
          {screen === 'feature-edit' && <FeatureEditScreen />}
          {screen === 'user-mgmt' && <UserMgmtScreen onAddUser={openAddUser} />}
        </div>
      </main>

      {modal === 'layer' && layerData && <LayerDetailModal layer={layerData} onClose={closeModal} />}
      {modal === 'job' && jobData && <JobDetailModal job={jobData} onClose={closeModal} />}
      {modal === 'adduser' && <AddUserModal onClose={closeModal} />}
      <Toast />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
