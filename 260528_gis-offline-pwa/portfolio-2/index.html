<style>

    to { opacity: 1; transform: translateY(0); }

  @keyframes slideUp {

  .icon-btn-dark {

  /* Glass cards */
  .glass-card {
    background: rgba(22,37,53,0.9); backdrop-filter: blur(8px);

  .glass-card:hover { border-color: rgba(0,201,167,0.3); }

  /* KPI hero cards */
  .hero-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; margin-bottom: 22px; }

  }
  .hero-card:hover { transform: translateY(-2px); }
  .hero-card.teal { background: linear-gradient(135deg, rgba(0,201,167,0.2), rgba(0,201,167,0.08)); border: 1px solid rgba(0,201,167,0.3); }
  .hero-card.blue { background: linear-gradient(135deg, rgba(13,136,200,0.2), rgba(13,136,200,0.08)); border: 1px solid rgba(13,136,200,0.3); }
  .hero-card.orange { background: linear-gradient(135deg, rgba(255,107,53,0.2), rgba(255,107,53,0.08)); border: 1px solid rgba(255,107,53,0.3); }
  .hero-card.purple { background: linear-gradient(135deg, rgba(130,80,230,0.2), rgba(130,80,230,0.08)); border: 1px solid rgba(130,80,230,0.3); }
  .hero-label { font-size: 10px; font-weight: 600; color: #7EAFC0; letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 8px; }
  .hero-value { font-size: 30px; font-weight: 800; line-height: 1; color: #E8F4F0; }
  .hero-sub { font-size: 10px; color: #7EAFC0; margin-top: 6px; }
  .hero-glow {
    position: absolute; right: -20px; top: -20px; width: 80px; height: 80px;
    border-radius: 50%; opacity: 0.15;

  .hero-card.teal .hero-glow { background: #00C9A7; }
  .hero-card.blue .hero-glow { background: #0D88C8; }
  .hero-card.orange .hero-glow { background: #FF6B35; }
  .hero-card.purple .hero-glow { background: #8250E6; }

  /* Card headers */
  .card-header {

  }
  .card-title { font-size: 12.5px; font-weight: 700; color: #E8F4F0; }

  /* Buttons */

  .bd-error { background: rgba(255,107,53,0.15); color: #FF6B35; border-color: rgba(255,107,53,0.3); }
  .bd-info { background: rgba(13,136,200,0.15); color: #5DC8F0; border-color: rgba(13,136,200,0.3); }
  .bd-neutral { background: rgba(255,255,255,0.06); color: #7EAFC0; border-color: rgba(255,255,255,0.1); }
  .bd-sync { background: rgba(130,80,230,0.15); color: #B890FF; border-color: rgba(130,80,230,0.3); }

    transition: background 0.1s;

  .sync-item:hover { background: rgba(0,201,167,0.05); }
  .sync-status-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }

  /* Progress dark */
  .progress-dark { height: 4px; background: rgba(255,255,255,0.08); border-radius: 4px; overflow: hidden; }
  .progress-fill { height: 100%; border-radius: 4px; animation: progressAnim 1s ease forwards; }
  .pf-teal { background: linear-gradient(90deg, #00C9A7, #1BFFE4); }
  .pf-blue { background: linear-gradient(90deg, #0D88C8, #5DC8F0); }
  .pf-orange { background: #FF6B35; }

  /* Photo upload */
  .photo-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
  .photo-slot {
    aspect-ratio: 1; border-radius: 10px; overflow: hidden;
    background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.12);

    cursor: pointer; transition: border-color 0.12s;

  .photo-slot:hover { border-color: rgba(0,201,167,0.4); }
  .photo-slot.filled { position: relative; }
  .photo-filled-bg {
    width: 100%; height: 100%; display: flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 700; color: rgba(255,255,255,0.7);

  /* GPS pin display */
  .gps-display {
    background: rgba(0,201,167,0.08); border: 1px solid rgba(0,201,167,0.2);
    border-radius: 10px; padding: 10px 14px; margin-top: 8px;

  /* Timeline dark */
  .timeline-dk { list-style: none; }
  .tl-item {
    display: flex; gap: 12px; padding-bottom: 16px; position: relative; cursor: pointer;
  }
  .tl-item:hover .tl-content { background: rgba(255,255,255,0.03); border-radius: 10px; }
  .tl-connector {
    position: absolute; left: 14px; top: 28px; bottom: 0;
    width: 1px; background: rgba(0,201,167,0.15);
  }
  .tl-dot {
    width: 28px; height: 28px; border-radius: 50%; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center; border: 2px solid;
    margin-top: 2px;

  .tl-content { flex: 1; padding: 6px 0; }
  .tl-title { font-size: 12px; font-weight: 600; color: #E8F4F0; }
  .tl-meta { font-size: 10.5px; color: #7EAFC0; margin-top: 3px; }
  .tl-detail { font-size: 11px; color: #B0D0DC; margin-top: 4px; }

  /* Queue monitor cards */
  .queue-cards { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 18px; }
  .queue-card {
    border-radius: 12px; padding: 14px 16px; text-align: center;

  .queue-num { font-size: 26px; font-weight: 800; line-height: 1; }
  .queue-label { font-size: 10px; color: #7EAFC0; margin-top: 4px; }

  /* Toast dark */
  .toast-dk {

  /* Stat rows */
  .stat-row-dk {
    display: flex; align-items: center; justify-content: space-between;

  .stat-label-dk { color: #7EAFC0; }
  .stat-value-dk { font-weight: 600; color: #E8F4F0; }

  /* Map mini */
  .mini-map {

  }
  .map-grid-line {
    position: absolute; background: rgba(0,201,167,0.08);
  }
  .map-pin {
    position: absolute; top: 50%; left: 50%;

  }

  /* Hash verify */
  .hash-chip {
    font-family: monospace; font-size: 10px; padding: 3px 8px;
    border-radius: 6px; background: rgba(255,255,255,0.06);

  .divider-dk { height: 1px; background: rgba(255,255,255,0.06); margin: 14px 0; }

  .two-col-dk { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }

  .category-chip {
    display: inline-flex; align-items: center; gap: 4px;
    padding: 4px 10px; border-radius: 20px; font-size: 10.5px; font-weight: 600;

  .category-chip.selected { background: rgba(0,201,167,0.15); color: #00C9A7; border-color: rgba(0,201,167,0.35); }

  /* Sync log row */
  .log-row {
    padding: 10px 18px; border-bottom: 1px solid rgba(255,255,255,0.05);
    display: flex; align-items: center; gap: 10px; cursor: pointer;
    transition: background 0.1s; font-size: 11.5px;
  }
  .log-row:hover { background: rgba(0,201,167,0.04); }
</style>

  return <i className={classMap[weight] || `ph ph-${icon}`} style={{fontSize:size+'px',color,lineHeight:1}} />;
};

          <button className="btn-teal" onClick={()=>showT('시설물 이력 로드 완료')}><Ph icon="magnifying-glass" size={13} weight="bold" />조회</button>
        </div>
      </div>
      <div className="two-col-dk">

                      <span className="tl-title">{e.title}</span>
                      <span className="badge-dk bd-neutral" style={{fontSize:9}}>{e.type}</span>
                    </div>
                    <div className="tl-meta">{e.by} · {e.date}</div>

          <div className="glass-card" style={{marginBottom:14}}>

            <div style={{padding:'14px 18px'}}>
              {[
                ['시설물 ID', selectedFacility],
                ['유형', '도로시설물'],
                ['관리 구역', 'GW-N-04'],
                ['최근 점검', '2026-05-28'],
                ['이력 건수', filtered.length+'건 (전체 '+HISTORY_EVENTS.length+'건)'],

          <div className="glass-card">
            <div className="card-header"><div className="card-title">출장복명서 생성</div></div>
            <div style={{padding:'14px 18px'}}>
              <div className="form-row">
                <div className="dark-label">보고 기간</div>
                <div style={{display:'flex',gap:8,alignItems:'center'}}>

              <div className="form-row">
                <div className="dark-label">담당자</div>
                <input className="dark-input" defaultValue="이재원" />

              <div className="form-row">

};

const SyncMonitorScreen = ({ onItemClick }) => {

  const completed = QUEUE_ITEMS.filter(q=>q.status==='completed').length;
  const active = QUEUE_ITEMS.filter(q=>q.status==='active').length;
  const failed = QUEUE_ITEMS.filter(q=>q.status==='failed').length;
  const waiting = 0;
  return (
    <div className="page-enter" style={{padding:'24px 28px'}}>
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:18}}>
        <div>
          <div className="card-title" style={{fontSize:15}}>오프라인 큐 동기화 및 망연계 현황 모니터</div>
          <div style={{fontSize:11,color:'#7EAFC0',marginTop:3}}>Redis + Bull Queue 기반 단방향 전송 파이프라인 · SHA-256 무결성 검증</div>
        </div>
        <button className="btn-ghost" onClick={()=>showT('큐 현황이 갱신되었습니다')}><Ph icon="arrows-clockwise" size={13} />새로고침</button>
      </div>
      <div className="queue-cards">
        {[
          { label:'대기', value:waiting, color:'rgba(255,200,0,0.15)', border:'rgba(255,200,0,0.3)', text:'#FFD700' },
          { label:'전송중', value:active, color:'rgba(93,200,240,0.15)', border:'rgba(93,200,240,0.3)', text:'#5DC8F0' },
          { label:'완료', value:completed, color:'rgba(0,201,167,0.15)', border:'rgba(0,201,167,0.3)', text:'#00C9A7' },
          { label:'실패', value:failed, color:'rgba(255,107,53,0.15)', border:'rgba(255,107,53,0.3)', text:'#FF6B35' },
        ].map(c => (
          <div key={c.label} className="queue-card" style={{background:c.color,border:`1px solid ${c.border}`,cursor:'pointer'}} onClick={()=>showT(c.label+' 항목 필터링')}>
            <div className="queue-num" style={{color:c.text}}>{c.value}</div>
            <div className="queue-label">{c.label}</div>
          </div>
        ))}
      </div>
      <div className="glass-card" style={{marginBottom:16}}>
        <div className="card-header">
          <div><div className="card-title">큐 항목 목록</div><div className="card-sub">총 {total}건 · 30초마다 자동 갱신</div></div>
          <div style={{display:'flex',gap:8}}>
            <button className="btn-ghost" onClick={()=>showT('실패 항목 전체 재전송 요청')}>
              <Ph icon="repeat" size={12} />실패 재전송
            </button>
          </div>
        </div>
        <div>
          <div style={{padding:'8px 18px',background:'rgba(255,255,255,0.03)',display:'flex',gap:10,fontSize:10,color:'#7EAFC0',borderBottom:'1px solid rgba(255,255,255,0.06)'}}>
            <span style={{width:90}}>큐 ID</span>
            <span style={{flex:1}}>시설물</span>
            <span style={{width:60}}>크기</span>
            <span style={{width:90}}>SHA-256</span>
            <span style={{width:60}}>무결성</span>
            <span style={{width:60}}>상태</span>
            <span style={{width:55}}>시도</span>
          </div>
          {QUEUE_ITEMS.map(q => (
            <div key={q.id} className="log-row" onClick={()=>onItemClick(q)}>
              <span style={{width:90,fontFamily:'monospace',fontSize:10.5,color:'#7EAFC0'}}>{q.id}</span>
              <div style={{flex:1}}>
                <div style={{fontWeight:600,fontSize:11.5}}>{q.facility}</div>
                <div style={{fontSize:9.5,color:'#7EAFC0'}}>{q.time}</div>
              </div>
              <span style={{width:60,fontSize:10.5,color:'#7EAFC0'}}>{q.size}</span>
              <span className={`hash-chip ${q.verified===true?'verified':q.verified===false?'mismatch':''}`} style={{width:90}}>{q.hash}</span>
              <span style={{width:60}}>
                {q.verified === true ? <span className="badge-dk bd-success">검증됨</span>
                  : q.verified === false ? <span className="badge-dk bd-error">불일치</span>
                  : <span className="badge-dk bd-neutral">대기</span>}
              </span>
              <span style={{width:60}}>
                <span className={`badge-dk ${q.status==='completed'?'bd-success':q.status==='active'?'bd-info':'bd-error'}`}>
                  {q.status==='completed'?'완료':q.status==='active'?'전송중':'실패'}
                </span>
              </span>
              <span style={{width:55,fontSize:10.5,color:'#7EAFC0'}}>{q.tries}회</span>
            </div>
          ))}
        </div>
      </div>
      <div className="glass-card">
        <div className="card-header"><div className="card-title">망연계 아키텍처 개요</div></div>
        <div style={{padding:'16px 20px'}}>
          <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',flexWrap:'wrap',gap:14}}>
            {[
              { label: '외부망 (모바일 PWA)', color: '#00C9A7', icon: 'device-mobile', desc: 'IndexedDB 오프라인 큐\nService Worker 동기화' },
              { label: '→ 망연계 솔루션', color: '#FFD700', icon: 'arrows-left-right', desc: '단방향 전송\nSHA-256 무결성 검증' },
              { label: '내부망 (GIS 플랫폼)', color: '#5DC8F0', icon: 'database', desc: 'Bull Queue 수신\nPostGIS DB 저장' },
            ].map((n, i) => (
              <div key={i} style={{flex:'1 1 180px',background:'rgba(255,255,255,0.04)',border:`1px solid ${n.color}33`,borderRadius:10,padding:'14px 16px',textAlign:'center'}}>
                <Ph icon={n.icon} size={24} color={n.color} weight="duotone" />
                <div style={{fontSize:12,fontWeight:700,color:'#E8F4F0',marginTop:8}}>{n.label}</div>
                <div style={{fontSize:10,color:'#7EAFC0',marginTop:4,whiteSpace:'pre-line'}}>{n.desc}</div>
              </div>
            ))}
          </div>
        </div>
      </div>
    </div>
  );
};

// Modals
const QueueDetailModal = ({ item, onClose }) => {
  return (
    <div className="modal-overlay-dk" onClick={e=>{if(e.target===e.currentTarget)onClose();}}>
      <div className="modal-dk">
        <div className="modal-dk-header">
          <div className="modal-dk-title">큐 항목 상세 — {item.id}</div>
          <div className="modal-dk-close" onClick={onClose}><Ph icon="x" size={13} color="#E8F4F0" /></div>
        </div>
        <div className="modal-dk-body">
          <div style={{display:'flex',gap:8,marginBottom:14}}>
            <span className={`badge-dk ${item.status==='completed'?'bd-success':item.status==='active'?'bd-info':'bd-error'}`}>
              {item.status==='completed'?'완료':item.status==='active'?'전송중':'실패'}
            </span>
            <span className={`badge-dk ${item.verified===true?'bd-success':item.verified===false?'bd-error':'bd-neutral'}`}>
              {item.verified===true?'무결성 검증됨':item.verified===false?'해시 불일치':'검증 대기'}
            </span>
          </div>
          {[
            ['큐 ID', item.id], ['시설물', item.facility], ['데이터 크기', item.size],
            ['전송 시각', item.time], ['시도 횟수', item.tries+'회'],
          ].map(([k,v]) => (
            <div key={k} className="stat-row-dk"><span className="stat-label-dk">{k}</span><span className="stat-value-dk">{v}</span></div>
          ))}
          <div className="divider-dk"/>
          <div style={{marginBottom:8,fontSize:10.5,fontWeight:700,color:'#7EAFC0',textTransform:'uppercase',letterSpacing:'0.08em'}}>SHA-256 무결성 검증</div>
          <div style={{marginBottom:8}}>
            <div className="dark-label">송신 측 해시 (외부망)</div>
            <div className="hash-chip verified" style={{maxWidth:'100%',padding:'6px 10px',marginTop:4}}>{item.hash}a7c2e4f9b3d1...</div>
          </div>
          <div>
            <div className="dark-label">수신 측 재계산 해시 (내부망)</div>
            <div className={`hash-chip ${item.verified===false?'mismatch':'verified'}`} style={{maxWidth:'100%',padding:'6px 10px',marginTop:4}}>
              {item.verified===false ? 'f3b8c1e5a2d4...7a9f (불일치 — 재전송 필요)' : item.hash+'a7c2e4f9b3d1...'}
            </div>
          </div>
          {item.status==='failed' && (
            <div style={{marginTop:14,padding:'10px 14px',background:'rgba(255,107,53,0.1)',borderRadius:8,border:'1px solid rgba(255,107,53,0.25)',fontSize:11,color:'#FF6B35'}}>
              전송 실패 원인: SHA-256 해시 불일치. 네트워크 불안정으로 인한 데이터 손상이 의심됩니다. 재전송 시 원본 데이터를 IndexedDB에서 다시 읽어 전송합니다.
            </div>
          )}
        </div>
        <div className="modal-dk-footer">
          <button className="btn-ghost" onClick={onClose}>닫기</button>
          {item.status==='failed' && (
            <button className="btn-teal" onClick={()=>{showT('재전송 큐에 등록되었습니다');onClose();}}>
              <Ph icon="repeat" size={12} weight="bold" />재전송
            </button>
          )}
        </div>
      </div>
    </div>
  );
};

const PDFModal = ({ onClose }) => {
  const [generating, setGenerating] = useState(false);
  const [done, setDone] = useState(false);
  const generate = () => {
    setGenerating(true);
    setTimeout(() => { setGenerating(false); setDone(true); }, 2200);
  };
  return (
    <div className="modal-overlay-dk" onClick={e=>{if(e.target===e.currentTarget)onClose();}}>
      <div className="modal-dk">
        <div className="modal-dk-header">
          <div className="modal-dk-title">출장복명서 자동 생성</div>
          <div className="modal-dk-close" onClick={onClose}><Ph icon="x" size={13} color="#E8F4F0" /></div>
        </div>
        <div className="modal-dk-body">
          {!done ? (
            <>
              <div style={{marginBottom:14,fontSize:12,color:'#7EAFC0'}}>선택된 기간 및 시설물의 이력 데이터를 공공 문서 양식에 바인딩하여 PDF를 생성합니다.</div>
              {[
                ['보고 기간', '2026-05-01 ~ 2026-05-28'],
                ['담당자', '이재원 (현장조사팀)'],
                ['포함 시설물', 'F-0821, F-0822, F-0823'],
                ['이력 건수', '5건 (점검 2, 민원 1, 보수 1, 속성변경 1)'],
                ['첨부 사진', '8장'],
              ].map(([k,v])=>(
                <div key={k} className="stat-row-dk"><span className="stat-label-dk">{k}</span><span className="stat-value-dk">{v}</span></div>
              ))}
              {generating && (
                <div style={{marginTop:14}}>
                  <div style={{fontSize:11,color:'#7EAFC0',marginBottom:6}}>PDF 생성 중...</div>
                  <div className="progress-dark"><div className="progress-fill pf-teal" style={{'--w':'85%',width:'85%',transition:'width 2s ease'}} /></div>
                </div>
              )}
            </>
          ) : (
            <div style={{textAlign:'center',padding:'20px 0'}}>
              <Ph icon="check-circle" size={48} color="#00C9A7" weight="fill" />
              <div style={{fontSize:14,fontWeight:700,color:'#E8F4F0',marginTop:12}}>출장복명서가 생성되었습니다</div>
              <div style={{fontSize:11,color:'#7EAFC0',marginTop:4}}>출장복명서_20260528_이재원.pdf (328KB)</div>
            </div>
          )}
        </div>
        <div className="modal-dk-footer">
          <button className="btn-ghost" onClick={onClose}>{done ? '닫기' : '취소'}</button>
          {!done && !generating && <button className="btn-teal" onClick={generate}><Ph icon="file-pdf" size={12} weight="bold" />생성 시작</button>}
          {done && <button className="btn-teal" onClick={()=>{showT('파일 다운로드가 시작됩니다');onClose();}}><Ph icon="download-simple" size={12} weight="bold" />다운로드</button>}
        </div>
      </div>
    </div>
  );
};

// App
const TABS = [
  { id: 'main', label: '대시보드', icon: 'house-simple' },
  { id: 'data-collect', label: '데이터 수집', icon: 'camera' },
  { id: 'history-book', label: '히스토리 북', icon: 'clock-countdown' },
  { id: 'sync-monitor', label: '동기화 모니터', icon: 'arrows-clockwise' },
];

function App() {
  const [tab, setTab] = useState('main');
  const [modal, setModal] = useState(null);
  const [queueItem, setQueueItem] = useState(null);

  const openQueue = (item) => { setQueueItem(item); setModal('queue'); };
  const openPDF = () => setModal('pdf');
  const closeModal = () => { setModal(null); setQueueItem(null); };

  return (
    <div style={{width:'100%',minHeight:'100vh',display:'flex',flexDirection:'column'}}>
      <header className="topnav">
        <div className="topnav-inner">
          <div className="brand">
            <div className="brand-icon">
              <Ph icon="map-trifold" size={18} color="#0D1B2A" weight="bold" />
            </div>
            <div>
              <div className="brand-name">GIS 현장 수집 플랫폼</div>
              <div className="brand-sub">오프라인 동기화 · 망연계 · 히스토리 북</div>
            </div>
          </div>
          <nav className="nav-tabs">
            {TABS.map(t => (
              <div key={t.id} className={`nav-tab ${tab===t.id?'active':''}`} onClick={()=>setTab(t.id)}>
                <Ph icon={t.icon} size={14} weight={tab===t.id?'bold':'regular'} />
                {t.label}
              </div>
            ))}
          </nav>
          <div className="topnav-actions">
            <div className="net-pill"><div className="net-dot"/><span>외부망 연결됨</span></div>
            <div className="icon-btn-dark" onClick={()=>showT('알림함: 미확인 2건')}><Ph icon="bell" size={15} color="#7EAFC0"/></div>
            <div className="icon-btn-dark" onClick={()=>showT('설정 패널이 열립니다')}><Ph icon="gear" size={15} color="#7EAFC0"/></div>
          </div>
        </div>
      </header>
      <main style={{flex:1,width:'100%'}}>
        {tab === 'main' && <MainDashboard />}
        {tab === 'data-collect' && <DataCollectScreen onSubmit={()=>showT('수집 데이터가 큐에 저장되었습니다')} />}
        {tab === 'history-book' && <HistoryBookScreen onGenPDF={openPDF} />}
        {tab === 'sync-monitor' && <SyncMonitorScreen onItemClick={openQueue} />}
      </main>

      {modal === 'queue' && queueItem && <QueueDetailModal item={queueItem} onClose={closeModal} />}
      {modal === 'pdf' && <PDFModal onClose={closeModal} />}
      <Toast />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
