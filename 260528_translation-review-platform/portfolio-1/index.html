// ─── Utility ─────────────────────────────────────────────────
function statusBadge(status) {
  const map = {
    '진행 전': 'badge-gray', '진행 중': 'badge-blue',
    '완료': 'badge-green', '수정 요청': 'badge-amber',

  };
  return map[status] || 'badge-gray';
}

// ─── Toast Hook ───────────────────────────────────────────────
function useToast() {
  const [toasts, setToasts] = useState([]);
  const show = (msg, type = 'success') => {
    const id = Date.now();
    setToasts(p => [...p, { id, msg, type }]);
    setTimeout(() => setToasts(p => p.filter(t => t.id !== id)), 3000);
  };
  return { toasts, show };
}

// ─── Toast Renderer ───────────────────────────────────────────
function ToastRenderer({ toasts }) {
  return (
    <div className="toast-wrap">
      {toasts.map(t => (
        <div key={t.id} className={`toast toast-${t.type}`}>
          <i className={`ti ${t.type === 'success' ? 'ti-check' : t.type === 'warning' ? 'ti-alert-triangle' : 'ti-x'}`}></i>
          {t.msg}
        </div>
      ))}
    </div>
  );
}

function DashboardScreen({ toast }) {
  const [projects, setProjects] = useState(PROJECTS);
  const [searchQ, setSearchQ] = useState('');
  const [showAssignModal, setShowAssignModal] = useState(false);
  const [selectedProject, setSelectedProject] = useState(null);
  const [assignForm, setAssignForm] = useState({ content: '', lang: '일어', ja: '', rv: '' });

  const filtered = projects.filter(p => p.name.includes(searchQ));

  const handleAssign = (e) => {
    e.preventDefault();
    toast.show('담당자가 배정되었습니다. 해당 담당자에게 알림이 전송됩니다.', 'success');
    setShowAssignModal(false);
    setAssignForm({ content: '', lang: '일어', ja: '', rv: '' });
  };

  const handleChangeAssign = (projectId, field, value) => {
    setProjects(prev => prev.map(p => p.id === projectId ? { ...p, [field === 'ja' ? 'assignedJa' : 'assignedRv']: value } : p));
    toast.show(`${field === 'ja' ? '번역' : '검수'} 담당자가 변경되었습니다.`, 'success');
  };

  return (
    <div className="page-content">
      <div className="kpi-grid">
        <div className="kpi-card">
          <div className="kpi-label">전체 콘텐츠</div>
          <div className="kpi-value">88</div>
          <div className="kpi-sub">4개 프로젝트 기준</div>
        </div>
        <div className="kpi-card">
          <div className="kpi-label">번역 완료</div>
          <div className="kpi-value" style={{color:'#065F46'}}>64</div>
          <div className="kpi-sub"><span className="kpi-badge badge-green">72.7%</span></div>
        </div>
        <div className="kpi-card">
          <div className="kpi-label">수정 요청</div>
          <div className="kpi-value" style={{color:'#D97706'}}>12</div>
          <div className="kpi-sub"><span className="kpi-badge badge-amber">검수 반려</span></div>
        </div>
        <div className="kpi-card">
          <div className="kpi-label">납품 완료</div>
          <div className="kpi-value" style={{color:'#2563C8'}}>14</div>
          <div className="kpi-sub"><span className="kpi-badge badge-blue">영어 회화 교재</span></div>
        </div>
      </div>

      <div className="two-col" style={{marginBottom: 28}}>
        <div>
          <div className="section-title">주간 진행 현황</div>
          <div className="section-card" style={{padding:'20px'}}>
            <div className="chart-wrap">
              <ResponsiveContainer width="100%" height="100%">
                <BarChart data={WEEKLY_PROGRESS} margin={{top:4,right:8,left:-10,bottom:4}}>
                  <CartesianGrid strokeDasharray="3 3" stroke="#F3F4F6" />
                  <XAxis dataKey="week" tick={{fontSize:11,fill:'#6B7280'}} />
                  <YAxis tick={{fontSize:11,fill:'#6B7280'}} />
                  <Tooltip contentStyle={{fontSize:12,borderRadius:6}} />
                  <Bar dataKey="done" name="번역완료" fill="#2563C8" radius={[3,3,0,0]} />
                  <Bar dataKey="review" name="검수완료" fill="#BFDBFE" radius={[3,3,0,0]} />
                  <Bar dataKey="modified" name="수정요청" fill="#FDE68A" radius={[3,3,0,0]} />
                </BarChart>
              </ResponsiveContainer>
            </div>
          </div>
        </div>
        <div>
          <div className="section-title">언어별 완료 현황</div>
          <div className="section-card" style={{padding:'20px'}}>
            <div style={{display:'flex',flexDirection:'column',gap:12}}>
              {[{lang:'일어',done:32,total:38,pct:84},{lang:'중어(간체)',done:20,total:32,pct:63},{lang:'중어(번체)',done:12,total:18,pct:67}].map(item => (
                <div key={item.lang}>
                  <div style={{display:'flex',justifyContent:'space-between',marginBottom:5}}>
                    <span style={{fontSize:13,fontWeight:600,color:'#374151'}}>{item.lang}</span>
                    <span style={{fontSize:12,color:'#6B7280'}}>{item.done}/{item.total}건</span>
                  </div>
                  <div className="progress-bar-wrap" style={{width:'100%'}}>
                    <div className="progress-bar-fill" style={{'--target-width':`${item.pct}%`, width:`${item.pct}%`}}></div>
                  </div>
                </div>
              ))}
            </div>
          </div>
        </div>
      </div>

      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:14}}>
        <div className="section-title" style={{marginBottom:0}}>프로젝트 목록</div>
        <div style={{display:'flex',gap:10}}>
          <div className="search-bar">
            <i className="ti ti-search" style={{color:'#9CA3AF',fontSize:16}}></i>
            <input className="search-input" placeholder="프로젝트 검색..." value={searchQ} onChange={e=>setSearchQ(e.target.value)} />
          </div>
          <button className="btn btn-primary" onClick={()=>{setSelectedProject(null);setShowAssignModal(true);}}>
            <i className="ti ti-plus"></i> 콘텐츠 등록
          </button>
        </div>
      </div>
      <div className="section-card">
        <div className="table-wrapper">
          <table>
            <thead>
              <tr>
                <th>프로젝트명</th>
                <th>언어</th>
                <th>진행률</th>
                <th>수정요청</th>
                <th>D-DAY</th>
                <th>번역 담당</th>
                <th>검수 담당</th>
                <th></th>
              </tr>
            </thead>
            <tbody>
              {filtered.map(p => (
                <tr key={p.id} onClick={()=>{setSelectedProject(p);setShowAssignModal(true);}}>
                  <td style={{fontWeight:600,color:'#111827'}}>{p.name}</td>
                  <td><span className="tag badge-blue">{p.lang}</span></td>
                  <td>
                    <div style={{display:'flex',alignItems:'center',gap:8}}>
                      <div className="progress-bar-wrap">
                        <div className="progress-bar-fill" style={{'--target-width':`${Math.round(p.done/p.total*100)}%`,width:`${Math.round(p.done/p.total*100)}%`}}></div>
                      </div>
                      <span style={{fontSize:12,color:'#6B7280'}}>{Math.round(p.done/p.total*100)}%</span>
                    </div>
                  </td>
                  <td>
                    <span className={`tag ${p.modified > 0 ? 'badge-amber' : 'badge-gray'}`}>
                      {p.modified > 0 ? `${p.modified}건` : '없음'}
                    </span>
                  </td>
                  <td>
                    <span style={{fontWeight:600,color: p.dday <= 7 && p.dday > 0 ? '#D97706' : p.dday <= 0 ? '#DC2626' : '#374151'}}>
                      {p.dday <= 0 ? '완료' : `D-${p.dday}`}
                    </span>
                  </td>
                  <td onClick={e=>e.stopPropagation()}>
                    <select className="assign-select" value={p.assignedJa} onChange={e=>handleChangeAssign(p.id,'ja',e.target.value)}>
                      {TRANSLATORS.map(t=><option key={t}>{t}</option>)}
                    </select>
                  </td>
                  <td onClick={e=>e.stopPropagation()}>
                    <select className="assign-select" value={p.assignedRv} onChange={e=>handleChangeAssign(p.id,'rv',e.target.value)}>
                      {REVIEWERS.map(r=><option key={r}>{r}</option>)}
                    </select>
                  </td>
                  <td>
                    <button className="btn btn-ghost btn-sm" onClick={e=>{e.stopPropagation();toast.show('파일 다운로드 중입니다.','success');}}>
                      <i className="ti ti-download"></i>
                    </button>
                  </td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      </div>

      {showAssignModal && (
        <div className="modal-overlay" onClick={()=>setShowAssignModal(false)}>
          <div className="modal-box" onClick={e=>e.stopPropagation()}>
            <div className="modal-header">
              <span className="modal-title">{selectedProject ? selectedProject.name + ' — 상세' : '신규 콘텐츠 등록'}</span>
              <button className="modal-close" onClick={()=>setShowAssignModal(false)}>
                <i className="ti ti-x"></i>
              </button>
            </div>
            {selectedProject ? (
              <div>
                <div style={{display:'flex',gap:10,marginBottom:16,flexWrap:'wrap'}}>
                  <span className="tag badge-blue">{selectedProject.lang}</span>
                  <span className="tag badge-gray">총 {selectedProject.total}건</span>
                  <span className="tag badge-green">완료 {selectedProject.done}건</span>
                  {selectedProject.modified > 0 && <span className="tag badge-amber">수정요청 {selectedProject.modified}건</span>}
                </div>
                <div className="form-row" style={{marginBottom:16}}>
                  <div className="form-group" style={{marginBottom:0}}>
                    <label className="form-label">번역 담당자</label>
                    <select className="form-select" defaultValue={selectedProject.assignedJa}>
                      {TRANSLATORS.map(t=><option key={t}>{t}</option>)}
                    </select>
                  </div>
                  <div className="form-group" style={{marginBottom:0}}>
                    <label className="form-label">검수 담당자</label>
                    <select className="form-select" defaultValue={selectedProject.assignedRv}>
                      {REVIEWERS.map(r=><option key={r}>{r}</option>)}
                    </select>
                  </div>
                </div>
                <div className="form-group">
                  <label className="form-label">관리자 메모</label>
                  <textarea className="form-textarea" placeholder="프로젝트 특이사항, 번역 스타일 가이드 등을 입력하세요..." style={{minHeight:80}}></textarea>
                </div>
              </div>
            ) : (
              <form onSubmit={handleAssign}>
                <div className="form-group">
                  <label className="form-label">콘텐츠 제목</label>
                  <input className="form-input" placeholder="예: 3장. 분수와 소수 (일어판)" required value={assignForm.content} onChange={e=>setAssignForm(p=>({...p,content:e.target.value}))} />
                </div>
                <div className="form-row">
                  <div className="form-group">
                    <label className="form-label">대상 언어</label>
                    <select className="form-select" value={assignForm.lang} onChange={e=>setAssignForm(p=>({...p,lang:e.target.value}))}>
                      <option>일어</option><option>중어(간체)</option><option>중어(번체)</option>
                    </select>
                  </div>
                  <div className="form-group">
                    <label className="form-label">납기 기한</label>
                    <input type="date" className="form-input" defaultValue="2026-06-15" />
                  </div>
                </div>
                <div className="form-row">
                  <div className="form-group">
                    <label className="form-label">번역 담당자</label>
                    <select className="form-select" value={assignForm.ja} onChange={e=>setAssignForm(p=>({...p,ja:e.target.value}))}>
                      <option value="">선택</option>
                      {TRANSLATORS.map(t=><option key={t}>{t}</option>)}
                    </select>
                  </div>
                  <div className="form-group">
                    <label className="form-label">검수 담당자</label>
                    <select className="form-select" value={assignForm.rv} onChange={e=>setAssignForm(p=>({...p,rv:e.target.value}))}>
                      <option value="">선택</option>
                      {REVIEWERS.map(r=><option key={r}>{r}</option>)}
                    </select>
                  </div>
                </div>
                <div className="form-group">
                  <label className="form-label">원문 파일 첨부</label>
                  <div className="dropzone" onClick={()=>toast.show('파일 선택 다이얼로그가 열립니다.','success')}>
                    <div className="dropzone-icon"><i className="ti ti-upload"></i></div>
                    <div className="dropzone-label">파일을 드래그하거나 클릭하여 업로드</div>
                    <div className="dropzone-sub">.docx, .xlsx, .txt 형식 지원 · 최대 50MB</div>
                  </div>
                </div>
                <div className="modal-footer">
                  <button type="button" className="btn btn-secondary" onClick={()=>setShowAssignModal(false)}>취소</button>
                  <button type="submit" className="btn btn-primary">콘텐츠 등록</button>
                </div>
              </form>
            )}
            {selectedProject && (
              <div className="modal-footer">
                <button className="btn btn-secondary" onClick={()=>setShowAssignModal(false)}>닫기</button>
                <button className="btn btn-primary" onClick={()=>{toast.show('변경사항이 저장되었습니다.','success');setShowAssignModal(false);}}>저장</button>
              </div>
            )}
          </div>
        </div>
      )}
    </div>
  );
}

// ─── Translator Screen ────────────────────────────────────────
function TranslatorScreen({ toast }) {
  const [contents, setContents] = useState(MY_CONTENTS);
  const [activeContent, setActiveContent] = useState(null);
  const [translationText, setTranslationText] = useState('');
  const [saved, setSaved] = useState(false);
  const [tab, setTab] = useState('todo');
  const saveTimer = useRef(null);
  const [showUpload, setShowUpload] = useState(false);

  const filtered = tab === 'todo' ? contents.filter(c=>c.status !== '완료') : contents.filter(c=>c.status === '완료');

  const handleSelect = (c) => {
    setActiveContent(c);
    setTranslationText(c.status === '수정 요청' ? '수학에서 덧셈(たしざん)과 뺄셈(ひきざん)은 가장 기본적인 연산입니다. — [v1 초안, 수정 필요]' : '');
    setSaved(false);
  };

  const handleChange = (v) => {
    setTranslationText(v);
    setSaved(false);
    if (saveTimer.current) clearTimeout(saveTimer.current);
    saveTimer.current = setTimeout(() => { setSaved(true); }, 3000);
  };

  const handleComplete = () => {
    setContents(prev => prev.map(c => c.id === activeContent.id ? {...c, status:'완료'} : c));
    toast.show('번역이 완료 처리되었습니다. 검수 담당자에게 알림이 전송됩니다.', 'success');
    setActiveContent(null);
  };

  const ORIGINAL_TEXTS = {
    1: '덧셈과 뺄셈은 수학의 기초입니다. 두 수를 더하면 합(和)이 되고, 큰 수에서 작은 수를 빼면 차(差)가 됩니다. 예를 들어, 3+5=8이고 9-4=5입니다. 이 연산들은 우리 일상에서 매우 자주 사용됩니다.',
    2: '넓이는 평면 도형이 차지하는 공간의 크기이고, 부피는 입체 도형이 차지하는 공간의 양입니다. 정사각형의 넓이는 한 변의 길이의 제곱이며, 직육면체의 부피는 가로×세로×높이로 계산합니다.',
    3: '화학 반응에는 산화·환원 반응, 중화 반응, 분해 반응 등 다양한 종류가 있습니다. 각각의 반응은 특징적인 에너지 변화와 물질 변환을 동반합니다.',
    4: '빛이 서로 다른 매질을 통과할 때 굴절이 발생합니다. 굴절각의 크기는 스넬의 법칙으로 계산할 수 있습니다.',
  };

  return (
    <div className="page-content">
      <div style={{display:'flex',gap:24}}>
        <div style={{width:320,flexShrink:0}}>
          <div className="tabs">
            <div className={`tab ${tab==='todo'?'active':''}`} onClick={()=>{setTab('todo');setActiveContent(null);}}>진행 중 ({MY_CONTENTS.filter(c=>c.status!=='완료').length})</div>
            <div className={`tab ${tab==='done'?'active':''}`} onClick={()=>{setTab('done');setActiveContent(null);}}>완료 ({MY_CONTENTS.filter(c=>c.status==='완료').length})</div>
          </div>
          <div className="section-card">
            {filtered.map(c => (
              <div key={c.id} className="content-row" onClick={()=>handleSelect(c)}
                style={{background: activeContent?.id===c.id ? '#EFF6FF' : ''}}>
                <div style={{flex:1}}>
                  <div className="content-title">
                    {c.title}
                    {c.hasRevision && <span style={{color:'#D97706',marginLeft:6,fontSize:12}}>[수정요청]</span>}
                  </div>
                  <div className="content-meta">{c.project} · 납기 {c.deadline}</div>
                </div>
                <span className={`tag ${statusBadge(c.status)}`} style={{marginLeft:8,flexShrink:0}}>{c.status}</span>
              </div>
            ))}
            {filtered.length === 0 && <div style={{padding:'32px 20px',textAlign:'center',color:'#9CA3AF',fontSize:13}}>해당 항목이 없습니다</div>}
          </div>
        </div>
        <div style={{flex:1}}>
          {activeContent ? (
            <div>
              <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:16}}>
                <div>
                  <div style={{fontSize:16,fontWeight:700,color:'#111827'}}>{activeContent.title}</div>
                  <div style={{fontSize:12,color:'#6B7280',marginTop:2}}>{activeContent.project} · {activeContent.lang} · 납기 {activeContent.deadline}</div>
                </div>
                <div style={{display:'flex',gap:8,alignItems:'center'}}>
                  {saved && <div className="auto-save-indicator"><i className="ti ti-check" style={{fontSize:14}}></i>자동 저장됨</div>}
                  <button className="btn btn-secondary btn-sm" onClick={()=>setShowUpload(true)}>
                    <i className="ti ti-upload"></i> 파일 업로드
                  </button>
                  <button className="btn btn-primary btn-sm" onClick={handleComplete} disabled={tab==='done'}>
                    <i className="ti ti-check"></i> 번역 완료
                  </button>
                </div>
              </div>
              {activeContent.hasRevision && (
                <div style={{background:'#FFFBEB',border:'1px solid #FDE68A',borderRadius:6,padding:'10px 14px',marginBottom:14,fontSize:13}}>
                  <strong style={{color:'#92400E'}}>검수자 코멘트 (박지현)</strong>
                  <div style={{color:'#78350F',marginTop:4,lineHeight:1.6}}>"수식 표기 방식이 일본어 교과서 기준과 다릅니다. 'たしざん'→'加法(かほう)'로 수정 바랍니다. 예시 문항 3번도 확인 필요합니다."</div>
                </div>
              )}
              <div className="split-editor">
                <div className="editor-pane">
                  <div className="editor-pane-header">원문 (한국어)</div>
                  <div className="editor-body">{ORIGINAL_TEXTS[activeContent.id] || '원문 텍스트를 불러오는 중입니다.'}</div>
                </div>
                <div className="editor-pane">
                  <div className="editor-pane-header">번역문 ({activeContent.lang})</div>
                  <textarea className="editor-textarea" placeholder={`${activeContent.lang} 번역 텍스트를 입력하세요...`} value={translationText} onChange={e=>handleChange(e.target.value)} />
                </div>
              </div>
              <div style={{marginTop:10,fontSize:12,color:'#6B7280',display:'flex',gap:16}}>
                <span>원문 {ORIGINAL_TEXTS[activeContent.id]?.length || 0}자</span>
                <span>번역 {translationText.length}자</span>
                <span>번역률 {ORIGINAL_TEXTS[activeContent.id] ? Math.min(100,Math.round(translationText.length/ORIGINAL_TEXTS[activeContent.id].length*100)) : 0}%</span>
              </div>
            </div>
          ) : (
            <div style={{display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',height:320,color:'#9CA3AF'}}>
              <i className="ti ti-file-text" style={{fontSize:48,marginBottom:12,opacity:0.4}}></i>
              <div style={{fontSize:14,fontWeight:500}}>좌측 목록에서 작업할 콘텐츠를 선택하세요</div>
            </div>
          )}
        </div>
      </div>

      {showUpload && (
        <div className="modal-overlay" onClick={()=>setShowUpload(false)}>
          <div className="modal-box" style={{width:480}} onClick={e=>e.stopPropagation()}>
            <div className="modal-header">
              <span className="modal-title">번역 파일 업로드</span>
              <button className="modal-close" onClick={()=>setShowUpload(false)}><i className="ti ti-x"></i></button>
            </div>
            <div className="form-group">
              <div className="dropzone" onClick={()=>toast.show('파일 선택 다이얼로그가 열립니다.','success')}>
                <div className="dropzone-icon"><i className="ti ti-cloud-upload"></i></div>
                <div className="dropzone-label">번역 완료 파일을 업로드하세요</div>
                <div className="dropzone-sub">.docx, .txt 형식 지원 · 최대 50MB · S3 버전 관리 적용</div>
              </div>
            </div>
            <div className="form-group">
              <label className="form-label">업로드 메모 (선택)</label>
              <textarea className="form-textarea" placeholder="이번 버전의 주요 변경사항을 입력하세요..." style={{minHeight:70}}></textarea>
            </div>
            <div className="modal-footer">
              <button className="btn btn-secondary" onClick={()=>setShowUpload(false)}>취소</button>
              <button className="btn btn-primary" onClick={()=>{toast.show('파일이 성공적으로 업로드되었습니다. (S3 v3 저장됨)','success');setShowUpload(false);}}>업로드</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// ─── Reviewer Screen ──────────────────────────────────────────
function ReviewerScreen({ toast }) {
  const [contents, setContents] = useState(REVIEW_CONTENTS);
  const [active, setActive] = useState(null);
  const [commentText, setCommentText] = useState('');
  const [showCommentBox, setShowCommentBox] = useState(false);
  const [comments, setComments] = useState([
    { id: 1, text: '\'덧셈\'의 일어 표기를 \'加法(かほう)\'로 변경 필요합니다. 교과서 기준 용어를 준수해 주세요.', author: '박지현 (검수)', date: '2026-05-27', offset: '\'덧셈\'' }
  ]);
  const [showApproveConfirm, setShowApproveConfirm] = useState(false);

  const TRANS_TEXT = '数学において足し算(たしざん)と引き算(ひきざん)は最も基本的な演算です。二つの数を足すと和(わ)になり、大きな数から小さな数を引くと差(さ)になります。例えば、3+5=8であり、9-4=5です。これらの演算は私たちの日常生活で非常によく使われます。';

  const handleReject = (e) => {
    e.preventDefault();
    if (!commentText.trim()) return;
    const newComment = { id: Date.now(), text: commentText, author: '박지현 (검수)', date: '2026-05-28', offset: '선택 범위' };
    setComments(p => [...p, newComment]);
    setContents(prev => prev.map(c => c.id === active.id ? {...c, status:'수정 요청 발송'} : c));
    toast.show('수정 요청이 전송되었습니다. 번역자에게 알림이 발송됩니다.', 'warning');
    setCommentText('');
    setShowCommentBox(false);
    setActive(null);
  };

  const handleApprove = () => {
    setContents(prev => prev.map(c => c.id === active.id ? {...c, status:'납품 완료'} : c));
    toast.show('최종 승인 완료! 납품 ZIP 패키지가 생성 중입니다.', 'success');
    setShowApproveConfirm(false);
    setActive(null);
  };

  return (
    <div className="page-content">
      <div style={{display:'flex',gap:24}}>
        <div style={{width:300,flexShrink:0}}>
          <div className="section-title" style={{marginBottom:12}}>검수 목록</div>
          <div className="section-card">
            {contents.map(c => (
              <div key={c.id} className="content-row" onClick={()=>setActive(c)}
                style={{background:active?.id===c.id?'#EFF6FF':''}}>
                <div style={{flex:1}}>
                  <div className="content-title">{c.title}</div>
                  <div className="content-meta">번역: {c.translator} · 납기 {c.deadline}</div>
                </div>
                <span className={`tag ${statusBadge(c.status)}`} style={{marginLeft:8,flexShrink:0}}>{c.status}</span>
              </div>
            ))}
          </div>
        </div>
        <div style={{flex:1}}>
          {active ? (
            <div>
              <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:16}}>
                <div>
                  <div style={{fontSize:16,fontWeight:700}}>{active.title}</div>
                  <div style={{fontSize:12,color:'#6B7280',marginTop:2}}>번역: {active.translator} · {active.lang} · 납기 {active.deadline}</div>
                </div>
                <div style={{display:'flex',gap:8}}>
                  <button className="btn btn-amber btn-sm" onClick={()=>setShowCommentBox(true)}>
                    <i className="ti ti-message-circle"></i> 수정 요청
                  </button>
                  <button className="btn btn-primary btn-sm" onClick={()=>setShowApproveConfirm(true)}>
                    <i className="ti ti-check"></i> 최종 승인
                  </button>
                </div>
              </div>
              <div className="review-text-wrap" style={{marginBottom:16}}>
                <div style={{fontSize:12,color:'#6B7280',marginBottom:8,fontWeight:600}}>번역문 ({active.lang})</div>
                <div style={{lineHeight:1.9}}>
                  {TRANS_TEXT.split('足し算(たしざん)').map((part,i,arr) => i < arr.length-1 ? (
                    <span key={i}>{part}<span className="comment-highlight" onClick={()=>setShowCommentBox(true)}>足し算(たしざん)</span></span>
                  ) : <span key={i}>{part}</span>)}
                </div>
                <div style={{fontSize:11,color:'#9CA3AF',marginTop:8}}>텍스트를 선택하여 인라인 코멘트를 남길 수 있습니다</div>
              </div>

              {comments.length > 0 && (
                <div style={{marginBottom:16}}>
                  <div style={{fontSize:13,fontWeight:700,color:'#374151',marginBottom:8}}>검수 코멘트 ({comments.length}건)</div>
                  {comments.map(cm => (
                    <div key={cm.id} className="comment-thread">
                      <div className="comment-author">{cm.author} · {cm.date} · 위치: {cm.offset}</div>
                      <div style={{color:'#374151',lineHeight:1.6}}>{cm.text}</div>
                    </div>
                  ))}
                </div>
              )}

              {showCommentBox && (
                <form onSubmit={handleReject}>
                  <div className="section-card" style={{padding:16,marginTop:8}}>
                    <div style={{fontSize:13,fontWeight:600,marginBottom:8,color:'#374151'}}>수정 요청 코멘트 작성</div>
                    <textarea className="form-textarea" style={{minHeight:80}}
                      placeholder="구체적인 수정 사유와 요청 내용을 입력하세요..."
                      value={commentText} onChange={e=>setCommentText(e.target.value)} required />
                    <div style={{display:'flex',gap:8,justifyContent:'flex-end',marginTop:10}}>
                      <button type="button" className="btn btn-secondary btn-sm" onClick={()=>setShowCommentBox(false)}>취소</button>
                      <button type="submit" className="btn btn-amber btn-sm">수정 요청 전송</button>
                    </div>
                  </div>
                </form>
              )}
            </div>
          ) : (
            <div style={{display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',height:320,color:'#9CA3AF'}}>
              <i className="ti ti-clipboard-check" style={{fontSize:48,marginBottom:12,opacity:0.4}}></i>
              <div style={{fontSize:14,fontWeight:500}}>좌측 목록에서 검수할 콘텐츠를 선택하세요</div>
            </div>
          )}
        </div>
      </div>

      {showApproveConfirm && (
        <div className="modal-overlay" onClick={()=>setShowApproveConfirm(false)}>
          <div className="modal-box" style={{width:420}} onClick={e=>e.stopPropagation()}>
            <div className="modal-header">
              <span className="modal-title">최종 승인 확인</span>
              <button className="modal-close" onClick={()=>setShowApproveConfirm(false)}><i className="ti ti-x"></i></button>
            </div>
            <div style={{fontSize:14,color:'#374151',lineHeight:1.7,marginBottom:8}}>
              <strong>{active?.title}</strong>을 최종 승인하시겠습니까?
            </div>
            <div style={{background:'#F0FDF4',border:'1px solid #BBF7D0',borderRadius:6,padding:'10px 14px',fontSize:13,color:'#065F46',marginBottom:16}}>
              승인 시 원문·번역·검수 이력 PDF가 포함된 납품 ZIP 패키지가 자동 생성됩니다.
            </div>
            <div className="modal-footer">
              <button className="btn btn-secondary" onClick={()=>setShowApproveConfirm(false)}>취소</button>
              <button className="btn btn-primary" onClick={handleApprove}><i className="ti ti-check"></i> 최종 승인</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// ─── File Manager Screen ──────────────────────────────────────
function FilesScreen({ toast }) {
  const [versions, setVersions] = useState(FILE_VERSIONS);
  const [showRestoreConfirm, setShowRestoreConfirm] = useState(false);
  const [selectedVersion, setSelectedVersion] = useState(null);
  const [selectedContent, setSelectedContent] = useState('수학교과서_3-1_덧셈과_뺄셈');

  const CONTENTS_LIST = [
    '수학교과서_3-1_덧셈과_뺄셈',
    '수학교과서_4-2_넓이와_부피',
    '과학실험_화학반응의_종류',
    '과학실험_빛의_굴절',
  ];

  const handleRestore = () => {
    toast.show(`${selectedVersion?.version} 버전으로 복원 요청이 접수되었습니다.`, 'success');
    setShowRestoreConfirm(false);
  };

  return (
    <div className="page-content">
      <div className="two-col">
        <div>
          <div className="section-title">콘텐츠 선택</div>
          <div className="section-card">
            {CONTENTS_LIST.map(name => (
              <div key={name} className="content-row"
                style={{background: selectedContent===name ? '#EFF6FF' : ''}}
                onClick={()=>setSelectedContent(name)}>
                <i className="ti ti-file-text" style={{color:'#6B7280',fontSize:16}}></i>
                <span style={{marginLeft:8,fontSize:13.5,fontWeight:selectedContent===name?700:400,color:selectedContent===name?'#2563C8':'#374151'}}>{name}</span>
              </div>
            ))}
          </div>
        </div>
        <div>
          <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:12}}>
            <div className="section-title" style={{marginBottom:0}}>{selectedContent} — 버전 이력</div>
            <button className="btn btn-primary btn-sm" onClick={()=>toast.show('파일 업로드 다이얼로그가 열립니다.','success')}>
              <i className="ti ti-upload"></i> 새 버전 업로드
            </button>
          </div>
          <div className="section-card">
            <div className="version-timeline">
              {versions.map((v, idx) => (
                <div key={v.id} className="version-item" style={{animationDelay:`${idx*0.07}s`}}>
                  <div className="version-dot-col">
                    <div className="version-dot" style={{background: v.type==='current'?'#2563C8':v.type==='original'?'#6B7280':'#93C5FD'}}></div>
                    {idx < versions.length-1 && <div className="version-line"></div>}
                  </div>
                  <div className="version-info">
                    <div style={{display:'flex',alignItems:'center'}}>
                      <span className="version-filename">{v.filename}</span>
                      <span className="version-tag">{v.version}</span>
                      {v.type==='current' && <span style={{marginLeft:6,fontSize:11,color:'#065F46',fontWeight:700,background:'#D1FAE5',padding:'1px 6px',borderRadius:3}}>현재</span>}
                    </div>
                    <div className="version-meta">{v.uploader} · {v.date} · {v.size}</div>
                    <div style={{marginTop:6,display:'flex',gap:6}}>
                      <button className="btn btn-ghost btn-sm" style={{padding:'3px 8px',fontSize:12}} onClick={()=>toast.show(`${v.filename} 다운로드 링크가 생성되었습니다. (Presigned URL 5분 유효)`, 'success')}>
                        <i className="ti ti-download"></i> 다운로드
                      </button>
                      {v.type !== 'current' && v.type !== 'original' && (
                        <button className="btn btn-ghost btn-sm" style={{padding:'3px 8px',fontSize:12,color:'#D97706'}} onClick={()=>{setSelectedVersion(v);setShowRestoreConfirm(true);}}>
                          <i className="ti ti-history"></i> 이 버전으로 복원
                        </button>
                      )}
                    </div>
                  </div>
                </div>
              ))}
            </div>
            <div style={{padding:'12px 20px',background:'#F9FAFB',borderTop:'1px solid #E5E7EB',fontSize:12,color:'#6B7280',display:'flex',gap:8,alignItems:'center'}}>
              <i className="ti ti-shield-check" style={{color:'#2563C8'}}></i>
              삭제된 파일은 소프트 삭제(is_deleted)로 보존됩니다. 관리자만 복원 가능합니다.
            </div>
          </div>
        </div>
      </div>

      {showRestoreConfirm && (
        <div className="modal-overlay" onClick={()=>setShowRestoreConfirm(false)}>
          <div className="modal-box" style={{width:400}} onClick={e=>e.stopPropagation()}>
            <div className="modal-header">
              <span className="modal-title">이전 버전 복원</span>
              <button className="modal-close" onClick={()=>setShowRestoreConfirm(false)}><i className="ti ti-x"></i></button>
            </div>
            <div style={{fontSize:14,color:'#374151',lineHeight:1.7,marginBottom:16}}>
              <strong>{selectedVersion?.filename}</strong>({selectedVersion?.version})으로 복원하시겠습니까?<br/>
              현재 버전은 이력에 보존됩니다.
            </div>
            <div className="modal-footer">
              <button className="btn btn-secondary" onClick={()=>setShowRestoreConfirm(false)}>취소</button>
              <button className="btn btn-primary" onClick={handleRestore}><i className="ti ti-history"></i> 복원</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// ─── App ──────────────────────────────────────────────────────
function App() {
  const [screen, setScreen] = useState('dashboard');
  const toast = useToast();

  const NAV = [
    { key:'dashboard', label:'대시보드', icon:'ti-layout-dashboard' },
    { key:'translator', label:'번역 작업', icon:'ti-language' },
    { key:'reviewer', label:'검수 리뷰', icon:'ti-clipboard-check' },
    { key:'files', label:'파일 관리', icon:'ti-folders' },
  ];

  const screenTitles = { dashboard:'관리자 대시보드', translator:'번역 작업', reviewer:'검수 리뷰', files:'파일 버전 관리' };

  return (
    <div style={{display:'flex',width:'100%',minHeight:'100vh'}}>
      {/* Sidebar */}
      <aside className="sidebar">
        <div className="sidebar-logo">
          <div className="sidebar-logo-text">TransHub</div>
          <div className="sidebar-logo-sub">번역·검수 협업 플랫폼</div>
        </div>
        <nav className="sidebar-nav">
          <div className="nav-section-label">워크플로우</div>
          {NAV.map(n => (
            <div key={n.key} className={`nav-item ${screen===n.key?'active':''}`} onClick={()=>setScreen(n.key)}>
              <i className={`ti ${n.icon}`}></i>
              {n.label}
              {n.key==='reviewer' && <span className="notif-dot"></span>}
            </div>
          ))}
          <div style={{marginTop:8}}>
            <div className="nav-section-label">관리</div>
            {[
              {key:'members',label:'팀원 관리',icon:'ti-users'},
              {key:'settings',label:'시스템 설정',icon:'ti-settings'},
            ].map(n => (
              <div key={n.key} className="nav-item" onClick={()=>toast.show(`${n.label} 페이지로 이동합니다.`)}>
                <i className={`ti ${n.icon}`}></i>
                {n.label}
              </div>
            ))}
          </div>
        </nav>
        <div className="sidebar-footer">
          <div className="user-info">
            <div className="user-avatar">이</div>
            <div>
              <div className="user-name">이진수 관리자</div>
              <div className="user-role">관리자</div>
            </div>
          </div>
        </div>
      </aside>

      {/* Main */}
      <main className="main-wrap">
        <div className="topbar">
          <div className="topbar-title">{screenTitles[screen]}</div>
          <div className="topbar-right">
            <div style={{fontSize:12,color:'#6B7280'}}>
              <span className="kpi-badge badge-blue" style={{marginRight:6}}>일어</span>
              <span className="kpi-badge badge-purple">중어</span>
            </div>
            <button className="btn btn-ghost" style={{padding:'6px 10px'}} onClick={()=>toast.show('알림 패널이 열립니다.')}>
              <i className="ti ti-bell" style={{fontSize:18}}></i>
              <span className="notif-dot" style={{marginLeft:0}}></span>
            </button>
          </div>
        </div>

        {screen==='dashboard' && <DashboardScreen toast={toast} />}
        {screen==='translator' && <TranslatorScreen toast={toast} />}
        {screen==='reviewer' && <ReviewerScreen toast={toast} />}
        {screen==='files' && <FilesScreen toast={toast} />}
      </main>

      <ToastRenderer toasts={toast.toasts} />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
