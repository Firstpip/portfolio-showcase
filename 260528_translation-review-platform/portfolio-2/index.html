  const filtered = terms.filter(t =>
    (domain === '전체' || t.domain === domain) &&
    (t.original.includes(search) || t.ja.includes(search) || t.zh.includes(search))
  );

  const handleSearch = (v) => {
    setSearch(v);
    if (sugTimer.current) clearTimeout(sugTimer.current);
    if (v.length >= 1) {
      sugTimer.current = setTimeout(() => {
        setSuggestions(terms.filter(t => t.original.includes(v) || t.ja.includes(v)).slice(0,3));
      }, 300);
    } else {
      setSuggestions([]);
    }
  };

  const handleAdd = (e) => {
    e.preventDefault();
    if (!form.original || !form.ja || !form.zh) return;
    const newTerm = { id: Date.now(), ...form, status: '검토 중' };
    setTerms(p => [...p, newTerm]);
    toast.show('새 용어가 용어집에 추가되었습니다. 승인 대기 중입니다.', 'success');
    setModal(null);
    setForm({ original:'', ja:'', zh:'', domain:'수학' });
  };

  const handleImport = () => {
    toast.show('CSV 파일에서 용어를 가져오는 중입니다... (S3에서 로드)', 'info');
    setTimeout(() => toast.show('용어집 23개 항목이 성공적으로 가져와졌습니다.', 'success'), 2000);
  };

  return (
    <div className="main-content">
      <div className="section-header">
        <div className="section-title">용어집 및 번역 메모리</div>
        <div style={{display:'flex',gap:8}}>
          <button className="btn btn-outline btn-sm" onClick={handleImport}>
            <i className="ph-bold ph-upload-simple"></i> CSV 가져오기
          </button>
          <button className="btn btn-primary btn-sm" onClick={()=>setModal('add')}>
            <i className="ph-bold ph-plus"></i> 용어 추가
          </button>
        </div>
      </div>

      <div className="card-grid" style={{marginBottom:24}}>
        {[
          {label:'등록 용어',value:`${terms.length}개`,icon:'ph-book-open-text',color:'#0D7C5F'},
          {label:'번역 메모리',value:'1,284건',icon:'ph-brain',color:'#3B82F6'},
          {label:'재활용 제안',value:'47건',icon:'ph-recycle',color:'#8B5CF6'},
          {label:'검토 대기',value:`${terms.filter(t=>t.status==='검토 중').length}개`,icon:'ph-clock',color:'#F97316'},
        ].map((c,i) => (
          <div key={i} className="card" style={{animationDelay:`${i*0.06}s`}}>
            <div className="card-label">
              <i className={`ph-bold ${c.icon}`} style={{color:c.color,fontSize:16}}></i>
              {c.label}
            </div>
            <div className="card-value">{c.value}</div>
          </div>
        ))}
      </div>

      <div className="two-col">
        <div style={{gridColumn:'1/3'}}>
          <div style={{display:'flex',gap:10,marginBottom:14}}>
            <div style={{flex:1,position:'relative'}}>
              <i className="ph-bold ph-magnifying-glass" style={{position:'absolute',left:12,top:'50%',transform:'translateY(-50%)',color:'#4B6B5A',fontSize:16}}></i>
              <input style={{width:'100%',padding:'9px 12px 9px 36px',border:'1.5px solid rgba(13,124,95,0.2)',borderRadius:12,fontSize:13.5,fontFamily:'Pretendard,sans-serif',background:'#FAFCFB',outline:'none'}}
                placeholder="용어 검색 (원어/일어/중어)..."
                value={search} onChange={e=>handleSearch(e.target.value)} />
              {suggestions.length > 0 && (
                <div style={{position:'absolute',top:'100%',left:0,right:0,background:'#fff',border:'1.5px solid rgba(13,124,95,0.15)',borderRadius:12,marginTop:4,zIndex:20,boxShadow:'0 8px 24px rgba(0,0,0,0.1)'}}>
                  {suggestions.map(s => (
                    <div key={s.id} style={{padding:'10px 14px',cursor:'pointer',fontSize:13,borderBottom:'1px solid rgba(13,124,95,0.08)'}}
                      onClick={()=>{setSearch(s.original);setSuggestions([]);}}>
                      <span style={{fontWeight:700}}>{s.original}</span>
                      <span style={{color:'#4B6B5A',marginLeft:8}}>{s.ja}</span>
                    </div>
                  ))}
                </div>
              )}
            </div>
            <select className="filter-select" value={domain} onChange={e=>setDomain(e.target.value)}>
              <option>전체</option><option>수학</option><option>과학</option>
            </select>
          </div>
          <div className="panel" style={{padding:0}}>
            <div style={{padding:'10px 16px',borderBottom:'1px solid rgba(13,124,95,0.08)',display:'grid',gridTemplateColumns:'1fr 1fr 1fr 80px 80px',gap:12,fontSize:11,fontWeight:700,color:'#4B6B5A',textTransform:'uppercase',letterSpacing:'0.5px'}}>
              <span>원어 (한국어)</span><span>일어 번역</span><span>중어 번역</span><span>도메인</span><span>상태</span>
            </div>
            {filtered.map(t => (
              <div key={t.id} style={{padding:'12px 16px',borderBottom:'1px solid rgba(13,124,95,0.07)',display:'grid',gridTemplateColumns:'1fr 1fr 1fr 80px 80px',gap:12,alignItems:'center',cursor:'pointer',transition:'background 0.1s'}}
                onClick={()=>toast.show(`'${t.original}' 용어 상세 편집 모드로 이동합니다.`)}>
                <span style={{fontWeight:700,color:'#0F1A14'}}>{t.original}</span>
                <span style={{color:'#0D7C5F',fontWeight:500}}>{t.ja}</span>
                <span style={{color:'#3B82F6',fontWeight:500}}>{t.zh}</span>
                <span className="badge badge-emerald" style={{fontSize:11}}>{t.domain}</span>
                <span className={`badge ${t.status==='승인'?'badge-green':'badge-amber'}`} style={{fontSize:11}}>{t.status}</span>
              </div>
            ))}
            {filtered.length === 0 && <div style={{padding:'32px',textAlign:'center',color:'#9CA3AF',fontSize:13}}>검색 결과가 없습니다</div>}
          </div>
        </div>
      </div>

      {modal === 'add' && (
        <div className="modal-overlay" onClick={()=>setModal(null)}>
          <div className="modal-box" onClick={e=>e.stopPropagation()}>
            <div className="modal-header">
              <span className="modal-title">새 용어 추가</span>
              <button className="modal-close" onClick={()=>setModal(null)}><i className="ph-bold ph-x"></i></button>
            </div>
            <form onSubmit={handleAdd}>
              <div className="form-row">
                <div className="form-group">
                  <label className="form-label">원어 (한국어)</label>
                  <input className="form-input" required value={form.original} onChange={e=>setForm(p=>({...p,original:e.target.value}))} placeholder="예: 넓이" />
                </div>
                <div className="form-group">
                  <label className="form-label">도메인</label>
                  <select className="form-select" value={form.domain} onChange={e=>setForm(p=>({...p,domain:e.target.value}))}>
                    <option>수학</option><option>과학</option><option>공통</option>
                  </select>
                </div>
              </div>
              <div className="form-row">
                <div className="form-group">
                  <label className="form-label">일어 번역</label>
                  <input className="form-input" required value={form.ja} onChange={e=>setForm(p=>({...p,ja:e.target.value}))} placeholder="例: 面積(めんせき)" />
                </div>
                <div className="form-group">
                  <label className="form-label">중어 번역</label>
                  <input className="form-input" required value={form.zh} onChange={e=>setForm(p=>({...p,zh:e.target.value}))} placeholder="例: 面积(miànjī)" />
                </div>
              </div>
              <div className="form-group">
                <label className="form-label">메모 (선택)</label>
                <textarea className="form-textarea" placeholder="이 용어의 사용 맥락이나 주의사항을 입력하세요..." style={{minHeight:60}}></textarea>
              </div>
              <div className="modal-footer">
                <button type="button" className="btn btn-ghost" onClick={()=>setModal(null)}>취소</button>
                <button type="submit" className="btn btn-primary">용어 추가</button>
              </div>
            </form>
          </div>
        </div>
      )}
    </div>
  );
}

// ─── Risk Screen ──────────────────────────────────────────────
function RiskScreen({ toast }) {
  const [drawer, setDrawer] = useState(null);
  const [webhookSent, setWebhookSent] = useState(false);

  const TODAY_POS = 58; // % from left (approximate)

  const riskColor = (risk) => ({
    high: '#EF4444', mid: '#D97706', low: '#0D7C5F', done: '#6B7280'
  }[risk]);

  const handleWebhook = () => {
    setWebhookSent(true);
    toast.show('Slack 웹훅으로 납기 위험 알림이 발송되었습니다.', 'warning');
  };

  return (
    <div className="main-content">
      <div className="section-header">
        <div className="section-title">납기 리스크 모니터링</div>
        <div style={{display:'flex',gap:8}}>
          <button className="btn btn-orange btn-sm" onClick={handleWebhook}>
            <i className="ph-bold ph-bell-ringing"></i>
            {webhookSent ? 'Slack 알림 발송됨' : '위험 알림 발송'}
          </button>
        </div>
      </div>

      <div className="risk-cards">
        <div className="risk-card risk-high">
          <div className="risk-card-label" style={{color:'#991B1B'}}>위험 프로젝트</div>
          <div className="risk-card-count" style={{color:'#DC2626'}}>{RISK_DETAIL.high.count}건</div>
          <div style={{fontSize:12,color:'#B91C1C',marginTop:4}}>즉시 조치 필요</div>
        </div>
        <div className="risk-card risk-mid">
          <div className="risk-card-label" style={{color:'#92400E'}}>주의 프로젝트</div>
          <div className="risk-card-count" style={{color:'#D97706'}}>{RISK_DETAIL.mid.count}건</div>
          <div style={{fontSize:12,color:'#B45309',marginTop:4}}>모니터링 강화 필요</div>
        </div>
        <div className="risk-card risk-low">
          <div className="risk-card-label" style={{color:'#065F46'}}>양호 프로젝트</div>
          <div className="risk-card-count" style={{color:'#0D7C5F'}}>{RISK_DETAIL.low.count}건</div>
          <div style={{fontSize:12,color:'#047857',marginTop:4}}>정상 진행 중</div>
        </div>
      </div>

      <div style={{marginBottom:28}}>
        <div className="section-header"><div className="section-title">프로젝트 납기 타임라인 (Gantt)</div></div>
        <div className="panel">
          <div style={{display:'flex',justifyContent:'space-between',fontSize:11,color:'#4B6B5A',marginBottom:12,padding:'0 4px'}}>
            <span>2026-05-20</span>
            <span style={{color:'#F97316',fontWeight:700}}>오늘 (05-28)</span>
            <span>2026-06-15</span>
          </div>
          {RISK_PROJECTS.map((p, idx) => (
            <div key={p.id} className="gantt-row" onClick={()=>setDrawer(p)} style={{cursor:'pointer'}}>
              <div className="gantt-label">
                <span>{p.name}</span>
                <span style={{color:riskColor(p.risk),fontWeight:700}}>
                  {p.risk==='done' ? '완료' : p.risk==='high' ? `위험 D-${p.dday}` : p.risk==='mid' ? `주의 D-${p.dday}` : `양호 D-${p.dday}`}
                </span>
              </div>
              <div className="gantt-bar-wrap">
                <div className="gantt-bar-fill" style={{width:`${p.progress}%`,background:p.risk==='done'?'#9CA3AF':riskColor(p.risk)}}>
                  {p.progress > 20 && `${p.progress}%`}
                </div>
                <div className="gantt-today" style={{left:`${TODAY_POS}%`}}>
                  {idx===0 && <span className="today-label">오늘</span>}
                </div>
              </div>
            </div>
          ))}
        </div>
      </div>

      <div>
        <div className="section-header"><div className="section-title">리스크 스코어 상세</div></div>
        <div className="panel" style={{padding:0}}>
          <table className="data-table">
            <thead>
              <tr><th>프로젝트</th><th>리스크 등급</th><th>진행률</th><th>현재 속도(건/일)</th><th>필요 속도(건/일)</th><th>D-DAY</th><th></th></tr>
            </thead>
            <tbody>
              {RISK_PROJECTS.map(p => (
                <tr key={p.id} onClick={()=>setDrawer(p)}>
                  <td style={{fontWeight:600}}>{p.name}</td>
                  <td>
                    <span className="badge" style={{background:`${riskColor(p.risk)}18`,color:riskColor(p.risk)}}>
                      {p.risk==='done'?'완료':p.risk==='high'?'위험':p.risk==='mid'?'주의':'양호'}
                    </span>
                  </td>
                  <td><span style={{fontWeight:700,color:riskColor(p.risk)}}>{p.progress}%</span></td>
                  <td style={{color:p.speed>=p.needed?'#0D7C5F':'#DC2626',fontWeight:600}}>{p.speed > 0 ? p.speed : '-'}</td>
                  <td style={{color:'#4B6B5A'}}>{p.needed > 0 ? p.needed : '-'}</td>
                  <td style={{fontWeight:700,color:riskColor(p.risk)}}>{p.risk==='done'?'완료':`D-${p.dday}`}</td>
                  <td>
                    <button className="btn btn-ghost btn-sm" onClick={e=>{e.stopPropagation();toast.show(`${p.name} 담당자에게 상황을 공유합니다.`);}}>
                      <i className="ph-bold ph-share-network"></i>
                    </button>
                  </td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      </div>

      {drawer && (
        <>
          <div className="drawer-overlay" onClick={()=>setDrawer(null)}></div>
          <div className="drawer">
            <div className="drawer-header">
              <span className="drawer-title">리스크 상세</span>
              <button className="drawer-close" onClick={()=>setDrawer(null)}><i className="ph-bold ph-x"></i></button>
            </div>
            <div className="drawer-body">
              <div style={{fontSize:15,fontWeight:700,marginBottom:4}}>{drawer.name}</div>
              <div style={{marginBottom:16}}>
                <span className="badge" style={{background:`${riskColor(drawer.risk)}18`,color:riskColor(drawer.risk)}}>
                  {drawer.risk==='done'?'완료':drawer.risk==='high'?'위험':drawer.risk==='mid'?'주의':'양호'}
                </span>
              </div>
              <div style={{background:drawer.risk==='high'?'#FEF2F2':drawer.risk==='mid'?'#FFFBEB':'#F0FDF4',border:`1px solid ${drawer.risk==='high'?'#FECACA':drawer.risk==='mid'?'#FDE68A':'#BBF7D0'}`,borderRadius:14,padding:'14px 16px',marginBottom:20}}>
                <div style={{fontSize:13,fontWeight:700,color:riskColor(drawer.risk),marginBottom:6}}>리스크 진단</div>
                <div style={{fontSize:13,color:'#374151',lineHeight:1.7}}>
                  {drawer.risk==='high' ? `현재 처리 속도(${drawer.speed}건/일)가 납기를 맞추기 위한 필요 속도(${drawer.needed}건/일)보다 낮습니다. 담당자 재배정 또는 추가 인력 투입을 검토하세요.` :
                   drawer.risk==='mid' ? `처리 속도가 납기 기준에 근접해 있습니다. 현재 속도를 유지하면 납기를 맞출 수 있으나 모니터링이 필요합니다.` :
                   `현재 처리 속도로 납기 전에 완료 예상됩니다.`}
                </div>
              </div>
              {[
                {label:'전체 진행률', value:`${drawer.progress}%`},
                {label:'잔여 D-DAY', value:drawer.risk==='done'?'완료':`D-${drawer.dday}`},
                {label:'현재 속도', value:drawer.speed>0?`${drawer.speed}건/일`:'–'},
                {label:'필요 속도', value:drawer.needed>0?`${drawer.needed}건/일`:'–'},
              ].map(item => (
                <div key={item.label} className="info-row">
                  <span className="info-label">{item.label}</span>
                  <span className="info-value">{item.value}</span>
                </div>
              ))}
              <div className="divider"></div>
              <div style={{display:'flex',gap:8}}>
                <button className="btn btn-outline btn-sm" style={{flex:1,justifyContent:'center'}} onClick={()=>{toast.show('리스크 알림이 Slack으로 발송됩니다.','warning');setDrawer(null);}}>
                  <i className="ph-bold ph-bell-ringing"></i> 알림 발송
                </button>
                <button className="btn btn-primary btn-sm" style={{flex:1,justifyContent:'center'}} onClick={()=>{toast.show('담당자 재배정 화면으로 이동합니다.');setDrawer(null);}}>
                  <i className="ph-bold ph-arrows-left-right"></i> 담당자 재배정
                </button>
              </div>
            </div>
          </div>
        </>
      )}
    </div>
  );
}

// ─── App ─────────────────────────────────────────────────────
function App() {
  const [screen, setScreen] = useState('main');
  const toast = useToast();

  const TABS = [
    { key:'main', label:'품질 분석', icon:'ph-chart-line-up' },
    { key:'analytics', label:'분석 리포트', icon:'ph-presentation-chart' },
    { key:'glossary', label:'용어집', icon:'ph-book-open-text' },
    { key:'risk', label:'리스크 관리', icon:'ph-warning-circle' },
  ];

  return (
    <div style={{width:'100%',minHeight:'100vh',display:'flex',flexDirection:'column'}}>
      <nav className="topnav">
        <div className="topnav-upper">
          <div className="brand">
            <div className="brand-dot"></div>
            <div className="brand-name">QualityLens</div>
            <div className="brand-sub">번역 품질 분석 플랫폼</div>
          </div>
          <div style={{display:'flex',alignItems:'center',gap:12}}>
            <div style={{fontSize:12,color:'#4B6B5A',background:'rgba(13,124,95,0.08)',padding:'4px 12px',borderRadius:12}}>
              GPT-4o · Redis 캐시 연동
            </div>
            <div style={{width:32,height:32,borderRadius:'50%',background:'rgba(13,124,95,0.12)',display:'flex',alignItems:'center',justifyContent:'center',cursor:'pointer'}}
              onClick={()=>toast.show('알림 센터가 열립니다.')}>
              <i className="ph-bold ph-bell" style={{color:'#0D7C5F',fontSize:16}}></i>
            </div>
            <div style={{width:32,height:32,borderRadius:'50%',background:'#0D7C5F',display:'flex',alignItems:'center',justifyContent:'center',cursor:'pointer',fontSize:13,fontWeight:700,color:'#fff'}}>
              박
            </div>
          </div>
        </div>
        <div className="topnav-tabs">
          {TABS.map(t => (
            <div key={t.key} className={`nav-tab ${screen===t.key?'active':''}`} onClick={()=>setScreen(t.key)}>
              <i className={`ph-bold ${t.icon}`} style={{fontSize:15}}></i>
              {t.label}
            </div>
          ))}
        </div>
      </nav>

      <main style={{flex:1,width:'100%'}}>
        {screen==='main' && <QualityDashboard toast={toast} />}
        {screen==='analytics' && <AnalyticsScreen toast={toast} />}
        {screen==='glossary' && <GlossaryScreen toast={toast} />}
        {screen==='risk' && <RiskScreen toast={toast} />}
      </main>

      <ToastRenderer toasts={toast.toasts} />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
