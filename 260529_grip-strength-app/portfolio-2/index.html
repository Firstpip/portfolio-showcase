    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes slideInLeft {
      from { opacity: 0; transform: translateX(-16px); }
      to   { opacity: 1; transform: translateX(0); }
    }
    @keyframes glowPulse {
      0%,100% { box-shadow: 0 0 0 0 rgba(11,191,163,0); }
      50%      { box-shadow: 0 0 0 6px rgba(11,191,163,0.18); }
    }
    @keyframes countUp {
      from { opacity: 0; transform: scale(0.8); }
      to   { opacity: 1; transform: scale(1); }
    }
    @keyframes shimmer {
      0%   { background-position: -200% 0; }
      100% { background-position: 200% 0; }
    }
    @keyframes toastIn {
      from { transform: translateX(120%); opacity: 0; }
      to   { transform: translateX(0); opacity: 1; }
    }
    @keyframes spin {
      from { transform: rotate(0deg); }
      to   { transform: rotate(360deg); }
    }
    @keyframes barGrow {
      from { transform: scaleY(0); }
      to   { transform: scaleY(1); }
    }

    .fade-in    { animation: fadeIn 0.3s ease-out both; }
    .slide-left { animation: slideInLeft 0.3s ease-out both; }
    .count-up   { animation: countUp 0.4s ease-out both; }
    .toast-in   { animation: toastIn 0.3s cubic-bezier(0.32,0.72,0,1) both; }

    button { font-family: 'Pretendard', sans-serif; cursor: pointer; }
    select { font-family: 'Pretendard', sans-serif; }

      width: 240px; min-height: 100vh;
      background: #0F1E2A;
      border-right: 1px solid rgba(11,191,163,0.12);
      display: flex; flex-direction: column;
      position: fixed; top: 0; left: 0; z-index: 100;
    }
    .sidebar-logo {
      padding: 28px 24px 20px;
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }
    .sidebar-nav { flex: 1; padding: 16px 12px; display: flex; flex-direction: column; gap: 4px; }
    .nav-item {
      display: flex; align-items: center; gap: 12px;
      padding: 10px 14px; border-radius: 12px;
      border: none; background: none; width: 100%;
      color: #7AADA4; font-size: 14px; font-weight: 500;
      transition: all 0.15s; text-align: left;

    .nav-item:hover { background: rgba(11,191,163,0.08); color: #E8F4F1; }
    .nav-item.active {
      background: rgba(11,191,163,0.15);
      color: #0BBFA3;
      box-shadow: inset 0 0 0 1px rgba(11,191,163,0.2);
    }
    .nav-icon { font-size: 18px; width: 20px; text-align: center; }

    /* Main layout */
    .main-layout { display: flex; min-height: 100vh; }
    .content-area { margin-left: 240px; flex: 1; min-width: 0; }

    /* Topbar */
    .topbar {
      height: 64px; background: rgba(12,24,32,0.95);
      border-bottom: 1px solid rgba(255,255,255,0.06);
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 32px; position: sticky; top: 0; z-index: 50;
      backdrop-filter: blur(12px);
    }

    /* Glass card */
    .glass-card {
      background: rgba(22,35,48,0.7);
      border: 1px solid rgba(11,191,163,0.12);
      border-radius: 16px;
      backdrop-filter: blur(12px);
    }
    .glass-card-solid {
      background: #162330;
      border: 1px solid rgba(11,191,163,0.1);
      border-radius: 16px;
    }

    /* KPI card */
    .kpi-card {
      background: linear-gradient(135deg, #162330 0%, #1A2D3F 100%);
      border: 1px solid rgba(11,191,163,0.15);
      border-radius: 16px;
      padding: 24px;
      position: relative; overflow: hidden;
      transition: transform 0.18s, box-shadow 0.18s;
    }
    .kpi-card:hover { transform: translateY(-2px); box-shadow: 0 8px 32px rgba(11,191,163,0.12); }
    .kpi-card::after {
      content: ''; position: absolute; top: 0; right: 0;
      width: 80px; height: 80px; border-radius: 50%;
      background: radial-gradient(circle, rgba(11,191,163,0.12) 0%, transparent 70%);
    }

    /* Badge */
    .badge {
      display: inline-flex; align-items: center;
      padding: 3px 10px; border-radius: 999px;
      font-size: 11px; font-weight: 600;

    .badge-slate  { background: rgba(148,163,184,0.1); color: #94A3B8; border: 1px solid rgba(148,163,184,0.2); }
    .badge-green  { background: rgba(34,197,94,0.15);  color: #4ADE80; border: 1px solid rgba(34,197,94,0.25); }

      text-align: left; font-size: 11px; font-weight: 600;
      color: #7AADA4; text-transform: uppercase; letter-spacing: 0.06em;
      padding: 12px 16px; border-bottom: 1px solid rgba(255,255,255,0.06);

    .data-table td {
      padding: 14px 16px; font-size: 14px; color: #E8F4F1;
      border-bottom: 1px solid rgba(255,255,255,0.04);
    }
    .data-table tr:last-child td { border-bottom: none; }
    .data-table tbody tr:hover td { background: rgba(11,191,163,0.04); }

    .btn-primary {
      background: #0BBFA3; color: #0C1820;
      border: none; border-radius: 10px;
      font-weight: 700; font-size: 13px;
      padding: 9px 18px;
      transition: background 0.15s, transform 0.1s, box-shadow 0.15s;

    .btn-primary:hover { background: #34D9C0; transform: translateY(-1px); box-shadow: 0 4px 16px rgba(11,191,163,0.3); }

    .btn-ghost {
      background: transparent; color: #7AADA4;
      border: 1px solid rgba(122,173,164,0.25); border-radius: 10px;
      font-weight: 500; font-size: 13px;
      padding: 9px 18px;
      transition: all 0.15s;
    }
    .btn-ghost:hover { border-color: #0BBFA3; color: #0BBFA3; background: rgba(11,191,163,0.06); }

    .btn-danger {
      background: transparent; color: #F87171;
      border: 1px solid rgba(248,113,113,0.25); border-radius: 10px;
      font-weight: 600; font-size: 13px;
      padding: 7px 14px;
      transition: all 0.15s;
    }
    .btn-danger:hover { background: rgba(248,113,113,0.1); border-color: #F87171; }

    /* Input */
    .search-input {
      background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
      border-radius: 10px; color: #E8F4F1; font-size: 14px;
      padding: 9px 14px 9px 38px; outline: none; width: 260px;
      transition: border-color 0.15s;

    .search-input:focus { border-color: #0BBFA3; background: rgba(11,191,163,0.04); }
    .search-input::placeholder { color: #7AADA4; }

    .prog-bar-bg { background: rgba(255,255,255,0.06); border-radius: 4px; overflow: hidden; }

    /* Toast */
    .toast {
      position: fixed; top: 24px; right: 24px; z-index: 999;
      background: #162330; border: 1px solid rgba(11,191,163,0.3);
      border-radius: 12px; padding: 14px 20px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
      display: flex; align-items: center; gap: 10px;
      font-size: 14px; font-weight: 500; color: #E8F4F1;
      min-width: 260px;
    }

    /* Metric indicator */
    .metric-dot {
      width: 8px; height: 8px; border-radius: 50%;
      animation: glowPulse 2s ease-in-out infinite;
    }

    /* Queue item */
    .queue-row {
      display: flex; align-items: center; justify-content: space-between;
      padding: 12px 16px; border-radius: 10px;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.05);
      transition: background 0.12s;
    }
    .queue-row:hover { background: rgba(11,191,163,0.05); }

    /* Filter chip */
    .filter-chip {
      padding: 6px 14px; border-radius: 999px; font-size: 13px; font-weight: 500;
      border: 1px solid rgba(255,255,255,0.1);
      background: transparent; color: #7AADA4;
      transition: all 0.15s;
    }
    .filter-chip.active, .filter-chip:hover {
      background: rgba(11,191,163,0.12);
      border-color: rgba(11,191,163,0.3);
      color: #0BBFA3;
    }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(11,191,163,0.2); border-radius: 4px; }

    /* Redis indicator */
    .redis-indicator {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 4px 12px; border-radius: 999px;
      background: rgba(11,191,163,0.1);
      border: 1px solid rgba(11,191,163,0.2);
      font-size: 12px; font-weight: 600; color: #34D9C0;

/* ── Toast ─────────────────────────────────────────────── */
function Toast({ message, type='success', onClose }) {
  useEffect(() => { const t = setTimeout(onClose, 3000); return () => clearTimeout(t); }, []);
  return (
    <div className="toast toast-in">
      <span style={{ color: type==='success' ? '#0BBFA3' : type==='warning' ? '#FCD34D' : '#F87171' }}>
        <Icon name={type==='success'?'check':type==='warning'?'warning':'x'} size={18}/>
      </span>
      <span>{message}</span>
    </div>
  );
}

/* ── KPI Card ───────────────────────────────────────────── */
function KpiCard({ label, value, sub, icon, color='#0BBFA3', delta }) {
  return (
    <div className="kpi-card count-up">
      <div style={{ display:'flex', alignItems:'flex-start', justifyContent:'space-between', marginBottom:16 }}>
        <div style={{ width:40, height:40, borderRadius:12, background:`rgba(${color==='#0BBFA3'?'11,191,163':color==='#34D9C0'?'52,217,192':color==='#F87171'?'248,113,113':'245,158,11'},0.15)`, display:'flex', alignItems:'center', justifyContent:'center' }}>
          <Icon name={icon} size={20} color={color}/>
        </div>
        {delta && <span className="badge badge-teal" style={{ fontSize:11 }}>{delta}</span>}
      </div>
      <div style={{ fontSize:28, fontWeight:800, color:'#E8F4F1', letterSpacing:'-0.02em', marginBottom:4 }}>{value}</div>
      <div style={{ fontSize:12, color:'#7AADA4', fontWeight:500 }}>{label}</div>
      {sub && <div style={{ fontSize:11, color:'#0BBFA3', marginTop:6, fontWeight:600 }}>{sub}</div>}

  );
}

    </div>
  );
}

/* ── Moderation Page ────────────────────────────────────── */
function ModerationPage({ onToast }) {
  const [reports, setReports] = useState(reportList);
  const [qas, setQas] = useState(qaList);
  const [queues] = useState(queueItems);
  const [tab, setTab] = useState('report');
  const [selectedReport, setSelectedReport] = useState(null);
  const [answerText, setAnswerText] = useState('');

  const handleResolve = (id) => {
    setReports(prev => prev.map(r => r.id===id ? { ...r, status:'resolved' } : r));
    setSelectedReport(null);
    onToast('신고가 처리 완료되었습니다. 알림 큐에 추가됩니다.', 'success');
  };

  const handleAnswer = (id) => {
    setQas(prev => prev.map(q => q.id===id ? { ...q, status:'answered' } : q));
    setAnswerText('');
    onToast('답변이 발송되었습니다.', 'success');
  };

  const statusLabel = { pending:'대기', reviewing:'검토 중', resolved:'처리완료', waiting:'대기', answered:'답변완료' };
  const statusBadge = { pending:'badge-red', reviewing:'badge-amber', resolved:'badge-teal', waiting:'badge-amber', answered:'badge-teal' };

  return (
    <div style={{ padding:32 }} className="fade-in">
      {/* Summary */}
      <div style={{ display:'grid', gridTemplateColumns:'repeat(4,1fr)', gap:16, marginBottom:28 }}>
        <KpiCard label="미처리 신고" value={reports.filter(r=>r.status==='pending').length} icon="flag" color="#F87171"/>
        <KpiCard label="대기 Q&A" value={qas.filter(q=>q.status==='waiting').length} icon="search" color="#FCD34D"/>
        <KpiCard label="Bull Queue 대기" value={queues.filter(q=>q.status==='waiting').length} icon="zap" color="#0BBFA3"/>
        <KpiCard label="오늘 처리 완료" value="14" icon="check" color="#4ADE80"/>
      </div>

      {/* Tabs */}
      <div style={{ display:'flex', gap:4, marginBottom:20, borderBottom:'1px solid rgba(255,255,255,0.06)', paddingBottom:16 }}>
        {[{key:'report',label:'신고 관리'},{key:'qa',label:'Q&A 관리'},{key:'queue',label:'Bull Queue'}].map(t => (
          <button
            key={t.key}
            onClick={() => setTab(t.key)}
            style={{
              padding:'8px 20px', borderRadius:10, border:'none', fontWeight:600, fontSize:13,
              background: tab===t.key ? 'rgba(11,191,163,0.15)' : 'transparent',
              color: tab===t.key ? '#0BBFA3' : '#7AADA4',
              transition:'all 0.15s',
            }}
          >{t.label}</button>
        ))}
      </div>

      {tab==='report' && (
        <div style={{ display:'grid', gridTemplateColumns: selectedReport ? '1fr 400px' : '1fr', gap:20 }}>
          <div className="glass-card-solid" style={{ padding:0, overflow:'hidden' }}>
            <table className="data-table">
              <thead><tr><th>ID</th><th>유형</th><th>신고자</th><th>대상</th><th>점수</th><th>접수</th><th>상태</th><th>액션</th></tr></thead>
              <tbody>
                {reports.map(r => (
                  <tr key={r.id} style={{ cursor:'pointer' }} onClick={() => setSelectedReport(r)}>
                    <td style={{ fontSize:12, fontFamily:'monospace', color:'#7AADA4' }}>{r.id}</td>
                    <td><span className={`badge ${r.type==='이상기록'?'badge-red':'badge-amber'}`}>{r.type}</span></td>
                    <td>{r.reporter}</td>
                    <td style={{ fontWeight:600 }}>{r.target}</td>
                    <td style={{ fontFamily:'monospace' }}>{r.score}</td>
                    <td style={{ fontSize:12, color:'#7AADA4' }}>{r.created}</td>
                    <td><span className={`badge ${statusBadge[r.status]}`}>{statusLabel[r.status]}</span></td>
                    <td>
                      {r.status!=='resolved' && (
                        <button className="btn-primary" style={{ fontSize:11, padding:'5px 10px' }} onClick={e=>{e.stopPropagation();handleResolve(r.id);}}>처리</button>
                      )}
                    </td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
          {selectedReport && (
            <div className="glass-card-solid" style={{ padding:24 }}>
              <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:20 }}>
                <div style={{ fontWeight:700, color:'#E8F4F1' }}>신고 상세</div>
                <button style={{ background:'none', border:'none', color:'#7AADA4' }} onClick={()=>setSelectedReport(null)}>
                  <Icon name="x" size={18}/>
                </button>
              </div>
              <div style={{ display:'flex', flexDirection:'column', gap:12 }}>
                {[['신고 ID', selectedReport.id],['유형', selectedReport.type],['신고자', selectedReport.reporter],['대상', selectedReport.target],['이상 점수', selectedReport.score],['접수 시각', selectedReport.created]].map(([k,v]) => (
                  <div key={k} style={{ display:'flex', justifyContent:'space-between', padding:'10px 0', borderBottom:'1px solid rgba(255,255,255,0.05)' }}>
                    <span style={{ fontSize:12, color:'#7AADA4' }}>{k}</span>
                    <span style={{ fontSize:13, fontWeight:600, color:'#E8F4F1' }}>{v}</span>
                  </div>
                ))}
              </div>
              {selectedReport.status!=='resolved' && (
                <button className="btn-primary" style={{ width:'100%', marginTop:20 }} onClick={() => handleResolve(selectedReport.id)}>처리 완료 처리</button>
              )}
            </div>
          )}
        </div>
      )}

      {tab==='qa' && (
        <div style={{ display:'flex', flexDirection:'column', gap:12 }}>
          {qas.map(q => (
            <div key={q.id} className="glass-card-solid" style={{ padding:20 }}>
              <div style={{ display:'flex', alignItems:'flex-start', justifyContent:'space-between', gap:16 }}>
                <div style={{ flex:1 }}>
                  <div style={{ display:'flex', gap:8, alignItems:'center', marginBottom:8 }}>
                    <span style={{ fontSize:12, fontFamily:'monospace', color:'#7AADA4' }}>{q.id}</span>
                    <span className="badge badge-slate">{q.category}</span>
                    <span className={`badge ${statusBadge[q.status]}`}>{statusLabel[q.status]}</span>
                    <span style={{ fontSize:12, color:'#7AADA4', marginLeft:'auto' }}>{q.created}</span>
                  </div>
                  <div style={{ fontWeight:600, marginBottom:4 }}>{q.user}</div>
                  <div style={{ fontSize:13, color:'#7AADA4', lineHeight:1.6 }}>{q.question}</div>
                </div>
              </div>
              {q.status==='waiting' && (
                <div style={{ marginTop:16, display:'flex', gap:8 }}>
                  <input
                    value={answerText}
                    onChange={e => setAnswerText(e.target.value)}
                    placeholder="답변 내용을 입력하세요..."
                    style={{ flex:1, background:'rgba(255,255,255,0.05)', border:'1px solid rgba(255,255,255,0.1)', borderRadius:10, color:'#E8F4F1', padding:'9px 14px', fontSize:13, outline:'none', fontFamily:'Pretendard,sans-serif' }}
                  />
                  <button className="btn-primary" onClick={() => handleAnswer(q.id)}>답변 발송</button>
                </div>
              )}
            </div>
          ))}
        </div>
      )}

      {tab==='queue' && (
        <div className="glass-card-solid" style={{ padding:24 }}>
          <div style={{ fontWeight:700, color:'#E8F4F1', marginBottom:20, fontSize:15 }}>Bull Queue 처리 현황</div>
          <div style={{ display:'flex', flexDirection:'column', gap:10 }}>
            {queues.map(q => (
              <div key={q.id} className="queue-row">
                <div style={{ display:'flex', alignItems:'center', gap:16 }}>
                  <span style={{ fontSize:11, fontFamily:'monospace', color:'#7AADA4', width:70 }}>{q.id}</span>
                  <span className="badge badge-slate">{q.type}</span>
                  <span style={{ fontSize:13, fontWeight:600 }}>{q.target}</span>
                  <span style={{ fontSize:12, color:'#7AADA4' }}>{q.event}</span>
                </div>
                <div style={{ display:'flex', alignItems:'center', gap:12 }}>
                  <span style={{ fontSize:12, color:'#7AADA4' }}>{q.added}</span>
                  {q.status==='waiting'    && <span className="badge badge-amber">대기</span>}
                  {q.status==='processing' && <span className="badge badge-teal" style={{ animation:'glowPulse 1.5s infinite' }}>처리 중</span>}
                  {q.status==='completed'  && <span className="badge badge-green">완료</span>}
                </div>
              </div>
            ))}
          </div>
        </div>
      )}
    </div>
  );
}

/* ── Analytics Page ─────────────────────────────────────── */
function AnalyticsPage({ onToast }) {
  const [period, setPeriod] = useState('4주');
  const [downloading, setDownloading] = useState(false);

  const handleDownload = () => {
    setDownloading(true);
    setTimeout(() => { setDownloading(false); onToast('CSV 파일 다운로드가 시작됩니다.', 'success'); }, 1000);
  };

  return (
    <div style={{ padding:32 }} className="fade-in">
      {/* Infra metrics */}
      <div style={{ display:'grid', gridTemplateColumns:'repeat(4,1fr)', gap:20, marginBottom:28 }}>
        <KpiCard label="Redis 히트율" value="94.2%" icon="database" color="#0BBFA3" sub="정상 운영 중"/>
        <KpiCard label="Queue 처리량/일" value="1,840" icon="zap" color="#34D9C0" sub="Bull Queue 기준"/>
        <KpiCard label="S3 업로드 성공률" value="99.1%" icon="upload" color="#4ADE80" sub="어제 1,247건"/>
        <KpiCard label="이미지 처리 실패" value="11" icon="warning" color="#F87171" sub="재처리 대기"/>
      </div>

      <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:24, marginBottom:24 }}>
        {/* Measurement by gender */}
        <div className="glass-card-solid" style={{ padding:24 }}>
          <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:20 }}>
            <div style={{ fontWeight:700, color:'#E8F4F1', fontSize:15 }}>성별 측정 건수 추이</div>
            <div style={{ display:'flex', gap:6 }}>
              {['4주','8주','12주'].map(p => (
                <button key={p} className={`filter-chip${period===p?' active':''}`} style={{ padding:'4px 10px', fontSize:12 }} onClick={() => setPeriod(p)}>{p}</button>
              ))}
            </div>
          </div>
          <ResponsiveContainer width="100%" height={200}>
            <BarChart data={analyticsData} margin={{ top:4, right:8, left:-20, bottom:0 }}>
              <CartesianGrid strokeDasharray="3 3" stroke="rgba(255,255,255,0.05)"/>
              <XAxis dataKey="week" stroke="#7AADA4" tick={{ fontSize:12 }}/>
              <YAxis stroke="#7AADA4" tick={{ fontSize:11 }}/>
              <Tooltip contentStyle={{ background:'#162330', border:'1px solid rgba(11,191,163,0.2)', borderRadius:10, color:'#E8F4F1' }}/>
              <Legend wrapperStyle={{ color:'#7AADA4', fontSize:12 }}/>
              <Bar dataKey="male" name="남성" fill="#0BBFA3" radius={[4,4,0,0]}/>
              <Bar dataKey="female" name="여성" fill="#7AADA4" radius={[4,4,0,0]}/>
            </BarChart>
          </ResponsiveContainer>
        </div>

        {/* Age distribution */}
        <div className="glass-card-solid" style={{ padding:24 }}>
          <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:20 }}>
            <div style={{ fontWeight:700, color:'#E8F4F1', fontSize:15 }}>연령대 분포 분석</div>
            <button className="btn-ghost" style={{ fontSize:12, padding:'6px 14px' }} onClick={handleDownload} disabled={downloading}>
              <span style={{ display:'flex', alignItems:'center', gap:6 }}>
                <Icon name="download" size={13}/>
                {downloading ? 'CSV 생성 중...' : 'CSV 다운로드'}
              </span>
            </button>
          </div>
          <div style={{ display:'flex', flexDirection:'column', gap:10 }}>
            {ageData.map(a => {
              const max = Math.max(...ageData.map(x=>x.count));
              const pct = Math.round(a.count/ageData.reduce((s,x)=>s+x.count,0)*100);
              return (
                <div key={a.group} style={{ display:'flex', alignItems:'center', gap:12 }}>
                  <div style={{ width:40, fontSize:12, color:'#7AADA4', textAlign:'right' }}>{a.group}</div>
                  <div className="prog-bar-bg" style={{ flex:1, height:10 }}>
                    <div className="prog-bar-fill" style={{ width:`${a.count/max*100}%`, background:'linear-gradient(90deg, #0BBFA3, #34D9C0)' }}/>
                  </div>
                  <div style={{ width:60, fontSize:12, color:'#E8F4F1', fontWeight:600, textAlign:'right' }}>{a.count.toLocaleString()}</div>
                  <div style={{ width:32, fontSize:11, color:'#0BBFA3', fontWeight:700 }}>{pct}%</div>
                </div>
              );
            })}
          </div>
        </div>
      </div>

      {/* Media processing queue */}
      <div className="glass-card-solid" style={{ padding:24 }}>
        <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:20 }}>
          <div style={{ fontWeight:700, color:'#E8F4F1', fontSize:15 }}>S3 미디어 처리 파이프라인</div>
          <div style={{ display:'flex', gap:16 }}>
            <div style={{ display:'flex', alignItems:'center', gap:6, fontSize:12, color:'#4ADE80' }}><div style={{ width:8, height:8, borderRadius:'50%', background:'#4ADE80' }}/> 성공</div>
            <div style={{ display:'flex', alignItems:'center', gap:6, fontSize:12, color:'#0BBFA3' }}><div style={{ width:8, height:8, borderRadius:'50%', background:'#0BBFA3' }}/> 처리 중</div>
            <div style={{ display:'flex', alignItems:'center', gap:6, fontSize:12, color:'#F87171' }}><div style={{ width:8, height:8, borderRadius:'50%', background:'#F87171' }}/> 실패</div>
          </div>
        </div>
        <table className="data-table">
          <thead><tr><th>ID</th><th>유형</th><th>사용자</th><th>파일 크기</th><th>상태</th><th>처리 시각</th><th>액션</th></tr></thead>
          <tbody>
            {mediaQueue.map(m => (
              <tr key={m.id}>
                <td style={{ fontSize:12, fontFamily:'monospace', color:'#7AADA4' }}>{m.id}</td>
                <td><span className="badge badge-slate">{m.type}</span></td>
                <td>{m.user}</td>
                <td style={{ fontFamily:'monospace', fontSize:13 }}>{m.size}</td>
                <td>
                  {m.status==='success'    && <span className="badge badge-green">성공</span>}
                  {m.status==='processing' && <span className="badge badge-teal">처리 중</span>}
                  {m.status==='failed'     && <span className="badge badge-red">실패</span>}
                </td>
                <td style={{ fontSize:12, color:'#7AADA4' }}>{m.time}</td>
                <td>
                  {m.status==='failed' && (
                    <button className="btn-ghost" style={{ fontSize:11, padding:'5px 12px' }} onClick={() => onToast('재처리 큐에 추가되었습니다.', 'success')}>
                      <span style={{ display:'flex', alignItems:'center', gap:4 }}><Icon name="refresh" size={12}/>재처리</span>
                    </button>
                  )}
                </td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>
    </div>
  );
}

/* ── App ────────────────────────────────────────────────── */
function App() {
  const [page, setPage] = useState('dashboard');
  const [toast, setToast] = useState(null);

  const showToast = (msg, type='success') => setToast({ msg, type, key: Date.now() });

  const titles = {
    dashboard: '대시보드',
    'ranking-admin': '랭킹 관리',
    moderation: '신고·Q&A',
    analytics: '데이터 분석',
  };

  return (
    <div className="main-layout">
      <Sidebar active={page} onNav={setPage}/>
      <div className="content-area">
        <Topbar title={titles[page]} onBell={() => showToast('신규 신고 7건을 확인하세요.', 'warning')}/>
        {page==='dashboard'      && <DashboardPage    onToast={showToast}/>}
        {page==='ranking-admin'  && <RankingAdminPage onToast={showToast}/>}
        {page==='moderation'     && <ModerationPage   onToast={showToast}/>}
        {page==='analytics'      && <AnalyticsPage    onToast={showToast}/>}
      </div>
      {toast && <Toast key={toast.key} message={toast.msg} type={toast.type} onClose={() => setToast(null)}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
