  );
}

function Toast({ msg, onClose }) {
  useEffect(() => { const t = setTimeout(onClose, 3000); return () => clearTimeout(t); }, []);
  return (
    <div style={{
      position: 'fixed', top: 72, right: 20, zIndex: 9999,
      background: C.primary, color: '#fff', padding: '12px 18px',
      borderRadius: 10, boxShadow: '0 6px 24px rgba(13,148,136,0.28)',

        <polyline points="20 6 9 17 4 12"/>
      </svg>

    </div>
  );
}

function BookingWizard({ hospital, onClose, onToast }) {
  const [step, setStep] = useState(0);
  const [form, setForm] = useState({
    proc: '', date: '', persons: 1, name: '', nationality: '', contact: '', notes: '',
  });
  const steps = ['시술 선택', '날짜 선택', '인적사항', '확인'];

  const update = (k, v) => setForm(f => ({ ...f, [k]: v }));

  const handleSubmit = () => {
    onClose();
    onToast('예약 신청이 완료되었습니다. 24시간 내 담당 코디네이터가 연락드립니다.');
  };

  return (
    <>
      <div onClick={onClose} style={{ position: 'fixed', inset: 0, background: 'rgba(15,23,42,0.5)', zIndex: 1000, animation: 'fadeIn 0.2s ease' }} />
      <div style={{
        position: 'fixed', top: '50%', left: '50%', transform: 'translate(-50%, -50%)',
        zIndex: 1001, background: C.surface, borderRadius: 16, width: 520, maxHeight: '88vh',
        overflowY: 'auto', boxShadow: '0 24px 64px rgba(0,0,0,0.2)', animation: 'slideUp 0.3s ease',
      }}>
        <div style={{ padding: '28px 32px' }}>
          <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 24 }}>
            <div>
              <div style={{ fontSize: 18, fontWeight: 700 }}>온라인 예약 신청</div>
              {hospital && <div style={{ fontSize: 13, color: C.text2, marginTop: 2 }}>{hospital.name}</div>}
            </div>
            <button onClick={onClose} style={{ background: 'none', border: 'none', cursor: 'pointer', color: C.text2 }}>
              <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
            </button>
          </div>

          {/* Step indicators */}
          <div style={{ display: 'flex', marginBottom: 28, gap: 0 }}>
            {steps.map((s, i) => (
              <div key={i} style={{ flex: 1, display: 'flex', flexDirection: 'column', alignItems: 'center', position: 'relative' }}>
                {i < steps.length - 1 && (
                  <div style={{
                    position: 'absolute', top: 14, left: '50%', width: '100%',
                    height: 2, background: i < step ? C.primary : C.border, zIndex: 0,
                  }} />
                )}
                <div style={{
                  width: 28, height: 28, borderRadius: '50%', zIndex: 1,
                  background: i <= step ? C.primary : C.border,
                  display: 'flex', alignItems: 'center', justifyContent: 'center',
                  color: i <= step ? '#fff' : C.text3, fontSize: 12, fontWeight: 700,
                }}>{i < step ? '✓' : i + 1}</div>
                <div style={{ fontSize: 11, color: i <= step ? C.primary : C.text3, marginTop: 4, fontWeight: i === step ? 600 : 400 }}>{s}</div>
              </div>
            ))}
          </div>

          {/* Step content */}
          {step === 0 && (
            <div style={{ animation: 'slideUp 0.25s ease' }}>
              <div style={{ fontSize: 14, fontWeight: 600, marginBottom: 12 }}>희망 시술을 선택해 주세요</div>
              <div style={{ display: 'grid', gap: 8 }}>
                {(hospital ? hospital.procedures : procedures.map(p => p.name)).map(p => (
                  <label key={p} style={{
                    display: 'flex', alignItems: 'center', gap: 10, padding: '12px 14px',
                    border: `1.5px solid ${form.proc === p ? C.primary : C.border}`,
                    borderRadius: 10, cursor: 'pointer',
                    background: form.proc === p ? C.teal50 : C.surface,
                    transition: 'all 0.15s ease',
                  }}>
                    <input type="radio" name="proc" value={p} checked={form.proc === p} onChange={() => update('proc', p)} style={{ accentColor: C.primary }} />
                    <span style={{ fontSize: 14, color: C.text1, fontWeight: form.proc === p ? 600 : 400 }}>{p}</span>
                  </label>
                ))}
              </div>
            </div>
          )}

          {step === 1 && (
            <div style={{ animation: 'slideUp 0.25s ease' }}>
              <div style={{ fontSize: 14, fontWeight: 600, marginBottom: 12 }}>희망 방문 날짜</div>
              <input type="date" value={form.date} onChange={e => update('date', e.target.value)}
                min={new Date().toISOString().split('T')[0]}
                style={{
                  width: '100%', padding: '12px 14px', borderRadius: 10,
                  border: `1.5px solid ${C.border}`, fontSize: 14, color: C.text1,
                  outline: 'none', fontFamily: 'inherit',
                }} />
              <div style={{ marginTop: 16, fontSize: 14, fontWeight: 600, marginBottom: 8 }}>방문 인원 (본인 포함)</div>
              <div style={{ display: 'flex', gap: 8 }}>
                {[1, 2, 3, 4].map(n => (
                  <button key={n} onClick={() => update('persons', n)} style={{
                    flex: 1, padding: '10px 0', borderRadius: 8, cursor: 'pointer', fontSize: 14, fontWeight: 600,
                    border: `1.5px solid ${form.persons === n ? C.primary : C.border}`,
                    background: form.persons === n ? C.primaryLight : C.surface,
                    color: form.persons === n ? C.primary : C.text2,
                  }}>{n}명</button>
                ))}
              </div>
            </div>
          )}

          {step === 2 && (
            <div style={{ animation: 'slideUp 0.25s ease', display: 'grid', gap: 14 }}>
              {[
                { label: '이름 (여권 기재 영문)', key: 'name', ph: 'e.g. PARK JIYEON' },
                { label: '국적', key: 'nationality', ph: 'e.g. UAE, Russia, Kazakhstan' },
                { label: '연락처 (WhatsApp/Telegram)', key: 'contact', ph: '+82-10-0000-0000' },
              ].map(({ label, key, ph }) => (
                <div key={key}>
                  <label style={{ fontSize: 13, fontWeight: 600, color: C.text2, display: 'block', marginBottom: 6 }}>{label}</label>
                  <input
                    value={form[key]} onChange={e => update(key, e.target.value)}
                    placeholder={ph}
                    style={{
                      width: '100%', padding: '11px 14px', borderRadius: 10,
                      border: `1.5px solid ${C.border}`, fontSize: 14, outline: 'none', fontFamily: 'inherit',
                    }}
                  />
                </div>
              ))}
              <div>
                <label style={{ fontSize: 13, fontWeight: 600, color: C.text2, display: 'block', marginBottom: 6 }}>추가 요청사항 (선택)</label>
                <textarea value={form.notes} onChange={e => update('notes', e.target.value)}
                  placeholder="알레르기, 복용 중인 약물, 통역 필요 등"
                  rows={3}
                  style={{
                    width: '100%', padding: '11px 14px', borderRadius: 10,
                    border: `1.5px solid ${C.border}`, fontSize: 14, resize: 'vertical',
                    outline: 'none', fontFamily: 'inherit',
                  }} />
              </div>
            </div>
          )}

          {step === 3 && (
            <div style={{ animation: 'slideUp 0.25s ease' }}>
              <div style={{ background: C.teal50, borderRadius: 12, padding: 20, marginBottom: 16 }}>
                <div style={{ fontSize: 14, fontWeight: 700, color: C.primary, marginBottom: 14 }}>예약 내용 확인</div>
                {[
                  ['병원', hospital ? hospital.name : '미선택'],
                  ['시술', form.proc || '미선택'],
                  ['방문일', form.date || '미선택'],
                  ['인원', `${form.persons}명`],
                  ['이름', form.name || '-'],
                  ['국적', form.nationality || '-'],
                  ['연락처', form.contact || '-'],
                ].map(([k, v]) => (
                  <div key={k} style={{ display: 'flex', justifyContent: 'space-between', marginBottom: 8, fontSize: 13 }}>
                    <span style={{ color: C.text2 }}>{k}</span>
                    <span style={{ fontWeight: 600, color: C.text1 }}>{v}</span>
                  </div>
                ))}
              </div>
              <div style={{ fontSize: 12, color: C.text3, lineHeight: 1.6 }}>
                접수 후 24시간 내 코디네이터가 입력하신 연락처로 연락드립니다. 예약 확정 후 상세 안내가 진행됩니다.
              </div>
            </div>
          )}

          <div style={{ display: 'flex', gap: 10, marginTop: 24 }}>
            {step > 0 && (
              <button onClick={() => setStep(s => s - 1)} style={{
                flex: 1, padding: '12px 0', borderRadius: 10, border: `1.5px solid ${C.border}`,
                background: C.surface, color: C.text1, fontSize: 14, fontWeight: 600, cursor: 'pointer',
              }}>이전</button>
            )}
            {step < steps.length - 1 ? (
              <button onClick={() => setStep(s => s + 1)} style={{
                flex: 2, padding: '12px 0', borderRadius: 10, border: 'none',
                background: C.primary, color: '#fff', fontSize: 14, fontWeight: 700, cursor: 'pointer',
              }}>다음 단계</button>
            ) : (
              <button onClick={handleSubmit} style={{
                flex: 2, padding: '12px 0', borderRadius: 10, border: 'none',
                background: C.accent, color: '#fff', fontSize: 14, fontWeight: 700, cursor: 'pointer',
              }}>예약 신청 완료</button>
            )}
          </div>
        </div>
      </div>
    </>
  );
}

function CostEstimator() {
  const [selected, setSelected] = useState([]);
  const [nights, setNights] = useState(5);
  const [persons, setPersons] = useState(1);
  const [currency, setCurrency] = useState('KRW');

  const rates = { AED: 0.0027, RUB: 0.083, USD: 0.00075 };
  const symbols = { KRW: '₩', AED: 'AED', RUB: '₽', USD: '$' };

  const procTotal = selected.reduce((sum, p) => sum + (procedures.find(x => x.name === p)?.price || 0), 0) * 10000;
  const accommodation = nights * 150000 * persons;
  const transport = 300000 * persons;
  const total = procTotal + accommodation + transport;

  const toDisplay = (krw) => {
    if (currency === 'KRW') return `${(krw / 10000).toFixed(0)}만원`;
    const conv = krw * rates[currency];
    return `${symbols[currency]} ${conv.toLocaleString('en', { maximumFractionDigits: 0 })}`;
  };

  const toggleProc = (name) => {
    setSelected(prev => prev.includes(name) ? prev.filter(x => x !== name) : [...prev, name]);
  };

  return (
    <div style={{ animation: 'fadeIn 0.3s ease' }}>
      <div style={{ marginBottom: 24 }}>
        <h2 style={{ fontSize: 22, fontWeight: 700, marginBottom: 6 }}>비용 견적 계산기</h2>
        <p style={{ fontSize: 14, color: C.text2 }}>시술, 체류 일수, 인원을 선택하면 예상 비용을 즉시 확인할 수 있습니다.</p>
      </div>

      <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 24 }}>
        <div>
          <div style={{ marginBottom: 20 }}>
            <div style={{ fontSize: 14, fontWeight: 700, marginBottom: 12 }}>시술 항목 선택</div>
            {procedures.map(p => (
              <label key={p.name} style={{
                display: 'flex', alignItems: 'center', justifyContent: 'space-between',
                padding: '10px 14px', marginBottom: 6,
                background: selected.includes(p.name) ? C.teal50 : C.surface,
                border: `1.5px solid ${selected.includes(p.name) ? C.primary : C.border}`,
                borderRadius: 10, cursor: 'pointer', transition: 'all 0.15s ease',
              }}>
                <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
                  <input type="checkbox" checked={selected.includes(p.name)} onChange={() => toggleProc(p.name)} style={{ accentColor: C.primary }} />
                  <div>
                    <div style={{ fontSize: 13, fontWeight: 500, color: C.text1 }}>{p.name}</div>
                    <div style={{ fontSize: 11, color: C.text3 }}>{p.category}</div>
                  </div>
                </div>
                <span style={{ fontSize: 13, fontWeight: 600, color: C.primary }}>{p.price}만원~</span>
              </label>
            ))}
          </div>

          <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 14 }}>
            <div>
              <div style={{ fontSize: 14, fontWeight: 700, marginBottom: 8 }}>체류 일수</div>
              <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
                <button onClick={() => setNights(n => Math.max(1, n - 1))} style={{
                  width: 32, height: 32, borderRadius: '50%', border: `1px solid ${C.border}`,
                  background: C.surface, cursor: 'pointer', fontSize: 16, fontWeight: 700, color: C.primary,
                }}>-</button>
                <span style={{ fontSize: 18, fontWeight: 700, width: 32, textAlign: 'center' }}>{nights}</span>
                <button onClick={() => setNights(n => n + 1)} style={{
                  width: 32, height: 32, borderRadius: '50%', border: `1px solid ${C.border}`,
                  background: C.surface, cursor: 'pointer', fontSize: 16, fontWeight: 700, color: C.primary,
                }}>+</button>
                <span style={{ fontSize: 13, color: C.text2 }}>박</span>
              </div>
            </div>
            <div>
              <div style={{ fontSize: 14, fontWeight: 700, marginBottom: 8 }}>인원</div>
              <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
                <button onClick={() => setPersons(n => Math.max(1, n - 1))} style={{
                  width: 32, height: 32, borderRadius: '50%', border: `1px solid ${C.border}`,
                  background: C.surface, cursor: 'pointer', fontSize: 16, fontWeight: 700, color: C.primary,
                }}>-</button>
                <span style={{ fontSize: 18, fontWeight: 700, width: 32, textAlign: 'center' }}>{persons}</span>
                <button onClick={() => setPersons(n => n + 1)} style={{
                  width: 32, height: 32, borderRadius: '50%', border: `1px solid ${C.border}`,
                  background: C.surface, cursor: 'pointer', fontSize: 16, fontWeight: 700, color: C.primary,
                }}>+</button>
                <span style={{ fontSize: 13, color: C.text2 }}>명</span>
              </div>
            </div>
          </div>
        </div>

        <div>
          <div style={{ marginBottom: 12, display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
            <div style={{ fontSize: 14, fontWeight: 700 }}>예상 총 비용</div>
            <select value={currency} onChange={e => setCurrency(e.target.value)} style={{
              padding: '5px 10px', borderRadius: 6, border: `1px solid ${C.border}`,
              fontSize: 13, fontFamily: 'inherit', background: C.surface, cursor: 'pointer',
            }}>
              <option value="KRW">원화 (KRW)</option>
              <option value="AED">아랍 디르함 (AED)</option>
              <option value="RUB">러시아 루블 (RUB)</option>
              <option value="USD">미국 달러 (USD)</option>
            </select>
          </div>

          <div style={{ background: `linear-gradient(135deg, ${C.primary} 0%, ${C.primaryHover} 100%)`, borderRadius: 16, padding: 24, color: '#fff', marginBottom: 16 }}>
            <div style={{ fontSize: 13, opacity: 0.85, marginBottom: 4 }}>예상 합계</div>
            <div style={{ fontSize: 32, fontWeight: 800, letterSpacing: '-1px', animation: 'calcCount 0.3s ease' }}>{toDisplay(total)}</div>
            {currency !== 'KRW' && <div style={{ fontSize: 13, opacity: 0.8, marginTop: 4 }}>≈ {(total / 10000).toFixed(0)}만원 (참고)</div>}
          </div>

          {[
            { label: '시술 비용', value: procTotal, note: '예상 최소 금액' },
            { label: `숙박비 (${nights}박 × ${persons}명)`, value: accommodation, note: '3성급 기준' },
            { label: `교통비 (공항 픽업 포함)`, value: transport, note: `${persons}명 기준` },
          ].map(({ label, value, note }) => (
            <div key={label} style={{
              display: 'flex', justifyContent: 'space-between', alignItems: 'flex-end',
              padding: '12px 0', borderBottom: `1px solid ${C.border}`,
            }}>
              <div>
                <div style={{ fontSize: 13, color: C.text1 }}>{label}</div>
                <div style={{ fontSize: 11, color: C.text3 }}>{note}</div>
              </div>
              <span style={{ fontSize: 14, fontWeight: 600, color: C.primary }}>{toDisplay(value)}</span>
            </div>
          ))}

          <div style={{ marginTop: 16, background: '#FEF3C7', borderRadius: 10, padding: 14 }}>
            <div style={{ fontSize: 12, color: '#92400E', lineHeight: 1.6 }}>
              본 견적은 예상 비용으로, 실제 금액은 병원 상담 후 확정됩니다. 환율은 참고용이며 실시간 환율과 차이가 있을 수 있습니다.
            </div>
          </div>
        </div>
      </div>
    </div>
  );
}

      </div>
      <div style={{ fontSize: 13, color: C.text2, marginBottom: 16 }}>
        <span style={{ fontWeight: 600, color: C.primary }}>{filtered.length}개</span> 병원이 검색됩니다
      </div>
      <div style={{ display: 'grid', gridTemplateColumns: 'repeat(3, 1fr)', gap: 18 }}>
        {filtered.map((h, i) => (
          <HospitalCard key={h.id} h={h} onDetail={onDetail} onBook={onBook} delay={i * 60} />
        ))}
      </div>
    </div>
  );
}

function App() {
  const [tab, setTab] = useState('search');
  const [lang, setLang] = useState('KO');
  const [detail, setDetail] = useState(null);
  const [booking, setBooking] = useState(null);
  const [toast, setToast] = useState(null);

  const showToast = useCallback(msg => setToast(msg), []);

  return (
    <div style={{ width: '100%', minHeight: '100vh', display: 'flex', flexDirection: 'column', background: C.bg }}>
      {toast && <Toast msg={toast} onClose={() => setToast(null)} />}

      {/* Top Nav */}
      <header style={{
        background: C.surface, borderBottom: `1px solid ${C.border}`,
        position: 'sticky', top: 0, zIndex: 800,
        boxShadow: '0 1px 8px rgba(0,0,0,0.06)',
      }}>
        <div style={{ maxWidth: 1200, margin: '0 auto', padding: '0 28px', display: 'flex', alignItems: 'center', height: 60, gap: 32 }}>
          <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
            <div style={{ width: 34, height: 34, borderRadius: 8, background: C.primary, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#fff" strokeWidth="2.5">
                <path d="M22 12h-4l-3 9L9 3l-3 9H2"/>
              </svg>
            </div>
            <span style={{ fontSize: 17, fontWeight: 800, color: C.text1 }}>MediTrip Korea</span>
          </div>

          <nav style={{ display: 'flex', gap: 4 }}>
            {[
              { key: 'search', label: '병원 검색' },
              { key: 'estimator', label: '비용 견적 계산기' },
            ].map(({ key, label }) => (
              <button key={key} onClick={() => setTab(key)} style={{
                padding: '8px 16px', borderRadius: 8, border: 'none', cursor: 'pointer',
                background: tab === key ? C.primaryLight : 'transparent',
                color: tab === key ? C.primary : C.text2,
                fontWeight: tab === key ? 700 : 400,
                fontSize: 14, fontFamily: 'inherit',
                transition: 'all 0.15s ease',
              }}>{label}</button>
            ))}
          </nav>

          <div style={{ marginLeft: 'auto', display: 'flex', alignItems: 'center', gap: 12 }}>
            <button onClick={() => setBooking({ hospital: null })} style={{
              padding: '8px 16px', borderRadius: 8, border: `1.5px solid ${C.accent}`,
              background: C.accent, color: '#fff', fontWeight: 700, fontSize: 13,
              cursor: 'pointer', fontFamily: 'inherit',
            }}>예약 신청</button>

            <select value={lang} onChange={e => setLang(e.target.value)} style={{
              padding: '7px 12px', borderRadius: 8, border: `1px solid ${C.border}`,
              fontSize: 13, fontFamily: 'inherit', background: C.surface, cursor: 'pointer',
            }}>
              <option value="KO">한국어</option>
              <option value="AR">عربي</option>
              <option value="RU">Русский</option>
            </select>
          </div>
        </div>
      </header>

      {/* Main content */}
      <main style={{ flex: 1, width: '100%' }}>
        <div style={{ maxWidth: 1200, margin: '0 auto', padding: '32px 28px' }}>
          {tab === 'search' && (
            <HospitalSearch onDetail={h => setDetail(h)} onBook={h => setBooking({ hospital: h })} />
          )}
          {tab === 'estimator' && <CostEstimator />}
        </div>
      </main>

      {/* Footer */}
      <footer style={{
        background: C.text1, color: 'rgba(255,255,255,0.7)',
        padding: '24px 28px', marginTop: 'auto',
      }}>
        <div style={{ maxWidth: 1200, margin: '0 auto', display: 'flex', justifyContent: 'space-between', fontSize: 13 }}>
          <div>
            <div style={{ fontWeight: 700, color: '#fff', marginBottom: 4 }}>MediTrip Korea</div>
            <div>글로벌 의료관광 마켓플레이스 — 구현 데모</div>
          </div>
          <div style={{ textAlign: 'right' }}>
            <div>GCC · CIS 지역 외국인 환자 전문</div>
            <div>contact@meditrip-korea.demo</div>
          </div>
        </div>
      </footer>

      {/* Drawers & Modals */}
      {detail && (
        <HospitalDetailDrawer h={detail} onClose={() => setDetail(null)} onBook={h => { setDetail(null); setBooking({ hospital: h }); }} />
      )}
      {booking && (
        <BookingWizard hospital={booking.hospital} onClose={() => setBooking(null)} onToast={showToast} />
      )}
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
