function Badge({ status, text }) {
  const conf = statusConf[status] || { label: text || status, bg: C.primaryLight, color: C.primary };
  return (
    <span style={{
      background: conf.bg, color: conf.color,
      fontSize: 11, fontWeight: 700, padding: '3px 9px', borderRadius: 20, letterSpacing: '0.2px',
    }}>{conf.label}</span>
  );
}

function Toast({ msg, type = 'success', onClose }) {
  useEffect(() => { const t = setTimeout(onClose, 3200); return () => clearTimeout(t); }, []);
  const bg = type === 'success' ? C.success : type === 'error' ? C.error : C.primary;
  return (
    <div style={{
      position: 'fixed', top: 68, right: 20, zIndex: 9999,
      background: bg, color: '#fff', padding: '11px 18px',
      borderRadius: 8, boxShadow: `0 4px 20px ${bg}40`,
      animation: 'toastRight 0.25s ease', fontSize: 13, fontWeight: 600,
      display: 'flex', alignItems: 'center', gap: 8, minWidth: 260,
    }}>
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5">
        <polyline points="20 6 9 17 4 12"/>
      </svg>
      {msg}
    </div>
  );
}

function StatCard({ label, value, sub, color = C.primary }) {
  return (
    <div style={{
      background: C.surface, border: `1px solid ${C.border}`, borderRadius: 8,
      padding: '18px 20px', animation: 'slideDown 0.3s ease',
    }}>
      <div style={{ fontSize: 12, color: C.text2, fontWeight: 600, marginBottom: 8, textTransform: 'uppercase', letterSpacing: '0.5px' }}>{label}</div>
      <div style={{ fontSize: 28, fontWeight: 800, color, letterSpacing: '-0.5px' }}>{value}</div>
      {sub && <div style={{ fontSize: 12, color: C.text2, marginTop: 4 }}>{sub}</div>}
    </div>
  );
}

function ReviewModeration({ onToast }) {
  const [rvData, setRvData] = useState(reviews);

  const [rejectReason, setRejectReason] = useState('');
  const [rejectOpen, setRejectOpen] = useState(false);

  const filtered = rvData.filter(r => filter === '전체' || r.status === filter);

  const approve = (id) => {
    setRvData(prev => prev.map(r => r.id === id ? { ...r, status: 'approved' } : r));
    setSelected(null);
    onToast('후기가 승인되었습니다. 병원 상세 페이지에 즉시 반영됩니다.');
  };

  const reject = (id) => {
    setRvData(prev => prev.map(r => r.id === id ? { ...r, status: 'rejected', reject_reason: rejectReason || '운영 정책 위반' } : r));
    setSelected(null);
    setRejectOpen(false);
    setRejectReason('');
    onToast('후기가 반려 처리되었습니다.', 'error');

    <div style={{ animation: 'fadeIn 0.3s ease' }}>

          return (
            <button key={s} onClick={() => setFilter(s)} style={{
              padding: '6px 14px', borderRadius: 6, fontSize: 12, fontWeight: 600, cursor: 'pointer',

          <div key={r.id} onClick={() => setSelected(r)} style={{
            background: C.surface, border: `1.5px solid ${selected?.id === r.id ? C.primary : C.border}`,
            borderRadius: 8, padding: '16px 20px', cursor: 'pointer',
            animation: `rowIn 0.3s ease ${i * 60}ms both`,

                <label key={r} style={{ display: 'flex', alignItems: 'center', gap: 8, padding: '8px 0', cursor: 'pointer', fontSize: 13 }}>
                  <input type="radio" name="reason" value={r} onChange={() => setRejectReason(r)} style={{ accentColor: C.error }} />
                  {r}
                </label>
              ))}
            </div>
            <textarea value={rejectReason} onChange={e => setRejectReason(e.target.value)}
              placeholder="기타 사유를 직접 입력하세요 (선택)"
              rows={3} style={{ width: '100%', padding: '10px 12px', borderRadius: 6, border: `1px solid ${C.border}`, fontSize: 13, resize: 'vertical', fontFamily: 'inherit', outline: 'none' }} />
            <div style={{ display: 'flex', gap: 8, marginTop: 14 }}>
              <button onClick={() => reject(selected.id)} style={{
                flex: 2, padding: '10px 0', borderRadius: 7, border: 'none',
                background: C.error, color: '#fff', fontSize: 13, fontWeight: 700, cursor: 'pointer',
              }}>반려 처리</button>
              <button onClick={() => setRejectOpen(false)} style={{
                flex: 1, padding: '10px 0', borderRadius: 7, border: `1px solid ${C.border}`,
                background: C.surface, fontSize: 13, cursor: 'pointer', fontFamily: 'inherit', color: C.text2,
              }}>취소</button>
            </div>
          </div>
        </>
      )}
    </div>
  );
}

  const showToast = useCallback((msg, type = 'success') => { setToast(msg); setToastType(type); }, []);

  const navItems = [
    { key: 'hospitals', label: '병원 관리' },
    { key: 'reservations', label: '예약 관리' },
    { key: 'reviews', label: '후기 승인' },
    { key: 'content', label: '콘텐츠 관리' },
  ];

  return (
    <div style={{ width: '100%', minHeight: '100vh', display: 'flex', flexDirection: 'column', background: C.bg }}>
      {toast && <Toast msg={toast} type={toastType} onClose={() => setToast(null)} />}

      {/* Global Top Nav */}
      <header style={{
        background: C.surface, borderBottom: `1px solid ${C.border}`,
        position: 'sticky', top: 0, zIndex: 800,
        boxShadow: '0 1px 6px rgba(0,0,0,0.04)',
      }}>
        <div style={{ maxWidth: 1280, margin: '0 auto', padding: '0 28px', display: 'flex', alignItems: 'center', height: 58, gap: 0 }}>
          <div style={{ display: 'flex', alignItems: 'center', gap: 8, marginRight: 36, flexShrink: 0 }}>
            <div style={{ width: 30, height: 30, borderRadius: 6, background: C.primary, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#fff" strokeWidth="2.5">
                <rect x="3" y="3" width="18" height="18" rx="2"/><path d="M9 9h6M9 13h6M9 17h4"/>
              </svg>
            </div>
            <span style={{ fontSize: 16, fontWeight: 800, color: C.text1 }}>MediTrip 어드민</span>
          </div>

          <nav style={{ display: 'flex', flex: 1 }}>
            {navItems.map(({ key, label }) => (
              <button key={key} onClick={() => setPage(key)} style={{
                padding: '6px 16px', background: 'none', border: 'none', cursor: 'pointer',
                color: page === key ? C.primary : C.text2,
                fontWeight: page === key ? 700 : 400,
                fontSize: 14, fontFamily: 'inherit', position: 'relative',
                borderBottom: page === key ? `2.5px solid ${C.primary}` : '2.5px solid transparent',
                marginBottom: -1, transition: 'color 0.15s ease',
              }}>{label}</button>
            ))}
          </nav>

          <div style={{ display: 'flex', alignItems: 'center', gap: 12 }}>
            <div style={{
              background: C.warningLight, color: C.warning, fontSize: 11, fontWeight: 700,
              padding: '4px 10px', borderRadius: 12, cursor: 'pointer',
              animation: 'badgePulse 2.5s ease infinite',
            }}>
              대기 중 {reservations.filter(r => r.status === 'pending').length + reviews.filter(r => r.status === 'pending').length}건
            </div>
            <div style={{ display: 'flex', alignItems: 'center', gap: 8, cursor: 'pointer' }}>
              <div style={{ width: 30, height: 30, borderRadius: '50%', background: C.primaryLight, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
                <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke={C.primary} strokeWidth="2">
                  <path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/>
                </svg>
              </div>
              <span style={{ fontSize: 13, fontWeight: 600, color: C.text1 }}>관리자</span>
            </div>
          </div>
        </div>
      </header>

      {/* Main Content */}
      <main style={{ flex: 1, width: '100%' }}>
        <div style={{ maxWidth: 1280, margin: '0 auto', padding: '28px 28px' }}>
          <div style={{ marginBottom: 20 }}>
            <h1 style={{ fontSize: 20, fontWeight: 800, color: C.text1, marginBottom: 3 }}>
              {navItems.find(n => n.key === page)?.label}
            </h1>
            <div style={{ fontSize: 13, color: C.text2 }}>글로벌 의료관광 마켓플레이스 — 운영 관리 패널</div>
          </div>

          {page === 'hospitals' && <HospitalManagement onToast={showToast} />}
          {page === 'reservations' && <ReservationManagement onToast={showToast} />}
          {page === 'reviews' && <ReviewModeration onToast={showToast} />}
          {page === 'content' && <ContentManagement onToast={showToast} />}
        </div>
      </main>

      {/* Footer */}
      <footer style={{ background: C.surface, borderTop: `1px solid ${C.border}`, padding: '14px 28px', marginTop: 'auto' }}>
        <div style={{ maxWidth: 1280, margin: '0 auto', display: 'flex', justifyContent: 'space-between', fontSize: 12, color: C.text3 }}>
          <span>MediTrip Admin — 구현 데모 v1.0</span>
          <span>데이터는 모두 더미 데이터입니다</span>
        </div>
      </footer>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
