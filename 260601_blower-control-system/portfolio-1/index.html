<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>하수처리장 AI 송풍기 최적 제어 시스템 — 맞춤 구현 데모</title>
<link rel="preconnect" href="https://cdn.jsdelivr.net">
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" rel="stylesheet">
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://unpkg.com/prop-types@15.8.1/prop-types.min.js"></script>
<script src="https://unpkg.com/react-is@18.2.0/umd/react-is.production.min.js"></script>
<script src="https://unpkg.com/recharts@2.12.7/umd/Recharts.js"></script>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body,#root{width:100%;min-height:100vh;font-family:'Pretendard',sans-serif}
body{background:#F0F7F7;color:#1A2E2E}
.sidebar{position:fixed;left:0;top:0;bottom:0;width:240px;background:#fff;border-right:1px solid #D4EAEA;display:flex;flex-direction:column;z-index:100}
.main-wrap{margin-left:240px;min-height:100vh;flex:1;min-width:0;width:calc(100% - 240px);background:#F0F7F7}
.topbar{height:60px;background:#fff;border-bottom:1px solid #D4EAEA;display:flex;align-items:center;padding:0 24px;gap:12px}
.content{padding:24px}
.card{background:#fff;border:1px solid #D4EAEA;border-radius:8px;padding:20px}
.card-sm{background:#fff;border:1px solid #D4EAEA;border-radius:8px;padding:16px}
.kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:24px}
.chart-row{display:grid;grid-template-columns:2fr 1fr;gap:16px;margin-bottom:24px}
.badge{display:inline-flex;align-items:center;gap:4px;padding:3px 8px;border-radius:4px;font-size:12px;font-weight:600}
.badge-ok{background:#E6F7F5;color:#0D7A6A}
.badge-warn{background:#FEF3C7;color:#92400E}
.badge-err{background:#FEE2E2;color:#991B1B}
.badge-info{background:#EFF6FF;color:#1D4ED8}
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:6px;border:none;cursor:pointer;font-size:13px;font-weight:600;font-family:'Pretendard',sans-serif;transition:all .15s}
.btn-primary{background:#1A7A7A;color:#fff}
.btn-primary:hover{background:#155F5F}
.btn-secondary{background:#fff;color:#1A7A7A;border:1px solid #1A7A7A}
.btn-secondary:hover{background:#F0F7F7}
.btn-danger{background:#EF4444;color:#fff}
.btn-danger:hover{background:#DC2626}
.btn-sm{padding:5px 10px;font-size:12px}
table{width:100%;border-collapse:collapse;font-size:13px}
thead tr{border-bottom:2px solid #D4EAEA}
th{padding:10px 12px;text-align:left;color:#4A6A6A;font-weight:600;font-size:12px;text-transform:uppercase;letter-spacing:.4px}
td{padding:10px 12px;border-bottom:1px solid #F0F7F7;color:#1A2E2E}
tr:hover td{background:#F8FDFD}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:500;display:flex;align-items:center;justify-content:center;animation:fadeIn .2s ease}
.modal{background:#fff;border-radius:8px;padding:28px;width:520px;max-width:90vw;box-shadow:0 20px 60px rgba(0,0,0,.15);animation:slideUp .25s ease}
.drawer{position:fixed;right:0;top:0;bottom:0;width:480px;background:#fff;box-shadow:-8px 0 32px rgba(0,0,0,.1);z-index:400;padding:28px;overflow-y:auto;animation:slideInRight .25s ease}
.form-group{margin-bottom:16px}
.form-label{display:block;font-size:13px;font-weight:600;color:#1A2E2E;margin-bottom:6px}
.form-input{width:100%;padding:9px 12px;border:1px solid #D4EAEA;border-radius:6px;font-size:13px;font-family:'Pretendard',sans-serif;color:#1A2E2E;outline:none;transition:border-color .15s}
.form-input:focus{border-color:#1A7A7A}
.form-select{width:100%;padding:9px 12px;border:1px solid #D4EAEA;border-radius:6px;font-size:13px;font-family:'Pretendard',sans-serif;color:#1A2E2E;outline:none;background:#fff;cursor:pointer}
input[type=range]{width:100%;accent-color:#1A7A7A}
.toast{position:fixed;bottom:24px;right:24px;background:#1A2E2E;color:#fff;padding:12px 20px;border-radius:8px;font-size:13px;z-index:999;animation:toastIn .3s ease;box-shadow:0 4px 16px rgba(0,0,0,.2)}
.sep{height:1px;background:#D4EAEA;margin:8px 0}
.mode-btn{flex:1;padding:10px;border:2px solid #D4EAEA;border-radius:6px;background:#fff;cursor:pointer;font-size:13px;font-weight:600;font-family:'Pretendard',sans-serif;transition:all .2s;color:#4A6A6A}
.mode-btn.active-auto{border-color:#1A7A7A;background:#E6F7F5;color:#1A7A7A}
.mode-btn.active-manual{border-color:#F59E0B;background:#FEF3C7;color:#92400E}
.mode-btn.active-stop{border-color:#EF4444;background:#FEE2E2;color:#991B1B}
.pulse{animation:pulse 2s infinite}
.prog-bar{height:6px;background:#D4EAEA;border-radius:3px;overflow:hidden}
.prog-fill{height:100%;background:linear-gradient(90deg,#1A7A7A,#00C4B4);border-radius:3px;transition:width .6s ease}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideUp{from{transform:translateY(20px);opacity:0}to{transform:translateY(0);opacity:1}}
@keyframes slideInRight{from{transform:translateX(100%)}to{transform:translateX(0)}}
@keyframes toastIn{from{transform:translateY(10px);opacity:0}to{transform:translateY(0);opacity:1}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
@keyframes fadeSlideIn{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}
@keyframes blink{0%,100%{background:#2DC4A4}50%{background:#1A7A7A}}
@keyframes ripple{0%{transform:scale(0);opacity:.6}100%{transform:scale(2.5);opacity:0}}
@keyframes countUp{from{opacity:0;transform:scale(.8)}to{opacity:1;transform:scale(1)}}
@keyframes gradientShift{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;
const { AreaChart, Area, LineChart, Line, BarChart, Bar, ComposedChart,
        XAxis, YAxis, CartesianGrid, Tooltip, Legend, ResponsiveContainer, ReferenceLine, ReferenceArea } = Recharts;

// ── 더미 데이터 ──────────────────────────────────────────────
const NOW_TIMES = Array.from({length:30},(_,i)=>{
  const d=new Date(2026,5,1,6,0,0);d.setMinutes(d.getMinutes()+i*2);
  return `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
});

function genSeries(base,amp,len=30){
  return Array.from({length:len},(_,i)=>+(base+amp*(Math.sin(i*0.4)+Math.random()*0.4-0.2)).toFixed(2));
}

const INIT_LOAD = genSeries(2800,320);
const INIT_DO   = genSeries(2.1,0.4);
const INIT_FREQ = genSeries(38,4);

const CMD_LOGS = [
  {id:1,time:'06:42:15',cmd:'주파수 목표값 설정',value:'38.5 Hz',status:'성공',mode:'자동'},
  {id:2,time:'06:40:02',cmd:'주파수 목표값 설정',value:'37.2 Hz',status:'성공',mode:'자동'},
  {id:3,time:'06:35:48',cmd:'DO 목표값 변경',value:'2.0 mg/L',status:'성공',mode:'자동'},
  {id:4,time:'06:30:00',cmd:'수동 주파수 설정',value:'40.0 Hz',status:'성공',mode:'수동'},
  {id:5,time:'06:25:11',cmd:'자동 모드 전환',value:'—',status:'성공',mode:'자동'},
  {id:6,time:'06:20:33',cmd:'주파수 목표값 설정',value:'35.8 Hz',status:'실패',mode:'자동'},
];

const HIST_DATA = [
  {date:'2026-05-26',avgLoad:2750,avgDO:2.05,avgFreq:37.2,minDO:1.8,maxDO:2.4},
  {date:'2026-05-27',avgLoad:2910,avgDO:2.18,avgFreq:38.9,minDO:1.9,maxDO:2.6},
  {date:'2026-05-28',avgLoad:2640,avgDO:1.97,avgFreq:36.5,minDO:1.7,maxDO:2.2},
  {date:'2026-05-29',avgLoad:3050,avgDO:2.35,avgFreq:40.1,minDO:2.0,maxDO:2.8},
  {date:'2026-05-30',avgLoad:2820,avgDO:2.12,avgFreq:38.0,minDO:1.85,maxDO:2.5},
  {date:'2026-05-31',avgLoad:2980,avgDO:2.28,avgFreq:39.4,minDO:1.95,maxDO:2.7},
  {date:'2026-06-01',avgLoad:2800,avgDO:2.10,avgFreq:38.5,minDO:1.8,maxDO:2.4},
];

const PARAMS_INIT = [
  {id:1,name:'BOD 가중치 (w₁)',value:0.42,min:0,max:1,step:0.01,desc:'생물학적 산소 요구량 입력 가중치'},
  {id:2,name:'SS 가중치 (w₂)',value:0.31,min:0,max:1,step:0.01,desc:'부유 고형물 입력 가중치'},
  {id:3,name:'유량 가중치 (w₃)',value:0.27,min:0,max:1,step:0.01,desc:'유입 유량 입력 가중치'},
  {id:4,name:'DO 기본값 (mg/L)',value:2.0,min:0.5,max:4.0,step:0.1,desc:'포기조 DO 목표 기본값'},
  {id:5,name:'HRT 계수 (θ)',value:1.08,min:1.0,max:1.2,step:0.01,desc:'수리학적 체류시간 온도 보정 계수'},
  {id:6,name:'질산화 계수 (μ)',value:0.75,min:0.5,max:1.0,step:0.01,desc:'질산화 속도 보정 계수'},
];

// ── 아이콘 래퍼 ─────────────────────────────────────────────
function Icon({name,size=16,color,style={}}) {
  const ref=useRef();
  useEffect(()=>{
    if(ref.current&&window.lucide){
      ref.current.innerHTML='';
      const el=document.createElement('i');
      el.setAttribute('data-lucide',name);
      el.style.display='inline-flex';
      ref.current.appendChild(el);
      window.lucide.createIcons({nameAttr:'data-lucide',nodes:[el]});
      const svg=ref.current.querySelector('svg');
      if(svg){svg.setAttribute('width',size);svg.setAttribute('height',size);if(color)svg.style.color=color;}
    }
  },[name,size,color]);
  return <span ref={ref} style={{display:'inline-flex',alignItems:'center',...style}}/>;
}

// ── KPI 카드 ────────────────────────────────────────────────
function KpiCard({icon,label,value,unit,status,trend}){
  return (
    <div className="card-sm" style={{animation:'countUp .4s ease'}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:12}}>
        <div style={{width:36,height:36,background:'#E6F7F5',borderRadius:8,display:'flex',alignItems:'center',justifyContent:'center'}}>
          <Icon name={icon} size={18} color="#1A7A7A"/>
        </div>
        <span className={`badge ${status==='정상'?'badge-ok':status==='경고'?'badge-warn':'badge-info'}`}>
          {status}
        </span>
      </div>
      <div style={{fontSize:26,fontWeight:700,color:'#1A2E2E',letterSpacing:'-0.5px'}}>
        {value}<span style={{fontSize:14,fontWeight:500,color:'#4A6A6A',marginLeft:4}}>{unit}</span>
      </div>
      <div style={{fontSize:12,color:'#4A6A6A',marginTop:4}}>{label}</div>
      {trend&&<div style={{fontSize:11,color:trend>0?'#0D7A6A':'#EF4444',marginTop:4,fontWeight:600}}>
        {trend>0?'▲':'▼'} {Math.abs(trend)} 전시간 대비
      </div>}
    </div>
  );
}

// ── Toast ──────────────────────────────────────────────────
function Toast({msg,onClose}){
  useEffect(()=>{const t=setTimeout(onClose,2800);return()=>clearTimeout(t);},[]);
  return <div className="toast">{msg}</div>;
}

// ── SIDEBAR ────────────────────────────────────────────────
const MENU=[
  {id:'main',icon:'layout-dashboard',label:'실시간 AI 예측 대시보드'},
  {id:'prediction',icon:'brain-circuit',label:'예측 모델 설정'},
  {id:'control',icon:'sliders-horizontal',label:'제어 명령 인터페이스'},
  {id:'history',icon:'chart-line',label:'이력 데이터 조회'},
];

function Sidebar({active,onNav}){
  return (
    <aside className="sidebar">
      <div style={{padding:'20px 20px 16px'}}>
        <div style={{display:'flex',alignItems:'center',gap:10}}>
          <div style={{width:32,height:32,background:'linear-gradient(135deg,#1A7A7A,#00C4B4)',borderRadius:8,display:'flex',alignItems:'center',justifyContent:'center'}}>
            <Icon name="wind" size={16} color="#fff"/>
          </div>
          <div>
            <div style={{fontSize:13,fontWeight:700,color:'#1A2E2E',lineHeight:1.2}}>BlowerAI</div>
            <div style={{fontSize:10,color:'#4A6A6A'}}>송풍기 최적 제어</div>
          </div>
        </div>
      </div>
      <div className="sep" style={{margin:'0 20px 12px'}}/>
      <div style={{padding:'0 12px',flex:1}}>
        {MENU.map(m=>(
          <button key={m.id} onClick={()=>onNav(m.id)} style={{
            width:'100%',display:'flex',alignItems:'center',gap:10,padding:'10px 12px',
            border:'none',borderRadius:6,cursor:'pointer',marginBottom:2,
            background:active===m.id?'#E6F7F5':'transparent',
            color:active===m.id?'#1A7A7A':'#4A6A6A',
            fontFamily:'Pretendard,sans-serif',fontSize:13,fontWeight:active===m.id?600:400,
            transition:'all .15s',textAlign:'left'
          }}>
            <Icon name={m.icon} size={15} color={active===m.id?'#1A7A7A':'#4A6A6A'}/>
            {m.label}
          </button>
        ))}
      </div>
      <div className="sep" style={{margin:'8px 20px'}}/>
      <div style={{padding:'8px 12px 20px'}}>
        <div style={{display:'flex',alignItems:'center',gap:8,padding:'10px 12px',borderRadius:6,background:'#F0F7F7'}}>
          <div style={{width:28,height:28,background:'#1A7A7A',borderRadius:'50%',display:'flex',alignItems:'center',justifyContent:'center'}}>
            <Icon name="user" size={13} color="#fff"/>
          </div>
          <div>
            <div style={{fontSize:12,fontWeight:600,color:'#1A2E2E'}}>박운영</div>
            <div style={{fontSize:10,color:'#4A6A6A'}}>운영 담당자</div>
          </div>
        </div>
      </div>
    </aside>
  );
}

// ── 실시간 AI 예측 대시보드 ─────────────────────────────────
function MainScreen(){
  const [data,setData]=useState({load:INIT_LOAD,doVal:INIT_DO,freq:INIT_FREQ});
  const [kpi,setKpi]=useState({load:2800,doNow:2.10,freq:38.5,power:142.3});
  const [tick,setTick]=useState(0);

  useEffect(()=>{
    const id=setInterval(()=>{
      setTick(t=>t+1);
      setData(prev=>{
        const addPt=(arr,base,amp)=>{
          const next=+(base+amp*(Math.sin(Date.now()*0.001)+Math.random()*0.3-0.15)).toFixed(2);
          return [...arr.slice(1),next];
        };
        return {load:addPt(prev.load,2800,280),doVal:addPt(prev.doVal,2.1,0.35),freq:addPt(prev.freq,38,3.5)};
      });
      setKpi(prev=>({
        load:+(prev.load+(Math.random()*80-40)).toFixed(0),
        doNow:+(prev.doNow+(Math.random()*0.08-0.04)).toFixed(2),
        freq:+(prev.freq+(Math.random()*0.4-0.2)).toFixed(1),
        power:+(prev.power+(Math.random()*1.2-0.6)).toFixed(1)
      }));
    },3000);
    return()=>clearInterval(id);
  },[]);

  const chartData=NOW_TIMES.map((t,i)=>({time:t,예측부하:data.load[i],DO수치:data.doVal[i],주파수목표:data.freq[i]}));

  return (
    <div className="content">
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:20}}>
        <div>
          <div style={{fontSize:20,fontWeight:700,color:'#1A2E2E'}}>실시간 AI 예측 대시보드</div>
          <div style={{fontSize:12,color:'#4A6A6A',marginTop:2}}>5초 주기 센서 데이터 스트리밍 중</div>
        </div>
        <div style={{display:'flex',alignItems:'center',gap:8}}>
          <div style={{width:8,height:8,borderRadius:'50%',background:'#2DC4A4',animation:'blink 1.5s infinite'}}/>
          <span style={{fontSize:12,color:'#0D7A6A',fontWeight:600}}>LIVE</span>
        </div>
      </div>

      <div className="kpi-grid">
        <KpiCard icon="activity" label="유입 부하 예측값 (mg/L·m³)" value={kpi.load.toLocaleString()} unit="m³/d" status="정상" trend={+12}/>
        <KpiCard icon="droplets" label="현재 DO 수치 (포기조)" value={kpi.doNow.toFixed(2)} unit="mg/L" status={kpi.doNow<1.8?'경고':'정상'}/>
        <KpiCard icon="zap" label="송풍기 주파수 목표값" value={kpi.freq.toFixed(1)} unit="Hz" status="정상" trend={-0.3}/>
        <KpiCard icon="gauge" label="추정 전력 소비" value={kpi.power.toFixed(1)} unit="kW" status="정보"/>
      </div>

      <div className="chart-row">
        <div className="card">
          <div style={{fontSize:13,fontWeight:600,color:'#1A2E2E',marginBottom:16}}>유입 부하 예측 시계열 (최근 60분)</div>
          <div style={{height:220,position:'relative'}}>
            <ResponsiveContainer width="100%" height="100%">
              <AreaChart data={chartData}>
                <defs>
                  <linearGradient id="loadGrad" x1="0" y1="0" x2="0" y2="1">
                    <stop offset="5%" stopColor="#1A7A7A" stopOpacity={0.2}/>
                    <stop offset="95%" stopColor="#1A7A7A" stopOpacity={0}/>
                  </linearGradient>
                </defs>
                <CartesianGrid strokeDasharray="3 3" stroke="#E8F0F0"/>
                <XAxis dataKey="time" tick={{fontSize:10,fill:'#4A6A6A'}} interval={4}/>
                <YAxis tick={{fontSize:10,fill:'#4A6A6A'}} domain={[2000,3600]}/>
                <Tooltip contentStyle={{fontSize:12,borderRadius:6,border:'1px solid #D4EAEA'}}/>
                <Area type="monotone" dataKey="예측부하" stroke="#1A7A7A" strokeWidth={2} fill="url(#loadGrad)"/>
              </AreaChart>
            </ResponsiveContainer>
          </div>
        </div>
        <div className="card">
          <div style={{fontSize:13,fontWeight:600,color:'#1A2E2E',marginBottom:16}}>DO 수치 추이</div>
          <div style={{height:220,position:'relative'}}>
            <ResponsiveContainer width="100%" height="100%">
              <LineChart data={chartData}>
                <CartesianGrid strokeDasharray="3 3" stroke="#E8F0F0"/>
                <XAxis dataKey="time" tick={{fontSize:10,fill:'#4A6A6A'}} interval={6}/>
                <YAxis tick={{fontSize:10,fill:'#4A6A6A'}} domain={[1.2,3.0]}/>
                <Tooltip contentStyle={{fontSize:12,borderRadius:6}}/>
                <ReferenceLine y={1.8} stroke="#F59E0B" strokeDasharray="4 2" label={{value:'최소',fontSize:10,fill:'#F59E0B'}}/>
                <ReferenceLine y={2.8} stroke="#EF4444" strokeDasharray="4 2" label={{value:'최대',fontSize:10,fill:'#EF4444'}}/>
                <Line type="monotone" dataKey="DO수치" stroke="#2D9CDB" strokeWidth={2} dot={false}/>
              </LineChart>
            </ResponsiveContainer>
          </div>
        </div>
      </div>

      <div className="card">
        <div style={{fontSize:13,fontWeight:600,color:'#1A2E2E',marginBottom:16}}>송풍기 주파수 목표값 추이</div>
        <div style={{height:160,position:'relative'}}>
          <ResponsiveContainer width="100%" height="100%">
            <AreaChart data={chartData}>
              <defs>
                <linearGradient id="freqGrad" x1="0" y1="0" x2="0" y2="1">
                  <stop offset="5%" stopColor="#00C4B4" stopOpacity={0.15}/>
                  <stop offset="95%" stopColor="#00C4B4" stopOpacity={0}/>
                </linearGradient>
              </defs>
              <CartesianGrid strokeDasharray="3 3" stroke="#E8F0F0"/>
              <XAxis dataKey="time" tick={{fontSize:10,fill:'#4A6A6A'}} interval={4}/>
              <YAxis tick={{fontSize:10,fill:'#4A6A6A'}} domain={[30,50]}/>
              <Tooltip contentStyle={{fontSize:12,borderRadius:6}}/>
              <Area type="monotone" dataKey="주파수목표" stroke="#00C4B4" strokeWidth={2} fill="url(#freqGrad)"/>
            </AreaChart>
          </ResponsiveContainer>

}

// ── 제어 명령 인터페이스 ────────────────────────────────────
function ControlScreen(){
  const [mode,setMode]=useState('auto');
  const [logs,setLogs]=useState(CMD_LOGS);
  const [manualFreq,setManualFreq]=useState(38.0);
  const [sending,setSending]=useState(false);
  const [toast,setToast]=useState(null);
  const [confirmStop,setConfirmStop]=useState(false);
  const [showManual,setShowManual]=useState(false);
  const [modeConfirm,setModeConfirm]=useState(null);

  function requestMode(m){
    if(m==='stop'){setConfirmStop(true);return;}
    if(m!==mode){setModeConfirm(m);}
  }

  function confirmMode(){
    setMode(modeConfirm);
    const newLog={id:Date.now(),time:new Date().toTimeString().slice(0,8),
      cmd:modeConfirm==='manual'?'수동 모드 전환':'자동 모드 전환',value:'—',status:'성공',mode:modeConfirm==='manual'?'수동':'자동'};
    setLogs(prev=>[newLog,...prev.slice(0,6)]);
    setToast(`${modeConfirm==='manual'?'수동':'자동'} 모드로 전환되었습니다.`);
    setModeConfirm(null);
  }

  function sendCmd(){
    setSending(true);
    setTimeout(()=>{
      setSending(false);
      const newLog={id:Date.now(),time:new Date().toTimeString().slice(0,8),
        cmd:'수동 주파수 설정',value:`${manualFreq.toFixed(1)} Hz`,status:'성공',mode:'수동'};
      setLogs(prev=>[newLog,...prev.slice(0,6)]);
      setToast(`주파수 목표값 ${manualFreq.toFixed(1)} Hz 전송 완료`);
      setShowManual(false);
    },1500);
  }

  function doEmergStop(){
    setMode('stop');
    const newLog={id:Date.now(),time:new Date().toTimeString().slice(0,8),
      cmd:'비상정지 명령',value:'—',status:'성공',mode:'비상정지'};
    setLogs(prev=>[newLog,...prev.slice(0,6)]);
    setToast('비상정지 명령이 전송되었습니다.');
    setConfirmStop(false);
  }

  return (
    <div className="content">
      <div style={{fontSize:20,fontWeight:700,color:'#1A2E2E',marginBottom:4}}>제어 명령 인터페이스</div>
      <div style={{fontSize:12,color:'#4A6A6A',marginBottom:20}}>Modbus TCP 통신 어댑터를 통한 송풍기 제어</div>

      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:16,marginBottom:16}}>
        <div className="card">
          <div style={{fontSize:13,fontWeight:600,color:'#1A2E2E',marginBottom:16}}>제어 모드 선택</div>
          <div style={{display:'flex',gap:8,marginBottom:16}}>
            <button className={`mode-btn ${mode==='auto'?'active-auto':''}`} onClick={()=>requestMode('auto')}>
              자동 제어
            </button>
            <button className={`mode-btn ${mode==='manual'?'active-manual':''}`} onClick={()=>requestMode('manual')}>
              수동 제어
            </button>
            <button className={`mode-btn ${mode==='stop'?'active-stop':''}`} onClick={()=>requestMode('stop')}
              style={{background:mode==='stop'?undefined:'#FFF5F5',color:mode==='stop'?undefined:'#EF4444',borderColor:mode==='stop'?undefined:'#FECACA'}}>
              비상정지
            </button>
          </div>

          <div style={{background:'#F0F7F7',borderRadius:6,padding:14,marginBottom:16}}>
            <div style={{fontSize:12,color:'#4A6A6A',marginBottom:4}}>현재 통신 상태</div>
            <div style={{display:'flex',alignItems:'center',gap:8}}>
              <div style={{width:8,height:8,borderRadius:'50%',background:mode==='stop'?'#EF4444':'#2DC4A4'}}/>
              <span style={{fontSize:13,fontWeight:600,color:'#1A2E2E'}}>
                {mode==='stop'?'비상정지 — 명령 차단':'Modbus TCP 연결됨 (192.168.1.50:502)'}
              </span>
            </div>
            <div style={{marginTop:8,fontSize:12}}>
              <span style={{color:'#4A6A6A'}}>PLC 레지스터: </span>
              <span style={{color:'#1A7A7A',fontWeight:600,fontFamily:'monospace'}}>MW100 (주파수 목표)</span>
            </div>
          </div>

          {mode==='auto'&&(
            <div style={{background:'#E6F7F5',borderRadius:6,padding:14}}>
              <div style={{fontSize:12,fontWeight:600,color:'#0D7A6A',marginBottom:4}}>자동 제어 중</div>
              <div style={{fontSize:12,color:'#4A6A6A'}}>AI 예측 모델이 5초 주기로 최적 주파수를 산출하여 PLC에 전송합니다.</div>
              <div style={{fontSize:13,fontWeight:700,color:'#1A7A7A',marginTop:8}}>현재 주파수 목표: 38.5 Hz</div>
            </div>
          )}
          {mode==='manual'&&(
            <div>
              <div style={{fontSize:12,color:'#92400E',background:'#FEF3C7',borderRadius:6,padding:10,marginBottom:12}}>
                수동 모드: 운영자가 직접 주파수 목표값을 설정합니다.
              </div>
              <button className="btn btn-secondary" style={{width:'100%'}} onClick={()=>setShowManual(true)}>
                <Icon name="send" size={14}/> 주파수 목표값 직접 전송
              </button>
            </div>
          )}
        </div>

        <div className="card">
          <div style={{fontSize:13,fontWeight:600,color:'#1A2E2E',marginBottom:12}}>명령 전송 이력</div>
          <table>
            <thead><tr><th>시각</th><th>명령</th><th>값</th><th>상태</th></tr></thead>
            <tbody>
              {logs.slice(0,6).map(l=>(
                <tr key={l.id}>
                  <td style={{fontFamily:'monospace',fontSize:11}}>{l.time}</td>
                  <td style={{fontSize:12}}>{l.cmd}</td>
                  <td style={{fontSize:12,fontFamily:'monospace'}}>{l.value}</td>
                  <td><span className={`badge ${l.status==='성공'?'badge-ok':'badge-err'}`}>{l.status}</span></td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      </div>

      {modeConfirm&&(
        <div className="modal-overlay" onClick={()=>setModeConfirm(null)}>
          <div className="modal" onClick={e=>e.stopPropagation()}>
            <div style={{fontSize:16,fontWeight:700,marginBottom:8}}>모드 전환 확인</div>
            <p style={{fontSize:13,color:'#4A6A6A',marginBottom:20}}>
              {modeConfirm==='manual'?'수동 모드로 전환하면 AI 자동 제어가 중단됩니다. 계속하시겠습니까?':'자동 모드로 전환합니다. 계속하시겠습니까?'}
            </p>
            <div style={{display:'flex',gap:8,justifyContent:'flex-end'}}>
              <button className="btn btn-secondary" onClick={()=>setModeConfirm(null)}>취소</button>
              <button className="btn btn-primary" onClick={confirmMode}>확인</button>
            </div>
          </div>
        </div>
      )}

      {confirmStop&&(
        <div className="modal-overlay" onClick={()=>setConfirmStop(false)}>
          <div className="modal" onClick={e=>e.stopPropagation()}>
            <div style={{fontSize:16,fontWeight:700,color:'#EF4444',marginBottom:8}}>비상정지 확인</div>
            <p style={{fontSize:13,color:'#4A6A6A',marginBottom:20}}>
              비상정지 명령을 PLC에 전송합니다. 이 작업은 즉시 실행되며 모든 자동 제어가 중단됩니다.
            </p>
            <div style={{display:'flex',gap:8,justifyContent:'flex-end'}}>
              <button className="btn btn-secondary" onClick={()=>setConfirmStop(false)}>취소</button>
              <button className="btn btn-danger" onClick={doEmergStop}>비상정지 실행</button>
            </div>
          </div>
        </div>
      )}

      {showManual&&(
        <div className="modal-overlay" onClick={()=>setShowManual(false)}>
          <div className="modal" onClick={e=>e.stopPropagation()}>
            <div style={{fontSize:16,fontWeight:700,marginBottom:16}}>수동 주파수 목표값 전송</div>
            <div className="form-group">
              <label className="form-label">주파수 목표값 (Hz)</label>
              <input type="number" className="form-input" value={manualFreq} min={20} max={60} step={0.1}
                onChange={e=>setManualFreq(+e.target.value)}/>
            </div>
            <div style={{fontSize:12,color:'#4A6A6A',marginBottom:20}}>
              안전 범위: 20 ~ 60 Hz. PLC 레지스터 MW100에 직접 쓰기(Write)합니다.
            </div>
            <div style={{display:'flex',gap:8,justifyContent:'flex-end'}}>
              <button className="btn btn-secondary" onClick={()=>setShowManual(false)}>취소</button>
              <button className="btn btn-primary" onClick={sendCmd} disabled={sending}>
                {sending?'전송 중...':'전송'}
              </button>
            </div>
          </div>
        </div>
      )}

      {toast&&<Toast msg={toast} onClose={()=>setToast(null)}/>}
    </div>
  );
}
