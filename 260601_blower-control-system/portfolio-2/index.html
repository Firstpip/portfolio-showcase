<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>다중 처리장 통합 관제 및 예측 분석 플랫폼 — 구현 데모</title>
<link rel="preconnect" href="https://cdn.jsdelivr.net">
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" rel="stylesheet">
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://unpkg.com/prop-types@15.8.1/prop-types.min.js"></script>
<script src="https://unpkg.com/react-is@18.2.0/umd/react-is.production.min.js"></script>
<script src="https://unpkg.com/recharts@2.12.7/umd/Recharts.js"></script>
<link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web/src/regular/style.css"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body,#root{width:100%;min-height:100vh;font-family:'Pretendard',sans-serif}
body{background:#0F1A1A;color:#E8F4F4}
.topnav{width:100%;height:56px;background:#1A2E2E;border-bottom:1px solid #2A4A4A;display:flex;align-items:center;padding:0 24px;gap:0;position:sticky;top:0;z-index:100}
.nav-tab{display:flex;align-items:center;gap:7px;padding:0 18px;height:56px;border:none;background:transparent;color:#8AABAB;cursor:pointer;font-size:13px;font-weight:500;font-family:'Pretendard',sans-serif;border-bottom:2px solid transparent;transition:all .15s;white-space:nowrap}
.nav-tab:hover{color:#E8F4F4}
.nav-tab.active{color:#D97706;border-bottom-color:#D97706;font-weight:700}
.hero{background:linear-gradient(135deg,#1A2E2E 0%,#0F2020 100%);border-bottom:1px solid #2A4A4A;padding:24px;position:relative;overflow:hidden}
.hero::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 60% 100% at 80% 50%,rgba(217,119,6,.08),transparent);pointer-events:none}
.content{padding:24px}
.card{background:#1A2E2E;border:1px solid #2A4A4A;border-radius:4px;padding:20px}
.card-sm{background:#1A2E2E;border:1px solid #2A4A4A;border-radius:4px;padding:16px}
.plant-card{background:#1A2E2E;border:1px solid #2A4A4A;border-radius:4px;padding:16px;cursor:pointer;transition:all .2s;box-shadow:0 2px 8px rgba(0,0,0,.3)}
.plant-card:hover{border-color:#D97706;box-shadow:0 4px 16px rgba(217,119,6,.15)}
.plant-card.warn-border{border-color:#D97706}
.plant-card.err-border{border-color:#EF4444}
.plants-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:24px}
.badge{display:inline-flex;align-items:center;gap:4px;padding:3px 8px;border-radius:3px;font-size:11px;font-weight:600}
.badge-ok{background:rgba(13,122,106,.2);color:#2DC4A4}
.badge-warn{background:rgba(217,119,6,.2);color:#F59E0B}
.badge-err{background:rgba(239,68,68,.2);color:#EF4444}
.badge-info{background:rgba(45,156,219,.2);color:#2D9CDB}
.badge-off{background:rgba(138,171,171,.15);color:#8AABAB}
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:3px;border:none;cursor:pointer;font-size:13px;font-weight:600;font-family:'Pretendard',sans-serif;transition:all .15s}
.btn-amber{background:#D97706;color:#fff}
.btn-amber:hover{background:#B45309}
.btn-ghost{background:transparent;color:#8AABAB;border:1px solid #2A4A4A}
.btn-ghost:hover{color:#E8F4F4;border-color:#4A6A6A}
.btn-danger{background:#EF4444;color:#fff}
.btn-sm{padding:5px 10px;font-size:12px}
table{width:100%;border-collapse:collapse;font-size:13px}
thead tr{border-bottom:1px solid #2A4A4A}
th{padding:10px 12px;text-align:left;color:#8AABAB;font-weight:600;font-size:11px;text-transform:uppercase;letter-spacing:.5px}
td{padding:10px 12px;border-bottom:1px solid #1A2E2E;color:#E8F4F4}
tr:hover td{background:rgba(255,255,255,.02)}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:500;display:flex;align-items:center;justify-content:center;animation:fadeIn .2s ease}
.modal{background:#1A2E2E;border:1px solid #2A4A4A;border-radius:4px;padding:28px;width:540px;max-width:90vw;box-shadow:0 20px 60px rgba(0,0,0,.5);animation:slideUp .25s ease}
.drawer{position:fixed;right:0;top:0;bottom:0;width:480px;background:#1A2E2E;border-left:1px solid #2A4A4A;box-shadow:-8px 0 32px rgba(0,0,0,.4);z-index:400;padding:28px;overflow-y:auto;animation:slideInRight .25s ease}
.form-group{margin-bottom:16px}
.form-label{display:block;font-size:12px;font-weight:600;color:#8AABAB;margin-bottom:6px;text-transform:uppercase;letter-spacing:.4px}
.form-input{width:100%;padding:9px 12px;border:1px solid #2A4A4A;border-radius:3px;font-size:13px;font-family:'Pretendard',sans-serif;color:#E8F4F4;background:#0F1A1A;outline:none;transition:border-color .15s}
.form-input:focus{border-color:#D97706}
.form-select{width:100%;padding:9px 12px;border:1px solid #2A4A4A;border-radius:3px;font-size:13px;font-family:'Pretendard',sans-serif;color:#E8F4F4;background:#0F1A1A;outline:none}
.toast{position:fixed;bottom:24px;right:24px;background:#D97706;color:#fff;padding:12px 20px;border-radius:4px;font-size:13px;z-index:999;animation:toastIn .3s ease;box-shadow:0 4px 16px rgba(217,119,6,.4)}
.diff-add{background:rgba(13,122,106,.15);color:#2DC4A4;padding:2px 4px;border-radius:2px}
.diff-del{background:rgba(239,68,68,.15);color:#EF4444;padding:2px 4px;border-radius:2px;text-decoration:line-through}
.metric-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid #2A4A4A}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideUp{from{transform:translateY(16px);opacity:0}to{transform:translateY(0);opacity:1}}
@keyframes slideInRight{from{transform:translateX(100%)}to{transform:translateX(0)}}
@keyframes toastIn{from{transform:translateY(10px);opacity:0}to{transform:translateY(0);opacity:1}}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.4}}
@keyframes glowPulse{0%,100%{box-shadow:0 0 0 0 rgba(217,119,6,.3)}50%{box-shadow:0 0 12px 4px rgba(217,119,6,.15)}}
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
@keyframes alertSlide{from{transform:translateX(-8px);opacity:0}to{transform:translateX(0);opacity:1}}
@keyframes numberFlash{0%,100%{color:#E8F4F4}50%{color:#D97706}}
@keyframes scanLine{0%{top:0}100%{top:100%}}
@keyframes fadeSlideIn{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef } = React;
const { ComposedChart, LineChart, Line, BarChart, Bar, AreaChart, Area,
        XAxis, YAxis, CartesianGrid, Tooltip, Legend, ResponsiveContainer, ReferenceLine } = Recharts;

// ── 더미 데이터 ──────────────────────────────────────────────
const PLANTS = [
  {id:1,name:'강남 처리장 1계열',status:'ok',doNow:2.12,freq:38.5,load:2820,alert:0},
  {id:2,name:'강남 처리장 2계열',status:'warn',doNow:1.74,freq:41.2,load:3180,alert:2},
  {id:3,name:'송파 처리장',status:'ok',doNow:2.35,freq:37.0,load:2540,alert:0},
  {id:4,name:'서초 처리장 A',status:'err',doNow:1.42,freq:45.8,load:3620,alert:5},
  {id:5,name:'서초 처리장 B',status:'ok',doNow:2.08,freq:38.1,load:2750,alert:0},
  {id:6,name:'강동 처리장',status:'ok',doNow:1.98,freq:37.6,load:2680,alert:1},
];

const ALERT_RULES = [
  {id:1,plant:'전체',type:'DO 수치 이상',condition:'DO < 1.8 mg/L',interval:'60초',status:'활성'},
  {id:2,plant:'서초 처리장 A',type:'유입 부하 초과',condition:'부하 > 3500 m³/d',interval:'60초',status:'활성'},
  {id:3,plant:'전체',type:'통신 단절',condition:'응답 없음 > 30초',interval:'30초',status:'활성'},
  {id:4,plant:'강남 1계열',type:'주파수 이상',condition:'주파수 > 50 Hz',interval:'60초',status:'비활성'},
];

const ALERT_HIST = [
  {id:1,time:'07:08:42',plant:'서초 처리장 A',type:'DO 수치 이상',detail:'DO 1.42 mg/L (임계값 1.8)',severity:'err',done:false},
  {id:2,time:'07:06:15',plant:'서초 처리장 A',type:'유입 부하 초과',detail:'부하 3,620 m³/d (임계값 3,500)',severity:'warn',done:false},
  {id:3,time:'07:01:33',plant:'강남 2계열',type:'DO 수치 이상',detail:'DO 1.74 mg/L (임계값 1.8)',severity:'warn',done:false},
  {id:4,time:'06:55:00',plant:'강동 처리장',type:'모델 신뢰도 저하',detail:'예측 정확도 72% (임계값 80%)',severity:'info',done:true},
  {id:5,time:'06:30:18',plant:'서초 처리장 A',type:'DO 수치 이상',detail:'DO 1.68 mg/L (임계값 1.8)',severity:'warn',done:true},
];

const WEEK_LABELS=['05-26','05-27','05-28','05-29','05-30','05-31','06-01'];
const ACC_DATA=WEEK_LABELS.map((d,i)=>({
  date:d,
  강남1:+(92-Math.random()*6+i*0.3).toFixed(1),
  강남2:+(88-Math.random()*8+i*0.2).toFixed(1),
  송파:+(94-Math.random()*4+i*0.4).toFixed(1),
  서초A:+(78-Math.random()*10+i*0.5).toFixed(1),
}));

const PRED_VS_ACTUAL=WEEK_LABELS.map((d,i)=>({
  date:d,
  예측값:+(2800+i*50+Math.random()*100).toFixed(0),
  실측값:+(2750+i*55+Math.random()*120).toFixed(0),
}));

const PARAMS_DATA = [
  {plant:'강남 1계열',ver:'v2.3',doBase:2.0,bodW:0.42,ssW:0.31,flowW:0.27,hrt:1.08,mu:0.75,changed:'2026-06-01'},
  {plant:'강남 2계열',ver:'v2.1',doBase:2.2,bodW:0.38,ssW:0.35,flowW:0.27,hrt:1.09,mu:0.72,changed:'2026-05-28'},
  {plant:'송파',ver:'v2.3',doBase:2.0,bodW:0.42,ssW:0.31,flowW:0.27,hrt:1.08,mu:0.75,changed:'2026-06-01'},
  {plant:'서초 A',ver:'v1.8',doBase:1.8,bodW:0.45,ssW:0.28,flowW:0.27,hrt:1.10,mu:0.70,changed:'2026-05-15'},
  {plant:'서초 B',ver:'v2.3',doBase:2.0,bodW:0.42,ssW:0.31,flowW:0.27,hrt:1.08,mu:0.75,changed:'2026-06-01'},
  {plant:'강동',ver:'v2.2',doBase:2.0,bodW:0.40,ssW:0.33,flowW:0.27,hrt:1.07,mu:0.74,changed:'2026-05-30'},
];

// ── 미니 차트 ────────────────────────────────────────────────
function MiniChart({color}){
  const d=Array.from({length:12},(_,i)=>({v:+(1.8+0.5*Math.sin(i*0.6)+Math.random()*0.2).toFixed(2)}));
  return (
    <div style={{height:40,width:'100%',position:'relative'}}>
      <ResponsiveContainer width="100%" height="100%">
        <AreaChart data={d}>
          <defs><linearGradient id={`g${color.replace('#','')}`} x1="0" y1="0" x2="0" y2="1">
            <stop offset="5%" stopColor={color} stopOpacity={0.3}/><stop offset="95%" stopColor={color} stopOpacity={0}/>
          </linearGradient></defs>
          <Area type="monotone" dataKey="v" stroke={color} strokeWidth={1.5} fill={`url(#g${color.replace('#','')})`} dot={false}/>
        </AreaChart>
      </ResponsiveContainer>
    </div>
  );
}

// ── 처리장 카드 ──────────────────────────────────────────────
function PlantCard({p,onClick}){
  const color=p.status==='ok'?'#2DC4A4':p.status==='warn'?'#D97706':'#EF4444';
  return (
    <div className={`plant-card ${p.status==='warn'?'warn-border':p.status==='err'?'err-border':''}`} onClick={()=>onClick(p)}
      style={{animation:'fadeSlideIn .4s ease'}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:10}}>
        <div style={{fontSize:13,fontWeight:700,color:'#E8F4F4'}}>{p.name}</div>
        <span className={`badge ${p.status==='ok'?'badge-ok':p.status==='warn'?'badge-warn':'badge-err'}`}>
          {p.status==='ok'?'정상':p.status==='warn'?'경고':'이상'}
        </span>
      </div>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:8,marginBottom:10}}>
        {[['DO',p.doNow.toFixed(2),'mg/L'],['Freq',p.freq.toFixed(1),'Hz'],['Load',p.load.toLocaleString(),'m³']].map(([l,v,u])=>(
          <div key={l} style={{textAlign:'center'}}>
            <div style={{fontSize:10,color:'#8AABAB'}}>{l}</div>
            <div style={{fontSize:15,fontWeight:700,color:l==='DO'&&p.doNow<1.8?'#EF4444':color}}>{v}</div>
            <div style={{fontSize:9,color:'#8AABAB'}}>{u}</div>
          </div>
        ))}
      </div>
      <MiniChart color={color}/>
      {p.alert>0&&(
        <div style={{marginTop:8,display:'flex',alignItems:'center',gap:6,fontSize:11,color:'#D97706'}}>
          <i className="ph ph-warning-circle" style={{fontSize:13}}/>
          미처리 알림 {p.alert}건
        </div>
      )}
    </div>
  );
}

// ── Toast ────────────────────────────────────────────────────
function Toast({msg,onClose}){
  useEffect(()=>{const t=setTimeout(onClose,2800);return()=>clearTimeout(t);},[]);
  return <div className="toast">{msg}</div>;
}

// ── TOPNAV ───────────────────────────────────────────────────
const TABS=[
  {id:'main',icon:'ph-squares-four',label:'다중 처리장 통합 대시보드'},
  {id:'alert',icon:'ph-bell-ringing',label:'이상 감지 알림 관리'},
  {id:'report',icon:'ph-chart-bar',label:'예측 정확도 리포트'},
  {id:'params',icon:'ph-sliders',label:'알고리즘 파라미터 관리'},
];

function TopNav({active,onNav,totalAlert}){
  return (
    <nav className="topnav">
      <div style={{display:'flex',alignItems:'center',gap:8,marginRight:24,paddingRight:20,borderRight:'1px solid #2A4A4A'}}>
        <div style={{width:28,height:28,background:'linear-gradient(135deg,#D97706,#FB923C)',borderRadius:4,display:'flex',alignItems:'center',justifyContent:'center'}}>
          <i className="ph ph-wind" style={{fontSize:14,color:'#fff'}}/>
        </div>
        <div>
          <div style={{fontSize:12,fontWeight:700,color:'#E8F4F4',lineHeight:1.2}}>BlowerAI Platform</div>
          <div style={{fontSize:9,color:'#8AABAB'}}>다중 처리장 관제</div>
        </div>
      </div>
      {TABS.map(t=>(
        <button key={t.id} className={`nav-tab ${active===t.id?'active':''}`} onClick={()=>onNav(t.id)}>
          <i className={t.icon} style={{fontSize:14}}/>
          {t.label}
          {t.id==='alert'&&totalAlert>0&&(
            <span style={{background:'#EF4444',color:'#fff',borderRadius:'50%',width:16,height:16,
              display:'flex',alignItems:'center',justifyContent:'center',fontSize:9,fontWeight:700,marginLeft:2}}>
              {totalAlert}
            </span>
          )}
        </button>
      ))}
      <div style={{flex:1}}/>
      <div style={{display:'flex',alignItems:'center',gap:10}}>
        <div style={{width:6,height:6,borderRadius:'50%',background:'#2DC4A4',animation:'blink 1.5s infinite'}}/>
        <span style={{fontSize:11,color:'#8AABAB'}}>07:12 KST</span>
        <div style={{width:28,height:28,background:'#2A4A4A',borderRadius:'50%',display:'flex',alignItems:'center',justifyContent:'center'}}>
          <i className="ph ph-user" style={{fontSize:14,color:'#8AABAB'}}/>
        </div>
      </div>
    </nav>
  );
}

// ── 다중 처리장 통합 대시보드 ───────────────────────────────
function MainScreen(){
  const [plants,setPlants]=useState(PLANTS);
  const [selected,setSelected]=useState(null);
  const okCount=plants.filter(p=>p.status==='ok').length;
  const warnCount=plants.filter(p=>p.status==='warn').length;
  const errCount=plants.filter(p=>p.status==='err').length;

  useEffect(()=>{
    const id=setInterval(()=>{
      setPlants(prev=>prev.map(p=>({...p,
        doNow:+(p.doNow+(Math.random()*0.06-0.03)).toFixed(2),
        freq:+(p.freq+(Math.random()*0.3-0.15)).toFixed(1),
        load:+(p.load+(Math.random()*40-20)).toFixed(0),
      })));
    },4000);
    return()=>clearInterval(id);
  },[]);

  return (
    <div>
      <div className="hero">
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start'}}>
          <div>
            <div style={{fontSize:11,color:'#8AABAB',marginBottom:4,textTransform:'uppercase',letterSpacing:1}}>통합 관제 현황</div>
            <div style={{fontSize:22,fontWeight:700,color:'#E8F4F4'}}>6개 처리장 실시간 모니터링</div>
          </div>
          <div style={{display:'flex',gap:20}}>
            {[['정상',okCount,'#2DC4A4'],['경고',warnCount,'#D97706'],['이상',errCount,'#EF4444']].map(([l,c,clr])=>(
              <div key={l} style={{textAlign:'center'}}>
                <div style={{fontSize:24,fontWeight:700,color:clr}}>{c}</div>
                <div style={{fontSize:11,color:'#8AABAB'}}>{l}</div>
              </div>
            ))}
          </div>
        </div>
        <div style={{marginTop:12,height:3,background:'#2A4A4A',borderRadius:2,overflow:'hidden'}}>
          <div style={{height:'100%',background:'linear-gradient(90deg,#D97706,#FB923C)',
            width:`${(okCount/plants.length*100).toFixed(0)}%`,transition:'width .5s ease',borderRadius:2}}/>
        </div>
      </div>
      <div className="content">
        <div className="plants-grid">
          {plants.map(p=><PlantCard key={p.id} p={p} onClick={setSelected}/>)}
        </div>
      </div>
      {selected&&(
        <div className="modal-overlay" onClick={()=>setSelected(null)}>
          <div className="modal" style={{width:520}} onClick={e=>e.stopPropagation()}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16}}>
              <div style={{fontSize:16,fontWeight:700,color:'#E8F4F4'}}>{selected.name}</div>
              <span className={`badge ${selected.status==='ok'?'badge-ok':selected.status==='warn'?'badge-warn':'badge-err'}`}>
                {selected.status==='ok'?'정상':selected.status==='warn'?'경고':'이상'}
              </span>
            </div>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:12,marginBottom:16}}>
              {[['DO 수치',selected.doNow.toFixed(2),'mg/L',selected.doNow<1.8?'#EF4444':'#2DC4A4'],
                ['주파수',selected.freq.toFixed(1),'Hz','#D97706'],
                ['유입 부하',selected.load.toLocaleString(),'m³/d','#E8F4F4']].map(([l,v,u,c])=>(
                <div key={l} style={{background:'#0F1A1A',borderRadius:3,padding:12,textAlign:'center',border:'1px solid #2A4A4A'}}>
                  <div style={{fontSize:10,color:'#8AABAB',marginBottom:4}}>{l}</div>
                  <div style={{fontSize:22,fontWeight:700,color:c}}>{v}</div>
                  <div style={{fontSize:10,color:'#8AABAB'}}>{u}</div>
                </div>
              ))}
            </div>
            <div style={{display:'flex',gap:8,justifyContent:'flex-end'}}>
              <button className="btn btn-ghost btn-sm" onClick={()=>setSelected(null)}>닫기</button>
              <button className="btn btn-amber btn-sm">상세 이력 조회</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// ── 이상 감지 알림 관리 ─────────────────────────────────────
function AlertScreen(){
  const [rules,setRules]=useState(ALERT_RULES);
  const [hist,setHist]=useState(ALERT_HIST);
  const [newRule,setNewRule]=useState(false);
  const [toast,setToast]=useState(null);
  const [form,setForm]=useState({plant:'전체',type:'DO 수치 이상',condition:'',interval:'60초'});
  const undone=hist.filter(h=>!h.done).length;

  function markDone(id){
    setHist(prev=>prev.map(h=>h.id===id?{...h,done:true}:h));
    setToast('알림이 처리 완료로 변경되었습니다.');
  }

  function addRule(){
    setRules(prev=>[...prev,{id:Date.now(),plant:form.plant,type:form.type,condition:form.condition||'DO < 1.5 mg/L',interval:form.interval,status:'활성'}]);
    setNewRule(false);
    setToast('알림 규칙이 추가되었습니다.');
  }

  return (
    <div className="content">
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:20}}>
        <div>
          <div style={{fontSize:20,fontWeight:700,color:'#E8F4F4',marginBottom:2}}>이상 감지 알림 관리</div>
          <div style={{fontSize:12,color:'#8AABAB'}}>처리장별 임계값 설정 및 알림 이력 관리</div>
        </div>
        <button className="btn btn-amber btn-sm" onClick={()=>setNewRule(true)}>
          <i className="ph ph-plus" style={{fontSize:14}}/> 새 알림 규칙
        </button>
      </div>

      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:16}}>
        <div className="card">
          <div style={{fontSize:13,fontWeight:600,color:'#E8F4F4',marginBottom:12}}>알림 규칙 목록</div>
          <table>
            <thead><tr><th>처리장</th><th>유형</th><th>조건</th><th>상태</th></tr></thead>
            <tbody>
              {rules.map(r=>(
                <tr key={r.id}>
                  <td style={{fontSize:12}}>{r.plant}</td>
                  <td style={{fontSize:12}}>{r.type}</td>
                  <td style={{fontSize:11,fontFamily:'monospace',color:'#8AABAB'}}>{r.condition}</td>
                  <td>
                    <span className={`badge ${r.status==='활성'?'badge-ok':'badge-off'}`}>{r.status}</span>
                  </td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>

        <div className="card">
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12}}>
            <div style={{fontSize:13,fontWeight:600,color:'#E8F4F4'}}>알림 발생 이력</div>
            {undone>0&&<span className="badge badge-err">미처리 {undone}건</span>}
          </div>
          <div style={{display:'flex',flexDirection:'column',gap:6}}>
            {hist.map(h=>(
              <div key={h.id} style={{background:'#0F1A1A',borderRadius:3,padding:12,
                border:`1px solid ${h.done?'#2A4A4A':h.severity==='err'?'rgba(239,68,68,.3)':h.severity==='warn'?'rgba(217,119,6,.3)':'rgba(45,156,219,.3)'}`,
                animation:!h.done?'alertSlide .3s ease':'none',opacity:h.done?.6:1}}>
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start'}}>
                  <div>
                    <div style={{fontSize:12,fontWeight:600,color:'#E8F4F4'}}>{h.plant} — {h.type}</div>
                    <div style={{fontSize:11,color:'#8AABAB',marginTop:2}}>{h.detail}</div>
                    <div style={{fontSize:10,color:'#8AABAB',marginTop:2,fontFamily:'monospace'}}>{h.time}</div>
                  </div>
                  {!h.done&&(
                    <button className="btn btn-ghost btn-sm" style={{fontSize:11}} onClick={()=>markDone(h.id)}>
                      처리완료
                    </button>
                  )}
                  {h.done&&<span className="badge badge-off">완료</span>}
                </div>
              </div>
            ))}
          </div>
        </div>
      </div>

      {newRule&&(
        <div className="modal-overlay" onClick={()=>setNewRule(false)}>
          <div className="modal" onClick={e=>e.stopPropagation()}>
            <div style={{fontSize:16,fontWeight:700,color:'#E8F4F4',marginBottom:20}}>새 알림 규칙 추가</div>
            <div className="form-group">
              <label className="form-label">처리장</label>
              <select className="form-select" value={form.plant} onChange={e=>setForm(p=>({...p,plant:e.target.value}))}>
                <option>전체</option>{PLANTS.map(p=><option key={p.id}>{p.name}</option>)}
              </select>
            </div>
            <div className="form-group">
              <label className="form-label">이상 유형</label>
              <select className="form-select" value={form.type} onChange={e=>setForm(p=>({...p,type:e.target.value}))}>
                {['DO 수치 이상','유입 부하 초과','주파수 이상','통신 단절','모델 신뢰도 저하'].map(t=><option key={t}>{t}</option>)}
              </select>
            </div>
            <div className="form-group">
              <label className="form-label">임계값 조건</label>
              <input className="form-input" placeholder="예: DO < 1.5 mg/L" value={form.condition} onChange={e=>setForm(p=>({...p,condition:e.target.value}))}/>
            </div>
            <div className="form-group">
              <label className="form-label">감시 주기</label>
              <select className="form-select" value={form.interval} onChange={e=>setForm(p=>({...p,interval:e.target.value}))}>
                {['30초','60초','5분','15분'].map(t=><option key={t}>{t}</option>)}
              </select>
            </div>
            <div style={{display:'flex',gap:8,justifyContent:'flex-end',marginTop:20}}>
              <button className="btn btn-ghost" onClick={()=>setNewRule(false)}>취소</button>
              <button className="btn btn-amber" onClick={addRule}>규칙 추가</button>
            </div>
          </div>
        </div>
      )}

      {toast&&<Toast msg={toast} onClose={()=>setToast(null)}/>}
    </div>
  );
}

// ── 예측 정확도 리포트 ──────────────────────────────────────
function ReportScreen(){
  const [plant,setPlant]=useState('전체');
  const [period,setPeriod]=useState('7일');

  const avg=(arr)=>(arr.reduce((a,b)=>a+b,0)/arr.length).toFixed(1);
  const maes={강남1:5.2,강남2:8.1,송파:4.4,서초A:14.8};
  const rmses={강남1:7.3,강남2:11.2,송파:6.1,서초A:19.5};

  return (
    <div className="content">
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:20}}>
        <div>
          <div style={{fontSize:20,fontWeight:700,color:'#E8F4F4',marginBottom:2}}>예측 정확도 리포트</div>
          <div style={{fontSize:12,color:'#8AABAB'}}>유입 부하 예측 모델 기간별 성능 분석</div>
        </div>
        <div style={{display:'flex',gap:8}}>
          <select className="form-select" style={{width:160}} value={plant} onChange={e=>setPlant(e.target.value)}>
            <option>전체</option>{PLANTS.map(p=><option key={p.id}>{p.name}</option>)}
          </select>
          <select className="form-select" style={{width:100}} value={period} onChange={e=>setPeriod(e.target.value)}>
            {['7일','30일','90일'].map(p=><option key={p}>{p}</option>)}
          </select>
        </div>
      </div>

      <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:12,marginBottom:20}}>
        {[['강남 1계열',92.1,'badge-ok'],['강남 2계열',87.3,'badge-warn'],['송파',93.8,'badge-ok'],['서초 A',74.2,'badge-err']].map(([n,v,cls])=>(
          <div key={n} className="card-sm">
            <div style={{fontSize:11,color:'#8AABAB',marginBottom:4}}>{n}</div>
            <div style={{fontSize:22,fontWeight:700,color:v>=90?'#2DC4A4':v>=80?'#D97706':'#EF4444'}}>{v}%</div>
            <div style={{fontSize:10,color:'#8AABAB'}}>평균 정확도</div>
            <div style={{marginTop:8,height:4,background:'#2A4A4A',borderRadius:2,overflow:'hidden'}}>
              <div style={{width:`${v}%`,height:'100%',background:v>=90?'#2DC4A4':v>=80?'#D97706':'#EF4444',borderRadius:2}}/>
            </div>
          </div>
        ))}
      </div>

      <div style={{display:'grid',gridTemplateColumns:'2fr 1fr',gap:16,marginBottom:16}}>
        <div className="card">
          <div style={{fontSize:13,fontWeight:600,color:'#E8F4F4',marginBottom:12}}>처리장별 예측 정확도 추이</div>
          <div style={{height:220,position:'relative'}}>
            <ResponsiveContainer width="100%" height="100%">
              <LineChart data={ACC_DATA}>
                <CartesianGrid strokeDasharray="3 3" stroke="#2A4A4A"/>
                <XAxis dataKey="date" tick={{fontSize:10,fill:'#8AABAB'}}/>
                <YAxis tick={{fontSize:10,fill:'#8AABAB'}} domain={[60,100]}/>
                <Tooltip contentStyle={{background:'#1A2E2E',border:'1px solid #2A4A4A',borderRadius:3,fontSize:11}}/>
                <Legend wrapperStyle={{fontSize:11}}/>
                <ReferenceLine y={80} stroke="#D97706" strokeDasharray="4 2" label={{value:'최소 임계값',fontSize:9,fill:'#D97706'}}/>
                <Line type="monotone" dataKey="강남1" stroke="#2DC4A4" strokeWidth={2} dot={false}/>
                <Line type="monotone" dataKey="강남2" stroke="#D97706" strokeWidth={2} dot={false}/>
                <Line type="monotone" dataKey="송파" stroke="#2D9CDB" strokeWidth={2} dot={false}/>
                <Line type="monotone" dataKey="서초A" stroke="#EF4444" strokeWidth={2} dot={false} strokeDasharray="4 2"/>
              </LineChart>
            </ResponsiveContainer>
          </div>
        </div>

        <div className="card">
          <div style={{fontSize:13,fontWeight:600,color:'#E8F4F4',marginBottom:12}}>MAE / RMSE 요약</div>
          {Object.entries(maes).map(([k,mae])=>(
            <div key={k} className="metric-row">
              <div style={{fontSize:12,color:'#E8F4F4'}}>{k}</div>
              <div style={{display:'flex',gap:8}}>
                <span className="badge badge-info">MAE {mae}</span>
                <span className="badge badge-warn">RMSE {rmses[k]}</span>
              </div>
            </div>
          ))}
        </div>
      </div>

      <div className="card">
        <div style={{fontSize:13,fontWeight:600,color:'#E8F4F4',marginBottom:12}}>예측값 vs 실측값 비교 (강남 1계열)</div>
        <div style={{height:180,position:'relative'}}>
          <ResponsiveContainer width="100%" height="100%">
            <ComposedChart data={PRED_VS_ACTUAL}>
              <CartesianGrid strokeDasharray="3 3" stroke="#2A4A4A"/>
              <XAxis dataKey="date" tick={{fontSize:10,fill:'#8AABAB'}}/>
              <YAxis tick={{fontSize:10,fill:'#8AABAB'}} domain={[2500,3200]}/>
              <Tooltip contentStyle={{background:'#1A2E2E',border:'1px solid #2A4A4A',borderRadius:3,fontSize:11}}/>
              <Legend wrapperStyle={{fontSize:11}}/>
              <Bar dataKey="실측값" fill="rgba(45,196,164,.25)" radius={[2,2,0,0]}/>
              <Line type="monotone" dataKey="예측값" stroke="#D97706" strokeWidth={2.5} dot={{r:3,fill:'#D97706'}}/>
            </ComposedChart>
          </ResponsiveContainer>
        </div>
      </div>
    </div>
  );
}

// ── 알고리즘 파라미터 관리 ──────────────────────────────────
function ParamsScreen(){
  const [params,setParams]=useState(PARAMS_DATA);
  const [selected,setSelected]=useState([]);
  const [copyTarget,setCopyTarget]=useState(null);
  const [diffView,setDiffView]=useState(null);
  const [toast,setToast]=useState(null);

  const srcRow=params.find(p=>p.plant==='강남 1계열');

  function toggleSelect(plant){
    setSelected(prev=>prev.includes(plant)?prev.filter(x=>x!==plant):[...prev,plant]);
  }

  function doCopy(){
    if(!selected.length){setToast('복사 대상 처리장을 선택하세요.');return;}
    setParams(prev=>prev.map(p=>selected.includes(p.plant)?{...p,...srcRow,plant:p.plant,ver:'v2.4',changed:'2026-06-01'}:p));
    setToast(`${selected.length}개 처리장에 파라미터 복사 완료`);
    setSelected([]);setCopyTarget(null);
  }

  const diffData=[
    {field:'DO 기본값',from:'1.8 mg/L',to:'2.0 mg/L',changed:true},
    {field:'BOD 가중치',from:'0.45',to:'0.42',changed:true},
    {field:'SS 가중치',from:'0.28',to:'0.31',changed:true},
    {field:'유량 가중치',from:'0.27',to:'0.27',changed:false},
    {field:'HRT 계수',from:'1.10',to:'1.08',changed:true},
    {field:'질산화 계수',from:'0.70',to:'0.75',changed:true},
  ];

  return (
    <div className="content">
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:20}}>
        <div>
          <div style={{fontSize:20,fontWeight:700,color:'#E8F4F4',marginBottom:2}}>알고리즘 파라미터 관리</div>
          <div style={{fontSize:12,color:'#8AABAB'}}>처리장별 예측 모델 파라미터 중앙 관리</div>
        </div>
        <div style={{display:'flex',gap:8}}>
          <button className="btn btn-ghost btn-sm" onClick={()=>setCopyTarget('open')} disabled={!selected.length}>
            <i className="ph ph-copy" style={{fontSize:13}}/> 강남1 → 선택 처리장 복사
          </button>
        </div>
      </div>

      <div className="card" style={{marginBottom:16}}>
        <div style={{fontSize:12,color:'#8AABAB',marginBottom:12}}>처리장 선택 후 "강남 1계열" 파라미터를 복사할 수 있습니다.</div>
        <table>
          <thead>
            <tr>
              <th style={{width:40}}></th>
              <th>처리장</th><th>버전</th><th>DO 기본값</th><th>BOD 가중치</th><th>SS 가중치</th><th>HRT 계수</th><th>최종 변경</th><th>diff</th>
            </tr>
          </thead>
          <tbody>
            {params.map(p=>(
              <tr key={p.plant} style={{opacity:p.plant==='강남 1계열'?.6:1}}>
                <td>
                  {p.plant!=='강남 1계열'&&(
                    <input type="checkbox" checked={selected.includes(p.plant)} onChange={()=>toggleSelect(p.plant)}
                      style={{accentColor:'#D97706'}}/>
                  )}
                </td>
                <td style={{fontWeight:600}}>{p.plant}{p.plant==='강남 1계열'&&<span className="badge badge-amber" style={{marginLeft:6,background:'rgba(217,119,6,.2)',color:'#D97706'}}>기준</span>}</td>
                <td><span className="badge badge-info">{p.ver}</span></td>
                <td style={{fontFamily:'monospace'}}>{p.doBase.toFixed(1)}</td>
                <td style={{fontFamily:'monospace'}}>{p.bodW.toFixed(2)}</td>
                <td style={{fontFamily:'monospace'}}>{p.ssW.toFixed(2)}</td>
                <td style={{fontFamily:'monospace'}}>{p.hrt.toFixed(2)}</td>
                <td style={{fontSize:11,color:'#8AABAB'}}>{p.changed}</td>
                <td>
                  {p.plant!=='강남 1계열'&&(
                    <button className="btn btn-ghost btn-sm" style={{fontSize:11}} onClick={()=>setDiffView(p)}>
                      비교
                    </button>
                  )}
                </td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>

      {copyTarget&&(
        <div className="modal-overlay" onClick={()=>setCopyTarget(null)}>
          <div className="modal" onClick={e=>e.stopPropagation()}>
            <div style={{fontSize:16,fontWeight:700,color:'#E8F4F4',marginBottom:8}}>파라미터 복사 확인</div>
            <p style={{fontSize:13,color:'#8AABAB',marginBottom:16}}>
              강남 1계열(v2.3)의 파라미터를 <strong style={{color:'#D97706'}}>{selected.join(', ')}</strong>에 복사합니다. 트랜잭션으로 처리되어 부분 실패가 발생하지 않습니다.
            </p>
            <div style={{display:'flex',gap:8,justifyContent:'flex-end'}}>
              <button className="btn btn-ghost" onClick={()=>setCopyTarget(null)}>취소</button>
              <button className="btn btn-amber" onClick={doCopy}>복사 실행</button>
            </div>
          </div>
        </div>
      )}

      {diffView&&(
        <div className="modal-overlay" onClick={()=>setDiffView(null)}>
          <div className="modal" style={{width:560}} onClick={e=>e.stopPropagation()}>
            <div style={{fontSize:15,fontWeight:700,color:'#E8F4F4',marginBottom:4}}>파라미터 버전 비교</div>
            <div style={{fontSize:12,color:'#8AABAB',marginBottom:16}}>{diffView.plant} ({diffView.ver}) vs 강남 1계열 (v2.3)</div>
            <table>
              <thead><tr><th>파라미터</th><th>현재 ({diffView.ver})</th><th>기준 (v2.3)</th></tr></thead>
              <tbody>
                {diffData.map(d=>(
                  <tr key={d.field}>
                    <td style={{fontSize:12}}>{d.field}</td>
                    <td style={{fontFamily:'monospace'}}>
                      {d.changed?<span className="diff-del">{d.from}</span>:<span>{d.from}</span>}
                    </td>
                    <td style={{fontFamily:'monospace'}}>
                      {d.changed?<span className="diff-add">{d.to}</span>:<span>{d.to}</span>}
                    </td>
                  </tr>
                ))}
              </tbody>
            </table>
            <div style={{display:'flex',gap:8,justifyContent:'flex-end',marginTop:16}}>
              <button className="btn btn-ghost" onClick={()=>setDiffView(null)}>닫기</button>
            </div>
          </div>
        </div>
      )}

      {toast&&<Toast msg={toast} onClose={()=>setToast(null)}/>}
    </div>
  );
}

// ── APP ─────────────────────────────────────────────────────
function App(){
  const [tab,setTab]=useState('main');
  const totalAlert=ALERT_HIST.filter(h=>!h.done).length;
  const screens={main:<MainScreen/>,alert:<AlertScreen/>,report:<ReportScreen/>,params:<ParamsScreen/>};

  return (
    <div style={{display:'flex',flexDirection:'column',width:'100%',minHeight:'100vh'}}>
      <TopNav active={tab} onNav={setTab} totalAlert={totalAlert}/>
      <main style={{flex:1,width:'100%'}}>
        <div style={{animation:'fadeSlideIn .3s ease'}} key={tab}>
          {screens[tab]}
        </div>
      </main>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
