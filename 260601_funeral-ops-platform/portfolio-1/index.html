<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>장례 현장 운영 플랫폼 — 맞춤 구현 데모</title>
  <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" rel="stylesheet"/>
  <link href="https://unpkg.com/@tabler/icons-webfont@latest/dist/tabler-icons.min.css" rel="stylesheet"/>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://unpkg.com/prop-types@15/prop-types.min.js"></script>
  <script src="https://unpkg.com/react-is@18/umd/react-is.production.min.js"></script>
  <script src="https://unpkg.com/recharts@2/umd/Recharts.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body, #root { width: 100%; min-height: 100vh; }
    body { font-family: 'Pretendard', 'Apple SD Gothic Neo', sans-serif; background: #f8f6f3; color: #1a1816; -webkit-font-smoothing: antialiased; }
    @keyframes fadeIn { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:translateY(0); } }
    @keyframes slideInRight { from { opacity:0; transform:translateX(32px); } to { opacity:1; transform:translateX(0); } }
    @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.4; } }
    @keyframes toastIn { from { opacity:0; transform:translateX(100%); } to { opacity:1; transform:translateX(0); } }
    @keyframes scanLine { 0% { top:8px; } 100% { top:calc(100% - 8px); } }
    @keyframes spin { to { transform:rotate(360deg); } }
    @keyframes cardPop { from { opacity:0; transform:scale(0.97); } to { opacity:1; transform:scale(1); } }
    ::-webkit-scrollbar { width:4px; height:4px; }
    ::-webkit-scrollbar-track { background:transparent; }
    ::-webkit-scrollbar-thumb { background:#c8c5c2; border-radius:2px; }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef } = React;
const { BarChart, Bar, XAxis, YAxis, CartesianGrid, Tooltip, ResponsiveContainer } = Recharts;

const C = {
  bg:'#fafaf9', surface:'#ffffff', surfaceHover:'#f5f3f0',
  primary:'#3ba6f1', primaryLight:'#c1e1f7', primaryDark:'#2a8fd4',
  border:'#e5e7eb', borderMid:'#d6d3d1',
  text:'#0c0a09', textMuted:'#78716c', textLight:'#a8a29e',
  shadow:'0px 4px 16px rgba(0,0,0,0.05)',
  shadowMd:'0px 2px 6px rgba(0,0,0,0.06)',
  success:'#2a7a4b', successBg:'#e8f5ef', successBorder:'#b2e0c8',
  warning:'#a05c1a', warningBg:'#fef3e6', warningBorder:'#f5d4a0',
  error:'#b02a2a', errorBg:'#fdeaea', errorBorder:'#f5b0b0',
  pending:'#5c6b7a', pendingBg:'#f0f4f8', pendingBorder:'#c0d0dc',
};

const CEREMONIES = [
  { id:'C2606-001', deceasedName:'박성훈', chiefMourner:'박정민', phone:'010-9876-5432', venue:'하나장례식장', room:'3호실', intermentAt:'2026.06.02 10:00', funeralAt:'2026.06.04 09:00', status:'active', smsStatus:'sent', visitors:34, director:'김도현', funeralAddr:'서울 강동구 천중로 211' },
  { id:'C2606-002', deceasedName:'김순례', chiefMourner:'김지호', phone:'010-1234-5678', venue:'서울추모공원', room:'1호실', intermentAt:'2026.06.01 14:00', funeralAt:'2026.06.03 11:00', status:'active', smsStatus:'sent', visitors:52, director:'이수빈', funeralAddr:'서울 노원구 공릉로 119' },
  { id:'C2606-003', deceasedName:'이정봉', chiefMourner:'이민준', phone:'010-2345-6789', venue:'하나장례식장', room:'5호실', intermentAt:'2026.06.01 16:00', funeralAt:'2026.06.03 13:00', status:'completed', smsStatus:'sent', visitors:78, director:'박소연', funeralAddr:'서울 강동구 천중로 211' },
  { id:'C2606-004', deceasedName:'최영숙', chiefMourner:'최재원', phone:'010-3456-7890', venue:'강남장례식장', room:'2호실', intermentAt:'2026.06.03 11:00', funeralAt:'2026.06.05 10:00', status:'pending', smsStatus:'pending', visitors:0, director:'윤세영', funeralAddr:'서울 강남구 남부순환로 2683' },
];

const VISITORS = [
  { id:'V001', name:'홍기수', phone:'010-1111-2222', checkedAt:'14:23', method:'qr', ceremonyCId:'C2606-001' },
  { id:'V002', name:'이채연', phone:'010-2222-3333', checkedAt:'14:35', method:'phone', ceremonyCId:'C2606-001' },
  { id:'V003', name:'강동현', phone:'010-3333-4444', checkedAt:'15:02', method:'qr', ceremonyCId:'C2606-002' },
  { id:'V004', name:'박지연', phone:'010-4444-5555', checkedAt:'15:18', method:'qr', ceremonyCId:'C2606-001' },
  { id:'V005', name:'윤재호', phone:'010-5555-6666', checkedAt:'15:34', method:'phone', ceremonyCId:'C2606-002' },
];

const CHART_DATA = [
  { name:'하나장례식장', visitors:112 },
  { name:'서울추모공원', visitors:87 },
  { name:'강남장례식장', visitors:64 },
  { name:'광진장례식장', visitors:45 },
  { name:'송파추모관', visitors:38 },
];

const Badge = ({ label, color }) => {
  const m = {
    active:{ bg:C.successBg, text:C.success, border:C.successBorder },
    completed:{ bg:C.primaryLight, text:C.primaryDark, border:'#b6d4e8' },
    pending:{ bg:C.pendingBg, text:C.pending, border:C.pendingBorder },
    sent:{ bg:C.successBg, text:C.success, border:C.successBorder },
    failed:{ bg:C.errorBg, text:C.error, border:C.errorBorder },
    qr:{ bg:C.primaryLight, text:C.primary, border:'#b6d4e8' },
    phone:{ bg:'#f3f0fb', text:'#6b4fa0', border:'#c9b8e8' },
  };
  const c = m[color] || m.pending;
  return <span style={{ fontSize:11, fontWeight:500, padding:'2px 8px', borderRadius:9999, background:c.bg, color:c.text, border:`1px solid ${c.border}`, whiteSpace:'nowrap' }}>{label}</span>;
};

const Toast = ({ message, type, onClose }) => {
  useEffect(() => { const t = setTimeout(onClose, 2800); return () => clearTimeout(t); }, []);
  return (
    <div style={{ position:'fixed', bottom:24, right:24, zIndex:9999, background:type==='error'?C.error:C.primaryDark, color:'#fff', borderRadius:6, padding:'12px 20px', boxShadow:'0 8px 24px rgba(0,0,0,0.18)', animation:'toastIn 0.3s ease', display:'flex', alignItems:'center', gap:8, fontSize:14 }}>
      <i className={`ti ti-${type==='error'?'circle-x':'circle-check'}`} style={{ fontSize:16 }} />
      {message}
    </div>
  );
};

const Modal = ({ title, children, onClose, width=520 }) => (
  <div style={{ position:'fixed', inset:0, zIndex:8888, background:'rgba(0,0,0,0.3)', display:'flex', alignItems:'center', justifyContent:'center' }}>
    <div style={{ background:C.surface, borderRadius:6, width, maxWidth:'calc(100vw - 32px)', maxHeight:'90vh', overflowY:'auto', boxShadow:'0 20px 60px rgba(0,0,0,0.2)', animation:'cardPop 0.2s ease' }}>
      <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', padding:'16px 24px', borderBottom:`1px solid ${C.border}` }}>
        <span style={{ fontSize:15, fontWeight:600, color:C.text, letterSpacing:'-0.017px' }}>{title}</span>
        <button onClick={onClose} style={{ background:'none', border:'none', cursor:'pointer', color:C.textMuted, fontSize:18, lineHeight:1, padding:4 }}><i className="ti ti-x" /></button>
      </div>
      <div style={{ padding:24 }}>{children}</div>
    </div>
  </div>
);

const Drawer = ({ title, children, onClose }) => (
  <div style={{ position:'fixed', inset:0, zIndex:8888, display:'flex' }}>
    <div style={{ flex:1, background:'rgba(0,0,0,0.2)' }} onClick={onClose} />
    <div style={{ width:420, background:C.surface, height:'100%', overflowY:'auto', animation:'slideInRight 0.25s ease', boxShadow:'-8px 0 32px rgba(0,0,0,0.12)' }}>
      <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', padding:'16px 24px', borderBottom:`1px solid ${C.border}`, position:'sticky', top:0, background:C.surface, zIndex:1 }}>
        <span style={{ fontSize:15, fontWeight:600, color:C.text }}>{title}</span>
        <button onClick={onClose} style={{ background:'none', border:'none', cursor:'pointer', color:C.textMuted, fontSize:18, padding:4 }}><i className="ti ti-x" /></button>
      </div>
      <div style={{ padding:24 }}>{children}</div>
    </div>
  </div>
);

const Field = ({ label, value }) => (
  <div style={{ marginBottom:16 }}>
    <div style={{ fontSize:11, fontWeight:500, color:C.textLight, marginBottom:4, textTransform:'uppercase', letterSpacing:'0.048px' }}>{label}</div>
    <div style={{ fontSize:14, color:C.text, fontWeight:500 }}>{value}</div>
  </div>
);

const FormField = ({ label, type='text', value, onChange, placeholder, required }) => (
  <div style={{ marginBottom:16 }}>
    <label style={{ fontSize:12, fontWeight:500, color:C.textMuted, display:'block', marginBottom:4 }}>{label}{required && <span style={{ color:C.error, marginLeft:2 }}>*</span>}</label>
    <input type={type} value={value} onChange={e=>onChange(e.target.value)} placeholder={placeholder} style={{ width:'100%', padding:'8px 12px', border:`1px solid ${C.borderMid}`, borderRadius:4, fontSize:13, color:C.text, background:C.surface, outline:'none' }} />
  </div>
);

const TABS = [
  { id:'main', label:'장례지도사 접수 및 알림 발송', icon:'ti-clipboard-list' },
  { id:'family-app', label:'유가족 모바일 앱', icon:'ti-device-mobile' },
  { id:'obituary', label:'부고장 공개 웹 페이지', icon:'ti-file-text' },
  { id:'checkin', label:'현장 조문객 체크인 및 라벨 출력', icon:'ti-scan' },
  { id:'dashboard', label:'통합 관리자 현황', icon:'ti-chart-bar' },
];

const TopNav = ({ activeTab, setActiveTab }) => (
  <header style={{ background:C.surface, borderBottom:`1px solid ${C.border}`, position:'sticky', top:0, zIndex:100, boxShadow:C.shadowMd }}>
    <div style={{ maxWidth:1280, margin:'0 auto', padding:'0 24px' }}>
      <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', height:52, borderBottom:`1px solid ${C.border}` }}>
        <div style={{ display:'flex', alignItems:'center', gap:10 }}>
          <div style={{ width:28, height:28, background:C.primary, borderRadius:6, display:'flex', alignItems:'center', justifyContent:'center' }}>
            <i className="ti ti-building-estate" style={{ color:'#fff', fontSize:15 }} />
          </div>
          <span style={{ fontSize:15, fontWeight:700, color:C.text, letterSpacing:'-0.017px' }}>HUBOS</span>
          <span style={{ fontSize:11, color:C.textLight, background:C.primaryLight, padding:'1px 8px', borderRadius:9999, fontWeight:500 }}>장례 운영 플랫폼</span>
        </div>
        <div style={{ display:'flex', alignItems:'center', gap:12 }}>
          <div style={{ display:'flex', alignItems:'center', gap:5 }}>
            <div style={{ width:6, height:6, borderRadius:'50%', background:C.success, animation:'pulse 2s infinite' }} />
            <span style={{ fontSize:11, color:C.textMuted }}>10개 지점 연결</span>
          </div>
          <div style={{ width:1, height:16, background:C.border }} />
          <i className="ti ti-bell" style={{ color:C.textMuted, fontSize:16, cursor:'pointer' }} />
          <span style={{ fontSize:13, color:C.textMuted, fontWeight:500 }}>김도현 지도사</span>
          <div style={{ width:28, height:28, borderRadius:'50%', background:C.primaryLight, display:'flex', alignItems:'center', justifyContent:'center', cursor:'pointer' }}>
            <i className="ti ti-user" style={{ color:C.primary, fontSize:14 }} />
          </div>
        </div>
      </div>
      <div style={{ display:'flex', gap:0, overflowX:'auto' }}>
        {TABS.map(tab => (
          <button key={tab.id} onClick={() => setActiveTab(tab.id)} style={{ background:'none', border:'none', cursor:'pointer', padding:'12px 14px', fontSize:13, fontWeight:activeTab===tab.id?600:400, color:activeTab===tab.id?C.primary:C.textMuted, borderBottom:activeTab===tab.id?`2px solid ${C.primary}`:'2px solid transparent', whiteSpace:'nowrap', transition:'all 0.15s ease', display:'flex', alignItems:'center', gap:5 }}>
            <i className={`ti ${tab.icon}`} style={{ fontSize:13 }} />
            {tab.label}
          </button>
        ))}
      </div>
    </div>
  </header>
);

const HeroBanner = ({ activeTab }) => {
  const stats = [
    { icon:'ti-activity', label:'진행 중 장례', value:'3', sub:'건' },
    { icon:'ti-users', label:'금일 조문객', value:'86', sub:'명' },
    { icon:'ti-message-2', label:'SMS 발송완료', value:'12', sub:'건' },
    { icon:'ti-file-plus', label:'신규 접수 대기', value:'1', sub:'건' },
  ];
  if (activeTab !== 'main') {
    const cur = TABS.find(t => t.id === activeTab);
    return (
      <div style={{ background:`linear-gradient(to right, ${C.primaryLight}, ${C.bg})`, borderBottom:`1px solid ${C.border}`, padding:'16px 24px' }}>
        <div style={{ maxWidth:1280, margin:'0 auto', display:'flex', alignItems:'center', gap:10 }}>
          <div style={{ width:3, height:20, background:C.primary, borderRadius:2 }} />
          <h1 style={{ fontSize:16, fontWeight:600, color:C.text, letterSpacing:'-0.017px' }}>{cur?.label}</h1>
        </div>
      </div>
    );
  }
  return (
    <div style={{ background:`linear-gradient(135deg, ${C.primaryDark} 0%, ${C.primary} 100%)`, color:'#fff' }}>
      <div style={{ maxWidth:1280, margin:'0 auto', padding:'24px 24px 20px' }}>
        <div style={{ display:'flex', alignItems:'flex-start', justifyContent:'space-between', gap:24, flexWrap:'wrap', marginBottom:20 }}>
          <div>
            <p style={{ fontSize:11, color:'rgba(255,255,255,0.65)', fontWeight:500, marginBottom:3 }}>2026년 6월 1일 일요일 · 실시간 현황</p>
            <h1 style={{ fontSize:22, fontWeight:600, letterSpacing:'-0.021px', lineHeight:1.2 }}>오늘의 장례 운영 현황</h1>
            <p style={{ fontSize:12, color:'rgba(255,255,255,0.65)', marginTop:4 }}>하나장례식장 외 9개 지점 동시 운영 중</p>
          </div>
          <svg width="260" height="56" viewBox="0 0 260 56" style={{ opacity:0.85, flexShrink:0 }}>
            {[10,65,120,175,230].map((x, i) => (
              <g key={i}>
                <circle cx={x} cy={28} r={16} fill="rgba(255,255,255,0.12)" stroke="rgba(255,255,255,0.35)" strokeWidth="1.5"/>
                {i < 4 && <line x1={x+18} y1={28} x2={x+47} y2={28} stroke="rgba(255,255,255,0.3)" strokeWidth="1.5" strokeDasharray="3,2"/>}
              </g>
            ))}
            {[['접수',10],['SMS',65],['부고장',120],['체크인',175],['현황',230]].map(([lbl,x],i) => (
              <text key={i} x={x} y={47} textAnchor="middle" fontSize="9" fill="rgba(255,255,255,0.75)" fontFamily="Pretendard, sans-serif">{lbl}</text>
            ))}
            {['1','2','3','4','5'].map((n,i) => (
              <text key={i} x={[10,65,120,175,230][i]} y={33} textAnchor="middle" fontSize="12" fontWeight="600" fill="rgba(255,255,255,0.9)" fontFamily="Pretendard, sans-serif">{n}</text>
            ))}
          </svg>
        </div>
        <div style={{ display:'flex', gap:10, flexWrap:'wrap' }}>
          {stats.map((s,i) => (
            <div key={i} style={{ background:'rgba(255,255,255,0.12)', borderRadius:6, padding:'10px 18px', border:'1px solid rgba(255,255,255,0.18)', minWidth:130, animation:`fadeIn 0.3s ease ${i*0.06}s both` }}>
              <div style={{ display:'flex', alignItems:'center', gap:5, marginBottom:4 }}>
                <i className={`ti ${s.icon}`} style={{ fontSize:12, color:'rgba(255,255,255,0.65)' }} />
                <span style={{ fontSize:10, color:'rgba(255,255,255,0.65)', fontWeight:500 }}>{s.label}</span>
              </div>
              <div style={{ display:'flex', alignItems:'baseline', gap:3 }}>
                <span style={{ fontSize:24, fontWeight:600, color:'#fff', letterSpacing:'-0.021px' }}>{s.value}</span>
                <span style={{ fontSize:11, color:'rgba(255,255,255,0.65)' }}>{s.sub}</span>
              </div>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
};

/* ===== MAIN SCREEN ===== */
const MainScreen = ({ showToast }) => {
  const [ceremonies, setCeremonies] = useState(CEREMONIES);
  const [search, setSearch] = useState('');
  const [showModal, setShowModal] = useState(false);
  const [selected, setSelected] = useState(null);
  const [form, setForm] = useState({ deceased:'', chief:'', phone:'', venue:'', room:'', intermentAt:'', funeralAt:'' });

  const filtered = ceremonies.filter(c => c.deceasedName.includes(search) || c.chiefMourner.includes(search) || c.venue.includes(search));

  const handleSubmit = () => {
    const newC = { id:`C2606-00${ceremonies.length+1}`, deceasedName:form.deceased||'신규고인', chiefMourner:form.chief||'신규상주', phone:form.phone||'010-0000-0000', venue:form.venue||'하나장례식장', room:form.room||'4호실', intermentAt:form.intermentAt||'2026.06.05 10:00', funeralAt:form.funeralAt||'2026.06.07 09:00', status:'pending', smsStatus:'pending', visitors:0, director:'김도현', funeralAddr:'서울 강동구 천중로 211' };
    setCeremonies([newC, ...ceremonies]);
    setShowModal(false);
    showToast('접수가 완료되었습니다. 유가족 SMS가 발송됩니다.');
  };

  const handleSendSMS = (c) => {
    setCeremonies(prev => prev.map(p => p.id===c.id ? {...p, smsStatus:'sent'} : p));
    showToast(`${c.chiefMourner}님께 SMS가 재발송되었습니다.`);
    setSelected(null);
  };

  return (
    <div style={{ animation:'fadeIn 0.3s ease' }}>
      <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:16 }}>
        <h2 style={{ fontSize:17, fontWeight:600, color:C.text, letterSpacing:'-0.016px' }}>접수 현황</h2>
        <div style={{ display:'flex', gap:8 }}>
          <div style={{ position:'relative' }}>
            <i className="ti ti-search" style={{ position:'absolute', left:10, top:'50%', transform:'translateY(-50%)', color:C.textLight, fontSize:13 }} />
            <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="고인명, 빈소 검색..." style={{ padding:'7px 12px 7px 30px', border:`1px solid ${C.borderMid}`, borderRadius:6, fontSize:13, outline:'none', width:200, color:C.text, background:C.surface }} />
          </div>
          <button onClick={()=>setShowModal(true)} style={{ display:'flex', alignItems:'center', gap:5, background:C.primary, color:'#fff', border:'none', borderRadius:9999, padding:'8px 16px', fontSize:13, fontWeight:600, cursor:'pointer' }}>
            <i className="ti ti-plus" style={{ fontSize:13 }} /> 새 접수 등록
          </button>
        </div>
      </div>

      <div style={{ background:C.surface, borderRadius:6, border:`1px solid ${C.border}`, overflow:'hidden', boxShadow:C.shadow }}>
        <table style={{ width:'100%', borderCollapse:'collapse' }}>
          <thead>
            <tr style={{ background:'#f4f2ef' }}>
              {['접수번호','고인명','상주','장례식장 · 빈소','발인 일시','담당 지도사','상태','SMS','조문객'].map(h => (
                <th key={h} style={{ padding:'9px 14px', fontSize:11, fontWeight:600, color:C.textMuted, textAlign:'left', borderBottom:`1px solid ${C.border}`, whiteSpace:'nowrap' }}>{h}</th>
              ))}
            </tr>
          </thead>
          <tbody>
            {filtered.map((c,i) => (
              <tr key={c.id} onClick={()=>setSelected(c)} style={{ borderBottom:`1px solid ${C.border}`, cursor:'pointer', transition:'background 0.12s' }}
                onMouseEnter={e=>e.currentTarget.style.background=C.surfaceHover}
                onMouseLeave={e=>e.currentTarget.style.background='transparent'}>
                <td style={{ padding:'11px 14px', fontSize:11, color:C.textLight, fontFamily:'monospace' }}>{c.id}</td>
                <td style={{ padding:'11px 14px', fontSize:14, fontWeight:600, color:C.text }}>{c.deceasedName}</td>
                <td style={{ padding:'11px 14px', fontSize:13, color:C.textMuted }}>{c.chiefMourner}</td>
                <td style={{ padding:'11px 14px', fontSize:12, color:C.textMuted }}>{c.venue} {c.room}</td>
                <td style={{ padding:'11px 14px', fontSize:12, color:C.textMuted }}>{c.funeralAt}</td>
                <td style={{ padding:'11px 14px', fontSize:13, color:C.textMuted }}>{c.director}</td>
                <td style={{ padding:'11px 14px' }}><Badge label={c.status==='active'?'진행중':c.status==='completed'?'완료':'대기'} color={c.status} /></td>
                <td style={{ padding:'11px 14px' }}><Badge label={c.smsStatus==='sent'?'발송완료':'대기중'} color={c.smsStatus==='sent'?'sent':'pending'} /></td>
                <td style={{ padding:'11px 14px', fontSize:13, fontWeight:600, color:C.text }}>{c.visitors}명</td>
              </tr>
            ))}

                <div style={{ width:8, height:8, background:'#fff', borderRadius:'50%', transform:'rotate(45deg)' }} />
              </div>
            </div>
            <div style={{ position:'absolute', bottom:8, left:8, background:'rgba(255,255,255,0.92)', borderRadius:4, padding:'4px 8px', fontSize:10, color:C.text, fontWeight:500, boxShadow:C.shadowMd }}>
              {ceremony.venue}
            </div>
          </div>
          <p style={{ fontSize:11, color:C.textMuted }}>{ceremony.funeralAddr}</p>
          <button onClick={()=>showToast('카카오맵으로 이동합니다.')} style={{ width:'100%', marginTop:10, background:'none', border:`1px solid ${C.border}`, borderRadius:9999, padding:'8px 0', fontSize:12, cursor:'pointer', color:C.textMuted, display:'flex', alignItems:'center', justifyContent:'center', gap:4 }}>
            <i className="ti ti-map" style={{ fontSize:13 }} /> 길찾기 열기
          </button>
        </div>

        <div style={{ background:C.surface, borderRadius:6, border:`1px solid ${C.border}`, boxShadow:C.shadow, padding:20 }}>
          <div style={{ display:'flex', alignItems:'center', gap:6, marginBottom:14 }}>
            <i className="ti ti-qrcode" style={{ fontSize:14, color:C.primary }} />
            <span style={{ fontSize:13, fontWeight:600, color:C.text }}>방문 사전 등록</span>
          </div>
          {!qrIssued ? (
            <div>
              <p style={{ fontSize:12, color:C.textMuted, lineHeight:1.6, marginBottom:14 }}>현장 조문 시 QR 코드로 빠른 입장이 가능합니다. 이름과 연락처를 입력하면 모바일 입장용 QR 코드가 즉시 발급됩니다.</p>
              <FormField label="성함" value={regForm.name} onChange={v=>setRegForm({...regForm,name:v})} placeholder="홍길동" required />
              <FormField label="연락처" value={regForm.phone} onChange={v=>setRegForm({...regForm,phone:v})} placeholder="010-0000-0000" required />
              <button onClick={handleRegister} style={{ width:'100%', background:C.primary, color:'#fff', border:'none', borderRadius:9999, padding:'10px 0', fontSize:13, fontWeight:600, cursor:'pointer' }}>QR 코드 발급받기</button>
            </div>
          ) : (
            <div style={{ textAlign:'center' }}>
              <div style={{ width:100, height:100, background:'#1a1816', borderRadius:6, margin:'0 auto 12px', display:'flex', alignItems:'center', justifyContent:'center', position:'relative' }}>
                {Array.from({length:9}).map((_,i) => (
                  <div key={i} style={{ position:'absolute', width:Math.random()*20+8, height:Math.random()*20+8, background:i%3===0?'#fff':'#1a1816', left:`${(i%3)*30+5}%`, top:`${Math.floor(i/3)*30+5}%`, borderRadius:1 }} />
                ))}
              </div>
              <p style={{ fontSize:13, fontWeight:600, color:C.success, marginBottom:4 }}>QR 코드 발급 완료</p>
              <p style={{ fontSize:11, color:C.textMuted, marginBottom:12 }}>{regForm.name}님의 입장 QR이 생성되었습니다</p>
              <button onClick={()=>showToast('QR 이미지가 저장됩니다.')} style={{ background:C.primary, color:'#fff', border:'none', borderRadius:9999, padding:'8px 20px', fontSize:12, fontWeight:600, cursor:'pointer', display:'flex', alignItems:'center', gap:4, margin:'0 auto' }}>
                <i className="ti ti-download" style={{ fontSize:13 }} /> QR 저장
              </button>
            </div>
          )}
        </div>
      </div>
    </div>
  );
};

/* ===== CHECKIN SCREEN ===== */
const CheckinScreen = ({ showToast }) => {
  const [mode, setMode] = useState('qr');
  const [scanning, setScanning] = useState(false);
  const [scanResult, setScanResult] = useState(null);
  const [phoneInput, setPhoneInput] = useState('');
  const [recentCheckins, setRecentCheckins] = useState(VISITORS.slice(0,4));
  const [printTarget, setPrintTarget] = useState(null);

  const doScan = () => {
    setScanning(true);
    setScanResult(null);
    setTimeout(() => {
      setScanning(false);
      const r = { name:'정다은', phone:'010-6666-7777' };
      setScanResult(r);
    }, 2000);
  };

  const handleCheckin = (person) => {
    const newV = { id:`V00${recentCheckins.length+1}`, name:person.name, phone:person.phone, checkedAt:'방금', method:mode, ceremonyCId:'C2606-001' };
    setRecentCheckins(p=>[newV,...p]);
    setPrintTarget(person);
    showToast(`${person.name}님 체크인이 완료되었습니다.`);
    setScanResult(null);
    setPhoneInput('');
  };

  const handlePhoneCheckin = () => {
    if (!phoneInput) return;
    handleCheckin({ name:'조문객', phone:phoneInput });
  };

  return (
    <div style={{ animation:'fadeIn 0.3s ease', display:'grid', gridTemplateColumns:'400px 1fr', gap:24 }}>
      <div>
        <div style={{ background:C.surface, borderRadius:6, border:`1px solid ${C.border}`, boxShadow:C.shadow, overflow:'hidden' }}>
          <div style={{ padding:'16px 20px', borderBottom:`1px solid ${C.border}` }}>
            <h3 style={{ fontSize:14, fontWeight:600, color:C.text, marginBottom:12 }}>방문 등록</h3>
            <div style={{ display:'flex', background:C.bg, borderRadius:9999, padding:3 }}>
              {[['qr','QR 스캔'],['phone','전화번호 입력']].map(([k,l]) => (
                <button key={k} onClick={()=>{setMode(k);setScanResult(null);setPhoneInput('');}} style={{ flex:1, background:mode===k?C.surface:'none', border:'none', borderRadius:9999, padding:'7px 0', fontSize:12, fontWeight:mode===k?600:400, color:mode===k?C.text:C.textMuted, cursor:'pointer', boxShadow:mode===k?C.shadowMd:'none', transition:'all 0.15s' }}>
                  {l}
                </button>
              ))}
            </div>
          </div>
          <div style={{ padding:20 }}>
            {mode === 'qr' && (
              <div style={{ textAlign:'center' }}>
                <div style={{ width:220, height:220, background:'#1a1816', borderRadius:8, position:'relative', overflow:'hidden', margin:'0 auto 16px' }}>
                  <div style={{ position:'absolute', inset:0, backgroundImage:'linear-gradient(rgba(255,255,255,0.06) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,0.06) 1px, transparent 1px)', backgroundSize:'22px 22px' }} />
                  {scanning && <div style={{ position:'absolute', left:0, right:0, height:2, background:`${C.primary}dd`, animation:'scanLine 1.5s linear infinite' }} />}
                  {!scanResult ? (
                    <div style={{ position:'absolute', top:'50%', left:'50%', transform:'translate(-50%,-50%)', width:130, height:130, border:`2px solid ${scanning?C.primary:'rgba(74,127,165,0.5)'}`, borderRadius:8 }} />
                  ) : (
                    <div style={{ position:'absolute', inset:0, display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', gap:6 }}>
                      <div style={{ width:44, height:44, borderRadius:'50%', background:C.success, display:'flex', alignItems:'center', justifyContent:'center' }}>
                        <i className="ti ti-check" style={{ fontSize:22, color:'#fff' }} />
                      </div>
                      <div style={{ color:'#fff', fontSize:14, fontWeight:600 }}>{scanResult.name}</div>
                      <div style={{ color:'rgba(255,255,255,0.6)', fontSize:11 }}>{scanResult.phone}</div>
                    </div>
                  )}
                </div>
                {!scanning && !scanResult && (
                  <button onClick={doScan} style={{ background:C.primary, color:'#fff', border:'none', borderRadius:9999, padding:'10px 24px', fontSize:13, fontWeight:600, cursor:'pointer' }}>
                    QR 스캔 시작
                  </button>
                )}
                {scanning && <p style={{ fontSize:12, color:C.textMuted }}>QR 코드를 카메라에 비춰주세요...</p>}
                {scanResult && (
                  <button onClick={()=>handleCheckin(scanResult)} style={{ background:C.success, color:'#fff', border:'none', borderRadius:9999, padding:'10px 24px', fontSize:13, fontWeight:600, cursor:'pointer' }}>
                    체크인 완료
                  </button>
                )}
              </div>
            )}
            {mode === 'phone' && (
              <div>
                <FormField label="전화번호" value={phoneInput} onChange={setPhoneInput} placeholder="010-0000-0000" />
                <button onClick={handlePhoneCheckin} style={{ width:'100%', background:C.primary, color:'#fff', border:'none', borderRadius:9999, padding:'10px 0', fontSize:13, fontWeight:600, cursor:'pointer' }}>
                  체크인 등록
                </button>
              </div>
            )}
          </div>
        </div>

        {printTarget && (
          <div style={{ background:C.surface, borderRadius:6, border:`1px solid ${C.success}`, boxShadow:C.shadow, padding:16, marginTop:12 }}>
            <div style={{ display:'flex', alignItems:'center', gap:6, marginBottom:10 }}>
              <i className="ti ti-circle-check" style={{ fontSize:14, color:C.success }} />
              <span style={{ fontSize:13, fontWeight:600, color:C.success }}>체크인 완료 — 라벨 인쇄</span>
            </div>
            <div style={{ background:'#f8f6f3', border:`1px dashed ${C.borderMid}`, borderRadius:4, padding:'10px 12px', marginBottom:10 }}>
              <div style={{ fontSize:11, color:C.textLight, marginBottom:3 }}>인쇄 미리보기</div>
              <div style={{ display:'flex', alignItems:'center', gap:10 }}>
                <div style={{ width:36, height:36, background:'#1a1816', borderRadius:3, flexShrink:0 }} />
                <div>
                  <div style={{ fontSize:13, fontWeight:700, color:C.text }}>{printTarget.name}</div>
                  <div style={{ fontSize:10, color:C.textMuted }}>{ceremony ? CEREMONIES[0].venue : ''} {ceremony ? CEREMONIES[0].room : ''}</div>
                </div>
              </div>
            </div>
            <button onClick={()=>{showToast('라벨이 프린터로 전송됩니다.');setPrintTarget(null);}} style={{ width:'100%', background:C.primaryDark, color:'#fff', border:'none', borderRadius:9999, padding:'9px 0', fontSize:13, fontWeight:600, cursor:'pointer', display:'flex', alignItems:'center', justifyContent:'center', gap:5 }}>
              <i className="ti ti-printer" style={{ fontSize:13 }} /> 라벨 인쇄
            </button>
          </div>
        )}
      </div>

      <div>
        <div style={{ background:C.surface, borderRadius:6, border:`1px solid ${C.border}`, boxShadow:C.shadow }}>
          <div style={{ padding:'14px 20px', borderBottom:`1px solid ${C.border}`, display:'flex', alignItems:'center', justifyContent:'space-between' }}>
            <span style={{ fontSize:14, fontWeight:600, color:C.text }}>금일 체크인 현황</span>
            <span style={{ fontSize:12, color:C.textMuted }}>{recentCheckins.length}명</span>
          </div>
          <table style={{ width:'100%', borderCollapse:'collapse' }}>
            <thead>
              <tr style={{ background:'#f4f2ef' }}>
                {['성함','연락처','체크인 시각','방법','라벨'].map(h => (
                  <th key={h} style={{ padding:'8px 14px', fontSize:11, fontWeight:600, color:C.textMuted, textAlign:'left', borderBottom:`1px solid ${C.border}` }}>{h}</th>
                ))}
              </tr>
            </thead>
            <tbody>
              {recentCheckins.map((v,i) => (
                <tr key={i} style={{ borderBottom:i<recentCheckins.length-1?`1px solid ${C.border}`:'none' }}>
                  <td style={{ padding:'10px 14px', fontSize:14, fontWeight:500, color:C.text }}>{v.name}</td>
                  <td style={{ padding:'10px 14px', fontSize:12, color:C.textMuted, fontFamily:'monospace' }}>{v.phone}</td>
                  <td style={{ padding:'10px 14px', fontSize:12, color:C.textMuted }}>{v.checkedAt}</td>
                  <td style={{ padding:'10px 14px' }}><Badge label={v.method==='qr'?'QR':'전화번호'} color={v.method} /></td>
                  <td style={{ padding:'10px 14px' }}>
                    <button onClick={()=>{showToast(`${v.name}님 라벨이 재인쇄됩니다.`);}} style={{ background:'none', border:`1px solid ${C.border}`, borderRadius:4, padding:'3px 8px', fontSize:11, cursor:'pointer', color:C.textMuted, display:'flex', alignItems:'center', gap:3 }}>
                      <i className="ti ti-printer" style={{ fontSize:11 }} /> 재인쇄
                    </button>
                  </td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      </div>
    </div>
  );
};

/* ===== DASHBOARD SCREEN ===== */
const DashboardScreen = () => {
  const [filter, setFilter] = useState('all');
  const [search, setSearch] = useState('');
  const filtered = CEREMONIES.filter(c => filter==='all' || c.status===filter).filter(c => c.deceasedName.includes(search)||c.venue.includes(search));
  return (
    <div style={{ animation:'fadeIn 0.3s ease' }}>
      <div style={{ display:'grid', gridTemplateColumns:'repeat(4, 1fr)', gap:12, marginBottom:20 }}>
        {[
          { icon:'ti-clipboard-list', label:'전체 접수', value:'4', color:C.primary },
          { icon:'ti-users', label:'총 조문객', value:'164', color:C.success },
          { icon:'ti-message-2', label:'SMS 발송', value:'12', color:'#a05c1a' },
          { icon:'ti-check-circle', label:'완료 건', value:'1', color:'#5c6b7a' },
        ].map((s,i) => (
          <div key={i} style={{ background:C.surface, borderRadius:6, border:`1px solid ${C.border}`, padding:'16px 20px', boxShadow:C.shadow }}>
            <div style={{ display:'flex', alignItems:'center', gap:6, marginBottom:10 }}>
              <div style={{ width:28, height:28, borderRadius:6, background:`${s.color}18`, display:'flex', alignItems:'center', justifyContent:'center' }}>
                <i className={`ti ${s.icon}`} style={{ fontSize:14, color:s.color }} />
              </div>
              <span style={{ fontSize:11, color:C.textMuted, fontWeight:500 }}>{s.label}</span>
            </div>
            <span style={{ fontSize:28, fontWeight:600, color:C.text, letterSpacing:'-0.021px' }}>{s.value}</span>
          </div>
        ))}
      </div>

      <div style={{ display:'grid', gridTemplateColumns:'1fr 400px', gap:16, marginBottom:20 }}>
        <div style={{ background:C.surface, borderRadius:6, border:`1px solid ${C.border}`, boxShadow:C.shadow, padding:20 }}>
          <h3 style={{ fontSize:13, fontWeight:600, color:C.text, marginBottom:14 }}>지점별 금일 조문객 현황</h3>
          <div style={{ height:220, position:'relative' }}>
            <ResponsiveContainer width="100%" height="100%">
              <BarChart data={CHART_DATA} barSize={28}>
                <CartesianGrid strokeDasharray="3 3" stroke={C.border} vertical={false} />
                <XAxis dataKey="name" tick={{ fill:C.textMuted, fontSize:11 }} axisLine={false} tickLine={false} />
                <YAxis tick={{ fill:C.textMuted, fontSize:11 }} axisLine={false} tickLine={false} />
                <Tooltip contentStyle={{ background:C.surface, border:`1px solid ${C.border}`, borderRadius:6, fontSize:12 }} />
                <Bar dataKey="visitors" name="조문객 수" fill={C.primary} radius={[4,4,0,0]} />
              </BarChart>
            </ResponsiveContainer>
          </div>
        </div>
        <div style={{ background:C.surface, borderRadius:6, border:`1px solid ${C.border}`, boxShadow:C.shadow, padding:20 }}>
          <h3 style={{ fontSize:13, fontWeight:600, color:C.text, marginBottom:14 }}>SMS 발송 현황</h3>
          {[
            { label:'발송 완료', value:10, total:12, color:C.success },
            { label:'대기 중', value:1, total:12, color:C.warning },
            { label:'실패', value:1, total:12, color:C.error },
          ].map((s,i) => (
            <div key={i} style={{ marginBottom:14 }}>
              <div style={{ display:'flex', justifyContent:'space-between', marginBottom:5 }}>
                <span style={{ fontSize:12, color:C.textMuted }}>{s.label}</span>
                <span style={{ fontSize:12, fontWeight:600, color:C.text }}>{s.value}건</span>
              </div>
              <div style={{ height:6, background:C.bg, borderRadius:3, overflow:'hidden' }}>
                <div style={{ height:'100%', width:`${(s.value/s.total)*100}%`, background:s.color, borderRadius:3, transition:'width 0.6s ease' }} />
              </div>
            </div>
          ))}
        </div>
      </div>

      <div style={{ background:C.surface, borderRadius:6, border:`1px solid ${C.border}`, boxShadow:C.shadow }}>
        <div style={{ padding:'14px 20px', borderBottom:`1px solid ${C.border}`, display:'flex', alignItems:'center', gap:12 }}>
          <span style={{ fontSize:14, fontWeight:600, color:C.text }}>전체 접수 목록</span>
          <div style={{ display:'flex', gap:6 }}>
            {[['all','전체'],['active','진행중'],['completed','완료'],['pending','대기']].map(([k,l]) => (
              <button key={k} onClick={()=>setFilter(k)} style={{ background:filter===k?C.primaryLight:'none', border:`1px solid ${filter===k?C.primary:C.border}`, borderRadius:9999, padding:'3px 10px', fontSize:11, fontWeight:filter===k?600:400, color:filter===k?C.primary:C.textMuted, cursor:'pointer' }}>{l}</button>
            ))}
          </div>
          <div style={{ position:'relative', marginLeft:'auto' }}>
            <i className="ti ti-search" style={{ position:'absolute', left:8, top:'50%', transform:'translateY(-50%)', color:C.textLight, fontSize:12 }} />
            <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="검색..." style={{ padding:'6px 10px 6px 26px', border:`1px solid ${C.border}`, borderRadius:6, fontSize:12, outline:'none', width:160, color:C.text, background:C.surface }} />
          </div>
        </div>
        <table style={{ width:'100%', borderCollapse:'collapse' }}>
          <thead>
            <tr style={{ background:'#f4f2ef' }}>
              {['접수번호','고인명','장례식장','발인일','조문객','상태'].map(h => (
                <th key={h} style={{ padding:'8px 14px', fontSize:11, fontWeight:600, color:C.textMuted, textAlign:'left', borderBottom:`1px solid ${C.border}` }}>{h}</th>
              ))}
            </tr>
          </thead>
          <tbody>
            {filtered.map((c,i) => (
              <tr key={i} style={{ borderBottom:i<filtered.length-1?`1px solid ${C.border}`:'none' }}>
                <td style={{ padding:'10px 14px', fontSize:11, color:C.textLight, fontFamily:'monospace' }}>{c.id}</td>
                <td style={{ padding:'10px 14px', fontSize:14, fontWeight:500, color:C.text }}>{c.deceasedName}</td>
                <td style={{ padding:'10px 14px', fontSize:12, color:C.textMuted }}>{c.venue} {c.room}</td>
                <td style={{ padding:'10px 14px', fontSize:12, color:C.textMuted }}>{c.funeralAt}</td>
                <td style={{ padding:'10px 14px', fontSize:13, fontWeight:600, color:C.text }}>{c.visitors}명</td>
                <td style={{ padding:'10px 14px' }}><Badge label={c.status==='active'?'진행중':c.status==='completed'?'완료':'대기'} color={c.status} /></td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>
    </div>
  );
};

/* ===== APP ROOT ===== */
const App = () => {
  const [activeTab, setActiveTab] = useState('main');
  const [toast, setToast] = useState(null);
  const showToast = (msg, type='success') => setToast({ msg, type });
  return (
    <div style={{ width:'100%', minHeight:'100vh', display:'flex', flexDirection:'column', background:C.bg }}>
      <TopNav activeTab={activeTab} setActiveTab={setActiveTab} />
      <HeroBanner activeTab={activeTab} />
      <main style={{ flex:1, width:'100%' }}>
        <div style={{ maxWidth:1280, margin:'0 auto', padding:'24px' }}>
          {activeTab==='main' && <MainScreen showToast={showToast} />}
          {activeTab==='family-app' && <FamilyAppScreen showToast={showToast} />}
          {activeTab==='obituary' && <ObituaryScreen showToast={showToast} />}
          {activeTab==='checkin' && <CheckinScreen showToast={showToast} />}
          {activeTab==='dashboard' && <DashboardScreen />}
        </div>
      </main>
      {toast && <Toast message={toast.msg} type={toast.type} onClose={()=>setToast(null)} />}
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
