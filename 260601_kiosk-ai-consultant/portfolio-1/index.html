<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body,#root{width:100%;min-height:100vh;font-family:'Pretendard',system-ui,sans-serif;background:#fafaf9;color:#0c0a09}

@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideInRight{from{transform:translateX(100%);opacity:0}to{transform:translateX(0);opacity:1}}
@keyframes pulse{0%,100%{transform:scale(1);box-shadow:0 4px 16px rgba(59,166,241,.4)}50%{transform:scale(1.12);box-shadow:0 6px 28px rgba(59,166,241,.65)}}
@keyframes waveBar{0%,100%{height:6px}50%{height:22px}}
@keyframes typingDot{0%,80%,100%{transform:scale(.75);opacity:.4}40%{transform:scale(1.2);opacity:1}}
@keyframes countUp{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}

.topnav{position:fixed;top:0;left:0;right:0;height:56px;background:#fff;border-bottom:1px solid #e5e7eb;display:flex;align-items:center;padding:0 24px;gap:0;z-index:100}
.topnav-logo{display:flex;align-items:center;gap:8px;font-size:15px;font-weight:600;letter-spacing:-.01em;margin-right:28px;white-space:nowrap;color:#0c0a09}
.logo-mark{width:30px;height:30px;background:#3ba6f1;border-radius:9px;display:flex;align-items:center;justify-content:center;color:#fff;flex-shrink:0}
.topnav-tabs{display:flex;gap:2px;flex:1}
.nav-tab{padding:7px 15px;border-radius:8px;font-size:14px;font-weight:500;color:#78716c;cursor:pointer;border:none;background:transparent;font-family:inherit;transition:all .15s;white-space:nowrap}
.nav-tab:hover{background:#f5f5f4;color:#0c0a09}
.nav-tab.active{background:#eff6ff;color:#3ba6f1;font-weight:600}
.topnav-right{display:flex;align-items:center;gap:8px;margin-left:auto}
.avatar{width:32px;height:32px;border-radius:50%;background:#3ba6f1;color:#fff;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:600}

.page{animation:fadeIn .22s ease;padding:24px;width:100%}
.hero-band{background:linear-gradient(135deg,#3ba6f1 0%,#1e8bc6 100%);padding:22px 24px 18px;animation:fadeIn .3s ease}

.kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:28px}
.kpi-card{background:#fff;border-radius:10px;border:1px solid #e5e7eb;box-shadow:0 2px 8px rgba(0,0,0,.07);padding:16px 20px;transition:box-shadow .2s}
.kpi-card:hover{box-shadow:0 5px 18px rgba(0,0,0,.11)}
.kpi-value{font-size:28px;font-weight:700;letter-spacing:-.021em;color:#0c0a09;animation:countUp .4s ease}
.kpi-label{font-size:12px;color:#78716c;margin-top:2px}

.card{background:#fff;border-radius:10px;border:1px solid #e5e7eb;box-shadow:0 2px 8px rgba(0,0,0,.07);transition:box-shadow .2s}
.card:hover{box-shadow:0 5px 18px rgba(0,0,0,.11)}

.btn{border:none;cursor:pointer;font-family:inherit;font-weight:500;border-radius:8px;transition:all .15s}
.btn-primary{background:#3ba6f1;color:#fff;padding:8px 16px;font-size:14px}
.btn-primary:hover{background:#2d96e0}
.btn-secondary{background:#fff;color:#0c0a09;border:1px solid #e5e7eb;padding:8px 16px;font-size:14px}
.btn-secondary:hover{background:#fafaf9}
.btn-ghost{background:transparent;color:#78716c;border:none;cursor:pointer;font-family:inherit;border-radius:6px;padding:6px 10px;font-size:13px;transition:all .15s}
.btn-ghost:hover{background:#f5f5f4;color:#0c0a09}

.badge{display:inline-flex;align-items:center;padding:3px 10px;border-radius:9999px;font-size:12px;font-weight:500}
.badge-blue{background:#eff6ff;color:#3ba6f1}
.badge-green{background:#f0fdf4;color:#16a34a}
.badge-gray{background:#f5f5f4;color:#78716c}
.badge-red{background:#fef2f2;color:#dc2626}
.badge-orange{background:#fff7ed;color:#c2410c}

.form-input{width:100%;border:1px solid #e5e7eb;border-radius:8px;padding:9px 12px;font-size:14px;font-family:inherit;color:#0c0a09;background:#fff;transition:border-color .15s;outline:none}
.form-input:focus{border-color:#3ba6f1;box-shadow:0 0 0 3px rgba(59,166,241,.1)}
.form-label{display:block;font-size:13px;font-weight:500;color:#0c0a09;margin-bottom:4px}

.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);display:flex;align-items:center;justify-content:center;z-index:200;animation:fadeIn .15s ease}
.modal-box{background:#fff;border-radius:14px;box-shadow:0 20px 60px rgba(0,0,0,.15);max-height:90vh;overflow-y:auto;animation:fadeIn .2s ease}

.drawer-overlay{position:fixed;inset:0;background:rgba(0,0,0,.3);z-index:199}
.drawer{position:fixed;top:0;right:0;bottom:0;width:480px;background:#fff;box-shadow:-8px 0 32px rgba(0,0,0,.12);z-index:200;overflow-y:auto;animation:slideInRight .25s ease;display:flex;flex-direction:column}

.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#1c1917;color:#fff;padding:10px 20px;border-radius:8px;font-size:14px;z-index:300;animation:fadeIn .2s ease;white-space:nowrap;pointer-events:none}

.data-table{width:100%;border-collapse:collapse}
.data-table th{text-align:left;padding:10px 16px;font-size:12px;font-weight:600;color:#78716c;text-transform:uppercase;letter-spacing:.04em;border-bottom:1px solid #e5e7eb}
.data-table td{padding:12px 16px;font-size:14px;border-bottom:1px solid #f5f5f4}
.data-table tr:hover td{background:#fafaf9;cursor:pointer}

.kiosk-device{background:linear-gradient(145deg,#1e293b,#0f172a);border-radius:20px;padding:16px;box-shadow:0 24px 48px rgba(0,0,0,.28)}
.kiosk-screen{background:#fff;border-radius:12px;overflow:hidden;min-height:400px;display:flex;flex-direction:column}
.kiosk-header{background:#3ba6f1;padding:16px 20px;color:#fff;flex-shrink:0}
.kiosk-body{padding:20px;flex:1}

.wave-bars{display:flex;align-items:center;gap:4px;height:30px;justify-content:center}
.wave-bar{width:4px;background:#3ba6f1;border-radius:2px;height:8px;animation:waveBar .7s ease-in-out infinite}
.wave-bar:nth-child(1){animation-delay:0s}
.wave-bar:nth-child(2){animation-delay:.1s}
.wave-bar:nth-child(3){animation-delay:.2s}
.wave-bar:nth-child(4){animation-delay:.3s}
.wave-bar:nth-child(5){animation-delay:.4s}
.wave-bar:nth-child(6){animation-delay:.5s}
.wave-bar:nth-child(7){animation-delay:.3s}
.wave-bar:nth-child(8){animation-delay:.1s}

.mic-btn{width:60px;height:60px;border-radius:9999px;background:#3ba6f1;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#fff;box-shadow:0 4px 16px rgba(59,166,241,.4);transition:transform .15s;font-family:inherit}
.mic-btn:hover{transform:scale(1.06)}
.mic-btn.listening{animation:pulse 1.1s ease-in-out infinite}

.typing-dot{width:6px;height:6px;border-radius:50%;background:#78716c;display:inline-block;animation:typingDot 1.4s infinite ease-in-out}
.typing-dot:nth-child(2){animation-delay:.2s}
.typing-dot:nth-child(3){animation-delay:.4s}

.chart-wrap{position:relative;height:220px}

.sub-tabs{display:flex;gap:0;border-bottom:1px solid #e5e7eb;margin-bottom:20px}
.sub-tab{padding:8px 16px;border:none;background:transparent;cursor:pointer;font-family:inherit;font-size:14px;font-weight:500;color:#78716c;border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .15s}
.sub-tab:hover{color:#0c0a09}
.sub-tab.active{color:#3ba6f1;border-bottom-color:#3ba6f1;font-weight:600}
</style>
</head>

function Toast({msg,onClose}) {
  useEffect(()=>{const t=setTimeout(onClose,2800);return()=>clearTimeout(t)},[]);
  return <div className="toast">{msg}</div>;
}

function Drawer({item,onClose}) {
  if(!item) return null;
  return <>
    <div className="drawer-overlay" onClick={onClose}/>
    <div className="drawer">
      <div style={{padding:'18px 22px',borderBottom:'1px solid #e5e7eb',display:'flex',justifyContent:'space-between',alignItems:'center',flexShrink:0}}>
        <div>
          <div style={{fontWeight:600,fontSize:16}}>{item.name} 방문객 상담 내역</div>

        </div>
        <button className="btn-ghost" onClick={onClose}><i data-lucide="x" style={{width:18,height:18}}></i></button>
      </div>
      <div style={{padding:'20px 22px',flex:1,overflowY:'auto'}}>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12,marginBottom:20}}>
          {[['이름',item.name],['연락처',item.phone]].map(([k,v])=>(
            <div key={k} style={{background:'#fafaf9',borderRadius:8,padding:'10px 14px'}}>
              <div style={{fontSize:12,color:'#78716c'}}>{k}</div>
              <div style={{fontSize:14,fontWeight:500,marginTop:2}}>{v}</div>
            </div>
          ))}
        </div>
        <div style={{marginBottom:16}}>
          <div style={{background:'#eff6ff',borderRadius:10,padding:'12px 16px',borderLeft:'3px solid #3ba6f1',marginBottom:10}}>

            <div style={{fontSize:14}}>{item.question}</div>
          </div>
          <div style={{background:'#fafaf9',borderRadius:10,padding:'12px 16px'}}>
            <div style={{fontSize:11,color:'#78716c',fontWeight:600,marginBottom:4,display:'flex',alignItems:'center',gap:4}}>

function KioskSim() {
  const [step,setStep]=useState('input');
  const [nm,setNm]=useState('');
  const [ph,setPh]=useState('');
  const [conv,setConv]=useState([]);
  const go=()=>{
    if(!nm||!ph){return;}
    const i=Math.floor(Math.random()*SAMPLE_Q.length);
    setStep('listening');
    setTimeout(()=>{setStep('thinking');setTimeout(()=>{setConv([{q:SAMPLE_Q[i],a:SAMPLE_A[i]}]);setStep('done');},1800);},2200);
  };
  const reset=()=>{setStep('input');setNm('');setPh('');setConv([]);};
  return (
    <div className="kiosk-device">
      <div className="kiosk-screen">
        <div className="kiosk-header">
          <div style={{fontSize:12,opacity:.8}}>래미안 한강 AI 상담 키오스크</div>
          <div style={{fontSize:17,fontWeight:700,marginTop:2,letterSpacing:-.4}}>안녕하세요, AI 상담사입니다</div>
        </div>
        <div className="kiosk-body">
          {step==='input'&&<div>
            <div style={{fontSize:13,color:'#78716c',marginBottom:16}}>방문 정보를 입력해 주세요</div>
            <div style={{marginBottom:12}}>
              <label className="form-label">이름</label>
              <input className="form-input" value={nm} onChange={e=>setNm(e.target.value)} placeholder="홍길동" style={{fontSize:15,padding:'11px 12px'}}/>
            </div>
            <div style={{marginBottom:20}}>
              <label className="form-label">연락처</label>
              <input className="form-input" value={ph} onChange={e=>setPh(e.target.value)} placeholder="010-0000-0000" style={{fontSize:15,padding:'11px 12px'}}/>
            </div>
            <button onClick={go} style={{width:'100%',background:'#3ba6f1',color:'#fff',border:'none',borderRadius:10,padding:'13px',fontSize:15,fontWeight:600,cursor:'pointer',fontFamily:'inherit',boxShadow:'0 4px 14px rgba(59,166,241,.3)'}}>음성으로 질문하기</button>
          </div>}
          {step==='listening'&&<div style={{textAlign:'center',padding:'24px 0'}}>
            <div style={{fontSize:13,color:'#78716c',marginBottom:16}}>말씀하세요...</div>
            <div style={{display:'flex',justifyContent:'center',marginBottom:18}}>
              <button className="mic-btn listening"><i data-lucide="mic" style={{width:26,height:26}}></i></button>
            </div>
            <div className="wave-bars">{[0,1,2,3,4,5,6,7].map(i=><div key={i} className="wave-bar"/>)}</div>
            <div style={{fontSize:13,color:'#3ba6f1',marginTop:14}}>음성 인식 중...</div>
          </div>}
          {step==='thinking'&&<div style={{textAlign:'center',padding:'28px 0'}}>
            <div style={{fontSize:13,color:'#78716c',marginBottom:20}}>AI가 답변을 준비하고 있습니다</div>
            <div style={{display:'flex',justifyContent:'center',gap:6,marginBottom:14}}>
              <div className="typing-dot"/><div className="typing-dot"/><div className="typing-dot"/>
            </div>
            <div style={{fontSize:12,color:'#a8a29e'}}>Claude API 처리 중...</div>
          </div>}
          {step==='done'&&conv.length>0&&<div style={{animation:'fadeIn .3s ease'}}>
            <div style={{background:'#fafaf9',borderRadius:8,padding:'10px 12px',marginBottom:10}}>
              <div style={{fontSize:11,color:'#78716c',marginBottom:4}}>방문객 질문</div>
              <div style={{fontSize:13}}>{conv[0].q}</div>

            <div style={{marginBottom:13}}>
              <label className="form-label">질문</label>
              <input className="form-input" value={fq} onChange={e=>setFq(e.target.value)} placeholder="방문객이 자주 묻는 질문을 입력하세요"/>
            </div>
            <div style={{marginBottom:20}}>
              <label className="form-label">답변</label>
              <textarea className="form-input" value={fa} onChange={e=>setFa(e.target.value)} placeholder="AI 상담사가 안내할 답변을 입력하세요" style={{height:96,resize:'vertical'}}/>
            </div>
            <div style={{display:'flex',gap:10,justifyContent:'flex-end'}}>
              <button className="btn btn-secondary" onClick={()=>setModal(false)}>취소</button>
              <button className="btn btn-primary" onClick={save}>{edit?'수정 저장':'추가'}</button>
            </div>
          </div>
        </div>
      )}
      {toast&&<Toast msg={toast} onClose={()=>setToast('')}/>}
    </div>
  );
}

function App() {
  const [tab,setTab]=useState('상담 시작');
  const [drawer,setDrawer]=useState(null);
  useEffect(()=>{if(window.lucide)window.lucide.createIcons();});
  return (
    <div style={{width:'100%',minHeight:'100vh',display:'flex',flexDirection:'column'}}>
      <nav className="topnav">
        <div className="topnav-logo">
          <div className="logo-mark"><i data-lucide="mic" style={{width:14,height:14}}></i></div>
          모델하우스 AI 키오스크
        </div>
        <div className="topnav-tabs">
          {['상담 시작','이용 내역','통계','콘텐츠 관리'].map(t=>(
            <button key={t} className={`nav-tab${tab===t?' active':''}`} onClick={()=>setTab(t)}>{t}</button>
          ))}
        </div>
        <div className="topnav-right">
          <button className="btn-ghost" style={{padding:'6px 8px'}}><i data-lucide="bell" style={{width:16,height:16}}></i></button>
          <div className="avatar">관</div>
        </div>
      </nav>
      <main style={{flex:1,width:'100%',paddingTop:56}}>
        {tab==='상담 시작'&&<div style={{background:'linear-gradient(135deg,#3ba6f1,#1e8bc6)',padding:'20px 24px 16px',animation:'fadeIn .3s ease'}}>
          <div style={{fontSize:12,color:'rgba(255,255,255,.75)',marginBottom:5}}>모델하우스 AI 음성 상담 키오스크 — 맞춤 구현 데모</div>
          <div style={{fontSize:21,fontWeight:700,color:'#fff',letterSpacing:-.4}}>AI 상담 현황 대시보드</div>
          <div style={{fontSize:13,color:'rgba(255,255,255,.8)',marginTop:3}}>STT · LLM · TTS 통합 파이프라인 기반 모델하우스 방문객 음성 상담 시스템</div>
        </div>}
        {tab==='상담 시작'&&<MainPage onDetail={setDrawer}/>}
        {tab==='이용 내역'&&<UsagePage onDetail={setDrawer}/>}
        {tab==='통계'&&<AnalyticsPage/>}
        {tab==='콘텐츠 관리'&&<ContentPage/>}
      </main>
      {drawer&&<Drawer item={drawer} onClose={()=>setDrawer(null)}/>}
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
