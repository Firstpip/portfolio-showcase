.nav-links{display:flex;gap:2px;flex:1}
.nav-link{padding:7px 16px;border-radius:8px;font-size:14px;font-weight:500;color:#c9b99a;cursor:pointer;border:none;background:transparent;font-family:inherit;transition:all .18s;white-space:nowrap}

.page{animation:fadeSlideUp .25s ease;padding:28px;width:100%}

.gcard{background:#2e1a22;border-radius:16px;border-top:2px solid rgba(184,146,45,.4);box-shadow:0 8px 32px rgba(0,0,0,.45),0 1px 0 rgba(255,255,255,.04);transition:box-shadow .2s,transform .2s}

.kpi-delta{font-size:12px;margin-top:6px}

.badge-green{background:rgba(22,163,74,.15);color:#4ade80}

.drawer-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:199}

.data-table{width:100%;border-collapse:collapse}
.data-table th{text-align:left;padding:10px 16px;font-size:11px;font-weight:600;color:#78716c;text-transform:uppercase;letter-spacing:.06em;border-bottom:1px solid rgba(255,255,255,.08)}

.status-dot{width:8px;height:8px;border-radius:50%;display:inline-block;flex-shrink:0}
.status-online{background:#4ade80;animation:glowPulse 2s infinite;box-shadow:0 0 6px #4ade80}

          <span className={`status-dot ${site.status==='online'?'status-online':'status-offline'}`}/>

        options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{color:'#c9b99a',font:{size:12}}}},scales:{r:{backgroundColor:'rgba(255,255,255,.02)',grid:{color:'rgba(255,255,255,.1)'},angleLines:{color:'rgba(255,255,255,.1)'},pointLabels:{color:'#c9b99a',font:{size:12}},ticks:{color:'#78716c',backdropColor:'transparent',font:{size:10}}}}}

                <div style={{background:'rgba(220,38,38,.08)',border:'1px solid rgba(220,38,38,.2)',borderRadius:10,padding:'12px 16px',marginTop:14,display:'flex',gap:10,alignItems:'center'}}>
                  <Ph name="info" size={16} color="#f87171"/>
                  <div style={{fontSize:13,color:'#f87171'}}>현장이 오프라인 상태입니다. 원격 제어 명령이 전달되지 않을 수 있습니다.</div>
                </div>
              )}
            </div>
          </div>
        )}
      </div>
      {modal&&(
        <div className="modal-overlay" onClick={()=>setModal(false)}>
          <div className="modal-box" style={{width:480,padding:26}} onClick={e=>e.stopPropagation()}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:20}}>
              <div style={{fontWeight:600,fontSize:16}}>새 현장 추가</div>
              <button className="btn-icon" onClick={()=>setModal(false)}><Ph name="x" size={16}/></button>
            </div>
            {[['현장명','예: 마포 모델하우스'],['위치','예: 서울 마포구 상암로 123'],['키오스크 수량','예: 1']].map(([l,p])=>(
              <div key={l} style={{marginBottom:14}}>
                <label className="form-label">{l}</label>
                <input className="form-input" placeholder={p}/>
              </div>
            ))}
            <div style={{display:'flex',gap:10,justifyContent:'flex-end',marginTop:4}}>
              <button className="btn-ghost" onClick={()=>setModal(false)}>취소</button>
              <button className="btn-gold" onClick={()=>{setModal(false);setToast('새 현장이 등록됩니다.');}}>현장 등록</button>
            </div>
          </div>
        </div>
      )}
      {toast&&<Toast msg={toast} onClose={()=>setToast('')}/>}
    </div>
  );
}

function App() {
  const [tab,setTab]=useState('현장 모니터링');
  const [siteModal,setSiteModal]=useState(null);
  return (
    <div style={{width:'100%',minHeight:'100vh',display:'flex',flexDirection:'column'}}>
      <nav className="spa-nav">
        <div className="nav-logo">
          <div className="logo-gem"><Ph name="buildings" size={16} color="#1a0f14"/></div>
          모델하우스 AI 플랫폼
        </div>
        <div className="nav-links">
          {['현장 모니터링','방문객 CRM','AI 인사이트','현장 설정'].map(t=>(
            <button key={t} className={`nav-link${tab===t?' active':''}`} onClick={()=>setTab(t)}>{t}</button>
          ))}
        </div>
        <div className="nav-right">
          <button className="btn-icon"><Ph name="bell" size={16}/></button>
          <div style={{width:32,height:32,borderRadius:'50%',background:'linear-gradient(135deg,#b8922d,#d4a843)',display:'flex',alignItems:'center',justifyContent:'center',color:'#1a0f14',fontSize:13,fontWeight:700}}>관</div>
        </div>
      </nav>
      <main style={{flex:1,width:'100%',paddingTop:58}}>
        {tab==='현장 모니터링'&&<MonitorPage onSiteDetail={setSiteModal}/>}
        {tab==='방문객 CRM'&&<CRMPage/>}
        {tab==='AI 인사이트'&&<InsightPage/>}
        {tab==='현장 설정'&&<SettingsPage/>}
      </main>
      <footer style={{background:'#200d17',borderTop:'1px solid rgba(255,255,255,.06)',padding:'16px 28px',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
        <div style={{fontSize:13,color:'#78716c'}}>모델하우스 AI 상담 운영 통합 플랫폼 — 구현 데모</div>
        <div style={{fontSize:12,color:'#5a4a52'}}>React 18 · Node.js · PostgreSQL · Redis · Claude API</div>
      </footer>
      {siteModal&&(
        <div className="modal-overlay" onClick={()=>setSiteModal(null)}>
          <div className="modal-box" style={{width:500,padding:24}} onClick={e=>e.stopPropagation()}>
            <div style={{display:'flex',justifyContent:'space-between',marginBottom:18}}>
              <div style={{fontWeight:600,fontSize:16}}>{siteModal.name} 상세</div>
              <button className="btn-icon" onClick={()=>setSiteModal(null)}><Ph name="x" size={16}/></button>
            </div>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12,marginBottom:16}}>
              {[['위치',siteModal.location],['오늘 방문',`${siteModal.today}명`],['전체 방문',`${siteModal.total.toLocaleString()}명`],['현재 상담',`${siteModal.ongoing}건`]].map(([k,v])=>(
                <div key={k} style={{background:'rgba(0,0,0,.25)',borderRadius:10,padding:'10px 12px'}}>
                  <div style={{fontSize:11,color:'#78716c'}}>{k}</div>
                  <div style={{fontSize:13,fontWeight:500,marginTop:2}}>{v}</div>
                </div>
              ))}
            </div>
            <div style={{display:'flex',gap:10,justifyContent:'flex-end'}}>
              <button className="btn-ghost" onClick={()=>setSiteModal(null)}>닫기</button>
              <button className="btn-gold" onClick={()=>setSiteModal(null)}>현장 설정으로 이동</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
