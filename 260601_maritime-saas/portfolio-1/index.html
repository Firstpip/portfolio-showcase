// ─── Toast ───────────────────────────────────────────────────
function Toast({ msg, type, onDone }) {
  useEffect(() => {
    const t = setTimeout(onDone, 2600);
    return () => clearTimeout(t);
  }, []);
  return (
    <div className={`toast ${type || ''}`}>
      <i className={`ti ti-${type === 'success' ? 'check' : type === 'error' ? 'x' : 'info-circle'}`}></i>
      {msg}
    </div>
  );
}

function RiskPage() {
  const [risks, setRisks] = useState(RISKS);
  const [filter, setFilter] = useState('all');
  const [search, setSearch] = useState('');
  const [modal, setModal] = useState(null);
  const [toast, setToast] = useState(null);

  const filtered = risks.filter(r => {
    const matchFilter = filter === 'all' || r.priority === filter;
    const matchSearch = !search || r.title.includes(search) || r.vessel.includes(search);
    return matchFilter && matchSearch;
  });

  const handleSave = (form) => {
    setRisks(prev => prev.map(r => r.id === form.id ? form : r));
    setToast({ msg: '리스크가 저장되었습니다', type: 'success' });
  };

  return (
    <div className="page">
      <div className="page-header" style={{ display: 'flex', alignItems: 'flex-start', justifyContent: 'space-between' }}>
        <div>
          <div className="page-title">AI 기반 리스크 관리</div>
          <div className="page-sub">AI 탐지 및 수동 등록 리스크를 통합 관리합니다</div>
        </div>
        <div style={{ display: 'flex', gap: 8 }}>
          <button className="btn btn-secondary btn-sm"><i className="ti ti-robot"></i>AI 자동 탐지</button>
          <button className="btn btn-primary btn-sm" onClick={() => setModal({ id: null, title: '', vessel: VESSELS[0].name, type: '서류 누락', score: 5, priority: 'medium', manager: USERS[0].name, deadline: '', status: '미착수' })}>
            <i className="ti ti-plus"></i>리스크 등록
          </button>
        </div>
      </div>

      <div className="filter-bar">
        <input className="search-input" placeholder="리스크 제목 또는 선박명 검색..." value={search} onChange={e => setSearch(e.target.value)} />
        {['all', 'high', 'medium', 'low'].map(f => (
          <button key={f} onClick={() => setFilter(f)} className="btn btn-sm" style={{
            background: filter === f ? '#1E3A5F' : 'white',
            color: filter === f ? 'white' : '#374151',
            border: filter === f ? 'none' : '1.5px solid #E2E8F0',
          }}>
            {{ all: `전체 (${risks.length})`, high: `고위험 (${risks.filter(r=>r.priority==='high').length})`, medium: `중위험 (${risks.filter(r=>r.priority==='medium').length})`, low: `낮음 (${risks.filter(r=>r.priority==='low').length})` }[f]}
          </button>
        ))}
      </div>

      <div className="card">
        <table className="risk-table">
          <thead>
            <tr>
              <th>점수</th><th>리스크</th><th>선박</th><th>유형</th>
              <th>담당자</th><th>마감일</th><th>상태</th><th></th>
            </tr>
          </thead>
          <tbody>
            {filtered.map(r => (
              <tr key={r.id} onClick={() => setModal(r)}>
                <td><span className={`risk-score ${r.priority}`}>{r.score}</span></td>
                <td>
                  <div style={{ fontWeight: 600, color: '#0F172A', marginBottom: 2 }}>{r.title}</div>
                  {r.aiGenerated && <span className="ai-tag"><i className="ti ti-robot"></i>AI 탐지</span>}
                </td>
                <td style={{ fontSize: 12.5 }}>{r.vessel}</td>
                <td><span className="tag">{r.type}</span></td>
                <td style={{ fontSize: 12.5 }}>{r.manager}</td>
                <td style={{ fontSize: 12.5 }}>{r.deadline}</td>
                <td>
                  <span className={`badge badge-${r.status === '완료' ? 'green' : r.status === '진행중' ? 'blue' : r.status === '미착수' ? 'gray' : 'amber'}`}>
                    <span className={`status-dot ${r.status === '완료' ? 'dot-green' : r.status === '진행중' ? 'dot-green' : r.status === '미착수' ? 'dot-gray' : 'dot-amber'}`}></span>
                    {r.status}
                  </span>
                </td>
                <td>
                  <button className="inline-edit-btn" onClick={e => { e.stopPropagation(); setModal(r); }}>
                    <i className="ti ti-pencil"></i>
                  </button>
                </td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>

      {modal && <RiskModal risk={modal} onClose={() => setModal(null)} onSave={handleSave} />}
      {toast && <Toast {...toast} onDone={() => setToast(null)} />}
    </div>
  );
}

function DocumentPage() {
  const [docs, setDocs] = useState(DOCUMENTS);

  const [uploading, setUploading] = useState(false);

  const [dragOver, setDragOver] = useState(false);

  const filtered = filter === 'all' ? docs : docs.filter(d => d.type === filter);

  const simulateUpload = () => {
    setUploading(true);
    setTimeout(() => {
      setUploading(false);
      setToast({ msg: '파일이 성공적으로 업로드되었습니다', type: 'success' });
    }, 1800);
  };

  return (
    <div className="page">

        </div>
      </div>

      <div
        className="upload-zone"
        style={{ marginBottom: 24, background: dragOver ? '#EFF6FF' : '#F8FAFC', borderColor: dragOver ? '#2563EB' : '#CBD5E1' }}

            <div className="ai-spinner"></div>
            <div style={{ fontSize: 13, color: '#64748B' }}>업로드 중...</div>

          <>
            <div className="upload-zone-icon"><i className="ti ti-cloud-upload"></i></div>
            <div className="upload-zone-text">

              <span style={{ fontSize: 12 }}>PDF, 이미지, 엑셀 지원 · 최대 50MB</span>

          }}>

    { label: '리스크 관리', icon: 'ti-alert-triangle', badge: 4 },
    { label: '문서 분석', icon: 'ti-file-analytics' },
    { label: '권한 관리', icon: 'ti-shield-lock' },
  ];

  const renderPage = () => {
    switch (active) {
      case '대시보드': return <DashboardPage onVesselClick={setSelectedVessel} />;
      case '리스크 관리': return <RiskPage />;
      case '문서 분석': return <DocumentPage />;
      case '권한 관리': return <UserPage />;
      default: return null;
    }
  };

  return (
    <div style={{ display: 'flex', width: '100%', minHeight: '100vh' }}>
      <aside className="sidebar">
        <div className="sidebar-brand">
          <div className="sidebar-brand-icon"><i className="ti ti-ship"></i></div>
          <div>
            <div className="sidebar-brand-text">해운 리스크 관리</div>
            <div className="sidebar-brand-sub">Maritime Risk SaaS</div>
          </div>
        </div>
        <div className="sidebar-section-label">메인 메뉴</div>
        <nav className="sidebar-nav">
          {navItems.map(item => (
            <div key={item.label} role="button" title={item.label} className={`nav-item ${active === item.label ? 'active' : ''}`} onClick={() => setActive(item.label)}>
              <i className={`ti ${item.icon} nav-icon`}></i>
              {item.label}
              {item.badge && <span className="nav-badge">{item.badge}</span>}
            </div>
          ))}
        </nav>
        <div className="sidebar-section-label">시스템</div>
        <nav style={{ padding: '0 12px 8px' }}>
          <div className="nav-item" style={{ opacity: 0.7 }}>
            <i className="ti ti-settings nav-icon"></i>설정
          </div>
          <div className="nav-item" style={{ opacity: 0.7 }}>
            <i className="ti ti-bell nav-icon"></i>알림
          </div>
        </nav>
        <div className="sidebar-footer">
          <div className="user-card">
            <div className="user-avatar">김</div>
            <div>
              <div className="user-name">김민준</div>
              <div className="user-role">관리자</div>
            </div>
          </div>
        </div>
      </aside>

      <main className="main-wrap">
        <div className="topbar">
          <div className="topbar-title">{active}</div>
          <div className="topbar-actions">
            <button className="btn btn-secondary btn-sm"><i className="ti ti-bell"></i>알림 <span style={{ background: '#EF4444', color: 'white', borderRadius: 10, padding: '1px 6px', fontSize: 10, fontWeight: 700, marginLeft: 2 }}>3</span></button>
            <button className="btn btn-secondary btn-sm"><i className="ti ti-help-circle"></i>도움말</button>
          </div>
        </div>
        <div className="content">
          {renderPage()}
        </div>
      </main>

      {selectedVessel && <VesselModal vessel={selectedVessel} onClose={() => setSelectedVessel(null)} />}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
