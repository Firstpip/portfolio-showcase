function Toast({ msg, type, onDone }) {
  useEffect(() => { const t = setTimeout(onDone, 2800); return () => clearTimeout(t); }, []);
  return (
    <div className="toast">
      <div className={`toast-icon ${type}`}>
        <i className={`ph ${type === 'success' ? 'ph-check' : 'ph-info'}`}></i>
      </div>
      {msg}
    </div>
  );
}

                    </div>
                    <span className="badge badge-green"><i className="ph ph-check-circle"></i>다운로드 가능</span>
                    <button className="btn btn-secondary btn-sm"><i className="ph ph-download-simple"></i>다운로드</button>
                  </div>
                ))}
              </div>
            </div>
          </>
        )}

        {step === 'generating' && (
          <div className="card" style={{ padding: '40px', textAlign: 'center' }}>
            <div style={{ fontSize: 17, fontWeight: 700, color: '#0F172A', marginBottom: 24 }}>Evidence Pack 생성 중...</div>
            {[
              { label: '작업 큐 등록', desc: 'BullMQ에 리포트 생성 작업 등록', threshold: 15 },
              { label: 'HTML 템플릿 렌더링', desc: '선택된 항목 데이터 주입 및 렌더링', threshold: 45 },
              { label: 'PDF 변환', desc: 'Puppeteer 서버사이드 HTML → PDF 변환', threshold: 80 },
              { label: 'S3 업로드 및 URL 발급', desc: 'presigned URL 생성 완료', threshold: 100 },
            ].map((s, i) => (
              <div key={i} className="progress-step">
                <div className={`progress-step-icon ${genProgress >= s.threshold ? 'step-done' : genProgress >= (s.threshold - 35) ? 'step-active' : 'step-pending'}`}>
                  <i className={`ph ${genProgress >= s.threshold ? 'ph-check' : 'ph-hourglass'}`}></i>
                </div>
                <div className="progress-step-text">
                  <div className="progress-step-label">{s.label}</div>
                  <div className="progress-step-desc">{s.desc}</div>
                </div>
                {genProgress >= s.threshold - 35 && genProgress < s.threshold && (
                  <div className="spinner" style={{ width: 24, height: 24, borderWidth: 2 }}></div>
                )}
              </div>
            ))}
            <div style={{ marginTop: 24, background: '#F8FAFC', borderRadius: 10, height: 10, overflow: 'hidden' }}>
              <div style={{ height: '100%', background: '#0F766E', borderRadius: 10, width: `${genProgress}%`, transition: 'width 0.4s ease' }}></div>
            </div>
            <div style={{ marginTop: 8, fontSize: 13, color: '#64748B' }}>{genProgress}% 완료</div>
          </div>
        )}

        {step === 'done' && (
          <div className="card" style={{ padding: '40px', textAlign: 'center' }}>
            <div style={{ width: 64, height: 64, borderRadius: '50%', background: '#CCFBF1', display: 'flex', alignItems: 'center', justifyContent: 'center', margin: '0 auto 16px', fontSize: 28, color: '#0F766E' }}>
              <i className="ph ph-check-circle"></i>
            </div>
            <div style={{ fontSize: 20, fontWeight: 800, color: '#0F172A', marginBottom: 8 }}>리포트 생성 완료</div>
            <div style={{ fontSize: 13.5, color: '#64748B', marginBottom: 24 }}>Evidence Pack PDF가 준비되었습니다. 링크는 24시간 동안 유효합니다.</div>
            <div style={{ display: 'flex', gap: 10, justifyContent: 'center' }}>
              <button className="btn btn-teal"><i className="ph ph-download-simple"></i>PDF 다운로드</button>
              <button className="btn btn-secondary" onClick={() => { setStep('select'); setSelected([]); setGenProgress(0); setDone(false); }}>
                <i className="ph ph-arrow-counter-clockwise"></i>새 리포트 생성
              </button>
            </div>
          </div>
        )}
      </div>
      {toast && <Toast {...toast} onDone={() => setToast(null)} />}
    </div>
  );
}

function AdminConsolePage() {
  const [tenants, setTenants] = useState(TENANTS);
  const [selectedTenant, setSelectedTenant] = useState(null);
  const [search, setSearch] = useState('');
  const [planFilter, setPlanFilter] = useState('all');
  const [toast, setToast] = useState(null);

  const filtered = tenants.filter(t => {
    const matchSearch = !search || t.name.includes(search);
    const matchPlan = planFilter === 'all' || t.plan === planFilter;
    return matchSearch && matchPlan;
  });

  const plans = [...new Set(TENANTS.map(t => t.plan))];

  return (
    <div className="page">
      <div className="hero-banner">
        <div className="hero-title">관리자 통합 콘솔</div>
        <div className="hero-sub">전체 테넌트 계정, 사용자, API 사용량을 슈퍼어드민이 통합 관리합니다</div>
        <div className="hero-kpi-strip">
          {[
            { label: '전체 테넌트', val: tenants.length },
            { label: '활성 계정', val: tenants.filter(t => t.active).length },
            { label: 'API 한도 초과', val: tenants.filter(t => t.apiUsage >= 80).length },
          ].map(k => (
            <div key={k.label} className="hero-kpi">
              <div className="hero-kpi-val">{k.val}</div>
              <div className="hero-kpi-lbl">{k.label}</div>
            </div>
          ))}
        </div>
      </div>
      <div className="content">
        <div style={{ display: 'flex', alignItems: 'center', gap: 10, marginBottom: 16 }}>
          <input className="form-input" placeholder="테넌트 이름 검색..." value={search} onChange={e => setSearch(e.target.value)} style={{ maxWidth: 280 }} />
          {['all', ...plans].map(p => (
            <button key={p} onClick={() => setPlanFilter(p)} className="btn btn-sm" style={{
              background: planFilter === p ? '#0F766E' : 'white',
              color: planFilter === p ? 'white' : '#374151',
              border: planFilter === p ? 'none' : '1.5px solid #E2E8F0',
            }}>
              {p === 'all' ? '전체 플랜' : p}
            </button>
          ))}
          <button className="btn btn-teal btn-sm" style={{ marginLeft: 'auto' }}><i className="ph ph-plus"></i>테넌트 추가</button>
        </div>

        <div className="card">
          <table className="admin-table">
            <thead>
              <tr><th>테넌트</th><th>플랜</th><th>사용자</th><th>선박</th><th>리스크</th><th>API 사용량</th><th>상태</th><th></th></tr>
            </thead>
            <tbody>
              {filtered.map(t => (
                <tr key={t.id} onClick={() => setSelectedTenant(t)}>
                  <td>
                    <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
                      <div className="tenant-avatar" style={{ background: t.color, fontSize: 11 }}>{t.code}</div>
                      <div style={{ fontWeight: 600, color: '#0F172A' }}>{t.name}</div>
                    </div>
                  </td>
                  <td><span className="tag">{t.plan}</span></td>
                  <td>{t.users}명</td>
                  <td>{t.vessels}척</td>
                  <td>{t.risks}건</td>
                  <td>
                    <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
                      <div style={{ flex: 1, background: '#F1F5F9', borderRadius: 4, height: 6, overflow: 'hidden', minWidth: 60 }}>
                        <div style={{ height: '100%', background: t.apiUsage >= 80 ? '#DC2626' : '#0F766E', borderRadius: 4, width: `${t.apiUsage}%` }}></div>
                      </div>
                      <span style={{ fontSize: 12, fontWeight: 600, color: t.apiUsage >= 80 ? '#DC2626' : '#374151', minWidth: 30 }}>{t.apiUsage}%</span>
                      {t.apiUsage >= 80 && <i className="ph ph-warning-circle" style={{ color: '#DC2626', fontSize: 14 }}></i>}
                    </div>
                  </td>
                  <td><span className={`badge badge-${t.active ? 'teal' : 'gray'}`}>{t.active ? '활성' : '비활성'}</span></td>
                  <td>
                    <button className="btn btn-secondary btn-sm" onClick={e => { e.stopPropagation(); setSelectedTenant(t); }}>
                      <i className="ph ph-pencil"></i>관리
                    </button>
                  </td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      </div>

      {selectedTenant && <TenantDrawer tenant={selectedTenant} onClose={() => setSelectedTenant(null)} />}
      {toast && <Toast {...toast} onDone={() => setToast(null)} />}
    </div>
  );
}

function InsightCenterPage() {
  const [insights, setInsights] = useState(INSIGHTS);
  const [filter, setFilter] = useState('all');
  const [selected, setSelected] = useState(null);
  const [toast, setToast] = useState(null);

  const filtered = filter === 'all' ? insights : filter === 'unread' ? insights.filter(i => !i.read) : insights.filter(i => i.priority === filter);

  const markRead = (id) => setInsights(prev => prev.map(i => i.id === id ? { ...i, read: true } : i));

  return (
    <div className="page">
      <div className="hero-banner">
        <div className="hero-title">AI 인사이트 및 알림 센터</div>
        <div className="hero-sub">AI가 리스크 이력을 분석하여 반복 패턴과 우선 조치를 자동으로 추천합니다</div>
        <div className="hero-kpi-strip">
          {[
            { label: '전체 인사이트', val: insights.length },
            { label: '안읽음', val: insights.filter(i => !i.read).length },
            { label: '긴급 조치', val: insights.filter(i => i.priority === 'high').length },
          ].map(k => (
            <div key={k.label} className="hero-kpi">
              <div className="hero-kpi-val">{k.val}</div>
              <div className="hero-kpi-lbl">{k.label}</div>
            </div>
          ))}
        </div>
      </div>
      <div className="content">
        <div style={{ display: 'flex', alignItems: 'center', gap: 10, marginBottom: 18 }}>
          <div style={{ flex: 1, fontSize: 14, fontWeight: 700, color: '#0F172A', display: 'flex', alignItems: 'center', gap: 6 }}>
            <i className="ph ph-robot" style={{ color: '#0F766E', fontSize: 18 }}></i>
            AI 생성 인사이트 ({filtered.length})
          </div>
          {['all', 'unread', 'high', 'medium'].map(f => (
            <button key={f} onClick={() => setFilter(f)} className="btn btn-sm" style={{
              background: filter === f ? '#0F766E' : 'white',
              color: filter === f ? 'white' : '#374151',
              border: filter === f ? 'none' : '1.5px solid #E2E8F0',
            }}>
              {{ all: '전체', unread: `안읽음 (${insights.filter(i=>!i.read).length})`, high: '긴급', medium: '주의' }[f]}
            </button>
          ))}
          <button className="btn btn-secondary btn-sm" onClick={() => setInsights(prev => prev.map(i => ({ ...i, read: true })))}>
            <i className="ph ph-checks"></i>전체 읽음
          </button>
        </div>

        <div style={{ display: 'flex', flexDirection: 'column', gap: 12 }}>
          {filtered.map((insight, i) => (
            <div key={insight.id} className={`insight-card ${insight.read ? 'read' : 'unread'}`} style={{ animationDelay: `${i * 0.06}s` }} onClick={() => { setSelected(insight); markRead(insight.id); }}>
              {!insight.read && <div className="unread-dot"></div>}
              <div className="insight-header">
                <div className="insight-icon" style={{ background: insight.bg, color: insight.color }}>
                  <i className={`ph ${insight.icon}`}></i>
                </div>
                <div style={{ flex: 1 }}>
                  <div className="insight-title">{insight.title}</div>
                  <div className="insight-meta">
                    <span className={`badge badge-${insight.priority === 'high' ? 'red' : insight.priority === 'medium' ? 'amber' : 'green'}`} style={{ fontSize: 10.5 }}>
                      {{ high: '긴급', medium: '주의', low: '정보' }[insight.priority]}
                    </span>
                    <span>{insight.vessel}</span>
                    <span>{insight.date}</span>
                  </div>
                </div>
              </div>
              <div className="insight-body" style={{ fontSize: 13, WebkitLineClamp: 2, display: '-webkit-box', WebkitBoxOrient: 'vertical', overflow: 'hidden' }}>{insight.body}</div>
              <div className="insight-actions">
                <button className="btn btn-teal btn-sm" onClick={e => { e.stopPropagation(); setSelected(insight); markRead(insight.id); }}>
                  <i className="ph ph-arrow-right"></i>자세히 보기
                </button>
                <span style={{ fontSize: 11.5, color: '#94A3B8', marginLeft: 'auto' }}>
                  <span className="badge badge-teal" style={{ fontSize: 10.5 }}><i className="ph ph-robot"></i>AI 생성</span>
                </span>
              </div>
            </div>
          ))}
        </div>
      </div>

      {selected && <InsightDrawer insight={selected} onClose={() => setSelected(null)} onRegister={() => setToast({ msg: '리스크 관리 화면에 항목이 등록되었습니다', type: 'success' })} />}
      {toast && <Toast {...toast} onDone={() => setToast(null)} />}
    </div>
  );
}

// ─── App ────────────────────────────────────────────────────────
function App() {
  const [active, setActive] = useState('분석 대시보드');

  const tabs = [
    { label: '분석 대시보드', icon: 'ph-chart-pie' },
    { label: '리포트 빌더', icon: 'ph-file-arrow-down' },
    { label: '관리자 통합 콘솔', icon: 'ph-shield-check' },
    { label: '인사이트 센터', icon: 'ph-sparkle', badge: 3 },
  ];

  const renderPage = () => {
    switch (active) {
      case '분석 대시보드': return <AnalyticsDashboard />;
      case '리포트 빌더': return <ReportBuilderPage />;
      case '관리자 통합 콘솔': return <AdminConsolePage />;
      case '인사이트 센터': return <InsightCenterPage />;
      default: return null;
    }
  };

  return (
    <div style={{ display: 'flex', flexDirection: 'column', width: '100%', minHeight: '100vh' }}>
      <header className="topnav">
        <div className="topnav-brand-bar">
          <div className="brand-logo">
            <div className="brand-icon"><i className="ph ph-boat"></i></div>
            <span className="brand-name">해운 SaaS 플랫폼</span>
            <span className="brand-badge">ENTERPRISE</span>
          </div>
          <div className="topnav-actions">
            <div className="icon-btn">
              <i className="ph ph-magnifying-glass"></i>
            </div>
            <div className="icon-btn">
              <i className="ph ph-bell"></i>
              <div className="notif-dot"></div>
            </div>
            <div className="user-pill">
              <div className="user-avatar">슈</div>
              <span className="user-pill-name">슈퍼어드민</span>
              <i className="ph ph-caret-down" style={{ fontSize: 12, color: '#94A3B8' }}></i>
            </div>
          </div>
        </div>
        <div className="tab-bar">
          {tabs.map(tab => (
            <div key={tab.label} role="button" title={tab.label} className={`tab-item ${active === tab.label ? 'active' : ''}`} onClick={() => setActive(tab.label)}>
              <i className={`ph ${tab.icon} tab-icon`}></i>
              {tab.label}
              {tab.badge && (
                <span style={{ background: '#EF4444', color: 'white', fontSize: 10, fontWeight: 700, padding: '1px 6px', borderRadius: 10 }}>{tab.badge}</span>
              )}
            </div>
          ))}
        </div>
      </header>
      <main style={{ flex: 1, width: '100%' }}>
        {renderPage()}
      </main>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
