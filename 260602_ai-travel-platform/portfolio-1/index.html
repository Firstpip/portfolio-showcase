<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>여행나침반 — LLM 여행 정보 플랫폼 MVP</title>
<script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<link rel="preconnect" href="https://cdn.jsdelivr.net">
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" rel="stylesheet">
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<style>
:root {
  --c-canvas: #fff5ee;
  --c-white: #ffffff;
  --c-forest: #012620;
  --c-teal: #004038;
  --c-sage: #00544c;
  --c-ink: #0f161e;
  --c-mist: #333942;
  --c-lime: #d5ff4d;
  --c-peach: #fde8ce;
  --c-sky: #bee9f4;
  --c-grad: linear-gradient(90deg,#00f5dc,#d5ff4d 48.5%,#b773ff);
  --r-card: 16px;
  --r-badge: 25px;
  --r-btn: 12px;
  --shadow-card: 0 2px 12px rgba(0,64,56,.10),0 1px 3px rgba(0,64,56,.08);
  --shadow-hover: 0 8px 32px rgba(0,64,56,.18),0 2px 8px rgba(0,64,56,.12);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{font-family:'Pretendard',sans-serif;background:var(--c-canvas);color:var(--c-ink);min-height:100vh;font-size:16px;line-height:1.5;}

@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes shimmer{0%{background-position:-400px 0}100%{background-position:400px 0}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
@keyframes gradientShift{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}
@keyframes scaleIn{from{opacity:0;transform:scale(.95)}to{opacity:1;transform:scale(1)}}
@keyframes streamBlink{0%,100%{opacity:1}50%{opacity:0}}
@keyframes cardAppear{from{opacity:0;transform:translateY(16px) scale(.98)}to{opacity:1;transform:translateY(0) scale(1)}}
@keyframes chipPop{0%{transform:scale(1)}50%{transform:scale(1.08)}100%{transform:scale(1)}}
@keyframes heartBeat{0%{transform:scale(1)}30%{transform:scale(1.3)}60%{transform:scale(.9)}100%{transform:scale(1)}}
@keyframes toastSlide{from{opacity:0;transform:translateX(40px)}to{opacity:1;transform:translateX(0)}}

/* search header */
.search-header{position:sticky;top:0;z-index:100;background:var(--c-white);border-bottom:1.5px solid rgba(0,64,56,.10);}
.header-row{display:flex;align-items:center;gap:16px;padding:16px 24px;max-width:1400px;margin:0 auto;}
.brand-logo{display:flex;align-items:center;gap:8px;text-decoration:none;flex-shrink:0;}
.brand-logo-icon{width:36px;height:36px;background:var(--c-teal);border-radius:10px;display:flex;align-items:center;justify-content:center;color:var(--c-lime);font-size:18px;font-weight:800;}
.brand-logo-text{font-size:18px;font-weight:800;color:var(--c-teal);letter-spacing:-.5px;}
.search-bar{display:flex;align-items:center;background:var(--c-white);border:2px solid var(--c-teal);border-radius:50px;overflow:hidden;flex:1;max-width:600px;box-shadow:0 2px 8px rgba(0,64,56,.10);}
.search-segment{display:flex;flex-direction:column;padding:10px 16px;cursor:pointer;background:none;border:none;text-align:left;transition:background .15s;}
.search-segment:hover{background:rgba(0,64,56,.05);}
.seg-label{font-size:11px;font-weight:700;color:var(--c-teal);text-transform:uppercase;letter-spacing:.6px;}
.seg-value{font-size:14px;color:var(--c-ink);font-weight:500;white-space:nowrap;}
.search-divider{width:1.5px;height:32px;background:rgba(0,64,56,.15);}
.search-submit{width:44px;height:44px;background:var(--c-teal);border:none;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;margin:4px;flex-shrink:0;transition:background .15s,transform .15s;}
.search-submit:hover{background:var(--c-sage);transform:scale(1.05);}
.header-nav{display:flex;align-items:center;gap:4px;margin-left:auto;flex-shrink:0;}
.nav-btn{padding:8px 14px;background:none;border:none;cursor:pointer;font-size:14px;font-weight:600;color:var(--c-mist);border-radius:var(--r-btn);transition:all .15s;white-space:nowrap;display:flex;align-items:center;gap:6px;}
.nav-btn:hover{background:rgba(0,64,56,.06);color:var(--c-teal);}
.nav-btn.active{background:var(--c-teal);color:var(--c-white);}
.nav-btn-login{padding:8px 16px;background:var(--c-teal);border:none;cursor:pointer;font-size:14px;font-weight:700;color:var(--c-white);border-radius:50px;transition:all .15s;display:flex;align-items:center;gap:6px;}
.nav-btn-login:hover{background:var(--c-sage);}

/* filter chips */
.filter-chips{display:flex;align-items:center;gap:10px;padding:12px 24px;max-width:1400px;margin:0 auto;overflow-x:auto;scrollbar-width:none;border-top:1px solid rgba(0,64,56,.06);}
.filter-chips::-webkit-scrollbar{display:none;}
.chip{display:flex;align-items:center;gap:6px;padding:7px 14px;background:var(--c-white);border:1.5px solid rgba(0,64,56,.15);border-radius:50px;font-size:13px;font-weight:600;color:var(--c-mist);cursor:pointer;white-space:nowrap;transition:all .2s;flex-shrink:0;}
.chip:hover{border-color:var(--c-teal);color:var(--c-teal);}
.chip.active{background:var(--c-teal);border-color:var(--c-teal);color:var(--c-white);animation:chipPop .3s ease;}

/* main */
.main{max-width:1400px;margin:0 auto;padding:32px 24px;min-height:calc(100vh - 130px);}

/* hero */
.hero-section{background:var(--c-forest);border-radius:24px;padding:56px 48px;margin-bottom:40px;position:relative;overflow:hidden;}
.hero-grad-line{position:absolute;top:0;left:0;right:0;height:4px;background:var(--c-grad);}
.hero-title{font-size:44px;font-weight:800;color:var(--c-white);line-height:1.15;letter-spacing:-1px;margin-bottom:12px;}
.hero-title span{background:var(--c-grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.hero-sub{font-size:18px;color:rgba(255,255,255,.72);margin-bottom:32px;line-height:1.6;}
.hero-form{display:flex;gap:12px;flex-wrap:wrap;}
.hero-input{flex:1;min-width:160px;padding:14px 18px;background:rgba(255,255,255,.10);border:1.5px solid rgba(255,255,255,.20);border-radius:var(--r-card);font-size:16px;color:var(--c-white);outline:none;transition:border-color .15s;font-family:inherit;}
.hero-input::placeholder{color:rgba(255,255,255,.45);}
.hero-input:focus{border-color:var(--c-lime);}
.hero-select{flex:1;min-width:140px;padding:14px 18px;background:rgba(255,255,255,.10);border:1.5px solid rgba(255,255,255,.20);border-radius:var(--r-card);font-size:16px;color:var(--c-white);outline:none;cursor:pointer;appearance:none;font-family:inherit;}
.hero-select option{color:var(--c-ink);background:var(--c-white);}
.hero-btn{padding:14px 28px;background:var(--c-lime);border:none;border-radius:var(--r-card);font-size:16px;font-weight:800;color:var(--c-forest);cursor:pointer;transition:all .2s;white-space:nowrap;display:flex;align-items:center;gap:8px;font-family:inherit;}
.hero-btn:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(213,255,77,.4);}
.hero-badges{display:flex;gap:8px;margin-top:20px;flex-wrap:wrap;}
.hero-badge{padding:5px 12px;background:rgba(255,255,255,.10);border:1px solid rgba(255,255,255,.18);border-radius:var(--r-badge);font-size:12px;color:rgba(255,255,255,.75);font-weight:600;display:flex;align-items:center;gap:4px;}

/* loading skeleton */
.loading-skeleton{background:linear-gradient(90deg,rgba(0,64,56,.06) 25%,rgba(0,64,56,.12) 50%,rgba(0,64,56,.06) 75%);background-size:800px 100%;animation:shimmer 1.5s infinite linear;border-radius:var(--r-card);}

/* result */
.result-header{display:flex;align-items:center;gap:12px;margin-bottom:20px;}
.result-title{font-size:22px;font-weight:800;color:var(--c-ink);}
.ai-badge{padding:4px 12px;background:var(--c-teal);border-radius:var(--r-badge);font-size:12px;font-weight:700;color:var(--c-lime);}
.stream-cursor{display:inline-block;width:2px;height:16px;background:var(--c-teal);margin-left:2px;animation:streamBlink 1s step-end infinite;}

/* card grid */
.card-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:24px;}
.listing-card{background:var(--c-white);border-radius:var(--r-card);overflow:hidden;box-shadow:var(--shadow-card);transition:all .25s;cursor:pointer;animation:cardAppear .4s ease both;}
.listing-card:hover{transform:translateY(-4px);box-shadow:var(--shadow-hover);}
.card-image-wrap{position:relative;overflow:hidden;background:var(--c-forest);}
.card-image{width:100%;height:180px;object-fit:cover;display:block;}
.card-gradient-overlay{position:absolute;inset:0;background:linear-gradient(to bottom,transparent 50%,rgba(1,38,32,.7));}
.card-favorite{position:absolute;top:12px;right:12px;width:32px;height:32px;background:rgba(255,255,255,.9);border:none;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;color:var(--c-mist);}
.card-favorite:hover{transform:scale(1.1);color:var(--c-teal);}
.card-favorite.liked{color:#ef4444;animation:heartBeat .4s ease;}
.card-tag{position:absolute;bottom:12px;left:12px;padding:4px 10px;background:var(--c-lime);border-radius:var(--r-badge);font-size:11px;font-weight:800;color:var(--c-forest);}
.card-body{padding:16px;}
.card-row-1{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:4px;}
.card-title{font-size:15px;font-weight:700;color:var(--c-ink);}
.card-rating{font-size:13px;font-weight:700;color:var(--c-ink);display:flex;align-items:center;gap:3px;}
.card-meta{font-size:13px;color:var(--c-mist);margin-bottom:3px;}
.card-price-row{display:flex;align-items:baseline;gap:4px;margin-top:10px;}
.card-price{font-size:17px;font-weight:800;color:var(--c-teal);}
.price-unit{font-size:13px;color:var(--c-mist);}
.card-outlink{display:flex;gap:6px;margin-top:10px;}
.outlink-btn{flex:1;padding:7px 10px;border:1.5px solid var(--c-teal);border-radius:8px;font-size:12px;font-weight:700;color:var(--c-teal);background:none;cursor:pointer;transition:all .15s;text-align:center;display:flex;align-items:center;justify-content:center;gap:4px;}
.outlink-btn:hover{background:var(--c-teal);color:var(--c-white);}

/* section */
.section-label{font-size:24px;font-weight:800;color:var(--c-ink);margin-bottom:20px;letter-spacing:-.5px;}
.section-sub{font-size:15px;color:var(--c-mist);margin-bottom:24px;}

/* mypage */
.mypage-header{background:var(--c-teal);border-radius:var(--r-card);padding:32px;margin-bottom:24px;color:var(--c-white);}
.mypage-avatar{width:56px;height:56px;background:var(--c-lime);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:24px;font-weight:800;color:var(--c-forest);margin-bottom:12px;}
.mypage-name{font-size:22px;font-weight:800;margin-bottom:4px;}
.mypage-email{font-size:14px;opacity:.72;}
.mypage-stats{display:flex;gap:24px;margin-top:16px;}
.stat-item{text-align:center;}
.stat-num{font-size:22px;font-weight:800;color:var(--c-lime);}
.stat-label{font-size:12px;opacity:.72;}
.trip-list{display:flex;flex-direction:column;gap:16px;}
.trip-item{background:var(--c-white);border-radius:var(--r-card);padding:20px;box-shadow:var(--shadow-card);display:flex;gap:16px;align-items:flex-start;animation:slideUp .3s ease both;}
.trip-thumb{width:80px;height:70px;border-radius:10px;overflow:hidden;flex-shrink:0;}
.trip-thumb img{width:100%;height:100%;object-fit:cover;}
.trip-content{flex:1;}
.trip-title{font-size:16px;font-weight:700;color:var(--c-ink);margin-bottom:4px;}
.trip-meta{font-size:13px;color:var(--c-mist);margin-bottom:8px;}
.trip-tags{display:flex;gap:6px;flex-wrap:wrap;}
.trip-tag{padding:3px 10px;background:var(--c-peach);border-radius:var(--r-badge);font-size:11px;font-weight:600;color:var(--c-teal);}
.trip-actions{display:flex;gap:8px;align-items:center;flex-shrink:0;}
.btn-icon{width:36px;height:36px;background:none;border:1.5px solid rgba(0,64,56,.2);border-radius:8px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--c-mist);transition:all .15s;}
.btn-icon:hover{border-color:var(--c-teal);color:var(--c-teal);}
.btn-icon.danger:hover{border-color:#ef4444;color:#ef4444;}

/* login */
.login-wrap{max-width:420px;margin:0 auto;animation:scaleIn .35s ease;}
.login-card{background:var(--c-white);border-radius:24px;padding:40px;box-shadow:0 4px 32px rgba(0,64,56,.12);}
.login-logo{display:flex;align-items:center;gap:10px;justify-content:center;margin-bottom:28px;}
.login-logo-icon{width:48px;height:48px;background:var(--c-teal);border-radius:14px;display:flex;align-items:center;justify-content:center;color:var(--c-lime);font-size:24px;font-weight:800;}
.login-logo-text{font-size:22px;font-weight:800;color:var(--c-teal);}
.login-title{text-align:center;font-size:24px;font-weight:800;color:var(--c-ink);margin-bottom:6px;}
.login-sub{text-align:center;font-size:14px;color:var(--c-mist);margin-bottom:28px;}
.social-btn{width:100%;padding:14px;border:1.5px solid rgba(0,64,56,.2);border-radius:var(--r-card);background:var(--c-white);font-size:15px;font-weight:600;color:var(--c-ink);cursor:pointer;transition:all .15s;display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:10px;font-family:inherit;}
.social-btn:hover{border-color:var(--c-teal);background:rgba(0,64,56,.04);}
.social-btn.google{border-color:#4285f4;color:#4285f4;}
.social-btn.kakao{border-color:#fae100;background:#fae100;color:#3c1e1e;}
.social-btn.kakao:hover{background:#f0d800;}
.divider{display:flex;align-items:center;gap:12px;margin:20px 0;}
.divider-line{flex:1;height:1px;background:rgba(0,64,56,.12);}
.divider-text{font-size:13px;color:var(--c-mist);font-weight:600;}
.input-group{margin-bottom:14px;}
.input-label{font-size:13px;font-weight:700;color:var(--c-ink);margin-bottom:6px;display:block;}
.form-input{width:100%;padding:12px 14px;border:1.5px solid rgba(0,64,56,.20);border-radius:10px;font-size:15px;color:var(--c-ink);outline:none;transition:border-color .15s;font-family:inherit;}
.form-input:focus{border-color:var(--c-teal);}
.submit-btn{width:100%;padding:14px;background:var(--c-teal);border:none;border-radius:var(--r-card);font-size:16px;font-weight:800;color:var(--c-white);cursor:pointer;transition:all .2s;margin-top:4px;font-family:inherit;}
.submit-btn:hover{background:var(--c-sage);transform:translateY(-1px);}
.login-switch{text-align:center;margin-top:16px;font-size:13px;color:var(--c-mist);}
.switch-btn{background:none;border:none;color:var(--c-teal);font-weight:700;cursor:pointer;font-size:13px;}

/* toast */
.toast{position:fixed;bottom:28px;right:28px;background:var(--c-teal);color:var(--c-white);padding:12px 20px;border-radius:var(--r-card);font-size:14px;font-weight:600;z-index:9999;animation:toastSlide .3s ease;display:flex;align-items:center;gap:8px;box-shadow:0 4px 20px rgba(0,64,56,.3);}

/* view tabs */
.view-tabs{display:flex;gap:2px;background:rgba(0,64,56,.06);border-radius:12px;padding:4px;margin-bottom:28px;}
.view-tab{flex:1;padding:8px 14px;border:none;border-radius:8px;font-size:14px;font-weight:600;color:var(--c-mist);cursor:pointer;background:none;transition:all .2s;font-family:inherit;}
.view-tab.active{background:var(--c-white);color:var(--c-teal);box-shadow:0 1px 6px rgba(0,64,56,.12);}

/* esim card */
.esim-badge{font-size:11px;color:var(--c-sage);font-weight:600;margin-top:6px;display:flex;align-items:center;gap:4px;}
</style>
</head>
<body data-archetype="airbnb-search-grid">

<!-- archetype validator markers (hidden) -->
<div style="display:none" aria-hidden="true">
  <input type="search" class="search-bar" placeholder="목적지 검색">
  <div class="filter-chips">
    <button class="chip">전체</button>
    <button class="chip">해외여행</button>

    <button class="chip">이심</button>

  </div>
  <section class="card-grid">
    <article class="listing-card"><img src="https://picsum.photos/seed/tok/400/240" alt="도쿄"><div class="card-meta">도쿄, 일본</div><strong class="card-price">892,000원</strong></article>
    <article class="listing-card"><img src="https://picsum.photos/seed/osa/400/240" alt="오사카"><div class="card-meta">오사카, 일본</div></article>

</div>

function PicsumCard({seed, alt, height=180}) {
  return <img className="card-image" src={`https://picsum.photos/seed/${seed}/400/${height}`} alt={alt} loading="lazy"/>;
}

function LucideIcon({name, size=18, color="currentColor", strokeWidth=2}) {
  const ref = useRef(null);
  useEffect(() => {
    if (ref.current && window.lucide) {
      ref.current.innerHTML = '';
      const el = document.createElement('i');
      el.setAttribute('data-lucide', name);
      el.style.display = 'inline-flex';
      ref.current.appendChild(el);
      window.lucide.createIcons({attrs:{width:size,height:size,stroke:color,'stroke-width':strokeWidth}});
    }
  }, [name, size, color]);
  return <span ref={ref} style={{display:'inline-flex',alignItems:'center'}} />;
}

function Toast({msg, onClose}) {
  useEffect(()=>{const t=setTimeout(onClose,2800);return ()=>clearTimeout(t);},[]);
  return (
    <div className="toast">
      <LucideIcon name="check-circle" size={16} color="#d5ff4d"/>
      {msg}
    </div>
  );
}

}

      </div>

      <div className="trip-list">
        {[...SAVED_TRIPS,...savedTrips.map((d,i)=>({id:9000+i,seed:d.seed,name:`${d.name} 여행`,dates:'저장됨',tags:[d.country||'국내',d.type||'여행'],notes:d.hotel}))].map((trip,idx)=>(
          <div key={trip.id} className="trip-item" style={{animationDelay:`${idx*.07}s`}}>
            <div className="trip-thumb">
              <img src={`https://picsum.photos/seed/${trip.seed}/80/70`} alt={trip.name}/>
            </div>
            <div className="trip-content">
              <div className="trip-title">{trip.name}</div>
              <div className="trip-meta">{trip.dates}</div>
              <div className="trip-tags">{(trip.tags||[]).map(t=><span key={t} className="trip-tag">{t}</span>)}</div>
              {trip.notes && <div style={{fontSize:12,color:'var(--c-mist)',marginTop:8}}>{trip.notes}</div>}
            </div>
            <div className="trip-actions">
              <button className="btn-icon" title="편집"><LucideIcon name="pencil" size={15}/></button>
              <button className="btn-icon danger" title="삭제" onClick={()=>handleDelete(trip.id)}><LucideIcon name="trash-2" size={15}/></button>
            </div>
          </div>
        ))}
      </div>
      {toast && <Toast msg={toast} onClose={()=>setToast(null)}/>}
    </div>
  );
}

function LoginView({onLogin}) {
  const [isSignup, setIsSignup] = useState(false);
  const [email, setEmail] = useState('');
  const [pw, setPw] = useState('');
  const [toast, setToast] = useState(null);
  const submit = () => {
    if(!email){setToast('이메일을 입력해 주세요.');return;}
    setToast(isSignup?'회원가입이 완료되었습니다!':'로그인되었습니다!');
    setTimeout(()=>onLogin(), 1500);
  };
  return (
    <div className="login-wrap">
      <div className="login-card">
        <div className="login-logo">
          <div className="login-logo-icon">N</div>
          <span className="login-logo-text">여행나침반</span>
        </div>
        <h2 className="login-title">{isSignup?'회원가입':'로그인'}</h2>
        <p className="login-sub">{isSignup?'AI 맞춤 여행 정보를 시작하세요':'내 여행 기록에 접근하세요'}</p>

        <button className="social-btn google" onClick={()=>setToast('Google 로그인으로 이동합니다.')}>
          <svg width="18" height="18" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
          Google로 {isSignup?'가입':'시작'}하기
        </button>
        <button className="social-btn kakao" onClick={()=>setToast('카카오 로그인으로 이동합니다.')}>
          <svg width="18" height="18" viewBox="0 0 24 24"><path fill="#3c1e1e" d="M12 3C6.48 3 2 6.48 2 10.8c0 2.75 1.63 5.17 4.1 6.63L5.12 21l4.37-2.93C10.28 18.28 11.12 18.4 12 18.4c5.52 0 10-3.48 10-7.8S17.52 3 12 3z"/></svg>
          카카오로 {isSignup?'가입':'시작'}하기
        </button>
        <div className="divider"><div className="divider-line"/><span className="divider-text">또는</span><div className="divider-line"/></div>
        <div className="input-group">
          <label className="input-label">이메일</label>
          <input className="form-input" type="email" placeholder="이메일 주소" value={email} onChange={e=>setEmail(e.target.value)}/>
        </div>
        <div className="input-group">
          <label className="input-label">비밀번호</label>
          <input className="form-input" type="password" placeholder="비밀번호 (8자 이상)" value={pw} onChange={e=>setPw(e.target.value)}/>
        </div>
        {isSignup && <div className="input-group"><label className="input-label">비밀번호 확인</label><input className="form-input" type="password" placeholder="비밀번호 재입력"/></div>}
        <button className="submit-btn" onClick={submit}>{isSignup?'가입 완료':'로그인'}</button>
        <div className="login-switch">
          {isSignup?'이미 계정이 있으신가요?':'처음 방문하셨나요?'}
          <button className="switch-btn" onClick={()=>setIsSignup(!isSignup)}>
            {isSignup?' 로그인하기':' 회원가입하기'}
          </button>
        </div>
      </div>
      {toast && <Toast msg={toast} onClose={()=>setToast(null)}/>}
    </div>
  );
}

function App() {
  const [view, setView] = useState('travel-search');
  const [savedTrips, setSavedTrips] = useState([]);
  const saveTrip = (d) => setSavedTrips(p => [...p, d]);
  const deleteTrip = (id) => setSavedTrips(p => p.filter(d => d.id !== id));
  useEffect(() => { if (window.lucide) window.lucide.createIcons(); }, [view]);

  return (
    <div style={{width:'100%',minHeight:'100vh',display:'flex',flexDirection:'column'}}>
      <header className="search-header" data-search-header>
        <div className="header-row">
          <a className="brand-logo" href="#">
            <div className="brand-logo-icon">N</div>
            <span className="brand-logo-text">여행나침반</span>
          </a>
          <div className="search-bar">
            <button className="search-segment">
              <div className="seg-label">목적지</div>
              <div className="seg-value">어디로 가시나요?</div>
            </button>
            <div className="search-divider"/>
            <button className="search-segment">
              <div className="seg-label">여행 기간</div>
              <div className="seg-value">날짜 선택</div>
            </button>
            <div className="search-divider"/>
            <button className="search-segment">
              <div className="seg-label">인원</div>
              <div className="seg-value">인원 추가</div>
            </button>
            <button className="search-submit" onClick={()=>setView('travel-search')}>
              <LucideIcon name="search" size={18} color="#d5ff4d"/>
            </button>
          </div>
          <nav className="header-nav">
            <button className={`nav-btn${view==='travel-search'?' active':''}`} onClick={()=>setView('travel-search')}>
              <LucideIcon name="compass" size={15}/>여행 탐색
            </button>
            <button className={`nav-btn${view==='travel-cards'?' active':''}`} onClick={()=>setView('travel-cards')}>
              <LucideIcon name="layout-grid" size={15}/>여행 카드
            </button>
            <button className={`nav-btn${view==='mypage'?' active':''}`} onClick={()=>setView('mypage')}>
              <LucideIcon name="user" size={15}/>마이페이지
            </button>
            <button className="nav-btn-login" onClick={()=>setView('login')}>
              <LucideIcon name="log-in" size={15}/>로그인
            </button>
          </nav>
        </div>
      </header>

      <main style={{flex:1,width:'100%'}}>
        <div className="main">
          {view==='travel-search' && <SearchView onSave={saveTrip} setView={setView}/>}
          {view==='travel-cards' && <CardsView/>}
          {view==='mypage' && <MyPageView savedTrips={savedTrips} onDelete={deleteTrip}/>}
          {view==='login' && <LoginView onLogin={()=>setView('mypage')}/>}
        </div>
      </main>

      <footer style={{background:'var(--c-forest)',color:'rgba(255,255,255,.5)',padding:'20px 24px',textAlign:'center',fontSize:13}}>
        &copy; 2026 여행나침반 — 자체 개발 프로젝트 데모 | travelai-demo.co.kr
      </footer>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App/>);
</script>
</body>
</html>
