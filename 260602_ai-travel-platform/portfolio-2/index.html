<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>여행나침반 운영 분석 — 구현 데모</title>
<script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.0.3/src/regular/style.css"/>
<style>
/* ── Superhuman design tokens ── */
:root {
  --c-canvas: #f2f0eb;
  --c-bone: #ffffff;
  --c-ink: #292827;
  --c-graphite: #666666;
  --c-fog: #e3e3e2;
  --c-drift: #dcd7d3;
  --c-aubergine: #421d24;
  --c-aubergine-deep: #4e242c;
  --c-iris: #714cb6;
  --c-indigo: #353088;
  --c-lavender: #d4c7ff;
  --c-green: #1a9c5b;
  --c-red: #dc2626;
  --c-amber: #d97706;
  --r-btn: 8px;
  --r-card: 16px;
  --r-card-lg: 24px;
  --r-pill: 999px;
  --shadow-iris: rgb(113,76,182) 0px 0px 0px 1px inset;
  --shadow-card: 0 1px 4px rgba(41,40,39,.08),0 1px 2px rgba(41,40,39,.04);
  --shadow-pop: 0 4px 16px rgba(113,76,182,.18),0 1px 4px rgba(41,40,39,.08);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{font-family:'Pretendard',ui-sans-serif,system-ui,sans-serif;background:var(--c-bone);color:var(--c-ink);font-size:16px;line-height:1.5;}

/* ── 10+ @keyframes ── */
@keyframes fadeSlideDown{from{opacity:0;transform:translateY(-16px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeSlideUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes countUp{from{opacity:0;transform:scale(.88)}to{opacity:1;transform:scale(1)}}
@keyframes rowSlide{from{opacity:0;transform:translateX(-8px)}to{opacity:1;transform:translateX(0)}}
@keyframes chartGrow{from{transform:scaleY(0);transform-origin:bottom}to{transform:scaleY(1);transform-origin:bottom}}
@keyframes dotBlink{0%,100%{opacity:1}50%{opacity:.2}}
@keyframes toastIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes spotlightPulse{0%,100%{opacity:.55}50%{opacity:.85}}
@keyframes spotlightPulse2{0%,100%{opacity:.45}60%{opacity:.75}}
@keyframes panelFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
@keyframes panelFloat2{0%,100%{transform:translateY(-5px)}50%{transform:translateY(3px)}}
@keyframes gradientRotate{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}
@keyframes shimmer{0%{background-position:-600px 0}100%{background-position:600px 0}}
@keyframes badgePop{0%{transform:scale(1)}40%{transform:scale(1.15)}100%{transform:scale(1)}}

/* ── Announcement banner ── */
.annc-banner{
  width:100%;background:var(--c-aubergine);color:var(--c-bone);
  font-size:13px;font-weight:500;text-align:center;padding:9px 24px;
  position:relative;z-index:100;letter-spacing:.1px;
}
.annc-banner a{color:var(--c-lavender);text-decoration:none;font-weight:600;margin-left:8px;}
.annc-banner a:hover{text-decoration:underline;}

/* ── Top nav ── */
.topnav{
  position:sticky;top:0;z-index:90;
  display:flex;align-items:center;padding:0 40px;height:60px;
  background:rgba(242,240,235,.92);backdrop-filter:blur(12px);
  border-bottom:1px solid var(--c-drift);
}
.topnav.over-hero{background:transparent;border-bottom-color:transparent;}
.nav-logo{display:flex;align-items:center;gap:10px;text-decoration:none;color:var(--c-bone);}
.nav-logo-icon{width:32px;height:32px;background:var(--c-aubergine);border-radius:9px;display:flex;align-items:center;justify-content:center;color:var(--c-lavender);font-weight:800;font-size:15px;flex-shrink:0;}
.nav-logo-name{font-size:16px;font-weight:800;color:var(--c-ink);letter-spacing:-.4px;}
.over-hero .nav-logo-name{color:var(--c-bone);}
.nav-tabs{display:flex;gap:2px;margin-left:32px;}
.nav-tab{
  padding:6px 14px;border:none;background:none;
  font-size:14px;font-weight:600;color:var(--c-graphite);
  cursor:pointer;border-radius:var(--r-pill);transition:all .15s;font-family:inherit;
}
.nav-tab:hover{background:rgba(41,40,39,.06);color:var(--c-ink);}
.nav-tab.active{background:rgba(113,76,182,.12);color:var(--c-iris);}
.over-hero .nav-tab{color:rgba(255,255,255,.7);}
.over-hero .nav-tab:hover{background:rgba(255,255,255,.12);color:var(--c-bone);}
.over-hero .nav-tab.active{background:rgba(255,255,255,.18);color:var(--c-bone);}
.nav-actions{margin-left:auto;display:flex;gap:8px;align-items:center;}
.btn-nav-login{padding:6px 14px;border:none;background:none;font-size:14px;font-weight:500;color:var(--c-graphite);cursor:pointer;font-family:inherit;transition:color .15s;border-radius:var(--r-btn);}
.btn-nav-login:hover{color:var(--c-ink);}
.over-hero .btn-nav-login{color:rgba(255,255,255,.75);}
.over-hero .btn-nav-login:hover{color:var(--c-bone);}
.btn-nav-signup{padding:6px 14px;background:var(--c-lavender);color:var(--c-ink);border:none;border-radius:var(--r-btn);font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;transition:all .15s;}
.btn-nav-signup:hover{background:var(--c-iris);color:var(--c-bone);}

/* ── Hero ── */
.hero{
  position:relative;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;
  overflow:hidden;padding:80px 40px 120px;
  background:#1a0e24;
}
.hero-bg{
  position:absolute;inset:0;
  background:
    radial-gradient(circle at 68% 50%, rgba(133,125,250,.58) 0, rgba(0,0,0,0) 50%),
    radial-gradient(circle at 50% 98%, rgba(255,51,102,.52) 0, rgba(0,0,0,0) 50%),
    radial-gradient(circle at 93% 50%, rgba(75,105,227,.48) 0, rgba(0,0,0,0) 50%),
    radial-gradient(circle at 50% 75%, rgba(104,222,255,.42) 0, rgba(0,0,0,0) 50%),
    linear-gradient(145deg,#1a0e24 0%,#0d1a2e 60%,#1a0e24 100%);
  animation:spotlightPulse 6s ease-in-out infinite;
}
.hero-bg::after{
  content:'';position:absolute;inset:0;
  background:
    radial-gradient(circle at 20% 30%, rgba(113,76,182,.35) 0, rgba(0,0,0,0) 45%),
    radial-gradient(circle at 80% 20%, rgba(53,48,136,.45) 0, rgba(0,0,0,0) 40%);
  animation:spotlightPulse2 8s ease-in-out infinite;
}

/* SVG map dots decoration */
.hero-map{position:absolute;inset:0;pointer-events:none;opacity:.18;}

.hero-content{position:relative;z-index:10;text-align:center;max-width:760px;}
.hero-badge{
  display:inline-flex;align-items:center;gap:6px;
  padding:5px 14px;border-radius:var(--r-pill);
  background:rgba(212,199,255,.15);border:1px solid rgba(212,199,255,.3);
  color:var(--c-lavender);font-size:12px;font-weight:600;
  margin-bottom:24px;letter-spacing:.4px;
  animation:fadeSlideDown .6s ease both;
}
.hero-headline{
  font-size:62px;font-weight:700;color:var(--c-bone);
  line-height:.96;letter-spacing:-1.74px;
  animation:fadeSlideDown .7s .1s ease both;
  margin-bottom:20px;word-break:keep-all;
}
.hero-headline span{
  background:linear-gradient(135deg,#d4c7ff 0%,#a89ef0 40%,#714cb6 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.hero-sub{
  font-size:18px;font-weight:400;color:rgba(255,255,255,.68);
  letter-spacing:-.14px;line-height:1.5;
  animation:fadeSlideUp .7s .2s ease both;margin-bottom:36px;
}
.hero-ctas{display:flex;gap:12px;justify-content:center;animation:fadeSlideUp .7s .3s ease both;}
.btn-hero-primary{
  padding:12px 28px;background:var(--c-bone);color:var(--c-ink);
  border:none;border-radius:var(--r-btn);font-size:15px;font-weight:600;
  cursor:pointer;font-family:inherit;transition:all .2s;display:flex;align-items:center;gap:8px;
}
.btn-hero-primary:hover{background:var(--c-canvas);box-shadow:var(--shadow-iris);}
.btn-hero-ghost{
  padding:11px 26px;background:transparent;color:var(--c-lavender);
  border:1.5px solid rgba(212,199,255,.5);border-radius:var(--r-btn);font-size:15px;font-weight:600;
  cursor:pointer;font-family:inherit;transition:all .2s;
}
.btn-hero-ghost:hover{border-color:var(--c-lavender);background:rgba(212,199,255,.08);}

/* Floating glassmorphic panels */
.glass-panel-left{
  position:absolute;left:calc(50% - 520px);top:50%;transform:translateY(-50%);
  width:230px;background:rgba(255,255,255,.1);backdrop-filter:blur(14px);
  border:1px solid rgba(255,255,255,.18);border-radius:var(--r-card-lg);
  padding:16px;z-index:10;animation:panelFloat 5s ease-in-out infinite;
}
.glass-panel-right{
  position:absolute;right:calc(50% - 520px);top:50%;transform:translateY(-60%);
  width:220px;background:rgba(255,255,255,.1);backdrop-filter:blur(14px);
  border:1px solid rgba(255,255,255,.18);border-radius:var(--r-card-lg);
  padding:16px;z-index:10;animation:panelFloat2 6s ease-in-out infinite;
}
.glass-header{font-size:11px;font-weight:700;color:rgba(255,255,255,.6);letter-spacing:.5px;margin-bottom:12px;text-transform:uppercase;}
.glass-stat{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;border-bottom:1px solid rgba(255,255,255,.08);padding-bottom:10px;}
.glass-stat:last-child{border-bottom:none;margin-bottom:0;padding-bottom:0;}
.glass-stat-label{font-size:12px;color:rgba(255,255,255,.65);}
.glass-stat-value{font-size:18px;font-weight:700;color:var(--c-bone);letter-spacing:-.31px;}
.glass-mini-chart{display:flex;align-items:flex-end;gap:3px;height:28px;margin-top:10px;}
.glass-bar{background:rgba(212,199,255,.55);border-radius:2px;flex:1;transition:background .3s;}
.glass-bar.hi{background:rgba(212,199,255,.9);}
.glass-dot-row{display:flex;align-items:center;gap:8px;margin-top:8px;}
.glass-dot{width:7px;height:7px;border-radius:50%;}
.glass-dot.green{background:#1a9c5b;}
.glass-dot.amber{background:#d97706;}
.glass-dot.red{background:#dc2626;}
.glass-dot.pulse{animation:dotBlink 1.2s step-end infinite;}
.glass-dot-label{font-size:12px;color:rgba(255,255,255,.65);}
.glass-dot-value{margin-left:auto;font-size:12px;font-weight:600;color:var(--c-bone);}

/* ── Parchment feature sections ── */
.parchment{background:var(--c-canvas);}

.section{max-width:1100px;margin:0 auto;padding:80px 40px;}
.section-badge{
  display:inline-flex;align-items:center;gap:6px;padding:4px 12px;
  border-radius:var(--r-pill);background:rgba(113,76,182,.10);
  color:var(--c-iris);font-size:12px;font-weight:700;letter-spacing:.4px;
  margin-bottom:16px;
}
.section-heading{font-size:44px;font-weight:700;color:var(--c-ink);letter-spacing:-1.1px;line-height:1.05;margin-bottom:14px;word-break:keep-all;}
.section-sub{font-size:17px;color:var(--c-graphite);line-height:1.6;max-width:560px;}

.feature-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:24px;margin-top:48px;}
.feature-card{
  background:var(--c-bone);border:1px solid var(--c-fog);
  border-radius:var(--r-card-lg);padding:28px 24px;
  transition:all .2s;
}
.feature-card:hover{box-shadow:var(--shadow-pop);border-color:var(--c-lavender);transform:translateY(-2px);}
.feat-icon{
  width:44px;height:44px;border-radius:12px;
  background:rgba(113,76,182,.1);display:flex;align-items:center;justify-content:center;
  color:var(--c-iris);font-size:22px;margin-bottom:18px;
}
.feat-title{font-size:20px;font-weight:700;color:var(--c-ink);letter-spacing:-.31px;margin-bottom:8px;}
.feat-desc{font-size:14px;color:var(--c-graphite);line-height:1.6;}
.feat-link{display:inline-flex;align-items:center;gap:4px;margin-top:14px;font-size:13px;font-weight:600;color:var(--c-iris);text-decoration:none;}
.feat-link:hover{text-decoration:underline;}

/* How it works */
.bone-section{background:var(--c-bone);}
.steps-row{display:grid;grid-template-columns:repeat(3,1fr);gap:0;margin-top:48px;position:relative;}
.steps-row::before{
  content:'';position:absolute;top:22px;left:calc(16.67% + 16px);right:calc(16.67% + 16px);
  height:1px;background:linear-gradient(90deg,var(--c-iris),var(--c-fog),var(--c-iris));
}
.step{display:flex;flex-direction:column;align-items:center;text-align:center;padding:0 24px;}
.step-num{
  width:44px;height:44px;border-radius:50%;background:var(--c-iris);color:var(--c-bone);
  display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:800;
  margin-bottom:18px;position:relative;z-index:2;
  box-shadow:0 0 0 6px rgba(113,76,182,.12);
}
.step-title{font-size:18px;font-weight:700;color:var(--c-ink);letter-spacing:-.22px;margin-bottom:8px;}
.step-desc{font-size:14px;color:var(--c-graphite);line-height:1.6;}

/* Proof section */
.proof-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:20px;margin-top:48px;}
.proof-card{
  background:var(--c-bone);border:1px solid var(--c-fog);
  border-radius:var(--r-card);padding:24px 20px;text-align:center;
}
.proof-num{font-size:40px;font-weight:700;color:var(--c-ink);letter-spacing:-1.3px;line-height:1;margin-bottom:8px;}
.proof-num span{font-size:24px;font-weight:600;}
.proof-label{font-size:13px;color:var(--c-graphite);}

/* Footer */
.footer{background:var(--c-aubergine);color:var(--c-bone);padding:48px 40px 36px;}
.footer-inner{max-width:1100px;margin:0 auto;display:grid;grid-template-columns:2fr 1fr 1fr 1fr;gap:32px;}
.footer-brand{font-size:16px;font-weight:800;letter-spacing:-.4px;margin-bottom:8px;}
.footer-tagline{font-size:13px;color:rgba(255,255,255,.55);line-height:1.6;}
.footer-col-title{font-size:12px;font-weight:700;color:rgba(255,255,255,.45);letter-spacing:.6px;text-transform:uppercase;margin-bottom:14px;}
.footer-links{display:flex;flex-direction:column;gap:10px;}
.footer-link{font-size:13px;color:rgba(255,255,255,.65);text-decoration:none;transition:color .15s;}
.footer-link:hover{color:var(--c-bone);}
.footer-bottom{max-width:1100px;margin:32px auto 0;padding-top:20px;border-top:1px solid rgba(255,255,255,.1);font-size:12px;color:rgba(255,255,255,.4);}

/* ── Dashboard views (stripe-multipane) ── */
.dashboard{display:flex;min-height:calc(100vh - 60px);}
.sidebar{
  position:sticky;top:60px;align-self:flex-start;
  width:240px;min-height:calc(100vh - 60px);
  background:var(--c-bone);border-right:1px solid var(--c-fog);
  display:flex;flex-direction:column;flex-shrink:0;
}
[data-sidebar]{width:240px;}
.sb-brand{padding:20px 16px 12px;border-bottom:1px solid var(--c-fog);display:flex;align-items:center;gap:10px;}
.sb-brand-icon{width:32px;height:32px;background:var(--c-aubergine);border-radius:9px;display:flex;align-items:center;justify-content:center;color:var(--c-lavender);font-weight:800;font-size:14px;flex-shrink:0;}
.sb-brand-name{font-size:14px;font-weight:800;color:var(--c-ink);letter-spacing:-.3px;}
.sb-brand-env{display:inline-block;font-size:10px;font-weight:700;padding:1px 6px;background:rgba(113,76,182,.1);color:var(--c-iris);border-radius:var(--r-pill);}
.sb-section{padding:10px 10px 2px;}
.sb-section-label{font-size:10px;font-weight:700;color:var(--c-graphite);letter-spacing:.7px;text-transform:uppercase;padding:0 8px;margin-bottom:4px;}
.sb-link{
  display:flex;align-items:center;gap:9px;padding:7px 10px;border-radius:7px;
  font-size:13px;font-weight:600;color:var(--c-graphite);cursor:pointer;
  background:none;border:none;width:100%;text-align:left;transition:all .15s;font-family:inherit;
}
.sb-link:hover{background:rgba(113,76,182,.06);color:var(--c-ink);}
.sb-link.active{background:rgba(113,76,182,.10);color:var(--c-iris);}
.sb-link .ph{font-size:16px;}
.sb-badge{margin-left:auto;padding:1px 7px;border-radius:var(--r-pill);font-size:10px;font-weight:700;background:var(--c-lavender);color:var(--c-indigo);}
.sb-footer{margin-top:auto;padding:14px 10px;border-top:1px solid var(--c-fog);}
.user-chip{display:flex;align-items:center;gap:9px;padding:7px 10px;border-radius:7px;}
.user-avatar{width:28px;height:28px;background:var(--c-aubergine);border-radius:50%;display:flex;align-items:center;justify-content:center;color:var(--c-lavender);font-size:12px;font-weight:800;flex-shrink:0;}
.user-name{font-size:12px;font-weight:700;color:var(--c-ink);}
.user-role{font-size:11px;color:var(--c-graphite);}

.dash-main{flex:1;min-width:0;background:var(--c-canvas);}
.dash-header{padding:24px 28px 0;display:flex;align-items:flex-start;justify-content:space-between;gap:12px;}
.dash-title-row{display:flex;flex-direction:column;gap:3px;}
.dash-title{font-size:26px;font-weight:700;color:var(--c-ink);letter-spacing:-.62px;line-height:1.2;}
.dash-meta{font-size:12px;color:var(--c-graphite);}
.dash-actions{display:flex;gap:8px;align-items:center;flex-shrink:0;margin-top:4px;}
.btn-sm-secondary{padding:7px 14px;border:1.5px solid var(--c-fog);border-radius:var(--r-btn);font-size:13px;font-weight:600;color:var(--c-ink);background:var(--c-bone);cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:5px;font-family:inherit;}
.btn-sm-secondary:hover{border-color:var(--c-iris);color:var(--c-iris);}
.btn-sm-primary{padding:7px 14px;border:none;border-radius:var(--r-btn);font-size:13px;font-weight:700;color:var(--c-bone);background:var(--c-iris);cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:5px;font-family:inherit;}
.btn-sm-primary:hover{background:var(--c-indigo);}
.btn-ghost-iris{padding:6px 12px;border:1.5px solid var(--c-iris);border-radius:var(--r-btn);font-size:12px;font-weight:600;color:var(--c-iris);background:none;cursor:pointer;font-family:inherit;transition:all .15s;}
.btn-ghost-iris:hover{background:rgba(113,76,182,.07);}

/* Stat row */
.stat-row{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;padding:18px 28px;}
[data-stat-row]{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;}
.stat-card{background:var(--c-bone);border:1px solid var(--c-fog);border-radius:var(--r-card);padding:18px;animation:countUp .4s ease both;cursor:default;}
.stat-card:hover{box-shadow:var(--shadow-pop);border-color:var(--c-lavender);}
.stat-label{font-size:11px;font-weight:700;color:var(--c-graphite);letter-spacing:.3px;margin-bottom:7px;}
.stat-value{font-size:30px;font-weight:700;color:var(--c-ink);letter-spacing:-.62px;line-height:1;margin-bottom:5px;}
.stat-delta{font-size:11px;font-weight:700;display:flex;align-items:center;gap:3px;}
.stat-delta.pos{color:var(--c-green);}
.stat-delta.neg{color:var(--c-red);}
.stat-delta.warn{color:var(--c-amber);}
.sparkline{width:100%;height:32px;margin-top:10px;}

/* Tabs */
.tab-bar-wrap{padding:0 28px;}
.tab-bar{display:flex;gap:2px;border-bottom:2px solid var(--c-fog);padding-top:2px;}
[data-tabs]{display:flex;gap:2px;border-bottom:2px solid var(--c-fog);}
.tab{padding:8px 14px;border:none;background:none;font-size:13px;font-weight:600;color:var(--c-graphite);cursor:pointer;border-bottom:2.5px solid transparent;margin-bottom:-2px;transition:all .15s;font-family:inherit;}
.tab:hover{color:var(--c-ink);}
.tab.active{color:var(--c-iris);border-bottom-color:var(--c-iris);}
.tab-count{margin-left:4px;padding:1px 6px;background:rgba(113,76,182,.1);color:var(--c-iris);border-radius:var(--r-pill);font-size:10px;font-weight:700;}

/* Data body */
.dash-body{padding:18px 28px 32px;}

/* Charts */
.chart-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:18px;}
.chart-card{background:var(--c-bone);border:1px solid var(--c-fog);border-radius:var(--r-card);padding:18px;}
.chart-title{font-size:13px;font-weight:700;color:var(--c-ink);margin-bottom:3px;}
.chart-sub{font-size:11px;color:var(--c-graphite);margin-bottom:14px;}
.chart-wrap{position:relative;height:180px;}

.source-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:18px;}
.source-card{background:var(--c-bone);border:1px solid var(--c-fog);border-radius:var(--r-card);padding:14px;animation:fadeIn .4s ease both;}
.source-card:hover{border-color:var(--c-lavender);box-shadow:var(--shadow-pop);}
.source-name{font-size:13px;font-weight:700;color:var(--c-ink);margin-bottom:2px;display:flex;align-items:center;gap:7px;}
.source-url{font-size:10px;color:var(--c-graphite);margin-bottom:9px;}
.source-stat{display:flex;justify-content:space-between;align-items:center;margin-bottom:5px;}
.source-stat-label{font-size:11px;color:var(--c-graphite);}
.source-stat-value{font-size:13px;font-weight:700;color:var(--c-ink);}
.progress-bar{height:5px;background:var(--c-canvas);border-radius:3px;overflow:hidden;margin-top:3px;}
.progress-fill{height:100%;border-radius:3px;background:var(--c-iris);transition:width .8s cubic-bezier(.4,0,.2,1);}
.progress-fill.green{background:var(--c-green);}
.progress-fill.amber{background:var(--c-amber);}
.progress-fill.red{background:var(--c-red);}
.trigger-btn{width:100%;padding:7px;border:1px solid var(--c-iris);border-radius:6px;background:none;font-size:11px;font-weight:700;color:var(--c-iris);cursor:pointer;margin-top:8px;transition:all .15s;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:4px;}
.trigger-btn:hover{background:rgba(113,76,182,.07);}

/* Data table */
.data-table-wrap{background:var(--c-bone);border:1px solid var(--c-fog);border-radius:var(--r-card);overflow:hidden;}
.data-table{width:100%;border-collapse:collapse;}
.data-table thead{background:var(--c-canvas);}
.data-table th{padding:10px 14px;font-size:11px;font-weight:700;color:var(--c-graphite);text-align:left;letter-spacing:.4px;text-transform:uppercase;border-bottom:1px solid var(--c-fog);}
.data-table td{padding:11px 14px;font-size:13px;color:var(--c-ink);border-bottom:1px solid rgba(227,227,226,.5);}
.data-table tr:last-child td{border-bottom:none;}
.data-table tr:hover td{background:rgba(113,76,182,.03);}
.data-table tr{animation:rowSlide .3s ease both;}

/* Badges */
.badge{display:inline-flex;align-items:center;gap:3px;padding:2px 8px;border-radius:var(--r-pill);font-size:11px;font-weight:700;}
.badge.green{background:rgba(26,156,91,.10);color:var(--c-green);}
.badge.red{background:rgba(220,38,38,.10);color:var(--c-red);}
.badge.amber{background:rgba(217,119,6,.10);color:var(--c-amber);}
.badge.iris{background:rgba(113,76,182,.10);color:var(--c-iris);}
.badge.gray{background:rgba(102,102,102,.10);color:var(--c-graphite);}
.dot{width:6px;height:6px;border-radius:50%;display:inline-block;flex-shrink:0;}
.dot.green{background:var(--c-green);}
.dot.red{background:var(--c-red);}
.dot.amber{background:var(--c-amber);}
.dot.blink{animation:dotBlink 1.2s step-end infinite;}

/* Rank list */
.rank-list{display:flex;flex-direction:column;}
.rank-item{display:flex;align-items:center;gap:10px;padding:9px 14px;border-bottom:1px solid rgba(227,227,226,.5);}
.rank-item:last-child{border-bottom:none;}
.rank-item:hover{background:rgba(113,76,182,.03);}
.rank-num{font-size:12px;font-weight:800;color:var(--c-graphite);width:16px;text-align:right;}
.rank-name{flex:1;font-size:13px;font-weight:600;color:var(--c-ink);}

.rank-bar-fill{height:100%;background:var(--c-iris);border-radius:2px;}
.rank-value{font-size:12px;font-weight:700;color:var(--c-ink);min-width:44px;text-align:right;}

/* Outlink tags */
.outlink-tag{display:inline-flex;align-items:center;padding:2px 7px;border-radius:var(--r-pill);font-size:11px;font-weight:700;}
.outlink-flight{background:rgba(113,76,182,.10);color:var(--c-iris);}
.outlink-hotel{background:rgba(26,156,91,.10);color:var(--c-green);}
.outlink-esim{background:rgba(217,119,6,.10);color:var(--c-amber);}
.outlink-tour{background:rgba(220,38,38,.10);color:var(--c-red);}

/* Admin */
.admin-toolbar{display:flex;align-items:center;gap:8px;margin-bottom:14px;flex-wrap:wrap;}
.search-input{padding:7px 13px;border:1px solid var(--c-fog);border-radius:var(--r-btn);font-size:13px;color:var(--c-ink);background:var(--c-bone);outline:none;transition:border-color .15s;width:200px;font-family:inherit;}
.search-input:focus{border-color:var(--c-iris);}
.filter-chip{padding:5px 10px;border:1px solid var(--c-fog);border-radius:var(--r-pill);font-size:12px;font-weight:600;color:var(--c-graphite);background:var(--c-bone);cursor:pointer;transition:all .15s;}
.filter-chip:hover,.filter-chip.active{border-color:var(--c-iris);color:var(--c-iris);background:rgba(113,76,182,.06);}
.switch{width:34px;height:19px;background:var(--c-fog);border-radius:10px;cursor:pointer;position:relative;transition:background .2s;border:none;flex-shrink:0;}
.switch.on{background:var(--c-iris);}
.switch::after{content:'';position:absolute;top:2.5px;left:2.5px;width:14px;height:14px;background:#fff;border-radius:50%;transition:transform .2s;}
.switch.on::after{transform:translateX(15px);}

/* Toolbar date */
.date-range-bar{display:flex;gap:5px;}
.date-btn{padding:5px 11px;border:1px solid var(--c-fog);border-radius:var(--r-pill);font-size:11px;font-weight:600;color:var(--c-graphite);background:var(--c-bone);cursor:pointer;transition:all .15s;font-family:inherit;}
.date-btn.active{background:var(--c-aubergine);border-color:var(--c-aubergine);color:var(--c-bone);}

/* Toast */
.toast{position:fixed;bottom:20px;right:20px;background:var(--c-aubergine);color:var(--c-lavender);padding:10px 16px;border-radius:var(--r-card);font-size:12px;font-weight:600;z-index:9999;animation:toastIn .25s ease;display:flex;align-items:center;gap:7px;}

/* Skeleton */
.skeleton{background:linear-gradient(90deg,rgba(41,40,39,.05) 25%,rgba(41,40,39,.1) 50%,rgba(41,40,39,.05) 75%);background-size:800px 100%;animation:shimmer 1.5s infinite linear;border-radius:7px;}

/* Scrollbar */
::-webkit-scrollbar{width:5px;height:5px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--c-fog);border-radius:4px;}

/* Responsive */
@media(max-width:900px){
  .glass-panel-left,.glass-panel-right{display:none;}

  .sidebar{display:none;}
  .chart-grid{grid-template-columns:1fr;}
  .source-grid{grid-template-columns:1fr 1fr;}
}

/* ── Sparkline SVG ── */
function Sparkline({data, color='#714cb6'}){
  const max=Math.max(...data); const min=Math.min(...data);
  const pts=data.map((v,i)=>`${(i/(data.length-1))*100},${32-((v-min)/(max-min||1))*28}`).join(' ');
  return (
    <svg className="sparkline" viewBox="0 0 100 32" preserveAspectRatio="none">
      <polyline points={pts} fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/>
    </svg>
  );
}

    if(!ref.current) return;
    if(inst.current) inst.current.destroy();
    inst.current=new Chart(ref.current,{
      type:'bar',
      data:{labels,datasets:[{data,backgroundColor:color,borderRadius:6,borderSkipped:false}]},
      options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{grid:{display:false},ticks:{font:{size:11},color:'#666'}},y:{grid:{color:'rgba(41,40,39,.06)'},ticks:{font:{size:10},color:'#666'}}}}

        </div>
      </div>
      <div className="dash-body" style={{paddingTop:20}}>
        <div className="admin-toolbar">
          <input className="search-input" placeholder="상품명·소스 검색..." value={search} onChange={e=>setSearch(e.target.value)}/>
          <button className="filter-chip active">전체</button>
          <button className="filter-chip">숨김</button>
          <button className="filter-chip">오류</button>
        </div>
        <div className="data-table-wrap">
          <table className="data-table">
            <thead><tr><th>상품명</th><th>카테고리</th><th>소스</th><th>수집 시각</th><th>상태</th><th>노출</th></tr></thead>
            <tbody>
              {filtered.map((r,i)=>(
                <tr key={r.id} style={{animationDelay:`${i*.06}s`}}>
                  <td style={{fontWeight:600,maxWidth:200}}>{r.name}</td>
                  <td><span className="badge iris">{r.category}</span></td>
                  <td>{r.source}</td>
                  <td style={{color:'#666',fontSize:12}}>{r.collected}</td>
                  <td>{contentBadge(r.status)}</td>
                  <td>
                    <button className={`switch${r.blacklisted?'':' on'}`} onClick={()=>toggle(r.id)}/>
                  </td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      </div>
      {toast&&<Toast msg={toast} onClose={()=>setToast(null)}/>}
    </div>
  );
}

/* ── Dashboard wrapper ── */
function Dashboard({section, onNav}){
  const sectionMap = {
    'crawl-monitor': CrawlMonitor,
    'pattern-analysis': PatternAnalysis,
    'outlink-tracking': OutlinkTracking,
    'content-admin': ContentAdmin,
  };
  const SectionComp = sectionMap[section] || CrawlMonitor;
  const navItems=[
    {id:'crawl-monitor',label:'수집 현황',icon:'ph-activity',badge:''},
    {id:'pattern-analysis',label:'패턴 분석',icon:'ph-chart-line-up',badge:''},
    {id:'outlink-tracking',label:'아웃링크 분석',icon:'ph-link',badge:'HOT'},
    {id:'content-admin',label:'콘텐츠 관리',icon:'ph-shield',badge:''},
  ];
  return (
    <div className="dashboard">
      <aside className="sidebar" data-sidebar>
        <div className="sb-brand">
          <div className="sb-brand-icon">N</div>
          <div>
            <div className="sb-brand-name">여행나침반</div>
            <span className="sb-brand-env">관리자 콘솔</span>
          </div>
        </div>
        <div className="sb-section">
          <div className="sb-section-label">모니터링</div>
          {navItems.slice(0,1).map(n=>(
            <button key={n.id} className={`sb-link${section===n.id?' active':''}`} onClick={()=>onNav(n.id)}>
              <i className={`ph ${n.icon}`}/>{n.label}
              {n.badge&&<span className="sb-badge">{n.badge}</span>}
            </button>
          ))}
        </div>
        <div className="sb-section">
          <div className="sb-section-label">분석</div>
          {navItems.slice(1,3).map(n=>(
            <button key={n.id} className={`sb-link${section===n.id?' active':''}`} onClick={()=>onNav(n.id)}>
              <i className={`ph ${n.icon}`}/>{n.label}
              {n.badge&&<span className="sb-badge">{n.badge}</span>}
            </button>
          ))}
        </div>
        <div className="sb-section">
          <div className="sb-section-label">관리</div>
          {navItems.slice(3).map(n=>(
            <button key={n.id} className={`sb-link${section===n.id?' active':''}`} onClick={()=>onNav(n.id)}>
              <i className={`ph ${n.icon}`}/>{n.label}
            </button>
          ))}
          <button className="sb-link" onClick={()=>onNav('settings')}>
            <i className="ph ph-gear"/>설정
          </button>
        </div>
        <div className="sb-footer">
          <div className="user-chip">
            <div className="user-avatar">A</div>
            <div>
              <div className="user-name">관리자</div>
              <div className="user-role">슈퍼 어드민</div>
            </div>
          </div>
        </div>
      </aside>
      <div className="dash-main">
        <SectionComp/>
      </div>
    </div>
  );
}

/* ── App ── */
function App(){
  const [view, setView] = useState('home');
  const dashSections=['crawl-monitor','pattern-analysis','outlink-tracking','content-admin'];
  const isDash = dashSections.includes(view);

  const handleNav = (target) => setView(target);

  const navTabs = [
    {id:'crawl-monitor', label:'수집 현황'},
    {id:'pattern-analysis', label:'패턴 분석'},
    {id:'outlink-tracking', label:'아웃링크 분석'},
    {id:'content-admin', label:'콘텐츠 관리'},
  ];

  return (
    <div>
      {/* Announcement banner */}
      <div className="annc-banner">
        LLM 여행 분석 플랫폼 v2.0 — 크롤링 모니터링·패턴 분석·전환 트래킹 통합 운영 도구
        <a onClick={()=>handleNav('crawl-monitor')} href="#">대시보드 시작 →</a>
      </div>

      {/* Top nav */}
      <nav className={`topnav${view==='home'?' over-hero':''}`} style={view==='home'?{position:'absolute',top:40,left:0,right:0,background:'transparent',borderBottom:'none',backdropFilter:'none',zIndex:95}:{}}>
        <div className="nav-logo">
          <div className="nav-logo-icon">N</div>
          <span className="nav-logo-name" style={view!=='home'?{color:'var(--c-ink)'}:{}}>여행나침반</span>
        </div>
        <div className="nav-tabs">
          {navTabs.map(t=>(
            <button key={t.id} className={`nav-tab${view===t.id?' active':''}`} onClick={()=>handleNav(t.id)}>
              {t.label}
            </button>
          ))}
        </div>
        <div className="nav-actions">
          <button className="btn-nav-login" style={view!=='home'?{color:'var(--c-graphite)'}:{}} onClick={()=>handleNav('home')}>홈</button>
          <button className="btn-nav-signup" onClick={()=>handleNav('crawl-monitor')}>대시보드</button>
        </div>
      </nav>

      {view==='home' && <LandingPage onNav={handleNav}/>}
      {isDash && <Dashboard section={view} onNav={handleNav}/>}
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App/>);
</script>
</body>
</html>
