<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>iOS 구독 결제 통합 관리 플랫폼 — 맞춤 구현 데모</title>
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f5f2f0;
  --surface: #ffffff;
  --graphite: #333333;
  --ink: #000000;
  --border: #d6d6d6;
  --muted: #7b7b7b;
  --silver: #bcbcbc;
  --amethyst: #f1ccff;
  --sky: #91e0ff;
  --r-card: 24px;
  --r-badge: 10px;
  --r-btn: 10px;
  --shadow: rgba(0,0,0,0.04) 0 8px 16px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Pretendard',-apple-system,sans-serif;background:var(--bg);color:var(--graphite);font-size:14px;line-height:1.5;}
#root{display:flex;width:100%;min-height:100vh;}
/* Sidebar */
.sidebar{position:fixed;left:0;top:0;bottom:0;width:240px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;z-index:100;overflow-y:auto;}
.sidebar-brand{padding:20px 16px 16px;border-bottom:1px solid var(--border);}
.brand-logo{display:flex;align-items:center;gap:10px;margin-bottom:8px;}
.brand-icon{width:28px;height:28px;background:var(--amethyst);border-radius:8px;display:flex;align-items:center;justify-content:center;animation:shimmer 2.5s ease-in-out infinite;}
.brand-name{font-weight:700;font-size:15px;color:var(--ink);}
.brand-env{display:inline-flex;align-items:center;gap:4px;background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:3px 8px;font-size:11px;color:var(--muted);}
.env-dot{width:6px;height:6px;border-radius:50%;background:#22c55e;}
.sidebar-section{padding:12px 8px 4px;}
.sidebar-section-title{font-size:11px;font-weight:600;color:var(--silver);letter-spacing:0.06em;text-transform:uppercase;padding:0 8px;margin-bottom:4px;}
.sidebar-link{display:flex;align-items:center;gap:8px;padding:7px 8px;border-radius:8px;color:var(--graphite);cursor:pointer;font-size:13.5px;transition:background 0.12s;user-select:none;}
.sidebar-link:hover{background:var(--bg);}
.sidebar-link.active{background:var(--amethyst);color:var(--ink);font-weight:600;}
.sidebar-link .icon{width:16px;height:16px;flex-shrink:0;}
.sidebar-footer{margin-top:auto;padding:12px;border-top:1px solid var(--border);}
.sidebar-user{display:flex;align-items:center;gap:10px;padding:8px;border-radius:10px;cursor:pointer;}
.sidebar-user:hover{background:var(--bg);}
.user-avatar{width:28px;height:28px;border-radius:50%;background:var(--amethyst);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:var(--ink);}
.user-info{flex:1;min-width:0;}
.user-name{font-size:13px;font-weight:600;color:var(--ink);}
.user-role{font-size:11px;color:var(--muted);}
/* Main */
.main-wrap{margin-left:240px;flex:1;min-width:0;width:calc(100% - 240px);min-height:100vh;display:flex;flex-direction:column;}
/* Page header */
.page-header{padding:24px 32px 0;background:var(--bg);}
.page-title-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;}
.page-title{font-size:22px;font-weight:700;color:var(--ink);letter-spacing:-0.4px;}
.page-actions{display:flex;gap:8px;align-items:center;}
.btn-primary{background:var(--amethyst);color:var(--ink);border:1px solid var(--amethyst);border-radius:var(--r-btn);padding:8px 14px;font-size:13px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:6px;transition:opacity 0.12s;}
.btn-primary:hover{opacity:0.85;}
.btn-secondary{background:transparent;color:var(--ink);border:1px solid var(--ink);border-radius:0;padding:7px 16px;font-size:13px;font-weight:500;cursor:pointer;display:flex;align-items:center;gap:6px;transition:background 0.12s;}
.btn-secondary:hover{background:var(--bg);}
.page-meta{font-size:12px;color:var(--muted);}
/* Stat row */
.stat-row{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;padding:20px 32px;}
.stat-card{background:var(--surface);border-radius:var(--r-card);padding:20px 24px;box-shadow:var(--shadow);display:flex;flex-direction:column;gap:8px;animation:fadeIn 0.4s ease both;}
.stat-label{font-size:12px;color:var(--muted);font-weight:500;}
.stat-value{font-size:30px;font-weight:700;color:var(--ink);letter-spacing:-0.8px;line-height:1;}
.stat-footer{display:flex;align-items:center;justify-content:space-between;}
.stat-delta{font-size:12px;font-weight:600;}
.stat-delta.positive{color:#16a34a;}
.stat-delta.negative{color:#dc2626;}
.stat-delta.neutral{color:var(--muted);}
/* Main content area */
.content-area{padding:0 32px 32px;display:flex;flex-direction:column;gap:20px;}
/* Insight board: hero-viz + kpi */
.insight-row{display:grid;grid-template-columns:1fr 340px;gap:16px;}
.chart-card{background:var(--surface);border-radius:var(--r-card);padding:24px;box-shadow:var(--shadow);}
.chart-title{font-size:15px;font-weight:700;color:var(--ink);margin-bottom:4px;}
.chart-sub{font-size:12px;color:var(--muted);margin-bottom:16px;}
.chart-canvas-wrap{position:relative;height:220px;}
.kpi-panel{display:flex;flex-direction:column;gap:12px;}
.kpi-card{background:var(--surface);border-radius:var(--r-card);padding:18px 20px;box-shadow:var(--shadow);}
.kpi-card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.kpi-card-label{font-size:12px;color:var(--muted);font-weight:500;}
.kpi-card-badge{background:var(--bg);border:1px solid var(--border);border-radius:var(--r-badge);padding:2px 8px;font-size:10px;color:var(--muted);}
.kpi-card-value{font-size:22px;font-weight:700;color:var(--ink);margin-bottom:4px;}
.kpi-card-bar{height:4px;background:var(--bg);border-radius:2px;overflow:hidden;}
.kpi-card-bar-fill{height:100%;border-radius:2px;transition:width 0.5s;}
/* Widget grid */
.widget-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
.widget-card{background:var(--surface);border-radius:var(--r-card);padding:20px 24px;box-shadow:var(--shadow);}
.widget-title{font-size:14px;font-weight:700;color:var(--ink);margin-bottom:14px;display:flex;align-items:center;gap:8px;}
/* Tab bar */
.tab-section{background:var(--surface);border-radius:var(--r-card);padding:0;box-shadow:var(--shadow);overflow:hidden;}
.tab-bar{display:flex;border-bottom:1px solid var(--border);padding:0 20px;gap:0;}
.tab{background:none;border:none;border-bottom:2px solid transparent;padding:14px 16px;font-size:13.5px;font-weight:500;color:var(--muted);cursor:pointer;transition:color 0.12s;margin-bottom:-1px;}
.tab.active{color:var(--ink);border-bottom-color:var(--amethyst);font-weight:700;}
.tab:hover:not(.active){color:var(--graphite);}
.data-toolbar{display:flex;align-items:center;gap:8px;padding:14px 20px;border-bottom:1px solid var(--border);}
.search-input{flex:1;border:1px solid var(--border);border-radius:8px;padding:7px 12px;font-size:13px;font-family:inherit;background:var(--bg);color:var(--graphite);}
.search-input:focus{outline:none;border-color:var(--amethyst);}
.filter-chip{background:var(--bg);border:1px solid var(--border);border-radius:var(--r-badge);padding:5px 12px;font-size:12px;color:var(--graphite);cursor:pointer;font-family:inherit;display:flex;align-items:center;gap:5px;transition:background 0.1s;}
.filter-chip:hover{background:var(--amethyst);border-color:var(--amethyst);}
.filter-chip.active{background:var(--amethyst);border-color:var(--amethyst);color:var(--ink);}
.export-btn{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-badge);padding:5px 12px;font-size:12px;color:var(--graphite);cursor:pointer;font-family:inherit;display:flex;align-items:center;gap:5px;margin-left:auto;}
.data-table-wrap{overflow:auto;}
.data-table{width:100%;border-collapse:collapse;}
.data-table th{text-align:left;padding:10px 20px;font-size:11px;font-weight:600;color:var(--muted);letter-spacing:0.05em;text-transform:uppercase;background:var(--bg);border-bottom:1px solid var(--border);}
.data-table td{padding:12px 20px;font-size:13px;border-bottom:1px solid var(--border);color:var(--graphite);}
.data-table tr:last-child td{border-bottom:none;}
.data-table tr:hover td{background:rgba(241,204,255,0.08);}
.data-table tr{cursor:pointer;}
/* Badges */
.badge{display:inline-flex;align-items:center;padding:3px 8px;border-radius:var(--r-badge);font-size:11px;font-weight:600;}
.badge-red{background:#fef2f2;color:#dc2626;}
.badge-amber{background:#fffbeb;color:#d97706;}
.badge-green{background:#f0fdf4;color:#16a34a;}
.badge-blue{background:rgba(145,224,255,0.2);color:#0369a1;}
.badge-purple{background:rgba(241,204,255,0.4);color:#7c3aed;}
/* IAP screens */
.iap-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:20px;}
.plan-card{background:var(--surface);border-radius:var(--r-card);padding:28px 24px;box-shadow:var(--shadow);border:2px solid transparent;cursor:pointer;transition:border-color 0.15s;}
.plan-card:hover,.plan-card.selected{border-color:var(--amethyst);}
.plan-name{font-size:16px;font-weight:700;color:var(--ink);margin-bottom:4px;}
.plan-price{font-size:28px;font-weight:700;color:var(--ink);letter-spacing:-0.8px;margin-bottom:2px;}
.plan-period{font-size:13px;color:var(--muted);margin-bottom:16px;}
.plan-features{list-style:none;display:flex;flex-direction:column;gap:8px;}
.plan-feature{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--graphite);}
.check-icon{color:#16a34a;flex-shrink:0;}
.iap-timeline{background:var(--surface);border-radius:var(--r-card);padding:24px;box-shadow:var(--shadow);}
.timeline-title{font-size:15px;font-weight:700;color:var(--ink);margin-bottom:16px;}
.timeline{display:flex;flex-direction:column;gap:0;}
.timeline-item{display:flex;gap:16px;padding:12px 0;position:relative;}
.timeline-item:not(:last-child)::after{content:'';position:absolute;left:17px;top:36px;bottom:-12px;width:1px;background:var(--border);}
.timeline-dot{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;z-index:1;}
.td-done{background:var(--amethyst);}
.td-active{background:var(--sky);animation:pulse 2s infinite;}
.td-pending{background:var(--bg);border:1px solid var(--border);}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.7;}}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes shimmer{0%,100%{opacity:0.7}50%{opacity:1}}
.timeline-content{flex:1;}
.timeline-step{font-size:13.5px;font-weight:600;color:var(--ink);}
.timeline-desc{font-size:12px;color:var(--muted);margin-top:2px;}
.timeline-time{font-size:11px;color:var(--silver);margin-top:3px;}
/* Receipt verify */
.verify-form{background:var(--surface);border-radius:var(--r-card);padding:24px;box-shadow:var(--shadow);margin-bottom:20px;}
.verify-title{font-size:15px;font-weight:700;color:var(--ink);margin-bottom:16px;}
.form-row{display:flex;gap:12px;align-items:flex-end;}
.form-group{flex:1;}
.form-label{font-size:12px;font-weight:600;color:var(--graphite);margin-bottom:6px;display:block;}
.form-input{width:100%;border:1px solid var(--border);border-radius:10px;padding:10px 12px;font-size:13px;font-family:inherit;background:var(--bg);}
.form-input:focus{outline:none;border-color:var(--amethyst);}
/* Subscription manage */
.checklist-section{background:var(--surface);border-radius:var(--r-card);padding:24px;box-shadow:var(--shadow);margin-bottom:20px;}
.checklist-title{font-size:15px;font-weight:700;color:var(--ink);margin-bottom:4px;}
.checklist-sub{font-size:12px;color:var(--muted);margin-bottom:16px;}
.checklist-item{display:flex;align-items:flex-start;gap:12px;padding:12px 0;border-bottom:1px solid var(--border);}
.checklist-item:last-child{border-bottom:none;}
.checklist-checkbox{width:18px;height:18px;border-radius:5px;border:2px solid var(--border);flex-shrink:0;cursor:pointer;display:flex;align-items:center;justify-content:center;margin-top:1px;transition:all 0.12s;}
.checklist-checkbox.checked{background:var(--amethyst);border-color:var(--amethyst);}
.checklist-text{flex:1;}
.checklist-label{font-size:13.5px;font-weight:500;color:var(--ink);}
.checklist-desc{font-size:12px;color:var(--muted);margin-top:2px;}
.checklist-badge{margin-left:auto;flex-shrink:0;}
/* Modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.3);z-index:999;display:flex;align-items:center;justify-content:center;}
.modal-box{background:var(--surface);border-radius:var(--r-card);padding:32px;width:480px;max-height:80vh;overflow-y:auto;box-shadow:rgba(0,0,0,0.15) 0 24px 48px;}
.modal-title{font-size:18px;font-weight:700;color:var(--ink);margin-bottom:8px;}
.modal-sub{font-size:13px;color:var(--muted);margin-bottom:20px;}
.modal-close{position:absolute;top:16px;right:16px;}
.guide-step{display:flex;gap:12px;padding:12px;background:var(--bg);border-radius:12px;margin-bottom:8px;}
.guide-step-num{width:24px;height:24px;border-radius:50%;background:var(--amethyst);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;}
.guide-step-text{font-size:13px;color:var(--graphite);line-height:1.5;}
/* Toast */
.toast{position:fixed;bottom:24px;right:24px;background:var(--ink);color:white;padding:12px 20px;border-radius:12px;font-size:13px;font-weight:500;z-index:9999;transform:translateY(80px);opacity:0;transition:all 0.3s;pointer-events:none;}
.toast.show{transform:translateY(0);opacity:1;}
/* Access control */
.access-flow{display:flex;align-items:center;gap:12px;padding:20px;background:var(--bg);border-radius:16px;margin-top:12px;overflow-x:auto;}
.flow-node{background:var(--surface);border-radius:12px;padding:12px 16px;text-align:center;min-width:120px;box-shadow:var(--shadow);flex-shrink:0;}
.flow-node.active-node{background:var(--amethyst);}
.flow-node.blocked-node{background:#fef2f2;border:1px solid #fecaca;}
.flow-label{font-size:12px;font-weight:600;color:var(--ink);}
.flow-sub{font-size:11px;color:var(--muted);margin-top:2px;}
.flow-arrow{font-size:18px;color:var(--silver);flex-shrink:0;}
</style>
</head>

<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

/* ── Sparkline ── */
const Sparkline = ({ data, color = '#f1ccff', width = 70, height = 26 }) => {
  const max = Math.max(...data);
  const min = Math.min(...data);
  const range = max - min || 1;
  const pts = data.map((v, i) => {
    const x = (i / (data.length - 1)) * width;
    const y = height - ((v - min) / range) * (height - 4) - 2;
    return `${x.toFixed(1)},${y.toFixed(1)}`;
  }).join(' ');
  return (
    <svg width={width} height={height} viewBox={`0 0 ${width} ${height}`}>
      <polyline points={pts} fill="none" stroke={color} strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round" />
    </svg>
  );
};

/* ── Chart ── */
const ComplianceChart = () => {
  const ref = useRef(null);

    if (!ref.current) return;

      type: 'bar',

            borderRadius: 6,
            borderSkipped: false,
          },
          {
            label: '준수율',
            data: [8, 15, 45, 70, 80],
            backgroundColor: 'rgba(241,204,255,0.6)',
            borderRadius: 6,
            borderSkipped: false,
          },
        ],
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: {
          legend: { display: true, position: 'top', align: 'end', labels: { boxWidth: 10, font: { size: 11 } } },
          tooltip: { mode: 'index' },
        },
        scales: {
          x: { stacked: false, grid: { display: false }, ticks: { font: { size: 11 } } },
          y: { beginAtZero: true, max: 100, ticks: { font: { size: 11 }, callback: v => v + '%' }, grid: { color: '#f0ede9' } },
        },
      },
    });
    return () => chart.current?.destroy();
  }, []);
  return <canvas ref={ref} />;
};

                        <tr key={v.id} onClick={() => setModal({ title: v.item, category: v.category, guide: v.guide, steps: ['해당 화면에서 외부 URL 연결 요소를 제거합니다.', 'StoreKit 2 API를 활용하여 IAP 플로우를 구현합니다.', 'App Store Connect에서 상품 ID를 설정합니다.', '서버에서 영수증 검증 API를 호출합니다.'] })}>
                          <td style={{ color: '#7b7b7b', fontFamily: 'monospace', fontSize: 12 }}>{v.id}</td>
                          <td>{v.category}</td>
                          <td style={{ fontWeight: 500, color: '#000' }}>{v.item}</td>
                          <td>{riskBadge(v.risk)}</td>
                          <td>{statusBadge(v.status)}</td>
                          <td style={{ color: '#7b7b7b', fontSize: 12 }}>{v.guide}</td>
                          <td><i data-lucide="chevron-right" style={{ width: 14, height: 14, color: '#bcbcbc' }}></i></td>
                        </tr>
                      ))}
                    </tbody>
                  </table>
                </div>
              </div>
            </div>
          </>
        )}

        {/* ── SCREEN: IAP 연동 ── */}
        {nav === 'IAP 연동' && (
          <>
            <div className="page-header">
              <div className="page-title-row">
                <h1 className="page-title">StoreKit 2 IAP 연동 시뮬레이터</h1>

                  <button className="btn-primary" onClick={simulateIAP}>

                    {iapStep < 5 ? '다음 단계 진행' : '완료'}

              {/* Plan cards */}
              <div className="iap-grid">
                {[
                  { name: '월간 기본', price: '₩9,900', period: '/월', productId: 'com.demo.basic.monthly', features: ['기본 콘텐츠 전체 접근', '광고 제거', '오프라인 저장 3편'] },
                  { name: '월간 프리미엄', price: '₩19,900', period: '/월', productId: 'com.demo.premium.monthly', features: ['프리미엄 콘텐츠 전체 접근', '광고 완전 제거', '오프라인 저장 무제한', '4K 스트리밍'] },
                  { name: '연간 프리미엄', price: '₩149,000', period: '/년 (월 환산 ₩12,417)', productId: 'com.demo.premium.yearly', features: ['프리미엄 콘텐츠 전체 접근', '무제한 다운로드', '4K + Dolby', '가족 공유 최대 5인'] },
                ].map(plan => (
                  <div key={plan.name} className={`plan-card ${iapPlan === plan.name ? 'selected' : ''}`} onClick={() => setIapPlan(plan.name)}>
                    <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', marginBottom: 12 }}>
                      <div className="plan-name">{plan.name}</div>
                      {iapPlan === plan.name && <span className="badge badge-purple">선택됨</span>}
                    </div>
                    <div className="plan-price">{plan.price}</div>
                    <div className="plan-period">{plan.period}</div>
                    <div style={{ fontSize: 10, color: '#7b7b7b', fontFamily: 'monospace', marginBottom: 12, background: '#f5f2f0', padding: '4px 8px', borderRadius: 6 }}>{plan.productId}</div>
                    <ul className="plan-features">
                      {plan.features.map((f, i) => (
                        <li key={i} className="plan-feature">
                          <i data-lucide="check" className="check-icon" style={{ width: 13, height: 13, color: '#16a34a' }}></i>
                          {f}
                        </li>
                      ))}
                    </ul>
                  </div>
                ))}
              </div>

              {/* IAP Timeline */}
              <div className="iap-timeline">
                <div className="timeline-title">IAP 트랜잭션 흐름 — {iapPlan}</div>
                <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 24 }}>
                  <div className="timeline">
                    {[
                      { step: '1. 상품 목록 조회', desc: 'StoreKit.products(for:) 호출로 App Store Connect 상품 로드', done: iapStep >= 1, active: iapStep === 1 },
                      { step: '2. 결제 요청', desc: 'Product.purchase() 호출 — 사용자 Face ID / Touch ID 인증', done: iapStep >= 2, active: iapStep === 2 },
                      { step: '3. 트랜잭션 처리', desc: 'Transaction.currentEntitlements 스트림에서 구매 완료 수신', done: iapStep >= 3, active: iapStep === 3 },
                      { step: '4. 서버 영수증 검증', desc: 'JWS 서명된 트랜잭션을 서버로 전송하여 진위 확인', done: iapStep >= 4, active: iapStep === 4 },
                      { step: '5. 콘텐츠 잠금 해제', desc: '검증 완료 후 구독 상태 업데이트 및 프리미엄 콘텐츠 활성화', done: iapStep >= 5, active: iapStep === 5 },
                    ].map((item, i) => (
                      <div key={i} className="timeline-item">
                        <div className={`timeline-dot ${item.done && !item.active ? 'td-done' : item.active ? 'td-active' : 'td-pending'}`}>
                          {item.done && !item.active
                            ? <i data-lucide="check" style={{ width: 13, height: 13, color: '#000' }}></i>
                            : item.active
                            ? <i data-lucide="loader-2" style={{ width: 13, height: 13, color: '#000' }}></i>
                            : <i data-lucide="clock" style={{ width: 13, height: 13, color: '#bcbcbc' }}></i>
                          }
                        </div>
                        <div className="timeline-content">
                          <div className="timeline-step" style={{ color: item.active ? '#000' : item.done ? '#333' : '#7b7b7b' }}>{item.step}</div>
                          <div className="timeline-desc">{item.desc}</div>
                        </div>
                      </div>
                    ))}
                  </div>
                  <div>
                    <div className="chart-title" style={{ marginBottom: 12 }}>최근 트랜잭션 내역</div>
                    <div className="data-table-wrap" style={{ maxHeight: 280, overflow: 'auto' }}>
                      <table className="data-table">
                        <thead>
                          <tr>
                            <th>ID</th>
                            <th>상품</th>
                            <th>상태</th>
                            <th>금액</th>
                          </tr>
                        </thead>
                        <tbody>
                          {iapTx.map(tx => (
                            <tr key={tx.id}>
                              <td style={{ fontFamily: 'monospace', fontSize: 11, color: '#7b7b7b' }}>{tx.id}</td>
                              <td style={{ fontSize: 12 }}>{tx.plan}</td>
                              <td>
                                {tx.status === '성공' ? <span className="badge badge-green">{tx.status}</span>
                                  : tx.status === '실패' ? <span className="badge badge-red">{tx.status}</span>
                                  : tx.status === '위조' ? <span className="badge badge-red">{tx.status}</span>
                                  : <span className="badge badge-blue">{tx.status}</span>}
                              </td>
                              <td style={{ fontWeight: 600, fontSize: 13 }}>{tx.amount}</td>
                            </tr>
                          ))}
                        </tbody>
                      </table>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          </>
        )}

        {/* ── SCREEN: 영수증 검증 ── */}
        {nav === '영수증 검증' && (
          <>
            <div className="page-header">
              <div className="page-title-row">
                <h1 className="page-title">백엔드 영수증 검증 API</h1>
                <div className="page-actions">
                  <button className="btn-primary" onClick={() => showToast('검증 로그를 내보내는 중...')}>
                    <i data-lucide="download" style={{ width: 13, height: 13 }}></i>
                    로그 내보내기
                  </button>
                </div>
              </div>
              <div className="page-meta">App Store Server API 연동 — 영수증 위조·만료·재사용 자동 감지</div>
            </div>

            <div className="content-area">
              <div className="stat-row" style={{ padding: 0, marginBottom: 0 }}>
                {[
                  { label: '검증 성공', value: '1,248', delta: '+12', positive: true, color: '#16a34a', spark: [900,950,980,1050,1100,1200,1248] },
                  { label: '검증 실패', value: '34', delta: '+2', positive: false, color: '#dc2626', spark: [20,25,28,30,31,32,34] },
                  { label: '위조 감지', value: '6', delta: '+1', positive: false, color: '#dc2626', spark: [2,3,3,4,5,5,6] },
                  { label: '검증 성공률', value: '97.3%', delta: '-0.2%', positive: false, color: '#d97706', spark: [98.5,98.2,97.9,97.8,97.6,97.4,97.3] },
                ].map((s, i) => (
                  <div key={i} className="stat-card">
                    <div className="stat-label">{s.label}</div>
                    <div style={{ display: 'flex', alignItems: 'flex-end', justifyContent: 'space-between' }}>
                      <div className="stat-value">{s.value}</div>
                      <Sparkline data={s.spark} color={s.color} />
                    </div>
                    <div className="stat-footer">
                      <span className={`stat-delta ${s.positive ? 'positive' : 'negative'}`}>{s.delta} (7일)</span>
                    </div>
                  </div>
                ))}
              </div>

              {/* Verify form */}
              <div className="verify-form">
                <div className="verify-title">영수증 검증 요청</div>
                <div className="form-row">
                  <div className="form-group">
                    <label className="form-label">트랜잭션 ID / 영수증 ID</label>
                    <input className="form-input" placeholder="예: TXN-2841 또는 영수증 원본 데이터..." value={verifyId} onChange={e => setVerifyId(e.target.value)} />
                  </div>
                  <div className="form-group" style={{ maxWidth: 180 }}>
                    <label className="form-label">검증 방식</label>
                    <select className="form-input">
                      <option>App Store Server API</option>
                      <option>로컬 JWS 검증</option>
                    </select>
                  </div>
                  <button className="btn-primary" style={{ flexShrink: 0, alignSelf: 'flex-end' }} onClick={doVerify} disabled={verifyLoading}>
                    {verifyLoading
                      ? <><i data-lucide="loader-2" style={{ width: 13, height: 13 }}></i> 검증 중...</>
                      : <><i data-lucide="shield-check" style={{ width: 13, height: 13 }}></i> 검증 실행</>}
                  </button>
                </div>
                {verifyResult && (
                  <div style={{ marginTop: 16, padding: 16, background: `${verifyResult.color}18`, border: `1px solid ${verifyResult.color}40`, borderRadius: 12, display: 'flex', alignItems: 'center', gap: 10 }}>
                    <i data-lucide={verifyResult.status === '유효' ? 'check-circle-2' : 'x-circle'} style={{ width: 18, height: 18, color: verifyResult.color }}></i>
                    <div>
                      <div style={{ fontWeight: 700, color: verifyResult.color, fontSize: 14 }}>검증 결과: {verifyResult.status}</div>
                      <div style={{ fontSize: 12, color: '#7b7b7b', marginTop: 2 }}>{verifyResult.msg}</div>
                    </div>
                  </div>
                )}
              </div>

              {/* Receipts table */}
              <div className="tab-section">
                <nav className="tab-bar" data-tabs>
                  {['전체 내역', '유효', '만료', '위조'].map(t => (
                    <button key={t} className={`tab ${t === '전체 내역' ? 'active' : ''}`} onClick={() => {}}>{t}</button>
                  ))}
                </nav>
                <div className="data-table-wrap">
                  <table className="data-table">
                    <thead>
                      <tr>
                        <th>영수증 ID</th>
                        <th>트랜잭션 ID</th>
                        <th>상품</th>
                        <th>발급일</th>
                        <th>만료일</th>
                        <th>상태</th>
                        <th>서버 검증</th>
                        <th></th>
                      </tr>
                    </thead>
                    <tbody>
                      {receipts.map(r => (
                        <tr key={r.id} onClick={() => setModal({ title: '영수증 상세', category: r.id, guide: `트랜잭션 ${r.txId} 상세 정보`, steps: ['영수증 JWS 서명을 Apple 공개키로 검증합니다.', '트랜잭션 ID 중복 여부를 DB에서 확인합니다.', '구독 만료일이 현재 시각 이후인지 검증합니다.', '검증 결과를 DB에 저장하고 클라이언트에 반환합니다.'] })}>
                          <td style={{ fontFamily: 'monospace', fontSize: 11 }}>{r.id}</td>
                          <td style={{ fontFamily: 'monospace', fontSize: 11, color: '#7b7b7b' }}>{r.txId}</td>
                          <td>{r.plan}</td>
                          <td style={{ color: '#7b7b7b', fontSize: 12 }}>{r.issuedAt}</td>
                          <td style={{ color: '#7b7b7b', fontSize: 12 }}>{r.expiresAt}</td>
                          <td>{receiptBadge(r.status)}</td>
                          <td style={{ fontSize: 12, color: r.server === '검증 완료' ? '#16a34a' : r.server === '위조 감지' ? '#dc2626' : '#7b7b7b' }}>{r.server}</td>
                          <td><i data-lucide="chevron-right" style={{ width: 14, height: 14, color: '#bcbcbc' }}></i></td>
                        </tr>
                      ))}
                    </tbody>
                  </table>
                </div>
              </div>
            </div>
          </>
        )}

        {/* ── SCREEN: 구독 관리 ── */}
        {nav === '구독 관리' && (
          <>
            <div className="page-header">
              <div className="page-title-row">
                <h1 className="page-title">외부 결제 제거 및 구독 관리</h1>
                <div className="page-actions">
                  <span style={{ fontSize: 13, color: '#7b7b7b', background: '#f0ede9', padding: '6px 14px', borderRadius: 8 }}>
                    완료 {checksDone}/{checklistItems.length}건 · {Math.round((checksDone / checklistItems.length) * 100)}%
                  </span>
                  <button className="btn-primary" onClick={() => showToast('전체 점검 완료 리포트를 생성합니다.')}>
                    <i data-lucide="file-text" style={{ width: 13, height: 13 }}></i>
                    완료 리포트
                  </button>
                </div>
              </div>
              <div className="page-meta">외부 결제 제거 체크리스트 · 구독 상태별 콘텐츠 접근 제어</div>
            </div>

            <div className="content-area">
              {/* Progress */}
              <div style={{ background: 'var(--surface)', borderRadius: 'var(--r-card)', padding: '20px 24px', boxShadow: 'var(--shadow)' }}>
                <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: 8 }}>
                  <span style={{ fontSize: 14, fontWeight: 600, color: '#000' }}>전체 진행률</span>
                  <span style={{ fontSize: 14, fontWeight: 700, color: checksDone === checklistItems.length ? '#16a34a' : '#d97706' }}>
                    {Math.round((checksDone / checklistItems.length) * 100)}%
                  </span>
                </div>
                <div style={{ height: 8, background: '#f0ede9', borderRadius: 4, overflow: 'hidden' }}>
                  <div style={{ height: '100%', width: `${(checksDone / checklistItems.length) * 100}%`, background: checksDone === checklistItems.length ? '#16a34a' : '#f1ccff', borderRadius: 4, transition: 'width 0.5s' }} />
                </div>
                <div style={{ display: 'flex', gap: 20, marginTop: 12, fontSize: 12, color: '#7b7b7b' }}>
                  <span>HIGH: {checks.filter(c => c.risk === 'high' && c.done).length}/{checks.filter(c => c.risk === 'high').length} 완료</span>
                  <span>MED: {checks.filter(c => c.risk === 'medium' && c.done).length}/{checks.filter(c => c.risk === 'medium').length} 완료</span>
                  <span>LOW: {checks.filter(c => c.risk === 'low' && c.done).length}/{checks.filter(c => c.risk === 'low').length} 완료</span>
                </div>
              </div>

              {/* Checklist */}
              <div className="checklist-section">
                <div className="checklist-title">외부 결제 제거 체크리스트</div>
                <div className="checklist-sub">App Store 가이드라인 3.1.1 · 3.1.3 준수를 위한 수정 항목</div>
                {checks.map(item => (
                  <div key={item.id} className="checklist-item">
                    <div className={`checklist-checkbox ${item.done ? 'checked' : ''}`} onClick={() => toggleCheck(item.id)}>
                      {item.done && <i data-lucide="check" style={{ width: 11, height: 11, color: '#000' }}></i>}
                    </div>
                    <div className="checklist-text">
                      <div className="checklist-label" style={{ textDecoration: item.done ? 'line-through' : 'none', color: item.done ? '#bcbcbc' : '#000' }}>{item.label}</div>
                      <div className="checklist-desc">{item.desc}</div>
                    </div>
                    <div className="checklist-badge">{riskBadge(item.risk)}</div>
                  </div>
                ))}
              </div>

              {/* Access control diagram */}
              <div className="widget-card" style={{ borderRadius: 'var(--r-card)', boxShadow: 'var(--shadow)' }}>
                <div className="widget-title">
                  <i data-lucide="git-branch" style={{ width: 15, height: 15 }}></i>
                  구독 상태별 콘텐츠 접근 제어 흐름
                </div>
                <div className="access-flow">
                  <div className="flow-node">
                    <div className="flow-label">사용자 접근</div>
                    <div className="flow-sub">앱 실행</div>
                  </div>
                  <div className="flow-arrow">→</div>
                  <div className="flow-node">
                    <div className="flow-label">구독 상태 확인</div>
                    <div className="flow-sub">StoreKit 2</div>
                  </div>
                  <div style={{ display: 'flex', flexDirection: 'column', gap: 8 }}>
                    <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
                      <div className="flow-arrow">→</div>
                      <div className="flow-node active-node">
                        <div className="flow-label">구독 활성</div>
                        <div className="flow-sub">콘텐츠 허용</div>
                      </div>
                    </div>
                    <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
                      <div className="flow-arrow">→</div>
                      <div className="flow-node blocked-node">
                        <div className="flow-label">구독 만료</div>
                        <div className="flow-sub">IAP 화면으로</div>
                      </div>
                    </div>
                  </div>
                  <div className="flow-arrow">→</div>
                  <div className="flow-node">
                    <div className="flow-label">IAP 구매</div>
                    <div className="flow-sub">StoreKit 2 결제</div>
                  </div>
                  <div className="flow-arrow">→</div>
                  <div className="flow-node">
                    <div className="flow-label">서버 검증</div>
                    <div className="flow-sub">영수증 확인</div>
                  </div>
                  <div className="flow-arrow">→</div>
                  <div className="flow-node active-node">
                    <div className="flow-label">잠금 해제</div>
                    <div className="flow-sub">콘텐츠 활성화</div>
                  </div>
                </div>
              </div>
            </div>
          </>
        )}
      </main>

      {/* ── Modal ── */}
      {modal && (
        <div className="modal-overlay" onClick={() => setModal(null)}>
          <div className="modal-box" onClick={e => e.stopPropagation()}>
            <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', marginBottom: 8 }}>
              <div>
                <div className="modal-title">{modal.title}</div>
                <div style={{ fontSize: 12, color: '#7b7b7b', marginBottom: 16 }}>{modal.category}</div>
              </div>
              <button onClick={() => setModal(null)} style={{ background: 'none', border: 'none', cursor: 'pointer', padding: 4 }}>
                <i data-lucide="x" style={{ width: 16, height: 16, color: '#7b7b7b' }}></i>
              </button>
            </div>
            <div style={{ background: '#f5f2f0', borderRadius: 10, padding: '12px 14px', marginBottom: 16, fontSize: 13, color: '#333' }}>
              <strong>수정 가이드:</strong> {modal.guide}
            </div>
            <div style={{ fontSize: 13, fontWeight: 700, color: '#000', marginBottom: 10 }}>수정 절차</div>
            {modal.steps.map((s, i) => (
              <div key={i} className="guide-step">
                <div className="guide-step-num">{i + 1}</div>
                <div className="guide-step-text">{s}</div>
              </div>
            ))}
            <button className="btn-primary" style={{ width: '100%', marginTop: 16, justifyContent: 'center' }} onClick={() => { setModal(null); showToast('수정 완료로 표시되었습니다.'); }}>
              수정 완료로 표시
            </button>
          </div>
        </div>
      )}

      {/* Toast */}
      <div className={`toast ${toast.show ? 'show' : ''}`}>{toast.msg}</div>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
