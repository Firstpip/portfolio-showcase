<style>
:root {
  --bg: #f2f0eb;
  --surface: #ffffff;
  --ink: #292827;
  --graphite: #666666;
  --fog: #e3e3e2;
  --driftwood: #dcd7d3;
  --iris: #714cb6;
  --aubergine: #421d24;
  --lavender: #d4c7ff;
  --r-card: 16px;
  --r-btn: 8px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Pretendard',-apple-system,sans-serif;background:var(--bg);color:var(--ink);font-size:14px;line-height:1.5;}
#root{display:flex;width:100%;min-height:100vh;flex-direction:column;}
/* Status strip — aubergine top banner */
.status-strip{background:var(--aubergine);color:white;padding:8px 24px;display:flex;align-items:center;gap:12px;font-size:12px;flex-shrink:0;position:sticky;top:0;z-index:200;}
.ss-dot{width:7px;height:7px;border-radius:50%;background:#4ade80;flex-shrink:0;animation:blink 2s infinite;}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:0.5;}}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideIn{from{opacity:0;transform:translateX(-6px)}to{opacity:1;transform:translateX(0)}}
.ss-item{display:flex;align-items:center;gap:6px;}
.ss-divider{width:1px;height:14px;background:rgba(255,255,255,0.2);}
.ss-label{opacity:0.7;}
.ss-val{font-weight:600;}
.ss-badge{background:rgba(255,255,255,0.15);border-radius:4px;padding:1px 6px;font-size:10px;}
/* App layout */
.app-layout{display:flex;flex:1;min-height:0;}
/* Sidebar */
.sidebar{width:260px;background:var(--surface);border-right:1px solid var(--fog);display:flex;flex-direction:column;position:sticky;top:32px;height:calc(100vh - 32px);overflow-y:auto;flex-shrink:0;}
.sidebar-brand{padding:16px;border-bottom:1px solid var(--fog);}
.brand-row{display:flex;align-items:center;justify-content:space-between;}
.brand-icon-wrap{display:flex;align-items:center;gap:8px;}
.brand-dot{width:20px;height:20px;border-radius:4px;background:var(--aubergine);display:flex;align-items:center;justify-content:center;}
.brand-name{font-weight:700;font-size:14px;color:var(--ink);}
.ws-badge{font-size:11px;color:var(--graphite);background:var(--bg);border:1px solid var(--fog);border-radius:4px;padding:2px 6px;}
.cmdk-hint{margin-top:10px;display:flex;align-items:center;gap:6px;padding:6px 8px;border:1px solid var(--fog);border-radius:6px;cursor:pointer;transition:background 0.1s;}
.cmdk-hint:hover{background:var(--bg);}
.cmdk-hint-text{font-size:12px;color:var(--graphite);flex:1;}
.kbd{background:var(--bg);border:1px solid var(--fog);border-radius:4px;padding:1px 5px;font-size:10px;color:var(--graphite);font-family:monospace;}
.sidebar-nav{padding:8px;}
.sidebar-link{display:flex;align-items:center;gap:8px;padding:6px 8px;border-radius:6px;color:var(--graphite);cursor:pointer;font-size:13px;transition:all 0.1s;user-select:none;position:relative;text-decoration:none;animation:slideIn 0.3s ease both;}
.sidebar-link:hover{background:var(--bg);color:var(--ink);}
.sidebar-link.active{background:var(--bg);color:var(--ink);font-weight:600;}
.sidebar-link.active::before{content:'';position:absolute;left:0;top:4px;bottom:4px;width:3px;background:var(--iris);border-radius:0 2px 2px 0;}
.sidebar-link i{font-size:15px;width:18px;text-align:center;}
.sidebar-section-title{font-size:10px;font-weight:600;color:var(--driftwood);letter-spacing:0.07em;text-transform:uppercase;padding:12px 8px 4px;}
.sidebar-count{margin-left:auto;background:var(--bg);border:1px solid var(--fog);border-radius:10px;padding:0 6px;font-size:10px;color:var(--graphite);}
.sidebar-count.red{background:#fef2f2;color:#dc2626;border-color:#fecaca;}
.sidebar-footer{margin-top:auto;padding:12px;border-top:1px solid var(--fog);}
.sidebar-user{display:flex;align-items:center;gap:8px;padding:6px 8px;border-radius:6px;cursor:pointer;}
.sidebar-user:hover{background:var(--bg);}
.user-av{width:26px;height:26px;border-radius:50%;background:var(--aubergine);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:white;}
.user-info{flex:1;min-width:0;}
.user-name{font-size:12px;font-weight:600;color:var(--ink);}
.user-sub{font-size:10px;color:var(--graphite);}
/* Main */
.main-wrap{flex:1;min-width:0;display:flex;flex-direction:column;}
/* Topbar */
.topbar{height:48px;border-bottom:1px solid var(--fog);display:flex;align-items:center;padding:0 20px;gap:12px;background:var(--surface);flex-shrink:0;}
.breadcrumb{display:flex;align-items:center;gap:4px;font-size:13px;}
.breadcrumb a{color:var(--graphite);text-decoration:none;cursor:pointer;}
.breadcrumb a:hover{color:var(--ink);}
.bc-divider{color:var(--driftwood);font-size:12px;margin:0 2px;}
.bc-current{color:var(--ink);font-weight:600;}
.topbar-right{margin-left:auto;display:flex;align-items:center;gap:8px;}
.btn-ghost{background:transparent;border:1px solid var(--iris);color:var(--iris);border-radius:var(--r-btn);padding:5px 12px;font-size:12px;font-weight:500;cursor:pointer;font-family:inherit;display:flex;align-items:center;gap:5px;transition:background 0.1s;}
.btn-ghost:hover{background:rgba(113,76,182,0.08);}
.btn-dark{background:var(--aubergine);color:white;border:none;border-radius:var(--r-btn);padding:5px 14px;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;display:flex;align-items:center;gap:5px;}
.btn-dark:hover{opacity:0.9;}
.btn-cmdk{background:var(--lavender);color:var(--ink);border:none;border-radius:var(--r-btn);padding:5px 10px;font-size:12px;font-weight:500;cursor:pointer;font-family:inherit;display:flex;align-items:center;gap:4px;}
/* Content */
.content{padding:20px;display:flex;flex-direction:column;gap:16px;flex:1;}
/* Cards */
.card{background:var(--surface);border-radius:var(--r-card);border:1px solid var(--fog);padding:20px;animation:fadeIn 0.35s ease both;}
.card-title{font-size:14px;font-weight:700;color:var(--ink);margin-bottom:14px;display:flex;align-items:center;gap:8px;}
/* Primary focus — event timeline */
.pf-grid{display:grid;grid-template-columns:1fr 320px;gap:16px;}
/* Timeline events */
.event-list{display:flex;flex-direction:column;gap:0;}
.event-item{display:flex;gap:12px;padding:10px 0;border-bottom:1px solid var(--fog);cursor:pointer;transition:background 0.1s;border-radius:6px;padding:10px 8px;}
.event-item:hover{background:var(--bg);}
.event-icon{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:14px;}
.ei-green{background:#f0fdf4;color:#16a34a;}
.ei-red{background:#fef2f2;color:#dc2626;}
.ei-amber{background:#fffbeb;color:#d97706;}
.ei-blue{background:#eff6ff;color:#2563eb;}
.ei-purple{background:#f5f3ff;color:var(--iris);}
.event-content{flex:1;}
.event-type{font-size:12.5px;font-weight:600;color:var(--ink);}
.event-meta{font-size:11px;color:var(--graphite);margin-top:1px;}
.event-time{font-size:11px;color:var(--driftwood);flex-shrink:0;margin-top:2px;}
/* Priority rail */
.pr-item{padding:10px 12px;border-radius:8px;border:1px solid var(--fog);margin-bottom:8px;cursor:pointer;transition:border-color 0.1s;}
.pr-item:hover{border-color:var(--iris);}
.pr-item-header{display:flex;align-items:flex-start;gap:8px;margin-bottom:4px;}
.pr-title{font-size:13px;font-weight:600;color:var(--ink);flex:1;}
.pr-meta{font-size:11px;color:var(--graphite);}
/* Stat cards row */
.stat-row{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;}
.stat-card{background:var(--surface);border:1px solid var(--fog);border-radius:var(--r-card);padding:16px;}
.stat-label{font-size:11px;color:var(--graphite);font-weight:500;margin-bottom:6px;}
.stat-value{font-size:26px;font-weight:700;color:var(--ink);letter-spacing:-0.5px;}
.stat-sub{font-size:11px;color:var(--graphite);margin-top:4px;}
/* Secondary widget strip */
.secondary-strip{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;}
/* Badges */
.badge{display:inline-flex;align-items:center;padding:2px 7px;border-radius:4px;font-size:11px;font-weight:600;}
.b-red{background:#fef2f2;color:#dc2626;}
.b-amber{background:#fffbeb;color:#d97706;}
.b-green{background:#f0fdf4;color:#16a34a;}
.b-blue{background:#eff6ff;color:#2563eb;}
.b-purple{background:#f5f3ff;color:var(--iris);}
.b-gray{background:var(--bg);color:var(--graphite);}
/* Table */
.data-table-wrap{overflow:auto;}
.data-table{width:100%;border-collapse:collapse;}
.data-table th{text-align:left;padding:8px 12px;font-size:11px;font-weight:600;color:var(--graphite);letter-spacing:0.05em;text-transform:uppercase;border-bottom:1px solid var(--fog);background:var(--bg);}
.data-table td{padding:10px 12px;font-size:13px;border-bottom:1px solid var(--fog);color:var(--ink);}
.data-table tr:last-child td{border-bottom:none;}
.data-table tr:hover td{background:var(--bg);cursor:pointer;}
/* Guide hub */
.guide-tabs{display:flex;gap:0;border-bottom:1px solid var(--fog);margin-bottom:16px;}
.g-tab{background:none;border:none;border-bottom:2px solid transparent;padding:10px 16px;font-size:13px;color:var(--graphite);cursor:pointer;font-family:inherit;font-weight:500;margin-bottom:-1px;transition:color 0.1s;}
.g-tab.active{color:var(--iris);border-bottom-color:var(--iris);font-weight:700;}
.guide-card{border:1px solid var(--fog);border-radius:12px;padding:16px;margin-bottom:10px;cursor:pointer;transition:border-color 0.1s;}
.guide-card:hover{border-color:var(--iris);}
.guide-card-header{display:flex;align-items:center;gap:10px;margin-bottom:6px;}
.guide-icon{width:32px;height:32px;border-radius:8px;background:var(--bg);display:flex;align-items:center;justify-content:center;font-size:14px;}
.guide-title{font-size:14px;font-weight:600;color:var(--ink);}
.guide-desc{font-size:12px;color:var(--graphite);line-height:1.5;}
.progress-bar-wrap{height:4px;background:var(--fog);border-radius:2px;margin-top:8px;}
.progress-bar-fill{height:100%;border-radius:2px;background:var(--iris);transition:width 0.5s;}
/* CMD-K overlay */
.cmdk-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:9000;display:flex;align-items:flex-start;justify-content:center;padding-top:15vh;}
.cmdk-modal{background:var(--surface);border-radius:12px;width:560px;max-height:60vh;overflow:hidden;box-shadow:rgba(0,0,0,0.2) 0 20px 48px;border:1px solid var(--fog);}
.cmdk-input-wrap{padding:12px 16px;border-bottom:1px solid var(--fog);display:flex;align-items:center;gap:10px;}
.cmdk-input{flex:1;border:none;outline:none;font-size:15px;font-family:inherit;color:var(--ink);background:transparent;}
.cmdk-input::placeholder{color:var(--driftwood);}
.cmdk-results{overflow-y:auto;max-height:calc(60vh - 64px);}
.cmdk-group-title{padding:8px 16px 4px;font-size:10px;font-weight:600;color:var(--driftwood);letter-spacing:0.07em;text-transform:uppercase;}
.cmdk-item{padding:8px 16px;display:flex;align-items:center;gap:10px;cursor:pointer;font-size:13px;color:var(--ink);}
.cmdk-item:hover{background:var(--bg);}
.cmdk-item i{font-size:16px;color:var(--graphite);width:20px;}
.cmdk-kbd{margin-left:auto;background:var(--bg);border:1px solid var(--fog);border-radius:4px;padding:1px 6px;font-size:10px;font-family:monospace;}
/* Modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.35);z-index:999;display:flex;align-items:center;justify-content:center;}
.modal-box{background:var(--surface);border-radius:var(--r-card);padding:28px;width:480px;max-height:80vh;overflow-y:auto;border:1px solid var(--fog);}
.modal-title{font-size:17px;font-weight:700;color:var(--ink);margin-bottom:4px;}
.modal-sub{font-size:12px;color:var(--graphite);margin-bottom:16px;}
/* Toast */
.toast{position:fixed;bottom:20px;right:20px;background:var(--aubergine);color:white;padding:10px 18px;border-radius:8px;font-size:13px;font-weight:500;z-index:9999;transform:translateY(60px);opacity:0;transition:all 0.25s;}
.toast.show{transform:translateY(0);opacity:1;}
/* User list */
.user-row{display:flex;align-items:center;gap:12px;padding:10px;border-radius:8px;cursor:pointer;border:1px solid transparent;}
.user-row:hover{background:var(--bg);border-color:var(--fog);}
.user-av-sm{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;flex-shrink:0;}
</style>

                      <div key={i} style={{ display: 'flex', alignItems: 'center', gap: 10, padding: '9px 0', borderBottom: i < 3 ? '1px solid var(--fog)' : 'none' }}>
                        <div style={{ width: 30, height: 17, background: r.enabled ? 'var(--iris)' : 'var(--fog)', borderRadius: 9, cursor: 'pointer', position: 'relative', flex: 'shrink: 0' }}
                          onClick={() => showToast(`${r.rule} 규칙 상태 변경`)}>
                          <div style={{ width: 13, height: 13, background: 'white', borderRadius: '50%', position: 'absolute', top: 2, left: r.enabled ? 15 : 2, transition: 'left 0.2s' }} />
                        </div>
                        <div style={{ flex: 1 }}>
                          <div style={{ fontSize: 13, fontWeight: 500, color: '#292827' }}>{r.rule}</div>
                          <div style={{ fontSize: 11, color: '#666' }}>{r.scope}</div>
                        </div>
                      </div>
                    ))}
                  </div>
                  <div className="card">
                    <div className="card-title">
                      <i className="ph ph-clock-clockwise" style={{ fontSize: 16 }}></i>
                      최근 감지 이력
                    </div>
                    {violations.map((v, i) => (
                      <div key={i} style={{ display: 'flex', gap: 8, padding: '8px 0', borderBottom: i < violations.length - 1 ? '1px solid var(--fog)' : 'none' }}>
                        {riskBadge(v.risk)}
                        <div style={{ flex: 1 }}>
                          <div style={{ fontSize: 12.5, fontWeight: 500, color: '#292827' }}>{v.title}</div>
                          <div style={{ fontSize: 11, color: '#666' }}>{v.time}</div>
                        </div>
                      </div>
                    ))}
                  </div>
                </div>
              </div>
            </>
          )}

          {/* ── SCREEN: 구독 관리 ── */}
          {nav === '구독 관리' && (
            <>
              <div className="topbar">
                {breadcrumb('구독 관리')}
                <div className="topbar-right">
                  <input
                    placeholder="이름 · 플랜 · 상태 검색..."
                    value={userSearch}
                    onChange={e => setUserSearch(e.target.value)}
                    style={{ border: '1px solid var(--fog)', borderRadius: 6, padding: '5px 10px', fontSize: 12, fontFamily: 'inherit', background: 'var(--bg)', color: 'var(--ink)', width: 200 }}
                  />
                  <button className="btn-cmdk" onClick={() => setCmdkOpen(true)}><span>⌘</span>K</button>
                  <button className="btn-dark" onClick={() => showToast('구독 목록 CSV 내보내기 중...')}>
                    <i className="ph ph-export"></i> 내보내기
                  </button>
                </div>
              </div>

              <div className="content">
                <div className="stat-row">
                  {[
                    { label: '전체 구독자', val: `${users.length}명`, sub: '등록된 사용자', col: '#292827' },
                    { label: '활성 구독', val: `${users.filter(u => u.status === '활성').length}명`, sub: '현재 구독 중', col: '#16a34a' },
                    { label: '만료', val: `${users.filter(u => u.status === '만료').length}명`, sub: '재구독 유도 필요', col: '#d97706' },
                    { label: '일시정지', val: `${users.filter(u => u.status === '일시정지').length}명`, sub: '결제 수단 확인 필요', col: '#dc2626' },
                  ].map((s, i) => (
                    <div key={i} className="stat-card">
                      <div className="stat-label">{s.label}</div>
                      <div className="stat-value" style={{ color: s.col }}>{s.val}</div>
                      <div className="stat-sub" style={{ color: s.col }}>{s.sub}</div>
                    </div>
                  ))}
                </div>

                <div style={{ display: 'grid', gridTemplateColumns: selectedUser ? '1fr 340px' : '1fr', gap: 16 }}>
                  <div className="card">
                    <div className="card-title">
                      <i className="ph ph-users-three" style={{ fontSize: 16 }}></i>
                      구독자 목록
                    </div>
                    {filteredUsers.map(u => (
                      <div key={u.id} className="user-row" onClick={() => setSelectedUser(u)}>
                        <div className="user-av-sm" style={{ background: u.color, color: 'white' }}>
                          {u.name[0]}
                        </div>
                        <div style={{ flex: 1 }}>
                          <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
                            <span style={{ fontSize: 13.5, fontWeight: 600, color: '#292827' }}>{u.name}</span>
                            {statusBadge(u.status)}
                          </div>
                          <div style={{ fontSize: 11, color: '#666', marginTop: 1 }}>{u.email} · {u.plan}</div>
                        </div>
                        <div style={{ fontSize: 11, color: '#666', textAlign: 'right' }}>
                          <div>만료: {u.expiry}</div>
                          <div style={{ color: '#dcd7d3' }}>{u.id}</div>
                        </div>
                        <i className="ph ph-caret-right" style={{ fontSize: 14, color: '#dcd7d3' }}></i>
                      </div>
                    ))}
                  </div>

                  {selectedUser && (
                    <div className="card">
                      <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: 16 }}>
                        <div className="card-title" style={{ margin: 0 }}>
                          <div className="user-av-sm" style={{ background: selectedUser.color, color: 'white' }}>
                            {selectedUser.name[0]}
                          </div>
                          {selectedUser.name}
                        </div>
                        <button onClick={() => setSelectedUser(null)} style={{ background: 'none', border: 'none', cursor: 'pointer' }}>
                          <i className="ph ph-x" style={{ fontSize: 16, color: '#666' }}></i>
                        </button>
                      </div>
                      <div style={{ display: 'flex', flexDirection: 'column', gap: 8, marginBottom: 16 }}>
                        {[
                          { label: 'ID', val: selectedUser.id },
                          { label: '이메일', val: selectedUser.email },
                          { label: '구독 플랜', val: selectedUser.plan },
                          { label: '구독 상태', val: null, badge: selectedUser.status },
                          { label: '구독 시작', val: selectedUser.since },
                          { label: '구독 만료', val: selectedUser.expiry },
                        ].map((row, i) => (
                          <div key={i} style={{ display: 'flex', justifyContent: 'space-between', padding: '8px 0', borderBottom: '1px solid var(--fog)' }}>
                            <span style={{ fontSize: 12, color: '#666' }}>{row.label}</span>
                            {row.badge ? statusBadge(row.badge) : <span style={{ fontSize: 12.5, fontWeight: 500, color: '#292827' }}>{row.val}</span>}
                          </div>
                        ))}
                      </div>
                      <div style={{ fontSize: 12.5, fontWeight: 700, color: '#292827', marginBottom: 8 }}>트랜잭션 이력</div>
                      {['TXN-2841 — 월간 구독 갱신 · 성공', 'TXN-2805 — 월간 구독 갱신 · 성공', 'TXN-2764 — 구독 최초 생성 · 성공'].map((tx, i) => (
                        <div key={i} style={{ fontSize: 12, color: '#666', padding: '6px 0', borderBottom: '1px solid var(--fog)', display: 'flex', gap: 6 }}>
                          <span className="badge b-green" style={{ fontSize: 10 }}>성공</span>
                          {tx}
                        </div>
                      ))}
                      <div style={{ display: 'flex', gap: 8, marginTop: 16 }}>
                        <button className="btn-ghost" style={{ flex: 1, justifyContent: 'center' }} onClick={() => showToast('구독 상태를 수동으로 갱신합니다.')}>
                          <i className="ph ph-arrows-clockwise"></i> 갱신
                        </button>
                        <button className="btn-dark" style={{ flex: 1, justifyContent: 'center' }} onClick={() => showToast('IAP 구독 관리 화면으로 안내합니다.')}>
                          <i className="ph ph-credit-card"></i> IAP 관리
                        </button>
                      </div>
                    </div>
                  )}
                </div>
              </div>
            </>
          )}

          {/* ── SCREEN: 심사 가이드 ── */}
          {nav === '심사 가이드' && (
            <>
              <div className="topbar">
                {breadcrumb('심사 가이드')}
                <div className="topbar-right">
                  <button className="btn-cmdk" onClick={() => setCmdkOpen(true)}><span>⌘</span>K</button>
                  <button className="btn-dark" onClick={() => showToast('심사 준비 상태 리포트를 생성합니다.')}>
                    <i className="ph ph-file-pdf"></i> 심사 리포트
                  </button>
                </div>
              </div>

              <div className="content">
                <div className="stat-row">
                  {[
                    { label: '전체 준비율', val: '35%', sub: '심사 제출까지 65% 남음', col: '#d97706' },
                    { label: '준비 단계', val: `${Object.values(checkedGuides).filter(Boolean).length}/${guideSections[guideTab]?.length || 0}`, sub: '항목 완료', col: '#292827' },
                    { label: '예상 심사 기간', val: '1~3일', sub: '제출 후 Apple 리뷰', col: '#7b7b7b' },
                    { label: '이전 리젝 횟수', val: '1회', sub: '현재 공고 기준', col: '#dc2626' },
                  ].map((s, i) => (
                    <div key={i} className="stat-card">
                      <div className="stat-label">{s.label}</div>
                      <div className="stat-value" style={{ color: s.col }}>{s.val}</div>
                      <div className="stat-sub" style={{ color: s.col }}>{s.sub}</div>
                    </div>
                  ))}
                </div>

                <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 16 }}>
                  <div className="card">
                    <div className="card-title">
                      <i className="ph ph-checklist" style={{ fontSize: 16 }}></i>
                      심사 준비 체크리스트
                    </div>
                    <div className="guide-tabs">
                      {Object.keys(guideSections).map(t => (
                        <button key={t} className={`g-tab ${guideTab === t ? 'active' : ''}`} onClick={() => setGuideTab(t)}>{t}</button>
                      ))}
                    </div>
                    {guideSections[guideTab].map((g, i) => (
                      <div key={i} className="guide-card" onClick={() => { setCheckedGuides(c => ({ ...c, [`${guideTab}-${i}`]: !c[`${guideTab}-${i}`] })); showToast(checkedGuides[`${guideTab}-${i}`] ? '체크 해제' : '완료로 표시'); }}>
                        <div className="guide-card-header">
                          <div className="guide-icon" style={{ background: checkedGuides[`${guideTab}-${i}`] ? '#f0fdf4' : 'var(--bg)' }}>
                            {checkedGuides[`${guideTab}-${i}`]
                              ? <i className="ph ph-check-circle" style={{ fontSize: 16, color: '#16a34a' }}></i>
                              : <i className="ph ph-circle" style={{ fontSize: 16, color: '#dcd7d3' }}></i>}
                          </div>
                          <div className="guide-title" style={{ textDecoration: checkedGuides[`${guideTab}-${i}`] ? 'line-through' : 'none', color: checkedGuides[`${guideTab}-${i}`] ? '#dcd7d3' : '#292827' }}>{g.title}</div>
                        </div>
                        <div className="guide-desc">{g.desc}</div>
                        <div className="progress-bar-wrap">
                          <div className="progress-bar-fill" style={{ width: `${g.pct}%` }} />
                        </div>
                      </div>
                    ))}
                  </div>

                  <div style={{ display: 'flex', flexDirection: 'column', gap: 12 }}>
                    <div className="card">
                      <div className="card-title">
                        <i className="ph ph-warning" style={{ fontSize: 16, color: '#dc2626' }}></i>
                        리젝 사유 요약
                      </div>
                      {[
                        { code: '3.1.1', title: '인앱 구입 미탑재', detail: '유료 디지털 콘텐츠를 IAP 없이 접근 가능' },
                        { code: '3.1.3', title: '외부 결제 유도', detail: '앱 내 외부 결제 URL 연결 버튼 잔존' },
                      ].map((r, i) => (
                        <div key={i} style={{ padding: '12px', background: '#fef2f2', borderRadius: 10, marginBottom: 8, border: '1px solid #fecaca' }}>
                          <div style={{ display: 'flex', gap: 8, alignItems: 'center', marginBottom: 4 }}>
                            <span className="badge b-red">가이드라인 {r.code}</span>
                            <span style={{ fontSize: 13, fontWeight: 600, color: '#292827' }}>{r.title}</span>
                          </div>
                          <div style={{ fontSize: 12, color: '#666' }}>{r.detail}</div>
                        </div>
                      ))}
                    </div>
                    <div className="card">
                      <div className="card-title">
                        <i className="ph ph-book-bookmark" style={{ fontSize: 16 }}></i>
                        소명 문서 가이드
                      </div>
                      {['App Review Information 섹션 작성법', '가이드라인 3.1.3(b) 적용 근거 문서', '다중 플랫폼 서비스 증빙 방법', '재심사 시 변경 사항 노트 예시'].map((item, i) => (
                        <div key={i} style={{ display: 'flex', gap: 8, alignItems: 'center', padding: '8px 0', borderBottom: i < 3 ? '1px solid var(--fog)' : 'none', cursor: 'pointer' }}
                          onClick={() => showToast(`${item} 문서를 엽니다.`)}>
                          <i className="ph ph-file-text" style={{ fontSize: 14, color: 'var(--iris)' }}></i>
                          <span style={{ fontSize: 13, color: '#292827' }}>{item}</span>
                          <i className="ph ph-caret-right" style={{ fontSize: 12, color: '#dcd7d3', marginLeft: 'auto' }}></i>
                        </div>
                      ))}
                    </div>
                  </div>
                </div>
              </div>
            </>
          )}
        </main>
      </div>

      {/* ── CMD-K ── */}
      {cmdkOpen && (
        <div className="cmdk-overlay" onClick={() => setCmdkOpen(false)}>
          <div className="cmdk-modal" onClick={e => e.stopPropagation()}>
            <div className="cmdk-input-wrap">
              <i className="ph ph-magnifying-glass" style={{ fontSize: 18, color: '#666' }}></i>
              <input className="cmdk-input" placeholder="명령 또는 검색..." value={cmdkQuery} onChange={e => setCmdkQuery(e.target.value)} autoFocus />
              <span className="kbd">ESC</span>
            </div>
            <div className="cmdk-results">
              {cmdItems.map((group, gi) => (
                <div key={gi}>
                  <div className="cmdk-group-title">{group.group}</div>
                  {group.items.map((item, ii) => (
                    <div key={ii} className="cmdk-item" onClick={() => { setCmdkOpen(false); showToast(`${item.label}`); }}>
                      <i className={`ph ${item.icon}`}></i>
                      <span>{item.label}</span>
                      <span className="cmdk-kbd">{item.kbd}</span>
                    </div>
                  ))}
                </div>
              ))}
            </div>
          </div>
        </div>
      )}

      {/* ── Modal ── */}
      {modal && (
        <div className="modal-overlay" onClick={() => setModal(null)}>
          <div className="modal-box" onClick={e => e.stopPropagation()}>
            <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: 4 }}>
              <div>
                <div className="modal-title">{modal.title}</div>
                <div className="modal-sub">{modal.sub}</div>
              </div>
              <button onClick={() => setModal(null)} style={{ background: 'none', border: 'none', cursor: 'pointer' }}>
                <i className="ph ph-x" style={{ fontSize: 16, color: '#666' }}></i>
              </button>
            </div>
            {modal.cat && <div style={{ marginBottom: 14 }}>{modal.cat === 'HIGH' ? <span className="badge b-red">HIGH</span> : modal.cat === 'MED' ? <span className="badge b-amber">MED</span> : <span className="badge b-green">{modal.cat}</span>}</div>}
            <div style={{ fontSize: 13, fontWeight: 700, color: '#292827', marginBottom: 10 }}>대응 절차</div>
            {modal.steps.map((s, i) => (
              <div key={i} style={{ display: 'flex', gap: 10, padding: '10px 12px', background: 'var(--bg)', borderRadius: 8, marginBottom: 8 }}>
                <div style={{ width: 22, height: 22, borderRadius: '50%', background: 'var(--aubergine)', color: 'white', display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 11, fontWeight: 700, flexShrink: 0 }}>{i + 1}</div>
                <div style={{ fontSize: 13, color: '#292827', lineHeight: 1.5 }}>{s}</div>
              </div>
            ))}
            <button className="btn-dark" style={{ width: '100%', justifyContent: 'center', marginTop: 12 }} onClick={() => { setModal(null); showToast('대응 완료로 표시되었습니다.'); }}>
              <i className="ph ph-check"></i> 대응 완료
            </button>
          </div>
        </div>
      )}

      <div className={`toast ${toast.show ? 'show' : ''}`}>{toast.msg}</div>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
