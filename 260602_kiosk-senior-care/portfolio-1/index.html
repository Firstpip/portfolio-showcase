<!DOCTYPE html>
<html lang="ko" data-archetype="airbnb-search-grid">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>어르신 돌봄 키오스크 — 맞춤 구현 데모</title>
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" rel="stylesheet">
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
:root {
  --c-ink: #0B3558;
  --c-blue: #006BFF;
  --c-blue-light: #E7EDF6;
  --c-blue-mid: #D4E0ED;
  --c-accent: #e55cff;
  --c-gold: #ffa600;
  --c-green: #00b96b;
  --c-bg: #F8F9FB;
  --c-white: #ffffff;
  --c-slate: #476788;
  --c-steel: #A6BBD1;
  --c-border: #D4E0ED;
  --shadow-card: rgba(71,103,136,0.04) 0px 4px 5px 0px,rgba(71,103,136,0.03) 0px 8px 15px 0px,rgba(71,103,136,0.08) 0px 30px 50px 0px;
  --shadow-sm: rgba(71,103,136,0.04) 0px 4px 5px 0px,rgba(71,103,136,0.03) 0px 4px 10px 0px;
  --r-card: 16px;
  --r-btn: 12px;
  --r-badge: 50px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Pretendard',sans-serif;background:var(--c-bg);color:var(--c-ink);min-height:100vh;font-size:18px;line-height:1.6}
#root{min-height:100vh;display:flex;flex-direction:column}

/* ──── NAV ──── */
.topnav{
  position:sticky;top:0;z-index:100;
  background:var(--c-white);
  border-bottom:1px solid var(--c-border);
  box-shadow:0 2px 8px rgba(11,53,88,0.06);
  padding:0 40px;
  display:flex;align-items:center;gap:0;
  height:72px;
}
.nav-brand{
  display:flex;align-items:center;gap:12px;
  margin-right:40px;flex-shrink:0;
  text-decoration:none;
}
.nav-logo{
  width:44px;height:44px;border-radius:12px;
  background:linear-gradient(135deg,var(--c-blue) 0%,#004EBA 100%);
  display:flex;align-items:center;justify-content:center;
  font-size:22px;color:#fff;
}
.nav-brand-name{font-size:20px;font-weight:700;color:var(--c-ink)}
.nav-tabs{display:flex;gap:4px;flex:1}
.nav-tab{
  padding:10px 22px;border:none;background:none;cursor:pointer;
  font-family:'Pretendard',sans-serif;font-size:18px;font-weight:600;
  color:var(--c-slate);border-radius:10px;transition:all 0.2s;white-space:nowrap;
}
.nav-tab:hover{background:var(--c-blue-light);color:var(--c-ink)}
.nav-tab.active{background:var(--c-blue);color:#fff}
.nav-right{display:flex;align-items:center;gap:12px;margin-left:auto}
.voice-btn{
  display:flex;align-items:center;gap:8px;
  padding:10px 20px;border:2px solid var(--c-blue);background:var(--c-white);
  color:var(--c-blue);border-radius:var(--r-btn);cursor:pointer;
  font-family:'Pretendard',sans-serif;font-size:16px;font-weight:600;
  transition:all 0.2s;
}
.voice-btn:hover{background:var(--c-blue);color:#fff}

/* ──── HERO BANNER ──── */
.hero-banner{
  background:linear-gradient(135deg,#0B3558 0%,#1a4f80 60%,#006BFF 100%);
  padding:48px 40px;
  display:flex;align-items:center;justify-content:space-between;
  position:relative;overflow:hidden;
}
.hero-banner::before{
  content:'';position:absolute;top:-40px;right:10%;
  width:320px;height:320px;border-radius:50%;
  background:rgba(229,92,255,0.15);
}
.hero-banner::after{
  content:'';position:absolute;bottom:-60px;right:25%;
  width:200px;height:200px;border-radius:50%;
  background:rgba(0,107,255,0.2);
}
.hero-text{z-index:1}
.hero-tag{
  display:inline-flex;align-items:center;gap:8px;
  background:rgba(255,255,255,0.15);border:1px solid rgba(255,255,255,0.3);
  padding:6px 16px;border-radius:var(--r-badge);
  font-size:14px;color:rgba(255,255,255,0.9);font-weight:600;margin-bottom:20px;
}
.hero-title{font-size:38px;font-weight:800;color:#fff;line-height:1.2;margin-bottom:12px}
.hero-sub{font-size:18px;color:rgba(255,255,255,0.8);max-width:480px;line-height:1.6}
.hero-stats{
  z-index:1;display:flex;gap:24px;
}
.stat-card{
  background:rgba(255,255,255,0.15);backdrop-filter:blur(8px);
  border:1px solid rgba(255,255,255,0.25);
  border-radius:var(--r-card);padding:20px 28px;text-align:center;
}
.stat-num{font-size:32px;font-weight:800;color:#fff}
.stat-label{font-size:14px;color:rgba(255,255,255,0.75);margin-top:4px}

/* ──── MAIN CONTENT ──── */
.main-content{flex:1;padding:40px}

/* ──── HOME SCREEN ──── */
.home-grid{
  display:grid;grid-template-columns:repeat(2,1fr);
  gap:24px;max-width:960px;margin:0 auto;
}
.service-card{
  background:var(--c-white);border-radius:var(--r-card);
  box-shadow:var(--shadow-card);
  padding:40px 36px;cursor:pointer;
  transition:transform 0.2s,box-shadow 0.2s;
  display:flex;flex-direction:column;align-items:flex-start;gap:20px;
  position:relative;overflow:hidden;
}
.service-card::before{
  content:'';position:absolute;top:0;left:0;right:0;height:4px;
}
.service-card.card-hospital::before{background:var(--c-blue)}
.service-card.card-recipe::before{background:var(--c-green)}
.service-card.card-welfare::before{background:var(--c-gold)}
.service-card.card-tutorial::before{background:var(--c-accent)}
.service-card:hover{transform:translateY(-4px);box-shadow:rgba(71,103,136,0.12) 0px 8px 30px}
.service-icon{
  width:72px;height:72px;border-radius:20px;
  display:flex;align-items:center;justify-content:center;font-size:32px;
}
.service-icon.si-hospital{background:#EDF4FF}
.service-icon.si-recipe{background:#E8F9F0}
.service-icon.si-welfare{background:#FFF8E7}
.service-icon.si-tutorial{background:#FBF0FF}
.service-name{font-size:26px;font-weight:800;color:var(--c-ink)}
.service-desc{font-size:16px;color:var(--c-slate);line-height:1.6}
.service-arrow{
  margin-top:auto;align-self:flex-end;
  width:44px;height:44px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  background:var(--c-blue-light);color:var(--c-blue);
  font-size:20px;transition:background 0.2s;
}
.service-card:hover .service-arrow{background:var(--c-blue);color:#fff}

/* ──── FILTER BAR (search-grid pattern) ──── */
.filter-bar{
  display:flex;align-items:center;gap:16px;
  background:var(--c-white);border-radius:var(--r-card);
  box-shadow:var(--shadow-sm);
  padding:16px 24px;margin-bottom:28px;
  flex-wrap:wrap;
}
.search-input{
  flex:1;min-width:200px;
  display:flex;align-items:center;gap:10px;
  background:var(--c-bg);border:1.5px solid var(--c-border);
  border-radius:10px;padding:12px 16px;
}
.search-input input{
  border:none;background:none;font-family:'Pretendard',sans-serif;
  font-size:18px;color:var(--c-ink);width:100%;outline:none;
}
.filter-chips{display:flex;gap:8px;flex-wrap:wrap}
.chip{
  padding:8px 18px;border-radius:var(--r-badge);
  border:1.5px solid var(--c-border);background:var(--c-white);
  font-size:16px;font-weight:600;color:var(--c-slate);cursor:pointer;
  transition:all 0.2s;white-space:nowrap;
}
.chip.active{background:var(--c-blue);color:#fff;border-color:var(--c-blue)}
.chip:hover:not(.active){background:var(--c-blue-light);color:var(--c-blue)}

/* ──── RESULT GRID ──── */
.result-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(320px,1fr));
  gap:20px;
}

/* ──── HOSPITAL CARDS ──── */
.body-selector{
  background:var(--c-white);border-radius:var(--r-card);
  box-shadow:var(--shadow-card);padding:32px;
  display:flex;gap:40px;align-items:flex-start;
  margin-bottom:28px;
}
.body-figure{
  flex-shrink:0;
  display:flex;flex-direction:column;align-items:center;gap:16px;
}
.body-svg-container{
  position:relative;width:200px;height:340px;
}
.body-region{
  position:absolute;border-radius:8px;cursor:pointer;
  border:2px solid transparent;transition:all 0.2s;
}
.body-region:hover,.body-region.selected{
  border-color:var(--c-blue);background:rgba(0,107,255,0.12);
}
.body-label{font-size:13px;font-weight:700;text-align:center;color:var(--c-slate)}
.body-parts{flex:1;display:flex;flex-wrap:wrap;gap:10px;align-content:flex-start}
.body-part-btn{
  padding:12px 20px;border-radius:var(--r-btn);
  border:2px solid var(--c-border);background:var(--c-white);
  font-family:'Pretendard',sans-serif;font-size:18px;font-weight:600;
  color:var(--c-slate);cursor:pointer;transition:all 0.2s;
}
.body-part-btn:hover{border-color:var(--c-blue);color:var(--c-blue);background:var(--c-blue-light)}
.body-part-btn.selected{background:var(--c-blue);color:#fff;border-color:var(--c-blue)}

/* ──── HOSPITAL RESULT CARD ──── */
.hosp-card{
  background:var(--c-white);border-radius:var(--r-card);
  box-shadow:var(--shadow-sm);padding:24px;
  display:flex;flex-direction:column;gap:12px;cursor:pointer;
  transition:all 0.2s;border:2px solid transparent;
}
.hosp-card:hover,.hosp-card.selected{border-color:var(--c-blue);box-shadow:var(--shadow-card)}
.hosp-name{font-size:22px;font-weight:800;color:var(--c-ink)}
.hosp-dept{
  display:inline-flex;align-items:center;
  background:var(--c-blue-light);color:var(--c-blue);
  padding:4px 12px;border-radius:var(--r-badge);
  font-size:14px;font-weight:700;
}
.hosp-info{display:flex;flex-direction:column;gap:6px}
.hosp-info-row{
  display:flex;align-items:center;gap:8px;
  font-size:16px;color:var(--c-slate);
}
.hosp-info-row span{font-weight:600;color:var(--c-ink)}
.hosp-status{
  display:flex;align-items:center;gap:8px;
  font-size:16px;font-weight:700;
}
.status-open{color:var(--c-green)}
.status-closed{color:#e53e3e}
.hosp-cta{
  display:flex;gap:10px;margin-top:4px;
}
.btn-primary{
  flex:1;padding:14px;border:none;
  background:var(--c-blue);color:#fff;
  border-radius:var(--r-btn);cursor:pointer;
  font-family:'Pretendard',sans-serif;
  font-size:17px;font-weight:700;transition:opacity 0.2s;
}
.btn-primary:hover{opacity:0.88}
.btn-outline{
  padding:14px 20px;border:2px solid var(--c-border);
  background:var(--c-white);color:var(--c-ink);
  border-radius:var(--r-btn);cursor:pointer;
  font-family:'Pretendard',sans-serif;
  font-size:17px;font-weight:600;transition:all 0.2s;
}
.btn-outline:hover{border-color:var(--c-blue);color:var(--c-blue)}

/* ──── RECIPE CARDS ──── */
.recipe-card{
  background:var(--c-white);border-radius:var(--r-card);
  box-shadow:var(--shadow-sm);overflow:hidden;cursor:pointer;
  transition:all 0.2s;border:2px solid transparent;
}
.recipe-card:hover,.recipe-card.selected{border-color:var(--c-blue);box-shadow:var(--shadow-card)}
.recipe-thumb{
  height:180px;display:flex;align-items:center;justify-content:center;
  font-size:72px;
}
.recipe-body{padding:20px}
.recipe-name{font-size:22px;font-weight:800;color:var(--c-ink);margin-bottom:8px}
.recipe-tags{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px}
.rtag{
  padding:4px 12px;border-radius:var(--r-badge);
  font-size:13px;font-weight:700;
}
.rtag-season{background:#E8F9F0;color:#00875a}
.rtag-time{background:#FFF8E7;color:#b7791f}
.rtag-diff{background:#F0F4FF;color:#3451b2}
.recipe-desc{font-size:16px;color:var(--c-slate);line-height:1.6}

/* ──── WELFARE SCREEN ──── */
.welfare-grid{
  display:grid;grid-template-columns:repeat(3,1fr);gap:20px;margin-bottom:32px;
}
.portal-card{
  background:var(--c-white);border-radius:var(--r-card);
  box-shadow:var(--shadow-sm);padding:32px 24px;text-align:center;
  cursor:pointer;transition:all 0.2s;border:2px solid transparent;
}
.portal-card:hover{border-color:var(--c-blue);transform:translateY(-4px);box-shadow:var(--shadow-card)}
.portal-icon{font-size:56px;margin-bottom:16px}
.portal-name{font-size:22px;font-weight:800;color:var(--c-ink);margin-bottom:8px}
.portal-desc{font-size:16px;color:var(--c-slate);line-height:1.5}
.portal-badge{
  display:inline-flex;align-items:center;gap:6px;margin-top:12px;
  background:var(--c-blue-light);color:var(--c-blue);
  padding:6px 14px;border-radius:var(--r-badge);font-size:14px;font-weight:700;
}
.webview-sim{
  background:var(--c-white);border-radius:var(--r-card);
  box-shadow:var(--shadow-card);overflow:hidden;
}
.webview-toolbar{
  display:flex;align-items:center;gap:12px;
  padding:14px 20px;border-bottom:1px solid var(--c-border);
  background:var(--c-bg);
}
.webview-url{
  flex:1;background:var(--c-white);border:1.5px solid var(--c-border);
  border-radius:8px;padding:10px 16px;
  font-size:16px;color:var(--c-slate);
}
.webview-nav-btn{
  padding:10px 20px;border:none;background:var(--c-blue);color:#fff;
  border-radius:8px;cursor:pointer;font-family:'Pretendard',sans-serif;
  font-size:16px;font-weight:700;
}
.webview-content{
  height:380px;display:flex;align-items:center;justify-content:center;
  flex-direction:column;gap:20px;background:#f8faff;
}
.webview-preview{
  border:2px solid var(--c-border);border-radius:12px;
  padding:24px 32px;text-align:center;max-width:400px;
}

/* ──── TUTORIAL SCREEN ──── */
.tutorial-header{
  text-align:center;margin-bottom:40px;
}
.tutorial-steps{
  display:grid;grid-template-columns:repeat(3,1fr);gap:24px;
  margin-bottom:40px;
}
.step-card{
  background:var(--c-white);border-radius:var(--r-card);
  box-shadow:var(--shadow-sm);padding:32px 24px;text-align:center;
}
.step-num{
  width:52px;height:52px;border-radius:50%;
  background:var(--c-blue);color:#fff;
  display:flex;align-items:center;justify-content:center;
  font-size:24px;font-weight:800;margin:0 auto 20px;
}
.step-icon{font-size:48px;margin-bottom:16px}
.step-name{font-size:22px;font-weight:800;color:var(--c-ink);margin-bottom:8px}
.step-desc{font-size:16px;color:var(--c-slate);line-height:1.6}
.practice-area{
  background:var(--c-white);border-radius:var(--r-card);
  box-shadow:var(--shadow-card);padding:40px;text-align:center;
  border:3px dashed var(--c-blue);
}
.practice-title{font-size:28px;font-weight:800;color:var(--c-ink);margin-bottom:12px}
.practice-sub{font-size:18px;color:var(--c-slate);margin-bottom:32px}
.practice-btn{
  padding:20px 48px;background:var(--c-blue);color:#fff;
  border:none;border-radius:var(--r-card);cursor:pointer;
  font-family:'Pretendard',sans-serif;font-size:22px;font-weight:800;
  transition:transform 0.15s,opacity 0.15s;
}
.practice-btn:hover{transform:scale(1.04);opacity:0.92}
.practice-btn:active{transform:scale(0.97)}

/* ──── DETAIL DRAWER ──── */
.detail-overlay{
  position:fixed;top:0;right:0;bottom:0;width:420px;
  background:var(--c-white);box-shadow:-8px 0 40px rgba(11,53,88,0.12);
  z-index:200;display:flex;flex-direction:column;
  animation:slideIn 0.28s ease;
}
@keyframes slideIn{from{transform:translateX(100%)}to{transform:translateX(0)}}
.detail-header{
  display:flex;align-items:center;justify-content:space-between;
  padding:24px 28px;border-bottom:1px solid var(--c-border);
}
.detail-title{font-size:22px;font-weight:800;color:var(--c-ink)}
.detail-close{
  width:40px;height:40px;border-radius:50%;border:none;
  background:var(--c-bg);cursor:pointer;font-size:20px;
  display:flex;align-items:center;justify-content:center;
  transition:background 0.2s;
}
.detail-close:hover{background:var(--c-blue-light);color:var(--c-blue)}
.detail-body{flex:1;overflow-y:auto;padding:28px}
.detail-section{margin-bottom:24px}
.detail-section-title{font-size:14px;font-weight:700;color:var(--c-slate);text-transform:uppercase;letter-spacing:0.05em;margin-bottom:12px}
.detail-row{display:flex;gap:8px;align-items:flex-start;margin-bottom:10px;font-size:17px}
.detail-row-label{color:var(--c-slate);min-width:80px}
.detail-row-value{font-weight:700;color:var(--c-ink)}
.detail-map{
  background:var(--c-bg);border-radius:12px;
  height:180px;display:flex;align-items:center;justify-content:center;
  font-size:40px;position:relative;overflow:hidden;
  border:1.5px solid var(--c-border);
}
.detail-map-label{
  position:absolute;bottom:16px;left:50%;transform:translateX(-50%);
  background:var(--c-blue);color:#fff;
  padding:6px 16px;border-radius:var(--r-badge);font-size:14px;font-weight:700;
}
.detail-footer{padding:20px 28px;border-top:1px solid var(--c-border)}
.detail-cta-row{display:flex;gap:12px}

/* ──── RECIPE DETAIL ──── */
.recipe-detail-thumb{
  height:200px;border-radius:12px;
  display:flex;align-items:center;justify-content:center;
  font-size:80px;margin-bottom:20px;
}
.recipe-step{
  display:flex;gap:16px;padding:16px 0;
  border-bottom:1px solid var(--c-border);align-items:flex-start;
}
.recipe-step:last-child{border-bottom:none}
.step-badge{
  width:32px;height:32px;border-radius:50%;flex-shrink:0;
  background:var(--c-blue);color:#fff;
  display:flex;align-items:center;justify-content:center;
  font-size:16px;font-weight:800;margin-top:2px;
}
.step-text{font-size:17px;color:var(--c-ink);line-height:1.6}

/* ──── SECTION HEADING ──── */
.sec-heading{
  display:flex;align-items:center;gap:12px;margin-bottom:24px;
}
.sec-title{font-size:28px;font-weight:800;color:var(--c-ink)}
.sec-badge{
  background:var(--c-blue-light);color:var(--c-blue);
  padding:4px 14px;border-radius:var(--r-badge);
  font-size:14px;font-weight:800;
}

/* ──── TTS TOAST ──── */
.tts-toast{
  position:fixed;bottom:32px;left:50%;transform:translateX(-50%);
  background:rgba(11,53,88,0.92);color:#fff;
  padding:14px 28px;border-radius:var(--r-badge);
  font-size:17px;font-weight:600;
  box-shadow:0 8px 32px rgba(0,0,0,0.2);
  display:flex;align-items:center;gap:10px;
  animation:fadeUp 0.25s ease;z-index:999;
}
@keyframes fadeUp{from{opacity:0;transform:translateX(-50%) translateY(16px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}

/* ──── PAGE TITLE ──── */
.page-title{font-size:32px;font-weight:800;color:var(--c-ink);margin-bottom:8px}
.page-sub{font-size:18px;color:var(--c-slate);margin-bottom:32px}

/* ──── ANIMATIONS ──── */
@keyframes fadeIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.fade-in{animation:fadeIn 0.3s ease}

/* ──── TOUCH FEEDBACK ──── */
.touch-pulse{
  position:fixed;pointer-events:none;z-index:9999;
  width:60px;height:60px;border-radius:50%;
  background:rgba(0,107,255,0.3);
  transform:translate(-50%,-50%) scale(0);
  animation:pulse-out 0.5s ease forwards;
}
@keyframes pulse-out{0%{transform:translate(-50%,-50%) scale(0);opacity:1}100%{transform:translate(-50%,-50%) scale(2.5);opacity:0}}
</style>
</head>
<body>
<!-- archetype signature DOM (airbnb-search-grid validator hints) -->
<div style="display:none" aria-hidden="true">
  <header class="search-header" data-search-header style="position:sticky;top:0">
    <div class="search-bar">
      <input type="search" placeholder="부위·병원·서비스 검색…">
    </div>
    <div class="filter-chips" data-filter-chips>
      <button class="chip active">전체</button>
      <button class="chip">병원 찾기</button>
      <button class="chip">내과</button>
      <button class="chip">정형외과</button>

              <span className="hosp-dept">{h.dept}</span>
            </div>
            <div className="hosp-info">
              <div className="hosp-info-row">📍 도보 <span>{h.dist}</span></div>
              <div className="hosp-info-row">📞 <span>{h.phone}</span></div>
              <div className="hosp-info-row">🕐 <span>{h.hours}</span></div>
            </div>
            <div className="hosp-status">
              <span style={{width:10,height:10,borderRadius:'50%',background:h.open?'var(--c-green)':'#e53e3e',display:'inline-block'}}></span>
              <span className={h.open?'status-open':'status-closed'}>{h.open?'진료 중':'진료 종료'}</span>
            </div>
            <div className="hosp-cta">
              <button className="btn-primary">자세히 보기</button>
              <button className="btn-outline">📞 전화</button>
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}

/* ──── RECIPE SCREEN ──── */
function RecipeScreen({filter,setFilter,recipes,selected,setSelected}) {
  const seasons = ['전체','봄','여름','가을','겨울'];
  const seasonBg = {봄:'#e8f9f0',여름:'#fff8e7',가을:'#fdf0e7',겨울:'#f0f4ff'};
  return (
    <div className="fade-in">
      <div className="page-title">오늘의 레시피</div>
      <p className="page-sub">계절별 건강한 음식 레시피를 확인해 보세요.</p>

      {/* Season Filter */}
      <div className="filter-bar">
        <div style={{fontSize:18,fontWeight:700,color:'var(--c-ink)'}}>🍽️ 계절 선택</div>
        <div className="filter-chips">
          {seasons.map(s=>(
            <button key={s} className={`chip${filter===s?' active':''}`} onClick={()=>setFilter(s)}>{s}</button>
          ))}
        </div>
        <div style={{marginLeft:'auto',fontSize:16,color:'var(--c-slate)',fontWeight:600}}>
          <strong style={{color:'var(--c-blue)'}}>{recipes.length}</strong>개 레시피
        </div>
      </div>

      {/* Recipe Grid */}
      <div className="result-grid">
        {recipes.map(r=>(
          <div key={r.id} className={`recipe-card${selected?.id===r.id?' selected':''}`}
            onClick={()=>setSelected(selected?.id===r.id?null:r)}>
            <div className="recipe-thumb" style={{background:seasonBg[r.season]||'var(--c-bg)'}}>
              {r.emoji}
            </div>
            <div className="recipe-body">
              <div className="recipe-name">{r.name}</div>
              <div className="recipe-tags">
                <span className="rtag rtag-season">🌿 {r.season}</span>
                <span className="rtag rtag-time">⏱ {r.time}</span>
                <span className="rtag rtag-diff">👨‍🍳 {r.diff}</span>
              </div>
              <p className="recipe-desc">{r.desc}</p>
              <button className="btn-primary" style={{marginTop:16,width:'100%'}}
                onClick={e=>{e.stopPropagation();setSelected(r)}}>
                자세히 보기 →
              </button>
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}

/* ──── WELFARE SCREEN ──── */
function WelfareScreen({portals,selected,setSelected}) {
  return (
    <div className="fade-in">
      <div className="page-title">복지 서비스</div>
      <p className="page-sub">이용하실 복지 포털을 선택하시면 연결해 드립니다.</p>
      <div className="welfare-grid">
        {portals.map(p=>(
          <div key={p.id} className="portal-card" onClick={()=>setSelected(p)}>
            <div className="portal-icon">{p.emoji}</div>
            <div className="portal-name">{p.name}</div>
            <div className="portal-desc">{p.desc}</div>
            <div className="portal-badge">🔗 연결하기</div>
          </div>
        ))}
      </div>

      {/* Webview Simulation */}
      <div className="webview-sim">
        <div className="webview-toolbar">
          <button className="webview-nav-btn">← 뒤로</button>
          <button className="webview-nav-btn">🏠 처음으로</button>
          <div className="webview-url">
            {selected ? `https://www.${selected.url}` : '서비스를 선택해 주세요'}
          </div>
          <button className="webview-nav-btn" onClick={()=>setSelected(null)}>✕ 닫기</button>
        </div>
        <div className="webview-content">
          {selected ? (
            <div className="webview-preview" style={{borderColor:selected.text}}>
              <div style={{fontSize:64,marginBottom:16}}>{selected.emoji}</div>
              <div style={{fontSize:28,fontWeight:800,color:'var(--c-ink)',marginBottom:8}}>{selected.name}</div>
              <div style={{fontSize:17,color:'var(--c-slate)',marginBottom:24}}>{selected.desc}</div>
              <div style={{background:selected.color,padding:'12px 24px',borderRadius:50,display:'inline-block',fontSize:17,fontWeight:700,color:selected.text}}>
                🌐 {selected.url} 연결 중...
              </div>
            </div>
          ) : (
            <>
              <div style={{fontSize:60}}>🖥️</div>
              <div style={{fontSize:22,fontWeight:700,color:'var(--c-slate)'}}>위의 복지 포털을 선택해 주세요</div>
              <div style={{fontSize:17,color:'var(--c-steel)'}}>선택 후 복지 서비스에 바로 연결됩니다.</div>
            </>
          )}
        </div>
      </div>
    </div>
  );
}

/* ──── TUTORIAL SCREEN ──── */
function TutorialScreen({practiceClicked,setPracticeClicked,showTTS}) {
  return (
    <div className="fade-in">
      <div className="tutorial-header">
        <div className="page-title">사용 방법</div>
        <p className="page-sub">키오스크를 처음 사용하시는 분들을 위한 안내입니다.</p>
      </div>

      <div className="tutorial-steps">
        {TUTORIAL_STEPS.map((s,i)=>(
          <div key={i} className="step-card">
            <div className="step-num">{i+1}</div>
            <div className="step-icon">{s.icon}</div>
            <div className="step-name">{s.name}</div>
            <p className="step-desc">{s.desc}</p>
          </div>
        ))}
      </div>

      <div className="practice-area">
        <div className="practice-title">✋ 연습해 보세요</div>
        <p className="practice-sub">아래 버튼을 터치하여 키오스크 버튼 누르기를 연습해 보세요.</p>
        <button className="practice-btn"
          style={{background:practiceClicked?'var(--c-green)':'var(--c-blue)'}}
          onClick={()=>{
            setPracticeClicked(true);
            showTTS('잘하셨습니다! 버튼 누르기를 연습했습니다.');
            setTimeout(()=>setPracticeClicked(false),1800);
          }}>
          {practiceClicked ? '✅ 잘 하셨습니다!' : '👆 여기를 눌러보세요'}
        </button>
        {practiceClicked && (
          <p style={{marginTop:20,fontSize:20,fontWeight:700,color:'var(--c-green)'}}>
            🎉 훌륭합니다! 이제 키오스크를 자유롭게 사용해 보세요.
          </p>
        )}
      </div>

      <div style={{marginTop:32,background:'var(--c-white)',borderRadius:'var(--r-card)',boxShadow:'var(--shadow-sm)',padding:32}}>
        <div style={{fontSize:22,fontWeight:800,color:'var(--c-ink)',marginBottom:16}}>💡 도움이 필요하시면</div>
        <div style={{display:'grid',gridTemplateColumns:'repeat(2,1fr)',gap:16}}>
          {[
            {icon:'🔊',text:'음성 안내 버튼을 누르면 내용을 읽어드립니다.'},
            {icon:'⬅️',text:'"처음으로" 버튼으로 언제든 홈 화면으로 돌아오세요.'},
            {icon:'🏠',text:'상단의 메뉴 버튼으로 원하는 서비스로 이동하세요.'},
            {icon:'📞',text:'복지관 직원이 항상 가까이 있으니 도움을 요청하세요.'},
          ].map((item,i)=>(
            <div key={i} style={{display:'flex',gap:12,alignItems:'flex-start',background:'var(--c-bg)',borderRadius:12,padding:16}}>
              <span style={{fontSize:28}}>{item.icon}</span>
              <span style={{fontSize:17,color:'var(--c-slate)',lineHeight:1.6}}>{item.text}</span>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
