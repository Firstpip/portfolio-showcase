<!DOCTYPE html>
<html lang="ko" data-archetype="notion-blocks-tree">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>어르신 돌봄 키오스크 관리자 — 구현 데모</title>
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" rel="stylesheet">
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://unpkg.com/prop-types/prop-types.min.js"></script>
<script src="https://unpkg.com/recharts@2.10.4/umd/Recharts.js"></script>
<style>
:root {
  --c-ink: #101010;
  --c-graphite: #242424;
  --c-blue: #0099ff;
  --c-slate: #6b7280;
  --c-stone: #898989;
  --c-silver: #e5e7eb;
  --c-paper: #f4f4f4;
  --c-white: #ffffff;
  --c-info: #eff6fe;
  --shadow-card: rgba(36,36,36,0.05) 0px 4px 8px 0px;
  --shadow-hover: rgba(36,36,36,0.7) 0px 1px 5px -4px,rgba(36,36,36,0.05) 0px 4px 8px 0px;
  --r-card: 12px;
  --r-tag: 9999px;
  --r-input: 8px;
  --r-btn: 9999px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Pretendard',sans-serif;background:var(--c-paper);color:var(--c-graphite);min-height:100vh;font-size:15px;line-height:1.5}
#root{min-height:100vh;display:flex;flex-direction:column}

/* ──── LAYOUT ──── */
.app-layout{display:flex;min-height:100vh}

/* ──── SIDEBAR (notion-blocks-tree) ──── */
.sidebar{
  width:248px;flex-shrink:0;
  background:var(--c-paper);
  border-right:1px solid var(--c-silver);
  display:flex;flex-direction:column;
  height:100vh;position:sticky;top:0;overflow-y:auto;
}
.sidebar-brand{
  display:flex;align-items:center;gap:10px;
  padding:16px 16px 12px;
  border-bottom:1px solid var(--c-silver);
}
.brand-icon{
  width:32px;height:32px;border-radius:8px;
  background:var(--c-ink);
  display:flex;align-items:center;justify-content:center;
  font-size:16px;
}
.brand-name{font-size:15px;font-weight:700;color:var(--c-ink)}
.brand-tag{font-size:11px;color:var(--c-stone);margin-top:1px}
.sidebar-search{
  margin:12px 12px 8px;
  display:flex;align-items:center;gap:8px;
  background:var(--c-white);border:1px solid var(--c-silver);
  border-radius:var(--r-input);padding:8px 12px;cursor:text;
}
.sidebar-search span{font-size:12px;color:var(--c-stone)}
.sidebar-section{padding:4px 0}
.sidebar-section-label{
  padding:6px 14px;font-size:11px;font-weight:700;
  color:var(--c-stone);text-transform:uppercase;letter-spacing:0.08em;
}
.sidebar-item{
  display:flex;align-items:center;gap:9px;
  padding:7px 12px 7px 14px;border-radius:6px;margin:1px 6px;
  cursor:pointer;font-size:14px;color:var(--c-graphite);font-weight:500;
  transition:background 0.15s;position:relative;
}
.sidebar-item:hover{background:rgba(0,0,0,0.05)}
.sidebar-item.active{background:var(--c-ink);color:#fff;font-weight:700}
.sidebar-item .item-icon{font-size:15px;width:20px;text-align:center}
.sidebar-item .item-badge{
  margin-left:auto;
  background:var(--c-blue);color:#fff;
  padding:1px 7px;border-radius:var(--r-tag);font-size:11px;font-weight:700;
}
.sidebar-item.active .item-badge{background:rgba(255,255,255,0.25)}
.sidebar-tree{padding:2px 0}
.tree-item{
  display:flex;align-items:center;gap:7px;
  padding:5px 12px 5px 28px;
  cursor:pointer;font-size:13px;color:var(--c-slate);
  transition:background 0.15s;border-radius:4px;margin:0 6px;
}
.tree-item:hover{background:rgba(0,0,0,0.04);color:var(--c-ink)}
.tree-item.active{color:var(--c-ink);font-weight:700}
.sidebar-bottom{
  margin-top:auto;padding:12px 12px;
  border-top:1px solid var(--c-silver);
}
.admin-profile{
  display:flex;align-items:center;gap:10px;
  padding:8px;border-radius:var(--r-input);cursor:pointer;
  transition:background 0.15s;
}
.admin-profile:hover{background:rgba(0,0,0,0.04)}
.admin-avatar{
  width:32px;height:32px;border-radius:50%;
  background:var(--c-ink);color:#fff;
  display:flex;align-items:center;justify-content:center;font-size:14px;
}
.admin-info{flex:1}
.admin-name{font-size:13px;font-weight:700;color:var(--c-ink)}
.admin-role{font-size:11px;color:var(--c-stone)}

/* ──── MAIN AREA ──── */
.main-area{flex:1;display:flex;flex-direction:column;min-height:100vh;overflow:hidden}

/* ──── TOP BAR ──── */
.topbar{
  background:var(--c-white);
  border-bottom:1px solid var(--c-silver);
  padding:12px 32px;
  display:flex;align-items:center;gap:16px;
  position:sticky;top:0;z-index:50;
}
.topbar-breadcrumb{
  display:flex;align-items:center;gap:6px;
  font-size:14px;color:var(--c-slate);
}
.topbar-breadcrumb .current{font-weight:700;color:var(--c-ink)}
.topbar-actions{margin-left:auto;display:flex;gap:10px}
.btn-ink{
  padding:8px 20px;background:var(--c-ink);color:#fff;
  border:none;border-radius:var(--r-btn);cursor:pointer;
  font-family:'Pretendard',sans-serif;font-size:14px;font-weight:600;
  transition:opacity 0.2s;
}
.btn-ink:hover{opacity:0.85}
.btn-ghost{
  padding:8px 20px;background:var(--c-white);color:var(--c-graphite);
  border:1px solid var(--c-silver);border-radius:var(--r-btn);cursor:pointer;
  font-family:'Pretendard',sans-serif;font-size:14px;font-weight:600;
  transition:border-color 0.2s;
}
.btn-ghost:hover{border-color:var(--c-ink)}

/* ──── PAGE CONTENT ──── */
.page-content{flex:1;padding:32px;overflow-y:auto}
.page-header{margin-bottom:28px}
.page-title{font-size:28px;font-weight:800;color:var(--c-ink);line-height:1.2}
.page-sub{font-size:15px;color:var(--c-slate);margin-top:6px}

/* ──── MASTER-DETAIL (composition) ──── */
.master-detail{display:flex;gap:0;flex:1;height:calc(100vh - 140px)}
.master-pane{
  width:320px;flex-shrink:0;
  border-right:1px solid var(--c-silver);
  overflow-y:auto;background:var(--c-white);
  border-radius:var(--r-card) 0 0 var(--r-card);
  box-shadow:var(--shadow-card);
}
.master-header{
  padding:16px 20px;border-bottom:1px solid var(--c-silver);
  position:sticky;top:0;background:var(--c-white);
}
.master-search{
  display:flex;align-items:center;gap:8px;
  background:var(--c-paper);border:1px solid var(--c-silver);
  border-radius:var(--r-input);padding:8px 12px;
}
.master-search input{border:none;background:none;font-family:'Pretendard',sans-serif;font-size:14px;color:var(--c-ink);width:100%;outline:none}
.master-item{
  display:flex;align-items:flex-start;gap:12px;
  padding:14px 20px;border-bottom:1px solid var(--c-silver);
  cursor:pointer;transition:background 0.15s;
}
.master-item:hover{background:var(--c-paper)}
.master-item.selected{background:var(--c-info)}
.master-item-icon{
  width:36px;height:36px;border-radius:8px;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;font-size:18px;
}
.master-item-info{flex:1;min-width:0}
.master-item-name{font-size:14px;font-weight:700;color:var(--c-ink);margin-bottom:2px}
.master-item-sub{font-size:12px;color:var(--c-slate)}
.master-item-meta{display:flex;gap:4px;margin-top:4px}
.mtag{
  padding:2px 8px;border-radius:var(--r-tag);font-size:11px;font-weight:700;
}
.mtag-active{background:#e8f9f0;color:#00875a}
.mtag-draft{background:#fff8e7;color:#b7791f}
.mtag-archived{background:var(--c-paper);color:var(--c-stone)}
.detail-pane{
  flex:1;overflow-y:auto;background:var(--c-white);
  border-radius:0 var(--r-card) var(--r-card) 0;
  box-shadow:var(--shadow-card);
}
.detail-pane-empty{
  height:100%;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:12px;
  color:var(--c-stone);
}

/* ──── BLOCKS (notion-blocks-tree) ──── */
.block-area{padding:32px}
.block-title{font-size:26px;font-weight:800;color:var(--c-ink);margin-bottom:4px}
.block-meta{font-size:13px;color:var(--c-stone);margin-bottom:28px}
.block{
  border-radius:8px;border:1px solid transparent;
  margin-bottom:12px;transition:border-color 0.15s;
}
.block:hover{border-color:var(--c-silver)}
.block-header{
  display:flex;align-items:center;gap:8px;
  padding:8px 12px 8px 4px;font-size:12px;font-weight:700;
  color:var(--c-stone);text-transform:uppercase;letter-spacing:0.06em;cursor:pointer;
}
.block-content{padding:0 12px 12px}
.block-text{font-size:15px;color:var(--c-graphite);line-height:1.7}
.block-divider{height:1px;background:var(--c-silver);margin:20px 0}
.block-callout{
  background:var(--c-info);border-left:3px solid var(--c-blue);
  border-radius:0 8px 8px 0;padding:14px 16px;
  display:flex;gap:10px;
}
.block-callout-text{font-size:14px;color:var(--c-graphite);line-height:1.6}
.block-table{width:100%;border-collapse:collapse;font-size:14px}
.block-table th{text-align:left;padding:10px 14px;background:var(--c-paper);font-weight:700;color:var(--c-slate);border-bottom:1px solid var(--c-silver)}
.block-table td{padding:10px 14px;border-bottom:1px solid var(--c-silver);color:var(--c-graphite)}
.block-table tr:last-child td{border-bottom:none}
.block-table tr:hover td{background:var(--c-paper)}
.block-field-row{display:flex;gap:0;margin-bottom:12px}
.block-field{flex:1}
.block-field-label{font-size:12px;font-weight:700;color:var(--c-stone);margin-bottom:6px}
.block-field-input{
  width:100%;padding:9px 12px;
  background:var(--c-paper);border:1px solid var(--c-silver);
  border-radius:var(--r-input);font-family:'Pretendard',sans-serif;
  font-size:14px;color:var(--c-ink);outline:none;
  transition:border-color 0.15s;
}
.block-field-input:focus{border-color:var(--c-ink)}
.block-field-textarea{min-height:90px;resize:vertical}
.block-select{
  width:100%;padding:9px 12px;
  background:var(--c-paper);border:1px solid var(--c-silver);
  border-radius:var(--r-input);font-family:'Pretendard',sans-serif;
  font-size:14px;color:var(--c-ink);outline:none;cursor:pointer;
  appearance:none;
}
.block-actions{display:flex;gap:8px;padding:16px 12px 4px}

/* ──── STATS ──── */
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:28px}
.stat-card{
  background:var(--c-white);border-radius:var(--r-card);
  box-shadow:var(--shadow-card);padding:20px;
}
.stat-label{font-size:12px;font-weight:700;color:var(--c-stone);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:8px}
.stat-value{font-size:32px;font-weight:800;color:var(--c-ink)}
.stat-change{font-size:13px;margin-top:4px}
.stat-up{color:#00875a}
.stat-down{color:#e53e3e}
.chart-card{
  background:var(--c-white);border-radius:var(--r-card);
  box-shadow:var(--shadow-card);padding:24px;margin-bottom:20px;
}
.chart-title{font-size:16px;font-weight:800;color:var(--c-ink);margin-bottom:20px}
.charts-row{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:20px}

/* ──── UI SETTINGS ──── */
.settings-layout{display:grid;grid-template-columns:220px 1fr;gap:0}
.settings-nav{background:var(--c-white);border-right:1px solid var(--c-silver);border-radius:var(--r-card) 0 0 var(--r-card);box-shadow:var(--shadow-card);padding:16px 0}
.settings-nav-item{
  padding:10px 20px;font-size:14px;color:var(--c-slate);cursor:pointer;
  transition:background 0.15s;border-radius:4px;margin:1px 8px;
}
.settings-nav-item:hover{background:var(--c-paper);color:var(--c-ink)}
.settings-nav-item.active{background:var(--c-ink);color:#fff;font-weight:700}
.settings-content{background:var(--c-white);border-radius:0 var(--r-card) var(--r-card) 0;box-shadow:var(--shadow-card);padding:32px}
.settings-section{margin-bottom:32px}
.settings-section-title{font-size:18px;font-weight:800;color:var(--c-ink);margin-bottom:16px;padding-bottom:12px;border-bottom:1px solid var(--c-silver)}
.setting-row{display:flex;align-items:flex-start;justify-content:space-between;padding:16px 0;border-bottom:1px solid var(--c-silver)}
.setting-row:last-child{border-bottom:none}
.setting-info{flex:1}
.setting-name{font-size:15px;font-weight:700;color:var(--c-ink)}
.setting-desc{font-size:13px;color:var(--c-slate);margin-top:3px}
.toggle{
  width:44px;height:24px;border-radius:12px;cursor:pointer;
  position:relative;transition:background 0.2s;flex-shrink:0;margin-left:24px;
  border:none;
}
.toggle.on{background:var(--c-ink)}
.toggle.off{background:var(--c-silver)}
.toggle::after{
  content:'';position:absolute;top:3px;width:18px;height:18px;border-radius:50%;background:#fff;
  transition:left 0.2s;
}
.toggle.on::after{left:23px}
.toggle.off::after{left:3px}
.font-preview{
  background:var(--c-paper);border-radius:var(--r-input);padding:20px;
  border:1px solid var(--c-silver);margin-top:16px;
}
.font-size-control{display:flex;align-items:center;gap:12px;margin-top:12px}
.font-size-btn{
  width:36px;height:36px;border-radius:50%;border:1px solid var(--c-silver);
  background:var(--c-white);cursor:pointer;font-size:18px;
  display:flex;align-items:center;justify-content:center;transition:all 0.15s;
}
.font-size-btn:hover{background:var(--c-ink);color:#fff;border-color:var(--c-ink)}
.contrast-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-top:12px}
.contrast-option{
  padding:14px;border-radius:8px;border:2px solid transparent;cursor:pointer;
  text-align:center;transition:all 0.15s;
}
.contrast-option.selected{border-color:var(--c-blue)}
.contrast-option:hover{border-color:var(--c-silver)}

/* ──── VOICE ──── */
.voice-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px}
.voice-card{
  background:var(--c-white);border-radius:var(--r-card);
  box-shadow:var(--shadow-card);padding:20px;
}
.voice-card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.voice-card-title{font-size:16px;font-weight:800;color:var(--c-ink)}
.voice-item{
  display:flex;align-items:center;gap:12px;
  padding:12px;border:1px solid var(--c-silver);border-radius:8px;
  margin-bottom:8px;transition:border-color 0.15s;cursor:pointer;
}
.voice-item:hover{border-color:var(--c-ink)}
.voice-item.playing{border-color:var(--c-blue);background:var(--c-info)}
.voice-item-icon{
  width:36px;height:36px;border-radius:50%;
  background:var(--c-paper);
  display:flex;align-items:center;justify-content:center;font-size:16px;
}
.voice-item.playing .voice-item-icon{background:var(--c-blue);color:#fff}
.voice-item-name{flex:1;font-size:14px;font-weight:700;color:var(--c-ink)}
.voice-item-dur{font-size:12px;color:var(--c-stone)}
.voice-upload{
  border:2px dashed var(--c-silver);border-radius:8px;padding:24px;text-align:center;
  cursor:pointer;transition:border-color 0.15s;margin-top:12px;
}
.voice-upload:hover{border-color:var(--c-ink)}
.voice-waveform{
  height:48px;background:var(--c-paper);border-radius:6px;
  display:flex;align-items:center;padding:0 12px;gap:2px;overflow:hidden;
}
.wave-bar{
  width:3px;border-radius:2px;background:var(--c-blue);
  animation:wave 1.2s ease-in-out infinite;
}

/* ──── ANIMATIONS ──── */
@keyframes wave{0%,100%{height:8px;opacity:0.4}50%{height:36px;opacity:1}}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes staggerIn{from{opacity:0;transform:translateX(-8px)}to{opacity:1;transform:translateX(0)}}
.fade-in{animation:fadeIn 0.25s ease}
.master-item{animation:staggerIn 0.2s ease both}
.master-item:nth-child(1){animation-delay:0s}
.master-item:nth-child(2){animation-delay:0.05s}
.master-item:nth-child(3){animation-delay:0.1s}
.master-item:nth-child(4){animation-delay:0.15s}
.master-item:nth-child(5){animation-delay:0.2s}

/* ──── TOAST ──── */
.toast{
  position:fixed;bottom:28px;right:28px;
  background:var(--c-ink);color:#fff;
  padding:12px 20px;border-radius:var(--r-tag);
  font-size:14px;font-weight:600;
  box-shadow:0 4px 16px rgba(0,0,0,0.18);
  animation:fadeIn 0.2s ease;z-index:999;
  display:flex;align-items:center;gap:8px;
}

/* ──── CHIP TAGS ──── */
.tag-pill{
  display:inline-flex;align-items:center;gap:4px;
  padding:3px 10px;border-radius:var(--r-tag);font-size:12px;font-weight:700;
}
.tag-blue{background:var(--c-info);color:var(--c-blue)}
.tag-green{background:#e8f9f0;color:#00875a}
.tag-orange{background:#fff8e7;color:#b7791f}
.tag-gray{background:var(--c-paper);color:var(--c-stone)}
</style>
</head>
<body>

<script type="text/babel">
const { useState, useEffect } = React;
const { BarChart, Bar, LineChart, Line, XAxis, YAxis, Tooltip, ResponsiveContainer, PieChart, Pie, Cell } = Recharts;

/* ──── DATA ──── */
const NAV_SECTIONS = [
  {
    label:'콘텐츠',
    items:[
      { key:'cms', icon:'📁', label:'콘텐츠 관리', badge:null },
    ],
    tree:[
      { key:'cms-hospital', label:'병원 정보', parent:'cms' },

    ]
  },
  {

    items:[
      { key:'stats', icon:'📊', label:'사용 통계', badge:null },
      { key:'voice', icon:'🔊', label:'음성 관리', badge:4 },
    ]
  },
  {
    label:'설정',
    items:[
      { key:'ui-settings', icon:'🎨', label:'UI 설정', badge:null },
    ]
  },
];

const CMS_ITEMS = {

/* ──── APP ──── */
function App() {
  const [activeKey, setActiveKey] = useState('cms');

  const [playingVoice, setPlayingVoice] = useState(null);
  const [toast, setToast] = useState(null);
  const showToast = (msg) => { setToast(msg); setTimeout(()=>setToast(null), 2400); };

  const allNavItems = NAV_SECTIONS.flatMap(s=>s.items);
  const getNavItem = (key) => allNavItems.find(i=>i.key===key);

  const cmsTabs = ['hospital','recipe','welfare'];
  const cmsTabLabel = {hospital:'병원 정보',recipe:'레시피',welfare:'복지 서비스'};

    setActiveKey(key);

  };

  return (
    <div className="app-layout">
      {/* SIDEBAR */}
      <aside className="sidebar">
        <div className="sidebar-brand">
          <div className="brand-icon">⚙️</div>

        </div>
        <div className="sidebar-search">

          <span style={{fontSize:13,color:'var(--c-stone)'}}>검색…</span>

        {NAV_SECTIONS.map(s=>(
          <div key={s.label} className="sidebar-section">
            <div className="sidebar-section-label">{s.label}</div>

              </div>

              <div key={t.key}
                className={`tree-item${cmsTab===t.key.replace('cms-','')?' active':''}`}

              <div className="admin-role">복지관 관리자</div>
            </div>

            <CMSScreen
              tabs={cmsTabs} cmsTabLabel={cmsTabLabel}
              activeTab={cmsTab} setTab={t=>{setCmsTab(t);setSelectedItem(CMS_ITEMS[t][0])}}

}

              {playing===f.id && (
                <div className="voice-waveform" style={{width:64,height:32,background:'none'}}>
                  {Array.from({length:waveBarCount}).map((_,i)=>(
                    <div key={i} className="wave-bar"
                      style={{animationDelay:`${i*0.075}s`,height:`${Math.random()*28+8}px`}}/>
                  ))}
                </div>
              )}
            </div>
          ))}
          <div className="voice-upload" onClick={()=>{}}>
            <div style={{fontSize:28,marginBottom:8}}>📁</div>
            <div style={{fontSize:14,fontWeight:700,color:'var(--c-ink)'}}>파일 추가</div>
            <div style={{fontSize:13,color:'var(--c-stone)',marginTop:4}}>MP3, WAV 파일 지원</div>
          </div>
        </div>
        <div style={{display:'flex',flexDirection:'column',gap:16}}>
          <div className="voice-card">
            <div className="voice-card-title" style={{marginBottom:12}}>⚙️ TTS 설정</div>
            {[
              { label:'음성 속도', defaultVal:'천천히' },
              { label:'음성 톤', defaultVal:'여성(표준)' },
              { label:'볼륨', defaultVal:'보통 (70%)' },
            ].map(s=>(
              <div key={s.label} style={{marginBottom:12}}>
                <div className="block-field-label">{s.label}</div>
                <select className="block-select">
                  <option>{s.defaultVal}</option>
                </select>
              </div>
            ))}
          </div>
          <div className="voice-card">
            <div className="voice-card-title" style={{marginBottom:12}}>📊 사용 현황</div>
            {[
              { name:'병원 찾기 안내', count:42 },
              { name:'레시피 안내', count:28 },
              { name:'복지 서비스 안내', count:18 },
              { name:'사용 방법 안내', count:12 },
            ].map(u=>(
              <div key={u.name} style={{marginBottom:12}}>
                <div style={{display:'flex',justifyContent:'space-between',marginBottom:4,fontSize:13,color:'var(--c-graphite)',fontWeight:600}}>
                  <span>{u.name}</span><span>{u.count}회</span>
                </div>
                <div style={{height:6,background:'var(--c-silver)',borderRadius:3}}>
                  <div style={{width:`${u.count/50*100}%`,height:'100%',background:'var(--c-ink)',borderRadius:3}}/>
                </div>
              </div>
            ))}
          </div>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
