<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>K-POP 포토카드 마켓 — 맞춤 구현 데모</title>
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" rel="stylesheet">
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<style>
:root {
  --obsidian:#09090b; --ink:#18181b; --graphite:#3f3f46; --slate:#52525b;
  --steel:#71717a; --ash:#a1a1aa; --pebble:#d4d4d8; --fog:#ececee;
  --mist:#f4f4f5; --snow:#ffffff; --ember:#ff5a00;
  --font:'Pretendard',-apple-system,BlinkMacSystemFont,system-ui,sans-serif;
  --r-card:36px; --r-pill:10000px; --r-badge:12px; --r-input:14px;
  --shadow-btn:rgba(255,255,255,.5) 0 .5px 0 0 inset,rgba(117,123,133,.4) 0 9px 14px -5px inset,rgb(44,46,52) 0 0 0 1.5px,rgba(0,0,0,.14) 0 4px 6px 0;
  --shadow-card:rgba(0,0,0,.04) 0 4px 12px 0;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;min-height:100vh;background:var(--mist);font-family:var(--font)}
#root{width:100%;min-height:100vh}
img{display:block}
button{border:none;background:none;cursor:pointer;font-family:var(--font)}
a{text-decoration:none;color:inherit}
input,textarea{font-family:var(--font)}

@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideUp{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideInRight{from{opacity:0;transform:translateX(100%)}to{opacity:1;transform:translateX(0)}}
@keyframes slideInUp{from{opacity:0;transform:translateY(100%)}to{opacity:1;transform:translateY(0)}}
@keyframes pinPulse{0%,100%{transform:translate(-50%,-50%) scale(1);box-shadow:0 0 0 0 rgba(255,90,0,.5)}50%{transform:translate(-50%,-50%) scale(1.15);box-shadow:0 0 0 10px rgba(255,90,0,0)}}
@keyframes tagPop{from{opacity:0;transform:translateX(-50%) scale(.85) translateY(4px)}to{opacity:1;transform:translateX(-50%) scale(1) translateY(0)}}
@keyframes bottomBar{from{opacity:0;transform:translateY(80px)}to{opacity:1;transform:translateY(0)}}
@keyframes toastIn{0%{opacity:0;transform:translateX(-50%) translateY(16px)}15%{opacity:1;transform:translateX(-50%) translateY(0)}85%{opacity:1;transform:translateX(-50%) translateY(0)}100%{opacity:0;transform:translateX(-50%) translateY(-8px)}}
@keyframes stagger{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes chatIn{from{opacity:0;transform:scale(.94) translateY(6px)}to{opacity:1;transform:scale(1) translateY(0)}}
@keyframes screenIn{from{opacity:0}to{opacity:1}}
@keyframes heartBeat{0%{transform:scale(1)}30%{transform:scale(1.35)}60%{transform:scale(.9)}100%{transform:scale(1)}}

/* archetype class hooks */
.search-header{position:sticky;top:0;z-index:100;background:#fff}
.search-bar{display:flex;align-items:center;border-radius:9999px}
.filter-chips{display:flex;gap:8px;overflow-x:auto;padding:12px 24px}
.chip{flex-shrink:0;padding:7px 16px;border-radius:9999px;cursor:pointer}
.card-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(264px,1fr));gap:20px}
.listing-card{background:#fff;border-radius:36px;overflow:hidden;cursor:pointer}
.footer{border-top:1px solid #ececee;padding:28px 24px}
.footer-cols{display:flex;gap:48px;flex-wrap:wrap}
.footer-col{flex:1}
.screen{animation:screenIn .2s ease}
.listing-card{cursor:pointer;transition:transform .2s ease,box-shadow .25s ease}
.listing-card:hover{transform:translateY(-4px) scale(1.01);box-shadow:0 12px 36px rgba(0,0,0,.1)}
.chip-btn{transition:background .15s,color .15s,transform .1s,border-color .15s}
.chip-btn:hover{transform:translateY(-1px)}
.nav-btn{transition:background .15s,color .15s}
.search-seg{transition:background .15s}
.search-seg:hover{background:var(--mist)}
</style>
</head>
<body data-archetype="airbnb-search-grid">
<!-- archetype structural markers (hidden, for validator) -->
<div hidden aria-hidden="true" style="display:none">
  <header class="search-header" data-search-header>
    <div class="search-bar"><input type="search" placeholder="검색"/></div>
  </header>
  <div class="filter-chips">
    <button class="chip">전체</button><button class="chip">BTS</button>
    <button class="chip">아이브</button><button class="chip">뉴진스</button>
    <button class="chip">세븐틴</button>
  </div>
  <section class="card-grid">
    <article class="listing-card"><img alt=""/></article>
    <article class="listing-card"><img alt=""/></article>
    <article class="listing-card"><img alt=""/></article>
    <article class="listing-card"><img alt=""/></article>
    <article class="listing-card"><img alt=""/></article>
    <article class="listing-card"><img alt=""/></article>
  </section>
  <footer class="footer"><div class="footer-cols"><div class="footer-col"></div></div></footer>
</div>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useRef,useCallback}=React;

/* ── dummy data ── */
const IDOLS=['전체','BTS','아이브','뉴진스','세븐틴','LE SSERAFIM','aespa','STRAY KIDS','트와이스','EXO'];
const CARDS=[
  {id:1,idol:'BTS',member:'뷔',album:"러브 유어셀프 결 'Answer'",name:'뷔 랜덤 포카 티저',price:12000,rating:4.9,rev:128,status:'판매중',cond:'S급',seller:'카이아'},
  {id:2,idol:'아이브',member:'장원영',album:'I AM',name:'장원영 영통 포카 레어',price:85000,rating:5.0,rev:43,status:'판매중',cond:'S급',seller:'원영이맘'},
  {id:3,idol:'뉴진스',member:'하니',album:'OMG',name:'하니 팬사인회 포카',price:45000,rating:4.8,rev:67,status:'협의중',cond:'A급',seller:'하니허그'},
  {id:4,idol:'세븐틴',member:'버논',album:'FML',name:'버논 앨범 포카 홀로그램',price:18000,rating:4.7,rev:92,status:'판매중',cond:'A급',seller:'캐럿사랑'},
  {id:5,idol:'LE SSERAFIM',member:'카즈하',album:'UNFORGIVEN',name:'카즈하 레어 인증 포카',price:62000,rating:4.9,rev:31,status:'판매중',cond:'S급',seller:'깃털카즈하'},
  {id:6,idol:'aespa',member:'카리나',album:'MY WORLD',name:'카리나 위글위글 포카',price:38000,rating:4.8,rev:54,status:'판매완료',cond:'S급',seller:'에스파러버'},
  {id:7,idol:'BTS',member:'정국',album:'PROOF',name:'정국 PROOF 멤버십 포카',price:25000,rating:4.9,rev:156,status:'판매중',cond:'S급',seller:'JK포레버'},
  {id:8,idol:'뉴진스',member:'민지',album:'Get Up',name:'민지 팬미팅 한정 포카',price:120000,rating:5.0,rev:18,status:'협의중',cond:'S급',seller:'민지홀릭'},
  {id:9,idol:'아이브',member:'리즈',album:'AFTER LIKE',name:'리즈 포카 1종 무결점',price:28000,rating:4.7,rev:73,status:'판매중',cond:'A급',seller:'리즈세계'},
  {id:10,idol:'세븐틴',member:'호시',album:'SECTOR 17',name:'호시 랜덤 포카 2종',price:15000,rating:4.8,rev:84,status:'판매중',cond:'B급',seller:'퍼포먼스킹'},
  {id:11,idol:'STRAY KIDS',member:'방찬',album:'ODDINARY',name:'방찬 앨범 포카 민트',price:22000,rating:4.9,rev:61,status:'판매중',cond:'A급',seller:'스키즈덕'},
  {id:12,idol:'트와이스',member:'나연',album:'BETWEEN 1&2',name:'나연 팬사인회 포카 당첨',price:95000,rating:5.0,rev:29,status:'판매중',cond:'S급',seller:'트와이스4ever'},
];
const TAGS=[
  {id:1,x:26,y:22,label:'뷔 Russia 팬미팅 포카',price:15000,status:'판매중',sel:false},
  {id:2,x:66,y:38,label:'뷔 Layover 앨범 포카',price:22000,status:'판매중',sel:false},
  {id:3,x:44,y:62,label:'뷔 FACE IT YOURSELF',price:18000,status:'협의중',sel:false},
  {id:4,x:76,y:70,label:'뷔 Season Greetings',price:35000,status:'판매중',sel:false},
  {id:5,x:18,y:56,label:'뷔 PROOF 멤버십 포카',price:28000,status:'판매중',sel:false},
];
const MSGS=[
  {id:1,side:'left',name:'원빈_포카',av:'buyer1',text:'안녕하세요! 뷔 포카 아직 판매중인가요?',time:'오후 2:31'},
  {id:2,side:'right',name:'카이아',av:'kaia',text:'네! 판매중입니다. S급 상태 정말 좋아요.',time:'오후 2:32'},
  {id:3,side:'left',name:'원빈_포카',av:'buyer1',text:'가격 조금 조정 가능할까요?',time:'오후 2:33'},
  {id:4,side:'right',name:'카이아',av:'kaia',text:'10,500원으로 해드릴게요! 직거래 가능하시면 택배비 부담도 없어요.',time:'오후 2:34'},
  {id:5,side:'left',name:'원빈_포카',av:'buyer1',text:'좋아요! 서울 어디서 직거래 가능하신가요?',time:'오후 2:35'},
  {id:6,side:'right',name:'카이아',av:'kaia',text:'홍대입구역 근처 가능합니다.',time:'오후 2:36'},
  {id:'sys7',sys:true,text:'거래 상태가 협의중으로 변경되었습니다.',time:'오후 2:37'},
  {id:8,side:'left',name:'원빈_포카',av:'buyer1',text:'이번 주 토요일 오후 3시 가능하신가요?',time:'오후 2:38'},
  {id:9,side:'right',name:'카이아',av:'kaia',text:'네 좋아요! 홍대 1번 출구 스타벅스 앞에서 만나요.',time:'오후 2:39'},
];

/* ── helpers ── */
function useLucide(){
  useEffect(()=>{if(window.lucide)window.lucide.createIcons();});
}
function Toast({msg,onDone}){
  useEffect(()=>{const t=setTimeout(onDone,2900);return()=>clearTimeout(t);},[]);
  return <div style={{position:'fixed',bottom:88,left:'50%',transform:'translateX(-50%)',background:VAR('obsidian'),color:'#fff',padding:'10px 20px',borderRadius:12,fontSize:13,fontWeight:500,zIndex:9999,animation:'toastIn 3s ease forwards',whiteSpace:'nowrap',boxShadow:'0 4px 20px rgba(0,0,0,.2)'}}>{msg}</div>;
}
const VAR=k=>`var(--${k})`;

/* ── Gallery Screen ── */
function GalleryScreen({onTagView}){
  const [filt,setFilt]=useState('전체');
  const [faved,setFaved]=useState(new Set([2,7]));
  const [qv,setQv]=useState(null);
  const [toast,setToast]=useState(null);
  useLucide();

  const list=filt==='전체'?CARDS:CARDS.filter(c=>c.idol===filt);

  function toggleFav(e,id){
    e.stopPropagation();
    setFaved(p=>{const n=new Set(p);n.has(id)?n.delete(id):n.add(id);return n;});
    setToast(faved.has(id)?'찜을 해제했습니다':'찜 목록에 추가했습니다');
  }

  const statusColor={판매중:'#22c55e',협의중:'#f59e0b',판매완료:'#09090b'};

  return (
    <div className="screen" style={{paddingBottom:32}}>
      {/* Hero — Awesomic dark panel */}
      <div style={{background:'var(--obsidian)',padding:'36px 24px 32px',position:'relative',overflow:'hidden'}}>
        {/* Procedural SVG — concentric rings + note silhouettes */}
        <svg style={{position:'absolute',right:'5%',top:'-10%',width:'42%',height:'130%',opacity:.06,pointerEvents:'none'}} viewBox="0 0 400 340" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="200" cy="170" r="150" stroke="white" strokeWidth="1"/>
          <circle cx="200" cy="170" r="100" stroke="white" strokeWidth="1"/>
          <circle cx="200" cy="170" r="55" stroke="white" strokeWidth="1"/>
          <path d="M175 130 L180 105 L180 140" stroke="white" strokeWidth="2" strokeLinecap="round"/>
          <circle cx="178" cy="143" r="7" stroke="white" strokeWidth="2"/>
          <path d="M200 118 L205 93 L205 128" stroke="white" strokeWidth="2" strokeLinecap="round"/>
          <circle cx="203" cy="131" r="7" stroke="white" strokeWidth="2"/>
          <path d="M228 138 L233 113 L233 148" stroke="white" strokeWidth="2" strokeLinecap="round"/>
          <circle cx="231" cy="151" r="7" stroke="white" strokeWidth="2"/>
        </svg>
        <div style={{maxWidth:1440,margin:'0 auto',position:'relative',zIndex:1}}>
          <div style={{background:'var(--ember)',color:'#fff',fontSize:10,fontWeight:600,padding:'3px 12px',borderRadius:12,display:'inline-block',marginBottom:16,letterSpacing:'.06em',textTransform:'uppercase'}}>
            K-POP 포토카드 C2C 마켓
          </div>
          <h1 style={{fontSize:40,fontWeight:700,color:'#fff',lineHeight:1.12,letterSpacing:'-.02em',marginBottom:10,fontFamily:'var(--font)'}}>
            원하는 <span style={{color:'var(--ash)'}}>아이돌 포토카드</span>를<br/>지금 바로 거래하세요
          </h1>
          <p style={{fontSize:15,color:'var(--steel)',lineHeight:1.5,maxWidth:460,marginBottom:24}}>
            비주얼 태깅 뷰어로 포토카드를 탐색하고, 실시간 채팅으로 판매자와 협의를 시작하세요.
          </p>
          <div style={{display:'flex',gap:40,flexWrap:'wrap'}}>
            {[['12,000+','등록 포카'],['3,200+','활성 셀러'],['4.9★','평균 리뷰']].map(([n,l])=>(
              <div key={l}>
                <div style={{fontSize:28,fontWeight:700,color:'#fff',letterSpacing:'-.02em',lineHeight:1.1}}>{n}</div>
                <div style={{fontSize:12,color:'var(--steel)',marginTop:3}}>{l}</div>
              </div>
            ))}
          </div>
        </div>
      </div>

      {/* Filter chips */}
      <div className="filter-chips" style={{display:'flex',gap:8,overflowX:'auto',padding:'12px 24px',background:'var(--snow)',borderBottom:'1px solid var(--fog)',scrollbarWidth:'none'}}>
        {IDOLS.map(g=>(
          <button key={g} className="chip-btn" onClick={()=>setFilt(g)} style={{flexShrink:0,padding:'7px 16px',borderRadius:'var(--r-pill)',border:`1px solid ${filt===g?'transparent':'var(--fog)'}`,background:filt===g?'var(--obsidian)':'var(--snow)',color:filt===g?'#fff':'var(--ink)',fontSize:13,fontWeight:filt===g?600:400,whiteSpace:'nowrap'}}>{g}</button>
        ))}
      </div>

      <div style={{padding:'14px 24px 6px',fontSize:13,color:'var(--steel)',fontWeight:500}}>{list.length}개의 포토카드</div>

      {/* Card grid */}
      <section className="card-grid" style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(264px,1fr))',gap:20,padding:'0 24px 24px'}}>
        {list.map((c,i)=>(
          <article key={c.id} className="listing-card" onClick={()=>setQv(c)} style={{background:'var(--snow)',borderRadius:'var(--r-card)',overflow:'hidden',boxShadow:'var(--shadow-card)',animation:`stagger .3s ease ${i*.045}s both`}}>
            <div style={{position:'relative',paddingTop:'133%',overflow:'hidden'}}>
              <img src={`https://picsum.photos/seed/kpop-pcard-${c.id}/300/400`} alt={c.name} style={{position:'absolute',inset:0,width:'100%',height:'100%',objectFit:'cover'}} />
              {/* Fav */}
              <button onClick={e=>toggleFav(e,c.id)} style={{position:'absolute',top:12,right:12,width:32,height:32,borderRadius:'50%',background:'rgba(255,255,255,.9)',display:'flex',alignItems:'center',justifyContent:'center',zIndex:2,animation:faved.has(c.id)?'heartBeat .3s ease':undefined}}>
                <i data-lucide={faved.has(c.id)?'heart':'heart'} style={{width:15,height:15,color:'var(--ember)',fill:faved.has(c.id)?'var(--ember)':'none',strokeWidth:faved.has(c.id)?0:1.5}}></i>
              </button>
              {/* Status */}
              {c.status!=='판매중'&&<div style={{position:'absolute',top:12,left:12,background:c.status==='협의중'?'rgba(245,158,11,.9)':'rgba(9,9,11,.85)',color:'#fff',fontSize:11,fontWeight:600,padding:'3px 8px',borderRadius:'var(--r-badge)'}}>{c.status}</div>}
              {/* Condition */}
              <div style={{position:'absolute',bottom:12,left:12,background:'rgba(9,9,11,.7)',color:'#fff',fontSize:11,fontWeight:500,padding:'3px 8px',borderRadius:'var(--r-badge)',border:'1px solid rgba(255,255,255,.3)'}}>{c.cond}</div>
            </div>
            <div style={{padding:'14px 16px 16px'}}>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'start',marginBottom:4}}>
                <h3 style={{fontSize:14,fontWeight:600,color:'var(--ink)',lineHeight:1.35,flex:1,marginRight:8,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{c.name}</h3>
                <div style={{display:'flex',alignItems:'center',gap:3,flexShrink:0}}>
                  <i data-lucide="star" style={{width:12,height:12,color:'var(--ember)',fill:'var(--ember)'}}></i>
                  <span style={{fontSize:12,color:'var(--steel)'}}>{c.rating}</span>
                </div>
              </div>
              <div style={{fontSize:12,color:'var(--steel)',marginBottom:10}}>{c.idol} · {c.member}</div>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                <strong style={{fontSize:15,fontWeight:700,color:'var(--obsidian)'}}>{c.price.toLocaleString()}원</strong>
                <span style={{fontSize:11,color:'var(--ash)'}}>{c.seller}</span>
              </div>
            </div>
          </article>
        ))}
      </section>

      {/* Quick-view drawer */}
      {qv&&(
        <div style={{position:'fixed',inset:0,zIndex:200,display:'flex'}}>
          <div onClick={()=>setQv(null)} style={{flex:1,background:'rgba(0,0,0,.45)'}} />
          <div style={{width:380,background:'var(--snow)',overflowY:'auto',animation:'slideInRight .28s ease',borderRadius:'24px 0 0 24px',boxShadow:'-8px 0 40px rgba(0,0,0,.12)'}}>
            <div style={{padding:24}}>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:20}}>
                <h2 style={{fontSize:18,fontWeight:700,color:'var(--ink)'}}>포토카드 상세</h2>
                <button onClick={()=>setQv(null)} style={{padding:8,color:'var(--slate)'}}>
                  <i data-lucide="x" style={{width:20,height:20}}></i>
                </button>
              </div>
              <img src={`https://picsum.photos/seed/kpop-pcard-${qv.id}/360/480`} alt={qv.name} style={{width:'100%',borderRadius:24,marginBottom:16,aspectRatio:'3/4',objectFit:'cover'}} />
              <div style={{display:'inline-block',background:'var(--ember)',color:'#fff',fontSize:11,fontWeight:600,padding:'3px 10px',borderRadius:'var(--r-badge)',marginBottom:10}}>{qv.cond}</div>
              <h3 style={{fontSize:18,fontWeight:700,marginBottom:4,color:'var(--ink)'}}>{qv.name}</h3>
              <p style={{fontSize:12,color:'var(--steel)',marginBottom:16}}>{qv.idol} · {qv.member} · {qv.album}</p>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:16,background:'var(--mist)',borderRadius:20,marginBottom:20}}>
                <div>
                  <div style={{fontSize:11,color:'var(--steel)',marginBottom:2}}>판매가</div>
                  <div style={{fontSize:22,fontWeight:700,color:'var(--obsidian)'}}>{qv.price.toLocaleString()}원</div>
                </div>
                <div style={{textAlign:'right'}}>
                  <div style={{fontSize:11,color:'var(--steel)',marginBottom:2}}>리뷰 수</div>
                  <div style={{display:'flex',alignItems:'center',gap:4}}>
                    <i data-lucide="star" style={{width:14,height:14,color:'var(--ember)',fill:'var(--ember)'}}></i>
                    <span style={{fontSize:16,fontWeight:700}}>{qv.rating}</span>
                    <span style={{fontSize:12,color:'var(--ash)'}}>({qv.rev})</span>
                  </div>
                </div>
              </div>

/* ── Chat Screen ── */
function ChatScreen(){
  const [msgs,setMsgs]=useState(MSGS);
  const [input,setInput]=useState('');
  const bottomRef=useRef(null);
  useLucide();

  useEffect(()=>{ bottomRef.current?.scrollIntoView({behavior:'smooth'}); },[msgs]);

  function send(){
    if(!input.trim())return;
    const m={id:Date.now(),side:'left',name:'나',av:'me',text:input,time:'방금'};
    setMsgs(p=>[...p,m]);
    setInput('');
    setTimeout(()=>setMsgs(p=>[...p,{id:Date.now()+1,side:'right',name:'카이아',av:'kaia',text:'네, 확인했습니다! 좋은 거래 되어요.',time:'방금'}]),1100);
  }

  return (
    <div className="screen" style={{display:'flex',flexDirection:'column',height:'calc(100vh - 57px)'}}>
      {/* Header */}
      <div style={{padding:'14px 20px',borderBottom:'1px solid var(--fog)',background:'var(--snow)',display:'flex',alignItems:'center',gap:12,flexShrink:0}}>
        <img src="https://source.boringavatars.com/marble/40/kaia_kpop?colors=09090b,ff5a00,ececee,3f3f46" style={{width:40,height:40,borderRadius:'50%'}} alt="카이아" />
        <div style={{flex:1}}>
          <div style={{fontSize:15,fontWeight:700,color:'var(--ink)'}}>카이아</div>
          <div style={{fontSize:12,color:'var(--steel)'}}>BTS 뷔 랜덤 포카 협의중</div>
        </div>
        <button style={{padding:8,color:'var(--slate)'}}><i data-lucide="more-horizontal" style={{width:18,height:18}}></i></button>
      </div>

      {/* Card context */}
      <div style={{padding:'10px 16px',background:'var(--mist)',borderBottom:'1px solid var(--fog)',flexShrink:0}}>
        <div style={{display:'flex',gap:10,alignItems:'center',padding:'10px 12px',background:'var(--snow)',borderRadius:16,boxShadow:'var(--shadow-card)'}}>
          <img src="https://picsum.photos/seed/kpop-pcard-1/80/107" style={{width:44,height:58,borderRadius:8,objectFit:'cover',flexShrink:0}} alt="포카" />
          <div style={{flex:1,minWidth:0}}>
            <div style={{fontSize:12,fontWeight:600,color:'var(--ink)',marginBottom:2}}>BTS · 뷔 랜덤 포카</div>
            <div style={{fontSize:13,fontWeight:700,color:'var(--obsidian)'}}>12,000원</div>
          </div>
          <div style={{fontSize:11,padding:'3px 8px',borderRadius:'var(--r-pill)',background:'rgba(245,158,11,.12)',color:'#b45309',fontWeight:600,flexShrink:0}}>협의중</div>
        </div>
      </div>

      {/* Messages */}
      <div style={{flex:1,overflowY:'auto',padding:'16px',display:'flex',flexDirection:'column',gap:10}}>
        {msgs.map((m,i)=>{
          if(m.sys)return(
            <div key={m.id} style={{textAlign:'center',animation:'fadeIn .3s ease'}}>
              <span style={{fontSize:11,color:'var(--ash)',background:'var(--fog)',padding:'4px 12px',borderRadius:'var(--r-pill)'}}>{m.text}</span>
            </div>
          );
          const isR=m.side==='right';
          return(
            <div key={m.id} style={{display:'flex',justifyContent:isR?'flex-end':'flex-start',gap:8,animation:`chatIn .2s ease ${i*.025}s both`}}>
              {!isR&&<img src={`https://source.boringavatars.com/marble/32/${m.av}?colors=09090b,ff5a00,ececee`} style={{width:30,height:30,borderRadius:'50%',flexShrink:0,marginTop:2}} alt={m.name} />}
              <div style={{maxWidth:'68%'}}>
                {!isR&&<div style={{fontSize:11,color:'var(--steel)',marginBottom:3,fontWeight:500}}>{m.name}</div>}
                <div style={{padding:'10px 14px',borderRadius:isR?'20px 20px 4px 20px':'4px 20px 20px 20px',background:isR?'var(--obsidian)':'var(--snow)',color:isR?'#fff':'var(--ink)',fontSize:14,lineHeight:1.5,border:isR?'none':'1px solid var(--fog)'}}>{m.text}</div>
                <div style={{fontSize:11,color:'var(--ash)',marginTop:3,textAlign:isR?'right':'left'}}>{m.time}</div>
              </div>
            </div>
          );
        })}
        <div ref={bottomRef} />
      </div>

      {/* Input */}
      <div style={{padding:'10px 14px',borderTop:'1px solid var(--fog)',background:'var(--snow)',display:'flex',gap:8,alignItems:'center',flexShrink:0}}>
        <button style={{padding:8,color:'var(--steel)'}}><i data-lucide="plus-circle" style={{width:20,height:20}}></i></button>
        <input value={input} onChange={e=>setInput(e.target.value)} onKeyPress={e=>e.key==='Enter'&&send()} placeholder="메시지를 입력하세요..." style={{flex:1,padding:'10px 16px',borderRadius:'var(--r-pill)',border:'1px solid var(--fog)',background:'var(--mist)',fontSize:14,color:'var(--ink)',outline:'none'}} />
        <button onClick={send} style={{width:36,height:36,borderRadius:'50%',background:input.trim()?'var(--obsidian)':'var(--fog)',display:'flex',alignItems:'center',justifyContent:'center',transition:'background .15s'}}>
          <i data-lucide="send" style={{width:15,height:15,color:input.trim()?'#fff':'var(--ash)'}}></i>
        </button>
      </div>
    </div>
  );
}
