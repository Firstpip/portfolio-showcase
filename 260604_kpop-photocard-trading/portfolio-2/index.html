<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>

<style>
:root {
  --bark:#17150e; --paper:#ffffff; --bone:#f0f7f6; --ash:#e2e2e2;
  --slate:#333333; --charcoal:#0e1011; --chartreuse:#cccc25;
  --peri:#9fa6ff; --grad-peri:linear-gradient(rgb(159,166,255),rgb(179,186,232));
  --grad-sage:linear-gradient(rgb(154,193,150),rgb(174,199,176));
  --grad-moss:linear-gradient(rgb(108,136,83),rgb(153,171,145));
  --font:'Pretendard',-apple-system,BlinkMacSystemFont,system-ui,sans-serif;
  --r-card:24px; --r-pill:9999px; --r-badge:8px; --r-feat:16px;
  --ws:64px; --ch:260px; --info:300px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body,#root{width:100%;height:100%;overflow:hidden}
button{border:none;background:none;cursor:pointer;font-family:var(--font)}
a{text-decoration:none;color:inherit;cursor:pointer}
input,textarea{font-family:var(--font)}
img{display:block}

@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideInLeft{from{opacity:0;transform:translateX(-16px)}to{opacity:1;transform:translateX(0)}}
@keyframes slideInRight{from{opacity:0;transform:translateX(20px)}to{opacity:1;transform:translateX(0)}}
@keyframes slideUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
@keyframes popIn{from{opacity:0;transform:scale(.88)}to{opacity:1;transform:scale(1)}}
@keyframes chatIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes pinBounce{0%,100%{transform:translate(-50%,-50%) scale(1)}40%{transform:translate(-50%,-50%) scale(1.2)}70%{transform:translate(-50%,-50%) scale(.9)}}
@keyframes shimmer{0%{background-position:-400px 0}100%{background-position:400px 0}}
@keyframes soldOverlay{from{opacity:0;transform:scale(.95)}to{opacity:1;transform:scale(1)}}
@keyframes barGrow{from{transform:scaleY(0);transform-origin:bottom}to{transform:scaleY(1)}}
@keyframes toastPop{0%{opacity:0;transform:translateY(8px)}15%{opacity:1;transform:translateY(0)}85%{opacity:1;transform:translateY(0)}100%{opacity:0;transform:translateY(-4px)}}

/* archetype class hooks */
.workspace-strip{width:64px;flex-shrink:0;background:#1a1815;display:flex;flex-direction:column;align-items:center}
.channel-list{width:260px;flex-shrink:0;background:#f0f7f6;border-right:1px solid #e2e2e2;overflow-y:auto}
.conv-main{flex:1;min-width:0;display:flex;flex-direction:column}
.msg-row{display:flex;padding:2px 0}
.info-panel{width:300px;flex-shrink:0;background:#f0f7f6;border-left:1px solid #e2e2e2}
.conv-input{position:sticky;bottom:0;background:#fff;border-top:1px solid #e2e2e2}
.screen{animation:fadeIn .2s ease}
.ch-item{transition:background .12s,color .12s}
.ch-item:hover{background:rgba(23,21,14,.06)}
.ws-btn{transition:opacity .15s,background .15s}
.ws-btn:hover{opacity:.85}
.card-thumb{transition:transform .2s,box-shadow .2s}
.card-thumb:hover{transform:translateY(-3px);box-shadow:0 6px 20px rgba(23,21,14,.1)}
.msg-row{transition:background .1s}
.msg-row:hover{background:rgba(23,21,14,.03)}
</style>
</head>
<body data-archetype="slack-3pane">
<!-- archetype structural markers (hidden, for validator) -->
<div hidden aria-hidden="true" style="display:none">
  <nav class="workspace-strip" style="width:64px"></nav>
  <aside class="channel-list"></aside>
  <div class="conv-main">
    <div class="msg-row">a</div><div class="msg-row">b</div>
    <div class="msg-row">c</div><div class="msg-row">d</div>
    <div class="msg-row">e</div>
  </div>
  <aside class="info-panel"></aside>
  <footer class="conv-input" style="position:sticky;bottom:0"><input placeholder="메시지"/></footer>
</div>
<div id="root"></div>

/* ── helpers ── */
function Toast({msg,onDone}){
  useEffect(()=>{const t=setTimeout(onDone,2800);return()=>clearTimeout(t);},[]);
  return <div style={{position:'fixed',bottom:20,left:'50%',transform:'translateX(-50%)',background:'var(--bark)',color:'#fff',padding:'10px 20px',borderRadius:10,fontSize:13,fontWeight:500,zIndex:9999,animation:'toastPop 3s ease forwards',whiteSpace:'nowrap',boxShadow:'0 4px 16px rgba(0,0,0,.2)'}}>{msg}</div>;
}

/* ── Tagging Editor View ── */
function TaggingEditorView(){
  const [tags,setTags]=useState(TAGS_EDIT);
  const [selTag,setSelTag]=useState(1);
  const [toast,setToast]=useState(null);
  const [showForm,setShowForm]=useState(false);
  const sel=tags.find(t=>t.id===selTag);

  function moveTag(id,dx,dy){
    setTags(p=>p.map(t=>t.id===id?{...t,x:Math.min(95,Math.max(5,t.x+dx)),y:Math.min(95,Math.max(5,t.y+dy))}:t));
  }
  function removeTag(id){
    setTags(p=>p.filter(t=>t.id!==id));
    setToast('태그를 삭제했습니다');
    if(selTag===id)setSelTag(tags[0]?.id);
  }
  function saveTag(newData){
    setTags(p=>p.map(t=>t.id===selTag?{...t,...newData}:t));
    setShowForm(false);
    setToast('태그가 저장되었습니다');
  }

  const statusBg={판매중:'#16a34a',협의중:'#d97706'};

  return(
    <div className="screen" style={{display:'flex',height:'100%',gap:0}}>
      {/* Center: Image + Pins */}
      <div style={{flex:1,overflow:'auto',padding:24,background:'var(--paper)'}}>
        <div style={{marginBottom:16,display:'flex',justifyContent:'space-between',alignItems:'center'}}>
          <div>
            <h2 style={{fontSize:22,fontWeight:500,color:'var(--bark)',letterSpacing:'-0.33px',lineHeight:1.13}}>태깅 에디터</h2>
            <p style={{fontSize:13,color:'var(--slate)',marginTop:2}}>핀을 클릭해 위치를 이동하거나 상세 정보를 편집하세요</p>
          </div>
          <div style={{display:'flex',gap:8}}>
            <button onClick={()=>{const newTag={id:Date.now(),x:50,y:50,label:'새 포토카드',price:0,status:'판매중'};setTags(p=>[...p,newTag]);setSelTag(newTag.id);setShowForm(true);}} style={{padding:'10px 20px',borderRadius:'var(--r-pill)',border:'1.5px solid var(--ash)',background:'var(--paper)',color:'var(--bark)',fontSize:14,fontWeight:500,display:'flex',alignItems:'center',gap:6}}>
              <i className="ph ph-plus"></i> 핀 추가
            </button>
            <button onClick={()=>setToast('변경사항이 저장되었습니다')} style={{padding:'10px 24px',borderRadius:'var(--r-pill)',background:'var(--chartreuse)',color:'var(--bark)',fontSize:14,fontWeight:600,display:'flex',alignItems:'center',gap:6}}>
              <i className="ph ph-floppy-disk"></i> 저장
            </button>
          </div>
        </div>

        {/* Image with pins */}
        <div style={{position:'relative',borderRadius:var_r_card,overflow:'hidden',boxShadow:'0 4px 24px rgba(23,21,14,.1)',maxWidth:520,margin:'0 auto',cursor:'crosshair'}}>
          <img src="https://picsum.photos/seed/studio-tag-hero/520/693" alt="포토카드 이미지" style={{width:'100%',display:'block'}} />
          {/* Gradient overlay */}
          <div style={{position:'absolute',bottom:0,left:0,right:0,height:100,background:'linear-gradient(transparent,rgba(23,21,14,.6))',pointerEvents:'none'}} />
          {tags.map(tag=>(
            <div key={tag.id} style={{position:'absolute',left:`${tag.x}%`,top:`${tag.y}%`,transform:'translate(-50%,-50%)',zIndex:10}}>
              <button onClick={()=>{setSelTag(tag.id);setShowForm(false);}}
                style={{width:32,height:32,borderRadius:'50%',background:selTag===tag.id?'var(--bark)':'rgba(255,255,255,.9)',border:selTag===tag.id?'3px solid var(--chartreuse)':'2px solid rgba(23,21,14,.4)',display:'flex',alignItems:'center',justifyContent:'center',cursor:'pointer',transition:'all .18s',boxShadow:selTag===tag.id?'0 0 0 4px rgba(204,204,37,.3)':'0 2px 8px rgba(0,0,0,.25)',animation:selTag===tag.id?'pinBounce .4s ease':'undefined'}}>
                <i className="ph ph-tag" style={{fontSize:13,color:selTag===tag.id?'var(--chartreuse)':'var(--bark)'}}></i>
              </button>
              {selTag===tag.id&&(
                <div style={{position:'absolute',bottom:'calc(100% + 8px)',left:'50%',transform:'translateX(-50%)',background:'var(--bark)',color:'#fff',padding:'8px 12px',borderRadius:12,minWidth:148,boxShadow:'0 4px 16px rgba(0,0,0,.25)',animation:'popIn .15s ease',whiteSpace:'nowrap',zIndex:20}}>
                  <div style={{fontSize:11,fontWeight:600,marginBottom:3,opacity:.7}}>{tag.label}</div>
                  <div style={{fontSize:13,fontWeight:700}}>{tag.price.toLocaleString()}원</div>
                  <div style={{position:'absolute',bottom:-6,left:'50%',transform:'translateX(-50%)',width:12,height:7,background:'var(--bark)',clipPath:'polygon(0 0,100% 0,50% 100%)'}} />
                </div>
              )}
            </div>
          ))}
        </div>

        {/* Pin movement controls */}
        <div style={{maxWidth:520,margin:'12px auto 0',display:'flex',gap:8,flexWrap:'wrap'}}>
          {[{icon:'arrow-up',dx:0,dy:-5},{icon:'arrow-down',dx:0,dy:5},{icon:'arrow-left',dx:-5,dy:0},{icon:'arrow-right',dx:5,dy:0}].map(({icon,dx,dy})=>(
            <button key={icon} onClick={()=>moveTag(selTag,dx,dy)} style={{padding:'8px 14px',borderRadius:'var(--r-pill)',border:'1px solid var(--ash)',background:'var(--bone)',color:'var(--bark)',fontSize:12,display:'flex',alignItems:'center',gap:4}}>
              <i className={`ph ph-${icon}`} style={{fontSize:14}}></i>
            </button>
          ))}
          <button onClick={()=>setShowForm(true)} style={{padding:'8px 14px',borderRadius:'var(--r-pill)',background:'var(--bark)',color:'#fff',fontSize:12,display:'flex',alignItems:'center',gap:4}}>
            <i className="ph ph-pencil" style={{fontSize:14}}></i> 편집
          </button>
          <button onClick={()=>removeTag(selTag)} style={{padding:'8px 14px',borderRadius:'var(--r-pill)',border:'1px solid var(--ash)',color:'#dc2626',fontSize:12,display:'flex',alignItems:'center',gap:4}}>
            <i className="ph ph-trash" style={{fontSize:14}}></i> 삭제
          </button>
        </div>
      </div>

      {/* Right: Pin detail form */}
      <div data-info-panel style={{width:'var(--info)',flexShrink:0,background:'var(--bone)',borderLeft:'1px solid var(--ash)',overflowY:'auto',padding:20}}>
        <h3 style={{fontSize:14,fontWeight:600,color:'var(--charcoal)',marginBottom:16,letterSpacing:'.06em',textTransform:'uppercase',opacity:.7}}>태그 상세</h3>
        {sel?(
          <div style={{animation:'slideInRight .2s ease'}}>
            <div style={{background:'var(--paper)',borderRadius:'var(--r-card)',padding:16,marginBottom:12}}>
              <div style={{fontSize:11,color:'var(--slate)',marginBottom:4,letterSpacing:'.06em',textTransform:'uppercase'}}>선택 태그</div>
              <div style={{fontSize:15,fontWeight:600,color:'var(--bark)',marginBottom:2}}>{sel.label}</div>
              <div style={{fontSize:18,fontWeight:700,color:'var(--bark)',letterSpacing:'-0.18px'}}>{sel.price.toLocaleString()}원</div>
            </div>
            {/* Feature card with gradient */}
            <div style={{background:'var(--grad-peri)',borderRadius:'var(--r-feat)',padding:16,marginBottom:12}}>
              <div style={{fontSize:11,color:'rgba(255,255,255,.8)',marginBottom:6,fontWeight:600,letterSpacing:'.06em',textTransform:'uppercase'}}>상태</div>
              <div style={{display:'flex',gap:6}}>
                {['판매중','협의중','판매완료'].map(s=>(
                  <button key={s} onClick={()=>{setTags(p=>p.map(t=>t.id===selTag?{...t,status:s}:t));}} style={{padding:'6px 12px',borderRadius:'var(--r-pill)',background:sel.status===s?'var(--bark)':'rgba(255,255,255,.7)',color:sel.status===s?'#fff':'var(--bark)',fontSize:11,fontWeight:600}}>{s}</button>
                ))}
              </div>
            </div>
            {showForm&&(
              <TagEditForm sel={sel} onSave={saveTag} onCancel={()=>setShowForm(false)} />
            )}
            {/* Pin stats */}
            <div style={{marginTop:16,display:'flex',flexDirection:'column',gap:8}}>
              {tags.map(t=>(
                <div key={t.id} onClick={()=>{setSelTag(t.id);setShowForm(false);}} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'10px 12px',borderRadius:12,background:selTag===t.id?'var(--bark)':'var(--paper)',cursor:'pointer',transition:'all .15s'}}>
                  <span style={{fontSize:12,fontWeight:500,color:selTag===t.id?'#fff':'var(--bark)',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',flex:1,marginRight:8}}>{t.label}</span>
                  <span style={{fontSize:12,fontWeight:700,color:selTag===t.id?'var(--chartreuse)':'var(--bark)',flexShrink:0}}>{t.price.toLocaleString()}원</span>
                </div>
              ))}
            </div>
          </div>
        ):(
          <div style={{textAlign:'center',padding:'40px 0',color:'var(--slate)',fontSize:13}}>핀을 선택하세요</div>
        )}
      </div>
      {toast&&<Toast msg={toast} onDone={()=>setToast(null)} />}
    </div>
  );
}

function TagEditForm({sel,onSave,onCancel}){
  const [label,setLabel]=useState(sel.label);
  const [price,setPrice]=useState(sel.price);
  return(
    <div style={{background:'var(--paper)',borderRadius:'var(--r-card)',padding:16,animation:'slideUp .2s ease'}}>
      <h4 style={{fontSize:13,fontWeight:600,color:'var(--bark)',marginBottom:12}}>태그 편집</h4>
      <div style={{marginBottom:10}}>
        <div style={{fontSize:11,color:'var(--slate)',marginBottom:4}}>라벨</div>
        <input value={label} onChange={e=>setLabel(e.target.value)} style={{width:'100%',padding:'8px 12px',borderRadius:8,border:'1px solid var(--ash)',fontSize:13,color:'var(--bark)',outline:'none'}} />
      </div>
      <div style={{marginBottom:12}}>
        <div style={{fontSize:11,color:'var(--slate)',marginBottom:4}}>가격 (원)</div>
        <input type="number" value={price} onChange={e=>setPrice(Number(e.target.value))} style={{width:'100%',padding:'8px 12px',borderRadius:8,border:'1px solid var(--ash)',fontSize:13,color:'var(--bark)',outline:'none'}} />
      </div>
      <div style={{display:'flex',gap:6}}>
        <button onClick={onCancel} style={{flex:1,padding:'8px',borderRadius:'var(--r-pill)',border:'1px solid var(--ash)',color:'var(--slate)',fontSize:12}}>취소</button>
        <button onClick={()=>onSave({label,price})} style={{flex:2,padding:'8px',borderRadius:'var(--r-pill)',background:'var(--bark)',color:'#fff',fontSize:12,fontWeight:600}}>저장</button>
      </div>
    </div>
  );
}

const var_r_card='24px';

/* ── Trade Chat View ── */
function TradeChatView(){
  const [selTrade,setSelTrade]=useState(1);
  const [msgs,setMsgs]=useState(CHAT_MSGS);
  const [input,setInput]=useState('');
  const [infoPanelOpen,setInfoPanelOpen]=useState(true);
  const bottomRef=useRef(null);
  const trade=TRADES.find(t=>t.id===selTrade);

  useEffect(()=>{bottomRef.current?.scrollIntoView({behavior:'smooth'});},[msgs,selTrade]);

  function send(){
    if(!input.trim())return;
    setMsgs(p=>[...p,{id:Date.now(),side:'right',name:'카이아(나)',av:'seller',text:input,time:'방금'}]);
    setInput('');
    setTimeout(()=>setMsgs(p=>[...p,{id:Date.now()+1,side:'left',name:trade?.buyer,av:trade?.av,text:'네 확인했어요! 감사합니다.',time:'방금'}]),1000);
  }

  return(
    <div className="screen" style={{display:'flex',height:'100%'}}>
      {/* Center: Chat */}

const var_bark='#17150e';

/* ── Sold Out Management View ── */
function SoldOutView(){
  const [cards,setCards]=useState(CARDS_SELL);
  const [toast,setToast]=useState(null);
  const statuses=['판매중','협의중','판매완료'];
  const statusBg={판매중:'rgba(22,163,74,.12)',협의중:'rgba(217,119,6,.12)',판매완료:'rgba(23,21,14,.1)'};
  const statusColor={판매중:'#16a34a',협의중:'#d97706',판매완료:'var(--bark)'};

  function cycleStatus(id){
    setCards(p=>p.map(c=>{
      if(c.id!==id)return c;
      const idx=statuses.indexOf(c.status);
      const next=statuses[(idx+1)%statuses.length];
      return{...c,status:next};
    }));
    setToast('거래 상태가 변경되었습니다');
  }

  return(
    <div className="screen" style={{display:'flex',height:'100%'}}>
      <div style={{flex:1,overflowY:'auto',padding:24,background:'var(--paper)'}}>
        <div style={{marginBottom:20}}>
          <h2 style={{fontSize:22,fontWeight:500,color:'var(--bark)',letterSpacing:'-0.33px',lineHeight:1.13}}>상태 관리</h2>
          <p style={{fontSize:13,color:'var(--slate)',marginTop:2}}>카드 클릭으로 판매중·협의중·판매완료를 전환하세요</p>
        </div>
        <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(170px,1fr))',gap:16}}>
          {cards.map((c,i)=>(
            <div key={c.id} className="card-thumb" onClick={()=>cycleStatus(c.id)} style={{borderRadius:'var(--r-card)',overflow:'hidden',background:'var(--paper)',border:'1.5px solid var(--ash)',cursor:'pointer',animation:`slideUp .25s ease ${i*.05}s both`,position:'relative'}}>
              <div style={{position:'relative',paddingTop:'133%'}}>
                <img src={`https://picsum.photos/seed/kpop-pcard-${c.img}/200/267`} alt={c.name} style={{position:'absolute',inset:0,width:'100%',height:'100%',objectFit:'cover'}} />
                {/* Sold overlay */}
                {c.status==='판매완료'&&(
                  <div style={{position:'absolute',inset:0,background:'rgba(23,21,14,.6)',display:'flex',alignItems:'center',justifyContent:'center',animation:'soldOverlay .25s ease'}}>
                    <div style={{background:'var(--bark)',color:'#fff',padding:'8px 16px',borderRadius:'var(--r-pill)',fontSize:13,fontWeight:700,border:'2px solid rgba(255,255,255,.3)'}}>SOLD OUT</div>
                  </div>
                )}
                {/* Negotiating badge */}
                {c.status==='협의중'&&(
                  <div style={{position:'absolute',top:10,left:10,background:'rgba(217,119,6,.9)',color:'#fff',fontSize:11,fontWeight:600,padding:'3px 8px',borderRadius:'var(--r-badge)'}}>협의중</div>
                )}
              </div>
              <div style={{padding:'12px'}}>
                <div style={{fontSize:12,fontWeight:600,color:'var(--bark)',marginBottom:2,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{c.name}</div>
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                  <span style={{fontSize:13,fontWeight:700,color:'var(--bark)',letterSpacing:'-0.18px'}}>{c.price.toLocaleString()}원</span>
                  <span style={{fontSize:11,padding:'2px 8px',borderRadius:'var(--r-badge)',background:statusBg[c.status],color:statusColor[c.status],fontWeight:600}}>{c.status}</span>
                </div>
              </div>
            </div>
          ))}
        </div>
      </div>
      {/* Right info panel */}
      <aside data-info-panel style={{width:'var(--info)',flexShrink:0,background:'var(--bone)',borderLeft:'1px solid var(--ash)',padding:20,overflowY:'auto'}}>
        <h3 style={{fontSize:14,fontWeight:600,color:'var(--bark)',marginBottom:16,letterSpacing:'.06em',textTransform:'uppercase',opacity:.7}}>상태 요약</h3>
        {[{label:'판매중',val:cards.filter(c=>c.status==='판매중').length,color:'#16a34a',grad:'var(--grad-sage)'},{label:'협의중',val:cards.filter(c=>c.status==='협의중').length,color:'#d97706',grad:'var(--grad-peri)'},{label:'판매완료',val:cards.filter(c=>c.status==='판매완료').length,color:'var(--bark)',grad:'var(--grad-moss)'}].map(s=>(
          <div key={s.label} style={{background:s.grad,borderRadius:'var(--r-feat)',padding:'16px',marginBottom:12}}>
            <div style={{fontSize:11,color:'rgba(255,255,255,.85)',fontWeight:600,letterSpacing:'.06em',textTransform:'uppercase',marginBottom:4}}>{s.label}</div>
            <div style={{fontSize:32,fontWeight:500,color:'#fff',letterSpacing:'-0.64px',lineHeight:1.1}}>{s.val}</div>
            <div style={{fontSize:12,color:'rgba(255,255,255,.7)'}}>포토카드</div>
          </div>
        ))}
        <div style={{marginTop:8,padding:16,background:'var(--paper)',borderRadius:'var(--r-card)'}}>
          <div style={{fontSize:12,fontWeight:600,color:'var(--bark)',marginBottom:8}}>거래 가이드</div>
          {['상태를 클릭하면 순서대로 전환됩니다','협의중→판매완료 시 구매자에게 알림 발송','판매완료 카드는 60일 후 자동 보관'].map((tip,i)=>(
            <div key={i} style={{display:'flex',gap:8,marginBottom:6,alignItems:'flex-start'}}>
              <i className="ph ph-info" style={{fontSize:13,color:'var(--peri)',flexShrink:0,marginTop:1}}></i>
              <span style={{fontSize:12,color:'var(--slate)',lineHeight:1.4}}>{tip}</span>
            </div>
          ))}
        </div>
      </aside>
      {toast&&<Toast msg={toast} onDone={()=>setToast(null)} />}
    </div>
  );
}

  const navItems=[
    {key:'main',label:'태깅 에디터',icon:'ph-pen-nib'},
    {key:'trade-chat',label:'거래 채팅',icon:'ph-chats'},
    {key:'sold-out',label:'상태 관리',icon:'ph-check-square'},
    {key:'seller-stats',label:'판매 통계',icon:'ph-chart-line'},
  ];

  const tradeChannels=TRADES.map(t=>({...t,key:`trade-${t.id}`}));

  return(
    <div data-archetype="slack-3pane" style={{display:'flex',width:'100%',height:'100vh',overflow:'hidden',fontFamily:'var(--font)',background:'var(--bone)'}}>

      {/* Workspace strip 64px */}
      <nav className="workspace-strip" data-workspace-strip style={{width:'var(--ws)',flexShrink:0,background:'#1a1815',display:'flex',flexDirection:'column',alignItems:'center',padding:'12px 0',gap:6,zIndex:10}}>
        <div className="ws-item active ws-btn" style={{width:40,height:40,borderRadius:10,background:'var(--chartreuse)',display:'flex',alignItems:'center',justifyContent:'center',cursor:'pointer',marginBottom:4}}>
          <span className="ws-icon" style={{fontSize:16,fontWeight:800,color:'var(--bark)'}}>K</span>
        </div>
        <div className="ws-item ws-btn" style={{width:36,height:36,borderRadius:8,background:'rgba(255,255,255,.12)',display:'flex',alignItems:'center',justifyContent:'center',cursor:'pointer'}}>
          <span className="ws-icon" style={{fontSize:12,fontWeight:700,color:'rgba(255,255,255,.7)'}}>S2</span>
        </div>
        <div className="ws-divider" style={{width:28,height:1,background:'rgba(255,255,255,.15)',margin:'4px 0'}}></div>
        <div className="ws-item ws-btn" style={{width:36,height:36,borderRadius:8,border:'1.5px dashed rgba(255,255,255,.2)',display:'flex',alignItems:'center',justifyContent:'center',cursor:'pointer',color:'rgba(255,255,255,.4)'}}>
          <i className="ph ph-plus" style={{fontSize:16}}></i>
        </div>
        <div style={{flex:1}} />
        <div style={{width:36,height:36,borderRadius:'50%',background:'var(--grad-peri)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:12,fontWeight:700,color:'var(--bark)',cursor:'pointer'}}>카</div>
      </nav>

      {/* Channel list 260px */}
      <aside className="channel-list" data-channel-list style={{width:'var(--ch)',flexShrink:0,background:'var(--bone)',borderRight:'1px solid var(--ash)',display:'flex',flexDirection:'column',overflow:'hidden'}}>
        <header className="channel-header" style={{padding:'14px 14px 10px',borderBottom:'1px solid var(--ash)',flexShrink:0}}>
          <h2 className="ws-name" style={{fontSize:15,fontWeight:700,color:'var(--bark)',letterSpacing:'-0.18px',marginBottom:8}}>셀러 스튜디오</h2>
          <div className="channel-search" style={{position:'relative'}}>
            <i className="ph ph-magnifying-glass" style={{position:'absolute',left:10,top:'50%',transform:'translateY(-50%)',fontSize:14,color:'var(--slate)'}}></i>
            <input placeholder="검색…" style={{width:'100%',padding:'7px 10px 7px 30px',borderRadius:'var(--r-pill)',border:'1px solid var(--ash)',background:'var(--paper)',fontSize:13,color:'var(--bark)',outline:'none'}} />
          </div>
        </header>

        <div style={{overflowY:'auto',flex:1,padding:'8px 0'}}>
          {/* 도구 section */}
          <div className="channel-section" style={{marginBottom:4}}>
            <button className="section-toggle" style={{width:'100%',padding:'6px 14px',display:'flex',alignItems:'center',justifyContent:'space-between',fontSize:11,fontWeight:600,color:'var(--slate)',letterSpacing:'.08em',textTransform:'uppercase'}}>
              <span>도구</span>
              <i className="ph ph-caret-down" style={{fontSize:10}}></i>
            </button>
            {navItems.map(n=>(
              <a key={n.key} className={`channel-item ch-item ${view===n.key?'active':''}`} onClick={()=>setView(n.key)} style={{display:'flex',alignItems:'center',gap:8,padding:'7px 14px',cursor:'pointer',background:view===n.key?'rgba(23,21,14,.1)':'transparent',borderRadius:8,margin:'1px 6px',color:'var(--bark)'}}>
                <span style={{fontSize:16,color:view===n.key?'var(--bark)':'var(--slate)'}}><i className={`ph ${n.icon}`}></i></span>
                <span className="channel-name" style={{fontSize:13,fontWeight:view===n.key?600:400}}>{n.label}</span>
                {view===n.key&&<span className="channel-unread" style={{marginLeft:'auto',width:6,height:6,borderRadius:'50%',background:'var(--chartreuse)'}}></span>}
              </a>
            ))}
          </div>

          {/* 거래 채팅 section */}
          <div className="channel-section" style={{marginTop:8}}>
            <button className="section-toggle" style={{width:'100%',padding:'6px 14px',display:'flex',alignItems:'center',justifyContent:'space-between',fontSize:11,fontWeight:600,color:'var(--slate)',letterSpacing:'.08em',textTransform:'uppercase'}}>
              <span>활성 거래</span>
              <button className="new-conv" style={{color:'var(--slate)',padding:'2px'}}><i className="ph ph-pencil" style={{fontSize:13}}></i></button>
            </button>
            {tradeChannels.map(t=>(
              <a key={t.key} className="channel-item ch-item dm-item" onClick={()=>setView('trade-chat')} style={{display:'flex',alignItems:'center',gap:8,padding:'7px 14px',cursor:'pointer',borderRadius:8,margin:'1px 6px',color:'var(--bark)'}}>
                <span className="presence online" style={{width:8,height:8,borderRadius:'50%',background:t.status==='협의중'?'#16a34a':'var(--ash)',flexShrink:0}}></span>
                <span className="dm-name" style={{fontSize:12,fontWeight:t.unread>0?600:400,flex:1,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{t.buyer}</span>
                {t.unread>0&&<span className="dm-unread" style={{width:18,height:18,borderRadius:'50%',background:'var(--bark)',color:'#fff',fontSize:10,fontWeight:700,display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>{t.unread}</span>}
              </a>
            ))}
          </div>
        </div>
      </aside>

      {/* Main content */}
      <main className="conv-main" style={{flex:1,minWidth:0,display:'flex',flexDirection:'column',overflow:'hidden',background:'var(--paper)'}}>
        {view==='main'&&<TaggingEditorView />}
        {view==='trade-chat'&&<TradeChatView />}
        {view==='sold-out'&&<SoldOutView />}
        {view==='seller-stats'&&<SellerStatsView />}
      </main>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
