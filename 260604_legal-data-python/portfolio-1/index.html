    function HtmlParserView() {

              <span className="badge">{parserRules.length}</span>
            </div>
            {parserRules.map((r,i)=>(
              <div key={r.id} className={`rule-card ${active===i?'active':''}`} onClick={()=>setActive(i)}>
                <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:6}}>
                  <span className="rule-name">{r.name}</span>
                  <span className={`chip ${r.active?'chip-green':'chip-gray'}`}>{r.active?'활성':'비활성'}</span>

                  <div className="progress-bar">
                    <div className="progress-fill" style={{width:`${r.ok}%`,background:r.ok>97?'#22c55e':'#1b61c9'}}/>
                  </div>

            <div className="section-hdr">

            </div>
            <div className="card" style={{marginBottom:14}}>
              <div style={{fontSize:13,fontWeight:700,color:'#040e20',marginBottom:12}}>파싱 규칙 설정 (Python)</div>
              <div className="code-block">
<pre>{`# ${parserRules[active].name}
RULE = {
    "source": "${parserRules[active].name}",

            <div className="card">
              <div style={{fontSize:13,fontWeight:700,color:'#040e20',marginBottom:14}}>파싱 결과 미리보기</div>
              <div className="split-view">
                <div>
                  <div className="split-label">원문 HTML (법제처 샘플)</div>
                  <div className="code-block" style={{fontSize:11}}>
<pre>{`<div class="lawText">
  <div class="article"
       id="art750">

                  </div>
                </div>
                <div>
                  <div className="split-label">파싱 결과 (JSON)</div>

<pre>{`{
  "law_name": "민법",
  "article_no": "제750조",
  "article_title":
    "(불법행위의 내용)",

    function PdfParserView() {
      const [filter, setFilter] = useState('전체');
      const tabs = ['전체','성공','실패','대기'];
      const filtered = filter==='전체' ? pdfFiles : pdfFiles.filter(f=>
        filter==='성공'?f.st==='success':filter==='실패'?f.st==='error':f.st==='pending'
      );
      return (
        <div className="fade-up">
          <div className="tab-row">
            {tabs.map(t=>(
              <button key={t} className="tab-btn" onClick={()=>setFilter(t)} style={{
                borderColor:filter===t?'#1b61c9':'#e0e2e6',
                background:filter===t?'#e8f0fd':'#fff',
                color:filter===t?'#1b61c9':'#41454d',
              }}>{t}</button>
            ))}
            <div style={{marginLeft:'auto',display:'flex',gap:10}}>
              <button className="btn btn-outline" style={{fontSize:13}}>필터</button>
              <button className="btn btn-dark" style={{fontSize:13}}>일괄 재처리</button>
            </div>
          </div>
          <div className="card" style={{marginBottom:16}}>
            <table>
              <thead>
                <tr>
                  <th>파일명</th><th>상태</th><th>추출 필드</th><th>크기</th><th>처리 시각</th>
                </tr>
              </thead>
              <tbody>
                {filtered.map((f,i)=>(
                  <tr key={i}>
                    <td><span style={{fontWeight:600,color:'#040e20'}}>{f.name}</span></td>
                    <td>
                      <span className={`chip ${f.st==='success'?'chip-green':f.st==='error'?'chip-red':'chip-yellow'}`}>
                        {f.st==='success'?'성공':f.st==='error'?'오류':'대기'}
                      </span>
                    </td>
                    <td>{f.st==='success'?`${f.f}개 필드`:'—'}</td>
                    <td style={{color:'#9297a0'}}>{f.sz}</td>
                    <td style={{color:'#9297a0'}}>{f.t!=='-'?`오늘 ${f.t}`:'-'}</td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
          <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:14}}>
            {[
              {lbl:'추출 성공', cnt:pdfFiles.filter(f=>f.st==='success').length, bg:'#dcfce7', c:'#166534'},
              {lbl:'추출 오류', cnt:pdfFiles.filter(f=>f.st==='error').length, bg:'#fee2e2', c:'#b91c1c'},
              {lbl:'처리 대기', cnt:pdfFiles.filter(f=>f.st==='pending').length, bg:'#fef9c3', c:'#854d0e'},
            ].map((s,i)=>(
              <div key={i} style={{background:s.bg,borderRadius:13,padding:'14px 18px',display:'flex',alignItems:'center',gap:14}}>
                <span style={{fontSize:26,fontWeight:800,color:s.c}}>{s.cnt}</span>
                <span style={{fontSize:13,fontWeight:700,color:s.c}}>PDF {s.lbl}</span>
              </div>
            ))}
          </div>
        </div>
      );
    }

    function DataPipelineView() {
      const stages = [
        {name:'데이터 소스', desc:'law.go.kr / PDF 업로드', e:'🌐', bg:'#e8f0fd'},
        {name:'파싱 엔진', desc:'BeautifulSoup / pdfplumber', e:'⚙️', bg:'#fff7ed'},
        {name:'정규화', desc:'Pydantic 스키마 검증', e:'🔄', bg:'#f0fdf4'},
        {name:'PostgreSQL', desc:'ORM 배치 적재 / UPSERT', e:'🗄️', bg:'#fdf4ff'},
        {name:'대시보드', desc:'React Query 폴링', e:'📊', bg:'#faf5e8'},
      ];
      return (
        <div className="fade-up">
          <div className="pipeline-flow">
            {stages.map((s,i)=>(
              <React.Fragment key={i}>
                <div className="pipe-stage">
                  <div className="pipe-icon" style={{background:s.bg}}>{s.e}</div>
                  <div className="pipe-name">{s.name}</div>
                  <div className="pipe-desc">{s.desc}</div>
                </div>
                {i<stages.length-1 && <div className="pipe-arrow">→</div>}
              </React.Fragment>
            ))}
          </div>
          <div className="card">
            <div className="section-hdr">
              <div className="section-title">배치 처리 이력</div>
              <button className="btn btn-dark" style={{fontSize:13}}>새 배치 실행</button>
            </div>
            <table>
              <thead>
                <tr><th>배치 ID</th><th>소스</th><th>총 건수</th><th>성공</th><th>실패</th><th>상태</th><th>소요시간</th><th>시작시각</th></tr>
              </thead>
              <tbody>
                {batches.map((b,i)=>(
                  <tr key={i}>
                    <td><span style={{fontFamily:'monospace',fontWeight:700,color:'#1b61c9'}}>{b.id}</span></td>
                    <td><span className="tag tag-blue">{b.src}</span></td>
                    <td style={{fontWeight:700}}>{b.total}</td>
                    <td style={{color:'#166534',fontWeight:700}}>{b.ok}</td>
                    <td style={{color:b.fail>0?'#b91c1c':'#9297a0',fontWeight:b.fail>0?700:400}}>{b.fail>0?b.fail:'—'}</td>
                    <td><span className="chip chip-green">완료</span></td>
                    <td style={{color:'#9297a0',fontFamily:'monospace',fontSize:12}}>{b.dur}</td>
                    <td style={{color:'#9297a0'}}>오늘 {b.t}</td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        </div>
      );
    }

    const navItems = [
      {key:'파싱 현황 대시보드', icon:icons.dash, label:'파싱 현황 대시보드'},
      {key:'HTML 법령 파싱', icon:icons.html, label:'HTML 법령 파싱'},
      {key:'PDF 추출 모듈', icon:icons.pdf, label:'PDF 추출 모듈'},
      {key:'데이터 적재 파이프라인', icon:icons.db, label:'데이터 적재 파이프라인'},
    ];

    const pageInfo = {
      '파싱 현황 대시보드':{title:'파싱 현황 대시보드',sub:'실시간 파이프라인 모니터링 — 5초 자동 갱신'},
      'HTML 법령 파싱':{title:'HTML 법령 파싱 엔진',sub:'소스별 파싱 규칙 관리 및 실시간 미리보기'},
      'PDF 추출 모듈':{title:'PDF 텍스트 추출 모듈',sub:'판례 PDF 처리 현황 및 추출 결과 검증'},
      '데이터 적재 파이프라인':{title:'데이터 정규화 및 DB 적재',sub:'배치 처리 이력 및 파이프라인 흐름 시각화'},
    };

    function App() {
      const [nav, setNav] = useState('파싱 현황 대시보드');
      const [toast, setToast] = useState(null);
      const showToast = (msg) => { setToast(msg); setTimeout(() => setToast(null), 3000); };
      const view = nav==='파싱 현황 대시보드'?<DashboardView/>
        :nav==='HTML 법령 파싱'?<HtmlParserView/>
        :nav==='PDF 추출 모듈'?<PdfParserView/>
        :<DataPipelineView/>;
      return (
        <div className="app">
          {toast && (
            <div className="toast-wrap">
              <div className="toast">
                <div className="toast-icon">✓</div>
                {toast}
              </div>
            </div>
          )}
          <aside className="sidebar">
            <div className="logo-area">
              <div className="logo-row">
                <div className="logo-icon">
                  <Ic d={icons.shield} size={18} color="#fff" sw={2}/>
                </div>
                <div>
                  <div className="logo-name">LexParse</div>
                  <div className="logo-sub">법령 데이터 파싱 엔진</div>
                </div>
              </div>
            </div>
            <nav className="nav-area">
              <div className="nav-group-label">파이프라인 관리</div>
              {navItems.map(item=>(
                <div key={item.key} className={`nav-item ${nav===item.key?'active':''}`} onClick={()=>setNav(item.key)}>
                  <Ic d={item.icon} size={16} color={nav===item.key?'#1b61c9':'#9297a0'} sw={2}/>
                  {item.label}
                </div>
              ))}
              <div className="nav-group-label">시스템</div>
              <div className="nav-item">
                <Ic d={icons.settings} size={16} color="#9297a0" sw={2}/>
                파서 설정
              </div>
            </nav>
            <div className="sidebar-footer">
              <div className="sys-status">
                <div className="pulse-dot"/>
                <div className="sys-label">파이프라인 정상 운영</div>
              </div>
            </div>
          </aside>
          <div className="main">
            <div className="topbar">
              <div>
                <div className="page-title">{pageInfo[nav].title}</div>
                <div className="page-sub">{pageInfo[nav].sub}</div>
              </div>
              <div className="topbar-actions">
                <button className="btn btn-outline" style={{display:'flex',alignItems:'center',gap:6}}>
                  <Ic d={icons.refresh} size={13} sw={2}/> 새로고침
                </button>
                <button className="btn btn-dark" onClick={()=>showToast('새 파싱 작업이 등록되었습니다')}>새 파싱 작업 등록</button>
              </div>
            </div>
            <div className="content">{view}</div>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
  </script>
</body>
</html>
