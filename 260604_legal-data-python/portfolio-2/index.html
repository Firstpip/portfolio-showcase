    "원심판결을 파기하고
     사건을 서울고등법원에
     환송한다.",
  "source": "${validationCases[sel].src}",
  "hash": "b7e2f1a9c...",
  "status": "SUCCESS",
  "parsed_at":
    "2026-06-04T08:51Z"
}`}</pre>
                  </div>
                </div>
              </div>
              <div className="verdict-row">
                <button
                  className={`verdict-btn verdict-pass ${pass?'':'opacity-60'}`}
                  style={{opacity:pass?1:0.6}}
                  onClick={()=>mark(validationCases[sel].id,'pass')}
                >✓ PASS — 파싱 정확</button>
                <button
                  className={`verdict-btn verdict-fail ${fail?'':'opacity-60'}`}
                  style={{opacity:fail?1:0.6}}
                  onClick={()=>mark(validationCases[sel].id,'fail')}
                >✗ FAIL — 파싱 오류</button>
              </div>
            </div>
          </div>
        </div>
      );
    }

    const navItems = [
      {key:'파싱 현황', paths:IC.pipe, label:'파싱 현황', kbd:'G H'},
      {key:'오류 관리', paths:IC.alert, label:'오류 관리', kbd:'G E'},
      {key:'포맷 설정', paths:IC.cog, label:'포맷 설정', kbd:'G F'},
      {key:'데이터 검증', paths:IC.valid, label:'데이터 검증', kbd:'G V'},
    ];

    const pageMap = {
      '파싱 현황':'소스별 파싱 현황 통합 테이블',
      '오류 관리':'오류 유형별 분류 및 재처리 큐',
      '포맷 설정':'파서 플러그인 등록·활성화 관리',
      '데이터 검증':'원본-파싱결과 split-view 검증 환경',
    };

    function App() {
      const [nav, setNav] = useState('파싱 현황');
      const [toast, setToast] = useState(null);
      const showToast = (msg) => { setToast(msg); setTimeout(() => setToast(null), 3000); };
      const view = nav==='파싱 현황'?<MainView/>:nav==='오류 관리'?<ErrorQueueView/>:nav==='포맷 설정'?<FormatConfigView/>:<DataValidationView/>;
      return (
        <div className="app">
          {toast && (
            <div className="toast-wrap">
              <div className="toast">
                <div className="toast-dot"/>
                {toast}
              </div>
            </div>
          )}
          <aside className="sidebar">
            <div className="sidebar-top">
              <div className="workspace-row">
                <div className="ws-icon">
                  <Ic paths={IC.pipe} size={14} color="#fff" sw={2.5}/>
                </div>
                <div>
                  <div className="ws-name">LexPipeline</div>
                  <div className="ws-plan">법령 데이터 파이프라인</div>
                </div>
              </div>
              <div className="cmdk-box">
                <Ic paths={IC.search} size={13} color="#9c9c9d" sw={2}/>
                <span className="cmdk-text">빠른 검색...</span>
                <span className="cmdk-key">⌘</span><span className="cmdk-key">K</span>
              </div>
            </div>
            <nav className="nav-area">
              <div className="nav-section">파이프라인</div>
              <a href="#" className={`nav-item nav-item-anim ${nav==='파싱 현황'?'active':''}`} onClick={e=>{e.preventDefault();setNav('파싱 현황');}}>
                <Ic paths={IC.pipe} size={15} color={nav==='파싱 현황'?'#ff6363':'rgba(156,156,157,0.7)'} sw={2}/>
                <span>파싱 현황</span>
                <div className="nav-shortcut"><span className="kbd">G</span><span className="kbd">H</span></div>
              </a>
              <a href="#" className={`nav-item nav-item-anim ${nav==='오류 관리'?'active':''}`} onClick={e=>{e.preventDefault();setNav('오류 관리');}}>
                <Ic paths={IC.alert} size={15} color={nav==='오류 관리'?'#ff6363':'rgba(156,156,157,0.7)'} sw={2}/>
                <span>오류 관리</span>
                <div className="nav-shortcut"><span className="kbd">G</span><span className="kbd">E</span></div>
              </a>
              <a href="#" className={`nav-item nav-item-anim ${nav==='포맷 설정'?'active':''}`} onClick={e=>{e.preventDefault();setNav('포맷 설정');}}>
                <Ic paths={IC.cog} size={15} color={nav==='포맷 설정'?'#ff6363':'rgba(156,156,157,0.7)'} sw={2}/>
                <span>포맷 설정</span>
                <div className="nav-shortcut"><span className="kbd">G</span><span className="kbd">F</span></div>
              </a>
              <a href="#" className={`nav-item nav-item-anim ${nav==='데이터 검증'?'active':''}`} onClick={e=>{e.preventDefault();setNav('데이터 검증');}}>
                <Ic paths={IC.valid} size={15} color={nav==='데이터 검증'?'#ff6363':'rgba(156,156,157,0.7)'} sw={2}/>
                <span>데이터 검증</span>
                <div className="nav-shortcut"><span className="kbd">G</span><span className="kbd">V</span></div>
              </a>
              <div className="nav-section" style={{marginTop:8}}>시스템</div>
              <div className="status-item">
                <div className="status-dot-small" style={{background:'#4ade80'}}/>
                <span className="status-item-label">파이프라인 정상</span>
              </div>
              <div className="status-item">
                <div className="status-dot-small" style={{background:'#facc15'}}/>
                <span className="status-item-label">오류 큐 46건</span>
              </div>
              <div className="status-item">
                <div className="status-dot-small" style={{background:'#9c9c9d'}}/>
                <span className="status-item-label">DB 동기화 완료</span>
              </div>
            </nav>
            <div className="sidebar-footer">
              <div className="user-row">
                <div className="user-avatar">G</div>
                <div className="user-name">giyong-choi</div>
              </div>
            </div>
          </aside>
          <div className="main">
            <div className="topnav">
              <nav style={{display:'flex',alignItems:'center',gap:6,fontSize:13}}>
                <a href="#" className="breadcrumb" style={{color:'#9c9c9d',textDecoration:'none'}} onClick={e=>e.preventDefault()}>LexPipeline</a>
                {' / '}
                <a href="#" className="breadcrumb" style={{color:'#ffffff',fontWeight:700,textDecoration:'none'}} onClick={e=>e.preventDefault()}>{nav}</a>
              </nav>
              <div style={{fontSize:12.5,color:'#9c9c9d'}}>{pageMap[nav]}</div>
              <div className="topnav-right">
                <button className="btn btn-ghost" style={{display:'flex',alignItems:'center',gap:5,fontSize:12.5}}>
                  <Ic paths={IC.list} size={12} color="#9c9c9d" sw={2}/> 로그 보기
                </button>
                <button className="btn btn-accent" style={{fontSize:12.5}} onClick={()=>showToast('배치 파싱 작업이 시작되었습니다')}>배치 실행</button>
              </div>
            </div>
            <div className="content">{view}</div>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
  </script>
</body>
</html>
