<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>보안 관제 SaaS 멀티 테넌트 위협 인텔리전스 — 구현 데모</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  :root {
    --void: #040506;
    --deep: #07080a;
    --g700: #111214;
    --g600: #1b1c1e;
    --g500: #363739;
    --g400: #454647;
    --slate300: #6a6b6c;
    --slate200: #9c9c9d;
    --ash: #e6e6e6;
    --snow: #ffffff;
    --ember: #ff6363;
    --ember-dark: #452324;
    --mint: #59d499;
    --sky-grad: linear-gradient(135deg, #56c2ff 0%, #138af2 100%);
    --nebula: radial-gradient(84.6% 73.49% at 50% 26.51%, rgba(4,63,150,0.7), rgba(6,18,37,0.25));
    --violet-haze: radial-gradient(86.88% 75.47% at 50% 24.53%, rgba(82,48,145,0.7), rgba(26,11,51,0.14));
    --kbd-shadow: 0 1.5px 0.5px 2.5px rgba(0,0,0,0.4), 0 0 0.5px 1px #000, inset 0 2px 1px 1px rgba(0,0,0,0.25), inset 0 1px 1px 1px rgba(255,255,255,0.2);
    --topbar-h: 52px;
    --tab-h: 44px;
    --radius: 11px;
    --crit: #ff6363;
    --high: #fb923c;
    --med: #facc15;
    --low: #60a5fa;
    --ok: #59d499;
  }
  body {
    font-family: 'Pretendard', Inter, system-ui, sans-serif;
    background: var(--void);
    color: var(--snow);
    line-height: 1.5;
    overflow: hidden;
    height: 100vh;
  }

  /* Topbar */
  .topbar {
    position: fixed; top: 0; left: 0; right: 0; height: var(--topbar-h);
    background: var(--deep);
    border-bottom: 1px solid var(--g500);
    display: flex; align-items: center; padding: 0 20px; gap: 20px;
    z-index: 100;
  }
  .brand {
    display: flex; align-items: center; gap: 10px; margin-right: 8px;
  }
  .brand-icon {
    width: 30px; height: 30px; border-radius: 8px;
    background: var(--ember-dark); border: 1.5px solid var(--ember);
    display: flex; align-items: center; justify-content: center;
    box-shadow: var(--kbd-shadow);
  }
  .brand-name { font-size: 14px; font-weight: 700; letter-spacing: -0.3px; color: var(--snow); }
  .brand-sub { font-size: 9px; color: var(--ember); font-weight: 700; text-transform: uppercase; letter-spacing: 1px; }

  .tab-group { display: flex; gap: 2px; }
  .tab {
    padding: 6px 14px; border-radius: 7px; font-size: 12px; font-weight: 500;
    color: var(--slate200); cursor: pointer; transition: all 0.15s;
    border: 1px solid transparent; user-select: none;
  }
  .tab:hover { color: var(--ash); background: var(--g700); }
  .tab.active { color: var(--snow); background: var(--g600); border-color: var(--g500); }
  .tab.active .tab-dot { display: inline-block; }
  .tab-dot { display: none; width: 5px; height: 5px; border-radius: 50%; background: var(--ember); margin-right: 5px; }

  .topbar-right { margin-left: auto; display: flex; align-items: center; gap: 10px; }
  .live-badge {
    display: flex; align-items: center; gap: 6px; padding: 4px 10px;
    background: var(--g700); border: 1px solid var(--g500); border-radius: 20px;
    font-size: 11px; color: var(--slate200);
  }
  .live-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--ok); animation: pulse-ok 2s infinite; }
  @keyframes pulse-ok { 0%,100%{box-shadow:0 0 0 0 rgba(89,212,153,0.4);}50%{box-shadow:0 0 0 5px rgba(89,212,153,0);} }

  .kbd {
    display: inline-flex; align-items: center; justify-content: center;
    padding: 2px 6px; background: var(--g600); border-radius: 5px;
    font-size: 10px; color: var(--slate200); box-shadow: var(--kbd-shadow);
    border: 1px solid var(--g400);
  }
  .topbar-btn {
    display: flex; align-items: center; gap: 5px; padding: 5px 10px;
    border-radius: 7px; font-size: 11px; font-weight: 600; cursor: pointer;
    border: 1px solid var(--g500); background: var(--g700); color: var(--ash);
    transition: all 0.15s;
  }
  .topbar-btn:hover { background: var(--g600); }
  .topbar-btn.primary { background: var(--ash); color: var(--void); border-color: transparent; }
  .topbar-btn.primary:hover { background: var(--snow); }

  .user-avatar {
    width: 28px; height: 28px; border-radius: 7px;
    background: linear-gradient(135deg, #452324 0%, #ff6363 100%);
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 700; color: var(--snow); cursor: pointer;
    box-shadow: var(--kbd-shadow);
  }

  /* Main layout */
  .main-content {
    position: fixed; top: var(--topbar-h); left: 0; right: 0; bottom: 0;
    overflow: hidden;
  }

  /* Split Monitor Layout */
  .split-monitor {
    display: flex; flex-direction: column; height: 100%;
  }
  .split-top {
    display: flex; flex: 1; min-height: 0;
    border-bottom: 1px solid var(--g500);
  }
  .live-left {
    flex: 1.3; border-right: 1px solid var(--g500);
    display: flex; flex-direction: column; overflow: hidden;
    position: relative;
  }
  .live-right {
    width: 340px; display: flex; flex-direction: column; overflow: hidden;
  }
  .bottom-list {
    height: 200px; display: flex; overflow: hidden;
  }

  .panel-header {
    padding: 12px 16px; border-bottom: 1px solid var(--g500);
    display: flex; align-items: center; gap: 8px;
    background: var(--deep);
    flex-shrink: 0;
  }
  .panel-title { font-size: 12px; font-weight: 600; color: var(--ash); }
  .panel-sub { font-size: 10px; color: var(--slate300); }
  .panel-body { flex: 1; overflow-y: auto; padding: 16px; }

  /* Cards / Surfaces */
  .surface {
    background: var(--deep); border: 1px solid var(--g500);
    border-radius: var(--radius); padding: 14px;
    transition: border-color 0.2s;
  }
  .surface:hover { border-color: var(--g400); }
  .glass-surface {
    background: rgba(7,8,10,0.8); border: 1px solid var(--g500);
    border-radius: var(--radius); backdrop-filter: blur(12px);
  }

  /* Threat Intelligence */
  .ti-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 16px; }
  .kpi-chip {
    background: var(--g700); border: 1px solid var(--g500); border-radius: 10px;
    padding: 12px 14px; display: flex; flex-direction: column; gap: 3;
    transition: all 0.2s;
  }
  .kpi-chip:hover { border-color: var(--ember); }
  .kpi-val { font-size: 28px; font-weight: 700; line-height: 1; letter-spacing: -0.06em; }
  .kpi-lbl { font-size: 10px; color: var(--slate200); text-transform: uppercase; letter-spacing: 0.07em; }
  .kpi-delta { font-size: 10px; font-weight: 600; }
  .kpi-delta.up { color: var(--crit); }
  .kpi-delta.down { color: var(--ok); }

  .threat-chart { margin-bottom: 16px; }
  .threat-chart-title { font-size: 11px; color: var(--slate200); margin-bottom: 10px; display: flex; align-items: center; gap: 6px; }
  .sparkline { display: flex; align-items: flex-end; gap: 3px; height: 60px; }
  .spark-bar { flex: 1; border-radius: 3px 3px 0 0; min-width: 4px; transition: opacity 0.2s; }
  .spark-bar:hover { opacity: 0.7; }

  /* Live feed */
  .live-feed { display: flex; flex-direction: column; gap: 0; }
  .feed-item {
    padding: 10px 14px; border-bottom: 1px solid var(--g700);
    display: flex; gap: 10px; align-items: flex-start;
    cursor: pointer; transition: background 0.1s; animation: feedIn 0.3s ease;
  }
  .feed-item:hover { background: var(--g700); }
  @keyframes feedIn { from { opacity:0; transform: translateY(-8px); } to { opacity:1; transform: translateY(0); } }
  .feed-sev { width: 3px; border-radius: 4px; flex-shrink: 0; align-self: stretch; }
  .feed-content { flex: 1; min-width: 0; }
  .feed-title { font-size: 11px; font-weight: 600; color: var(--ash); margin-bottom: 2px; }
  .feed-meta { font-size: 10px; color: var(--slate300); }
  .feed-time { font-size: 9px; color: var(--slate300); font-family: monospace; white-space: nowrap; margin-top: 2px; }

  /* Attack Map */
  .map-container { width: 100%; height: 100%; position: relative; overflow: hidden; }
  .map-bg { width: 100%; height: 100%; background: radial-gradient(ellipse at 50% 50%, rgba(4,63,150,0.12) 0%, transparent 70%), var(--void); }
  .map-node {
    position: absolute; transform: translate(-50%, -50%);
    cursor: pointer; transition: all 0.2s;
  }
  .map-node-inner {
    display: flex; flex-direction: column; align-items: center; gap: 3;
  }
  .map-dot { border-radius: 50%; border: 2px solid; display: flex; align-items: center; justify-content: center; font-size: 10px; }
  .map-label { font-size: 9px; color: var(--slate200); text-align: center; white-space: nowrap; }

  /* Tenant Admin */
  .tenant-table { width: 100%; }
  .t-header { display: grid; grid-template-columns: 2fr 1fr 1fr 1fr 1fr 100px; gap: 8px; padding: 8px 14px; font-size: 10px; font-weight: 700; color: var(--slate300); text-transform: uppercase; letter-spacing: 0.7px; border-bottom: 1px solid var(--g500); }
  .t-row { display: grid; grid-template-columns: 2fr 1fr 1fr 1fr 1fr 100px; gap: 8px; padding: 10px 14px; border-bottom: 1px solid var(--g700); cursor: pointer; transition: background 0.1s; align-items: center; }
  .t-row:hover { background: var(--g700); }
  .t-name { display: flex; align-items: center; gap: 8px; }
  .t-avatar { width: 24px; height: 24px; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 9px; font-weight: 700; color: #fff; }
  .status-dot { display: flex; align-items: center; gap: 5px; font-size: 11px; }
  .s-dot { width: 6px; height: 6px; border-radius: 50%; }
  .action-btn {
    display: inline-flex; align-items: center; gap: 4px; padding: 4px 8px;
    border-radius: 6px; font-size: 10px; font-weight: 600; cursor: pointer;
    border: 1px solid var(--g500); background: var(--g700); color: var(--ash);
    transition: all 0.15s;
  }
  .action-btn:hover { background: var(--g600); border-color: var(--ember); color: var(--ember); }

  /* History Analytics */
  .analytics-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .analytics-card { background: var(--g700); border: 1px solid var(--g500); border-radius: 10px; padding: 14px; }
  .analytics-title { font-size: 11px; color: var(--slate200); margin-bottom: 12px; font-weight: 600; }

  .heatmap { display: grid; grid-template-columns: repeat(12, 1fr); gap: 3px; }
  .hmap-cell { height: 16px; border-radius: 3px; }

  /* Bottom list */
  .bottom-list-inner { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
  .bl-items { display: flex; overflow-y: hidden; height: 100%; }
  .bl-item { display: flex; align-items: center; gap: 10px; padding: 0 16px; min-width: 200px; border-right: 1px solid var(--g500); cursor: pointer; transition: background 0.1s; }
  .bl-item:hover { background: var(--g700); }
  .bl-item-icon { width: 28px; height: 28px; border-radius: 7px; display: flex; align-items: center; justify-content: center; font-size: 12px; flex-shrink: 0; }
  .bl-item-info { flex: 1; min-width: 0; }
  .bl-item-name { font-size: 11px; font-weight: 600; color: var(--ash); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .bl-item-stat { font-size: 9px; color: var(--slate300); }
  .risk-bar { height: 3px; border-radius: 2px; margin-top: 4px; }

  /* Animations */
  @keyframes fadeIn { from{opacity:0;}to{opacity:1;} }
  @keyframes slideUp { from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);} }
  @keyframes glowPulse { 0%,100%{opacity:0.6;}50%{opacity:1;} }
  @keyframes drawLine { from{stroke-dashoffset:200;}to{stroke-dashoffset:0;} }
  @keyframes orbitalRing { 0%{transform:rotate(0deg);}100%{transform:rotate(360deg);} }
  @keyframes sparkleIn { 0%{transform:scale(0);opacity:0;}60%{transform:scale(1.2);}100%{transform:scale(1);opacity:1;} }
  @keyframes countUp { from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);} }

  .animate-fade { animation: fadeIn 0.3s ease; }
  .animate-slide { animation: slideUp 0.3s ease; }

  ::-webkit-scrollbar{width:4px;}
  ::-webkit-scrollbar-track{background:transparent;}
  ::-webkit-scrollbar-thumb{background:var(--g500);border-radius:4px;}
</style>
</head>

// ─── Attack Map SVG ────────────────────────────────────────────────
function AttackMapSVG({ selectedTenant }) {
  const [animTick, setAnimTick] = useState(0);
  useEffect(() => {
    const id = setInterval(() => setAnimTick(t => t+1), 1500);
    return () => clearInterval(id);
  }, []);

  const getPos = (id) => ATTACK_MAP_NODES.find(n => n.id === id);

  return (
    <div className="map-container">
      <div className="map-bg" />
      <svg style={{ position:'absolute', inset:0, width:'100%', height:'100%' }}>
        <defs>
          <radialGradient id="nebula-grd" cx="50%" cy="26.51%" r="84.6%">
            <stop offset="0%" stopColor="rgba(4,63,150,0.25)"/>
            <stop offset="100%" stopColor="rgba(6,18,37,0)"/>
          </radialGradient>
          <marker id="arr-red" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
            <path d="M0,0 L0,6 L6,3 z" fill="#ff6363" opacity="0.7"/>
          </marker>
          <marker id="arr-blue" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
            <path d="M0,0 L0,6 L6,3 z" fill="#56c2ff" opacity="0.5"/>
          </marker>
          <filter id="glow-red"><feGaussianBlur stdDeviation="4" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
        </defs>
        <rect width="100%" height="100%" fill="url(#nebula-grd)" />
        {/* Grid lines */}
        {[10,20,30,40,50,60,70,80,90].map(v => (
          <g key={v}>
            <line x1={`${v}%`} y1="0" x2={`${v}%`} y2="100%" stroke="rgba(255,255,255,0.04)" strokeWidth="1"/>
            <line x1="0" y1={`${v}%`} x2="100%" y2={`${v}%`} stroke="rgba(255,255,255,0.04)" strokeWidth="1"/>
          </g>
        ))}
        {/* Edges */}
        {ATTACK_MAP_EDGES.map((e, i) => {
          const from = getPos(e.from), to = getPos(e.to);
          if (!from || !to) return null;
          const isRed = from.type === 'attacker';
          const dashLen = animTick % 3 === i % 3 ? '8,4' : '4,8';
          return (
            <line key={i}
              x1={`${from.x}%`} y1={`${from.y}%`}
              x2={`${to.x}%`} y2={`${to.y}%`}
              stroke={isRed ? '#ff6363' : '#56c2ff'}
              strokeWidth="1" opacity={isRed ? '0.5' : '0.35'}
              strokeDasharray={dashLen}
              markerEnd={isRed ? 'url(#arr-red)' : 'url(#arr-blue)'}
            />
          );
        })}
        {/* Nodes */}
        {ATTACK_MAP_NODES.map(n => {
          const sizes = { attacker:10, gateway:12, target:14, critical:16 };
          const r = sizes[n.type] || 10;
          const isGlowing = n.type === 'critical' || n.type === 'attacker';
          return (
            <g key={n.id} style={{ cursor:'pointer' }}>
              {isGlowing && <circle cx={`${n.x}%`} cy={`${n.y}%`} r={r+5} fill="transparent" stroke={n.color} strokeWidth="1" opacity="0.3" style={{ animation:`glowPulse 2s ease-in-out infinite`, animationDelay:`${ATTACK_MAP_NODES.indexOf(n)*0.2}s` }}/>}
              <circle cx={`${n.x}%`} cy={`${n.y}%`} r={r} fill={n.color} opacity={isGlowing ? 0.85 : 0.65} filter={isGlowing ? 'url(#glow-red)' : ''} />
              {n.label.split('\n').map((line, li) => (
                <text key={li} x={`${n.x}%`} y={`${n.y + (li+1)*3.5 + r/3}%`} textAnchor="middle" fontSize="8" fill="rgba(255,255,255,0.75)" fontWeight={li===0?'600':'400'}>{line}</text>
              ))}
            </g>
          );
        })}
        {/* Region labels */}
        {[['공격 출처','8%'],['게이트웨이','38%'],['대상 시스템','63%'],['핵심 자산','88%']].map(([l,x]) => (
          <text key={l} x={x} y="8" textAnchor="middle" fontSize="9" fill="rgba(255,255,255,0.3)" fontWeight="600" textTransform="uppercase">{l}</text>
        ))}
      </svg>
    </div>
  );
}

                        <span style={{ fontSize:9, color:'#fff', fontWeight:700, whiteSpace:'nowrap' }}>{val}</span>
                      </div>
                    </div>
                  </div>
                );
              })}
            </div>
          </div>
        </div>
      </div>
    </div>
  );

  const views = { '위협 인텔리전스': renderThreatIntelligence, 'Attack Map': renderAttackMap, '테넌트 관리': renderTenantAdmin, '히스토리 분석': renderHistoryAnalytics };

  return (
    <>
      <header className="topbar" data-archetype="topbar-analytics">
        <div className="brand">
          <div className="brand-icon"><Ph.Shield s={14}/></div>
          <div>
            <div className="brand-name">ThreatScope</div>
            <div className="brand-sub">Multi-Tenant SOC</div>
          </div>
        </div>
        <div className="tab-group">
          <div role="tab" aria-selected={tab==='위협 인텔리전스'} className={`tab ${tab==='위협 인텔리전스'?'active':''}`} onClick={() => setTab('위협 인텔리전스')}><span className="tab-dot"/>위협 인텔리전스</div>
          <div role="tab" aria-selected={tab==='Attack Map'} className={`tab ${tab==='Attack Map'?'active':''}`} onClick={() => setTab('Attack Map')}><span className="tab-dot"/>Attack Map</div>
          <div role="tab" aria-selected={tab==='테넌트 관리'} className={`tab ${tab==='테넌트 관리'?'active':''}`} onClick={() => setTab('테넌트 관리')}><span className="tab-dot"/>테넌트 관리</div>
          <div role="tab" aria-selected={tab==='히스토리 분석'} className={`tab ${tab==='히스토리 분석'?'active':''}`} onClick={() => setTab('히스토리 분석')}><span className="tab-dot"/>히스토리 분석</div>
        </div>
        <div className="topbar-right">
          <div className="live-badge"><div className="live-dot"/>실시간 연결</div>
          <span className="kbd">⌘K</span>
          <div className="topbar-btn"><Ph.Bell s={12}/> 알림 <span style={{ fontSize:9, background:'var(--ember)', color:'#fff', borderRadius:8, padding:'0 4px' }}>8</span></div>
          <div className="topbar-btn primary">리포트 내보내기</div>
          <div className="user-avatar">KM</div>
        </div>
      </header>
      <div className="main-content">
        {views[tab]?.()}
      </div>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
