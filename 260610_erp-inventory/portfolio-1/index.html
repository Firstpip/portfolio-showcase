function Ico({n,s=14,c='currentColor',sw=1.5}){
  const p=SVG_ICONS[n];
  if(!p) return null;
  return <svg xmlns="http://www.w3.org/2000/svg" width={s} height={s} viewBox="0 0 24 24" fill="none" stroke={c} strokeWidth={sw} strokeLinecap="round" strokeLinejoin="round">{p}</svg>;
}

function MigScr(){
  const neg=INV.filter(i=>i.qty<i.safe);
  const [prog,setProg]=useState(0);
  const [running,setRunning]=useState(false);

  function run(){
    setRunning(true);
    let p=0;
    const t=setInterval(()=>{p+=7;setProg(Math.min(p,100));if(p>=100)clearInterval(t);},100);
  }

  return(
    <div className="pg">
      <div className="pg-title">음수 재고 정상화</div>
      <div className="pg-sub">음수·부족 재고 {neg.length}건 감지 — 기준 시점 실재고 입력 후 원자 마이그레이션 실행</div>

      {running&&(
        <div style={{background:'#fff',border:'1px solid #e8e8e8',borderRadius:11,padding:'14px 16px',marginTop:18,boxShadow:'rgba(0,0,0,0.04) 0px 1px 2px',animation:'slideUp 0.2s ease'}}>
          <div style={{display:'flex',justifyContent:'space-between',marginBottom:8}}>
            <span style={{fontSize:12.5,fontWeight:700,color:'#292d34'}}>SSE 실시간 스트리밍 진행 중</span>
            <span style={{fontSize:13,fontWeight:800,color:'#0091ff'}}>{prog}%</span>
          </div>
          <div className="prog-track" style={{height:8}}>
            <div className="prog-fill" style={{'--w':prog+'%',background:'linear-gradient(90deg,#7b68ee,#0091ff)'}}></div>
          </div>
          <div style={{marginTop:8,fontSize:11.5,color:'#b3b3b3'}}>청크 단위(100건) 배치 처리 · 부분 실패 시 품번 단위 롤백</div>
        </div>
      )}

      <div className="mig-list">
        {neg.map((item,i)=>(
          <div key={item.sku} className="mig-row" style={{animationDelay:i*0.06+'s'}}>
            <div className="mig-icon"><Ico n="AlertTriangle" s={18} c="#e53e3e" /></div>
            <div className="mig-info">
              <div className="mig-name">{item.name}</div>
              <div className="mig-sku">{item.sku} · {item.cat}</div>
            </div>

            <input className="fi fi-sm" type="number" placeholder="실재고" />
            <button className="btn-dark" style={{fontSize:11.5,padding:'5px 11px',flexShrink:0}}>저장</button>
          </div>
        ))}
      </div>

      <div style={{marginTop:22,display:'flex',gap:10,flexWrap:'wrap'}}>
        <button className="btn-dark" style={{padding:'10px 20px'}} onClick={run}>
          <Ico n="Zap" s={14} />전체 마이그레이션 실행
        </button>
        <button className="btn-outline" style={{padding:'10px 16px'}}>
          <Ico n="Download" s={14} />결과 내보내기
        </button>
      </div>

      <div className="card" style={{marginTop:20,background:'linear-gradient(135deg,#f0edfb,#edf6fd)',border:'1px solid #e0d8f8'}}>
        <div className="card-ttl" style={{color:'#514b81'}}><Ico n="Database" s={13} c="#7b68ee" />마이그레이션 아키텍처</div>
        <p style={{fontSize:12.5,color:'#514b81',lineHeight:1.6}}>
          음수 재고 전수 클렌징 시 '실재고 입력 → 기준 재설정 → 이력 보정' 3단계를 단일 Supabase RPC 트랜잭션으로 처리합니다.

        </p>
      </div>
    </div>
  );
}

              <tr key={r.id}>
                <td><span style={{fontFamily:'monospace',fontSize:11.5,color:'#7b68ee'}}>{r.id}</span></td>
                <td><span style={{fontSize:11.5,color:'#b3b3b3'}}>{r.date}</span></td>
                <td><span style={{fontFamily:'monospace',fontSize:11.5}}>{r.sku}</span></td>
                <td><span className={'lt-badge '+clsMap[r.type]}>{typeMap[r.type]}</span></td>
                <td className={r.qty>0?'qp':'qm'}>{r.qty>0?'+':''}{r.qty.toLocaleString()}</td>
                <td style={{color:'#6b7280'}}>{r.reason}</td>
                <td>{r.user}</td>
                <td><span style={{fontFamily:'monospace',fontSize:10.5,color:r.lock==='ACQUIRED'?'#06a35a':'#b3b3b3'}}>{r.lock}</span></td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
