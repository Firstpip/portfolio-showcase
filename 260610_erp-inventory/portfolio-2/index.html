<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#040506;
  --void:#07080a;
  --surface:#0f1014;
  --surface2:#16181d;
  --border:rgba(255,255,255,0.07);
  --border2:rgba(255,255,255,0.12);
  --text:#ffffff;
  --text2:#9c9c9d;
  --text3:#5a5a5c;
  --accent:#ff6363;
  --accent2:#ff8a8a;
  --blue:#5e9fff;
  --green:#4ade80;
  --yellow:#fbbf24;
  --violet:#a78bfa;
  --card-r:11px;
  --btn-r:8px;
}
html,body{min-height:100vh;background:var(--bg);color:var(--text);font-family:'Pretendard',system-ui,sans-serif;font-size:14px;line-height:1.4;overflow-x:hidden;-webkit-font-smoothing:antialiased}

@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideDown{from{opacity:0;transform:translateY(-10px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}
@keyframes glow{0%,100%{box-shadow:0 0 0 0 rgba(255,99,99,0)}50%{box-shadow:0 0 16px 0 rgba(255,99,99,0.25)}}
@keyframes countUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
@keyframes barFill{from{height:0}to{height:var(--h,60%)}}
@keyframes radialExpand{from{opacity:0;transform:scale(0.85)}to{opacity:1;transform:scale(1)}}
@keyframes rowIn{from{opacity:0;transform:translateX(-6px)}to{opacity:1;transform:translateX(0)}}
@keyframes shimmerDark{0%{background-position:-300px 0}100%{background-position:300px 0}}
@keyframes borderGlow{0%,100%{border-color:rgba(255,99,99,0.15)}50%{border-color:rgba(255,99,99,0.4)}}
@keyframes notifIn{from{opacity:0;transform:translateX(20px)}to{opacity:1;transform:translateX(0)}}

/* TOPNAV */
.topnav{height:52px;background:rgba(4,5,6,0.95);border-bottom:1px solid var(--border);backdrop-filter:blur(12px);display:flex;align-items:center;padding:0 24px;gap:16px;position:sticky;top:0;z-index:100}
.topnav-logo{display:flex;align-items:center;gap:9px;font-size:15px;font-weight:700;letter-spacing:-0.3px;color:var(--text);cursor:pointer}
.logo-dot{width:20px;height:20px;background:var(--accent);border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800}
.topnav-nav{display:flex;gap:2px;margin-left:16px}
.nav-item{padding:5px 12px;border-radius:6px;font-size:13px;color:var(--text2);cursor:pointer;transition:all 120ms;font-weight:500;white-space:nowrap}
.nav-item:hover{color:var(--text);background:rgba(255,255,255,0.05)}
.nav-item.active{color:var(--text);background:rgba(255,255,255,0.08)}
.topnav-right{margin-left:auto;display:flex;align-items:center;gap:8px}
.icon-btn{width:32px;height:32px;display:flex;align-items:center;justify-content:center;border-radius:7px;cursor:pointer;background:transparent;border:none;color:var(--text2);transition:all 120ms;position:relative}
.icon-btn:hover{background:rgba(255,255,255,0.07);color:var(--text)}
.notif-dot{position:absolute;top:5px;right:5px;width:7px;height:7px;background:var(--accent);border-radius:50%;border:1.5px solid var(--bg);animation:pulse 2s infinite}
.btn-new{padding:5px 14px;background:var(--text);color:var(--bg);border-radius:var(--btn-r);font-size:12.5px;font-weight:600;border:none;cursor:pointer;transition:all 150ms;letter-spacing:-0.1px;display:flex;align-items:center;gap:5px}
.btn-new:hover{opacity:0.85;transform:translateY(-1px)}
.avatar{width:28px;height:28px;background:linear-gradient(135deg,var(--accent),var(--violet));border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;cursor:pointer}

/* PAGE */
.page{padding:28px 24px;min-height:calc(100vh - 52px)}
.page-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:24px}
.page-title{font-size:26px;font-weight:800;letter-spacing:-0.8px;color:var(--text);line-height:1.1}
.page-sub{font-size:12px;color:var(--text2);margin-top:5px;line-height:1.5}
.header-actions{display:flex;gap:8px;align-items:center}
.btn-ghost{padding:6px 14px;border:1px solid var(--border2);border-radius:var(--btn-r);font-size:12px;color:var(--text2);background:transparent;cursor:pointer;transition:all 120ms;display:flex;align-items:center;gap:5px}
.btn-ghost:hover{border-color:rgba(255,255,255,0.25);color:var(--text);background:rgba(255,255,255,0.05)}
.btn-accent{padding:6px 14px;background:var(--accent);border-radius:var(--btn-r);font-size:12px;font-weight:600;color:#fff;border:none;cursor:pointer;transition:all 120ms;display:flex;align-items:center;gap:5px}
.btn-accent:hover{opacity:0.85;transform:translateY(-1px)}

/* BENTO GRID */
.bento{display:grid;gap:12px;width:100%}
.bento-main{grid-template-columns:repeat(12,1fr)}
/* span helpers — bento asymmetric tiles */
.gc-s8{grid-column:span 8}.gc-s7{grid-column:span 7}.gc-s6{grid-column:span 6}.gc-s5{grid-column:span 5}.gc-s4{grid-column:span 4}.gc-s3{grid-column:span 3}
.gr-s2{grid-row:span 2}
.bento-cell{background:var(--void);border:1px solid var(--border);border-radius:var(--card-r);overflow:hidden;transition:border-color 200ms;animation:fadeIn 250ms ease-out}
.bento-cell:hover{border-color:var(--border2)}
.cell-pad{padding:20px}
.cell-title{font-size:12px;font-weight:600;color:var(--text2);letter-spacing:0.3px;text-transform:uppercase;margin-bottom:14px;display:flex;align-items:center;gap:6px}
.cell-title svg,.cell-title i{font-size:12px;color:var(--accent)}
.big-num{font-size:52px;font-weight:900;letter-spacing:-2.5px;line-height:1;color:var(--text);animation:countUp 400ms ease-out}
.big-num-sub{font-size:13px;color:var(--text2);margin-top:6px}

/* KPI STRIP */
.kpi-strip{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:12px}
.kpi-tile{background:var(--void);border:1px solid var(--border);border-radius:var(--card-r);padding:16px 18px;animation:fadeIn 200ms ease-out;transition:border-color 200ms}
.kpi-tile:hover{border-color:var(--border2)}
.kpi-label{font-size:11px;color:var(--text2);font-weight:500;margin-bottom:8px;display:flex;align-items:center;gap:4px}
.kpi-val{font-size:28px;font-weight:800;letter-spacing:-1px;color:var(--text);line-height:1}
.kpi-change{font-size:11px;margin-top:5px}
.kpi-up{color:var(--green)}
.kpi-down{color:var(--accent)}
.kpi-neutral{color:var(--text2)}

/* SECONDARY GRID */
.secondary-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}

/* CHARTS */
.chart-wrap-tall{height:220px}
.chart-wrap{height:160px}
.chart-wrap-sm{height:120px}

/* ALERT SCREEN */
.alert-list{display:flex;flex-direction:column;gap:10px}
.alert-card{background:var(--void);border:1px solid var(--border);border-radius:var(--card-r);padding:16px 18px;transition:all 200ms;animation:fadeIn 200ms ease-out,borderGlow 3s infinite}
.alert-card:hover{border-color:rgba(255,99,99,0.3);background:var(--surface)}
.alert-header{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.alert-icon{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0}
.alert-icon.crit{background:rgba(255,99,99,0.12)}
.alert-icon.warn{background:rgba(251,191,36,0.12)}
.alert-code{font-size:12px;font-family:monospace;color:var(--text2);letter-spacing:0.5px}
.alert-name{font-size:14px;font-weight:600;color:var(--text)}
.alert-meta{display:flex;gap:12px;font-size:11px;color:var(--text2)}
.alert-badge{font-size:10px;padding:2px 7px;border-radius:20px;font-weight:600;margin-left:auto}
.badge-crit{background:rgba(255,99,99,0.15);color:var(--accent)}
.badge-warn{background:rgba(251,191,36,0.15);color:var(--yellow)}
.badge-ok{background:rgba(74,222,128,0.15);color:var(--green)}
.stock-bar{display:flex;align-items:center;gap:8px;margin-top:10px}
.stock-track{flex:1;height:4px;background:rgba(255,255,255,0.07);border-radius:2px;overflow:hidden}
.stock-fill{height:100%;border-radius:2px;transition:width 600ms ease-out}
.stock-fill.ok{background:var(--green)}
.stock-fill.warn{background:var(--yellow)}
.stock-fill.crit{background:var(--accent);animation:glow 2s infinite}
.alert-history-row{display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid var(--border);font-size:12px;animation:rowIn 100ms ease-out}
.alert-history-row:last-child{border-bottom:none}
.ts-tag{font-size:10px;background:rgba(255,255,255,0.06);border-radius:4px;padding:1px 6px;font-family:monospace;color:var(--text2)}
.notif-card{background:var(--surface);border:1px solid var(--border2);border-radius:9px;padding:12px 14px;animation:notifIn 300ms ease-out;transition:all 150ms}
.notif-card:hover{border-color:rgba(255,99,99,0.25);background:var(--surface2)}
.notif-level{font-size:10px;font-weight:700;padding:2px 7px;border-radius:4px;margin-right:6px}
.notif-crit{background:rgba(255,99,99,0.2);color:var(--accent)}
.notif-warn{background:rgba(251,191,36,0.15);color:var(--yellow)}
.notif-info{background:rgba(94,159,255,0.12);color:var(--blue)}

/* TRANSFER SCREEN */
.transfer-layout{display:grid;grid-template-columns:380px 1fr;gap:20px}
.transfer-form{background:var(--void);border:1px solid var(--border);border-radius:var(--card-r);padding:20px}
.form-label-dark{font-size:12px;font-weight:600;color:var(--text2);margin-bottom:6px;display:block;letter-spacing:0.2px}
.input-dark{width:100%;padding:8px 11px;background:rgba(255,255,255,0.04);border:1px solid var(--border);border-radius:7px;font-size:13px;color:var(--text);font-family:'Pretendard',sans-serif;outline:none;transition:border-color 150ms}
.input-dark:focus{border-color:rgba(255,99,99,0.5);background:rgba(255,99,99,0.04)}
.input-dark::placeholder{color:var(--text3)}
.select-dark{width:100%;padding:8px 11px;background:rgba(255,255,255,0.04);border:1px solid var(--border);border-radius:7px;font-size:13px;color:var(--text);font-family:'Pretendard',sans-serif;outline:none;appearance:none;cursor:pointer}
.form-group-dark{margin-bottom:14px}
.arrow-connector{display:flex;align-items:center;gap:8px;margin:14px 0}
.arrow-line{flex:1;height:1px;background:var(--border)}
.arrow-circle{width:28px;height:28px;border:1px solid var(--accent);border-radius:50%;display:flex;align-items:center;justify-content:center;color:var(--accent);background:rgba(255,99,99,0.08);flex-shrink:0}
.warehouse-card{background:rgba(255,255,255,0.03);border:1px solid var(--border);border-radius:8px;padding:12px;transition:border-color 150ms}
.warehouse-card.selected{border-color:var(--accent)}
.warehouse-name{font-size:13px;font-weight:600;color:var(--text)}
.warehouse-meta{font-size:11px;color:var(--text2);margin-top:2px}
.transfer-queue{background:var(--void);border:1px solid var(--border);border-radius:var(--card-r);padding:20px}
.queue-row{display:grid;grid-template-columns:80px 1fr 60px 80px 80px;gap:8px;padding:9px 10px;border-bottom:1px solid var(--border);font-size:12px;align-items:center;animation:rowIn 100ms ease-out;transition:background 100ms}
.queue-row:hover{background:rgba(255,255,255,0.03)}
.queue-row:last-child{border-bottom:none}
.queue-header{font-size:11px;font-weight:600;color:var(--text2);letter-spacing:0.3px;background:rgba(255,255,255,0.02)}
.proc-badge{font-size:10px;padding:2px 7px;border-radius:20px;font-weight:600}
.proc-done{background:rgba(74,222,128,0.12);color:var(--green)}
.proc-proc{background:rgba(94,159,255,0.12);color:var(--blue);animation:pulse 1.5s infinite}
.proc-wait{background:rgba(255,255,255,0.06);color:var(--text2)}

/* REPORT SCREEN */
.report-layout{display:grid;grid-template-columns:1fr 1fr;gap:20px}
.report-card{background:var(--void);border:1px solid var(--border);border-radius:var(--card-r);padding:20px}
.report-metric-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
.report-metric{background:rgba(255,255,255,0.03);border-radius:8px;padding:12px}
.report-metric-label{font-size:11px;color:var(--text2);margin-bottom:4px}
.report-metric-value{font-size:22px;font-weight:800;letter-spacing:-0.8px;color:var(--text)}
.report-metric-sub{font-size:10px;color:var(--text2);margin-top:2px}
.export-btn{width:100%;padding:10px;background:var(--surface2);border:1px solid var(--border2);border-radius:8px;color:var(--text);font-size:13px;font-weight:600;cursor:pointer;transition:all 150ms;display:flex;align-items:center;justify-content:center;gap:8px;margin-top:8px;font-family:'Pretendard',sans-serif}
.export-btn:hover{background:var(--surface);border-color:var(--accent);color:var(--accent)}
.range-chip{padding:4px 10px;border-radius:20px;font-size:11px;cursor:pointer;border:1px solid var(--border);color:var(--text2);background:transparent;transition:all 100ms;white-space:nowrap}
.range-chip:hover,.range-chip.active{background:rgba(255,99,99,0.12);color:var(--accent);border-color:rgba(255,99,99,0.3)}
.radial-bg{position:relative;overflow:hidden}
.radial-bg::before{content:'';position:absolute;bottom:-80px;right:-80px;width:280px;height:280px;background:radial-gradient(circle,rgba(255,99,99,0.06) 0%,transparent 70%);pointer-events:none}
.radial-bg-blue::before{background:radial-gradient(circle,rgba(94,159,255,0.06) 0%,transparent 70%)}
.separator{height:1px;background:var(--border);margin:14px 0}
.tag{display:inline-flex;align-items:center;gap:3px;font-size:10px;padding:2px 7px;border-radius:4px;font-weight:600}
.tag-accent{background:rgba(255,99,99,0.12);color:var(--accent)}
.tag-green{background:rgba(74,222,128,0.1);color:var(--green)}
.tag-blue{background:rgba(94,159,255,0.1);color:var(--blue)}
.tag-yellow{background:rgba(251,191,36,0.1);color:var(--yellow)}
.tag-violet{background:rgba(167,139,250,0.1);color:var(--violet)}
</style>
</head>

<script type="text/babel">
const { useState, useEffect, useRef } = React;
const { AreaChart, Area, BarChart, Bar, LineChart, Line, XAxis, YAxis, CartesianGrid, Tooltip, ResponsiveContainer, PieChart, Pie, Cell, RadarChart, Radar, PolarGrid, PolarAngleAxis } = Recharts;

/* ─── MICRO-INTERACTIONS ─── */
function useCountUp(target, duration=800){
  const [val,setVal]=useState(0);
  useEffect(()=>{
    let start=null;
    const num=parseInt(String(target).replace(/,/g,''))||0;
    function step(ts){
      if(!start)start=ts;
      const pct=Math.min((ts-start)/duration,1);
      const ease=1-Math.pow(1-pct,3);
      setVal(Math.round(num*ease));
      if(pct<1)requestAnimationFrame(step);
    }
    requestAnimationFrame(step);
  },[target]);
  return val.toLocaleString();
}

/* ─── TOOLTIP ─── */
const DarkTooltip = ({active,payload,label})=>{
  if(!active||!payload?.length) return null;
  return (
    <div style={{background:'var(--surface2)',border:'1px solid var(--border2)',borderRadius:8,padding:'8px 12px',fontSize:11}}>
      <div style={{color:'var(--text2)',marginBottom:4,fontWeight:600}}>{label}</div>

/* ─── KPI TILE WITH COUNTUP ─── */
function KpiTile({label,raw,val,change,dir,unit,extra,i}){
  const animated=useCountUp(raw||0,900+i*100);
  return (
    <div className={`kpi-tile ${i===0?'radial-bg':i===3?'radial-bg radial-bg-blue':''}`} style={{animationDelay:i*60+'ms'}}>
      <div className="kpi-label">{label}</div>
      <div className="kpi-val" style={{animation:'countUp 600ms ease-out both',animationDelay:i*80+'ms'}}>{raw?animated:val}</div>
      <div className={`kpi-change ${dir==='up'?'kpi-up':extra?extra:'kpi-down'}`}>
        {change} <span style={{color:'var(--text2)'}}>{unit}</span>
      </div>
    </div>
  );
}
