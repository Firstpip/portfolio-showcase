<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>방사성의약품 주문 관리 시스템 — 병원 콘솔</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<style>
:root{
  --blue:#006bff; --indigo:#0b3558; --slate:#476788; --steel:#a6bbd1;
  --bg:#f4f7fb; --surface:#ffffff; --mist:#f8f9fb; --pale:#e7edf6;
  --platinum:#d4e0ed; --outline:#e6e6e6; --accent:#e55cff; --amethyst:#8247f5;
  --gold:#ffa600; --sky:#0099ff; --glacier:#004eba;
  --ok:#0a9d5a; --warn:#e8820c; --danger:#e5484d;
  --shadow-card:rgba(71,103,136,0.04) 0px 4px 5px 0px, rgba(71,103,136,0.03) 0px 8px 15px 0px, rgba(71,103,136,0.08) 0px 30px 50px 0px;
  --shadow-soft:rgba(71,103,136,0.04) 0px 4px 5px 0px, rgba(71,103,136,0.03) 0px 4px 10px 0px, rgba(71,103,136,0.05) 0px 10px 20px 0px;
}
*{margin:0;padding:0;box-sizing:border-box}
html,body,#root{width:100%;min-height:100vh}
body{font-family:'Pretendard',-apple-system,sans-serif;background:var(--bg);color:var(--indigo);font-size:14px;line-height:1.71;-webkit-font-smoothing:antialiased}
button{font-family:inherit;cursor:pointer;border:none;background:none}
a{text-decoration:none;color:inherit}
::-webkit-scrollbar{width:10px;height:10px}
::-webkit-scrollbar-thumb{background:var(--platinum);border-radius:8px;border:2px solid var(--bg)}
[data-lucide]{width:18px;height:18px;stroke-width:1.75}

@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes scaleIn{from{opacity:0;transform:scale(.96)}to{opacity:1;transform:scale(1)}}
@keyframes slideLeft{from{transform:translateX(100%)}to{transform:translateX(0)}}
@keyframes drawLine{from{stroke-dashoffset:600}to{stroke-dashoffset:0}}
@keyframes pulseRing{0%{box-shadow:0 0 0 0 rgba(0,107,255,.32)}70%{box-shadow:0 0 0 9px rgba(0,107,255,0)}100%{box-shadow:0 0 0 0 rgba(0,107,255,0)}}
@keyframes growBar{from{height:0}to{height:var(--h)}}
@keyframes toastIn{from{opacity:0;transform:translateY(16px) scale(.97)}to{opacity:1;transform:translateY(0) scale(1)}}
@keyframes shimmer{0%{background-position:-400px 0}100%{background-position:400px 0}}

.app-header{position:sticky;top:0;z-index:40;height:62px;background:var(--surface);border-bottom:1px solid var(--platinum);display:flex;align-items:center;gap:20px;padding:0 28px}
.brand{display:flex;align-items:center;gap:10px;font-weight:700;font-size:16px;color:var(--indigo);letter-spacing:-.01em}
.brand-mark{width:32px;height:32px;border-radius:9px;background:linear-gradient(135deg,var(--blue),var(--sky));display:flex;align-items:center;justify-content:center;box-shadow:0 4px 12px rgba(0,107,255,.32)}
.brand-mark [data-lucide]{stroke:#fff;width:18px;height:18px;stroke-width:2}
.proj-switch{display:flex;align-items:center;gap:8px;padding:7px 12px;border-radius:8px;background:var(--mist);border:1px solid var(--platinum);font-size:13px;font-weight:600;color:var(--slate);cursor:pointer;transition:.16s}
.proj-switch:hover{border-color:var(--blue);color:var(--indigo)}
.global-nav{display:flex;align-items:center;gap:4px;margin-left:6px}
.nav-link{padding:8px 13px;border-radius:8px;font-size:13.5px;font-weight:600;color:var(--slate);transition:.16s}
.nav-link:hover{background:var(--mist);color:var(--indigo)}
.nav-link.active{color:var(--blue);background:var(--pale)}
.header-actions{margin-left:auto;display:flex;align-items:center;gap:10px}
.icon-btn{width:38px;height:38px;border-radius:9px;display:flex;align-items:center;justify-content:center;color:var(--slate);background:var(--mist);transition:.16s;position:relative}
.icon-btn:hover{background:var(--pale);color:var(--blue)}
.badge-dot{position:absolute;top:7px;right:8px;width:8px;height:8px;border-radius:50%;background:var(--danger);border:2px solid var(--surface)}
.avatar{width:38px;height:38px;border-radius:50%;background:linear-gradient(135deg,var(--amethyst),var(--accent));color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px}

.tab-bar{position:sticky;top:62px;z-index:30;background:var(--surface);border-bottom:1px solid var(--platinum);padding:0 28px;display:flex;gap:2px}
.tab{padding:14px 16px;font-size:14px;font-weight:600;color:var(--slate);border-bottom:2px solid transparent;display:flex;align-items:center;gap:7px;transition:.16s;margin-bottom:-1px}
.tab [data-lucide]{width:16px;height:16px}
.tab:hover{color:var(--indigo)}
.tab.active{color:var(--blue);border-bottom-color:var(--blue)}

.content{max-width:1280px;margin:0 auto;padding:28px;animation:fadeIn .3s ease}
.page-head{display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:22px;gap:16px;flex-wrap:wrap}
.page-title{font-size:42px;font-weight:700;letter-spacing:-.025em;line-height:1.08}
.page-sub{font-size:14px;color:var(--slate);margin-top:4px}
.btn-primary{background:var(--blue);color:#fff;font-weight:600;font-size:14px;padding:11px 18px;border-radius:8px;display:inline-flex;align-items:center;gap:8px;transition:.16s;box-shadow:0 4px 12px rgba(0,107,255,.24)}
.btn-primary:hover{background:#0059d6;transform:translateY(-1px);box-shadow:0 8px 18px rgba(0,107,255,.3)}
.btn-primary [data-lucide]{width:16px;height:16px;stroke:#fff}
.btn-ghost{background:var(--mist);color:var(--indigo);font-weight:600;font-size:14px;padding:11px 16px;border-radius:8px;display:inline-flex;align-items:center;gap:8px;border:1px solid var(--platinum);transition:.16s}
.btn-ghost:hover{border-color:var(--blue);color:var(--blue)}
.btn-ghost [data-lucide]{width:16px;height:16px}

.stat-row{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:24px}
.stat-card{background:var(--surface);border-radius:16px;padding:20px;box-shadow:var(--shadow-card);position:relative;overflow:hidden;animation:fadeUp .4s ease backwards}
.stat-card:nth-child(2){animation-delay:.05s}.stat-card:nth-child(3){animation-delay:.1s}.stat-card:nth-child(4){animation-delay:.15s}
.stat-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.stat-label{font-size:13px;font-weight:600;color:var(--slate)}
.stat-ico{width:34px;height:34px;border-radius:9px;display:flex;align-items:center;justify-content:center}
.stat-value{font-size:32px;font-weight:700;letter-spacing:-.02em;line-height:1}
.stat-unit{font-size:14px;font-weight:600;color:var(--slate);margin-left:3px}
.stat-foot{display:flex;align-items:center;gap:6px;margin-top:8px;font-size:12.5px;font-weight:600}
.delta-up{color:var(--ok)}.delta-down{color:var(--danger)}
.spark-wrap{position:absolute;right:16px;bottom:14px;opacity:.9}

.grid-2{display:grid;grid-template-columns:1.65fr 1fr;gap:20px;align-items:start}
.card{background:var(--surface);border-radius:16px;box-shadow:var(--shadow-card);overflow:hidden}
.card-head{display:flex;align-items:center;justify-content:space-between;padding:18px 20px;border-bottom:1px solid var(--pale)}
.card-title{font-size:18px;font-weight:700;letter-spacing:-.01em;display:flex;align-items:center;gap:9px}
.card-title [data-lucide]{width:18px;height:18px;stroke:var(--blue)}
.card-body{padding:20px}

/* calendar */
.cal-toolbar{display:flex;align-items:center;gap:8px}
.seg{display:flex;background:var(--mist);border:1px solid var(--platinum);border-radius:8px;padding:3px}
.seg button{padding:6px 12px;border-radius:6px;font-size:12.5px;font-weight:600;color:var(--slate);transition:.14s}
.seg button.on{background:var(--surface);color:var(--blue);box-shadow:0 1px 3px rgba(71,103,136,.12)}
.cal-grid{display:grid;grid-template-columns:54px repeat(7,1fr)}
.cal-corner{border-bottom:1px solid var(--pale);border-right:1px solid var(--pale)}
.cal-dh{padding:9px 6px;text-align:center;border-bottom:1px solid var(--pale);border-right:1px solid var(--pale);font-size:12px;font-weight:600;color:var(--slate)}
.cal-dh.today{color:var(--blue)}
.cal-dh b{display:block;font-size:17px;color:var(--indigo);margin-top:2px}
.cal-dh.today b{color:var(--blue)}
.cal-hour{font-size:11px;color:var(--steel);text-align:right;padding:6px 8px 0 0;border-right:1px solid var(--pale);border-bottom:1px solid var(--pale);height:62px}
.cal-cell{border-right:1px solid var(--pale);border-bottom:1px solid var(--pale);height:62px;position:relative;padding:3px;transition:.12s}
.cal-cell:hover{background:var(--mist)}
.cal-block{position:absolute;left:3px;right:3px;border-radius:7px;padding:5px 8px;font-size:11.5px;font-weight:600;color:#fff;cursor:pointer;overflow:hidden;box-shadow:0 2px 6px rgba(11,53,88,.18);transition:.14s}
.cal-block:hover{transform:translateY(-1px);filter:brightness(1.06)}
.cal-block small{display:block;font-weight:500;opacity:.92;font-size:10px}
.cal-block.warn{outline:2px solid var(--gold);outline-offset:-2px}

/* slot side */
.slot{display:flex;align-items:center;gap:12px;padding:13px 0;border-bottom:1px solid var(--pale)}
.slot:last-child{border-bottom:none}
.slot-ring{width:42px;height:42px;flex:0 0 42px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px}
.slot-main{flex:1;min-width:0}
.slot-main h4{font-size:14px;font-weight:600;letter-spacing:-.01em}
.slot-main p{font-size:12px;color:var(--slate);margin-top:1px}
.slot-time{font-size:12px;font-weight:700;color:var(--indigo);text-align:right}
.slot-time small{display:block;font-weight:500;color:var(--steel)}

.badge{display:inline-flex;align-items:center;gap:5px;padding:4px 9px;border-radius:50px;font-size:11.5px;font-weight:600;background:var(--pale);color:var(--glacier)}
.badge.ok{background:#e3f6ed;color:var(--ok)}
.badge.warn{background:#fdf0dd;color:var(--warn)}
.badge.prog{background:#e4eeff;color:var(--blue)}
.badge.danger{background:#fde8e9;color:var(--danger)}
.badge.muted{background:var(--mist);color:var(--slate)}
.dot{width:7px;height:7px;border-radius:50%;background:currentColor}

/* table */
.tbl{width:100%;border-collapse:collapse}
.tbl th{text-align:left;font-size:12px;font-weight:600;color:var(--slate);padding:12px 16px;border-bottom:1px solid var(--pale);white-space:nowrap}
.tbl td{padding:13px 16px;border-bottom:1px solid var(--pale);font-size:13.5px;vertical-align:middle}
.tbl tbody tr{cursor:pointer;transition:.12s}
.tbl tbody tr:hover{background:var(--mist)}
.tbl tbody tr:last-child td{border-bottom:none}
.mono{font-variant-numeric:tabular-nums;font-weight:600;color:var(--indigo)}

/* state machine */
.flow{display:flex;align-items:center;gap:0;margin:6px 0}
.flow-step{display:flex;flex-direction:column;align-items:center;gap:6px;flex:1;position:relative}
.flow-step::before{content:'';position:absolute;top:14px;left:-50%;width:100%;height:2px;background:var(--platinum);z-index:0}
.flow-step:first-child::before{display:none}
.flow-step.done::before{background:var(--blue)}
.flow-node{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;background:var(--surface);border:2px solid var(--platinum);color:var(--steel);z-index:1;font-size:12px;font-weight:700}
.flow-node [data-lucide]{width:15px;height:15px}
.flow-step.done .flow-node{background:var(--blue);border-color:var(--blue);color:#fff}
.flow-step.now .flow-node{border-color:var(--blue);color:var(--blue);animation:pulseRing 1.8s infinite}
.flow-label{font-size:11.5px;font-weight:600;color:var(--slate);text-align:center}
.flow-step.done .flow-label,.flow-step.now .flow-label{color:var(--indigo)}

/* delivery timeline */
.track{position:relative;padding-left:30px}
.track-item{position:relative;padding-bottom:24px}
.track-item:last-child{padding-bottom:0}
.track-item::before{content:'';position:absolute;left:-22px;top:22px;bottom:-2px;width:2px;background:var(--platinum)}
.track-item.done::before{background:var(--blue)}
.track-item:last-child::before{display:none}
.track-node{position:absolute;left:-30px;top:0;width:18px;height:18px;border-radius:50%;background:var(--surface);border:3px solid var(--platinum);z-index:1}
.track-item.done .track-node{border-color:var(--blue);background:var(--blue)}
.track-item.now .track-node{border-color:var(--blue);animation:pulseRing 1.8s infinite}
.track-card{background:var(--mist);border:1px solid var(--pale);border-radius:12px;padding:12px 14px}
.track-card h4{font-size:13.5px;font-weight:600}
.track-card p{font-size:12px;color:var(--slate);margin-top:2px}
.track-card time{font-size:11.5px;color:var(--steel);font-weight:600}

/* heatmap halflife meter */
.hl-meter{display:flex;align-items:center;gap:10px;margin-top:14px}
.hl-bar{flex:1;height:10px;border-radius:50px;background:linear-gradient(90deg,var(--ok),var(--gold) 62%,var(--danger));position:relative;overflow:hidden}
.hl-bar::after{content:'';position:absolute;inset:0;background:linear-gradient(90deg,transparent,rgba(255,255,255,.5),transparent);background-size:400px 100%;animation:shimmer 2.4s infinite}
.hl-knob{position:absolute;top:-3px;width:16px;height:16px;border-radius:50%;background:#fff;border:3px solid var(--indigo);transform:translateX(-50%)}

/* modal / drawer */
.overlay{position:fixed;inset:0;background:rgba(11,53,88,.32);backdrop-filter:blur(2px);display:flex;align-items:center;justify-content:center;z-index:80;animation:fadeIn .2s ease;padding:20px}
.modal{background:var(--surface);border-radius:20px;width:100%;max-width:540px;max-height:90vh;overflow:auto;box-shadow:var(--shadow-card);animation:scaleIn .24s cubic-bezier(.2,.8,.3,1)}
.modal-head{display:flex;align-items:flex-start;justify-content:space-between;padding:22px 24px 16px}
.modal-head h3{font-size:20px;font-weight:700;letter-spacing:-.01em}
.modal-head p{font-size:13px;color:var(--slate);margin-top:3px}
.x-btn{width:34px;height:34px;border-radius:8px;display:flex;align-items:center;justify-content:center;color:var(--slate);transition:.14s}
.x-btn:hover{background:var(--mist);color:var(--indigo)}
.modal-body{padding:0 24px 8px}
.modal-foot{padding:16px 24px 22px;display:flex;gap:10px;justify-content:flex-end}
.drawer-wrap{position:fixed;inset:0;z-index:80;display:flex;justify-content:flex-end;animation:fadeIn .2s ease}
.drawer{background:var(--surface);width:100%;max-width:460px;height:100%;overflow:auto;box-shadow:var(--shadow-card);animation:slideLeft .26s cubic-bezier(.2,.8,.3,1)}

.field{margin-bottom:16px}
.field label{display:block;font-size:13px;font-weight:600;color:var(--indigo);margin-bottom:7px}
.field input,.field select,.field textarea{width:100%;padding:11px 13px;border:1px solid var(--platinum);border-radius:8px;font-family:inherit;font-size:14px;color:var(--indigo);background:var(--surface);transition:.14s}
.field input:focus,.field select:focus,.field textarea:focus{outline:none;border-color:var(--blue);box-shadow:0 0 0 3px rgba(0,107,255,.12)}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.chip-pick{display:flex;flex-wrap:wrap;gap:8px}
.chip-pick button{padding:9px 14px;border-radius:8px;border:1px solid var(--platinum);font-size:13px;font-weight:600;color:var(--slate);transition:.14s}
.chip-pick button.on{border-color:var(--blue);background:var(--pale);color:var(--blue)}

.kv{display:flex;justify-content:space-between;padding:11px 0;border-bottom:1px solid var(--pale);font-size:13.5px}
.kv:last-child{border-bottom:none}
.kv span{color:var(--slate);font-weight:500}
.kv b{font-weight:600;color:var(--indigo)}

.toast-wrap{position:fixed;bottom:26px;right:26px;z-index:100;display:flex;flex-direction:column;gap:10px}
.toast{display:flex;align-items:center;gap:11px;background:var(--indigo);color:#fff;padding:13px 18px;border-radius:12px;font-size:14px;font-weight:600;box-shadow:0 12px 30px rgba(11,53,88,.32);animation:toastIn .3s cubic-bezier(.2,.8,.3,1)}
.toast [data-lucide]{stroke:#5ee9a4;width:18px;height:18px}

.notif{display:flex;gap:12px;padding:14px;border-radius:12px;border:1px solid var(--pale);margin-bottom:10px;cursor:pointer;transition:.14s;background:var(--surface)}
.notif:hover{border-color:var(--blue);box-shadow:var(--shadow-soft)}
.notif.unread{background:var(--mist)}
.notif-ico{width:38px;height:38px;border-radius:10px;flex:0 0 38px;display:flex;align-items:center;justify-content:center}
.notif h4{font-size:13.5px;font-weight:600}
.notif p{font-size:12.5px;color:var(--slate);margin-top:2px}
.notif time{font-size:11px;color:var(--steel);font-weight:600}

.empty{text-align:center;padding:40px 20px;color:var(--slate)}
.skeleton{background:linear-gradient(90deg,var(--mist) 25%,var(--pale) 50%,var(--mist) 75%);background-size:400px 100%;animation:shimmer 1.4s infinite;border-radius:8px}

@media(max-width:920px){.stat-row{grid-template-columns:repeat(2,1fr)}.grid-2{grid-template-columns:1fr}.global-nav{display:none}}
@media(max-width:560px){.stat-row{grid-template-columns:1fr}.content{padding:18px}.cal-grid{grid-template-columns:40px repeat(7,1fr);font-size:10px}}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useRef} = React;

/* ---------- shared bits ---------- */
function Icon({n,...p}){return <i data-lucide={n} {...p}></i>;}
function useLucide(dep){useEffect(()=>{if(window.lucide)window.lucide.createIcons();});}

function Sparkline({data,color="#006bff",w=70,h=28}){
  const max=Math.max(...data),min=Math.min(...data),rng=(max-min)||1;
  const pts=data.map((d,i)=>`${(i/(data.length-1))*w},${h-((d-min)/rng)*(h-4)-2}`).join(" ");
  const id="g"+color.replace('#','')+data[0];
  return(<svg width={w} height={h} className="spark">
    <defs><linearGradient id={id} x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stopColor={color} stopOpacity=".28"/><stop offset="1" stopColor={color} stopOpacity="0"/>
    </linearGradient></defs>
    <polygon points={`0,${h} ${pts} ${w},${h}`} fill={`url(#${id})`}/>
    <polyline points={pts} fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"
      strokeDasharray="600" style={{animation:"drawLine 1.1s ease forwards"}}/>
  </svg>);
}

const DRUGS=["F-18 FDG","Ga-68 PSMA","F-18 NaF","C-11 메티오닌","I-123 IBZM","Tc-99m MDP"];
const HALFLIFE={"F-18 FDG":110,"Ga-68 PSMA":68,"F-18 NaF":110,"C-11 메티오닌":20,"I-123 IBZM":792,"Tc-99m MDP":360};

/* ---------- order data ---------- */
const STAGES=[
  {k:"등록",ic:"file-plus"},{k:"접수",ic:"inbox"},{k:"승인",ic:"check-check"},
  {k:"생산",ic:"flask-conical"},{k:"배송",ic:"truck"},{k:"완료",ic:"package-check"}
];
const initOrders=[
  {id:"ORD-24817",drug:"F-18 FDG",qty:"4 dose",hospital:"서울중앙의료원",stage:4,due:"06.11 08:30",amount:"2,840,000",created:"06.10 09:12"},
  {id:"ORD-24816",drug:"Ga-68 PSMA",qty:"2 dose",hospital:"서울중앙의료원",stage:3,due:"06.11 10:00",amount:"3,120,000",created:"06.10 08:40"},
  {id:"ORD-24814",drug:"F-18 NaF",qty:"3 dose",hospital:"서울중앙의료원",stage:2,due:"06.12 09:00",amount:"1,950,000",created:"06.10 08:05"},
  {id:"ORD-24811",drug:"C-11 메티오닌",qty:"1 dose",hospital:"서울중앙의료원",stage:1,due:"06.12 07:30",amount:"1,480,000",created:"06.09 17:22"},
  {id:"ORD-24809",drug:"F-18 FDG",qty:"6 dose",hospital:"서울중앙의료원",stage:5,due:"06.10 08:00",amount:"4,260,000",created:"06.09 15:48"},
  {id:"ORD-24805",drug:"Tc-99m MDP",qty:"5 dose",hospital:"서울중앙의료원",stage:0,due:"06.13 09:30",amount:"2,150,000",created:"06.09 14:10"},
];
const stageBadge=(s)=>{
  if(s>=5)return["ok","완료"];if(s===4)return["prog","배송중"];if(s===3)return["prog","생산중"];
  if(s===2)return["warn","승인대기"];if(s===1)return["warn","접수됨"];return["muted","등록"];
};

/* ===================================================================== */
function App(){
  const [view,setView]=useState("main");
  const [toasts,setToasts]=useState([]);
  const [orders,setOrders]=useState(initOrders);
  const [detail,setDetail]=useState(null);
  const [orderForm,setOrderForm]=useState(false);
  const [notif,setNotif]=useState(false);
  useLucide([view,detail,orderForm,notif,toasts]);

  const toast=(msg)=>{const id=Math.random();setToasts(t=>[...t,{id,msg}]);setTimeout(()=>setToasts(t=>t.filter(x=>x.id!==id)),2600);};

  const tabs=[
    {k:"main",label:"주문 현황",ic:"layout-dashboard"},
    {k:"schedule",label:"생산 일정",ic:"calendar-clock"},
    {k:"delivery",label:"배송 현황",ic:"truck"},
    {k:"transactions",label:"거래 내역",ic:"receipt-text"},
  ];

  return(
  <div style={{width:"100%"}} data-archetype="topbar-analytics">
    <header className="app-header">
      <div className="brand"><span className="brand-mark"><Icon n="atom"/></span>RadioOrder</div>
      <button className="proj-switch" onClick={()=>toast("기관 전환 — 서울중앙의료원")}>
        <Icon n="building-2" style={{width:15,height:15}}/>서울중앙의료원<Icon n="chevron-down" style={{width:14,height:14}}/>
      </button>
      <nav className="global-nav">
        <a className="nav-link active">주문 운영</a>
        <a className="nav-link" onClick={()=>toast("청구·정산은 데모 범위 밖입니다")}>청구·정산</a>
        <a className="nav-link" onClick={()=>toast("기관 설정은 데모 범위 밖입니다")}>기관 설정</a>
      </nav>
      <div className="header-actions">
        <button className="icon-btn" onClick={()=>toast("검색 — 주문번호/약품명")}><Icon n="search"/></button>
        <button className="icon-btn" onClick={()=>setNotif(true)}><Icon n="bell"/><span className="badge-dot"></span></button>
        <div className="avatar">최</div>
      </div>
    </header>

    <nav className="tab-bar">
      {tabs.map(t=>(
        <button key={t.k} className={"tab"+(view===t.k?" active":"")} onClick={()=>setView(t.k)}>
          <Icon n={t.ic}/>{t.label}
        </button>
      ))}
    </nav>

    {view==="main"&&<MainView orders={orders} onOpen={setDetail} onNew={()=>setOrderForm(true)} toast={toast}/>}
    {view==="schedule"&&<ScheduleView toast={toast} onOpen={setDetail} orders={orders}/>}
    {view==="delivery"&&<DeliveryView orders={orders} onOpen={setDetail}/>}
    {view==="transactions"&&<TxView toast={toast} onNotif={()=>setNotif(true)}/>}

    {detail&&<OrderDetail order={detail} onClose={()=>setDetail(null)} toast={toast}
      onCancel={(id)=>{setOrders(o=>o.filter(x=>x.id!==id));setDetail(null);toast("주문이 취소되었습니다");}}/>}
    {orderForm&&<OrderForm onClose={()=>setOrderForm(false)} toast={toast}
      onSubmit={(o)=>{setOrders(p=>[o,...p]);setOrderForm(false);toast("주문이 접수대기로 등록되었습니다");}}/>}
    {notif&&<NotifDrawer onClose={()=>setNotif(false)} toast={toast}/>}

    <div className="toast-wrap">
      {toasts.map(t=><div className="toast" key={t.id}><Icon n="check-circle-2"/>{t.msg}</div>)}
    </div>
  </div>);
}

/* ---------------- MAIN (KPI + calendar-schedule) ---------------- */
function MainView({orders,onOpen,onNew,toast}){
  const kpis=[
    {label:"진행 중 주문",val:"18",unit:"건",ic:"activity",c:"#006bff",bg:"#e4eeff",d:"+3",up:true,spark:[8,11,9,13,12,15,18]},
    {label:"이번 달 주문",val:"142",unit:"건",ic:"calendar-check",c:"#8247f5",bg:"#efe8fe",d:"+12%",up:true,spark:[90,102,98,115,124,135,142]},
    {label:"평균 배송 리드타임",val:"2.4",unit:"h",ic:"timer",c:"#0a9d5a",bg:"#e3f6ed",d:"-18분",up:true,spark:[3.1,2.9,3,2.7,2.6,2.5,2.4]},
    {label:"미확인 알림",val:"5",unit:"건",ic:"bell-ring",c:"#e8820c",bg:"#fdf0dd",d:"+2",up:false,spark:[1,2,1,3,2,4,5]},
  ];
  return(
  <main className="content">
    <div className="page-head">
      <div>
        <h1 className="page-title">주문 현황</h1>
        <p className="page-sub">서울중앙의료원 · 핵의학과 — 실시간 주문·생산·배송 통합 현황</p>
      </div>
      <button className="btn-primary" onClick={onNew}><Icon n="plus"/>방사성의약품 주문 등록</button>
    </div>

    <section className="stat-row">
      {kpis.map((k,i)=>(
        <div className="stat-card" key={i}>
          <div className="stat-top">
            <span className="stat-label">{k.label}</span>
            <span className="stat-ico" style={{background:k.bg}}><Icon n={k.ic} style={{stroke:k.c,width:18,height:18}}/></span>
          </div>
          <div className="stat-value">{k.val}<span className="stat-unit">{k.unit}</span></div>
          <div className="stat-foot"><span className={k.up?"delta-up":"delta-down"}>
            <Icon n={k.up?"trending-up":"trending-up"} style={{width:14,height:14,verticalAlign:"-2px"}}/> {k.d}</span>
            <span style={{color:"var(--steel)"}}>vs 지난주</span></div>
          <div className="spark-wrap"><Sparkline data={k.spark} color={k.c}/></div>
        </div>
      ))}
    </section>

    <div className="grid-2">
      {/* calendar region */}
      <ScheduleCalendar compact onOpen={onOpen} toast={toast}/>
      {/* slot-side region */}
      <div className="card">
        <div className="card-head">
          <div className="card-title"><Icon n="list-checks"/>오늘의 주문 대기열</div>
          <span className="badge prog"><span className="dot"></span>실시간</span>
        </div>
        <div className="card-body" style={{paddingTop:6,paddingBottom:8}}>
          {orders.slice(0,5).map(o=>{
            const [c,t]=stageBadge(o.stage);
            const ring={ok:"#e3f6ed",prog:"#e4eeff",warn:"#fdf0dd",muted:"#f0f3f8"}[c];
            const rc={ok:"#0a9d5a",prog:"#006bff",warn:"#e8820c",muted:"#476788"}[c];
            return(
            <div className="slot" key={o.id} onClick={()=>onOpen(o)} style={{cursor:"pointer"}}>
              <div className="slot-ring" style={{background:ring,color:rc}}>{o.drug.split(" ")[0]}</div>
              <div className="slot-main">
                <h4>{o.drug} · {o.qty}</h4>
                <p>{o.id} · <span className={"badge "+c} style={{padding:"1px 7px"}}>{t}</span></p>
              </div>
              <div className="slot-time">{o.due.split(" ")[1]}<small>{o.due.split(" ")[0]} 납기</small></div>
            </div>);
          })}
        </div>
      </div>
    </div>
  </main>);
}

/* ---------------- shared calendar ---------------- */
const CAL_BLOCKS=[
  {day:1,start:0,len:1,drug:"F-18 FDG",lot:"LOT-A24",c:"#006bff"},
  {day:1,start:2,len:1,drug:"Ga-68 PSMA",lot:"LOT-G11",c:"#8247f5"},
  {day:2,start:1,len:2,drug:"F-18 NaF",lot:"LOT-N07",c:"#0099ff",warn:true},
  {day:3,start:0,len:1,drug:"C-11 메티오닌",lot:"LOT-C03",c:"#e8820c"},
  {day:3,start:3,len:1,drug:"F-18 FDG",lot:"LOT-A25",c:"#006bff"},
  {day:4,start:2,len:1,drug:"Tc-99m MDP",lot:"LOT-M19",c:"#0a9d5a"},
  {day:0,start:1,len:1,drug:"F-18 FDG",lot:"LOT-A23",c:"#006bff"},
];
function ScheduleCalendar({compact,onOpen,toast,full}){
  const [mode,setMode]=useState("주");
  const days=["월 9","화 10","수 11","목 12","금 13","토 14","일 15"];
  const hours=["07:00","08:00","09:00","10:00"];
  return(
  <div className="card">
    <div className="card-head">
      <div className="card-title"><Icon n="calendar-clock"/>{full?"생산 일정 캘린더":"생산·배송 일정"}</div>
      <div className="cal-toolbar">
        <div className="seg">{["일","주","월"].map(m=><button key={m} className={mode===m?"on":""} onClick={()=>setMode(m)}>{m}</button>)}</div>
        {full&&<button className="btn-ghost" style={{padding:"7px 12px"}} onClick={()=>toast("이번 주 — 6월 9일~15일")}><Icon n="calendar"/>이번 주</button>}
      </div>
    </div>
    <div className="card-body" style={{padding:full?16:8}}>
      <div className="cal-grid">
        <div className="cal-corner"></div>
        {days.map((d,i)=><div key={d} className={"cal-dh"+(i===2?" today":"")}>{d.split(" ")[0]}<b>{d.split(" ")[1]}</b></div>)}
        {hours.map((h,hi)=>(
          <React.Fragment key={h}>
            <div className="cal-hour">{h}</div>
            {days.map((d,di)=>(
              <div className="cal-cell" key={di} onClick={()=>toast(`${d} ${h} 슬롯 — 생산 가능`)}>
                {CAL_BLOCKS.filter(b=>b.day===di&&b.start===hi).map((b,bi)=>(
                  <div key={bi} className={"cal-block"+(b.warn?" warn":"")}
                    style={{background:b.c,height:b.len*62-8,zIndex:2}}
                    onClick={(e)=>{e.stopPropagation();onOpen&&onOpen({id:b.lot,drug:b.drug,qty:"-",hospital:"서울중앙의료원",stage:3,due:`06.${11+di} ${h}`,amount:"-",created:"-",lot:true});}}>
                    {b.drug}<small>{b.lot}{b.warn?" · 용량초과":""}</small>
                  </div>
                ))}
              </div>
            ))}
          </React.Fragment>
        ))}
      </div>
    </div>
  </div>);
}

/* ---------------- SCHEDULE view ---------------- */
function ScheduleView({toast,onOpen,orders}){
  const [drug,setDrug]=useState("F-18 FDG");
  const hl=HALFLIFE[drug];
  const knob=Math.min(96,Math.max(6,100-(hl/800)*100));
  return(
  <main className="content">
    <div className="page-head">
      <div><h1 className="page-title">생산 일정</h1>
        <p className="page-sub">반감기(T½) 역산 스케줄링 — 납기 시각 기준 최적 생산 시작 시각을 자동 산출합니다</p></div>
      <button className="btn-primary" onClick={()=>toast("생산 요청이 공급사로 전달될 예정입니다")}><Icon n="calendar-plus"/>생산 슬롯 요청</button>

    <div className="grid-2">
      <ScheduleCalendar full onOpen={onOpen} toast={toast}/>

        <div className="card-body">
          <div className="field"><label>약품 선택</label>
            <select value={drug} onChange={e=>setDrug(e.target.value)}>
              {DRUGS.map(d=><option key={d}>{d}</option>)}
            </select></div>
          <div style={{background:"var(--mist)",border:"1px solid var(--pale)",borderRadius:12,padding:16}}>
            <div className="kv"><span>반감기 T½</span><b>{hl}분</b></div>
            <div className="kv"><span>납기 시각</span><b>06.11 08:30</b></div>
            <div className="kv"><span>권장 생산 시작</span><b style={{color:"var(--blue)"}}>06.11 {hl>=110?"06:40":"07:30"}</b></div>
            <div className="kv"><span>출고 시 잔존 방사능</span><b style={{color:"var(--ok)"}}>약 {hl>=110?"78":"62"}%</b></div>
            <div className="hl-meter">
              <Icon n="zap" style={{width:16,height:16,stroke:"var(--gold)"}}/>
              <div className="hl-bar"><div className="hl-knob" style={{left:knob+"%"}}></div></div>
            </div>
            <p style={{fontSize:12,color:"var(--slate)",marginTop:10}}>반감기가 짧을수록 생산 시작 시각이 납기에 가까워야 하며, 시각 임계 스케줄로 계산됩니다.</p>
          </div>
          <button className="btn-ghost" style={{width:"100%",justifyContent:"center",marginTop:14}}
            onClick={()=>toast(`${drug} 생산 시작 시각이 캘린더에 반영될 예정입니다`)}>
            <Icon n="wand-2"/>권장 시각으로 슬롯 배치</button>
        </div>
      </div>
    </div>
  </main>);
}

/* ---------------- order detail modal ---------------- */
function OrderDetail({order,onClose,onCancel,toast}){
  const cancelable=order.stage<=1;
  return(
  <div className="overlay" onClick={onClose}>
    <div className="modal" onClick={e=>e.stopPropagation()}>
      <div className="modal-head">
        <div><h3>{order.id}</h3><p>{order.lot?"생산 로트 상세":order.hospital+" · 주문 상세"}</p></div>
        <button className="x-btn" onClick={onClose}><Icon n="x"/></button>
      </div>
      <div className="modal-body">
        {!order.lot&&<div className="flow">
          {STAGES.map((s,i)=>(
            <div key={s.k} className={"flow-step"+(i<order.stage?" done":i===order.stage?" now":"")}>
              <div className="flow-node">{i<order.stage?<Icon n="check"/>:<Icon n={s.ic}/>}</div>
              <div className="flow-label">{s.k}</div>
            </div>
          ))}
        </div>}
        <div style={{marginTop:18}}>
          <div className="kv"><span>약품</span><b>{order.drug}</b></div>
          <div className="kv"><span>수량</span><b>{order.qty}</b></div>
          <div className="kv"><span>반감기 T½</span><b>{HALFLIFE[order.drug]||"-"}분</b></div>
          <div className="kv"><span>납기</span><b>{order.due}</b></div>
          {!order.lot&&<div className="kv"><span>주문 금액</span><b>{order.amount}원</b></div>}
          <div className="kv"><span>등록 시각</span><b>{order.created}</b></div>
        </div>
        <div style={{marginTop:16,padding:"12px 14px",background:"var(--mist)",borderRadius:12,fontSize:12.5,color:"var(--slate)",display:"flex",gap:8}}>
          <Icon n="info" style={{width:16,height:16,stroke:"var(--blue)",flexShrink:0}}/>
          {cancelable?"접수 전 단계의 주문만 취소·수정할 수 있습니다.":"생산 진행 중인 주문은 취소·수정이 제한됩니다."}
        </div>
      </div>
      <div className="modal-foot">
        {cancelable&&<button className="btn-ghost" style={{color:"var(--danger)",borderColor:"#fbd5d6"}} onClick={()=>onCancel(order.id)}><Icon n="trash-2"/>주문 취소</button>}
        <button className="btn-ghost" onClick={()=>toast("배송 알림이 설정되었습니다")}><Icon n="bell-plus"/>배송 알림</button>
        <button className="btn-primary" onClick={onClose}>확인</button>
      </div>
    </div>
  </div>);
}

/* ---------------- order form modal ---------------- */
function OrderForm({onClose,onSubmit,toast}){
  const [drug,setDrug]=useState("F-18 FDG");
  const [qty,setQty]=useState(2);
  const [date,setDate]=useState("2026-06-13");
  const [time,setTime]=useState("09:00");
  const submit=()=>{
    onSubmit({id:"ORD-"+(24818+Math.floor(Math.random()*9)),drug,qty:qty+" dose",hospital:"서울중앙의료원",
      stage:1,due:date.slice(5).replace("-",".")+" "+time,amount:(qty*710000).toLocaleString(),created:"06.10 지금"});
  };
  return(
  <div className="overlay" onClick={onClose}>
    <div className="modal" onClick={e=>e.stopPropagation()}>
      <div className="modal-head"><div><h3>방사성의약품 주문 등록</h3><p>약품·수량·납기를 선택하면 접수대기 상태로 등록됩니다</p></div>
        <button className="x-btn" onClick={onClose}><Icon n="x"/></button></div>
      <div className="modal-body">
        <div className="field"><label>약품 종류</label>
          <div className="chip-pick">{DRUGS.map(d=><button key={d} className={drug===d?"on":""} onClick={()=>setDrug(d)}>{d}</button>)}</div></div>
        <div className="field-row">
          <div className="field"><label>수량 (dose)</label>
            <input type="number" min="1" value={qty} onChange={e=>setQty(+e.target.value||1)}/></div>
          <div className="field"><label>반감기</label>
            <input value={HALFLIFE[drug]+"분 (시각 임계)"} readOnly style={{background:"var(--mist)"}}/></div>
        </div>
        <div className="field-row">
          <div className="field"><label>납기일</label><input type="date" value={date} onChange={e=>setDate(e.target.value)}/></div>
          <div className="field"><label>희망 시각</label><input type="time" value={time} onChange={e=>setTime(e.target.value)}/></div>
        </div>
        <div style={{padding:"12px 14px",background:"var(--pale)",borderRadius:12,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <span style={{fontSize:13,color:"var(--slate)",fontWeight:600}}>예상 주문 금액</span>
          <b style={{fontSize:18,color:"var(--blue)"}}>{(qty*710000).toLocaleString()}원</b>
        </div>
      </div>
      <div className="modal-foot">
        <button className="btn-ghost" onClick={onClose}>취소</button>
        <button className="btn-primary" onClick={submit}><Icon n="send"/>주문 등록</button>
      </div>
    </div>
  </div>);
}

/* ---------------- notification drawer ---------------- */
function NotifDrawer({onClose,toast}){
  const items=[
    {ic:"truck",c:"#006bff",bg:"#e4eeff",t:"ORD-24817 배송 출발",p:"운송기사 픽업 완료 · 예상 도착 08:10",time:"3분 전",unread:true},
    {ic:"check-check",c:"#0a9d5a",bg:"#e3f6ed",t:"ORD-24816 생산 승인",p:"공급사가 생산을 승인했습니다",time:"22분 전",unread:true},
    {ic:"alert-triangle",c:"#e8820c",bg:"#fdf0dd",t:"F-18 NaF 생산 용량 경고",p:"06.12 09:00 슬롯 용량 초과 가능",time:"1시간 전",unread:true},
    {ic:"receipt",c:"#8247f5",bg:"#efe8fe",t:"세금계산서 발행",p:"ORD-24771 세금계산서가 발행되었습니다",time:"3시간 전",unread:false},
    {ic:"package-check",c:"#0a9d5a",bg:"#e3f6ed",t:"ORD-24809 배송 완료",p:"핵의학과 접수처 수령 확인",time:"어제",unread:false},
  ];
  return(
  <div className="drawer-wrap" onClick={onClose}>
    <div className="drawer" onClick={e=>e.stopPropagation()}>
      <div className="modal-head" style={{borderBottom:"1px solid var(--pale)"}}>
        <div><h3>알림 센터</h3><p>읽지 않은 알림 3건 · Push/SMS 멀티채널</p></div>
        <button className="x-btn" onClick={onClose}><Icon n="x"/></button></div>
      <div style={{padding:20}}>
        <button className="btn-ghost" style={{width:"100%",justifyContent:"center",marginBottom:14}} onClick={()=>{toast("모든 알림을 읽음 처리했습니다");}}>
          <Icon n="check-check"/>모두 읽음 처리</button>
        {items.map((n,i)=>(
          <div className={"notif"+(n.unread?" unread":"")} key={i} onClick={()=>toast(n.t+" — 관련 주문으로 이동")}>
            <div className="notif-ico" style={{background:n.bg}}><Icon n={n.ic} style={{stroke:n.c,width:18,height:18}}/></div>
            <div style={{flex:1}}>
              <div style={{display:"flex",justifyContent:"space-between",gap:8}}><h4>{n.t}</h4><time>{n.time}</time></div>
              <p>{n.p}</p>
            </div>
          </div>
        ))}
      </div>
    </div>
  </div>);
}

const style=document.createElement("style");
style.textContent="@keyframes spin{to{transform:rotate(360deg)}}";
document.head.appendChild(style);

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
