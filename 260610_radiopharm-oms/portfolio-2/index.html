<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>방사성의약품 OMS — 공급사 관리 콘솔</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
<link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/regular/style.css" />
<link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/fill/style.css" />
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://unpkg.com/prop-types@15/prop-types.min.js"></script>
<script src="https://unpkg.com/react-is@18/umd/react-is.production.min.js"></script>
<script src="https://unpkg.com/recharts@2.12.7/umd/Recharts.js"></script>
<style>
:root{
  --plum:#611f69; --plum-deep:#3d0157; --plum-dark:#481a54; --grape:#2e0039;
  --blue:#1264a3; --orchid:#d17dfe; --amethyst:#9602c7; --pale-orchid:#eac8fe;
  --canvas:#fefbff; --surface:#ffffff; --whisper:#f9f0ff; --lavender:#f2defe;
  --ink:#1a1a2e; --black:#000000; --pewter:#696969; --cement:#757575; --border:#edeaed;
  --medium:#808080; --ok:#1f8a4c; --warn:#c87a00; --danger:#c0392b;
  --shadow:rgba(0,0,0,0.08) 0px 1px 3px 0px; --shadow-lg:rgba(0,0,0,0.1) 0px 5px 20px 0px;
}
*{margin:0;padding:0;box-sizing:border-box}
html,body,#root{width:100%;min-height:100vh}
body{font-family:'Pretendard',-apple-system,sans-serif;background:var(--canvas);color:var(--ink);font-size:14px;line-height:1.4;-webkit-font-smoothing:antialiased;letter-spacing:0.007em}
button{font-family:inherit;cursor:pointer;border:none;background:none}
a{text-decoration:none;color:inherit}
.ph,.ph-fill{font-size:18px;line-height:1;vertical-align:middle}
::-webkit-scrollbar{width:9px;height:9px}::-webkit-scrollbar-thumb{background:#d8cfdb;border-radius:6px;border:2px solid var(--canvas)}

@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes scaleIn{from{opacity:0;transform:scale(.97)}to{opacity:1;transform:scale(1)}}
@keyframes slideLeft{from{transform:translateX(100%)}to{transform:translateX(0)}}
@keyframes drawLine{from{stroke-dashoffset:600}to{stroke-dashoffset:0}}
@keyframes pulse{0%{opacity:.5}50%{opacity:1}100%{opacity:.5}}
@keyframes countTick{from{opacity:.3;transform:translateY(-4px)}to{opacity:1;transform:translateY(0)}}
@keyframes toastIn{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
@keyframes spin{to{transform:rotate(360deg)}}

.shell{display:flex;width:100%;min-height:100vh}
.sidebar{position:fixed;left:0;top:0;bottom:0;width:240px;background:var(--plum);color:#fff;display:flex;flex-direction:column;z-index:40;overflow-y:auto}
.sb-brand{display:flex;align-items:center;gap:11px;padding:18px 18px 14px;font-weight:700;font-size:16px;letter-spacing:-.01em}
.sb-mark{width:34px;height:34px;border-radius:9px;background:rgba(255,255,255,.14);display:flex;align-items:center;justify-content:center;border:1px solid rgba(255,255,255,.18)}
.sb-mark .ph{font-size:20px;color:#fff}
.env-sel{margin:0 14px 16px;padding:9px 12px;border-radius:6px;background:rgba(0,0,0,.18);display:flex;align-items:center;gap:9px;font-size:12.5px;font-weight:600;color:#f0d9f4;cursor:pointer;transition:.16s}
.env-sel:hover{background:rgba(0,0,0,.28)}
.env-sel .live{width:8px;height:8px;border-radius:50%;background:#5ee9a4;animation:pulse 2s infinite;margin-left:auto}
.sb-section{padding:0 10px;margin-bottom:14px}
.sb-title{font-size:11px;font-weight:700;color:rgba(255,255,255,.46);text-transform:uppercase;letter-spacing:.06em;padding:6px 10px}
.sb-link{display:flex;align-items:center;gap:11px;padding:9px 11px;border-radius:6px;font-size:14px;font-weight:500;color:rgba(255,255,255,.82);cursor:pointer;transition:.14s;margin-bottom:1px}
.sb-link:hover{background:rgba(255,255,255,.1);color:#fff}
.sb-link.active{background:var(--lavender);color:var(--plum-deep);font-weight:600}
.sb-link .ph{font-size:18px}
.sb-link .cnt{margin-left:auto;font-size:11px;font-weight:700;padding:1px 7px;border-radius:50px;background:rgba(255,255,255,.18)}
.sb-link.active .cnt{background:var(--plum);color:#fff}
.sb-foot{margin-top:auto;padding:14px;border-top:1px solid rgba(255,255,255,.12);display:flex;align-items:center;gap:10px}
.sb-ava{width:34px;height:34px;border-radius:8px;background:var(--orchid);color:var(--grape);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px}
.sb-foot .nm{font-size:13px;font-weight:600}.sb-foot .rl{font-size:11px;color:rgba(255,255,255,.6)}

.main{margin-left:240px;flex:1;min-width:0;width:calc(100% - 240px);min-height:100vh;display:flex;flex-direction:column}
.page-header{background:var(--surface);border-bottom:1px solid var(--border);padding:18px 26px}
.page-title-row{display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap}
.page-title{font-size:28px;font-weight:700;letter-spacing:-.018em;display:flex;align-items:center;gap:10px}
.hero-num{font-size:48px;font-weight:700;letter-spacing:-.03em;line-height:1;color:var(--plum)}
.page-meta{font-size:12.5px;color:var(--pewter);margin-top:5px;display:flex;align-items:center;gap:8px}
.page-meta .live{width:7px;height:7px;border-radius:50%;background:var(--ok);animation:pulse 2s infinite}
.page-actions{display:flex;gap:9px;align-items:center}
.btn-primary{background:var(--plum);color:#fff;font-weight:600;font-size:13.5px;padding:10px 17px;border-radius:4px;display:inline-flex;align-items:center;gap:7px;transition:.16s;box-shadow:inset 0 0 0 1px var(--plum-deep)}
.btn-primary:hover{background:var(--plum-deep)}
.btn-secondary{background:var(--surface);color:var(--ink);font-weight:600;font-size:13.5px;padding:10px 15px;border-radius:4px;border:1px solid var(--border);display:inline-flex;align-items:center;gap:7px;transition:.16s}
.btn-secondary:hover{border-color:var(--plum);color:var(--plum)}
.btn-link{color:var(--blue);font-weight:600;font-size:13.5px;display:inline-flex;align-items:center;gap:6px}
.btn-link:hover{text-decoration:underline}

.content{padding:24px 26px;animation:fadeIn .3s ease;flex:1}
.stat-row{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:22px}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:18px;position:relative;overflow:hidden;animation:fadeUp .4s ease backwards}
.stat-card:nth-child(2){animation-delay:.05s}.stat-card:nth-child(3){animation-delay:.1s}.stat-card:nth-child(4){animation-delay:.15s}
.stat-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--accent,var(--plum))}
.stat-label{font-size:12.5px;font-weight:600;color:var(--pewter);display:flex;align-items:center;gap:7px}
.stat-label .ph{font-size:15px;color:var(--plum)}
.stat-value{font-size:30px;font-weight:700;letter-spacing:-.02em;margin-top:8px;animation:countTick .5s ease}
.stat-value .u{font-size:14px;font-weight:600;color:var(--pewter);margin-left:3px}
.stat-delta{font-size:12px;font-weight:700;margin-top:5px;display:flex;align-items:center;gap:4px}
.up{color:var(--ok)}.down{color:var(--danger)}
.stat-spark{position:absolute;right:14px;bottom:12px}

.card{background:var(--surface);border:1px solid var(--border);border-radius:8px;overflow:hidden}
.card-head{display:flex;align-items:center;justify-content:space-between;padding:15px 18px;border-bottom:1px solid var(--border)}
.card-title{font-size:16px;font-weight:700;letter-spacing:-.01em;display:flex;align-items:center;gap:8px}
.card-title .ph{font-size:18px;color:var(--plum)}
.card-body{padding:18px}

.tab-bar{display:flex;gap:2px;border-bottom:1px solid var(--border);padding:0 18px;background:var(--surface)}
.tab{padding:12px 15px;font-size:13.5px;font-weight:600;color:var(--pewter);border-bottom:2px solid transparent;margin-bottom:-1px;transition:.14s;display:flex;align-items:center;gap:7px}
.tab .cnt{font-size:11px;padding:1px 7px;border-radius:50px;background:var(--whisper);color:var(--plum);font-weight:700}
.tab:hover{color:var(--ink)}
.tab.active{color:var(--plum);border-bottom-color:var(--plum)}
.tab.active .cnt{background:var(--lavender)}

.data-toolbar{display:flex;align-items:center;gap:10px;padding:13px 18px;border-bottom:1px solid var(--border);flex-wrap:wrap}
.search{flex:1;min-width:180px;display:flex;align-items:center;gap:8px;padding:8px 12px;border:1px solid var(--border);border-radius:4px;background:var(--canvas)}
.search input{border:none;background:none;outline:none;font-family:inherit;font-size:13.5px;width:100%;color:var(--ink)}
.search .ph{color:var(--medium);font-size:16px}
.filter-chip{padding:7px 12px;border:1px solid var(--border);border-radius:4px;font-size:12.5px;font-weight:600;color:var(--pewter);display:inline-flex;align-items:center;gap:6px;transition:.14s}
.filter-chip:hover,.filter-chip.on{border-color:var(--plum);color:var(--plum);background:var(--whisper)}

.tbl{width:100%;border-collapse:collapse}
.tbl th{text-align:left;font-size:11.5px;font-weight:700;color:var(--pewter);text-transform:uppercase;letter-spacing:.03em;padding:11px 18px;border-bottom:1px solid var(--border);background:var(--canvas)}
.tbl td{padding:0 18px;height:50px;border-bottom:1px solid var(--border);font-size:13.5px}
.tbl tbody tr{transition:.12s}
.tbl tbody tr:hover{background:var(--whisper)}
.tbl tbody tr:last-child td{border-bottom:none}
.mono{font-variant-numeric:tabular-nums;font-weight:600}
.row-check{width:16px;height:16px;border-radius:3px;border:1.5px solid var(--medium);cursor:pointer;display:inline-flex;align-items:center;justify-content:center;transition:.12s}
.row-check.on{background:var(--plum);border-color:var(--plum);color:#fff}
.row-check .ph{font-size:12px}

.badge{display:inline-flex;align-items:center;gap:5px;padding:3px 9px;border-radius:5px;font-size:11.5px;font-weight:700}
.badge.wait{background:#fdf3e0;color:var(--warn)}
.badge.ok{background:#e4f5ea;color:var(--ok)}
.badge.rej{background:#fbe6e3;color:var(--danger)}
.badge.prog{background:#e6eef6;color:var(--blue)}
.badge.plum{background:var(--lavender);color:var(--plum-deep)}
.dot{width:6px;height:6px;border-radius:50%;background:currentColor}
.act-btn{padding:5px 11px;border-radius:4px;font-size:12px;font-weight:700;transition:.14s}
.act-approve{background:var(--plum);color:#fff}.act-approve:hover{background:var(--plum-deep)}
.act-reject{background:var(--surface);color:var(--danger);border:1px solid #f0cfca}.act-reject:hover{background:#fbe6e3}

/* insight board */
.insight{display:grid;grid-template-columns:1.6fr 1fr;gap:16px;align-items:start;margin-bottom:16px}
.hero-viz{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:18px;position:relative;overflow:hidden}
.hero-viz::after{content:'';position:absolute;right:-60px;top:-60px;width:220px;height:220px;border-radius:50%;background:radial-gradient(circle,rgba(151,2,199,.08),transparent 70%);pointer-events:none}
.kpi-side{display:flex;flex-direction:column;gap:12px}
.kpi-pill{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:15px 16px;display:flex;align-items:center;gap:13px}
.kpi-ico{width:42px;height:42px;border-radius:9px;flex:0 0 42px;display:flex;align-items:center;justify-content:center}
.kpi-ico .ph{font-size:20px}
.kpi-pill h4{font-size:30px;font-weight:700;letter-spacing:-.02em}
.kpi-pill p{font-size:12px;color:var(--pewter);font-weight:600}
.widget-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
.rank{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--border)}
.rank:last-child{border-bottom:none}
.rank-no{width:22px;height:22px;border-radius:6px;background:var(--whisper);color:var(--plum);font-weight:700;font-size:12px;display:flex;align-items:center;justify-content:center}
.rank-bar{flex:1;height:7px;border-radius:50px;background:var(--border);overflow:hidden}
.rank-bar i{display:block;height:100%;border-radius:50px;background:linear-gradient(90deg,var(--plum),var(--orchid))}
.rank-val{font-size:12.5px;font-weight:700;color:var(--ink);min-width:42px;text-align:right}

/* production heatmap */
.heat{display:grid;grid-template-columns:64px repeat(8,1fr);gap:4px}
.heat-lbl{font-size:11px;color:var(--pewter);font-weight:600;display:flex;align-items:center}
.heat-cell{aspect-ratio:1.4;border-radius:4px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:#fff;transition:.12s}
.heat-cell:hover{outline:2px solid var(--plum);outline-offset:1px}
.heat-head{font-size:10.5px;color:var(--pewter);font-weight:600;text-align:center;padding-bottom:2px}
.cap-bar-row{display:flex;align-items:center;gap:12px;padding:11px 0;border-bottom:1px solid var(--border)}
.cap-bar-row:last-child{border-bottom:none}
.cap-bar{flex:1;height:9px;border-radius:50px;background:var(--border);overflow:hidden}
.cap-bar i{display:block;height:100%;border-radius:50px}

/* overlay */
.overlay{position:fixed;inset:0;background:rgba(46,0,57,.36);backdrop-filter:blur(2px);display:flex;align-items:center;justify-content:center;z-index:80;animation:fadeIn .2s ease;padding:20px}
.modal{background:var(--surface);border-radius:12px;width:100%;max-width:520px;max-height:90vh;overflow:auto;box-shadow:var(--shadow-lg);animation:scaleIn .22s ease}
.drawer-wrap{position:fixed;inset:0;z-index:80;display:flex;justify-content:flex-end;animation:fadeIn .2s ease}
.drawer{background:var(--surface);width:100%;max-width:440px;height:100%;overflow:auto;box-shadow:var(--shadow-lg);animation:slideLeft .26s cubic-bezier(.2,.8,.3,1)}
.modal-head{display:flex;align-items:flex-start;justify-content:space-between;padding:20px 22px 14px;border-bottom:1px solid var(--border)}
.modal-head h3{font-size:19px;font-weight:700;letter-spacing:-.01em}
.modal-head p{font-size:12.5px;color:var(--pewter);margin-top:3px}
.x-btn{width:32px;height:32px;border-radius:6px;display:flex;align-items:center;justify-content:center;color:var(--pewter);transition:.14s}
.x-btn:hover{background:var(--whisper);color:var(--ink)}
.modal-body{padding:18px 22px}
.modal-foot{padding:14px 22px;display:flex;gap:9px;justify-content:flex-end;border-top:1px solid var(--border)}
.kv{display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border);font-size:13.5px}
.kv:last-child{border-bottom:none}.kv span{color:var(--pewter);font-weight:500}.kv b{font-weight:600}
.field{margin-bottom:14px}.field label{display:block;font-size:12.5px;font-weight:600;margin-bottom:6px}
.field input,.field select,.field textarea{width:100%;padding:10px 12px;border:1px solid var(--border);border-radius:4px;font-family:inherit;font-size:13.5px;color:var(--ink);background:var(--surface)}
.field input:focus,.field select:focus,.field textarea:focus{outline:none;border-color:var(--plum);box-shadow:0 0 0 3px rgba(97,31,105,.1)}

.toggle{width:40px;height:23px;border-radius:50px;background:var(--border);position:relative;cursor:pointer;transition:.18s;flex:0 0 40px}
.toggle.on{background:var(--plum)}
.toggle::after{content:'';position:absolute;top:2px;left:2px;width:19px;height:19px;border-radius:50%;background:#fff;transition:.18s;box-shadow:0 1px 3px rgba(0,0,0,.2)}
.toggle.on::after{left:19px}
.perm-row{display:flex;align-items:center;gap:12px;padding:13px 0;border-bottom:1px solid var(--border)}
.perm-row:last-child{border-bottom:none}
.perm-row h4{font-size:13.5px;font-weight:600}.perm-row p{font-size:12px;color:var(--pewter)}

.toast-wrap{position:fixed;bottom:24px;right:24px;z-index:100;display:flex;flex-direction:column;gap:10px}
.toast{display:flex;align-items:center;gap:10px;background:var(--plum-deep);color:#fff;padding:12px 17px;border-radius:8px;font-size:13.5px;font-weight:600;box-shadow:var(--shadow-lg);animation:toastIn .3s ease}
.toast .ph{color:#7be0a8;font-size:18px}

@media(max-width:980px){.stat-row{grid-template-columns:repeat(2,1fr)}.insight{grid-template-columns:1fr}.widget-grid{grid-template-columns:1fr}}
@media(max-width:760px){.sidebar{width:64px}.sb-brand span:not(.sb-mark),.sb-link span:not(.cnt),.sb-title,.env-sel span,.sb-foot div{display:none}.main{margin-left:64px;width:calc(100% - 64px)}.stat-row{grid-template-columns:1fr}}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect} = React;
const R = window.Recharts;
const I = ({n,f,...p})=><i className={(f?"ph-fill ph-fill-":"ph ph-")+n} {...p}></i>;

function Spark({data,color="#611f69",w=72,h=26}){
  const max=Math.max(...data),min=Math.min(...data),rng=(max-min)||1;
  const pts=data.map((d,i)=>`${(i/(data.length-1))*w},${h-((d-min)/rng)*(h-4)-2}`).join(" ");
  return(<svg width={w} height={h}>
    <polyline points={pts} fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"
      strokeDasharray="600" style={{animation:"drawLine 1.1s ease forwards"}}/>
  </svg>);
}

const incoming=[
  {id:"ORD-24817",hospital:"서울중앙의료원",drug:"F-18 FDG",qty:"4 dose",due:"06.11 08:30",amount:"2,840,000",st:"wait",time:"방금 전"},
  {id:"ORD-24816",hospital:"한빛대학병원",drug:"Ga-68 PSMA",qty:"2 dose",due:"06.11 10:00",amount:"3,120,000",st:"wait",time:"4분 전"},
  {id:"ORD-24815",hospital:"미래영상의학센터",drug:"F-18 NaF",qty:"3 dose",due:"06.12 09:00",amount:"1,950,000",st:"wait",time:"12분 전"},
  {id:"ORD-24814",hospital:"서울중앙의료원",drug:"C-11 메티오닌",qty:"1 dose",due:"06.12 07:30",amount:"1,480,000",st:"wait",time:"26분 전"},
  {id:"ORD-24812",hospital:"대성핵의학과",drug:"Tc-99m MDP",qty:"5 dose",due:"06.13 09:30",amount:"2,150,000",st:"approved",time:"38분 전"},
  {id:"ORD-24809",hospital:"한빛대학병원",drug:"F-18 FDG",qty:"6 dose",due:"06.10 08:00",amount:"4,260,000",st:"approved",time:"1시간 전"},
  {id:"ORD-24805",hospital:"미래영상의학센터",drug:"F-18 FDG",qty:"2 dose",due:"06.13 11:00",amount:"1,420,000",st:"rejected",time:"2시간 전"},
];

function App(){
  const [view,setView]=useState("main");
  const [toasts,setToasts]=useState([]);
  const toast=(m)=>{const id=Math.random();setToasts(t=>[...t,{id,m}]);setTimeout(()=>setToasts(t=>t.filter(x=>x.id!==id)),2600);};
  const nav=[
    {grp:"운영",items:[
      {k:"main",label:"주문 접수",ic:"tray",cnt:4},
      {k:"production",label:"생산 관리",ic:"factory"},
    ]},
    {grp:"분석",items:[{k:"analytics",label:"통계 분석",ic:"chart-line-up"}]},
    {grp:"관리",items:[{k:"partners",label:"거래처 관리",ic:"buildings"}]},
  ];
  const titles={main:["주문 접수 및 승인","tray"],analytics:["병원별 통계 분석","chart-line-up"],production:["생산량 및 시설 관리","factory"],partners:["거래처·권한·공지 관리","buildings"]};
  return(
  <div className="shell" data-archetype="stripe-multipane">
    <aside className="sidebar" data-sidebar>
      <div className="sb-brand"><span className="sb-mark"><I n="atom" f/></span><span>RadioOps</span></div>
      <div className="env-sel" onClick={()=>toast("환경 전환 — 운영(Production)")}>
        <I n="globe"/><span>운영 · 한울방사선의약</span><span className="live"></span>
      </div>
      {nav.map(g=>(
        <div className="sb-section" key={g.grp}>
          <div className="sb-title">{g.grp}</div>
          {g.items.map(it=>(
            <div key={it.k} role="button" className={"sb-link"+(view===it.k?" active":"")} onClick={()=>setView(it.k)}>
              <I n={it.ic}/><span>{it.label}</span>{it.cnt&&<span className="cnt">{it.cnt}</span>}
            </div>
          ))}
        </div>
      ))}

/* ---------- MAIN: stripe-multipane (KPI + tabs + table) ---------- */

  const [detail,setDetail]=useState(null);
  const [reject,setReject]=useState(null);

    {label:"생산 진행",val:"6",unit:"건",ic:"factory",c:"#1264a3",d:"+1",up:true,spark:[3,4,3,5,4,5,6]},

  ];
  const filtered=rows.filter(r=>tab==="all"||r.st===tab);
  const tabs=[{k:"wait",l:"접수 대기",c:rows.filter(r=>r.st==="wait").length},{k:"approved",l:"승인 완료",c:rows.filter(r=>r.st==="approved").length},{k:"rejected",l:"반려",c:rows.filter(r=>r.st==="rejected").length},{k:"all",l:"전체",c:rows.length}];
  const toggle=(id)=>setChecked(c=>c.includes(id)?c.filter(x=>x!==id):[...c,id]);
  const approve=(id)=>{setRows(r=>r.map(x=>x.id===id?{...x,st:"approved"}:x));setChecked(c=>c.filter(x=>x!==id));toast(id+" 주문이 승인되었습니다");};

  const bdg={wait:["wait","접수대기"],approved:["ok","승인완료"],rejected:["rej","반려"]};
  const show=(r)=>({display:(tab==="all"||r.st===tab)?"":"none"});
  const rowCells=(r)=>(<React.Fragment>
    <td onClick={e=>{e.stopPropagation();toggle(r.id);}}>
      <span className={"row-check"+(checked.includes(r.id)?" on":"")}>{checked.includes(r.id)&&<I n="check"/>}</span></td>
    <td className="mono" style={{color:"var(--plum)"}}>{r.id}</td>
    <td>{r.hospital}</td>
    <td>{r.drug} <span style={{color:"var(--pewter)"}}>· {r.qty}</span></td>
    <td style={{color:"var(--pewter)"}}>{r.due}</td>

    <td><span className={"badge "+bdg[r.st][0]}><span className="dot"></span>{bdg[r.st][1]}</span></td>
    <td onClick={e=>e.stopPropagation()}>
      {r.st==="wait"?(<div style={{display:"flex",gap:6}}>
        <button className="act-btn act-approve" onClick={()=>approve(r.id)}>승인</button>
        <button className="act-btn act-reject" onClick={()=>setReject(r)}>반려</button>
      </div>):<span style={{fontSize:12,color:"var(--pewter)"}}>{r.time}</span>}

  return(
  <div className="content">
    <StatRow stats={stats}/>
    <div className="card">
      <nav className="tab-bar" data-tabs>
        {tabs.map(t=><button data-tab key={t.k} className={"tab"+(tab===t.k?" active":"")} onClick={()=>setTab(t.k)}>{t.l}<span className="cnt">{t.c}</span></button>)}
      </nav>
      <div className="data-toolbar">
        <div className="search"><I n="magnifying-glass"/><input placeholder="주문번호·병원명·약품 검색…" onChange={()=>{}}/></div>

        <button className="filter-chip" onClick={()=>toast("필터 — 납기 임박")}><I n="clock"/>납기 임박</button>
        {checked.length>0&&<button className="btn-primary" style={{padding:"8px 14px"}} onClick={bulkApprove}><I n="check-circle"/>{checked.length}건 일괄 승인</button>}

      </div>
      <table className="tbl">
        <thead><tr>
          <th style={{width:30}}></th><th>주문번호</th><th>병원</th><th>약품 · 수량</th><th>납기</th>
          <th style={{textAlign:"right"}}>금액(원)</th><th>상태</th><th style={{width:140}}>처리</th>
        </tr></thead>
        <tbody>
          <tr key={rows[0].id} onClick={()=>setDetail(rows[0])} style={show(rows[0])}>{rowCells(rows[0])}</tr>
          <tr key={rows[1].id} onClick={()=>setDetail(rows[1])} style={show(rows[1])}>{rowCells(rows[1])}</tr>
          <tr key={rows[2].id} onClick={()=>setDetail(rows[2])} style={show(rows[2])}>{rowCells(rows[2])}</tr>
          <tr key={rows[3].id} onClick={()=>setDetail(rows[3])} style={show(rows[3])}>{rowCells(rows[3])}</tr>
          <tr key={rows[4].id} onClick={()=>setDetail(rows[4])} style={show(rows[4])}>{rowCells(rows[4])}</tr>
          <tr key={rows[5].id} onClick={()=>setDetail(rows[5])} style={show(rows[5])}>{rowCells(rows[5])}</tr>
          <tr key={rows[6].id} onClick={()=>setDetail(rows[6])} style={show(rows[6])}>{rowCells(rows[6])}</tr>
        </tbody>
      </table>
    </div>
    {detail&&<OrderDetail r={detail} onClose={()=>setDetail(null)} toast={toast}/>}
    {reject&&<RejectModal r={reject} onClose={()=>setReject(null)} onDone={(id)=>{setRows(x=>x.map(o=>o.id===id?{...o,st:"rejected"}:o));setReject(null);toast(id+" 주문을 반려했습니다");}}/>}
  </div>);
}

    {n:"미래영상의학센터",type:"병원",mgr:"박준호 원장",orders:"24건",since:"2024.08",st:"활성"},
    {n:"대성핵의학과",type:"병원",mgr:"정수아 실장",orders:"19건",since:"2025.01",st:"활성"},
    {n:"한울배송",type:"배송사",mgr:"오세진 기사",orders:"112건",since:"2024.03",st:"활성"},
    {n:"우리핵의학센터",type:"병원",mgr:"강도현 과장",orders:"12건",since:"2025.03",st:"검토"},
  ];
  return(
  <div className="content">
    <div className="card">
      <nav className="tab-bar" data-tabs>
        {[["partners","거래처 목록"],["roles","권한 관리"],["notice","공지사항"]].map(([k,l])=>
          <button key={k} className={"tab"+(tab===k?" active":"")} onClick={()=>setTab(k)}>{l}</button>)}
      </nav>

      {tab==="partners"&&<>
        <div className="data-toolbar">
          <div className="search"><I n="magnifying-glass"/><input placeholder="거래처명·담당자 검색…"/></div>
          <button className="filter-chip" onClick={()=>toast("필터 — 병원")}><I n="hospital"/>병원</button>
          <button className="filter-chip" onClick={()=>toast("필터 — 배송사")}><I n="truck"/>배송사</button>
          <button className="btn-primary" style={{padding:"8px 14px"}} onClick={()=>toast("신규 거래처 등록 폼이 열릴 예정입니다")}><I n="plus"/>거래처 추가</button>
        </div>
        <table className="tbl">
          <thead><tr><th>거래처</th><th>유형</th><th>담당자</th><th>누적 주문</th><th>거래 시작</th><th>상태</th></tr></thead>
          <tbody>
            {partners.map((p,i)=>(
              <tr key={i} onClick={()=>setDetail(p)}>
                <td style={{fontWeight:600}}>{p.n}</td>
                <td><span className={"badge "+(p.type==="병원"?"prog":"plum")}>{p.type}</span></td>
                <td>{p.mgr}</td><td className="mono">{p.orders}</td><td style={{color:"var(--pewter)"}}>{p.since}</td>
                <td><span className={"badge "+(p.st==="활성"?"ok":"wait")}><span className="dot"></span>{p.st}</span></td>
              </tr>
            ))}
          </tbody>
        </table>
      </>}

      {tab==="roles"&&<div className="card-body">
        <div style={{fontSize:13,color:"var(--pewter)",marginBottom:6}}>역할 기반 접근 제어(RBAC) — <b style={{color:"var(--plum)"}}>병원 사용자</b> 역할의 권한을 설정합니다.</div>
        {[["order","주문 등록·조회","주문을 생성하고 자사 주문 내역을 조회"],
          ["produce","생산 일정 조회","공급사 생산 일정 캘린더 열람"],
          ["stats","전체 통계 열람","병원별 통계 대시보드 접근 (관리자 전용 권장)"],
          ["notice","공지 수신","역할별 타겟 공지사항 수신"]].map(([k,t,d])=>(
          <div className="perm-row" key={k}>
            <div className="kpi-ico" style={{background:"var(--whisper)",width:38,height:38,flex:"0 0 38px"}}><I n="key" style={{color:"var(--plum)",fontSize:17}}/></div>
            <div style={{flex:1}}><h4>{t}</h4><p>{d}</p></div>
            <div className={"toggle"+(perms[k]?" on":"")} onClick={()=>{setPerms(p=>({...p,[k]:!p[k]}));toast(t+" 권한이 "+(perms[k]?"해제":"부여")+"되었습니다");}}></div>
          </div>
        ))}
        <div style={{marginTop:14,padding:"12px 14px",background:"var(--whisper)",borderRadius:8,fontSize:12.5,color:"var(--pewter)",display:"flex",gap:8}}>
          <I n="shield-check" style={{color:"var(--plum)",fontSize:17,flexShrink:0}}/>
          JWT 클레임 기반으로 API·UI 요소에 3중 접근 제어가 적용됩니다. 변경은 다음 요청부터 반영됩니다.
        </div>
      </div>}

      {tab==="notice"&&<div className="card-body">
        <div style={{display:"flex",gap:9,marginBottom:16}}>
          <button className="btn-primary" onClick={()=>toast("공지 작성 폼이 열릴 예정입니다")}><I n="megaphone"/>공지 작성</button>
          <button className="btn-secondary" onClick={()=>toast("대상 — 병원 사용자 전체")}><I n="users-three"/>대상: 병원 전체</button>
        </div>
        {[{t:"6월 정기 생산 점검 안내",tg:"병원 전체",d:"06.09",new:true,body:"6월 15일 02:00~05:00 사이클로트론 정기 점검으로 일시 주문 제한"},
          {t:"F-18 FDG 생산 단가 조정 공지",tg:"병원 전체",d:"06.05",new:false,body:"원료 수급 변동에 따른 단가 조정 — 6월 20일부터 적용 예정"},
          {t:"배송사 신규 계약 안내",tg:"배송사",d:"06.01",new:false,body:"한울배송 정식 계약 전환 — 야간 배송 시간대 확대"}].map((n,i)=>(
          <div key={i} style={{border:"1px solid var(--border)",borderRadius:8,padding:15,marginBottom:11,cursor:"pointer",transition:".14s"}}
            onClick={()=>toast(n.t+" — 상세 보기")} onMouseEnter={e=>e.currentTarget.style.borderColor="var(--plum)"} onMouseLeave={e=>e.currentTarget.style.borderColor="var(--border)"}>
            <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:5}}>
              {n.new&&<span className="badge rej" style={{padding:"1px 7px"}}>NEW</span>}
              <h4 style={{fontSize:14.5,fontWeight:700,flex:1}}>{n.t}</h4>
              <span style={{fontSize:11.5,color:"var(--pewter)"}}>{n.d}</span>
            </div>
            <p style={{fontSize:12.5,color:"var(--pewter)",marginBottom:8}}>{n.body}</p>
            <span className="badge plum"><I n="users-three" style={{fontSize:13}}/>{n.tg}</span>
          </div>
        ))}
      </div>}
    </div>
    {detail&&<PartnerDrawer p={detail} onClose={()=>setDetail(null)} toast={toast}/>}
  </div>);
}

/* ---------- modals / drawers ---------- */
function OrderDetail({r,onClose,toast}){
  return(
  <div className="overlay" onClick={onClose}>
    <div className="modal" onClick={e=>e.stopPropagation()}>
      <div className="modal-head"><div><h3>{r.id}</h3><p>{r.hospital} · 주문 접수 상세</p></div>
        <button className="x-btn" onClick={onClose}><I n="x"/></button></div>
      <div className="modal-body">
        <div className="kv"><span>병원</span><b>{r.hospital}</b></div>
        <div className="kv"><span>약품 · 수량</span><b>{r.drug} · {r.qty}</b></div>
        <div className="kv"><span>납기</span><b>{r.due}</b></div>
        <div className="kv"><span>주문 금액</span><b>{r.amount}원</b></div>
        <div className="kv"><span>접수 시각</span><b>{r.time}</b></div>
        <div style={{marginTop:14,padding:"12px 14px",background:"var(--whisper)",borderRadius:8,fontSize:12.5,color:"var(--pewter)",display:"flex",gap:8}}>
          <I n="info" style={{color:"var(--plum)",fontSize:16,flexShrink:0}}/>
          승인 시 생산 일정 캘린더에 해당 주문의 생산 블록이 자동 생성됩니다.
        </div>
      </div>
      <div className="modal-foot">
        <button className="btn-secondary" onClick={()=>{toast(r.id+" 반려 처리 — 사유 입력");onClose();}}>반려</button>
        <button className="btn-primary" onClick={()=>{toast(r.id+" 주문이 승인되었습니다");onClose();}}><I n="check-circle"/>승인 처리</button>
      </div>
    </div>
  </div>);
}
function RejectModal({r,onClose,onDone}){
  const [reason,setReason]=useState("생산 용량 초과");
  return(
  <div className="overlay" onClick={onClose}>
    <div className="modal" onClick={e=>e.stopPropagation()} style={{maxWidth:440}}>
      <div className="modal-head"><div><h3>주문 반려</h3><p>{r.id} · {r.hospital}</p></div>
        <button className="x-btn" onClick={onClose}><I n="x"/></button></div>
      <div className="modal-body">
        <div className="field"><label>반려 사유</label>
          <select value={reason} onChange={e=>setReason(e.target.value)}>
            <option>생산 용량 초과</option><option>납기 일정 불가</option><option>원료 수급 지연</option><option>주문 정보 오류</option>
          </select></div>
        <div className="field"><label>상세 메모 (병원 사용자 알림에 포함)</label>
          <textarea rows="3" defaultValue="해당 납기 시각의 생산 슬롯이 마감되어 다음 가능 시각으로 재요청 부탁드립니다." style={{resize:"none"}}/></div>
      </div>
      <div className="modal-foot">
        <button className="btn-secondary" onClick={onClose}>취소</button>
        <button className="btn-primary" style={{background:"var(--danger)",boxShadow:"none"}} onClick={()=>onDone(r.id)}><I n="x-circle"/>반려 확정</button>
      </div>
    </div>
  </div>);
}
function PartnerDrawer({p,onClose,toast}){
  return(
  <div className="drawer-wrap" onClick={onClose}>
    <div className="drawer" onClick={e=>e.stopPropagation()}>
      <div className="modal-head"><div><h3>{p.n}</h3><p>{p.type} · 거래처 상세</p></div>
        <button className="x-btn" onClick={onClose}><I n="x"/></button></div>
      <div className="modal-body">
        <div className="kpi-pill" style={{marginBottom:16}}>
          <div className="kpi-ico" style={{background:"var(--lavender)"}}><I n={p.type==="병원"?"hospital":"truck"} style={{color:"var(--plum)"}}/></div>
          <div><h4 style={{fontSize:16}}>{p.n}</h4><p>담당 {p.mgr}</p></div>
        </div>
        <div className="kv"><span>거래처 유형</span><b>{p.type}</b></div>
        <div className="kv"><span>담당자</span><b>{p.mgr}</b></div>
        <div className="kv"><span>누적 주문</span><b>{p.orders}</b></div>
        <div className="kv"><span>거래 시작</span><b>{p.since}</b></div>
        <div className="kv"><span>상태</span><b><span className={"badge "+(p.st==="활성"?"ok":"wait")}>{p.st}</span></b></div>
        <h4 style={{fontSize:13.5,fontWeight:700,margin:"18px 0 8px"}}>최근 주문</h4>
        {["ORD-24817 · F-18 FDG","ORD-24798 · Ga-68 PSMA","ORD-24760 · C-11 메티오닌"].map((o,i)=>(
          <div key={i} style={{display:"flex",justifyContent:"space-between",padding:"9px 0",borderBottom:"1px solid var(--border)",fontSize:13}}>
            <span className="mono" style={{color:"var(--plum)"}}>{o}</span><span style={{color:"var(--pewter)"}}>06.0{9-i}</span></div>
        ))}
      </div>
      <div className="modal-foot">
        <button className="btn-secondary" onClick={()=>toast("거래처 통계로 이동")}><I n="chart-bar"/>통계</button>
        <button className="btn-primary" onClick={onClose}>확인</button>
      </div>
    </div>
  </div>);
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
