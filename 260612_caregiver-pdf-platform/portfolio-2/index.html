<!DOCTYPE html>
<html lang="ko" data-archetype="topbar-analytics">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>문서 발급 관리 플랫폼 — 구현 데모</title>
<link rel="preconnect" href="https://cdn.jsdelivr.net">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@phosphor-icons/web@2.1.1/src/regular/style.css">
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
/* ======= Design Tokens — Contractbook-inspired ======= */
:root {
  --solar:        #ffba09;
  --solar-lt:     #fff3c7;
  --solar-dk:     #e6a800;
  --violet:       #1009f6;
  --violet-lt:    #dddffe;
  --cyan:         #1ec6f6;
  --cyan-lt:      #d0f3fd;
  --linen:        #f0f0ec;
  --white:        #ffffff;
  --ink:          #1a1a1a;
  --charcoal:     #222222;
  --stone:        #d4d4d0;
  --silver:       #b3b3b3;
  --sky:          #add3e5;
  --blossom:      #e3c7de;
  --green:        #27ae60;
  --red:          #e74c3c;
  --font:         'Pretendard', -apple-system, sans-serif;
  --r-card:       24px;
  --r-pill:       999px;
  --r-sm:         12px;
  --r-input:      4px;
  --r-btn:        24px;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { font-family: var(--font); background: var(--linen); color: var(--ink); min-height: 100vh; }
button { cursor: pointer; font-family: var(--font); }
input, select, textarea { font-family: var(--font); }

/* ======= Keyframes ======= */
@keyframes livePulse {
  0%, 100% { opacity: 1; transform: scale(1); }
  50% { opacity: 0.4; transform: scale(0.85); }
}
@keyframes cardEntrance {
  from { opacity: 0; transform: translateY(14px); }
  to   { opacity: 1; transform: translateY(0); }
}
@keyframes slideDown {
  from { opacity: 0; transform: translateY(-6px); }
  to   { opacity: 1; transform: translateY(0); }
}
@keyframes heroGeoFloat {
  0%, 100% { transform: translateY(0) rotate(0deg); }
  50%       { transform: translateY(-10px) rotate(1.5deg); }
}
@keyframes heroShimmer {
  0%   { background-position: -200% center; }
  100% { background-position:  200% center; }
}
@keyframes progressFill {
  from { width: 0; }
  to   { width: var(--fill-pct, 0%); }
}
@keyframes countUp {
  from { opacity: 0; transform: scale(0.88); }
  to   { opacity: 1; transform: scale(1); }
}
@keyframes sparkDraw {
  from { stroke-dashoffset: 200; opacity: 0; }
  to   { stroke-dashoffset: 0;   opacity: 1; }
}

/* ======= Topbar ======= */
.topbar {
  position: sticky; top: 0; z-index: 100;
  display: flex; align-items: center; gap: 0;
  height: 56px; padding: 0 24px;
  background: var(--linen);
  border-bottom: 1px solid var(--stone);
}
.topbar-brand {
  display: flex; align-items: center; gap: 8px;
  font-size: 15px; font-weight: 700; color: var(--ink);
  margin-right: 32px; white-space: nowrap;
}
.brand-mark {
  width: 24px; height: 24px; border-radius: 6px;
  background: linear-gradient(135deg, var(--solar) 0%, var(--violet) 100%);
  display: flex; align-items: center; justify-content: center;
  font-size: 13px; color: var(--white);
}
.topbar-nav {
  display: flex; align-items: stretch; flex: 1; height: 100%;
}
.nav-tab {
  display: flex; align-items: center; gap: 6px;
  padding: 0 18px; height: 100%;
  font-size: 14px; font-weight: 400; color: var(--charcoal);
  background: none; border: none; border-bottom: 2px solid transparent;
  cursor: pointer; transition: all 0.15s; white-space: nowrap;
}
.nav-tab i { font-size: 15px; }
.nav-tab:hover { color: var(--ink); background: rgba(0,0,0,0.03); }
.nav-tab.active { color: var(--ink); font-weight: 600; border-bottom-color: var(--solar); }
.topbar-actions {
  display: flex; align-items: center; gap: 10px; margin-left: auto;
}
.icon-btn {
  position: relative;
  display: flex; align-items: center; justify-content: center;
  width: 34px; height: 34px; border-radius: var(--r-pill);
  border: 1px solid var(--stone); background: none;
  font-size: 16px; color: var(--charcoal);
  cursor: pointer; transition: all 0.15s;
}
.icon-btn:hover { border-color: var(--ink); color: var(--ink); }
.notif-badge {
  position: absolute; top: -4px; right: -4px;
  background: var(--solar); color: var(--ink);
  font-size: 10px; font-weight: 700;
  padding: 1px 5px; border-radius: var(--r-pill);
  min-width: 18px; text-align: center;
}
.user-chip {
  display: flex; align-items: center; gap: 6px;
  padding: 5px 12px 5px 6px;
  border-radius: var(--r-pill);
  border: 1px solid var(--stone); background: none;
  font-size: 13px; font-weight: 500; color: var(--ink);
  cursor: pointer; transition: all 0.15s;
}
.user-chip:hover { border-color: var(--ink); }
.user-avatar {
  width: 24px; height: 24px; border-radius: 50%;
  background: var(--solar); color: var(--ink);
  display: flex; align-items: center; justify-content: center;
  font-size: 11px; font-weight: 700;
}

/* ======= Status Strip (slim — command-tower) ======= */
.status-strip {
  display: flex; align-items: center; gap: 28px;
  height: 40px; padding: 0 24px;
  background: var(--white);
  border-bottom: 1px solid var(--stone);
  font-size: 13px;
}
.ss-item {
  display: flex; align-items: center; gap: 5px; color: var(--charcoal);
}
.ss-item strong { font-weight: 700; color: var(--ink); }
.ss-sep { width: 1px; height: 16px; background: var(--stone); flex-shrink: 0; }
.ss-live {
  display: flex; align-items: center; gap: 5px;
  margin-left: auto; font-size: 12px; font-weight: 600; color: var(--cyan);
}
.ss-live-dot {
  width: 7px; height: 7px; border-radius: 50%;
  background: var(--cyan);
  animation: livePulse 1.5s ease-in-out infinite;
}

/* ======= Board Hero (full-bleed procedural visual) ======= */
.board-hero {
  position: relative; overflow: hidden;
  padding: 44px 40px 40px;
  background: linear-gradient(130deg, var(--solar) 0%, #ffd060 35%, var(--cyan) 75%, var(--violet) 100%);
}
.hero-geo {
  position: absolute; top: 0; right: 0; bottom: 0;
  width: 420px; pointer-events: none;
  animation: heroGeoFloat 6s ease-in-out infinite;
}
.hero-shimmer {
  position: absolute; inset: 0;
  background: linear-gradient(90deg, transparent 0%, rgba(255,255,255,0.06) 50%, transparent 100%);
  background-size: 200% 100%;
  animation: heroShimmer 4s linear infinite;
  pointer-events: none;
}
.hero-body {
  position: relative; z-index: 2; max-width: 620px;
}
.hero-eyebrow {
  font-size: 11px; font-weight: 600; letter-spacing: 0.07em;
  text-transform: uppercase; color: rgba(26,26,26,0.6);
  margin-bottom: 10px;
}
.hero-title {
  font-size: 40px; font-weight: 700; line-height: 1.15;
  color: var(--ink); margin-bottom: 10px;
}
.hero-sub {
  font-size: 16px; color: var(--charcoal); line-height: 1.6;
  margin-bottom: 24px; max-width: 480px;
}
.hero-row { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
.btn {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 9px 22px; border-radius: var(--r-btn);
  font-size: 14px; font-weight: 700; cursor: pointer;
  transition: all 0.15s; border: none; text-decoration: none;
  white-space: nowrap;
}
.btn-violet { background: var(--violet); color: var(--white); }
.btn-violet:hover { background: #0a07c8; }
.btn-solar  { background: var(--solar);  color: var(--ink); }
.btn-solar:hover  { background: var(--solar-dk); }
.btn-outline { background: transparent; color: var(--ink); border: 1.5px solid var(--ink); }
.btn-outline:hover { background: rgba(0,0,0,0.05); }
.btn-sm { padding: 6px 14px; font-size: 13px; border-radius: var(--r-btn); }
.btn-ghost { background: transparent; color: var(--charcoal); border: 1px solid var(--stone); border-radius: var(--r-pill); padding: 5px 14px; font-size: 13px; font-weight: 400; }
.btn-ghost:hover { border-color: var(--ink); color: var(--ink); }
.hero-pill {
  display: flex; align-items: center; gap: 6px;
  background: rgba(255,255,255,0.72); backdrop-filter: blur(8px);
  padding: 6px 14px; border-radius: var(--r-pill);
  font-size: 13px; font-weight: 600; color: var(--ink);
}

/* ======= Page content wrapper ======= */
.page { padding: 24px; animation: slideDown 0.25s ease; }

/* ======= Kanban board ======= */
.ct-main-layout {
  display: grid; grid-template-columns: 1fr 288px; gap: 20px; align-items: start;
}
.kanban { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; align-items: start; }
.kanban-col {
  background: var(--white); border-radius: var(--r-card); padding: 16px;
  min-height: 300px;
  box-shadow: 0 2px 14px rgba(16,9,246,0.06);
  animation: cardEntrance 0.35s ease both;
}
.kanban-col:nth-child(1) { animation-delay: 0.05s; }
.kanban-col:nth-child(2) { animation-delay: 0.10s; }
.kanban-col:nth-child(3) { animation-delay: 0.15s; }
.kanban-col:nth-child(4) { animation-delay: 0.20s; }
.col-head {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 12px;
}
.col-label {
  display: flex; align-items: center; gap: 6px;
  font-size: 13px; font-weight: 700; color: var(--ink);
}
.col-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.col-count {
  font-size: 11px; font-weight: 700;
  padding: 2px 8px; border-radius: var(--r-pill);
  background: var(--linen); color: var(--charcoal);
}
.col-count.hot { background: var(--solar-lt); color: #7a5a00; }

.kc {
  background: var(--linen); border-radius: var(--r-sm);
  padding: 13px; margin-bottom: 10px;
  cursor: pointer; transition: transform 0.12s;
}
.kc:hover { transform: scale(1.02); box-shadow: 0 4px 18px rgba(16,9,246,0.13); }
.kc-name   { font-size: 14px; font-weight: 600; margin-bottom: 3px; }
.kc-meta   { font-size: 12px; color: var(--charcoal); margin-bottom: 7px; display: flex; align-items: center; gap: 4px; }
.kc-amt    { font-size: 15px; font-weight: 700; margin-bottom: 6px; }
.kc-time   { font-size: 11px; color: var(--silver); margin-bottom: 8px; display: flex; align-items: center; gap: 4px; }
.kc-btns   { display: flex; gap: 6px; }
.kc-btn    { flex: 1; padding: 5px 0; font-size: 12px; font-weight: 600; border-radius: 8px; border: none; cursor: pointer; transition: all 0.12s; }
.kc-approve { background: var(--solar); color: var(--ink); }
.kc-approve:hover { background: var(--solar-dk); }
.kc-reject  { background: var(--white); color: var(--charcoal); border: 1px solid var(--stone); }
.kc-reject:hover  { border-color: var(--ink); }
.tag {
  display: inline-flex; align-items: center;
  font-size: 11px; font-weight: 600;
  padding: 2px 8px; border-radius: var(--r-pill);
}
.tag-wait   { background: var(--solar-lt);  color: #7a5a00; }
.tag-review { background: var(--cyan-lt);   color: #0a6a80; }
.tag-done   { background: #e6f9ed; color: #1a7a3a; }
.tag-reject { background: #fdecea; color: #c0392b; }
.tag-urgent { background: var(--violet-lt); color: var(--violet); margin-bottom: 8px; }

/* ======= Priority Rail ======= */
.ct-priority { display: flex; flex-direction: column; gap: 16px; }
.priority-box {
  background: var(--white); border-radius: var(--r-card); padding: 20px;
  box-shadow: 0 2px 14px rgba(16,9,246,0.06);
}
.box-title {
  font-size: 13px; font-weight: 700; color: var(--ink);
  margin-bottom: 14px; display: flex; align-items: center; gap: 6px;
}
.pq-item {
  display: flex; align-items: flex-start; gap: 10px;
  padding: 10px; border-radius: var(--r-sm); margin-bottom: 7px;
  background: var(--linen); cursor: pointer; transition: background 0.12s;
}
.pq-item:hover { background: var(--solar-lt); }
.pq-rank {
  width: 22px; height: 22px; border-radius: 50%;
  background: var(--solar); color: var(--ink);
  font-size: 10px; font-weight: 700;
  display: flex; align-items: center; justify-content: center; flex-shrink: 0;
}
.pq-info { flex: 1; min-width: 0; }
.pq-name  { font-size: 13px; font-weight: 600; }
.pq-meta  { font-size: 11px; color: var(--charcoal); margin-top: 2px; }
.pq-wait  { font-size: 11px; font-weight: 700; color: var(--red); white-space: nowrap; }
.rate-pill {
  background: linear-gradient(135deg, var(--solar-lt) 0%, var(--violet-lt) 100%);
  border-radius: var(--r-sm); padding: 14px 16px; margin-top: 4px;
}
.rate-pct { font-size: 32px; font-weight: 700; color: var(--ink); animation: countUp 0.6s ease; }
.rate-label { font-size: 12px; color: var(--charcoal); margin-top: 2px; }
.rate-bar { height: 4px; border-radius: 2px; background: var(--stone); margin-top: 10px; overflow: hidden; }
.rate-fill {
  height: 100%; border-radius: 2px; background: var(--solar);
  animation: progressFill 1s ease forwards;
  --fill-pct: 79%; width: 79%;
}

/* ======= Toast notification ======= */
@keyframes toastIn  { from { opacity:0; transform:translateX(40px); } to { opacity:1; transform:translateX(0); } }
@keyframes toastOut { from { opacity:1; transform:translateX(0); } to { opacity:0; transform:translateX(40px); } }
.toast-stack { position: fixed; bottom: 24px; right: 24px; z-index: 999; display:flex;flex-direction:column;gap:10px; pointer-events:none; }
.toast {
  display: flex; align-items: center; gap: 10px;
  padding: 13px 18px; border-radius: 12px;
  background: var(--ink); color: var(--white);
  font-size: 14px; font-weight: 500;
  box-shadow: 0 8px 28px rgba(0,0,0,0.22);
  animation: toastIn 0.28s ease;
}
.toast.out { animation: toastOut 0.24s ease forwards; }
.toast-icon { font-size: 18px; flex-shrink:0; }
.toast-success { border-left: 3px solid var(--solar); }
.toast-reject  { border-left: 3px solid #e74c3c; }

/* ======= Secondary widgets ======= */
.widget-strip { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-top: 16px; }
.widget { background: var(--white); border-radius: var(--r-card); padding: 18px; box-shadow: 0 2px 14px rgba(16,9,246,0.06); }
.widget-title { font-size: 13px; font-weight: 700; margin-bottom: 12px; color: var(--ink); }

/* ======= Dashboard screen ======= */
.dash-hero { background: var(--white); border-radius: var(--r-card); padding: 28px; margin-bottom: 18px; }
.dash-head { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 20px; }
.dash-title { font-size: 28px; font-weight: 700; line-height: 1.2; margin-bottom: 4px; }
.dash-sub { font-size: 13px; color: var(--charcoal); }
.dist-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; }
.dist-card { background: var(--white); border-radius: var(--r-card); padding: 20px; text-align: center; }
.dist-icon { font-size: 26px; margin-bottom: 10px; display: block; }
.dist-num { font-size: 32px; font-weight: 700; color: var(--ink); line-height: 1.1; animation: countUp 0.5s ease; }
.dist-unit { font-size: 13px; font-weight: 400; color: var(--charcoal); }
.dist-lbl  { font-size: 12px; color: var(--charcoal); margin-top: 6px; }
.dist-bar  { height: 4px; border-radius: 2px; background: var(--stone); margin-top: 10px; overflow: hidden; }
.dist-fill { height: 100%; border-radius: 2px; animation: progressFill 1s ease forwards; }

/* ======= Template screen ======= */
.tmpl-layout { display: grid; grid-template-columns: 380px 1fr; gap: 20px; align-items: start; }
.tmpl-panel { background: var(--white); border-radius: var(--r-card); padding: 24px; }
.form-group { margin-bottom: 18px; }
.form-lbl { font-size: 13px; font-weight: 600; color: var(--charcoal); margin-bottom: 6px; display: block; }
.form-inp {
  width: 100%; padding: 9px 12px;
  border: 1px solid var(--silver); border-radius: var(--r-input);
  font-size: 14px; background: var(--white); color: var(--ink);
  transition: border-color 0.15s;
}
.form-inp:focus { outline: none; border-color: var(--ink); }
.upload-zone {
  border: 2px dashed var(--stone); border-radius: var(--r-sm);
  padding: 20px; text-align: center; cursor: pointer;
  font-size: 13px; color: var(--charcoal); transition: all 0.15s;
}
.upload-zone:hover { border-color: var(--solar); background: var(--solar-lt); }
.a4 {
  background: var(--white); border: 1px solid var(--stone); border-radius: 4px;
  aspect-ratio: 210 / 297; padding: 36px 36px;
  display: flex; flex-direction: column;
  font-size: 11px; box-shadow: 0 4px 28px rgba(0,0,0,0.09);
  max-width: 330px; margin: 0 auto;
}
.a4-hdr { display: flex; align-items: center; justify-content: space-between; border-bottom: 2px solid var(--solar); padding-bottom: 14px; margin-bottom: 18px; }
.a4-logo { font-size: 14px; font-weight: 700; }
.a4-title { font-size: 17px; font-weight: 700; text-align: center; margin-bottom: 14px; }
.a4-row { display: flex; gap: 8px; margin-bottom: 7px; }
.a4-key { color: var(--charcoal); width: 72px; flex-shrink: 0; }
.a4-val { font-weight: 600; }
.a4-seal {
  width: 48px; height: 48px; border-radius: 50%;
  border: 2px solid var(--solar);
  display: flex; align-items: center; justify-content: center;
  font-size: 8px; font-weight: 700; color: var(--solar); text-align: center;
  align-self: flex-end; margin-top: auto;
}
.ver-list { border-top: 1px solid var(--stone); padding-top: 14px; margin-top: 18px; }
.ver-item { display: flex; align-items: center; gap: 8px; padding: 9px 0; border-bottom: 1px solid var(--linen); font-size: 13px; }
.ver-tag { background: var(--linen); padding: 2px 8px; border-radius: var(--r-pill); font-size: 11px; font-weight: 700; }
.ver-tag.cur { background: var(--solar-lt); color: #7a5a00; }

/* ======= Customer screen ======= */
.cust-layout { display: grid; grid-template-columns: 300px 1fr; gap: 18px; align-items: start; }
.cust-panel { background: var(--white); border-radius: var(--r-card); padding: 18px; }
.search-box { display: flex; align-items: center; gap: 7px; padding: 8px 12px; border: 1px solid var(--stone); border-radius: var(--r-input); background: var(--linen); margin-bottom: 14px; }
.search-box input { border: none; background: none; font-size: 14px; flex: 1; color: var(--ink); }
.search-box input:focus { outline: none; }
.cust-item { display: flex; align-items: center; gap: 10px; padding: 11px; border-radius: var(--r-sm); margin-bottom: 3px; cursor: pointer; transition: background 0.12s; }
.cust-item:hover { background: var(--linen); }
.cust-item.sel { background: var(--solar-lt); }
.cust-av { width: 36px; height: 36px; border-radius: 50%; background: var(--solar); color: var(--ink); display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 700; flex-shrink: 0; }
.cust-name { font-size: 14px; font-weight: 600; }
.cust-meta { font-size: 12px; color: var(--charcoal); margin-top: 1px; }
.detail-box { background: var(--white); border-radius: var(--r-card); padding: 24px; }
.tl { position: relative; padding-left: 22px; margin-top: 14px; }
.tl::before { content: ''; position: absolute; left: 5px; top: 0; bottom: 0; width: 2px; background: var(--stone); }
.tl-item { position: relative; padding-bottom: 18px; animation: cardEntrance 0.3s ease; }
.tl-dot { position: absolute; left: -17px; top: 5px; width: 11px; height: 11px; border-radius: 50%; border: 2px solid var(--white); }
.tl-date  { font-size: 11px; color: var(--charcoal); margin-bottom: 3px; }
.tl-event { font-size: 14px; font-weight: 600; }
.tl-sub   { font-size: 12px; color: var(--charcoal); margin-top: 2px; }

/* ======= Section titles ======= */
.eyebrow { font-size: 11px; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; color: var(--charcoal); margin-bottom: 6px; }
.sec-title { font-size: 28px; font-weight: 700; margin-bottom: 20px; color: var(--ink); }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useCallback } = React;

/* ──── Data ──── */
const WAIT_CARDS = [
  { id:1, name:'김요양 간병사', ward:'이환자님 담당', type:'영수증', amt:'₩85,000', ago:'2시간 7분 전', urgent:true },
  { id:2, name:'박방문 간병사', ward:'최요양님 담당', type:'영수증', amt:'₩120,000', ago:'1시간 41분 전', urgent:true },

/* ──── Toast ──── */
let toastId = 0;
function useToast() {
  const [toasts, setToasts] = useState([]);
  const push = useCallback((msg, type='success') => {
    const id = ++toastId;
    setToasts(prev => [...prev, {id, msg, type}]);
    setTimeout(() => setToasts(prev => prev.filter(t => t.id !== id)), 3200);
  }, []);
  return { toasts, push };
}
function ToastStack({ toasts }) {
  return (
    <div className="toast-stack">
      {toasts.map(t => (
        <div key={t.id} className={`toast toast-${t.type}`}>
          <i className={`ph ${t.type==='success'?'ph-check-circle':'ph-x-circle'} toast-icon`}
             style={{color: t.type==='success'?'var(--solar)':'#e74c3c'}}/>
          {t.msg}
        </div>
      ))}
    </div>
  );
}

/* ──── SVG Charts ──── */
function LineChart() {
  const vals = [12,18,24,31,28,36,42,47,39,52,44,37];
  const W=640, H=140;
  const mx = Math.max(...vals) + 6;
  const pts = vals.map((v,i) => [i*(W/(vals.length-1)), H - (v/mx)*H]);
  const line = pts.map((p,i) => (i===0?`M${p[0]},${p[1]}`:`L${p[0]},${p[1]}`)).join(' ');
  const fill = pts.map((p,i) => (i===0?`M${p[0]},${H} L${p[0]},${p[1]}`:`L${p[0]},${p[1]}`)).join(' ')+` L${pts[pts.length-1][0]},${H} Z`;
  const lbls=['09:00','09:30','10:00','10:30','11:00','11:30','12:00','12:30','13:00','13:30','14:00','14:30'];
  return (
    <div style={{overflowX:'auto'}}>
      <svg viewBox={`0 0 ${W} ${H+20}`} width="100%" style={{display:'block'}}>
        <defs>
          <linearGradient id="lg1" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%"   stopColor="#ffba09" stopOpacity="0.22"/>
            <stop offset="100%" stopColor="#ffba09" stopOpacity="0.02"/>
          </linearGradient>
        </defs>
        {[0,20,40].map(v=>(
          <line key={v} x1="0" y1={H-(v/mx)*H} x2={W} y2={H-(v/mx)*H}
            stroke="#d4d4d0" strokeWidth="1" strokeDasharray="4 4"/>
        ))}
        <path d={fill} fill="url(#lg1)"/>
        <path d={line} stroke="#ffba09" strokeWidth="2.5" fill="none" strokeLinejoin="round"/>
        {pts.map((p,i)=>(
          <circle key={i} cx={p[0]} cy={p[1]} r="3.5" fill="#ffba09" stroke="white" strokeWidth="1.5"/>
        ))}
        {lbls.map((l,i)=>(
          <text key={i} x={i*(W/(lbls.length-1))} y={H+16}
            fontSize="9" fill="#b3b3b3" textAnchor="middle">{l}</text>
        ))}
      </svg>
    </div>
  );
}

function Sparkline({data, color}) {
  const W=160, H=36;
  const mx=Math.max(...data), mn=Math.min(...data);
  const pts=data.map((v,i)=>([i*(W/(data.length-1)), H-((v-mn)/(mx-mn+1))*H]));
  const d=pts.map((p,i)=>(i===0?`M${p[0]},${p[1]}`:`L${p[0]},${p[1]}`)).join(' ');
  return (
    <svg viewBox={`0 0 ${W} ${H}`} width="100%" style={{display:'block'}}>
      <path d={d} stroke={color||'#ffba09'} strokeWidth="2" fill="none" strokeLinejoin="round"
        strokeDasharray="200" style={{animation:'sparkDraw 1.2s ease forwards'}}/>
    </svg>
  );
}

                <div className="a4-row"><span className="a4-key">간병 금액</span><span className="a4-val">₩85,000</span></div>
              </>
            ) : (
              <>
                <div className="a4-row"><span className="a4-key">성명</span><span className="a4-val">홍길동</span></div>
                <div className="a4-row"><span className="a4-key">직위</span><span className="a4-val">간병사</span></div>
                <div className="a4-row"><span className="a4-key">입사일</span><span className="a4-val">2024.03.01</span></div>
                <div className="a4-row"><span className="a4-key">발급 목적</span><span className="a4-val">제출용</span></div>
              </>
            )}
            <div style={{flex:1}}/>
            <div style={{display:'flex',alignItems:'flex-end',justifyContent:'space-between',marginTop:16}}>
              <div style={{fontSize:9,color:'var(--charcoal)'}}>
                발급일: 2026년 6월 12일<br/>발급번호: DOC-20260612-047
              </div>
              <div className="a4-seal">직인</div>
            </div>
          </div>
        </div>
      </div>
    </div>
  );
}

function CustomerScreen() {
  const [sel, setSel] = useState(CUSTOMERS[0]);
  const [q, setQ] = useState('');
  const filtered = CUSTOMERS.filter(c=>c.name.includes(q)||c.phone.includes(q));
  return (
    <div className="page">
      <div className="eyebrow">고객 정보 및 문서 현황 관리</div>
      <div className="sec-title">고객 통합 관리</div>
      <div className="cust-layout">
        <div className="cust-panel">
          <div className="search-box">
            <i className="ph ph-magnifying-glass" style={{color:'var(--silver)'}}/>
            <input placeholder="이름·연락처 검색..." value={q} onChange={e=>setQ(e.target.value)}/>
          </div>
          {filtered.map(c=>(
            <div key={c.id} className={`cust-item${sel?.id===c.id?' sel':''}`} onClick={()=>setSel(c)}>
              <div className="cust-av">{c.av}</div>
              <div>
                <div className="cust-name">{c.name}</div>
                <div className="cust-meta">{c.phone} · 발급 {c.cnt}건</div>
              </div>
            </div>
          ))}
        </div>
        <div className="detail-box">
          {sel && (
            <>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:20}}>
                <div>
                  <div style={{fontSize:28,fontWeight:700,marginBottom:4}}>{sel.name}</div>
                  <div style={{fontSize:14,color:'var(--charcoal)'}}>{sel.phone}</div>
                </div>
                <div style={{display:'flex',gap:8}}>
                  <button className="btn btn-ghost btn-sm"><i className="ph ph-pencil"/> 정보 수정</button>
                  <button className="btn btn-violet btn-sm"><i className="ph ph-file-plus"/> 문서 신청</button>
                </div>
              </div>
              <div style={{display:'flex',gap:14,marginBottom:22}}>
                {[
                  {lbl:'총 발급 건수', val:`${sel.cnt}건`, border:'#ffba09'},
                  {lbl:'마지막 발급일', val:sel.last,      border:'#1ec6f6'},
                  {lbl:'미처리 요청',  val:'1건',           border:'#e74c3c'},
                ].map(s=>(
                  <div key={s.lbl} style={{flex:1,background:'var(--linen)',borderRadius:12,padding:'12px 16px',borderLeft:`3px solid ${s.border}`}}>
                    <div style={{fontSize:11,color:'var(--charcoal)',marginBottom:4}}>{s.lbl}</div>
                    <div style={{fontSize:18,fontWeight:700}}>{s.val}</div>
                  </div>
                ))}
              </div>
              <div style={{fontSize:14,fontWeight:700,marginBottom:12,display:'flex',alignItems:'center',gap:6}}>
                <i className="ph ph-clock-clockwise"/> 발급 이력 타임라인
              </div>
              <div className="tl">
                {TL.map((item,i)=>(
                  <div key={i} className="tl-item">
                    <div className="tl-dot" style={{background:item.color}}/>
                    <div className="tl-date">{item.date}</div>
                    <div className="tl-event">{item.event}</div>
                    <div className="tl-sub">{item.sub}</div>
                  </div>
                ))}
              </div>
            </>
          )}
        </div>
      </div>
    </div>
  );
}

/* ──── App ──── */
const TABS = [
  {id:'main',      label:'승인 워크플로우', icon:'ph-kanban'},
  {id:'dashboard', label:'문서 현황',       icon:'ph-chart-line'},
  {id:'template',  label:'템플릿 설정',     icon:'ph-file-text'},
  {id:'customer',  label:'고객 관리',       icon:'ph-users'},
];

function App() {
  const [tab, setTab] = useState('main');
  const { toasts, push } = useToast();
  const screens = {
    main:      <MainScreen push={push}/>,
    dashboard: <DashboardScreen/>,
    template:  <TemplateScreen/>,
    customer:  <CustomerScreen/>,
  };
  return (
    <div data-archetype="topbar-analytics" style={{minHeight:'100vh',display:'flex',flexDirection:'column'}}>
      <header className="topbar">
        <div className="topbar-brand">
          <div className="brand-mark"><i className="ph ph-files" style={{fontSize:13}}/></div>
          DocPortal
        </div>
        <nav className="topbar-nav">
          {TABS.map(t=>(
            <button key={t.id} className={`nav-tab${tab===t.id?' active':''}`} onClick={()=>setTab(t.id)}>
              <i className={`ph ${t.icon}`}/>{t.label}
            </button>
          ))}
        </nav>
        <div className="topbar-actions">
          <button className="icon-btn" onClick={()=>{}}>
            <i className="ph ph-bell"/>
            <span className="notif-badge">12</span>
          </button>
          <button className="user-chip">
            <div className="user-avatar">이</div>
            관리자 이준호 <i className="ph ph-caret-down" style={{fontSize:11}}/>
          </button>
        </div>
      </header>

      {/* Status strip — slim command-tower metrics (NOT big KPI cards) */}
      <div className="status-strip">
        <div className="ss-item">
          <i className="ph ph-clock" style={{fontSize:14,color:'#e74c3c'}}/>
          승인 대기 <strong>12</strong>건
        </div>
        <div className="ss-sep"/>
        <div className="ss-item">
          <i className="ph ph-file-pdf" style={{fontSize:14,color:'#ffba09'}}/>
          오늘 발급 <strong>47</strong>건
        </div>
        <div className="ss-sep"/>
        <div className="ss-item">
          <i className="ph ph-check-circle" style={{fontSize:14,color:'#27ae60'}}/>
          처리율 <strong>79%</strong>
        </div>
        <div className="ss-sep"/>
        <div className="ss-item">
          <i className="ph ph-timer" style={{fontSize:14,color:'#1ec6f6'}}/>
          평균 처리 <strong>2.3분</strong>
        </div>
        <div className="ss-live">
          <div className="ss-live-dot"/>
          실시간 동기화 중
        </div>
      </div>

      {screens[tab] || screens.main}
      <ToastStack toasts={toasts}/>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
