<script type="text/babel">
const { useState, useEffect, useRef } = React;

// SVG Line Chart
const LineChart = ({ datasets, width = '100%', height = 200 }) => {
  const ref = useRef(null);
  const [dims, setDims] = useState({w: 800, h: 200});
  useEffect(() => {
    if (ref.current) setDims({w: ref.current.offsetWidth || 800, h: height});
  }, []);

  const W = dims.w; const H = dims.h;
  const pad = {l:40, r:20, t:10, b:30};
  const innerW = W - pad.l - pad.r; const innerH = H - pad.t - pad.b;
  const all = datasets.flatMap(d => d.values);
  const max = Math.max(...all); const min = Math.min(...all);
  const range = max - min || 1;
  const n = datasets[0].values.length;

  const xScale = i => pad.l + (i / (n - 1)) * innerW;
  const yScale = v => pad.t + innerH - ((v - min) / range) * innerH;

  const pathFor = (vals, smooth = true) => {
    const pts = vals.map((v, i) => [xScale(i), yScale(v)]);
    if (!smooth) return 'M' + pts.map(p => p.join(',')).join('L');
    return pts.reduce((s, [x, y], i) => {
      if (i === 0) return `M${x},${y}`;
      const [px, py] = pts[i - 1];
      const cx1 = px + (x - px) * 0.5; const cy1 = py;
      const cx2 = x - (x - px) * 0.5; const cy2 = y;
      return s + ` C${cx1},${cy1} ${cx2},${cy2} ${x},${y}`;
    }, '');
  };

  const gridVals = Array.from({length: 4}, (_, i) => Math.round(min + (range * i) / 3));
  const MONTHS = ['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
  const xLabels = Array.from({length: n}, (_, i) => MONTHS[i % 12]);

  return (
    <svg ref={ref} width={width} height={height} viewBox={`0 0 ${W} ${H}`} preserveAspectRatio="none">
      {gridVals.map((v, i) => {
        const y = yScale(v);
        return (
          <g key={i}>
            <line x1={pad.l} y1={y} x2={W - pad.r} y2={y} stroke="#e5e7eb" strokeWidth="1" strokeDasharray="3,3" />
            <text x={pad.l - 6} y={y + 4} fontSize="10" fill="#6b7280" textAnchor="end">{v >= 1000 ? (v/1000).toFixed(0)+'k' : v}</text>
          </g>
        );
      })}
      {[0, Math.floor(n/2), n-1].map(i => (
        <text key={i} x={xScale(i)} y={H - 6} fontSize="10" fill="#6b7280" textAnchor="middle">{xLabels[i]}</text>
      ))}
      {datasets.map((d, di) => {
        const path = pathFor(d.values);
        const areaPath = path + ` L${xScale(n-1)},${pad.t + innerH} L${pad.l},${pad.t + innerH} Z`;
        return (
          <g key={di}>
            <defs>
              <linearGradient id={`grad${di}`} x1="0" y1="0" x2="0" y2="1">
                <stop offset="0%" stopColor={d.color} stopOpacity="0.2"/>
                <stop offset="100%" stopColor={d.color} stopOpacity="0"/>
              </linearGradient>
            </defs>
            <path d={areaPath} fill={`url(#grad${di})`} />
            <path d={path} stroke={d.color} strokeWidth="2.5" fill="none" strokeLinecap="round" strokeLinejoin="round" />
          </g>
        );
      })}
    </svg>
  );
};

// Donut mini
const DonutMini = ({ pct, color, size = 48, strokeWidth = 6 }) => {
  const r = (size - strokeWidth) / 2;
  const c = size / 2;
  const circ = 2 * Math.PI * r;
  return (
    <svg width={size} height={size}>
      <circle cx={c} cy={c} r={r} fill="none" stroke="#e5e7eb" strokeWidth={strokeWidth} />
      <circle cx={c} cy={c} r={r} fill="none" stroke={color} strokeWidth={strokeWidth}
        strokeDasharray={`${pct / 100 * circ} ${circ}`} strokeLinecap="round"
        transform={`rotate(-90 ${c} ${c})`} />
    </svg>
  );
};

function App() {
  const [activeSection, setActiveSection] = useState('통계 대시보드');

  const [period, setPeriod] = useState('6M');

  const [exportProgress, setExportProgress] = useState(0);

                  <option>Basic Auth</option>
                </select>
              </div>
              <div style={{padding:'10px 12px',background:'#f0fdf4',borderRadius:8,border:'1px solid #bbf7d0',fontSize:12.5,color:'#15803d'}}>
                <i className="ph ph-check-circle" style={{fontSize:14}}></i> 연결 테스트를 먼저 실행하면 설정이 검증됩니다.
              </div>
            </div>
            <div className="modal-footer">
              <button className="btn-sm btn-sm-outline" onClick={()=>showToast('연결 테스트를 실행합니다')}>연결 테스트</button>
              <button className="btn-sm btn-sm-solid" onClick={()=>{setShowConnectModal(false);showToast('콘텐츠 연결이 추가되었습니다');}}>연결 저장</button>
            </div>
          </div>
        </div>
      )}

      {toast && (
        <div className="toast">
          <i className="ph ph-check-circle" style={{fontSize:15,color:'#3ad98a'}}></i>
          {toast}
        </div>
      )}
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
