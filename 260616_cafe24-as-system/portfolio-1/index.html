<!DOCTYPE html>
<html lang="ko" data-archetype="linear-sidebar-cmdk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AS 접수 관리 시스템 — 맞춤 구현 데모</title>
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --p:#f1ccff;--pd:#c89cd9;--ac:#c5f61e;--acd:#a3d019;
  --bg:#f5f2f0;--sf:#ffffff;--sfg:rgba(255,255,255,.72);
  --tx:#1a1a1a;--tx2:#7b7b7b;--bd:#e2dedd;--bdl:#ede9e6;
  --rlg:16px;--rmd:12px;--rsm:8px;--rpill:9999px;
  --sh:0 8px 32px rgba(0,0,0,.08),0 2px 8px rgba(0,0,0,.04);
  --shc:0 4px 16px rgba(0,0,0,.06),0 1px 4px rgba(0,0,0,.04);
}
body{font-family:'Pretendard',-apple-system,sans-serif;background:var(--bg);color:var(--tx);height:100vh;overflow:hidden;display:flex;font-size:14px}

/* ── ANIMATIONS ── */
@keyframes fadeUp{from{opacity:0;transform:translateY(7px)}to{opacity:1;transform:none}}
@keyframes pulse{0%,100%{box-shadow:0 0 0 4px rgba(241,204,255,.38)}50%{box-shadow:0 0 0 8px rgba(241,204,255,.14)}}
@keyframes slideInLeft{from{opacity:0;transform:translateX(-12px)}to{opacity:1;transform:none}}
@keyframes growBar{from{transform:scaleX(0)}to{transform:scaleX(1)}}
@keyframes countUp{0%{opacity:0;transform:translateY(4px) scale(.96)}100%{opacity:1;transform:none}}
.fade{animation:fadeUp .2s ease-out}
.slide-in{animation:slideInLeft .18s ease-out}

/* ── SIDEBAR ── */
.sidebar{width:218px;min-width:218px;background:var(--sf);border-right:1px solid var(--bd);display:flex;flex-direction:column;height:100vh}
.sidebar-brand{padding:18px 16px 14px;border-bottom:1px solid var(--bdl)}
.brand-row{display:flex;align-items:center;gap:10px}
.brand-badge{width:32px;height:32px;background:linear-gradient(135deg,#f1ccff,#c89cd9);border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.brand-name{font-size:14.5px;font-weight:600;letter-spacing:-.01em}
.brand-sub{font-size:11px;color:var(--tx2);margin-top:1px}
.sidebar-cmdk-hint{margin:10px 12px;display:flex;align-items:center;gap:7px;background:var(--bg);border:1px solid var(--bd);border-radius:var(--rsm);padding:7px 10px;cursor:pointer;transition:.15s}
.sidebar-cmdk-hint:hover{border-color:var(--pd)}
.cmdk-hint-txt{font-size:12px;color:var(--tx2);flex:1}
.cmdk-kbd{font-size:10px;color:var(--tx2);background:var(--bdl);border-radius:3px;padding:1px 5px}
.sidebar-section{padding:2px 10px}
.sidebar-section-title{font-size:10px;font-weight:600;color:var(--tx2);text-transform:uppercase;letter-spacing:.08em;padding:8px 8px 4px}
.sidebar-link{display:flex;align-items:center;gap:9px;padding:8px 10px;border-radius:var(--rsm);cursor:pointer;font-size:13.5px;color:var(--tx2);transition:.12s;margin-bottom:1px;user-select:none}
.sidebar-link:hover{background:rgba(241,204,255,.15);color:var(--tx)}
.sidebar-link.active{background:rgba(241,204,255,.35);color:#6b21a8;font-weight:500;border-left:3px solid var(--pd);margin-left:-2px;padding-left:9px}
.sidebar-link i{width:15px;height:15px;flex-shrink:0;opacity:.65}
.sidebar-link.active i{opacity:1}
.sidebar-badge{margin-left:auto;background:var(--p);color:#6b21a8;font-size:10px;font-weight:600;padding:1px 6px;border-radius:var(--rpill)}
.sidebar-div{height:1px;background:var(--bdl);margin:8px 12px}
.sidebar-user{margin-top:auto;padding:12px 14px;border-top:1px solid var(--bdl);display:flex;align-items:center;gap:9px;cursor:pointer}
.sidebar-user-av{width:30px;height:30px;border-radius:50%;background:linear-gradient(135deg,#f1ccff,#c89cd9);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;color:#6b21a8;flex-shrink:0}
.sidebar-user-name{font-size:12.5px;font-weight:500}
.sidebar-user-role{font-size:11px;color:var(--tx2)}

/* ── MAIN ── */
.main-area{flex:1;display:flex;flex-direction:column;height:100vh;overflow:hidden;min-width:0}
.topbar{height:50px;min-height:50px;background:rgba(255,255,255,.82);backdrop-filter:blur(12px);border-bottom:1px solid var(--bd);display:flex;align-items:center;padding:0 22px;gap:10px;flex-shrink:0}
.breadcrumb{display:flex;align-items:center;gap:4px;flex:1;min-width:0}
.breadcrumb-item{font-size:13px;color:var(--tx2);cursor:pointer;white-space:nowrap}
.breadcrumb-item:hover{color:var(--tx)}
.breadcrumb-item.cur{font-size:14px;font-weight:600;color:var(--tx)}
.breadcrumb-sep{font-size:12px;color:var(--bd);flex-shrink:0}
.btn{display:flex;align-items:center;gap:5px;padding:6px 13px;border-radius:var(--rsm);font-size:12.5px;font-weight:500;cursor:pointer;border:none;font-family:'Pretendard',sans-serif;transition:.14s}
.btn-p{background:var(--p);color:#3b0764}
.btn-p:hover{background:var(--pd)}
.btn-g{background:transparent;color:var(--tx2);border:1px solid var(--bd)}
.btn-g:hover{background:var(--sf);color:var(--tx)}
.btn-acc{background:var(--ac);color:#1a3300;font-weight:600}
.btn-acc:hover{background:var(--acd)}
.content{flex:1;overflow-y:auto;padding:22px}
.content::-webkit-scrollbar{width:6px}
.content::-webkit-scrollbar-thumb{background:var(--bd);border-radius:3px}

/* ── CARDS ── */
.card{background:var(--sf);border-radius:var(--rlg);border:1px solid var(--bd);box-shadow:var(--shc);overflow:hidden}
.glass{background:var(--sfg);backdrop-filter:blur(12px);border:1px solid rgba(241,204,255,.4);border-radius:var(--rlg);box-shadow:var(--sh)}

/* ── STATS ── */
.stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:13px;margin-bottom:22px}
.stat-card{background:var(--sf);border-radius:var(--rlg);border:1px solid var(--bd);padding:15px 17px;box-shadow:var(--shc);position:relative;overflow:hidden}
.stat-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--p)}
.stat-card.lime::before{background:var(--ac)}
.stat-card.pur::before{background:var(--pd)}
.stat-card.grn::before{background:#86efac}
.stat-lbl{font-size:11px;color:var(--tx2);margin-bottom:5px;font-weight:500;display:flex;align-items:center;gap:5px}
.stat-val{font-size:25px;font-weight:700;letter-spacing:-.02em;animation:countUp .35s ease-out}
.stat-sub{font-size:11px;color:var(--tx2);margin-top:3px}
.stat-ico{position:absolute;top:13px;right:13px;width:30px;height:30px;border-radius:7px;background:rgba(241,204,255,.3);display:flex;align-items:center;justify-content:center}

/* ── FORM ── */
.form-hd{padding:20px 24px 14px;background:linear-gradient(135deg,rgba(241,204,255,.28),rgba(200,156,217,.12));border-bottom:1px solid rgba(241,204,255,.35)}
.form-hd-title{font-family:'Playfair Display',serif;font-size:32px;font-weight:400;margin-bottom:4px}
.form-hd-sub{font-size:12.5px;color:var(--tx2)}
.form-steps{display:flex;padding:13px 24px 0;border-bottom:1px solid var(--bdl)}
.fstep{display:flex;align-items:center;gap:6px;padding-bottom:11px;margin-right:22px;border-bottom:2px solid transparent;font-size:13px;color:var(--tx2);cursor:default}
.fstep.act{border-color:var(--pd);color:#6b21a8;font-weight:600}
.fstep.done{color:#166534}
.fstep-num{width:19px;height:19px;border-radius:50%;background:var(--bdl);color:var(--tx2);font-size:10px;font-weight:600;display:flex;align-items:center;justify-content:center}
.fstep.act .fstep-num{background:var(--p);color:#6b21a8}
.fstep.done .fstep-num{background:#bbf7d0;color:#166534}
.form-body{padding:22px 24px}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:13px;margin-bottom:16px}
.fg{margin-bottom:16px}
.fg:last-child{margin-bottom:0}
.flabel{font-size:12px;font-weight:500;margin-bottom:5px;display:flex;align-items:center;gap:3px}
.req{color:#dc2626}
.finput{width:100%;padding:8px 11px;border:1.5px solid var(--bd);border-radius:var(--rsm);font-family:'Pretendard',sans-serif;font-size:13px;color:var(--tx);background:var(--sf);transition:.14s;outline:none}
.finput:focus{border-color:var(--pd);box-shadow:0 0 0 3px rgba(241,204,255,.22)}
.finput::placeholder{color:#c0bbb8}
select.finput{cursor:pointer}
textarea.finput{resize:vertical;min-height:80px;line-height:1.5}
.upload-zone{border:2px dashed rgba(200,156,217,.55);border-radius:var(--rmd);padding:26px 20px;text-align:center;background:rgba(241,204,255,.06);cursor:pointer;transition:.18s}
.upload-zone:hover{border-color:var(--pd);background:rgba(241,204,255,.13)}
.file-chips{display:flex;flex-wrap:wrap;gap:7px;margin-top:10px}
.fchip{display:inline-flex;align-items:center;gap:5px;background:rgba(241,204,255,.22);border:1px solid rgba(200,156,217,.45);border-radius:var(--rpill);padding:3px 10px;font-size:11.5px;color:#6b21a8}
.form-ft{padding:14px 24px;border-top:1px solid var(--bdl);display:flex;justify-content:space-between;align-items:center;background:var(--bg)}
.radio-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px}
.radio-opt{display:flex;align-items:center;gap:7px;padding:8px 11px;border:1.5px solid var(--bd);border-radius:var(--rsm);cursor:pointer;font-size:12.5px;transition:.12s}
.radio-opt:hover{border-color:var(--pd)}
.radio-opt input{accent-color:#c89cd9}

/* ── PROGRESS ── */
.progress{display:flex;align-items:center}
.pstep{display:flex;flex-direction:column;align-items:center;gap:5px;flex:1;position:relative}
.pstep::after{content:'';position:absolute;top:13px;left:calc(50% + 13px);width:calc(100% - 26px);height:2px;background:var(--bd)}
.pstep:last-child::after{display:none}
.pstep.done::after{background:var(--pd);animation:growBar .4s ease-out;transform-origin:left}
.pdot{width:26px;height:26px;border-radius:50%;border:2px solid var(--bd);background:var(--sf);display:flex;align-items:center;justify-content:center;font-size:11px;z-index:1;position:relative;transition:.2s}
.pstep.done .pdot{background:var(--pd);border-color:var(--pd);color:#fff}
.pstep.cur .pdot{background:var(--p);border-color:var(--pd);animation:pulse 2s ease-in-out infinite}
.plbl{font-size:11px;color:var(--tx2);text-align:center}
.pstep.done .plbl,.pstep.cur .plbl{color:var(--tx);font-weight:500}

/* ── LOOKUP ── */
.lookup-card{max-width:600px;margin:0 auto}
.lookup-hd{padding:22px 24px;background:linear-gradient(135deg,rgba(241,204,255,.22),rgba(200,156,217,.1));border-bottom:1px solid rgba(241,204,255,.3);text-align:center}
.lookup-title{font-family:'Playfair Display',serif;font-size:36px;font-weight:400;margin-bottom:5px}
.lookup-sub{font-size:13px;color:var(--tx2)}
.tabs{display:flex;border-bottom:1px solid var(--bdl)}
.tab{flex:1;padding:11px;text-align:center;font-size:13px;cursor:pointer;color:var(--tx2);border-bottom:2px solid transparent;margin-bottom:-1px;transition:.12s}
.tab.on{border-color:var(--pd);color:#6b21a8;font-weight:600}
.lookup-body{padding:18px 22px}
.result-box{background:var(--bg);border-radius:var(--rmd);border:1px solid var(--bd);overflow:hidden;margin-top:14px}
.result-hd{padding:13px 15px;background:linear-gradient(90deg,rgba(241,204,255,.28),transparent);border-bottom:1px solid var(--bdl);display:flex;align-items:center;justify-content:space-between}
.result-id{font-family:monospace;font-size:14px;font-weight:600;color:#6b21a8}
.result-body{padding:15px}
.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.info-lbl{font-size:11px;color:var(--tx2);margin-bottom:2px}
.info-val{font-size:13px;font-weight:500}
.update-box{background:rgba(241,204,255,.1);border-radius:var(--rsm);padding:11px 13px;margin-top:10px}
.update-lbl{font-size:11px;color:var(--tx2);margin-bottom:3px}
.update-action{font-size:13px;font-weight:500}
.update-time{font-size:11px;color:var(--tx2);margin-top:2px}

/* ── STATUS UPDATE ── */
.upd-grid{display:grid;grid-template-columns:1fr 1fr;gap:13px;margin-bottom:14px}
.su-card{background:var(--sf);border-radius:var(--rlg);border:1px solid var(--bd);box-shadow:var(--shc);overflow:hidden}
.su-hd{padding:14px 18px;border-bottom:1px solid var(--bdl);display:flex;align-items:center;gap:9px}
.su-hd-title{font-size:14px;font-weight:600}
.su-body{padding:18px}
.status-btns{display:grid;grid-template-columns:repeat(4,1fr);gap:9px}
.s-btn{padding:11px 6px;border-radius:var(--rmd);border:2px solid var(--bd);text-align:center;cursor:pointer;font-size:12px;font-weight:500;transition:.14s;background:var(--bg);color:var(--tx2)}
.s-btn:hover:not(.dis){border-color:var(--pd);background:rgba(241,204,255,.15)}
.s-btn.on{background:rgba(241,204,255,.25);border-color:var(--pd);color:#6b21a8}
.s-btn.dis{opacity:.35;cursor:not-allowed}
.delivery-box{background:rgba(241,204,255,.1);border:1.5px solid rgba(200,156,217,.45);border-radius:var(--rmd);padding:14px;margin-top:14px}
.delivery-title{font-size:12.5px;font-weight:600;color:#6b21a8;margin-bottom:11px;display:flex;align-items:center;gap:5px}
.hist-item{display:flex;gap:10px;margin-bottom:14px}
.hist-line{display:flex;flex-direction:column;align-items:center}
.hist-dot{width:9px;height:9px;border-radius:50%;background:var(--pd);flex-shrink:0;margin-top:2px}
.hist-conn{width:2px;flex:1;background:var(--bdl);margin:3px 0}
.hist-action{font-size:13px;font-weight:500}
.hist-time{font-size:11px;color:var(--tx2);margin-top:1px}

/* ── LIST RAIL ── */
.list-rail-wrap{width:280px;min-width:280px;border-right:1px solid var(--bd);display:flex;flex-direction:column;height:100%;overflow:hidden}
.filter-bar{padding:8px 10px;border-bottom:1px solid var(--bdl);display:flex;gap:5px;flex-wrap:wrap}
.chip{padding:3px 9px;border-radius:var(--rpill);font-size:11px;cursor:pointer;background:var(--bg);color:var(--tx2);border:1px solid var(--bd);transition:.12s}
.chip.on{background:var(--p);color:#6b21a8;border-color:var(--pd);font-weight:500}
.list-body{flex:1;overflow-y:auto}
.list-body::-webkit-scrollbar{width:4px}
.list-body::-webkit-scrollbar-thumb{background:var(--bd);border-radius:2px}
.t-item{padding:11px 14px;border-bottom:1px solid var(--bdl);cursor:pointer;transition:background .1s;position:relative}
.t-item:hover{background:rgba(241,204,255,.1)}
.t-item.sel{background:rgba(241,204,255,.22)}
.t-item.sel::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--pd);border-radius:0 2px 2px 0}
.t-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:3px}
.t-id{font-size:11px;color:var(--tx2);font-family:'Courier New',monospace}
.t-model{font-size:13px;font-weight:500;margin-bottom:2px}
.t-info{font-size:12px;color:var(--tx2)}
.sbadge{font-size:10px;font-weight:600;padding:2px 6px;border-radius:var(--rpill)}
.s-rcv{background:#e0f2fe;color:#0369a1}
.s-chk{background:#fef3c7;color:#92400e}
.s-rpr{background:#f3e8ff;color:#7c3aed}
.s-shp{background:#dcfce7;color:#166534}

/* ── DETAIL PANEL ── */
.detail-panel{flex:1;overflow:hidden;display:flex;flex-direction:column}
.detail-pane{display:flex;flex-direction:column;height:100%;overflow-y:auto}
.detail-pane::-webkit-scrollbar{width:4px}
.detail-pane::-webkit-scrollbar-thumb{background:var(--bd);border-radius:2px}
.detail-hd{padding:16px 20px;border-bottom:1px solid var(--bdl);flex-shrink:0}
.detail-hd-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
.detail-hd-title{font-size:15px;font-weight:700}
.detail-meta{display:flex;gap:10px;align-items:center;flex-wrap:wrap;font-size:12px;color:var(--tx2)}
.detail-body{padding:16px 20px}
.ds-title{font-size:10.5px;font-weight:600;color:var(--tx2);text-transform:uppercase;letter-spacing:.08em;margin-bottom:9px}
.ds{margin-bottom:18px}
.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;color:var(--tx2);font-size:13.5px;gap:10px}

/* ── TAGS ── */
.tag{display:inline-flex;align-items:center;gap:3px;padding:2px 7px;border-radius:var(--rpill);font-size:11px;font-weight:500}
.t-pur{background:#f3e8ff;color:#6b21a8}
.t-grn{background:#dcfce7;color:#166534}

/* ── TOAST ── */
.toast{position:fixed;bottom:22px;right:22px;background:#1a1a1a;color:#fff;padding:11px 16px;border-radius:var(--rmd);font-size:13px;box-shadow:var(--sh);display:flex;align-items:center;gap:8px;opacity:0;transform:translateY(10px);transition:.22s ease;z-index:999}
.toast.show{opacity:1;transform:none}
.toast-dot{width:7px;height:7px;border-radius:50%;background:var(--ac)}

/* ── CONTACT ── */
.contact-cards{display:flex;gap:11px;margin-top:16px}
.cc{flex:1;background:var(--sf);border:1px solid var(--bd);border-radius:var(--rmd);padding:13px 14px;cursor:pointer;transition:.14s}
.cc:hover{border-color:var(--pd)}
.cc-ico{width:30px;height:30px;border-radius:7px;background:rgba(241,204,255,.25);display:flex;align-items:center;justify-content:center;margin-bottom:8px}
.cc-title{font-size:12.5px;font-weight:600;margin-bottom:2px}
.cc-desc{font-size:12px;color:#6b21a8;font-weight:500}
.cc-sub{font-size:11px;color:var(--tx2);margin-top:2px}
.rel{position:relative}
.ndot{position:absolute;top:5px;right:5px;width:7px;height:7px;border-radius:50%;background:var(--ac)}
.pbar-wrap{height:4px;background:var(--bdl);border-radius:var(--rpill);overflow:hidden;margin-top:5px}
.pbar{height:100%;border-radius:var(--rpill);animation:growBar .5s ease-out;transform-origin:left}
</style>
</head>

<div id="root"></div>

      <div style={{maxWidth:820}}>
        <div className="upd-grid">
          <div className="su-card"><div className="su-hd"><LI n="file-text" sz={16}/><span className="su-hd-title">접수 정보</span><span style={{marginLeft:'auto',fontFamily:'monospace',fontSize:11.5,color:'#6b21a8',fontWeight:600}}>{t.id}</span></div><div className="su-body"><div className="info-grid"><div><div className="info-lbl">고객명</div><div className="info-val">{t.customer}</div></div><div><div className="info-lbl">연락처</div><div className="info-val" style={{fontSize:12}}>{t.phone}</div></div><div style={{gridColumn:'1/-1'}}><div className="info-lbl">모델명</div><div className="info-val">{t.model}</div></div></div></div></div>
          <div className="su-card"><div className="su-hd"><LI n="alert-circle" sz={16}/><span className="su-hd-title">증상 요약</span></div><div className="su-body"><div style={{fontSize:13,lineHeight:1.6}}>{t.symptom}</div><div style={{marginTop:11,display:'flex',gap:5,flexWrap:'wrap'}}>{t.files.map(f=><span key={f} className="tag t-pur"><LI n="paperclip" sz={10}/> {f.split('.')[1].toUpperCase()}</span>)}<span className="tag t-grn"><LI n="shield-check" sz={10}/> 무상 수리</span></div></div></div>
        </div>
        <div className="su-card" style={{marginBottom:13}}>
          <div className="su-hd"><LI n="refresh-cw" sz={16}/><span className="su-hd-title">상태 변경</span><span style={{marginLeft:'auto'}}><Badge st={cur}/></span></div>
          <div className="su-body">
            <div style={{marginBottom:14}}><Progress cur={cur}/></div>
            <div className="status-btns">
              {STEPS2.map((s,i)=>{const si=STEPS.indexOf(s.k);const isOn=s.k===cur;const isDis=si<=ci&&!isOn;return(<div key={s.k} className={`s-btn ${isOn?'on':''} ${isDis?'dis':''}`} onClick={()=>!isDis&&!isOn&&handle(s.k)}><div style={{marginBottom:3,display:'flex',justifyContent:'center'}}><LI n={s.ic} sz={18}/></div>{s.l}<div style={{fontSize:10,color:'var(--tx2)',marginTop:2}}>{s.d}</div></div>);})}
            </div>
            {showDel&&<div className="delivery-box"><div className="delivery-title"><LI n="truck" sz={14}/> 발송 정보 입력 <span style={{fontSize:11,color:'#dc2626'}}>*필수</span></div><div className="frow" style={{marginBottom:0}}><div className="fg" style={{marginBottom:0}}><div className="flabel">택배사</div><select className="finput"><option>CJ대한통운</option><option>한진택배</option><option>롯데택배</option></select></div><div className="fg" style={{marginBottom:0}}><div className="flabel">운송장 번호</div><input className="finput" placeholder="1234-5678-9012"/></div></div></div>}
          </div>
          <div style={{padding:'11px 18px',borderTop:'1px solid var(--bdl)',display:'flex',justifyContent:'flex-end',gap:7}}><button className="btn btn-g">취소</button><button className="btn btn-acc" onClick={save}><LI n="check" sz={13}/> 상태 저장</button></div>
        </div>
        <div className="su-card"><div className="su-hd"><LI n="list" sz={16}/><span className="su-hd-title">처리 이력</span></div><div className="su-body">{t.history.map((h,i)=>(<div key={i} className="hist-item"><div className="hist-line"><div className="hist-dot"/>{i<t.history.length-1&&<div className="hist-conn"/>}</div><div><div className="hist-action">{h.a}</div><div className="hist-time">{h.t}</div><div style={{fontSize:11,color:'var(--tx2)'}}>처리: {h.b}</div></div></div>))}</div></div>
      </div>
      <div className={`toast ${toast?'show':''}`}><div className="toast-dot"/><LI n="check" sz={13} st={{color:'#fff'}}/> 상태가 저장되었습니다. 고객에게 알림이 발송됩니다.</div>
    </div>
  );
}
function App(){
  const [view,setView]=useState('form');const [selId,setSelId]=useState(null);
  const NAV=[
    {k:'form',l:'AS 접수 폼',ic:'plus-circle',sec:'고객'},
    {k:'status-lookup',l:'접수 상태 조회',ic:'search',sec:'고객'},
    {k:'ticket-list',l:'접수 목록',ic:'list',sec:'관리자',badge:TICKETS.filter(t=>t.status==='received').length},
    {k:'status-update',l:'상태 변경',ic:'edit-2',sec:'관리자'},
    {k:'stats',l:'처리 통계',ic:'bar-chart-2',sec:'시스템'},
    {k:'settings',l:'시스템 설정',ic:'settings',sec:'시스템'},
  ];
  const TITLE={form:'AS 접수 폼','status-lookup':'접수 상태 조회','ticket-list':'접수 목록','status-update':'상태 변경',stats:'처리 통계',settings:'시스템 설정'};
  const SECS=['고객','관리자','시스템'];
  useEffect(()=>{if(window.lucide)window.lucide.createIcons();},[view]);
  return(
    <>
      <aside className="sidebar" data-sidebar="true">
        <div className="sidebar-brand"><div className="brand-row"><div className="brand-badge"><LI n="wrench" sz={16} st={{color:'#6b21a8'}}/></div><div><div className="brand-name">AS 관리 시스템</div><div className="brand-sub">v2.4 · 구현 데모</div></div></div></div>
        <div className="sidebar-cmdk-hint" data-cmdk-trigger="true"><LI n="search" sz={13} st={{color:'var(--tx2)'}}/><span className="cmdk-hint-txt">빠른 검색</span><kbd className="cmdk-kbd">⌘K</kbd></div>
        <div className="sidebar-section">
          <div className="sidebar-section-title">고객</div>
          <a href="#" className={`sidebar-link ${view==='form'?'active':''}`} onClick={(e)=>{e.preventDefault();setView('form');setSelId(null);}}><i data-lucide="plus-circle"/>AS 접수 폼</a>
          <a href="#" className={`sidebar-link ${view==='status-lookup'?'active':''}`} onClick={(e)=>{e.preventDefault();setView('status-lookup');setSelId(null);}}><i data-lucide="search"/>접수 상태 조회</a>
        </div>
        <div className="sidebar-section">
          <div className="sidebar-section-title">관리자</div>
          <a href="#" className={`sidebar-link ${view==='ticket-list'?'active':''}`} onClick={(e)=>{e.preventDefault();setView('ticket-list');}}><i data-lucide="list"/>접수 목록<span className="sidebar-badge">{TICKETS.filter(t=>t.status==='received').length}</span></a>
          <a href="#" className={`sidebar-link ${view==='status-update'?'active':''}`} onClick={(e)=>{e.preventDefault();setView('status-update');setSelId(null);}}><i data-lucide="edit-2"/>상태 변경</a>
        </div>
        <div className="sidebar-section">
          <div className="sidebar-section-title">시스템</div>
          <a href="#" className={`sidebar-link ${view==='stats'?'active':''}`} onClick={(e)=>{e.preventDefault();setView('stats');setSelId(null);}}><i data-lucide="bar-chart-2"/>처리 통계</a>
          <a href="#" className={`sidebar-link ${view==='settings'?'active':''}`} onClick={(e)=>{e.preventDefault();setView('settings');setSelId(null);}}><i data-lucide="settings"/>시스템 설정</a>
        </div>
        <div className="sidebar-user"><div className="sidebar-user-av">김</div><div><div className="sidebar-user-name">김관리자</div><div className="sidebar-user-role">서비스 매니저</div></div></div>
      </aside>
      <main className="main-area" data-main-content="true">
        <header className="topbar">
          <nav className="breadcrumb">
            <a href="#form" className="breadcrumb-item">AS 관리</a>
            {' / '}
            <a href="#" className="breadcrumb-item cur">{TITLE[view]}</a>
          </nav>
          {view==='ticket-list'&&<button className="btn btn-p" onClick={()=>setView('form')} style={{marginRight:6}}><LI n="plus" sz={13}/> 새 접수</button>}
          <div className="rel"><button className="btn btn-g" style={{padding:'6px 10px'}}><LI n="bell" sz={14}/></button><div className="ndot"/></div>
          <button className="btn btn-g" style={{padding:'6px 10px',marginLeft:4}}><LI n="settings" sz={14}/></button>
        </header>
        {view==='form'&&<FormView/>}
        {view==='status-lookup'&&<LookupView/>}
        {view==='ticket-list'&&<div style={{flex:1,overflow:'hidden',display:'flex'}}><TicketListView selId={selId} onSel={setSelId}/></div>}
        {view==='status-update'&&<UpdateView/>}
        {(view==='stats'||view==='settings')&&<div className="content fade" style={{color:'var(--tx2)',paddingTop:40,textAlign:'center'}}><LI n={view==='stats'?'bar-chart-2':'settings'} sz={32} st={{opacity:.3}}/><div style={{marginTop:10}}>{TITLE[view]}</div></div>}
      </main>
    </>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
