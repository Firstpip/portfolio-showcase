<!DOCTYPE html>
<html lang="ko" data-archetype="topbar-analytics">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AS 운영 분석 대시보드 — 구현 데모</title>
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/regular/style.css">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#08090a;--sf:#161718;--sf2:#1e2022;--sf3:#252729;
  --bd:#2a2d32;--bd2:#353a42;
  --pr:#e4f222;--prd:#c8d619;
  --ac:#5e6ad2;--acd:#4a55b5;
  --tx:#f7f8f8;--tx2:#62666d;--tx3:#8e9299;
  --grn:#4ade80;--red:#f87171;--yel:#fbbf24;--sky:#38bdf8;
  --r12:12px;--r8:8px;--r6:6px;--r4:4px;--rpill:9999px;
  --sh:0 4px 20px rgba(0,0,0,.5);--shc:0 2px 8px rgba(0,0,0,.4);
}
body{font-family:'Pretendard',-apple-system,sans-serif;background:var(--bg);color:var(--tx);height:100vh;overflow:hidden;display:flex;flex-direction:column;font-size:13px}

/* ── ANIMATIONS ── */
@keyframes blink{0%,100%{opacity:1}50%{opacity:.4}}
@keyframes fadeUp{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:none}}
@keyframes slideIn{from{opacity:0;transform:translateX(-8px)}to{opacity:1;transform:none}}
@keyframes countUp{from{opacity:0;transform:translateY(6px) scale(.95)}to{opacity:1;transform:none}}
@keyframes growBar{from{transform:scaleX(0)}to{transform:scaleX(1)}}
.fade{animation:fadeUp .18s ease-out}
.slide-in{animation:slideIn .16s ease-out}

/* ── STATUS STRIP ── */
.status-strip{height:34px;min-height:34px;background:linear-gradient(90deg,rgba(94,106,210,.18),rgba(228,242,34,.06));border-bottom:1px solid rgba(228,242,34,.12);display:flex;align-items:center;padding:0 20px;gap:20px;flex-shrink:0;overflow:hidden;position:relative}
.status-strip::before{content:'';position:absolute;top:0;left:0;right:0;bottom:0;background:repeating-linear-gradient(90deg,transparent,transparent 120px,rgba(228,242,34,.03) 120px,rgba(228,242,34,.03) 121px)}
.ss-item{display:flex;align-items:center;gap:6px;font-size:11.5px}
.ss-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.ss-dot.live{background:var(--grn);box-shadow:0 0 6px var(--grn);animation:blink 2s ease-in-out infinite}
.ss-dot.warn{background:var(--yel)}
.ss-val{font-weight:600;color:var(--tx)}
.ss-lbl{color:var(--tx2)}
.ss-div{width:1px;height:14px;background:var(--bd2)}
.ss-right{margin-left:auto;display:flex;align-items:center;gap:12px;font-size:11px;color:var(--tx2)}
.ss-time{font-family:'Courier New',monospace;font-size:11px;color:var(--tx3)}

/* ── TOP NAV (app-header) ── */
.app-header{height:46px;min-height:46px;background:rgba(22,23,24,.95);backdrop-filter:blur(16px);border-bottom:1px solid var(--bd);display:flex;align-items:center;padding:0 20px;gap:0;flex-shrink:0;z-index:10;position:sticky;top:0}
.brand-wrap{display:flex;align-items:center;gap:9px;margin-right:28px;cursor:pointer;flex-shrink:0}
.brand-sq{width:26px;height:26px;background:var(--pr);border-radius:5px;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0}
.brand-txt{font-size:13.5px;font-weight:700;letter-spacing:-.02em;color:var(--tx)}
.brand-tag{font-size:10px;color:var(--tx2);font-weight:400;margin-left:4px}
.global-nav{display:flex;gap:2px;flex:1}
.tab{display:flex;align-items:center;gap:6px;padding:5px 12px;border-radius:var(--r6);font-size:13px;color:var(--tx2);cursor:pointer;transition:.12s;white-space:nowrap;font-weight:500}
.tab:hover{background:var(--sf2);color:var(--tx)}
.tab.active{background:rgba(94,106,210,.2);color:#a8b4ff}
.tab i{font-size:14px;opacity:.7}
.tab.active i{opacity:1;color:#8090ff}
.header-actions{display:flex;align-items:center;gap:8px;flex-shrink:0}
.icon-btn{width:30px;height:30px;border-radius:var(--r6);background:var(--sf);border:1px solid var(--bd);display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--tx2);font-size:14px;transition:.12s;position:relative}
.icon-btn:hover{background:var(--sf2);color:var(--tx);border-color:var(--bd2)}
.notif-dot{position:absolute;top:4px;right:4px;width:6px;height:6px;border-radius:50%;background:var(--pr);border:1.5px solid var(--bg)}
.avatar{width:28px;height:28px;border-radius:50%;background:linear-gradient(135deg,var(--ac),#3b4ac5);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;cursor:pointer;flex-shrink:0}

/* ── BODY ── */
.body{flex:1;display:flex;overflow:hidden}
.main-focus{flex:1;overflow-y:auto;padding:16px 18px;min-width:0}
.main-focus::-webkit-scrollbar{width:5px}
.main-focus::-webkit-scrollbar-thumb{background:var(--bd2);border-radius:3px}
.priority-rail{width:268px;min-width:268px;border-left:1px solid var(--bd);background:var(--sf);overflow-y:auto;padding:14px 12px}
.priority-rail::-webkit-scrollbar{width:4px}
.priority-rail::-webkit-scrollbar-thumb{background:var(--bd2);border-radius:2px}

/* ── VIEW HEADING ── */
.view-hd{margin-bottom:16px}
.view-title{font-size:36px;font-weight:700;letter-spacing:-.03em;animation:countUp .3s ease-out}
.view-sub{font-size:12.5px;color:var(--tx2);margin-top:3px}

/* ── KPI ROW (stat-row) ── */
.stat-row{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-bottom:16px}
.stat-card{background:var(--sf);border:1px solid var(--bd);border-radius:var(--r12);padding:13px 14px;position:relative;overflow:hidden;cursor:default;transition:.14s}
.stat-card:hover{border-color:var(--bd2)}
.stat-label{font-size:11px;color:var(--tx2);font-weight:500;margin-bottom:6px;display:flex;align-items:center;gap:5px}
.stat-value{font-size:28px;font-weight:700;letter-spacing:-.025em;color:var(--tx);animation:countUp .3s ease-out}
.stat-sub{font-size:11px;color:var(--tx2);margin-top:4px;display:flex;align-items:center;gap:4px}
.stat-bar{position:absolute;bottom:0;left:0;right:0;height:2px;animation:growBar .6s ease-out;transform-origin:left}
.stat-bar.lime{background:linear-gradient(90deg,var(--pr),var(--prd))}
.stat-bar.ind{background:linear-gradient(90deg,var(--ac),var(--acd))}
.stat-bar.grn{background:linear-gradient(90deg,var(--grn),#16a34a)}
.stat-bar.red{background:linear-gradient(90deg,var(--red),#dc2626)}
.stat-bar.sky{background:linear-gradient(90deg,var(--sky),#0284c7)}
.delta-up{color:var(--grn);font-size:10.5px;font-weight:600}
.delta-dn{color:var(--red);font-size:10.5px;font-weight:600}

/* ── CARD ── */
.card{background:var(--sf);border:1px solid var(--bd);border-radius:var(--r12);overflow:hidden}
.card-hd{padding:12px 16px;border-bottom:1px solid var(--bd);display:flex;align-items:center;justify-content:space-between}
.card-title{font-size:13px;font-weight:600;display:flex;align-items:center;gap:7px}
.card-body{padding:14px 16px}

/* ── FILTER STRIP ── */
.filter-strip{display:flex;gap:6px;align-items:center;margin-bottom:14px;flex-wrap:wrap}
.fchip{display:flex;align-items:center;gap:4px;padding:4px 10px;border-radius:var(--rpill);font-size:11.5px;cursor:pointer;border:1px solid var(--bd);color:var(--tx2);background:transparent;transition:.12s}
.fchip:hover{border-color:var(--bd2);color:var(--tx)}
.fchip.on{background:rgba(94,106,210,.2);border-color:var(--ac);color:#a8b4ff}
.fchip.lime{background:rgba(228,242,34,.1);border-color:rgba(228,242,34,.35);color:var(--pr)}
.fsep{width:1px;height:20px;background:var(--bd2)}

/* ── TABLE ── */
.tbl{width:100%;border-collapse:collapse}
.tbl th{font-size:11px;font-weight:600;color:var(--tx2);padding:7px 10px;text-align:left;border-bottom:1px solid var(--bd);text-transform:uppercase;letter-spacing:.06em}
.tbl td{padding:9px 10px;border-bottom:1px solid var(--bd);font-size:12.5px;vertical-align:middle}
.tbl tr:last-child td{border-bottom:none}
.tbl tr:hover td{background:rgba(255,255,255,.025)}
.mono{font-family:'Courier New',monospace;font-size:11.5px;color:var(--tx3)}

/* ── BADGES ── */
.badge{display:inline-flex;align-items:center;gap:3px;padding:2px 7px;border-radius:var(--rpill);font-size:11px;font-weight:600}
.b-rcv{background:rgba(56,189,248,.15);color:var(--sky)}
.b-chk{background:rgba(251,191,36,.15);color:var(--yel)}
.b-rpr{background:rgba(94,106,210,.2);color:#a8b4ff}
.b-shp{background:rgba(74,222,128,.15);color:var(--grn)}
.b-hi{background:rgba(248,113,113,.15);color:var(--red)}
.b-md{background:rgba(251,191,36,.12);color:var(--yel)}
.b-lo{background:rgba(100,116,139,.15);color:#94a3b8}

/* ── BAR CHART ── */
.bar-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px}
.bar-el{width:100%;border-radius:4px 4px 0 0;min-height:4px;cursor:pointer;position:relative;animation:growBar .5s ease-out;transform-origin:bottom}
.bar-el:hover::after{content:attr(data-tip);position:absolute;top:-28px;left:50%;transform:translateX(-50%);background:#23252a;border:1px solid var(--bd2);color:var(--tx);font-size:10.5px;padding:2px 7px;border-radius:4px;white-space:nowrap;z-index:99;font-family:'Pretendard',sans-serif}
.bar-lbl{font-size:10px;color:var(--tx2)}

/* ── DONUT ── */
.donut-wrap{position:relative;width:100px;height:100px;flex-shrink:0}
.donut-wrap svg{transform:rotate(-90deg)}
.donut-center{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center}
.donut-val{font-size:18px;font-weight:700}
.donut-lbl{font-size:9px;color:var(--tx2);margin-top:1px}

/* ── PRIORITY RAIL ── */
.rail-sec{margin-bottom:16px}
.rail-sec-title{font-size:10px;font-weight:700;color:var(--tx2);text-transform:uppercase;letter-spacing:.08em;margin-bottom:9px;display:flex;align-items:center;justify-content:space-between}
.rail-item{padding:9px 10px;background:var(--sf2);border:1px solid var(--bd);border-radius:var(--r8);margin-bottom:6px;cursor:pointer;transition:.12s}
.rail-item:hover{border-color:var(--bd2)}
.rail-item-title{font-size:12px;font-weight:500;margin-bottom:3px}
.rail-item-meta{font-size:11px;color:var(--tx2)}
.pill{display:inline-flex;align-items:center;gap:3px;padding:2px 6px;border-radius:var(--rpill);font-size:10px;font-weight:600}

/* ── PROGRESS ── */
.pbar-wrap{height:5px;background:var(--sf3);border-radius:var(--rpill);overflow:hidden;margin-top:5px}
.pbar{height:100%;border-radius:var(--rpill);animation:growBar .5s ease-out;transform-origin:left}

/* ── GANTT ── */
.gantt-row{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.gantt-lbl{width:90px;font-size:11.5px;color:var(--tx2);text-align:right;flex-shrink:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.gantt-track{flex:1;height:20px;background:var(--sf3);border-radius:var(--r4);overflow:hidden;position:relative}
.gantt-bar{height:100%;border-radius:var(--r4);display:flex;align-items:center;padding:0 6px;font-size:10px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

/* ── NOTIF ── */
.notif-item{display:flex;gap:10px;padding:10px 12px;border-bottom:1px solid var(--bd);transition:.1s}
.notif-item:hover{background:rgba(255,255,255,.025)}
.notif-item:last-child{border-bottom:none}
.notif-icon{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;margin-top:1px}
.n-ok{background:rgba(74,222,128,.12);color:var(--grn)}
.n-fail{background:rgba(248,113,113,.12);color:var(--red)}
.n-warn{background:rgba(251,191,36,.12);color:var(--yel)}
.n-info{background:rgba(56,189,248,.12);color:var(--sky)}
.notif-body{flex:1;min-width:0}
.notif-title{font-size:12.5px;font-weight:500;margin-bottom:2px}
.notif-sub{font-size:11.5px;color:var(--tx2)}
.notif-time{font-size:10.5px;color:var(--tx2);text-align:right;flex-shrink:0;padding-top:2px}

/* ── SPARKLINE ── */
.spark{display:inline-flex;align-items:flex-end;gap:1px;height:24px;margin-left:6px}
.sp-bar{width:3px;border-radius:1px}

/* ── HEAT MAP ── */
.heat-cell{height:24px;border-radius:3px;cursor:pointer;transition:.12s}
.heat-cell:hover{opacity:.75}

/* ── SEARCH ── */
.search-wrap{position:relative;flex-shrink:0}
.search-wrap i{position:absolute;left:9px;top:50%;transform:translateY(-50%);color:var(--tx2);font-size:14px}
.search-input{background:var(--sf2);border:1px solid var(--bd);border-radius:var(--r6);padding:5px 10px 5px 30px;color:var(--tx);font-family:'Pretendard',sans-serif;font-size:12.5px;width:200px;outline:none;transition:.14s}
.search-input:focus{border-color:var(--bd2);width:240px}
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script type="text/babel">
const {useState,useEffect,useRef}=React;

/* ── data ── */
const RECV=[42,55,38,67,72,61,88,74,63,91,78,85];
const DONE=[38,48,35,60,65,55,80,68,57,83,70,78];
const FAULTS=[
  {category:'전원 불량',brand:'LG',model:'OLED TV',cnt:23,rate:18.1,severity:'high',trend:+3},
  {category:'회로 기판 손상',brand:'삼성',model:'세탁기',cnt:18,rate:14.2,severity:'high',trend:-2},
  {category:'배터리 불량',brand:'다이슨',model:'청소기',cnt:15,rate:11.8,severity:'med',trend:+1},
  {category:'소프트웨어 오류',brand:'LG',model:'공기청정기',cnt:12,rate:9.4,severity:'med',trend:-4},
  {category:'HDMI 커넥터',brand:'필립스',model:'사운드바',cnt:10,rate:7.9,severity:'low',trend:0},
  {category:'압축기 불량',brand:'삼성',model:'냉장고',cnt:9,rate:7.1,severity:'high',trend:+2},
  {category:'센서 오작동',brand:'다이슨',model:'공기청정기',cnt:7,rate:5.5,severity:'low',trend:-1},
  {category:'디스플레이 결함',brand:'LG',model:'모니터',cnt:6,rate:4.7,severity:'med',trend:+1},
];
const NOTIFS=[
  {type:'ok',title:'AS-2024-097 발송 완료 알림 전송',sub:'010-3721-5842 · CJ대한통운 1234-5678-9012',time:'2분 전'},
  {type:'fail',title:'AS-2024-091 카카오 알림톡 발송 실패',sub:'수신 차단 · 문자 대체 발송 처리됨',time:'18분 전'},
  {type:'warn',title:'AS-2024-088 처리 지연 경고',sub:'접수 후 8일 경과 · SLA 초과 예상',time:'44분 전'},
  {type:'ok',title:'AS-2024-094 수리 완료 알림 전송',sub:'010-9182-4736 · 검수 통과',time:'1시간 전'},
  {type:'info',title:'AS-2024-080 상태 확인 요청',sub:'고객 직접 조회 3회 → 담당자 알림 트리거',time:'2시간 전'},
  {type:'ok',title:'AS-2024-076 접수 확인 알림 전송',sub:'010-6543-2198 · 예상 처리 기간 안내 포함',time:'3시간 전'},
  {type:'fail',title:'AS-2024-071 알림 발송 실패 (x3)',sub:'수신 불가 번호 · 고객사 연락 요청됨',time:'어제'},
  {type:'ok',title:'AS-2024-070 최종 완료 알림 전송',sub:'전체 처리 기간: 3.2일 (목표 5일 이내)',time:'어제'},
];
const PRIORITY=[
  {id:'AS-2024-088',model:'LG OLED TV 55',issue:'전원 불량',days:8,severity:'high'},
  {id:'AS-2024-083',model:'삼성 세탁기 WF24',issue:'회로 기판 손상',days:7,severity:'high'},
  {id:'AS-2024-079',model:'다이슨 V15',issue:'배터리 교체 대기',days:6,severity:'med'},
  {id:'AS-2024-075',model:'필립스 사운드바',issue:'부품 입고 대기',days:5,severity:'med'},
];
const MONTHS=['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
const WEEK=['월','화','수','목','금','토','일'];

/* ── chart helpers ── */
function BarChart({data,colors,labels,height=160}){
  const vals=Array.isArray(data[0])?data:[data];
  const cArr=Array.isArray(colors)?colors:[colors];
  const max=Math.max(...vals.flat());
  return(
    <div style={{height,display:'flex',flexDirection:'column',gap:6}}>
      <div style={{flex:1,display:'flex',alignItems:'flex-end',gap:6}}>
        {(labels||data).map((_,i)=>(
          <div key={i} className="bar-col">
            {vals.map((s,si)=><div key={si} className="bar-el" data-tip={`${labels?.[i]||i}: ${s[i]}`} style={{height:`${(s[i]/max)*100}%`,background:cArr[si]||cArr[0],opacity:si===0?1:.55,width:'100%'}}/>)}
          </div>
        ))}
      </div>
      {labels&&<div style={{display:'flex',gap:6}}>{labels.map((l,i)=><div key={i} className="bar-lbl" style={{flex:1,textAlign:'center'}}>{l}</div>)}</div>}
    </div>
  );
}
function Donut({pct,color,label}){
  const r=38;const c=2*Math.PI*r;const off=c*(1-pct/100);
  return(
    <div className="donut-wrap">
      <svg width="100" height="100" viewBox="0 0 100 100">
        <circle cx="50" cy="50" r={r} fill="none" stroke="var(--sf3)" strokeWidth="8"/>
        <circle cx="50" cy="50" r={r} fill="none" stroke={color} strokeWidth="8" strokeDasharray={c} strokeDashoffset={off} strokeLinecap="round" style={{transition:'stroke-dashoffset .5s ease'}}/>
      </svg>
      <div className="donut-center"><div className="donut-val" style={{color}}>{pct}%</div><div className="donut-lbl">{label}</div></div>
    </div>
  );
}
function MiniSpark({vals,color='#e4f222'}){
  const max=Math.max(...vals);
  return <div className="spark">{vals.map((v,i)=><div key={i} className="sp-bar" style={{height:`${(v/max)*24}px`,background:color,opacity:.7+.3*(i/(vals.length-1))}}/>)}</div>;
}
function HeatMap(){
  const grid=Array.from({length:5},(_,w)=>WEEK.map((_,d)=>{
    const seed=(w*7+d)*13;return 5+((seed*17+3)%36)+(d<5?10:0)+(w===2?15:0);
  }));
  const getColor=(v)=>v<15?'rgba(94,106,210,.2)':v<25?'rgba(94,106,210,.45)':v<35?'rgba(94,106,210,.7)':v<40?'rgba(94,106,210,.9)':'rgba(228,242,34,.7)';
  return(
    <div>
      <div style={{display:'flex',gap:3,marginBottom:5,marginLeft:28}}>{WEEK.map(d=><div key={d} style={{flex:1,textAlign:'center',fontSize:10,color:'var(--tx2)'}}>{d}</div>)}</div>
      <div style={{display:'flex',gap:3}}>
        <div style={{display:'flex',flexDirection:'column',gap:3,justifyContent:'space-around',width:22}}>{['1주','2주','3주','4주','5주'].map(w=><div key={w} style={{fontSize:10,color:'var(--tx2)',textAlign:'right'}}>{w}</div>)}</div>
        <div style={{flex:1,display:'flex',flexDirection:'column',gap:3}}>
          {grid.map((row,wi)=>(
            <div key={wi} style={{display:'grid',gridTemplateColumns:'repeat(7,1fr)',gap:3}}>
              {row.map((v,di)=><div key={di} className="heat-cell" style={{background:getColor(v)}} title={`${wi+1}주 ${WEEK[di]}: ${v}건`}/>)}
            </div>
          ))}
        </div>
      </div>

      <div style={{height:1,background:'var(--bd)',margin:'8px 0 12px'}}/>
      <div className="rail-sec">
        <div className="rail-sec-title">알림 채널 상태</div>
        {[['카카오 알림톡','var(--grn)','정상','92.1% 성공률'],['문자 (SMS)','var(--grn)','정상','99.3% 성공률'],['이메일','var(--yel)','지연','응답 +2.1s'],['푸시 알림','rgba(100,116,139,.5)','비활성','설정 필요']].map(([n,c,s,d])=>(
          <div key={n} className="rail-item" style={{cursor:'default'}}><div style={{display:'flex',alignItems:'center',gap:7,marginBottom:4}}><div style={{width:7,height:7,borderRadius:50,background:c,flexShrink:0}}/><div style={{fontSize:12.5,fontWeight:500,flex:1}}>{n}</div><div style={{fontSize:10.5,color:c,fontWeight:600}}>{s}</div></div><div style={{fontSize:11,color:'var(--tx2)'}}>{d}</div></div>
        ))}
      </div>
      <div style={{height:1,background:'var(--bd)',margin:'8px 0 12px'}}/>
      <div className="rail-sec">
        <div className="rail-sec-title">이번 주 요약</div>
        {[['총 접수','127건'],['처리 완료','98건'],['SLA 준수','82.4%'],['불량 유형','8종 추적 중']].map(([l,v])=>(
          <div key={l} style={{display:'flex',justifyContent:'space-between',padding:'7px 0',borderBottom:'1px solid var(--bd)',fontSize:12}}>
            <span style={{color:'var(--tx2)'}}>{l}</span><span style={{fontWeight:600}}>{v}</span>
          </div>
        ))}
      </div>
    </div>
  );
}

/* ── APP ── */
function App(){

  return(
    <>
      <div data-status-strip="true" className="status-strip">

        <div className="ss-div"/>
        <div className="ss-item"><div className="ss-dot warn"/><span className="ss-val">4</span><span className="ss-lbl">SLA 초과</span></div>

        <div className="ss-div"/>
        <div className="ss-item"><div className="ss-dot" style={{background:'var(--grn)'}}/><span className="ss-val">18</span><span className="ss-lbl">오늘 완료</span></div>
        <div className="ss-right"><span>마지막 갱신:</span><span className="ss-time">{liveTs}</span><span style={{color:'var(--grn)',fontSize:10.5}}>● 연결됨</span></div>
      </div>
      <header className="app-header" data-topbar="true">
        <div className="brand-wrap">
          <div className="brand-sq"><i className="ph ph-lightning" style={{fontSize:13,color:'#1a1a1a'}}/></div>
          <div className="brand-txt">AS 분석 대시보드<span className="brand-tag">Analytics</span></div>
        </div>
        <nav className="global-nav">
          <div role="tab" className={`tab ${tab==='main'?'active':''}`} onClick={()=>setTab('main')}><i className="ph ph-pulse"/>실시간 현황</div>
          <div role="tab" className={`tab ${tab==='duration-report'?'active':''}`} onClick={()=>setTab('duration-report')}><i className="ph ph-chart-line"/>처리 기간 분석</div>
          <div role="tab" className={`tab ${tab==='fault-pattern'?'active':''}`} onClick={()=>setTab('fault-pattern')}><i className="ph ph-warning-diamond"/>불량 패턴</div>
          <div role="tab" className={`tab ${tab==='notification-log'?'active':''}`} onClick={()=>setTab('notification-log')}><i className="ph ph-bell"/>알림 이력</div>

        <div className="header-actions">

          <div className="icon-btn"><i className="ph ph-gear"/></div>
          <div className="avatar">김</div>
        </div>
      </header>
      <div className="body">
        <div className="main-focus">
          {tab==='main'&&<RealtimeView/>}
          {tab==='duration-report'&&<DurationView/>}
          {tab==='fault-pattern'&&<FaultView/>}
          {tab==='notification-log'&&<NotifView/>}
        </div>
        <PriorityRail/>
      </div>
    </>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
