<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>스마트 서면 설계 REST API 서버 — 맞춤 구현 데모</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
<style>
:root {
  --ink: #101010;
  --ink-2: #3d3d3d;
  --graphite: #1a1a1a;
  --slate: #6b7280;
  --stone: #9ca3af;
  --silver: #e5e7eb;
  --paper: #ffffff;
  --cream: #f4f4f4;
  --accent: #3ad98a;
  --accent-dim: rgba(58,217,138,0.12);
  --action: #0099ff;
  --action-dim: rgba(0,153,255,0.1);
  --border: #e5e7eb;
  --danger: #ef4444;
  --warn: #f59e0b;
  --radius-card: 12px;
  --radius-input: 8px;
  --radius-pill: 9999px;
  --shadow-sm: 0 1px 3px rgba(0,0,0,0.04),0 3px 8px rgba(0,0,0,0.03);
  --shadow-md: 0 2px 8px rgba(0,0,0,0.06);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Pretendard',system-ui,sans-serif;background:var(--cream);color:var(--graphite);font-size:14px;line-height:1.6;-webkit-font-smoothing:antialiased}

/* ──────── Linear-sidebar-cmdk layout ──────── */
.app-shell{display:flex;min-height:100vh;width:100%}

/* ── Sidebar ── */
aside.sidebar{
  width:240px;flex-shrink:0;background:var(--ink);
  display:flex;flex-direction:column;
  position:fixed;top:0;left:0;bottom:0;z-index:50;overflow:hidden
}
.sidebar-gradient{
  position:absolute;top:0;left:0;right:0;height:150px;
  background:linear-gradient(135deg,rgba(58,217,138,0.20) 0%,rgba(0,153,255,0.08) 55%,transparent 100%);
  pointer-events:none
}
.sidebar-brand{padding:18px 16px 14px;border-bottom:1px solid rgba(255,255,255,0.07);position:relative}
.brand-name{display:flex;align-items:center;gap:8px;font-size:15px;font-weight:700;letter-spacing:-.2px;color:#fff}
.brand-dot{width:8px;height:8px;border-radius:50%;background:var(--accent)}
.env-pill{font-size:10px;font-weight:700;letter-spacing:.08em;background:rgba(58,217,138,0.18);color:var(--accent);border-radius:4px;padding:1px 6px}

.cmdk-btn{
  margin-top:10px;width:100%;display:flex;align-items:center;gap:8px;
  background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);
  border-radius:var(--radius-input);padding:7px 10px;cursor:pointer;
  color:rgba(255,255,255,0.45);font-size:12px;font-family:inherit;transition:all .15s
}
.cmdk-btn:hover{background:rgba(255,255,255,0.1);color:rgba(255,255,255,0.8)}
.cmdk-shortcut{
  margin-left:auto;display:flex;align-items:center;gap:2px;
  background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.12);
  border-radius:4px;padding:1px 5px;font-size:10px;color:rgba(255,255,255,0.4)
}

.nav-section{padding:12px 10px 4px;font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:rgba(255,255,255,0.3)}
.sidebar-nav{flex:1;padding:4px 8px;overflow-y:auto}
.sidebar-nav::-webkit-scrollbar{width:4px}
.sidebar-nav::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.1);border-radius:2px}

.sidebar-nav a{
  display:flex;align-items:center;gap:9px;
  padding:7px 8px;border-radius:7px;
  color:rgba(255,255,255,0.55);font-size:13px;font-weight:500;
  text-decoration:none;cursor:pointer;transition:all .12s;margin-bottom:2px;
  border:none;background:none;font-family:inherit;width:100%
}
.sidebar-nav a:hover{color:rgba(255,255,255,0.9);background:rgba(255,255,255,0.07)}
.sidebar-nav a.active{color:#fff;background:rgba(58,217,138,0.18)}
.sidebar-nav a.active .nav-ico{color:var(--accent)}
.nav-badge{
  margin-left:auto;font-size:10px;font-weight:700;
  background:rgba(255,255,255,0.12);color:rgba(255,255,255,0.6);
  border-radius:var(--radius-pill);padding:1px 6px
}
.nav-badge.red{background:rgba(239,68,68,0.2);color:#fca5a5}
.nav-badge.green{background:rgba(58,217,138,0.2);color:var(--accent)}

.sidebar-footer{padding:12px;border-top:1px solid rgba(255,255,255,0.07);display:flex;align-items:center;gap:8px}
.avatar{width:28px;height:28px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--action));display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff;flex-shrink:0}
.user-name{font-size:12px;font-weight:600;color:rgba(255,255,255,0.9)}
.user-role{font-size:10px;color:rgba(255,255,255,0.4)}

/* ── Main ── */
.main-wrap{margin-left:240px;flex:1;min-width:0;width:calc(100% - 240px);display:flex;flex-direction:column}

/* ── Page header ── */
.page-hdr{
  background:var(--paper);border-bottom:1px solid var(--border);
  padding:0 24px;height:56px;display:flex;align-items:center;gap:0;
  position:sticky;top:0;z-index:40
}
.breadcrumb{display:flex;align-items:center;gap:6px;flex:1;font-size:13px;color:var(--stone)}
.breadcrumb a{color:var(--stone);text-decoration:none;transition:color .12s;font-size:13px}
.breadcrumb a:hover{color:var(--ink)}
.breadcrumb-sep{color:var(--silver)}
.breadcrumb-cur{color:var(--graphite);font-weight:600}
.hdr-actions{display:flex;align-items:center;gap:8px}
.hdr-icon-btn{width:32px;height:32px;border-radius:7px;border:1px solid var(--border);background:transparent;color:var(--slate);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:15px;transition:all .12s}
.hdr-icon-btn:hover{border-color:var(--ink);color:var(--ink)}
.live-pill{display:flex;align-items:center;gap:5px;font-size:11px;font-weight:600;color:#16a34a}
.live-dot{width:6px;height:6px;border-radius:50%;background:#4ade80;animation:pulse-dot 2s ease infinite}

/* ── Content ── */
.content{padding:24px;max-width:1140px}
.page-title{font-size:32px;font-weight:700;letter-spacing:-.5px;color:var(--ink);margin-bottom:4px}
.page-sub{font-size:14px;color:var(--slate);margin-bottom:20px}

/* ── Stat strip ── */
.stat-strip{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:22px}
.stat-card{
  background:var(--paper);border:1px solid var(--border);
  border-radius:var(--radius-card);padding:16px 18px;
  box-shadow:var(--shadow-sm);transition:all .18s;
  animation:fadeInUp .4s ease both
}
.stat-card:hover{box-shadow:var(--shadow-md);transform:translateY(-2px)}
.stat-card:nth-child(1){animation-delay:0ms}
.stat-card:nth-child(2){animation-delay:60ms}
.stat-card:nth-child(3){animation-delay:120ms}
.stat-card:nth-child(4){animation-delay:180ms}
.stat-lbl{font-size:11px;font-weight:700;color:var(--stone);letter-spacing:.05em;text-transform:uppercase;margin-bottom:6px}
.stat-val{font-size:30px;font-weight:700;letter-spacing:-.5px;color:var(--ink);line-height:1.1}
.stat-delta{font-size:11px;color:var(--stone);margin-top:3px}
.stat-delta.pos{color:#16a34a}

/* ── Master-detail ── */
.master-detail{display:grid;grid-template-columns:1fr 340px;gap:16px;align-items:start}
.detail-panel{position:sticky;top:80px}

/* ── Card ── */
.card{background:var(--paper);border:1px solid var(--border);border-radius:var(--radius-card);box-shadow:var(--shadow-sm);overflow:hidden}
.card-hdr{padding:13px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;gap:8px}
.card-title{font-size:14px;font-weight:700;color:var(--ink)}
.card-sub{font-size:11px;color:var(--stone);margin-top:1px}

/* ── Filter bar ── */
.filter-bar{display:flex;align-items:center;gap:8px;padding:10px 16px;border-bottom:1px solid var(--border);background:#fafafa}
.search-inp{flex:1;border:1px solid var(--border);border-radius:var(--radius-input);padding:6px 10px;font-size:12px;color:var(--graphite);font-family:inherit;outline:none;background:var(--paper);transition:border-color .15s}
.search-inp:focus{border-color:var(--accent)}
.chip{padding:4px 10px;border-radius:var(--radius-pill);border:1px solid var(--border);background:var(--paper);font-size:11px;font-weight:600;color:var(--slate);cursor:pointer;transition:all .12s}
.chip:hover{border-color:var(--ink);color:var(--ink)}
.chip.on{background:var(--ink);color:#fff;border-color:var(--ink)}

/* ── Table ── */
.tbl{width:100%;border-collapse:collapse}
.tbl th{padding:8px 14px;font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--stone);background:var(--cream);border-bottom:1px solid var(--border);text-align:left}
.tbl td{padding:11px 14px;border-bottom:1px solid var(--border);font-size:12px;vertical-align:middle}
.tbl tr:last-child td{border-bottom:none}
.tbl tr{cursor:pointer;transition:background .1s}
.tbl tr:hover td{background:#f9fafb}
.tbl tr.sel td{background:#f0fdf4;border-left:2px solid var(--accent)}
.tbl tr.sel td:first-child{padding-left:12px}

.method{display:inline-block;padding:2px 7px;border-radius:4px;font-size:10px;font-weight:700;font-family:monospace;letter-spacing:.04em}
.m-get{background:#dbeafe;color:#1e40af}
.m-post{background:#dcfce7;color:#15803d}
.m-put{background:#fef9c3;color:#a16207}
.m-delete{background:#fee2e2;color:#b91c1c}
.m-patch{background:#f3e8ff;color:#7e22ce}
.ep-path{font-family:'Courier New',monospace;font-size:11px;font-weight:600;color:var(--graphite)}

.lat-wrap{display:flex;align-items:center;gap:6px}
.lat-bg{width:60px;height:4px;background:var(--silver);border-radius:2px;overflow:hidden}
.lat-fill{height:100%;border-radius:2px;animation:sweep .6s ease forwards;transform:scaleX(0);transform-origin:left}
.lat-fast{background:var(--accent)}
.lat-mid{background:var(--warn)}
.lat-slow{background:var(--danger)}
.lat-val{font-size:11px;font-family:monospace;color:var(--stone)}

/* ── Detail panel ── */
.detail-empty{padding:40px 24px;text-align:center;color:var(--stone);font-size:13px}
.det-method-path{padding:14px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px}
.det-path{font-family:'Courier New',monospace;font-size:13px;font-weight:600;color:var(--ink)}
.det-section{padding:14px 16px;border-bottom:1px solid var(--border)}
.det-sec-title{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--stone);margin-bottom:10px}
.det-row{display:flex;justify-content:space-between;padding:4px 0}
.det-key{font-size:12px;color:var(--slate)}
.det-val{font-size:12px;font-weight:600;color:var(--graphite);font-family:monospace}
.param{background:var(--cream);border-radius:6px;padding:7px 10px;margin-bottom:5px;font-family:monospace;font-size:11px}
.param-name{font-weight:700;color:var(--ink)}
.param-type{color:var(--action)}
.param-req{color:var(--danger);font-size:10px}

/* ── Sparkline ── */
.spark-wrap{padding:12px 16px 8px}
.spark-lbl{font-size:10px;color:var(--stone);margin-bottom:5px;text-transform:uppercase;font-weight:600;letter-spacing:.05em}

/* ── Badges ── */
.badge{display:inline-flex;align-items:center;gap:3px;padding:2px 7px;border-radius:var(--radius-pill);font-size:10px;font-weight:600}
.bg-green{background:#dcfce7;color:#15803d}
.bg-red{background:#fee2e2;color:#b91c1c}
.bg-blue{background:#dbeafe;color:#1e40af}
.bg-yellow{background:#fef9c3;color:#a16207}
.bg-gray{background:var(--cream);color:var(--slate)}

/* ── Buttons ── */
.btn-ink{display:inline-flex;align-items:center;gap:6px;background:var(--ink);color:#fff;border:none;border-radius:var(--radius-input);padding:7px 14px;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;transition:all .15s}
.btn-ink:hover{background:#2d2d2d;transform:translateY(-1px)}
.btn-ghost{display:inline-flex;align-items:center;gap:5px;background:transparent;border:1px solid var(--border);border-radius:var(--radius-input);padding:6px 11px;font-size:12px;font-weight:500;color:var(--slate);cursor:pointer;font-family:inherit;transition:all .15s}
.btn-ghost:hover{border-color:var(--ink);color:var(--ink)}
.btn-accent{display:inline-flex;align-items:center;gap:5px;background:var(--accent);color:var(--ink);border:none;border-radius:var(--radius-input);padding:7px 14px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;transition:all .15s}
.btn-accent:hover{background:#2ecc77;transform:translateY(-1px);box-shadow:0 4px 12px rgba(58,217,138,.35)}

/* ── Cmd-K overlay ── */
.cmdk-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;display:flex;align-items:flex-start;justify-content:center;padding-top:80px;animation:fadeIn .15s ease}
.cmdk-modal{background:var(--paper);border:1px solid var(--border);border-radius:14px;width:560px;box-shadow:0 20px 60px rgba(0,0,0,.3);overflow:hidden;animation:slideDown .2s ease}
.cmdk-inp-wrap{display:flex;align-items:center;gap:10px;padding:14px 18px;border-bottom:1px solid var(--border)}
.cmdk-inp{flex:1;border:none;outline:none;font-size:16px;font-weight:500;color:var(--ink);font-family:inherit;background:transparent}
.cmdk-results{max-height:320px;overflow-y:auto}
.cmdk-item{display:flex;align-items:center;gap:10px;padding:10px 18px;cursor:pointer;transition:background .1s;font-size:13px;color:var(--graphite)}
.cmdk-item:hover,.cmdk-item.foc{background:var(--cream)}
.cmdk-type{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--stone);min-width:50px}
.cmdk-footer{padding:8px 18px;border-top:1px solid var(--border);display:flex;gap:12px}
.cmdk-hint{font-size:10px;color:var(--stone);display:flex;align-items:center;gap:4px}
.cmdk-key{background:var(--cream);border:1px solid var(--border);border-radius:4px;padding:1px 5px;font-size:9px;font-family:monospace}

/* ── Schema view ── */
.schema-wrap{display:grid;grid-template-columns:200px 1fr;gap:0;height:420px}
.schema-list{border-right:1px solid var(--border);overflow-y:auto;padding:8px}
.schema-item{display:flex;align-items:center;gap:7px;padding:7px 8px;border-radius:7px;cursor:pointer;transition:background .12s;font-size:12px}
.schema-item:hover{background:var(--cream)}
.schema-item.on{background:var(--accent-dim);color:#15803d;font-weight:600}
.schema-cols{overflow-y:auto;padding:12px}

/* ── Auth view ── */
.auth-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;padding:14px}
.auth-card{background:var(--cream);border-radius:10px;padding:14px;position:relative;border:1px solid var(--border)}
.auth-card-title{font-size:12px;font-weight:700;color:var(--ink);margin-bottom:3px}
.auth-card-desc{font-size:11px;color:var(--slate);line-height:1.4}
.toggle-btn{position:absolute;top:12px;right:12px;width:34px;height:18px;border-radius:var(--radius-pill);border:none;cursor:pointer;transition:background .2s;display:flex;align-items:center;padding:2px}
.toggle-btn.on{background:var(--accent);justify-content:flex-end}
.toggle-btn.off{background:var(--silver);justify-content:flex-start}
.toggle-thumb{width:14px;height:14px;border-radius:50%;background:#fff}

/* ── Toast ── */
.toast-wrap{position:fixed;bottom:20px;right:20px;z-index:9999;display:flex;flex-direction:column;gap:8px}
.toast{background:var(--graphite);color:#fff;border-radius:10px;padding:11px 15px;font-size:12px;font-weight:500;box-shadow:0 8px 24px rgba(0,0,0,.2);display:flex;align-items:center;gap:9px;animation:slideDown .22s ease;min-width:240px}
.toast-success{border-left:3px solid var(--accent)}
.toast-info{border-left:3px solid var(--action)}
.toast-error{border-left:3px solid var(--danger)}

/* ── Animations ── */
@keyframes fadeInUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideDown{from{opacity:0;transform:translateY(-10px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse-dot{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(.85)}}
@keyframes sweep{to{transform:scaleX(1)}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes pop{0%{transform:scale(.6);opacity:0}70%{transform:scale(1.12)}100%{transform:scale(1);opacity:1}}
@keyframes glow{0%,100%{box-shadow:0 0 0 0 rgba(58,217,138,0)}50%{box-shadow:0 0 12px 2px rgba(58,217,138,.3)}}
@keyframes counter{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
@keyframes shimmer{0%{background-position:-200% center}100%{background-position:200% center}}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

/* ── Lucide renderer (data-lucide + createIcons pattern) ── */
const L = ({ name, size = 16 }) => (
  <i data-lucide={name} style={{display:'inline-flex',alignItems:'center',flexShrink:0,width:size,height:size}} />
);

/* ── Sparkline ── */
const Spark = ({ vals, color='#3ad98a', h=36 }) => {
  const max = Math.max(...vals), min = Math.min(...vals), range = max - min || 1;
  const pts = vals.map((v,i)=>[(i/(vals.length-1))*100, h - ((v-min)/range)*(h-6)-3]);
  const d = pts.map((p,i)=>`${i===0?'M':'L'} ${p[0]} ${p[1]}`).join(' ');
  const area = `${d} L 100 ${h} L 0 ${h} Z`;
  return (
    <svg viewBox={`0 0 100 ${h}`} preserveAspectRatio="none" style={{width:'100%',height:h}}>
      <path d={area} fill={`${color}18`}/>
      <path d={d} fill="none" stroke={color} strokeWidth="2" strokeLinejoin="round"/>
    </svg>
  );
};

/* ── Toast ── */
let tid = 0;
const useToast = () => {
  const [list, setList] = useState([]);
  const show = useCallback((msg, type='success') => {
    const id = ++tid;
    setList(t=>[...t,{id,msg,type}]);
    setTimeout(()=>setList(t=>t.filter(x=>x.id!==id)),3000);
  }, []);
  return { list, show };
};

/* ── Static data ── */
const ENDPOINTS = [
  {id:'EP-001',method:'POST',path:'/api/v1/orders',desc:'주문 생성',p50:42,p95:88,rps:28,status:'ok',auth:'JWT'},
  {id:'EP-002',method:'GET', path:'/api/v1/orders',desc:'주문 목록',p50:55,p95:120,rps:42,status:'ok',auth:'JWT'},
  {id:'EP-003',method:'GET', path:'/api/v1/orders/:id',desc:'주문 상세',p50:38,p95:85,rps:18,status:'ok',auth:'JWT'},
  {id:'EP-004',method:'PUT', path:'/api/v1/orders/:id',desc:'주문 수정',p50:48,p95:95,rps:12,status:'ok',auth:'JWT'},
  {id:'EP-005',method:'POST',path:'/api/v1/upload/presigned',desc:'S3 Presigned URL 발급',p50:92,p95:210,rps:8,status:'warn',auth:'JWT'},
  {id:'EP-006',method:'GET', path:'/api/v1/metadata/tree',desc:'메타데이터 트리',p50:38,p95:78,rps:22,status:'ok',auth:'JWT'},
  {id:'EP-007',method:'POST',path:'/api/v1/auth/login',desc:'관리자 로그인',p50:82,p95:165,rps:5,status:'ok',auth:'public'},
  {id:'EP-008',method:'POST',path:'/api/v1/auth/refresh',desc:'토큰 갱신',p50:28,p95:62,rps:15,status:'ok',auth:'JWT'},
  {id:'EP-009',method:'GET', path:'/api/v1/admin/stats',desc:'대시보드 통계',p50:140,p95:310,rps:6,status:'warn',auth:'JWT+Admin'},
  {id:'EP-010',method:'DELETE',path:'/api/v1/orders/:id',desc:'주문 삭제',p50:48,p95:95,rps:2,status:'ok',auth:'JWT+Admin'},
  {id:'EP-011',method:'POST',path:'/api/v1/notify/sms',desc:'SMS 발송 트리거',p50:280,p95:650,rps:4,status:'warn',auth:'JWT'},
  {id:'EP-012',method:'GET', path:'/api/v1/prices',desc:'단가표 조회',p50:32,p95:68,rps:18,status:'ok',auth:'JWT'},

          </a>
          <a href="#" onClick={e=>{e.preventDefault();show('로그 뷰어','info');}}>
            <span className="nav-ico"><L name="file-text" size={15}/></span>
            <span>로그 뷰어</span>
          </a>
        </nav>

        <div className="sidebar-footer">
          <div className="avatar">KD</div>
          <div style={{flex:1,minWidth:0}}>
            <div className="user-name">김대현</div>
            <div className="user-role">시스템 관리자</div>
          </div>
          <button style={{background:'none',border:'none',cursor:'pointer',color:'rgba(255,255,255,0.4)',display:'flex',alignItems:'center'}} onClick={()=>show('프로필 설정','info')}>
            <L name="more-horizontal" size={15}/>
          </button>
        </div>
      </aside>

      {/* ── Main ── */}
      <div className="main-wrap">
        <div className="page-hdr">
          <nav className="breadcrumb">
            <a href="#">FormFactory API</a>
            <span className="breadcrumb-sep">›</span>
            <span className="breadcrumb-cur">{NAV_LABELS[active]}</span>
          </nav>
          <div className="hdr-actions">
            <div className="live-pill"><div className="live-dot"/><span>운영 연결됨</span></div>
            <button className="hdr-icon-btn" onClick={()=>show('알림 패널','info')}><L name="bell" size={15}/></button>
            <button className="hdr-icon-btn" onClick={()=>show('자체 개발 프로젝트 데모','info')}><L name="info" size={15}/></button>
          </div>
        </div>

        <div className="content">
          <div className="page-title">{NAV_LABELS[active]}</div>
          <div className="page-sub">
            {active==='apis'&&'REST API 서버 · Express + Prisma ORM · PostgreSQL · JWT 인증'}
            {active==='orders'&&'LocalStorage → REST API 1:1 대체 구조 · 커서 기반 페이지네이션'}
            {active==='schema'&&'PostgreSQL information_schema · Prisma 마이그레이션 히스토리'}
            {active==='auth'&&'3중 보안 미들웨어 · JWT 인증 · 실시간 보안 이벤트 로그'}
          </div>

          <div className="stat-strip">
            {stats.map((s,i)=>(
              <div key={i} className="stat-card">
                <div className="stat-lbl">{s.lbl}</div>
                <div className="stat-val">{s.val}</div>
                <div className={`stat-delta${s.pos?' pos':''}`}>{s.delta}</div>
                <Spark vals={s.data} color={s.color} h={32}/>
              </div>
            ))}
          </div>

          {active==='apis'&&<ApiView/>}
          {active==='orders'&&<OrdersView/>}
          {active==='schema'&&<SchemaView/>}
          {active==='auth'&&<AuthView/>}
        </div>
      </div>

      {/* ── ⌘K palette ── */}
      {cmdkOpen&&(
        <div className="cmdk-overlay" onClick={()=>setCmdkOpen(false)}>
          <div className="cmdk-modal" onClick={e=>e.stopPropagation()}>
            <div className="cmdk-inp-wrap">
              <L name="search" size={17}/>
              <input className="cmdk-inp" placeholder="API 경로, 테이블, 문서 검색..." autoFocus value={cmdkQ} onChange={e=>setCmdkQ(e.target.value)}/>
              <button style={{background:'none',border:'none',cursor:'pointer',color:'#9ca3af'}} onClick={()=>setCmdkOpen(false)}><L name="x" size={16}/></button>
            </div>
            <div className="cmdk-results">
              {cmdk.map((item,i)=>(
                <div key={i} className={`cmdk-item${i===0?' foc':''}`} onClick={()=>{show(item.label,'info');setCmdkOpen(false);}}>
                  <span className="cmdk-type">{item.type}</span>
                  <span style={{fontFamily:'monospace',fontSize:12}}>{item.label}</span>
                </div>
              ))}
            </div>
            <div className="cmdk-footer">
              <div className="cmdk-hint"><span className="cmdk-key">↵</span>선택</div>
              <div className="cmdk-hint"><span className="cmdk-key">↑↓</span>이동</div>
              <div className="cmdk-hint"><span className="cmdk-key">esc</span>닫기</div>
            </div>
          </div>
        </div>
      )}

      {/* ── Toasts ── */}
      <div className="toast-wrap">
        {toasts.map(t=>(
          <div key={t.id} className={`toast toast-${t.type}`}>
            <L name={t.type==='success'?'check-circle':t.type==='error'?'x-circle':'info'} size={15}/>
            {t.msg}
          </div>
        ))}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
