<!DOCTYPE html>
<html lang="ko" data-archetype="topbar-analytics">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>마케팅 데이터 통합 파이프라인 &amp; 성과 대시보드</title>
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css" rel="stylesheet">
<script src="https://unpkg.com/lucide@0.363.0/dist/umd/lucide.min.js"></script>
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone@7.24.7/babel.min.js"></script>
<script src="https://unpkg.com/prop-types/prop-types.min.js"></script>
<script src="https://unpkg.com/recharts@2.12.7/umd/Recharts.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#fafaf9;--surface:#fff;--primary:#3ba6f1;--accent:#c1e1f7;
  --text:#0c0a09;--muted:#78716c;--border:#e5e7eb;--border2:#d6d3d1;
  --radius:10px;--font:'Pretendard Variable','Pretendard',-apple-system,sans-serif;
}
body{font-family:var(--font);background:var(--bg);color:var(--text);font-size:14px;line-height:1.5}
button{font-family:var(--font)}
select{font-family:var(--font)}

@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideDown{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}
@keyframes scaleIn{from{opacity:0;transform:scale(.96)}to{opacity:1;transform:scale(1)}}
@keyframes pulseGlow{0%,100%{box-shadow:0 0 0 0 rgba(59,166,241,.35)}50%{box-shadow:0 0 0 6px rgba(59,166,241,0)}}
@keyframes pulseDot{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.6;transform:scale(.85)}}
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
@keyframes shimmer{from{background-position:-200% 0}to{background-position:200% 0}}
@keyframes barRise{from{transform:scaleY(0);transform-origin:bottom}to{transform:scaleY(1);transform-origin:bottom}}
@keyframes counterUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes chartDraw{from{stroke-dashoffset:1000}to{stroke-dashoffset:0}}
@keyframes tagIn{from{opacity:0;transform:translateX(-6px)}to{opacity:1;transform:translateX(0)}}
@keyframes dropIn{from{opacity:0;transform:translateY(-4px) scale(.97)}to{opacity:1;transform:translateY(0) scale(1)}}

.stat-card{transition:border-color .15s,box-shadow .15s}
.stat-card:hover{border-color:var(--primary)!important;box-shadow:0 0 0 3px rgba(59,166,241,.08)}
.tab-btn:hover{color:var(--primary)!important}
.row-hover:hover{background:#f0f9ff!important}
.channel-card:hover{border-color:var(--primary)!important}
.action-btn:hover{background:var(--accent)!important;color:var(--primary)!important}
.spin-icon{animation:spin 1s linear infinite;display:inline-flex}
.pulse-dot{animation:pulseDot 2s ease-in-out infinite}
.live-badge{animation:pulseGlow 2s ease-in-out infinite}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const{useState,useEffect,useRef}=React;
const RC=window.Recharts;
const{ComposedChart,Line,Bar,XAxis,YAxis,CartesianGrid,Tooltip,ResponsiveContainer,
  PieChart,Pie,Cell,AreaChart,Area,BarChart,Legend}=RC;

/* ─── colors ─── */
const P='#3ba6f1',A='#c1e1f7',BG='#fafaf9',SURF='#fff',TX='#0c0a09',MU='#78716c',BD='#e5e7eb';
const CH_COLORS=['#03C75A','#4285F4','#0A66C2'];

/* ─── dummy data ─── */
const DATES=['5/19','5/20','5/21','5/22','5/23','5/24','5/25','5/26','5/27','5/28',
  '5/29','5/30','5/31','6/1','6/2','6/3','6/4','6/5','6/6','6/7',
  '6/8','6/9','6/10','6/11','6/12','6/13','6/14','6/15','6/16','6/17'];
const TREND=DATES.map((d,i)=>({
  date:d,
  naver:Math.round(118+Math.sin(i*.32)*28+i*1.2),
  google:Math.round(145+Math.cos(i*.26)*35+i*.8),
  linkedin:Math.round(58+Math.sin(i*.4+1)*14+i*.4),
  spend:Math.round(240+Math.sin(i*.22)*45+(i*2)),
}));
const PIE_DATA=[{name:'네이버',v:38,c:'#03C75A'},{name:'구글',v:42,c:'#4285F4'},{name:'링크드인',v:20,c:'#0A66C2'}];
const CH_DATA=[
  {ch:'네이버',imp:45200,clk:3840,cvr:312,spd:3120000},
  {ch:'구글',imp:62800,clk:4210,cvr:356,spd:3450000},
  {ch:'링크드인',imp:18400,clk:1540,cvr:178,spd:1670000},
];
const SESSION=DATES.map((d,i)=>({date:d,sessions:Math.round(1180+Math.sin(i*.29)*240+i*12)}));
const GA4_CH=[
  {ch:'Organic Search',sess:12840,pct:35},
  {ch:'Paid Search',sess:9420,pct:26},
  {ch:'Direct',sess:7130,pct:19},
  {ch:'Referral',sess:4280,pct:12},
  {ch:'Social',sess:2940,pct:8},
];
const JOBS=[
  {name:'네이버 광고 수집',src:'Naver Search API',time:'06:00',st:'success',rec:12840,dur:'2분 14초',nxt:'내일 06:00'},
  {name:'구글 광고 수집',src:'Google Ads API',time:'06:01',st:'success',rec:18420,dur:'3분 02초',nxt:'내일 06:01'},
  {name:'링크드인 수집',src:'LinkedIn Marketing API',time:'06:03',st:'success',rec:5630,dur:'1분 48초',nxt:'내일 06:03'},
  {name:'GA4 BigQuery Export',src:'GA4 Streaming',time:'03:00',st:'success',rec:94200,dur:'5분 31초',nxt:'내일 03:00'},
  {name:'ETL 집계 쿼리',src:'BigQuery SQL',time:'06:10',st:'running',rec:0,dur:'-',nxt:'-'},
  {name:'대시보드 캐시 갱신',src:'PostgreSQL',time:'-',st:'pending',rec:0,dur:'-',nxt:'집계 후'},
];

/* ─── icon set (Lucide-style inline SVG) ─── */
const Ico=({d,s=16,fill='none',sw=2})=>(
  <svg width={s} height={s} viewBox="0 0 24 24" fill={fill} stroke="currentColor" strokeWidth={sw} strokeLinecap="round" strokeLinejoin="round">
    {d.map((p,i)=><path key={i} d={p}/>)}
  </svg>
);
const IcoUp=()=><Ico d={['M23 6 13.5 15.5 8.5 10.5 1 18','M17 6h6v6']}/>;
const IcoDn=()=><Ico d={['M23 18 13.5 8.5 8.5 13.5 1 6','M17 18h6v-6']}/>;
const IcoRef=()=><Ico d={['M1 4v6h6','M3.51 15a9 9 0 1 0 .49-4']}/>;
const IcoCal=()=><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>;
const IcoChk=()=><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12"/></svg>;
const IcoLd=()=><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><line x1="12" y1="2" x2="12" y2="6"/><line x1="12" y1="18" x2="12" y2="22"/><line x1="4.93" y1="4.93" x2="7.76" y2="7.76"/><line x1="16.24" y1="16.24" x2="19.07" y2="19.07"/><line x1="2" y1="12" x2="6" y2="12"/><line x1="18" y1="12" x2="22" y2="12"/><line x1="4.93" y1="19.07" x2="7.76" y2="16.24"/><line x1="16.24" y1="7.76" x2="19.07" y2="4.93"/></svg>;
const IcoDB=()=><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M21 12c0 1.66-4 3-9 3s-9-1.34-9-3"/><path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5"/></svg>;
const IcoBar=()=><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>;
const IcoAct=()=><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>;
const IcoZap=()=><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>;
const IcoSet=()=><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>;

/* ─── main App ─── */
function App(){
  const[tab,setTab]=useState('main');
  const[range,setRange]=useState('30일');
  const[spin,setSpin]=useState(false);
  const doRefresh=()=>{setSpin(true);let c=0;const iv=setInterval(()=>{c++;if(c>=14)clearInterval(iv)},100);setTimeout(()=>setSpin(false),1400)};

  const TABS=[
    {id:'main',label:'통합 대시보드',icon:<IcoBar/>},
    {id:'channels',label:'광고 채널',icon:<IcoZap/>},
    {id:'traffic',label:'GA4 트래픽',icon:<IcoAct/>},
    {id:'pipeline',label:'파이프라인',icon:<IcoDB/>},
  ];

  return(
    <div style={{minHeight:'100vh',background:BG}}>
      {/* ── top nav header ── */}
      <header style={{background:SURF,borderBottom:`1px solid ${BD}`,position:'sticky',top:0,zIndex:100}}>
        <div style={{maxWidth:1440,margin:'0 auto',padding:'0 24px'}}>
          {/* brand row */}
          <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',height:52,borderBottom:`1px solid #f3f4f5`}}>
            <div style={{display:'flex',alignItems:'center',gap:8}}>
              <div style={{width:28,height:28,background:P,borderRadius:6,display:'flex',alignItems:'center',justifyContent:'center'}}>
                <svg width="16" height="16" viewBox="0 0 24 24" fill="white"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
              </div>
              <span style={{fontWeight:700,fontSize:15,color:TX,letterSpacing:'-.02em'}}>MarketFlow</span>
              <span style={{fontSize:11,color:P,padding:'2px 8px',background:A,borderRadius:9999,fontWeight:600}}>Beta</span>
            </div>
            <div style={{display:'flex',alignItems:'center',gap:10}}>
              <div style={{display:'flex',alignItems:'center',gap:6,padding:'5px 12px',background:BG,border:`1px solid ${BD}`,borderRadius:9999,cursor:'pointer'}}>
                <IcoCal/>
                <select value={range} onChange={e=>setRange(e.target.value)} style={{border:'none',background:'transparent',fontSize:13,color:TX,cursor:'pointer',outline:'none',appearance:'none'}}>
                  <option>7일</option><option>30일</option><option>90일</option>
                </select>
              </div>
              <button onClick={doRefresh} style={{display:'flex',alignItems:'center',gap:6,padding:'6px 14px',background:P,color:'#fff',border:'none',borderRadius:9999,fontSize:13,fontWeight:500,cursor:'pointer'}}>
                <span className={spin?'spin-icon':''}><IcoRef/></span>새로고침
              </button>
              <div style={{width:30,height:30,borderRadius:'50%',background:A,display:'flex',alignItems:'center',justifyContent:'center',fontSize:12,fontWeight:700,color:P,cursor:'pointer'}}>김</div>
            </div>
          </div>
          {/* tab row */}
          <div style={{display:'flex',height:42,alignItems:'flex-end'}}>
            {TABS.map(t=>(
              <button key={t.id} className="tab-btn tab" role="tab" aria-selected={tab===t.id} onClick={()=>setTab(t.id)}
                style={{display:'flex',alignItems:'center',gap:6,padding:'8px 16px',border:'none',background:'transparent',
                  borderBottom:tab===t.id?`2px solid ${P}`:'2px solid transparent',
                  color:tab===t.id?P:MU,fontWeight:tab===t.id?600:400,fontSize:14,cursor:'pointer',whiteSpace:'nowrap',
                  transition:'all .15s ease'}}>
                {t.icon}{t.label}
              </button>
            ))}
            <div style={{flex:1}}/>
            <div style={{display:'flex',alignItems:'center',gap:4,paddingBottom:8}}>
              <div style={{width:7,height:7,borderRadius:'50%',background:'#10b981',marginRight:2}} className="pulse-dot"/>
              <span style={{fontSize:11,color:MU}}>BigQuery · 오늘 06:10 갱신</span>
            </div>
          </div>
        </div>
      </header>

      {/* ── content ── */}
      <main style={{maxWidth:1440,margin:'0 auto',padding:'24px'}}>
        {tab==='main'&&<MainDash/>}
        {tab==='channels'&&<ChannelDash/>}
        {tab==='traffic'&&<TrafficDash/>}
        {tab==='pipeline'&&<PipelineDash/>}
      </main>
    </div>
  );
}

/* ══ 통합 대시보드 ══ */
function MainDash(){
  const[series,setSeries]=useState({naver:true,google:true,linkedin:true,spend:true});
  const toggle=k=>setSeries(p=>({...p,[k]:!p[k]}));

  const KPIS=[
    {label:'ROAS',value:'3.2×',sub:'+8% 전주비',up:true,hi:true},
    {label:'CPC',value:'₩1,240',sub:'-3% 전주비',up:false,hi:false},
    {label:'총 전환수',value:'2,847',sub:'+12% 전주비',up:true,hi:false},
    {label:'총 광고비',value:'₩8.24M',sub:'+5% 전주비',up:true,hi:false},
  ];

  return(
    <div style={{animation:'fadeIn .3s ease'}}>
      <div style={{marginBottom:20}}>
        <h1 style={{fontSize:36,fontWeight:800,color:TX,letterSpacing:'-.03em',lineHeight:1.05}}>통합 성과 대시보드</h1>
        <p style={{fontSize:13,color:MU,marginTop:5}}>광고 채널 통합 성과 현황 · BigQuery 집계 기준 · 최근 30일</p>
      </div>

      {/* hero + kpi */}
      <div style={{display:'grid',gridTemplateColumns:'1fr 272px',gap:16,marginBottom:16}}>
        {/* hero chart */}
        <div style={{background:SURF,border:`1px solid ${BD}`,borderRadius:10,padding:20}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:14}}>
            <div>
              <h2 style={{fontSize:14,fontWeight:600,color:TX}}>채널별 전환 추이 & 광고비 지수</h2>
              <p style={{fontSize:11,color:MU,marginTop:2}}>전환수(좌축) · 광고비 상대지수(우축) · 일별</p>
            </div>
            <div style={{display:'flex',gap:6,flexWrap:'wrap'}}>
              {[['naver','네이버','#03C75A'],['google','구글','#4285F4'],['linkedin','링크드인','#0A66C2'],['spend','광고비',A]].map(([k,lbl,c])=>(
                <button key={k} onClick={()=>toggle(k)}
                  style={{display:'flex',alignItems:'center',gap:4,padding:'3px 8px',border:`1px solid ${BD}`,borderRadius:9999,
                    background:series[k]?BG:'#f0f0f0',cursor:'pointer',opacity:series[k]?1:.35,transition:'opacity .2s'}}>
                  <span style={{width:8,height:8,borderRadius:'50%',background:c,display:'inline-block'}}/>
                  <span style={{fontSize:11,color:MU}}>{lbl}</span>
                </button>
              ))}
            </div>
          </div>
          <ResponsiveContainer width="100%" height={240}>
            <ComposedChart data={TREND} margin={{top:5,right:30,left:0,bottom:5}}>
              <CartesianGrid strokeDasharray="3 3" stroke="#f0f0ef" vertical={false}/>
              <XAxis dataKey="date" tick={{fontSize:10,fill:MU}} tickLine={false} axisLine={{stroke:BD}} interval={4}/>
              <YAxis yAxisId="l" tick={{fontSize:10,fill:MU}} tickLine={false} axisLine={false} width={32}/>
              <YAxis yAxisId="r" orientation="right" tick={{fontSize:10,fill:MU}} tickLine={false} axisLine={false} width={32}/>
              <Tooltip contentStyle={{background:SURF,border:`1px solid ${BD}`,borderRadius:8,fontSize:12,boxShadow:'0 4px 16px rgba(0,0,0,.06)'}}/>
              {series.spend&&<Bar yAxisId="r" dataKey="spend" fill={A} radius={[2,2,0,0]} name="광고비지수" opacity={.85}/>}
              {series.naver&&<Line yAxisId="l" type="monotone" dataKey="naver" stroke="#03C75A" strokeWidth={2} dot={false} name="네이버"/>}
              {series.google&&<Line yAxisId="l" type="monotone" dataKey="google" stroke="#4285F4" strokeWidth={2} dot={false} name="구글"/>}
              {series.linkedin&&<Line yAxisId="l" type="monotone" dataKey="linkedin" stroke="#0A66C2" strokeWidth={1.5} dot={false} name="링크드인"/>}
            </ComposedChart>
          </ResponsiveContainer>
        </div>

        {/* KPI panel */}
        <div style={{display:'flex',flexDirection:'column',gap:10}}>
          {KPIS.map((k,i)=>(
            <div key={i} className="stat-card" style={{background:SURF,border:`1px solid ${BD}`,borderRadius:10,padding:'14px 16px',cursor:'pointer'}}>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:6}}>
                <span style={{fontSize:11,color:MU,fontWeight:500,textTransform:'uppercase',letterSpacing:'.05em'}}>{k.label}</span>
                <span style={{display:'flex',alignItems:'center',gap:3,fontSize:11,fontWeight:600,
                  color:k.up?'#10b981':'#ef4444',padding:'2px 7px',background:k.up?'#ecfdf5':'#fef2f2',borderRadius:9999}}>
                  {k.up?<IcoUp/>:<IcoDn/>}{k.sub.split(' ')[0]}
                </span>
              </div>
              <div className="stat-value" style={{fontSize:k.hi?34:28,fontWeight:700,color:k.hi?P:TX,letterSpacing:'-.03em',lineHeight:1,animation:'counterUp .4s ease'}}>
                {k.value}
              </div>
              <div style={{fontSize:11,color:MU,marginTop:5}}>{k.sub}</div>
              {k.hi&&<div style={{marginTop:8,height:3,background:A,borderRadius:9999}}><div style={{width:'72%',height:'100%',background:P,borderRadius:9999}}/></div>}
            </div>
          ))}
        </div>
      </div>

      {/* widget grid */}
      <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:16}}>
        {/* channel pie */}
        <div style={{background:SURF,border:`1px solid ${BD}`,borderRadius:10,padding:20}}>
          <h3 style={{fontSize:13,fontWeight:600,color:TX,marginBottom:3}}>채널별 광고비 분배</h3>
          <p style={{fontSize:11,color:MU,marginBottom:12}}>최근 30일</p>
          <ResponsiveContainer width="100%" height={150}>
            <PieChart>
              <Pie data={PIE_DATA} cx="50%" cy="50%" innerRadius={44} outerRadius={68} dataKey="v" nameKey="name">
                {PIE_DATA.map((e,i)=><Cell key={i} fill={e.c}/>)}
              </Pie>
              <Tooltip formatter={v=>`${v}%`} contentStyle={{fontSize:12,borderRadius:8,border:`1px solid ${BD}`}}/>
            </PieChart>
          </ResponsiveContainer>
          {PIE_DATA.map((c,i)=>(
            <div key={i} style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginTop:8}}>
              <div style={{display:'flex',alignItems:'center',gap:6}}>
                <span style={{width:8,height:8,borderRadius:'50%',background:c.c,display:'inline-block'}}/>
                <span style={{fontSize:12,color:MU}}>{c.name}</span>
              </div>
              <span style={{fontSize:12,fontWeight:600,color:TX}}>{c.v}%</span>
            </div>
          ))}
        </div>

        {/* channel conversions bar */}
        <div style={{background:SURF,border:`1px solid ${BD}`,borderRadius:10,padding:20}}>
          <h3 style={{fontSize:13,fontWeight:600,color:TX,marginBottom:3}}>채널별 전환수</h3>
          <p style={{fontSize:11,color:MU,marginBottom:12}}>최근 30일</p>
          <ResponsiveContainer width="100%" height={150}>
