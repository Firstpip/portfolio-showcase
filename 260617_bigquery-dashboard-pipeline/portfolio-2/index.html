<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --ink:#17191c;--fog:#f7f7f8;--rust:#5d2a1a;--apr:#fbe1d1;--sky:#d3e3fc;
  --ash:#4c4c4c;--graph:#777b86;--dove:#a3a6af;--obs:#000;
  --w:#fff;--r24:24px;--r12:12px;--r9k:9999px;
  --font:'Pretendard Variable','Pretendard',-apple-system,sans-serif;
}
body{font-family:var(--font);background:var(--w);color:var(--ink);font-size:15px;line-height:1.45}
button{font-family:var(--font)}select{font-family:var(--font)}

@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
@keyframes scaleCard{from{opacity:0;transform:scale(.97)}to{opacity:1;transform:scale(1)}}
@keyframes glowPulse{0%,100%{box-shadow:0 0 0 0 rgba(93,42,26,.2)}50%{box-shadow:0 0 0 8px rgba(93,42,26,0)}}
@keyframes numberRise{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@keyframes barGrow{from{width:0}to{width:100%}}
@keyframes shimmer{from{background-position:-200% 0}to{background-position:200% 0}}
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
@keyframes dotPulse{0%,100%{transform:scale(1);opacity:1}50%{transform:scale(.7);opacity:.5}}
@keyframes warnGlow{0%,100%{background:rgba(251,225,209,.5)}50%{background:rgba(251,225,209,1)}}
@keyframes borderSlide{from{opacity:0;transform:translateX(-8px)}to{opacity:1;transform:translateX(0)}}
@keyframes heroGlow{0%,100%{opacity:.8}50%{opacity:1}}

.nav-item{cursor:pointer;border-radius:10px;transition:background .12s,color .12s;color:var(--graph)}
.nav-item:hover{background:rgba(93,42,26,.06);color:var(--ink)}
.nav-item.active{background:var(--apr);color:var(--rust);font-weight:600}
.card-lift{transition:box-shadow .15s,transform .12s}
.card-lift:hover{box-shadow:0 8px 40px rgba(23,25,28,.09);transform:translateY(-2px)}
.row-item:hover{background:var(--fog)!important}
.spin-ico{animation:spin 1s linear infinite;display:inline-flex}
.warn-row{animation:warnGlow 3s ease-in-out infinite}
.rust-btn{transition:background .15s;background:var(--rust);color:var(--w);border:none;border-radius:var(--r9k);padding:10px 22px;font-size:14px;font-weight:500;cursor:pointer}
.rust-btn:hover{background:#4a2014}
.ghost-btn{transition:border-color .15s,color .15s;background:transparent;border:1.5px solid var(--dove);border-radius:var(--r9k);padding:8px 18px;font-size:14px;color:var(--ash);cursor:pointer}
.ghost-btn:hover{border-color:var(--ink);color:var(--ink)}
</style>
</head>

function CrmScreen(){
  const[prog,setProg]=useState(false);
  const doSync=()=>{setProg(true);let c=0;const iv=setInterval(()=>{c++;if(c>=28)clearInterval(iv)},100);setTimeout(()=>setProg(false),2800)};
  return(
    <div style={{flex:1,padding:36,overflowY:'auto',animation:'slideUp .35s ease'}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:32}}>
        <div>
          <div style={{fontSize:12,fontWeight:600,color:GRAPH,textTransform:'uppercase',letterSpacing:'.1em',marginBottom:8}}>Salesforce 연동 현황</div>
          <div style={{fontSize:46,fontWeight:800,color:INK,lineHeight:1,letterSpacing:'-.025em'}}>60,490</div>
          <div style={{fontSize:15,color:ASH,marginTop:6}}>총 CRM 레코드 오늘 동기화 · 3개 객체</div>
        </div>
        <div style={{display:'flex',gap:10,marginTop:8}}>
          <button className="ghost-btn" onClick={doSync}>{prog?'동기화 중...':'수동 동기화'}</button>
          <button className="rust-btn">커넥터 설정</button>
        </div>
      </div>

      {prog&&(
        <div style={{background:APR,borderRadius:14,padding:'12px 20px',marginBottom:24,border:`1px solid rgba(93,42,26,.15)`,display:'flex',alignItems:'center',gap:12}}>
          <span className="spin-ico" style={{width:16,height:16,border:`2.5px solid ${RUST}`,borderTopColor:'transparent',borderRadius:'50%',display:'inline-block'}}/>
          <span style={{fontSize:13,color:RUST,fontWeight:500}}>Salesforce Bulk API Job 실행 중 — 약 2~3분 소요</span>
          <div style={{flex:1,height:4,background:'rgba(93,42,26,.1)',borderRadius:9999,overflow:'hidden',marginLeft:12}}>
            <div style={{height:'100%',background:RUST,borderRadius:9999,animation:'barGrow 2.8s linear',width:'100%'}}/>
          </div>
        </div>
      )}

      {/* SF Objects */}
      <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:16,marginBottom:28}}>
        {SF_OBJS.map((o,i)=>(
          <div key={i} className="card-lift" style={{background:W,borderRadius:var_r24,border:`1px solid rgba(0,0,0,.07)`,padding:'24px 24px 20px',animation:`scaleCard .4s ease ${i*.08}s backwards`}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:14}}>
              <div style={{fontSize:13,fontWeight:600,color:INK}}>{o.obj}</div>
              <span style={{padding:'3px 10px',borderRadius:9999,fontSize:12,fontWeight:600,background:o.status==='ok'?'rgba(5,150,105,.08)':APR,color:o.status==='ok'?'#059669':RUST}}>
                {o.status==='ok'?'정상':'주의'}
              </span>
            </div>
            <div style={{fontSize:32,fontWeight:800,color:INK,letterSpacing:'-.03em',marginBottom:4}}>{o.rec.toLocaleString()}</div>
            <div style={{fontSize:12,color:GRAPH}}>{o.last}</div>
            {o.delta>0&&<div style={{fontSize:11,color:RUST,marginTop:4}}>최근 {o.delta}개 오류 발생</div>}
          </div>
        ))}
      </div>

      {/* Field mapping table */}
      <div style={{background:W,borderRadius:var_r24,border:`1px solid rgba(0,0,0,.07)`,overflow:'hidden'}}>
        <div style={{padding:'20px 24px 14px',borderBottom:`1px solid ${FOG}`,display:'flex',alignItems:'center',justifyContent:'space-between'}}>
          <div>
            <div style={{fontSize:15,fontWeight:600,color:INK}}>필드 매핑 설정</div>
            <div style={{fontSize:13,color:GRAPH,marginTop:2}}>Salesforce 필드 ↔ BigQuery 컬럼 연결</div>
          </div>
          <button className="ghost-btn">매핑 편집</button>
        </div>
        <table style={{width:'100%',borderCollapse:'collapse'}}>
          <thead>
            <tr style={{background:FOG}}>
              {['Salesforce 필드','BigQuery 컬럼','타입','상태'].map(h=>(
                <th key={h} style={{padding:'10px 16px',textAlign:'left',fontSize:12,fontWeight:600,color:GRAPH,letterSpacing:'.04em'}}>{h}</th>
              ))}
            </tr>
          </thead>
          <tbody>
            {[
              ['Account.Name','account_name','STRING','매핑됨'],
              ['Account.AnnualRevenue','annual_revenue','FLOAT64','매핑됨'],
              ['Contact.Email','contact_email','STRING','매핑됨'],
              ['Contact.Title','job_title','STRING','매핑됨'],
              ['Opportunity.Amount','deal_amount','FLOAT64','매핑됨'],
              ['Opportunity.Stage','deal_stage','STRING','매핑됨'],
            ].map(([sf,bq,type,st],i)=>(
              <tr key={i} className="row-item" style={{borderTop:`1px solid ${FOG}`}}>
                <td style={{padding:'11px 16px',fontSize:13,color:INK,fontFamily:'monospace'}}>{sf}</td>
                <td style={{padding:'11px 16px',fontSize:13,color:ASH,fontFamily:'monospace'}}>{bq}</td>
                <td style={{padding:'11px 16px',fontSize:12,color:GRAPH}}>{type}</td>
                <td style={{padding:'11px 16px'}}>
                  <span style={{display:'inline-flex',alignItems:'center',gap:4,fontSize:12,fontWeight:600,color:'#059669'}}>
                    <PhChk size={12}/>{st}
                  </span>
                </td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>
    </div>
  );
}

/* ══ 세그먼테이션 ══ */
function SegScreen(){
  const[selSeg,setSelSeg]=useState(null);
  return(
    <div style={{flex:1,padding:36,overflowY:'auto',animation:'slideUp .35s ease'}}>
      <div style={{marginBottom:32}}>
        <div style={{fontSize:12,fontWeight:600,color:GRAPH,textTransform:'uppercase',letterSpacing:'.1em',marginBottom:8}}>RFM 세그먼테이션</div>
        <div style={{fontSize:48,fontWeight:800,color:INK,lineHeight:1,letterSpacing:'-.03em'}}>
          7,240 <span style={{fontSize:18,fontWeight:500,color:GRAPH}}>명 총 분석 고객</span>
        </div>
      </div>

      <div style={{display:'grid',gridTemplateColumns:'1fr 340px',gap:24,marginBottom:28}}>
        {/* bubble chart */}
        <div style={{background:W,borderRadius:var_r24,border:`1px solid rgba(0,0,0,.07)`,padding:'24px'}}>
          <div style={{fontSize:14,fontWeight:600,color:INK,marginBottom:4}}>세그먼트 포지셔닝</div>
          <div style={{fontSize:12,color:GRAPH,marginBottom:18}}>고객 수(X) · 평균 딜 사이즈(Y)</div>
          <ResponsiveContainer width="100%" height={240}>
            <ScatterChart>
              <CartesianGrid strokeDasharray="3 3" stroke={`${DOVE}66`}/>
              <XAxis dataKey="x" name="고객수" tick={{fontSize:11,fill:GRAPH}}/>
              <YAxis dataKey="y" name="딜사이즈(만원)" tick={{fontSize:11,fill:GRAPH}}/>
              <Tooltip cursor={{stroke:DOVE}} contentStyle={{borderRadius:12,border:`1px solid ${DOVE}`,fontSize:12}}/>
              <Scatter data={BUBBLE} fill={RUST}>
                {BUBBLE.map((_,i)=><Cell key={i} fill={[RUST,SKY.replace('#','#'),APR,'#6366f1','#059669','#f59e0b'][i%6]}/>)}
              </Scatter>
            </ScatterChart>
          </ResponsiveContainer>
        </div>

        {/* segment cards */}
        <div style={{display:'flex',flexDirection:'column',gap:10}}>
          {SEGS.map((s,i)=>(
            <div key={i} className="card-lift" onClick={()=>setSelSeg(s===selSeg?null:s)}
              style={{background:s===selSeg?APR:W,borderRadius:14,border:`1px solid ${s===selSeg?'rgba(93,42,26,.2)':'rgba(0,0,0,.07)'}`,padding:'14px 18px',cursor:'pointer',animation:`slideUp .3s ease ${i*.05}s backwards`}}>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                <div style={{fontSize:14,fontWeight:600,color:INK}}>{s.seg}</div>
                <span style={{fontSize:13,fontWeight:700,color:RUST}}>{s.count.toLocaleString()}명</span>
              </div>
              <div style={{display:'flex',gap:14,marginTop:6}}>
                <span style={{fontSize:12,color:GRAPH}}>딜: {(s.deal/10000).toFixed(0)}만원</span>
                <span style={{fontSize:12,color:GRAPH}}>성약률: {s.rate}%</span>
                <span style={{fontSize:11,color:DOVE,fontFamily:'monospace'}}>RFM {s.rfm}</span>
              </div>
            </div>
          ))}
        </div>
      </div>

      {selSeg&&(
        <div style={{background:APR,borderRadius:var_r24,padding:'20px 24px',border:`1px solid rgba(93,42,26,.15)`,animation:'slideUp .2s ease'}}>
          <div style={{fontSize:16,fontWeight:700,color:RUST,marginBottom:8}}>{selSeg.seg} 상세</div>
          <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:16}}>
            {[['고객 수',`${selSeg.count.toLocaleString()}명`],['평균 딜',`${(selSeg.deal/10000).toFixed(0)}만원`],['성약률',`${selSeg.rate}%`],['RFM',selSeg.rfm]].map(([l,v])=>(
              <div key={l}>
                <div style={{fontSize:12,color:RUST,marginBottom:4,fontWeight:600}}>{l}</div>
                <div style={{fontSize:22,fontWeight:700,color:INK}}>{v}</div>
              </div>
            ))}
          </div>
        </div>
      )}
    </div>
  );
}

/* ══ 품질 모니터링 ══ */
function QualityScreen(){
  const[filter,setFilter]=useState('전체');
  return(
    <div style={{flex:1,padding:36,overflowY:'auto',animation:'slideUp .35s ease'}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-end',marginBottom:28}}>
        <div>
          <div style={{fontSize:12,fontWeight:600,color:GRAPH,textTransform:'uppercase',letterSpacing:'.1em',marginBottom:8}}>데이터 품질</div>
          <div style={{fontSize:44,fontWeight:800,color:INK,lineHeight:1,letterSpacing:'-.025em'}}>98.2<span style={{fontSize:22,fontWeight:500,color:GRAPH}}>%</span></div>
          <div style={{fontSize:14,color:ASH,marginTop:6}}>전체 테이블 평균 품질 스코어</div>
        </div>
        <div style={{display:'flex',gap:8}}>
          {['전체','정상','주의','오류'].map(f=>(
            <button key={f} onClick={()=>setFilter(f)}
              style={{padding:'7px 16px',borderRadius:9999,fontSize:13,border:'none',cursor:'pointer',fontFamily:'inherit',
                background:filter===f?INK:FOG,color:filter===f?W:ASH,fontWeight:filter===f?600:400,transition:'all .15s'}}>
              {f}
            </button>
          ))}
        </div>
      </div>

      <div style={{background:W,borderRadius:var_r24,border:`1px solid rgba(0,0,0,.07)`,overflow:'hidden',marginBottom:24}}>
        <table style={{width:'100%',borderCollapse:'collapse'}}>
          <thead>
            <tr style={{background:FOG}}>
              {['테이블','행 수','전일 대비','스키마','마지막 갱신'].map(h=>(
                <th key={h} style={{padding:'10px 20px',textAlign:'left',fontSize:12,fontWeight:600,color:GRAPH,letterSpacing:'.04em'}}>{h}</th>
              ))}
            </tr>
          </thead>
          <tbody>
            {QA_TABLES.filter(t=>filter==='전체'||(filter==='정상'&&t.schema==='ok')||(filter==='주의'&&t.schema==='warn')).map((t,i)=>(
              <tr key={i} className={`row-item${t.schema==='warn'?' warn-row':''}`} style={{borderTop:`1px solid ${FOG}`}}>
                <td style={{padding:'14px 20px',fontSize:14,fontWeight:500,color:INK,fontFamily:'monospace'}}>{t.tbl}</td>
                <td style={{padding:'14px 20px',fontSize:13,color:ASH,fontVariantNumeric:'tabular-nums'}}>{t.rows.toLocaleString()}</td>
                <td style={{padding:'14px 20px'}}>
                  <span style={{fontSize:13,fontWeight:600,color:t.delta>0?RUST:'#059669'}}>
                    {t.delta>0?`+${t.delta} 오류`:'정상'}
                  </span>
                </td>
                <td style={{padding:'14px 20px'}}>
                  <span style={{padding:'3px 10px',borderRadius:9999,fontSize:12,fontWeight:600,background:t.schema==='ok'?'rgba(5,150,105,.08)':APR,color:t.schema==='ok'?'#059669':RUST}}>
                    {t.schema==='ok'?'일치':'경고'}
                  </span>
                </td>
                <td style={{padding:'14px 20px',fontSize:13,color:GRAPH}}>{t.updated}</td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>

      {/* mini chart */}
      <div style={{background:W,borderRadius:var_r24,border:`1px solid rgba(0,0,0,.07)`,padding:'24px'}}>
        <div style={{fontSize:14,fontWeight:600,color:INK,marginBottom:4}}>일별 오류 추이</div>
        <div style={{fontSize:12,color:GRAPH,marginBottom:16}}>최근 14일 ETL 오류 건수</div>
        <ResponsiveContainer width="100%" height={140}>
          <AreaChart data={[0,1,0,2,0,0,1,0,3,1,0,0,1,2].map((v,i)=>({day:`6/${4+i}`,errors:v}))}>
            <defs>
              <linearGradient id="errGrad" x1="0" y1="0" x2="0" y2="1">
                <stop offset="5%" stopColor={RUST} stopOpacity={0.18}/>
                <stop offset="95%" stopColor={RUST} stopOpacity={0}/>
              </linearGradient>
            </defs>
            <CartesianGrid strokeDasharray="3 3" stroke={`${DOVE}55`}/>
            <XAxis dataKey="day" tick={{fontSize:10,fill:GRAPH}}/>
            <YAxis tick={{fontSize:10,fill:GRAPH}} allowDecimals={false}/>
            <Tooltip contentStyle={{borderRadius:10,border:`1px solid ${DOVE}`,fontSize:12}}/>
            <Area type="monotone" dataKey="errors" stroke={RUST} strokeWidth={2} fill="url(#errGrad)"/>
          </AreaChart>
        </ResponsiveContainer>
      </div>
    </div>
  );
}

const var_r24='24px';

/* ══ App ══ */
function App(){
  const[screen,setScreen]=useState('main');

  return(
    <div style={{display:'flex',height:'100vh',background:W,overflow:'hidden'}}>
      {/* aside */}
      <aside style={{width:220,background:FOG,borderRight:`1px solid rgba(0,0,0,.06)`,display:'flex',flexDirection:'column',flexShrink:0,padding:'0 12px',position:'sticky',top:0,height:'100vh',overflowY:'auto'}}>
        {/* logo */}
        <div style={{display:'flex',alignItems:'center',gap:10,padding:'22px 8px 18px'}}>
          <div style={{width:36,height:36,background:'linear-gradient(135deg, #5d2a1a 0%, #9b4523 100%)',borderRadius:10,display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="2.5" strokeLinecap="round"><path d="M4 6h16M4 10h16M4 14h8"/><circle cx="18" cy="16" r="4"/><path d="m20 18-1.5-1.5"/></svg>
          </div>
          <div>
            <div style={{fontSize:15,fontWeight:700,color:INK,letterSpacing:'-.025em'}}>DataBridge</div>
            <div style={{fontSize:11,color:GRAPH}}>CRM · Analytics</div>
          </div>
        </div>

        <div style={{fontSize:11,fontWeight:700,color:DOVE,textTransform:'uppercase',letterSpacing:'.1em',padding:'8px 8px 6px'}}>관제</div>
        {NAVS.map(n=>(
          <button key={n.id} data-tab={n.id} onClick={()=>setScreen(n.id)}
            className={`nav-item${screen===n.id?' active':''}`}
            style={{display:'flex',alignItems:'center',gap:10,width:'100%',border:'none',
              padding:'10px 10px',fontSize:14,textAlign:'left',marginBottom:3,cursor:'pointer'}}>
            <span style={{color:screen===n.id?RUST:DOVE,display:'flex',flexShrink:0}}>{n.ico}</span>
            {n.label}
          </button>
        ))}

        <div style={{margin:'14px 0',borderTop:`1px solid ${DOVE}44`}}/>
        <div style={{fontSize:11,fontWeight:700,color:DOVE,textTransform:'uppercase',letterSpacing:'.1em',padding:'0 8px 6px'}}>설정</div>
        <button data-tab="settings" onClick={()=>setScreen('main')} className="nav-item"
          style={{display:'flex',alignItems:'center',gap:10,width:'100%',border:'none',background:'none',padding:'10px 10px',fontSize:14,textAlign:'left',color:GRAPH,marginBottom:3,cursor:'pointer'}}>
          <span style={{color:DOVE,display:'flex'}}><PhGear/></span> 소스 설정
        </button>

        {/* bottom user badge */}
        <div style={{marginTop:'auto',padding:'16px 8px',display:'flex',alignItems:'center',gap:10,borderTop:`1px solid ${DOVE}33`}}>
          <div style={{width:32,height:32,borderRadius:'50%',background:APR,display:'flex',alignItems:'center',justifyContent:'center',fontSize:13,fontWeight:700,color:RUST,flexShrink:0}}>김</div>
          <div>
            <div style={{fontSize:13,fontWeight:600,color:INK}}>김민준</div>
            <div style={{fontSize:11,color:GRAPH}}>데이터 엔지니어</div>
          </div>
        </div>
      </aside>

      {/* main */}
      <div style={{flex:1,display:'flex',flexDirection:'column',overflow:'hidden'}}>
        <StatusStrip/>
        <div style={{flex:1,display:'flex',overflow:'hidden'}}>
          {screen==='main'&&<PipelineCtrl/>}
          {screen==='crm'&&<CrmScreen/>}
          {screen==='segmentation'&&<SegScreen/>}
          {screen==='quality'&&<QualityScreen/>}
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
