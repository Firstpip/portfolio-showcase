<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>자사몰 CRM 메타데이터 동기화 어드민</title>
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone@7.27.3/babel.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.2/dist/chart.umd.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/lucide-static@latest/font/lucide.css">
<style>
:root{--primary:#518bdb;--primary-d:#3a72c2;--accent:#d9473a;--teal:#36bab8;--bg:#f5f5f5;--surface:#fff;--border:#e2e0de;--tp:#221f1c;--ts:#797267;--tm:#8c8a88;--sw:240px;--th:52px;--ok:#22c55e;--warn:#f59e0b;--err:#ef4444;--grad:linear-gradient(to right,#518bdb,#36bab8);--sh-sm:0 1px 3px rgba(0,0,0,.06);--sh-md:0 4px 12px rgba(0,0,0,.09)}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Pretendard',-apple-system,sans-serif;background:var(--bg);color:var(--tp);font-size:14px}
.app{display:flex;height:100vh;overflow:hidden}

/* SIDEBAR */
aside.sidebar{width:var(--sw);min-width:var(--sw);background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;z-index:10;box-shadow:var(--sh-sm)}
.sb-brand{padding:14px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;height:var(--th)}
.sb-icon{width:28px;height:28px;background:var(--grad);border-radius:8px;display:flex;align-items:center;justify-content:center;font-weight:800;color:#fff;font-size:11px;flex-shrink:0}
.sb-name{font-size:13px;font-weight:700}
.sb-env{margin-left:auto;font-size:10px;padding:2px 6px;background:#cbfbf1;color:#0d7a6d;border-radius:4px;font-weight:700}
.sb-sec{padding:14px 12px 6px}
.sb-lbl{font-size:10px;font-weight:700;color:var(--tm);text-transform:uppercase;letter-spacing:.8px;padding:0 8px 6px}
.sb-link{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:8px;cursor:pointer;font-size:13.5px;font-weight:500;color:var(--ts);border:none;background:none;width:100%;text-align:left;transition:all .15s;margin-bottom:1px;font-family:inherit}
.sb-link:hover{background:var(--bg);color:var(--tp)}
.sb-link.active{background:#eff6ff;color:var(--primary);font-weight:600}
.sb-badge{margin-left:auto;font-size:10px;font-weight:700;background:var(--accent);color:#fff;border-radius:4px;padding:1px 5px}
.sb-foot{margin-top:auto;padding:12px;border-top:1px solid var(--border)}
.u-row{display:flex;align-items:center;gap:8px;padding:8px;border-radius:8px}
.u-av{width:28px;height:28px;border-radius:50%;background:var(--grad);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff}

/* TOPBAR */
.topbar{height:var(--th);background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 20px;gap:10px;flex-shrink:0}
.breadcrumb{font-size:12px;color:var(--tm);display:flex;align-items:center;gap:4px}
.breadcrumb span:last-child{color:var(--tp);font-weight:600}
.topbar-search{display:flex;align-items:center;gap:6px;background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:5px 10px;font-size:12.5px;color:var(--tm);width:200px}
.icon-btn{width:32px;height:32px;border-radius:8px;background:none;border:1px solid var(--border);display:flex;align-items:center;justify-content:center;color:var(--ts);position:relative;cursor:pointer}
.notif-dot{width:7px;height:7px;background:var(--accent);border-radius:50%;position:absolute;top:5px;right:5px;border:1.5px solid #fff}

/* MAIN */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.page-content{flex:1;overflow-y:auto;padding:20px 24px}
.page-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:20px}
.page-title{font-size:20px;font-weight:700}
.page-sub{font-size:12.5px;color:var(--tm);margin-top:2px}

/* HERO STRIP */
.hero-strip{background:var(--grad);border-radius:14px;padding:22px 28px;margin-bottom:20px;display:flex;align-items:center;gap:36px;box-shadow:0 6px 24px rgba(81,139,219,.25)}
.hero-lbl{font-size:11px;font-weight:700;color:rgba(255,255,255,.7);text-transform:uppercase;letter-spacing:.6px;margin-bottom:6px}
.hero-val{font-size:48px;font-weight:800;color:#fff;line-height:1;letter-spacing:-1.5px}
.hero-sub{font-size:12px;color:rgba(255,255,255,.8);margin-top:4px}
.hero-div{width:1px;height:60px;background:rgba(255,255,255,.25)}

/* STAT CARDS */
.stat-row{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:18px}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:16px 18px 12px;box-shadow:var(--sh-sm);position:relative;overflow:hidden;transition:box-shadow .2s}
.stat-card:hover{box-shadow:var(--sh-md)}
.stat-lbl{font-size:11.5px;font-weight:600;color:var(--tm);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
.stat-value{font-weight:700;color:var(--tp);line-height:1;margin-bottom:4px}
.stat-delta{font-size:12px;font-weight:600}
.stat-delta.pos{color:var(--ok)}.stat-delta.neg{color:var(--err)}.stat-delta.neu{color:var(--tm)}
.stat-ico{position:absolute;top:14px;right:14px;width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center}
.ico-blue{background:#eff6ff;color:var(--primary)}.ico-green{background:#f0fdf4;color:var(--ok)}.ico-red{background:#fef2f2;color:var(--err)}.ico-amber{background:#fffbeb;color:var(--warn)}
.sparkline{display:block;margin-top:8px}

/* BUTTONS */
.btn{padding:7px 14px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;border:none;display:inline-flex;align-items:center;gap:6px;transition:all .15s;font-family:inherit}
.btn-primary{background:var(--primary);color:#fff}.btn-primary:hover{background:var(--primary-d)}
.btn-secondary{background:var(--surface);color:var(--tp);border:1px solid var(--border)}.btn-secondary:hover{background:var(--bg)}
.btn-danger{background:var(--accent);color:#fff}
.hdr-actions{display:flex;gap:8px}

/* TABS */
.tab-bar{display:flex;align-items:center;gap:2px;border-bottom:1px solid var(--border);margin-bottom:14px}
.tab-btn{padding:8px 14px;font-size:13.5px;font-weight:500;color:var(--ts);background:none;border:none;border-bottom:2px solid transparent;cursor:pointer;margin-bottom:-1px;transition:all .15s;font-family:inherit}
.tab-btn:hover{color:var(--tp)}.tab-btn.active{color:var(--primary);border-bottom-color:var(--primary);font-weight:600}
.tab-cnt{font-size:10px;background:var(--bg);border-radius:4px;padding:1px 5px;margin-left:3px}
.tab-btn.active .tab-cnt{background:#eff6ff;color:var(--primary)}

/* TOOLBAR */
.toolbar{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.srch-wrap{position:relative}
.srch-ico{position:absolute;left:9px;top:50%;transform:translateY(-50%);color:var(--tm)}
.srch-input{padding:7px 10px 7px 30px;border:1px solid var(--border);border-radius:8px;font-size:13px;background:var(--surface);width:240px;font-family:inherit}
.filter-chip{padding:5px 10px;border:1px solid var(--border);border-radius:6px;font-size:12.5px;font-weight:500;background:var(--surface);color:var(--ts);cursor:pointer;display:flex;align-items:center;gap:4px;font-family:inherit}
.filter-chip.active{border-color:var(--primary);background:#eff6ff;color:var(--primary)}

/* TABLE */
.table-wrap{background:var(--surface);border:1px solid var(--border);border-radius:10px;overflow:hidden;box-shadow:var(--sh-sm)}
table.data-table{width:100%;border-collapse:collapse}
table.data-table thead th{padding:10px 14px;font-size:11px;font-weight:700;color:var(--tm);text-align:left;background:#fafaf9;border-bottom:1px solid var(--border);text-transform:uppercase;letter-spacing:.4px}
table.data-table tbody tr{border-bottom:1px solid #f0eeec;cursor:pointer;transition:background .1s}
table.data-table tbody tr:last-child{border-bottom:none}
table.data-table tbody tr:hover{background:#fafaf9}
table.data-table tbody tr.row-sel{background:#eff6ff}
table.data-table td{padding:11px 14px;font-size:13px;vertical-align:middle}
.td-mono{font-family:monospace;font-size:12px}.td-muted{font-size:12px;color:var(--ts)}

/* BADGE */
.badge{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:5px;font-size:11.5px;font-weight:600}
.b-ok{background:#f0fdf4;color:#15803d}.b-run{background:#eff6ff;color:#1d4ed8}.b-err{background:#fef2f2;color:#b91c1c}.b-q{background:#fffbeb;color:#92400e}.b-neu{background:var(--bg);color:#57534e}
.b-dot{width:6px;height:6px;border-radius:50%;background:currentColor}
.b-run .b-dot{animation:pulse-dot 1.5s ease-in-out infinite}

/* CONTENT SPLIT */
.content-split{display:flex;gap:16px}
.master-list{flex:1;min-width:0}
.detail-panel{width:340px;flex-shrink:0;background:var(--surface);border:1px solid var(--border);border-radius:10px;overflow:hidden;box-shadow:var(--sh-sm)}
.det-header{padding:14px 16px;border-bottom:1px solid var(--border);background:#fafaf9;display:flex;align-items:center;justify-content:space-between}
.det-title{font-size:13.5px;font-weight:700}
.det-sec{padding:14px 16px;border-bottom:1px solid var(--border)}
.det-sec:last-child{border-bottom:none}
.det-slbl{font-size:10px;font-weight:700;color:var(--tm);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px}
.det-row{display:flex;justify-content:space-between;margin-bottom:5px}
.det-key{font-size:12.5px;color:var(--ts)}.det-val{font-size:12.5px;font-weight:500}
.prog-wrap{height:6px;background:var(--bg);border-radius:4px;overflow:hidden;margin-top:4px}
.prog-fill{height:100%;background:var(--grad);border-radius:4px;transition:width .4s}
.log-block{background:#1a1a1a;border-radius:6px;padding:10px 12px;font-family:monospace;font-size:11px;color:#a8f0a0;max-height:130px;overflow-y:auto;line-height:1.6}
.log-err{color:#f87171}.log-info{color:#93c5fd}
.action-bar{padding:12px 16px;border-top:1px solid var(--border);display:flex;gap:6px}

/* PROGRESS INLINE */
.prog-inline{display:flex;align-items:center;gap:6px}
.prog-track{flex:1;min-width:60px;height:5px;background:var(--bg);border-radius:4px;overflow:hidden}
.prog-f{height:100%;background:var(--grad);border-radius:4px}

/* CHART */
.chart-section{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:18px 20px;margin-bottom:16px;box-shadow:var(--sh-sm)}
.chart-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.chart-title{font-size:14px;font-weight:700}
.chart-sub{font-size:12px;color:var(--tm)}
.legend{display:flex;gap:14px}
.legend-item{display:flex;align-items:center;gap:4px;font-size:12px;color:var(--ts)}
.leg-dot{width:8px;height:8px;border-radius:50%}

/* TOAST */
.toast{position:fixed;bottom:20px;right:20px;background:var(--tp);color:#fff;padding:10px 16px;border-radius:8px;font-size:13px;font-weight:500;display:flex;align-items:center;gap:8px;box-shadow:var(--sh-md);z-index:1000}

/* COUPON */
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
.form-group{display:flex;flex-direction:column;gap:4px}
.form-lbl{font-size:12px;font-weight:600;color:var(--ts)}
.form-input,.form-select{padding:8px 10px;border:1px solid var(--border);border-radius:8px;font-size:13px;font-family:inherit;background:var(--surface)}
.api-code{background:#1a1a1a;color:#86efac;padding:14px 16px;border-radius:8px;font-family:monospace;font-size:12px;line-height:1.7;position:relative}
.copy-btn{position:absolute;top:8px;right:8px;padding:3px 8px;background:rgba(255,255,255,.1);border:none;border-radius:4px;font-size:11px;color:#d1d5db;cursor:pointer;font-family:inherit}

/* KEYFRAMES */
@keyframes pulse-dot{0%,100%{opacity:1}50%{opacity:.3}}
@keyframes count-up{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes slide-in{from{opacity:0;transform:translateX(10px)}to{opacity:1;transform:translateX(0)}}
@keyframes bar-grow{from{width:0}to{width:var(--tw,100%)}}
@keyframes fade-up{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
@keyframes toast-in{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

.hero-val{animation:count-up .5s ease both}
.detail-panel{animation:slide-in .2s ease both}
.stat-card{animation:fade-up .3s ease both}
.toast{animation:toast-in .25s ease both}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useRef}=React;

const JOBS=[
  {id:'J-001',name:'회원 정보 FTP 동기화',type:'회원',status:'running',prog:73,read:14820,write:10819,skip:12,start:'09:15:02',dur:'00:08:43',next:'10:00',chunk:500},
  {id:'J-002',name:'상품 정보 FTP 동기화',type:'상품',status:'completed',prog:100,read:8340,write:8338,skip:2,start:'08:30:00',dur:'00:05:21',next:'10:30',chunk:200},
  {id:'J-003',name:'주문/결제 내역 FTP 동기화',type:'주문',status:'failed',prog:34,read:3200,write:0,skip:0,start:'08:45:00',dur:'00:02:11',next:'–',chunk:100},
  {id:'J-004',name:'고객 세그먼트 재계산',type:'분석',status:'queued',prog:0,read:0,write:0,skip:0,start:'–',dur:'–',next:'10:00',chunk:300},
  {id:'J-005',name:'쿠폰 만료 정리 배치',type:'쿠폰',status:'completed',prog:100,read:1250,write:1248,skip:2,start:'07:00:00',dur:'00:01:05',next:'19:00',chunk:50},
  {id:'J-006',name:'트래킹 이벤트 집계',type:'트래킹',status:'completed',prog:100,read:45200,write:45200,skip:0,start:'06:00:00',dur:'00:03:44',next:'12:00',chunk:1000},
];

const Sparkline=({data,color,w=70,h=26})=>{
  const max=Math.max(...data),min=Math.min(...data);
  const pts=data.map((v,i)=>[(i/(data.length-1)*w).toFixed(1),(h-((v-min)/(max-min||1))*h).toFixed(1)].join(',')).join(' ');
  return <svg className="sparkline" width={w} height={h} viewBox={`0 0 ${w} ${h}`}><polyline points={pts} fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/></svg>;
};

const Badge=({status})=>{
  const M={running:{c:'b-run',l:'실행중',dot:true},completed:{c:'b-ok',l:'완료',dot:false},failed:{c:'b-err',l:'실패',dot:false},queued:{c:'b-q',l:'대기',dot:false},active:{c:'b-ok',l:'활성',dot:false},expired:{c:'b-neu',l:'만료',dot:false},draft:{c:'b-q',l:'미활성',dot:false}};
  const s=M[status]||{c:'b-neu',l:status,dot:false};
  return <span className={`badge ${s.c}`}>{s.dot&&<span className="b-dot"/>}{s.l}</span>;
};

const ProgInline=({pct,color})=>(
  <div className="prog-inline"><div className="prog-track"><div className="prog-f" style={{width:`${pct}%`,background:color||'var(--grad)'}}/></div><span className="td-muted">{pct}%</span></div>
);

const DetailPanel=({job,onClose})=>{
  if(!job)return null;
  return(
    <div className="detail-panel">
      <div className="det-header"><div className="det-title">{job.name}</div><button className="btn btn-secondary" style={{padding:'3px 8px'}} onClick={onClose}>✕</button></div>
      <div className="det-sec"><div className="det-slbl">실행 상태</div><div className="det-row"><span className="det-key">상태</span><Badge status={job.status}/></div><div className="det-row"><span className="det-key">진행률</span><span className="det-val">{job.prog}%</span></div><div className="prog-wrap"><div className="prog-fill" style={{width:`${job.prog}%`}}/></div></div>
      <div className="det-sec"><div className="det-slbl">처리 현황</div><div className="det-row"><span className="det-key">읽기</span><span className="det-val">{job.read.toLocaleString()}</span></div><div className="det-row"><span className="det-key">쓰기</span><span className="det-val">{job.write.toLocaleString()}</span></div><div className="det-row"><span className="det-key">Skip</span><span className="det-val" style={{color:job.skip>0?'var(--warn)':undefined}}>{job.skip}</span></div></div>
      <div className="det-sec"><div className="det-slbl">스케줄</div><div className="det-row"><span className="det-key">시작</span><span className="det-val td-mono">{job.start}</span></div><div className="det-row"><span className="det-key">소요</span><span className="det-val td-mono">{job.dur}</span></div><div className="det-row"><span className="det-key">다음</span><span className="det-val td-mono">{job.next}</span></div></div>
      <div className="det-sec"><div className="det-slbl">최근 로그</div><div className="log-block"><div className="log-info">[09:23:01] ItemReader chunk #219</div><div>[09:23:01] FTP connected: ftp.datarise.io:21</div><div>[09:23:01] Uploaded member_20260618_c219.csv</div>{job.status==='failed'&&<><div className="log-err">[08:47:11] FTPConnectionException: timeout 30s</div><div className="log-err">[08:47:11] Job FAILED — retries: 3/3</div></>}</div></div>
      <div className="action-bar">{job.status==='failed'&&<button className="btn btn-primary" style={{fontSize:12}}>재실행</button>}{job.status==='running'&&<button className="btn btn-danger" style={{fontSize:12}}>중지</button>}{(job.status==='completed'||job.status==='queued')&&<button className="btn btn-secondary" style={{fontSize:12}}>수동 실행</button>}<button className="btn btn-secondary" style={{fontSize:12,marginLeft:'auto'}}>로그 다운로드</button></div>
    </div>
  );
};

const BarChart=()=>{
  const ref=useRef(null);const inst=useRef(null);
  useEffect(()=>{
    if(!ref.current)return;
    if(inst.current)inst.current.destroy();
    inst.current=new Chart(ref.current,{type:'bar',data:{labels:['화','수','목','금','토','일','월'],datasets:[{label:'회원',data:[2100,3400,2800,4100,3600,5200,4800],backgroundColor:'rgba(81,139,219,.8)',borderRadius:4,borderSkipped:false},{label:'상품',data:[1200,1500,1100,1800,1400,2200,1900],backgroundColor:'rgba(54,186,184,.8)',borderRadius:4,borderSkipped:false}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{grid:{display:false},ticks:{font:{family:'Pretendard',size:11}}},y:{grid:{color:'#f0eeec'},ticks:{font:{family:'Pretendard',size:11}}}},animation:{duration:600}}});
    return()=>inst.current?.destroy();
  },[]);
  return <div style={{height:160}}><canvas ref={ref}/></div>;
};

const Toast=({msg,visible})=>visible?<div className="toast"><span>✓</span>{msg}</div>:null;

const MainView=({showToast})=>{
  const [selJob,setSelJob]=useState(JOBS[0]);
  const [tab,setTab]=useState('all');
  const [heroCount,setHeroCount]=useState(0);

  /* CountUp animation — setInterval */
  useEffect(()=>{
    const target=68134,step=Math.ceil(target/40);
    const id=setInterval(()=>setHeroCount(c=>{if(c+step>=target){clearInterval(id);return target;}return c+step;}),25);
    return()=>clearInterval(id);
  },[]);

  const vis=(j)=>tab==='all'||tab===j.status;

  return(
    <div className="page-content">
      <div className="page-header"><div><div className="page-title">배치 Job 현황</div><div className="page-sub">마지막 업데이트: 09:23:15 · Production · FTP: ftp.datarise.io</div></div><div className="hdr-actions"><button className="btn btn-secondary">오늘</button><button className="btn btn-primary" onClick={()=>showToast('전체 Job 실행 요청됨')}>전체 실행</button></div></div>

      <div className="hero-strip">
        <div><div className="hero-lbl">오늘 처리 건수</div><div className="hero-val">{heroCount.toLocaleString()}</div><div className="hero-sub">▲ +12% 어제 대비</div></div>
        <div className="hero-div"/>
        <div><div className="hero-lbl">FTP 전송 성공률</div><div className="hero-val">99.3%</div><div className="hero-sub">주문 Job 제외 기준</div></div>
        <div className="hero-div"/>
        <div><div className="hero-lbl">실행 중 / 전체</div><div className="hero-val">1/6</div><div className="hero-sub">회원 FTP 동기화</div></div>
      </div>

      <div className="stat-row">

          <div style={{display:'flex',gap:16,marginBottom:8,fontSize:12}}><span><span style={{color:'var(--tm)'}}>이벤트:</span> <code>{t.event}</code></span><span><span style={{color:'var(--tm)'}}>셀렉터:</span> <code>{t.sel}</code></span>{t.cnt!=='–'&&<span><span style={{color:'var(--tm)'}}>수신:</span> <strong style={{color:'var(--primary)'}}>{t.cnt}</strong></span>}</div>
          <div className="api-code" style={{fontSize:11}}><span style={{color:'#86efac'}}>{`// ${t.page}`}</span><br/>{`document.querySelectorAll('[data-${t.sel}]').forEach(el => {`}<br/>{"  new IntersectionObserver(([e]) => {"}<br/>{`    if(e.isIntersecting) dataRise.track('${t.event}',{id:el.dataset.id});`}<br/>{"  }).observe(el);"}<br/>{'});'}<button className="copy-btn">복사</button></div>
        </div>
      ))}
    </div>
  );
};

const NAVS=[
  {sec:'CRM 연동',items:[{id:'main',lbl:'배치 Job 현황',ico:'lucide-activity',badge:null},{id:'sync-status',lbl:'동기화 현황',ico:'lucide-refresh-cw',badge:null},{id:'error-log',lbl:'오류 로그',ico:'lucide-alert-triangle',badge:'1'}]},
  {sec:'API 연동',items:[{id:'coupon-api',lbl:'쿠폰 API 관리',ico:'lucide-tag',badge:null},{id:'field-map',lbl:'필드 매핑',ico:'lucide-arrow-right-left',badge:null}]},
  {sec:'트래킹',items:[{id:'tracking-setup',lbl:'프론트엔드 트래킹 설정',ico:'lucide-code-2',badge:null}]},
  {sec:'설정',items:[{id:'schedule',lbl:'스케줄 관리',ico:'lucide-calendar',badge:null},{id:'settings',lbl:'시스템 설정',ico:'lucide-settings',badge:null}]},
];

function App(){
  const [view,setView]=useState('main');
  const [toast,setToast]=useState({v:false,m:''});
  const showToast=m=>{setToast({v:true,m});setTimeout(()=>setToast({v:false,m:''}),2500);};
  const lbl={main:'배치 Job 현황','sync-status':'동기화 현황','coupon-api':'쿠폰 API 관리','tracking-setup':'프론트엔드 트래킹 설정'}[view]||view;
  const renderView=()=>{switch(view){case 'main':return <MainView showToast={showToast}/>;case 'sync-status':return <SyncView/>;case 'coupon-api':return <CouponView showToast={showToast}/>;case 'tracking-setup':return <TrackingView showToast={showToast}/>;default:return <MainView showToast={showToast}/>;}}

  return(
    <div className="app" data-archetype="stripe-multipane">
      <aside className="sidebar">
        <div className="sb-brand"><div className="sb-icon">CRM</div><div className="sb-name">데이터라이즈 어드민</div><div className="sb-env">PROD</div></div>
        {NAVS.map(g=>(
          <div className="sb-sec" key={g.sec}>
            <div className="sb-lbl">{g.sec}</div>
            {g.items.map(it=>(
              <button key={it.id} className={`sb-link ${view===it.id?'active':''}`} onClick={()=>setView(it.id)}>
                <i className={it.ico} style={{fontSize:14}}/>{it.lbl}{it.badge&&<span className="sb-badge">{it.badge}</span>}
              </button>
            ))}
          </div>
        ))}
        <div className="sb-foot"><div className="u-row"><div className="u-av">김</div><div><div style={{fontSize:12,fontWeight:600}}>김운영 매니저</div><div style={{fontSize:11,color:'var(--tm)'}}>CRM 운영팀</div></div></div></div>
      </aside>
      <div className="main">
        <div className="topbar">
          <div className="breadcrumb"><span>데이터라이즈 어드민</span><span style={{margin:'0 4px'}}>›</span><span>{lbl}</span></div>
          <div style={{flex:1}}/>
          <div className="topbar-search"><i className="lucide-search" style={{fontSize:13}}/><span>빠른 검색…</span><span style={{marginLeft:'auto',fontSize:11,background:'var(--border)',padding:'1px 5px',borderRadius:3}}>⌘K</span></div>
          <button className="icon-btn"><i className="lucide-bell" style={{fontSize:15}}/><span className="notif-dot"/></button>
          <div className="u-av">김</div>
        </div>
        {renderView()}
      </div>
      <Toast msg={toast.m} visible={toast.v}/>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
