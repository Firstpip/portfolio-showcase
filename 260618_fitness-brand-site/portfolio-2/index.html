<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>피트니스 커뮤니티 플랫폼 — 구현 데모</title>
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" rel="stylesheet"/>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone@7.26.9/babel.min.js"></script>

<style>
:root {
  --parchment: #fdfcfc;
  --sand: #f5f3f1;
  --ash: #e5e5e5;
  --ink: #000000;
  --void-violet: #0447ff;
  --driftwood: #777169;
  --fog: #a59f97;
  --emerald: #14BE7E;
  --emerald-dark: #0fa366;
  --emerald-light: #e6faf3;
  --radius: 20px;
  --radius-sm: 12px;
  --radius-pill: 9999px;
  --shadow: 0 1px 3px rgba(0,0,0,.05), 0 2px 8px rgba(0,0,0,.04);
  font-family: 'Pretendard', -apple-system, sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--parchment);color:var(--ink);min-height:100vh;overflow-x:hidden}

/* ── KEYFRAMES ── */
@keyframes slideIn {
  from{opacity:0;transform:translateX(-10px)}
  to{opacity:1;transform:translateX(0)}
}
@keyframes heartbeat {
  0%,100%{transform:scale(1)}
  30%{transform:scale(1.3)}
  60%{transform:scale(1)}
}
@keyframes shimmerWarm {
  0%{background-position:-600px 0}
  100%{background-position:600px 0}
}
@keyframes growBar {
  from{transform:scaleX(0)}
  to{transform:scaleX(1)}
}
@keyframes fadeIn {
  from{opacity:0}
  to{opacity:1}
}
@keyframes bounceIn {
  0%{transform:scale(0.85);opacity:0}
  70%{transform:scale(1.05)}
  100%{transform:scale(1);opacity:1}
}
@keyframes drawCircle {
  from{stroke-dashoffset:283}
  to{stroke-dashoffset:70}
}

/* ── LAYOUT ── */
.topbar{
  position:sticky;top:0;z-index:100;
  background:rgba(253,252,252,.96);backdrop-filter:blur(12px);
  border-bottom:1px solid var(--ash);
  height:56px;display:flex;align-items:center;padding:0 24px;gap:16px;
}
.topbar-logo{font-size:16px;font-weight:700;letter-spacing:-0.02em;color:var(--ink);display:flex;align-items:center;gap:6px;flex-shrink:0}
.topbar-logo-mark{width:28px;height:28px;border-radius:8px;background:linear-gradient(135deg,var(--emerald),var(--void-violet));display:flex;align-items:center;justify-content:center;color:#fff;font-size:14px;font-weight:800}
.topbar-tabs{display:flex;gap:2px;flex:1;justify-content:center}
.topbar-tab{padding:6px 16px;border-radius:var(--radius-pill);font-size:13px;font-weight:500;color:var(--driftwood);cursor:pointer;border:none;background:none;transition:color .2s,background .2s;display:flex;align-items:center;gap:6px}
.topbar-tab:hover{color:var(--ink);background:var(--sand)}
.topbar-tab.active{color:var(--ink);background:var(--sand);font-weight:600}
.topbar-actions{display:flex;gap:8px;align-items:center;flex-shrink:0}
.topbar-avatar{width:32px;height:32px;border-radius:50%;background:var(--emerald-light);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:var(--emerald-dark);cursor:pointer}
.topbar-search{display:flex;align-items:center;gap:8px;padding:7px 14px;border-radius:var(--radius-pill);background:var(--sand);border:1px solid var(--ash);font-size:13px;color:var(--driftwood);cursor:pointer;white-space:nowrap}

/* LAYOUT CONTAINER */
.layout{display:flex;justify-content:center;gap:24px;padding:24px 16px;max-width:1100px;margin:0 auto;width:100%}
.feed{max-width:600px;width:100%;flex-shrink:0}
.right-rail{width:280px;flex-shrink:0}

/* COMPOSER / FILTER */
.composer{position:sticky;top:56px;z-index:50;background:var(--parchment);padding-bottom:12px;margin-bottom:16px}
.composer-inner{background:var(--sand);border:1px solid var(--ash);border-radius:var(--radius);padding:16px}
.composer-top{display:flex;gap:12px;align-items:center;margin-bottom:12px}
.composer-avatar{width:36px;height:36px;border-radius:50%;background:var(--emerald-light);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:var(--emerald-dark);flex-shrink:0}
.composer-input{flex:1;padding:10px 14px;border-radius:var(--radius-pill);border:1px solid var(--ash);background:var(--parchment);font-size:14px;font-family:inherit;color:var(--driftwood);outline:none;cursor:pointer}
.composer-filters{display:flex;gap:8px;flex-wrap:wrap}
.filter-chip{padding:6px 14px;border-radius:var(--radius-pill);font-size:12px;font-weight:600;border:1.5px solid var(--ash);color:var(--driftwood);cursor:pointer;transition:all .2s;background:transparent}
.filter-chip.active,.filter-chip:hover{border-color:var(--emerald);color:var(--emerald-dark);background:var(--emerald-light)}

/* POST CARD */
.post{background:var(--sand);border:1px solid var(--ash);border-radius:var(--radius);margin-bottom:16px;overflow:hidden;animation:slideIn .4s ease forwards}
.post-head{display:flex;align-items:center;gap:12px;padding:16px 16px 12px}
.author{display:flex;flex-direction:column}
.post-author-name{font-size:14px;font-weight:700;color:var(--ink)}
.post-meta{display:flex;align-items:center;gap:6px;margin-top:2px}
.post-branch-tag{padding:2px 8px;border-radius:var(--radius-pill);background:var(--emerald-light);color:var(--emerald-dark);font-size:11px;font-weight:600}
.post-body{padding:0 16px 12px}
.post-text{font-size:14px;line-height:1.65;color:var(--ink);margin-bottom:12px;font-weight:300}
.post-images{display:grid;grid-template-columns:1fr 1fr;gap:8px;border-radius:var(--radius-sm);overflow:hidden}
.post-img{height:160px;border-radius:var(--radius-sm);overflow:hidden;position:relative;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;color:rgba(255,255,255,.9)}
.post-img-before{background:linear-gradient(135deg,#9ca3b0,#7c8292);letter-spacing:.04em}
.post-img-after{background:linear-gradient(135deg,var(--emerald-dark),#0a7a50)}
.post-img-label{position:absolute;top:8px;left:8px;padding:3px 8px;border-radius:var(--radius-pill);background:rgba(0,0,0,.35);font-size:10px;font-weight:700;color:#fff;letter-spacing:.04em}
.post-result{margin-top:10px;display:flex;gap:8px;flex-wrap:wrap}
.post-result-badge{padding:4px 12px;border-radius:var(--radius-pill);background:var(--parchment);border:1px solid var(--ash);font-size:12px;color:var(--driftwood)}
.post-result-badge.highlight{background:var(--emerald-light);border-color:rgba(20,190,126,.25);color:var(--emerald-dark);font-weight:600}
.post-actions{padding:12px 16px;border-top:1px solid var(--ash);display:flex;gap:8px}
.like,.comment,.share{display:flex;align-items:center;gap:6px;padding:7px 14px;border-radius:var(--radius-pill);font-size:13px;font-weight:500;border:1px solid var(--ash);background:var(--parchment);color:var(--driftwood);cursor:pointer;transition:all .2s}
.like:hover{border-color:rgba(20,190,126,.4);color:var(--emerald-dark);background:var(--emerald-light)}
.comment:hover,.share:hover{border-color:var(--ash);color:var(--ink);background:var(--sand)}
.like.liked{border-color:rgba(20,190,126,.4);color:var(--emerald-dark);background:var(--emerald-light)}
.like.liked i{animation:heartbeat .4s ease}

/* RIGHT RAIL WIDGETS */
.rail-widget{background:var(--sand);border:1px solid var(--ash);border-radius:var(--radius);padding:20px;margin-bottom:16px}
.rail-widget-title{font-size:13px;font-weight:700;color:var(--ink);margin-bottom:16px;display:flex;align-items:center;gap:6px}
.rail-stat{display:flex;flex-direction:column;gap:4px;margin-bottom:12px}
.rail-stat-label{font-size:12px;color:var(--driftwood);font-weight:300}
.rail-stat-bar{height:4px;background:var(--ash);border-radius:var(--radius-pill);overflow:hidden;margin-top:4px}
.rail-stat-fill{height:100%;background:var(--emerald);border-radius:var(--radius-pill);transform-origin:left;animation:growBar .8s ease forwards}
.rail-stat-value{font-size:20px;font-weight:700;color:var(--ink);letter-spacing:-0.03em}
.rail-trending-item{display:flex;gap:10px;align-items:center;padding:8px 0;border-bottom:1px solid var(--ash);cursor:pointer}
.rail-trending-item:last-child{border-bottom:none}
.rail-trending-rank{width:20px;font-size:12px;font-weight:700;color:var(--emerald)}
.rail-trending-name{font-size:13px;font-weight:500;color:var(--ink)}
.rail-trending-count{font-size:11px;color:var(--driftwood);margin-top:1px}

/* PROGRAMS VIEW */
.programs-view{animation:fadeIn .4s ease}
.programs-header{margin-bottom:24px}
.programs-cats{display:flex;gap:8px;flex-wrap:wrap;margin-top:16px}
.program-cat-btn{padding:8px 18px;border-radius:var(--radius-pill);font-size:13px;font-weight:600;border:1.5px solid var(--ash);color:var(--driftwood);cursor:pointer;transition:all .2s;background:transparent}
.program-cat-btn.active,.program-cat-btn:hover{border-color:var(--emerald);color:var(--emerald-dark);background:var(--emerald-light)}
.programs-list{display:flex;flex-direction:column;gap:12px}
.program-item{background:var(--sand);border:1px solid var(--ash);border-radius:var(--radius);padding:20px;display:flex;gap:16px;align-items:flex-start;cursor:pointer;transition:box-shadow .2s}
.program-item:hover{box-shadow:var(--shadow)}
.program-item-icon{width:48px;height:48px;border-radius:14px;background:var(--emerald-light);display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}
.program-item-body{flex:1}
.program-item-cat{font-size:11px;font-weight:700;color:var(--emerald-dark);text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px}
.program-item-name{font-size:16px;font-weight:700;margin-bottom:6px;letter-spacing:-0.01em}
.program-item-desc{font-size:13px;color:var(--driftwood);line-height:1.65;font-weight:300}
.program-item-footer{display:flex;align-items:center;justify-content:space-between;margin-top:12px}
.program-item-trainer{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--driftwood)}
.program-item-price{font-size:16px;font-weight:700;color:var(--emerald-dark)}
.trainer-avatar{width:22px;height:22px;border-radius:50%;background:var(--emerald);display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;color:#fff}

/* ADMIN VIEW */
.admin-view{animation:fadeIn .4s ease}
.admin-tabs{display:flex;gap:4px;margin-bottom:24px;background:var(--sand);padding:4px;border-radius:var(--radius);border:1px solid var(--ash)}
.admin-tab{flex:1;padding:9px;border-radius:12px;font-size:13px;font-weight:600;border:none;cursor:pointer;transition:all .2s;background:transparent;color:var(--driftwood)}
.admin-tab.active{background:var(--parchment);color:var(--ink);box-shadow:0 1px 4px rgba(0,0,0,.06)}
.admin-table-wrap{background:var(--sand);border:1px solid var(--ash);border-radius:var(--radius);overflow:hidden}
.admin-table-header{display:grid;grid-template-columns:1fr 80px 80px 100px;gap:16px;padding:12px 20px;background:var(--parchment);border-bottom:1px solid var(--ash)}
.admin-table-hcell{font-size:12px;font-weight:700;color:var(--driftwood);text-transform:uppercase;letter-spacing:.04em}
.admin-table-row{display:grid;grid-template-columns:1fr 80px 80px 100px;gap:16px;padding:14px 20px;border-bottom:1px solid var(--ash);align-items:center;cursor:pointer;transition:background .2s}
.admin-table-row:hover{background:var(--parchment)}
.admin-table-row:last-child{border-bottom:none}
.admin-row-name{font-size:14px;font-weight:600;color:var(--ink)}
.admin-row-sub{font-size:12px;color:var(--driftwood);margin-top:2px}
.admin-status{padding:4px 12px;border-radius:var(--radius-pill);font-size:11px;font-weight:700}
.status-active{background:var(--emerald-light);color:var(--emerald-dark)}
.status-draft{background:#fff8e6;color:#b45309}
.admin-edit-btn{padding:6px 14px;border-radius:var(--radius-pill);border:1px solid var(--ash);background:var(--parchment);font-size:12px;font-weight:600;color:var(--driftwood);cursor:pointer;transition:all .2s}
.admin-edit-btn:hover{border-color:var(--emerald);color:var(--emerald-dark)}
.admin-add-btn{padding:10px 20px;border-radius:var(--radius-pill);background:var(--emerald);color:#fff;font-size:13px;font-weight:700;border:none;cursor:pointer;display:flex;align-items:center;gap:6px;transition:background .2s}
.admin-add-btn:hover{background:var(--emerald-dark)}

/* CONSULTATIONS VIEW */
.consult-view{animation:fadeIn .4s ease}
.consult-filters{display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap}
.consult-filter-select{padding:8px 14px;border-radius:var(--radius-pill);border:1px solid var(--ash);background:var(--parchment);font-size:13px;font-family:inherit;color:var(--driftwood);outline:none;cursor:pointer}
.consult-table-wrap{background:var(--sand);border:1px solid var(--ash);border-radius:var(--radius);overflow:hidden}
.consult-row{padding:16px 20px;border-bottom:1px solid var(--ash);display:flex;gap:16px;align-items:center;cursor:pointer;transition:background .2s}
.consult-row:hover{background:var(--parchment)}
.consult-row:last-child{border-bottom:none}
.consult-name{font-size:14px;font-weight:700;color:var(--ink);min-width:80px}
.consult-phone{font-size:13px;color:var(--driftwood);min-width:120px}
.consult-branch{min-width:80px}
.consult-date{font-size:12px;color:var(--fog);min-width:100px;flex:1}
.consult-status-badge{padding:5px 12px;border-radius:var(--radius-pill);font-size:11px;font-weight:700}
.s-접수{background:#eff6ff;color:#1d4ed8}
.s-배정{background:#fff8e6;color:#b45309}
.s-완료{background:var(--emerald-light);color:var(--emerald-dark)}
.consult-action-btn{padding:6px 14px;border-radius:var(--radius-pill);border:1px solid var(--ash);background:var(--parchment);font-size:12px;font-weight:600;color:var(--driftwood);cursor:pointer;white-space:nowrap;transition:all .2s}
.consult-action-btn:hover{border-color:var(--emerald);color:var(--emerald-dark)}
.consult-summary{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:20px}
.consult-stat-card{background:var(--sand);border:1px solid var(--ash);border-radius:var(--radius);padding:16px;text-align:center}
.consult-stat-num{font-size:36px;font-weight:800;color:var(--ink);letter-spacing:-0.03em;animation:bounceIn .5s ease forwards}
.consult-stat-label{font-size:12px;color:var(--driftwood);margin-top:4px;font-weight:300}

/* PROGRESS RING */
.progress-ring{display:flex;flex-direction:column;align-items:center;gap:8px}
.progress-ring svg circle.track{stroke:#e5e5e5;fill:none}
.progress-ring svg circle.fill{stroke:var(--emerald);fill:none;stroke-dasharray:283;stroke-dashoffset:283;animation:drawCircle 1.2s ease forwards;stroke-linecap:round;transition:stroke-dashoffset .4s}

@media(max-width:768px){
  .topbar{padding:0 12px}
  .topbar-tabs{gap:0}
  .topbar-tab{padding:6px 10px;font-size:12px}
  .topbar-search{display:none}
  .layout{flex-direction:column;padding:12px}
  .right-rail{width:100%;order:-1}
  .feed{max-width:100%}
  .programs-list{}
  .program-item{flex-direction:column}
  .admin-table-header,.admin-table-row{grid-template-columns:1fr 80px 90px}
  .admin-table-hcell:last-child,.admin-table-row>*:last-child{display:none}
  .consult-filters{gap:6px}
  .consult-phone{display:none}
  .consult-date{display:none}
}
</style>
</head>

function Avatar({name, size=36}) {
  const colors = ['#14BE7E','#0ea5e9','#8b5cf6','#f59e0b','#ef4444','#ec4899'];
  const idx = name.charCodeAt(0) % colors.length;
  return (
    <div style={{
      width:size,height:size,borderRadius:'50%',
      background:`${colors[idx]}22`,
      color:colors[idx],
      display:'flex',alignItems:'center',justifyContent:'center',
      fontSize:size*0.4,fontWeight:700,flexShrink:0
    }}>{name[0]}</div>
  );
}

function FeedView({filter, setFilter}) {
  const [posts, setPosts] = useState(POSTS);
  const [toast, setToast] = useState(null);

  const filtered = filter==='전체' ? posts : posts.filter(p=>p.branch===filter);

  const showToast = (msg) => { setToast(msg); setTimeout(()=>setToast(null),3000); };
  const toggleLike = (id) => {
    const p = posts.find(p=>p.id===id);
    setPosts(ps => ps.map(q=>q.id===id ? {...q, likes:q.liked?q.likes-1:q.likes+1, liked:!q.liked} : q));
    if (!p?.liked) showToast('응원해요! 💚');
  };

  return (
    <div style={{display:'flex',justifyContent:'center',gap:24,maxWidth:1100,margin:'0 auto',padding:'0 0 48px',width:'100%'}}>
      {/* Feed Column */}
      <div className="feed">

              <Avatar name="나" size={36}/>
              <input className="composer-input" placeholder="나의 운동 후기를 공유해보세요 💪" readOnly/>
            </div>
            <div className="composer-filters">
              {filters.map(f=>(
                <button key={f} className={`filter-chip${filter===f?' active':''}`} onClick={()=>setFilter(f)}>{f}</button>
              ))}
            </div>
          </div>
        </div>
        {filtered.map((post,idx) => (
          <article key={post.id} className="post" style={{animationDelay:`${idx*0.08}s`,borderRadius:8}}>
            <header className="post-head">
              <Avatar name={post.name} size={40}/>
              <div className="author">
                <span className="post-author-name">{post.name}</span>
                <div className="post-meta">
                  <span className="post-branch-tag">{post.branch}</span>
                  <time style={{fontSize:11,color:'var(--fog)'}}>{post.time}</time>
                  <span style={{fontSize:11,color:'var(--driftwood)'}}>#{post.program}</span>
                </div>
              </div>
              <button style={{marginLeft:'auto',padding:'6px 14px',borderRadius:'var(--radius-pill)',border:'1px solid var(--ash)',background:'transparent',fontSize:12,fontWeight:600,color:'var(--driftwood)',cursor:'pointer'}}>팔로우</button>
            </header>
            <div className="post-body">
              <p className="post-text">{post.text}</p>
              {post.before && (
                <div className="post-images">
                  <div className="post-img post-img-before">
                    <span className="post-img-label">BEFORE</span>
                    3개월 전
                  </div>
                  <div className="post-img post-img-after">
                    <span className="post-img-label">AFTER</span>
                    현재
                  </div>
                </div>
              )}
              <div className="post-result">
                {post.results.map((r,i)=>(
                  <span key={i} className={`post-result-badge${i===0?' highlight':''}`}>{r}</span>
                ))}
              </div>
            </div>
            <footer className="post-actions">
              <button className={`like${post.liked?' liked':''}`} onClick={()=>toggleLike(post.id)}>
                <i className={`ph-heart${post.liked?'-fill':''}`} style={{fontSize:15}}/>
                {post.likes}
              </button>
              <button className="comment">
                <i className="ph-chat-circle" style={{fontSize:15}}/>
                {post.comments}
              </button>
              <button className="share">
                <i className="ph-share-network" style={{fontSize:15}}/>
                공유
              </button>
            </footer>
          </article>
        ))}

          {PROGRAMS.slice(0,2).map(p=>(

              </div>
            </div>
          ))}
        </div>
      </aside>
    </div>
  );
}

function ConsultationsView() {

    <div className="consult-view" style={{maxWidth:840,margin:'0 auto',padding:'0 0 48px',width:'100%'}}>
