<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>화상영어 튜터 예약 서비스 — 맞춤 구현 데모</title>
<link rel="preconnect" href="https://cdn.jsdelivr.net">
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.6/dist/web/variable/pretendardvariable.css" rel="stylesheet">
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone@7.26.9/babel.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --primary:#006bff;--accent:#0b3558;
  --bg:#f8f9fb;--surface:#fff;--border:#d4e0ed;
  --text:#0a0a0a;--muted:#a6bbd1;--slate:#476788;
  --r:8px;--nav-h:64px;
}
html,body{height:100%;background:var(--bg);font-family:'Pretendard Variable',Pretendard,sans-serif;color:var(--text);font-size:16px;line-height:1.6}
#root{min-height:100vh}
a{color:inherit;text-decoration:none}
button{cursor:pointer;font-family:inherit;border:none;outline:none}
input,select{font-family:inherit}

/* ── Animations ──────────────────────────────── */
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:none}}
@keyframes slideInLeft{from{opacity:0;transform:translateX(-16px)}to{opacity:1;transform:none}}
@keyframes slideInRight{from{opacity:0;transform:translateX(16px)}to{opacity:1;transform:none}}
@keyframes blobFloat1{0%,100%{transform:translate(0,0) scale(1)}33%{transform:translate(30px,-20px) scale(1.05)}66%{transform:translate(-20px,30px) scale(0.97)}}
@keyframes blobFloat2{0%,100%{transform:translate(0,0) rotate(0deg)}50%{transform:translate(-25px,15px) rotate(12deg)}}
@keyframes blobFloat3{0%,100%{transform:translate(0,0) scale(1)}40%{transform:translate(20px,-30px) scale(1.08)}80%{transform:translate(-10px,10px) scale(0.94)}}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(0,107,255,0.3)}50%{box-shadow:0 0 0 8px rgba(0,107,255,0)}}
@keyframes shimmer{0%{background-position:200% center}100%{background-position:-200% center}}
@keyframes calendarPop{0%{transform:scale(0.85);opacity:0}100%{transform:scale(1);opacity:1}}
@keyframes slotAppear{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
@keyframes underlineGrow{from{width:0}to{width:100%}}
@keyframes cardLift{from{transform:translateY(0);box-shadow:0 1px 4px rgba(11,53,88,0.08)}to{transform:translateY(-4px);box-shadow:0 8px 24px rgba(11,53,88,0.14)}}
@keyframes screenFade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
@keyframes pingRing{0%{transform:scale(1);opacity:1}75%,100%{transform:scale(2.2);opacity:0}}
@keyframes progressFill{from{width:0}to{width:var(--w,60%)}}

/* ── Topnav ──────────────────────────────────── */
.topnav{position:fixed;top:0;left:0;right:0;height:var(--nav-h);background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 32px;gap:0;z-index:100}
.topnav-logo{font-size:20px;font-weight:700;color:var(--accent);margin-right:40px;letter-spacing:-0.5px;white-space:nowrap}
.topnav-tabs{display:flex;gap:4px;flex:1}
.tab-btn{padding:8px 16px;border-radius:6px;font-size:14px;font-weight:500;color:var(--slate);background:transparent;transition:color .2s,background .2s;position:relative}
.tab-btn:hover{background:#eef4ff;color:var(--primary)}
.tab-btn.active{color:var(--primary);background:#eef4ff;font-weight:600}
.tab-btn.active::after{content:'';position:absolute;bottom:-1px;left:12px;right:12px;height:2px;background:var(--primary);border-radius:2px}
.nav-login{display:flex;align-items:center;gap:8px;margin-left:auto}
.btn-login{padding:8px 20px;border-radius:var(--r);font-size:14px;font-weight:600;color:var(--accent);border:1.5px solid var(--border);background:transparent;transition:all .2s}
.btn-login:hover{border-color:var(--primary);color:var(--primary)}
.btn-primary{padding:10px 24px;border-radius:var(--r);font-size:14px;font-weight:600;color:#fff;background:var(--primary);border:none;transition:all .2s;display:inline-flex;align-items:center;gap:8px}
.btn-primary:hover{background:#0057d8;transform:translateY(-1px);box-shadow:0 4px 16px rgba(0,107,255,.3)}
.btn-primary:active{transform:scale(0.98)}

/* ── Page shell ──────────────────────────────── */
.page{padding-top:var(--nav-h);min-height:100vh;animation:screenFade .3s ease}

/* ── Landing screen ──────────────────────────── */
.hero-section{position:relative;overflow:hidden;padding:80px 32px 60px;max-width:1200px;margin:0 auto;display:grid;grid-template-columns:1fr 1fr;gap:60px;align-items:center}
.hero-blobs{position:absolute;inset:0;pointer-events:none;overflow:hidden;z-index:0}
.blob{position:absolute;border-radius:50%;filter:blur(60px);opacity:0.25}
.blob-1{width:420px;height:420px;background:radial-gradient(#e55cff,#8247f5);top:-80px;right:-60px;animation:blobFloat1 12s ease-in-out infinite}
.blob-2{width:280px;height:280px;background:radial-gradient(#ffa600,#e55cff);bottom:-40px;right:200px;animation:blobFloat2 9s ease-in-out infinite}
.blob-3{width:200px;height:200px;background:radial-gradient(#0099ff,#8247f5);top:50px;right:350px;animation:blobFloat3 14s ease-in-out infinite}
.hero-left{position:relative;z-index:1}
.hero-badge{display:inline-flex;align-items:center;gap:6px;padding:6px 14px;background:#eef4ff;border:1px solid #c5d8ff;border-radius:100px;font-size:13px;font-weight:600;color:var(--primary);margin-bottom:24px}
.hero-badge-dot{width:6px;height:6px;border-radius:50%;background:var(--primary);animation:pulse 2s infinite}
.hero-title{font-size:52px;font-weight:700;color:var(--accent);line-height:1.1;letter-spacing:-1.5px;margin-bottom:20px}
.hero-title span{color:var(--primary)}
.hero-desc{font-size:18px;color:var(--slate);line-height:1.7;margin-bottom:36px}
.hero-ctas{display:flex;gap:12px;align-items:center}
.hero-note{font-size:13px;color:var(--muted)}
.hero-stats{display:flex;gap:28px;margin-top:36px;padding-top:28px;border-top:1px solid var(--border)}
.hero-stat{text-align:left}
.hero-stat-num{font-size:28px;font-weight:700;color:var(--accent);letter-spacing:-0.5px}
.hero-stat-label{font-size:13px;color:var(--muted);margin-top:2px}

.hero-right{position:relative;z-index:1}
.floating-card{background:var(--surface);border-radius:16px;box-shadow:0 8px 40px rgba(11,53,88,0.12),0 2px 8px rgba(11,53,88,0.06);padding:24px;animation:slideInRight .5s ease}
.fc-header{display:flex;align-items:center;gap:10px;margin-bottom:16px}
.fc-avatar{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:700;color:#fff}
.fc-info{flex:1}
.fc-name{font-weight:600;font-size:15px;color:var(--accent)}
.fc-role{font-size:12px;color:var(--muted)}
.fc-rating{display:flex;align-items:center;gap:2px;margin-left:auto}
.fc-star{color:#ffa600;font-size:14px}
.fc-cal-label{font-size:12px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:8px}
.fc-month{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:12px}
.fc-day{font-size:11px;text-align:center;color:var(--muted);padding:2px}
.fc-cell{width:28px;height:28px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:12px;margin:0 auto;cursor:pointer;transition:all .15s}
.fc-cell.avail{background:#eef4ff;color:var(--primary);font-weight:600}
.fc-cell.avail:hover{background:var(--primary);color:#fff}
.fc-cell.selected{background:var(--primary);color:#fff;font-weight:700}
.fc-cell.past{color:var(--border);cursor:default}
.fc-slots{display:flex;gap:6px;flex-wrap:wrap}
.fc-slot{padding:5px 10px;border-radius:6px;border:1px solid var(--border);font-size:12px;font-weight:600;color:var(--slate);cursor:pointer;transition:all .15s}
.fc-slot.sel{background:var(--primary);border-color:var(--primary);color:#fff}
.fc-slot:hover:not(.sel){border-color:var(--primary);color:var(--primary)}
.fc-book{margin-top:12px;width:100%;padding:12px;border-radius:var(--r);background:var(--primary);color:#fff;font-weight:700;font-size:14px;border:none;cursor:pointer;transition:all .2s}
.fc-book:hover{background:#0057d8;transform:translateY(-1px)}
.fc-tz{display:flex;align-items:center;gap:6px;margin-top:8px;font-size:12px;color:var(--muted)}
.tz-dot{width:6px;height:6px;border-radius:50%;background:#22c55e}

/* ── Feature section ─────────────────────────── */
.features-section{padding:60px 32px;max-width:1200px;margin:0 auto}
.section-label{font-size:13px;font-weight:600;color:var(--primary);text-transform:uppercase;letter-spacing:1px;margin-bottom:12px}
.section-title{font-size:38px;font-weight:700;color:var(--accent);letter-spacing:-1px;margin-bottom:16px;line-height:1.2}
.section-desc{font-size:18px;color:var(--slate);max-width:560px}
.features-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:24px;margin-top:40px}
.feat-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:28px;transition:all .25s}
.feat-card:hover{transform:translateY(-4px);box-shadow:0 12px 32px rgba(11,53,88,0.1);border-color:#c5d8ff}
.feat-icon{width:44px;height:44px;border-radius:10px;background:#eef4ff;display:flex;align-items:center;justify-content:center;margin-bottom:16px}
.feat-title{font-size:17px;font-weight:700;color:var(--accent);margin-bottom:8px}
.feat-desc{font-size:14px;color:var(--slate);line-height:1.6}

/* ── Tutor listing (main screen) ─────────────── */
.main-screen{display:grid;grid-template-columns:1fr 360px;gap:0;min-height:calc(100vh - var(--nav-h))}
.tutor-list-panel{padding:32px;overflow-y:auto}
.filter-bar{display:flex;gap:10px;align-items:center;margin-bottom:28px;flex-wrap:wrap}
.filter-select{padding:8px 14px;border-radius:var(--r);border:1px solid var(--border);font-size:14px;color:var(--text);background:var(--surface);cursor:pointer}
.filter-tag{padding:6px 14px;border-radius:100px;font-size:13px;border:1px solid var(--border);background:var(--surface);color:var(--slate);cursor:pointer;transition:all .15s;font-weight:500}
.filter-tag.active{background:var(--primary);border-color:var(--primary);color:#fff}
.tutor-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:16px}
.tutor-card{background:var(--surface);border:2px solid var(--border);border-radius:12px;padding:20px;cursor:pointer;transition:all .2s;animation:slideUp .3s ease both;box-shadow:0 2px 8px rgba(11,53,88,0.06)}
.tutor-card:hover{border-color:#c5d8ff;box-shadow:0 6px 20px rgba(11,53,88,0.08)}
.tutor-card.selected{border-color:var(--primary);box-shadow:0 0 0 3px rgba(0,107,255,0.12)}
.tc-top{display:flex;gap:12px;align-items:flex-start;margin-bottom:14px}
.tc-avatar{width:52px;height:52px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:700;color:#fff;flex-shrink:0}
.tc-info{flex:1}
.tc-name{font-size:16px;font-weight:700;color:var(--accent)}
.tc-tag{display:inline-block;font-size:11px;padding:2px 8px;border-radius:100px;background:#eef4ff;color:var(--primary);font-weight:600;margin-top:2px}
.tc-rate{display:flex;align-items:center;gap:4px;margin-top:4px}
.tc-star{color:#ffa600;font-size:12px}
.tc-rate-num{font-size:13px;font-weight:600;color:var(--text)}
.tc-rate-count{font-size:12px;color:var(--muted)}
.tc-badges{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px}
.tc-badge{font-size:11px;padding:3px 8px;border-radius:4px;background:var(--bg);border:1px solid var(--border);color:var(--slate)}
.tc-avail{display:flex;align-items:center;gap:6px;font-size:13px;color:#22c55e;font-weight:500}
.tc-price{font-size:14px;font-weight:700;color:var(--accent);margin-top:8px}
.tc-price span{font-size:12px;font-weight:400;color:var(--muted)}

/* ── Booking sidebar ─────────────────────────── */
.booking-sidebar{background:var(--surface);border-left:1px solid var(--border);padding:28px;position:sticky;top:var(--nav-h);height:calc(100vh - var(--nav-h));overflow-y:auto;animation:slideInRight .3s ease}
.bs-title{font-size:20px;font-weight:700;color:var(--accent);margin-bottom:4px;letter-spacing:-0.5px}
.bs-sub{font-size:13px;color:var(--muted);margin-bottom:20px}
.bs-tutor{display:flex;gap:10px;align-items:center;background:var(--bg);border-radius:10px;padding:14px;margin-bottom:20px}
.bs-avatar{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:700;color:#fff}
.bs-info{flex:1}
.bs-name{font-size:15px;font-weight:700;color:var(--accent)}
.bs-specialty{font-size:12px;color:var(--muted)}
.bs-section{margin-bottom:20px}
.bs-label{font-size:12px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:10px}
.bs-cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-bottom:4px}
.bs-day-hd{font-size:10px;text-align:center;color:var(--muted);padding:2px;font-weight:500}
.bs-cal-cell{width:30px;height:30px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:12px;margin:0 auto;cursor:pointer;transition:all .15s}
.bs-cal-cell.avail{background:#eef4ff;color:var(--primary);font-weight:600}
.bs-cal-cell.avail:hover,.bs-cal-cell.active{background:var(--primary);color:#fff;font-weight:700}
.bs-cal-cell.past{color:var(--border)}
.bs-slots{display:flex;gap:8px;flex-wrap:wrap}
.bs-slot{padding:8px 12px;border-radius:var(--r);border:1.5px solid var(--border);font-size:13px;font-weight:600;color:var(--slate);cursor:pointer;transition:all .15s;animation:slotAppear .2s ease both}
.bs-slot:nth-child(1){animation-delay:.05s}
.bs-slot:nth-child(2){animation-delay:.1s}
.bs-slot:nth-child(3){animation-delay:.15s}
.bs-slot:nth-child(4){animation-delay:.2s}
.bs-slot.sel{background:var(--primary);border-color:var(--primary);color:#fff}
.bs-slot:hover:not(.sel){border-color:var(--primary);color:var(--primary);background:#eef4ff}
.bs-tz-note{font-size:12px;color:var(--muted);margin-top:8px;display:flex;align-items:center;gap:4px;background:#f0fdf4;border-radius:6px;padding:8px 10px;border:1px solid #bbf7d0}
.tz-arrow{color:#22c55e;font-weight:700}
.bs-zoom-note{display:flex;align-items:center;gap:8px;padding:10px 12px;background:var(--bg);border-radius:var(--r);border:1px solid var(--border);font-size:13px;color:var(--slate);margin-bottom:12px}
.btn-confirm{width:100%;padding:14px;border-radius:var(--r);background:var(--primary);color:#fff;font-size:15px;font-weight:700;border:none;cursor:pointer;transition:all .2s;animation:pulse 3s infinite}
.btn-confirm:hover{background:#0057d8;transform:translateY(-2px);box-shadow:0 6px 20px rgba(0,107,255,.35)}

/* ── Reservation screen (calendar-schedule composition) ── */
.reservation-screen{display:grid;grid-template-columns:1fr 340px;gap:0;min-height:calc(100vh - var(--nav-h))}
.calendar-panel{padding:32px;border-right:1px solid var(--border)}
.cal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px}
.cal-month-title{font-size:22px;font-weight:700;color:var(--accent);letter-spacing:-0.5px}
.cal-nav-btn{width:36px;height:36px;border-radius:var(--r);border:1px solid var(--border);background:var(--surface);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:18px;color:var(--slate);transition:all .15s}
.cal-nav-btn:hover{border-color:var(--primary);color:var(--primary)}
.cal-tutors-filter{display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap}
.tutor-filter-pill{display:flex;align-items:center;gap:6px;padding:6px 12px;border-radius:100px;border:1.5px solid var(--border);font-size:12px;font-weight:600;cursor:pointer;transition:all .15s}
.tutor-filter-pill.active{border-color:var(--primary);background:#eef4ff;color:var(--primary)}
.tutor-dot{width:8px;height:8px;border-radius:50%}
.week-grid{display:grid;grid-template-columns:60px repeat(7,1fr);gap:0}
.week-time-col{display:flex;flex-direction:column}
.week-time-cell{height:48px;display:flex;align-items:center;justify-content:flex-end;padding-right:10px;font-size:11px;color:var(--muted);font-weight:500}
.week-day-col{display:flex;flex-direction:column;border-left:1px solid var(--border)}
.week-day-hd{height:40px;display:flex;align-items:center;justify-content:center;flex-direction:column;background:var(--surface);border-bottom:2px solid var(--border);position:sticky;top:calc(var(--nav-h) + 32px);z-index:2}
.week-day-name{font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase}
.week-day-num{font-size:18px;font-weight:700;color:var(--accent)}
.week-day-num.today{width:32px;height:32px;border-radius:50%;background:var(--primary);color:#fff;display:flex;align-items:center;justify-content:center}
.week-cell{height:48px;border-bottom:1px solid #f0f4f8;cursor:pointer;transition:background .15s;position:relative}
.week-cell:hover{background:#f0f6ff}
.cal-event{position:absolute;inset:4px;border-radius:4px;display:flex;align-items:center;padding:0 6px;font-size:11px;font-weight:600;cursor:pointer;transition:all .15s;animation:calendarPop .2s ease}
.cal-event:hover{filter:brightness(0.92);transform:scale(1.01)}
.slot-panel{padding:28px;background:var(--bg)}
.sp-tutor-info{background:var(--surface);border-radius:12px;padding:16px;margin-bottom:20px;border:1px solid var(--border)}
.sp-date{font-size:22px;font-weight:700;color:var(--accent);letter-spacing:-0.5px;margin-bottom:16px}
.sp-tz{display:flex;gap:12px;margin-bottom:16px}
.tz-card{flex:1;padding:10px 12px;border-radius:8px;border:1px solid var(--border);background:var(--surface)}
.tz-country{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;margin-bottom:2px}
.tz-time{font-size:18px;font-weight:700;color:var(--accent)}
.tz-label{font-size:11px;color:var(--muted)}
.sp-slots-list{display:flex;flex-direction:column;gap:8px}
.sp-slot-item{display:flex;align-items:center;justify-content:space-between;padding:12px 14px;border-radius:var(--r);background:var(--surface);border:1.5px solid var(--border);cursor:pointer;transition:all .2s;animation:slotAppear .25s ease both}
.sp-slot-item:hover,.sp-slot-item.active{border-color:var(--primary);background:#eef4ff}
.sp-slot-time{font-size:15px;font-weight:700;color:var(--text)}
.sp-slot-tz{font-size:11px;color:var(--muted)}
.sp-slot-avail{display:flex;align-items:center;gap:4px;font-size:12px;font-weight:600;color:#22c55e}
.sp-book-btn{width:100%;margin-top:16px;padding:14px;border-radius:var(--r);background:var(--primary);color:#fff;font-weight:700;font-size:15px;border:none;cursor:pointer;transition:all .2s}
.sp-book-btn:hover{background:#0057d8}
.sp-zoom-note{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--slate);margin-top:8px;padding:8px 10px;background:var(--surface);border-radius:6px;border:1px solid var(--border)}

/* ── Teacher schedule screen ─────────────────── */
.teacher-schedule-screen{padding:32px;animation:screenFade .3s ease}
.ts-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:28px}
.ts-title{font-size:26px;font-weight:700;color:var(--accent);letter-spacing:-0.5px}
.ts-teacher-info{display:flex;align-items:center;gap:12px}
.ts-av{width:40px;height:40px;border-radius:50%;background:#006bff;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:16px}
.ts-name{font-size:15px;font-weight:700;color:var(--accent)}
.ts-role{font-size:12px;color:var(--muted)}
.ts-stats{display:flex;gap:16px;margin-bottom:28px}
.ts-stat{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:16px 20px;flex:1;text-align:center}
.ts-stat-num{font-size:28px;font-weight:700;color:var(--accent);letter-spacing:-1px}
.ts-stat-label{font-size:12px;color:var(--muted);margin-top:2px}
.ts-week-grid{background:var(--surface);border-radius:12px;border:1px solid var(--border);overflow:hidden}
.ts-week-head{display:grid;grid-template-columns:60px repeat(5,1fr);background:var(--bg)}
.ts-head-cell{padding:12px;text-align:center;font-size:12px;font-weight:600;color:var(--muted);border-right:1px solid var(--border);border-bottom:1px solid var(--border)}
.ts-head-date{font-size:18px;font-weight:700;color:var(--accent);display:block}

/* ── CountUp hook ────────────────────────────── */
const useCountUp = (target, duration=1200) => {
  const [count, setCount] = useState(0);
  useEffect(() => {
    let start = 0;
    const step = target / (duration / 16);
    const run = () => {
      start = Math.min(start + step, target);
      setCount(Math.floor(start));
      if (start < target) requestAnimationFrame(run);
    };
    requestAnimationFrame(run);
  }, [target]);
  return count;
};

/* ── Toast ───────────────────────────────────── */
const useToast = () => {
  const [toast, setToast] = useState(null);
  const showToast = (msg, type='success') => {
    setToast({msg, type});
    setTimeout(() => setToast(null), 2800);
  };
  const Toast = toast ? (
    <div style={{
      position:'fixed',bottom:28,right:28,zIndex:999,
      background:toast.type==='success'?'var(--accent)':'#ef4444',
      color:toast.type==='success'?'#fff':'#fff',
      padding:'12px 20px',borderRadius:'8px',
      boxShadow:'0 8px 24px rgba(0,0,0,0.15)',
      fontSize:14,fontWeight:600,animation:'slideUp .25s ease',
      display:'flex',alignItems:'center',gap:8,
    }}>
      {toast.type==='success'?'✓':'✗'} {toast.msg}
    </div>
  ) : null;
  return {showToast, Toast};
};
