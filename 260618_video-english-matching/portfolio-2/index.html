<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>화상영어 운영 관리 시스템 — 구현 데모</title>
<link rel="preconnect" href="https://cdn.jsdelivr.net">
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.6/dist/web/variable/pretendardvariable.css" rel="stylesheet">
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone@7.26.9/babel.min.js"></script>
<link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/regular/style.css">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f0f7f6; --surface:#fff; --border:#e2e2e2;
  --primary:#17150e; --accent:#cccc25;
  --text:#17150e; --muted:#666;
  --sidebar-w:240px; --topbar-h:60px;
  --r-card:24px; --r-pill:9999px;
  /* Gradient swatches */
  --grad-periwinkle:linear-gradient(135deg,#9fa6ff,#b3bae8);
  --grad-moss:linear-gradient(135deg,#6c8853,#99ab91);
  --grad-slate:linear-gradient(135deg,#6883a1,#97a9b9);
  --grad-sage:linear-gradient(135deg,#9ac196,#aec7b0);
}
html,body{height:100%;background:var(--bg);font-family:'Pretendard Variable',Pretendard,sans-serif;color:var(--text);font-size:16px;line-height:1.5}
#root{display:flex;min-height:100vh}
button{cursor:pointer;font-family:inherit;border:none;outline:none}

/* ── Animations ──────────────────────────────── */
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:none}}
@keyframes slideInLeft{from{opacity:0;transform:translateX(-16px)}to{opacity:1;transform:none}}
@keyframes slideInRight{from{opacity:0;transform:translateX(16px)}to{opacity:1;transform:none}}
@keyframes screenSlide{from{opacity:0;transform:translateX(12px)}to{opacity:1;transform:none}}
@keyframes listItem{from{opacity:0;transform:translateX(-8px)}to{opacity:1;transform:none}}
@keyframes detailReveal{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
@keyframes countUp{from{opacity:0;transform:scale(0.9)}to{opacity:1;transform:scale(1)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.6}}
@keyframes shimmerBar{0%{background-position:200% center}100%{background-position:-200% center}}
@keyframes accentGlow{0%,100%{box-shadow:0 0 0 0 rgba(204,204,37,0.4)}50%{box-shadow:0 0 0 8px rgba(204,204,37,0)}}
@keyframes tagPop{from{transform:scale(0.8);opacity:0}to{transform:scale(1);opacity:1}}
@keyframes heatPulse{0%{transform:scale(1)}50%{transform:scale(1.04)}100%{transform:scale(1)}}
@keyframes progressFill{from{width:0}to{width:var(--w)}}
@keyframes dotBlink{0%,100%{opacity:1}50%{opacity:0.3}}

/* ── Sidebar ─────────────────────────────────── */
.sidebar{width:var(--sidebar-w);min-height:100vh;background:var(--primary);display:flex;flex-direction:column;position:fixed;top:0;left:0;bottom:0;z-index:100;overflow:hidden}
.sidebar-logo{padding:24px 20px 20px;border-bottom:1px solid rgba(255,255,255,0.08)}
.logo-wordmark{font-size:18px;font-weight:700;color:#fff;letter-spacing:-0.5px;line-height:1}
.logo-sub{font-size:11px;color:rgba(255,255,255,0.4);margin-top:3px;text-transform:uppercase;letter-spacing:1px}
.sidebar-nav{flex:1;padding:16px 12px;display:flex;flex-direction:column;gap:2px}
.nav-section-label{font-size:10px;font-weight:700;color:rgba(255,255,255,0.3);text-transform:uppercase;letter-spacing:1.5px;padding:12px 8px 6px}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:12px;font-size:14px;font-weight:500;color:rgba(255,255,255,0.6);cursor:pointer;transition:all .2s;border:none;background:transparent;width:100%;text-align:left}
.nav-item:hover{background:rgba(255,255,255,0.06);color:#fff}
.nav-item.active{background:var(--accent);color:var(--primary);font-weight:700}
.nav-item.active svg{color:var(--primary)}
.sidebar-footer{padding:16px;border-top:1px solid rgba(255,255,255,0.08)}
.admin-pill{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:var(--r-pill);background:rgba(255,255,255,0.06)}
.admin-av{width:28px;height:28px;border-radius:50%;background:var(--accent);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:var(--primary);flex-shrink:0}
.admin-name{font-size:13px;font-weight:600;color:#fff}
.admin-role{font-size:10px;color:rgba(255,255,255,0.4)}

/* ── Main wrap ───────────────────────────────── */
.main-wrap{margin-left:var(--sidebar-w);flex:1;display:flex;flex-direction:column;min-height:100vh}
.topbar{height:var(--topbar-h);background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 28px;gap:12;position:sticky;top:0;z-index:50;justify-content:space-between}
.topbar-title{font-size:16px;font-weight:700;color:var(--text);letter-spacing:-0.3px}
.topbar-right{display:flex;align-items:center;gap:10px}
.btn-pill{padding:8px 18px;border-radius:var(--r-pill);font-size:13px;font-weight:600;cursor:pointer;transition:all .2s;border:none}
.btn-accent{background:var(--accent);color:var(--primary)}
.btn-accent:hover{filter:brightness(1.08);transform:translateY(-1px)}
.btn-outline{background:transparent;border:1.5px solid var(--border);color:var(--muted)}
.btn-outline:hover{border-color:var(--primary);color:var(--primary)}
.notification-badge{width:8px;height:8px;border-radius:50%;background:#ef4444;animation:accentGlow 2s infinite;animation-timing-function:ease-in-out}

/* ── Master-detail layout ────────────────────── */
.master-detail{display:grid;grid-template-columns:320px 1fr;flex:1;min-height:calc(100vh - var(--topbar-h))}
.list-rail{border-right:1px solid var(--border);display:flex;flex-direction:column;background:var(--surface);overflow:hidden}
.rail-header{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;gap:8px;flex-shrink:0}
.rail-title{font-size:15px;font-weight:700;color:var(--text)}
.rail-count{font-size:12px;font-weight:700;padding:2px 8px;border-radius:var(--r-pill);background:var(--bg);color:var(--muted)}
.rail-search{padding:8px 14px 8px 12px;border:1px solid var(--border);border-radius:var(--r-pill);font-size:13px;color:var(--text);background:var(--bg);width:100%;outline:none;transition:border-color .2s}
.rail-search:focus{border-color:var(--accent)}
.rail-search-wrap{padding:10px 16px;border-bottom:1px solid var(--border)}
.rail-list{flex:1;overflow-y:auto;padding:8px}
.rail-item{padding:14px 12px;border-radius:16px;cursor:pointer;transition:all .18s;animation:listItem .25s ease both;border:2px solid transparent}
.rail-item:hover{background:var(--bg)}
.rail-item.active{background:#f6f9e8;border-color:var(--accent)}

.detail-panel{padding:28px;overflow-y:auto;background:var(--bg);animation:screenSlide .3s ease}

/* ── Dashboard specific ──────────────────────── */
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:24px}
.stat-card{border-radius:var(--r-card);padding:20px;position:relative;overflow:hidden;animation:countUp .4s ease both}
.stat-card.periwinkle{background:var(--grad-periwinkle);color:#fff}
.stat-card.moss{background:var(--grad-moss);color:#fff}
.stat-card.slate{background:var(--grad-slate);color:#fff}
.stat-card.sage{background:var(--grad-sage);color:#fff}
.sc-num{font-size:48px;font-weight:700;letter-spacing:-2px;line-height:1;margin-bottom:4px}
.sc-label{font-size:13px;opacity:.85;font-weight:500}
.sc-change{font-size:12px;opacity:.7;margin-top:6px;font-weight:600}
.sc-deco{position:absolute;right:-16px;bottom:-16px;width:80px;height:80px;border-radius:50%;background:rgba(255,255,255,0.12)}

.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.section-title{font-size:18px;font-weight:700;color:var(--text);letter-spacing:-0.5px}

/* ── Booking status chips ─────────────────────── */
.chip{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;border-radius:var(--r-pill);font-size:12px;font-weight:700}
.chip-confirmed{background:#dcfce7;color:#166534}
.chip-pending{background:#fef9c3;color:#854d0e}
.chip-cancelled{background:#fee2e2;color:#991b1b}
.chip-completed{background:var(--bg);color:var(--muted);border:1px solid var(--border)}

/* ── List items ──────────────────────────────── */
.booking-list-item{display:flex;align-items:center;gap:10px;margin-bottom:2px}
.bli-av{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:#fff;flex-shrink:0}
.bli-info{flex:1;min-width:0}
.bli-name{font-size:14px;font-weight:600;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.bli-meta{font-size:11px;color:var(--muted)}
.bli-time{font-size:12px;font-weight:600;color:var(--text);text-align:right;flex-shrink:0}

/* ── Teacher list ────────────────────────────── */
.teacher-list-item{display:flex;align-items:center;gap:10px;position:relative}
.tli-av{width:42px;height:42px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700;color:#fff;flex-shrink:0;position:relative}
.tli-online{position:absolute;bottom:1px;right:1px;width:10px;height:10px;border-radius:50%;background:#22c55e;border:2px solid var(--surface)}
.tli-info{flex:1;min-width:0}
.tli-name{font-size:14px;font-weight:700;color:var(--text)}
.tli-spec{font-size:12px;color:var(--muted)}
.tli-right{text-align:right;flex-shrink:0}
.tli-rate{font-size:13px;font-weight:700;color:var(--text)}
.tli-count{font-size:11px;color:var(--muted)}

/* ── Student list ────────────────────────────── */
.student-list-item{display:flex;align-items:center;gap:10px}
.sli-av{width:38px;height:38px;border-radius:50%;background:var(--grad-periwinkle);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:#fff;flex-shrink:0}
.sli-info{flex:1;min-width:0}
.sli-name{font-size:14px;font-weight:700;color:var(--text)}
.sli-meta{font-size:12px;color:var(--muted)}
.sli-badge{font-size:11px;padding:2px 8px;border-radius:var(--r-pill);flex-shrink:0}

/* ── Detail panel elements ───────────────────── */
.detail-hero{display:flex;gap:20px;align-items:center;background:var(--surface);border-radius:20px;padding:24px;margin-bottom:20px;border:1px solid var(--border);animation:detailReveal .3s ease}
.detail-av-lg{width:64px;height:64px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:24px;font-weight:700;color:#fff;flex-shrink:0}
.detail-name{font-size:22px;font-weight:700;color:var(--text);letter-spacing:-0.8px;margin-bottom:4px}
.detail-sub{font-size:14px;color:var(--muted);margin-bottom:10px}
.detail-tags{display:flex;gap:6px;flex-wrap:wrap}
.detail-tag{font-size:12px;font-weight:600;padding:4px 12px;border-radius:var(--r-pill);background:var(--bg);color:var(--muted);border:1px solid var(--border);animation:tagPop .2s ease both}

.detail-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:20px}
.detail-stat{background:var(--surface);border-radius:16px;padding:16px;text-align:center;border:1px solid var(--border)}
.detail-stat-num{font-size:28px;font-weight:700;color:var(--text);letter-spacing:-1px;margin-bottom:2px}
.detail-stat-label{font-size:11px;color:var(--muted);font-weight:500}

.info-section{background:var(--surface);border-radius:20px;padding:20px;border:1px solid var(--border);margin-bottom:16px;animation:detailReveal .35s ease}
.info-section-title{font-size:13px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:0.8px;margin-bottom:14px}
.info-row{display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--bg)}
.info-row:last-child{border-bottom:none}
.info-label{font-size:13px;color:var(--muted)}
.info-value{font-size:14px;font-weight:600;color:var(--text)}

/* ── Availability heat map ────────────────────── */
.heat-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
.heat-header{font-size:10px;font-weight:700;text-align:center;color:var(--muted);padding:2px;text-transform:uppercase}
.heat-cell{height:28px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;transition:all .2s}
.heat-0{background:#f0f4f8;color:var(--border)}
.heat-1{background:#d1fae5;color:#065f46}
.heat-2{background:#6ee7b7;color:#064e3b}
.heat-3{background:#10b981;color:#fff;animation:heatPulse 2s ease infinite}

/* ── Booking timeline ────────────────────────── */
.timeline-item{display:flex;gap:14px;padding:12px 0;border-bottom:1px solid var(--bg);position:relative}
.timeline-item:last-child{border-bottom:none}
.timeline-dot{width:10px;height:10px;border-radius:50%;margin-top:5px;flex-shrink:0}
.timeline-content{flex:1}
.timeline-action{font-size:14px;font-weight:600;color:var(--text)}
.timeline-time{font-size:12px;color:var(--muted);margin-top:2px}

/* ── Progress bar ────────────────────────────── */
.progress-row{margin-bottom:10px}
.progress-label{display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px}
.progress-track{height:6px;background:var(--bg);border-radius:var(--r-pill);overflow:hidden}
.progress-fill{height:100%;border-radius:var(--r-pill);background:var(--accent);animation:progressFill 1s ease both}

/* ── Search input ────────────────────────────── */
.search-bar{display:flex;align-items:center;gap:8px;padding:9px 14px;border:1.5px solid var(--border);border-radius:var(--r-pill);background:var(--bg)}
.search-bar input{border:none;background:transparent;font-size:14px;color:var(--text);outline:none;flex:1}
.search-bar input::placeholder{color:var(--muted)}
</style>
</head>

const {useState, useEffect} = React;

/* ── CountUp hook ────────────────────────────── */
const useCountUp = (target, duration=1200) => {
  const [count, setCount] = useState(0);
  useEffect(() => {
    let start = 0;
    const step = target / (duration / 16);
    const run = () => {
      start = Math.min(start + step, target);
      setCount(Math.floor(start));
      if (start < target) requestAnimationFrame(run);
    };
    requestAnimationFrame(run);
  }, [target]);
  return count;
};

/* ── Toast ───────────────────────────────────── */
const useToast = () => {
  const [toast, setToast] = useState(null);
  const showToast = (msg, type='success') => {
    setToast({msg, type});
    setTimeout(() => setToast(null), 2800);
  };
  const Toast = toast ? (
    <div style={{
      position:'fixed',bottom:28,right:28,zIndex:9999,
      background:toast.type==='success'?'var(--primary)':'#ef4444',
      color:'#fff',
      padding:'12px 20px',borderRadius:'100px',
      boxShadow:'0 8px 24px rgba(23,21,14,0.2)',
      fontSize:14,fontWeight:600,animation:'slideUp .25s ease',
      display:'flex',alignItems:'center',gap:8,
    }}>
      {toast.type==='success'?'✓':'!'} {toast.msg}
    </div>
  ) : null;
  return {showToast, Toast};
};

              {dot:'#cccc25', action:'강사 스케줄 확인', time:'2026-06-23 14:22'},
              {dot:'#9fa6ff', action:selBooking.status==='confirmed'?'예약 확정 완료':'확정 대기 중', time:selBooking.status==='confirmed'?'2026-06-23 14:25':'진행 중'},
            ].map((t,i)=>(
              <div key={i} className="timeline-item">
                <div className="timeline-dot" style={{background:t.dot}}/>
                <div className="timeline-content">
                  <div className="timeline-action">{t.action}</div>
                  <div className="timeline-time">{t.time}</div>
                </div>
              </div>
            ))}
          </div>
        </div>
        {selBooking.status==='pending' && (
          <div style={{display:'flex',gap:10}}>
            <button className="btn-pill btn-accent" style={{padding:'12px 28px',fontSize:14,fontWeight:700}} onClick={()=>showToast('예약이 확정 처리되었습니다')}>
              <Ph name="check" size={14} color="var(--primary)"/>&nbsp;예약 확정
            </button>
            <button className="btn-pill btn-outline" style={{padding:'12px 20px',fontSize:14}} onClick={()=>showToast('Zoom 링크가 발급되었습니다')}>Zoom 링크 발급</button>

          </div>
        )}
      </div>
      {Toast}
    </div>
  );
};

      <Sidebar screen={screen} setScreen={setScreen}/>

        {screen==='main' && <DashboardScreen setScreen={setScreen}/>}

        {screen==='teacher-management' && <TeacherManagementScreen/>}
        {screen==='student-management' && <StudentManagementScreen/>}
