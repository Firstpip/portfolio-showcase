<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>전기요금 자동화 파이프라인 관리 시스템</title>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone@7.26.9/babel.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/lucide@0.460.0/dist/umd/lucide.min.js"></script>
<style>
:root{
  --violet:#7b68ee; --ultra-violet:#6647f0; --violet-glow:#b38cff; --signal-blue:#0091ff;
  --ink:#090c1d; --charcoal:#292d34; --carbon:#202023; --slate:#646464; --steel:#7c828d;
  --mist:#d9d9d9; --cloud:#e8e8e8; --paper:#f8f9fa; --frost:#edf6fd; --linen:#e9ebf0;
  --white:#ffffff; --line:#e5e7eb;
  --shadow-sm:rgba(13,21,48,0.04) 0px 4px 4px 0px;
  --shadow-card:rgba(0,0,0,0.1) 0px 1px 3px 0px, rgba(0,0,0,0.1) 0px 1px 2px -1px;
  --shadow-pop:rgba(18,43,165,0.04) 0px 1px 1px -0.5px, rgba(18,43,165,0.04) 0px 3px 3px -1.5px, rgba(18,43,165,0.04) 0px 6px 6px -3px, rgba(18,43,165,0.04) 0px 12px 12px -6px;
  --r-btn:9px; --r-card:12px; --r-pill:54px;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{font-family:'Pretendard',system-ui,sans-serif;background:var(--white);color:var(--ink);-webkit-font-smoothing:antialiased;letter-spacing:-0.011em}
#root{height:100%}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
::-webkit-scrollbar{width:10px;height:10px}
::-webkit-scrollbar-thumb{background:#e3e3e8;border-radius:8px;border:2px solid #fff}
::-webkit-scrollbar-thumb:hover{background:#cfcfd6}
i[data-lucide]{width:16px;height:16px;stroke-width:2}

/* ---- shell ---- */
.shell{display:flex;width:100%;min-height:100vh}

/* ---- tree sidebar ---- */
.sidebar{width:248px;flex-shrink:0;background:var(--paper);border-right:1px solid var(--line);position:fixed;top:0;left:0;height:100vh;display:flex;flex-direction:column;z-index:20}
.sidebar-brand{display:flex;align-items:center;gap:8px;padding:14px 14px 10px;font-weight:700;font-size:14.5px;color:var(--ink)}
.brand-logo{width:26px;height:26px;border-radius:7px;background:linear-gradient(135deg,var(--violet),var(--ultra-violet));display:grid;place-items:center;box-shadow:0 2px 8px rgba(123,104,238,.4)}
.brand-logo i{color:#fff;width:15px;height:15px}
.brand-chev{margin-left:auto;color:var(--steel)}
.sidebar-search{display:flex;flex-direction:column;gap:5px;padding:4px 10px 10px}
.search-btn,.quick-add{display:flex;align-items:center;gap:8px;width:100%;padding:7px 10px;border-radius:8px;font-size:13px;color:var(--slate);text-align:left;transition:.14s}
.search-btn{background:var(--white);border:1px solid var(--cloud)}
.search-btn:hover{background:#fff;border-color:var(--mist)}
.search-btn .kbd{margin-left:auto;font-size:10.5px;color:var(--steel);background:var(--paper);border:1px solid var(--cloud);border-radius:5px;padding:1px 5px;font-family:'IBM Plex Mono',monospace}
.quick-add{color:var(--violet);font-weight:650}
.quick-add:hover{background:#f1eefe}
.tree-nav{flex:1;overflow-y:auto;padding:4px 8px}
.tree-section-label{font-size:11px;letter-spacing:.06em;text-transform:uppercase;color:var(--steel);font-weight:700;padding:12px 8px 4px;font-family:'IBM Plex Mono',monospace}
.tree-item{display:flex;align-items:center;gap:6px;border-radius:7px;font-size:13.5px;color:var(--charcoal);padding:5px 8px;transition:.12s;position:relative;width:100%;text-align:left}
.tree-item:hover{background:#eceaf6}
.tree-item.active{background:#ece9fd;color:var(--ultra-violet);font-weight:650}
.tree-item.active::before{content:"";position:absolute;left:-8px;top:5px;bottom:5px;width:3px;border-radius:3px;background:var(--violet)}
.tree-toggle{display:grid;place-items:center;width:16px;height:16px;color:var(--steel);transition:transform .18s}
.tree-toggle.open{transform:rotate(0deg)}
.tree-toggle.closed{transform:rotate(-90deg)}
.tree-ph{width:16px;flex-shrink:0}
.tree-item i[data-lucide]{width:15px;height:15px;color:var(--slate);flex-shrink:0}
.tree-item.active i[data-lucide]{color:var(--violet)}
.tree-label{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tree-badge{margin-left:auto;font-size:10.5px;background:#fff;border:1px solid var(--cloud);color:var(--slate);border-radius:20px;padding:0 6px;font-weight:600}
.dot-live{margin-left:auto;width:7px;height:7px;border-radius:50%;background:var(--violet);box-shadow:0 0 0 0 rgba(123,104,238,.5);animation:pulse 1.8s infinite}
.sidebar-footer{border-top:1px solid var(--line);padding:8px 12px;display:flex;flex-direction:column;gap:2px}
.footer-link{display:flex;align-items:center;gap:8px;font-size:12.5px;color:var(--slate);padding:6px 6px;border-radius:6px}
.footer-link:hover{background:#eceaf6}
.user-chip{display:flex;align-items:center;gap:8px;padding:8px 6px;margin-top:2px;border-top:1px solid var(--line)}
.avatar{width:26px;height:26px;border-radius:50%;background:linear-gradient(135deg,#7b68ee,#0091ff);color:#fff;display:grid;place-items:center;font-size:11px;font-weight:700}

/* ---- main page ---- */
.main-wrap{flex:1;min-width:0;margin-left:248px;display:flex;flex-direction:column}
.page-topbar{height:44px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:6px;padding:0 18px;position:sticky;top:0;background:rgba(255,255,255,.85);backdrop-filter:blur(8px);z-index:10}
.breadcrumb{display:flex;align-items:center;gap:7px;font-size:13px;color:var(--slate)}
.breadcrumb b{color:var(--charcoal);font-weight:650}
.breadcrumb .sep{color:var(--mist)}
.topbar-actions{margin-left:auto;display:flex;align-items:center;gap:6px}
.tb-ghost{display:flex;align-items:center;gap:6px;font-size:12.5px;color:var(--charcoal);border:1px solid var(--cloud);border-radius:var(--r-btn);padding:5px 11px;background:#fff;transition:.14s}
.tb-ghost:hover{border-color:var(--mist);background:var(--paper)}
.tb-primary{display:flex;align-items:center;gap:6px;font-size:12.5px;color:#fff;background:var(--carbon);border-radius:var(--r-btn);padding:6px 13px;font-weight:650;box-shadow:var(--shadow-sm);transition:.14s}
.tb-primary:hover{background:#000}

.page-scroll{flex:1;overflow-y:auto}
.page-body{max-width:840px;margin:0 auto;padding:30px 28px 90px}
.page-icon-row{display:flex;align-items:center;gap:10px;margin-bottom:14px}
.page-icon-large{width:54px;height:54px;border-radius:14px;display:grid;place-items:center;font-size:26px;box-shadow:var(--shadow-card)}
.page-meta{display:flex;gap:4px;flex-wrap:wrap}
.meta-action{font-size:12px;color:var(--steel);padding:4px 8px;border-radius:6px;display:flex;align-items:center;gap:4px}
.meta-action:hover{background:var(--paper);color:var(--charcoal)}
.page-title{font-size:44px;line-height:1.08;letter-spacing:-0.035em;font-weight:800;color:var(--ink);margin-bottom:6px}
.page-sub{font-size:16px;color:var(--slate);line-height:1.5;margin-bottom:22px;max-width:680px}
.status-row{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:26px}
.chip{display:inline-flex;align-items:center;gap:6px;font-size:12.5px;border-radius:var(--r-pill);padding:4px 12px;border:1px solid var(--cloud);background:#fff;color:var(--charcoal);font-weight:500}
.chip i{width:13px;height:13px}
.chip.run{background:#f1eefe;border-color:#ddd5fb;color:var(--ultra-violet);font-weight:650}
.chip.ok{background:#eafaf1;border-color:#c7eed8;color:#1a8a4f}
.chip.mono{font-family:'IBM Plex Mono',monospace;color:var(--slate)}

/* ---- blocks ---- */
.block-list{display:flex;flex-direction:column;gap:2px}
.block{position:relative;padding:3px 0;border-radius:6px;animation:fadeInUp .4s both}
.block:hover .block-handle{opacity:1}
.block-handle{position:absolute;left:-30px;top:6px;display:flex;gap:1px;opacity:0;transition:.14s}
.block-handle span{color:var(--steel);font-size:14px;line-height:1;cursor:grab;border-radius:4px;padding:1px 2px}
.block-handle span:hover{background:var(--cloud)}
.block-heading h2{font-size:23px;font-weight:750;letter-spacing:-0.02em;color:var(--ink);margin:18px 0 4px}
.block-heading .h-icon{color:var(--violet);width:18px;height:18px;vertical-align:-3px;margin-right:7px}
.block-text p{font-size:15.5px;line-height:1.62;color:var(--charcoal)}
.block-text .mut{color:var(--slate)}
.block-callout{display:flex;gap:12px;align-items:flex-start;background:var(--paper);border:1px solid var(--cloud);border-left:3px solid var(--violet);border-radius:10px;padding:13px 15px;margin:6px 0}
.block-callout.blue{border-left-color:var(--signal-blue)}
.block-callout .c-icon{font-size:18px;flex-shrink:0;margin-top:1px}
.block-callout .c-body{font-size:14px;line-height:1.55;color:var(--charcoal)}
.block-callout .c-body b{color:var(--ink)}

/* pipeline timeline table */
.block-table{margin:8px 0}
.pl-table{width:100%;border-collapse:separate;border-spacing:0;border:1px solid var(--line);border-radius:10px;overflow:hidden;font-size:13px}
.pl-table th{background:var(--paper);text-align:left;padding:9px 13px;font-size:11px;letter-spacing:.05em;text-transform:uppercase;color:var(--steel);font-weight:700;border-bottom:1px solid var(--line)}
.pl-table td{padding:10px 13px;border-bottom:1px solid #f0f0f3;vertical-align:middle}
.pl-table tr:last-child td{border-bottom:none}
.pl-table tr:hover td{background:#faf9ff}
.stage-name{display:flex;align-items:center;gap:9px;font-weight:600;color:var(--ink)}
.stage-ic{width:28px;height:28px;border-radius:8px;display:grid;place-items:center;flex-shrink:0}
.stage-ic i{width:15px;height:15px}
.sbadge{display:inline-flex;align-items:center;gap:5px;font-size:11.5px;font-weight:650;border-radius:20px;padding:2px 9px}
.sbadge.done{background:#eafaf1;color:#1a8a4f}
.sbadge.run{background:#f1eefe;color:var(--ultra-violet)}
.sbadge.wait{background:#f3f4f6;color:var(--steel)}
.sbadge .spin{width:11px;height:11px;border:1.6px solid #d6ccfb;border-top-color:var(--violet);border-radius:50%;animation:spin .7s linear infinite;display:inline-block}
.sbadge .lpulse{width:6px;height:6px;border-radius:50%;background:currentColor;animation:pulse 1.4s infinite}
.mini-bar{width:90px;height:6px;border-radius:6px;background:var(--cloud);overflow:hidden}
.mini-bar i{display:block;height:100%;border-radius:6px;background:linear-gradient(90deg,var(--violet),var(--violet-glow));position:relative}
.mini-bar i::after{content:"";position:absolute;inset:0;background:linear-gradient(90deg,transparent,rgba(255,255,255,.55),transparent);animation:shimmer 1.5s infinite}
.dur{font-family:'IBM Plex Mono',monospace;font-size:12px;color:var(--slate)}

/* toggle block */
.block-toggle{border-radius:8px}
.toggle-head{display:flex;align-items:center;gap:8px;font-size:14.5px;font-weight:600;color:var(--ink);padding:6px 4px;border-radius:6px;width:100%;text-align:left}
.toggle-head:hover{background:var(--paper)}
.toggle-arrow{color:var(--steel);transition:transform .18s;width:14px;height:14px}
.toggle-arrow.open{transform:rotate(90deg)}
.toggle-content{padding:4px 0 8px 24px;display:flex;flex-direction:column;gap:5px;animation:fadeInUp .3s both}
.log-line{display:flex;gap:10px;font-family:'IBM Plex Mono',monospace;font-size:12px;color:var(--slate);padding:2px 0}
.log-line .lt{color:var(--steel)}
.log-line .lv{color:var(--charcoal)}
.log-line .ok{color:#1a8a4f}
.log-line .warn{color:#c2780a}

/* checklist */
.block-todo{display:flex;flex-direction:column;gap:3px;margin:4px 0}
.todo-item{display:flex;align-items:flex-start;gap:9px;font-size:14px;color:var(--charcoal);padding:3px 0;line-height:1.5}
.check{width:18px;height:18px;border-radius:5px;flex-shrink:0;display:grid;place-items:center;margin-top:1px;cursor:pointer;transition:.14s}
.check.on{background:var(--violet);border:1px solid var(--violet)}
.check.on i{color:#fff;width:12px;height:12px}
.check.off{background:#fff;border:1.5px solid var(--mist)}
.todo-item.done .t-label{color:var(--steel);text-decoration:line-through}

.block-divider hr{border:none;border-top:1px solid var(--line);margin:18px 0}

/* tech grid cards */
.tech-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin:8px 0}
.tech-card{background:#fff;border:1px solid var(--line);border-radius:12px;padding:15px 16px;transition:.16s;box-shadow:var(--shadow-pop)}
.tech-card:hover{border-color:#d8d0fa;transform:translateY(-2px)}
.tech-card .tc-ic{width:32px;height:32px;border-radius:9px;background:#f1eefe;display:grid;place-items:center;margin-bottom:9px}
.tech-card .tc-ic i{color:var(--violet);width:17px;height:17px}
.tech-card h4{font-size:14.5px;color:var(--ink);margin-bottom:4px;font-weight:700}
.tech-card p{font-size:12.5px;color:var(--slate);line-height:1.5}
.stack-pills{display:flex;flex-wrap:wrap;gap:6px;margin:10px 0 4px}
.spill{font-size:12px;font-family:'IBM Plex Mono',monospace;color:var(--charcoal);background:var(--paper);border:1px solid var(--cloud);border-radius:var(--r-pill);padding:3px 11px}
.spill.v{color:var(--ultra-violet);background:#f4f1fe;border-color:#e0d8fb}

.slash-hint{display:flex;align-items:center;gap:8px;color:var(--steel);font-size:13px;padding:8px 4px;margin-top:6px;border-radius:6px}
.slash-hint .sk{font-family:'IBM Plex Mono',monospace;background:var(--paper);border:1px solid var(--cloud);border-radius:5px;padding:1px 6px;font-size:11px}

@keyframes fadeInUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
@keyframes pulse{0%{box-shadow:0 0 0 0 rgba(123,104,238,.5)}70%{box-shadow:0 0 0 6px rgba(123,104,238,0)}100%{box-shadow:0 0 0 0 rgba(123,104,238,0)}}
@keyframes shimmer{0%{transform:translateX(-100%)}100%{transform:translateX(100%)}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes countpop{from{opacity:0;transform:scale(.9)}to{opacity:1;transform:none}}
@keyframes toastIn{from{opacity:0;transform:translateY(16px) scale(.96)}to{opacity:1;transform:none}}
.app-toast{position:fixed;bottom:26px;left:50%;transform:translateX(-50%) translateY(20px);display:flex;align-items:center;gap:9px;
  background:var(--carbon);color:#fff;font-size:13.5px;font-weight:600;padding:11px 17px;border-radius:11px;
  box-shadow:0 12px 32px rgba(9,12,29,.28);opacity:0;pointer-events:none;transition:.28s cubic-bezier(.2,.9,.3,1.2);z-index:80}
.app-toast.on{opacity:1;transform:translateX(-50%);pointer-events:auto}
.app-toast i{width:16px;height:16px;color:var(--violet-glow)}

@media(max-width:880px){
  .sidebar{transform:translateX(-100%);transition:.2s}
  .main-wrap{margin-left:0}
  .page-body{padding:24px 18px 80px}
  .page-title{font-size:34px}
}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" data-presets="env,react">
const {useState,useEffect,useRef}=React;
const Icon=({n,...p})=><i data-lucide={n} {...p}></i>;

function useLucide(dep){
  useEffect(()=>{ if(window.lucide) window.lucide.createIcons(); });
}

const STAGES=[
  {key:'crawl',name:'한전 파워플래너 크롤링',ic:'globe',color:'#7b68ee',bg:'#f1eefe',status:'done',dur:'14.2s',pct:100},
  {key:'ocr',name:'OCR 고지서 데이터 추출',ic:'scan-line',color:'#0091ff',bg:'#e7f4ff',status:'done',dur:'8.6s',pct:100},
  {key:'excel',name:'엑셀 매핑 · 계산 로직',ic:'table-2',color:'#6647f0',bg:'#efebfd',status:'run',dur:'진행중',pct:62},
  {key:'ppt',name:'python-pptx 제안서 생성',ic:'presentation',color:'#838383',bg:'#f1f1f3',status:'wait',dur:'대기',pct:0},
  {key:'flow',name:'Flow 업로드 · 담당자 알림',ic:'send',color:'#838383',bg:'#f1f1f3',status:'wait',dur:'대기',pct:0},
];

const CUSTOMERS=[
  {id:'c1',name:'그린팩토리 제조',runs:['6월 정기 절감 리포트','5월 청구 분석']},
  {id:'c2',name:'한빛물류 센터',runs:['6월 정기 절감 리포트']},
  {id:'c3',name:'대성에너지 빌딩',runs:['6월 정기 절감 리포트','계약전력 재산정']},
];

// 각 뷰 = master-detail 의 detail-panel 콘텐츠
const VIEWS={
  main:{
    crumb:'파이프라인 작업 목록', icon:'⚡', iconBg:'#f1eefe',
    title:'파이프라인 작업 목록',
    sub:'고객사를 선택하면 크롤링 → OCR → 엑셀 → PPT → Flow 5단계 파이프라인의 진행 상태와 산출물을 우측 상세 패널에 인라인으로 표시합니다.',
  },
  crawl:{
    crumb:'크롤링 및 OCR', icon:'🛰', iconBg:'#e7f4ff',
    title:'크롤링 및 OCR 데이터 추출',
    sub:'한전 계정으로 Playwright 자동 로그인 후 12개월 청구 데이터를 수집하고, 고지서 이미지·PDF는 상용 OCR API로 추출해 신뢰도 낮은 필드만 수동 보정합니다.',
  },
  generate:{
    crumb:'엑셀·PPT 생성', icon:'📊', iconBg:'#efebfd',
    title:'엑셀 매핑 및 PPT 자동 생성',
    sub:'수집 데이터를 엑셀 양식 지정 셀에 openpyxl로 매핑·연산하고, 결과를 python-pptx 제안서 템플릿에 치환해 고객 제안용 PPT를 자동 생성합니다.',
  },
  flow:{
    crumb:'Flow 연동', icon:'🔗', iconBg:'#eafaf1',
    title:'Flow API 자동 업로드 및 알림',
    sub:'PPT 생성 완료 시 Flow Open API로 지정 프로젝트 방에 파일을 업로드하고 담당자에게 멘션 알림을 전송하며, 실패 시 재시도·이메일 폴백으로 결과 인지를 보장합니다.',
  },
};

function StageBadge({s}){
  if(s==='done')return <span className="sbadge done"><Icon n="check"/>완료</span>;
  if(s==='run')return <span className="sbadge run"><span className="spin"></span>진행중</span>;
  return <span className="sbadge wait">대기</span>;
}

function PipelineTable(){
  return(
    <table className="pl-table">
      <thead><tr><th style={{width:'42%'}}>파이프라인 단계</th><th>상태</th><th>진행률</th><th>소요</th></tr></thead>
      <tbody>
        {STAGES.map((st,i)=>(
          <tr key={st.key}>
            <td><div className="stage-name">
              <span className="stage-ic" style={{background:st.bg}}><i data-lucide={st.ic} style={{color:st.color}}></i></span>
              <span>{i+1}. {st.name}</span></div></td>
            <td><StageBadge s={st.status}/></td>
            <td>{st.pct>0?<div className="mini-bar"><i style={{width:st.pct+'%'}}></i></div>:<span style={{color:'#b3b3b3',fontSize:'12px'}}>—</span>}</td>
            <td><span className="dur">{st.dur}</span></td>
          </tr>
        ))}
      </tbody>
    </table>
  );
}

function Toggle({summary,children,defaultOpen}){
  const [open,setOpen]=useState(!!defaultOpen);
  useLucide(open);
  return(
    <div className="block block-toggle" data-block-type="toggle">
      <button className="toggle-head" onClick={()=>setOpen(o=>!o)}>
        <i data-lucide="chevron-right" className={"toggle-arrow "+(open?'open':'')}></i>{summary}
      </button>
      {open&&<div className="toggle-content">{children}</div>}
    </div>
  );
}

function Checklist({items}){

        <div className="page-topbar">
          <div className="breadcrumb">
            <a>파이프라인</a><span className="sep">›</span><b>{v.crumb}</b>
          </div>
          <div className="topbar-actions">
            <button className="tb-ghost"><i data-lucide="history"></i>실행 이력</button>
            <button className="tb-primary" onClick={fireToast}><i data-lucide="play"></i>파이프라인 실행</button>
          </div>
        </div>
        <div className="page-scroll">
          <div className="page-body">
            <div className="page-icon-row">
              <span className="page-icon-large" style={{background:v.iconBg}}>{v.icon}</span>
              <div className="page-meta">
                <button className="meta-action"><i data-lucide="image"></i>커버 추가</button>
                <button className="meta-action"><i data-lucide="message-square"></i>댓글</button>
                <button className="meta-action"><i data-lucide="star"></i>즐겨찾기</button>
              </div>
            </div>
            <h1 className="page-title">{v.title}</h1>
            <p className="page-sub">{v.sub}</p>
            <Detail key={view}/>
            <TechSection/>
          </div>
        </div>
      </div>
      <Toast show={toast} msg="파이프라인 실행을 시작했습니다 · 크롤링 단계 진입"/>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
setTimeout(()=>{if(window.lucide)window.lucide.createIcons();},60);
</script>
</body>
</html>
