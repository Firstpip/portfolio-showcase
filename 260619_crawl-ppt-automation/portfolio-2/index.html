<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>업무 자동화 워크플로우 통합 플랫폼</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
<link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/regular/style.css" />
<link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/bold/style.css" />
<link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/fill/style.css" />
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone@7.26.9/babel.min.js"></script>
<style>
:root{
  --void:#040506; --charcoal:#07080a; --g700:#111214; --g600:#1b1c1e; --g500:#363739; --g400:#454647;
  --slate300:#6a6b6c; --slate200:#9c9c9d; --ash:#e6e6e6; --snow:#ffffff;
  --red:#ff6363; --ember-dark:#452324; --mint:#59d499; --amber:#f5b14c; --sky:#56c2ff;
  --r-card:11px; --r-lg:20px; --r-btn:8px; --r-badge:6px;
  --key:rgba(0,0,0,0.4) 0px 1.5px 0.5px 2.5px, rgb(0,0,0) 0px 0px 0.5px 1px, rgba(0,0,0,0.25) 0px 2px 1px 1px inset, rgba(255,255,255,0.12) 0px 1px 1px 1px inset;
  --glass-bd:rgba(255,255,255,0.08);
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{font-family:'Pretendard',system-ui,sans-serif;background:var(--void);color:var(--snow);-webkit-font-smoothing:antialiased;
  background-image:
    radial-gradient(70% 55% at 78% 8%, rgba(255,99,99,0.10), rgba(6,18,37,0) 60%),
    radial-gradient(84% 73% at 18% 0%, rgba(4,63,150,0.30), rgba(6,18,37,0) 58%),
    radial-gradient(86% 75% at 95% 60%, rgba(82,48,145,0.22), rgba(26,11,51,0) 60%);
  background-attachment:fixed;}
#root{min-height:100%}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
::-webkit-scrollbar{width:10px;height:10px}
::-webkit-scrollbar-thumb{background:#1c1d20;border-radius:8px;border:2px solid var(--void)}
i.ph,i[class^="ph-"],i[class*=" ph-"]{font-size:18px;line-height:1}
.mono{font-family:'IBM Plex Mono','JetBrains Mono',monospace}

/* topbar (NON-sidebar nav) */
.topbar{position:sticky;top:0;z-index:30;display:flex;align-items:center;gap:18px;padding:0 26px;height:60px;
  background:rgba(4,5,6,0.72);backdrop-filter:blur(16px);border-bottom:1px solid rgba(255,255,255,0.06)}
.brand{display:flex;align-items:center;gap:10px;font-weight:700;font-size:15px;letter-spacing:-0.01em}
.brand .logo{width:30px;height:30px;border-radius:9px;background:linear-gradient(135deg,#ff6363,#a8324f);display:grid;place-items:center;box-shadow:var(--key)}
.brand .logo i{color:#fff;font-size:17px}
.brand .ver{font-size:10px;color:var(--slate200);border:1px solid var(--g500);border-radius:5px;padding:1px 5px;margin-left:2px}
.topnav{display:flex;gap:4px;margin-left:8px}
.topnav button{display:flex;align-items:center;gap:7px;font-size:13.5px;color:var(--slate200);padding:8px 13px;border-radius:9px;transition:.15s;font-weight:500}
.topnav button:hover{color:var(--snow);background:rgba(255,255,255,0.05)}
.topnav button.active{color:var(--snow);background:rgba(255,255,255,0.07);box-shadow:inset 0 0 0 1px var(--glass-bd)}
.topnav button.active i{color:var(--red)}
.topbar-right{margin-left:auto;display:flex;align-items:center;gap:10px}
.live-pill{display:flex;align-items:center;gap:7px;font-size:12px;color:var(--mint);background:rgba(89,212,153,0.08);border:1px solid rgba(89,212,153,0.22);border-radius:20px;padding:4px 11px;font-weight:600}
.live-dot{width:7px;height:7px;border-radius:50%;background:var(--mint);animation:blink 1.4s infinite}
.cmdk{display:flex;align-items:center;gap:8px;font-size:12.5px;color:var(--slate200);background:var(--g700);border:1px solid var(--g500);border-radius:8px;padding:6px 11px;box-shadow:var(--key)}
.cmdk .k{font-size:10.5px;color:var(--slate300)}
.av{width:30px;height:30px;border-radius:50%;background:linear-gradient(135deg,#56c2ff,#138af2);display:grid;place-items:center;font-size:12px;font-weight:700;color:#04121f}

/* page */
.page{max-width:1320px;margin:0 auto;padding:24px 26px 70px}
.page-head{display:flex;align-items:flex-end;gap:16px;margin:6px 0 22px}
.page-head h1{font-size:40px;font-weight:700;letter-spacing:-0.03em;line-height:1.04}
.page-head .tag{font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--red);font-weight:700;margin-bottom:8px;display:block}
.page-head p{color:var(--slate200);font-size:14.5px;line-height:1.55;max-width:560px;margin-top:7px}
.head-actions{margin-left:auto;display:flex;gap:8px}
.btn-pill{display:flex;align-items:center;gap:7px;font-size:13px;font-weight:600;border-radius:8px;padding:9px 15px;transition:.15s}
.btn-ghost{color:var(--ash);border:1px solid var(--g500);background:var(--g700)}
.btn-ghost:hover{border-color:var(--g400);background:var(--g600)}
.btn-light{background:var(--ash);color:#0b0b0d;box-shadow:var(--key)}
.btn-light:hover{background:#fff}

/* BENTO grid */
.bento{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;grid-auto-rows:minmax(118px,auto)}
.tile{background:linear-gradient(180deg,rgba(255,255,255,0.035),rgba(255,255,255,0.012));
  border:1px solid var(--glass-bd);border-radius:var(--r-lg);padding:18px;position:relative;overflow:hidden;
  box-shadow:rgba(0,0,0,0.4) 0px 4px 30px -8px;transition:.2s}
.tile:hover{border-color:rgba(255,255,255,0.16);transform:translateY(-2px)}
.tile .t-head{display:flex;align-items:center;gap:9px;margin-bottom:12px}
.tile .t-head .ti{width:30px;height:30px;border-radius:9px;display:grid;place-items:center;background:rgba(255,255,255,0.05);box-shadow:inset 0 1px 0 rgba(255,255,255,0.06)}
.tile .t-head .ti i{font-size:16px}
.tile .t-title{font-size:13px;font-weight:650;color:var(--ash)}
.tile .t-sub{font-size:11px;color:var(--slate300);margin-left:auto;letter-spacing:.04em}

.span2{grid-column:span 2}
.span2r{grid-column:span 2;grid-row:span 2}
.span4{grid-column:span 4}

/* metric tile */
.metric .num{font-size:38px;font-weight:700;letter-spacing:-0.03em;line-height:1;animation:countpop .5s both}
.metric .num .u{font-size:15px;color:var(--slate200);font-weight:500;margin-left:3px}
.metric .lbl{font-size:12px;color:var(--slate200);margin-top:9px;display:flex;align-items:center;gap:6px}
.metric .delta{font-size:11px;font-weight:600;padding:1px 6px;border-radius:5px}
.delta.up{color:var(--mint);background:rgba(89,212,153,0.1)}
.delta.down{color:var(--red);background:rgba(255,99,99,0.1)}
.spark{position:absolute;right:14px;bottom:14px;opacity:.85}

/* big chart tile */
.chart-wrap{width:100%;height:calc(100% - 42px);min-height:180px;position:relative}
.legend{display:flex;gap:16px;margin-top:2px}
.legend span{display:flex;align-items:center;gap:6px;font-size:11.5px;color:var(--slate200)}
.legend .sw{width:9px;height:9px;border-radius:3px}

/* live feed tile */
.feed{display:flex;flex-direction:column;gap:2px;max-height:340px;overflow-y:auto;margin:-2px -4px 0}
.feed-item{display:flex;align-items:flex-start;gap:10px;padding:8px 8px;border-radius:9px;transition:.12s;animation:slideIn .35s both}
.feed-item:hover{background:rgba(255,255,255,0.03)}
.fi-ic{width:26px;height:26px;border-radius:7px;display:grid;place-items:center;flex-shrink:0;margin-top:1px}
.fi-ic i{font-size:14px}
.fi-body{flex:1;min-width:0}
.fi-msg{font-size:12.5px;color:var(--ash);line-height:1.4}
.fi-msg b{color:var(--snow);font-weight:650}
.fi-meta{font-size:10.5px;color:var(--slate300);margin-top:2px;display:flex;gap:8px}
.ok-bg{background:rgba(89,212,153,0.12)} .ok-bg i{color:var(--mint)}
.err-bg{background:rgba(255,99,99,0.13)} .err-bg i{color:var(--red)}
.warn-bg{background:rgba(245,177,76,0.13)} .warn-bg i{color:var(--amber)}
.run-bg{background:rgba(86,194,255,0.12)} .run-bg i{color:var(--sky)}

/* bottom table tile */
.dtable{width:100%;border-collapse:collapse;font-size:12.5px}
.dtable th{text-align:left;color:var(--slate300);font-size:10.5px;letter-spacing:.07em;text-transform:uppercase;font-weight:700;padding:7px 10px;border-bottom:1px solid var(--g500)}
.dtable td{padding:9px 10px;border-bottom:1px solid rgba(255,255,255,0.04);color:var(--ash)}
.dtable tr:last-child td{border-bottom:none}
.dtable tr:hover td{background:rgba(255,255,255,0.02)}
.badge{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:600;border-radius:6px;padding:2px 8px}
.badge.ok{color:var(--mint);background:rgba(89,212,153,0.1)}
.badge.err{color:var(--red);background:rgba(255,99,99,0.11)}
.badge.run{color:var(--sky);background:rgba(86,194,255,0.1)}
.badge.wait{color:var(--slate200);background:rgba(255,255,255,0.05)}
.badge .spin{width:9px;height:9px;border:1.5px solid rgba(86,194,255,.3);border-top-color:var(--sky);border-radius:50%;display:inline-block;animation:spin .7s linear infinite}
.mini-prog{height:5px;border-radius:5px;background:var(--g600);overflow:hidden;width:78px}
.mini-prog i{display:block;height:100%;border-radius:5px;background:linear-gradient(90deg,var(--sky),#138af2);animation:bargrow 1s ease both}

/* RBAC / admin rows */
.role-row{display:flex;align-items:center;gap:12px;padding:11px 12px;border-radius:11px;background:rgba(255,255,255,0.02);border:1px solid rgba(255,255,255,0.05);margin-bottom:8px}
.role-ic{width:34px;height:34px;border-radius:9px;display:grid;place-items:center;background:rgba(255,99,99,0.1)}
.role-ic i{color:var(--red);font-size:17px}
.role-name{font-size:13.5px;font-weight:650}
.role-desc{font-size:11.5px;color:var(--slate300)}
.role-count{margin-left:auto;font-size:12px;color:var(--slate200)}
.perm-tags{display:flex;gap:5px;flex-wrap:wrap;margin-top:5px}
.perm{font-size:10px;color:var(--slate200);border:1px solid var(--g500);border-radius:5px;padding:1px 6px}

/* workflow template builder */
.flow-canvas{display:flex;align-items:center;gap:10px;flex-wrap:wrap;padding:6px 0}
.step-card{display:flex;flex-direction:column;gap:4px;min-width:120px;background:var(--g700);border:1px solid var(--g500);border-radius:12px;padding:12px;box-shadow:var(--key);cursor:grab;transition:.16s;position:relative}
.step-card:hover{border-color:var(--red);transform:translateY(-2px)}
.step-card .sc-ic{width:30px;height:30px;border-radius:8px;display:grid;place-items:center;background:rgba(255,255,255,0.05);margin-bottom:2px}
.step-card .sc-ic i{font-size:15px;color:var(--sky)}
.step-card .sc-name{font-size:12.5px;font-weight:650}
.step-card .sc-type{font-size:10px;color:var(--slate300)}
.step-card .grip{position:absolute;top:8px;right:8px;color:var(--g400);font-size:12px}
.flow-arrow{color:var(--g400);font-size:18px}
.add-step{min-width:90px;height:78px;border:1.5px dashed var(--g500);border-radius:12px;display:grid;place-items:center;color:var(--slate300);font-size:12px;gap:4px;transition:.15s}
.add-step:hover{border-color:var(--red);color:var(--red)}

/* error analytics */
.err-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.err-type{display:flex;align-items:center;gap:11px;padding:11px;border-radius:11px;background:rgba(255,255,255,0.02);border:1px solid rgba(255,255,255,0.05)}
.err-type .et-ic{width:32px;height:32px;border-radius:9px;display:grid;place-items:center;flex-shrink:0}
.et-name{font-size:12px;font-weight:650;font-family:'IBM Plex Mono',monospace}
.et-bar{height:5px;border-radius:5px;background:var(--g600);margin-top:6px;overflow:hidden}
.et-bar i{display:block;height:100%;border-radius:5px;animation:bargrow 1.1s ease both}
.et-count{margin-left:auto;text-align:right}
.et-count .n{font-size:19px;font-weight:700;line-height:1}
.et-count .s{font-size:10px;color:var(--slate300)}

.section-h{font-size:13px;font-weight:700;color:var(--ash);margin:4px 0 10px;display:flex;align-items:center;gap:8px;letter-spacing:-0.01em}
.section-h .line{flex:1;height:1px;background:rgba(255,255,255,0.06)}
.stack-row{display:flex;flex-wrap:wrap;gap:7px;margin-top:14px}
.chiptech{font-size:11.5px;color:var(--slate200);background:var(--g700);border:1px solid var(--g500);border-radius:7px;padding:4px 11px;font-family:'IBM Plex Mono',monospace}
.chiptech.red{color:var(--red);border-color:rgba(255,99,99,0.3);background:rgba(255,99,99,0.06)}

@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes bargrow{from{width:0 !important}}
@keyframes countpop{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
@keyframes slideIn{from{opacity:0;transform:translateX(-8px)}to{opacity:1;transform:none}}
@keyframes dash{to{stroke-dashoffset:0}}
@keyframes floaty{0%,100%{transform:translateY(0)}50%{transform:translateY(-4px)}}

@media(max-width:1100px){.bento{grid-template-columns:repeat(2,1fr)} .span2r{grid-row:span 1} .span4,.span2,.span2r{grid-column:span 2}}
@media(max-width:680px){.bento{grid-template-columns:1fr} .span2,.span2r,.span4{grid-column:span 1} .topnav{display:none} .page-head h1{font-size:30px}}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" data-presets="env,react">
const {useState,useEffect,useRef}=React;

/* ---- CountUp: setInterval 기반 KPI 카운트업 (마이크로 인터랙션) ---- */
function useCountUp(target,dur=900){
  const [v,setV]=useState(0);
  useEffect(()=>{
    let cur=0;const steps=32;const inc=target/steps;
    const id=setInterval(()=>{cur+=inc;if(cur>=target){cur=target;clearInterval(id);}setV(cur);},dur/steps);
    return()=>clearInterval(id);
  },[target]);
  return v;
}
function CountUp({to,dec=0,suffix}){
  const v=useCountUp(to);
  const txt=dec>0?v.toFixed(dec):Math.round(v).toLocaleString('ko-KR');
  return <>{txt}{suffix&&<span className="u">{suffix}</span>}</>;
}

/* ---- SVG line chart (성공률 시계열) ---- */
function LineChart(){
  const w=560,h=190,pad=8;
  const dataA=[88,90,87,92,94,91,95,93,96,94,97,95,98,96,97,95,98,99,97,98];
  const dataB=[12,9,14,7,5,9,4,7,3,6,2,5,3,4,3,5,2,1,3,2];
  const max=100;
  const pts=(arr)=>arr.map((v,i)=>{const x=pad+(i/(arr.length-1))*(w-pad*2);const y=h-pad-(v/max)*(h-pad*2);return [x,y];});
  const path=(arr)=>pts(arr).map((p,i)=>(i?'L':'M')+p[0].toFixed(1)+' '+p[1].toFixed(1)).join(' ');
  const area=(arr)=>{const P=pts(arr);return 'M'+P[0][0]+' '+(h-pad)+' '+P.map(p=>'L'+p[0].toFixed(1)+' '+p[1].toFixed(1)).join(' ')+' L'+P[P.length-1][0]+' '+(h-pad)+' Z';};
  return(
    <svg className="chart-wrap" viewBox={`0 0 ${w} ${h}`} preserveAspectRatio="none">
      <defs>
        <linearGradient id="gA" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stopColor="#56c2ff" stopOpacity="0.28"/><stop offset="1" stopColor="#56c2ff" stopOpacity="0"/></linearGradient>
        <linearGradient id="line" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stopColor="#56c2ff"/><stop offset="1" stopColor="#138af2"/></linearGradient>
      </defs>
      {[0,.25,.5,.75,1].map(g=><line key={g} x1={pad} x2={w-pad} y1={pad+g*(h-pad*2)} y2={pad+g*(h-pad*2)} stroke="rgba(255,255,255,0.05)" strokeWidth="1"/>)}
      <path d={area(dataA)} fill="url(#gA)"/>
      <path d={path(dataA)} fill="none" stroke="url(#line)" strokeWidth="2.4" strokeLinecap="round" strokeDasharray="1400" strokeDashoffset="1400" style={{animation:'dash 1.6s ease forwards'}}/>
      <path d={path(dataB)} fill="none" stroke="#ff6363" strokeWidth="2" strokeLinecap="round" strokeDasharray="1400" strokeDashoffset="1400" style={{animation:'dash 1.9s ease forwards'}} opacity="0.85"/>
      {pts(dataA).slice(-1).map((p,i)=><circle key={i} cx={p[0]} cy={p[1]} r="3.5" fill="#56c2ff"><animate attributeName="r" values="3.5;6;3.5" dur="1.6s" repeatCount="indefinite"/></circle>)}
    </svg>
  );
}
function Spark({color}){
  const d=[6,9,7,12,10,15,13,18,16,20];const w=84,h=30;
  const p=d.map((v,i)=>(i?'L':'M')+(i/(d.length-1)*w).toFixed(1)+' '+(h-(v/22)*h).toFixed(1)).join(' ');
  return <svg className="spark" width={w} height={h}><path d={p} fill="none" stroke={color} strokeWidth="2" strokeLinecap="round"/></svg>;
}
function Donut({pct,color,label}){
  const r=30,c=2*Math.PI*r;
  return(<svg width="86" height="86" viewBox="0 0 86 86">
    <circle cx="43" cy="43" r={r} fill="none" stroke="rgba(255,255,255,0.07)" strokeWidth="9"/>
    <circle cx="43" cy="43" r={r} fill="none" stroke={color} strokeWidth="9" strokeLinecap="round"
      strokeDasharray={c} strokeDashoffset={c} transform="rotate(-90 43 43)"
      style={{animation:`dash 1.3s ease forwards`,strokeDashoffset:c*(1-pct/100)}}/>
    <text x="43" y="40" textAnchor="middle" fill="#fff" fontSize="18" fontWeight="700">{pct}%</text>
    <text x="43" y="55" textAnchor="middle" fill="#9c9c9d" fontSize="9">{label}</text>
  </svg>);
}

const TileHead=({ic,title,sub})=>(
  <div className="t-head"><span className="ti"><i className={"ph-bold ph-"+ic}></i></span><span className="t-title">{title}</span>{sub&&<span className="t-sub mono">{sub}</span>}</div>
);

/* ================= VIEW: 실시간 모니터링 (split-monitor: live-left chart + live-right feed + bottom-list) ================= */
function ViewMonitor(){
  const feed=[
    {ic:'check-circle',bg:'ok-bg',msg:<><b>그린팩토리 제조</b> · Flow 업로드 완료</>,meta:['09:14:06','5단계 전체 성공']},
    {ic:'spinner-gap',bg:'run-bg',msg:<><b>대성에너지 빌딩</b> · 엑셀 매핑 진행중</>,meta:['09:13:58','3/5 단계']},
    {ic:'warning',bg:'warn-bg',msg:<><b>한빛물류 센터</b> · OCR 신뢰도 낮음 (2필드)</>,meta:['09:13:40','수동 보정 대기']},
    {ic:'arrow-counter-clockwise',bg:'run-bg',msg:<><b>세종산업</b> · 크롤링 재시도 2/3</>,meta:['09:13:12','지수 백오프']},
    {ic:'check-circle',bg:'ok-bg',msg:<><b>미래테크</b> · PPT 생성 완료</>,meta:['09:12:30','다운로드 준비']},
    {ic:'x-circle',bg:'err-bg',msg:<><b>동국화학</b> · 캡차 차단 — 폴백 전환</>,meta:['09:11:55','OCR 업로드 안내']},
    {ic:'check-circle',bg:'ok-bg',msg:<><b>해성물산</b> · Flow 멘션 전송</>,meta:['09:11:20','담당자 알림']},
  ];
  const jobs=[
    {c:'그린팩토리 제조',stage:'Flow 업로드',st:'ok',lbl:'완료',p:100},
    {c:'대성에너지 빌딩',stage:'엑셀·계산',st:'run',lbl:'진행중',p:62},
    {c:'한빛물류 센터',stage:'OCR 보정',st:'wait',lbl:'대기',p:40},
    {c:'세종산업',stage:'크롤링',st:'run',lbl:'재시도',p:25},
    {c:'동국화학',stage:'크롤링',st:'err',lbl:'차단',p:0},
  ];
  return(
