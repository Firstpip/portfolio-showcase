<style>

  body{ background:#ffffff; color:var(--ink); -webkit-font-smoothing:antialiased; }
  .display{ letter-spacing:-0.045em; line-height:1.05; font-weight:800; }
  /* literal type scale (design-ref fidelity) */
  .ds-1{ font-size:42px; line-height:1.06; letter-spacing:-0.04em; font-weight:800; }
  .ds-2{ font-size:30px; line-height:1.14; letter-spacing:-0.02em; font-weight:800; }

  /* ===== keyframes (10+) ===== */
  @keyframes fadeIn{ from{opacity:0} to{opacity:1} }
  @keyframes slideUp{ from{opacity:0; transform:translateY(14px)} to{opacity:1; transform:translateY(0)} }
  @keyframes slideInRight{ from{opacity:0; transform:translateX(28px)} to{opacity:1; transform:translateX(0)} }
  @keyframes scaleIn{ from{opacity:0; transform:scale(.96)} to{opacity:1; transform:scale(1)} }
  @keyframes shimmer{ 0%{background-position:-460px 0} 100%{background-position:460px 0} }
  @keyframes pulseDot{ 0%,100%{ box-shadow:0 0 0 0 rgba(123,104,238,.45)} 50%{ box-shadow:0 0 0 6px rgba(123,104,238,0)} }
  @keyframes spin{ to{ transform:rotate(360deg) } }
  @keyframes progressFill{ from{width:0} }
  @keyframes barGrow{ from{ transform:scaleX(0); transform-origin:left } to{ transform:scaleX(1); transform-origin:left } }
  @keyframes rowGlow{ 0%{ background:rgba(123,104,238,.14) } 100%{ background:transparent } }
  @keyframes badgePop{ 0%{ transform:scale(.6); opacity:0 } 70%{ transform:scale(1.08) } 100%{ transform:scale(1); opacity:1 } }
  @keyframes floatY{ 0%,100%{ transform:translateY(0) } 50%{ transform:translateY(-6px) } }
  @keyframes countUp{ from{ opacity:0; transform:translateY(6px) } to{ opacity:1; transform:translateY(0) } }
  @keyframes gradientShift{ 0%{ background-position:0% 50% } 100%{ background-position:100% 50% } }

  .anim-fade{ animation:fadeIn .4s ease both }
  .anim-up{ animation:slideUp .42s cubic-bezier(.16,1,.3,1) both }
  .anim-right{ animation:slideInRight .4s cubic-bezier(.16,1,.3,1) both }
  .anim-scale{ animation:scaleIn .3s ease both }
  .anim-row{ animation:rowGlow 1.1s ease both }
  .anim-pop{ animation:badgePop .4s cubic-bezier(.34,1.56,.64,1) both }
  .bar-grow{ animation:barGrow .7s cubic-bezier(.16,1,.3,1) both }
  .skel{ background:linear-gradient(90deg,#f0f0f3 25%,#e4e4ea 37%,#f0f0f3 63%); background-size:920px 100%; animation:shimmer 1.4s infinite linear; }

  .nav-item{ transition:all .16s ease; border-radius:8px; }
  .nav-item:hover{ background:#f1eefe; color:var(--violet-deep); }
  .nav-item.active{ background:#efeafe; color:var(--violet-deep); font-weight:650; }
  .nav-item.active .nico{ color:var(--violet); }
  .row-hover{ transition:background .14s ease, box-shadow .14s ease; }
  .row-hover:hover{ background:#faf9ff; box-shadow:inset 3px 0 0 var(--violet); cursor:pointer; }
  .card-soft{ background:#fff; border:1px solid var(--cloud); border-radius:14px; box-shadow:0 1px 2px rgba(9,12,29,.04),0 8px 24px -16px rgba(9,12,29,.12); }
  .btn-violet{ background:var(--violet); color:#fff; transition:all .16s ease; }
  .btn-violet:hover{ background:var(--violet-deep); transform:translateY(-1px); box-shadow:0 8px 20px -8px rgba(123,104,238,.6); }
  .btn-dark{ background:var(--carbon,#202023); color:#fff; transition:all .16s ease; }
  .btn-dark:hover{ background:#000; transform:translateY(-1px); }
  .chip{ transition:all .14s ease; }
  .step-line{ background:linear-gradient(90deg,var(--violet),var(--violet-glow)); }
  .kbd{ font-family:ui-monospace,monospace; font-size:11px; background:#fff; border:1px solid var(--mist); border-bottom-width:2px; border-radius:5px; padding:1px 6px; color:var(--slate); }
  .gradient-head{ background:linear-gradient(110deg,#7b68ee,#0091ff,#6647f0); background-size:200% 200%; animation:gradientShift 6s ease-in-out infinite alternate; -webkit-background-clip:text; background-clip:text; color:transparent; }

/* ---------- 영업일 계산 ---------- */
function isWorkday(d){ const g=d.getDay(); const k=d.toISOString().slice(0,10); return g!==0 && g!==6 && !HOLIDAYS.includes(k); }
function addWorkdays(startStr, n){ // 시작일 포함 n 영업일의 마지막 날 반환
  let d=new Date(startStr+'T00:00:00'); let cnt=0;
  while(true){ if(isWorkday(d)) cnt++; if(cnt>=n) break; d.setDate(d.getDate()+1); }
  return d;
}
function diffDays(a,b){ return Math.round((b-a)/86400000); }
const fmtKRW = n => n.toLocaleString('ko-KR');

}

        <Stat icon="git-compare" label="조율 등급" value="2건" sub="조건 1개 충족 — 협의 진행" accent="#0091ff"/>

      <div className="card-soft overflow-hidden">

          {['REF-042 · 반도체 공정 브랜드 필름','REF-051 · 바이오 R&D 다큐','REF-069 · 제조 ESG 캠페인'].map((s,i)=>(
            <div key={i} className="flex items-center gap-2.5 py-2 border-b border-[#f3f3f6] last:border-0">
              <span className="w-9 h-9 rounded-lg bg-gradient-to-br from-[#7b68ee] to-[#0091ff] flex items-center justify-center"><Icon name="play" size={14} className="text-white"/></span>
              <span className="text-[13px] text-charcoal">{s}</span>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

/* ========== 단순 placeholder 뷰 ========== */
function ViewSimple({ title, desc, icon }){
  return (
    <div className="anim-fade">
      <h1 className="ds-1 mb-1">{title}</h1>
      <p className="text-[13px] text-slate2 mb-6">{desc}</p>
      <div className="card-soft p-10 flex flex-col items-center justify-center text-center">
        <div className="w-14 h-14 rounded-2xl bg-[#efeafe] flex items-center justify-center mb-3" style={{animation:'floatY 3s ease-in-out infinite'}}><Icon name={icon} size={26} className="text-violet"/></div>
        <div className="text-[15px] font-semibold">{title} 모듈</div>
        <div className="text-[13px] text-steel mt-1 max-w-md">{desc}</div>
      </div>
    </div>
  );
}

/* ---------- cmd-k 팔레트 ---------- */
function CmdK({ open, setOpen, setView }){
  const cmds=[['main','신규 문의','sparkles'],['quote','견적서 생성','calculator'],['portfolio','포트폴리오 매칭','wand-2'],['schedule','제작개요안','calendar-range'],['pdf','PDF 일괄 생성','file-down']];
  if(!open) return null;
  return (
    <div className="fixed inset-0 z-50 bg-black/30 backdrop-blur-sm flex items-start justify-center pt-[14vh] anim-fade" onClick={()=>setOpen(false)}>
      <div className="w-[520px] card-soft anim-scale overflow-hidden" onClick={e=>e.stopPropagation()}>
        <div className="flex items-center gap-2 px-4 py-3 border-b border-cloud">
          <Icon name="search" size={17} className="text-steel"/>
          <input autoFocus placeholder="명령 또는 화면 검색…" className="flex-1 text-[14px] outline-none"/>
          <span className="kbd">ESC</span>
        </div>
        <div className="p-2">
          {cmds.map(([id,label,icon])=>(
            <button key={id} onClick={()=>{setView(id);setOpen(false);}} className="w-full flex items-center gap-3 px-3 py-2.5 rounded-lg hover:bg-[#f1eefe] text-[13.5px] text-charcoal text-left">
              <Icon name={icon} size={16} className="text-steel"/>{label}
            </button>
          ))}
        </div>
      </div>
    </div>
  );
}

/* ---------- App ---------- */
const TITLES = { main:['신규 문의'], quote:['견적서 생성'], portfolio:['포트폴리오 매칭'], schedule:['제작개요안'] };
function App(){
  const [view,setView]=useState('main');
  const [cmd,setCmd]=useState(false);
  useEffect(()=>{
    const h=e=>{ if((e.metaKey||e.ctrlKey)&&e.key.toLowerCase()==='k'){ e.preventDefault(); setCmd(c=>!c);} if(e.key==='Escape') setCmd(false); };
    window.addEventListener('keydown',h); return ()=>window.removeEventListener('keydown',h);
  },[]);
  useEffect(()=>{ if(window.lucide) window.lucide.createIcons(); });
  const crumbs = TITLES[view] || [NAV.flatMap(g=>g.items).find(i=>i.id===view)?.label || '대시보드'];
  return (
    <div className="flex">
      <Sidebar view={view} setView={setView} onCmd={()=>setCmd(true)}/>
      <div className="flex-1 min-w-0">
        <Topbar crumbs={crumbs}/>
        <main className="p-7 max-w-[1280px]">
          {view==='main' && <ViewInquiries/>}
          {view==='quote' && <ViewQuote/>}
          {view==='portfolio' && <ViewPortfolio/>}
          {view==='schedule' && <ViewSchedule/>}
          {view==='pdf' && <ViewSimple title="PDF 일괄 생성" desc="선택한 문의 건의 견적서·제작개요안을 서버사이드 렌더링으로 일괄 PDF 변환합니다." icon="file-down"/>}
          {!['main','quote','portfolio','schedule','pdf'].includes(view) && <ViewSimple title={crumbs[0]} desc="견적 자동화 워크플로우의 보조 관리 화면입니다." icon="layout-dashboard"/>}
        </main>
      </div>
      <CmdK open={cmd} setOpen={setCmd} setView={setView}/>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
