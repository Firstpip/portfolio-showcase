<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>릴크래프트 인텔리전스 — 운영 분석</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
<link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/regular/style.css" />
<link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/fill/style.css" />
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone@7.27.3/babel.min.js"></script>
<script>
  tailwind.config = {
    theme:{ extend:{
      colors:{
        coral:{ DEFAULT:'#ff6363', soft:'#ff8b8b', deep:'#e23d3d' },
        void:'#040506', panel:'#07080a', panel2:'#0d0f12', line:'#1c1f24',
        ink2:'#e6e6e6', mute:'#9c9c9d', faint:'#6a6c70'
      },
      fontFamily:{ sans:['Pretendard','system-ui','sans-serif'] }
    }}
  }
</script>
<style>
  :root{ --coral:#ff6363; --coral-soft:#ff8b8b; --void:#040506; --panel:#07080a; --line:#1c1f24; --mute:#9c9c9d; }
  *{ font-family:'Pretendard',system-ui,sans-serif; }
  body{ background:#040506; color:#e6e6e6; -webkit-font-smoothing:antialiased; }
  .display{ letter-spacing:-0.04em; line-height:1.06; font-weight:800; }
  /* literal type scale (design-ref fidelity) */
  .ds-1{ font-size:40px; line-height:1.06; letter-spacing:-0.04em; font-weight:800; }
  .ds-2{ font-size:30px; line-height:1.12; letter-spacing:-0.02em; font-weight:800; }
  .ds-3{ font-size:22px; line-height:1.2; font-weight:700; }
  .ds-4{ font-size:17px; line-height:1.4; font-weight:600; }
  .ds-num{ font-size:34px; line-height:1; letter-spacing:-0.02em; font-weight:800; }
  .mono{ font-family:ui-monospace,'JetBrains Mono',monospace; letter-spacing:0.02em; }
  ::-webkit-scrollbar{ width:9px; height:9px; }
  ::-webkit-scrollbar-thumb{ background:#1c1f24; border-radius:8px; }
  ::-webkit-scrollbar-thumb:hover{ background:#2a2e34; }

  @keyframes fadeIn{ from{opacity:0} to{opacity:1} }
  @keyframes slideUp{ from{opacity:0; transform:translateY(14px)} to{opacity:1; transform:translateY(0)} }
  @keyframes slideDown{ from{opacity:0; transform:translateY(-12px)} to{opacity:1; transform:translateY(0)} }
  @keyframes scaleIn{ from{opacity:0; transform:scale(.96)} to{opacity:1; transform:scale(1)} }
  @keyframes drawLine{ from{ stroke-dashoffset:1000 } to{ stroke-dashoffset:0 } }
  @keyframes growUp{ from{ transform:scaleY(0); transform-origin:bottom } to{ transform:scaleY(1); transform-origin:bottom } }
  @keyframes spin{ to{ transform:rotate(360deg) } }
  @keyframes pulseGlow{ 0%,100%{ opacity:.5 } 50%{ opacity:1 } }
  @keyframes shimmer{ 0%{ background-position:-460px 0 } 100%{ background-position:460px 0 } }
  @keyframes floatY{ 0%,100%{ transform:translateY(0) } 50%{ transform:translateY(-5px) } }
  @keyframes dashFlow{ to{ stroke-dashoffset:-24 } }
  @keyframes countUp{ from{opacity:0; transform:translateY(6px)} to{opacity:1; transform:translateY(0)} }
  @keyframes ringGrow{ from{ stroke-dasharray:0 999 } }
  @keyframes auroraShift{ 0%{ background-position:0% 50% } 100%{ background-position:100% 50% } }

  .anim-fade{ animation:fadeIn .4s ease both }
  .anim-up{ animation:slideUp .42s cubic-bezier(.16,1,.3,1) both }
  .anim-down{ animation:slideDown .4s ease both }
  .anim-scale{ animation:scaleIn .32s ease both }
  .panel{ background:#07080a; border:1px solid #1c1f24; border-radius:14px; }
  .panel-hover{ transition:all .18s ease; }
  .panel-hover:hover{ border-color:#2c3036; transform:translateY(-2px); box-shadow:0 16px 40px -24px rgba(255,99,99,.35); }
  .kbd{ font-family:ui-monospace,monospace; font-size:11px; background:#0d0f12; border:1px solid #1c1f24; border-bottom-width:2px; border-radius:5px; padding:1px 6px; color:#9c9c9d; }
  .navlink{ transition:color .15s ease; position:relative; }
  .navlink:hover{ color:#fff; }
  .navlink.active{ color:#fff; }
  .navlink.active::after{ content:''; position:absolute; left:0; right:0; bottom:-17px; height:2px; background:linear-gradient(90deg,#ff6363,#ff8b8b); border-radius:2px; }
  .aurora{ background:radial-gradient(60% 120% at 20% 10%, rgba(255,99,99,.18), transparent 60%), radial-gradient(50% 100% at 90% 0%, rgba(120,99,255,.14), transparent 55%); }
  .glow-coral{ box-shadow:0 0 0 1px rgba(255,99,99,.25), 0 0 30px -8px rgba(255,99,99,.5); }
  .tab2{ transition:all .15s ease; }
  .grad-text{ background:linear-gradient(100deg,#ff6363,#ff8b8b,#b388ff); background-size:200% 200%; animation:auroraShift 6s ease-in-out infinite alternate; -webkit-background-clip:text; background-clip:text; color:transparent; }
</style>
</head>
<body data-archetype="topbar-analytics">
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useMemo } = React;
const I = ({n,c,s=18,w='regular',col}) => <i className={`ph${w==='fill'?'-fill':''} ph-${n} ${c||''}`} style={{fontSize:s, color:col}} />;

/* ---------- 데이터 ---------- */
const NAV=[['main','운영 대시보드'],['timeline','타임라인'],['report','성과 리포트'],['settings','분류 규칙 설정']];
const KPI=[
  { label:'주간 수집 문의', value:'48', unit:'건', delta:'자동 수집', icon:'tray-arrow-down', color:'#ff6363' },
  { label:'타겟 전환', value:'31', unit:'%', delta:'타겟+조율 비중', icon:'target', color:'#ff8b8b' },
  { label:'평균 응대 리드타임', value:'2.4', unit:'일', delta:'수집→메일초안', icon:'timer', color:'#b388ff' },
  { label:'자동 생성 문서', value:'126', unit:'건', delta:'견적+개요안', icon:'files', color:'#6ad0ff' },
];
const TREND=[12,18,15,24,22,30,28,36,33,42,38,48]; // 주간 추이
const CHANNELS=[['홈페이지',46,'#ff6363'],['메일',31,'#b388ff'],['전화',15,'#6ad0ff'],['소개',8,'#ffc24b']];
const TIERS=[['타겟',34,'#ff6363'],['조율',22,'#ff8b8b'],['롱테일',28,'#6a6c70'],['비타겟',16,'#3a3d42']];
const STAGES=[
  { name:'문의 수집', t:'00:02', desc:'홈페이지 폼 → DB 자동 적재', icon:'tray-arrow-down', done:true },
  { name:'타겟 분류', t:'00:01', desc:'예산 500만↑·기한 → 타겟 판정', icon:'funnel', done:true },
  { name:'포트폴리오 매칭', t:'00:38', desc:'임베딩 매칭 → 레퍼런스 3편', icon:'magic-wand', done:true },
  { name:'견적서 생성', t:'01:12', desc:'부문별 자동계산 → 복수 안', icon:'calculator', done:true },
  { name:'개요안 생성', t:'00:54', desc:'개요+포폴+간트 자동 삽입', icon:'calendar', done:true },
  { name:'메일 초안', t:'00:20', desc:'템플릿 매핑 → 발송 대기열', icon:'envelope-simple', done:false },
];
const REPORT=[
  ['홈페이지','22','9','41%','3,180만'],
  ['메일','15','5','33%','2,640만'],
  ['전화','7','4','57%','5,210만'],
  ['소개','4','3','75%','4,050만'],
];

/* ---------- 차트들 ---------- */
function LineChart({ data }){
  const w=560,h=180,p=24;
  const max=Math.max(...data),min=Math.min(...data);
  const pts=data.map((v,i)=>[p+i*(w-2*p)/(data.length-1), h-p-(v-min)/(max-min)*(h-2*p)]);
  const d='M'+pts.map(p=>p.join(',')).join(' L');
  const area=d+` L${pts[pts.length-1][0]},${h-p} L${pts[0][0]},${h-p} Z`;
  return (
    <svg viewBox={`0 0 ${w} ${h}`} className="w-full">
      <defs>
        <linearGradient id="ln" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor="#ff6363" stopOpacity="0.35"/><stop offset="100%" stopColor="#ff6363" stopOpacity="0"/></linearGradient>
      </defs>
      {[0,1,2,3].map(i=>(<line key={i} x1={p} x2={w-p} y1={p+i*(h-2*p)/3} y2={p+i*(h-2*p)/3} stroke="#1c1f24"/>))}
      <path d={area} fill="url(#ln)"/>
      <path d={d} fill="none" stroke="#ff6363" strokeWidth="2.5" strokeLinecap="round" strokeDasharray="1000" style={{animation:'drawLine 1.6s ease forwards'}}/>
      {pts.map((pt,i)=>(<circle key={i} cx={pt[0]} cy={pt[1]} r="3" fill="#040506" stroke="#ff8b8b" strokeWidth="2" style={{animation:`fadeIn .4s ease ${0.9+i*0.05}s both`}}/>))}
    </svg>
  );
}
function Donut({ data, total }){
  const r=52,c=2*Math.PI*r; let acc=0;
  return (
    <svg viewBox="0 0 140 140" className="w-[150px] h-[150px]">
      <circle cx="70" cy="70" r={r} fill="none" stroke="#14171b" strokeWidth="16"/>
      {data.map(([label,v,color],i)=>{
        const frac=v/total, off=acc; acc+=frac;
        return <circle key={i} cx="70" cy="70" r={r} fill="none" stroke={color} strokeWidth="16"
          strokeDasharray={`${frac*c} ${c}`} strokeDashoffset={-off*c} transform="rotate(-90 70 70)" strokeLinecap="butt"
          style={{animation:`ringGrow 1.1s ease ${i*0.12}s both`}}/>;
      })}
      <text x="70" y="66" textAnchor="middle" className="mono" fill="#e6e6e6" fontSize="20" fontWeight="800">{total}</text>
      <text x="70" y="84" textAnchor="middle" fill="#9c9c9d" fontSize="9">건/주</text>
    </svg>
  );
}
function Bars({ data }){
  const max=Math.max(...data.map(d=>d[1]));
  return (
    <div className="flex items-end gap-3 h-[150px] pt-2">
      {data.map(([label,v,color],i)=>(
        <div key={i} className="flex-1 flex flex-col items-center justify-end gap-2">
          <div className="text-[11px] mono" style={{color}}>{v}%</div>
          <div className="w-full rounded-t-md" style={{height:`${v/max*100}%`,background:`linear-gradient(180deg,${color},${color}55)`,animation:`growUp .8s cubic-bezier(.16,1,.3,1) ${i*0.08}s both`}}/>
          <div className="text-[11px] text-mute">{label}</div>
        </div>
      ))}
    </div>
  );
}

/* ---------- Topbar (사이드바 없음) ---------- */
function Topbar({ view, setView }){
  return (
    <header className="topnav sticky top-0 z-30 h-16 bg-void/85 backdrop-blur border-b border-line flex items-center px-7 gap-8">
      <div className="flex items-center gap-2.5">
        <div className="w-8 h-8 rounded-lg flex items-center justify-center glow-coral" style={{background:'linear-gradient(135deg,#ff6363,#e23d3d)'}}><I n="chart-line-up" c="text-white" s={18} w="fill"/></div>
        <div className="text-[15px] font-extrabold tracking-tight">릴크래프트 <span className="text-coral">인텔리전스</span></div>
      </div>
      <nav className="flex items-center gap-7 text-[13.5px] text-mute">
        <button onClick={()=>setView('main')} className={'navlink '+(view==='main'?'active':'')}>운영 대시보드</button>
        <button onClick={()=>setView('timeline')} className={'navlink '+(view==='timeline'?'active':'')}>타임라인</button>
        <button onClick={()=>setView('report')} className={'navlink '+(view==='report'?'active':'')}>성과 리포트</button>
        <button onClick={()=>setView('settings')} className={'navlink '+(view==='settings'?'active':'')}>분류 규칙 설정</button>
      </nav>
      <div className="ml-auto flex items-center gap-3">
        <button className="flex items-center gap-2 text-[12.5px] text-mute bg-panel2 border border-line rounded-lg px-3 py-1.5"><I n="magnifying-glass" s={14}/>검색<span className="kbd ml-1">⌘K</span></button>
        <div className="w-8 h-8 rounded-full bg-panel2 border border-line flex items-center justify-center"><I n="user" c="text-mute" s={16}/></div>
      </div>
    </header>
  );
}
function Stat({ k, i }){
  return (
    <div className="panel panel-hover p-4" style={{animation:`slideUp .42s ease ${i*0.06}s both`}}>
      <div className="flex items-center justify-between mb-3">
        <span className="w-8 h-8 rounded-lg flex items-center justify-center" style={{background:k.color+'1f'}}><I n={k.icon} s={16} col={k.color} w="fill"/></span>
        <span className="text-[11px] text-faint">{k.delta}</span>
      </div>
      <div className="stat-value flex items-end gap-1" style={{animation:'countUp .5s ease both'}}>
        <span className="ds-num leading-none">{k.value}</span>
        <span className="text-[13px] text-mute mb-1">{k.unit}</span>
      </div>
      <div className="text-[12px] text-mute mt-1">{k.label}</div>
    </div>
  );
}

/* ===== VIEW: 운영 대시보드 (insight-board) ===== */
function ViewMain(){
  return (
    <div className="anim-fade">
      <div className="aurora rounded-2xl p-6 mb-5 border border-line anim-down">
        <div className="text-[12px] mono text-coral mb-1">OPERATIONS INTELLIGENCE</div>
        <h1 className="ds-1">인바운드 응대 <span className="grad-text">운영 현황</span></h1>
        <p className="text-[13.5px] text-mute mt-1.5">문의 수집부터 메일 초안까지 자동화 파이프라인의 실시간 운영 지표를 한 화면에서 모니터링합니다.</p>
      </div>

      <div className="grid grid-cols-4 gap-3 mb-4">
        {KPI.map((k,i)=><Stat key={i} k={k} i={i}/>)}
      </div>

      <div className="grid grid-cols-[1fr_360px] gap-4 mb-4">
        {/* hero-viz */}
        <div className="panel p-5 anim-up">
          <div className="flex items-center justify-between mb-2">
            <div className="text-[14px] font-semibold flex items-center gap-2"><I n="chart-line-up" c="text-coral" s={16}/>주간 문의 수집 추이</div>
            <div className="flex gap-1">{['4주','12주','연간'].map((t,i)=>(<span key={t} className={'tab2 text-[11.5px] px-2.5 py-1 rounded-md '+(i===1?'bg-panel2 text-ink2 border border-line':'text-faint')}>{t}</span>))}</div>
          </div>
          <LineChart data={TREND}/>
        </div>
        {/* kpi-side: donut */}
        <div className="panel p-5 anim-up flex flex-col items-center">
          <div className="text-[14px] font-semibold self-start mb-2 flex items-center gap-2"><I n="chart-donut" c="text-coral" s={16}/>채널별 유입</div>
          <Donut data={CHANNELS} total={CHANNELS.reduce((a,c)=>a+c[1],0)}/>
          <div className="grid grid-cols-2 gap-2 mt-4 w-full">
            {CHANNELS.map(([l,v,c])=>(<div key={l} className="flex items-center gap-2 text-[12px]"><span className="w-2.5 h-2.5 rounded-sm" style={{background:c}}/><span className="text-mute">{l}</span><span className="ml-auto mono">{v}</span></div>))}
          </div>
        </div>
      </div>

      {/* widget-grid */}
      <div className="grid grid-cols-3 gap-4">
        <div className="panel p-5 anim-up">
          <div className="text-[14px] font-semibold mb-3 flex items-center gap-2"><I n="chart-bar" c="text-coral" s={16}/>타겟 등급 분포</div>
          <Bars data={TIERS}/>
        </div>
        <div className="panel p-5 anim-up col-span-2">
          <div className="text-[14px] font-semibold mb-3 flex items-center gap-2"><I n="lightning" c="text-coral" s={16} w="fill"/>자동화 처리 현황</div>
          <div className="grid grid-cols-3 gap-3">
            {STAGES.slice(0,6).map((s,i)=>(
              <div key={i} className="bg-panel2 border border-line rounded-xl p-3" style={{animation:`scaleIn .35s ease ${i*0.05}s both`}}>
                <div className="flex items-center justify-between mb-1.5">
                  <I n={s.icon} c={s.done?'text-coral':'text-faint'} s={16}/>
                  <span className={'text-[10px] px-1.5 py-0.5 rounded '+(s.done?'bg-[#13251a] text-[#5ad08a]':'bg-panel text-faint')}>{s.done?'완료':'대기'}</span>
                </div>
                <div className="text-[12.5px] font-medium">{s.name}</div>
                <div className="text-[10.5px] text-faint mono mt-0.5">avg {s.t}</div>
              </div>
            ))}
          </div>
        </div>
      </div>
    </div>
  );
}

/* ===== VIEW: 타임라인 ===== */
function ViewTimeline(){
  return (
    <div className="anim-fade max-w-[860px]">
      <h1 className="ds-1 mb-1">문의 상세 <span className="grad-text">타임라인</span></h1>
      <p className="text-[13.5px] text-mute mb-6">개별 문의가 수집→분류→매칭→견적→개요안→메일초안까지 거치는 단계별 소요 시간을 추적합니다.</p>

      <div className="panel p-6">
        <div className="flex items-center gap-3 mb-6 pb-4 border-b border-line">
          <span className="text-[11px] font-semibold px-2 py-0.5 rounded-md bg-[#2a1416] text-coral border border-[#4a2125]">타겟</span>
          <div><div className="font-bold text-[16px]">노바셀 헬스케어</div><div className="text-[12px] text-faint mono">INQ-2060 · 제품 광고</div></div>
          <div className="ml-auto text-right"><div className="text-[12px] text-mute">총 리드타임</div><div className="text-[18px] font-extrabold mono text-coral">3분 07초</div></div>
        </div>
        <div className="relative pl-8">
          <div className="absolute left-[11px] top-1 bottom-1 w-[2px]" style={{background:'linear-gradient(180deg,#ff6363,#1c1f24)'}}/>
          {STAGES.map((s,i)=>(
            <div key={i} className="relative mb-6 last:mb-0" style={{animation:`slideUp .4s ease ${i*0.08}s both`}}>
              <span className={'absolute -left-8 w-6 h-6 rounded-full flex items-center justify-center border-2 '+(s.done?'bg-[#1a0d0e] border-coral':'bg-panel border-line')}>
                <I n={s.done?'check':'circle'} c={s.done?'text-coral':'text-faint'} s={12} w={s.done?'bold':'regular'}/>
              </span>
              <div className="flex items-center justify-between">
                <div className="flex items-center gap-2"><I n={s.icon} c="text-mute" s={16}/><span className="font-semibold text-[14px]">{s.name}</span></div>
                <span className="mono text-[12px] text-faint">+{s.t}</span>
              </div>
              <div className="text-[12.5px] text-mute mt-1 ml-6">{s.desc}</div>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

/* ===== VIEW: 성과 리포트 ===== */
function ViewReport(){
  return (
    <div className="anim-fade">
      <div className="flex items-end justify-between mb-5">
        <div>
          <h1 className="ds-1">채널·등급별 <span className="grad-text">성과 리포트</span></h1>
          <p className="text-[13.5px] text-mute mt-1">월별 채널·타겟 등급별 응대 현황 리포트를 자동 생성해 발송 대기 목록에 추가합니다.</p>
        </div>
        <button className="text-[13px] font-semibold px-4 py-2.5 rounded-lg text-white flex items-center gap-1.5" style={{background:'linear-gradient(135deg,#ff6363,#e23d3d)'}}><I n="file-pdf" c="text-white" s={16}/>리포트 PDF</button>
      </div>

      <div className="grid grid-cols-2 gap-4 mb-4">
        <div className="panel p-5"><div className="text-[14px] font-semibold mb-3 flex items-center gap-2"><I n="chart-bar" c="text-coral" s={16}/>채널별 문의량</div><Bars data={CHANNELS}/></div>
        <div className="panel p-5"><div className="text-[14px] font-semibold mb-3 flex items-center gap-2"><I n="chart-line" c="text-coral" s={16}/>주간 추이</div><LineChart data={TREND.slice(4)}/></div>
      </div>

      <div className="panel overflow-hidden">
        <div className="px-5 py-3 border-b border-line text-[14px] font-semibold flex items-center gap-2"><I n="table" c="text-coral" s={16}/>채널별 응대 성과표</div>
        <table className="w-full text-[13px]">
          <thead><tr className="text-[11.5px] text-faint border-b border-line">
            <th className="text-left font-medium px-5 py-2.5">채널</th><th className="text-right font-medium px-3 py-2.5">문의</th><th className="text-right font-medium px-3 py-2.5">타겟</th><th className="text-right font-medium px-3 py-2.5">타겟 비율</th><th className="text-right font-medium px-5 py-2.5">평균 수주가</th>
          </tr></thead>
          <tbody>
            {REPORT.map((r,i)=>(
              <tr key={i} className="border-b border-[#121418] hover:bg-panel2 transition" style={{animation:`fadeIn .4s ease ${i*0.05}s both`}}>
                <td className="px-5 py-3 font-medium">{r[0]}</td>
                <td className="px-3 py-3 text-right text-mute mono">{r[1]}</td>
                <td className="px-3 py-3 text-right text-mute mono">{r[2]}</td>
                <td className="px-3 py-3 text-right"><span className="text-coral mono">{r[3]}</span></td>
                <td className="px-5 py-3 text-right font-semibold mono">{r[4]}원</td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>
    </div>
  );
}

/* ===== VIEW: 분류 규칙 설정 ===== */
function ViewSettings(){
  const [t1,setT1]=useState(500); const [t2,setT2]=useState(true);
  return (
    <div className="anim-fade max-w-[760px]">
      <h1 className="ds-1 mb-1">타겟 <span className="grad-text">분류 규칙 설정</span></h1>
      <p className="text-[13.5px] text-mute mb-6">예산·기한 조건을 편집하면 신규 문의에 즉시 반영됩니다. (규칙 핫 리로드)</p>

      <div className="panel p-6 mb-4">
        <div className="text-[14px] font-semibold mb-4 flex items-center gap-2"><I n="funnel" c="text-coral" s={16} w="fill"/>타겟 판정 조건</div>
        <div className="space-y-5">
          <div>
            <div className="flex items-center justify-between mb-2"><span className="text-[13px]">지불 용의 최소 금액</span><span className="mono text-coral font-semibold">{t1}만원</span></div>
            <input type="range" min="100" max="1000" step="50" value={t1} onChange={e=>setT1(+e.target.value)} className="w-full accent-[#ff6363]"/>
          </div>
          <div className="flex items-center justify-between py-2 border-t border-line">
            <div><div className="text-[13px]">제작 기한 확정 필수</div><div className="text-[11.5px] text-faint">기한 미정 시 타겟에서 제외</div></div>
            <button onClick={()=>setT2(v=>!v)} className={'w-12 h-6 rounded-full transition relative '+(t2?'bg-coral':'bg-line')}><span className={'absolute top-0.5 w-5 h-5 rounded-full bg-white transition-all '+(t2?'left-[26px]':'left-0.5')}/></button>
          </div>
        </div>
      </div>

      <div className="grid grid-cols-2 gap-3 mb-4">
        {[['타겟','두 조건 모두 충족','#ff6363'],['조율','한 조건만 충족','#ff8b8b'],['롱테일','500만↓·기한 없음','#6a6c70'],['비타겟','과업 불가·일반 문의','#3a3d42']].map(([n,d,c],i)=>(
          <div key={n} className="panel p-4 flex items-center gap-3" style={{animation:`scaleIn .35s ease ${i*0.05}s both`}}>
            <span className="w-9 h-9 rounded-lg flex items-center justify-center shrink-0" style={{background:c+'22'}}><I n="tag" s={16} col={c}/></span>
            <div><div className="text-[13.5px] font-semibold" style={{color:c==='#3a3d42'?'#9c9c9d':c}}>{n}</div><div className="text-[11.5px] text-faint">{d}</div></div>
          </div>
        ))}
      </div>

      <div className="flex justify-end gap-2">
        <button className="text-[13px] px-4 py-2.5 rounded-lg border border-line text-mute hover:text-white transition">초기화</button>
        <button className="text-[13px] font-semibold px-5 py-2.5 rounded-lg text-white flex items-center gap-1.5" style={{background:'linear-gradient(135deg,#ff6363,#e23d3d)'}}><I n="check" c="text-white" s={15} w="bold"/>규칙 저장 · 즉시 반영</button>
      </div>
    </div>
  );
}

function App(){
  const [view,setView]=useState('main');
  return (
    <div>
      <Topbar view={view} setView={setView}/>
      <main className="p-7 max-w-[1180px] mx-auto">
        {view==='main' && <ViewMain/>}
        {view==='timeline' && <ViewTimeline/>}
        {view==='report' && <ViewReport/>}
        {view==='settings' && <ViewSettings/>}
      </main>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
