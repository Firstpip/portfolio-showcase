<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>근무평가 관리 시스템 — 맞춤 구현 데모</title>
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" rel="stylesheet">
<script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone@7.27.3/babel.min.js" crossorigin></script>
<script src="https://unpkg.com/prop-types/prop-types.min.js"></script>
<script src="https://unpkg.com/recharts@2.8.0/umd/Recharts.js" crossorigin></script>
<style>
:root{
  --ink:#101010;--blue:#0099ff;--green:#3ad98a;--paper:#f4f4f4;
  --white:#fff;--graphite:#242424;--slate:#6b7280;--silver:#e5e7eb;
  --stone:#898989;--sidebar-w:240px;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{background:var(--paper);font-family:'Pretendard',-apple-system,sans-serif;
  color:var(--graphite);font-size:14px;line-height:1.5}

@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes countUp{from{opacity:0;transform:scale(.85)}to{opacity:1;transform:scale(1)}}
@keyframes shimmer{0%{background-position:-400px 0}100%{background-position:400px 0}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
@keyframes slideRight{from{opacity:0;transform:translateX(14px)}to{opacity:1;transform:translateX(0)}}
@keyframes ripple{0%{transform:scale(0);opacity:.5}100%{transform:scale(2.5);opacity:0}}

/* ── Sidebar ──────────────────────────────── */
.sidebar{position:fixed;left:0;top:0;bottom:0;width:var(--sidebar-w);
  background:var(--ink);display:flex;flex-direction:column;z-index:100;overflow-y:auto}
.sb-brand{padding:18px 16px;border-bottom:1px solid rgba(255,255,255,.1);
  display:flex;align-items:center;gap:10px}
.sb-logo{width:30px;height:30px;border-radius:8px;background:var(--green);
  display:flex;align-items:center;justify-content:center;
  font-weight:900;font-size:13px;color:var(--ink);flex-shrink:0}
.sb-brand-text .sb-title{color:#fff;font-weight:700;font-size:14.5px}
.sb-brand-text .sb-env{color:rgba(255,255,255,.35);font-size:10.5px;margin-top:1px}
.sb-section{padding:14px 8px 4px}
.sb-section-label{color:rgba(255,255,255,.3);font-size:10px;font-weight:700;
  text-transform:uppercase;letter-spacing:.1em;padding:0 8px;margin-bottom:3px}
.sb-link{display:flex;align-items:center;gap:9px;padding:8px 10px;border-radius:7px;
  color:rgba(255,255,255,.6);cursor:pointer;font-size:13px;transition:all .15s;
  border:none;background:none;width:100%;text-align:left;font-family:inherit}
.sb-link:hover{background:rgba(255,255,255,.09);color:#fff}
.sb-link.active{background:rgba(255,255,255,.14);color:#fff}
.sb-link svg{opacity:.7;flex-shrink:0}
.sb-link.active svg{opacity:1}
.sb-badge{margin-left:auto;background:var(--green);color:var(--ink);
  font-size:10px;font-weight:800;padding:1px 7px;border-radius:9999px}
.sb-footer{margin-top:auto;padding:14px 12px;border-top:1px solid rgba(255,255,255,.07)}
.sb-user{display:flex;align-items:center;gap:9px}
.sb-avatar{width:28px;height:28px;border-radius:9999px;background:#3a3a3a;
  display:flex;align-items:center;justify-content:center;
  color:#fff;font-size:11px;font-weight:700;flex-shrink:0}
.sb-user-name{color:#fff;font-size:12.5px;font-weight:600}
.sb-user-role{color:rgba(255,255,255,.35);font-size:10.5px}

/* ── Main wrap ────────────────────────────── */
.main-wrap{margin-left:var(--sidebar-w);min-height:100vh;flex:1;
  min-width:0;width:calc(100% - var(--sidebar-w))}

/* ── Page header ──────────────────────────── */
.page-header{padding:20px 28px 0;border-bottom:1px solid var(--silver);
  background:var(--white)}
.ph-row{display:flex;align-items:flex-start;justify-content:space-between;
  padding-bottom:14px}
.ph-left .ph-title{font-size:36px;font-weight:800;letter-spacing:-.4px;line-height:1.1}
.ph-left .ph-meta{font-size:12px;color:var(--slate);margin-top:3px;
  display:flex;align-items:center;gap:6px}
.ph-actions{display:flex;gap:8px;flex-shrink:0}
.btn-p{background:var(--ink);color:#fff;border:none;border-radius:9999px;
  padding:8px 20px;font-size:13px;font-weight:600;cursor:pointer;
  font-family:inherit;transition:opacity .15s;display:flex;align-items:center;gap:6px}
.btn-p:hover{opacity:.82}
.btn-s{background:var(--white);color:var(--graphite);border:1px solid var(--silver);
  border-radius:9999px;padding:8px 18px;font-size:13px;font-weight:500;
  cursor:pointer;font-family:inherit;transition:background .15s;
  display:flex;align-items:center;gap:6px}
.btn-s:hover{background:var(--paper)}
.btn-sm{background:var(--paper);color:var(--graphite);border:1px solid var(--silver);
  border-radius:8px;padding:6px 14px;font-size:12px;font-weight:600;
  cursor:pointer;font-family:inherit;display:flex;align-items:center;gap:5px}

/* ── Stat cards ───────────────────────────── */
.stat-row{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;padding:18px 28px}
.stat-card{background:var(--white);border:1px solid var(--silver);border-radius:12px;
  padding:18px 20px;animation:fadeUp .4s ease both;position:relative;overflow:hidden}
.stat-card:nth-child(2){animation-delay:.07s}
.stat-card:nth-child(3){animation-delay:.13s}
.stat-card:nth-child(4){animation-delay:.19s}
.stat-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px}
.stat-label{font-size:11px;color:var(--slate);text-transform:uppercase;
  letter-spacing:.07em;font-weight:600}
.stat-icon-wrap{width:28px;height:28px;border-radius:8px;
  display:flex;align-items:center;justify-content:center}
.stat-value{font-size:30px;font-weight:800;color:var(--graphite);
  letter-spacing:-.5px;line-height:1;animation:countUp .55s ease both}
.stat-sub{display:flex;align-items:center;gap:5px;margin-top:5px}
.stat-delta{font-size:12px;font-weight:600}
.delta-p{color:var(--green)}
.delta-n{color:#ef4444}
.stat-desc{font-size:11px;color:var(--slate)}

/* ── Tab bar ──────────────────────────────── */
.tab-bar{display:flex;border-bottom:1px solid var(--silver);padding:0 28px;
  background:var(--white)}
.tab{padding:10px 14px;font-size:13px;font-weight:500;color:var(--slate);
  border:none;background:none;cursor:pointer;border-bottom:2px solid transparent;
  font-family:inherit;transition:all .15s}
.tab:hover{color:var(--graphite)}
.tab.active{color:var(--graphite);border-bottom-color:var(--ink)}

/* ── Data section ─────────────────────────── */
.section-body{padding:18px 28px}
.toolbar{display:flex;align-items:center;gap:8px;margin-bottom:14px}
.search-wrap{display:flex;align-items:center;gap:7px;border:1px solid var(--silver);
  border-radius:8px;padding:7px 11px;background:var(--white);width:210px}
.search-wrap input{border:none;outline:none;font-size:13px;font-family:inherit;
  background:transparent;color:var(--graphite);width:100%}
.chip{border:1px solid var(--silver);border-radius:9999px;padding:5px 13px;
  font-size:12px;font-weight:500;background:var(--white);color:var(--slate);
  cursor:pointer;font-family:inherit;transition:all .15s}
.chip:hover{border-color:#aaa}
.chip.on{background:var(--ink);color:#fff;border-color:var(--ink)}
.ml-auto{margin-left:auto}

/* ── Data table ───────────────────────────── */
.table-wrap{background:var(--white);border:1px solid var(--silver);
  border-radius:12px;overflow:hidden}
.data-table{width:100%;border-collapse:collapse;font-size:13.5px}
.data-table thead th{background:var(--paper);padding:9px 16px;text-align:left;
  font-size:10.5px;font-weight:700;color:var(--slate);
  text-transform:uppercase;letter-spacing:.07em;border-bottom:1px solid var(--silver)}
.data-table tbody tr{border-bottom:1px solid var(--silver);cursor:pointer;transition:background .1s}
.data-table tbody tr:hover{background:#fafafa}
.data-table tbody tr:last-child{border-bottom:none}
.data-table tbody td{padding:11px 16px}
.badge{display:inline-flex;align-items:center;padding:2px 9px;
  border-radius:4px;font-size:11px;font-weight:700}
.badge-done{background:#d1fae5;color:#065f46}
.badge-prog{background:#fef3c7;color:#92400e}
.badge-wait{background:#f3f4f6;color:var(--slate)}
.badge-a{background:#dbeafe;color:#1e40af}
.badge-b{background:#dcfce7;color:#166534}
.badge-c{background:#fef9c3;color:#713f12}
.row-num{color:var(--slate);font-size:12px}
.name-cell .name-main{font-weight:600;font-size:13.5px}
.name-cell .name-sub{font-size:11px;color:var(--slate);margin-top:1px}
.actions-cell{display:flex;gap:6px}

/* ── Master-detail ────────────────────────── */
.master-detail{display:grid;grid-template-columns:310px 1fr;
  border:1px solid var(--silver);border-radius:12px;overflow:hidden;
  background:var(--white);min-height:500px}
.list-rail{border-right:1px solid var(--silver);overflow-y:auto;max-height:600px}
.lr-header{padding:10px 12px;border-bottom:1px solid var(--silver);
  display:flex;align-items:center;gap:8px}
.lr-header input{border:1px solid var(--silver);border-radius:8px;
  padding:6px 10px;font-size:12.5px;font-family:inherit;outline:none;
  flex:1;color:var(--graphite)}
.lr-header input:focus{border-color:var(--blue)}
.lr-count{font-size:11px;color:var(--slate);white-space:nowrap}
.list-item{padding:10px 14px;border-bottom:1px solid var(--silver);
  cursor:pointer;transition:background .1s;display:flex;align-items:center;gap:9px}
.list-item:hover{background:var(--paper)}
.list-item.sel{background:#eff6ff;border-left:3px solid var(--blue)}
.li-avatar{width:30px;height:30px;border-radius:9999px;
  display:flex;align-items:center;justify-content:center;
  font-size:11px;font-weight:800;flex-shrink:0;color:#fff}
.li-info .li-name{font-size:13px;font-weight:600}
.li-info .li-sub{font-size:11px;color:var(--slate);margin-top:1px}
.li-status{margin-left:auto;flex-shrink:0}
.detail-panel{padding:22px 24px;animation:slideRight .25s ease}
.dp-head{display:flex;align-items:flex-start;justify-content:space-between;
  margin-bottom:18px;padding-bottom:16px;border-bottom:1px solid var(--silver)}
.dp-name{font-size:19px;font-weight:800;margin-bottom:3px}
.dp-sub{font-size:12.5px;color:var(--slate)}
.dp-info-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:18px}
.dp-info-item{background:var(--paper);border-radius:8px;padding:10px 12px}
.dp-info-label{font-size:10.5px;color:var(--slate);font-weight:600;
  text-transform:uppercase;letter-spacing:.07em;margin-bottom:3px}
.dp-info-val{font-size:13.5px;font-weight:700}
.dp-eval-title{font-size:12px;font-weight:700;color:var(--slate);
  text-transform:uppercase;letter-spacing:.07em;margin-bottom:10px}
.dp-eval-row{display:flex;align-items:center;gap:10px;padding:7px 0;
  border-bottom:1px solid var(--silver)}
.dp-eval-row:last-child{border-bottom:none}
.dep-label{flex:1;font-size:13px}
.dep-bar-wrap{width:100px;height:5px;background:var(--silver);border-radius:9999px;overflow:hidden}
.dep-bar{height:100%;border-radius:9999px;transition:width .4s ease}
.dep-score{width:32px;text-align:right;font-size:13px;font-weight:700}

/* ── Evaluation form ──────────────────────── */
.eval-wrap{padding:18px 28px}
.driver-picker{background:var(--white);border:1px solid var(--silver);
  border-radius:12px;padding:14px 18px;margin-bottom:16px;
  display:flex;align-items:center;gap:12px}
.picker-label{font-size:13px;font-weight:600;color:var(--slate)}
select.picker-sel{border:1px solid var(--silver);border-radius:8px;
  padding:7px 12px;font-size:13px;font-family:inherit;
  background:var(--white);color:var(--graphite);outline:none;cursor:pointer}
select.picker-sel:focus{border-color:var(--blue)}
.progress-info{margin-left:auto;display:flex;align-items:center;gap:8px;
  font-size:12.5px;color:var(--slate)}
.progress-info strong{color:var(--graphite);font-weight:700}
.eval-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.eval-form-card{background:var(--white);border:1px solid var(--silver);
  border-radius:12px;padding:18px 20px}
.eval-form-card.full{grid-column:1/-1}
.efc-title{font-size:12px;font-weight:700;text-transform:uppercase;
  letter-spacing:.07em;color:var(--slate);margin-bottom:12px;
  display:flex;align-items:center;gap:6px;padding-bottom:10px;
  border-bottom:1px solid var(--silver)}
.indicator-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.ind-field{display:flex;flex-direction:column;gap:4px}
.ind-label{font-size:12px;font-weight:600;color:var(--graphite)}
.ind-unit{font-size:10.5px;color:var(--slate)}
.ind-input{border:1px solid var(--silver);border-radius:8px;
  padding:7px 11px;font-size:13px;font-family:inherit;
  background:var(--white);color:var(--graphite);outline:none}
.ind-input:focus{border-color:var(--blue)}
.total-bar{background:var(--ink);color:#fff;border-radius:12px;
  padding:14px 22px;display:flex;align-items:center;justify-content:space-between;
  margin-top:14px}
.total-label{font-size:14px;font-weight:500}
.total-right{display:flex;align-items:center;gap:12px}
.total-value{font-size:26px;font-weight:900;letter-spacing:-.5px}
.total-grade{font-size:16px;font-weight:800;padding:4px 14px;
  border-radius:9999px;background:var(--green);color:var(--ink)}

/* ── Formula settings ─────────────────────── */
.formula-wrap{padding:18px 28px}
.formula-cards{display:grid;grid-template-columns:1.2fr 1fr;gap:16px}
.fc{background:var(--white);border:1px solid var(--silver);border-radius:12px;padding:18px 20px}
.fc-title{font-size:14px;font-weight:700;margin-bottom:3px}
.fc-desc{font-size:12px;color:var(--slate);margin-bottom:14px}
.total-weight{font-size:12px;color:var(--slate);margin-top:10px;
  padding-top:10px;border-top:1px solid var(--silver);
  display:flex;align-items:center;gap:6px}
.total-weight strong{color:var(--graphite)}
.wi{display:flex;align-items:center;gap:10px;padding:9px 0;
  border-bottom:1px solid var(--silver)}
.wi:last-child{border-bottom:none}
.wi-name{flex:1;font-size:13px;font-weight:500}
.wi-bar-bg{flex:2;height:6px;border-radius:9999px;background:var(--silver);position:relative}
.wi-fill{height:100%;border-radius:9999px;background:var(--ink);transition:width .4s}
.wi-pct{width:42px;text-align:right;font-size:13px;font-weight:700}
.grade-card{background:var(--white);border:1px solid var(--silver);
  border-radius:12px;padding:18px 20px}
.grade-rows{margin-top:0}
.grade-row{display:flex;align-items:center;gap:12px;padding:9px 0;
  border-bottom:1px solid var(--silver)}
.grade-row:last-child{border-bottom:none}
.grade-letter{width:28px;height:28px;border-radius:9999px;
  display:flex;align-items:center;justify-content:center;
  font-weight:800;font-size:13px}
.grade-range{flex:1;font-size:13px;font-weight:500}
.grade-count{font-size:12px;color:var(--slate)}
.grade-A{background:#dbeafe;color:#1e40af}
.grade-B{background:#dcfce7;color:#166534}
.grade-C{background:#fef9c3;color:#713f12}
.grade-D{background:#fee2e2;color:#991b1b}
.grade-E{background:#f3f4f6;color:#374151}

/* ── Dashboard ────────────────────────────── */
.dashboard-wrap{padding:18px 28px}
.chart-row{display:grid;grid-template-columns:1fr 1.6fr;gap:16px;margin-bottom:16px}
.chart-card{background:var(--white);border:1px solid var(--silver);border-radius:12px;padding:18px 20px}
.cc-title{font-size:14px;font-weight:700;margin-bottom:2px}
.cc-desc{font-size:12px;color:var(--slate);margin-bottom:14px}
.dept-row{display:flex;align-items:center;gap:10px;padding:7px 0;border-bottom:1px solid var(--silver)}
.dept-row:last-child{border-bottom:none}
.dept-name{width:70px;font-size:12.5px;font-weight:600;flex-shrink:0}
.dept-bar-bg{flex:1;height:8px;background:var(--silver);border-radius:9999px;overflow:hidden}
.dept-bar-fill{height:100%;border-radius:9999px;animation:fadeUp .5s ease}
.dept-score{width:40px;text-align:right;font-size:12.5px;font-weight:700}

/* ── Misc ─────────────────────────────────── */
.dot{width:7px;height:7px;border-radius:50%;display:inline-block;animation:pulse 2.2s ease infinite;flex-shrink:0}
.dot-g{background:var(--green)}
.dot-b{background:var(--blue)}
.dot-y{background:#fbbf24}
.empty-state{text-align:center;padding:48px 24px;color:var(--slate)}
.empty-state svg{margin:0 auto 12px}
</style>
</head>

/* ── Sparkline SVG ──────────────────────────── */
const Sparkline = ({data, color='#101010', width=70, height=28}) => {
  const max = Math.max(...data), min = Math.min(...data);
  const pts = data.map((v,i)=>`${(i/(data.length-1))*width},${height-((v-min)/(max-min+1))*height}`).join(' ');
  return (
    <svg width={width} height={height} style={{marginTop:6}}>
      <polyline points={pts} fill="none" stroke={color} strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"/>
    </svg>
  );
};

  return <span className={`badge ${m.cls}`}>{m.label}</span>;

  const cls = {A:'badge-a',B:'badge-b',C:'badge-c',D:'badge badge-wait',E:'badge badge-wait'}[grade]||'badge-wait';
  return <span className={`badge ${cls}`}>{grade}등급</span>;
};
