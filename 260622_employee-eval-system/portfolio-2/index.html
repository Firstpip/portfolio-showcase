<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>평가 분석 및 이력 관리 허브 — 구현 데모</title>
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@phosphor-icons/web@2.1.1/dist/index.css">
<script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone@7.27.3/babel.min.js" crossorigin></script>
<script src="https://unpkg.com/prop-types/prop-types.min.js"></script>
<script src="https://unpkg.com/recharts@2.8.0/umd/Recharts.js" crossorigin></script>
<style>
:root{
  --cobalt:#455dd3;--cobalt-dk:#3449b0;--ice:#62aef0;
  --amber:#f59e0b;--cream:#f6f5f4;--white:#fff;
  --ink:#0b0b0b;--charcoal:#31302e;--gray:#615d59;
  --silver:#c6c6c5;--border:#e8e7e6;--nav-h:58px;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{background:var(--cream);font-family:'Pretendard',-apple-system,sans-serif;
  color:var(--ink);font-size:14px;line-height:1.5}

@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes barGrow{from{width:0}to{width:var(--target-w,100%)}}
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
@keyframes slideDown{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}
@keyframes countFade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
@keyframes ripple{0%{transform:scale(0);opacity:.5}100%{transform:scale(2.5);opacity:0}}

/* ── App header (sticky, no sidebar) ─────── */
.app-header{position:sticky;top:0;z-index:200;background:var(--white);
  border-bottom:1px solid var(--border);height:var(--nav-h);
  display:flex;align-items:center;padding:0 28px;gap:16px}
.brand{display:flex;align-items:center;gap:9px;flex-shrink:0;margin-right:8px}
.brand-logo{width:30px;height:30px;border-radius:8px;background:var(--cobalt);
  display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:13px}
.brand-name{font-size:15px;font-weight:700;color:var(--ink);letter-spacing:-.2px}
.brand-tag{font-size:10px;color:var(--gray);margin-top:1px}
.proj-switcher{display:flex;align-items:center;gap:5px;border:1px solid var(--border);
  border-radius:8px;padding:5px 12px;font-size:12.5px;color:var(--charcoal);
  cursor:pointer;background:var(--cream)}
.global-nav{display:flex;gap:2px;flex:1}
.nav-link{padding:7px 13px;font-size:13px;font-weight:500;color:var(--gray);
  border:none;background:none;cursor:pointer;border-radius:7px;
  font-family:inherit;transition:all .15s}
.nav-link:hover{background:var(--cream);color:var(--charcoal)}
.nav-link.active{background:var(--cream);color:var(--ink);font-weight:600}
.header-right{margin-left:auto;display:flex;align-items:center;gap:8px}
.h-search{display:flex;align-items:center;gap:7px;border:1px solid var(--border);
  border-radius:8px;padding:6px 12px;background:var(--cream);width:170px}
.h-search input{border:none;outline:none;font-size:12.5px;font-family:inherit;
  background:transparent;color:var(--ink);width:100%}
.h-notif{width:32px;height:32px;border-radius:8px;border:1px solid var(--border);
  display:flex;align-items:center;justify-content:center;cursor:pointer;
  background:var(--white);color:var(--gray);position:relative}
.notif-dot{position:absolute;top:6px;right:6px;width:6px;height:6px;
  border-radius:50%;background:var(--cobalt);border:1.5px solid #fff}
.h-avatar{width:30px;height:30px;border-radius:9999px;background:var(--cobalt);
  display:flex;align-items:center;justify-content:center;
  color:#fff;font-size:11px;font-weight:700;cursor:pointer}

/* ── Secondary tab bar ───────────────────── */
.tab-bar{background:var(--white);border-bottom:1px solid var(--border);
  display:flex;padding:0 28px;gap:0}
.tab{padding:10px 14px;font-size:13px;font-weight:500;color:var(--gray);
  border:none;background:none;cursor:pointer;font-family:inherit;
  border-bottom:2px solid transparent;transition:all .15s}
.tab:hover{color:var(--charcoal)}
.tab.active{color:var(--ink);border-bottom-color:var(--cobalt);font-weight:600}
.tab-badge{margin-left:6px;background:var(--cobalt);color:#fff;
  font-size:10px;font-weight:700;padding:1px 6px;border-radius:9999px}

/* ── Hero band ──────────────────────────────── */
.hero-band{background:linear-gradient(135deg,#455dd3 0%,#62aef0 60%,#f59e0b 100%);
  padding:24px 28px 20px;color:#fff;position:relative;overflow:hidden;
  animation:slideDown .4s ease both}
.hero-band::before{content:'';position:absolute;inset:0;
  background:url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' stroke='white' stroke-opacity='.07' stroke-width='1'%3E%3Cpath d='M0 30h60M30 0v60M10 10l40 40M50 10L10 50'/%3E%3C/g%3E%3C/svg%3E") center/60px repeat;opacity:.5}
.hb-inner{position:relative;z-index:1}
.hb-title{font-size:38px;font-weight:800;letter-spacing:-.5px;line-height:1.1;margin-bottom:6px}
.hb-sub{font-size:13px;opacity:.8;display:flex;align-items:center;gap:10px}
.hb-chip{background:rgba(255,255,255,.18);border-radius:9999px;padding:2px 12px;
  font-size:11.5px;font-weight:600}

/* ── Stat cards ───────────────────────────── */
.stat-row{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;padding:18px 28px}
.stat-card{background:var(--white);border:1px solid var(--border);border-radius:12px;
  padding:20px 22px;animation:countFade .4s ease both;
  box-shadow:0 2px 8px rgba(0,0,0,.06);transition:box-shadow .15s}
.stat-card:hover{box-shadow:0 4px 16px rgba(0,0,0,.1)}
.stat-card:nth-child(2){animation-delay:.07s}
.stat-card:nth-child(3){animation-delay:.13s}
.stat-card:nth-child(4){animation-delay:.19s}
.sc-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px}
.sc-label{font-size:11px;color:var(--gray);font-weight:600;
  text-transform:uppercase;letter-spacing:.07em}
.sc-icon{width:28px;height:28px;border-radius:7px;
  display:flex;align-items:center;justify-content:center;font-size:15px}
.sc-value{font-size:28px;font-weight:800;color:var(--ink);letter-spacing:-.5px;line-height:1}
.sc-sub{display:flex;align-items:center;gap:5px;margin-top:5px;font-size:11.5px;color:var(--gray)}
.delta-p{color:#16a34a;font-weight:600}
.delta-n{color:#dc2626;font-weight:600}

/* ── Split-monitor ────────────────────────── */
.split-monitor{display:grid;grid-template-columns:1fr 360px;gap:14px;
  padding:0 28px 14px}
.sm-card{background:var(--white);border:1px solid var(--border);border-radius:12px;padding:18px 20px}
.sm-title{font-size:14px;font-weight:700;color:var(--ink);margin-bottom:2px}
.sm-desc{font-size:12px;color:var(--gray);margin-bottom:14px}

/* ── Grade feed (right panel) ─────────────── */
.grade-feed{display:flex;flex-direction:column;gap:0;overflow-y:auto;max-height:260px}
.gf-item{display:flex;align-items:center;gap:10px;padding:8px 0;
  border-bottom:1px solid var(--border);animation:fadeIn .3s ease both}
.gf-item:last-child{border-bottom:none}
.gf-avatar{width:28px;height:28px;border-radius:9999px;background:var(--cream);
  display:flex;align-items:center;justify-content:center;font-size:10.5px;font-weight:700;flex-shrink:0}
.gf-name{flex:1;font-size:12.5px;font-weight:500}
.gf-dept{font-size:11px;color:var(--gray)}
.gf-grade{width:36px;height:22px;border-radius:5px;display:flex;align-items:center;
  justify-content:center;font-size:11.5px;font-weight:800}
.gf-a{background:#dbeafe;color:#1e40af}
.gf-b{background:#dcfce7;color:#166534}
.gf-c{background:#fef9c3;color:#713f12}
.gf-d{background:#fee2e2;color:#991b1b}
.gf-e{background:#f3f4f6;color:#374151}
.gf-score{width:36px;text-align:right;font-size:12px;font-weight:700}

/* ── Bottom history table ──────────────────── */
.bottom-section{padding:0 28px 20px}
.bs-head{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.bs-title{font-size:14px;font-weight:700}
.bs-desc{font-size:12px;color:var(--gray)}
.bs-actions{margin-left:auto;display:flex;gap:8px}
.table-wrap{background:var(--white);border:1px solid var(--border);
  border-radius:12px;overflow:hidden}
.hist-table{width:100%;border-collapse:collapse;font-size:13px}
.hist-table thead th{background:var(--cream);padding:9px 16px;text-align:left;
  font-size:10.5px;font-weight:700;color:var(--gray);
  text-transform:uppercase;letter-spacing:.07em;border-bottom:1px solid var(--border)}
.hist-table tbody tr{border-bottom:1px solid var(--border);cursor:pointer;transition:background .1s}
.hist-table tbody tr:hover{background:#fafaf9}
.hist-table tbody tr:last-child{border-bottom:none}
.hist-table tbody td{padding:10px 16px}
.badge{display:inline-flex;align-items:center;padding:2px 9px;
  border-radius:4px;font-size:11px;font-weight:700}
.badge-a{background:#dbeafe;color:#1e40af}
.badge-b{background:#dcfce7;color:#166534}
.badge-c{background:#fef9c3;color:#713f12}

/* ── Analysis view ─────────────────────────── */
.analysis-wrap{padding:18px 28px}
.analysis-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px}
.an-card{background:var(--white);border:1px solid var(--border);border-radius:12px;padding:18px 20px}
.an-title{font-size:14px;font-weight:700;margin-bottom:2px}
.an-desc{font-size:12px;color:var(--gray);margin-bottom:14px}
.radar-canvas{position:relative;height:200px;display:flex;align-items:center;justify-content:center}
.dept-compare-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border)}
.dept-compare-row:last-child{border-bottom:none}
.dcr-name{width:70px;font-size:12.5px;font-weight:600;flex-shrink:0}
.dcr-bar{flex:1;height:8px;background:#e5e7eb;border-radius:9999px;overflow:hidden}
.dcr-fill{height:100%;border-radius:9999px}
.dcr-score{width:38px;text-align:right;font-size:13px;font-weight:700}
.rank-item{display:flex;align-items:center;gap:10px;padding:8px 0;
  border-bottom:1px solid var(--border)}
.rank-item:last-child{border-bottom:none}
.rank-num{width:22px;height:22px;border-radius:9999px;
  display:flex;align-items:center;justify-content:center;
  font-size:11px;font-weight:800;flex-shrink:0}
.rank-1{background:#fbbf24;color:#78350f}
.rank-2{background:#94a3b8;color:#1e293b}
.rank-3{background:#c08040;color:#fff}
.rank-n{background:var(--cream);color:var(--gray)}
.rank-name{flex:1;font-size:13px;font-weight:500}
.rank-dept{font-size:11px;color:var(--gray)}
.rank-score{font-size:13.5px;font-weight:800}

/* ── Export view ────────────────────────────── */
.export-wrap{padding:18px 28px;max-width:780px}
.exp-card{background:var(--white);border:1px solid var(--border);border-radius:12px;
  padding:22px 24px;margin-bottom:14px}
.exp-title{font-size:15px;font-weight:700;margin-bottom:4px}
.exp-desc{font-size:12.5px;color:var(--gray);margin-bottom:18px}
.exp-form{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.ef-field{display:flex;flex-direction:column;gap:5px}
.ef-label{font-size:12px;font-weight:700;color:var(--charcoal);
  text-transform:uppercase;letter-spacing:.05em}
.ef-select{border:1px solid var(--border);border-radius:8px;
  padding:8px 12px;font-size:13px;font-family:inherit;
  background:var(--white);color:var(--ink);outline:none;cursor:pointer}
.ef-select:focus{border-color:var(--cobalt)}
.col-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:4px}
.col-check{display:flex;align-items:center;gap:7px;padding:7px 10px;
  background:var(--cream);border-radius:7px;font-size:12.5px;cursor:pointer}
.col-check input{accent-color:var(--cobalt)}
.progress-card{background:var(--white);border:1px solid var(--border);
  border-radius:12px;padding:22px 24px}
.exp-prog-bar{height:8px;background:var(--border);border-radius:9999px;overflow:hidden;margin:10px 0}
.exp-prog-fill{height:100%;background:var(--cobalt);border-radius:9999px;
  width:72%;animation:fadeIn .5s ease}
.download-btn{background:var(--cobalt);color:#fff;border:none;border-radius:8px;
  padding:10px 24px;font-size:14px;font-weight:700;cursor:pointer;
  font-family:inherit;width:100%;margin-top:14px;transition:background .15s;
  display:flex;align-items:center;justify-content:center;gap:8px}
.download-btn:hover{background:var(--cobalt-dk)}

/* ── Settings view ──────────────────────────── */
.settings-wrap{padding:18px 28px;max-width:820px}
.settings-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.sett-card{background:var(--white);border:1px solid var(--border);
  border-radius:12px;padding:18px 20px}
.sett-card.full{grid-column:1/-1}
.sc2-title{font-size:14px;font-weight:700;margin-bottom:3px}
.sc2-desc{font-size:12px;color:var(--gray);margin-bottom:14px}
.admin-row{display:flex;align-items:center;gap:10px;padding:9px 0;
  border-bottom:1px solid var(--border)}
.admin-row:last-child{border-bottom:none}
.admin-avatar{width:28px;height:28px;border-radius:9999px;background:var(--cream);
  display:flex;align-items:center;justify-content:center;
  font-size:10.5px;font-weight:700;color:var(--cobalt);flex-shrink:0}
.admin-name{flex:1;font-size:13px;font-weight:500}
.admin-role{font-size:11px;color:var(--gray)}
.cycle-row{display:flex;align-items:center;justify-content:space-between;
  padding:10px 0;border-bottom:1px solid var(--border)}
.cycle-row:last-child{border-bottom:none}
.cycle-label{font-size:13.5px;font-weight:600}
.cycle-sub{font-size:11.5px;color:var(--gray);margin-top:1px}
.cycle-badge{padding:3px 10px;border-radius:9999px;font-size:11.5px;font-weight:700}
.cb-active{background:#dcfce7;color:#166534}
.cb-done{background:#f3f4f6;color:#374151}
.cb-plan{background:#eff6ff;color:#1d4ed8}
.log-row{display:flex;align-items:flex-start;gap:10px;padding:8px 0;
  border-bottom:1px solid var(--border)}
.log-row:last-child{border-bottom:none}
.log-time{font-size:11px;color:var(--gray);white-space:nowrap;width:120px;flex-shrink:0}
.log-msg{font-size:12.5px;flex:1}
.log-admin{font-size:11px;color:var(--cobalt);font-weight:500}

/* ── Buttons ─────────────────────────────────── */
.btn-cobalt{background:var(--cobalt);color:#fff;border:none;border-radius:5px;
  padding:7px 18px;font-size:13px;font-weight:700;cursor:pointer;
  font-family:inherit;transition:background .15s;display:flex;align-items:center;gap:6px}
.btn-cobalt:hover{background:var(--cobalt-dk)}
.btn-ghost{background:none;color:var(--charcoal);border:1.5px solid var(--border);
  border-radius:5px;padding:7px 16px;font-size:13px;font-weight:500;
  cursor:pointer;font-family:inherit;transition:all .15s;display:flex;align-items:center;gap:6px}
.btn-ghost:hover{border-color:#999;background:var(--cream)}
.btn-amber{background:var(--amber);color:#fff;border:none;border-radius:5px;
  padding:7px 16px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;
  display:flex;align-items:center;gap:6px}

/* ── Misc ─────────────────────────────────────── */
.filter-row{display:flex;align-items:center;gap:8px;padding:0 28px 14px}
.fr-label{font-size:12.5px;font-weight:600;color:var(--gray)}
.fr-select{border:1px solid var(--border);border-radius:7px;
  padding:6px 12px;font-size:12.5px;font-family:inherit;
  background:var(--white);color:var(--ink);outline:none}
.fr-select:focus{border-color:var(--cobalt)}
</style>
</head>

/* ── Grade badge ────────────────────────────── */
const GBadge = ({g}) => {
  const cls = {A:'badge-a',B:'badge-b',C:'badge-c',D:'badge',E:'badge'}[g]||'badge';
  return <span className={`badge ${cls}`}>{g}</span>;
};

/* ── Sparkline ──────────────────────────────── */
const Sparkline = ({data,color='#455dd3',w=72,h=28}) => {
  const max=Math.max(...data), min=Math.min(...data);
  const pts=data.map((v,i)=>`${(i/(data.length-1))*w},${h-((v-min)/(max-min+0.1))*h}`).join(' ');
  return <svg width={w} height={h} style={{marginTop:6}}>
    <polyline points={pts} fill="none" stroke={color} strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"/>
  </svg>;
};

/* ── Custom SVG Radar ───────────────────────── */
const RadarChart = ({data, labels}) => {
  const n = labels.length;
  const cx=100, cy=100, r=72;
  const angle = i => (i/n)*Math.PI*2 - Math.PI/2;
  const px = (i,v) => cx + r*(v/100)*Math.cos(angle(i));
  const py = (i,v) => cy + r*(v/100)*Math.sin(angle(i));
  const gridLevels = [25,50,75,100];
  return (
    <svg viewBox="0 0 200 200" style={{width:'100%',maxWidth:200,margin:'0 auto',display:'block'}}>
      {gridLevels.map(lv=>(
        <polygon key={lv} points={labels.map((_,i)=>`${cx+r*(lv/100)*Math.cos(angle(i))},${cy+r*(lv/100)*Math.sin(angle(i))}`).join(' ')}
          fill="none" stroke="#e8e7e6" strokeWidth="1"/>
      ))}
      {labels.map((_,i)=><line key={i} x1={cx} y1={cy} x2={cx+r*Math.cos(angle(i))} y2={cy+r*Math.sin(angle(i))} stroke="#e8e7e6" strokeWidth="1"/>)}
      {data.map((d,di)=>(
        <polygon key={di} points={d.values.map((v,i)=>`${px(i,v)},${py(i,v)}`).join(' ')}
          fill={d.color} fillOpacity={0.2} stroke={d.color} strokeWidth="1.8"/>
      ))}
      {labels.map((lb,i)=>(
        <text key={i} x={cx+(r+16)*Math.cos(angle(i))} y={cy+(r+16)*Math.sin(angle(i))+4}
          textAnchor="middle" fontSize="8" fill="#615d59">{lb}</text>
      ))}
    </svg>
  );
};
