<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>이치방쿠지 관리자 백오피스 — 확장 데모</title>
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" rel="stylesheet">
<script src="https://unpkg.com/lucide@0.469.0/dist/umd/lucide.min.js"></script>
<style>
:root {
  --bg:     #08090a;
  --nav:    #0f1011;
  --card:   #161718;
  --card2:  #1c1d1f;
  --border: #23252a;
  --ink:    #f7f8f8;
  --muted:  #8a8f98;
  --faint:  #3e4147;
  --lime:   #e4f222;
  --indigo: #5e6ad2;
  --red:    #ef4444;
  --green:  #22c55e;
  --amber:  #f59e0b;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }
body { font-family: 'Pretendard', 'Inter', sans-serif; background: var(--bg); color: var(--ink); overflow: hidden; font-size: 14px; }

@keyframes slide-in-panel {
  from { transform:translateX(24px); opacity:0; }
  to   { transform:translateX(0);    opacity:1; }
}
@keyframes pulse-status {
  0%,100% { box-shadow:0 0 0 0 rgba(34,197,94,.4); }
  50%     { box-shadow:0 0 0 5px rgba(34,197,94,0); }
}
@keyframes fade-row {
  from { opacity:0; transform:translateY(3px); }
  to   { opacity:1; transform:translateY(0); }
}
@keyframes progress-fill {
  from { width:0; }
}
@keyframes skeleton-shimmer {
  0%   { background-position:-400% 0; }
  100% { background-position: 400% 0; }
}
@keyframes count-up-num {
  from { opacity:0; transform:scale(.7); filter:blur(4px); }
  to   { opacity:1; transform:scale(1);  filter:blur(0); }
}
@keyframes spin {
  from { transform:rotate(0deg); }
  to   { transform:rotate(360deg); }
}
@keyframes toast-in {
  from { transform:translateX(120%); opacity:0; }
  to   { transform:translateX(0);    opacity:1; }
}
@keyframes toast-out {
  from { transform:translateX(0);    opacity:1; }
  to   { transform:translateX(120%); opacity:0; }
}

/* 3-PANE SHELL */
.app-shell { display:grid; grid-template-columns:220px 290px 1fr; height:100vh; overflow:hidden; }

/* SIDEBAR */
.sidebar { background:var(--nav); border-right:1px solid var(--border); display:flex; flex-direction:column; overflow:hidden; }
.sidebar-logo { padding:16px 14px 14px; border-bottom:1px solid var(--border); display:flex; align-items:center; gap:9px; }
.sidebar-logo-mark { width:26px; height:26px; background:var(--lime); border-radius:6px; display:flex; align-items:center; justify-content:center; font-size:11px; font-weight:900; color:#08090a; flex-shrink:0; }
.sidebar-logo-name { font-size:14px; font-weight:600; }
.sidebar-logo-badge { margin-left:auto; font-size:10px; color:var(--muted); font-family:monospace; background:var(--card); border-radius:3px; padding:1px 6px; border:1px solid var(--border); }
.sidebar-section { padding:8px 8px 0; }
.sidebar-section-label { font-size:11px; font-weight:500; color:var(--faint); letter-spacing:.06em; text-transform:uppercase; padding:0 8px; margin-bottom:3px; }
.nav-item {
  display:flex; align-items:center; gap:8px;
  padding:7px 8px; border-radius:6px; cursor:pointer;
  color:var(--muted); font-size:13px; font-weight:400;
  transition:color .15s, background .15s; user-select:none;
  border:1px solid transparent; background:none; width:100%; text-align:left; font-family:'Pretendard',sans-serif;
}
.nav-item svg { width:15px; height:15px; flex-shrink:0; }
.nav-item:hover { color:var(--ink); background:rgba(255,255,255,.04); }
.nav-item.active { color:var(--ink); background:rgba(255,255,255,.07); border-color:var(--border); }
.nav-item-count { margin-left:auto; font-size:11px; font-family:monospace; color:var(--faint); background:rgba(255,255,255,.05); padding:1px 6px; border-radius:3px; }
.sidebar-sep { height:1px; background:var(--border); margin:8px 0; }
.sidebar-footer { margin-top:auto; padding:12px 8px; border-top:1px solid var(--border); }
.sidebar-user { display:flex; align-items:center; gap:9px; padding:7px 8px; border-radius:6px; cursor:pointer; transition:background .15s; }
.sidebar-user:hover { background:rgba(255,255,255,.04); }
.sidebar-avatar { width:26px; height:26px; border-radius:50%; background:var(--indigo); display:flex; align-items:center; justify-content:center; font-size:11px; font-weight:600; color:white; flex-shrink:0; }
.sidebar-user-name { font-size:13px; }
.sidebar-user-role { font-size:11px; color:var(--muted); }

/* LIST RAIL */
.list-rail { border-right:1px solid var(--border); display:flex; flex-direction:column; overflow:hidden; }
.list-rail-header { padding:14px 14px 10px; border-bottom:1px solid var(--border); flex-shrink:0; }
.list-rail-title { font-size:15px; font-weight:600; margin-bottom:10px; }
.list-search { display:flex; align-items:center; gap:7px; background:var(--card); border:1px solid var(--border); border-radius:6px; padding:7px 10px; margin-bottom:8px; }
.list-search svg { width:14px; height:14px; color:var(--faint); flex-shrink:0; }
.list-search input { flex:1; background:transparent; border:none; outline:none; font-size:13px; color:var(--ink); font-family:'Pretendard',sans-serif; }
.list-search input::placeholder { color:var(--faint); }
.list-filter-row { display:flex; gap:5px; flex-wrap:wrap; }
.list-filter-btn { font-size:11px; padding:3px 8px; border-radius:4px; border:1px solid var(--border); background:transparent; color:var(--muted); cursor:pointer; font-family:'Pretendard',sans-serif; transition:all .15s; }
.list-filter-btn:hover { border-color:var(--muted); color:var(--ink); }
.list-filter-btn.active { background:var(--card2); border-color:var(--faint); color:var(--ink); }
.list-items { flex:1; overflow-y:auto; scrollbar-width:thin; scrollbar-color:var(--border) transparent; }
.list-item { display:flex; align-items:flex-start; gap:10px; padding:11px 14px; border-bottom:1px solid var(--border); cursor:pointer; transition:background .12s; animation:fade-row .25s ease both; }
.list-item:hover { background:rgba(255,255,255,.025); }
.list-item.selected { background:rgba(255,255,255,.05); border-left:2px solid var(--indigo); padding-left:12px; }
.list-item-icon { width:30px; height:30px; border-radius:50%; flex-shrink:0; display:flex; align-items:center; justify-content:center; }
.list-item-icon svg { width:14px; height:14px; }
.list-item-main { flex:1; min-width:0; }
.list-item-name { font-size:13px; font-weight:510; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; margin-bottom:2px; }
.list-item-sub { font-size:11px; color:var(--muted); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.list-item-meta { display:flex; flex-direction:column; align-items:flex-end; gap:4px; flex-shrink:0; }
.list-item-time { font-size:10px; color:var(--faint); font-family:monospace; }
.status-dot { width:7px; height:7px; border-radius:50%; }
.dot-green { background:var(--green); animation:pulse-status 2s infinite; }
.dot-amber { background:var(--amber); }
.dot-red   { background:var(--red); }
.dot-indigo { background:var(--indigo); }
.dot-muted  { background:var(--faint); }

/* DETAIL PANEL */
.page-content { display:flex; flex-direction:column; overflow:hidden; }
.command-bar { background:var(--nav); border-bottom:1px solid var(--border); padding:0 24px; height:42px; display:flex; align-items:center; gap:12px; flex-shrink:0; }
.command-bar-title { font-size:13px; font-weight:510; }
.command-bar-sep { color:var(--faint); }
.command-bar-sub { font-size:12px; color:var(--muted); }
.command-bar-right { margin-left:auto; display:flex; align-items:center; gap:8px; }
.detail-panel { overflow-y:auto; scrollbar-width:thin; scrollbar-color:var(--border) transparent; display:flex; flex-direction:column; flex:1; }
.detail-empty { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:12px; color:var(--faint); }
.detail-empty svg { width:32px; height:32px; }

.btn-ghost { display:flex; align-items:center; gap:5px; background:transparent; border:1px solid var(--border); color:var(--muted); border-radius:6px; padding:6px 12px; font-size:12px; cursor:pointer; font-family:'Pretendard',sans-serif; transition:all .15s; }
.btn-ghost:hover { border-color:var(--muted); color:var(--ink); }
.btn-ghost svg { width:13px; height:13px; }
.btn-lime { display:flex; align-items:center; gap:5px; background:var(--lime); border:none; color:#08090a; border-radius:6px; padding:6px 14px; font-size:12px; cursor:pointer; font-family:'Pretendard',sans-serif; transition:opacity .15s; font-weight:600; }
.btn-lime:hover { opacity:.85; }
.btn-lime svg { width:13px; height:13px; }

.detail-header { padding:20px 24px 16px; border-bottom:1px solid var(--border); flex-shrink:0; }
.detail-breadcrumb { font-size:11px; color:var(--faint); font-family:monospace; margin-bottom:12px; display:flex; align-items:center; gap:6px; }
.detail-breadcrumb svg { width:12px; height:12px; }
.detail-title-row { display:flex; align-items:center; gap:12px; margin-bottom:12px; }
.detail-avatar { width:40px; height:40px; border-radius:50%; flex-shrink:0; display:flex; align-items:center; justify-content:center; font-size:18px; font-weight:600; }
.detail-title { font-size:20px; font-weight:600; }
.detail-sub { font-size:13px; color:var(--muted); font-family:monospace; }
.detail-actions { display:flex; gap:8px; flex-wrap:wrap; align-items:center; }

.detail-body { padding:20px 24px; flex:1; }
.detail-grid-2 { display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-bottom:20px; }
.detail-grid-3 { display:grid; grid-template-columns:1fr 1fr 1fr; gap:12px; margin-bottom:20px; }
.stat-card { background:var(--card); border:1px solid var(--border); border-radius:12px; padding:14px 16px; box-shadow:rgba(0,0,0,.25) 0 2px 6px; }
.stat-label { font-size:11px; color:var(--muted); margin-bottom:5px; }
.stat-value { font-size:22px; font-weight:600; animation:count-up-num .5s ease; }
.stat-value .unit { font-size:13px; font-weight:400; color:var(--muted); }
.stat-delta { font-size:11px; margin-top:3px; display:flex; align-items:center; gap:3px; }
.stat-delta svg { width:11px; height:11px; }
.delta-up { color:var(--green); }
.delta-dn { color:var(--red); }

.section-title { font-size:12px; font-weight:500; color:var(--muted); letter-spacing:.06em; text-transform:uppercase; margin-bottom:10px; display:flex; align-items:center; gap:8px; }
.section-title::after { content:''; flex:1; height:1px; background:var(--border); }

.kv-list { background:var(--card); border:1px solid var(--border); border-radius:12px; overflow:hidden; margin-bottom:20px; box-shadow:rgba(0,0,0,.2) 0 2px 4px; }
.kv-row { display:flex; padding:10px 16px; border-bottom:1px solid var(--border); animation:fade-row .25s ease both; }
.kv-row:last-child { border-bottom:none; }
.kv-key { width:130px; font-size:12px; color:var(--muted); flex-shrink:0; }
.kv-val { font-size:13px; font-weight:400; }
.kv-val.mono { font-family:monospace; font-size:12px; color:var(--muted); }
.kv-val.hi { color:var(--lime); font-weight:510; }

.badge { display:inline-flex; align-items:center; gap:4px; font-size:11px; font-weight:500; padding:2px 8px; border-radius:4px; border:1px solid; }
.badge-green  { color:var(--green);  border-color:rgba(34,197,94,.3);  background:rgba(34,197,94,.08); }
.badge-amber  { color:var(--amber);  border-color:rgba(245,158,11,.3);  background:rgba(245,158,11,.08); }
.badge-red    { color:var(--red);    border-color:rgba(239,68,68,.3);   background:rgba(239,68,68,.08); }
.badge-indigo { color:var(--indigo); border-color:rgba(94,106,210,.3);  background:rgba(94,106,210,.08); }
.badge-muted  { color:var(--muted);  border-color:var(--border);        background:var(--card); }
.badge-lime   { color:#08090a;       border-color:var(--lime);          background:var(--lime); }

.timeline { position:relative; padding-left:20px; margin-bottom:20px; }
.timeline::before { content:''; position:absolute; left:6px; top:6px; bottom:6px; width:1px; background:var(--border); }
.tl-item { position:relative; padding-bottom:16px; animation:fade-row .3s ease both; }
.tl-item:last-child { padding-bottom:0; }
.tl-dot { position:absolute; left:-17px; top:4px; width:9px; height:9px; border-radius:50%; border:2px solid var(--border); background:var(--bg); }
.tl-dot.done   { border-color:var(--green);  background:var(--green); }
.tl-dot.active { border-color:var(--indigo); background:var(--indigo); animation:pulse-status 1.5s infinite; }
.tl-time  { font-size:10px; color:var(--faint); font-family:monospace; margin-bottom:3px; }
.tl-text  { font-size:12px; }
.tl-meta  { font-size:11px; color:var(--muted); margin-top:2px; }

/* TAB NAV (required by stripe-multipane) */
.detail-tabs { display:flex; gap:0; border-bottom:1px solid var(--border); padding:0 24px; flex-shrink:0; background:var(--bg); }
.detail-tab { padding:10px 14px; font-size:13px; color:var(--muted); cursor:pointer; border-bottom:2px solid transparent; transition:all .15s; font-family:'Pretendard',sans-serif; background:none; border-top:none; border-left:none; border-right:none; }
.detail-tab:hover { color:var(--ink); }
.detail-tab.active { color:var(--ink); border-bottom-color:var(--indigo); font-weight:510; }

/* DATA TABLE */
.data-table-wrap { background:var(--card); border:1px solid var(--border); border-radius:12px; overflow:hidden; margin-bottom:20px; box-shadow:rgba(0,0,0,.2) 0 2px 4px; }
.data-table { width:100%; border-collapse:collapse; font-size:12px; }
.data-table th { text-align:left; padding:9px 14px; font-size:10px; font-weight:500; letter-spacing:.07em; text-transform:uppercase; color:var(--faint); border-bottom:1px solid var(--border); }
.data-table td { padding:10px 14px; border-bottom:1px solid rgba(35,37,42,.6); }
.data-table tr:last-child td { border-bottom:none; }
.data-table tr:hover td { background:rgba(255,255,255,.02); }
.data-table .mono { font-family:monospace; color:var(--muted); }

/* SVG SPARKLINE + CHART */
.bar-chart-wrap { background:var(--card); border:1px solid var(--border); border-radius:12px; padding:18px 20px; margin-bottom:20px; }
.bar-chart-title { font-size:11px; color:var(--muted); margin-bottom:12px; }
.bar-chart-svg { display:block; }
.sparkline-wrap { position:relative; }
.sparkline-label { position:absolute; top:0; right:0; font-size:10px; color:var(--lime); font-family:monospace; }

/* PROGRESS BARS */
.progress-row { display:flex; align-items:center; gap:10px; margin-bottom:8px; }
.progress-label { font-size:11px; color:var(--muted); width:80px; }
.progress-track { flex:1; height:4px; background:var(--border); border-radius:2px; }
.progress-fill { height:100%; border-radius:2px; animation:progress-fill .8s ease both; }
.progress-pct { font-size:10px; font-family:monospace; color:var(--faint); width:30px; text-align:right; }

/* NOTICE EDITOR */
.notice-editor { background:var(--card); border:1px solid var(--border); border-radius:12px; overflow:hidden; margin-bottom:20px; }
.notice-toolbar { display:flex; gap:2px; padding:8px 10px; border-bottom:1px solid var(--border); flex-wrap:wrap; }
.toolbar-btn { width:28px; height:24px; border-radius:4px; border:none; background:transparent; color:var(--muted); cursor:pointer; display:flex; align-items:center; justify-content:center; font-size:12px; transition:all .12s; font-family:'Pretendard',sans-serif; }
.toolbar-btn:hover { background:rgba(255,255,255,.07); color:var(--ink); }
.toolbar-btn.active { background:rgba(255,255,255,.1); color:var(--ink); }
.notice-editor-area { min-height:120px; padding:14px 16px; font-size:13px; line-height:1.7; outline:none; }

/* SVG ORB DECORATION (procedural visual) */
.bg-orb-svg { position:fixed; top:0; right:0; width:400px; height:400px; pointer-events:none; z-index:0; opacity:.06; }

/* TOAST */
.toast-container { position:fixed; bottom:24px; right:24px; z-index:999; display:flex; flex-direction:column; gap:10px; pointer-events:none; }
.toast { background:var(--card); color:var(--ink); border:1px solid var(--border); border-radius:12px; padding:12px 16px; font-size:13px; display:flex; align-items:center; gap:8px; box-shadow:rgba(0,0,0,.4) 0 8px 24px; animation:toast-in .3s ease; pointer-events:auto; }
.toast svg { width:16px; height:16px; color:var(--green); }
.toast.leave { animation:toast-out .3s ease forwards; }

/* KICKER DISPLAY TEXT (typography — Linear display 72px → target ≥36px) */
.display-num { font-size:48px; font-weight:700; letter-spacing:-1.5px; line-height:1; animation:count-up-num .5s ease; }
.heading-lg  { font-size:36px; font-weight:600; letter-spacing:-.5px; }
</style>
</head>
<body>

<!-- SVG orb procedural decoration -->
<svg class="bg-orb-svg" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="orbGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#e4f222" stop-opacity="1"/>
      <stop offset="60%"  stop-color="#5e6ad2" stop-opacity=".6"/>
      <stop offset="100%" stop-color="#08090a" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <circle cx="300" cy="100" r="220" fill="url(#orbGrad)"/>
  <circle cx="200" cy="200" r="120" fill="none" stroke="#e4f222" stroke-width="0.5" stroke-dasharray="4 8" opacity=".4"/>
  <circle cx="200" cy="200" r="170" fill="none" stroke="#5e6ad2" stroke-width="0.5" stroke-dasharray="2 12" opacity=".3"/>
</svg>

<div class="toast-container" id="toast-container"></div>

<div data-archetype="stripe-multipane" id="app" style="display:contents;">
<div class="app-shell">

<!-- SIDEBAR -->
<aside class="sidebar">
  <div class="sidebar-logo">
    <div class="sidebar-logo-mark">IC</div>
    <span class="sidebar-logo-name">이치방쿠지</span>
    <div class="sidebar-logo-badge">Admin v2</div>
  </div>
  <div class="sidebar-section" style="margin-top:8px;">
    <button class="nav-item" onclick="switchNav('members',this)">
      <i data-lucide="users"></i> 회원 관리
      <span class="nav-item-count">2,841</span>
    </button>
    <button class="nav-item" onclick="switchNav('delivery',this)">
      <i data-lucide="package"></i> 배송 관리
      <span class="nav-item-count">127</span>
    </button>
    <button class="nav-item" onclick="switchNav('report',this)">
      <i data-lucide="bar-chart-2"></i> 매출 리포트
    </button>
    <button class="nav-item" onclick="switchNav('notice',this)">
      <i data-lucide="megaphone"></i> 공지사항 관리
      <span class="nav-item-count">14</span>
    </button>
  </div>
  <div class="sidebar-sep"></div>
  <div class="sidebar-section">
    <div class="sidebar-section-label">가챠 운영</div>
    <button class="nav-item active" onclick="switchNav('machines',this)"><i data-lucide="layers"></i> 머신 관리</button>
    <button class="nav-item" onclick="switchNav('prob',this)"><i data-lucide="shuffle"></i> 확률 설정</button>
    <button class="nav-item" onclick="switchNav('inventory',this)"><i data-lucide="warehouse"></i> 재고 관리</button>
    <button class="nav-item" onclick="switchNav('points',this)"><i data-lucide="coins"></i> 포인트 관리</button>
  </div>
  <div class="sidebar-sep"></div>
  <div class="sidebar-section">
    <div class="sidebar-section-label">설정</div>
    <button class="nav-item" onclick="switchNav('pg',this)"><i data-lucide="credit-card"></i> PG 연동</button>
    <button class="nav-item" onclick="switchNav('logs',this)"><i data-lucide="scroll-text"></i> 감사 로그</button>
  </div>
  <div class="sidebar-footer">
    <div class="sidebar-user">
      <div class="sidebar-avatar">김</div>
      <div><div class="sidebar-user-name">김운영자</div><div class="sidebar-user-role">최고 관리자</div></div>
      <i data-lucide="chevrons-up-down" style="margin-left:auto;color:var(--faint);"></i>
    </div>
  </div>
</aside>

<!-- LIST RAIL -->
<div class="list-rail" id="list-rail"></div>

<!-- DETAIL PANEL -->
<div class="page-content">
  <div class="command-bar">
    <span class="command-bar-title" id="cb-title">회원 관리</span>
    <span class="command-bar-sep">/</span>
    <span class="command-bar-sub" id="cb-sub">전체 2,841명</span>
    <div class="command-bar-right">
      <button class="btn-ghost" onclick="showToast('CSV 내보내기가 시작되었습니다')"><i data-lucide="download"></i> CSV 내보내기</button>
      <button class="btn-lime" id="cb-primary-btn" onclick="showToast('작업이 완료되었습니다')"><i data-lucide="plus"></i> 새 회원 추가</button>
    </div>
  </div>
  <!-- Tab nav -->
  <div class="detail-tabs" id="detail-tabs">
    <button class="detail-tab active" onclick="switchTab(this,'overview')">개요</button>
    <button class="detail-tab" onclick="switchTab(this,'history')">이력</button>
    <button class="detail-tab" onclick="switchTab(this,'settings')">설정</button>
  </div>
  <div class="detail-panel" id="detail-panel">
    <div class="detail-empty" id="detail-empty">

// Bar chart SVG helper
function svgBarChart(vals, maxV) {
  const W=280, H=72, n=vals.length, bw=Math.floor(W/n)-4, labels=['1월','2월','3월','4월','5월','6월'];
  let bars='', texts='';
  vals.forEach((v,i) => {
    const h=Math.round(v/maxV*H), x=i*(bw+4), y=H-h;
    bars += `<rect x="${x}" y="${y}" width="${bw}" height="${h}" rx="2" fill="${i===n-1?'#e4f222':'#5e6ad2'}" opacity="${0.6+i*0.07}"/>`;
    texts += `<text x="${x+bw/2}" y="${H+12}" text-anchor="middle" font-size="9" fill="#3e4147" font-family="monospace">${labels[i]}</text>`;
  });
  return `<svg class="bar-chart-svg" width="${W}" height="${H+18}" viewBox="0 0 ${W} ${H+18}">${bars}${texts}</svg>`;
}

// Sparkline SVG helper
function svgSparkline(vals, color) {
  const W=80, H=24, maxV=Math.max(...vals), minV=Math.min(...vals);
  const pts = vals.map((v,i) => `${i/(vals.length-1)*W},${H-(v-minV)/(maxV-minV||1)*H}`).join(' ');
  return `<svg width="${W}" height="${H}" viewBox="0 0 ${W} ${H}"><polyline points="${pts}" fill="none" stroke="${color}" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
}

function markSelected(id) {
  selectedId = id;
  document.querySelectorAll('.list-item').forEach(el=>el.classList.remove('selected'));
  if (event && event.currentTarget) event.currentTarget.classList.add('selected');
}

function filterBtn(el) {
  const group = el.closest('.list-filter-row');
  group.querySelectorAll('.list-filter-btn').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');
}

// TOAST (microinteraction + count-up showcase)
function showToast(message) {
  const container = document.getElementById('toast-container');
  const toast = document.createElement('div');
  toast.className = 'toast';
  toast.innerHTML = `<i data-lucide="check-circle"></i> ${message}`;
  container.appendChild(toast);
  lucide.createIcons({ nodes: [toast] });
  setTimeout(() => { toast.classList.add('leave'); setTimeout(()=>toast.remove(), 320); }, 2500);
}
