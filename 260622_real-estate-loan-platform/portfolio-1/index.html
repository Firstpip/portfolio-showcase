<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>부동산 담보대출 자동 산출 플랫폼 — 맞춤 구현 데모</title>
  <link rel="preconnect" href="https://fonts.bunny.net" />
  <link href="https://fonts.bunny.net/css?family=pretendard:400,500,600,700,800" rel="stylesheet" />
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone@7.14.9/babel.min.js"></script>
  <script src="https://unpkg.com/lucide@0.462.0/dist/umd/lucide.min.js"></script>
  <style>
    :root {
      --bg: #efefef;
      --surface: #ffffff;
      --accent: #ff682c;
      --accent-light: #fff0eb;
      --text: #202020;
      --text-sub: #4d4d4d;
      --border: #828282;
      --border-light: #e8e8e8;
      --green: #22c55e;
      --red: #ef4444;
      --yellow: #f59e0b;
      --font: 'Pretendard', -apple-system, sans-serif;
      --r: 8px;
      --r-pill: 200px;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: var(--font); background: var(--bg); color: var(--text); }

    @keyframes fadeSlideUp {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes barGrow {
      from { transform: scaleY(0); transform-origin: bottom; }
      to   { transform: scaleY(1); transform-origin: bottom; }
    }
    @keyframes pulseDot {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%       { opacity: 0.55; transform: scale(0.75); }
    }
    @keyframes slideRight {
      from { opacity: 0; transform: translateX(-10px); }
      to   { opacity: 1; transform: translateX(0); }
    }
    @keyframes drawGauge {
      from { stroke-dashoffset: 280; }
      to   { stroke-dashoffset: 0; }
    }

    /* hero section — Ventriloc: big display + floating mini-cards */
    .hero-section {
      display: grid; grid-template-columns: 1fr 360px; gap: 32px; align-items: center;
      padding: 30px 0 28px; border-bottom: 1px solid var(--border-light); margin-bottom: 18px;
    }
    .hero-eyebrow {
      font-size: 11px; font-weight: 700; color: var(--accent); text-transform: uppercase;
      letter-spacing: .1em; margin-bottom: 10px; display: flex; align-items: center; gap: 6px;
    }
    .hero-eyebrow::before { content: ''; display: inline-block; width: 18px; height: 2px; background: var(--accent); }
    .hero-headline {
      font-size: 58px; font-weight: 800; line-height: 0.92; letter-spacing: -0.025em;
      color: var(--text); margin-bottom: 10px;
    }
    .hero-headline-sub {
      font-size: 14px; color: var(--text-sub); line-height: 1.5; margin-bottom: 22px;
    }
    .hero-kpis { display: flex; gap: 28px; }
    .hero-kpi-num {
      font-size: 32px; font-weight: 800; line-height: 1; letter-spacing: -0.02em;
    }
    .hero-kpi-lbl {
      font-size: 11px; font-weight: 600; color: var(--text-sub);
      text-transform: uppercase; letter-spacing: .05em; margin-top: 4px;
    }
    .hero-right { display: flex; flex-direction: column; gap: 12px; }
    .hero-mini-card {
      background: var(--surface); border-radius: var(--r); border: 1px solid var(--border-light);
      padding: 14px 16px; animation: fadeSlideUp .4s ease both;
    }

    [data-archetype="topbar-analytics"] {
      min-height: 100vh; display: flex; flex-direction: column;
    }

    /* ── HEADER ── */
    .app-header {
      position: sticky; top: 0; z-index: 60;
      background: var(--surface);
      border-bottom: 1px solid var(--border-light);
      height: 60px; display: flex; align-items: center; padding: 0 20px; gap: 0;
    }
    .brand {
      display: flex; align-items: center; gap: 9px;
      font-size: 15px; font-weight: 800; white-space: nowrap;
    }
    .brand-icon {
      width: 32px; height: 32px; border-radius: 7px;
      background: var(--accent); display: flex; align-items: center; justify-content: center;
    }
    .header-sep { width: 1px; height: 22px; background: var(--border-light); margin: 0 14px; }
    .proj-sw {
      display: flex; align-items: center; gap: 6px;
      padding: 6px 11px; border-radius: var(--r);
      border: 1px solid var(--border-light); background: var(--bg);
      font-size: 13px; font-weight: 500; color: var(--text-sub); cursor: pointer;
      white-space: nowrap;
    }
    .header-nav { display: flex; align-items: center; margin-left: auto; }
    .tab {
      padding: 0 16px; height: 60px; line-height: 60px;
      font-size: 14px; font-weight: 500; color: var(--text-sub);
      background: none; border: none; border-bottom: 2px solid transparent;
      cursor: pointer; transition: color .15s, border-color .15s; white-space: nowrap;
    }
    .tab:hover { color: var(--text); }
    .tab.active { color: var(--accent); border-bottom-color: var(--accent); font-weight: 700; }
    .header-actions { display: flex; align-items: center; gap: 8px; margin-left: 16px; }
    .icon-btn {
      width: 36px; height: 36px; display: flex; align-items: center; justify-content: center;
      border-radius: var(--r); background: none; border: 1px solid var(--border-light);
      cursor: pointer; color: var(--text-sub); position: relative;
    }
    .icon-btn:hover { background: var(--bg); }
    .notif-dot {
      position: absolute; top: 5px; right: 5px; width: 7px; height: 7px;
      background: var(--red); border-radius: 50%; border: 1.5px solid var(--surface);
    }
    .avatar {
      width: 36px; height: 36px; border-radius: 50%;
      background: var(--accent); display: flex; align-items: center; justify-content: center;
      color: #fff; font-size: 14px; font-weight: 800; cursor: pointer;
    }

    /* ── STATUS STRIP (command-tower region 1) ── */
    .status-strip {
      background: var(--text); color: #fff;
      height: 36px; display: flex; align-items: center; padding: 0 20px; gap: 18px;
      font-size: 12px; font-weight: 500; flex-shrink: 0;
    }
    .s-item { display: flex; align-items: center; gap: 6px; }
    .s-dot {
      width: 7px; height: 7px; border-radius: 50%;
      animation: pulseDot 2s ease-in-out infinite;
    }
    .s-dot.g { background: #4ade80; } .s-dot.b { background: #60a5fa; } .s-dot.y { background: #fbbf24; }
    .s-sep { color: rgba(255,255,255,.3); }

    /* ── SECONDARY NAV ── */
    .secondary-nav {
      background: var(--surface); border-bottom: 1px solid var(--border-light);
      display: flex; align-items: center; padding: 0 20px;
    }
    .sub-tab {
      padding: 10px 15px; font-size: 13px; font-weight: 500; color: var(--text-sub);
      background: none; border: none; border-bottom: 2px solid transparent; cursor: pointer;
    }
    .sub-tab.active { color: var(--accent); border-bottom-color: var(--accent); font-weight: 600; }

    /* ── MAIN CONTENT ── */
    .main-area { flex: 1; padding: 18px; display: flex; flex-direction: column; gap: 14px; }

    /* stat cards */
    .stat-row { display: grid; grid-template-columns: repeat(4,1fr); gap: 12px; }
    .stat-card {
      background: var(--surface); border-radius: var(--r);
      border: 1px solid var(--border-light); padding: 16px 18px;
      animation: fadeSlideUp .4s ease both;
    }
    .stat-card:nth-child(1){animation-delay:0s}
    .stat-card:nth-child(2){animation-delay:.06s}
    .stat-card:nth-child(3){animation-delay:.12s}
    .stat-card:nth-child(4){animation-delay:.18s}
    .stat-lbl { font-size: 11px; font-weight: 600; color: var(--text-sub); text-transform: uppercase; letter-spacing:.05em; margin-bottom:8px; }
    .stat-num { font-size: 34px; font-weight: 800; line-height: 1; }
    .stat-unit { font-size: 14px; font-weight: 500; color: var(--text-sub); }
    .stat-chg { display:flex; align-items:center; gap:4px; margin-top:8px; font-size:12px; font-weight:600; }
    .stat-chg.up { color: var(--green); } .stat-chg.dn { color: var(--red); }

    /* content grid (primary-focus + priority-rail) */
    .content-grid { display: grid; grid-template-columns: 1fr 340px; gap: 12px; }
    .card {
      background: var(--surface); border-radius: var(--r);
      border: 1px solid var(--border-light); overflow: hidden;
    }
    .card-hd {
      padding: 14px 18px 12px; display: flex; align-items: center; justify-content: space-between;
      border-bottom: 1px solid var(--border-light);
    }
    .card-title { font-size: 14px; font-weight: 700; }
    .card-bd { padding: 18px; }

    /* loan result hero */
    .limit-hero {
      background: var(--accent); border-radius: var(--r); padding: 16px 20px;
      color: #fff; text-align: center; margin-bottom: 14px;
    }
    .limit-hero-lbl { font-size: 11px; opacity: .85; margin-bottom: 4px; }
    .limit-hero-val { font-size: 40px; font-weight: 800; line-height: 1; }
    .limit-hero-sub { font-size: 12px; opacity: .9; margin-top: 3px; }
    .loan-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .loan-item-lbl { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing:.05em; color: var(--text-sub); margin-bottom: 3px; }
    .loan-item-val { font-size: 14px; font-weight: 700; }

    /* queue */
    .q-item {
      display: flex; align-items: center; gap: 11px;
      padding: 12px 18px; border-bottom: 1px solid var(--border-light);
      cursor: pointer; animation: slideRight .3s ease both;
    }
    .q-item:last-child { border-bottom: none; }
    .q-item:hover { background: var(--bg); }
    .q-rank {
      width: 28px; height: 28px; border-radius: 6px; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 12px; font-weight: 800;
    }
    .q-rank.hot { background: var(--accent-light); color: var(--accent); }
    .q-rank.norm { background: var(--bg); color: var(--text-sub); }
    .q-info { flex: 1; min-width: 0; }
    .q-name { font-size: 13px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .q-sub { font-size: 11px; color: var(--text-sub); margin-top: 2px; }
    .q-amt { font-size: 13px; font-weight: 800; flex-shrink: 0; }
    .badge {
      display: inline-flex; padding: 2px 8px; border-radius: var(--r-pill);
      font-size: 11px; font-weight: 700;
    }
    .badge-proc { background: #eff6ff; color: #2563eb; }
    .badge-rev  { background: #fff7ed; color: #ea580c; }
    .badge-doc  { background: #f0fdf4; color: #16a34a; }
    .badge-calc { background: #fef9c3; color: #a16207; }

    /* secondary row */
    .sec-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

    /* progress bar */
    .pb { height: 5px; background: var(--bg); border-radius: 3px; overflow: hidden; margin-top: 5px; }
    .pb-fill { height: 100%; background: var(--accent); border-radius: 3px; }

    /* auth view */
    .view-wrap {
      flex: 1; display: flex; align-items: center; justify-content: center; padding: 32px 20px;
      animation: fadeSlideUp .3s ease;
    }
    .auth-box { background: var(--surface); border-radius: var(--r); border: 1px solid var(--border-light); width: 100%; max-width: 480px; overflow: hidden; }
    .auth-steps-row { display: flex; align-items: center; padding: 16px 22px; background: var(--bg); border-bottom: 1px solid var(--border-light); gap: 0; }
    .step-node { display: flex; align-items: center; gap: 7px; }
    .step-circle {
      width: 28px; height: 28px; border-radius: 50%; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 800;
    }
    .sc-done   { background: var(--green); color: #fff; }
    .sc-active { background: var(--accent); color: #fff; }
    .sc-pend   { background: var(--border-light); color: var(--text-sub); }
    .step-lbl  { font-size: 12px; font-weight: 500; color: var(--text-sub); white-space: nowrap; }
    .step-lbl.active { color: var(--text); font-weight: 700; }
    .step-conn { flex: 1; height: 1px; background: var(--border-light); margin: 0 8px; }
    .auth-bd { padding: 26px 22px; }
    .auth-title { font-size: 18px; font-weight: 800; margin-bottom: 5px; }
    .auth-sub { font-size: 13px; color: var(--text-sub); margin-bottom: 20px; line-height: 1.5; }
    .pass-card {
      display: flex; align-items: center; gap: 12px;
      padding: 13px 16px; border: 1.5px solid var(--border-light); border-radius: var(--r);
      cursor: pointer; margin-bottom: 10px; transition: border-color .15s;
    }
    .pass-card:hover { border-color: var(--accent); }
    .pass-icon { width: 42px; height: 42px; border-radius: 8px; background: #0066ff; display:flex; align-items:center; justify-content:center; color:#fff; font-weight:800; font-size:12px; flex-shrink:0; }
    .otp-row { display: flex; gap: 8px; margin: 16px 0; }
    .otp-cell {
      flex: 1; height: 56px; border: 2px solid var(--border-light); border-radius: var(--r);
      text-align: center; font-size: 24px; font-weight: 800; font-family: monospace;
      background: var(--bg); color: var(--text);
    }
    .otp-cell.filled { border-color: var(--accent); background: var(--surface); }
    .btn-main {
      width: 100%; padding: 14px; border: none; border-radius: var(--r-pill);
      font-size: 15px; font-weight: 700; cursor: pointer; background: var(--accent); color: #fff;
      font-family: var(--font);
    }
    .btn-main:hover { opacity: .88; }
    .inp { padding: 10px 12px; border: 1px solid var(--border-light); border-radius: var(--r); font-size: 14px; font-family: var(--font); background: var(--bg); color: var(--text); width: 100%; }
    .inp:focus { outline: none; border-color: var(--accent); }

    /* security view */
    .sec-view { flex: 1; padding: 18px; display: flex; flex-direction: column; gap: 14px; animation: fadeSlideUp .3s ease; }
    .grade-bar {
      background: var(--surface); border: 1px solid var(--border-light); border-radius: var(--r);
      padding: 20px 24px; display: flex; align-items: center; gap: 24px;
    }
    .grade-ring {
      width: 78px; height: 78px; border-radius: 50%; background: #f0fdf4;
      border: 3px solid var(--green); display: flex; flex-direction: column; align-items: center; justify-content: center; flex-shrink: 0;
    }
    .grade-letter { font-size: 30px; font-weight: 900; color: var(--green); line-height: 1; }
    .grade-sub { font-size: 11px; color: var(--green); font-weight: 700; }
    .grade-stats { display: grid; grid-template-columns: repeat(3,1fr); gap: 12px; flex: 1; }
    .gs-val { font-size: 28px; font-weight: 800; line-height: 1; }
    .gs-lbl { font-size: 11px; color: var(--text-sub); margin-top: 3px; }
    .ev-table { width: 100%; border-collapse: collapse; }
    .ev-table th { background: var(--bg); padding: 9px 14px; text-align: left; font-size: 11px; font-weight: 700; color: var(--text-sub); border-bottom: 1px solid var(--border-light); text-transform: uppercase; letter-spacing:.04em; }
    .ev-table td { padding: 11px 14px; font-size: 13px; border-bottom: 1px solid var(--border-light); }
    .ev-table tr:last-child td { border-bottom: none; }

    /* apply view */
    .apply-wrap { flex: 1; display: flex; justify-content: center; padding: 22px 20px; animation: fadeSlideUp .3s ease; }
    .apply-inner { width: 100%; max-width: 680px; display: flex; flex-direction: column; gap: 14px; }
    .apply-steps-bar {
      background: var(--surface); border: 1px solid var(--border-light); border-radius: var(--r);
      padding: 16px 22px; display: flex; align-items: center;
    }
    .apply-form { background: var(--surface); border: 1px solid var(--border-light); border-radius: var(--r); overflow: hidden; }
    .form-sec { padding: 22px; border-bottom: 1px solid var(--border-light); }
    .form-sec:last-child { border-bottom: none; }
    .form-sec-ttl { font-size: 11px; font-weight: 800; color: var(--text-sub); text-transform: uppercase; letter-spacing:.07em; margin-bottom: 16px; }
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
    .form-group { display: flex; flex-direction: column; gap: 5px; }
    .form-lbl { font-size: 13px; font-weight: 600; }
    .form-actions { padding: 18px 22px; display: flex; gap: 10px; }
    .btn-sec { flex: 1; padding: 12px; border: 1.5px solid var(--border-light); border-radius: var(--r-pill); font-size: 14px; font-weight: 600; cursor: pointer; background: none; color: var(--text-sub); font-family: var(--font); }
    .btn-pri { flex: 2; padding: 12px; border: none; border-radius: var(--r-pill); font-size: 14px; font-weight: 700; cursor: pointer; background: var(--accent); color: #fff; font-family: var(--font); }
    .result-hero { background: var(--accent-light); border: 1.5px solid var(--accent); border-radius: var(--r); padding: 20px; text-align: center; }
    .rh-lbl { font-size: 12px; color: var(--accent); font-weight: 700; margin-bottom: 4px; }
    .rh-val { font-size: 38px; font-weight: 900; color: var(--accent); }

    @media (max-width: 900px) {
      .stat-row { grid-template-columns: 1fr 1fr; }
      .content-grid { grid-template-columns: 1fr; }
      .sec-row { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef } = React;

function useCountUp(target, duration = 1000) {
  const n = parseFloat(String(target).replace(/[^0-9.]/g, ''));
  const isFloat = String(target).includes('.');
  const [val, setVal] = useState(0);
  const started = useRef(false);
  useEffect(() => {
    if (started.current || !n) return;
    started.current = true;
    const start = performance.now();
    const tick = (now) => {
      const p = Math.min((now - start) / duration, 1);
      const eased = 1 - Math.pow(1 - p, 3);
      const cur = n * eased;
      setVal(p < 1 ? (isFloat ? cur.toFixed(1) : String(Math.floor(cur))) : target);
      if (p < 1) requestAnimationFrame(tick);
    };
    requestAnimationFrame(tick);
  }, []);
  return val === 0 ? '0' : val;
}

const IC = ({ n, s = 16, c = 'currentColor' }) => (
  <i data-lucide={n} style={{ width: s, height: s, color: c, display: 'inline-flex', flexShrink: 0 }} />
);

const Sparkline = ({ data, clr, w = 72, h = 28 }) => {
  const mn = Math.min(...data), mx = Math.max(...data), rng = mx - mn || 1;
  const pts = data.map((v, i) => [
    (i / (data.length - 1)) * w,
    h - ((v - mn) / rng) * h * 0.8 - h * 0.1
  ]);
  const d = pts.map((p, i) => `${i === 0 ? 'M' : 'L'}${p[0].toFixed(1)},${p[1].toFixed(1)}`).join(' ');
  return (
    <svg width={w} height={h} viewBox={`0 0 ${w} ${h}`}>
      <path d={d} fill="none" stroke={clr} strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" />
    </svg>
  );
};

const AreaChart = () => {
  const raw = [42,38,55,61,47,52,68,73,58,64,71,82,90,85,78,92,101,95,88,107,112,98,104,118,125,113,121,132,127,143];
  const W = 560, H = 150, PAD = 28;
  const max = 160;
  const pts = raw.map((v, i) => [
    PAD + (i / (raw.length - 1)) * (W - PAD * 2),
    H - 10 - (v / max) * (H - 30)
  ]);
  const line = pts.map((p, i) => `${i === 0 ? 'M' : 'L'}${p[0].toFixed(1)},${p[1].toFixed(1)}`).join(' ');
  const area = `${line} L${pts[pts.length-1][0]},${H-4} L${pts[0][0]},${H-4} Z`;
  const ys = [0, 40, 80, 120, 160];
  const xlbls = ['1일', '7일', '14일', '21일', '30일'];
  return (
    <svg viewBox={`0 0 ${W} ${H + 20}`} style={{ width: '100%', height: 150, display: 'block' }}>
      <defs>
        <linearGradient id="ag" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stopColor="#ff682c" stopOpacity="0.18" />
          <stop offset="100%" stopColor="#ff682c" stopOpacity="0" />
        </linearGradient>
      </defs>
      {ys.map((v, i) => {
        const y = H - 10 - (v / max) * (H - 30);
        return <g key={i}>
          <line x1={PAD} y1={y} x2={W - PAD} y2={y} stroke="#e8e8e8" strokeWidth="1" strokeDasharray="4 3" />
          <text x={PAD - 4} y={y + 3} textAnchor="end" fontSize="10" fill="#828282">{v}</text>
        </g>;
      })}
      <path d={area} fill="url(#ag)" />
      <path d={line} fill="none" stroke="#ff682c" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" />
      <circle cx={pts[pts.length - 1][0]} cy={pts[pts.length - 1][1]} r="4" fill="#ff682c" stroke="#fff" strokeWidth="2" />
      {xlbls.map((lbl, i) => (
        <text key={i} x={PAD + (i / 4) * (W - PAD * 2)} y={H + 14} textAnchor="middle" fontSize="10" fill="#828282">{lbl}</text>
      ))}
    </svg>
  );
};

const SecBarChart = () => {
  const bars = [12, 18, 8, 25, 15, 9, 22, 17, 11, 28, 20, 14];
  const max = 32, W = 320, H = 90;
  const bw = (W / bars.length) - 4;
  return (
    <svg viewBox={`0 0 ${W} ${H + 18}`} style={{ width: '100%', height: 108 }}>
      {bars.map((v, i) => {
        const h = (v / max) * (H - 8);
        const x = i * (W / bars.length) + 2;
        return (
          <rect key={i} x={x} y={H - h} width={bw} height={h}
            fill={v > 20 ? '#ef4444' : '#ff682c'} rx="2" opacity="0.82"
            style={{ transformOrigin: `${x + bw / 2}px ${H}px`, animation: `barGrow .55s ease ${i * 0.04}s both` }}
          />
        );
      })}

const LtvGauge = ({ value = 70 }) => {
  const r = 52, cx = 72, cy = 72;
  const startAngle = -130, endAngle = 130;
  const polar = (deg, rr) => {
    const rad = (deg - 90) * Math.PI / 180;
    return [cx + rr * Math.cos(rad), cy + rr * Math.sin(rad)];
  };
  const arcPath = (from, to) => {
    const [x1, y1] = polar(from, r);
    const [x2, y2] = polar(to, r);
    return `M ${x1} ${y1} A ${r} ${r} 0 ${to - from > 180 ? 1 : 0} 1 ${x2} ${y2}`;
  };
  const fillEnd = startAngle + (value / 100) * (endAngle - startAngle);
  return (
    <svg viewBox="0 0 144 110" style={{ width: '100%', maxWidth: 144, display: 'block', margin: '0 auto' }}>
      <path d={arcPath(startAngle, endAngle)} fill="none" stroke="#e8e8e8" strokeWidth="9" strokeLinecap="round" />
      <path d={arcPath(startAngle, fillEnd)} fill="none" stroke="#ff682c" strokeWidth="9" strokeLinecap="round"
        strokeDasharray="280" style={{ animation: 'drawGauge 1.2s cubic-bezier(.4,0,.2,1) forwards' }} />
      <text x={cx} y={cy + 8} textAnchor="middle" fontSize="24" fontWeight="800" fill="#202020" letterSpacing="-0.02em">{value}%</text>
      <text x={cx} y={cy + 24} textAnchor="middle" fontSize="10" fontWeight="600" fill="#828282">LTV 상한</text>
    </svg>
  );
};

function ApplyView() {

                <div style={{ width: 26, height: 26, borderRadius: '50%', display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 12, fontWeight: 800,

                  color: step >= i + 1 ? '#fff' : '#828282' }}>
                  {step > i + 1 ? '✓' : i + 1}

                <span style={{ fontSize: 13, fontWeight: step === i + 1 ? 800 : 500, color: step === i + 1 ? '#202020' : '#828282', whiteSpace: 'nowrap' }}>{lbl}</span>

                </div>
                <div className="form-group"><label className="form-lbl">근무 기간</label><input className="inp" defaultValue="7년 4개월" /></div>
              </div>
            </div>
            <div className="form-actions">
              <button className="btn-sec" onClick={() => setStep(1)}>이전</button>

function App() {
  const [view, setView] = useState('main');
  useEffect(() => { if (window.lucide) window.lucide.createIcons(); });

  return (
    <div data-archetype="topbar-analytics">
      <Header view={view} setView={setView} />
      <StatusStrip />
      {view === 'main'     && <MainView />}
      {view === 'auth'     && <AuthView />}
      {view === 'security' && <SecurityView />}
      {view === 'apply'    && <ApplyView />}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
