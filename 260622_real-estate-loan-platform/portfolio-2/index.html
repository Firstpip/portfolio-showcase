    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: var(--font); background: var(--bg); color: var(--text); }

      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }

    @media (max-width: 768px) {
      .sidebar { display: none; }
      .gallery-grid { grid-template-columns: 1fr; }
    }
  </style>

<script type="text/babel">
const { useState, useEffect, useRef } = React;

function useCountUp(target, duration = 1000) {
  const n = parseFloat(String(target).replace(/[^0-9.]/g, ''));
  const isFloat = String(target).includes('.');
  const [val, setVal] = useState(0);
  const started = useRef(false);
  useEffect(() => {
    if (started.current || !n) return;
    started.current = true;
    const start = performance.now();
    const tick = (now) => {
      const p = Math.min((now - start) / duration, 1);
      const eased = 1 - Math.pow(1 - p, 3);
      const cur = n * eased;
      setVal(p < 1 ? (isFloat ? cur.toFixed(1) : String(Math.floor(cur))) : target);
      if (p < 1) requestAnimationFrame(tick);
    };
    requestAnimationFrame(tick);
  }, []);
  return val === 0 ? '0' : val;
}

const PhIcon = ({ n, s = 18, c = 'currentColor' }) => (
  <i className={`ph ph-${n}`} style={{ fontSize: s, color: c, lineHeight: 1, display: 'inline-flex', alignItems: 'center', flexShrink: 0 }} />
);

const Sparkline = ({ data, clr = '#3ba6f1', w = 72, h = 28 }) => {
  const mn = Math.min(...data), mx = Math.max(...data), rng = mx - mn || 1;
  const pts = data.map((v, i) => [
    (i / (data.length - 1)) * w,
    h - ((v - mn) / rng) * h * 0.8 - h * 0.1
  ]);
  const d = pts.map((p, i) => `${i === 0 ? 'M' : 'L'}${p[0].toFixed(1)},${p[1].toFixed(1)}`).join(' ');
  return (
    <svg width={w} height={h} viewBox={`0 0 ${w} ${h}`}>
      <path d={d} fill="none" stroke={clr} strokeWidth="1.5" strokeLinecap="round"
        strokeDasharray="800" style={{ animation: 'drawLine 1.2s ease forwards' }} />
    </svg>
  );
};

function StatCard2({ lbl, num, unit, chg, up, spark }) {
  const displayed = useCountUp(num);
  return (
    <div className="stat-card">

      <div style={{ display: 'flex', alignItems: 'baseline', gap: 3 }}>
        <span className="sc-num" style={{ fontSize: 32, fontWeight: 800, lineHeight: 1, letterSpacing: -1 }}>{displayed}</span>
        <span className="sc-unit">{unit}</span>
      </div>
      <div className="sc-row">
        <div className={`sc-chg ${up ? 'up' : 'dn'}`}>
          <PhIcon n={up ? 'trend-up' : 'trend-down'} s={13} c={up ? 'var(--green)' : 'var(--red)'} />
          {chg} 어제 대비
        </div>
        <Sparkline data={spark} clr={up ? '#22c55e' : '#ef4444'} />
      </div>
    </div>
  );
}

const LineChart = ({ data, clr = '#3ba6f1', w = 300, h = 80 }) => {
  const mn = Math.min(...data), mx = Math.max(...data), rng = mx - mn || 1;
  const pts = data.map((v, i) => [
    (i / (data.length - 1)) * (w - 16) + 8,
    h - 8 - ((v - mn) / rng) * (h - 20)
  ]);
  const line = pts.map((p, i) => `${i === 0 ? 'M' : 'L'}${p[0].toFixed(1)},${p[1].toFixed(1)}`).join(' ');
  const area = `${line} L${pts[pts.length - 1][0]},${h} L${pts[0][0]},${h} Z`;
  return (
    <svg viewBox={`0 0 ${w} ${h}`} style={{ width: '100%', height: h, display: 'block' }}>
      <defs>
        <linearGradient id={`mg${clr.replace('#','')}`} x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stopColor={clr} stopOpacity="0.15" />
          <stop offset="100%" stopColor={clr} stopOpacity="0" />
        </linearGradient>
      </defs>
      <path d={area} fill={`url(#mg${clr.replace('#','')})`} />
      <path d={line} fill="none" stroke={clr} strokeWidth="2" strokeLinecap="round"
        strokeDasharray="800" style={{ animation: 'drawLine 1.5s ease forwards' }} />
      <circle cx={pts[pts.length - 1][0]} cy={pts[pts.length - 1][1]} r="4" fill={clr} stroke="#fff" strokeWidth="2" />
    </svg>
  );
};

        </div>
        <div className="chart-card">
          <div className="chart-hd">
            <span className="chart-ttl">CPU 사용률 (%)</span>
            <span style={{ fontSize: 22, fontWeight: 900, color: 'var(--primary)', letterSpacing: -0.5 }}>34%</span>
          </div>
          <div className="chart-bd"><LineChart data={cpuData} clr="#3ba6f1" h={90} /></div>
        </div>
        <div className="chart-card">
          <div className="chart-hd">
            <span className="chart-ttl">메모리 사용 (%)</span>
            <span style={{ fontSize: 22, fontWeight: 900, color: 'var(--amber)', letterSpacing: -0.5 }}>61%</span>
          </div>
          <div className="chart-bd"><LineChart data={memData} clr="#f59e0b" h={90} /></div>
        </div>
      </div>

      <div style={{ marginTop: 14, background: 'var(--surface)', border: '1px solid var(--border)', borderRadius: 'var(--r)', padding: '16px 18px' }}>
        <div style={{ fontSize: 14, fontWeight: 700, marginBottom: 12 }}>API 엔드포인트별 응답 시간</div>
        {[
          { ep: 'POST /api/loan/calculate', p50: '95ms', p95: '210ms', p99: '380ms', pct: 65 },
          { ep: 'GET /api/loan/list', p50: '42ms', p95: '98ms', p99: '180ms', pct: 30 },
          { ep: 'POST /api/auth/verify', p50: '120ms', p95: '280ms', p99: '450ms', pct: 75 },
          { ep: 'GET /api/admin/audit', p50: '68ms', p95: '150ms', p99: '290ms', pct: 45 },
        ].map((row, i) => (
          <div key={i} style={{ marginBottom: i < 3 ? 12 : 0 }}>
            <div style={{ display: 'flex', justifyContent: 'space-between', fontSize: 13, marginBottom: 5 }}>
              <span style={{ fontFamily: 'monospace', fontSize: 12, fontWeight: 600 }}>{row.ep}</span>
              <span style={{ color: 'var(--text-sub)', fontSize: 12 }}>P50 {row.p50} · P95 {row.p95} · P99 {row.p99}</span>
            </div>
            <div className="progress-bar"><div className="pb-fill" style={{ width: `${row.pct}%` }} /></div>
          </div>
        ))}
      </div>
    </div>
  );
}

function App() {
  const [view, setView] = useState('main');
  const viewTitles = { main: '대시보드', product: '상품 관리', audit: '감사 로그', monitor: '모니터링' };

  return (
    <div data-archetype="stripe-multipane">
      <Sidebar view={view} setView={setView} />
      <div className="main-wrap">
        <div className="topbar">
          <div>
            <span className="topbar-crumb" style={{ fontSize: 12, color: 'var(--text-sub)' }}>핀케어론 어드민 / </span>
            <span className="topbar-title">{viewTitles[view]}</span>
          </div>
          <div className="topbar-actions">
            <button className="tb-icon"><PhIcon n="magnifying-glass" s={15} c="var(--text-sub)" /></button>
            <button className="tb-icon" style={{ position: 'relative' }}>
              <PhIcon n="bell" s={15} c="var(--text-sub)" />
              <div style={{ position: 'absolute', top: 7, right: 7, width: 7, height: 7, background: 'var(--primary)', borderRadius: '50%', border: '1.5px solid #fff' }} />
            </button>
            <div style={{ width: 1, height: 20, background: 'var(--border)', margin: '0 4px' }} />
            <div style={{ display: 'flex', alignItems: 'center', gap: 7, cursor: 'pointer' }}>
              <div style={{ width: 30, height: 30, borderRadius: '50%', background: 'var(--primary-faint)', border: '1.5px solid var(--primary)', display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 12, fontWeight: 800, color: 'var(--primary)' }}>박</div>
              <PhIcon n="caret-down" s={13} c="var(--text-sub)" />
            </div>
          </div>
        </div>
        {view === 'main'    && <MainView />}
        {view === 'product' && <ProductView />}
        {view === 'audit'   && <AuditView />}
        {view === 'monitor' && <MonitorView />}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
