<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>공간 위생 솔루션 기업 홈페이지 — 맞춤 구현 데모</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone@7.14.9/babel.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/lucide@0.379.0/dist/umd/lucide.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --iris:#533afd;--iris-hover:#4428e8;--iris-tint:#e2e4ff;
  --accent:#f6a51e;--accent-bg:#fff8ec;
  --ink:#061b31;--steel:#50617a;--slate:#64748d;--pewter:#7d8ba4;
  --mist:#e5edf5;--snow:#f8fafd;--paper:#ffffff;
  --border:#d8e4f0;
  --shadow-sm:rgba(23,23,23,0.06) 0px 3px 6px 0px;
  --shadow-md:rgba(50,50,93,0.12) 0px 16px 32px 0px;
  --shadow-xl:rgba(0,0,0,0.2) 0px 0px 32px 8px;
  --r:4px;--font:'Pretendard',sans-serif;
}
html{scroll-behavior:auto}
body{background:var(--mist);color:var(--ink);font-family:var(--font);font-weight:400;font-size:16px;line-height:1.5;min-width:360px}

/* ── Keyframes ── */
@keyframes fadeInUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}
@keyframes countUp{0%{opacity:0;transform:translateY(8px)}100%{opacity:1;transform:translateY(0)}}
@keyframes shimmer{0%{background-position:200% center}100%{background-position:-200% center}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
@keyframes pinBounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
@keyframes slideIn{from{opacity:0;transform:translateX(16px)}to{opacity:1;transform:translateX(0)}}

/* ── Nav ── */
.topnav{position:fixed;top:0;left:0;right:0;z-index:100;background:rgba(248,250,253,.92);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);height:64px;display:flex;align-items:center;padding:0 24px;gap:32px}
.nav-brand{font-size:18px;font-weight:600;letter-spacing:-.4px;color:var(--ink);white-space:nowrap}
.nav-brand span{color:var(--iris)}
.nav-links{display:flex;gap:4px;flex:1}
.nav-btn{background:none;border:none;padding:8px 16px;border-radius:var(--r);font:inherit;font-size:14px;color:var(--steel);cursor:pointer;transition:all .15s;white-space:nowrap}
.nav-btn:hover{background:var(--iris-tint);color:var(--iris)}
.nav-btn.active{background:var(--iris-tint);color:var(--iris);font-weight:500}
.nav-cta{margin-left:auto;background:var(--iris);color:#fff;border:none;padding:10px 20px;border-radius:var(--r);font:inherit;font-size:14px;font-weight:500;cursor:pointer;transition:background .15s;white-space:nowrap}
.nav-cta:hover{background:var(--iris-hover)}

/* ── Content wrapper ── */
.page-wrap{display:flex;flex-direction:column;width:100%;min-height:100vh;padding-top:64px}

/* ── Hero ── */
.hero{position:relative;overflow:hidden;padding:80px 24px 96px;text-align:center;background:var(--mist)}
.hero-halo{position:absolute;right:-120px;top:-60px;width:600px;height:600px;background:radial-gradient(circle,rgba(127,125,252,.28),rgba(244,75,204,.14) 40%,transparent 70%);pointer-events:none}
.hero-halo2{position:absolute;right:-60px;top:40px;width:400px;height:400px;background:radial-gradient(circle,rgba(246,165,30,.15),transparent 70%);pointer-events:none}
.hero-inner{max-width:800px;margin:0 auto;position:relative;animation:fadeInUp .7s ease both}
.hero-eyebrow{font-size:12px;font-weight:400;letter-spacing:.12em;text-transform:uppercase;color:var(--slate);margin-bottom:16px}
.hero-title{font-size:clamp(36px,5vw,56px);font-weight:300;line-height:1.03;letter-spacing:-1.68px;color:var(--ink);margin-bottom:20px}
.hero-title .grad{background:linear-gradient(90deg,var(--iris),var(--steel));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.hero-sub{font-size:18px;color:var(--steel);line-height:1.6;max-width:600px;margin:0 auto 32px;font-weight:400}
.hero-actions{display:flex;gap:12px;justify-content:center;flex-wrap:wrap}
.btn-primary{background:var(--iris);color:#fff;border:none;padding:14px 28px;border-radius:var(--r);font:inherit;font-size:15px;font-weight:500;cursor:pointer;transition:background .15s;display:flex;align-items:center;gap:8px}
.btn-primary:hover{background:var(--iris-hover)}
.btn-secondary{background:transparent;color:var(--ink);border:1.5px solid var(--ink);padding:13px 28px;border-radius:var(--r);font:inherit;font-size:15px;font-weight:400;cursor:pointer;transition:all .15s}
.btn-secondary:hover{background:var(--ink);color:#fff}

/* ── Stats strip ── */
.geo-stats{background:var(--paper);border-top:1px solid var(--border);border-bottom:1px solid var(--border);padding:32px 24px}
.geo-stats-inner{max-width:1200px;margin:0 auto;display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:24px}
.stat-item{text-align:center;animation:countUp .6s ease both}
.stat-item:nth-child(2){animation-delay:.1s}
.stat-item:nth-child(3){animation-delay:.2s}
.stat-item:nth-child(4){animation-delay:.3s}
.stat-num{font-size:34px;font-weight:300;letter-spacing:-.68px;color:var(--iris);line-height:1.15}
.stat-label{font-size:13px;color:var(--slate);margin-top:4px}
.stat-badge{display:inline-flex;align-items:center;gap:4px;background:var(--iris-tint);color:var(--iris);font-size:12px;font-weight:500;padding:3px 10px;border-radius:var(--r);margin-top:6px}

/* ── Map section ── */
.map-section{padding:0}
.map-layout{display:flex;height:calc(100vh - 200px);min-height:500px}
.map-area{flex:1;background:linear-gradient(135deg,#d4e4f7 0%,#c8ddf2 50%,#bcd6ed 100%);position:relative;overflow:hidden}
.map-bg{width:100%;height:100%;position:relative}
/* SVG 지도 배경 */
.map-svg-bg{position:absolute;inset:0;width:100%;height:100%}
/* 마커 핀들 */
.map-marker{position:absolute;cursor:pointer;animation:pinBounce 2s ease-in-out infinite}
.map-marker:nth-child(2){animation-delay:.3s}
.map-marker:nth-child(3){animation-delay:.6s}
.map-marker:nth-child(4){animation-delay:.9s}
.map-marker:nth-child(5){animation-delay:.15s}
.map-marker:nth-child(6){animation-delay:.45s}
.map-pin{width:28px;height:36px;background:var(--iris);border-radius:50% 50% 50% 0;transform:rotate(-45deg);border:3px solid #fff;box-shadow:var(--shadow-sm);transition:transform .15s}
.map-marker:hover .map-pin{transform:rotate(-45deg) scale(1.2)}
.map-marker.active .map-pin{background:var(--accent)}
.map-popup{position:absolute;bottom:44px;left:50%;transform:translateX(-50%);background:#fff;border-radius:var(--r);padding:8px 12px;font-size:12px;color:var(--ink);white-space:nowrap;box-shadow:var(--shadow-md);opacity:0;pointer-events:none;transition:opacity .15s}
.map-marker:hover .map-popup,.map-marker.active .map-popup{opacity:1}
.map-cluster{position:absolute;width:40px;height:40px;border-radius:50%;background:var(--iris);color:#fff;font-size:13px;font-weight:600;display:flex;align-items:center;justify-content:center;cursor:pointer;box-shadow:0 0 0 8px rgba(83,58,253,.15);border:2px solid #fff}
/* 지도 컨트롤 */
.map-controls{position:absolute;top:16px;right:16px;display:flex;flex-direction:column;gap:4px}
.map-ctrl-btn{width:32px;height:32px;background:#fff;border:1px solid var(--border);border-radius:var(--r);display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--steel);font-size:16px}
.map-ctrl-btn:hover{background:var(--mist)}
.map-search-box{position:absolute;top:16px;left:16px;right:80px;background:#fff;border:1px solid var(--border);border-radius:var(--r);padding:8px 14px;font-size:14px;color:var(--ink);display:flex;align-items:center;gap:8px;box-shadow:var(--shadow-sm)}
.map-search-input{border:none;outline:none;flex:1;font:inherit;font-size:14px;color:var(--ink)}
/* Geo side panel */
.geo-side{width:320px;background:var(--snow);border-left:1px solid var(--border);overflow-y:auto;display:flex;flex-direction:column}
.geo-side-header{padding:16px;border-bottom:1px solid var(--border);background:var(--paper)}
.geo-side-title{font-size:14px;font-weight:600;color:var(--ink);margin-bottom:8px}
.geo-filter-row{display:flex;gap:6px;flex-wrap:wrap}
.filter-chip{padding:4px 10px;border-radius:var(--r);border:1px solid var(--border);font-size:12px;color:var(--steel);cursor:pointer;background:var(--snow);transition:all .12s;white-space:nowrap}
.filter-chip:hover,.filter-chip.active{background:var(--iris-tint);color:var(--iris);border-color:var(--iris)}
.location-list{flex:1;padding:8px}
.location-card{padding:12px;border-radius:var(--r);border:1px solid transparent;margin-bottom:6px;cursor:pointer;transition:all .15s;animation:slideIn .4s ease both}
.location-card:nth-child(2){animation-delay:.05s}
.location-card:nth-child(3){animation-delay:.1s}
.location-card:nth-child(4){animation-delay:.15s}
.location-card:nth-child(5){animation-delay:.2s}
.location-card:hover{background:var(--iris-tint);border-color:rgba(83,58,253,.2)}
.location-card.active{background:var(--iris-tint);border-color:var(--iris)}
.loc-name{font-size:13px;font-weight:600;color:var(--ink);margin-bottom:3px}
.loc-meta{display:flex;gap:8px;align-items:center;font-size:11px;color:var(--slate)}
.loc-type-badge{background:var(--mist);color:var(--steel);padding:2px 6px;border-radius:2px;font-size:10px;font-weight:500}

/* ── Inquiry section ── */
.inquiry-section{padding:80px 24px;background:var(--paper)}
.inquiry-inner{max-width:720px;margin:0 auto}
.section-eyebrow{font-size:12px;letter-spacing:.12em;text-transform:uppercase;color:var(--slate);margin-bottom:12px}
.section-title{font-size:clamp(26px,3vw,34px);font-weight:300;letter-spacing:-.68px;color:var(--ink);line-height:1.15;margin-bottom:8px}
.section-title .grad{background:linear-gradient(90deg,var(--iris),var(--steel));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.section-sub{font-size:16px;color:var(--steel);margin-bottom:40px;line-height:1.6}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.form-group{display:flex;flex-direction:column;gap:6px}
.form-group.full{grid-column:1/-1}
.form-label{font-size:13px;font-weight:500;color:var(--ink)}
.form-input{padding:10px 14px;border:1.5px solid var(--border);border-radius:var(--r);font:inherit;font-size:14px;color:var(--ink);background:var(--snow);transition:border-color .15s;outline:none}
.form-input:focus{border-color:var(--iris)}
.form-input::placeholder{color:var(--pewter)}
textarea.form-input{resize:vertical;min-height:100px}
.form-note{font-size:12px;color:var(--pewter);margin-top:4px}
.form-submit{background:var(--iris);color:#fff;border:none;padding:14px 32px;border-radius:var(--r);font:inherit;font-size:15px;font-weight:500;cursor:pointer;transition:background .15s;display:flex;align-items:center;gap:8px;margin-top:8px}
.form-submit:hover{background:var(--iris-hover)}
.form-success{background:var(--accent-bg);border:1px solid var(--accent);border-radius:var(--r);padding:16px;display:flex;align-items:center;gap:12px;margin-top:16px;animation:fadeInUp .4s ease}
.form-success-icon{width:32px;height:32px;border-radius:50%;background:var(--accent);display:flex;align-items:center;justify-content:center;flex-shrink:0}

/* ── SEO section ── */
.seo-section{padding:80px 24px;background:var(--mist)}
.seo-inner{max-width:1000px;margin:0 auto}
.seo-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-top:40px}
.seo-card{background:var(--paper);border-radius:var(--r);border:1px solid var(--border);padding:24px;transition:box-shadow .15s}
.seo-card:hover{box-shadow:var(--shadow-sm)}
.seo-card-head{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:16px}
.seo-card-title{font-size:15px;font-weight:600;color:var(--ink)}
.seo-score{display:flex;align-items:center;gap:6px}
.seo-score-val{font-size:22px;font-weight:300;letter-spacing:-.4px;color:var(--iris)}
.seo-score-label{font-size:11px;color:var(--slate)}
.seo-progress-row{display:flex;flex-direction:column;gap:10px}
.seo-progress-item{display:flex;flex-direction:column;gap:4px}
.seo-progress-label{display:flex;justify-content:space-between;font-size:12px;color:var(--steel)}
.seo-bar-wrap{height:6px;background:var(--mist);border-radius:99px;overflow:hidden}
.seo-bar{height:100%;background:linear-gradient(90deg,var(--iris),#8087ff);border-radius:99px;transition:width 1s ease;animation:barGrow 1s ease forwards}
@keyframes barGrow{from{width:0!important}to{width:var(--w)}}
.seo-keyword-list{display:flex;flex-direction:column;gap:8px}
.seo-keyword-item{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--border);font-size:13px}
.seo-keyword-item:last-child{border-bottom:none}
.seo-kw-name{color:var(--ink)}
.seo-kw-rank{background:var(--iris-tint);color:var(--iris);font-size:11px;font-weight:600;padding:2px 8px;border-radius:2px}
.seo-security-checks{display:flex;flex-direction:column;gap:8px}
.seo-check-item{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border);font-size:13px;color:var(--ink)}
.seo-check-item:last-child{border-bottom:none}
.check-ok{color:#22c55e}
.check-warn{color:var(--accent)}
.check-icon{width:18px;flex-shrink:0}

/* ── Footer ── */
.footer{background:var(--paper);border-top:1px solid var(--border);padding:48px 24px}
.footer-inner{max-width:1200px;margin:0 auto;display:grid;grid-template-columns:2fr 1fr 1fr 1fr;gap:32px}
.footer-brand-name{font-size:16px;font-weight:600;color:var(--ink);margin-bottom:8px}
.footer-brand-name span{color:var(--iris)}
.footer-brand-desc{font-size:13px;color:var(--pewter);line-height:1.6;max-width:200px}
.footer-col-title{font-size:13px;font-weight:600;color:var(--ink);margin-bottom:12px}
.footer-link{display:block;font-size:13px;color:var(--pewter);text-decoration:none;margin-bottom:8px;transition:color .12s}
.footer-link:hover{color:var(--iris)}
.footer-bottom{margin-top:32px;padding-top:24px;border-top:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;font-size:12px;color:var(--pewter)}
.footer-legal{display:flex;gap:16px}

/* ── Toast ── */
.toast{position:fixed;bottom:24px;right:24px;background:var(--ink);color:#fff;padding:12px 20px;border-radius:var(--r);font-size:14px;box-shadow:var(--shadow-md);animation:slideIn .3s ease;z-index:200;display:flex;align-items:center;gap:8px}

/* ── Responsive ── */
@media(max-width:768px){
  .topnav{padding:0 16px;gap:16px}
  .nav-links{gap:0}
  .nav-btn{padding:8px 10px;font-size:13px}
  .hero{padding:60px 16px 72px}
  .hero-title{letter-spacing:-.8px}
  .map-layout{flex-direction:column;height:auto}
  .map-area{height:320px}
  .geo-side{width:100%;height:280px}
  .seo-grid{grid-template-columns:1fr}
  .form-grid{grid-template-columns:1fr}
  .footer-inner{grid-template-columns:1fr 1fr}
  .footer-bottom{flex-direction:column;gap:8px;text-align:center}
}
@media(max-width:480px){
  .nav-brand{font-size:14px}
  .topnav{gap:8px}
  .footer-inner{grid-template-columns:1fr}
}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState, useEffect, useRef} = React;

const LOCATIONS = [
  {id:1, name:'강남구청사 내 공용공간',   area:'서울',  type:'공공기관', lat:'37.4%',  lng:'68%',  desc:'연면적 4,200㎡ 위생 솔루션 도입'},
  {id:2, name:'분당 주요 호텔 로비',      area:'경기',  type:'호텔',    lat:'44%',  lng:'72%',  desc:'5성급 호텔 전 층 공기 위생 관리'},
  {id:3, name:'마포 대형 오피스 빌딩',   area:'서울',  type:'오피스',  lat:'32%',  lng:'60%',  desc:'지하 1층~지상 22층 전 층 설치'},
  {id:4, name:'인천국제공항 제2터미널', area:'인천',  type:'공항',    lat:'30%',  lng:'47%',  desc:'입국장·출국장 위생 솔루션 구축'},
  {id:5, name:'부산 해운대 컨벤션센터', area:'부산',  type:'전시장',  lat:'68%',  lng:'75%',  desc:'대형 행사 위생 관리 시스템 구축'},
  {id:6, name:'대전 정부청사 복합시설',  area:'대전',  type:'공공기관', lat:'55%',  lng:'60%',  desc:'정부청사 전 구역 위생 솔루션 도입'},
];

const SEODATA = [
  {kw:'공간 위생 솔루션',rank:3},{kw:'공기 살균 기업',rank:5},{kw:'B2B 위생 전문',rank:8},{kw:'위생 솔루션 도입',rank:2},
];

function NavBar({active,onNav}){
  return (
    <nav className="topnav">
      <div className="nav-brand">클린<span>스페이스</span></div>
      <div className="nav-links">
        {['홈','설치장소','문의하기'].map(n=>(
          <button key={n} className={`nav-btn${active===n?' active':''}`} onClick={()=>onNav(n)}>{n}</button>
        ))}
      </div>
      <button className="nav-btn" style={{color:'var(--slate)'}} onClick={()=>onNav('SEO 설정')}>SEO 설정</button>
      <button className="nav-cta" onClick={()=>onNav('문의하기')}>도입 문의</button>
    </nav>
  );
}

function Hero({onNav}){
  return (
    <section id="홈" style={{position:'relative',overflow:'hidden',padding:'80px 24px 96px',textAlign:'center',background:'var(--mist)'}}>
      <div className="hero-halo"/>
      <div className="hero-halo2"/>
      <div className="hero-inner">
        <p className="hero-eyebrow">공간 위생 솔루션 전문 기업</p>
        <h1 className="hero-title">
          청결한 공간이<br/><span className="grad">신뢰를 만듭니다</span>
        </h1>
        <p className="hero-sub">ACF·CPT 기반 CMS와 Kakao Map 설치장소 연동을 포함한<br/>B2B 기업 홈페이지 구현 데모입니다.</p>
        <div className="hero-actions">
          <button className="btn-primary" onClick={()=>onNav('설치장소')}>
            <i data-lucide="map-pin" style={{width:16,height:16}}/>
            설치 현황 보기
          </button>
          <button className="btn-secondary" onClick={()=>onNav('문의하기')}>도입 문의하기</button>
        </div>
      </div>
      {/* Logo strip */}
      <div style={{maxWidth:900,margin:'64px auto 0',display:'flex',gap:32,justifyContent:'center',alignItems:'center',flexWrap:'wrap',opacity:.45}}>
        {['서울특별시','인천국제공항','(주)샘플호텔그룹','데모시티공단','예시기업연합'].map(b=>(
          <span key={b} style={{fontSize:14,fontWeight:600,color:'var(--steel)',letterSpacing:'.02em'}}>{b}</span>
        ))}
      </div>
    </section>
  );
}

function GeoStats(){
  return (
    <div className="geo-stats">
      <div className="geo-stats-inner">
        <div className="stat-item">
          <div className="stat-num">1,240+</div>
          <div className="stat-label">설치 완료 공간</div>
          <span className="stat-badge"><i data-lucide="trending-up" style={{width:10,height:10}}/>전국 확장 중</span>
        </div>
        <div className="stat-item">
          <div className="stat-num">380+</div>
          <div className="stat-label">도입 기업 수</div>
          <span className="stat-badge"><i data-lucide="building-2" style={{width:10,height:10}}/>B2B 전문</span>
        </div>
        <div className="stat-item">

function MapSection(){
  const [activeId,setActiveId]=useState(null);
  const [filter,setFilter]=useState('전체');
  const filters=['전체','서울','경기','인천','부산','대전'];
  const shown=filter==='전체'?LOCATIONS:LOCATIONS.filter(l=>l.area===filter);
  return (
    <section id="설치장소">
      <div className="map-layout">
        {/* Map area */}
        <div className="map-area">
          <div className="map-bg">
            {/* 검색바 */}
            <div className="map-search-box">
              <i data-lucide="search" style={{width:16,height:16,color:'var(--slate)',flexShrink:0}}/>
              <input className="map-search-input" placeholder="지역·업종으로 검색" readOnly/>
            </div>
            {/* 줌 컨트롤 */}
            <div className="map-controls">
              <button className="map-ctrl-btn">+</button>
              <button className="map-ctrl-btn">−</button>
            </div>
            {/* SVG 한국 지도 추상 표현 */}
            <svg className="map-svg-bg" viewBox="0 0 600 500" preserveAspectRatio="xMidYMid slice">
              <defs>
                <radialGradient id="mapGrad" cx="50%" cy="50%" r="50%">
                  <stop offset="0%" stopColor="#c8ddf2"/>
                  <stop offset="100%" stopColor="#a8c4e0"/>
                </radialGradient>
              </defs>
              <rect width="600" height="500" fill="url(#mapGrad)"/>
              {/* 지형 추상 경계선 */}
              <path d="M100,60 Q180,40 260,80 Q320,55 380,90 Q440,70 480,110 Q510,150 500,220 Q490,290 460,350 Q420,400 380,430 Q340,450 300,460 Q260,470 220,450 Q180,430 150,390 Q100,350 80,300 Q60,240 70,170 Q80,110 100,60Z" fill="#b8d4ea" opacity="0.6"/>
              {/* 도로선 표현 */}
              {[[120,100,450,380],[80,200,500,200],[300,80,300,440],[150,150,420,320]].map(([x1,y1,x2,y2],i)=>(
                <line key={i} x1={x1} y1={y1} x2={x2} y2={y2} stroke="#a0b8cc" strokeWidth="1" opacity="0.4"/>
              ))}
              {/* 구역 표시 원 */}
              {[[300,150,30,'서울'],[340,180,18,'경기'],[160,140,15,'인천'],[300,360,22,'부산'],[295,270,18,'대전']].map(([cx,cy,r,name],i)=>(
                <g key={i}>
                  <circle cx={cx} cy={cy} r={r} fill="rgba(83,58,253,.08)" stroke="rgba(83,58,253,.2)" strokeWidth="1"/>
                  <text x={cx} y={cy+4} textAnchor="middle" fontSize="9" fill="var(--steel)" fontFamily="Pretendard">{name}</text>
                </g>
              ))}
            </svg>
            {/* 마커 핀들 */}
            {LOCATIONS.map((loc,i)=>(
              <div key={loc.id} className={`map-marker${activeId===loc.id?' active':''}`}
                style={{left:loc.lng,top:loc.lat,position:'absolute',transform:'translate(-50%,-100%)'}}
                onClick={()=>setActiveId(activeId===loc.id?null:loc.id)}>
                <div className="map-pin"/>
                <div className="map-popup">{loc.name}</div>
              </div>
            ))}
            {/* 클러스터 */}
            <div className="map-cluster" style={{left:'64%',top:'36%'}}>5</div>
          </div>
        </div>
        {/* Geo side panel */}
        <div className="geo-side">
          <div className="geo-side-header">
            <div className="geo-side-title">설치 현황 목록</div>
            <div className="geo-filter-row">
              {filters.map(f=>(
                <button key={f} className={`filter-chip${filter===f?' active':''}`} onClick={()=>setFilter(f)}>{f}</button>
              ))}
            </div>
          </div>
          <div className="location-list">
            {shown.map(loc=>(
              <div key={loc.id} className={`location-card${activeId===loc.id?' active':''}`}
                onClick={()=>setActiveId(activeId===loc.id?null:loc.id)}>
                <div className="loc-name">{loc.name}</div>
                <div className="loc-meta">
                  <span className="loc-type-badge">{loc.type}</span>
                  <i data-lucide="map-pin" style={{width:10,height:10,color:'var(--slate)'}}/>

                  <p style={{fontSize:12,color:'var(--steel)',marginTop:6}}>{loc.desc}</p>
                )}

            ))}
          </div>
        </div>
      </div>
    </section>
  );
}

function InquirySection(){
  const [form,setForm]=useState({company:'',name:'',phone:'',email:'',type:'',msg:''});
  const [sent,setSent]=useState(false);
  const types=['B2B 서비스 도입','시설 관리 위탁','파트너십 협력','기타 문의'];
  const handle=e=>setForm(p=>({...p,[e.target.name]:e.target.value}));
  const submit=e=>{e.preventDefault();setSent(true)};
  return (
    <section id="문의하기" className="inquiry-section">
      <div className="inquiry-inner">
        <p className="section-eyebrow">도입 문의</p>
        <h2 className="section-title">
          <span className="grad">전문 상담팀</span>이 도와드립니다
        </h2>
        <p className="section-sub">문의 접수 후 영업일 1일 이내 담당자가 연락드립니다. 전자 세금계산서·견적서 발행이 가능합니다.</p>
        {!sent ? (
          <form onSubmit={submit}>
            <div className="form-grid">
              <div className="form-group">
                <label className="form-label">기업명 <span style={{color:'var(--iris)'}}>*</span></label>
                <input className="form-input" name="company" value={form.company} onChange={handle} placeholder="(주)데모기업" required/>
              </div>
              <div className="form-group">
                <label className="form-label">담당자 성함</label>
                <input className="form-input" name="name" value={form.name} onChange={handle} placeholder="홍길동"/>
              </div>
              <div className="form-group">
                <label className="form-label">연락처</label>
                <input className="form-input" name="phone" value={form.phone} onChange={handle} placeholder="010-0000-0000"/>
              </div>
              <div className="form-group">
                <label className="form-label">이메일 <span style={{color:'var(--iris)'}}>*</span></label>
                <input className="form-input" type="email" name="email" value={form.email} onChange={handle} placeholder="example@demo-company.co.kr" required/>
              </div>
              <div className="form-group full">
                <label className="form-label">문의 유형</label>
                <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
                  {types.map(t=>(
                    <button key={t} type="button"
                      className="filter-chip"
                      style={form.type===t?{background:'var(--iris-tint)',color:'var(--iris)',borderColor:'var(--iris)'}:{}}
                      onClick={()=>setForm(p=>({...p,type:t}))}>{t}</button>
                  ))}
                </div>
              </div>
              <div className="form-group full">
                <label className="form-label">문의 내용</label>
                <textarea className="form-input" name="msg" value={form.msg} onChange={handle} placeholder="도입 시설 규모, 필요 솔루션, 예산 등을 간략히 알려주세요."/>
                <span className="form-note">제출 즉시 담당자 이메일(Contact Form 7 + SMTP)로 자동 발송됩니다.</span>
              </div>
            </div>
            <button type="submit" className="form-submit">
              <i data-lucide="send" style={{width:16,height:16}}/>
              문의 제출하기
            </button>
          </form>
        ) : (
          <div className="form-success">
            <div className="form-success-icon">
              <i data-lucide="check" style={{width:18,height:18,color:'#fff'}}/>
            </div>
            <div>
              <p style={{fontSize:15,fontWeight:600,color:'var(--ink)',marginBottom:4}}>문의가 접수되었습니다!</p>
              <p style={{fontSize:13,color:'var(--steel)'}}>담당자 이메일과 신청자 이메일 두 곳으로 확인 메일이 발송되었습니다. 영업일 1일 이내 연락드리겠습니다.</p>
            </div>
          </div>
        )}
      </div>
    </section>
  );
}

function Features({onNav}){

function App(){
  const [active,setActive]=useState('홈');

  useEffect(()=>{
    if(typeof lucide!=='undefined') lucide.createIcons();
  });

  const goTo=name=>{
    setActive(name);
    window.scrollTo({top:0,behavior:'instant'});
  };

  const renderPage=()=>{
    if(active==='설치장소') return <MapSection/>;
    if(active==='문의하기') return <InquirySection/>;
    if(active==='SEO 설정') return <SEOSection/>;
    return (<><Hero onNav={goTo}/><Features onNav={goTo}/><GeoStats/></>);
  };

  return (
    <div style={{display:'flex',flexDirection:'column',width:'100%',minHeight:'100vh'}}>
      <NavBar active={active} onNav={goTo}/>
      <main style={{flex:1,width:'100%',paddingTop:64}}>
        {renderPage()}
        <Footer/>
      </main>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
