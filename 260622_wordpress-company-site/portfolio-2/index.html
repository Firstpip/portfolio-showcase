<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone@7.14.9/babel.min.js"></script>

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --teal:#52ebb2;--teal-dim:rgba(82,235,178,.12);--teal-border:rgba(82,235,178,.25);
  --secondary:#cdffe3;
  --accent:#70707d;
  --abyss:#171721;--surface:#1e1e2a;--card:#25253a;
  --text:#ededf3;--text2:#c3c3cc;--text3:#70707d;
  --border:rgba(112,112,125,.18);--border2:rgba(112,112,125,.1);
  --r-btn:32px;--r-card:0px;--font:'Pretendard',sans-serif;
}
html,body{height:100%}
body{background:var(--abyss);color:var(--text);font-family:var(--font);font-size:15px;line-height:1.5}

/* ── Keyframes ── */
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideRight{from{opacity:0;transform:translateX(-16px)}to{opacity:1;transform:translateX(0)}}
@keyframes slideUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes glowPulse{0%,100%{box-shadow:0 0 0 0 rgba(82,235,178,0)}50%{box-shadow:0 0 12px 4px rgba(82,235,178,.18)}}
@keyframes barFill{from{width:0!important}to{width:var(--w)}}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}

/* ── Layout shell ── */
.shell{display:flex;height:100vh;overflow:hidden}

/* ── Sidebar (tree) ── */
.sidebar{width:240px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;overflow:hidden}
.sidebar-header{padding:16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px}
.sidebar-logo{width:28px;height:28px;background:var(--teal);border-radius:6px;display:flex;align-items:center;justify-content:center}
.sidebar-brand{font-size:14px;font-weight:600;color:var(--text)}
.sidebar-sub{font-size:10px;color:var(--text3);margin-top:2px}

/* Tree nav */
.tree-nav{flex:1;overflow-y:auto;padding:8px 0}
.tree-nav::-webkit-scrollbar{width:4px}
.tree-nav::-webkit-scrollbar-track{background:transparent}
.tree-nav::-webkit-scrollbar-thumb{background:var(--border);border-radius:99px}
.tree-section{margin-bottom:4px}
.tree-section-label{font-size:10px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--text3);padding:12px 16px 4px}
.tree-item{position:relative;display:flex;align-items:center;gap:6px;padding:5px 12px 5px 16px;font-size:13px;color:var(--text2);cursor:pointer;transition:background .12s,color .12s;border-radius:0;user-select:none}
.tree-item:hover{background:rgba(255,255,255,.04);color:var(--text)}
.tree-item.active{background:var(--teal-dim);color:var(--teal)}
.tree-item .tree-icon{width:16px;height:16px;flex-shrink:0;opacity:.7}
.tree-item.active .tree-icon{opacity:1}
.tree-indent-1{padding-left:32px}
.tree-indent-2{padding-left:48px}
.tree-indent-3{padding-left:64px}
.tree-toggle{width:16px;height:16px;display:flex;align-items:center;justify-content:center;flex-shrink:0;color:var(--text3);transition:transform .15s}
.tree-toggle.open{transform:rotate(90deg)}
.tree-badge{margin-left:auto;background:var(--teal);color:#000;font-size:10px;font-weight:700;padding:1px 6px;border-radius:var(--r-btn)}
.tree-badge.muted{background:var(--card);color:var(--text3)}
.tree-active-bar{position:absolute;left:0;top:50%;transform:translateY(-50%);width:2px;height:18px;background:var(--teal);border-radius:0 2px 2px 0}

.sidebar-footer{padding:12px 16px;border-top:1px solid var(--border)}
.sidebar-user{display:flex;align-items:center;gap:8px;cursor:pointer;padding:6px;border-radius:6px}
.sidebar-user:hover{background:rgba(255,255,255,.04)}
.user-avatar{width:28px;height:28px;border-radius:50%;background:var(--teal);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;color:#000;flex-shrink:0}
.user-name{font-size:13px;color:var(--text);font-weight:500}
.user-role{font-size:11px;color:var(--text3)}

/* ── Main pane ── */
.main-pane{flex:1;display:flex;flex-direction:column;overflow:hidden}

/* Topbar */
.topbar{height:48px;border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 20px;gap:12px;flex-shrink:0;background:var(--abyss)}
.topbar-breadcrumb{font-size:13px;color:var(--text3);display:flex;align-items:center;gap:6px;flex:1}
.topbar-breadcrumb .sep{opacity:.4}
.topbar-breadcrumb .current{color:var(--text);font-weight:500}
.topbar-actions{display:flex;align-items:center;gap:8px}
.topbar-btn{background:none;border:1px solid var(--border);color:var(--text2);padding:5px 12px;border-radius:var(--r-btn);font:inherit;font-size:12px;cursor:pointer;display:flex;align-items:center;gap:6px;transition:all .12s}
.topbar-btn:hover{border-color:var(--teal);color:var(--teal)}
.topbar-btn.primary{background:var(--teal);border-color:var(--teal);color:#000;font-weight:600}
.topbar-btn.primary:hover{background:var(--secondary)}

/* Content area with split */
.content-area{flex:1;display:flex;overflow:hidden}

/* List rail (master) */
.list-rail{width:280px;border-right:1px solid var(--border);background:var(--surface);overflow-y:auto;flex-shrink:0}
.list-rail::-webkit-scrollbar{width:4px}
.list-rail::-webkit-scrollbar-thumb{background:var(--border)}
.list-rail-head{padding:12px 16px;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--surface);z-index:1}
.list-search{background:var(--card);border:1px solid var(--border);border-radius:var(--r-btn);padding:6px 12px;display:flex;align-items:center;gap:8px;font-size:13px;color:var(--text3)}
.list-search input{background:none;border:none;outline:none;color:var(--text);font:inherit;font-size:13px;width:100%}
.list-search input::placeholder{color:var(--text3)}
.list-item{padding:12px 16px;border-bottom:1px solid var(--border2);cursor:pointer;transition:background .12s;animation:fadeIn .3s ease}
.list-item:hover{background:rgba(255,255,255,.03)}
.list-item.active{background:var(--teal-dim);border-left:2px solid var(--teal)}
.list-item-title{font-size:13px;color:var(--text);font-weight:500;margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.list-item-meta{font-size:11px;color:var(--text3);display:flex;gap:8px;align-items:center}
.list-chip{padding:2px 6px;border-radius:2px;font-size:10px;font-weight:600;background:var(--card);color:var(--text3)}
.list-chip.green{background:rgba(82,235,178,.12);color:var(--teal)}
.list-chip.yellow{background:rgba(251,191,36,.12);color:#fbbf24}

/* Detail panel */
.detail-panel{flex:1;overflow-y:auto;padding:32px 40px;background:var(--abyss)}
.detail-panel::-webkit-scrollbar{width:4px}
.detail-panel::-webkit-scrollbar-thumb{background:var(--border)}

/* Notion-style blocks */
.page-cover{height:120px;border-radius:0;margin:-32px -40px 32px;background:linear-gradient(135deg,#1e1e3a 0%,#12122a 100%);position:relative;overflow:hidden;display:flex;align-items:flex-end;padding:20px 40px}
.page-cover-glow{position:absolute;top:-40px;right:-40px;width:240px;height:240px;background:radial-gradient(circle,rgba(82,235,178,.2),transparent 70%);animation:glowPulse 3s ease-in-out infinite}
.page-icon{width:48px;height:48px;background:var(--teal-dim);border-radius:0;display:flex;align-items:center;justify-content:center;border:1px solid var(--teal-border);margin-bottom:-24px;position:relative;z-index:1}

.page-title{font-size:clamp(36px,3.5vw,49px);font-weight:300;color:var(--text);letter-spacing:-.6px;margin-top:32px;margin-bottom:8px;line-height:1.15}
.page-props{display:flex;flex-wrap:wrap;gap:16px;margin-bottom:28px;padding-bottom:20px;border-bottom:1px solid var(--border2)}
.prop-item{display:flex;align-items:center;gap:6px;font-size:12px}
.prop-label{color:var(--text3);min-width:60px}
.prop-val{color:var(--text2)}
.prop-chip{background:var(--card);color:var(--teal);border-radius:2px;padding:2px 8px;font-size:11px;font-weight:500}

/* Block types */
[data-block-type]{margin-bottom:12px;animation:slideUp .3s ease}
[data-block-type="heading1"]{font-size:22px;font-weight:600;color:var(--text);margin:24px 0 12px;letter-spacing:-.3px}
[data-block-type="heading2"]{font-size:17px;font-weight:600;color:var(--text);margin:20px 0 8px;letter-spacing:-.2px}
[data-block-type="text"]{font-size:14px;color:var(--text2);line-height:1.7;max-width:720px}
[data-block-type="callout"]{background:var(--card);border-left:3px solid var(--teal);padding:12px 16px;display:flex;gap:10px;align-items:flex-start;max-width:720px;border-radius:0 var(--r-card) var(--r-card) 0}
[data-block-type="callout"] .callout-icon{flex-shrink:0;color:var(--teal)}
[data-block-type="callout"] .callout-text{font-size:13px;color:var(--text2);line-height:1.6}
[data-block-type="divider"]{height:1px;background:var(--border2);margin:16px 0;max-width:720px}
[data-block-type="table"]{width:100%;max-width:720px;border-collapse:collapse;font-size:13px}
[data-block-type="table"] th{text-align:left;padding:8px 12px;border-bottom:1px solid var(--border);color:var(--text3);font-weight:500;font-size:12px;letter-spacing:.04em;text-transform:uppercase}
[data-block-type="table"] td{padding:9px 12px;border-bottom:1px solid var(--border2);color:var(--text2);vertical-align:middle}
[data-block-type="table"] tr:last-child td{border-bottom:none}
[data-block-type="table"] tr:hover td{background:rgba(255,255,255,.02)}
[data-block-type="toggle"]{background:var(--card);border:1px solid var(--border2);max-width:720px}
.toggle-head{padding:10px 14px;cursor:pointer;display:flex;align-items:center;gap:8px;font-size:14px;color:var(--text);user-select:none}
.toggle-head:hover{background:rgba(255,255,255,.03)}
.toggle-body{padding:0 14px 12px 36px;font-size:13px;color:var(--text2);line-height:1.6;display:none}
.toggle-body.open{display:block;animation:fadeIn .2s ease}
[data-block-type="chart"]{max-width:720px}
[data-block-type="grid"]{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;max-width:720px}
.grid-card{background:var(--card);padding:16px;border:1px solid var(--border2)}
.grid-card-num{font-size:28px;font-weight:300;color:var(--teal);letter-spacing:-.4px;line-height:1.2}
.grid-card-label{font-size:12px;color:var(--text3);margin-top:3px}
.grid-card-trend{font-size:11px;color:var(--teal);margin-top:6px;display:flex;align-items:center;gap:4px}
[data-block-type="acf-fields"]{background:var(--card);border:1px solid var(--border2);padding:16px;max-width:720px}
.acf-title{font-size:12px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--text3);margin-bottom:12px}
.acf-row{display:flex;align-items:flex-start;gap:12px;padding:6px 0;border-bottom:1px solid var(--border2)}
.acf-row:last-child{border-bottom:none}
.acf-key{font-size:12px;color:var(--text3);min-width:100px;flex-shrink:0}
.acf-val{font-size:13px;color:var(--text2)}

/* SEO chart section */
.chart-wrap{height:180px;position:relative}

/* Security log */
.security-log{display:flex;flex-direction:column;gap:0;max-width:720px}
.log-entry{display:flex;align-items:flex-start;gap:10px;padding:8px 0;border-bottom:1px solid var(--border2);animation:slideUp .3s ease}
.log-entry:last-child{border-bottom:none}
.log-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;margin-top:4px}
.log-dot.ok{background:var(--teal)}
.log-dot.warn{background:#fbbf24}
.log-dot.block{background:#f87171}
.log-time{font-size:11px;color:var(--text3);min-width:80px;flex-shrink:0}
.log-msg{font-size:13px;color:var(--text2)}
.log-ip{font-size:11px;color:var(--text3);margin-left:auto;font-family:monospace;flex-shrink:0}

/* SEO bar rows */
.seo-bar-group{display:flex;flex-direction:column;gap:10px;max-width:720px}
.seo-bar-row{display:flex;align-items:center;gap:10px}
.seo-bar-row-label{font-size:12px;color:var(--text3);min-width:120px;flex-shrink:0}
.seo-bar-track{flex:1;height:4px;background:var(--card);border-radius:99px;overflow:hidden}
.seo-bar-fill{height:100%;background:var(--teal);border-radius:99px;animation:barFill .8s ease forwards}
.seo-bar-row-val{font-size:12px;color:var(--text2);min-width:32px;text-align:right}

/* CPT status badge */
.status-dot{width:6px;height:6px;border-radius:50%;display:inline-block;margin-right:4px;animation:blink 2s ease infinite}
.status-dot.live{background:var(--teal)}
.status-dot.draft{background:#fbbf24}

/* Toast notification */
.toast-notification{position:fixed;bottom:24px;right:24px;background:var(--card);border:1px solid var(--teal-border);color:var(--teal);padding:10px 18px;border-radius:var(--r-btn);font-size:13px;font-weight:500;box-shadow:0 4px 16px rgba(0,0,0,.4);animation:slideUp .25s ease;z-index:500;display:flex;align-items:center;gap:8px}

/* ── Responsive ── */
@media(max-width:900px){
  .list-rail{width:220px}
  .detail-panel{padding:24px}
  .page-cover{margin:-24px -24px 24px}
  [data-block-type="grid"]{grid-template-columns:1fr 1fr}
}
@media(max-width:640px){
  .sidebar{display:none}
  .list-rail{width:100%}
  .content-area{flex-direction:column}
  .list-rail{border-right:none;border-bottom:1px solid var(--border);max-height:200px}
  .detail-panel{padding:16px}
}
</style>
</head>

/* ── Phosphor icons helper ── */
function PhIcon({name,size=16,color}){
  const cls=`ph-${name}`;
  return <i className={cls} style={{fontSize:size,color:color||'inherit',display:'inline-flex',alignItems:'center',verticalAlign:'middle'}}/>;
}

/* ── Block renderer ── */
function Block({block,chartRef}){
  const [open,setOpen]=useState(false);
  switch(block.type){
    case 'heading1': return <div data-block-type="heading1">{block.content}</div>;
    case 'heading2': return <div data-block-type="heading2">{block.content}</div>;
    case 'text': return <div data-block-type="text">{block.content}</div>;
    case 'callout': return (
      <div data-block-type="callout">
        <i className={`ph-${block.icon}`} style={{fontSize:18}} />
        <div className="callout-text">{block.content}</div>
      </div>
    );
    case 'divider': return <div data-block-type="divider"/>;
    case 'table': return (
      <div style={{overflowX:'auto'}}>
        <table data-block-type="table">
          <thead><tr>{block.headers.map(h=><th key={h}>{h}</th>)}</tr></thead>
          <tbody>{block.rows.map((row,i)=>(
            <tr key={i}>{row.map((cell,j)=>(
              <td key={j}>{j===block.rows[0]?.length-1?
                <span style={{display:'flex',alignItems:'center'}}>
                  <span className={`status-dot ${cell==='게시'?'live':'draft'}`}/>
                  {cell}
                </span>:cell}
              </td>
            ))}</tr>
          ))}</tbody>
        </table>
      </div>
    );
    case 'toggle': return (
      <div data-block-type="toggle">
        <div className="toggle-head" onClick={()=>setOpen(!open)}>
          <PhIcon name={open?'caret-down':'caret-right'} size={14}/>
          {block.head}
        </div>
        <div className={`toggle-body${open?' open':''}`}>{block.body}</div>
      </div>
    );
    case 'grid': return (
      <div data-block-type="grid">
        {block.items.map((item,i)=>(
          <div key={i} className="grid-card">
            <div className="grid-card-num">{item.num}</div>
            <div className="grid-card-label">{item.label}</div>
            <div className="grid-card-trend">{item.trend}</div>
          </div>
        ))}
      </div>
    );
    case 'acf': return (
      <div data-block-type="acf-fields">
        <div className="acf-title"><PhIcon name="database" size={12}/> {block.label}</div>
        {block.fields.map((f,i)=>(
          <div key={i} className="acf-row">
            <span className="acf-key">{f.key}</span>
            <span className="acf-val">{f.val}</span>
          </div>
        ))}
      </div>
    );
    case 'chart': return (
      <div data-block-type="chart">
        <div className="chart-wrap"><canvas ref={chartRef}/></div>
      </div>
    );
    case 'seo-bars': return (
      <div data-block-type="text">
        <div className="seo-bar-group">
          {block.items.map((item,i)=>(
            <div key={i} className="seo-bar-row">
              <span className="seo-bar-row-label">{item.label}</span>
              <div className="seo-bar-track">
                <div className="seo-bar-fill" style={{'--w':item.val+'%',width:item.val+'%'}}/>
              </div>
              <span className="seo-bar-row-val">{item.val}</span>
            </div>
          ))}
        </div>
      </div>
    );
    case 'security-log': return (
      <div data-block-type="text">
        <div className="security-log">
          {block.entries.map((e,i)=>(
            <div key={i} className="log-entry">
              <span className={`log-dot ${e.level}`}/>
              <span className="log-time">{e.time}</span>
              <span className="log-msg">{e.msg}</span>
              <span className="log-ip">{e.ip}</span>
            </div>
          ))}
        </div>
      </div>
    );
    case 'feature-btn': return (
      <div data-block-type="text" style={{marginBottom:8}}>
        <button style={{background:'var(--card)',border:'1px solid var(--teal-border)',color:'var(--teal)',padding:'7px 16px',borderRadius:'var(--r-btn)',font:'inherit',fontSize:13,cursor:'pointer',display:'inline-flex',alignItems:'center',gap:8}}
          onClick={()=>{}}>
          <i className="ph-arrow-right" style={{fontSize:13}}/>
          {block.label}
        </button>
      </div>
    );
    default: return null;
  }
}

/* ── Sidebar tree ── */
function Sidebar({active,onNav,open}){
  const [expanded,setExpanded]=useState({'콘텐츠 관리':true});
  const toggle=id=>setExpanded(p=>({...p,[id]:!p[id]}));
  let lastSection='';
  return (
    <aside className="sidebar">
      <div className="sidebar-header">
        <div className="sidebar-logo"><PhIcon name="buildings" size={16} color="#000"/></div>
        <div>
          <div className="sidebar-brand">CleanSpace CMS</div>
          <div className="sidebar-sub">WordPress 백오피스 데모</div>
        </div>
      </div>
      <nav className="tree-nav">
        {TREE.map(item=>{
          const isParent=item.children&&item.children.length>0;
          const isChild=!!item.parent;
          if(isChild&&!expanded[item.parent]) return null;
          const sectionEl=item.section&&item.section!==lastSection?(lastSection=item.section,
            <div key={'s'+item.section} className="tree-section-label">{item.section}</div>):null;
          const depthClass=item.depth===2?'tree-indent-1':item.depth===3?'tree-indent-2':'';
          return (
            <React.Fragment key={item.id}>
              {sectionEl}
              <div className={`tree-item${active===item.id?' active':''} ${depthClass}`}
                onClick={()=>{if(isParent) toggle(item.id); onNav(item.id);}}>
                {active===item.id&&<span className="tree-active-bar"/>}
                {isParent&&(
                  <span className={`tree-toggle${expanded[item.id]?' open':''}`}>
                    <PhIcon name="caret-right" size={10}/>
                  </span>
                )}
                {!isParent&&item.depth>0&&<span style={{width:16,flexShrink:0}}/>}
                <i className={`ph-${item.icon} tree-icon`} style={{fontSize:15}}/>
                <span style={{flex:1}}>
                  {item.label}
                  {item.sub&&<span style={{display:'block',fontSize:9,color:'var(--text3)',fontWeight:400,marginTop:1,lineHeight:1.3}}>{item.sub}</span>}
                </span>
                {item.badge&&<span className="tree-badge">{item.badge}</span>}
              </div>
            </React.Fragment>
          );
        })}
      </nav>
      <div className="sidebar-footer">
        <div className="sidebar-user">
          <div className="user-avatar">관</div>
          <div>
            <div className="user-name">관리자</div>
            <div className="user-role">Administrator</div>
          </div>
        </div>
      </div>
    </aside>
  );
}

  return (

          <span className="prop-chip">WordPress CMS</span>
        </div>
        <div className="prop-item">
          <span className="prop-chip">ACF Pro</span>

              <div className="list-rail-head">
                <div className="list-search">
                  <PhIcon name="magnifying-glass" size={14}/>
                  <input placeholder={`${listKey} 검색`} readOnly/>
                </div>
              </div>
              {currentList.map(item=>(
                <div key={item.id} className={`list-item${selectedItem?.id===item.id?' active':''}`}
                  onClick={()=>setSelectedItem(item)}>
                  <div className="list-item-title">{item.title}</div>
                  <div className="list-item-meta">
                    <span className={`list-chip${item.status==='live'?' green':' yellow'}`}>
                      {item.status==='live'?'게시':'임시저장'}
                    </span>
                    <span>{item.date}</span>
                    <span>{item.category}</span>
                  </div>
                </div>
              ))}
            </div>
          )}
          <DetailPanel pageKey={activeNav} listItem={selectedItem}/>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
