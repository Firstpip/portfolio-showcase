<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>에스테틱 스케줄러 — 맞춤 구현 데모</title>
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" rel="stylesheet">
<script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone@7.27.3/babel.min.js" crossorigin></script>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js" crossorigin></script>
<style>
:root{
  --bark:#17150e;--mint:#f0f7f6;--paper:#ffffff;--ash:#e2e2e2;
  --slate:#4a4a40;--chartreuse:#cccc25;--charcoal:#0e1011;
  --periwinkle:linear-gradient(135deg,rgb(159,166,255),rgb(179,186,232));
  --moss:linear-gradient(135deg,rgb(108,136,83),rgb(153,171,145));
  --sage-grad:linear-gradient(135deg,rgb(154,193,150),rgb(174,199,176));
  --slate-blue-grad:linear-gradient(135deg,rgb(104,131,161),rgb(151,169,185));
  --sb-w:240px;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body,#root{height:100%;overflow:hidden}
body{font-family:'Pretendard',-apple-system,sans-serif;font-size:14px;color:var(--bark);background:var(--mint)}

@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideRight{from{opacity:0;transform:translateX(-12px)}to{opacity:1;transform:translateX(0)}}
@keyframes countUp{from{opacity:0;transform:scale(.88)}to{opacity:1;transform:scale(1)}}
@keyframes shimmer{0%{background-position:-600px 0}100%{background-position:600px 0}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.45}}
@keyframes ping{0%{transform:scale(1);opacity:1}80%,100%{transform:scale(2.2);opacity:0}}
@keyframes floatUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes glow{0%,100%{box-shadow:0 0 0 0 rgba(204,204,37,.4)}50%{box-shadow:0 0 0 6px rgba(204,204,37,0)}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes expandBar{from{width:0}to{width:100%}}

/* ── SIDEBAR ── */
.sidebar{position:fixed;left:0;top:0;bottom:0;width:var(--sb-w);
  background:var(--bark);display:flex;flex-direction:column;z-index:100;overflow-y:auto}
.sb-brand{padding:20px 16px 18px;display:flex;align-items:center;gap:10px;
  border-bottom:1px solid rgba(255,255,255,.08)}
.sb-logo{width:32px;height:32px;border-radius:9999px;background:var(--chartreuse);
  display:flex;align-items:center;justify-content:center;flex-shrink:0}
.sb-logo svg{color:var(--bark)}
.sb-brand-text .sb-title{color:#fff;font-weight:700;font-size:14px;letter-spacing:-.3px}
.sb-brand-text .sb-sub{color:rgba(255,255,255,.3);font-size:10px;margin-top:1px}
.sb-section{padding:14px 8px 4px}
.sb-section-label{color:rgba(255,255,255,.28);font-size:10px;font-weight:700;
  text-transform:uppercase;letter-spacing:.12em;padding:0 8px;margin-bottom:4px}
.sb-link{display:flex;align-items:center;gap:9px;padding:8px 10px;border-radius:8px;
  color:rgba(255,255,255,.55);cursor:pointer;font-size:13px;transition:all .15s;
  border:none;background:none;width:100%;text-align:left;font-family:inherit}
.sb-link:hover{background:rgba(255,255,255,.08);color:rgba(255,255,255,.9)}
.sb-link.active{background:rgba(204,204,37,.18);color:var(--chartreuse)}
.sb-link.active svg{color:var(--chartreuse)}
.sb-badge{margin-left:auto;background:var(--chartreuse);color:var(--bark);
  font-size:10px;font-weight:700;padding:1px 7px;border-radius:9999px}
.sb-footer{margin-top:auto;padding:16px;border-top:1px solid rgba(255,255,255,.06)}
.sb-user{display:flex;align-items:center;gap:10px}
.sb-avatar{width:30px;height:30px;border-radius:9999px;background:var(--chartreuse);
  display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:var(--bark)}
.sb-user-info .sb-name{color:#fff;font-size:12px;font-weight:600}
.sb-user-info .sb-role{color:rgba(255,255,255,.35);font-size:10px}

/* ── MAIN ── */
.main{margin-left:var(--sb-w);height:100%;display:flex;flex-direction:column;overflow:hidden}
.page-header{padding:20px 24px 0;flex-shrink:0}
.page-title-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.page-title{font-size:22px;font-weight:700;color:var(--bark);letter-spacing:-1.0px}
.header-actions{display:flex;gap:8px;align-items:center}
.btn-pill{padding:8px 18px;border-radius:9999px;border:none;cursor:pointer;
  font-family:inherit;font-size:13px;font-weight:600;transition:all .15s}
.btn-primary{background:var(--bark);color:#fff}
.btn-primary:hover{background:#2a2620}
.btn-outline{background:transparent;color:var(--bark);border:1.5px solid var(--ash)}
.btn-outline:hover{background:rgba(0,0,0,.04)}
.btn-accent{background:var(--chartreuse);color:var(--bark)}

/* stat row */
.stat-row{display:flex;gap:12px;margin-bottom:16px;animation:floatUp .4s ease both}
.stat-card{background:var(--paper);border-radius:14px;padding:16px;flex:1;
  border:1px solid var(--ash)}
.stat-card.gradient-periwinkle{background:var(--periwinkle);border:none}
.stat-card.gradient-moss{background:var(--moss);border:none}
.stat-card.gradient-sage{background:var(--sage-grad);border:none}
.stat-label{font-size:11px;color:var(--slate);font-weight:600;text-transform:uppercase;
  letter-spacing:.08em;margin-bottom:6px}
.stat-card.gradient-periwinkle .stat-label,
.stat-card.gradient-moss .stat-label,
.stat-card.gradient-sage .stat-label{color:rgba(255,255,255,.8)}
.stat-value{font-size:46px;font-weight:700;color:var(--bark);letter-spacing:-2.5px;line-height:1;
  animation:countUp .5s .1s both}
.stat-card.gradient-periwinkle .stat-value,
.stat-card.gradient-moss .stat-value,
.stat-card.gradient-sage .stat-value{color:#fff}
.stat-delta{font-size:11px;margin-top:3px;font-weight:600}
.stat-delta.pos{color:#2e9e5b}
.stat-delta.warn{color:#c87a00}
.stat-sparkline{display:block;margin-top:10px}

/* tabs */
.view-tabs{display:flex;gap:4px;padding:0;margin-bottom:14px}
.tab{padding:6px 14px;border-radius:9999px;border:1.5px solid var(--ash);
  background:transparent;color:var(--slate);cursor:pointer;font-size:12px;font-weight:600;
  font-family:inherit;transition:all .15s}
.tab.active{background:var(--bark);color:#fff;border-color:var(--bark)}

/* content area */
.content-body{flex:1;overflow:hidden;display:flex;gap:0;padding:0 24px 20px}
.calendar-region{flex:1;background:var(--paper);border-radius:14px;overflow:hidden;
  border:1px solid var(--ash);display:flex;flex-direction:column}
.slot-side{width:260px;margin-left:14px;display:flex;flex-direction:column;gap:12px;overflow-y:auto}

/* resource timeline */
.cal-header{display:flex;background:#f9faf8;border-bottom:1px solid var(--ash);font-size:11px;font-weight:700;color:var(--slate)}
.cal-resource-col{width:108px;padding:10px 12px;border-right:1px solid var(--ash);flex-shrink:0}
.cal-time-slots{flex:1;display:flex}
.cal-time-cell{flex:1;padding:8px 4px;text-align:center;border-right:1px solid #f0f0f0;font-size:10px;color:var(--slate)}
.cal-body{flex:1;overflow-y:auto}
.cal-row{display:flex;border-bottom:1px solid #f5f5f3;height:52px;align-items:stretch}
.cal-row:hover{background:#fcfcfb}
.cal-resource{width:108px;padding:8px 12px;display:flex;align-items:center;gap:8px;
  border-right:1px solid var(--ash);flex-shrink:0}
.cal-resource-avatar{width:26px;height:26px;border-radius:9999px;display:flex;align-items:center;
  justify-content:center;font-size:10px;font-weight:700;color:#fff;flex-shrink:0}
.cal-resource-name{font-size:12px;font-weight:600;color:var(--bark)}
.cal-resource-sub{font-size:10px;color:var(--slate)}
.cal-slots{flex:1;display:flex;align-items:center;padding:4px;gap:3px;overflow:hidden}
.cal-event{padding:4px 8px;border-radius:9999px;font-size:10px;font-weight:600;
  white-space:nowrap;cursor:pointer;transition:all .12s}
.cal-event:hover{filter:brightness(.92)}
.ev-confirmed{background:#e8f5e9;color:#2e7d32;border:1px solid #a5d6a7}
.ev-pending{background:#fff3cd;color:#7c5200;border:1px solid #ffd966}
.ev-progress{background:rgba(204,204,37,.18);color:#6b6b00;border:1px solid #d6d63b}
.ev-done{background:#f3f4f6;color:var(--slate);border:1px solid #e5e7eb}
.cal-empty{padding:4px 8px;border-radius:9999px;font-size:10px;color:var(--ash)}

/* slot-side panel */
.slot-panel{background:var(--paper);border-radius:14px;padding:16px;border:1px solid var(--ash)}
.slot-panel-title{font-size:12px;font-weight:700;color:var(--bark);margin-bottom:12px;
  letter-spacing:-.2px;display:flex;align-items:center;gap:6px}
.slot-item{padding:10px;border-radius:10px;border:1px solid var(--ash);margin-bottom:8px;
  cursor:pointer;transition:all .15s}
.slot-item:hover{border-color:var(--bark)}
.slot-time{font-size:11px;font-weight:700;color:var(--bark)}
.slot-name{font-size:12px;color:var(--slate);margin-top:1px}
.slot-badge{display:inline-flex;padding:2px 8px;border-radius:9999px;font-size:10px;font-weight:600;margin-top:4px}
.badge-confirmed{background:#e8f5e9;color:#2e7d32}
.badge-pending{background:#fff3cd;color:#7c5200}
.badge-chartreuse{background:rgba(204,204,37,.2);color:#6b6b00}
.live-dot{width:7px;height:7px;border-radius:9999px;background:#22c55e;
  animation:pulse 2s ease infinite;flex-shrink:0}
.ping-dot{position:relative;display:inline-flex}
.ping-dot::before{content:'';position:absolute;inset:0;border-radius:9999px;
  background:#22c55e;animation:ping 1.8s ease infinite}
.ping-dot::after{content:'';display:inline-flex;width:7px;height:7px;border-radius:9999px;
  background:#22c55e;position:relative}

/* schedule view */
.schedule-view{padding:20px 24px;flex:1;overflow-y:auto;animation:fadeIn .3s ease}
.manager-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px}
.manager-card{background:var(--paper);border-radius:14px;border:1px solid var(--ash);
  padding:16px;transition:all .2s;cursor:pointer}
.manager-card:hover{border-color:var(--bark);box-shadow:0 4px 20px rgba(23,21,14,.08)}
.manager-header{display:flex;align-items:center;gap:10px;margin-bottom:14px}
.manager-avatar{width:38px;height:38px;border-radius:9999px;display:flex;align-items:center;
  justify-content:center;font-size:14px;font-weight:700;color:#fff;flex-shrink:0}
.manager-name{font-size:14px;font-weight:700;color:var(--bark);letter-spacing:-.3px}
.manager-loc{font-size:11px;color:var(--slate);margin-top:1px}
.rule-chip{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;
  border-radius:9999px;border:1.5px solid var(--ash);font-size:11px;font-weight:600;color:var(--bark);margin:3px}
.rule-chip.active-chip{background:var(--chartreuse);border-color:var(--chartreuse);color:var(--bark)}
.slot-duration-row{display:flex;gap:6px;margin-top:10px}

/* batch view */
.batch-view{padding:20px 24px;flex:1;overflow-y:auto;animation:slideRight .3s ease}
.batch-form{background:var(--paper);border-radius:14px;border:1px solid var(--ash);padding:20px;margin-bottom:16px}
.form-section-title{font-size:13px;font-weight:700;color:var(--bark);letter-spacing:-.3px;margin-bottom:12px}
.day-chips{display:flex;gap:6px;flex-wrap:wrap}
.day-chip{width:36px;height:36px;border-radius:9999px;border:1.5px solid var(--ash);
  display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;
  color:var(--slate);cursor:pointer;transition:all .15s}
.day-chip.on{background:var(--bark);color:#fff;border-color:var(--bark)}
.pattern-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-top:14px}
.pg-head{text-align:center;font-size:10px;font-weight:700;color:var(--slate);padding:4px}
.pg-cell{aspect-ratio:1;border-radius:8px;display:flex;align-items:center;justify-content:center;
  font-size:10px;font-weight:600}
.pg-ok{background:#e8f5e9;color:#2e7d32}
.pg-conflict{background:#fee2e2;color:#c62828}
.pg-empty{background:#f9faf8;color:var(--ash)}
.conflict-banner{background:#fff3cd;border:1px solid #ffd966;border-radius:10px;padding:12px 16px;
  display:flex;align-items:center;gap:10px;font-size:13px;color:#7c5200;font-weight:500}

/* queue view */
.queue-view{padding:20px 24px;flex:1;overflow-y:auto;animation:fadeIn .3s ease}
.queue-table-wrap{background:var(--paper);border-radius:14px;border:1px solid var(--ash);overflow:hidden}
.queue-table{width:100%;border-collapse:collapse}
.queue-table th{padding:11px 16px;text-align:left;font-size:11px;font-weight:700;color:var(--slate);
  text-transform:uppercase;letter-spacing:.07em;background:#f9faf8;border-bottom:1px solid var(--ash)}
.queue-table td{padding:12px 16px;font-size:13px;border-bottom:1px solid #f5f5f3;vertical-align:middle}
.queue-table tr:last-child td{border-bottom:none}
.queue-table tr:hover td{background:#fcfcfb}
.status-pill{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:9999px;font-size:11px;font-weight:700}
.sp-auto{background:#e8f5e9;color:#2e7d32}
.sp-pending{background:#fff3cd;color:#7c5200}
.sp-conflict{background:#fee2e2;color:#c62828}
.sp-assigned{background:rgba(204,204,37,.2);color:#6b6b00}

/* util */
.section-title{font-size:15px;font-weight:700;color:var(--bark);letter-spacing:-.5px;margin-bottom:14px}
.tag{display:inline-flex;padding:2px 9px;border-radius:9999px;font-size:10px;font-weight:700;background:rgba(204,204,37,.18);color:#6b6b00}
.divider{height:1px;background:var(--ash);margin:12px 0}
</style>
</head>
<body data-archetype="stripe-multipane">

<script type="text/babel">
const {useState,useEffect} = React;

/* ── SVG Icons (Lucide-style) ── */
const Ic = ({d,size=16,sw=1.7,fill='none',c='currentColor'}) =>

const IcCalendar  = ({size=16})=><Ic size={size} d="M8 2v4m8-4v4M3 10h18M5 4h14a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2z"/>;
const IcUsers     = ({size=16})=><Ic size={size} d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2m4-10a4 4 0 1 0 8 0 4 4 0 0 0-8 0m13 10v-2a4 4 0 0 0-3-3.87m-4-7.75a4 4 0 0 1 0 7.75"/>;

const IcSettings  = ({size=16})=><Ic size={size} d="M12 15a3 3 0 1 0 0-6 3 3 0 0 0 0 6zm0-9c-.3 0-.6 0-1 .1L9.9 4.9A9.1 9.1 0 0 0 7 6.4L7.1 8a7 7 0 0 0-1.5 2.5L4 10.9A9 9 0 0 0 4 13l1.6.4c.3.9.8 1.8 1.4 2.5L7 17.6A9 9 0 0 0 9.9 19l.1 1.6c.6.1 1.3.2 2 .2.7 0 1.4-.1 2-.2l.1-1.6A9 9 0 0 0 17 17.6l1.6.1A9 9 0 0 0 20 15.1L18.5 15a7 7 0 0 0-1.5-2.6L17 11a9.1 9.1 0 0 0-2.9-1.5L14 7.9A9 9 0 0 0 12 6z"/>;
const IcLayers    = ({size=16})=><Ic size={size} d="M12 2 2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/>;
const IcInbox     = ({size=16})=><Ic size={size} d="M22 12h-6l-2 3H10L8 12H2m20 0V6a2 2 0 0 0-2-2H4a2 2 0 0 0-2 2v6m20 0v6a2 2 0 0 0-2 2H4a2 2 0 0 0-2-2v-6"/>;
const IcPlus      = ({size=16})=><Ic size={size} d="M12 5v14m-7-7h14"/>;
const IcChevronRight=({size=14})=><Ic size={size} d="M9 18l6-6-6-6" sw={2}/>;
const IcBell      = ({size=16})=><Ic size={size} d="M18 8a6 6 0 0 0-12 0c0 7-3 9-3 9h18s-3-2-3-9m-6 13a2 2 0 0 1-2-2h4a2 2 0 0 1-2 2"/>;
const IcFilter    = ({size=16})=><Ic size={size} d="M22 3H2l8 9.46V19l4 2V12.46z"/>;
const IcRefresh   = ({size=16})=><Ic size={size} d="M23 4v6h-6M1 20v-6h6m16.92-5a10 10 0 0 0-17.25-4.5L1 14m22 0-3.66-3.5A10 10 0 0 1 2.08 15"/>;
const IcCheck     = ({size=14})=><Ic size={size} d="M20 6 9 17l-5-5" sw={2.2}/>;

/* ── Sparkline SVG ── */
const Sparkline = ({pts,color='#17150e',h=28,w=80}) => {
  const max=Math.max(...pts),min=Math.min(...pts),range=max-min||1;
  const xs=pts.map((_,i)=>(i/(pts.length-1))*w);
  const ys=pts.map(p=>h-((p-min)/range)*(h-4)-2);
  const d=xs.map((x,i)=>`${i===0?'M':'L'}${x.toFixed(1)},${ys[i].toFixed(1)}`).join(' ');
  return <svg width={w} height={h} className="stat-sparkline">
    <path d={d} fill="none" stroke={color} strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/>
  </svg>;
};

/* ── Colors for avatars ── */
const COLORS=['#5b8dd9','#e07b45','#6c9e6c','#c47ab2','#d4a04a','#5b9e8c','#8e6cba','#c46b6b'];

/* ── MANAGERS DATA ── */
const MANAGERS = [
  {id:1,name:'이지은',region:'강남점',slots:30,color:COLORS[0],rules:{days:['월','수','금'],start:'10:00',end:'19:00',unit:60,buffer:15}},
  {id:2,name:'김민서',region:'홍대점',slots:60,color:COLORS[1],rules:{days:['화','목','토'],start:'11:00',end:'20:00',unit:30,buffer:10}},
  {id:3,name:'박지현',region:'강남점',slots:30,color:COLORS[2],rules:{days:['월','화','목'],start:'09:00',end:'18:00',unit:60,buffer:15}},
  {id:4,name:'최수연',region:'잠실점',slots:60,color:COLORS[3],rules:{days:['수','금','토'],start:'10:30',end:'19:30',unit:60,buffer:20}},
  {id:5,name:'정하은',region:'신촌점',slots:60,color:COLORS[4],rules:{days:['월','수','금'],start:'10:00',end:'18:00',unit:30,buffer:10}},
  {id:6,name:'윤서현',region:'홍대점',slots:60,color:COLORS[5],rules:{days:['화','목'],start:'12:00',end:'20:00',unit:60,buffer:15}},
  {id:7,name:'장미소',region:'강남점',slots:30,color:COLORS[6],rules:{days:['월','화','수','목','금'],start:'09:30',end:'17:30',unit:30,buffer:10}},
  {id:8,name:'임혜진',region:'잠실점',slots:60,color:COLORS[7],rules:{days:['화','목','토'],start:'11:00',end:'19:00',unit:60,buffer:15}},
];

const HOURS=['09','10','11','12','13','14','15','16','17','18'];

const EVENT_TYPES=[
  {label:'확정',cls:'ev-confirmed'},{label:'대기',cls:'ev-pending'},
  {label:'진행중',cls:'ev-progress'},{label:'완료',cls:'ev-done'},
];

/* sample events per manager row */
const SAMPLE_EVENTS = [
  [{type:0,text:'14:00 김지수',w:2},{type:2,text:'16:00 박민주',w:1}],
  [{type:1,text:'11:00 이태연',w:1},{type:0,text:'13:30 최서연',w:2}],
  [{type:0,text:'10:00 정아름',w:2},{type:3,text:'14:00 강다온',w:1}],
  [{type:1,text:'10:30 윤하린',w:1},{type:0,text:'15:00 임소연',w:2}],
  [{type:0,text:'11:00 전예진',w:1},{type:2,text:'14:30 오수아',w:2}],
  [{type:3,text:'12:00 남지혜',w:2},{type:1,text:'16:00 서유빈',w:1}],
  [{type:0,text:'09:30 채현아',w:1},{type:0,text:'11:30 배수빈',w:1},{type:1,text:'14:00 조민경',w:1}],
  [{type:1,text:'11:00 권나리',w:2},{type:3,text:'15:00 한소윤',w:1}],

      <div className="sb-footer">
        <div className="sb-user">
          <div className="sb-avatar">관</div>
          <div className="sb-user-info">
            <div className="sb-name">관리자</div>
            <div className="sb-role">전체 지점 · 슈퍼 관리자</div>
          </div>
        </div>
      </div>
    </aside>
    {/* Main */}
    <main className="main">
      {view==='main'    && <MainCalendarView showToast={showToast}/>}
      {view==='schedule'&& <ScheduleView/>}
      {view==='batch'   && <BatchView showToast={showToast}/>}
      {view==='queue'   && <QueueView showToast={showToast}/>}
      {view==='settings'&& <div style={{padding:24}}><div className="section-title">설정</div><p style={{color:'var(--slate)',marginTop:8}}>시스템 설정 화면입니다.</p></div>}
    </main>
    {toast&&<div style={{position:'fixed',bottom:24,left:'calc(240px + 50%)',transform:'translateX(-50%)',
      background:'var(--bark)',color:'#fff',padding:'10px 20px',borderRadius:9999,fontSize:13,fontWeight:600,
      boxShadow:'0 4px 20px rgba(0,0,0,.2)',zIndex:999,animation:'fadeIn .2s ease'}}>{toast}</div>}
  </div>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
