<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>예약 운영 플랫폼 — 구현 데모</title>
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/regular/style.css">

<style>
:root{
  --navy:#0b3558;--blue:#006bff;--mist:#f8f9fb;--paper:#ffffff;
  --slate:#64748b;--steel:#d4e0ed;--text:#0a0a0a;
  --mag:#e55cff;--ultra:#8247f5;--amber:#ffa600;
  --rad:8px;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body,#root{height:100%;overflow:hidden}
body{font-family:'Pretendard',-apple-system,sans-serif;font-size:14px;color:var(--text);background:var(--mist)}

@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideDown{from{opacity:0}to{opacity:1}}
@keyframes pulseRing{0%{box-shadow:0 0 0 0 rgba(0,107,255,.35)}70%{box-shadow:0 0 0 8px rgba(0,107,255,0)}100%{box-shadow:0 0 0 0 rgba(0,107,255,0)}}
@keyframes shimmer{0%{background-position:-600px 0}100%{background-position:600px 0}}
@keyframes countUp{from{opacity:0;transform:scale(.88)}to{opacity:1;transform:scale(1)}}
@keyframes ping{0%{transform:scale(1);opacity:1}80%,100%{transform:scale(2.2);opacity:0}}
@keyframes floatUp{from{opacity:0}to{opacity:1}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes glowBlue{0%,100%{box-shadow:0 0 0 0 rgba(0,107,255,.3)}50%{box-shadow:0 0 0 6px rgba(0,107,255,0)}}
@keyframes expandWidth{from{width:0}to{width:var(--bar-w,60%)}}

/* ── TOPNAV ── */
.topnav{position:sticky;top:0;z-index:100;height:58px;background:rgba(255,255,255,.96);
  backdrop-filter:blur(16px);border-bottom:1px solid var(--steel);
  display:flex;align-items:center;padding:0 28px;gap:0}
.tn-brand{display:flex;align-items:center;gap:10px;margin-right:32px}
.tn-logo{width:32px;height:32px;border-radius:var(--rad);background:var(--blue);
  display:flex;align-items:center;justify-content:center;color:#fff;font-size:16px}
.tn-title{font-size:15px;font-weight:800;color:var(--navy);letter-spacing:-.5px}
.tn-nav{display:flex;gap:2px;flex:1}
.tn-link{padding:6px 14px;border-radius:var(--rad);font-size:13px;font-weight:500;
  color:var(--slate);cursor:pointer;border:none;background:none;font-family:inherit;
  transition:all .15s;display:flex;align-items:center;gap:6px}
.tn-link:hover{background:rgba(0,107,255,.07);color:var(--navy)}
.tn-link.active{background:rgba(0,107,255,.1);color:var(--blue);font-weight:700}
.tn-right{display:flex;align-items:center;gap:10px;margin-left:auto}
.tn-badge{background:rgba(239,68,68,.12);color:#ef4444;font-size:11px;font-weight:700;
  padding:2px 9px;border-radius:20px}
.tn-avatar{width:30px;height:30px;border-radius:50%;background:var(--navy);
  display:flex;align-items:center;justify-content:center;color:#fff;font-size:11px;font-weight:700}
.btn{padding:8px 18px;border-radius:var(--rad);border:none;cursor:pointer;
  font-family:inherit;font-size:13px;font-weight:700;transition:all .15s;display:inline-flex;align-items:center;gap:6px}
.btn-primary{background:var(--blue);color:#fff}
.btn-primary:hover{background:#0056cc;transform:scale(1.02)}
.btn-ghost{background:none;color:var(--navy);border:1.5px solid var(--steel)}
.btn-ghost:hover{background:rgba(0,0,0,.04)}

/* ── STATUS STRIP ── */
.status-strip{background:linear-gradient(90deg,#0b2a45 0%,#0b3558 60%,#0f4a7a 100%);
  padding:0 28px;height:38px;display:flex;align-items:center;gap:20px;flex-shrink:0}
.ss-item{display:flex;align-items:center;gap:6px;color:rgba(255,255,255,.65);font-size:11px;font-weight:500}
.ss-value{color:#fff;font-weight:800;font-size:13px;letter-spacing:-.3px}
.ss-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.ss-dot-green{background:#22c55e}
.ss-dot-red{background:#ef4444;animation:ping 2s ease infinite}
.ss-divider{width:1px;height:14px;background:rgba(255,255,255,.12)}

/* ── MAIN WRAP ── */
.main-wrap{height:calc(100vh - 96px);display:flex;flex-direction:column;overflow:hidden}

/* ── TABS ── */
.tab-bar{display:flex;gap:0;padding:0 28px;flex-shrink:0;border-bottom:1px solid var(--steel);
  background:var(--paper)}
.tab-btn{padding:10px 18px;border:none;background:none;font-family:inherit;font-size:13px;
  font-weight:500;color:var(--slate);cursor:pointer;border-bottom:2.5px solid transparent;
  margin-bottom:-1px;transition:all .15s;display:flex;align-items:center;gap:7px}
.tab-btn.active{color:var(--blue);font-weight:700;border-bottom-color:var(--blue)}
.tab-btn:hover:not(.active){color:var(--navy)}

/* ── HERO AREA ── */
.hero-section{position:relative;padding:28px 28px 24px;flex-shrink:0;overflow:hidden}
.hero-bg{position:absolute;inset:0;background:linear-gradient(135deg,#f0f4ff 0%,var(--mist) 60%)}
.hero-blob1{position:absolute;width:320px;height:320px;border-radius:50%;
  background:radial-gradient(circle,rgba(130,71,245,.14) 0%,transparent 70%);
  right:-60px;top:-120px;pointer-events:none}
.hero-blob2{position:absolute;width:240px;height:240px;border-radius:50%;
  background:radial-gradient(circle,rgba(229,92,255,.1) 0%,transparent 70%);
  right:200px;bottom:-80px;pointer-events:none}
.hero-blob3{position:absolute;width:180px;height:180px;border-radius:50%;
  background:radial-gradient(circle,rgba(0,107,255,.08) 0%,transparent 70%);
  left:30%;top:-40px;pointer-events:none}
.hero-content{position:relative;z-index:1}
.hero-eyebrow{font-size:11px;font-weight:700;color:var(--blue);text-transform:uppercase;
  letter-spacing:.14em;margin-bottom:8px;display:flex;align-items:center;gap:6px}
.hero-title{font-size:50px;font-weight:800;color:var(--navy);letter-spacing:-2.5px;line-height:1.06;margin-bottom:12px}
.hero-sub{font-size:15px;color:var(--slate);font-weight:400;margin-bottom:20px;max-width:560px;line-height:1.5}
.hero-metrics{display:flex;gap:28px;flex-wrap:wrap}
.hm-item{display:flex;flex-direction:column}
.hm-val{font-size:38px;font-weight:800;color:var(--navy);letter-spacing:-1.8px;line-height:1;
  animation:countUp .5s both}
.hm-label{font-size:11px;color:var(--slate);font-weight:600;margin-top:3px;text-transform:uppercase;letter-spacing:.06em}
.hm-delta{font-size:11px;font-weight:600;margin-top:2px}
.hm-delta.pos{color:#16a34a}
.hm-delta.neg{color:#ef4444}
.hm-divider{width:1px;background:var(--steel);margin:4px 0}

/* ── CONTENT AREA ── */
.content-area{flex:1;overflow-y:auto;padding:20px 28px}

/* ── COMMAND TOWER BODY ── */
.ct-grid{display:grid;grid-template-columns:1fr 280px;gap:16px;margin-bottom:18px}

/* Link cards (primary-focus) */
.link-focus{background:var(--paper);border-radius:8px;border:1px solid var(--steel);overflow:hidden;
  box-shadow:0 2px 12px rgba(11,53,88,.07)}
.link-focus-header{padding:14px 18px;display:flex;align-items:center;justify-content:space-between;
  border-bottom:1px solid var(--steel);background:#fafbfd}
.lf-title{font-size:14px;font-weight:700;color:var(--navy);display:flex;align-items:center;gap:8px}
.link-card-list{padding:10px}
.link-card{display:flex;align-items:center;gap:14px;padding:12px;border-radius:6px;
  border:1px solid rgba(212,224,237,.6);margin-bottom:8px;cursor:pointer;transition:all .15s;
  animation:floatUp .3s ease both;box-shadow:0 1px 4px rgba(11,53,88,.04)}
.link-card:last-child{margin-bottom:0}
.link-card:hover{border-color:var(--blue);box-shadow:0 2px 12px rgba(0,107,255,.1)}
.lc-accent{width:4px;align-self:stretch;border-radius:2px;flex-shrink:0}
.lc-accent-blue{background:var(--blue)}
.lc-accent-green{background:#16a34a}
.lc-accent-gray{background:#d1d5db}
.lc-accent-amber{background:#d97706}
.lc-accent-red{background:#ef4444}
.lc-main{flex:1;min-width:0}
.lc-name{font-size:13px;font-weight:700;color:var(--navy);margin-bottom:2px}
.lc-sub{font-size:11px;color:var(--slate);margin-bottom:6px}
.lc-progress-track{height:4px;background:var(--steel);border-radius:9999px;overflow:hidden;width:180px}
.lc-progress-bar{height:100%;border-radius:9999px;animation:expandWidth .7s ease both}
.lc-right{display:flex;flex-direction:column;align-items:flex-end;gap:4px;flex-shrink:0}
.lc-count{font-size:20px;font-weight:800;color:var(--navy);letter-spacing:-.6px;line-height:1}
.lc-count-label{font-size:10px;color:var(--slate);font-weight:500}
.status-chip{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;
  border-radius:20px;font-size:11px;font-weight:700}
.sc-active{background:#dcfce7;color:#16a34a}
.sc-expired{background:#f3f4f6;color:var(--slate)}
.sc-pending{background:#fef3c7;color:#d97706}
.sc-conflict{background:#fee2e2;color:#ef4444}
.token-tag{font-family:monospace;font-size:10px;background:rgba(0,107,255,.07);
  color:var(--blue);padding:2px 8px;border-radius:4px;letter-spacing:.04em}

/* Priority rail */
.priority-rail{background:var(--paper);border-radius:8px;border:1px solid var(--steel);overflow:hidden;
  box-shadow:0 2px 12px rgba(11,53,88,.07);animation:slideDown .4s .1s both}
.pr-header{padding:12px 16px;border-bottom:1px solid var(--steel);display:flex;align-items:center;justify-content:space-between}
.pr-title{font-size:13px;font-weight:700;color:var(--navy);display:flex;align-items:center;gap:7px}
.pr-item{padding:12px 16px;border-bottom:1px solid rgba(212,224,237,.4);
  animation:floatUp .3s ease both;cursor:pointer;transition:background .12s}
.pr-item:hover{background:rgba(0,107,255,.025)}
.pr-item:last-child{border-bottom:none}
.pr-badge{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;
  justify-content:center;font-size:11px;font-weight:800;flex-shrink:0}
.pb-high{background:#fee2e2;color:#ef4444}
.pb-med{background:#fef3c7;color:#d97706}
.pb-low{background:#dcfce7;color:#16a34a}
.pr-name{font-size:12px;font-weight:700;color:var(--navy);margin-bottom:2px}
.pr-sub{font-size:11px;color:var(--slate)}

/* ── SECONDARY STRIP ── */
.secondary-strip{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
.sec-card{background:var(--paper);border-radius:8px;border:1px solid var(--steel);padding:16px;
  box-shadow:0 1px 6px rgba(11,53,88,.05);animation:floatUp .4s .15s both}
.sec-title{font-size:12px;font-weight:700;color:var(--navy);margin-bottom:12px;
  display:flex;align-items:center;gap:6px}

/* mini chart svg */
.mini-chart{display:block;width:100%;height:44px}

/* donut */

/* progress */
.prog-row{margin-bottom:8px}
.prog-label{display:flex;justify-content:space-between;font-size:11px;color:var(--slate);
  margin-bottom:4px;font-weight:500}
.prog-track{height:6px;background:var(--steel);border-radius:9999px;overflow:hidden}
.prog-bar{height:100%;border-radius:9999px;animation:expandWidth .8s ease both}

/* ── BOOKING VIEW ── */
.link-table-wrap{background:var(--paper);border-radius:8px;border:1px solid var(--steel);
  overflow:hidden;box-shadow:0 2px 12px rgba(11,53,88,.07)}
.link-table{width:100%;border-collapse:collapse}
.link-table th{padding:10px 14px;text-align:left;font-size:11px;font-weight:700;color:var(--slate);
  text-transform:uppercase;letter-spacing:.07em;background:#f8f9fb;border-bottom:1px solid var(--steel)}
.link-table td{padding:11px 14px;font-size:12px;border-bottom:1px solid rgba(212,224,237,.4);vertical-align:middle}
.link-table tr:last-child td{border-bottom:none}
.link-table tr:hover td{background:rgba(0,107,255,.018)}

/* ── NOTIFY VIEW ── */
.notify-filter-row{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap}
.filter-chip{padding:5px 12px;border-radius:var(--rad);border:1.5px solid var(--steel);
  background:none;font-family:inherit;font-size:12px;font-weight:600;color:var(--slate);
  cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:5px}
.filter-chip.on{background:rgba(0,107,255,.08);color:var(--blue);border-color:var(--blue)}
.notify-table-wrap{background:var(--paper);border-radius:8px;border:1px solid var(--steel);overflow:hidden}
.notify-table{width:100%;border-collapse:collapse}
.notify-table th{padding:10px 14px;text-align:left;font-size:11px;font-weight:700;color:var(--slate);
  text-transform:uppercase;letter-spacing:.07em;background:#f8f9fb;border-bottom:1px solid var(--steel)}
.notify-table td{padding:11px 14px;font-size:12px;border-bottom:1px solid rgba(212,224,237,.4);vertical-align:middle}
.notify-table tr:last-child td{border-bottom:none}
.ch-tag{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:700}
.ch-kakao{background:#fde68a;color:#92400e}
.ch-sms{background:#dbeafe;color:#1e40af}
.ch-push{background:#f3e8ff;color:#6b21a8}
.result-ok{color:#16a34a;font-weight:700}
.result-fail{color:#ef4444;font-weight:700}
.result-retry{color:#d97706;font-weight:700}

/* ── HISTORY VIEW ── */
.timeline-wrap{position:relative;padding-left:26px}
.timeline-wrap::before{content:'';position:absolute;left:8px;top:6px;bottom:0;
  width:2px;background:var(--steel)}
.timeline-item{position:relative;margin-bottom:14px;animation:floatUp .3s ease both}
.timeline-dot{position:absolute;left:-26px;width:16px;height:16px;border-radius:50%;
  border:2px solid var(--paper);top:2px}
.td-change{background:var(--blue)}
.td-cancel{background:#ef4444}
.td-confirm{background:#16a34a}
.td-create{background:var(--navy)}
.timeline-card{background:var(--paper);border-radius:8px;border:1px solid var(--steel);padding:12px 14px;
  box-shadow:0 1px 6px rgba(11,53,88,.05)}
.tc-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:5px}
.tc-event{font-size:13px;font-weight:700;color:var(--navy)}
.tc-time{font-size:11px;color:var(--slate)}
.tc-body{font-size:12px;color:var(--slate)}
.tc-actor{display:inline-flex;align-items:center;gap:4px;margin-top:6px;
  font-size:11px;font-weight:600;color:var(--navy)}

/* live */
.live-badge{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:700;
  color:#16a34a;background:#dcfce7;padding:3px 10px;border-radius:20px}
.live-dot{width:6px;height:6px;border-radius:50%;background:#16a34a;animation:ping 1.5s ease infinite}
</style>
</head>

/* ── Mini Charts ── */
const LineChart = ({pts,color='#006bff',h=44,w=200}) => {
  const max=Math.max(...pts),min=Math.min(...pts),range=max-min||1,n=pts.length;
  const xs=pts.map((_,i)=>(i/(n-1))*(w-4)+2);
  const ys=pts.map(p=>h-((p-min)/range)*(h-8)-4);
  const d=xs.map((x,i)=>`${i===0?'M':'L'}${x.toFixed(1)},${ys[i].toFixed(1)}`).join(' ');
  const ad=`${d} L${(w-2)},${h} L2,${h} Z`;
  return <svg className="mini-chart" viewBox={`0 0 ${w} ${h}`} preserveAspectRatio="none">
    <defs>
      <linearGradient id={`g${color.replace('#','')}`} x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stopColor={color} stopOpacity=".2"/>
        <stop offset="100%" stopColor={color} stopOpacity="0"/>
      </linearGradient>
    </defs>
    <path d={ad} fill={`url(#g${color.replace('#','')})`}/>
    <path d={d} fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/>
  </svg>;
};

const DonutChart = ({pct,color,size=52}) => {

    <circle cx="22" cy="22" r={r} fill="none" stroke="#eef2f7" strokeWidth="5"/>
    <circle cx="22" cy="22" r={r} fill="none" stroke={color} strokeWidth="5"
      strokeDasharray={`${dash.toFixed(1)} ${(circ-dash).toFixed(1)}`}
      strokeDashoffset={circ*0.25} strokeLinecap="round"/>
    <text x="22" y="26" textAnchor="middle" fontSize="9" fontWeight="800" fill={color}>{pct}%</text>

};
