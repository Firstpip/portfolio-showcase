<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>사내 프로젝트·이슈 통합 관리 시스템 — 맞춤 구현 데모</title>
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone@7.27.3/babel.min.js" crossorigin></script>
<script src="https://unpkg.com/prop-types/prop-types.min.js"></script>
<script src="https://unpkg.com/recharts@2.8.0/umd/Recharts.js" crossorigin></script>
<script type="text/x-placeholder" data-icon-lib="lucide@latest"></script>
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --brand:#7b68ee;
  --brand-hover:#6647f0;
  --brand-muted:#514b81;
  --brand-glow:#b38cff;
  --carbon:#202023;
  --charcoal:#292d34;
  --ink:#090c1d;
  --slate:#646464;
  --fog:#b3b3b3;
  --cloud:#e8e8e8;
  --paper:#f8f9fa;
  --white:#ffffff;
  --shadow-subtle:rgba(0,0,0,.10) 0 1px 3px 0,rgba(0,0,0,.10) 0 1px 2px -1px;
  --shadow-blue:rgba(18,43,165,.04) 0 1px 1px -.5px,rgba(18,43,165,.04) 0 3px 3px -1.5px,rgba(18,43,165,.04) 0 6px 6px -3px,rgba(18,43,165,.04) 0 12px 12px -6px;
  --sidebar-w:240px;
  --radius:10px;
}
body{font-family:'Pretendard',sans-serif;background:var(--paper);color:var(--ink);font-size:14px;line-height:1.5;overflow:hidden;height:100vh}
@keyframes shimmer{0%{background-position:200% center}100%{background-position:-200% center}}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.55;transform:scale(1.3)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes countUp{from{opacity:0;transform:scale(.85)}to{opacity:1;transform:scale(1)}}

/* Layout */
.app{display:flex;height:100vh;overflow:hidden}

/* Sidebar */
.sidebar{width:var(--sidebar-w);min-width:var(--sidebar-w);background:var(--carbon);display:flex;flex-direction:column;padding:0;overflow-y:auto;flex-shrink:0}
.sidebar-logo{display:flex;align-items:center;gap:10px;padding:18px 16px 14px;border-bottom:1px solid rgba(255,255,255,.07)}
.sidebar-logo-mark{width:28px;height:28px;background:var(--brand);border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:800;color:#fff;letter-spacing:-.5px}
.sidebar-app-name{font-size:14px;font-weight:700;color:#fff;letter-spacing:-.2px}
.sidebar-workspace{font-size:11px;color:rgba(255,255,255,.35);margin-top:1px}
.sidebar-cmdk{margin:10px 12px 8px;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.1);border-radius:10px;padding:7px 10px;display:flex;align-items:center;gap:8px;cursor:pointer;transition:background .15s}
.sidebar-cmdk:hover{background:rgba(255,255,255,.12)}
.sidebar-cmdk-text{font-size:12px;color:rgba(255,255,255,.4);flex:1}
.sidebar-cmdk-badge{font-size:10px;color:rgba(255,255,255,.3);background:rgba(255,255,255,.08);border-radius:4px;padding:2px 5px;font-weight:600}
.sidebar-section{padding:16px 12px 4px;font-size:10px;font-weight:700;color:rgba(255,255,255,.3);letter-spacing:.8px;text-transform:uppercase}
.sidebar-nav{padding:0 8px}
.sidebar-link{display:flex;align-items:center;gap:9px;padding:8px 10px;border-radius:10px;cursor:pointer;transition:all .15s;color:rgba(255,255,255,.55);font-size:13px;font-weight:500;margin-bottom:2px}
.sidebar-link:hover{background:rgba(255,255,255,.07);color:rgba(255,255,255,.85)}
.sidebar-link.active{background:var(--brand);color:#fff;font-weight:600}
.sidebar-link.active .slink-icon{color:#fff}
.slink-icon{width:16px;height:16px;flex-shrink:0;display:flex;align-items:center;justify-content:center}
.sidebar-badge{margin-left:auto;background:var(--brand);color:#fff;font-size:10px;font-weight:700;border-radius:10px;padding:1px 7px;min-width:18px;text-align:center}
.sidebar-link.active .sidebar-badge{background:rgba(255,255,255,.25)}
.sidebar-footer{margin-top:auto;padding:12px;border-top:1px solid rgba(255,255,255,.07)}
.avatar-row{display:flex;align-items:center;gap:8px}
.avatar{width:28px;height:28px;border-radius:50%;background:linear-gradient(135deg,var(--brand),#6647f0);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff;flex-shrink:0}
.avatar-name{font-size:12px;font-weight:600;color:rgba(255,255,255,.75)}
.avatar-role{font-size:10px;color:rgba(255,255,255,.3)}

/* Main */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;background:var(--white)}
.topbar{display:flex;align-items:center;padding:0 24px;height:52px;border-bottom:1px solid var(--cloud);gap:8px;flex-shrink:0}
.breadcrumb{display:flex;align-items:center;gap:6px;font-size:13px;color:var(--slate)}
.breadcrumb-sep{color:var(--cloud)}
.breadcrumb-current{color:var(--ink);font-weight:600}
.topbar-right{margin-left:auto;display:flex;align-items:center;gap:10px}
.btn-sm{display:flex;align-items:center;gap:6px;padding:6px 12px;border-radius:10px;font-size:12px;font-weight:600;cursor:pointer;border:none;transition:all .15s}
.btn-primary{background:var(--brand);color:#fff}
.btn-primary:hover{background:var(--brand-hover)}
.btn-ghost{background:transparent;color:var(--ink);border:1px solid var(--cloud)}
.btn-ghost:hover{background:var(--paper)}
.notif-dot{width:8px;height:8px;border-radius:50%;background:var(--brand);animation:pulse 2s ease-in-out infinite}

/* Content */
.content{flex:1;overflow-y:auto;padding:24px}

/* Dashboard — insight-board composition */
.insight-board{display:flex;flex-direction:column;gap:18px;animation:fadeUp .4s ease}

/* Hero-viz region */
.hero-viz{display:flex;gap:18px}
.hero-chart-wrap{flex:1;background:var(--white);border:1px solid var(--cloud);border-radius:var(--radius);padding:20px;box-shadow:var(--shadow-blue);min-height:260px;display:flex;flex-direction:column}
.hero-chart-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:16px}
.hero-chart-title{font-size:16px;font-weight:700;color:var(--ink);letter-spacing:-.3px}
.hero-chart-sub{font-size:12px;color:var(--slate);margin-top:3px}
.hero-chart-badge{display:flex;align-items:center;gap:5px;background:linear-gradient(90deg,var(--brand),#6647f0);background-size:200%;padding:4px 10px;border-radius:20px;font-size:11px;font-weight:700;color:#fff;animation:shimmer 3s linear infinite;white-space:nowrap}
.hero-chart-flex{flex:1;min-height:180px}

/* KPI-side region */
.kpi-side{width:220px;min-width:220px;display:flex;flex-direction:column;gap:10px}
.kpi-card{background:var(--white);border:1px solid var(--cloud);border-radius:var(--radius);padding:14px 16px;box-shadow:var(--shadow-blue);display:flex;flex-direction:column;gap:6px;animation:countUp .5s ease}
.kpi-card-label{font-size:11px;font-weight:600;color:var(--slate);letter-spacing:.3px;text-transform:uppercase}
.kpi-card-value{font-size:44px;font-weight:800;color:var(--ink);letter-spacing:-1.5px;line-height:1.0}
.kpi-card-delta{font-size:11px;font-weight:600;color:#16a34a;display:flex;align-items:center;gap:3px}
.kpi-card-delta.down{color:#dc2626}
.kpi-card-icon{display:flex;align-items:center;justify-content:center;width:28px;height:28px;border-radius:7px}

.priorities-card{background:var(--white);border:1px solid var(--cloud);border-radius:var(--radius);padding:14px 16px;box-shadow:var(--shadow-blue);flex:1;display:flex;flex-direction:column;gap:8px}
.priorities-title{font-size:12px;font-weight:700;color:var(--ink)}
.priority-row{display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid var(--paper)}
.priority-row:last-child{border:none}
.priority-badge{font-size:9px;font-weight:700;padding:2px 6px;border-radius:4px;white-space:nowrap}
.priority-high{background:#fee2e2;color:#dc2626}
.priority-mid{background:#fef3c7;color:#d97706}
.priority-low{background:#dcfce7;color:#16a34a}
.priority-name{font-size:12px;color:var(--ink);flex:1;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.priority-assignee{width:20px;height:20px;border-radius:50%;font-size:9px;font-weight:700;color:#fff;display:flex;align-items:center;justify-content:center;flex-shrink:0}

/* Widget-grid region */
.widget-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:18px}
.widget{background:var(--white);border:1px solid var(--cloud);border-radius:var(--radius);padding:16px;box-shadow:var(--shadow-blue)}
.widget-title{font-size:13px;font-weight:700;color:var(--ink);margin-bottom:12px;letter-spacing:-.2px}
.widget-chart-wrap{height:100px}
.widget-legend{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
.legend-item{display:flex;align-items:center;gap:4px;font-size:11px;color:var(--slate)}
.legend-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.timeline-list{display:flex;flex-direction:column;gap:8px}
.timeline-item{display:flex;gap:10px;align-items:flex-start}
.timeline-dot{width:8px;height:8px;border-radius:50%;margin-top:4px;flex-shrink:0;animation:pulse 2.5s ease-in-out infinite}
.timeline-dot.active{background:var(--brand)}
.timeline-dot.done{background:#16a34a;animation:none}
.timeline-dot.pending{background:var(--fog);animation:none}
.timeline-text{font-size:11px;color:var(--ink);font-weight:500}
.timeline-time{font-size:10px;color:var(--slate)}

/* Issue tracker */
.issue-page{animation:fadeUp .35s ease;display:flex;flex-direction:column;gap:16px}
.filter-bar{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.filter-chip{display:flex;align-items:center;gap:5px;padding:5px 10px;border:1px solid var(--cloud);border-radius:10px;font-size:12px;color:var(--slate);cursor:pointer;background:var(--white);transition:all .15s}
.filter-chip:hover,.filter-chip.active{border-color:var(--brand);color:var(--brand);background:#f3f1fe}
.filter-chip.active{font-weight:600}
.issue-table{background:var(--white);border:1px solid var(--cloud);border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow-blue)}
.table-head{display:grid;grid-template-columns:32px 1fr 90px 80px 80px 100px;gap:8px;padding:10px 16px;background:var(--paper);border-bottom:1px solid var(--cloud);font-size:11px;font-weight:700;color:var(--slate);letter-spacing:.3px;text-transform:uppercase}
.issue-row{display:grid;grid-template-columns:32px 1fr 90px 80px 80px 100px;gap:8px;padding:11px 16px;border-bottom:1px solid var(--paper);align-items:center;font-size:13px;cursor:pointer;transition:background .12s}
.issue-row:last-child{border:none}
.issue-row:hover{background:#f9f8ff}
.issue-id{font-size:11px;color:var(--fog);font-weight:600}
.issue-title{font-weight:500;color:var(--ink)}
.status-pill{display:inline-flex;align-items:center;gap:4px;padding:3px 8px;border-radius:20px;font-size:11px;font-weight:600;white-space:nowrap}
.s-todo{background:#f1f5f9;color:#475569}
.s-doing{background:#ede9ff;color:var(--brand)}
.s-done{background:#dcfce7;color:#16a34a}
.s-block{background:#fee2e2;color:#dc2626}
.prio-icon{width:14px;height:14px;border-radius:3px;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700}
.p-critical{background:#fee2e2;color:#dc2626}
.p-high{background:#fff3e0;color:#e65100}
.p-medium{background:#e8f5e9;color:#388e3c}
.p-low{background:#f1f5f9;color:#546e7a}
.assignee-mini{display:flex;align-items:center;gap:-4px}
.mini-av{width:22px;height:22px;border-radius:50%;font-size:9px;font-weight:700;color:#fff;display:flex;align-items:center;justify-content:center;border:2px solid var(--white);margin-right:-6px}
.issue-date{font-size:11px;color:var(--slate)}
.timeline-section{background:var(--white);border:1px solid var(--cloud);border-radius:var(--radius);padding:14px 16px;box-shadow:var(--shadow-blue)}
.timeline-section-title{font-size:12px;font-weight:700;color:var(--ink);margin-bottom:10px}
.history-list{display:flex;flex-direction:column;gap:6px}
.history-item{display:flex;align-items:flex-start;gap:10px;padding:6px 0;border-bottom:1px solid var(--paper);font-size:12px}
.history-item:last-child{border:none}
.h-dot{width:6px;height:6px;border-radius:50%;background:var(--brand);margin-top:5px;flex-shrink:0}
.h-text{color:var(--ink);flex:1}
.h-time{color:var(--fog);font-size:11px;white-space:nowrap}

/* Members */
.members-page{animation:fadeUp .35s ease;display:flex;flex-direction:column;gap:16px}
.members-header{display:flex;align-items:center;justify-content:space-between}
.members-title{font-size:16px;font-weight:700;color:var(--ink);letter-spacing:-.3px}
.members-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
.member-card{background:var(--white);border:1px solid var(--cloud);border-radius:var(--radius);padding:16px;box-shadow:var(--shadow-blue);display:flex;flex-direction:column;align-items:center;gap:10px;text-align:center}
.member-avatar{width:48px;height:48px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:800;color:#fff}
.member-name{font-size:14px;font-weight:700;color:var(--ink)}
.member-team{font-size:11px;color:var(--slate)}
.role-badge{padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700}
.role-admin{background:#ede9ff;color:var(--brand)}
.role-lead{background:#e8f5e9;color:#388e3c}
.role-dev{background:#e3f2fd;color:#1565c0}
.role-view{background:#f1f5f9;color:#546e7a}

/* Notification Settings */
.notif-page{animation:fadeUp .35s ease;display:flex;flex-direction:column;gap:16px;max-width:640px}
.notif-section{background:var(--white);border:1px solid var(--cloud);border-radius:var(--radius);padding:20px;box-shadow:var(--shadow-blue)}
.notif-section-title{font-size:14px;font-weight:700;color:var(--ink);margin-bottom:14px;padding-bottom:12px;border-bottom:1px solid var(--cloud)}
.notif-row{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--paper)}
.notif-row:last-child{border:none;padding-bottom:0}
.notif-label{font-size:13px;font-weight:600;color:var(--ink)}
.notif-desc{font-size:11px;color:var(--slate);margin-top:2px}
.toggle{width:38px;height:22px;border-radius:11px;cursor:pointer;position:relative;transition:background .2s;flex-shrink:0}
.toggle.on{background:var(--brand)}
.toggle.off{background:var(--cloud)}
.toggle-knob{position:absolute;top:3px;width:16px;height:16px;border-radius:50%;background:#fff;box-shadow:0 1px 3px rgba(0,0,0,.2);transition:left .2s}
.toggle.on .toggle-knob{left:19px}
.toggle.off .toggle-knob{left:3px}

/* CmdK palette */
.cmdk-backdrop{position:fixed;inset:0;background:rgba(9,12,29,.45);z-index:100;display:flex;align-items:flex-start;justify-content:center;padding-top:120px}
.cmdk-panel{width:520px;background:var(--white);border-radius:12px;box-shadow:0 8px 40px rgba(0,0,0,.25);overflow:hidden;animation:fadeUp .18s ease}
.cmdk-input-row{display:flex;align-items:center;gap:10px;padding:14px 16px;border-bottom:1px solid var(--cloud)}
.cmdk-input{flex:1;border:none;outline:none;font-size:15px;color:var(--ink);font-family:inherit;background:transparent}
.cmdk-input::placeholder{color:var(--fog)}
.cmdk-item{display:flex;align-items:center;gap:10px;padding:10px 16px;cursor:pointer;font-size:13px;color:var(--ink);transition:background .1s}
.cmdk-item:hover{background:var(--paper)}
.cmdk-item-icon{width:20px;height:20px;border-radius:5px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700}
.cmdk-item-key{margin-left:auto;font-size:10px;color:var(--fog);background:var(--paper);border:1px solid var(--cloud);border-radius:4px;padding:2px 6px;font-weight:600}

/* Toast */
.toast-wrap{position:fixed;bottom:20px;right:20px;background:var(--ink);color:#fff;border-radius:8px;padding:12px 16px;font-size:13px;font-weight:500;display:flex;align-items:center;gap:10px;box-shadow:0 4px 20px rgba(0,0,0,.25);animation:fadeUp .2s ease;z-index:200}
.toast-icon{width:18px;height:18px;background:var(--brand);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:800;flex-shrink:0}
.toast-close{margin-left:12px;cursor:pointer;opacity:.6;font-size:16px}

/* Section title */
.section-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.section-title{font-size:40px;font-weight:800;color:var(--ink);letter-spacing:-1.2px;line-height:1.1}
.section-sub{font-size:13px;color:var(--slate);margin-top:3px}
</style>
</head>

<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useRef,useCallback} = React;
const {AreaChart,Area,XAxis,YAxis,CartesianGrid,Tooltip,PieChart,Pie,Cell,BarChart,Bar,ResponsiveContainer,Legend} = Recharts;

// ─── CountUp ─────────────────────────────
function useCountUp(target, duration=800){
  const [val, setVal] = React.useState(0);
  const raf = useRef(null);
  useEffect(()=>{
    let start = null;
    const num = parseInt(String(target).replace(/[^0-9]/g,''),10)||0;
    const step=(ts)=>{
      if(!start) start=ts;
      const progress=Math.min((ts-start)/duration,1);
      setVal(Math.floor(progress*num));
      if(progress<1) raf.current=requestAnimationFrame(step);
    };
    raf.current=requestAnimationFrame(step);
    return ()=>cancelAnimationFrame(raf.current);
  },[target]);
  return val;
}
function CountUp({n,suffix=''}){const v=useCountUp(n);return <span>{v.toLocaleString()}{suffix}</span>;}

// ─── Toast ───────────────────────────────
function Toast({msg,onClose}){
  useEffect(()=>{const t=setTimeout(onClose,3000);return()=>clearTimeout(t);},[]);
  return (
    <div className="toast-wrap">
      <div className="toast-icon"><IcoCheck/></div>
      <span>{msg}</span>
      <span className="toast-close" onClick={onClose}>×</span>
    </div>
  );
}

// ─── App ─────────────────────────────────
function App(){
  const [view,setView]=useState('main');
  const [cmdOpen,setCmdOpen]=useState(false);
  const [toast,setToast]=useState(null);

  const onNav=(k)=>{
    if(k==='cmdk'){setCmdOpen(true);return;}
    setView(k);
  };

  return (
    <div className="app" data-archetype="linear-sidebar-cmdk">
      <Sidebar view={view} onNav={onNav}/>
      <div className="main">
        <Topbar view={view} onAdd={()=>setToast('이슈가 등록 대기열에 추가되었습니다.')}/>
        {view==='main'&&<Dashboard onToast={setToast}/>}
        {view==='issues'&&<IssueTracker/>}
        {view==='members'&&<MemberManagement/>}
        {view==='notifications'&&<NotificationSettings/>}
      </div>
      {cmdOpen&&<CmdK onClose={()=>setCmdOpen(false)}/>}
      {toast&&<Toast msg={toast} onClose={()=>setToast(null)}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
