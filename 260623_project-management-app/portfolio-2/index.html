<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>칸반 기반 팀 협업·분석 플랫폼 — 구현 데모</title>
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone@7.27.3/babel.min.js" crossorigin></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.2/dist/chart.umd.min.js"></script>
<script id="phosphor-icons-inline" type="text/x-placeholder">/* Phosphor icons — inline SVG implementation (PhIcon component) */</script>
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --cobalt:#455dd3;
  --cobalt-dark:#2537b1;
  --teal:#2ec4b6;
  --ink:#0b0b0b;
  --charcoal:#31302e;
  --warm-gray:#615d59;
  --silver:#c6c6c5;
  --cream:#f6f5f4;
  --paper:#ffffff;
  --radius:12px;
  --nav-h:60px;
}
body{font-family:'Pretendard',sans-serif;background:var(--cream);color:var(--ink);font-size:14px;line-height:1.5;overflow:hidden;height:100vh}
@keyframes rippleBtn{0%{transform:scale(0);opacity:.4}100%{transform:scale(3.5);opacity:0}}

@keyframes fadeSlide{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes cardFloat{from{opacity:0;transform:translateY(12px) scale(.97)}to{opacity:1;transform:translateY(0) scale(1)}}
@keyframes colSlide{from{opacity:0;transform:translateX(-8px)}to{opacity:1;transform:translateX(0)}}
@keyframes ripple{0%{transform:scale(0);opacity:.5}100%{transform:scale(4);opacity:0}}
@keyframes shimmerCreamy{0%{background-position:-200% 0}100%{background-position:200% 0}}

/* Top Nav */
.topnav{
  position:sticky;top:0;z-index:100;height:var(--nav-h);
  background:var(--paper);border-bottom:1px solid var(--silver);
  display:flex;align-items:center;gap:0;padding:0 24px;
  flex-shrink:0;
}
.nav-brand{display:flex;align-items:center;gap:10px;margin-right:32px}
.nav-logo{
  width:30px;height:30px;border-radius:8px;
  background:var(--cobalt);display:flex;align-items:center;justify-content:center;
  font-weight:800;font-size:13px;color:var(--paper);
}
.nav-name{font-weight:700;font-size:15px;letter-spacing:-.4px;color:var(--ink)}
.nav-tabs{display:flex;align-items:center;gap:2px;flex:1}
.nav-tab{
  padding:8px 14px;border-radius:8px;font-size:13px;font-weight:600;
  cursor:pointer;color:var(--warm-gray);transition:.15s;position:relative;
  display:flex;align-items:center;gap:6px;
}
.nav-tab:hover{background:var(--cream);color:var(--charcoal)}
.nav-tab.active{background:rgba(69,93,211,.08);color:var(--cobalt)}
.nav-tab.active::after{
  content:'';position:absolute;bottom:-14px;left:12px;right:12px;
  height:2px;background:var(--cobalt);border-radius:2px;
}
.nav-actions{margin-left:auto;display:flex;align-items:center;gap:8px}
.btn{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;border:none;transition:.15s;font-family:inherit}
.btn-primary{background:var(--cobalt);color:var(--paper)}
.btn-primary:hover{background:var(--cobalt-dark)}
.btn-ghost{background:transparent;border:1px solid var(--silver);color:var(--charcoal)}
.btn-ghost:hover{background:var(--cream)}
.btn-teal{background:rgba(46,196,182,.1);color:var(--teal);border:1px solid rgba(46,196,182,.25)}
.btn-teal:hover{background:rgba(46,196,182,.18)}
.nav-avatar{width:32px;height:32px;border-radius:50%;background:var(--cobalt);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:var(--paper);cursor:pointer}

/* Content */
.content{flex:1;overflow-y:auto;height:calc(100vh - var(--nav-h));background:var(--cream);padding:24px}
.page-header{margin-bottom:20px;animation:fadeSlide .4s ease both}
.page-title{font-size:40px;font-weight:800;letter-spacing:-1.5px;color:var(--ink);margin-bottom:4px;line-height:1.1}
.page-sub{font-size:13px;color:var(--warm-gray)}

/* Kanban Board */
.board-toolbar{display:flex;align-items:center;gap:8px;margin-bottom:16px}
.board-search{flex:1;max-width:280px;display:flex;align-items:center;gap:8px;padding:8px 12px;background:var(--paper);border:1px solid var(--silver);border-radius:8px}
.board-search input{border:none;outline:none;font-size:13px;font-family:inherit;color:var(--ink);width:100%;background:transparent}
.board{display:flex;gap:16px;overflow-x:auto;padding-bottom:16px}
.column{
  min-width:280px;max-width:280px;
  background:rgba(255,255,255,.7);border-radius:var(--radius);
  border:1px solid var(--silver);flex-shrink:0;
  animation:colSlide .4s ease both;
}
.column:nth-child(2){animation-delay:.08s}
.column:nth-child(3){animation-delay:.16s}
.column:nth-child(4){animation-delay:.24s}
.col-header{
  padding:12px 14px;border-bottom:1px solid var(--silver);
  display:flex;align-items:center;justify-content:space-between;
}
.col-name{font-size:12px;font-weight:800;letter-spacing:.04em;text-transform:uppercase;color:var(--charcoal)}
.col-count{
  font-size:11px;font-weight:700;padding:2px 7px;border-radius:10px;
  background:var(--cream);color:var(--warm-gray);border:1px solid var(--silver);
}
.col-body{padding:10px 10px;display:flex;flex-direction:column;gap:8px;min-height:160px}
.card{
  background:var(--paper);border-radius:14px;border:1px solid var(--silver);
  padding:12px;cursor:pointer;transition:.2s;
  animation:cardFloat .35s ease both;
  box-shadow:0 1px 3px rgba(0,0,0,.06),0 2px 8px rgba(0,0,0,.04);
  position:relative;overflow:hidden;
}
.card:hover{border-color:var(--cobalt);box-shadow:0 4px 16px rgba(69,93,211,.16);transform:translateY(-2px)}
.card-ripple{position:absolute;border-radius:50%;background:rgba(69,93,211,.15);width:24px;height:24px;transform:scale(0);animation:rippleBtn .5s ease forwards;pointer-events:none}
.card-header{display:flex;align-items:flex-start;gap:6px;margin-bottom:8px}
.card-title{font-size:13px;font-weight:600;color:var(--ink);flex:1;line-height:1.35}
.card-tags{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:8px}
.tag{display:inline-flex;align-items:center;gap:3px;padding:2px 7px;border-radius:5px;font-size:10px;font-weight:700}
.card-meta{display:flex;align-items:center;justify-content:space-between}
.assignees{display:flex}
.av{width:22px;height:22px;border-radius:50%;border:2px solid var(--paper);margin-left:-6px;display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:700;color:var(--paper)}
.av:first-child{margin-left:0}
.due-date{font-size:10px;color:var(--warm-gray);font-weight:600}
.prio-bar{height:3px;border-radius:2px;width:100%;margin-bottom:8px}
.col-add{padding:10px 14px 14px;cursor:pointer;font-size:12px;color:var(--silver);display:flex;align-items:center;gap:4px;border-top:1px dashed var(--silver);margin-top:auto}
.col-add:hover{color:var(--cobalt)}

/* Matrix Side */
.board-layout{display:grid;grid-template-columns:1fr 240px;gap:16px;align-items:start}
.matrix-panel{background:var(--paper);border-radius:var(--radius);border:1px solid var(--silver);padding:16px;animation:fadeSlide .5s ease both .2s both}
.matrix-title{font-size:12px;font-weight:800;letter-spacing:.04em;text-transform:uppercase;color:var(--warm-gray);margin-bottom:12px}
.matrix-grid{display:grid;grid-template-columns:1fr 1fr;gap:1px;background:var(--silver);border-radius:8px;overflow:hidden;margin-bottom:12px}
.matrix-cell{background:var(--paper);padding:10px 8px;text-align:center;min-height:60px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;cursor:pointer;transition:.15s}
.matrix-cell:hover{background:rgba(69,93,211,.04)}
.matrix-cell-label{font-size:9px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;color:var(--warm-gray)}
.matrix-count{font-size:18px;font-weight:800;color:var(--ink)}
.sprint-info{background:var(--cream);border-radius:8px;padding:10px;margin-bottom:8px}
.sprint-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;color:var(--warm-gray);margin-bottom:4px}
.sprint-val{font-size:14px;font-weight:800;color:var(--cobalt)}
.progress-bar-outer{background:var(--cream);border-radius:4px;height:6px;margin-top:4px;overflow:hidden}
.progress-bar-inner{height:100%;border-radius:4px;background:var(--cobalt);transition:.6s ease}

/* Analytics */
.analytics-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px}
.chart-card{background:var(--paper);border-radius:var(--radius);border:1px solid var(--silver);padding:20px;animation:fadeSlide .5s ease both}
.chart-card-title{font-size:14px;font-weight:700;color:var(--ink);margin-bottom:4px;display:flex;align-items:center;gap:6px}
.chart-card-sub{font-size:11px;color:var(--warm-gray);margin-bottom:14px}
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:16px}
.stat-card{background:var(--paper);border-radius:var(--radius);border:1px solid var(--silver);padding:14px;animation:cardFloat .4s ease both}
.stat-val{font-size:26px;font-weight:800;letter-spacing:-1px;color:var(--ink);margin-bottom:2px}
.stat-label{font-size:11px;color:var(--warm-gray);font-weight:600}
.stat-trend{font-size:11px;font-weight:700;margin-top:4px;display:flex;align-items:center;gap:3px}
.member-table{width:100%;border-collapse:collapse}
.member-table th{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--warm-gray);padding:8px 12px;border-bottom:2px solid var(--silver);text-align:left}
.member-table td{padding:9px 12px;border-bottom:1px solid var(--silver);font-size:13px}
.member-table tr:hover td{background:var(--cream)}
.member-av{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;color:var(--paper)}
.perf-bar{height:6px;border-radius:3px;background:var(--cream);overflow:hidden;min-width:80px}
.perf-fill{height:100%;border-radius:3px;background:var(--teal)}

/* Excel / Data */
.upload-zone{
  border:2px dashed var(--silver);border-radius:var(--radius);
  padding:40px;text-align:center;background:var(--paper);
  cursor:pointer;transition:.15s;margin-bottom:16px;animation:fadeSlide .5s ease both;
}
.upload-zone:hover{border-color:var(--cobalt);background:rgba(69,93,211,.02)}
.upload-icon{width:48px;height:48px;border-radius:12px;background:rgba(69,93,211,.08);margin:0 auto 12px;display:flex;align-items:center;justify-content:center}
.upload-title{font-size:15px;font-weight:700;color:var(--ink);margin-bottom:4px}
.upload-sub{font-size:12px;color:var(--warm-gray)}
.file-list{margin-bottom:16px}
.file-item{display:flex;align-items:center;gap:10px;padding:10px 14px;background:var(--paper);border:1px solid var(--silver);border-radius:8px;margin-bottom:6px;animation:cardFloat .3s ease both}
.file-icon{width:32px;height:32px;border-radius:8px;background:rgba(46,196,182,.08);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.file-name{font-size:13px;font-weight:600;color:var(--ink)}
.file-size{font-size:11px;color:var(--warm-gray)}
.file-status{margin-left:auto;display:flex;align-items:center;gap:4px;font-size:11px;font-weight:700}
.status-ok{color:#22c55e}
.status-warn{color:#f59e0b}
.data-preview{background:var(--paper);border-radius:var(--radius);border:1px solid var(--silver);overflow:hidden;animation:fadeSlide .5s ease both .1s both}
.preview-header{padding:12px 14px;background:var(--cream);border-bottom:1px solid var(--silver);display:flex;align-items:center;justify-content:space-between}
.preview-table{width:100%;border-collapse:collapse}
.preview-table th{font-size:11px;font-weight:700;padding:8px 12px;background:rgba(69,93,211,.04);border-bottom:1px solid var(--silver);text-align:left;color:var(--charcoal);letter-spacing:.02em}
.preview-table td{padding:8px 12px;border-bottom:1px solid var(--silver);font-size:12px;color:var(--charcoal)}
.preview-table tr:hover td{background:rgba(69,93,211,.02)}
.val-ok{color:#16a34a;font-weight:700;font-size:10px}
.val-warn{color:#d97706;font-weight:700;font-size:10px}
.export-btns{display:flex;gap:8px;margin-top:12px}

/* Mobile Preview */
.mobile-section{display:grid;grid-template-columns:1fr 1fr 1fr;gap:24px;justify-items:center}
.phone-frame{
  width:200px;background:var(--ink);border-radius:28px;
  padding:10px;box-shadow:0 20px 60px rgba(0,0,0,.25);
  animation:cardFloat .6s ease both;
}
.phone-notch{width:60px;height:20px;background:var(--ink);border-radius:0 0 12px 12px;margin:0 auto 8px;position:relative}
.phone-screen{background:var(--paper);border-radius:20px;overflow:hidden;min-height:320px}
.phone-topbar{background:var(--cobalt);padding:8px 10px;color:var(--paper);display:flex;align-items:center;justify-content:space-between;font-size:10px;font-weight:700}
.phone-content{padding:10px}
.phone-tab-bar{display:flex;border-top:1px solid var(--silver);padding:6px 0}
.phone-tab{flex:1;text-align:center;font-size:8px;color:var(--warm-gray);display:flex;flex-direction:column;align-items:center;gap:2px}
.phone-tab.active{color:var(--cobalt)}
.phone-card{background:var(--cream);border-radius:8px;padding:8px;margin-bottom:6px;border:1px solid var(--silver)}
.phone-card-title{font-size:10px;font-weight:700;color:var(--ink);margin-bottom:3px}
.phone-card-meta{font-size:8px;color:var(--warm-gray);display:flex;justify-content:space-between}
.phone-label{text-align:center;margin-top:8px;font-size:10px;font-weight:700;color:var(--charcoal)}
.notification-card{background:rgba(69,93,211,.05);border:1px solid rgba(69,93,211,.15);border-radius:8px;padding:8px;margin-bottom:6px}
.notif-time{font-size:8px;color:var(--warm-gray)}

/* Push notification toast */
.push-toast{
  background:rgba(0,0,0,.85);color:var(--paper);border-radius:12px;
  padding:10px 14px;margin-bottom:6px;display:flex;align-items:center;gap:8px;
  backdrop-filter:blur(8px);
}
.push-app{font-size:8px;font-weight:700;color:rgba(255,255,255,.5);margin-bottom:2px}
.push-msg{font-size:10px;font-weight:600;line-height:1.3}
.push-time{font-size:8px;color:rgba(255,255,255,.4);margin-left:auto;white-space:nowrap}

/* Push/Audit log */
.audit-table{background:var(--paper);border-radius:var(--radius);border:1px solid var(--silver);overflow:hidden;animation:fadeSlide .5s ease both}
.audit-row{display:flex;align-items:center;gap:10px;padding:10px 14px;border-bottom:1px solid var(--silver)}
.audit-row:last-child{border-bottom:none}
.audit-icon{width:28px;height:28px;border-radius:7px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:14px}
.audit-body{flex:1;min-width:0}
.audit-action{font-size:12px;font-weight:600;color:var(--charcoal)}
.audit-detail{font-size:11px;color:var(--warm-gray)}
.audit-time{font-size:11px;color:var(--silver);white-space:nowrap}

.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.badge{display:inline-flex;align-items:center;gap:4px;padding:3px 8px;border-radius:6px;font-size:11px;font-weight:700}

/* Gradient Hero Band */
.gradient-hero{
  border-radius:var(--radius);padding:24px 28px;margin-bottom:20px;
  background:linear-gradient(135deg,#0b1a4d 0%,#455dd3 40%,#2ec4b6 80%,#62aef0 100%);
  position:relative;overflow:hidden;
  animation:fadeSlide .5s ease both;
}
.gradient-hero::before{
  content:'';position:absolute;inset:0;
  background:linear-gradient(90deg,rgba(255,255,255,.03) 0%,rgba(255,255,255,.12) 50%,rgba(255,255,255,.03) 100%);
  background-size:200% 100%;animation:shimmerCreamy 3s linear infinite;
}
.gradient-hero::after{
  content:'';position:absolute;right:-40px;top:-40px;
  width:200px;height:200px;border-radius:50%;
  background:radial-gradient(circle,rgba(46,196,182,.3) 0%,transparent 70%);
}
.hero-sprint-label{font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:rgba(255,255,255,.5);margin-bottom:4px}
.hero-sprint-name{font-size:36px;font-weight:800;letter-spacing:-1.2px;color:#ffffff;margin-bottom:2px;line-height:1}
.hero-sprint-sub{font-size:13px;color:rgba(255,255,255,.65)}
.hero-metrics{display:flex;gap:24px;margin-top:14px}
.hero-metric{display:flex;flex-direction:column;gap:1px}
.hero-metric-val{font-size:22px;font-weight:800;color:#ffffff;letter-spacing:-.5px}
.hero-metric-label{font-size:10px;color:rgba(255,255,255,.5);font-weight:600;text-transform:uppercase;letter-spacing:.06em}
.hero-progress{display:flex;align-items:center;gap:10px;margin-top:12px}
.hero-bar{flex:1;height:6px;border-radius:3px;background:rgba(255,255,255,.18);overflow:hidden;max-width:200px}
.hero-bar-fill{height:100%;border-radius:3px;background:linear-gradient(90deg,#62aef0,#2ec4b6)}
.hero-bar-pct{font-size:13px;font-weight:700;color:#ffffff}
</style>
</head>
<body data-archetype="kanban-board">
<div id="root" style="display:flex;flex-direction:column;height:100vh"></div>
<script type="text/babel">
const {useState, useEffect, useRef} = React;

// Kanban Data
const COLUMNS = [
  {id:'todo',name:'미시작',count:8,color:'#64748b',bg:'rgba(100,116,139,.1)'},
  {id:'progress',name:'진행 중',count:5,color:'#455dd3',bg:'rgba(69,93,211,.1)'},
  {id:'review',name:'검토 중',count:3,color:'#f59e0b',bg:'rgba(245,158,11,.1)'},
  {id:'done',name:'완료',count:12,color:'#22c55e',bg:'rgba(34,197,94,.1)'},
];

const CARDS = {
  todo:[

function ChartCard({title, sub, chartId, type, data, labels, colors}){
  const canvasRef = useRef(null);
  useEffect(()=>{
    if(!canvasRef.current)return;
    const ctx = canvasRef.current.getContext('2d');
    const chartInst = new Chart(ctx, {
      type,
      data:{
        labels,
        datasets:[{
          label: type==='bar'?'완료 이슈':'번다운',
          data,
          backgroundColor: type==='bar'
            ? data.map((_,i)=>i===data.length-1?'rgba(69,93,211,.9)':'rgba(69,93,211,.3)')
            : undefined,
          borderColor:'rgba(46,196,182,1)',
          borderWidth:2,
          tension:.4,
          fill: type==='line',
          backgroundColor: type==='line'?'rgba(46,196,182,.1)':undefined,
          pointBackgroundColor:'rgba(46,196,182,1)',
          pointRadius: type==='line'?3:0,
        }]
      },
      options:{
        responsive:true,maintainAspectRatio:false,
        plugins:{legend:{display:false},tooltip:{mode:'index',intersect:false}},
        scales:{
          x:{grid:{color:'rgba(0,0,0,.04)'},ticks:{font:{size:10},color:'#615d59'}},
          y:{grid:{color:'rgba(0,0,0,.04)'},ticks:{font:{size:10},color:'#615d59'},beginAtZero:true},
        },
      }
    });
    return ()=>chartInst.destroy();
  },[]);
  return (
    <div className="chart-card">
      <div className="chart-card-title"><PhIcon name={type==='bar'?'chartBar':'arrowRight'} size={15} color="#455dd3"/>{title}</div>
      <div className="chart-card-sub">{sub}</div>
      <div style={{height:150}}><canvas ref={canvasRef}/></div>
    </div>
  );
}
