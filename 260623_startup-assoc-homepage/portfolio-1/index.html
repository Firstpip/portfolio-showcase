<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>스타트업 드림 협회 — 창업 지원 포털</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700;800&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://unpkg.com/lucide@0.344.0/dist/umd/lucide.min.js"></script>
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone@7.24.7/babel.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Pretendard',sans-serif;background:#f8f9fb;color:#0a0a0a;-webkit-font-smoothing:antialiased}

@keyframes fadeUp{from{opacity:0;transform:translateY(28px)}to{opacity:1;transform:translateY(0)}}
@keyframes blobFloat{0%,100%{transform:scale(1) translateY(0);opacity:.6}50%{transform:scale(1.08) translateY(-12px);opacity:.75}}
@keyframes slideIn{from{opacity:0;transform:translateX(-18px)}to{opacity:1;transform:translateX(0)}}
@keyframes sparkGrow{from{stroke-dashoffset:200}to{stroke-dashoffset:0}}
@keyframes popIn{from{opacity:0;transform:scale(.94)}to{opacity:1;transform:scale(1)}}
@keyframes countUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

.fade-up{animation:fadeUp .6s cubic-bezier(.22,1,.36,1) both}
.fade-up-1{animation-delay:.1s}.fade-up-2{animation-delay:.2s}.fade-up-3{animation-delay:.3s}.fade-up-4{animation-delay:.42s}

/* ─── Nav ─── */
.topnav{position:sticky;top:0;z-index:100;background:#fff;border-bottom:1px solid #e6e6e6;padding:0 48px;height:64px;display:flex;align-items:center;justify-content:space-between;box-shadow:rgba(71,103,136,.04) 0 1px 4px,rgba(71,103,136,.03) 0 4px 10px}
.nav-logo{display:flex;align-items:center;gap:10px;cursor:pointer;text-decoration:none}
.nav-logo-mark{width:32px;height:32px;background:linear-gradient(135deg,#006bff 30%,#0b3558);border-radius:8px;display:flex;align-items:center;justify-content:center;color:#fff}
.nav-logo-text{font-size:15px;font-weight:700;color:#0b3558;letter-spacing:-.3px}
.nav-links{display:flex;align-items:center;gap:2px}
.nav-btn{background:none;border:none;cursor:pointer;padding:8px 14px;border-radius:4px;font-size:14px;font-weight:500;color:#476788;transition:all .15s;font-family:inherit}
.nav-btn:hover{background:#f0f4ff;color:#0b3558}
.nav-btn.active{color:#006bff}
.nav-actions{display:flex;align-items:center;gap:8px}
.btn-ghost{background:none;border:none;cursor:pointer;padding:8px 16px;border-radius:4px;font-size:14px;font-weight:500;color:#0b3558;font-family:inherit}
.btn-cta{background:#006bff;border:none;cursor:pointer;padding:8px 20px;border-radius:4px;font-size:14px;font-weight:600;color:#fff;transition:all .15s;font-family:inherit;box-shadow:rgba(71,103,136,.04) 0 4px 5px,rgba(71,103,136,.06) 0 15px 30px}
.btn-cta:hover{background:#0058d4;transform:translateY(-1px)}
.btn-outline{background:#fff;border:1px solid #d4e0ed;cursor:pointer;padding:8px 16px;border-radius:4px;font-size:14px;font-weight:600;color:#0b3558;font-family:inherit;transition:all .15s}
.btn-outline:hover{border-color:#006bff;color:#006bff}

/* ─── Hero (Calendly 2-column split) ─── */
.hero-outer{position:relative;overflow:hidden;background:#f8f9fb}
.hero-split{display:grid;grid-template-columns:52% 48%;align-items:center;min-height:600px;max-width:1200px;margin:0 auto;padding:96px 48px 80px;gap:0}
.hero-left{position:relative;z-index:2}
.hero-badge{display:inline-flex;align-items:center;gap:6px;background:#e7edf6;color:#004eba;font-size:12px;font-weight:700;padding:5px 12px;border-radius:50px;margin-bottom:24px;letter-spacing:.2px}
.hero-title{font-family:'Manrope',sans-serif;font-size:68px;font-weight:800;color:#0b3558;line-height:1.08;letter-spacing:-1.5px;margin-bottom:22px}
.hero-title em{color:#006bff;font-style:normal}
.hero-sub{font-size:18px;color:#476788;line-height:1.65;margin-bottom:36px;max-width:480px}
.hero-actions{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:52px}
.hero-btn-primary{background:#006bff;color:#fff;border:none;cursor:pointer;padding:14px 28px;border-radius:4px;font-size:16px;font-weight:700;font-family:inherit;transition:all .15s;display:flex;align-items:center;gap:8px;box-shadow:rgba(71,103,136,.04) 0 4px 5px,rgba(71,103,136,.06) 0 15px 30px}
.hero-btn-primary:hover{background:#0058d4;transform:translateY(-2px)}
.hero-btn-secondary{background:#fff;color:#0b3558;border:1px solid #d4e0ed;cursor:pointer;padding:14px 24px;border-radius:4px;font-size:16px;font-weight:600;font-family:inherit;transition:all .15s}
.hero-btn-secondary:hover{border-color:#006bff;color:#006bff}
.hero-stats{display:flex;gap:40px}
.hero-stat-num{font-family:'Manrope',sans-serif;font-size:32px;font-weight:800;color:#0b3558;line-height:1}
.hero-stat-label{font-size:13px;color:#a6bbd1;margin-top:4px}

/* ─── Hero Right: blobs + product mockup ─── */
.hero-right{position:relative;height:520px}
.blob-field{position:absolute;inset:0;pointer-events:none;z-index:0}
.blob{position:absolute;border-radius:50%;filter:blur(70px);animation:blobFloat 8s ease-in-out infinite}
.blob-magenta{width:420px;height:420px;background:radial-gradient(circle,rgba(229,92,255,.38),transparent 65%);top:-60px;right:-60px}
.blob-violet{width:280px;height:280px;background:radial-gradient(circle,rgba(130,71,245,.3),transparent 65%);top:100px;right:180px;animation-delay:-3.5s}
.blob-amber{width:180px;height:180px;background:radial-gradient(circle,rgba(255,166,0,.28),transparent 65%);bottom:40px;right:60px;animation-delay:-6s}
.blob-cyan{width:160px;height:160px;background:radial-gradient(circle,rgba(0,153,255,.22),transparent 65%);top:60px;right:320px;animation-delay:-2s}
.mockup-card{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);z-index:2;background:#fff;border-radius:16px;padding:20px;width:380px;box-shadow:rgba(71,103,136,.04) 0px 4px 5px 0px,rgba(71,103,136,.03) 0px 8px 15px 0px,rgba(71,103,136,.08) 0px 30px 50px 0px;animation:popIn .7s .3s cubic-bezier(.22,1,.36,1) both}
.mockup-topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;padding-bottom:12px;border-bottom:1px solid #e7edf6}
.mockup-logo{display:flex;align-items:center;gap:6px;font-size:11px;font-weight:700;color:#0b3558}
.mockup-logo-dot{width:16px;height:16px;background:linear-gradient(135deg,#006bff,#0b3558);border-radius:3px}
.mockup-pills{display:flex;gap:4px}
.mockup-pill{height:20px;border-radius:10px;background:#e7edf6}
.mockup-hero-block{background:linear-gradient(135deg,#f8f9fb,#e7edf6);border-radius:8px;padding:14px;margin-bottom:12px;position:relative;overflow:hidden}
.mockup-hero-block::before{content:'';position:absolute;top:-20px;right:-20px;width:80px;height:80px;border-radius:50%;background:radial-gradient(circle,rgba(229,92,255,.4),transparent 70%);filter:blur(20px)}
.mockup-hero-title{font-size:11px;font-weight:700;color:#0b3558;margin-bottom:4px;line-height:1.3}
.mockup-hero-sub{font-size:9px;color:#476788;margin-bottom:8px}
.mockup-hero-btn{display:inline-block;background:#006bff;color:#fff;font-size:8px;font-weight:700;padding:4px 10px;border-radius:3px}
.mockup-stat-row{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:10px}
.mockup-stat{background:#f8f9fb;border-radius:6px;padding:8px;text-align:center;border:1px solid #e7edf6}
.mockup-stat-n{font-size:12px;font-weight:800;color:#0b3558}
.mockup-stat-l{font-size:8px;color:#a6bbd1;margin-top:1px}
.mockup-program-list{display:flex;flex-direction:column;gap:6px}
.mockup-program-row{display:flex;align-items:center;gap:8px;padding:6px 8px;background:#f8f9fb;border-radius:6px;border:1px solid #e7edf6}
.mockup-program-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.mockup-program-text{font-size:9px;color:#0b3558;font-weight:500;flex:1}
.mockup-program-badge{font-size:8px;font-weight:700;padding:2px 6px;border-radius:4px}
.mockup-floating-tag{position:absolute;bottom:-14px;right:24px;background:#0b3558;color:#fff;font-size:10px;font-weight:700;padding:6px 12px;border-radius:20px;box-shadow:0 4px 16px rgba(11,53,88,.25);animation:fadeUp .5s .8s both}

/* ─── Sections ─── */
.section{padding:72px 48px;max-width:1200px;margin:0 auto}
.section-tag{display:inline-block;background:#e7edf6;color:#004eba;font-size:12px;font-weight:700;padding:4px 12px;border-radius:50px;margin-bottom:12px}
.section-title{font-family:'Manrope',sans-serif;font-size:38px;font-weight:800;color:#0b3558;line-height:1.2;letter-spacing:-.5px;margin-bottom:12px}
.section-sub{font-size:16px;color:#476788;line-height:1.6}
.section-header{text-align:center;margin-bottom:52px}

/* ─── Feature strip ─── */
.feature-strip{background:#fff;border-top:1px solid #e6e6e6;border-bottom:1px solid #e6e6e6;padding:24px 48px;display:flex;gap:0;align-items:center;justify-content:center;flex-wrap:wrap}
.feature-item{display:flex;align-items:center;gap:10px;padding:8px 24px}
.feature-icon-wrap{width:32px;height:32px;background:#e7edf6;border-radius:6px;display:flex;align-items:center;justify-content:center;color:#006bff}
.feature-label{font-size:13px;font-weight:600;color:#0b3558}
.feature-divider{width:1px;height:20px;background:#e6e6e6}

/* ─── Cards ─── */
.cards-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:20px}
.card{background:#fff;border:1px solid #d4e0ed;border-radius:8px;padding:28px;transition:all .2s;box-shadow:rgba(71,103,136,.04) 0 4px 5px,rgba(71,103,136,.03) 0 4px 10px}
.card:hover{border-color:#006bff;box-shadow:rgba(71,103,136,.04) 0 4px 5px,rgba(71,103,136,.08) 0 30px 50px;transform:translateY(-2px)}
.card-icon{width:44px;height:44px;background:#e7edf6;border-radius:6px;display:flex;align-items:center;justify-content:center;margin-bottom:16px;color:#006bff}
.card-title{font-size:16px;font-weight:700;color:#0b3558;margin-bottom:8px}
.card-text{font-size:14px;color:#476788;line-height:1.65}

/* ─── Board — master-detail ─── */
.board-layout{display:grid;grid-template-columns:360px 1fr;gap:0;min-height:560px;background:#fff;border:1px solid #d4e0ed;border-radius:8px;overflow:hidden;box-shadow:rgba(71,103,136,.04) 0 4px 5px,rgba(71,103,136,.03) 0 8px 15px}
.board-list-panel{border-right:1px solid #d4e0ed;display:flex;flex-direction:column}
.board-list-header{padding:16px 20px;border-bottom:1px solid #e7edf6;display:flex;gap:8px;align-items:center}
.board-search-input{flex:1;border:1px solid #d4e0ed;border-radius:4px;padding:7px 12px;font-size:13px;font-family:inherit;color:#0b3558}
.board-search-input:focus{outline:none;border-color:#006bff}
.board-list-filters{padding:10px 20px;background:#f8f9fb;border-bottom:1px solid #e7edf6;display:flex;gap:6px;flex-wrap:wrap}
.filter-tab{background:none;border:1px solid #d4e0ed;cursor:pointer;padding:4px 10px;border-radius:50px;font-size:11px;font-weight:700;color:#476788;font-family:inherit;transition:all .12s}
.filter-tab.active{background:#006bff;color:#fff;border-color:#006bff}
.board-list-items{flex:1;overflow-y:auto}
.board-list-item{padding:14px 20px;border-bottom:1px solid #f0f4f8;cursor:pointer;transition:background .1s}
.board-list-item:hover{background:#f8f9fb}
.board-list-item.active{background:#f0f6ff;border-left:3px solid #006bff}
.bitem-header{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;margin-bottom:5px}
.bitem-title{font-size:13px;font-weight:600;color:#0b3558;line-height:1.4;flex:1}
.bitem-date{font-size:11px;color:#a6bbd1;flex-shrink:0}
.bitem-meta{display:flex;gap:6px;align-items:center}
.pin-badge{background:#006bff;color:#fff;font-size:9px;font-weight:700;padding:2px 6px;border-radius:3px}
.new-badge{background:#e55cff;color:#fff;font-size:9px;font-weight:700;padding:2px 6px;border-radius:3px}
.bitem-views{font-size:11px;color:#a6bbd1}
.board-detail-panel{padding:36px;overflow-y:auto;background:#fff}
.board-detail-empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;color:#a6bbd1;gap:10px;font-size:14px}
.board-detail-tag{display:inline-block;background:#e7edf6;color:#004eba;font-size:11px;font-weight:700;padding:4px 10px;border-radius:50px;margin-bottom:14px}
.board-detail-title{font-family:'Manrope',sans-serif;font-size:26px;font-weight:800;color:#0b3558;line-height:1.3;margin-bottom:16px;letter-spacing:-.3px}
.board-detail-meta{display:flex;gap:20px;padding:14px 0;border-top:1px solid #e7edf6;border-bottom:1px solid #e7edf6;margin-bottom:24px}
.board-detail-meta-item{font-size:12px;color:#476788}
.board-detail-meta-item span{font-weight:600;color:#0b3558}
.board-detail-body{font-size:15px;color:#476788;line-height:1.8}
.board-pagination{padding:12px 20px;border-top:1px solid #e7edf6;display:flex;justify-content:center;gap:4px;background:#f8f9fb}
.page-btn{width:28px;height:28px;border-radius:4px;border:1px solid #d4e0ed;background:#fff;cursor:pointer;font-size:12px;font-weight:600;color:#476788;font-family:inherit;display:flex;align-items:center;justify-content:center}
.page-btn.active{background:#006bff;color:#fff;border-color:#006bff}

/* ─── Inquiry ─── */
.inquiry-wrap{max-width:680px}
.inquiry-form-card{background:#fff;border:1px solid #d4e0ed;border-radius:8px;padding:36px;box-shadow:rgba(71,103,136,.04) 0 4px 5px,rgba(71,103,136,.03) 0 8px 15px}
.form-group{margin-bottom:20px}
.form-label{display:block;font-size:13px;font-weight:600;color:#0b3558;margin-bottom:6px}
.form-input{width:100%;border:1px solid #d4e0ed;border-radius:4px;padding:10px 14px;font-size:14px;font-family:inherit;color:#0a0a0a;transition:border .15s}
.form-input:focus{outline:none;border-color:#006bff;box-shadow:0 0 0 3px rgba(0,107,255,.07)}
.form-textarea{width:100%;border:1px solid #d4e0ed;border-radius:4px;padding:10px 14px;font-size:14px;font-family:inherit;color:#0a0a0a;resize:vertical;min-height:130px;transition:border .15s}
.form-textarea:focus{outline:none;border-color:#006bff;box-shadow:0 0 0 3px rgba(0,107,255,.07)}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.upload-area{border:1.5px dashed #d4e0ed;border-radius:6px;padding:22px;text-align:center;cursor:pointer;transition:all .15s;background:#f8f9fb}
.upload-area:hover{border-color:#006bff;background:#f0f4ff}
.submit-row{display:flex;justify-content:flex-end;gap:8px;margin-top:8px}
.inquiry-item{background:#fff;border:1px solid #d4e0ed;border-radius:6px;padding:14px 18px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center}
.inq-title{font-size:14px;color:#0b3558;font-weight:500}
.inq-date{font-size:12px;color:#a6bbd1}
.inq-status{font-size:12px;font-weight:700;padding:3px 10px;border-radius:50px}
.status-answered{background:#e7edf6;color:#004eba}
.status-pending{background:#fff7e6;color:#f59e0b}

/* ─── Mypage ─── */
.mypage-grid{display:grid;grid-template-columns:220px 1fr;gap:24px}
.mypage-sidebar{background:#fff;border:1px solid #d4e0ed;border-radius:8px;padding:24px;height:fit-content;box-shadow:rgba(71,103,136,.04) 0 4px 5px}
.mypage-avatar{width:60px;height:60px;border-radius:50%;background:linear-gradient(135deg,#006bff,#0b3558);display:flex;align-items:center;justify-content:center;margin:0 auto 12px;font-size:22px;font-weight:800;color:#fff}
.mypage-name{text-align:center;font-size:14px;font-weight:700;color:#0b3558;margin-bottom:3px}
.mypage-email{text-align:center;font-size:12px;color:#a6bbd1;margin-bottom:20px}
.mypage-nav a{display:block;padding:8px 12px;border-radius:4px;font-size:13px;color:#476788;cursor:pointer;margin-bottom:2px;transition:all .12s;text-decoration:none}
.mypage-nav a.active,.mypage-nav a:hover{background:#e7edf6;color:#006bff;font-weight:600}
.info-card{background:#fff;border:1px solid #d4e0ed;border-radius:8px;padding:26px;box-shadow:rgba(71,103,136,.04) 0 4px 5px;margin-bottom:16px}
.info-card-title{font-size:15px;font-weight:700;color:#0b3558;margin-bottom:18px;display:flex;align-items:center;gap:8px}
.info-field{display:grid;grid-template-columns:110px 1fr;gap:12px;padding:11px 0;border-bottom:1px solid #f0f4f8;align-items:center}
.info-field:last-child{border-bottom:none}
.field-label{font-size:12px;color:#a6bbd1;font-weight:500}
.field-value{font-size:14px;color:#0b3558;font-weight:500}
.field-edit-btn{font-size:11px;color:#006bff;cursor:pointer;font-weight:700}
.tag{background:#e7edf6;color:#004eba;font-size:11px;font-weight:700;padding:3px 10px;border-radius:50px}

/* ─── Join ─── */
.join-wrap{max-width:520px;margin:0 auto}
.join-card{background:#fff;border:1px solid #d4e0ed;border-radius:8px;padding:40px;box-shadow:rgba(71,103,136,.04) 0 4px 5px,rgba(71,103,136,.08) 0 30px 50px}
.join-title{font-family:'Manrope',sans-serif;font-size:24px;font-weight:800;color:#0b3558;text-align:center;margin-bottom:6px}
.join-sub{font-size:14px;color:#476788;text-align:center;margin-bottom:28px}
.progress-steps{display:flex;justify-content:center;gap:0;margin-bottom:32px}
.step-item{display:flex;flex-direction:column;align-items:center;gap:4px;flex:1}
.step-circle{width:28px;height:28px;border-radius:50%;background:#e7edf6;color:#006bff;font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center}
.step-circle.active{background:#006bff;color:#fff}
.step-circle.done{background:#10b981;color:#fff}
.step-line{flex:1;height:2px;background:#e7edf6;margin-top:14px}
.step-line.done{background:#10b981}
.step-label{font-size:11px;color:#a6bbd1;text-align:center}
.step-label.active{color:#006bff;font-weight:600}

/* ─── CTA ─── */
.cta-section{background:linear-gradient(135deg,#0b3558,#0d4f8a);padding:72px 48px;text-align:center;position:relative;overflow:hidden}
.cta-blob-1{position:absolute;width:400px;height:400px;background:radial-gradient(circle,rgba(0,107,255,.3),transparent 65%);border-radius:50%;filter:blur(80px);top:-100px;left:-60px;animation:blobFloat 9s ease-in-out infinite}
.cta-blob-2{position:absolute;width:300px;height:300px;background:radial-gradient(circle,rgba(229,92,255,.25),transparent 65%);border-radius:50%;filter:blur(80px);bottom:-60px;right:40px;animation:blobFloat 11s ease-in-out infinite;animation-delay:-5s}
.cta-inner{position:relative}
.cta-title{font-family:'Manrope',sans-serif;font-size:38px;font-weight:800;color:#fff;margin-bottom:14px;letter-spacing:-.4px}
.cta-sub{font-size:16px;color:rgba(255,255,255,.72);margin-bottom:36px}
.cta-btn-white{background:#fff;color:#0b3558;border:none;cursor:pointer;padding:14px 28px;border-radius:4px;font-size:15px;font-weight:700;font-family:inherit;transition:all .15s}
.cta-btn-white:hover{background:#e7edf6}
.cta-btn-outline{background:transparent;color:#fff;border:1.5px solid rgba(255,255,255,.45);cursor:pointer;padding:14px 24px;border-radius:4px;font-size:15px;font-weight:600;font-family:inherit;transition:all .15s}
.cta-btn-outline:hover{border-color:#fff;background:rgba(255,255,255,.1)}

/* ─── Footer ─── */
.footer{background:#0b3558;color:rgba(255,255,255,.55);padding:40px 48px}
.footer-inner{max-width:1200px;margin:0 auto;display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:24px}
.footer-logo{font-size:14px;font-weight:700;color:#fff;margin-bottom:8px}
.footer-addr{font-size:12px;line-height:1.7}
.footer-links{display:flex;gap:18px;flex-wrap:wrap}
.footer-link{font-size:13px;color:rgba(255,255,255,.55);cursor:pointer}
.footer-link:hover{color:#fff}
.footer-bottom{max-width:1200px;margin:20px auto 0;padding-top:18px;border-top:1px solid rgba(255,255,255,.1);font-size:12px}

/* ─── Page hero ─── */
.page-hero{background:linear-gradient(135deg,#f8f9fb,#e7edf6);padding:48px;text-align:center}

function Icon({ name, size=18, style:s }) {

    {d.split(/(?=M)/).filter(Boolean).map((seg,i)=><path key={i} d={seg.trim()}/>)}
  </svg>;
}

function useCountUp(target, duration=1200) {
  const [v,setV] = useState(0);
  useEffect(()=>{
    const n=parseInt(String(target).replace(/[^\d]/g,''))||0;
    if(!n) return;
    const t0=performance.now(); let raf;
    const step=now=>{
      const p=Math.min((now-t0)/duration,1);
      const e=1-Math.pow(1-p,3);
      setV(Math.floor(e*n));
      if(p<1) raf=requestAnimationFrame(step);
    };
    raf=requestAnimationFrame(step);
    return ()=>cancelAnimationFrame(raf);
  },[target]);
  return v;
}
function StatNum({raw}){
  const n=useCountUp(parseInt(String(raw).replace(/[^\d]/g,'')));
  const suffix=raw.includes('억')?'억':raw.includes('+')?'+':'';
  return <span>{n.toLocaleString()}{suffix}</span>;
}

function Toast({message,onClose}){
  useEffect(()=>{ const t=setTimeout(onClose,3000); return()=>clearTimeout(t); },[]);
  return <div className="toast"><Icon name="check" size={14} style={{color:'#10b981'}}/>{message}</div>;
}

        <div className="nav-links">
          {navItems.map(item=><button key={item.key} className={`nav-btn${view===item.key?' active':''}`} onClick={()=>setView(item.key)}>{item.label}</button>)}

        <div className="nav-actions">

          <button className="btn-cta" onClick={()=>setView('join')}>회원가입</button>
        </div>
      </nav>
      {view==='home'&&<HomeView setView={setView}/>}
      {view==='intro'&&<IntroView/>}
      {view==='board'&&<BoardView/>}
      {view==='inquiry'&&<InquiryView showToast={setToast}/>}
      {view==='mypage'&&<MypageView/>}

      {view!=='join'&&(
        <footer className="footer">
          <div className="footer-inner">
            <div>
              <div className="footer-logo">스타트업 드림 협회</div>
              <div className="footer-addr">서울특별시 강남구 테헤란로 521 드림빌딩 8층<br/>TEL 02-1234-5678 · E-mail info@startupdream.or.kr</div>
            </div>
            <div className="footer-links">
              {['이용약관','개인정보처리방침','협회 소개','공지사항','1:1 문의'].map(l=><span key={l} className="footer-link">{l}</span>)}
            </div>
          </div>
          <div className="footer-bottom">© 2026 스타트업 드림 협회. All Rights Reserved.</div>
        </footer>
      )}
      {toast&&<Toast message={toast} onClose={()=>setToast(null)}/>}
    </div>
  );
}

root.render(<App/>);
</script>
