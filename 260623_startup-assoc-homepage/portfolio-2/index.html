<title>스타트업 드림 — 협회 관리자 플랫폼</title>

<link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700;800&family=Playfair+Display:ital,wght@0,700;0,900;1,700;1,900&display=swap" rel="stylesheet">

<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --obsidian:#000000;
  --lilac-bloom:#f1ccff;
  --sky-veil:#91e0ff;
  --bone:#f5f2f0;
  --lime-subtle:#e8f7c0;
  --lime-accent:#b5d942;
  --white:#ffffff;
  --border:#e8e5e2;
  --muted:#9e9a97;
  --text-secondary:#6b6663;
}
body{font-family:'Pretendard',sans-serif;background:var(--bone);color:var(--obsidian);-webkit-font-smoothing:antialiased;display:flex;height:100vh;overflow:hidden}

@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideRight{from{opacity:0;transform:translateX(-12px)}to{opacity:1;transform:translateX(0)}}
@keyframes slideUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
@keyframes lilacPulse{0%,100%{opacity:.6;transform:scale(1)}50%{opacity:1;transform:scale(1.04)}}
@keyframes countUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

/* ─── App Shell (stripe-multipane) ─── */
.app-sidebar{width:220px;background:var(--obsidian);color:var(--white);display:flex;flex-direction:column;flex-shrink:0;height:100vh;overflow-y:auto}
.sidebar-logo{padding:24px 20px;border-bottom:1px solid rgba(255,255,255,.08)}
.sidebar-logo-mark{display:flex;align-items:center;gap:10px;margin-bottom:3px}
.sidebar-logo-icon{width:28px;height:28px;background:var(--lilac-bloom);border-radius:6px;display:flex;align-items:center;justify-content:center;color:var(--obsidian);font-size:15px;font-weight:900;font-family:'Playfair Display',serif;flex-shrink:0}
.sidebar-logo-name{font-size:13px;font-weight:700;color:var(--white);letter-spacing:-.1px}
.sidebar-logo-sub{font-size:11px;color:rgba(255,255,255,.35);padding-left:38px}
.sidebar-section{padding:18px 12px 0}
.sidebar-section-label{font-size:10px;font-weight:700;color:rgba(255,255,255,.28);letter-spacing:1.2px;text-transform:uppercase;padding:0 8px;margin-bottom:6px}
.sidebar-item{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:8px;cursor:pointer;transition:all .12s;margin-bottom:2px}
.sidebar-item:hover{background:rgba(255,255,255,.07)}
.sidebar-item.active{background:var(--lilac-bloom)}
.sidebar-item.active .si-label{color:var(--obsidian)}
.sidebar-item.active .si-icon{color:var(--obsidian)}
.si-icon{color:rgba(255,255,255,.38);flex-shrink:0;display:flex;align-items:center}
.si-label{font-size:13px;font-weight:500;color:rgba(255,255,255,.65);flex:1}
.si-badge{background:var(--lilac-bloom);color:var(--obsidian);font-size:10px;font-weight:700;padding:2px 7px;border-radius:50px}
.si-badge-dark{background:rgba(255,255,255,.12);color:rgba(255,255,255,.65);font-size:10px;font-weight:700;padding:2px 7px;border-radius:50px}
.sidebar-status{padding:10px 12px;border-top:1px solid rgba(255,255,255,.08)}
.sidebar-status-item{display:flex;justify-content:space-between;padding:4px 8px;font-size:12px}
.sidebar-avatar-wrap{padding:14px;border-top:1px solid rgba(255,255,255,.08)}
.sidebar-avatar-row{display:flex;align-items:center;gap:8px}
.sidebar-avatar{width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,var(--lilac-bloom),var(--sky-veil));display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:var(--obsidian);flex-shrink:0}
.sidebar-user-name{font-size:12px;font-weight:600;color:var(--white)}
.sidebar-user-role{font-size:10px;color:rgba(255,255,255,.38)}

/* ─── Main Content ─── */
.app-main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.topbar{height:52px;background:var(--white);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 28px;gap:14px;flex-shrink:0}
.topbar-title{font-size:13px;font-weight:600;color:var(--obsidian);flex:1}
.topbar-search{display:flex;align-items:center;gap:6px;background:var(--bone);border:1px solid var(--border);border-radius:8px;padding:6px 12px;min-width:200px}
.topbar-search-input{border:none;background:transparent;font-size:13px;font-family:inherit;color:var(--obsidian);outline:none;flex:1}
.topbar-search-input::placeholder{color:var(--muted)}
.topbar-btn{width:32px;height:32px;border-radius:8px;border:1px solid var(--border);background:var(--white);cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text-secondary);transition:all .12s;position:relative}
.topbar-btn:hover{border-color:var(--obsidian);color:var(--obsidian)}
.topbar-notif-dot{position:absolute;top:7px;right:7px;width:6px;height:6px;border-radius:50%;background:var(--lilac-bloom);border:1.5px solid var(--white)}
.content-area{flex:1;overflow-y:auto;padding:28px}

/* ─── View Headers — Playfair editorial ─── */
.view-header{margin-bottom:28px}
.view-title{font-family:'Playfair Display',serif;font-size:52px;font-weight:900;color:var(--obsidian);line-height:1.02;letter-spacing:-1px;margin-bottom:8px}
.view-sub{font-size:14px;color:var(--text-secondary)}

/* ─── Stat Cards ─── */
.stat-row{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:24px}
.stat-card{background:var(--white);border-radius:16px;padding:20px;border:1px solid var(--border)}
.stat-card-label{font-size:12px;color:var(--muted);margin-bottom:8px;display:flex;align-items:center;gap:6px}
.stat-card-value{font-family:'Playfair Display',serif;font-size:34px;font-weight:900;color:var(--obsidian);line-height:1}
.stat-card-delta{display:inline-flex;align-items:center;gap:4px;margin-top:6px;font-size:11px;font-weight:700;padding:3px 8px;border-radius:50px}
.delta-up{background:var(--lime-subtle);color:#5a8000}
.delta-neutral{background:var(--bone);color:var(--muted)}

/* ─── Editor Canvas ─── */
.editor-canvas-wrap{display:grid;grid-template-columns:220px 1fr 280px;gap:0;height:calc(100vh - 52px - 140px);border:1px solid var(--border);border-radius:16px;overflow:hidden;background:var(--white)}
.ec-left-panel{border-right:1px solid var(--border);display:flex;flex-direction:column;background:var(--bone);min-width:0}
.ec-panel-header{padding:14px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;background:var(--white)}
.ec-panel-title{font-size:11px;font-weight:700;color:var(--obsidian);letter-spacing:.5px;text-transform:uppercase}
.ec-panel-action{cursor:pointer;color:var(--muted);display:flex;align-items:center;transition:color .12s}
.ec-panel-action:hover{color:var(--obsidian)}
.ec-search{margin:10px;display:flex;align-items:center;gap:6px;background:var(--white);border:1px solid var(--border);border-radius:8px;padding:6px 10px}
.ec-search-input{border:none;background:transparent;font-size:12px;font-family:inherit;outline:none;flex:1;color:var(--obsidian)}
.ec-filter-list{padding:8px;overflow-y:auto;flex:1}
.ec-filter-item{display:flex;align-items:center;gap:8px;padding:7px 8px;border-radius:6px;cursor:pointer;transition:background .1s;margin-bottom:2px}
.ec-filter-item:hover{background:rgba(0,0,0,.04)}
.ec-filter-item.active{background:var(--obsidian)}
.ec-filter-item.active .ec-fi-label{color:var(--white)}
.ec-filter-item.active .ec-fi-count{background:rgba(255,255,255,.12);color:rgba(255,255,255,.7)}
.ec-fi-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.ec-fi-label{font-size:12px;font-weight:500;color:var(--text-secondary);flex:1}
.ec-fi-count{font-size:11px;font-weight:700;background:var(--border);color:var(--text-secondary);padding:2px 6px;border-radius:50px}
.ec-canvas{flex:1;overflow-y:auto;padding:16px;background:var(--white)}
.ec-canvas-grid{display:flex;flex-direction:column;gap:8px}
.ec-member-card{display:flex;align-items:center;gap:12px;padding:12px 14px;border-radius:10px;border:1px solid var(--border);cursor:pointer;transition:all .12s;background:var(--white)}
.ec-member-card:hover{border-color:var(--obsidian);background:var(--bone)}
.ec-member-card.selected{border-color:var(--obsidian);background:var(--bone);box-shadow:0 0 0 3px rgba(0,0,0,.05)}
.member-avatar{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:var(--obsidian);flex-shrink:0}
.member-info{flex:1;min-width:0}
.member-name{font-size:13px;font-weight:600;color:var(--obsidian)}
.member-co{font-size:11px;color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.member-status-pill{font-size:11px;font-weight:700;padding:3px 8px;border-radius:50px;flex-shrink:0}
.pill-active{background:var(--lilac-bloom);color:var(--obsidian)}
.pill-pending{background:var(--lime-subtle);color:#5a8000}
.pill-inactive{background:var(--bone);color:var(--muted);border:1px solid var(--border)}
.ec-right-panel{border-left:1px solid var(--border);display:flex;flex-direction:column;background:var(--bone);overflow-y:auto}
.inspector-header{padding:18px 16px;border-bottom:1px solid var(--border);background:var(--white);text-align:center}
.inspector-avatar{width:52px;height:52px;border-radius:50%;margin:0 auto 10px;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:700}
.inspector-name{font-family:'Playfair Display',serif;font-size:16px;font-weight:700;color:var(--obsidian);margin-bottom:3px}
.inspector-co{font-size:12px;color:var(--muted)}
.inspector-tags{display:flex;gap:4px;justify-content:center;margin-top:8px;flex-wrap:wrap}
.inspector-tag{font-size:11px;font-weight:700;padding:3px 8px;border-radius:50px}
.inspector-section{padding:14px}
.inspector-section-title{font-size:10px;font-weight:700;color:var(--muted);letter-spacing:.8px;text-transform:uppercase;margin-bottom:10px}
.inspector-field{display:flex;justify-content:space-between;align-items:flex-start;padding:6px 0;border-bottom:1px solid var(--border)}
.inspector-field:last-child{border-bottom:none}
.inspector-field-label{font-size:11px;color:var(--muted);flex-shrink:0}
.inspector-field-value{font-size:11px;font-weight:600;color:var(--obsidian);text-align:right;max-width:160px}
.inspector-actions{padding:14px;border-top:1px solid var(--border);display:flex;flex-direction:column;gap:6px}
.btn-lilac{background:var(--lilac-bloom);color:var(--obsidian);border:none;cursor:pointer;padding:9px 16px;border-radius:8px;font-size:13px;font-weight:700;font-family:inherit;width:100%;transition:all .12s}
.btn-lilac:hover{background:#e0aaff}
.btn-obsidian{background:var(--obsidian);color:var(--white);border:none;cursor:pointer;padding:9px 16px;border-radius:8px;font-size:13px;font-weight:700;font-family:inherit;width:100%;transition:all .12s}
.btn-obsidian:hover{background:#1a1a1a}
.btn-ghost-sm{background:transparent;color:var(--text-secondary);border:1px solid var(--border);cursor:pointer;padding:8px 16px;border-radius:8px;font-size:13px;font-weight:600;font-family:inherit;width:100%;transition:all .12s}
.btn-ghost-sm:hover{border-color:var(--obsidian);color:var(--obsidian)}

/* ─── Tab Navigation ─── */
.tab-bar{display:flex;gap:4px;margin-bottom:16px;background:var(--white);border:1px solid var(--border);border-radius:10px;padding:4px;width:fit-content}
.tab-btn{padding:6px 14px;border-radius:7px;border:none;background:transparent;cursor:pointer;font-size:13px;font-weight:600;color:var(--muted);font-family:inherit;transition:all .12s}
.tab-btn.active{background:var(--obsidian);color:var(--white)}
.tab-btn:hover:not(.active){background:var(--bone);color:var(--obsidian)}
/* ─── Data Table ─── */
.data-table{width:100%;border-collapse:collapse;background:var(--white)}
.data-table thead tr{border-bottom:2px solid var(--border)}
.data-table th{text-align:left;padding:10px 14px;font-size:11px;font-weight:700;color:var(--muted);letter-spacing:.5px;text-transform:uppercase}
.data-table tbody tr{border-bottom:1px solid var(--border);transition:background .08s;cursor:pointer}
.data-table tbody tr:hover{background:var(--bone)}
.data-table td{padding:11px 14px;font-size:13px;color:var(--obsidian)}
/* ─── Content Editor Canvas ─── */
.content-block{border-radius:10px;border:1px solid var(--border);padding:14px;cursor:pointer;transition:all .12s;background:var(--white)}
.content-block:hover{border-color:var(--obsidian)}
.content-block.selected{border-color:var(--obsidian);box-shadow:0 0 0 3px rgba(0,0,0,.05)}
.block-type-badge{font-size:10px;font-weight:700;padding:3px 9px;border-radius:50px;margin-bottom:7px;display:inline-block}
.block-title{font-family:'Playfair Display',serif;font-size:15px;font-weight:700;color:var(--obsidian);margin-bottom:4px;line-height:1.3}
.block-preview{font-size:12px;color:var(--muted);line-height:1.5}

/* ─── Inquiries Master-Detail ─── */
.inq-master-detail{display:grid;grid-template-columns:320px 1fr;gap:0;border:1px solid var(--border);border-radius:16px;overflow:hidden;background:var(--white);min-height:480px}
.inq-master{border-right:1px solid var(--border);overflow-y:auto}
.inq-list-header{padding:14px 16px;border-bottom:1px solid var(--border);background:var(--bone)}
.inq-list-title{font-family:'Playfair Display',serif;font-size:18px;font-weight:700;color:var(--obsidian)}
.inq-item{padding:13px 16px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .1s}
.inq-item:hover{background:var(--bone)}
.inq-item.selected{background:var(--obsidian)}
.inq-item.selected .inq-item-title{color:var(--white)}
.inq-item.selected .inq-item-meta,.inq-item.selected .inq-item-date{color:rgba(255,255,255,.45)}
.inq-item.selected .inq-item-tag{background:var(--lilac-bloom);color:var(--obsidian)}
.inq-item-tag{font-size:10px;font-weight:700;padding:2px 7px;border-radius:50px;background:var(--bone);color:var(--muted);display:inline-block;margin-bottom:5px}
.inq-item-title{font-size:13px;font-weight:600;color:var(--obsidian);margin-bottom:3px;line-height:1.4}
.inq-item-meta{font-size:11px;color:var(--muted);display:flex;justify-content:space-between}
.inq-detail{padding:28px;overflow-y:auto}
.inq-detail-tag{font-size:11px;font-weight:700;padding:4px 12px;border-radius:50px;background:var(--lilac-bloom);color:var(--obsidian);display:inline-block;margin-bottom:14px}
.inq-detail-title{font-family:'Playfair Display',serif;font-size:26px;font-weight:900;color:var(--obsidian);line-height:1.2;margin-bottom:16px}
.inq-detail-meta{display:flex;gap:20px;padding:12px 0;border-top:1px solid var(--border);border-bottom:1px solid var(--border);margin-bottom:20px;flex-wrap:wrap}
.inq-detail-meta-item{font-size:12px;color:var(--muted)}
.inq-detail-meta-item span{font-weight:600;color:var(--obsidian)}
.reply-area{background:var(--bone);border-radius:10px;padding:16px;margin-top:20px}
.reply-label{font-size:12px;font-weight:700;color:var(--obsidian);margin-bottom:8px}
.reply-textarea{width:100%;background:var(--white);border:1px solid var(--border);border-radius:6px;padding:10px;font-size:13px;font-family:inherit;resize:vertical;min-height:90px;outline:none;color:var(--obsidian)}
.reply-textarea:focus{border-color:var(--obsidian)}
.reply-actions{display:flex;justify-content:flex-end;gap:8px;margin-top:8px}

/* ─── Settings ─── */
.settings-layout{display:grid;grid-template-columns:200px 1fr;gap:20px}
.settings-nav{background:var(--white);border:1px solid var(--border);border-radius:12px;overflow:hidden}
.settings-nav-item{padding:10px 16px;cursor:pointer;font-size:13px;color:var(--text-secondary);border-bottom:1px solid var(--border);transition:all .1s;display:flex;align-items:center;gap:8px}
.settings-nav-item:last-child{border-bottom:none}
.settings-nav-item:hover{background:var(--bone)}
.settings-nav-item.active{background:var(--obsidian);color:var(--white)}
.settings-card{background:var(--white);border:1px solid var(--border);border-radius:12px;padding:24px;margin-bottom:16px}
.settings-card-title{font-family:'Playfair Display',serif;font-size:22px;font-weight:700;color:var(--obsidian);margin-bottom:18px;padding-bottom:12px;border-bottom:1px solid var(--border)}
.settings-field{display:grid;grid-template-columns:160px 1fr;gap:16px;align-items:center;padding:12px 0;border-bottom:1px solid var(--border)}
.settings-field:last-child{border-bottom:none}
.settings-label{font-size:13px;font-weight:600;color:var(--obsidian)}
.settings-hint{font-size:11px;color:var(--muted);margin-top:2px}
.settings-input{border:1px solid var(--border);border-radius:8px;padding:8px 12px;font-size:13px;font-family:inherit;color:var(--obsidian);width:100%;outline:none;background:var(--bone)}
.settings-input:focus{border-color:var(--obsidian);background:var(--white)}
.toggle-wrap{display:flex;align-items:center;gap:8px}
.toggle{width:36px;height:20px;border-radius:10px;position:relative;cursor:pointer;flex-shrink:0;transition:background .2s}
.toggle.on{background:var(--obsidian)}
.toggle.off{background:var(--border)}
.toggle-dot{position:absolute;top:3px;width:14px;height:14px;border-radius:50%;background:var(--white);transition:left .2s}
.toggle.on .toggle-dot{left:19px}
.toggle.off .toggle-dot{left:3px}
.toggle-label{font-size:13px;color:var(--text-secondary)}

/* ─── Toast ─── */
.toast{position:fixed;bottom:24px;right:24px;background:var(--obsidian);color:var(--white);border-radius:10px;padding:12px 18px;font-size:13px;font-weight:600;display:flex;align-items:center;gap:8px;z-index:999;animation:slideUp .3s both}
.toast-dot{width:8px;height:8px;border-radius:50%;background:var(--lilac-bloom);flex-shrink:0}

@media(max-width:1024px){
  .app-sidebar{display:none}
  .editor-canvas-wrap{grid-template-columns:180px 1fr 220px}
  .stat-row{grid-template-columns:repeat(2,1fr)}
}
</style>

<script type="text/babel">
const { useState, useEffect } = React;

function PIcon({ name, size=16, style:s }){
  return <i className={`ph-${name}`} style={{fontSize:`${size}px`,display:'inline-flex',alignItems:'center',justifyContent:'center',...(s||{})}}/>;
}

function useCountUp(target,dur=900){
  const [v,setV]=useState(0);
  useEffect(()=>{
    const n=typeof target==='number'?target:parseInt(target)||0;
    if(!n)return;
    const t0=performance.now(); let raf;
    const run=ts=>{const p=Math.min((ts-t0)/dur,1),e=1-Math.pow(1-p,3);setV(Math.floor(e*n));if(p<1)raf=requestAnimationFrame(run);};
    raf=requestAnimationFrame(run);
    return()=>cancelAnimationFrame(raf);
  },[target]);
  return v;
}
function AnimStat({value,suffix=''}){ const v=useCountUp(parseInt(value)||0); return <span>{v.toLocaleString()}{suffix}</span>; }

function Toast({msg,onClose}){
  useEffect(()=>{const t=setTimeout(onClose,3000);return()=>clearTimeout(t);},[]);
  return <div className="toast"><div className="toast-dot"/>{msg}</div>;
}

function SparkLine({points,color='#f1ccff',w=80,h=28}){
  const pts=points.map((p,i)=>`${(i/(points.length-1))*w},${h-p*(h-4)}`).join(' ');
  const areaPath=`M0,${h} ${pts.split(' ').map((p,i)=>`L${p}`).join(' ')} L${w},${h} Z`;
  return(
    <svg width={w} height={h} viewBox={`0 0 ${w} ${h}`} style={{display:'block',marginTop:'8px'}}>
      <defs><linearGradient id="sg" x1="0" x2="0" y1="0" y2="1"><stop offset="0%" stopColor={color} stopOpacity=".3"/><stop offset="100%" stopColor={color} stopOpacity="0"/></linearGradient></defs>
      <path d={areaPath} fill="url(#sg)"/>
      <polyline points={pts} fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/>
    </svg>
  );
}

            <div key={q.id} className={`inq-item${selId===q.id?' selected':''}`} onClick={()=>setSelId(q.id)} style={{animation:`slideRight .3s ${i*.06}s both`}}>
              <span className="inq-item-tag">{q.tag}</span>
              <div className="inq-item-title">{q.title}</div>
              <div className="inq-item-meta">
                <span>{q.author} · {q.co.slice(0,8)}{q.co.length>8?'…':''}</span>
                <span>{q.date}</span>
              </div>
            </div>
          ))}
        </div>
        <div className="inq-detail" key={sel.id} style={{animation:'fadeIn .25s both'}}>
          <span className="inq-detail-tag">{sel.tag}</span>
          <h2 className="inq-detail-title">{sel.title}</h2>
          <div className="inq-detail-meta">
            <div className="inq-detail-meta-item">작성자 <span>{sel.author}</span></div>
            <div className="inq-detail-meta-item">기업 <span>{sel.co}</span></div>
            <div className="inq-detail-meta-item">날짜 <span>{sel.date}</span></div>
            <span style={{marginLeft:'auto',fontSize:'12px',fontWeight:'700',padding:'3px 10px',borderRadius:'50px',background:inqStatusMap[sel.status].bg,color:inqStatusMap[sel.status].color}}>{inqStatusMap[sel.status].label}</span>
          </div>
          <p style={{fontSize:'14px',color:'var(--text-secondary)',lineHeight:'1.8'}}>{sel.body}</p>
          <div className="reply-area">
            <div className="reply-label">답변 작성</div>
            <textarea className="reply-textarea" placeholder={`${sel.author}님의 문의에 답변을 작성하세요...`}/>
            <div className="reply-actions">
              <button className="btn-ghost-sm" style={{width:'auto',padding:'6px 14px'}}>임시 저장</button>
              <button className="btn-lilac" style={{width:'auto',padding:'6px 18px'}} onClick={()=>showToast('답변이 전송되었습니다.')}>답변 전송</button>
            </div>
          </div>
        </div>
      </div>
    </div>
  );
}

// ── Settings View ──
function SettingsView({showToast}){
  const [activeNav,setActiveNav]=useState('기본 설정');
  const navItems=[{icon:'gear',label:'기본 설정'},{icon:'envelope',label:'이메일 알림'},{icon:'shield-check',label:'보안'},{icon:'users-three',label:'관리자 계정'},{icon:'bell',label:'시스템 알림'}];
  const [toggles,setToggles]=useState({a:true,b:true,c:false,d:true});
  const toggleField=(k)=>setToggles(t=>({...t,[k]:!t[k]}));
  return(
    <div>
      <div className="view-header">
        <h1 className="view-title">시스템 설정</h1>
        <p className="view-sub">플랫폼 운영 환경과 알림·보안 정책을 설정합니다</p>
      </div>
      <div className="settings-layout">
        <div className="settings-nav">
          {navItems.map(n=>(
            <div key={n.label} className={`settings-nav-item${activeNav===n.label?' active':''}`} onClick={()=>setActiveNav(n.label)}>
              <PIcon name={n.icon} size={14}/>{n.label}
            </div>
          ))}
        </div>
        <div>
          <div className="settings-card">
            <h3 className="settings-card-title">기본 설정</h3>
            {[{l:'협회명',h:'관리자 패널에 표시될 공식 명칭',v:'스타트업 드림 협회'},{l:'운영 이메일',h:'회원 발송 대표 이메일',v:'admin@startupdream.or.kr'},{l:'연락처',h:'문의 페이지 표시 번호',v:'02-1234-5678'}].map(f=>(
              <div key={f.l} className="settings-field">
                <div><div className="settings-label">{f.l}</div><div className="settings-hint">{f.h}</div></div>
                <input className="settings-input" defaultValue={f.v}/>
              </div>
            ))}
          </div>
          <div className="settings-card">
            <h3 className="settings-card-title">알림 설정</h3>
            {[{l:'신규 문의 알림',h:'새 1:1 문의 등록 시 즉시 알림',k:'a'},{l:'회원 승인 대기',h:'신규 가입 승인 대기 알림',k:'b'},{l:'프로그램 마감 알림',h:'신청 마감 3일 전 알림',k:'c'},{l:'위클리 리포트',h:'매주 월요일 운영 현황 요약',k:'d'}].map(f=>(
              <div key={f.l} className="settings-field">
                <div><div className="settings-label">{f.l}</div><div className="settings-hint">{f.h}</div></div>
                <div className="toggle-wrap">
                  <div className={`toggle ${toggles[f.k]?'on':'off'}`} onClick={()=>toggleField(f.k)}><div className="toggle-dot"/></div>
                  <span className="toggle-label">{toggles[f.k]?'켜짐':'꺼짐'}</span>
                </div>
              </div>
            ))}
          </div>
          <div style={{display:'flex',justifyContent:'flex-end',gap:'8px'}}>
            <button className="btn-ghost-sm" style={{width:'auto',padding:'9px 20px'}}>초기화</button>
            <button className="btn-obsidian" style={{width:'auto',padding:'9px 24px'}} onClick={()=>showToast('설정이 저장되었습니다.')}>저장하기</button>
          </div>
        </div>
      </div>
    </div>
  );
}

// ── Overview Dashboard ──

    {type:'문의 등록',desc:'창업 지원 프로그램 신청 방법 문의',time:'35분 전',dot:'#c5d0ff'},

  return(
    <div>

            <div className="stat-card-value" style={{fontFamily:"'Playfair Display',serif"}}>{s.n}</div>
            <div style={{fontSize:'12px',color:'var(--muted)',marginTop:'6px'}}>{s.sub}</div>
          </div>
        ))}
      </div>
      <div style={{display:'grid',gridTemplateColumns:'1fr 320px',gap:'16px'}}>
        <div style={{background:'var(--white)',border:'1px solid var(--border)',borderRadius:'16px',overflow:'hidden'}}>
          <div style={{padding:'18px 20px',borderBottom:'1px solid var(--border)',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
            <span style={{fontFamily:"'Playfair Display',serif",fontSize:'18px',fontWeight:'700',color:'var(--obsidian)'}}>최근 활동</span>
            <span style={{fontSize:'12px',color:'var(--muted)',cursor:'pointer'}}>전체 보기</span>
          </div>
          <div>
            {recentActivity.map((a,i)=>(
              <div key={i} style={{display:'flex',alignItems:'center',gap:'12px',padding:'13px 20px',borderBottom:'1px solid var(--border)',animation:`slideRight .35s ${i*.05}s both`}}>
                <div style={{width:'8px',height:'8px',borderRadius:'50%',background:a.dot,flexShrink:0}}/>
                <div style={{flex:1}}>
                  <div style={{fontSize:'13px',fontWeight:'600',color:'var(--obsidian)',marginBottom:'2px'}}>{a.desc}</div>
                  <div style={{fontSize:'11px',color:'var(--muted)'}}>{a.type}</div>

              </div>

        </div>
        <div style={{display:'flex',flexDirection:'column',gap:'14px'}}>
          <div style={{background:'var(--obsidian)',borderRadius:'16px',padding:'22px',position:'relative',overflow:'hidden'}}>
            <div style={{position:'absolute',top:'-20px',right:'-20px',width:'100px',height:'100px',borderRadius:'50%',background:'radial-gradient(circle,rgba(241,204,255,.35),transparent 70%)',filter:'blur(20px)'}}/>
            <div style={{fontFamily:"'Playfair Display',serif",fontSize:'26px',fontWeight:'900',color:'var(--white)',marginBottom:'8px'}}>신규 문의 2건</div>
            <div style={{fontSize:'13px',color:'rgba(255,255,255,.55)',marginBottom:'16px'}}>오늘 답변 대기 중인 문의</div>
            <button className="btn-lilac" style={{width:'auto',padding:'7px 16px'}}>바로 확인</button>
          </div>
          <div style={{background:'var(--white)',border:'1px solid var(--border)',borderRadius:'16px',padding:'18px'}}>
            <div style={{fontSize:'13px',fontWeight:'700',color:'var(--obsidian)',marginBottom:'12px'}}>승인 대기 회원</div>
            {members.filter(m=>m.status==='pending').map((m,i)=>(
              <div key={m.id} style={{display:'flex',alignItems:'center',gap:'8px',padding:'7px 0',borderBottom:'1px solid var(--border)'}}>
                <div style={{width:'28px',height:'28px',borderRadius:'50%',background:m.color,display:'flex',alignItems:'center',justifyContent:'center',fontSize:'11px',fontWeight:'700'}}>{m.name[0]}</div>

// ── App ──
const navItems=[
  {label:'대시보드',key:'overview',icon:'squares-four',badge:null},
  {label:'회원 관리',key:'members',icon:'users-three',badge:null},
  {label:'콘텐츠 관리',key:'content',icon:'newspaper',badge:'5'},
  {label:'문의 관리',key:'inquiries',icon:'chat-circle-dots',badge:'2'},
  {label:'시스템 설정',key:'settings',icon:'gear',badge:null},
];
function App(){
  const [view,setView]=useState('overview');
  const [toast,setToast]=useState(null);
  return(
    <React.Fragment>
      <aside className="app-sidebar">
        <div className="sidebar-logo">
          <div className="sidebar-logo-mark">
            <div className="sidebar-logo-icon">S</div>
            <span className="sidebar-logo-name">스타트업 드림</span>
          </div>
          <span className="sidebar-logo-sub">관리자 플랫폼</span>
        </div>
        <div className="sidebar-section">
          <div className="sidebar-section-label">운영 관리</div>
          {navItems.map(item=>(
            <div key={item.key} className={`sidebar-item${view===item.key?' active':''}`} onClick={()=>setView(item.key)}>
              <span className="si-icon"><PIcon name={item.icon} size={15}/></span>
              <span className="si-label">{item.label}</span>
              {item.badge&&<span className={view===item.key?'si-badge-dark':'si-badge'}>{item.badge}</span>}
            </div>
          ))}
        </div>
        <div className="sidebar-section">
          <div className="sidebar-section-label">현황</div>
          <div className="sidebar-status">
            {[{l:'활성 회원',v:`${members.filter(m=>m.status==='active').length}명`},{l:'대기 문의',v:`${inqs.filter(q=>q.status==='pending').length}건`},{l:'이번 주 신규',v:'3개사'}].map(s=>(
              <div key={s.l} className="sidebar-status-item">
                <span style={{color:'rgba(255,255,255,.38)'}}>{s.l}</span>
                <span style={{color:'var(--white)',fontWeight:'700'}}>{s.v}</span>
              </div>
            ))}
          </div>
        </div>
        <div style={{flex:1}}/>
        <div className="sidebar-avatar-wrap">
          <div className="sidebar-avatar-row">
            <div className="sidebar-avatar">관</div>
            <div><div className="sidebar-user-name">김관리</div><div className="sidebar-user-role">최고 관리자</div></div>
            <PIcon name="sign-out" size={14} style={{color:'rgba(255,255,255,.3)',marginLeft:'auto',cursor:'pointer'}}/>
          </div>
        </div>
      </aside>
      <div className="app-main">
        <div className="topbar">
          <span className="topbar-title">{{overview:'대시보드',members:'회원 관리',content:'콘텐츠 관리',inquiries:'문의 관리',settings:'시스템 설정'}[view]}</span>
          <div className="topbar-search">
            <PIcon name="magnifying-glass" size={13} style={{color:'var(--muted)',flexShrink:0}}/>
            <input className="topbar-search-input" placeholder="전체 검색..."/>
          </div>
          <div className="topbar-btn"><PIcon name="bell" size={14}/><div className="topbar-notif-dot"/></div>
          <div className="topbar-btn"><PIcon name="question" size={14}/></div>
          <div style={{width:'32px',height:'32px',borderRadius:'50%',background:'linear-gradient(135deg,var(--lilac-bloom),var(--sky-veil))',display:'flex',alignItems:'center',justifyContent:'center',fontSize:'13px',fontWeight:'700',color:'var(--obsidian)',cursor:'pointer'}}>관</div>
        </div>
        <div className="content-area">
          {view==='overview'&&<OverviewView/>}
          {view==='members'&&<MembersView showToast={setToast}/>}
          {view==='content'&&<ContentView showToast={setToast}/>}
          {view==='inquiries'&&<InquiriesView showToast={setToast}/>}
          {view==='settings'&&<SettingsView showToast={setToast}/>}
        </div>
      </div>
      {toast&&<Toast msg={toast} onClose={()=>setToast(null)}/>}
    </React.Fragment>
  );
}
const root=ReactDOM.createRoot(document.getElementById('root'));
root.render(<App/>);
</script>
</body>
