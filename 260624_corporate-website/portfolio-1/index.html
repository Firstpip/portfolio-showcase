<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>기업 홍보 및 제품 소개 사이트 — 맞춤 구현 데모</title>
<link rel="preconnect" href="https://cdn.jsdelivr.net">
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/lucide@0.344.0/dist/umd/lucide.min.js"></script>
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone@7.23.0/babel.min.js"></script>
<style>
  /* Apple design-ref: bg #f5f5f7, card #fff, primary #0071e3, text #1d1d1f */
  :root {
    --color-fog: #f5f5f7;
    --color-snow: #ffffff;
    --color-ink: #1d1d1f;
    --color-graphite: #707070;
    --color-slate: #474747;
    --color-azure: #0071e3;
    --color-cobalt-link: #0066cc;
    --color-caution: #b64400;
    --color-border: #e8e8ed;
    --radius-cards: 28px;
    --radius-buttons: 999px;
    --font-main: 'Pretendard Variable', sans-serif;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body {
    font-family: var(--font-main);
    background: var(--color-fog);
    color: var(--color-ink);
    font-size: 17px;
    line-height: 1.47;
    letter-spacing: -0.1px;
    -webkit-font-smoothing: antialiased;
  }

  /* ── Global Nav ── */
  .gnav {
    position: fixed; top: 0; left: 0; right: 0; z-index: 1000;
    height: 52px;
    background: rgba(245,245,247,0.9);
    backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--color-border);
    display: flex; align-items: center;
  }
  .gnav-inner {
    max-width: 1200px; margin: 0 auto; padding: 0 24px;
    width: 100%;
    display: flex; align-items: center; gap: 32px;
  }
  .gnav-brand {
    font-size: 17px; font-weight: 600; color: var(--color-ink);
    letter-spacing: -0.3px; white-space: nowrap; cursor: default;
  }
  .gnav-links {
    display: flex; gap: 24px; list-style: none; flex: 1;
  }
  .gnav-links button {
    background: none; border: none; cursor: pointer;
    font-family: var(--font-main); font-size: 14px;
    color: var(--color-ink); letter-spacing: -0.04px;
    padding: 0; transition: color 0.15s;
  }
  .gnav-links button:hover { color: var(--color-azure); }
  .gnav-links button.active { color: var(--color-azure); font-weight: 500; }
  .gnav-cta {
    background: var(--color-azure); color: #fff;
    border: none; border-radius: var(--radius-buttons);
    padding: 7px 18px; font-size: 14px; font-weight: 500;
    font-family: var(--font-main); cursor: pointer;
    transition: background 0.15s; white-space: nowrap;
  }
  .gnav-cta:hover { background: #0077ed; }
  .gnav-mobile-btn {
    display: none; background: none; border: none; cursor: pointer;
    padding: 4px; margin-left: auto;
  }

  /* ── Main content ── */
  #app { padding-top: 52px; }
  .section { transition: opacity 0.3s; }

  /* ── HERO ── */
  .hero {
    background: var(--color-fog);
    padding: 100px 24px 80px;
    text-align: center;
    position: relative; overflow: hidden;
  }
  .hero-eyebrow {
    font-size: 14px; font-weight: 500; color: var(--color-graphite);
    letter-spacing: 0.02em; text-transform: uppercase; margin-bottom: 16px;
    display: inline-block;
  }
  .hero-headline {
    font-size: clamp(48px, 7vw, 80px); font-weight: 700;
    color: var(--color-ink); letter-spacing: -2px; line-height: 1.04;
    margin-bottom: 20px; max-width: 860px; margin-left: auto; margin-right: auto;
  }
  .hero-sub {
    font-size: 20px; font-weight: 300; color: var(--color-graphite);
    letter-spacing: -0.2px; line-height: 1.4;
    max-width: 560px; margin: 0 auto 40px;
  }
  .hero-actions { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
  .btn-primary {
    background: var(--color-azure); color: #fff;
    border: none; border-radius: var(--radius-buttons);
    padding: 13px 24px; font-size: 17px; font-weight: 500;
    font-family: var(--font-main); cursor: pointer;
    transition: background 0.15s;
  }
  .btn-primary:hover { background: #0077ed; }
  .btn-ghost {
    background: none; border: none; color: var(--color-azure);
    font-size: 17px; font-weight: 400; cursor: pointer;
    font-family: var(--font-main); padding: 13px 8px;
    display: flex; align-items: center; gap: 4px;
    transition: opacity 0.15s;
  }
  .btn-ghost:hover { opacity: 0.7; }

  .hero-product-strip {
    display: flex; gap: 12px; justify-content: center; flex-wrap: wrap;
    margin-top: 60px;
  }
  .product-color-chip {
    width: 32px; height: 32px; border-radius: 999px;
    border: 2px solid transparent; cursor: pointer;
    transition: all 0.2s; position: relative;
  }
  .product-color-chip.active::after {
    content: ''; position: absolute; inset: -4px;
    border: 2px solid var(--color-ink); border-radius: 999px;
  }

  /* ── PRODUCT SECTION ── */
  .section-band { padding: 80px 24px; }
  .section-band.white-bg { background: var(--color-snow); }
  .section-band.fog-bg { background: var(--color-fog); }
  .section-header { text-align: center; margin-bottom: 56px; }
  .section-label {
    font-size: 14px; font-weight: 500; color: var(--color-graphite);
    text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 12px;
  }
  .section-title {
    font-size: clamp(32px, 4vw, 56px); font-weight: 700;
    color: var(--color-ink); letter-spacing: -0.9px; line-height: 1.07;
    margin-bottom: 16px;
  }
  .section-desc {
    font-size: 20px; font-weight: 300; color: var(--color-graphite);
    letter-spacing: -0.2px; max-width: 520px; margin: 0 auto;
  }

  /* ── Category Filter ── */
  .filter-bar {
    display: flex; gap: 8px; flex-wrap: wrap; justify-content: center;
    margin-bottom: 40px;
  }
  .filter-chip {
    background: none; border: 1px solid var(--color-border);
    border-radius: var(--radius-buttons);
    padding: 7px 18px; font-size: 14px; font-weight: 400;
    font-family: var(--font-main); cursor: pointer;
    color: var(--color-ink); transition: all 0.2s;
  }
  .filter-chip:hover { border-color: var(--color-ink); }
  .filter-chip.active {
    background: var(--color-ink); color: #fff; border-color: var(--color-ink);
  }

  /* ── Product Grid ── */
  .product-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 16px; max-width: 1200px; margin: 0 auto;
  }
  .product-card {
    background: var(--color-fog); border-radius: var(--radius-cards);
    padding: 28px; cursor: pointer;
    transition: transform 0.25s, box-shadow 0.25s;
    border: 1px solid transparent;
  }
  .product-card:hover {
    transform: translateY(-4px);
    box-shadow: 0 8px 32px rgba(0,0,0,0.10);
    border-color: var(--color-border);
  }
  .product-card.active-card {
    border-color: var(--color-azure);
    box-shadow: 0 0 0 2px rgba(0,113,227,0.15);
  }
  .product-card-thumb {
    width: 100%; aspect-ratio: 4/3; border-radius: 16px; overflow: hidden;
    margin-bottom: 20px; background: linear-gradient(135deg, #e8e8ed 0%, #d2d2d7 100%);
    display: flex; align-items: center; justify-content: center;
    position: relative;
  }
  .product-card-img {
    font-size: 48px; opacity: 0.5;
    animation: shimmer-pulse 2s ease-in-out infinite;
  }
  @keyframes shimmer-pulse {
    0%, 100% { transform: scale(1); opacity: 0.5; }
    50% { transform: scale(1.05); opacity: 0.7; }
  }
  .product-badge {
    position: absolute; top: 10px; right: 10px;
    background: var(--color-azure); color: #fff;
    font-size: 11px; font-weight: 600; padding: 3px 10px;
    border-radius: 999px; text-transform: uppercase;
  }
  .product-card-name {
    font-size: 19px; font-weight: 600; color: var(--color-ink);
    letter-spacing: -0.36px; margin-bottom: 6px;
  }
  .product-card-cat {
    font-size: 13px; color: var(--color-graphite); margin-bottom: 12px;
  }
  .product-card-price {
    font-size: 17px; font-weight: 600; color: var(--color-ink);
    letter-spacing: -0.1px;
  }
  .product-card-link {
    display: inline-flex; align-items: center; gap: 4px;
    color: var(--color-cobalt-link); font-size: 14px; margin-top: 8px;
    background: none; border: none; cursor: pointer;
    font-family: var(--font-main);
    transition: opacity 0.15s;
  }
  .product-card-link:hover { opacity: 0.7; }

  /* ── Product Detail Panel ── */
  .product-detail {
    background: var(--color-snow); border-radius: var(--radius-cards);
    padding: 40px; max-width: 1200px; margin: 40px auto 0;
    display: none;
    animation: fadeSlideIn 0.3s ease;
  }
  @keyframes fadeSlideIn {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .product-detail.visible { display: grid; grid-template-columns: 1fr 1fr; gap: 48px; }
  .detail-gallery { display: flex; flex-direction: column; gap: 16px; }
  .detail-main-img {
    width: 100%; aspect-ratio: 4/3; border-radius: 20px;
    background: linear-gradient(135deg, #f0f0f2 0%, #e0e0e5 100%);
    display: flex; align-items: center; justify-content: center;
    font-size: 72px; overflow: hidden;
    transition: background 0.4s;
  }
  .detail-thumb-row { display: flex; gap: 8px; }
  .detail-thumb {
    width: 64px; height: 48px; border-radius: 8px;
    background: var(--color-fog); cursor: pointer;
    border: 2px solid transparent; display: flex;
    align-items: center; justify-content: center; font-size: 20px;
    transition: border-color 0.2s;
  }
  .detail-thumb.active { border-color: var(--color-azure); }
  .detail-info { display: flex; flex-direction: column; }
  .detail-breadcrumb {
    font-size: 12px; color: var(--color-graphite); margin-bottom: 16px;
    display: flex; align-items: center; gap: 6px;
  }
  .detail-title {
    font-size: 40px; font-weight: 700; color: var(--color-ink);
    letter-spacing: -0.6px; line-height: 1.17; margin-bottom: 8px;
  }
  .detail-price {
    font-size: 28px; font-weight: 600; color: var(--color-ink);
    margin-bottom: 20px;
  }
  .detail-desc {
    font-size: 17px; color: var(--color-graphite);
    line-height: 1.6; margin-bottom: 28px;
  }
  .spec-table { width: 100%; border-collapse: collapse; margin-bottom: 32px; }
  .spec-table tr { border-bottom: 1px solid var(--color-border); }
  .spec-table td { padding: 10px 0; font-size: 14px; }
  .spec-table td:first-child { color: var(--color-graphite); width: 44%; }
  .spec-table td:last-child { color: var(--color-ink); font-weight: 500; }
  .detail-actions { display: flex; gap: 12px; flex-wrap: wrap; }
  .detail-close {
    background: none; border: none; cursor: pointer;
    color: var(--color-graphite); font-size: 14px; margin-bottom: 24px;
    display: flex; align-items: center; gap: 4px;
    font-family: var(--font-main); padding: 0;
  }
  .detail-close:hover { color: var(--color-ink); }

  /* ── NOTICE BOARD ── */
  .notice-section { max-width: 960px; margin: 0 auto; }
  .notice-search-bar {
    display: flex; gap: 8px; margin-bottom: 32px;
  }
  .notice-search-input {
    flex: 1; border: 1px solid var(--color-border);
    border-radius: 10px; padding: 10px 16px; font-size: 15px;
    font-family: var(--font-main); outline: none;
    background: var(--color-snow);
    transition: border-color 0.2s;
  }
  .notice-search-input:focus { border-color: var(--color-azure); }
  .notice-search-btn {
    background: var(--color-ink); color: #fff;
    border: none; border-radius: 10px; padding: 10px 20px;
    font-size: 15px; font-family: var(--font-main); cursor: pointer;
    display: flex; align-items: center; gap: 6px;
    transition: opacity 0.15s;
  }
  .notice-search-btn:hover { opacity: 0.8; }
  .notice-tabs {
    display: flex; gap: 0; margin-bottom: 24px;
    border-bottom: 1px solid var(--color-border);
  }
  .notice-tab {
    background: none; border: none; padding: 10px 20px;
    font-size: 15px; font-family: var(--font-main);
    cursor: pointer; color: var(--color-graphite);
    border-bottom: 3px solid transparent;
    transition: all 0.15s;
  }
  .notice-tab.active {
    color: var(--color-ink); font-weight: 600;
    border-bottom-color: var(--color-ink);
  }
  .notice-tab:hover { color: var(--color-ink); }
  .notice-list { display: flex; flex-direction: column; gap: 0; }
  .notice-item {
    display: flex; align-items: flex-start; gap: 16px;
    padding: 20px 0; border-bottom: 1px solid var(--color-border);
    cursor: pointer; transition: background 0.15s;
    animation: fadeIn 0.3s ease;
  }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .notice-item:hover { background: rgba(0,0,0,0.02); margin: 0 -16px; padding: 20px 16px; border-radius: 8px; }
  .notice-num { font-size: 13px; color: var(--color-graphite); min-width: 36px; }
  .notice-badge {
    font-size: 11px; font-weight: 600; padding: 2px 8px;
    border-radius: 4px; background: var(--color-fog); color: var(--color-graphite);
    white-space: nowrap; margin-top: 2px;
  }
  .notice-badge.type-notice { background: #e6f0ff; color: var(--color-azure); }
  .notice-badge.type-new { background: #fff0e6; color: var(--color-caution); }
  .notice-content { flex: 1; }
  .notice-title { font-size: 16px; font-weight: 500; color: var(--color-ink); margin-bottom: 4px; }
  .notice-meta { font-size: 13px; color: var(--color-graphite); display: flex; gap: 12px; }
  .notice-detail {
    background: var(--color-snow); border-radius: var(--radius-cards);
    padding: 28px; margin-top: 12px; display: none;
    animation: fadeSlideIn 0.2s ease;
  }
  .notice-detail.open { display: block; }
  .notice-detail-title { font-size: 20px; font-weight: 600; margin-bottom: 8px; }
  .notice-detail-body { font-size: 16px; color: var(--color-slate); line-height: 1.7; }
  .pagination { display: flex; gap: 4px; justify-content: center; margin-top: 32px; }
  .page-btn {
    width: 36px; height: 36px; border-radius: 8px;
    border: 1px solid var(--color-border); background: none;
    cursor: pointer; font-size: 14px; font-family: var(--font-main);
    display: flex; align-items: center; justify-content: center;
    transition: all 0.15s;
  }
  .page-btn:hover { background: var(--color-fog); }
  .page-btn.active { background: var(--color-ink); color: #fff; border-color: var(--color-ink); }
  .page-btn:disabled { opacity: 0.3; cursor: not-allowed; }

  /* ── MOBILE VIEW section ── */
  .mobile-preview-section { text-align: center; padding: 80px 24px; }
  .device-frame {
    display: inline-block; margin: 0 auto;
    background: #1d1d1f; border-radius: 44px;
    padding: 14px 12px; box-shadow: 0 32px 80px rgba(0,0,0,0.25);
    position: relative;
  }
  .device-notch {
    width: 100px; height: 10px; background: #1d1d1f;
    border-radius: 0 0 12px 12px;
    margin: 0 auto 0; position: absolute;
    top: 0; left: 50%; transform: translateX(-50%);
    z-index: 2;
  }
  .device-screen {
    width: 260px; border-radius: 32px; overflow: hidden;
    background: var(--color-fog);
  }
  .mobile-nav {
    background: rgba(245,245,247,0.9); padding: 14px 16px;
    display: flex; align-items: center; justify-content: space-between;
    border-bottom: 1px solid var(--color-border);
  }
  .mobile-brand-small { font-size: 14px; font-weight: 600; }
  .mobile-menu-hero {
    padding: 24px 16px;
    background: linear-gradient(135deg, var(--color-fog) 0%, #e8e8ef 100%);
    min-height: 360px;
  }
  .mobile-hero-title { font-size: 22px; font-weight: 700; letter-spacing: -0.5px; margin-bottom: 8px; }
  .mobile-hero-sub { font-size: 12px; color: var(--color-graphite); margin-bottom: 16px; }
  .mobile-cta {
    background: var(--color-azure); color: #fff;
    border: none; border-radius: 999px; padding: 8px 20px;
    font-size: 13px; cursor: pointer; font-family: var(--font-main);
    transition: background 0.15s;
  }
  .mobile-cta:hover { background: #0077ed; }
  .mobile-products { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 20px; }
  .mobile-product-card {
    background: var(--color-snow); border-radius: 12px; padding: 10px;
    cursor: default; transition: transform 0.2s;
  }
  .mobile-product-icon { font-size: 24px; margin-bottom: 4px; }
  .mobile-product-name { font-size: 10px; font-weight: 600; color: var(--color-ink); }
  .mobile-product-price { font-size: 9px; color: var(--color-graphite); }

  /* Feature cards for stats */
  .stats-band { background: var(--color-snow); padding: 80px 24px; }
  .stats-grid {
    display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 16px; max-width: 1200px; margin: 0 auto;
  }
  .stat-card {
    background: var(--color-fog); border-radius: var(--radius-cards);
    padding: 32px 28px; text-align: center;
    animation: countUp 0.6s ease forwards;
  }
  @keyframes countUp {
    from { transform: translateY(20px); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
  }
  .stat-value {
    font-size: 40px; font-weight: 700; color: var(--color-ink);
    letter-spacing: -0.6px; margin-bottom: 4px;
  }
  .stat-label { font-size: 14px; color: var(--color-graphite); }

  /* Gradient showcase */
  .gradient-showcase {
    height: 400px; display: flex; align-items: center; justify-content: center;
    position: relative; overflow: hidden;
    transition: background 0.5s ease;
  }
  .gradient-showcase .gs-content {
    text-align: center; z-index: 1; position: relative;
  }
  .gs-headline {
    font-size: clamp(36px, 5vw, 56px); font-weight: 700;
    color: #fff; letter-spacing: -0.9px; margin-bottom: 16px;
  }
  .gs-sub { font-size: 18px; color: rgba(255,255,255,0.8); margin-bottom: 28px; }

  /* dark pill on gradient */
  .btn-dark-pill {
    background: #000; color: #fff;
    border: none; border-radius: 999px;
    padding: 11px 24px; font-size: 15px; font-weight: 500;
    font-family: var(--font-main); cursor: pointer;
    transition: opacity 0.15s;
  }
  .btn-dark-pill:hover { opacity: 0.8; }

  /* Responsive */
  @media (max-width: 768px) {
    .gnav-links { display: none; }
    .gnav-mobile-btn { display: flex; align-items: center; }
    .product-detail.visible { grid-template-columns: 1fr; }
    .hero-headline { letter-spacing: -1px; }
    .stats-grid { grid-template-columns: 1fr 1fr; }
  }

  /* Mobile menu */
  .mobile-nav-overlay {
    position: fixed; inset: 0; z-index: 999;
    background: rgba(245,245,247,0.97);
    backdrop-filter: blur(20px);
    display: none; flex-direction: column;
    padding: 52px 24px 24px;
  }
  .mobile-nav-overlay.open { display: flex; }
  .mobile-nav-links { display: flex; flex-direction: column; gap: 8px; margin-top: 20px; }
  .mobile-nav-link {
    font-size: 24px; font-weight: 600; color: var(--color-ink);
    padding: 12px 0; border-bottom: 1px solid var(--color-border);
    background: none; border: none; text-align: left;
    font-family: var(--font-main); cursor: pointer;
    border-bottom: 1px solid var(--color-border);
    transition: color 0.15s;
  }
  .mobile-nav-link:hover { color: var(--color-azure); }
  .mobile-nav-close {
    background: none; border: none; cursor: pointer;
    position: absolute; top: 14px; right: 24px;
    font-size: 20px; color: var(--color-ink);
  }

  @keyframes barGrow {
    from { transform: scaleX(0); }
    to { transform: scaleX(1); }
  }
  .progress-bar {
    height: 3px; background: var(--color-azure);
    border-radius: 2px; transform-origin: left;
    animation: barGrow 1s ease forwards;
  }

  /* Spin animation for lucide icons */
  @keyframes spin {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
  }
  @keyframes bounce-in {
    0% { transform: scale(0.85); opacity: 0; }
    60% { transform: scale(1.05); }
    100% { transform: scale(1); opacity: 1; }
  }
</style>
</head>
<body>
<script type="text/babel" data-presets="react">
const {useState, useEffect, useRef} = React;

// ── Data ──
const PRODUCTS = [
  { id:1, name:'산업용 에어 컴프레서', cat:'공기압 장비', price:'₩4,200,000', badge:'베스트',
    icon:'wind', thumbIcons:['wind','settings','wrench'], iconColor:'#5a7fc0', color:'#e8e8ef',
    desc:'고성능 피스톤 방식 산업용 에어 컴프레서. 견고한 철제 탱크와 오일 윤활 펌프로 장시간 연속 운전에 적합합니다.',

              <div className="notice-list">
                {filteredNotices.length === 0 && (
                  <div style={{textAlign:'center',padding:'48px',color:'var(--color-graphite)'}}>
                    <i data-lucide="search-x" style={{width:40,height:40,opacity:0.3}}></i>
                    <p style={{marginTop:12}}>검색 결과가 없습니다</p>
                  </div>
                )}
                {filteredNotices.map((n,i) => (
                  <div key={n.id}>
                    <div className="notice-item" onClick={() => setOpenNotice(openNotice === n.id ? null : n.id)}>
                      <span className="notice-num">{i+1}</span>
                      <span className={`notice-badge ${n.type === 'new' ? 'type-new' : 'type-notice'}`}>
                        {n.type === 'new' ? '신규' : '공지'}
                      </span>
                      <div className="notice-content">
                        <div className="notice-title">{n.title}</div>
                        <div className="notice-meta">
                          <span>{n.date}</span>
                          <span>{n.author}</span>
                          <span>조회 {n.views}</span>
                        </div>
                      </div>
                      <i data-lucide={openNotice === n.id ? 'chevron-up' : 'chevron-down'} style={{width:18,height:18,color:'var(--color-graphite)',flexShrink:0}}></i>
                    </div>
                    {openNotice === n.id && (
                      <div className="notice-detail open">
                        <h3 className="notice-detail-title">{n.title}</h3>
                        <div style={{display:'flex',gap:16,fontSize:13,color:'var(--color-graphite)',marginBottom:20}}>
                          <span>{n.date}</span><span>{n.author}</span>
                        </div>
                        <div className="notice-detail-body" style={{whiteSpace:'pre-line'}}>{n.body}</div>
                      </div>
                    )}
                  </div>
                ))}
              </div>

              {/* Pagination */}
              <div className="pagination">
                <button className="page-btn" disabled={noticePage === 1} onClick={() => setNoticePage(p => p-1)}>
                  <i data-lucide="chevron-left" style={{width:14,height:14}}></i>
                </button>
                {[1,2,3].map(p => (
                  <button key={p} className={`page-btn ${noticePage === p ? 'active' : ''}`}
                    onClick={() => setNoticePage(p)}>{p}</button>
                ))}
                <button className="page-btn" disabled={noticePage === 3} onClick={() => setNoticePage(p => p+1)}>
                  <i data-lucide="chevron-right" style={{width:14,height:14}}></i>
                </button>
              </div>
            </div>
          </div>
        )}

        {/* ── MOBILE VIEW ── */}
        {view === 'mobile-view' && (
          <div className="section section-band fog-bg mobile-preview-section">
            <div className="section-header">
              <div className="section-label">반응형 설계</div>
              <h2 className="section-title" style={{fontSize:'clamp(28px,4vw,40px)'}}>모든 화면에서 완벽하게</h2>
              <p className="section-desc">PC·태블릿·모바일 — 3개 뷰포트에서 최적화된 레이아웃을 구현합니다</p>
            </div>

            <div style={{display:'flex',gap:40,justifyContent:'center',alignItems:'flex-end',flexWrap:'wrap',marginBottom:56}}>
              {/* Phone frame */}
              <div className="device-frame" style={{animation:'bounce-in 0.5s ease'}}>
                <div className="device-screen">
                  <div className="mobile-nav">
                    <span className="mobile-brand-small">샘플테크</span>
                    <i data-lucide="menu" style={{width:18,height:18}}></i>
                  </div>
                  <div className="mobile-menu-hero">
                    <div className="mobile-hero-title">산업 자동화<br/>솔루션</div>
                    <div className="mobile-hero-sub">12년 기술, 340+ 납품처</div>
                    <button className="mobile-cta" onClick={() => { setView('main'); setTimeout(() => document.getElementById('products')?.scrollIntoView({behavior:'smooth'}), 100); }}>제품 보기</button>
                    <div className="mobile-products">
                      {PRODUCTS.slice(0,4).map(p => (
                        <div key={p.id} className="mobile-product-card">
                          <div className="mobile-product-icon" style={{height:24,display:'flex',alignItems:'center'}}><i data-lucide={p.icon} style={{width:18,height:18,color:p.iconColor}}></i></div>
                          <div className="mobile-product-name">{p.name.slice(0,8)}...</div>
                          <div className="mobile-product-price">{p.price.slice(0,8)}</div>
                        </div>
                      ))}
                    </div>
                  </div>
                </div>
              </div>

              {/* Tablet mockup */}
              <div style={{background:'#1d1d1f',borderRadius:20,padding:'10px 8px',boxShadow:'0 20px 60px rgba(0,0,0,0.2)'}}>
                <div style={{width:360,borderRadius:12,overflow:'hidden',background:' var(--color-fog)'}}>
                  <div style={{background:'rgba(245,245,247,0.9)',padding:'10px 12px',display:'flex',alignItems:'center',gap:8,borderBottom:'1px solid var(--color-border)'}}>
                    <span style={{fontSize:12,fontWeight:600}}>샘플테크</span>
                    <div style={{flex:1,display:'flex',gap:8,justifyContent:'center',fontSize:11,color:'var(--color-graphite)'}}>
                      <span>제품 홍보</span><span>공지사항</span>
                    </div>
                    <button style={{background:'var(--color-azure)',color:'#fff',border:'none',borderRadius:999,padding:'4px 10px',fontSize:11,cursor:'pointer',fontFamily:'var(--font-main)'}} onClick={() => handleNav('공지 게시판')}>문의</button>
                  </div>
                  <div style={{padding:12,display:'grid',gridTemplateColumns:'1fr 1fr',gap:8}}>
                    {PRODUCTS.slice(0,4).map(p => (
                      <div key={p.id} style={{background:p.color,borderRadius:10,padding:10}}>
                        <div style={{marginBottom:4,height:22,display:'flex',alignItems:'center'}}><i data-lucide={p.icon} style={{width:16,height:16,color:p.iconColor}}></i></div>
                        <div style={{fontSize:10,fontWeight:600}}>{p.name.slice(0,10)}</div>
                        <div style={{fontSize:9,color:'var(--color-graphite)'}}>{p.price}</div>
                      </div>
                    ))}
                  </div>
                </div>
              </div>
            </div>

            {/* WAI-ARIA feature cards */}
            <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(220px,1fr))',gap:16,maxWidth:900,margin:'0 auto'}}>
              {[
                {icon:'smartphone',title:'모바일 최적화',desc:'375px 뷰포트에서 가로 스크롤 없는 완전 반응형 레이아웃'},
                {icon:'tablet',title:'태블릿 지원',desc:'768px 중간 뷰포트에서 2컬럼 그리드 자동 전환'},
                {icon:'monitor',title:'PC 와이드',desc:'1440px에서 4컬럼 제품 그리드 + 풍부한 사이드 공백'},
                {icon:'accessibility',title:'WAI-ARIA 접근성',desc:'시맨틱 HTML + aria-label로 스크린 리더 완전 지원'},
              ].map(f => (
                <div key={f.icon} className="product-card" style={{cursor:'default'}}>
                  <div style={{marginBottom:16}}>
                    <i data-lucide={f.icon} style={{width:28,height:28,color:'var(--color-azure)'}}></i>
                  </div>
                  <div style={{fontSize:17,fontWeight:600,marginBottom:8}}>{f.title}</div>
                  <div style={{fontSize:14,color:'var(--color-graphite)',lineHeight:1.5}}>{f.desc}</div>
                </div>
              ))}
            </div>
          </div>
        )}

        {/* Toast notification — micro-interaction */}
        {toast && (
          <div style={{
            position:'fixed',bottom:24,left:'50%',transform:'translateX(-50%)',
            background:'var(--color-ink)',color:'#fff',
            padding:'12px 24px',borderRadius:999,fontSize:15,
            zIndex:2000,whiteSpace:'nowrap',
            animation:'fadeSlideIn 0.25s ease',
            display:'flex',alignItems:'center',gap:10
          }}>
            <i data-lucide="loader-2" style={{width:16,height:16,animation:'spin 1s linear infinite'}}></i>
            {toast}
          </div>
        )}

        {/* Footer */}
        <footer style={{background:'var(--color-fog)',borderTop:'1px solid var(--color-border)',padding:'48px 24px 32px'}}>
          <div style={{maxWidth:1200,margin:'0 auto'}}>
            <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(180px,1fr))',gap:32,marginBottom:40}}>
              <div>
                <div style={{fontSize:17,fontWeight:600,marginBottom:12}}>샘플테크</div>
                <div style={{fontSize:14,color:'var(--color-graphite)',lineHeight:1.7}}>산업 자동화 솔루션 전문 기업<br/>기술 문의: 02-1234-5678</div>
              </div>
              {[
                {h:'제품',ls:['공기압 장비','계측기기','동력 전달','자동화 장비']},
                {h:'고객지원',ls:['공지사항','제품 문의','AS 신청','카탈로그']},
                {h:'회사정보',ls:['회사 소개','인증 현황','오시는 길','채용 안내']},
              ].map(col => (
                <div key={col.h}>
                  <div style={{fontSize:13,fontWeight:600,marginBottom:12,color:'var(--color-ink)'}}>{col.h}</div>
                  {col.ls.map(l => (
                    <div key={l} style={{fontSize:13,color:'var(--color-graphite)',marginBottom:8}}>{l}</div>
                  ))}
                </div>
              ))}
            </div>
            <div style={{borderTop:'1px solid var(--color-border)',paddingTop:24,fontSize:12,color:'var(--color-graphite)',display:'flex',justifyContent:'space-between',flexWrap:'wrap',gap:8}}>
              <span>© 2025 샘플테크 — 자체 개발 프로젝트</span>
              <span>사업자등록번호: 000-00-00000 | 서울시 샘플구 데모동</span>
            </div>
          </div>
        </footer>
      </div>
    </>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
<div id="root"></div>
</body>
</html>
