<!DOCTYPE html>
<html lang="ko" data-archetype="notion-blocks-tree">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>기업 홍보 사이트 통합 CMS 관리자 — 구현 데모</title>
<link rel="preconnect" href="https://cdn.jsdelivr.net">
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@phosphor-icons/web@2.1.1/src/index.js" type="module"></script>
<script src="https://cdn.jsdelivr.net/npm/@phosphor-icons/web@2.1.1/src/index.js" crossorigin></script>
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone@7.23.0/babel.min.js"></script>
<style>
  /* Stripe design-ref: bg #e5edf5, card #f8fafd, primary #533afd, text #061b31 */
  :root {
    --mist: #e5edf5;        /* bg */
    --snow: #f8fafd;        /* card surface */
    --iris: #533afd;        /* Electric Iris — primary CTA */
    --iris-guard: #fd3afd;   /* palette-guard rotated P2 primary — Stripe signature */
    --iris-light: #7c3aed; /* lighter violet accent */
    --lime: #8af61e;       /* palette-guard accent */
    --ink: #061b31;        /* Midnight Ink */
    --steel: #50617a;      /* Steel text */
    --muted: #7d8ba4;      /* muted text */
    --border: #d4dde8;
    --border-light: #e5edf5;
    --radius: 4px;
    --font: 'Pretendard Variable', sans-serif;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    font-family: var(--font);
    background: var(--mist);
    color: var(--ink);
    font-size: 15px;
    -webkit-font-smoothing: antialiased;
  }

  /* ── Layout ── */
  #app { display: flex; height: 100vh; overflow: hidden; }

  /* ── Sidebar (tree nav) ── */
  .sidebar {
    width: 240px; flex-shrink: 0;
    background: #dce6f0;
    border-right: 1px solid var(--border);
    display: flex; flex-direction: column;
    overflow: hidden;
  }
  .sidebar-top {
    padding: 12px 12px 0;
    display: flex; flex-direction: column; gap: 2px;
  }
  .workspace-switcher {
    display: flex; align-items: center; gap: 8px;
    padding: 6px 8px; border-radius: var(--radius);
    cursor: pointer; margin-bottom: 4px;
    transition: background 0.15s;
  }
  .workspace-switcher:hover { background: rgba(0,0,0,0.06); }
  .ws-icon {
    width: 24px; height: 24px; border-radius: 4px;
    background: linear-gradient(135deg, var(--iris) 0%, #a855f7 100%);
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; color: #fff; font-weight: 700;
    flex-shrink: 0;
  }
  .ws-name { font-size: 14px; font-weight: 600; color: var(--ink); flex: 1; }

  .sidebar-search {
    display: flex; align-items: center; gap: 6px;
    padding: 5px 8px; border-radius: var(--radius);
    font-size: 13px; color: var(--muted);
    cursor: pointer; transition: background 0.15s;
    background: rgba(255,255,255,0.5); margin-bottom: 4px;
  }
  .sidebar-search:hover { background: rgba(255,255,255,0.8); }

  .sidebar-action {
    display: flex; align-items: center; gap: 6px;
    padding: 5px 8px; border-radius: var(--radius);
    font-size: 13px; color: var(--steel);
    cursor: pointer; transition: background 0.15s;
    background: none; border: none; font-family: var(--font);
    width: 100%; text-align: left;
  }
  .sidebar-action:hover { background: rgba(0,0,0,0.06); }

  .sidebar-divider { height: 1px; background: var(--border); margin: 8px 0; }

  /* ── Tree ── */
  .tree-section { overflow-y: auto; flex: 1; padding: 0 4px 12px; }
  .tree-section-label {
    font-size: 11px; font-weight: 600; color: var(--muted);
    text-transform: uppercase; letter-spacing: 0.06em;
    padding: 6px 12px 2px; cursor: default;
  }
  .tree-item {
    display: flex; align-items: center; gap: 0;
    border-radius: var(--radius); cursor: pointer;
    user-select: none; position: relative;
    transition: background 0.1s;
  }
  .tree-item:hover { background: rgba(0,0,0,0.06); }
  .tree-item.active { background: rgba(83,58,253,0.12); }
  .tree-item.active .tree-item-label { color: var(--iris); font-weight: 500; }
  .tree-toggle {
    width: 20px; height: 28px; display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; color: var(--muted); font-size: 10px;
    transition: transform 0.15s;
    background: none; border: none; cursor: pointer;
    font-family: var(--font);
  }
  .tree-toggle.open { transform: rotate(90deg); }
  .tree-item-icon {
    width: 20px; height: 28px; display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; font-size: 14px;
  }
  .tree-item-label { font-size: 13.5px; color: var(--ink); flex: 1; padding: 4px 0; line-height: 1.2; }
  .tree-new-btn {
    width: 24px; height: 24px; display: none; align-items: center; justify-content: center;
    color: var(--muted); border-radius: var(--radius);
    font-size: 14px; transition: background 0.1s;
    background: none; border: none; cursor: pointer;
  }
  .tree-item:hover .tree-new-btn { display: flex; }
  .tree-new-btn:hover { background: rgba(0,0,0,0.1); }
  .tree-children { overflow: hidden; transition: height 0.2s; }

  /* depth indents */
  .depth-0 { padding-left: 8px; }
  .depth-1 { padding-left: 24px; }
  .depth-2 { padding-left: 40px; }
  .depth-3 { padding-left: 56px; }

  /* ── Main area ── */
  .main-area { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

  /* ── Topbar ── */
  .stripe-spectrum-strip {
    height: 2px;
    background: linear-gradient(90deg, #7232f1 3%, #fb76fa 50%, #ffcf5e 100%);
    flex-shrink: 0;
  }
  .topbar {
    height: 48px; flex-shrink: 0;
    background: var(--snow);
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; padding: 0 20px; gap: 8px;
  }
  .breadcrumb {
    display: flex; align-items: center; gap: 4px;
    font-size: 14px; color: var(--steel);
  }
  .breadcrumb span { cursor: default; }
  .breadcrumb span.last { color: var(--ink); font-weight: 500; }
  .breadcrumb-sep { color: var(--border); font-size: 16px; }
  .topbar-spacer { flex: 1; }
  .topbar-btn {
    display: flex; align-items: center; gap: 5px;
    padding: 5px 10px; border-radius: var(--radius);
    font-size: 13px; cursor: pointer; transition: background 0.15s;
    background: none; border: 1px solid var(--border);
    color: var(--steel); font-family: var(--font);
  }
  .topbar-btn:hover { background: var(--mist); }
  .topbar-btn.primary {
    background: var(--iris); color: #fff; border-color: var(--iris);
  }
  .topbar-btn.primary:hover { background: #4428e0; }
  .topbar-share {
    display: flex; align-items: center; gap: 4px;
    font-size: 13px; color: var(--muted); padding: 4px 8px;
    cursor: default;
  }
  .avatar {
    width: 28px; height: 28px; border-radius: 50%;
    background: linear-gradient(135deg, var(--iris) 0%, #a855f7 100%);
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 600; color: #fff;
    flex-shrink: 0;
  }

  /* ── Content area ── */
  .content-scroll { flex: 1; overflow-y: auto; overflow-x: hidden; position: relative; }
  .content-inner {
    max-width: 860px; margin: 0 auto;
    padding: 40px 80px 80px;
    min-height: 100%;
  }

  /* ── Blocks ── */
  .page-icon { font-size: 40px; margin-bottom: 12px; cursor: default; }
  .page-title {
    font-size: 40px; font-weight: 300;
    letter-spacing: -0.020em;
    line-height: 1.1;
    margin-bottom: 4px;
    background: linear-gradient(90deg, var(--iris) 0%, var(--steel) 100%);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
    cursor: text;
    animation: titleFadeIn 0.4s ease;
  }
  @keyframes titleFadeIn {
    from { opacity: 0; transform: translateY(-8px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .page-props {
    display: flex; gap: 0; flex-direction: column;
    margin: 16px 0 32px; border-top: 1px solid var(--border-light);
    padding-top: 16px;
  }
  .prop-row {
    display: flex; align-items: center; gap: 12px;
    padding: 4px 0; font-size: 14px;
  }
  .prop-key {
    width: 120px; color: var(--muted); flex-shrink: 0;
    display: flex; align-items: center; gap: 6px; cursor: default;
  }
  .prop-val { color: var(--ink); }
  .prop-tag {
    display: inline-flex; align-items: center; gap: 4px;
    padding: 2px 8px; border-radius: 3px; font-size: 12px;
    font-weight: 500;
  }
  .tag-live { background: rgba(138,246,30,0.2); color: #3a8000; }
  .tag-wip { background: rgba(83,58,253,0.12); color: var(--iris); }
  .tag-draft { background: rgba(125,139,164,0.15); color: var(--steel); }

  /* Block container */
  .block { position: relative; padding: 3px 0; }
  .block:hover .block-handle { opacity: 1; }
  .block-handle {
    position: absolute; left: -28px; top: 50%; transform: translateY(-50%);
    opacity: 0; display: flex; align-items: center; gap: 2px;
    transition: opacity 0.15s;
  }
  .block-dot {
    width: 18px; height: 18px; display: flex; align-items: center; justify-content: center;
    border-radius: 3px; cursor: grab; color: var(--muted); font-size: 12px;
    background: none; border: none;
  }
  .block-dot:hover { background: var(--mist); }

  /* Block types */
  .block-h1 {
    font-size: 30px; font-weight: 300;
    letter-spacing: -0.018em; color: var(--ink);
    margin: 28px 0 6px; line-height: 1.2;
    background: linear-gradient(90deg, var(--iris) 0%, var(--steel) 60%);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .block-h2 {
    font-size: 22px; font-weight: 300;
    letter-spacing: -0.016em; color: var(--ink);
    margin: 20px 0 4px; line-height: 1.3;
  }
  .block-h3 {
    font-size: 16px; font-weight: 600;
    letter-spacing: -0.01em; color: var(--ink);
    margin: 12px 0 2px;
  }
  .block-text {
    font-size: 15px; color: var(--ink);
    line-height: 1.65; cursor: text;
  }
  .block-text b { font-weight: 600; }
  .block-text code {
    background: rgba(83,58,253,0.08);
    border: 1px solid rgba(83,58,253,0.15);
    border-radius: 3px; padding: 1px 5px;
    font-size: 13px; color: var(--iris);
    font-family: 'Menlo', monospace;
  }

  .block-divider {
    height: 1px; background: var(--border); margin: 24px 0; cursor: default;
  }

  .block-callout {
    display: flex; gap: 12px;
    background: rgba(83,58,253,0.06);
    border: 1px solid rgba(83,58,253,0.15);
    border-left: 3px solid var(--iris);
    border-radius: var(--radius); padding: 14px 16px; margin: 8px 0;
  }
  .callout-icon { font-size: 18px; flex-shrink: 0; margin-top: 1px; }
  .callout-body { font-size: 14px; color: var(--ink); line-height: 1.6; }

  .block-callout.warning {
    background: rgba(255,165,0,0.06);
    border: 1px solid rgba(255,165,0,0.2);
    border-left: 3px solid #f59e0b;
  }

  /* Toggle block */
  .block-toggle { margin: 4px 0; }
  .toggle-header {
    display: flex; align-items: center; gap: 6px;
    cursor: pointer; padding: 3px 0; border-radius: var(--radius);
    transition: background 0.1s; font-size: 15px;
  }
  .toggle-header:hover { background: rgba(0,0,0,0.04); }
  .toggle-arrow {
    width: 20px; height: 20px; display: flex; align-items: center; justify-content: center;
    color: var(--muted); font-size: 11px; transition: transform 0.15s; flex-shrink: 0;
  }
  .toggle-arrow.open { transform: rotate(90deg); }
  .toggle-label { font-weight: 500; color: var(--ink); }
  .toggle-content {
    padding-left: 26px; overflow: hidden;
    animation: slideDown 0.15s ease;
  }
  @keyframes slideDown {
    from { opacity: 0; transform: translateY(-4px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* Table block */
  .block-table {
    width: 100%; border-collapse: collapse; margin: 8px 0;
    font-size: 14px; border-radius: var(--radius); overflow: hidden;
    border: 1px solid var(--border);
    animation: fadeInTable 0.3s ease;
  }
  @keyframes fadeInTable {
    from { opacity: 0; }
    to { opacity: 1; }
  }
  .block-table th {
    background: rgba(83,58,253,0.06);
    font-weight: 600; text-align: left; padding: 8px 12px;
    border-bottom: 1px solid var(--border); color: var(--ink);
  }
  .block-table td {
    padding: 7px 12px; border-bottom: 1px solid var(--border-light);
    vertical-align: top; color: var(--ink);
  }
  .block-table tr:last-child td { border-bottom: none; }
  .block-table tr:hover td { background: rgba(0,0,0,0.02); }

  /* Slash menu */
  .slash-menu {
    position: absolute; background: var(--snow);
    border: 1px solid var(--border); border-radius: var(--radius);
    box-shadow: 0 8px 24px rgba(6,27,49,0.15);
    padding: 6px; min-width: 220px; z-index: 100;
    animation: popIn 0.15s ease;
  }
  @keyframes popIn {
    from { opacity: 0; transform: scale(0.95) translateY(-4px); }
    to { opacity: 1; transform: scale(1) translateY(0); }
  }
  .slash-menu-label {
    font-size: 11px; font-weight: 600; color: var(--muted);
    text-transform: uppercase; letter-spacing: 0.06em;
    padding: 4px 8px 2px;
  }
  .slash-item {
    display: flex; align-items: center; gap: 10px;
    padding: 6px 8px; border-radius: 3px;
    cursor: pointer; transition: background 0.1s;
    font-size: 14px; color: var(--ink);
  }
  .slash-item:hover, .slash-item.selected { background: rgba(83,58,253,0.08); }
  .slash-item-icon {
    width: 28px; height: 28px; border-radius: 3px;
    background: var(--mist); display: flex; align-items: center; justify-content: center;
    font-size: 14px; flex-shrink: 0;
  }
  .slash-item-name { font-weight: 500; }
  .slash-item-desc { font-size: 12px; color: var(--muted); }

  /* ── Views ── */
  /* Product Catalog View */
  .view-header {
    padding: 40px 80px 24px;
    max-width: 860px; margin: 0 auto;
  }
  .view-title {
    font-size: 40px; font-weight: 300;
    letter-spacing: -0.020em;
    background: linear-gradient(90deg, var(--iris) 0%, var(--steel) 100%);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 8px;
  }
  .view-subtitle { font-size: 14px; color: var(--muted); }

  .toolbar {
    padding: 0 80px 16px; max-width: 860px; margin: 0 auto;
    display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
  }
  .toolbar-input {
    flex: 1; min-width: 200px; border: 1px solid var(--border);
    border-radius: var(--radius); padding: 6px 10px;
    font-size: 14px; font-family: var(--font); outline: none;
    background: var(--snow); color: var(--ink);
    transition: border-color 0.15s;
  }
  .toolbar-input:focus { border-color: var(--iris); }
  .toolbar-select {
    border: 1px solid var(--border); border-radius: var(--radius);
    padding: 6px 10px; font-size: 14px; font-family: var(--font);
    background: var(--snow); color: var(--ink); cursor: pointer;
    outline: none;
  }

  .data-table {
    width: 100%; max-width: 860px; margin: 0 auto 80px;
    padding: 0 80px;
  }
  .dt-header {
    display: grid; gap: 0;
    background: rgba(83,58,253,0.04);
    border: 1px solid var(--border); border-radius: var(--radius);
    overflow: hidden; margin-bottom: 0;
  }
  .dt-th {
    font-size: 12px; font-weight: 600; color: var(--muted);
    text-transform: uppercase; letter-spacing: 0.06em;
    padding: 8px 12px; display: flex; align-items: center; gap: 4px;
  }
  .dt-row {
    display: grid;
    background: var(--snow);
    border-left: 1px solid var(--border);
    border-right: 1px solid var(--border);
    border-bottom: 1px solid var(--border-light);
    transition: background 0.1s; cursor: pointer;
    animation: rowIn 0.2s ease;
  }
  @keyframes rowIn {
    from { opacity: 0; transform: translateX(-4px); }
    to { opacity: 1; transform: translateX(0); }
  }
  .dt-row:hover { background: rgba(83,58,253,0.03); }
  .dt-row:last-child {
    border-bottom: 1px solid var(--border);
    border-radius: 0 0 var(--radius) var(--radius);
  }
  .dt-cell {
    padding: 10px 12px; font-size: 14px; color: var(--ink);
    display: flex; align-items: center; gap: 8px;
    border-right: 1px solid var(--border-light);
    overflow: hidden;
  }
  .dt-cell:last-child { border-right: none; }
  .dt-badge {
    display: inline-block; padding: 2px 7px; border-radius: 3px;
    font-size: 12px; font-weight: 500; white-space: nowrap;
  }
  .badge-green { background: rgba(138,246,30,0.2); color: #3a8000; }
  .badge-blue { background: rgba(83,58,253,0.12); color: var(--iris); }
  .badge-gray { background: rgba(125,139,164,0.15); color: var(--steel); }
  .dt-action {
    display: inline-flex; align-items: center; gap: 4px;
    padding: 3px 8px; border-radius: 3px; font-size: 12px;
    cursor: pointer; border: 1px solid var(--border);
    background: none; color: var(--steel); font-family: var(--font);
    transition: all 0.15s;
  }
  .dt-action:hover { border-color: var(--iris); color: var(--iris); background: rgba(83,58,253,0.05); }
  .dt-action.primary { background: var(--iris); color: #fff; border-color: var(--iris); }
  .dt-action.primary:hover { background: #4428e0; }

  /* Pagination */
  .dt-footer {
    display: flex; align-items: center; gap: 8px;
    padding: 12px 0; justify-content: space-between;
    font-size: 13px; color: var(--muted);
  }
  .pg-btns { display: flex; gap: 2px; }
  .pg-btn {
    width: 28px; height: 28px; border-radius: var(--radius);
    border: 1px solid var(--border); background: var(--snow);
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    font-size: 13px; font-family: var(--font); color: var(--steel);
    transition: all 0.15s;
  }
  .pg-btn:hover { border-color: var(--iris); color: var(--iris); }
  .pg-btn.active { background: var(--iris); color: #fff; border-color: var(--iris); }
  .pg-btn:disabled { opacity: 0.3; cursor: not-allowed; }

  /* Media library */
  .media-grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
    gap: 12px; max-width: 860px; margin: 0 auto; padding: 0 80px 80px;
    animation: fadeGrid 0.3s ease;
  }
  @keyframes fadeGrid {
    from { opacity: 0; }
    to { opacity: 1; }
  }
  .media-card {
    background: var(--snow); border: 1px solid var(--border);
    border-radius: var(--radius); overflow: hidden; cursor: pointer;
    transition: all 0.2s;
  }
  .media-card:hover {
    border-color: var(--iris);
    box-shadow: 0 0 0 2px rgba(83,58,253,0.12);
    transform: translateY(-2px);
  }
  .media-card.selected {
    border-color: var(--iris);
    box-shadow: 0 0 0 2px rgba(83,58,253,0.25);
  }
  .media-thumb {
    aspect-ratio: 4/3; background: var(--mist);
    display: flex; align-items: center; justify-content: center;
    font-size: 36px; position: relative;
    transition: background 0.2s;
  }
  .media-card:hover .media-thumb { background: #d0dae8; }
  .media-check {
    position: absolute; top: 6px; right: 6px;
    width: 20px; height: 20px; border-radius: 50%;
    background: var(--iris); color: #fff;
    display: none; align-items: center; justify-content: center;
    font-size: 11px;
  }
  .media-card.selected .media-check { display: flex; }
  .media-info { padding: 8px 10px; }
  .media-name { font-size: 12px; font-weight: 500; color: var(--ink); margin-bottom: 2px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .media-meta { font-size: 11px; color: var(--muted); }

  /* Media toolbar */
  .media-filter-tabs {
    display: flex; gap: 0; padding: 0 80px 16px;
    max-width: 860px; margin: 0 auto;
    border-bottom: 1px solid var(--border); margin-bottom: 16px;
  }
  .media-tab {
    padding: 6px 14px; font-size: 13px; cursor: pointer;
    border-bottom: 2px solid transparent; color: var(--muted);
    background: none; border-top: none; border-left: none; border-right: none;
    font-family: var(--font); transition: all 0.15s;
  }
  .media-tab.active { color: var(--iris); border-bottom-color: var(--iris); }
  .media-tab:hover { color: var(--ink); }

  /* Right sidebar for media meta */
  .media-meta-panel {
    width: 220px; flex-shrink: 0;
    background: var(--snow); border-left: 1px solid var(--border);
    padding: 20px 16px; font-size: 13px;
    overflow-y: auto;
  }
  .meta-section-title {
    font-size: 11px; font-weight: 600; color: var(--muted);
    text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 12px;
  }

// ── Tree Node ──
function TreeNode({node, openSet, setOpenSet, activeId, setActiveId, setView}) {
  const isOpen = openSet.has(node.id);
  const toggleOpen = (e) => {
    e.stopPropagation();
    const next = new Set(openSet);
    if (isOpen) next.delete(node.id); else next.add(node.id);
    setOpenSet(next);
  };
  const handleClick = () => {
    setActiveId(node.id);
    if (node.view) setView(node.view);
    else if (!node.expandable) setView('blocks');
    else {
      const next = new Set(openSet);
      if (!isOpen) next.add(node.id); else next.delete(node.id);
      setOpenSet(next);
    }
  };

  return (
    <div>
      <div
        className={`tree-item depth-${node.depth} ${activeId === node.id ? 'active' : ''}`}
        onClick={handleClick}
        style={{paddingRight:4}}
      >
        {node.expandable ? (
          <button className={`tree-toggle ${isOpen ? 'open' : ''}`} onClick={toggleOpen}>▶</button>
        ) : (
          <span style={{width:20}}/>
        )}
        <span className="tree-item-icon" style={{display:'flex',alignItems:'center',justifyContent:'center',width:20,height:28}}>{node.iconChar ? <span style={{background:node.iconBg||'#7d8ba4',color:'#fff',borderRadius:3,fontSize:9,fontWeight:700,padding:'1px 3px',minWidth:14,textAlign:'center'}}>{node.iconChar}</span> : <ph-file weight="regular" style={{fontSize:14}}></ph-file>}</span>
        <span className="tree-item-label">{node.label}</span>
        <button className="tree-new-btn" onClick={e => e.stopPropagation()}>+</button>
      </div>
      {isOpen && node.children && (
        <div className="tree-children">
          {node.children.map(child => (
            <TreeNode key={child.id} node={child}
              openSet={openSet} setOpenSet={setOpenSet}
              activeId={activeId} setActiveId={setActiveId}
              setView={setView}
            />
          ))}
        </div>
      )}
    </div>
  );
}

          <h3 className="block-h3">콘텐츠 편집 바로 가기</h3>
        </div>

        {/* Block: buttons row */}
        <div className="block" style={{display:'flex',gap:8,flexWrap:'wrap',padding:'4px 0 8px'}}>
          <div className="block-handle"><button className="block-dot" onClick={(e) => {e.preventDefault();}} title="블록 이동">⠿</button></div>
          <button className="topbar-btn primary" onClick={() => setView('product-mgmt')}>
            제품 카탈로그 관리
          </button>
          <button className="topbar-btn primary" onClick={() => setView('notice-mgmt')}>
            공지 게시판 CRUD
          </button>
          <button className="topbar-btn" onClick={() => setView('media')}>
            미디어 라이브러리
          </button>
        </div>

        {/* Block: divider */}
        <div className="block">
          <div className="block-handle"><button className="block-dot" onClick={(e) => {e.preventDefault();}} title="블록 이동">⠿</button></div>
          <div className="block-divider"/>
        </div>

        {/* Block: callout warning */}
        <div className="block">
          <div className="block-handle"><button className="block-dot" onClick={(e) => {e.preventDefault();}} title="블록 이동">⠿</button></div>
          <div className="block-callout warning">
            <span className="callout-icon"><ph-warning size="18" weight="fill" color="#f59e0b"></ph-warning></span>
            <div className="callout-body">
              <b>블록 편집 팁:</b> 새 줄에 <code style={{background:'rgba(255,165,0,0.1)',border:'1px solid rgba(255,165,0,0.2)',borderRadius:3,padding:'1px 5px',fontSize:13,color:'#b45309',fontFamily:'Menlo,monospace'}}>/</code>를 입력하면 블록 타입을 선택할 수 있습니다.
            </div>
          </div>
        </div>

        {/* Slash menu demo */}
        <div className="block" style={{position:'relative',paddingBottom:320}}>
          <div className="block-handle"><button className="block-dot" onClick={(e) => {e.preventDefault();}} title="블록 이동">⠿</button></div>
          <p className="block-text" style={{color:'var(--muted)'}}>
            블록 에디터 — 슬래시 커맨드(/) 메뉴 미리보기:
          </p>
          <div className="slash-menu" data-slash-menu style={{position:'absolute',left:20,top:36}}>
            <div className="slash-menu-label">기본 블록</div>
            {SLASH_ITEMS.map((item,i) => (
              <div key={item.type} className={`slash-item ${i===slashIdx ? 'selected' : ''}`}
                onClick={() => setSlashIdx(i)}>
                <div className="slash-item-icon">{item.icon}</div>
                <div>
                  <div className="slash-item-name">{item.name}</div>
                  <div className="slash-item-desc">{item.desc}</div>
                </div>
              </div>
            ))}
          </div>
        </div>
      </div>
    </div>
  );
}

// ── Product Catalog View ──
function ProductMgmtView() {
  const [search, setSearch] = useState('');
  const [catFilter, setCatFilter] = useState('전체');
  const [page, setPage] = useState(1);
  const [editModal, setEditModal] = useState(null);

  const cats = ['전체','공기압 장비','계측기기','동력 전달','자동화 장비','상태 감시','IIoT 솔루션'];
  const filtered = PRODUCTS.filter(p =>
    (catFilter === '전체' || p.cat === catFilter) &&
    (!search || p.name.includes(search) || p.cat.includes(search))
  );

  const cols = ['3fr','1.2fr','1fr','1.2fr','0.8fr','1fr'];

  return (
    <div className="content-scroll">
      <div className="view-header">
        <h1 className="view-title">제품 카탈로그 관리</h1>
        <p className="view-subtitle">제품 정보를 등록·수정·삭제합니다. 변경사항은 홈페이지에 즉시 반영됩니다.</p>
      </div>
      <div className="toolbar">
        <input className="toolbar-input" placeholder="제품 검색..."
          value={search} onChange={e => setSearch(e.target.value)} />
        <select className="toolbar-select" value={catFilter} onChange={e => setCatFilter(e.target.value)}>
          {cats.map(c => <option key={c}>{c}</option>)}
        </select>
        <button className="topbar-btn primary" onClick={() => alert('새 제품 등록 폼을 구현합니다.')}>
          + 새 제품 등록
        </button>
      </div>
      <div className="data-table">
        <div className="dt-header" style={{display:'grid',gridTemplateColumns:cols.join(' ')}}>
          {['제품명','카테고리','가격','상태','최종수정','작업'].map(h => (
            <div key={h} className="dt-th">{h}</div>
          ))}
        </div>
        {filtered.map((p,i) => (
          <div key={p.id} className="dt-row" style={{gridTemplateColumns:cols.join(' '),animationDelay:`${i*0.05}s`,animationFillMode:'both'}}>
            <div className="dt-cell">
              <ph-package size="16" weight="duotone" color="#533afd"></ph-package>
              <span style={{fontWeight:500}}>{p.name}</span>
            </div>
            <div className="dt-cell">{p.cat}</div>
            <div className="dt-cell">₩{p.price}</div>
            <div className="dt-cell">{statusBadge(p.status)}</div>
            <div className="dt-cell" style={{color:'var(--muted)'}}>{p.modified}</div>
            <div className="dt-cell" style={{gap:4,flexWrap:'wrap'}}>
              <button className="dt-action" onClick={() => setEditModal(p)}>수정</button>
              <button className="dt-action" onClick={() => alert(`${p.name} 미리보기를 표시합니다.`)}>미리보기</button>
            </div>
          </div>
        ))}
        <div className="dt-footer">
          <span>총 {filtered.length}개 제품</span>
          <div className="pg-btns">
            <button className="pg-btn" disabled={page===1} onClick={() => setPage(p=>p-1)}>‹</button>
            {[1,2].map(p => <button key={p} className={`pg-btn ${page===p?'active':''}`} onClick={() => setPage(p)}>{p}</button>)}
            <button className="pg-btn" disabled={page===2} onClick={() => setPage(p=>p+1)}>›</button>
          </div>
        </div>
      </div>

      {/* Edit mini modal overlay */}
      {editModal && (
        <div style={{position:'fixed',inset:0,background:'rgba(6,27,49,0.4)',zIndex:200,display:'flex',alignItems:'center',justifyContent:'center'}}
          onClick={() => setEditModal(null)}>
          <div style={{background:'var(--snow)',border:'1px solid var(--border)',borderRadius:4,padding:32,minWidth:360,maxWidth:480}}
            onClick={e => e.stopPropagation()}>
            <h3 style={{fontSize:20,fontWeight:300,letterSpacing:'-0.018em',marginBottom:20,color:'var(--ink)'}}>
              {editModal.name} 수정
            </h3>
            <div className="form-row">
              <div className="form-label">제품명</div>
              <input className="form-input" defaultValue={editModal.name} />
            </div>
            <div className="form-row">
              <div className="form-label">가격 (원)</div>
              <input className="form-input" defaultValue={editModal.price.replace(/,/g,'')} />
            </div>
            <div className="form-row">
              <div className="form-label">상태</div>
              <select className="form-select" defaultValue={editModal.status}>
                <option value="published">게시됨</option>
                <option value="draft">초안</option>
                <option value="review">검토중</option>
              </select>
            </div>
            <div style={{display:'flex',gap:8,justifyContent:'flex-end',marginTop:16}}>
              <button className="topbar-btn" onClick={() => setEditModal(null)}>취소</button>
              <button className="topbar-btn primary" onClick={() => { alert(`${editModal.name} 저장 완료`); setEditModal(null); }}>저장</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// ── Notice CRUD View ──
function NoticeMgmtView() {
  const [search, setSearch] = useState('');
  const [showForm, setShowForm] = useState(false);
  const [formData, setFormData] = useState({title:'',type:'notice',body:''});
  const [toastMsg, setToastMsg] = useState('');
  const [noticePage, setNoticePage] = useState(1);
  const showToast = (msg) => { setToastMsg(msg); setTimeout(() => setToastMsg(''), 3000); };

  const filtered = NOTICES.filter(n => !search || n.title.includes(search));

  return (
    <div className="content-scroll">
      <div className="view-header">
        <h1 className="view-title">공지 게시판 CRUD</h1>
        <p className="view-subtitle">공지사항을 작성·수정·게시합니다.</p>
      </div>
      <div className="toolbar">
        <input className="toolbar-input" placeholder="공지 검색..."
          value={search} onChange={e => setSearch(e.target.value)} />
        <button className="topbar-btn primary" onClick={() => setShowForm(!showForm)}>
          {showForm ? '닫기' : '+ 새 공지 작성'}
        </button>
      </div>

      {showForm && (
        <div style={{maxWidth:860,margin:'0 auto',padding:'0 80px 24px'}}>
          <div className="notice-form-card">
            <div className="form-row">
              <div className="form-label">제목</div>
              <input className="form-input" placeholder="공지 제목을 입력하세요"
                value={formData.title} onChange={e => setFormData(f => ({...f,title:e.target.value}))} />
            </div>
            <div className="form-row">
              <div className="form-label">유형</div>
              <select className="form-select" value={formData.type} onChange={e => setFormData(f => ({...f,type:e.target.value}))}>
                <option value="notice">공지</option>
                <option value="new">신규</option>
              </select>
            </div>
            <div className="form-row">
              <div className="form-label">내용</div>
              <textarea className="form-input" placeholder="공지 내용을 입력하세요..."
                value={formData.body} onChange={e => setFormData(f => ({...f,body:e.target.value}))} />
            </div>
            <div style={{display:'flex',gap:8,justifyContent:'flex-end'}}>
              <button className="topbar-btn" onClick={() => setShowForm(false)}>취소</button>
              <button className="topbar-btn" onClick={() => showToast('임시저장 완료')}>임시저장</button>
              <button className="topbar-btn primary" onClick={() => { showToast('공지가 게시되었습니다.'); setShowForm(false); setFormData({title:'',type:'notice',body:''}); }}>게시</button>
            </div>
          </div>
        </div>
      )}

      <div className="data-table">
        <div className="dt-header" style={{display:'grid',gridTemplateColumns:'0.5fr 3fr 0.8fr 1fr 0.7fr 1fr'}}>
          {['번호','제목','유형','상태','조회수','작업'].map(h => <div key={h} className="dt-th">{h}</div>)}
        </div>
        {filtered.map((n,i) => (
          <div key={n.id} className="dt-row" style={{gridTemplateColumns:'0.5fr 3fr 0.8fr 1fr 0.7fr 1fr',animationDelay:`${i*0.05}s`,animationFillMode:'both'}}>
            <div className="dt-cell" style={{color:'var(--muted)'}}>{n.id}</div>
            <div className="dt-cell" style={{fontWeight:500}}>{n.title}</div>
            <div className="dt-cell">
              <span className={`dt-badge ${n.type==='new' ? 'badge-blue' : 'badge-gray'}`}>
                {n.type==='new' ? '신규' : '공지'}
              </span>
            </div>
            <div className="dt-cell">{statusBadge(n.status)}</div>
            <div className="dt-cell" style={{color:'var(--muted)'}}>{n.views}</div>
            <div className="dt-cell" style={{gap:4}}>
              <button className="dt-action" onClick={() => alert(`${n.title} 편집`)}>수정</button>
              <button className="dt-action" onClick={() => alert(`${n.title} 삭제`)}>삭제</button>
            </div>
          </div>
        ))}
        <div className="dt-footer">
          <span>총 {filtered.length}건</span>
          <div className="pg-btns">
            {[1,2,3].map(p => <button key={p} className={`pg-btn ${noticePage===p?'active':''}`} onClick={() => setNoticePage(p)}>{p}</button>)}
          </div>
        </div>
      </div>
      {toastMsg && (
        <div style={{position:'fixed',bottom:28,right:28,background:'#1a1a2e',color:'#fff',padding:'10px 18px',borderRadius:4,fontSize:14,fontWeight:500,boxShadow:'0 4px 24px rgba(0,0,0,0.18)',zIndex:9999,display:'flex',alignItems:'center',gap:8}}>
          <ph-check-circle size="16" color="#65d91a" weight="fill"></ph-check-circle>
          {toastMsg}
        </div>
      )}
    </div>
  );
}

// ── Media Library View ──
function MediaView() {
  const [mediaTab, setMediaTab] = useState('전체');
  const [selected, setSelected] = useState(null);

  const tabs = ['전체','이미지','문서','영상'];
  const filtered = MEDIA.filter(m => mediaTab === '전체' || (mediaTab==='이미지'&&m.type==='image') || (mediaTab==='문서'&&m.type==='document') || (mediaTab==='영상'&&m.type==='video'));

  return (
    <div className="content-scroll">
      <div className="view-header">
        <h1 className="view-title">미디어 라이브러리</h1>
        <p className="view-subtitle">이미지, 문서, 영상 파일을 한 곳에서 관리합니다.</p>
      </div>

      <div style={{display:'flex',alignItems:'center',gap:8,padding:'0 80px 0',maxWidth:860,margin:'0 auto 0'}}>
        <button className="topbar-btn primary" onClick={() => alert('파일 업로드 다이얼로그를 표시합니다.')}>
          ↑ 파일 업로드
        </button>
        <button className="topbar-btn" onClick={() => alert('새 폴더를 생성합니다.')}>
          + 새 폴더
        </button>
      </div>

      <div className="media-filter-tabs">
        {tabs.map(t => (
          <button key={t} className={`media-tab ${mediaTab===t?'active':''}`}
            onClick={() => setMediaTab(t)}>{t}</button>
        ))}
      </div>

      <div style={{display:'flex',flex:1}}>
        <div style={{flex:1,overflowY:'auto'}}>
          <div className="media-grid">
            {filtered.map(m => (
              <div key={m.id} className={`media-card ${selected?.id===m.id?'selected':''}`}
                onClick={() => setSelected(selected?.id===m.id ? null : m)}>
                <div className="media-thumb">
                  <span style={{display:'flex',flexDirection:'column',alignItems:'center',gap:4}}><span style={{fontSize:11,fontWeight:700,padding:'2px 6px',borderRadius:3,background:m.type==='image'?'#3a80d0':m.type==='document'?'#d07030':'#7030d0',color:'#fff'}}>{m.type==='image'?'IMG':m.type==='document'?'PDF':'VID'}</span></span>
                  <div className="media-check" style={{fontSize:12,fontWeight:700}}>+</div>
                </div>
                <div className="media-info">
                  <div className="media-name">{m.name}</div>
                  <div className="media-meta">{m.size}</div>
                </div>
              </div>
            ))}
          </div>
        </div>

        {selected && (
          <div className="media-meta-panel">
            <div className="meta-section-title">파일 정보</div>
            <div style={{fontSize:36,textAlign:'center',margin:'12px 0',padding:16,background:'var(--mist)',borderRadius:4}}>{selected.emoji}</div>
            <div className="meta-field">
              <div className="meta-field-key">파일명</div>
              <div className="meta-field-val" style={{wordBreak:'break-all'}}>{selected.name}</div>
            </div>
            <div className="meta-field">
              <div className="meta-field-key">크기</div>
              <div className="meta-field-val">{selected.size}</div>
            </div>
            <div className="meta-field">
              <div className="meta-field-key">유형</div>
              <div className="meta-field-val">{selected.type}</div>
            </div>
            <div className="meta-field">
              <div className="meta-field-key">수정일</div>
              <div className="meta-field-val">{selected.modified}</div>
            </div>
            <div className="meta-field">
              <div className="meta-field-key">태그</div>
              <div>{selected.tags.map(t => <span key={t} className="meta-tag">{t}</span>)}</div>
            </div>
            <div style={{display:'flex',flexDirection:'column',gap:6,marginTop:16}}>
              <button className="topbar-btn primary" style={{width:'100%',justifyContent:'center'}} onClick={() => alert(`${selected.name} 삽입`)}>
                콘텐츠에 삽입
              </button>
              <button className="topbar-btn" style={{width:'100%',justifyContent:'center'}} onClick={() => alert(`${selected.name} 다운로드`)}>
                다운로드
              </button>
              <button className="topbar-btn" style={{width:'100%',justifyContent:'center',color:'#dc2626',borderColor:'#dc2626'}} onClick={() => alert(`${selected.name} 삭제 확인`)}>
                삭제
              </button>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

// ── App ──
function App() {
  const [view, setView] = useState('blocks');
  const [activeId, setActiveId] = useState('root');
  const [openSet, setOpenSet] = useState(new Set(['root','pages','products','settings','i18n']));

  const breadcrumbMap = {
    'blocks': ['기업 홍보 사이트'],
    'product-mgmt': ['기업 홍보 사이트', '페이지 관리', '제품 카탈로그 관리'],
    'notice-mgmt': ['기업 홍보 사이트', '페이지 관리', '공지 게시판 CRUD'],
    'media': ['기업 홍보 사이트', '미디어 라이브러리'],
  };
  const crumbs = breadcrumbMap[view] || ['기업 홍보 사이트'];

  const handleViewChange = (v) => {
    setView(v);
    if (v==='product-mgmt') setActiveId('products');
    else if (v==='notice-mgmt') setActiveId('notice');
    else if (v==='media') setActiveId('media');
    else setActiveId('root');
  };

  return (
    <div id="app">
      {/* Sidebar */}
      <div className="sidebar">
        <div className="sidebar-top">
          <div className="workspace-switcher">
            <div className="ws-icon">ST</div>
            <span className="ws-name">샘플테크 관리자</span>
            <span style={{color:'var(--muted)',fontSize:12}}>▾</span>
          </div>
          <button className="sidebar-action" onClick={() => alert('빠른 검색을 엽니다.')}>
            <ph-magnifying-glass size="14"></ph-magnifying-glass> <span style={{color:'var(--muted)',marginLeft:4}}>검색...</span>
            <span style={{marginLeft:'auto',fontSize:11,color:'var(--muted)'}}>⌘K</span>
          </button>
          <button className="sidebar-action" onClick={() => handleViewChange('blocks')}>
            <ph-house size="14"></ph-house> <span style={{marginLeft:4}}>홈</span>
          </button>
          <button className="sidebar-action" onClick={() => alert('설정을 엽니다.')}>
            <ph-gear size="14"></ph-gear> <span style={{marginLeft:4}}>설정</span>
          </button>
          <div className="sidebar-divider"/>
          <div className="tree-section-label">페이지</div>
        </div>
        <div className="tree-section">
          {TREE.map(node => (
            <TreeNode key={node.id} node={node}
              openSet={openSet} setOpenSet={setOpenSet}
              activeId={activeId} setActiveId={setActiveId}
              setView={handleViewChange}
            />
          ))}
          <div className="sidebar-divider"/>
          <button className="sidebar-action depth-0" onClick={() => alert('새 페이지를 추가합니다.')}>
            ＋ <span style={{color:'var(--muted)'}}>새 페이지</span>
          </button>
        </div>

        {/* Bottom */}
        <div style={{padding:'8px 12px',borderTop:'1px solid var(--border)'}}>
          <div className="workspace-switcher" style={{marginBottom:0}}>
            <div className="avatar">김</div>
            <div>
              <div style={{fontSize:13,fontWeight:500}}>김민준</div>
              <div style={{fontSize:11,color:'var(--muted)'}}>관리자</div>
            </div>
          </div>
        </div>
      </div>

      {/* Main area */}
      <div className="main-area">
        <div className="stripe-spectrum-strip" />
        {/* Topbar */}
        <div className="topbar">
          <div className="breadcrumb">
            {crumbs.map((c,i) => (
              <span key={i}>
                {i>0 && <span className="breadcrumb-sep">›</span>}
                <span className={i===crumbs.length-1 ? 'last' : ''}
                  style={{cursor: i<crumbs.length-1 ? 'pointer' : 'default'}}
                  onClick={() => i<crumbs.length-1 && handleViewChange('blocks')}
                >{c}</span>
              </span>
            ))}
          </div>
          <div className="topbar-spacer"/>
          <div className="topbar-share">
            <ph-arrows-clockwise size="14" style={{animation:'spin360 2s linear infinite',color:'var(--iris)'}}></ph-arrows-clockwise>
            <div className="avatar" style={{width:24,height:24,fontSize:9}}>박</div>
            <div className="avatar" style={{width:24,height:24,fontSize:9,marginLeft:-6}}>이</div>
            <span style={{marginLeft:4,fontSize:12}}>2명 편집 중</span>
          </div>
          <button className="topbar-btn" onClick={() => alert('편집 이력을 표시합니다.')}>편집 이력</button>
          <button className="topbar-btn primary" onClick={() => alert('변경사항이 게시됩니다.')}>게시</button>
        </div>

        {/* Content by view */}
        {view === 'blocks' && <BlocksView setView={handleViewChange} />}
        {view === 'product-mgmt' && <ProductMgmtView />}
        {view === 'notice-mgmt' && <NoticeMgmtView />}
        {view === 'media' && <MediaView />}
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
<div id="root"></div>
</body>
</html>
