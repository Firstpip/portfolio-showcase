    const ICONS = {
      zap:'<polyline points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/>',

      smartphone:'<rect x="5" y="2" width="14" height="20" rx="2" ry="2"/><line x1="12" y1="18" x2="12.01" y2="18"/>',
      'layout-dashboard':'<rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/>',
      'check-circle':'<path d="M22 11.08V12a10 10 0 11-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/>',
      phone:'<path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07A19.5 19.5 0 013.07 8.63a19.79 19.79 0 01-3.07-8.64A2 2 0 012 0h3a2 2 0 012 1.72c.127.96.361 1.903.7 2.81a2 2 0 01-.45 2.11L6.09 7.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0122 14.9z"/>',
      'message-circle':'<path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/>',
      mail:'<path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/>',
      'map-pin':'<path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/>',
    };
    window.lucide = {
      createIcons: function() {
        document.querySelectorAll('i[data-lucide]').forEach(function(el) {
          const name = el.getAttribute('data-lucide');
          const d = ICONS[name];
          if (!d) return;
          const svg = document.createElementNS('http://www.w3.org/2000/svg','svg');
          const w = el.style.width || '24px', h = el.style.height || '24px';
          svg.setAttribute('xmlns','http://www.w3.org/2000/svg');
          svg.setAttribute('width', w); svg.setAttribute('height', h);
          svg.setAttribute('viewBox','0 0 24 24');
          svg.setAttribute('fill','none');
          svg.setAttribute('stroke', el.style.color || 'currentColor');
          svg.setAttribute('stroke-width','2');
          svg.setAttribute('stroke-linecap','round');
          svg.setAttribute('stroke-linejoin','round');
          svg.innerHTML = d;
          el.replaceWith(svg);
        });
      }
    };
  })();

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Pretendard', 'DM Sans', system-ui, sans-serif;

      line-height: 1.5; -webkit-font-smoothing: antialiased;
    }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(28px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes slideInRight {
      from { opacity: 0; transform: translateX(36px); }
      to   { opacity: 1; transform: translateX(0); }
    }
    @keyframes pulseGlow {
      0%, 100% { box-shadow: 0 0 0 0 rgba(255,104,44,.45); }
      50%       { box-shadow: 0 0 0 14px rgba(255,104,44,0); }
    }
    @keyframes resultReveal {
      from { opacity: 0; transform: scale(.95) translateY(8px); }
      to   { opacity: 1; transform: scale(1) translateY(0); }
    }
    @keyframes cardFloat {
      0%, 100% { transform: translateY(0); }
      50%       { transform: translateY(-6px); }
    }
    @keyframes borderFlicker {
      0%, 100% { border-color: #ff682c; }
      50%       { border-color: #ffb08a; }
    }
    @keyframes staggerIn {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes traceDot {
      0%   { offset-distance: 0%;   opacity: 1; }
      90%  { opacity: 1; }
      100% { offset-distance: 100%; opacity: 0; }
    }
    @keyframes orbitPulse {
      0%, 100% { r: 7; opacity: .9; }
      50%       { r: 9; opacity: .5; }
    }

    .topnav {
      position: sticky; top: 0; z-index: 200;
      background: rgba(255,255,255,.97); backdrop-filter: blur(8px);

      display: flex; align-items: center; gap: 0;

      font-size: 18px; font-weight: 800; color: #202020;

    .topnav-logo .dot { color: #ff682c; }
    .nav-tabs { display: flex; gap: 4px; flex: 1; }
    .nav-tab {

      background: transparent; color: #828282;
      font-size: 14px; font-family: inherit; font-weight: 500;
      cursor: pointer; transition: all .2s;

    .nav-cta {
      padding: 9px 22px; border-radius: 20px; border: none;
      background: #202020; color: #fff;
      font-size: 13px; font-family: inherit; font-weight: 600;

    .hero-wrap { background: #efefef; padding: 72px 48px 64px; }

    .form-row { margin-bottom: 16px; }
    .form-label { display: block; font-size: 12px; font-weight: 600; color: #828282; letter-spacing: .04em; margin-bottom: 7px; text-transform: uppercase; }
    .form-select {

    .calc-btn:hover { background: #e55a20; }
    .calc-btn:disabled { background: #e0e0e0; color: #b0b0b0; cursor: not-allowed; }
    .rate-result {

    .rate-result-route { font-size: 11px; color: #828282; margin-bottom: 6px; letter-spacing: .04em; }
    .rate-result-amount { font-size: 36px; font-weight: 800; color: #ff682c; letter-spacing: -0.03em; }
    .rate-result-suffix { font-size: 16px; font-weight: 400; color: #828282; margin-left: 4px; }
    .rate-result-note { font-size: 11px; color: #828282; margin-top: 8px; line-height: 1.5; }
    .rate-empty {

      text-align: center; border: 2px dashed #e8e8e8;
    }
    .rate-empty-text { font-size: 13px; color: #b0b0b0; }

    /* Features */
    .features-wrap { background: #fff; padding: 80px 48px; }
    .features-inner { max-width: 1200px; margin: 0 auto; }
    .section-eyebrow { font-size: 12px; font-weight: 600; color: #ff682c; letter-spacing: .1em; text-transform: uppercase; margin-bottom: 12px; }

    .feature-desc { font-size: 13px; color: #828282; line-height: 1.65; }

    /* Process strip */
    .process-strip { background: #202020; padding: 40px 48px; display: flex; align-items: center; justify-content: center; gap: 0; }

    .step-num { width: 24px; height: 24px; border-radius: 50%; background: #ff682c; color: #fff; font-size: 11px; font-weight: 800; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .process-arrow { color: #828282; font-size: 18px; padding: 0 8px; }

    .cta-wrap { padding: 80px 48px; background: #efefef; text-align: center; }
    .cta-title { font-size: 40px; font-weight: 800; color: #202020; letter-spacing: -0.8px; margin-bottom: 16px; }
    .cta-sub { font-size: 16px; color: #4d4d4d; margin-bottom: 36px; }

    /* Inquiry form */
    .inquiry-wrap { padding: 72px 48px; background: #efefef; }
    .inquiry-inner { max-width: 860px; margin: 0 auto; }
    .inquiry-card { background: #fff; border-radius: 8px; border: 1px solid #e8e8e8; padding: 52px; }
    .inquiry-title { font-size: 36px; font-weight: 800; color: #202020; letter-spacing: -0.72px; margin-bottom: 8px; }
    .inquiry-sub { font-size: 15px; color: #828282; margin-bottom: 40px; }
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px 24px; }
    .form-group { display: flex; flex-direction: column; gap: 7px; }
    .form-group.full { grid-column: 1 / -1; }
    .form-input {
      padding: 12px 14px; border-radius: 8px;

    .consent-row { display: flex; align-items: flex-start; gap: 10px; }
    .consent-check { width: 16px; height: 16px; border-radius: 4px; cursor: pointer; accent-color: #ff682c; flex-shrink: 0; margin-top: 2px; }
    .consent-text { font-size: 13px; color: #828282; line-height: 1.55; }
    .consent-link { color: #ff682c; text-decoration: underline; cursor: pointer; }
    .submit-btn {
      width: 100%; padding: 15px; border-radius: 20px; border: none;
      background: #ff682c; color: #fff;
      font-size: 15px; font-family: inherit; font-weight: 700;
      cursor: pointer; margin-top: 24px; transition: all .2s;

    .submit-btn:hover { background: #e55a20; transform: translateY(-1px); }
    .success-state { text-align: center; padding: 60px 0; }
    .success-icon { width: 72px; height: 72px; border-radius: 50%; background: rgba(34,197,94,.12); display: flex; align-items: center; justify-content: center; margin: 0 auto 24px; }

    .board-wrap { padding: 72px 48px; background: #efefef; }
    .board-inner { max-width: 860px; margin: 0 auto; }

    .n-info { background: #f0f0f0; color: #828282; }
    .n-title { flex: 1; font-size: 14px; font-weight: 500; color: #202020; }
    .n-date { font-size: 12px; color: #b0b0b0; flex-shrink: 0; }
    .notice-detail { background: #fff; border-radius: 8px; border: 1px solid #e8e8e8; padding: 36px; margin-bottom: 44px; }
    .back-btn {

    .back-btn:hover { color: #202020; }
    .faq-section-title { font-size: 24px; font-weight: 700; color: #202020; margin-bottom: 20px; letter-spacing: -0.02em; }

    .faq-chevron.open { transform: rotate(180deg); }

    /* Contact */
    .contact-wrap { padding: 72px 48px; background: #efefef; }
    .contact-inner { max-width: 860px; margin: 0 auto; }
    .contact-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 28px; }
    .contact-card { background: #fff; border-radius: 8px; border: 1px solid #e8e8e8; padding: 30px; }

    .act-kakao:hover { background: #e6d000; }
    .act-outline { background: transparent; color: #4d4d4d; border: 1.5px solid #d8d8d8; }
    .act-outline:hover { background: #f5f5f5; }
    .chat-dark { background: #202020; border-radius: 8px; padding: 36px; }
    .chat-dark-title { font-size: 22px; font-weight: 700; color: #fff; margin-bottom: 8px; }
    .chat-dark-sub { font-size: 14px; color: #828282; margin-bottom: 24px; }
    .chat-row { display: flex; gap: 12px; }
    .chat-btn-k {
      flex: 1; padding: 14px; border-radius: 20px; border: none;
      background: #FEE500; color: #3A1D1D;
      font-size: 14px; font-family: inherit; font-weight: 700;
      cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px;
      animation: pulseGlow 2.5s infinite; transition: transform .2s;

    .chat-btn-k:hover { transform: translateY(-2px); }

    .floating-group { position: fixed; bottom: 32px; right: 32px; display: flex; flex-direction: column; gap: 12px; z-index: 999; }

      width: 56px; height: 56px; border-radius: 50%; border: none;

    .float-k { background: #FEE500; animation: pulseGlow 3s infinite; }

    /* Hero SVG art */
    .hero-network-svg .route-line { stroke: #e8e8e8; stroke-width: 1.5; }

    .footer { background: #202020; color: #828282; padding: 32px 48px; display: flex; justify-content: space-between; align-items: center; font-size: 13px; }

<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef } = React;

/* CountUp hook */
function useCountUp(target, duration = 900) {
  const [count, setCount] = React.useState(0);
  React.useEffect(() => {
    const start = Date.now();
    const t = setInterval(() => {
      const p = Math.min((Date.now() - start) / duration, 1);
      const ease = p < .5 ? 2*p*p : -1+(4-2*p)*p;
      setCount(Math.floor(ease * target));
      if (p >= 1) { setCount(target); clearInterval(t); }
    }, 16);
    return () => clearInterval(t);
  }, [target, duration]);
  return count;
}

/* Logistics Network SVG art */
function LogisticsNetSvg() {
  const nodes = [
    { id: 'SL', label: '서울', x: 82, y: 52 },
    { id: 'IC', label: '인천', x: 48, y: 78 },
    { id: 'SW', label: '수원', x: 86, y: 98 },
    { id: 'DJ', label: '대전', x: 128, y: 152 },
    { id: 'GJ', label: '광주', x: 88, y: 215 },
    { id: 'DG', label: '대구', x: 192, y: 190 },
    { id: 'US', label: '울산', x: 226, y: 168 },
    { id: 'BS', label: '부산', x: 228, y: 218 },
  ];
  const edges = [
    ['SL','BS','active'], ['SL','DJ',null], ['SL','IC',null],
    ['SL','SW',null], ['DJ','GJ',null], ['DJ','DG',null],
    ['DG','BS','active'], ['US','BS',null],
  ];
  const activeEdges = edges.filter(e => e[2] === 'active');

  const pathD = (a, b) => {
    const na = nodes.find(n => n.id === a), nb = nodes.find(n => n.id === b);
    return `M${na.x},${na.y} L${nb.x},${nb.y}`;
  };

  return (
    <div style={{ background: '#fff', borderRadius: 8, border: '1px solid #e8e8e8', padding: '16px 20px 12px', marginBottom: 16 }}>
      <div style={{ fontSize: 11, color: '#828282', letterSpacing: '.06em', textTransform: 'uppercase', fontWeight: 600, marginBottom: 10 }}>전국 운송 네트워크</div>
      <svg viewBox="0 0 280 260" xmlns="http://www.w3.org/2000/svg" className="hero-network-svg" style={{ width: '100%', height: 160 }}>
        <defs>
          <linearGradient id="netGrad" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0%" stopColor="#ff682c" stopOpacity=".08"/>
            <stop offset="100%" stopColor="#efefef" stopOpacity="0"/>
          </linearGradient>
        </defs>
        <rect width="280" height="260" fill="url(#netGrad)" rx="4"/>
        {edges.map(([a, b, t], i) => (
          <line key={i} x1={nodes.find(n=>n.id===a).x} y1={nodes.find(n=>n.id===a).y}
            x2={nodes.find(n=>n.id===b).x} y2={nodes.find(n=>n.id===b).y}
            className={t === 'active' ? 'active-route' : 'route-line'} />
        ))}
        {activeEdges.map(([a, b], i) => (
          <circle key={i} r="5" fill="#ff682c" opacity=".9">
            <animateMotion dur={`${2.5 + i*0.8}s`} repeatCount="indefinite" path={pathD(a,b)}/>
          </circle>
        ))}
        {nodes.map(n => (
          <g key={n.id}>
            <circle cx={n.x} cy={n.y} r="6" className={['SL','BS'].includes(n.id) ? 'city-dot active' : 'city-dot'} />
            <text x={n.x + 8} y={n.y + 4} fontSize="9" fill="#828282" fontFamily="Pretendard,sans-serif">{n.label}</text>
          </g>
        ))}
      </svg>
    </div>
  );
}

function getRate(from, to, vehicle) {
  const key = `${from}|${to}`;
  const idx = VEHICLES.indexOf(vehicle);
  const row = RATE_MAP[key];
  if (!row || idx < 0) return null;
  return row[idx];
}

            <span className={`n-badge ${notice.badge === 'new' ? 'n-new' : 'n-info'}`} style={{ display: 'inline-block', marginBottom: 14 }}>

            </div>
          </div>
        ) : (
          <div className="notice-list" style={{ marginBottom: 48 }}>
            {notices.map(n => (
              <div key={n.id} className="notice-item" onClick={() => setNotice(n)}>
                <span className={`n-badge ${n.badge === 'new' ? 'n-new' : 'n-info'}`}>{n.badge === 'new' ? '신규' : '공지'}</span>
                <span className="n-title">{n.title}</span>
                <span className="n-date">{n.date}</span>
              </div>
            ))}
          </div>
        )}

        <div className="faq-section-title">자주 묻는 질문</div>
        {faqs.map((f, i) => (
          <div key={i} className="faq-item">
            <button className="faq-q" onClick={() => setOpenFaq(openFaq === i ? null : i)}>
              <span>Q. {f.q}</span>
              <span className={`faq-chevron${openFaq === i ? ' open' : ''}`}>▼</span>
            </button>
            {openFaq === i && <div className="faq-a">A. {f.a}</div>}
          </div>
        ))}
      </div>
    </div>
  );
}
