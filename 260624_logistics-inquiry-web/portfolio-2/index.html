<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>물류 운영 관제 플랫폼 — 구현 데모</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
  <script src="https://unpkg.com/@phosphor-icons/web@2.1.1"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone@7.23.5/babel.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      font-family: 'Pretendard', system-ui, sans-serif;
      background: #ffffff; color: #111111;
      -webkit-font-smoothing: antialiased; overflow: hidden;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes cardDropIn {
      from { opacity: 0; transform: translateY(10px) scale(.98); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }
    @keyframes progressFill {
      from { width: 0; }
      to   { width: var(--tw); }
    }
    @keyframes statusBlink {
      0%, 100% { opacity: 1; }
      50%       { opacity: .4; }
    }
    @keyframes gradientShift {
      0%   { background-position: 0% 50%; }
      50%  { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }
    @keyframes sparkDraw {
      from { stroke-dashoffset: 400; }
      to   { stroke-dashoffset: 0; }
    }
    @keyframes countUp {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .card { animation: cardDropIn .35s ease both; }
    .card:hover { box-shadow: 0 6px 20px rgba(0,0,0,.12); transform: translateY(-1px); transition: all .2s; }

    /* Layout */
    .shell { display: flex; height: 100vh; overflow: hidden; }

    /* Sidebar */
    .sidebar {
      width: 240px; flex-shrink: 0;
      background: #111111;
      display: flex; flex-direction: column;
      overflow-y: auto;
    }
    .sidebar-logo {
      padding: 20px 24px 18px;
      border-bottom: 1px solid rgba(255,255,255,.12);
    }
    .logo-wordmark { font-size: 16px; font-weight: 800; color: #fff; letter-spacing: -0.03em; }
    .logo-sub { font-size: 11px; color: rgba(255,255,255,.5); margin-top: 2px; letter-spacing: .04em; }
    .sidebar-section { padding: 16px 12px 8px; }
    .sidebar-section-label { font-size: 10px; font-weight: 600; color: rgba(255,255,255,.4); letter-spacing: .08em; text-transform: uppercase; padding: 0 12px; margin-bottom: 4px; }
    .nav-item {
      width: 100%; display: flex; align-items: center; gap: 10px;
      padding: 10px 12px; border-radius: 8px; border: none;
      background: transparent; color: rgba(255,255,255,.75);
      font-size: 13px; font-family: inherit; font-weight: 500;
      cursor: pointer; text-align: left; transition: all .18s;
    }
    .nav-item:hover { background: rgba(255,255,255,.1); color: #fff; }
    .nav-item.active { background: #e8400d; color: #fff; font-weight: 600; }
    .nav-item i { font-size: 18px; flex-shrink: 0; }
    .nav-badge {
      margin-left: auto; min-width: 20px; height: 20px;
      padding: 0 6px; border-radius: 20px;
      background: rgba(255,255,255,.2); color: #fff;
      font-size: 11px; font-weight: 600; display: flex; align-items: center; justify-content: center;
    }
    .nav-badge.urgent { background: #e8400d; animation: statusBlink 1.5s infinite; }
    .sidebar-divider { border: none; border-top: 1px solid rgba(255,255,255,.1); margin: 8px 12px; }
    .sidebar-footer { margin-top: auto; padding: 16px 24px 20px; border-top: 1px solid rgba(255,255,255,.12); }
    .sidebar-user { display: flex; align-items: center; gap: 10px; }
    .user-avatar { width: 32px; height: 32px; border-radius: 50%; background: rgba(255,255,255,.2); display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 700; color: #fff; flex-shrink: 0; }
    .user-name { font-size: 13px; font-weight: 600; color: #fff; }
    .user-role { font-size: 11px; color: rgba(255,255,255,.5); }

    /* Main content */
    .main-content { flex: 1; overflow-y: auto; display: flex; flex-direction: column; }

    /* Top header */
    .content-header {
      padding: 20px 32px 16px;
      border-bottom: 1px solid #ecebea;
      display: flex; align-items: center; justify-content: space-between;
      background: #fff; position: sticky; top: 0; z-index: 100;
    }
    .header-title { font-size: 20px; font-weight: 700; color: #111111; letter-spacing: -0.02em; }
    .header-sub { font-size: 13px; color: #6d6c6b; margin-top: 2px; }
    .header-actions { display: flex; gap: 10px; }
    .hbtn {
      padding: 8px 16px; border-radius: 8px; font-size: 13px; font-family: inherit;
      font-weight: 600; cursor: pointer; transition: all .18s; display: flex; align-items: center; gap: 6px;
    }
    .hbtn-primary { background: #e8400d; color: #fff; border: none; }
    .hbtn-primary:hover { background: #c93108; }
    .hbtn-outline { background: transparent; color: #111111; border: 1.5px solid #b1b1af; }
    .hbtn-outline:hover { border-color: #111111; }

    /* Status strip */
    .status-strip {
      display: flex; align-items: center; gap: 0;
      padding: 10px 32px; background: #ecebea; border-bottom: 1px solid #d8d7d5;
    }
    .strip-item { display: flex; align-items: center; gap: 8px; padding: 0 20px 0 0; margin-right: 20px; border-right: 1px solid #d0cfcd; }
    .strip-item:last-child { border-right: none; }
    .strip-label { font-size: 12px; color: #6d6c6b; }
    .strip-value { font-size: 15px; font-weight: 700; color: #111111; }
    .strip-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .dot-red { background: #e8400d; animation: statusBlink 1.5s infinite; }
    .dot-green { background: #22c55e; }
    .dot-blue { background: #111111; }
    .dot-gray { background: #b1b1af; }

    /* Content area */
    .content-body { padding: 24px 32px; flex: 1; }

    /* Dashboard layout */
    .dashboard-grid { display: grid; grid-template-columns: 1fr 280px; gap: 20px; }
    .primary-area { display: flex; flex-direction: column; gap: 16px; }
    .priority-area { display: flex; flex-direction: column; gap: 16px; }

    /* Cards — Amplemarket inset ring shadow */
    .card {
      background: #fff; border-radius: 12px;
      box-shadow: rgba(17,17,17,.05) 0px 0px 0px 1px inset, rgba(17,17,17,.04) 0px 2px 8px 0px;
      animation: cardDropIn .3s ease;
    }
    .card:hover { box-shadow: rgba(17,17,17,.1) 0px 0px 0px 1px inset, rgba(17,17,17,.1) 0px 8px 24px -4px; transform: translateY(-1px); transition: all .2s; }
    .card-header {
      padding: 16px 20px 0;
      display: flex; align-items: center; justify-content: space-between;
    }
    .card-title { font-size: 14px; font-weight: 700; color: #111111; }
    .card-sub { font-size: 12px; color: #6d6c6b; margin-top: 2px; }
    .card-body { padding: 16px 20px 20px; }

    /* Inquiry timeline */
    .timeline-item {
      display: flex; gap: 12px; padding: 12px 0;
      border-bottom: 1px solid #f5f4f2;
    }
    .timeline-item:last-child { border-bottom: none; }
    .t-dot { width: 8px; height: 8px; border-radius: 50%; background: #e8400d; flex-shrink: 0; margin-top: 6px; }
    .t-dot.done { background: #22c55e; }
    .t-dot.prog { background: #111111; }
    .t-info { flex: 1; }
    .t-company { font-size: 13px; font-weight: 600; color: #111111; }
    .t-detail { font-size: 12px; color: #6d6c6b; margin-top: 2px; }
    .t-time { font-size: 12px; color: #b1b1af; flex-shrink: 0; }
    .t-badge {
      display: inline-block; padding: 2px 8px; border-radius: 6px;
      font-size: 11px; font-weight: 600; margin-top: 4px;
    }
    .badge-new { background: rgba(232,64,13,.1); color: #e8400d; }
    .badge-prog { background: rgba(26,77,138,.1); color: #10054d; }
    .badge-done { background: rgba(34,197,94,.1); color: #16a34a; }

    /* Priority rail — Amplemarket blush/lilac pastel */
    .priority-item {
      padding: 12px 16px; border-radius: 10px; background: #fdf2ee;
      box-shadow: rgba(232,64,13,.12) 0px 0px 0px 1px inset; margin-bottom: 10px; cursor: pointer;
      transition: transform .15s;
    }
    .priority-item:hover { transform: translateX(2px); }
    .priority-item:last-child { margin-bottom: 0; }
    .p-company { font-size: 13px; font-weight: 700; color: #111111; }
    .p-hour { font-size: 12px; color: #e8400d; font-weight: 600; margin-top: 2px; }
    .p-route { font-size: 12px; color: #6d6c6b; margin-top: 2px; }

    /* Mini chart area */
    .secondary-strip { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-top: 16px; }
    .mini-card { background: #fff; border-radius: 12px; border: 1px solid #ecebea; box-shadow: 0 1px 4px rgba(0,0,0,.06); padding: 16px 20px 20px; }
    .mini-title { font-size: 12px; font-weight: 700; color: #111111; margin-bottom: 12px; }
    .mini-chart-wrap { height: 80px; display: flex; align-items: flex-end; gap: 6px; }
    .bar { border-radius: 4px 4px 0 0; background: #111111; transition: height .4s ease; }
    .bar.accent { background: #e8400d; }

    /* Master-detail list */
    .master-detail { display: grid; grid-template-columns: 320px 1fr; height: calc(100vh - 177px); overflow: hidden; gap: 0; }
    .list-pane { border-right: 1px solid #ecebea; overflow-y: auto; }
    .list-search { padding: 12px 16px; border-bottom: 1px solid #ecebea; position: sticky; top: 0; background: #fff; z-index: 10; }
    .search-input {
      width: 100%; padding: 9px 12px; border-radius: 8px; border: 1.5px solid #ecebea;
      font-size: 13px; font-family: inherit; background: #fafafa;
    }
    .search-input:focus { border-color: #10054d; outline: none; background: #fff; }
    .list-filter { display: flex; gap: 6px; padding: 10px 16px; border-bottom: 1px solid #ecebea; overflow-x: auto; }
    .filter-chip {
      padding: 5px 12px; border-radius: 20px; border: 1.5px solid #ecebea;
      font-size: 12px; font-weight: 600; cursor: pointer; white-space: nowrap;
      background: #fff; color: #6d6c6b; transition: all .15s; font-family: inherit;
    }
    .filter-chip.active { border-color: #10054d; background: rgba(26,77,138,.08); color: #10054d; }
    .inquiry-row {
      padding: 14px 16px; border-bottom: 1px solid #f5f4f2;
      cursor: pointer; transition: background .12s;
    }
    .inquiry-row:hover { background: #fafafa; }
    .inquiry-row.selected { background: rgba(26,77,138,.06); border-left: 3px solid #10054d; }
    .ir-company { font-size: 13px; font-weight: 600; color: #111111; }
    .ir-meta { font-size: 12px; color: #6d6c6b; margin-top: 3px; }
    .ir-bottom { display: flex; align-items: center; justify-content: space-between; margin-top: 6px; }
    .ir-time { font-size: 11px; color: #b1b1af; }
    .detail-pane { overflow-y: auto; padding: 28px 32px; }
    .detail-empty { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; color: #b1b1af; }
    .detail-empty i { font-size: 48px; margin-bottom: 12px; }
    .detail-card { background: #fff; border-radius: 12px; border: 1px solid #ecebea; box-shadow: 0 1px 4px rgba(0,0,0,.06); margin-bottom: 16px; overflow: hidden; }
    .detail-header { padding: 20px 24px; border-bottom: 1px solid #ecebea; display: flex; align-items: flex-start; justify-content: space-between; }
    .detail-company { font-size: 22px; font-weight: 800; color: #111111; letter-spacing: -0.03em; }
    .detail-received { font-size: 13px; color: #6d6c6b; margin-top: 4px; }
    .status-select {
      padding: 8px 14px; border-radius: 8px; border: 1.5px solid #ecebea;
      font-size: 13px; font-family: inherit; font-weight: 600; cursor: pointer; color: #10054d;
      background: rgba(26,77,138,.08);
    }
    .detail-body { padding: 20px 24px; }
    .detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .dg-item label { font-size: 11px; font-weight: 600; color: #b1b1af; letter-spacing: .04em; text-transform: uppercase; display: block; margin-bottom: 4px; }
    .dg-item span { font-size: 14px; color: #111111; font-weight: 500; }
    .detail-memo { background: #fafafa; border-radius: 8px; padding: 14px; font-size: 13px; color: #6d6c6b; line-height: 1.65; margin-top: 16px; }
    .detail-actions { display: flex; gap: 10px; padding: 16px 24px; border-top: 1px solid #ecebea; }
    .da-btn {
      padding: 9px 18px; border-radius: 8px; font-size: 13px; font-family: inherit;
      font-weight: 600; cursor: pointer; transition: all .15s;
    }
    .da-primary { background: #e8400d; color: #fff; border: none; }
    .da-primary:hover { background: #c93108; }
    .da-secondary { background: rgba(26,77,138,.08); color: #10054d; border: none; }
    .da-secondary:hover { background: rgba(26,77,138,.15); }
    .da-outline { background: transparent; border: 1.5px solid #ecebea; color: #6d6c6b; }
    .da-outline:hover { border-color: #111111; color: #111111; }

    /* Rates view */
    .rates-wrap { padding: 0; }
    .upload-area {
      background: #fff; border-radius: 12px; border: 2px dashed #ecebea;
      padding: 48px; text-align: center; cursor: pointer; margin-bottom: 24px;
      transition: all .2s; box-shadow: 0 1px 4px rgba(0,0,0,.06);
    }
    .upload-area:hover { border-color: #10054d; background: rgba(26,77,138,.02); }
    .upload-icon { font-size: 48px; margin-bottom: 14px; }
    .upload-text { font-size: 15px; font-weight: 600; color: #111111; margin-bottom: 6px; }
    .upload-sub { font-size: 13px; color: #6d6c6b; }
    .upload-btn {
      margin-top: 16px; padding: 10px 24px; border-radius: 8px; border: none;
      background: #111111; color: #fff; font-size: 13px; font-family: inherit; font-weight: 600;
      cursor: pointer; transition: background .18s;
    }
    .upload-btn:hover { background: #163f72; }
    .rate-table-wrap { background: #fff; border-radius: 12px; border: 1px solid #ecebea; box-shadow: 0 1px 4px rgba(0,0,0,.06); overflow: hidden; }
    .rate-table-header { padding: 16px 20px; border-bottom: 1px solid #ecebea; display: flex; align-items: center; justify-content: space-between; }
    .rate-table-title { font-size: 14px; font-weight: 700; color: #111111; }
    .vehicle-tabs { display: flex; gap: 4px; }
    .vtab {
      padding: 5px 12px; border-radius: 6px; border: 1.5px solid #ecebea;
      font-size: 12px; font-weight: 600; cursor: pointer; font-family: inherit;
      background: #fff; color: #6d6c6b; transition: all .15s;
    }
    .vtab.active { background: #111111; color: #fff; border-color: #10054d; }
    table { width: 100%; border-collapse: collapse; }
    thead tr { background: #ecebea; }
    th { padding: 10px 14px; font-size: 11px; font-weight: 700; color: #6d6c6b; text-align: left; letter-spacing: .04em; text-transform: uppercase; }
    td { padding: 11px 14px; font-size: 13px; color: #111111; border-bottom: 1px solid #f5f4f2; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: #fafafa; }
    .td-rate { font-weight: 700; color: #10054d; }
    .td-badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 600; }
    .badge-up { background: rgba(232,64,13,.1); color: #e8400d; }
    .badge-dn { background: rgba(34,197,94,.1); color: #16a34a; }
    .edit-btn {
      padding: 5px 10px; border-radius: 6px; border: 1.5px solid #ecebea;
      font-size: 11px; font-weight: 600; cursor: pointer; font-family: inherit;
      background: #fff; color: #6d6c6b; transition: all .15s;
    }
    .edit-btn:hover { border-color: #10054d; color: #10054d; }

    /* Analytics */
    .analytics-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
    .analytics-full { grid-column: 1 / -1; }
    .chart-card { background: #fff; border-radius: 12px; border: 1px solid #ecebea; box-shadow: 0 1px 4px rgba(0,0,0,.06); padding: 20px; }
    .chart-title { font-size: 14px; font-weight: 700; color: #111111; margin-bottom: 4px; }
    .chart-sub { font-size: 12px; color: #6d6c6b; margin-bottom: 16px; }
    canvas { max-height: 220px; }
    .kpi-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 20px; }
    .kpi-card { background: #fff; border-radius: 12px; border: 1px solid #ecebea; padding: 20px; box-shadow: 0 1px 4px rgba(0,0,0,.06); }
    .kpi-label { font-size: 12px; color: #6d6c6b; margin-bottom: 6px; }
    .kpi-value { font-size: 28px; font-weight: 800; color: #111111; letter-spacing: -0.03em; }
    .kpi-change { font-size: 12px; margin-top: 4px; font-weight: 600; }
    .kpi-up { color: #22c55e; }
    .kpi-dn { color: #e8400d; }

    /* Gradient accent */
    .gradient-corner {
      position: absolute; top: 0; right: 0; width: 300px; height: 200px; pointer-events: none; opacity: .35;
      background: radial-gradient(386% 163% at -13% -17%, #e8400d 0%, #ffeed8 26%, #d0b2ff 84%);
      border-radius: 0 0 0 200px;
    }
    /* Route table */
    .route-table { width: 100%; border-collapse: collapse; }
    .route-table th { padding: 8px 12px; font-size: 11px; font-weight: 700; color: #6d6c6b; text-align: left; letter-spacing: .04em; background: #ecebea; }
    .route-table td { padding: 9px 12px; font-size: 13px; color: #111111; border-bottom: 1px solid #f5f4f2; }
    .route-table tr:last-child td { border-bottom: none; }
    .route-table tr:hover td { background: #fafafa; }
    /* Sparkline SVG */
    .sparkline-path { stroke-dasharray: 400; stroke-dashoffset: 0; animation: sparkDraw 1.2s ease forwards; }
  </style>
</head>

/* ─── CountUp hook ─── */
function useCountUp(target, duration = 900) {
  const [val, setVal] = React.useState(0);
  React.useEffect(() => {
    let start = 0;
    const step = Math.ceil(target / (duration / 16));
    const id = setInterval(() => {
      start = Math.min(start + step, target);
      setVal(start);
      if (start >= target) clearInterval(id);
    }, 16);
    return () => clearInterval(id);
  }, [target]);
  return val;
}

                <button className="da-btn da-primary" onClick={() => {}}>연락 완료 처리</button>
                <button className="da-btn da-secondary" onClick={() => {}}>예약 문자 발송</button>
                <button className="da-btn da-outline" onClick={() => {}}>견적서 생성</button>
                <button className="da-btn da-outline" onClick={() => {}}>메모 추가</button>
              </div>
            </div>

            {/* Contact history */}
            <div className="detail-card">
              <div className="card-header"><div className="card-title">응대 이력</div></div>
              <div className="card-body" style={{ paddingTop: 12 }}>
                {[
                  { time: '15:20', text: '문의 최초 접수 — 자동 알림 발송 완료' },
                  { time: '15:22', text: '담당자 배정: 영업팀 이민준 과장' },
                ].map((h, i) => (

/* ─── RatesView ─── */
function RatesView() {
  const [vehTab, setVehTab] = useState('1톤');
  const fileRef = useRef();
  const [uploaded, setUploaded] = useState(false);

  const rateKey = { '1톤': 'rate_1t', '2.5톤': 'rate_25t', '5톤': 'rate_5t' };

  return (
    <div className="rates-wrap">
      <div className="content-body">
        <div className="upload-area" onClick={() => fileRef.current?.click()}>
          <input type="file" ref={fileRef} style={{ display: 'none' }} accept=".xlsx,.xls" onChange={e => { if (e.target.files[0]) setUploaded(true); }} />
          {uploaded ? (
            <>
              <div className="upload-icon">✅</div>
              <div className="upload-text">단가표가 업로드되었습니다</div>
              <div className="upload-sub">업로드된 데이터로 단가표를 갱신하려면 아래 버튼을 누르세요.</div>
              <button className="upload-btn" onClick={(e) => { e.stopPropagation(); setUploaded(false); }}>적용 완료 — 초기화</button>
            </>
          ) : (
            <>
              <div className="upload-icon">📊</div>
              <div className="upload-text">엑셀 파일을 드래그하거나 클릭해서 업로드</div>
              <div className="upload-sub">지원 형식: XLSX, XLS / 구간·차종·단가 컬럼 포함 템플릿 사용 권장</div>
              <button className="upload-btn" onClick={(e) => { e.stopPropagation(); fileRef.current?.click(); }}>파일 선택</button>
            </>
          )}
        </div>

        <div className="rate-table-wrap">
          <div className="rate-table-header">
            <div className="rate-table-title">운임 단가표 (기준 단가)</div>
            <div style={{ display: 'flex', gap: 12, alignItems: 'center' }}>
              <div className="vehicle-tabs">
                {['1톤','2.5톤','5톤'].map(v => (
                  <button key={v} className={`vtab${vehTab === v ? ' active' : ''}`} onClick={() => setVehTab(v)}>{v}</button>
                ))}
              </div>
              <button className="hbtn hbtn-outline" style={{ fontSize: 12, padding: '6px 12px' }} onClick={() => {}}>
                <i className="ph-bold ph-download-simple" style={{ fontSize: 14 }}></i> 엑셀 다운로드
              </button>
            </div>
          </div>
          <table>
            <thead>
              <tr>
                <th>출발지</th><th>도착지</th>
                <th>기준 단가 ({vehTab})</th>
                <th>전월 대비</th>
                <th>최종 수정일</th>
                <th>관리</th>
              </tr>
            </thead>
            <tbody>
              {RATE_DATA.map((r, i) => (
                <tr key={i}>
                  <td style={{ fontWeight: 600 }}>{r.from}</td>
                  <td>{r.to}</td>
                  <td className="td-rate">{(r[rateKey[vehTab]] || r.rate_1t).toLocaleString()}원</td>
                  <td>
                    {r.change === 'up' && <span className="td-badge badge-up">▲ 인상</span>}
                    {r.change === 'dn' && <span className="td-badge badge-dn">▼ 인하</span>}
                    {!r.change && <span style={{ fontSize: 12, color: '#b1b1af' }}>—</span>}
                  </td>
                  <td style={{ fontSize: 12, color: '#6d6c6b' }}>2026-06-01</td>
                  <td>
                    <button className="edit-btn" onClick={() => {}}>수정</button>
                  </td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      </div>
    </div>
  );
}

/* ─── AnalyticsView ─── */
function AnalyticsView() {
  const lineRef = useRef();
  const barRef  = useRef();
  const donutRef= useRef();
  const lineChart  = useRef(null);
  const barChart   = useRef(null);
  const donutChart = useRef(null);

  useEffect(() => {
    if (!window.Chart) return;

    lineChart.current = new Chart(lineRef.current, {
      type: 'line',
      data: {
        labels: ['5월 3주','5월 4주','6월 1주','6월 2주','6월 3주'],
        datasets: [{
          label: '문의 건수',
          data: [112, 98, 127, 143, 148],
          borderColor: '#10054d', backgroundColor: 'rgba(26,77,138,.08)',
          fill: true, tension: .4, pointRadius: 5, pointBackgroundColor: '#10054d',
        }]
      },
      options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { y: { beginAtZero: false, grid: { color: '#f5f4f2' } }, x: { grid: { display: false } } } }
    });

    barChart.current = new Chart(barRef.current, {
      type: 'bar',
      data: {
        labels: ['서울→부산','서울→대전','인천→부산','서울→대구','부산→서울'],
        datasets: [{
          label: '이번 달 문의',
          data: [38, 24, 19, 16, 14],
          backgroundColor: ['#e8400d','#10054d','#10054d','#10054d','#ecebea'].map((c, i) => i === 0 ? '#e8400d' : '#10054d'),
          borderRadius: 6,
        }]
      },
      options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { y: { beginAtZero: true, grid: { color: '#f5f4f2' } }, x: { grid: { display: false } } } }
    });

    donutChart.current = new Chart(donutRef.current, {
      type: 'doughnut',
      data: {
        labels: ['신규 접수','상담 중','완료'],
        datasets: [{ data: [30, 39, 100], backgroundColor: ['#e8400d','#10054d','#22c55e'], borderWidth: 0, hoverOffset: 4 }]
      },
      options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'right' } }, cutout: '65%' }
    });

    return () => {
      lineChart.current?.destroy();
      barChart.current?.destroy();
      donutChart.current?.destroy();
    };
  }, []);

  return (
    <div className="content-body">
      <div className="kpi-row">
        {[
          { label: '이번 달 총 문의',    value: '148건', change: '+18.4%', up: true  },
          { label: '평균 응답 시간',      value: '3.8시간', change: '-0.5h', up: true  },
          { label: '처리 완료율',         value: '71.6%',  change: '+3.2%', up: true  },
          { label: '정기 거래 고객',      value: '12개사', change: '+2개사', up: true  },
        ].map(k => (
          <div key={k.label} className="kpi-card">
            <div className="kpi-label">{k.label}</div>
            <div className="kpi-value">{k.value}</div>
            <div className={`kpi-change ${k.up ? 'kpi-up' : 'kpi-dn'}`}>
              {k.up ? '▲' : '▼'} {k.change} 전월 대비
            </div>
          </div>
        ))}
      </div>
      <div className="analytics-grid">
        <div className="chart-card analytics-full">
          <div className="chart-title">주간 문의 건수 추이</div>
          <div className="chart-sub">최근 5주 운송 견적·문의 접수 현황</div>
          <div style={{ height: 200 }}>
            <canvas ref={lineRef}></canvas>
          </div>
        </div>
        <div className="chart-card">
          <div className="chart-title">이번 달 상위 운송 구간</div>
          <div className="chart-sub">문의 건수 기준</div>
          <div style={{ height: 200 }}>
            <canvas ref={barRef}></canvas>
          </div>
        </div>
        <div className="chart-card">
          <div className="chart-title">문의 상태 분포</div>
          <div className="chart-sub">신규 / 상담중 / 완료</div>
          <div style={{ height: 200 }}>
            <canvas ref={donutRef}></canvas>
          </div>
        </div>
      </div>
    </div>
  );
}

/* ─── Generic placeholder ─── */
function PlaceholderView({ title }) {
  return (
    <div className="content-body" style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', minHeight: 400 }}>
      <i className="ph-bold ph-wrench" style={{ fontSize: 48, color: '#ecebea', marginBottom: 16 }}></i>
      <div style={{ fontSize: 16, fontWeight: 600, color: '#b1b1af' }}>{title}</div>
      <div style={{ fontSize: 13, color: '#d0cece', marginTop: 6 }}>이 화면은 구현 예정입니다</div>
    </div>
  );
}

/* ─── App ─── */
function App() {
  const [view, setView] = useState('main');

  const headers = {
    main:       { title: '관제 대시보드',  sub: '실시간 운영 현황 모니터링' },
    inquiries:  { title: '문의 관리',       sub: '접수된 운송 견적·문의 통합 관리' },
    rates:      { title: '단가표 관리',     sub: '구간별 운임 단가 조회·수정·엑셀 업로드' },
    analytics:  { title: '운영 분석',       sub: '문의 추이·구간 분포·처리 성과 리포트' },
    notices:    { title: '공지/FAQ 관리',   sub: '공지사항 및 FAQ 등록·수정·삭제' },
    users:      { title: '관리자 계정',     sub: '관리자 계정 및 권한 관리' },
    settings:   { title: '시스템 설정',     sub: '알림, 연동, 보안 설정' },
  };

  const h = headers[view] || headers.main;

  return (
    <div data-archetype="stripe-multipane" className="shell">
      <Sidebar view={view} setView={setView} />
      <div className="main-content">
        {/* Header */}
        <div className="content-header" style={{ position: 'relative', overflow: 'hidden' }}>
          <div className="gradient-corner"></div>
          <div style={{ position: 'relative' }}>
            <div className="header-title">{h.title}</div>
            <div className="header-sub">{h.sub}</div>
          </div>
          <div className="header-actions">
            {view === 'main' && (
              <>
                <button className="hbtn hbtn-outline" onClick={() => {}}>
                  <i className="ph-bold ph-arrow-clockwise" style={{ fontSize: 14 }}></i> 새로 고침
                </button>
                <button className="hbtn hbtn-primary" onClick={() => setView('inquiries')}>문의 관리 바로가기</button>
              </>
            )}
            {view === 'inquiries' && (
              <>
                <button className="hbtn hbtn-outline" onClick={() => {}}>
                  <i className="ph-bold ph-funnel-simple" style={{ fontSize: 14 }}></i> 필터
                </button>
                <button className="hbtn hbtn-primary" onClick={() => {}}>CSV 내보내기</button>
              </>
            )}
            {view === 'rates' && (
              <>
                <button className="hbtn hbtn-outline" onClick={() => {}}>템플릿 다운로드</button>
                <button className="hbtn hbtn-primary" onClick={() => {}}>단가 일괄 저장</button>
              </>
            )}
            {view === 'analytics' && (
              <>
                <button className="hbtn hbtn-outline" onClick={() => {}}>기간 설정</button>
                <button className="hbtn hbtn-primary" onClick={() => {}}>리포트 내보내기</button>
              </>
            )}
          </div>
        </div>

        {/* Views */}
        {view === 'main'      && <DashboardView setView={setView} />}
        {view === 'inquiries' && <InquiriesView />}
        {view === 'rates'     && <RatesView />}
        {view === 'analytics' && <AnalyticsView />}
        {!['main','inquiries','rates','analytics'].includes(view) && <PlaceholderView title={h.title} />}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
