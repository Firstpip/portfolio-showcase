<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>뮤직웨이브 — 음악 커뮤니티 피드 플랫폼</title>
<link href="https://cdn.jsdelivr.net/npm/pretendard@1.3.9/dist/web/static/pretendard.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone@7.21.2/babel.min.js"></script>
<style>
:root {
  --bg: #fdfcfc;
  --surface: #f5f3f1;
  --border: #e5e5e5;
  --primary: #000000;
  --accent: #0447ff;
  --text1: #000000;
  --text2: #a59f97;
  --text3: #777169;
  --nav-h: 56px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Pretendard',sans-serif;background:var(--bg);color:var(--text1);min-height:100vh}

@keyframes fadeSlideUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
@keyframes shimmer{0%{background-position:-200% center}100%{background-position:200% center}}
@keyframes heartPop{0%{transform:scale(1)}40%{transform:scale(1.5)}100%{transform:scale(1)}}
@keyframes pulseBlue{0%,100%{opacity:1}50%{opacity:0.4;transform:scaleX(0.9)}}
@keyframes barGrow{from{width:0}to{width:var(--w,100%)}}
@keyframes slideIn{from{opacity:0;transform:translateX(12px)}to{opacity:1;transform:translateX(0)}}

.topnav{
  position:fixed;top:0;left:0;right:0;height:var(--nav-h);
  background:rgba(253,252,252,0.94);backdrop-filter:blur(14px);
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;padding:0 24px;gap:24px;z-index:100;
}
.logo{font-family:'DM Sans',sans-serif;font-weight:300;font-size:18px;letter-spacing:-0.04em;color:var(--text1);cursor:pointer}
.logo span{color:var(--accent)}
.nav-tabs{display:flex;gap:4px}
.nav-tab{
  padding:6px 16px;border-radius:9999px;border:none;cursor:pointer;
  background:transparent;font-size:14px;font-family:'Pretendard',sans-serif;
  font-weight:500;color:var(--text3);transition:all 0.18s;
}
.nav-tab:hover{background:var(--surface);color:var(--text1)}
.nav-tab.active{background:var(--primary);color:#fff}
.topnav-right{margin-left:auto;display:flex;align-items:center;gap:10px}
.discord-btn{
  display:flex;align-items:center;gap:7px;padding:7px 16px;
  border-radius:9999px;border:1px solid var(--border);background:#fff;
  font-size:13px;font-weight:500;cursor:pointer;transition:all 0.18s;font-family:'Pretendard',sans-serif;
}
.discord-btn:hover{background:var(--surface)}
.avatar{
  width:36px;height:36px;border-radius:9999px;
  background:linear-gradient(135deg,var(--accent),#6d28d9);
  display:flex;align-items:center;justify-content:center;
  font-size:14px;color:#fff;font-weight:700;flex-shrink:0;
}
.avatar.g{background:linear-gradient(135deg,#16a34a,#15803d)}
.avatar.o{background:linear-gradient(135deg,#d97706,#b45309)}
.avatar.p{background:linear-gradient(135deg,#7c3aed,#6d28d9)}
.avatar.r{background:linear-gradient(135deg,#dc2626,#b91c1c)}

/* Feed layout */
.feed-layout{
  margin-top:var(--nav-h);padding:24px 20px;
  display:flex;justify-content:center;gap:24px;min-height:calc(100vh - var(--nav-h));
}
.feed-main{flex:1;max-width:600px;min-width:0}
.feed-aside{width:300px;flex-shrink:0}

.composer{
  background:#fff;border:1px solid var(--border);border-radius:16px;
  padding:16px;margin-bottom:14px;
  position:sticky;top:calc(var(--nav-h)+8px);z-index:50;
}
.composer-row{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.composer-input-field{
  flex:1;padding:9px 16px;border-radius:9999px;border:1px solid var(--border);
  background:var(--surface);font-size:14px;color:var(--text2);
  font-family:'Pretendard',sans-serif;outline:none;
}
.composer-input-field:focus{border-color:var(--accent);color:var(--text1)}
.composer-footer{display:flex;align-items:center;gap:6px}
.pill{
  padding:6px 16px;border-radius:9999px;border:none;cursor:pointer;
  font-size:13px;font-weight:600;font-family:'Pretendard',sans-serif;
  transition:all 0.15s;display:inline-flex;align-items:center;gap:6px;
}
.pill.black{background:var(--primary);color:#fff}
.pill.black:hover{opacity:0.82}
.pill.outline{background:transparent;border:1px solid var(--border);color:var(--text1)}
.pill.outline:hover{background:var(--surface)}
.pill.ghost{background:var(--surface);color:var(--text3)}
.pill.ghost:hover{background:var(--border);color:var(--text1)}
.pill.ghost.on{background:var(--primary);color:#fff}
.pill.accent{background:var(--accent);color:#fff}
.pill.accent:hover{opacity:0.85}

.post{
  background:#fff;border:1px solid var(--border);border-radius:16px;
  padding:20px;margin-bottom:12px;
  animation:fadeSlideUp 0.38s ease both;
}
.post:nth-child(1){animation-delay:0.04s}
.post:nth-child(2){animation-delay:0.08s}
.post:nth-child(3){animation-delay:0.12s}
.post:nth-child(4){animation-delay:0.16s}
.post:nth-child(5){animation-delay:0.20s}
.post:nth-child(6){animation-delay:0.24s}
.post-head{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.post-meta{flex:1}
.author{font-size:14px;font-weight:700}
.handle{font-size:12px;color:var(--text2);margin-top:1px}
.post-time{font-size:12px;color:var(--text2)}
.post-body{font-size:14px;line-height:1.65;color:var(--text3);margin-bottom:12px}

.post-media{
  border-radius:12px;background:var(--surface);padding:14px;
  margin-bottom:12px;display:flex;align-items:center;gap:12px;
}
.music-thumb{
  width:50px;height:50px;border-radius:10px;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;font-size:22px;
  background:linear-gradient(135deg,var(--accent),#7c3aed);
}
.music-track{font-size:14px;font-weight:700}
.music-artist{font-size:12px;color:var(--text2);margin-top:2px}
.play-mini{
  margin-left:auto;width:34px;height:34px;border-radius:9999px;
  background:var(--primary);border:none;cursor:pointer;color:#fff;
  display:flex;align-items:center;justify-content:center;transition:all 0.18s;
}
.play-mini:hover{transform:scale(1.08);opacity:0.85}

.vote-card{
  background:var(--surface);border-radius:12px;padding:14px;margin-bottom:12px;
}
.vote-title{font-size:12px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:10px}
.vbar-wrap{margin-bottom:8px}
.vbar-label{display:flex;justify-content:space-between;font-size:12px;color:var(--text3);margin-bottom:4px}
.vbar-bg{height:6px;border-radius:9999px;background:var(--border)}
.vbar-fill{height:100%;border-radius:9999px;background:var(--accent);animation:barGrow 0.9s ease}

.score-badge{
  display:inline-flex;align-items:center;gap:6px;
  padding:5px 14px;border-radius:9999px;
  background:linear-gradient(90deg,var(--accent),#7c3aed,var(--accent));
  background-size:200% auto;
  animation:shimmer 2.5s linear infinite;
  color:#fff;font-size:12px;font-weight:700;margin-bottom:12px;
}
.action-btn.like.on{color:#ef4444;animation:heartPop 0.35s ease}
.toast{
  position:fixed;bottom:28px;left:50%;transform:translateX(-50%);
  background:var(--primary);color:#fff;padding:10px 22px;
  border-radius:9999px;font-size:13px;font-weight:600;z-index:999;
  animation:fadeSlideUp 0.25s ease;pointer-events:none;white-space:nowrap;
}

.post-actions{
  display:flex;align-items:center;gap:2px;padding-top:10px;
  border-top:1px solid var(--border);
}
.action-btn{
  display:flex;align-items:center;gap:5px;padding:5px 12px;
  border-radius:9999px;border:none;background:transparent;cursor:pointer;
  font-size:12px;color:var(--text2);transition:all 0.15s;
  font-family:'Pretendard',sans-serif;
}
.action-btn:hover{background:var(--surface);color:var(--text1)}
.action-btn.like.on{color:#ef4444}

/* Right rail */
.rail-card{
  background:#fff;border:1px solid var(--border);border-radius:16px;
  padding:18px;margin-bottom:14px;animation:fadeSlideUp 0.5s ease both;
}
.rail-title{font-size:14px;font-weight:700;margin-bottom:14px}
.trend-item{display:flex;align-items:center;gap:10px;padding:7px 0;border-bottom:1px solid var(--border)}
.trend-item:last-child{border-bottom:none}
.trend-rank{font-size:18px;font-weight:700;color:var(--border);width:22px;text-align:right}
.trend-name{font-size:13px;font-weight:600}
.trend-count{font-size:11px;color:var(--text2);margin-top:1px}

.game-row{
  display:flex;align-items:center;justify-content:space-between;
  padding:9px 12px;border-radius:12px;background:var(--surface);margin-bottom:8px;cursor:pointer;transition:all 0.15s;
}
.game-row:hover{background:var(--border)}
.game-row-name{font-size:12px;font-weight:600}
.game-row-sub{font-size:11px;color:var(--text2)}
.new-tag{padding:2px 9px;border-radius:9999px;background:var(--accent);color:#fff;font-size:10px;font-weight:700}

/* Vote view */
.view-wrap{margin-top:var(--nav-h);padding:28px 24px;min-height:calc(100vh - var(--nav-h))}
.view-inner{max-width:680px;margin:0 auto}
.view-h1{font-family:'DM Sans',sans-serif;font-weight:300;font-size:36px;letter-spacing:-0.03em;margin-bottom:6px}
.view-sub{font-size:14px;color:var(--text2);margin-bottom:24px}

.bracket{margin-bottom:28px}
.bracket-label{font-size:11px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:12px}
.matchup{
  display:flex;border:1px solid var(--border);border-radius:16px;overflow:hidden;margin-bottom:12px;
}
.matchup-half{
  flex:1;padding:18px 20px;cursor:pointer;background:#fff;transition:all 0.2s;
  display:flex;align-items:center;gap:14px;
}
.matchup-half:first-child{border-right:1px solid var(--border)}
.matchup-half:hover{background:var(--surface)}
.matchup-half.sel{background:var(--primary);color:#fff}
.matchup-half.sel .matchup-sub{color:rgba(255,255,255,0.55)}
.matchup-art{width:52px;height:52px;border-radius:10px;background:var(--surface);display:flex;align-items:center;justify-content:center;font-size:26px;flex-shrink:0}
.matchup-name{font-size:15px;font-weight:700}
.matchup-sub{font-size:12px;color:var(--text2);margin-top:2px}

.rank-board{background:var(--surface);border-radius:14px;padding:18px;margin-bottom:20px}
.rank-row{display:flex;align-items:center;gap:12px;margin-bottom:9px}
.rank-row:last-child{margin-bottom:0}
.rank-n{font-size:16px;font-weight:700;color:var(--text2);width:20px}
.rank-name{flex:1;font-size:14px;font-weight:600}
.rank-bar-bg{width:110px;height:7px;border-radius:9999px;background:var(--border);overflow:hidden}
.rank-bar-fill{height:100%;border-radius:9999px;background:var(--accent);animation:barGrow 0.8s ease}
.rank-pct{font-size:12px;font-weight:700;width:32px;text-align:right}

/* Game view */
.game-wrap{margin-top:var(--nav-h);padding:28px 24px}
.game-inner{max-width:600px;margin:0 auto}
.game-hero{
  background:linear-gradient(135deg,#0447ff 0%,#7c3aed 100%);
  border-radius:20px;padding:32px 28px;color:#fff;
  position:relative;overflow:hidden;margin-bottom:16px;
}
.game-hero::before{content:'';position:absolute;width:280px;height:280px;border-radius:50%;background:rgba(255,255,255,0.05);top:-100px;right:-80px}
.game-hero::after{content:'';position:absolute;width:180px;height:180px;border-radius:50%;background:rgba(255,255,255,0.04);bottom:-70px;left:-40px}
.game-badge2{display:inline-block;padding:4px 12px;border-radius:9999px;background:rgba(255,255,255,0.18);font-size:11px;font-weight:700;margin-bottom:10px}
.game-h2{font-family:'DM Sans',sans-serif;font-weight:300;font-size:28px;letter-spacing:-0.03em;margin-bottom:6px}
.game-desc{font-size:14px;opacity:0.8}

.game-body{background:#fff;border:1px solid var(--border);border-radius:20px;padding:24px;margin-bottom:16px}

.spotify-row{
  display:flex;align-items:center;gap:12px;padding:14px;
  background:rgba(29,185,84,0.06);border:1px solid rgba(29,185,84,0.2);border-radius:12px;margin-bottom:18px;
}
.sp-icon{width:40px;height:40px;border-radius:9999px;background:#1DB954;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.sp-track{font-size:14px;font-weight:700}
.sp-artist{font-size:12px;color:var(--text2);margin-top:2px}
.sp-progress{height:3px;border-radius:9999px;background:var(--border);margin-top:8px}
.sp-fill{height:100%;border-radius:9999px;background:#1DB954;width:42%}

.timing-row{display:flex;align-items:center;justify-content:center;gap:20px;background:var(--surface);border-radius:12px;padding:18px;margin-bottom:18px}
.t-circle{
  width:70px;height:70px;border-radius:9999px;border:3px solid var(--accent);
  display:flex;align-items:center;justify-content:center;
  font-family:'DM Sans',sans-serif;font-size:22px;font-weight:300;letter-spacing:-0.04em;
}
.t-label{font-size:11px;color:var(--text2);text-align:center;margin-top:5px}
.hit-zone{height:8px;border-radius:9999px;background:var(--border);margin-bottom:18px;position:relative;overflow:hidden}
.hit-ind{position:absolute;width:40px;height:100%;border-radius:9999px;background:var(--accent);animation:pulseBlue 0.7s ease infinite}
.tap-btn{
  width:100%;padding:22px;border-radius:9999px;border:none;
  background:var(--accent);color:#fff;font-size:18px;font-weight:700;cursor:pointer;
  font-family:'Pretendard',sans-serif;transition:all 0.1s;letter-spacing:-0.02em;
}
.tap-btn:active{transform:scale(0.97)}
.hit-pills{display:flex;gap:6px;margin-top:12px;min-height:26px;flex-wrap:wrap}
.hit-pill{
  padding:3px 11px;border-radius:9999px;font-size:10px;font-weight:800;color:#fff;
  animation:slideIn 0.25s ease;
}

.leaderboard{background:#fff;border:1px solid var(--border);border-radius:16px;padding:20px}
.lb-title{font-size:14px;font-weight:700;margin-bottom:14px}
.lb-row{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--border)}
.lb-row:last-child{border-bottom:none}
.lb-rank{font-size:18px;font-weight:800;width:22px}
.lb-name{flex:1;font-size:14px;font-weight:600}
.lb-sub{font-size:11px;color:var(--text2)}
.lb-score{font-family:'DM Sans',sans-serif;font-size:18px;font-weight:300;letter-spacing:-0.04em}

/* Mobile view */
.mobile-wrap{margin-top:var(--nav-h);padding:28px 24px}
.mobile-inner{max-width:840px;margin:0 auto}
.phone-frame{
  width:316px;height:620px;border-radius:40px;border:7px solid var(--primary);
  overflow:hidden;background:#fff;box-shadow:0 20px 56px rgba(0,0,0,0.14);margin:0 auto 8px;
  position:relative;
}
.phone-notch{position:absolute;top:0;left:50%;transform:translateX(-50%);width:96px;height:22px;background:var(--primary);border-radius:0 0 14px 14px;z-index:10}
.phone-screen{height:100%;overflow-y:auto;background:var(--bg);padding-top:26px}
.m-nav{
  display:flex;align-items:center;justify-content:space-between;padding:11px 14px;
  border-bottom:1px solid var(--border);
  position:sticky;top:26px;background:rgba(253,252,252,0.92);backdrop-filter:blur(8px);
}
.m-logo{font-size:14px;font-weight:700}
.m-pill{padding:4px 10px;border-radius:9999px;border:none;font-size:10px;font-weight:600;cursor:pointer;font-family:'Pretendard',sans-serif}
.m-compose-area{padding:10px 14px;border-bottom:1px solid var(--border)}
.m-compose-box{background:var(--surface);border-radius:9999px;padding:9px 14px;font-size:12px;color:var(--text2)}
.m-post{padding:12px 14px;border-bottom:1px solid var(--border)}
.m-post-head{display:flex;align-items:center;gap:7px;margin-bottom:7px}
.m-av{width:26px;height:26px;border-radius:9999px;flex-shrink:0}
.m-author{font-size:12px;font-weight:700}
.m-time{margin-left:auto;font-size:10px;color:var(--text2)}
.m-body{font-size:11px;color:var(--text3);line-height:1.5;margin-bottom:6px}
.m-actions{display:flex;gap:10px}
.m-act{background:none;border:none;font-size:10px;color:var(--text2);cursor:pointer;padding:3px 0;font-family:'Pretendard',sans-serif}

.device-label{text-align:center;font-size:12px;color:var(--text2)}
.tablet-frame{flex:1;min-width:280px;background:#fff;border:4px solid var(--primary);border-radius:14px;overflow:hidden}
.t-nav{display:flex;align-items:center;gap:10px;padding:10px 14px;border-bottom:1px solid var(--border)}
.t-tabs{display:flex;gap:4px;margin-left:auto}
.t-tab{padding:3px 10px;border-radius:9999px;font-size:10px;background:var(--surface);cursor:pointer;font-family:'Pretendard',sans-serif}
.t-body{display:flex;height:380px}
.t-feed{flex:1;padding:10px;overflow-y:auto}
.t-mini-post{background:var(--surface);border-radius:8px;padding:8px;margin-bottom:7px}
.t-mini-head{display:flex;gap:5px;align-items:center;margin-bottom:5px}
.t-mini-av{width:20px;height:20px;border-radius:9999px}
.t-mini-author{font-size:10px;font-weight:700}
.t-mini-body{font-size:10px;color:var(--text3);line-height:1.4}
.t-aside{width:130px;padding:10px;border-left:1px solid var(--border)}
.t-aside-h{font-size:9px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:7px}
.t-aside-item{font-size:9px;padding:4px 0;border-bottom:1px solid var(--border)}

.check-card{background:var(--surface);border-radius:12px;padding:16px;margin-top:16px}
.check-title{font-size:12px;font-weight:700;margin-bottom:10px}
.check-row{display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:1px solid var(--border);font-size:11px}
.check-row:last-child{border-bottom:none}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState, useEffect, useRef} = React;

const LUCIDE_SVGS={

  bookmark:`<path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/>`,

function LIcon({name, size=16, color}){
  const c=color||'currentColor';
  const paths=LUCIDE_SVGS[name]||'<circle cx="12" cy="12" r="3"/>';
  return <svg width={size} height={size} viewBox="0 0 24 24" fill="none"
    stroke={c} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"
    data-lucide={name}
    style={{display:'inline-block',verticalAlign:'middle',flexShrink:0}}
    dangerouslySetInnerHTML={{__html:paths}}/>;
}

function GameView(){
  const [st,setSt]=useState('idle');
  const [score,setScore]=useState(0);
  const [combo,setCombo]=useState(0);
  const [maxCombo,setMaxCombo]=useState(0);
  const [hits,setHits]=useState([]);
  const timerRef=useRef(null);
  const startGame=()=>{
    setSt('playing');setScore(0);setCombo(0);setMaxCombo(0);setHits([]);
    timerRef.current=setTimeout(()=>setSt('result'),15000);
  };
  useEffect(()=>()=>clearTimeout(timerRef.current),[]);
  const tap=()=>{
    if(st!=='playing')return;
    const r=Math.random();
    const type=r>0.55?'PERFECT':r>0.18?'GOOD':'MISS';
    const pts=type==='PERFECT'?100:type==='GOOD'?60:0;
    const nc=type==='MISS'?0:combo+1;
    setScore(s=>s+pts+nc*5);setCombo(nc);setMaxCombo(m=>Math.max(m,nc));
    setHits(h=>[{type,id:Date.now()},...h.slice(0,5)]);
  };
  const colors={PERFECT:'#0447ff',GOOD:'#16a34a',MISS:'#ef4444'};
  return(
    <div className="game-wrap">
      <div className="game-inner">
        <div className="game-hero">
          <div className="game-badge2"><LIcon name="music" size={11} color="#fff"/> Spotify Web Playback SDK</div>
          <div className="game-h2">음원 싱크 타이밍 게임</div>
          <div className="game-desc">비트에 맞춰 탭하고 최고 콤보를 기록하세요</div>
        </div>
        <div className="game-body">
          <div className="spotify-row">
            <div className="sp-icon"><LIcon name="music" size={18} color="#fff"/></div>
            <div style={{flex:1}}>
              <div className="sp-track">Supernatural — NewJeans</div>
              <div className="sp-artist">NewJeans · 2023 · 음원 싱크 모드</div>
              {st==='playing'&&<div className="sp-progress"><div className="sp-fill"/></div>}
            </div>
            {st!=='playing'&&<button className="pill" style={{background:'#1DB954',color:'#fff',border:'none',padding:'5px 14px',fontSize:12}} onClick={()=>{}}>Spotify 연결</button>}
          </div>
          {st==='idle'&&(
            <button className="pill black" style={{width:'100%',padding:'14px',fontSize:15}} onClick={startGame}>
              게임 시작
            </button>
          )}
          {st==='playing'&&(
            <>
              <div className="timing-row">
                <div>
                  <div className="t-circle">{score.toLocaleString()}</div>
                  <div className="t-label">점수</div>
                </div>
                <div>
                  <div className="t-circle" style={{borderColor:'#16a34a'}}>{combo}</div>
                  <div className="t-label">콤보</div>
                </div>
                <div>
                  <div className="t-circle" style={{borderColor:'#f59e0b'}}>{maxCombo}</div>
                  <div className="t-label">최고 콤보</div>
                </div>
              </div>
              <div className="hit-zone"><div className="hit-ind"/></div>
              <button className="tap-btn" onClick={tap}>탭!</button>
              <div className="hit-pills">
                {hits.map(h=>(
                  <div key={h.id} className="hit-pill" style={{background:colors[h.type]}}>{h.type}</div>
                ))}
              </div>
            </>
          )}
          {st==='result'&&(
            <div style={{textAlign:'center',padding:'28px 0'}}>
              <div style={{fontFamily:"'DM Sans',sans-serif",fontWeight:300,fontSize:52,letterSpacing:'-0.04em',marginBottom:8}}>{score.toLocaleString()}</div>
              <div style={{fontSize:13,color:'var(--text2)',marginBottom:24}}>최종 점수 · 최고 콤보 {maxCombo}개</div>

          )}

                        </div>
                        <div className="m-body">{p.body.slice(0,55)}{p.body.length>55?'...':''}</div>
                        <div className="m-actions">
                          <button className="m-act" onClick={()=>{}}><LIcon name="heart" size={10}/> {p.likes}</button>
                          <button className="m-act" onClick={()=>{}}><LIcon name="message-circle" size={10}/> {p.comments}</button>
                          <button className="m-act" onClick={()=>{}}>↗ {p.shares}</button>
                        </div>
                      </div>
                    ))}
                  </>
                ):(
                  <div style={{padding:14}}>
                    <div style={{background:'linear-gradient(135deg,#0447ff,#7c3aed)',borderRadius:14,padding:16,color:'#fff',marginBottom:12}}>
                      <div style={{fontSize:10,opacity:0.7,marginBottom:5}}>현재 플레이 중</div>
                      <div style={{fontSize:13,fontWeight:700}}>음원 싱크 타이밍</div>
                      <div style={{fontSize:11,opacity:0.6,marginTop:3}}>Supernatural · NewJeans</div>
                    </div>
                    <button style={{width:'100%',padding:'13px',borderRadius:'9999px',border:'none',background:'var(--primary)',color:'#fff',fontSize:13,fontWeight:700,cursor:'pointer',fontFamily:"'Pretendard',sans-serif"}} onClick={()=>{}}>TAP!</button>
                    <div style={{background:'var(--surface)',borderRadius:10,padding:10,marginTop:10}}>
                      <div style={{fontSize:10,fontWeight:700,color:'var(--text2)',textTransform:'uppercase',marginBottom:8}}>리더보드</div>
                      {['이서연','박준혁','김태현'].map((n,i)=>(
                        <div key={i} style={{display:'flex',justifyContent:'space-between',fontSize:10,padding:'4px 0',borderBottom:i<2?'1px solid var(--border)':'none'}}>
                          <span>{i+1}. {n}</span><span style={{fontWeight:700}}>{[14820,12540,11230][i].toLocaleString()}</span>
                        </div>
                      ))}
                    </div>
                  </div>
                )}
              </div>
            </div>
            <div className="device-label" style={{marginTop:8}}>iPhone 14 (375px)</div>
          </div>
          <div style={{flex:1,minWidth:280}}>
            <div className="tablet-frame">
              <div className="t-nav">
                <div style={{fontSize:13,fontWeight:700}}>뮤직웨이브</div>
                <div className="t-tabs">
                  {['피드','게임','투표','마이'].map((t,i)=><div key={i} className="t-tab">{t}</div>)}
                </div>
              </div>
              <div className="t-body">
                <div className="t-feed">
                  {POSTS.slice(0,4).map((p,i)=>(
                    <div key={i} className="t-mini-post">
                      <div className="t-mini-head">
                        <div className="t-mini-av" style={{background:['#0447ff','#16a34a','#d97706','#7c3aed'][i]}}/>
                        <div className="t-mini-author">{p.author}</div>
                        <div style={{marginLeft:'auto',fontSize:9,color:'var(--text2)'}}>{p.time}</div>
                      </div>
                      <div className="t-mini-body">{p.body.slice(0,52)}...</div>
                    </div>
                  ))}
                </div>
                <div className="t-aside">
                  <div className="t-aside-h">트렌드</div>
                  {['NewJeans','aespa','BTS','IVE','TWICE'].map((n,i)=>(
                    <div key={i} className="t-aside-item">{i+1}. {n}</div>
                  ))}
                </div>
              </div>
            </div>
            <div className="device-label" style={{marginTop:6,marginBottom:14}}>iPad Mini (768px)</div>
            <div className="check-card">
              <div className="check-title">크로스 브라우징 검증 결과</div>
              {[
                ['iOS Safari 터치 이벤트','통과'],
                ['Android Chrome 뷰포트','통과'],
                ['Safe Area Inset (dvh)','통과'],
                ['Firefox / Edge 호환','통과'],
                ['300ms 클릭 딜레이 제거','점검 중'],
              ].map(([l,s],i)=>(
                <div key={i} className="check-row"><span>{l}</span><span>{s}</span></div>
              ))}
            </div>
          </div>
        </div>
      </div>
    </div>
  );
}

function useToast(){
  const [msg,setMsg]=useState('');
  const timerRef=useRef(null);
  const show=(text)=>{
    setMsg(text);
    clearTimeout(timerRef.current);
    timerRef.current=setTimeout(()=>setMsg(''),2200);
  };
  useEffect(()=>()=>clearTimeout(timerRef.current),[]);
  return {msg,show};
}

function App(){
  const [view,setView]=useState('main');
  const [loggedIn,setLoggedIn]=useState(false);
  const toast=useToast();
  return(
    <div data-archetype="feed-timeline" style={{minHeight:'100vh',background:'var(--bg)'}}>
      <TopNav view={view} setView={setView} loggedIn={loggedIn} setLoggedIn={()=>{setLoggedIn(v=>!v);toast.show(loggedIn?'로그아웃되었습니다':'Discord 로그인 완료!');}}/>
      {view==='main'&&<FeedView onToast={toast.show}/>}
      {view==='vote'&&<VoteView onToast={toast.show}/>}
      {view==='game'&&<GameView/>}
      {view==='mobile'&&<MobileView/>}
      {toast.msg&&<div className="toast">{toast.msg}</div>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
