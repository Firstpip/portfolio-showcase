<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>비트트렌드 — 음악 게임 트렌드 플랫폼</title>
<link href="https://cdn.jsdelivr.net/npm/pretendard@1.3.9/dist/web/static/pretendard.min.css" rel="stylesheet">
<script src="https://unpkg.com/@phosphor-icons/web@2.1.1/src/index.js"></script>
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone@7.21.2/babel.min.js"></script>
<style>
:root{
  --bg:#ffffff;--surface:#f8f8f8;--border:#e8e8e8;
  --primary:#a0e0ab;--secondary:#181818;--accent:#6d6d6d;
  --text1:#000000;--text2:#9a9a9a;--text3:#5a5a5a;
  --nav-h:60px;
  --grad:linear-gradient(90deg,#a0e0ab 0%,#ffac2e 50%,#a52d25 100%);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Pretendard',sans-serif;background:var(--bg);color:var(--text1)}
@media(max-width:480px){
  .topnav-right{display:none!important}
  .topnav{padding:0 16px!important;gap:8px!important}
  .nav-tabs{gap:0!important}
  .nav-tab{padding:7px 12px!important;font-size:13px!important}
  .bento-layout{padding:20px 16px!important}
}

@keyframes countUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes barGrow{from{height:0}to{height:var(--h,100%)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes glowPulse{0%,100%{box-shadow:0 0 0 0 rgba(160,224,171,0.4)}50%{box-shadow:0 0 0 8px rgba(160,224,171,0)}}
@keyframes slideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}

.topnav{
  position:fixed;top:0;left:0;right:0;height:var(--nav-h);
  background:rgba(255,255,255,0.96);backdrop-filter:blur(12px);
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;padding:0 32px;gap:32px;z-index:100;
}
.logo{font-size:20px;font-weight:800;letter-spacing:-0.04em;cursor:pointer;color:var(--text1)}
.logo span{background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.nav-tabs{display:flex;gap:2px}
.nav-tab{
  padding:7px 18px;border:none;cursor:pointer;background:transparent;
  font-size:14px;font-family:'Pretendard',sans-serif;font-weight:500;
  color:var(--text2);transition:all 0.18s;border-radius:0;
}
.nav-tab:hover{color:var(--text1);background:var(--surface)}
.nav-tab.active{color:var(--text1);border-bottom:2px solid var(--secondary);background:transparent}
.topnav-right{margin-left:auto;display:flex;align-items:center;gap:12px}
.pill{
  padding:8px 22px;border-radius:75px;border:none;cursor:pointer;
  font-size:13px;font-weight:700;font-family:'Pretendard',sans-serif;
  transition:all 0.15s;display:inline-flex;align-items:center;gap:6px;
}
.pill.dark{background:var(--secondary);color:#fff}
.pill.dark:hover{opacity:0.85}
.pill.outline{background:transparent;border:1.5px solid var(--secondary);color:var(--text1)}
.pill.outline:hover{background:var(--surface)}
.pill.mint{background:var(--primary);color:var(--secondary)}
.pill.mint:hover{opacity:0.88}
.pill.ghost{background:var(--surface);color:var(--text3)}
.pill.ghost:hover{background:var(--border);color:var(--text1)}
.pill.ghost.on{background:var(--secondary);color:#fff}

/* Bento layout */
.bento-layout{
  margin-top:var(--nav-h);padding:28px 32px;min-height:calc(100vh - var(--nav-h));
}
.bento{
  display:grid;grid-template-columns:repeat(4,1fr);gap:16px;
  animation:fadeIn 0.4s ease;
}
.tile{
  background:#fff;border:1.5px solid var(--border);border-radius:16px;
  padding:22px;position:relative;overflow:hidden;
  box-shadow:0 1px 4px rgba(0,0,0,0.05);
  transition:transform 0.18s,box-shadow 0.18s;
  animation:slideUp 0.5s ease both;
}
.tile:nth-child(1){animation-delay:0.05s}
.tile:nth-child(2){animation-delay:0.10s}
.tile:nth-child(3){animation-delay:0.15s}
.tile:nth-child(4){animation-delay:0.20s}
.tile:nth-child(5){animation-delay:0.25s}
.tile:nth-child(6){animation-delay:0.30s}
.tile:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,0.10)}
.tile.feat{grid-column:span 2;grid-row:span 2}
.tile.wide{grid-column:span 2}
.tile.tall{grid-row:span 2}
.tile.dark-tile{background:var(--secondary);color:#fff;border-color:var(--secondary)}
.tile.dark-tile .tile-label{color:rgba(255,255,255,0.55)}
.tile.mint-tile{background:var(--primary);border-color:var(--primary)}
.tile-label{font-size:11px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:10px}
.tile-num{font-size:48px;font-weight:900;letter-spacing:-0.04em;line-height:1;animation:countUp 0.6s ease both}
.tile-unit{font-size:13px;color:var(--text2);margin-top:4px}
.tile-h2{font-size:18px;font-weight:800;letter-spacing:-0.03em;margin-bottom:8px}
.tile-sub{font-size:12px;color:var(--text2)}
.toast{
  position:fixed;bottom:28px;left:50%;transform:translateX(-50%);
  background:var(--secondary);color:#fff;padding:10px 22px;
  border-radius:75px;font-size:13px;font-weight:700;z-index:999;
  animation:slideUp 0.25s ease;pointer-events:none;white-space:nowrap;
}

/* SVG chart */
.chart-wrap{width:100%;height:160px;position:relative;margin-top:12px}
.chart-bar-group{display:flex;align-items:flex-end;gap:6px;height:140px;padding:0 4px}
.chart-bar{
  flex:1;background:var(--primary);border-radius:4px 4px 0 0;
  animation:barGrow 0.8s ease both;min-height:4px;
}
.chart-bar:nth-child(even){background:#a0e0ab88}
.chart-x{display:flex;gap:6px;margin-top:6px;padding:0 4px}
.chart-x-label{flex:1;font-size:10px;color:var(--text2);text-align:center}

/* Trend items */
.trend-item{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border)}
.trend-item:last-child{border-bottom:none}
.trend-rank{font-size:22px;font-weight:900;color:var(--border);width:24px}
.trend-name{flex:1;font-size:13px;font-weight:700}
.trend-bar{height:4px;border-radius:9999px;background:var(--primary);margin-top:3px}
.trend-count{font-size:11px;color:var(--text2)}

/* Activity feed */
.activity-item{display:flex;align-items:flex-start;gap:10px;padding:10px 0;border-bottom:1px solid var(--border)}
.activity-item:last-child{border-bottom:none}
.act-dot{width:8px;height:8px;border-radius:9999px;background:var(--primary);margin-top:5px;flex-shrink:0;animation:glowPulse 2s ease infinite}
.act-text{flex:1;font-size:12px;color:var(--text3);line-height:1.5}
.act-time{font-size:11px;color:var(--text2)}

/* Genre donut placeholder */
.donut-wrap{display:flex;align-items:center;justify-content:center;flex-direction:column;height:130px}

/* Music view */
.music-wrap{padding:28px 32px;margin-top:var(--nav-h)}
.music-inner{max-width:900px}
.section-h{font-size:24px;font-weight:900;letter-spacing:-0.04em;margin-bottom:6px}
.section-sub{font-size:14px;color:var(--text2);margin-bottom:28px}
.api-card{background:#fff;border:1.5px solid var(--border);border-radius:16px;padding:24px;margin-bottom:16px;transition:all 0.18s}
.api-card:hover{box-shadow:0 4px 16px rgba(0,0,0,0.06)}
.api-header{display:flex;align-items:center;gap:14px;margin-bottom:16px}
.api-logo{width:44px;height:44px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}
.api-name{font-size:16px;font-weight:800}
.api-status{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:75px;font-size:11px;font-weight:700;margin-left:auto}
.api-status.connected{background:rgba(160,224,171,0.2);color:#16a34a}
.api-status.pending{background:rgba(245,158,11,0.15);color:#d97706}
.api-status.error{background:rgba(239,68,68,0.12);color:#dc2626}
.api-metrics{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:16px}
.api-metric{background:var(--surface);border-radius:10px;padding:12px}
.api-metric-val{font-size:20px;font-weight:900;letter-spacing:-0.03em}
.api-metric-lbl{font-size:11px;color:var(--text2);margin-top:2px}
.search-row{display:flex;gap:10px;margin-bottom:12px}
.search-input{flex:1;padding:10px 16px;border:1.5px solid var(--border);border-radius:75px;font-size:14px;font-family:'Pretendard',sans-serif;outline:none;background:#fff}
.search-input:focus{border-color:var(--secondary)}
.track-result{display:flex;align-items:center;gap:12px;padding:10px 14px;border-radius:12px;background:var(--surface);margin-bottom:8px;cursor:pointer;transition:all 0.15s}
.track-result:hover{background:var(--border)}
.track-thumb{width:42px;height:42px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.track-name{font-size:13px;font-weight:700}
.track-artist{font-size:11px;color:var(--text2)}
.cache-badge{margin-left:auto;padding:2px 8px;border-radius:75px;font-size:10px;font-weight:700;background:rgba(160,224,171,0.25);color:#16a34a}

/* Editor view */
.editor-wrap{padding:28px 32px;margin-top:var(--nav-h)}
.editor-inner{max-width:900px}
.editor-split{display:flex;gap:20px}
.game-list-panel{width:280px;flex-shrink:0}
.game-item{
  display:flex;align-items:center;gap:10px;padding:12px 14px;
  border:1.5px solid var(--border);border-radius:12px;margin-bottom:8px;cursor:pointer;
  background:#fff;transition:all 0.15s;
}
.game-item:hover{background:var(--surface);border-color:var(--secondary)}
.game-item.active{border-color:var(--secondary);background:var(--surface)}
.game-item-icon{width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.game-item-name{font-size:13px;font-weight:700}
.game-item-status{font-size:11px;color:var(--text2)}
.game-tag{padding:2px 8px;border-radius:75px;font-size:10px;font-weight:700;margin-left:auto}
.game-tag.live{background:rgba(160,224,171,0.2);color:#16a34a}
.game-tag.draft{background:var(--surface);color:var(--text2)}
.game-tag.sched{background:rgba(245,158,11,0.15);color:#d97706}
.editor-panel{flex:1;background:#fff;border:1.5px solid var(--border);border-radius:16px;padding:24px}
.editor-h{font-size:16px;font-weight:800;margin-bottom:6px}
.editor-sub{font-size:12px;color:var(--text2);margin-bottom:20px}
.cand-list{margin-bottom:16px}
.cand-item{
  display:flex;align-items:center;gap:10px;padding:11px 14px;
  border:1.5px solid var(--border);border-radius:10px;margin-bottom:8px;
  background:#fff;cursor:grab;
  transition:all 0.15s;
}
.cand-item:hover{border-color:var(--secondary);box-shadow:0 2px 8px rgba(0,0,0,0.08)}
.cand-item.dragging{opacity:0.5}
.drag-handle{color:var(--text2);cursor:grab;margin-right:2px}
.cand-emoji{width:36px;height:36px;border-radius:8px;background:var(--surface);display:flex;align-items:center;justify-content:center;font-size:18px}
.cand-name{flex:1;font-size:13px;font-weight:700}
.cand-sub{font-size:11px;color:var(--text2)}
.del-btn{width:28px;height:28px;border-radius:75px;border:none;background:transparent;cursor:pointer;color:var(--text2);display:flex;align-items:center;justify-content:center;transition:all 0.15s}
.del-btn:hover{background:#fee2e2;color:#dc2626}
.schedule-row{display:flex;gap:10px;align-items:center;padding:12px 0;border-top:1px solid var(--border)}
.schedule-label{font-size:12px;color:var(--text2);width:80px}
.date-input{flex:1;padding:8px 12px;border:1.5px solid var(--border);border-radius:75px;font-size:13px;font-family:'Pretendard',sans-serif;outline:none}

/* Leaderboard view */
.lb-wrap{padding:28px 32px;margin-top:var(--nav-h)}
.lb-inner{max-width:900px}
.lb-grid{display:grid;grid-template-columns:2fr 1fr;gap:20px}
.lb-table{background:#fff;border:1.5px solid var(--border);border-radius:16px;overflow:hidden}
.lb-thead{display:grid;grid-template-columns:48px 1fr 120px 100px 80px;gap:0;background:var(--surface);padding:12px 20px;border-bottom:1.5px solid var(--border)}
.lb-th{font-size:11px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:0.05em}
.lb-row{display:grid;grid-template-columns:48px 1fr 120px 100px 80px;gap:0;padding:14px 20px;border-bottom:1px solid var(--border);align-items:center;transition:background 0.15s}
.lb-row:last-child{border-bottom:none}
.lb-row:hover{background:var(--surface)}
.lb-rank-cell{font-size:20px;font-weight:900}
.lb-user{display:flex;align-items:center;gap:10px}
.lb-av{width:32px;height:32px;border-radius:9999px;display:flex;align-items:center;justify-content:center;font-size:13px;color:#fff;font-weight:700;flex-shrink:0}
.lb-name{font-size:14px;font-weight:700}
.lb-guild{font-size:11px;color:var(--text2)}
.lb-score-cell{font-size:18px;font-weight:900;letter-spacing:-0.03em}
.lb-combo-cell{font-size:13px;font-weight:600;color:var(--text2)}
.lb-badge-cell{display:flex;gap:4px;flex-wrap:wrap}
.lb-badge{padding:2px 8px;border-radius:75px;font-size:10px;font-weight:700;background:rgba(160,224,171,0.2);color:#16a34a}

.stats-side{display:flex;flex-direction:column;gap:14px}
.stat-tile{background:#fff;border:1.5px solid var(--border);border-radius:16px;padding:20px}
.stat-tile-h{font-size:11px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:10px}
.stat-big{font-size:40px;font-weight:900;letter-spacing:-0.04em;animation:countUp 0.7s ease both}
.stat-sub{font-size:12px;color:var(--text2);margin-top:4px}
.discord-lb{margin-top:10px}
.discord-row{display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid var(--border);font-size:12px}
.discord-row:last-child{border-bottom:none}
.discord-rank{font-size:14px;font-weight:800;width:18px;color:var(--text2)}
.discord-name{flex:1;font-weight:600}
.discord-score{font-size:12px;font-weight:700}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useRef}=React;

// ===== TopNav =====
function TopNav({view,setView}){
  const tabs=[{id:'main',label:'트렌드'},{id:'music',label:'음원 연동'},{id:'editor',label:'게임 편집'},{id:'leaderboard',label:'리더보드'}];
  return(
    <nav className="topnav">
      <div className="logo" onClick={()=>setView('main')}>비트<span>트렌드</span></div>
      <div className="nav-tabs">
        {tabs.map(t=>(
          <button key={t.id} className={'nav-tab'+(view===t.id?' active':'')} onClick={()=>setView(t.id)}>{t.label}</button>
        ))}
      </div>
      <div className="topnav-right">
        <button className="pill outline" style={{padding:'6px 16px',fontSize:12}} onClick={()=>{}}>
          <i className="ph ph-bell"/>&nbsp;알림
        </button>
        <button className="pill dark" style={{padding:'6px 16px',fontSize:12}} onClick={()=>{}}>
          <i className="ph ph-user"/>&nbsp;관리자
        </button>
      </div>
    </nav>
  );
}

// ===== Trend View (bento-grid main) =====
const WEEK_DATA=[
  {label:'월',v:42},{label:'화',v:67},{label:'수',v:55},{label:'목',v:88},{label:'금',v:74},{label:'토',v:95},{label:'일',v:62},
];
const MAX_V=Math.max(...WEEK_DATA.map(d=>d.v));
const TRENDING_ARTISTS=[
  {name:'NewJeans',count:'4,821',pct:88},
  {name:'aespa',count:'3,940',pct:72},
  {name:'BTS',count:'3,512',pct:64},
  {name:'IVE',count:'2,890',pct:53},
  {name:'BLACKPINK',count:'2,340',pct:43},
];
const ACTIVITY=[
  {text:'이서연님이 여름 팝 월드컵에서 94콤보 달성',time:'방금'},
  {text:'"2024 힙합 배틀" 게임이 2,041명 참여를 돌파했습니다',time:'3분 전'},
  {text:'박준혁님이 NewJeans 투표에서 1위를 차지했습니다',time:'8분 전'},
  {text:'김태현님이 Discord 서버 뮤직팬 #3을 클리어했습니다',time:'15분 전'},
  {text:'신규 게임 "K-인디 최강자"가 오픈되었습니다',time:'22분 전'},
];

function TrendView({onToast}){
  const [period,setPeriod]=useState('weekly');
  const periods=[{id:'daily',label:'일간'},{id:'weekly',label:'주간'},{id:'monthly',label:'월간'}];
  return(
    <div className="bento-layout">
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:20}}>
        <div>
          <div style={{fontSize:22,fontWeight:900,letterSpacing:'-0.04em'}}>실시간 트렌드 대시보드</div>
          <div style={{fontSize:13,color:'var(--text2)',marginTop:4}}>투표·게임·음원 활동 현황 — Redis + Firestore 이중 집계</div>
        </div>
        <div style={{display:'flex',gap:4}}>
          {periods.map(p=>(
            <button key={p.id} className={'pill ghost'+(period===p.id?' on':'')} style={{padding:'6px 14px',fontSize:12}} onClick={()=>setPeriod(p.id)}>{p.label}</button>
          ))}
        </div>
      </div>
      <div className="bento">
        {/* Feature tile: Weekly chart (2x2) */}
        <div className="tile feat">
          <div className="tile-label"><i className="ph ph-chart-line-up"/> 투표 트렌드 — {period==='daily'?'오늘':period==='weekly'?'이번 주':'이번 달'}</div>
          <div className="tile-h2">총 <span style={{color:'var(--primary)'}}>18,503</span>표</div>
          <div className="tile-sub">전일 대비 <span style={{fontWeight:800,color:'#16a34a'}}>+12.4%</span></div>
          <div className="chart-wrap">
            <div className="chart-bar-group">
              {WEEK_DATA.map((d,i)=>(
                <div key={i} className="chart-bar" style={{'--h':(d.v/MAX_V*100)+'%',height:(d.v/MAX_V*100)+'%'}}/>
              ))}
            </div>
            <div className="chart-x">
              {WEEK_DATA.map((d,i)=><div key={i} className="chart-x-label">{d.label}</div>)}
            </div>
          </div>
          <svg width="0" height="0" style={{position:'absolute'}}>
            <defs>
              <linearGradient id="gradChart" x1="0%" y1="0%" x2="100%" y2="0%">
                <stop offset="0%" stopColor="#a0e0ab"/>
                <stop offset="50%" stopColor="#ffac2e"/>
                <stop offset="100%" stopColor="#a52d25"/>
              </linearGradient>
            </defs>
          </svg>
        </div>

        {/* Metric tiles */}
        <div className="tile" style={{animationDelay:'0.05s'}}>
          <div className="tile-label"><i className="ph ph-thumbs-up"/> 총 투표</div>
          <div className="tile-num" style={{animationDelay:'0.1s'}}>18,503</div>
          <div className="tile-unit">누적 투표 수</div>
        </div>
        <div className="tile" style={{animationDelay:'0.1s'}}>
          <div className="tile-label"><i className="ph ph-game-controller"/> 활성 플레이어</div>
          <div className="tile-num" style={{animationDelay:'0.15s',color:'var(--primary)'}}>2,041</div>
          <div className="tile-unit">지금 게임 중</div>
        </div>
        <div className="tile dark-tile" style={{animationDelay:'0.15s'}}>
          <div className="tile-label"><i className="ph ph-trophy"/> 리더보드</div>
          <div className="tile-num" style={{color:'var(--primary)',animationDelay:'0.2s'}}>892</div>
          <div className="tile-unit" style={{color:'rgba(255,255,255,0.5)'}}>랭킹 참여자</div>
        </div>
        <div className="tile" style={{animationDelay:'0.2s'}}>
          <div className="tile-label"><i className="ph ph-music-note"/> 오늘 완료</div>
          <div className="tile-num" style={{animationDelay:'0.25s'}}>134</div>
          <div className="tile-unit">게임 완료 횟수</div>
        </div>

        {/* Trending artists wide */}
        <div className="tile wide">
          <div className="tile-label"><i className="ph ph-fire"/> 트렌딩 아티스트</div>
          {TRENDING_ARTISTS.map((a,i)=>(

// ===== Toast hook =====
function useToast(){
  const [msg,setMsg]=useState('');
  const timerRef=useRef(null);
  const show=(text)=>{
    setMsg(text);
    clearTimeout(timerRef.current);
    timerRef.current=setTimeout(()=>setMsg(''),2200);
  };
  useEffect(()=>()=>clearTimeout(timerRef.current),[]);
  return {msg,show};
}

// ===== App =====
function App(){
  const [view,setView]=useState('main');
  const toast=useToast();
  return(
    <div data-archetype="bento-grid" style={{minHeight:'100vh',background:'var(--bg)'}}>
      <TopNav view={view} setView={setView}/>
      {view==='main'&&<TrendView onToast={toast.show}/>}
      {view==='music'&&<MusicView onToast={toast.show}/>}
      {view==='editor'&&<EditorView onToast={toast.show}/>}
      {view==='leaderboard'&&<LeaderboardView onToast={toast.show}/>}
      {toast.msg&&<div className="toast">{toast.msg}</div>}
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
