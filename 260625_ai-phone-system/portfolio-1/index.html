<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>실시간 AI 전화 응대 코어 시스템</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Pretendard:wght@300;400;500;600;700&display=swap">
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone@7.23.0/babel.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/lucide@0.344.0/dist/umd/lucide.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --void: #040506;
    --deep: #07080a;
    --graphite-700: #111214;
    --graphite-600: #1b1c1e;
    --graphite-500: #363739;
    --graphite-400: #454647;
    --slate-300: #6a6b6c;
    --slate-200: #9c9c9d;
    --ash: #e6e6e6;
    --snow: #ffffff;
    --ember: #ff6363;
    --ember-dark: #452324;
    --font: 'Pretendard', -apple-system, sans-serif;
    --r: 8px;
  }
  html, body { height: 100%; font-family: var(--font); background: var(--void); color: var(--snow); font-size: 14px; overflow: hidden; }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }
  @keyframes slideIn {
    from { opacity: 0; transform: translateY(-8px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0; }
  }
  @keyframes glow {
    0%, 100% { box-shadow: 0 0 4px rgba(255,99,99,0.3); }
    50% { box-shadow: 0 0 12px rgba(255,99,99,0.7); }
  }
  @keyframes shimmer {
    0% { background-position: -200% 0; }
    100% { background-position: 200% 0; }
  }

  /* Layout */
  #root { height: 100vh; display: flex; }
  [data-archetype="slack-3pane"] { display: flex; width: 100%; height: 100%; }

  /* Workspace strip */
  .workspace-strip {
    width: 64px; min-width: 64px; background: var(--graphite-700);
    display: flex; flex-direction: column; align-items: center;
    padding: 12px 0; gap: 4px; border-right: 1px solid var(--graphite-500);
  }
  .ws-item {
    width: 40px; height: 40px; border-radius: 12px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 13px; font-weight: 700; color: var(--slate-200);
    transition: all 0.15s; position: relative;
    background: var(--graphite-600);
  }
  .ws-item:hover { background: var(--graphite-500); color: var(--snow); }
  .ws-item.active { background: var(--ember); color: var(--snow); border-radius: 14px; }
  .ws-item .ws-badge {
    position: absolute; top: -2px; right: -2px;
    width: 16px; height: 16px; border-radius: 50%;
    background: var(--ember); color: var(--snow);
    font-size: 9px; font-weight: 700; display: flex; align-items: center; justify-content: center;
    border: 2px solid var(--graphite-700);
  }
  .ws-divider { width: 32px; height: 1px; background: var(--graphite-500); margin: 8px 0; }
  .ws-add { color: var(--slate-300); cursor: pointer; }
  .ws-add:hover { color: var(--snow); }

  /* Channel list */
  .channel-list {
    width: 260px; min-width: 260px; background: var(--graphite-700);
    display: flex; flex-direction: column; border-right: 1px solid var(--graphite-500);
    overflow: hidden;
  }
  .channel-header {
    padding: 14px 16px 8px; display: flex; align-items: center; justify-content: space-between;
    border-bottom: 1px solid var(--graphite-500);
  }
  .ws-name { font-size: 15px; font-weight: 700; color: var(--snow); }
  .header-actions { display: flex; gap: 6px; }
  .header-btn {
    width: 28px; height: 28px; border-radius: 6px; background: none;
    border: none; cursor: pointer; color: var(--slate-200);
    display: flex; align-items: center; justify-content: center;
  }
  .header-btn:hover { background: var(--graphite-500); color: var(--snow); }
  .channel-search {
    padding: 8px 12px; border-bottom: 1px solid rgba(255,255,255,0.05);
  }
  .channel-search input {
    width: 100%; background: var(--graphite-600); border: 1px solid var(--graphite-500);
    border-radius: 6px; padding: 6px 10px; color: var(--snow);
    font-size: 12px; outline: none; font-family: var(--font);
  }
  .channel-search input::placeholder { color: var(--slate-300); }
  .channel-body { flex: 1; overflow-y: auto; padding: 4px 0; }
  .channel-body::-webkit-scrollbar { width: 4px; }
  .channel-body::-webkit-scrollbar-thumb { background: var(--graphite-500); border-radius: 2px; }
  .section-header {
    padding: 12px 12px 4px; font-size: 11px; font-weight: 600;
    color: var(--slate-300); letter-spacing: 0.06em; text-transform: uppercase;
    display: flex; align-items: center; justify-content: space-between; cursor: pointer;
  }
  .section-header:hover { color: var(--snow); }
  .channel-item {
    display: flex; align-items: center; gap: 8px;
    padding: 5px 12px; cursor: pointer; border-radius: 4px; margin: 0 6px;
    color: var(--slate-200); font-size: 14px; transition: all 0.1s;
  }
  .channel-item:hover { background: var(--graphite-600); color: var(--snow); }
  .channel-item.active { background: rgba(255,99,99,0.15); color: var(--snow); font-weight: 500; }
  .channel-item.active .ch-prefix { color: var(--ember); }
  .ch-prefix { font-size: 13px; color: var(--slate-300); width: 14px; }
  .ch-name { flex: 1; }
  .ch-badge {
    background: var(--ember); color: var(--snow); border-radius: 10px;
    font-size: 10px; font-weight: 700; padding: 1px 6px; min-width: 18px; text-align: center;
  }
  .ch-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--ember); }
  .dm-item {
    display: flex; align-items: center; gap: 8px;
    padding: 5px 12px; cursor: pointer; border-radius: 4px; margin: 0 6px;
    color: var(--slate-200); font-size: 13px; transition: all 0.1s;
  }
  .dm-item:hover { background: var(--graphite-600); color: var(--snow); }
  .presence {
    width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
  }
  .presence.online { background: #59d499; animation: pulse 2s infinite; }
  .presence.away { background: #f0a500; }
  .presence.busy { background: var(--ember); }
  .presence.offline { background: var(--slate-300); }

  /* Main content */
  .conv-main {
    flex: 1; display: flex; flex-direction: column; background: var(--void); overflow: hidden;
    min-width: 0;
  }
  .conv-header {
    padding: 0 16px; height: 52px; border-bottom: 1px solid var(--graphite-500);
    display: flex; align-items: center; justify-content: space-between; flex-shrink: 0;
  }
  .conv-title-row { display: flex; align-items: center; gap: 8px; }
  .conv-prefix { color: var(--ember); font-size: 16px; }
  .conv-title { font-size: 15px; font-weight: 600; color: var(--snow); }
  .conv-meta { font-size: 11px; color: var(--slate-300); }
  .conv-actions { display: flex; gap: 4px; }
  .conv-btn {
    width: 32px; height: 32px; border-radius: 6px; background: none;
    border: none; cursor: pointer; color: var(--slate-200);
    display: flex; align-items: center; justify-content: center;
  }
  .conv-btn:hover { background: var(--graphite-600); color: var(--snow); }

  /* compose/filter bar */
  .compose-bar {
    padding: 10px 16px; border-bottom: 1px solid rgba(255,255,255,0.04);
    display: flex; align-items: center; gap: 8px; flex-shrink: 0; background: var(--graphite-700);
  }
  .filter-chip {
    padding: 4px 10px; border-radius: 16px; font-size: 11px; font-weight: 500;
    cursor: pointer; border: 1px solid var(--graphite-500); color: var(--slate-200);
    background: none; transition: all 0.15s;
  }
  .filter-chip:hover { border-color: var(--ember); color: var(--ember); }
  .filter-chip.active { background: rgba(255,99,99,0.15); border-color: var(--ember); color: var(--ember); }
  .live-badge {
    display: flex; align-items: center; gap: 5px; font-size: 11px; color: #59d499;
    font-weight: 500; margin-left: auto;
    animation: pulse 2s infinite;
  }
  .live-dot { width: 6px; height: 6px; border-radius: 50%; background: #59d499; }

  /* Stream (conv-body) */
  .conv-body { flex: 1; overflow-y: auto; padding: 12px 16px; display: flex; flex-direction: column; gap: 2px; }
  .conv-body::-webkit-scrollbar { width: 4px; }
  .conv-body::-webkit-scrollbar-thumb { background: var(--graphite-500); border-radius: 2px; }

  .call-card {
    background: var(--deep); border: 1px solid var(--graphite-500); border-radius: var(--r);
    padding: 12px 14px; cursor: pointer; transition: all 0.15s;
    animation: slideIn 0.2s ease;
  }
  .call-card:hover { border-color: var(--graphite-400); background: var(--graphite-700); }
  .call-card.active { border-color: var(--ember); background: rgba(255,99,99,0.05); }
  .call-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
  .call-num { font-size: 13px; font-weight: 600; color: var(--snow); font-family: 'Courier New', monospace; }
  .call-time { font-size: 11px; color: var(--slate-300); }
  .status-badge {
    padding: 2px 8px; border-radius: 10px; font-size: 10px; font-weight: 700;
    display: inline-flex; align-items: center; gap: 4px;
  }
  .status-badge.active-call { background: rgba(89,212,153,0.15); color: #59d499; border: 1px solid rgba(89,212,153,0.3); }
  .status-badge.waiting { background: rgba(240,165,0,0.15); color: #f0a500; border: 1px solid rgba(240,165,0,0.3); }
  .status-badge.operator { background: rgba(255,99,99,0.15); color: var(--ember); border: 1px solid rgba(255,99,99,0.3); }
  .status-badge.completed { background: rgba(106,107,108,0.2); color: var(--slate-200); border: 1px solid var(--graphite-500); }
  .call-stt {
    font-size: 12px; color: var(--slate-200); line-height: 1.5; margin-bottom: 6px;
    background: var(--graphite-700); padding: 6px 8px; border-radius: 4px;
    border-left: 2px solid var(--graphite-400);
  }
  .stt-live { border-left-color: var(--ember); }
  .cursor-blink { display: inline-block; width: 1px; height: 12px; background: var(--ember); vertical-align: middle; margin-left: 2px; animation: blink 1s infinite; }
  .call-tts {
    font-size: 12px; color: #59d499; line-height: 1.5;
    padding: 6px 8px; background: rgba(89,212,153,0.05); border-radius: 4px;
    border-left: 2px solid #59d499;
  }
  .call-footer { display: flex; align-items: center; justify-content: space-between; margin-top: 6px; }
  .call-tags { display: flex; gap: 4px; }
  .tag { padding: 1px 6px; border-radius: 4px; font-size: 10px; background: var(--graphite-600); color: var(--slate-200); }
  .call-actions { display: flex; gap: 4px; }
  .call-action-btn {
    padding: 4px 10px; border-radius: 4px; font-size: 11px; font-weight: 500;
    cursor: pointer; border: 1px solid var(--graphite-400); background: none;
    color: var(--slate-200); transition: all 0.15s; font-family: var(--font);
    display: flex; align-items: center; gap: 4px;
  }
  .call-action-btn:hover { border-color: var(--snow); color: var(--snow); }
  .call-action-btn.danger { border-color: rgba(255,99,99,0.4); color: var(--ember); }
  .call-action-btn.danger:hover { background: rgba(255,99,99,0.1); }

  /* Intervention view */
  .intervention-panel { padding: 16px; overflow-y: auto; flex: 1; }
  .intervention-panel::-webkit-scrollbar { width: 4px; }
  .intervention-panel::-webkit-scrollbar-thumb { background: var(--graphite-500); border-radius: 2px; }
  .int-header { margin-bottom: 16px; }
  .int-title { font-size: 32px; font-weight: 700; color: var(--snow); margin-bottom: 4px; letter-spacing: -0.5px; }
  .int-sub { font-size: 12px; color: var(--slate-300); }
  .active-call-box {
    background: var(--deep); border: 1px solid var(--ember); border-radius: var(--r);
    padding: 16px; margin-bottom: 16px; animation: glow 2s infinite;
  }
  .active-call-meta { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
  .active-call-num { font-size: 20px; font-weight: 700; color: var(--snow); font-family: 'Courier New', monospace; }
  .call-timer { font-size: 16px; font-weight: 600; color: var(--ember); font-family: 'Courier New', monospace; }
  .stt-stream {
    background: var(--graphite-700); border-radius: 6px; padding: 10px 12px;
    font-size: 12px; color: var(--slate-200); line-height: 1.6; max-height: 120px;
    overflow-y: auto; margin-bottom: 12px;
  }
  .stt-stream::-webkit-scrollbar { width: 3px; }
  .stt-stream::-webkit-scrollbar-thumb { background: var(--graphite-500); }
  .stt-pending { color: var(--slate-300); }
  .stt-confirmed { color: var(--snow); }
  .stt-ai { color: #59d499; }
  .int-controls { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 16px; }
  .int-btn {
    padding: 12px 8px; border-radius: var(--r); border: 1px solid; cursor: pointer;
    display: flex; flex-direction: column; align-items: center; gap: 6px;
    font-family: var(--font); font-size: 12px; font-weight: 600; transition: all 0.2s;
  }
  .int-btn-primary { background: rgba(255,99,99,0.1); border-color: var(--ember); color: var(--ember); }
  .int-btn-primary:hover { background: rgba(255,99,99,0.25); }
  .int-btn-secondary { background: rgba(89,212,153,0.1); border-color: #59d499; color: #59d499; }
  .int-btn-secondary:hover { background: rgba(89,212,153,0.25); }
  .int-btn-neutral { background: var(--graphite-700); border-color: var(--graphite-400); color: var(--slate-200); }
  .int-btn-neutral:hover { background: var(--graphite-600); color: var(--snow); }
  .int-btn-icon { font-size: 18px; }
  .int-history { }
  .history-title { font-size: 12px; font-weight: 600; color: var(--slate-300); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.06em; }
  .history-item {
    display: flex; align-items: flex-start; gap: 8px; padding: 8px 0;
    border-bottom: 1px solid rgba(255,255,255,0.04); font-size: 12px;
  }
  .history-dot { width: 6px; height: 6px; border-radius: 50%; margin-top: 5px; flex-shrink: 0; }
  .history-text { color: var(--slate-200); line-height: 1.4; }
  .history-time { color: var(--slate-300); font-size: 10px; margin-top: 2px; }

  /* RAG view */
  .rag-panel { padding: 16px; overflow-y: auto; flex: 1; }
  .rag-panel::-webkit-scrollbar { width: 4px; }
  .rag-panel::-webkit-scrollbar-thumb { background: var(--graphite-500); border-radius: 2px; }
  .rag-query-box { background: var(--deep); border: 1px solid var(--graphite-500); border-radius: var(--r); padding: 12px; margin-bottom: 16px; }
  .rag-query-label { font-size: 10px; color: var(--slate-300); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 4px; }
  .rag-query-text { font-size: 14px; color: var(--snow); }
  .rag-results-title { font-size: 12px; font-weight: 600; color: var(--slate-300); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 10px; }
  .rag-result-card {
    background: var(--deep); border: 1px solid var(--graphite-500); border-radius: 6px;
    padding: 12px; margin-bottom: 8px; transition: border-color 0.15s;
    animation: slideIn 0.25s ease;
  }
  .rag-result-card:hover { border-color: var(--graphite-400); }
  .rag-result-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 6px; }
  .rag-doc-name { font-size: 12px; font-weight: 600; color: var(--snow); }
  .rag-score { font-size: 10px; color: #59d499; font-weight: 700; background: rgba(89,212,153,0.1); padding: 2px 6px; border-radius: 4px; }
  .rag-excerpt { font-size: 12px; color: var(--slate-200); line-height: 1.5; }
  .rag-highlight { background: rgba(255,99,99,0.2); color: var(--ember); border-radius: 2px; padding: 0 2px; }
  .rag-tags-row { display: flex; gap: 4px; margin-top: 6px; }

  /* Queue view */
  .queue-panel { padding: 16px; overflow-y: auto; flex: 1; }
  .queue-panel::-webkit-scrollbar { width: 4px; }
  .queue-panel::-webkit-scrollbar-thumb { background: var(--graphite-500); border-radius: 2px; }
  .queue-stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 16px; }
  .queue-stat-card { background: var(--deep); border: 1px solid var(--graphite-500); border-radius: var(--r); padding: 12px; text-align: center; }
  .queue-stat-num { font-size: 40px; font-weight: 700; color: var(--snow); letter-spacing: -1px; line-height: 1; }
  .queue-stat-num.warning { color: #f0a500; }
  .queue-stat-num.live { color: #59d499; }
  .queue-stat-num.danger { color: var(--ember); }
  .queue-stat-label { font-size: 10px; color: var(--slate-300); margin-top: 2px; }
  .queue-list-title { font-size: 12px; font-weight: 600; color: var(--slate-300); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 8px; }
  .queue-row {
    display: flex; align-items: center; gap: 12px;
    padding: 10px 12px; background: var(--deep); border: 1px solid var(--graphite-500);
    border-radius: 6px; margin-bottom: 6px; cursor: pointer;
    transition: all 0.15s; animation: slideIn 0.2s ease;
  }
  .queue-row:hover { border-color: var(--graphite-400); background: var(--graphite-700); }
  .queue-rank { font-size: 11px; font-weight: 700; color: var(--slate-300); width: 20px; }
  .queue-phone { font-size: 13px; font-weight: 600; color: var(--snow); font-family: 'Courier New', monospace; flex: 1; }
  .queue-wait { font-size: 11px; color: var(--slate-300); }
  .queue-wait.alert { color: #f0a500; }
  .queue-assign-btn { padding: 4px 10px; border-radius: 4px; font-size: 11px; font-weight: 600; border: 1px solid rgba(255,99,99,0.4); background: none; color: var(--ember); cursor: pointer; font-family: var(--font); }
  .queue-assign-btn:hover { background: rgba(255,99,99,0.1); }

  /* Pipeline view */
  .pipeline-panel { padding: 16px; overflow-y: auto; flex: 1; }
  .pipeline-panel::-webkit-scrollbar { width: 4px; }
  .pipeline-panel::-webkit-scrollbar-thumb { background: var(--graphite-500); border-radius: 2px; }
  .pipeline-stages { display: flex; flex-direction: column; gap: 8px; margin-bottom: 16px; }
  .pipeline-stage { background: var(--deep); border: 1px solid var(--graphite-500); border-radius: var(--r); padding: 12px 14px; }
  .stage-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 6px; }
  .stage-name { font-size: 13px; font-weight: 600; color: var(--snow); display: flex; align-items: center; gap: 8px; }
  .stage-latency { font-size: 11px; color: var(--slate-300); font-family: 'Courier New', monospace; }
  .stage-ok { color: #59d499; }
  .stage-warn { color: #f0a500; }
  .progress-bar { height: 4px; background: var(--graphite-500); border-radius: 2px; overflow: hidden; margin-top: 4px; }
  .progress-fill { height: 100%; border-radius: 2px; transition: width 0.5s; }
  .progress-fill.green { background: linear-gradient(90deg, #59d499, #3ad98a); }
  .progress-fill.yellow { background: linear-gradient(90deg, #f0a500, #ffc833); }
  .provider-row { display: flex; align-items: center; gap: 6px; margin-top: 8px; }
  .provider-tag { padding: 3px 8px; border-radius: 4px; font-size: 11px; background: var(--graphite-600); border: 1px solid var(--graphite-400); color: var(--slate-200); }
  .provider-tag.active-provider { background: rgba(89,212,153,0.1); border-color: #59d499; color: #59d499; }
  .provider-tag.fallback { color: var(--slate-300); }

  /* Right info panel */
  .info-panel {
    width: 300px; min-width: 300px; background: var(--graphite-700);
    border-left: 1px solid var(--graphite-500);
    display: flex; flex-direction: column; overflow: hidden;
    transition: width 0.2s;
  }
  .info-panel.collapsed { width: 0; min-width: 0; }
  .info-header {
    padding: 14px 16px; border-bottom: 1px solid var(--graphite-500);
    display: flex; align-items: center; justify-content: space-between; flex-shrink: 0;
  }
  .info-title { font-size: 14px; font-weight: 600; color: var(--snow); }
  .info-close { background: none; border: none; cursor: pointer; color: var(--slate-200); display: flex; align-items: center; justify-content: center; padding: 4px; border-radius: 4px; }
  .info-close:hover { background: var(--graphite-600); color: var(--snow); }
  .info-body { flex: 1; overflow-y: auto; padding: 12px; }
  .info-body::-webkit-scrollbar { width: 4px; }
  .info-body::-webkit-scrollbar-thumb { background: var(--graphite-500); border-radius: 2px; }
  .info-section { margin-bottom: 16px; }
  .info-section-title { font-size: 11px; font-weight: 600; color: var(--slate-300); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 8px; }
  .info-row { display: flex; align-items: center; justify-content: space-between; padding: 6px 0; border-bottom: 1px solid rgba(255,255,255,0.04); font-size: 12px; }
  .info-label { color: var(--slate-300); }
  .info-value { color: var(--snow); font-weight: 500; }
  .info-value.good { color: #59d499; }
  .info-value.warn { color: #f0a500; }
  .member-item { display: flex; align-items: center; gap: 8px; padding: 6px 0; font-size: 12px; }

                { color: '#ff6363', text: '이준혁 담당자 → 직접 통화 개입 · C-4819', time: '14:23:41' },
                { color: '#59d499', text: 'AI 재개 · C-4819 (이준혁 담당자 종료)', time: '14:21:18' },
                { color: '#f0a500', text: '콜백 전환 · C-4812 (박소현 담당자)', time: '13:55:07' },
                { color: '#6a6b6c', text: '담당자 알림 발송 · C-4810 (민감 발화 감지)', time: '13:41:22' },
                { color: '#ff6363', text: '김민서 담당자 → 직접 통화 개입 · C-4808', time: '13:28:44' },
              ].map((h, i) => (
                <div key={i} className="history-item">
                  <span className="history-dot" style={{background:h.color}}></span>
                  <div>
                    <div className="history-text">{h.text}</div>
                    <div className="history-time">{h.time}</div>
                  </div>
                </div>
              ))}
            </div>
          </div>
        )}

        {view === 'rag' && (
          <div className="rag-panel">
            <div className="rag-query-box">
              <div className="rag-query-label">현재 고객 발화 (C-4821)</div>
              <div className="rag-query-text">환불 규정에 대해 문의드리고 싶습니다. 지난달에 구매한 제품인데 사용 중에 문제가 생겨서요.</div>
            </div>
            <div className="rag-results-title">검색 결과 (3건 · 코사인 유사도 순)</div>
            {RAG_RESULTS.map(r => (
              <div key={r.id} className="rag-result-card">
                <div className="rag-result-top">
                  <span className="rag-doc-name"><i data-lucide="file-text" style={{width:12,height:12,verticalAlign:'middle',marginRight:4}}></i>{r.doc}</span>
                  <span className="rag-score">유사도 {r.score}%</span>
                </div>
                <div className="rag-excerpt">
                  {r.excerpt.split(r.highlights[0])[0]}
                  <span className="rag-highlight">{r.highlights[0]}</span>
                  {r.excerpt.split(r.highlights[0])[1]}
                </div>
                <div className="rag-tags-row">
                  {r.tags.map(t => <span key={t} className="tag">{t}</span>)}
                  <button style={{marginLeft:'auto',background:'none',border:'1px solid var(--graphite-400)',borderRadius:4,padding:'2px 8px',fontSize:10,color:'var(--slate-200)',cursor:'pointer',fontFamily:'var(--font)'}} onClick={()=>showToast('LLM 컨텍스트에 주입')}>컨텍스트 주입</button>
                </div>
              </div>
            ))}
            <div style={{marginTop:16,padding:12,background:'var(--deep)',borderRadius:8,border:'1px solid var(--graphite-500)'}}>
              <div style={{fontSize:11,color:'var(--slate-300)',marginBottom:6}}>RAG 파이프라인 상태</div>
              {[['임베딩 모델','OpenAI text-embedding-3-small'],['벡터 DB','pgvector (Supabase)'],['검색 방식','코사인 유사도 Top-K'],['캐시','TTL 300초 (Redis)'],['평균 검색 시간','28ms']].map(([k,v])=>(
                <div key={k} className="info-row"><span className="info-label">{k}</span><span className="info-value">{v}</span></div>
              ))}
            </div>
          </div>
        )}

        {view === 'queue' && (
          <div className="queue-panel">
            <div className="queue-stats">
              <div className="queue-stat-card"><div className="queue-stat-num live">7</div><div className="queue-stat-label">AI 처리 중</div></div>
              <div className="queue-stat-card"><div className="queue-stat-num warning">3</div><div className="queue-stat-label">대기 중</div></div>
              <div className="queue-stat-card"><div className="queue-stat-num danger">2</div><div className="queue-stat-label">개입 필요</div></div>
              <div className="queue-stat-card"><div className="queue-stat-num">24</div><div className="queue-stat-label">오늘 완료</div></div>
            </div>
            <div className="queue-list-title">대기 큐 (우선순위 순)</div>
            {QUEUE_ITEMS.map(item => (
              <div key={item.rank} className="queue-row" onClick={()=>handleCallSelect('C-48'+item.rank+'0')}>
                <span className="queue-rank">#{item.rank}</span>
                <div>
                  <div className="queue-phone">{item.phone}</div>
                  <div style={{fontSize:10,color:'var(--slate-300)'}}>{item.type}</div>
                </div>
                <span className={`queue-wait ${parseInt(item.wait.split(':')[0])>2?'alert':''}`}>
                  <i data-lucide="clock" style={{width:10,height:10,verticalAlign:'middle',marginRight:3}}></i>{item.wait}
                </span>
                <span className={`status-badge ${item.priority==='urgent'?'operator':item.priority==='high'?'active-call':'waiting'}`}>{item.type}</span>
                <button className="queue-assign-btn" onClick={(e)=>{e.stopPropagation();handleAssign(item.phone);}}>배정</button>
              </div>
            ))}
          </div>
        )}

        {view === 'pipeline' && (
          <div className="pipeline-panel">
            <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:16}}>
              <div>
                <div style={{fontSize:36,fontWeight:700,color:'var(--snow)',letterSpacing:'-1px',lineHeight:1}}>파이프라인 헬스</div>
                <div style={{fontSize:11,color:'var(--slate-300)',marginTop:4}}>모든 스테이지 정상 운영 중</div>
              </div>
              <div style={{display:'flex',alignItems:'center',gap:6,background:'rgba(89,212,153,0.1)',padding:'6px 12px',borderRadius:8,border:'1px solid rgba(89,212,153,0.3)'}}>
                <span style={{fontSize:11,color:'#59d499',fontWeight:600}}>전체 업타임 99.7%</span>
              </div>
            </div>
            <div className="pipeline-stages">
              {PIPELINE_STAGES.map(stage => (
                <div key={stage.name} className="pipeline-stage">
                  <div className="stage-header">
                    <div className="stage-name">
                      <i data-lucide="activity" style={{width:14,height:14,color:'#59d499'}}></i>
                      {stage.name}
                    </div>
                    <span className={`stage-latency ${stage.health >= 95 ? 'stage-ok' : 'stage-warn'}`}>
                      {stage.latency} · 업타임 {stage.health}%
                    </span>
                  </div>
                  <div className="progress-bar">
                    <div className={`progress-fill ${stage.health >= 95 ? 'green' : 'yellow'}`} style={{width:stage.health+'%'}}></div>
                  </div>
                  <div className="provider-row">
                    {stage.providers.map(p => (
                      <span key={p} className={`provider-tag ${p === stage.active ? 'active-provider' : 'fallback'}`}>{p}</span>
                    ))}
                  </div>
                </div>
              ))}
            </div>
            <div style={{background:'var(--deep)',border:'1px solid var(--graphite-500)',borderRadius:8,padding:12}}>
              <div style={{fontSize:11,color:'var(--slate-300)',marginBottom:8}}>Bull Queue 상태 (동시 콜 처리)</div>
              {[['Active','5개'],['Waiting','3개'],['Completed','247개 (오늘)'],['Failed','0개'],['Redis 메모리','128MB / 512MB']].map(([k,v])=>(
                <div key={k} className="info-row"><span className="info-label">{k}</span><span className="info-value good">{v}</span></div>
              ))}
            </div>
          </div>
        )}

        {/* Input footer */}
        <footer className="conv-input">
          <textarea
            ref={inputRef}
            className="msg-input"
            placeholder={`#${CHANNELS.find(c=>c.id===view)?.name}에 메시지 작성…`}
            rows={1}
            value={inputVal}
            onChange={e=>setInputVal(e.target.value)}
          />
          <div className="input-actions">
            <button className="input-btn" onClick={()=>showToast('파일 첨부')}>
              <i data-lucide="paperclip" style={{width:16,height:16}}></i>
            </button>
            <button className="input-btn" onClick={()=>showToast('이모지 선택')}>
              <i data-lucide="smile" style={{width:16,height:16}}></i>
            </button>
            <button className="send-btn" onClick={handleSend}>
              <i data-lucide="send" style={{width:14,height:14}}></i>
            </button>
          </div>
        </footer>
      </main>

      {/* Right info panel */}
      <aside className={`info-panel ${infoPanelOpen ? '' : 'collapsed'}`} data-info-panel>
        {infoPanelOpen && (
          <>
            <header className="info-header">
              <h3 className="info-title">
                {view === 'main' ? '콜 상세 정보' : view === 'intervention' ? '담당자 현황' : view === 'rag' ? 'RAG 레퍼런스' : view === 'queue' ? '큐 통계' : '시스템 상태'}
              </h3>
              <button className="info-close" onClick={()=>setInfoPanelOpen(false)}>
                <i data-lucide="x" style={{width:16,height:16}}></i>
              </button>
            </header>
            <div className="info-body">
              {view === 'main' && (
                <>
                  <div className="info-section">
                    <div className="info-section-title">선택된 콜</div>
                    {[['콜 ID','C-4821'],['발신 번호','010-3847-5621'],['상태','AI 응대 중'],['통화 시간','02:34'],['카테고리','환불/반품'],['RAG 매칭','3건 (94.2%)']].map(([k,v])=>(
                      <div key={k} className="info-row">
                        <span className="info-label">{k}</span>
                        <span className={`info-value ${k==='상태'?'good':''}`}>{v}</span>
                      </div>
                    ))}
                  </div>
                  <div className="info-section">
                    <div className="info-section-title">오늘 통계</div>
                    {[['총 수신','31콜'],['AI 처리','26콜 (84%)'],['담당자 개입','5콜'],['평균 처리','3분 12초'],['미해결','2건']].map(([k,v])=>(
                      <div key={k} className="info-row"><span className="info-label">{k}</span><span className="info-value">{v}</span></div>
                    ))}
                  </div>
                  <div className="info-section">
                    <div className="info-section-title">담당자 ({MEMBERS.length}명)</div>
                    {MEMBERS.map(m => (
                      <div key={m.name} className="member-item">
                        <div className="member-avatar" style={{background:m.status==='online'?'#1a4d35':m.status==='busy'?'#4d1a1a':'#2a2a2a'}}>{m.initial}</div>
                        <div>
                          <div className="member-name">{m.name}</div>
                          <div className="member-role">{m.role} · <span style={{color:m.status==='online'?'#59d499':m.status==='busy'?'#ff6363':m.status==='away'?'#f0a500':'#6a6b6c'}}>{m.status}</span></div>
                        </div>
                      </div>
                    ))}
                  </div>
                </>
              )}
              {view === 'rag' && (
                <>
                  <div className="info-section">
                    <div className="info-section-title">문서 카탈로그</div>
                    {[
                      {title:'환불 및 반품 규정', sub:'v2.3 · 2026.06.01 업데이트', sim:'94%'},
                      {title:'FAQ 제품 하자 처리', sub:'v1.8 · 2026.05.15 업데이트', sim:'88%'},
                      {title:'고객 서비스 안내', sub:'v3.1 · 2026.06.10 업데이트', sim:'72%'},
                      {title:'서비스 이용약관', sub:'v5.0 · 2026.04.01 업데이트', sim:'45%'},
                      {title:'환불 처리 SLA', sub:'v1.2 · 2026.03.20 업데이트', sim:'38%'},
                    ].map(d => (
                      <div key={d.title} className="rag-ref-item" onClick={()=>showToast(d.title+' 문서 열기')}>
                        <span className="rag-sim">{d.sim}</span>
                        <div className="rag-ref-title">{d.title}</div>
                        <div className="rag-ref-sub">{d.sub}</div>
                      </div>
                    ))}
                  </div>
                </>
              )}
              {(view === 'queue' || view === 'pipeline') && (
                <div className="info-section">
                  <div className="info-section-title">Firebase RTDB 상태</div>
                  {[['연결','정상 (WS)'],['지연','8ms'],['이벤트/초','47'],['오늘 이벤트','12,847'],['에러율','0.002%']].map(([k,v])=>(
                    <div key={k} className="info-row"><span className="info-label">{k}</span><span className="info-value good">{v}</span></div>
                  ))}
                </div>
              )}
              {view === 'intervention' && (
                <div className="info-section">
                  <div className="info-section-title">담당자 가용 현황</div>
                  {MEMBERS.filter(m=>m.status!=='offline').map(m => (
                    <div key={m.name} className="member-item">
                      <div className="member-avatar" style={{background:m.status==='online'?'#1a4d35':m.status==='busy'?'#4d1a1a':'#2a2a2a'}}>{m.initial}</div>
                      <div style={{flex:1}}>
                        <div className="member-name">{m.name}</div>
                        <div className="member-role">{m.role}</div>
                      </div>
                      <button style={{padding:'3px 8px',borderRadius:4,fontSize:10,fontWeight:600,border:'1px solid',borderColor:m.status==='online'?'#59d499':'#f0a500',background:'none',color:m.status==='online'?'#59d499':'#f0a500',cursor:'pointer',fontFamily:'var(--font)'}} onClick={()=>showToast(m.name+' 호출')}>
                        {m.status==='online'?'호출':'대기 중'}
                      </button>
                    </div>
                  ))}
                </div>
              )}
            </div>
          </>
        )}
      </aside>

      {toast && <div className="toast">{toast}</div>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
