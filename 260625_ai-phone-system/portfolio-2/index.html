  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --ink: #101010;
    --graphite: #242424;
    --slate: #6b7280;
    --stone: #898989;
    --silver: #e5e7eb;
    --paper: #f4f4f4;
    --white: #ffffff;
    --action-blue: #0099ff;
    --emerald: #3ad98a;
    --emerald-light: rgba(58,217,138,0.08);
    --emerald-mid: rgba(58,217,138,0.15);
    --font: 'Pretendard', -apple-system, sans-serif;
    --r: 12px;
  }
  html, body { height: 100%; font-family: var(--font); background: var(--paper); color: var(--ink); font-size: 14px; overflow-x: hidden; }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes countUp {
    from { opacity: 0; transform: scale(0.8); }
    to { opacity: 1; transform: scale(1); }
  }
  @keyframes shimmer {
    0% { background-position: -400% 0; }
    100% { background-position: 400% 0; }
  }
  @keyframes pulseGreen {
    0%, 100% { box-shadow: 0 0 0 0 rgba(58,217,138,0.4); }
    50% { box-shadow: 0 0 0 6px rgba(58,217,138,0); }
  }
  @keyframes barGrow {

    to { width: var(--bar-w, 70%); }
  }
  @keyframes waveBar {

  }
  @keyframes wavePulse {

  /* Topbar */
  .topbar {

  .logo-text { font-size: 16px; font-weight: 700; color: var(--ink); letter-spacing: -0.3px; }
  .topbar-nav { display: flex; align-items: center; gap: 2px; }
  .nav-btn {
    padding: 8px 14px; border-radius: 8px; border: none; background: none;

  .nav-btn:hover { background: var(--paper); color: var(--ink); }
  .nav-btn.active { background: var(--paper); color: var(--ink); font-weight: 600; }
  .topbar-right { display: flex; align-items: center; gap: 10px; }
  .topbar-action {

    cursor: pointer; border: 1.5px solid; font-family: var(--font); transition: all 0.15s;
  }
  .topbar-action.outline { background: var(--white); border-color: var(--silver); color: var(--ink); }
  .topbar-action.outline:hover { border-color: var(--ink); }
  .topbar-action.filled { background: var(--ink); border-color: var(--ink); color: var(--white); }
  .topbar-action.filled:hover { background: #222; }
  .avatar { width: 32px; height: 32px; border-radius: 8px; background: var(--emerald); display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; color: var(--white); cursor: pointer; }

  /* Status strip */

  .strip-dot { width: 6px; height: 6px; border-radius: 50%; }
  .strip-label { font-size: 11px; color: var(--slate); font-weight: 500; }
  .strip-val { font-size: 13px; font-weight: 700; color: var(--ink); }
  .strip-divider { width: 1px; height: 20px; background: var(--silver); }

  /* Main layout */
  #root { min-height: 100vh; display: flex; flex-direction: column; }
  .main-container { flex: 1; padding: 20px 24px 40px; }

  /* Bento grid */
  .bento {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 14px;
    animation: fadeIn 0.3s ease;
  }

  .tile {
    background: var(--white); border-radius: var(--r);
    border: 1px solid var(--silver); padding: 16px;

  .tile-num { font-size: 36px; font-weight: 700; color: var(--ink); letter-spacing: -0.5px; animation: countUp 0.5s ease; }
  .tile-sub { font-size: 12px; color: var(--slate); margin-top: 4px; }
  .tile-delta { font-size: 11px; font-weight: 600; margin-top: 6px; }
  .delta-up { color: var(--emerald); }
  .delta-down { color: #ef4444; }

  /* Feature tile (2x2) */

  .tile-wide { grid-column: span 2; }
  .tile-tall { grid-row: span 2; }

  .bar-track { flex: 1; height: 6px; background: var(--paper); border-radius: 3px; overflow: hidden; }

  .bar-fill.emerald { background: var(--emerald); }
  .bar-fill.blue { background: var(--action-blue); }
  .bar-fill.gray { background: var(--stone); }
  .bar-val { font-size: 11px; color: var(--ink); font-weight: 600; width: 36px; text-align: right; }

  .report-label { color: var(--slate); }

  .progress-ring { position: relative; width: 80px; height: 80px; }
  .progress-ring svg { transform: rotate(-90deg); }
  .progress-ring-label { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; }
  .ring-num { font-size: 18px; font-weight: 700; color: var(--ink); }
  .ring-sub { font-size: 9px; color: var(--slate); }

  .chip {

  .btn-primary { background: var(--ink); color: var(--white); border: none; padding: 8px 16px; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; font-family: var(--font); transition: background 0.15s; }
  .btn-primary:hover { background: #222; }
  .btn-outline { background: var(--white); color: var(--ink); border: 1.5px solid var(--silver); padding: 7px 14px; border-radius: 8px; font-size: 13px; font-weight: 500; cursor: pointer; font-family: var(--font); transition: all 0.15s; }
  .btn-outline:hover { border-color: var(--ink); }
  .btn-emerald { background: var(--emerald); color: var(--white); border: none; padding: 8px 16px; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; font-family: var(--font); transition: all 0.15s; }
  .btn-emerald:hover { background: #2bc77a; }
  .btn-ghost { background: none; border: none; color: var(--slate); font-size: 12px; cursor: pointer; font-family: var(--font); padding: 4px 8px; border-radius: 6px; transition: all 0.15s; }
  .btn-ghost:hover { background: var(--paper); color: var(--ink); }

  /* Toast */
  .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: var(--ink); color: var(--white); padding: 10px 20px; border-radius: 8px; font-size: 13px; z-index: 100; animation: fadeIn 0.2s ease; }

  /* Section title */
  .section-title { font-size: 20px; font-weight: 700; color: var(--ink); letter-spacing: -0.3px; margin-bottom: 6px; }
  .section-sub { font-size: 13px; color: var(--slate); margin-bottom: 16px; }

  /* Divider */
  .divider { height: 1px; background: var(--silver); margin: 12px 0; }

  /* Scrollable */
  .scrollable { overflow-y: auto; max-height: 300px; }
  .scrollable::-webkit-scrollbar { width: 4px; }
  .scrollable::-webkit-scrollbar-thumb { background: var(--silver); border-radius: 2px; }
</style>

function WaveformViz() {
  const BARS = 52;
  const raw = Array.from({length: BARS}, (_, i) => {
    const x = i / BARS;
    return 15 + Math.abs(Math.sin(x * Math.PI * 4.5)) * 55 + Math.abs(Math.sin(x * Math.PI * 9 + 0.8)) * 22;
  });
  return (
    <div style={{display:'flex',alignItems:'center',gap:3,height:72,flexShrink:0}}>
      {raw.map((h, i) => {
        const isActive = i >= 20 && i <= 30;
        const delay = ((i * 0.07) % 0.9).toFixed(2);
        const dur = (0.38 + (i % 7) * 0.08).toFixed(2);
        return (
          <div key={i} style={{
            width: 5,
            height: Math.round(Math.min(h, 88)) + '%',
            borderRadius: 3,
            background: isActive ? '#3ad98a' : i < 20 ? 'rgba(16,16,16,0.22)' : 'rgba(16,16,16,0.1)',
            animation: `waveBar ${dur}s ease-in-out ${delay}s infinite`,
            transformOrigin: 'center',
          }} />
        );
      })}
    </div>
  );
}

                  {cat:'장애 신고', cnt:2, suggestion:'긴급 장애 처리 절차 업데이트 필요 (v2.0 인덱싱 완료)'},
                  {cat:'기타', cnt:1, suggestion:'미분류 문의 1건 — 카테고리 분류 후 FAQ 등록 검토'},
                ].map((s,i)=>(
                  <div key={i} style={{display:'flex',alignItems:'flex-start',gap:10,padding:'8px 0',borderBottom:'1px solid var(--silver)'}}>
                    <span style={{padding:'2px 6px',borderRadius:4,fontSize:10,fontWeight:600,background:'rgba(240,165,0,0.1)',color:'#b45309',flexShrink:0}}>{s.cat} {s.cnt}건</span>
                    <span style={{fontSize:12,color:'var(--ink)',flex:1}}>{s.suggestion}</span>
                    <button className="btn-outline" style={{padding:'4px 10px',fontSize:11}} onClick={()=>showToast('문서 생성 시작')}>문서 생성</button>
                  </div>
                ))}
              </section>
            </main>
          </>
        )}

        {view === 'alerts' && (
          <>
            <div className="section-title">예외 처리 알림</div>
            <div className="section-sub">민감 발화 감지·오답·미해결 사례 실시간 관리</div>
            <main className="bento">
              {/* Alert feed (2x2) */}
              <section className="tile tile-feature">
                <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:12}}>
                  <div className="tile-title" style={{marginBottom:0}}><ph-bell-ringing style={{fontSize:13}}></ph-bell-ringing>실시간 알림</div>
                  <div style={{display:'flex',gap:6}}>
                    <button className="btn-outline" style={{padding:'4px 10px',fontSize:11}} onClick={()=>showToast('전체 알림 확인 처리')}>전체 확인</button>
                  </div>
                </div>
                <div className="scrollable">
                  {ALERTS.map(a => (
                    <div key={a.id} className={`alert-item ${a.type}`} onClick={()=>showToast(a.id+' 처리')}>
                      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:4}}>
                        <span className="alert-title">{a.title}</span>
                        {a.score && <span style={{fontSize:10,color:'#ef4444',fontWeight:600}}>신뢰도 {a.score}%</span>}
                      </div>
                      <div className="alert-desc">{a.desc}</div>
                      <div className="alert-time">{a.time}</div>
                    </div>
                  ))}
                </div>
              </section>

              {/* 감지 설정 */}
              <section className="tile tile-tall">
                <div className="tile-title"><ph-sliders style={{fontSize:12}}></ph-sliders>민감도 임계값 설정</div>
                {[
                  {label:'민감 발화 감지', val:70, desc:'0~100 점수 기준'},
                  {label:'오답 감지', val:50, desc:'AI 신뢰도 하한'},
                  {label:'RAG 미매칭 임계', val:60, desc:'유사도 하한'},
                ].map((s,i)=>(
                  <div key={i} style={{marginBottom:14}}>
                    <div style={{display:'flex',justifyContent:'space-between',marginBottom:4}}>
                      <span style={{fontSize:12,fontWeight:500,color:'var(--ink)'}}>{s.label}</span>
                      <span style={{fontSize:12,fontWeight:700,color:'var(--emerald)'}}>{s.val}</span>
                    </div>
                    <div style={{height:6,background:'var(--silver)',borderRadius:3,overflow:'hidden'}}>
                      <div style={{height:'100%',width:s.val+'%',background:'var(--emerald)',borderRadius:3,transition:'width 0.3s'}}></div>
                    </div>
                    <div style={{fontSize:10,color:'var(--stone)',marginTop:2}}>{s.desc}</div>
                    <button style={{marginTop:6,padding:'5px 10px',borderRadius:6,border:'1px solid var(--silver)',background:'var(--white)',fontSize:11,cursor:'pointer',fontFamily:'var(--font)',color:'var(--ink)'}} onClick={()=>showToast(s.label+' 설정 변경')}>값 변경</button>
                  </div>
                ))}
              </section>

              {/* 알림 통계 */}
              <section className="tile">
                <div className="tile-title"><ph-chart-bar style={{fontSize:12}}></ph-chart-bar>오늘 알림 통계</div>
                <div className="tile-num">6</div>
                <div className="tile-sub">오늘 발생 알림</div>
                <div className="divider"/>
                {[['긴급','2건'],['경고','2건'],['정보','2건'],['처리 완료','4건']].map(([k,v])=>(
                  <div key={k} className="report-row"><span className="report-label">{k}</span><span className="report-value">{v}</span></div>
                ))}
              </section>

              {/* FCM 알림 설정 wide */}
              <section className="tile tile-wide">
                <div className="tile-title"><ph-device-mobile style={{fontSize:12}}></ph-device-mobile>FCM 알림 채널 설정</div>
                {[
                  {name:'김민서 (운영팀장)', events:['긴급','경고','정보'], device:'iPhone 15'},
                  {name:'이준혁 (담당자)', events:['긴급','경고'], device:'Galaxy S24'},
                  {name:'박소현 (담당자)', events:['긴급'], device:'iPhone 14'},
                ].map((m,i)=>(
                  <div key={i} style={{display:'flex',alignItems:'center',gap:10,padding:'8px 0',borderBottom:'1px solid var(--silver)'}}>
                    <div style={{width:28,height:28,borderRadius:8,background:'var(--paper)',display:'flex',alignItems:'center',justifyContent:'center',fontWeight:700,fontSize:12,flexShrink:0}}>{m.name[0]}</div>
                    <div style={{flex:1}}>
                      <div style={{fontSize:12,fontWeight:500,color:'var(--ink)'}}>{m.name}</div>
                      <div style={{fontSize:10,color:'var(--stone)'}}>{m.device}</div>
                    </div>
                    <div style={{display:'flex',gap:4}}>
                      {m.events.map(e=><span key={e} className={`doc-badge ${e==='긴급'?'badge-green':'badge-blue'}`}>{e}</span>)}
                    </div>
                    <button className="btn-ghost" onClick={()=>showToast(m.name+' 알림 설정 변경')}>편집</button>
                  </div>
                ))}
              </section>
            </main>
          </>
        )}

        {view === 'api' && (
          <>
            <div className="section-title">API 연동</div>
            <div className="section-sub">REST API 및 WebSocket 이벤트 스트림 관리</div>
            <main className="bento">
              {/* REST API list (2x2) */}
              <section className="tile tile-feature">
                <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:12}}>
                  <div className="tile-title" style={{marginBottom:0}}><ph-plug style={{fontSize:13}}></ph-plug>REST API 엔드포인트</div>
                  <button className="btn-outline" style={{padding:'5px 12px',fontSize:11}} onClick={()=>showToast('Swagger UI 열기')}>Swagger UI</button>
                </div>
                <div className="chip-row">
                  {['전체','GET','POST','DELETE'].map(c=>(
                    <button key={c} className="chip" onClick={()=>showToast(c+' 필터')}>{c}</button>
                  ))}
                </div>
                <div className="scrollable">
                  {API_ENDPOINTS.map((ep,i)=>(
                    <div key={i} className="api-endpoint" onClick={()=>showToast('API 테스트: '+ep.path)}>
                      <span className={`method-badge ${ep.method==='GET'?'method-get':ep.method==='POST'?'method-post':'method-delete'}`}>{ep.method}</span>
                      <span className="api-path">{ep.path}</span>
                      <span className="api-desc">{ep.desc}</span>
                    </div>
                  ))}
                </div>
              </section>

              {/* WebSocket 이벤트 */}
              <section className="tile tile-tall">
                <div className="tile-title"><ph-lightning style={{fontSize:12}}></ph-lightning>WebSocket 이벤트</div>
                {WS_EVENTS.map((ev,i)=>(
                  <div key={i} className="ws-event" onClick={()=>showToast(ev.event+' 구독 설정')}>
                    <span className="ws-label">{ev.event}</span>
                    <div style={{textAlign:'right'}}>
                      <div style={{fontSize:10,color:'var(--slate)'}}>{ev.desc}</div>
                      <div style={{fontSize:10,color:'var(--stone)'}}>{ev.freq}</div>
                    </div>
                  </div>
                ))}
                <div className="divider"/>
                <div style={{fontSize:11,color:'var(--slate)'}}>연결 URL: <code style={{fontSize:10,background:'var(--paper)',padding:'2px 5px',borderRadius:4}}>wss://api.example.com/ws</code></div>
              </section>

              {/* API 사용 통계 */}
              <section className="tile">
                <div className="tile-title"><ph-activity style={{fontSize:12}}></ph-activity>API 사용 통계</div>
                <div className="tile-num">1,247</div>
                <div className="tile-sub">오늘 총 호출 수</div>
                <div className="divider"/>
                {[['평균 응답','28ms'],['에러율','0.08%'],['Rate Limit','0건'],['인증 실패','3건']].map(([k,v])=>(
                  <div key={k} className="report-row"><span className="report-label">{k}</span><span className="report-value good">{v}</span></div>
                ))}
              </section>

              {/* 인증 설정 wide */}
              <section className="tile tile-wide">
                <div className="tile-title"><ph-lock-key style={{fontSize:12}}></ph-lock-key>JWT 인증 및 Rate Limiting</div>
                <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>
                  <div style={{background:'var(--paper)',borderRadius:8,padding:12}}>
                    <div style={{fontSize:12,fontWeight:600,color:'var(--ink)',marginBottom:8}}>JWT 설정</div>
                    {[['알고리즘','RS256'],['만료 시간','1시간'],['갱신 토큰','7일'],['발급자','callquality.ai']].map(([k,v])=>(
                      <div key={k} className="report-row"><span className="report-label">{k}</span><span className="report-value">{v}</span></div>
                    ))}
                  </div>
                  <div style={{background:'var(--paper)',borderRadius:8,padding:12}}>
                    <div style={{fontSize:12,fontWeight:600,color:'var(--ink)',marginBottom:8}}>Rate Limiting</div>
                    {[['분당 한도','100 req/min'],['일일 한도','50,000 req'],['초과 응답','429 Too Many'],['슬라이딩 윈도우','60초']].map(([k,v])=>(
                      <div key={k} className="report-row"><span className="report-label">{k}</span><span className="report-value">{v}</span></div>
                    ))}
                  </div>
                </div>
                <button className="btn-primary" style={{marginTop:12,width:'100%'}} onClick={()=>showToast('API 키 재발급')}>
                  <ph-key style={{fontSize:13,verticalAlign:'middle',marginRight:6}}></ph-key>API 키 재발급
                </button>
              </section>
            </main>
          </>
        )}

        {view === 'reports' && (
          <>
            <div className="section-title">품질 리포트</div>
            <div className="section-sub">주간·월간 AI 응대 품질 분석 리포트</div>
            <main className="bento">
              {/* 주간 리포트 feature */}
              <section className="tile tile-feature">
                <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:16}}>
                  <div className="tile-title" style={{marginBottom:0}}><ph-file-pdf style={{fontSize:13}}></ph-file-pdf>주간 품질 리포트</div>
                  <button className="btn-emerald" style={{padding:'6px 14px',fontSize:12}} onClick={()=>showToast('PDF 내보내기')}>
                    <ph-download style={{fontSize:12,verticalAlign:'middle',marginRight:4}}></ph-download>PDF 내보내기
                  </button>
                </div>
                <div style={{fontSize:14,fontWeight:600,color:'var(--ink)',marginBottom:12}}>2026년 6월 3주차 (06.16 ~ 06.22)</div>
                <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8,marginBottom:16}}>
                  {[
                    {label:'총 수신 콜',val:'187콜',sub:'전주 대비 +12%',good:true},
                    {label:'AI 처리율',val:'84.0%',sub:'전주 대비 +1.2%',good:true},
                    {label:'평균 응대 시간',val:'3분 18초',sub:'전주 대비 -8초',good:true},
                    {label:'담당자 개입율',val:'16.0%',sub:'전주 대비 -1.2%',good:true},
                    {label:'AI 정확도',val:'86.1%',sub:'전주 대비 +0.8%',good:true},
                    {label:'미해결 사례',val:'11건',sub:'전주 대비 +3건',good:false},
                  ].map(m=>(
                    <div key={m.label} style={{background:'var(--paper)',borderRadius:8,padding:10}}>
                      <div style={{fontSize:10,color:'var(--slate)',marginBottom:2}}>{m.label}</div>
                      <div style={{fontSize:16,fontWeight:700,color:'var(--ink)'}}>{m.val}</div>
                      <div style={{fontSize:10,color:m.good?'#1a7a4a':'#ef4444',fontWeight:500,marginTop:2}}>{m.sub}</div>
                    </div>
                  ))}
                </div>
                <div className="mini-chart">
                  <div style={{fontSize:11,fontWeight:600,color:'var(--slate)',marginBottom:8}}>요일별 AI 정확도</div>
                  {[['월',82],['화',85],['수',87],['목',88],['금',84],['토',91],['일',89]].map(([d,v])=>(
                    <div key={d} className="bar-row">
                      <span className="bar-label">{d}요일</span>
                      <div className="bar-track">
                        <div className="bar-fill emerald" style={{'--bar-w':v+'%',width:v+'%'}}></div>
                      </div>
                      <span className="bar-val">{v}%</span>
                    </div>
                  ))}
                </div>
              </section>

              {/* 개선 영역 */}
              <section className="tile tile-tall">
                <div className="tile-title"><ph-trend-up style={{fontSize:12}}></ph-trend-up>개선 필요 영역</div>
                {[
                  {area:'계약 관련 FAQ', count:8, priority:'high', action:'문서 보강'},
                  {area:'장애 신고 응대', count:5, priority:'high', action:'매뉴얼 업데이트'},
                  {area:'요금 안내 정확도', count:3, priority:'med', action:'요금제 FAQ 갱신'},
                  {area:'미분류 문의', count:4, priority:'low', action:'카테고리 추가'},
                ].map((item,i)=>(
                  <div key={i} style={{padding:'8px 0',borderBottom:'1px solid var(--silver)',cursor:'pointer'}} onClick={()=>showToast(item.area+' 개선 시작')}>
                    <div style={{display:'flex',justifyContent:'space-between',marginBottom:4}}>
                      <span style={{fontSize:12,fontWeight:600,color:'var(--ink)'}}>{item.area}</span>
                      <span style={{fontSize:10,background:item.priority==='high'?'rgba(239,68,68,0.1)':item.priority==='med'?'rgba(240,165,0,0.1)':'var(--paper)',color:item.priority==='high'?'#ef4444':item.priority==='med'?'#b45309':'var(--slate)',borderRadius:4,padding:'1px 5px',fontWeight:600}}>
                        {item.count}건
                      </span>
                    </div>
                    <div style={{fontSize:11,color:'var(--slate)'}}>권장: {item.action}</div>
                  </div>
                ))}
              </section>

              {/* 월간 추이 */}
              <section className="tile tile-wide">
                <div className="tile-title"><ph-chart-line style={{fontSize:12}}></ph-chart-line>월간 AI 정확도 추이</div>
                <svg viewBox="0 0 360 80" height="80" style={{width:'100%'}}>
                  <defs>
                    <linearGradient id="g2" x1="0%" y1="0%" x2="0%" y2="100%">
                      <stop offset="0%" stopColor="#3ad98a" stopOpacity="0.2"/>
                      <stop offset="100%" stopColor="#3ad98a" stopOpacity="0"/>
                    </linearGradient>
                  </defs>
                  <path d="M0,60 L30,55 L60,52 L90,48 L120,45 L150,42 L180,38 L210,35 L240,32 L270,28 L300,25 L330,22 L360,18 L360,80 L0,80 Z" fill="url(#g2)"/>
                  <polyline points="0,60 30,55 60,52 90,48 120,45 150,42 180,38 210,35 240,32 270,28 300,25 330,22 360,18" fill="none" stroke="#3ad98a" strokeWidth="1.5" strokeLinejoin="round"/>
                  {['1월','2월','3월','4월','5월','6월'].map((m,i)=>(
                    <text key={m} x={i*72} y="76" fontSize="8" fill="var(--slate)" textAnchor="middle">{m}</text>
                  ))}
                </svg>
              </section>

              {/* 리포트 히스토리 */}
              <section className="tile tile-wide">
                <div className="tile-title"><ph-archive style={{fontSize:12}}></ph-archive>리포트 히스토리</div>
                {[
                  {name:'2026년 6월 2주차 품질 리포트', date:'2026.06.15', size:'2.3MB'},
                  {name:'2026년 6월 1주차 품질 리포트', date:'2026.06.08', size:'2.1MB'},
                  {name:'2026년 5월 월간 리포트', date:'2026.06.01', size:'4.7MB'},
                  {name:'2026년 5월 4주차 품질 리포트', date:'2026.05.25', size:'2.2MB'},
                ].map((r,i)=>(
                  <div key={i} style={{display:'flex',alignItems:'center',gap:10,padding:'8px 0',borderBottom:'1px solid var(--silver)',cursor:'pointer'}} onClick={()=>showToast(r.name+' 다운로드')}>
                    <ph-file-pdf style={{fontSize:16,color:'#ef4444'}}></ph-file-pdf>
                    <span style={{flex:1,fontSize:12,color:'var(--ink)'}}>{r.name}</span>
                    <span style={{fontSize:11,color:'var(--stone)'}}>{r.date}</span>
                    <span style={{fontSize:10,color:'var(--stone)'}}>{r.size}</span>
                    <button className="btn-ghost" style={{padding:'3px 8px'}} onClick={(e)=>{e.stopPropagation();showToast('다운로드');}}>
                      <ph-download style={{fontSize:13}}></ph-download>
                    </button>
                  </div>
                ))}
              </section>
            </main>
          </>
        )}
      </div>

      {toast && <div className="toast">{toast}</div>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
