<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>B2B 센서 데이터 API 플랫폼 — 맞춤 구현 데모</title>
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" rel="stylesheet" />
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone@7.23.0/babel.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/lucide@0.344.0/dist/umd/lucide.min.js"></script>
<style>
:root {
  --ink:#221f1c; --paper:#f5f5f5; --white:#ffffff; --stone:#797267;
  --azure:#518bdb; --teal:#36bab8; --coral:#d9473a;
  --mint:#cbfbf1; --peach:#f8ebd8; --lavender:#ede9fe;
  --grad:linear-gradient(to right,#518bdb,#36bab8);
  --border:1px solid rgba(0,0,0,.065);
  --shadow:0 1px 3px rgba(0,0,0,.10),0 1px 2px -1px rgba(0,0,0,.10);
  --shadow-md:0 10px 15px -3px rgba(0,0,0,.10),0 4px 6px -4px rgba(0,0,0,.10);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Pretendard',-apple-system,sans-serif;background:var(--paper);color:var(--ink);font-size:14px;line-height:1.5;height:100vh;overflow:hidden}

@keyframes gradShift{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}
@keyframes slideUp{from{transform:translateY(8px);opacity:0}to{transform:translateY(0);opacity:1}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes pulse{0%,100%{opacity:.7}50%{opacity:1}}
@keyframes drawLine{from{stroke-dashoffset:400}to{stroke-dashoffset:0}}
@keyframes countUp{from{transform:translateY(4px);opacity:0}to{transform:translateY(0);opacity:1}}

.shell{display:flex;height:100vh;overflow:hidden}

aside[data-sidebar]{width:214px;min-width:214px;background:var(--white);border-right:var(--border);display:flex;flex-direction:column;overflow-y:auto;flex-shrink:0}
.logo-wrap{padding:18px 16px 12px;border-bottom:var(--border)}
.logo-icon{width:30px;height:30px;background:var(--grad);border-radius:8px;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:14px;color:#fff;letter-spacing:-1px;flex-shrink:0}
.logo-name{font-size:13px;font-weight:700;letter-spacing:-.3px}
.logo-sub{font-size:10px;color:var(--stone);letter-spacing:.5px;text-transform:uppercase}
.nav-section{padding:10px 10px 4px}
.nav-eyebrow{font-size:10px;font-weight:600;color:var(--stone);letter-spacing:.8px;text-transform:uppercase;padding:0 6px;margin-bottom:4px}
.nav-btn{display:flex;align-items:center;gap:8px;padding:7px 8px;border-radius:8px;cursor:pointer;font-size:13px;color:var(--ink);border:none;background:transparent;width:100%;text-align:left;transition:background .12s}
.nav-btn:hover{background:var(--paper)}
.nav-btn.active{background:rgba(81,139,219,.09);color:var(--azure);font-weight:500}
.nav-btn.active svg{color:var(--azure)!important}
.nav-ic{color:var(--stone);flex-shrink:0}
.sidebar-foot{margin-top:auto;padding:10px;border-top:var(--border)}
.avatar{width:30px;height:30px;border-radius:50%;background:var(--grad);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#fff;flex-shrink:0}

.main{flex:1;display:flex;flex-direction:column;overflow:hidden}

/* hero strip — Micro brand gradient */
.hero-strip{background:linear-gradient(135deg,#518bdb 0%,#36bab8 100%);background-size:200% 200%;animation:gradShift 10s ease infinite;padding:14px 22px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.hero-title{font-size:18px;font-weight:800;color:#fff;letter-spacing:-.4px}
.hero-sub{font-size:11px;color:rgba(255,255,255,.8);margin-top:2px}
.hero-kpi-row{display:flex;gap:24px}
.hero-kpi{text-align:center}
.hero-kpi-val{font-size:28px;font-weight:900;color:#fff;line-height:1;letter-spacing:-1px}
.hero-kpi-lbl{font-size:10px;color:rgba(255,255,255,.75);letter-spacing:.5px;text-transform:uppercase;margin-top:2px}

.tab-bar{display:flex;gap:0;padding:0 22px;background:var(--white);border-bottom:var(--border);flex-shrink:0}
button.tab{padding:11px 15px;font-size:13px;font-weight:500;color:var(--stone);background:transparent;border:none;border-bottom:2px solid transparent;cursor:pointer;transition:all .15s;white-space:nowrap}
button.tab:hover{color:var(--ink)}
button.tab.active{color:var(--azure);border-bottom-color:var(--azure);font-weight:600}

.pane{flex:1;overflow-y:auto;padding:18px 22px;animation:fadeIn .18s ease}

/* split-monitor grid */
.split-monitor{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.live-left{display:flex;flex-direction:column;gap:12px}
.live-right{display:flex;flex-direction:column;gap:12px}
.bottom-list{grid-column:1/-1}

/* stat cards — hardcoded 3 per stat-card/stat-value/stat-label class */
.stat-row{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:14px}
.stat-card{background:var(--white);border:var(--border);border-radius:14px;padding:14px 16px;box-shadow:var(--shadow);animation:slideUp .3s ease}
.stat-value{font-size:48px;font-weight:800;color:var(--ink);line-height:1;letter-spacing:-1.5px;animation:countUp .5s ease}
.stat-label{font-size:11px;font-weight:500;color:var(--stone);letter-spacing:.3px;margin-top:4px}
.stat-trend{font-size:11px;color:var(--teal);font-weight:600;margin-top:2px}

.card{background:var(--white);border:var(--border);border-radius:14px;box-shadow:var(--shadow)}
.card-pad{padding:14px 16px}
.card-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.card-title{font-size:13px;font-weight:600;color:var(--ink)}
.eyebrow{font-size:10px;font-weight:600;color:var(--stone);letter-spacing:.8px;text-transform:uppercase;margin-bottom:3px}
.section-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.section-title{font-size:15px;font-weight:700;letter-spacing:-.3px}

/* feed */
.feed-item{display:flex;align-items:flex-start;gap:10px;padding:9px 14px;border-bottom:var(--border);animation:slideUp .2s ease}
.feed-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;margin-top:5px;animation:pulse 2s infinite}
.dot-ok{background:#3a6b2a}
.dot-err{background:var(--coral)}
.dot-pen{background:var(--azure)}
.feed-body{flex:1;min-width:0}
.feed-title{font-size:12px;font-weight:500;color:var(--ink)}
.feed-meta{font-size:11px;color:var(--stone);font-family:monospace}

.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:9999px;font-size:10px;font-weight:600}
.b-ok{background:rgba(58,107,42,.1);color:#3a6b2a}
.b-err{background:rgba(217,71,58,.1);color:var(--coral)}
.b-pen{background:rgba(81,139,219,.1);color:var(--azure)}
.b-info{background:var(--mint);color:#2a7a72}

.tbl{width:100%;border-collapse:collapse}
.tbl th{padding:8px 14px;text-align:left;font-size:10px;font-weight:600;color:var(--stone);letter-spacing:.6px;text-transform:uppercase;background:var(--paper);border-bottom:var(--border)}
.tbl td{padding:10px 14px;border-bottom:var(--border);font-size:12px;color:var(--ink)}
.tbl tr:last-child td{border-bottom:none}
.tbl tr:hover td{background:rgba(81,139,219,.025)}
.mono{font-family:monospace;font-size:11px}

.btn-p{display:inline-flex;align-items:center;gap:6px;padding:7px 13px;background:var(--azure);color:#fff;border:none;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;transition:background .12s}
.btn-p:hover{background:#3d77cc}
.btn-g{display:inline-flex;align-items:center;gap:5px;padding:6px 10px;background:transparent;color:var(--stone);border:var(--border);border-radius:8px;font-size:12px;font-weight:500;cursor:pointer;transition:all .12s}
.btn-g:hover{color:var(--ink);background:var(--paper)}

.key-row{display:flex;align-items:center;gap:8px;padding:8px 10px;background:var(--paper);border:var(--border);border-radius:8px}
.key-val{flex:1;font-family:monospace;font-size:11px;color:var(--stone);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.key-copy{padding:3px 8px;border:var(--border);border-radius:6px;background:var(--white);font-size:11px;color:var(--stone);cursor:pointer}

.pbar{height:4px;background:rgba(81,139,219,.12);border-radius:9999px;overflow:hidden}
.pfill{height:100%;background:var(--grad);border-radius:9999px;transition:width .6s ease}

.fi{display:flex;flex-direction:column;gap:6px;margin-bottom:12px}
.fl{font-size:12px;font-weight:500;color:var(--ink)}
.inp{padding:8px 11px;border:var(--border);border-radius:8px;font-size:13px;color:var(--ink);background:var(--white);outline:none;font-family:inherit}
.inp:focus{border-color:var(--azure);box-shadow:0 0 0 2px rgba(81,139,219,.15)}

.peach-strip{background:var(--peach);border-radius:12px;padding:11px 14px;font-size:12px;color:var(--ink)}
.mint-strip{background:var(--mint);border-radius:12px;padding:11px 14px;font-size:12px;color:#2a7a72}
.lav-strip{background:var(--lavender);border-radius:12px;padding:11px 14px;font-size:12px;color:#5b35a0}

.toast{position:fixed;bottom:22px;right:22px;background:var(--ink);color:#fff;padding:9px 15px;border-radius:8px;font-size:13px;animation:slideUp .2s ease;z-index:999;box-shadow:var(--shadow-md)}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect} = React;
const C = {ink:'#221f1c',paper:'#f5f5f5',white:'#ffffff',stone:'#797267',azure:'#518bdb',teal:'#36bab8',coral:'#d9473a'};

const PTS = [42,38,55,61,58,74,69,82,78,71,88,95,91,87,94,98,92,85,79,86,90,76,68,73,80,85,91,88,95,92];

function Chart() {
  const W=380,H=110,mn=30,mx=100;
  const toY=v=>H-((v-mn)/(mx-mn))*(H-18)-9;
  const toX=(i)=>(i/(PTS.length-1))*W;
  const line=PTS.map((v,i)=>`${i===0?'M':'L'} ${toX(i).toFixed(1)} ${toY(v).toFixed(1)}`).join(' ');
  const area=`${line} L ${W} ${H} L 0 ${H} Z`;
  return (
    <svg viewBox={`0 0 ${W} ${H}`} style={{width:'100%',display:'block'}}>
      <defs>
        <linearGradient id="gFill" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stopColor="#518bdb" stopOpacity="0.22"/>
          <stop offset="100%" stopColor="#36bab8" stopOpacity="0.02"/>
        </linearGradient>
        <linearGradient id="gLine" x1="0" y1="0" x2="1" y2="0">
          <stop offset="0%" stopColor="#518bdb"/>
          <stop offset="100%" stopColor="#36bab8"/>
        </linearGradient>
      </defs>
      <path d={area} fill="url(#gFill)"/>
      <path d={line} fill="none" stroke="url(#gLine)" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"
        style={{strokeDasharray:800,strokeDashoffset:0,animation:'drawLine 1.5s ease forwards'}}/>
      {[0,7,14,21,29].map(i=>(
        <text key={i} x={toX(i).toFixed(1)} y={H-1} textAnchor="middle" fontSize="8" fill={C.stone}>{`-${29-i}s`}</text>
      ))}
      {[40,60,80,100].map(v=>(
        <g key={v}>
          <line x1={0} y1={toY(v)} x2={W} y2={toY(v)} stroke={C.paper} strokeWidth="1"/>
          <text x={3} y={toY(v)-2} fontSize="8" fill={C.stone}>{v}</text>
        </g>
      ))}
      <circle cx={toX(PTS.length-1)} cy={toY(PTS[PTS.length-1])} r="4" fill={C.azure} stroke="#fff" strokeWidth="2" style={{animation:'pulse 2s infinite'}}/>
    </svg>
  );
}

function Donut({pct,color,sz=52}) {
  const r=20,cx=sz/2,cy=sz/2,circ=2*Math.PI*r,dash=circ*pct;
  return (
    <svg width={sz} height={sz} style={{transform:'rotate(-90deg)'}}>
      <circle cx={cx} cy={cy} r={r} fill="none" stroke={C.paper} strokeWidth="5"/>
      <circle cx={cx} cy={cy} r={r} fill="none" stroke={color} strokeWidth="5" strokeDasharray={`${dash} ${circ}`} strokeLinecap="round"/>
    </svg>
  );
}

/* ── MainView: split-monitor composition ── */
function MainView() {
  const [tick,setTick]=useState(0);
  useEffect(()=>{const t=setInterval(()=>setTick(p=>p+1),3500);return()=>clearInterval(t);},[]);

  const feed=[
    {t:'ok',title:'스마트물류솔루션 Webhook 발송 성공',meta:'POST /hooks/sls — 200 · 138ms',ago:'11초 전'},
    {t:'pen',title:'텔레매틱스코리아 API 호출 처리 중',meta:'GET /v1/sensors/VIN-4829 · 48/60 /min',ago:'29초 전'},
    {t:'err',title:'한국IoT연구소 Webhook 재시도 (2/3)',meta:'POST /hooks/kiot — 503 · Retry 2s',ago:'47초 전'},
    {t:'ok',title:'모빌리티테크 API Key 발급 완료',meta:'Key ID: sk_live_mbt_*** · 즉시 활성화',ago:'1분 전'},
    {t:'ok',title:'스마트물류솔루션 Rate Limit 갱신',meta:'분당 한도 500 → 800 업데이트',ago:'2분 전'},
  ];

  return (
    <div>
      {/* Hardcoded stat-card × 3 — archetype pattern */}
      <div className="stat-row">
        <div className="stat-card">
          <div className="stat-value">4</div>
          <div className="stat-label">활성 고객사</div>
          <div className="stat-trend">↑ 이번 달 신규 1곳</div>
        </div>
        <div className="stat-card">
          <div className="stat-value" style={{color:C.azure}}>{12847+tick}</div>
          <div className="stat-label">금일 API 호출</div>
          <div className="stat-trend">↑ 어제 대비 +8%</div>
        </div>
        <div className="stat-card">
          <div className="stat-value" style={{color:C.teal}}>99.4%</div>
          <div className="stat-label">24h Webhook 성공률</div>
          <div className="stat-trend">→ SLA 99% 충족</div>
        </div>
      </div>

      <div className="split-monitor">
        {/* live-left */}
        <div className="live-left">
          <div className="card card-pad">
            <div className="card-hd">
              <div>
                <div className="eyebrow">실시간 센서 스트림</div>
                <div className="card-title">VIN-4829 속도 (km/h)</div>
              </div>
              <div style={{display:'flex',alignItems:'center',gap:5}}>
                <div style={{width:6,height:6,borderRadius:'50%',background:C.teal,animation:'pulse 1.5s infinite'}}/>
                <span style={{fontSize:11,color:C.teal,fontWeight:600}}>LIVE</span>
              </div>
            </div>
            <Chart/>
            <div style={{display:'flex',gap:16,marginTop:8,paddingTop:8,borderTop:'1px solid rgba(0,0,0,.05)'}}>
              <span style={{fontSize:11,color:C.stone}}>현재 <b style={{color:C.azure}}>92 km/h</b></span>
              <span style={{fontSize:11,color:C.stone}}>평균 <b style={{color:C.ink}}>81 km/h</b></span>
              <span style={{fontSize:11,color:C.stone}}>최고 <b style={{color:C.coral}}>98 km/h</b></span>
            </div>
          </div>

          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
            <div className="card card-pad" style={{display:'flex',alignItems:'center',justifyContent:'space-between'}}>
              <div>
                <div style={{fontSize:11,color:C.stone}}>성공률</div>
                <div style={{fontSize:26,fontWeight:800,color:C.teal,letterSpacing:'-.5px'}}>98.6%</div>
              </div>
              <Donut pct={.986} color={C.teal}/>
            </div>
            <div className="card card-pad" style={{display:'flex',alignItems:'center',justifyContent:'space-between'}}>
              <div>
                <div style={{fontSize:11,color:C.stone}}>에러율</div>
                <div style={{fontSize:26,fontWeight:800,color:C.coral,letterSpacing:'-.5px'}}>1.4%</div>
              </div>
              <Donut pct={.014} color={C.coral}/>
            </div>
          </div>

          <div className="mint-strip">
            <b>Rate Limit</b> — 전체 고객사 분당 2,450 / 4,000 호출 (61.3%)
          </div>
        </div>

        {/* live-right */}
        <div className="live-right">
          <div className="card" style={{flex:1}}>
            <div style={{padding:'12px 14px 8px',borderBottom:'var(--border)',display:'flex',alignItems:'center',justifyContent:'space-between'}}>
              <div className="card-title">Webhook 실시간 피드</div>
              <button className="btn-g" style={{fontSize:11}} onClick={()=>{}}>
                <i data-lucide="refresh-cw" style={{width:11,height:11}}/>새로고침
              </button>
            </div>
            {feed.map((f,i)=>(
              <div className="feed-item" key={i} style={{animationDelay:`${i*0.04}s`}}>
                <div className={`feed-dot ${f.t==='ok'?'dot-ok':f.t==='err'?'dot-err':'dot-pen'}`}/>
                <div className="feed-body">
                  <div className="feed-title">{f.title}</div>
                  <div className="feed-meta">{f.meta}</div>
                </div>
                <div style={{display:'flex',flexDirection:'column',alignItems:'flex-end',gap:3}}>
                  <span className={`badge ${f.t==='ok'?'b-ok':f.t==='err'?'b-err':'b-pen'}`}>{f.t==='ok'?'성공':f.t==='err'?'실패':'진행'}</span>
                  <span style={{fontSize:10,color:C.stone}}>{f.ago}</span>
                </div>
              </div>
            ))}
            <div style={{padding:'9px 14px',background:C.paper,fontSize:11,color:C.stone,textAlign:'center',borderTop:'var(--border)'}}>
              오늘 총 <b style={{color:C.azure}}>1,847</b>건 · 성공 <b style={{color:'#3a6b2a'}}>1,821</b>건
            </div>
          </div>
        </div>

        {/* bottom-list */}
        <div className="bottom-list">
          <div className="card" style={{overflow:'hidden'}}>
            <div style={{padding:'11px 14px 9px',borderBottom:'var(--border)',display:'flex',alignItems:'center',justifyContent:'space-between'}}>
              <div className="card-title">고객사 현황</div>
              <div style={{display:'flex',gap:7}}>
                <button className="btn-g" onClick={()=>{}}><i data-lucide="download" style={{width:12,height:12}}/>내보내기</button>
                <button className="btn-p" onClick={()=>{}}>고객사 추가</button>
              </div>
            </div>
            <table className="tbl">
              <thead><tr><th>고객사명</th><th>도메인</th><th>금일 호출</th><th>한도</th><th>상태</th><th>등록일</th></tr></thead>
              <tbody>
                <tr style={{animation:'slideUp .20s ease'}}>
                  <td style={{fontWeight:600}}>스마트물류솔루션</td>
                  <td className="mono" style={{color:C.stone}}>smartlogistics-demo.co.kr</td>
                  <td style={{fontWeight:600}}>5,423</td><td style={{color:C.stone}}>10,000</td>
                  <td><span className="badge b-ok">활성</span></td>
                  <td className="mono" style={{color:C.stone}}>2025-11-15</td>
                </tr>
                <tr style={{animation:'slideUp .25s ease'}}>
                  <td style={{fontWeight:600}}>텔레매틱스코리아</td>
                  <td className="mono" style={{color:C.stone}}>telematics-k.example.io</td>
                  <td style={{fontWeight:600}}>3,811</td><td style={{color:C.stone}}>8,000</td>
                  <td><span className="badge b-ok">활성</span></td>
                  <td className="mono" style={{color:C.stone}}>2025-09-02</td>
                </tr>
                <tr style={{animation:'slideUp .30s ease'}}>
                  <td style={{fontWeight:600}}>한국IoT연구소</td>
                  <td className="mono" style={{color:C.stone}}>kiot-lab.example.kr</td>
                  <td style={{fontWeight:600}}>1,204</td><td style={{color:C.stone}}>5,000</td>
                  <td><span className="badge b-err">오류</span></td>
                  <td className="mono" style={{color:C.stone}}>2025-12-20</td>
                </tr>
                <tr style={{animation:'slideUp .35s ease'}}>
                  <td style={{fontWeight:600}}>모빌리티테크</td>
                  <td className="mono" style={{color:C.stone}}>mobilitytech-demo.net</td>
                  <td style={{fontWeight:600}}>2,409</td><td style={{color:C.stone}}>6,000</td>
                  <td><span className="badge b-ok">활성</span></td>
                  <td className="mono" style={{color:C.stone}}>2026-01-08</td>
                </tr>
                <tr style={{animation:'slideUp .40s ease'}}>
                  <td style={{fontWeight:600}}>커넥티드모빌리티</td>
