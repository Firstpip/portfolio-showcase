<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<title>B2B 센서 데이터 API 플랫폼 — 맞춤 구현 데모</title>
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" rel="stylesheet" />
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone@7.23.0/babel.min.js"></script>

<style>
:root {
  --ink:#221f1c; --paper:#f5f5f5; --white:#ffffff; --stone:#797267;
  --azure:#518bdb; --teal:#36bab8; --coral:#d9473a;
  --mint:#cbfbf1; --peach:#f8ebd8; --lavender:#ede9fe;
  --grad:linear-gradient(to right,#518bdb,#36bab8);
  --border:1px solid rgba(0,0,0,.065);
  --shadow:0 1px 3px rgba(0,0,0,.10),0 1px 2px -1px rgba(0,0,0,.10);
  --shadow-md:0 10px 15px -3px rgba(0,0,0,.10),0 4px 6px -4px rgba(0,0,0,.10);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Pretendard',-apple-system,sans-serif;background:var(--paper);color:var(--ink);font-size:14px;line-height:1.5;height:100vh;overflow:hidden}

@keyframes gradShift{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}
@keyframes slideUp{from{transform:translateY(8px);opacity:0}to{transform:translateY(0);opacity:1}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes pulse{0%,100%{opacity:.7}50%{opacity:1}}
@keyframes drawLine{from{stroke-dashoffset:400}to{stroke-dashoffset:0}}
@keyframes countUp{from{transform:translateY(4px);opacity:0}to{transform:translateY(0);opacity:1}}
@keyframes shimmer{0%{background-position:-400px 0}100%{background-position:400px 0}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes modalIn{from{transform:translateY(12px) scale(.98);opacity:0}to{transform:translateY(0) scale(1);opacity:1}}
@keyframes fillBar{from{width:0}to{width:100%}}

.shell{display:flex;height:100vh;overflow:hidden}

aside[data-sidebar]{width:214px;min-width:214px;background:var(--white);border-right:var(--border);display:flex;flex-direction:column;overflow-y:auto;flex-shrink:0;z-index:50}
.logo-wrap{padding:18px 16px 12px;border-bottom:var(--border)}
.logo-icon{width:30px;height:30px;background:var(--grad);border-radius:8px;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:14px;color:#fff;letter-spacing:-1px;flex-shrink:0}
.logo-name{font-size:13px;font-weight:700;letter-spacing:-.3px}
.logo-sub{font-size:10px;color:var(--stone);letter-spacing:.5px;text-transform:uppercase}
.nav-section{padding:10px 10px 4px}
.nav-eyebrow{font-size:10px;font-weight:600;color:var(--stone);letter-spacing:.8px;text-transform:uppercase;padding:0 6px;margin-bottom:4px}
.nav-btn{display:flex;align-items:center;gap:8px;padding:7px 8px;border-radius:8px;cursor:pointer;font-size:13px;color:var(--ink);border:none;background:transparent;width:100%;text-align:left;transition:background .12s}
.nav-btn:hover{background:var(--paper)}
.nav-btn.active{background:rgba(81,139,219,.09);color:var(--azure);font-weight:500}
.nav-btn.active svg{color:var(--azure)!important}
.nav-ic{color:var(--stone);flex-shrink:0}
.sidebar-foot{margin-top:auto;padding:10px;border-top:var(--border)}
.avatar{width:30px;height:30px;border-radius:50%;background:var(--grad);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#fff;flex-shrink:0}

.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}

.hero-strip{background:linear-gradient(135deg,#518bdb 0%,#36bab8 100%);background-size:200% 200%;animation:gradShift 10s ease infinite;padding:14px 22px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;gap:12px}
.hero-title{font-size:18px;font-weight:800;color:#fff;letter-spacing:-.4px}
.hero-sub{font-size:11px;color:rgba(255,255,255,.8);margin-top:2px}
.hero-right{display:flex;align-items:center;gap:18px}
.hero-kpi-row{display:flex;gap:24px}
.hero-kpi{text-align:center}
.hero-kpi-val{font-size:28px;font-weight:900;color:#fff;line-height:1;letter-spacing:-1px;animation:countUp .5s ease}
.hero-kpi-lbl{font-size:10px;color:rgba(255,255,255,.75);letter-spacing:.5px;text-transform:uppercase;margin-top:2px}
.hamburger{display:none;background:rgba(255,255,255,.18);border:none;border-radius:8px;width:34px;height:34px;align-items:center;justify-content:center;cursor:pointer;color:#fff}

/* role toggle */
.role-box{display:flex;align-items:center;gap:8px}
.role-badge{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:9999px;font-size:11px;font-weight:700;background:rgba(255,255,255,.2);color:#fff}
.role-badge.viewer{background:rgba(0,0,0,.18)}
.role-switch{display:flex;background:rgba(255,255,255,.18);border-radius:9999px;padding:2px}
.role-opt{padding:4px 10px;border-radius:9999px;font-size:11px;font-weight:600;color:rgba(255,255,255,.85);background:transparent;border:none;cursor:pointer;transition:all .12s;white-space:nowrap}
.role-opt.on{background:#fff;color:var(--azure)}

.pane{flex:1;overflow-y:auto;padding:18px 22px;animation:fadeIn .18s ease}

.split-monitor{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.live-left{display:flex;flex-direction:column;gap:12px;min-width:0}
.live-right{display:flex;flex-direction:column;gap:12px;min-width:0}
.bottom-list{grid-column:1/-1}

.stat-row{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:14px}
.stat-card{background:var(--white);border:var(--border);border-radius:14px;padding:14px 16px;box-shadow:var(--shadow);animation:slideUp .3s ease}
.stat-value{font-size:48px;font-weight:800;color:var(--ink);line-height:1;letter-spacing:-1.5px;animation:countUp .5s ease}
.stat-label{font-size:11px;font-weight:500;color:var(--stone);letter-spacing:.3px;margin-top:4px}
.stat-trend{font-size:11px;color:var(--teal);font-weight:600;margin-top:2px}

.card{background:var(--white);border:var(--border);border-radius:14px;box-shadow:var(--shadow)}
.card-pad{padding:14px 16px}
.card-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.card-title{font-size:13px;font-weight:600;color:var(--ink)}
.eyebrow{font-size:10px;font-weight:600;color:var(--stone);letter-spacing:.8px;text-transform:uppercase;margin-bottom:3px}
.section-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;gap:10px;flex-wrap:wrap}
.section-title{font-size:15px;font-weight:700;letter-spacing:-.3px}

.feed-item{display:flex;align-items:flex-start;gap:10px;padding:9px 14px;border-bottom:var(--border);animation:slideUp .2s ease}
.feed-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;margin-top:5px;animation:pulse 2s infinite}
.dot-ok{background:#3a6b2a}
.dot-err{background:var(--coral)}
.dot-pen{background:var(--azure)}
.feed-body{flex:1;min-width:0}
.feed-title{font-size:12px;font-weight:500;color:var(--ink)}
.feed-meta{font-size:11px;color:var(--stone);font-family:monospace;word-break:break-all}

.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:9999px;font-size:10px;font-weight:600;white-space:nowrap}
.b-ok{background:rgba(58,107,42,.1);color:#3a6b2a}
.b-err{background:rgba(217,71,58,.1);color:var(--coral)}
.b-pen{background:rgba(81,139,219,.1);color:var(--azure)}
.b-info{background:var(--mint);color:#2a7a72}
.b-warn{background:rgba(217,71,58,.1);color:var(--coral)}
.b-gray{background:rgba(0,0,0,.06);color:var(--stone)}
.b-dlq{background:#2d2640;color:#cbb6f5}

.tbl-wrap{overflow-x:auto}
.tbl{width:100%;border-collapse:collapse}
.tbl th{padding:8px 14px;text-align:left;font-size:10px;font-weight:600;color:var(--stone);letter-spacing:.6px;text-transform:uppercase;background:var(--paper);border-bottom:var(--border);white-space:nowrap}
.tbl td{padding:10px 14px;border-bottom:var(--border);font-size:12px;color:var(--ink)}
.tbl tr:last-child td{border-bottom:none}
.tbl tr:hover td{background:rgba(81,139,219,.025)}
.mono{font-family:monospace;font-size:11px}

.btn-p{display:inline-flex;align-items:center;gap:6px;padding:7px 13px;background:var(--azure);color:#fff;border:none;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;transition:background .12s}
.btn-p:hover{background:#3d77cc}
.btn-g{display:inline-flex;align-items:center;gap:5px;padding:6px 10px;background:transparent;color:var(--stone);border:var(--border);border-radius:8px;font-size:12px;font-weight:500;cursor:pointer;transition:all .12s}
.btn-g:hover{color:var(--ink);background:var(--paper)}
.btn-p:disabled,.btn-g:disabled{opacity:.45;cursor:not-allowed}
.btn-danger{color:var(--coral)}
.locked{opacity:.5;cursor:not-allowed}

.key-row{display:flex;align-items:center;gap:8px;padding:8px 10px;background:var(--paper);border:var(--border);border-radius:8px}
.key-val{flex:1;font-family:monospace;font-size:11px;color:var(--stone);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.key-copy{padding:3px 8px;border:var(--border);border-radius:6px;background:var(--white);font-size:11px;color:var(--stone);cursor:pointer}
.key-copy:hover{background:var(--paper)}

.pbar{height:4px;background:rgba(81,139,219,.12);border-radius:9999px;overflow:hidden}
.pfill{height:100%;background:var(--grad);border-radius:9999px;transition:width .6s ease}
.pfill.warn{background:linear-gradient(to right,#d9473a,#d9473a)}

.fi{display:flex;flex-direction:column;gap:6px;margin-bottom:12px}
.fl{font-size:12px;font-weight:500;color:var(--ink)}
.inp{padding:8px 11px;border:var(--border);border-radius:8px;font-size:13px;color:var(--ink);background:var(--white);outline:none;font-family:inherit;width:100%}
.inp:focus{border-color:var(--azure);box-shadow:0 0 0 2px rgba(81,139,219,.15)}
.inp.err{border-color:var(--coral);box-shadow:0 0 0 2px rgba(217,71,58,.12)}

.peach-strip{background:var(--peach);border-radius:12px;padding:11px 14px;font-size:12px;color:var(--ink)}
.mint-strip{background:var(--mint);border-radius:12px;padding:11px 14px;font-size:12px;color:#2a7a72}
.lav-strip{background:var(--lavender);border-radius:12px;padding:11px 14px;font-size:12px;color:#5b35a0}

.tabs{display:flex;gap:0;border-bottom:var(--border);overflow-x:auto}
.tabs button{padding:9px 14px;font-size:12px;font-weight:500;color:var(--stone);background:transparent;border:none;border-bottom:2px solid transparent;cursor:pointer;transition:all .15s;white-space:nowrap}
.tabs button:hover{color:var(--ink)}
.tabs button.on{color:var(--azure);border-bottom-color:var(--azure);font-weight:600}

.pill-row{display:flex;gap:6px;flex-wrap:wrap}
.pill{padding:5px 11px;border-radius:9999px;font-size:12px;font-weight:500;border:var(--border);background:var(--white);color:var(--stone);cursor:pointer;transition:all .12s}
.pill.on{background:var(--azure);color:#fff;border-color:var(--azure)}

/* toast */
.toast-wrap{position:fixed;bottom:22px;right:22px;display:flex;flex-direction:column;gap:8px;z-index:999}
.toast{background:var(--ink);color:#fff;padding:9px 15px;border-radius:8px;font-size:13px;animation:slideUp .2s ease;box-shadow:var(--shadow-md);max-width:340px}
.toast.bad{background:var(--coral)}
.toast.good{background:#2f7a3e}

/* modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);display:flex;align-items:center;justify-content:center;z-index:900;padding:20px;animation:fadeIn .15s ease}
.modal-box{background:var(--white);border-radius:16px;box-shadow:var(--shadow-md);width:100%;max-width:460px;animation:modalIn .2s ease;overflow:hidden}
.modal-hd{padding:16px 18px;border-bottom:var(--border);display:flex;align-items:center;justify-content:space-between}
.modal-title{font-size:15px;font-weight:700}
.modal-x{background:transparent;border:none;cursor:pointer;color:var(--stone);display:flex}
.modal-body{padding:18px}
.modal-foot{padding:14px 18px;border-top:var(--border);display:flex;gap:8px;justify-content:flex-end}

/* skeleton */
.sk{background:linear-gradient(90deg,#eee 25%,#f5f5f5 37%,#eee 63%);background-size:400px 100%;animation:shimmer 1.2s infinite linear;border-radius:8px}
.sk-row{height:38px;margin-bottom:8px}
.sk-chart{height:130px;margin-bottom:10px}

/* empty / error states */
.state-box{display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:44px 20px;gap:8px}
.state-ic{width:46px;height:46px;border-radius:12px;display:flex;align-items:center;justify-content:center;margin-bottom:4px}
.state-ic.empty{background:var(--paper);color:var(--stone)}
.state-ic.error{background:rgba(217,71,58,.1);color:var(--coral)}
.state-title{font-size:14px;font-weight:700;color:var(--ink)}
.state-msg{font-size:12px;color:var(--stone);max-width:320px}

/* spinner */
.spinner{width:16px;height:16px;border:2px solid rgba(81,139,219,.25);border-top-color:var(--azure);border-radius:50%;animation:spin .7s linear infinite;display:inline-block}

/* retry demo panel */
.retry-panel{border:1px solid rgba(81,139,219,.3);background:rgba(81,139,219,.04);border-radius:12px;padding:14px 16px;margin-bottom:14px}
.retry-steps{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap}
.retry-step{flex:1;min-width:80px;border:var(--border);border-radius:8px;padding:8px 10px;background:var(--white);transition:all .2s}
.retry-step.active{border-color:var(--azure);box-shadow:0 0 0 2px rgba(81,139,219,.15)}
.retry-step.done-ok{border-color:#3a6b2a;background:rgba(58,107,42,.05)}
.retry-step.done-fail{border-color:var(--coral);background:rgba(217,71,58,.05)}
.retry-bar{height:5px;background:rgba(81,139,219,.15);border-radius:9999px;overflow:hidden;margin-top:6px}
.retry-bar-fill{height:100%;background:var(--grad);border-radius:9999px}

.sidebar-overlay{display:none}

/* responsive */
@media (max-width:1023px){
  .split-monitor{grid-template-columns:1fr}
}
@media (max-width:767px){
  body{overflow:auto}
  .hamburger{display:flex}
  aside[data-sidebar]{position:fixed;left:0;top:0;bottom:0;transform:translateX(-100%);transition:transform .22s ease}
  aside[data-sidebar].open{transform:translateX(0)}
  .sidebar-overlay.show{display:block;position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:40}
  .stat-row{grid-template-columns:1fr}
  .hero-strip{flex-wrap:wrap}
  .hero-right{width:100%;justify-content:space-between}
  .hero-kpi-row{gap:16px}
  .hero-kpi-val{font-size:22px}
  .pane{padding:14px 12px}
  .card{overflow-x:auto}
}
@media (max-width:375px){
  .hero-kpi-row{flex-wrap:wrap;gap:12px}
  .modal-box{max-width:100%}
}
</style>
</head>

function Chart() {
  const W=380,H=110,mn=30,mx=100;
  const toY=v=>H-((v-mn)/(mx-mn))*(H-18)-9;
  const toX=(i)=>(i/(PTS.length-1))*W;
  const line=PTS.map((v,i)=>`${i===0?'M':'L'} ${toX(i).toFixed(1)} ${toY(v).toFixed(1)}`).join(' ');
  const area=`${line} L ${W} ${H} L 0 ${H} Z`;
  return (
    <svg viewBox={`-12 -10 ${W+24} ${H+20}`} preserveAspectRatio="xMidYMid meet" style={{width:'100%',display:'block'}}>
      <defs>
        <linearGradient id="gFill" x1="0" y1="0" x2="0" y2="1">

          <stop offset="100%" stopColor="#36bab8" stopOpacity="0.02"/>

      </defs>

      {[0,7,14,21,29].map(i=>(

        <g key={v}>

      <circle cx={cx} cy={cy} r={r} fill="none" stroke={color} strokeWidth="5" strokeDasharray={`${dash} ${circ}`} strokeLinecap="round"/>
    </svg>
  );
}

/* ── Modal ── */
function Modal({title,children,onClose,foot}) {
  useEffect(()=>{
    const h=e=>{if(e.key==='Escape')onClose();};
    window.addEventListener('keydown',h);
    return ()=>window.removeEventListener('keydown',h);
  },[onClose]);
  return (
    <div className="modal-overlay" onClick={onClose}>
      <div className="modal-box" onClick={e=>e.stopPropagation()}>
        <div className="modal-hd">
          <div className="modal-title">{title}</div>
          <button className="modal-x" onClick={onClose}><i data-lucide="x" style={{width:18,height:18}}/></button>
        </div>
        <div className="modal-body">{children}</div>
        {foot && <div className="modal-foot">{foot}</div>}
      </div>
    </div>
  );
}

  const {webhooks} = useApp();

    const t=setInterval(()=>{

      setTicks(prev=>[{...e,key:'tk-'+seq.current,ago:'방금'},...prev].slice(0,3));
    },FEED_POLL_MS);
    return ()=>clearInterval(t);
  },[]);
  // store의 실제 최근 이벤트(정지 차단 등) → 피드 항목으로 매핑
  const real = webhooks.slice(0,4).map(w=>({
    key:'wh-'+w.id,
    t: w.status==='성공'||w.status==='재시도후성공' ? 'ok' : (w.status==='최종실패'||w.httpCode===401||w.httpCode===429?'err':'pen'),
    title: w.httpCode===401 ? `${w.target} API 호출 401 차단` : `${w.target} Webhook ${w.status}`,
    meta: `${w.type} — ${w.httpCode||'…'} · 시도 ${w.tries}회`,
    ago: w.ts,
  }));
  const items=[...ticks,...real].slice(0,6);

/* ── WebhookView ── */
function WebhookView() {
  const {clients,webhooks,role,actions,pushToast,pushAudit} = useApp();
  const [retry,setRetry]=useState(null); // {attempt, phase:'sending'|'retry'|'done', code, result}
  const [refreshing,setRefreshing]=useState(false);
  const timers=useRef([]);
  const isAdmin=roleCan(role,'webhook');
  useEffect(()=>()=>{ timers.current.forEach(clearTimeout); },[]);

  const runDemo=()=>{
    timers.current.forEach(clearTimeout); timers.current=[];
    const target=clients.find(c=>c.status==='활성')?.name||'스마트물류솔루션';
    setRetry({attempt:1,phase:'sending',code:0,result:null});
    const step=(attempt)=>{
      const wait=RETRY_PLAN[attempt-1]*RETRY_DEMO_SPEED; // 상대 대기 (각 호출 시점 기준)
      const t=setTimeout(()=>{
        const success = attempt>=RETRY_MAX; // 데모 결정론: 1s→2s→4s 전 단계 재생 후 마지막(3회차) 복구 — 대본 S-04 WAIT 큐 (1/3)→(2/3)→(3/3) 정합
        if(success){
          setRetry({attempt,phase:'done',code:200,result:'ok'});
          actions.recordWebhook(target,'재시도후성공',attempt+1,200);
          pushAudit('WEBHOOK_SEND',`${target} (재시도 ${attempt}회 후 성공)`,'성공');
          pushToast(`${target} Webhook 재시도 ${attempt}회 후 전송 성공`,'good');
        } else if(attempt>=RETRY_MAX){
          setRetry({attempt,phase:'done',code:503,result:'fail'});
          actions.recordWebhook(target,'최종실패',RETRY_MAX,503);
          pushAudit('WEBHOOK_SEND',`${target} (재시도 ${RETRY_MAX}회 소진)`,'실패');
          pushToast(`${target} Webhook 최종 실패 — DLQ 보관 (유실 없음)`,'bad');
        } else {
          setRetry({attempt:attempt+1,phase:'retry',code:503,result:null});
          step(attempt+1);
        }
      },wait);
      timers.current.push(t);
    };
    // 1차 발송 600ms → 503 실패 → 재시도 체인 시작 (재시도 시연 보장)
    const t0=setTimeout(()=>{ setRetry({attempt:1,phase:'retry',code:503,result:null}); step(1); },600);
    timers.current.push(t0);
  };
  const send=()=>{ if(!isAdmin){ pushToast(`운영 쓰기 권한이 필요합니다 (현재 역할: ${role})`,'bad'); pushAudit('PERMISSION_DENIED','Webhook 테스트 발송','거부'); return; } runDemo(); };
  const refresh=()=>{ setRefreshing(true); setTimeout(()=>setRefreshing(false),LOAD_SIM_MS); };

  const stepClass=(n)=>{
    if(!retry) return 'retry-step';
    if(retry.phase==='done' && retry.attempt+1>=n) return retry.result==='ok'&&retry.attempt+1===n?'retry-step done-ok':(retry.result==='fail'&&n===RETRY_MAX+1?'retry-step done-fail':'retry-step done-ok');
    if(retry.attempt+1===n) return 'retry-step active';
    if(retry.attempt+1>n) return 'retry-step done-ok';
    return 'retry-step';
  };

  return (
    <div>
      <div className="section-hd">
        <div><div className="eyebrow">이벤트 연동</div><div className="section-title">Webhook 실시간 전달 + Rate Limiting</div></div>
        <button className="btn-p" onClick={send} disabled={!!retry&&retry.phase!=='done'} title={!isAdmin?'운영관리자 권한 필요':''}><i data-lucide="zap" style={{width:13,height:13}}/>테스트 발송</button>
      </div>

      {retry && <div className="retry-panel">
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',flexWrap:'wrap',gap:8}}>
          <div style={{fontSize:12,fontWeight:600}}>
            {retry.phase==='sending' && '① Webhook 발송 시도 중…'}
            {retry.phase==='retry' && `② 전송 실패(503) — 지수 백오프 재시도 (${retry.attempt}/${RETRY_MAX})`}
            {retry.phase==='done' && retry.result==='ok' && '③ 재시도 후 전송 성공 (200)'}
            {retry.phase==='done' && retry.result==='fail' && '③ 재시도 소진 — DLQ 보관 (데이터 유실 없음)'}
          </div>
          <span style={{fontSize:11,color:C.stone}}>실운영 1s · 2s · 4s (데모 압축 재생)</span>
        </div>
        <div className="retry-steps">
          <div className="retry-step active" style={{borderColor:retry.code===503&&retry.attempt===1?C.coral:undefined}}>
            <div style={{fontSize:11,fontWeight:600}}>1차 발송</div>
            <div style={{fontSize:10,color:C.stone}}>{retry.phase==='sending'?'전송 중…':'503 실패'}</div>
          </div>
          {[1,2,3].map(n=>(
            <div key={n} className={stepClass(n+1)}>
              <div style={{fontSize:11,fontWeight:600}}>재시도 {n} · {RETRY_PLAN[n-1]/1000}s</div>
              <div style={{fontSize:10,color:C.stone}}>
                {retry.phase==='done'
                  ? (retry.result==='ok' && retry.attempt===n+1 ? '200 성공' : (retry.result==='fail' && n===3 ? '503 최종실패' : (retry.attempt+1>n+1?'건너뜀':'대기')))
                  : (retry.attempt+1===n+1 ? '대기 후 재발송' : '대기')}
              </div>
              {retry.attempt+1===n+1 && retry.phase==='retry' && <div className="retry-bar"><div className="retry-bar-fill" style={{animation:`fillBar ${RETRY_PLAN[n-1]*RETRY_DEMO_SPEED/1000}s linear forwards`}}/></div>}
            </div>
          ))}
        </div>
      </div>}

      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:14,marginBottom:14}} className="wh-grid">
        <div className="card card-pad">
          <div className="card-title" style={{marginBottom:11}}>Rate Limit 현황 (분당)</div>
          {clients.filter(c=>c.status==='활성').slice(0,5).map((r)=>{
            const ratio=r.rateUsedNow/r.rateLimitPerMin;
            return (
              <div key={r.id} style={{marginBottom:10}}>
                <div style={{display:'flex',justifyContent:'space-between',marginBottom:3}}>
                  <span style={{fontSize:12,fontWeight:500}}>{r.name}</span>
                  <span className="mono" style={{color:ratio>0.9?C.coral:C.stone}}>{r.rateUsedNow}/{r.rateLimitPerMin}{ratio>0.9?' ⚠':''}</span>
                </div>
                <div className="pbar"><div className={`pfill ${ratio>0.9?'warn':''}`} style={{width:`${Math.min(100,ratio*100)}%`}}/></div>
              </div>
            );
          })}
          <div style={{fontSize:11,color:C.stone,marginTop:6}}>한도 초과 시 <b style={{color:C.coral}}>429 Too Many Requests</b>로 차단 · 고객사별 독립 격리</div>
        </div>
        <div className="card card-pad">
          <div className="card-title" style={{marginBottom:11}}>Retry 설정</div>
          <div className="lav-strip" style={{marginBottom:10}}>지수 백오프: 1s → 2s → 4s (최대 {RETRY_MAX}회) · 소진 시 DLQ 보관</div>
          {[{l:'금일 성공',v:webhooks.filter(w=>w.status==='성공').length+'건',c:C.teal},{l:'재시도 후 성공',v:webhooks.filter(w=>w.status==='재시도후성공').length+'건',c:C.azure},{l:'최종 실패(DLQ)',v:webhooks.filter(w=>w.status==='최종실패').length+'건',c:C.coral}].map((s,i)=>(
            <div key={i} style={{display:'flex',justifyContent:'space-between',padding:'7px 0',borderBottom:i<2?'1px solid rgba(0,0,0,.04)':'none'}}>

      <div className="card" style={{overflow:'hidden'}}>

  API_KEY_ISSUE:'API Key 발급', API_KEY_SUSPEND:'API Key 정지', API_KEY_ACTIVATE:'API Key 활성화',
  API_KEY_REISSUE:'API Key 재발급', RATE_LIMIT_UPDATE:'Rate Limit 변경', SENSOR_QUERY:'센서 데이터 조회',
  WEBHOOK_SEND:'Webhook 발송', WEBHOOK_RETRY:'Webhook 재시도', PERMISSION_DENIED:'권한 거부', CLIENT_ADD:'고객사 초대',
  EXPORT:'데이터 내보내기', LOGIN:'로그인', VALIDATION_REJECT:'데이터 검증 거부',

};

          <input className="inp" style={{paddingLeft:30}} value={q} onChange={e=>{setQ(e.target.value);setPage(1);}} placeholder="대상·행위자·액션 검색"/>

          {actors.map(k=><option key={k} value={k}>{k==='전체'?'전체 행위자':k}</option>)}
        </select>
      </div>
      <div className="pill-row" style={{marginBottom:14}}>
        {['전체','성공','거부','차단'].map(r=><button key={r} className={`pill ${result===r?'on':''}`} onClick={()=>setF(setResult)(r)}>{r} ({r==='전체'?audit.length:cnt(r)})</button>)}
        <span style={{width:1,height:18,background:'rgba(0,0,0,.08)',margin:'0 4px',alignSelf:'center'}}/>
        {['전체','최근 7일','최근 30일'].map(r=><button key={r} className={`pill ${range===r?'on':''}`} onClick={()=>setF(setRange)(r)}>{r}</button>)}
      </div>
      {loading
        ? <div className="card card-pad"><Skeleton rows={6}/></div>
        : filtered.length===0
          ? <div className="card"><EmptyState icon="shield-check" title="조건에 맞는 로그 없음" msg="필터 조건을 바꾸거나 초기화해 보세요." cta={{label:'필터 초기화',onClick:resetAll}}/></div>
          : <div className="card" style={{overflow:'hidden'}}>
            <div className="tbl-wrap"><table className="tbl">
              <thead><tr><th>시각</th><th>행위자</th><th>액션</th><th>대상</th><th>결과</th><th>IP</th></tr></thead>
              <tbody>
                {rows.map((a)=>(
                  <tr key={a.id} style={{animation:'slideUp .12s ease'}}>
                    <td className="mono" style={{color:C.stone,whiteSpace:'nowrap'}}>{a.ts}</td>

                  </tr>
                ))}
              </tbody>
            </table></div>
            <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'10px 14px',borderTop:'var(--border)',fontSize:12,color:C.stone}}>
              <span>{filtered.length}건 중 {(cur-1)*PER+1}–{Math.min(cur*PER,filtered.length)} 표시</span>
              <div style={{display:'flex',alignItems:'center',gap:8}}>
                <button className="btn-g" onClick={()=>setPage(cur-1)} style={cur<=1?{opacity:.4,pointerEvents:'none'}:{}}>이전</button>
                <span>{cur} / {pages}</span>
                <button className="btn-g" onClick={()=>setPage(cur+1)} style={cur>=pages?{opacity:.4,pointerEvents:'none'}:{}}>다음</button>
              </div>
            </div>
          </div>}
    </div>
  );
}

/* ── RBACView (접근 통제 — 운영팀 멤버·역할 관리 + RBAC 편집, M-05) ── */
function RBACView() {
  const {pushAudit, pushToast} = useApp();
  const [members,setMembers]=useState(SEED_MEMBERS);
  const [roles,setRoles]=useState(()=>ROLES.map(r=>({id:r.id,desc:r.desc,perms:[...r.perms]})));
  const [invSeq,setInvSeq]=useState(0);
  const [invOpen,setInvOpen]=useState(false);
  const [invEmail,setInvEmail]=useState('');
  const [invName,setInvName]=useState('');
  const [invRole,setInvRole]=useState('뷰어');
  const [roleOpen,setRoleOpen]=useState(false);
  const [roleName,setRoleName]=useState('');
  const [roleDesc,setRoleDesc]=useState('');
  const assignRole=(id,role)=>{
    const m=members.find(x=>x.id===id); if(!m||m.role===role)return;
    setMembers(prev=>prev.map(x=>x.id===id?{...x,role}:x));
    pushAudit('ROLE_ASSIGN',`${m.name} 역할 변경 → ${role}`,'성공');
    pushToast(`${m.name} 역할 변경: ${role}`,'good');
  };
  const removeMember=(id)=>{
    const m=members.find(x=>x.id===id); if(!m)return;
    setMembers(prev=>prev.filter(x=>x.id!==id));
    pushAudit('CONFIG_CHANGE',`운영팀 멤버 제거 — ${m.name}`,'성공');
    pushToast(`${m.name} 제거됨`,'bad');
  };
  const sendInvite=()=>{
    const email=invEmail.trim();
    if(!email.includes('@')||!email.includes('.')){ pushToast('올바른 이메일을 입력하세요','bad'); return; }
    const n=invSeq+1; setInvSeq(n);
    const name=invName.trim()||email.split('@')[0];

function buildReq(ep, v, lang){
  let path=ep.path;
  ep.params.filter(p=>p.loc==='path').forEach(p=>{ path=path.replace('{'+p.n+'}', v[p.n]||('{'+p.n+'}')); });
  const qs=ep.params.filter(p=>p.loc==='query' && v[p.n]);
  const body=ep.params.filter(p=>p.loc==='body');
  const url='https://api.sensorhub.io'+path;
  const mkBody=()=>{ const o={}; body.forEach(p=>{ if(v[p.n]) o[p.n]= p.t.indexOf('[]')>=0 ? v[p.n].split(',').map(s=>s.trim()).filter(Boolean) : v[p.n]; }); return o; };
  if(lang==='curl'){
    if(ep.m!=='GET') return `curl -X ${ep.m} ${url} \\\n  -H "Authorization: Bearer sk_live_•••" \\\n  -H "Content-Type: application/json" \\\n  -d '${JSON.stringify(mkBody())}'`;
    let s=`curl${qs.length?' -G':''} ${url} \\\n  -H "Authorization: Bearer sk_live_•••"`;
    qs.forEach(p=>{ s+=` \\\n  -d ${p.n}=${v[p.n]}`; });
    return s;
  }
  if(ep.m!=='GET') return `await fetch('${url}', {\n  method: '${ep.m}',\n  headers: { Authorization:'Bearer sk_live_•••', 'Content-Type':'application/json' },\n  body: JSON.stringify(${JSON.stringify(mkBody())})\n});`;
  const qstr=qs.map(p=>`${p.n}=${v[p.n]}`).join('&');
  return `const r = await fetch('${url}${qstr?('?'+qstr):''}', {\n  headers: { Authorization: 'Bearer sk_live_•••' }\n});\nconst data = await r.json();`;
}

function ConfirmModal({modal,onClose}) {
  const {clients,actions}=useApp();
  const c=clients.find(x=>x.id===modal.id);
  if(!c) return null;
  const cfg={
    toggle: c.status==='활성'
      ? {title:'API Key 정지',msg:`${c.name}의 API Key를 정지합니다. 이후 이 Key의 모든 호출은 즉시 401로 차단되며, 실시간 모니터링·감사 로그에 동시 반영됩니다.`,label:'정지',danger:true}
      : {title:'API Key 활성화',msg:`${c.name}의 API Key를 다시 활성화합니다.`,label:'활성화',danger:false},
    reissue:{title:'API Key 재발급',msg:`${c.name}의 기존 Key는 즉시 폐기되고 새 Key가 발급됩니다. 고객사에 새 Key 전달이 필요합니다.`,label:'재발급',danger:true},
    issue:  {title:'API Key 발급',msg:`${c.name}에 신규 API Key를 발급하고 상태를 활성으로 전환합니다.`,label:'발급',danger:false},
  }[modal.type];
  const run=()=>{
    if(modal.type==='toggle') actions.toggleKeyStatus(c.id);
    if(modal.type==='reissue') actions.reissueKey(c.id);
    if(modal.type==='issue') actions.issueKey(c.id);
    onClose();
  };
  return (
    <Modal title={cfg.title} onClose={onClose}
      foot={<><button className="btn-g" onClick={onClose}>취소</button><button className="btn-p" style={cfg.danger?{background:C.coral}:{}} onClick={run}>{cfg.label}</button></>}>
      <div style={{fontSize:13,lineHeight:1.6}}>{cfg.msg}</div>
    </Modal>
  );
}

function App() {
  const [view,setView]=useState('main');
  const [clients,setClients]=useState(SEED_CLIENTS);
  const [sensors]=useState(SEED_SENSORS);
  const [webhooks,setWebhooks]=useState(SEED_WEBHOOKS);
  const [audit,setAudit]=useState(SEED_AUDIT);
  const [role,setRole]=useState('총괄관리자');
  const [toasts,setToasts]=useState([]);
  const [modal,setModal]=useState(null);
  const [sidebarOpen,setSidebarOpen]=useState(false);
  const [perspective,setPerspective]=useState('operator');
  const [tenantId,setTenantId]=useState('CL-01');
  const toastSeq=useRef(0);

  useEffect(()=>{ if(window.lucide)window.lucide.createIcons(); });

  const pushToast=(msg,kind)=>{
    toastSeq.current+=1; const id=toastSeq.current;
    setToasts(prev=>[...prev,{id,msg,kind}]);
    setTimeout(()=>setToasts(prev=>prev.filter(t=>t.id!==id)),3200);
  };
  const pushAudit=(action,target,result)=>{
    setAudit(prev=>[{id:nextAu(),ts:nowStamp(),actor:`${roleOf(role).staff} (${role})`,action,target,result,ip:roleOf(role).ip},...prev]);
  };
  const changeRole=(r)=>{ setRole(r); try{localStorage.setItem('sensorapi_role',r);}catch(e){} pushToast(`역할 전환: ${r}`); };
  const changePersp=(p)=>{ setPerspective(p); setView(p==='customer'?'cust-home':'main'); setSidebarOpen(false); pushToast(p==='customer'?'고객 포털로 전환':'운영자 콘솔로 전환'); };

  const actions={
    copyKey:(c)=>{ copyText(c.apiKeyFull); pushToast(`${c.name} API Key 복사됨`,'good'); },
    copyOwnKey:(c)=>{ copyText(c.apiKeyFull); pushToast('API Key 복사됨','good'); },
    rotateOwnKey:(id)=>{
      const c=clients.find(x=>x.id===id); if(!c)return;
      const k=genKey(c.name.slice(0,3).toLowerCase().replace(/[^a-z]/g,'')||'cl');
      setClients(prev=>prev.map(x=>x.id===id?{...x,status:'활성',apiKey:k.apiKey,apiKeyFull:k.apiKeyFull}:x));
      setAudit(prev=>[{id:nextAu(),ts:nowStamp(),actor:`${c.name} (고객)`,action:'API_KEY_REISSUE',target:`${id} 본인 API Key 재발급`,result:'성공',ip:'(고객 포털)'},...prev]);
      pushToast('API Key 재발급 완료 — 새 키를 안전하게 보관하세요','good');
    },
    inviteClient:(name,email)=>{
      const id=nextCl(); const domain=(email.split('@')[1])||'example.com';
      const today=new Date(); const ds=`${today.getFullYear()}-${pad2(today.getMonth()+1)}-${pad2(today.getDate())}`;
      setClients(prev=>[{id,name,domain,apiKey:'—',apiKeyFull:'',status:'대기',quotaDaily:5000,usedToday:0,rateLimitPerMin:300,rateUsedNow:0,webhookUrl:`https://${domain}/hook`,createdAt:ds},...prev]);
      pushAudit('CLIENT_ADD',`${id} ${name} 초대 (${email})`,'성공');
      pushToast(`${name} 초대 메일 발송 — 수락 시 API Key 발급`,'good');
    },
    issueKey:(id)=>{
      setClients(prev=>prev.map(c=>{ if(c.id!==id)return c; const k=genKey(c.name.slice(0,3).toLowerCase().replace(/[^a-z]/g,'')||'cl'); return {...c,status:'활성',apiKey:k.apiKey,apiKeyFull:k.apiKeyFull}; }));
      const c=clients.find(x=>x.id===id);
      pushAudit('API_KEY_ISSUE',`${id} ${c?c.name:''}`,'성공'); pushToast(`${c?c.name:'고객사'} API Key 발급 완료`,'good');
    },
    reissueKey:(id)=>{
      setClients(prev=>prev.map(c=>{ if(c.id!==id)return c; const k=genKey(c.name.slice(0,3).toLowerCase().replace(/[^a-z]/g,'')||'cl'); return {...c,status:'활성',apiKey:k.apiKey,apiKeyFull:k.apiKeyFull}; }));
      const c=clients.find(x=>x.id===id);
      pushAudit('API_KEY_REISSUE',`${id} ${c?c.name:''}`,'성공'); pushToast(`${c?c.name:'고객사'} API Key 재발급 완료 — 기존 Key 폐기`,'good');
    },
    toggleKeyStatus:(id)=>{
      const c=clients.find(x=>x.id===id); if(!c)return;
      const next=c.status==='활성'?'정지':'활성';
      setClients(prev=>prev.map(x=>x.id===id?{...x,status:next}:x));
      if(next==='정지'){
        setWebhooks(prev=>[{id:nextEvt(),type:'api_blocked',target:c.name,status:'실패',tries:1,httpCode:401,ts:nowTime()},...prev]);
        pushAudit('API_KEY_SUSPEND',`${id} ${c.name}`,'성공');
        pushToast(`${c.name} API Key 정지 — 이후 호출 401 차단`,'bad');
      } else {
        pushAudit('API_KEY_ACTIVATE',`${id} ${c.name}`,'성공');
        pushToast(`${c.name} API Key 활성화`,'good');
      }
    },
    recordWebhook:(target,status,tries,code)=>{
      setWebhooks(prev=>[{id:nextEvt(),type:'speed_alert',target,status,tries,httpCode:code,ts:nowTime()},...prev]);
    },
    exportClientsCSV:()=>{
      const head='고객사,도메인,상태,금일호출,일한도,분당한도\n';
      const body=clients.map(c=>`${c.name},${c.domain},${c.status},${c.usedToday},${c.quotaDaily},${c.rateLimitPerMin}`).join('\n');
      downloadFile('clients.csv','﻿'+head+body,'text/csv;charset=utf-8');
      pushAudit('EXPORT','고객사 현황 CSV','성공'); pushToast('고객사 현황 CSV 다운로드','good');
    },
    exportStatsCSV:(cls)=>{
      const head='고객사,금일호출,일한도,분당사용,분당한도\n';
      const body=cls.map(c=>`${c.name},${c.usedToday},${c.quotaDaily},${c.rateUsedNow},${c.rateLimitPerMin}`).join('\n');
      downloadFile('api-stats.csv','﻿'+head+body,'text/csv;charset=utf-8');
      pushAudit('EXPORT','호출 통계 CSV','성공'); pushToast('호출 통계 CSV 다운로드','good');
    },
    exportSensorJSON:(vin,rows)=>{
      downloadFile(`sensor-${vin}.json`,JSON.stringify({vin,count:rows.length,readings:rows},null,2),'application/json');
      pushAudit('EXPORT',`센서 데이터 JSON (${vin})`,'성공'); pushToast(`${vin} 센서 데이터 JSON 다운로드`,'good');
    },
    exportAuditCSV:(rows)=>{
      const head='시각,행위자,액션,대상,결과,IP\n';
      const body=rows.map(a=>`${a.ts},${a.actor},${(AUDIT_LABELS[a.action]||a.action)},${a.target},${a.result},${a.ip}`).join('\n');
      downloadFile('audit-log.csv','﻿'+head+body,'text/csv;charset=utf-8');
      pushToast('감사 로그 CSV 다운로드','good');
    },
  };

  const kpi=useMemo(()=>{
    const active=clients.filter(c=>c.status==='활성').length;
    const calls=clients.reduce((a,c)=>a+c.usedToday,0);
    const ok=webhooks.filter(w=>w.status==='성공'||w.status==='재시도후성공').length;
    const rate=webhooks.length?(ok/webhooks.length*100):100;
    return {activeClients:active,callsToday:calls,successRate:Math.round(rate*10)/10};
  },[clients,webhooks]);

  const curTenant=clients.find(c=>c.id===tenantId);
  const ctx={clients,sensors,webhooks,audit,role,kpi,actions,pushToast,pushAudit,perspective,tenantId,setTenantId,
    openModal:setModal, closeModal:()=>setModal(null)};

  const operatorNav=[
    {title:'API 관리',items:[
      {id:'main',label:'실시간 모니터링',icon:'activity'},
      {id:'api-key',label:'API Key 관리',icon:'key'},
      {id:'sensor-data',label:'센서 데이터 조회',icon:'database'},
      {id:'ingest',label:'수집 모니터',icon:'check-circle'},
    ]},
    {title:'연동 설정',items:[
      {id:'webhook',label:'Webhook 설정',icon:'zap'},
      {id:'stats',label:'호출 통계',icon:'bar-chart-2'},
      {id:'apidocs',label:'API 문서 (고객용)',icon:'book-open'},
    ]},
    {title:'보안·감사',items:[
      {id:'audit',label:'감사 로그',icon:'scroll-text'},
      {id:'rbac',label:'접근 통제',icon:'shield'},
    ]},
  ];
  const customerNav=[
    {title:'내 서비스',items:[
      {id:'cust-home',label:'대시보드',icon:'layout-dashboard'},
      {id:'cust-key',label:'내 API Key',icon:'key'},
      {id:'apidocs',label:'API 문서',icon:'book-open'},
    ]},
  ];
  const navGroups = perspective==='customer'?customerNav:operatorNav;
  const operatorViews={main:<MainView/>,'api-key':<ApiKeyView/>,'sensor-data':<SensorView/>,ingest:<IngestView/>,webhook:<WebhookView/>,stats:<StatsView/>,audit:<AuditView/>,rbac:<RBACView/>,apidocs:<ApiDocsView/>};
  const customerViews={'cust-home':<CustHome/>,'cust-key':<CustKeyView/>,apidocs:<ApiDocsView/>};
  const views = perspective==='customer'?customerViews:operatorViews;
  const nav=(id)=>{ setView(id); setSidebarOpen(false); };

  return (
    <AppCtx.Provider value={ctx}>
      <div className="shell" data-archetype="stripe-multipane">
        <div className={`sidebar-overlay ${sidebarOpen?'show':''}`} onClick={()=>setSidebarOpen(false)}/>
        <aside data-sidebar className={sidebarOpen?'open':''}>
          <div className="logo-wrap">
            <div style={{display:'flex',alignItems:'center',gap:9}}>
              <div className="logo-icon">S</div>
              <div><div className="logo-name">SensorAPI</div><div className="logo-sub">{perspective==='customer'?'Customer Portal':'Admin Console'}</div></div>
            </div>
          </div>
          {navGroups.map(g=>(
            <div className="nav-section" key={g.title}>
              <div className="nav-eyebrow">{g.title}</div>
              {g.items.map(it=>(
                <button key={it.id} className={`nav-btn ${view===it.id?'active':''}`} onClick={()=>nav(it.id)}>
                  <i data-lucide={it.icon} className="nav-ic" style={{width:14,height:14}}/>
                  {it.label}
                </button>
              ))}
            </div>
          ))}
          <div className="sidebar-foot">
            <div style={{display:'flex',alignItems:'center',gap:9,padding:'6px 8px'}}>
              <div className="avatar">{perspective==='customer'?(curTenant?curTenant.name[0]:'C'):roleOf(role).staff[0]}</div>
              <div><div style={{fontSize:13,fontWeight:500}}>{perspective==='customer'?(curTenant?curTenant.name:'고객'):roleOf(role).staff}</div><div style={{fontSize:11,color:C.stone}}>{perspective==='customer'?'고객 (개발자)':role}</div></div>
            </div>
          </div>
        </aside>

        <div className="main">
          <div className="hero-strip">
            <div style={{display:'flex',alignItems:'center',gap:12}}>
              <button className="hamburger" onClick={()=>setSidebarOpen(true)}><i data-lucide="menu" style={{width:18,height:18}}/></button>
              <div>
                <div className="hero-title">B2B 센서 데이터 API 플랫폼</div>
                <div className="hero-sub">{perspective==='customer'?'고객 포털 · 본인 테넌트 전용 · API 셀프 서비스':'운영자 콘솔 · 전체 고객사 관리 · 실시간 모니터링'}</div>
              </div>
            </div>
            <div className="hero-right">
              <div className="role-box" style={{display:'flex',alignItems:'center',gap:6}}>
                <span style={{fontSize:11,color:'#fff',opacity:.85}}>역할</span>
                <select value={perspective} onChange={e=>changePersp(e.target.value)} style={{fontSize:12,fontWeight:700,padding:'5px 10px',borderRadius:8,border:'1px solid rgba(0,0,0,.14)',background:C.white,color:C.ink,cursor:'pointer'}}>
                  <option value="operator">어드민 (운영자 콘솔)</option>
                  <option value="customer">유저 (고객 포털)</option>
                </select>
              </div>
              {perspective==='customer' &&
                <div className="role-box" style={{display:'flex',alignItems:'center',gap:6}}>
                  <span style={{fontSize:11,color:'#fff',opacity:.85}}>로그인</span>
                  <select value={tenantId} onChange={e=>setTenantId(e.target.value)} style={{fontSize:12,fontWeight:600,padding:'5px 8px',borderRadius:8,border:'1px solid rgba(0,0,0,.14)',background:C.white,color:C.ink,cursor:'pointer'}}>
                    {clients.filter(c=>c.status!=='만료').map(c=><option key={c.id} value={c.id}>{c.name}</option>)}
                  </select>
                </div>}
              {perspective==='operator' &&
                <div className="hero-kpi-row">
                  <div className="hero-kpi"><div className="hero-kpi-val">{kpi.activeClients}</div><div className="hero-kpi-lbl">활성 고객사</div></div>
                  <div className="hero-kpi"><div className="hero-kpi-val">12</div><div className="hero-kpi-lbl">API 엔드포인트</div></div>
                  <div className="hero-kpi"><div className="hero-kpi-val">{kpi.successRate}%</div><div className="hero-kpi-lbl">성공률</div></div>
                </div>}
            </div>
          </div>
          <div className="pane">{views[view]}</div>
        </div>
      </div>

      {modal && modal.type==='addClient' && <AddClientModal onClose={()=>setModal(null)}/>}
      {modal && ['toggle','reissue','issue'].includes(modal.type) && <ConfirmModal modal={modal} onClose={()=>setModal(null)}/>}

      <div className="toast-wrap">
        {toasts.map(t=><div key={t.id} className={`toast ${t.kind==='bad'?'bad':t.kind==='good'?'good':''}`}>{t.msg}</div>)}
      </div>
    </AppCtx.Provider>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
