function MiniLineChart({data, color=C2.accent, w=100, h=36}) {
  const max = Math.max(...data), min = Math.min(...data);
  const range = max - min || 1;
  const pts = data.map((v,i) => [
    (i/(data.length-1))*w,
    h - ((v-min)/range)*h
  ]);
  const d = pts.map((p,i) => `${i===0?'M':'L'}${p[0].toFixed(1)},${p[1].toFixed(1)}`).join(' ');
  const area = `${d} L${w},${h} L0,${h} Z`;
  return (
    <svg width={w} height={h} style={{display:'block',overflow:'visible'}}>
      <defs>
        <linearGradient id={`lg-${color.replace('#','')}`} x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stopColor={color} stopOpacity="0.3"/>
          <stop offset="100%" stopColor={color} stopOpacity="0.0"/>
        </linearGradient>
      </defs>
      <path d={area} fill={`url(#lg-${color.replace('#','')})`}/>
      <path d={d} fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/>
    </svg>
  );
}

function SeverityBadge({level}) {
  const map = {
    CRITICAL:{bg:'rgba(255,99,99,0.15)',color:'#ff6363',label:'CRITICAL'},
    HIGH:{bg:'rgba(255,165,80,0.15)',color:'#ffa550',label:'HIGH'},
    MEDIUM:{bg:'rgba(255,200,80,0.12)',color:'#ffc850',label:'MEDIUM'},
    LOW:{bg:'rgba(86,194,255,0.12)',color:'#56c2ff',label:'LOW'},
  };
  const s = map[level] || map.LOW;
  return <span style={{display:'inline-block',padding:'2px 8px',borderRadius:'5px',fontSize:'10px',fontWeight:'700',letterSpacing:'0.5px',background:s.bg,color:s.color}}>{s.label}</span>;
}

function StatusDot({ok, size=7}) {
  const color = ok ? C2.accentGreen : C2.accent;
  return <span style={{display:'inline-block',width:size,height:size,borderRadius:'50%',background:color,flexShrink:0,animation: ok ? 'pulse 3s infinite' : 'glow 2s infinite'}}/>
}

function Toast({msg, onClose}) {
  useEffect(() => { const t = setTimeout(onClose, 2800); return () => clearTimeout(t); }, []);

            <div style={{display:'flex',flexDirection:'column',gap:'14px'}}>
              <div>
                <label style={{fontSize:'12px',fontWeight:'600',color:C2.textSec,display:'block',marginBottom:'5px'}}>역할 이름 (대문자·언더스코어)</label>

              <div>

                <div style={{display:'flex',gap:'8px',flexWrap:'wrap'}}>
                  {Object.keys(permColors).map(p => (
                    <label key={p} style={{display:'flex',alignItems:'center',gap:'5px',cursor:'pointer'}}>
                      <input type="checkbox" style={{accentColor:C2.accent}}/>

            </div>
            <div style={{display:'flex',gap:'8px',marginTop:'24px',justifyContent:'flex-end'}}>
              <button className="btn-outline" onClick={() => setModal(null)}>취소</button>
              <button className="btn-accent" onClick={() => { setModal(null); toast('새 역할이 생성되었습니다.'); }}>역할 생성</button>
            </div>

      )}
    </div>
  );
}

function SandboxView({toast}) {
  const [selEndpoint, setSelEndpoint] = useState(sandboxEndpoints[0]);
  const [reqBody, setReqBody] = useState('{\n  "vin": "KNBBJ3DD9L3000001",\n  "from": "2026-06-26T00:00:00Z",\n  "to": "2026-06-26T14:32:00Z",\n  "limit": 100\n}');
  const [response, setResponse] = useState(null);
  const [loading, setLoading] = useState(false);
  const methodColors = {GET:C2.accentGreen,POST:C2.accentBlue,PUT:'#ffc850',DELETE:C2.accent};

  const runRequest = () => {
    setLoading(true);
    setTimeout(() => {
      setLoading(false);
      setResponse({
        status: 200,
        body: JSON.stringify({
          "status": "success",
          "data": [
            {"ts":"2026-06-26T14:32:01Z","vin":"KNBBJ3DD9L3000001","speed":78.4,"temp":82.1,"rpm":2340,"lat":37.5012,"lng":127.0391,"status":"normal"},
            {"ts":"2026-06-26T14:32:00Z","vin":"KNBBJ3DD9L3000001","speed":79.1,"temp":83.2,"rpm":2380,"lat":37.5015,"lng":127.0388,"status":"normal"}
          ],
          "total": 1847,
          "page": 1
        }, null, 2),
        time: '143ms'
      });
      toast('API 요청 실행됨 (200 OK)');
    }, 900);
  };

  return (
    <div style={{padding:'24px 28px',animation:'slideUp 0.3s ease',height:'calc(100vh - 96px)',display:'flex',flexDirection:'column',gap:'18px',overflow:'hidden'}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',flexShrink:0}}>
        <div>
          <h1 style={{fontSize:'20px',fontWeight:'700',color:C2.text}}>API 샌드박스 & Swagger 관리</h1>
          <p style={{fontSize:'12px',color:C2.textSec,marginTop:'4px'}}>OpenAPI 3.0 기반 · 실시간 API 테스트 환경</p>
        </div>
        <div style={{display:'flex',gap:'8px'}}>
          <button className="btn-ghost-dark" onClick={() => toast('Swagger UI 새 창에서 열림')}>
            <Icons.Code size={13} color="currentColor"/>Swagger UI
          </button>
          <button className="btn-ghost-dark" onClick={() => toast('OpenAPI 스펙 다운로드됨')}>
            <Icons.Download size={13} color="currentColor"/>openapi.yaml
          </button>
        </div>
      </div>

      <div style={{display:'flex',gap:'18px',flex:1,minHeight:0}}>
        {/* Endpoint list */}
        <div className="glass-card" style={{width:'260px',display:'flex',flexDirection:'column',overflow:'hidden',flexShrink:0}}>
          <div style={{padding:'12px 16px',borderBottom:`1px solid ${C2.border}`,flexShrink:0}}>
            <span style={{fontSize:'12px',fontWeight:'600',color:C2.text}}>엔드포인트</span>
          </div>
          <div style={{flex:1,overflowY:'auto'}}>
            {sandboxEndpoints.map((ep,i) => (
              <div key={i} onClick={() => setSelEndpoint(ep)} style={{padding:'11px 14px',cursor:'pointer',borderBottom:`1px solid ${C2.border2}`,background:selEndpoint===ep?'rgba(255,255,255,0.05)':'',transition:'background 0.15s'}}>
                <div style={{display:'flex',alignItems:'center',gap:'7px',marginBottom:'4px'}}>
                  <span style={{fontSize:'10px',fontWeight:'700',color:methodColors[ep.method],background:`${methodColors[ep.method]}18`,padding:'1px 6px',borderRadius:'4px',fontFamily:'monospace',minWidth:'36px',textAlign:'center'}}>{ep.method}</span>
                </div>
                <div style={{fontFamily:'monospace',fontSize:'11px',color:C2.text,lineHeight:'1.4'}}>{ep.path}</div>
                <div style={{fontSize:'10px',color:C2.textSec,marginTop:'2px'}}>{ep.desc}</div>
              </div>
            ))}
          </div>
        </div>

        {/* Request / Response */}
        <div style={{flex:1,display:'flex',flexDirection:'column',gap:'14px',overflow:'hidden'}}>
          {/* Selected endpoint */}
          <div className="glass-card" style={{padding:'16px 20px',flexShrink:0}}>
            <div style={{display:'flex',alignItems:'center',gap:'10px',marginBottom:'12px'}}>
              <span style={{fontSize:'13px',fontWeight:'700',color:methodColors[selEndpoint.method],background:`${methodColors[selEndpoint.method]}18`,padding:'4px 10px',borderRadius:'6px',fontFamily:'monospace'}}>{selEndpoint.method}</span>
              <code style={{fontSize:'13px',color:C2.text,fontFamily:'monospace'}}>{selEndpoint.path}</code>
              {selEndpoint.auth && <span className="stat-badge info" style={{fontSize:'10px'}}>인증 필요</span>}
            </div>
            <div style={{display:'flex',gap:'8px',alignItems:'center'}}>
              <input className="filter-input-dark" style={{flex:1,fontFamily:'monospace',fontSize:'12px'}} placeholder="Bearer token..." defaultValue="Bearer sl_live_k9mX••••••••"/>
              <button className="btn-accent" style={{gap:'6px'}} onClick={runRequest} disabled={loading}>
                {loading ? '요청 중...' : <><Icons.Play size={12} color="#fff"/>실행</>}
              </button>
            </div>
          </div>

          <div style={{display:'flex',gap:'14px',flex:1,minHeight:0}}>
            {/* Request body */}
            <div className="glass-card" style={{flex:1,display:'flex',flexDirection:'column',overflow:'hidden'}}>
              <div style={{padding:'10px 16px',borderBottom:`1px solid ${C2.border}`,fontSize:'11px',fontWeight:'600',color:C2.textSec,flexShrink:0}}>REQUEST BODY</div>
              <textarea style={{flex:1,background:'transparent',border:'none',outline:'none',color:C2.text,fontFamily:'monospace',fontSize:'12px',padding:'14px 16px',resize:'none',lineHeight:'1.6'}} value={reqBody} onChange={e => setReqBody(e.target.value)}/>
            </div>

            {/* Response */}
            <div className="glass-card" style={{flex:1,display:'flex',flexDirection:'column',overflow:'hidden'}}>
              <div style={{padding:'10px 16px',borderBottom:`1px solid ${C2.border}`,display:'flex',justifyContent:'space-between',alignItems:'center',flexShrink:0}}>
                <span style={{fontSize:'11px',fontWeight:'600',color:C2.textSec}}>RESPONSE</span>
                {response && <span style={{fontSize:'11px',fontWeight:'700',color:C2.accentGreen}}>{response.time} · 200 OK</span>}
              </div>
              <div style={{flex:1,overflow:'auto',padding:'14px 16px'}}>
                {!response && !loading && <span style={{fontSize:'12px',color:C2.textSec}}>요청을 실행하면 응답이 표시됩니다</span>}
                {loading && <span style={{fontSize:'12px',color:C2.accentBlue,animation:'pulse 1s infinite'}}>요청 처리 중...</span>}
                {response && <pre style={{fontFamily:'monospace',fontSize:'11px',color:C2.text,lineHeight:'1.6',whiteSpace:'pre-wrap',wordBreak:'break-word'}}>{response.body}</pre>}
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  );
}

function App() {

  const navItems = [
    {id:'main', label:'운영 센터', icon:<Icons.Activity size={14} color="currentColor"/>},

  const views = {

      <header data-topbar style={{background:C2.surface,borderBottom:`1px solid ${C2.border}`,padding:'0 24px',display:'flex',alignItems:'center',gap:'0',height:'52px',flexShrink:0,position:'sticky',top:0,zIndex:50}}>

        <div style={{display:'flex',alignItems:'center',gap:'10px',marginRight:'24px',flexShrink:0}}>
          <div style={{width:28,height:28,borderRadius:'8px',background:'radial-gradient(135deg, rgba(82,48,145,0.8), rgba(26,11,51,0.4))',border:`1px solid ${C2.border}`,display:'flex',alignItems:'center',justifyContent:'center',boxShadow:'0 2px 8px rgba(0,0,0,0.5)'}}>
            <Icons.Shield size={14} color={C2.accent}/>
          </div>
          <div>
            <div style={{fontSize:'13px',fontWeight:'700',color:C2.text,lineHeight:1}}>SOC OpsCenter</div>
            <div style={{fontSize:'10px',color:C2.textSec}}>v2.1.0 · Production</div>
          </div>
        </div>

        {/* Nav links */}
        <nav style={{display:'flex',alignItems:'center',gap:'2px',flex:1}}>
          {navItems.map(item => (
            <button key={item.id} className={`nav-link${view===item.id?' active':''}`} onClick={() => setView(item.id)}>
              {item.icon}
              {item.label}
            </button>
          ))}
        </nav>

        {/* Right controls */}
        <div style={{display:'flex',alignItems:'center',gap:'10px',flexShrink:0}}>
          <div className="btn-key" onClick={() => toast('검색 커맨드 활성화 (⌘K)')}>⌘K</div>
          <div style={{width:1,height:18,background:C2.border}}/>
          <button className="btn-ghost-dark" style={{borderRadius:'50%',width:30,height:30,padding:0,display:'flex',alignItems:'center',justifyContent:'center',borderColor:'transparent'}} onClick={() => toast('보안 알림 3건')}>
            <Icons.AlertTriangle size={15} color={C2.accent}/>
          </button>
          <div style={{width:28,height:28,borderRadius:'50%',background:'radial-gradient(135deg,rgba(255,99,99,0.3),rgba(167,139,250,0.2))',display:'flex',alignItems:'center',justifyContent:'center',border:`1px solid ${C2.border}`,cursor:'pointer',flexShrink:0}} onClick={() => toast('계정 설정')}>
            <Icons.Lock size={13} color={C2.textSec}/>
          </div>
        </div>
      </header>

      {/* Status Strip */}
      <StatusStrip/>

      {/* Main content */}
      <main style={{flex:1,overflow:'hidden',background:C2.bg}}>
        {views[view]}
      </main>

      {toastMsg && <Toast msg={toastMsg} onClose={() => setToastMsg(null)}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
