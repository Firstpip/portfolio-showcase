/* ── Gleap design tokens ── */
:root {
  --paper: #ffffff;
  --bone: #f5f2f0;
  --obsidian: #000000;
  --graphite: #333333;
  --slate: #7b7b7b;
  --mist: #bcbcbc;
  --silver: #d6d6d6;
  --lilac: #c178e8;
  --lilac-soft: #f1ccff;
  --lime: #c5f61e;
  --lime-dark: #9dbe0f;
  --sky: #91e0ff;
  --green: #16a34a;
  --red: #dc2626;
  --orange: #ea580c;
}
*{margin:0;padding:0;box-sizing:border-box}
html,body,#root{height:100%}
body{font-family:'Pretendard',system-ui,sans-serif;background:var(--paper);color:var(--obsidian);overflow:hidden}

/* ── Animations (≥3) ── */
@keyframes fadeInUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes countIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulseDot{0%,100%{opacity:0.5;transform:scale(0.85)}50%{opacity:1;transform:scale(1.1)}}
@keyframes barGrow{from{transform:scaleY(0);transform-origin:bottom}to{transform:scaleY(1);transform-origin:bottom}}
@keyframes slideIn{from{opacity:0;transform:translateX(12px)}to{opacity:1;transform:translateX(0)}}
@keyframes shimmer{0%{background-position:-300% 0}100%{background-position:300% 0}}
@keyframes limeGlow{0%,100%{box-shadow:0 0 0 0 rgba(197,246,30,0)}50%{box-shadow:0 0 0 6px rgba(197,246,30,0.25)}}
@keyframes rowIn{from{opacity:0;transform:translateX(-8px)}to{opacity:1;transform:translateX(0)}}
@keyframes spinDot{0%{transform:rotate(0deg)}100%{transform:rotate(360deg)}}

/* ── topbar-analytics layout ── */
.app{display:flex;flex-direction:column;height:100vh;overflow:hidden}

/* Top navigation bar */
.topbar{display:flex;align-items:center;padding:0 28px;height:56px;border-bottom:1px solid var(--silver);flex-shrink:0;background:var(--paper);gap:32px}
.logo{display:flex;align-items:center;gap:10px;text-decoration:none}
.logo-mark{width:30px;height:30px;border-radius:8px;background:var(--lilac);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;color:white}
.logo-text{font-size:15px;font-weight:800;color:var(--obsidian);letter-spacing:-0.5px}
.nav-tabs{display:flex;align-items:center;gap:2px;flex:1}
.tab-btn{padding:7px 14px;border-radius:8px;font-size:13.5px;font-weight:500;color:var(--slate);border:none;background:transparent;cursor:pointer;transition:all 0.15s;font-family:'Pretendard',sans-serif;display:flex;align-items:center;gap:6px;white-space:nowrap}
.tab-btn:hover{background:var(--bone);color:var(--obsidian)}
.tab-btn.active{background:var(--lilac-soft);color:var(--lilac);font-weight:700}
.topbar-right{display:flex;align-items:center;gap:10px;margin-left:auto}
.live-badge{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:6px;background:rgba(22,163,74,0.08);color:var(--green);font-size:11.5px;font-weight:700;border:1px solid rgba(22,163,74,0.18)}
.live-dot{width:6px;height:6px;border-radius:50%;background:var(--green);animation:pulseDot 1.5s ease infinite}
.export-btn{display:inline-flex;align-items:center;gap:6px;padding:6px 13px;border-radius:8px;font-size:13px;font-weight:600;color:var(--obsidian);border:1.5px solid var(--silver);background:transparent;cursor:pointer;font-family:'Pretendard',sans-serif;transition:all 0.15s}
.export-btn:hover{background:var(--bone);border-color:var(--graphite)}

/* Main content */
.content{flex:1;overflow-y:auto;padding:28px 28px;background:var(--paper)}

/* KPI cards */
.kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:24px}
.kpi-card{background:var(--bone);border-radius:24px;padding:20px 22px;animation:fadeInUp 0.35s ease both}
.kpi-card:nth-child(1){animation-delay:0s}
.kpi-card:nth-child(2){animation-delay:0.07s}
.kpi-card:nth-child(3){animation-delay:0.14s}
.kpi-card:nth-child(4){animation-delay:0.21s}
.kpi-label{font-size:12px;font-weight:600;color:var(--slate);margin-bottom:8px;display:flex;align-items:center;gap:6px}
.kpi-value{font-size:28px;font-weight:800;color:var(--obsidian);letter-spacing:-1px;animation:countIn 0.4s ease}
.kpi-sub{font-size:11.5px;color:var(--slate);margin-top:4px;display:flex;align-items:center;gap:4px}
.kpi-trend-up{color:var(--green);font-weight:700}
.kpi-trend-down{color:var(--red);font-weight:700}
.kpi-accent{display:inline-block;width:8px;height:8px;border-radius:50%}
.kpi-lime{background:var(--lime)}
.kpi-lilac{background:var(--lilac)}
.kpi-sky{background:var(--sky)}
.kpi-green{background:var(--green)}

.chart-sub{font-size:12px;color:var(--slate);margin-bottom:18px}
.chart-area{height:200px}

.table-title-row{display:flex;align-items:center;gap:10px}

.count-badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:6px;background:var(--lilac-soft);color:var(--lilac);font-size:11.5px;font-weight:700}
.filter-row{display:flex;gap:8px}
.filter-btn{padding:5px 12px;border-radius:8px;font-size:12px;font-weight:600;border:1px solid var(--silver);background:transparent;cursor:pointer;font-family:'Pretendard',sans-serif;color:var(--slate);transition:all 0.15s}
.filter-btn:hover{background:var(--bone);border-color:var(--graphite)}
.filter-btn.active{background:var(--lilac);color:white;border-color:var(--lilac)}
.data-table{width:100%;border-collapse:collapse}
.data-table th{font-size:11px;font-weight:700;color:var(--slate);text-transform:uppercase;letter-spacing:0.06em;padding:8px 12px;border-bottom:1px solid var(--silver);text-align:left}
.data-table td{padding:11px 12px;border-bottom:1px solid rgba(0,0,0,0.04);font-size:13px;color:var(--obsidian)}
.data-table tr{animation:rowIn 0.3s ease both}
.data-table tr:nth-child(1){animation-delay:0s}
.data-table tr:nth-child(2){animation-delay:0.05s}
.data-table tr:nth-child(3){animation-delay:0.1s}
.data-table tr:nth-child(4){animation-delay:0.15s}
.data-table tr:nth-child(5){animation-delay:0.2s}

.user-av{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:white;flex-shrink:0}
.status-pill{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:99px;font-size:11px;font-weight:700}
.pill-active{background:rgba(22,163,74,0.1);color:var(--green)}
.pill-idle{background:rgba(123,123,123,0.1);color:var(--slate)}
.pill-warning{background:rgba(234,88,12,0.1);color:var(--orange)}
.action-btn{padding:4px 10px;border-radius:7px;font-size:11.5px;font-weight:600;border:1px solid var(--silver);background:transparent;cursor:pointer;color:var(--slate);font-family:'Pretendard',sans-serif;transition:all 0.15s}
.action-btn:hover{background:var(--lilac);color:white;border-color:var(--lilac)}
.action-btn.danger:hover{background:var(--red);color:white;border-color:var(--red)}

.timeline-card{background:var(--bone);border-radius:24px;padding:22px 24px;margin-bottom:24px}
.timeline-list{display:flex;flex-direction:column;gap:0}
.timeline-item{display:flex;gap:14px;padding:12px 0;border-bottom:1px solid rgba(0,0,0,0.06);animation:rowIn 0.3s ease both}

.tl-dot-col{display:flex;flex-direction:column;align-items:center;gap:0}
.tl-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;margin-top:4px}
.tl-line{width:1px;flex:1;background:var(--silver);min-height:16px;margin-top:4px}
.tl-body{flex:1}
.tl-event{font-size:13px;font-weight:600;color:var(--obsidian);margin-bottom:2px}
.tl-meta{font-size:11.5px;color:var(--slate);display:flex;gap:10px}
.tl-tag{display:inline-flex;padding:2px 7px;border-radius:5px;font-size:10.5px;font-weight:700}
.tag-create{background:rgba(193,120,232,0.12);color:var(--lilac)}
.tag-expire{background:rgba(123,123,123,0.1);color:var(--slate)}
.tag-destroy{background:rgba(22,163,74,0.1);color:var(--green)}
.tag-warn{background:rgba(234,88,12,0.1);color:var(--orange)}

/* Privacy stats */
.privacy-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:24px}
.donut-card{background:var(--bone);border-radius:24px;padding:22px 24px}
.donut-title{font-size:14px;font-weight:700;color:var(--obsidian);margin-bottom:16px}
.donut-area{height:180px;position:relative}
.donut-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;pointer-events:none}
.donut-center-num{font-size:26px;font-weight:800;color:var(--obsidian);letter-spacing:-1px}
.donut-center-label{font-size:11px;color:var(--slate)}
.legend-row{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--obsidian);margin-bottom:6px}
.legend-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.bar-card{background:var(--bone);border-radius:24px;padding:22px 24px}
.bar-title{font-size:14px;font-weight:700;color:var(--obsidian);margin-bottom:16px}
.bar-area{height:180px}
.coverage-card{background:var(--bone);border-radius:24px;padding:22px 24px;grid-column:1/-1;display:flex;gap:32px;align-items:center}
.coverage-main{flex:1}
.coverage-pct{font-size:48px;font-weight:900;color:var(--obsidian);letter-spacing:-2px;animation:countIn 0.5s ease}
.coverage-label{font-size:13px;color:var(--slate);margin-top:4px}
.coverage-bar-wrap{flex:2}
.coverage-bar-bg{height:14px;background:var(--silver);border-radius:99px;overflow:hidden;margin-top:8px}
.coverage-bar-fill{height:100%;background:linear-gradient(90deg,var(--lilac),var(--lime));border-radius:99px;animation:barGrow 1s ease both;transform-origin:left}

/* Table actions */
.inline-btn{padding:4px 9px;border-radius:6px;font-size:11px;font-weight:600;border:1px solid var(--silver);background:transparent;cursor:pointer;color:var(--slate);font-family:'Pretendard',sans-serif;margin-right:4px;transition:all 0.15s}
.inline-btn:hover{background:rgba(193,120,232,0.12);color:var(--lilac);border-color:var(--lilac)}
.inline-btn.del:hover{background:rgba(220,38,38,0.1);color:var(--red);border-color:var(--red)}

/* Scrollbar */
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--silver);border-radius:5px}

/* Lime highlight */
.lime-tag{display:inline-flex;align-items:center;padding:3px 8px;border-radius:6px;background:rgba(197,246,30,0.18);color:var(--lime-dark);font-size:11px;font-weight:700;animation:limeGlow 3s ease infinite}
</style>

/* CountUp hook */
function useCountUp(target, duration = 900) {
  const [count, setCount] = useState(0);
  useEffect(() => {
    const start = Date.now();
    const timer = setInterval(() => {
      const elapsed = Date.now() - start;
      const progress = Math.min(elapsed / duration, 1);
      const eased = 1 - Math.pow(1 - progress, 3);
      setCount(Math.round(eased * target));
      if (progress >= 1) clearInterval(timer);
    }, 16);
    return () => clearInterval(timer);
  }, [target, duration]);
  return count;
}

/* Toast component */
function Toast({ message, onClose }) {
  useEffect(() => {
    const t = setTimeout(onClose, 2500);
    return () => clearTimeout(t);
  }, [onClose]);
  return (
    <div style={{ position:'fixed',bottom:24,right:24,background:'var(--obsidian)',color:'white',padding:'10px 18px',borderRadius:12,fontSize:13,fontWeight:600,zIndex:999,animation:'slideIn 0.2s ease',boxShadow:'0 4px 20px rgba(0,0,0,0.18)' }}>
      {message}
    </div>
  );
}
