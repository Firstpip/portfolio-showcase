<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>전통공예 스토리 RAG 콘텐츠 스튜디오 — 맞춤 구현 데모</title>
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/regular/style.css">
<link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/fill/style.css">
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
:root{
  --bg:#f9efe4;
  --vellum:#fdf9f4;
  --chalk:#fdfdfd;
  --ink:#3f434a;
  --graphite:#2d2f34;
  --slate:#656565;
  --ash:#9da3af;
  --silver:#d9dde6;
  --linen:#f0e4d6;
  --blueprint:#2e77e5;
  --blossom-bg:#fae9f4; --blossom-text:#9d4d77;
  --buttercup-bg:#fbf4d8; --buttercup-text:#7f6c1f;
  --sage-bg:#eaf2ea; --sage-text:#547358;
  --danger-bg:#fdecea; --danger-text:#b3261e;
  --shadow-card: rgba(0,0,0,.01) 0px 4px 12px 0px, rgba(0,0,0,.05) 0px 2px 6px 0px, rgba(0,0,0,.1) 0px 1px 3px 0px;
  --r-card:14px;
  --r-pill:46px;
  --r-badge:50px;
  --r-modal:24px;
}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;}
body{font-family:'Pretendard Variable',sans-serif;background:var(--bg);color:var(--ink);-webkit-font-smoothing:antialiased;}
button,input,select,textarea{font-family:inherit;}
button{cursor:pointer;}
a{text-decoration:none;color:inherit;}
i.ph, i.ph-fill{font-size:15px;line-height:1;}
::-webkit-scrollbar{width:8px;height:8px;}
::-webkit-scrollbar-thumb{background:var(--silver);border-radius:8px;}

@keyframes fadeInUp{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
@keyframes toggleOpen{from{opacity:0;max-height:0;}to{opacity:1;max-height:640px;}}
@keyframes pulseDot{0%,100%{opacity:1;box-shadow:0 0 0 0 rgba(46,119,229,.35);}50%{opacity:.55;box-shadow:0 0 0 6px rgba(46,119,229,0);}}
@keyframes spinLoader{from{transform:rotate(0deg);}to{transform:rotate(360deg);}}
@keyframes slideInDrawer{from{transform:translateX(100%);}to{transform:translateX(0);}}
@keyframes toastIn{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}
@keyframes cardApprove{0%{transform:scale(1);}50%{transform:scale(1.028);}100%{transform:scale(1);}}
@keyframes shimmerSweep{0%{background-position:-200px 0;}100%{background-position:200px 0;}}

/* ===== SIDEBAR (notion-blocks-tree signature) ===== */
.app-shell{display:flex;width:100%;min-height:100vh;}
.sidebar.tree-sidebar{position:fixed;left:0;top:0;bottom:0;width:240px;background:var(--vellum);border-right:1px solid var(--silver);display:flex;flex-direction:column;overflow-y:auto;z-index:20;}
.sidebar-brand{padding:20px 16px 10px;display:flex;align-items:center;gap:9px;}
.brand-mark{width:28px;height:28px;border-radius:8px;background:var(--graphite);display:flex;align-items:center;justify-content:center;color:var(--chalk);font-size:13px;font-weight:700;flex-shrink:0;}
.brand-name{font-size:13.5px;font-weight:700;color:var(--ink);}
.brand-caret{margin-left:auto;color:var(--ash);font-size:11px;}
.live-pill{display:flex;align-items:center;gap:6px;margin:0 16px 14px;padding:5px 10px;background:var(--chalk);border:1px solid var(--silver);border-radius:var(--r-badge);font-size:11px;color:var(--slate);width:fit-content;}
.live-dot{width:6px;height:6px;border-radius:50%;background:var(--blueprint);animation:pulseDot 1.8s infinite;flex-shrink:0;}
.sidebar-search{padding:0 12px 10px;display:flex;flex-direction:column;gap:5px;}
.sidebar-btn{display:flex;align-items:center;gap:8px;width:100%;padding:7px 10px;border:1px solid transparent;background:transparent;border-radius:8px;font-size:12.5px;color:var(--slate);text-align:left;}
.sidebar-btn:hover{background:var(--chalk);color:var(--ink);}
.tree-nav{flex:1;padding:6px 8px 12px;overflow-y:auto;}
.tree-group{margin-bottom:2px;}
.tree-group-label{display:flex;align-items:center;gap:6px;padding:7px 8px;border-radius:6px;font-size:11.5px;font-weight:700;color:var(--ash);text-transform:uppercase;letter-spacing:.04em;background:none;border:none;width:100%;text-align:left;}
.tree-group-label:hover{color:var(--ink);}
.tree-item{display:flex;align-items:center;gap:6px;padding:6px 8px;border-radius:6px;font-size:13px;color:var(--ink);cursor:pointer;border:none;background:none;width:100%;text-align:left;}
.tree-item:hover{background:var(--chalk);}
.tree-item.active{background:var(--chalk);color:var(--blueprint);font-weight:600;}
.tree-toggle{width:13px;font-size:10px;color:var(--ash);background:none;border:none;padding:0;flex-shrink:0;transition:transform .15s;}
.tree-toggle.open{transform:rotate(90deg);}
.tree-toggle-placeholder{width:13px;flex-shrink:0;}
.tree-icon{font-size:13.5px;color:var(--slate);flex-shrink:0;}
.tree-item.active .tree-icon{color:var(--blueprint);}
.tree-label{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.sidebar-footer{padding:10px 8px 16px;border-top:1px solid var(--silver);display:flex;flex-direction:column;gap:2px;}
.footer-link{display:flex;align-items:center;gap:8px;padding:7px 10px;border:none;background:none;border-radius:6px;font-size:12px;color:var(--slate);text-align:left;width:100%;}
.footer-link:hover{background:var(--chalk);}

/* ===== MAIN ===== */
.main-wrap{margin-left:240px;flex:1;min-width:0;width:calc(100% - 240px);min-height:100vh;display:flex;flex-direction:column;}
.page-breadcrumb{display:flex;align-items:center;gap:6px;padding:18px 40px 0;font-size:12px;color:var(--ash);}
.page-breadcrumb .sep{color:var(--silver);}
.page-breadcrumb .current{color:var(--ink);font-weight:600;}
.page-cover{margin:16px 40px 0;height:170px;border-radius:var(--r-card);overflow:hidden;position:relative;}
.page-body{max-width:840px;margin:0 auto;padding:28px 40px 48px;width:100%;animation:fadeInUp .35s ease both;}
.page-icon-row{display:flex;align-items:flex-end;gap:10px;margin-bottom:4px;}
.page-icon-large{width:54px;height:54px;border-radius:14px;background:var(--chalk);border:1px solid var(--silver);display:flex;align-items:center;justify-content:center;font-size:24px;color:var(--blueprint);margin-top:-40px;box-shadow:var(--shadow-card);flex-shrink:0;}
.page-meta{display:flex;gap:6px;margin-left:auto;flex-wrap:wrap;}
.meta-action{display:flex;align-items:center;gap:6px;padding:6px 10px;border:1px solid transparent;border-radius:8px;background:none;font-size:12px;color:var(--slate);}
.meta-action:hover{background:var(--chalk);border-color:var(--silver);}
.page-title{font-size:40px;font-weight:700;line-height:1.2;color:var(--ink);margin:16px 0 26px;letter-spacing:-.5px;}

/* ===== BLOCKS ===== */
.block-list{display:flex;flex-direction:column;gap:3px;}
.block{position:relative;padding:7px 6px;border-radius:8px;animation:fadeInUp .4s ease both;}
.block:hover{background:rgba(45,47,52,.025);}
.block-text p{font-size:15px;line-height:1.75;color:var(--ink);}
.block-heading h2{font-size:23px;font-weight:700;margin:16px 0 4px;color:var(--ink);letter-spacing:-.2px;}
.block-toggle .toggle-head{display:flex;align-items:center;gap:8px;padding:6px 4px;font-size:14px;font-weight:600;color:var(--ink);background:none;border:none;width:100%;text-align:left;}
.toggle-arrow{transition:transform .2s;color:var(--ash);font-size:11px;}
.toggle-arrow.open{transform:rotate(90deg);}
.toggle-content{overflow:hidden;animation:toggleOpen .28s ease;padding:8px 4px 4px 22px;display:flex;flex-direction:column;gap:9px;}
.block-callout{display:flex;gap:10px;background:var(--linen);border-radius:10px;padding:14px 16px;border-left:3px solid var(--blueprint);}
.callout-icon{color:var(--blueprint);font-size:16px;margin-top:2px;flex-shrink:0;}
.callout-text{font-size:13.5px;color:var(--ink);line-height:1.65;}
.block-table table{width:100%;border-collapse:collapse;font-size:13px;}
.block-table th{text-align:left;padding:8px 10px;color:var(--ash);font-weight:600;font-size:10.5px;text-transform:uppercase;letter-spacing:.04em;border-bottom:1px solid var(--silver);}
.block-table td{padding:10px;border-bottom:1px solid var(--silver);color:var(--ink);vertical-align:middle;}
.block-table tr.clickable{cursor:pointer;}
.block-table tr.clickable:hover td{background:var(--vellum);}
.block-divider hr{border:none;border-top:1px solid var(--silver);margin:16px 0;}
.block-cards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(238px,1fr));gap:12px;margin-top:6px;}
.v-card{background:var(--chalk);border:1px solid var(--silver);border-radius:var(--r-card);padding:16px;box-shadow:var(--shadow-card);display:flex;flex-direction:column;gap:8px;}
.v-card.approve-pulse{animation:cardApprove .4s ease;}
.v-card-top{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;}
.v-card-name{font-size:14px;font-weight:700;color:var(--ink);}
.v-card-cat{font-size:11px;color:var(--ash);margin-top:2px;}
.v-card-diff{font-size:12px;color:var(--slate);line-height:1.55;}
.v-card-actions{display:flex;gap:6px;margin-top:4px;}
.block-form{background:var(--chalk);border:1px solid var(--silver);border-radius:var(--r-card);padding:20px;display:flex;flex-direction:column;gap:14px;box-shadow:var(--shadow-card);margin-top:4px;}
.form-row{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;}
.form-row label{font-size:13px;color:var(--ink);font-weight:600;}
.form-row select, .form-row input[type=number]{padding:6px 10px;border:1px solid var(--silver);border-radius:8px;font-size:13px;color:var(--ink);background:var(--vellum);}
.toggle-switch{width:38px;height:22px;border-radius:20px;background:var(--silver);position:relative;border:none;transition:background .2s;flex-shrink:0;}
.toggle-switch.on{background:var(--blueprint);}
.toggle-switch .knob{position:absolute;top:2px;left:2px;width:18px;height:18px;border-radius:50%;background:#fff;transition:left .2s;}
.toggle-switch.on .knob{left:18px;}
.block-code pre{background:var(--graphite);color:#e7e9ee;padding:16px 18px;border-radius:10px;font-family:'Geist Mono',ui-monospace,Menlo,monospace;font-size:12px;line-height:1.75;overflow-x:auto;letter-spacing:.03em;}

/* ===== BADGES / BUTTONS ===== */
.badge{display:inline-flex;align-items:center;padding:3px 11px;border-radius:var(--r-badge);font-size:11px;font-weight:600;white-space:nowrap;}
.badge-buttercup{background:var(--buttercup-bg);color:var(--buttercup-text);}
.badge-blossom{background:var(--blossom-bg);color:var(--blossom-text);}
.badge-sage{background:var(--sage-bg);color:var(--sage-text);}
.badge-danger{background:var(--danger-bg);color:var(--danger-text);}
.badge-blueprint{background:#e7f0fd;color:var(--blueprint);}
.btn-pill{border-radius:var(--r-pill);padding:8px 18px;font-size:13px;font-weight:600;border:none;display:inline-flex;align-items:center;gap:6px;transition:background .15s;}
.btn-pill-primary{background:var(--graphite);color:var(--chalk);}
.btn-pill-primary:hover{background:#1f2125;}
.btn-pill-outline{background:transparent;border:1px solid var(--graphite);color:var(--graphite);}
.btn-pill-outline:hover{background:var(--chalk);}
.btn-pill-danger{background:transparent;border:1px solid var(--danger-text);color:var(--danger-text);}
.btn-pill-danger:hover{background:var(--danger-bg);}
.btn-sm{padding:6px 14px;font-size:12px;}
.btn-pill:disabled{opacity:.5;cursor:default;}

/* ===== TABS ===== */
.tab-row{display:flex;gap:6px;margin:8px 0 16px;flex-wrap:wrap;}
.tab-chip{padding:6px 15px;border-radius:var(--r-badge);border:1px solid var(--silver);background:var(--chalk);font-size:12.5px;color:var(--slate);font-weight:500;}
.tab-chip.active{background:var(--graphite);color:var(--chalk);border-color:var(--graphite);}

/* ===== RAG EDITOR CUSTOM BLOCKS ===== */
.template-card{background:var(--chalk);border:1px solid var(--silver);border-radius:var(--r-card);padding:18px 20px;box-shadow:var(--shadow-card);margin-top:4px;}
.template-var{color:var(--blueprint);background:#e7f0fd;padding:1px 6px;border-radius:5px;font-size:12.5px;font-weight:600;}
.template-body{font-size:13.5px;line-height:1.8;color:var(--ink);margin-top:8px;}
.gen-card{background:var(--chalk);border:1px solid var(--silver);border-radius:var(--r-card);padding:18px 20px;display:flex;flex-direction:column;gap:12px;margin-top:4px;box-shadow:var(--shadow-card);}
.gen-card-head{display:flex;justify-content:space-between;align-items:center;}
.gen-text{font-size:14px;line-height:1.75;color:var(--ink);min-height:64px;}
.history-item{display:flex;gap:10px;align-items:flex-start;padding:11px 4px;border-bottom:1px solid var(--silver);}
.history-item:last-child{border-bottom:none;}
.history-meta{font-size:11px;color:var(--ash);}
.history-snippet{font-size:12.5px;color:var(--ink);margin-top:3px;line-height:1.5;}
.history-actions{display:flex;gap:4px;margin-left:auto;flex-shrink:0;}
.icon-toggle{background:none;border:none;color:var(--ash);font-size:15px;padding:4px;border-radius:6px;}
.icon-toggle:hover{background:var(--vellum);}
.icon-toggle.liked{color:#c65a83;}
.reason-input-row{display:flex;gap:6px;margin-top:8px;}
.reason-input-row input{flex:1;padding:6px 10px;border:1px solid var(--silver);border-radius:8px;font-size:12px;}

/* ===== FEEDBACK STRIP ===== */
.feedback-strip{margin-top:24px;padding-top:16px;border-top:1px dashed var(--silver);display:flex;flex-direction:column;gap:8px;}
.feedback-strip-title{font-size:10.5px;text-transform:uppercase;color:var(--ash);letter-spacing:.06em;margin-bottom:4px;}
.feedback-item{display:flex;align-items:center;gap:10px;background:var(--vellum);border-radius:10px;padding:10px 14px;font-size:12.5px;color:var(--ink);}
.feedback-item i{color:var(--blueprint);flex-shrink:0;}
.feedback-time{margin-left:auto;color:var(--ash);font-size:11px;flex-shrink:0;}

/* ===== SLASH MENU ===== */
.slash-menu{position:fixed;z-index:80;left:50%;top:50%;transform:translate(-50%,-50%);width:320px;background:var(--chalk);border:1px solid var(--silver);border-radius:14px;box-shadow:0 20px 60px rgba(0,0,0,.18);padding:10px;animation:fadeInUp .18s ease;}
.slash-menu-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;padding:0 4px;}
.slash-input{width:100%;padding:8px 10px;border:1px solid var(--silver);border-radius:8px;font-size:13px;margin-bottom:6px;color:var(--ink);}
.slash-group-title{font-size:10px;text-transform:uppercase;color:var(--ash);padding:6px 8px 2px;letter-spacing:.05em;}
.slash-item{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:8px;font-size:13px;color:var(--ink);background:none;border:none;width:100%;text-align:left;}
.slash-item:hover{background:var(--vellum);}
.add-block-btn{display:flex;align-items:center;gap:6px;padding:9px 10px;margin-top:12px;border:1px dashed var(--silver);border-radius:8px;color:var(--ash);font-size:13px;background:none;width:100%;}
.add-block-btn:hover{border-color:var(--blueprint);color:var(--blueprint);}
.overlay-dim{position:fixed;inset:0;background:rgba(45,47,52,.15);z-index:75;}

/* ===== MODAL ===== */
.modal-overlay{position:fixed;inset:0;background:rgba(45,47,52,.4);display:flex;align-items:center;justify-content:center;z-index:100;animation:fadeInUp .2s ease;padding:20px;}
.modal{width:540px;max-width:100%;max-height:82vh;overflow-y:auto;background:var(--chalk);border-radius:var(--r-modal);padding:28px;box-shadow:0 30px 80px rgba(0,0,0,.25);}
.modal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;}
.modal-title{font-size:18px;font-weight:700;color:var(--ink);}
.modal-close{background:none;border:none;color:var(--ash);font-size:18px;padding:4px;}
.modal-row{display:flex;justify-content:space-between;padding:9px 0;border-bottom:1px solid var(--silver);font-size:13px;gap:16px;}
.modal-row .k{color:var(--slate);flex-shrink:0;}
.modal-row .v{color:var(--ink);font-weight:600;text-align:right;}
.modal-footer{display:flex;justify-content:flex-end;gap:8px;margin-top:18px;}
.modal-list{background:var(--vellum);border-radius:10px;padding:12px 14px;font-size:12.5px;color:var(--slate);margin-top:10px;line-height:1.8;}

/* ===== DRAWER (comments) ===== */
.drawer-overlay{position:fixed;inset:0;background:rgba(45,47,52,.3);z-index:90;}
.drawer{position:fixed;right:0;top:0;bottom:0;width:340px;background:var(--chalk);box-shadow:-8px 0 32px rgba(0,0,0,.12);z-index:95;animation:slideInDrawer .25s ease;display:flex;flex-direction:column;}
.drawer-header{padding:18px 20px;border-bottom:1px solid var(--silver);display:flex;justify-content:space-between;align-items:center;font-weight:700;font-size:14px;}
.drawer-body{flex:1;overflow-y:auto;padding:16px 20px;display:flex;flex-direction:column;gap:14px;}
.comment{display:flex;gap:10px;}
.comment-avatar{width:28px;height:28px;border-radius:50%;flex-shrink:0;}
.comment-bubble{background:var(--vellum);border-radius:10px;padding:9px 12px;font-size:12.5px;color:var(--ink);line-height:1.6;}
.comment-author{font-size:11.5px;font-weight:700;margin-bottom:2px;color:var(--ink);}
.drawer-footer{padding:12px 16px;border-top:1px solid var(--silver);display:flex;gap:8px;}
.drawer-footer input{flex:1;padding:9px 12px;border:1px solid var(--silver);border-radius:20px;font-size:12.5px;}

/* ===== TOAST / SPINNER ===== */
.toast{position:fixed;bottom:24px;right:24px;background:var(--graphite);color:var(--chalk);padding:12px 18px;border-radius:12px;font-size:13px;box-shadow:0 12px 32px rgba(0,0,0,.2);z-index:200;animation:toastIn .3s ease;display:flex;align-items:center;gap:8px;}
.spinner{width:14px;height:14px;border:2px solid rgba(255,255,255,.35);border-top-color:#fff;border-radius:50%;animation:spinLoader .7s linear infinite;flex-shrink:0;}
.spinner-dark{border:2px solid rgba(63,67,74,.2);border-top-color:var(--graphite);}
</style>
</head>
<body data-archetype="notion-blocks-tree">
<div id="root"></div>
<script type="text/babel">
const {useState, useEffect, useRef} = React;

/* ============ DATA ============ */
const TREE = [
  { id:'g1', label:'데이터 소싱', icon:'ph-database', children:[
    { id:'c1', label:'상품 크롤링 및 검증 UI', icon:'ph-file-text', screen:'main' },
    { id:'c2', label:'웹 검색 스토리 수집', icon:'ph-globe', screen:'main', children:[
      { id:'c2g1', label:'수집 소스 관리', icon:'ph-link-simple', screen:'main' }
    ]}
  ]},
  { id:'g2', label:'지식베이스', icon:'ph-tree-structure', children:[
    { id:'c3', label:'Vector DB 동기화', icon:'ph-graph', screen:'vector-sync', children:[
      { id:'c3g1', label:'Pinecone 네임스페이스', icon:'ph-cube', screen:'vector-sync' }
    ]},
    { id:'c4', label:'프롬프트 템플릿', icon:'ph-note', screen:'rag-editor' }
  ]},
  { id:'g3', label:'콘텐츠 생성', icon:'ph-magic-wand', children:[
    { id:'c5', label:'RAG 기반 다국어 콘텐츠 생성', icon:'ph-translate', screen:'rag-editor', children:[
      { id:'c5g1', label:'생성 히스토리', icon:'ph-clock-counter-clockwise', screen:'rag-editor' }
    ]}
  ]},
  { id:'g4', label:'운영 관리', icon:'ph-gear-six', children:[
    { id:'c6', label:'관리자 인증 및 보안', icon:'ph-shield-check', screen:'settings', children:[
      { id:'c6g1', label:'감사 로그', icon:'ph-list-checks', screen:'settings' }
    ]}
  ]}
];

const BREADCRUMB = {
  'main': ['전통공예 스튜디오', '데이터 소싱', '상품 크롤링 및 검증'],

function CoverArt({ variant }) {
  const palettes = [
    ['#eebacb', '#f9efe4'],
    ['#d9dde6', '#f0e4d6'],
    ['#c8e0f4', '#fae9f4'],
  ];
  const [c1, c2] = palettes[variant % palettes.length];
  return (
    <svg width="100%" height="100%" viewBox="0 0 1000 170" preserveAspectRatio="xMidYMid slice">
      <defs>
        <linearGradient id={`cg-${variant}`} x1="0" y1="0" x2="1" y2="1">

        </pattern>
      </defs>
      <rect width="1000" height="170" fill={`url(#cg-${variant})`} />
      <rect width="1000" height="170" fill={`url(#lattice-${variant})`} />
      <circle cx="860" cy="40" r="70" fill="#2e77e5" opacity="0.08" />
      <circle cx="120" cy="140" r="90" fill="#2d2f34" opacity="0.05" />
    </svg>
  );
}

function TreeNode({ node, depth, currentScreen, setScreen, expanded, toggleExpand }) {
  const hasChildren = node.children && node.children.length > 0;
  const isOpen = expanded[node.id] !== false;
  const padding = 8 + depth * 28;
  return (
    <div>
      <button
        className={`tree-item${currentScreen === node.screen ? ' active' : ''}`}
        style={{ paddingLeft: padding }}
        onClick={() => {
          if (hasChildren) toggleExpand(node.id);
          if (node.screen) setScreen(node.screen);
        }}
      >
        {hasChildren ? (
          <i className={`ph ph-caret-right tree-toggle${isOpen ? ' open' : ''}`}></i>
        ) : (
          <span className="tree-toggle-placeholder"></span>
        )}
        <i className={`ph ${node.icon} tree-icon`}></i>
        <span className="tree-label">{node.label}</span>
      </button>
      {hasChildren && isOpen && node.children.map(child => (
        <TreeNode key={child.id} node={child} depth={depth + 1} currentScreen={currentScreen} setScreen={setScreen} expanded={expanded} toggleExpand={toggleExpand} />
      ))}
    </div>
  );
}

        <button className="toggle-head" onClick={() => setOpen(!open)}>

            <tbody>
              {batches.map(b => (
                <tr className="clickable" key={b.id} onClick={() => setSelectedBatch(b)}>
                  <td>{b.id}</td><td>{b.source}</td><td>{b.count}건</td><td><Badge status={b.status} /></td><td>{b.time}</td>

              ))}
            </tbody>
          </table>
        </div>
      </Block>
      <ToggleBlock title={`실패 항목 ${failed.length}건 보기`} delay={d++}>

      </ToggleBlock>
      <Block delay={d++}><div className="block-callout" data-block-type="callout"><i className="ph ph-lightbulb callout-icon"></i><span className="callout-text">크롤러 배치 주기는 매일 새벽 3시입니다. 수동 재수집은 배치 상세 화면에서 실행할 수 있습니다.</span></div></Block>

function VectorSyncScreen({ toast, delayBase }) {
  const [chunkSize, setChunkSize] = useState(500);
  const [overlap, setOverlap] = useState(50);
  const [model, setModel] = useState('text-embedding-3-large');
  const [namespaces, setNamespaces] = useState(NAMESPACES);
  const [retryQueue, setRetryQueue] = useState(INIT_RETRY_QUEUE);
  const [selectedNs, setSelectedNs] = useState(null);
  const [resyncing, setResyncing] = useState(false);

  const runResync = () => {
    setResyncing(true);
    setTimeout(() => {
      setRetryQueue([]);
      setNamespaces(ns => ns.map(n => n.status === '진행중' ? { ...n, status: '완료', last: '방금 전' } : n));
      setResyncing(false);
      toast('재동기화가 완료되어 모든 네임스페이스가 최신 상태입니다.');
    }, 1300);
  };

  let d = delayBase;
  return (
    <React.Fragment>
      <Block delay={d++}><div className="block-text" data-block-type="text"><p>제품 설명 텍스트를 청크 단위로 분할하고 임베딩을 생성한 뒤, Pinecone 네임스페이스에 자동으로 동기화하는 파이프라인입니다.</p></div></Block>
      <Block delay={d++}><div className="block-heading" data-block-type="heading"><h2>청킹 파라미터</h2></div></Block>
      <Block delay={d++}>
        <div className="block-form" data-block-type="form">
          <div className="form-row"><label>청크 크기 (토큰)</label><input type="number" value={chunkSize} onChange={e => setChunkSize(e.target.value)} /></div>
          <div className="form-row"><label>오버랩 (토큰)</label><input type="number" value={overlap} onChange={e => setOverlap(e.target.value)} /></div>
          <div className="form-row">
            <label>임베딩 모델</label>
            <select value={model} onChange={e => setModel(e.target.value)}>
              <option value="text-embedding-3-large">text-embedding-3-large</option>
              <option value="text-embedding-3-small">text-embedding-3-small</option>
            </select>
          </div>
          <div className="form-row" style={{ justifyContent: 'flex-end' }}>
            <button className="btn-pill btn-pill-primary btn-sm" onClick={() => toast('청킹 파라미터가 저장되어 다음 배치부터 적용됩니다.')}>저장</button>
          </div>
        </div>
      </Block>
      <Block delay={d++}><div className="block-heading" data-block-type="heading"><h2>Pinecone 네임스페이스</h2></div></Block>
      <Block delay={d++}>
        <div className="block-table" data-block-type="table">
          <table>
            <thead><tr><th>네임스페이스</th><th>문서 수</th><th>마지막 동기화</th><th>상태</th></tr></thead>
            <tbody>
              {namespaces.map(n => (
                <tr className="clickable" key={n.ns} onClick={() => setSelectedNs(n)}>
                  <td>{n.ns}</td><td>{n.docs.toLocaleString()}건</td><td>{n.last}</td><td><Badge status={n.status} /></td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      </Block>
      <ToggleBlock title={`재시도 큐 ${retryQueue.length}건 보기`} delay={d++}>
        {retryQueue.length === 0 && <div className="callout-text">재시도 대기 중인 청크가 없습니다.</div>}
        {retryQueue.map(r => (
          <div className="v-card" key={r.id} style={{ padding: '10px 14px' }}>
            <div className="v-card-name" style={{ fontSize: 13 }}>{r.name}</div>
            <div className="v-card-diff">{r.reason}</div>
          </div>
        ))}
        {retryQueue.length > 0 && (
          <button className="btn-pill btn-pill-primary btn-sm" style={{ width: 'fit-content' }} onClick={runResync} disabled={resyncing}>
            {resyncing ? <span className="spinner"></span> : <i className="ph ph-arrow-clockwise"></i>}지금 재동기화
          </button>
        )}
      </ToggleBlock>
      <Block delay={d++}><div className="block-callout" data-block-type="callout"><i className="ph ph-lightbulb callout-icon"></i><span className="callout-text">Pinecone rate limit로 실패한 upsert는 지수 백오프로 최대 3회까지 자동 재시도됩니다.</span></div></Block>
      <Block delay={d++}><div className="block-divider" data-block-type="divider"><hr /></div></Block>
      <Block delay={d++}>
        <div className="block-code" data-block-type="code">
          <pre>{`{
  "chunk_id": "yugi-001-chunk-03",
  "namespace": "product-story-ko",
  "tokens": ${chunkSize},
  "overlap": ${overlap},
  "model": "${model}",
  "status": "upserted"
}`}</pre>
        </div>
      </Block>
      <Block delay={d++}><div className="block-text" data-block-type="text"><p>동기화가 완료된 청크는 RAG 다국어 생성 에디터에서 즉시 컨텍스트로 검색됩니다.</p></div></Block>

      {selectedNs && (
        <Modal title={selectedNs.ns} onClose={() => setSelectedNs(null)}>
          <div className="modal-row"><span className="k">문서 수</span><span className="v">{selectedNs.docs.toLocaleString()}건</span></div>
          <div className="modal-row"><span className="k">임베딩 차원</span><span className="v">{selectedNs.dims}</span></div>
          <div className="modal-row"><span className="k">마지막 동기화</span><span className="v">{selectedNs.last}</span></div>
          <div className="modal-row"><span className="k">상태</span><span className="v"><Badge status={selectedNs.status} /></span></div>
        </Modal>
      )}
    </React.Fragment>
  );
}

function RagEditorScreen({ toast, delayBase }) {
  const [purpose, setPurpose] = useState('detail');
  const [lang, setLang] = useState('한국어');
  const [genIndex, setGenIndex] = useState(0);
  const [generating, setGenerating] = useState(false);
  const [history, setHistory] = useState(INIT_HISTORY);
  const activePurpose = PURPOSES.find(p => p.id === purpose);
  const genPool = GEN_SAMPLES[lang];
  const genText = genPool[genIndex % genPool.length];

  const regenerate = () => {
    setGenerating(true);
    setTimeout(() => {
      const nextIdx = (genIndex + 1) % genPool.length;
      setGenIndex(nextIdx);
      setHistory(h => [{ id: 'h' + Date.now(), purpose: activePurpose.label, lang, time: '방금 전', snippet: genPool[nextIdx].slice(0, 34) + '...', liked: false, showReason: false }, ...h]);
      setGenerating(false);
      toast('새 콘텐츠가 생성되어 히스토리에 저장됩니다.');
    }, 1300);
  };

  const toggleLike = (id) => setHistory(h => h.map(x => x.id === id ? { ...x, liked: !x.liked } : x));
  const toggleReason = (id) => setHistory(h => h.map(x => x.id === id ? { ...x, showReason: !x.showReason } : x));
  const submitReason = (id) => { toggleReason(id); toast('피드백이 저장되어 프롬프트 튜닝에 반영됩니다.'); };

  let d = delayBase;
  return (
    <React.Fragment>
      <Block delay={d++}><div className="block-text" data-block-type="text"><p>Pinecone에서 검색된 관련 컨텍스트를 기반으로 프롬프트 템플릿을 적용해, 목적과 언어별 마케팅 콘텐츠를 반자동으로 생성하고 편집합니다.</p></div></Block>
      <Block delay={d++}><div className="block-heading" data-block-type="heading"><h2>프롬프트 템플릿 관리</h2></div></Block>
      <Block delay={d++}>
        <div className="tab-row">
          {PURPOSES.map(p => <button key={p.id} className={`tab-chip${purpose === p.id ? ' active' : ''}`} onClick={() => setPurpose(p.id)}>{p.label}</button>)}
        </div>
        <div className="template-card" data-block-type="template">
          <div style={{ fontSize: 12, color: 'var(--slate)' }}>어조: {activePurpose.tone}</div>
          <div className="template-body">
            {activePurpose.sample.split(/(\{\{[^}]+\}\})/g).map((part, i) => part.startsWith('{{') ? <span className="template-var" key={i}>{part}</span> : <span key={i}>{part}</span>)}
          </div>
        </div>
      </Block>
      <Block delay={d++}><div className="block-heading" data-block-type="heading"><h2>다국어 생성 에디터</h2></div></Block>
      <Block delay={d++}>
        <div className="tab-row">
          {LANGS.map(l => <button key={l} className={`tab-chip${lang === l ? ' active' : ''}`} onClick={() => { setLang(l); setGenIndex(0); }}>{l}</button>)}
        </div>
        <div className="gen-card" data-block-type="generation">
          <div className="gen-card-head">
            <span className="badge badge-blueprint">{activePurpose.label} · {lang}</span>
            <button className="btn-pill btn-pill-outline btn-sm" onClick={regenerate} disabled={generating}>
              {generating ? <span className="spinner spinner-dark"></span> : <i className="ph ph-arrow-clockwise"></i>}재생성
            </button>
          </div>
          <div className="gen-text">{generating ? '컨텍스트를 검색하고 콘텐츠를 생성하는 중입니다...' : genText}</div>
        </div>
      </Block>
      <Block delay={d++}>
        <div className="block-heading" data-block-type="heading" style={{ marginTop: 4 }}><h2 style={{ fontSize: 18 }}>생성 히스토리</h2></div>
        <div data-block-type="list">
          {history.slice(0, 5).map(h => (
            <div className="history-item" key={h.id}>
              <div>
                <div className="history-meta">{h.purpose} · {h.lang} · {h.time}</div>
                <div className="history-snippet">{h.snippet}</div>
                {h.showReason && (
                  <div className="reason-input-row">
                    <input placeholder="재생성 사유를 입력하세요" />
                    <button className="btn-pill btn-pill-primary btn-sm" onClick={() => submitReason(h.id)}>제출</button>
                  </div>
                )}
              </div>
              <div className="history-actions">
                <button className={`icon-toggle${h.liked ? ' liked' : ''}`} onClick={() => toggleLike(h.id)}><i className={h.liked ? 'ph-fill ph-heart' : 'ph ph-heart'}></i></button>
                <button className="icon-toggle" onClick={() => toggleReason(h.id)}><i className="ph ph-chat-circle-text"></i></button>
              </div>
            </div>
          ))}
        </div>
      </Block>
      <Block delay={d++}><div className="block-divider" data-block-type="divider"><hr /></div></Block>
      <Block delay={d++}><div className="block-callout" data-block-type="callout"><i className="ph ph-lightbulb callout-icon"></i><span className="callout-text">좋아요와 재생성 사유는 프롬프트 튜닝용 피드백 데이터로 누적되어 다음 템플릿 개선에 반영됩니다.</span></div></Block>
    </React.Fragment>
  );
}

function SettingsScreen({ toast, delayBase }) {
  const [accessExp, setAccessExp] = useState('15분');
  const [refreshExp, setRefreshExp] = useState('14일');
  const [hotSwap, setHotSwap] = useState(true);
  const [matrix, setMatrix] = useState(INIT_MATRIX);
  const [auditLogs] = useState(INIT_AUDIT);
  const [selectedLog, setSelectedLog] = useState(null);

  const togglePerm = (role, idx) => {
    setMatrix(m => {
      const row = [...m[role]];
      row[idx] = !row[idx];
      return { ...m, [role]: row };
    });
  };

  let d = delayBase;
  return (
    <React.Fragment>
      <Block delay={d++}><div className="block-text" data-block-type="text"><p>관리자 로그인 인증과 프롬프트·수집 데이터의 접근 권한을 분리 관리하는 보안 설정입니다.</p></div></Block>
      <Block delay={d++}><div className="block-heading" data-block-type="heading"><h2>인증</h2></div></Block>
      <Block delay={d++}>
        <div className="block-form" data-block-type="form">
          <div className="form-row">
            <label>Access 토큰 만료</label>
            <select value={accessExp} onChange={e => setAccessExp(e.target.value)}>
              <option>15분</option><option>30분</option><option>1시간</option>
            </select>
          </div>
          <div className="form-row">
            <label>Refresh 토큰 만료</label>
            <select value={refreshExp} onChange={e => setRefreshExp(e.target.value)}>
              <option>7일</option><option>14일</option><option>30일</option>
            </select>
          </div>
          <div className="form-row">
            <label>무중단 설정 변경 허용</label>
            <button className={`toggle-switch${hotSwap ? ' on' : ''}`} onClick={() => setHotSwap(!hotSwap)}><span className="knob"></span></button>
          </div>
          <div className="form-row" style={{ justifyContent: 'flex-end' }}>
            <button className="btn-pill btn-pill-primary btn-sm" onClick={() => toast('인증 설정이 저장됩니다.')}>저장</button>
          </div>
        </div>
      </Block>
      <Block delay={d++}><div className="block-heading" data-block-type="heading"><h2>역할 기반 접근 제어</h2></div></Block>
      <Block delay={d++}>
        <div className="block-table" data-block-type="table">
          <table>
            <thead><tr><th>역할</th>{INIT_PERMS.map(p => <th key={p}>{p}</th>)}</tr></thead>
            <tbody>
              {INIT_ROLES.map(role => (
                <tr key={role}>
                  <td style={{ fontWeight: 600 }}>{role}</td>
                  {matrix[role].map((v, idx) => (
                    <td key={idx}><input type="checkbox" checked={v} onChange={() => togglePerm(role, idx)} /></td>
                  ))}
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      </Block>
      <Block delay={d++}><div className="block-callout" data-block-type="callout"><i className="ph ph-lightbulb callout-icon"></i><span className="callout-text">권한 체크박스는 즉시 반영되며, 변경 이력은 감사 로그에 자동 기록됩니다.</span></div></Block>
      <Block delay={d++}><div className="block-divider" data-block-type="divider"><hr /></div></Block>
      <Block delay={d++}><div className="block-heading" data-block-type="heading"><h2>감사 로그</h2></div></Block>
      <Block delay={d++}>
        <div className="block-table" data-block-type="table">
          <table>
            <thead><tr><th>사용자</th><th>액션</th><th>대상</th><th>시각</th></tr></thead>
            <tbody>
              {auditLogs.map(a => (
                <tr className="clickable" key={a.id} onClick={() => setSelectedLog(a)}>
                  <td>{a.user}</td><td>{a.action}</td><td>{a.target}</td><td>{a.time}</td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      </Block>
      <Block delay={d++}><div className="block-text" data-block-type="text"><p>감사 로그는 90일간 보관되며, 열람 권한이 있는 역할만 상세 내역을 확인할 수 있습니다.</p></div></Block>

      {selectedLog && (
        <Modal title="감사 로그 상세" onClose={() => setSelectedLog(null)}>
          <div className="modal-row"><span className="k">사용자</span><span className="v">{selectedLog.user}</span></div>
          <div className="modal-row"><span className="k">액션</span><span className="v">{selectedLog.action}</span></div>
          <div className="modal-row"><span className="k">대상</span><span className="v">{selectedLog.target}</span></div>

        </Modal>

}

/* ============ APP ============ */
function App() {
  const [screen, setScreenRaw] = useState('main');
  const [expanded, setExpanded] = useState({});
  const [coverVariant, setCoverVariant] = useState(0);
  const [drawerOpen, setDrawerOpen] = useState(false);
  const [comments, setComments] = useState([
    { id: 1, author: '이지은', text: '옹기 발효 항아리 스토리에 제작 지역 정보를 추가하면 좋을 것 같습니다.' },
    { id: 2, author: '박서준', text: '동의합니다. 웹 검색 보조 수집으로 보강 요청했습니다.' },
  ]);
  const [slashOpen, setSlashOpen] = useState(false);
  const [dynamicBlocks, setDynamicBlocks] = useState([]);
  const [toastMsg, setToastMsg] = useState('');
  const toastTimer = useRef(null);

  const toast = (msg) => {
    setToastMsg(msg);
    if (toastTimer.current) clearTimeout(toastTimer.current);
    toastTimer.current = setTimeout(() => setToastMsg(''), 2600);
  };

  const setScreen = (s) => { setScreenRaw(s); setDynamicBlocks([]); };
  const toggleExpand = (id) => setExpanded(e => ({ ...e, [id]: e[id] === false ? true : false }));

  const addSlashBlock = (item) => {
    setDynamicBlocks(b => [...b, item]);
    setSlashOpen(false);
    toast(`"${item.label}" 블록이 페이지에 추가됩니다.`);
  };

  useEffect(() => {
    if (window.lucide) window.lucide.createIcons();
  });

  const screenCount = { main: 11, 'vector-sync': 10, 'rag-editor': 9, settings: 11 }[screen] || 0;

  let ScreenComponent = null;
  if (screen === 'main') ScreenComponent = <MainScreen toast={toast} delayBase={0} />;
  else if (screen === 'vector-sync') ScreenComponent = <VectorSyncScreen toast={toast} delayBase={0} />;
  else if (screen === 'rag-editor') ScreenComponent = <RagEditorScreen toast={toast} delayBase={0} />;
  else if (screen === 'settings') ScreenComponent = <SettingsScreen toast={toast} delayBase={0} />;

  return (
    <div className="app-shell">
      <Sidebar currentScreen={screen} setScreen={setScreen} expanded={expanded} toggleExpand={toggleExpand} openSettingsDirect={() => setScreen('settings')} toast={toast} />
      <div className="main-wrap">
        <div className="page-breadcrumb">
          {BREADCRUMB[screen].map((b, i, arr) => (
            <React.Fragment key={i}>
              {i > 0 && <span className="sep">›</span>}
              <span className={i === arr.length - 1 ? 'current' : ''}>{b}</span>
            </React.Fragment>
          ))}
        </div>
        <div className="page-cover"><CoverArt variant={coverVariant} /></div>
        <div className="page-body" key={screen}>
          <div className="page-icon-row">
            <div className="page-icon-large"><i className={`ph ${PAGE_ICON[screen]}`}></i></div>
            <div className="page-meta">
              <button className="meta-action" onClick={() => setCoverVariant(v => v + 1)}><i className="ph ph-image"></i>커버 변경</button>
              <button className="meta-action" onClick={() => setDrawerOpen(true)}><i className="ph ph-chat-circle-text"></i>댓글 {comments.length}</button>
            </div>
          </div>
          <h1 className="page-title">{PAGE_TITLE[screen]}</h1>
          <div className="block-list">
            {ScreenComponent}
            {dynamicBlocks.map((b, i) => (
              b.id === 'toggle' ? (
                <ToggleBlock key={i} title="새 토글 목록" delay={screenCount + i}>
                  <p style={{ fontSize: 13, color: 'var(--slate)' }}>토글 안에 하위 항목을 추가할 수 있습니다.</p>
                </ToggleBlock>
              ) : (
                <Block key={i} delay={screenCount + i}>
                  {b.id === 'text' && <div className="block-text" data-block-type="text"><p>새 텍스트 블록입니다. 내용을 입력해 이 섹션을 채울 수 있습니다.</p></div>}
                  {b.id === 'heading' && <div className="block-heading" data-block-type="heading"><h2>새 섹션 제목</h2></div>}
                  {b.id === 'callout' && <div className="block-callout" data-block-type="callout"><i className="ph ph-lightbulb callout-icon"></i><span className="callout-text">새 강조 블록입니다.</span></div>}
                  {b.id === 'divider' && <div className="block-divider" data-block-type="divider"><hr /></div>}
                </Block>
              )
            ))}
          </div>
          <button className="add-block-btn" onClick={() => setSlashOpen(true)}><i className="ph ph-plus"></i>블록 추가</button>
          <FeedbackStrip />
        </div>
      </div>

      {slashOpen && (
        <React.Fragment>
          <div className="overlay-dim" onClick={() => setSlashOpen(false)}></div>
          <div className="slash-menu" data-slash-menu>
            <div className="slash-menu-head"><span style={{ fontSize: 12, fontWeight: 700 }}>블록 추가</span><button className="modal-close" onClick={() => setSlashOpen(false)}><i className="ph ph-x"></i></button></div>
            <input className="slash-input" placeholder="/ 명령 입력…" autoFocus />
            <div className="slash-results">
              <div className="slash-group-title">기본 블록</div>
              {SLASH_ITEMS.map(item => (
                <button className="slash-item" key={item.id} onClick={() => addSlashBlock(item)}>
                  <i className={`ph ${item.icon}`}></i>{item.label}
                </button>
              ))}
            </div>
          </div>
        </React.Fragment>
      )}

      {drawerOpen && <CommentDrawer onClose={() => setDrawerOpen(false)} comments={comments} addComment={(t) => setComments(c => [...c, { id: Date.now(), author: '나', text: t }])} />}

      <Toast message={toastMsg} />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
