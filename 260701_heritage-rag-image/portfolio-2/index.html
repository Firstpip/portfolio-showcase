<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>전통문화 콘텐츠 통합 운영 플랫폼 — 구현 데모</title>
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css" rel="stylesheet">
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
:root{
  --bg:#ffffff;
  --linen:#e5e5e7;
  --linen-soft:#f4f4f6;
  --void:#090a0c;
  --smoke:#95979e;
  --ash:#c4c6cc;
  --frost:#d1d1d1;
  --iris:#5683da;
  --iris-soft:#eaf0fb;
  --ember:#ff8964;
  --ember-soft:#fff1eb;
  --molasses:#5a250a;
  --sage-bg:#e9f5ef;--sage-text:#1f7a52;
  --danger-bg:#fdecea;--danger-text:#c23b2b;
  --shadow-sm: rgba(9,10,12,.06) 0px 2px 6px 0px;
  --shadow-md: rgba(9,10,12,.10) 0px 8px 24px 0px;
  --shadow-xl: rgba(9,10,12,.16) 0px 16px 44px 0px;
  --r-tile:20px;
  --r-pill:9999px;
  --r-input:10px;
}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;}
body{font-family:'Pretendard Variable',sans-serif;background:var(--linen-soft);color:var(--void);-webkit-font-smoothing:antialiased;}
button,input,select,textarea{font-family:inherit;}
button{cursor:pointer;background:none;border:none;color:inherit;}
a{text-decoration:none;color:inherit;}
svg.lucide{width:16px;height:16px;stroke-width:1.6;flex-shrink:0;}
::-webkit-scrollbar{width:8px;height:8px;}
::-webkit-scrollbar-thumb{background:var(--ash);border-radius:8px;}

@keyframes tileIn{from{opacity:0;transform:translateY(14px) scale(.98);}to{opacity:1;transform:translateY(0) scale(1);}}
@keyframes numReveal{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);}}
@keyframes pulseGlow{0%,100%{box-shadow:0 0 0 0 rgba(86,131,218,.35);}50%{box-shadow:0 0 0 7px rgba(86,131,218,0);}}
@keyframes spinLoader{from{transform:rotate(0deg);}to{transform:rotate(360deg);}}
@keyframes barGrow{from{transform:scaleY(0);}to{transform:scaleY(1);}}
@keyframes toastIn{from{opacity:0;transform:translateY(14px);}to{opacity:1;transform:translateY(0);}}
@keyframes shimmerSweep{0%{background-position:-220px 0;}100%{background-position:220px 0;}}
@keyframes ringDraw{from{stroke-dashoffset:283;}to{stroke-dashoffset:var(--ring-final,90);}}

/* ===== TOPNAV ===== */
.topbar{position:sticky;top:0;z-index:30;display:flex;align-items:center;gap:28px;padding:0 32px;height:68px;background:rgba(255,255,255,.92);backdrop-filter:blur(10px);border-bottom:1px solid var(--frost);}
.brand{display:flex;align-items:center;gap:10px;flex-shrink:0;}
.brand-mark{width:32px;height:32px;border-radius:10px;background:linear-gradient(135deg,var(--iris),var(--ember));display:flex;align-items:center;justify-content:center;color:#fff;flex-shrink:0;}
.brand-name{font-size:14.5px;font-weight:700;letter-spacing:-.2px;}
.topnav-tabs{display:flex;gap:4px;flex:1;overflow-x:auto;}
.topnav-tab{display:flex;align-items:center;gap:7px;padding:9px 16px;border-radius:var(--r-pill);font-size:13px;font-weight:600;color:var(--smoke);white-space:nowrap;}
.topnav-tab:hover{background:var(--linen-soft);color:var(--void);}
.topnav-tab.active{background:var(--void);color:#fff;}
.topnav-actions{display:flex;align-items:center;gap:8px;flex-shrink:0;}
.icon-btn{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:var(--smoke);position:relative;}
.icon-btn:hover{background:var(--linen-soft);color:var(--void);}
.icon-btn .dot{position:absolute;top:7px;right:8px;width:7px;height:7px;border-radius:50%;background:var(--ember);animation:pulseGlow 2s infinite;}
.avatar-pill{display:flex;align-items:center;gap:8px;padding:5px 12px 5px 5px;border-radius:var(--r-pill);border:1px solid var(--frost);}
.avatar-pill .av{width:26px;height:26px;border-radius:50%;background:linear-gradient(135deg,var(--ember),var(--iris));}
.avatar-pill span{font-size:12.5px;font-weight:600;}

/* ===== PAGE / HERO ===== */
.page{max-width:1280px;margin:0 auto;padding:28px 32px 60px;}
.page-hero{display:flex;justify-content:space-between;align-items:flex-end;gap:20px;margin-bottom:22px;flex-wrap:wrap;}
.page-title{font-size:clamp(30px,3.6vw,40px);font-weight:800;letter-spacing:-1.2px;line-height:1.05;}
.page-sub{font-size:13.5px;color:var(--smoke);margin-top:8px;max-width:560px;line-height:1.6;}
.hero-actions{display:flex;gap:8px;flex-wrap:wrap;}

/* ===== BUTTONS ===== */
.btn{display:inline-flex;align-items:center;gap:7px;padding:9px 18px;border-radius:var(--r-pill);font-size:13px;font-weight:600;transition:transform .12s,background .15s;}
.btn:active{transform:scale(.97);}
.btn-primary{background:var(--void);color:#fff;}
.btn-primary:hover{background:#000;}
.btn-accent{background:var(--ember);color:#fff;}
.btn-accent:hover{background:#f5713f;}
.btn-outline{border:1px solid var(--frost);color:var(--void);background:#fff;}
.btn-outline:hover{background:var(--linen-soft);}
.btn-sm{padding:6px 13px;font-size:12px;}
.btn:disabled{opacity:.45;cursor:default;}

/* ===== BENTO GRID ===== */
.bento{display:grid;grid-template-columns:repeat(4,1fr);gap:18px;}
.tile{background:#fff;border-radius:var(--r-tile);box-shadow:var(--shadow-sm);padding:22px;animation:tileIn .4s ease both;display:flex;flex-direction:column;transition:box-shadow .2s;}
.tile:hover{box-shadow:var(--shadow-md);}
.tile.feature{grid-column:span 2;grid-row:span 2;box-shadow:var(--shadow-xl);}
.tile.metric{grid-column:span 1;justify-content:space-between;}
.tile.wide{grid-column:span 2;}
.tile.small{grid-column:span 1;}
.tile-head{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:14px;}
.tile-head h3{font-size:14.5px;font-weight:700;letter-spacing:-.2px;}
.tile-head .tag{font-size:10.5px;color:var(--smoke);font-weight:600;text-transform:uppercase;letter-spacing:.05em;}
.tile-icon{width:34px;height:34px;border-radius:11px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.tile-icon.iris{background:var(--iris-soft);color:var(--iris);}
.tile-icon.ember{background:var(--ember-soft);color:#c85a34;}

/* metric tile */
.metric-num{font-size:clamp(30px,3.2vw,38px);font-weight:800;letter-spacing:-1.4px;animation:numReveal .5s ease both;}
.metric-num.accent{color:var(--iris);}
.metric-delta{display:inline-flex;align-items:center;gap:4px;font-size:12px;font-weight:600;margin-top:6px;width:fit-content;padding:3px 9px;border-radius:var(--r-pill);}
.metric-delta.up{background:var(--sage-bg);color:var(--sage-text);}
.metric-delta.down{background:var(--danger-bg);color:var(--danger-text);}

/* gallery */
.gallery-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;flex:1;}
.gallery-card{border-radius:14px;overflow:hidden;background:var(--linen-soft);display:flex;flex-direction:column;box-shadow:var(--shadow-sm);}
.gallery-thumb{height:88px;position:relative;}
.gallery-thumb .badge-float{position:absolute;top:8px;left:8px;background:rgba(9,10,12,.55);color:#fff;font-size:10px;font-weight:600;padding:3px 8px;border-radius:var(--r-pill);}
.gallery-body{padding:9px 11px 11px;display:flex;flex-direction:column;gap:6px;}
.gallery-name{font-size:12.5px;font-weight:700;}
.gallery-status{font-size:10.5px;color:var(--smoke);}
.gallery-actions{display:flex;gap:5px;margin-top:2px;}
.gallery-actions .btn{padding:5px 9px;font-size:11px;}

/* progress stepper */
.stepper{display:flex;align-items:center;gap:0;margin:6px 0 4px;}
.step{display:flex;flex-direction:column;align-items:center;gap:6px;flex:1;position:relative;}
.step-dot{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;border:2px solid var(--frost);color:var(--smoke);background:#fff;z-index:2;}
.step.done .step-dot{background:var(--iris);border-color:var(--iris);color:#fff;}
.step.active .step-dot{border-color:var(--ember);color:var(--ember);animation:pulseGlow 1.8s infinite;}
.step-label{font-size:11.5px;font-weight:600;color:var(--void);text-align:center;}
.step-line{position:absolute;top:17px;left:calc(-50% + 17px);width:calc(100% - 34px);height:2px;background:var(--frost);z-index:1;}
.step.done .step-line{background:var(--iris);}
.step:first-child .step-line{display:none;}

/* chips */
.chip-row{display:flex;flex-wrap:wrap;gap:7px;}
.chip{padding:7px 14px;border-radius:var(--r-pill);border:1px solid var(--frost);font-size:12px;font-weight:600;color:var(--smoke);background:#fff;}
.chip.active{background:var(--void);color:#fff;border-color:var(--void);}

/* table */
.tbl{width:100%;border-collapse:collapse;font-size:12.5px;}
.tbl th{text-align:left;padding:8px 10px;color:var(--smoke);font-weight:600;font-size:10.5px;text-transform:uppercase;letter-spacing:.04em;border-bottom:1px solid var(--frost);}
.tbl td{padding:11px 10px;border-bottom:1px solid var(--linen);vertical-align:middle;}
.tbl tr:last-child td{border-bottom:none;}
.badge{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:var(--r-pill);font-size:11px;font-weight:600;white-space:nowrap;}
.badge-sage{background:var(--sage-bg);color:var(--sage-text);}
.badge-danger{background:var(--danger-bg);color:var(--danger-text);}
.badge-ember{background:var(--ember-soft);color:#c85a34;}
.badge-iris{background:var(--iris-soft);color:var(--iris);}

/* svg charts */
.chart-wrap{flex:1;display:flex;align-items:flex-end;gap:10px;min-height:130px;}
.bar-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:6px;}
.bar{width:100%;max-width:26px;border-radius:6px 6px 0 0;background:linear-gradient(180deg,var(--iris),var(--ember));transform-origin:bottom;animation:barGrow .6s cubic-bezier(.2,.8,.3,1) both;}
.bar-lbl{font-size:10.5px;color:var(--smoke);}
.donut-wrap{display:flex;align-items:center;justify-content:center;gap:18px;flex:1;}
.donut-legend{display:flex;flex-direction:column;gap:8px;}
.legend-row{display:flex;align-items:center;gap:8px;font-size:12px;}
.legend-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;}

/* queue list */
.job-row{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--linen);}
.job-row:last-child{border-bottom:none;}
.job-name{font-size:12.5px;font-weight:600;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.job-meta{font-size:11px;color:var(--smoke);flex-shrink:0;}
.spinner{width:13px;height:13px;border:2px solid rgba(86,131,218,.25);border-top-color:var(--iris);border-radius:50%;animation:spinLoader .7s linear infinite;flex-shrink:0;}

/* skeleton shimmer for empty preview */
.skeleton{border-radius:14px;background:linear-gradient(90deg,var(--linen-soft) 25%,#fff 37%,var(--linen-soft) 63%);background-size:400px 100%;animation:shimmerSweep 1.4s ease-in-out infinite;}

/* modal */
.modal-overlay{position:fixed;inset:0;background:rgba(9,10,12,.4);display:flex;align-items:center;justify-content:center;z-index:100;padding:20px;animation:numReveal .18s ease;}
.modal{width:480px;max-width:100%;background:#fff;border-radius:24px;padding:26px;box-shadow:var(--shadow-xl);}
.modal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;}
.modal-title{font-size:17px;font-weight:800;letter-spacing:-.3px;}
.modal-close{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:var(--smoke);}
.modal-close:hover{background:var(--linen-soft);}
.modal-row{display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--linen);font-size:13px;gap:14px;}
.modal-row:last-of-type{border-bottom:none;}
.modal-row .k{color:var(--smoke);flex-shrink:0;}
.modal-row .v{font-weight:700;text-align:right;}
.modal-footer{display:flex;justify-content:flex-end;gap:8px;margin-top:18px;}

/* toast */
.toast{position:fixed;bottom:26px;right:26px;background:var(--void);color:#fff;padding:13px 20px;border-radius:14px;font-size:13px;font-weight:600;box-shadow:var(--shadow-xl);z-index:200;animation:toastIn .3s ease;display:flex;align-items:center;gap:9px;}

/* ring */
.ring-wrap{position:relative;width:112px;height:112px;flex-shrink:0;}
.ring-num{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:800;}

@media (max-width:960px){
  .bento{grid-template-columns:repeat(2,1fr);}
  .tile.feature{grid-column:span 2;}
  .gallery-grid{grid-template-columns:1fr;}
}
</style>
</head>
<body data-archetype="bento-grid">
<div id="root"></div>
<script type="text/babel">
const {useState, useEffect, useRef} = React;

/* ============ DATA ============ */
const NAV = [
  { id:'main', label:'AI 배경 합성 및 갤러리', icon:'image' },
  { id:'sns-crop', label:'SNS 자동 크롭 및 리사이징', icon:'crop' },
  { id:'pipeline-monitor', label:'파이프라인 운영 모니터링', icon:'activity' },
  { id:'usage-analytics', label:'콘텐츠 매출/사용 현황 분석', icon:'bar-chart-3' },
];

const PAGE_META = {
  'main': { title:'AI 배경 합성 및 갤러리', sub:'제품 이미지 배경을 자동 제거하고 전통문화 컨셉 배경을 합성한 뒤, 생성 결과를 갤러리에서 확인하고 재생성을 요청합니다.' },
  'sns-crop': { title:'SNS 자동 크롭 및 리사이징', sub:'합성 이미지를 채널별 규격에 맞춰 자동 크롭·리사이징하고 프리셋을 관리합니다.' },
  'pipeline-monitor': { title:'파이프라인 운영 모니터링', sub:'배경제거·객체인식·합성 큐의 처리 상태와 실패 건을 한 화면에서 모니터링합니다.' },
  'usage-analytics': { title:'콘텐츠 매출/사용 현황 분석', sub:'제품·채널별 콘텐츠 생성 건수와 프롬프트 피드백 추이를 집계합니다.' },
};

const GALLERY = [
  { id:1, name:'전통 자수 손수건', concept:'한복 배경', status:'완료', tone:['#5683da','#8aa8e6'] },
  { id:2, name:'옻칠 나전 트레이', concept:'사찰 경관', status:'완료', tone:['#ff8964','#ffb499'] },
  { id:3, name:'무명 매듭 장식', concept:'전통 문양', status:'검수중', tone:['#8f7ee0','#b8ade8'] },
  { id:4, name:'놋그릇 다기 세트', concept:'한옥 마당', status:'완료', tone:['#3aa17e','#7fcbb0'] },
];

const CROP_PRESETS = [
  { id:'square', label:'정사각형 1:1', channel:'인스타그램 피드', weekly:412 },
  { id:'story', label:'스토리형 9:16', channel:'인스타·페이스북 스토리', weekly:298 },
  { id:'wide', label:'가로형 16:9', channel:'유튜브 썸네일', weekly:87 },
];

const QUEUE_STAGES = [
  { label:'대기', count:12, color:'var(--ash)' },
  { label:'처리중', count:5, color:'var(--iris)' },
  { label:'완료', count:842, color:'#3aa17e' },
  { label:'실패', count:3, color:'#e0574a' },
];

const FAILED_JOBS_INIT = [
  { id:'j1', name:'놋그릇 다기 세트 — 합성 API 타임아웃', time:'6분 전' },
  { id:'j2', name:'무명 매듭 장식 — 배경제거 응답 오류', time:'22분 전' },
  { id:'j3', name:'전통 자수 손수건 — 레이트리밋 초과', time:'41분 전' },
];

const USAGE_ROWS = {
  주: [
    { product:'전통 자수 손수건', instagram:38, blog:12, catalog:6 },
    { product:'옻칠 나전 트레이', instagram:27, blog:9, catalog:4 },
    { product:'무명 매듭 장식', instagram:19, blog:6, catalog:3 },
  ],
  월: [
    { product:'전통 자수 손수건', instagram:152, blog:44, catalog:21 },
    { product:'옻칠 나전 트레이', instagram:108, blog:33, catalog:16 },
    { product:'무명 매듭 장식', instagram:81, blog:22, catalog:11 },
  ],
};

const BAR_DATA = [40,62,48,70,55,84,66];
const BAR_LABELS = ['월','화','수','목','금','토','일'];

/* ============ HELPERS ============ */
function useLucide(deps){
  useEffect(() => { if (window.lucide) window.lucide.createIcons(); });
}

function CountUp({ to, suffix }) {
  const [n, setN] = useState(0);
  useEffect(() => {
    let raf; const start = performance.now(); const dur = 700;
    const tick = (t) => {
      const p = Math.min(1, (t - start) / dur);
      setN(Math.round(to * (1 - Math.pow(1 - p, 3))));
      if (p < 1) raf = requestAnimationFrame(tick);
    };
    raf = requestAnimationFrame(tick);
    return () => cancelAnimationFrame(raf);
  }, [to]);
  return <span>{n.toLocaleString()}{suffix || ''}</span>;
}

function Toast({ msg }) {
  if (!msg) return null;
  return (
    <div className="toast">
      <i data-lucide="check-circle-2" style={{width:16,height:16}}></i>
      <span>{msg}</span>
    </div>
  );
}

function Modal({ modal, onClose }) {
  if (!modal) return null;
  return (
    <div className="modal-overlay" onClick={onClose}>
      <div className="modal" onClick={(e)=>e.stopPropagation()}>
        <div className="modal-header">
          <div className="modal-title">{modal.title}</div>
          <button className="modal-close" onClick={onClose}><i data-lucide="x" style={{width:16,height:16}}></i></button>
        </div>
        {modal.rows.map((r,i) => (
          <div className="modal-row" key={i}><span className="k">{r.k}</span><span className="v">{r.v}</span></div>
        ))}
        <div className="modal-footer">
          <button className="btn btn-outline btn-sm" onClick={onClose}>닫기</button>
          {modal.confirmLabel && <button className="btn btn-primary btn-sm" onClick={()=>{ modal.onConfirm && modal.onConfirm(); onClose(); }}>{modal.confirmLabel}</button>}
        </div>
      </div>
    </div>
  );
}

/* ============ TOPNAV ============ */
function TopNav({ screen, setScreen, onNewBatch, onBell }) {
  useLucide();
  return (
    <div className="topbar">
      <div className="brand">
        <div className="brand-mark"><i data-lucide="sparkles" style={{width:16,height:16}}></i></div>
        <span className="brand-name">전통문화 AI 파이프라인 허브</span>
      </div>
      <div className="topnav-tabs">
        {NAV.map(n => (
          <button key={n.id} className={"topnav-tab" + (screen===n.id ? " active" : "")} onClick={()=>setScreen(n.id)}>
            <i data-lucide={n.icon} style={{width:15,height:15}}></i>{n.label}
          </button>
        ))}
      </div>
      <div className="topnav-actions">
        <button className="icon-btn" onClick={onBell} title="알림"><i data-lucide="bell" style={{width:17,height:17}}></i><span className="dot"></span></button>
        <button className="avatar-pill" onClick={onNewBatch}>
          <span className="av"></span><span>관리자</span>
        </button>
      </div>
    </div>
  );
}

/* ============ GALLERY (main) ============ */
function GalleryScreen({ onAction }) {
  const [filter, setFilter] = useState('전체');
  const FILTERS = ['전체','한복 배경','전통 문양','사찰 경관'];
  const filtered = filter==='전체' ? GALLERY : GALLERY.filter(g => g.concept.includes(filter.replace(' 배경','').replace(' 경관','').slice(0,2)));
  return (
    <div className="bento">
      <div className="tile feature">

/* ============ PIPELINE MONITOR ============ */
function MonitorScreen({ onAction }) {
  const [jobs, setJobs] = useState(FAILED_JOBS_INIT);
  const total = QUEUE_STAGES.reduce((s,q)=>s+q.count,0);
  let acc = 0;
  const segs = QUEUE_STAGES.map(q => { const start=acc; acc += q.count/total*100; return {...q, start, end:acc}; });
  const retry = (id, name) => { setJobs(jobs.filter(j=>j.id!==id)); onAction(`${name.split(' — ')[0]} 작업을 재처리 큐에 넣었습니다.`); };
  return (
    <div className="bento">
      <div className="tile feature">
        <div className="tile-head">
          <div style={{display:'flex',alignItems:'center',gap:10}}>
            <div className="tile-icon iris"><i data-lucide="pie-chart" style={{width:17,height:17}}></i></div>
            <h3>큐 상태 분포</h3>
          </div>
          <span className="tag">전체 {total.toLocaleString()}건</span>
        </div>
        <div className="donut-wrap">
          <svg width="150" height="150" viewBox="0 0 42 42">
            <circle cx="21" cy="21" r="15.9" fill="#fff"></circle>
            {segs.map((s,i) => (
              <circle key={i} cx="21" cy="21" r="15.9" fill="transparent" stroke={s.color} strokeWidth="7"
                strokeDasharray={`${s.end-s.start} ${100-(s.end-s.start)}`} strokeDashoffset={-s.start+25}
                style={{animation:`barGrow .8s ease both`, transformOrigin:'21px 21px'}} />
            ))}
          </svg>
          <div className="donut-legend">
            {QUEUE_STAGES.map(q => (
              <div className="legend-row" key={q.label}><span className="legend-dot" style={{background:q.color}}></span>{q.label} · {q.count.toLocaleString()}건</div>
            ))}
          </div>
        </div>
      </div>

      <div className="tile metric">
        <div className="tile-head"><h3>대기 건수</h3><div className="tile-icon iris"><i data-lucide="hourglass" style={{width:15,height:15}}></i></div></div>
        <div className="metric-num accent"><CountUp to={12} /></div>
        <span className="metric-delta up">평균 대기 2.1분</span>
      </div>

      <div className="tile metric">
        <div className="tile-head"><h3>실패율</h3><div className="tile-icon ember"><i data-lucide="alert-triangle" style={{width:15,height:15}}></i></div></div>
        <div className="metric-num"><CountUp to={0.4} suffix="%" /></div>
        <span className="metric-delta down">전일 대비 0.1%p</span>
      </div>

      <div className="tile wide">
        <div className="tile-head"><h3>실패 건 목록</h3><span className="tag">{jobs.length}건</span></div>
        {jobs.length===0 && <div style={{fontSize:12.5,color:'var(--smoke)',padding:'10px 0'}}>모든 실패 건이 재처리되었습니다.</div>}
        {jobs.map(j => (
          <div className="job-row" key={j.id}>
            <i data-lucide="x-circle" style={{width:13,height:13,color:'#e0574a'}}></i>
            <span className="job-name">{j.name}</span>
            <span className="job-meta">{j.time}</span>
            <button className="btn btn-outline btn-sm" onClick={()=>retry(j.id, j.name)}>재처리</button>

      <div className="tile small">

/* ============ APP ============ */
function App() {
  const [screen, setScreenRaw] = useState('main');
  const [toast, setToast] = useState(null);
  const [modal, setModal] = useState(null);
  const toastRef = useRef(null);

  const setScreen = (s) => { setScreenRaw(s); window.scrollTo({top:0, behavior:'smooth'}); };
  const showToast = (msg) => { setToast(msg); clearTimeout(toastRef.current); toastRef.current = setTimeout(()=>setToast(null), 2600); };
  const openModal = (m) => setModal(m);
  const closeModal = () => setModal(null);

  useEffect(() => { if (window.lucide) window.lucide.createIcons(); }, [screen, toast, modal]);

  const meta = PAGE_META[screen];

  return (
    <React.Fragment>
      <TopNav screen={screen} setScreen={setScreen} onNewBatch={()=>showToast('관리자 계정 정보를 확인했습니다.')} onBell={()=>showToast('신규 알림 2건이 있습니다.')} />
      <div className="page">
        <div className="page-hero">
          <div>
            <div className="page-title">{meta.title}</div>
            <div className="page-sub">{meta.sub}</div>
          </div>
          <div className="hero-actions">
            <button className="btn btn-outline" onClick={()=>openModal({
              title:'파이프라인 요약',
              rows:[ {k:'오늘 생성 요청', v:'186건'}, {k:'평균 처리 시간', v:'38초'}, {k:'실패율', v:'0.4%'} ]
            })}><i data-lucide="info" style={{width:14,height:14}}></i>요약 보기</button>
            <button className="btn btn-accent" onClick={()=>showToast('새 배치 생성을 요청했습니다.')}><i data-lucide="plus" style={{width:14,height:14}}></i>새 배치 생성</button>
          </div>
        </div>

        {screen==='main' && <GalleryScreen onAction={showToast} />}
        {screen==='sns-crop' && <SnsCropScreen onAction={showToast} onOpenModal={openModal} />}
        {screen==='pipeline-monitor' && <MonitorScreen onAction={showToast} />}
        {screen==='usage-analytics' && <AnalyticsScreen onOpenModal={openModal} onAction={showToast} />}
      </div>

      <Modal modal={modal} onClose={closeModal} />
      <Toast msg={toast} />
    </React.Fragment>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
