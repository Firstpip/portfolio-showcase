<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>이지클리닉 — 한일 병원 예약 플랫폼</title>
<link rel="preconnect" href="https://fastly.jsdelivr.net">
<link rel="stylesheet" as="style" crossorigin href="https://fastly.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<style>
  :root{
    --primary:#0f3e17;
    --primary-dark:#0a2b10;
    --primary-soft:#e1f4df;
    --accent:#a53ad9;
    --accent-soft:#f4e6fa;
    --bg:#fffefc;
    --surface:#ffffff;
    --tint-mint:#cfe7d3;
    --tint-linen:#e1f4df;
    --tint-sage:#b1dbb8;
    --tint-mist:#b6ced5;
    --border:#e5e7eb;
    --text:#000000;
    --text-2:#4b5a52;
    --text-3:#6b7f74;
    --radius-card:14px;
    --radius-badge:999px;
    --radius-nav:7px;
  }
  *{box-sizing:border-box;}
  html,body{width:100%;margin:0;padding:0;}
  body{
    font-family:'Pretendard', -apple-system, BlinkMacSystemFont, sans-serif;
    background:var(--bg);
    color:var(--text);
    -webkit-font-smoothing:antialiased;
    letter-spacing:-0.01em;
  }
  #app-root{width:100%;min-height:100vh;}
  button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit;}
  input,select,textarea{font-family:inherit;}
  a{text-decoration:none;color:inherit;}
  img{display:block;max-width:100%;}

  /* ===== keyframes ===== */
  @keyframes fadeInUp{from{opacity:0;transform:translateY(14px);}to{opacity:1;transform:translateY(0);}}
  @keyframes cardPop{from{opacity:0;transform:translateY(18px) scale(.98);}to{opacity:1;transform:translateY(0) scale(1);}}
  @keyframes rippleAnim{from{transform:scale(0);opacity:.45;}to{transform:scale(2.6);opacity:0;}}
  @keyframes pulseHeart{0%{transform:scale(1);}35%{transform:scale(1.35);}60%{transform:scale(.92);}100%{transform:scale(1);}}
  @keyframes shimmerMove{0%{background-position:-300px 0;}100%{background-position:300px 0;}}
  @keyframes toastIn{from{opacity:0;transform:translate(-50%,12px);}to{opacity:1;transform:translate(-50%,0);}}
  @keyframes spinSlow{from{transform:rotate(0deg);}to{transform:rotate(360deg);}}

  .app-fade{animation:fadeInUp .5s ease both;}

  /* ===== search-header (archetype signature) ===== */
  .search-header{
    position:sticky; top:0; z-index:60;
    background:rgba(255,254,252,.92);
    backdrop-filter:blur(10px);
    border-bottom:1px solid var(--border);
  }
  .header-row{
    max-width:1320px;margin:0 auto;
    display:flex;align-items:center;gap:18px;
    padding:16px 32px;
  }
  .brand{font-size:20px;font-weight:700;color:var(--primary);letter-spacing:-0.02em;white-space:nowrap;}
  .brand-jp{font-size:11px;color:var(--text-3);display:block;font-weight:400;letter-spacing:0;}

  .search-bar{
    flex:1; display:flex;align-items:stretch;
    background:var(--surface);
    border:1px solid var(--border);
    border-radius:999px;
    box-shadow:0 1px 2px rgba(15,62,23,.05);
    overflow:hidden;
    max-width:640px;
    transition:box-shadow .2s ease, border-color .2s ease;
  }
  .search-bar:hover{border-color:var(--tint-sage); box-shadow:0 2px 10px rgba(15,62,23,.08);}
  .search-segment{
    flex:1; padding:9px 20px; text-align:left; background:transparent;
    display:flex;flex-direction:column;gap:2px; min-width:0;
  }
  .segment-label{font-size:11px;color:var(--text-3);font-weight:600;}
  .segment-value{font-size:13px;color:var(--text);font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .search-divider{width:1px;background:var(--border);margin:10px 0;}
  .search-submit{
    width:42px;flex-shrink:0;display:flex;align-items:center;justify-content:center;
    background:var(--primary); color:#fff; margin:5px 5px 5px 0; border-radius:999px;
    transition:background .2s ease;
  }
  .search-submit:hover{background:var(--primary-dark);}

  .header-nav{display:flex;align-items:center;gap:8px;flex-shrink:0;}
  .lang-toggle{display:flex;background:var(--tint-linen);border-radius:999px;padding:3px;gap:2px;}
  .lang-btn{padding:6px 12px;border-radius:999px;font-size:12px;font-weight:600;color:var(--text-3);transition:all .15s ease;}
  .lang-btn.active{background:var(--primary);color:#fff;}
  .user-menu{
    display:flex;align-items:center;gap:6px;padding:9px 16px;border-radius:var(--radius-nav);
    background:var(--primary); color:#fff; font-size:13px; font-weight:600; white-space:nowrap;
    transition:background .2s ease;
  }
  .user-menu:hover{background:var(--primary-dark);}

  .filter-chips{
    max-width:1320px;margin:0 auto;
    display:flex;gap:10px;overflow-x:auto;padding:0 32px 16px;
    scrollbar-width:none;
  }
  .filter-chips::-webkit-scrollbar{display:none;}
  .chip{
    flex-shrink:0; display:flex;align-items:center;gap:6px;
    padding:9px 16px; border-radius:999px; border:1px solid var(--border);
    background:var(--surface); font-size:13px; font-weight:600; color:var(--text-2);
    transition:all .18s ease; white-space:nowrap;
  }
  .chip:hover{border-color:var(--tint-sage); background:var(--tint-linen);}
  .chip.active{background:var(--primary); border-color:var(--primary); color:#fff;}
  .chip svg{width:15px;height:15px;}

  /* quick demo nav */
  .quicknav-band{
    max-width:1320px;margin:0 auto; padding:14px 32px 0;
    display:flex; gap:10px; flex-wrap:wrap;
  }
  .quicknav-btn{
    padding:9px 16px; border-radius:var(--radius-nav); border:1px solid var(--border);
    font-size:12.5px; font-weight:600; color:var(--text-2); background:var(--surface);
    display:flex; align-items:center; gap:6px; transition:all .15s ease;
  }
  .quicknav-btn:hover{ border-color:var(--accent); color:var(--accent); background:var(--accent-soft); }
  .quicknav-btn svg{width:14px;height:14px;}

  /* ===== hero ===== */
  .hero{max-width:1320px;margin:0 auto;padding:40px 32px 8px;}
  .hero-eyebrow{
    display:inline-flex;align-items:center;gap:6px;
    background:var(--tint-mist); color:var(--primary-dark);
    font-size:12px;font-weight:700;padding:6px 14px;border-radius:999px;margin-bottom:16px;
  }
  .hero h1{font-size:38px;line-height:1.25;font-weight:700;letter-spacing:-0.02em;margin:0 0 12px;max-width:680px;}
  .hero p{font-size:16px;color:var(--text-2);max-width:600px;line-height:1.6;margin:0 0 4px;}

  /* ===== main / card grid (archetype signature) ===== */
  .main{max-width:1320px;margin:0 auto;padding:24px 32px 80px;width:100%;}
  .section-title-row{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:18px;}
  .section-title{font-size:22px;font-weight:700;letter-spacing:-0.01em;}
  .section-sub{font-size:13px;color:var(--text-3);}

  .card-grid{
    display:grid;
    grid-template-columns:repeat(auto-fill, minmax(280px, 1fr));
    gap:24px;
  }
  .listing-card{
    background:var(--surface); border:1px solid var(--border); border-radius:var(--radius-card);
    overflow:hidden; cursor:pointer; transition:transform .22s ease, box-shadow .22s ease, border-color .22s ease;
    animation:cardPop .5s ease both;
  }
  .listing-card:hover{ transform:translateY(-4px) scale(1.012); box-shadow:0 14px 30px rgba(15,62,23,.12); border-color:var(--tint-sage); }
  .card-image-wrap{position:relative; aspect-ratio:4/3; background:var(--tint-linen); overflow:hidden;}
  .card-image{width:100%;height:100%;object-fit:cover;}
  .card-favorite{
    position:absolute; top:10px; right:10px; width:32px;height:32px;border-radius:999px;
    background:rgba(255,254,252,.9); display:flex;align-items:center;justify-content:center;
    transition:transform .18s ease;
  }
  .card-favorite svg{width:16px;height:16px;color:var(--text-2);transition:color .15s ease;}
  .card-favorite.saved svg{color:var(--accent); fill:var(--accent);}
  .card-favorite.pulse svg{animation:pulseHeart .45s ease;}
  .card-dots{position:absolute;bottom:10px;left:50%;transform:translateX(-50%);display:flex;gap:4px;}
  .dot{width:5px;height:5px;border-radius:999px;background:rgba(255,255,255,.6);}
  .dot.active{background:#fff;}
  .card-badge{
    position:absolute; top:10px; left:10px; padding:4px 10px; border-radius:999px;
    font-size:11px; font-weight:700; background:var(--primary); color:#fff;
  }
  .card-body{padding:16px;}
  .card-row-1{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;margin-bottom:4px;}
  .card-title{font-size:16px;font-weight:700;letter-spacing:-0.01em;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .card-rating{display:flex;align-items:center;gap:3px;font-size:13px;font-weight:600;flex-shrink:0;}
  .card-rating svg{width:13px;height:13px;color:#f0a63a;fill:#f0a63a;}
  .card-meta{font-size:13px;color:var(--text-3);display:flex;align-items:center;gap:5px;margin-bottom:3px;}
  .card-meta svg{width:13px;height:13px;}
  .card-row-4{display:flex;align-items:baseline;gap:5px;margin-top:10px;}
  .card-price{font-size:16px;font-weight:700;color:var(--primary);}
  .price-unit{font-size:12px;color:var(--text-3);}

  .skeleton-card{border-radius:var(--radius-card);overflow:hidden;border:1px solid var(--border);}
  .skeleton-block{
    background:linear-gradient(90deg, var(--tint-linen) 25%, var(--tint-mint) 50%, var(--tint-linen) 75%);
    background-size:600px 100%;
    animation:shimmerMove 1.3s infinite linear;
  }

  .empty-state{
    grid-column:1/-1; display:flex;flex-direction:column;align-items:center;gap:12px;
    padding:60px 20px; color:var(--text-3); text-align:center;
  }
  .empty-state svg{width:52px;height:52px; color:var(--tint-sage);}

  /* ===== footer ===== */
  .footer{border-top:1px solid var(--border); background:var(--tint-linen);}
  .footer-cols{max-width:1320px;margin:0 auto;padding:48px 32px 24px;display:grid;grid-template-columns:1.4fr repeat(3, 1fr);gap:32px;}
  .footer-col h4{font-size:13px;margin:0 0 14px;color:var(--text-3);font-weight:700;}
  .footer-col a, .footer-col p{display:block;font-size:13px;color:var(--text-2);margin-bottom:8px;line-height:1.6;}
  .footer-bottom{max-width:1320px;margin:0 auto;padding:16px 32px 32px;font-size:12px;color:var(--text-3);border-top:1px solid var(--border);}

  /* ===== detail screen ===== */
  .breadcrumb{display:flex;align-items:center;gap:6px;font-size:13px;color:var(--text-3);margin-bottom:20px;}
  .breadcrumb button{color:var(--text-3);font-weight:600;}
  .breadcrumb button:hover{color:var(--primary);}
  .detail-grid{display:grid;grid-template-columns:1.6fr 1fr;gap:40px;align-items:flex-start;}
  @media (max-width:960px){.detail-grid{grid-template-columns:1fr;}}

  .gallery-main{border-radius:var(--radius-card);overflow:hidden;aspect-ratio:16/9;background:var(--tint-linen);margin-bottom:10px;}
  .gallery-main img{width:100%;height:100%;object-fit:cover;}
  .gallery-thumbs{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;}
  .gallery-thumbs img{border-radius:8px;aspect-ratio:1/1;object-fit:cover;cursor:pointer;border:2px solid transparent;transition:border-color .15s ease;}
  .gallery-thumbs img.active{border-color:var(--primary);}

  .detail-head{display:flex;justify-content:space-between;align-items:flex-start;margin:28px 0 6px;gap:16px;}
  .detail-title{font-size:28px;font-weight:700;letter-spacing:-0.015em;}
  .detail-meta-row{display:flex;gap:16px;flex-wrap:wrap;color:var(--text-3);font-size:13px;margin-bottom:24px;}
  .detail-meta-row span{display:flex;align-items:center;gap:5px;}
  .detail-meta-row svg{width:14px;height:14px;}

  .detail-section{margin-bottom:32px;}
  .detail-section h3{font-size:18px;font-weight:700;margin:0 0 12px;display:flex;align-items:center;gap:8px;}
  .detail-section h3 svg{width:18px;height:18px;color:var(--primary);}
  .detail-section p{font-size:14.5px;line-height:1.8;color:var(--text-2);margin:0;}

  .procedure-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;}
  .procedure-item{
    border:1px solid var(--border);border-radius:10px;padding:14px 16px;
    display:flex;justify-content:space-between;align-items:center; background:var(--surface);
    transition:border-color .15s ease;
  }
  .procedure-item:hover{border-color:var(--tint-sage);}
  .procedure-name{font-size:14px;font-weight:600;}
  .procedure-price{font-size:13px;color:var(--primary);font-weight:700;}

  .review-card{border-top:1px solid var(--border);padding:18px 0;display:flex;gap:14px;}
  .review-avatar{width:40px;height:40px;border-radius:999px;flex-shrink:0;overflow:hidden;background:var(--tint-mist);}
  .review-avatar img{width:100%;height:100%;}
  .review-name{font-weight:700;font-size:13.5px;}
  .review-stars{display:flex;gap:2px;margin:3px 0 6px;}
  .review-stars svg{width:12px;height:12px;color:#f0a63a;fill:#f0a63a;}
  .review-text{font-size:13.5px;color:var(--text-2);line-height:1.65;}

  .reserve-panel{
    position:sticky; top:96px; border:1px solid var(--border); border-radius:var(--radius-card);
    padding:24px; background:var(--surface);
  }
  .reserve-panel h4{font-size:16px;font-weight:700;margin:0 0 4px;}
  .reserve-price{font-size:22px;font-weight:700;color:var(--primary);margin-bottom:18px;}
  .reserve-price span{font-size:13px;color:var(--text-3);font-weight:500;}

  .cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:5px;margin-bottom:6px;}
  .cal-dow{font-size:11px;text-align:center;color:var(--text-3);font-weight:700;padding-bottom:4px;}
  .cal-day{
    aspect-ratio:1/1; display:flex;align-items:center;justify-content:center;
    border-radius:8px; font-size:12.5px; font-weight:600; color:var(--text-2);
    border:1px solid transparent; transition:all .15s ease;
  }
  .cal-day.avail{background:var(--tint-linen); cursor:pointer;}
  .cal-day.avail:hover{background:var(--tint-mint);}
  .cal-day.selected{background:var(--primary); color:#fff;}
  .cal-day.disabled{color:var(--border); cursor:default;}
  .cal-day.empty{visibility:hidden;}

  .slot-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin:14px 0 20px;}
  .slot-btn{
    padding:9px 6px; border:1px solid var(--border); border-radius:8px; font-size:12.5px; font-weight:600;
    text-align:center; color:var(--text-2); transition:all .15s ease;
  }
  .slot-btn.taken{color:var(--border); background:var(--tint-linen); cursor:not-allowed; text-decoration:line-through;}
  .slot-btn.selected{background:var(--primary); border-color:var(--primary); color:#fff;}
  .slot-btn:not(.taken):hover{border-color:var(--tint-sage);}

  .btn-primary{
    width:100%; padding:14px; border-radius:var(--radius-card); background:var(--primary); color:#fff;
    font-size:14.5px; font-weight:700; display:flex;align-items:center;justify-content:center;gap:8px;
    position:relative; overflow:hidden; transition:background .2s ease;
  }
  .btn-primary:hover{background:var(--primary-dark);}
  .btn-primary:disabled{background:var(--border); color:var(--text-3); cursor:not-allowed;}
  .btn-accent{
    padding:10px 18px; border-radius:999px; background:var(--accent); color:#fff; font-size:13px; font-weight:700;
  }
  .btn-accent:hover{background:#8d2eb8;}
  .ripple-dot{position:absolute; border-radius:999px; background:#fff; pointer-events:none; animation:rippleAnim .55s ease-out forwards;}

  /* ===== hospital portal ===== */
  .portal-wrap{max-width:1320px;margin:0 auto;padding:48px 32px 80px;}
  .login-card{
    max-width:400px;margin:40px auto; background:var(--surface); border:1px solid var(--border);
    border-radius:var(--radius-card); padding:36px; text-align:center;
  }
  .login-card svg.brand-ic{width:44px;height:44px;color:var(--primary);margin-bottom:14px;}
  .login-card h2{font-size:20px;margin:0 0 6px;}
  .login-card p{font-size:13px;color:var(--text-3);margin:0 0 24px;}
  .input-field{
    width:100%; padding:12px 14px; border:1px solid var(--border); border-radius:10px; font-size:14px;
    margin-bottom:12px; background:var(--bg);
  }
  .input-field:focus{outline:2px solid var(--tint-sage); border-color:var(--primary);}

  .portal-header{display:flex; justify-content:space-between; align-items:center; margin-bottom:28px; flex-wrap:wrap; gap:12px;}
  .portal-header h2{font-size:24px;font-weight:700;}
  .portal-header p{font-size:13px;color:var(--text-3);}
  .stat-mini-row{display:flex;gap:14px;margin-bottom:24px;flex-wrap:wrap;}
  .stat-mini{
    flex:1;min-width:140px; background:var(--tint-linen); border-radius:12px; padding:16px 18px;
  }
  .stat-mini .num{font-size:24px;font-weight:700;color:var(--primary);}
  .stat-mini .lbl{font-size:12px;color:var(--text-3);margin-top:2px;}

  .portal-table-wrap{border:1px solid var(--border); border-radius:var(--radius-card); overflow:hidden; background:var(--surface);}
  table.portal-table{width:100%;border-collapse:collapse;}
  table.portal-table th{
    text-align:left; font-size:12px; color:var(--text-3); font-weight:700; padding:14px 18px;
    background:var(--tint-linen); border-bottom:1px solid var(--border);
  }
  table.portal-table td{padding:14px 18px; font-size:13.5px; border-bottom:1px solid var(--border); vertical-align:middle;}
  table.portal-table tr:last-child td{border-bottom:none;}
  table.portal-table tr{transition:background .15s ease;}
  table.portal-table tbody tr:hover{background:var(--tint-linen);}
  .patient-cell{display:flex;align-items:center;gap:10px;}
  .patient-avatar{width:30px;height:30px;border-radius:999px;overflow:hidden;background:var(--tint-mist);flex-shrink:0;}
  .patient-avatar img{width:100%;height:100%;}
  .status-badge{
    padding:4px 11px; border-radius:999px; font-size:11.5px; font-weight:700; display:inline-block;
  }
  .status-대기{background:#fdf1d8; color:#9a6a12;}
  .status-확정{background:var(--tint-mint); color:var(--primary-dark);}
  .status-취소{background:#fbdede; color:#a12f2f;}
  .status-select{
    border:1px solid var(--border); border-radius:7px; padding:6px 8px; font-size:12px; background:var(--bg);
  }
  .logout-btn{font-size:12.5px; color:var(--text-3); display:flex;align-items:center;gap:5px;}
  .logout-btn:hover{color:var(--primary);}
  .logout-btn svg{width:14px;height:14px;}

  /* ===== modal ===== */
  .modal-overlay{
    position:fixed; inset:0; background:rgba(15,20,17,.45); z-index:200;
    display:flex; align-items:center; justify-content:center; padding:20px;
    animation:fadeInUp .2s ease both;
  }
  .modal-box{
    background:var(--surface); border-radius:18px; max-width:420px; width:100%; padding:32px;
    text-align:center; animation:cardPop .3s ease both;
  }
  .modal-icon{
    width:60px;height:60px; border-radius:999px; background:var(--tint-mint); color:var(--primary);
    display:flex;align-items:center;justify-content:center; margin:0 auto 18px;
  }
  .modal-icon svg{width:30px;height:30px;}
  .modal-box h3{font-size:19px;margin:0 0 8px;}
  .modal-box p{font-size:13.5px; color:var(--text-2); line-height:1.7; margin:0 0 20px;}
  .reserve-code{
    background:var(--tint-linen); border-radius:10px; padding:14px; font-size:16px; font-weight:700;
    letter-spacing:.05em; color:var(--primary); margin-bottom:20px;
  }
  .modal-close{padding:11px 24px; border-radius:999px; border:1px solid var(--border); font-size:13.5px; font-weight:700;}
  .modal-close:hover{border-color:var(--primary); color:var(--primary);}

  .toast{
    position:fixed; bottom:28px; left:50%; z-index:300;
    background:var(--primary-dark); color:#fff; padding:13px 22px; border-radius:999px;
    font-size:13.5px; font-weight:600; display:flex;align-items:center;gap:8px;
    animation:toastIn .3s ease both; box-shadow:0 10px 30px rgba(0,0,0,.2);
  }
  .toast svg{width:16px;height:16px;}

  .loading-spin{animation:spinSlow 1s linear infinite;}

  @media (max-width:860px){
    .header-row{flex-wrap:wrap;}
    .search-bar{order:3; max-width:100%;}
    .hero h1{font-size:28px;}
    .procedure-grid{grid-template-columns:1fr;}
    .footer-cols{grid-template-columns:1fr 1fr;}
  }
</style>
</head>
<body>
<div id="app-root"></div>
<script type="text/babel">
const {useState, useEffect, useRef} = React;
const I = ({name, ...props}) => <i data-lucide={name} {...props}></i>;

/* ---------------- i18n ---------------- */
const T = {
  ko: {
    nav_search:"병원 검색 및 카테고리 필터", nav_detail:"병원 상세 및 예약 신청", nav_portal:"병원 포털 로그인 및 예약 관리",
    heroEyebrow:"한국 · 일본 동시 오픈", heroTitle:"성형외과·치과, 한국어 그대로 일본에서도 예약하세요",
    heroDesc:"입점 병원의 시술 정보와 실제 방문 후기를 비교하고, 원하는 날짜에 바로 상담을 예약할 수 있습니다.",
    sectionTitle:"입점 병원", sectionSub:"검색·카테고리 조건에 맞는 병원", portalBtn:"병원 포털",
    reserveTitle:"방문 상담 예약", reserveBtn:"예약 신청하기", reserveDone:"예약이 접수되었습니다",
    reserveDesc:"담당 병원 확인 후 SMS로 최종 확정 안내를 보내드립니다.", close:"닫기",
    loginTitle:"병원 파트너 로그인", loginDesc:"입점 병원 전용 계정으로 로그인하세요", loginBtn:"로그인",
    logout:"로그아웃", empty:"조건에 맞는 병원이 없습니다", emptyDesc:"필터를 초기화하고 다시 검색해보세요",
  },
  ja: {
    nav_search:"病院検索とカテゴリーフィルター", nav_detail:"病院詳細と予約申請", nav_portal:"病院ポータルログインと予約管理",
    heroEyebrow:"韓国・日本 同時オープン", heroTitle:"美容外科・歯科を日本語のまま韓国でも予約",
    heroDesc:"提携病院の施術情報と実際の来院レビューを比較し、希望日にすぐ相談予約ができます。",
    sectionTitle:"提携病院", sectionSub:"検索・カテゴリー条件に合う病院", portalBtn:"病院ポータル",
    reserveTitle:"来院相談予約", reserveBtn:"予約を申請する", reserveDone:"予約を受け付けました",
    reserveDesc:"担当病院確認後、SMSで最終確定のご案内をお送りします。", close:"閉じる",
    loginTitle:"病院パートナーログイン", loginDesc:"提携病院専用アカウントでログイン", loginBtn:"ログイン",
    logout:"ログアウト", empty:"条件に合う病院がありません", emptyDesc:"フィルターをリセットして再検索してください",
  }
};

/* ---------------- mock data ---------------- */
const CATEGORIES = [
  {id:"all", ko:"전체", ja:"すべて", icon:"grid-3x3"},
  {id:"ps", ko:"성형외과", ja:"美容外科", icon:"sparkles"},
  {id:"dental", ko:"치과", ja:"歯科", icon:"smile"},
  {id:"lift", ko:"리프팅", ja:"リフティング", icon:"trending-up"},
  {id:"contour", ko:"안면윤곽", ja:"顔輪郭", icon:"scan-face"},
  {id:"ortho", ko:"치아교정", ja:"歯列矯正", icon:"align-center"},
  {id:"implant", ko:"임플란트", ja:"インプラント", icon:"circle-dot"},
  {id:"skin", ko:"피부시술", ja:"スキンケア", icon:"droplet"},
  {id:"eye", ko:"눈성형", ja:"目の整形", icon:"eye"},
  {id:"nose", ko:"코성형", ja:"鼻整形", icon:"triangle"},
];

const REGIONS = ["서울 강남","서울 청담","도쿄 신주쿠","오사카 우메다","서울 압구정"];

function makeHospitals(){
  const names = [
    ["이지클리닉 강남 본원","イージークリニック 江南本院","ps"],
    ["라움치과의원","ラウム歯科医院","dental"],
    ["글로우안면윤곽클리닉","グロウ顔輪郭クリニック","contour"],
    ["신주쿠화이트치과","新宿ホワイト歯科","dental"],
    ["빛담성형외과","ビッダム形成外科","ps"],
    ["압구정리프트센터","狎鴎亭リフトセンター","lift"],
    ["오사카스마일치과","大阪スマイル歯科","ortho"],
    ["더채움임플란트치과","ザ・チェウムインプラント歯科","implant"],
    ["청담더마스킨클리닉","清潭ダームスキンクリニック","skin"],
    ["뷰티아이성형외과","ビューティアイ形成外科","eye"],
    ["라인노즈클리닉","ラインノーズクリニック","nose"],
    ["강남화이트치과교정센터","江南ホワイト矯正センター","ortho"],
  ];
  return names.map((n,i)=>({
    id:"h"+(i+1),
    name:{ko:n[0], ja:n[1]},
    category:n[2],
    region:REGIONS[i%REGIONS.length],
    rating:(4.4+((i*7)%6)/10).toFixed(1),
    reviews:38+((i*31)%160),
    price: 30000+((i*7)%6)*10000,
    seed:"medinfo-card-"+i,
  }));
}
const HOSPITALS = makeHospitals();
const ACTIVE_CHIP = {background:"var(--primary)", borderColor:"var(--primary)", color:"#fff"};

const PROCEDURES = [
  {ko:"상담 및 기초 검진", ja:"相談・基礎検診", price:"무료"},
  {ko:"실리프팅", ja:"糸リフティング", price:"890,000원~"},
  {ko:"안면윤곽 3D CT 진단", ja:"顔輪郭3D CT診断", price:"120,000원"},
  {ko:"치아 미백", ja:"ホワイトニング", price:"250,000원~"},
];

const REVIEWS = [
  {name:"김민수", stars:5, text:"일본에서 예약하고 방문했는데 언어 걱정 없이 편하게 상담받았습니다."},
  {name:"사토 유이", stars:5, text:"日本語対応がとても丁寧で、施術内容の説明も分かりやすかったです。"},
  {name:"이지은", stars:4, text:"예약 시간에 딱 맞춰 진료를 봐서 대기 시간이 거의 없었어요."},
];

function timeSlots(seed){
  const base = ["10:00","11:00","13:00","14:00","15:00","16:00","17:00","18:00"];
  return base.map((t,i)=>({time:t, taken: (seed+i)%5===0}));
}

/* ---------------- small components ---------------- */
function useIcons(dep){
  useEffect(()=>{ if(window.lucide) window.lucide.createIcons(); }, dep);
}

function Toast({msg, show}){
  if(!show) return null;
  return <div className="toast"><I name="check-circle-2"/>{msg}</div>;
}

function Header({lang,setLang,query,setQuery,goto,view,onSearchSubmit}){
  const t = T[lang];
  useIcons([lang]);
  return (
    <header className="search-header" data-search-header>
      <div className="header-row">
        <button className="brand" onClick={()=>goto("search")}>
          이지클리닉<span className="brand-jp">EasyClinic KR · JP</span>
        </button>
        <div className="search-bar">
          <button className="search-segment" onClick={()=>goto("search")}>
            <span className="segment-label">{lang==="ko"?"카테고리":"カテゴリー"}</span>
            <span className="segment-value">{lang==="ko"?"성형외과 · 치과":"美容外科・歯科"}</span>
          </button>
          <div className="search-divider"></div>
          <button className="search-segment" onClick={()=>goto("search")}>
            <span className="segment-label">{lang==="ko"?"지역":"地域"}</span>
            <span className="segment-value">{lang==="ko"?"서울 · 도쿄":"ソウル・東京"}</span>
          </button>
          <div className="search-divider"></div>
          <button className="search-segment" onClick={()=>goto("search")}>
            <span className="segment-label">{lang==="ko"?"방문희망일":"来院希望日"}</span>
            <span className="segment-value">{lang==="ko"?"날짜 선택":"日付を選択"}</span>
          </button>
          <button className="search-submit" onClick={onSearchSubmit}><I name="search" size={16}/></button>
        </div>
        <nav className="header-nav">
          <div className="lang-toggle">
            <button className={"lang-btn "+(lang==="ko"?"active":"")} onClick={()=>setLang("ko")}>한국어</button>
            <button className={"lang-btn "+(lang==="ja"?"active":"")} onClick={()=>setLang("ja")}>日本語</button>
          </div>
          <button className="user-menu" onClick={()=>goto("portal")}>
            <I name="building-2" size={15}/>{t.portalBtn}
          </button>
        </nav>
      </div>
      <div className="quicknav-band">
        <button className="quicknav-btn" onClick={()=>goto("search")}><I name="layout-grid" size={14}/>{t.nav_search}</button>
        <button className="quicknav-btn" onClick={()=>goto("detail")}><I name="calendar-check" size={14}/>{t.nav_detail}</button>
        <button className="quicknav-btn" onClick={()=>goto("portal")}><I name="building-2" size={14}/>{t.nav_portal}</button>
      </div>
    </header>
  );
}

function SearchScreen({lang,goto,activeCat,setActiveCat,activeRegion,setActiveRegion,favorites,toggleFav,openDetail,loading}){
  const t = T[lang];
  useIcons([lang, activeCat]);
  const filtered = HOSPITALS.filter(h=> (activeCat==="all"||h.category===activeCat) && (!activeRegion || h.region===activeRegion));

  return (
    <div className="app-fade">
      <div className="filter-chips" data-filter-chips>
        {CATEGORIES.map(c=>(
          <button key={c.id} className="chip" style={activeCat===c.id?ACTIVE_CHIP:undefined} onClick={()=>setActiveCat(c.id)}>
            <I name={c.icon} size={14}/><span>{lang==="ko"?c.ko:c.ja}</span>
          </button>
        ))}
        {REGIONS.map(r=>(
          <button key={r} className="chip" style={activeRegion===r?ACTIVE_CHIP:undefined} onClick={()=>setActiveRegion(activeRegion===r?null:r)}>
            <I name="map-pin" size={14}/><span>{r}</span>
          </button>
        ))}
      </div>

      <div className="hero">
        <div className="hero-eyebrow"><I name="globe" size={13}/>{t.heroEyebrow}</div>
        <h1>{t.heroTitle}</h1>
        <p>{t.heroDesc}</p>
      </div>

      <div className="main">
        <div className="section-title-row">
          <div>
            <div className="section-title">{t.sectionTitle}</div>
            <div className="section-sub">{t.sectionSub} · {filtered.length}{lang==="ko"?"곳":"件"}</div>
          </div>
        </div>

        {loading ? (
          <div className="card-grid">
            {Array.from({length:8}).map((_,i)=>(
              <div key={i} className="skeleton-card">
                <div className="skeleton-block" style={{aspectRatio:"4/3"}}></div>
                <div style={{padding:16}}>
                  <div className="skeleton-block" style={{height:16,borderRadius:6,marginBottom:8}}></div>
                  <div className="skeleton-block" style={{height:12,width:"60%",borderRadius:6}}></div>
                </div>
              </div>
            ))}
          </div>
        ) : filtered.length===0 ? (
          <div className="card-grid">
            <div className="empty-state">
              <I name="search-x"/>
              <div style={{fontWeight:700,fontSize:15}}>{t.empty}</div>
              <div style={{fontSize:13}}>{t.emptyDesc}</div>
            </div>
          </div>
        ) : (
          <div className="card-grid">
            {filtered.map((h,idx)=>(
              <article key={h.id} className="listing-card" style={{animationDelay:(idx*45)+"ms", borderRadius:14}} onClick={()=>openDetail(h.id)}>
                <div className="card-image-wrap">
                  <img className="card-image" src={"https://picsum.photos/seed/"+h.seed+"/500/380"} alt={h.name.ko}/>
                  <div className="card-badge">{lang==="ko"? (CATEGORIES.find(c=>c.id===h.category)||{}).ko : (CATEGORIES.find(c=>c.id===h.category)||{}).ja}</div>
                  <button className={"card-favorite "+(favorites[h.id]?"saved ":"")+(favorites["_pulse"]===h.id?"pulse":"")}
                    onClick={(e)=>{e.stopPropagation(); toggleFav(h.id);}}>
                    <I name="heart" size={16}/>
                  </button>
                  <div className="card-dots"><span className="dot active"></span><span className="dot"></span><span className="dot"></span></div>
                </div>
                <div className="card-body">
                  <div className="card-row-1">
                    <div className="card-title">{lang==="ko"?h.name.ko:h.name.ja}</div>
                    <div className="card-rating"><I name="star"/>{h.rating}</div>
                  </div>
                  <div className="card-meta"><I name="map-pin"/>{h.region}</div>
                  <div className="card-meta"><I name="message-square-text"/>{lang==="ko"?"후기 "+h.reviews+"개":"レビュー"+h.reviews+"件"}</div>
                  <div className="card-row-4">
                    <span className="card-price">{h.price.toLocaleString()}원~</span>
                    <span className="price-unit">{lang==="ko"?"상담비":"相談料"}</span>
                  </div>
                </div>
              </article>
            ))}
          </div>
        )}
      </div>
    </div>
  );
}

function DetailScreen({lang, hospital, goto, favorites, toggleFav}){
  const t = T[lang];
  const [thumb, setThumb] = useState(0);
  const [selDate, setSelDate] = useState(12);
  const [selSlot, setSelSlot] = useState(null);
  const [showModal, setShowModal] = useState(false);
  const [code, setCode] = useState("");
  useIcons([lang, hospital.id, thumb, selDate, selSlot]);

  const slots = timeSlots(parseInt(hospital.id.replace("h","")));
  const days = Array.from({length:30}).map((_,i)=>i+1);
  const startOffset = 3;

  function submit(){
    const c = "EC-2026-"+String(700+parseInt(hospital.id.replace("h",""))*3+selDate).padStart(4,"0");
    setCode(c);
    setShowModal(true);
  }

  return (
    <div className="main app-fade">
      <div className="breadcrumb">
        <button onClick={()=>goto("search")}>{lang==="ko"?"병원 검색":"病院検索"}</button>
        <I name="chevron-right" size={13}/>
        <span>{lang==="ko"?hospital.name.ko:hospital.name.ja}</span>
      </div>

      <div className="detail-grid">
        <div>
          <div className="gallery-main">
            <img src={"https://picsum.photos/seed/"+hospital.seed+"-g"+thumb+"/900/560"} alt=""/>
          </div>
          <div className="gallery-thumbs">
            {[0,1,2,3].map(i=>(
              <img key={i} className={thumb===i?"active":""} onClick={()=>setThumb(i)}
                src={"https://picsum.photos/seed/"+hospital.seed+"-g"+i+"/200/200"} alt=""/>
            ))}
          </div>

          <div className="detail-head">
            <div>
              <div className="detail-title">{lang==="ko"?hospital.name.ko:hospital.name.ja}</div>
            </div>
            <button className={"card-favorite "+(favorites[hospital.id]?"saved":"")} style={{position:"static"}} onClick={()=>toggleFav(hospital.id)}>
              <I name="heart" size={18}/>
            </button>
          </div>
          <div className="detail-meta-row">
            <span><I name="map-pin"/>{hospital.region}</span>
            <span><I name="star"/>{hospital.rating} ({hospital.reviews})</span>
            <span><I name="badge-check"/>{lang==="ko"?"입점 인증 병원":"提携認証病院"}</span>
          </div>

          <div className="detail-section">
            <h3><I name="info"/>{lang==="ko"?"병원 소개":"病院紹介"}</h3>
            <p>{lang==="ko"
              ? "한국-일본 양국 환자를 위한 다국어 상담 시스템을 운영하며, 시술 전 3D 진단과 상세 견적 상담을 표준 절차로 제공합니다."
              : "韓国・日本両国の患者向けに多言語相談システムを運営し、施術前の3D診断と詳細見積り相談を標準手順として提供します。"}</p>
          </div>

          <div className="detail-section">
            <h3><I name="stethoscope"/>{lang==="ko"?"시술 정보":"施術情報"}</h3>
            <div className="procedure-grid">
              {PROCEDURES.map((p,i)=>(
                <div key={i} className="procedure-item">
                  <span className="procedure-name">{lang==="ko"?p.ko:p.ja}</span>
                  <span className="procedure-price">{p.price}</span>
                </div>
              ))}
            </div>
          </div>

          <div className="detail-section">
            <h3><I name="message-square-text"/>{lang==="ko"?"실제 방문 후기":"来院者レビュー"}</h3>
            {REVIEWS.map((r,i)=>(
              <div key={i} className="review-card">
                <div className="review-avatar"><img src={"https://source.boringavatars.com/beam/64/"+encodeURIComponent(r.name)+"?colors=0f3e17,b1dbb8,b6ced5,cfe7d3"} alt=""/></div>
                <div>
                  <div className="review-name">{r.name}</div>
                  <div className="review-stars">{Array.from({length:r.stars}).map((_,j)=><I key={j} name="star"/>)}</div>
                  <div className="review-text">{r.text}</div>
                </div>
              </div>
            ))}
          </div>
        </div>

        <div className="reserve-panel" style={{borderRadius:14, padding:24}}>
          <h4>{t.reserveTitle}</h4>
          <div className="reserve-price">{hospital.price.toLocaleString()}원 <span>{lang==="ko"?"/ 초진 상담":"/ 初診相談"}</span></div>

          <div className="cal-grid">
            {(lang==="ko"?["일","월","화","수","목","금","토"]:["日","月","火","水","木","金","土"]).map(d=><div key={d} className="cal-dow">{d}</div>)}
            {Array.from({length:startOffset}).map((_,i)=><div key={"e"+i} className="cal-day empty"></div>)}
            {days.map(d=>{
              const disabled = d < 8;
              const isSel = selDate===d;
              return <button key={d} className={"cal-day "+(disabled?"disabled":isSel?"selected":"avail")}
                disabled={disabled} onClick={()=>{setSelDate(d); setSelSlot(null);}}>{d}</button>;
            })}
          </div>

          <div className="slot-grid">
            {slots.map(s=>(
              <button key={s.time} disabled={s.taken}
                className={"slot-btn "+(s.taken?"taken":selSlot===s.time?"selected":"")}
                onClick={()=>setSelSlot(s.time)}>{s.time}</button>
            ))}
          </div>

          <button className="btn-primary" disabled={!selSlot} onClick={submit}>
            <I name="calendar-plus" size={16}/>{t.reserveBtn}
          </button>
        </div>
      </div>

      {showModal && (
        <div className="modal-overlay" onClick={()=>setShowModal(false)}>
          <div className="modal-box" onClick={e=>e.stopPropagation()}>
            <div className="modal-icon"><I name="check" size={28}/></div>
            <h3>{t.reserveDone}</h3>
            <p>{t.reserveDesc}</p>
            <div className="reserve-code">{code}</div>
            <button className="modal-close" onClick={()=>setShowModal(false)}>{t.close}</button>
          </div>
        </div>
      )}
    </div>
  );
}

function PortalScreen({lang}){
  const t = T[lang];
  const [loggedIn, setLoggedIn] = useState(false);
  const [rows, setRows] = useState(()=>{
    const names = ["박서연","다나카 유키","최민준","야마다 하나","정하윤","스즈키 켄"];
    const procs = ["실리프팅 상담","치아 미백","안면윤곽 CT 진단","임플란트 상담","스킨 부스터","치열교정 상담"];
    const statuses = ["대기","확정","대기","확정","취소","확정"];
    return names.map((n,i)=>({
      id:i, name:n, proc:procs[i], date:"2026.07."+(10+i)+" 14:00",
      status:statuses[i],
    }));
  });
  const [toast, setToast] = useState(false);
  useIcons([lang, loggedIn, rows]);

  function updateStatus(id, val){
    setRows(rows.map(r=> r.id===id ? {...r, status:val} : r));
    setToast(true);
    setTimeout(()=>setToast(false), 1800);
  }

  if(!loggedIn){
    return (
      <div className="portal-wrap app-fade">
        <div className="login-card">
          <I className="brand-ic" name="building-2"/>
          <h2>{t.loginTitle}</h2>
          <p>{t.loginDesc}</p>
          <input className="input-field" placeholder={lang==="ko"?"병원 계정 ID":"病院アカウントID"} defaultValue="easyclinic-gangnam"/>
          <input className="input-field" type="password" placeholder={lang==="ko"?"비밀번호":"パスワード"} defaultValue="••••••••"/>
          <button className="btn-primary" onClick={()=>setLoggedIn(true)}><I name="log-in" size={16}/>{t.loginBtn}</button>
        </div>
      </div>
    );
  }

  const counts = {
    total: rows.length,
    pending: rows.filter(r=>r.status==="대기").length,
    confirmed: rows.filter(r=>r.status==="확정").length,
  };

  return (
    <div className="portal-wrap app-fade">
      <div className="portal-header">
        <div>
          <h2>이지클리닉 강남 본원</h2>
          <p>{lang==="ko"?"병원 파트너 대시보드":"病院パートナーダッシュボード"}</p>
        </div>
        <button className="logout-btn" onClick={()=>setLoggedIn(false)}><I name="log-out"/>{t.logout}</button>
      </div>

      <div className="stat-mini-row">
        <div className="stat-mini"><div className="num">{counts.total}</div><div className="lbl">{lang==="ko"?"전체 예약":"全予約"}</div></div>
        <div className="stat-mini"><div className="num">{counts.pending}</div><div className="lbl">{lang==="ko"?"승인 대기":"承認待ち"}</div></div>
        <div className="stat-mini"><div className="num">{counts.confirmed}</div><div className="lbl">{lang==="ko"?"확정 예약":"確定予約"}</div></div>
      </div>

      <div className="portal-table-wrap">
        <table className="portal-table">
          <thead>
            <tr>
              <th>{lang==="ko"?"환자":"患者"}</th>
              <th>{lang==="ko"?"희망 시술":"希望施術"}</th>
              <th>{lang==="ko"?"방문 일시":"来院日時"}</th>
              <th>{lang==="ko"?"상태":"状態"}</th>
              <th>{lang==="ko"?"상태 변경":"状態変更"}</th>
            </tr>
          </thead>
          <tbody>
            {rows.map(r=>(
              <tr key={r.id}>
                <td>
                  <div className="patient-cell">
                    <div className="patient-avatar"><img src={"https://source.boringavatars.com/marble/60/"+encodeURIComponent(r.name)} alt=""/></div>
                    {r.name}
                  </div>
                </td>
                <td>{r.proc}</td>
                <td>{r.date}</td>
                <td><span className={"status-badge status-"+r.status}>{r.status}</span></td>
                <td>
                  <select className="status-select" value={r.status} onChange={e=>updateStatus(r.id, e.target.value)}>
                    <option value="대기">대기</option>
                    <option value="확정">확정</option>
                    <option value="취소">취소</option>
                  </select>
                </td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>
      <Toast msg={lang==="ko"?"예약 상태가 변경되었습니다":"予約状況が更新されました"} show={toast}/>
    </div>
  );
}

function Footer({lang, goto}){
  return (
    <footer className="footer">
      <div className="footer-cols">
        <div className="footer-col">
          <h4 style={{color:"#0f3e17", fontSize:16}}>이지클리닉</h4>
          <p>{lang==="ko"?"한국·일본 병원 정보 예약 플랫폼":"韓国・日本 病院情報予約プラットフォーム"}</p>
        </div>
        <div className="footer-col">
          <h4>{lang==="ko"?"서비스":"サービス"}</h4>
          <a onClick={()=>goto("search")}>{lang==="ko"?"병원 찾기":"病院を探す"}</a>
          <a onClick={()=>goto("search")}>{lang==="ko"?"이용 가이드":"ご利用ガイド"}</a>
        </div>
        <div className="footer-col">
          <h4>{lang==="ko"?"파트너":"パートナー"}</h4>
          <a onClick={()=>goto("portal")}>{lang==="ko"?"입점 문의":"提携のお問い合わせ"}</a>
          <a onClick={()=>goto("portal")}>{lang==="ko"?"병원 포털":"病院ポータル"}</a>
        </div>
        <div className="footer-col">
          <h4>{lang==="ko"?"고객센터":"カスタマーセンター"}</h4>
          <p>help@easyclinic-demo.kr</p>
          <p>1600-0000</p>
        </div>
      </div>
      <div className="footer-bottom">© 2026 이지클리닉 — 자체 개발 데모 프로젝트</div>
    </footer>
  );
}

function App(){
  const [lang, setLang] = useState("ko");
  const [view, setView] = useState("search");
  const [activeCat, setActiveCat] = useState("all");
  const [activeRegion, setActiveRegion] = useState(null);
  const [selHospitalId, setSelHospitalId] = useState(HOSPITALS[0].id);
  const [favorites, setFavorites] = useState({});
  const [loading, setLoading] = useState(false);

  useIcons([view, lang]);

  function goto(v){ setView(v); window.scrollTo({top:0, behavior:"smooth"}); }
  function openDetail(id){ setSelHospitalId(id); setView("detail"); window.scrollTo({top:0, behavior:"smooth"}); }
  function toggleFav(id){
    setFavorites(prev=>({...prev, [id]: !prev[id], _pulse:id}));
    setTimeout(()=> setFavorites(prev=>({...prev, _pulse:null})), 450);
  }
  function onSearchSubmit(){
    setView("search");
    setLoading(true);
    setTimeout(()=> setLoading(false), 700);
  }

  const hospital = HOSPITALS.find(h=>h.id===selHospitalId) || HOSPITALS[0];

  return (
    <div style={{width:"100%",minHeight:"100vh",display:"flex",flexDirection:"column"}} data-archetype="airbnb-search-grid">
      <Header lang={lang} setLang={setLang} goto={goto} view={view} onSearchSubmit={onSearchSubmit}/>
      <div style={{flex:1, width:"100%"}}>
        {view==="search" && (
          <SearchScreen lang={lang} goto={goto} activeCat={activeCat} setActiveCat={setActiveCat}
            activeRegion={activeRegion} setActiveRegion={setActiveRegion}
            favorites={favorites} toggleFav={toggleFav} openDetail={openDetail} loading={loading}/>
        )}
        {view==="detail" && (
          <DetailScreen lang={lang} hospital={hospital} goto={goto} favorites={favorites} toggleFav={toggleFav}/>
        )}
        {view==="portal" && <PortalScreen lang={lang}/>}
      </div>
      <Footer lang={lang} goto={goto}/>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("app-root")).render(<App/>);
</script>
</body>
</html>
