<html lang="ko">
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://unpkg.com/prop-types@15/prop-types.min.js"></script>
<script src="https://unpkg.com/react-is@18/umd/react-is.production.min.js"></script>

<style>
  :root{
    --bark:#17150e;
    --bark-2:#2a271c;
    --bone:#f0f7f6;
    --paper:#ffffff;
    --ash:#e2e2e2;
    --slate:#333333;
    --chartreuse:#cccc25;
    --chartreuse-dark:#a8a81c;
    --periwinkle:#9fa6ff;
    --moss:#6c8853;
    --slateblue:#6883a1;
    --sage:#9ac192;
    --radius-card:24px;
    --radius-pill:9999px;
    --radius-badge:8px;
    --sidebar-w:248px;
  }
  *{box-sizing:border-box;}
  html,body{width:100%;margin:0;padding:0;}
  body{
    font-family:'Pretendard', -apple-system, BlinkMacSystemFont, sans-serif;
    background:var(--bone); color:var(--bark); -webkit-font-smoothing:antialiased;
    letter-spacing:-0.01em;
  }
  #app-root{width:100%;min-height:100vh;}
  button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit;}
  input,select,textarea{font-family:inherit;}
  img{display:block;max-width:100%;}

  @keyframes fadeUp{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}
  @keyframes popIn{from{opacity:0;transform:scale(.96);}to{opacity:1;transform:scale(1);}}
  @keyframes barGrow{from{transform:scaleY(0);}to{transform:scaleY(1);}}
  @keyframes countUp{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);}}
  @keyframes dashDraw{from{stroke-dashoffset:120;}to{stroke-dashoffset:0;}}
  @keyframes toastSlide{from{opacity:0;transform:translate(-50%,14px);}to{opacity:1;transform:translate(-50%,0);}}
  @keyframes badgePulse{0%{box-shadow:0 0 0 0 rgba(204,204,37,.5);}70%{box-shadow:0 0 0 8px rgba(204,204,37,0);}100%{box-shadow:0 0 0 0 rgba(204,204,37,0);}}

  .fade-up{animation:fadeUp .4s ease both;}

  .shell{display:flex;width:100%;min-height:100vh;}

  /* ===== sidebar (archetype signature) ===== */
  .sidebar{
    position:fixed; left:0; top:0; bottom:0; width:var(--sidebar-w);
    background:var(--bark); color:#f4f2ea; padding:20px 14px; overflow-y:auto;
    display:flex; flex-direction:column; z-index:50;
  }
  .sidebar-brand{display:flex;align-items:center;gap:10px;padding:8px 10px 20px;}
  .sidebar-brand .mark{
    width:34px;height:34px;border-radius:10px;background:var(--chartreuse); color:var(--bark);
    display:flex;align-items:center;justify-content:center;font-weight:800;font-size:15px;flex-shrink:0;
  }
  .sidebar-brand .name{font-weight:700;font-size:15px;letter-spacing:-0.01em;}
  .sidebar-brand .env{font-size:11px;color:#a7a597;}
  .sidebar-section{margin-bottom:6px;}
  .sidebar-section-title{font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:#8f8c7d;padding:14px 10px 6px;}
  .sidebar-link{
    display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:12px;font-size:13.5px;font-weight:600;
    color:#d8d6c9; margin-bottom:2px; transition:all .15s ease; width:100%; text-align:left;
  }
  .sidebar-link i{font-size:17px;flex-shrink:0;}
  .sidebar-link:hover{background:rgba(255,255,255,.06); color:#fff;}
  .sidebar-link.active{background:var(--chartreuse); color:var(--bark);}
  .sidebar-foot{margin-top:auto; padding:14px 10px; border-top:1px solid rgba(255,255,255,.1); display:flex; align-items:center; gap:10px;}
  .sidebar-foot img{width:32px;height:32px;border-radius:999px;}
  .sidebar-foot .who{font-size:12.5px;font-weight:700;}
  .sidebar-foot .role{font-size:11px;color:#a7a597;}

  .main-wrap{
    margin-left:var(--sidebar-w); flex:1; min-width:0; width:calc(100% - var(--sidebar-w));
    padding:28px 36px 60px;
  }

  .page-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:22px;flex-wrap:wrap;gap:14px;}
  .page-title{font-size:46px;font-weight:700;letter-spacing:-0.03em;line-height:1.05;margin:0 0 6px;}
  .page-meta{font-size:12.5px;color:var(--slate);}
  .page-actions{display:flex;gap:10px;}
  .btn-ghost{
    display:flex;align-items:center;gap:6px;padding:10px 16px;border-radius:var(--radius-pill);
    border:1px solid var(--ash); font-size:13px; font-weight:600; background:var(--paper);
    transition:all .15s ease;
  }
  .btn-ghost:hover{border-color:var(--bark);}
  .btn-dark{
    display:flex;align-items:center;gap:6px;padding:10px 18px;border-radius:var(--radius-pill);
    background:var(--bark); color:#fff; font-size:13px; font-weight:700; transition:background .15s ease;
  }
  .btn-dark:hover{background:var(--bark-2);}
  .btn-chartreuse{
    display:flex;align-items:center;gap:6px;padding:10px 18px;border-radius:var(--radius-pill);
    background:var(--chartreuse); color:var(--bark); font-size:13px; font-weight:700; transition:background .15s ease;
  }
  .btn-chartreuse:hover{background:var(--chartreuse-dark);}

  /* ===== stat row (archetype signature) ===== */
  .stat-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:16px;margin-bottom:26px;}
  .stat-card{
    border-radius:16px; padding:20px 22px; position:relative; overflow:hidden; color:#fff;
    animation:popIn .4s ease both; min-height:120px;
  }
  .stat-card.g-peri{background:linear-gradient(135deg, #9fa6ff, #b3bae8);}
  .stat-card.g-moss{background:linear-gradient(135deg, #6c8853, #99ab91);}
  .stat-card.g-slate{background:linear-gradient(135deg, #6883a1, #97a9b9);}
  .stat-card.g-sage{background:linear-gradient(135deg, #9ac192, #aec7b0);}
  .stat-label{font-size:12.5px;font-weight:700;opacity:.92;}
  .stat-value{font-size:32px;font-weight:800;margin-top:8px;letter-spacing:-0.02em;animation:countUp .5s ease both;}
  .stat-delta{font-size:12px;font-weight:700;margin-top:4px;display:inline-flex;align-items:center;gap:3px;}
  .stat-sparkline{position:absolute;right:14px;bottom:14px;width:72px;height:30px;opacity:.9;}
  .stat-sparkline path{stroke-dasharray:120;stroke-dashoffset:120;animation:dashDraw 1s ease forwards;}

  /* ===== tab bar (archetype signature) ===== */
  .data-section{background:var(--paper); border-radius:var(--radius-card); border:1px solid var(--ash); overflow:hidden; margin-bottom:24px;}
  .tab-bar{display:flex;gap:4px;padding:14px 20px 0;border-bottom:1px solid var(--ash);}
  .tab{padding:10px 6px;margin-right:18px;font-size:13.5px;font-weight:700;color:var(--slate);border-bottom:2px solid transparent;transition:all .15s ease;}
  .tab.active{color:var(--bark);border-bottom-color:var(--chartreuse);}
  .data-toolbar{display:flex;gap:10px;padding:16px 20px;align-items:center;flex-wrap:wrap;}
  .search-input{flex:1;min-width:180px;display:flex;align-items:center;gap:8px;background:var(--bone);border-radius:var(--radius-pill);padding:9px 16px;}
  .search-input input{border:none;background:transparent;font-size:13px;width:100%;outline:none;}
  .filter-chip{display:flex;align-items:center;gap:6px;padding:9px 14px;border-radius:var(--radius-pill);border:1px solid var(--ash);font-size:12.5px;font-weight:600;background:var(--paper);transition:all .15s ease;}
  .filter-chip.active{background:var(--bark);color:#fff;border-color:var(--bark);}
  .filter-chip:hover{border-color:var(--bark);}
  .export-btn{display:flex;align-items:center;gap:6px;padding:9px 14px;border-radius:var(--radius-pill);font-size:12.5px;font-weight:700;background:var(--bone);}

  /* ===== table (archetype signature) ===== */
  .data-table-wrap{overflow-x:auto;}
  table.data-table{width:100%;border-collapse:collapse;min-width:640px;}
  table.data-table th{text-align:left;font-size:11.5px;text-transform:uppercase;letter-spacing:.04em;color:var(--slate);font-weight:700;padding:12px 20px;border-bottom:1px solid var(--ash);}
  table.data-table td{padding:14px 20px;font-size:13.5px;border-bottom:1px solid var(--ash);vertical-align:middle;}
  table.data-table tbody tr{transition:background .15s ease;}
  table.data-table tbody tr:hover{background:var(--bone);}
  table.data-table tbody tr:last-child td{border-bottom:none;}
  .badge{padding:4px 10px;border-radius:var(--radius-badge);font-size:11px;font-weight:700;display:inline-block;}
  .badge-pending{background:#fdf1cf;color:#8a6410;}
  .badge-approved{background:#e4f0da;color:#3f5c2c;}
  .badge-rejected{background:#fbdcdc;color:#96302f;}
  .badge-active{background:#e4f0da;color:#3f5c2c;}
  .badge-blocked{background:#3a3730;color:#e8b4b4;}
  .row-action{display:flex;gap:6px;}
  .icon-btn{width:30px;height:30px;border-radius:9px;display:flex;align-items:center;justify-content:center;background:var(--bone);transition:all .15s ease;}
  .icon-btn:hover{background:var(--ash);}
  .icon-btn.approve:hover{background:#dcecd1;color:#3f5c2c;}
  .icon-btn.reject:hover{background:#f8d5d5;color:#96302f;}
  .cell-user{display:flex;align-items:center;gap:10px;}
  .cell-user img{width:30px;height:30px;border-radius:999px;flex-shrink:0;}
  .diff-mini{font-size:11.5px;color:var(--slate);}
  .diff-mini s{color:#b6b2a2;}
  .diff-mini b{color:var(--bark);}

  /* calendar + slot side composition */
  .cal-composition{display:grid;grid-template-columns:1fr 300px;gap:18px;}
  @media (max-width:1100px){.cal-composition{grid-template-columns:1fr;}}
  .cal-panel{background:var(--paper);border:1px solid var(--ash);border-radius:var(--radius-card);padding:20px;}
  .cal-panel-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;}
  .cal-panel-head h3{font-size:15px;font-weight:700;margin:0;}
  .timeline-row{display:grid;grid-template-columns:130px repeat(7,1fr);gap:6px;align-items:center;margin-bottom:6px;}
  .timeline-hosp{font-size:12px;font-weight:700;color:var(--slate);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .timeline-dow{font-size:10.5px;text-align:center;color:var(--slate);font-weight:700;}
  .timeline-cell{height:34px;border-radius:8px;background:var(--bone);position:relative;}
  .resv-block{
    position:absolute;inset:2px;border-radius:6px;font-size:10.5px;font-weight:700;color:#fff;
    display:flex;align-items:center;justify-content:center;cursor:pointer;transition:transform .15s ease;
    transform-origin:bottom; animation:barGrow .4s ease both;
  }
  .resv-block:hover{transform:scale(1.05);}
  .resv-block.confirmed{background:var(--moss);}
  .resv-block.pending{background:#c99a2e;}
  .resv-block.cancelled{background:#a24444;opacity:.55;}
  .resv-block.selected{outline:2px solid var(--chartreuse); outline-offset:1px;}

  .slot-side{background:var(--bark); color:#f4f2ea; border-radius:var(--radius-card); padding:22px; position:sticky; top:28px; height:fit-content;}
  .slot-side h4{font-size:14px;font-weight:700;margin:0 0 4px;}
  .slot-side .sub{font-size:11.5px;color:#a7a597;margin-bottom:16px;}
  .slot-detail-card{background:rgba(255,255,255,.06);border-radius:14px;padding:14px;margin-bottom:12px;}
  .slot-detail-card .t{font-size:12.5px;font-weight:700;margin-bottom:4px;}
  .slot-detail-card .d{font-size:11.5px;color:#c9c7ba;}
  .slot-actions{display:flex;gap:8px;margin-top:10px;}
  .slot-actions button{flex:1;padding:8px;border-radius:10px;font-size:11.5px;font-weight:700;}
  .slot-actions .confirm{background:var(--chartreuse);color:var(--bark);}
  .slot-actions .cancel{background:rgba(255,255,255,.1);color:#fff;}
  .empty-slot{font-size:12px;color:#a7a597;text-align:center;padding:30px 10px;}

  /* modal */
  .modal-overlay{position:fixed;inset:0;background:rgba(23,21,14,.5);z-index:200;display:flex;align-items:center;justify-content:center;padding:20px;animation:fadeUp .2s ease both;}
  .modal-box{background:var(--paper);border-radius:22px;max-width:460px;width:100%;padding:30px;animation:popIn .25s ease both;}
  .modal-box h3{font-size:18px;margin:0 0 4px;}
  .modal-box .sub{font-size:12.5px;color:var(--slate);margin-bottom:20px;}
  .field-row{margin-bottom:14px;}
  .field-row label{font-size:12px;font-weight:700;color:var(--slate);display:block;margin-bottom:6px;}
  .field-row input, .field-row select{width:100%;padding:11px 14px;border:1px solid var(--ash);border-radius:12px;font-size:13.5px;}
  .modal-actions{display:flex;gap:10px;margin-top:22px;}
  .modal-actions button{flex:1;padding:12px;border-radius:var(--radius-pill);font-size:13.5px;font-weight:700;}
  .modal-actions .cancel{border:1px solid var(--ash);}
  .modal-actions .submit{background:var(--bark);color:#fff;}

  .toast{position:fixed;bottom:28px;left:50%;z-index:300;background:var(--bark);color:#fff;padding:13px 22px;border-radius:var(--radius-pill);font-size:13px;font-weight:600;display:flex;align-items:center;gap:8px;animation:toastSlide .3s ease both;box-shadow:0 12px 30px rgba(0,0,0,.25);}

  .matrix-card{background:var(--paper);border:1px solid var(--ash);border-radius:var(--radius-card);padding:22px;margin-top:20px;}
  .matrix-card h3{font-size:15px;font-weight:700;margin:0 0 14px;}
  table.matrix-table{width:100%;border-collapse:collapse;}
  table.matrix-table th, table.matrix-table td{padding:10px 12px;text-align:center;font-size:12px;border-bottom:1px solid var(--ash);}
  table.matrix-table th:first-child, table.matrix-table td:first-child{text-align:left;font-weight:700;}
  table.matrix-table i.ph-check-circle{color:var(--moss);font-size:17px;}
  table.matrix-table i.ph-x-circle{color:#c7c3b4;font-size:17px;}

  .chart-box{background:var(--paper);border:1px solid var(--ash);border-radius:var(--radius-card);padding:22px;margin-bottom:20px;}
  .chart-box-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;}
  .chart-box-head h3{font-size:15px;font-weight:700;margin:0;}
  .chart-fixed-height{position:relative;height:260px;width:100%;}

  .pulse-dot{width:8px;height:8px;border-radius:999px;background:var(--chartreuse);display:inline-block;animation:badgePulse 1.6s infinite;}

  @media (max-width:880px){
    .sidebar{transform:translateX(-100%);}
    .main-wrap{margin-left:0;width:100%;}
  }
</style>
</head>

const HOSPITALS = ["이지클리닉 강남","라움치과의원","글로우안면윤곽","신주쿠화이트치과","빛담성형외과","압구정리프트센터"];

function makeReservationGrid(){
  const grid = {};
  HOSPITALS.forEach((h,hi)=>{
    grid[h] = Array.from({length:7}).map((_,d)=>{
      const seed = (hi*7+d);
      if(seed%3===0) return null;
      const statuses = ["confirmed","pending","cancelled"];
      return {
        status: statuses[seed%3],
        time: (9+(seed%8))+":00",
        patient: ["박서연","다나카 유키","최민준","야마다 하나","정하윤"][seed%5],
      };
    });
  });
  return grid;
}
const RESV_GRID = makeReservationGrid();
const DOW = ["월","화","수","목","금","토","일"];

function sparkPath(seed){
  let pts = [];
  let v = 14 + (seed%5);
  for(let i=0;i<10;i++){
    v = Math.max(3, Math.min(26, v + (((seed+i)*13)%7 - 3)));
    pts.push(v);
  }
  return "M " + pts.map((p,i)=> (i*8)+","+(30-p)).join(" L ");
}

/* ---------------- shared ---------------- */
function Toast({show,msg}){
  if(!show) return null;
  return <div className="toast"><Icon name="ph-check-circle"/>{msg}</div>;
}

function Sparkline({seed,color}){
  return (
    <svg className="stat-sparkline" viewBox="0 0 80 30">
      <path d={sparkPath(seed)} fill="none" stroke={color||"#ffffff"} strokeWidth="2"/>
    </svg>
  );
}

/* ---------------- screens ---------------- */
function MainCalendar({onToast}){
  const [selected, setSelected] = useState(null);
  const [modal, setModal] = useState(false);

  const stats = [
    {label:"오늘 예약", value:"18건", delta:"+4건", cls:"g-peri", seed:3},
    {label:"승인 대기 요청", value:"7건", delta:"+2건", cls:"g-moss", seed:7},
    {label:"이번주 확정율", value:"86%", delta:"+3%p", cls:"g-slate", seed:11},
    {label:"활성 입점 병원", value:"24곳", delta:"+1곳", cls:"g-sage", seed:5},
  ];

  function pickBlock(h, d, r){
    setSelected({hospital:h, day:DOW[d], ...r});
  }
  function changeStatus(val){
    onToast(val==="confirmed" ? "예약이 확정되었습니다" : "예약이 취소되었습니다");
    setSelected(prev=> prev ? {...prev, status:val} : prev);

  return (

      <div className="page-header">
        <div>
          <h1 className="page-title">통합 예약 캘린더</h1>

        </div>
        <div className="page-actions">
          <button className="btn-ghost" onClick={()=>onToast("이번 주 기간으로 필터링되었습니다")}><Icon name="ph-calendar-blank" w={15}/>이번 주</button>

        </div>
      </div>

      <div className="stat-row">
        {stats.map((s,i)=>(
          <div key={i} className={"stat-card "+s.cls} style={{animationDelay:(i*60)+"ms", borderRadius:24, boxShadow:"0 16px 32px rgba(23,21,14,0.10)"}}>
            <div className="stat-label">{s.label}</div>
            <div className="stat-value">{s.value}</div>
            <div className="stat-delta"><Icon name="ph-trend-up" w={13}/>{s.delta}</div>
            <Sparkline seed={s.seed}/>

        ))}
      </div>

      <div className="cal-composition">
        <div className="cal-panel">
          <div className="cal-panel-head">
            <h3>병원별 예약 타임라인</h3>
            <div className="page-actions">
              <button className="btn-ghost" onClick={()=>onToast("이전 주로 이동합니다")}><Icon name="ph-caret-left" w={14}/></button>
              <button className="btn-ghost" onClick={()=>onToast("다음 주로 이동합니다")}><Icon name="ph-caret-right" w={14}/></button>
            </div>
          </div>
          <div className="timeline-row">
            <div></div>
            {DOW.map(d=><div key={d} className="timeline-dow">{d}</div>)}
          </div>
          {HOSPITALS.map((h)=>(
            <div key={h} className="timeline-row">
              <div className="timeline-hosp">{h}</div>
              {RESV_GRID[h].map((r,d)=>(
                <div key={d} className="timeline-cell">
                  {r && (
                    <div className={"resv-block "+r.status+(selected && selected.hospital===h && selected.day===DOW[d] ? " selected":"")}

        <div className="slot-side">

function ApprovalScreen({onToast}){
  const [tab, setTab] = useState("all");
  const [rows, setRows] = useState(APPROVAL_QUEUE);
  const [q, setQ] = useState("");
  const [sortPending, setSortPending] = useState(true);

  const TABS = [{id:"all",label:"전체"},{id:"병원정보",label:"병원정보"},{id:"시술정보",label:"시술정보"},{id:"후기",label:"후기"}];
  let filtered = rows.filter(r=> (tab==="all"||r.type===tab) && (r.hospital.includes(q) || r.field.includes(q)));
  if(sortPending){
    const order = {"대기":0,"승인":1,"반려":2};
    filtered = [...filtered].sort((a,b)=> order[a.status]-order[b.status]);
  }

  function act(id, status){
    setRows(rows.map(r=> r.id===id ? {...r, status} : r));
    onToast(status==="승인"?"요청이 승인되었습니다":"요청이 반려되었습니다");
  }
  function toggleSort(){
    setSortPending(!sortPending);
    onToast(!sortPending ? "대기 항목을 상단으로 정렬했습니다" : "요청일 순으로 정렬했습니다");
  }

  return (
    <div className="fade-up">
      <div className="page-header">
        <div>
          <h1 className="page-title">콘텐츠 승인 워크플로우</h1>
          <p className="page-meta">병원이 요청한 정보 수정을 검토하고 발행을 승인합니다</p>
        </div>
        <div className="page-actions">
          <button className="btn-chartreuse" onClick={()=>{
            setRows(rows.map(r=> r.status==="대기" ? {...r, status:"승인"} : r));
            onToast("대기 중인 요청을 일괄 승인했습니다");
          }}><Icon name="ph-check-square-offset" w={15}/>대기 항목 일괄 승인</button>
        </div>
      </div>

      <div className="data-section" style={{borderRadius:24, boxShadow:"0 16px 32px rgba(23,21,14,0.10)"}}>
        <div className="tab-bar" data-tabs>
          {TABS.map(t=>(
            <button key={t.id} className={"tab "+(tab===t.id?"active":"")} onClick={()=>setTab(t.id)}>{t.label}</button>
          ))}
        </div>
        <div className="data-toolbar">
          <div className="search-input"><Icon name="ph-magnifying-glass" w={15}/><input placeholder="병원명 또는 항목 검색…" value={q} onChange={e=>setQ(e.target.value)}/></div>
          <button className={"filter-chip "+(sortPending?"active":"")} onClick={toggleSort}><Icon name="ph-funnel" w={13}/>대기순</button>
          <button className="export-btn" onClick={()=>onToast("요청 내역을 CSV로 내보냅니다")}><Icon name="ph-export" w={14}/>내보내기</button>
        </div>
        <div className="data-table-wrap">
          <table className="data-table">
            <thead>
              <tr><th colSpan="6" style={{background:"var(--bone)",fontSize:11,color:"#8f8c7d"}}>대기 중인 콘텐츠 변경 요청</th></tr>
              <tr><th>병원</th><th>유형</th><th>변경 항목</th><th>요청일</th><th>상태</th><th></th></tr>
            </thead>
            <tbody>
              {filtered.map(r=>(
                <tr key={r.id}>
                  <td>{r.hospital}</td>
                  <td>{r.type}</td>
                  <td className="diff-mini"><s>{r.before}</s> → <b>{r.after}</b></td>
                  <td>{r.date}</td>
                  <td><span className={"badge "+(r.status==="대기"?"badge-pending":r.status==="승인"?"badge-approved":"badge-rejected")}>{r.status}</span></td>
                  <td>
                    <div className="row-action">
                      <button className="icon-btn approve" onClick={()=>act(r.id,"승인")}><Icon name="ph-check" w={15}/></button>
                      <button className="icon-btn reject" onClick={()=>act(r.id,"반려")}><Icon name="ph-x" w={15}/></button>
                    </div>
                  </td>
                </tr>
              ))}
              {filtered.length===0 && <tr><td colSpan="6" style={{textAlign:"center",color:"#8f8c7d",padding:"30px 0"}}>조건에 맞는 요청이 없습니다</td></tr>}
            </tbody>
            <tfoot>
              <tr><td colSpan="6" style={{fontSize:12,color:"#333",fontWeight:700}}>총 {rows.length}건 · 대기 {rows.filter(r=>r.status==="대기").length}건</td></tr>
            </tfoot>
          </table>
        </div>
      </div>
    </div>
  );
}

function AccountsScreen({onToast}){

function App(){
  const [view, setView] = useState("main");
  const [toast, setToast] = useState({show:false, msg:""});

  function onToast(msg){
    setToast({show:true, msg});
    setTimeout(()=> setToast({show:false, msg:""}), 1900);
  }

  const NAV_ALL = [...NAV_MAIN, ...NAV_MANAGE];
  const title = (NAV_ALL.find(n=>n.id===view)||{}).label || "메디허브";

  return (
    <div className="shell" data-archetype="stripe-multipane">
      <aside className="sidebar" data-sidebar>
        <div className="sidebar-brand">
          <div className="mark">M</div>
          <div>
            <div className="name">메디허브</div>
            <div className="env">운영 콘솔 · Production</div>
          </div>
        </div>
        <div className="sidebar-section">
          <div className="sidebar-section-title">운영</div>
          {NAV_MAIN.map(n=>(
            <button key={n.id} className={"sidebar-link "+(view===n.id?"active":"")} onClick={()=>setView(n.id)}>
              <i className={"ph "+n.icon}></i><span>{n.label}</span>
            </button>
          ))}
        </div>
        <div className="sidebar-section">
          <div className="sidebar-section-title">관리</div>
          {NAV_MANAGE.map(n=>(
            <button key={n.id} className={"sidebar-link "+(view===n.id?"active":"")} onClick={()=>setView(n.id)}>
              <i className={"ph "+n.icon}></i><span>{n.label}</span>
            </button>
          ))}
        </div>
        <div className="sidebar-foot">
          <img src="https://source.boringavatars.com/marble/64/admin-medihub?colors=cccc25,9fa6ff,9ac192" alt=""/>
          <div>
            <div className="who">이관리 매니저</div>
            <div className="role">최고 관리자</div>
          </div>
        </div>
      </aside>
      <main className="main-wrap">
        {view==="main" && <MainCalendar onToast={onToast}/>}
        {view==="approval" && <ApprovalScreen onToast={onToast}/>}
        {view==="accounts" && <AccountsScreen onToast={onToast}/>}
        {view==="insights" && <InsightsScreen onToast={onToast}/>}
      </main>
      <Toast show={toast.show} msg={toast.msg}/>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("app-root")).render(<App/>);
</script>
</body>
</html>
