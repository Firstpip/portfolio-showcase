<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>베리게이트 콘솔 — 가상자산 게이트웨이 관제 데모</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css">
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<style>
  :root{
    --primary:#101010; --secondary:#0099ff; --accent:#3ad98a;
    --bg:#f4f4f4; --surface:#ffffff; --graphite:#242424; --slate:#6b7280;
    --stone:#898989; --border:#e5e7eb; --text:#101010;
    --success:#16a34a; --success-bg:#ecfdf3; --warning:#d97706; --warning-bg:#fffaeb;
    --danger:#dc2626; --danger-bg:#fef2f2; --info:#0099ff; --info-bg:#eff6fe;
    --radius-card:12px; --radius-pill:9999px; --radius-input:8px;
    --shadow-card:0 4px 8px rgba(36,36,36,.05);
    --shadow-hover:0 1px 5px -4px rgba(36,36,36,.7),0 4px 8px rgba(36,36,36,.08);
  }
  *{box-sizing:border-box;}
  html,body{width:100%;margin:0;padding:0;background:var(--bg);}
  body{font-family:'Pretendard',ui-sans-serif,system-ui,sans-serif;color:var(--text);-webkit-font-smoothing:antialiased;}
  button,input,textarea{font-family:inherit;}
  ::-webkit-scrollbar{width:8px;height:8px;}
  ::-webkit-scrollbar-thumb{background:var(--border);border-radius:8px;}

  @keyframes fadeInScale{from{opacity:0;transform:scale(.96);}to{opacity:1;transform:scale(1);}}
  @keyframes slideInRight{from{transform:translateX(100%);}to{transform:translateX(0);}}
  @keyframes pulseDot{0%{box-shadow:0 0 0 0 rgba(58,217,138,.55);}70%{box-shadow:0 0 0 8px rgba(58,217,138,0);}100%{box-shadow:0 0 0 0 rgba(58,217,138,0);}}
  @keyframes toastIn{from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:translateY(0);}}
  @keyframes rowIn{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);}}
  @keyframes overlayIn{from{opacity:0;}to{opacity:1;}}

  .app-shell{display:flex;width:100%;min-height:100vh;}

  .sidebar{position:fixed;left:0;top:0;bottom:0;width:246px;background:var(--surface);border-right:1px solid var(--border);
    display:flex;flex-direction:column;padding:20px 14px;overflow-y:auto;z-index:20;}
  .sidebar-brand{display:flex;align-items:center;gap:10px;padding:4px 6px 18px;}
  .brand-mark{width:32px;height:32px;border-radius:9px;background:var(--primary);display:flex;align-items:center;justify-content:center;color:#fff;flex-shrink:0;}
  .brand-name{font-size:16px;font-weight:700;color:var(--graphite);letter-spacing:-.2px;}
  .env-selector{display:flex;align-items:center;gap:6px;margin:0 6px 20px;padding:8px 10px;border-radius:var(--radius-input);
    border:1px solid var(--border);background:var(--bg);font-size:12px;font-weight:600;color:var(--slate);cursor:pointer;width:calc(100% - 12px);}
  .env-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
  .sidebar-section{margin-bottom:18px;}
  .sidebar-section-title{font-size:11px;font-weight:700;color:var(--stone);text-transform:uppercase;letter-spacing:.5px;padding:0 10px 8px;}
  .sidebar-link{display:flex;align-items:center;gap:10px;padding:9px 10px;border-radius:8px;font-size:13.5px;font-weight:500;
    color:var(--graphite);cursor:pointer;border:none;background:transparent;width:100%;text-align:left;line-height:1.35;margin-bottom:2px;}
  .sidebar-link:hover{background:var(--bg);}
  .sidebar-link.active{background:#101010;color:#fff;}
  .sidebar-link.active svg{color:#fff;}
  .sidebar-link svg{width:16px;height:16px;flex-shrink:0;color:var(--slate);}
  .sidebar-foot{margin-top:auto;padding:12px 10px;border-top:1px solid var(--border);display:flex;align-items:center;gap:10px;}
  .avatar-mini{width:30px;height:30px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--secondary));flex-shrink:0;}
  .foot-name{font-size:12.5px;font-weight:600;color:var(--graphite);}
  .foot-role{font-size:11px;color:var(--slate);}

  .main-wrap{margin-left:246px;flex:1;min-width:0;width:calc(100% - 246px);min-height:100vh;padding:28px 36px 60px;}

  .page-header{margin-bottom:22px;}
  .page-title-row{display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap;}
  .page-title{font-size:34px;font-weight:700;color:var(--graphite);letter-spacing:-.5px;margin:0;}
  .page-desc{font-size:13.5px;color:var(--slate);margin-top:6px;max-width:560px;line-height:1.5;}
  .page-actions{display:flex;gap:8px;}
  .btn-primary,.btn-secondary,.btn-ghost{border-radius:var(--radius-pill);padding:9px 18px;font-size:13.5px;font-weight:600;
    cursor:pointer;border:none;display:inline-flex;align-items:center;gap:6px;transition:transform .15s,box-shadow .15s;}
  .btn-primary{background:var(--primary);color:#fff;}
  .btn-primary:hover{box-shadow:var(--shadow-hover);transform:translateY(-1px);}
  .btn-secondary{background:var(--surface);color:var(--graphite);border:1px solid var(--border);}
  .btn-secondary:hover{background:var(--bg);}
  .btn-ghost{background:transparent;color:var(--slate);padding:6px 10px;}
  .page-meta{font-size:12px;color:var(--stone);margin-top:10px;display:flex;align-items:center;gap:6px;}

  .status-strip{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:20px;}
  .status-pill{flex:1;min-width:190px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-card);
    padding:14px 16px;display:flex;align-items:center;justify-content:space-between;box-shadow:var(--shadow-card);
    transition:transform .15s,box-shadow .15s;}
  .status-pill:hover{transform:translateY(-2px);box-shadow:var(--shadow-hover);}
  .status-pill-label{font-size:11.5px;color:var(--slate);font-weight:600;margin-bottom:5px;}
  .status-pill-value{font-size:22px;font-weight:700;color:var(--graphite);letter-spacing:-.3px;}
  .status-pill-delta{font-size:11.5px;font-weight:600;margin-top:3px;display:flex;align-items:center;gap:3px;}
  .status-pill-delta.positive{color:var(--success);}
  .status-pill-delta.negative{color:var(--danger);}
  .live-dot{width:8px;height:8px;border-radius:50%;background:var(--accent);animation:pulseDot 1.8s infinite;flex-shrink:0;}

  .command-grid{display:grid;grid-template-columns:2.1fr 1fr;gap:16px;align-items:start;}
  @media(max-width:1100px){.command-grid{grid-template-columns:1fr;}}

  .panel{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-card);box-shadow:var(--shadow-card);}
  .panel-head{display:flex;align-items:center;justify-content:space-between;padding:16px 18px;border-bottom:1px solid var(--border);}
  .panel-title{font-size:14.5px;font-weight:700;color:var(--graphite);display:flex;align-items:center;gap:8px;}
  .panel-title svg{width:16px;height:16px;color:var(--secondary);}

  .log-stream{max-height:430px;overflow-y:auto;padding:6px 0;}
  .log-entry{display:flex;gap:12px;padding:11px 18px;border-bottom:1px solid #f4f4f5;animation:rowIn .25s ease;}
  .log-entry:last-child{border-bottom:none;}
  .log-icon{width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
  .log-icon svg{width:15px;height:15px;}
  .log-icon.ok{background:var(--success-bg);color:var(--success);}
  .log-icon.deny{background:var(--danger-bg);color:var(--danger);}
  .log-icon.wait{background:var(--info-bg);color:var(--secondary);}
  .log-body{flex:1;min-width:0;}
  .log-top{display:flex;justify-content:space-between;gap:8px;}
  .log-cmd{font-size:13px;font-weight:600;color:var(--graphite);}
  .log-time{font-size:11px;color:var(--stone);white-space:nowrap;}
  .log-detail{font-size:12px;color:var(--slate);margin-top:2px;}
  .role-tag{font-size:10px;font-weight:700;padding:1px 7px;border-radius:var(--radius-pill);margin-left:6px;}
  .role-tag.admin{background:#101010;color:#fff;}
  .role-tag.user{background:var(--bg);color:var(--slate);}

  .priority-rail{display:flex;flex-direction:column;gap:10px;}
  .priority-item{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 14px;cursor:pointer;
    transition:transform .15s,box-shadow .15s;text-align:left;width:100%;}
  .priority-item:hover{transform:translateY(-2px);box-shadow:var(--shadow-hover);}
  .priority-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;}
  .priority-label{font-size:12.5px;font-weight:700;color:var(--graphite);}
  .priority-badge{font-size:10.5px;font-weight:700;padding:2px 8px;border-radius:var(--radius-pill);}
  .priority-desc{font-size:11.5px;color:var(--slate);}
  .priority-wait{font-size:11px;color:var(--warning);font-weight:600;margin-top:6px;}

  .secondary-row{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-top:16px;}
  @media(max-width:1100px){.secondary-row{grid-template-columns:1fr;}}
  .widget-body{padding:16px 18px 18px;}
  .donut-wrap{display:flex;align-items:center;gap:18px;}
  .donut-legend{flex:1;display:flex;flex-direction:column;gap:8px;}
  .legend-row{display:flex;align-items:center;justify-content:space-between;font-size:12px;color:var(--slate);}
  .legend-dot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:7px;}
  .chain-bar-row{display:flex;align-items:center;gap:10px;margin-bottom:12px;}
  .chain-bar-row:last-child{margin-bottom:0;}
  .chain-name{font-size:12px;font-weight:600;color:var(--graphite);width:64px;flex-shrink:0;}
  .chain-bar-track{flex:1;height:8px;background:var(--bg);border-radius:8px;overflow:hidden;}
  .chain-bar-fill{height:100%;border-radius:8px;}
  .chain-value{font-size:11.5px;color:var(--slate);width:52px;text-align:right;flex-shrink:0;}

  .tab-bar{display:flex;gap:4px;padding:14px 18px 0;border-bottom:1px solid var(--border);}
  .tab{background:transparent;border:none;padding:9px 4px;margin-right:18px;font-size:13.5px;font-weight:600;color:var(--slate);
    cursor:pointer;border-bottom:2px solid transparent;}
  .tab.active{color:var(--graphite);border-bottom-color:var(--primary);}
  .data-toolbar{display:flex;gap:8px;align-items:center;padding:14px 18px;flex-wrap:wrap;}
  .search-input{flex:1;min-width:180px;padding:8px 12px;border-radius:var(--radius-input);border:1px solid var(--border);
    font-size:13px;background:var(--bg);}
  .filter-chip{padding:7px 13px;border-radius:var(--radius-pill);border:1px solid var(--border);background:var(--surface);
    font-size:12px;font-weight:600;color:var(--slate);cursor:pointer;}
  .filter-chip.active{background:var(--primary);color:#fff;border-color:var(--primary);}
  .export-btn{margin-left:auto;padding:8px 14px;border-radius:var(--radius-pill);border:1px solid var(--border);
    background:var(--surface);font-size:12.5px;font-weight:600;color:var(--graphite);cursor:pointer;display:flex;align-items:center;gap:6px;}

  .data-table-wrap{overflow-x:auto;}
  .data-table{width:100%;border-collapse:collapse;font-size:13px;}
  .data-table thead th{text-align:left;font-size:11px;font-weight:700;color:var(--stone);text-transform:uppercase;
    letter-spacing:.4px;padding:10px 18px;border-bottom:1px solid var(--border);white-space:nowrap;}
  .data-table tbody td{padding:13px 18px;border-bottom:1px solid #f4f4f5;color:var(--graphite);white-space:nowrap;}
  .data-table tbody tr{cursor:pointer;transition:background .12s;}
  .data-table tbody tr:hover{background:var(--bg);}
  .mono{font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:12px;color:var(--slate);}
  .badge{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:700;padding:3px 9px;border-radius:6px;}
  .badge.success{background:var(--success-bg);color:var(--success);}
  .badge.warning{background:var(--warning-bg);color:var(--warning);}
  .badge.danger{background:var(--danger-bg);color:var(--danger);}
  .badge.info{background:var(--info-bg);color:var(--secondary);}
  .conf-ring{width:26px;height:26px;flex-shrink:0;}
  .more-btn{background:transparent;border:none;color:var(--stone);cursor:pointer;padding:4px;border-radius:6px;}
  .more-btn:hover{background:var(--bg);}

  .card-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));gap:14px;padding:18px;}
  .gc-card{border:1px solid var(--border);border-radius:12px;padding:16px;cursor:pointer;transition:transform .15s,box-shadow .15s;background:var(--surface);}
  .gc-card:hover{transform:translateY(-3px);box-shadow:var(--shadow-hover);}
  .gc-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px;}
  .gc-code{font-family:ui-monospace,monospace;font-size:13px;font-weight:700;color:var(--graphite);}
  .gc-issuer{font-size:12px;color:var(--slate);margin-top:3px;}
  .gc-balance{font-size:19px;font-weight:700;color:var(--graphite);margin:8px 0 4px;}
  .gc-time{font-size:11px;color:var(--stone);}

  .modal-overlay,.drawer-overlay{position:fixed;inset:0;background:rgba(16,16,16,.42);z-index:100;display:flex;
    align-items:center;justify-content:center;animation:overlayIn .18s ease;}
  .drawer-overlay{justify-content:flex-end;}
  .modal{background:var(--surface);border-radius:16px;width:480px;max-width:92vw;max-height:86vh;overflow-y:auto;
    animation:fadeInScale .2s ease;box-shadow:0 20px 50px rgba(16,16,16,.25);}
  .drawer{background:var(--surface);width:420px;max-width:92vw;height:100%;overflow-y:auto;animation:slideInRight .25s ease;
    box-shadow:-8px 0 30px rgba(16,16,16,.15);}
  .modal-head,.drawer-head{display:flex;justify-content:space-between;align-items:center;padding:18px 22px;border-bottom:1px solid var(--border);
    position:sticky;top:0;background:var(--surface);}
  .modal-head h3,.drawer-head h3{font-size:16px;font-weight:700;color:var(--graphite);margin:0;}
  .close-btn{background:var(--bg);border:none;width:30px;height:30px;border-radius:50%;display:flex;align-items:center;
    justify-content:center;cursor:pointer;color:var(--slate);flex-shrink:0;}
  .modal-body,.drawer-body{padding:20px 22px;}
  .detail-row{display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid #f4f4f5;font-size:13px;}
  .detail-row:last-child{border-bottom:none;}
  .detail-label{color:var(--slate);}
  .detail-value{color:var(--graphite);font-weight:600;}
  .field-group{margin-bottom:16px;}
  .field-label{font-size:12.5px;font-weight:600;color:var(--graphite);margin-bottom:6px;display:block;}
  .field-textarea{width:100%;border:1px solid var(--border);border-radius:var(--radius-input);padding:10px 12px;font-size:13px;
    resize:vertical;min-height:96px;background:var(--bg);}
  .field-slider{width:100%;}
  .modal-foot,.drawer-foot{display:flex;gap:8px;padding:16px 22px;border-top:1px solid var(--border);justify-content:flex-end;
    position:sticky;bottom:0;background:var(--surface);}
  .explorer-link{display:inline-flex;align-items:center;gap:5px;font-size:12.5px;color:var(--secondary);font-weight:600;
    text-decoration:none;margin-top:10px;}

  .toast-container{position:fixed;bottom:24px;right:24px;z-index:200;display:flex;flex-direction:column;gap:8px;}
  .toast{background:var(--primary);color:#fff;padding:12px 18px;border-radius:10px;font-size:13px;font-weight:600;
    display:flex;align-items:center;gap:8px;animation:toastIn .25s ease;box-shadow:0 10px 24px rgba(16,16,16,.25);}
  .toast svg{width:15px;height:15px;color:var(--accent);}

  .empty-state{padding:40px 18px;text-align:center;color:var(--slate);font-size:13px;}
</style>
</head>

/* ---------- small components ---------- */
function Icon({ name, className }){
  return <i data-lucide={name} className={className}></i>;
}

function Sparkline({ data, color, w=64, h=26 }){
  const max = Math.max(...data), min = Math.min(...data);
  const pts = data.map((v,i)=>{
    const x = (i/(data.length-1))*w;
    const y = h - ((v-min)/(max-min||1))*h;
    return x.toFixed(1)+","+y.toFixed(1);
  }).join(" ");
  return (
    <svg width={w} height={h} viewBox={"0 0 "+w+" "+h}>
      <polyline points={pts} fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/>
    </svg>
  );
}

function Donut({ segments, size=104 }){
  const total = segments.reduce((s,x)=>s+x.value,0);
  let acc = 0;
  const r = size/2 - 10;
  const c = size/2;
  const circ = 2*Math.PI*r;
  return (
    <svg width={size} height={size} viewBox={"0 0 "+size+" "+size}>
      {segments.map((s,i)=>{
        const frac = s.value/total;
        const dash = frac*circ;
        const offset = circ - (acc*circ);
        acc += frac;
        return <circle key={i} cx={c} cy={c} r={r} fill="none" stroke={s.color} strokeWidth="14"
          strokeDasharray={dash+" "+(circ-dash)} strokeDashoffset={-((acc-frac)*circ)}
          transform={"rotate(-90 "+c+" "+c+")"} strokeLinecap="butt"/>;
      })}
      <text x={c} y={c+5} textAnchor="middle" fontSize="17" fontWeight="700" fill="#242424">{total}</text>
    </svg>
  );
}

function ConfRing({ conf, min }){
  const pct = Math.min(1, conf/min);
  const r = 10, circ = 2*Math.PI*r;
  const color = pct>=1 ? "#16a34a" : pct>0.4 ? "#0099ff" : "#d97706";
  return (
    <svg className="conf-ring" viewBox="0 0 26 26">
      <circle cx="13" cy="13" r={r} fill="none" stroke="#e5e7eb" strokeWidth="3"/>
      <circle cx="13" cy="13" r={r} fill="none" stroke={color} strokeWidth="3" strokeLinecap="round"
        strokeDasharray={circ} strokeDashoffset={circ*(1-pct)} transform="rotate(-90 13 13)"/>
    </svg>
  );
}

function StatusBadge({ status }){
  const map = {
    confirmed:{ t:"확정", c:"success" }, pending:{ t:"대기중", c:"info" }, failed:{ t:"실패", c:"danger" },
    valid:{ t:"유효", c:"success" }, used:{ t:"사용됨", c:"info" }, expired:{ t:"만료", c:"danger" }, insufficient:{ t:"잔액부족", c:"warning" },
    "auto-sent":{ t:"자동송금완료", c:"success" }, "manual-review":{ t:"수동승인대기", c:"warning" },
  };
  const m = map[status] || { t:status, c:"info" };
  return <span className={"badge "+m.c}>{m.t}</span>;
}

function Toast({ toasts }){
  return (
    <div className="toast-container">
      {toasts.map(t=>(
        <div className="toast" key={t.id}><Icon name="check-circle"/>{t.text}</div>

    </div>
  );
}

  function openPayout(p){ setDrawer({ type:"payout", data:p }); }
  function closeDrawer(){ setDrawer(null); }
  function closeModal(){ setModal(null); }

  function handleExport(){
    if(exporting) return;
    setExporting(true);
    setTimeout(()=>{ setExporting(false); pushToast("트랜잭션 리포트를 CSV로 내보냈습니다"); }, 1400);
  }

  function handleBulkSubmit(codes){
    const list = codes.split("\n").map(s=>s.trim()).filter(Boolean);
    if(list.length===0) return;
    const statuses = ["valid","used","expired","insufficient"];
    const added = list.slice(0,6).map((code,i)=>({
      id:"gnew"+Date.now()+i, code: code.slice(0,16) || ("GC-"+randHex(6).toUpperCase()),
      issuer: GC_ISSUERS[i%GC_ISSUERS.length], status: statuses[i%statuses.length],
      balance: statuses[i%statuses.length]==="valid" ? "40,000원" : "0원", time:"방금 전",
    }));
    setGC(g=>[...added, ...g]);
    setModal(null);
    pushToast(list.length+"건 상품권 일괄 조회를 완료했습니다");
  }

  const navGroups = [
    { title:"관제", items:[
      { key:"main", label:"텔레그램 봇 명령어 & 권한 관리", icon:"bot" },
      { key:"transactions", label:"트랜잭션 모니터링", icon:"activity" },
    ]},
    { title:"처리", items:[
      { key:"giftcards", label:"상품권 진위 조회", icon:"ticket" },
      { key:"payouts", label:"가상자산 자동 송금", icon:"send" },
    ]},
  ];

  return (
    <div className="app-shell" data-archetype="stripe-multipane">
      <aside className="sidebar" data-sidebar>
        <div className="sidebar-brand">
          <div className="brand-mark"><Icon name="shield-check" className="w-4 h-4"/></div>
          <div className="brand-name">베리게이트</div>
        </div>
        <button className="env-selector" onClick={()=>setEnv(env==="production"?"staging":"production")}>
          <span className="env-dot" style={{background: env==="production" ? "#3ad98a" : "#d97706"}}></span>
          {env==="production" ? "Production" : "Staging"}
          <Icon name="chevron-down" className="w-3 h-3" style={{marginLeft:"auto"}}/>
        </button>
        {navGroups.map(g=>(
          <div className="sidebar-section" key={g.title}>
            <div className="sidebar-section-title">{g.title}</div>
            {g.items.map(it=>(
              <button key={it.key} className={"sidebar-link "+(screen===it.key?"active":"")} onClick={()=>setScreen(it.key)}>
                <Icon name={it.icon}/>{it.label}
              </button>
            ))}
          </div>
        ))}
        <div className="sidebar-foot">
          <div className="avatar-mini"></div>
          <div><div className="foot-name">김운영</div><div className="foot-role">시스템 관리자</div></div>
        </div>
      </aside>

      <main className="main-wrap">
        {screen==="main" && <MainScreen setScreen={setScreen} botLog={botLog}/>}
        {screen==="transactions" && <TransactionsScreen tx={tx} openTx={openTx} period={period} setPeriod={setPeriod} exporting={exporting} onExport={handleExport}/>}
        {screen==="giftcards" && <GiftcardsScreen gc={gc} openGC={openGC} onBulkOpen={()=>setModal({type:"bulk"})}/>}
        {screen==="payouts" && <PayoutsScreen payouts={payouts} openPayout={openPayout} onCapSettings={()=>setModal({type:"cap"})}/>}
      </main>

      {drawer && drawer.type==="tx" && (
        <div className="drawer-overlay" onClick={closeDrawer}>
          <div className="drawer" onClick={e=>e.stopPropagation()}>
            <div className="drawer-head"><h3>트랜잭션 상세</h3><button className="close-btn" onClick={closeDrawer}><Icon name="x" className="w-4 h-4"/></button></div>
            <div className="drawer-body">
              <div className="detail-row"><span className="detail-label">해시</span><span className="detail-value mono">{shortHash(drawer.data.hash)}</span></div>
              <div className="detail-row"><span className="detail-label">지갑 주소</span><span className="detail-value mono">{shortAddr(drawer.data.wallet)}</span></div>
              <div className="detail-row"><span className="detail-label">체인</span><span className="detail-value">{drawer.data.chain}</span></div>
              <div className="detail-row"><span className="detail-label">금액</span><span className="detail-value">{drawer.data.amount} ({drawer.data.krw})</span></div>
              <div className="detail-row"><span className="detail-label">컨펌</span><span className="detail-value">{drawer.data.conf} / {drawer.data.min}</span></div>
              <div className="detail-row"><span className="detail-label">상태</span><span className="detail-value"><StatusBadge status={drawer.data.status}/></span></div>
              <a className="explorer-link" href="#" onClick={e=>e.preventDefault()}><Icon name="external-link" className="w-3.5 h-3.5"/> 블록 탐색기에서 보기</a>
            </div>
          </div>
        </div>
      )}

      {drawer && drawer.type==="gc" && (
        <div className="drawer-overlay" onClick={closeDrawer}>
          <div className="drawer" onClick={e=>e.stopPropagation()}>
            <div className="drawer-head"><h3>상품권 상세</h3><button className="close-btn" onClick={closeDrawer}><Icon name="x" className="w-4 h-4"/></button></div>
            <div className="drawer-body">
              <div className="detail-row"><span className="detail-label">번호</span><span className="detail-value mono">{drawer.data.code}</span></div>
              <div className="detail-row"><span className="detail-label">발행처</span><span className="detail-value">{drawer.data.issuer}</span></div>
              <div className="detail-row"><span className="detail-label">잔액</span><span className="detail-value">{drawer.data.balance}</span></div>
              <div className="detail-row"><span className="detail-label">상태</span><span className="detail-value"><StatusBadge status={drawer.data.status}/></span></div>
              <div className="detail-row"><span className="detail-label">조회 이력</span><span className="detail-value">{drawer.data.time}</span></div>
            </div>
            <div className="drawer-foot"><button className="btn-secondary" onClick={closeDrawer}>닫기</button><button className="btn-primary" onClick={()=>{closeDrawer(); pushToast("재조회를 완료했습니다");}}><Icon name="refresh-cw" className="w-3.5 h-3.5"/> 재조회</button></div>
          </div>
        </div>
      )}

      {drawer && drawer.type==="payout" && (
        <div className="drawer-overlay" onClick={closeDrawer}>
          <div className="drawer" onClick={e=>e.stopPropagation()}>
            <div className="drawer-head"><h3>송금 상세</h3><button className="close-btn" onClick={closeDrawer}><Icon name="x" className="w-4 h-4"/></button></div>
            <div className="drawer-body">
              <div className="detail-row"><span className="detail-label">지갑 주소</span><span className="detail-value mono">{shortAddr(drawer.data.wallet)}</span></div>
              <div className="detail-row"><span className="detail-label">금액</span><span className="detail-value">{drawer.data.amount}</span></div>
              <div className="detail-row"><span className="detail-label">체인</span><span className="detail-value">{drawer.data.chain}</span></div>
              <div className="detail-row"><span className="detail-label">상태</span><span className="detail-value"><StatusBadge status={drawer.data.status}/></span></div>
              {drawer.data.reason && <div className="detail-row"><span className="detail-label">사유</span><span className="detail-value">{drawer.data.reason}</span></div>}
            </div>
            <div className="drawer-foot">
              <button className="btn-secondary" onClick={closeDrawer}>닫기</button>
              {drawer.data.status==="manual-review" && <button className="btn-primary" onClick={()=>{closeDrawer(); pushToast("수동 승인 처리되어 송금이 시작되었습니다");}}><Icon name="check" className="w-3.5 h-3.5"/> 승인 후 송금</button>}
              {drawer.data.status==="failed" && <button className="btn-primary" onClick={()=>{closeDrawer(); pushToast("재처리 큐에 등록되었습니다");}}><Icon name="rotate-cw" className="w-3.5 h-3.5"/> 재처리</button>}
            </div>
          </div>
        </div>
      )}

      {modal && modal.type==="bulk" && (
        <div className="modal-overlay" onClick={closeModal}>
          <div className="modal" onClick={e=>e.stopPropagation()}>
            <div className="modal-head"><h3>상품권 일괄 조회</h3><button className="close-btn" onClick={closeModal}><Icon name="x" className="w-4 h-4"/></button></div>
            <div className="modal-body">
              <div className="field-group">
                <label className="field-label">상품권 번호 (줄바꿈으로 구분)</label>
                <textarea id="bulk-codes" className="field-textarea" placeholder={"GC-1023-AB33CD\nGC-4456-XZ90PL"}></textarea>
              </div>
            </div>
            <div className="modal-foot">
              <button className="btn-secondary" onClick={closeModal}>취소</button>
              <button className="btn-primary" onClick={()=>handleBulkSubmit(document.getElementById("bulk-codes").value)}><Icon name="search" className="w-3.5 h-3.5"/> 조회 실행</button>
            </div>
          </div>
        </div>
      )}

      {modal && modal.type==="cap" && (
        <div className="modal-overlay" onClick={closeModal}>
          <div className="modal" onClick={e=>e.stopPropagation()}>
            <div className="modal-head"><h3>송금 상한 설정</h3><button className="close-btn" onClick={closeModal}><Icon name="x" className="w-4 h-4"/></button></div>
            <div className="modal-body">
              <div className="field-group">
                <label className="field-label">건당 자동 송금 상한: {capValue.toFixed(1)} ETH</label>
                <input className="field-slider" type="range" min="0.1" max="3" step="0.1" value={capValue} onChange={e=>setCapValue(parseFloat(e.target.value))}/>
              </div>
              <p style={{fontSize:12.5,color:"#6b7280",lineHeight:1.5}}>상한을 초과하는 송금 건은 자동 처리가 차단되고 수동 승인 대기 상태로 전환됩니다.</p>
            </div>
            <div className="modal-foot">
              <button className="btn-secondary" onClick={closeModal}>취소</button>
              <button className="btn-primary" onClick={()=>{closeModal(); pushToast("송금 상한이 "+capValue.toFixed(1)+" ETH로 저장되었습니다");}}><Icon name="check" className="w-3.5 h-3.5"/> 저장</button>
            </div>
          </div>
        </div>
      )}

      <Toast toasts={toasts}/>
      <style>{`.spin{animation:spin 1s linear infinite;} @keyframes spin{to{transform:rotate(360deg);}}`}</style>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
