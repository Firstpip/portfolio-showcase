<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>플로우볼트 허브 — 가상자산 상품권 오케스트레이션 데모</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css">
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://unpkg.com/prop-types@15/prop-types.min.js"></script>
<script src="https://unpkg.com/react-is@18/umd/react-is.production.min.js"></script>
<script src="https://unpkg.com/recharts@2/umd/Recharts.js"></script>
<link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/regular/style.css">
<link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/fill/style.css">
<style>
  :root{
    --primary:#5683da; --secondary:#d1d1d1; --accent:#ff8964;
    --bg:#111111; --surface:#1c1d21; --glass:rgba(255,255,255,.045); --glass-border:rgba(255,255,255,.09);
    --text:#ffffff; --text-secondary:#95979e; --text-tertiary:#6b6c6d;
    --success:#34d399; --success-bg:rgba(52,211,153,.12); --warning:#fbbf24; --warning-bg:rgba(251,191,36,.12);
    --danger:#f87171; --danger-bg:rgba(248,113,113,.12); --info:#5683da; --info-bg:rgba(86,131,218,.14);
    --radius-pill:9999px; --radius-card:18px; --radius-input:10px;
    --shadow-elevated:0 12px 28px rgba(0,0,0,.45); --shadow-glow:0 0 0 1px rgba(86,131,218,.35),0 8px 24px rgba(86,131,218,.18);
  }
  *{box-sizing:border-box;}
  html,body{width:100%;margin:0;padding:0;background:var(--bg);}
  body{font-family:'Pretendard',ui-sans-serif,system-ui,sans-serif;color:var(--text);-webkit-font-smoothing:antialiased;}
  button,input,textarea,select{font-family:inherit;}
  ::-webkit-scrollbar{height:9px;width:9px;}
  ::-webkit-scrollbar-thumb{background:#3a3b40;border-radius:8px;}

  @keyframes fadeInScale{from{opacity:0;transform:scale(.95);}to{opacity:1;transform:scale(1);}}
  @keyframes slideInRight{from{transform:translateX(100%);}to{transform:translateX(0);}}
  @keyframes pulseGlow{0%{box-shadow:0 0 0 0 rgba(255,137,100,.55);}70%{box-shadow:0 0 0 9px rgba(255,137,100,0);}100%{box-shadow:0 0 0 0 rgba(255,137,100,0);}}
  @keyframes toastIn{from{opacity:0;transform:translateY(14px);}to{opacity:1;transform:translateY(0);}}
  @keyframes cardIn{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
  @keyframes overlayIn{from{opacity:0;}to{opacity:1;}}
  @keyframes auroraShift{0%{background-position:0% 50%;}50%{background-position:100% 50%;}100%{background-position:0% 50%;}}

  .app-shell{width:100%;min-height:100vh;display:flex;flex-direction:column;}

  .topnav{position:sticky;top:0;z-index:30;width:100%;height:64px;display:flex;align-items:center;gap:28px;
    padding:0 32px;background:rgba(17,17,17,.82);backdrop-filter:blur(14px);border-bottom:1px solid var(--glass-border);}
  .topnav-brand{display:flex;align-items:center;gap:10px;flex-shrink:0;}
  .brand-mark{width:30px;height:30px;border-radius:9px;background:linear-gradient(135deg,var(--primary),var(--accent));
    background-size:220% 220%;animation:auroraShift 7s ease infinite;
    display:flex;align-items:center;justify-content:center;flex-shrink:0;}
  .brand-name{font-size:15px;font-weight:700;letter-spacing:-.2px;}
  .topnav-links{display:flex;gap:4px;flex:1;overflow-x:auto;}
  .topnav-link{background:transparent;border:none;color:var(--text-secondary);font-size:13.5px;font-weight:600;
    padding:9px 14px;border-radius:var(--radius-pill);cursor:pointer;white-space:nowrap;display:flex;align-items:center;gap:7px;
    transition:background .15s,color .15s;}
  .topnav-link:hover{color:var(--text);background:var(--glass);}
  .topnav-link.active{color:#fff;background:var(--primary);}
  .topnav-right{display:flex;align-items:center;gap:12px;flex-shrink:0;}
  .env-badge{display:flex;align-items:center;gap:6px;padding:7px 12px;border-radius:var(--radius-pill);
    background:var(--glass);border:1px solid var(--glass-border);font-size:11.5px;font-weight:700;color:var(--text-secondary);cursor:pointer;}
  .env-dot{width:7px;height:7px;border-radius:50%;background:var(--success);animation:pulseGlow 2s infinite;}
  .avatar-mini{width:30px;height:30px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--primary));flex-shrink:0;}

  .main-wrap{flex:1;width:100%;padding:28px 32px 64px;max-width:1440px;margin:0 auto;}

  .page-header{margin-bottom:20px;}
  .page-title-row{display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap;}
  .page-title{font-size:42px;font-weight:700;letter-spacing:-.7px;margin:0;}
  .page-desc{font-size:13.5px;color:var(--text-secondary);margin-top:6px;max-width:580px;line-height:1.55;}
  .page-actions{display:flex;gap:8px;}
  .btn-primary,.btn-secondary,.btn-ghost{border-radius:var(--radius-pill);padding:10px 20px;font-size:13.5px;font-weight:600;
    cursor:pointer;border:none;display:inline-flex;align-items:center;gap:7px;transition:transform .15s,box-shadow .15s,background .15s;}
  .btn-primary{background:var(--primary);color:#fff;}
  .btn-primary:hover{box-shadow:var(--shadow-glow);transform:translateY(-1px);}
  .btn-secondary{background:var(--glass);color:var(--text);border:1px solid var(--glass-border);}
  .btn-secondary:hover{background:rgba(255,255,255,.08);}
  .btn-accent{background:var(--accent);color:#1a0e08;}

  .glass-card{background:var(--glass);border:1px solid var(--glass-border);border-radius:var(--radius-card);
    backdrop-filter:blur(10px);box-shadow:var(--shadow-elevated);}

  .stat-row{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:20px;}
  .stat-tile{flex:1;min-width:200px;padding:16px 18px;transition:transform .15s,box-shadow .15s,border-color .15s;}
  .stat-tile:hover{transform:scale(1.02);border-color:rgba(86,131,218,.5);}
  .stat-tile-label{font-size:11.5px;color:var(--text-secondary);font-weight:600;margin-bottom:6px;}
  .stat-tile-value{font-size:26px;font-weight:700;letter-spacing:-.3px;}
  .stat-tile-delta{font-size:11.5px;font-weight:600;margin-top:4px;}
  .stat-tile-delta.up{color:var(--success);}
  .stat-tile-delta.down{color:var(--danger);}

  /* --- kanban --- */
  .board-header{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:16px;flex-wrap:wrap;}
  .board-title{font-size:15px;font-weight:700;display:flex;align-items:center;gap:8px;}
  .board-actions{display:flex;gap:8px;}
  .board{display:flex;gap:16px;overflow-x:auto;padding-bottom:10px;}
  .column{flex:0 0 288px;width:288px;background:rgba(255,255,255,.025);border:1px solid var(--glass-border);
    border-radius:16px;padding:12px;display:flex;flex-direction:column;gap:10px;max-height:640px;}
  .col-header{display:flex;align-items:center;justify-content:space-between;padding:4px 6px 6px;font-size:13px;font-weight:700;}
  .count{background:rgba(255,255,255,.08);color:var(--text-secondary);font-size:11px;font-weight:700;
    padding:2px 9px;border-radius:var(--radius-pill);}
  .col-scroll{display:flex;flex-direction:column;gap:10px;overflow-y:auto;padding-right:2px;}
  .card{background:var(--surface);border:1px solid var(--glass-border);border-radius:14px;padding:13px 14px;cursor:pointer;
    animation:cardIn .3s ease;transition:transform .15s,box-shadow .15s,border-color .15s;}
  .card:hover{transform:scale(1.03);box-shadow:var(--shadow-glow);border-color:rgba(86,131,218,.4);}
  .card-title{font-size:13px;font-weight:700;color:#fff;margin-bottom:8px;}
  .card-meta{display:flex;align-items:center;justify-content:space-between;gap:8px;}
  .card-meta-left{display:flex;align-items:center;gap:6px;}
  .tag{font-size:10.5px;font-weight:700;padding:2px 8px;border-radius:var(--radius-pill);}
  .avatar{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;
    font-size:9.5px;font-weight:700;color:#fff;flex-shrink:0;}
  .priority-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
  .card-time{font-size:10.5px;color:var(--text-tertiary);margin-top:8px;}

  /* --- tables/lists --- */
  .toolbar{display:flex;gap:8px;align-items:center;padding:16px 18px;flex-wrap:wrap;border-bottom:1px solid var(--glass-border);}
  .search-input{flex:1;min-width:180px;padding:9px 13px;border-radius:var(--radius-input);border:1px solid var(--glass-border);
    font-size:13px;background:rgba(255,255,255,.04);color:#fff;}
  .search-input::placeholder{color:var(--text-tertiary);}
  .filter-chip{padding:7px 14px;border-radius:var(--radius-pill);border:1px solid var(--glass-border);background:transparent;
    font-size:12px;font-weight:600;color:var(--text-secondary);cursor:pointer;}
  .filter-chip.active{background:var(--primary);color:#fff;border-color:var(--primary);}
  .export-btn{margin-left:auto;padding:8px 15px;border-radius:var(--radius-pill);border:1px solid var(--glass-border);
    background:transparent;font-size:12.5px;font-weight:600;color:#fff;cursor:pointer;display:flex;align-items:center;gap:6px;}

  .data-table-wrap{overflow-x:auto;}
  .data-table{width:100%;border-collapse:collapse;font-size:13px;}
  .data-table thead th{text-align:left;font-size:10.5px;font-weight:700;color:var(--text-tertiary);text-transform:uppercase;
    letter-spacing:.5px;padding:11px 18px;border-bottom:1px solid var(--glass-border);white-space:nowrap;}
  .data-table tbody td{padding:13px 18px;border-bottom:1px solid rgba(255,255,255,.05);color:#fff;white-space:nowrap;}
  .data-table tbody tr{cursor:pointer;transition:background .12s;}
  .data-table tbody tr:hover{background:rgba(255,255,255,.035);}
  .mono{font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:12px;color:var(--text-secondary);}
  .badge{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:700;padding:3px 10px;border-radius:var(--radius-pill);}
  .badge.success{background:var(--success-bg);color:var(--success);}
  .badge.warning{background:var(--warning-bg);color:var(--warning);}
  .badge.danger{background:var(--danger-bg);color:var(--danger);}
  .badge.info{background:var(--info-bg);color:var(--primary);}

  .panel-head{display:flex;align-items:center;justify-content:space-between;padding:16px 18px;border-bottom:1px solid var(--glass-border);}
  .panel-title{font-size:14.5px;font-weight:700;display:flex;align-items:center;gap:8px;}
  .panel-title i{color:var(--primary);font-size:16px;}

  .grid-2{display:grid;grid-template-columns:1.5fr 1fr;gap:16px;}
  @media(max-width:1050px){.grid-2{grid-template-columns:1fr;}}
  .chart-wrap{position:relative;height:260px;padding:16px 18px 8px;}

  .risk-banner{display:flex;align-items:center;gap:12px;padding:14px 18px;border-radius:14px;margin-bottom:18px;
    background:var(--warning-bg);border:1px solid rgba(251,191,36,.3);}
  .risk-banner i{font-size:20px;color:var(--warning);flex-shrink:0;}
  .risk-banner-title{font-size:13.5px;font-weight:700;}
  .risk-banner-desc{font-size:12px;color:var(--text-secondary);margin-top:2px;}

  .wallet-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px;padding:18px;}
  .wallet-card{background:var(--surface);border:1px solid var(--glass-border);border-radius:16px;padding:16px;cursor:pointer;
    transition:transform .15s,box-shadow .15s;}
  .wallet-card:hover{transform:scale(1.03);box-shadow:var(--shadow-glow);}
  .wallet-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px;}
  .wallet-addr{font-family:ui-monospace,monospace;font-size:12.5px;font-weight:600;}
  .wallet-count{font-size:22px;font-weight:700;margin:10px 0 3px;}
  .wallet-sub{font-size:11px;color:var(--text-tertiary);}

  .modal-overlay,.drawer-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:100;display:flex;
    align-items:center;justify-content:center;animation:overlayIn .18s ease;}
  .drawer-overlay{justify-content:flex-end;}
  .modal{background:#17181c;border:1px solid var(--glass-border);border-radius:20px;width:480px;max-width:92vw;
    max-height:86vh;overflow-y:auto;animation:fadeInScale .2s ease;box-shadow:0 24px 60px rgba(0,0,0,.55);}
  .drawer{background:#17181c;border-left:1px solid var(--glass-border);width:420px;max-width:92vw;height:100%;
    overflow-y:auto;animation:slideInRight .25s ease;}
  .modal-head,.drawer-head{display:flex;justify-content:space-between;align-items:center;padding:18px 22px;
    border-bottom:1px solid var(--glass-border);position:sticky;top:0;background:#17181c;}
  .modal-head h3,.drawer-head h3{font-size:16px;font-weight:700;margin:0;color:#fff;}
  .close-btn{background:var(--glass);border:none;width:30px;height:30px;border-radius:50%;display:flex;align-items:center;
    justify-content:center;cursor:pointer;color:var(--text-secondary);flex-shrink:0;}
  .modal-body,.drawer-body{padding:20px 22px;}
  .detail-row{display:flex;justify-content:space-between;padding:11px 0;border-bottom:1px solid rgba(255,255,255,.06);font-size:13px;}
  .detail-row:last-child{border-bottom:none;}
  .detail-label{color:var(--text-secondary);}
  .detail-value{color:#fff;font-weight:600;}
  .field-group{margin-bottom:16px;}
  .field-label{font-size:12.5px;font-weight:600;margin-bottom:6px;display:block;color:#fff;}
  .field-input,.field-select{width:100%;border:1px solid var(--glass-border);border-radius:var(--radius-input);
    padding:10px 13px;font-size:13px;background:rgba(255,255,255,.04);color:#fff;}
  .modal-foot,.drawer-foot{display:flex;gap:8px;padding:16px 22px;border-top:1px solid var(--glass-border);
    justify-content:flex-end;position:sticky;bottom:0;background:#17181c;}
  .stage-track{display:flex;align-items:center;gap:4px;margin:14px 0 4px;}
  .stage-dot{flex:1;height:5px;border-radius:4px;background:rgba(255,255,255,.08);}
  .stage-dot.done{background:var(--primary);}

  .toast-container{position:fixed;bottom:24px;right:24px;z-index:200;display:flex;flex-direction:column;gap:8px;}
  .toast{background:#1c1d21;border:1px solid var(--glass-border);color:#fff;padding:12px 18px;border-radius:12px;
    font-size:13px;font-weight:600;display:flex;align-items:center;gap:8px;animation:toastIn .25s ease;box-shadow:var(--shadow-elevated);}
  .toast i{color:var(--accent);font-size:15px;}

  .empty-state{padding:40px 18px;text-align:center;color:var(--text-secondary);font-size:13px;}
  .spin{animation:spin 1s linear infinite;} @keyframes spin{to{transform:rotate(360deg);}}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useMemo } = React;
const { LineChart, Line, XAxis, YAxis, CartesianGrid, Tooltip, ResponsiveContainer, ReferenceLine } = Recharts;

function randHex(len){ let s=""; for(let i=0;i<len;i++) s+= "0123456789abcdef"[Math.floor(Math.random()*16)]; return s; }
function shortAddr(a){ return a.slice(0,6)+"…"+a.slice(-4); }

const CHAIN_COLOR = { ETH:"#5683da", BSC:"#34d399", Polygon:"#c084fc" };
const AVATAR_COLORS = ["#5683da","#ff8964","#34d399","#c084fc","#fbbf24"];

const initialWallets = [
  { id:"w1", addr:"0x9F2aE1c4b8D0e7f3Aa54"+randHex(6), chain:"ETH", count:24, sub:"최근 활동 3분 전" },
  { id:"w2", addr:"0x4Bc19dE22aF001c8bD31"+randHex(6), chain:"BSC", count:11, sub:"최근 활동 7분 전" },
  { id:"w3", addr:"0x77aC0e9F3B4d21C6ab90"+randHex(6), chain:"Polygon", count:6, sub:"최근 활동 18분 전" },
  { id:"w4", addr:"0xA912cD7Fe043b8912aE0"+randHex(6), chain:"ETH", count:9, sub:"최근 활동 24분 전" },
];

const riskData = [
  { d:"6/27", v:42 }, { d:"6/28", v:55 }, { d:"6/29", v:48 }, { d:"6/30", v:71 },
  { d:"7/1", v:63 }, { d:"7/2", v:88 }, { d:"7/3", v:76 },
];

const auditLog = [
  { id:"a1", actor:"admin_kim", action:"수동 승인", target:"0xB6E2…302cE 송금건", time:"2026-07-03 14:12" },
  { id:"a2", actor:"admin_lee", action:"송금 상한 변경", target:"1.0 ETH → 1.3 ETH", time:"2026-07-03 11:40" },
  { id:"a3", actor:"admin_kim", action:"지갑 등록", target:"0xA912…912aE0", time:"2026-07-02 22:05" },
  { id:"a4", actor:"admin_park", action:"상품권 재검증", target:"GC-9058-RT44V2", time:"2026-07-02 19:33" },
  { id:"a5", actor:"admin_kim", action:"체인 필터 설정 변경", target:"Polygon 모니터링 추가", time:"2026-07-02 15:02" },
  { id:"a6", actor:"admin_lee", action:"재처리 실행", target:"실패 송금 3건", time:"2026-07-01 20:18" },
];

function Icon({ name, className }){ return <i className={"ph "+name+(className?" "+className:"")}></i>; }
function AvatarDot({ code }){
  const idx = code.charCodeAt(0)%AVATAR_COLORS.length;
  return <div className="avatar" style={{background:AVATAR_COLORS[idx]}}>{code}</div>;
}
function PayoutBadge({ status }){
  const map = {
    valid:{t:"유효",c:"success"}, "auto-sent":{t:"자동송금완료",c:"success"}, pending:{t:"대기중",c:"info"},
    failed:{t:"실패",c:"danger"}, high:{t:"높음",c:"danger"}, medium:{t:"중간",c:"warning"}, low:{t:"낮음",c:"success"},
  };
  const m = map[status] || { t:status, c:"info" };
  return <span className={"badge "+m.c}>{m.t}</span>;
}

function Toast({ toasts }){
  return <div className="toast-container">{toasts.map(t=>(
    <div className="toast" key={t.id}><Icon name="ph-check-circle"/>{t.text}</div>
  ))}</div>;
}

/* ---------- kanban screen ---------- */
function PipelineScreen({ cards, openCard, onNewCard }){
  const [chainFilter, setChainFilter] = useState("all");
  const CHAIN_CYCLE = ["all","ETH","BSC","Polygon"];
  return (
    <div data-archetype="kanban-board">
      <div className="page-header">
        <div className="page-title-row">
          <div><h1 className="page-title">송금 승인 파이프라인</h1>
            <p className="page-desc">입금 확인부터 상품권 검증, 승인 대기, 자동 송금 완료까지 전 단계를 칸반 보드로 시각화합니다.</p></div>
        </div>
      </div>
      <div className="board-header">
        <div className="board-title"><Icon name="ph-flow-arrow"/> 오케스트레이션 보드</div>
        <div className="board-actions">
          <button className="btn-secondary" onClick={()=>setChainFilter(CHAIN_CYCLE[(CHAIN_CYCLE.indexOf(chainFilter)+1)%CHAIN_CYCLE.length])}>
            <Icon name="ph-funnel" className="ph-fill"/> {chainFilter==="all"?"체인 필터":chainFilter}</button>
          <button className="btn-primary" onClick={onNewCard}><Icon name="ph-plus"/> 새 항목</button>
        </div>
      </div>
      <div className="board">
        {STAGES.map(s=>{
          const list = cards.filter(c=>c.stage===s.key && (chainFilter==="all" || c.chain===chainFilter));
          return (
            <section className="column" key={s.key}>
              <div className="col-header"><span>{s.label}</span><span className="count">{list.length}</span></div>
              <div className="col-scroll">
                {list.length===0 && <div className="empty-state" style={{padding:"20px 6px"}}>항목 없음</div>}
                {list.map(c=>(
                  <div className="card" key={c.id} onClick={()=>openCard(c)}>
                    <div className="card-title">{c.title}</div>
                    <div className="card-meta">
                      <div className="card-meta-left">
                        <span className="tag" style={{background:CHAIN_COLOR[c.chain]+"26",color:CHAIN_COLOR[c.chain]}}>{c.chain}</span>
                        <span className="priority-dot" style={{background: c.priority==="high"?"#f87171":c.priority==="medium"?"#fbbf24":"#34d399"}}></span>
                      </div>
                      <AvatarDot code={c.assignee}/>
                    </div>
                    <div className="card-time">{c.time}</div>
                  </div>
                ))}
              </div>
            </section>
          );
        })}
      </div>
    </div>
  );
}

function WalletsScreen({ wallets, openWallet, onAddWallet }){
  const [chain, setChain] = useState("all");
  const filtered = wallets.filter(w=> chain==="all" || w.chain===chain);
  return (
    <div>
      <div className="page-header">
        <div className="page-title-row">
          <div><h1 className="page-title">다중 체인 지갑 관리</h1>
            <p className="page-desc">ETH·BSC 등 다중 체인의 지갑 주소를 등록하고 체인별 입금 현황을 통합 관리합니다.</p></div>
          <div className="page-actions"><button className="btn-primary" onClick={onAddWallet}><Icon name="ph-plus"/> 신규 지갑 등록</button></div>
        </div>
      </div>
      <div className="glass-card">
        <div className="toolbar">
          {["all","ETH","BSC","Polygon"].map(c=>(
            <button key={c} className={"filter-chip "+(chain===c?"active":"")} onClick={()=>setChain(c)}>{c==="all"?"전체":c}</button>
          ))}
        </div>
        <div className="wallet-grid">
          {filtered.map(w=>(
            <div className="wallet-card" key={w.id} onClick={()=>openWallet(w)}>
              <div className="wallet-top"><span className="wallet-addr">{shortAddr(w.addr)}</span>
                <span className="tag" style={{background:CHAIN_COLOR[w.chain]+"26",color:CHAIN_COLOR[w.chain]}}>{w.chain}</span></div>
              <div className="wallet-count">{w.count}건</div>
              <div className="wallet-sub">{w.sub}</div>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

function RiskScreen(){
  const max = Math.max(...riskData.map(d=>d.v));
  const overThreshold = riskData.filter(d=>d.v>=70).length;
  return (
    <div>
      <div className="page-header">
        <div className="page-title-row">
          <div><h1 className="page-title">리스크 분석 대시보드</h1>
            <p className="page-desc">이상 거래 패턴과 송금 상한 초과 이력을 분석해 리스크 지표로 시각화합니다.</p></div>
        </div>
      </div>
      <div className="risk-banner">
        <Icon name="ph-warning-circle" className="ph-fill"/>
        <div><div className="risk-banner-title">리스크 점수가 임계치를 초과했습니다</div>
          <div className="risk-banner-desc">최근 7일 중 {overThreshold}일 동안 송금 상한 초과 이벤트가 발생했습니다.</div></div>
      </div>
      <div className="stat-row">
        <div className="glass-card stat-tile"><div className="stat-tile-label">7일 최고 송금량</div><div className="stat-tile-value">{max}건</div><div className="stat-tile-delta up">▲ 전주 대비 +19%</div></div>
        <div className="glass-card stat-tile"><div className="stat-tile-label">임계치 초과 이벤트</div><div className="stat-tile-value">{overThreshold}건</div><div className="stat-tile-delta down">경고 수준</div></div>
        <div className="glass-card stat-tile"><div className="stat-tile-label">현재 리스크 점수</div><div className="stat-tile-value">76 / 100</div></div>
      </div>
      <div className="grid-2">
        <div className="glass-card">
          <div className="panel-head"><div className="panel-title"><Icon name="ph-chart-line"/> 일별 송금량 추이</div></div>
          <div className="chart-wrap">
            <ResponsiveContainer width="100%" height="100%">
              <LineChart data={riskData} margin={{top:10,right:16,left:-16,bottom:0}}>
                <CartesianGrid stroke="rgba(255,255,255,.06)" vertical={false}/>
                <XAxis dataKey="d" tick={{fill:"#95979e",fontSize:11}} axisLine={{stroke:"rgba(255,255,255,.1)"}} tickLine={false}/>
                <YAxis tick={{fill:"#95979e",fontSize:11}} axisLine={false} tickLine={false}/>
                <Tooltip contentStyle={{background:"#1c1d21",border:"1px solid rgba(255,255,255,.1)",borderRadius:10,fontSize:12,color:"#fff"}}/>
                <ReferenceLine y={70} stroke="#fbbf24" strokeDasharray="4 4" label={{value:"임계치",fill:"#fbbf24",fontSize:11,position:"insideTopRight"}}/>
                <Line type="monotone" dataKey="v" stroke="#5683da" strokeWidth={2.5} dot={{r:4,fill:"#5683da"}} activeDot={{r:6}}/>
              </LineChart>
            </ResponsiveContainer>
          </div>
        </div>
        <div className="glass-card">
          <div className="panel-head"><div className="panel-title"><Icon name="ph-scales"/> 체인별 리스크 비중</div></div>
          <div style={{padding:"18px"}}>
            {[{n:"ETH",v:52,c:"#5683da"},{n:"BSC",v:31,c:"#34d399"},{n:"Polygon",v:17,c:"#c084fc"}].map(c=>(
              <div key={c.n} style={{marginBottom:14}}>
                <div style={{display:"flex",justifyContent:"space-between",fontSize:12,color:"#95979e",marginBottom:5}}><span>{c.n}</span><span>{c.v}%</span></div>
                <div style={{height:7,background:"rgba(255,255,255,.06)",borderRadius:8,overflow:"hidden"}}>
                  <div style={{height:"100%",width:c.v+"%",background:c.c,borderRadius:8}}></div>
                </div>
              </div>
            ))}
          </div>
        </div>
      </div>
    </div>
  );
}

function AuditScreen({ exporting, onExport }){
  const [q,setQ] = useState("");
  const filtered = auditLog.filter(a=> !q || a.actor.toLowerCase().includes(q.toLowerCase()) || a.action.includes(q));
  return (
    <div>
      <div className="page-header">
        <div className="page-title-row">
          <div><h1 className="page-title">감사 로그 및 접근 이력</h1>
            <p className="page-desc">관리자 조작·승인·설정 변경 이력을 시간순으로 기록하고 조회합니다.</p></div>
          <div className="page-actions"><button className="btn-primary" onClick={onExport}>
            <Icon name={exporting?"ph-circle-notch spin":"ph-download-simple"}/> {exporting?"내보내는 중…":"CSV 내보내기"}</button></div>
        </div>
      </div>
      <div className="glass-card">
        <div className="toolbar">
          <input className="search-input" placeholder="행위자 또는 행위 종류 검색…" value={q} onChange={e=>setQ(e.target.value)}/>
          <button className="export-btn" onClick={onExport}><Icon name="ph-download-simple"/> 내보내기</button>
        </div>
        <div className="data-table-wrap">
          <table className="data-table">
            <thead><tr><th>행위자</th><th>행위</th><th>대상 리소스</th><th>시각</th></tr></thead>
            <tbody>
              {filtered.length===0 && <tr><td colSpan="4" className="empty-state">조건에 맞는 로그가 없습니다</td></tr>}
              {filtered.map(a=>(
                <tr key={a.id}><td>{a.actor}</td><td><span className="badge info">{a.action}</span></td><td>{a.target}</td><td className="mono">{a.time}</td></tr>
              ))}
            </tbody>
          </table>
        </div>
      </div>
    </div>
  );
}

/* ---------- app ---------- */
function App(){
  const [screen, setScreen] = useState("main");
  const [env, setEnv] = useState("production");
  const [cards, setCards] = useState(initialCards);
  const [wallets, setWallets] = useState(initialWallets);
  const [modal, setModal] = useState(null);
  const [drawer, setDrawer] = useState(null);
  const [toasts, setToasts] = useState([]);
  const [exporting, setExporting] = useState(false);

  function pushToast(text){
    const id = "t"+Date.now()+Math.random();
    setToasts(t=>[...t,{id,text}]);
    setTimeout(()=>setToasts(t=>t.filter(x=>x.id!==id)),2600);
  }

  function openCard(c){ setDrawer({ type:"card", data:c }); }
  function openWallet(w){ setDrawer({ type:"wallet", data:w }); }
  function closeDrawer(){ setDrawer(null); }
  function closeModal(){ setModal(null); }

  function advanceCard(id){
    setCards(list=>list.map(c=>{
      if(c.id!==id) return c;
      const idx = STAGES.findIndex(s=>s.key===c.stage);
      const next = STAGES[Math.min(idx+1, STAGES.length-1)].key;
      return { ...c, stage: next, time:"방금 전" };
    }));
    closeDrawer();
    pushToast("다음 단계로 이동되었습니다");
  }

  function handleNewCardSubmit(wallet, amount){
    if(!wallet || !amount) return;
    const chain = ["ETH","BSC","Polygon"][Math.floor(Math.random()*3)];
    const id = "c"+Date.now();
    setCards(list=>[{ id, stage:"pending", title: wallet.slice(0,6)+"…"+wallet.slice(-4)+" · "+amount,
      chain, assignee:["KM","LJ","PS"][Math.floor(Math.random()*3)], priority:"medium", time:"방금 전" }, ...list]);
    setModal(null);
    pushToast("파이프라인에 새 항목이 등록되었습니다");
  }

  function handleAddWallet(addr, chain){
    if(!addr || addr.length<8) { pushToast("올바른 지갑 주소 형식이 아닙니다"); return; }
    setWallets(list=>[{ id:"w"+Date.now(), addr, chain, count:0, sub:"방금 등록됨" }, ...list]);
    setModal(null);
    pushToast("신규 지갑이 등록되었습니다");
  }

  function handleExport(){
    if(exporting) return;
    setExporting(true);
    setTimeout(()=>{ setExporting(false); pushToast("감사 로그를 CSV로 내보냈습니다"); }, 1400);
  }

  const navItems = [
    { key:"main", label:"송금 승인 파이프라인", icon:"ph-flow-arrow" },
    { key:"wallets", label:"다중 체인 지갑 관리", icon:"ph-wallet" },
    { key:"risk-analysis", label:"리스크 분석 대시보드", icon:"ph-chart-line" },
    { key:"audit-log", label:"감사 로그 및 접근 이력", icon:"ph-clipboard-text" },
  ];

  return (
    <div className="app-shell">
      <header className="topnav">
        <div className="topnav-brand">
          <div className="brand-mark"><Icon name="ph-shield-check" className="ph-fill"/></div>
          <span className="brand-name">플로우볼트 허브</span>
        </div>
        <nav className="topnav-links">
          {navItems.map(it=>(
            <button key={it.key} className={"topnav-link "+(screen===it.key?"active":"")} onClick={()=>setScreen(it.key)}>
              <Icon name={it.icon}/>{it.label}
            </button>
          ))}
        </nav>
        <div className="topnav-right">
          <button className="env-badge" onClick={()=>setEnv(env==="production"?"staging":"production")}>
            <span className="env-dot" style={{background: env==="production"?"#34d399":"#fbbf24"}}></span>
            {env==="production"?"Production":"Staging"}
          </button>
          <div className="avatar-mini"></div>
        </div>
      </header>

      <main className="main-wrap">
        {screen==="main" && <PipelineScreen cards={cards} openCard={openCard} onNewCard={()=>setModal({type:"newcard"})}/>}
        {screen==="wallets" && <WalletsScreen wallets={wallets} openWallet={openWallet} onAddWallet={()=>setModal({type:"newwallet"})}/>}
        {screen==="risk-analysis" && <RiskScreen/>}
        {screen==="audit-log" && <AuditScreen exporting={exporting} onExport={handleExport}/>}
      </main>

      {drawer && drawer.type==="card" && (
        <div className="drawer-overlay" onClick={closeDrawer}>
          <div className="drawer" onClick={e=>e.stopPropagation()}>
            <div className="drawer-head"><h3>처리 항목 상세</h3><button className="close-btn" onClick={closeDrawer}><Icon name="ph-x"/></button></div>
            <div className="drawer-body">
              <div className="detail-row"><span className="detail-label">항목</span><span className="detail-value">{drawer.data.title}</span></div>
              <div className="detail-row"><span className="detail-label">체인</span><span className="detail-value">{drawer.data.chain}</span></div>
              <div className="detail-row"><span className="detail-label">담당자</span><span className="detail-value">{drawer.data.assignee}</span></div>
              <div className="detail-row"><span className="detail-label">우선순위</span><span className="detail-value"><PayoutBadge status={drawer.data.priority}/></span></div>
              <div className="detail-row"><span className="detail-label">경과 시간</span><span className="detail-value">{drawer.data.time}</span></div>
              <div className="stage-track">
                {STAGES.map((s,i)=>{
                  const curIdx = STAGES.findIndex(x=>x.key===drawer.data.stage);
                  return <div key={s.key} className={"stage-dot "+(i<=curIdx?"done":"")}></div>;
                })}
              </div>
              <div style={{fontSize:11.5,color:"#95979e",marginTop:6}}>현재 단계: {STAGES.find(s=>s.key===drawer.data.stage).label}</div>
            </div>
            <div className="drawer-foot">
              <button className="btn-secondary" onClick={closeDrawer}>닫기</button>
              {drawer.data.stage!=="done" && <button className="btn-primary" onClick={()=>advanceCard(drawer.data.id)}><Icon name="ph-arrow-right"/> 다음 단계로 이동</button>}
            </div>
          </div>
        </div>
      )}

      {drawer && drawer.type==="wallet" && (
        <div className="drawer-overlay" onClick={closeDrawer}>
          <div className="drawer" onClick={e=>e.stopPropagation()}>
            <div className="drawer-head"><h3>지갑 상세</h3><button className="close-btn" onClick={closeDrawer}><Icon name="ph-x"/></button></div>
            <div className="drawer-body">
              <div className="detail-row"><span className="detail-label">주소</span><span className="detail-value mono">{shortAddr(drawer.data.addr)}</span></div>
              <div className="detail-row"><span className="detail-label">체인</span><span className="detail-value">{drawer.data.chain}</span></div>
              <div className="detail-row"><span className="detail-label">누적 입금 건수</span><span className="detail-value">{drawer.data.count}건</span></div>
              <div className="detail-row"><span className="detail-label">최근 활동</span><span className="detail-value">{drawer.data.sub}</span></div>
            </div>
            <div className="drawer-foot"><button className="btn-secondary" onClick={closeDrawer}>닫기</button></div>
          </div>
        </div>
      )}

      {modal && modal.type==="newcard" && (
        <div className="modal-overlay" onClick={closeModal}>
          <div className="modal" onClick={e=>e.stopPropagation()}>
            <div className="modal-head"><h3>파이프라인 새 항목</h3><button className="close-btn" onClick={closeModal}><Icon name="ph-x"/></button></div>
            <div className="modal-body">
              <div className="field-group"><label className="field-label">지갑 주소</label><input id="nc-wallet" className="field-input" placeholder="0x…"/></div>
              <div className="field-group"><label className="field-label">금액</label><input id="nc-amount" className="field-input" placeholder="예: 0.5 ETH"/></div>
            </div>
            <div className="modal-foot">
              <button className="btn-secondary" onClick={closeModal}>취소</button>
              <button className="btn-primary" onClick={()=>handleNewCardSubmit(document.getElementById("nc-wallet").value, document.getElementById("nc-amount").value)}>
                <Icon name="ph-plus"/> 등록</button>
            </div>
          </div>
        </div>
      )}

      {modal && modal.type==="newwallet" && (
        <div className="modal-overlay" onClick={closeModal}>
          <div className="modal" onClick={e=>e.stopPropagation()}>
            <div className="modal-head"><h3>신규 지갑 등록</h3><button className="close-btn" onClick={closeModal}><Icon name="ph-x"/></button></div>
            <div className="modal-body">
              <div className="field-group"><label className="field-label">체인</label>
                <select id="nw-chain" className="field-select"><option>ETH</option><option>BSC</option><option>Polygon</option></select></div>
              <div className="field-group"><label className="field-label">지갑 주소</label><input id="nw-addr" className="field-input" placeholder="0x…"/></div>
            </div>
            <div className="modal-foot">
              <button className="btn-secondary" onClick={closeModal}>취소</button>
              <button className="btn-primary" onClick={()=>handleAddWallet(document.getElementById("nw-addr").value, document.getElementById("nw-chain").value)}>
                <Icon name="ph-check"/> 등록</button>
            </div>
          </div>
        </div>
      )}

      <Toast toasts={toasts}/>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
