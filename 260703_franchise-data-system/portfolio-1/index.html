<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>스토어링크 — 가맹점 정보 수집 플랫폼</title>
<link rel="preconnect" href="https://fastly.jsdelivr.net">
<link rel="stylesheet" as="style" crossorigin href="https://fastly.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<style>
:root{
  --primary:#0f3e17;
  --primary-dark:#0a2b10;
  --primary-soft:#e1f4df;
  --secondary:#333333;
  --accent:#a53ad9;
  --accent-soft:#f5e9fb;
  --bg:#fffefc;
  --surface:#ffffff;
  --surface-2:#e5e7eb;
  --border:#e2e5e0;
  --text:#000000;
  --text-2:#333333;
  --text-3:#8b9891;
  --text-muted:#b6ced5;
  --danger:#c0392b;
  --danger-soft:#fbeceb;
  --success:#1c7c3f;
  --success-soft:#e6f5ea;
  --radius-card:8px;
  --radius-pill:999px;
}
*{box-sizing:border-box;}
html,body{width:100%;margin:0;padding:0;}
body{
  font-family:'Pretendard', -apple-system, BlinkMacSystemFont, sans-serif;
  background:var(--bg);
  color:var(--text);
  -webkit-font-smoothing:antialiased;
  letter-spacing:-0.01em;
}
#app-root{width:100%;min-height:100vh;}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit;}
input,select,textarea{font-family:inherit;}
a{text-decoration:none;color:inherit;}
img{display:block;max-width:100%;}

/* ===== keyframes ===== */
@keyframes fadeInUp{from{opacity:0;transform:translateY(16px);}to{opacity:1;transform:translateY(0);}}
@keyframes rowSlideIn{from{opacity:0;transform:translateX(-10px);}to{opacity:1;transform:translateX(0);}}
@keyframes shakeError{0%,100%{transform:translateX(0);}20%{transform:translateX(-6px);}40%{transform:translateX(6px);}60%{transform:translateX(-4px);}80%{transform:translateX(4px);}}
@keyframes toastIn{from{opacity:0;transform:translate(-50%,14px);}to{opacity:1;transform:translate(-50%,0);}}
@keyframes spinRing{from{transform:rotate(0deg);}to{transform:rotate(360deg);}}

.view-fade{animation:fadeInUp .38s ease both;}
.row-in{animation:rowSlideIn .3s ease both;}
.field-error{animation:shakeError .35s ease;}

/* ===== topnav ===== */
.topnav{width:100%;background:var(--surface);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:50;}
.topnav-inner{max-width:1240px;margin:0 auto;padding:0 32px;display:flex;align-items:center;gap:28px;height:64px;}
.brand{display:flex;align-items:center;gap:9px;font-size:17px;font-weight:700;color:var(--primary);white-space:nowrap;}
.brand-badge{width:28px;height:28px;border-radius:8px;background:var(--primary);display:flex;align-items:center;justify-content:center;color:#fff;flex-shrink:0;}
.step-tabs{display:flex;align-items:stretch;gap:2px;flex:1;overflow-x:auto;scrollbar-width:none;}
.step-tabs::-webkit-scrollbar{display:none;}
.step-tab{display:flex;align-items:center;gap:7px;padding:0 16px;height:64px;font-size:13.5px;font-weight:600;color:var(--text-3);border-bottom:2px solid transparent;white-space:nowrap;transition:color .15s ease,border-color .15s ease;}
.step-tab svg{width:16px;height:16px;}
.step-tab:hover{color:var(--primary);}
.step-tab.active{color:var(--primary);border-bottom-color:var(--primary);}
.step-tab .step-num{width:19px;height:19px;border-radius:999px;background:var(--surface-2);color:var(--text-2);font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.step-tab.active .step-num{background:var(--primary);color:#fff;}
.step-tab.done .step-num{background:var(--success);color:#fff;}

/* ===== hero band ===== */
.hero-band{width:100%;background:linear-gradient(180deg,var(--primary-soft) 0%, var(--bg) 100%);border-bottom:1px solid var(--border);}
.hero-inner{max-width:1240px;margin:0 auto;padding:36px 32px 30px;display:flex;align-items:center;gap:40px;}
.hero-copy{flex:1;min-width:0;}
.hero-eyebrow{display:inline-flex;align-items:center;gap:6px;background:var(--surface);border:1px solid var(--border);color:var(--primary);font-size:12px;font-weight:700;padding:5px 12px;border-radius:999px;margin-bottom:14px;}
.hero-copy h1{font-size:40px;line-height:1.2;font-weight:700;letter-spacing:-0.02em;margin:0 0 10px;max-width:560px;}
.hero-copy p{font-size:14.5px;color:var(--text-2);max-width:480px;line-height:1.6;margin:0;}
.hero-art{width:220px;height:140px;flex-shrink:0;}

/* ===== wizard grid ===== */
.wizard-wrap{max-width:1240px;margin:0 auto;padding:32px 32px 64px;display:flex;gap:28px;align-items:flex-start;width:100%;}
.step-body{flex:1;min-width:0;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-card);padding:32px;}
.summary-side{width:300px;flex-shrink:0;display:flex;flex-direction:column;gap:16px;}

.section-title{font-size:15px;font-weight:700;margin:0 0 4px;display:flex;align-items:center;gap:8px;}
.section-title svg{width:17px;height:17px;color:var(--primary);}
.section-desc{font-size:12.5px;color:var(--text-3);margin:0 0 22px;}

.field-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px 20px;}
.field-grid.full{grid-template-columns:1fr;}
.field{display:flex;flex-direction:column;gap:6px;}
.field.span2{grid-column:1/-1;}
.field label{font-size:12.5px;font-weight:600;color:var(--text-2);}
.field label .req{color:var(--danger);margin-left:2px;}
.field input[type=text],.field input[type=email],.field input[type=tel],.field input[type=number],.field input[type=date],.field select{
  padding:10px 12px;border:1px solid var(--border);border-radius:6px;font-size:13.5px;color:var(--text);background:var(--bg);transition:border-color .15s ease,box-shadow .15s ease;
}
.field input:focus,.field select:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 3px var(--primary-soft);}
.field input.err{border-color:var(--danger);}
.field-err-msg{font-size:11.5px;color:var(--danger);display:flex;align-items:center;gap:4px;}
.field-err-msg svg{width:12px;height:12px;}
.radio-row{display:flex;gap:10px;}
.radio-pill{flex:1;padding:10px 14px;border:1px solid var(--border);border-radius:6px;font-size:13px;font-weight:600;color:var(--text-2);text-align:center;transition:all .15s ease;}
.radio-pill.active{border-color:var(--primary);background:var(--primary-soft);color:var(--primary);}

.conditional-field{grid-column:1/-1;animation:fadeInUp .3s ease both;}

.step-actions{display:flex;justify-content:space-between;margin-top:28px;padding-top:20px;border-top:1px solid var(--border);}
.btn{padding:10px 20px;border-radius:6px;font-size:13.5px;font-weight:700;display:inline-flex;align-items:center;gap:7px;transition:all .15s ease;}
.btn svg{width:15px;height:15px;}
.btn-primary{background:var(--primary);color:#fff;}
.btn-primary:hover{background:var(--primary-dark);}
.btn-primary:disabled{background:var(--text-3);cursor:not-allowed;}
.btn-ghost{background:transparent;color:var(--text-2);border:1px solid var(--border);}
.btn-ghost:hover{border-color:var(--text-2);color:var(--text);}
.btn-accent{background:var(--accent);color:#fff;}
.btn-accent:hover{background:#8c2ab5;}

/* summary card */
.summary-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-card);padding:20px;}
.summary-card h3{font-size:13px;font-weight:700;margin:0 0 14px;display:flex;align-items:center;gap:7px;}
.summary-card h3 svg{width:15px;height:15px;color:var(--accent);}
.progress-track{width:100%;height:6px;background:var(--surface-2);border-radius:999px;overflow:hidden;margin-bottom:16px;}
.progress-fill{height:100%;background:var(--primary);border-radius:999px;transition:width .4s ease;}
.checklist{list-style:none;padding:0;margin:0;display:flex;flex-direction:column;gap:10px;}
.checklist li{display:flex;align-items:center;gap:8px;font-size:12.5px;color:var(--text-2);}
.checklist li svg{width:15px;height:15px;flex-shrink:0;}
.checklist li.done{color:var(--text);}
.checklist li.done svg{color:var(--success);}
.checklist li.pending svg{color:var(--text-3);}
.help-card{background:var(--accent-soft);border:1px solid #ecd3f5;border-radius:var(--radius-card);padding:16px;font-size:12px;color:#5c2670;line-height:1.6;}
.help-card b{color:var(--accent);}
.stat-mini{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px dashed var(--border);font-size:12.5px;}
.stat-mini:last-child{border-bottom:none;}
.stat-mini strong{font-size:15px;color:var(--primary);}

/* product table */
.data-mini-table{width:100%;border-collapse:collapse;margin-bottom:14px;}
.data-mini-table th{text-align:left;font-size:11px;font-weight:700;color:var(--text-3);padding:8px 10px;border-bottom:1px solid var(--border);white-space:nowrap;}
.data-mini-table td{padding:6px 8px;border-bottom:1px solid var(--border);}
.data-mini-table td input,.data-mini-table td select{width:100%;padding:7px 8px;border:1px solid var(--border);border-radius:5px;font-size:12.5px;background:var(--bg);}
.data-mini-table td input:focus,.data-mini-table td select:focus{outline:none;border-color:var(--primary);}
.row-del{width:26px;height:26px;border-radius:6px;display:flex;align-items:center;justify-content:center;color:var(--text-3);}
.row-del:hover{background:var(--danger-soft);color:var(--danger);}
.row-del svg{width:14px;height:14px;}
.add-row-btn{display:inline-flex;align-items:center;gap:6px;padding:8px 14px;border:1px dashed var(--primary);border-radius:6px;color:var(--primary);font-size:12.5px;font-weight:700;}
.add-row-btn:hover{background:var(--primary-soft);}
.add-row-btn svg{width:13px;height:13px;}
.tax-toggle{display:flex;border:1px solid var(--border);border-radius:5px;overflow:hidden;width:fit-content;}
.tax-toggle button{padding:6px 10px;font-size:11.5px;font-weight:600;color:var(--text-2);}
.tax-toggle button.active{background:var(--primary);color:#fff;}

/* dropzone */
.dropzone{border:2px dashed var(--border);border-radius:var(--radius-card);padding:32px;text-align:center;transition:all .18s ease;margin-bottom:16px;}
.dropzone.drag{border-color:var(--accent);background:var(--accent-soft);}
.dropzone svg{width:34px;height:34px;color:var(--text-3);margin-bottom:10px;}
.dropzone p{font-size:13px;color:var(--text-2);margin:0 0 4px;}
.dropzone .hint{font-size:11.5px;color:var(--text-3);}
.dz-browse{display:inline-flex;align-items:center;gap:6px;margin-top:12px;padding:8px 16px;border-radius:6px;background:var(--primary);color:#fff;font-size:12.5px;font-weight:700;}
.file-list{display:flex;flex-direction:column;gap:8px;margin-bottom:20px;}
.file-item{display:flex;align-items:center;gap:10px;padding:10px 12px;background:var(--surface-2);border-radius:6px;font-size:12.5px;animation:rowSlideIn .3s ease both;}
.file-item svg.file-ico{width:16px;height:16px;color:var(--primary);flex-shrink:0;}
.file-item .fname{flex:1;font-weight:600;}
.file-item .fsize{color:var(--text-3);}
.file-item .fdel{width:22px;height:22px;border-radius:5px;display:flex;align-items:center;justify-content:center;color:var(--text-3);}
.file-item .fdel:hover{background:var(--danger-soft);color:var(--danger);}
.file-item .fdel svg{width:13px;height:13px;}

/* ===== admin views ===== */
.admin-wrap{max-width:1320px;margin:0 auto;padding:32px;width:100%;}
.admin-header{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:20px;flex-wrap:wrap;gap:14px;}
.admin-header h1{font-size:23px;font-weight:700;margin:0 0 4px;}
.admin-header p{font-size:12.5px;color:var(--text-3);margin:0;}
.admin-toolbar{display:flex;gap:10px;align-items:center;margin-bottom:16px;flex-wrap:wrap;}
.search-input{flex:1;min-width:220px;display:flex;align-items:center;gap:8px;padding:9px 14px;border:1px solid var(--border);border-radius:7px;background:var(--surface);}
.search-input svg{width:15px;height:15px;color:var(--text-3);}
.search-input input{border:none;outline:none;flex:1;font-size:13px;background:transparent;}
.filter-chip{padding:8px 14px;border-radius:999px;border:1px solid var(--border);background:var(--surface);font-size:12.5px;font-weight:600;color:var(--text-2);}
.filter-chip.active{background:var(--primary);border-color:var(--primary);color:#fff;}
.export-btn{margin-left:auto;display:inline-flex;align-items:center;gap:7px;padding:9px 16px;border-radius:7px;background:var(--accent);color:#fff;font-size:13px;font-weight:700;}
.export-btn:hover{background:#8c2ab5;}
.export-btn svg{width:15px;height:15px;}
.export-btn.loading svg{animation:spinRing .8s linear infinite;}

.admin-table-wrap{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-card);overflow:hidden;}
table.admin-table{width:100%;border-collapse:collapse;}
table.admin-table th{text-align:left;font-size:11.5px;font-weight:700;color:var(--text-3);padding:12px 16px;background:var(--surface-2);border-bottom:1px solid var(--border);cursor:pointer;white-space:nowrap;user-select:none;}
table.admin-table th:hover{color:var(--primary);}
table.admin-table th .sort-ico{width:11px;height:11px;display:inline-block;margin-left:4px;vertical-align:-1px;}
table.admin-table td{padding:12px 16px;font-size:12.5px;border-bottom:1px solid var(--border);color:var(--text);}
table.admin-table tbody tr{transition:background .12s ease;}
table.admin-table tbody tr:hover{background:var(--surface-2);}
table.admin-table tbody tr:last-child td{border-bottom:none;}
.badge{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:999px;font-size:11px;font-weight:700;}
.badge.wait{background:#fff4de;color:#a5690b;}
.badge.need{background:var(--danger-soft);color:var(--danger);}
.badge.done{background:var(--success-soft);color:var(--success);}
.detail-link{display:inline-flex;align-items:center;gap:5px;padding:6px 11px;border-radius:6px;border:1px solid var(--border);font-size:11.5px;font-weight:700;color:var(--primary);}
.detail-link:hover{background:var(--primary-soft);}
.detail-link svg{width:12px;height:12px;}

/* admin detail */
.detail-back{display:inline-flex;align-items:center;gap:6px;font-size:12.5px;font-weight:600;color:var(--text-2);margin-bottom:16px;}
.detail-back:hover{color:var(--primary);}
.detail-back svg{width:14px;height:14px;}
.detail-grid{display:grid;grid-template-columns:2fr 1fr;gap:24px;align-items:flex-start;}
.detail-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-card);padding:24px;margin-bottom:20px;}
.detail-card h3{font-size:14px;font-weight:700;margin:0 0 16px;display:flex;align-items:center;gap:7px;}
.detail-card h3 svg{width:16px;height:16px;color:var(--primary);}
.kv-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px 20px;}
.kv{font-size:12.5px;}
.kv .k{color:var(--text-3);margin-bottom:2px;}
.kv .v{font-weight:600;}
.status-actions{display:flex;flex-direction:column;gap:10px;}
.status-panel{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-card);padding:20px;}
.status-panel h3{font-size:13px;font-weight:700;margin:0 0 12px;}
.status-btn-row{display:flex;flex-direction:column;gap:8px;}
.status-btn{padding:10px;border-radius:6px;border:1px solid var(--border);font-size:12.5px;font-weight:700;text-align:center;}
.status-btn.approve{color:var(--success);}
.status-btn.approve:hover{background:var(--success-soft);border-color:var(--success);}
.status-btn.reject{color:var(--danger);}
.status-btn.reject:hover{background:var(--danger-soft);border-color:var(--danger);}
.mini-log{margin-top:14px;padding-top:14px;border-top:1px dashed var(--border);font-size:11.5px;color:var(--text-3);}

/* modal */
.modal-overlay{position:fixed;inset:0;background:rgba(15,25,18,.5);z-index:200;display:flex;align-items:center;justify-content:center;padding:20px;animation:fadeInUp .2s ease both;}
.modal-box{background:var(--surface);border-radius:12px;max-width:420px;width:100%;padding:28px;text-align:center;}
.modal-icon{width:54px;height:54px;border-radius:999px;background:var(--success-soft);color:var(--success);display:flex;align-items:center;justify-content:center;margin:0 auto 16px;}
.modal-icon svg{width:26px;height:26px;}
.modal-box h3{font-size:16px;font-weight:700;margin:0 0 8px;}
.modal-box p{font-size:12.5px;color:var(--text-2);line-height:1.6;margin:0 0 20px;}

/* toast */
.toast{position:fixed;left:50%;bottom:28px;transform:translateX(-50%);background:var(--text);color:#fff;padding:12px 20px;border-radius:8px;font-size:12.5px;font-weight:600;z-index:300;display:flex;align-items:center;gap:8px;animation:toastIn .28s ease both;box-shadow:0 8px 24px rgba(0,0,0,.18);}
.toast svg{width:15px;height:15px;color:#8ce0a0;}

@media (max-width:860px){
  .wizard-wrap{flex-direction:column;}
  .summary-side{width:100%;}
  .field-grid{grid-template-columns:1fr;}
  .hero-inner{flex-direction:column;align-items:flex-start;}
  .hero-art{display:none;}
  .detail-grid{grid-template-columns:1fr;}
}
</style>
</head>

<div id="app-root"></div>

function StepTabs({view, setView, storeDone, productDone, fileDone}){
  const steps = [
    { key:'main', label:'매장 정보 입력 폼', icon:'store' },
    { key:'product-form', label:'상품 정보 입력 폼', icon:'package' },
    { key:'file-upload', label:'OEM 리스트 및 파일 업로드', icon:'upload-cloud' },
    { key:'admin-list', label:'제출 데이터 통합 조회 및 엑셀 다운로드', icon:'table-2' },
  ];
  const doneMap = { 'main': storeDone, 'product-form': productDone, 'file-upload': fileDone };
  return (
    <div className="step-tabs">
      {steps.map((s, i) => {
        const active = view === s.key || (s.key==='admin-list' && view==='admin-detail');
        const done = doneMap[s.key];
        return (
          <button key={s.key} className={"step-tab" + (active ? " active" : "") + (done && !active ? " done" : "")} onClick={() => setView(s.key)}>
            <span className="step-num">{done && !active ? <Icon name="check" style={{width:11,height:11}}/> : i+1}</span>
            <Icon name={s.icon}/>{s.label}
          </button>
        );
      })}
    </div>
  );
}

function Toast({toast}){
  if (!toast) return null;
  return (
    <div className="toast"><Icon name="check-circle"/>{toast}</div>
  );
}

                    <Icon name="file-spreadsheet" className="file-ico"/>
                    <span className="fname">{f.name}</span>
                    <span className="fsize">{f.size}</span>
                    <button className="fdel" onClick={() => removeFile(f.id)}><Icon name="x"/></button>
                  </div>
                ))}
                {files.length === 0 && <div style={{fontSize:12,color:'var(--text-3)'}}>첨부된 파일이 없습니다</div>}
              </div>

              <div className="step-actions">
                <button className="btn btn-ghost" onClick={() => setView('product-form')}><Icon name="arrow-left"/>이전 단계</button>
                <button className="btn btn-accent" onClick={() => setConfirmOpen(true)}><Icon name="send"/>제출하기</button>
              </div>
            </div>
            <SummarySide store={store} products={products} files={files} oemList={oemList} storeDone={storeDone} productDone={productDone} fileDone={fileDone} totalMonthlyCost={totalMonthlyCost} view={view} />
          </div>
        </main>
      )}

      {view === 'admin-list' && (
        <main style={{flex:1, width:'100%'}}>
          <div className="admin-wrap view-fade" key="admin-list">
            <div className="admin-header">
              <div>
                <h1>제출 데이터 통합 조회 및 엑셀 다운로드</h1>
                <p>총 {submissions.length}건의 매장 제출 데이터가 등록되어 있습니다</p>
              </div>
            </div>
            <div className="admin-toolbar">
              <div className="search-input"><Icon name="search"/><input placeholder="매장명 또는 사업자번호 검색" value={search} onChange={e => setSearch(e.target.value)} /></div>
              {['전체','승인대기','보완요청','승인완료'].map(s => (
                <button key={s} className={"filter-chip" + (statusFilter === s ? " active" : "")} onClick={() => setStatusFilter(s)}>{s}</button>
              ))}
              <button className={"export-btn" + (exporting ? " loading" : "")} onClick={doExport} disabled={exporting}>
                {exporting ? <Icon name="loader-2"/> : <Icon name="download"/>}
                {exporting ? '생성 중...' : '엑셀 다운로드'}
              </button>
            </div>
            <div className="admin-table-wrap">
              <table className="admin-table">
                <thead>
                  <tr>
                    <th onClick={() => toggleSort('store')}>매장명{sortKey==='store' && <Icon name={sortDir==='asc'?'chevron-up':'chevron-down'} className="sort-ico"/>}</th>
                    <th onClick={() => toggleSort('bizNo')}>사업자번호{sortKey==='bizNo' && <Icon name={sortDir==='asc'?'chevron-up':'chevron-down'} className="sort-ico"/>}</th>
                    <th onClick={() => toggleSort('region')}>지역{sortKey==='region' && <Icon name={sortDir==='asc'?'chevron-up':'chevron-down'} className="sort-ico"/>}</th>
                    <th>대표자</th>
                    <th onClick={() => toggleSort('date')}>제출일{sortKey==='date' && <Icon name={sortDir==='asc'?'chevron-up':'chevron-down'} className="sort-ico"/>}</th>
                    <th>상태</th>
                    <th></th>
                  </tr>
                </thead>
                <tbody>
                  {filteredSubs.map(s => (
                    <tr key={s.id}>
                      <td>{s.store}</td>
                      <td>{s.bizNo}</td>
                      <td>{s.region}</td>
                      <td>{s.ceo}</td>
                      <td>{s.date}</td>
                      <td><span className={"badge " + badgeClass(subStatus[s.id] || s.status)}>{subStatus[s.id] || s.status}</span></td>
                      <td><button className="detail-link" onClick={() => openDetail(s.id)}>제출 상세 보기<Icon name="chevron-right"/></button></td>
                    </tr>
                  ))}
                  {filteredSubs.length === 0 && (
                    <tr><td colSpan="7" style={{textAlign:'center',color:'var(--text-3)',padding:'28px 0'}}>검색 결과가 없습니다</td></tr>
                  )}
                </tbody>
              </table>
            </div>
          </div>
        </main>
      )}

      {view === 'admin-detail' && detailSub && (
        <main style={{flex:1, width:'100%'}}>
          <div className="admin-wrap view-fade" key="admin-detail">
            <button className="detail-back" onClick={() => setView('admin-list')}><Icon name="arrow-left"/>목록으로</button>
            <div className="admin-header"><div><h1>{detailSub.store}</h1><p>사업자번호 {detailSub.bizNo} · 제출일 {detailSub.date}</p></div>
              <span className={"badge " + badgeClass(detailStatus)}>{detailStatus}</span>
            </div>
            <div className="detail-grid">
              <div>
                <div className="detail-card">
                  <h3><Icon name="store"/>매장 기본 정보</h3>
                  <div className="kv-grid">
                    <div className="kv"><div className="k">대표자명</div><div className="v">{detailSub.ceo}</div></div>
                    <div className="kv"><div className="k">지역</div><div className="v">{detailSub.region}</div></div>
                    <div className="kv"><div className="k">사업자번호</div><div className="v">{detailSub.bizNo}</div></div>
                    <div className="kv"><div className="k">잠금장치</div><div className="v">있음</div></div>
                    <div className="kv"><div className="k">평균매출액</div><div className="v">28,400,000원</div></div>
                    <div className="kv"><div className="k">결제일자</div><div className="v">매월 10일</div></div>
                  </div>
                </div>
                <div className="detail-card">
                  <h3><Icon name="package"/>등록 상품 ({products.length}건)</h3>
                  <table className="data-mini-table">
                    <thead><tr><th>상품명</th><th>브랜드</th><th>규격</th><th>구매가</th></tr></thead>
                    <tbody>
                      {products.map(p => (<tr key={p.id}><td>{p.name || '-'}</td><td>{p.brand || '-'}</td><td>{p.spec || '-'}</td><td>{p.price || '-'}</td></tr>))}
                    </tbody>
                  </table>
                </div>
                <div className="detail-card">
                  <h3><Icon name="file-spreadsheet"/>첨부 파일 ({files.length}건)</h3>
                  <div className="file-list">
                    {files.map(f => (<div className="file-item" key={f.id}><Icon name="file-spreadsheet" className="file-ico"/><span className="fname">{f.name}</span><span className="fsize">{f.size}</span></div>))}
                  </div>
                </div>
              </div>
              <div className="status-panel">
                <h3>처리 상태 변경</h3>
                <div className="status-btn-row">
                  <button className="status-btn approve" onClick={() => setDetailStatus('승인완료')}><Icon name="check" style={{width:13,height:13,verticalAlign:'-2px',marginRight:5}}/>승인 처리</button>
                  <button className="status-btn reject" onClick={() => setDetailStatus('보완요청')}><Icon name="rotate-ccw" style={{width:13,height:13,verticalAlign:'-2px',marginRight:5}}/>보완 요청</button>
                </div>
                <div className="mini-log">최근 처리: {detailStatus} · {detailSub.date}</div>
              </div>
            </div>
          </div>
        </main>
      )}

      {confirmOpen && (
        <div className="modal-overlay" onClick={() => setConfirmOpen(false)}>
          <div className="modal-box" onClick={e => e.stopPropagation()}>
            <div className="modal-icon"><Icon name="check"/></div>
            <h3>제출이 완료되었습니다</h3>
            <p>매장·상품·OEM 정보와 첨부 파일이 정상적으로 접수되었습니다. 담당자가 관리자 화면에서 확인 후 처리 상태를 안내드립니다.</p>
            <button className="btn btn-primary" style={{width:'100%',justifyContent:'center'}} onClick={() => { setConfirmOpen(false); setView('admin-list'); }}>관리자 화면에서 확인하기</button>
          </div>
        </div>
      )}

      <Toast toast={toast} />
    </div>
  );
}

function SummarySide({store, products, files, oemList, storeDone, productDone, fileDone, totalMonthlyCost, view}){
  const doneCount = [storeDone, productDone, fileDone].filter(Boolean).length;
  return (
    <aside className="summary-side">
      <div className="summary-card">
        <h3><Icon name="clipboard-check"/>입력 진행 상황</h3>
        <div className="progress-track"><div className="progress-fill" style={{width:(doneCount/3*100)+'%'}}></div></div>
        <ul className="checklist">
          <li className={storeDone ? 'done':'pending'}><Icon name={storeDone?'check-circle':'circle'}/>매장 기본 정보</li>
          <li className={productDone ? 'done':'pending'}><Icon name={productDone?'check-circle':'circle'}/>상품 정보 ({products.length}건)</li>
          <li className={fileDone ? 'done':'pending'}><Icon name={fileDone?'check-circle':'circle'}/>OEM 및 첨부파일</li>
        </ul>
      </div>
      {view === 'product-form' && (
        <div className="summary-card">
          <h3><Icon name="calculator"/>예상 월 구매액</h3>
          <div className="stat-mini"><span>등록 상품 수</span><strong>{products.length}건</strong></div>
          <div className="stat-mini"><span>월 예상 구매액</span><strong>{totalMonthlyCost.toLocaleString()}원</strong></div>
        </div>
      )}
      {view === 'file-upload' && (
        <div className="summary-card">
          <h3><Icon name="folder-check"/>OEM · 첨부 현황</h3>
          <div className="stat-mini"><span>OEM 등록</span><strong>{oemList.length}건</strong></div>
          <div className="stat-mini"><span>첨부 파일</span><strong>{files.length}건</strong></div>
        </div>
      )}
      <div className="help-card"><b>도움말</b> · 사업자번호는 000-00-00000 형식으로 입력하며, 직영/가맹 여부에 따라 필요한 입력 항목이 자동으로 달라집니다.</div>
    </aside>
  );
}

ReactDOM.createRoot(document.getElementById('app-root')).render(<App/>); </script>
</body>
</html>
