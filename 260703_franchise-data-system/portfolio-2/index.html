<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>브랜드옵스 — 멀티 브랜드 가맹점 데이터 운영 콘솔</title>
<link rel="preconnect" href="https://fastly.jsdelivr.net">
<link rel="stylesheet" as="style" crossorigin href="https://fastly.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
<link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/regular/style.css">
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://unpkg.com/prop-types@15/prop-types.js"></script>
<script src="https://unpkg.com/react-is@18/umd/react-is.production.min.js"></script>
<script src="https://unpkg.com/recharts@2.10.3/umd/Recharts.js"></script>
<style>
:root{
  --primary:#17150e;
  --primary-soft:#eceae2;
  --accent:#cccc25;
  --accent-soft:#f7f7d9;
  --bg:#f0f7f6;
  --surface:#ffffff;
  --surface-2:#f5f8f7;
  --border:#e2e2e2;
  --text:#17150e;
  --text-2:#4b4b42;
  --text-3:#8a8a7d;
  --danger:#b23b3b;
  --danger-soft:#fbeaea;
  --success:#2f7d4f;
  --success-soft:#e6f4ec;
  --wait:#9c7a1f;
  --wait-soft:#faf1dc;
  --radius-card:20px;
  --radius-pill:9999px;
}
*{box-sizing:border-box;}
html,body{width:100%;margin:0;padding:0;}
body{
  font-family:'Pretendard', -apple-system, BlinkMacSystemFont, sans-serif;
  background:var(--bg);
  color:var(--text);
  -webkit-font-smoothing:antialiased;
  letter-spacing:-0.01em;
}
#app-root{width:100%;min-height:100vh;}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit;}
input,select,textarea{font-family:inherit;}
a{text-decoration:none;color:inherit;}

@keyframes fadeInUp{from{opacity:0;transform:translateY(14px);}to{opacity:1;transform:translateY(0);}}
@keyframes cardStagger{from{opacity:0;transform:translateY(10px) scale(.98);}to{opacity:1;transform:translateY(0) scale(1);}}
@keyframes barGrow{from{transform:scaleY(0);}to{transform:scaleY(1);}}
@keyframes toastIn{from{opacity:0;transform:translate(-50%,14px);}to{opacity:1;transform:translate(-50%,0);}}
@keyframes pillPulse{0%,100%{box-shadow:0 0 0 0 rgba(204,204,37,.5);}50%{box-shadow:0 0 0 6px rgba(204,204,37,0);}}
@keyframes drawStroke{from{stroke-dashoffset:120;}to{stroke-dashoffset:0;}}
@keyframes spinRing{from{transform:rotate(0deg);}to{transform:rotate(360deg);}}

.view-fade{animation:fadeInUp .34s ease both;}
.stagger{animation:cardStagger .4s ease both;}

/* ===== shell ===== */
.shell{display:flex;width:100%;min-height:100vh;}
.sidebar{position:fixed;left:0;top:0;bottom:0;width:246px;background:var(--primary);color:#f0f0e6;display:flex;flex-direction:column;padding:20px 14px;overflow-y:auto;}
.sidebar-brand{display:flex;align-items:center;gap:9px;padding:6px 8px 16px;}
.sidebar-brand .logo-badge{width:30px;height:30px;border-radius:9px;background:var(--accent);color:var(--primary);display:flex;align-items:center;justify-content:center;font-weight:800;font-size:14px;flex-shrink:0;}
.sidebar-brand .logo-text{font-size:15px;font-weight:700;letter-spacing:-0.02em;}
.brand-select{margin:0 4px 18px;padding:9px 12px;background:rgba(255,255,255,.08);border-radius:12px;display:flex;align-items:center;justify-content:space-between;font-size:12.5px;font-weight:600;color:#e8e8da;}
.brand-select select{background:transparent;color:#fff;border:none;outline:none;font-size:12.5px;font-weight:600;width:100%;}
.brand-select select option{color:#111;}
.sidebar-section{margin-bottom:18px;}
.sidebar-section-title{font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:#8f8f7c;padding:0 10px 8px;}
.sidebar-link{display:flex;align-items:center;gap:10px;padding:10px 10px;border-radius:12px;font-size:12.5px;font-weight:600;color:#cfcfc0;margin-bottom:2px;transition:all .15s ease;width:100%;text-align:left;}
.sidebar-link i{font-size:16px;flex-shrink:0;}
.sidebar-link:hover{background:rgba(255,255,255,.06);color:#fff;}
.sidebar-link.active{background:var(--accent);color:var(--primary);}
.sidebar-footer{margin-top:auto;padding:12px 10px;font-size:11px;color:#8f8f7c;border-top:1px solid rgba(255,255,255,.08);}

.main-wrap{margin-left:246px;flex:1;min-width:0;width:calc(100% - 246px);display:flex;flex-direction:column;}
.page-container{max-width:1360px;margin:0 auto;padding:28px 32px 56px;width:100%;}

.page-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:22px;flex-wrap:wrap;gap:14px;}
.page-title-row h1{font-size:48px;font-weight:800;letter-spacing:-0.025em;margin:0 0 4px;line-height:1.08;}
.page-meta{font-size:12px;color:var(--text-3);}
.page-actions{display:flex;gap:10px;}
.btn{padding:10px 18px;border-radius:var(--radius-pill);font-size:12.5px;font-weight:700;display:inline-flex;align-items:center;gap:7px;transition:all .15s ease;}
.btn i{font-size:15px;}
.btn-secondary{background:var(--surface);border:1px solid var(--border);color:var(--text-2);}
.btn-secondary:hover{border-color:var(--primary);}
.btn-primary{background:var(--primary);color:#fff;}
.btn-primary:hover{background:#000;}
.btn-accent{background:var(--accent);color:var(--primary);}
.btn-accent:hover{filter:brightness(0.94);}

/* ===== KPI stat row (archetype signature) ===== */
.stat-row{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:24px;}
.stat-card{background:var(--surface);border-radius:16px;padding:20px 20px 16px;box-shadow:0 1px 3px rgba(23,21,14,.07);animation:cardStagger .4s ease both;transition:transform .18s ease,box-shadow .18s ease;}
.stat-card:hover,.widget-card:hover{transform:scale(1.02);box-shadow:0 10px 28px rgba(23,21,14,.14);}
.widget-card{transition:transform .18s ease,box-shadow .18s ease;}
.stat-label{font-size:11.5px;font-weight:700;color:var(--text-3);margin-bottom:8px;}
.stat-value{font-size:30px;font-weight:800;letter-spacing:-0.02em;margin-bottom:6px;}
.stat-delta{font-size:11.5px;font-weight:700;display:inline-flex;align-items:center;gap:3px;}
.stat-delta.positive{color:var(--success);}
.stat-delta.negative{color:var(--danger);}
.stat-sparkline{width:100%;height:30px;margin-top:8px;}

/* hero-viz */
.hero-viz{background:linear-gradient(120deg,#17150e 0%,#3a3624 55%,#5c5a1f 100%);border-radius:24px;padding:26px 28px;color:#f5f5ea;margin-bottom:24px;position:relative;overflow:hidden;}
.hero-viz-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px;position:relative;z-index:1;}
.hero-viz h2{font-size:18px;font-weight:700;margin:0 0 4px;}
.hero-viz p{font-size:12px;color:#c7c7b4;margin:0;}
.hero-chart-wrap{height:150px;width:100%;position:relative;z-index:1;margin-top:10px;}
.hero-glow{position:absolute;right:-60px;top:-60px;width:260px;height:260px;border-radius:999px;background:radial-gradient(circle,rgba(204,204,37,.35),transparent 70%);}

/* widget grid */
.widget-grid{display:grid;grid-template-columns:1.3fr 1fr 1fr;gap:16px;margin-bottom:24px;}
.widget-card{background:var(--surface);border-radius:16px;padding:18px 20px;box-shadow:0 1px 3px rgba(23,21,14,.06);}
.widget-card h4{font-size:12.5px;font-weight:700;margin:0 0 12px;display:flex;align-items:center;gap:6px;}
.widget-card h4 i{color:var(--accent);font-size:15px;}
.donut-row{display:flex;align-items:center;gap:16px;}
.donut-legend{display:flex;flex-direction:column;gap:7px;font-size:11.5px;}
.legend-dot{width:8px;height:8px;border-radius:999px;display:inline-block;margin-right:6px;}
.top-brand-row{display:flex;align-items:center;gap:10px;padding:7px 0;font-size:12px;}
.top-brand-row .tbr-name{flex:1;font-weight:600;}
.top-brand-row .tbr-bar{width:70px;height:6px;border-radius:999px;background:var(--surface-2);overflow:hidden;}
.top-brand-row .tbr-fill{height:100%;background:var(--accent);border-radius:999px;transform-origin:left;animation:barGrow .6s ease both;}
.activity-item{display:flex;gap:9px;padding:7px 0;font-size:11.5px;color:var(--text-2);}
.activity-item .dot{width:6px;height:6px;border-radius:999px;background:var(--accent);margin-top:5px;flex-shrink:0;}

/* tab bar + table (archetype signature) */
.tab-bar{display:flex;gap:4px;border-bottom:1px solid var(--border);margin-bottom:14px;}
.tab{padding:10px 4px;margin-right:20px;font-size:13px;font-weight:700;color:var(--text-3);border-bottom:2px solid transparent;}
.tab.active{color:var(--primary);border-bottom-color:var(--accent);}
.data-toolbar{display:flex;gap:10px;align-items:center;margin-bottom:14px;flex-wrap:wrap;}
.search-pill{flex:1;min-width:200px;display:flex;align-items:center;gap:8px;padding:9px 16px;border-radius:var(--radius-pill);border:1px solid var(--border);background:var(--surface);}
.search-pill i{color:var(--text-3);}
.search-pill input{border:none;outline:none;flex:1;font-size:12.5px;background:transparent;}
.filter-chip{padding:8px 15px;border-radius:var(--radius-pill);border:1px solid var(--border);background:var(--surface);font-size:12px;font-weight:700;color:var(--text-2);}
.filter-chip.active{background:var(--primary);border-color:var(--primary);color:#fff;}
.export-btn{margin-left:auto;}
.export-btn.loading i{animation:spinRing .8s linear infinite;}

.data-table-wrap{background:var(--surface);border-radius:16px;overflow:hidden;box-shadow:0 1px 3px rgba(23,21,14,.06);}
table.data-table{width:100%;border-collapse:collapse;}
table.data-table th{text-align:left;font-size:11px;font-weight:700;color:var(--text-3);padding:11px 16px;background:var(--surface-2);border-bottom:1px solid var(--border);cursor:pointer;white-space:nowrap;}
table.data-table th:hover{color:var(--primary);}
table.data-table td{padding:11px 16px;font-size:12.5px;border-bottom:1px solid var(--border);}
table.data-table tbody tr{transition:background .12s ease;cursor:pointer;}
table.data-table tbody tr:hover{background:var(--surface-2);}
table.data-table tbody tr:last-child td{border-bottom:none;}
.badge{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:var(--radius-pill);font-size:10.5px;font-weight:700;}
.badge.wait{background:var(--wait-soft);color:var(--wait);}
.badge.need{background:var(--danger-soft);color:var(--danger);animation:pillPulse 2.2s ease infinite;}
.badge.done{background:var(--success-soft);color:var(--success);}
.badge.reject{background:#efe6e6;color:#7a3838;}

/* master-detail (review workflow) */
.md-grid{display:grid;grid-template-columns:360px 1fr;gap:18px;align-items:flex-start;}
.md-list{background:var(--surface);border-radius:16px;box-shadow:0 1px 3px rgba(23,21,14,.06);max-height:640px;overflow-y:auto;}
.md-item{padding:14px 16px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .12s ease;}
.md-item:hover{background:var(--surface-2);}
.md-item.active{background:var(--accent-soft);border-left:3px solid var(--accent);}
.md-item .mdi-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;}
.md-item .mdi-name{font-size:13px;font-weight:700;}
.md-item .mdi-meta{font-size:11px;color:var(--text-3);}
.md-detail{background:var(--surface);border-radius:16px;box-shadow:0 1px 3px rgba(23,21,14,.06);padding:24px;}
.md-detail h3{font-size:15px;font-weight:800;margin:0 0 4px;}
.md-detail .md-sub{font-size:12px;color:var(--text-3);margin-bottom:18px;}
.kv-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px 20px;margin-bottom:20px;}
.kv{font-size:12.5px;}
.kv .k{color:var(--text-3);margin-bottom:2px;}
.kv .v{font-weight:700;}
.status-action-row{display:flex;gap:10px;margin-top:6px;margin-bottom:18px;flex-wrap:wrap;}
.status-action-row .btn{font-size:12px;}
.history-list{border-top:1px dashed var(--border);padding-top:14px;display:flex;flex-direction:column;gap:8px;}
.history-item{font-size:11.5px;color:var(--text-2);display:flex;gap:8px;}
.history-item .h-time{color:var(--text-3);min-width:88px;}

/* filter builder */
.filter-builder{background:var(--surface);border-radius:16px;box-shadow:0 1px 3px rgba(23,21,14,.06);padding:20px;margin-bottom:18px;}
.filter-row{display:flex;gap:10px;align-items:center;margin-bottom:10px;}
.filter-row select,.filter-row input{padding:9px 12px;border:1px solid var(--border);border-radius:10px;font-size:12.5px;background:var(--surface);}
.filter-row .fr-del{width:28px;height:28px;border-radius:999px;display:flex;align-items:center;justify-content:center;color:var(--text-3);}
.filter-row .fr-del:hover{background:var(--danger-soft);color:var(--danger);}
.filter-actions{display:flex;gap:10px;margin-top:12px;}
.applied-chips{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px;}
.applied-chip{display:inline-flex;align-items:center;gap:6px;padding:6px 12px;border-radius:var(--radius-pill);background:var(--accent-soft);color:#5c5a10;font-size:11.5px;font-weight:700;}
.preset-list{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px;}
.preset-chip{padding:7px 13px;border-radius:var(--radius-pill);border:1px dashed var(--border);font-size:11.5px;font-weight:700;color:var(--text-2);}
.preset-chip:hover{border-color:var(--accent);color:var(--primary);}

/* brand report */
.brand-toggle-row{display:flex;gap:8px;margin-bottom:18px;flex-wrap:wrap;}
.brand-toggle{padding:9px 16px;border-radius:var(--radius-pill);border:1px solid var(--border);font-size:12.5px;font-weight:700;background:var(--surface);}
.brand-toggle.active{background:var(--primary);color:#fff;border-color:var(--primary);}
.chart-card{background:var(--surface);border-radius:16px;box-shadow:0 1px 3px rgba(23,21,14,.06);padding:22px;margin-bottom:18px;}
.chart-wrap{height:260px;width:100%;position:relative;}

/* settings */
.settings-grid{display:grid;grid-template-columns:1.3fr 1fr;gap:18px;align-items:flex-start;}
.settings-card{background:var(--surface);border-radius:16px;box-shadow:0 1px 3px rgba(23,21,14,.06);padding:22px;margin-bottom:18px;}
.settings-card h4{font-size:13.5px;font-weight:800;margin:0 0 4px;}
.settings-card .sc-desc{font-size:11.5px;color:var(--text-3);margin-bottom:16px;}
.brand-row{display:flex;align-items:center;gap:12px;padding:11px 0;border-bottom:1px solid var(--border);}
.brand-row:last-child{border-bottom:none;}
.brand-avatar{width:34px;height:34px;border-radius:10px;background:var(--accent-soft);color:#5c5a10;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:13px;}
.brand-row .br-name{flex:1;font-size:12.5px;font-weight:700;}
.toggle-switch{width:38px;height:22px;border-radius:999px;background:var(--border);position:relative;transition:background .2s ease;flex-shrink:0;}
.toggle-switch.on{background:var(--accent);}
.toggle-switch .knob{position:absolute;top:2px;left:2px;width:18px;height:18px;border-radius:999px;background:#fff;transition:left .2s ease;box-shadow:0 1px 2px rgba(0,0,0,.2);}
.toggle-switch.on .knob{left:18px;}
.user-row{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--border);}
.user-row:last-child{border-bottom:none;}
.user-row .ur-avatar{width:30px;height:30px;border-radius:999px;background:var(--primary);color:#fff;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;}
.user-row .ur-name{font-size:12.5px;font-weight:700;flex:1;}
.role-pill{padding:4px 10px;border-radius:var(--radius-pill);background:var(--surface-2);font-size:10.5px;font-weight:700;color:var(--text-2);}
.add-brand-btn{display:inline-flex;align-items:center;gap:6px;padding:9px 15px;border-radius:var(--radius-pill);border:1px dashed var(--primary);color:var(--primary);font-size:12px;font-weight:700;margin-top:8px;}

.modal-overlay{position:fixed;inset:0;background:rgba(23,21,14,.5);z-index:200;display:flex;align-items:center;justify-content:center;padding:20px;animation:fadeInUp .2s ease both;}
.modal-box{background:var(--surface);border-radius:20px;max-width:420px;width:100%;padding:26px;}
.modal-box h3{font-size:15px;font-weight:800;margin:0 0 6px;}
.modal-box p{font-size:12px;color:var(--text-2);margin:0 0 16px;line-height:1.6;}
.modal-box textarea{width:100%;padding:11px 13px;border:1px solid var(--border);border-radius:12px;font-size:12.5px;resize:vertical;min-height:80px;margin-bottom:14px;}
.modal-actions{display:flex;gap:10px;justify-content:flex-end;}

.toast{position:fixed;left:50%;bottom:28px;transform:translateX(-50%);background:var(--primary);color:#fff;padding:12px 20px;border-radius:var(--radius-pill);font-size:12.5px;font-weight:700;z-index:300;display:flex;align-items:center;gap:8px;animation:toastIn .28s ease both;box-shadow:0 8px 24px rgba(0,0,0,.22);}
.toast i{color:var(--accent);font-size:16px;}

@media (max-width:1100px){
  .stat-row{grid-template-columns:repeat(2,1fr);}
  .widget-grid{grid-template-columns:1fr;}
  .md-grid{grid-template-columns:1fr;}
  .settings-grid{grid-template-columns:1fr;}
}
@media (max-width:760px){
  .sidebar{width:210px;}
  .main-wrap{margin-left:210px;width:calc(100% - 210px);}
  .stat-row{grid-template-columns:1fr;}
}
</style>
</head>

  const w=100,h=30;
  const max=Math.max(...points), min=Math.min(...points);
  const norm = points.map((p,i)=> [ (i/(points.length-1))*w, h - ((p-min)/(max-min||1))*h ]);
  const d = norm.map((p,i)=> (i===0?'M':'L') + p[0].toFixed(1) + ',' + p[1].toFixed(1)).join(' ');
  return (
    <svg className="stat-sparkline" viewBox={"0 0 "+w+" "+h} preserveAspectRatio="none">
      <path d={d} fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeDasharray="120" style={{animation:'drawStroke 1s ease both'}} />
    </svg>
  );
}

function badgeClass(s){
  if (s==='승인완료') return 'done';

function AdvancedFilter({subs, statusOf}){
  const [rows, setRows] = useState([
    { id:1, field:'brand', op:'=', value:'미소반점' },
    { id:2, field:'status', op:'=', value:'승인대기' },
  ]);
  const [presets, setPresets] = useState(['미승인 전체','서울 지역만']);
  const [toast, setToast] = useState(null);
  const addRow = () => setRows(r => [...r, { id: Math.max(0,...r.map(x=>x.id))+1, field:'brand', op:'=', value:'' }]);
  const removeRow = (id) => setRows(r => r.filter(x => x.id !== id));
  const updateRow = (id, key, val) => setRows(r => r.map(x => x.id===id ? {...x,[key]:val} : x));

  const filtered = useMemo(() => subs.filter(s => rows.every(r => {
    if (!r.value) return true;
    if (r.field==='brand') return s.brand === r.value;
    if (r.field==='status') return statusOf(s) === r.value;
    if (r.field==='region') return s.region.includes(r.value);
    return true;
  })), [rows, subs]);

  const savePreset = () => {
    setPresets(p => [...p, '필터 프리셋 ' + (p.length+1)]);
    setToast('필터 프리셋이 저장되었습니다');
    setTimeout(()=>setToast(null),2400);
  };
  const copyUrl = () => { setToast('검색 결과 URL이 복사되었습니다'); setTimeout(()=>setToast(null),2400); };

  return (
    <div className="view-fade" key="filter">
      <div className="page-header">
        <div className="page-title-row"><h1>심화 필터링 및 조건 검색</h1><div className="page-meta">복합 조건을 조합해 데이터를 조회합니다</div></div>
      </div>
      <div className="preset-list">
        {presets.map((p,i) => <button key={i} className="preset-chip" onClick={() => { setToast('"'+p+'" 프리셋을 적용했습니다'); setTimeout(()=>setToast(null),2400); }}><i className="ph ph-bookmark-simple" style={{marginRight:5}}></i>{p}</button>)}
      </div>
      <div className="filter-builder">
        {rows.map(r => (
          <div className="filter-row" key={r.id}>
            <select value={r.field} onChange={e => updateRow(r.id,'field',e.target.value)}>
              <option value="brand">브랜드</option>
              <option value="status">제출 상태</option>
              <option value="region">지역</option>
            </select>
            <select value={r.op} onChange={e => updateRow(r.id,'op',e.target.value)}>
              <option value="=">일치</option>
              <option value="~">포함</option>
            </select>
            {r.field==='brand' ? (
              <select value={r.value} onChange={e => updateRow(r.id,'value',e.target.value)}>
                <option value="">선택</option>
                {BRANDS.filter(b=>b!=='전체 브랜드').map(b => <option key={b} value={b}>{b}</option>)}
              </select>
            ) : r.field==='status' ? (
              <select value={r.value} onChange={e => updateRow(r.id,'value',e.target.value)}>
                <option value="">선택</option>
                {['승인대기','보완요청','승인완료','반려'].map(s => <option key={s} value={s}>{s}</option>)}
              </select>
            ) : (
              <input placeholder="지역 입력" value={r.value} onChange={e => updateRow(r.id,'value',e.target.value)} />
            )}
            <button className="fr-del" onClick={() => removeRow(r.id)}><i className="ph ph-trash"></i></button>
          </div>
        ))}
        <div className="filter-actions">
          <button className="btn btn-secondary" onClick={addRow}><i className="ph ph-plus"></i>조건 추가</button>
          <button className="btn btn-accent" onClick={savePreset}><i className="ph ph-floppy-disk"></i>필터 저장</button>
          <button className="btn btn-secondary" onClick={copyUrl}><i className="ph ph-link"></i>URL 복사</button>
        </div>
      </div>
      <div className="applied-chips">
        {rows.filter(r=>r.value).map(r => <span className="applied-chip" key={r.id}><i className="ph ph-funnel-simple"></i>{r.field==='brand'?'브랜드':r.field==='status'?'상태':'지역'}: {r.value}</span>)}
        {rows.filter(r=>r.value).length===0 && <span style={{fontSize:12,color:'var(--text-3)'}}>적용된 조건이 없습니다 — 전체 결과 표시 중</span>}
      </div>
      <div className="data-table-wrap">
        <table className="data-table">
          <thead><tr><th>매장명</th><th>브랜드</th><th>지역</th><th>평균매출</th><th>상태</th></tr></thead>
          <tbody>
            {filtered.map(s => (
              <tr key={s.id}><td>{s.store}</td><td>{s.brand}</td><td>{s.region}</td><td>{s.revenue.toLocaleString()}원</td>
                <td><span className={"badge " + badgeClass(statusOf(s))}>{statusOf(s)}</span></td></tr>

          </tbody>
        </table>
      </div>
      {toast && <div className="toast"><i className="ph ph-check-circle"></i>{toast}</div>}
    </div>
  );
}

      </div>
      <div className="chart-card">
        <h4 style={{fontSize:13,fontWeight:800,margin:'0 0 14px'}}>브랜드별 평균매출 비교 (만원)</h4>
        <div className="chart-wrap">
          <ResponsiveContainer width="100%" height="100%">
            <BarChart data={chartData}>
              <CartesianGrid strokeDasharray="3 3" stroke="#e2e2e2" vertical={false} />
              <XAxis dataKey="name" tick={{fontSize:12}} axisLine={false} tickLine={false} />
              <YAxis tick={{fontSize:11}} axisLine={false} tickLine={false} />
              <Tooltip contentStyle={{borderRadius:12,fontSize:12,border:'1px solid #e2e2e2'}} />
              <Legend wrapperStyle={{fontSize:12}} />
              <Bar dataKey="평균매출" fill="#17150e" radius={[6,6,0,0]} />
            </BarChart>
          </ResponsiveContainer>
        </div>
      </div>
      <div className="data-table-wrap">
        <table className="data-table">
          <thead><tr><th>브랜드</th><th>매장 수</th><th>평균매출액</th><th>상품 단가 편차</th></tr></thead>
          <tbody>
            {Object.entries(brandStats).filter(([n])=>selectedBrands.includes(n)).map(([name,st]) => (
              <tr key={name}><td>{name}</td><td>{st.count}개</td><td>{st.avgRevenue.toLocaleString()}원</td>
                <td style={st.priceVar>7 ? {color:'var(--danger)',fontWeight:700} : {}}>{st.priceVar}%</td></tr>
            ))}
          </tbody>
        </table>
      </div>
      {toast && <div className="toast"><i className="ph ph-check-circle"></i>{toast}</div>}
    </div>
  );
}

function BrandSettings(){
  const [brands, setBrands] = useState([
    { id:1, name:'미소반점', stores:14, notify:true },
    { id:2, name:'청춘커피', stores:9, notify:true },
    { id:3, name:'바른국수', stores:11, notify:false },
  ]);
  const toggleNotify = (id) => setBrands(b => b.map(x => x.id===id ? {...x, notify:!x.notify} : x));
  const addBrand = () => setBrands(b => [...b, { id: Math.max(0,...b.map(x=>x.id))+1, name:'신규 브랜드 '+(b.length+1), stores:0, notify:true }]);
  return (
    <div className="view-fade" key="settings">
      <div className="page-header">
        <div className="page-title-row"><h1>브랜드 설정</h1><div className="page-meta">브랜드 목록과 운영 권한을 관리합니다</div></div>
      </div>
      <div className="settings-grid">
        <div>
          <div className="settings-card">
            <h4>브랜드 관리</h4>
            <div className="sc-desc">등록된 프랜차이즈 브랜드와 제출 알림 수신 여부를 설정합니다</div>
            {brands.map(b => (
              <div className="brand-row" key={b.id}>
                <div className="brand-avatar">{b.name[0]}</div>
                <div className="br-name">{b.name} <span style={{color:'var(--text-3)',fontWeight:500}}>· 매장 {b.stores}개</span></div>
                <div className={"toggle-switch" + (b.notify?" on":"")} onClick={() => toggleNotify(b.id)}><div className="knob"></div></div>
              </div>
            ))}
            <button className="add-brand-btn" onClick={addBrand}><i className="ph ph-plus"></i>브랜드 추가</button>
          </div>
        </div>
        <div>
          <div className="settings-card">
            <h4>운영진 계정</h4>
            <div className="sc-desc">콘솔에 접근 가능한 사용자와 권한입니다</div>
            {users.map((u,i) => (
              <div className="user-row" key={i}>
                <div className="ur-avatar">{u.name[0]}</div>
                <div className="ur-name">{u.name}</div>
                <span className="role-pill">{u.role}</span>
              </div>
            ))}
          </div>
        </div>
      </div>
    </div>
  );
}

function App(){
  const [view, setView] = useState('main');
  const [brandFilter, setBrandFilter] = useState('전체 브랜드');
  const [statusOverride, setStatusOverride] = useState({});
  const [history, setHistory] = useState({});

  useEffect(() => {}, [view]);

  const statusOf = (s) => statusOverride[s.id] || s.status;
  const setStatus = (id, status, label) => {
    setStatusOverride(m => ({...m,[id]:status}));
    setHistory(h => ({...h, [id]: [...(h[id]||[]), { time:'방금 전', text:label }]}));
  };

  return (
    <div className="shell">
      <Sidebar view={view} setView={setView} brandFilter={brandFilter} setBrandFilter={setBrandFilter} />
      <div className="main-wrap">
        <div className="page-container">
          {view==='main' && <DashboardView brandFilter={brandFilter} subs={submissions} statusOf={statusOf} />}
          {view==='review-workflow' && <ReviewWorkflow subs={submissions} statusOf={statusOf} setStatus={setStatus} history={history} />}
          {view==='advanced-filter' && <AdvancedFilter subs={submissions} statusOf={statusOf} />}
          {view==='brand-report' && <BrandReport />}
          {view==='brand-settings' && <BrandSettings />}
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('app-root')).render(<App/>);
</script>
</body>
</html>
