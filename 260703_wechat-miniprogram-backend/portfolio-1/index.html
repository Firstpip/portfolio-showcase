<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>인시던트 렌즈 — 사고분석 접수 백엔드 콘솔</title>
<link rel="preconnect" href="https://fastly.jsdelivr.net">
<link rel="stylesheet" as="style" crossorigin href="https://fastly.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<style>
:root{
  --ink:#202020;
  --ink-2:#3a3a3a;
  --blue:#0091ff;
  --blue-soft:#e8f4ff;
  --border:#e8e8e8;
  --border-lo:#f0f0f0;
  --bg:#ffffff;
  --surface:#f8f9fa;
  --band:#f2f3f5;
  --text:#202020;
  --text-2:#5a5f68;
  --text-3:#8a8f98;
  --ok:#00c07a;
  --ok-soft:#e3faf1;
  --warn:#ff8a00;
  --warn-soft:#fff3e2;
  --hold:#8a8f98;
  --hold-soft:#eef0f2;
  --danger:#ff4d4f;
  --radius-card:8px;
  --radius-pill:9999px;
  --radius-input:6px;
}
*{box-sizing:border-box;}
html,body{width:100%;margin:0;padding:0;}
body{
  font-family:'Pretendard',-apple-system,BlinkMacSystemFont,sans-serif;
  background:var(--bg);
  color:var(--text);
  -webkit-font-smoothing:antialiased;
  letter-spacing:-0.01em;
}
#app-root{width:100%;min-height:100vh;}
button{font-family:inherit;cursor:pointer;}
input,select,textarea{font-family:inherit;}
a{text-decoration:none;color:inherit;cursor:pointer;}
::-webkit-scrollbar{width:8px;height:8px;}
::-webkit-scrollbar-thumb{background:#dcdcdc;border-radius:8px;}

@keyframes fadeInUp{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}
@keyframes rowStagger{from{opacity:0;transform:translateX(-6px);}to{opacity:1;transform:translateX(0);}}
@keyframes pulseDot{0%{box-shadow:0 0 0 0 rgba(0,145,255,.45);}70%{box-shadow:0 0 0 8px rgba(0,145,255,0);}100%{box-shadow:0 0 0 0 rgba(0,145,255,0);}}
@keyframes toastIn{from{opacity:0;transform:translate(-50%,10px);}to{opacity:1;transform:translate(-50%,0);}}
@keyframes cmdkIn{from{opacity:0;transform:translateY(-8px) scale(.98);}to{opacity:1;transform:translateY(0) scale(1);}}
@keyframes barGrow{from{transform:scaleX(0);}to{transform:scaleX(1);}}
@keyframes ripple{from{transform:scale(0);opacity:.4;}to{transform:scale(2.4);opacity:0;}}

.app-shell{display:flex;width:100%;min-height:100vh;}

/* ---- sidebar (archetype signature) ---- */
.sidebar{position:fixed;left:0;top:0;bottom:0;width:264px;background:var(--bg);border-right:1px solid var(--border);
  display:flex;flex-direction:column;z-index:20;}
.sidebar-brand{height:64px;display:flex;align-items:center;gap:10px;padding:0 20px;border-bottom:1px solid var(--border-lo);flex-shrink:0;}
.brand-mark{width:26px;height:26px;border-radius:7px;background:var(--ink);display:flex;align-items:center;justify-content:center;color:#fff;flex-shrink:0;}
.brand-name{font-weight:700;font-size:14px;letter-spacing:-0.02em;}
.brand-sub{font-size:11px;color:var(--text-3);}
.sidebar-cmdk-hint{margin:14px 16px 6px;padding:9px 12px;border:1px solid var(--border);border-radius:var(--radius-input);
  display:flex;align-items:center;justify-content:space-between;font-size:12px;color:var(--text-3);background:var(--surface);}
.kbd{font-family:ui-monospace,monospace;font-size:11px;border:1px solid var(--border);border-radius:4px;padding:1px 6px;color:var(--text-2);background:#fff;}
.sidebar-nav{padding:8px 12px;display:flex;flex-direction:column;gap:2px;}
.sidebar-section-title{font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--text-3);padding:14px 10px 6px;}
.sidebar-link{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:var(--radius-input);font-size:13.5px;color:var(--text-2);font-weight:500;position:relative;transition:background .12s ease,color .12s ease;}
.sidebar-link svg{width:16px;height:16px;stroke-width:1.6;flex-shrink:0;}
.sidebar-link:hover{background:var(--surface);color:var(--text);}
.sidebar-link.active{background:var(--ink);color:#fff;}
.sidebar-link.active::before{content:'';position:absolute;left:-12px;top:8px;bottom:8px;width:3px;border-radius:2px;background:var(--blue);}
.sidebar-count{margin-left:auto;font-size:10.5px;background:var(--border);color:var(--text-2);padding:1px 7px;border-radius:var(--radius-pill);font-weight:700;}
.sidebar-link.active .sidebar-count{background:rgba(255,255,255,.18);color:#fff;}
.sidebar-user{margin-top:auto;padding:14px 20px;border-top:1px solid var(--border-lo);display:flex;align-items:center;gap:10px;font-size:12.5px;color:var(--text-2);flex-shrink:0;}
.avatar-dot{width:26px;height:26px;border-radius:50%;background:linear-gradient(135deg,#202020,#4b4b4b);flex-shrink:0;}

/* ---- main ---- */
.main-wrap{margin-left:264px;flex:1;min-width:0;width:calc(100% - 264px);display:flex;flex-direction:column;min-height:100vh;}
.topbar{height:56px;flex-shrink:0;display:flex;align-items:center;justify-content:space-between;padding:0 24px;border-bottom:1px solid var(--border);position:sticky;top:0;background:rgba(255,255,255,.92);backdrop-filter:blur(6px);z-index:10;}
.breadcrumb{display:flex;align-items:center;gap:6px;font-size:13px;color:var(--text-3);}
.breadcrumb b{color:var(--text);font-weight:700;}
.breadcrumb .divider{color:#c9cbd0;}
.topbar-actions{display:flex;align-items:center;gap:8px;}
.btn-cmdk{display:flex;align-items:center;gap:6px;border:1px solid var(--border);background:#fff;border-radius:var(--radius-pill);padding:7px 12px;font-size:12.5px;color:var(--text-2);font-weight:600;}
.btn-cmdk:hover{border-color:var(--blue);color:var(--blue);}
.btn-primary{background:var(--ink);color:#fff;border:none;border-radius:var(--radius-pill);padding:8px 16px;font-size:13px;font-weight:700;display:flex;align-items:center;gap:6px;position:relative;overflow:hidden;}
.btn-primary:hover{background:#000;}
.btn-ghost{background:transparent;border:1px solid var(--border);color:var(--text);border-radius:var(--radius-pill);padding:8px 14px;font-size:13px;font-weight:600;}
.btn-ghost:hover{border-color:var(--blue);color:var(--blue);}

.content{padding:24px;flex:1;width:100%;animation:fadeInUp .35s ease both;}
.view-head{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:20px;gap:20px;flex-wrap:wrap;}
.view-title{font-size:22px;font-weight:800;letter-spacing:-0.02em;margin:0 0 4px;}
.view-desc{font-size:13px;color:var(--text-2);max-width:560px;line-height:1.55;margin:0;}
.stat-hero{font-size:42px;font-weight:800;letter-spacing:-0.03em;line-height:1;color:var(--ink);}
.stat-hero-cap{font-size:12.5px;color:var(--text-3);margin-top:6px;}

/* ---- master-detail composition ---- */
.md-grid{display:flex;gap:16px;align-items:flex-start;width:100%;}
.list-rail{width:340px;flex-shrink:0;border:1px solid var(--border);border-radius:var(--radius-card);background:#fff;overflow:hidden;}
.list-rail-head{padding:12px 14px;border-bottom:1px solid var(--border-lo);display:flex;flex-direction:column;gap:8px;}
.search-box{display:flex;align-items:center;gap:7px;border:1px solid var(--border);border-radius:var(--radius-input);padding:7px 10px;background:var(--surface);}
.search-box input{border:none;background:none;outline:none;font-size:12.5px;width:100%;color:var(--text);}
.search-box svg{width:14px;height:14px;color:var(--text-3);flex-shrink:0;}
.chip-row{display:flex;gap:6px;flex-wrap:wrap;}
.chip{font-size:11px;font-weight:700;padding:4px 10px;border-radius:var(--radius-pill);border:1px solid var(--border);color:var(--text-2);background:#fff;}
.chip.active{background:var(--ink);border-color:var(--ink);color:#fff;}
.case-row{padding:12px 14px;border-bottom:1px solid var(--border-lo);cursor:pointer;transition:background .12s ease;animation:rowStagger .3s ease both;}
.case-row:hover{background:var(--surface);}
.case-row.selected{background:var(--blue-soft);}
.case-row-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px;}
.case-id{font-size:12px;font-weight:700;color:var(--text-2);font-family:ui-monospace,monospace;}
.badge{font-size:10.5px;font-weight:700;padding:3px 9px;border-radius:var(--radius-pill);white-space:nowrap;}
.badge.대기{background:var(--hold-soft);color:var(--hold);}
.badge.분석중{background:var(--blue-soft);color:var(--blue);}
.badge.완료{background:var(--ok-soft);color:var(--ok);}
.badge.보류{background:var(--warn-soft);color:var(--warn);}
.case-row-title{font-size:13.5px;font-weight:700;margin-bottom:2px;}
.case-row-meta{font-size:11.5px;color:var(--text-3);display:flex;gap:8px;}

.detail-panel{flex:1;min-width:0;border:1px solid var(--border);border-radius:var(--radius-card);background:#fff;padding:22px;}
.detail-panel-head{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:16px;padding-bottom:16px;border-bottom:1px solid var(--border-lo);}
.detail-title{font-size:18px;font-weight:800;margin:0 0 4px;}
.detail-sub{font-size:12px;color:var(--text-3);}
.field-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px;margin-bottom:18px;}
.field{background:var(--surface);border-radius:var(--radius-input);padding:10px 12px;}
.field-label{font-size:10.5px;color:var(--text-3);font-weight:700;text-transform:uppercase;letter-spacing:.04em;margin-bottom:3px;}
.field-value{font-size:13.5px;font-weight:600;}
.video-frame{width:100%;height:190px;border-radius:var(--radius-card);background:linear-gradient(135deg,#1a1a1a,#333);position:relative;display:flex;align-items:center;justify-content:center;color:#fff;margin-bottom:18px;overflow:hidden;}
.video-frame::after{content:'';position:absolute;inset:0;background:radial-gradient(circle at 30% 20%,rgba(0,145,255,.25),transparent 60%);}
.video-play{width:46px;height:46px;border-radius:50%;background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.4);display:flex;align-items:center;justify-content:center;z-index:1;}
.status-actions{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:6px;}
.status-btn{border:1px solid var(--border);background:#fff;border-radius:var(--radius-pill);padding:7px 14px;font-size:12.5px;font-weight:700;color:var(--text-2);}
.status-btn:hover{border-color:var(--blue);color:var(--blue);}
.status-btn.disabled{opacity:.35;cursor:not-allowed;}
.status-btn.disabled:hover{border-color:var(--border);color:var(--text-2);}

/* ---- upload view ---- */
.upload-card{border:1px solid var(--border);border-radius:var(--radius-card);padding:24px;background:#fff;max-width:720px;}
.dropzone{border:1.5px dashed #c9cbd0;border-radius:var(--radius-card);padding:34px;text-align:center;background:var(--surface);transition:border-color .15s ease;}
.dropzone.drag{border-color:var(--blue);background:var(--blue-soft);}
.progress-track{width:100%;height:8px;background:var(--border);border-radius:var(--radius-pill);overflow:hidden;margin-top:14px;}
.progress-fill{height:100%;background:var(--blue);border-radius:var(--radius-pill);transform-origin:left;animation:barGrow .6s ease both;}
.arch-steps{display:flex;flex-direction:column;gap:10px;margin-top:20px;}
.arch-step{display:flex;gap:10px;align-items:flex-start;font-size:12.5px;color:var(--text-2);}
.arch-step b{color:var(--text);}
.step-num{width:20px;height:20px;border-radius:50%;background:var(--ink);color:#fff;font-size:10.5px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;}

/* ---- results view ---- */
.results-grid{display:grid;grid-template-columns:1.1fr .9fr;gap:16px;align-items:start;}
.doc-card{border:1px solid var(--border);border-radius:var(--radius-card);background:#fff;padding:18px;}
.endpoint-row{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--border-lo);font-size:12.5px;}
.method{font-size:10px;font-weight:800;padding:2px 8px;border-radius:5px;font-family:ui-monospace,monospace;}
.method.GET{background:var(--blue-soft);color:var(--blue);}
.method.POST{background:var(--ok-soft);color:var(--ok);}
.method.PATCH{background:var(--warn-soft);color:var(--warn);}
.path{font-family:ui-monospace,monospace;color:var(--text-2);}

/* ---- stats ---- */
.stat-cards{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px;}
.stat-mini{border:1px solid var(--border);border-radius:var(--radius-card);padding:16px;background:#fff;}
.stat-mini-label{font-size:11px;color:var(--text-3);font-weight:700;margin-bottom:6px;}
.stat-mini-value{font-size:24px;font-weight:800;}

/* ---- cmdk overlay ---- */
.cmdk-overlay{position:fixed;inset:0;background:rgba(20,20,20,.4);display:flex;align-items:flex-start;justify-content:center;padding-top:14vh;z-index:100;}
.cmdk-modal{width:560px;max-width:90vw;background:#fff;border-radius:12px;border:1px solid var(--border);box-shadow:0 20px 60px rgba(0,0,0,.25);overflow:hidden;animation:cmdkIn .16s ease both;}
.cmdk-input{width:100%;border:none;border-bottom:1px solid var(--border-lo);padding:16px 18px;font-size:15px;outline:none;font-family:inherit;}
.cmdk-results{max-height:320px;overflow-y:auto;padding:8px;}
.cmdk-group-title{font-size:10.5px;font-weight:700;color:var(--text-3);text-transform:uppercase;letter-spacing:.05em;padding:8px 10px 4px;}
.cmdk-item{display:flex;align-items:center;justify-content:space-between;padding:9px 10px;border-radius:7px;font-size:13px;color:var(--text);}
.cmdk-item:hover{background:var(--surface);}

/* ---- toast ---- */
.toast{position:fixed;left:50%;bottom:28px;transform:translateX(-50%);background:var(--ink);color:#fff;padding:12px 20px;border-radius:var(--radius-pill);font-size:13px;font-weight:600;display:flex;align-items:center;gap:8px;z-index:200;animation:toastIn .25s ease both;box-shadow:0 12px 28px rgba(0,0,0,.25);}
.toast-dot{width:8px;height:8px;border-radius:50%;background:#00c07a;animation:pulseDot 1.4s ease infinite;flex-shrink:0;}

@media (max-width:960px){
  .field-grid{grid-template-columns:1fr;}
  .results-grid{grid-template-columns:1fr;}
  .stat-cards{grid-template-columns:repeat(2,1fr);}
}
</style>
</head>
<body>
<div id="app-root"></div>
<script type="text/babel">
const {useState,useEffect,useRef} = React;

const BREADCRUMB = {
  main:'전체 사건', upload:'영상 업로드', detail:'사건 상세 관리', results:'결과물 · API 문서', stats:'통계 개요'
};

const INITIAL_CASES = [
  {id:'INC-2451', vehicle:'승용차 (세단)', place:'서울 강남대로 교차로', time:'2024.03.15 08:42', status:'분석중', assignee:'김민수', videoLen:'02:14', videoSize:'842MB', openid:'wx_8a2f91cc'},
  {id:'INC-2450', vehicle:'화물차 (5톤)', place:'경기 평택 물류단지 진입로', time:'2024.03.14 17:05', status:'대기', assignee:'미배정', videoLen:'01:38', videoSize:'611MB', openid:'wx_2ee01a4d'},
  {id:'INC-2449', vehicle:'승용차 (SUV)', place:'인천 송도 국제대로', time:'2024.03.14 11:20', status:'완료', assignee:'이지은', videoLen:'03:02', videoSize:'1.1GB', openid:'wx_5c7b0912'},
  {id:'INC-2448', vehicle:'이륜차', place:'부산 해운대 좌회전 차로', time:'2024.03.13 22:11', status:'보류', assignee:'박서준', videoLen:'00:52', videoSize:'303MB', openid:'wx_9f14dd20'},
  {id:'INC-2447', vehicle:'승용차 (경차)', place:'대전 유성구 사거리', time:'2024.03.13 09:33', status:'완료', assignee:'김민수', videoLen:'01:59', videoSize:'720MB', openid:'wx_3ba82e77'},
  {id:'INC-2446', vehicle:'버스', place:'광주 첨단지구 정류장 앞', time:'2024.03.12 16:48', status:'분석중', assignee:'이지은', videoLen:'02:40', videoSize:'980MB', openid:'wx_71c0a9fe'},
];

const TRANSITIONS = {대기:['분석중'], 분석중:['완료','보류'], 보류:['분석중'], 완료:[]};

function Sidebar({view, setView, onOpenCmdk, counts}) {
  return (
    <aside className="sidebar">
      <div className="sidebar-brand">
        <div className="brand-mark"><i data-lucide="shield-check" style={{width:14,height:14}}></i></div>
        <div>
          <div className="brand-name">인시던트 렌즈</div>
          <div className="brand-sub">사고분석 접수 콘솔</div>
        </div>
      </div>
      <div className="sidebar-cmdk-hint" onClick={onOpenCmdk}>
        <span>사건 검색 · 빠른 실행</span>
        <span className="kbd">⌘K</span>
      </div>
      <nav className="sidebar-nav">
        <a className={`sidebar-link ${view==='main'?'active':''}`} onClick={()=>setView('main')}>
          <i data-lucide="inbox"></i>
          <span>전체 사건</span>
          <span className="sidebar-count">{counts.total}</span>
        </a>
        <a className={`sidebar-link ${view==='upload'?'active':''}`} onClick={()=>setView('upload')}>
          <i data-lucide="upload-cloud"></i>
          <span>대용량 사고 영상 업로드</span>
        </a>
        <a className={`sidebar-link ${view==='detail'?'active':''}`} onClick={()=>setView('detail')}>
          <i data-lucide="layout-panel-left"></i>
          <span>관리자 사건 목록/상세 및 상태 관리</span>
        </a>
        <a className={`sidebar-link ${view==='results'?'active':''}`} onClick={()=>setView('results')}>
          <i data-lucide="file-check-2"></i>
          <span>결과 영상/PDF 업로드 및 Swagger 문서</span>
        </a>
        <a className={`sidebar-link ${view==='stats'?'active':''}`} onClick={()=>setView('stats')}>
          <i data-lucide="bar-chart-3"></i>
          <span>통계 개요</span>
        </a>
      </nav>
      <div className="sidebar-user">
        <div className="avatar-dot"></div>
        <div>
          <div style={{fontWeight:700,color:'#202020'}}>관리자 · 최운영</div>
          <div style={{color:'#8a8f98'}}>운영팀</div>
        </div>
      </div>
    </aside>
  );
}

function Topbar({view, onOpenCmdk, onSimulate}) {
  return (
    <header className="topbar">
      <div className="breadcrumb">
        <span>인시던트 렌즈</span><span className="divider">/</span><b>{BREADCRUMB[view]}</b>
      </div>
      <div className="topbar-actions">
        <button className="btn-cmdk" onClick={onOpenCmdk}><i data-lucide="command" style={{width:13,height:13}}></i> 명령 또는 검색 <span className="kbd">⌘K</span></button>
        <button className="btn-primary" onClick={onSimulate}><i data-lucide="smartphone" style={{width:14,height:14}}></i> 위챗 로그인 시뮬레이션</button>
      </div>
    </header>
  );
}

function MainView({cases, selected, setSelected, filter, setFilter, search, setSearch, onTransition}) {
  const filtered = cases.filter(c => (filter==='전체' || c.status===filter) && (c.id.toLowerCase().includes(search.toLowerCase()) || c.vehicle.includes(search)));
  const current = cases.find(c => c.id===selected) || filtered[0];

  return (
    <div>
      <div className="view-head">
        <div>
          <h1 className="view-title">위챗 로그인 및 사고 신청 접수</h1>
          <p className="view-desc">위챗 미니프로그램에서 접수된 사고 분석 신청이 openid 세션과 함께 실시간으로 리스트에 반영됩니다. 좌측 리스트에서 사건을 선택하면 우측에 상세 정보가 즉시 표시됩니다.</p>
        </div>
        <div style={{textAlign:'right'}}>
          <div className="stat-hero">{cases.length}</div>
          <div className="stat-hero-cap">이번 주 접수된 사건</div>
        </div>
      </div>

      <div className="md-grid">
        <div className="list-rail">
          <div className="list-rail-head">
            <div className="search-box">
              <i data-lucide="search"></i>
              <input placeholder="사건번호 · 차량유형 검색" value={search} onChange={e=>setSearch(e.target.value)} />
            </div>
            <div className="chip-row">
              {['전체','대기','분석중','완료','보류'].map(s => (
                <span key={s} className={`chip ${filter===s?'active':''}`} onClick={()=>setFilter(s)}>{s}</span>
              ))}
            </div>
          </div>
          <div>
            {filtered.map((c,i) => (
              <div key={c.id} className={`case-row ${selected===c.id?'selected':''}`} style={{animationDelay:`${i*35}ms`}} onClick={()=>setSelected(c.id)}>
                <div className="case-row-top">
                  <span className="case-id">{c.id}</span>
                  <span className={`badge ${c.status}`}>{c.status}</span>
                </div>
                <div className="case-row-title">{c.vehicle}</div>
                <div className="case-row-meta"><span>{c.time}</span><span>·</span><span>{c.assignee}</span></div>
              </div>
            ))}
            {filtered.length===0 && <div style={{padding:24,textAlign:'center',color:'#8a8f98',fontSize:12.5}}>조건에 맞는 사건이 없습니다</div>}
          </div>
        </div>

        {current && (
          <div className="detail-panel">
            <div className="detail-panel-head">
              <div>
                <h2 className="detail-title">{current.id} · {current.vehicle}</h2>
                <div className="detail-sub">openid {current.openid} · 위챗 미니프로그램 접수</div>
              </div>
              <span className={`badge ${current.status}`} style={{fontSize:12,padding:'5px 12px'}}>{current.status}</span>
            </div>
            <div className="field-grid">
              <div className="field"><div className="field-label">발생 일시</div><div className="field-value">{current.time}</div></div>
              <div className="field"><div className="field-label">발생 장소</div><div className="field-value">{current.place}</div></div>
              <div className="field"><div className="field-label">담당자</div><div className="field-value">{current.assignee}</div></div>
              <div className="field"><div className="field-label">영상 정보</div><div className="field-value">{current.videoLen} · {current.videoSize}</div></div>
            </div>
            <div className="video-frame">
              <div className="video-play"><i data-lucide="play" style={{width:18,height:18,color:'#fff'}}></i></div>
            </div>
            <div className="field-label" style={{marginBottom:8}}>상태 전이 (사건 상태 관리)</div>
            <div className="status-actions">
              {['대기','분석중','완료','보류'].map(s => {
                const allowed = TRANSITIONS[current.status].includes(s) || s===current.status;
                return (
                  <button key={s} className={`status-btn ${allowed?'':'disabled'}`}
                    onClick={()=> allowed && s!==current.status && onTransition(current.id, s)}>
                    {s==='대기' && <i data-lucide="clock-3" style={{width:12,height:12}}></i>}
                    {s==='분석중' && <i data-lucide="loader-circle" style={{width:12,height:12}}></i>}
                    {s==='완료' && <i data-lucide="check-circle-2" style={{width:12,height:12}}></i>}
                    {s==='보류' && <i data-lucide="pause-circle" style={{width:12,height:12}}></i>} {s}
                  </button>
                );
              })}
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

function UploadView({onSimulateUpload, uploadPct, uploading}) {
  const [drag, setDrag] = useState(false);
  return (
    <div>
      <div className="view-head">
        <div>
          <h1 className="view-title">대용량 사고 영상 업로드</h1>
          <p className="view-desc">Presigned URL 기반 업로드 아키텍처로 클라이언트가 Tencent COS에 직접 전송하고, 서버는 URL 발급과 완료 콜백만 처리해 대용량 영상도 서버 부하 없이 처리합니다.</p>
        </div>
      </div>
      <div className="upload-card">
        <div className={`dropzone ${drag?'drag':''}`}
          onDragOver={e=>{e.preventDefault();setDrag(true);}}
          onDragLeave={()=>setDrag(false)}
          onDrop={e=>{e.preventDefault();setDrag(false);onSimulateUpload();}}>
          <i data-lucide="cloud-upload" style={{width:32,height:32,color:'#0091ff'}}></i>
          <div style={{fontWeight:700,marginTop:10,fontSize:14}}>사고 영상을 이 영역에 드래그하거나 클릭해 업로드</div>
          <div style={{fontSize:12,color:'#8a8f98',marginTop:4}}>MP4 · 최대 4GB · Presigned PUT 직접 전송</div>
          <button className="btn-primary" style={{margin:'16px auto 0'}} onClick={onSimulateUpload} disabled={uploading}>
            <i data-lucide="upload" style={{width:13,height:13}}></i> {uploading ? '업로드 중...' : '영상 업로드 시작'}
          </button>
          {uploading && (
            <div className="progress-track"><div className="progress-fill" style={{width:`${uploadPct}%`}}></div></div>
          )}
        </div>
        <div className="arch-steps">
          <div className="arch-step"><span className="step-num">1</span><span><b>Presigned URL 발급</b> — 클라이언트가 업로드 요청 시 서버가 2초 이내 서명된 업로드 URL을 발급합니다</span></div>
          <div className="arch-step"><span className="step-num">2</span><span><b>직접 PUT 전송</b> — 클라이언트가 COS 버킷에 직접 전송해 API 서버를 경유하지 않습니다</span></div>
          <div className="arch-step"><span className="step-num">3</span><span><b>재시도 처리</b> — 네트워크 실패 시 최대 3회 자동 재시도됩니다</span></div>
          <div className="arch-step"><span className="step-num">4</span><span><b>완료 웹훅</b> — 업로드 완료 콜백으로 영상 메타데이터를 추출해 사건에 연결합니다</span></div>
        </div>
      </div>
    </div>
  );
}

function DetailView({cases, selected, setSelected}) {
  const current = cases.find(c => c.id===selected) || cases[0];
  const [tab, setTab] = useState('info');
  return (
    <div>
      <div className="view-head">
        <div>
          <h1 className="view-title">관리자 사건 목록/상세 및 상태 관리</h1>
          <p className="view-desc">전체 사건을 상태별로 필터링하고, cmd+k 커맨드팔레트로 빠르게 검색하며, 신청정보·영상·이력을 탭으로 통합 관리합니다.</p>
        </div>
      </div>
      <div className="md-grid">
        <div className="list-rail">
          <div className="list-rail-head">
            <div className="field-label">전체 사건 ({cases.length})</div>
          </div>
          {cases.map((c,i)=>(
            <div key={c.id} className={`case-row ${selected===c.id?'selected':''}`} style={{animationDelay:`${i*35}ms`}} onClick={()=>setSelected(c.id)}>
              <div className="case-row-top"><span className="case-id">{c.id}</span><span className={`badge ${c.status}`}>{c.status}</span></div>
              <div className="case-row-title">{c.vehicle}</div>
              <div className="case-row-meta"><span>{c.place}</span></div>
            </div>
          ))}
        </div>
        <div className="detail-panel">
          <div className="detail-panel-head">
            <div>
              <h2 className="detail-title">{current.id}</h2>
              <div className="detail-sub">담당자 {current.assignee}</div>
            </div>
          </div>
          <div className="chip-row" style={{marginBottom:16}}>
            {[['info','신청정보'],['video','영상뷰어'],['history','처리이력']].map(([k,label])=>(
              <span key={k} className={`chip ${tab===k?'active':''}`} onClick={()=>setTab(k)}>{label}</span>
            ))}
          </div>
          {tab==='info' && (
            <div className="field-grid">
              <div className="field"><div className="field-label">차량 유형</div><div className="field-value">{current.vehicle}</div></div>
              <div className="field"><div className="field-label">발생 장소</div><div className="field-value">{current.place}</div></div>
              <div className="field"><div className="field-label">발생 일시</div><div className="field-value">{current.time}</div></div>
              <div className="field"><div className="field-label">openid</div><div className="field-value">{current.openid}</div></div>
            </div>
          )}
          {tab==='video' && (
            <div className="video-frame"><div className="video-play"><i data-lucide="play" style={{width:18,height:18,color:'#fff'}}></i></div></div>
          )}
          {tab==='history' && (
            <div>
              {['접수 → 대기','대기 → 분석중 (김민수 배정)', current.status==='완료' ? '분석중 → 완료' : '분석중 진행 중'].map((h,i)=>(
                <div key={i} style={{display:'flex',gap:10,alignItems:'center',padding:'8px 0',borderBottom:'1px solid #f0f0f0',fontSize:12.5}}>
                  <i data-lucide="git-commit-horizontal" style={{width:13,height:13,color:'#8a8f98'}}></i>{h}
                </div>
              ))}
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

function ResultsView({onUploadResult, resultUploaded}) {
  const endpoints = [
    ['POST','/api/v1/incidents','사고 분석 신청 등록'],
    ['GET','/api/v1/incidents','전체 사건 목록 조회'],
    ['GET','/api/v1/incidents/:id','사건 상세 조회'],
    ['PATCH','/api/v1/incidents/:id/status','사건 상태 변경'],
    ['POST','/api/v1/uploads/presign','Presigned URL 발급'],
    ['POST','/api/v1/incidents/:id/result','결과 영상/PDF 업로드'],
    ['GET','/api/v1/incidents/:id/report','결과 보고서 다운로드'],
  ];
  return (
    <div>
      <div className="view-head">
        <div>
          <h1 className="view-title">결과 영상/PDF 업로드 및 Swagger 문서</h1>
          <p className="view-desc">분석 완료 후 결과물을 업로드하면 사건 상태가 자동 전환되고, 전체 API는 Swagger로 문서화되어 중국 현지 프론트엔드 팀이 즉시 연동할 수 있습니다.</p>
        </div>
      </div>
      <div className="results-grid">
        <div className="doc-card">
          <div style={{fontWeight:700,fontSize:14,marginBottom:10,display:'flex',alignItems:'center',gap:8}}><i data-lucide="book-open-check" style={{width:16,height:16}}></i> Swagger API 명세</div>
          {endpoints.map((e,i)=>(
            <div key={i} className="endpoint-row"><span className={`method ${e[0]}`}>{e[0]}</span><span className="path">{e[1]}</span><span style={{color:'#8a8f98',marginLeft:'auto'}}>{e[2]}</span></div>
          ))}
        </div>
        <div className="doc-card">
          <div style={{fontWeight:700,fontSize:14,marginBottom:12,display:'flex',alignItems:'center',gap:8}}><i data-lucide="file-up" style={{width:16,height:16}}></i> 결과물 업로드</div>
          <div className="field" style={{marginBottom:10}}><div className="field-label">사건</div><div className="field-value">INC-2451 · 승용차 (세단)</div></div>
          <button className="btn-primary" style={{width:'100%',justifyContent:'center'}} onClick={onUploadResult}>
            <i data-lucide={resultUploaded?'check':'file-plus-2'} style={{width:14,height:14}}></i> {resultUploaded ? '업로드 완료 · 상태 자동 전환됨' : '결과 영상 + PDF 업로드'}
          </button>
          {resultUploaded && <div style={{marginTop:10,fontSize:12,color:'#00c07a',fontWeight:700}}>사건 상태가 '완료'로 자동 전환되었습니다</div>}
        </div>
      </div>
    </div>
  );
}

function StatsView({cases}) {
  const byStatus = ['대기','분석중','완료','보류'].map(s => ({label:s, count: cases.filter(c=>c.status===s).length}));
  return (
    <div>
      <div className="view-head">
        <div><h1 className="view-title">통계 개요</h1><p className="view-desc">상태별 사건 건수와 처리 현황을 한눈에 확인합니다.</p></div>
      </div>
      <div className="stat-cards">
        {byStatus.map(s => (
          <div key={s.label} className="stat-mini">
            <div className="stat-mini-label">{s.label}</div>
            <div className="stat-mini-value">{s.count}건</div>
          </div>
        ))}
      </div>
      <div className="doc-card">
        <div style={{fontWeight:700,fontSize:13.5,marginBottom:12}}>상태별 분포</div>
        {byStatus.map(s => (
          <div key={s.label} style={{marginBottom:10}}>
            <div style={{display:'flex',justifyContent:'space-between',fontSize:12,marginBottom:4,color:'#5a5f68'}}><span>{s.label}</span><span>{s.count}</span></div>
            <div style={{height:8,background:'#f0f0f0',borderRadius:99,overflow:'hidden'}}>
              <div style={{height:'100%',width:`${(s.count/cases.length)*100}%`,background:'#0091ff',borderRadius:99,transformOrigin:'left',animation:'barGrow .6s ease both'}}></div>
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}

function CmdkOverlay({onClose, cases, setSelected, setView}) {
  const [q, setQ] = useState('');
  const results = cases.filter(c => c.id.toLowerCase().includes(q.toLowerCase()) || c.vehicle.includes(q));
  return (
    <div className="cmdk-overlay" onClick={onClose}>
      <div className="cmdk-modal" onClick={e=>e.stopPropagation()}>
        <input className="cmdk-input" autoFocus placeholder="명령 또는 사건번호 검색…" value={q} onChange={e=>setQ(e.target.value)} />
        <div className="cmdk-results">
          <div className="cmdk-group-title">최근 사건</div>
          {(q ? results : cases.slice(0,4)).map(c => (
            <div key={c.id} className="cmdk-item" onClick={()=>{setSelected(c.id);setView('main');onClose();}}>
              <span>{c.id} · {c.vehicle}</span><span className="kbd">⏎</span>
            </div>
          ))}
          <div className="cmdk-group-title">바로가기</div>
          <div className="cmdk-item" onClick={()=>{setView('upload');onClose();}}><span>영상 업로드 화면 열기</span><span className="kbd">⏎</span></div>
          <div className="cmdk-item" onClick={()=>{setView('results');onClose();}}><span>Swagger 문서 열기</span><span className="kbd">⏎</span></div>
        </div>
      </div>
    </div>
  );
}

function App() {
  const [view, setView] = useState('main');
  const [cases, setCases] = useState(INITIAL_CASES);
  const [selected, setSelected] = useState(INITIAL_CASES[0].id);
  const [filter, setFilter] = useState('전체');
  const [search, setSearch] = useState('');
  const [cmdkOpen, setCmdkOpen] = useState(false);
  const [toast, setToast] = useState(null);
  const [uploading, setUploading] = useState(false);
  const [uploadPct, setUploadPct] = useState(0);
  const [resultUploaded, setResultUploaded] = useState(false);

  useEffect(() => {
    const handler = e => {
      if ((e.metaKey || e.ctrlKey) && e.key.toLowerCase()==='k') { e.preventDefault(); setCmdkOpen(true); }
      if (e.key === 'Escape') setCmdkOpen(false);
    };
    window.addEventListener('keydown', handler);
    return () => window.removeEventListener('keydown', handler);
  }, []);

  useEffect(() => { lucide.createIcons(); });

  function showToast(msg) {
    setToast(msg);
    setTimeout(()=>setToast(null), 2600);
  }

  function simulateWechatLogin() {
    const id = `INC-${2452 + Math.floor(Math.random()*50)}`;
    const openid = `wx_${Math.random().toString(16).slice(2,10)}`;
    const newCase = {id, vehicle:'승용차 (세단)', place:'서울 마포구 합정역 사거리', time:'2024.03.16 09:12', status:'대기', assignee:'미배정', videoLen:'01:20', videoSize:'455MB', openid};
    setCases(prev => [newCase, ...prev]);
    setSelected(id);
    setView('main');
    showToast(`위챗 로그인 완료 (${openid}) · 신규 사고 신청이 접수되었습니다`);
  }

  function handleTransition(id, next) {
    setCases(prev => prev.map(c => c.id===id ? {...c, status: next} : c));
    showToast(`${id} 상태가 '${next}'(으)로 변경되었습니다`);
  }

  function simulateUpload() {
    setUploading(true);
    setUploadPct(0);
    let pct = 0;
    const t = setInterval(() => {
      pct += 18 + Math.random()*10;
      if (pct >= 100) {
        pct = 100;
        clearInterval(t);
        setUploading(false);
        showToast('영상 업로드가 완료되어 사건에 연결되었습니다');
      }
      setUploadPct(Math.min(pct,100));
    }, 260);
  }

  function uploadResult() {
    setResultUploaded(true);
    showToast('결과 영상/PDF가 업로드되어 사건이 완료로 전환되었습니다');
  }

  const counts = {total: cases.length};

  return (
    <div className="app-shell" data-archetype="linear-sidebar-cmdk">
      <Sidebar view={view} setView={setView} onOpenCmdk={()=>setCmdkOpen(true)} counts={counts} />
      <div className="main-wrap">
        <Topbar view={view} onOpenCmdk={()=>setCmdkOpen(true)} onSimulate={simulateWechatLogin} />
        <div className="content" key={view}>
          {view==='main' && <MainView cases={cases} selected={selected} setSelected={setSelected} filter={filter} setFilter={setFilter} search={search} setSearch={setSearch} onTransition={handleTransition} />}
          {view==='upload' && <UploadView onSimulateUpload={simulateUpload} uploadPct={uploadPct} uploading={uploading} />}
          {view==='detail' && <DetailView cases={cases} selected={selected} setSelected={setSelected} />}
          {view==='results' && <ResultsView onUploadResult={uploadResult} resultUploaded={resultUploaded} />}
          {view==='stats' && <StatsView cases={cases} />}
        </div>
      </div>
      {cmdkOpen && <CmdkOverlay onClose={()=>setCmdkOpen(false)} cases={cases} setSelected={setSelected} setView={setView} />}
      {toast && <div className="toast"><span className="toast-dot"></span>{toast}</div>}
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('app-root'));
root.render(<App />);
</script>
</body>
</html>
