<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>인시던트 플로우 — 사고분석 운영 통합 플랫폼</title>
<link rel="preconnect" href="https://fastly.jsdelivr.net">
<link rel="stylesheet" as="style" crossorigin href="https://fastly.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://unpkg.com/prop-types/prop-types.min.js"></script>
<script src="https://unpkg.com/react-is@18/umd/react-is.production.min.js"></script>
<script src="https://unpkg.com/recharts@2/umd/Recharts.js"></script>
<link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/regular/style.css">
<link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/fill/style.css">
<style>
:root{
  --primary:#5683da;
  --primary-deep:#3f68c2;
  --primary-soft:#ecf1fc;
  --accent:#ff8964;
  --accent-soft:#fff0ea;
  --bg:#ffffff;
  --surface:#f4f5f8;
  --surface-2:#e5e5e7;
  --border:#e3e5ea;
  --text:#090a0c;
  --text-2:#4b4d54;
  --text-3:#95979e;
  --ok:#1ea36f;
  --ok-soft:#e6f7ef;
  --warn:#e0a028;
  --warn-soft:#fdf3e0;
  --hold:#95979e;
  --hold-soft:#eeeef0;
  --radius-card:16px;
  --radius-pill:9999px;
  --shadow-card:0 2px 10px rgba(20,25,45,.06);
  --shadow-elevated:0 14px 32px rgba(63,104,194,.16);
}
*{box-sizing:border-box;}
html,body{width:100%;margin:0;padding:0;}
body{
  font-family:'Pretendard',-apple-system,BlinkMacSystemFont,sans-serif;
  background:var(--bg);
  color:var(--text);
  -webkit-font-smoothing:antialiased;
  letter-spacing:-0.01em;
}
#app-root{width:100%;min-height:100vh;}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit;}
input,select,textarea{font-family:inherit;}
a{text-decoration:none;color:inherit;cursor:pointer;}
::-webkit-scrollbar{height:8px;width:8px;}
::-webkit-scrollbar-thumb{background:#d3d7e0;border-radius:8px;}

@keyframes fadeInUp{from{opacity:0;transform:translateY(14px);}to{opacity:1;transform:translateY(0);}}
@keyframes cardStagger{from{opacity:0;transform:translateY(10px) scale(.97);}to{opacity:1;transform:translateY(0) scale(1);}}
@keyframes glowPulse{0%{box-shadow:0 0 0 0 rgba(255,137,100,.35);}70%{box-shadow:0 0 0 10px rgba(255,137,100,0);}100%{box-shadow:0 0 0 0 rgba(255,137,100,0);}}
@keyframes toastIn{from{opacity:0;transform:translate(-50%,14px);}to{opacity:1;transform:translate(-50%,0);}}
@keyframes barGrow{from{transform:scaleX(0);}to{transform:scaleX(1);}}
@keyframes auroraShift{0%{background-position:0% 50%;}50%{background-position:100% 50%;}100%{background-position:0% 50%;}}

.app-shell{width:100%;min-height:100vh;display:flex;flex-direction:column;}

/* ---- topnav-hero ---- */
.topnav{width:100%;height:64px;flex-shrink:0;display:flex;align-items:center;justify-content:space-between;padding:0 28px;
  border-bottom:1px solid var(--border);background:rgba(255,255,255,.92);backdrop-filter:blur(8px);position:sticky;top:0;z-index:30;}
.tn-brand{display:flex;align-items:center;gap:10px;font-weight:800;font-size:15px;letter-spacing:-0.02em;}
.tn-mark{width:30px;height:30px;border-radius:10px;background:linear-gradient(135deg,var(--primary),var(--accent));display:flex;align-items:center;justify-content:center;color:#fff;}
.tn-links{display:flex;align-items:center;gap:4px;}
.tn-link{padding:9px 14px;border-radius:var(--radius-pill);font-size:13px;font-weight:600;color:var(--text-2);display:flex;align-items:center;gap:6px;}
.tn-link:hover{background:var(--surface);color:var(--text);}
.tn-link.active{background:var(--primary);color:#fff;}
.tn-actions{display:flex;align-items:center;gap:10px;}
.tn-avatar{width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,var(--primary),var(--accent));flex-shrink:0;}

.hero-band{width:100%;padding:26px 28px 20px;background:linear-gradient(120deg,var(--primary-soft),#fff 60%,var(--accent-soft));background-size:200% 200%;animation:auroraShift 12s ease infinite;border-bottom:1px solid var(--border);}
.hero-inner{max-width:1280px;margin:0 auto;display:flex;align-items:flex-end;justify-content:space-between;flex-wrap:wrap;gap:16px;}
.hero-title{font-size:44px;font-weight:800;letter-spacing:-0.03em;margin:0 0 6px;}
.hero-sub{font-size:13px;color:var(--text-2);max-width:520px;line-height:1.55;}
.hero-stat{text-align:right;}
.hero-stat-num{font-size:38px;font-weight:800;letter-spacing:-0.03em;background:linear-gradient(120deg,var(--primary),var(--accent));-webkit-background-clip:text;background-clip:text;color:transparent;}
.hero-stat-cap{font-size:11.5px;color:var(--text-3);}

.main{flex:1;width:100%;padding:24px 28px 40px;max-width:1440px;margin:0 auto;animation:fadeInUp .35s ease both;}

/* ---- swimlane filter (composition region) ---- */
.swimlane{display:flex;align-items:center;gap:10px;margin-bottom:18px;flex-wrap:wrap;background:var(--surface);border-radius:var(--radius-pill);padding:8px 8px 8px 16px;}
.swimlane-label{font-size:12px;font-weight:700;color:var(--text-2);}
.swim-select{border:1px solid var(--border);background:#fff;border-radius:var(--radius-pill);padding:6px 14px;font-size:12.5px;color:var(--text);}
.swim-chip{font-size:12px;font-weight:700;padding:6px 14px;border-radius:var(--radius-pill);border:1px solid var(--border);background:#fff;color:var(--text-2);}
.swim-chip.active{background:var(--text);color:#fff;border-color:var(--text);}
.new-btn{margin-left:auto;background:var(--primary);color:#fff;border-radius:var(--radius-pill);padding:8px 16px;font-size:12.5px;font-weight:700;display:flex;align-items:center;gap:6px;box-shadow:var(--shadow-elevated);}
.new-btn:hover{background:var(--primary-deep);}

/* ---- kanban board (archetype signature) ---- */
.board{display:flex;gap:18px;overflow-x:auto;padding-bottom:12px;width:100%;}
.column{flex:0 0 280px;background:var(--surface);border-radius:var(--radius-card);padding:14px;display:flex;flex-direction:column;gap:12px;min-height:120px;transition:background .15s ease;}
.column.drop-hover{background:var(--primary-soft);}
.col-header{display:flex;align-items:center;justify-content:space-between;font-size:13px;font-weight:800;padding:2px 4px;}
.count{font-size:11px;font-weight:800;background:#fff;border:1px solid var(--border);border-radius:var(--radius-pill);padding:2px 10px;}
.card{background:#fff;border-radius:var(--radius-card);padding:14px;box-shadow:var(--shadow-card);cursor:grab;animation:cardStagger .3s ease both;transition:transform .18s ease,box-shadow .18s ease;}
.card:hover{transform:translateY(-3px) scale(1.015);box-shadow:var(--shadow-elevated);}
.card.dragging{opacity:.4;}
.card-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;}
.tag{font-size:10.5px;font-weight:700;padding:3px 9px;border-radius:var(--radius-pill);background:var(--primary-soft);color:var(--primary-deep);}
.priority-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;}
.priority-dot.긴급{background:var(--accent);animation:glowPulse 1.8s ease infinite;}
.priority-dot.일반{background:#c9cdd8;}
.card-title{font-size:13.5px;font-weight:700;margin-bottom:10px;line-height:1.4;}
.card-meta{display:flex;align-items:center;gap:8px;}
.avatar{width:24px;height:24px;border-radius:50%;background:linear-gradient(135deg,var(--primary),var(--accent));display:flex;align-items:center;justify-content:center;font-size:10px;color:#fff;font-weight:800;flex-shrink:0;}
.card-meta-name{font-size:11.5px;color:var(--text-2);}
.move-btn{margin-left:auto;width:24px;height:24px;border-radius:50%;background:var(--surface-2);display:flex;align-items:center;justify-content:center;}
.move-btn:hover{background:var(--primary);color:#fff;}

/* ---- assignment ---- */
.section-head{margin-bottom:18px;}
.section-title{font-size:22px;font-weight:800;letter-spacing:-0.02em;margin:0 0 4px;}
.section-desc{font-size:13px;color:var(--text-2);max-width:600px;line-height:1.55;}
.assign-grid{display:grid;grid-template-columns:1.2fr .8fr;gap:18px;align-items:start;}
.assign-row{display:flex;align-items:center;gap:12px;background:#fff;border-radius:var(--radius-card);padding:14px 16px;box-shadow:var(--shadow-card);margin-bottom:10px;}
.assign-select{margin-left:auto;border:1px solid var(--border);border-radius:var(--radius-pill);padding:6px 12px;font-size:12px;background:var(--surface);}
.audit-card{background:#fff;border-radius:var(--radius-card);padding:18px;box-shadow:var(--shadow-card);}
.audit-item{display:flex;gap:10px;padding:9px 0;border-bottom:1px solid var(--border);font-size:12px;color:var(--text-2);}
.audit-item:last-child{border-bottom:none;}

/* ---- insights ---- */
.insight-grid{display:grid;grid-template-columns:1.3fr .7fr;gap:18px;}
.chart-card{background:#fff;border-radius:var(--radius-card);padding:20px;box-shadow:var(--shadow-card);}
.chart-title{font-size:13.5px;font-weight:800;margin-bottom:14px;display:flex;align-items:center;gap:8px;}
.kpi-mini{display:flex;flex-direction:column;gap:12px;}
.kpi-mini-item{background:#fff;border-radius:var(--radius-card);padding:16px;box-shadow:var(--shadow-card);}
.kpi-mini-label{font-size:11px;color:var(--text-3);font-weight:700;margin-bottom:6px;}
.kpi-mini-value{font-size:26px;font-weight:800;}

/* ---- clients ---- */
.client-table{width:100%;border-collapse:collapse;background:#fff;border-radius:var(--radius-card);overflow:hidden;box-shadow:var(--shadow-card);}
.client-table th{text-align:left;font-size:11px;color:var(--text-3);font-weight:700;padding:12px 16px;background:var(--surface);text-transform:uppercase;letter-spacing:.03em;}
.client-table td{padding:13px 16px;font-size:12.5px;border-top:1px solid var(--border);}
.key-pill{font-family:ui-monospace,monospace;background:var(--surface);padding:4px 10px;border-radius:8px;font-size:11.5px;}
.revoke-btn{background:var(--accent-soft);color:#c8532e;border-radius:var(--radius-pill);padding:6px 14px;font-size:11.5px;font-weight:700;}
.revoke-btn:hover{background:#ffe0d3;}
.revoke-btn.revoked{background:var(--hold-soft);color:var(--hold);cursor:default;}
.log-card{background:#fff;border-radius:var(--radius-card);padding:18px;box-shadow:var(--shadow-card);margin-top:16px;}
.log-row{display:flex;justify-content:space-between;font-size:12px;color:var(--text-2);padding:8px 0;border-bottom:1px solid var(--border);}
.log-row:last-child{border-bottom:none;}

/* ---- toast ---- */
.toast{position:fixed;left:50%;bottom:28px;transform:translateX(-50%);background:var(--text);color:#fff;padding:13px 22px;border-radius:var(--radius-pill);font-size:13px;font-weight:600;display:flex;align-items:center;gap:8px;z-index:200;animation:toastIn .3s ease both;box-shadow:0 16px 32px rgba(0,0,0,.25);}

@media (max-width:960px){
  .assign-grid,.insight-grid{grid-template-columns:1fr;}
}
</style>
</head>
<body>
<div id="app-root"></div>
<script type="text/babel">
const {useState,useEffect} = React;
const {BarChart,Bar,XAxis,YAxis,CartesianGrid,Tooltip,ResponsiveContainer,LineChart,Line,Legend} = Recharts;

const NAV_ITEMS = [
  {id:'main', label:'사건 칸반 보드 및 드래그 상태 전이', icon:'ph-kanban'},
  {id:'assignment', label:'담당자 배정 및 스윔레인 필터', icon:'ph-users-three'},
  {id:'insights', label:'운영 통계 및 처리 시간 분석', icon:'ph-chart-line-up'},
  {id:'clients', label:'다중 클라이언트 API 키 및 연동 관리', icon:'ph-key'},
];

const HERO_TEXT = {
  main:{title:'사건 칸반 보드', sub:'전체 사고 분석 사건을 대기 → 분석중 → 완료/보류 흐름으로 시각화하고, 카드를 드래그하거나 이동 버튼으로 상태를 전이합니다.'},
  assignment:{title:'담당자 배정 & 스윔레인', sub:'담당 분석자를 배정하고 우선순위 · 담당자별 스윔레인으로 보드 뷰를 전환합니다.'},
  insights:{title:'운영 통계', sub:'상태별 사건 건수와 평균 처리 소요일을 집계해 처리 병목을 파악합니다.'},
  clients:{title:'클라이언트 연동 관리', sub:'중국 현지 클라이언트사별 API 키와 요청 로그를 통합 관리합니다.'},
};

const INITIAL_CARDS = [
  {id:'INC-3301', title:'세단 · 강남대로 교차로 추돌', status:'대기', assignee:'김민수', priority:'긴급', tag:'승용차'},
  {id:'INC-3298', title:'화물차 · 평택 물류단지 접촉사고', status:'대기', assignee:'미배정', priority:'일반', tag:'화물차'},
  {id:'INC-3295', title:'SUV · 송도 국제대로 급제동', status:'분석중', assignee:'이지은', priority:'긴급', tag:'승용차'},
  {id:'INC-3290', title:'이륜차 · 해운대 좌회전 충돌', status:'분석중', assignee:'박서준', priority:'일반', tag:'이륜차'},
  {id:'INC-3288', title:'버스 · 첨단지구 정류장 접촉', status:'분석중', assignee:'김민수', priority:'일반', tag:'버스'},
  {id:'INC-3281', title:'경차 · 유성구 사거리 신호위반', status:'완료', assignee:'이지은', priority:'일반', tag:'승용차'},
  {id:'INC-3277', title:'세단 · 야간 후방추돌 분석완료', status:'완료', assignee:'박서준', priority:'긴급', tag:'승용차'},
  {id:'INC-3270', title:'화물차 · 적재불량 전도사고', status:'보류', assignee:'김민수', priority:'일반', tag:'화물차'},
];

const STATUS_ORDER = ['대기','분석중','완료','보류'];
const NEXT_STATUS = {대기:'분석중', 분석중:'완료', 완료:'완료', 보류:'분석중'};

function initials(name){ return name==='미배정' ? '?' : name.slice(0,1); }

function Topnav({view, setView, onOpenNotifications}) {
  return (
    <header className="topnav">
      <div className="tn-brand"><div className="tn-mark"><i className="ph ph-fill ph-waveform"></i></div>인시던트 플로우</div>
      <nav className="tn-links">
        {NAV_ITEMS.map(item => (
          <a key={item.id} className={`tn-link ${view===item.id?'active':''}`} onClick={()=>setView(item.id)}>
            <i className={`ph ${item.icon}`}></i>{item.label}
          </a>
        ))}
      </nav>
      <div className="tn-actions">
        <button style={{width:34,height:34,borderRadius:'50%',background:'#f4f5f8',display:'flex',alignItems:'center',justifyContent:'center'}} onClick={onOpenNotifications} title="알림 보기"><i className="ph ph-bell"></i></button>
        <div className="tn-avatar"></div>
      </div>
    </header>
  );
}

function HeroBand({view, cardsCount}) {
  const h = HERO_TEXT[view];
  return (
    <div className="hero-band">
      <div className="hero-inner">
        <div>
          <h1 className="hero-title">{h.title}</h1>
          <p className="hero-sub">{h.sub}</p>
        </div>
        <div className="hero-stat">
          <div className="hero-stat-num">{cardsCount}</div>
          <div className="hero-stat-cap">운영 중인 전체 사건</div>
        </div>
      </div>
    </div>
  );
}

function Card({c, onDragStart, onMoveNext, dragging}) {
  return (
    <div className={`card ${dragging?'dragging':''}`} draggable onDragStart={()=>onDragStart(c.id)}>
      <div className="card-top">
        <span className="tag">{c.tag}</span>
        <span className={`priority-dot ${c.priority}`} title={c.priority}></span>
      </div>
      <div className="card-title">{c.title}</div>
      <div className="card-meta">
        <div className="avatar">{initials(c.assignee)}</div>
        <span className="card-meta-name">{c.assignee}</span>
        {c.status!=='완료' && (
          <button className="move-btn" title="다음 단계로 이동" onClick={()=>onMoveNext(c.id)}>
            <i className="ph ph-arrow-right" style={{fontSize:12}}></i>
          </button>
        )}
      </div>
    </div>
  );
}

function BoardView({cards, setCards, showToast, onCreateCase}) {
  const [dragId, setDragId] = useState(null);
  const [dragOverCol, setDragOverCol] = useState(null);
  const [priorityFilter, setPriorityFilter] = useState('전체');
  const [assigneeFilter, setAssigneeFilter] = useState('전체');

  const assignees = ['전체', ...Array.from(new Set(cards.map(c=>c.assignee)))];
  const visible = cards.filter(c => (priorityFilter==='전체'||c.priority===priorityFilter) && (assigneeFilter==='전체'||c.assignee===assigneeFilter));

  function moveNext(id) {
    setCards(prev => prev.map(c => c.id===id ? {...c, status: NEXT_STATUS[c.status]} : c));
    const target = cards.find(c=>c.id===id);
    showToast(`${id} 카드가 '${NEXT_STATUS[target.status]}' 컬럼으로 이동했습니다`);
  }

  function handleDrop(status) {
    if (!dragId) return;
    setCards(prev => prev.map(c => c.id===dragId ? {...c, status} : c));
    showToast(`${dragId} 카드를 '${status}' 컬럼으로 이동했습니다`);
    setDragId(null);
    setDragOverCol(null);
  }

  return (
    <div>
      <div className="swimlane">
        <span className="swimlane-label">스윔레인 필터</span>
        <select className="swim-select" value={assigneeFilter} onChange={e=>setAssigneeFilter(e.target.value)}>
          {assignees.map(a=><option key={a} value={a}>{a==='전체'?'담당자 전체':a}</option>)}
        </select>
        {['전체','긴급','일반'].map(p => (
          <span key={p} className={`swim-chip ${priorityFilter===p?'active':''}`} onClick={()=>setPriorityFilter(p)}>{p}</span>
        ))}
        <button className="new-btn" onClick={onCreateCase}><i className="ph ph-plus"></i> 새 사건 등록</button>
      </div>
      <div className="board">
        <section className={`column column-waiting ${dragOverCol==='대기'?'drop-hover':''}`}
          onDragOver={e=>{e.preventDefault();setDragOverCol('대기');}}
          onDragLeave={()=>setDragOverCol(null)}
          onDrop={()=>handleDrop('대기')}>
          <div className="col-header"><span>대기</span><span className="count">{visible.filter(c=>c.status==='대기').length}</span></div>
          {visible.filter(c=>c.status==='대기').map(c => (
            <Card key={c.id} c={c} dragging={dragId===c.id} onDragStart={setDragId} onMoveNext={moveNext} />
          ))}
          {visible.filter(c=>c.status==='대기').length===0 && <div style={{fontSize:11.5,color:'#95979e',textAlign:'center',padding:'12px 0'}}>카드 없음</div>}
        </section>
        <section className={`column column-analyzing ${dragOverCol==='분석중'?'drop-hover':''}`}
          onDragOver={e=>{e.preventDefault();setDragOverCol('분석중');}}
          onDragLeave={()=>setDragOverCol(null)}
          onDrop={()=>handleDrop('분석중')}>
          <div className="col-header"><span>분석중</span><span className="count">{visible.filter(c=>c.status==='분석중').length}</span></div>
          {visible.filter(c=>c.status==='분석중').map(c => (
            <Card key={c.id} c={c} dragging={dragId===c.id} onDragStart={setDragId} onMoveNext={moveNext} />
          ))}
          {visible.filter(c=>c.status==='분석중').length===0 && <div style={{fontSize:11.5,color:'#95979e',textAlign:'center',padding:'12px 0'}}>카드 없음</div>}
        </section>
        <section className={`column column-done ${dragOverCol==='완료'?'drop-hover':''}`}
          onDragOver={e=>{e.preventDefault();setDragOverCol('완료');}}
          onDragLeave={()=>setDragOverCol(null)}
          onDrop={()=>handleDrop('완료')}>
          <div className="col-header"><span>완료</span><span className="count">{visible.filter(c=>c.status==='완료').length}</span></div>
          {visible.filter(c=>c.status==='완료').map(c => (
            <Card key={c.id} c={c} dragging={dragId===c.id} onDragStart={setDragId} onMoveNext={moveNext} />
          ))}
          {visible.filter(c=>c.status==='완료').length===0 && <div style={{fontSize:11.5,color:'#95979e',textAlign:'center',padding:'12px 0'}}>카드 없음</div>}
        </section>
        <section className={`column column-hold ${dragOverCol==='보류'?'drop-hover':''}`}
          onDragOver={e=>{e.preventDefault();setDragOverCol('보류');}}
          onDragLeave={()=>setDragOverCol(null)}
          onDrop={()=>handleDrop('보류')}>
          <div className="col-header"><span>보류</span><span className="count">{visible.filter(c=>c.status==='보류').length}</span></div>
          {visible.filter(c=>c.status==='보류').map(c => (
            <Card key={c.id} c={c} dragging={dragId===c.id} onDragStart={setDragId} onMoveNext={moveNext} />
          ))}
          {visible.filter(c=>c.status==='보류').length===0 && <div style={{fontSize:11.5,color:'#95979e',textAlign:'center',padding:'12px 0'}}>카드 없음</div>}
        </section>
      </div>
    </div>
  );
}

function AssignmentView({cards, setCards, showToast}) {
  const analysts = ['김민수','이지은','박서준'];
  const [log, setLog] = useState([
    {who:'김민수', what:'INC-3301 배정', at:'10분 전'},
    {who:'이지은', what:'INC-3295 배정', at:'42분 전'},
    {who:'박서준', what:'INC-3290 배정', at:'1시간 전'},
  ]);
  function assign(id, name) {
    setCards(prev => prev.map(c => c.id===id ? {...c, assignee:name} : c));
    setLog(prev => [{who:name, what:`${id} 배정`, at:'방금 전'}, ...prev]);
    showToast(`${id}이(가) ${name}에게 배정되었습니다`);
  }
  return (
    <div>
      <div className="section-head">
        <h1 className="section-title">담당자 배정 및 스윔레인 필터</h1>
        <p className="section-desc">사건을 담당 분석자에게 배정하고, 배정 이력을 감사 로그로 추적합니다. 필터 조합은 URL 쿼리와 동기화됩니다.</p>
      </div>
      <div className="assign-grid">
        <div>
          {cards.map(c => (
            <div key={c.id} className="assign-row">
              <div className="avatar">{initials(c.assignee)}</div>
              <div>
                <div style={{fontWeight:700,fontSize:13}}>{c.id}</div>
                <div style={{fontSize:11.5,color:'#95979e'}}>{c.title}</div>
              </div>
              <select className="assign-select" value={c.assignee} onChange={e=>assign(c.id, e.target.value)}>
                <option value="미배정">미배정</option>
                {analysts.map(a=><option key={a} value={a}>{a}</option>)}
              </select>
            </div>
          ))}
        </div>
        <div className="audit-card">
          <div style={{fontWeight:800,fontSize:13.5,marginBottom:10,display:'flex',alignItems:'center',gap:8}}><i className="ph ph-clock-counter-clockwise"></i> 배정 이력 감사 로그</div>
          {log.map((l,i)=>(
            <div key={i} className="audit-item"><i className="ph ph-user-circle" style={{fontSize:16}}></i><span><b>{l.who}</b> · {l.what}</span><span style={{marginLeft:'auto',color:'#95979e'}}>{l.at}</span></div>
          ))}
        </div>
      </div>
    </div>
  );
}

function InsightsView({cards}) {
  const data = STATUS_ORDER.map(s => ({status:s, 건수: cards.filter(c=>c.status===s).length, 평균소요일: {대기:1.2,분석중:2.8,완료:4.1,보류:6.4}[s]}));
  const completed = cards.filter(c=>c.status==='완료').length;
  const rate = Math.round((completed/cards.length)*100);
  return (
    <div>
      <div className="section-head">
        <h1 className="section-title">운영 통계 및 처리 시간 분석</h1>
        <p className="section-desc">PostgreSQL Materialized View로 사전 집계된 상태별·기간별 처리 지표를 확인합니다.</p>
      </div>
      <div className="insight-grid">
        <div className="chart-card">
          <div className="chart-title"><i className="ph ph-chart-bar"></i> 상태별 평균 처리 소요일 (퍼널)</div>
          <div style={{height:280}}>
            <ResponsiveContainer width="100%" height="100%">
              <BarChart data={data}>
                <CartesianGrid strokeDasharray="3 3" stroke="#e3e5ea" />
                <XAxis dataKey="status" tick={{fontSize:12}} />
                <YAxis tick={{fontSize:12}} />
                <Tooltip />
                <Bar dataKey="평균소요일" fill="#5683da" radius={[8,8,0,0]} />
              </BarChart>
            </ResponsiveContainer>
          </div>
        </div>
        <div className="kpi-mini">
          <div className="kpi-mini-item"><div className="kpi-mini-label">완료율</div><div className="kpi-mini-value">{rate}%</div></div>
          <div className="kpi-mini-item"><div className="kpi-mini-label">평균 체류일 (분석중)</div><div className="kpi-mini-value">2.8일</div></div>
          <div className="kpi-mini-item"><div className="kpi-mini-label">배치 갱신</div><div className="kpi-mini-value">1회/일</div></div>
        </div>
      </div>
    </div>
  );
}

function ClientsView({showToast}) {
  const [clients, setClients] = useState([
    {name:'상하이 모빌리티 파트너', key:'sk_live_7f2a...c91d', reqToday:1240, revoked:false},
    {name:'선전 드라이브텍', key:'sk_live_9b4e...2a03', reqToday:812, revoked:false},
    {name:'광저우 세이프로드', key:'sk_live_1c8d...77fe', reqToday:0, revoked:true},
  ]);
  function toggleRevoke(name) {
    setClients(prev => prev.map(c => c.name===name ? {...c, revoked:!c.revoked} : c));
    showToast(`${name}의 API 키가 ${clients.find(c=>c.name===name).revoked ? '재발급' : '회수'}되었습니다`);
  }
  return (
    <div>
      <div className="section-head">
        <h1 className="section-title">다중 클라이언트 API 키 및 연동 관리</h1>
        <p className="section-desc">중국 현지 클라이언트사별 API 키 발급/회수와 Rate Limit, 요청 로그를 통합 관리합니다.</p>
      </div>
      <table className="client-table">
        <thead><tr><th>클라이언트</th><th>API 키</th><th>오늘 요청</th><th>상태</th><th></th></tr></thead>
        <tbody>
          {clients.map(c => (
            <tr key={c.name}>
              <td style={{fontWeight:700}}>{c.name}</td>
              <td><span className="key-pill">{c.key}</span></td>
              <td>{c.reqToday.toLocaleString()}건</td>
              <td>{c.revoked ? <span style={{color:'#95979e'}}>회수됨</span> : <span style={{color:'#1ea36f'}}>활성</span>}</td>
              <td><button className={`revoke-btn ${c.revoked?'revoked':''}`} onClick={()=>toggleRevoke(c.name)}>{c.revoked?'재발급':'키 회수'}</button></td>
            </tr>
          ))}
        </tbody>
      </table>
      <div className="log-card">
        <div style={{fontWeight:800,fontSize:13.5,marginBottom:8,display:'flex',alignItems:'center',gap:8}}><i className="ph ph-list-magnifying-glass"></i> 요청 로그 (Rate Limit 429 포함)</div>
        <div className="log-row"><span>상하이 모빌리티 파트너 · POST /incidents</span><span>200 · 12ms</span></div>
        <div className="log-row"><span>선전 드라이브텍 · GET /incidents/:id</span><span>200 · 8ms</span></div>
        <div className="log-row"><span>선전 드라이브텍 · POST /uploads/presign</span><span style={{color:'#e0a028'}}>429 · 재시도 60s</span></div>
        <div className="log-row"><span>광저우 세이프로드 · GET /incidents</span><span style={{color:'#95979e'}}>403 · 키 회수됨</span></div>
      </div>
    </div>
  );
}

function App() {
  const [view, setView] = useState('main');
  const [cards, setCards] = useState(INITIAL_CARDS);
  const [toast, setToast] = useState(null);

  function showToast(msg) { setToast(msg); setTimeout(()=>setToast(null), 2600); }

  function createCase() {
    const id = `INC-${3302 + Math.floor(Math.random()*90)}`;
    setCards(prev => [{id, title:'세단 · 신규 접수 사건', status:'대기', assignee:'미배정', priority:'일반', tag:'승용차'}, ...prev]);
    showToast(`${id} 사건이 대기 컬럼에 새로 등록되었습니다`);
  }

  return (
    <div className="app-shell" data-archetype="kanban-board">
      <Topnav view={view} setView={setView} onOpenNotifications={()=>showToast('새 알림이 없습니다 · 모든 사건이 정상 처리 중입니다')} />
      <HeroBand view={view} cardsCount={cards.length} />
      <main className="main">
        {view==='main' && <BoardView cards={cards} setCards={setCards} showToast={showToast} onCreateCase={createCase} />}
        {view==='assignment' && <AssignmentView cards={cards} setCards={setCards} showToast={showToast} />}
        {view==='insights' && <InsightsView cards={cards} />}
        {view==='clients' && <ClientsView showToast={showToast} />}
      </main>
      {toast && <div className="toast"><i className="ph ph-check-circle"></i>{toast}</div>}
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('app-root'));
root.render(<App />);
</script>
</body>
</html>
