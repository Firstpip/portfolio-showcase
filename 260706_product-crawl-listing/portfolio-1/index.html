<!DOCTYPE html>
<html lang="ko" data-archetype="airbnb-search-grid">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>크로스보더 상품 리스팅 자동화 콘솔 — 맞춤 구현 데모</title>
<link rel="preconnect" href="https://cdn.jsdelivr.net">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
<link rel="stylesheet" href="https://unpkg.com/@tabler/icons-webfont@2/dist/tabler-icons.min.css">
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
:root{
  --ink:#202020;
  --onyx:#090c1d;
  --carbon:#2a2a2a;
  --slate:#646464;
  --ash:#838383;
  --fog:#b3b3b3;
  --cloud:#d4d4d4;
  --bone:#e8e8e8;
  --mist:#f8f9fa;
  --plaster:#e9ebf0;
  --white:#ffffff;
  --accent:#0091ff;
  --accent-soft:#e6f4ff;
  --mint:#00c07a;
  --mint-soft:#e3f9ef;
  --coral:#ff6363;
  --coral-soft:#ffecec;
  --amber:#f5a623;
  --amber-soft:#fff4e0;
  --shadow-subtle: rgba(0,0,0,.08) 0px 1px 3px 0px, rgba(0,0,0,.06) 0px 1px 2px -1px;
  --shadow-card: rgba(13,21,48,.06) 0px 4px 4px 0px, rgba(13,21,48,.04) 0px 1px 2px 0px;
  --shadow-lift: rgba(9,12,29,.14) 0px 18px 32px -12px, rgba(9,12,29,.08) 0px 4px 10px -4px;
}
*{box-sizing:border-box; margin:0; padding:0;}
html,body{width:100%; min-height:100vh;}
body{
  font-family:'Pretendard', ui-sans-serif, system-ui, sans-serif;
  background:var(--white);
  color:var(--ink);
  -webkit-font-smoothing:antialiased;
  letter-spacing:-0.01em;
}
#root{width:100%;}
button{font-family:inherit; cursor:pointer; border:none; background:none; color:inherit;}
input,select,textarea{font-family:inherit; color:inherit;}
a{color:inherit; text-decoration:none;}
::-webkit-scrollbar{width:8px; height:8px;}
::-webkit-scrollbar-thumb{background:var(--cloud); border-radius:99px;}

@keyframes fadeInScale{from{opacity:0; transform:scale(.96);} to{opacity:1; transform:scale(1);}}
@keyframes slideUpFade{from{opacity:0; transform:translateY(10px);} to{opacity:1; transform:translateY(0);}}
@keyframes toastIn{from{opacity:0; transform:translate(-50%,12px);} to{opacity:1; transform:translate(-50%,0);}}
@keyframes barPulse{0%,100%{opacity:1;} 50%{opacity:.55;}}
@keyframes spinIcon{to{transform:rotate(360deg);}}

.app{width:100%; min-height:100vh; display:flex; flex-direction:column;}

/* ---- search header (archetype signature 1) ---- */
.search-header{position:sticky; top:0; z-index:50; width:100%; background:rgba(255,255,255,.92); backdrop-filter:blur(10px); border-bottom:1px solid var(--bone);}
.header-row{max-width:1280px; margin:0 auto; padding:14px 32px; display:flex; align-items:center; gap:24px;}
.brand{display:flex; align-items:center; gap:8px; font-weight:800; font-size:18px; letter-spacing:-0.03em; flex-shrink:0;}
.brand .ti{font-size:20px; color:var(--accent);}
.search-bar{flex:1; display:flex; align-items:center; background:var(--white); border:1px solid var(--bone); border-radius:9999px; box-shadow:var(--shadow-subtle); padding:6px 6px 6px 20px; gap:0; max-width:640px;}
.search-segment{display:flex; flex-direction:column; padding:2px 16px; min-width:0;}
.segment-label{font-size:11px; font-weight:700; color:var(--ash); letter-spacing:.02em;}
.segment-input{border:none; outline:none; font-size:14px; font-weight:600; color:var(--ink); background:transparent; width:100%;}
.search-divider{width:1px; align-self:stretch; background:var(--bone); margin:2px 0;}
.search-submit{display:flex; align-items:center; gap:6px; background:var(--ink); color:#fff; font-size:13px; font-weight:700; border-radius:9999px; padding:10px 18px; white-space:nowrap;}
.search-submit .ti{font-size:15px;}
.search-submit:hover{background:#000;}
.header-nav{display:flex; align-items:center; gap:4px; flex-shrink:0;}
.nav-pill{font-size:13px; font-weight:600; color:var(--slate); padding:8px 14px; border-radius:9999px; display:flex; align-items:center; gap:6px; white-space:nowrap;}
.nav-pill:hover{background:var(--mist); color:var(--ink);}
.nav-pill.active{background:var(--ink); color:#fff;}
.user-chip{display:flex; align-items:center; gap:8px; padding:6px 12px 6px 6px; border-radius:9999px; background:var(--mist); border:1px solid var(--bone);}
.avatar-dot{width:26px; height:26px; border-radius:9999px; background:linear-gradient(135deg,var(--accent),#66c2ff); display:flex; align-items:center; justify-content:center; font-size:11px; font-weight:700; color:#fff;}

.filter-chips{max-width:1280px; margin:0 auto; padding:0 32px 14px; display:flex; align-items:center; gap:8px; overflow-x:auto;}
.chip{display:flex; align-items:center; gap:6px; padding:8px 16px; border-radius:9999px; border:1px solid var(--bone); font-size:13px; font-weight:600; color:var(--carbon); flex-shrink:0;}
.chip .ti{font-size:15px;}
.chip.active{background:var(--ink); color:#fff; border-color:var(--ink);}
.chip.filter-toggle{background:var(--mist);}

/* ---- main / gallery ---- */
.main{flex:1; width:100%;}
.page-inner{max-width:1280px; margin:0 auto; padding:28px 32px 64px;}

.status-strip{display:flex; align-items:center; gap:20px; background:var(--onyx); color:#fff; border-radius:16px; padding:18px 24px; margin-bottom:28px; box-shadow:var(--shadow-lift);}
.status-strip .dot{width:9px; height:9px; border-radius:99px; background:var(--mint); animation:barPulse 1.4s ease-in-out infinite;}
.status-strip .label{font-size:13px; font-weight:600; color:#c9cbe0;}
.status-strip .value{font-size:15px; font-weight:700;}
.progress-track{flex:1; height:8px; border-radius:99px; background:rgba(255,255,255,.14); overflow:hidden;}
.progress-fill{height:100%; border-radius:99px; background:linear-gradient(90deg,var(--accent),#66c2ff); transition:width .5s ease;}

.section-head{display:flex; align-items:baseline; justify-content:space-between; margin-bottom:16px;}
.section-title{font-size:32px; font-weight:800; letter-spacing:-0.03em;}
.section-sub{font-size:13px; color:var(--ash); font-weight:600;}

.card-grid{display:grid; grid-template-columns:repeat(auto-fill,minmax(260px,1fr)); gap:20px;}
.listing-card{background:#fff; border:1px solid var(--bone); border-radius:12px; overflow:hidden; cursor:pointer; transition:transform .18s ease, box-shadow .18s ease; animation:slideUpFade .4s ease both;}
.listing-card:hover{transform:translateY(-4px); box-shadow:var(--shadow-lift);}
.card-image-wrap{position:relative; aspect-ratio:4/3; overflow:hidden; background:var(--mist);}
.card-image{width:100%; height:100%; object-fit:cover; display:block;}
.card-favorite{position:absolute; top:10px; right:10px; width:30px; height:30px; border-radius:9999px; background:rgba(255,255,255,.92); display:flex; align-items:center; justify-content:center; box-shadow:var(--shadow-subtle);}
.card-favorite .ti{font-size:15px; color:var(--carbon);}
.card-favorite.active .ti{color:var(--coral);}
.card-status-badge{position:absolute; top:10px; left:10px; font-size:11px; font-weight:700; padding:4px 10px; border-radius:9999px;}
.badge-done{background:var(--mint-soft); color:var(--mint);}
.badge-pending{background:var(--amber-soft); color:var(--amber);}
.badge-soldout{background:var(--coral-soft); color:var(--coral);}
.card-body{padding:14px 16px 16px;}
.card-row-1{display:flex; align-items:center; justify-content:space-between; gap:8px;}
.card-title{font-size:15px; font-weight:700; letter-spacing:-0.01em; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}
.card-rating{font-size:13px; font-weight:700; color:var(--carbon); display:flex; align-items:center; gap:3px; flex-shrink:0;}
.card-rating .ti{font-size:13px; color:var(--amber);}
.card-meta{font-size:12.5px; color:var(--ash); font-weight:600;}
.card-row-4{display:flex; align-items:baseline; gap:6px; margin-top:8px;}
.card-price{font-size:16px; font-weight:800;}
.price-unit{font-size:11.5px; color:var(--ash); font-weight:600;}

/* quick-view drawer */
.drawer-backdrop{position:fixed; inset:0; background:rgba(9,12,29,.42); z-index:90; display:flex; justify-content:flex-end; animation:fadeInScale .18s ease;}
.drawer{width:420px; max-width:92vw; height:100%; background:#fff; box-shadow:-24px 0 48px rgba(9,12,29,.18); overflow-y:auto; animation:slideUpFade .22s ease;}
.drawer-head{position:sticky; top:0; background:#fff; border-bottom:1px solid var(--bone); padding:18px 22px; display:flex; align-items:center; justify-content:space-between;}
.drawer-close{width:32px; height:32px; border-radius:9999px; display:flex; align-items:center; justify-content:center; background:var(--mist);}
.drawer-body{padding:22px;}
.drawer-image{width:100%; aspect-ratio:4/3; border-radius:12px; object-fit:cover; margin-bottom:16px;}
.field-row{display:flex; justify-content:space-between; padding:10px 0; border-bottom:1px dashed var(--bone); font-size:13.5px;}
.field-row .k{color:var(--ash); font-weight:600;}
.field-row .v{font-weight:700;}
.opt-pill{display:inline-flex; align-items:center; gap:6px; padding:6px 12px; border-radius:9999px; border:1px solid var(--bone); font-size:12.5px; font-weight:700; margin:4px 6px 0 0;}
.opt-pill.soldout{background:var(--coral-soft); color:var(--coral); border-color:transparent; text-decoration:line-through;}
.opt-pill.instock{background:var(--mint-soft); color:var(--mint); border-color:transparent;}

/* generic buttons */
.btn{display:inline-flex; align-items:center; gap:7px; font-size:13.5px; font-weight:700; border-radius:9999px; padding:10px 18px;}
.btn-primary{background:var(--ink); color:#fff;}
.btn-primary:hover{background:#000;}
.btn-ghost{background:transparent; border:1px solid var(--bone); color:var(--carbon);}
.btn-ghost:hover{border-color:var(--accent); color:var(--accent);}
.btn-accent{background:var(--accent); color:#fff;}
.btn-block{width:100%; justify-content:center;}

/* generic screen shells */
.screen-header{margin-bottom:22px;}
.screen-header h1{font-size:44px; font-weight:800; letter-spacing:-0.03em; margin-bottom:6px;}
.screen-header p{font-size:14px; color:var(--ash); font-weight:500;}

.panel{background:#fff; border:1px solid var(--bone); border-radius:12px; padding:20px;}
.panel + .panel{margin-top:16px;}

/* translation review */
.compare-row{display:grid; grid-template-columns:1fr 1fr auto; gap:16px; padding:16px 0; border-bottom:1px solid var(--bone); align-items:start;}
.compare-row:last-child{border-bottom:none;}
.compare-col .label{font-size:11px; font-weight:700; color:var(--ash); letter-spacing:.03em; margin-bottom:6px;}
.compare-col .text{font-size:13.5px; line-height:1.55;}
.filtered-pill{display:inline-block; background:var(--coral-soft); color:var(--coral); font-size:11px; font-weight:700; padding:3px 9px; border-radius:9999px; margin:6px 4px 0 0;}
.retranslate-btn{display:flex; flex-direction:column; align-items:flex-end; gap:8px;}

/* csv-export */
.calc-grid{display:grid; grid-template-columns:repeat(3,1fr); gap:14px; margin-bottom:18px;}
.calc-field{display:flex; flex-direction:column; gap:6px;}
.calc-field label{font-size:12px; font-weight:700; color:var(--ash);}
.calc-field input, .calc-field select{border:1px solid var(--bone); border-radius:9px; padding:10px 12px; font-size:14px; font-weight:600;}
.preview-table{width:100%; border-collapse:collapse; font-size:13px;}
.preview-table th{text-align:left; font-size:11.5px; font-weight:700; color:var(--ash); padding:8px 10px; border-bottom:1px solid var(--bone);}
.preview-table td{padding:10px; border-bottom:1px solid var(--plaster); font-weight:600;}
.preview-table tr:last-child td{border-bottom:none;}

/* settings */
.settings-grid{display:grid; grid-template-columns:1fr 1fr; gap:16px;}
.settings-field{display:flex; flex-direction:column; gap:6px; margin-bottom:14px;}
.settings-field label{font-size:12.5px; font-weight:700; color:var(--carbon);}
.settings-field input{border:1px solid var(--bone); border-radius:9px; padding:11px 13px; font-size:14px;}
.version-row{display:flex; align-items:center; justify-content:space-between; padding:12px 0; border-bottom:1px solid var(--bone); font-size:13.5px;}
.version-row:last-child{border-bottom:none;}
.version-row.active-version .v-tag{background:var(--mint-soft); color:var(--mint);}
.v-tag{font-size:11px; font-weight:700; padding:3px 9px; border-radius:9999px; background:var(--mist); color:var(--ash);}

/* crawl log */
.log-table{width:100%; border-collapse:collapse; font-size:13px;}
.log-table th{text-align:left; font-size:11.5px; font-weight:700; color:var(--ash); padding:9px 10px; border-bottom:1px solid var(--bone); position:sticky; top:0; background:#fff;}
.log-table td{padding:10px; border-bottom:1px solid var(--plaster);}
.log-row{animation:slideUpFade .35s ease both;}
.status-tag{font-size:11px; font-weight:700; padding:3px 10px; border-radius:9999px;}
.tag-success{background:var(--mint-soft); color:var(--mint);}
.tag-fail{background:var(--coral-soft); color:var(--coral);}
.tag-running{background:var(--accent-soft); color:var(--accent);}

.toast{position:fixed; left:50%; bottom:28px; transform:translateX(-50%); background:var(--ink); color:#fff; padding:12px 22px; border-radius:9999px; font-size:13.5px; font-weight:700; z-index:120; display:flex; align-items:center; gap:8px; animation:toastIn .25s ease; box-shadow:var(--shadow-lift);}
.spin{animation:spinIcon .8s linear infinite; display:inline-flex;}

@media (max-width:860px){
  .header-row{flex-wrap:wrap;}
  .search-bar{order:3; max-width:none; width:100%;}
  .calc-grid{grid-template-columns:1fr;}
  .settings-grid{grid-template-columns:1fr;}
  .compare-row{grid-template-columns:1fr;}
}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState, useEffect, useRef} = React;

const BRANDS = ['루멘웨어','소프트에지','노르디크레인','테라코튼'];

const PRODUCTS = [
  {id:1, brand:'루멘웨어', nameKo:'헤비 코튼 오버셔츠', nameEn:'Heavy Cotton Overshirt', category:'아우터', price:68000, seed:'p1-1', translated:true, options:[{label:'M',soldout:false},{label:'L',soldout:false},{label:'XL',soldout:true}], descKo:'두꺼운 코튼 원단의 오버사이즈 셔츠 자켓입니다. 국내 배송은 2~3일 소요됩니다.', descEn:'An oversized shirt jacket in heavyweight cotton fabric.'},
  {id:2, brand:'소프트에지', nameKo:'와이드 밴딩 슬랙스', nameEn:'Wide Banding Slacks', category:'팬츠', price:52000, seed:'p1-2', translated:true, options:[{label:'S',soldout:false},{label:'M',soldout:false}], descKo:'허리 밴딩 와이드 슬랙스, AS 문의는 고객센터로 부탁드립니다.', descEn:'Wide-leg slacks with an elastic banded waist.'},
  {id:3, brand:'노르디크레인', nameKo:'니트 볼륨 가디건', nameEn:'Knit Volume Cardigan', category:'니트', price:74000, seed:'p1-3', translated:false, options:[{label:'FREE',soldout:false}], descKo:'풍성한 니트 가디건, 색상별 재고 상이합니다.', descEn:''},
  {id:4, brand:'테라코튼', nameKo:'린넨 블렌드 셔츠', nameEn:'Linen Blend Shirt', category:'셔츠', price:45000, seed:'p1-4', translated:true, options:[{label:'M',soldout:true},{label:'L',soldout:false}], descKo:'린넨 혼방 셔츠, 국내 A/S 규정은 별도 안내드립니다.', descEn:'A linen-blend shirt with breathable texture.'},
  {id:5, brand:'루멘웨어', nameKo:'크롭 다운 베스트', nameEn:'Crop Down Vest', category:'아우터', price:89000, seed:'p1-5', translated:false, options:[{label:'S',soldout:false},{label:'M',soldout:false},{label:'L',soldout:false}], descKo:'경량 다운 베스트, 주의사항: 드라이클리닝 권장.', descEn:''},
  {id:6, brand:'소프트에지', nameKo:'테이퍼드 데님팬츠', nameEn:'Tapered Denim Pants', category:'팬츠', price:58000, seed:'p1-6', translated:true, options:[{label:'28',soldout:false},{label:'30',soldout:false},{label:'32',soldout:false}], descKo:'테이퍼드 핏 데님, 사이즈는 원단 그대로 유지됩니다.', descEn:'Tapered-fit denim pants in a mid wash.'},
  {id:7, brand:'노르디크레인', nameKo:'셔츠 카라 니트베스트', nameEn:'Collared Knit Vest', category:'니트', price:41000, seed:'p1-7', translated:true, options:[{label:'FREE',soldout:false}], descKo:'셔츠 카라 디테일의 니트 베스트입니다.', descEn:'A knit vest featuring a collared shirt detail.'},
  {id:8, brand:'테라코튼', nameKo:'와이드 카고 팬츠', nameEn:'Wide Cargo Pants', category:'팬츠', price:63000, seed:'p1-8', translated:false, options:[{label:'M',soldout:false},{label:'L',soldout:true}], descKo:'포켓 6개 카고 팬츠, 배송기간은 국내 기준 3일입니다.', descEn:''},
];

function fmtWon(n){ return n.toLocaleString('ko-KR') + '원'; }

function Toast({message}){
  if(!message) return null;
  return (
    <div className="toast"><i className="ti ti-circle-check"></i>{message}</div>
  );
}

function TopNav({screen, setScreen}){
  const items = [
    {id:'translation-review', label:'번역 검수', icon:'ti-language'},
    {id:'csv-export', label:'CSV·재고 관리', icon:'ti-file-spreadsheet'},
    {id:'settings', label:'환경 설정', icon:'ti-settings'},
    {id:'crawl-log', label:'크롤링 로그', icon:'ti-list-details'},
  ];
  return (
    <div className="header-nav">
      {items.map(it => (
        <button key={it.id} className={"nav-pill" + (screen===it.id?' active':'')} onClick={()=>setScreen(it.id)}>
          <i className={"ti " + it.icon}></i>{it.label}
        </button>
      ))}
      <div className="user-chip">
        <span className="avatar-dot">민</span>
      </div>
    </div>
  );
}

function SearchHeader({screen, setScreen, brandInput, setBrandInput, category, setCategory, minMargin, setMinMargin, onSubmit, crawling}){
  return (
    <header className="search-header">
      <div className="header-row">
        <div className="brand" onClick={()=>setScreen('main')} style={{cursor:'pointer'}}>
          <i className="ti ti-cube-send"></i>크로스보더 콘솔
        </div>
        <div className="search-bar">
          <div className="search-segment" style={{flex:1.3}}>
            <span className="segment-label">브랜드 / URL</span>
            <input className="segment-input" value={brandInput} onChange={e=>setBrandInput(e.target.value)} placeholder="예: 루멘웨어" />
          </div>
          <div className="search-divider"></div>
          <div className="search-segment" style={{flex:1}}>
            <span className="segment-label">카테고리</span>
            <select className="segment-input" value={category} onChange={e=>setCategory(e.target.value)}>
              <option>전체</option><option>아우터</option><option>팬츠</option><option>니트</option><option>셔츠</option>
            </select>
          </div>
          <div className="search-divider"></div>
          <div className="search-segment" style={{flex:1}}>
            <span className="segment-label">최소 마진율</span>
            <input className="segment-input" type="number" value={minMargin} onChange={e=>setMinMargin(e.target.value)} placeholder="예: 30" />
          </div>
          <button className="search-submit" onClick={onSubmit} disabled={crawling}>
            {crawling ? <i className="ti ti-loader-2 spin"></i> : <i className="ti ti-player-play"></i>}
            {crawling ? '수집 중' : '수집 시작'}
          </button>
        </div>
        <TopNav screen={screen} setScreen={setScreen} />
      </div>
    </header>
  );
}

function FilterChips({activeBrand, setActiveBrand, activeStatus, setActiveStatus}){
  return (
    <div className="filter-chips">
      <button className={"chip" + (activeBrand==='전체'?' active':'')} onClick={()=>setActiveBrand('전체')}><i className="ti ti-apps"></i>전체</button>
      {BRANDS.map(b => (
        <button key={b} className={"chip" + (activeBrand===b?' active':'')} onClick={()=>setActiveBrand(b)}><i className="ti ti-tag"></i>{b}</button>
      ))}
      <div style={{width:1, alignSelf:'stretch', background:'var(--bone)', margin:'4px 4px'}}></div>
      {['전체','번역완료','번역대기','품절'].map(s => (
        <button key={s} className={"chip filter-toggle" + (activeStatus===s?' active':'')} onClick={()=>setActiveStatus(s)}>
          <i className="ti ti-filter"></i>{s}
        </button>
      ))}
    </div>
  );
}

function ListingCard({p, onOpen, favorite, toggleFavorite}){
  const soldoutAll = p.options.every(o=>o.soldout);
  return (
    <article className="listing-card" onClick={()=>onOpen(p)}>
      <div className="card-image-wrap">
        <img className="card-image" src={"https://picsum.photos/seed/cbl-"+p.seed+"/480/360"} alt={p.nameKo} />
        <button className={"card-favorite" + (favorite?' active':'')} onClick={(e)=>{e.stopPropagation(); toggleFavorite(p.id);}}>
          <i className="ti ti-heart"></i>
        </button>
        {soldoutAll ? <span className="card-status-badge badge-soldout">품절</span> :
          (p.translated ? <span className="card-status-badge badge-done">번역완료</span> : <span className="card-status-badge badge-pending">번역대기</span>)}
      </div>
      <div className="card-body">
        <div className="card-row-1">
          <div className="card-title">{p.nameKo}</div>
          <div className="card-rating"><i className="ti ti-star-filled"></i>{(4.4 + (p.id%5)/10).toFixed(1)}</div>
        </div>
        <div className="card-meta" style={{marginTop:4}}>{p.brand} · {p.category}</div>
        <div className="card-row-4">
          <strong className="card-price">{fmtWon(p.price)}</strong>
          <span className="price-unit">옵션 {p.options.length}종</span>
        </div>
      </div>
    </article>
  );
}

function QuickViewDrawer({product, onClose}){
  if(!product) return null;
  return (
    <div className="drawer-backdrop" onClick={onClose}>
      <div className="drawer" onClick={e=>e.stopPropagation()}>
        <div className="drawer-head">
          <strong style={{fontSize:15}}>상품 상세</strong>
          <button className="drawer-close" onClick={onClose}><i className="ti ti-x"></i></button>
        </div>
        <div className="drawer-body">
          <img className="drawer-image" src={"https://picsum.photos/seed/cbl-"+product.seed+"/640/480"} alt={product.nameKo} />
          <h3 style={{fontSize:19, fontWeight:800, marginBottom:4}}>{product.nameKo}</h3>
          <div style={{fontSize:13, color:'var(--ash)', fontWeight:600, marginBottom:14}}>{product.nameEn || '번역 대기 중'}</div>
          <div className="field-row"><span className="k">브랜드</span><span className="v">{product.brand}</span></div>
          <div className="field-row"><span className="k">카테고리</span><span className="v">{product.category}</span></div>
          <div className="field-row"><span className="k">국내 판매가</span><span className="v">{fmtWon(product.price)}</span></div>
          <div className="field-row"><span className="k">번역 상태</span><span className="v">{product.translated? '완료':'대기'}</span></div>
          <div style={{marginTop:14}}>
            <div className="segment-label" style={{marginBottom:6}}>옵션 재고</div>
            {product.options.map(o => (
              <span key={o.label} className={"opt-pill " + (o.soldout?'soldout':'instock')}>{o.label} {o.soldout?'품절':'재고'}</span>
            ))}
          </div>
          <div style={{marginTop:16}}>
            <div className="segment-label" style={{marginBottom:6}}>상세 설명 (원문)</div>
            <p style={{fontSize:13.5, lineHeight:1.6}}>{product.descKo}</p>
          </div>
        </div>
      </div>
    </div>
  );
}

function MainScreen({screen, setScreen, brandInput, setBrandInput, category, setCategory, minMargin, setMinMargin, crawlJob, onSubmit, activeBrand, setActiveBrand, activeStatus, setActiveStatus, favorites, toggleFavorite, openDrawer}){
  const filtered = PRODUCTS.filter(p => {
    if(activeBrand!=='전체' && p.brand!==activeBrand) return false;
    if(activeStatus==='번역완료' && !p.translated) return false;
    if(activeStatus==='번역대기' && p.translated) return false;
    if(activeStatus==='품절' && !p.options.every(o=>o.soldout)) return false;
    return true;
  });
  return (
    <div className="page-inner">
      <div className="status-strip">
        <span className="dot"></span>
        <span className="label">현재 수집 작업</span>
        <span className="value">{crawlJob.brand}</span>
        <div className="progress-track"><div className="progress-fill" style={{width:crawlJob.pct+'%'}}></div></div>
        <span className="value">{crawlJob.pct}%</span>
        <span className="label">{crawlJob.collected}/{crawlJob.total}건 수집</span>
      </div>
      <div className="section-head">
        <div>
          <div className="section-title">수집된 상품 갤러리</div>
          <div className="section-sub">브랜드·번역상태별로 필터링해 확인하세요</div>
        </div>
        <span className="section-sub">{filtered.length}개 표시 중</span>
      </div>
      <FilterChips activeBrand={activeBrand} setActiveBrand={setActiveBrand} activeStatus={activeStatus} setActiveStatus={setActiveStatus} />
      <div className="card-grid" style={{marginTop:6}}>
        {filtered.map(p => (
          <ListingCard key={p.id} p={p} onOpen={openDrawer} favorite={favorites.includes(p.id)} toggleFavorite={toggleFavorite} />
        ))}
      </div>
    </div>
  );
}

function TranslationReviewScreen({items, onRetranslate}){
  return (
    <div className="page-inner">
      <div className="screen-header">
        <h1>번역 자동화 및 결과 검수</h1>
        <p>DeepL·Google Translate 결과를 원문과 대조하고, 국내 전용 문구는 자동으로 제외됩니다.</p>
      </div>
      <div className="panel">
        {items.map(p => (
          <div className="compare-row" key={p.id}>
            <div className="compare-col">
              <div className="label">원문 (KO)</div>
              <div className="text">{p.nameKo}<br/>{p.descKo}</div>
              {/(배송기간|AS 문의|주의사항|드라이클리닝)/.test(p.descKo) &&
                <span className="filtered-pill"><i className="ti ti-filter-off" style={{marginRight:4}}></i>국내 전용 문구 필터링됨</span>}
            </div>
            <div className="compare-col">
              <div className="label">번역 (EN)</div>
              <div className="text">{p.translated ? (p.nameEn + (p.descEn? ' — '+p.descEn : '')) : '번역 대기 중'}</div>
            </div>
            <div className="retranslate-btn">
              <span className={"status-tag " + (p.translated?'tag-success':'tag-running')}>{p.translated?'검수완료':'검수대기'}</span>
              <button className="btn btn-ghost" onClick={()=>onRetranslate(p.id)}>
                <i className="ti ti-refresh"></i>재번역 실행
              </button>
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}

function CsvExportScreen({rate, setRate, margin, setMargin, platform, setPlatform, items, onExport, exporting, onCheckSoldout, onSoldoutExport}){
  return (
    <div className="page-inner">
      <div className="screen-header">
        <h1>환율·마진 자동 계산 및 CSV·재고 관리</h1>
        <p>환율·마진율을 조정하면 해외 판매가가 즉시 재계산됩니다.</p>
      </div>
      <div className="panel">
        <div className="calc-grid">
          <div className="calc-field">
            <label>적용 환율 (원/달러)</label>
            <input type="number" value={rate} onChange={e=>setRate(Number(e.target.value))} />
          </div>
          <div className="calc-field">
            <label>적용 마진율 (%)</label>
            <input type="number" value={margin} onChange={e=>setMargin(Number(e.target.value))} />
          </div>
          <div className="calc-field">
            <label>타겟 플랫폼 양식</label>
            <select value={platform} onChange={e=>setPlatform(e.target.value)}>
              <option>Global Bazaar CSV</option>
              <option>ShopEast 대량등록 양식</option>
              <option>MarketNine Export</option>
            </select>
          </div>
        </div>
        <table className="preview-table">
          <thead><tr><th>상품명</th><th>국내가</th><th>해외 판매가 (미리보기)</th><th>품절 상태</th></tr></thead>
          <tbody>
            {items.map(p=>{
              const usd = (p.price / rate) * (1 + margin/100);
              const soldoutAll = p.options.every(o=>o.soldout);
              return (
                <tr key={p.id}>
                  <td>{p.nameKo}</td>
                  <td>{fmtWon(p.price)}</td>
                  <td>${usd.toFixed(2)}</td>
                  <td>{soldoutAll ? <span className="status-tag tag-fail">품절</span> : <span className="status-tag tag-success">판매중</span>}</td>
                </tr>
              );
            })}
          </tbody>
        </table>
      </div>
      <div className="panel" style={{display:'flex', gap:12, flexWrap:'wrap'}}>
        <button className="btn btn-primary" onClick={onExport} disabled={exporting}>
          {exporting ? <i className="ti ti-loader-2 spin"></i> : <i className="ti ti-download"></i>}
          {exporting ? 'CSV 생성 중…' : 'CSV로 내보내기'}
        </button>
        <button className="btn btn-ghost" onClick={onCheckSoldout}><i className="ti ti-refresh"></i>품절 확인 실행</button>
        <button className="btn btn-ghost" onClick={onSoldoutExport}><i className="ti ti-file-export"></i>품절 리스트만 추출</button>
      </div>
    </div>
  );
}

function SettingsScreen({settings, setSettings, versions, onRollback, onSave}){
  return (
    <div className="page-inner">
      <div className="screen-header">
        <h1>크롤링·번역·저장 환경 설정</h1>
        <p>API 키·환율·마진율·저장 경로와 셀렉터 버전을 관리합니다.</p>
      </div>
      <div className="panel">
        <div className="settings-grid">
          <div className="settings-field">
            <label>DeepL API 키</label>
            <input value={settings.deepl} onChange={e=>setSettings({...settings, deepl:e.target.value})} placeholder="deepl-xxxxxxxx" />
          </div>
          <div className="settings-field">
            <label>Google Translate API 키</label>
            <input value={settings.google} onChange={e=>setSettings({...settings, google:e.target.value})} placeholder="google-xxxxxxxx" />
          </div>
          <div className="settings-field">
            <label>기본 환율 (원/달러)</label>
            <input type="number" value={settings.rate} onChange={e=>setSettings({...settings, rate:Number(e.target.value)})} />
          </div>
          <div className="settings-field">
            <label>기본 마진율 (%)</label>
            <input type="number" value={settings.margin} onChange={e=>setSettings({...settings, margin:Number(e.target.value)})} />
          </div>
          <div className="settings-field" style={{gridColumn:'1 / -1'}}>
            <label>결과물 저장 경로</label>
            <input value={settings.savePath} onChange={e=>setSettings({...settings, savePath:e.target.value})} />
          </div>
        </div>
        <button className="btn btn-primary" onClick={onSave}><i className="ti ti-device-floppy"></i>설정 저장</button>
      </div>
      <div className="panel">
        <div className="section-title" style={{fontSize:16, marginBottom:10}}>셀렉터 설정 버전 이력</div>
        {versions.map(v => (
          <div key={v.id} className={"version-row" + (v.active?' active-version':'')}>
            <div>
              <strong style={{fontSize:13.5}}>{v.label}</strong>
              <div style={{fontSize:12, color:'var(--ash)'}}>{v.date} · {v.note}</div>
            </div>
            <div style={{display:'flex', alignItems:'center', gap:10}}>
              <span className="v-tag">{v.active? '적용중':'보관됨'}</span>
              {!v.active && <button className="btn btn-ghost" onClick={()=>onRollback(v.id)}><i className="ti ti-history"></i>롤백</button>}
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}

function CrawlLogScreen({log, statusFilter, setStatusFilter, onRetry}){
  const filtered = log.filter(l => statusFilter==='전체' || l.status===statusFilter);
  return (
    <div className="page-inner">
      <div className="screen-header">
        <h1>크롤링 로그</h1>
        <p>다중 브랜드 수집 이벤트를 실시간으로 확인하고 실패 항목을 재시도합니다.</p>
      </div>
      <div className="filter-chips" style={{padding:'0 0 14px', maxWidth:'none'}}>
        {['전체','success','fail','running'].map(s=>(
          <button key={s} className={"chip filter-toggle"+(statusFilter===s?' active':'')} onClick={()=>setStatusFilter(s)}>
            {s==='전체'?'전체':s==='success'?'성공':s==='fail'?'실패':'진행중'}
          </button>
        ))}
      </div>
      <div className="panel" style={{padding:0, overflow:'hidden'}}>
        <table className="log-table">
          <thead><tr><th>시각</th><th>브랜드</th><th>이벤트</th><th>상태</th><th></th></tr></thead>
          <tbody>
            {filtered.map(l => (
              <tr className="log-row" key={l.id}>
                <td style={{color:'var(--ash)'}}>{l.time}</td>
                <td>{l.brand}</td>
                <td>{l.message}</td>
                <td><span className={"status-tag "+(l.status==='success'?'tag-success':l.status==='fail'?'tag-fail':'tag-running')}>{l.status==='success'?'성공':l.status==='fail'?'실패':'진행중'}</span></td>
                <td>{l.status==='fail' && <button className="btn btn-ghost" onClick={()=>onRetry(l.id)}><i className="ti ti-reload"></i>재시도</button>}</td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>
    </div>
  );
}

function App(){
  const [screen, setScreen] = useState('main');
  const [brandInput, setBrandInput] = useState('루멘웨어');
  const [category, setCategory] = useState('전체');
  const [minMargin, setMinMargin] = useState('30');
  const [activeBrand, setActiveBrand] = useState('전체');
  const [activeStatus, setActiveStatus] = useState('전체');
  const [favorites, setFavorites] = useState([]);
  const [drawerProduct, setDrawerProduct] = useState(null);
  const [items, setItems] = useState(PRODUCTS);
  const [toast, setToast] = useState('');
  const [crawlJob, setCrawlJob] = useState({brand:'루멘웨어', pct:64, total:12, collected:8, active:true});
  const [log, setLog] = useState([
    {id:1, time:'10:02:14', brand:'루멘웨어', message:'상품 리스트 페이지 3/6 수집', status:'success'},
    {id:2, time:'10:02:41', brand:'루멘웨어', message:'상세페이지 파싱 완료 (8건)', status:'success'},
    {id:3, time:'10:03:02', brand:'소프트에지', message:'anti-crawling 감지 — 재시도 대기', status:'fail'},
  ]);
  const [logStatusFilter, setLogStatusFilter] = useState('전체');
  const [rate, setRate] = useState(1320);
  const [margin, setMargin] = useState(35);
  const [platform, setPlatform] = useState('Global Bazaar CSV');
  const [exporting, setExporting] = useState(false);
  const [settings, setSettings] = useState({deepl:'deepl-live-8f2c', google:'gcp-translate-91ac', rate:1320, margin:35, savePath:'/Users/local/cbl-exports'});
  const [versions, setVersions] = useState([
    {id:1, label:'v3 — 상세페이지 셀렉터 갱신', date:'2026.07.02', note:'옵션 파서 구조 변경 대응', active:true},
    {id:2, label:'v2 — 이미지 lazy-load 대응', date:'2026.06.18', note:'', active:false},
    {id:3, label:'v1 — 최초 설정', date:'2026.06.02', note:'', active:false},
  ]);
  const logCounter = useRef(4);

  useEffect(()=>{
    if(!crawlJob.active) return;
    const timer = setInterval(()=>{
      setCrawlJob(prev=>{
        if(prev.pct>=100) { clearInterval(timer); return {...prev, active:false}; }
        const nextPct = Math.min(100, prev.pct + 4);
        const nextCollected = Math.round(prev.total * nextPct/100);
        if(nextCollected > prev.collected){
          setLog(l => [{id:logCounter.current++, time:new Date().toLocaleTimeString('ko-KR',{hour12:false}), brand:prev.brand, message:'상품 상세 수집 완료 #'+nextCollected, status:'success'}, ...l].slice(0,40));
        }
        if(nextPct>=100){
          setToast(prev.brand + ' 수집이 완료되었습니다');
          setTimeout(()=>setToast(''), 2600);
        }
        return {...prev, pct:nextPct, collected:nextCollected, active: nextPct<100};
      });
    }, 700);
    return ()=>clearInterval(timer);
  }, [crawlJob.active]);

  function startCrawl(){
    setCrawlJob({brand:brandInput||'신규 브랜드', pct:0, total:12, collected:0, active:true});
    setLog(l=>[{id:logCounter.current++, time:new Date().toLocaleTimeString('ko-KR',{hour12:false}), brand:brandInput||'신규 브랜드', message:'수집 작업 시작', status:'running'}, ...l].slice(0,40));
  }

  function toggleFavorite(id){
    setFavorites(f => f.includes(id) ? f.filter(x=>x!==id) : [...f, id]);
  }

  function retranslate(id){
    setItems(items.map(p => p.id===id ? {...p, translated:true, nameEn: p.nameEn || (p.nameKo + ' (EN)')} : p));
    setToast('재번역이 완료되었습니다');
    setTimeout(()=>setToast(''), 2200);
  }

  function exportCsv(){
    setExporting(true);
    setTimeout(()=>{
      setExporting(false);
      setToast(platform + ' 형식으로 CSV 파일이 생성되었습니다');
      setTimeout(()=>setToast(''), 2600);
    }, 1300);
  }

  function checkSoldout(){
    setItems(items.map(p => ({...p, options: p.options.map(o => Math.random()<0.15 ? {...o, soldout:true} : o)})));
    setToast('품절 상태가 갱신되었습니다');
    setTimeout(()=>setToast(''), 2200);
  }

  function soldoutExport(){
    setToast('품절 리스트 CSV가 별도로 추출되었습니다');
    setTimeout(()=>setToast(''), 2200);
  }

  function rollbackVersion(id){
    setVersions(versions.map(v => ({...v, active: v.id===id})));
    setToast('셀렉터 설정이 이전 버전으로 롤백되었습니다');
    setTimeout(()=>setToast(''), 2200);
  }

  function saveSettings(){
    setToast('환경 설정이 저장되었습니다');
    setTimeout(()=>setToast(''), 2200);
  }

  function retryLog(id){
    setLog(log.map(l => l.id===id ? {...l, status:'success', message:l.message + ' (재시도 성공)'} : l));
  }

  return (
    <div className="app">
      <SearchHeader screen={screen} setScreen={setScreen} brandInput={brandInput} setBrandInput={setBrandInput}
        category={category} setCategory={setCategory} minMargin={minMargin} setMinMargin={setMinMargin}
        onSubmit={startCrawl} crawling={crawlJob.active} />
      <main className="main">
        {screen==='main' && <MainScreen screen={screen} setScreen={setScreen} brandInput={brandInput} setBrandInput={setBrandInput}
          category={category} setCategory={setCategory} minMargin={minMargin} setMinMargin={setMinMargin}
          crawlJob={crawlJob} onSubmit={startCrawl} activeBrand={activeBrand} setActiveBrand={setActiveBrand}
          activeStatus={activeStatus} setActiveStatus={setActiveStatus} favorites={favorites} toggleFavorite={toggleFavorite}
          openDrawer={setDrawerProduct} />}
        {screen==='translation-review' && <TranslationReviewScreen items={items} onRetranslate={retranslate} />}
        {screen==='csv-export' && <CsvExportScreen rate={rate} setRate={setRate} margin={margin} setMargin={setMargin}
          platform={platform} setPlatform={setPlatform} items={items} onExport={exportCsv} exporting={exporting}
          onCheckSoldout={checkSoldout} onSoldoutExport={soldoutExport} />}
        {screen==='settings' && <SettingsScreen settings={settings} setSettings={setSettings} versions={versions}
          onRollback={rollbackVersion} onSave={saveSettings} />}
        {screen==='crawl-log' && <CrawlLogScreen log={log} statusFilter={logStatusFilter} setStatusFilter={setLogStatusFilter} onRetry={retryLog} />}
      </main>
      <QuickViewDrawer product={drawerProduct} onClose={()=>setDrawerProduct(null)} />
      <Toast message={toast} />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
