<!DOCTYPE html>
<html lang="ko" data-archetype="stripe-multipane">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>멀티사이트 크롤링 관제 플랫폼 — 구현 데모</title>
<link rel="preconnect" href="https://cdn.jsdelivr.net">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
<link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/regular/style.css">
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
:root{
  --void:#040506;
  --ink:#07080a;
  --obsidian:#111214;
  --graphite:#1b1c1e;
  --smoke:#6a6b6c;
  --ash:#9c9c9d;
  --mist:#e6e6e6;
  --iron:#454647;
  --border:#26282a;
  --border-soft:#1c1e20;
  --white:#ffffff;
  --coral:#ff6363;
  --ember:#2a1516;
  --electric:#63a1ff;
  --info:#56c2ff;
  --success:#59d499;
  --danger:#ff6363;
  --amber:#f5b942;
  --shadow-key: rgba(255,255,255,.05) 0px 1px 0px 0px inset, rgba(255,255,255,.14) 0px 0px 0px 1px, rgba(0,0,0,.35) 0px -1px 0px 0px inset, rgba(0,0,0,.45) 0px 14px 28px -12px;
  --shadow-glow: 0 0 0 1px rgba(255,99,99,.35), 0 8px 28px -6px rgba(255,99,99,.28);
}
*{box-sizing:border-box; margin:0; padding:0;}
html,body{width:100%; min-height:100vh;}
body{
  font-family:'Pretendard', ui-sans-serif, system-ui, sans-serif;
  background:var(--void);
  color:var(--white);
  -webkit-font-smoothing:antialiased;
}
#root{width:100%;}
button{font-family:inherit; cursor:pointer; border:none; background:none; color:inherit;}
input,select,textarea{font-family:inherit; color:inherit;}
a{color:inherit; text-decoration:none;}
::-webkit-scrollbar{width:8px; height:8px;}
::-webkit-scrollbar-thumb{background:var(--border); border-radius:99px;}

@keyframes fadeInScale{from{opacity:0; transform:scale(.96);} to{opacity:1; transform:scale(1);}}
@keyframes slideUpFade{from{opacity:0; transform:translateY(10px);} to{opacity:1; transform:translateY(0);}}
@keyframes toastIn{from{opacity:0; transform:translate(-50%,12px);} to{opacity:1; transform:translate(-50%,0);}}
@keyframes livePulse{0%,100%{box-shadow:0 0 0 0 rgba(89,212,153,.5);} 50%{box-shadow:0 0 0 6px rgba(89,212,153,0);}}
@keyframes glowPulse{0%,100%{box-shadow:var(--shadow-glow);} 50%{box-shadow:0 0 0 1px rgba(255,99,99,.55), 0 10px 34px -4px rgba(255,99,99,.45);}}

.app{width:100%; min-height:100vh; display:flex;}

/* ---- sidebar (archetype signature 1) ---- */
.sidebar{width:250px; flex-shrink:0; background:var(--ink); border-right:1px solid var(--border-soft); position:fixed; top:0; left:0; bottom:0; overflow-y:auto; padding:18px 14px;}
.sidebar-brand{display:flex; align-items:center; justify-content:space-between; padding:6px 8px 16px;}
.brand-mark{display:flex; align-items:center; gap:9px; font-weight:700; font-size:15px; letter-spacing:.01em;}
.brand-mark i{color:var(--coral); font-size:19px;}
.env-pill{display:flex; align-items:center; gap:6px; font-size:11px; font-weight:600; color:var(--ash); background:var(--graphite); padding:5px 10px; border-radius:6px; border:1px solid var(--border-soft);}
.env-pill .dot{width:6px; height:6px; border-radius:99px; background:var(--success); animation:livePulse 1.8s infinite;}
.sidebar-section{margin-top:14px;}
.sidebar-section-title{font-size:10.5px; font-weight:700; color:var(--smoke); letter-spacing:.08em; text-transform:uppercase; padding:6px 10px;}
.sidebar-link{display:flex; align-items:center; gap:10px; padding:9px 10px; border-radius:8px; font-size:13.5px; font-weight:500; color:var(--ash); margin-bottom:2px;}
.sidebar-link i{font-size:16px;}
.sidebar-link:hover{background:var(--graphite); color:var(--white);}
.sidebar-link.active{background:var(--graphite); color:var(--white); box-shadow:inset 0 0 0 1px var(--border-soft);}
.sidebar-link .count{margin-left:auto; font-size:10.5px; font-weight:700; background:var(--ember); color:var(--coral); padding:2px 7px; border-radius:99px;}

/* ---- main ---- */
.main{flex:1; min-width:0; width:calc(100% - 250px); margin-left:250px;}
.page-header{padding:26px 32px 16px; border-bottom:1px solid var(--border-soft);}
.page-title-row{display:flex; align-items:center; justify-content:space-between; gap:16px;}
.page-title{font-size:34px; font-weight:700; letter-spacing:-0.015em;}
.page-meta{font-size:12.5px; color:var(--smoke); margin-top:4px;}
.page-actions{display:flex; gap:10px;}
.btn{display:inline-flex; align-items:center; gap:7px; font-size:13px; font-weight:600; border-radius:8px; padding:9px 16px; white-space:nowrap;}
.btn-primary{background:var(--mist); color:var(--iron);}
.btn-primary:hover{background:#fff;}
.btn-secondary{background:var(--graphite); color:var(--white); border:1px solid var(--border-soft);}
.btn-secondary:hover{border-color:var(--smoke);}
.btn-danger{background:var(--ember); color:var(--coral);}
.page-inner{padding:24px 32px 60px;}

/* status-strip: slim inline stat pills (command-tower — replaces big KPI row) */
.status-strip{display:flex; gap:12px; margin-bottom:22px; flex-wrap:wrap;}
.stat-card{flex:1; min-width:180px; display:flex; align-items:center; gap:12px; background:var(--ink); border-radius:12px; padding:12px 16px; box-shadow:var(--shadow-key);}
.stat-icon{width:34px; height:34px; border-radius:99999px; background:var(--graphite); display:flex; align-items:center; justify-content:center; flex-shrink:0;}
.stat-icon i{font-size:16px; color:var(--electric);}
.stat-label{font-size:11px; color:var(--ash); font-weight:600;}
.stat-value{font-size:22px; font-weight:700; letter-spacing:-0.01em; line-height:1.1;}
.stat-spark{margin-left:auto; flex-shrink:0;}

/* command board — kanban */
.command-row{display:flex; gap:20px; align-items:flex-start;}
.board-wrap{flex:1; min-width:0;}
.board-cols{display:grid; grid-template-columns:repeat(4,1fr); gap:14px;}
.board-col{background:var(--ink); border-radius:14px; padding:12px; min-height:200px;}
.board-col-head{display:flex; align-items:center; justify-content:space-between; padding:4px 4px 10px;}
.board-col-title{font-size:12px; font-weight:700; color:var(--ash); text-transform:uppercase; letter-spacing:.05em;}
.board-count{font-size:11px; font-weight:700; background:var(--graphite); padding:2px 8px; border-radius:99px; color:var(--white);}
.job-card{background:var(--graphite); border-radius:12px; padding:12px 13px; margin-bottom:10px; box-shadow:var(--shadow-key); animation:slideUpFade .35s ease both;}
.job-card .site{font-size:13px; font-weight:700;}
.job-card .meta{font-size:11px; color:var(--smoke); margin-top:2px;}
.mini-track{height:5px; border-radius:99px; background:var(--border-soft); overflow:hidden; margin-top:9px;}
.mini-fill{height:100%; border-radius:99px; background:linear-gradient(90deg,var(--electric),var(--info));}
.job-card.fail{box-shadow:var(--shadow-glow); animation:glowPulse 2.4s ease-in-out infinite;}
.job-card .row-actions{display:flex; justify-content:flex-end; margin-top:9px;}
.mini-btn{font-size:11px; font-weight:700; padding:5px 10px; border-radius:6px; background:var(--border-soft); color:var(--white); display:flex; align-items:center; gap:5px;}
.mini-btn:hover{background:var(--iron);}

/* priority rail */
.priority-rail{width:300px; flex-shrink:0; background:var(--ink); border-radius:14px; padding:16px;}
.priority-rail h3{font-size:13px; font-weight:700; margin-bottom:12px; display:flex; align-items:center; gap:8px;}
.priority-rail h3 i{color:var(--coral);}
.priority-item{display:flex; align-items:center; gap:10px; padding:10px 8px; border-radius:8px; border-bottom:1px solid var(--border-soft);}
.priority-item:last-child{border-bottom:none;}
.priority-item .badge-num{width:22px; height:22px; border-radius:6px; background:var(--ember); color:var(--coral); font-size:11px; font-weight:800; display:flex; align-items:center; justify-content:center; flex-shrink:0;}
.priority-item .txt{flex:1; min-width:0;}
.priority-item .txt .t1{font-size:12.5px; font-weight:600; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}
.priority-item .txt .t2{font-size:11px; color:var(--smoke);}

/* secondary widgets */
.secondary-row{display:grid; grid-template-columns:1fr 1fr; gap:16px; margin-top:20px;}
.widget{background:var(--ink); border-radius:14px; padding:18px; box-shadow:var(--shadow-key);}
.widget h4{font-size:12.5px; font-weight:700; color:var(--ash); margin-bottom:14px; text-transform:uppercase; letter-spacing:.04em;}
.donut-wrap{display:flex; align-items:center; gap:20px;}
.legend-item{display:flex; align-items:center; gap:8px; font-size:12px; margin-bottom:8px;}
.legend-dot{width:9px; height:9px; border-radius:99px; flex-shrink:0;}
.bar-chart{display:flex; align-items:flex-end; gap:10px; height:110px;}
.bar-col{flex:1; display:flex; flex-direction:column; align-items:center; gap:6px;}
.bar-fill{width:100%; border-radius:6px 6px 0 0; background:linear-gradient(180deg,var(--electric),var(--info));}
.bar-label{font-size:10.5px; color:var(--smoke);}

/* panels & tabs */
.panel{background:var(--ink); border-radius:14px; padding:20px; box-shadow:var(--shadow-key);}
.panel + .panel{margin-top:16px;}
.tab-bar{display:flex; gap:4px; border-bottom:1px solid var(--border-soft); margin-bottom:16px;}
.tab{font-size:13px; font-weight:600; color:var(--ash); padding:10px 4px; margin-right:18px; border-bottom:2px solid transparent; position:relative; top:1px;}
.tab.active{color:var(--white); border-bottom-color:var(--electric);}
.toolbar{display:flex; gap:10px; align-items:center; margin-bottom:14px; flex-wrap:wrap;}
.search-input{flex:1; min-width:180px; background:var(--obsidian); border:1px solid var(--border-soft); border-radius:8px; padding:9px 12px; font-size:13px; color:var(--white);}
.chip{font-size:12px; font-weight:600; padding:7px 13px; border-radius:8px; background:var(--graphite); color:var(--ash); border:1px solid var(--border-soft);}
.chip.active{background:var(--white); color:var(--iron); border-color:transparent;}

.data-table{width:100%; border-collapse:collapse; font-size:13px;}
.data-table th{text-align:left; font-size:11px; font-weight:700; color:var(--smoke); text-transform:uppercase; letter-spacing:.03em; padding:9px 10px; border-bottom:1px solid var(--border-soft);}
.data-table td{padding:11px 10px; border-bottom:1px solid var(--border-soft); font-weight:500;}
.data-table tr:hover td{background:var(--obsidian);}
.status-tag{font-size:10.5px; font-weight:700; padding:3px 9px; border-radius:6px;}
.tag-on{background:rgba(89,212,153,.15); color:var(--success);}
.tag-off{background:rgba(154,154,154,.15); color:var(--ash);}
.tag-fail{background:var(--ember); color:var(--coral);}
.toggle-sw{width:34px; height:19px; border-radius:99px; background:var(--border-soft); position:relative; flex-shrink:0;}
.toggle-sw.on{background:var(--success);}
.toggle-sw .knob{position:absolute; top:2px; left:2px; width:15px; height:15px; border-radius:99px; background:#fff; transition:left .18s ease;}
.toggle-sw.on .knob{left:17px;}

/* translation qa */
.qa-row{display:flex; align-items:center; gap:14px; padding:13px 6px; border-bottom:1px solid var(--border-soft);}
.qa-row:last-child{border-bottom:none;}
.qa-score{width:44px; height:44px; border-radius:99px; display:flex; align-items:center; justify-content:center; font-size:13px; font-weight:800; flex-shrink:0;}
.score-low{background:var(--ember); color:var(--coral);}
.score-mid{background:rgba(245,185,66,.15); color:var(--amber);}
.score-high{background:rgba(89,212,153,.15); color:var(--success);}
.qa-info{flex:1; min-width:0;}
.qa-info .t1{font-size:13.5px; font-weight:600;}
.qa-info .t2{font-size:11.5px; color:var(--smoke); margin-top:2px;}

/* drawer / modal */
.overlay{position:fixed; inset:0; background:rgba(4,5,6,.62); z-index:90; display:flex; align-items:center; justify-content:center; animation:fadeInScale .18s ease;}
.modal{width:460px; max-width:92vw; max-height:85vh; overflow-y:auto; background:var(--ink); border-radius:16px; border:1px solid var(--border-soft); box-shadow:var(--shadow-key); animation:slideUpFade .22s ease;}
.modal-head{display:flex; align-items:center; justify-content:space-between; padding:18px 20px; border-bottom:1px solid var(--border-soft);}
.modal-body{padding:20px;}
.modal-close{width:30px; height:30px; border-radius:8px; background:var(--graphite); display:flex; align-items:center; justify-content:center;}
.form-field{display:flex; flex-direction:column; gap:6px; margin-bottom:14px;}
.form-field label{font-size:12px; font-weight:600; color:var(--ash);}
.form-field input, .form-field select{background:var(--obsidian); border:1px solid var(--border-soft); border-radius:8px; padding:10px 12px; font-size:13.5px; color:var(--white);}

.toast{position:fixed; left:50%; bottom:26px; transform:translateX(-50%); background:var(--mist); color:var(--iron); padding:12px 20px; border-radius:8px; font-size:13px; font-weight:700; z-index:120; display:flex; align-items:center; gap:8px; animation:toastIn .25s ease; box-shadow:0 12px 30px rgba(0,0,0,.45);}
.checkbox{width:16px; height:16px; accent-color: var(--electric);}

@media (max-width:1000px){
  .board-cols{grid-template-columns:repeat(2,1fr);}
  .command-row{flex-direction:column;}
  .priority-rail{width:100%;}
  .secondary-row{grid-template-columns:1fr;}
}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState, useEffect, useRef} = React;

const SITES = [
  {id:1, name:'루멘웨어 공식몰', brands:3, cycle:'6시간', last:'10분 전', active:true},
  {id:2, name:'소프트에지 스토어', brands:2, cycle:'12시간', last:'42분 전', active:true},
  {id:3, name:'노르디크레인 아울렛', brands:1, cycle:'24시간', last:'3시간 전', active:true},
  {id:4, name:'테라코튼 편집샵', brands:4, cycle:'6시간', last:'1시간 전', active:false},
  {id:5, name:'라운드핏 마켓', brands:2, cycle:'12시간', last:'5시간 전', active:true},
  {id:6, name:'베이스캠프 웨어하우스', brands:1, cycle:'24시간', last:'어제', active:false},
];

const QA_ITEMS = [
  {id:1, name:'헤비 코튼 오버셔츠', score:92, note:'사전 매칭률 높음'},
  {id:2, name:'와이드 밴딩 슬랙스', score:58, note:'금지어 패턴 2건 검출'},
  {id:3, name:'니트 볼륨 가디건', score:41, note:'길이비 이상 — 원문 대비 번역 과소'},
  {id:4, name:'린넨 블렌드 셔츠', score:87, note:'사전 매칭률 높음'},
  {id:5, name:'크롭 다운 베스트', score:64, note:'검수 대기'},
];

const RETRY_QUEUE = [
  {id:1, site:'소프트에지 스토어', reason:'anti-crawling 감지', attempts:2, time:'5분 전'},
  {id:2, site:'테라코튼 편집샵', reason:'셀렉터 불일치', attempts:1, time:'18분 전'},
  {id:3, site:'베이스캠프 웨어하우스', reason:'응답 시간 초과', attempts:3, time:'32분 전'},
  {id:4, site:'루멘웨어 공식몰', reason:'이미지 다운로드 실패', attempts:1, time:'44분 전'},
  {id:5, site:'라운드핏 마켓', reason:'anti-crawling 감지', attempts:2, time:'1시간 전'},
];

function Sparkline({color, seed}){
  const pts = React.useMemo(()=>{
    let v = 12; const arr=[];
    for(let i=0;i<10;i++){ v += ((seed*7+i*13)%9)-4; v=Math.max(4,Math.min(28,v)); arr.push(v); }
    return arr;
  },[seed]);
  const path = pts.map((v,i)=> (i===0?'M':'L') + (i*7) + ' ' + (30-v)).join(' ');
  return (
    <svg width="64" height="30" viewBox="0 0 64 30">
      <path d={path} fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/>
    </svg>
  );
}

function Donut({segments}){
  const total = segments.reduce((s,x)=>s+x.value,0);
  let acc = 0;
  const stops = segments.map(s=>{
    const start = acc/total*360; acc += s.value; const end = acc/total*360;
    return `${s.color} ${start}deg ${end}deg`;
  }).join(', ');
  return (
    <div style={{width:96, height:96, borderRadius:'50%', background:`conic-gradient(${stops})`, position:'relative', flexShrink:0}}>
      <div style={{position:'absolute', inset:14, borderRadius:'50%', background:'var(--ink)', display:'flex', alignItems:'center', justifyContent:'center', fontSize:12, fontWeight:700, color:'var(--ash)'}}>{total}</div>
    </div>
  );
}

function Toast({message}){
  if(!message) return null;
  return <div className="toast"><i className="ph ph-check-circle"></i>{message}</div>;
}

function Sidebar({screen, setScreen, env, setEnv, retryCount}){
  const Item = ({id, icon, label, badge}) => (
    <a className={"sidebar-link" + (screen===id?' active':'')} onClick={()=>setScreen(id)} style={{cursor:'pointer'}}>
      <i className={"ph "+icon}></i>{label}
      {badge ? <span className="count">{badge}</span> : null}
    </a>
  );
  return (
    <aside className="sidebar">
      <div className="sidebar-brand">
        <div className="brand-mark"><i className="ph ph-radar"></i>관제 플랫폼</div>
      </div>
      <button className="env-pill" style={{width:'100%', justifyContent:'center', marginBottom:8}} onClick={()=>setEnv(env==='Production'?'Staging':'Production')}>
        <span className="dot"></span>{env} 환경
      </button>
      <div className="sidebar-section">
        <div className="sidebar-section-title">관제</div>
        <Item id="main" icon="ph-broadcast" label="실시간 모니터링" />
        <Item id="retry-queue" icon="ph-arrow-clockwise" label="재시도 큐" badge={retryCount} />
      </div>
      <div className="sidebar-section">
        <div className="sidebar-section-title">관리</div>
        <Item id="site-management" icon="ph-globe-hemisphere-west" label="사이트 관리" />
        <Item id="translation-qa" icon="ph-translate" label="번역 검수" />
      </div>
      <div className="sidebar-section">
        <div className="sidebar-section-title">분석</div>
        <Item id="revenue-analytics" icon="ph-chart-line-up" label="매출 분석" />
      </div>
    </aside>
  );
}

function PageHeader({title, meta, children}){
  return (
    <header className="page-header">
      <div className="page-title-row">
        <div>
          <div className="page-title">{title}</div>
          <div className="page-meta">{meta}</div>
        </div>
        <div className="page-actions">{children}</div>
      </div>
    </header>
  );
}

function MainScreen({jobs, onRetry, onStart, statSeed}){
  const cols = [
    {key:'대기', title:'대기'},
    {key:'진행중', title:'진행중'},
    {key:'완료', title:'완료'},
    {key:'실패', title:'실패'},
  ];
  return (
    <div className="page-inner">
      <div className="status-strip">
        {[
          {label:'활성 사이트', value:'5', icon:'ph-globe-hemisphere-west', color:'var(--electric)'},
          {label:'진행중 작업', value: jobs.filter(j=>j.col==='진행중').length+'', icon:'ph-cpu', color:'var(--info)'},
          {label:'오늘 수집', value:'214건', icon:'ph-package', color:'var(--success)'},
          {label:'실패율', value:'6.2%', icon:'ph-warning-circle', color:'var(--coral)'},
        ].map((s,i)=>(
          <div className="stat-card" key={s.label}>
            <div className="stat-icon"><i className={"ph "+s.icon}></i></div>
            <div>
              <div className="stat-label">{s.label}</div>
              <div className="stat-value">{s.value}</div>
            </div>
            <div className="stat-spark"><Sparkline color={s.color} seed={statSeed+i}/></div>
          </div>
        ))}
      </div>

      <div className="command-row">
        <div className="board-wrap">
          <div className="board-cols">
            {cols.map(c=>{
              const items = jobs.filter(j=>j.col===c.key);
              return (
                <div className="board-col" key={c.key}>
                  <div className="board-col-head">
                    <span className="board-col-title">{c.title}</span>
                    <span className="board-count">{items.length}</span>
                  </div>
                  {items.map(j=>(
                    <div className={"job-card"+(c.key==='실패'?' fail':'')} key={j.id}>
                      <div className="site">{j.site}</div>
                      <div className="meta">{j.detail}</div>
                      {c.key==='진행중' && <div className="mini-track"><div className="mini-fill" style={{width:j.pct+'%'}}></div></div>}
                      {c.key==='대기' && <div className="row-actions"><button className="mini-btn" onClick={()=>onStart(j.id)}><i className="ph ph-play"></i>지금 시작</button></div>}
                      {c.key==='실패' && <div className="row-actions"><button className="mini-btn" onClick={()=>onRetry(j.id)}><i className="ph ph-arrow-clockwise"></i>재시도</button></div>}
                    </div>
                  ))}
                </div>
              );
            })}
          </div>

          <div className="secondary-row">
            <div className="widget">
              <h4>사이트별 수집 비중</h4>
              <div className="donut-wrap">
                <Donut segments={[{value:34,color:'var(--electric)'},{value:26,color:'var(--info)'},{value:20,color:'var(--success)'},{value:20,color:'var(--coral)'}]} />
                <div>
                  <div className="legend-item"><span className="legend-dot" style={{background:'var(--electric)'}}></span>루멘웨어 34%</div>
                  <div className="legend-item"><span className="legend-dot" style={{background:'var(--info)'}}></span>소프트에지 26%</div>
                  <div className="legend-item"><span className="legend-dot" style={{background:'var(--success)'}}></span>노르디크레인 20%</div>
                  <div className="legend-item"><span className="legend-dot" style={{background:'var(--coral)'}}></span>테라코튼 20%</div>
                </div>
              </div>
            </div>
            <div className="widget">
              <h4>시간대별 처리량</h4>
              <div className="bar-chart">
                {[38,52,44,70,61,48,55].map((v,i)=>(
                  <div className="bar-col" key={i}>
                    <div className="bar-fill" style={{height:v+'%'}}></div>
                    <div className="bar-label">{9+i}시</div>
                  </div>
                ))}
              </div>
            </div>
          </div>
        </div>

        <aside className="priority-rail">
          <h3><i className="ph ph-flag"></i>우선 대응 큐</h3>
          {RETRY_QUEUE.slice(0,4).map((r,i)=>(
            <div className="priority-item" key={r.id}>
              <div className="badge-num">{i+1}</div>
              <div className="txt">
                <div className="t1">{r.site}</div>
                <div className="t2">{r.reason} · {r.time}</div>
              </div>
              <button className="mini-btn" onClick={()=>onRetry(r.id)}><i className="ph ph-arrow-clockwise"></i></button>
            </div>
          ))}
        </aside>
      </div>
    </div>
  );
}

function SiteManagementScreen({sites, onToggle, onAdd, toast}){
  const [tab, setTab] = useState('전체');
  const [search, setSearch] = useState('');
  const [selected, setSelected] = useState([]);
  const [showForm, setShowForm] = useState(false);
  const [form, setForm] = useState({name:'', url:'', cycle:'6시간'});
  const filtered = sites.filter(s=>{
    if(tab==='활성' && !s.active) return false;
    if(tab==='비활성' && s.active) return false;
    if(search && !s.name.includes(search)) return false;
    return true;
  });
  function toggleSelect(id){ setSelected(sel => sel.includes(id) ? sel.filter(x=>x!==id) : [...sel, id]); }
  return (
    <div className="page-inner">
      <div className="panel">
        <div className="tab-bar">
          {['전체','활성','비활성'].map(t=>(
            <div key={t} className={"tab"+(tab===t?' active':'')} onClick={()=>setTab(t)} style={{cursor:'pointer'}}>{t}</div>
          ))}
        </div>
        <div className="toolbar">
          <input className="search-input" placeholder="사이트명 검색" value={search} onChange={e=>setSearch(e.target.value)} />
          <button className="btn btn-secondary" disabled={!selected.length} onClick={()=>{onToggle('bulk',selected); setSelected([]);}}>
            <i className="ph ph-arrow-clockwise"></i>선택 재시도 ({selected.length})
          </button>
          <button className="btn btn-primary" onClick={()=>setShowForm(true)}><i className="ph ph-plus"></i>신규 사이트 등록</button>
        </div>
        <table className="data-table">
          <thead><tr><th></th><th>사이트명</th><th>브랜드 수</th><th>수집 주기</th><th>마지막 실행</th><th>상태</th><th></th></tr></thead>
          <tbody>
            {filtered.map(s=>(
              <tr key={s.id}>
                <td><input type="checkbox" className="checkbox" checked={selected.includes(s.id)} onChange={()=>toggleSelect(s.id)} /></td>
                <td>{s.name}</td>
                <td>{s.brands}개</td>
                <td>{s.cycle}</td>
                <td style={{color:'var(--smoke)'}}>{s.last}</td>
                <td><span className={"status-tag "+(s.active?'tag-on':'tag-off')}>{s.active?'활성':'비활성'}</span></td>
                <td>
                  <div className={"toggle-sw"+(s.active?' on':'')} onClick={()=>onToggle(s.id)} style={{cursor:'pointer'}}><div className="knob"></div></div>
                </td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>

      {showForm && (
        <div className="overlay" onClick={()=>setShowForm(false)}>
          <div className="modal" onClick={e=>e.stopPropagation()}>
            <div className="modal-head"><strong>신규 사이트 등록</strong><button className="modal-close" onClick={()=>setShowForm(false)}><i className="ph ph-x"></i></button></div>
            <div className="modal-body">
              <div className="form-field"><label>사이트명</label><input value={form.name} onChange={e=>setForm({...form,name:e.target.value})} placeholder="예: 라운드핏 마켓" /></div>
              <div className="form-field"><label>대상 URL</label><input value={form.url} onChange={e=>setForm({...form,url:e.target.value})} placeholder="https://" /></div>
              <div className="form-field">
                <label>수집 주기</label>
                <select value={form.cycle} onChange={e=>setForm({...form,cycle:e.target.value})}>
                  <option>6시간</option><option>12시간</option><option>24시간</option>
                </select>
              </div>
              <button className="btn btn-primary btn-block" style={{width:'100%', justifyContent:'center'}} onClick={()=>{onAdd(form); setShowForm(false); setForm({name:'',url:'',cycle:'6시간'});}}>
                <i className="ph ph-check"></i>등록 완료
              </button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

function TranslationQaScreen({items, dict, onAddTerm, onRetranslate}){
  const [threshold, setThreshold] = useState(70);
  const [showModal, setShowModal] = useState(false);
  const [term, setTerm] = useState({ko:'', en:''});
  const queue = items.filter(i=>i.score < threshold);
  function scoreClass(s){ return s<55?'score-low': s<80?'score-mid':'score-high'; }
  return (
    <div className="page-inner">
      <div className="panel">
        <div className="toolbar">
          <span style={{fontSize:12.5, color:'var(--ash)', fontWeight:600}}>검수 기준 점수</span>
          <input type="range" min="30" max="95" value={threshold} onChange={e=>setThreshold(Number(e.target.value))} />
          <span style={{fontSize:13, fontWeight:700}}>{threshold}점 미만 우선 검수 · {queue.length}건</span>
          <button className="btn btn-primary" style={{marginLeft:'auto'}} onClick={()=>setShowModal(true)}><i className="ph ph-book-open"></i>용어 사전 추가</button>
        </div>
        {items.map(it=>(
          <div className="qa-row" key={it.id}>
            <div className={"qa-score "+scoreClass(it.score)}>{it.score}</div>
            <div className="qa-info">
              <div className="t1">{it.name}</div>
              <div className="t2">{it.note}</div>
            </div>
            <button className="btn btn-secondary" onClick={()=>onRetranslate(it.id)}><i className="ph ph-arrow-clockwise"></i>재번역 적용</button>
          </div>
        ))}
      </div>
      <div className="panel">
        <h4 style={{fontSize:13, fontWeight:700, marginBottom:12, color:'var(--ash)'}}>용어 사전 ({dict.length}건)</h4>
        {dict.map((d,i)=>(
          <div key={i} style={{display:'flex', justifyContent:'space-between', padding:'8px 4px', borderBottom:'1px solid var(--border-soft)', fontSize:13}}>
            <span>{d.ko}</span><span style={{color:'var(--ash)'}}>→ {d.en}</span>
          </div>
        ))}
      </div>
      {showModal && (
        <div className="overlay" onClick={()=>setShowModal(false)}>
          <div className="modal" onClick={e=>e.stopPropagation()}>
            <div className="modal-head"><strong>용어 사전 추가</strong><button className="modal-close" onClick={()=>setShowModal(false)}><i className="ph ph-x"></i></button></div>
            <div className="modal-body">
              <div className="form-field"><label>원문 용어</label><input value={term.ko} onChange={e=>setTerm({...term,ko:e.target.value})} placeholder="예: 배송기간" /></div>
              <div className="form-field"><label>고정 번역</label><input value={term.en} onChange={e=>setTerm({...term,en:e.target.value})} placeholder="예: (제외 처리)" /></div>
              <button className="btn btn-primary" style={{width:'100%', justifyContent:'center'}} onClick={()=>{onAddTerm(term); setShowModal(false); setTerm({ko:'',en:''});}}>
                <i className="ph ph-check"></i>사전에 등록
              </button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

function RevenueAnalyticsScreen(){
  const [site, setSite] = useState('전체');
  const [period, setPeriod] = useState('최근 7일');
  const [drill, setDrill] = useState(null);
  const bars = React.useMemo(()=>{
    const base = site==='전체'?[40,55,48,70,64,58,72]:[22,30,26,38,33,29,40];
    return base;
  },[site]);
  return (
    <div className="page-inner">
      <div className="panel">
        <div className="toolbar">
          <select className="search-input" style={{flex:'none', width:160}} value={site} onChange={e=>setSite(e.target.value)}>
            <option>전체</option><option>루멘웨어</option><option>소프트에지</option><option>노르디크레인</option>
          </select>
          <select className="search-input" style={{flex:'none', width:160}} value={period} onChange={e=>setPeriod(e.target.value)}>
            <option>최근 7일</option><option>최근 30일</option><option>최근 분기</option>
          </select>
        </div>
        <h4 style={{fontSize:12.5, color:'var(--ash)', fontWeight:700, marginBottom:14, textTransform:'uppercase', letterSpacing:'.04em'}}>{period} 등록 추이 — {site}</h4>
        <div className="bar-chart" style={{height:160}}>
          {bars.map((v,i)=>(
            <div className="bar-col" key={i} style={{cursor:'pointer'}} onClick={()=>setDrill({day:i, value:v})}>
              <div className="bar-fill" style={{height:v+'%'}}></div>
              <div className="bar-label">{i+1}일</div>
            </div>
          ))}
        </div>
        {drill && (
          <div className="panel" style={{marginTop:14, background:'var(--obsidian)'}}>
            <strong style={{fontSize:13}}>{drill.day+1}일차 상세 집계</strong>
            <table className="data-table" style={{marginTop:10}}>
              <thead><tr><th>브랜드</th><th>등록 건수</th><th>평균 마진율</th></tr></thead>
              <tbody>
                <tr><td>루멘웨어</td><td>{Math.round(drill.value*0.4)}건</td><td>38%</td></tr>
                <tr><td>소프트에지</td><td>{Math.round(drill.value*0.3)}건</td><td>29%</td></tr>
                <tr><td>노르디크레인</td><td>{Math.round(drill.value*0.3)}건</td><td>22%</td></tr>
              </tbody>
            </table>
          </div>
        )}
      </div>
      <div className="panel">
        <h4 style={{fontSize:12.5, color:'var(--ash)', fontWeight:700, marginBottom:14, textTransform:'uppercase', letterSpacing:'.04em'}}>사이트·브랜드별 마진율 분포</h4>
        {[
          {name:'루멘웨어', margin:38}, {name:'소프트에지', margin:29}, {name:'노르디크레인', margin:18}, {name:'테라코튼', margin:33},
        ].map(b=>(
          <div key={b.name} style={{display:'flex', alignItems:'center', gap:12, marginBottom:10}}>
            <span style={{width:90, fontSize:12.5, fontWeight:600}}>{b.name}</span>
            <div style={{flex:1, height:8, background:'var(--border-soft)', borderRadius:99}}>
              <div style={{width:b.margin+'%', height:'100%', borderRadius:99, background: b.margin<20?'var(--coral)':'linear-gradient(90deg,var(--electric),var(--success))'}}></div>
            </div>
            <span style={{fontSize:12.5, fontWeight:700, color: b.margin<20?'var(--coral)':'var(--white)'}}>{b.margin}%</span>
          </div>
        ))}
      </div>
    </div>
  );
}

function RetryQueueScreen({queue, onRetry}){
  const [statusFilter, setStatusFilter] = useState('전체');
  const [selected, setSelected] = useState([]);
  function toggleSelect(id){ setSelected(sel => sel.includes(id) ? sel.filter(x=>x!==id) : [...sel, id]); }
  return (
    <div className="page-inner">
      <div className="panel">
        <div className="toolbar">
          {['전체','실패','재시도중'].map(s=>(
            <button key={s} className={"chip"+(statusFilter===s?' active':'')} onClick={()=>setStatusFilter(s)}>{s}</button>
          ))}
          <button className="btn btn-primary" style={{marginLeft:'auto'}} disabled={!selected.length} onClick={()=>{selected.forEach(onRetry); setSelected([]);}}>
            <i className="ph ph-arrow-clockwise"></i>선택 재시도 ({selected.length})
          </button>
        </div>
        <table className="data-table">
          <thead><tr><th></th><th>사이트</th><th>실패 사유</th><th>재시도 횟수</th><th>발생 시각</th><th></th></tr></thead>
          <tbody>
            {queue.map(r=>(
              <tr key={r.id}>
                <td><input type="checkbox" className="checkbox" checked={selected.includes(r.id)} onChange={()=>toggleSelect(r.id)} /></td>
                <td>{r.site}</td>
                <td><span className="status-tag tag-fail">{r.reason}</span></td>
                <td>{r.attempts}회</td>
                <td style={{color:'var(--smoke)'}}>{r.time}</td>
                <td><button className="mini-btn" onClick={()=>onRetry(r.id)}><i className="ph ph-arrow-clockwise"></i>재시도</button></td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>
    </div>
  );
}

function App(){
  const [screen, setScreen] = useState('main');
  const [env, setEnv] = useState('Production');
  const [toast, setToast] = useState('');
  const [statSeed, setStatSeed] = useState(1);
  const [sites, setSites] = useState(SITES);
  const [dict, setDict] = useState([{ko:'배송기간', en:'(제외 처리)'}, {ko:'AS 안내', en:'(제외 처리)'}]);
  const [qaItems, setQaItems] = useState(QA_ITEMS);
  const [retryQueue, setRetryQueue] = useState(RETRY_QUEUE);
  const [jobs, setJobs] = useState([
    {id:1, site:'루멘웨어 공식몰', detail:'상세페이지 12건', col:'진행중', pct:62},
    {id:2, site:'소프트에지 스토어', detail:'anti-crawling 재시도', col:'실패', pct:0},
    {id:3, site:'노르디크레인 아울렛', detail:'대기 중', col:'대기', pct:0},
    {id:4, site:'테라코튼 편집샵', detail:'셀렉터 오류', col:'실패', pct:0},
    {id:5, site:'라운드핏 마켓', detail:'수집 완료 (48건)', col:'완료', pct:100},
    {id:6, site:'베이스캠프 웨어하우스', detail:'대기 중', col:'대기', pct:0},
  ]);

  useEffect(()=>{
    const t = setInterval(()=>{
      setStatSeed(s=>s+1);
      setJobs(js => js.map(j => j.col==='진행중' ? {...j, pct: Math.min(100, j.pct + 6)} : j));
    }, 1500);
    return ()=>clearInterval(t);
  },[]);

  function showToast(msg){ setToast(msg); setTimeout(()=>setToast(''), 2400); }

  function retryJob(id){
    setJobs(js => js.map(j => j.id===id ? {...j, col:'진행중', pct:5, detail:'재시도 진행 중'} : j));
    setRetryQueue(q => q.filter(r=>r.id!==id));
    showToast('재시도 작업이 큐에 등록되었습니다');
  }
  function startJob(id){
    setJobs(js => js.map(j => j.id===id ? {...j, col:'진행중', pct:2, detail:'수집 시작됨'} : j));
    showToast('수집 작업을 시작했습니다');
  }
  function toggleSite(id, bulk){
    if(id==='bulk'){ showToast((bulk?bulk.length:0)+'개 사이트를 일괄 재시도합니다'); return; }
    setSites(sites.map(s=> s.id===id ? {...s, active:!s.active} : s));
  }
  function addSite(form){
    setSites(s=>[...s, {id:Date.now(), name:form.name||'신규 사이트', brands:1, cycle:form.cycle, last:'등록됨', active:true}]);
    showToast('신규 사이트가 등록되었습니다');
  }
  function addTerm(term){
    if(!term.ko) return;
    setDict(d=>[...d, term]);
    showToast('용어 사전에 등록되었습니다');
  }
  function retranslateQa(id){
    setQaItems(items => items.map(it => it.id===id ? {...it, score: Math.min(99, it.score + 22), note:'사전 적용 재번역 완료'} : it));
    showToast('사전 기반 재번역이 적용되었습니다');
  }
  function retryQueueItem(id){
    setRetryQueue(q => q.filter(r=>r.id!==id));
    showToast('재시도가 실행되었습니다');
  }

  return (
    <div className="app">
      <Sidebar screen={screen} setScreen={setScreen} env={env} setEnv={setEnv} retryCount={retryQueue.length} />
      <main className="main">
        {screen==='main' && (
          <React.Fragment>
            <PageHeader title="실시간 크롤링 관제" meta={env + ' 환경 · 마지막 이벤트 방금 전'}>
              <button className="btn btn-secondary" onClick={()=>showToast('오늘 기준 데이터로 보기를 전환했습니다')}><i className="ph ph-calendar-blank"></i>오늘</button>
              <button className="btn btn-primary" onClick={()=>showToast('전체 사이트 새로고침을 요청했습니다')}><i className="ph ph-arrows-clockwise"></i>전체 새로고침</button>
            </PageHeader>
            <MainScreen jobs={jobs} onRetry={retryJob} onStart={startJob} statSeed={statSeed} />
          </React.Fragment>
        )}
        {screen==='retry-queue' && (
          <React.Fragment>
            <PageHeader title="재시도 큐" meta={retryQueue.length + '건 대기 중'}>
              <button className="btn btn-primary" onClick={()=>showToast('전체 재시도를 실행했습니다')}><i className="ph ph-arrow-clockwise"></i>전체 재시도</button>
            </PageHeader>
            <RetryQueueScreen queue={retryQueue} onRetry={retryQueueItem} />
          </React.Fragment>
        )}
        {screen==='site-management' && (
          <React.Fragment>
            <PageHeader title="사이트·브랜드 통합 관리" meta={sites.length + '개 사이트 등록됨'} />
            <SiteManagementScreen sites={sites} onToggle={toggleSite} onAdd={addSite} />
          </React.Fragment>
        )}
        {screen==='translation-qa' && (
          <React.Fragment>
            <PageHeader title="번역 품질 검수 및 용어 사전 관리" meta="품질 점수 기반 우선 검수 큐" />
            <TranslationQaScreen items={qaItems} dict={dict} onAddTerm={addTerm} onRetranslate={retranslateQa} />
          </React.Fragment>
        )}
        {screen==='revenue-analytics' && (
          <React.Fragment>
            <PageHeader title="매출·마진 분석 대시보드" meta="Materialized View 기반 사전 집계">
              <button className="btn btn-secondary" onClick={()=>showToast('매출·마진 분석 대시보드 데이터를 새로고침했습니다')}><i className="ph ph-arrows-clockwise"></i>새로고침</button>
            </PageHeader>
            <RevenueAnalyticsScreen />
          </React.Fragment>
        )}
      </main>
      <Toast message={toast} />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
