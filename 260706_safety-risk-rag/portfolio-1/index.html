const { useState, useEffect, useRef, useMemo } = React;

function Icon({ name, ...props }) {
  const ref = useRef(null);
  useEffect(() => {
    if (ref.current && window.lucide) {
      ref.current.innerHTML = '';
      const el = document.createElement('i');
      el.setAttribute('data-lucide', name);
      ref.current.appendChild(el);
      window.lucide.createIcons({ nodes: [el] });
    }
  });
  return <span ref={ref} style={{ display: 'inline-flex', lineHeight: 0 }} {...props}></span>;
}

function Sparkline({ data, color = '#0091ff', w = 68, h = 26 }) {
  const max = Math.max(...data), min = Math.min(...data);
  const pts = data.map((v, i) => {
    const x = (i / (data.length - 1)) * w;
    const y = h - ((v - min) / (max - min || 1)) * (h - 4) - 2;
    return `${x.toFixed(1)},${y.toFixed(1)}`;
  }).join(' ');
  return (
    <svg className="stat-sparkline" width={w} height={h} viewBox={`0 0 ${w} ${h}`}>
      <polyline points={pts} fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" />
    </svg>
  );
}

function CountUp({ value, suffix = '' }) {
  const [n, setN] = useState(0);
  useEffect(() => {
    let raf, start;
    const dur = 700;
    const step = (t) => {
      if (!start) start = t;
      const p = Math.min((t - start) / dur, 1);
      setN(Math.round(value * (1 - Math.pow(1 - p, 3))));
      if (p < 1) raf = requestAnimationFrame(step);
    };
    raf = requestAnimationFrame(step);
    return () => cancelAnimationFrame(raf);
  }, [value]);
  return <>{n.toLocaleString()}{suffix}</>;
}

function RippleButton({ className, children, onClick, ...rest }) {
  const handle = (e) => {
    const btn = e.currentTarget;
    const rect = btn.getBoundingClientRect();
    const span = document.createElement('span');
    const size = Math.max(rect.width, rect.height);
    span.className = 'ripple-el';
    span.style.width = span.style.height = size + 'px';
    span.style.left = (e.clientX - rect.left - size / 2) + 'px';
    span.style.top = (e.clientY - rect.top - size / 2) + 'px';
    btn.appendChild(span);
    setTimeout(() => span.remove(), 560);
    if (onClick) onClick(e);
  };
  return <button className={className} onClick={handle} {...rest}>{children}</button>;
}

                  <td><Badge kind={r.status}>{r.status === 'good' ? '정상' : '적재 실패'}</Badge></td>

                  <td>{r.status === 'bad' ? <button className="row-action" onClick={e => { e.stopPropagation(); retry(r.ns); }}><Icon name="rotate-cw" /></button> : <button className="row-action" onClick={e => { e.stopPropagation(); setSelected(r); }}><Icon name="more-horizontal" /></button>}</td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      </div>

      {selected && (
        <Modal title={selected.ns} onClose={() => setSelected(null)} footer={<button className="btn btn-ghost btn-sm" onClick={() => setSelected(null)}>닫기</button>}>
          <div className="field-row"><span className="field-label">벡터 수</span><span className="field-value">{selected.vectors.toLocaleString()}</span></div>
          <div className="field-row"><span className="field-label">차원</span><span className="field-value">{selected.dim}</span></div>
          <div className="field-row"><span className="field-label">유사도 메트릭</span><span className="field-value">cosine</span></div>
          <div className="field-row"><span className="field-label">HNSW ef_construction</span><span className="field-value">128</span></div>
          <div className="field-row"><span className="field-label">활성 어댑터</span><span className="field-value">{selected.adapter === 'pinecone' ? 'Pinecone' : 'Supabase (pgvector)'}</span></div>
        </Modal>
      )}
    </>
  );
}

function RagSearchScreen() {
  const [query, setQuery] = useState('철골 조립 중 고소작업대 추락 위험');
  const [loading, setLoading] = useState(false);
  const [result, setResult] = useState(null);
  const [history, setHistory] = useState(['철골 조립 중 고소작업대 추락 위험', '거푸집 해체 중 낙하물 사고', '밀폐공간 환기 미흡 질식']);
  const [compare, setCompare] = useState(false);
  const [prevResult, setPrevResult] = useState(null);
  const [sourceModal, setSourceModal] = useState(null);

  const runSearch = () => {
    setLoading(true);
    setTimeout(() => {
      const r = {
        query,
        similar: [
          { id: 'SIF-11824', year: 2024, sim: 92 },
          { id: 'SIF-09231', year: 2023, sim: 87 },
          { id: 'SIF-14502', year: 2025, sim: 81 },
        ],
        hazard: '고소작업대 안전난간 미설치 및 안전대 미착용 상태에서의 추락',
        freq: 4, sev: 5,
        action: '작업 전 안전난간·안전대 체결 상태 점검 체크리스트 의무화, 4m 이상 고소작업 시 이중 안전고리 사용',
      };
      setPrevResult(result);
      setResult(r);
      setLoading(false);
      if (!history.includes(query)) setHistory(prev => [query, ...prev].slice(0, 6));
    }, 1400);
  };

  return (
    <>
      <div className="page-header">
        <div>
          <div className="page-title">RAG 위험성평가 자동 생성 검색</div>
          <div className="page-desc">재해사례 키워드를 입력하면 Vector DB 유사도 검색과 GPT-4o 프롬프트로 위험요인·개선대책을 자동 생성하고 출처를 함께 반환합니다.</div>
        </div>
        <div className="page-actions">
          <button className={`btn btn-ghost ${compare ? 'on' : ''}`} disabled={!prevResult} onClick={() => setCompare(!compare)}><Icon name="columns-2" /> 이전 결과와 비교</button>
        </div>
      </div>

      <div className="rag-grid">
        <div className="rag-panel">
          <div className="stat-label" style={{ marginBottom: 8 }}>재해사례 키워드 입력</div>
          <textarea className="rag-textarea" value={query} onChange={e => setQuery(e.target.value)} placeholder="예: 철골 조립 중 추락 위험" />
          <RippleButton className="btn btn-primary" style={{ width: '100%', justifyContent: 'center', marginTop: 12 }} onClick={runSearch}><Icon name="sparkles" /> 위험성평가 생성</RippleButton>

          <div style={{ marginTop: 22 }}>
            <div className="stat-label" style={{ marginBottom: 8 }}>최근 검색 이력</div>
            {history.map((h, i) => (
              <div key={i} className={`history-item ${h === query ? 'active' : ''}`} onClick={() => setQuery(h)}>{h}</div>
            ))}
          </div>
        </div>

        <div>
          {loading && (
            <div className="result-card">
              <div className="skeleton" style={{ height: 18, width: '60%', marginBottom: 12 }}></div>
              <div className="skeleton" style={{ height: 12, width: '90%', marginBottom: 8 }}></div>
              <div className="skeleton" style={{ height: 12, width: '75%' }}></div>
            </div>
          )}

          {!loading && !result && (
            <div className="empty-illust">
              <Icon name="search-check" />
              <div>키워드를 입력하고 <b>위험성평가 생성</b>을 눌러 RAG 검색 결과를 확인하세요</div>
            </div>
          )}

          {!loading && result && (
            <div style={{ display: compare && prevResult ? 'grid' : 'block', gridTemplateColumns: compare && prevResult ? '1fr 1fr' : 'none', gap: 14 }}>
              <ResultCard r={result} onSource={setSourceModal} label={compare && prevResult ? '최신 결과' : null} />
              {compare && prevResult && <ResultCard r={prevResult} onSource={setSourceModal} label="이전 결과" />}
            </div>
          )}
        </div>
      </div>

      {sourceModal && (
        <Modal title={`참고 출처 · ${sourceModal.id}`} onClose={() => setSourceModal(null)} footer={<button className="btn btn-ghost btn-sm" onClick={() => setSourceModal(null)}>닫기</button>}>
          <div className="field-row"><span className="field-label">사례 ID</span><span className="field-value">{sourceModal.id}</span></div>
          <div className="field-row"><span className="field-label">발생 연도</span><span className="field-value">{sourceModal.year}</span></div>
          <div className="field-row"><span className="field-label">유사도</span><span className="field-value">{sourceModal.sim}%</span></div>
          <div className="field-row"><span className="field-label">출처</span><span className="field-value">공공 산업안전보건 SIF 아카이브</span></div>
        </Modal>
      )}
    </>
  );

  function ResultCard({ r, onSource, label }) {
    return (
      <div className="result-card">
        {label && <Badge kind="accent">{label}</Badge>}
        <div className="result-head" style={{ marginTop: label ? 10 : 0 }}>
          <div style={{ fontWeight: 700, fontSize: 15, color: 'var(--onyx)' }}>{r.query}</div>
          <Badge kind="good">생성 완료</Badge>
        </div>
        <div className="stat-label" style={{ marginBottom: 6 }}>유사사례 Top-K</div>
        {r.similar.map(s => (
          <div key={s.id} style={{ display: 'flex', alignItems: 'center', gap: 10, marginBottom: 8 }}>
            <span className="source-chip" onClick={() => onSource(s)}><Icon name="link-2" style={{ width: 12, height: 12 }} /> {s.id} ({s.year})</span>
            <div className="similarity-bar-track"><div className="similarity-bar-fill" style={{ width: `${s.sim}%` }}></div></div>
            <span style={{ fontSize: 12, color: 'var(--slate)', width: 34 }}>{s.sim}%</span>
          </div>
        ))}
        <div style={{ marginTop: 14 }}>
          <div className="stat-label" style={{ marginBottom: 6 }}>위험요인 · 발생가능성 · 강도</div>
          <div style={{ fontSize: 13.5, color: 'var(--carbon)', lineHeight: 1.6 }}>{r.hazard}</div>
          <div style={{ display: 'flex', gap: 8, marginTop: 8 }}>
            <Badge kind="warn">빈도 {r.freq}/5</Badge>
            <Badge kind="bad">강도 {r.sev}/5</Badge>
          </div>
        </div>
        <div style={{ marginTop: 14 }}>
          <div className="stat-label" style={{ marginBottom: 6 }}>개선대책 (자동 생성)</div>
          <div style={{ fontSize: 13.5, color: 'var(--carbon)', lineHeight: 1.6 }}>{r.action}</div>
        </div>
      </div>
    );
  }
}

function RegressionScreen() {
  const [tests, setTests] = useState(REGRESSION_TESTS);
  const [running, setRunning] = useState(false);
  const [rows] = useState(SENSITIVITY_ROWS);
  const [selected, setSelected] = useState(null);

  const runAll = () => {
    setRunning(true);
    setTests(prev => prev.map(t => ({ ...t, result: 'running' })));
    setTimeout(() => {
      setTests(REGRESSION_TESTS.map(t => t.name === 'Vector DB 어댑터 failover' ? { ...t, result: 'pass', time: '340ms' } : t));
      setRunning(false);
    }, 1600);
  };

  return (
    <>
      <div className="page-header">
        <div>
          <div className="page-title">레거시 연동 회귀 테스트 · 민감도 데이터 기록</div>
          <div className="page-desc">기존 레거시 로직(중복 생성 방지·위험도 자동 계산)과의 충돌을 검증하고, AI 생성값과 관리자 수정값의 민감도 데이터를 기록합니다.</div>
        </div>
        <div className="page-actions">
          <RippleButton className="btn btn-primary" onClick={runAll} disabled={running}>{running ? <><Icon name="loader-2" style={{ animation: 'spin 0.8s linear infinite' }} /> 실행 중…</> : <><Icon name="play" /> 회귀 테스트 실행</>}</RippleButton>
        </div>
      </div>

      <div className="stat-row">
        <StatCard label="회귀 테스트 통과율" value={86} suffix="%" delta="전 사이클 대비 동일" positive spark={[80,82,83,84,85,86,86]} />
        <StatCard label="민감도 기록 건수" value={1204} delta="42건 금일 추가" positive spark={[900,980,1020,1090,1150,1180,1204]} />
        <StatCard label="편차 경고 항목" value={2} delta="1건 신규" positive={false} spark={[1,1,2,1,2,2,2]} />
        <StatCard label="평균 테스트 시간" value={287} suffix="ms" delta="72ms 개선" positive spark={[420,390,360,340,310,295,287]} />
      </div>

      <div className="data-section" style={{ marginBottom: 18 }}>
        <div className="tab-bar"><div className="tab active" style={{ cursor: 'default' }}>회귀 테스트 케이스</div></div>
        <div className="data-table-wrap">
          <table className="data-table">
            <thead><tr><th>테스트명</th><th>대상 로직</th><th>결과</th><th>실행 시간</th></tr></thead>
            <tbody>
              {tests.map(t => (
                <tr key={t.name} style={{ cursor: 'default' }}>
                  <td className="cell-strong">{t.name}</td>
                  <td className="cell-sub" style={{ fontFamily: 'monospace' }}>{t.target}</td>
                  <td>{t.result === 'running' ? <Badge kind="warn"><Icon name="loader-2" style={{ width: 11, height: 11, animation: 'spin 0.8s linear infinite' }} /> 실행 중</Badge> : <Badge kind={t.result === 'pass' ? 'good' : 'bad'}>{t.result === 'pass' ? '✓ 통과' : '✗ 실패'}</Badge>}</td>
                  <td className="cell-sub">{t.time}</td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      </div>

      <div className="data-section">
        <div className="tab-bar"><div className="tab active" style={{ cursor: 'default' }}>민감도 데이터 비교 (AI값 vs 관리자 수정값)</div></div>
        <div className="data-table-wrap">
          <table className="data-table">
            <thead><tr><th>재해유형</th><th>AI 빈도</th><th>관리자 빈도</th><th>AI 강도</th><th>관리자 강도</th><th>편차</th></tr></thead>
            <tbody>
              {rows.map(r => (
                <tr key={r.type} onClick={() => setSelected(r)}>
                  <td className="cell-strong">{r.type}</td>
                  <td>{r.aiFreq}</td>
                  <td>{r.mgrFreq}</td>
                  <td>{r.aiSev}</td>
                  <td>{r.mgrSev}</td>
                  <td><Badge kind={r.delta}>{r.delta === 'good' ? '정상' : r.delta === 'warn' ? '주의' : '위험'}</Badge></td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      </div>

      {selected && (
        <Modal title={selected.type} onClose={() => setSelected(null)} footer={<button className="btn btn-ghost btn-sm" onClick={() => setSelected(null)}>닫기</button>}>
          <div className="field-row"><span className="field-label">AI 생성 빈도 / 강도</span><span className="field-value">{selected.aiFreq} / {selected.aiSev}</span></div>
          <div className="field-row"><span className="field-label">관리자 수정 빈도 / 강도</span><span className="field-value">{selected.mgrFreq} / {selected.mgrSev}</span></div>
          <div className="field-row"><span className="field-label">편차 판정</span><span className="field-value"><Badge kind={selected.delta}>{selected.delta === 'good' ? '정상' : selected.delta === 'warn' ? '주의' : '위험'}</Badge></span></div>
          <div className="field-row"><span className="field-label">기록 용도</span><span className="field-value">AI 모델 튜닝 기준 조정</span></div>
        </Modal>
      )}
    </>
  );
}

function App() {
  const [screen, setScreen] = useState('main');
  const [toasts, setToasts] = useState([]);

  const pushToast = (text) => {
    const id = Date.now() + Math.random();
    setToasts(prev => [...prev, { id, text }]);
    setTimeout(() => setToasts(prev => prev.filter(t => t.id !== id)), 3200);
  };

  useEffect(() => { if (window.lucide) window.lucide.createIcons(); });

  return (
    <div data-archetype="stripe-multipane" style={{ width: '100%' }}>
      <aside className="sidebar">
        <div className="sidebar-brand">
          <div className="brand-mark-wrap"><div className="brand-mark-glow"></div><div className="brand-mark">RA</div></div>
          <div>
            <div className="brand-text">RiskAgent 콘솔</div>
            <div className="brand-sub">건설업 위험성평가 RAG</div>
          </div>
        </div>
        {SIDEBAR_ITEMS.map(g => (
          <div className="sidebar-section" key={g.group}>
            <div className="sidebar-section-title">{g.group}</div>
            {g.items.map(it => (
              <button key={it.screen} className={`sidebar-link ${screen === it.screen ? 'active' : ''}`} onClick={() => setScreen(it.screen)}>
                <Icon name={it.icon} />{it.label}
              </button>
            ))}
          </div>
        ))}
        <div className="sidebar-footer">v1.4.0 · 자체 개발 프로젝트</div>
      </aside>
      <main className="main-wrap">
        <div className="page-inner">
          {screen === 'main' && <SifScreen pushToast={pushToast} />}
          {screen === 'vectordb' && <VectorDbScreen />}
          {screen === 'rag-search' && <RagSearchScreen />}
          {screen === 'regression' && <RegressionScreen />}
        </div>
      </main>
      <Toasts toasts={toasts} />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
