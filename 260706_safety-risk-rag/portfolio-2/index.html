<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>산업안전 위험성평가 RAG 통합 분석 플랫폼</title>
<link rel="preconnect" href="https://cdn.jsdelivr.net">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css">
<link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/regular/style.css">
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone@7.23.0/babel.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --iris: #5683da;
    --iris-dim: rgba(86,131,218,0.16);
    --ember: #ff8964;
    --ember-dim: rgba(255,137,100,0.16);
    --void: #0e0e14;
    --canvas: #15151d;
    --card: #1a1a22;
    --card-2: #202029;
    --edge: #2c2c37;
    --edge-soft: #23232c;
    --snow: #f4f4f6;
    --smoke: #95979e;
    --ash: #6d6f78;
    --good: #4ade80;
    --good-dim: rgba(74,222,128,0.14);
    --warn: #fbbf24;
    --warn-dim: rgba(251,191,36,0.14);
    --bad: #f87171;
    --bad-dim: rgba(248,113,113,0.14);
    --font: 'Pretendard', -apple-system, BlinkMacSystemFont, sans-serif;
  }
  html, body { width: 100%; height: 100%; font-family: var(--font); background: var(--void); color: var(--snow); font-size: 14px; -webkit-font-smoothing: antialiased; overflow: hidden; }
  #root { width: 100%; height: 100vh; }
  button { font-family: var(--font); cursor: pointer; }
  input, textarea { font-family: var(--font); }

  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  @keyframes fadeInScale { from { opacity: 0; transform: scale(0.96); } to { opacity: 1; transform: scale(1); } }
  @keyframes msgIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes glowPulse { 0%, 100% { box-shadow: 0 0 0 0 rgba(255,137,100,0.45); } 50% { box-shadow: 0 0 0 5px rgba(255,137,100,0); } }
  @keyframes shimmerDark { 0% { background-position: -300% 0; } 100% { background-position: 300% 0; } }
  @keyframes spinIcon { to { transform: rotate(360deg); } }
  @keyframes auroraDrift { 0%, 100% { transform: translateX(-6%) translateY(-2%); } 50% { transform: translateX(6%) translateY(2%); } }

  [data-archetype="slack-3pane"] { display: flex; width: 100%; height: 100vh; }

  .workspace-strip { width: 64px; min-width: 64px; height: 100%; background: var(--canvas); border-right: 1px solid var(--edge); display: flex; flex-direction: column; align-items: center; padding: 16px 0; gap: 10px; position: relative; overflow: hidden; }
  .ws-aurora { position: absolute; top: -20%; left: -40%; width: 180%; height: 60%; background: radial-gradient(circle, var(--iris) 0%, transparent 65%); opacity: 0.16; filter: blur(30px); animation: auroraDrift 9s ease-in-out infinite; pointer-events: none; }
  .ws-item { width: 42px; height: 42px; border-radius: 14px; background: var(--card); border: none; display: flex; align-items: center; justify-content: center; color: var(--smoke); font-size: 17px; position: relative; z-index: 1; transition: all 0.15s; }
  .ws-item:hover { background: var(--card-2); color: var(--snow); }
  .ws-item.active { background: var(--iris); color: #fff; border-radius: 16px; }
  .ws-item .ws-badge { position: absolute; top: -3px; right: -3px; min-width: 16px; height: 16px; padding: 0 3px; border-radius: 9999px; background: var(--ember); color: #1a0a04; font-size: 9.5px; font-weight: 700; display: flex; align-items: center; justify-content: center; border: 2px solid var(--canvas); }
  .ws-divider { width: 28px; height: 1px; background: var(--edge); margin: 4px 0; z-index: 1; }

  .channel-list { width: 272px; min-width: 272px; height: 100%; background: var(--canvas); border-right: 1px solid var(--edge); display: flex; flex-direction: column; overflow: hidden; }
  .channel-header { padding: 18px 18px 10px; border-bottom: 1px solid var(--edge); }
  .ws-name { font-size: 15px; font-weight: 700; letter-spacing: -0.02em; }
  .ws-sub { font-size: 11.5px; color: var(--ash); margin-top: 3px; }
  .channel-search { padding: 10px 14px; }
  .channel-search input { width: 100%; background: var(--card); border: 1px solid var(--edge); border-radius: 4px; padding: 8px 12px; color: var(--snow); font-size: 12.5px; outline: none; }
  .channel-search input:focus { border-color: var(--iris); }
  .channel-search input::placeholder { color: var(--ash); }
  .channel-body { flex: 1; overflow-y: auto; padding: 4px 8px 12px; }
  .channel-body::-webkit-scrollbar { width: 5px; }
  .channel-body::-webkit-scrollbar-thumb { background: var(--edge); border-radius: 3px; }
  .channel-item { width: 100%; display: flex; align-items: center; gap: 10px; padding: 9px 10px; border-radius: 9999px; background: none; border: none; color: var(--smoke); font-size: 13px; text-align: left; margin-bottom: 2px; }
  .channel-item:hover { background: var(--card); color: var(--snow); }
  .channel-item.active { background: var(--iris-dim); color: var(--snow); font-weight: 600; }
  .channel-item .presence { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .channel-item .presence.warn { background: var(--warn); animation: glowPulse 2s infinite; }
  .channel-item .presence.good { background: var(--good); }
  .channel-item .presence.bad { background: var(--bad); }
  .channel-item .c-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .channel-item .c-badge { min-width: 18px; height: 18px; padding: 0 4px; border-radius: 9999px; background: var(--ember); color: #1a0a04; font-size: 10px; font-weight: 700; display: flex; align-items: center; justify-content: center; }

  .conv-main { position: relative; flex: 1; min-width: 0; height: 100%; display: flex; flex-direction: column; background: var(--void); overflow: hidden; }
  .conv-main::before {
    content: ''; position: absolute; top: -8%; left: 50%; width: 380px; height: 90%;
    transform: translateX(-50%);
    background: linear-gradient(180deg, rgba(86,131,218,0.38) 0%, rgba(255,137,100,0.30) 55%, transparent 88%);
    filter: blur(70px); pointer-events: none; z-index: 0; animation: auroraDrift 10s ease-in-out infinite;
  }
  .conv-main > * { position: relative; z-index: 1; }
  .conv-header { padding: 16px 22px; border-bottom: 1px solid var(--edge); display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
  .conv-title-row { display: flex; align-items: center; gap: 10px; }
  .conv-title { font-size: 16px; font-weight: 700; }
  .member-count { font-size: 12px; color: var(--ash); background: var(--card); padding: 3px 10px; border-radius: 9999px; }
  .conv-actions { display: flex; gap: 6px; }
  .conv-action { width: 32px; height: 32px; border-radius: 9999px; background: none; border: 1px solid var(--edge); color: var(--smoke); display: flex; align-items: center; justify-content: center; }
  .conv-action:hover, .conv-action.on { background: var(--iris-dim); color: var(--iris); border-color: var(--iris); }

  .conv-body { flex: 1; overflow-y: auto; padding: 20px 24px 10px; }
  .conv-body::-webkit-scrollbar { width: 6px; }
  .conv-body::-webkit-scrollbar-thumb { background: var(--edge); border-radius: 3px; }

  .msg-group { display: flex; gap: 12px; margin-bottom: 22px; animation: msgIn 0.3s ease; max-width: 760px; }
  .msg-avatar { width: 36px; height: 36px; border-radius: 12px; background: var(--iris); color: #fff; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 700; flex-shrink: 0; }
  .msg-avatar.ember { background: var(--ember); color: #1a0a04; }
  .msg-name { font-size: 13.5px; font-weight: 700; }
  .msg-time { font-size: 11.5px; color: var(--ash); margin-left: 8px; }
  .msg-content p { font-size: 13.5px; line-height: 1.65; color: #d7d8dc; margin-top: 4px; }
  .msg-chips { display: flex; gap: 6px; margin-top: 10px; flex-wrap: wrap; }
  .chip { display: inline-flex; align-items: center; gap: 5px; background: var(--card); border: 1px solid var(--edge); border-radius: 9999px; padding: 5px 12px; font-size: 11.5px; color: var(--smoke); }
  .chip:hover { border-color: var(--iris); color: var(--iris); }
  .chip.tag-warn { background: var(--warn-dim); color: var(--warn); border: none; }
  .chip.tag-bad { background: var(--bad-dim); color: var(--bad); border: none; }
  .chip.tag-good { background: var(--good-dim); color: var(--good); border: none; }
  .diff-bars { margin-top: 10px; display: flex; flex-direction: column; gap: 6px; }
  .diff-bar-row { display: flex; align-items: center; gap: 8px; font-size: 11.5px; color: var(--ash); }
  .diff-bar-track { flex: 1; height: 6px; border-radius: 9999px; background: var(--edge-soft); overflow: hidden; }
  .diff-bar-fill { height: 100%; border-radius: 9999px; }

  .conv-input { padding: 14px 22px 20px; flex-shrink: 0; }
  .input-shell { display: flex; align-items: center; gap: 10px; background: var(--card); border: 1px solid var(--edge); border-radius: 9999px; padding: 6px 6px 6px 18px; }
  .input-shell input { flex: 1; background: none; border: none; color: var(--snow); font-size: 13.5px; outline: none; }
  .input-shell input::placeholder { color: var(--ash); }
  .send-btn { width: 36px; height: 36px; border-radius: 9999px; background: linear-gradient(135deg, var(--iris), var(--ember)); border: none; color: #fff; display: flex; align-items: center; justify-content: center; flex-shrink: 0; box-shadow: 0 4px 14px rgba(255,137,100,0.28); }
  .send-btn:disabled { opacity: 0.4; }

  .info-panel { width: 320px; min-width: 320px; height: 100%; background: var(--canvas); border-left: 1px solid var(--edge); overflow-y: auto; animation: fadeIn 0.2s ease; }
  .info-header { padding: 18px 20px 12px; border-bottom: 1px solid var(--edge); display: flex; align-items: center; justify-content: space-between; }
  .info-header h3 { font-size: 14px; font-weight: 700; }
  .close-info { background: var(--card); border: none; width: 26px; height: 26px; border-radius: 8px; color: var(--smoke); display: flex; align-items: center; justify-content: center; }
  .info-section { padding: 16px 20px; border-bottom: 1px solid var(--edge-soft); }
  .info-label { font-size: 11px; color: var(--ash); text-transform: uppercase; letter-spacing: 0.05em; font-weight: 700; margin-bottom: 8px; }
  .info-value { font-size: 13px; color: var(--snow); font-weight: 600; }
  .info-row { display: flex; justify-content: space-between; padding: 7px 0; font-size: 12.5px; color: var(--smoke); border-bottom: 1px dashed var(--edge-soft); }
  .info-row b { color: var(--snow); }

  .badge { display: inline-flex; align-items: center; gap: 5px; padding: 4px 11px; border-radius: 9999px; font-size: 11px; font-weight: 700; }
  .badge-good { background: var(--good-dim); color: var(--good); }
  .badge-warn { background: var(--warn-dim); color: var(--warn); }
  .badge-bad { background: var(--bad-dim); color: var(--bad); }
  .badge-neutral { background: var(--card); color: var(--smoke); }

  .btn { border: none; border-radius: 9999px; padding: 9px 18px; font-size: 12.5px; font-weight: 700; display: inline-flex; align-items: center; gap: 6px; }
  .btn-ember { background: var(--ember); color: #1a0a04; }
  .btn-ghost { background: none; border: 1px solid var(--edge); color: var(--snow); }
  .btn-ghost:hover { border-color: var(--iris); color: var(--iris); }
  .btn-sm { padding: 6px 13px; font-size: 11.5px; }

  .modal-overlay { position: fixed; inset: 0; background: rgba(4,4,6,0.6); display: flex; align-items: center; justify-content: center; z-index: 100; animation: fadeIn 0.18s ease; padding: 24px; }
  .modal-box { background: var(--card); border: 1px solid var(--edge); border-radius: 16px; width: 520px; max-width: 100%; max-height: 84vh; overflow-y: auto; animation: fadeInScale 0.2s ease; box-shadow: 0 30px 70px rgba(0,0,0,0.5); }
  .modal-head { display: flex; align-items: center; justify-content: space-between; padding: 18px 22px; border-bottom: 1px solid var(--edge); position: sticky; top: 0; background: var(--card); }
  .modal-title { font-size: 15.5px; font-weight: 700; }
  .modal-close { background: var(--card-2); border: none; width: 28px; height: 28px; border-radius: 8px; color: var(--smoke); display: flex; align-items: center; justify-content: center; }
  .modal-body { padding: 20px 22px; }
  .modal-foot { padding: 14px 22px; border-top: 1px solid var(--edge); display: flex; justify-content: flex-end; gap: 8px; }

  .skeleton-line { border-radius: 6px; background: linear-gradient(90deg, var(--card) 25%, var(--card-2) 37%, var(--card) 63%); background-size: 300% 100%; animation: shimmerDark 1.3s infinite; }

  .empty-panel { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; color: var(--ash); text-align: center; padding: 40px; }
  .empty-panel i { font-size: 40px; margin-bottom: 12px; color: var(--edge); }

  .toast-stack { position: fixed; bottom: 22px; right: 22px; z-index: 200; display: flex; flex-direction: column; gap: 8px; }
  .toast { background: var(--card-2); border: 1px solid var(--edge); color: var(--snow); padding: 11px 16px; border-radius: 16px; font-size: 12.5px; font-weight: 600; display: flex; align-items: center; gap: 8px; animation: fadeInScale 0.2s ease; box-shadow: 0 10px 28px rgba(0,0,0,0.4); }
  .toast i { color: var(--good); font-size: 15px; }

  @media (max-width: 1200px) { .info-panel { display: none; } }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" data-presets="react">
const { useState, useEffect, useRef } = React;

const MODULES = [
  { id: 'history', icon: 'ph-chats-circle', label: 'RAG 검색 이력 통합 관리', short: '이력', badge: 2 },
  { id: 'sensitivity', icon: 'ph-gauge', label: '민감도 데이터 비교 분석 대시보드', short: '민감도', badge: 2 },
  { id: 'provenance', icon: 'ph-magnifying-glass', label: '출처 추적 및 근거 감사 로그', short: '출처', badge: 0 },
  { id: 'notifications', icon: 'ph-bell', label: '실시간 알림 및 캐시 최적화', short: '알림', badge: 3 },

const HISTORY_CHANNELS = [
  { id: 'q1', name: '고소작업대 추락 위험 검색', presence: 'good', unread: 0, meta: { 사례수: 3, 마지막검색: '10:24' } },
  { id: 'q2', name: '거푸집 해체 낙하물 사고', presence: 'warn', unread: 2, meta: { 사례수: 2, 마지막검색: '09:58' } },
  { id: 'q3', name: '밀폐공간 환기 미흡 질식', presence: 'good', unread: 0, meta: { 사례수: 4, 마지막검색: '09:12' } },
  { id: 'q4', name: '철골 조립 중 협착 사고', presence: 'good', unread: 0, meta: { 사례수: 1, 마지막검색: '어제' } },
  { id: 'q5', name: '전기 배선 작업 감전 위험', presence: 'bad', unread: 1, meta: { 사례수: 2, 마지막검색: '어제' } },
];

const HISTORY_MESSAGES = {
  q1: [
    { author: 'AI 엔진', ember: true, time: '10:24', text: '유사사례 3건을 검색했습니다 (SIF-11824 92%, SIF-09231 87%, SIF-14502 81%).', chips: ['SIF-11824', 'SIF-09231', 'SIF-14502'] },
    { author: 'AI 엔진', ember: true, time: '10:24', text: '위험요인: 고소작업대 안전난간 미설치 및 안전대 미착용 상태에서의 추락. 개선대책: 작업 전 안전난간·안전대 체결 점검 체크리스트 의무화.', tags: [{ t: '빈도 4/5', kind: 'warn' }, { t: '강도 5/5', kind: 'bad' }] },
  ],
  q2: [
    { author: 'AI 엔진', ember: true, time: '09:58', text: '유사사례 2건을 검색했습니다 (SIF-08820 79%, SIF-10142 74%).', chips: ['SIF-08820', 'SIF-10142'] },
    { author: 'AI 엔진', ember: true, time: '09:58', text: '위험요인: 거푸집 해체 시 상부 잔재물 고정 미흡. 개선대책: 해체 전 상부 낙하방지망 설치 및 하부 통제구역 지정.', tags: [{ t: '빈도 3/5', kind: 'warn' }, { t: '강도 4/5', kind: 'bad' }] },
  ],
  q3: [
    { author: 'AI 엔진', ember: true, time: '09:12', text: '유사사례 4건을 검색했습니다. 밀폐공간 산소농도 미측정이 공통 원인으로 확인됩니다.', chips: ['SIF-07711', 'SIF-12093'] },
  ],
  q4: [{ author: 'AI 엔진', ember: true, time: '어제', text: '협착사고 유사사례 1건. 중장비 회전부 방호덮개 미설치가 핵심 원인입니다.', chips: ['SIF-06650'] }],
  q5: [{ author: 'AI 엔진', ember: true, time: '어제', text: '감전 위험 사례 2건. 활선 작업 시 절연장갑 미착용 반복 확인.', chips: ['SIF-05310', 'SIF-05390'] }],
};

const SENS_CHANNELS = [
  { id: 's1', name: '추락사고 (고소작업)', presence: 'warn', unread: 1, meta: { aiFreq: 4, mgrFreq: 3, aiSev: 5, mgrSev: 5 } },
  { id: 's2', name: '협착사고 (중장비)', presence: 'good', unread: 0, meta: { aiFreq: 3, mgrFreq: 3, aiSev: 4, mgrSev: 4 } },
  { id: 's3', name: '낙하물사고', presence: 'bad', unread: 1, meta: { aiFreq: 3, mgrFreq: 4, aiSev: 3, mgrSev: 4 } },
  { id: 's4', name: '감전사고', presence: 'good', unread: 0, meta: { aiFreq: 2, mgrFreq: 2, aiSev: 5, mgrSev: 5 } },
  { id: 's5', name: '붕괴사고 (토사)', presence: 'warn', unread: 0, meta: { aiFreq: 2, mgrFreq: 3, aiSev: 5, mgrSev: 5 } },
];

const PROV_CHANNELS = [
  { id: 'p1', name: 'SIF-11824 · 추락사고', presence: 'good', unread: 0, meta: { 업종: '건설업', 연도: 2024, 출처: 'SIF 아카이브' } },
  { id: 'p2', name: 'SIF-09231 · 추락사고', presence: 'good', unread: 0, meta: { 업종: '건설업', 연도: 2023, 출처: 'SIF 아카이브' } },
  { id: 'p3', name: 'SIF-08820 · 낙하물사고', presence: 'warn', unread: 1, meta: { 업종: '건설업', 연도: 2022, 출처: 'SIF 아카이브' } },
  { id: 'p4', name: 'SIF-07711 · 질식사고', presence: 'good', unread: 0, meta: { 업종: '건설업', 연도: 2025, 출처: 'SIF 아카이브' } },
];

const NOTI_CHANNELS = [
  { id: 'n1', name: '민감도 편차 임계값 초과', presence: 'bad', unread: 2, meta: { 큐: 'sensitivity-alert', 재시도: 0 } },
  { id: 'n2', name: 'Vector DB 적재 실패 알림', presence: 'warn', unread: 1, meta: { 큐: 'vectordb-fail', 재시도: 2 } },
  { id: 'n3', name: 'Redis 캐시 무효화 로그', presence: 'good', unread: 0, meta: { 큐: 'cache-invalidate', 재시도: 0 } },
];

function Icon({ name, style }) { return <i className={`ph ${name}`} style={style}></i>; }

function Modal({ title, onClose, children, footer }) {
  return (
    <div className="modal-overlay" onClick={onClose}>
      <div className="modal-box" style={{ borderRadius: 16 }} onClick={e => e.stopPropagation()}>
        <div className="modal-head">
          <div className="modal-title">{title}</div>
          <button className="modal-close" onClick={onClose}><Icon name="ph-x" /></button>
        </div>
        <div className="modal-body">{children}</div>
        {footer && <div className="modal-foot">{footer}</div>}
      </div>
    </div>
  );
}

function Toasts({ toasts }) {
  return (
    <div className="toast-stack">
      {toasts.map(t => (
        <div className="toast" key={t.id}><Icon name="ph-check-circle" /> {t.text}</div>
      ))}
    </div>
  );
}

function ChannelList({ title, sub, channels, activeId, onSelect, presenceExtra }) {
  const [q, setQ] = useState('');
  const filtered = channels.filter(c => c.name.includes(q));
  return (
    <aside className="channel-list">
      <div className="channel-header">
        <div className="ws-name">{title}</div>
        <div className="ws-sub">{sub}</div>
      </div>
      <div className="channel-search">
        <input placeholder="검색…" value={q} onChange={e => setQ(e.target.value)} />
      </div>
      <div className="channel-body">
        {filtered.map(c => (
          <button key={c.id} className={`channel-item ${activeId === c.id ? 'active' : ''}`} onClick={() => onSelect(c.id)}>
            <span className={`presence ${c.presence}`}></span>
            <span className="c-name">{c.name}</span>
            {c.unread > 0 && <span className="c-badge">{c.unread}</span>}
          </button>
        ))}
      </div>
    </aside>
  );
}

function HistoryModule({ infoOpen, setInfoOpen, sourceModal, setSourceModal }) {
  const [active, setActive] = useState('q1');
  const [messages, setMessages] = useState(HISTORY_MESSAGES);
  const [loading, setLoading] = useState(false);
  const [input, setInput] = useState('');
  const bodyRef = useRef(null);
  const ch = HISTORY_CHANNELS.find(c => c.id === active);

  useEffect(() => { if (bodyRef.current) bodyRef.current.scrollTop = bodyRef.current.scrollHeight; }, [messages, active, loading]);

  const send = () => {
    if (!input.trim()) return;
    const q = input.trim();
    setInput('');
    setMessages(prev => ({ ...prev, [active]: [...(prev[active] || []), { author: '운영자', time: '방금', text: q, self: true }] }));
    setLoading(true);
    setTimeout(() => {
      setMessages(prev => ({ ...prev, [active]: [...(prev[active] || []), { author: 'AI 엔진', ember: true, time: '방금', text: `"${q}" 키워드로 유사사례 2건을 재검색했습니다. 위험요인과 출처를 갱신했습니다.`, chips: ['SIF-13390', 'SIF-08120'] }] }));
      setLoading(false);
    }, 1300);
  };

  return (
    <>
      <ChannelList title="검색 이력" sub="RAG 재해사례 대화" channels={HISTORY_CHANNELS} activeId={active} onSelect={setActive} />
      <main className="conv-main">
        <header className="conv-header">
          <div className="conv-title-row">
            <h2 className="conv-title">{ch.name}</h2>
            <span className="member-count">사례 {ch.meta.사례수}건</span>
          </div>
          <div className="conv-actions">
            <button className={`conv-action ${infoOpen ? 'on' : ''}`} onClick={() => setInfoOpen(!infoOpen)}><Icon name="ph-info" /></button>
          </div>
        </header>
        <div className="conv-body" ref={bodyRef}>
          {(messages[active] || []).map((m, i) => (
            <div className="msg-group" key={i}>
              <div className={`msg-avatar ${m.ember ? 'ember' : ''}`}>{m.self ? '운' : 'AI'}</div>
              <div>
                <div><span className="msg-name">{m.author}</span><span className="msg-time">{m.time}</span></div>
                <div className="msg-content"><p>{m.text}</p></div>
                {m.chips && <div className="msg-chips">{m.chips.map(c => <span className="chip" key={c} onClick={() => setSourceModal(c)}><Icon name="ph-link" style={{ fontSize: 12 }} /> {c}</span>)}</div>}
                {m.tags && <div className="msg-chips">{m.tags.map(t => <span className={`chip tag-${t.kind}`} key={t.t}>{t.t}</span>)}</div>}
              </div>
            </div>
          ))}
          {loading && (
            <div className="msg-group">
              <div className="msg-avatar ember">AI</div>
              <div style={{ width: 320 }}>
                <div style={{ fontSize: 12, color: 'var(--ash)', marginBottom: 8, display: 'flex', alignItems: 'center', gap: 6 }}>
                  <Icon name="ph-circle-notch" style={{ animation: 'spinIcon 0.8s linear infinite' }} /> 재검색 결과 생성 중…
                </div>
                <div className="skeleton-line" style={{ height: 13, width: '80%', marginBottom: 8 }}></div>
                <div className="skeleton-line" style={{ height: 13, width: '55%' }}></div>
              </div>
            </div>
          )}
        </div>
        <div className="conv-input">
          <div className="input-shell">
            <input placeholder="새 재해사례 키워드로 재검색…" value={input} onChange={e => setInput(e.target.value)} onKeyDown={e => e.key === 'Enter' && send()} />
            <button className="send-btn" onClick={send} disabled={!input.trim()}><Icon name="ph-paper-plane-tilt" /></button>
          </div>
        </div>
      </main>
      {infoOpen && (
        <aside className="info-panel">
          <div className="info-header"><h3>대화 정보</h3><button className="close-info" onClick={() => setInfoOpen(false)}><Icon name="ph-x" /></button></div>
          <div className="info-section">
            <div className="info-label">검색 메타데이터</div>
            <div className="info-row"><span>사례 수</span><b>{ch.meta.사례수}건</b></div>
            <div className="info-row"><span>마지막 검색</span><b>{ch.meta.마지막검색}</b></div>
            <div className="info-row"><span>임베딩 모델</span><b>text-embedding-3-small</b></div>
            <div className="info-row"><span>생성 모델</span><b>GPT-4o</b></div>
          </div>
        </aside>
      )}
      {sourceModal && (
        <Modal title={`원본 출처 · ${sourceModal}`} onClose={() => setSourceModal(null)} footer={<button className="btn btn-ghost btn-sm" onClick={() => setSourceModal(null)}>닫기</button>}>
          <p style={{ fontSize: 13, lineHeight: 1.7, color: '#d7d8dc' }}>SIF 아카이브 원문: "고소작업대 안전난간 미설치 상태에서 작업자가 4.2m 높이에서 추락하여 상해를 입음. 안전대 미착용 확인됨."</p>
        </Modal>
      )}
    </>
  );
}

function SensitivityModule({ infoOpen, setInfoOpen, pushToast }) {
  const [active, setActive] = useState('s1');
  const [rows, setRows] = useState(SENS_CHANNELS);
  const [note, setNote] = useState('');
  const [notes, setNotes] = useState({});
  const ch = rows.find(c => c.id === active);

  const resolve = () => { setRows(prev => prev.map(r => r.id === active ? { ...r, presence: 'good', unread: 0 } : r)); pushToast('편차를 확인 완료로 표시했습니다'); };
  const addNote = () => {
    if (!note.trim()) return;
    setNotes(prev => ({ ...prev, [active]: [...(prev[active] || []), note.trim()] }));
    setNote('');
    pushToast('메모가 저장되었습니다');
  };

  return (
    <>
      <ChannelList title="민감도 데이터" sub="재해유형별 편차 비교" channels={rows} activeId={active} onSelect={setActive} />
      <main className="conv-main">
        <header className="conv-header">
          <div className="conv-title-row"><h2 className="conv-title">{ch.name}</h2></div>
          <div className="conv-actions">
            <button className={`conv-action ${infoOpen ? 'on' : ''}`} onClick={() => setInfoOpen(!infoOpen)}><Icon name="ph-info" /></button>
          </div>
        </header>
        <div className="conv-body">
          <div className="msg-group">
            <div className="msg-avatar">AI</div>
            <div style={{ width: '100%', maxWidth: 480 }}>
              <div><span className="msg-name">AI 생성값 vs 관리자 수정값</span></div>
              <div className="diff-bars">
                <div className="diff-bar-row"><span style={{ width: 70 }}>빈도 (AI)</span><div className="diff-bar-track"><div className="diff-bar-fill" style={{ width: `${ch.meta.aiFreq * 20}%`, background: 'var(--iris)' }}></div></div><span>{ch.meta.aiFreq}/5</span></div>
                <div className="diff-bar-row"><span style={{ width: 70 }}>빈도 (관리자)</span><div className="diff-bar-track"><div className="diff-bar-fill" style={{ width: `${ch.meta.mgrFreq * 20}%`, background: 'var(--ember)' }}></div></div><span>{ch.meta.mgrFreq}/5</span></div>
                <div className="diff-bar-row"><span style={{ width: 70 }}>강도 (AI)</span><div className="diff-bar-track"><div className="diff-bar-fill" style={{ width: `${ch.meta.aiSev * 20}%`, background: 'var(--iris)' }}></div></div><span>{ch.meta.aiSev}/5</span></div>
                <div className="diff-bar-row"><span style={{ width: 70 }}>강도 (관리자)</span><div className="diff-bar-track"><div className="diff-bar-fill" style={{ width: `${ch.meta.mgrSev * 20}%`, background: 'var(--ember)' }}></div></div><span>{ch.meta.mgrSev}/5</span></div>
              </div>
              {ch.presence !== 'good' && (
                <div style={{ marginTop: 14, display: 'flex', gap: 8 }}>
                  <button className="btn btn-ember btn-sm" onClick={resolve}><Icon name="ph-check" /> 편차 확인 완료로 표시</button>
                </div>
              )}
            </div>
          </div>
          {(notes[active] || []).map((n, i) => (
            <div className="msg-group" key={i}>
              <div className="msg-avatar">운</div>
              <div><div><span className="msg-name">운영자 메모</span><span className="msg-time">방금</span></div><div className="msg-content"><p>{n}</p></div></div>
            </div>
          ))}
        </div>
        <div className="conv-input">
          <div className="input-shell">
            <input placeholder="이 편차에 대한 메모를 남기세요…" value={note} onChange={e => setNote(e.target.value)} onKeyDown={e => e.key === 'Enter' && addNote()} />
            <button className="send-btn" onClick={addNote} disabled={!note.trim()}><Icon name="ph-paper-plane-tilt" /></button>
          </div>
        </div>
      </main>
      {infoOpen && (
        <aside className="info-panel">
          <div className="info-header"><h3>편차 요약</h3><button className="close-info" onClick={() => setInfoOpen(false)}><Icon name="ph-x" /></button></div>
          <div className="info-section">
            <div className="info-label">판정</div>
            <span className={`badge ${ch.presence === 'good' ? 'badge-good' : ch.presence === 'bad' ? 'badge-bad' : 'badge-warn'}`}>{ch.presence === 'good' ? '정상' : ch.presence === 'bad' ? '위험' : '주의'}</span>
          </div>
          <div className="info-section">
            <div className="info-label">기록 용도</div>
            <div className="info-value">AI 모델 튜닝 기준 조정</div>
          </div>
        </aside>
      )}
    </>
  );
}

function ProvenanceModule({ infoOpen, setInfoOpen, pushToast }) {
  const [active, setActive] = useState('p1');
  const [searchId, setSearchId] = useState('');
  const [traceModal, setTraceModal] = useState(null);
  const ch = PROV_CHANNELS.find(c => c.id === active);

  const searchById = () => {
    const found = PROV_CHANNELS.find(c => c.name.includes(searchId.trim()));
    if (found) { setActive(found.id); pushToast(`"${searchId.trim()}" 사례를 찾았습니다`); }
    else pushToast('일치하는 사례 ID를 찾지 못했습니다');
  };

  return (
    <>
      <ChannelList title="출처 감사 로그" sub="근거 추적 · SIF 원본" channels={PROV_CHANNELS} activeId={active} onSelect={setActive} />
      <main className="conv-main">
        <header className="conv-header">
          <div className="conv-title-row"><h2 className="conv-title">{ch.name}</h2></div>
          <div className="conv-actions">
            <button className={`conv-action ${infoOpen ? 'on' : ''}`} onClick={() => setInfoOpen(!infoOpen)}><Icon name="ph-info" /></button>
          </div>
        </header>
        <div className="conv-body">
          <div className="msg-group">
            <div className="msg-avatar ember">감</div>
            <div>
              <div><span className="msg-name">감사 로그</span><span className="msg-time">RAG 응답 생성 시점 기록</span></div>
              <div className="msg-content"><p>이 RAG 응답은 {ch.name.split(' · ')[0]}를 근거로 생성되었습니다. 역추적 인덱스를 통해 원본 SIF 사례로 바로 이동할 수 있습니다.</p></div>
              <div className="msg-chips"><span className="chip" onClick={() => setTraceModal(ch)}><Icon name="ph-arrow-square-out" style={{ fontSize: 12 }} /> 원본 사례로 이동</span></div>
            </div>
          </div>
        </div>
        <div className="conv-input">
          <div className="input-shell">
            <input placeholder="사례 ID로 검색…" value={searchId} onChange={e => setSearchId(e.target.value)} onKeyDown={e => e.key === 'Enter' && searchById()} />
            <button className="send-btn" onClick={searchById} disabled={!searchId.trim()}><Icon name="ph-magnifying-glass" /></button>
          </div>
        </div>
      </main>
      {traceModal && (
        <Modal title={`원본 SIF 사례 · ${traceModal.name}`} onClose={() => setTraceModal(null)} footer={<button className="btn btn-ghost btn-sm" onClick={() => setTraceModal(null)}>닫기</button>}>
          <div className="info-row"><span>업종</span><b>{traceModal.meta.업종}</b></div>
          <div className="info-row"><span>발생 연도</span><b>{traceModal.meta.연도}</b></div>
          <div className="info-row"><span>출처</span><b>{traceModal.meta.출처}</b></div>
        </Modal>
      )}
      {infoOpen && (
        <aside className="info-panel">
          <div className="info-header"><h3>원본 SIF 메타</h3><button className="close-info" onClick={() => setInfoOpen(false)}><Icon name="ph-x" /></button></div>
          <div className="info-section">
            <div className="info-row"><span>업종</span><b>{ch.meta.업종}</b></div>
            <div className="info-row"><span>발생 연도</span><b>{ch.meta.연도}</b></div>
            <div className="info-row"><span>출처</span><b>{ch.meta.출처}</b></div>
          </div>
        </aside>
      )}
    </>
  );
}

function NotificationsModule({ infoOpen, setInfoOpen, pushToast }) {
  const [active, setActive] = useState('n1');
  const [rows, setRows] = useState(NOTI_CHANNELS);
  const [ruleNote, setRuleNote] = useState('');
  const [ruleNotes, setRuleNotes] = useState({});
  const ch = rows.find(c => c.id === active);
  const ack = () => { setRows(prev => prev.map(r => r.id === active ? { ...r, presence: 'good', unread: 0 } : r)); pushToast('알림을 확인 처리했습니다'); };
  const addRuleNote = () => {
    if (!ruleNote.trim()) return;
    setRuleNotes(prev => ({ ...prev, [active]: [...(prev[active] || []), ruleNote.trim()] }));
    setRuleNote('');
    pushToast('알림 규칙 메모를 추가했습니다');
  };

  return (
    <>
      <ChannelList title="알림 채널" sub="Bull Queue · 임계값 경보" channels={rows} activeId={active} onSelect={setActive} />
      <main className="conv-main">
        <header className="conv-header">
          <div className="conv-title-row"><h2 className="conv-title">{ch.name}</h2><span className="member-count">재시도 {ch.meta.재시도}회</span></div>
          <div className="conv-actions">
            <button className={`conv-action ${infoOpen ? 'on' : ''}`} onClick={() => setInfoOpen(!infoOpen)}><Icon name="ph-info" /></button>
          </div>
        </header>
        <div className="conv-body">
          <div className="msg-group">
            <div className="msg-avatar">Q</div>
            <div>
              <div><span className="msg-name">알림 큐</span><span className="msg-time">{ch.meta.큐}</span></div>
              <div className="msg-content"><p>임계값 초과 조건이 감지되어 Bull Queue에 알림 잡이 등록되었습니다. Redis 캐시 무효화가 함께 트리거됩니다.</p></div>
              {ch.presence !== 'good' && <div style={{ marginTop: 10 }}><button className="btn btn-ember btn-sm" onClick={ack}><Icon name="ph-check" /> 확인 처리</button></div>}
            </div>
          </div>
          {(ruleNotes[active] || []).map((n, i) => (
            <div className="msg-group" key={i}>
              <div className="msg-avatar">운</div>
              <div><div><span className="msg-name">운영자 메모</span><span className="msg-time">방금</span></div><div className="msg-content"><p>{n}</p></div></div>
            </div>
          ))}
        </div>
        <div className="conv-input">
          <div className="input-shell">
            <input placeholder="알림 규칙 메모 추가…" value={ruleNote} onChange={e => setRuleNote(e.target.value)} onKeyDown={e => e.key === 'Enter' && addRuleNote()} />
            <button className="send-btn" onClick={addRuleNote} disabled={!ruleNote.trim()}><Icon name="ph-paper-plane-tilt" /></button>
          </div>
        </div>
      </main>
      {infoOpen && (
        <aside className="info-panel">
          <div className="info-header"><h3>인프라 상태</h3><button className="close-info" onClick={() => setInfoOpen(false)}><Icon name="ph-x" /></button></div>
          <div className="info-section">
            <div className="info-row"><span>Bull Queue 대기</span><b>3건</b></div>
            <div className="info-row"><span>Redis 캐시 히트율</span><b>91%</b></div>
            <div className="info-row"><span>캐시 무효화 최근</span><b>2분 전</b></div>
          </div>
        </aside>
      )}
    </>
  );
}

function App() {
  const [module, setModule] = useState('history');
  const [infoOpen, setInfoOpen] = useState(true);
  const [sourceModal, setSourceModal] = useState(null);
  const [toasts, setToasts] = useState([]);

  const pushToast = (text) => {
    const id = Date.now() + Math.random();
    setToasts(prev => [...prev, { id, text }]);
    setTimeout(() => setToasts(prev => prev.filter(t => t.id !== id)), 3000);
  };

  return (
    <div data-archetype="slack-3pane" style={{ width: '100%' }}>
      <nav className="workspace-strip">
        <div className="ws-aurora"></div>
        {MODULES.map(m => (
          <button key={m.id} className={`ws-item ${module === m.id ? 'active' : ''}`} title={m.label} onClick={() => setModule(m.id)}>
            <Icon name={m.icon} />
            {m.badge > 0 && <span className="ws-badge">{m.badge}</span>}
          </button>
        ))}
        <div className="ws-divider"></div>
      </nav>

      {module === 'history' && <HistoryModule infoOpen={infoOpen} setInfoOpen={setInfoOpen} sourceModal={sourceModal} setSourceModal={setSourceModal} pushToast={pushToast} />}
      {module === 'sensitivity' && <SensitivityModule infoOpen={infoOpen} setInfoOpen={setInfoOpen} pushToast={pushToast} />}
      {module === 'provenance' && <ProvenanceModule infoOpen={infoOpen} setInfoOpen={setInfoOpen} pushToast={pushToast} />}
      {module === 'notifications' && <NotificationsModule infoOpen={infoOpen} setInfoOpen={setInfoOpen} pushToast={pushToast} />}
      <Toasts toasts={toasts} />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
