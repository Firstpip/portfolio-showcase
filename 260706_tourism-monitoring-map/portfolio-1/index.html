<!DOCTYPE html>
<html lang="ko" data-archetype="map-canvas">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>안심트래블맵 — 맞춤 구현 데모</title>
<link rel="preconnect" href="https://cdn.jsdelivr.net">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<style>
:root{
  --ink:#101010;
  --graphite:#242424;
  --slate:#6b7280;
  --stone:#898989;
  --silver:#e5e7eb;
  --paper:#f4f4f4;
  --white:#ffffff;
  --blue:#0099ff;
  --accent:#3ad98a;
  --g1:#0f8a4c;
  --g2:#3ad98a;
  --g3:#f5a623;
  --g4:#f2711c;
  --g5:#e0342c;
  --shadow-sm: rgba(36,36,36,.7) 0px 1px 5px -4px, rgba(36,36,36,.05) 0px 4px 8px 0px;
  --shadow-card: rgba(36,36,36,.05) 0px 4px 8px 0px;
  --shadow-float: 0 20px 44px rgba(16,16,16,.16);
}
*{box-sizing:border-box; margin:0; padding:0;}
html,body{width:100%; height:100%;}
body{
  font-family:'Pretendard', ui-sans-serif, system-ui, sans-serif;
  background:var(--paper);
  color:var(--graphite);
  overflow:hidden;
  -webkit-font-smoothing:antialiased;
}
#root{width:100%; height:100vh;}
button{font-family:inherit; cursor:pointer; border:none; background:none;}
input, select{font-family:inherit;}

/* ── keyframes ─────────────────────────────────────────── */
@keyframes fadeIn{ from{opacity:0;} to{opacity:1;} }
@keyframes slideUp{ from{opacity:0; transform:translateY(28px);} to{opacity:1; transform:translateY(0);} }
@keyframes pulseRing{ 0%{transform:scale(1); opacity:.65;} 70%{transform:scale(2.4); opacity:0;} 100%{transform:scale(2.4); opacity:0;} }
@keyframes spin{ from{transform:rotate(0deg);} to{transform:rotate(360deg);} }

.app-shell{width:100%; height:100vh; position:relative; display:flex; flex-direction:column;}

.info-banner{
  width:100%; flex:0 0 34px; background:#eff6fe; color:var(--blue);
  display:flex; align-items:center; justify-content:center; gap:7px;
  font-size:12.5px; font-weight:500; letter-spacing:.1px;
}

/* ── top bar (geo-stats) ───────────────────────────────── */
.topbar{
  width:100%; height:64px; flex:0 0 64px;
  display:flex; align-items:center; gap:28px;
  padding:0 24px; background:var(--white);
  border-bottom:1px solid var(--silver);
  position:relative; z-index:40;
}
.brand{display:flex; align-items:center; gap:9px; font-weight:600; font-size:18px; color:var(--ink); letter-spacing:.2px;}
.brand .brand-icon{width:32px; height:32px; border-radius:9999px; background:var(--ink); display:flex; align-items:center; justify-content:center; color:#fff;}
.stat-group{display:flex; align-items:center; gap:10px;}
.stat-pill{
  display:flex; flex-direction:column; gap:1px;
  padding:6px 16px; background:var(--paper); border:1px solid var(--silver);
}
.stat-pill .label{font-size:11px; color:var(--stone); letter-spacing:.2px;}
.stat-pill .value{font-size:18px; font-weight:600; color:var(--ink);}
.topnav{display:flex; align-items:center; gap:4px; margin-left:auto;}
.nav-btn{
  display:flex; align-items:center; gap:6px;
  padding:9px 16px; border-radius:9999px; font-size:14px; font-weight:500;
  color:var(--graphite); transition:background .15s, color .15s, transform .12s;
}
.nav-btn:hover{background:var(--paper); transform:translateY(-1px);}
.nav-btn.active{background:var(--ink); color:#fff;}
.nav-btn svg{width:16px; height:16px;}

/* ── map stage ──────────────────────────────────────────── */
.map-stage{flex:1; position:relative; overflow:hidden; background:var(--paper);}
.map-canvas{position:absolute; inset:0; background:
  radial-gradient(circle at 18% 22%, #e7f5ee 0%, transparent 42%),
  radial-gradient(circle at 82% 78%, #eaf3ff 0%, transparent 46%),
  var(--paper);
}
.map-grid{position:absolute; inset:0; opacity:.55;}
.map-region-label{
  position:absolute; font-size:12px; color:var(--stone); font-weight:500;
  letter-spacing:.4px; pointer-events:none; text-transform:uppercase;
}

.marker{
  position:absolute; width:18px; height:18px; border-radius:9999px;
  background:var(--ink); border:2.5px solid #fff; box-shadow:0 2px 6px rgba(16,16,16,.28);
  transform:translate(-50%,-50%); cursor:pointer;
  transition:transform .15s ease;
  display:flex; align-items:center; justify-content:center;
  z-index:5;
}
.marker:hover{transform:translate(-50%,-50%) translateY(-3px);}
.marker.selected{transform:translate(-50%,-50%) translateY(-4px); box-shadow:0 6px 14px rgba(16,16,16,.35); z-index:20;}
.marker-core{width:7px; height:7px; border-radius:9999px; flex:0 0 7px;}
.radar-sweep{
  position:absolute; left:50%; top:50%; width:340px; height:340px;
  transform:translate(-50%,-50%); border-radius:9999px;
  background:conic-gradient(from 0deg, rgba(58,217,138,.4), rgba(58,217,138,0) 32%, rgba(58,217,138,0) 100%);
  animation:spin 6s linear infinite; pointer-events:none; z-index:1;
}
.radar-ring{
  position:absolute; left:50%; top:50%; border-radius:9999px; border:1px solid rgba(16,16,16,.08);
  transform:translate(-50%,-50%); pointer-events:none; z-index:1;
}
.radar-ring.r1{width:340px; height:340px;}
.radar-ring.r2{width:220px; height:220px;}
.marker-ring{
  position:absolute; inset:-9px; border-radius:9999px; border:2px solid currentColor;
  animation:pulseRing 2.2s ease-out infinite;
}

.map-control{
  position:absolute; top:20px; right:20px; z-index:30;
  display:flex; flex-direction:column; background:#fff; border-radius:12px;
  box-shadow:var(--shadow-float); overflow:hidden;
}
.map-control button{width:38px; height:38px; display:flex; align-items:center; justify-content:center; color:var(--graphite); transition:background .12s;}
.map-control button:hover{background:var(--paper);}
.map-control button + button{border-top:1px solid var(--silver);}

.legend{
  position:absolute; left:20px; bottom:20px; z-index:30;
  background:#fff; border-radius:12px; padding:14px 16px;
  box-shadow:var(--shadow-float);
  display:flex; flex-direction:column; gap:7px;
}
.legend-title{font-size:12px; font-weight:600; color:var(--stone); margin-bottom:2px; letter-spacing:.3px;}
.legend-row{display:flex; align-items:center; gap:8px; font-size:13px; color:var(--graphite);}
.legend-dot{width:9px; height:9px; border-radius:9999px; flex:0 0 9px;}
.legend-marker{width:16px; height:16px; flex:0 0 16px; display:flex; align-items:center; justify-content:center; color:var(--slate);}

/* ── geo-drawer (side-drawer) ──────────────────────────── */
.geo-drawer.side-drawer{
  position:absolute; right:20px; top:20px; bottom:20px; z-index:25;
  width:340px; background:#fff; border-radius:12px;
  box-shadow:var(--shadow-float);
  display:flex; flex-direction:column; overflow:hidden;
  animation:fadeIn .35s ease;
}
.drawer-head{padding:18px 18px 14px; border-bottom:1px solid var(--silver);}
.drawer-head h2{font-size:16px; font-weight:600; color:var(--ink); margin-bottom:10px;}
.search-box{
  display:flex; align-items:center; gap:8px; background:var(--paper);
  border:1px solid var(--silver); border-radius:8px; padding:9px 12px;
}
.search-box input{flex:1; border:none; background:none; outline:none; font-size:13px; color:var(--graphite);}
.search-box svg{width:15px; height:15px; color:var(--stone); flex:0 0 15px;}

.filter-toggle-row{display:flex; align-items:center; justify-content:space-between; margin-top:12px;}
.filter-summary{font-size:12px; color:var(--slate);}
.filter-toggle-btn{
  display:flex; align-items:center; gap:5px; font-size:12px; font-weight:600; color:var(--ink);
  padding:6px 12px; border:1px solid var(--silver); border-radius:9999px; transition:background .12s;
}
.filter-toggle-btn:hover{background:var(--paper);}
.filter-toggle-btn svg{width:13px; height:13px;}

.filter-panel{
  padding:16px 18px; border-bottom:1px solid var(--silver); background:var(--paper);
  animation:slideUp .3s ease;
}
.filter-panel-title{font-size:12px; font-weight:600; color:var(--stone); margin-bottom:8px; letter-spacing:.3px;}
.grade-chip-row{display:flex; flex-wrap:wrap; gap:6px; margin-bottom:14px;}
.grade-chip{
  display:flex; align-items:center; gap:6px; font-size:12px; font-weight:500;
  padding:6px 10px; border-radius:9999px; border:1.5px solid transparent; background:#fff;
  color:var(--graphite); transition:transform .12s, border-color .12s;
}
.grade-chip:hover{transform:translateY(-1px);}
.grade-chip.on{border-color:currentColor;}
.grade-chip .dot{width:7px; height:7px; border-radius:9999px;}
.region-select{
  width:100%; padding:9px 10px; border:1px solid var(--silver); border-radius:8px;
  font-size:13px; color:var(--graphite); background:#fff;
}
.filter-reset{margin-top:10px; font-size:12px; color:var(--blue); font-weight:600;}
.filter-reset:hover{text-decoration:underline;}

.biz-list{flex:1; overflow-y:auto; padding:8px 10px;}
.biz-row{
  display:flex; align-items:center; gap:10px; padding:11px 10px; border-radius:10px;
  transition:background .12s, transform .12s;
}
.biz-row:hover{background:var(--paper); transform:translateY(-1px);}
.biz-row.active{background:#eef8f2;}
.biz-grade-dot{width:10px; height:10px; border-radius:9999px; flex:0 0 10px;}
.biz-info{flex:1; min-width:0;}
.biz-name{font-size:13.5px; font-weight:600; color:var(--ink); white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
.biz-meta{font-size:11.5px; color:var(--slate); margin-top:1px;}
.biz-arrow{width:14px; height:14px; color:var(--stone); flex:0 0 14px;}
.empty-state{padding:40px 20px; text-align:center; color:var(--stone); font-size:13px;}

/* ── detail card (floating overlay) ────────────────────── */
.detail-card{
  position:absolute; right:380px; bottom:20px; z-index:35;
  width:320px; background:#fff; border-radius:12px;
  box-shadow:var(--shadow-float);
  animation:slideUp .32s cubic-bezier(.22,1,.36,1);
  overflow:hidden;
}
.detail-head{padding:18px 18px 12px; position:relative;}
.detail-close{position:absolute; top:14px; right:14px; width:26px; height:26px; border-radius:9999px; display:flex; align-items:center; justify-content:center; color:var(--stone); transition:background .12s;}
.detail-close:hover{background:var(--paper);}
.detail-category{font-size:11px; color:var(--slate); text-transform:uppercase; letter-spacing:.4px; margin-bottom:6px;}
.detail-name{font-size:18px; font-weight:600; color:var(--ink); margin-bottom:10px; padding-right:24px;}
.detail-badge{
  display:inline-flex; align-items:center; gap:6px; padding:5px 12px; border-radius:9999px;
  font-size:12px; font-weight:600; color:#fff;
}
.detail-body{padding:0 18px 18px;}
.detail-comment{font-size:13px; color:var(--graphite); line-height:1.6; background:var(--paper); border-radius:8px; padding:12px; margin:12px 0;}
.detail-chart-label{font-size:11px; font-weight:600; color:var(--stone); margin-bottom:6px; letter-spacing:.3px;}
.detail-actions{display:flex; gap:8px; margin-top:14px;}
.btn-ghost{flex:1; padding:9px; border-radius:9999px; border:1px solid var(--silver); font-size:12.5px; font-weight:600; color:var(--graphite); text-align:center; transition:background .12s;}
.btn-ghost:hover{background:var(--paper);}
.btn-ink{flex:1; padding:9px; border-radius:9999px; background:var(--ink); font-size:12.5px; font-weight:600; color:#fff; text-align:center; transition:transform .12s;}
.btn-ink:hover{transform:translateY(-1px);}

/* ── admin panel ────────────────────────────────────────── */
.admin-stage{flex:1; overflow-y:auto; background:var(--paper); padding:40px 48px; animation:fadeIn .3s ease;}
.admin-wrap{max-width:920px; margin:0 auto;}
.admin-back{
  display:inline-flex; align-items:center; gap:6px; font-size:13px; font-weight:600; color:var(--slate);
  margin-bottom:20px; transition:color .12s;
}
.admin-back:hover{color:var(--ink);}
.admin-title-row{display:flex; align-items:center; justify-content:space-between; margin-bottom:6px;}
.admin-title{font-size:32px; font-weight:600; color:var(--ink); letter-spacing:.2px;}
.admin-badge{display:flex; align-items:center; gap:6px; font-size:12px; font-weight:600; color:#0f8a4c; background:#e8f8ef; padding:6px 12px; border-radius:9999px;}
.admin-sub{font-size:14px; color:var(--slate); margin-bottom:32px;}

.upload-zone{
  border:1.5px dashed var(--silver); border-radius:12px; background:#fff;
  padding:48px 24px; text-align:center; margin-bottom:28px;
  transition:border-color .15s, background .15s;
}
.upload-zone.hover{border-color:var(--blue); background:#eff6fe;}
.upload-icon{width:52px; height:52px; border-radius:9999px; background:var(--paper); display:flex; align-items:center; justify-content:center; margin:0 auto 16px; color:var(--stone);}
.upload-title{font-size:16px; font-weight:600; color:var(--ink); margin-bottom:6px;}
.upload-sub{font-size:13px; color:var(--slate); margin-bottom:20px;}
.upload-btn{
  display:inline-flex; align-items:center; gap:8px; padding:12px 24px; border-radius:9999px;
  background:var(--ink); color:#fff; font-size:14px; font-weight:600; transition:transform .12s;
}
.upload-btn:hover{transform:translateY(-1px);}
.upload-btn:disabled{opacity:.5; cursor:default;}
.upload-btn.spin-icon svg{animation:spin 1s linear infinite;}

.report-card{background:#fff; border-radius:12px; box-shadow:var(--shadow-card); overflow:hidden; margin-bottom:24px; animation:slideUp .3s ease;}
.report-head{display:flex; align-items:center; justify-content:space-between; padding:18px 20px; border-bottom:1px solid var(--silver);}
.report-head h3{font-size:15px; font-weight:600; color:var(--ink);}
.report-summary{display:flex; gap:16px; font-size:12.5px; color:var(--slate);}
.report-summary b{color:var(--ink);}
table.report-table{width:100%; border-collapse:collapse;}
.report-table th{text-align:left; font-size:11px; color:var(--stone); font-weight:600; text-transform:uppercase; letter-spacing:.3px; padding:10px 20px; border-bottom:1px solid var(--silver);}
.report-table td{padding:11px 20px; font-size:13px; color:var(--graphite); border-bottom:1px solid #f1f1f1;}
.row-badge{display:inline-flex; align-items:center; gap:5px; padding:3px 10px; border-radius:9999px; font-size:11.5px; font-weight:600;}
.row-badge.ok{background:#e8f8ef; color:#0f8a4c;}
.row-badge.err{background:#fdeceb; color:#e0342c;}

.commit-row{display:flex; align-items:center; justify-content:flex-end; gap:12px;}
.commit-btn{
  display:inline-flex; align-items:center; gap:8px; padding:12px 26px; border-radius:9999px;
  background:var(--ink); color:#fff; font-size:14px; font-weight:600; transition:transform .12s;
}
.commit-btn:hover{transform:translateY(-1px);}
.done-banner{
  display:flex; align-items:center; gap:12px; background:#e8f8ef; border-radius:12px; padding:18px 20px;
  color:#0f8a4c; font-size:14px; font-weight:600; animation:slideUp .3s ease;
}

/* ── toast ─────────────────────────────────────────────── */
.toast{
  position:fixed; bottom:28px; left:50%; transform:translateX(-50%); z-index:80;
  background:var(--ink); color:#fff; padding:13px 22px; border-radius:9999px;
  font-size:13px; font-weight:500; display:flex; align-items:center; gap:8px;
  box-shadow:0 12px 30px rgba(0,0,0,.25);
  animation:slideUp .28s ease;
}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef, useMemo } = React;

const REGIONS = ['서울','부산','제주','강릉','경주','전주'];
const GRADES = [
  { id:1, label:'매우 친절', color:'var(--g1)', hex:'#0f8a4c' },
  { id:2, label:'친절',       color:'var(--g2)', hex:'#3ad98a' },
  { id:3, label:'보통',       color:'var(--g3)', hex:'#f5a623' },
  { id:4, label:'불친절',     color:'var(--g4)', hex:'#f2711c' },
  { id:5, label:'매우 불친절', color:'var(--g5)', hex:'#e0342c' },
];
const GRADE_COMMENT = {
  1: '친절한 응대와 청결한 관리 상태가 확인되었습니다.',
  2: '전반적으로 양호하며 일부 개선 여지가 확인되었습니다.',
  3: '보통 수준으로 특이 응대 사항은 접수되지 않았습니다.',
  4: '응대 개선이 필요하다는 의견이 접수되었습니다.',
  5: '불친절 응대 사례가 다수 접수되어 주의가 필요합니다.',
};

const BUSINESSES = [
  { id:1,  name:'경복궁 나들이길',       category:'관광지',   region:'서울', grade:2, x:22, y:18 },
  { id:2,  name:'인사동 전통찻집',       category:'식당',     region:'서울', grade:4, x:26, y:22 },
  { id:3,  name:'북촌 한옥스테이',       category:'숙박업소', region:'서울', grade:1, x:19, y:25 },
  { id:4,  name:'해운대 스카이워크',     category:'관광지',   region:'부산', grade:1, x:80, y:72 },
  { id:5,  name:'감천문화마을',         category:'관광지',   region:'부산', grade:2, x:85, y:78 },
  { id:6,  name:'자갈치 회센터',         category:'식당',     region:'부산', grade:3, x:78, y:82 },
  { id:7,  name:'우도 올레민박',         category:'숙박업소', region:'제주', grade:3, x:20, y:86 },
  { id:8,  name:'흑돼지 명가',           category:'식당',     region:'제주', grade:1, x:24, y:90 },
  { id:9,  name:'성산일출 전망대',       category:'관광지',   region:'제주', grade:2, x:16, y:83 },
  { id:10, name:'정동진 해돋이전망대',   category:'관광지',   region:'강릉', grade:2, x:60, y:14 },
  { id:11, name:'강릉 커피거리 브루웍스', category:'식당',    region:'강릉', grade:1, x:64, y:18 },
  { id:12, name:'경포 오션뷰 펜션',      category:'숙박업소', region:'강릉', grade:5, x:58, y:11 },
  { id:13, name:'불국사 템플스테이',     category:'관광지',   region:'경주', grade:1, x:68, y:50 },
  { id:14, name:'황리단길 분식마당',     category:'식당',     region:'경주', grade:3, x:73, y:54 },
  { id:15, name:'경주 한옥게스트하우스', category:'숙박업소', region:'경주', grade:2, x:70, y:46 },
  { id:16, name:'전주 한옥마을 걷기길',   category:'관광지',   region:'전주', grade:1, x:40, y:62 },
];

function gradeOf(id){ return GRADES.find(g => g.id === id); }

function genHistory(grade, seed){
  const months = ['4월','5월','6월','7월'];
  return months.map((m, i) => {
    const variance = ((seed + i * 2) % 3) - 1;
    const g = Math.min(5, Math.max(1, grade + variance));
    return { month: m, grade: g };
  });
}

function useCountUp(target, duration = 600){
  const [val, setVal] = useState(0);
  useEffect(() => {
    let raf; const start = performance.now();
    const from = 0;
    function step(now){
      const p = Math.min(1, (now - start) / duration);
      setVal(Math.round(from + (target - from) * p));
      if (p < 1) raf = requestAnimationFrame(step);
    }
    raf = requestAnimationFrame(step);
    return () => cancelAnimationFrame(raf);
  }, [target]);
  return val;
}

function Sparkline({ history }){
  const w = 232, h = 56, pad = 8;
  const pts = history.map((pt, i) => {
    const x = pad + (i / (history.length - 1)) * (w - pad * 2);
    const y = pad + ((pt.grade - 1) / 4) * (h - pad * 2);
    return { x, y, grade: pt.grade };
  });
  const line = pts.map(p => `${p.x},${p.y}`).join(' ');
  return (
    <svg width={w} height={h} viewBox={`0 0 ${w} ${h}`}>
      <polyline points={line} fill="none" stroke="var(--blue)" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" />
      {pts.map((p,i) => (
        <circle key={i} cx={p.x} cy={p.y} r="3.2" fill={gradeOf(p.grade).hex} stroke="#fff" strokeWidth="1.2" />
      ))}
    </svg>
  );
}

function MapGrid(){
  return (
    <svg className="map-grid" width="100%" height="100%" preserveAspectRatio="none">
      <path d="M0,140 C220,90 420,190 700,120 S1100,60 1440,130" stroke="#d8e6de" strokeWidth="2" fill="none" />
      <path d="M0,420 C260,470 520,380 800,440 S1200,500 1440,430" stroke="#dbe7f4" strokeWidth="2" fill="none" />
      <line x1="0" y1="0" x2="1440" y2="0" stroke="#e5e7eb" strokeDasharray="4 6" />
      <circle cx="120" cy="120" r="70" fill="none" stroke="#e2ece6" strokeWidth="1.5" />
      <circle cx="1280" cy="600" r="90" fill="none" stroke="#e0ebf6" strokeWidth="1.5" />
      <circle cx="720" cy="360" r="140" fill="none" stroke="#eceeee" strokeWidth="1" />
    </svg>
  );
}

function Toast({ message }){
  if (!message) return null;
  return (
    <div className="toast">
      <i data-lucide="check-circle-2" style={{width:16,height:16}}></i>
      <span>{message}</span>
    </div>
  );
}

function App(){
  const [view, setView] = useState('map');
  const [selectedGrades, setSelectedGrades] = useState(new Set([1,2,3,4,5]));
  const [selectedRegion, setSelectedRegion] = useState('전체');
  const [showFilterPanel, setShowFilterPanel] = useState(false);
  const [query, setQuery] = useState('');
  const [selectedBiz, setSelectedBiz] = useState(null);
  const [showDetail, setShowDetail] = useState(false);
  const [zoom, setZoom] = useState(1);
  const [adminStep, setAdminStep] = useState('idle');
  const [toast, setToast] = useState(null);

  useEffect(() => { lucide.createIcons(); });

  useEffect(() => {
    if (!toast) return;
    const t = setTimeout(() => setToast(null), 2600);
    return () => clearTimeout(t);
  }, [toast]);

  const filtered = useMemo(() => BUSINESSES.filter(b =>
    selectedGrades.has(b.grade) &&
    (selectedRegion === '전체' || b.region === selectedRegion) &&
    (query.trim() === '' || b.name.includes(query.trim()))
  ), [selectedGrades, selectedRegion, query]);

  const avgGrade = useMemo(() => {
    if (!filtered.length) return 0;
    return filtered.reduce((s,b) => s + b.grade, 0) / filtered.length;
  }, [filtered]);
  const countUp = useCountUp(filtered.length);

  function toggleGrade(id){
    setSelectedGrades(prev => {
      const next = new Set(prev);
      if (next.has(id)) { if (next.size > 1) next.delete(id); } else next.add(id);
      return next;
    });
  }
  function resetFilters(){
    setSelectedGrades(new Set([1,2,3,4,5]));
    setSelectedRegion('전체');
    setQuery('');
  }
  function openDetail(biz){
    setSelectedBiz(biz);
    setShowDetail(true);
  }
  function goMap(){
    setView('map'); setShowDetail(false); setShowFilterPanel(false);
  }
  function goFilterNav(){
    setView('map'); setShowFilterPanel(true); setShowDetail(false);
  }
  function goDetailNav(){
    setView('map'); setShowFilterPanel(false);
    openDetail(filtered[0] || BUSINESSES[0]);
  }
  function goUploadNav(){
    setView('admin');
  }
  function runValidate(){
    setAdminStep('validating');
    setTimeout(() => setAdminStep('validated'), 900);
  }
  function commitUpload(){
    setAdminStep('done');
    setToast('142건 중 136건 등록·갱신 완료');
  }

  const mockRows = [
    { name:'제주 흑돼지 명가',   region:'제주', grade:'매우 친절', ok:true },
    { name:'전주 온돌게스트하우스', region:'전주', grade:'불친절', ok:true },
    { name:'경포 오션뷰 펜션',   region:'강릉', grade:'매우 불친절', ok:true },
    { name:'미상 위경도 누락건', region:'-',   grade:'-', ok:false },
    { name:'황리단길 분식마당', region:'경주', grade:'보통', ok:true },
    { name:'중복 좌표 감지건',   region:'서울', grade:'-', ok:false },
    { name:'북촌 한옥스테이',   region:'서울', grade:'매우 친절', ok:true },
    { name:'감천문화마을',     region:'부산', grade:'친절', ok:true },
  ];

  return (
    <div className="app-shell">
      <div className="info-banner">
        <i data-lucide="badge-check" style={{width:14,height:14}}></i>
        정부 지원사업 연계 · 실시간 모니터링 데이터 기반 안심지도 서비스
      </div>
      <header className="topbar">
        <div className="brand">
          <span className="brand-icon"><i data-lucide="shield-check" style={{width:17,height:17}}></i></span>
          안심트래블맵
        </div>
        <div className="stat-group">
          <div className="stat-pill" style={{borderRadius:12}}>
            <span className="label">노출 업소 수</span>
            <span className="value">{countUp}곳</span>
          </div>
          <div className="stat-pill" style={{borderRadius:12}}>
            <span className="label">평균 등급</span>
            <span className="value">{avgGrade ? avgGrade.toFixed(1) : '-'}</span>
          </div>
        </div>
        <nav className="topnav">
          <button className={"nav-btn" + (view==='map' && !showFilterPanel && !showDetail ? ' active' : '')} onClick={goMap}>
            <i data-lucide="map"></i>지도 보기
          </button>
          <button className={"nav-btn" + (showFilterPanel ? ' active' : '')} onClick={goFilterNav}>
            <i data-lucide="sliders-horizontal"></i>등급·지역 필터
          </button>
          <button className={"nav-btn" + (showDetail ? ' active' : '')} onClick={goDetailNav}>
            <i data-lucide="info"></i>업소 상세정보
          </button>
          <button className={"nav-btn" + (view==='admin' ? ' active' : '')} onClick={goUploadNav}>
            <i data-lucide="upload"></i>데이터 일괄 등록
          </button>
        </nav>
      </header>

      {view === 'map' && (
        <div className="map-stage">
          <div className="map-canvas geo" style={{transform:`scale(${zoom})`, transformOrigin:'center center', transition:'transform .25s ease'}}>
            <MapGrid />
            <div className="radar-sweep"></div>
            <div className="radar-ring r1"></div>
            <div className="radar-ring r2"></div>
            <div className="map-region-label" style={{left:'14%', top:'10%'}}>서울</div>
            <div className="map-region-label" style={{left:'74%', top:'64%'}}>부산</div>
            <div className="map-region-label" style={{left:'10%', top:'76%'}}>제주</div>
            <div className="map-region-label" style={{left:'54%', top:'6%'}}>강릉</div>
            <div className="map-region-label" style={{left:'62%', top:'40%'}}>경주</div>
            <div className="map-region-label" style={{left:'32%', top:'56%'}}>전주</div>

            {filtered.map(b => {
              const g = gradeOf(b.grade);
              const isSelected = selectedBiz && selectedBiz.id === b.id && showDetail;
              return (
                <div key={b.id}
                     className="marker"
                     style={{ left: b.x + '%', top: b.y + '%', color:g.hex,
                              transform: isSelected ? 'translate(-50%,-50%) translateY(-4px)' : 'translate(-50%,-50%)',
                              boxShadow: isSelected ? '0 8px 18px rgba(16,16,16,.4)' : '0 2px 6px rgba(16,16,16,.28)',
                              zIndex: isSelected ? 20 : 5 }}
                     title={b.name}
                     onClick={() => openDetail(b)}>
                  <span className="marker-core" style={{background:g.hex}}></span>
                  {isSelected && <span className="marker-ring"></span>}
                </div>
              );
            })}
          </div>

          <div className="map-control">
            <button onClick={() => setZoom(z => Math.min(1.6, +(z + 0.15).toFixed(2)))}><i data-lucide="plus" style={{width:16,height:16}}></i></button>
            <button onClick={() => setZoom(z => Math.max(0.8, +(z - 0.15).toFixed(2)))}><i data-lucide="minus" style={{width:16,height:16}}></i></button>
          </div>

          <div className="legend">
            <div className="legend-title">등급 범례</div>
            {GRADES.map(g => (
              <div className="legend-row" key={g.id}>
                <span className="legend-dot" style={{background:g.hex}}></span>{g.label}
              </div>
            ))}
            <div className="legend-title" style={{marginTop:8}}>업종 마커</div>
            <div className="legend-row"><span className="legend-marker"><i data-lucide="landmark" style={{width:11,height:11}}></i></span>관광지</div>
            <div className="legend-row"><span className="legend-marker"><i data-lucide="utensils" style={{width:11,height:11}}></i></span>식당</div>
            <div className="legend-row"><span className="legend-marker"><i data-lucide="bed" style={{width:11,height:11}}></i></span>숙박업소</div>
          </div>

          <aside className="geo-drawer side-drawer">
            <div className="drawer-head">
              <h2>모니터링 업소 리스트</h2>
              <div className="search-box">
                <i data-lucide="search"></i>
                <input placeholder="업소명 검색" value={query} onChange={e => setQuery(e.target.value)} />
              </div>
              <div className="filter-toggle-row">
                <span className="filter-summary">{filtered.length}곳 표시 중</span>
                <button className="filter-toggle-btn" onClick={() => setShowFilterPanel(v => !v)}>
                  <i data-lucide="sliders-horizontal"></i>필터
                </button>
              </div>
            </div>

            {showFilterPanel && (
              <div className="filter-panel">
                <div className="filter-panel-title">평가 등급</div>
                <div className="grade-chip-row">
                  {GRADES.map(g => (
                    <button key={g.id}
                            className={"grade-chip" + (selectedGrades.has(g.id) ? ' on' : '')}
                            style={{color:g.hex}}
                            onClick={() => toggleGrade(g.id)}>
                      <span className="dot" style={{background:g.hex}}></span>{g.label}
                    </button>
                  ))}
                </div>
                <div className="filter-panel-title">지역</div>
                <select className="region-select" value={selectedRegion} onChange={e => setSelectedRegion(e.target.value)}>
                  <option value="전체">전체 지역</option>
                  {REGIONS.map(r => <option key={r} value={r}>{r}</option>)}
                </select>
                <button className="filter-reset" onClick={resetFilters}>필터 초기화</button>
              </div>
            )}

            <div className="biz-list">
              {filtered.length === 0 && <div className="empty-state">조건에 맞는 업소가 없습니다.</div>}
              {filtered.map(b => {
                const g = gradeOf(b.grade);
                const active = selectedBiz && selectedBiz.id === b.id && showDetail;
                return (
                  <div key={b.id} className={"biz-row" + (active ? ' active' : '')} onClick={() => openDetail(b)}>
                    <span className="biz-grade-dot" style={{background:g.hex}}></span>
                    <div className="biz-info">
                      <div className="biz-name">{b.name}</div>
                      <div className="biz-meta">{b.region} · {b.category} · {g.label}</div>
                    </div>
                    <i data-lucide="chevron-right" className="biz-arrow"></i>
                  </div>
                );
              })}
            </div>
          </aside>

          {showDetail && selectedBiz && (
            <div className="detail-card">
              <div className="detail-head">
                <button className="detail-close" onClick={() => setShowDetail(false)}><i data-lucide="x" style={{width:15,height:15}}></i></button>
                <div className="detail-category">{selectedBiz.category} · {selectedBiz.region}</div>
                <div className="detail-name">{selectedBiz.name}</div>
                <span className="detail-badge" style={{background:gradeOf(selectedBiz.grade).hex}}>
                  <i data-lucide="star" style={{width:12,height:12}}></i>{gradeOf(selectedBiz.grade).label}
                </span>
              </div>
              <div className="detail-body">
                <div className="detail-comment">{GRADE_COMMENT[selectedBiz.grade]}</div>
                <div className="detail-chart-label">최근 4개월 등급 추이</div>
                <Sparkline history={genHistory(selectedBiz.grade, selectedBiz.id)} />
                <div className="detail-actions">
                  <button className="btn-ghost" onClick={() => setShowDetail(false)}>닫기</button>
                  <button className="btn-ink" onClick={() => setToast(selectedBiz.name + ' 재점검을 요청했습니다')}>재점검 요청</button>
                </div>
              </div>
            </div>
          )}
        </div>
      )}

      {view === 'admin' && (
        <div className="admin-stage">
          <div className="admin-wrap">
            <button className="admin-back" onClick={goMap}><i data-lucide="arrow-left" style={{width:14,height:14}}></i>지도로 돌아가기</button>
            <div className="admin-title-row">
              <div className="admin-title">데이터 일괄 등록</div>
              <span className="admin-badge"><i data-lucide="user-check" style={{width:13,height:13}}></i>관리자 모드</span>
            </div>
            <div className="admin-sub">엑셀·CSV 파일을 업로드하면 검증 후 모니터링 데이터를 대량으로 등록·갱신합니다.</div>

            <div className={"upload-zone" + (adminStep === 'idle' ? '' : '')}>
              <div className="upload-icon"><i data-lucide="file-spreadsheet" style={{width:24,height:24}}></i></div>
              <div className="upload-title">monitoring_2026_07.xlsx</div>
              <div className="upload-sub">142행 · 관광지 58 · 식당 51 · 숙박업소 33</div>
              <button className={"upload-btn" + (adminStep === 'validating' ? ' spin-icon' : '')} disabled={adminStep === 'validating'} onClick={runValidate}>
                {adminStep === 'validating'
                  ? (<><i data-lucide="loader-2" style={{width:15,height:15}}></i>검증 중...</>)
                  : (<><i data-lucide="upload-cloud" style={{width:15,height:15}}></i>엑셀 파일 검증</>)}
              </button>
            </div>

            {(adminStep === 'validated' || adminStep === 'done') && (
              <div className="report-card">
                <div className="report-head">
                  <h3>검증 결과 리포트</h3>
                  <div className="report-summary"><span><b>136</b>건 정상</span><span><b>6</b>건 오류</span></div>
                </div>
                <table className="report-table">
                  <thead><tr><th>업소명</th><th>지역</th><th>등급</th><th>상태</th></tr></thead>
                  <tbody>
                    {mockRows.map((r,i) => (
                      <tr key={i}>
                        <td>{r.name}</td><td>{r.region}</td><td>{r.grade}</td>
                        <td>
                          {r.ok
                            ? <span className="row-badge ok"><i data-lucide="check" style={{width:11,height:11}}></i>정상</span>
                            : <span className="row-badge err"><i data-lucide="x" style={{width:11,height:11}}></i>오류</span>}
                        </td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
            )}

            {adminStep === 'validated' && (
              <div className="commit-row">
                <button className="commit-btn" onClick={commitUpload}><i data-lucide="database" style={{width:15,height:15}}></i>검증 통과 건 일괄 반영</button>
              </div>
            )}

            {adminStep === 'done' && (
              <div className="done-banner">
                <i data-lucide="badge-check" style={{width:20,height:20}}></i>
                136건이 안심지도 데이터베이스에 반영되었습니다. 오류 6건은 재업로드가 필요합니다.
              </div>
            )}
          </div>
        </div>
      )}

      <Toast message={toast} />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
