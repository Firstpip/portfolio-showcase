<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>트래블케어 운영 관제 플랫폼 — 구현 데모</title>
<link rel="preconnect" href="https://cdn.jsdelivr.net">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
<link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/regular/style.css">
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
:root{
  --ember:#ff5924;
  --cobalt:#1573dd;
  --ink:#000000;
  --canvas:#f9fafc;
  --surface:#ffffff;
  --blush:#fff1f1;
  --mist:#e2e2e2;
  --card-blue:#e5eaf2;
  --card-parchment:#f3f0e7;
  --card-sage:#dde9d3;
  --deep-slate:#3a475a;
  --storm:#4a5465;
  --steel:#717286;
  --graphite-nav:#24272d;
  --accent:#1ef6be;
  --g1:#0f8a4c; --g2:#3ad98a; --g3:#f5a623; --g4:#f2711c; --g5:#e0342c;
  --shadow-xl: rgba(255,167,129,.44) 0px 30px 46px -34px, rgba(255,128,36,.22) 0px -16px 34px -30px;
  --shadow-sm: rgba(140,142,151,.32) 0px 4px 7px -4px;
}
*{box-sizing:border-box; margin:0; padding:0;}
html,body{width:100%; height:100%;}
body{
  font-family:'Pretendard', ui-sans-serif, system-ui, sans-serif;
  background:var(--canvas); color:var(--deep-slate);
  overflow:hidden; -webkit-font-smoothing:antialiased;
}
#root{width:100%; height:100vh;}
button{font-family:inherit; cursor:pointer; border:none; background:none;}
input, select, textarea{font-family:inherit;}
table{border-collapse:collapse;}

/* ── keyframes ─────────────────────────────────────────── */
@keyframes fadeIn{ from{opacity:0;} to{opacity:1;} }
@keyframes slideUp{ from{opacity:0; transform:translateY(18px);} to{opacity:1; transform:translateY(0);} }
@keyframes slideInRight{ from{opacity:0; transform:translateX(24px);} to{opacity:1; transform:translateX(0);} }
@keyframes barGrow{ from{transform:scaleY(0);} to{transform:scaleY(1);} }
@keyframes ringPulse{ 0%{box-shadow:0 0 0 0 rgba(255,89,36,.35);} 100%{box-shadow:0 0 0 9px rgba(255,89,36,0);} }

.app-shell{width:100%; height:100vh; display:flex;}

/* ── sidebar ────────────────────────────────────────────── */
.sidebar{
  position:fixed; left:0; top:0; bottom:0; width:248px;
  background:var(--surface); border-right:1px solid var(--mist);
  display:flex; flex-direction:column; z-index:30;
}
.sidebar-brand{padding:20px 20px 16px; border-bottom:1px solid var(--mist);}
.sidebar-brand-row{display:flex; align-items:center; gap:9px; margin-bottom:12px;}
.sidebar-brand-icon{width:30px; height:30px; border-radius:9999px; border:1.5px solid var(--ember); color:var(--ember); display:flex; align-items:center; justify-content:center; animation:ringPulse 2.4s ease-out infinite;}
.sidebar-brand-name{font-size:16px; font-weight:700; color:var(--ink); letter-spacing:-.2px;}
.env-select{width:100%; padding:8px 10px; border:1px solid var(--mist); border-radius:8px; font-size:12px; color:var(--storm); background:var(--canvas);}
.sidebar-section{padding:16px 14px 6px;}
.sidebar-section-title{font-size:11px; font-weight:700; color:var(--steel); letter-spacing:.6px; text-transform:uppercase; padding:0 10px 8px;}
.sidebar-link{
  display:flex; align-items:center; gap:10px; padding:10px 12px; border-radius:10px;
  font-size:13.5px; font-weight:500; color:var(--storm); margin-bottom:2px; transition:background .12s, color .12s;
}
.sidebar-link:hover{background:var(--blush); color:var(--ink);}
.sidebar-link.active{background:var(--ink); color:#fff;}
.sidebar-link i{font-size:16px; flex:0 0 16px;}
.sidebar-foot{margin-top:auto; padding:16px 20px; border-top:1px solid var(--mist); display:flex; align-items:center; gap:10px;}
.avatar-dot{width:30px; height:30px; border-radius:9999px; background:var(--card-blue); display:flex; align-items:center; justify-content:center; font-size:12px; font-weight:700; color:var(--deep-slate);}
.sidebar-foot-name{font-size:12.5px; font-weight:600; color:var(--ink);}
.sidebar-foot-role{font-size:11px; color:var(--steel);}

/* ── main ───────────────────────────────────────────────── */
.main-wrap{margin-left:248px; flex:1; min-width:0; width:calc(100% - 248px); height:100vh; overflow-y:auto; background:var(--canvas);}
.page{padding:28px 36px 56px; animation:fadeIn .3s ease;}
.page-header{display:flex; align-items:flex-start; justify-content:space-between; margin-bottom:22px;}
.page-title-row{display:flex; flex-direction:column; gap:6px;}
.eyebrow{font-size:12px; font-weight:700; color:var(--ember); letter-spacing:.9px; text-transform:uppercase;}
.page-title{font-size:32px; font-weight:700; color:var(--ink); letter-spacing:-.4px;}
.page-meta{font-size:12.5px; color:var(--steel); margin-top:4px;}
.page-actions{display:flex; gap:10px;}

.btn-outline-ember{
  display:inline-flex; align-items:center; gap:7px; padding:9px 20px; border-radius:100px;
  border:1px solid var(--ember); color:var(--ember); font-size:13px; font-weight:700;
  background:transparent; transition:background .12s;
}
.btn-outline-ember:hover{background:#fff2ee;}
.btn-solid-ink{
  display:inline-flex; align-items:center; gap:7px; padding:9px 20px; border-radius:100px;
  background:var(--ink); color:#fff; font-size:13px; font-weight:700; transition:transform .12s;
}
.btn-solid-ink:hover{transform:scale(1.035);}
.btn-solid-ink:disabled{opacity:.45; cursor:default;}
.btn-ghost-slate{
  display:inline-flex; align-items:center; gap:6px; padding:8px 16px; border-radius:100px;
  border:1px solid #748297; color:#748297; font-size:12.5px; font-weight:700; background:transparent;
}

/* ── tab bar ───────────────────────────────────────────── */
.tab-bar{display:flex; gap:4px; background:var(--surface); border:1px solid var(--mist); border-radius:100px; padding:4px; width:max-content; margin-bottom:20px;}
.tab{padding:8px 18px; border-radius:100px; font-size:12.5px; font-weight:600; color:var(--steel); transition:background .12s, color .12s;}
.tab.active{background:var(--ink); color:#fff;}

/* ── kpi / stat cards ──────────────────────────────────── */
.dash-grid{display:grid; grid-template-columns:1.7fr 1fr; gap:20px; margin-bottom:20px;}
.hero-card{
  background:var(--surface); border-radius:16px; padding:28px;
  box-shadow:var(--shadow-xl);
}
.hero-card-head{display:flex; align-items:baseline; justify-content:space-between; margin-bottom:4px;}
.hero-card-title{font-size:16px; font-weight:700; color:var(--ink);}
.hero-big-number{font-size:48px; font-weight:700; color:var(--ink); letter-spacing:-1px; margin:6px 0 2px;}
.hero-sub{font-size:12.5px; color:var(--steel); margin-bottom:18px;}
.hero-delta{font-size:12.5px; font-weight:700; color:var(--g1);}

.kpi-side{display:flex; flex-direction:column; gap:14px;}
.stat-card{
  background:var(--surface); border-radius:16px; padding:18px 20px;
  display:flex; flex-direction:column; gap:4px;
  transition:transform .15s ease;
}
.stat-card:hover{transform:scale(1.025);}
.stat-label{font-size:11.5px; font-weight:700; color:var(--steel); letter-spacing:.3px; text-transform:uppercase;}
.stat-row-flex{display:flex; align-items:flex-end; justify-content:space-between;}
.stat-value{font-size:28px; font-weight:700; color:var(--ink);}
.stat-delta{font-size:12px; font-weight:700;}
.stat-delta.positive{color:var(--g1);}
.stat-delta.negative{color:var(--g5);}
.stat-sparkline{flex:0 0 auto;}

.widget-grid{display:grid; grid-template-columns:1fr 1fr 1fr; gap:20px;}
.widget-card{background:var(--surface); border-radius:16px; padding:20px;}
.widget-card.parchment{background:var(--card-parchment);}
.widget-card.sage{background:var(--card-sage);}
.widget-card.blue{background:var(--card-blue);}
.widget-title{font-size:13px; font-weight:700; color:var(--ink); margin-bottom:14px;}

.legend-mini{display:flex; flex-wrap:wrap; gap:8px; margin-top:12px;}
.legend-mini-item{display:flex; align-items:center; gap:5px; font-size:11px; color:var(--storm);}
.legend-mini-dot{width:7px; height:7px; border-radius:9999px;}

.region-bar-row{display:flex; align-items:center; gap:10px; margin-bottom:9px;}
.region-bar-name{font-size:12px; color:var(--storm); width:34px; flex:0 0 34px;}
.region-bar-track{flex:1; height:8px; background:#fff; border-radius:9999px; overflow:hidden;}
.region-bar-fill{height:100%; border-radius:9999px; background:var(--ember); transform-origin:left; animation:barGrow .6s ease both;}
.region-bar-count{font-size:11.5px; font-weight:700; color:var(--ink); width:26px; text-align:right;}

/* ── data table (shared) ──────────────────────────────── */
.data-toolbar{display:flex; align-items:center; gap:10px; margin-bottom:14px;}
.search-box{display:flex; align-items:center; gap:8px; background:var(--surface); border:1px solid var(--mist); border-radius:100px; padding:9px 16px; flex:0 0 260px;}
.search-box input{border:none; outline:none; background:none; font-size:13px; flex:1; color:var(--storm);}
.filter-chip{padding:8px 16px; border-radius:100px; border:1px solid var(--mist); font-size:12.5px; font-weight:600; color:var(--storm); background:var(--surface);}
.filter-chip.on{border-color:var(--ember); color:var(--ember);}
.bulk-bar{margin-left:auto; display:flex; align-items:center; gap:10px; font-size:12.5px; color:var(--storm);}

.table-wrap{background:var(--surface); border-radius:16px; overflow:hidden;}
table.data-table{width:100%;}
.data-table th{text-align:left; font-size:11px; font-weight:700; color:var(--steel); text-transform:uppercase; letter-spacing:.4px; padding:13px 18px; border-bottom:1px solid var(--mist);}
.data-table td{padding:12px 18px; font-size:13px; color:var(--storm); border-bottom:1px solid #f1f2f5; vertical-align:middle;}
.data-table tr:hover td{background:var(--blush);}
.row-name{font-weight:600; color:var(--ink);}
.grade-badge{display:inline-flex; align-items:center; gap:5px; padding:4px 11px; border-radius:9999px; font-size:11.5px; font-weight:700; color:#fff;}
.status-badge{display:inline-flex; align-items:center; gap:5px; padding:4px 11px; border-radius:9999px; font-size:11.5px; font-weight:700;}
.status-badge.wait{background:#fff4e5; color:#a2660a;}
.status-badge.run{background:#eaf1ff; color:var(--cobalt);}
.status-badge.done{background:#e8f8ef; color:var(--g1);}
.status-badge.fail{background:#fdeceb; color:var(--g5);}
.row-icon-btn{width:28px; height:28px; border-radius:8px; display:inline-flex; align-items:center; justify-content:center; color:var(--steel); transition:background .12s;}
.row-icon-btn:hover{background:var(--card-blue);}
.checkbox-cell{width:36px;}

.edit-panel{background:var(--blush); border-radius:12px; padding:16px 18px; margin:8px 18px 14px; animation:slideUp .25s ease;}
.edit-row{display:flex; gap:12px; margin-bottom:10px;}
.edit-row select, .edit-row textarea{flex:1; padding:9px 12px; border:1px solid var(--mist); border-radius:8px; font-size:13px; color:var(--deep-slate); background:#fff;}
.edit-actions{display:flex; gap:8px; justify-content:flex-end;}

/* ── history view ──────────────────────────────────────── */
.history-grid{display:grid; grid-template-columns:300px 1fr; gap:20px;}
.biz-pick-list{background:var(--surface); border-radius:16px; padding:10px; max-height:560px; overflow-y:auto;}
.biz-pick-item{padding:12px 14px; border-radius:10px; font-size:13px; color:var(--storm); display:flex; justify-content:space-between; align-items:center; transition:background .12s;}
.biz-pick-item:hover{background:var(--blush);}
.biz-pick-item.active{background:var(--card-blue); color:var(--ink); font-weight:700;}

.timeline-card{background:var(--surface); border-radius:16px; padding:24px; margin-bottom:20px;}
.timeline{position:relative; padding-left:22px;}
.timeline::before{content:''; position:absolute; left:5px; top:6px; bottom:6px; width:2px; background:var(--mist);}
.timeline-item{position:relative; padding-bottom:20px;}
.timeline-item:last-child{padding-bottom:0;}
.timeline-dot{position:absolute; left:-22px; top:2px; width:12px; height:12px; border-radius:9999px; border:2px solid #fff; box-shadow:0 0 0 2px var(--mist);}
.timeline-date{font-size:11.5px; color:var(--steel); margin-bottom:2px;}
.timeline-label{font-size:13.5px; font-weight:600; color:var(--ink);}

.rule-card{background:var(--card-sage); border-radius:16px; padding:22px;}
.rule-row{display:flex; align-items:center; gap:14px; margin-bottom:14px;}
.rule-row label{font-size:13px; color:var(--deep-slate); font-weight:600; width:150px;}
.rule-row select, .rule-row input[type=number]{padding:9px 12px; border:1px solid var(--mist); border-radius:8px; font-size:13px; background:#fff;}
.toggle-switch{width:42px; height:24px; border-radius:9999px; background:var(--mist); position:relative; transition:background .2s; flex:0 0 42px;}
.toggle-switch.on{background:var(--ember);}
.toggle-knob{position:absolute; top:2px; left:2px; width:20px; height:20px; border-radius:9999px; background:#fff; transition:transform .2s; box-shadow:0 1px 3px rgba(0,0,0,.25);}
.toggle-switch.on .toggle-knob{transform:translateX(18px);}

/* ── batch view ────────────────────────────────────────── */
.batch-card{background:var(--surface); border-radius:16px; padding:0; margin-bottom:16px; overflow:hidden;}
.batch-row{display:flex; align-items:center; gap:16px; padding:16px 20px; border-bottom:1px solid #f1f2f5;}
.batch-row:last-child{border-bottom:none;}
.batch-icon{width:38px; height:38px; border-radius:10px; background:var(--card-blue); display:flex; align-items:center; justify-content:center; color:var(--deep-slate); flex:0 0 38px;}
.batch-info{flex:1; min-width:0;}
.batch-name{font-size:13.5px; font-weight:600; color:var(--ink);}
.batch-meta{font-size:11.5px; color:var(--steel); margin-top:2px;}
.progress-track{width:140px; height:6px; border-radius:9999px; background:var(--mist); overflow:hidden;}
.progress-fill{height:100%; border-radius:9999px; background:var(--cobalt);}

.log-panel{background:var(--graphite-nav); border-radius:16px; padding:18px 20px; font-family:'SFMono-Regular',Menlo,monospace; font-size:12px; color:#c8ccd6; max-height:220px; overflow-y:auto;}
.log-line{padding:3px 0; opacity:0; animation:fadeIn .4s ease forwards;}
.log-line .t{color:#748297; margin-right:10px;}

.toast{
  position:fixed; bottom:26px; right:26px; z-index:80;
  background:var(--ink); color:#fff; padding:13px 22px; border-radius:12px;
  font-size:13px; font-weight:600; display:flex; align-items:center; gap:9px;
  box-shadow:0 16px 34px rgba(0,0,0,.3); animation:slideInRight .28s ease;
}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useMemo, useRef } = React;

const REGIONS = ['서울','부산','제주','강릉','경주','전주'];
const GRADES = [
  { id:1, label:'매우 친절', hex:'#0f8a4c' },
  { id:2, label:'친절',       hex:'#3ad98a' },
  { id:3, label:'보통',       hex:'#f5a623' },
  { id:4, label:'불친절',     hex:'#f2711c' },
  { id:5, label:'매우 불친절', hex:'#e0342c' },
];
function gradeOf(id){ return GRADES.find(g => g.id === id); }

const REGION_STATS = [
  { region:'서울', avg:2.3, count:15, alerts:1 },
  { region:'부산', avg:2.0, count:22, alerts:0 },
  { region:'제주', avg:2.6, count:18, alerts:2 },
  { region:'강릉', avg:2.8, count:12, alerts:3 },
  { region:'경주', avg:2.1, count:14, alerts:0 },
  { region:'전주', avg:1.9, count:9,  alerts:0 },
];

const GRADE_DIST = [ {grade:1,count:34}, {grade:2,count:28}, {grade:3,count:14}, {grade:4,count:6}, {grade:5,count:2} ];
const TOTAL_BIZ = GRADE_DIST.reduce((s,g) => s + g.count, 0);

const WEEKLY_TREND = [3.4,3.5,3.3,3.2,3.35,3.1,2.95,3.0,2.8,2.7,2.55,2.4];

const BUSINESSES = [
  { id:1,  name:'경복궁 나들이길',        region:'서울', category:'관광지',   grade:2, updatedAt:'07.04', updatedBy:'김도윤' },
  { id:2,  name:'인사동 전통찻집',        region:'서울', category:'식당',     grade:4, updatedAt:'07.02', updatedBy:'박서연' },
  { id:3,  name:'북촌 한옥스테이',        region:'서울', category:'숙박업소', grade:1, updatedAt:'07.05', updatedBy:'김도윤' },
  { id:4,  name:'해운대 스카이워크',      region:'부산', category:'관광지',   grade:1, updatedAt:'07.05', updatedBy:'이하은' },
  { id:5,  name:'감천문화마을',          region:'부산', category:'관광지',   grade:2, updatedAt:'07.03', updatedBy:'이하은' },
  { id:6,  name:'자갈치 회센터',          region:'부산', category:'식당',     grade:3, updatedAt:'07.01', updatedBy:'박서연' },
  { id:7,  name:'우도 올레민박',          region:'제주', category:'숙박업소', grade:3, updatedAt:'06.29', updatedBy:'최민준' },
  { id:8,  name:'흑돼지 명가',            region:'제주', category:'식당',     grade:1, updatedAt:'07.04', updatedBy:'최민준' },
  { id:9,  name:'경포 오션뷰 펜션',       region:'강릉', category:'숙박업소', grade:5, updatedAt:'07.05', updatedBy:'김도윤' },
  { id:10, name:'황리단길 분식마당',      region:'경주', category:'식당',     grade:3, updatedAt:'07.02', updatedBy:'이하은' },
];

function genHistory(grade, seed){
  const months = ['4월','5월','6월','7월'];
  return months.map((m,i) => {
    const variance = ((seed + i * 2) % 3) - 1;
    const g = Math.min(5, Math.max(1, grade + variance));
    return { month:m, grade:g, note: g <= 2 ? '정기 점검 통과' : g >= 4 ? '응대 불만 접수' : '보통 수준 유지' };
  });
}

function useCountUp(target, duration = 700){
  const [val, setVal] = useState(0);
  useEffect(() => {
    let raf; const start = performance.now();
    function step(now){
      const p = Math.min(1, (now - start) / duration);
      setVal(+(target * p).toFixed(target < 10 ? 2 : 0));
      if (p < 1) raf = requestAnimationFrame(step);
    }
    raf = requestAnimationFrame(step);
    return () => cancelAnimationFrame(raf);
  }, [target]);
  return val;
}

function MiniSpark({ values, color = 'var(--ember)' }){
  const w = 96, h = 32, pad = 3;
  const min = Math.min(...values), max = Math.max(...values);
  const pts = values.map((v,i) => {
    const x = pad + (i/(values.length-1)) * (w - pad*2);
    const norm = max === min ? .5 : (v - min) / (max - min);
    const y = h - pad - norm * (h - pad*2);
    return `${x},${y}`;
  }).join(' ');
  return (
    <svg className="stat-sparkline" width={w} height={h} viewBox={`0 0 ${w} ${h}`}>
      <polyline points={pts} fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" />
    </svg>
  );
}

function TrendChart({ data }){
  const w = 640, h = 220, pad = 28;
  const min = Math.min(...data) - 0.2, max = Math.max(...data) + 0.2;
  const pts = data.map((v,i) => {
    const x = pad + (i/(data.length-1)) * (w - pad*2);
    const y = h - pad - ((v - min)/(max - min)) * (h - pad*2);
    return { x, y };
  });
  const line = pts.map(p => `${p.x},${p.y}`).join(' ');
  const area = `${pad},${h-pad} ${line} ${w-pad},${h-pad}`;
  return (
    <svg width="100%" height={h} viewBox={`0 0 ${w} ${h}`} preserveAspectRatio="none">
      <defs>
        <linearGradient id="heroFade" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stopColor="#ff5924" stopOpacity="0.22" />
          <stop offset="100%" stopColor="#ff5924" stopOpacity="0" />
        </linearGradient>
      </defs>
      <line x1={pad} y1={h-pad} x2={w-pad} y2={h-pad} stroke="#e2e2e2" />
      <polygon points={area} fill="url(#heroFade)" />
      <polyline points={line} fill="none" stroke="#ff5924" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round" />
      {pts.map((p,i) => <circle key={i} cx={p.x} cy={p.y} r="3.4" fill="#fff" stroke="#ff5924" strokeWidth="2" />)}
    </svg>
  );
}

function Donut({ data }){
  const total = data.reduce((s,d) => s + d.count, 0);
  let acc = 0;
  const r = 46, cx = 60, cy = 60, circ = 2 * Math.PI * r;
  return (
    <svg width="120" height="120" viewBox="0 0 120 120">
      <circle cx={cx} cy={cy} r={r} fill="none" stroke="#fff" strokeWidth="16" />
      {data.map((d,i) => {
        const frac = d.count / total;
        const dash = frac * circ;
        const gap = circ - dash;
        const offset = -acc * circ;
        acc += frac;
        return (
          <circle key={i} cx={cx} cy={cy} r={r} fill="none" stroke={gradeOf(d.grade).hex} strokeWidth="16"
                  strokeDasharray={`${dash} ${gap}`} strokeDashoffset={offset}
                  transform={`rotate(-90 ${cx} ${cy})`} strokeLinecap="butt" />
        );
      })}
      <text x="60" y="56" textAnchor="middle" fontSize="20" fontWeight="700" fill="#000">{total}</text>
      <text x="60" y="74" textAnchor="middle" fontSize="10" fill="#717286">전체 업소</text>
    </svg>
  );
}

function DataConsole({ setToast }){
  const [rows, setRows] = useState(BUSINESSES);
  const [query, setQuery] = useState('');
  const [regionFilter, setRegionFilter] = useState('전체');
  const [selected, setSelected] = useState(new Set());
  const [editingId, setEditingId] = useState(null);
  const [draft, setDraft] = useState({ grade:1, comment:'' });

  const filtered = useMemo(() => rows.filter(r =>
    (regionFilter === '전체' || r.region === regionFilter) &&
    (query.trim() === '' || r.name.includes(query.trim()))
  ), [rows, query, regionFilter]);

  function toggleSelect(id){
    setSelected(prev => { const n = new Set(prev); n.has(id) ? n.delete(id) : n.add(id); return n; });
  }
  function startEdit(row){
    setEditingId(row.id);
    setDraft({ grade: row.grade, comment: '' });
  }
  function saveEdit(id){
    setRows(prev => prev.map(r => r.id === id ? { ...r, grade: draft.grade, updatedAt:'07.06', updatedBy:'나' } : r));
    setEditingId(null);
    setToast('변경 사항이 저장되었습니다');
  }
  function bulkApprove(){
    setRows(prev => prev.map(r => selected.has(r.id) ? { ...r, updatedAt:'07.06', updatedBy:'나(일괄)' } : r));
    setToast(selected.size + '건 일괄 상태 변경이 처리되었습니다');
    setSelected(new Set());
  }

  return (
    <div className="page">
      <div className="page-header">
        <div className="page-title-row">
          <span className="eyebrow">데이터 관리</span>
          <h1 className="page-title">데이터 관리 콘솔</h1>
          <div className="page-meta">가상 스크롤 · 인라인 편집 · audit_log 자동 기록</div>
        </div>
      </div>

      <div className="data-toolbar">
        <div className="search-box">
          <i className="ph ph-magnifying-glass"></i>
          <input placeholder="업소명 검색" value={query} onChange={e => setQuery(e.target.value)} />
        </div>
        <button className={"filter-chip" + (regionFilter==='전체'?' on':'')} onClick={() => setRegionFilter('전체')}>전체 지역</button>
        {REGIONS.map(r => (
          <button key={r} className={"filter-chip" + (regionFilter===r?' on':'')} onClick={() => setRegionFilter(r)}>{r}</button>
        ))}
        <div className="bulk-bar">
          {selected.size > 0 && <span>{selected.size}건 선택됨</span>}
          <button className="btn-outline-ember" disabled={selected.size===0} onClick={bulkApprove}>
            <i className="ph ph-check-square-offset"></i>일괄 상태 변경
          </button>
        </div>
      </div>

      <div className="table-wrap">
        <table className="data-table">
          <thead>
            <tr>
              <th className="checkbox-cell"></th>
              <th>업소명</th><th>지역</th><th>카테고리</th><th>등급</th><th>최근 수정</th><th>수정자</th><th></th>
            </tr>
          </thead>
          <tbody>
            {filtered.map(r => {
              const g = gradeOf(r.grade);
              return (
                <React.Fragment key={r.id}>
                  <tr>
                    <td className="checkbox-cell">
                      <input type="checkbox" checked={selected.has(r.id)} onChange={() => toggleSelect(r.id)} />
                    </td>
                    <td className="row-name">{r.name}</td>
                    <td>{r.region}</td>
                    <td>{r.category}</td>
                    <td><span className="grade-badge" style={{background:g.hex}}>{g.label}</span></td>
                    <td>{r.updatedAt}</td>
                    <td>{r.updatedBy}</td>
                    <td>
                      <button className="row-icon-btn" title="인라인 편집" onClick={() => startEdit(r)}><i className="ph ph-pencil-simple"></i></button>
                      <button className="row-icon-btn" title="이력 보기" onClick={() => setToast(r.name + '의 변경 이력을 조회했습니다')}><i className="ph ph-clock-counter-clockwise"></i></button>
                    </td>
                  </tr>
                  {editingId === r.id && (
                    <tr><td colSpan="8" style={{padding:0, border:'none'}}>
                      <div className="edit-panel">
                        <div className="edit-row">
                          <select value={draft.grade} onChange={e => setDraft(d => ({...d, grade:+e.target.value}))}>
                            {GRADES.map(g => <option key={g.id} value={g.id}>{g.label}</option>)}
                          </select>
                          <textarea rows="1" placeholder="변경 사유 메모" value={draft.comment} onChange={e => setDraft(d => ({...d, comment:e.target.value}))}></textarea>
                        </div>
                        <div className="edit-actions">
                          <button className="btn-ghost-slate" onClick={() => setEditingId(null)}>취소</button>
                          <button className="btn-solid-ink" onClick={() => saveEdit(r.id)}>저장</button>
                        </div>
                      </div>
                    </td></tr>
                  )}
                </React.Fragment>
              );
            })}
          </tbody>
        </table>
      </div>
    </div>
  );
}

function BatchLog({ setToast }){
  const [jobs, setJobs] = useState([
    { id:'BATCH-0142', file:'관광지_식당_숙박업소_모니터링_2026_07.xlsx', rows:142, status:'done', progress:100 },
    { id:'BATCH-0141', file:'제주_숙박업소_주간점검_2026_06_w4.xlsx', rows:98, status:'done', progress:100 },
    { id:'BATCH-0140', file:'강릉_식당_주간점검_2026_06_w3.xlsx', rows:76, status:'fail', progress:64 },
    { id:'BATCH-0139', file:'경주_관광지_주간점검_2026_06_w2.xlsx', rows:110, status:'run', progress:42 },
  ]);
  const [logs, setLogs] = useState([
    { t:'09:31:02', m:'BATCH-0142 검증 완료 — 관광지·식당·숙박업소 정상 136건 / 오류 6건' },
    { t:'09:31:14', m:'BATCH-0142 안심지도 DB 반영 시작' },
    { t:'09:31:22', m:'BATCH-0142 안심지도 DB 반영 완료' },
  ]);
  const logRef = useRef(null);

  useEffect(() => {
    const timer = setInterval(() => {
      setJobs(prev => prev.map(j => j.id === 'BATCH-0139' && j.status === 'run'
        ? { ...j, progress: Math.min(100, j.progress + 7) }
        : j));
      setLogs(prev => [...prev, { t: new Date().toLocaleTimeString('ko-KR', {hour12:false}), m:'BATCH-0139 경주 관광지 데이터 처리 중 — ' + (Math.floor(Math.random()*8)+1) + '건 반영' }].slice(-14));
    }, 1800);
    return () => clearInterval(timer);
  }, []);

  useEffect(() => { if (logRef.current) logRef.current.scrollTop = logRef.current.scrollHeight; }, [logs]);

  function retry(id){
    setJobs(prev => prev.map(j => j.id === id ? { ...j, status:'run', progress:10 } : j));
    setToast(id + ' 재처리를 큐에 등록했습니다');
  }

  const iconOf = s => s==='done' ? 'ph-check-circle' : s==='fail' ? 'ph-x-circle' : s==='run' ? 'ph-spinner-gap' : 'ph-clock';
  const badgeOf = s => ({wait:'대기', run:'처리중', done:'완료', fail:'실패'})[s];

  return (
    <div className="page">
      <div className="page-header">
        <div className="page-title-row">
          <span className="eyebrow">업로드 자동화</span>
          <h1 className="page-title">업로드 배치 처리 로그</h1>
          <div className="page-meta">Bull Queue 상태 폴링 · 지수 백오프 최대 3회 자동 재시도</div>
        </div>
      </div>

      <div className="batch-card">
        {jobs.map(j => (
          <div className="batch-row" key={j.id}>
            <span className="batch-icon"><i className={"ph " + iconOf(j.status)}></i></span>
            <div className="batch-info">
              <div className="batch-name">{j.id} · {j.file}</div>
              <div className="batch-meta">{j.rows}행</div>
            </div>
            <div className="progress-track"><div className="progress-fill" style={{width:j.progress+'%'}}></div></div>
            <span className={"status-badge " + j.status}>{badgeOf(j.status)}</span>
            {j.status === 'fail' && (
              <button className="btn-ghost-slate" onClick={() => retry(j.id)}><i className="ph ph-arrow-clockwise"></i>재처리</button>
            )}
          </div>
        ))}
      </div>

      <div className="widget-title">실시간 처리 로그</div>
      <div className="log-panel" ref={logRef}>
        {logs.map((l,i) => <div className="log-line" key={i} style={{animationDelay:(i*0.03)+'s'}}><span className="t">{l.t}</span>{l.m}</div>)}
      </div>
    </div>
  );
}

function App(){
  const [view, setView] = useState('main');
  const [toast, setToast] = useState(null);

  useEffect(() => {
    if (!toast) return;
    const t = setTimeout(() => setToast(null), 2600);
    return () => clearTimeout(t);
  }, [toast]);

  return (
    <div className="app-shell" data-archetype="stripe-multipane">
      <Sidebar view={view} setView={setView} />
      <div className="main-wrap">
        {view === 'main' && <MainDashboard setToast={setToast} />}
        {view === 'data' && <DataConsole setToast={setToast} />}
        {view === 'history' && <HistoryView setToast={setToast} />}
        {view === 'batch' && <BatchLog setToast={setToast} />}
      </div>
      <Toast message={toast} />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
