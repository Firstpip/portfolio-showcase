<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>메디코어 경영관제 콘솔 — 맞춤 구현 데모</title>
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://unpkg.com/prop-types@15/prop-types.min.js"></script>
<script src="https://unpkg.com/react-is@18/umd/react-is.production.min.js"></script>
<script src="https://unpkg.com/recharts@2/umd/Recharts.js"></script>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<style>
:root{
  --primary:#0f3e17;
  --primary-dim:#144d1e;
  --graphite:#333333;
  --accent:#a53ad9;
  --bg:#fffefc;
  --sage:#b1dbb8;
  --mist:#b6ced5;
  --mint:#cfe7d3;
  --linen:#e1f4df;
  --hairline:#e5e7eb;
  --text:#141614;
  --text-muted:#5b6b63;
  --text-faint:#8b9b93;
  --success:#1f8a4c;
  --danger:#c23b3b;
  --warn:#b8862f;
  --radius-card:14px;
  --radius-pill:999px;
  --radius-btn:14px;
}
*{box-sizing:border-box;}
html,body{width:100%;margin:0;padding:0;}
body{
  font-family:'Pretendard',ui-sans-serif,system-ui,-apple-system,sans-serif;
  background:var(--bg);
  color:var(--text);
  -webkit-font-smoothing:antialiased;
  width:100%;
  min-height:100vh;
}
#root{width:100%;}
button{font-family:inherit;cursor:pointer;}
input,select,textarea{font-family:inherit;}
::-webkit-scrollbar{width:8px;height:8px;}
::-webkit-scrollbar-thumb{background:var(--hairline);border-radius:8px;}

@keyframes fadeIn{from{opacity:0;}to{opacity:1;}}
@keyframes riseIn{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}
@keyframes drawerSlide{from{transform:translateX(100%);}to{transform:translateX(0);}}
@keyframes toastSlide{from{opacity:0;transform:translateY(16px);}to{opacity:1;transform:translateY(0);}}
@keyframes pulseDot{0%,100%{opacity:1;}50%{opacity:.35;}}
@keyframes shimmerBar{0%{background-position:-200px 0;}100%{background-position:200px 0;}}

/* ── layout shell ── */
.app-shell{display:flex;width:100%;min-height:100vh;}
.sidebar{
  position:fixed;left:0;top:0;bottom:0;width:240px;
  background:var(--bg);border-right:1px solid var(--hairline);
  display:flex;flex-direction:column;padding:22px 16px;z-index:20;
  overflow-y:auto;
}
.sidebar-brand{display:flex;align-items:center;gap:10px;padding:0 6px 20px;border-bottom:1px solid var(--hairline);margin-bottom:16px;}
.sidebar-brand .mark{width:32px;height:32px;border-radius:9px;background:var(--primary);display:flex;align-items:center;justify-content:center;color:#fff;flex-shrink:0;}
.sidebar-brand .name{font-weight:600;font-size:15px;letter-spacing:-0.01em;}
.sidebar-brand .sub{font-size:11px;color:var(--text-faint);}
.sidebar-section{margin-bottom:18px;}
.sidebar-section-title{font-size:11px;color:var(--text-faint);font-weight:600;letter-spacing:.04em;padding:0 10px 8px;text-transform:uppercase;}
.sidebar-link{
  display:flex;align-items:center;gap:10px;width:100%;text-align:left;
  padding:9px 10px;border-radius:7px;border:none;background:transparent;
  color:var(--graphite);font-size:13.5px;margin-bottom:2px;transition:background .15s,color .15s;
}
.sidebar-link:hover{background:var(--linen);}
.sidebar-link.active{background:var(--primary);color:#fff;font-weight:600;}
.sidebar-link.active svg{stroke:#fff;}
.sidebar-foot{margin-top:auto;padding-top:14px;border-top:1px solid var(--hairline);display:flex;align-items:center;gap:10px;}
.sidebar-foot .avatar{width:30px;height:30px;border-radius:8px;overflow:hidden;flex-shrink:0;}
.sidebar-foot .who{font-size:12.5px;font-weight:600;}
.sidebar-foot .role{font-size:11px;color:var(--text-faint);}

.main-wrap{margin-left:240px;flex:1;min-width:0;width:calc(100% - 240px);padding:26px 32px 60px;}

.page-header{margin-bottom:20px;}
.page-title-row{display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap;}
.page-title{font-size:23px;font-weight:700;letter-spacing:-0.01em;margin:0;}
.page-actions{display:flex;gap:8px;}
.btn-secondary,.btn-primary,.btn-ghost{
  border-radius:var(--radius-btn);font-size:13.5px;font-weight:500;padding:9px 16px;border:1px solid transparent;
  display:inline-flex;align-items:center;gap:6px;transition:transform .12s,box-shadow .12s;
}
.btn-secondary{background:var(--bg);border-color:var(--hairline);color:var(--graphite);}
.btn-secondary:hover{background:var(--linen);}
.btn-primary{background:var(--primary);color:var(--bg);}
.btn-primary:hover{transform:translateY(-1px);box-shadow:0 6px 16px rgba(15,62,23,.22);}
.btn-ghost{background:transparent;color:var(--primary);border-color:var(--sage);}
.btn-ghost:hover{background:var(--linen);}
.page-meta{font-size:12px;color:var(--text-faint);margin-top:6px;}

/* ── status strip (slim, replaces big KPI row) ── */
.stat-row{display:flex;gap:10px;margin-bottom:18px;flex-wrap:wrap;}
.stat-card{
  flex:1 1 200px;background:var(--bg);border:1px solid var(--hairline);border-radius:12px;
  padding:12px 16px;display:flex;align-items:center;justify-content:space-between;gap:10px;
  animation:riseIn .4s ease both;
}
.stat-card:nth-child(2){animation-delay:.05s;}
.stat-card:nth-child(3){animation-delay:.1s;}
.stat-card:nth-child(4){animation-delay:.15s;}
.stat-left{display:flex;flex-direction:column;gap:4px;}
.stat-label{font-size:11.5px;color:var(--text-faint);font-weight:600;}
.stat-value{font-size:28px;font-weight:700;letter-spacing:-0.02em;line-height:1;}
.hero-display{font-size:40px;font-weight:300;letter-spacing:-0.4px;color:var(--primary);line-height:1.1;margin:0;}
.hero-display-wrap{display:flex;align-items:baseline;gap:14px;margin-bottom:16px;flex-wrap:wrap;}
.hero-display-label{font-size:12.5px;color:var(--text-faint);font-weight:600;letter-spacing:.02em;}

.hero-panel{
  display:flex;gap:28px;align-items:center;border-radius:18px;overflow:hidden;margin-bottom:20px;
  background:linear-gradient(120deg, var(--sage) 0%, var(--mint) 48%, var(--mist) 100%);
  padding:28px 32px;
}
.hero-left{flex:1;min-width:0;}
.pill-badge{
  display:inline-flex;align-items:center;gap:6px;background:rgba(255,254,252,.72);color:var(--primary);
  font-size:12px;font-weight:700;padding:6px 14px;border-radius:999px;margin-bottom:12px;
}
.hero-right{flex:0 0 220px;display:flex;align-items:center;justify-content:center;}
@keyframes ecgDraw{from{stroke-dashoffset:260;}to{stroke-dashoffset:0;}}
.ecg-line{stroke-dasharray:260;animation:ecgDraw 2.4s ease-in-out infinite alternate;}
.ecg-dot{animation:pulseDot 1.3s infinite;}
.stat-delta{font-size:11.5px;font-weight:600;}
.stat-delta.up{color:var(--success);}
.stat-delta.down{color:var(--danger);}
.sparkline{display:block;}

/* ── command-tower main split ── */
.tower-split{display:grid;grid-template-columns:1fr 300px;gap:16px;margin-bottom:16px;}
@media (max-width:980px){.tower-split{grid-template-columns:1fr;}}
.panel{background:var(--bg);border:1px solid var(--hairline);border-radius:var(--radius-card);padding:20px;}
.panel-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
.panel-title{font-size:15px;font-weight:700;display:flex;align-items:center;gap:8px;}
.live-dot{width:7px;height:7px;border-radius:50%;background:var(--success);animation:pulseDot 1.8s infinite;}

.tab-bar{display:flex;gap:4px;border-bottom:1px solid var(--hairline);margin-bottom:14px;}
.tab{background:transparent;border:none;padding:9px 4px;margin-right:14px;font-size:13.5px;color:var(--text-faint);font-weight:600;position:relative;}
.tab.active{color:var(--primary);}
.tab.active::after{content:'';position:absolute;left:0;right:0;bottom:-1px;height:2px;background:var(--primary);border-radius:2px;}

.priority-rail{display:flex;flex-direction:column;gap:10px;max-height:340px;overflow-y:auto;}
.priority-item{
  border:1px solid var(--hairline);border-radius:10px;padding:11px 12px;background:var(--linen);
  cursor:pointer;transition:transform .12s,box-shadow .12s;
}
.priority-item:hover{transform:translateY(-2px);box-shadow:0 6px 14px rgba(15,62,23,.10);}
.priority-item .p-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;}
.priority-item .p-name{font-size:13px;font-weight:700;}
.priority-badge{font-size:10.5px;font-weight:700;padding:2px 8px;border-radius:999px;}
.priority-badge.high{background:#fbeaea;color:var(--danger);}
.priority-badge.mid{background:#fbf3e2;color:var(--warn);}
.priority-item .p-desc{font-size:11.5px;color:var(--text-muted);}

/* ── secondary widgets ── */
.secondary-row{display:grid;grid-template-columns:1.1fr 1fr;gap:16px;margin-bottom:20px;}
@media (max-width:980px){.secondary-row{grid-template-columns:1fr;}}
.progress-item{margin-bottom:12px;}
.progress-item .pi-top{display:flex;justify-content:space-between;font-size:12.5px;margin-bottom:6px;}
.progress-track{height:7px;background:var(--linen);border-radius:99px;overflow:hidden;}
.progress-fill{height:100%;background:var(--primary);border-radius:99px;transition:width .5s ease;}

/* ── data section ── */
.data-section{background:var(--bg);border:1px solid var(--hairline);border-radius:var(--radius-card);padding:20px;}
.data-toolbar{display:flex;gap:8px;align-items:center;margin-bottom:14px;flex-wrap:wrap;}
.search-input{flex:1;min-width:180px;padding:9px 12px;border:1px solid var(--hairline);border-radius:10px;font-size:13px;background:var(--bg);}
.filter-chip{padding:7px 13px;border-radius:999px;border:1px solid var(--hairline);background:var(--bg);font-size:12.5px;color:var(--graphite);}
.filter-chip.active{background:var(--primary);color:#fff;border-color:var(--primary);}
.export-btn{margin-left:auto;}
.data-table-wrap{overflow-x:auto;}
table.data-table{width:100%;border-collapse:collapse;font-size:13px;}
table.data-table thead th{text-align:left;font-size:11.5px;color:var(--text-faint);font-weight:700;padding:8px 10px;border-bottom:1px solid var(--hairline);text-transform:uppercase;letter-spacing:.02em;}
table.data-table tbody td{padding:11px 10px;border-bottom:1px solid var(--hairline);}
table.data-table tbody tr{cursor:pointer;transition:background .12s;}
table.data-table tbody tr:hover{background:var(--linen);}
.badge{font-size:11px;font-weight:700;padding:3px 10px;border-radius:999px;display:inline-block;}
.badge.active-b{background:#e5f6ea;color:var(--success);}
.badge.watch-b{background:#fbf3e2;color:var(--warn);}
.badge.risk-b{background:#fbeaea;color:var(--danger);}

/* ── screen generic ── */
.card{background:var(--bg);border:1px solid var(--hairline);border-radius:var(--radius-card);padding:20px;margin-bottom:16px;}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
@media (max-width:980px){.grid-2{grid-template-columns:1fr;}}
.field-row{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--hairline);}
.field-row:last-child{border-bottom:none;}
.field-label{font-size:13px;font-weight:600;}
.field-desc{font-size:11.5px;color:var(--text-faint);margin-top:2px;}
.toggle{width:40px;height:22px;border-radius:99px;background:var(--hairline);position:relative;border:none;flex-shrink:0;transition:background .15s;}
.toggle.on{background:var(--primary);}
.toggle .knob{position:absolute;top:2px;left:2px;width:18px;height:18px;border-radius:50%;background:#fff;transition:transform .15s;box-shadow:0 1px 2px rgba(0,0,0,.2);}
.toggle.on .knob{transform:translateX(18px);}

.matrix-table{width:100%;border-collapse:collapse;font-size:12.5px;}
.matrix-table th,.matrix-table td{border:1px solid var(--hairline);padding:9px;text-align:center;}
.matrix-table th{background:var(--linen);font-weight:700;font-size:11.5px;}
.matrix-cell{width:26px;height:26px;border-radius:7px;border:none;margin:0 auto;display:block;}
.matrix-cell.granted{background:var(--sage);}
.matrix-cell.denied{background:var(--hairline);}

.upload-zone{
  border:2px dashed var(--hairline);border-radius:14px;padding:36px 20px;text-align:center;
  background:var(--linen);transition:border-color .15s,background .15s;cursor:pointer;
}
.upload-zone:hover,.upload-zone.dragging{border-color:var(--primary);background:var(--mint);}
.upload-progress-track{height:8px;background:var(--hairline);border-radius:99px;overflow:hidden;margin-top:14px;}
.upload-progress-fill{height:100%;background:linear-gradient(90deg,var(--primary),var(--sage),var(--primary));background-size:200px 100%;animation:shimmerBar 1.1s linear infinite;border-radius:99px;}

.tree-node{border:1px solid var(--hairline);border-radius:10px;margin-bottom:8px;overflow:hidden;}
.tree-head{display:flex;align-items:center;justify-content:space-between;padding:11px 14px;background:var(--linen);cursor:pointer;}
.tree-head .th-left{display:flex;align-items:center;gap:8px;font-size:13px;font-weight:700;}
.tree-body{padding:6px 14px 10px 34px;}
.tree-child{display:flex;justify-content:space-between;padding:7px 0;font-size:12.5px;border-bottom:1px dashed var(--hairline);}
.tree-child:last-child{border-bottom:none;}

.mask-value{font-family:ui-monospace,monospace;letter-spacing:.05em;}
.mask-toggle-btn{font-size:11.5px;padding:4px 9px;border-radius:8px;border:1px solid var(--hairline);background:var(--bg);}

.approve-row{display:flex;align-items:center;justify-content:space-between;padding:12px 0;border-bottom:1px solid var(--hairline);}
.approve-row:last-child{border-bottom:none;}
.approve-actions{display:flex;gap:6px;}
.btn-approve{background:var(--success);color:#fff;border:none;border-radius:8px;padding:6px 12px;font-size:12px;font-weight:600;}
.btn-reject{background:transparent;color:var(--danger);border:1px solid var(--danger);border-radius:8px;padding:6px 12px;font-size:12px;font-weight:600;}

/* ── modal / drawer / toast ── */
.modal-overlay{position:fixed;inset:0;background:rgba(20,22,20,.42);display:flex;align-items:center;justify-content:center;z-index:100;animation:fadeIn .18s ease;}
.modal-box{background:var(--bg);border-radius:16px;padding:26px;width:520px;max-width:92vw;max-height:84vh;overflow-y:auto;animation:riseIn .22s ease;}
.modal-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;}
.modal-title{font-size:17px;font-weight:700;}
.close-btn{background:none;border:none;color:var(--text-faint);padding:4px;border-radius:8px;}
.close-btn:hover{background:var(--linen);}
.drawer-overlay{position:fixed;inset:0;background:rgba(20,22,20,.35);z-index:100;animation:fadeIn .18s ease;}
.drawer-panel{position:fixed;right:0;top:0;bottom:0;width:420px;max-width:92vw;background:var(--bg);box-shadow:-8px 0 28px rgba(0,0,0,.14);animation:drawerSlide .24s ease;padding:24px;overflow-y:auto;z-index:101;}
.toast-wrap{position:fixed;bottom:24px;right:24px;z-index:200;display:flex;flex-direction:column;gap:8px;}
.toast{background:var(--primary);color:#fff;padding:12px 18px;border-radius:12px;font-size:13px;font-weight:600;box-shadow:0 10px 24px rgba(15,62,23,.3);animation:toastSlide .25s ease;display:flex;align-items:center;gap:8px;}

.diff-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:8px 0;border-bottom:1px dashed var(--hairline);font-size:12.5px;}
.diff-before{color:var(--danger);text-decoration:line-through;}
.diff-after{color:var(--success);font-weight:600;}

.form-group{margin-bottom:14px;}
.form-label{font-size:12.5px;font-weight:600;margin-bottom:6px;display:block;}
.form-input,.form-select,.form-textarea{width:100%;padding:9px 11px;border:1px solid var(--hairline);border-radius:10px;font-size:13px;background:var(--bg);}
.accent-tag{background:rgba(165,58,217,.10);color:var(--accent);font-size:11px;font-weight:700;padding:3px 10px;border-radius:999px;display:inline-flex;align-items:center;gap:4px;}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState, useEffect, useMemo, useRef} = React;
const {AreaChart, Area, PieChart, Pie, Cell, ResponsiveContainer, Tooltip, XAxis, YAxis, CartesianGrid} = Recharts;

const NAV_ITEMS = [
  { id:'main', group:'경영', label:'경영 요약 및 영업 대시보드', icon:'layout-dashboard' },
  { id:'auth', group:'보안', label:'Google SSO 인증 및 2단계 권한 제어', icon:'shield-check' },
  { id:'operations', group:'운영', label:'수술 실적 및 생산·품질 통합 관리', icon:'activity' },
  { id:'security', group:'보안', label:'감사 로그 및 데이터 암호화 보안 관리', icon:'lock' },
];

function Icon({name, size=16, style}) {
  const ref = useRef(null);
  useEffect(()=>{ if(window.lucide) window.lucide.createIcons(); },[]);
  return <i data-lucide={name} style={{width:size,height:size,...style}} ref={ref}></i>;
}

function Sparkline({data, color='#0f3e17'}){
  const w=64,h=26;
  const max=Math.max(...data), min=Math.min(...data);
  const pts = data.map((v,i)=>`${(i/(data.length-1))*w},${h-((v-min)/((max-min)||1))*h}`).join(' ');
  return (
    <svg className="sparkline" viewBox={`0 0 ${w} ${h}`} width={w} height={h}>
      <polyline points={pts} fill="none" stroke={color} strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"/>
    </svg>
  );
}

function Toast({toasts}){
  return (
    <div className="toast-wrap">
      {toasts.map(t=>(
        <div className="toast" key={t.id}><Icon name="check-circle" size={15} style={{stroke:'#fff'}}/>{t.msg}</div>
      ))}
    </div>
  );
}

function Modal({title, onClose, children, width}){
  return (
    <div className="modal-overlay" onClick={onClose}>
      <div className="modal-box" style={width?{width}:{}} onClick={e=>e.stopPropagation()}>
        <div className="modal-head">
          <div className="modal-title">{title}</div>
          <button className="close-btn" onClick={onClose}><Icon name="x" size={18}/></button>
        </div>
        {children}
      </div>
    </div>
  );
}

function Drawer({title, onClose, children}){
  return (
    <React.Fragment>
      <div className="drawer-overlay" onClick={onClose}></div>
      <div className="drawer-panel">
        <div className="modal-head">
          <div className="modal-title">{title}</div>
          <button className="close-btn" onClick={onClose}><Icon name="x" size={18}/></button>
        </div>
        {children}
      </div>
    </React.Fragment>
  );
}

/* ── mock data ── */
const TREND_SETS = {
  경영:[{m:'1월',v:24.1},{m:'2월',v:25.6},{m:'3월',v:24.8},{m:'4월',v:27.3},{m:'5월',v:29.0},{m:'6월',v:32.4}],
  영업:[{m:'1월',v:18.2},{m:'2월',v:19.4},{m:'3월',v:21.0},{m:'4월',v:20.6},{m:'5월',v:22.8},{m:'6월',v:24.9}],
  생산:[{m:'1월',v:88},{m:'2월',v:90},{m:'3월',v:87},{m:'4월',v:92},{m:'5월',v:91},{m:'6월',v:94}],
};

const REGION_DIST = [
  {name:'수도권', value:42}, {name:'영남권', value:24}, {name:'호남권', value:16},
  {name:'충청권', value:12}, {name:'기타', value:6},
];
const PIE_COLORS = ['#0f3e17','#4c8a55','#8bbd93','#b1dbb8','#dcefdd'];

const PARTNERS = [
  { id:1, name:'하늘정형외과의원', manager:'김도윤', region:'수도권', amount:'2억 1,400만원', status:'active' },
  { id:2, name:'푸른내과병원', manager:'이서연', region:'영남권', amount:'8,600만원', status:'watch' },
  { id:3, name:'참편한의료재단', manager:'박지훈', region:'호남권', amount:'1억 5,200만원', status:'active' },
  { id:4, name:'미래정형센터', manager:'최유나', region:'충청권', amount:'4,300만원', status:'risk' },
  { id:5, name:'연세라인병원', manager:'정하은', region:'수도권', amount:'3억 3,000만원', status:'active' },
  { id:6, name:'그린바이오병원', manager:'한지민', region:'영남권', amount:'6,750만원', status:'watch' },

function AuthScreen({pushToast}){
  const [matrix, setMatrix] = useState(()=>{
    const m = {};
    ROLE_LEVELS.forEach(role=>{ m[role]={}; ROLE_TEAMS.forEach(team=>{ m[role][team] = !(role==='팀원' && team==='재무팀'); }); });
    return m;
  });
  const [session, setSession] = useState({ autoLogin:false, multiDevice:false, lockThreshold:'5회' });
  const [pending, setPending] = useState(APPROVALS);

  const toggleCell = (role, team) => {
    setMatrix(prev=>({...prev, [role]:{...prev[role], [team]: !prev[role][team]}}));
    pushToast(`${role} · ${team} 권한이 변경되었습니다`);
  };
  const toggleSession = (key) => {
    setSession(prev=>({...prev, [key]:!prev[key]}));
  };
  const decide = (id, ok) => {
    setPending(prev=>prev.filter(p=>p.id!==id));
    pushToast(ok?'계정 승인이 완료되었습니다':'계정 가입 요청을 거절했습니다');
  };

  return (
    <React.Fragment>
      <div className="card">
        <div className="panel-head">
          <div className="panel-title"><Icon name="chrome" size={17}/>Google SSO 연동 상태</div>
          <span className="accent-tag"><Icon name="badge-check" size={12} style={{stroke:'var(--accent)'}}/>도메인 인증됨</span>
        </div>
        <div className="field-row">
          <div><div className="field-label">허용 도메인</div><div className="field-desc">medicore-internal.com 계정만 로그인 허용</div></div>
          <span className="badge active-b">연동됨</span>
        </div>
        <div className="field-row">
          <div><div className="field-label">관리자 승인제 워크플로우</div><div className="field-desc">신규 가입 계정은 승인 전까지 모듈 접근 차단</div></div>
          <span className="badge active-b">사용 중</span>
        </div>
      </div>

      <div className="grid-2">
        <div className="card">
          <div className="panel-head"><div className="panel-title">2단계 권한 매트릭스</div></div>
          <table className="matrix-table">
            <thead><tr><th></th>{ROLE_TEAMS.map(t=><th key={t}>{t}</th>)}</tr></thead>
            <tbody>
              {ROLE_LEVELS.map(role=>(
                <tr key={role}>
                  <th>{role}</th>
                  {ROLE_TEAMS.map(team=>(
                    <td key={team}>
                      <button className={"matrix-cell "+(matrix[role][team]?'granted':'denied')} onClick={()=>toggleCell(role,team)} title={role+' / '+team}></button>
                    </td>
                  ))}
                </tr>
              ))}
            </tbody>
          </table>
        </div>

        <div className="card">
          <div className="panel-head"><div className="panel-title">세션 정책</div></div>
          <div className="field-row">
            <div><div className="field-label">자동 로그인 차단</div><div className="field-desc">공용 PC 로그인 유지 방지</div></div>
            <button className={"toggle "+(session.autoLogin?'on':'')} onClick={()=>toggleSession('autoLogin')}><span className="knob"></span></button>
          </div>
          <div className="field-row">
            <div><div className="field-label">다중 기기 로그인 차단</div><div className="field-desc">두 번째 기기 로그인 시 기존 세션 자동 종료</div></div>
            <button className={"toggle "+(session.multiDevice?'on':'')} onClick={()=>toggleSession('multiDevice')}><span className="knob"></span></button>
          </div>
          <div className="field-row">
            <div><div className="field-label">로그인 실패 잠금 임계값</div><div className="field-desc">연속 실패 시 계정 잠금 기준</div></div>
            <select className="form-select" style={{width:100}} value={session.lockThreshold} onChange={e=>setSession(s=>({...s,lockThreshold:e.target.value}))}>
              <option>3회</option><option>5회</option><option>10회</option>
            </select>
          </div>
        </div>
      </div>

      <div className="card">
        <div className="panel-head"><div className="panel-title">관리자 승인 대기열</div></div>
        {pending.length===0 && <div style={{fontSize:13,color:'var(--text-faint)'}}>대기 중인 승인 요청이 없습니다.</div>}
        {pending.map(p=>(
          <div className="approve-row" key={p.id}>
            <div>
              <div className="field-label">{p.name} <span style={{fontWeight:400,color:'var(--text-faint)'}}>· {p.team}</span></div>
              <div className="field-desc">{p.email}</div>

              <button className="btn-approve" onClick={()=>decide(p.id,true)}>승인</button>
              <button className="btn-reject" onClick={()=>decide(p.id,false)}>거절</button>
            </div>
          </div>
        ))}
      </div>
    </React.Fragment>
  );
}

const ENCRYPTED_COLUMNS = [
  {id:1, label:'하늘정형외과의원 정산액', value:'214,000,000'},
  {id:2, label:'연세라인병원 정산액', value:'330,000,000'},
  {id:3, label:'참편한의료재단 정산액', value:'152,000,000'},
];

const REPORTS = [
  {id:1, title:'접근 권한 이상 신고', assignee:'미지정', status:'접수'},
  {id:2, title:'재무 데이터 조회 이상 신고', assignee:'정하은', status:'처리 중'},
  {id:3, title:'세션 다중 접속 신고', assignee:'박지훈', status:'완료'},
];

function SecurityScreen({pushToast}){
  const [tab, setTab] = useState('접속');
  const [diff, setDiff] = useState(null);
  const [reveal, setReveal] = useState({});
  const [reports, setReports] = useState(REPORTS);

  const openDiff = (log) => { if (log.before) setDiff(log); };
  const toggleReveal = (id) => setReveal(prev=>({...prev,[id]:!prev[id]}));
  const advanceReport = (id) => {
    setReports(prev=>prev.map(r=>{
      if (r.id!==id) return r;
      const next = r.status==='접수' ? '처리 중' : r.status==='처리 중' ? '완료' : '완료';
      return {...r, status:next, assignee: r.assignee==='미지정' ? '박지훈' : r.assignee};
    }));
    pushToast('신고 처리 상태가 변경되었습니다');
  };

  return (
    <React.Fragment>
      <div className="card">
        <div className="tab-bar" role="tablist">
          {Object.keys(AUDIT_LOGS).map(t=>(
            <button key={t} role="tab" className={"tab "+(tab===t?'active':'')} onClick={()=>setTab(t)}>{t} 로그</button>
          ))}
        </div>
        <div className="data-table-wrap">
          <table className="data-table">
            <thead><tr><th>사용자</th><th>행위</th><th>시각</th><th></th></tr></thead>
            <tbody>
              {AUDIT_LOGS[tab].map(l=>(
                <tr key={l.id} onClick={()=>openDiff(l)}>
                  <td>{l.actor}</td><td>{l.action}</td><td>{l.time}</td>
                  <td>{l.before ? <span className="badge watch-b">변경 diff</span> : <span style={{color:'var(--text-faint)',fontSize:11.5}}>{l.ip}</span>}</td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      </div>

      <div className="grid-2">
        <div className="card">
          <div className="panel-head"><div className="panel-title">민감 금액 데이터 암호화</div></div>
          {ENCRYPTED_COLUMNS.map(c=>(
            <div className="field-row" key={c.id}>
              <div className="field-label">{c.label}</div>
              <div style={{display:'flex',alignItems:'center',gap:8}}>
                <span className="mask-value">{reveal[c.id] ? Number(c.value).toLocaleString()+'원' : '●●●●●●●●'}</span>
                <button className="mask-toggle-btn" onClick={()=>toggleReveal(c.id)}>{reveal[c.id]?'잠금':'권한 확인'}</button>
              </div>
            </div>
          ))}
        </div>

        <div className="card">
          <div className="panel-head"><div className="panel-title">사내 신고 처리 워크플로우</div></div>
          {reports.map(r=>(
            <div className="field-row" key={r.id}>
              <div><div className="field-label">{r.title}</div><div className="field-desc">담당자: {r.assignee}</div></div>
              <button className="btn-secondary" onClick={()=>advanceReport(r.id)}>
                <span className={"badge "+(r.status==='완료'?'active-b':r.status==='처리 중'?'watch-b':'risk-b')}>{r.status}</span>
              </button>
            </div>
          ))}
        </div>
      </div>

      {diff && (
        <Modal title={diff.action + ' 변경 이력'} onClose={()=>setDiff(null)}>
          <div className="diff-row"><div className="diff-before">{diff.before}</div><div className="diff-after">{diff.after}</div></div>
          <div style={{fontSize:11.5,color:'var(--text-faint)',marginTop:10}}>{diff.actor} · {diff.time}</div>
        </Modal>
      )}
    </React.Fragment>
  );
}

function App(){
  const [screen, setScreen] = useState('main');
  const [toasts, setToasts] = useState([]);
  const [partnerDetail, setPartnerDetail] = useState(null);
  const [priorityDetail, setPriorityDetail] = useState(null);
  const [newPartnerOpen, setNewPartnerOpen] = useState(false);
  const [form, setForm] = useState({name:'', manager:'', amount:''});
  const PERIODS = ['이번 분기','지난 분기','상반기 누계'];
  const [periodIdx, setPeriodIdx] = useState(0);
  const [syncing, setSyncing] = useState(false);

  const pushToast = (msg) => {
    const id = Math.random().toString(36).slice(2);
    setToasts(prev=>[...prev, {id, msg}]);
    setTimeout(()=>setToasts(prev=>prev.filter(t=>t.id!==id)), 2600);
  };

  const submitPartner = () => {
    setNewPartnerOpen(false);
    pushToast(`${form.name || '신규 거래처'} 등록이 완료되었습니다`);
    setForm({name:'',manager:'',amount:''});
  };

  const cyclePeriod = () => {
    const next = (periodIdx+1) % PERIODS.length;
    setPeriodIdx(next);
    pushToast(`조회 기간이 '${PERIODS[next]}'로 변경되었습니다`);
  };

  const runSync = () => {
    if (syncing) return;
    setSyncing(true);
    setTimeout(()=>{ setSyncing(false); pushToast('전체 모듈 데이터 동기화가 완료되었습니다'); }, 1200);
  };

  useEffect(()=>{ if(window.lucide) window.lucide.createIcons(); });

  return (
    <div data-archetype="stripe-multipane" className="app-shell">
      <aside className="sidebar" data-sidebar>
        <div className="sidebar-brand">
          <div className="mark"><Icon name="cross" size={18} style={{stroke:'#fff'}}/></div>
          <div><div className="name">메디코어 Ops</div><div className="sub">Semi-ERP 관제 콘솔</div></div>
        </div>
        {['경영','운영','보안'].map(group=>(
          <div className="sidebar-section" key={group}>
            <div className="sidebar-section-title">{group}</div>
            {NAV_ITEMS.filter(n=>n.group===group).map(item=>(
              <button key={item.id} className={"sidebar-link "+(screen===item.id?'active':'')} onClick={()=>setScreen(item.id)}>
                <Icon name={item.icon} size={16}/>{item.label}
              </button>
            ))}
          </div>
        ))}
        <div className="sidebar-foot">
          <div className="avatar"><img src="https://source.boringavatars.com/beam/60/kimdoyun?colors=0f3e17,b1dbb8,e1f4df,b6ced5" width="30" height="30" alt=""/></div>
          <div><div className="who">김도윤</div><div className="role">경영기획팀 · 관리자</div></div>
        </div>
      </aside>

      <main className="main-wrap">
        <div className="page-header">
          <div className="page-title-row">
            <h1 className="page-title">
              {screen==='main' && '경영 요약 대시보드'}
              {screen==='auth' && '인증 및 권한 관리'}
              {screen==='operations' && '수술 실적 · 생산 품질'}
              {screen==='security' && '감사 로그 · 보안'}
            </h1>
            <div className="page-actions">
              <button className="btn-secondary" onClick={cyclePeriod}><Icon name="calendar" size={14}/>{PERIODS[periodIdx]}</button>
              <button className="btn-primary" onClick={runSync}><Icon name={syncing?'loader':'refresh-cw'} size={14} style={{stroke:'#fff'}}/>{syncing?'동기화 중…':'동기화'}</button>
            </div>
          </div>
          <div className="page-meta">마지막 업데이트 2026.07.08 11:32 · Production 환경</div>
        </div>

        {screen==='main' && <MainScreen openPartnerDetail={setPartnerDetail} openPriorityDetail={setPriorityDetail} openNewPartnerForm={()=>setNewPartnerOpen(true)} pushToast={pushToast}/>}
        {screen==='auth' && <AuthScreen pushToast={pushToast}/>}
        {screen==='operations' && <OperationsScreen pushToast={pushToast}/>}
        {screen==='security' && <SecurityScreen pushToast={pushToast}/>}
      </main>

      {partnerDetail && (
        <Drawer title={partnerDetail.name} onClose={()=>setPartnerDetail(null)}>
          <div className="field-row"><div className="field-label">담당자</div><div>{partnerDetail.manager}</div></div>
          <div className="field-row"><div className="field-label">지역</div><div>{partnerDetail.region}</div></div>
          <div className="field-row"><div className="field-label">최근 계약액</div><div>{partnerDetail.amount}</div></div>
          <div className="field-row"><div className="field-label">상태</div><span className={"badge "+(partnerDetail.status==='active'?'active-b':partnerDetail.status==='watch'?'watch-b':'risk-b')}>
            {partnerDetail.status==='active'?'정상':partnerDetail.status==='watch'?'관찰':'위험'}
          </span></div>
          <div className="form-group" style={{marginTop:16}}>
            <label className="form-label">메모</label>
            <textarea className="form-textarea" rows="3" placeholder="담당자 메모를 입력하세요"></textarea>
          </div>
          <button className="btn-primary" style={{width:'100%',justifyContent:'center'}} onClick={()=>{ setPartnerDetail(null); pushToast('메모가 저장되었습니다'); }}>저장</button>
        </Drawer>
      )}

      {priorityDetail && (
        <Modal title={priorityDetail.name} onClose={()=>setPriorityDetail(null)}>
          <p style={{fontSize:13.5,lineHeight:1.6}}>{priorityDetail.desc}</p>
          <div style={{display:'flex',gap:8,marginTop:16}}>
            <button className="btn-primary" onClick={()=>{ setPriorityDetail(null); pushToast('담당자에게 대응 요청을 전달했습니다'); }}>담당자 배정</button>
            <button className="btn-secondary" onClick={()=>setPriorityDetail(null)}>닫기</button>
          </div>
        </Modal>
      )}

      {newPartnerOpen && (
        <Modal title="신규 거래처 등록" onClose={()=>setNewPartnerOpen(false)}>
          <div className="form-group"><label className="form-label">거래처명</label><input className="form-input" value={form.name} onChange={e=>setForm({...form,name:e.target.value})} placeholder="예: 서울정형외과의원"/></div>
          <div className="form-group"><label className="form-label">담당자</label><input className="form-input" value={form.manager} onChange={e=>setForm({...form,manager:e.target.value})} placeholder="담당자 이름"/></div>
          <div className="form-group"><label className="form-label">계약 예상액</label><input className="form-input" value={form.amount} onChange={e=>setForm({...form,amount:e.target.value})} placeholder="예: 1억 2,000만원"/></div>
          <button className="btn-primary" style={{width:'100%',justifyContent:'center'}} onClick={submitPartner}>등록 완료</button>
        </Modal>
      )}

      <Toast toasts={toasts}/>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
