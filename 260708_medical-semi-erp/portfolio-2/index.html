<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>메디코어 통합 관리 확장 콘솔 — 구현 데모</title>
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
<link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/regular/style.css">
<link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/fill/style.css">
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://unpkg.com/prop-types@15/prop-types.min.js"></script>
<script src="https://unpkg.com/react-is@18/umd/react-is.production.min.js"></script>
<script src="https://unpkg.com/recharts@2/umd/Recharts.js"></script>
<style>
:root{
  --void:#08090a;
  --carbon:#0f1011;
  --obsidian:#161718;
  --graphite:#23252a;
  --smoke:#383b3f;
  --ash:#62666d;
  --fog:#8a8f98;
  --mist:#d0d6e0;
  --paper:#ffffff;
  --lime:#e4f222;
  --blue:#4893f4;
  --green:#27a644;
  --red:#eb5757;
  --radius-card:10px;
  --radius-btn:6px;
}
*{box-sizing:border-box;}
html,body{width:100%;margin:0;padding:0;}
body{
  font-family:'Pretendard',ui-sans-serif,system-ui,-apple-system,sans-serif;
  background:var(--void);color:var(--mist);width:100%;min-height:100vh;-webkit-font-smoothing:antialiased;
}
#root{width:100%;}
button{font-family:inherit;cursor:pointer;}
input,select,textarea{font-family:inherit;}
::-webkit-scrollbar{width:8px;height:8px;}
::-webkit-scrollbar-thumb{background:var(--graphite);border-radius:8px;}

@keyframes fadeIn{from{opacity:0;}to{opacity:1;}}
@keyframes riseIn{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
@keyframes panelSlide{from{opacity:0;transform:translateX(14px);}to{opacity:1;transform:translateX(0);}}
@keyframes pulseLive{0%,100%{opacity:1;}50%{opacity:.3;}}
@keyframes progressGrow{from{width:0;}}
@keyframes glowPulse{0%,100%{box-shadow:0 0 0 rgba(228,242,34,0);}50%{box-shadow:0 0 18px rgba(228,242,34,.18);}}

/* ── shell ── */
.shell{width:100%;min-height:100vh;display:flex;flex-direction:column;}
.app-header{
  position:sticky;top:0;z-index:30;background:rgba(8,9,10,.86);backdrop-filter:blur(10px);
  border-bottom:1px solid var(--graphite);padding:0 24px;height:60px;
  display:flex;align-items:center;gap:20px;
}
.brand{display:flex;align-items:center;gap:8px;font-weight:600;font-size:14px;color:var(--paper);flex-shrink:0;}
.brand .mark{width:26px;height:26px;border-radius:6px;background:var(--lime);display:flex;align-items:center;justify-content:center;color:var(--void);}
.project-switcher{font-size:12.5px;color:var(--fog);display:flex;align-items:center;gap:4px;padding:6px 10px;border-radius:6px;border:1px solid var(--graphite);flex-shrink:0;}
.global-nav{display:flex;gap:4px;flex:1;overflow-x:auto;}
.nav-link{
  background:transparent;border:none;color:var(--fog);font-size:13px;padding:8px 12px;border-radius:6px;
  white-space:nowrap;transition:color .15s,background .15s;
}
.nav-link:hover{color:var(--mist);background:rgba(255,255,255,.04);}
.nav-link.active{color:var(--paper);background:rgba(255,255,255,.06);}
.header-actions{display:flex;align-items:center;gap:10px;flex-shrink:0;}
.icon-btn{background:transparent;border:1px solid var(--graphite);color:var(--fog);width:32px;height:32px;border-radius:6px;display:flex;align-items:center;justify-content:center;}
.icon-btn:hover{color:var(--mist);border-color:var(--smoke);}
.avatar-chip{width:28px;height:28px;border-radius:6px;overflow:hidden;}

.content{width:100%;max-width:1320px;margin:0 auto;padding:22px 24px 60px;flex:1;}

.page-head{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:16px;flex-wrap:wrap;gap:12px;}
.page-title{font-size:20px;font-weight:600;color:var(--paper);letter-spacing:-0.01em;margin:0;}
.page-sub{font-size:12px;color:var(--fog);margin-top:4px;}
.page-actions{display:flex;gap:8px;}
.btn-primary,.btn-secondary,.btn-ghost{
  border-radius:var(--radius-btn);font-size:13px;font-weight:510;padding:9px 15px;border:1px solid transparent;
  display:inline-flex;align-items:center;gap:6px;transition:transform .12s,box-shadow .12s;
}
.btn-primary{background:var(--lime);color:var(--void);}
.btn-primary:hover{animation:glowPulse 1.2s ease;}
.btn-secondary{background:rgba(255,255,255,.03);border-color:var(--graphite);color:var(--mist);}
.btn-secondary:hover{background:rgba(255,255,255,.06);}
.btn-ghost{background:transparent;border-color:var(--graphite);color:var(--fog);}
.btn-ghost:hover{color:var(--mist);}

/* secondary tab row */
.tab-bar{display:flex;gap:2px;border-bottom:1px solid var(--graphite);margin-bottom:16px;}
.tab{background:transparent;border:none;color:var(--fog);font-size:13px;font-weight:510;padding:9px 4px;margin-right:18px;position:relative;}
.tab.active{color:var(--paper);}
.tab.active::after{content:'';position:absolute;left:0;right:0;bottom:-1px;height:2px;background:var(--lime);border-radius:2px;}

/* stat row */
.stat-row{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px;}
@media (max-width:940px){.stat-row{grid-template-columns:repeat(2,1fr);}}
.stat-card{
  background:var(--carbon);border:1px solid var(--graphite);border-radius:var(--radius-card);padding:16px 18px;
  animation:riseIn .4s ease both;
}
.stat-card:nth-child(2){animation-delay:.04s;}
.stat-card:nth-child(3){animation-delay:.08s;}
.stat-card:nth-child(4){animation-delay:.12s;}
.stat-label{font-size:11.5px;color:var(--fog);font-weight:510;margin-bottom:8px;}
.stat-value{font-size:30px;font-weight:600;color:var(--paper);letter-spacing:-0.02em;line-height:1;margin-bottom:6px;}
.hero-floor{position:relative;border-radius:14px;overflow:hidden;padding:28px 24px;margin-bottom:20px;
  background:linear-gradient(180deg, rgba(8,9,10,1) 0%, rgba(35,37,42,.55) 60%, rgba(208,214,224,.14) 100%);
  border:1px solid var(--graphite);
}
.hero-floor .hd-label{font-size:11.5px;color:var(--fog);font-weight:600;letter-spacing:.04em;text-transform:uppercase;margin-bottom:10px;}
.hero-floor .hd-value{font-size:36px;font-weight:510;color:var(--paper);letter-spacing:-0.022em;line-height:1;}
.hero-floor .hd-sub{font-size:12.5px;color:var(--mist);margin-top:8px;}
.stat-foot{display:flex;justify-content:space-between;align-items:center;}
.stat-delta{font-size:11.5px;font-weight:510;}
.stat-delta.up{color:var(--green);}
.stat-delta.down{color:var(--red);}
.sparkline{display:block;}

/* master-detail split */
.md-split{display:grid;grid-template-columns:340px 1fr;gap:16px;}
@media (max-width:980px){.md-split{grid-template-columns:1fr;}}
.list-rail{background:var(--carbon);border:1px solid var(--graphite);border-radius:var(--radius-card);padding:14px;max-height:560px;overflow-y:auto;}
.list-search{width:100%;padding:8px 10px;border-radius:6px;border:1px solid var(--graphite);background:rgba(255,255,255,.02);color:var(--mist);font-size:12.5px;margin-bottom:10px;}
.list-item{
  padding:11px 12px;border-radius:8px;margin-bottom:4px;cursor:pointer;transition:background .12s;
  border:1px solid transparent;
}
.list-item:hover{background:rgba(255,255,255,.03);}
.list-item.active{background:rgba(228,242,34,.07);border-color:rgba(228,242,34,.3);}
.li-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:3px;}
.li-name{font-size:13px;font-weight:510;color:var(--paper);}
.li-meta{font-size:11.5px;color:var(--fog);}

.detail-panel{background:var(--carbon);border:1px solid var(--graphite);border-radius:var(--radius-card);padding:22px;animation:panelSlide .2s ease;}
.detail-head{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:16px;}
.detail-title{font-size:17px;font-weight:600;color:var(--paper);}
.detail-sub{font-size:12px;color:var(--fog);margin-top:4px;}

.summary-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:18px;}
@media (max-width:720px){.summary-grid{grid-template-columns:1fr;}}
.summary-cell{background:rgba(255,255,255,.02);border:1px solid var(--graphite);border-radius:8px;padding:12px;}
.summary-cell .sc-label{font-size:11px;color:var(--fog);margin-bottom:4px;}
.summary-cell .sc-value{font-size:16px;font-weight:600;color:var(--paper);}

.section-title{font-size:12.5px;font-weight:600;color:var(--mist);margin:18px 0 10px;text-transform:uppercase;letter-spacing:.04em;}
.checklist-item{display:flex;align-items:center;gap:9px;padding:8px 0;border-bottom:1px dashed var(--graphite);font-size:13px;}
.checklist-item:last-child{border-bottom:none;}
.check-dot{width:16px;height:16px;border-radius:5px;border:1px solid var(--smoke);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.check-dot.done{background:var(--green);border-color:var(--green);}
.check-dot.done i{color:var(--void);font-size:11px;}

.badge{font-size:10.5px;font-weight:600;padding:3px 9px;border-radius:4px;display:inline-block;}
.badge.ok{background:rgba(39,166,68,.15);color:var(--green);}
.badge.warn{background:rgba(228,242,34,.12);color:var(--lime);}
.badge.err{background:rgba(235,87,87,.15);color:var(--red);}
.badge.muted{background:rgba(255,255,255,.05);color:var(--fog);}

.progress-track{height:6px;background:var(--graphite);border-radius:99px;overflow:hidden;margin-top:6px;}
.progress-fill{height:100%;background:var(--lime);border-radius:99px;animation:progressGrow .6s ease;}

.field-row{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--graphite);}
.field-row:last-child{border-bottom:none;}
.field-label{font-size:13px;font-weight:510;color:var(--mist);}
.field-desc{font-size:11.5px;color:var(--fog);margin-top:2px;}

.timeline{position:relative;padding-left:18px;}
.timeline::before{content:'';position:absolute;left:5px;top:4px;bottom:4px;width:1px;background:var(--graphite);}
.timeline-step{position:relative;padding-bottom:16px;}
.timeline-step:last-child{padding-bottom:0;}
.timeline-dot{position:absolute;left:-18px;top:2px;width:11px;height:11px;border-radius:50%;background:var(--graphite);border:2px solid var(--carbon);}
.timeline-step.done .timeline-dot{background:var(--green);}
.timeline-step.pending .timeline-dot{background:var(--lime);}
.timeline-title{font-size:12.5px;font-weight:600;color:var(--mist);}
.timeline-desc{font-size:11.5px;color:var(--fog);}

.upload-drop{border:1.5px dashed var(--graphite);border-radius:10px;padding:22px;text-align:center;background:rgba(255,255,255,.015);cursor:pointer;}
.upload-drop:hover{border-color:var(--lime);}

.data-mini-table{width:100%;border-collapse:collapse;font-size:12.5px;margin-top:8px;}
.data-mini-table th{text-align:left;color:var(--fog);font-weight:600;font-size:11px;padding:7px 8px;border-bottom:1px solid var(--graphite);}
.data-mini-table td{padding:9px 8px;border-bottom:1px solid var(--graphite);}

/* modal / drawer / toast */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.55);display:flex;align-items:center;justify-content:center;z-index:100;animation:fadeIn .18s ease;}
.modal-box{background:var(--carbon);border:1px solid var(--graphite);border-radius:14px;padding:24px;width:480px;max-width:92vw;max-height:84vh;overflow-y:auto;animation:riseIn .2s ease;}
.modal-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;}
.modal-title{font-size:16px;font-weight:600;color:var(--paper);}
.close-btn{background:none;border:none;color:var(--fog);padding:4px;border-radius:6px;font-size:16px;}
.close-btn:hover{color:var(--mist);}
.toast-wrap{position:fixed;bottom:22px;right:22px;z-index:200;display:flex;flex-direction:column;gap:8px;}
.toast{background:var(--obsidian);border:1px solid var(--graphite);color:var(--mist);padding:11px 16px;border-radius:10px;font-size:12.5px;font-weight:510;box-shadow:0 12px 28px rgba(0,0,0,.4);animation:riseIn .2s ease;display:flex;align-items:center;gap:8px;}
.toast i{color:var(--lime);}

.form-group{margin-bottom:13px;}
.form-label{font-size:12px;font-weight:510;color:var(--fog);margin-bottom:6px;display:block;}
.form-input,.form-select,.form-textarea{width:100%;padding:9px 11px;border:1px solid var(--graphite);border-radius:6px;font-size:13px;background:rgba(255,255,255,.02);color:var(--mist);}
.form-input:focus,.form-select:focus,.form-textarea:focus{outline:none;border-color:var(--mist);}

.accent-tag{background:rgba(72,147,244,.13);color:var(--blue);font-size:10.5px;font-weight:600;padding:3px 9px;border-radius:4px;display:inline-flex;align-items:center;gap:4px;}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState, useEffect, useRef} = React;
const {LineChart, Line, BarChart, Bar, ResponsiveContainer, Tooltip, XAxis, YAxis, CartesianGrid} = Recharts;

const NAV_ITEMS = [
  { id:'main', label:'재무 관리 및 손익 시각화' },
  { id:'admin', label:'사용자·역할·팀 관리자 콘솔' },
  { id:'sync', label:'외부 스프레드시트 배치 동기화 인터페이스' },
  { id:'infra', label:'클라우드 배포 파이프라인 및 인프라 모니터링' },
];

function Sparkline({data, color='#e4f222'}){
  const w=68,h=26;
  const max=Math.max(...data), min=Math.min(...data);
  const pts = data.map((v,i)=>`${(i/(data.length-1))*w},${h-((v-min)/((max-min)||1))*h}`).join(' ');
  return (
    <svg className="sparkline" viewBox={`0 0 ${w} ${h}`} width={w} height={h}>
      <polyline points={pts} fill="none" stroke={color} strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"/>
    </svg>
  );
}

function Toast({toasts}){
  return (
    <div className="toast-wrap">
      {toasts.map(t=>(<div className="toast" key={t.id}><i className="ph-fill ph-check-circle"></i>{t.msg}</div>))}
    </div>
  );
}

function Modal({title, onClose, children}){
  return (
    <div className="modal-overlay" onClick={onClose}>
      <div className="modal-box" onClick={e=>e.stopPropagation()}>
        <div className="modal-head"><div className="modal-title">{title}</div>
          <button className="close-btn" onClick={onClose}><i className="ph ph-x"></i></button>
        </div>
        {children}
      </div>
    </div>
  );
}

/* ── mock data ── */
const PNL_TREND = [
  {m:'1월',v:4.2},{m:'2월',v:4.6},{m:'3월',v:3.9},{m:'4월',v:5.1},{m:'5월',v:5.8},{m:'6월',v:6.4},
];

const FINANCE_PERIODS = [
  { id:1, label:'2026년 6월', status:'ok', total:'6.4억', delta:'+10.3%' },
  { id:2, label:'2026년 5월', status:'ok', total:'5.8억', delta:'+13.7%' },
  { id:3, label:'2026년 4월', status:'warn', total:'5.1억', delta:'+30.8%' },
  { id:4, label:'2026년 3월', status:'ok', total:'3.9억', delta:'-15.2%' },
  { id:5, label:'2026년 2월', status:'ok', total:'4.6억', delta:'+9.5%' },
];

const LEDGER_ITEMS = [
  { account:'매출 — 임플란트', amount:'2.8억', errors:0 },
  { account:'매출 — 정형용 소재', amount:'2.1억', errors:0 },
  { account:'매출원가', amount:'1.4억', errors:1 },
  { account:'판관비', amount:'0.9억', errors:0 },
];

const ADMIN_REQUESTS = [
  { id:1, name:'서지훈 → 생산팀 팀장', chain:['팀장 승인','경영진 승인'], step:1 },
  { id:2, name:'문가영 → 재무팀 역할 확장', chain:['팀장 승인'], step:0 },
  { id:3, name:'오태양 → 영업팀 신규 가입', chain:['팀장 승인','대표 승인'], step:2 },
  { id:4, name:'한지민 → 품질팀 권한 변경', chain:['경영진 승인'], step:1 },
];

const SYNC_JOBS = [
  { id:1, name:'거래처 마스터 시트', status:'ok', progress:100, retries:0 },
  { id:2, name:'월별 수술 실적 시트', status:'ok', progress:100, retries:1 },
  { id:3, name:'생산 라인 로그 시트', status:'running', progress:64, retries:0 },
  { id:4, name:'재무 원장 보조 시트', status:'err', progress:22, retries:3 },
  { id:5, name:'품질 검사 이력 시트', status:'ok', progress:100, retries:0 },
];

const INFRA_DEPLOYS = [
  { id:1, name:'medicore-api v2.14.0', status:'ok', time:'07.08 09:40' },
  { id:2, name:'medicore-web v3.02.1', status:'ok', time:'07.07 18:12' },
  { id:3, name:'medicore-api v2.13.9', status:'err', time:'07.07 15:03' },
  { id:4, name:'medicore-sync v1.08.0', status:'ok', time:'07.06 11:20' },
];

function StatRow(){
  const stats = [
    { label:'손익 합계 (분기)', value:'16.3억', delta:'+11.2%', up:true, spark:[10,11,12,13,15,16] },
    { label:'정형용 소재 매출 비중', value:'42%', delta:'+3.4%', up:true, spark:[36,38,39,40,41,42] },
    { label:'품질 재검 반영 원가', value:'1.4억', delta:'-0.2억', up:true, spark:[1.8,1.7,1.6,1.5,1.4,1.4] },
    { label:'생산 출하 연동 정산 지연', value:'2건', delta:'-1건', up:false, spark:[5,4,4,3,2,2] },
  ];
  return (
    <section className="stat-row" data-stat-row>
      {stats.map(s=>(
        <div className="stat-card" key={s.label}>
          <div className="stat-label">{s.label}</div>
          <div className="stat-value">{s.value}</div>
          <div className="stat-foot">
            <span className={"stat-delta "+(s.up?'up':'down')}>{s.delta}</span>
            <Sparkline data={s.spark} color={s.up?'#27a644':'#eb5757'}/>
          </div>
        </div>
      ))}
    </section>
  );
}

function FinanceScreen({pushToast}){
  const [tab, setTab] = useState('전체');
  const [selected, setSelected] = useState(FINANCE_PERIODS[0]);
  const [uploading, setUploading] = useState(false);

  const list = FINANCE_PERIODS.filter(p => tab==='전체' || (tab==='주의' && p.status==='warn') || (tab==='정상' && p.status==='ok'));

  const runUpload = () => {
    setUploading(true);
    setTimeout(()=>{ setUploading(false); pushToast('재무제표 엑셀 파싱이 완료되었습니다'); }, 1400);
  };

  return (
    <React.Fragment>
      <div className="hero-floor">
        <div className="hd-label">임플란트 · 정형용 소재 부문 손익 통합</div>
        <div className="hd-value">16.3억</div>
        <div className="hd-sub">생산 출하 실적 · 품질 재검 지표와 연동한 6개 회계 기간 통합 조회 · 전 분기 대비 +11.2%</div>
      </div>
      <StatRow/>
      <div className="tab-bar" role="tablist">
        {['전체','정상','주의'].map(t=>(
          <button key={t} role="tab" className={"tab "+(tab===t?'active':'')} onClick={()=>setTab(t)}>{t}</button>
        ))}
      </div>
      <div className="md-split">
        <div className="list-rail">
          <input className="list-search" placeholder="회계 기간 검색"/>
          {list.map(p=>(
            <div key={p.id} className={"list-item "+(selected.id===p.id?'active':'')} onClick={()=>setSelected(p)}>
              <div className="li-top"><span className="li-name">{p.label}</span><span className={"badge "+(p.status==='ok'?'ok':'warn')}>{p.status==='ok'?'정상':'검토'}</span></div>

                <YAxis tick={{fontSize:11, fill:'#8a8f98'}} axisLine={false} tickLine={false}/>

              {LEDGER_ITEMS.map((l,i)=>(
                <tr key={i}><td>{l.account}</td><td>{l.amount}</td><td>{l.errors>0 ? <span className="badge err">{l.errors}건</span> : <span className="badge ok">없음</span>}</td></tr>

}

function AdminScreen({pushToast}){
  const [tab, setTab] = useState('전체');
  const [selected, setSelected] = useState(ADMIN_REQUESTS[0]);
  const [requests, setRequests] = useState(ADMIN_REQUESTS);

  const advance = () => {
    setRequests(prev=>prev.map(r=>{
      if (r.id!==selected.id) return r;
      const nextStep = Math.min(r.step+1, r.chain.length);
      return {...r, step:nextStep};
    }));
    pushToast('승인 단계가 진행되었습니다');
  };

  const list = requests.filter(r => tab==='전체' || (tab==='대기' && r.step < r.chain.length) || (tab==='완료' && r.step >= r.chain.length));

  return (
    <React.Fragment>
      <div className="tab-bar" role="tablist">
        {['전체','대기','완료'].map(t=>(
          <button key={t} role="tab" className={"tab "+(tab===t?'active':'')} onClick={()=>setTab(t)}>{t}</button>
        ))}
      </div>
      <div className="md-split">
        <div className="list-rail">
          <input className="list-search" placeholder="변경 요청 검색"/>
          {list.map(r=>{
            const done = r.step >= r.chain.length;
            return (
              <div key={r.id} className={"list-item "+(selected.id===r.id?'active':'')} onClick={()=>setSelected(r)}>
                <div className="li-top"><span className="li-name">{r.name}</span><span className={"badge "+(done?'ok':'warn')}>{done?'완료':'대기'}</span></div>
                <div className="li-meta">{r.step}/{r.chain.length} 단계 승인</div>
              </div>
            );
          })}
        </div>
        <div className="detail-panel">
          <div className="detail-head">
            <div><div className="detail-title">{selected.name}</div><div className="detail-sub">권한 매트릭스 및 승인 이력</div></div>
            <button className="btn-primary" onClick={advance} disabled={selected.step>=selected.chain.length}>다음 단계 승인</button>
          </div>
          <div className="section-title">승인자 체인</div>
          <div className="timeline">
            {selected.chain.map((c,i)=>(
              <div className={"timeline-step "+(i<selected.step?'done':i===selected.step?'pending':'')} key={i}>
                <div className="timeline-dot"></div>
                <div className="timeline-title">{c}</div>
                <div className="timeline-desc">{i<selected.step?'승인 완료':i===selected.step?'현재 대기 중':'대기 예정'}</div>
              </div>
            ))}
          </div>
          <div className="section-title">역할별 모듈 접근 범위</div>
          {['경영 요약','재무','생산·품질','보안'].map((m,i)=>(
            <div className="field-row" key={m}>
              <div className="field-label">{m}</div>
              <span className={"badge "+(i%3===0?'ok':'muted')}>{i%3===0?'접근 허용':'미할당'}</span>
            </div>
          ))}
        </div>
      </div>
    </React.Fragment>
  );
}

function SyncScreen({pushToast}){
  const [tab, setTab] = useState('전체');
  const [selected, setSelected] = useState(SYNC_JOBS[0]);

  const list = SYNC_JOBS.filter(j => tab==='전체' || (tab==='실패' && j.status==='err') || (tab==='진행중' && j.status==='running'));

  const retry = () => pushToast(`${selected.name} 재동기화를 큐에 등록했습니다`);

  return (
    <React.Fragment>
      <div className="tab-bar" role="tablist">
        {['전체','진행중','실패'].map(t=>(
          <button key={t} role="tab" className={"tab "+(tab===t?'active':'')} onClick={()=>setTab(t)}>{t}</button>
        ))}
      </div>
      <div className="md-split">
        <div className="list-rail">
          <input className="list-search" placeholder="동기화 작업 검색"/>
          {list.map(j=>(
            <div key={j.id} className={"list-item "+(selected.id===j.id?'active':'')} onClick={()=>setSelected(j)}>
              <div className="li-top"><span className="li-name">{j.name}</span>
                <span className={"badge "+(j.status==='ok'?'ok':j.status==='running'?'warn':'err')}>
                  {j.status==='ok'?'완료':j.status==='running'?'진행중':'실패'}
                </span>
              </div>
              <div className="li-meta">재시도 {j.retries}회</div>
              <div className="progress-track"><div className="progress-fill" style={{width:j.progress+'%'}}></div></div>
            </div>
          ))}
        </div>
        <div className="detail-panel">
          <div className="detail-head">
            <div><div className="detail-title">{selected.name}</div><div className="detail-sub">스키마 매핑 결과 및 재시도 이력</div></div>
            {selected.status==='err' && <button className="btn-primary" onClick={retry}><i className="ph ph-arrow-clockwise"></i>재동기화</button>}
          </div>
          <div className="section-title">스키마 매핑</div>
          <table className="data-mini-table">
            <thead><tr><th>시트 컬럼</th><th>표준 필드</th><th>매핑 상태</th></tr></thead>
            <tbody>
              <tr><td>기관명</td><td>hospital_name</td><td><span className="badge ok">매핑됨</span></td></tr>
              <tr><td>수술건수</td><td>surgery_count</td><td><span className="badge ok">매핑됨</span></td></tr>
              <tr><td>비고</td><td>note</td><td><span className="badge muted">미매핑</span></td></tr>
            </tbody>
          </table>
          <div className="section-title">재시도 이력</div>
          <div className="timeline">
            <div className="timeline-step done"><div className="timeline-dot"></div><div className="timeline-title">1차 시도</div><div className="timeline-desc">07.08 06:00 · 성공</div></div>
            {selected.retries>0 && <div className="timeline-step pending"><div className="timeline-dot"></div><div className="timeline-title">재시도 {selected.retries}회</div><div className="timeline-desc">스키마 불일치로 재시도 큐에 격리됨</div></div>}
          </div>
        </div>
      </div>
    </React.Fragment>
  );
}

              <div>[07:40:02] 무중단 배포 구조 시작 — 이전 컨테이너 유지</div>
              <div>[07:40:14] 신규 컨테이너 헬스체크 대기</div>
              <div style={{color: selected.status==='ok' ? '#27a644':'#eb5757'}}>

      {subTab==='컨테이너' && (

          {[{name:'medicore-api', cpu:62, mem:71},{name:'medicore-web', cpu:38, mem:44},{name:'medicore-worker', cpu:81, mem:69}].map(c=>(
            <div key={c.name} style={{marginBottom:14}}>
              <div className="field-row"><div className="field-label">{c.name}</div><span className="badge ok">정상</span></div>
              <div style={{display:'flex',gap:16,fontSize:11.5,color:'var(--fog)',marginTop:4}}>
                <div style={{flex:1}}>CPU {c.cpu}%<div className="progress-track"><div className="progress-fill" style={{width:c.cpu+'%'}}></div></div></div>
                <div style={{flex:1}}>메모리 {c.mem}%<div className="progress-track"><div className="progress-fill" style={{width:c.mem+'%'}}></div></div></div>

const NOTIFICATIONS = [
  { id:1, text:'재무 원장 보조 시트 동기화 3회 재시도 실패', time:'12분 전' },
  { id:2, text:'medicore-api v2.13.9 배포 실패 — 롤백 완료', time:'40분 전' },
  { id:3, text:'문가영 재무팀 권한 확장 요청 대기 중', time:'1시간 전' },
];

function App(){
  const [screen, setScreen] = useState('main');
  const [toasts, setToasts] = useState([]);
  const [searchOpen, setSearchOpen] = useState(false);
  const [notifOpen, setNotifOpen] = useState(false);
  const [searchQuery, setSearchQuery] = useState('');

  const pushToast = (msg) => {
    const id = Math.random().toString(36).slice(2);
    setToasts(prev=>[...prev, {id, msg}]);
    setTimeout(()=>setToasts(prev=>prev.filter(t=>t.id!==id)), 2600);
  };

  return (
    <div data-archetype="topbar-analytics" className="shell">
      <header className="app-header">
        <div className="brand"><div className="mark"><i className="ph-fill ph-plus" style={{fontSize:14}}></i></div>메디코어</div>
        <div className="project-switcher">확장 관리 콘솔 <i className="ph ph-caret-down"></i></div>
        <nav className="global-nav">
          {NAV_ITEMS.map(item=>(
            <button key={item.id} className={"nav-link "+(screen===item.id?'active':'')} onClick={()=>setScreen(item.id)}>{item.label}</button>
          ))}
        </nav>
        <div className="header-actions">
          <button className="icon-btn" onClick={()=>setSearchOpen(true)}><i className="ph ph-magnifying-glass"></i></button>
          <button className="icon-btn" onClick={()=>setNotifOpen(true)}><i className="ph ph-bell"></i></button>
          <div className="avatar-chip"><img src="https://source.boringavatars.com/beam/56/hanjimin?colors=e4f222,4893f4,23252a,0f1011" width="28" height="28" alt=""/></div>
        </div>
      </header>

      <div className="content">
        <div className="page-head">
          <div>
            <h1 className="page-title">
              {screen==='main' && '재무 관리 및 손익 시각화'}
              {screen==='admin' && '사용자·역할·팀 관리자 콘솔'}
              {screen==='sync' && '외부 스프레드시트 배치 동기화'}
              {screen==='infra' && '클라우드 배포 파이프라인 및 인프라 모니터링'}
            </h1>
            <div className="page-sub">MVP 이후 조직 확장을 지원하는 리스트-상세 통합 콘솔</div>
          </div>
          <div className="page-actions">
            <span className="accent-tag"><i className="ph ph-circle-wavy-check"></i>Production</span>
          </div>
        </div>

        {screen==='main' && <FinanceScreen pushToast={pushToast}/>}
        {screen==='admin' && <AdminScreen pushToast={pushToast}/>}
        {screen==='sync' && <SyncScreen pushToast={pushToast}/>}
        {screen==='infra' && <InfraScreen pushToast={pushToast}/>}
      </div>

      {searchOpen && (
        <Modal title="전체 검색" onClose={()=>setSearchOpen(false)}>
          <input className="form-input" autoFocus placeholder="회계 기간·요청·동기화 작업·배포 검색" value={searchQuery} onChange={e=>setSearchQuery(e.target.value)}/>
          <div style={{marginTop:14,fontSize:12,color:'var(--fog)'}}>
            {searchQuery ? `"${searchQuery}"에 대한 검색 결과가 없습니다.` : '검색어를 입력하면 재무·관리자·동기화·인프라 전체에서 조회합니다.'}
          </div>
        </Modal>
      )}

      {notifOpen && (
        <Modal title="알림" onClose={()=>setNotifOpen(false)}>
          {NOTIFICATIONS.map(n=>(
            <div className="field-row" key={n.id}>
              <div className="field-label" style={{fontWeight:510}}>{n.text}</div>
              <div className="field-desc" style={{flexShrink:0,marginLeft:12}}>{n.time}</div>
            </div>
          ))}
        </Modal>
      )}

      <Toast toasts={toasts}/>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
