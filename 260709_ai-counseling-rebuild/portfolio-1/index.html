<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI 입시상담 재구축 관제 콘솔 — 맞춤 구현 데모</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css">
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<style>
  :root {
    --forest: #0f3e17;
    --sage: #b1dbb8;
    --mist-blue: #b6ced5;
    --mint-veil: #cfe7d3;
    --linen-green: #e1f4df;
    --bg: #fffefc;
    --hairline: #e5e7eb;
    --charcoal: #222222;
    --graphite: #445044;
    --accent: #a53ad9;
    --text: #10190f;
    --danger: #c23b3b;
    --warn: #b8860f;
    --ok: #1f7a3d;

    --r-nav: 7px;
    --r-card: 14px;
    --r-pill: 999px;

    --sp-4: 4px; --sp-7: 7px; --sp-9: 9px; --sp-11: 11px; --sp-14: 14px;
    --sp-18: 18px; --sp-21: 21px; --sp-28: 28px; --sp-35: 35px; --sp-42: 42px;
    --sp-56: 56px; --sp-70: 70px;
  }
  * { box-sizing: border-box; }
  html, body { width: 100%; margin: 0; padding: 0; }
  body {
    font-family: 'Pretendard', ui-sans-serif, system-ui, -apple-system, sans-serif;
    background: var(--bg);
    color: var(--text);
    -webkit-font-smoothing: antialiased;
  }
  #root { width: 100%; }
  button { font-family: inherit; cursor: pointer; border: none; background: none; color: inherit; }
  a { color: inherit; text-decoration: none; }
  input, textarea, select { font-family: inherit; }

  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  @keyframes cmdkIn { from { opacity: 0; transform: translateY(-12px) scale(0.98); } to { opacity: 1; transform: translateY(0) scale(1); } }
  @keyframes pulseGlow { 0%, 100% { box-shadow: 0 0 0 0 rgba(15,62,23,0.35); } 50% { box-shadow: 0 0 0 6px rgba(15,62,23,0); } }
  @keyframes typingBounce { 0%, 60%, 100% { transform: translateY(0); opacity: .5; } 30% { transform: translateY(-4px); opacity: 1; } }
  @keyframes slideUpFade { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes toastIn { from { opacity: 0; transform: translateX(24px); } to { opacity: 1; transform: translateX(0); } }
  @keyframes ringGrow { from { stroke-dashoffset: 251; } to { stroke-dashoffset: var(--ring-offset, 60); } }

  .app-shell { display: flex; width: 100%; min-height: 100vh; }

  /* ===== Sidebar ===== */
  .sidebar {
    position: fixed; left: 0; top: 0; bottom: 0; width: 260px;
    background: var(--bg); border-right: 1px solid var(--hairline);
    display: flex; flex-direction: column; z-index: 40;
  }
  .sidebar-brand {
    height: 64px; display: flex; align-items: center; gap: var(--sp-9);
    padding: 0 var(--sp-18); border-bottom: 1px solid var(--hairline);
  }
  .sidebar-brand .mark {
    width: 28px; height: 28px; border-radius: var(--r-nav); background: var(--forest);
    display: flex; align-items: center; justify-content: center; color: var(--bg);
  }
  .sidebar-brand .name { font-weight: 600; font-size: 14px; color: var(--forest); }
  .sidebar-cmdk-hint {
    margin: var(--sp-14) var(--sp-18) 0; padding: var(--sp-9) var(--sp-11);
    background: var(--linen-green); border-radius: var(--r-nav);

  }
  .sidebar-cmdk-hint:hover { background: var(--mint-veil); }
  .kbd {
    font-size: 11px; padding: 2px 6px; border-radius: 4px;
    background: var(--bg); border: 1px solid var(--hairline); color: var(--charcoal);
  }
  .sidebar-nav { padding: var(--sp-18) var(--sp-14) 0; display: flex; flex-direction: column; gap: 2px; }
  .sidebar-section-title {
    font-size: 11px; letter-spacing: 0.04em; text-transform: uppercase; color: #8a978c;
    padding: var(--sp-18) var(--sp-11) var(--sp-7);
  }
  .sidebar-link {
    display: flex; align-items: center; gap: var(--sp-11);
    padding: var(--sp-9) var(--sp-11); border-radius: var(--r-nav);
    font-size: 14px; color: var(--charcoal); position: relative;
    transition: background 120ms ease-out, color 120ms ease-out;
  }
  .sidebar-link svg { width: 17px; height: 17px; flex-shrink: 0; }
  .sidebar-link:hover { background: var(--linen-green); }
  .sidebar-link.active { background: var(--sage); color: var(--forest); font-weight: 600; }
  .sidebar-link.active::before {
    content: ''; position: absolute; left: -14px; top: 50%; transform: translateY(-50%);
    width: 4px; height: 18px; border-radius: 2px; background: var(--forest);
  }
  .sidebar-history { margin-top: var(--sp-21); padding: 0 var(--sp-14); }
  .sidebar-history-item {
    display: block; width: 100%; text-align: left; padding: var(--sp-7) var(--sp-11);
    border-radius: var(--r-nav); font-size: 12.5px; color: var(--graphite);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .sidebar-history-item:hover { background: var(--linen-green); color: var(--forest); }
  .sidebar-user {
    margin-top: auto; padding: var(--sp-14) var(--sp-18); border-top: 1px solid var(--hairline);

  .avatar-dot {
    width: 28px; height: 28px; border-radius: 50%; background: var(--mist-blue);

  }
  .sidebar-user .who { font-size: 13px; font-weight: 600; color: var(--charcoal); }
  .sidebar-user .role { font-size: 11.5px; color: #8a978c; }

  /* ===== Main ===== */
  .main-wrap { margin-left: 260px; flex: 1; min-width: 0; width: calc(100% - 260px); min-height: 100vh; display: flex; flex-direction: column; }
  .topbar {
    height: 56px; display: flex; align-items: center; justify-content: space-between;
    padding: 0 var(--sp-28); border-bottom: 1px solid var(--hairline); background: var(--bg);
    position: sticky; top: 0; z-index: 20;
  }
  .breadcrumb { display: flex; align-items: center; gap: var(--sp-7); font-size: 13px; color: #8a978c; }
  .breadcrumb .current { color: var(--charcoal); font-weight: 600; }
  .breadcrumb .divider { color: #c7d0c8; }
  .topbar-actions { display: flex; align-items: center; gap: var(--sp-11); }
  .btn-cmdk {
    display: flex; align-items: center; gap: var(--sp-7);
    padding: var(--sp-7) var(--sp-11); border: 1px solid var(--hairline); border-radius: var(--r-nav);
    font-size: 12.5px; color: var(--graphite); background: var(--bg);
  }
  .btn-cmdk:hover { border-color: var(--forest); }
  .btn-primary {
    display: flex; align-items: center; gap: var(--sp-7);
    padding: var(--sp-9) var(--sp-18); border-radius: 999px;
    background: var(--forest); color: var(--bg); font-size: 13.5px; font-weight: 600;
    transition: transform 120ms ease-out, opacity 120ms ease-out;
  }
  .btn-primary:hover { transform: translateY(-1px); opacity: 0.92; }
  .btn-primary svg { width: 15px; height: 15px; }
  .btn-ghost {
    padding: var(--sp-9) var(--sp-14); border-radius: var(--r-pill); border: 1px solid var(--hairline);
    font-size: 13px; color: var(--charcoal); background: var(--bg); display: flex; align-items: center; gap: 6px;
  }
  .btn-ghost:hover { border-color: var(--forest); color: var(--forest); }
  .btn-ghost.active { background: var(--forest); color: var(--bg); border-color: var(--forest); }

  .content { padding: var(--sp-28); flex: 1; width: 100%; animation: fadeIn 220ms ease-out; }
  .page-title { font-size: 40px; font-weight: 300; letter-spacing: -0.4px; color: var(--forest); margin: 0 0 4px; line-height: 1.2; }
  .page-sub { font-size: 14px; color: var(--graphite); margin: 0 0 var(--sp-21); }

  /* status strip */
  .status-strip {
    display: flex; align-items: center; gap: 0; background: var(--linen-green);
    border-radius: var(--r-card); padding: var(--sp-14) var(--sp-21); margin-bottom: var(--sp-21);
    flex-wrap: wrap; row-gap: var(--sp-11);
  }
  .status-item { display: flex; align-items: center; gap: var(--sp-9); padding: 0 var(--sp-21); border-right: 1px solid #c9dfc9; }
  .status-item:last-child { border-right: none; }
  .status-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--ok); animation: pulseGlow 2.4s ease-in-out infinite; }
  .status-item .label { font-size: 11.5px; color: var(--graphite); }
  .status-item .value { font-size: 16px; font-weight: 700; color: var(--forest); }

  .command-tower { display: grid; grid-template-columns: 1fr 320px; gap: var(--sp-21); align-items: start; }
  .secondary-row { grid-column: 1 / -1; display: grid; grid-template-columns: repeat(3, 1fr); gap: var(--sp-21); margin-top: var(--sp-21); }

  .card {
    background: var(--bg); border: 1px solid var(--hairline); border-radius: var(--r-card);
    padding: var(--sp-21); transition: border-color 150ms ease-out, transform 150ms ease-out;
  }
  .card:hover { border-color: var(--sage); }
  .card-title { font-size: 15px; font-weight: 700; color: var(--forest); margin: 0 0 var(--sp-11); display: flex; align-items: center; gap: var(--sp-7); }
  .card-title svg { width: 17px; height: 17px; }

  /* chat panel */
  .chat-panel { display: flex; flex-direction: column; height: 560px; }
  .chat-scroll { flex: 1; overflow-y: auto; padding-right: 4px; display: flex; flex-direction: column; gap: var(--sp-14); }
  .msg { max-width: 82%; animation: slideUpFade 220ms ease-out; }
  .msg.user { align-self: flex-end; }
  .msg.assistant { align-self: flex-start; }
  .msg-bubble { padding: var(--sp-11) var(--sp-14); border-radius: var(--r-card); font-size: 14px; line-height: 1.55; }
  .msg.user .msg-bubble { background: var(--forest); color: var(--bg); border-bottom-right-radius: 4px; }
  .msg.assistant .msg-bubble { background: var(--linen-green); color: var(--text); border-bottom-left-radius: 4px; }
  .cite {
    display: inline-flex; align-items: center; justify-content: center; width: 16px; height: 16px;
    border-radius: 50%; background: var(--forest); color: var(--bg); font-size: 10px; font-weight: 700;
    margin: 0 2px; vertical-align: middle; transition: transform 120ms ease-out;
  }
  .cite:hover { transform: scale(1.25); }
  .msg-meta { display: flex; align-items: center; gap: var(--sp-7); margin-top: 5px; font-size: 11px; }
  .conf-badge { padding: 2px 8px; border-radius: var(--r-pill); font-weight: 700; font-size: 10.5px; }
  .conf-badge.high { background: var(--sage); color: var(--forest); }
  .conf-badge.mid { background: #fbe8b8; color: var(--warn); }
  .conf-badge.low { background: #f6d3d3; color: var(--danger); }
  .typing-row { display: flex; gap: 4px; align-items: center; padding: var(--sp-9) 0; }
  .typing-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--forest); animation: typingBounce 1.1s infinite; }
  .typing-dot:nth-child(2) { animation-delay: 0.15s; }
  .typing-dot:nth-child(3) { animation-delay: 0.3s; }
  .chat-input-row { display: flex; gap: var(--sp-9); margin-top: var(--sp-14); }
  .chat-input {
    flex: 1; padding: var(--sp-11) var(--sp-14); border: 1px solid var(--hairline); border-radius: var(--r-pill);
    font-size: 14px; outline: none; transition: border-color 120ms ease-out;
  }
  .chat-input:focus { border-color: var(--forest); }
  .btn-send {
    width: 40px; height: 40px; border-radius: 50%; background: var(--forest); color: var(--bg);
    display: flex; align-items: center; justify-content: center; flex-shrink: 0;
  }
  .btn-send svg { width: 17px; height: 17px; }

  /* priority rail */
  .priority-rail { display: flex; flex-direction: column; gap: var(--sp-11); }
  .priority-item {
    padding: var(--sp-14); border: 1px solid var(--hairline); border-radius: var(--r-card);
    display: flex; flex-direction: column; gap: 6px; animation: slideUpFade 220ms ease-out;
  }
  .priority-item.urgent { border-left: 3px solid var(--accent); }
  .priority-item:hover { border-color: var(--forest); }
  .priority-top { display: flex; justify-content: space-between; align-items: center; }
  .priority-score { font-size: 11px; font-weight: 700; color: var(--accent); }
  .priority-q { font-size: 12.5px; color: var(--text); line-height: 1.4; }
  .priority-meta { font-size: 10.5px; color: #8a978c; }
  .empty-rail { text-align: center; padding: var(--sp-28) var(--sp-14); color: #8a978c; font-size: 12.5px; }

  /* secondary widgets */
  .donut-wrap { display: flex; align-items: center; gap: var(--sp-18); }
  .donut-legend { display: flex; flex-direction: column; gap: 6px; font-size: 11.5px; }
  .legend-row { display: flex; align-items: center; gap: 6px; }
  .legend-dot { width: 8px; height: 8px; border-radius: 2px; }
  .progress-track { width: 100%; height: 8px; border-radius: var(--r-pill); background: var(--linen-green); overflow: hidden; margin-top: 6px; }
  .progress-fill { height: 100%; border-radius: var(--r-pill); background: var(--forest); transition: width 600ms ease-out; }
  .mini-stat-list { display: flex; flex-direction: column; gap: var(--sp-9); }
  .mini-stat-row { display: flex; justify-content: space-between; font-size: 12.5px; }
  .mini-stat-row .k { color: var(--graphite); }
  .mini-stat-row .v { font-weight: 700; color: var(--forest); }

  /* generic list / table pages */
  .filter-tabs { display: flex; gap: var(--sp-7); margin-bottom: var(--sp-18); }
  .list-card { display: flex; flex-direction: column; gap: var(--sp-11); }
  .list-row {
    display: flex; align-items: center; justify-content: space-between; padding: var(--sp-14);
    border: 1px solid var(--hairline); border-radius: var(--r-card); transition: border-color 120ms ease-out, transform 120ms ease-out;
  }
  .list-row:hover { border-color: var(--forest); transform: translateY(-1px); }
  .list-row-main { display: flex; align-items: center; gap: var(--sp-14); }
  .list-row-icon { width: 36px; height: 36px; border-radius: var(--r-nav); background: var(--linen-green); display: flex; align-items: center; justify-content: center; color: var(--forest); flex-shrink: 0; }
  .list-row-icon svg { width: 18px; height: 18px; }
  .list-row-title { font-size: 14px; font-weight: 600; color: var(--text); }
  .list-row-sub { font-size: 12px; color: var(--graphite); margin-top: 2px; }
  .badge { padding: 3px 10px; border-radius: var(--r-pill); font-size: 11px; font-weight: 700; }
  .badge.ok { background: var(--sage); color: var(--forest); }
  .badge.warn { background: #fbe8b8; color: var(--warn); }
  .badge.fail { background: #f6d3d3; color: var(--danger); }
  .badge.pending { background: var(--mist-blue); color: var(--charcoal); }

  .score-ring-wrap { display: flex; align-items: center; gap: var(--sp-28); }
  .score-ring-label { font-size: 12.5px; color: var(--graphite); }
  .score-ring-value { font-size: 32px; font-weight: 700; color: var(--forest); }

  .warning-banner {
    display: flex; align-items: center; gap: var(--sp-11); padding: var(--sp-14) var(--sp-18);
    background: #fbe8b8; border-radius: var(--r-card); margin-bottom: var(--sp-18); color: #7a5a06; font-size: 13px;
  }

  .diff-block { font-family: ui-monospace, monospace; font-size: 12px; background: var(--linen-green); border-radius: var(--r-nav); padding: var(--sp-14); line-height: 1.7; overflow-x: auto; }
  .diff-add { color: var(--ok); }
  .diff-del { color: var(--danger); text-decoration: line-through; opacity: 0.7; }

  .trace-tree { font-size: 13px; }
  .trace-node { padding: var(--sp-9) var(--sp-11); border-radius: var(--r-nav); border: 1px solid transparent; }
  .trace-node:hover { background: var(--linen-green); }
  .trace-node.expandable { cursor: pointer; }
  .trace-children { margin-left: 22px; border-left: 1px dashed var(--hairline); padding-left: var(--sp-14); }
  .log-level-chip { padding: 3px 10px; border-radius: var(--r-pill); font-size: 11px; border: 1px solid var(--hairline); }
  .log-level-chip.active.INFO { background: var(--mist-blue); border-color: var(--mist-blue); }
  .log-level-chip.active.WARN { background: #fbe8b8; border-color: #fbe8b8; }
  .log-level-chip.active.ERROR { background: #f6d3d3; border-color: #f6d3d3; }

  /* modal */
  .modal-overlay {
    position: fixed; inset: 0; background: rgba(15,62,23,0.35); display: flex; align-items: center; justify-content: center;
    z-index: 100; animation: fadeIn 160ms ease-out;
  }
  .modal-box {
    width: 480px; max-width: 92vw; max-height: 84vh; overflow-y: auto; background: var(--bg);
    border-radius: var(--r-card); padding: var(--sp-28); animation: slideUpFade 200ms ease-out; border: 1px solid var(--hairline);
  }
  .modal-close { position: absolute; top: var(--sp-18); right: var(--sp-18); width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; }
  .modal-close:hover { background: var(--linen-green); }
  .modal-box { position: relative; }
  .modal-title { font-size: 20px; font-weight: 700; color: var(--forest); margin: 0 0 var(--sp-14); }
  .field-row { display: flex; justify-content: space-between; padding: var(--sp-9) 0; border-bottom: 1px solid var(--hairline); font-size: 13px; }
  .field-row .k { color: var(--graphite); }
  .field-row .v { font-weight: 600; }
  .modal-actions { display: flex; gap: var(--sp-9); margin-top: var(--sp-21); }

  /* cmd-k */
  .cmdk-overlay { position: fixed; inset: 0; background: rgba(15,25,15,0.4); display: flex; align-items: flex-start; justify-content: center; padding-top: 12vh; z-index: 200; animation: fadeIn 140ms ease-out; }
  .cmdk-modal { width: 560px; max-width: 90vw; background: var(--bg); border-radius: var(--r-card); border: 1px solid var(--hairline); animation: cmdkIn 180ms ease-out; overflow: hidden; }
  .cmdk-input { width: 100%; padding: var(--sp-18); border: none; border-bottom: 1px solid var(--hairline); font-size: 16px; outline: none; }
  .cmdk-results { padding: var(--sp-9); max-height: 340px; overflow-y: auto; }
  .cmdk-group-title { font-size: 11px; color: #8a978c; padding: var(--sp-9) var(--sp-11) 4px; text-transform: uppercase; letter-spacing: 0.04em; }
  .cmdk-item { display: flex; align-items: center; justify-content: space-between; padding: var(--sp-9) var(--sp-11); border-radius: var(--r-nav); font-size: 13.5px; }
  .cmdk-item:hover { background: var(--linen-green); }

  /* toast */
  .toast-wrap { position: fixed; bottom: var(--sp-28); right: var(--sp-28); display: flex; flex-direction: column; gap: var(--sp-9); z-index: 300; }
  .toast { padding: var(--sp-11) var(--sp-18); background: var(--forest); color: var(--bg); border-radius: var(--r-nav); font-size: 13px; display: flex; align-items: center; gap: var(--sp-9); animation: toastIn 220ms ease-out; }

  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-thumb { background: var(--hairline); border-radius: 4px; }
</style>
</head>

<div id="root"></div>
<script type="text/babel">

const NAV_ITEMS = [
  { key: 'main', label: 'AI 상담 대시보드', short: 'AI 상담 대시보드', title: 'AI 상담 챗봇·출처 인용 뷰어', icon: 'message-circle' },

  { key: 'pgvector-audit', label: 'pgvector 정합성 검증 대시보드', short: 'pgvector 정합성', title: 'pgvector 정합성 검증 대시보드', icon: 'radar' },
  { key: 'logging', label: '구조적 로깅·요청 추적 뷰어', short: '로깅·추적', title: '구조적 로깅·요청 추적 뷰어', icon: 'terminal' },
];

function ChatPanel({ onLowConfidence, pushToast }) {
  const [messages, setMessages] = useState([
    { role: 'assistant', text: '안녕하세요, 대학입시 AI 상담입니다. 전형·모집요강·자소서 등 무엇이든 물어보세요.', confidence: null, cite: null },
  ]);
  const [input, setInput] = useState('');
  const [typing, setTyping] = useState(false);
  const [activeCite, setActiveCite] = useState(null);
  const [round, setRound] = useState(0);
  const scrollRef = useRef(null);

  useEffect(() => {
    if (scrollRef.current) scrollRef.current.scrollTop = scrollRef.current.scrollHeight;
  }, [messages, typing]);

  function send(presetIndex) {
    const preset = CANNED_RESPONSES[presetIndex % CANNED_RESPONSES.length];
    const userText = input.trim() || preset.q;
    setMessages(m => [...m, { role: 'user', text: userText }]);
    setInput('');
    setTyping(true);
    setTimeout(() => {
      setTyping(false);
      setMessages(m => [...m, { role: 'assistant', text: preset.a, confidence: preset.confidence, cite: preset.citeText }]);
      setRound(r => r + 1);
      if (preset.confidence < 60) {
        onLowConfidence(preset);
        pushToast('신뢰도 미달 응답이 재검토 큐에 자동 등록되었습니다');
      }
    }, 900);
  }

  function handleSend() {
    if (!input.trim()) { send(round); return; }
    send(round);
  }

  return (
    <div className="card chat-panel">
      <div className="card-title"><i data-lucide="sparkles"></i>AI 상담 챗봇 · 출처 인용 뷰어</div>
      <div className="chat-scroll" ref={scrollRef}>
        {messages.map((m, i) => (
          <div key={i} className={"msg " + m.role}>
            <div className="msg-bubble">
              {m.text}
              {m.cite && <span className="cite" onClick={() => setActiveCite(activeCite === i ? null : i)}>1</span>}
            </div>
            {m.confidence != null && (
              <div className="msg-meta">
                <ConfBadge score={m.confidence} />
              </div>
            )}
            {activeCite === i && (
              <div style={{marginTop: '8px', padding: '10px 12px', background: 'var(--mist-blue)', borderRadius: 'var(--r-nav)', fontSize: '12px', color: 'var(--charcoal)'}}>
                <i data-lucide="quote"></i> {m.cite}
              </div>
            )}
          </div>
        ))}
        {typing && (
          <div className="msg assistant">
            <div className="msg-bubble typing-row">
              <span className="typing-dot"></span><span className="typing-dot"></span><span className="typing-dot"></span>
            </div>
          </div>
        )}
      </div>
      <div className="chat-input-row">
        <input
          className="chat-input"
          placeholder="입시 관련 질문을 입력하세요"
          value={input}
          onChange={e => setInput(e.target.value)}
          onKeyDown={e => { if (e.key === 'Enter') handleSend(); }}
        />
        <button className="btn-send" onClick={handleSend} title="전송"><i data-lucide="send"></i></button>
      </div>
    </div>
  );
}

        <div className="field-row"><span className="k">근거 매칭</span><span className="v">{item.citeText}</span></div>
        <div className="modal-actions">
          <button className="btn-primary" onClick={() => { onResolve(item); onClose(); }}><i data-lucide="check"></i> 검토 완료</button>
          <button className="btn-ghost" onClick={onClose}>닫기</button>
        </div>
      </div>
    </div>
  );
}

function MigrationModal({ item, onClose, pushToast }) {
  const [dryRunDone, setDryRunDone] = useState(false);
  useEffect(() => { setDryRunDone(false); }, [item]);
  if (!item) return null;
  function runDryRun() {
    setDryRunDone(true);
    pushToast('롤백 dry-run이 완료되었습니다 — 실제 데이터 변경 없음');
  }
  return (
    <div className="modal-overlay" onClick={onClose}>
      <div className="modal-box" onClick={e => e.stopPropagation()}>
        <button className="modal-close" onClick={onClose}><i data-lucide="x"></i></button>
        <h3 className="modal-title">{item.id} · {item.name}</h3>
        <div className="field-row"><span className="k">상태</span><span className="v">{item.status==='ok'?'적용 완료':item.status==='fail'?'적용 실패':'대기 중'}</span></div>
        <div className="field-row"><span className="k">적용 시각</span><span className="v">{item.ts}</span></div>
        <div className="field-row"><span className="k">롤백 가능 여부</span><span className="v">{item.rollback}</span></div>
        <p style={{fontSize:'12.5px', color:'var(--graphite)', margin:'16px 0 8px'}}>RLS 정책 변경분 (dry-run)</p>
        <div className="diff-block">
          <div className="diff-del">- POLICY "counsel_read" USING (user_id = auth.uid())</div>
          <div className="diff-add">+ POLICY "counsel_read" USING (user_id = auth.uid() AND deleted_at IS NULL)</div>
        </div>
        {dryRunDone && (
          <div className="diff-block" style={{marginTop:'10px'}}>
            <div className="diff-add">✓ dry-run 결과: 정책 충돌 없음, 영향 행 0건 (실제 적용 아님)</div>
          </div>
        )}
        <div className="modal-actions">
          <button className="btn-primary" onClick={runDryRun}><i data-lucide="play"></i> 롤백 dry-run 실행</button>
          <button className="btn-ghost" onClick={onClose}>닫기</button>
        </div>
      </div>
    </div>
  );
}

function App() {
  const [screen, setScreen] = useState('main');
  const [cmdkOpen, setCmdkOpen] = useState(false);
  const [queue, setQueue] = useState([
    { q: '조기졸업 대상자도 학생부종합전형 지원이 가능한가요?', confidence: 44, citeText: '근거 문서 신뢰도 44% — 재확인 필요', id: 1 },
  ]);
  const [priorityModal, setPriorityModal] = useState(null);
  const [migrationModal, setMigrationModal] = useState(null);
  const [toasts, setToasts] = useState([]);

  useEffect(() => { if (window.lucide) window.lucide.createIcons(); });

  useEffect(() => {
    function onKey(e) {
      if ((e.metaKey || e.ctrlKey) && e.key.toLowerCase() === 'k') { e.preventDefault(); setCmdkOpen(true); }
    }
    window.addEventListener('keydown', onKey);
    return () => window.removeEventListener('keydown', onKey);
  }, []);

  function pushToast(text) {
    const id = Date.now();
    setToasts(t => [...t, { id, text }]);
    setTimeout(() => setToasts(t => t.filter(x => x.id !== id)), 3200);
  }

  function resolveQueueItem(item) {
    setQueue(q => q.filter(x => x !== item));
    pushToast('재검토 항목이 처리되었습니다');
  }

  const activeNav = NAV_ITEMS.find(n => n.key === screen);

  return (
    <div className="app-shell" data-archetype="linear-sidebar-cmdk">
      <aside className="sidebar">
        <div className="sidebar-brand">
          <div className="mark"><i data-lucide="shield-check" style={{width:'15px', height:'15px'}}></i></div>
          <div className="name">입시상담 관제</div>
        </div>
        <div className="sidebar-cmdk-hint" onClick={() => setCmdkOpen(true)}>
          <span>빠른 이동 검색</span>
          <span className="kbd">⌘K</span>
        </div>
        <nav className="sidebar-nav">
          <div className="sidebar-section-title">운영 콘솔</div>
          {NAV_ITEMS.map(item => (
            <a key={item.key} className={"sidebar-link " + (screen === item.key ? 'active' : '')}
               title={item.title} onClick={() => setScreen(item.key)}>
              <i data-lucide={item.icon}></i>{item.label}
            </a>
          ))}
        </nav>
        <div className="sidebar-history">
          <div className="sidebar-section-title">최근 상담</div>
          {HISTORY.map((h, i) => <button key={i} className="sidebar-history-item" title={h} onClick={() => pushToast('최근 상담 불러오기: ' + h)}>{h}</button>)}
        </div>
        <div className="sidebar-user">
          <div className="avatar-dot">김민</div>
          <div>
            <div className="who">김민수 상담사</div>
            <div className="role">운영 관리자</div>
          </div>
        </div>
      </aside>

      <div className="main-wrap">
        <header className="topbar">
          <nav className="breadcrumb">
            <span>입시상담 관제</span><span className="divider">/</span><span className="current">{activeNav?.short}</span>
          </nav>
          <div className="topbar-actions">
            <button className="btn-cmdk" onClick={() => setCmdkOpen(true)}><i data-lucide="search" style={{width:'14px'}}></i>검색<span className="kbd">⌘K</span></button>
            <button className="btn-primary" onClick={() => pushToast('새 상담 세션을 시작합니다')}><i data-lucide="plus"></i>새 상담 시작</button>
          </div>
        </header>

        {screen === 'main' && <MainScreen queue={queue} setQueue={setQueue} pushToast={pushToast} openPriorityModal={setPriorityModal} />}
        {screen === 'migration' && <MigrationScreen openModal={setMigrationModal} />}
        {screen === 'pgvector-audit' && <PgvectorScreen pushToast={pushToast} />}
        {screen === 'logging' && <LoggingScreen />}
      </div>

      {cmdkOpen && <CmdK onClose={() => setCmdkOpen(false)} onNavigate={setScreen} />}
      <PriorityModal item={priorityModal} onClose={() => setPriorityModal(null)} onResolve={resolveQueueItem} />
      <MigrationModal item={migrationModal} onClose={() => setMigrationModal(null)} pushToast={pushToast} />

      <div className="toast-wrap">
        {toasts.map(t => <div key={t.id} className="toast"><i data-lucide="check-circle"></i>{t.text}</div>)}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
