    --coral: #eb5757;
    --blue: #4893f4;

    --r-badge: 4px;

  input { font-family: inherit; }

  .matrix-table { width: 100%; border-collapse: collapse; font-size: 13px; }
  .matrix-table th { text-align: left; padding: 10px 12px; color: var(--fog); font-weight: 510; font-size: 11.5px; text-transform: uppercase; letter-spacing: 0.04em; border-bottom: 0.5px solid var(--graphite); }
  .matrix-table td { padding: 12px; border-bottom: 0.5px solid var(--graphite); color: var(--mist); }
  .matrix-table tr:hover td { background: rgba(255,255,255,0.02); cursor: pointer; }
  .matrix-cell-bar { width: 80px; height: 6px; border-radius: 3px; background: var(--graphite); overflow: hidden; display: inline-block; vertical-align: middle; margin-left: 8px; }

  .modal-box { width: 480px; max-width: 92vw; max-height: 84vh; overflow-y: auto; background: var(--obsidian); border: 0.5px solid var(--graphite); border-radius: var(--r-card); padding: var(--sp-24); position: relative; animation: dropIn 200ms ease-out; }

  .field-row { display: flex; justify-content: space-between; padding: 9px 0; border-bottom: 0.5px solid var(--graphite); font-size: 13px; }

  .modal-actions { display: flex; gap: 10px; margin-top: 20px; }

function Sparkline({ points, color }) {
  const w = 100, h = 28;
  const max = Math.max(...points), min = Math.min(...points);
  const path = points.map((p, i) => {
    const x = (i / (points.length - 1)) * w;
    const y = h - ((p - min) / (max - min || 1)) * h;
    return (i === 0 ? 'M' : 'L') + x.toFixed(1) + ',' + y.toFixed(1);
  }).join(' ');
  return (
    <svg className="sparkline" width={w} height={h} viewBox={`0 0 ${w} ${h}`}>
      <path d={path} fill="none" stroke={color} strokeWidth="1.6" strokeLinecap="round" strokeLinejoin="round" />
    </svg>
  );
}

function HeroChart() {
  const canvasRef = useRef(null);
  const chartRef = useRef(null);
  useEffect(() => {
    const ctx = canvasRef.current.getContext('2d');
    if (chartRef.current) chartRef.current.destroy();
    chartRef.current = new Chart(ctx, {
      type: 'bar',
      data: {
        labels: ['0-1점','1-2점','2-3점','3-4점','4-5점'],
        datasets: [{
          label: '골든셋 채점 분포 (회차 #128)',
          data: [2, 5, 14, 38, 61],
          backgroundColor: ['#eb5757','#eb5757','#e4f222','#27a644','#27a644'],
          borderRadius: 4,
          barThickness: 44,
        }]
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        plugins: { legend: { display: false } },
        scales: {
          x: { grid: { display: false }, ticks: { color: '#8a8f98', font: { size: 11 } } },
          y: { grid: { color: '#23252a' }, ticks: { color: '#8a8f98', font: { size: 11 } } }
        }
      }
    });
    return () => { if (chartRef.current) chartRef.current.destroy(); };
  }, []);
  return <div className="hero-chart-wrap"><canvas ref={canvasRef}></canvas></div>;
}

function MainScreen({ statusFilter, openTest }) {

  const avgScore = (TEST_CASES.reduce((s, t) => s + t.score, 0) / TEST_CASES.length).toFixed(1);
  return (
    <div className="content">
      <h1 className="page-title">AI 품질 평가 하네스</h1>
      <p className="page-sub">골든셋 회귀 테스트 결과와 LLM 심판관 채점을 CI 게이트 기준과 함께 확인합니다</p>
      <div className="hero-floor">
        <svg viewBox="0 0 1200 96" preserveAspectRatio="none">
          <path d="M0,70 C150,20 300,90 450,50 C600,10 750,80 900,40 C1050,10 1150,60 1200,30" fill="none" stroke="#e4f222" strokeWidth="1.5" opacity="0.5"/>

          <div className="card-title"><i className="ph ph-chart-bar"></i>회차별 채점 점수 분포 <span className="gate-badge pass" style={{marginLeft:'auto'}}><i className="ph ph-check-circle"></i>CI 게이트 통과</span></div>

          <div className="stat-card">
            <div className="stat-label">회귀 실패율</div>
            <div className="stat-value">3.1%</div>
            <div className="stat-delta down"><i className="ph ph-arrow-down"></i> 지난 회차 대비 낮음</div>
          </div>
          <div className="stat-card">
            <div className="stat-label">골든셋 케이스 수</div>
            <div className="stat-value">248개</div>
            <div className="stat-delta up"><i className="ph ph-arrow-up"></i> 회차 #128 기준</div>
          </div>
        </div>
        <div className="widget-grid">
          <div className="card">
            <div className="card-title"><i className="ph ph-list-checks"></i>테스트 케이스</div>

            <div className="widget-donut">
              <svg width="84" height="84" viewBox="0 0 36 36">
                <circle cx="18" cy="18" r="15.9" fill="none" stroke="#23252a" strokeWidth="4"/>
                <circle cx="18" cy="18" r="15.9" fill="none" stroke="#27a644" strokeWidth="4" strokeDasharray="72 28" strokeDashoffset="25" transform="rotate(-90 18 18)"/>
                <circle cx="18" cy="18" r="15.9" fill="none" stroke="#e4f222" strokeWidth="4" strokeDasharray="16 84" strokeDashoffset={25-72} transform="rotate(-90 18 18)"/>
                <circle cx="18" cy="18" r="15.9" fill="none" stroke="#eb5757" strokeWidth="4" strokeDasharray="12 88" strokeDashoffset={25-72-16} transform="rotate(-90 18 18)"/>

              {[58,63,69,71,68,72].map((v, i) => (

function PipelineScreen({ statusFilter, openStage }) {
  return (
    <div className="content">
      <h1 className="page-title">AI 에이전트 파이프라인 모니터링</h1>
      <p className="page-sub">재시도·타임아웃·토큰 사용량을 단계별로 집계해 이상 패턴을 감지합니다</p>
      <div className="insight-board">
        <div className="card">
          <div className="card-title"><i className="ph ph-warning-circle"></i>분당 토큰 사용량 추이</div>
          <div className="hero-chart-wrap" style={{display:'flex', alignItems:'flex-end', gap:'8px', paddingTop:'20px'}}>
            {[3100,3400,4200,5600,4800,6100,5900,6400].map((v,i) => (
              <div key={i} style={{flex:1, height: (v/6400*220)+'px', background: v > 5800 ? '#eb5757' : '#e4f222', borderRadius:'3px 3px 0 0', animation:'barGrow 500ms ease-out'}}></div>
            ))}
          </div>
          <div className="badge fail" style={{marginTop:'12px'}}><i className="ph ph-warning"></i> 18:04 분당 사용량 임계치(6,000) 초과</div>
        </div>
        <div className="kpi-side">
          <div className="stat-card">
            <div className="stat-label">평균 재시도 횟수</div>
            <div className="stat-value">1.4회</div>
            <Sparkline points={[1.1,1.2,1.6,1.3,1.5,1.4]} color="#4893f4" />
          </div>
          <div className="stat-card">
            <div className="stat-label">타임아웃 발생</div>
            <div className="stat-value">3건 / 시간</div>
            <div className="stat-delta down"><i className="ph ph-arrow-down"></i> citation 단계 집중</div>
          </div>
        </div>
        <div className="widget-grid">
          <div className="card" style={{gridColumn: 'span 2'}}>
            <div className="card-title"><i className="ph ph-flow-arrow"></i>단계별 재시도·타임아웃</div>
            <table className="matrix-table">
              <thead><tr><th>단계</th><th>재시도</th><th>타임아웃</th><th>토큰 사용량</th></tr></thead>
              <tbody>
                {PIPELINE_STAGES.map(s => (
                  <tr key={s.id} onClick={() => openStage(s)}>
                    <td>{s.name}</td>
                    <td className={s.retries > 10 ? 'badge fail' : ''} style={{display:'table-cell'}}>{s.retries}회</td>
                    <td>{s.timeouts}건</td>
                    <td>{s.tokens.toLocaleString()} tok</td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
          <div className="card">
            <div className="card-title"><i className="ph ph-coin"></i>캐시 히트율</div>
            <div className="stat-value" style={{fontSize:'28px'}}>41%</div>
            <div className="stat-delta up" style={{marginTop:'8px'}}><i className="ph ph-arrow-up"></i> 프롬프트 캐싱 적용 후</div>
          </div>
        </div>
      </div>
    </div>
  );
}

function RefactorScreen({ openModule }) {
  return (
    <div className="content">
      <h1 className="page-title">백엔드 리팩터링 현황 모니터링</h1>
      <p className="page-sub">모듈별 레포지토리 계층 이관 진행률과 테스트 커버리지를 확인합니다</p>
      <div className="card">
        <div className="card-title"><i className="ph ph-table"></i>모듈 × 지표 매트릭스</div>
        <table className="matrix-table">
          <thead><tr><th>모듈</th><th>레포지토리 이관율</th><th>테스트 커버리지</th><th>의존성 SemVer</th></tr></thead>
          <tbody>
            {REFACTOR_MODULES.sort((a,b) => (a.repoMigrated+a.coverage)-(b.repoMigrated+b.coverage)).map(m => (
              <tr key={m.name} onClick={() => openModule(m)}>
                <td>{m.name}</td>
                <td>{m.repoMigrated}%<span className="matrix-cell-bar"><span className="matrix-cell-fill" style={{width:m.repoMigrated+'%', background:'#e4f222'}}></span></span></td>
                <td>{m.coverage}%<span className="matrix-cell-bar"><span className="matrix-cell-fill" style={{width:m.coverage+'%', background:'#4893f4'}}></span></span></td>
                <td><span className={"badge " + (m.semver==='ok'?'ok':'warn')}>{m.semver==='ok'?'정책 준수':'위반 경고'}</span></td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>
    </div>
  );
}

function PerfScreen({ openChunk }) {
  return (
    <div className="content">
      <h1 className="page-title">프론트엔드 성능 모니터링</h1>
      <p className="page-sub">번들 청크 크기와 초기 로드 우선순위를 추적해 병목 후보를 식별합니다</p>
      <div className="insight-board">
        <div className="card">
          <div className="card-title"><i className="ph ph-squares-four"></i>청크별 크기 트리맵 (병목 후보 강조)</div>
          <div className="treemap">
            {CHUNKS.map(c => (
              <div key={c.name} className="treemap-chunk" style={{background:c.color, width: (60+c.size)+'px', height: (60+c.size*0.6)+'px'}} onClick={() => openChunk(c)}>
                <span className="name">{c.name}</span>
                <span className="size">{c.size}kb</span>
              </div>
            ))}
          </div>
        </div>
        <div className="kpi-side">
          <div className="stat-card">
            <div className="stat-label">전체 번들 크기</div>
            <div className="stat-value">612kb</div>
            <Sparkline points={[640,598,612]} color="#4893f4" />
          </div>
          <div className="stat-card">
            <div className="stat-label">초기 로드 청크</div>
            <div className="stat-value">3개</div>
          </div>
        </div>
        <div className="widget-grid">
          <div className="card" style={{gridColumn:'span 3'}}>
            <div className="card-title"><i className="ph ph-clock-clockwise"></i>최근 빌드 크기 이력</div>
            {BUILD_HISTORY.map((b,i) => (
              <div key={i} className="build-history-row">
                <span style={{width:'90px', color:'var(--fog)'}}>{b.rev}</span>
                <div className="track"><div className="fill" style={{width: b.pct+'%'}}></div></div>
                <span style={{width:'56px', textAlign:'right'}}>{b.size}kb</span>
              </div>
            ))}
          </div>
        </div>
      </div>
    </div>
  );
}

function TestModal({ item, onClose }) {
  if (!item) return null;
  return (
    <div className="modal-overlay" onClick={onClose}>
      <div className="modal-box" onClick={e => e.stopPropagation()}>
        <button className="modal-close" onClick={onClose}><i className="ph ph-x"></i></button>
        <h3 className="modal-title">{item.id} · {item.name}</h3>
        <div className="field-row"><span className="k">채점 점수</span><span className="v">{item.score} / 5</span></div>
        <div className="field-row"><span className="k">상태</span><span className="v"><span className={"badge " + (item.status==='pass'?'ok':item.status==='fail'?'fail':'warn')}>{item.status==='pass'?'통과':item.status==='fail'?'실패':'경계'}</span></span></div>
        <p style={{fontSize:'12px', color:'var(--fog)', margin:'16px 0 0'}}>LLM 심판관 채점 근거</p>
        <div className="reasoning-block">{item.reasoning}</div>
      </div>
    </div>
  );
}

function StageModal({ item, onClose }) {
  if (!item) return null;
  return (
    <div className="modal-overlay" onClick={onClose}>
      <div className="modal-box" onClick={e => e.stopPropagation()}>
        <button className="modal-close" onClick={onClose}><i className="ph ph-x"></i></button>
        <h3 className="modal-title">{item.name}</h3>
        <div className="field-row"><span className="k">재시도 횟수 (최근 24시간)</span><span className="v">{item.retries}회</span></div>
        <div className="field-row"><span className="k">타임아웃 발생</span><span className="v">{item.timeouts}건</span></div>
        <div className="field-row"><span className="k">토큰 사용량</span><span className="v">{item.tokens.toLocaleString()} tok</span></div>
        {item.retries > 10 && <div className="badge fail" style={{marginTop:'12px'}}>재시도 3회 초과 호출이 다수 발생 — 백오프 정책 점검 필요</div>}
      </div>
    </div>
  );
}

function ModuleModal({ item, onClose }) {
  if (!item) return null;
  return (
    <div className="modal-overlay" onClick={onClose}>
      <div className="modal-box" onClick={e => e.stopPropagation()}>
        <button className="modal-close" onClick={onClose}><i className="ph ph-x"></i></button>
        <h3 className="modal-title">{item.name}</h3>
        <div className="field-row"><span className="k">레포지토리 계층 이관율</span><span className="v">{item.repoMigrated}%</span></div>
        <div className="field-row"><span className="k">테스트 커버리지</span><span className="v">{item.coverage}%</span></div>
        <div className="field-row"><span className="k">SemVer 정책</span><span className="v">{item.semver==='ok'?'준수':'위반 항목 있음'}</span></div>
      </div>
    </div>
  );
}

function ChunkModal({ item, onClose }) {
  if (!item) return null;
  return (
    <div className="modal-overlay" onClick={onClose}>
      <div className="modal-box" onClick={e => e.stopPropagation()}>
        <button className="modal-close" onClick={onClose}><i className="ph ph-x"></i></button>
        <h3 className="modal-title">{item.name}</h3>
        <div className="field-row"><span className="k">청크 크기</span><span className="v">{item.size}kb</span></div>
        <div className="field-row"><span className="k">초기 로드 우선순위</span><span className="v">{item.priority==='high'?'높음':item.priority==='mid'?'중간':'낮음'}</span></div>
        {item.priority === 'low' && item.size > 100 && <div className="badge fail" style={{marginTop:'12px'}}>낮은 우선순위인데 크기가 큼 — 지연 로딩 후보</div>}
      </div>
    </div>
  );
}

function App() {
  const [screen, setScreen] = useState('main');
  const [statusFilter, setStatusFilter] = useState('all');
  const [searchOpen, setSearchOpen] = useState(false);
  const [notifOpen, setNotifOpen] = useState(false);
  const [avatarOpen, setAvatarOpen] = useState(false);
  const [testModal, setTestModal] = useState(null);
  const [stageModal, setStageModal] = useState(null);
  const [moduleModal, setModuleModal] = useState(null);
  const [chunkModal, setChunkModal] = useState(null);
  const [toasts, setToasts] = useState([]);

  function pushToast(text) {
    const id = Date.now();
    setToasts(t => [...t, { id, text }]);
    setTimeout(() => setToasts(t => t.filter(x => x.id !== id)), 3200);
  }

  const activeNav = NAV_ITEMS.find(n => n.key === screen);

  return (
    <div className="app-root" data-archetype="topbar-analytics">
      <header className="app-header">
        <div className="brand"><span className="mark"><i className="ph ph-shield-check" style={{fontSize:'13px'}}></i></span>품질 관제</div>
        <div className="project-switcher" onClick={() => pushToast('현재 프로젝트: AI 입시상담 서비스')}>
          <i className="ph ph-stack"></i> AI 입시상담 <i className="ph ph-caret-down"></i>
        </div>
        <nav className="global-nav">
          {NAV_ITEMS.map(item => (
            <a key={item.key} className={"nav-link " + (screen === item.key ? 'active' : '')} title={item.title} onClick={() => setScreen(item.key)}>
              {item.label}
            </a>
          ))}
        </nav>
        <div className="header-actions">
          <button className="icon-btn" title="검색" onClick={() => setSearchOpen(s => !s)}><i className="ph ph-magnifying-glass"></i></button>
          <button className="icon-btn" title="알림" onClick={() => { setNotifOpen(n => !n); setAvatarOpen(false); }}>
            <i className="ph ph-bell"></i><span className="notif-dot"></span>
          </button>
          {notifOpen && (
            <div className="dropdown">
              <div className="dropdown-item"><i className="ph ph-warning"></i> citation 단계 타임아웃 급증</div>
              <div className="dropdown-item"><i className="ph ph-check-circle"></i> 회차 #128 CI 게이트 통과</div>
              <div className="dropdown-item"><i className="ph ph-git-branch"></i> agent_pipeline 모듈 이관 지연</div>
            </div>
          )}
          <button className="avatar-btn" onClick={() => { setAvatarOpen(a => !a); setNotifOpen(false); }}>이현</button>
          {avatarOpen && (
            <div className="dropdown">
              <div className="dropdown-item" onClick={() => pushToast('프로필 화면은 데모 범위 밖입니다')}><i className="ph ph-user"></i> 프로필</div>
              <div className="dropdown-item" onClick={() => pushToast('로그아웃되었습니다')}><i className="ph ph-sign-out"></i> 로그아웃</div>
            </div>
          )}
        </div>
        {searchOpen && (
          <div className="search-inline">
            <input className="search-input" autoFocus placeholder="테스트 케이스, 모듈, 청크 검색…" onKeyDown={e => { if (e.key === 'Escape') setSearchOpen(false); }} />
          </div>
        )}
      </header>

      <nav className="tab-bar">
        {STATUS_TABS.map(([k,l]) => (
          <button key={k} className={"tab " + (statusFilter===k?'active':'')} onClick={() => setStatusFilter(k)}>{l}</button>
        ))}
      </nav>

      {screen === 'main' && <MainScreen statusFilter={statusFilter} openTest={setTestModal} />}
      {screen === 'pipeline-monitor' && <PipelineScreen statusFilter={statusFilter} openStage={setStageModal} />}
      {screen === 'backend-refactor' && <RefactorScreen openModule={setModuleModal} />}
      {screen === 'frontend-perf' && <PerfScreen openChunk={setChunkModal} />}

      <TestModal item={testModal} onClose={() => setTestModal(null)} />
      <StageModal item={stageModal} onClose={() => setStageModal(null)} />
      <ModuleModal item={moduleModal} onClose={() => setModuleModal(null)} />
      <ChunkModal item={chunkModal} onClose={() => setChunkModal(null)} />

      <div className="toast-wrap">
        {toasts.map(t => <div key={t.id} className="toast"><i className="ph ph-check-circle"></i>{t.text}</div>)}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
