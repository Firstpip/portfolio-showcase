<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>온체인 데이터 수집·API 플랫폼</title>
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<style>
  :root {
    --sandy: #e1d7c2;
    --pale-stone: #e5e7e0;
    --soft-linen: #eeefe9;
    --cream: #fdfdf8;
    --paper: #ffffff;
    --deep-moss: #23251d;
    --olive: #4d4f46;
    --sage: #65675e;
    --ash: #9ea096;
    --warm-mist: #bfc1b7;
    --amber: #eb9d2a;
    --amber-dark: #cd8407;
    --gold: #b17816;
    --blue: #2f80fa;
    --flame: #f54e00;
    --moss: #6aa84f;
    --marigold: #f1a82c;
  }
  * { box-sizing: border-box; }
  html, body { width: 100%; margin: 0; padding: 0; }
  body {
    font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, sans-serif;
    background: var(--sandy);
    color: var(--deep-moss);
    -webkit-font-smoothing: antialiased;
  }
  #root { width: 100%; }
  button { font-family: inherit; cursor: pointer; }
  input, select, textarea { font-family: inherit; }

  @keyframes fadeInUp {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes livePulse {
    0%, 100% { box-shadow: 0 0 0 0 rgba(106,168,79,0.45); }
    50% { box-shadow: 0 0 0 5px rgba(106,168,79,0); }
  }
  @keyframes drawDash {
    from { stroke-dashoffset: 340; }
    to { stroke-dashoffset: 0; }
  }
  @keyframes toastSlide {
    from { opacity: 0; transform: translateX(24px); }
    to { opacity: 1; transform: translateX(0); }
  }
  @keyframes modalFade {
    from { opacity: 0; transform: scale(0.97); }
    to { opacity: 1; transform: scale(1); }
  }

  .app-header {
    position: sticky; top: 0; z-index: 40;
    height: 60px; width: 100%;
    background: var(--paper);
    border-bottom: 1px solid var(--warm-mist);
    display: flex; align-items: center; gap: 24px;
    padding: 0 24px;
  }
  .brand { display: flex; align-items: center; gap: 8px; font-weight: 700; font-size: 16px; letter-spacing: -0.02em; white-space: nowrap; }
  .brand-mark {
    width: 26px; height: 26px; border-radius: 6px;
    background: linear-gradient(135deg, #2f80fa 0%, #f54e00 55%, #eb9d2a 100%);
    display: flex; align-items: center; justify-content: center; color: #fff;
  }
  .project-switcher {
    display: flex; align-items: center; gap: 6px;
    background: var(--soft-linen); border: 1px solid var(--warm-mist);
    border-radius: 4px; padding: 6px 10px; font-size: 13px; color: var(--olive);
    white-space: nowrap;
  }
  .global-nav { display: flex; align-items: center; gap: 4px; flex: 1; overflow-x: auto; }
  .nav-link {
    background: transparent; border: none; color: var(--sage);
    font-size: 13px; font-weight: 500; padding: 8px 10px; border-radius: 4px;
    display: flex; align-items: center; gap: 6px; white-space: nowrap;
    transition: background 0.15s ease, color 0.15s ease;
  }
  .nav-link:hover { background: var(--pale-stone); color: var(--deep-moss); }
  .nav-link.active { color: var(--deep-moss); background: var(--soft-linen); border-bottom: 2px solid var(--blue); border-radius: 4px 4px 0 0; }
  .header-actions { display: flex; align-items: center; gap: 8px; }
  .icon-btn {
    width: 32px; height: 32px; border-radius: 4px; border: 1px solid var(--warm-mist);
    background: var(--paper); display: flex; align-items: center; justify-content: center;
    color: var(--olive); transition: background 0.15s ease;
  }
  .icon-btn:hover { background: var(--pale-stone); }
  .avatar {
    width: 30px; height: 30px; border-radius: 4px; background: var(--amber);
    color: var(--deep-moss); font-size: 12px; font-weight: 700;
    display: flex; align-items: center; justify-content: center;
  }

  .tab-bar { display: flex; gap: 4px; padding: 10px 24px 0; max-width: 1280px; margin: 0 auto; width: 100%; }
  .tab {
    background: transparent; border: none; color: var(--sage);
    font-size: 13px; font-weight: 500; padding: 10px 14px 10px;
    border-radius: 6px 6px 0 0; border-bottom: 2px solid transparent;
  }
  .tab.active { color: var(--blue); background: var(--paper); border-bottom: 2px solid var(--blue); }
  .tab:hover:not(.active) { background: var(--soft-linen); }

  .content { max-width: 1280px; margin: 0 auto; padding: 20px 24px 64px; width: 100%; }

  .window-card {
    background: var(--paper); border: 1px solid var(--warm-mist); border-radius: 6px;
    animation: fadeInUp 0.35s ease both;
  }
  .window-titlebar {
    height: 36px; display: flex; align-items: center; gap: 8px; padding: 0 12px;
    border-bottom: 1px solid var(--warm-mist); backdrop-filter: blur(8px);
  }
  .dot { width: 8px; height: 8px; border-radius: 50%; }
  .window-title { flex: 1; text-align: center; font-size: 12px; color: var(--sage); font-weight: 500; }

  .stat-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; margin-bottom: 16px; }
  .stat-card {
    background: var(--paper); border: 1px solid var(--warm-mist); border-radius: 4px;
    padding: 16px; animation: fadeInUp 0.35s ease both; transition: border-color 0.15s ease, transform 0.15s ease;
  }
  .stat-card:hover { border-color: var(--blue); transform: translateY(-2px); }
  .stat-label { font-size: 12px; color: var(--sage); font-weight: 500; display: flex; align-items: center; gap: 6px; }
  .stat-value { font-size: 30px; font-weight: 700; letter-spacing: -0.02em; margin-top: 6px; color: var(--deep-moss); }
  .stat-delta { font-size: 12px; margin-top: 4px; font-weight: 500; }
  .stat-delta.up { color: var(--moss); }
  .stat-delta.down { color: var(--flame); }

  .chart-panel { margin-bottom: 16px; }
  .chart-body { padding: 20px; }
  .chart-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
  .chart-head h3 { font-size: 19px; margin: 0; letter-spacing: -0.01em; }
  .live-badge { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--moss); font-weight: 600; }
  .live-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--moss); animation: livePulse 1.6s ease-out infinite; }

  .widget-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .widget { padding: 20px; }
  .widget.wide { grid-column: span 2; }
  .widget h4 { font-size: 15px; margin: 0 0 12px; font-weight: 600; }

  .batch-row {
    display: grid; grid-template-columns: 90px 1fr 100px 90px 110px; gap: 8px; align-items: center;
    padding: 10px 6px; border-bottom: 1px solid var(--soft-linen); font-size: 13px; cursor: pointer;
    transition: background 0.15s ease;
  }
  .batch-row:hover { background: var(--soft-linen); }
  .badge { font-size: 11px; padding: 2px 8px; border-radius: 9999px; font-weight: 600; display: inline-block; }
  .badge.success { background: rgba(106,168,79,0.15); color: var(--moss); }
  .badge.fail { background: rgba(245,78,0,0.14); color: var(--flame); }
  .badge.retry { background: rgba(241,168,44,0.18); color: var(--marigold); }

  .btn {
    border-radius: 4px; padding: 8px 14px; font-size: 13px; font-weight: 500;
    border: none; display: inline-flex; align-items: center; gap: 6px;
  }
  .btn-primary { background: var(--amber); color: var(--deep-moss); transition: background 0.15s ease; }
  .btn-primary:hover { background: var(--amber-dark); }
  .btn-outline { background: transparent; border: 1.5px solid var(--gold); color: var(--gold); }
  .btn-outline:hover { background: rgba(177,120,22,0.08); }
  .btn-ghost { background: transparent; color: var(--olive); border: 1px solid var(--warm-mist); }
  .btn-ghost:hover { background: var(--pale-stone); }
  .btn-danger { background: transparent; border: 1px solid var(--flame); color: var(--flame); }
  .btn-danger:hover { background: rgba(245,78,0,0.08); }

  .toolbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; flex-wrap: wrap; gap: 10px; }
  .page-title { font-size: 32px; font-weight: 700; letter-spacing: -0.02em; margin: 0; }
  .page-sub { font-size: 13px; color: var(--sage); margin-top: 4px; }

  .search-row { display: flex; gap: 8px; margin-bottom: 14px; flex-wrap: wrap; }
  .search-input {
    flex: 1; min-width: 220px; border: 1px solid var(--warm-mist); border-radius: 4px;
    padding: 8px 12px; font-size: 13px; background: var(--paper); color: var(--deep-moss);
  }
  .search-input:focus { outline: none; border-color: var(--blue); }
  .select-input { border: 1px solid var(--warm-mist); border-radius: 4px; padding: 8px 10px; font-size: 13px; background: var(--paper); }

  table.data-table { width: 100%; border-collapse: collapse; font-size: 13px; }
  table.data-table th { text-align: left; color: var(--sage); font-weight: 500; padding: 8px 10px; border-bottom: 1px solid var(--warm-mist); font-size: 12px; }
  table.data-table td { padding: 10px; border-bottom: 1px solid var(--soft-linen); }
  table.data-table tbody tr { cursor: pointer; transition: background 0.15s ease; }
  table.data-table tbody tr:hover { background: var(--soft-linen); }
  .mono { font-family: 'SFMono-Regular', Menlo, Consolas, monospace; font-size: 12px; color: var(--olive); }
  .tag { font-size: 11px; padding: 2px 9px; border-radius: 9999px; font-weight: 500; }
  .tag-orange { background: rgba(245,78,0,0.12); color: var(--flame); }
  .tag-green { background: rgba(106,168,79,0.14); color: var(--moss); }
  .tag-gold { background: rgba(241,168,44,0.18); color: #8a5f0f; }

  .schema-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin-bottom: 16px; }
  .schema-card { padding: 18px; }
  .schema-card h4 { margin: 0 0 4px; font-size: 16px; }
  .col-list { list-style: none; margin: 10px 0 0; padding: 0; font-size: 12px; color: var(--olive); }
  .col-list li { display: flex; justify-content: space-between; padding: 5px 0; border-bottom: 1px dashed var(--soft-linen); }

  .drawer-overlay {
    position: fixed; inset: 0; background: rgba(35,37,29,0.35); z-index: 100;
    display: flex; justify-content: flex-end;
  }
  .drawer {
    width: 420px; max-width: 92vw; height: 100%; background: var(--paper);
    border-left: 1px solid var(--warm-mist); padding: 24px; overflow-y: auto;
    animation: toastSlide 0.25s ease both;
  }
  .drawer h3 { margin-top: 0; font-size: 19px; }
  .drawer-field { margin-bottom: 14px; }
  .drawer-field label { font-size: 11px; color: var(--sage); font-weight: 600; text-transform: uppercase; letter-spacing: 0.04em; }
  .drawer-field div { font-size: 13px; margin-top: 3px; color: var(--deep-moss); }

  .modal-overlay {
    position: fixed; inset: 0; background: rgba(35,37,29,0.4); z-index: 100;
    display: flex; align-items: center; justify-content: center; padding: 24px;
  }
  .modal-box {
    width: 480px; max-width: 100%; background: var(--paper); border-radius: 6px;
    border: 1px solid var(--warm-mist); padding: 24px; animation: modalFade 0.2s ease both;
  }
  .modal-box h3 { margin-top: 0; font-size: 19px; }
  .field-group { margin-bottom: 14px; }
  .field-group label { display: block; font-size: 12px; color: var(--olive); font-weight: 500; margin-bottom: 5px; }
  .field-group input, .field-group select, .field-group textarea {
    width: 100%; border: 1px solid var(--warm-mist); border-radius: 4px; padding: 8px 10px; font-size: 13px;
  }
  .field-group textarea { min-height: 76px; resize: vertical; }
  .modal-actions { display: flex; justify-content: flex-end; gap: 8px; margin-top: 18px; }

  .toast-stack { position: fixed; bottom: 20px; right: 20px; z-index: 200; display: flex; flex-direction: column; gap: 8px; }
  .toast {
    background: var(--deep-moss); color: #fff; padding: 10px 16px; border-radius: 4px; font-size: 13px;
    display: flex; align-items: center; gap: 8px; animation: toastSlide 0.25s ease both;
  }

  .settings-grid { display: grid; grid-template-columns: 1.1fr 1fr; gap: 16px; }
  .contract-row {
    display: flex; justify-content: space-between; align-items: center; padding: 10px 12px;
    border: 1px solid var(--warm-mist); border-radius: 4px; margin-bottom: 8px; font-size: 13px;
  }
  .toggle { position: relative; width: 38px; height: 21px; border-radius: 9999px; background: var(--warm-mist); border: none; transition: background 0.15s ease; }
  .toggle.on { background: var(--moss); }
  .toggle span { position: absolute; top: 2px; left: 2px; width: 17px; height: 17px; border-radius: 50%; background: #fff; transition: transform 0.15s ease; }
  .toggle.on span { transform: translateX(17px); }

  .endpoint-row { border: 1px solid var(--warm-mist); border-radius: 4px; margin-bottom: 10px; overflow: hidden; }
  .endpoint-head { display: flex; align-items: center; gap: 10px; padding: 12px 14px; cursor: pointer; }
  .endpoint-head:hover { background: var(--soft-linen); }
  .method-badge { font-size: 11px; font-weight: 700; padding: 2px 8px; border-radius: 4px; font-family: monospace; }
  .method-get { background: rgba(47,128,250,0.14); color: var(--blue); }
  .method-post { background: rgba(106,168,79,0.15); color: var(--moss); }
  .endpoint-body { padding: 14px; border-top: 1px solid var(--soft-linen); background: var(--cream); font-size: 13px; }
  .code-block {
    background: var(--deep-moss); color: #e5e7e0; font-family: monospace; font-size: 12px;
    padding: 12px; border-radius: 4px; overflow-x: auto; white-space: pre; margin-top: 8px;
  }

  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-thumb { background: var(--warm-mist); border-radius: 9999px; }

  @media (max-width: 900px) {
    .stat-row { grid-template-columns: repeat(2, 1fr); }
    .widget-grid { grid-template-columns: 1fr; }
    .widget.wide { grid-column: span 1; }
    .schema-grid { grid-template-columns: 1fr; }
    .settings-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef } = React;

/* ---------- mock data ---------- */
const CONTRACTS = [
  { name: 'SwapRouterV3', address: '0x7a25...9fD2', network: 'Ethereum', tx: 48213, status: '정상' },
  { name: 'StakingVault', address: '0x3c9b...11Ae', network: 'Ethereum', tx: 21054, status: '정상' },
];

const TX_ROWS = Array.from({ length: 18 }).map((_, i) => ({
  id: 'TX' + (10450 - i),
  block: 19824110 - i * 3,
  hash: '0x8f2a1c9d0e3b' + i,
  contract: i % 2 === 0 ? 'SwapRouterV3' : 'StakingVault',
  method: i % 3 === 0 ? 'swapExactTokens' : (i % 3 === 1 ? 'stake' : 'unstake'),
  eventType: i % 2 === 0 ? 'Swap' : 'Staked',
  from: '0x91Ac...' + (200 + i),
  to: '0x4Fbe...' + (500 + i),
  value: (Math.abs(Math.sin(i)) * 12000).toFixed(2),
  time: `2026.07.0${(i % 9) + 1} 1${i % 10}:2${i % 6}`,
  status: i % 7 === 0 ? '재시도' : '성공',
}));

const BATCHES = Array.from({ length: 10 }).map((_, i) => ({
  range: `#19,824,0${80 + i * 3} - #19,824,0${83 + i * 3}`,
  contract: i % 2 === 0 ? 'SwapRouterV3' : 'StakingVault',
  count: 120 + i * 7,
  retries: i % 4 === 0 ? 2 : 0,
  status: i % 4 === 0 ? 'retry' : (i % 9 === 0 ? 'fail' : 'success'),
  time: `07/0${(i % 9) + 1} 0${9 + (i % 10)}:1${i}`,
}));

const SCHEMA_TABLES = [
  { name: 'transactions', rows: '1,204,830', updated: '3분 전', cols: [['tx_hash', 'text'], ['block_number', 'bigint'], ['contract_addr', 'text'], ['method', 'text'], ['value', 'numeric']], idx: 3 },
  { name: 'events', rows: '2,918,442', updated: '3분 전', cols: [['event_id', 'uuid'], ['tx_hash', 'text'], ['event_type', 'text'], ['payload', 'jsonb'], ['block_number', 'bigint']], idx: 4 },
  { name: 'blocks', rows: '198,213', updated: '1분 전', cols: [['block_number', 'bigint'], ['block_hash', 'text'], ['gathered_at', 'timestamptz'], ['tx_count', 'int']], idx: 2 },
];

const DELAY_BUCKETS = [4, 6, 5, 9, 14, 7, 5, 4, 6, 8, 5, 4];

const ENDPOINTS = [
  { method: 'GET', path: '/api/v1/transactions', desc: '트랜잭션 목록 조회 (커서 페이지네이션)', params: 'cursor, limit, contract, from, to' },
  { method: 'GET', path: '/api/v1/transactions/:hash', desc: '단일 트랜잭션 상세 조회', params: 'hash' },
  { method: 'GET', path: '/api/v1/events', desc: '디코딩된 이벤트 로그 조회', params: 'eventType, contract, blockRange' },
  { method: 'GET', path: '/api/v1/stats/summary', desc: '수집 통계 요약(처리량/실패율/지연)', params: 'range' },
  { method: 'POST', path: '/api/v1/contracts', desc: '수집 대상 컨트랙트 및 ABI 등록', params: 'name, address, abi, network' },
  { method: 'GET', path: '/api/v1/batches', desc: '배치 수집 작업 이력 조회', params: 'status, limit' },
];

/* ---------- small svg pieces ---------- */
function Sparkline({ points, color }) {
  const w = 100, h = 30;
  const max = Math.max(...points), min = Math.min(...points);
  const norm = points.map((p, i) => {
    const x = (i / (points.length - 1)) * w;
    const y = h - ((p - min) / (max - min || 1)) * h;
    return `${x},${y}`;
  }).join(' ');
  return (
    <svg width="100" height="30" viewBox={`0 0 ${w} ${h}`}>
      <polyline points={norm} fill="none" stroke={color} strokeWidth="2"
        strokeDasharray="340" style={{ animation: 'drawDash 1s ease forwards' }} />
    </svg>
  );
}

function LineChart({ data, color }) {
  const w = 760, h = 220, pad = 30;
  const max = Math.max(...data), min = Math.min(...data) * 0.9;
  const pts = data.map((v, i) => {
    const x = pad + (i / (data.length - 1)) * (w - pad * 2);
    const y = h - pad - ((v - min) / (max - min || 1)) * (h - pad * 2);
    return [x, y];
  });
  const path = pts.map((p, i) => (i === 0 ? `M${p[0]},${p[1]}` : `L${p[0]},${p[1]}`)).join(' ');
  const area = path + ` L${pts[pts.length - 1][0]},${h - pad} L${pts[0][0]},${h - pad} Z`;
  return (
    <svg width="100%" height={h} viewBox={`0 0 ${w} ${h}`} preserveAspectRatio="none" className="chart">
      <defs>
        <linearGradient id="lineFill" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stopColor={color} stopOpacity="0.22" />
          <stop offset="100%" stopColor={color} stopOpacity="0" />
        </linearGradient>
      </defs>
      {[0.25, 0.5, 0.75].map((f) => (
        <line key={f} x1={pad} x2={w - pad} y1={pad + f * (h - pad * 2)} y2={pad + f * (h - pad * 2)} stroke="#eeefe9" strokeWidth="1" />
      ))}
      <path d={area} fill="url(#lineFill)" />
      <path d={path} fill="none" stroke={color} strokeWidth="2.4" strokeDasharray="900" style={{ animation: 'drawDash 1.2s ease forwards' }} />
      {pts.map((p, i) => <circle key={i} cx={p[0]} cy={p[1]} r="3" fill={color} />)}
    </svg>
  );
}

function DonutChart({ segments }) {
  const total = segments.reduce((a, s) => a + s.value, 0);
  let acc = 0;
  const r = 46, c = 2 * Math.PI * r;
  return (
    <svg width="140" height="140" viewBox="0 0 140 140">
      <g transform="translate(70,70) rotate(-90)">
        <circle r={r} fill="none" stroke="#eeefe9" strokeWidth="18" />
        {segments.map((s, i) => {
          const frac = s.value / total;
          const dash = frac * c;
          const el = (
            <circle key={i} r={r} fill="none" stroke={s.color} strokeWidth="18"
              strokeDasharray={`${dash} ${c - dash}`} strokeDashoffset={-acc}
              strokeLinecap="butt" />
          );
          acc += dash;
          return el;
        })}
      </g>
      <text x="70" y="66" textAnchor="middle" fontSize="20" fontWeight="700" fill="#23251d">{total}</text>
      <text x="70" y="84" textAnchor="middle" fontSize="10" fill="#65675e">건 / 24h</text>
    </svg>
  );
}

function MiniBarChart({ data, onSelect, selected }) {
  const w = 320, h = 120, barW = w / data.length - 6;
  const max = Math.max(...data);
  return (
    <svg width="100%" height={h} viewBox={`0 0 ${w} ${h}`} preserveAspectRatio="none">
      {data.map((v, i) => {
        const bh = (v / max) * (h - 20);
        const x = i * (barW + 6);
        const active = selected === i;
        return (
          <rect key={i} x={x} y={h - bh - 14} width={barW} height={bh} rx="2"
            fill={active ? '#2f80fa' : '#f1a82c'} opacity={active ? 1 : 0.75}
            style={{ cursor: 'pointer', transition: 'opacity 0.15s ease' }}
            onClick={() => onSelect(i)} />
        );
      })}
    </svg>
  );
}

    setTrying(idx); setResult(null);
    setTimeout(() => {
      setResult(JSON.stringify({ data: [{ hash: '0x8f2a1c9d0e3b1', block: 19824110, contract: 'SwapRouterV3', method: 'swapExactTokens' }], nextCursor: 'eyJibG9jayI6MTk4MjQwOTB9' }, null, 2));
      setTrying(null);
    }, 900);
  };

  return (
    <div>
      <div className="toolbar">
        <div>
          <h1 className="page-title">API 문서 콘솔</h1>

      {ENDPOINTS.map((e, i) => (
        <div className="endpoint-row" key={i}>
          <div className="endpoint-head" onClick={() => setOpen(open === i ? -1 : i)}>
            <span className={`method-badge ${e.method === 'GET' ? 'method-get' : 'method-post'}`}>{e.method}</span>
            <span className="mono" style={{ flex: 1 }}>{e.path}</span>

            <i data-lucide={open === i ? 'chevron-up' : 'chevron-down'} style={{ width: 14, height: 14 }}></i>

          {open === i && (
            <div className="endpoint-body">

              {result && trying === null && (
                <div className="code-block">{result}</div>

        </nav>
        <div className="header-actions">
          <button className="icon-btn" onClick={() => addToast('검색 팔레트 준비 중')}><i data-lucide="search" style={{ width: 15, height: 15 }}></i></button>
          <button className="icon-btn" onClick={() => addToast('새 알림이 없습니다')}><i data-lucide="bell" style={{ width: 15, height: 15 }}></i></button>
          <div className="avatar">DE</div>
        </div>
      </header>

      <main className="content">
        {screen === 'main' && <Overview addToast={addToast} openBatch={setBatchDetail} />}
        {screen === 'transactions' && <Transactions openTx={setTxDetail} />}
        {screen === 'schema' && <Schema />}
        {screen === 'api-console' && <ApiConsole addToast={addToast} />}
        {screen === 'settings' && <Settings addToast={addToast} />}
      </main>

      {txDetail && (
        <Drawer title="트랜잭션 상세" onClose={() => setTxDetail(null)}>
          <div className="drawer-field"><label>해시</label><div className="mono">{txDetail.hash}</div></div>
          <div className="drawer-field"><label>블록</label><div>{txDetail.block}</div></div>
          <div className="drawer-field"><label>컨트랙트</label><div>{txDetail.contract}</div></div>
          <div className="drawer-field"><label>디코딩된 함수/이벤트</label><div><span className="tag tag-orange">{txDetail.method}</span> <span className="tag tag-green">{txDetail.eventType}</span></div></div>
          <div className="drawer-field"><label>From</label><div className="mono">{txDetail.from}</div></div>
          <div className="drawer-field"><label>To</label><div className="mono">{txDetail.to}</div></div>
          <div className="drawer-field"><label>값</label><div>{txDetail.value}</div></div>
          <div className="drawer-field"><label>Raw 데이터</label><div className="code-block">{`{ "topics": ["0xddf252ad..."], "data": "0x0000...${txDetail.value}" }`}</div></div>
        </Drawer>
      )}

      {batchDetail && (
        <Drawer title="배치 작업 상세" onClose={() => setBatchDetail(null)}>
          <div className="drawer-field"><label>블록 구간</label><div className="mono">{batchDetail.range}</div></div>
          <div className="drawer-field"><label>컨트랙트</label><div>{batchDetail.contract}</div></div>
          <div className="drawer-field"><label>처리 건수</label><div>{batchDetail.count}건</div></div>
          <div className="drawer-field"><label>재시도 횟수</label><div>{batchDetail.retries}회</div></div>
          <div className="drawer-field"><label>상태</label><div><span className={`badge ${batchDetail.status}`}>{batchDetail.status === 'success' ? '성공' : batchDetail.status === 'retry' ? '재시도 후 성공' : '실패'}</span></div></div>
          <div className="drawer-field"><label>실행 시각</label><div>{batchDetail.time}</div></div>
        </Drawer>
      )}

      <Toast toasts={toasts} />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
