<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>멀티체인 온체인 분석·모니터링 플랫폼</title>
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
<link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/regular/style.css">
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
  :root {
    --void: #000000;
    --ground: #181818;
    --carbon: #212525;
    --circuit: #485346;
    --blueblack: #1f2a33;
    --lime: #7fee64;
    --phosphor: #ddffdc;
    --sage60: #8cab87;
    --sage40: #677d64;
    --moss70: #9cbf93;
    --moss80: #aed2a4;
    --fern: #859984;
    --deepfern: #697368;
    --pine15: #3e4a3c;
  }
  * { box-sizing: border-box; }
  html, body { width: 100%; margin: 0; padding: 0; }
  body {
    font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, sans-serif;
    background: var(--void);
    color: var(--phosphor);
    -webkit-font-smoothing: antialiased;
  }
  #root { width: 100%; }
  button { font-family: inherit; cursor: pointer; }
  input, select, textarea { font-family: inherit; }

  @keyframes glowPulse {
    0%, 100% { box-shadow: 0 0 0 0 rgba(127,238,100,0.35); }
    50% { box-shadow: 0 0 0 6px rgba(127,238,100,0); }
  }
  @keyframes drawDash2 {
    from { stroke-dashoffset: 500; }
    to { stroke-dashoffset: 0; }
  }
  @keyframes tileIn {
    from { opacity: 0; transform: translateY(12px) scale(0.99); }
    to { opacity: 1; transform: translateY(0) scale(1); }
  }
  @keyframes slideDrawer {
    from { opacity: 0; transform: translateX(28px); }
    to { opacity: 1; transform: translateX(0); }
  }
  @keyframes cubeSpin {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
  }

  .topbar {
    position: sticky; top: 0; z-index: 40;
    height: 64px; width: 100%;
    background: rgba(33,37,37,0.86); backdrop-filter: blur(10px);
    border-bottom: 1px solid var(--blueblack);
    display: flex; align-items: center; gap: 20px; padding: 0 24px;
  }
  .logo { display: flex; align-items: center; gap: 9px; font-weight: 600; font-size: 16px; white-space: nowrap; }
  .logo-mark {
    width: 26px; height: 26px; border-radius: 6px;
    background: radial-gradient(circle at 30% 30%, #b6ff9e, #7fee64 60%, #18b759);
    animation: cubeSpin 14s linear infinite;
  }
  .top-nav { display: flex; gap: 4px; flex: 1; overflow-x: auto; }
  .top-nav button {
    background: transparent; border: none; color: var(--sage60);
    font-size: 13px; font-weight: 500; padding: 9px 12px; border-radius: 9999px;
    white-space: nowrap; transition: background 0.2s ease, color 0.2s ease;
  }
  .top-nav button:hover { background: rgba(127,238,100,0.08); color: var(--phosphor); }
  .top-nav button.active { color: #181818; background: var(--lime); font-weight: 600; }
  .top-actions { display: flex; align-items: center; gap: 10px; }
  .icon-btn {
    width: 34px; height: 34px; border-radius: 9999px; border: 1px solid var(--circuit);
    background: transparent; color: var(--phosphor); display: flex; align-items: center; justify-content: center;
    transition: border-color 0.2s ease;
  }
  .icon-btn:hover { border-color: var(--lime); color: var(--lime); }
  .avatar-pill {
    width: 32px; height: 32px; border-radius: 9999px; background: var(--pine15);
    color: var(--phosphor); font-size: 12px; font-weight: 700;
    display: flex; align-items: center; justify-content: center;
  }

  .content { max-width: 1280px; margin: 0 auto; padding: 28px 24px 72px; width: 100%; }

  .page-head { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 22px; flex-wrap: wrap; gap: 14px; }
  .eyebrow { font-size: 12px; letter-spacing: 0.6px; text-transform: uppercase; color: var(--moss70); font-weight: 500; margin-bottom: 6px; }
  .page-title { font-size: 30px; font-weight: 500; letter-spacing: -0.012em; margin: 0; color: var(--phosphor); }
  .page-sub { font-size: 14px; color: var(--sage60); margin-top: 6px; max-width: 560px; }

  .btn { border-radius: 9999px; padding: 10px 20px; font-size: 14px; font-weight: 500; border: none; display: inline-flex; align-items: center; gap: 7px; }
  .btn-lime { background: var(--lime); color: #181818; transition: filter 0.2s ease; }
  .btn-lime:hover { filter: brightness(1.08); }
  .btn-ghost { background: transparent; border: 1px solid var(--phosphor); color: var(--phosphor); }
  .btn-ghost:hover { background: rgba(255,255,255,0.05); }
  .btn-outline { background: transparent; border: 1px solid var(--circuit); color: var(--fern); }
  .btn-outline:hover { border-color: var(--lime); color: var(--lime); }

  .bento { display: grid; grid-template-columns: repeat(4, 1fr); gap: 18px; }
  .tile {
    background: var(--ground); border: 1px solid var(--blueblack); border-radius: 16px;
    padding: 24px; animation: tileIn 0.4s ease both; transition: border-color 0.2s ease, transform 0.2s ease;
  }
  .tile:hover { border-color: var(--circuit); transform: translateY(-2px); }
  .tile.feature { grid-column: span 2; grid-row: span 2; }
  .tile.wide { grid-column: span 2; }
  .tile.metric { display: flex; flex-direction: column; justify-content: center; }
  .tile h2 { font-size: 20px; font-weight: 500; margin: 0 0 4px; }
  .tile .num { font-size: 34px; font-weight: 500; letter-spacing: -0.02em; color: var(--phosphor); }
  .tile .lbl { font-size: 13px; color: var(--sage60); margin-top: 4px; }
  .tile-eyebrow { font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; color: var(--moss70); margin-bottom: 6px; }

  .status-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-right: 6px; }
  .status-live { background: var(--lime); animation: glowPulse 1.8s ease-out infinite; }
  .status-warn { background: #e0c64a; }
  .status-down { background: #d3685a; }

  .chain-row { display: flex; justify-content: space-between; align-items: center; padding: 9px 0; border-bottom: 1px solid var(--blueblack); font-size: 13px; }
  .chain-row:last-child { border-bottom: none; }

  .alert-row {
    display: grid; grid-template-columns: 90px 1fr 110px 90px; gap: 10px; align-items: center;
    padding: 10px 6px; border-bottom: 1px solid var(--blueblack); font-size: 13px; cursor: pointer;
    transition: background 0.15s ease;
  }
  .alert-row:hover { background: rgba(255,255,255,0.03); }
  .tag { font-size: 11px; padding: 3px 10px; border-radius: 9999px; font-weight: 500; }
  .tag-lime { background: rgba(127,238,100,0.16); color: var(--lime); }
  .tag-warn { background: rgba(224,198,74,0.16); color: #e0c64a; }
  .tag-neutral { background: transparent; border: 1px solid var(--circuit); color: var(--fern); }

  .window-card {
    background: var(--ground); border: 1px solid var(--circuit); border-radius: 12px;
    overflow: hidden;
  }
  .window-titlebar { height: 34px; display: flex; align-items: center; gap: 7px; padding: 0 12px; border-bottom: 1px solid var(--blueblack); }
  .dot { width: 7px; height: 7px; border-radius: 50%; }
  .window-title { flex: 1; text-align: center; font-size: 11px; color: var(--moss70); font-family: monospace; }
  .window-body { padding: 20px; }

  .toolbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 18px; flex-wrap: wrap; gap: 10px; }
  .search-input {
    flex: 1; min-width: 220px; border: 1px solid var(--circuit); border-radius: 8px;
    padding: 10px 14px; font-size: 13px; background: var(--carbon); color: var(--phosphor);
  }
  .search-input:focus { outline: none; border-color: var(--lime); }
  .search-input::placeholder { color: var(--sage40); }

  table.data-table { width: 100%; border-collapse: collapse; font-size: 13px; }
  table.data-table th { text-align: left; color: var(--moss70); font-weight: 500; padding: 8px 10px; border-bottom: 1px solid var(--blueblack); font-size: 11px; text-transform: uppercase; letter-spacing: 0.4px; }
  table.data-table td { padding: 11px 10px; border-bottom: 1px solid var(--blueblack); }
  table.data-table tbody tr { cursor: pointer; transition: background 0.15s ease; }
  table.data-table tbody tr:hover { background: rgba(255,255,255,0.03); }
  .mono { font-family: 'Fira Mono', monospace; font-size: 12px; color: var(--sage60); }

  .rule-card { background: var(--ground); border: 1px solid var(--circuit); border-radius: 12px; padding: 18px; margin-bottom: 12px; }
  .rule-head { display: flex; justify-content: space-between; align-items: center; }
  .toggle { position: relative; width: 38px; height: 21px; border-radius: 9999px; background: var(--circuit); border: none; transition: background 0.15s ease; }
  .toggle.on { background: var(--lime); }
  .toggle span { position: absolute; top: 2px; left: 2px; width: 17px; height: 17px; border-radius: 50%; background: var(--void); transition: transform 0.15s ease; }
  .toggle.on span { transform: translateX(17px); background: #181818; }

  .drawer-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.55); z-index: 100; display: flex; justify-content: flex-end; }
  .drawer { width: 420px; max-width: 92vw; height: 100%; background: var(--carbon); border-left: 1px solid var(--circuit); padding: 26px; overflow-y: auto; animation: slideDrawer 0.25s ease both; }
  .drawer h3 { margin-top: 0; font-size: 20px; font-weight: 500; }
  .drawer-field { margin-bottom: 15px; }
  .drawer-field label { font-size: 11px; color: var(--moss70); font-weight: 600; text-transform: uppercase; letter-spacing: 0.4px; }
  .drawer-field div { font-size: 13px; margin-top: 3px; color: var(--phosphor); }
  .code-block { background: var(--void); color: var(--lime); font-family: 'Fira Mono', monospace; font-size: 12px; padding: 12px; border-radius: 8px; overflow-x: auto; white-space: pre; margin-top: 8px; border: 1px solid var(--blueblack); }

  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 100; display: flex; align-items: center; justify-content: center; padding: 24px; }
  .modal-box { width: 480px; max-width: 100%; background: var(--carbon); border-radius: 16px; border: 1px solid var(--circuit); padding: 28px; }
  .modal-box h3 { margin-top: 0; font-size: 20px; font-weight: 500; }
  .field-group { margin-bottom: 15px; }
  .field-group label { display: block; font-size: 12px; color: var(--sage60); font-weight: 500; margin-bottom: 6px; }
  .field-group input, .field-group select, .field-group textarea {
    width: 100%; border: 1px solid var(--circuit); border-radius: 8px; padding: 9px 12px; font-size: 13px;
    background: var(--ground); color: var(--phosphor);
  }
  .field-group textarea { min-height: 74px; resize: vertical; }
  .modal-actions { display: flex; justify-content: flex-end; gap: 10px; margin-top: 20px; }

  .toast-stack { position: fixed; bottom: 22px; right: 22px; z-index: 200; display: flex; flex-direction: column; gap: 8px; }
  .toast { background: var(--ground); color: var(--phosphor); border: 1px solid var(--lime); padding: 11px 18px; border-radius: 9999px; font-size: 13px; display: flex; align-items: center; gap: 8px; animation: slideDrawer 0.25s ease both; }

  .role-pill { display: inline-flex; gap: 6px; padding: 6px 6px; border-radius: 9999px; background: var(--carbon); border: 1px solid var(--circuit); }
  .role-pill button { border: none; background: transparent; color: var(--sage60); font-size: 12px; padding: 6px 12px; border-radius: 9999px; }
  .role-pill button.active { background: var(--lime); color: #181818; font-weight: 600; }

  .graph-wrap { background: var(--void); border: 1px solid var(--blueblack); border-radius: 12px; padding: 18px; }

  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-thumb { background: var(--circuit); border-radius: 9999px; }

  @media (max-width: 980px) {
    .bento { grid-template-columns: repeat(2, 1fr); }
    .tile.feature { grid-column: span 2; }
  }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect } = React;

/* ---------- mock data ---------- */
const CHAINS = [
  { name: 'Ethereum', tx: '1,204,830', lag: '6.2초', status: 'live' },
  { name: 'Polygon', tx: '842,110', lag: '4.8초', status: 'live' },
  { name: 'Arbitrum', tx: '318,904', lag: '11.4초', status: 'warn' },
  { name: 'Base', tx: '96,224', lag: '5.1초', status: 'live' },
];

const RULES = [
  { name: '고액 스왑 임계값 초과', cond: 'Ethereum · value > 50,000 USDC', channel: 'Slack', on: true },
  { name: '동일 지갑 반복 출금 패턴', cond: '전체 체인 · 10분 내 5회 이상', channel: 'Email', on: true },
  { name: '신규 컨트랙트 첫 거래', cond: 'Polygon · 미등록 컨트랙트', channel: 'Slack', on: false },
];

const ALERTS = Array.from({ length: 9 }).map((_, i) => ({
  id: 'AL-' + (3040 - i),
  rule: i % 3 === 0 ? '고액 스왑 임계값 초과' : (i % 3 === 1 ? '동일 지갑 반복 출금 패턴' : '신규 컨트랙트 첫 거래'),
  chain: i % 2 === 0 ? 'Ethereum' : 'Polygon',
  time: `07/0${(i % 9) + 1} 1${i % 10}:0${i % 6}`,
  severity: i % 4 === 0 ? '높음' : (i % 4 === 1 ? '중간' : '낮음'),
}));

const AUDIT_LOG = Array.from({ length: 8 }).map((_, i) => ({
  actor: i % 2 === 0 ? '김도현 (운영자)' : '이서연 (관리자)',
  action: i % 3 === 0 ? '알림 룰 수정' : (i % 3 === 1 ? '체인 어댑터 추가' : '알림 확인 처리'),
  target: i % 3 === 0 ? '고액 스왑 임계값 초과' : (i % 3 === 1 ? 'Base 어댑터' : 'AL-' + (3038 - i)),
  time: `2026.07.0${(i % 9) + 1} 1${i % 10}:2${i % 6}`,
}));

/* ---------- svg pieces ---------- */
function AreaChart({ data, color }) {
  const w = 520, h = 200, pad = 24;
  const max = Math.max(...data), min = Math.min(...data) * 0.85;
  const pts = data.map((v, i) => {
    const x = pad + (i / (data.length - 1)) * (w - pad * 2);
    const y = h - pad - ((v - min) / (max - min || 1)) * (h - pad * 2);
    return [x, y];
  });
  const path = pts.map((p, i) => (i === 0 ? `M${p[0]},${p[1]}` : `L${p[0]},${p[1]}`)).join(' ');
  const area = path + ` L${pts[pts.length - 1][0]},${h - pad} L${pts[0][0]},${h - pad} Z`;
  return (
    <svg width="100%" height={h} viewBox={`0 0 ${w} ${h}`} preserveAspectRatio="none">
      <defs>
        <linearGradient id="areaFill" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stopColor={color} stopOpacity="0.35" />
          <stop offset="100%" stopColor={color} stopOpacity="0" />
        </linearGradient>
      </defs>
      <path d={area} fill="url(#areaFill)" />
      <path d={path} fill="none" stroke={color} strokeWidth="2.5" strokeDasharray="900" style={{ animation: 'drawDash2 1.3s ease forwards' }} />
    </svg>
  );
}

function NodeGraph({ nodes, edges, expandable, onExpand }) {
  return (
    <svg width="100%" height="260" viewBox="0 0 480 260">
      {edges.map((e, i) => {
        const a = nodes[e[0]], b = nodes[e[1]];
        return <line key={i} x1={a.x} y1={a.y} x2={b.x} y2={b.y} stroke="#485346" strokeWidth="1.5" />;
      })}
      {nodes.map((n, i) => (
        <g key={i} style={{ cursor: expandable.includes(i) ? 'pointer' : 'default' }} onClick={() => expandable.includes(i) && onExpand(i)}>
          <circle cx={n.x} cy={n.y} r={n.r || 16} fill={n.color || '#181818'} stroke="#7fee64" strokeWidth={n.main ? 2.5 : 1.2} />
          <text x={n.x} y={n.y + 30} textAnchor="middle" fontSize="10" fill="#8cab87">{n.label}</text>
        </g>
      ))}
    </svg>
  );
}

/* ---------- shared UI ---------- */
function WindowCard({ title, children }) {
  return (
    <div className="window-card">
      <div className="window-titlebar">
        <span className="dot" style={{ background: '#d3685a' }}></span>
        <span className="dot" style={{ background: '#e0c64a' }}></span>
        <span className="dot" style={{ background: '#7fee64' }}></span>
        <span className="window-title">{title}</span>
        <span style={{ width: 40 }}></span>
      </div>
      <div className="window-body">{children}</div>
    </div>
  );
}

function Toast({ toasts }) {
  return (
    <div className="toast-stack">
      {toasts.map((t) => (
        <div className="toast" key={t.id}><i className="ph ph-check-circle" style={{ color: '#7fee64' }}></i>{t.msg}</div>
      ))}
    </div>
  );
}

function Drawer({ title, onClose, children }) {
  return (
    <div className="drawer-overlay" onClick={onClose}>
      <div className="drawer" onClick={(e) => e.stopPropagation()}>
        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
          <h3>{title}</h3>
          <button className="icon-btn" onClick={onClose}><i className="ph ph-x"></i></button>
        </div>
        {children}
      </div>
    </div>
  );
}

function Modal({ title, onClose, children }) {
  return (
    <div className="modal-overlay" onClick={onClose}>
      <div className="modal-box" onClick={(e) => e.stopPropagation()}>
        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
          <h3>{title}</h3>
          <button className="icon-btn" onClick={onClose}><i className="ph ph-x"></i></button>
        </div>
        {children}
      </div>
    </div>
  );
}

/* ---------- screens ---------- */
function Overview({ addToast, openAlert }) {
  return (
    <div>
      <div className="page-head">
        <div>
          <div className="eyebrow">Multichain Console</div>
          <h1 className="page-title">멀티체인 통합 대시보드</h1>
          <div className="page-sub">4개 체인 어댑터 연동 · 실시간 자금 흐름과 이상 거래를 하나의 화면에서 추적합니다.</div>
        </div>
        <button className="btn btn-lime" onClick={() => addToast('전체 체인 상태가 새로고침되었습니다')}>
          <i className="ph ph-arrows-clockwise"></i>전체 새로고침
        </button>
      </div>

      <div className="bento">
        <div className="tile feature">
          <div className="tile-eyebrow">Fund Flow · 24H</div>
          <h2>멀티체인 자금 흐름 추이</h2>
          <AreaChart data={[220,260,240,310,355,330,390,410,388,432,468,455]} color="#7fee64" />
        </div>
        <div className="tile metric">
          <div className="tile-eyebrow">Throughput</div>
          <div className="num">2.46M</div>
          <div className="lbl">전체 체인 누적 처리 tx</div>
        </div>
        <div className="tile metric">
          <div className="tile-eyebrow">Alerts</div>
          <div className="num">17</div>
          <div className="lbl">24시간 내 이상 거래 알림</div>
        </div>
        <div className="tile wide">
          <div className="tile-eyebrow">Recent Alerts</div>
          <h2 style={{ fontSize: 16, marginBottom: 10 }}>최근 이상 거래 알림</h2>
          {ALERTS.slice(0, 4).map((a) => (
            <div key={a.id} className="chain-row" style={{ cursor: 'pointer' }} onClick={() => openAlert(a)}>
              <span><span className={`status-dot ${a.severity === '높음' ? 'status-down' : a.severity === '중간' ? 'status-warn' : 'status-live'}`}></span>{a.rule}</span>
              <span className="mono" style={{ fontSize: 11 }}>{a.time}</span>
            </div>
          ))}
        </div>
        <div className="tile">
          <div className="tile-eyebrow">Chain Status</div>
          <h2 style={{ fontSize: 16, marginBottom: 8 }}>체인 연결 상태</h2>
          {CHAINS.map((c) => (
            <div className="chain-row" key={c.name}>
              <span><span className={`status-dot ${c.status === 'live' ? 'status-live' : 'status-warn'}`}></span>{c.name}</span>
              <span className="mono" style={{ fontSize: 11 }}>{c.lag}</span>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

function Alerts({ addToast }) {
  const [rules, setRules] = useState(RULES);
  const [modalOpen, setModalOpen] = useState(false);
  const [form, setForm] = useState({ name: '', threshold: '', chain: 'Ethereum', channel: 'Slack' });

  const toggle = (i) => {
    const next = [...rules];
    next[i] = { ...next[i], on: !next[i].on };
    setRules(next);
  };

  const submit = () => {
    if (!form.name) return;
    setRules([...rules, { name: form.name, cond: `${form.chain} · ${form.threshold || '조건 미지정'}`, channel: form.channel, on: true }]);
    setModalOpen(false);
    setForm({ name: '', threshold: '', chain: 'Ethereum', channel: 'Slack' });
    addToast('알림 룰이 생성되었습니다');
  };

  return (
    <div>
      <div className="page-head">
        <div>
          <div className="eyebrow">Rule Engine</div>
          <h1 className="page-title">이상 거래 알림 & 룰 엔진</h1>
          <div className="page-sub">임계값·패턴 조건을 조합해 이상 거래를 실시간으로 탐지합니다.</div>
        </div>
        <button className="btn btn-lime" onClick={() => setModalOpen(true)}><i className="ph ph-plus"></i>알림 룰</button>
      </div>

      <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 20 }}>
        <div>
          <h3 style={{ fontSize: 15, fontWeight: 500, color: 'var(--moss70)', marginBottom: 10 }}>등록된 룰</h3>
          {rules.map((r, i) => (
            <div className="rule-card" key={i}>
              <div className="rule-head">
                <div>
                  <div style={{ fontWeight: 500 }}>{r.name}</div>
                  <div className="mono" style={{ fontSize: 11, marginTop: 3 }}>{r.cond}</div>
                </div>
                <button className={`toggle ${r.on ? 'on' : ''}`} onClick={() => toggle(i)}><span></span></button>
              </div>
              <div style={{ marginTop: 10 }}><span className="tag tag-neutral">{r.channel} 발송</span></div>
            </div>
          ))}
        </div>
        <div>
          <h3 style={{ fontSize: 15, fontWeight: 500, color: 'var(--moss70)', marginBottom: 10 }}>알림 로그</h3>
          <WindowCard title="alerts.log">
            <table className="data-table">
              <thead><tr><th>룰</th><th>체인</th><th>심각도</th></tr></thead>
              <tbody>
                {ALERTS.slice(0, 6).map((a) => (
                  <tr key={a.id}>
                    <td>{a.rule}</td>
                    <td>{a.chain}</td>
                    <td><span className={`tag ${a.severity === '높음' ? 'tag-warn' : 'tag-lime'}`}>{a.severity}</span></td>
                  </tr>
                ))}
              </tbody>
            </table>
          </WindowCard>
        </div>
      </div>

      {modalOpen && (
        <Modal title="새 알림 룰 만들기" onClose={() => setModalOpen(false)}>
          <div className="field-group"><label>룰 이름</label><input value={form.name} onChange={(e) => setForm({ ...form, name: e.target.value })} placeholder="예: 대량 유동성 이탈 감지" /></div>
          <div className="field-group"><label>조건 (임계값/패턴)</label><input value={form.threshold} onChange={(e) => setForm({ ...form, threshold: e.target.value })} placeholder="예: value > 100,000 USDC" /></div>
          <div className="field-group">
            <label>대상 체인</label>
            <select value={form.chain} onChange={(e) => setForm({ ...form, chain: e.target.value })}>
              <option>Ethereum</option><option>Polygon</option><option>Arbitrum</option><option>Base</option>
            </select>
          </div>
          <div className="field-group">
            <label>발송 채널</label>
            <select value={form.channel} onChange={(e) => setForm({ ...form, channel: e.target.value })}>
              <option>Slack</option><option>Email</option>
            </select>
          </div>
          <div className="modal-actions">
            <button className="btn btn-ghost" onClick={() => setModalOpen(false)}>취소</button>
            <button className="btn btn-lime" onClick={submit}>생성</button>
          </div>
        </Modal>
      )}
    </div>
  );
}

function Analytics() {
  const [addr, setAddr] = useState('');
  const [hops, setHops] = useState(1);

  const baseNodes = [
    { x: 240, y: 40, label: '0x91Ac…203', main: true, color: '#181818', r: 18 },
    { x: 120, y: 130, label: '0x4Fbe…511', color: '#181818' },
    { x: 360, y: 130, label: '0x2eC1…88a', color: '#181818' },
  ];
  const expandNodes = [
    { x: 60, y: 220, label: '0x77Da…902', color: '#1f2a33' },
    { x: 200, y: 220, label: '0x0aE4…f13', color: '#1f2a33' },
  ];
  const nodes = hops > 1 ? [...baseNodes, ...expandNodes] : baseNodes;
  const edges = hops > 1
    ? [[0,1],[0,2],[1,3],[1,4]]
    : [[0,1],[0,2]];

  return (
    <div>
      <div className="page-head">
        <div>
          <div className="eyebrow">Fund Flow Graph</div>
          <h1 className="page-title">고급 온체인 자금 흐름 분석</h1>
          <div className="page-sub">지갑 주소를 입력하면 다단계 자금 이동 경로를 그래프로 탐색합니다.</div>
        </div>
      </div>

      <div className="toolbar">
        <input className="search-input" placeholder="지갑 주소 입력 (예: 0x91Ac...)" value={addr} onChange={(e) => setAddr(e.target.value)} />
        <button className="btn btn-outline" onClick={() => setHops(1)}><i className="ph ph-magnifying-glass"></i>주소 탐색</button>
      </div>

      <div className="graph-wrap">
        <NodeGraph nodes={nodes} edges={edges} expandable={hops === 1 ? [1, 2] : []} onExpand={() => setHops(2)} />
        <div style={{ fontSize: 12, color: 'var(--sage40)', textAlign: 'center', marginTop: 6 }}>
          {hops === 1 ? '노드를 클릭하면 다음 홉이 확장됩니다' : '2단계 홉까지 확장된 자금 흐름 (중복 경로 제거 적용)'}
        </div>
      </div>
    </div>
  );
}

function Audit() {
  const [role, setRole] = useState('관리자');
  return (
    <div>
      <div className="page-head">
        <div>
          <div className="eyebrow">Access Control</div>
          <h1 className="page-title">역할 기반 접근 제어 및 감사 로그</h1>
          <div className="page-sub">뷰어 / 운영자 / 관리자 3단계 권한과 append-only 감사 로그를 제공합니다.</div>
        </div>
        <div className="role-pill">
          {['뷰어', '운영자', '관리자'].map((r) => (
            <button key={r} className={role === r ? 'active' : ''} onClick={() => setRole(r)}>{r}</button>
          ))}
        </div>
      </div>

      {role === '뷰어' && (
        <div className="window-card" style={{ padding: 20, marginBottom: 18, borderColor: '#e0c64a' }}>
          <span className="tag tag-warn">읽기 전용</span> 뷰어 권한에서는 알림 룰 생성·수정이 비활성화됩니다.
        </div>
      )}

      <WindowCard title="audit.log — append-only">
        <table className="data-table">
          <thead><tr><th>담당자</th><th>액션</th><th>대상</th><th>시각</th></tr></thead>
          <tbody>
            {AUDIT_LOG.map((a, i) => (
              <tr key={i}>
                <td>{a.actor}</td>
                <td>{a.action}</td>
                <td className="mono">{a.target}</td>
                <td className="mono">{a.time}</td>
              </tr>
            ))}
          </tbody>
        </table>
      </WindowCard>
    </div>
  );
}

function ChainsScreen({ addToast }) {
  const [chains, setChains] = useState(CHAINS);
  const [modalOpen, setModalOpen] = useState(false);
  const [form, setForm] = useState({ name: '', rpc: '', abiPreset: 'ERC-20' });

  const submit = () => {
    if (!form.name) return;
    setChains([...chains, { name: form.name, tx: '0', lag: '-', status: 'warn' }]);
    setModalOpen(false);
    setForm({ name: '', rpc: '', abiPreset: 'ERC-20' });
    addToast('체인이 연동되었습니다');
  };

  return (
    <div>
      <div className="page-head">
        <div>
          <div className="eyebrow">Adapters</div>
          <h1 className="page-title">체인 관리</h1>
          <div className="page-sub">체인별 RPC/ABI 어댑터를 등록하면 공통 인터페이스로 대시보드에 자동 연동됩니다.</div>
        </div>
        <button className="btn btn-lime" onClick={() => setModalOpen(true)}><i className="ph ph-plus"></i>신규 체인 연동</button>
      </div>

      <div className="bento" style={{ gridTemplateColumns: 'repeat(4, 1fr)' }}>
        {chains.map((c) => (
          <div className="tile" key={c.name}>
            <div className="tile-eyebrow">Adapter</div>
            <h2 style={{ fontSize: 17 }}>{c.name}</h2>
            <div className="lbl"><span className={`status-dot ${c.status === 'live' ? 'status-live' : 'status-warn'}`}></span>{c.tx} tx · 지연 {c.lag}</div>
          </div>
        ))}
      </div>

      {modalOpen && (
        <Modal title="신규 체인 어댑터 연동" onClose={() => setModalOpen(false)}>
          <div className="field-group"><label>체인 이름</label><input value={form.name} onChange={(e) => setForm({ ...form, name: e.target.value })} placeholder="예: Optimism" /></div>
          <div className="field-group"><label>RPC 엔드포인트</label><input value={form.rpc} onChange={(e) => setForm({ ...form, rpc: e.target.value })} placeholder="https://..." /></div>
          <div className="field-group">
            <label>ABI 프리셋</label>
            <select value={form.abiPreset} onChange={(e) => setForm({ ...form, abiPreset: e.target.value })}>
              <option>ERC-20</option><option>ERC-721</option><option>Custom</option>
            </select>
          </div>
          <div className="modal-actions">
            <button className="btn btn-ghost" onClick={() => setModalOpen(false)}>취소</button>
            <button className="btn btn-lime" onClick={submit}>연동</button>
          </div>
        </Modal>
      )}
    </div>
  );
}

/* ---------- app shell ---------- */
function App() {
  const [screen, setScreen] = useState('main');
  const [toasts, setToasts] = useState([]);
  const [alertDetail, setAlertDetail] = useState(null);

  const addToast = (msg) => {
    const id = Math.random().toString(36).slice(2);
    setToasts((t) => [...t, { id, msg }]);
    setTimeout(() => setToasts((t) => t.filter((x) => x.id !== id)), 2600);
  };

  const navItems = [
    { key: 'main', label: '개요' },
    { key: 'alerts', label: '알림 룰' },
    { key: 'analytics', label: '자금 흐름 분석' },
    { key: 'audit', label: '감사 로그' },
    { key: 'chains', label: '체인 관리' },
  ];

  return (
    <div data-archetype="bento-grid" style={{ width: '100%', minHeight: '100vh' }}>
      <header className="topbar">
        <div className="logo"><div className="logo-mark"></div>ChainScope</div>
        <nav className="top-nav">
          {navItems.map((n) => (
            <button key={n.key} className={screen === n.key ? 'active' : ''} onClick={() => setScreen(n.key)}>{n.label}</button>
          ))}
        </nav>
        <div className="top-actions">
          <button className="icon-btn" onClick={() => addToast('검색 팔레트 준비 중')}><i className="ph ph-magnifying-glass"></i></button>
          <button className="icon-btn" onClick={() => addToast('새 알림 3건이 있습니다')}><i className="ph ph-bell"></i></button>
          <div className="avatar-pill">KD</div>
        </div>
      </header>

      <main className="content">
        {screen === 'main' && <Overview addToast={addToast} openAlert={setAlertDetail} />}
        {screen === 'alerts' && <Alerts addToast={addToast} />}
        {screen === 'analytics' && <Analytics />}
        {screen === 'audit' && <Audit />}
        {screen === 'chains' && <ChainsScreen addToast={addToast} />}
      </main>

      {alertDetail && (
        <Drawer title="알림 상세" onClose={() => setAlertDetail(null)}>
          <div className="drawer-field"><label>알림 ID</label><div className="mono">{alertDetail.id}</div></div>
          <div className="drawer-field"><label>발생 룰</label><div>{alertDetail.rule}</div></div>
          <div className="drawer-field"><label>체인</label><div>{alertDetail.chain}</div></div>
          <div className="drawer-field"><label>심각도</label><div><span className={`tag ${alertDetail.severity === '높음' ? 'tag-warn' : 'tag-lime'}`}>{alertDetail.severity}</span></div></div>
          <div className="drawer-field"><label>발생 시각</label><div>{alertDetail.time}</div></div>
          <div className="drawer-field"><label>발송 이력</label><div className="code-block">{`[Slack] 전송 성공 (1회) — 채널 #onchain-alerts`}</div></div>
        </Drawer>
      )}

      <Toast toasts={toasts} />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
