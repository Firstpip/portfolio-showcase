<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>코칭 실행 관리 보드 — 맞춤 구현 데모</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css">
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone@7.23.0/babel.min.js"></script>
<script src="https://unpkg.com/prop-types@15/prop-types.min.js"></script>
<script src="https://unpkg.com/react-is@18/umd/react-is.production.min.js"></script>
<script src="https://unpkg.com/recharts@2/umd/Recharts.js"></script>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<style>
  :root{
    --forest:#0f3e17;
    --sage:#b1dbb8;
    --mist:#b6ced5;
    --mint:#cfe7d3;
    --linen:#e1f4df;
    --linen-white:#fffefc;
    --hairline:#e5e7eb;
    --charcoal:#222222;
    --graphite:#333333;
    --black:#000000;
    --accent:#a53ad9;
    --accent-soft:#f2e2fb;
  }
  *{box-sizing:border-box;}
  html,body{width:100%;margin:0;padding:0;}
  body{
    font-family:'Pretendard', ui-sans-serif, system-ui, -apple-system, sans-serif;
    background:var(--linen-white);
    color:var(--black);
    -webkit-font-smoothing:antialiased;
  }
  #root{width:100%;min-height:100vh;}
  button{font-family:inherit;cursor:pointer;border:none;background:none;}
  input,select,textarea{font-family:inherit;}
  ::-webkit-scrollbar{height:8px;width:8px;}
  ::-webkit-scrollbar-thumb{background:var(--sage);border-radius:99px;}
  ::-webkit-scrollbar-track{background:transparent;}

  @keyframes fadeInUp{
    from{opacity:0; transform:translateY(10px);}
    to{opacity:1; transform:translateY(0);}
  }
  @keyframes slideInRight{
    from{opacity:0; transform:translateX(24px);}
    to{opacity:1; transform:translateX(0);}
  }
  @keyframes pulseDot{
    0%{box-shadow:0 0 0 0 rgba(165,58,217,0.45);}
    70%{box-shadow:0 0 0 8px rgba(165,58,217,0);}
    100%{box-shadow:0 0 0 0 rgba(165,58,217,0);}
  }
  @keyframes toastIn{
    from{opacity:0; transform:translateY(12px) scale(0.98);}
    to{opacity:1; transform:translateY(0) scale(1);}
  }
  @keyframes fadeIn{
    from{opacity:0;}
    to{opacity:1;}
  }

  .topnav{
    width:100%;
    background:var(--linen-white);
    border-bottom:1px solid var(--hairline);
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:0 32px;
    height:64px;
    position:sticky;
    top:0;
    z-index:40;
  }
  .nav-tab{
    display:flex;
    align-items:center;
    gap:6px;
    padding:9px 14px;
    border-radius:7px;
    font-size:14px;
    font-weight:400;
    color:var(--charcoal);
    letter-spacing:-0.42px;
    transition:background .15s ease, color .15s ease;
    white-space:nowrap;
  }
  .nav-tab:hover{background:var(--linen);}
  .nav-tab.active{background:var(--forest);color:var(--linen-white);}
  .nav-tab.active svg{stroke:var(--linen-white);}

  .board{
    display:flex;
    gap:16px;
    overflow-x:auto;
    padding-bottom:8px;
  }
  .column{
    flex:0 0 280px;
    width:280px;
    border-radius:14px;
    padding:14px;
    display:flex;
    flex-direction:column;
    gap:10px;
    min-height:420px;
    transition:background .2s ease;
  }
  .column.drag-over{outline:2px dashed var(--forest);}
  .col-header{
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:4px 4px 8px 4px;
  }
  .col-title{
    font-size:14px;
    font-weight:400;
    color:var(--charcoal);
    letter-spacing:-0.28px;
  }
  .count{
    display:inline-flex;
    align-items:center;
    justify-content:center;
    min-width:22px;
    height:22px;
    padding:0 7px;
    border-radius:999px;
    background:var(--forest);
    color:var(--linen-white);
    font-size:12px;
    font-weight:400;
  }
  .card{
    background:var(--linen-white);
    border:1px solid var(--hairline);
    border-radius:14px;
    padding:14px;
    display:flex;
    flex-direction:column;
    gap:10px;
    cursor:grab;
    animation:fadeInUp .4s ease both;
    transition:border-color .15s ease, transform .15s ease;
  }
  .card:hover{border-color:var(--forest); transform:translateY(-2px);}
  .card:active{cursor:grabbing;}
  .card-title{
    font-size:14px;
    font-weight:400;
    color:var(--black);
    letter-spacing:-0.42px;
    line-height:1.4;
  }
  .card-meta{
    display:flex;
    align-items:center;
    justify-content:space-between;
  }
  .card-meta-left{
    display:flex;
    align-items:center;
    gap:6px;
  }
  .tag{
    display:inline-flex;
    align-items:center;
    padding:3px 10px;
    border-radius:999px;
    font-size:11px;
    font-weight:400;
    background:var(--mist);
    color:var(--charcoal);
  }
  .priority{
    width:8px;height:8px;border-radius:50%;
    display:inline-block;
  }
  .priority.high{background:var(--accent); animation:pulseDot 2s infinite;}
  .priority.mid{background:#e8b73c;}
  .priority.low{background:var(--sage);}
  .avatar{
    width:26px;height:26px;border-radius:50%;
    overflow:hidden;flex-shrink:0;
    border:1px solid var(--hairline);
  }
  .avatar img{width:100%;height:100%;display:block;}

  .btn-primary{
    display:inline-flex;align-items:center;gap:8px;
    background:var(--forest);color:var(--linen-white);
    padding:11px 21px;border-radius:14px;
    font-size:14px;font-weight:400;letter-spacing:-0.42px;
    transition:opacity .15s ease;
  }
  .btn-primary:hover{opacity:.88;}
  .btn-primary:disabled{opacity:.4;cursor:not-allowed;}
  .btn-ghost{
    display:inline-flex;align-items:center;gap:8px;
    background:transparent;color:var(--forest);
    padding:9px 16px;border-radius:14px;border:1px solid var(--hairline);
    font-size:14px;font-weight:400;
    transition:background .15s ease;
  }
  .btn-ghost:hover{background:var(--linen);}
  .btn-accent{
    display:inline-flex;align-items:center;gap:6px;
    background:var(--accent-soft);color:var(--accent);
    padding:8px 14px;border-radius:999px;
    font-size:12px;font-weight:400;
    transition:background .15s ease;
  }
  .btn-accent:hover{background:#e7c9f5;}

  .pill-badge{
    display:inline-flex;align-items:center;
    padding:7px 14px;border-radius:999px;
    background:var(--mist);color:var(--charcoal);
    font-size:12px;font-weight:400;
  }

  .panel{
    background:var(--linen-white);
    border:1px solid var(--hairline);
    border-radius:14px;
    padding:21px;
  }

  .drawer-overlay{
    position:fixed;inset:0;background:rgba(0,0,0,0.28);
    display:flex;justify-content:flex-end;
    z-index:100;
    animation:fadeIn .2s ease;
  }
  .drawer{
    width:420px;max-width:92vw;height:100%;
    background:var(--linen-white);
    padding:28px;
    overflow-y:auto;
    animation:slideInRight .28s cubic-bezier(.16,1,.3,1);
    border-left:1px solid var(--hairline);
  }
  .modal-overlay{
    position:fixed;inset:0;background:rgba(0,0,0,0.28);
    display:flex;align-items:center;justify-content:center;
    z-index:100;
    animation:fadeIn .2s ease;
    padding:20px;
  }
  .modal{
    width:440px;max-width:100%;
    background:var(--linen-white);
    border-radius:14px;
    padding:28px;
    animation:fadeIn .25s ease;
  }
  .field{display:flex;flex-direction:column;gap:6px;margin-bottom:16px;}
  .field label{font-size:12px;color:var(--graphite);font-weight:400;}
  .field input, .field select, .field textarea{
    border:1px solid var(--hairline);
    border-radius:14px;
    padding:10px 14px;
    font-size:14px;
    color:var(--black);
    background:var(--linen-white);
  }
  .field input:focus, .field select:focus, .field textarea:focus{
    outline:none;border-color:var(--forest);
  }
  .toast{
    position:fixed;bottom:28px;left:50%;transform:translateX(-50%);
    background:var(--forest);color:var(--linen-white);
    padding:14px 24px;border-radius:14px;
    font-size:14px;font-weight:400;
    display:flex;align-items:center;gap:10px;
    animation:toastIn .3s cubic-bezier(.16,1,.3,1);
    z-index:200;
    box-shadow:0 8px 24px rgba(15,62,23,0.18);
  }
  table.matrix-table{width:100%;border-collapse:collapse;}
  table.matrix-table th, table.matrix-table td{
    padding:10px 8px;border-bottom:1px solid var(--hairline);
    font-size:12px;text-align:center;
  }
  table.matrix-table th{color:var(--graphite);font-weight:400;}

  table.data-table{width:100%;border-collapse:collapse;}
  table.data-table th{
    text-align:left;padding:10px 12px;font-size:12px;color:var(--graphite);
    border-bottom:1px solid var(--hairline);font-weight:400;
  }
  table.data-table td{
    padding:12px;font-size:13px;color:var(--black);
    border-bottom:1px solid var(--hairline);
  }
  table.data-table tr:hover td{background:var(--linen);}

  .dropzone{
    border:1.5px dashed var(--hairline);
    border-radius:14px;
    padding:32px;
    text-align:center;
    transition:border-color .15s ease, background .15s ease;
  }
  .dropzone.active{border-color:var(--forest);background:var(--linen);}

  .progress-track{
    width:100%;height:6px;border-radius:999px;background:var(--hairline);overflow:hidden;
  }
  .progress-fill{
    height:100%;background:var(--forest);border-radius:999px;
    transition:width .3s ease;
  }

  @media (max-width: 900px){
    .board{flex-direction:column;overflow-x:visible;}
    .column{width:100%;flex:none;}
    .matrix-side{width:100% !important;}
  }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" data-presets="react">
const { useState, useEffect, useRef, useMemo } = React;
const { RadarChart, PolarGrid, PolarAngleAxis, PolarRadiusAxis, Radar, ResponsiveContainer, Tooltip } = Recharts;

const COLORS = {
  forest:'#0f3e17', sage:'#b1dbb8', mist:'#b6ced5', mint:'#cfe7d3',
  linen:'#e1f4df', linenWhite:'#fffefc', hairline:'#e5e7eb',
  charcoal:'#222222', graphite:'#333333', black:'#000000', accent:'#a53ad9'
};

function Icon({ name, size = 16, className = '', color }) {
  const ref = useRef(null);
  useEffect(() => {
    if (window.lucide) window.lucide.createIcons({ nameAttr: 'data-lucide' });
  });
  return <i ref={ref} data-lucide={name} className={className} style={{ width: size, height: size, color }}></i>;
}

function Avatar({ name, size = 26 }) {
  return (
    <div className="avatar" style={{ width: size, height: size }}>
      <img src={`https://source.boringavatars.com/beam/${size * 2}/${encodeURIComponent(name)}?colors=0f3e17,b1dbb8,b6ced5,cfe7d3,a53ad9`} alt={name} />
    </div>
  );
}

function Toast({ message, onClose }) {
  useEffect(() => {
    const t = setTimeout(onClose, 2600);
    return () => clearTimeout(t);
  }, []);
  return (
    <div className="toast">
      <Icon name="check-circle" size={16} />
      <span>{message}</span>
    </div>
  );
}

// ---------- 상단 네비게이션 ----------
function TopNav({ screen, setScreen }) {
  const tabs = [
    { id: 'main', label: '코칭 실행 보드', icon: 'kanban-square' },
    { id: 'permissions', label: '역할 기반 접근 제어', icon: 'shield-check' },
    { id: 'project', label: '프로젝트 자료 업로드', icon: 'folder-up' },
    { id: 'goal-sheet', label: '코칭 목표 시트 PDF 내보내기', icon: 'file-text' },
  ];
  return (
    <header className="topnav">
      <div style={{ display: 'flex', alignItems: 'center', gap: 32 }}>
        <div style={{ display: 'flex', alignItems: 'center', gap: 8, fontWeight: 400, fontSize: 18, color: COLORS.forest, letterSpacing: '-0.54px' }}>
          <Icon name="leaf" size={20} color={COLORS.forest} />
          코치보드
        </div>
        <nav style={{ display: 'flex', gap: 4 }}>
          {tabs.map(t => (
            <button
              key={t.id}
              className={`nav-tab ${screen === t.id ? 'active' : ''}`}
              onClick={() => setScreen(t.id)}
            >
              <Icon name={t.icon} size={15} />
              <span>{t.label}</span>
            </button>
          ))}
        </nav>
      </div>
      <div style={{ display: 'flex', alignItems: 'center', gap: 12 }}>
        <button className="btn-ghost" onClick={() => setScreen('project')}>
          <Icon name="plus" size={14} />
          코칭 프로젝트 만들기
        </button>
        <Avatar name="관리자 김도윤" size={32} />
      </div>
    </header>
  );
}

// ---------- 보드 화면 ----------
const INITIAL_CARDS = [
  { id: 1, col: 'setup', title: '박서연 — 리더십 커뮤니케이션 목표 수립', tag: '리더십', priority: 'mid', coach: '이현우 코치' },
  { id: 2, col: 'setup', title: '김태민 — 팀 갈등 조정 스킬 목표 수립', tag: '커뮤니케이션', priority: 'low', coach: '정수아 코치' },
  { id: 3, col: 'setup', title: '오하늘 — 타임매니지먼트 목표 초안 검토', tag: '타임매니지먼트', priority: 'low', coach: '이현우 코치' },
  { id: 4, col: 'progress', title: '최윤서 — 주간 1:1 피드백 실행 3회차', tag: '리더십', priority: 'high', coach: '정수아 코치' },
  { id: 5, col: 'progress', title: '한지호 — 발표 스킬 마이크로 미션 진행', tag: '커뮤니케이션', priority: 'mid', coach: '이현우 코치' },
  { id: 6, col: 'progress', title: '배소민 — 업무 우선순위 재정렬 실습', tag: '타임매니지먼트', priority: 'mid', coach: '정수아 코치' },
  { id: 7, col: 'diagnosis', title: '유지안 — 4회차 달성률 자가진단 대기', tag: '리더십', priority: 'high', coach: '이현우 코치' },
  { id: 8, col: 'diagnosis', title: '문시우 — 장애물 입력 후 코치 확인 대기', tag: '커뮤니케이션', priority: 'mid', coach: '정수아 코치' },
  { id: 9, col: 'diagnosis', title: '장예린 — 실행 현황 자가진단 검토중', tag: '타임매니지먼트', priority: 'low', coach: '이현우 코치' },
  { id: 10, col: 'done', title: '남도현 — 8주차 목표 달성 및 리뷰 완료', tag: '리더십', priority: 'low', coach: '정수아 코치' },
  { id: 11, col: 'done', title: '조은우 — 커뮤니케이션 목표 최종 승인', tag: '커뮤니케이션', priority: 'low', coach: '이현우 코치' },
  { id: 12, col: 'done', title: '신아린 — 타임매니지먼트 코칭 종료', tag: '타임매니지먼트', priority: 'low', coach: '정수아 코치' },
];

const COLUMNS = [
  { id: 'setup', title: '목표설정', tint: COLORS.linen },
  { id: 'progress', title: '실행중', tint: COLORS.mint },
  { id: 'diagnosis', title: '자가진단', tint: '#e4eef1' },
  { id: 'done', title: '완료', tint: COLORS.sage + '55' },
];

function BoardScreen({ onToast }) {
  const [cards, setCards] = useState(INITIAL_CARDS);
  const [dragId, setDragId] = useState(null);
  const [dragOverCol, setDragOverCol] = useState(null);
  const [detail, setDetail] = useState(null);
  const [showNew, setShowNew] = useState(false);
  const [coachFilter, setCoachFilter] = useState('전체');
  const [completedCount, setCompletedCount] = useState(0);

  useEffect(() => {
    const target = cards.filter(c => c.col === 'done').length;
    let i = 0;
    const iv = setInterval(() => {
      i += 1;
      setCompletedCount(i);
      if (i >= target) clearInterval(iv);
    }, 90);
    return () => clearInterval(iv);
  }, []);

  const visibleCards = coachFilter === '전체' ? cards : cards.filter(c => c.coach === coachFilter);
  const coaches = ['전체', ...Array.from(new Set(cards.map(c => c.coach)))];

  function handleDrop(colId) {
    if (dragId == null) return;
    setCards(prev => prev.map(c => c.id === dragId ? { ...c, col: colId } : c));
    setDragOverCol(null);
    setDragId(null);
    onToast('카드 단계가 변경되었습니다');
  }

  function addMission(payload) {
    const nextId = Math.max(...cards.map(c => c.id)) + 1;
    setCards(prev => [...prev, { id: nextId, col: 'setup', ...payload }]);
    setShowNew(false);
    onToast('새 마이크로 미션이 등록되었습니다');
  }

  return (
    <div data-archetype="kanban-board" style={{ padding: '28px 32px', width: '100%' }}>
      <div
        className="board-header"
        style={{
          display: 'flex', alignItems: 'flex-end', justifyContent: 'space-between',
          marginBottom: 20, flexWrap: 'wrap', gap: 16,
          padding: '24px 28px', borderRadius: 14, position: 'relative', overflow: 'hidden',
          background: 'linear-gradient(120deg, #e1f4df 0%, #cfe7d3 45%, #b6ced5 100%)',
        }}
      >
        <svg
          width="220" height="220" viewBox="0 0 220 220"
          style={{ position: 'absolute', right: -40, top: -60, opacity: 0.5, pointerEvents: 'none' }}
        >
          <circle cx="110" cy="110" r="95" fill="none" stroke="#0f3e17" strokeOpacity="0.12" strokeWidth="1.5" />
          <circle cx="110" cy="110" r="66" fill="none" stroke="#0f3e17" strokeOpacity="0.16" strokeWidth="1.5" />
          <circle cx="150" cy="70" r="6" fill="#a53ad9" fillOpacity="0.5" />
        </svg>
        <div style={{ position: 'relative' }}>
          <span className="pill-badge" style={{ marginBottom: 10, display: 'inline-flex' }}>2026년 3분기 코칭 워크플로우</span>
          <h1 style={{ fontSize: 40, fontWeight: 300, letterSpacing: '-0.4px', color: COLORS.forest, margin: '10px 0 0', lineHeight: 1.2 }}>
            코칭 실행 보드
          </h1>
        </div>
        <div style={{ display: 'flex', gap: 10, alignItems: 'center', position: 'relative' }}>
          <select className="btn-ghost" style={{ paddingRight: 28, background: COLORS.linenWhite }} value={coachFilter} onChange={e => setCoachFilter(e.target.value)}>
            {coaches.map(c => <option key={c} value={c}>{c}</option>)}
          </select>
          <button className="btn-primary" onClick={() => setShowNew(true)}>
            <Icon name="plus" size={14} />
            새 항목
          </button>
        </div>
      </div>

      <div style={{ display: 'flex', gap: 24, alignItems: 'flex-start' }}>
        <main className="board" style={{ flex: 1, minWidth: 0 }}>
          {COLUMNS.map(col => {
            const colCards = visibleCards.filter(c => c.col === col.id);
            return (
              <section
                key={col.id}
                className={`column ${dragOverCol === col.id ? 'drag-over' : ''}`}
                style={{ background: col.tint }}
                onDragOver={e => { e.preventDefault(); setDragOverCol(col.id); }}
                onDragLeave={() => setDragOverCol(null)}
                onDrop={() => handleDrop(col.id)}
              >
                <div className="col-header">
                  <span className="col-title">{col.title}</span>
                  <span className="count col-count">{colCards.length}</span>
                </div>
                {colCards.map(card => (
                  <div
                    key={card.id}
                    className="card"
                    style={{ borderRadius: 14 }}
                    draggable
                    onDragStart={() => setDragId(card.id)}
                    onClick={() => setDetail(card)}
                  >
                    <div className="card-title">{card.title}</div>
                    <div className="card-meta">
                      <div className="card-meta-left">
                        <span className="tag card-tag">{card.tag}</span>
                        <span className={`priority ${card.priority}`}></span>
                      </div>
                      <span className="card-avatar">
                        <Avatar name={card.coach} size={24} />
                      </span>
                    </div>
                  </div>
                ))}
                {colCards.length === 0 && (

                <div style={{ marginTop: 16 }}>
                  <div className="progress-track"><div className="progress-fill" style={{ width: `${uploading}%` }}></div></div>
                  <p style={{ fontSize: 11, color: COLORS.graphite, marginTop: 6 }}>{uploading}% 업로드 중…</p>
                </div>
              )}
            </div>
          </div>

          <div className="panel">
            <h3 style={{ fontSize: 14, fontWeight: 400, margin: '0 0 14px' }}>자료실</h3>
            <table className="data-table">
              <thead><tr><th>파일명</th><th>대상자</th><th>용량</th><th>업로드일</th></tr></thead>
              <tbody>
                {pageFiles.map((f, i) => (
                  <tr key={i} style={{ cursor: 'pointer' }} onClick={() => setSelectedFile(f)}>
                    <td style={{ display: 'flex', alignItems: 'center', gap: 8 }}><Icon name="file-text" size={14} color={COLORS.forest} />{f.name}</td>
                    <td>{f.target}</td>
                    <td style={{ color: COLORS.graphite }}>{f.size}</td>
                    <td style={{ color: COLORS.graphite }}>{f.date}</td>
                  </tr>
                ))}
              </tbody>
            </table>
            <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginTop: 14 }}>
              <span style={{ fontSize: 12, color: COLORS.graphite }}>총 {FILES.length}건 · 20건 단위 페이지네이션</span>
              <div style={{ display: 'flex', gap: 6 }}>
                <button className="btn-ghost" style={{ padding: '6px 12px' }} disabled={page <= 1} onClick={() => setPage(p => p - 1)}>이전</button>
                <button className="btn-ghost" style={{ padding: '6px 12px' }} disabled={page >= totalPages} onClick={() => setPage(p => p + 1)}>다음</button>
              </div>
            </div>
          </div>
        </div>
      </div>

      {selectedFile && (
        <div className="drawer-overlay" onClick={() => setSelectedFile(null)}>
          <div className="drawer" onClick={e => e.stopPropagation()}>
            <div style={{ display: 'flex', justifyContent: 'space-between' }}>
              <Icon name="file-text" size={28} color={COLORS.forest} />
              <button onClick={() => setSelectedFile(null)}><Icon name="x" size={18} /></button>
            </div>
            <h2 style={{ fontSize: 20, fontWeight: 400, margin: '16px 0 4px' }}>{selectedFile.name}</h2>
            <p style={{ fontSize: 12, color: COLORS.graphite, marginBottom: 20 }}>{selectedFile.target} · {selectedFile.size} · {selectedFile.date}</p>
            <button className="btn-primary" style={{ width: '100%', justifyContent: 'center' }} onClick={() => { onToast('대상자에게 다운로드 알림을 보냈습니다'); setSelectedFile(null); }}>
              <Icon name="download" size={14} />
              대상자 다운로드 알림
            </button>
          </div>
        </div>
      )}
    </div>
  );
}

// ---------- 목표 시트 화면 ----------
function GoalSheetScreen({ onToast }) {
  const [obstacle, setObstacle] = useState('');
  const [support, setSupport] = useState('');
  const [scores, setScores] = useState([
    { item: '실행력', value: 72 },
    { item: '자기인식', value: 65 },
    { item: '피드백 반영', value: 80 },
    { item: '목표 명확성', value: 58 },
    { item: '지속성', value: 70 },
  ]);
  const [generating, setGenerating] = useState(false);

  function submitDiagnosis() {
    setScores(prev => prev.map(s => ({ ...s, value: Math.min(100, s.value + Math.floor(Math.random() * 8)) })));
    onToast('자가진단이 반영되어 달성률이 갱신되었습니다');
  }

  function exportPdf() {
    setGenerating(true);
    setTimeout(() => { setGenerating(false); onToast('목표 시트 PDF가 생성되었습니다'); }, 1500);
  }

  const avg = Math.round(scores.reduce((a, b) => a + b.value, 0) / scores.length);

  return (
    <div style={{ padding: '28px 32px', width: '100%' }}>
      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-end', marginBottom: 20, flexWrap: 'wrap', gap: 16 }}>
        <div>
          <span className="pill-badge">박서연 님의 목표 시트</span>
          <h1 style={{ fontSize: 40, fontWeight: 300, color: COLORS.forest, letterSpacing: '-0.4px', margin: '10px 0 0' }}>코칭 목표 시트 PDF 내보내기</h1>
        </div>
        <button className="btn-primary" onClick={exportPdf} disabled={generating}>
          <Icon name={generating ? 'loader' : 'download'} size={14} />
          {generating ? 'PDF 생성 중…' : '목표 시트 PDF 다운로드'}
        </button>
      </div>

      <div style={{ display: 'grid', gridTemplateColumns: '1.2fr 1fr', gap: 24, alignItems: 'flex-start' }}>
        <div className="panel">
          <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 8 }}>
            <h3 style={{ fontSize: 14, fontWeight: 400, margin: 0 }}>정량 목표 달성률 자가진단</h3>
            <span style={{ fontSize: 28, fontWeight: 300, color: COLORS.forest }}>{avg}%</span>
          </div>
          <div style={{ height: 260 }}>
            <ResponsiveContainer width="100%" height="100%">
              <RadarChart data={scores} outerRadius="75%">
                <PolarGrid stroke={COLORS.hairline} />
                <PolarAngleAxis dataKey="item" tick={{ fontSize: 12, fill: COLORS.charcoal }} />
                <PolarRadiusAxis angle={30} domain={[0, 100]} tick={{ fontSize: 10, fill: COLORS.graphite }} />
                <Radar dataKey="value" stroke={COLORS.forest} fill={COLORS.sage} fillOpacity={0.55} />
                <Tooltip />
              </RadarChart>
            </ResponsiveContainer>
          </div>

          <div style={{ marginTop: 14, paddingTop: 14, borderTop: `1px solid ${COLORS.hairline}` }}>
            <h4 style={{ fontSize: 13, fontWeight: 400, margin: '0 0 10px' }}>정성 목표</h4>
            <div style={{ display: 'flex', flexDirection: 'column', gap: 8 }}>
              {['팀원과의 신뢰 기반 대화 습관 형성', '실패를 학습 기회로 재해석하는 태도 강화'].map((g, i) => (
                <div key={i} style={{ display: 'flex', alignItems: 'center', gap: 8, fontSize: 13 }}>
                  <Icon name="target" size={14} color={COLORS.accent} />
                  {g}
                </div>
              ))}
            </div>
          </div>
        </div>

        <div className="panel">
          <h3 style={{ fontSize: 14, fontWeight: 400, margin: '0 0 14px' }}>실행 현황 자가진단 입력</h3>
          <div className="field">
            <label>이번 주 장애물</label>
            <textarea rows="3" value={obstacle} onChange={e => setObstacle(e.target.value)} placeholder="예: 팀 회의 일정이 겹쳐 1:1 피드백 시간 확보가 어려웠습니다"></textarea>
          </div>
          <div className="field">
            <label>필요한 지원</label>
            <textarea rows="3" value={support} onChange={e => setSupport(e.target.value)} placeholder="예: 코치와의 추가 세션 또는 참고 자료 요청"></textarea>
          </div>
          <button className="btn-primary" style={{ width: '100%', justifyContent: 'center' }} onClick={submitDiagnosis}>
            <Icon name="refresh-cw" size={14} />
            자가진단 반영
          </button>

          <div style={{ marginTop: 18, paddingTop: 16, borderTop: `1px solid ${COLORS.hairline}` }}>
            <h4 style={{ fontSize: 13, fontWeight: 400, margin: '0 0 10px' }}>부여된 마이크로 미션</h4>
            {['주간 실행 로그 3건 작성', '동료 피드백 1건 수집'].map((m, i) => (
              <div key={i} style={{ display: 'flex', alignItems: 'center', gap: 8, fontSize: 13, padding: '8px 0', borderBottom: i === 0 ? `1px solid ${COLORS.hairline}` : 'none' }}>
                <Icon name="check-circle" size={14} color={COLORS.forest} />
                {m}
              </div>
            ))}
          </div>
        </div>
      </div>
    </div>
  );
}

function App() {
  const [screen, setScreen] = useState('main');
  const [toast, setToast] = useState(null);
  const showToast = (msg) => setToast(msg);

  return (
    <div style={{ width: '100%', minHeight: '100vh', display: 'flex', flexDirection: 'column' }}>
      <TopNav screen={screen} setScreen={setScreen} />
      <main style={{ flex: 1, width: '100%' }}>
        {screen === 'main' && <BoardScreen onToast={showToast} />}
        {screen === 'permissions' && <PermissionsScreen onToast={showToast} />}
        {screen === 'project' && <ProjectScreen onToast={showToast} />}
        {screen === 'goal-sheet' && <GoalSheetScreen onToast={showToast} />}
      </main>
      {toast && <Toast message={toast} onClose={() => setToast(null)} />}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
