<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>코칭 성과 분석 플랫폼 — 구현 데모</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css">
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone@7.23.0/babel.min.js"></script>
<script src="https://unpkg.com/prop-types@15/prop-types.min.js"></script>
<script src="https://unpkg.com/react-is@18/umd/react-is.production.min.js"></script>
<script src="https://unpkg.com/recharts@2/umd/Recharts.js"></script>
<link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/regular/style.css">
<style>
  :root{
    --wine:#421d24;
    --violet:#714cb6;
    --lilac:#d4c7ff;
    --lagoon:#0c4243;
    --parchment:#f2f0eb;
    --mist:#e3e3e2;
    --ink:#292827;
    --stone:#666666;
    --paper:#ffffff;
    --gold:#f6bc1e;
  }
  *{box-sizing:border-box;}
  html,body{width:100%;margin:0;padding:0;}
  body{
    font-family:'Pretendard', ui-sans-serif, system-ui, -apple-system, sans-serif;
    background:var(--parchment);
    color:var(--ink);
    -webkit-font-smoothing:antialiased;
  }
  #root{width:100%;min-height:100vh;}
  button{font-family:inherit;cursor:pointer;border:none;background:none;}
  input,select,textarea{font-family:inherit;}
  ::-webkit-scrollbar{height:8px;width:8px;}
  ::-webkit-scrollbar-thumb{background:var(--lilac);border-radius:99px;}
  ::-webkit-scrollbar-track{background:transparent;}

  @keyframes fadeInUp{
    from{opacity:0; transform:translateY(12px);}
    to{opacity:1; transform:translateY(0);}
  }
  @keyframes scaleIn{
    from{opacity:0; transform:scale(0.97);}
    to{opacity:1; transform:scale(1);}
  }
  @keyframes shimmer{
    0%{background-position:-200px 0;}
    100%{background-position:200px 0;}
  }
  @keyframes toastIn{
    from{opacity:0; transform:translateY(14px);}
    to{opacity:1; transform:translateY(0);}
  }
  @keyframes fadeIn{ from{opacity:0;} to{opacity:1;} }

  .sidebar{
    position:fixed;left:0;top:0;bottom:0;width:240px;
    background:var(--paper);
    border-right:1px solid var(--mist);
    padding:20px 14px;
    overflow-y:auto;
    z-index:30;
  }
  .sidebar-brand{
    display:flex;align-items:center;gap:8px;
    padding:6px 8px 20px;
    font-size:16px;font-weight:600;color:var(--wine);letter-spacing:-0.3px;
  }
  .sidebar-section{margin-bottom:18px;}
  .sidebar-section-title{
    font-size:11px;color:var(--stone);font-weight:700;
    text-transform:uppercase;letter-spacing:0.06em;
    padding:0 10px;margin-bottom:8px;
  }
  .sidebar-link{
    display:flex;align-items:center;gap:10px;
    padding:9px 10px;border-radius:8px;
    font-size:14px;color:var(--ink);font-weight:400;
    margin-bottom:2px;
    transition:background .15s ease;
  }
  .sidebar-link:hover{background:var(--parchment);}
  .sidebar-link.active{background:var(--lilac);color:var(--ink);font-weight:600;}

  .main-wrap{
    margin-left:240px;
    min-height:100vh;
    flex:1;
    min-width:0;
    width:calc(100% - 240px);
  }
  .page-header{
    padding:24px 32px 0;
  }
  .page-title-row{
    display:flex;align-items:flex-end;justify-content:space-between;flex-wrap:wrap;gap:14px;
  }
  .page-title{
    font-size:32px;font-weight:600;color:var(--wine);letter-spacing:-0.6px;margin:0;line-height:1.2;
  }
  .page-meta{font-size:12px;color:var(--stone);margin-top:6px;}

  .btn-primary{
    display:inline-flex;align-items:center;gap:8px;
    background:var(--wine);color:#fff;
    padding:11px 20px;border-radius:16px;
    font-size:14px;font-weight:600;letter-spacing:-0.1px;
    transition:opacity .15s ease;
  }
  .btn-primary:hover{opacity:.9;}
  .btn-primary:disabled{opacity:.4;cursor:not-allowed;}
  .btn-secondary{
    display:inline-flex;align-items:center;gap:8px;
    background:var(--lilac);color:var(--ink);
    border:1px solid var(--ink);
    padding:6px 16px;border-radius:8px;
    font-size:13px;font-weight:600;
    transition:background .15s ease;
  }
  .btn-secondary:hover{background:#c4b2fb;}
  .btn-ghost{
    display:inline-flex;align-items:center;gap:6px;
    background:transparent;color:var(--ink);
    padding:8px 12px;border-radius:8px;border:1px solid var(--mist);
    font-size:13px;font-weight:400;
    transition:background .15s ease;
  }
  .btn-ghost:hover{background:var(--parchment);}
  .btn-ghost.active{background:var(--wine);color:#fff;border-color:var(--wine);}

  .card{
    background:var(--paper);
    border-radius:16px;
    padding:16px;
    box-shadow:inset 0 0 0 1px rgba(113,76,182,0.16);
    animation:fadeInUp .4s ease both;
  }
  .stat-card{
    background:var(--paper);
    border-radius:16px;
    padding:18px 20px;
    box-shadow:inset 0 0 0 1px rgba(113,76,182,0.16);
    display:flex;flex-direction:column;gap:8px;
    transition:box-shadow .2s ease, transform .2s ease;
  }
  .stat-card:hover{box-shadow:inset 0 0 0 1.5px var(--gold); transform:scale(1.015);}
  .stat-label{font-size:12px;color:var(--stone);font-weight:600;}
  .stat-value{font-size:32px;font-weight:600;color:var(--wine);letter-spacing:-0.5px;line-height:1;}
  .stat-delta{font-size:12px;font-weight:700;display:flex;align-items:center;gap:4px;}
  .stat-delta.positive{color:#3f8c5a;}
  .stat-delta.negative{color:#c0483c;}

  .pill{
    display:inline-flex;align-items:center;gap:6px;
    padding:6px 14px;border-radius:999px;
    background:var(--lilac);color:var(--ink);
    font-size:12px;font-weight:600;
  }
  .pill.gold{background:#fdf0d0;color:#8a6600;}

  .tab-bar{
    display:flex;gap:4px;border-bottom:1px solid var(--mist);margin-bottom:14px;
  }
  .tab{
    padding:10px 16px;font-size:13px;font-weight:600;color:var(--stone);
    border-bottom:2px solid transparent;
    transition:color .15s ease, border-color .15s ease;
  }
  .tab.active{color:var(--wine);border-bottom-color:var(--gold);}

  table.data-table{width:100%;border-collapse:collapse;}
  table.data-table th{
    text-align:left;padding:10px 12px;font-size:11px;color:var(--stone);
    border-bottom:1px solid var(--mist);font-weight:700;text-transform:uppercase;letter-spacing:0.03em;
  }
  table.data-table td{
    padding:12px;font-size:13px;color:var(--ink);
    border-bottom:1px solid var(--mist);
  }
  table.data-table tr{transition:background .15s ease;}
  table.data-table tr:hover td{background:var(--parchment);}

  .badge{
    display:inline-flex;align-items:center;gap:4px;
    padding:3px 10px;border-radius:6px;font-size:11px;font-weight:700;
  }
  .badge.success{background:#e2f3e6;color:#2e7d46;}
  .badge.progress{background:#fdf0d0;color:#8a6600;}
  .badge.risk{background:#fbe4e1;color:#a8382c;}

  .drawer-overlay{
    position:fixed;inset:0;background:rgba(41,40,39,0.3);
    display:flex;justify-content:flex-end;z-index:100;
    animation:fadeIn .2s ease;
  }
  .drawer{
    width:420px;max-width:92vw;height:100%;background:var(--paper);
    padding:28px;overflow-y:auto;
    animation:fadeInUp .28s cubic-bezier(.16,1,.3,1);
    border-left:1px solid var(--mist);
  }
  .modal-overlay{
    position:fixed;inset:0;background:rgba(41,40,39,0.3);
    display:flex;align-items:center;justify-content:center;z-index:100;
    animation:fadeIn .2s ease;padding:20px;
  }
  .modal{
    width:460px;max-width:100%;background:var(--paper);
    border-radius:16px;padding:28px;
    animation:scaleIn .25s cubic-bezier(.16,1,.3,1);
  }
  .field{display:flex;flex-direction:column;gap:6px;margin-bottom:16px;}
  .field label{font-size:12px;color:var(--stone);font-weight:600;}
  .field input, .field select, .field textarea{
    border:1px solid var(--mist);border-radius:8px;
    padding:9px 12px;font-size:14px;color:var(--ink);background:var(--parchment);
  }
  .field input:focus, .field select:focus{outline:none;border-color:var(--violet);}
  .checkbox-row{display:flex;align-items:center;gap:8px;font-size:13px;padding:6px 0;}

  .toast{
    position:fixed;bottom:28px;left:50%;transform:translateX(-50%);
    background:var(--wine);color:#fff;padding:14px 24px;border-radius:16px;
    font-size:14px;font-weight:600;display:flex;align-items:center;gap:10px;
    animation:toastIn .3s cubic-bezier(.16,1,.3,1);z-index:200;
    box-shadow:0 10px 28px rgba(66,29,36,0.25);
  }

  .skeleton{
    background:linear-gradient(90deg, #eeece5 0px, #f7f6f2 40px, #eeece5 80px);
    background-size:400px 100%;
    animation:shimmer 1.4s infinite linear;
    border-radius:8px;
  }

  @media (max-width: 960px){
    .sidebar{width:200px;}
    .main-wrap{margin-left:200px;width:calc(100% - 200px);}
    .grid-2{grid-template-columns:1fr !important;}
  }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" data-presets="react">
const { useState, useEffect, useRef } = React;
const { AreaChart, Area, BarChart, Bar, PieChart, Pie, Cell, XAxis, YAxis, CartesianGrid, Tooltip, ResponsiveContainer, Legend } = Recharts;

const COLORS = {
  wine:'#421d24', violet:'#714cb6', lilac:'#d4c7ff', lagoon:'#0c4243',
  parchment:'#f2f0eb', mist:'#e3e3e2', ink:'#292827', stone:'#666666',
  paper:'#ffffff', gold:'#f6bc1e'
};
const PIE_COLORS = [COLORS.wine, COLORS.violet, COLORS.lilac, COLORS.gold];

function Icon({ name, size = 16, style = {} }) {
  return <i className={`ph ph-${name}`} style={{ fontSize: size, ...style }}></i>;
}

function Avatar({ name, size = 26 }) {
  return (
    <img
      src={`https://source.boringavatars.com/marble/${size * 2}/${encodeURIComponent(name)}?colors=421d24,714cb6,d4c7ff,f6bc1e`}
      alt={name}
      style={{ width: size, height: size, borderRadius: '50%', flexShrink: 0, border: `1px solid ${COLORS.mist}` }}
    />
  );
}

function Sparkline({ data, color = COLORS.gold }) {
  const max = Math.max(...data);
  const min = Math.min(...data);
  const pts = data.map((v, i) => {
    const x = (i / (data.length - 1)) * 64;
    const y = 24 - ((v - min) / (max - min || 1)) * 22;
    return `${x},${y}`;
  }).join(' ');
  return (
    <svg width="64" height="24" viewBox="0 0 64 24">
      <polyline points={pts} fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" />
    </svg>
  );
}

function Toast({ message, onClose }) {
  useEffect(() => { const t = setTimeout(onClose, 2600); return () => clearTimeout(t); }, []);
  return (
    <div className="toast">
      <Icon name="check-circle" size={16} />
      <span>{message}</span>
    </div>
  );
}

const NAV = [
  { group: '분석', items: [
    { id: 'main', label: '역할별 통합 성과 대시보드', icon: 'squares-four' },
    { id: 'review', label: '최종 결과 리뷰 페이지', icon: 'file-text' },
  ]},
  { group: '운영', items: [
    { id: 'comparison', label: '코치·대상자 성과 비교 분석', icon: 'chart-bar' },
    { id: 'operations', label: '다중 프로젝트 운영 현황', icon: 'kanban' },
  ]},
];

function Sidebar({ screen, setScreen }) {
  return (
    <aside className="sidebar" data-sidebar>
      <div className="sidebar-brand">
        <Icon name="compass" size={20} />
        코칭 인사이트
      </div>
      {NAV.map(g => (
        <div className="sidebar-section" key={g.group}>
          <div className="sidebar-section-title">{g.group}</div>
          {g.items.map(item => (
            <a
              key={item.id}
              className={`sidebar-link ${screen === item.id ? 'active' : ''}`}
              onClick={() => setScreen(item.id)}
            >
              <Icon name={item.icon} size={16} />
              {item.label}
            </a>
          ))}
        </div>
      ))}
      <div className="sidebar-section" style={{ marginTop: 30, paddingTop: 16, borderTop: `1px solid ${COLORS.mist}` }}>
        <div style={{ display: 'flex', alignItems: 'center', gap: 8, padding: '0 10px' }}>
          <Avatar name="관리자 서지우" size={28} />
          <div>
            <div style={{ fontSize: 12, fontWeight: 700 }}>서지우</div>
            <div style={{ fontSize: 11, color: COLORS.stone }}>관리자</div>
          </div>
        </div>
      </div>
    </aside>
  );
}

// ---------- 메인 대시보드 ----------
const TREND = [
  { m: '1월', rate: 58 }, { m: '2월', rate: 62 }, { m: '3월', rate: 65 },
  { m: '4월', rate: 70 }, { m: '5월', rate: 74 }, { m: '6월', rate: 78 },
];
const PIE_DATA = [
  { name: '리더십', value: 38 }, { name: '커뮤니케이션', value: 29 },
  { name: '타임매니지먼트', value: 21 }, { name: '기타', value: 12 },
];
const BAR_DATA = [
  { coach: '이현우', sessions: 42 }, { coach: '정수아', sessions: 36 },
  { coach: '박지현', sessions: 28 }, { coach: '한도경', sessions: 19 },
];

function MainDashboard({ onToast }) {
  const [role, setRole] = useState('관리자');
  const [generating, setGenerating] = useState(false);
  const [achieveCount, setAchieveCount] = useState(0);
  const roles = ['관리자', 'PM', '고객사 담당자'];

  useEffect(() => {
    let i = 0;
    const iv = setInterval(() => {
      i += 3;
      if (i >= 78) { setAchieveCount(78); clearInterval(iv); return; }
      setAchieveCount(i);
    }, 25);
    return () => clearInterval(iv);
  }, []);

  function generateReport() {
    setGenerating(true);
    setTimeout(() => { setGenerating(false); onToast('대시보드 리포트 PDF가 생성되었습니다'); }, 1400);
  }
  return (
    <div>
      <div className="page-header">
        <div className="page-title-row">
          <div>
            <h1 className="page-title">역할별 통합 성과 대시보드</h1>
            <p className="page-meta">마지막 업데이트 6월 24일 09:12 · Production</p>
          </div>
          <div style={{ display: 'flex', gap: 10 }}>
            <button className="btn-ghost" onClick={() => onToast('최근 6개월 구간으로 데이터를 조회합니다')}><Icon name="calendar-blank" size={14} />최근 6개월</button>
            <button className="btn-primary" onClick={generateReport} disabled={generating}><Icon name={generating ? 'circle-notch' : 'file-arrow-down'} size={14} />{generating ? '생성 중…' : '리포트 생성'}</button>
          </div>
        </div>
        <div className="tab-bar" style={{ marginTop: 20 }}>
          {roles.map(r => (
            <button key={r} className={`tab ${role === r ? 'active' : ''}`} onClick={() => setRole(r)}>{r} 화면</button>
          ))}
        </div>
      </div>

      <div style={{ padding: '0 32px 32px', display: 'grid', gridTemplateColumns: '2fr 1fr', gap: 20 }} className="grid-2">
        <div className="card" data-stat-row style={{ padding: 20 }}>
          <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 6 }}>
            <h3 style={{ fontSize: 15, fontWeight: 700, margin: 0 }}>목표 달성률 추이 — {role} 화면</h3>
            <span className="pill gold">+20%p (6개월)</span>
          </div>
          <div style={{ height: 300 }}>
            <ResponsiveContainer width="100%" height="100%">
              <AreaChart data={TREND}>
                <defs>
                  <linearGradient id="areaFill" x1="0" y1="0" x2="0" y2="1">
                    <stop offset="0%" stopColor={COLORS.wine} stopOpacity={0.35} />
                    <stop offset="100%" stopColor={COLORS.wine} stopOpacity={0.02} />
                  </linearGradient>
                </defs>
                <CartesianGrid stroke={COLORS.mist} vertical={false} />
                <XAxis dataKey="m" tick={{ fontSize: 12, fill: COLORS.stone }} axisLine={false} tickLine={false} />
                <YAxis tick={{ fontSize: 12, fill: COLORS.stone }} axisLine={false} tickLine={false} />
                <Tooltip />
                <Area type="monotone" dataKey="rate" stroke={COLORS.wine} strokeWidth={2.5} fill="url(#areaFill)" />
              </AreaChart>
            </ResponsiveContainer>
          </div>
        </div>

        <div style={{ display: 'flex', flexDirection: 'column', gap: 16 }}>
          <div className="stat-card" style={{ borderRadius: 16, boxShadow: '0 1px 3px rgba(66,29,36,0.08)' }}>
            <span className="stat-label">이번 분기 평균 달성률</span>
            <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-end' }}>
              <span className="stat-value">{achieveCount}%</span>
              <Sparkline data={[58, 62, 65, 70, 74, 78]} />
            </div>
            <span className="stat-delta positive"><Icon name="trend-up" size={12} />전분기 대비 +14%p</span>
          </div>
          <div className="stat-card">
            <span className="stat-label">완료된 코칭 세션</span>
            <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-end' }}>
              <span className="stat-value">132회</span>
              <Sparkline data={[12, 18, 22, 25, 28, 27]} color={COLORS.violet} />
            </div>
            <span className="stat-delta positive"><Icon name="trend-up" size={12} />전월 대비 +9회</span>
          </div>
          <div className="stat-card">
            <span className="stat-label">활성 코칭 대상자</span>
            <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-end' }}>
              <span className="stat-value">46명</span>
              <Sparkline data={[30, 34, 38, 40, 44, 46]} color={COLORS.lilac.replace('#d4c7ff', '#8a6fce')} />
            </div>
            <span className="stat-delta negative"><Icon name="trend-down" size={12} />이탈 2명 발생</span>
          </div>
        </div>
      </div>

      <div style={{ padding: '0 32px 32px', display: 'grid', gridTemplateColumns: '1fr 1fr 1fr', gap: 20 }} className="grid-2">
        <div className="card">
          <h4 style={{ fontSize: 13, fontWeight: 700, margin: '0 0 10px' }}>목표 유형 분포</h4>
          <div style={{ height: 160 }}>
            <ResponsiveContainer width="100%" height="100%">
              <PieChart>
                <Pie data={PIE_DATA} dataKey="value" nameKey="name" innerRadius={38} outerRadius={60} paddingAngle={2}>
                  {PIE_DATA.map((e, i) => <Cell key={i} fill={PIE_COLORS[i % PIE_COLORS.length]} />)}
                </Pie>
                <Tooltip />
              </PieChart>
            </ResponsiveContainer>
          </div>
        </div>
        <div className="card">
          <h4 style={{ fontSize: 13, fontWeight: 700, margin: '0 0 10px' }}>코치별 세션 수</h4>
          <div style={{ height: 160 }}>
            <ResponsiveContainer width="100%" height="100%">
              <BarChart data={BAR_DATA}>
                <XAxis dataKey="coach" tick={{ fontSize: 10, fill: COLORS.stone }} axisLine={false} tickLine={false} />
                <YAxis hide />
                <Tooltip />
                <Bar dataKey="sessions" fill={COLORS.violet} radius={[6, 6, 0, 0]} />
              </BarChart>
            </ResponsiveContainer>
          </div>
        </div>
        <div className="card">
          <h4 style={{ fontSize: 13, fontWeight: 700, margin: '0 0 10px' }}>최근 활동 타임라인</h4>
          <div style={{ display: 'flex', flexDirection: 'column', gap: 10 }}>
            {[
              { t: '09:12', d: '박서연 목표 시트 PDF 다운로드' },
              { t: '08:40', d: '이현우 코치 마이크로 미션 부여' },
              { t: '어제', d: '3분기 리더십 코칭 프로젝트 개설' },
            ].map((e, i) => (
              <div key={i} style={{ display: 'flex', gap: 10, fontSize: 12 }}>
                <span style={{ color: COLORS.stone, minWidth: 34 }}>{e.t}</span>
                <span>{e.d}</span>
              </div>
            ))}
          </div>
        </div>
      </div>
    </div>
  );
}

// ---------- 최종 결과 리뷰 ----------
const REVIEW_ROWS = [
  { name: '박서연', project: '3분기 리더십 코칭', achieve: 92, coach: '이현우', status: '완료' },
  { name: '김태민', project: '3분기 리더십 코칭', achieve: 84, coach: '이현우', status: '완료' },

                  <td style={{ color: COLORS.stone }}>{REVIEW_ROWS[0].project}</td>

                  <td>{REVIEW_ROWS[1].coach}</td>
                  <td>{REVIEW_ROWS[1].achieve}%</td>
                  <td><span className="badge success">{REVIEW_ROWS[1].status}</span></td>
                </tr>
                <tr style={{ cursor: 'pointer' }} onClick={() => setDetail(REVIEW_ROWS[2])}>
                  <td style={{ display: 'flex', alignItems: 'center', gap: 8 }}><Avatar name={REVIEW_ROWS[2].name} size={22} />{REVIEW_ROWS[2].name}</td>
                  <td style={{ color: COLORS.stone }}>{REVIEW_ROWS[2].project}</td>
                  <td>{REVIEW_ROWS[2].coach}</td>
                  <td>{REVIEW_ROWS[2].achieve}%</td>
                  <td><span className="badge progress">{REVIEW_ROWS[2].status}</span></td>
                </tr>
                <tr style={{ cursor: 'pointer' }} onClick={() => setDetail(REVIEW_ROWS[3])}>
                  <td style={{ display: 'flex', alignItems: 'center', gap: 8 }}><Avatar name={REVIEW_ROWS[3].name} size={22} />{REVIEW_ROWS[3].name}</td>
                  <td style={{ color: COLORS.stone }}>{REVIEW_ROWS[3].project}</td>
                  <td>{REVIEW_ROWS[3].coach}</td>
                  <td>{REVIEW_ROWS[3].achieve}%</td>
                  <td><span className="badge success">{REVIEW_ROWS[3].status}</span></td>
                </tr>
                <tr style={{ cursor: 'pointer' }} onClick={() => setDetail(REVIEW_ROWS[4])}>
                  <td style={{ display: 'flex', alignItems: 'center', gap: 8 }}><Avatar name={REVIEW_ROWS[4].name} size={22} />{REVIEW_ROWS[4].name}</td>
                  <td style={{ color: COLORS.stone }}>{REVIEW_ROWS[4].project}</td>
                  <td>{REVIEW_ROWS[4].coach}</td>
                  <td>{REVIEW_ROWS[4].achieve}%</td>
                  <td><span className="badge progress">{REVIEW_ROWS[4].status}</span></td>
                </tr>
                <tr style={{ cursor: 'pointer' }} onClick={() => setDetail(REVIEW_ROWS[5])}>
                  <td style={{ display: 'flex', alignItems: 'center', gap: 8 }}><Avatar name={REVIEW_ROWS[5].name} size={22} />{REVIEW_ROWS[5].name}</td>
                  <td style={{ color: COLORS.stone }}>{REVIEW_ROWS[5].project}</td>
                  <td>{REVIEW_ROWS[5].coach}</td>
                  <td>{REVIEW_ROWS[5].achieve}%</td>
                  <td><span className="badge success">{REVIEW_ROWS[5].status}</span></td>
                </tr>
              </tbody>
            </table>
          )}
          {tab === '코치 피드백' && (
            <div style={{ display: 'flex', flexDirection: 'column', gap: 14 }}>
              {REVIEW_ROWS.slice(0, 4).map((r, i) => (
                <div key={i} style={{ display: 'flex', gap: 12, paddingBottom: 14, borderBottom: i < 3 ? `1px solid ${COLORS.mist}` : 'none' }}>
                  <Avatar name={r.coach} size={30} />
                  <div>
                    <div style={{ fontSize: 13, fontWeight: 700 }}>{r.coach} 코치 → {r.name}</div>
                    <div style={{ fontSize: 12, color: COLORS.stone, marginTop: 4 }}>목표 대비 실행 완성도가 높으며, 다음 분기에는 동료 피드백 수집을 확대할 것을 제안합니다.</div>
                  </div>
                </div>
              ))}
            </div>
          )}
          {tab === '최종 성과' && (
            <div style={{ height: 240 }}>
              <ResponsiveContainer width="100%" height="100%">
                <BarChart data={REVIEW_ROWS}>
                  <XAxis dataKey="name" tick={{ fontSize: 11, fill: COLORS.stone }} axisLine={false} tickLine={false} />

        <div className="card" style={{ marginTop: 20 }}>

          <div style={{ display: 'flex', flexDirection: 'column', gap: 0 }}>
            {['1회차 · 목표 수립', '2~3회차 · 실행 로그 점검', '4회차 · 중간 자가진단', '5~7회차 · 마이크로 미션 수행', '8회차 · 최종 리뷰'].map((s, i) => (
              <div key={i} onClick={() => onToast(`${s} 상세 기록으로 이동합니다`)} style={{ display: 'flex', alignItems: 'center', gap: 10, padding: '10px 4px', cursor: 'pointer', borderBottom: i < 4 ? `1px solid ${COLORS.mist}` : 'none' }}>
                <span style={{ width: 8, height: 8, borderRadius: '50%', background: COLORS.gold }}></span>
                <span style={{ fontSize: 13 }}>{s}</span>

      {detail && (
        <div className="drawer-overlay" onClick={() => setDetail(null)}>
          <div className="drawer" onClick={e => e.stopPropagation()}>
            <div style={{ display: 'flex', justifyContent: 'space-between' }}>
              <Avatar name={detail.name} size={40} />

            </div>
            <h2 style={{ fontSize: 20, fontWeight: 700, margin: '14px 0 4px' }}>{detail.name}</h2>
            <p style={{ fontSize: 12, color: COLORS.stone, marginBottom: 20 }}>{detail.project} · 담당 코치 {detail.coach}</p>
            <div className="field"><label>목표 달성률</label><div style={{ fontSize: 28, fontWeight: 700, color: COLORS.wine }}>{detail.achieve}%</div></div>
            <div className="field"><label>상태</label><span className={`badge ${detail.status === '완료' ? 'success' : 'progress'}`}>{detail.status}</span></div>
            <button className="btn-primary" style={{ width: '100%', justifyContent: 'center' }} onClick={() => { onToast('개별 리포트가 다운로드되었습니다'); setDetail(null); }}>
              <Icon name="download-simple" size={14} />개별 리포트 다운로드
            </button>
          </div>
        </div>
      )}
    </div>
  );
}

// ---------- 코치·대상자 성과 비교 ----------
const COACHES = ['이현우', '정수아', '박지현', '한도경'];
const COACH_METRICS = {
  '이현우': { achieve: 84, complete: 91, sample: 12 },
  '정수아': { achieve: 79, complete: 86, sample: 9 },
  '박지현': { achieve: 71, complete: 78, sample: 4 },
  '한도경': { achieve: 68, complete: 74, sample: 3 },
};

function ComparisonScreen({ onToast }) {
  const [selected, setSelected] = useState(['이현우', '정수아']);
  const [copied, setCopied] = useState(false);

  function toggle(c) {
    setSelected(prev => prev.includes(c) ? prev.filter(x => x !== c) : [...prev, c]);
  }

  const chartData = selected.map(c => ({ coach: c, 달성률: COACH_METRICS[c].achieve, 완료율: COACH_METRICS[c].complete }));

  return (
    <div>
      <div className="page-header">
        <div className="page-title-row">
          <div>
            <h1 className="page-title">코치·대상자 성과 비교 분석</h1>
            <p className="page-meta">필터 조건은 URL에 저장되어 공유할 수 있습니다</p>
          </div>
          <button className="btn-secondary" onClick={() => { setCopied(true); onToast('비교 조건 URL이 복사되었습니다'); setTimeout(() => setCopied(false), 1500); }}>
            <Icon name={copied ? 'check' : 'link'} size={14} />
            {copied ? '복사됨' : '비교 URL 공유'}
          </button>
        </div>
      </div>

      <div style={{ padding: '0 32px 32px', display: 'grid', gridTemplateColumns: '260px 1fr', gap: 20 }} className="grid-2">
        <div className="card">
          <h4 style={{ fontSize: 13, fontWeight: 700, margin: '0 0 10px' }}>코치 선택</h4>
          {COACHES.map(c => (
            <label key={c} className="checkbox-row">
              <input type="checkbox" checked={selected.includes(c)} onChange={() => toggle(c)} />
              {c} 코치
              {COACH_METRICS[c].sample < 5 && <span className="pill gold" style={{ padding: '2px 8px', fontSize: 10 }}>표본 적음</span>}
            </label>
          ))}
        </div>

        <div className="card">
          <h4 style={{ fontSize: 13, fontWeight: 700, margin: '0 0 14px' }}>지표 비교 ({selected.length}명 선택)</h4>
          {selected.length === 0 ? (
            <p style={{ fontSize: 13, color: COLORS.stone }}>비교할 코치를 1명 이상 선택하세요.</p>
          ) : (
            <div style={{ height: 260 }}>
              <ResponsiveContainer width="100%" height="100%">
                <BarChart data={chartData}>
                  <CartesianGrid stroke={COLORS.mist} vertical={false} />
                  <XAxis dataKey="coach" tick={{ fontSize: 12, fill: COLORS.stone }} axisLine={false} tickLine={false} />
                  <YAxis tick={{ fontSize: 12, fill: COLORS.stone }} axisLine={false} tickLine={false} />
                  <Tooltip />
                  <Legend />
                  <Bar dataKey="달성률" fill={COLORS.wine} radius={[6, 6, 0, 0]} />
                  <Bar dataKey="완료율" fill={COLORS.lilac} radius={[6, 6, 0, 0]} />
                </BarChart>
              </ResponsiveContainer>
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

// ---------- 다중 프로젝트 운영 현황 ----------
const PROJECTS = [
  { name: '3분기 리더십 코칭 프로그램', status: '진행중', deadline: 4, headcount: 12, coach: '이현우' },
  { name: '커뮤니케이션 워크숍 2기', status: '진행중', deadline: 12, headcount: 8, coach: '정수아' },
  { name: '타임매니지먼트 부트캠프', status: '마감임박', deadline: 2, headcount: 6, coach: '박지현' },
  { name: '신입 리더 온보딩 코칭', status: '진행중', deadline: 21, headcount: 15, coach: '한도경' },
  { name: '2분기 성과 리뷰 프로젝트', status: '완료', deadline: -3, headcount: 10, coach: '이현우' },
  { name: '고객사 담당자 대상 워크숍', status: '마감임박', deadline: 1, headcount: 5, coach: '정수아' },
  { name: '팀장급 커뮤니케이션 강화', status: '진행중', deadline: 30, headcount: 9, coach: '박지현' },
];

function OperationsScreen({ onToast }) {
  const [filter, setFilter] = useState('전체');
  const [query, setQuery] = useState('');
  const [detail, setDetail] = useState(null);
  const statuses = ['전체', '진행중', '마감임박', '완료'];

  let rows = filter === '전체' ? PROJECTS : PROJECTS.filter(p => p.status === filter);
  rows = rows.filter(p => p.name.includes(query));
  rows = [...rows].sort((a, b) => a.deadline - b.deadline);

  return (
    <div>
      <div className="page-header">
        <div className="page-title-row">
          <div>
            <h1 className="page-title">다중 프로젝트 운영 현황</h1>
            <p className="page-meta">총 {PROJECTS.length}건 · 마감 임박 우선 정렬</p>
          </div>
          <button className="btn-primary" onClick={() => onToast('신규 프로젝트 개설 화면으로 이동합니다')}>
            <Icon name="plus" size={14} />신규 프로젝트
          </button>
        </div>
        <div className="tab-bar" style={{ marginTop: 20 }}>
          {statuses.map(s => <button key={s} className={`tab ${filter === s ? 'active' : ''}`} onClick={() => setFilter(s)}>{s}</button>)}
        </div>
      </div>

      <div style={{ padding: '0 32px 32px' }}>
        <div className="card">
          <div style={{ display: 'flex', alignItems: 'center', gap: 8, marginBottom: 14 }}>
            <Icon name="magnifying-glass" size={15} style={{ color: COLORS.stone }} />
            <input value={query} onChange={e => setQuery(e.target.value)} placeholder="프로젝트명 검색" style={{ border: 'none', outline: 'none', fontSize: 14, flex: 1, background: 'transparent' }} />
          </div>
          <table className="data-table">
            <thead><tr><th>프로젝트</th><th>담당 코치</th><th>참여 인원</th><th>마감</th><th>상태</th></tr></thead>
            <tbody>
              {rows.map((p, i) => (
                <tr key={i} style={{ cursor: 'pointer' }} onClick={() => setDetail(p)}>
                  <td>{p.name}</td>
                  <td style={{ display: 'flex', alignItems: 'center', gap: 8 }}><Avatar name={p.coach} size={22} />{p.coach}</td>
                  <td>{p.headcount}명</td>
                  <td style={{ color: p.deadline <= 3 && p.deadline >= 0 ? '#a8382c' : COLORS.stone }}>
                    {p.deadline < 0 ? '종료' : `D-${p.deadline}`}
                  </td>
                  <td>
                    <span className={`badge ${p.status === '완료' ? 'success' : p.status === '마감임박' ? 'risk' : 'progress'}`}>{p.status}</span>
                  </td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      </div>

      {detail && (
        <div className="drawer-overlay" onClick={() => setDetail(null)}>
          <div className="drawer" onClick={e => e.stopPropagation()}>
            <div style={{ display: 'flex', justifyContent: 'space-between' }}>
              <span className={`badge ${detail.status === '완료' ? 'success' : detail.status === '마감임박' ? 'risk' : 'progress'}`}>{detail.status}</span>
              <button onClick={() => setDetail(null)}><Icon name="x" size={18} /></button>
            </div>
            <h2 style={{ fontSize: 20, fontWeight: 700, margin: '14px 0 18px' }}>{detail.name}</h2>
            <div className="field"><label>담당 코치</label><div style={{ display: 'flex', alignItems: 'center', gap: 8 }}><Avatar name={detail.coach} size={26} />{detail.coach}</div></div>
            <div className="field"><label>참여 인원</label>{detail.headcount}명</div>
            <div className="field"><label>마감까지</label>{detail.deadline < 0 ? '종료됨' : `${detail.deadline}일 남음`}</div>
            <button className="btn-primary" style={{ width: '100%', justifyContent: 'center' }} onClick={() => { onToast('상세 현황 페이지로 이동합니다'); setDetail(null); }}>
              <Icon name="arrow-square-out" size={14} />상세 현황 보기
            </button>
          </div>
        </div>
      )}
    </div>
  );
}

function App() {
  const [screen, setScreen] = useState('main');
  const [toast, setToast] = useState(null);
  const showToast = (msg) => setToast(msg);

  return (
    <div style={{ width: '100%', minHeight: '100vh', display: 'flex' }} data-archetype="stripe-multipane">
      <Sidebar screen={screen} setScreen={setScreen} />
      <main className="main-wrap">
        {screen === 'main' && <MainDashboard onToast={showToast} />}
        {screen === 'review' && <ReviewScreen onToast={showToast} />}
        {screen === 'comparison' && <ComparisonScreen onToast={showToast} />}
        {screen === 'operations' && <OperationsScreen onToast={showToast} />}
      </main>
      {toast && <Toast message={toast} onClose={() => setToast(null)} />}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
