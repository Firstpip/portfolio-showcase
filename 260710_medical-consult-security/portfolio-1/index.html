<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>메드시큐어 자문 컴플라이언스 플랫폼 — 맞춤 구현 데모</title>
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" rel="stylesheet" />
<link rel="stylesheet" href="https://unpkg.com/@tabler/icons-webfont@2/dist/tabler-icons.min.css">
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone@7.23.0/babel.min.js"></script>
<style>
:root {
  --ink:#101010; --graphite:#242424; --slate:#6b7280; --stone:#898989;
  --paper:#f4f4f4; --white:#ffffff; --silver:#e5e7eb;
  --blue:#0099ff; --mint:#3ad98a; --mint-bg:#e6faf1;
  --amber:#e0a325; --amber-bg:#fdf3e0; --red:#d9473a; --red-bg:#fbe9e7;
  --border:1px solid var(--silver);
  --shadow-sm:0 1px 2px rgba(16,16,16,.04);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Pretendard',-apple-system,sans-serif;background:var(--paper);color:var(--ink);font-size:14px;line-height:1.5;height:100vh;overflow:hidden}

@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideUp{from{transform:translateY(8px);opacity:0}to{transform:translateY(0);opacity:1}}
@keyframes pulse{0%,100%{opacity:.55}50%{opacity:1}}
@keyframes countUp{from{transform:translateY(5px);opacity:0}to{transform:translateY(0);opacity:1}}
@keyframes drawLine{from{stroke-dashoffset:600}to{stroke-dashoffset:0}}
@keyframes ringIn{from{stroke-dashoffset:220}to{stroke-dashoffset:var(--ring-final,60)}}

.shell{display:flex;height:100vh;overflow:hidden}

aside.sidebar{width:236px;min-width:236px;background:var(--white);border-right:var(--border);display:flex;flex-direction:column;overflow-y:auto;flex-shrink:0}
.logo-wrap{padding:18px 16px;border-bottom:var(--border);display:flex;align-items:center;gap:10px}
.logo-icon{width:32px;height:32px;background:var(--ink);border-radius:8px;display:flex;align-items:center;justify-content:center;color:#fff;flex-shrink:0}
.logo-name{font-size:14px;font-weight:700;letter-spacing:-.3px}
.logo-sub{font-size:10px;color:var(--stone);letter-spacing:.4px;text-transform:uppercase}
.nav-section{padding:12px 10px 4px}
.nav-eyebrow{font-size:10px;font-weight:600;color:var(--stone);letter-spacing:.7px;text-transform:uppercase;padding:0 8px;margin-bottom:6px}
.nav-btn{display:flex;align-items:center;gap:9px;padding:9px 10px;border-radius:8px;cursor:pointer;font-size:13px;color:var(--graphite);border:none;background:transparent;width:100%;text-align:left;transition:background .12s}
.nav-btn:hover{background:var(--paper)}
.nav-btn.active{background:#101010;color:#fff;font-weight:600}
.nav-btn.active i{color:#fff!important}
.nav-ic{color:var(--stone);flex-shrink:0;font-size:15px;width:16px;text-align:center}
.sidebar-foot{margin-top:auto;padding:12px 10px;border-top:var(--border)}
.avatar{width:30px;height:30px;border-radius:50%;background:var(--ink);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#fff;flex-shrink:0}

.main{flex:1;display:flex;flex-direction:column;overflow:hidden}

.topbar{padding:14px 24px;background:var(--white);border-bottom:var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.topbar-title{font-size:clamp(22px,2.2vw,34px);font-weight:700;letter-spacing:-.6px}
.topbar-sub{font-size:11px;color:var(--stone);margin-top:2px}
.env-pill{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:9999px;background:var(--mint-bg);color:#1e8a5c;font-size:11px;font-weight:600}
.env-dot{width:6px;height:6px;border-radius:50%;background:var(--mint);animation:pulse 1.6s infinite}

/* status-strip: slim inline metric bar (KPI 카드 행 대체) */
.status-strip{display:flex;gap:0;padding:0 24px;background:var(--white);border-bottom:var(--border);flex-shrink:0}
.stat-card{flex:1;padding:12px 18px;border-right:1px solid var(--silver);display:flex;flex-direction:column;gap:2px;animation:slideUp .3s ease}
.stat-card:last-child{border-right:none}
.stat-value{font-size:30px;font-weight:800;letter-spacing:-1px;color:var(--ink);animation:countUp .5s ease}
.stat-label{font-size:11px;color:var(--stone);font-weight:500}
.stat-trend{font-size:11px;font-weight:600;margin-top:1px}
.trend-up{color:var(--mint)}
.trend-warn{color:var(--amber)}
.trend-bad{color:var(--red)}

.pane{flex:1;overflow-y:auto;padding:20px 24px;animation:fadeIn .18s ease}

.command-grid{display:grid;grid-template-columns:2fr 1fr;gap:16px}
.command-secondary{grid-column:1/-1;display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-top:16px}

.card{background:var(--white);border:var(--border);border-radius:8px;box-shadow:var(--shadow-sm)}
.card-pad{padding:16px 18px}
.card-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.card-title{font-size:13px;font-weight:700;color:var(--ink)}
.eyebrow{font-size:10px;font-weight:600;color:var(--stone);letter-spacing:.7px;text-transform:uppercase;margin-bottom:3px}
.section-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.section-title{font-size:16px;font-weight:700;letter-spacing:-.3px}

/* 취약점 조치 타임라인 */
.patch-row{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--paper)}
.patch-row:last-child{border-bottom:none}
.patch-id{width:34px;height:34px;border-radius:8px;background:var(--paper);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:var(--slate);flex-shrink:0}
.patch-body{flex:1;min-width:0}
.patch-name{font-size:12.5px;font-weight:600;color:var(--ink)}
.patch-meta{font-size:11px;color:var(--stone);margin-top:1px}
.pbar{height:5px;background:var(--paper);border-radius:9999px;overflow:hidden;margin-top:6px}
.pfill{height:100%;border-radius:9999px;transition:width .6s ease}

.badge{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:9999px;font-size:10.5px;font-weight:700}
.b-ok{background:var(--mint-bg);color:#1e8a5c}
.b-warn{background:var(--amber-bg);color:#a3701a}
.b-bad{background:var(--red-bg);color:var(--red)}
.b-info{background:#eaf5ff;color:#0072c4}
.b-idle{background:var(--paper);color:var(--stone)}

/* priority queue */
.queue-item{display:flex;align-items:flex-start;gap:10px;padding:10px 0;border-bottom:1px solid var(--paper);animation:slideUp .2s ease}
.queue-item:last-child{border-bottom:none}
.queue-sev{width:8px;height:8px;border-radius:50%;margin-top:5px;flex-shrink:0}
.sev-high{background:var(--red)}
.sev-mid{background:var(--amber)}
.sev-low{background:var(--blue)}
.queue-body{flex:1;min-width:0}
.queue-title{font-size:12.5px;font-weight:600;color:var(--ink)}
.queue-meta{font-size:11px;color:var(--stone);margin-top:2px}

.tbl{width:100%;border-collapse:collapse}
.tbl th{padding:9px 14px;text-align:left;font-size:10.5px;font-weight:700;color:var(--stone);letter-spacing:.5px;text-transform:uppercase;background:var(--paper);border-bottom:var(--border)}
.tbl td{padding:11px 14px;border-bottom:1px solid var(--paper);font-size:12.5px;color:var(--ink)}
.tbl tr:last-child td{border-bottom:none}
.tbl tr:hover td{background:#fafafa}
.mono{font-family:'SFMono-Regular',Consolas,monospace;font-size:11.5px}

.btn-p{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;background:var(--ink);color:#fff;border:none;border-radius:9999px;font-size:12.5px;font-weight:600;cursor:pointer;transition:background .12s}
.btn-p:hover{background:#2b2b2b}
.btn-g{display:inline-flex;align-items:center;gap:5px;padding:7px 13px;background:transparent;color:var(--graphite);border:1px solid var(--silver);border-radius:9999px;font-size:12.5px;font-weight:500;cursor:pointer;transition:all .12s}
.btn-g:hover{background:var(--paper)}
.btn-danger{display:inline-flex;align-items:center;gap:5px;padding:5px 11px;background:transparent;color:var(--red);border:1px solid #f3c9c4;border-radius:9999px;font-size:11.5px;font-weight:600;cursor:pointer}
.btn-danger:hover{background:var(--red-bg)}
.btn-icon{width:30px;height:30px;border-radius:8px;border:1px solid var(--silver);background:#fff;display:inline-flex;align-items:center;justify-content:center;cursor:pointer;color:var(--slate)}
.btn-icon:hover{background:var(--paper)}

.tab-bar{display:flex;gap:4px;margin-bottom:16px;border-bottom:var(--border)}
button.tab{padding:9px 4px;margin-right:18px;font-size:13px;font-weight:500;color:var(--stone);background:transparent;border:none;border-bottom:2px solid transparent;cursor:pointer;transition:all .15s}
button.tab:hover{color:var(--ink)}
button.tab.active{color:var(--ink);border-bottom-color:var(--ink);font-weight:700}

.fi{display:flex;flex-direction:column;gap:6px;margin-bottom:14px}
.fl{font-size:12px;font-weight:600;color:var(--graphite)}
.fh{font-size:11px;color:var(--stone)}
.inp{padding:9px 12px;border:1px solid var(--silver);border-radius:8px;font-size:13px;color:var(--ink);background:var(--white);outline:none;font-family:inherit;width:100%}
.inp:focus{border-color:var(--ink);box-shadow:0 0 0 3px rgba(16,16,16,.06)}
.toggle{width:38px;height:22px;border-radius:9999px;background:var(--silver);position:relative;cursor:pointer;transition:background .15s;flex-shrink:0}
.toggle.on{background:var(--mint)}
.toggle-dot{width:18px;height:18px;border-radius:50%;background:#fff;position:absolute;top:2px;left:2px;transition:left .15s;box-shadow:0 1px 2px rgba(0,0,0,.2)}
.toggle.on .toggle-dot{left:18px}

.info-strip{background:#eaf5ff;border-radius:8px;padding:11px 14px;font-size:12px;color:#0072c4;display:flex;align-items:center;gap:8px}
.warn-strip{background:var(--amber-bg);border-radius:8px;padding:11px 14px;font-size:12px;color:#8a5c14;display:flex;align-items:center;gap:8px}

.modal-overlay{position:fixed;inset:0;background:rgba(16,16,16,.45);display:flex;align-items:center;justify-content:center;z-index:998;animation:fadeIn .15s ease}
.modal{background:#fff;border-radius:12px;padding:24px;width:420px;max-width:90vw;animation:slideUp .2s ease;box-shadow:0 20px 40px rgba(0,0,0,.2)}
.modal-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.modal-title{font-size:15px;font-weight:700}

.toast{position:fixed;bottom:22px;right:22px;background:var(--ink);color:#fff;padding:10px 16px;border-radius:9999px;font-size:13px;animation:slideUp .2s ease;z-index:999;display:flex;align-items:center;gap:8px}

.checkbox-row{display:flex;align-items:flex-start;gap:10px;padding:12px 0;border-bottom:1px solid var(--paper)}
.checkbox-row:last-child{border-bottom:none}
.cbx{width:18px;height:18px;border-radius:5px;border:1.5px solid var(--silver);flex-shrink:0;margin-top:1px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .12s}
.cbx.checked{background:var(--ink);border-color:var(--ink);color:#fff}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect} = React;
const C = {ink:'#101010',graphite:'#242424',slate:'#6b7280',stone:'#898989',blue:'#0099ff',mint:'#3ad98a',amber:'#e0a325',red:'#d9473a'};

function SparkArea({pts,color}){
  const W=520,H=110,mn=Math.min(...pts),mx=Math.max(...pts);
  const toY=v=>H-((v-mn)/(mx-mn||1))*(H-20)-10;
  const toX=(i)=>(i/(pts.length-1))*W;
  const line=pts.map((v,i)=>`${i===0?'M':'L'} ${toX(i).toFixed(1)} ${toY(v).toFixed(1)}`).join(' ');
  const area=`${line} L ${W} ${H} L 0 ${H} Z`;
  return (
    <svg viewBox={`0 0 ${W} ${H}`} style={{width:'100%',display:'block'}}>
      <defs>
        <linearGradient id="gFillP1" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stopColor={color} stopOpacity="0.18"/>
          <stop offset="100%" stopColor={color} stopOpacity="0.01"/>
        </linearGradient>
      </defs>
      <path d={area} fill="url(#gFillP1)"/>
      <path d={line} fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"
        style={{strokeDasharray:900,strokeDashoffset:0,animation:'drawLine 1.4s ease forwards'}}/>
      {pts.map((v,i)=>i%4===0 && (
        <text key={i} x={toX(i).toFixed(1)} y={H-1} textAnchor="middle" fontSize="8" fill={C.stone}>{`D-${pts.length-1-i}`}</text>
      ))}
    </svg>
  );
}

function Ring({pct,color,sz=64,label}){
  const r=24,cx=sz/2,cy=sz/2,circ=2*Math.PI*r;
  return (
    <div style={{display:'flex',alignItems:'center',gap:12}}>
      <svg width={sz} height={sz} style={{transform:'rotate(-90deg)',flexShrink:0}}>
        <circle cx={cx} cy={cy} r={r} fill="none" stroke="#f4f4f4" strokeWidth="7"/>
        <circle cx={cx} cy={cy} r={r} fill="none" stroke={color} strokeWidth="7"
          strokeDasharray={circ} style={{'--ring-final':(circ*(1-pct)).toFixed(1),strokeDashoffset:circ,animation:'ringIn 1s ease forwards'}} strokeLinecap="round"/>
      </svg>
      <div>
        <div style={{fontSize:20,fontWeight:800,color:C.ink,letterSpacing:'-.5px'}}>{Math.round(pct*100)}%</div>
        <div style={{fontSize:11,color:C.stone}}>{label}</div>
      </div>
    </div>
  );
}

function Toast({message,onClose}){
  useEffect(()=>{const t=setTimeout(onClose,2600);return()=>clearTimeout(t)},[]);
  return <div className="toast"><i className="ti ti-circle-check"/>{message}</div>;
}

/* ── MainView: command-tower composition (status-strip → primary-focus → priority-rail → secondary) ── */
function MainView(){
  const [tick,setTick]=useState(0);
  useEffect(()=>{const t=setInterval(()=>setTick(p=>p+1),4000);return()=>clearInterval(t)},[]);

  const patches=[
    {id:'V-01',name:'SQL Injection — 자문 검색 파라미터 바인딩 누락',pct:1,st:'조치완료'},
    {id:'V-02',name:'저장형 XSS — 진료 메모 입력값 이스케이프 누락',pct:1,st:'조치완료'},
    {id:'V-03',name:'세션 고정 — 로그인 후 세션ID 재발급 누락',pct:1,st:'조치완료'},
    {id:'V-04',name:'권한 상승 — 자문의 계정으로 관리자 API 접근 가능',pct:.7,st:'조치중'},
    {id:'V-05',name:'평문 전송 — 진료기록 다운로드 구간 암호화 누락',pct:.4,st:'조치중'},
  ];
  const queue=[
    {sev:'high',title:'동일 IP에서 로그인 실패 12회 감지',meta:'203.0.113.42 · 자동 차단 대상 승격',ago:'2분 전'},
    {sev:'mid',title:'자문의 세션 유휴 45분 경과',meta:'자문의 이OO · 정책 임계치 30분 초과',ago:'8분 전'},
    {sev:'mid',title:'야간 시간대 진료기록 다운로드 발생',meta:'관리자 김OO · 02:14 KST',ago:'26분 전'},
    {sev:'low',title:'신규 관리자 권한 변경 요청',meta:'감사자 승인 대기 중',ago:'41분 전'},
  ];
  const trend=[3,2,4,3,5,4,6,5,8,6,7,9,7,6,8];

  return (
    <div>
      <div className="status-strip">
        <div className="stat-card">
          <div className="stat-value">3/5</div>
          <div className="stat-label">KISA 취약점 조치 완료</div>
          <div className="stat-trend trend-up">진행률 62%</div>
        </div>
        <div className="stat-card">
          <div className="stat-value" style={{color:C.blue}}>{12+((tick)%3)}</div>
          <div className="stat-label">활성 세션</div>
          <div className="stat-trend" style={{color:C.stone}}>관리자 4 · 자문의 8</div>
        </div>
        <div className="stat-card">
          <div className="stat-value">{(1284+tick*7).toLocaleString()}</div>
          <div className="stat-label">금일 감사로그 적재 건수</div>
          <div className="stat-trend trend-up">전일 대비 +6%</div>
        </div>
        <div className="stat-card">
          <div className="stat-value" style={{color:C.red}}>3</div>
          <div className="stat-label">이상 접근 시도 (24h)</div>
          <div className="stat-trend trend-warn">차단 규칙 검토 필요</div>
        </div>
      </div>

      <div className="pane" style={{paddingTop:18}}>
        <div className="command-grid">
          {/* primary-focus */}
          <div className="card card-pad">
            <div className="card-hd">
              <div><div className="eyebrow">시큐어 코딩 조치</div><div className="card-title">KISA 취약점 조치 타임라인</div></div>
              <span className="badge b-info">5건 중 3건 완료</span>
            </div>
            {patches.map(p=>(
              <div className="patch-row" key={p.id}>
                <div className="patch-id">{p.id}</div>
                <div className="patch-body">
                  <div className="patch-name">{p.name}</div>
                  <div className="pbar"><div className="pfill" style={{width:`${p.pct*100}%`,background:p.pct===1?C.mint:C.amber}}/></div>
                </div>
                <span className={`badge ${p.st==='조치완료'?'b-ok':'b-warn'}`}>{p.st}</span>
              </div>
            ))}
            <div style={{marginTop:14,paddingTop:14,borderTop:'1px solid var(--paper)'}}>
              <div className="card-hd" style={{marginBottom:8}}>
                <div className="eyebrow" style={{margin:0}}>이상 접근 시도 추이 (14일)</div>
              </div>
              <SparkArea pts={trend} color={C.red}/>
            </div>
          </div>

          {/* priority-rail */}
          <div className="card" style={{display:'flex',flexDirection:'column'}}>
            <div style={{padding:'14px 16px 10px',borderBottom:'var(--border)',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
              <div className="card-title">우선 대응 큐</div>
              <span className="badge b-bad">4건</span>
            </div>
            <div style={{padding:'4px 16px',flex:1,overflowY:'auto'}}>
              {queue.map((q,i)=>(
                <div className="queue-item" key={i} style={{animationDelay:`${i*.05}s`}}>
                  <div className={`queue-sev sev-${q.sev}`}/>
                  <div className="queue-body">
                    <div className="queue-title">{q.title}</div>
                    <div className="queue-meta">{q.meta}</div>
                  </div>
                </div>
              ))}
            </div>
            <div style={{padding:'10px 16px',borderTop:'var(--border)'}}>
              <button className="btn-g" style={{width:'100%',justifyContent:'center'}} onClick={()=>{}}>
                <i className="ti ti-list-details"/>전체 대응 큐 보기
              </button>
            </div>
          </div>
        </div>

        {/* secondary widgets */}
        <div className="command-secondary">
          <div className="card card-pad">
            <div className="eyebrow">개인정보 동의</div>
            <div className="card-title" style={{marginBottom:14}}>필수 동의 항목 이행률</div>
            <Ring pct={.94} color={C.mint} label="회원 94% 동의 완료"/>
          </div>
          <div className="card card-pad">
            <div className="eyebrow">감사로그 유형 분포</div>
            <div className="card-title" style={{marginBottom:14}}>취급 지점별 적재 비중</div>
            {[{n:'자문신청 조회',p:38,c:C.ink},{n:'진료기록 다운로드',p:27,c:C.blue},{n:'고객 세부정보 조회',p:22,c:C.mint},{n:'기타',p:13,c:C.stone}].map((r,i)=>(
              <div key={i} style={{marginBottom:8}}>
                <div style={{display:'flex',justifyContent:'space-between',marginBottom:3}}>
                  <span style={{fontSize:11.5,color:C.graphite}}>{r.n}</span>
                  <span style={{fontSize:11,color:C.stone}}>{r.p}%</span>
                </div>
                <div className="pbar"><div className="pfill" style={{width:`${r.p}%`,background:r.c}}/></div>
              </div>
            ))}
          </div>
          <div className="card card-pad">

              <div className={`toggle ${ipwl?'on':''}`} onClick={()=>setIpwl(p=>!p)}><div className="toggle-dot"/></div>
            </label>
            <span className="fh">사내망 IP 대역 외 관리자 접근을 차단합니다</span>
          </div>
        </div>
        <div className="card card-pad">
          <div className="card-title" style={{marginBottom:14}}>알림 채널</div>
          <div className="fi"><label className="fl">보안 이벤트 수신 이메일</label><input className="inp" defaultValue="security-ops@medsecure-demo.co.kr"/></div>
          <div className="fi" style={{marginBottom:0}}>
            <label className="fl" style={{display:'flex',alignItems:'center',justifyContent:'space-between'}}>
              이상 접근 실시간 메일 알림
              <div className={`toggle ${alertMail?'on':''}`} onClick={()=>setAlertMail(p=>!p)}><div className="toggle-dot"/></div>
            </label>
            <span className="fh">임계치 초과 시 담당자에게 즉시 메일을 발송합니다</span>
          </div>
        </div>
      </div>
      {toast && <Toast message={toast} onClose={()=>setToast(null)}/>}
    </div>
  );
}

/* ── App ── */
function App(){
  const [view,setView]=useState('main');
  const navGroups=[
    {title:'보안 관제',items:[
      {id:'main',label:'보안 관제 대시보드',icon:'ti-shield'},
      {id:'access-control',label:'세션 타임아웃 및 비정상 접근 차단',icon:'ti-lock'},
    ]},
    {title:'개인정보 보호',items:[
      {id:'consent',label:'개인정보 수집·이용 동의 관리',icon:'ti-user-check'},
      {id:'audit-log',label:'개인정보 취급 감사로그 및 데이터 파기',icon:'ti-history'},
    ]},
    {title:'시스템',items:[
      {id:'settings',label:'보안 정책 설정',icon:'ti-settings'},
    ]},
  ];
  const views={main:<MainView/>,'access-control':<AccessControlView/>,consent:<ConsentView/>,'audit-log':<AuditLogView/>,settings:<SettingsView/>};
  const titles={main:['보안 관제','실시간 취약점·세션·감사로그 현황'],'access-control':['보안 정책','세션 및 접근 제어'],consent:['개인정보보호','동의 관리'],'audit-log':['감사·파기','개인정보 취급 이력'],settings:['시스템','정책 설정']};

  return (
    <div className="shell" data-archetype="stripe-multipane">
      <aside className="sidebar" data-sidebar>
        <div className="logo-wrap">
          <div className="logo-icon"><i className="ti ti-shield-check" style={{fontSize:16}}/></div>
          <div><div className="logo-name">메드시큐어</div><div className="logo-sub">Compliance Console</div></div>
        </div>
        {navGroups.map(g=>(
          <div className="nav-section" key={g.title}>
            <div className="nav-eyebrow">{g.title}</div>
            {g.items.map(it=>(
              <button key={it.id} className={`nav-btn ${view===it.id?'active':''}`} onClick={()=>setView(it.id)}>
                <i className={`ti ${it.icon} nav-ic`}/>{it.label}
              </button>
            ))}
          </div>
        ))}
        <div className="sidebar-foot">
          <div style={{display:'flex',alignItems:'center',gap:9,padding:'6px 8px'}}>
            <div className="avatar">감</div>
            <div><div style={{fontSize:12.5,fontWeight:600}}>감사자 최OO</div><div style={{fontSize:11,color:'var(--stone)'}}>컴플라이언스 담당자</div></div>
          </div>
        </div>
      </aside>

      <div className="main">
        <div className="topbar">
          <div>
            <div className="topbar-title">{titles[view][0]}</div>
            <div className="topbar-sub">{titles[view][1]}</div>
          </div>
          <div className="env-pill"><span className="env-dot"/>Production · ISMS-P 심사 대응</div>
        </div>
        {view==='main' ? (
          <MainView/>
        ) : (
          <div className="pane">{views[view]}</div>
        )}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
