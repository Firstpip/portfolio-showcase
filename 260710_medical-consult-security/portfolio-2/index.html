<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>메드시큐어 보안관제·컴플라이언스 센터 — 구현 데모</title>
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" rel="stylesheet" />
<link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/regular/style.css" />
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone@7.23.0/babel.min.js"></script>
<style>
:root {
  --iris:#5683da; --ember:#ff8964;
  --canvas:#0d0f14; --surface:#171a22; --surface-2:#1d212c; --border-c:#2a2d3a;
  --text:#f4f5f7; --text-dim:#9aa0ae;
  --mint:#3ad98a; --amber:#e8b04a; --red:#ff6b6b;
  --shadow-glow:0 8px 32px rgba(86,131,218,.16),0 2px 8px rgba(0,0,0,.4);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Pretendard',-apple-system,sans-serif;background:var(--canvas);color:var(--text);font-size:14px;line-height:1.5;min-height:100vh}

@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideUp{from{transform:translateY(10px);opacity:0}to{transform:translateY(0);opacity:1}}
@keyframes pulse{0%,100%{opacity:.5}50%{opacity:1}}
@keyframes auroraGlow{0%,100%{opacity:.55;transform:translateX(-4%)}50%{opacity:.95;transform:translateX(4%)}}
@keyframes drawLine{from{stroke-dashoffset:1000}to{stroke-dashoffset:0}}
@keyframes countUp{from{transform:translateY(6px);opacity:0}to{transform:translateY(0);opacity:1}}

.app-header{position:sticky;top:0;z-index:50;display:flex;align-items:center;justify-content:space-between;padding:14px 28px;background:rgba(13,15,20,.85);backdrop-filter:blur(14px);border-bottom:1px solid var(--border-c)}
.brand{display:flex;align-items:center;gap:10px}
.brand-mark{width:32px;height:32px;border-radius:9999px;background:linear-gradient(135deg,var(--iris),var(--ember));display:flex;align-items:center;justify-content:center;font-weight:800;font-size:13px;color:#0d0f14;flex-shrink:0}
.brand-name{font-size:14.5px;font-weight:700;letter-spacing:-.2px}
.brand-sub{font-size:10.5px;color:var(--text-dim);letter-spacing:.4px;text-transform:uppercase}
.header-actions{display:flex;align-items:center;gap:10px}
.icon-btn{width:34px;height:34px;border-radius:9999px;border:1px solid var(--border-c);background:var(--surface);display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--text-dim);transition:all .15s}
.icon-btn:hover{color:var(--text);border-color:var(--iris)}
.avatar{width:32px;height:32px;border-radius:9999px;background:linear-gradient(135deg,var(--iris),var(--ember));display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#0d0f14}
.env-chip{display:inline-flex;align-items:center;gap:6px;padding:5px 12px;border-radius:9999px;background:rgba(58,217,138,.1);color:var(--mint);font-size:11px;font-weight:600;border:1px solid rgba(58,217,138,.25)}
.env-dot{width:6px;height:6px;border-radius:50%;background:var(--mint);animation:pulse 1.6s infinite}

.tab-bar{display:flex;gap:4px;padding:0 28px;background:rgba(23,26,34,.6);border-bottom:1px solid var(--border-c);overflow-x:auto;position:sticky;top:61px;z-index:40;backdrop-filter:blur(10px)}
button.tab{display:flex;align-items:center;gap:7px;padding:13px 18px;font-size:13px;font-weight:500;color:var(--text-dim);background:transparent;border:none;border-bottom:2px solid transparent;cursor:pointer;transition:all .15s;white-space:nowrap}
button.tab:hover{color:var(--text)}
button.tab.active{color:var(--text);border-bottom-color:var(--iris);font-weight:700}

.content{max-width:1280px;margin:0 auto;padding:26px 28px 60px;animation:fadeIn .2s ease}

.aurora-strip{position:relative;border-radius:20px;overflow:hidden;padding:26px 28px;margin-bottom:22px;background:linear-gradient(120deg,#131722 0%,#181d2b 60%,#151822 100%);border:1px solid var(--border-c)}
.aurora-beam{position:absolute;top:-40%;left:20%;width:220px;height:220%;background:linear-gradient(180deg,rgba(86,131,218,.35),rgba(255,137,100,.28),transparent);filter:blur(40px);animation:auroraGlow 7s ease-in-out infinite}
.aurora-inner{position:relative;z-index:2;display:flex;align-items:flex-end;justify-content:space-between;gap:24px;flex-wrap:wrap}
.aurora-title{font-size:clamp(28px,3.4vw,44px);font-weight:800;letter-spacing:-1.2px}
.aurora-sub{font-size:12.5px;color:var(--text-dim);margin-top:4px}

/* insight-board: hero-viz + kpi-side + widget-grid */
.insight-grid{display:grid;grid-template-columns:1.7fr 1fr;gap:18px}
.card{background:var(--surface);border:1px solid var(--border-c);border-radius:16px;box-shadow:var(--shadow-glow)}
.card-glow{position:relative}
.card-glow::before{content:'';position:absolute;top:-1px;left:16px;right:16px;height:1px;background:linear-gradient(90deg,transparent,rgba(86,131,218,.5),transparent)}
.card-pad{padding:20px 22px}
.card-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.card-title{font-size:14px;font-weight:700}
.eyebrow{font-size:10.5px;font-weight:700;color:var(--text-dim);letter-spacing:.7px;text-transform:uppercase;margin-bottom:4px}
.section-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px}
.section-title{font-size:18px;font-weight:800;letter-spacing:-.3px}

.kpi-side{display:flex;flex-direction:column;gap:14px}
.stat-card{background:var(--surface);border:1px solid var(--border-c);border-radius:16px;padding:16px 18px;box-shadow:var(--shadow-glow);animation:slideUp .3s ease}
.stat-value{font-size:32px;font-weight:800;letter-spacing:-1px;animation:countUp .5s ease}
.stat-label{font-size:11.5px;color:var(--text-dim);margin-top:3px}
.stat-trend{font-size:11px;font-weight:600;margin-top:4px}
.trend-up{color:var(--mint)}
.trend-warn{color:var(--amber)}
.trend-bad{color:var(--red)}

.widget-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-top:18px}

.badge{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;border-radius:9999px;font-size:10.5px;font-weight:700}
.b-ok{background:rgba(58,217,138,.14);color:var(--mint)}
.b-warn{background:rgba(232,176,74,.14);color:var(--amber)}
.b-bad{background:rgba(255,107,107,.14);color:var(--red)}
.b-info{background:rgba(86,131,218,.16);color:#a9c2ef}

.tbl{width:100%;border-collapse:collapse}
.tbl th{padding:10px 16px;text-align:left;font-size:10.5px;font-weight:700;color:var(--text-dim);letter-spacing:.5px;text-transform:uppercase;background:var(--surface-2);border-bottom:1px solid var(--border-c)}
.tbl td{padding:12px 16px;border-bottom:1px solid var(--border-c);font-size:12.5px;color:var(--text)}
.tbl tr:last-child td{border-bottom:none}
.tbl tr:hover td{background:rgba(86,131,218,.05)}
.mono{font-family:'SFMono-Regular',Consolas,monospace;font-size:11.5px;color:var(--text-dim)}

.btn-p{display:inline-flex;align-items:center;gap:7px;padding:10px 20px;background:var(--iris);color:#fff;border:none;border-radius:9999px;font-size:12.5px;font-weight:700;cursor:pointer;transition:all .15s;box-shadow:0 4px 16px rgba(86,131,218,.35)}
.btn-p:hover{filter:brightness(1.1)}
.btn-g{display:inline-flex;align-items:center;gap:6px;padding:9px 17px;background:transparent;color:var(--text);border:1px solid var(--border-c);border-radius:9999px;font-size:12.5px;font-weight:500;cursor:pointer;transition:all .15s}
.btn-g:hover{border-color:var(--iris);background:rgba(86,131,218,.08)}
.btn-ember{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;background:rgba(255,137,100,.14);color:var(--ember);border:1px solid rgba(255,137,100,.3);border-radius:9999px;font-size:12px;font-weight:600;cursor:pointer}
.btn-ember:hover{background:rgba(255,137,100,.22)}

.fi{display:flex;flex-direction:column;gap:6px;margin-bottom:14px}
.fl{font-size:12px;font-weight:600;color:var(--text)}
.inp{padding:10px 13px;border:1px solid var(--border-c);border-radius:12px;font-size:13px;color:var(--text);background:var(--surface-2);outline:none;font-family:inherit;width:100%}
.inp:focus{border-color:var(--iris);box-shadow:0 0 0 3px rgba(86,131,218,.18)}
.inp::placeholder{color:#5a6070}

.chip{display:inline-flex;align-items:center;gap:5px;padding:6px 13px;border-radius:9999px;background:var(--surface-2);border:1px solid var(--border-c);font-size:12px;color:var(--text-dim);cursor:pointer;transition:all .15s}
.chip.active{background:rgba(86,131,218,.16);border-color:var(--iris);color:#a9c2ef}
.chip:hover{border-color:var(--iris)}

.pbar{height:6px;background:var(--surface-2);border-radius:9999px;overflow:hidden}
.pfill{height:100%;border-radius:9999px;transition:width .6s ease}

.toast{position:fixed;bottom:24px;right:24px;background:var(--surface);color:var(--text);padding:12px 18px;border-radius:14px;font-size:13px;animation:slideUp .2s ease;z-index:999;display:flex;align-items:center;gap:8px;border:1px solid var(--border-c);box-shadow:var(--shadow-glow)}

.modal-overlay{position:fixed;inset:0;background:rgba(5,6,9,.7);display:flex;align-items:center;justify-content:center;z-index:998;animation:fadeIn .15s ease;backdrop-filter:blur(4px)}
.modal{background:var(--surface);border:1px solid var(--border-c);border-radius:20px;padding:26px;width:440px;max-width:90vw;animation:slideUp .2s ease;box-shadow:0 30px 60px rgba(0,0,0,.5)}
.modal-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px}
.modal-title{font-size:16px;font-weight:700}

.perm-cell{display:flex;align-items:center;justify-content:center;width:26px;height:26px;border-radius:8px;cursor:pointer;transition:all .12s}
.perm-cell.on{background:rgba(58,217,138,.16);color:var(--mint)}
.perm-cell.off{background:var(--surface-2);color:#454a58}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect} = React;
const C = {iris:'#5683da',ember:'#ff8964',mint:'#3ad98a',amber:'#e8b04a',red:'#ff6b6b',dim:'#9aa0ae'};

function HeatArea({pts}){
  const W=680,H=180,mn=Math.min(...pts),mx=Math.max(...pts);
  const toY=v=>H-((v-mn)/(mx-mn||1))*(H-24)-12;
  const toX=(i)=>(i/(pts.length-1))*W;
  const line=pts.map((v,i)=>`${i===0?'M':'L'} ${toX(i).toFixed(1)} ${toY(v).toFixed(1)}`).join(' ');
  const area=`${line} L ${W} ${H} L 0 ${H} Z`;
  return (
    <svg viewBox={`0 0 ${W} ${H}`} style={{width:'100%',display:'block'}}>
      <defs>
        <linearGradient id="gAurora" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stopColor={C.iris} stopOpacity="0.5"/>
          <stop offset="60%" stopColor={C.ember} stopOpacity="0.14"/>
          <stop offset="100%" stopColor={C.ember} stopOpacity="0"/>
        </linearGradient>
        <linearGradient id="gLine" x1="0" y1="0" x2="1" y2="0">
          <stop offset="0%" stopColor={C.iris}/>
          <stop offset="100%" stopColor={C.ember}/>
        </linearGradient>
      </defs>
      <path d={area} fill="url(#gAurora)"/>
      <path d={line} fill="none" stroke="url(#gLine)" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"
        style={{strokeDasharray:1400,strokeDashoffset:0,animation:'drawLine 1.6s ease forwards'}}/>
      {pts.map((v,i)=>i%3===0 && (
        <circle key={i} cx={toX(i)} cy={toY(v)} r="2.5" fill={C.iris} opacity="0.7"/>
      ))}
      <circle cx={toX(pts.length-1)} cy={toY(pts[pts.length-1])} r="5" fill={C.ember} stroke="#0d0f14" strokeWidth="2" style={{animation:'pulse 2s infinite'}}/>
    </svg>
  );
}

function Toast({message,onClose}){
  useEffect(()=>{const t=setTimeout(onClose,2600);return()=>clearTimeout(t)},[]);
  return <div className="toast"><i className="ph ph-check-circle" style={{color:C.mint}}/>{message}</div>;
}

/* ── MainView: insight-board composition ── */
function MainView(){
  const [tick,setTick]=useState(0);
  useEffect(()=>{const t=setInterval(()=>setTick(p=>p+1),4000);return()=>clearInterval(t)},[]);
  const heat=[18,22,19,26,31,28,35,42,38,45,52,48,58,63,55,61,68,72,65,70,76,71,66,74,80,77,73,79];

  const widgets=[
    {title:'감사로그 유형 분포',rows:[{n:'진료기록 다운로드',p:34,c:C.iris},{n:'자문신청 조회',p:29,c:C.ember},{n:'고객정보 조회',p:24,c:C.mint},{n:'기타',p:13,c:'#5a6070'}]},
    {title:'RBAC 권한 변경 추이 (7일)',rows:[{n:'월',p:20,c:C.iris},{n:'화',p:35,c:C.iris},{n:'수',p:28,c:C.iris},{n:'목',p:52,c:C.ember},{n:'금',p:41,c:C.iris}]},
    {title:'리포트 생성 이력',rows:[{n:'7월 정기 보고서',p:100,c:C.mint},{n:'6월 정기 보고서',p:100,c:C.mint},{n:'수시 감사대응',p:100,c:C.mint}]},
  ];

  return (
    <div className="content">
      <div className="aurora-strip">
        <div className="aurora-beam"/>
        <div className="aurora-inner">
          <div>
            <div className="aurora-title">야간 보안관제 센터</div>
            <div className="aurora-sub">감사로그 · 위협 신호 · 컴플라이언스 지표를 하나의 관제 화면에서 추적합니다</div>
          </div>
          <div style={{display:'flex',gap:10}}>
            <button className="btn-g" onClick={()=>{}}><i className="ph ph-arrow-clockwise"/>실시간 새로고침</button>
            <button className="btn-p" onClick={()=>{}}><i className="ph ph-export"/>일간 리포트</button>
          </div>
        </div>
      </div>

      <div className="insight-grid">
        {/* hero-viz */}
        <div className="card card-pad card-glow">
          <div className="card-hd">
            <div><div className="eyebrow">위협 신호 히트맵</div><div className="card-title">최근 24시간 이상 접근 추이</div></div>
            <span className="badge b-warn">우선순위 상위 3건 대기</span>
          </div>
          <HeatArea pts={heat}/>
          <div style={{display:'flex',gap:20,marginTop:10,paddingTop:12,borderTop:'1px solid var(--border-c)'}}>
            <span style={{fontSize:11.5,color:C.dim}}>최고치 <b style={{color:C.ember}}>80</b></span>
            <span style={{fontSize:11.5,color:C.dim}}>평균 <b style={{color:'#fff'}}>{(heat.reduce((a,b)=>a+b,0)/heat.length).toFixed(0)}</b></span>
            <span style={{fontSize:11.5,color:C.dim}}>현재 <b style={{color:C.iris}}>{heat[heat.length-1]+tick}</b></span>
          </div>
        </div>

        {/* kpi-side */}
        <div className="kpi-side">
          <div className="stat-card">
            <div className="stat-value" style={{color:C.iris}}>{(38200+tick*11).toLocaleString()}</div>
            <div className="stat-label">기간 내 감사로그 총 적재 건수</div>
            <div className="stat-trend trend-up">전주 대비 +9%</div>
          </div>
          <div className="stat-card">
            <div className="stat-value" style={{color:C.ember}}>7</div>
            <div className="stat-label">우선 대응 대기 신호</div>
            <div className="stat-trend trend-warn">최고 심각도 2건</div>
          </div>
          <div className="stat-card">
            <div className="stat-value" style={{color:C.mint}}>99.1%</div>
            <div className="stat-label">RBAC 정책 일치율</div>
            <div className="stat-trend trend-up">화면·API 이중 검증 통과</div>
          </div>
        </div>
      </div>

      {/* widget-grid */}
      <div className="widget-grid">
        {widgets.map((w,i)=>(
          <div className="card card-pad" key={i}>
            <div className="card-title" style={{marginBottom:14}}>{w.title}</div>
            {w.rows.map((r,j)=>(
              <div key={j} style={{marginBottom:9}}>
                <div style={{display:'flex',justifyContent:'space-between',marginBottom:3}}>
                  <span style={{fontSize:11.5,color:C.dim}}>{r.n}</span>
                  <span style={{fontSize:11,color:C.dim}}>{r.p}%</span>
                </div>
                <div className="pbar"><div className="pfill" style={{width:`${r.p}%`,background:r.c}}/></div>
              </div>
            ))}
          </div>
        ))}
      </div>
    </div>
  );
}

/* ── AuditSearchView ── */
function AuditSearchView(){
  const [saved,setSaved]=useState(false);
  const [toast,setToast]=useState(null);
  const results=[
    {ts:'2026-07-10 11:04:22',emp:'A0231',action:'자문신청 상세 조회',target:'REQ-88213',ip:'10.20.4.88'},
    {ts:'2026-07-10 11:02:10',emp:'A0104',action:'진료기록 파일 다운로드',target:'MED-42911.pdf',ip:'10.20.1.15'},
    {ts:'2026-07-10 10:58:47',emp:'A0231',action:'고객 세부정보 조회',target:'CUST-10293',ip:'10.20.4.88'},
    {ts:'2026-07-09 22:14:03',emp:'A0077',action:'진료기록 파일 다운로드',target:'MED-42887.pdf',ip:'10.20.4.12'},
    {ts:'2026-07-09 18:51:03',emp:'A0104',action:'자문신청 상세 조회',target:'REQ-88190',ip:'10.20.1.15'},
    {ts:'2026-07-09 15:30:52',emp:'A0231',action:'고객 세부정보 조회',target:'CUST-10201',ip:'10.20.4.88'},
  ];
  return (
    <div className="content">

      </div>

      <div className="card card-pad" style={{marginBottom:18}}>

          <div className="fi" style={{marginBottom:0}}><label className="fl">사번</label><input className="inp" placeholder="예: A0231"/></div>

        <div style={{padding:'12px 16px',borderTop:'1px solid var(--border-c)',display:'flex',justifyContent:'space-between',alignItems:'center'}}>

/* ── RbacView ── */
function RbacView(){
  const [showModal,setShowModal]=useState(false);
  const [toast,setToast]=useState(null);
  const roles=['관리자','자문의','감사자'];
  const resources=['자문신청 조회','진료기록 다운로드','고객정보 조회','동의 항목 관리','감사로그 조회','파기 스크립트 실행'];
  const [grid,setGrid]=useState({'관리자':[1,1,1,1,1,1],'자문의':[1,1,0,0,0,0],'감사자':[1,0,1,0,1,0]});

  const toggle=(role,idx)=>{
    setGrid(p=>{
      const next={...p,[role]:[...p[role]]};
      next[role][idx]=next[role][idx]?0:1;
      return next;
    });
  };

  const changeLog=[
    {who:'감사자 최OO',what:'감사자 → 파기 스크립트 실행 권한 회수',at:'2026-07-09 16:20'},
    {who:'관리자 김OO',what:'자문의 → 감사로그 조회 권한 부여',at:'2026-07-08 10:05'},
    {who:'관리자 정OO',what:'신규 역할 "감사자" 생성 및 초기 권한 설정',at:'2026-07-02 09:40'},
  ];

  return (
    <div className="content">
      <div className="section-hd">
        <div><div className="eyebrow">접근 권한</div><div className="section-title">역할 기반 접근 권한(RBAC) 관리 고도화</div></div>
        <button className="btn-p" onClick={()=>setShowModal(true)}><i className="ph ph-plus"/>신규 역할 추가</button>
      </div>

      <div className="card card-pad" style={{marginBottom:20,overflowX:'auto'}}>
        <div className="card-title" style={{marginBottom:14}}>역할 × 리소스 권한 매트릭스</div>
        <table className="tbl" style={{minWidth:640}}>
          <thead>
            <tr><th>리소스</th>{roles.map(r=><th key={r} style={{textAlign:'center'}}>{r}</th>)}</tr>
          </thead>
          <tbody>
            {resources.map((res,ri)=>(
              <tr key={res}>
                <td style={{fontWeight:600}}>{res}</td>
                {roles.map(role=>(
                  <td key={role} style={{textAlign:'center'}}>
                    <div className={`perm-cell ${grid[role][ri]?'on':'off'}`} style={{margin:'0 auto'}} onClick={()=>toggle(role,ri)}>
                      <i className={grid[role][ri]?'ph ph-check':'ph ph-minus'} style={{fontSize:13}}/>
                    </div>
                  </td>
                ))}
              </tr>
            ))}
          </tbody>
        </table>
        <div style={{fontSize:11,color:C.dim,marginTop:10}}>셀을 클릭해 역할별 리소스 접근 권한을 즉시 조정할 수 있으며, 변경 사항은 API 레이어의 PreAuthorize 검증에도 동일하게 반영됩니다.</div>
      </div>

      <div className="section-hd"><div className="card-title">권한 변경 이력</div></div>
      <div className="card" style={{overflow:'hidden'}}>
        {changeLog.map((c,i)=>(
          <div key={i} style={{display:'flex',justifyContent:'space-between',padding:'13px 18px',borderBottom:i<changeLog.length-1?'1px solid var(--border-c)':'none'}}>
            <div>
              <div style={{fontSize:12.5,fontWeight:600}}>{c.what}</div>
              <div style={{fontSize:11,color:C.dim,marginTop:2}}>{c.who}</div>
            </div>
            <div className="mono" style={{alignSelf:'center'}}>{c.at}</div>
          </div>
        ))}
      </div>

      {showModal && (
        <div className="modal-overlay" onClick={()=>setShowModal(false)}>
          <div className="modal" onClick={e=>e.stopPropagation()}>
            <div className="modal-hd">
              <div className="modal-title">신규 역할 추가</div>
              <button className="icon-btn" onClick={()=>setShowModal(false)}><i className="ph ph-x"/></button>
            </div>
            <div className="fi"><label className="fl">역할명</label><input className="inp" placeholder="예: 외부 감사 파트너"/></div>
            <div className="fi"><label className="fl">기본 권한 템플릿</label>
              <select className="inp"><option>읽기 전용</option><option>감사자 권한 복사</option><option>빈 권한에서 시작</option></select>
            </div>
            <div style={{display:'flex',gap:8,marginTop:8}}>
              <button className="btn-p" onClick={()=>{setShowModal(false);setToast('신규 역할이 추가되었습니다')}}>역할 생성</button>
              <button className="btn-g" onClick={()=>setShowModal(false)}>취소</button>
            </div>
          </div>
        </div>
      )}
      {toast && <Toast message={toast} onClose={()=>setToast(null)}/>}
    </div>
  );
}
