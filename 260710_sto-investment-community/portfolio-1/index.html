function useRipple() {
  return (e) => {
    const el = e.currentTarget;
    const rect = el.getBoundingClientRect();
    const rp = document.createElement('span');
    const size = Math.max(rect.width, rect.height);
    rp.className = 'rp';
    rp.style.width = rp.style.height = size + 'px';
    rp.style.left = (e.clientX - rect.left - size / 2) + 'px';
    rp.style.top = (e.clientY - rect.top - size / 2) + 'px';
    el.style.position = el.style.position || 'relative';
    el.style.overflow = 'hidden';
    el.appendChild(rp);
    setTimeout(() => rp.remove(), 520);
  };
}

/* ───────────────────────── 공용 컴포넌트 ───────────────────────── */
function Icon({ name, size = 17, className = '' }) {
  return <i data-lucide={name} style={{ width: size, height: size }} className={className}></i>;
}

function Sparkline({ data, color }) {
  const w = 56, h = 22;
  const min = Math.min(...data), max = Math.max(...data);
  const range = max - min || 1;
  const pts = data.map((v, i) => `${(i / (data.length - 1)) * w},${h - ((v - min) / range) * h}`).join(' ');
  return (
    <svg className="spark" viewBox={`0 0 ${w} ${h}`}>
      <polyline points={pts} fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" />
    </svg>
  );
}

                <div>발행사 · <a onClick={() => setTab('발행사')} style={{ fontWeight: 700, cursor: 'pointer', textDecoration: 'underline' }}>{asset.issuer}</a></div>
                <div>기준가 · {won(asset.price)}</div>
              </div>
            </div>
            <div className="card-block">
              <h4>연동 공시자료</h4>
              {DISCLOSURES.filter((d) => d.issuer === asset.issuer).map((d) => (
                <div key={d.id} className="disc-row">
                  <div className="disc-ico"><Icon name="file-text" size={15} /></div>
                  <div className="disc-info"><div className="disc-title">{d.title}</div><div className="disc-meta">{d.date}</div></div>
                </div>
              ))}
            </div>
          </div>
        </div>
      )}

      {tab === '발행사' && issuer && (
        <div className="two-col">
          <div className="card-block">
            <h4>{issuer.name}</h4>
            <p style={{ fontSize: 13.5, color: '#3a3c40', lineHeight: 1.7 }}>{issuer.desc} · {issuer.founded}</p>
            <div style={{ display: 'flex', gap: 8, marginTop: 6 }}>
              {ASSETS.filter((a) => a.issuer === issuer.name).map((a) => (
                <button key={a.id} className="asset-pill" onClick={() => setSelectedId(a.id)}>{a.name}</button>
              ))}
            </div>
          </div>
          <div className="card-block">
            <h4>공지사항</h4>
            <p style={{ fontSize: 13.5, color: '#3a3c40' }}>{issuer.notice}</p>
          </div>
        </div>
      )}

      {tab === 'FAQ' && issuer && (
        <div className="card-block">
          <h4>발행사 FAQ</h4>
          {issuer.faq.map((f, i) => (
            <div key={i} className={`accordion-item ${openFaq === i ? 'open' : ''}`}>
              <div className="accordion-q" onClick={() => setOpenFaq(openFaq === i ? null : i)}>
                {f.q}<Icon name="chevron-down" size={16} />
              </div>
              <div className="accordion-a">{f.a}</div>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

/* ───────────────────────── 커뮤니티 다중 게시판 ───────────────────────── */
function CommunityScreen({ posts, setPosts, openPost, pushToast }) {
  const [board, setBoard] = useState('전체');
  const [writeOpen, setWriteOpen] = useState(false);
  const ripple = useRipple();
  const list = board === '전체' ? posts : posts.filter((p) => p.board === board);

  function toggleBookmark(id, e) {
    e.stopPropagation();
    setPosts(posts.map((p) => p.id === id ? { ...p, bookmarked: !p.bookmarked } : p));
    pushToast('북마크가 갱신되었습니다');
  }
  function toggleLike(id, e) {
    e.stopPropagation();
    setPosts(posts.map((p) => p.id === id ? { ...p, likes: p.likes + 1 } : p));
  }

  return (
    <div className="page-wrap">
      <div className="page-head">
        <div>
          <h1 className="page-title">커뮤니티 다중 게시판</h1>
          <p className="page-sub">종목토론부터 초보길잡이까지 게시판별로 나눠 소통합니다</p>
        </div>
      </div>
      <div className="board-row">
        {['전체', ...BOARDS].map((b) => (
          <button key={b} className={`board-chip ${board === b ? 'active' : ''}`} onClick={() => setBoard(b)}>{b}</button>
        ))}
        <button className="write-btn" onClick={(e) => { ripple(e); setWriteOpen(true); }}><Icon name="pen-line" size={14} />글쓰기</button>
      </div>

      <div>
        {list.map((p) => (
          <div key={p.id} className="post-list-row" onClick={() => openPost(p.id)}>
            <div className="post-avatar"><img src={avatarUrl(p.author)} alt={p.author} /></div>
            <div style={{ flex: 1 }}>
              <div className="post-list-title">{p.title}</div>
              <div className="post-list-meta"><span className="tag-pill">{p.board}</span><span>{p.author}</span><span>{p.date}</span></div>
            </div>
            <div className="post-list-stats">
              <span onClick={(e) => toggleLike(p.id, e)}><Icon name="heart" size={14} className={p.likes > 20 ? 'chg-up' : ''} />{p.likes}</span>
              <span><Icon name="message-circle" size={14} />{p.comments.length}</span>
              <span onClick={(e) => toggleBookmark(p.id, e)}><Icon name={p.bookmarked ? 'bookmark-check' : 'bookmark'} size={14} /></span>
            </div>
          </div>
        ))}
      </div>

      {writeOpen && (
        <div className="overlay" onClick={() => setWriteOpen(false)}>
          <div className="modal-box write" onClick={(e) => e.stopPropagation()}>
            <div className="modal-head"><h3>새 글 작성</h3><button className="close-x" onClick={() => setWriteOpen(false)}><Icon name="x" size={18} /></button></div>
            <div className="field-row"><label>게시판</label>
              <select style={{ width: '100%', padding: '11px 13px', borderRadius: 10, border: '1px solid var(--line)', fontSize: 14 }}>
                {BOARDS.map((b) => <option key={b}>{b}</option>)}
              </select>
            </div>
            <div className="field-row"><label>제목</label><input placeholder="제목을 입력하세요" /></div>
            <div className="field-row">
              <label>내용</label>
              <div className="toolbar-row">
                <button title="굵게" onClick={(e) => { e.currentTarget.classList.toggle('tb-on'); }}><Icon name="bold" size={14} /></button>
                <button title="기울임" onClick={(e) => { e.currentTarget.classList.toggle('tb-on'); }}><Icon name="italic" size={14} /></button>
                <button title="목록" onClick={(e) => { e.currentTarget.classList.toggle('tb-on'); }}><Icon name="list" size={14} /></button>
                <button title="이미지 첨부" onClick={() => pushToast('이미지가 첨부되었습니다')}><Icon name="image" size={14} /></button>
              </div>
              <div className="editor-area">
                <textarea placeholder="자유롭게 작성해주세요"></textarea>
                <span className="attach-chip"><Icon name="paperclip" size={12} />disclosure-summary.png</span>
              </div>
            </div>
            <div className="modal-actions">
              <button className="btn-ghost" onClick={() => setWriteOpen(false)}>취소</button>
              <button className="btn-primary" onClick={() => { setWriteOpen(false); pushToast('게시글이 등록되었습니다'); }}>등록</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

function PostDetailDrawer({ post, onClose, posts, setPosts, pushToast, onReport }) {
  const [replyOpen, setReplyOpen] = useState(null);
  const [replyText, setReplyText] = useState('');
  if (!post) return null;

  function submitReply(commentId) {
    if (!replyText.trim()) return;
    setPosts(posts.map((p) => {
      if (p.id !== post.id) return p;
      return { ...p, comments: p.comments.map((c) => c.id === commentId ? { ...c, replies: [...c.replies, { id: `${commentId}-${Date.now() % 1000}`, author: '나', body: replyText }] } : c) };
    }));
    setReplyText(''); setReplyOpen(null);
    pushToast('답글이 등록되었습니다');
  }

  return (
    <div className="overlay drawer-mode" onClick={onClose}>
      <div className="drawer-box" onClick={(e) => e.stopPropagation()}>
        <div className="modal-head"><span className="tag-pill">{post.board}</span><button className="close-x" onClick={onClose}><Icon name="x" size={18} /></button></div>
        <h3 style={{ fontSize: 20, margin: '4px 0 8px' }}>{post.title}</h3>
        <div className="post-meta" style={{ marginBottom: 14 }}><Icon name="user" size={12} />{post.author} · {post.date}</div>
        <p style={{ fontSize: 14.5, lineHeight: 1.7 }}>{post.body}</p>
        <div style={{ display: 'flex', gap: 10, margin: '18px 0' }}>
          <button className="btn-ghost" onClick={() => { setPosts(posts.map((p) => p.id === post.id ? { ...p, likes: p.likes + 1 } : p)); }}><Icon name="heart" size={14} /> 좋아요 {post.likes}</button>
          <button className="btn-ghost" onClick={() => { setPosts(posts.map((p) => p.id === post.id ? { ...p, bookmarked: !p.bookmarked } : p)); pushToast('북마크가 갱신되었습니다'); }}><Icon name={post.bookmarked ? 'bookmark-check' : 'bookmark'} size={14} /> 북마크</button>
          <button className="btn-ghost" onClick={() => onReport(post.id)}><Icon name="flag" size={14} /> 신고</button>
        </div>
        <h4 style={{ fontSize: 14.5 }}>댓글 {post.comments.length}개</h4>
        {post.comments.map((c) => (
          <div key={c.id}>
            <div className="comment-item">
              <div className="comment-head"><img src={avatarUrl(c.author)} style={{ width: 22, height: 22, borderRadius: '50%' }} alt="" />{c.author}</div>
              <div className="comment-body">{c.body}</div>
              <span className="comment-reply-btn" onClick={() => setReplyOpen(replyOpen === c.id ? null : c.id)}>답글달기</span>
            </div>
            {c.replies.map((r) => (
              <div key={r.id} className="comment-item comment-reply-item">
                <div className="comment-head"><img src={avatarUrl(r.author)} style={{ width: 20, height: 20, borderRadius: '50%' }} alt="" />{r.author}</div>
                <div className="comment-body">{r.body}</div>
              </div>
            ))}
            {replyOpen === c.id && (
              <div className="reply-input-row">
                <input value={replyText} onChange={(e) => setReplyText(e.target.value)} placeholder="답글을 입력하세요" onKeyDown={(e) => e.key === 'Enter' && submitReply(c.id)} />
                <button className="btn-primary" onClick={() => submitReply(c.id)}>등록</button>
              </div>
            )}
          </div>
        ))}
      </div>
    </div>
  );
}

/* ───────────────────────── 통합 검색 ───────────────────────── */
function SearchScreen({ initialQuery, posts, openPost }) {
  const [q, setQ] = useState(initialQuery || '');
  const [tab, setTab] = useState('게시글');
  const [tags, setTags] = useState([]);
  useEffect(() => { setQ(initialQuery || ''); }, [initialQuery]);
  const allTags = ['부동산', '미술품', '저작권', '리츠', '초보'];

  function toggleTag(t) { setTags(tags.includes(t) ? tags.filter((x) => x !== t) : [...tags, t]); }

  const postResults = posts.filter((p) => (!q || p.title.includes(q) || p.body.includes(q)) && (tags.length === 0 || tags.some((t) => p.title.includes(t) || p.board.includes(t))));
  const assetResults = ASSETS.filter((a) => (!q || a.name.includes(q) || a.class.includes(q)) && (tags.length === 0 || tags.includes(a.class)));
  const issuerResults = ISSUERS.filter((i) => !q || i.name.includes(q) || i.desc.includes(q));
  const counts = { '게시글': postResults.length, '종목': assetResults.length, '발행사': issuerResults.length };

  return (
    <div className="page-wrap">
      <div className="page-head"><div><h1 className="page-title">통합 검색</h1><p className="page-sub">게시글·종목·발행사를 키워드 하나로 검색합니다</p></div></div>
      <div className="search-mini" style={{ maxWidth: 480 }}>
        <Icon name="search" size={16} />
        <input placeholder="검색어를 입력하세요" value={q} onChange={(e) => setQ(e.target.value)} />
      </div>
      <div className="trend-tags">
        {allTags.map((t) => (
          <span key={t} className="trend-tag" style={{ cursor: 'pointer', background: tags.includes(t) ? 'var(--primary)' : 'var(--bg)', color: tags.includes(t) ? '#fff' : 'var(--text2)' }} onClick={() => toggleTag(t)}>#{t}</span>
        ))}
      </div>
      <div className="search-tabs">
        {['게시글', '종목', '발행사'].map((t) => (
          <button key={t} className={`search-tab-btn ${tab === t ? 'active' : ''}`} onClick={() => setTab(t)}>{t} {counts[t]}</button>
        ))}
      </div>

      {tab === '게시글' && (postResults.length ? postResults.map((p) => (
        <div key={p.id} className="search-result-row" onClick={() => openPost(p.id)}>
          <div><span className="tag-pill">{p.board}</span> <span style={{ fontSize: 14, fontWeight: 600, marginLeft: 6 }}>{p.title}</span></div>
          <span style={{ fontSize: 12.5, color: 'var(--text2)' }}>{p.author}</span>
        </div>
      )) : <EmptyState q={q} />)}
      {tab === '종목' && (assetResults.length ? assetResults.map((a) => (
        <div key={a.id} className="search-result-row"><div><span className="tag-pill">{a.class}</span> <span style={{ fontSize: 14, fontWeight: 600, marginLeft: 6 }}>{a.name}</span></div><span style={{ fontSize: 12.5, color: 'var(--text2)' }}>{won(a.price)}</span></div>
      )) : <EmptyState q={q} />)}
      {tab === '발행사' && (issuerResults.length ? issuerResults.map((i) => (
        <div key={i.id} className="search-result-row"><span style={{ fontSize: 14, fontWeight: 600 }}>{i.name}</span><span style={{ fontSize: 12.5, color: 'var(--text2)' }}>{i.desc}</span></div>
      )) : <EmptyState q={q} />)}
    </div>
  );
}

function EmptyState({ q }) {
  return (
    <div className="empty-state">
      <Icon name="search-x" size={34} />
      <p style={{ fontWeight: 700, margin: '12px 0 4px' }}>{q ? `'${q}'에 대한 결과가 없습니다` : '검색어를 입력해주세요'}</p>
      <p style={{ fontSize: 13 }}>인기 검색어: 부동산, 저작권, 리츠</p>
    </div>
  );
}

/* ───────────────────────── 마이페이지 ───────────────────────── */
function MyPageScreen({ pushToast }) {
  const [tab, setTab] = useState('내 정보');
  const bookmarkedPosts = initialPosts.filter((p) => p.bookmarked);
  return (
    <div className="page-wrap">
      <div className="page-head"><div><h1 className="page-title">마이페이지</h1><p className="page-sub">내 정보와 활동 내역을 관리합니다</p></div></div>
      <div className="mypage-grid">
        <div className="mypage-side">
          <div className="mypage-avatar"><img src={avatarUrl('투자새싹')} alt="" /></div>
          <div style={{ fontWeight: 800, fontSize: 15 }}>투자새싹</div>
          <div style={{ fontSize: 12.5, color: 'var(--text2)' }}>sto-user@example.com</div>
          <div className="mypage-tabs">
            {['내 정보', '내가 쓴 글', '스크랩', '댓글 내역'].map((t) => (
              <div key={t} className={`mypage-tab ${tab === t ? 'active' : ''}`} onClick={() => setTab(t)}><Icon name="chevron-right" size={13} />{t}</div>
            ))}
          </div>
        </div>
        <div>
          {tab === '내 정보' && (
            <div className="card-block">
              <h4>프로필 수정</h4>
              <div className="field-row"><label>닉네임</label><input defaultValue="투자새싹" /></div>
              <div className="field-row"><label>이메일</label><input defaultValue="sto-user@example.com" /></div>
              <button className="save-btn" onClick={() => pushToast('프로필이 저장되었습니다')}>저장</button>
            </div>
          )}
          {tab === '내가 쓴 글' && (
            <div className="card-block">
              <h4>내가 쓴 글</h4>
              {initialPosts.filter((p) => p.author === '투자새싹').map((p) => (
                <div key={p.id} className="post-row"><span className="post-board-tag">{p.board}</span><div className="post-title">{p.title}</div></div>
              ))}
            </div>
          )}
          {tab === '스크랩' && (
            <div className="card-block">
              <h4>스크랩 내역</h4>
              {bookmarkedPosts.length ? bookmarkedPosts.map((p) => (
                <div key={p.id} className="post-row"><span className="post-board-tag">{p.board}</span><div className="post-title">{p.title}</div></div>
              )) : <p style={{ fontSize: 13.5, color: 'var(--text2)' }}>스크랩한 글이 없습니다</p>}
            </div>
          )}
          {tab === '댓글 내역' && (
            <div className="card-block">
              <h4>댓글 내역</h4>
              <p style={{ fontSize: 13.5, color: 'var(--text2)' }}>강남오피스 1호 종목토론에 댓글을 남겼습니다</p>
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

/* ───────────────────────── App ───────────────────────── */
const NAV = [
  { id: 'main', label: '홈', icon: 'layout-grid', title: 'STO/RWA 종목 인사이트 허브' },
  { id: 'asset-detail', label: '종목상세', icon: 'trending-up', title: '종목 상세 및 발행사 정보' },
  { id: 'community', label: '커뮤니티', icon: 'message-square', title: '커뮤니티 다중 게시판' },
  { id: 'search', label: '검색', icon: 'search', title: '통합 검색' },
  { id: 'mypage', label: '마이페이지', icon: 'user-circle', title: '마이페이지' },
];

function App() {
  const [screen, setScreen] = useState('main');
  const [assetClass, setAssetClass] = useState('전체');
  const [assetStatus, setAssetStatus] = useState('전체');
  const [selectedId, setSelectedId] = useState(ASSETS[0].id);
  const [assetInitialTab, setAssetInitialTab] = useState('종목정보');
  const [posts, setPosts] = useState(initialPosts);
  const [postDetail, setPostDetail] = useState(null);
  const [searchQuery, setSearchQuery] = useState('');
  const [reportTarget, setReportTarget] = useState(null);
  const [toasts, setToasts] = useState([]);
  const ripple = useRipple();

  useEffect(() => { lucide.createIcons(); });
  useEffect(() => {
    function onGoSearch(e) { setSearchQuery(e.detail); setScreen('search'); }
    window.addEventListener('go-search', onGoSearch);
    return () => window.removeEventListener('go-search', onGoSearch);
  }, []);

  function pushToast(msg) {
    const id = Date.now() + Math.random();
    setToasts((t) => [...t, { id, msg }]);
    setTimeout(() => setToasts((t) => t.filter((x) => x.id !== id)), 2600);
  }

  function openAsset(id, tab) { if (!id) return; setSelectedId(id); setAssetInitialTab(tab || '종목정보'); setScreen('asset-detail'); }
  function openPost(id) { setPostDetail(posts.find((p) => p.id === id)); }

  const filteredAssets = ASSETS.filter((a) => (assetClass === '전체' || a.class === assetClass) && (assetStatus === '전체' || a.status === assetStatus));

  return (
    <div data-archetype="bento-grid" className="app-shell">
      <header className="topbar">
        <div className="brand"><span className="mark">브</span>{BRAND}</div>
        <nav className="nav-tabs">
          {NAV.map((n) => (
            <button key={n.id} title={n.title} className={`nav-tab ${screen === n.id ? 'active' : ''}`} onClick={(e) => { ripple(e); setScreen(n.id); }}>
              <Icon name={n.icon} size={15} />{n.label}
              {n.label !== n.title && <span style={{ display: 'none' }}>{n.title}</span>}
            </button>
          ))}
        </nav>
        <div className="topbar-actions">
          <button className="icon-btn" title="알림" onClick={() => pushToast('새 알림이 없습니다')}><Icon name="bell" size={18} /><span className="badge-dot"></span></button>
          <button className="avatar-btn" title="마이페이지" onClick={() => setScreen('mypage')}><img src={avatarUrl('투자새싹')} alt="프로필" /></button>
        </div>
      </header>

      {screen === 'main' && (
        <MainBento assetClass={assetClass} setAssetClass={setAssetClass} assetStatus={assetStatus} setAssetStatus={setAssetStatus}
          filteredAssets={filteredAssets.length ? filteredAssets : ASSETS} posts={posts} openAsset={openAsset} openPost={openPost} pushToast={pushToast} />
      )}
      {screen === 'asset-detail' && <AssetDetailScreen selectedId={selectedId} setSelectedId={setSelectedId} initialTab={assetInitialTab} />}
      {screen === 'community' && <CommunityScreen posts={posts} setPosts={setPosts} openPost={openPost} pushToast={pushToast} />}
      {screen === 'search' && <SearchScreen initialQuery={searchQuery} posts={posts} openPost={openPost} />}
      {screen === 'mypage' && <MyPageScreen pushToast={pushToast} />}

      {postDetail && (
        <PostDetailDrawer post={postDetail} onClose={() => setPostDetail(null)} posts={posts} setPosts={setPosts} pushToast={pushToast}
          onReport={(id) => { setPostDetail(null); setReportTarget(id); }} />
      )}

      {reportTarget && (
        <div className="overlay" onClick={() => setReportTarget(null)}>
          <div className="modal-box" style={{ width: 380 }} onClick={(e) => e.stopPropagation()}>
            <div className="modal-head"><h3>게시글 신고</h3><button className="close-x" onClick={() => setReportTarget(null)}><Icon name="x" size={18} /></button></div>
            <p style={{ fontSize: 14, color: 'var(--text2)' }}>이 게시글을 정말 신고하시겠습니까? 신고 접수 후 운영팀 검토가 진행됩니다.</p>
            <div className="modal-actions">
              <button className="btn-ghost" onClick={() => setReportTarget(null)}>취소</button>
              <button className="btn-danger" onClick={() => { setPosts(posts.map((p) => p.id === reportTarget ? { ...p, reported: true } : p)); setReportTarget(null); pushToast('신고가 접수되었습니다'); }}>신고하기</button>
            </div>
          </div>
        </div>
      )}

      <div className="toast-stack">
        {toasts.map((t) => <div key={t.id} className="toast"><Icon name="check-circle" size={16} />{t.msg}</div>)}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
