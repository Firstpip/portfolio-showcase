/* ───────────────────────── 유틸 ───────────────────────── */
function Icon({ name, size = 15 }) { return <i className={`ph ph-${name}`} style={{ fontSize: size }}></i>; }

function Block({ type, children }) {
  return (
    <div className={`block block-${type}`} data-block-type={type}>
      <span className="block-handle">⋮⋮</span>
      <div style={{ flex: 1 }}>{children}</div>
    </div>
  );
}
function TextBlock({ children }) { return <Block type="text"><p>{children}</p></Block>; }
function HeadingBlock({ children }) { return <Block type="heading"><h2>{children}</h2></Block>; }
function DividerBlock() { return <Block type="divider"><hr /></Block>; }
function CalloutBlock({ icon = 'info', tone = 'info', children }) {
  return <div className={`block block-callout tone-${tone}`} data-block-type="callout"><span className="callout-icon"><Icon name={icon} size={16} /></span><div className="callout-text">{children}</div></div>;
}
function ToggleBlock({ summary, children, defaultOpen }) {
  const [open, setOpen] = useState(!!defaultOpen);
  return (
    <div className="block block-toggle" data-block-type="toggle">
      <div className="toggle-row">
        <button className={`toggle-arrow ${open ? 'open' : ''}`} onClick={() => setOpen(!open)}><Icon name={open ? 'caret-down' : 'caret-right'} size={13} /></button>
        <button className="toggle-summary" onClick={() => setOpen(!open)}>{summary}</button>
      </div>
      {open && <div className="toggle-content">{children}</div>}
    </div>
  );
}
function ListBlock({ items }) {
  return <Block type="list">{items.map((it, i) => <div key={i} className="list-item"><span className="bullet"></span>{it}</div>)}</Block>;
}
function TableBlockWrap({ title, children }) {
  return <Block type="table">{title && <div className="block-table-title">{title}</div>}{children}</Block>;
}

function useRipple() {
  return (e) => {
    const el = e.currentTarget;
    if (!el.classList.contains('btn-acid')) return;
  };
}

    setReports(reports.map((r) => {

      return { ...r, status: next };

                  <td><span className={`badge ${m.role === '우수' ? 'acid' : ''}`}>{m.role}</span></td>

          <div key={b.id} className="list-item" style={{ justifyContent: 'space-between' }}>

          <thead><tr><th>제목</th><th>카테고리</th><th>등록일</th><th>재분류</th></tr></thead>
          <tbody>{discs.map((d) => (
            <tr key={d.id}><td>{d.title}</td><td><span className="badge violet">{d.category}</span></td><td>{d.date}</td>
              <td>
                <select value={d.category} onChange={(e) => moveCategory(d.id, e.target.value)} style={{ padding: '5px 8px', fontSize: 12, borderRadius: 6, background: 'rgba(255,255,255,0.02)', border: '1px solid var(--graphite)', color: 'var(--mist)' }}>
                  {CATEGORIES.map((c) => <option key={c}>{c}</option>)}
                </select>
              </td></tr>
          ))}</tbody>
        </table>
      </TableBlockWrap>
    </PageShell>
  );
}

/* ───────────────────────── 배너/팝업/공지 및 확장 분석 ───────────────────────── */
function CmsAnalyticsPage({ pushToast }) {
  const [banners, setBanners] = useState(BANNERS_INIT);
  const [popups, setPopups] = useState(POPUPS_INIT);
  const [notices, setNotices] = useState(NOTICES_INIT);
  const [noticeFormOpen, setNoticeFormOpen] = useState(false);
  const [noticeTitle, setNoticeTitle] = useState('');
  const [range, setRange] = useState('7일');
  const [delTarget, setDelTarget] = useState(null);

  const trendData = range === '7일' ? TREND_DATA_7 : TREND_DATA_30;

  return (
    <PageShell iconGlyph="megaphone" title="배너/팝업/공지 및 확장 분석" lede="홈 배너·팝업·공지사항을 스케줄링하고 콘텐츠별 조회 추이를 확인합니다" crumbs={['브릭스퀘어 콘솔', '배너/팝업/공지 및 확장 분석']} onHome={() => window.dispatchEvent(new CustomEvent('nav-home'))} pushToast={pushToast}>
      <HeadingBlock>배너 관리</HeadingBlock>
      <TableBlockWrap>
        <table className="nt-table">
          <thead><tr><th>제목</th><th>노출 기간</th><th>노출</th><th>액션</th></tr></thead>
          <tbody>{banners.map((b) => (
            <tr key={b.id}><td>{b.title}</td><td>{b.period}</td>
              <td><div className={`toggle-switch ${b.active ? 'on' : ''}`} onClick={() => setBanners(banners.map((x) => x.id === b.id ? { ...x, active: !x.active } : x))}></div></td>
              <td><button className="btn-danger" onClick={() => setDelTarget({ type: 'banner', id: b.id, name: b.title })}>삭제</button></td></tr>
          ))}</tbody>
        </table>
      </TableBlockWrap>
      <CalloutBlock icon="clock-countdown" tone="info">노출 기간이 만료된 배너는 별도 조작 없이 메인 화면에서 자동으로 제외됩니다.</CalloutBlock>

      <DividerBlock />
      <HeadingBlock>팝업 관리</HeadingBlock>
      <Block type="list">
        {popups.map((p) => (
          <div key={p.id} className="list-item" style={{ justifyContent: 'space-between' }}>
            <span><span className="bullet"></span>{p.title} <span className="badge" style={{ marginLeft: 6 }}>{p.pages}</span></span>
            <div className={`toggle-switch ${p.active ? 'on' : ''}`} onClick={() => setPopups(popups.map((x) => x.id === p.id ? { ...x, active: !x.active } : x))}></div>
          </div>
        ))}
      </Block>

      <DividerBlock />
      <HeadingBlock>공지사항</HeadingBlock>
      <ToggleBlock summary="새 공지 등록">
        <div className="field-row"><label>제목</label><input value={noticeTitle} onChange={(e) => setNoticeTitle(e.target.value)} placeholder="공지 제목을 입력하세요" /></div>
        <button className="btn-acid" onClick={() => { if (!noticeTitle.trim()) return; setNotices([{ id: `nt${Date.now() % 1000}`, title: noticeTitle, date: '07.10', status: '게시중' }, ...notices]); setNoticeTitle(''); pushToast('공지사항이 등록되었습니다'); }}>등록</button>
      </ToggleBlock>
      <TableBlockWrap>
        <table className="nt-table">
          <thead><tr><th>제목</th><th>등록일</th><th>상태</th></tr></thead>
          <tbody>{notices.map((n) => (<tr key={n.id}><td>{n.title}</td><td>{n.date}</td><td><span className={`badge ${n.status === '게시중' ? 'green' : ''}`}>{n.status}</span></td></tr>))}</tbody>
        </table>
      </TableBlockWrap>

      <DividerBlock />
      <HeadingBlock>조회 추이 분석</HeadingBlock>
      <Block type="table">
        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 4 }}>
          <span style={{ fontSize: 13, color: 'var(--fog)' }}>게시판/종목 통합 조회수</span>
          <div style={{ display: 'flex', gap: 6 }}>
            {['7일', '30일'].map((r) => <button key={r} className={`pill-btn ${range === r ? 'active' : ''}`} onClick={() => setRange(r)}>{r}</button>)}
          </div>
        </div>
        <div className="chart-wrap">
          <ResponsiveContainer width="100%" height="100%">
            <BarChart data={trendData} margin={{ top: 6, right: 8, left: -18, bottom: 0 }}>
              <CartesianGrid stroke="#23252a" vertical={false} />
              <XAxis dataKey="d" tick={{ fontSize: 11, fill: '#8a8f98' }} axisLine={false} tickLine={false} />
              <YAxis tick={{ fontSize: 11, fill: '#8a8f98' }} axisLine={false} tickLine={false} />
              <Tooltip contentStyle={{ background: '#161718', border: '1px solid #23252a', borderRadius: 8, fontSize: 12, color: '#fff' }} />
              <Bar dataKey="views" name="조회수" fill="#e4f222" radius={[4, 4, 0, 0]} />
            </BarChart>
          </ResponsiveContainer>
        </div>
      </Block>

      {delTarget && (
        <div className="overlay" onClick={() => setDelTarget(null)}>
          <div className="modal-box" onClick={(e) => e.stopPropagation()}>
            <div className="modal-head"><h3>배너 삭제</h3><button className="close-x" onClick={() => setDelTarget(null)}><Icon name="x" size={16} /></button></div>
            <p style={{ fontSize: 13.5 }}>"{delTarget.name}"을(를) 삭제하시겠습니까?</p>
            <div className="modal-actions">
              <button className="btn-ghost" onClick={() => setDelTarget(null)}>취소</button>
              <button className="btn-danger" onClick={() => { setBanners(banners.filter((b) => b.id !== delTarget.id)); setDelTarget(null); pushToast('배너가 삭제되었습니다'); }}>삭제</button>
            </div>
          </div>
        </div>
      )}
    </PageShell>
  );
}

/* ───────────────────────── 활동 로그 ───────────────────────── */
function AuditLogPage() {
  const [cat, setCat] = useState('전체');
  const cats = ['전체', '회원', '콘텐츠', '종목', '배너', '공지'];
  const list = cat === '전체' ? AUDIT_LOG : AUDIT_LOG.filter((a) => a.category === cat);
  return (
    <PageShell iconGlyph="clock-counter-clockwise" title="활동 로그" lede="관리자 처리 이력을 시간순으로 확인합니다" crumbs={['브릭스퀘어 콘솔', '활동 로그']} onHome={() => window.dispatchEvent(new CustomEvent('nav-home'))}>
      <div style={{ display: 'flex', gap: 6, marginBottom: 14, flexWrap: 'wrap' }}>
        {cats.map((c) => <button key={c} className={`pill-btn ${cat === c ? 'active' : ''}`} onClick={() => setCat(c)}>{c}</button>)}
      </div>
      <TableBlockWrap>
        <table className="nt-table">
          <thead><tr><th>시간</th><th>관리자</th><th>액션</th><th>대상</th><th>구분</th></tr></thead>

        </table>
      </TableBlockWrap>
    </PageShell>

}

/* ───────────────────────── PageShell ───────────────────────── */
function PageShell({ iconGlyph, title, lede, crumbs, children, onHome, pushToast }) {
  const [menuOpen, setMenuOpen] = useState(false);
  const notify = pushToast || (() => {});
  return (
    <div className="page">
      <div className="page-breadcrumb">
        {crumbs.map((c, i) => (
          <React.Fragment key={i}>
            {i > 0 && <Icon name="caret-right" size={11} />}
            {i === 0 ? <a onClick={() => onHome && onHome()}>{c}</a> : <span>{c}</span>}
          </React.Fragment>
        ))}
      </div>
      <div className="page-body">
        <div className="page-icon-row">
          <div className="page-icon-large"><Icon name={iconGlyph} size={24} /></div>
          <div className="page-meta">
            <button className="meta-action" onClick={() => notify('페이지 편집 기록을 불러왔습니다')}><Icon name="clock-counter-clockwise" size={13} />기록</button>
            <button className="meta-action" onClick={() => setMenuOpen(!menuOpen)}><Icon name="dots-three" size={13} />더보기</button>
          </div>
        </div>
        {menuOpen && (
          <div style={{ display: 'flex', gap: 6, marginBottom: 10 }}>
            <button className="pill-btn" onClick={() => { notify('페이지가 즐겨찾기에 추가되었습니다'); setMenuOpen(false); }}><Icon name="star" size={12} /> 즐겨찾기</button>
            <button className="pill-btn" onClick={() => { notify('페이지 링크가 복사되었습니다'); setMenuOpen(false); }}><Icon name="link" size={12} /> 링크 복사</button>
          </div>
        )}
        <h1 className="page-title-h1">{title}</h1>
        <p className="page-lede">{lede}</p>
        <div className="block-list">{children}</div>
      </div>
    </div>
  );
}

/* ───────────────────────── Tree sidebar ───────────────────────── */
const TREE = [
  { id: 'main', label: '통합 관리자 대시보드', icon: 'squares-four', depth: 0 },
  { id: 'member-content', label: '회원 및 콘텐츠 관리', icon: 'users-three', depth: 0, children: [
    { id: 'members', label: '회원 목록', icon: 'user-list', depth: 1, children: [
      { id: 'sanctions', label: '제재 이력', icon: 'gavel', depth: 2 },
    ]},
    { id: 'reports', label: '신고 큐', icon: 'flag', depth: 1, children: [
      { id: 'report-post', label: '게시글 신고', icon: 'article', depth: 2 },
      { id: 'report-comment', label: '댓글 신고', icon: 'chat-centered-dots', depth: 2 },
    ]},
    { id: 'boards', label: '게시판 관리', icon: 'stack', depth: 1 },
  ]},
  { id: 'asset-admin', label: '종목/발행사/공시 자료 관리', icon: 'chart-line-up', depth: 0, children: [
    { id: 'assets', label: '종목 등록·관리', icon: 'buildings', depth: 1 },
    { id: 'issuers', label: '발행사 관리', icon: 'identification-badge', depth: 1 },
    { id: 'disclosures', label: '공시자료 관리', icon: 'file-pdf', depth: 1, children: [
      { id: 'disc-category', label: '카테고리 트리', icon: 'tree-structure', depth: 2 },
    ]},
  ]},
  { id: 'cms-analytics', label: '배너/팝업/공지 및 확장 분석', icon: 'megaphone', depth: 0, children: [
    { id: 'banners', label: '배너 관리', icon: 'image', depth: 1 },
    { id: 'popups', label: '팝업 관리', icon: 'browser', depth: 1 },
    { id: 'notices', label: '공지사항', icon: 'bell-ringing', depth: 1 },
    { id: 'view-trend', label: '조회 추이 분석', icon: 'chart-bar', depth: 1 },
  ]},
  { id: 'audit-log', label: '활동 로그', icon: 'clock-counter-clockwise', depth: 0 },
];

const PAGE_OF_LEAF = {
  main: 'main', 'member-content': 'member-content', members: 'member-content', sanctions: 'member-content',
  reports: 'member-content', 'report-post': 'member-content', 'report-comment': 'member-content', boards: 'member-content',
  'asset-admin': 'asset-admin', assets: 'asset-admin', issuers: 'asset-admin', disclosures: 'asset-admin', 'disc-category': 'asset-admin',
  'cms-analytics': 'cms-analytics', banners: 'cms-analytics', popups: 'cms-analytics', notices: 'cms-analytics', 'view-trend': 'cms-analytics',
  'audit-log': 'audit-log',
};

function TreeItem({ node, selected, setSelected, expanded, toggleExpand }) {
  const isOpen = expanded.includes(node.id);
  const hasChildren = node.children && node.children.length > 0;
  return (
    <div>
      <div className={`tree-item depth-${node.depth} ${selected === node.id ? 'selected' : ''}`}
        title={node.label} onClick={() => { setSelected(node.id); if (hasChildren && !isOpen) toggleExpand(node.id); }}>
        {hasChildren ? (
          <button className={`tree-toggle ${isOpen ? 'open' : ''}`} onClick={(e) => { e.stopPropagation(); toggleExpand(node.id); }}>
            <Icon name={isOpen ? 'caret-down' : 'caret-right'} size={11} />
          </button>
        ) : <span className="tree-toggle-placeholder"></span>}
        <span className="tree-icon"><Icon name={node.icon} size={14} /></span>
        <span className="tree-label">{node.label}</span>
      </div>
      {hasChildren && isOpen && node.children.map((c) => (
        <TreeItem key={c.id} node={c} selected={selected} setSelected={setSelected} expanded={expanded} toggleExpand={toggleExpand} />
      ))}
    </div>
  );
}

/* ───────────────────────── App ───────────────────────── */
function App() {
  const [selected, setSelected] = useState('main');
  const [expanded, setExpanded] = useState(['member-content']);
  const [toasts, setToasts] = useState([]);

  function pushToast(msg) {
    const id = Date.now() + Math.random();
    setToasts((t) => [...t, { id, msg }]);
    setTimeout(() => setToasts((t) => t.filter((x) => x.id !== id)), 2600);
  }
  function toggleExpand(id) { setExpanded(expanded.includes(id) ? expanded.filter((x) => x !== id) : [...expanded, id]); }

  useEffect(() => {
    function onNavHome() { setSelected('main'); }
    window.addEventListener('nav-home', onNavHome);
    return () => window.removeEventListener('nav-home', onNavHome);
  }, []);

  const page = PAGE_OF_LEAF[selected] || 'main';

  return (
    <div data-archetype="notion-blocks-tree" className="app-shell">
      <aside className="tree-sidebar" data-tree-sidebar>
        <div className="sidebar-brand"><span className="mark">B</span>브릭스퀘어 콘솔</div>
        <div className="sidebar-search">
          <button onClick={() => pushToast('빠른 검색을 실행했습니다')}><Icon name="magnifying-glass" size={13} /> 빠른 검색</button>
          <button onClick={() => pushToast('새 페이지 초안이 생성되었습니다')}><Icon name="plus" size={13} /> 새 페이지</button>
        </div>
        <nav className="tree-nav">
          {TREE.map((n) => <TreeItem key={n.id} node={n} selected={selected} setSelected={setSelected} expanded={expanded} toggleExpand={toggleExpand} />)}
        </nav>
        <div className="sidebar-footer">
          <a className="footer-link" onClick={() => pushToast('휴지통을 열었습니다')}><Icon name="trash" size={13} />휴지통</a>
          <a className="footer-link" onClick={() => pushToast('설정 화면을 열었습니다')}><Icon name="gear-six" size={13} />설정</a>
        </div>
      </aside>

      {page === 'main' && <DashboardPage setSelected={setSelected} pushToast={pushToast} />}
      {page === 'member-content' && <MemberContentPage initialLeaf={selected} pushToast={pushToast} />}
      {page === 'asset-admin' && <AssetAdminPage pushToast={pushToast} />}
      {page === 'cms-analytics' && <CmsAnalyticsPage pushToast={pushToast} />}
      {page === 'audit-log' && <AuditLogPage />}

      <div className="toast-stack">{toasts.map((t) => <div key={t.id} className="toast"><Icon name="check-circle" size={15} />{t.msg}</div>)}</div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
