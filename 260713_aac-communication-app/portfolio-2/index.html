<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>말그림 보호자·치료사 통합 관리 플랫폼</title>
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone@7.23.0/babel.min.js"></script>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<style>
  :root {
    --primary: #006bff;
    --ink: #0b3558;
    --ink2: #476788;
    --ink3: #a6bbd1;
    --accent: #e55cff;
    --cyan: #0099ff;
    --bg: #f8f9fb;
    --surface: #ffffff;
    --pebble: #f0f3f8;
    --hairline: #d4e0ed;
    --radius-card: 24px;
    --radius-panel: 16px;
    --radius-btn: 8px;
    --radius-sm: 4px;
    --shadow-card: rgba(71,103,136,0.04) 0px 4px 5px 0px, rgba(71,103,136,0.03) 0px 8px 15px 0px, rgba(71,103,136,0.08) 0px 30px 50px 0px;
    --shadow-btn: rgba(71,103,136,0.04) 0px 4px 5px 0px, rgba(71,103,136,0.03) 0px 8px 15px 0px, rgba(71,103,136,0.06) 0px 15px 30px 0px;
  }
  * { box-sizing: border-box; }
  html, body { width: 100%; margin: 0; padding: 0; }
  body {
    font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, sans-serif;
    background: var(--bg);
    color: var(--ink);
    -webkit-font-smoothing: antialiased;
  }
  #app { width: 100%; }
  button { font-family: inherit; cursor: pointer; border: none; background: none; }
  input, select, textarea { font-family: inherit; }
  a { text-decoration: none; color: inherit; }
  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-thumb { background: var(--hairline); border-radius: 8px; }

  .text-display { font-size: 42px; font-weight: 700; letter-spacing: -0.01em; line-height: 1.2; color: var(--ink); }
  .text-heading { font-size: 26px; font-weight: 700; color: var(--ink); }
  .text-heading-sm { font-size: 18px; font-weight: 600; color: var(--ink); }
  .text-body { font-size: 15px; line-height: 1.5; color: var(--ink2); }
  .text-body-sm { font-size: 13px; line-height: 1.4; color: var(--ink2); }
  .text-caption { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.04em; color: var(--ink3); }

  @keyframes fadeInUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes cardIn { from { opacity: 0; transform: translateY(8px) scale(0.99); } to { opacity: 1; transform: translateY(0) scale(1); } }
  @keyframes ripple { from { transform: scale(0); opacity: 0.4; } to { transform: scale(3); opacity: 0; } }
  @keyframes spinLoad { to { transform: rotate(360deg); } }
  @keyframes toastPop { from { opacity: 0; transform: translateY(12px) scale(0.97); } to { opacity: 1; transform: translateY(0) scale(1); } }
  @keyframes modalScale { from { opacity: 0; transform: scale(0.96); } to { opacity: 1; transform: scale(1); } }
  @keyframes barRise { from { transform: scaleY(0); } to { transform: scaleY(1); } }
  @keyframes drawerSlide { from { transform: translateX(24px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
  @keyframes pulseDot { 0%, 100% { opacity: 1; } 50% { opacity: 0.35; } }

  .app-shell { display: flex; width: 100%; min-height: 100vh; background: var(--bg); }

  /* ── sidebar (sidebar-classic skeleton) ── */
  .sidebar { position: fixed; left: 0; top: 0; bottom: 0; width: 244px; background: var(--surface); border-right: 1px solid var(--hairline); display: flex; flex-direction: column; padding: 20px 14px; z-index: 30; }
  .sb-brand { display: flex; align-items: center; gap: 10px; padding: 6px 10px 22px; font-weight: 700; font-size: 17px; color: var(--ink); }
  .sb-mark { width: 30px; height: 30px; border-radius: var(--radius-sm); background: var(--primary); color: #fff; display: flex; align-items: center; justify-content: center; }
  .sb-section-label { font-size: 11px; font-weight: 700; color: var(--ink3); text-transform: uppercase; letter-spacing: 0.04em; padding: 10px 12px 6px; }
  .sb-item { display: flex; align-items: center; gap: 11px; padding: 10px 12px; border-radius: var(--radius-btn); font-size: 14px; font-weight: 500; color: var(--ink2); margin-bottom: 2px; }
  .sb-item:hover { background: var(--pebble); }
  .sb-item.active { background: var(--primary); color: #fff; }
  .sb-item.active svg { color: #fff; }
  .sb-foot { margin-top: auto; display: flex; align-items: center; gap: 10px; padding: 10px 12px; border-radius: var(--radius-btn); background: var(--pebble); }
  .sb-foot-avatar { width: 32px; height: 32px; border-radius: 50%; background: var(--primary); color: #fff; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; flex-shrink: 0; }

  .main-wrap { margin-left: 244px; flex: 1; min-width: 0; width: calc(100% - 244px); min-height: 100vh; }
  .topbar { position: sticky; top: 0; z-index: 20; background: rgba(248,249,251,0.9); backdrop-filter: blur(8px); border-bottom: 1px solid var(--hairline); padding: 14px 32px; display: flex; align-items: center; justify-content: space-between; gap: 16px; flex-wrap: wrap; }
  .topbar-actions { display: flex; align-items: center; gap: 10px; }
  .page-inner { padding: 28px 32px 60px; animation: fadeInUp .3s ease; }

  .btn { border-radius: var(--radius-btn); padding: 10px 18px; font-size: 14px; font-weight: 600; display: inline-flex; align-items: center; gap: 8px; box-shadow: var(--shadow-btn); position: relative; overflow: hidden; transition: transform .12s, opacity .15s; }
  .btn:active { transform: scale(0.97); }
  .btn-primary { background: var(--primary); color: #fff; }
  .btn-dark { background: var(--ink); color: #fff; }
  .btn-ghost { background: var(--surface); color: var(--ink); border: 1px solid var(--hairline); box-shadow: none; }
  .btn-sm { padding: 7px 13px; font-size: 13px; }
  .btn-icon-only { padding: 8px; }
  .ripple-el { position: absolute; border-radius: 50%; background: rgba(255,255,255,0.6); pointer-events: none; animation: ripple .5s ease-out; }

  .filter-pills { display: flex; gap: 6px; background: var(--pebble); padding: 4px; border-radius: var(--radius-btn); }
  .filter-pill { padding: 7px 14px; border-radius: 6px; font-size: 13px; font-weight: 600; color: var(--ink2); }
  .filter-pill.active { background: var(--surface); color: var(--ink); box-shadow: 0 1px 3px rgba(71,103,136,0.15); }

  .profile-select { display: flex; align-items: center; gap: 8px; background: var(--surface); border: 1px solid var(--hairline); border-radius: var(--radius-btn); padding: 8px 12px; font-size: 14px; font-weight: 600; }

  /* ── insight-board composition ── */
  .insight-grid { display: grid; grid-template-columns: 2fr 1fr; gap: 18px; margin-top: 20px; }
  .hero-viz { background: var(--surface); border-radius: var(--radius-card); padding: 26px; box-shadow: var(--shadow-card); position: relative; overflow: hidden; animation: cardIn .4s ease; }
  .hero-viz::before { content: ''; position: absolute; width: 260px; height: 260px; border-radius: 50%; background: radial-gradient(circle at 30% 30%, var(--accent) 0%, var(--cyan) 60%, transparent 75%); opacity: 0.14; top: -90px; right: -90px; }
  .kpi-card.gradient { background: linear-gradient(155deg, var(--surface) 0%, var(--pebble) 100%); }
  .heatmap { display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px; margin-top: 18px; position: relative; z-index: 1; }
  .heat-cell { aspect-ratio: 1; border-radius: 6px; background: var(--primary); }
  .heat-day-lbl { font-size: 10px; color: var(--ink3); text-align: center; margin-top: 6px; }

  .kpi-side { display: flex; flex-direction: column; gap: 14px; }
  .kpi-card { background: var(--surface); border-radius: var(--radius-panel); padding: 18px; box-shadow: var(--shadow-card); animation: cardIn .4s ease; }
  .kpi-num { font-size: 30px; font-weight: 700; color: var(--ink); }
  .word-rank-row { display: flex; align-items: center; gap: 10px; padding: 7px 0; }
  .word-rank-idx { width: 20px; height: 20px; border-radius: 50%; background: var(--pebble); color: var(--ink2); font-size: 11px; font-weight: 700; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .word-rank-bar-wrap { flex: 1; height: 6px; background: var(--pebble); border-radius: 4px; overflow: hidden; }
  .word-rank-bar { height: 100%; background: var(--primary); border-radius: 4px; transform-origin: left; animation: barRise .5s ease both; }

  .widget-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 18px; margin-top: 18px; }
  .widget { background: var(--surface); border-radius: var(--radius-panel); padding: 20px; box-shadow: var(--shadow-card); animation: cardIn .4s ease; }
  .donut-wrap { display: flex; align-items: center; gap: 16px; margin-top: 12px; }
  .donut { width: 84px; height: 84px; border-radius: 50%; flex-shrink: 0; }
  .donut-legend { font-size: 12px; color: var(--ink2); display: flex; flex-direction: column; gap: 6px; }
  .legend-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-right: 6px; }
  .mini-bars { display: flex; align-items: flex-end; gap: 6px; height: 60px; margin-top: 14px; }
  .mini-bar2 { flex: 1; background: var(--primary); border-radius: 4px 4px 0 0; transform-origin: bottom; animation: barRise .5s ease both; opacity: 0.88; }
  .timeline-item { display: flex; gap: 10px; padding: 8px 0; border-bottom: 1px dashed var(--hairline); }
  .timeline-item:last-child { border-bottom: none; }
  .timeline-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--cyan); margin-top: 5px; flex-shrink: 0; animation: pulseDot 1.8s ease-in-out infinite; }

  /* ── profiles ── */
  .profile-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 16px; margin-top: 20px; }
  .profile-card { background: var(--surface); border-radius: var(--radius-card); padding: 22px; box-shadow: var(--shadow-card); border: 2px solid transparent; animation: cardIn .35s ease; }
  .profile-card.active { border-color: var(--primary); }
  .profile-avatar { width: 52px; height: 52px; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: #fff; font-weight: 700; font-size: 18px; margin-bottom: 12px; }
  .profile-stat-row { display: flex; gap: 16px; margin: 14px 0; }
  .profile-stat { font-size: 12px; color: var(--ink2); }
  .profile-stat b { display: block; font-size: 17px; color: var(--ink); }
  .profile-actions { display: flex; gap: 8px; margin-top: 14px; }
  .add-profile-card { border: 2px dashed var(--hairline); border-radius: var(--radius-card); display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 10px; color: var(--ink2); min-height: 200px; }

  /* ── presets library ── */
  .preset-lib-row { background: var(--surface); border-radius: var(--radius-panel); padding: 18px 20px; box-shadow: var(--shadow-card); display: flex; align-items: center; gap: 18px; margin-bottom: 12px; flex-wrap: wrap; animation: cardIn .3s ease; }
  .preset-lib-icon { width: 42px; height: 42px; border-radius: var(--radius-btn); background: var(--pebble); display: flex; align-items: center; justify-content: center; color: var(--primary); flex-shrink: 0; }
  .badge { padding: 4px 10px; border-radius: 9999px; font-size: 12px; font-weight: 700; }
  .badge-blue { background: #e6f0ff; color: #004eba; }
  .badge-green { background: #e2f6ea; color: #0a7d3c; }
  .badge-amber { background: #fdf1de; color: #a9660a; }

  /* ── collab notes ── */
  .role-switch { display: flex; background: var(--pebble); border-radius: var(--radius-btn); padding: 4px; gap: 4px; }
  .role-btn { padding: 8px 16px; border-radius: 6px; font-size: 13px; font-weight: 600; color: var(--ink2); }
  .role-btn.active { background: var(--surface); color: var(--ink); box-shadow: 0 1px 3px rgba(71,103,136,0.15); }
  .note-item { background: var(--surface); border-radius: var(--radius-panel); padding: 16px 18px; box-shadow: var(--shadow-card); margin-bottom: 12px; animation: drawerSlide .3s ease; }
  .note-head { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
  .note-role-badge { font-size: 11px; font-weight: 700; padding: 3px 9px; border-radius: 9999px; }
  .note-role-badge.guardian { background: #e6f0ff; color: #004eba; }
  .note-role-badge.therapist { background: #fbe8ff; color: #9c17bd; }
  .restricted-box { background: var(--surface); border: 1px dashed var(--hairline); border-radius: var(--radius-panel); padding: 40px; text-align: center; color: var(--ink3); }

  /* ── modal / toast ── */
  .modal-overlay { position: fixed; inset: 0; background: rgba(11,53,88,0.35); display: flex; align-items: center; justify-content: center; z-index: 100; animation: fadeInUp .15s ease; padding: 20px; }
  .modal-box { background: var(--surface); border-radius: var(--radius-card); padding: 26px; width: 100%; max-width: 460px; box-shadow: var(--shadow-card); animation: modalScale .2s ease; max-height: 84vh; overflow-y: auto; }
  .modal-title { font-size: 18px; font-weight: 700; margin-bottom: 16px; color: var(--ink); }
  .field { margin-bottom: 14px; }
  .field label { display: block; font-size: 13px; font-weight: 600; color: var(--ink2); margin-bottom: 6px; }
  .field input, .field select, .field textarea { width: 100%; padding: 10px 12px; border-radius: var(--radius-btn); border: 1px solid var(--hairline); font-size: 14px; background: var(--pebble); }
  .checkbox-row { display: flex; align-items: center; gap: 10px; padding: 8px 0; font-size: 14px; }
  .modal-actions { display: flex; justify-content: flex-end; gap: 10px; margin-top: 20px; }
  .sync-spinner { width: 15px; height: 15px; border: 2px solid rgba(255,255,255,0.4); border-top-color: #fff; border-radius: 50%; animation: spinLoad .7s linear infinite; }

  .toast-stack { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); z-index: 200; display: flex; flex-direction: column; gap: 8px; align-items: center; }
  .toast { background: var(--ink); color: #fff; padding: 12px 20px; border-radius: 9999px; font-size: 14px; font-weight: 600; display: flex; align-items: center; gap: 8px; animation: toastPop .25s ease; box-shadow: var(--shadow-card); }

  @media (max-width: 960px) {
    .insight-grid { grid-template-columns: 1fr; }
    .widget-grid { grid-template-columns: 1fr; }
  }
  @media (max-width: 640px) {
    .sidebar { width: 72px; padding: 16px 8px; }
    .sidebar .sb-text { display: none; }
    .sidebar .sb-item { justify-content: center; }
    .main-wrap { margin-left: 72px; width: calc(100% - 72px); }
    .topbar { flex-direction: column; align-items: flex-start; padding: 12px 16px; }
    .topbar-actions { width: 100%; flex-wrap: wrap; }
    .filter-pills { flex-wrap: wrap; }
    .profile-select { width: 100%; }
    .profile-select select { max-width: 100%; }
    .page-inner { padding: 20px 16px 40px; }
  }
</style>
</head>
<body>
<div id="app"></div>
<script type="text/babel">
const { useState, useEffect, useRef } = React;

function Icon({ name, size = 18 }) {
  return <i data-lucide={name} style={{ width: size, height: size, display: 'inline-block' }}></i>;
}

const PROFILES = [
  { id: 1, name: '지민', age: '만 6세', relation: '자녀', color: '#006bff', categories: 8, presets: 5 },
  { id: 2, name: '서연', age: '만 8세', relation: '자녀', color: '#e55cff', categories: 10, presets: 7 },
  { id: 3, name: '하준', age: '만 5세', relation: '치료 대상', color: '#0099ff', categories: 6, presets: 3 },
];

const TOP_WORDS = [
  { word: '물', pct: 92 }, { word: '아빠', pct: 84 }, { word: '화장실', pct: 76 },
  { word: '더 먹다', pct: 68 }, { word: '놀다', pct: 61 }, { word: '아프다', pct: 54 },
];

const TEMPLATES = [
  { id: 1, name: '기본 생활 요청 세트', category: '집', targets: 3, status: '전체 배포됨' },
  { id: 2, name: '병원 방문 대응 세트', category: '병원', targets: 1, status: '일부 실패' },
  { id: 3, name: '학교 생활 표현 세트', category: '학교', targets: 2, status: '전체 배포됨' },
  { id: 4, name: '외식/식당 요청 세트', category: '식당', targets: 0, status: '미배포' },
];

const INITIAL_NOTES = {
  1: [
    { id: 1, role: 'guardian', author: '보호자(엄마)', time: '2시간 전', text: '오늘 아침 "화장실" 카드를 스스로 먼저 선택했어요. 반응이 좋아요.' },
    { id: 2, role: 'therapist', author: '치료사 김OO', time: '어제', text: '문장 조합 시 2단어 조합까지 안정적으로 사용합니다. 다음 회기에 3단어 조합 연습 제안합니다.' },
  ],
  2: [{ id: 3, role: 'guardian', author: '보호자(아빠)', time: '3일 전', text: '영화관 카테고리 프리셋을 추가했으면 합니다.' }],
  3: [],
};

function useToasts() {
  const [toasts, setToasts] = useState([]);
  const push = (msg) => {
    const id = Math.random().toString(36).slice(2);
    setToasts((t) => [...t, { id, msg }]);
    setTimeout(() => setToasts((t) => t.filter((x) => x.id !== id)), 2400);
  };
  return { toasts, push };
}

function Ripple({ onClick, children, className, ...rest }) {
  const ref = useRef(null);
  const handle = (e) => {
    const el = ref.current;
    if (el) {
      const rect = el.getBoundingClientRect();
      const span = document.createElement('span');
      const size = Math.max(rect.width, rect.height);
      span.className = 'ripple-el';
      span.style.width = span.style.height = size + 'px';
      span.style.left = (e.clientX - rect.left - size / 2) + 'px';
      span.style.top = (e.clientY - rect.top - size / 2) + 'px';
      el.appendChild(span);
      setTimeout(() => span.remove(), 500);
    }
    onClick && onClick(e);
  };
  return <button ref={ref} className={className} onClick={handle} {...rest}>{children}</button>;
}

function Sidebar({ screen, setScreen }) {
  const items = [
    { id: 'main', label: '사용 패턴 분석', icon: 'chart-spline' },
    { id: 'profiles', label: '프로필 관리', icon: 'users' },
    { id: 'presets', label: '프리셋 라이브러리', icon: 'library' },
    { id: 'collab-notes', label: '협업 노트', icon: 'notebook-pen' },
  ];
  return (
    <aside className="sidebar">
      <div className="sb-brand"><span className="sb-mark"><Icon name="message-circle-heart" size={16} /></span><span className="sb-text">말그림 관리 플랫폼</span></div>
      <div className="sb-section-label sb-text">워크스페이스</div>
      {items.map((it) => (
        <button key={it.id} className={'sb-item' + (screen === it.id ? ' active' : '')} onClick={() => setScreen(it.id)}>
          <Icon name={it.icon} size={17} /><span className="sb-text">{it.label}</span>
        </button>
      ))}
      <div className="sb-foot">
        <span className="sb-foot-avatar">보</span>
        <div className="sb-text" style={{ fontSize: 13 }}>
          <div style={{ fontWeight: 700 }}>보호자 계정</div>
          <div style={{ fontSize: 11, color: 'var(--ink3)' }}>3개 프로필 관리 중</div>
        </div>
      </div>
    </aside>
  );
}

function Topbar({ title, right }) {
  return (
    <div className="topbar">
      <h1 className="text-heading">{title}</h1>
      <div className="topbar-actions">{right}</div>
    </div>
  );
}

function UsagePatternScreen({ profiles, activeProfileId, setActiveProfileId }) {
  const [period, setPeriod] = useState('week');
  const active = profiles.find((p) => p.id === activeProfileId) || profiles[0];
  const heat = Array.from({ length: 21 }, (_, i) => (Math.sin(i * (active.id + 1)) + 1) / 2);
  const donutPct = 62;

  return (
    <div className="page-inner">
      <Topbar
        title="사용 패턴 분석"
        right={
          <React.Fragment>
            <div className="filter-pills">
              <button className={'filter-pill' + (period === 'week' ? ' active' : '')} onClick={() => setPeriod('week')}>주간</button>
              <button className={'filter-pill' + (period === 'month' ? ' active' : '')} onClick={() => setPeriod('month')}>월간</button>
            </div>
            <div className="profile-select">
              <Icon name="chevron-down" size={14} />
              <select value={activeProfileId} onChange={(e) => setActiveProfileId(Number(e.target.value))} style={{ border: 'none', background: 'transparent', fontWeight: 700, fontSize: 14 }}>
                {profiles.map((p) => <option key={p.id} value={p.id}>{p.name} 프로필</option>)}
              </select>
            </div>
          </React.Fragment>
        }
      />

      <div className="insight-grid">
        <div className="hero-viz">
          <div className="text-caption">{active.name} · {period === 'week' ? '요일 × 카테고리' : '주차 × 카테고리'} 사용 빈도</div>
          <p className="text-display" style={{ marginTop: 6 }}>{period === 'week' ? '주간' : '월간'} 사용 히트맵</p>
          <div className="heatmap">
            {heat.map((v, i) => (
              <div key={i} className="heat-cell" style={{ opacity: 0.18 + v * 0.75 }}></div>
            ))}
          </div>
          <div style={{ display: 'grid', gridTemplateColumns: 'repeat(7,1fr)', gap: 6 }}>
            {['월', '화', '수', '목', '금', '토', '일'].map((d) => <div key={d} className="heat-day-lbl">{d}</div>)}
          </div>
        </div>

        <div className="kpi-side">
          <div className="kpi-card">
            <div className="text-caption">자주 쓰는 단어 TOP 6</div>
            <div style={{ marginTop: 10 }}>
              {TOP_WORDS.map((w, i) => (
                <div key={w.word} className="word-rank-row">
                  <span className="word-rank-idx">{i + 1}</span>
                  <span style={{ fontSize: 13, width: 56, flexShrink: 0 }}>{w.word}</span>
                  <div className="word-rank-bar-wrap"><div className="word-rank-bar" style={{ width: w.pct + '%', animationDelay: (i * 0.06) + 's' }}></div></div>
                </div>
              ))}
            </div>
          </div>
          <div className="kpi-card">
            <div className="text-caption">활성 프로필</div>
            <div className="kpi-num" style={{ marginTop: 6 }}>{profiles.length}</div>
            <div className="text-body-sm">이번 {period === 'week' ? '주' : '달'} 관리 중</div>
          </div>
        </div>
      </div>

      <div className="widget-grid">
        <div className="widget">
          <div className="text-caption">카테고리별 비중</div>
          <div className="donut-wrap">
            <div className="donut" style={{ background: 'conic-gradient(var(--primary) 0% ' + donutPct + '%, var(--pebble) ' + donutPct + '% 100%)' }}></div>
            <div className="donut-legend">
              <span><span className="legend-dot" style={{ background: 'var(--primary)' }}></span>집 · {donutPct}%</span>
              <span><span className="legend-dot" style={{ background: 'var(--pebble)' }}></span>기타 · {100 - donutPct}%</span>
            </div>
          </div>
        </div>
        <div className="widget">
          <div className="text-caption">요일별 발화 횟수</div>
          <div className="mini-bars">
            {[38, 52, 44, 61, 49, 30, 22].map((h, i) => <div key={i} className="mini-bar2" style={{ height: h + '%', animationDelay: (i * 0.05) + 's' }}></div>)}
          </div>
        </div>
        <div className="widget">
          <div className="text-caption">최근 활동</div>
          <div style={{ marginTop: 10 }}>
            <div className="timeline-item"><span className="timeline-dot"></span><span className="text-body-sm">지민 프로필 · "화장실" 발화 · 12분 전</span></div>
            <div className="timeline-item"><span className="timeline-dot"></span><span className="text-body-sm">치료사 노트 등록 · 2시간 전</span></div>
            <div className="timeline-item"><span className="timeline-dot"></span><span className="text-body-sm">병원 방문 세트 배포 · 어제</span></div>
          </div>
        </div>
      </div>
    </div>
  );
}

function ProfilesScreen({ profiles, setProfiles, activeProfileId, setActiveProfileId, addToast }) {
  const [modal, setModal] = useState(false);
  const [deleteTarget, setDeleteTarget] = useState(null);
  const [form, setForm] = useState({ name: '', age: '', relation: '자녀' });

  const save = () => {
    if (!form.name.trim()) return;
    const colors = ['#006bff', '#e55cff', '#0099ff', '#7c5cff'];
    setProfiles((ps) => [...ps, { id: Date.now(), name: form.name, age: form.age || '나이 미입력', relation: form.relation, color: colors[ps.length % colors.length], categories: 0, presets: 0 }]);
    addToast(form.name + ' 프로필이 등록되었습니다');
    setModal(false);
    setForm({ name: '', age: '', relation: '자녀' });
  };

  const confirmDelete = () => {
    setProfiles((ps) => ps.filter((p) => p.id !== deleteTarget.id));
    addToast(deleteTarget.name + ' 프로필 데이터만 제거되었습니다');
    setDeleteTarget(null);
  };

  return (
    <div className="page-inner">
      <Topbar title="프로필 관리" right={<Ripple className="btn btn-primary" onClick={() => setModal(true)}><Icon name="user-plus" size={16} />새 프로필 추가</Ripple>} />
      <p className="text-body">피보호자마다 독립된 카테고리·프리셋 세트를 관리합니다. 카드를 클릭하면 해당 프로필로 전환됩니다.</p>

      <div className="profile-grid">
        {profiles.map((p) => (
          <div key={p.id} className={'profile-card' + (p.id === activeProfileId ? ' active' : '')} onClick={() => { setActiveProfileId(p.id); addToast(p.name + ' 프로필로 전환되었습니다'); }}>
            <div className="profile-avatar" style={{ background: p.color }}>{p.name[0]}</div>
            <div className="text-heading-sm">{p.name}</div>
            <div className="text-body-sm">{p.age} · {p.relation}</div>
            <div className="profile-stat-row">
              <div className="profile-stat"><b>{p.categories}</b>카테고리</div>
              <div className="profile-stat"><b>{p.presets}</b>프리셋</div>
            </div>
            <div className="profile-actions" onClick={(e) => e.stopPropagation()}>
              {p.id === activeProfileId ? <span className="badge badge-blue"><Icon name="check" size={11} /> 활성 프로필</span> : <button className="btn btn-ghost btn-sm" onClick={() => { setActiveProfileId(p.id); addToast(p.name + ' 프로필로 전환되었습니다'); }}>전환</button>}
              <button className="btn btn-ghost btn-sm btn-icon-only" onClick={() => setDeleteTarget(p)}><Icon name="trash-2" size={14} /></button>
            </div>
          </div>
        ))}
        <button className="add-profile-card" onClick={() => setModal(true)}>
          <Icon name="plus-circle" size={26} />
          <span style={{ fontSize: 13, fontWeight: 600 }}>새 프로필 추가</span>
        </button>
      </div>

      {modal && (
        <div className="modal-overlay" onClick={() => setModal(false)}>
          <div className="modal-box" onClick={(e) => e.stopPropagation()}>
            <div className="modal-title">새 프로필 추가</div>
            <div className="field"><label>이름</label><input value={form.name} onChange={(e) => setForm({ ...form, name: e.target.value })} placeholder="예: 하윤" /></div>
            <div className="field"><label>나이</label><input value={form.age} onChange={(e) => setForm({ ...form, age: e.target.value })} placeholder="예: 만 7세" /></div>
            <div className="field">
              <label>관계</label>
              <select value={form.relation} onChange={(e) => setForm({ ...form, relation: e.target.value })}>
                <option value="자녀">자녀</option>
                <option value="치료 대상">치료 대상</option>
                <option value="가족">가족</option>
              </select>
            </div>
            <div className="modal-actions">
              <button className="btn btn-ghost btn-sm" onClick={() => setModal(false)}>취소</button>
              <button className="btn btn-primary btn-sm" onClick={save}>저장</button>
            </div>
          </div>
        </div>
      )}

      {deleteTarget && (
        <div className="modal-overlay" onClick={() => setDeleteTarget(null)}>
          <div className="modal-box" onClick={(e) => e.stopPropagation()} style={{ maxWidth: 380 }}>
            <div className="modal-title">프로필을 삭제할까요?</div>
            <p className="text-body-sm">"{deleteTarget.name}" 프로필과 연결된 데이터만 제거되고 다른 프로필은 영향받지 않습니다.</p>
            <div className="modal-actions">
              <button className="btn btn-ghost btn-sm" onClick={() => setDeleteTarget(null)}>취소</button>
              <button className="btn btn-dark btn-sm" onClick={confirmDelete}>삭제</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

function PresetsLibraryScreen({ profiles, addToast }) {
  const [templates, setTemplates] = useState(TEMPLATES);
  const [deployModal, setDeployModal] = useState(null);
  const [historyModal, setHistoryModal] = useState(null);
  const [selected, setSelected] = useState([]);
  const [deploying, setDeploying] = useState(false);
  const [history] = useState([
    { id: 1, template: '기본 생활 요청 세트', target: '지민, 서연', time: '오늘 09:12', status: '성공' },
    { id: 2, template: '병원 방문 대응 세트', target: '하준', time: '어제 17:40', status: '일부 실패' },
  ]);

  const openDeploy = (t) => { setSelected([]); setDeployModal(t); };
  const toggleSelect = (id) => setSelected((s) => (s.includes(id) ? s.filter((x) => x !== id) : [...s, id]));

  const runDeploy = () => {
    if (selected.length === 0) return;
    setDeploying(true);
    setTimeout(() => {
      setDeploying(false);
      setTemplates((ts) => ts.map((t) => (t.id === deployModal.id ? { ...t, targets: selected.length, status: selected.length === profiles.length ? '전체 배포됨' : '일부 실패' } : t)));
      addToast(selected.length + '개 프로필에 배포되었습니다');
      setDeployModal(null);
    }, 1200);
  };

  const statusBadge = (s) => {
    if (s === '전체 배포됨') return <span className="badge badge-green">전체 배포됨</span>;
    if (s === '일부 실패') return <span className="badge badge-amber">일부 실패</span>;
    return <span className="badge" style={{ background: 'var(--pebble)', color: 'var(--ink2)' }}>미배포</span>;
  };

  return (
    <div className="page-inner">
      <Topbar title="프리셋 라이브러리" right={<button className="btn btn-ghost" onClick={() => setHistoryModal(true)}><Icon name="history" size={16} />배포 이력</button>} />
      <p className="text-body">프리셋 템플릿을 선택한 프로필들에 일괄 배포할 수 있습니다.</p>

      {templates.map((t) => (
        <div key={t.id} className="preset-lib-row">
          <div className="preset-lib-icon"><Icon name="layout-template" size={19} /></div>
          <div style={{ flex: 1, minWidth: 180 }}>
            <div className="text-heading-sm">{t.name}</div>
            <div className="text-body-sm">{t.category} 카테고리 · 대상 {t.targets}개 프로필</div>
          </div>
          {statusBadge(t.status)}
          <button className="btn btn-primary btn-sm" onClick={() => openDeploy(t)}><Icon name="send" size={14} />배포</button>
        </div>
      ))}

      {deployModal && (
        <div className="modal-overlay" onClick={() => setDeployModal(null)}>
          <div className="modal-box" onClick={(e) => e.stopPropagation()}>
            <div className="modal-title">"{deployModal.name}" 배포 대상 선택</div>
            {profiles.map((p) => (
              <label key={p.id} className="checkbox-row">
                <input type="checkbox" checked={selected.includes(p.id)} onChange={() => toggleSelect(p.id)} />
                {p.name} 프로필
              </label>
            ))}
            <div className="modal-actions">
              <button className="btn btn-ghost btn-sm" onClick={() => setDeployModal(null)}>취소</button>
              <Ripple className="btn btn-primary btn-sm" onClick={runDeploy} disabled={deploying}>
                {deploying ? <span className="sync-spinner"></span> : <Icon name="send" size={14} />}
                {deploying ? '배포 중...' : '배포 확정'}
              </Ripple>
            </div>
          </div>
        </div>
      )}

      {historyModal && (
        <div className="modal-overlay" onClick={() => setHistoryModal(false)}>
          <div className="modal-box" onClick={(e) => e.stopPropagation()}>
            <div className="modal-title">배포 이력</div>
            {history.map((h) => (
              <div key={h.id} style={{ padding: '10px 0', borderBottom: '1px solid var(--hairline)' }}>
                <div style={{ display: 'flex', justifyContent: 'space-between' }}>
                  <span style={{ fontWeight: 700, fontSize: 14 }}>{h.template}</span>
                  {h.status === '성공' ? <span className="badge badge-green">성공</span> : <span className="badge badge-amber">일부 실패</span>}
                </div>
                <div className="text-body-sm">대상: {h.target} · {h.time}</div>
              </div>
            ))}
            <div className="modal-actions"><button className="btn btn-ghost btn-sm" onClick={() => setHistoryModal(false)}>닫기</button></div>
          </div>
        </div>
      )}
    </div>
  );
}

function CollabNotesScreen({ profiles, addToast }) {
  const [role, setRole] = useState('guardian');
  const [activeProfile, setActiveProfile] = useState(profiles[0].id);
  const [notes, setNotes] = useState(INITIAL_NOTES);
  const [composing, setComposing] = useState(false);
  const [draft, setDraft] = useState('');

  const restricted = role === 'therapist' && activeProfile === 2; // 서연은 담당 치료사 아님(시뮬레이션)

  const submit = () => {
    if (!draft.trim()) return;
    setNotes((n) => ({
      ...n,
      [activeProfile]: [{ id: Date.now(), role, author: role === 'guardian' ? '보호자' : '치료사 김OO', time: '방금 전', text: draft }, ...(n[activeProfile] || [])],
    }));
    addToast('노트가 등록되었습니다');
    setDraft('');
    setComposing(false);
  };

  return (
    <div className="page-inner">
      <Topbar
        title="협업 노트"
        right={
          <div className="role-switch">
            <button className={'role-btn' + (role === 'guardian' ? ' active' : '')} onClick={() => setRole('guardian')}>보호자 보기</button>
            <button className={'role-btn' + (role === 'therapist' ? ' active' : '')} onClick={() => setRole('therapist')}>치료사 보기</button>
          </div>
        }
      />

      <div className="cat-chip-row" style={{ display: 'flex', gap: 8, marginBottom: 18 }}>
        {profiles.map((p) => (
          <button key={p.id} className={'filter-pill' + (activeProfile === p.id ? ' active' : '')} style={{ background: activeProfile === p.id ? 'var(--surface)' : 'var(--pebble)' }} onClick={() => setActiveProfile(p.id)}>{p.name}</button>
        ))}
      </div>

      {restricted ? (
        <div className="restricted-box">
          <Icon name="lock" size={26} />
          <p style={{ marginTop: 10 }}>담당 프로필이 아니어서 이 프로필의 협업 노트 메뉴에 접근할 수 없습니다.</p>
        </div>
      ) : (
        <React.Fragment>
          <Ripple className="btn btn-primary" onClick={() => setComposing(true)}><Icon name="pen-line" size={15} />노트 작성</Ripple>
          <div style={{ marginTop: 16 }}>
            {(notes[activeProfile] || []).length === 0 && <p className="text-body-sm">등록된 노트가 없습니다.</p>}
            {(notes[activeProfile] || []).map((n) => (
              <div key={n.id} className="note-item">
                <div className="note-head">
                  <span className={'note-role-badge ' + n.role}>{n.role === 'guardian' ? '보호자' : '치료사'}</span>
                  <span className="text-body-sm">{n.author} · {n.time}</span>
                </div>
                <p style={{ fontSize: 14, color: 'var(--ink)' }}>{n.text}</p>
              </div>
            ))}
          </div>
        </React.Fragment>
      )}

      {composing && (
        <div className="modal-overlay" onClick={() => setComposing(false)}>
          <div className="modal-box" onClick={(e) => e.stopPropagation()}>
            <div className="modal-title">협업 노트 작성</div>
            <div className="field">
              <label>관찰 내용</label>
              <textarea rows="4" value={draft} onChange={(e) => setDraft(e.target.value)} placeholder="오늘의 관찰 내용을 입력하세요"></textarea>
            </div>
            <div className="modal-actions">
              <button className="btn btn-ghost btn-sm" onClick={() => setComposing(false)}>취소</button>
              <button className="btn btn-primary btn-sm" onClick={submit}>등록</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

function App() {
  const [screen, setScreen] = useState('main');
  const [profiles, setProfiles] = useState(PROFILES);
  const [activeProfileId, setActiveProfileId] = useState(1);
  const { toasts, push } = useToasts();

  useEffect(() => { if (window.lucide) window.lucide.createIcons(); });

  return (
    <div className="app-shell" data-composition="insight-board" data-ui-layout="sidebar-classic">
      <Sidebar screen={screen} setScreen={setScreen} />
      <div className="main-wrap">
        {screen === 'main' && <UsagePatternScreen profiles={profiles} activeProfileId={activeProfileId} setActiveProfileId={setActiveProfileId} />}
        {screen === 'profiles' && <ProfilesScreen profiles={profiles} setProfiles={setProfiles} activeProfileId={activeProfileId} setActiveProfileId={setActiveProfileId} addToast={push} />}
        {screen === 'presets' && <PresetsLibraryScreen profiles={profiles} addToast={push} />}
        {screen === 'collab-notes' && <CollabNotesScreen profiles={profiles} addToast={push} />}
      </div>
      <div className="toast-stack">
        {toasts.map((t) => <div key={t.id} className="toast"><Icon name="check-circle" size={15} />{t.msg}</div>)}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('app')).render(<App />);
</script>
</body>
</html>
