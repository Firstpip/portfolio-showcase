<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>그로잉마인드 — 유아동 기질검사 결과지 자동 생성 시스템</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="preconnect" href="https://cdn.jsdelivr.net">
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" rel="stylesheet">
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<style>
  :root{
    --primary:#0061ef; --secondary:#e2ded9; --accent:#ffce00;
    --bg:#f9f4f2; --surface:#ffffff; --text:#2d2c2b; --text-sub:#44423f;
    --border:#e2ded9; --violet:#5f2b89; --green:#1f9d6e; --red:#e0553f;
    --shadow-elevated: 0 16px 40px rgba(45,44,43,0.14), 0 2px 8px rgba(45,44,43,0.08);
    --shadow-card: 0 2px 10px rgba(45,44,43,0.06);
    --radius-card:20px; --radius-pill:999px; --radius-input:10px;
  }
  *{box-sizing:border-box;}
  html,body{width:100%;margin:0;padding:0;}
  body{
    font-family:'Pretendard',ui-sans-serif,system-ui,-apple-system,sans-serif;
    background:var(--bg); color:var(--text); -webkit-font-smoothing:antialiased;
  }
  #root{width:100%;}
  ::-webkit-scrollbar{width:8px;height:8px;}
  ::-webkit-scrollbar-thumb{background:#d8d2c9;border-radius:8px;}

  @keyframes fadeInUp{ from{opacity:0; transform:translateY(14px);} to{opacity:1; transform:translateY(0);} }
  @keyframes pulseDot{ 0%,100%{opacity:1; box-shadow:0 0 0 0 rgba(31,157,110,0.5);} 50%{opacity:0.7; box-shadow:0 0 0 6px rgba(31,157,110,0);} }
  @keyframes shimmer{ 0%{background-position:-320px 0;} 100%{background-position:320px 0;} }
  @keyframes drawerIn{ from{transform:translateX(100%);} to{transform:translateX(0);} }
  @keyframes toastIn{ from{opacity:0; transform:translateY(16px) scale(0.96);} to{opacity:1; transform:translateY(0) scale(1);} }
  @keyframes spin{ to{transform:rotate(360deg);} }
  @keyframes growBar{ from{transform:scaleX(0);} to{transform:scaleX(1);} }
  @keyframes ripple{ from{transform:scale(0); opacity:0.5;} to{transform:scale(2.6); opacity:0;} }
  @keyframes floatSoft{ 0%,100%{transform:translateY(0);} 50%{transform:translateY(-6px);} }

  .fade-up{ animation: fadeInUp .5s cubic-bezier(.2,.8,.2,1) both; }
  .skeleton{ background:linear-gradient(90deg,#efe9e2 25%,#f6f1eb 37%,#efe9e2 63%); background-size:400px 100%; animation:shimmer 1.4s infinite; border-radius:8px; }

  button{ font-family:inherit; cursor:pointer; border:none; }
  .btn{ position:relative; overflow:hidden; display:inline-flex; align-items:center; gap:8px; padding:12px 24px; border-radius:var(--radius-pill); font-weight:700; font-size:15px; transition:transform .18s ease, box-shadow .18s ease; }
  .btn:active{ transform:scale(0.97); }
  .btn-primary{ background:var(--primary); color:#fff; box-shadow:0 6px 16px rgba(0,97,239,0.28); }
  .btn-primary:hover{ transform:translateY(-2px); box-shadow:0 10px 22px rgba(0,97,239,0.34); }
  .btn-dark{ background:var(--text); color:#fff; box-shadow: rgba(65,61,69,0.25) 0px 2px 0px 0px; }
  .btn-dark:hover{ transform:translateY(-2px); }
  .btn-ghost{ background:#fff; color:var(--text); border:1.5px solid var(--border); }
  .btn-ghost:hover{ background:#faf6f2; }
  .btn-accent{ background:var(--accent); color:var(--text); box-shadow:0 6px 16px rgba(255,206,0,0.35); }
  .ripple-el{ position:absolute; border-radius:50%; background:rgba(255,255,255,0.6); pointer-events:none; animation:ripple .55s ease-out; }

  .card{ background:var(--surface); border-radius:var(--radius-card); border:1px solid var(--border); }
  .card-elevated{ box-shadow:var(--shadow-elevated); }
  .card:hover.hoverable{ transform:translateY(-3px); box-shadow:var(--shadow-elevated); }

  .sidebar{ position:fixed; left:0; top:0; bottom:0; width:272px; background:#fffdfb; border-right:1px solid var(--border); z-index:20; display:flex; flex-direction:column; }
  .main-wrap{ margin-left:272px; min-height:100vh; flex:1; min-width:0; width:calc(100% - 272px); display:flex; flex-direction:column; }
  .nav-item{ display:flex; align-items:flex-start; gap:12px; padding:13px 16px; border-radius:16px; color:var(--text-sub); font-size:13.5px; font-weight:600; line-height:1.4; text-align:left; width:100%; background:transparent; transition:all .16s ease; }
  .nav-item:hover{ background:#f4efe9; color:var(--text); }
  .nav-item.active{ background:var(--text); color:#fff; box-shadow:0 6px 16px rgba(45,44,43,0.22); }
  .nav-item .ic{ flex-shrink:0; margin-top:1px; }

  .topbar{ height:76px; width:100%; background:#fffdfb; border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; padding:0 40px; position:sticky; top:0; z-index:10; }

  .kpi-pill{ display:flex; align-items:center; gap:6px; padding:6px 14px; border-radius:var(--radius-pill); background:#f4efe9; font-size:13px; font-weight:700; }
  .live-dot{ width:8px; height:8px; border-radius:50%; background:var(--green); animation:pulseDot 2s infinite; }

  .modal-overlay{ position:fixed; inset:0; background:rgba(45,44,43,0.4); display:flex; align-items:center; justify-content:center; z-index:100; animation:fadeInUp .25s ease both; }
  .modal-body{ background:#fff; border-radius:24px; width:520px; max-width:92vw; max-height:86vh; overflow-y:auto; padding:32px; box-shadow:var(--shadow-elevated); }
  .drawer-overlay{ position:fixed; inset:0; background:rgba(45,44,43,0.35); z-index:100; }
  .drawer{ position:fixed; right:0; top:0; bottom:0; width:440px; max-width:94vw; background:#fff; z-index:101; box-shadow:-12px 0 40px rgba(45,44,43,0.18); animation:drawerIn .32s cubic-bezier(.2,.8,.2,1) both; padding:32px; overflow-y:auto; }
  .toast{ position:fixed; bottom:28px; right:28px; background:var(--text); color:#fff; padding:16px 22px; border-radius:16px; display:flex; align-items:center; gap:10px; font-weight:600; font-size:14px; box-shadow:var(--shadow-elevated); z-index:200; animation:toastIn .35s ease both; }

  .badge{ display:inline-flex; align-items:center; gap:5px; padding:4px 11px; border-radius:var(--radius-pill); font-size:12px; font-weight:700; }
  .badge-wait{ background:#f0e6d2; color:#9a7318; }
  .badge-done{ background:#dcf3e8; color:#1f9d6e; }
  .badge-error{ background:#fbe1dc; color:#c2452f; }
  .badge-progress{ background:#e6edfc; color:#0061ef; }

  input[type=text], input[type=search], select{ font-family:inherit; border:1.5px solid var(--border); border-radius:var(--radius-input); padding:10px 14px; font-size:14px; background:#fff; color:var(--text); }
  input[type=text]:focus, input[type=search]:focus{ outline:none; border-color:var(--primary); }

  table{ width:100%; border-collapse:collapse; }
  th{ text-align:left; font-size:12px; font-weight:700; color:var(--text-sub); text-transform:uppercase; letter-spacing:0.02em; padding:12px 16px; border-bottom:1.5px solid var(--border); }
  td{ padding:16px; font-size:14px; border-bottom:1px solid #f0ebe4; }
  tr.row-clickable:hover{ background:#faf6f2; cursor:pointer; }

  .progress-track{ height:8px; background:#f0ebe4; border-radius:99px; overflow:hidden; }
  .progress-fill{ height:100%; background:var(--primary); border-radius:99px; transform-origin:left; animation:growBar 1s cubic-bezier(.2,.8,.2,1) both; }

  h1,h2,h3,h4{ margin:0; font-weight:700; letter-spacing:-0.02em; color:var(--text); }
  p{ margin:0; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState, useEffect, useRef, useMemo} = React;

/* ---------- mock data ---------- */
const RESPONSES = [
  {id:'R-2401', child:'김O은', code:'TC-2024-0091', age:'4세', submitted:'2024.03.15 09:12', status:'검증완료'},
  {id:'R-2402', child:'박O준', code:'TC-2024-0092', age:'5세', submitted:'2024.03.15 09:40', status:'검증완료'},
  {id:'R-2403', child:'이O아', code:'TC-2024-0093', age:'3세', submitted:'2024.03.15 10:05', status:'오류'},
  {id:'R-2404', child:'최O훈', code:'TC-2024-0094', age:'6세', submitted:'2024.03.15 10:22', status:'대기'},
  {id:'R-2405', child:'정O윤', code:'TC-2024-0095', age:'4세', submitted:'2024.03.15 11:03', status:'검증완료'},
  {id:'R-2406', child:'한O서', code:'TC-2024-0096', age:'5세', submitted:'2024.03.15 11:31', status:'대기'},
];

const FACTORS = ['활동성','규칙성','접근성','적응성','정서강도','주의집중성'];
const ANIMALS = ['호랑이형','판다형','다람쥐형','부엉이형','강아지형','고양이형','코알라형','토끼형'];

const SCORED = [
  {id:'R-2401', child:'김O은', code:'TC-2024-0091', raw:[18,22,20,17,25,19], t:[58,63,55,49,71,52], percentile:[79,90,68,46,97,58], animal:'다람쥐형', done:true},
  {id:'R-2402', child:'박O준', code:'TC-2024-0092', raw:[24,15,19,22,16,21], t:[68,44,52,60,41,56], percentile:[96,27,58,84,18,72], animal:'호랑이형', done:true},
  {id:'R-2405', child:'정O윤', code:'TC-2024-0095', raw:[14,20,23,15,19,24], t:[42,55,63,45,52,66], percentile:[21,63,90,29,58,94], animal:'부엉이형', done:true},
];

const PDFS = [
  {id:'PDF-3301', child:'김O은', code:'TC-2024-0091', pages:11, status:'완료', storage:'클라우드', size:'4.2MB'},
  {id:'PDF-3302', child:'박O준', code:'TC-2024-0092', pages:12, status:'완료', storage:'클라우드', size:'4.6MB'},
  {id:'PDF-3303', child:'정O윤', code:'TC-2024-0095', pages:10, status:'대기', storage:'-', size:'-'},
];

const ACCESS_LOG = [
  {who:'관리자 서지현', action:'결과지 PDF 다운로드', target:'TC-2024-0091', time:'2024.03.15 14:02', ip:'10.20.4.11', status:'허용'},
  {who:'관리자 이도현', action:'채점 데이터 조회', target:'TC-2024-0092', time:'2024.03.15 13:47', ip:'10.20.4.19', status:'허용'},
  {who:'미확인 접근', action:'응답 원본 조회 시도', target:'TC-2024-0093', time:'2024.03.15 13:20', ip:'203.0.113.7', status:'차단'},
  {who:'관리자 서지현', action:'규준표 조회', target:'-', time:'2024.03.15 11:58', ip:'10.20.4.11', status:'허용'},
];

const badgeClass = s => s==='검증완료'||s==='완료'||s==='허용' ? 'badge-done' : s==='오류'||s==='차단' ? 'badge-error' : s==='대기' ? 'badge-wait' : 'badge-progress';

/* ---------- utils ---------- */
function Icon({name, size=18, className=''}){
  const ref = useRef(null);
  useEffect(()=>{ if(window.lucide) window.lucide.createIcons(); },[]);
  return <i data-lucide={name} className={className} style={{width:size, height:size}}></i>;
}
function useRipple(){
  return (e)=>{
    const btn = e.currentTarget;
    const rect = btn.getBoundingClientRect();
    const d = document.createElement('span');
    const size = Math.max(rect.width, rect.height);
    d.className='ripple-el';
    d.style.width = d.style.height = size+'px';
    d.style.left = (e.clientX-rect.left-size/2)+'px';
    d.style.top = (e.clientY-rect.top-size/2)+'px';
    btn.appendChild(d);
    setTimeout(()=>d.remove(),560);
  };
}
function CountUp({value, suffix=''}){
  const [v,setV] = useState(0);
  useEffect(()=>{
    let start=null; const dur=900;
    function step(ts){ if(!start) start=ts; const p=Math.min((ts-start)/dur,1);
      setV(Math.floor(p*value)); if(p<1) requestAnimationFrame(step); }
    requestAnimationFrame(step);
  },[value]);
  return <span>{v}{suffix}</span>;
}
function Toast({msg, onDone}){
  useEffect(()=>{ const t=setTimeout(onDone,2600); return ()=>clearTimeout(t); },[]);
  return <div className="toast"><Icon name="check-circle-2" size={18}/>{msg}</div>;
}

/* ---------- charts ---------- */
function RadarCanvas({data, height=260}){
  const ref = useRef(null); const chartRef = useRef(null);
  useEffect(()=>{
    const ctx = ref.current.getContext('2d');
    if(chartRef.current) chartRef.current.destroy();
    chartRef.current = new Chart(ctx,{
      type:'radar',
      data:{ labels:FACTORS, datasets:[{ label:'T점수', data:data, backgroundColor:'rgba(0,97,239,0.14)', borderColor:'#0061ef', borderWidth:2.5, pointBackgroundColor:'#0061ef', pointRadius:4 }]},
      options:{ responsive:true, maintainAspectRatio:false, animation:{duration:700},
        scales:{ r:{ min:0, max:100, ticks:{stepSize:25, backdropColor:'transparent', color:'#9a948c', font:{size:10}}, grid:{color:'#e9e3db'}, angleLines:{color:'#e9e3db'}, pointLabels:{color:'#44423f', font:{size:12, weight:'600'}} } },
        plugins:{ legend:{display:false} }
      }
    });
    return ()=>chartRef.current && chartRef.current.destroy();
  },[data]);
  return <div style={{position:'relative', height}}><canvas ref={ref}></canvas></div>;
}
function BarCanvas({height=220}){
  const ref = useRef(null); const chartRef = useRef(null);
  useEffect(()=>{
    const ctx = ref.current.getContext('2d');
    if(chartRef.current) chartRef.current.destroy();
    chartRef.current = new Chart(ctx,{
      type:'bar',
      data:{ labels:FACTORS, datasets:[{ label:'평균 T점수', data:[54,58,61,49,63,57], backgroundColor:'#ffce00', borderRadius:8, maxBarThickness:34 }]},
      options:{ responsive:true, maintainAspectRatio:false, animation:{duration:700},
        scales:{ y:{ min:0, max:100, grid:{color:'#f0ebe4'}, ticks:{color:'#9a948c'} }, x:{ grid:{display:false}, ticks:{color:'#44423f', font:{size:11,weight:'600'}} } },
        plugins:{ legend:{display:false} }
      }
    });
    return ()=>chartRef.current && chartRef.current.destroy();
  },[]);
  return <div style={{position:'relative', height}}><canvas ref={ref}></canvas></div>;
}
function DonutCanvas({height=200}){
  const ref = useRef(null); const chartRef = useRef(null);
  useEffect(()=>{
    const ctx = ref.current.getContext('2d');
    if(chartRef.current) chartRef.current.destroy();
    chartRef.current = new Chart(ctx,{
      type:'doughnut',
      data:{ labels:ANIMALS, datasets:[{ data:[9,14,11,7,16,10,8,6], backgroundColor:['#0061ef','#ffce00','#5f2b89','#1f9d6e','#00a4ff','#e0553f','#8144a8','#c6c1b9'], borderWidth:0 }]},
      options:{ responsive:true, maintainAspectRatio:false, cutout:'62%', animation:{duration:700},
        plugins:{ legend:{position:'right', labels:{boxWidth:10, font:{size:10}, color:'#44423f'}} }
      }
    });
    return ()=>chartRef.current && chartRef.current.destroy();
  },[]);
  return <div style={{position:'relative', height}}><canvas ref={ref}></canvas></div>;
}

/* ---------- SVG illustration for animal type ---------- */
function AnimalGlyph({animal, size=64}){
  const colors = {'호랑이형':'#e0553f','판다형':'#2d2c2b','다람쥐형':'#c9702c','부엉이형':'#5f2b89','강아지형':'#c9954a','고양이형':'#8144a8','코알라형':'#7a7f85','토끼형':'#e8a0c4'};
  const c = colors[animal] || '#0061ef';
  return (
    <svg width={size} height={size} viewBox="0 0 64 64" style={{animation:'floatSoft 3.6s ease-in-out infinite'}}>
      <circle cx="32" cy="34" r="22" fill={c} opacity="0.16"/>
      <circle cx="32" cy="32" r="16" fill={c} opacity="0.9"/>
      <circle cx="25" cy="28" r="2.6" fill="#fff"/>
      <circle cx="39" cy="28" r="2.6" fill="#fff"/>
      <path d="M26 40 Q32 45 38 40" stroke="#fff" strokeWidth="2.4" fill="none" strokeLinecap="round"/>
      <circle cx="18" cy="18" r="5" fill={c} opacity="0.7"/>
      <circle cx="46" cy="18" r="5" fill={c} opacity="0.7"/>
    </svg>
  );
}

/* ---------- shared bits ---------- */
function SectionHeader({eyebrow, title, action}){
  return (
    <div style={{display:'flex', justifyContent:'space-between', alignItems:'flex-end', marginBottom:24, flexWrap:'wrap', gap:12}}>
      <div>
        {eyebrow && <div style={{fontSize:13, fontWeight:700, color:'var(--primary)', marginBottom:6}}>{eyebrow}</div>}
        <h2 style={{fontSize:28, letterSpacing:'-0.6px'}}>{title}</h2>
      </div>
      {action}
    </div>
  );
}

/* ---------- Screens ---------- */
function MainScreen({onNotify, goto}){
  const [statusFilter, setStatusFilter] = useState('전체');
  const filtered = statusFilter==='전체' ? RESPONSES : RESPONSES.filter(r=>r.status===statusFilter);
  const [detail, setDetail] = useState(null);
  const ripple = useRipple();

  return (
    <div style={{padding:'40px'}} data-composition="insight-board">
      <SectionHeader eyebrow="응답 수집 · 검증" title="구글 폼 응답 수집 및 검증 대시보드"
        action={<button className="btn btn-primary" onClick={(e)=>{ripple(e); onNotify('신규 응답을 다시 불러왔습니다');}}>
          <Icon name="refresh-cw" size={16}/> 응답 새로고침</button>} />

      {/* hero-viz + kpi-side */}
      <div style={{display:'grid', gridTemplateColumns:'1.4fr 1fr', gap:24, marginBottom:24}}>
        <div className="card card-elevated fade-up" style={{padding:32}}>
          <div style={{display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:8}}>
            <h3 style={{fontSize:18}}>전체 6요인 평균 프로파일</h3>
            <span className="kpi-pill"><span className="live-dot"></span>실시간 반영</span>
          </div>
          <BarCanvas height={280}/>
        </div>
        <div style={{display:'flex', flexDirection:'column', gap:16}}>
          <div className="card card-elevated fade-up" style={{padding:24}}>
            <p style={{fontSize:13, color:'var(--text-sub)', fontWeight:700}}>수집된 응답</p>
            <h1 style={{fontSize:40, marginTop:6}}><CountUp value={32}/><span style={{fontSize:16, color:'var(--text-sub)', fontWeight:600}}> 건</span></h1>
            <div style={{marginTop:12, display:'flex', gap:8, flexWrap:'wrap'}}>
              <span className="badge badge-done">검증완료 24</span>
              <span className="badge badge-wait">대기 5</span>
              <span className="badge badge-error">오류 3</span>
            </div>
          </div>
          <div className="card card-elevated fade-up" style={{padding:24}}>
            <p style={{fontSize:13, color:'var(--text-sub)', fontWeight:700}}>채점 완료율</p>
            <h1 style={{fontSize:40, marginTop:6}}><CountUp value={87} suffix="%"/></h1>
            <div className="progress-track" style={{marginTop:14}}><div className="progress-fill" style={{width:'87%'}}></div></div>
          </div>
          <div className="card card-elevated fade-up" style={{padding:24}}>
            <p style={{fontSize:13, color:'var(--text-sub)', fontWeight:700}}>PDF 생성 대기</p>
            <h1 style={{fontSize:40, marginTop:6}}><CountUp value={5}/><span style={{fontSize:16, color:'var(--text-sub)', fontWeight:600}}> 건</span></h1>
            <button className="btn btn-ghost" style={{marginTop:10, padding:'8px 18px', fontSize:13}} onClick={(e)=>{ripple(e); goto('pdf-report');}}>
              <Icon name="arrow-right" size={14}/> PDF 결과지로 이동</button>
          </div>
        </div>
      </div>

      {/* widget-grid */}
      <div className="card card-elevated fade-up" style={{padding:28}}>
        <div style={{display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:16, flexWrap:'wrap', gap:12}}>
          <h3 style={{fontSize:18}}>최근 제출된 구글 폼 응답</h3>
          <div style={{display:'flex', gap:8}}>
            {['전체','검증완료','대기','오류'].map(s=>(
              <button key={s} className="btn" style={{padding:'7px 16px', fontSize:12.5, background: statusFilter===s ? 'var(--text)':'#fff', color: statusFilter===s?'#fff':'var(--text)', border:'1.5px solid var(--border)'}}
                onClick={(e)=>{ripple(e); setStatusFilter(s);}}>{s}</button>
            ))}
          </div>
        </div>
        <table>
          <thead><tr><th>검사자 코드</th><th>아동</th><th>연령</th><th>제출일시</th><th>상태</th></tr></thead>
          <tbody>
            {filtered.map(r=>(
              <tr key={r.id} className="row-clickable" onClick={()=>setDetail(r)}>
                <td style={{fontWeight:700}}>{r.code}</td>
                <td>{r.child}</td>
                <td>{r.age}</td>
                <td style={{color:'var(--text-sub)'}}>{r.submitted}</td>
                <td><span className={"badge "+badgeClass(r.status)}>{r.status}</span></td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>

      {detail && (
        <React.Fragment>
          <div className="drawer-overlay" onClick={()=>setDetail(null)}></div>
          <div className="drawer">
            <div style={{display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:20}}>
              <h3 style={{fontSize:20}}>응답 상세</h3>
              <button onClick={()=>setDetail(null)} style={{background:'none'}}><Icon name="x" size={20}/></button>
            </div>
            <p style={{fontSize:13, color:'var(--text-sub)', fontWeight:700, marginBottom:4}}>검사자 고유 코드</p>
            <p style={{fontSize:18, fontWeight:700, marginBottom:20}}>{detail.code}</p>
            <div style={{display:'grid', gridTemplateColumns:'1fr 1fr', gap:16, marginBottom:20}}>
              <div><p style={{fontSize:12, color:'var(--text-sub)'}}>아동</p><p style={{fontWeight:700}}>{detail.child}</p></div>
              <div><p style={{fontSize:12, color:'var(--text-sub)'}}>연령</p><p style={{fontWeight:700}}>{detail.age}</p></div>
              <div><p style={{fontSize:12, color:'var(--text-sub)'}}>제출일시</p><p style={{fontWeight:700}}>{detail.submitted}</p></div>
              <div><p style={{fontSize:12, color:'var(--text-sub)'}}>검증 상태</p><span className={"badge "+badgeClass(detail.status)}>{detail.status}</span></div>
            </div>
            <div className="card" style={{padding:18, background:'#faf6f2', marginBottom:20}}>
              <p style={{fontSize:13, fontWeight:700, marginBottom:8}}>응답 검증 메모</p>
              <p style={{fontSize:13.5, color:'var(--text-sub)', lineHeight:1.6}}>{detail.status==='오류' ? '필수 문항 3개 누락 — 학부모 재제출 요청 대기 중입니다.' : '누락 문항 없음. 형식 검증을 통과해 채점 큐에 적재되었습니다.'}</p>
            </div>
            <button className="btn btn-primary" style={{width:'100%', justifyContent:'center'}} onClick={()=>setDetail(null)}>확인</button>
          </div>
        </React.Fragment>
      )}
    </div>
  );
}

function ScoringScreen({onNotify}){
  const [running, setRunning] = useState(null);
  const [scored, setScored] = useState(SCORED.map(s=>s.id));
  const [detail, setDetail] = useState(null);
  const ripple = useRipple();
  const pending = RESPONSES.filter(r=>r.status==='검증완료' && !scored.includes(r.id));

  function runScoring(r){
    setRunning(r.id);
    setTimeout(()=>{
      setRunning(null);
      setScored(prev=>[...prev, r.id]);
      onNotify(r.child+' 응답의 채점이 완료되었습니다');
    }, 1400);
  }

  return (
    <div style={{padding:'40px'}}>
      <SectionHeader eyebrow="채점 엔진" title="채점 엔진 및 통계 산출" />
      <div style={{display:'grid', gridTemplateColumns:'1fr 1fr', gap:24, marginBottom:24}}>
        <div className="card card-elevated fade-up" style={{padding:28}}>
          <h3 style={{fontSize:16, marginBottom:14}}>채점 대기 응답</h3>
          {pending.length===0 && <p style={{fontSize:13.5, color:'var(--text-sub)'}}>대기 중인 응답이 없습니다.</p>}
          {pending.map(r=>(
            <div key={r.id} style={{display:'flex', justifyContent:'space-between', alignItems:'center', padding:'14px 0', borderBottom:'1px solid #f0ebe4'}}>
              <div>
                <p style={{fontWeight:700, fontSize:14}}>{r.child} <span style={{color:'var(--text-sub)', fontWeight:500}}>· {r.code}</span></p>
                <p style={{fontSize:12, color:'var(--text-sub)'}}>연령 {r.age} · 규준표 자동 매핑</p>
              </div>
              {running===r.id ? (
                <span style={{display:'flex', alignItems:'center', gap:8, fontSize:13, color:'var(--primary)', fontWeight:700}}>
                  <Icon name="loader-2" size={16} className="spin-ic"/> 채점 중...
                </span>
              ) : (
                <button className="btn btn-primary" style={{padding:'9px 18px', fontSize:13}} onClick={(e)=>{ripple(e); runScoring(r);}}>
                  <Icon name="play" size={14}/> 채점 실행</button>
              )}
            </div>
          ))}
        </div>
        <div className="card card-elevated fade-up" style={{padding:28, background:'#fffaf0'}}>
          <h3 style={{fontSize:16, marginBottom:10}}>채점 로직 요약</h3>
          <ul style={{margin:0, paddingLeft:18, fontSize:13.5, color:'var(--text-sub)', lineHeight:1.9}}>
            <li>역채점 문항 마스크 테이블로 원점수 자동 반전 적용</li>
            <li>연령·성별 구간별 규준표 조회로 T점수·백분위 환산</li>
            <li>6개 하위 요인 가중 합산 → 프로파일 벡터 생성</li>
            <li>동일 원점수 입력 시 항상 동일한 결과가 산출되는 결정론적 계산</li>
          </ul>
        </div>
      </div>

      <div className="card card-elevated fade-up" style={{padding:28}}>
        <h3 style={{fontSize:16, marginBottom:16}}>채점 완료 결과</h3>
        <table>
          <thead><tr><th>검사자 코드</th><th>아동</th><th>평균 T점수</th><th>평균 백분위</th><th>동물 유형</th><th></th></tr></thead>
          <tbody>
            {SCORED.map(s=>(
              <tr key={s.id} className="row-clickable" onClick={()=>setDetail(s)}>
                <td style={{fontWeight:700}}>{s.code}</td>
                <td>{s.child}</td>
                <td>{Math.round(s.t.reduce((a,b)=>a+b,0)/6)}</td>
                <td>{Math.round(s.percentile.reduce((a,b)=>a+b,0)/6)}%</td>
                <td><span className="badge badge-progress">{s.animal}</span></td>
                <td><Icon name="chevron-right" size={16}/></td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>

      {detail && (
        <div className="modal-overlay" onClick={()=>setDetail(null)}>
          <div className="modal-body" onClick={e=>e.stopPropagation()}>
            <div style={{display:'flex', justifyContent:'space-between', marginBottom:16}}>
              <h3 style={{fontSize:20}}>{detail.child} 채점 상세</h3>
              <button onClick={()=>setDetail(null)} style={{background:'none'}}><Icon name="x" size={20}/></button>
            </div>
            <table>
              <thead><tr><th>요인</th><th>원점수</th><th>T점수</th><th>백분위</th></tr></thead>
              <tbody>
                {FACTORS.map((f,i)=>(
                  <tr key={f}><td style={{fontWeight:600}}>{f}</td><td>{detail.raw[i]}</td><td>{detail.t[i]}</td><td>{detail.percentile[i]}%</td></tr>
                ))}
              </tbody>
            </table>
            <button className="btn btn-primary" style={{width:'100%', justifyContent:'center', marginTop:20}} onClick={()=>setDetail(null)}>닫기</button>
          </div>
        </div>
      )}
    </div>
  );
}

function ChartScreen({onNotify}){
  const [selected, setSelected] = useState(SCORED[0]);
  const ripple = useRipple();
  return (
    <div style={{padding:'40px'}}>
      <SectionHeader eyebrow="유형 판별 · 시각화" title="동물 유형 판별 및 방사형·막대 차트 생성"
        action={<button className="btn btn-primary" onClick={(e)=>{ripple(e); onNotify(selected.child+' 결과 재판정을 완료했습니다');}}>
          <Icon name="rotate-cw" size={16}/> 유형 재판정</button>} />

      <div style={{display:'flex', gap:10, marginBottom:24, flexWrap:'wrap'}}>
        {SCORED.map(s=>(
          <button key={s.id} className="btn" style={{padding:'9px 18px', fontSize:13, background: selected.id===s.id?'var(--text)':'#fff', color:selected.id===s.id?'#fff':'var(--text)', border:'1.5px solid var(--border)'}}
            onClick={(e)=>{ripple(e); setSelected(s);}}>{s.child} · {s.code}</button>
        ))}
      </div>

      <div style={{display:'grid', gridTemplateColumns:'1fr 1fr', gap:24, marginBottom:24}}>
        <div className="card card-elevated fade-up" style={{padding:28}}>
          <h3 style={{fontSize:16, marginBottom:12}}>6요인 방사형 프로파일</h3>
          <RadarCanvas data={selected.t} height={280}/>
        </div>
        <div className="card card-elevated fade-up" style={{padding:28}}>
          <div style={{display:'flex', alignItems:'center', gap:16, marginBottom:18}}>
            <AnimalGlyph animal={selected.animal} size={72}/>
            <div>
              <p style={{fontSize:12, color:'var(--text-sub)', fontWeight:700}}>판정된 동물 유형</p>
              <h2 style={{fontSize:24}}>{selected.animal}</h2>
            </div>
          </div>
          <div className="card" style={{padding:18, background:'#faf6f2'}}>
            <p style={{fontSize:13, fontWeight:700, marginBottom:8}}>맞춤형 해석 텍스트</p>
            <p style={{fontSize:13.5, color:'var(--text-sub)', lineHeight:1.7}}>
              정서강도와 주의집중성 요인에서 상위권 점수를 보여, 호기심이 많고 몰입도가 높은 특성이 두드러집니다.
              접근성 요인은 평균 범위로, 새로운 환경에 적응하는 데 적절한 속도를 보이는 유형입니다.
            </p>
          </div>
        </div>
      </div>

      <div className="card card-elevated fade-up" style={{padding:28}}>
        <h3 style={{fontSize:16, marginBottom:16}}>전체 응답 대비 요인 비교 (막대 차트)</h3>
        <BarCanvas height={240}/>
      </div>
    </div>
  );
}

function PdfScreen({onNotify}){
  const [items, setItems] = useState(PDFS);
  const [generating, setGenerating] = useState(null);
  const [preview, setPreview] = useState(null);
  const ripple = useRipple();

  function generate(item){
    setGenerating(item.id);
    setTimeout(()=>{
      setItems(prev=>prev.map(p=>p.id===item.id ? {...p, status:'완료', storage:'클라우드', size:'4.4MB'} : p));
      setGenerating(null);
      onNotify(item.child+' 결과지 PDF 생성이 완료되었습니다');
    }, 1800);
  }

  return (
    <div style={{padding:'40px'}}>
      <SectionHeader eyebrow="PDF 결과지" title="고해상도 PDF 결과지 생성 및 배포" />
      <div className="card card-elevated fade-up" style={{padding:28, marginBottom:24}}>
        <table>
          <thead><tr><th>검사자 코드</th><th>아동</th><th>페이지</th><th>저장 위치</th><th>용량</th><th>상태</th><th></th></tr></thead>
          <tbody>
            {items.map(p=>(
              <tr key={p.id}>
                <td style={{fontWeight:700}}>{p.code}</td>
                <td>{p.child}</td>
                <td>{p.pages}p</td>
                <td>{p.storage}</td>
                <td>{p.size}</td>
                <td><span className={"badge "+badgeClass(p.status)}>{generating===p.id?'생성중':p.status}</span></td>
                <td>
                  {p.status==='완료' ? (
                    <button className="btn btn-ghost" style={{padding:'7px 14px', fontSize:12.5}} onClick={(e)=>{ripple(e); setPreview(p);}}>
                      <Icon name="eye" size={14}/> 미리보기</button>
                  ) : generating===p.id ? (
                    <span style={{fontSize:12.5, color:'var(--primary)', fontWeight:700, display:'flex', alignItems:'center', gap:6}}>
                      <Icon name="loader-2" size={14} className="spin-ic"/> 렌더링 중</span>
                  ) : (
                    <button className="btn btn-primary" style={{padding:'7px 14px', fontSize:12.5}} onClick={(e)=>{ripple(e); generate(p);}}>
                      <Icon name="file-cog" size={14}/> PDF 생성</button>
                  )}
                </td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>

      <div className="card card-elevated fade-up" style={{padding:28}}>
        <h3 style={{fontSize:16, marginBottom:14}}>레이아웃 안정성 검증</h3>
        <div style={{display:'grid', gridTemplateColumns:'repeat(3,1fr)', gap:16}}>
          {[{l:'페이지 경계 검사', v:'10~12p 전 구간 통과'},{l:'차트 렌더링', v:'방사형·막대 정합 확인'},{l:'일러스트 삽입', v:'8종 동물 매핑 완료'}].map((x,i)=>(
            <div key={i} className="card" style={{padding:18, background:'#faf6f2'}}>
              <p style={{fontSize:12, color:'var(--text-sub)', fontWeight:700, marginBottom:6}}>{x.l}</p>
              <p style={{fontSize:13.5, fontWeight:700, display:'flex', alignItems:'center', gap:6}}><Icon name="check-circle-2" size={15} style={{color:'var(--green)'}}/>{x.v}</p>
            </div>
          ))}
        </div>
      </div>

      {preview && (
        <div className="modal-overlay" onClick={()=>setPreview(null)}>
          <div className="modal-body" onClick={e=>e.stopPropagation()} style={{width:420}}>
            <div style={{display:'flex', justifyContent:'space-between', marginBottom:16}}>
              <h3 style={{fontSize:18}}>결과지 미리보기</h3>
              <button onClick={()=>setPreview(null)} style={{background:'none'}}><Icon name="x" size={20}/></button>
            </div>
            <div style={{background:'#fff', border:'1.5px solid var(--border)', borderRadius:14, padding:20, aspectRatio:'0.72', display:'flex', flexDirection:'column', gap:10}}>
              <p style={{fontSize:11, color:'var(--text-sub)', fontWeight:700}}>{preview.code} · {preview.child}</p>
              <h4 style={{fontSize:15}}>유아동 기질검사 결과지</h4>
              <div style={{flex:1, borderRadius:10, background:'linear-gradient(135deg,#f9f4f2,#eef2fb)', display:'flex', alignItems:'center', justifyContent:'center'}}>
                <RadarCanvas data={[58,63,55,49,71,52]} height={140}/>
              </div>
              <div className="skeleton" style={{height:10, width:'70%'}}></div>
              <div className="skeleton" style={{height:10, width:'50%'}}></div>
            </div>
            <button className="btn btn-primary" style={{width:'100%', justifyContent:'center', marginTop:18}} onClick={()=>setPreview(null)}>
              <Icon name="download" size={15}/> 다운로드 링크 발급</button>
          </div>
        </div>
      )}
    </div>
  );
}

function AccessLogScreen(){
  const [filter, setFilter] = useState('전체');
  const rows = filter==='전체' ? ACCESS_LOG : ACCESS_LOG.filter(r=>r.status===filter);
  const ripple = useRipple();
  return (
    <div style={{padding:'40px'}}>
      <SectionHeader eyebrow="보안 · 개인정보" title="접근 로그" />
      <div style={{display:'flex', gap:10, marginBottom:20}}>
        {['전체','허용','차단'].map(s=>(
          <button key={s} className="btn" style={{padding:'8px 18px', fontSize:13, background: filter===s?'var(--text)':'#fff', color:filter===s?'#fff':'var(--text)', border:'1.5px solid var(--border)'}}
            onClick={(e)=>{ripple(e); setFilter(s);}}>{s}</button>
        ))}
      </div>
      <div className="card card-elevated fade-up" style={{padding:28}}>
        <table>
          <thead><tr><th>접근자</th><th>행위</th><th>대상 데이터</th><th>시각</th><th>IP</th><th>상태</th></tr></thead>
          <tbody>
            {rows.map((r,i)=>(
              <tr key={i}>
                <td style={{fontWeight:700}}>{r.who}</td>
                <td>{r.action}</td>
                <td style={{color:'var(--text-sub)'}}>{r.target}</td>
                <td style={{color:'var(--text-sub)'}}>{r.time}</td>
                <td style={{fontFamily:'monospace', fontSize:12.5}}>{r.ip}</td>
                <td><span className={"badge "+badgeClass(r.status)}>{r.status}</span></td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>
      <div className="card card-elevated fade-up" style={{padding:24, marginTop:20, background:'#fffaf0'}}>
        <p style={{fontSize:13.5, color:'var(--text-sub)', lineHeight:1.7}}>
          <Icon name="shield-check" size={16} style={{verticalAlign:'-3px', marginRight:6, color:'var(--primary)'}}/>
          모든 검사 응답과 결과지는 저장 시 암호화되며, 역할 기반 접근 제어로 승인된 관리자만 조회·다운로드할 수 있습니다.
        </p>
      </div>
    </div>
  );
}

/* ---------- App shell ---------- */
const NAV = [
  {key:'main', label:'구글 폼 응답 수집 및 검증 대시보드', icon:'layout-dashboard'},
  {key:'scoring', label:'채점 엔진 및 통계 산출', icon:'calculator'},
  {key:'chart-interpretation', label:'동물 유형 판별 및 방사형·막대 차트 생성', icon:'radar'},
  {key:'pdf-report', label:'고해상도 PDF 결과지 생성 및 배포', icon:'file-output'},
  {key:'access-log', label:'접근 로그', icon:'shield'},
];

function App(){
  const [view, setView] = useState('main');
  const [toast, setToast] = useState(null);
  const notify = (msg)=> setToast(msg);
  useEffect(()=>{ if(window.lucide) window.lucide.createIcons(); },[view]);

  const screens = {
    'main': <MainScreen onNotify={notify} goto={setView}/>,
    'scoring': <ScoringScreen onNotify={notify}/>,
    'chart-interpretation': <ChartScreen onNotify={notify}/>,
    'pdf-report': <PdfScreen onNotify={notify}/>,
    'access-log': <AccessLogScreen/>,
  };

  return (
    <div style={{display:'flex', width:'100%', minHeight:'100vh'}}>
      <aside className="sidebar">
        <div style={{padding:'28px 24px 20px'}}>
          <div style={{display:'flex', alignItems:'center', gap:10}}>
            <div style={{width:36, height:36, borderRadius:12, background:'var(--primary)', display:'flex', alignItems:'center', justifyContent:'center'}}>
              <Icon name="sprout" size={18} className="" />
            </div>
            <div>
              <h4 style={{fontSize:16}}>그로잉마인드</h4>
              <p style={{fontSize:11, color:'var(--text-sub)'}}>기질검사 결과지 엔진</p>
            </div>
          </div>
        </div>
        <nav style={{padding:'8px 16px', display:'flex', flexDirection:'column', gap:6, flex:1, overflowY:'auto'}}>
          {NAV.map(n=>(
            <button key={n.key} className={"nav-item"+(view===n.key?' active':'')} onClick={()=>setView(n.key)}>
              <Icon name={n.icon} size={18} className="ic"/>
              <span>{n.label}</span>
            </button>
          ))}
        </nav>
        <div style={{padding:20, borderTop:'1px solid var(--border)', display:'flex', alignItems:'center', gap:10}}>
          <div style={{width:34, height:34, borderRadius:'50%', background:'var(--accent)', display:'flex', alignItems:'center', justifyContent:'center', fontWeight:700, fontSize:13}}>서</div>
          <div>
            <p style={{fontSize:13, fontWeight:700}}>서지현 관리자</p>
            <p style={{fontSize:11, color:'var(--text-sub)'}}>기관 운영팀</p>
          </div>
        </div>
      </aside>

      <div className="main-wrap">
        <div className="topbar">
          <div style={{display:'flex', alignItems:'center', gap:10}}>
            <Icon name="search" size={17} style={{color:'var(--text-sub)'}}/>
            <input type="text" placeholder="검사자 코드 또는 아동 이름 검색" style={{width:280, border:'none', background:'transparent', fontSize:14}}/>
          </div>
          <div style={{display:'flex', alignItems:'center', gap:16}}>
            <span className="kpi-pill"><span className="live-dot"></span>구글 폼 실시간 연동</span>
            <Icon name="bell" size={19} style={{color:'var(--text-sub)'}}/>
          </div>
        </div>
        {screens[view]}
      </div>

      {toast && <Toast msg={toast} onDone={()=>setToast(null)}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
