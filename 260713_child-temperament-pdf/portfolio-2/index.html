<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>마인드옵스 — 아동 심리검사 통합 관리 플랫폼</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="preconnect" href="https://cdn.jsdelivr.net">
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/@tabler/icons-webfont@2.44.0/dist/tabler-icons.min.css">
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
<style>
  :root{
    --ink:#101010; --blue:#0099ff; --accent:#3ad98a;
    --bg:#f4f4f4; --surface:#ffffff; --text:#101010; --text-sub:#6b7280;
    --border:#e5e7eb; --red:#e5484d; --amber:#c98a1f;
    --shadow-flat: rgba(36,36,36,0.05) 0px 4px 8px 0px;
    --radius-card:8px; --radius-pill:9999px; --radius-input:8px;
  }
  *{box-sizing:border-box;}
  html,body{width:100%;margin:0;padding:0;}
  body{ font-family:'Pretendard',ui-sans-serif,system-ui,-apple-system,sans-serif; background:var(--bg); color:var(--text); -webkit-font-smoothing:antialiased; }
  #root{width:100%;}
  ::-webkit-scrollbar{width:8px;height:8px;}
  ::-webkit-scrollbar-thumb{background:#d1d5db;border-radius:8px;}

  @keyframes fadeSlide{ from{opacity:0; transform:translateY(10px);} to{opacity:1; transform:translateY(0);} }
  @keyframes blinkDot{ 0%,100%{opacity:1;} 50%{opacity:0.35;} }
  @keyframes shimmerFlat{ 0%{background-position:-320px 0;} 100%{background-position:320px 0;} }
  @keyframes slideModalIn{ from{opacity:0; transform:translateY(18px) scale(0.98);} to{opacity:1; transform:translateY(0) scale(1);} }
  @keyframes toastRise{ from{opacity:0; transform:translateX(20px);} to{opacity:1; transform:translateX(0);} }
  @keyframes spinIt{ to{transform:rotate(360deg);} }
  @keyframes barFill{ from{transform:scaleX(0);} to{transform:scaleX(1);} }

  .fade-slide{ animation: fadeSlide .4s cubic-bezier(.2,.8,.2,1) both; }
  .skeleton{ background:linear-gradient(90deg,#eceef1 25%,#f6f7f8 37%,#eceef1 63%); background-size:400px 100%; animation:shimmerFlat 1.3s infinite; border-radius:6px; }

  button{ font-family:inherit; cursor:pointer; border:none; }
  .btn{ display:inline-flex; align-items:center; gap:7px; padding:9px 18px; border-radius:var(--radius-pill); font-weight:600; font-size:13.5px; transition:opacity .15s ease, transform .15s ease; }
  .btn:active{ transform:scale(0.97); }
  .btn-primary{ background:var(--ink); color:#fff; }
  .btn-primary:hover{ opacity:0.85; }
  .btn-ghost{ background:transparent; color:var(--text); border:1px solid var(--border); }
  .btn-ghost:hover{ background:#f0f1f2; }
  .btn-blue{ background:var(--blue); color:#fff; }
  .btn-accent{ background:var(--accent); color:#06231a; }
  .btn-rect{ border-radius:8px; }

  .card{ background:var(--surface); border-radius:var(--radius-card); border:1px solid var(--border); }
  .card-shadow{ box-shadow:var(--shadow-flat); }

  .topnav{ width:100%; height:64px; background:#fff; border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; padding:0 32px; position:sticky; top:0; z-index:20; }
  .tab-item{ padding:9px 14px; border-radius:8px; font-size:13px; font-weight:600; color:var(--text-sub); background:transparent; white-space:nowrap; display:flex; align-items:center; gap:6px; }
  .tab-item:hover{ background:#f0f1f2; color:var(--text); }
  .tab-item.active{ background:var(--ink); color:#fff; }

  .status-strip{ display:flex; gap:12px; padding:14px 32px; background:#fff; border-bottom:1px solid var(--border); overflow-x:auto; }
  .status-pill{ display:flex; align-items:center; gap:8px; padding:8px 16px; border-radius:8px; border:1px solid var(--border); font-size:12.5px; font-weight:700; white-space:nowrap; }
  .status-dot{ width:7px; height:7px; border-radius:50%; }

  .hero{ padding:32px; }
  .grid-3{ display:grid; grid-template-columns:2fr 1fr; gap:20px; }

  .queue-row{ display:flex; justify-content:space-between; align-items:center; padding:12px 14px; border-radius:8px; border:1px solid var(--border); margin-bottom:8px; }

  .modal-overlay{ position:fixed; inset:0; background:rgba(16,16,16,0.45); display:flex; align-items:center; justify-content:center; z-index:100; }
  .modal-body{ background:#fff; border-radius:12px; width:500px; max-width:92vw; max-height:86vh; overflow-y:auto; padding:28px; animation:slideModalIn .28s cubic-bezier(.2,.8,.2,1) both; box-shadow: rgba(36,36,36,0.15) 0px 12px 32px 0px; }
  .toast{ position:fixed; bottom:24px; right:24px; background:var(--ink); color:#fff; padding:14px 20px; border-radius:8px; display:flex; align-items:center; gap:10px; font-weight:600; font-size:13.5px; z-index:200; animation:toastRise .3s ease both; }

  .badge{ display:inline-flex; align-items:center; gap:5px; padding:3px 10px; border-radius:9999px; font-size:11.5px; font-weight:700; }
  .badge-wait{ background:#fdf2df; color:#a3690f; }
  .badge-done{ background:#e3faed; color:#0f8a4f; }
  .badge-error{ background:#fde8e8; color:#c03434; }
  .badge-progress{ background:#e6f5ff; color:#0077cc; }

  input[type=text],input[type=search],select{ font-family:inherit; border:1px solid var(--border); border-radius:8px; padding:8px 12px; font-size:13.5px; background:#fff; color:var(--text); }
  input:focus{ outline:none; border-color:var(--ink); }

  table{ width:100%; border-collapse:collapse; }
  th{ text-align:left; font-size:11px; font-weight:700; color:var(--text-sub); text-transform:uppercase; letter-spacing:0.03em; padding:9px 12px; border-bottom:1px solid var(--border); }
  td{ padding:12px; font-size:13.5px; border-bottom:1px solid #f1f2f3; }
  tr.row-clickable:hover{ background:#fafafa; cursor:pointer; }

  .progress-track{ height:6px; background:#eef0f2; border-radius:99px; overflow:hidden; }
  .progress-fill{ height:100%; background:var(--ink); border-radius:99px; transform-origin:left; animation:barFill .8s cubic-bezier(.2,.8,.2,1) both; }

  .toggle{ width:38px; height:22px; border-radius:99px; background:#e5e7eb; position:relative; transition:background .2s; }
  .toggle.on{ background:var(--ink); }
  .toggle .knob{ width:16px; height:16px; border-radius:50%; background:#fff; position:absolute; top:3px; left:3px; transition:left .2s; }
  .toggle.on .knob{ left:19px; }

  h1,h2,h3,h4{ margin:0; font-weight:600; letter-spacing:0.1px; color:var(--text); }
  p{ margin:0; }
  .spin-ic{ animation: spinIt 1s linear infinite; display:inline-block; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState, useEffect, useRef} = React;

/* ---------- mock data ---------- */
const TEST_TYPES = [
  {id:'TT-01', name:'유아동 기질검사', version:'v3.2', responses:32, status:'운영'},
  {id:'TT-02', name:'또래관계 사회성검사', version:'v1.4', responses:12, status:'운영'},
  {id:'TT-03', name:'학습동기 진단검사', version:'v1.0', responses:8, status:'검토대기'},
];

const FACTORS = ['활동성','규칙성','접근성','적응성','정서강도','주의집중성'];

const QUEUE = [
  {id:'Q-91', label:'TC-2024-0093 발송 실패 재시도', type:'error', wait:'12분 지연'},
  {id:'Q-92', label:'학습동기검사 규준표 검토 요청', type:'wait', wait:'검토 대기'},
  {id:'Q-93', label:'TC-2024-0096 결과지 생성 지연', type:'progress', wait:'3분 지연'},
];

const ORGS = [
  {id:'ORG-1', name:'해맑음 유치원', children:24, pending:3},
  {id:'ORG-2', name:'초록숲 어린이집', children:18, pending:1},
  {id:'ORG-3', name:'별빛 아동상담센터', children:31, pending:6},
];

const HISTORY = [
  {period:'2024.03', type:'기질검사', count:118, avgT:56},
  {period:'2024.03', type:'사회성검사', count:44, avgT:52},
  {period:'2024.02', type:'기질검사', count:96, avgT:54},
  {period:'2024.02', type:'사회성검사', count:37, avgT:55},
];

const NOTIFS = [
  {id:'N-201', channel:'이메일', target:'김O은 학부모', status:'발송완료', time:'14:02'},
  {id:'N-202', channel:'카카오 알림톡', target:'박O준 학부모', status:'발송완료', time:'13:58'},
  {id:'N-203', channel:'SMS', target:'이O아 학부모', status:'발송실패', time:'13:44'},
  {id:'N-204', channel:'이메일', target:'최O훈 학부모', status:'재시도대기', time:'13:40'},
];

const NORM_VERSIONS = [
  {v:'v3.2', date:'2024.03.01', note:'6세 구간 표본 갱신', status:'운영중'},
  {v:'v3.1', date:'2023.11.12', note:'역채점 문항 3개 보정', status:'보관'},
  {v:'v3.0', date:'2023.06.20', note:'초기 규준표 등록', status:'보관'},
];

const badgeClass = s => ['운영','발송완료','완료','허용','운영중'].includes(s) ? 'badge-done' : ['오류','발송실패','차단'].includes(s) ? 'badge-error' : ['대기','검토대기','재시도대기','보관'].includes(s) ? 'badge-wait' : 'badge-progress';

function Icon({name, size=17, style={}}){
  return <i className={"ti ti-"+name} style={{fontSize:size, lineHeight:1, ...style}}></i>;
}
function useRipple(){ return ()=>{}; }
function Toast({msg, onDone}){
  useEffect(()=>{ const t=setTimeout(onDone,2500); return ()=>clearTimeout(t); },[]);
  return <div className="toast"><Icon name="circle-check" size={16}/>{msg}</div>;
}
function CountUp({value, suffix=''}){
  const [v,setV] = useState(0);
  useEffect(()=>{
    let start=null; const dur=800;
    function step(ts){ if(!start) start=ts; const p=Math.min((ts-start)/dur,1);
      setV(Math.floor(p*value)); if(p<1) requestAnimationFrame(step); }
    requestAnimationFrame(step);
  },[value]);
  return <span>{v}{suffix}</span>;
}

function BarCanvas({height=200, data, color='#101010'}){
  const ref = useRef(null); const chartRef = useRef(null);
  useEffect(()=>{
    const ctx = ref.current.getContext('2d');
    if(chartRef.current) chartRef.current.destroy();
    chartRef.current = new Chart(ctx,{
      type:'bar',
      data:{ labels:FACTORS, datasets:[{ data:data||[54,58,61,49,63,57], backgroundColor:color, borderRadius:4, maxBarThickness:26 }]},
      options:{ responsive:true, maintainAspectRatio:false, animation:{duration:600},
        scales:{ y:{ min:0, max:100, grid:{color:'#eef0f2'}, ticks:{color:'#9aa0a6', font:{size:10}} }, x:{ grid:{display:false}, ticks:{color:'#374151', font:{size:10,weight:'600'}} } },
        plugins:{ legend:{display:false} }
      }
    });
    return ()=>chartRef.current && chartRef.current.destroy();
  },[data]);
  return <div style={{position:'relative', height}}><canvas ref={ref}></canvas></div>;
}
function DonutCanvas({height=180}){
  const ref = useRef(null); const chartRef = useRef(null);
  useEffect(()=>{
    const ctx = ref.current.getContext('2d');
    if(chartRef.current) chartRef.current.destroy();
    chartRef.current = new Chart(ctx,{
      type:'doughnut',
      data:{ labels:['호랑이형','판다형','다람쥐형','부엉이형','강아지형','고양이형','코알라형','토끼형'], datasets:[{ data:[9,14,11,7,16,10,8,6], backgroundColor:['#101010','#3ad98a','#0099ff','#6b7280','#c98a1f','#8144a8','#e5484d','#9ca3af'], borderWidth:0 }]},
      options:{ responsive:true, maintainAspectRatio:false, cutout:'64%', animation:{duration:600},
        plugins:{ legend:{position:'right', labels:{boxWidth:9, font:{size:9.5}, color:'#374151'}} } }
    });
    return ()=>chartRef.current && chartRef.current.destroy();
  },[]);
  return <div style={{position:'relative', height}}><canvas ref={ref}></canvas></div>;
}
function SparkCanvas({height=60, data, color}){
  const ref = useRef(null); const chartRef = useRef(null);
  useEffect(()=>{
    const ctx = ref.current.getContext('2d');
    if(chartRef.current) chartRef.current.destroy();
    chartRef.current = new Chart(ctx,{
      type:'line',
      data:{ labels:data.map((_,i)=>i), datasets:[{ data, borderColor:color, borderWidth:2, pointRadius:0, tension:0.35, fill:true, backgroundColor:color+'1a' }]},
      options:{ responsive:true, maintainAspectRatio:false, animation:{duration:500}, scales:{x:{display:false}, y:{display:false}}, plugins:{legend:{display:false}} }
    });
    return ()=>chartRef.current && chartRef.current.destroy();
  },[data]);
  return <div style={{position:'relative', height}}><canvas ref={ref}></canvas></div>;
}

function SectionHeader({eyebrow, title, action}){
  return (
    <div style={{display:'flex', justifyContent:'space-between', alignItems:'flex-end', marginBottom:20, flexWrap:'wrap', gap:12}}>
      <div>
        {eyebrow && <div style={{fontSize:12, fontWeight:700, color:'var(--blue)', marginBottom:5, textTransform:'uppercase', letterSpacing:'0.04em'}}>{eyebrow}</div>}
        <h2 style={{fontSize:36, letterSpacing:'0.3px', lineHeight:1.1}}>{title}</h2>
      </div>
      {action}
    </div>
  );
}

/* ---------- Screens ---------- */
function MainScreen({onNotify}){
  const [modal, setModal] = useState(null);
  const [types, setTypes] = useState(TEST_TYPES);
  const [newVersion, setNewVersion] = useState(false);

  function registerVersion(){
    setTypes(prev=>prev.map(t=> t.id===modal.id ? {...t, version:'v'+(parseFloat(t.version.slice(1))+0.1).toFixed(1), status:'운영'} : t));
    onNotify(modal.name+'의 신규 규준표 버전이 등록되었습니다');
    setModal(null);
  }

  return (
    <div>
      <div className="status-strip">
        {TEST_TYPES.map(t=>(
          <div key={t.id} className="status-pill">
            <span className="status-dot" style={{background: t.status==='운영'?'var(--accent)':'#c98a1f', animation:'blinkDot 2s infinite'}}></span>
            {t.name} · <CountUp value={t.responses}/>건
          </div>
        ))}
        <div className="status-pill" style={{background:'#101010', color:'#fff', borderColor:'#101010'}}>
          <Icon name="activity" size={14}/> 처리율 <CountUp value={94} suffix="%"/>
        </div>
      </div>

      <div className="hero">
        <SectionHeader eyebrow="검사 유형 관리" title="다중 검사 유형 및 규준표 버전 관리"
          action={<button className="btn btn-primary btn-rect" onClick={()=>setNewVersion(true)}><Icon name="plus" size={15}/> 신규 검사 유형 등록</button>} />

        <div className="grid-3" style={{marginBottom:20}}>
          <div className="card card-shadow fade-slide" style={{padding:24}}>
            <h3 style={{fontSize:15, marginBottom:14}}>검사 유형 · 규준표 보드</h3>
            {types.map(t=>(
              <div key={t.id} className="queue-row row-clickable" onClick={()=>setModal(t)}>
                <div style={{display:'flex', alignItems:'center', gap:12}}>
                  <Icon name="clipboard-list" size={18} style={{color:'var(--text-sub)'}}/>
                  <div>
                    <p style={{fontWeight:700, fontSize:13.5}}>{t.name}</p>
                    <p style={{fontSize:11.5, color:'var(--text-sub)'}}>{t.id} · 응답 {t.responses}건</p>
                  </div>
                </div>
                <div style={{display:'flex', alignItems:'center', gap:10}}>
                  <span className="badge badge-progress">{t.version}</span>
                  <span className={"badge "+badgeClass(t.status)}>{t.status}</span>
                  <Icon name="chevron-right" size={16} style={{color:'var(--text-sub)'}}/>
                </div>
              </div>
            ))}
          </div>

          <div className="card card-shadow fade-slide" style={{padding:24}}>
            <h3 style={{fontSize:15, marginBottom:14}}>우선 대응 큐</h3>
            {QUEUE.map(q=>(
              <div key={q.id} style={{padding:'10px 0', borderBottom:'1px solid #f1f2f3'}}>
                <p style={{fontSize:12.5, fontWeight:700, display:'flex', alignItems:'center', gap:6}}>
                  <span style={{width:6,height:6,borderRadius:'50%', background: q.type==='error'?'var(--red)':q.type==='wait'?'#c98a1f':'var(--blue)'}}></span>
                  {q.label}
                </p>
                <p style={{fontSize:11, color:'var(--text-sub)', marginTop:3}}>{q.wait}</p>
              </div>
            ))}
          </div>
        </div>

        <div className="grid-3">
          <div className="card card-shadow fade-slide" style={{padding:24}}>
            <h3 style={{fontSize:15, marginBottom:12}}>동물 유형 분포</h3>
            <DonutCanvas height={170}/>
          </div>
          <div className="card card-shadow fade-slide" style={{padding:24}}>
            <h3 style={{fontSize:15, marginBottom:12}}>요인별 추이</h3>
            {['정서강도','주의집중성'].map((f,i)=>(
              <div key={f} style={{marginBottom:10}}>
                <p style={{fontSize:11.5, color:'var(--text-sub)', fontWeight:700, marginBottom:4}}>{f}</p>
                <SparkCanvas height={42} data={i===0?[48,52,55,54,58,61,63]:[60,58,57,59,55,54,52]} color={i===0?'#3ad98a':'#0099ff'}/>
              </div>
            ))}
          </div>
        </div>
      </div>

      {modal && (
        <div className="modal-overlay" onClick={()=>setModal(null)}>
          <div className="modal-body" onClick={e=>e.stopPropagation()}>
            <div style={{display:'flex', justifyContent:'space-between', marginBottom:16}}>
              <h3 style={{fontSize:17}}>{modal.name}</h3>
              <button onClick={()=>setModal(null)} style={{background:'none'}}><Icon name="x" size={18}/></button>
            </div>
            <div style={{display:'grid', gridTemplateColumns:'1fr 1fr', gap:14, marginBottom:18}}>
              <div><p style={{fontSize:11, color:'var(--text-sub)'}}>현재 버전</p><p style={{fontWeight:700}}>{modal.version}</p></div>
              <div><p style={{fontSize:11, color:'var(--text-sub)'}}>응답 건수</p><p style={{fontWeight:700}}>{modal.responses}건</p></div>
            </div>
            <div className="card" style={{padding:14, background:'#fafafa', marginBottom:18}}>
              <p style={{fontSize:12, fontWeight:700, marginBottom:6}}>플러그인 스키마 등록 정보</p>
              <p style={{fontSize:12.5, color:'var(--text-sub)', lineHeight:1.7}}>문항·가중치·역채점 규칙이 JSON 스키마로 등록되어, 신규 버전 배포 시 채점 엔진 코드 변경 없이 데이터만 갱신됩니다.</p>
            </div>
            <button className="btn btn-primary btn-rect" style={{width:'100%', justifyContent:'center'}} onClick={registerVersion}>
              <Icon name="cloud-upload" size={15}/> 신규 규준표 버전 등록</button>
          </div>
        </div>
      )}
      {newVersion && (
        <div className="modal-overlay" onClick={()=>setNewVersion(false)}>
          <div className="modal-body" onClick={e=>e.stopPropagation()}>
            <div style={{display:'flex', justifyContent:'space-between', marginBottom:16}}>
              <h3 style={{fontSize:17}}>신규 검사 유형 등록</h3>
              <button onClick={()=>setNewVersion(false)} style={{background:'none'}}><Icon name="x" size={18}/></button>
            </div>
            <p style={{fontSize:12, color:'var(--text-sub)', marginBottom:6}}>검사 유형명</p>
            <input type="text" placeholder="예: 정서조절 진단검사" style={{width:'100%', marginBottom:14}}/>
            <p style={{fontSize:12, color:'var(--text-sub)', marginBottom:6}}>규준표 파일 업로드</p>
            <div style={{border:'1px dashed var(--border)', borderRadius:8, padding:24, textAlign:'center', color:'var(--text-sub)', fontSize:12.5, marginBottom:18}}>
              <Icon name="upload" size={20} style={{display:'block', margin:'0 auto 8px'}}/> 엑셀 파일을 드래그하거나 클릭해 업로드
            </div>
            <button className="btn btn-primary btn-rect" style={{width:'100%', justifyContent:'center'}} onClick={()=>{ setNewVersion(false); onNotify('신규 검사 유형이 등록 대기열에 추가되었습니다'); }}>등록 요청</button>
          </div>
        </div>
      )}
    </div>
  );
}

function OrgDashboard({onNotify}){
  const [role, setRole] = useState('기관');
  const [detail, setDetail] = useState(null);
  return (
    <div className="hero">
      <SectionHeader eyebrow="RBAC · 통합 대시보드" title="기관·학부모 통합 대시보드"
        action={
          <div style={{display:'flex', gap:8}}>
            {['기관','학부모'].map(r=>(
              <button key={r} className="btn btn-rect" style={{background: role===r?'var(--ink)':'#fff', color:role===r?'#fff':'var(--text)', border:'1px solid var(--border)'}} onClick={()=>setRole(r)}>
                <Icon name={r==='기관'?'building':'user'} size={14}/> {r} 뷰</button>
            ))}
          </div>
        } />

      {role==='기관' ? (
        <div className="card card-shadow fade-slide" style={{padding:24}}>
          <h3 style={{fontSize:15, marginBottom:14}}>소속 기관별 검사 현황</h3>
          <table>
            <thead><tr><th>기관</th><th>소속 아동</th><th>미완료 결과지</th><th></th></tr></thead>
            <tbody>
              {ORGS.map(o=>(
                <tr key={o.id} className="row-clickable" onClick={()=>setDetail(o)}>
                  <td style={{fontWeight:700}}>{o.name}</td>
                  <td>{o.children}명</td>
                  <td><span className={"badge "+(o.pending>3?'badge-error':'badge-wait')}>{o.pending}건</span></td>
                  <td><Icon name="chevron-right" size={16}/></td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      ) : (
        <div className="card card-shadow fade-slide" style={{padding:24}}>
          <h3 style={{fontSize:15, marginBottom:14}}>내 자녀 검사 현황 (김O은 학부모)</h3>
          <div className="queue-row">
            <div>
              <p style={{fontWeight:700, fontSize:13.5}}>김O은 · TC-2024-0091</p>
              <p style={{fontSize:11.5, color:'var(--text-sub)'}}>기질검사 · 2024.03.15 제출</p>
            </div>
            <span className="badge badge-done">결과지 발급 완료</span>
          </div>
          <p style={{fontSize:12, color:'var(--text-sub)', marginTop:10}}>본인 자녀의 검사 결과만 조회 가능하며, 다른 아동 데이터에는 접근할 수 없습니다.</p>
        </div>
      )}

      {detail && (
        <div className="modal-overlay" onClick={()=>setDetail(null)}>
          <div className="modal-body" onClick={e=>e.stopPropagation()}>
            <div style={{display:'flex', justifyContent:'space-between', marginBottom:16}}>
              <h3 style={{fontSize:17}}>{detail.name}</h3>
              <button onClick={()=>setDetail(null)} style={{background:'none'}}><Icon name="x" size={18}/></button>
            </div>
            <p style={{fontSize:12.5, color:'var(--text-sub)', marginBottom:14}}>소속 아동 {detail.children}명 · 미완료 결과지 {detail.pending}건</p>
            <BarCanvas height={160} data={[52,58,60,49,55,57]} color="#0099ff"/>
            <button className="btn btn-primary btn-rect" style={{width:'100%', justifyContent:'center', marginTop:16}} onClick={()=>setDetail(null)}>닫기</button>
          </div>
        </div>
      )}
    </div>
  );
}

function HistoryAnalytics(){
  const [period, setPeriod] = useState('전체');
  const rows = period==='전체' ? HISTORY : HISTORY.filter(h=>h.period===period);
  return (
    <div className="hero">
      <SectionHeader eyebrow="집계 · 캐싱" title="검사 이력 및 통계 분석"
        action={
          <select value={period} onChange={e=>setPeriod(e.target.value)}>
            <option>전체</option><option>2024.03</option><option>2024.02</option>
          </select>
        } />
      <div className="grid-3" style={{marginBottom:20}}>
        <div className="card card-shadow fade-slide" style={{padding:24}}>
          <h3 style={{fontSize:15, marginBottom:14}}>기간·유형별 이력</h3>
          <table>
            <thead><tr><th>기간</th><th>유형</th><th>건수</th><th>평균 T점수</th></tr></thead>
            <tbody>
              {rows.map((h,i)=>(
                <tr key={i}><td>{h.period}</td><td style={{fontWeight:700}}>{h.type}</td><td>{h.count}건</td><td>{h.avgT}</td></tr>
              ))}
            </tbody>
          </table>
        </div>
        <div className="card card-shadow fade-slide" style={{padding:24}}>
          <h3 style={{fontSize:15, marginBottom:12}}>캐시 상태</h3>
          <div style={{display:'flex', alignItems:'center', gap:8, marginBottom:10}}>
            <span className="status-dot" style={{background:'var(--accent)', animation:'blinkDot 2s infinite'}}></span>
            <p style={{fontSize:12.5, fontWeight:700}}>Redis 집계 캐시 정상</p>
          </div>
          <p style={{fontSize:11.5, color:'var(--text-sub)', marginBottom:10}}>다음 갱신까지</p>
          <div className="progress-track"><div className="progress-fill" style={{width:'64%'}}></div></div>
        </div>
      </div>
      <div className="card card-shadow fade-slide" style={{padding:24}}>
        <h3 style={{fontSize:15, marginBottom:12}}>요인별 평균 점수 추이</h3>
        <BarCanvas height={220} data={[55,60,58,52,61,56]} color="#101010"/>
      </div>
    </div>
  );
}

function NotificationsScreen({onNotify}){
  const [items, setItems] = useState(NOTIFS);
  function retry(id){
    setItems(prev=>prev.map(n=> n.id===id ? {...n, status:'발송완료'} : n));
    onNotify('알림이 재발송되었습니다');
  }
  return (
    <div className="hero">
      <SectionHeader eyebrow="Bull Queue" title="다채널 알림 발송 자동화" />
      <div className="grid-3" style={{marginBottom:20}}>
        <div className="card card-shadow fade-slide" style={{padding:24}}>
          <h3 style={{fontSize:15, marginBottom:14}}>발송 큐</h3>
          <table>
            <thead><tr><th>채널</th><th>수신자</th><th>시각</th><th>상태</th><th></th></tr></thead>
            <tbody>
              {items.map(n=>(
                <tr key={n.id}>
                  <td style={{fontWeight:700}}>{n.channel}</td>
                  <td>{n.target}</td>
                  <td style={{color:'var(--text-sub)'}}>{n.time}</td>
                  <td><span className={"badge "+badgeClass(n.status)}>{n.status}</span></td>
                  <td>{n.status==='발송실패' || n.status==='재시도대기' ? (
                    <button className="btn btn-ghost btn-rect" style={{padding:'5px 12px', fontSize:11.5}} onClick={()=>retry(n.id)}>
                      <Icon name="refresh" size={13}/> 재시도</button>
                  ) : null}</td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
        <div className="card card-shadow fade-slide" style={{padding:24}}>
          <h3 style={{fontSize:15, marginBottom:14}}>채널 어댑터 상태</h3>
          {[{c:'이메일',ok:true},{c:'카카오 알림톡',ok:true},{c:'SMS',ok:false}].map(x=>(
            <div key={x.c} style={{display:'flex', justifyContent:'space-between', alignItems:'center', padding:'10px 0', borderBottom:'1px solid #f1f2f3'}}>
              <p style={{fontSize:13, fontWeight:700}}>{x.c}</p>
              <span className={"badge "+(x.ok?'badge-done':'badge-error')}>{x.ok?'정상':'장애 감지'}</span>
            </div>
          ))}
          <p style={{fontSize:11.5, color:'var(--text-sub)', marginTop:12}}>채널별 어댑터가 격리되어, 특정 채널 장애가 다른 채널 발송에 영향을 주지 않습니다.</p>
        </div>
      </div>
    </div>
  );
}

function NormTableScreen({onNotify}){
  const [rows, setRows] = useState(NORM_VERSIONS);
  const [deploy, setDeploy] = useState(false);
  return (
    <div className="hero">
      <SectionHeader eyebrow="규준표" title="규준표 관리"
        action={<button className="btn btn-primary btn-rect" onClick={()=>setDeploy(true)}><Icon name="git-branch" size={15}/> 새 버전 배포</button>} />
      <div className="card card-shadow fade-slide" style={{padding:24}}>
        <table>
          <thead><tr><th>버전</th><th>배포일</th><th>변경 요약</th><th>상태</th></tr></thead>
          <tbody>
            {rows.map((r,i)=>(
              <tr key={i}>
                <td style={{fontWeight:700}}>{r.v}</td>
                <td style={{color:'var(--text-sub)'}}>{r.date}</td>
                <td>{r.note}</td>
                <td><span className={"badge "+badgeClass(r.status)}>{r.status}</span></td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>
      {deploy && (
        <div className="modal-overlay" onClick={()=>setDeploy(false)}>
          <div className="modal-body" onClick={e=>e.stopPropagation()}>
            <div style={{display:'flex', justifyContent:'space-between', marginBottom:16}}>
              <h3 style={{fontSize:17}}>새 규준표 버전 배포</h3>
              <button onClick={()=>setDeploy(false)} style={{background:'none'}}><Icon name="x" size={18}/></button>
            </div>
            <p style={{fontSize:12, color:'var(--text-sub)', marginBottom:6}}>변경 요약</p>
            <input type="text" placeholder="예: 5세 구간 표본 재수집" style={{width:'100%', marginBottom:14}}/>
            <p style={{fontSize:12, color:'var(--text-sub)', marginBottom:6}}>과거 결과 재현 정책</p>
            <div style={{display:'flex', alignItems:'center', gap:10, marginBottom:18}}>
              <div className="toggle on"><div className="knob"></div></div>
              <p style={{fontSize:12.5}}>과거 생성 결과지는 배포 당시 규준표 버전으로 고정</p>
            </div>
            <button className="btn btn-primary btn-rect" style={{width:'100%', justifyContent:'center'}} onClick={()=>{
              setRows(prev=>[{v:'v3.3', date:'2024.03.15', note:'신규 배포', status:'운영중'}, ...prev.map(r=>({...r,status:r.status==='운영중'?'보관':r.status}))]);
              setDeploy(false); onNotify('규준표 v3.3 버전이 배포되었습니다');
            }}>배포 확정</button>
          </div>
        </div>
      )}
    </div>
  );
}

/* ---------- App shell ---------- */
const NAV = [
  {key:'main', label:'다중 검사 유형 및 규준표 버전 관리', icon:'layout-grid'},
  {key:'org-dashboard', label:'기관·학부모 통합 대시보드', icon:'building-community'},
  {key:'history-analytics', label:'검사 이력 및 통계 분석', icon:'chart-histogram'},
  {key:'notifications', label:'다채널 알림 발송 자동화', icon:'bell-ringing'},
  {key:'norm-table', label:'규준표 관리', icon:'file-stack'},
];

function App(){
  const [view, setView] = useState('main');
  const [toast, setToast] = useState(null);
  const notify = (msg)=> setToast(msg);

  const screens = {
    'main': <MainScreen onNotify={notify}/>,
    'org-dashboard': <OrgDashboard onNotify={notify}/>,
    'history-analytics': <HistoryAnalytics/>,
    'notifications': <NotificationsScreen onNotify={notify}/>,
    'norm-table': <NormTableScreen onNotify={notify}/>,
  };

  return (
    <div style={{width:'100%', minHeight:'100vh', display:'flex', flexDirection:'column'}}>
      <div className="topnav">
        <div style={{display:'flex', alignItems:'center', gap:28}}>
          <div style={{display:'flex', alignItems:'center', gap:9}}>
            <div style={{width:28, height:28, borderRadius:7, background:'var(--ink)', display:'flex', alignItems:'center', justifyContent:'center'}}>
              <Icon name="brain" size={16} style={{color:'#fff'}}/>
            </div>
            <h4 style={{fontSize:15}}>마인드옵스</h4>
          </div>
          <nav style={{display:'flex', gap:4}}>
            {NAV.map(n=>(
              <button key={n.key} className={"tab-item"+(view===n.key?' active':'')} onClick={()=>setView(n.key)}>
                <Icon name={n.icon} size={15}/>{n.label}
              </button>
            ))}
          </nav>
        </div>
        <div style={{display:'flex', alignItems:'center', gap:14}}>
          <Icon name="search" size={17} style={{color:'var(--text-sub)'}}/>
          <Icon name="bell" size={17} style={{color:'var(--text-sub)'}}/>
          <div style={{width:30, height:30, borderRadius:'50%', background:'var(--accent)', display:'flex', alignItems:'center', justifyContent:'center', fontWeight:700, fontSize:12}}>운</div>
        </div>
      </div>

      <div style={{flex:1, width:'100%'}}>
        {screens[view]}
      </div>

      {toast && <Toast msg={toast} onDone={()=>setToast(null)}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
