  .brand-mark { width: 30px; height: 30px; border-radius: 9999px; background: linear-gradient(135deg, var(--accent) 0%, var(--accent2) 100%); flex-shrink: 0; }
  .search-bar { flex: 1; display: flex; align-items: center; border: 1px solid var(--line); border-radius: var(--radius-pill); padding: 6px 6px 6px 20px; box-shadow: rgba(0,0,0,0.4) 0px 0px 1px 0px, rgba(0,0,0,0.04) 0px 1px 1px 0px, rgba(0,0,0,0.04) 0px 2px 4px 0px; max-width: 560px; position: relative; }
  .search-segment { display: flex; flex-direction: column; align-items: flex-start; padding: 4px 16px; border-radius: var(--radius-pill); position: relative; }
  .search-segment:hover { background: var(--surface); }
  .segment-label { font-size: 10px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.3px; }
  .segment-value { font-size: 13px; font-weight: 500; }
  .search-divider { width: 1px; height: 24px; background: var(--line); }
  .search-submit { width: 36px; height: 36px; border-radius: 9999px; background: var(--primary); color: #fff; display: flex; align-items: center; justify-content: center; margin-left: auto; flex-shrink: 0; }
  .seg-dropdown { position: absolute; top: 46px; left: 0; background: #fff; border: 1px solid var(--line); border-radius: 14px; box-shadow: 0 12px 28px rgba(0,0,0,0.12); padding: 8px; min-width: 160px; z-index: 60; animation: fadeIn 0.15s ease; }
  .seg-dropdown-item { padding: 8px 12px; border-radius: 10px; font-size: 14px; width: 100%; text-align: left; }
  .seg-dropdown-item:hover { background: var(--surface); }

  .nav-link { padding: 10px 14px; border-radius: var(--radius-pill); font-size: 14px; font-weight: 500; display: flex; align-items: center; gap: 6px; }
  .nav-link:hover { background: var(--surface); }
  .user-menu { display: flex; align-items: center; gap: 8px; padding: 8px 16px; border-radius: var(--radius-pill); background: var(--primary); color: #fff; font-size: 14px; font-weight: 500; }
  .user-avatar { width: 26px; height: 26px; border-radius: 50%; }

  .chip { flex-shrink: 0; display: flex; align-items: center; gap: 6px; padding: 9px 16px; border: 1px solid var(--line); border-radius: var(--radius-pill); font-size: 13px; font-weight: 500; background: #fff; transition: all 0.15s ease; }

  .card-badge { position: absolute; bottom: 10px; left: 10px; padding: 5px 10px; border-radius: var(--radius-pill); font-size: 11px; font-weight: 700; background: rgba(0,0,0,0.7); color: #fff; }

  .card-row-1 { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
  .card-title { font-size: 16px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .card-rating { display: flex; align-items: center; gap: 3px; font-size: 13px; font-weight: 600; color: var(--accent2); flex-shrink: 0; }
  .card-meta { font-size: 13px; color: var(--text2); display: block; margin-top: 4px; }
  .card-row-4 { display: flex; align-items: baseline; gap: 6px; margin-top: 10px; }
  .card-price { font-size: 15px; font-weight: 700; }
  .price-unit { font-size: 12px; color: var(--text3); }

  /* quick-view drawer */
  .drawer-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.35); z-index: 90; display: flex; justify-content: flex-end; animation: fadeIn 0.2s ease; }
  .quick-view { width: 420px; max-width: 92vw; height: 100%; background: #fff; overflow-y: auto; animation: drawerSlideIn 0.32s cubic-bezier(.2,.8,.2,1); padding: 28px; }
  .drawer-close { width: 36px; height: 36px; border-radius: 50%; background: var(--surface); display: flex; align-items: center; justify-content: center; margin-bottom: 20px; }
  .qv-cover { width: 100%; aspect-ratio: 16/9; border-radius: var(--radius-card); object-fit: cover; margin-bottom: 16px; }
  .qv-tags { display: flex; gap: 6px; flex-wrap: wrap; margin: 10px 0 16px; }

  .hl-item { display: flex; gap: 16px; padding: 18px 0; border-bottom: 1px solid var(--line); }

  .hl-remove { width: 30px; height: 30px; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: var(--text3); flex-shrink: 0; }

  /* ── payment ── */
  .pass-card { border-radius: var(--radius-lg); background: linear-gradient(135deg, #101010, #2b2b2b); color: #fff; padding: 32px; margin-bottom: 28px; }
  .pg-tabs { display: flex; gap: 10px; margin: 20px 0; }
  .pg-tab { flex: 1; padding: 16px; border: 1px solid var(--line); border-radius: 14px; text-align: center; font-size: 14px; font-weight: 600; }
  .pg-tab.active { border-color: var(--primary); background: var(--surface); }
  table.pay-table { width: 100%; border-collapse: collapse; margin-top: 16px; }
  table.pay-table th, table.pay-table td { text-align: left; padding: 12px 8px; font-size: 13px; border-bottom: 1px solid var(--line); }
  table.pay-table th { color: var(--text3); font-weight: 500; font-size: 11px; text-transform: uppercase; }
  .shimmer-bar { height: 46px; border-radius: var(--radius-pill); background: linear-gradient(90deg, var(--surface) 25%, #fff 50%, var(--surface) 75%); background-size: 300px 100%; animation: shimmerSweep 1.1s linear infinite; }

  .footer { width: 100%; border-top: 1px solid var(--line); padding: 40px 32px; }
  .footer-cols { max-width: 1280px; margin: 0 auto; display: flex; gap: 64px; flex-wrap: wrap; }
  .footer-col h4 { font-size: 13px; margin-bottom: 12px; color: var(--text3); }
  .footer-col a { display: block; font-size: 13px; margin-bottom: 8px; color: var(--text2); }

  @media (max-width: 720px) {
    .search-bar { display: none; }
    .header-nav .nav-link span { display: none; }
    .detail-hero { flex-direction: column; }
  }
</style>

function useRipple() {
  return (e) => {
    const btn = e.currentTarget;
    const rect = btn.getBoundingClientRect();
    const el = document.createElement('span');
    const size = Math.max(rect.width, rect.height);
    el.className = 'ripple-el';
    el.style.width = el.style.height = size + 'px';
    el.style.left = (e.clientX - rect.left - size / 2) + 'px';
    el.style.top = (e.clientY - rect.top - size / 2) + 'px';
    btn.appendChild(el);
    setTimeout(() => el.remove(), 600);
  };
}

function ViewerScreen({ onBack, highlights, setHighlights, setLastRead, activeWorkTitle }) {
  const [blockIdx, setBlockIdx] = useState(0);
  const [playing, setPlaying] = useState(true);
  const [selPopup, setSelPopup] = useState(null);
  const [savedToast, setSavedToast] = useState(false);
  const refs = useRef([]);
  const containerRef = useRef(null);

  useEffect(() => {
    const onScroll = () => {
      const mid = window.innerHeight / 2;
      let closest = 0, min = Infinity;
      refs.current.forEach((el, i) => {
        if (!el) return;
        const r = el.getBoundingClientRect();
        const d = Math.abs(r.top + r.height / 2 - mid);
        if (d < min) { min = d; closest = i; }
      });
      setBlockIdx(closest);
    };
    window.addEventListener('scroll', onScroll);
    return () => window.removeEventListener('scroll', onScroll);
  }, []);

  useEffect(() => {
    setLastRead({ title: activeWorkTitle, block: blockIdx, total: BLOCKS.length });
    setSavedToast(true);
    const t = setTimeout(() => setSavedToast(false), 1400);
    return () => clearTimeout(t);
  }, [blockIdx]);

  const current = BLOCKS[blockIdx];

  const handleMouseUp = () => {
    const sel = window.getSelection();
    if (sel && sel.toString().trim().length > 3) {
      const range = sel.getRangeAt(0).getBoundingClientRect();
      setSelPopup({ x: range.left + range.width / 2, y: range.top - 44, text: sel.toString().trim() });
    } else setSelPopup(null);
  };

  const saveHighlight = () => {
    if (!selPopup) return;
    setHighlights(prev => [{ id: Date.now(), work: activeWorkTitle, text: selPopup.text, chapter: '12화' }, ...prev]);
    setSelPopup(null);
  };

  return (
    <div className="viewer-shell" style={{ background: `linear-gradient(180deg, ${current.color}14 0%, #fdfcfc 340px)` }}>
      <div className="viewer-topbar">
        <button onClick={onBack}><Icon name="arrow-left" size={17} /></button>
        <span className="text-body-sm" style={{ color: 'var(--text)' }}>{activeWorkTitle} · 12화</span>
        <button onClick={() => setPlaying(p => !p)}><Icon name={playing ? 'volume-2' : 'volume-x'} size={17} /></button>
      </div>
      <div className="viewer-content" ref={containerRef} onMouseUp={handleMouseUp}>
        {BLOCKS.map((b, i) => (
          <div key={b.id} ref={el => refs.current[i] = el}>
            {b.type === 'text'
              ? <p className="vb-text">{b.text}</p>
              : <img className="vb-illust" src={`https://picsum.photos/seed/${b.img}/680/420`} alt="삽화" />}
          </div>
        ))}
      </div>
      {selPopup && (
        <button className="sel-toolbar" style={{ left: selPopup.x, top: selPopup.y }} onClick={saveHighlight}><Icon name="pen-line" size={13} />밑줄 긋기</button>
      )}
      <div className="audio-widget">
        <div className="sphere" style={{ animationPlayState: playing ? 'running' : 'paused' }}><AudioSphere /></div>
        <div className="audio-meta">
          <span className="audio-track">{current.track}</span>
          <span className="audio-sub">지금 재생 중 · 블록 {blockIdx + 1}/{BLOCKS.length}</span>
        </div>
        <button className="audio-play" onClick={() => setPlaying(p => !p)}><Icon name={playing ? 'pause' : 'play'} size={14} /></button>
      </div>
      {savedToast && <div className="save-toast">이어보기 위치 저장됨</div>}
    </div>
  );
}

        <tbody>
          {history.map(h => (
            <tr key={h.id}><td>{h.date}</td><td>{h.item}</td><td>{h.method}</td><td>{h.amount}</td><td>{h.status}</td></tr>
          ))}
        </tbody>
      </table>
      {toast && <div className="toast"><Icon name="check-circle" size={16} />{toast}</div>}
    </div>
  );
}

function LoginModal({ onClose, onLogin }) {
  return (
    <div className="modal-overlay" onClick={onClose}>
      <div className="modal-box" onClick={(e) => e.stopPropagation()}>
        <h3 className="text-subheading" style={{ marginBottom: 12 }}>카카오 계정으로 계속하기</h3>
        <p className="text-body-sm" style={{ marginBottom: 20 }}>카카오 로그인으로 별도 회원가입 없이 무드북을 이용할 수 있습니다.</p>
        <button className="btn btn-block" style={{ background: '#FEE500', color: '#191919' }} onClick={onLogin}><Icon name="message-circle" size={16} />카카오로 로그인</button>
        <button className="btn btn-outline btn-block" style={{ marginTop: 10 }} onClick={onClose}>닫기</button>
      </div>
    </div>
  );
}

function App() {
  const [view, setView] = useState('main');
  const [activeGenre, setActiveGenre] = useState('전체');
  const [statusFilter, setStatusFilter] = useState('전체');
  const [sortBy, setSortBy] = useState('인기순');
  const [quickViewWork, setQuickViewWork] = useState(null);
  const [detailWork, setDetailWork] = useState(null);
  const [favs, setFavs] = useState(new Set());
  const [loggedIn, setLoggedIn] = useState(false);
  const [showLogin, setShowLogin] = useState(false);
  const [highlights, setHighlights] = useState([{ id: 1, work: '재회는 서툴러서', text: '그 겨울, 우리는 서로에게 가장 서툰 사람이었다.', chapter: '8화' }]);
  const [lastRead, setLastRead] = useState(null);
  const [hasPass, setHasPass] = useState(false);
  const [history, setHistory] = useState([{ id: 1, date: '2026.06.02', item: '전체 이용권 (30일)', method: '토스페이먼츠', amount: '12,900원', status: '결제 완료' }]);
  const [activeWorkTitle, setActiveWorkTitle] = useState('달빛 아래 그대에게');

  useEffect(() => { window.lucide && window.lucide.createIcons(); });
  useEffect(() => { window.scrollTo(0, 0); }, [view]);

  const toggleFav = (id) => setFavs(prev => { const n = new Set(prev); n.has(id) ? n.delete(id) : n.add(id); return n; });

  let filtered = WORKS.filter(w => {
    if (activeGenre === '완결작') return w.status === '완결';
    if (activeGenre !== '전체' && w.genre !== activeGenre) return false;
    if (statusFilter !== '전체' && w.status !== statusFilter) return false;
    return true;
  });
  if (sortBy === '인기순') filtered = [...filtered].sort((a, b) => b.views - a.views);
  if (sortBy === '최신순') filtered = [...filtered].sort((a, b) => b.id - a.id);
  if (sortBy === '평점순') filtered = [...filtered].sort((a, b) => b.rating - a.rating);

  const startReading = (title) => { setActiveWorkTitle(title || quickViewWork?.title || detailWork?.title || activeWorkTitle); setQuickViewWork(null); setDetailWork(null); setView('viewer'); };

  return (
    <div style={{ width: '100%' }}>
      <Header view={view} setView={setView} activeGenre={activeGenre} setActiveGenre={setActiveGenre} statusFilter={statusFilter} setStatusFilter={setStatusFilter} sortBy={sortBy} setSortBy={setSortBy} loggedIn={loggedIn} setLoggedIn={setLoggedIn} openLogin={() => setShowLogin(true)} openDetail={() => { setDetailWork(WORKS[0]); setView('detail'); }} />

      {view === 'main' && (
        <main className="main">
          <div className="section-head">
            <div>
              <h1 className="text-heading">작품 탐색</h1>
              <p className="text-body-sm">무료 회차와 유료 회차를 한눈에 확인하고, 마음에 드는 작품을 이어서 감상해보세요.</p>
            </div>
            <span className="meta">{filtered.length}개 작품</span>
          </div>
          <section className="card-grid">
            {filtered.map((w, i) => (
              <div key={w.id} style={{ animationDelay: `${i * 0.04}s` }}>
                <WorkCard w={w} onOpen={setQuickViewWork} isFav={favs.has(w.id)} onToggleFav={toggleFav} />
              </div>
            ))}
          </section>
        </main>
      )}

      {view === 'detail' && detailWork && (
        <DetailScreen work={detailWork} onBack={() => { setDetailWork(null); setView('main'); }} onStartReading={() => startReading(detailWork.title)} onGoPayment={() => setView('payment')} />
      )}

      {view === 'viewer' && (
        <ViewerScreen onBack={() => setView('main')} highlights={highlights} setHighlights={setHighlights} setLastRead={setLastRead} activeWorkTitle={activeWorkTitle} />
      )}

      {view === 'highlights' && (
        <HighlightsScreen highlights={highlights} setHighlights={setHighlights} lastRead={lastRead} hasPass={hasPass} onContinue={() => setView('viewer')} onGoPayment={() => setView('payment')} />
      )}

      {view === 'payment' && (
        <PaymentScreen hasPass={hasPass} setHasPass={setHasPass} history={history} setHistory={setHistory} />
      )}

      {view === 'main' && (
        <footer className="footer">
          <div className="footer-cols">
            <div className="footer-col"><h4>무드북</h4><a>서비스 소개</a><a>이용약관</a><a>개인정보처리방침</a></div>
            <div className="footer-col"><h4>독자 지원</h4><a>자주 묻는 질문</a><a>고객센터</a></div>
            <div className="footer-col"><h4>작가 지원</h4><a>작가 등록 안내</a><a>정산 가이드</a></div>
          </div>
        </footer>
      )}

      <QuickView work={quickViewWork} onClose={() => setQuickViewWork(null)} onDetail={(w) => { setDetailWork(w); setQuickViewWork(null); setView('detail'); }} onStartReading={() => startReading(quickViewWork?.title)} />
      {showLogin && <LoginModal onClose={() => setShowLogin(false)} onLogin={() => { setLoggedIn(true); setShowLogin(false); }} />}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('app-root')).render(<App />);
</script>
</body>
</html>
