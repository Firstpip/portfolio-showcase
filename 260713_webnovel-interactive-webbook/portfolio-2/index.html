function useRipple() {
  return (e) => {
    const btn = e.currentTarget;
    const rect = btn.getBoundingClientRect();
    const el = document.createElement('span');
    const size = Math.max(rect.width, rect.height);
    el.className = 'ripple-el';
    el.style.width = el.style.height = size + 'px';
    el.style.left = (e.clientX - rect.left - size / 2) + 'px';
    el.style.top = (e.clientY - rect.top - size / 2) + 'px';
    btn.appendChild(el);
    setTimeout(() => el.remove(), 550);
  };
}

  const approveRefund = () => { setIssues(prev => prev.map(i => i.id === issue.id ? { ...i, status: '승인 완료' } : i)); showToast('환불이 승인됨'); };
  const moveOrder = (id, dir) => {
    setContent(prev => {
      const arr = [...prev].sort((a, b) => a.order - b.order);
      const idx = arr.findIndex(c => c.id === id);
      const swapIdx = idx + dir;
      if (swapIdx < 0 || swapIdx >= arr.length) return prev;
      [arr[idx].order, arr[swapIdx].order] = [arr[swapIdx].order, arr[idx].order];
      return arr;
    });
  };
  const togglePromo = (id) => setContent(prev => prev.map(c => c.id === id ? { ...c, promo: !c.promo } : c));
  const toggleRule = (id) => setRules(prev => prev.map(r => r.id === id ? { ...r, status: r.status === '활성' ? '비활성' : '활성' } : r));
  const addRule = (name, cond, ch) => { setRules(prev => [{ id: Date.now(), name, condition: cond, channel: ch, status: '활성', lastRun: '-' }, ...prev]); setRuleModal(false); showToast('알림 규칙이 등록됨'); };

  const sortedContent = [...content].sort((a, b) => a.order - b.order);

  return (
    <div className="shell">
      <WorkspaceStrip module={module} setModule={goToModule} onAdd={() => showToast('새 모듈은 준비 중')} />

      {/* ── MEMBERS / MAIN ── */}
      {module === 'main' && (
        <React.Fragment>
          <aside className="channel-list">
            <div className="channel-header">
              <h2 className="ws-name">웹소설 플랫폼 운영</h2>
              <ModuleTabs module={module} setModule={goToModule} />
            </div>
            <div className="channel-search"><input placeholder="회원 검색…" /></div>
            <div className="channel-section">
              <div className="section-toggle">전체 회원 ({members.length})</div>
              {members.map(m => (
                <button key={m.id} className={'channel-item' + (selMember === m.id ? ' active' : '')} onClick={() => setSelMember(m.id)}>
                  <div className="dm-avatar" style={{ background: `hsl(${m.id * 47},55%,30%)`, display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 11, fontWeight: 700 }}>
                    {m.name[0]}<span className={'presence ' + m.presence}></span>
                  </div>
                  <div className="channel-item-body">
                    <div className="channel-item-name">{m.name}</div>
                    <div className="channel-item-meta">{m.last} 접속</div>
                  </div>
                  <span className={'item-badge' + (m.pass === '활성' ? ' warn' : '')}>{m.pass}</span>
                </button>
              ))}
            </div>
          </aside>
          <main className="conv-main">
            <header className="conv-header">
              <div className="conv-title-row">
                <h2 className="conv-title">{member.name}</h2>
                <span className={'status-pill' + (member.pass === '활성' ? ' on' : '')}>{member.pass}</span>
              </div>
              <div className="conv-actions">
                <button className="btn btn-fill" onClick={(e) => { ripple(e); grantPass(); }}>이용권 부여</button>
                <button className="btn btn-ghost" onClick={(e) => { ripple(e); revokePass(); }}>이용권 회수</button>
              </div>
            </header>
            <div className="conv-body">
              <div className="stat-artifact">
                <div className="label">누적 결제액</div>
                <div className="num serif text-heading">{member.total}</div>
                <div className="delta">가입일 {member.join}</div>
              </div>
              {(logs[member.id] || ['최근 활동 내역이 없습니다']).map((l, i) => (
                <div className="msg-group" key={i}>
                  <div className="msg-avatar">운영</div>
                  <div>
                    <span className="msg-name">운영팀<span className="msg-time">방금</span></span>
                    <div className="msg-content"><p>{l}</p></div>
                  </div>
                </div>
              ))}
            </div>
            <footer className="conv-input">
              <input placeholder="회원 메모 추가…" value={note} onChange={(e) => setNote(e.target.value)} onKeyDown={(e) => e.key === 'Enter' && addNote()} />
              <button className="btn btn-fill" onClick={addNote}><PhIcon name="paper-plane-tilt" size={15} /></button>
            </footer>
          </main>
          <aside className="info-panel" style={{ display: infoOpen ? 'block' : 'none' }}>
            <div className="info-header"><h3 className="text-subheading">회원 정보</h3><button className="close-info" onClick={() => setInfoOpen(false)}><PhIcon name="x" size={13} /></button></div>
            <div className="info-section">
              <div className="info-label">이메일</div><div className="info-value">{member.email}</div>
              <div className="info-label">가입일</div><div className="info-value">{member.join}</div>
              <div className="info-label">최근 접속</div><div className="info-value">{member.last}</div>
            </div>
            <div className="info-section">
              <div className="info-label">결제 수단 (2)</div>
              <div className="member-list">
                <div className="member-item"><span className="member-avatar">포트</span><span>포트원 · 카드결제</span></div>
                <div className="member-item"><span className="member-avatar">토스</span><span>토스페이먼츠 · 간편결제</span></div>
              </div>
            </div>
            <div className="info-section">
              <div className="info-label">고정된 메모</div>
              <a className="pinned-item">VIP 문의 이력 있음 · 응대 우선</a>
            </div>
          </aside>
        </React.Fragment>
      )}

      {/* ── PAYMENTS ── */}
      {module === 'payments' && (
        <React.Fragment>
          <aside className="channel-list">
            <div className="channel-header">
              <h2 className="ws-name">웹소설 플랫폼 운영</h2>
              <ModuleTabs module={module} setModule={goToModule} />
            </div>
            <div className="channel-search"><input placeholder="결제 이슈 검색…" /></div>
            <div className="channel-section">
              <div className="section-toggle">재시도 · 환불 대기</div>
              {issues.map(i => (
                <button key={i.id} className={'channel-item' + (selIssue === i.id ? ' active' : '')} onClick={() => setSelIssue(i.id)}>
                  <div className="dm-avatar" style={{ background: 'var(--surface2)', display: 'flex', alignItems: 'center', justifyContent: 'center' }}><PhIcon name={i.type === '웹훅 실패' ? 'arrow-clockwise' : 'arrow-u-down-left'} size={14} /></div>
                  <div className="channel-item-body">
                    <div className="channel-item-name">{i.member} · {i.type}</div>
                    <div className="channel-item-meta">{i.amount} · {i.created}</div>
                  </div>
                  <span className={'item-badge' + (i.status.includes('대기') ? ' warn' : '')}>{i.status}</span>
                </button>
              ))}
            </div>
          </aside>
          <main className="conv-main">
            <header className="conv-header">
              <div className="conv-title-row"><h2 className="conv-title">{issue.member} · {issue.type}</h2><span className="status-pill">{issue.status}</span></div>
              <div className="conv-actions">
                {issue.type === '웹훅 실패'
                  ? <button className="btn btn-fill" onClick={(e) => { ripple(e); retryWebhook(); }}>웹훅 재시도</button>
                  : <button className="btn btn-fill" onClick={(e) => { ripple(e); approveRefund(); }}>환불 승인</button>}
              </div>
            </header>
            <div className="conv-body">
              <div className="stat-artifact">
                <div className="label">정산 요약 · {funnelPeriod}</div>
                <div className="num serif text-display">₩8,420만</div>
                <div className="delta">전 {funnelPeriod === '일별' ? '일' : '월'} 대비 +5.5%</div>
                <div style={{ display: 'flex', gap: 6, marginTop: 10 }}>
                  <button className="btn btn-ghost" style={{ height: 28, padding: '0 10px', fontSize: 11, color: '#17191c', borderColor: 'rgba(0,0,0,0.15)' }} onClick={() => setFunnelPeriod('일별')}>일별</button>
                  <button className="btn btn-ghost" style={{ height: 28, padding: '0 10px', fontSize: 11, color: '#17191c', borderColor: 'rgba(0,0,0,0.15)' }} onClick={() => setFunnelPeriod('월별')}>월별</button>
                </div>
              </div>
              <div className="msg-group">
                <div className="msg-avatar">PG</div>
                <div><span className="msg-name">결제 게이트웨이<span className="msg-time">{issue.created}</span></span><div className="msg-content"><p>{issue.member} 회원의 {issue.amount} 건 — {issue.type} 이벤트 수신, 상태 {issue.status}</p></div></div>
              </div>
            </div>
            <footer className="conv-input">
              <input placeholder="처리 메모 추가…" />
              <button className="btn btn-fill" onClick={() => showToast('처리 메모가 저장됨')}><PhIcon name="paper-plane-tilt" size={15} /></button>
            </footer>
          </main>
          <aside className="info-panel" style={{ display: infoOpen ? 'block' : 'none' }}>
            <div className="info-header"><h3 className="text-subheading">정산 대시보드</h3><button className="close-info" onClick={() => setInfoOpen(false)}><PhIcon name="x" size={13} /></button></div>
            <div className="info-section">
              <div className="info-label">이번 달 재시도 성공률</div><div className="info-value">92%</div>
              <div className="info-label">환불 승인 건수</div><div className="info-value">2건</div>
            </div>
            <div className="info-section">
              <div className="info-label">고정된 항목</div>
              <a className="pinned-item">매출 Materialized View 3종 · 일별/월별/누적</a>
            </div>
          </aside>
        </React.Fragment>
      )}

      {/* ── CONTENT ── */}
      {module === 'content' && (
        <React.Fragment>
          <aside className="channel-list">
            <div className="channel-header">
              <h2 className="ws-name">웹소설 플랫폼 운영</h2>
              <ModuleTabs module={module} setModule={goToModule} />
            </div>
            <div className="channel-search"><input placeholder="작품 검색…" /></div>
            <div className="channel-section">
              <div className="section-toggle">노출 순서 (화살표로 조정)</div>
              {sortedContent.map(c => (
                <button key={c.id} className={'channel-item' + (selContentSection === c.id ? ' active' : '')} onClick={() => setSelContentSection(c.id)}>
                  <div className="dm-avatar" style={{ background: 'var(--surface2)', display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 11 }}>{c.order}</div>
                  <div className="channel-item-body"><div className="channel-item-name">{c.title}</div><div className="channel-item-meta">{c.section}</div></div>
                  <span className={'item-badge' + (c.promo ? ' warn' : '')}>{c.promo ? '예약됨' : '일반'}</span>
                </button>
              ))}
            </div>
          </aside>
          <main className="conv-main">
            <header className="conv-header">
              <div className="conv-title-row"><h2 className="conv-title">노출 위치 및 프로모션 관리</h2></div>
            </header>
            <div className="conv-body">
              {sortedContent.map(c => (
                <div key={c.id} className="promo-row">
                  <div className="order-btns">
                    <button onClick={() => moveOrder(c.id, -1)}><PhIcon name="caret-up" size={11} /></button>
                    <button onClick={() => moveOrder(c.id, 1)}><PhIcon name="caret-down" size={11} /></button>
                  </div>
                  <div style={{ flex: 1 }}>
                    <div className="text-body" style={{ color: 'var(--text)' }}>{c.title}</div>
                    <div className="text-body-sm">노출 섹션: {c.section} · 순서 {c.order}</div>
                  </div>
                  <button className={'btn ' + (c.promo ? 'btn-fill' : 'btn-ghost')} style={{ height: 32, fontSize: 12 }} onClick={() => togglePromo(c.id)}>{c.promo ? '예약 취소' : '무료 회차 예약'}</button>
                </div>
              ))}
            </div>
            <footer className="conv-input">
              <input type="date" style={{ width: 160 }} />
              <input placeholder="프로모션 메모…" />
              <button className="btn btn-fill" onClick={() => showToast('프로모션 예약이 저장됨')}>예약 저장</button>
            </footer>
          </main>
          <aside className="info-panel" style={{ display: infoOpen ? 'block' : 'none' }}>
            <div className="info-header"><h3 className="text-subheading">노출 상태 요약</h3><button className="close-info" onClick={() => setInfoOpen(false)}><PhIcon name="x" size={13} /></button></div>
            <div className="info-section">
              <div className="info-label">추천 섹션</div><div className="info-value">{content.filter(c => c.section === '추천').length}개 작품</div>
              <div className="info-label">신작 섹션</div><div className="info-value">{content.filter(c => c.section === '신작').length}개 작품</div>
              <div className="info-label">예약된 프로모션</div><div className="info-value">{content.filter(c => c.promo).length}건</div>
            </div>
            <div className="info-section">
              <div className="info-label">고정된 항목</div>
              <a className="pinned-item">예약 충돌 감지 배치 · 매일 00:10 실행</a>
            </div>
          </aside>
        </React.Fragment>
      )}

      {/* ── ANALYTICS ── */}
      {module === 'analytics' && (
        <React.Fragment>
          <aside className="channel-list">
            <div className="channel-header">
              <h2 className="ws-name">웹소설 플랫폼 운영</h2>
              <ModuleTabs module={module} setModule={goToModule} />
            </div>
            <div className="channel-search"><input placeholder="알림 규칙 검색…" /></div>
            <div className="channel-section">
              <div className="section-toggle">알림 자동화 규칙</div>
              {rules.map(r => (
                <button key={r.id} className={'channel-item' + (selRule === r.id ? ' active' : '')} onClick={() => setSelRule(r.id)}>
                  <div className="dm-avatar" style={{ background: 'var(--surface2)', display: 'flex', alignItems: 'center', justifyContent: 'center' }}><PhIcon name="bell" size={14} /></div>
                  <div className="channel-item-body"><div className="channel-item-name">{r.name}</div><div className="channel-item-meta">{r.channel}</div></div>
                  <span className={'item-badge' + (r.status === '활성' ? ' warn' : '')}>{r.status}</span>
                </button>
              ))}
            </div>
          </aside>
          <main className="conv-main">
            <header className="conv-header">
              <div className="conv-title-row"><h2 className="conv-title">가입자 퍼널 분석</h2></div>
              <div className="conv-actions"><button className="btn btn-fill" onClick={() => setRuleModal(true)}>규칙 추가</button></div>
            </header>
            <div className="conv-body">
              <div className="funnel-bar-wrap">
                <div className="funnel-label"><span>회원가입</span><span>1,000명</span></div>
                <div className="funnel-track"><div className="funnel-fill" style={{ '--w': '100%', width: '100%' }}></div></div>
              </div>
              <div className="funnel-bar-wrap">
                <div className="funnel-label"><span>첫 결제</span><span>340명 (34%)</span></div>
                <div className="funnel-track"><div className="funnel-fill" style={{ '--w': '34%', width: '34%' }}></div></div>
              </div>
              <div className="funnel-bar-wrap">
                <div className="funnel-label"><span>재결제</span><span>210명 (21%)</span></div>
                <div className="funnel-track"><div className="funnel-fill" style={{ '--w': '21%', width: '21%' }}></div></div>
              </div>
              <h3 className="text-subheading" style={{ marginTop: 24, marginBottom: 8 }}>선택 규칙 상세</h3>
              <div className="msg-group">
                <div className="msg-avatar">규칙</div>
                <div><span className="msg-name">{rule.name}<span className="msg-time">최근 실행 {rule.lastRun}</span></span><div className="msg-content"><p>조건: {rule.condition} · 발송 채널: {rule.channel}</p></div></div>
              </div>
              <button className="btn btn-ghost" style={{ marginTop: 12 }} onClick={() => toggleRule(rule.id)}>{rule.status === '활성' ? '규칙 비활성화' : '규칙 활성화'}</button>
            </div>
            <footer className="conv-input">
              <input placeholder="발송 로그 메모…" />
              <button className="btn btn-fill" onClick={() => showToast('발송 로그 메모가 저장됨')}><PhIcon name="paper-plane-tilt" size={15} /></button>
            </footer>
          </main>
          <aside className="info-panel" style={{ display: infoOpen ? 'block' : 'none' }}>
            <div className="info-header"><h3 className="text-subheading">발송 로그</h3><button className="close-info" onClick={() => setInfoOpen(false)}><PhIcon name="x" size={13} /></button></div>
            <div className="info-section">
              <div className="info-label">카카오 알림톡 (오늘)</div><div className="info-value">128건 발송 · 실패 2건</div>
              <div className="info-label">이메일 (오늘)</div><div className="info-value">64건 발송 · 실패 0건</div>
            </div>
            <div className="info-section">
              <div className="info-label">고정된 항목</div>
              <a className="pinned-item">활성 규칙 {rules.filter(r => r.status === '활성').length}건 운영 중</a>
            </div>
          </aside>
        </React.Fragment>
      )}

      {!infoOpen && (
        <button className="conv-action" style={{ position: 'fixed', right: 16, top: 18, zIndex: 50 }} onClick={() => setInfoOpen(true)}><PhIcon name="info" size={16} /></button>
      )}

      {toast && <div className="toast"><PhIcon name="check-circle" size={15} />{toast}</div>}

      {ruleModal && (
        <div className="modal-overlay" onClick={() => setRuleModal(false)}>
          <div className="modal-box" onClick={(e) => e.stopPropagation()}>
            <h3 className="text-subheading">알림 규칙 추가</h3>
            <RuleForm onSubmit={addRule} onCancel={() => setRuleModal(false)} />
          </div>
        </div>
      )}
    </div>
  );
}

function RuleForm({ onSubmit, onCancel }) {
  const [name, setName] = useState('');
  const [cond, setCond] = useState('lastActive>7d');
  const [ch, setCh] = useState('카카오 알림톡');
  return (
    <div>
      <label>규칙 이름</label>
      <input value={name} onChange={(e) => setName(e.target.value)} placeholder="예: 결제 후 N일 미접속" />
      <label>조건</label>
      <select value={cond} onChange={(e) => setCond(e.target.value)}>
        <option value="lastActive>7d">결제 후 7일 미접속</option>
        <option value="passExpiry<=3d">이용권 만료 3일 전</option>
        <option value="firstPay=null">가입 후 미결제 14일</option>
      </select>
      <label>발송 채널</label>
      <select value={ch} onChange={(e) => setCh(e.target.value)}>
        <option value="카카오 알림톡">카카오 알림톡</option>
        <option value="이메일">이메일</option>
      </select>
      <div style={{ display: 'flex', gap: 8, marginTop: 20 }}>
        <button className="btn btn-fill" style={{ flex: 1 }} onClick={() => name.trim() && onSubmit(name, cond, ch)}>저장</button>
        <button className="btn btn-ghost" style={{ flex: 1 }} onClick={onCancel}>취소</button>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('app-root')).render(<App />);
</script>
</body>
</html>
