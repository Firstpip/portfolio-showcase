<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>핏메이트 — AI 사이즈 & 핏 스코어 추천 위젯</title>
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<style>
  :root {
    --primary: #17191c;
    --secondary: #fafafb;
    --accent: #fbe1d1;
    --accent-ink: #5d2a1a;
    --bg: #ffffff;
    --surface: #f2f2f3;
    --text: #17191c;
    --text2: #777b86;
    --text3: #a3a6af;
    --line: #e7e7e9;
    --fit-good: #2f7a52;
    --fit-good-bg: #e7f3ec;
    --fit-mid: #b9862a;
    --fit-mid-bg: #faf1e1;
    --fit-bad: #b8503c;
    --fit-bad-bg: #f9e9e5;
    --radius: 24px;
    --radius-sm: 14px;
    --radius-xs: 8px;
  }
  * { box-sizing: border-box; }
  html, body { width: 100%; margin: 0; padding: 0; }
  body {
    font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, sans-serif;
    background: var(--bg);
    color: var(--text);
    -webkit-font-smoothing: antialiased;
  }
  #root { width: 100%; }
  button { font-family: inherit; cursor: pointer; border: none; background: none; color: inherit; }
  input, select, textarea { font-family: inherit; }
  a { text-decoration: none; color: inherit; }
  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-thumb { background: var(--line); border-radius: 8px; }

  @keyframes fadeInUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes drawerSlideIn { from { transform: translateX(100%); } to { transform: translateX(0); } }
  @keyframes overlayIn { from { opacity: 0; } to { opacity: 1; } }
  @keyframes modalScaleIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
  @keyframes shimmerSweep { 0% { background-position: -300px 0; } 100% { background-position: 300px 0; } }
  @keyframes barGrow { from { transform: scaleX(0); } to { transform: scaleX(1); } }
  @keyframes toastIn { from { opacity: 0; transform: translateY(10px) translateX(-50%); } to { opacity: 1; transform: translateY(0) translateX(-50%); } }
  @keyframes ripple { from { transform: scale(0); opacity: 0.5; } to { transform: scale(2.4); opacity: 0; } }
  @keyframes pulseRing { 0%, 100% { box-shadow: 0 0 0 0 rgba(23,25,28,0.15); } 50% { box-shadow: 0 0 0 8px rgba(23,25,28,0); } }
  @keyframes widgetPop { from { opacity: 0; transform: translateY(16px) scale(0.94); } to { opacity: 1; transform: translateY(0) scale(1); } }
  @keyframes spin { to { transform: rotate(360deg); } }

  .app-shell { width: 100%; min-height: 100vh; display: flex; flex-direction: column; background: var(--bg); }

  /* ── Topbar ── */
  .topbar {
    width: 100%; display: flex; align-items: center; justify-content: space-between;
    padding: 0 32px; height: 72px; border-bottom: 1px solid var(--line);
    background: rgba(255,255,255,0.94); backdrop-filter: blur(8px);
    position: sticky; top: 0; z-index: 60;
  }
  .brand { display: flex; align-items: center; gap: 10px; cursor: pointer; }
  .brand .mark { width: 34px; height: 34px; border-radius: 10px; background: var(--primary); color: #fff; display: flex; align-items: center; justify-content: center; font-size: 15px; font-weight: 500; }
  .brand .name { font-size: 19px; font-weight: 400; letter-spacing: -0.02em; }
  .nav-tabs { display: flex; align-items: center; gap: 3px; flex-wrap: wrap; }
  .nav-tab {
    padding: 9px 14px; border-radius: 999px; font-size: 13.5px; font-weight: 600; color: var(--text2);
    display: flex; align-items: center; gap: 6px; transition: background 0.15s, color 0.15s; white-space: nowrap;
  }
  .nav-tab:hover { background: var(--surface); }
  .nav-tab.active { background: var(--primary); color: #fff; }
  .topbar-actions { display: flex; align-items: center; gap: 8px; }
  .icon-btn { width: 38px; height: 38px; border-radius: 12px; display: flex; align-items: center; justify-content: center; color: var(--text2); position: relative; flex-shrink: 0; }
  .icon-btn:hover { background: var(--surface); }
  .icon-btn svg { width: 18px; height: 18px; }
  .member-toggle {
    display: flex; align-items: center; gap: 8px; background: var(--surface); border-radius: 999px; padding: 4px; font-size: 12.5px; font-weight: 600;
  }
  .member-toggle button { padding: 6px 12px; border-radius: 999px; color: var(--text2); }
  .member-toggle button.on { background: var(--primary); color: #fff; }

  /* ── Page wrap ── */
  .page-wrap { width: 100%; max-width: 1360px; margin: 0 auto; padding: 32px; flex: 1; min-width: 0; }
  .hero-band {
    width: 100%; display: flex; align-items: center; justify-content: space-between; gap: 24px;
    background: linear-gradient(120deg, var(--secondary) 0%, #ffffff 62%);
    border: 1px solid var(--line); border-radius: var(--radius); padding: 28px 36px; margin-bottom: 20px;
  }
  .hero-band-text { max-width: 620px; }
  .fit-radar-art { width: 128px; height: 128px; flex-shrink: 0; }
  .page-head { display: flex; align-items: flex-end; justify-content: space-between; margin-bottom: 24px; flex-wrap: wrap; gap: 16px; }
  .page-title { font-size: 46px; font-weight: 400; letter-spacing: -0.02em; margin: 0 0 8px; line-height: 1.2; }
  .page-sub { font-size: 15px; color: var(--text2); margin: 0; max-width: 520px; line-height: 1.55; }

  /* ── filter-rail region ── */
  .filter-rail {
    width: 100%; display: flex; align-items: center; justify-content: space-between; gap: 16px; flex-wrap: wrap;
    background: var(--secondary); border: 1px solid var(--line); border-radius: var(--radius); padding: 16px 20px; margin-bottom: 28px;
  }
  .chip-row { display: flex; gap: 8px; flex-wrap: wrap; }
  .chip {
    padding: 9px 16px; border-radius: 999px; font-size: 13.5px; font-weight: 600; background: #fff; color: var(--text2); border: 1px solid var(--line);
  }
  .chip.active { background: var(--primary); color: #fff; border-color: var(--primary); }
  .body-quick-btn {
    display: flex; align-items: center; gap: 8px; padding: 10px 18px; border-radius: 999px; background: var(--accent); color: var(--accent-ink); font-size: 13.5px; font-weight: 700;
  }
  .body-quick-btn svg { width: 16px; height: 16px; }

  /* ── gallery region ── */
  .gallery-grid { width: 100%; display: grid; grid-template-columns: repeat(4, 1fr); gap: 18px; }
  .item-card {
    background: #fff; border: 1px solid var(--line); border-radius: var(--radius); overflow: hidden; text-align: left; width: 100%;
    animation: fadeInUp 0.5s ease both; transition: transform 0.18s, box-shadow 0.18s;
  }
  .item-card:hover { transform: translateY(-4px); box-shadow: 0 16px 32px rgba(23,25,28,0.08); }
  .item-thumb { width: 100%; aspect-ratio: 4/5; position: relative; overflow: hidden; background: var(--surface); }
  .item-thumb img { width: 100%; height: 100%; object-fit: cover; }
  .fit-badge {
    position: absolute; top: 10px; left: 10px; padding: 5px 11px; border-radius: 999px; font-size: 12px; font-weight: 700;
    display: flex; align-items: center; gap: 4px;
  }
  .fit-badge.good { background: var(--fit-good-bg); color: var(--fit-good); }
  .fit-badge.mid { background: var(--fit-mid-bg); color: var(--fit-mid); }
  .fit-badge.bad { background: var(--fit-bad-bg); color: var(--fit-bad); }
  .item-body { padding: 14px 16px 16px; }
  .item-brand { font-size: 12px; color: var(--text3); font-weight: 600; margin-bottom: 2px; }
  .item-name { font-size: 15px; font-weight: 600; margin-bottom: 8px; line-height: 1.4; }
  .item-meta-row { display: flex; align-items: center; justify-content: space-between; }
  .item-size-pill { font-size: 12.5px; font-weight: 700; background: var(--surface); padding: 4px 10px; border-radius: 8px; }
  .item-score { font-size: 13px; font-weight: 700; color: var(--text2); }

  /* ── quick-view drawer ── */
  .overlay { position: fixed; inset: 0; background: rgba(23,25,28,0.35); z-index: 80; animation: overlayIn 0.2s ease both; }
  .drawer {
    position: fixed; top: 0; right: 0; bottom: 0; width: 440px; max-width: 92vw; background: #fff; z-index: 90;
    box-shadow: -24px 0 60px rgba(23,25,28,0.16); animation: drawerSlideIn 0.32s cubic-bezier(0.16,1,0.3,1) both;
    display: flex; flex-direction: column; overflow-y: auto;
  }
  .drawer-head { display: flex; align-items: center; justify-content: space-between; padding: 20px 24px; border-bottom: 1px solid var(--line); }
  .drawer-head h3 { font-size: 17px; font-weight: 700; margin: 0; }
  .drawer-body { padding: 24px; flex: 1; }
  .dv-thumb { width: 100%; aspect-ratio: 16/10; border-radius: var(--radius-sm); overflow: hidden; margin-bottom: 18px; background: var(--surface); }
  .dv-thumb img { width: 100%; height: 100%; object-fit: cover; }
  .dv-score-card { background: var(--secondary); border-radius: var(--radius-sm); padding: 18px; display: flex; align-items: center; gap: 16px; margin-bottom: 20px; }
  .dv-score-num { font-size: 44px; font-weight: 400; letter-spacing: -0.02em; line-height: 1; }
  .dv-score-label { font-size: 13px; color: var(--text2); font-weight: 600; margin-top: 4px; }
  .skeleton { background: linear-gradient(90deg, var(--surface) 25%, #e9e9eb 37%, var(--surface) 63%); background-size: 400px 100%; animation: shimmerSweep 1.3s ease-in-out infinite; border-radius: var(--radius-sm); }
  .measure-row { display: flex; align-items: center; gap: 12px; margin-bottom: 14px; }
  .measure-label { width: 46px; font-size: 12.5px; color: var(--text2); font-weight: 600; flex-shrink: 0; }
  .measure-track { flex: 1; height: 8px; background: var(--surface); border-radius: 999px; overflow: hidden; }
  .measure-fill { height: 100%; border-radius: 999px; transform-origin: left; animation: barGrow 0.7s cubic-bezier(0.16,1,0.3,1) both; }
  .measure-val { width: 52px; text-align: right; font-size: 12.5px; font-weight: 700; color: var(--text); flex-shrink: 0; }
  .size-alt-row { display: flex; gap: 8px; margin: 18px 0; }
  .size-alt { flex: 1; padding: 10px 0; text-align: center; border-radius: var(--radius-xs); border: 1.5px solid var(--line); font-size: 13.5px; font-weight: 700; color: var(--text2); }
  .size-alt.rec { border-color: var(--primary); background: var(--primary); color: #fff; }
  .save-btn { width: 100%; padding: 14px; border-radius: 999px; background: var(--primary); color: #fff; font-size: 14.5px; font-weight: 700; display: flex; align-items: center; justify-content: center; gap: 8px; position: relative; overflow: hidden; }
  .save-btn.guest { background: var(--accent); color: var(--accent-ink); }
  .ripple-el { position: absolute; border-radius: 50%; background: rgba(255,255,255,0.5); animation: ripple 0.55s ease-out forwards; pointer-events: none; }

  /* ── generic modal ── */
  .modal-overlay { position: fixed; inset: 0; background: rgba(23,25,28,0.4); z-index: 100; display: flex; align-items: center; justify-content: center; padding: 20px; animation: overlayIn 0.2s ease both; }
  .modal { background: #fff; border-radius: var(--radius); width: 460px; max-width: 100%; max-height: 88vh; overflow-y: auto; animation: modalScaleIn 0.24s cubic-bezier(0.16,1,0.3,1) both; }
  .modal-head { display: flex; align-items: center; justify-content: space-between; padding: 20px 24px; border-bottom: 1px solid var(--line); }
  .modal-head h3 { margin: 0; font-size: 16.5px; font-weight: 700; }
  .modal-body { padding: 22px 24px; }
  .field-label { font-size: 12.5px; font-weight: 700; color: var(--text2); margin-bottom: 6px; display: block; }
  .field-input { width: 100%; padding: 12px 14px; border: 1.5px solid var(--line); border-radius: var(--radius-xs); font-size: 14px; margin-bottom: 16px; }
  .field-input:focus { outline: none; border-color: var(--primary); }
  .slider-row { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; }
  .slider-row input[type=range] { flex: 1; accent-color: var(--primary); }
  .slider-val { width: 56px; text-align: right; font-size: 13.5px; font-weight: 700; }
  .primary-btn { width: 100%; padding: 13px; border-radius: 999px; background: var(--primary); color: #fff; font-weight: 700; font-size: 14px; }
  .danger-btn { width: 100%; padding: 13px; border-radius: 999px; background: var(--fit-bad-bg); color: var(--fit-bad); font-weight: 700; font-size: 14px; }
  .ghost-btn { width: 100%; padding: 13px; border-radius: 999px; background: var(--surface); color: var(--text); font-weight: 700; font-size: 14px; margin-top: 8px; }

  /* ── toast ── */
  .toast { position: fixed; bottom: 28px; left: 50%; background: var(--primary); color: #fff; padding: 13px 22px; border-radius: 999px; font-size: 13.5px; font-weight: 600; z-index: 200; display: flex; align-items: center; gap: 8px; animation: toastIn 0.3s cubic-bezier(0.16,1,0.3,1) both; box-shadow: 0 12px 30px rgba(23,25,28,0.25); }

  /* ── closet screen ── */
  .tab-row { display: flex; gap: 6px; background: var(--surface); border-radius: 999px; padding: 4px; width: fit-content; margin-bottom: 22px; }
  .tab-btn { padding: 9px 18px; border-radius: 999px; font-size: 13.5px; font-weight: 700; color: var(--text2); }
  .tab-btn.active { background: #fff; color: var(--text); box-shadow: 0 2px 6px rgba(23,25,28,0.08); }
  .closet-form { background: var(--secondary); border: 1px solid var(--line); border-radius: var(--radius); padding: 24px; margin-bottom: 28px; }
  .form-row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .closet-list-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
  .closet-list-head h3 { font-size: 16px; font-weight: 700; margin: 0; }
  .closet-row-card { display: flex; align-items: center; gap: 14px; padding: 14px; border: 1px solid var(--line); border-radius: var(--radius-sm); margin-bottom: 10px; background: #fff; animation: fadeInUp 0.4s ease both; }
  .closet-row-thumb { width: 56px; height: 56px; border-radius: var(--radius-xs); overflow: hidden; flex-shrink: 0; background: var(--surface); }
  .closet-row-thumb img { width: 100%; height: 100%; object-fit: cover; }
  .closet-row-info { flex: 1; min-width: 0; }
  .closet-row-info .n { font-size: 14px; font-weight: 700; margin-bottom: 2px; }
  .closet-row-info .m { font-size: 12.5px; color: var(--text2); }
  .row-actions { display: flex; gap: 6px; }
  .row-actions .icon-btn { width: 34px; height: 34px; }

  /* ── auth screen ── */
  .auth-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; align-items: start; }
  .auth-card { background: var(--secondary); border: 1px solid var(--line); border-radius: var(--radius); padding: 28px; }
  .auth-card h3 { font-size: 18px; font-weight: 700; margin: 0 0 4px; }
  .auth-card .d { font-size: 13.5px; color: var(--text2); margin-bottom: 20px; }
  .kakao-btn { width: 100%; padding: 13px; border-radius: 999px; background: #FEE500; color: #191600; font-weight: 700; font-size: 14px; display: flex; align-items: center; justify-content: center; gap: 8px; margin-top: 10px; }
  .settings-list .s-row { display: flex; align-items: center; justify-content: space-between; padding: 14px 0; border-bottom: 1px solid var(--line); }
  .settings-list .s-row:last-child { border-bottom: none; }
  .s-row .l { display: flex; align-items: center; gap: 10px; font-size: 14px; font-weight: 600; }
  .switch { width: 42px; height: 24px; border-radius: 999px; background: var(--line); position: relative; flex-shrink: 0; transition: background 0.2s; }
  .switch.on { background: var(--primary); }
  .switch .knob { position: absolute; top: 3px; left: 3px; width: 18px; height: 18px; border-radius: 50%; background: #fff; transition: transform 0.2s; }
  .switch.on .knob { transform: translateX(18px); }
  .link-btn { font-size: 13px; color: var(--text2); font-weight: 600; text-decoration: underline; }

  /* ── embed screen ── */
  .embed-layout { display: grid; grid-template-columns: 1fr 420px; gap: 28px; align-items: start; }
  .code-block { background: var(--primary); color: #f2f2f3; border-radius: var(--radius-sm); padding: 20px; font-family: 'SF Mono', Menlo, monospace; font-size: 12.5px; line-height: 1.7; position: relative; overflow-x: auto; white-space: pre; }
  .copy-btn { position: absolute; top: 14px; right: 14px; background: rgba(255,255,255,0.12); color: #fff; padding: 7px 12px; border-radius: 999px; font-size: 12px; font-weight: 700; display: flex; align-items: center; gap: 6px; }
  .install-steps { margin-top: 18px; display: flex; flex-direction: column; gap: 12px; }
  .install-step { display: flex; gap: 12px; align-items: flex-start; }
  .install-step .num { width: 26px; height: 26px; border-radius: 50%; background: var(--surface); display: flex; align-items: center; justify-content: center; font-size: 12.5px; font-weight: 700; flex-shrink: 0; }
  .install-step .t { font-size: 13.5px; color: var(--text2); line-height: 1.6; padding-top: 3px; }
  .mock-shop { background: var(--secondary); border: 1px solid var(--line); border-radius: var(--radius); padding: 20px; position: relative; min-height: 480px; }
  .mock-shop-thumb { width: 100%; aspect-ratio: 3/4; border-radius: var(--radius-sm); overflow: hidden; margin-bottom: 14px; }
  .mock-shop-thumb img { width: 100%; height: 100%; object-fit: cover; }
  .mock-price { font-size: 20px; font-weight: 700; margin: 8px 0; }
  .widget-fab {
    position: absolute; bottom: 20px; right: 20px; width: 56px; height: 56px; border-radius: 50%;
    background: var(--primary); color: #fff; display: flex; align-items: center; justify-content: center;
    box-shadow: 0 12px 28px rgba(23,25,28,0.3); animation: pulseRing 2.4s infinite;
  }
  .widget-panel {
    position: absolute; bottom: 20px; right: 20px; width: 280px; background: #fff; border-radius: var(--radius-sm);
    box-shadow: 0 20px 50px rgba(23,25,28,0.25); overflow: hidden; animation: widgetPop 0.28s cubic-bezier(0.16,1,0.3,1) both;
  }
  .widget-panel-head { background: var(--primary); color: #fff; padding: 14px 16px; display: flex; align-items: center; justify-content: space-between; }
  .widget-panel-body { padding: 16px; }

  /* ── mypage screen ── */
  .mypage-grid { display: grid; grid-template-columns: 300px 1fr; gap: 24px; }
  .profile-card { background: var(--secondary); border: 1px solid var(--line); border-radius: var(--radius); padding: 24px; text-align: center; }
  .avatar-lg { width: 76px; height: 76px; border-radius: 50%; margin: 0 auto 14px; overflow: hidden; background: var(--surface); }
  .avatar-lg img { width: 100%; height: 100%; object-fit: cover; }
  .stat-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; margin-bottom: 20px; }
  .stat-box { background: #fff; border: 1px solid var(--line); border-radius: var(--radius-sm); padding: 18px; text-align: center; }
  .stat-box .v { font-size: 26px; font-weight: 400; letter-spacing: -0.01em; }
  .stat-box .l { font-size: 12px; color: var(--text2); margin-top: 4px; }
  .quick-link-row { display: flex; flex-direction: column; gap: 10px; }
  .quick-link { display: flex; align-items: center; justify-content: space-between; padding: 14px 18px; border: 1px solid var(--line); border-radius: var(--radius-sm); font-size: 14px; font-weight: 600; }
  .quick-link:hover { background: var(--surface); }

  @media (max-width: 1100px) {
    .gallery-grid { grid-template-columns: repeat(2, 1fr); }
    .auth-grid, .embed-layout, .mypage-grid { grid-template-columns: 1fr; }
  }
  @media (max-width: 860px) {
    .nav-tabs { display: none; }
    .topbar { padding: 0 16px; }
    .topbar-actions .nav-tab span { display: none; }
    .topbar-actions .nav-tab { padding: 9px; }
    .hero-band { flex-wrap: wrap; }
    .fit-radar-art { display: none; }
    .gallery-grid { grid-template-columns: 1fr; }
  }
</style>
</head>

<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef } = React;

const WARDROBE = [
  { id: 1, name: '옥스포드 카라 셔츠', brand: '스틸로프트', category: '상의', size: 'L', fit: 92, img: 'fitmate-card-1',

  { id: 2, name: '울 블렌드 코트', brand: '노르덴', category: '아우터', size: 'M', fit: 64, img: 'fitmate-card-2',
    measures: [ ['어깨', 96, 89], ['가슴', 92, 84], ['기장', 78, 90], ['소매', 96, 88] ] },
  { id: 3, name: '와이드 슬랙스', brand: '스틸로프트', category: '하의', size: 'L', fit: 88, img: 'fitmate-card-3',

function fitTone(score) {
  if (score >= 85) return { cls: 'good', label: '적합', icon: 'check-circle-2' };
  if (score >= 60) return { cls: 'mid', label: '보통', icon: 'alert-circle' };
  return { cls: 'bad', label: '부적합', icon: 'x-circle' };
}
function measureColor(cur, target) {
  const diff = Math.abs(cur - target);
  if (diff <= 2) return 'var(--fit-good)';
  if (diff <= 6) return 'var(--fit-mid)';
  return 'var(--fit-bad)';
}

}

function RippleButton({ className, onClick, children, disabled, style }) {
  const ref = useRef(null);
  function handle(e) {
    const btn = ref.current;
    if (btn) {
      const rect = btn.getBoundingClientRect();
      const el = document.createElement('span');
      const size = Math.max(rect.width, rect.height);
      el.className = 'ripple-el';
      el.style.width = el.style.height = size + 'px';
      el.style.left = (e.clientX - rect.left - size / 2) + 'px';
      el.style.top = (e.clientY - rect.top - size / 2) + 'px';
      btn.appendChild(el);
      setTimeout(() => el.remove(), 600);
    }
    onClick && onClick(e);
  }
  return <button ref={ref} className={className} style={style} onClick={handle} disabled={disabled}>{children}</button>;
}

              <div className="l"><Icon name="link-2" style={{ width: 16, height: 16 }} />카카오 연동 관리</div>
              <div className={`switch ${kakaoLinked ? 'on' : ''}`} onClick={() => { setKakaoLinked(!kakaoLinked); toast(kakaoLinked ? '카카오 연동을 해제했습니다' : '카카오 계정을 연동했습니다'); }}><div className="knob"></div></div>
            </div>
            <div className="s-row">
              <div className="l"><Icon name="file-text" style={{ width: 16, height: 16 }} />이용약관</div>
              <button className="link-btn" onClick={() => setDocModal('이용약관')}>보기</button>
            </div>
            <div className="s-row">
              <div className="l"><Icon name="shield" style={{ width: 16, height: 16 }} />개인정보 처리방침</div>
              <button className="link-btn" onClick={() => setDocModal('개인정보 처리방침')}>보기</button>
            </div>
            <div className="s-row">
              <div className="l"><Icon name="user-x" style={{ width: 16, height: 16, color: 'var(--fit-bad)' }} />회원 탈퇴</div>
              <button className="link-btn" style={{ color: 'var(--fit-bad)' }} onClick={() => setConfirmWithdraw(true)}>탈퇴하기</button>
            </div>
          </div>
        </div>
      </div>
      {docModal && <DocModal title={docModal} onClose={() => setDocModal(null)} />}
      {confirmWithdraw && <ConfirmModal title="회원 탈퇴" desc="탈퇴 시 옷장 데이터와 추천 이력이 모두 삭제되며 복구할 수 없습니다. 계속할까요?" confirmLabel="탈퇴 진행" onClose={() => setConfirmWithdraw(false)} onConfirm={() => { setConfirmWithdraw(false); toast('회원 탈퇴가 접수되었습니다'); }} />}
    </div>
  );
}

function EmbedScreen({ toast }) {
  const [expanded, setExpanded] = useState(false);
  const snippet = '<script src="https://cdn.fitmate.app/widget.js"\n  data-shop-id="demo-shop-001"\n  data-product-id="{{PRODUCT_ID}}"\n  async><' + '/script>';
  return (
    <div className="page-wrap">
      <div className="page-head">
        <div>
          <h1 className="page-title">쇼핑몰 임베드 위젯 설치</h1>
          <p className="page-sub">script tag 한 줄을 상품페이지에 삽입하면 위젯이 로드되고, 펼침·접힘 상태를 오가며 동작합니다.</p>
        </div>
      </div>
      <div className="embed-layout">
        <div>
          <div className="code-block">
            {snippet}
            <button className="copy-btn" onClick={() => toast('설치 코드를 클립보드에 복사했습니다')}><Icon name="copy" style={{ width: 13, height: 13 }} />복사</button>
          </div>
          <div className="install-steps">
            <div className="install-step"><div className="num">1</div><div className="t">위 스크립트 태그를 상품페이지 body 하단에 삽입합니다.</div></div>
            <div className="install-step"><div className="num">2</div><div className="t">data-product-id에 쇼핑몰의 상품 식별자를 연결합니다.</div></div>
            <div className="install-step"><div className="num">3</div><div className="t">우측 하단에 위젯 버튼이 노출되며, 클릭 시 펼침 상태로 전환됩니다.</div></div>
          </div>
        </div>
        <div className="mock-shop">
          <div className="mock-shop-thumb"><img src="https://picsum.photos/seed/fitmate-mockshop/500/640" alt="상품 미리보기" /></div>
          <div style={{ fontSize: 13, color: 'var(--text2)', fontWeight: 600 }}>스틸로프트</div>
          <div style={{ fontSize: 16, fontWeight: 700, marginBottom: 4 }}>옥스포드 카라 셔츠</div>
          <div className="mock-price">59,000원</div>
          {!expanded && (
            <button className="widget-fab" onClick={() => setExpanded(true)} aria-label="위젯 펼치기">
              <Icon name="sparkles" style={{ width: 22, height: 22 }} />
            </button>
          )}
          {expanded && (
            <div className="widget-panel">
              <div className="widget-panel-head">
                <span style={{ fontSize: 13.5, fontWeight: 700 }}>핏메이트 사이즈 도우미</span>
                <button className="icon-btn" style={{ width: 26, height: 26, color: '#fff' }} onClick={() => setExpanded(false)}><Icon name="chevron-down" style={{ width: 16, height: 16 }} /></button>
              </div>
              <div className="widget-panel-body">
                <p style={{ fontSize: 12.5, color: 'var(--text2)', marginBottom: 10 }}>이 상품에 맞는 사이즈를 확인해보세요.</p>
                <div style={{ display: 'flex', alignItems: 'center', gap: 10, background: 'var(--secondary)', borderRadius: 20, padding: 12, marginBottom: 10, boxShadow: '0 3px 6px rgba(23,25,28,0.05)' }}>
                  <div style={{ fontSize: 22, fontWeight: 400 }}>92</div>
                  <div style={{ fontSize: 12, color: 'var(--text2)' }}>핏 스코어<br /><strong style={{ color: 'var(--fit-good)' }}>적합 · L 추천</strong></div>
                </div>
                <button className="primary-btn" style={{ padding: 10, fontSize: 13 }} onClick={() => toast('상세 분석 화면으로 이동합니다')}>상세 분석 보기</button>
              </div>
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

function MypageScreen({ toast, onNav }) {
  return (
    <div className="page-wrap">
      <div className="page-head">
        <div>
          <h1 className="page-title">마이페이지</h1>
          <p className="page-sub">신체정보 요약과 옷장 현황을 확인하고 옷장·계정 관리로 빠르게 이동할 수 있습니다.</p>
        </div>
      </div>
      <div className="mypage-grid">
        <div className="profile-card">
          <div className="avatar-lg"><img src="https://source.boringavatars.com/marble/120/minsu-kim" alt="프로필" /></div>
          <div style={{ fontSize: 16, fontWeight: 700, marginBottom: 2 }}>김민수</div>
          <div style={{ fontSize: 12.5, color: 'var(--text2)', marginBottom: 16 }}>172cm · 64kg · 선호 핏: 보통</div>
          <button className="ghost-btn" onClick={() => toast('신체정보 편집 화면을 엽니다')}>신체정보 수정</button>
        </div>
        <div>
          <div className="stat-grid">
            <div className="stat-box"><div className="v">{CLOSET_SEED.length}</div><div className="l">옷장 아이템</div></div>
            <div className="stat-box"><div className="v">82</div><div className="l">평균 핏 스코어</div></div>
            <div className="stat-box"><div className="v">2</div><div className="l">연동 계정</div></div>
          </div>
          <div className="quick-link-row">
            <button className="quick-link" onClick={() => onNav('closet')}><span>옷장 데이터 관리</span><Icon name="chevron-right" style={{ width: 16, height: 16 }} /></button>
            <button className="quick-link" onClick={() => onNav('auth')}><span>계정 · 보안 설정</span><Icon name="chevron-right" style={{ width: 16, height: 16 }} /></button>
            <button className="quick-link" onClick={() => onNav('embed')}><span>쇼핑몰 임베드 설치 가이드</span><Icon name="chevron-right" style={{ width: 16, height: 16 }} /></button>
          </div>
        </div>
      </div>
    </div>
  );
}

function App() {
  const [screen, setScreen] = useState('main');
  const [member, setMember] = useState(true);
  const [quickItem, setQuickItem] = useState(null);
  const [bodyInfoOpen, setBodyInfoOpen] = useState(false);
  const [toasts, setToasts] = useState([]);

  function pushToast(msg) {
    const id = Math.random().toString(36).slice(2);
    setToasts(t => [...t, { id, msg }]);
  }
  function removeToast(id) { setToasts(t => t.filter(x => x.id !== id)); }
  function handleToggleMember(isMember) {
    setMember(isMember);
    pushToast(isMember ? '회원 모드로 전환되었습니다' : '비회원 모드로 전환되었습니다');
  }

  useEffect(() => { lucide.createIcons(); });

  const navItems = [
    { key: 'main', label: 'AI 사이즈 & 핏 스코어 추천', icon: 'shirt' },
    { key: 'closet', label: '옷장 데이터 관리', icon: 'archive' },
    { key: 'auth', label: '카카오 소셜 로그인 & 회원 인증', icon: 'log-in' },
    { key: 'embed', label: '쇼핑몰 임베드 위젯 설치', icon: 'code-2' },
  ];

  return (
    <div className="app-shell" style={{ width: '100%' }}>
      <header className="topbar">
        <div className="brand" onClick={() => setScreen('main')}>
          <div className="mark">f</div>
          <div className="name">핏메이트</div>
        </div>
        <nav className="nav-tabs">
          {navItems.map(n => (
            <button key={n.key} className={`nav-tab ${screen === n.key ? 'active' : ''}`} onClick={() => setScreen(n.key)}>
              <Icon name={n.icon} style={{ width: 15, height: 15 }} />{n.label}
            </button>
          ))}
        </nav>
        <div className="topbar-actions">
          <button className="icon-btn" onClick={() => pushToast('새 알림이 없습니다')} aria-label="알림"><Icon name="bell" /></button>
          <button className="nav-tab" onClick={() => setScreen('mypage')} style={{ background: screen === 'mypage' ? 'var(--primary)' : 'var(--surface)', color: screen === 'mypage' ? '#fff' : 'var(--text)' }}>마이페이지</button>
        </div>
      </header>

      {screen === 'main' && <MainScreen member={member} onOpenItem={setQuickItem} onOpenBodyInfo={() => setBodyInfoOpen(true)} toast={pushToast} onToggleMember={handleToggleMember} />}
      {screen === 'closet' && <ClosetScreen toast={pushToast} />}
      {screen === 'auth' && <AuthScreen toast={pushToast} />}
      {screen === 'embed' && <EmbedScreen toast={pushToast} />}
      {screen === 'mypage' && <MypageScreen toast={pushToast} onNav={setScreen} />}

      {quickItem && <QuickViewDrawer item={quickItem} member={member} onClose={() => setQuickItem(null)} onSave={(it, isMember) => { pushToast(isMember ? '옷장에 추천 결과를 저장했습니다' : '이번 세션에 임시로 저장했습니다'); setQuickItem(null); }} />}
      {bodyInfoOpen && <BodyInfoModal onClose={() => setBodyInfoOpen(false)} onSave={() => { setBodyInfoOpen(false); pushToast('신체정보를 저장하고 추천을 갱신했습니다'); }} />}

      {toasts.map(t => <Toast key={t.id} message={t.msg} onDone={() => removeToast(t.id)} />)}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
