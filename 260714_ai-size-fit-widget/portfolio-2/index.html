<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>핏메이트 브랜드 통합 운영 플랫폼</title>
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/regular/style.css">
<style>
  :root {
    --primary: #141414;
    --line-strong: #000000;
    --accent: #4cc02b;
    --accent-wash: #eaf7e3;
    --bg: #edede8;
    --surface: #ffffff;
    --stone: #dbdbd2;
    --pebble: #c0c0c0;
    --text: #292929;
    --text2: #6f6f6e;
    --text3: #8f8f8e;
    --line: #00000018;
    --status-active: #2f7a3f;
    --status-active-bg: #e7f3e7;
    --status-paused: #a06a1f;
    --status-paused-bg: #f7eddb;
    --status-pending: #6f6f6e;
    --status-pending-bg: #ececec;
    --radius: 12px;
    --radius-lg: 16px;
    --radius-pill: 200px;
  }
  * { box-sizing: border-box; }
  html, body { width: 100%; margin: 0; padding: 0; }
  body {
    font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, sans-serif;
    background: var(--bg);
    color: var(--text);
    -webkit-font-smoothing: antialiased;
  }
  #root { width: 100%; }
  button { font-family: inherit; cursor: pointer; border: none; background: none; color: inherit; }
  input, select, textarea { font-family: inherit; }
  a { text-decoration: none; color: inherit; }
  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-thumb { background: var(--stone); border-radius: 8px; }

  @keyframes fadeInUp { from { opacity: 0; transform: translateY(14px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes drawerSlideIn { from { transform: translateX(24px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
  @keyframes overlayIn { from { opacity: 0; } to { opacity: 1; } }
  @keyframes modalScaleIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
  @keyframes barGrow { from { transform: scaleY(0); } to { transform: scaleY(1); } }
  @keyframes toastIn { from { opacity: 0; transform: translateY(10px) translateX(-50%); } to { opacity: 1; transform: translateY(0) translateX(-50%); } }
  @keyframes pulseDot { 0%, 100% { box-shadow: 0 0 0 0 rgba(76,192,43,0.4); } 50% { box-shadow: 0 0 0 6px rgba(76,192,43,0); } }
  @keyframes shimmerSweep { 0% { background-position: -300px 0; } 100% { background-position: 300px 0; } }

  .app-shell { width: 100%; min-height: 100vh; display: flex; }

  /* ── Sidebar ── */
  .sidebar {
    position: fixed; left: 0; top: 0; bottom: 0; width: 252px; background: var(--primary); color: #fff;
    display: flex; flex-direction: column; z-index: 50; padding: 20px 14px;
  }
  .sb-brand { display: flex; align-items: center; gap: 10px; padding: 6px 10px 22px; }
  .sb-brand .mark { width: 30px; height: 30px; border-radius: 9px; background: var(--accent); color: #141414; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 13px; }
  .sb-brand .name { font-size: 15.5px; font-weight: 600; letter-spacing: -0.01em; }
  .sb-nav { display: flex; flex-direction: column; gap: 2px; flex: 1; }
  .sb-item {
    display: flex; align-items: center; gap: 11px; padding: 11px 12px; border-radius: 10px; color: #b8b8b6; font-size: 13.5px; font-weight: 600; text-align: left; width: 100%;
    transition: background 0.15s, color 0.15s;
  }
  .sb-item i { font-size: 17px; }
  .sb-item:hover { background: #232323; color: #fff; }
  .sb-item.active { background: var(--accent); color: #10230a; }
  .sb-foot { border-top: 1px solid #2b2b2b; padding-top: 14px; display: flex; align-items: center; gap: 10px; }
  .sb-foot .avatar { width: 32px; height: 32px; border-radius: 50%; overflow: hidden; flex-shrink: 0; background: #2b2b2b; }
  .sb-foot .avatar img { width: 100%; height: 100%; object-fit: cover; }
  .sb-foot .who { font-size: 12.5px; font-weight: 600; line-height: 1.4; }
  .sb-foot .who span { display: block; color: #8a8a88; font-weight: 500; font-size: 11.5px; }

  .main-wrap { margin-left: 252px; flex: 1; min-width: 0; width: calc(100% - 252px); min-height: 100vh; display: flex; flex-direction: column; }
  .topbar {
    width: 100%; height: 64px; display: flex; align-items: center; justify-content: space-between; padding: 0 28px;
    background: rgba(237,237,232,0.9); backdrop-filter: blur(6px); border-bottom: 1px solid var(--line); position: sticky; top: 0; z-index: 30;
  }
  .topbar-title { font-size: 15px; font-weight: 700; }
  .topbar-actions { display: flex; align-items: center; gap: 10px; }
  .icon-btn { width: 36px; height: 36px; border-radius: 10px; display: flex; align-items: center; justify-content: center; color: var(--text2); background: var(--surface); border: 1px solid var(--line); position: relative; }
  .icon-btn:hover { background: var(--stone); }
  .icon-btn i { font-size: 16px; }
  .badge-dot { position: absolute; top: 5px; right: 6px; width: 7px; height: 7px; border-radius: 50%; background: var(--accent); animation: pulseDot 2s infinite; }

  .page-wrap { width: 100%; max-width: 1440px; margin: 0 auto; padding: 28px; flex: 1; min-width: 0; }
  .hero-band {
    width: 100%; display: flex; align-items: center; justify-content: space-between; gap: 24px;
    background: linear-gradient(120deg, #ffffff 0%, var(--stone) 130%);
    border: 1px solid var(--line); border-radius: var(--radius-lg); padding: 24px 30px; margin-bottom: 20px;
  }
  .brand-mesh-art { width: 130px; height: 118px; flex-shrink: 0; }
  .hero-band-dark { background: linear-gradient(120deg, var(--primary) 0%, #2b2b2b 130%); border-color: #000; }
  .pill-accent { padding: 0 18px; height: 38px; border-radius: var(--radius-pill); background: var(--accent); color: #10230a; font-size: 13px; font-weight: 700; display: inline-flex; align-items: center; gap: 7px; }
  .hero-stat-row { display: grid; grid-template-columns: 1.4fr 1fr; gap: 16px; }
  .hero-stat-main { background: var(--primary); color: #fff; border-radius: var(--radius-lg); padding: 20px 22px; display: flex; flex-direction: column; justify-content: space-between; animation: fadeInUp 0.4s ease both; }
  .hs-label { font-size: 12px; font-weight: 700; color: #b8b8b6; margin-bottom: 6px; }
  .hs-value { font-size: 34px; font-weight: 400; letter-spacing: -0.02em; color: var(--accent); margin-bottom: 14px; }
  .hs-spark { display: flex; align-items: flex-end; gap: 4px; height: 34px; }
  .hs-spark-bar { width: 6px; background: var(--accent); border-radius: 2px 2px 0 0; opacity: 0.85; transform-origin: bottom; animation: barGrow 0.6s cubic-bezier(0.16,1,0.3,1) both; }
  .hero-stat-side { display: flex; flex-direction: column; gap: 16px; }
  .hero-stat-side .kpi-card { flex: 1; display: flex; flex-direction: column; justify-content: center; }
  .page-head { margin-bottom: 20px; }
  .page-title { font-size: 45px; font-weight: 400; letter-spacing: -0.02em; margin: 0 0 6px; line-height: 1.15; }
  .page-sub { font-size: 14px; color: var(--text2); margin: 0; max-width: 600px; line-height: 1.55; }

  /* ── Pills / buttons (Gleap capsule vocabulary) ── */
  .pill-dark { padding: 0 20px; height: 42px; border-radius: var(--radius-pill); background: var(--primary); color: #fff; font-size: 14px; font-weight: 500; display: inline-flex; align-items: center; gap: 8px; position: relative; overflow: hidden; }
  .pill-stone { padding: 0 20px; height: 42px; border-radius: var(--radius-pill); background: var(--stone); color: var(--text); font-size: 14px; font-weight: 500; display: inline-flex; align-items: center; gap: 8px; }
  .pill-ghost { padding: 9px 16px; border-radius: var(--radius-pill); border: 1px solid #353535; color: #353535; font-size: 13px; font-weight: 500; display: inline-flex; align-items: center; gap: 6px; }
  .pill-danger { padding: 0 20px; height: 42px; border-radius: var(--radius-pill); background: #f7e3df; color: #a3452f; font-size: 14px; font-weight: 600; display: inline-flex; align-items: center; gap: 8px; }
  .ripple-el { position: absolute; border-radius: 50%; background: rgba(255,255,255,0.4); animation: ripple 0.55s ease-out forwards; pointer-events: none; }
  @keyframes ripple { from { transform: scale(0); opacity: 0.5; } to { transform: scale(2.4); opacity: 0; } }

  /* ── master-detail (dashboard) ── */
  .md-layout { display: grid; grid-template-columns: 320px 1fr; gap: 20px; align-items: start; }
  .list-rail { background: var(--surface); border: 1px solid var(--line); border-radius: var(--radius-lg); overflow: hidden; }
  .lr-search { padding: 14px; border-bottom: 1px solid var(--line); }
  .lr-search input { width: 100%; padding: 10px 14px; border-radius: var(--radius-pill); border: 1px solid var(--line); font-size: 13px; background: var(--bg); }
  .lr-row { display: flex; align-items: center; gap: 10px; padding: 13px 14px; width: 100%; text-align: left; border-bottom: 1px solid var(--line); }
  .lr-row:last-child { border-bottom: none; }
  .lr-row:hover { background: var(--bg); }
  .lr-row.active { background: var(--accent-wash); }
  .lr-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .lr-info { flex: 1; min-width: 0; }
  .lr-info .n { font-size: 13.5px; font-weight: 700; }
  .lr-info .d { font-size: 11.5px; color: var(--text2); }
  .lr-req { font-size: 12px; font-weight: 700; color: var(--text2); }

  .detail-panel { display: flex; flex-direction: column; gap: 16px; }
  .dp-header { background: var(--surface); border: 1px solid var(--line); border-radius: var(--radius-lg); padding: 20px 24px; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 14px; }
  .dp-title-row { display: flex; align-items: center; gap: 12px; }
  .dp-title-row h2 { font-size: 20px; font-weight: 700; margin: 0; }
  .status-pill { padding: 4px 11px; border-radius: var(--radius-pill); font-size: 11.5px; font-weight: 700; }
  .status-pill.active { background: var(--status-active-bg); color: var(--status-active); }
  .status-pill.paused { background: var(--status-paused-bg); color: var(--status-paused); }
  .status-pill.pending { background: linear-gradient(90deg, var(--status-pending-bg) 25%, #f5f5f3 37%, var(--status-pending-bg) 63%); background-size: 300px 100%; color: var(--status-pending); animation: shimmerSweep 1.6s ease-in-out infinite; }
  .dp-actions { display: flex; gap: 8px; }

  .kpi-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }
  .kpi-card { background: var(--surface); border: 1px solid var(--line); border-radius: var(--radius-lg); padding: 18px; animation: fadeInUp 0.4s ease both; }
  .kpi-card .v { font-size: 27px; font-weight: 400; letter-spacing: -0.01em; }
  .kpi-card .l { font-size: 12px; color: var(--text2); margin-top: 4px; font-weight: 600; }

  .chart-card { background: var(--surface); border: 1px solid var(--line); border-radius: var(--radius-lg); padding: 22px; }
  .chart-card-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
  .chart-card-head h3 { font-size: 14.5px; font-weight: 700; margin: 0; }
  .period-toggle { display: flex; background: var(--bg); border-radius: var(--radius-pill); padding: 3px; }
  .period-toggle button { padding: 6px 13px; border-radius: var(--radius-pill); font-size: 12px; font-weight: 700; color: var(--text2); }
  .period-toggle button.on { background: var(--primary); color: #fff; }
  .bar-chart { display: flex; align-items: flex-end; gap: 10px; height: 160px; }
  .bar-col { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 8px; height: 100%; justify-content: flex-end; }
  .bar-col .bar { width: 100%; border-radius: 6px 6px 0 0; background: var(--accent); transform-origin: bottom; animation: barGrow 0.6s cubic-bezier(0.16,1,0.3,1) both; }
  .bar-col .lbl { font-size: 11px; color: var(--text2); font-weight: 600; }

  .whitelist-row { display: flex; align-items: center; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid var(--line); font-size: 13px; }
  .whitelist-row:last-child { border-bottom: none; }
  .mono { font-family: 'SF Mono', Menlo, monospace; font-size: 12.5px; }

  /* ── table (brands / operators) ── */
  .table-card { background: var(--surface); border: 1px solid var(--line); border-radius: var(--radius-lg); overflow: hidden; }
  .t-row { display: grid; grid-template-columns: 2fr 1.4fr 1fr 1fr 1.2fr; gap: 12px; align-items: center; padding: 14px 22px; border-bottom: 1px solid var(--line); }
  .t-row.head { background: var(--bg); font-size: 11.5px; font-weight: 700; color: var(--text2); text-transform: uppercase; letter-spacing: 0.03em; }
  .t-row:last-child { border-bottom: none; }
  .t-row:not(.head):hover { background: var(--bg); }
  .t-cell-name { font-size: 13.5px; font-weight: 700; }
  .t-cell-sub { font-size: 11.5px; color: var(--text2); }
  .t-actions { display: flex; gap: 6px; justify-content: flex-end; }
  .t-actions button { width: 32px; height: 32px; border-radius: 9px; display: flex; align-items: center; justify-content: center; background: var(--bg); color: var(--text2); }
  .t-actions button:hover { background: var(--stone); }

  /* ── rules screen ── */
  .rules-layout { display: grid; grid-template-columns: 300px 1fr; gap: 20px; }
  .rule-slider-row { margin-bottom: 20px; }
  .rule-slider-row .rl { display: flex; justify-content: space-between; font-size: 13px; font-weight: 700; margin-bottom: 8px; }
  .rule-slider-row input[type=range] { width: 100%; accent-color: var(--accent); }
  .version-row { display: flex; align-items: center; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid var(--line); font-size: 12.5px; }
  .version-row:last-child { border-bottom: none; }
  .version-row .vt { color: var(--text2); }
  .sim-result { background: var(--accent-wash); border-radius: var(--radius); padding: 16px; margin-top: 14px; display: flex; align-items: center; gap: 14px; }
  .sim-result .v { font-size: 26px; font-weight: 400; color: #245417; }

  /* ── modal ── */
  .modal-overlay { position: fixed; inset: 0; background: rgba(20,20,20,0.4); z-index: 100; display: flex; align-items: center; justify-content: center; padding: 20px; animation: overlayIn 0.2s ease both; }
  .modal { background: var(--surface); border-radius: var(--radius-lg); width: 460px; max-width: 100%; max-height: 88vh; overflow-y: auto; animation: modalScaleIn 0.22s cubic-bezier(0.16,1,0.3,1) both; }
  .modal-head { display: flex; align-items: center; justify-content: space-between; padding: 18px 22px; border-bottom: 1px solid var(--line); }
  .modal-head h3 { margin: 0; font-size: 15.5px; font-weight: 700; }
  .modal-body { padding: 20px 22px; }
  .field-label { font-size: 12px; font-weight: 700; color: var(--text2); margin-bottom: 6px; display: block; }
  .field-input { width: 100%; padding: 11px 14px; border: 1px solid var(--line); border-radius: var(--radius); font-size: 13.5px; margin-bottom: 14px; background: var(--bg); }
  .field-input:focus { outline: none; border-color: var(--primary); }
  .chk-row { display: flex; align-items: center; gap: 10px; padding: 9px 0; font-size: 13.5px; }
  .chk-box { width: 18px; height: 18px; border-radius: 5px; border: 1.5px solid var(--line); display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .chk-box.on { background: var(--accent); border-color: var(--accent); color: #10230a; }

  /* ── toast ── */
  .toast { position: fixed; bottom: 26px; left: 50%; background: var(--primary); color: #fff; padding: 12px 20px; border-radius: var(--radius-pill); font-size: 13px; font-weight: 600; z-index: 200; display: flex; align-items: center; gap: 8px; animation: toastIn 0.3s cubic-bezier(0.16,1,0.3,1) both; box-shadow: 0 12px 30px rgba(0,0,0,0.25); }

  /* ── reports donut ── */
  .donut-wrap { display: flex; align-items: center; gap: 24px; }
  .donut-legend { flex: 1; display: flex; flex-direction: column; gap: 10px; }
  .legend-row { display: flex; align-items: center; gap: 9px; font-size: 12.5px; }
  .legend-dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }

  @media (max-width: 1100px) {
    .md-layout, .rules-layout { grid-template-columns: 1fr; }
    .kpi-row { grid-template-columns: 1fr; }
    .t-row { grid-template-columns: 2fr 1fr 1fr; }
  }
  @media (max-width: 860px) {
    .sidebar { width: 76px; padding: 20px 10px; }
    .sb-brand .name, .sb-item span, .sb-foot .who { display: none; }
    .main-wrap { margin-left: 76px; width: calc(100% - 76px); }
    .hero-band { flex-wrap: wrap; }
    .brand-mesh-art { display: none; }
    .t-row { grid-template-columns: 1fr; gap: 4px; }
    .hero-stat-row { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef } = React;

const BRANDS = [
  { id: 1, name: '로프트나인', domain: 'loft9.co.kr', status: 'active', requests: 2140, convIdx: 6.4, scriptKey: 'fm_live_9f21ac',
    whitelist: ['loft9.co.kr', 'www.loft9.co.kr'], weekly: [40, 55, 48, 62, 70, 58, 66] },
  { id: 2, name: '브리즈웨어', domain: 'breezewear.kr', status: 'active', requests: 1560, convIdx: 5.1, scriptKey: 'fm_live_2b77e0',
    whitelist: ['breezewear.kr'], weekly: [30, 34, 28, 40, 38, 44, 36] },
  { id: 3, name: '소보 아뜰리에', domain: 'sobo-atelier.com', status: 'paused', requests: 480, convIdx: 3.2, scriptKey: 'fm_live_77ac10',
    whitelist: ['sobo-atelier.com'], weekly: [12, 10, 14, 9, 11, 8, 10] },
  { id: 4, name: '아크노트', domain: 'arknote.store', status: 'active', requests: 3320, convIdx: 7.8, scriptKey: 'fm_live_e410cb',
    whitelist: ['arknote.store', 'shop.arknote.store'], weekly: [58, 64, 70, 66, 80, 74, 82] },
  { id: 5, name: '노르덴', domain: 'norden.kr', status: 'pending', requests: 0, convIdx: 0, scriptKey: '—', whitelist: [], weekly: [0, 0, 0, 0, 0, 0, 0] },
];

const OPERATORS = [
  { id: 1, name: '김도윤', email: 'dy.kim@fitmate-ops.internal', scope: ['로프트나인', '아크노트'], role: '브랜드 운영자', status: 'active' },
  { id: 2, name: '이서현', email: 'sh.lee@fitmate-ops.internal', scope: ['브리즈웨어'], role: '브랜드 운영자', status: 'active' },
  { id: 3, name: '박지훈', email: 'jh.park@fitmate-ops.internal', scope: ['전체 브랜드'], role: '최고 관리자', status: 'active' },
  { id: 4, name: '최유나', email: 'yn.choi@fitmate-ops.internal', scope: ['소보 아뜰리에'], role: '브랜드 운영자', status: 'suspended' },
];

const AUDIT_LOG = [
  { t: '10:24', who: '박지훈', what: '아크노트 스크립트 키 재발급' },
  { t: '09:58', who: '김도윤', what: '로프트나인 가중치 파라미터 저장' },
  { t: '09:10', who: '이서현', what: '브리즈웨어 도메인 화이트리스트 추가' },
];

function statusTone(s) {
  if (s === 'active') return { cls: 'active', label: '연동 활성' };
  if (s === 'paused') return { cls: 'paused', label: '일시중지' };
  return { cls: 'pending', label: '연동 대기' };
}

function DonutArt({ segments }) {
  const total = segments.reduce((a, s) => a + s.v, 0);
  let acc = 0;
  const R = 60, C = 2 * Math.PI * R;
  return (
    <svg width="150" height="150" viewBox="0 0 150 150">
      <circle cx="75" cy="75" r={R} fill="none" stroke="#edede8" strokeWidth="18" />
      {segments.map((s, i) => {
        const frac = s.v / total;
        const dash = frac * C;
        const offset = C - (acc / total) * C;
        acc += s.v;
        return (
          <circle key={i} cx="75" cy="75" r={R} fill="none" stroke={s.color} strokeWidth="18"
            strokeDasharray={`${dash} ${C - dash}`} strokeDashoffset={offset}
            transform="rotate(-90 75 75)" strokeLinecap="butt" />
        );
      })}
      <circle cx="75" cy="75" r="40" fill="#ffffff" />
      <text x="75" y="71" textAnchor="middle" fontSize="20" fontWeight="400" fill="#292929">{total}</text>
      <text x="75" y="88" textAnchor="middle" fontSize="10" fill="#6f6f6e">전체 요청</text>
    </svg>
  );
}

function Toast({ message, onDone }) {
  useEffect(() => { const t = setTimeout(onDone, 2400); return () => clearTimeout(t); }, []);
  return <div className="toast"><i className="ph ph-check-circle" style={{ fontSize: 15 }}></i>{message}</div>;
}

function RippleButton({ className, onClick, children, style }) {
  const ref = useRef(null);
  function handle(e) {
    const btn = ref.current;
    if (btn) {
      const rect = btn.getBoundingClientRect();
      const el = document.createElement('span');
      const size = Math.max(rect.width, rect.height);
      el.className = 'ripple-el';
      el.style.width = el.style.height = size + 'px';
      el.style.left = (e.clientX - rect.left - size / 2) + 'px';
      el.style.top = (e.clientY - rect.top - size / 2) + 'px';
      btn.appendChild(el);
      setTimeout(() => el.remove(), 600);
    }
    onClick && onClick(e);
  }
  return <button ref={ref} className={className} style={style} onClick={handle}>{children}</button>;
}

            <div className="t-actions">
              <button onClick={() => setEditing(o)} title="권한 편집"><i className="ph ph-pencil-simple"></i></button>
              <button onClick={() => setSuspendTarget(o)} title="상태 전환"><i className="ph ph-user-switch"></i></button>
            </div>
          </div>
        ))}
      </div>
      <div className="chart-card">
        <div className="chart-card-head"><h3>감사 로그</h3></div>
        {AUDIT_LOG.map((a, i) => (
          <div className="whitelist-row" key={i}><span>{a.t} · {a.who}</span><span style={{ color: 'var(--text2)' }}>{a.what}</span></div>
        ))}
      </div>
      {editing && <OperatorModal operator={editing} onClose={() => setEditing(null)} onSave={saveScope} />}
      {suspendTarget && <ConfirmModal title="계정 상태 전환" desc={`${suspendTarget.name} 운영자 계정의 접근 권한을 전환합니다.`} confirmLabel="전환" onClose={() => setSuspendTarget(null)} onConfirm={doSuspend} />}
    </div>
  );
}

function ReportsScreen() {
  const segments = [
    { label: '아크노트', v: 3320, color: '#4cc02b' },
    { label: '로프트나인', v: 2140, color: '#141414' },
    { label: '브리즈웨어', v: 1560, color: '#8f8f8e' },
    { label: '소보 아뜰리에', v: 480, color: '#dbdbd2' },
  ];
  return (
    <div className="page-wrap">
      <div className="page-head">
        <h1 className="page-title">통계 리포트</h1>
        <p className="page-sub">브랜드별 추천 요청 비중과 구매 전환 지표를 사전 집계된 Materialized View 기준으로 확인합니다.</p>
      </div>
      <div className="chart-card">
        <div className="chart-card-head"><h3>브랜드별 추천 요청 비중</h3></div>
        <div className="donut-wrap">
          <DonutArt segments={segments} />
          <div className="donut-legend">
            {segments.map(s => (
              <div className="legend-row" key={s.label}><div className="legend-dot" style={{ background: s.color }}></div>{s.label} · {s.v.toLocaleString()}건</div>
            ))}
          </div>
        </div>
      </div>
    </div>
  );
}

function App() {
  const [screen, setScreen] = useState('main');
  const [toasts, setToasts] = useState([]);
  function pushToast(msg) {
    const id = Math.random().toString(36).slice(2);
    setToasts(t => [...t, { id, msg }]);
  }
  function removeToast(id) { setToasts(t => t.filter(x => x.id !== id)); }

  const titleMap = {
    main: '브랜드 통합 운영 대시보드', brands: '브랜드 · 스크립트 관리', rules: '핏 스코어 룰 관리',
    'admin-auth': '운영자 권한 관리', reports: '통계 리포트',
  };

  return (
    <div className="app-shell">
      <Sidebar screen={screen} onNav={setScreen} />
      <div className="main-wrap">
        <header className="topbar">
          <div className="topbar-title">{titleMap[screen]}</div>
          <div className="topbar-actions">
            <button className="icon-btn" onClick={() => pushToast('새 알림이 없습니다')}><i className="ph ph-bell"></i><span className="badge-dot"></span></button>
            <button className="icon-btn" onClick={() => pushToast('검색창을 엽니다')}><i className="ph ph-magnifying-glass"></i></button>
          </div>
        </header>
        {screen === 'main' && <DashboardScreen toast={pushToast} />}
        {screen === 'brands' && <BrandsScreen toast={pushToast} />}
        {screen === 'rules' && <RulesScreen toast={pushToast} />}
        {screen === 'admin-auth' && <AdminAuthScreen toast={pushToast} />}
        {screen === 'reports' && <ReportsScreen />}
      </div>
      {toasts.map(t => <Toast key={t.id} message={t.msg} onDone={() => removeToast(t.id)} />)}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
