<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>세일즈허브 — 영업인 커뮤니티</title>
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>

<style>
  :root {
    --petal: #ffd7f0;
    --mint: #b7efb2;
    --canary: #ffef99;
    --violet: #e2ddfd;
    --charcoal: #272625;
    --phoenix: #e8400d;
    --canvas: #ffffff;
    --cream: #f6f5f3;
    --ink: #111111;
    --ash: #6d6c6b;
    --stone: #b1b1af;
    --pearl: #ecebea;
  }
  * { box-sizing: border-box; }
  html, body { width: 100%; margin: 0; padding: 0; }
  body {
    font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, sans-serif;
    background: var(--canvas);
    color: var(--ink);
    -webkit-font-smoothing: antialiased;
    width: 100%;
  }
  #root { width: 100%; }
  button { font-family: inherit; cursor: pointer; }
  input, select, textarea { font-family: inherit; }
  a { text-decoration: none; color: inherit; }

  @keyframes fadeInUp { from { opacity: 0; transform: translateY(14px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes heartPop { 0% { transform: scale(1); } 40% { transform: scale(1.35); } 100% { transform: scale(1); } }
  @keyframes shimmer { 0% { background-position: -200px 0; } 100% { background-position: 200px 0; } }
  @keyframes modalFade { from { opacity: 0; transform: scale(0.96); } to { opacity: 1; transform: scale(1); } }
  @keyframes toastSlide { from { opacity: 0; transform: translateX(28px); } to { opacity: 1; transform: translateX(0); } }
  @keyframes pulseDot { 0%, 100% { box-shadow: 0 0 0 0 rgba(232,64,13,0.4); } 50% { box-shadow: 0 0 0 6px rgba(232,64,13,0); } }
  @keyframes viewFade { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }

  .skeleton-line { background: linear-gradient(90deg, var(--pearl) 25%, #f8f8f7 37%, var(--pearl) 63%); background-size: 400px 100%; animation: shimmer 1.4s infinite linear; border-radius: 6px; }

  .topbar { position: sticky; top: 0; z-index: 40; background: rgba(255,255,255,0.86); backdrop-filter: blur(20px); border-bottom: 1px solid rgba(17,17,17,0.08); }
  .topbar-inner { max-width: 1200px; margin: 0 auto; display: flex; align-items: center; height: 62px; padding: 0 24px; gap: 24px; }
  .brand { display: flex; align-items: center; gap: 8px; font-size: 20px; font-weight: 700; letter-spacing: -0.5px; color: var(--ink); flex-shrink: 0; }
  .brand-badge { width: 30px; height: 30px; border-radius: 8px; background: var(--phoenix); display: flex; align-items: center; justify-content: center; color: #fff; }
  .global-nav { display: flex; align-items: center; gap: 4px; flex: 1; overflow-x: auto; }
  .nav-link { border: none; background: transparent; padding: 8px 12px; border-radius: 8px; font-size: 14px; color: var(--ash); font-weight: 500; display: flex; align-items: center; gap: 6px; white-space: nowrap; transition: background 0.15s, color 0.15s; }
  .nav-link:hover { background: var(--pearl); color: var(--ink); }
  .nav-link.active { background: var(--ink); color: #fff; }
  .header-actions { display: flex; align-items: center; gap: 8px; flex-shrink: 0; position: relative; }
  .icon-btn { border: none; background: var(--pearl); width: 36px; height: 36px; border-radius: 999px; display: flex; align-items: center; justify-content: center; color: var(--ink); position: relative; }
  .icon-btn:hover { background: var(--petal); }
  .avatar-btn { border: none; padding: 0; background: none; border-radius: 999px; overflow: hidden; width: 36px; height: 36px; border: 1px solid rgba(17,17,17,0.08); }
  .avatar-btn img { width: 100%; height: 100%; display: block; }
  .dropdown { position: absolute; top: 44px; right: 0; background: #fff; border-radius: 12px; box-shadow: 0 26px 60px -6px rgba(17,17,17,0.12), 0 6px 6px -3px rgba(17,17,17,0.04); min-width: 220px; padding: 8px; animation: modalFade 0.15s ease; z-index: 50; }
  .dropdown-item { display: flex; align-items: center; gap: 10px; width: 100%; text-align: left; border: none; background: none; padding: 10px 12px; border-radius: 8px; font-size: 14px; color: var(--ink); }
  .dropdown-item:hover { background: var(--cream); }
  .notif-badge { position: absolute; top: -2px; right: -2px; width: 9px; height: 9px; border-radius: 999px; background: var(--phoenix); border: 2px solid #fff; }
  .search-overlay { position: absolute; top: 0; left: 0; right: 0; height: 62px; background: #fff; display: flex; align-items: center; padding: 0 24px; gap: 12px; z-index: 5; }
  .search-overlay input { flex: 1; border: none; background: var(--cream); border-radius: 999px; padding: 10px 18px; font-size: 15px; outline: none; }

  .layout-wrap { max-width: 1200px; margin: 0 auto; display: flex; justify-content: center; gap: 28px; padding: 24px; align-items: flex-start; width: 100%; }
  .feed-main { max-width: 620px; width: 100%; flex: 1; min-width: 0; }
  .right-rail { width: 300px; flex-shrink: 0; position: sticky; top: 90px; display: flex; flex-direction: column; gap: 16px; }

  .composer { position: sticky; top: 62px; z-index: 20; background: rgba(255,255,255,0.95); backdrop-filter: blur(12px); padding: 14px 0 12px; border-bottom: 1px solid rgba(17,17,17,0.06); margin-bottom: 12px; }
  .board-chips { display: flex; gap: 8px; overflow-x: auto; }
  .board-chip { border: 1px solid rgba(17,17,17,0.1); background: #fff; padding: 7px 14px; border-radius: 999px; font-size: 13px; font-weight: 500; color: var(--ash); white-space: nowrap; }
  .board-chip.active { background: var(--ink); color: #fff; border-color: var(--ink); }
  .write-btn { margin-left: auto; border: none; background: var(--phoenix); color: #fff; padding: 8px 16px; border-radius: 8px; font-size: 13px; font-weight: 600; display: flex; align-items: center; gap: 6px; flex-shrink: 0; }
  .write-btn:disabled { background: var(--stone); cursor: not-allowed; }
  .composer-row { display: flex; gap: 8px; align-items: center; }

  .post { background: #fff; border-radius: 12px; border: 1px solid rgba(17,17,17,0.07); padding: 16px 20px; margin-bottom: 12px; animation: fadeInUp 0.4s ease both; }
  .post-head { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
  .post-head img { width: 36px; height: 36px; border-radius: 999px; }
  .author { font-size: 14px; font-weight: 600; color: var(--ink); }
  .board-tag { font-size: 11px; font-weight: 600; padding: 3px 9px; border-radius: 999px; }
  .board-tag.free { background: var(--violet); }
  .board-tag.cert { background: var(--mint); }
  .board-tag.tip { background: var(--petal); }
  .post-body { font-size: 15px; line-height: 1.55; color: var(--ink); cursor: pointer; }
  .post-body img { width: 100%; border-radius: 10px; margin-top: 10px; display: block; }
  .post-actions { display: flex; gap: 4px; margin-top: 12px; }
  .action-btn { border: none; background: none; display: flex; align-items: center; gap: 6px; font-size: 13px; color: var(--ash); padding: 6px 10px; border-radius: 8px; }
  .action-btn:hover { background: var(--cream); }
  .action-btn.liked { color: var(--phoenix); }
  .action-btn .heart-pop { animation: heartPop 0.35s ease; }
  .action-btn.scrapped { color: #b28a00; }

  .rail-card { background: var(--cream); border-radius: 12px; padding: 16px; }
  .rail-title { font-size: 13px; font-weight: 700; color: var(--ink); margin: 0 0 12px; display: flex; align-items: center; gap: 6px; }
  .rail-item { display: flex; align-items: center; gap: 10px; width: 100%; border: none; background: none; text-align: left; padding: 7px 0; font-size: 13px; color: var(--ink); border-bottom: 1px solid rgba(17,17,17,0.06); }
  .rail-item:last-child { border-bottom: none; }
  .rail-rank { font-size: 12px; font-weight: 700; color: var(--phoenix); width: 16px; flex-shrink: 0; }
  .rail-item span.txt { flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .rail-item .cnt { font-size: 11px; color: var(--stone); flex-shrink: 0; }
  .company-chip { display: inline-flex; align-items: center; gap: 6px; border: 1px solid rgba(17,17,17,0.1); background: #fff; padding: 6px 10px; border-radius: 999px; font-size: 12px; margin: 3px 4px 3px 0; }
  .pinned-card { background: var(--petal); border-radius: 12px; padding: 16px; }
  .pinned-card h4 { margin: 0 0 6px; font-size: 14px; }
  .pinned-card p { margin: 0; font-size: 12px; color: var(--charcoal); line-height: 1.5; }

  .sentinel { text-align: center; padding: 20px 0; }
  .skeleton-post { background: #fff; border-radius: 12px; border: 1px solid rgba(17,17,17,0.07); padding: 16px 20px; margin-bottom: 12px; }
  .skeleton-post .skeleton-line { height: 12px; margin-bottom: 8px; }

  .modal-overlay { position: fixed; inset: 0; background: rgba(17,17,17,0.4); display: flex; align-items: center; justify-content: center; z-index: 100; padding: 20px; }
  .modal-box { background: #fff; border-radius: 16px; width: 100%; max-width: 520px; max-height: 86vh; overflow-y: auto; padding: 24px; animation: modalFade 0.2s ease; }
  .modal-box.wide { max-width: 640px; }
  .modal-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
  .modal-head h3 { margin: 0; font-size: 20px; font-weight: 700; letter-spacing: -0.4px; }
  .close-btn { border: none; background: var(--pearl); width: 30px; height: 30px; border-radius: 999px; display: flex; align-items: center; justify-content: center; }
  .field-label { font-size: 13px; font-weight: 600; color: var(--ash); margin: 14px 0 6px; }
  .modal-box select, .modal-box textarea, .modal-box input[type=text] { width: 100%; border: 1px solid rgba(17,17,17,0.12); border-radius: 12px; padding: 10px 14px; font-size: 14px; outline: none; }
  .modal-box textarea { min-height: 100px; resize: vertical; }
  .dropzone { border: 1.5px dashed rgba(17,17,17,0.18); border-radius: 12px; padding: 20px; text-align: center; color: var(--ash); font-size: 13px; cursor: pointer; }
  .primary-btn { border: none; background: var(--ink); color: #fff; padding: 11px 18px; border-radius: 8px; font-size: 14px; font-weight: 600; width: 100%; margin-top: 16px; display: flex; align-items: center; justify-content: center; gap: 8px; }
  .primary-btn:disabled { background: var(--stone); cursor: not-allowed; }
  .ghost-btn { border: 1px solid rgba(17,17,17,0.15); background: none; color: var(--ink); padding: 9px 14px; border-radius: 8px; font-size: 13px; font-weight: 600; }
  .comment-item { display: flex; gap: 8px; padding: 8px 0; border-bottom: 1px solid rgba(17,17,17,0.06); font-size: 13px; }
  .comment-item b { font-size: 13px; }

  .toast-wrap { position: fixed; bottom: 24px; right: 24px; z-index: 200; display: flex; flex-direction: column; gap: 8px; }
  .toast { background: var(--ink); color: #fff; padding: 12px 18px; border-radius: 10px; font-size: 13px; display: flex; align-items: center; gap: 8px; animation: toastSlide 0.25s ease; box-shadow: 0 10px 30px rgba(0,0,0,0.2); }

  .view-fade { animation: viewFade 0.28s ease both; }
  .page-wrap { max-width: 1000px; margin: 0 auto; padding: 32px 24px; }
  .page-head { margin-bottom: 24px; }
  .page-head h2 { font-size: 48px; font-weight: 400; letter-spacing: -2.2px; line-height: 1.05; margin: 0 0 8px; }
  .page-head p { color: var(--ash); font-size: 15px; margin: 0; }
  .intro-band { background: var(--violet); border-radius: 16px; padding: 24px; margin-bottom: 24px; display: flex; align-items: center; justify-content: space-between; gap: 16px; flex-wrap: wrap; }
  .intro-band h3 { margin: 0 0 4px; font-size: 18px; }
  .intro-band p { margin: 0; font-size: 13px; color: var(--charcoal); }

  .qa-card { background: #fff; border: 1px solid rgba(17,17,17,0.07); border-radius: 12px; padding: 18px 20px; margin-bottom: 14px; }
  .qa-status { display: inline-flex; align-items: center; gap: 6px; font-size: 12px; font-weight: 700; padding: 4px 10px; border-radius: 999px; }
  .qa-status.pending { background: var(--canary); color: #6b5600; }
  .qa-status.answered { background: var(--mint); color: #14591f; }
  .qa-status.retry { background: #ffd9cf; color: var(--phoenix); }
  .status-dot { width: 7px; height: 7px; border-radius: 999px; background: currentColor; animation: pulseDot 1.4s infinite; }
  .answer-box { background: var(--cream); border-radius: 10px; padding: 14px; margin-top: 12px; font-size: 14px; line-height: 1.55; }

  .search-row { display: flex; gap: 10px; margin-bottom: 16px; position: relative; }
  .search-row input { flex: 1; border: 1px solid rgba(17,17,17,0.12); border-radius: 999px; padding: 12px 18px; font-size: 14px; outline: none; }
  .autocomplete { position: absolute; top: 48px; left: 0; right: 0; background: #fff; border-radius: 12px; box-shadow: 0 26px 60px -6px rgba(17,17,17,0.12); z-index: 10; max-height: 260px; overflow-y: auto; }
  .autocomplete-item { display: flex; width: 100%; justify-content: space-between; border: none; background: none; text-align: left; padding: 10px 16px; font-size: 14px; }
  .autocomplete-item:hover { background: var(--cream); }
  .company-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 14px; }
  .company-card { background: #fff; border: 1px solid rgba(17,17,17,0.07); border-radius: 12px; padding: 18px; text-align: left; border: none; box-shadow: rgba(17, 17, 17, 0.02) 0px -6px 6px 0px; }
  .company-card:hover { background: var(--cream); }
  .company-name { font-size: 16px; font-weight: 700; margin-bottom: 4px; }
  .company-meta { font-size: 12px; color: var(--stone); margin-bottom: 10px; }
  .rating-row { display: flex; align-items: center; gap: 6px; font-size: 14px; font-weight: 700; }
  .rating-bar-wrap { display: flex; align-items: center; gap: 10px; margin: 6px 0; }
  .rating-bar-label { width: 84px; font-size: 12px; color: var(--ash); flex-shrink: 0; }
  .rating-bar-track { flex: 1; height: 8px; background: var(--pearl); border-radius: 999px; overflow: hidden; }
  .rating-bar-fill { height: 100%; background: var(--phoenix); border-radius: 999px; }
  .star-input { display: flex; gap: 4px; }
  .star-input button { border: none; background: none; padding: 2px; }

  .tabs-row { display: flex; gap: 4px; border-bottom: 1px solid rgba(17,17,17,0.08); margin-bottom: 20px; }
  .tab-btn { border: none; background: none; padding: 10px 16px; font-size: 14px; font-weight: 600; color: var(--stone); border-bottom: 2px solid transparent; }
  .tab-btn.active { color: var(--ink); border-color: var(--phoenix); }
  .profile-card { display: flex; align-items: center; gap: 16px; background: var(--cream); border-radius: 16px; padding: 20px; margin-bottom: 24px; }
  .profile-card img { width: 64px; height: 64px; border-radius: 999px; }
  .grade-pill { display: inline-flex; align-items: center; gap: 4px; background: var(--petal); padding: 3px 10px; border-radius: 999px; font-size: 12px; font-weight: 700; margin-left: 8px; }
  .verify-toggle { display: flex; align-items: center; gap: 8px; font-size: 13px; margin-top: 8px; }
  .switch { position: relative; width: 38px; height: 22px; border-radius: 999px; background: var(--stone); border: none; flex-shrink: 0; }
  .switch.on { background: var(--phoenix); }
  .switch::after { content:''; position: absolute; top: 2px; left: 2px; width: 18px; height: 18px; border-radius: 999px; background: #fff; transition: transform 0.2s; }
  .switch.on::after { transform: translateX(16px); }
  .status-steps { display: flex; align-items: center; gap: 0; margin: 16px 0; }
  .step-dot { width: 26px; height: 26px; border-radius: 999px; background: var(--pearl); display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; color: var(--stone); flex-shrink: 0; }
  .step-dot.active { background: var(--phoenix); color: #fff; }
  .step-line { flex: 1; height: 2px; background: var(--pearl); }
  .step-line.active { background: var(--phoenix); }
  .step-labels { display: flex; justify-content: space-between; font-size: 11px; color: var(--stone); margin-top: 6px; }
  .activity-item { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid rgba(17,17,17,0.06); cursor: pointer; }
  .activity-item:hover { background: var(--cream); }

  @media (max-width: 900px) {
    .right-rail { display: none; }
    .global-nav { display: none; }
  }
</style>
</head>

<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef, useMemo } = React;

const AV = (seed) => `https://source.boringavatars.com/beam/64/${encodeURIComponent(seed)}?colors=ffd7f0,e2ddfd,b7efb2,ffef99,e8400d`;

const INIT_POSTS = [
  { id: 1, board: 'free', boardLabel: '자유게시판', author: '김민수', avatar: AV('김민수'), time: '방금', text: '오늘 신규 거래처 미팅 3건 잡았습니다. 다들 이번 주 컨디션 어떠신가요?', image: null, likes: 12, liked: false, scrapped: false, comments: [{ author: '이지은', text: '화이팅입니다!' }] },
  { id: 2, board: 'cert', boardLabel: '실적 인증', author: '박서연', avatar: AV('박서연'), time: '12분 전', text: '이번 분기 목표 초과 달성 인증합니다. 꾸준히 콜드콜 200통씩 돌린 게 통했네요.', image: 'https://picsum.photos/seed/sales-review-community-cert-1/560/300', likes: 34, liked: false, scrapped: false, comments: [] },
  { id: 3, board: 'tip', boardLabel: '노하우 공유', author: '최도윤', avatar: AV('최도윤'), time: '28분 전', text: '거절당했을 때 바로 다음 콜로 넘어가는 저만의 3초 루틴 공유합니다. 1) 심호흡 2) 다음 리스트 확인 3) 첫 문장 소리내어 연습.', image: null, likes: 51, liked: false, scrapped: false, comments: [{ author: '한지민', text: '저도 써볼게요' }, { author: '오태현', text: '3초 루틴 좋네요' }] },
  { id: 4, board: 'free', boardLabel: '자유게시판', author: '이지은', avatar: AV('이지은'), time: '41분 전', text: '영업 직군 이직 준비 중인데, 이 커뮤니티에서 회사 리뷰 보고 많이 참고하고 있어요.', image: null, likes: 8, liked: false, scrapped: false, comments: [] },
  { id: 5, board: 'cert', boardLabel: '실적 인증', author: '한지민', avatar: AV('한지민'), time: '1시간 전', text: '상반기 신규 계약 22건 마감 인증! 팀 목표 대비 초과분 공유드립니다.', image: 'https://picsum.photos/seed/sales-review-community-cert-2/560/300', likes: 27, liked: false, scrapped: false, comments: [] },
  { id: 6, board: 'tip', boardLabel: '노하우 공유', author: '오태현', avatar: AV('오태현'), time: '2시간 전', text: '카톡 상담 응답률을 높이는 첫 메시지 템플릿 3가지를 정리해 공유합니다. 이미지로 첨부합니다.', image: 'https://picsum.photos/seed/sales-review-community-tip-1/560/300', likes: 63, liked: false, scrapped: false, comments: [{ author: '김민수', text: '템플릿 감사합니다' }] },
  { id: 7, board: 'free', boardLabel: '자유게시판', author: '윤서아', avatar: AV('윤서아'), time: '3시간 전', text: '오늘 미팅 잡힌 곳 사무실 뷰가 너무 좋아서 사진 남깁니다.', image: 'https://picsum.photos/seed/sales-review-community-free-1/560/300', likes: 19, liked: false, scrapped: false, comments: [] },
  { id: 8, board: 'cert', boardLabel: '실적 인증', author: '정우진', avatar: AV('정우진'), time: '4시간 전', text: '입사 6개월 만에 개인 최고 실적을 기록했습니다. 초반에 헤맸던 분들께 도움이 될까 해서 남깁니다.', image: null, likes: 41, liked: false, scrapped: false, comments: [] },

  { board: 'free', boardLabel: '자유게시판', author: '강나연', avatar: AV('강나연'), text: '오늘도 무사히 미팅 마무리! 다들 좋은 하루 되세요.' },
  { board: 'cert', boardLabel: '실적 인증', author: '문시우', avatar: AV('문시우'), text: '3개월 연속 목표 달성 인증합니다.' },

function QnaView({ questions, setQuestions }) {
  const [modalOpen, setModalOpen] = useState(false);
  const [qtext, setQtext] = useState('');

  const submitQuestion = () => {
    if (!qtext.trim()) return;
    const id = Date.now();
    setQuestions(qs => [{ id, author: '나', avatar: AV('나'), time: '방금', question: qtext, status: 'pending' }, ...qs]);
    setModalOpen(false);
    setQtext('');
    setTimeout(() => {
      setQuestions(qs => qs.map(q => q.id === id ? { ...q, status: 'answered', answer: '유사 사례를 기준으로 판단하면, 고객 반응 데이터를 우선 확인한 뒤 접근 방식을 조정하는 편이 효과적입니다. 구체적인 상황을 조금 더 남겨주시면 추가 답변을 이어가겠습니다.' } : q));
    }, 2600);
  };

  const retry = (id) => {
    setQuestions(qs => qs.map(q => q.id === id ? { ...q, status: 'pending' } : q));
    setTimeout(() => {
      setQuestions(qs => qs.map(q => q.id === id ? { ...q, status: 'answered', answer: '가격 외 요소인 도입 지원 범위, 응답 속도, 커스터마이징 가능 여부를 구체적 사례와 함께 제시하는 방식을 검토해볼 수 있습니다.' } : q));
    }, 2600);
  };

  return (
    <div className="page-wrap view-fade">
      <div className="intro-band">
        <div>
          <h3>질문게시판 AI 자동답변</h3>
          <p>질문을 남기면 OpenAI GPT API가 1~2분 내 자동으로 답변을 등록합니다.</p>
        </div>
        <button className="write-btn" onClick={() => setModalOpen(true)}><i data-lucide="plus" style={{ width: 14, height: 14 }}></i>질문 작성</button>
      </div>
      {questions.map(q => (
        <div className="qa-card" key={q.id}>
          <div className="post-head">
            <img src={q.avatar} alt={q.author} />
            <span className="author">{q.author}</span>
            <time style={{ marginLeft: 'auto', fontSize: 12, color: 'var(--stone)' }}>{q.time}</time>
          </div>
          <div style={{ fontSize: 15, margin: '10px 0' }}>{q.question}</div>
          {q.status === 'pending' && <span className="qa-status pending"><span className="status-dot"></span>답변 준비중</span>}
          {q.status === 'retry' && (
            <span className="qa-status retry" style={{ cursor: 'pointer' }} onClick={() => retry(q.id)}><i data-lucide="rotate-cw" style={{ width: 12, height: 12 }}></i>재시도 필요 (클릭)</span>
          )}
          {q.status === 'answered' && (
            <>
              <span className="qa-status answered"><i data-lucide="check" style={{ width: 12, height: 12 }}></i>AI 답변 완료</span>
              <div className="answer-box">{q.answer}</div>
            </>
          )}
        </div>
      ))}
      {modalOpen && (
        <div className="modal-overlay" onClick={() => setModalOpen(false)}>
          <div className="modal-box" onClick={e => e.stopPropagation()}>
            <div className="modal-head"><h3>질문 작성</h3><button className="close-btn" onClick={() => setModalOpen(false)}><i data-lucide="x" style={{ width: 16, height: 16 }}></i></button></div>
            <textarea placeholder="궁금한 점을 남겨주세요" value={qtext} onChange={e => setQtext(e.target.value)}></textarea>
            <button className="primary-btn" disabled={!qtext.trim()} onClick={submitQuestion}><i data-lucide="send" style={{ width: 15, height: 15 }}></i>등록하기</button>
          </div>
        </div>
      )}
    </div>
  );
}

function CompanyReviewView({ companies, setCompanies, selectedId, setSelectedId }) {
  const [query, setQuery] = useState('');
  const [reviewOpen, setReviewOpen] = useState(false);
  const [ratings, setRatings] = useState({ 급여: 0, 워라밸: 0, 조직문화: 0, 성장가능성: 0 });
  const [reviewText, setReviewText] = useState('');
  const filtered = query ? companies.filter(c => c.name.includes(query)) : [];
  const selected = companies.find(c => c.id === selectedId);

  const submitReview = () => {
    const avg = (ratings.급여 + ratings.워라밸 + ratings.조직문화 + ratings.성장가능성) / 4;
    setCompanies(cs => cs.map(c => {
      if (c.id !== selectedId) return c;
      const newCount = c.count + 1;
      const newReviews = [{ id: Date.now(), label: `영업인 ${String.fromCharCode(65 + c.reviews.length)}`, avg: Math.round(avg*10)/10, text: reviewText, date: '2026.07.15' }, ...c.reviews];
      return { ...c, count: newCount, avg: Math.round(((c.avg * c.count) + avg) / newCount * 10) / 10, reviews: newReviews, reviewedByMe: true, ratings: {
        급여: Math.round(((c.ratings.급여 * c.count) + ratings.급여) / newCount * 10) / 10,
        워라밸: Math.round(((c.ratings.워라밸 * c.count) + ratings.워라밸) / newCount * 10) / 10,
        조직문화: Math.round(((c.ratings.조직문화 * c.count) + ratings.조직문화) / newCount * 10) / 10,
        성장가능성: Math.round(((c.ratings.성장가능성 * c.count) + ratings.성장가능성) / newCount * 10) / 10,
      } };
    }));
    setReviewOpen(false);
    setRatings({ 급여: 0, 워라밸: 0, 조직문화: 0, 성장가능성: 0 });
    setReviewText('');
  };

  return (
    <div className="page-wrap view-fade">
      <div className="page-head">
        <h2>회사 리뷰</h2>
        <p>블라인드·잡플래닛처럼 재직·퇴사 경험을 기반으로 회사를 검색하고 별점을 남길 수 있습니다.</p>
      </div>
      {!selected && (
        <>
          <div className="search-row">
            <input type="text" placeholder="회사명을 검색하세요" value={query} onChange={e => setQuery(e.target.value)} />
            {query && filtered.length > 0 && (
              <div className="autocomplete">
                {filtered.map(c => (
                  <button key={c.id} className="autocomplete-item" onClick={() => { setSelectedId(c.id); setQuery(''); }}>
                    <span>{c.name}</span><span style={{ color: 'var(--stone)' }}>★{c.avg}</span>
                  </button>
                ))}
              </div>
            )}
          </div>
          <div className="company-grid">
            {companies.map(c => (
              <button key={c.id} className="company-card" onClick={() => setSelectedId(c.id)}>
                <div className="company-name">{c.name}</div>
                <div className="company-meta">{c.industry} · 리뷰 {c.count}건</div>
                <div className="rating-row"><i data-lucide="star" style={{ width: 15, height: 15, color: '#e8400d', fill: '#e8400d' }}></i>{c.avg}</div>
              </button>
            ))}
          </div>
        </>
      )}
      {selected && (
        <div>
          <button className="ghost-btn" style={{ marginBottom: 16 }} onClick={() => setSelectedId(null)}>← 목록으로</button>

          <div className="company-meta">{selected.industry} · 평균 ★{selected.avg} · 리뷰 {selected.count}건</div>
          <div style={{ marginTop: 18 }}>
            {Object.entries(selected.ratings).map(([k,v]) => (
              <div className="rating-bar-wrap" key={k}>

                <span style={{ fontSize: 12, width: 26 }}>{v}</span>
              </div>
            ))}
          </div>
          <button className="ghost-btn" style={{ marginTop: 16 }} onClick={() => setReviewOpen(true)}>리뷰 작성</button>
          <div style={{ marginTop: 20 }}>
            <div className="field-label">리뷰 {selected.reviews.length}건 (익명)</div>

              <div key={r.id} className="comment-item" style={{ flexDirection: 'column', alignItems: 'flex-start', gap: 4 }}>

              </div>
            ))}
            {selected.reviews.length === 0 && <div style={{ color: 'var(--stone)', fontSize: 13 }}>등록된 리뷰가 아직 없습니다</div>}
          </div>
          {reviewOpen && (
            <div className="modal-overlay" onClick={() => setReviewOpen(false)}>
              <div className="modal-box" onClick={e => e.stopPropagation()}>
                <div className="modal-head"><h3>{selected.name} 리뷰 작성</h3><button className="close-btn" onClick={() => setReviewOpen(false)}><i data-lucide="x" style={{ width: 16, height: 16 }}></i></button></div>
                {selected.reviewedByMe ? (
                  <div style={{ padding: '20px 0', color: 'var(--ash)', fontSize: 14 }}>이미 리뷰를 등록하셨습니다. 회사당 리뷰는 1회만 작성할 수 있습니다.</div>
                ) : (
                  <>
                    {Object.keys(ratings).map(k => (
                      <div key={k} style={{ marginBottom: 12 }}>
                        <div className="field-label" style={{ margin: '8px 0 4px' }}>{k}</div>
                        <StarInput value={ratings[k]} onChange={v => setRatings(r => ({ ...r, [k]: v }))} />
                      </div>
                    ))}
                    <div className="field-label">리뷰 내용 (익명으로 등록됩니다)</div>
                    <textarea value={reviewText} onChange={e => setReviewText(e.target.value)} placeholder="재직/퇴사 경험을 남겨주세요"></textarea>
                    <button className="primary-btn" disabled={Object.values(ratings).some(v => v === 0) || !reviewText.trim()} onClick={submitReview}>등록하기</button>
                  </>
                )}
              </div>
            </div>
          )}
        </div>
      )}
    </div>
  );
}

function MyPageView({ profile, setProfile, posts, openPost }) {
  const [tab, setTab] = useState('activity');
  const [subTab, setSubTab] = useState('posts');
  const [grade, setGrade] = useState('전문가');
  const [fileName, setFileName] = useState(null);

  const myPosts = posts.filter(p => p.author === '나' || ['김민수','박서연'].includes(p.author)).slice(0,4);
  const myComments = [{ id: 1, board: 'tip', boardLabel: '노하우 공유', text: '저도 써볼게요', date: '2026.07.14' }];

  const submitApplication = () => {
    setProfile(p => ({ ...p, application: { grade, fileName: fileName || '재직증명서.pdf', status: '심사중', submittedAt: '2026.07.15' } }));
  };

  return (
    <div className="page-wrap view-fade">
      <div className="profile-card">
        <img src={profile.avatar} alt="" />
        <div>
          <div style={{ fontSize: 18, fontWeight: 700 }}>{profile.name}<span className="grade-pill">{profile.gradeLabel}</span></div>
          <div style={{ fontSize: 13, color: 'var(--ash)' }}>가입일 {profile.joinDate}</div>
          <div className="verify-toggle">
            <button className={`switch ${profile.emailVerified ? 'on' : ''}`} onClick={() => setProfile(p => ({ ...p, emailVerified: !p.emailVerified }))}></button>
            이메일 인증 {profile.emailVerified ? '완료' : '미완료 (글쓰기 제한)'}
          </div>
        </div>
      </div>
      <div className="tabs-row">
        <button className={`tab-btn ${tab === 'activity' ? 'active' : ''}`} onClick={() => setTab('activity')}>활동내역</button>
        <button className={`tab-btn ${tab === 'grade' ? 'active' : ''}`} onClick={() => setTab('grade')}>등급 신청</button>
      </div>
      {tab === 'activity' && (
        <div>
          <div className="board-chips" style={{ marginBottom: 12 }}>
            <button className={`board-chip ${subTab === 'posts' ? 'active' : ''}`} onClick={() => setSubTab('posts')}>작성글</button>
            <button className={`board-chip ${subTab === 'comments' ? 'active' : ''}`} onClick={() => setSubTab('comments')}>댓글</button>
          </div>
          {subTab === 'posts' && myPosts.map(p => (
            <div className="activity-item" key={p.id} onClick={() => openPost(p)}>
              <span>{p.text.slice(0,32)}...</span><span className={`board-tag ${p.board}`}>{p.boardLabel}</span>
            </div>
          ))}
          {subTab === 'comments' && myComments.map(c => (
            <div className="activity-item" key={c.id}>
              <span>{c.text}</span><span style={{ color: 'var(--stone)', fontSize: 12 }}>{c.date}</span>
            </div>
          ))}
        </div>
      )}
      {tab === 'grade' && (
        <div>
          {!profile.application ? (
            <>
              <div className="field-label">신청 등급</div>
              <select value={grade} onChange={e => setGrade(e.target.value)}>
                <option>대표인증</option><option>전문가</option><option>영업인</option>
              </select>
              <div className="field-label">증빙 서류</div>
              <div className="dropzone" onClick={() => setFileName('재직증명서.pdf')}>
                <i data-lucide="upload" style={{ width: 20, height: 20 }}></i>
                <div style={{ marginTop: 6 }}>{fileName ? `${fileName} 선택됨` : '클릭하여 증빙 이미지를 업로드하세요'}</div>
              </div>
              <button className="primary-btn" onClick={submitApplication}>신청하기</button>
            </>
          ) : (
            <div>
              <div className="status-steps">
                <div className="step-dot active">1</div><div className="step-line active"></div>
                <div className="step-dot active">2</div><div className="step-line"></div>
                <div className="step-dot">3</div>
              </div>
              <div className="step-labels"><span>신청</span><span>심사중</span><span>승인/반려</span></div>
              <div style={{ marginTop: 16, background: 'var(--cream)', borderRadius: 12, padding: 16, fontSize: 14 }}>
                <b>{profile.application.grade}</b> 등급 신청이 {profile.application.submittedAt}에 접수되어 현재 <b>심사중</b>입니다. 증빙: {profile.application.fileName}
              </div>
            </div>
          )}
        </div>
      )}
    </div>
  );
}

function App() {
  const [view, setView] = useState('main');
  const [posts, setPosts] = useState(INIT_POSTS);
  const [filter, setFilter] = useState('all');
  const [search, setSearch] = useState('');
  const [searchOpen, setSearchOpen] = useState(false);
  const [openedPost, setOpenedPost] = useState(null);
  const [questions, setQuestions] = useState(INIT_QUESTIONS);
  const [companies, setCompanies] = useState(COMPANIES);
  const [selectedCompanyId, setSelectedCompanyId] = useState(null);
  const [profile, setProfile] = useState({ name: '나', avatar: AV('나-프로필'), joinDate: '2026.02.10', gradeLabel: '영업인', emailVerified: true, application: null });
  const [toasts, setToasts] = useState([]);
  const [notifOpen, setNotifOpen] = useState(false);
  const [menuOpen, setMenuOpen] = useState(false);
  const [loadingMore, setLoadingMore] = useState(false);
  const [pageCount, setPageCount] = useState(0);
  const sentinelRef = useRef(null);

  useEffect(() => { if (window.lucide) window.lucide.createIcons(); });

  useEffect(() => {
    const handler = (e) => { const p = posts.find(x => x.id === e.detail); if (p) setOpenedPost(p); };
    document.addEventListener('open-post', handler);
    return () => document.removeEventListener('open-post', handler);
  }, [posts]);

  useEffect(() => {
    if (view !== 'main' || pageCount >= 2) return;
    const obs = new IntersectionObserver((entries) => {
      if (entries[0].isIntersecting && !loadingMore) {
        setLoadingMore(true);
        setTimeout(() => {
          setPosts(ps => [...ps, ...MORE_POOL.map((m, i) => ({ ...m, id: Date.now() + i, time: `${(pageCount+1)*2}시간 전`, image: null, likes: Math.floor(Math.random()*20)+3, liked: false, scrapped: false, comments: [] }))]);
          setLoadingMore(false);
          setPageCount(c => c + 1);
        }, 900);
      }
    }, { threshold: 0.4 });
    if (sentinelRef.current) obs.observe(sentinelRef.current);
    return () => obs.disconnect();
  }, [view, loadingMore, pageCount]);

  const pushToast = (text) => { const id = Date.now(); setToasts(t => [...t, { id, text }]); setTimeout(() => setToasts(t => t.filter(x => x.id !== id)), 2600); };
  const toggleLike = (id) => setPosts(ps => ps.map(p => p.id === id ? { ...p, liked: !p.liked, likes: p.liked ? p.likes - 1 : p.likes + 1 } : p));
  const toggleScrap = (id) => setPosts(ps => ps.map(p => p.id === id ? { ...p, scrapped: !p.scrapped } : p));
  const addPost = (data) => { setPosts(ps => [{ id: Date.now(), board: data.board, boardLabel: BOARD_LABEL[data.board], author: '나', avatar: AV('나-프로필'), time: '방금', text: data.text, image: data.image, likes: 0, liked: false, scrapped: false, comments: [] }, ...ps]); pushToast('게시글이 등록되었습니다'); };
  const addComment = (postId, text) => { setPosts(ps => ps.map(p => p.id === postId ? { ...p, comments: [...p.comments, { author: '나', text }] } : p)); setOpenedPost(p => p && p.id === postId ? { ...p, comments: [...p.comments, { author: '나', text }] } : p); };

  const navItems = [
    { id: 'main', label: '홈', icon: 'home' },
    { id: 'qna', label: '질문게시판 AI 자동답변', icon: 'help-circle' },
    { id: 'company-review', label: '회사 리뷰', icon: 'building-2' },
    { id: 'mypage', label: '마이페이지', icon: 'user' },
  ];

  return (
    <div data-archetype="feed-timeline" style={{ width: '100%', minHeight: '100vh' }}>
      <header className="topbar">
        <div className="topbar-inner">
          <div className="brand"><span className="brand-badge"><i data-lucide="briefcase" style={{ width: 16, height: 16 }}></i></span>세일즈허브</div>
          <nav className="global-nav">
            {navItems.map(n => (
              <button key={n.id} className={`nav-link ${view === n.id ? 'active' : ''}`} onClick={() => { setView(n.id); setSelectedCompanyId(null); }}>
                <i data-lucide={n.icon} style={{ width: 15, height: 15 }}></i>{n.label}
              </button>
            ))}
          </nav>
          <div className="header-actions">
            <button className="icon-btn" onClick={() => setSearchOpen(s => !s)}><i data-lucide="search" style={{ width: 16, height: 16 }}></i></button>
            <button className="icon-btn" onClick={() => { setNotifOpen(o => !o); setMenuOpen(false); }}>
              <i data-lucide="bell" style={{ width: 16, height: 16 }}></i><span className="notif-badge"></span>
              {notifOpen && (
                <div className="dropdown" style={{ width: 240 }}>
                  <div className="dropdown-item">김민수님이 회원님의 글을 좋아합니다</div>
                  <div className="dropdown-item">전문가 등급 신청이 승인되었습니다</div>
                  <div className="dropdown-item">질문에 AI 답변이 등록되었습니다</div>
                </div>
              )}
            </button>
            <button className="avatar-btn" onClick={() => { setMenuOpen(o => !o); setNotifOpen(false); }}>
              <img src={profile.avatar} alt="프로필" />
              {menuOpen && (
                <div className="dropdown">
                  <button className="dropdown-item" onClick={() => { setView('mypage'); setMenuOpen(false); }}><i data-lucide="user" style={{ width: 14, height: 14 }}></i>마이페이지</button>
                  <button className="dropdown-item" onClick={() => { setMenuOpen(false); pushToast('로그아웃 되었습니다'); }}><i data-lucide="log-out" style={{ width: 14, height: 14 }}></i>로그아웃</button>
                </div>
              )}
            </button>
          </div>
          {searchOpen && (
            <div className="search-overlay">
              <input autoFocus type="text" placeholder="게시글, 작성자를 검색하세요" value={search} onChange={e => { setSearch(e.target.value); setView('main'); }} />
              <button className="close-btn" onClick={() => { setSearchOpen(false); setSearch(''); }}><i data-lucide="x" style={{ width: 15, height: 15 }}></i></button>
            </div>
          )}
        </div>
      </header>

      {view === 'main' && (
        <div className="layout-wrap view-fade">
          <MainFeed posts={posts} filter={filter} setFilter={setFilter} search={search} setSearch={setSearch}
            toggleLike={toggleLike} toggleScrap={toggleScrap} openPost={setOpenedPost} addPost={addPost}
            loadingMore={loadingMore} sentinelRef={sentinelRef} canWrite={profile.emailVerified}
            onBlockedWrite={() => pushToast('이메일 인증이 필요합니다')} />
          <RightRail posts={posts} setView={setView} setSelectedCompanyId={setSelectedCompanyId} />
        </div>
      )}
      {view === 'qna' && <QnaView questions={questions} setQuestions={setQuestions} />}
      {view === 'company-review' && <CompanyReviewView companies={companies} setCompanies={setCompanies} selectedId={selectedCompanyId} setSelectedId={setSelectedCompanyId} />}
      {view === 'mypage' && <MyPageView profile={profile} setProfile={setProfile} posts={posts} openPost={setOpenedPost} />}

      <PostDetailModal post={openedPost} onClose={() => setOpenedPost(null)} onAddComment={addComment} onToggleLike={toggleLike} onToggleScrap={toggleScrap} />
      <Toast toasts={toasts} />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
