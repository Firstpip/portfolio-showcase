function Toast({ toasts }) {
  return <div className="toast-wrap">{toasts.map(t => <div className="toast" key={t.id}><i className="ph ph-check"></i>{t.text}</div>)}</div>;
}

function Sparkline({ points }) {
  const max = Math.max(...points); const min = Math.min(...points);
  const norm = points.map((p,i) => `${(i/(points.length-1))*56},${20 - ((p - min)/(max - min || 1))*16 - 2}`).join(' ');
  return (
    <svg width="56" height="20" viewBox="0 0 56 20" className="sparkline">
      <polyline points={norm} fill="none" stroke="#f6bc1e" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" />
    </svg>
  );
}

function StatCard({ icon, label, value, delta, trend, countTo, suffix }) {
  const [count, setCount] = useState(countTo ? 0 : null);
  useEffect(() => {
    if (!countTo) return;
    const steps = 24;
    let i = 0;
    const timer = setInterval(() => {
      i++;
      setCount(Math.round((countTo / steps) * i));
      if (i >= steps) clearInterval(timer);
    }, 28);
    return () => clearInterval(timer);
  }, [countTo]);
  return (
    <div className="stat-card">
      <div className="stat-label"><i className={`ph ph-${icon}`}></i>{label}</div>
      <div style={{ display: 'flex', alignItems: 'flex-end', justifyContent: 'space-between' }}>
        <div className="stat-value">{countTo ? `${count.toLocaleString()}${suffix || ''}` : value}</div>
        {trend && <Sparkline points={trend} />}
      </div>
      {delta && <div className="stat-delta">{delta}</div>}
    </div>
  );
}

function MemberView({ pushToast, initialSearch }) {
  const [members, setMembers] = useState(INIT_MEMBERS);
  const [apps, setApps] = useState(INIT_APPS);
  const [queueTab, setQueueTab] = useState('pending');
  const [gradeFilter, setGradeFilter] = useState('all');
  const [statusFilter, setStatusFilter] = useState('all');
  const [search, setSearch] = useState(initialSearch || '');
  const [detail, setDetail] = useState(null);
  const [reviewApp, setReviewApp] = useState(null);
  const [reason, setReason] = useState('');
  const [auditLog, setAuditLog] = useState([{ id: 1, text: '노하윤 전문가 등급 승인 (증빙 확인 완료)', at: '07.14 16:20' }]);

  const filtered = members.filter(m =>
    (gradeFilter === 'all' || m.grade === gradeFilter) &&
    (statusFilter === 'all' || m.status === statusFilter) &&
    (!search || m.name.includes(search))
  );
  const queued = apps.filter(a => a.status === queueTab);

  const decide = (approve) => {
    setApps(a => a.map(x => x.id === reviewApp.id ? { ...x, status: approve ? 'approved' : 'rejected' } : x));
    setAuditLog(l => [{ id: Date.now(), text: `${reviewApp.name} ${reviewApp.grade} 등급 ${approve ? '승인' : '반려'} (사유: ${reason || '미기재'})`, at: '07.15 지금' }, ...l]);
    pushToast(`${reviewApp.name}님의 신청을 ${approve ? '승인' : '반려'}했습니다`);
    setReviewApp(null);
    setReason('');
  };

  return (
    <div className="page-wrap view-fade">
      <div className="page-head"><h2>회원 및 뱃지 승인 관리</h2><p>전체 회원 목록을 조회하고, 대표인증·전문가 등급 신청 건을 검토·승인/반려 처리합니다.</p></div>

      <div className="filter-row">
        <select value={gradeFilter} onChange={e => setGradeFilter(e.target.value)}>
          <option value="all">전체 등급</option><option>영업인</option><option>전문가</option><option>대표인증</option>
        </select>
        <select value={statusFilter} onChange={e => setStatusFilter(e.target.value)}>
          <option value="all">전체 상태</option><option>활성</option><option>정지</option>
        </select>
        <input type="text" placeholder="이름 검색" value={search} onChange={e => setSearch(e.target.value)} />
      </div>
      <table className="data-table" style={{ marginBottom: 28 }}>
        <thead><tr><th>이름</th><th>이메일</th><th>가입일</th><th>등급</th><th>상태</th></tr></thead>
        <tbody>
          {filtered.map(m => (
            <tr key={m.id} className="clickable" onClick={() => setDetail(m)}>
              <td>{m.name}</td><td>{m.email}</td><td>{m.joined}</td><td>{m.grade}</td>
              <td><span className={`status-pill ${m.status === '활성' ? 'active' : 'rejected'}`}>{m.status}</span></td>
            </tr>
          ))}
        </tbody>
      </table>

      <h3 style={{ fontSize: 18, marginBottom: 12 }}>뱃지 신청 큐</h3>
      <div className="queue-tabs">
        {[['pending','대기'],['approved','승인'],['rejected','반려']].map(([id,label]) => (
          <button key={id} className={`queue-tab ${queueTab === id ? 'active' : ''}`} onClick={() => setQueueTab(id)}>{label}</button>
        ))}
      </div>
      {queued.map(a => (
        <div className="app-card" key={a.id}>
          <img className="evidence" src={a.img} alt="증빙" onClick={() => setReviewApp(a)} />
          <div>
            <div style={{ fontWeight: 700 }}>{a.name}</div>
            <div style={{ fontSize: 12.5, color: 'var(--stone)' }}>신청 등급: {a.grade}</div>
          </div>
          {queueTab === 'pending' && (
            <div className="app-actions">
              <button className="btn-approve" onClick={() => setReviewApp(a)}>검토하기</button>
            </div>
          )}
        </div>
      ))}
      {queued.length === 0 && <div style={{ color: 'var(--stone)', fontSize: 13 }}>해당 상태의 신청이 없습니다</div>}

      <h3 style={{ fontSize: 18, margin: '28px 0 12px' }}>처리 감사 로그</h3>
      <div className="panel">
        {auditLog.map(l => <div className="log-row" key={l.id}><span>{l.text}</span><span>{l.at}</span></div>)}
      </div>

      {detail && (
        <div className="modal-overlay" onClick={() => setDetail(null)}>
          <div className="modal-box" onClick={e => e.stopPropagation()}>
            <div className="modal-head"><h3>{detail.name} 회원 상세</h3><button className="close-btn" onClick={() => setDetail(null)}><i className="ph ph-x"></i></button></div>
            <div className="field-label">이메일</div><div>{detail.email}</div>
            <div className="field-label">가입일</div><div>{detail.joined}</div>
            <div className="field-label">등급 / 상태</div><div>{detail.grade} · {detail.status}</div>
          </div>
        </div>
      )}
      {reviewApp && (
        <div className="modal-overlay" onClick={() => setReviewApp(null)}>
          <div className="modal-box" onClick={e => e.stopPropagation()}>
            <div className="modal-head"><h3>{reviewApp.name} 등급 신청 검토</h3><button className="close-btn" onClick={() => setReviewApp(null)}><i className="ph ph-x"></i></button></div>
            <img className="evidence" src={reviewApp.img} alt="증빙" style={{ width: '100%', height: 200, borderRadius: 16 }} />
            <div className="field-label">반려 시 사유 (선택)</div>
            <textarea value={reason} onChange={e => setReason(e.target.value)} placeholder="반려 사유를 입력하세요"></textarea>
            <div style={{ display: 'flex', gap: 10, marginTop: 14 }}>
              <button className="btn-reject" style={{ flex: 1 }} onClick={() => decide(false)}>반려</button>
              <button className="btn-approve" style={{ flex: 1 }} onClick={() => decide(true)}>승인</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

function ModerationView({ pushToast }) {
  const [reports, setReports] = useState(INIT_REPORTS);

  const [confirmBlind, setConfirmBlind] = useState(false);

  const filtered = reasonFilter === '전체' ? reports : reports.filter(r => r.reason === reasonFilter);

          <div className="modal-box" onClick={e => e.stopPropagation()}>

          <div className="brand"><span className="brand-mark"><i className="ph ph-chart-line-up"></i></span>세일즈허브 콘솔</div>
          <div className="project-switcher">
            <button className="switcher-btn" onClick={() => setEnvOpen(o => !o)}>{env}<i className="ph ph-caret-down"></i></button>
            {envOpen && (
              <div className="switcher-menu">
                {['운영 환경', '스테이징 환경'].map(e => (
                  <button key={e} className={`switcher-item ${env === e ? 'active' : ''}`} onClick={() => { setEnv(e); setEnvOpen(false); }}>{e}</button>
                ))}
              </div>
            )}
          </div>
          <nav className="global-nav">
            {navItems.map(n => (
              <button key={n.id} className={`nav-link ${view === n.id ? 'active' : ''}`} onClick={() => setView(n.id)}>{n.label}</button>
            ))}
          </nav>
          <div className="header-actions">
            <button className="icon-btn" onClick={() => setSearchOpen(o => !o)}><i className="ph ph-magnifying-glass"></i></button>
            {searchOpen && (
              <div className="switcher-menu" style={{ right: 0, left: 'auto', top: 44, width: 260 }}>
                <input type="text" placeholder="회원 이름으로 검색" value={globalQuery} onChange={e => setGlobalQuery(e.target.value)}
                  onKeyDown={e => { if (e.key === 'Enter') { setView('member'); setSearchOpen(false); } }} />
              </div>
            )}
            <button className="icon-btn" onClick={() => { setNotifOpen(o => !o); setMenuOpen(false); }}>
              <i className="ph ph-bell"></i><span className="notif-badge"></span>
              {notifOpen && (
                <div className="dropdown" style={{ width: 240 }}>
                  <div className="dropdown-item">신규 뱃지 신청 3건이 접수되었습니다</div>
                  <div className="dropdown-item">신고 접수 1건이 새로 들어왔습니다</div>
                  <div className="dropdown-item">크롤러 실행이 완료되었습니다</div>
                </div>
              )}
            </button>
            <button className="avatar-btn" onClick={() => { setMenuOpen(o => !o); setNotifOpen(false); }}>
              관리
              {menuOpen && (
                <div className="dropdown">
                  <button className="dropdown-item" onClick={() => { setMenuOpen(false); pushToast('로그아웃 되었습니다'); }}><i className="ph ph-sign-out"></i>로그아웃</button>
                </div>
              )}
            </button>
          </div>
        </div>
      </header>

      {view === 'main' && <DashboardView pushToast={pushToast} setView={setView} />}
      {view === 'member' && <MemberView pushToast={pushToast} initialSearch={globalQuery} />}
      {view === 'company-admin' && <CompanyAdminView pushToast={pushToast} />}
      {view === 'moderation' && <ModerationView pushToast={pushToast} />}

      <Toast toasts={toasts} />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
