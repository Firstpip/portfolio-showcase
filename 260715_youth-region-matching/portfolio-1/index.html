<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>로컬브릿지 — 청년-지역 프로그램 매칭 플랫폼</title>
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
<link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/regular/style.css">
<link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/fill/style.css">
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
  :root{
    --primary:#0f3e17;
    --primary-strong:#0a2a10;
    --accent:#a53ad9;
    --bg:#fffefc;
    --surface:#e5e7eb;
    --sage:#b1dbb8;
    --mist:#b6ced5;
    --mint:#cfe7d3;
    --linen:#e1f4df;
    --text:#000000;
    --text-secondary:#57635b;
    --text-tertiary:#8b968f;
    --hairline:#e5e7eb;
    --radius-card:14px;
    --radius-btn:14px;
    --radius-badge:999px;
    --radius-nav:7px;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  html,body{width:100%; min-height:100vh;}
  body{
    font-family:'Pretendard', -apple-system, BlinkMacSystemFont, sans-serif;
    background:var(--bg);
    color:var(--text);
    font-weight:400;
    -webkit-font-smoothing:antialiased;
    overflow-x:hidden;
  }
  #root{width:100%;}
  button{font-family:inherit; border:none; background:none; cursor:pointer; color:inherit;}
  input,textarea,select{font-family:inherit; font-size:14px;}
  a{text-decoration:none; color:inherit;}
  ul{list-style:none;}
  img{display:block; max-width:100%;}

  /* ============ Typography scale (Ease Health ref) ============ */
  .t-caption{font-size:12px; line-height:1.5; letter-spacing:-0.02em; color:var(--text-secondary);}
  .t-body-sm{font-size:14px; line-height:1.5; letter-spacing:-0.02em;}
  .t-body{font-size:16px; line-height:1.6; letter-spacing:-0.01em;}
  .t-subheading{font-size:22px; line-height:1.3; letter-spacing:-0.02em; font-weight:500;}
  .t-heading-sm{font-size:26px; line-height:1.3; letter-spacing:-0.02em; font-weight:500;}
  .t-heading{font-size:38px; line-height:1.2; letter-spacing:-0.02em; font-weight:300;}
  .t-heading-lg{font-size:52px; line-height:1.08; letter-spacing:-0.03em; font-weight:300;}
  .t-display{font-size:60px; line-height:1.05; letter-spacing:-0.03em; font-weight:300;}

  /* ============ Keyframes ============ */
  @keyframes fadeInUp{ from{opacity:0; transform:translateY(16px);} to{opacity:1; transform:translateY(0);} }
  @keyframes slideInRight{ from{transform:translateX(100%);} to{transform:translateX(0);} }
  @keyframes slideOutRight{ from{transform:translateX(0);} to{transform:translateX(100%);} }
  @keyframes pulseHeart{ 0%{transform:scale(1);} 40%{transform:scale(1.35);} 60%{transform:scale(0.92);} 100%{transform:scale(1);} }
  @keyframes shimmer{ 0%{background-position:-400px 0;} 100%{background-position:400px 0;} }
  @keyframes ringGrow{ from{stroke-dashoffset:251;} }
  @keyframes toastIn{ from{opacity:0; transform:translate(-50%,12px);} to{opacity:1; transform:translate(-50%,0);} }
  @keyframes floatSlow{ 0%,100%{transform:translateY(0) rotate(0deg);} 50%{transform:translateY(-10px) rotate(2deg);} }
  @keyframes fadeIn{ from{opacity:0;} to{opacity:1;} }

  /* ============ Header / search ============ */
  .search-header{
    position:sticky; top:0; z-index:40;
    background:var(--bg);
    border-bottom:1px solid var(--hairline);
    padding:16px 32px 0;
    animation:fadeIn .5s ease;
  }
  .header-row{
    max-width:1280px; margin:0 auto;
    display:flex; align-items:center; gap:24px;
    padding-bottom:14px;
  }
  .brand{display:flex; align-items:center; gap:8px; font-size:19px; font-weight:600; letter-spacing:-0.02em; color:var(--primary); flex-shrink:0;}
  .brand i{font-size:22px;}
  .search-bar{
    flex:1; display:flex; align-items:stretch;
    background:#fff; border:1px solid var(--hairline); border-radius:999px;
    box-shadow:0 1px 3px rgba(15,62,23,0.06);
    max-width:620px; margin:0 auto; position:relative;
  }
  .search-segment{
    flex:1; padding:9px 22px; text-align:left; border-radius:999px; position:relative;
    transition:background .15s ease;
  }
  .search-segment:hover{background:var(--linen);}
  .search-segment.open{background:var(--linen);}
  .segment-label{font-size:11px; font-weight:600; color:var(--primary); margin-bottom:2px;}
  .segment-value{font-size:13px; color:var(--text-secondary); white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
  .search-divider{width:1px; background:var(--hairline); margin:10px 0;}
  .search-submit{
    width:40px; height:40px; margin:6px 6px 6px 0; border-radius:999px;
    background:var(--primary); color:#fff; display:flex; align-items:center; justify-content:center; flex-shrink:0;
    align-self:center;
  }
  .search-submit:hover{background:var(--primary-strong);}
  .search-dropdown{
    position:absolute; top:calc(100% + 10px); left:0; min-width:220px;
    background:#fff; border:1px solid var(--hairline); border-radius:14px;
    box-shadow:0 12px 32px rgba(15,62,23,0.14); padding:10px; z-index:60;
    animation:fadeInUp .18s ease;
  }
  .search-dropdown button{
    display:block; width:100%; text-align:left; padding:9px 12px; border-radius:9px; font-size:14px;
  }
  .search-dropdown button:hover{background:var(--linen);}
  .header-nav{display:flex; align-items:center; gap:4px; flex-shrink:0;}
  .nav-link{
    padding:9px 15px; border-radius:var(--radius-nav); font-size:14px; color:#222; font-weight:400;
  }
  .nav-link:hover{background:var(--linen);}
  .nav-link.active{background:var(--linen); color:var(--primary); font-weight:600;}
  .nav-cta{
    padding:9px 18px; border-radius:999px; background:var(--primary); color:#fff; font-size:14px; font-weight:500;
    display:flex; align-items:center; gap:6px;
  }
  .nav-cta:hover{background:var(--primary-strong);}

  .filter-chips{
    max-width:1280px; margin:0 auto; display:flex; gap:8px; overflow-x:auto;
    padding:14px 0 16px; scrollbar-width:none;
  }
  .filter-chips::-webkit-scrollbar{display:none;}
  .chip{
    flex-shrink:0; display:flex; align-items:center; gap:6px; padding:8px 16px;
    border-radius:999px; border:1px solid var(--hairline); font-size:13.5px; color:var(--text);
    background:#fff; transition:all .15s ease; white-space:nowrap;
  }
  .chip:hover{border-color:var(--primary); }
  .chip.active{background:var(--primary); color:#fff; border-color:var(--primary);}
  .chip.filter-toggle{background:var(--linen); border-color:var(--linen); color:var(--primary); font-weight:500;}

  /* ============ Main / gallery ============ */
  .main{max-width:1280px; margin:0 auto; padding:28px 32px 80px;}
  .result-meta{display:flex; align-items:center; justify-content:space-between; margin-bottom:18px;}
  .result-count{font-size:14px; color:var(--text-secondary);}
  .sort-select{
    border:1px solid var(--hairline); border-radius:999px; padding:8px 14px; font-size:13px; display:flex; align-items:center; gap:6px;
  }
  .card-grid{
    display:grid; grid-template-columns:repeat(auto-fill, minmax(272px, 1fr)); gap:26px;
  }
  .listing-card{
    background:#fff; border-radius:var(--radius-card); overflow:hidden; cursor:pointer;
    border:1px solid var(--hairline);
    transition:transform .22s ease, box-shadow .22s ease;
    opacity:0; animation:fadeInUp .5s ease forwards;
  }
  .listing-card:hover{transform:translateY(-4px); box-shadow:0 16px 32px rgba(15,62,23,0.12);}
  .card-image-wrap{position:relative; aspect-ratio:4/3; overflow:hidden; background:var(--linen);}
  .card-image{width:100%; height:100%; object-fit:cover; transition:transform .35s ease;}
  .listing-card:hover .card-image{transform:scale(1.06);}
  .card-favorite{
    position:absolute; top:10px; right:10px; width:32px; height:32px; border-radius:999px;
    background:rgba(255,254,252,0.92); display:flex; align-items:center; justify-content:center;
    font-size:16px; color:var(--primary); box-shadow:0 2px 6px rgba(0,0,0,0.12);
  }
  .card-favorite.active i{color:var(--accent);}
  .card-favorite.pulsing i{animation:pulseHeart .45s ease;}
  .card-badge{
    position:absolute; top:10px; left:10px; padding:4px 10px; border-radius:999px; font-size:11px; font-weight:600;
    background:var(--mist); color:var(--primary-strong);
  }
  .card-badge.urgent{background:#f7d9c4; color:#a3401a;}
  .card-body{padding:16px;}
  .card-row-1{display:flex; align-items:flex-start; justify-content:space-between; gap:8px; margin-bottom:6px;}
  .card-title{font-size:15.5px; font-weight:600; line-height:1.35; letter-spacing:-0.01em;}
  .card-fit{font-size:12.5px; color:var(--accent); font-weight:700; white-space:nowrap;}
  .card-meta{display:block; font-size:13px; color:var(--text-secondary); margin-bottom:3px;}
  .card-tags{display:flex; gap:6px; margin:8px 0 2px; flex-wrap:wrap;}
  .card-tag{font-size:11px; padding:3px 9px; border-radius:999px; background:var(--linen); color:var(--primary);}
  .card-row-4{display:flex; align-items:baseline; gap:6px; margin-top:10px; padding-top:10px; border-top:1px dashed var(--hairline);}
  .card-price{font-size:15px; font-weight:700; color:var(--primary-strong);}
  .price-unit{font-size:12px; color:var(--text-secondary);}

  .empty-state{grid-column:1/-1; display:flex; flex-direction:column; align-items:center; padding:80px 20px; text-align:center;}
  .empty-state h3{margin:18px 0 6px; font-size:18px; font-weight:600;}
  .empty-state p{color:var(--text-secondary); font-size:14px;}

  .skeleton-grid{display:grid; grid-template-columns:repeat(auto-fill, minmax(272px, 1fr)); gap:26px;}
  .skeleton-card{border-radius:var(--radius-card); overflow:hidden; border:1px solid var(--hairline);}
  .skeleton-img{aspect-ratio:4/3; background:linear-gradient(90deg, var(--linen) 25%, var(--mint) 37%, var(--linen) 63%); background-size:400px 100%; animation:shimmer 1.4s infinite;}
  .skeleton-line{height:12px; margin:14px 16px; border-radius:6px; background:linear-gradient(90deg, var(--linen) 25%, var(--mint) 37%, var(--linen) 63%); background-size:400px 100%; animation:shimmer 1.4s infinite;}

  /* ============ Quick-view drawer ============ */
  .drawer-backdrop{position:fixed; inset:0; background:rgba(15,20,17,0.32); z-index:80; animation:fadeIn .2s ease;}
  .drawer{
    position:fixed; top:0; right:0; bottom:0; width:min(460px, 92vw); background:var(--bg); z-index:90;
    box-shadow:-16px 0 48px rgba(0,0,0,0.16); overflow-y:auto; animation:slideInRight .3s cubic-bezier(.22,.9,.32,1);
  }
  .drawer-hero{position:relative; aspect-ratio:16/10;}
  .drawer-hero img{width:100%; height:100%; object-fit:cover;}
  .drawer-close{
    position:absolute; top:14px; right:14px; width:36px; height:36px; border-radius:999px;
    background:rgba(255,254,252,0.9); display:flex; align-items:center; justify-content:center; font-size:18px;
  }
  .drawer-body{padding:24px;}
  .drawer-tags{display:flex; gap:8px; margin-bottom:12px;}
  .drawer-pill{background:var(--mist); color:var(--primary-strong); font-size:12px; font-weight:600; padding:6px 13px; border-radius:999px;}
  .drawer-fit-ring{display:flex; align-items:center; gap:16px; background:var(--linen); border-radius:14px; padding:18px; margin:18px 0;}
  .drawer-section{margin-top:22px;}
  .drawer-section h4{font-size:13px; font-weight:700; color:var(--primary); margin-bottom:10px; letter-spacing:.02em;}
  .drawer-list li{display:flex; gap:9px; align-items:flex-start; font-size:14px; color:var(--text); margin-bottom:8px; line-height:1.5;}
  .drawer-list li i{color:var(--primary); flex-shrink:0; margin-top:2px;}
  .drawer-cta-row{display:flex; gap:10px; margin-top:26px;}
  .btn-primary{
    background:var(--primary); color:#fff; padding:14px 22px; border-radius:var(--radius-btn); font-size:14.5px; font-weight:600;
    display:flex; align-items:center; justify-content:center; gap:8px; flex:1; transition:background .15s;
  }
  .btn-primary:hover{background:var(--primary-strong);}
  .btn-ghost{
    background:#fff; color:var(--primary); border:1.5px solid var(--sage); padding:14px 18px; border-radius:var(--radius-btn);
    font-size:14.5px; font-weight:600; display:flex; align-items:center; gap:8px;
  }
  .btn-ghost:hover{background:var(--linen);}

  /* ============ Generic page shells ============ */
  .page{max-width:1280px; margin:0 auto; padding:48px 32px 96px; animation:fadeIn .35s ease;}
  .page-narrow{max-width:640px;}
  .page-header{margin-bottom:36px;}
  .page-eyebrow{display:inline-flex; align-items:center; gap:6px; background:var(--mist); color:var(--primary-strong); font-size:12px; font-weight:700; padding:7px 14px; border-radius:999px; margin-bottom:14px;}
  .card-flat{background:#fff; border:1px solid var(--hairline); border-radius:var(--radius-card); padding:28px;}
  .card-flat.elevated{box-shadow:0 4px 20px rgba(15,62,23,0.06);}

  .form-grid{display:grid; grid-template-columns:1fr 1fr; gap:18px;}
  .form-field{display:flex; flex-direction:column; gap:7px; margin-bottom:18px;}
  .form-field.full{grid-column:1/-1;}
  .form-field label{font-size:13px; font-weight:600; color:var(--text);}
  .form-field .hint{font-size:12px; color:var(--text-tertiary);}
  .form-field input, .form-field textarea, .form-field select{
    border:1.5px solid var(--hairline); border-radius:10px; padding:12px 14px; font-size:14.5px; background:#fff;
    transition:border-color .15s ease;
  }
  .form-field input:focus, .form-field textarea:focus, .form-field select:focus{outline:none; border-color:var(--primary);}
  .form-field.prefilled input{background:var(--linen); border-color:var(--sage);}
  .form-field textarea{resize:vertical; min-height:110px;}

  .upload-zone{
    border:2px dashed var(--sage); border-radius:14px; padding:32px; text-align:center; background:var(--linen);
    transition:border-color .15s ease, background .15s ease; cursor:pointer;
  }
  .upload-zone.drag{border-color:var(--accent); background:#f4e6fb;}
  .upload-zone i{font-size:30px; color:var(--primary); margin-bottom:8px;}
  .upload-file-row{display:flex; align-items:center; gap:12px; background:#fff; border:1px solid var(--hairline); border-radius:10px; padding:12px 14px; margin-top:10px;}
  .upload-progress-track{flex:1; height:6px; border-radius:999px; background:var(--surface); overflow:hidden;}
  .upload-progress-bar{height:100%; background:var(--primary); border-radius:999px; transition:width .3s ease;}

  .success-block{text-align:center; padding:60px 20px;}
  .success-ring{
    width:84px; height:84px; border-radius:999px; background:var(--linen); display:flex; align-items:center; justify-content:center;
    margin:0 auto 24px; animation:fadeInUp .5s ease;
  }
  .success-ring i{font-size:40px; color:var(--primary);}

  /* mypage */
  .mypage-shell{display:grid; grid-template-columns:240px 1fr; gap:32px;}
  .mypage-profile-card{text-align:center; padding:28px 20px;}
  .avatar{width:76px; height:76px; border-radius:999px; margin:0 auto 14px; overflow:hidden; border:3px solid var(--linen);}
  .avatar img{width:100%; height:100%;}
  .tab-bar{display:flex; gap:4px; border-bottom:1px solid var(--hairline); margin-bottom:26px;}
  .tab-btn{padding:12px 6px; margin-right:22px; font-size:15px; color:var(--text-secondary); border-bottom:2.5px solid transparent; font-weight:500; transition:color .15s ease;}
  .tab-btn.active{color:var(--primary); border-color:var(--primary); font-weight:700;}
  .app-history-row{
    display:flex; align-items:center; gap:16px; padding:16px; border:1px solid var(--hairline); border-radius:12px; margin-bottom:12px;
    cursor:pointer; transition:border-color .15s ease, background .15s;
  }
  .app-history-row:hover{border-color:var(--sage); background:var(--linen);}
  .status-badge{padding:6px 12px; border-radius:999px; font-size:12px; font-weight:700; flex-shrink:0;}
  .status-접수{background:var(--surface); color:#4b5563;}
  .status-심사중{background:#f4e6fb; color:var(--accent);}
  .status-선발{background:var(--linen); color:var(--primary);}
  .status-불합격{background:#fdeceb; color:#c0392b;}
  .timeline-item{display:flex; gap:16px; padding-bottom:26px; position:relative;}
  .timeline-item::before{content:''; position:absolute; left:9px; top:22px; bottom:0; width:1.5px; background:var(--hairline);}
  .timeline-item:last-child::before{display:none;}
  .timeline-dot{width:20px; height:20px; border-radius:999px; background:var(--primary); flex-shrink:0; display:flex; align-items:center; justify-content:center;}
  .timeline-dot i{color:#fff; font-size:11px;}
  .interest-chip{display:inline-flex; align-items:center; gap:6px; padding:8px 14px; border-radius:999px; border:1.5px solid var(--hairline); font-size:13px; margin:4px 6px 4px 0;}
  .interest-chip.selected{background:var(--primary); color:#fff; border-color:var(--primary);}

  /* auth */
  .auth-shell{max-width:420px; margin:0 auto;}
  .social-btn{
    display:flex; align-items:center; justify-content:center; gap:10px; width:100%; padding:14px; border-radius:12px;
    border:1.5px solid var(--hairline); font-size:14.5px; font-weight:600; margin-bottom:12px; background:#fff;
  }
  .social-btn.kakao{background:#FEE500; border-color:#FEE500; color:#3C1E1E;}
  .social-btn.google{}
  .divider-row{display:flex; align-items:center; gap:12px; margin:22px 0; color:var(--text-tertiary); font-size:12.5px;}
  .divider-row::before, .divider-row::after{content:''; flex:1; height:1px; background:var(--hairline);}
  .checkbox-row{display:flex; align-items:flex-start; gap:10px; margin-bottom:12px; font-size:13.5px;}
  .checkbox-row input{margin-top:3px;}
  .checkbox-row.error{animation:none;}
  .terms-error{color:#c0392b; font-size:12.5px; margin:-4px 0 12px 26px;}
  .shake{animation:shakeX .4s ease;}
  @keyframes shakeX{ 0%,100%{transform:translateX(0);} 25%{transform:translateX(-6px);} 75%{transform:translateX(6px);} }

  /* modal */
  .modal-overlay{position:fixed; inset:0; background:rgba(15,20,17,0.4); display:flex; align-items:center; justify-content:center; z-index:100; padding:20px; animation:fadeIn .18s ease;}
  .modal-box{background:#fff; border-radius:16px; padding:28px; max-width:440px; width:100%; animation:fadeInUp .25s ease;}
  .modal-close{float:right; font-size:18px; color:var(--text-secondary);}

  .toast{
    position:fixed; bottom:30px; left:50%; background:var(--primary-strong); color:#fff; padding:14px 22px; border-radius:12px;
    font-size:14px; z-index:200; display:flex; align-items:center; gap:10px; animation:toastIn .3s ease;
    box-shadow:0 12px 28px rgba(0,0,0,0.2);
  }

  .footer{border-top:1px solid var(--hairline); margin-top:40px; background:#fff;}
  .footer-cols{max-width:1280px; margin:0 auto; padding:52px 32px 36px; display:grid; grid-template-columns:1.4fr 1fr 1fr 1fr; gap:32px;}
  .footer-col h4{font-size:13px; margin-bottom:14px; color:var(--text-secondary); font-weight:700;}
  .footer-col a{display:block; font-size:13.5px; color:var(--text); margin-bottom:9px;}
  .footer-brand{font-weight:600; color:var(--primary); font-size:16px; margin-bottom:10px; display:flex; align-items:center; gap:6px;}
  .footer-copy{max-width:1280px; margin:0 auto; padding:0 32px 36px; font-size:12px; color:var(--text-tertiary);}

  @media (max-width:860px){
    .search-bar{display:none;}
    .form-grid{grid-template-columns:1fr;}
    .mypage-shell{grid-template-columns:1fr;}
    .footer-cols{grid-template-columns:1fr 1fr;}
  }
</style>
</head>
<body data-archetype="airbnb-search-grid" data-ui-layout="spa-modern">
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef, useMemo } = React;

/* ---------------- mock data ---------------- */
const REGIONS = ['전체 지역','강원 정선','전남 순천','경북 안동','충남 홍성','부산 영도','제주 서귀포','경기 파주','전북 완주'];
const CATEGORIES = [
  {id:'all', label:'전체', icon:'squares-four'},
  {id:'local', label:'지역활동', icon:'map-trifold'},
  {id:'intern', label:'인턴십', icon:'briefcase'},
  {id:'program', label:'프로그램', icon:'flag'},
  {id:'research', label:'리서치', icon:'magnifying-glass'},
  {id:'startup', label:'창업연계', icon:'rocket-launch'},
  {id:'urgent', label:'마감임박', icon:'timer'},
  {id:'popular', label:'인기', icon:'fire'},
  {id:'new', label:'신규', icon:'sparkle'},
];

/* ---------------- small components ---------------- */
function Icon({name, className, fill}){
  return <i className={`ph${fill?'-fill':''} ph-${name} ${className||''}`}></i>;
}

function Toast({message, onDone}){
  useEffect(()=>{ const t = setTimeout(onDone, 2400); return ()=>clearTimeout(t); }, []);
  return (
    <div className="toast">
      <Icon name="check-circle" fill /> {message}
    </div>
  );
}

function FitRing({value}){
  const r = 40, c = 2*Math.PI*r;
  const [dash, setDash] = useState(c);
  useEffect(()=>{ const t=setTimeout(()=>setDash(c - (c*value/100)), 80); return ()=>clearTimeout(t); }, [value]);
  return (
    <svg width="90" height="90" viewBox="0 0 90 90">
      <circle cx="45" cy="45" r={r} fill="none" stroke="#e1f4df" strokeWidth="8"/>
      <circle cx="45" cy="45" r={r} fill="none" stroke="#0f3e17" strokeWidth="8" strokeLinecap="round"
        strokeDasharray={c} strokeDashoffset={dash} transform="rotate(-90 45 45)"
        style={{transition:'stroke-dashoffset 1s cubic-bezier(.2,.8,.2,1)'}}/>
      <text x="45" y="51" textAnchor="middle" fontSize="20" fontWeight="700" fill="#0f3e17">{value}%</text>
    </svg>
  );
}

function MainScreen({setScreen, region, deadline, activeCat, setActiveCat, favorites, toggleFavorite, openDetail, loading, advanced}){
  const filtered = useMemo(()=>{
    let list = PROGRAMS;
    if(activeCat==='urgent') list = list.filter(p=>p.dday<=14);
    else if(activeCat==='popular') list = list.filter(p=>p.badge==='인기');
    else if(activeCat==='new') list = list.filter(p=>p.badge==='신규');
    else if(activeCat!=='all') list = list.filter(p=>p.category===activeCat);
    if(region && region!=='전체 지역') list = list.filter(p=>p.region===region);
    if(deadline==='이번 주 마감') list = list.filter(p=>p.dday<=7);
    else if(deadline==='2주 이내') list = list.filter(p=>p.dday<=14);
    else if(deadline==='1개월 이내') list = list.filter(p=>p.dday<=30);

    if(!f) return;
    setFile(f.name);
    setProgress(0);
    let p = 0;
    const iv = setInterval(()=>{
      p += 22;
      setProgress(Math.min(p, 100));
      if(p>=100) clearInterval(iv);
    }, 140);
  };

  if(submitted){
    return (
      <div className="page page-narrow">
        <div className="success-block">
          <div className="success-ring"><Icon name="check-circle" fill/></div>
          <h2 className="t-heading">지원이 완료되었습니다</h2>

          <button className="btn-primary" style={{marginTop:28, display:'inline-flex'}} onClick={()=>showToast('마이페이지로 이동합니다')}>
            <Icon name="arrow-right"/> 마이페이지에서 확인하기
          </button>
        </div>
      </div>
    );
  }

  return (
    <div className="page page-narrow">
      <div className="page-header">
        <span className="page-eyebrow"><Icon name="file-text"/> 지원서 작성</span>
        <h1 className="t-heading">{prefillTitle || '프로그램 지원서'}</h1>

            <label>이름</label>

            <label>연락처</label>
            <input defaultValue="010-2841-7730" readOnly/>
          </div>
          <div className="form-field prefilled full">
            <label>이메일</label>
            <input defaultValue="doyoon.kim@example.com" readOnly/>
          </div>
          <div className="form-field full">
            <label>자기소개 및 지원 동기</label>
            <textarea placeholder="지역 프로그램에 참여하고 싶은 이유를 자유롭게 작성해주세요" value={motivation} onChange={e=>setMotivation(e.target.value)}></textarea>

            <label>이력서 · 포트폴리오 첨부</label>

              <div className="t-body-sm">파일을 드래그하거나 클릭해서 업로드하세요</div>
              <div className="t-caption">PDF, DOCX (최대 10MB)</div>
              <input id="fileInput" type="file" hidden onChange={(e)=>handleFile(e.target.files[0])}/>
            </div>
            {file && (
              <div className="upload-file-row">
                <Icon name="file-pdf"/>
                <span className="t-body-sm" style={{flexShrink:0}}>{file}</span>
                <div className="upload-progress-track"><div className="upload-progress-bar" style={{width:`${progress}%`}}></div></div>
                <span className="t-caption">{progress}%</span>
              </div>
            )}
          </div>
        </div>
        <button className="btn-primary" type="submit" style={{width:'100%', marginTop:8}}>
          <Icon name="paper-plane-tilt"/> 지원서 제출하기
        </button>
      </form>
    </div>
  );
}

            <div className="t-subheading">김도윤</div>

          </div>
        </div>
        <div>
          <div className="tab-bar">
            <button className={`tab-btn ${tab==='profile'?'active':''}`} onClick={()=>setTab('profile')}>프로필</button>

                <div className="form-field full"><label>한 줄 소개</label><input defaultValue="지역 문제를 기획으로 풀어가는 것을 좋아하는 주니어 기획자입니다"/></div>

                <Icon name="floppy-disk"/> 저장하기
              </button>
            </div>
          )}

          {tab==='history' && (
            <div>
              {APP_HISTORY.map(h=>(
                <div className="app-history-row" key={h.id} onClick={()=>setDetail(h)}>
                  <span className={`status-badge status-${h.status}`}>{h.status}</span>
                  <div style={{flex:1}}>
                    <div className="t-body-sm" style={{fontWeight:600}}>{h.title}</div>
                    <div className="t-caption">지원일 {h.date}</div>
                  </div>

          {tab==='activity' && (
            <div>

                    <div className="t-body-sm" style={{fontWeight:700}}>{a.title}</div>

/* ---------------- Auth screen ---------------- */
function AuthScreen({setScreen, showToast}){
  const [step, setStep] = useState('choose');
  const [agree, setAgree] = useState(false);
  const [error, setError] = useState(false);
  const [resetOpen, setResetOpen] = useState(false);
  const [resetSent, setResetSent] = useState(false);

  const submitSignup = () => {
    if(!agree){
      setError(true);
      setTimeout(()=>setError(false), 500);
      return;
    }
    setStep('done');
  };

  return (
    <div className="page auth-shell">
      {step==='choose' && (
        <div className="card-flat elevated">
          <h1 className="t-heading" style={{marginBottom:8}}>로컬브릿지 시작하기</h1>
          <p className="t-body-sm" style={{color:'#57635b', marginBottom:26}}>가입 후 전국의 지역 프로그램을 한눈에 탐색해보세요</p>
          <button className="social-btn kakao" onClick={()=>setStep('extra')}><Icon name="chat-circle" fill/> 카카오로 시작하기</button>
          <button className="social-btn google" onClick={()=>setStep('extra')}><Icon name="google-logo"/> 구글로 시작하기</button>
          <div className="divider-row">또는</div>
          <button className="social-btn" onClick={()=>setStep('email')}><Icon name="envelope-simple"/> 이메일로 가입하기</button>
        </div>
      )}

      {step==='email' && (
        <div className="card-flat elevated">
          <h1 className="t-heading-sm" style={{marginBottom:20}}>이메일로 가입하기</h1>
          <div className="form-field"><label>이메일</label><input type="email" placeholder="you@example.com"/></div>
          <div className="form-field"><label>비밀번호</label><input type="password" placeholder="영문, 숫자 포함 8자 이상"/></div>
          <p className="t-caption" style={{marginBottom:16, cursor:'pointer', color:'#0f3e17', fontWeight:600}} onClick={()=>setResetOpen(true)}>
            비밀번호를 잊으셨나요?
          </p>
          <button className="btn-primary" style={{width:'100%'}} onClick={()=>setStep('extra')}>다음</button>
        </div>
      )}

      {step==='extra' && (
        <div className="card-flat elevated">
          <h1 className="t-heading-sm" style={{marginBottom:6}}>부가정보 입력</h1>
          <p className="t-caption" style={{marginBottom:20}}>서비스 이용을 위한 몇 가지 정보가 필요해요</p>
          <div className="form-field"><label>이름</label><input placeholder="실명을 입력해주세요"/></div>
          <div className="form-field"><label>생년월일</label><input type="date"/></div>
          <div className="form-field"><label>관심 지역</label>
            <select><option>선택 안 함</option>{REGIONS.slice(1).map(r=>(<option key={r}>{r}</option>))}</select>
          </div>
          <div className={`checkbox-row ${error?'shake':''}`}>
            <input type="checkbox" checked={agree} onChange={e=>setAgree(e.target.checked)}/>
            <span>(필수) 이용약관 및 개인정보 처리방침에 동의합니다</span>
          </div>
          {error && <p className="terms-error">필수 약관에 동의해야 가입을 진행할 수 있습니다</p>}
          <button className="btn-primary" style={{width:'100%', marginTop:6}} onClick={submitSignup}>가입 완료</button>
        </div>
      )}

      {step==='done' && (
        <div className="success-block">
          <div className="success-ring"><Icon name="check-circle" fill/></div>
          <h2 className="t-heading">환영합니다!</h2>
          <p className="t-body" style={{color:'#57635b', marginTop:12}}>회원가입이 완료되었습니다. 지금 바로 나에게 맞는 지역 프로그램을 탐색해보세요.</p>
          <button className="btn-primary" style={{marginTop:26, display:'inline-flex'}} onClick={()=>setScreen('main')}>
            <Icon name="compass"/> 프로그램 탐색하러 가기
          </button>
        </div>
      )}

      {resetOpen && (
        <div className="modal-overlay" onClick={()=>{setResetOpen(false); setResetSent(false);}}>
          <div className="modal-box" onClick={e=>e.stopPropagation()}>
            <button className="modal-close" onClick={()=>{setResetOpen(false); setResetSent(false);}}><Icon name="x"/></button>
            <h3 className="t-subheading" style={{marginBottom:14}}>비밀번호 재설정</h3>
            {!resetSent ? (
              <React.Fragment>
                <div className="form-field"><label>가입한 이메일</label><input type="email" placeholder="you@example.com"/></div>
                <button className="btn-primary" style={{width:'100%'}} onClick={()=>{ setResetSent(true); showToast('재설정 링크를 이메일로 보냈습니다'); }}>재설정 링크 보내기</button>
              </React.Fragment>
            ) : (
              <p className="t-body-sm" style={{color:'#57635b'}}><Icon name="check-circle"/> 이메일함을 확인해주세요. 재설정 링크가 발송되었습니다.</p>
            )}
          </div>
        </div>
      )}
    </div>
  );
}

          <div className="footer-brand"><Icon name="compass"/> 로컬브릿지</div>
          <p className="t-caption">도시 청년과 지역의 실제 프로젝트를 잇는 로컬 일경험 매칭 플랫폼입니다.</p>

        <div className="footer-col"><h4>지원</h4><a>자주 묻는 질문</a><a>1:1 문의</a><a>공지사항</a></div>

/* ---------------- App ---------------- */
function App(){
  const [screen, setScreen] = useState('main');
  const [region, setRegion] = useState('전체 지역');
  const [deadline, setDeadline] = useState('전체 기간');
  const [activeCat, setActiveCat] = useState('all');
  const [openDropdown, setOpenDropdown] = useState(null);
  const [advancedOpen, setAdvancedOpen] = useState(false);
  const [advanced, setAdvanced] = useState([]);
  const toggleAdvanced = (key) => setAdvanced(prev => prev.includes(key) ? prev.filter(x=>x!==key) : [...prev, key]);
  const [favorites, setFavorites] = useState([2, 6]);
  const [pulsingId, setPulsingId] = useState(null);
  const [detailProgram, setDetailProgram] = useState(null);
  const [prefillTitle, setPrefillTitle] = useState('');
  const [toast, setToast] = useState(null);
  const [loading, setLoading] = useState(false);

  const showToast = (msg) => setToast(msg);

  const toggleFavorite = (id) => {
    setFavorites(prev => prev.includes(id) ? prev.filter(x=>x!==id) : [...prev, id]);
    setPulsingId(id);
    setTimeout(()=>setPulsingId(null), 450);
  };

  const onSearch = () => {
    setOpenDropdown(null);
    setLoading(true);
    setTimeout(()=>setLoading(false), 650);
  };

  const openDetail = (p) => setDetailProgram(p);
  const closeDetail = () => setDetailProgram(null);
  const goApply = (p) => {
    setPrefillTitle(p ? p.title : '');
    setDetailProgram(null);
    setScreen('apply');
  };

  useEffect(()=>{
    const closeAll = () => { setOpenDropdown(null); setAdvancedOpen(false); };
    window.addEventListener('click', closeAll);
    return () => window.removeEventListener('click', closeAll);
  }, []);

  return (
    <div className="app" style={{width:'100%'}}>
      <Header screen={screen} setScreen={setScreen} openDropdown={openDropdown} setOpenDropdown={setOpenDropdown}
        region={region} setRegion={setRegion} deadline={deadline} setDeadline={setDeadline} onSearch={onSearch}/>
      {screen==='main' && <FilterChips activeCat={activeCat} setActiveCat={setActiveCat}
        advancedOpen={advancedOpen} setAdvancedOpen={setAdvancedOpen} advanced={advanced} toggleAdvanced={toggleAdvanced}/>}

      {screen==='main' && (
        <MainScreen setScreen={setScreen} region={region} deadline={deadline} activeCat={activeCat} setActiveCat={setActiveCat} advanced={advanced}
          favorites={favorites} toggleFavorite={toggleFavorite} openDetail={openDetail} loading={loading}/>
      )}
      {screen==='apply' && <ApplyScreen prefillTitle={prefillTitle} showToast={showToast}/>}
      {screen==='mypage' && <MypageScreen showToast={showToast}/>}
      {screen==='auth' && <AuthScreen setScreen={setScreen} showToast={showToast}/>}

      <Footer/>

      {detailProgram && (
        <DetailDrawer program={detailProgram} onClose={closeDetail} onApply={goApply} favorites={favorites} toggleFavorite={toggleFavorite}/>
      )}
      {toast && <Toast message={toast} onDone={()=>setToast(null)}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
