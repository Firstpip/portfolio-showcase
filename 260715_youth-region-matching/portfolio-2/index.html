<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>로컬브릿지 파트너 콘솔 — 청년-지역 매칭 통합 운영 플랫폼</title>
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
<link rel="stylesheet" href="https://unpkg.com/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script crossorigin src="https://unpkg.com/prop-types@15/prop-types.min.js"></script>
<script crossorigin src="https://unpkg.com/react-is@18/umd/react-is.production.min.js"></script>
<script crossorigin src="https://unpkg.com/recharts@2/umd/Recharts.js"></script>
<style>
  :root{
    --void:#08090a;
    --carbon:#0f1011;
    --obsidian:#161718;
    --graphite:#23252a;
    --smoke:#383b3f;
    --ash:#62666d;
    --fog:#8a8f98;
    --mist:#d0d6e0;
    --bone:#e5e5e6;
    --paper:#ffffff;
    --lime:#e4f222;
    --blue:#4893f4;
    --green:#27a644;
    --red:#eb5757;
    --violet:#6366f1;
    --radius-card:12px;
    --radius-btn:6px;
    --radius-pill:9999px;
    --radius-badge:4px;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  html,body{width:100%; min-height:100vh;}
  body{
    font-family:'Pretendard', -apple-system, BlinkMacSystemFont, sans-serif;
    background:var(--void);
    color:var(--paper);
    font-weight:400;
    -webkit-font-smoothing:antialiased;
    overflow-x:hidden;
  }
  #root{width:100%;}
  button{font-family:inherit; border:none; background:none; cursor:pointer; color:inherit;}
  input,textarea,select{font-family:inherit; font-size:13px; color:var(--paper);}
  a{text-decoration:none; color:inherit;}
  ul{list-style:none;}
  table{border-collapse:collapse; width:100%;}

  .t-caption{font-size:13px; line-height:1.2; color:var(--fog);}
  .t-body-sm{font-size:15px; line-height:1.6; letter-spacing:-0.011em;}
  .t-body{font-size:16px; line-height:1.5;}
  .t-body-lg{font-size:20px; line-height:1.33; letter-spacing:-0.012em;}
  .t-subheading{font-size:24px; line-height:1.33; letter-spacing:-0.012em; font-weight:600;}
  .t-heading-sm{font-size:32px; line-height:1.13; letter-spacing:-0.02em; font-weight:600;}
  .t-heading{font-size:40px; line-height:1.05; letter-spacing:-0.02em; font-weight:600;}
  .t-heading-lg{font-size:48px; line-height:1; letter-spacing:-0.02em; font-weight:600;}

  @keyframes barGrow{ from{transform:scaleY(0);} to{transform:scaleY(1);} }
  @keyframes rowFadeIn{ from{opacity:0; transform:translateY(6px);} to{opacity:1; transform:translateY(0);} }
  @keyframes ringPulse{ 0%{box-shadow:0 0 0 0 rgba(228,242,34,0.5);} 70%{box-shadow:0 0 0 8px rgba(228,242,34,0);} 100%{box-shadow:0 0 0 0 rgba(228,242,34,0);} }
  @keyframes spin{ to{transform:rotate(360deg);} }
  @keyframes toastSlide{ from{opacity:0; transform:translate(-50%,14px);} to{opacity:1; transform:translate(-50%,0);} }
  @keyframes panelIn{ from{opacity:0; transform:translateX(24px);} to{opacity:1; transform:translateX(0);} }
  @keyframes fadeIn{ from{opacity:0;} to{opacity:1;} }
  @keyframes drawerIn{ from{transform:translateX(100%);} to{transform:translateX(0);} }

  /* ============ sidebar-classic + stripe-multipane skeleton ============ */
  .shell{display:flex; width:100%; min-height:100vh;}
  .sidebar{
    position:fixed; left:0; top:0; bottom:0; width:240px; background:var(--carbon);
    border-right:1px solid var(--graphite); display:flex; flex-direction:column; padding:18px 12px; z-index:30;
  }
  .sidebar-brand{display:flex; align-items:center; gap:10px; padding:8px 8px 18px; border-bottom:1px solid var(--graphite); margin-bottom:16px;}
  .sidebar-brand .mark{width:26px; height:26px; border-radius:6px; background:var(--lime); display:flex; align-items:center; justify-content:center; color:var(--void); font-weight:800; font-size:13px;}
  .sidebar-brand .name{font-size:14px; font-weight:600; letter-spacing:-0.01em;}
  .env-select{
    display:flex; align-items:center; gap:6px; margin:0 8px 20px; padding:7px 10px; border-radius:var(--radius-btn);
    background:rgba(255,255,255,0.03); border:1px solid var(--graphite); font-size:12px; color:var(--mist); justify-content:space-between;
  }
  .env-dot{width:6px; height:6px; border-radius:999px; background:var(--green); animation:ringPulse 2s infinite;}
  .sidebar-section{margin-bottom:20px; padding:0 4px;}
  .sidebar-section-title{font-size:11px; color:var(--ash); text-transform:uppercase; letter-spacing:.06em; padding:0 8px 8px; font-weight:600;}
  .sidebar-link{
    display:flex; align-items:center; gap:10px; padding:9px 10px; border-radius:var(--radius-btn); font-size:13.5px; color:var(--mist);
    margin-bottom:2px; transition:background .12s ease;
  }
  .sidebar-link i{font-size:16px; color:var(--fog); width:18px;}
  .sidebar-link:hover{background:rgba(255,255,255,0.04);}
  .sidebar-link.active{background:rgba(228,242,34,0.08); color:var(--paper);}
  .sidebar-link.active i{color:var(--lime);}
  .sidebar-footer{margin-top:auto; padding:10px 8px; border-top:1px solid var(--graphite); display:flex; align-items:center; gap:10px;}
  .sidebar-footer img{width:28px; height:28px; border-radius:999px;}
  .sidebar-footer .who{font-size:12.5px; font-weight:600;}
  .sidebar-footer .role{font-size:11px; color:var(--fog);}

  .main-wrap{margin-left:240px; flex:1; min-width:0; width:calc(100% - 240px); min-height:100vh;}
  .page{max-width:1320px; margin:0 auto; padding:28px 36px 80px; animation:fadeIn .3s ease;}

  .hero-floor{
    position:relative; margin:-28px -36px 24px; padding:40px 36px 26px;
    background:
      radial-gradient(ellipse 55% 120% at 20% 0%, rgba(228,242,34,0.12), transparent 60%),
      radial-gradient(ellipse 45% 100% at 85% 0%, rgba(72,147,244,0.10), transparent 65%),
      linear-gradient(180deg, #0d0e0f 0%, #08090a 100%);
    border-bottom:1px solid var(--graphite);
    overflow:hidden;
  }
  .hero-floor::after{
    content:''; position:absolute; left:0; right:0; bottom:-1px; height:60px;
    background:linear-gradient(180deg, transparent, rgba(208,214,224,0.05));
  }
  .hero-floor .page-header{margin-bottom:0;}
  .page-header{display:flex; align-items:flex-start; justify-content:space-between; margin-bottom:24px; flex-wrap:wrap; gap:14px; position:relative; z-index:1;}
  .page-title-row h1{font-size:22px; font-weight:600; letter-spacing:-0.01em;}
  .page-meta{font-size:12.5px; color:var(--fog); margin-top:6px;}
  .page-actions{display:flex; gap:8px;}
  .btn-secondary{
    display:flex; align-items:center; gap:6px; padding:8px 14px; border-radius:var(--radius-btn); border:1px solid var(--graphite);
    background:rgba(255,255,255,0.02); font-size:13px; color:var(--mist);
  }
  .btn-secondary:hover{border-color:var(--smoke); background:rgba(255,255,255,0.04);}
  .btn-primary{
    display:flex; align-items:center; gap:7px; padding:9px 16px; border-radius:var(--radius-btn); background:var(--lime); color:var(--void);
    font-size:13.5px; font-weight:600;
  }
  .btn-primary:hover{filter:brightness(0.94);}
  .btn-ghost-outline{
    display:flex; align-items:center; gap:6px; padding:8px 14px; border-radius:var(--radius-btn); border:1px solid var(--graphite);
    color:var(--mist); font-size:13px;
  }
  .btn-ghost-outline:hover{border-color:var(--smoke);}
  .btn-danger-outline{border:1px solid rgba(235,87,87,0.4); color:var(--red);}

  /* KPI stat row */
  .stat-row{display:grid; grid-template-columns:repeat(4, 1fr); gap:14px; margin-bottom:22px;}
  .stat-card{
    background:var(--carbon); border:1px solid var(--graphite); border-radius:var(--radius-card); padding:18px 20px;
    opacity:0; animation:rowFadeIn .4s ease forwards;
  }
  .stat-label{font-size:12.5px; color:var(--fog); margin-bottom:10px;}
  .stat-value{font-size:30px; font-weight:700; letter-spacing:-0.02em; margin-bottom:6px;}
  .stat-delta{font-size:12px; font-weight:600; display:flex; align-items:center; gap:4px;}
  .stat-delta.positive{color:var(--green);}
  .stat-delta.negative{color:var(--red);}
  .stat-sparkline{margin-top:10px; display:block;}

  /* insight-board composition: hero-viz + kpi-side + widget-grid */
  .insight-grid{display:grid; grid-template-columns:1.6fr 1fr; gap:16px; margin-bottom:16px;}
  .panel{background:var(--carbon); border:1px solid var(--graphite); border-radius:var(--radius-card); padding:22px;}
  .panel-head{display:flex; align-items:center; justify-content:space-between; margin-bottom:16px;}
  .panel-head h3{font-size:14.5px; font-weight:600;}
  .chart-wrap{position:relative; height:280px;}
  .kpi-side .kpi-item{display:flex; align-items:center; justify-content:space-between; padding:12px 0; border-bottom:1px solid var(--graphite);}
  .kpi-side .kpi-item:last-child{border-bottom:none;}
  .kpi-item .label{font-size:13px; color:var(--mist);}
  .kpi-item .value{font-size:16px; font-weight:700;}
  .followup-list{margin-top:14px;}
  .followup-row{display:flex; align-items:center; gap:10px; padding:9px 0;}
  .followup-row .dot{width:8px; height:8px; border-radius:999px; flex-shrink:0;}
  .followup-row .txt{flex:1; font-size:12.5px; color:var(--mist);}
  .followup-row .n{font-size:13px; font-weight:700;}

  .widget-grid{display:grid; grid-template-columns:1fr 1fr 1.2fr; gap:16px;}
  .donut-legend{display:flex; flex-direction:column; gap:8px; margin-top:12px;}
  .legend-row{display:flex; align-items:center; gap:8px; font-size:12px; color:var(--mist);}
  .legend-dot{width:8px; height:8px; border-radius:999px;}
  .bar-mini-row{display:flex; align-items:center; gap:10px; margin-bottom:10px;}
  .bar-mini-label{font-size:11.5px; color:var(--fog); width:74px; flex-shrink:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}
  .bar-mini-track{flex:1; height:8px; background:var(--graphite); border-radius:999px; overflow:hidden;}
  .bar-mini-fill{height:100%; background:var(--blue); border-radius:999px; transform-origin:left; animation:barGrow .6s ease forwards;}
  .timeline-mini{display:flex; gap:10px; padding:9px 0; border-bottom:1px solid var(--graphite);}
  .timeline-mini:last-child{border-bottom:none;}
  .timeline-mini .t{font-size:11px; color:var(--ash); width:44px; flex-shrink:0;}
  .timeline-mini .d{font-size:12.5px; color:var(--mist);}

  /* tab bar + toolbar + table */
  .data-section{margin-top:6px;}
  .tab-bar{display:flex; gap:22px; border-bottom:1px solid var(--graphite); margin-bottom:16px;}
  .tab{padding:10px 2px; font-size:13.5px; color:var(--fog); border-bottom:2px solid transparent; font-weight:500;}
  .tab.active{color:var(--paper); border-color:var(--lime); font-weight:700;}
  .data-toolbar{display:flex; align-items:center; gap:10px; margin-bottom:14px; flex-wrap:wrap;}
  .search-input{
    display:flex; align-items:center; gap:8px; background:rgba(255,255,255,0.02); border:1px solid var(--graphite);
    border-radius:var(--radius-btn); padding:8px 12px; flex:1; min-width:200px; max-width:320px;
  }
  .search-input input{background:none; border:none; outline:none; flex:1; font-size:13px;}
  .filter-chip{
    display:flex; align-items:center; gap:6px; padding:7px 12px; border-radius:var(--radius-pill); border:1px solid var(--graphite);
    font-size:12.5px; color:var(--mist);
  }
  .filter-chip.active{border-color:var(--lime); color:var(--lime); background:rgba(228,242,34,0.06);}
  .export-btn{margin-left:auto;}

  .data-table-wrap{background:var(--carbon); border:1px solid var(--graphite); border-radius:var(--radius-card); overflow:hidden;}
  .data-table th{
    text-align:left; font-size:11.5px; color:var(--ash); text-transform:uppercase; letter-spacing:.04em; font-weight:600;
    padding:12px 16px; border-bottom:1px solid var(--graphite); background:rgba(255,255,255,0.01);
  }
  .data-table td{padding:13px 16px; font-size:13px; color:var(--mist); border-bottom:1px solid var(--graphite);}
  .data-table tr.row{opacity:0; animation:rowFadeIn .35s ease forwards; cursor:pointer; transition:background .12s ease;}
  .data-table tr.row:hover{background:rgba(255,255,255,0.025);}
  .data-table tr.row.selected{background:rgba(228,242,34,0.05);}
  .data-table tr:last-child td{border-bottom:none;}
  .badge{display:inline-flex; align-items:center; gap:5px; padding:3px 9px; border-radius:var(--radius-badge); font-size:11.5px; font-weight:600;}
  .badge-초안{background:rgba(255,255,255,0.06); color:var(--fog);}
  .badge-게시{background:rgba(72,147,244,0.14); color:var(--blue);}
  .badge-모집중{background:rgba(39,166,68,0.14); color:var(--green);}
  .badge-마감{background:rgba(235,87,87,0.14); color:var(--red);}
  .badge-접수{background:rgba(255,255,255,0.06); color:var(--fog);}
  .badge-서류심사{background:rgba(72,147,244,0.14); color:var(--blue);}
  .badge-면접{background:rgba(99,102,241,0.14); color:var(--violet);}
  .badge-합격{background:rgba(39,166,68,0.14); color:var(--green);}
  .badge-불합격{background:rgba(235,87,87,0.14); color:var(--red);}
  .badge-활동중{background:rgba(39,166,68,0.14); color:var(--green);}
  .badge-휴면{background:rgba(255,255,255,0.06); color:var(--fog);}
  .badge-위험{background:rgba(235,87,87,0.14); color:var(--red);}
  .row-checkbox{width:16px; height:16px; accent-color:var(--lime);}
  .row-actions{color:var(--fog); font-size:16px;}
  .row-actions:hover{color:var(--paper);}

  .bulk-bar{
    display:flex; align-items:center; gap:14px; background:var(--obsidian); border:1px solid var(--lime); border-radius:var(--radius-btn);
    padding:10px 16px; margin-bottom:12px; animation:rowFadeIn .2s ease;
  }
  .bulk-bar .count{font-size:13px; font-weight:600;}
  .bulk-bar .actions{display:flex; gap:8px; margin-left:auto;}

  /* slide-over / drawer */
  .drawer-backdrop{position:fixed; inset:0; background:rgba(0,0,0,0.5); z-index:80; animation:fadeIn .2s ease;}
  .side-panel{
    position:fixed; top:0; right:0; bottom:0; width:min(480px,94vw); background:var(--carbon); border-left:1px solid var(--graphite);
    z-index:90; overflow-y:auto; animation:drawerIn .28s cubic-bezier(.22,.9,.32,1);
  }
  .side-panel-head{display:flex; align-items:center; justify-content:space-between; padding:20px 22px; border-bottom:1px solid var(--graphite);}
  .side-panel-body{padding:22px;}
  .close-btn{width:30px; height:30px; border-radius:999px; display:flex; align-items:center; justify-content:center; color:var(--fog);}
  .close-btn:hover{background:rgba(255,255,255,0.06); color:var(--paper);}

  .form-field{margin-bottom:16px; display:flex; flex-direction:column; gap:6px;}
  .form-field label{font-size:12.5px; color:var(--mist); font-weight:600;}
  .form-field input, .form-field textarea, .form-field select{
    background:rgba(255,255,255,0.02); border:1px solid var(--graphite); border-radius:var(--radius-btn); padding:10px 12px; font-size:13.5px; outline:none;
  }
  .form-field input:focus, .form-field textarea:focus, .form-field select:focus{border-color:var(--mist);}
  .form-field textarea{resize:vertical; min-height:90px;}
  .form-row{display:grid; grid-template-columns:1fr 1fr; gap:12px;}
  .score-row{display:flex; align-items:center; gap:8px; margin-bottom:6px;}
  .score-star{font-size:20px; color:var(--graphite); cursor:pointer;}
  .score-star.on{color:var(--lime);}

  .profile-drawer-header{display:flex; align-items:center; gap:14px; margin-bottom:20px;}
  .profile-drawer-header img{width:56px; height:56px; border-radius:999px;}
  .memo-item{background:rgba(255,255,255,0.02); border:1px solid var(--graphite); border-radius:var(--radius-btn); padding:12px; margin-bottom:10px;}
  .memo-item .meta{font-size:11px; color:var(--ash); margin-bottom:6px;}

  .modal-overlay{position:fixed; inset:0; background:rgba(0,0,0,0.55); display:flex; align-items:center; justify-content:center; z-index:120; padding:20px;}
  .modal-box{background:var(--obsidian); border:1px solid var(--graphite); border-radius:14px; padding:26px; max-width:420px; width:100%; animation:rowFadeIn .2s ease;}

  .toast{
    position:fixed; bottom:28px; left:50%; background:var(--lime); color:var(--void); padding:13px 20px; border-radius:var(--radius-btn);
    font-size:13.5px; font-weight:600; z-index:200; animation:toastSlide .3s ease; box-shadow:0 14px 30px rgba(0,0,0,0.4);
  }

  .empty-cell{padding:60px 20px; text-align:center; color:var(--fog);}
  .loading-spin{width:16px; height:16px; border:2px solid var(--graphite); border-top-color:var(--lime); border-radius:999px; animation:spin .7s linear infinite; display:inline-block;}

  @media (max-width:1100px){
    .stat-row{grid-template-columns:repeat(2,1fr);}
    .insight-grid{grid-template-columns:1fr;}
    .widget-grid{grid-template-columns:1fr;}
    .form-row{grid-template-columns:1fr;}
  }
  @media (max-width:600px){
    .page-actions{flex-wrap:wrap; width:100%;}
    .page-actions button{font-size:12px; padding:7px 10px;}
    .stat-row{grid-template-columns:1fr;}
  }
</style>
</head>
<body data-archetype="stripe-multipane" data-ui-layout="sidebar-classic">
<div id="root"></div>
<script type="text/babel">

const POSTINGS = [

function Sparkline({data, color}){
  const w=76,h=28;
  const max=Math.max(...data), min=Math.min(...data);
  const pts = data.map((v,i)=>{
    const x = (i/(data.length-1))*w;
    const y = h - ((v-min)/(max-min||1))*h;
    return `${x},${y}`;
  }).join(' ');
  return (
    <svg className="stat-sparkline" width={w} height={h} viewBox={`0 0 ${w} ${h}`}>
      <polyline points={pts} fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/>
    </svg>
  );
}

  const [filter, setFilter] = useState('전체');
  const postingOptions = ['전체 공고', ...new Set(APPLICANTS.map(a=>a.posting))];
  const [postingFilter, setPostingFilter] = useState('전체 공고');

  const toggleSelect = (id) => setSelected(prev => prev.includes(id) ? prev.filter(x=>x!==id) : [...prev, id]);
  const toggleAll = () => setSelected(selected.length===APPLICANTS.length ? [] : APPLICANTS.map(a=>a.id));

  const bulkApprove = () => {
    const map = {...statusMap};
    selected.forEach(id => map[id] = '합격');
    setStatusMap(map);
    showToast(`${selected.length}명을 일괄 합격 처리했습니다`);
    setSelected([]);
  };

  const cyclePostingFilter = () => setPostingFilter(postingOptions[(postingOptions.indexOf(postingFilter)+1)%postingOptions.length]);

  const list = APPLICANTS
    .filter(a => filter==='전체' || (statusMap[a.id]||a.status)===filter)
    .filter(a => postingFilter==='전체 공고' || a.posting===postingFilter);

  return (
    <div className="page">
      <div className="page-header">
        <div className="page-title-row">
          <h1>지원자 관리</h1>
          <div className="page-meta">공고별·상태별로 지원자를 조회하고 평가 데이터를 입력합니다</div>
        </div>
      </div>

      <div className="data-section">
        <div className="tab-bar">
          {['전체','접수','서류심사','면접','합격','불합격'].map(s=>(
            <button key={s} className={`tab ${filter===s?'active':''}`} onClick={()=>setFilter(s)}>{s}</button>
          ))}
        </div>
        <div className="data-toolbar">
          <div className="search-input"><i className="ti ti-search"></i><input placeholder="지원자명 검색"/></div>
          <button className={`filter-chip ${postingFilter!=='전체 공고'?'active':''}`} onClick={cyclePostingFilter}><i className="ti ti-filter"></i>{postingFilter}</button>
          <button className="btn-secondary export-btn" onClick={()=>showToast('지원자 목록을 CSV로 내보냈습니다')}><i className="ti ti-file-export"></i>내보내기</button>
        </div>

        {selected.length>0 && (
          <div className="bulk-bar">
            <span className="count">{selected.length}명 선택됨</span>
            <div className="actions">
              <button className="btn-ghost-outline" onClick={()=>setSelected([])}>선택 해제</button>
              <button className="btn-primary" onClick={bulkApprove}><i className="ti ti-check"></i>일괄 합격 처리</button>
            </div>
          </div>
        )}

        <div className="data-table-wrap">
          <table className="data-table">
            <thead>
              <tr>
                <th style={{width:36}}><input type="checkbox" className="row-checkbox" checked={selected.length===APPLICANTS.length} onChange={toggleAll}/></th>
                <th>지원자</th><th>지원 공고</th><th>지원일</th><th>평가 점수</th><th>상태</th><th></th>
              </tr>
            </thead>
            <tbody>
              {list.map((a,i)=>(
                <tr className={`row ${selected.includes(a.id)?'selected':''}`} style={{animationDelay:`${i*40}ms`}} key={a.id}>
                  <td onClick={(e)=>{e.stopPropagation(); toggleSelect(a.id);}}>
                    <input type="checkbox" className="row-checkbox" checked={selected.includes(a.id)} onChange={()=>{}}/>
                  </td>
                  <td onClick={()=>{setDetail(a); setScore(a.score||0); setRole(''); setComment('');}} style={{display:'flex', alignItems:'center', gap:10, color:'var(--paper)', fontWeight:600, border:'none'}}>
                    <img src={avatarUrl(a.avatar)} alt={a.name} style={{width:26, height:26, borderRadius:999}}/>{a.name}
                  </td>
                  <td onClick={()=>setDetail(a)}>{a.posting}</td>
                  <td onClick={()=>setDetail(a)}>{a.date}</td>
                  <td onClick={()=>setDetail(a)}>{a.score ? `★ ${a.score}.0` : '-'}</td>
                  <td onClick={()=>setDetail(a)}><span className={`badge badge-${statusMap[a.id]||a.status}`}>{statusMap[a.id]||a.status}</span></td>
                  <td><i className="ti ti-dots row-actions" onClick={()=>setDetail(a)}></i></td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      </div>

      {detail && (
        <React.Fragment>
          <div className="drawer-backdrop" onClick={()=>setDetail(null)}></div>
          <aside className="side-panel">
            <div className="side-panel-head">
              <h3 className="t-subheading" style={{fontSize:16}}>지원자 평가</h3>
              <button className="close-btn" onClick={()=>setDetail(null)}><i className="ti ti-x"></i></button>
            </div>
            <div className="side-panel-body">
              <div className="profile-drawer-header">
                <img src={avatarUrl(detail.avatar)} alt={detail.name}/>
                <div>
                  <div className="t-body-lg" style={{fontWeight:700}}>{detail.name}</div>
                  <div className="t-caption">{detail.posting} · 지원일 {detail.date}</div>
                </div>
              </div>
              <div className="form-field">
                <label>평가 점수</label>
                <div className="score-row">
                  {[1,2,3,4,5].map(n=>(
                    <span key={n} className={`score-star ${n<=score?'on':''}`} onClick={()=>setScore(n)}>★</span>
                  ))}
                </div>
              </div>
              <div className="form-field"><label>추천 역할</label>
                <select value={role} onChange={e=>setRole(e.target.value)}>
                  <option value="">선택 안 함</option>
                  <option>기획 서포터즈</option>
                  <option>콘텐츠 제작</option>
                  <option>현장 운영</option>
                  <option>데이터 리서치</option>
                </select>
              </div>
              <div className="form-field"><label>코멘트</label>
                <textarea value={comment} onChange={e=>setComment(e.target.value)} placeholder="평가 코멘트를 입력하세요"></textarea>
              </div>
              <div style={{display:'flex', gap:8}}>
                <button className="btn-ghost-outline btn-danger-outline" style={{flex:1, justifyContent:'center'}}
                  onClick={()=>{ setStatusMap(prev=>({...prev, [detail.id]:'불합격'})); showToast(`${detail.name}님을 불합격 처리했습니다`); setDetail(null); }}>
                  불합격 처리
                </button>
                <button className="btn-primary" style={{flex:1, justifyContent:'center'}}
                  onClick={()=>{ setStatusMap(prev=>({...prev, [detail.id]:'합격'})); showToast(`${detail.name}님을 합격 처리하고 평가를 저장했습니다`); setDetail(null); }}>
                  합격 처리 + 저장
                </button>
              </div>
            </div>
          </aside>
        </React.Fragment>
      )}
    </div>
  );
}

/* ---------------- Talents screen ---------------- */
function TalentsScreen({showToast}){
  const [riskFilter, setRiskFilter] = useState('전체');
  const [detail, setDetail] = useState(null);
  const [memoInput, setMemoInput] = useState('');
  const [memos, setMemos] = useState({});
  const [confirmToggle, setConfirmToggle] = useState(null);
  const [statusMap, setStatusMap] = useState({});
  const [reason, setReason] = useState('');

  const list = TALENTS.filter(t => riskFilter==='전체' || t.risk===riskFilter);

  const addMemo = (id) => {
    if(!memoInput.trim()) return;
    setMemos(prev => ({...prev, [id]: [...(prev[id]||[]), {text:memoInput, at:'방금 · 비커넥트랩 운영자'}]}));
    setMemoInput('');
    showToast('메모가 기록되었습니다');
  };

  const applyToggle = () => {
    const t = confirmToggle;
    const next = (statusMap[t.id]||t.status)==='휴면' ? '활동중' : '휴면';
    setStatusMap(prev=>({...prev, [t.id]:next}));
    showToast(`${t.name}님 계정을 ${next==='휴면'?'비활성화':'활성화'}했습니다`);
    setConfirmToggle(null);
    setReason('');
  };

  return (
    <div className="page">
      <div className="page-header">
        <div className="page-title-row">
          <h1>청년 인재 관리</h1>
          <div className="page-meta">활동 상태·리스크 신호를 교차 조회하고 계정을 관리합니다</div>
        </div>
      </div>

      <div className="data-section">
        <div className="tab-bar">
          {['전체','낮음','중간','높음'].map(r=>(
            <button key={r} className={`tab ${riskFilter===r?'active':''}`} onClick={()=>setRiskFilter(r)}>{r==='전체'?'전체':`리스크 ${r}`}</button>
          ))}
        </div>
        <div className="data-toolbar">
          <div className="search-input"><i className="ti ti-search"></i><input placeholder="이름으로 검색"/></div>
          <button className="btn-secondary export-btn" onClick={()=>showToast('청년 인재 목록을 CSV로 내보냈습니다')}><i className="ti ti-file-export"></i>내보내기</button>
        </div>
        <div className="data-table-wrap">
          <table className="data-table">
            <thead>
              <tr><th>이름</th><th>활동 상태</th><th>리스크</th><th>참여 프로그램</th><th>최근 활동</th><th></th></tr>
            </thead>
            <tbody>
              {list.map((t,i)=>(
                <tr className="row" style={{animationDelay:`${i*40}ms`}} key={t.id} onClick={()=>setDetail(t)}>
                  <td style={{display:'flex', alignItems:'center', gap:10, color:'var(--paper)', fontWeight:600, border:'none'}}>
                    <img src={avatarUrl(t.avatar)} style={{width:26,height:26,borderRadius:999}}/>{t.name}
                  </td>
                  <td><span className={`badge badge-${statusMap[t.id]||t.status}`}>{statusMap[t.id]||t.status}</span></td>
                  <td>{t.risk}</td>
                  <td>{t.programs}개</td>
                  <td>{t.lastActive}</td>
                  <td><i className="ti ti-note row-actions" title="메모">{t.memos>0 && <span style={{fontSize:10, marginLeft:2}}>{t.memos}</span>}</i></td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      </div>

      {detail && (
        <React.Fragment>
          <div className="drawer-backdrop" onClick={()=>setDetail(null)}></div>
          <aside className="side-panel">
            <div className="side-panel-head">
              <h3 className="t-subheading" style={{fontSize:16}}>청년 인재 프로필</h3>
              <button className="close-btn" onClick={()=>setDetail(null)}><i className="ti ti-x"></i></button>
            </div>
            <div className="side-panel-body">
              <div className="profile-drawer-header">
                <img src={avatarUrl(detail.avatar)} alt={detail.name}/>
                <div>
                  <div className="t-body-lg" style={{fontWeight:700}}>{detail.name}</div>
                  <div className="t-caption">참여 프로그램 {detail.programs}개 · 리스크 {detail.risk}</div>
                </div>
              </div>
              <div className="kpi-item"><span className="label">활동 상태</span><span className={`badge badge-${statusMap[detail.id]||detail.status}`}>{statusMap[detail.id]||detail.status}</span></div>
              <div className="kpi-item"><span className="label">최근 활동</span><span className="value" style={{fontSize:13}}>{detail.lastActive}</span></div>
              <button className="btn-ghost-outline btn-danger-outline" style={{width:'100%', justifyContent:'center', marginTop:14}}
                onClick={()=>setConfirmToggle(detail)}>
                <i className="ti ti-power"></i>{(statusMap[detail.id]||detail.status)==='휴면' ? '계정 활성화' : '계정 비활성화'}
              </button>

              <div className="form-field" style={{marginTop:22}}>
                <label>운영 메모</label>
                {(memos[detail.id]||[]).map((m,i)=>(
                  <div className="memo-item" key={i}><div className="meta">{m.at}</div>{m.text}</div>
                ))}
                <textarea value={memoInput} onChange={e=>setMemoInput(e.target.value)} placeholder="이 인재에 대한 메모를 남겨보세요"></textarea>
                <button className="btn-primary" style={{marginTop:8, justifyContent:'center'}} onClick={()=>addMemo(detail.id)}><i className="ti ti-note"></i>메모 저장</button>
              </div>
            </div>
          </aside>
        </React.Fragment>
      )}

      {confirmToggle && (
        <div className="modal-overlay" onClick={()=>setConfirmToggle(null)}>
          <div className="modal-box" onClick={e=>e.stopPropagation()}>
            <h3 className="t-subheading" style={{fontSize:17, marginBottom:10}}>
              {confirmToggle.name}님 계정을 {(statusMap[confirmToggle.id]||confirmToggle.status)==='휴면'?'활성화':'비활성화'}할까요?
            </h3>
            <div className="form-field"><label>사유 입력 (필수)</label><textarea value={reason} onChange={e=>setReason(e.target.value)} placeholder="처리 사유를 입력해주세요"></textarea></div>
            <div style={{display:'flex', gap:8, marginTop:6}}>
              <button className="btn-ghost-outline" style={{flex:1, justifyContent:'center'}} onClick={()=>setConfirmToggle(null)}>취소</button>
              <button className="btn-primary" style={{flex:1, justifyContent:'center', opacity: reason.trim()?1:0.45, pointerEvents: reason.trim()?'auto':'none'}} onClick={applyToggle}>확인</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

/* ---------------- App ---------------- */
function App(){
  const [screen, setScreen] = useState('main');
  const [env, setEnv] = useState('운영');
  const [toast, setToast] = useState(null);
  const showToast = (msg) => setToast(msg);

  return (
    <div className="shell" style={{width:'100%'}}>
      <Sidebar screen={screen} setScreen={setScreen} env={env} setEnv={setEnv}/>
      <div className="main-wrap">
        {screen==='main' && <MainScreen showToast={showToast}/>}
        {screen==='programs' && <ProgramsScreen showToast={showToast}/>}
        {screen==='applicants' && <ApplicantsScreen showToast={showToast}/>}
        {screen==='talents' && <TalentsScreen showToast={showToast}/>}
      </div>
      {toast && <Toast message={toast} onDone={()=>setToast(null)}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
