<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>노바브릿지 캐피탈 — 벤처 포트폴리오 디스커버리 플랫폼</title>
<link rel="preconnect" href="https://cdn.jsdelivr.net">
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" rel="stylesheet">
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<style>
  :root{
    --c-obsidian:#09090b; --c-graphite:#18181b; --c-slate:#27272a; --c-iron:#3f3f46;
    --c-steel:#52525b; --c-fog:#71717a; --c-ash:#a1a1aa; --c-mist:#d4d4d8;
    --c-cloud:#ececee; --c-paper:#f4f4f5; --c-snow:#ffffff; --c-ember:#ff5a00;
    --r-card:36px; --r-badge:12px; --r-btn:14px; --r-pill:10000px;
    --gap-section:80px;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  html,body{width:100%; overflow-x:hidden;}
  body{
    font-family:'Pretendard', -apple-system, BlinkMacSystemFont, sans-serif;
    background:var(--c-paper); color:var(--c-obsidian);
    -webkit-font-smoothing:antialiased;
  }
  #root{width:100%;}
  a{text-decoration:none; color:inherit;}
  button{font-family:inherit; border:none; background:none; cursor:pointer;}
  ::-webkit-scrollbar{height:0; width:8px;}
  ::-webkit-scrollbar-thumb{background:var(--c-mist); border-radius:8px;}

  /* ===== keyframes ===== */
  @keyframes fadeInUp{ from{opacity:0; transform:translateY(18px);} to{opacity:1; transform:translateY(0);} }
  @keyframes chipPulse{ 0%{transform:scale(1);} 45%{transform:scale(1.08);} 100%{transform:scale(1);} }
  @keyframes drawerSlideIn{ from{transform:translateX(100%);} to{transform:translateX(0);} }
  @keyframes toastSlideUp{ from{opacity:0; transform:translate(-50%,16px);} to{opacity:1; transform:translate(-50%,0);} }
  @keyframes shimmerSweep{ 0%{background-position:-200px 0;} 100%{background-position:200px 0;} }
  @keyframes spinSlow{ from{transform:rotate(0deg);} to{transform:rotate(360deg);} }

  /* ===== header / search ===== */
  .search-header{
    position:sticky; top:0; z-index:100; background:rgba(255,255,255,0.92); backdrop-filter:blur(10px);
    border-bottom:1px solid var(--c-cloud);
  }
  .header-row{
    max-width:1280px; margin:0 auto; padding:16px 32px; display:flex; align-items:center; gap:24px;
  }
  .brand{display:flex; flex-direction:column; line-height:1.1; flex-shrink:0;}
  .brand-en{font-size:16px; font-weight:700; letter-spacing:0.02em; color:var(--c-obsidian);}
  .brand-ko{font-size:11px; color:var(--c-fog); margin-top:2px;}
  .search-bar{
    flex:1; display:flex; align-items:center; background:var(--c-snow); border:1px solid var(--c-cloud);
    border-radius:var(--r-pill); padding:4px; box-shadow:var(--shadow-md); max-width:620px;
  }
  .search-segment{
    display:flex; flex-direction:column; align-items:flex-start; padding:8px 18px; border-radius:var(--r-pill);
    transition:background .15s;
  }
  .search-segment:hover{background:var(--c-paper);}
  .segment-label{font-size:11px; color:var(--c-fog); font-weight:600;}
  .segment-value{font-size:13px; color:var(--c-obsidian); font-weight:500; margin-top:1px;}
  .search-divider{width:1px; height:26px; background:var(--c-cloud);}
  .search-input-mini{
    flex:1; border:none; outline:none; font-size:13px; padding:8px 10px; background:transparent; min-width:60px;
  }
  .search-submit{
    width:36px; height:36px; border-radius:50%; background:var(--c-obsidian); color:#fff;
    display:flex; align-items:center; justify-content:center; flex-shrink:0;
  }
  .header-nav{display:flex; align-items:center; gap:20px; flex-shrink:0;}
  .header-nav a{display:flex; align-items:center; gap:6px; font-size:14px; font-weight:500; color:var(--c-iron); transition:color .15s;}
  .header-nav a:hover{color:var(--c-obsidian);}
  .lang-toggle{
    display:flex; align-items:center; gap:6px; padding:8px 14px; border-radius:var(--r-pill); border:1px solid var(--c-cloud);
    font-size:13px; font-weight:600; color:var(--c-iron);
  }
  .cta-pill{
    background:var(--c-obsidian); color:#fff; padding:10px 20px; border-radius:var(--r-pill); font-size:13px; font-weight:600;
  }

  /* ===== filter chips ===== */
  .filter-chips{
    max-width:1280px; margin:0 auto; padding:14px 32px; display:flex; gap:10px; overflow-x:auto; scrollbar-width:none;
  }
  .chip{
    display:flex; align-items:center; gap:6px; padding:9px 18px; border-radius:var(--r-pill); border:1px solid var(--c-cloud);
    background:#fff; font-size:13px; font-weight:600; color:var(--c-iron); white-space:nowrap; flex-shrink:0;
    transition:all .18s;
  }
  .chip:hover{border-color:var(--c-ash);}
  .chip.active{background:var(--c-obsidian); color:#fff; border-color:var(--c-obsidian); animation:chipPulse .35s ease;}
  .chip.filter-toggle{background:var(--c-paper); color:var(--c-obsidian);}

  /* ===== hero ===== */
  .hero{max-width:1280px; margin:0 auto; padding:64px 32px 40px; display:grid; grid-template-columns:1.1fr 0.9fr; gap:56px; align-items:center;}
  .hero-eyebrow{display:inline-flex; align-items:center; gap:6px; background:#fff; border:1px solid var(--c-cloud); padding:6px 14px; border-radius:var(--r-pill); font-size:12px; font-weight:600; color:var(--c-steel); margin-bottom:20px;}
  .hero-title{font-size:56px; font-weight:600; line-height:1.14; color:var(--c-obsidian); letter-spacing:-0.01em; animation:fadeInUp .6s ease both;}
  .hero-title .accent{color:var(--c-ember);}
  .hero-desc{font-size:16px; color:var(--c-steel); line-height:1.6; margin-top:20px; max-width:480px; animation:fadeInUp .6s ease .1s both;}
  .hero-ctas{display:flex; gap:12px; margin-top:32px; animation:fadeInUp .6s ease .2s both;}
  .btn-primary{background:var(--c-obsidian); color:#fff; padding:14px 26px; border-radius:var(--r-btn); font-size:14px; font-weight:600; display:flex; align-items:center; gap:8px;}
  .btn-primary:hover{background:var(--c-slate);}
  .btn-ghost{background:#fff; border:1px solid var(--c-iron); color:var(--c-iron); padding:14px 26px; border-radius:var(--r-btn); font-size:14px; font-weight:600;}
  .hero-visual{position:relative; border-radius:var(--r-card); overflow:hidden; aspect-ratio:4/3; animation:fadeInUp .7s ease .15s both;}
  .hero-visual img{width:100%; height:100%; object-fit:cover; filter:saturate(0.9);}
  .hero-visual::after{content:''; position:absolute; inset:0; background:linear-gradient(135deg, #ff5a0022 0%, transparent 55%);}

  /* ===== stats ===== */
  .stats-row{max-width:1280px; margin:0 auto; padding:8px 32px 56px; display:flex; gap:64px; flex-wrap:wrap;}
  .stat-num{font-size:40px; font-weight:600; color:var(--c-obsidian);}
  .stat-label{font-size:13px; color:var(--c-steel); margin-top:4px;}

  /* ===== category band ===== */
  .section{max-width:1280px; margin:0 auto; padding:32px;}
  .section-title{font-size:32px; font-weight:600; color:var(--c-obsidian); margin-bottom:8px;}
  .section-sub{font-size:14px; color:var(--c-fog); margin-bottom:28px;}
  .cat-scroll{display:flex; gap:16px; overflow-x:auto; padding-bottom:8px;}
  .cat-card{flex-shrink:0; width:260px; border-radius:var(--r-card); border:1px solid var(--c-cloud); background:#fff; overflow:hidden; cursor:pointer; transition:transform .2s, box-shadow .2s;}
  .cat-card:hover{transform:translateY(-4px); box-shadow:0 12px 28px rgba(9,9,11,0.08);}
  .cat-card img{width:100%; height:150px; object-fit:cover;}
  .cat-card-body{padding:20px;}
  .cat-card-title{font-size:16px; font-weight:600; margin-bottom:6px;}
  .cat-card-count{font-size:12px; color:var(--c-fog);}

  /* ===== dark feature block ===== */
  .dark-block{background:var(--c-slate); border-radius:var(--r-card); padding:48px 40px; color:#fff; display:grid; grid-template-columns:0.9fr 1.1fr; gap:40px; align-items:center;}
  .dark-block-title{font-size:32px; font-weight:700; line-height:1.25;}
  .dark-list{display:flex; flex-direction:column; gap:16px;}
  .dark-list-item{display:flex; align-items:center; gap:12px; font-size:18px; font-weight:500;}

  /* ===== grid / gallery ===== */
  .toolbar{display:flex; justify-content:space-between; align-items:center; margin-bottom:20px; flex-wrap:wrap; gap:12px;}
  .result-count{font-size:14px; color:var(--c-fog);}
  .sort-select{border:1px solid var(--c-cloud); border-radius:var(--r-btn); padding:8px 14px; font-size:13px; background:#fff; color:var(--c-iron);}
  .card-grid{display:grid; grid-template-columns:repeat(auto-fill, minmax(280px, 1fr)); gap:22px;}
  .listing-card{
    border-radius:var(--r-card); border:1px solid var(--c-cloud); background:#fff; overflow:hidden;
    transition:transform .2s ease, box-shadow .2s ease; cursor:pointer; animation:fadeInUp .5s ease both;
  }
  .listing-card:hover{transform:translateY(-5px); box-shadow:0 16px 32px rgba(9,9,11,0.10);}
  .card-image-wrap{position:relative; aspect-ratio:4/3;}
  .card-image-wrap img{width:100%; height:100%; object-fit:cover; filter:saturate(0.85);}
  .card-favorite{
    position:absolute; top:12px; right:12px; width:34px; height:34px; border-radius:50%; background:rgba(255,255,255,0.9);
    display:flex; align-items:center; justify-content:center; backdrop-filter:blur(4px);
  }
  .card-badge{position:absolute; top:12px; left:12px; background:rgba(9,9,11,0.75); color:#fff; font-size:11px; font-weight:600; padding:5px 10px; border-radius:var(--r-badge); backdrop-filter:blur(4px);}
  .card-body{padding:20px;}
  .card-row-1{display:flex; justify-content:space-between; align-items:center; gap:8px;}
  .card-title{font-size:16px; font-weight:600; color:var(--c-obsidian); overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}
  .card-rating{font-size:12px; color:var(--c-steel); font-weight:600; flex-shrink:0;}
  .card-row-2{font-size:12px; color:var(--c-fog); margin-top:6px; display:flex; gap:6px; flex-wrap:wrap;}
  .tag-pill{border:1px solid var(--c-cloud); border-radius:var(--r-badge); padding:2px 8px; font-size:11px; color:var(--c-iron);}
  .card-row-3{font-size:12px; color:var(--c-fog); margin-top:4px;}
  .card-row-4{display:flex; justify-content:space-between; align-items:center; margin-top:14px;}
  .card-price{font-size:15px; font-weight:600; color:var(--c-obsidian);}
  .price-unit{font-size:11px; color:var(--c-fog);}
  .card-detail-btn{display:flex; align-items:center; gap:6px; font-size:12px; font-weight:600; color:var(--c-ember);}

  .load-more-wrap{display:flex; justify-content:center; margin-top:36px;}
  .load-more-btn{border:1px solid var(--c-iron); border-radius:var(--r-pill); padding:12px 28px; font-size:13px; font-weight:600; color:var(--c-obsidian); display:flex; align-items:center; gap:8px;}
  .skeleton{background:linear-gradient(90deg, #ececee 25%, #f7f7f8 37%, #ececee 63%); background-size:400px 100%; animation:shimmerSweep 1.1s linear infinite;}

  /* ===== drawer (quick-view) ===== */
  .backdrop{position:fixed; inset:0; background:rgba(9,9,11,0.4); z-index:150; opacity:0; animation:fadeInUp .2s ease both;}
  .drawer{
    position:fixed; top:0; right:0; bottom:0; width:min(460px, 92vw); background:#fff; z-index:160;
    box-shadow:-16px 0 40px rgba(9,9,11,0.16); overflow-y:auto; animation:drawerSlideIn .32s cubic-bezier(.2,.8,.2,1) both;
  }
  .drawer-hero{position:relative; aspect-ratio:16/10;}
  .drawer-hero img{width:100%; height:100%; object-fit:cover;}
  .drawer-close{position:absolute; top:16px; right:16px; width:36px; height:36px; border-radius:50%; background:rgba(255,255,255,0.92); display:flex; align-items:center; justify-content:center;}
  .drawer-body{padding:28px;}
  .drawer-monogram{width:56px; height:56px; border-radius:16px; display:flex; align-items:center; justify-content:center; font-weight:700; font-size:18px; color:#fff; margin-top:-48px; position:relative; z-index:2; border:3px solid #fff;}
  .drawer-title{font-size:24px; font-weight:700; margin-top:14px;}
  .drawer-tagline{font-size:14px; color:var(--c-fog); margin-top:4px;}
  .drawer-tags{display:flex; gap:8px; margin-top:14px; flex-wrap:wrap;}
  .drawer-desc{font-size:14px; line-height:1.7; color:var(--c-iron); margin-top:20px;}
  .drawer-meta-grid{display:grid; grid-template-columns:1fr 1fr; gap:16px; margin-top:24px; padding-top:24px; border-top:1px solid var(--c-cloud);}
  .meta-label{font-size:11px; color:var(--c-fog); font-weight:600; margin-bottom:4px;}
  .meta-value{font-size:14px; font-weight:600; color:var(--c-obsidian);}
  .drawer-gallery{display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-top:20px;}
  .drawer-gallery img{width:100%; height:88px; object-fit:cover; border-radius:12px;}
  .drawer-link-btn{width:100%; margin-top:24px; padding:14px; border-radius:var(--r-btn); background:var(--c-obsidian); color:#fff; font-size:14px; font-weight:600; display:flex; align-items:center; justify-content:center; gap:8px;}

  /* ===== modal (contact) ===== */
  .modal-overlay{position:fixed; inset:0; background:rgba(9,9,11,0.45); z-index:200; display:flex; align-items:center; justify-content:center; padding:20px;}
  .modal-box{background:#fff; border-radius:var(--r-card); padding:32px; width:100%; max-width:440px; animation:fadeInUp .3s ease both;}
  .modal-title{font-size:20px; font-weight:700; margin-bottom:18px;}
  .field-label{font-size:12px; font-weight:600; color:var(--c-steel); margin-bottom:6px; display:block;}
  .field-input, .field-textarea{width:100%; border:1px solid var(--c-cloud); border-radius:var(--r-btn); padding:12px 14px; font-size:14px; margin-bottom:16px; font-family:inherit;}
  .field-textarea{resize:vertical; min-height:80px;}
  .modal-actions{display:flex; gap:10px; margin-top:8px;}
  .modal-actions button{flex:1; padding:13px; border-radius:var(--r-btn); font-size:14px; font-weight:600;}

  /* ===== toast ===== */
  .toast{position:fixed; left:50%; bottom:32px; transform:translateX(-50%); background:var(--c-obsidian); color:#fff; padding:14px 24px; border-radius:var(--r-pill); font-size:13px; font-weight:600; z-index:300; display:flex; align-items:center; gap:10px; animation:toastSlideUp .3s ease both;}

  /* ===== about page ===== */
  .about-hero{padding:64px 32px 24px; max-width:1000px; margin:0 auto; text-align:center;}
  .about-hero h1{font-size:40px; font-weight:600; letter-spacing:-0.01em;}
  .about-hero p{font-size:15px; color:var(--c-steel); margin-top:14px; line-height:1.7;}
  .philosophy-grid{display:grid; grid-template-columns:repeat(3, 1fr); gap:20px; max-width:1200px; margin:0 auto; padding:0 32px 64px;}
  .philosophy-card{background:#fff; border:1px solid var(--c-cloud); border-radius:var(--r-card); padding:28px;}
  .philosophy-icon{width:44px; height:44px; border-radius:14px; background:var(--c-paper); display:flex; align-items:center; justify-content:center; margin-bottom:16px; color:var(--c-ember);}
  .timeline{max-width:760px; margin:0 auto; padding:0 32px 64px;}
  .timeline-item{display:flex; gap:20px; padding-bottom:28px; position:relative;}
  .timeline-item::before{content:''; position:absolute; left:5px; top:22px; bottom:0; width:1px; background:var(--c-cloud);}
  .timeline-dot{width:12px; height:12px; border-radius:50%; background:var(--c-obsidian); margin-top:5px; flex-shrink:0;}
  .timeline-year{font-size:13px; font-weight:700; color:var(--c-ember); margin-bottom:2px;}
  .team-grid{display:grid; grid-template-columns:repeat(4, 1fr); gap:20px; max-width:1200px; margin:0 auto; padding:0 32px 64px;}
  .team-card{text-align:center;}
  .team-card img{width:88px; height:88px; border-radius:50%; margin-bottom:12px;}
  .team-name{font-size:14px; font-weight:600;}
  .team-role{font-size:12px; color:var(--c-fog); margin-top:2px;}

  .footer{background:#fff; border-top:1px solid var(--c-cloud); padding:56px 32px 32px;}
  .footer-cols{max-width:1280px; margin:0 auto; display:grid; grid-template-columns:1.4fr 1fr 1fr 1fr; gap:40px;}
  .footer-col h4{font-size:13px; font-weight:700; margin-bottom:14px; color:var(--c-fog); text-transform:uppercase; letter-spacing:0.04em;}
  .footer-col a{display:block; font-size:13px; color:var(--c-iron); margin-bottom:10px;}
  .footer-bottom{max-width:1280px; margin:40px auto 0; padding-top:24px; border-top:1px solid var(--c-cloud); font-size:12px; color:var(--c-ash); display:flex; justify-content:space-between; flex-wrap:wrap; gap:8px;}

  @media (max-width:860px){
    .hero{grid-template-columns:1fr;}
    .dark-block{grid-template-columns:1fr;}
    .philosophy-grid, .team-grid{grid-template-columns:repeat(2,1fr);}
    .footer-cols{grid-template-columns:1fr 1fr;}
  }
</style>
</head>
<body data-archetype="airbnb-search-grid">
<div id="root"></div>

<script type="text/babel">

        <label className="field-label">{s.fieldEmail}</label>
        <input className="field-input" value={email} onChange={e=>setEmail(e.target.value)} placeholder="name@company.com" />
        <label className="field-label">{s.fieldMsg}</label>
        <textarea className="field-textarea" value={msg} onChange={e=>setMsg(e.target.value)} placeholder={lang==='ko'?'문의 내용을 입력해주세요':'Tell us more...'}></textarea>
        <div className="modal-actions">
          <button style={{background:'#f4f4f5', color:'#18181b'}} onClick={onClose}>{s.cancel}</button>
          <button style={{background:'#09090b', color:'#fff'}} onClick={() => onSubmit()}>{s.submit}</button>
        </div>
      </div>
    </div>
  );
}

function App(){
  const [lang, setLang] = useState('ko');
  const [view, setView] = useState('main');
  const [sector, setSector] = useState('전체');
  const [region, setRegion] = useState('전체');
  const [stage, setStage] = useState('전체');
  const [keyword, setKeyword] = useState('');
  const [sortBy, setSortBy] = useState('recent');
  const [visibleCount, setVisibleCount] = useState(8);
  const [saved, setSaved] = useState(new Set());
  const [selected, setSelected] = useState(null);
  const [contactOpen, setContactOpen] = useState(false);
  const [toast, setToast] = useState(null);
  const [loading, setLoading] = useState(false);

  useLucide([view, lang, selected, contactOpen, sector, region, stage, visibleCount]);

  useEffect(() => {
    const onKey = (e) => { if (e.key === 'Escape') { setSelected(null); setContactOpen(false); } };
    window.addEventListener('keydown', onKey);
    return () => window.removeEventListener('keydown', onKey);
  }, []);

  useEffect(() => {
    setLoading(true);
    const t = setTimeout(() => setLoading(false), 380);
    return () => clearTimeout(t);
  }, [sector, region, stage, keyword, sortBy]);

  const s = STR[lang];
  const toggleSave = (id) => setSaved(prev => { const n = new Set(prev); n.has(id) ? n.delete(id) : n.add(id); return n; });

  const filtered = useMemo(() => {
    let list = COMPANIES.filter(c =>
      (sector==='전체' || c.sector===sector) &&
      (region==='전체' || c.region===region) &&
      (stage==='전체' || c.stage===stage) &&
      (keyword.trim()==='' || c.ko.includes(keyword) || c.en.toLowerCase().includes(keyword.toLowerCase()))
    );
    if (sortBy==='name') list = [...list].sort((a,b)=>a.ko.localeCompare(b.ko));
    else list = [...list].sort((a,b)=>b.founded-a.founded);
    return list;
  }, [sector, region, stage, keyword, sortBy]);

  const visible = filtered.slice(0, visibleCount);

  return (
    <div style={{width:'100%', minHeight:'100vh', display:'flex', flexDirection:'column'}}>
      <Header lang={lang} setLang={setLang} view={view} setView={setView}
        sector={sector} region={region} stage={stage} setSector={setSector} setRegion={setRegion} setStage={setStage}
        keyword={keyword} setKeyword={setKeyword} onOpenContact={() => setContactOpen(true)} />

      {view === 'portfolio-grid' && <FilterChips lang={lang} sector={sector} setSector={setSector} />}

      <main style={{flex:1, width:'100%'}}>
        {view === 'main' && (
          <React.Fragment>
            <section className="hero">
              <div>
                <span className="hero-eyebrow"><i data-lucide="sparkle" style={{width:12,height:12}}></i>{s.heroEyebrow}</span>
                <h1 className="hero-title">{s.heroTitleA}<br/><span className="accent">{s.heroTitleB}</span></h1>
                <p className="hero-desc">{s.heroDesc}</p>
                <div className="hero-ctas">
                  <button className="btn-primary" onClick={() => setView('portfolio-grid')}>{s.ctaPrimary} <i data-lucide="arrow-right" style={{width:14,height:14}}></i></button>
                  <button className="btn-ghost" onClick={() => setView('about')}>{s.ctaGhost}</button>
                </div>
                <div style={{display:'flex', gap:10, marginTop:22, flexWrap:'wrap', alignItems:'center'}}>
                  <span style={{fontSize:12, color:'#71717a', fontWeight:600}}>{lang==='ko' ? '인기 검색:' : 'Popular:'}</span>
                  <button className="chip active" onClick={() => { setSector('핀테크'); setView('portfolio-grid'); }}><i data-lucide="landmark" style={{width:13,height:13}}></i><span className="chip-label">핀테크</span></button>
                  <button className="chip" onClick={() => { setSector('SaaS'); setView('portfolio-grid'); }}><i data-lucide="layers" style={{width:13,height:13}}></i><span className="chip-label">SaaS</span></button>
                  <button className="chip" onClick={() => { setSector('헬스테크'); setView('portfolio-grid'); }}><i data-lucide="heart-pulse" style={{width:13,height:13}}></i><span className="chip-label">헬스테크</span></button>
                  <button className="chip" onClick={() => { setSector('AI/데이터'); setView('portfolio-grid'); }}><i data-lucide="brain-circuit" style={{width:13,height:13}}></i><span className="chip-label">AI/데이터</span></button>
                </div>
              </div>
              <div className="hero-visual">
                <img src={`https://picsum.photos/seed/${SLUG}-hero/700/560`} alt="hero" />
              </div>
            </section>

            <section className="stats-row">
              <div><div className="stat-num">80+</div><div className="stat-label">{s.statCompanies}</div></div>
              <div><div className="stat-num">14</div><div className="stat-label">{s.statCountries}</div></div>
              <div><div className="stat-num">120+</div><div className="stat-label">{s.statAum}</div></div>
            </section>

            <section className="section">
              <h2 className="section-title">{s.catTitle}</h2>
              <p className="section-sub">{s.catSub}</p>
              <div className="cat-scroll">
                {SECTORS.filter(sc=>sc!=='전체').map((sc,i) => (
                  <div key={sc} className="cat-card" onClick={() => { setSector(sc); setView('portfolio-grid'); }}>
                    <img src={`https://picsum.photos/seed/${SLUG}-cat-${i}/400/300`} alt={sc} />
                    <div className="cat-card-body">
                      <div className="cat-card-title">{sc}</div>
                      <div className="cat-card-count">{COMPANIES.filter(c=>c.sector===sc).length} companies</div>
                    </div>
                  </div>
                ))}
              </div>
            </section>

            <section className="section">
              <div className="dark-block">
                <h2 className="dark-block-title">{s.darkTitle}</h2>
                <div className="dark-list">
                  {s.darkItems.map((it,i) => (
                    <div key={i} className="dark-list-item"><i data-lucide="arrow-right" style={{width:18,height:18, color:'#ff5a00', flexShrink:0}}></i>{it}</div>
                  ))}
                </div>
              </div>
            </section>

            <section className="section">
              <div className="hero-visual" style={{aspectRatio:'21/7', borderRadius:'48px 48px 0 0'}}>
                <img src={`https://picsum.photos/seed/${SLUG}-breakthrough/1400/460`} alt="" />
              </div>
            </section>
          </React.Fragment>
        )}

        {view === 'portfolio-grid' && (
          <section className="section">
            <h2 className="section-title">{s.gridTitle}</h2>
            <p className="section-sub">{s.gridSub}</p>
            <div className="toolbar">
              <span className="result-count">{s.resultCount(filtered.length)}</span>
              <select className="sort-select" value={sortBy} onChange={e=>setSortBy(e.target.value)}>
                <option value="recent">{lang==='ko'?'최신 설립순':'Newest'}</option>
                <option value="name">{lang==='ko'?'기업명순':'Name'}</option>
              </select>
            </div>
            {loading ? (
              <div className="card-grid">
                {Array.from({length:8}).map((_,i) => <div key={i} className="skeleton" style={{height:300, borderRadius:36}}></div>)}
              </div>
            ) : (
              <React.Fragment>
                <div className="card-grid">
                  {visible.map((c,i) => <CompanyCard key={c.id} c={c} lang={lang} saved={saved} toggleSave={toggleSave} onOpen={setSelected} idx={i} />)}
                </div>
                {visibleCount < filtered.length && (
                  <div className="load-more-wrap">
                    <button className="load-more-btn" onClick={() => setVisibleCount(v => v + 8)}>
                      {s.loadMore} <i data-lucide="chevron-down" style={{width:14,height:14}}></i>
                    </button>
                  </div>
                )}
              </React.Fragment>
            )}
          </section>
        )}

        {view === 'about' && (
          <React.Fragment>
            <section className="about-hero">
              <h1>{s.aboutTitle}</h1>
              <p>{s.aboutDesc}</p>
            </section>
            <section>
              <div className="section">
                <h2 className="section-title" style={{fontSize:24}}>{s.philosophyTitle}</h2>
              </div>
              <div className="philosophy-grid">
                {s.philosophies.map((p,i) => (
                  <div key={i} className="philosophy-card">
                    <div className="philosophy-icon"><i data-lucide={['compass','handshake','globe-2'][i]} style={{width:20,height:20}}></i></div>
                    <div style={{fontSize:16, fontWeight:700, marginBottom:8}}>{p.t}</div>
                    <div style={{fontSize:13, color:'#71717a', lineHeight:1.6}}>{p.d}</div>
                  </div>
                ))}
              </div>
            </section>
            <section>
              <div className="section"><h2 className="section-title" style={{fontSize:24}}>{s.historyTitle}</h2></div>
              <div className="timeline">
                {s.history.map((h,i) => (
                  <div key={i} className="timeline-item">
                    <div className="timeline-dot"></div>
                    <div><div className="timeline-year">{h.y}</div><div style={{fontSize:14, color:'#3f3f46'}}>{h.d}</div></div>
                  </div>
                ))}
              </div>
            </section>
            <section>
              <div className="section"><h2 className="section-title" style={{fontSize:24}}>{s.teamTitle}</h2></div>
              <div className="team-grid">
                {s.team.map((t,i) => (
                  <div key={i} className="team-card">
                    <img src={`https://source.boringavatars.com/beam/120/${encodeURIComponent(t.n)}?colors=09090b,3f3f46,71717a,ff5a00,ececee`} alt={t.n} />
                    <div className="team-name">{t.n}</div>
                    <div className="team-role">{t.r}</div>
                  </div>
                ))}
              </div>
            </section>
          </React.Fragment>
        )}
      </main>

      <footer className="footer">
        <div className="footer-cols">
          <div className="footer-col">
            <div style={{fontWeight:700, fontSize:16, marginBottom:10}}>NOVABRIDGE</div>
            <p style={{fontSize:13, color:'#71717a', lineHeight:1.6}}>{s.footerAbout}</p>
          </div>
          <div className="footer-col"><h4>{s.footerCol1}</h4>
            <a onClick={() => setView('portfolio-grid')}>{s.navPortfolio}</a>
            <a onClick={() => setContactOpen(true)}>{s.navContact}</a>
          </div>
          <div className="footer-col"><h4>{s.footerCol2}</h4>
            <a onClick={() => setView('about')}>{s.navAbout}</a>
            <a onClick={() => setView('about')}>{lang==='ko'?'채용':'Careers'}</a>
          </div>
          <div className="footer-col"><h4>{s.footerCol3}</h4>
            <a onClick={() => setToast(s.toastExternal)}>{lang==='ko'?'개인정보처리방침':'Privacy Policy'}</a>
            <a onClick={() => setToast(s.toastExternal)}>{lang==='ko'?'이용약관':'Terms'}</a>
          </div>
        </div>
        <div className="footer-bottom">
          <span>© 2026 NovaBridge Capital — 자체 개발 프로젝트 (샘플)</span>
          <span>Seoul · Singapore · San Francisco</span>
        </div>
      </footer>

      {selected && <Drawer company={selected} lang={lang} onClose={() => setSelected(null)} onExternal={() => { setToast(s.toastExternal); }} />}
      {contactOpen && <ContactModal lang={lang} onClose={() => setContactOpen(false)} onSubmit={() => { setContactOpen(false); setToast(s.toastSent); }} />}
      {toast && <Toast msg={toast} onDone={() => setToast(null)} />}
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
