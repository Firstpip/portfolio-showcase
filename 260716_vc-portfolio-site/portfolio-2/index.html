<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>투자사 셀프 관리 어드민 콘솔 — NovaBridge Admin</title>
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/regular/style.css">
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
  :root{
    --void:#08090a; --carbon:#0f1011; --obsidian:#161718; --graphite:#23252a; --smoke:#383b3f;
    --ash:#62666d; --fog:#8a8f98; --mist:#d0d6e0; --bone:#e5e5e6; --paper:#ffffff;
    --lime:#e4f222; --blue:#4893f4; --green:#27a644; --red:#eb5757; --violet:#6366f1;
    --r-card:12px; --r-btn:6px; --r-pill:9999px;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  html,body{width:100%; overflow-x:hidden;}
  body{
    font-family:'Pretendard', -apple-system, BlinkMacSystemFont, sans-serif;
    background:var(--void); color:var(--paper); -webkit-font-smoothing:antialiased;
  }
  #root{width:100%;}
  a{text-decoration:none; color:inherit;}
  button{font-family:inherit; border:none; background:none; cursor:pointer; color:inherit;}
  input,select,textarea{font-family:inherit;}
  ::-webkit-scrollbar{width:8px; height:8px;}
  ::-webkit-scrollbar-thumb{background:var(--graphite); border-radius:8px;}

  @keyframes rowFadeIn{ from{opacity:0; transform:translateX(-6px);} to{opacity:1; transform:translateX(0);} }
  @keyframes pulseLive{ 0%,100%{opacity:1;} 50%{opacity:0.35;} }
  @keyframes progressGrow{ from{width:0%;} to{width:var(--target-w, 100%);} }
  @keyframes modalPop{ from{opacity:0; transform:scale(0.96) translateY(8px);} to{opacity:1; transform:scale(1) translateY(0);} }
  @keyframes toastRise{ from{opacity:0; transform:translate(-50%,14px);} to{opacity:1; transform:translate(-50%,0);} }

  .app-shell{display:flex; width:100%; min-height:100vh;}

  /* ===== sidebar ===== */
  .sidebar{
    position:fixed; left:0; top:0; bottom:0; width:248px; background:var(--carbon);
    border-right:1px solid var(--graphite); display:flex; flex-direction:column; z-index:80;
  }
  .sidebar-brand{padding:20px 20px 16px; display:flex; align-items:center; gap:10px; border-bottom:1px solid var(--graphite);}
  .sidebar-brand-mark{width:28px; height:28px; border-radius:8px; background:var(--lime); display:flex; align-items:center; justify-content:center; color:#08090a; font-weight:700; font-size:13px; flex-shrink:0;}
  .sidebar-brand-text{font-size:13px; font-weight:600; color:var(--paper); line-height:1.2;}
  .sidebar-brand-sub{font-size:11px; color:var(--fog);}
  .sidebar-nav{padding:16px 12px; display:flex; flex-direction:column; gap:2px; flex:1; overflow-y:auto;}
  .nav-group-label{font-size:11px; color:var(--ash); text-transform:uppercase; letter-spacing:0.05em; padding:10px 10px 6px;}
  .nav-item{
    display:flex; align-items:center; gap:10px; padding:9px 12px; border-radius:var(--r-btn); font-size:13px; font-weight:500;
    color:var(--mist); transition:background .15s, color .15s;
  }
  .nav-item i{font-size:16px; color:var(--fog);}
  .nav-item:hover{background:rgba(255,255,255,0.04);}
  .nav-item.active{background:var(--graphite); color:var(--paper);}
  .nav-item.active i{color:var(--lime);}
  .sidebar-footer{padding:14px 20px; border-top:1px solid var(--graphite); display:flex; align-items:center; gap:10px;}
  .sidebar-avatar{width:30px; height:30px; border-radius:50%; background:var(--violet); display:flex; align-items:center; justify-content:center; font-size:12px; font-weight:700; flex-shrink:0;}

  /* ===== main-wrap ===== */
  .main-wrap{margin-left:248px; flex:1; min-width:0; width:calc(100% - 248px); min-height:100vh; display:flex; flex-direction:column;}
  .topbar{
    height:64px; border-bottom:1px solid var(--graphite); display:flex; align-items:center; justify-content:space-between;
    padding:0 28px; position:sticky; top:0; background:rgba(8,9,10,0.9); backdrop-filter:blur(8px); z-index:60;
  }
  .breadcrumb{font-size:13px; color:var(--fog); display:flex; align-items:center; gap:8px;}
  .breadcrumb strong{color:var(--paper); font-weight:600;}
  .topbar-actions{display:flex; align-items:center; gap:10px;}
  .topbar-search{
    display:flex; align-items:center; gap:8px; background:rgba(255,255,255,0.03); border:1px solid var(--graphite);
    border-radius:var(--r-btn); padding:7px 12px; font-size:12px; color:var(--fog); width:220px;
  }
  .topbar-search input{background:transparent; border:none; outline:none; color:var(--mist); font-size:12px; width:100%;}

  .btn-lime{background:var(--lime); color:#08090a; padding:9px 16px; border-radius:var(--r-btn); font-size:13px; font-weight:600; display:flex; align-items:center; gap:6px;}
  .btn-lime:hover{filter:brightness(1.06);}
  .btn-ghost{background:transparent; border:1px solid var(--graphite); color:var(--mist); padding:9px 16px; border-radius:var(--r-btn); font-size:13px; font-weight:500; display:flex; align-items:center; gap:6px;}
  .btn-ghost:hover{border-color:var(--smoke);}
  .btn-blue-link{color:var(--blue); font-size:13px; font-weight:600; display:flex; align-items:center; gap:6px;}

  .content{padding:28px; flex:1;}
  .page-head{margin-bottom:22px;}
  .page-title{font-size:22px; font-weight:700; color:var(--paper);}
  .page-sub{font-size:13px; color:var(--fog); margin-top:4px;}

  /* ===== master-detail ===== */
  .master-detail{display:grid; grid-template-columns:340px 1fr; gap:20px; align-items:start;}
  .list-rail{background:var(--carbon); border:1px solid var(--graphite); border-radius:var(--r-card); overflow:hidden;}
  .list-rail-head{padding:14px 16px; border-bottom:1px solid var(--graphite); display:flex; flex-direction:column; gap:10px;}
  .list-search{display:flex; align-items:center; gap:8px; background:rgba(255,255,255,0.03); border:1px solid var(--graphite); border-radius:var(--r-btn); padding:8px 12px;}
  .list-search input{background:transparent; border:none; outline:none; color:var(--mist); font-size:12px; flex:1;}
  .status-filters{display:flex; gap:6px; flex-wrap:wrap;}
  .pill-filter{padding:5px 10px; border-radius:var(--r-pill); font-size:11px; font-weight:600; background:rgba(255,255,255,0.05); color:var(--fog); border:1px solid transparent;}
  .pill-filter.active{background:rgba(228,242,34,0.12); color:var(--lime); border-color:rgba(228,242,34,0.35);}
  .list-rows{max-height:560px; overflow-y:auto;}
  .list-row{
    display:flex; align-items:center; gap:10px; padding:12px 16px; border-bottom:1px solid rgba(255,255,255,0.04); cursor:pointer;
    animation:rowFadeIn .3s ease both;
  }
  .list-row:hover{background:rgba(255,255,255,0.03);}
  .list-row.selected{background:rgba(228,242,34,0.06); border-left:2px solid var(--lime); padding-left:14px;}
  .row-avatar{width:34px; height:34px; border-radius:9px; display:flex; align-items:center; justify-content:center; font-size:12px; font-weight:700; color:#fff; flex-shrink:0;}
  .row-main{flex:1; min-width:0;}
  .row-name{font-size:13px; font-weight:600; color:var(--paper); overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}
  .row-meta{font-size:11px; color:var(--fog); margin-top:2px;}
  .status-dot{width:7px; height:7px; border-radius:50%; display:inline-block; margin-right:5px;}
  .status-dot.live{animation:pulseLive 1.8s ease-in-out infinite;}
  .badge{font-size:10px; font-weight:700; padding:2px 7px; border-radius:4px;}

  /* ===== detail-panel ===== */
  .detail-panel{display:flex; flex-direction:column; gap:18px;}
  .panel-card{background:var(--carbon); border:1px solid var(--graphite); border-radius:var(--r-card); padding:22px;}
  .panel-card-head{display:flex; justify-content:space-between; align-items:center; margin-bottom:16px;}
  .panel-card-title{font-size:14px; font-weight:700; color:var(--paper); display:flex; align-items:center; gap:8px;}
  .summary-grid{display:grid; grid-template-columns:repeat(2, 1fr); gap:16px;}
  .summary-item .meta-label{font-size:11px; color:var(--fog); margin-bottom:4px;}
  .summary-item .meta-value{font-size:14px; font-weight:600; color:var(--paper);}
  .linked-item{display:flex; align-items:center; justify-content:space-between; padding:10px 0; border-bottom:1px solid rgba(255,255,255,0.05);}
  .linked-item:last-child{border-bottom:none;}
  .checklist-item{display:flex; align-items:center; gap:10px; padding:9px 0;}
  .checkbox{width:18px; height:18px; border-radius:5px; border:1.5px solid var(--smoke); display:flex; align-items:center; justify-content:center; flex-shrink:0;}
  .checkbox.done{background:var(--lime); border-color:var(--lime); color:#08090a;}
  .doc-row{display:flex; align-items:center; gap:10px; padding:9px 0; font-size:12px; color:var(--mist);}

  /* ===== tenant editor ===== */
  .editor-grid{display:grid; grid-template-columns:1.1fr 0.9fr; gap:20px;}
  .field-label{font-size:12px; color:var(--fog); margin-bottom:6px; display:block; font-weight:600;}
  .field-input, .field-textarea, .field-select{
    width:100%; background:rgba(255,255,255,0.02); border:1px solid var(--graphite); border-radius:var(--r-btn);
    padding:11px 13px; font-size:13px; color:var(--mist); margin-bottom:16px;
  }
  .field-textarea{resize:vertical; min-height:90px;}
  .field-input:focus, .field-textarea:focus, .field-select:focus{outline:none; border-color:var(--mist);}
  .dropzone{
    border:1.5px dashed var(--graphite); border-radius:var(--r-card); padding:28px; text-align:center; color:var(--fog);
    font-size:13px; margin-bottom:16px; cursor:pointer; transition:border-color .15s;
  }
  .dropzone:hover{border-color:var(--blue);}
  .dropzone i{font-size:26px; color:var(--fog); margin-bottom:8px; display:block;}
  .isolation-note{background:rgba(72,147,244,0.08); border:1px solid rgba(72,147,244,0.25); border-radius:var(--r-btn); padding:12px 14px; font-size:12px; color:var(--blue); display:flex; gap:8px; align-items:flex-start;}

  /* ===== console hero (gradient floor + procedural visual) ===== */
  .console-hero{
    position:relative; border-radius:var(--r-card); padding:32px 28px; margin-bottom:22px; overflow:hidden;
    background:linear-gradient(180deg, #08090a 0%, #12141a 55%, #1c2230 100%);
    border:1px solid var(--graphite);
  }
  .console-hero-glow{position:absolute; top:-60px; right:-40px; width:280px; height:280px; opacity:0.55; pointer-events:none;}
  .console-hero-content{position:relative; z-index:2; display:flex; justify-content:space-between; align-items:flex-end; flex-wrap:wrap; gap:24px;}
  .console-hero-title{font-size:44px; font-weight:700; letter-spacing:-0.02em; line-height:1.05; color:var(--paper);}
  .console-hero-sub{font-size:13px; color:var(--fog); margin-top:8px; max-width:420px; line-height:1.6;}
  .console-hero-stats{display:flex; gap:28px;}
  .console-hero-stat-num{font-size:40px; font-weight:700; color:var(--lime); line-height:1;}
  .console-hero-stat-label{font-size:11px; color:var(--fog); margin-top:6px;}

  /* ===== access control ===== */
  .perm-table{width:100%; border-collapse:collapse; font-size:13px;}
  .perm-table th{text-align:left; font-size:11px; color:var(--fog); font-weight:600; padding:10px 12px; border-bottom:1px solid var(--graphite);}
  .perm-table td{padding:12px; border-bottom:1px solid rgba(255,255,255,0.04); color:var(--mist);}
  .perm-toggle{width:36px; height:20px; border-radius:var(--r-pill); background:var(--graphite); position:relative; transition:background .2s;}
  .perm-toggle.on{background:var(--lime);}
  .perm-toggle-dot{position:absolute; top:2px; left:2px; width:16px; height:16px; border-radius:50%; background:#fff; transition:transform .2s;}
  .perm-toggle.on .perm-toggle-dot{transform:translateX(16px); background:#08090a;}
  .audit-row{display:flex; gap:12px; padding:12px 0; border-bottom:1px solid rgba(255,255,255,0.04); font-size:12px;}
  .audit-icon{width:28px; height:28px; border-radius:8px; background:rgba(255,255,255,0.04); display:flex; align-items:center; justify-content:center; flex-shrink:0;}

  /* ===== invite flow ===== */
  .invite-stats{display:flex; gap:14px; margin-bottom:20px; flex-wrap:wrap;}
  .invite-stat{background:var(--carbon); border:1px solid var(--graphite); border-radius:var(--r-card); padding:16px 20px; flex:1; min-width:130px;}
  .invite-stat-num{font-size:26px; font-weight:700;}
  .invite-stat-label{font-size:11px; color:var(--fog); margin-top:4px;}
  .invite-row{display:flex; align-items:center; gap:12px; padding:12px 16px; border-bottom:1px solid rgba(255,255,255,0.04);}
  .invite-progress-bar{width:100%; height:6px; background:var(--graphite); border-radius:var(--r-pill); overflow:hidden; margin-top:8px;}
  .invite-progress-fill{height:100%; background:var(--lime); border-radius:var(--r-pill); animation:progressGrow 1.1s ease both;}

  /* ===== modal ===== */
  .modal-overlay{position:fixed; inset:0; background:rgba(0,0,0,0.55); z-index:200; display:flex; align-items:center; justify-content:center; padding:20px;}
  .modal-box{background:var(--obsidian); border:1px solid var(--graphite); border-radius:var(--r-card); padding:26px; width:100%; max-width:440px; animation:modalPop .22s ease both;}
  .modal-title{font-size:16px; font-weight:700; margin-bottom:16px; color:var(--paper);}
  .modal-actions{display:flex; gap:10px; margin-top:18px;}
  .modal-actions button{flex:1; padding:11px; border-radius:var(--r-btn); font-size:13px; font-weight:600;}

  .toast{position:fixed; left:50%; bottom:28px; transform:translateX(-50%); background:var(--obsidian); border:1px solid var(--graphite); color:var(--paper); padding:13px 22px; border-radius:var(--r-pill); font-size:13px; font-weight:600; z-index:300; display:flex; align-items:center; gap:10px; animation:toastRise .25s ease both;}

  @media (max-width:900px){
    .master-detail, .editor-grid{grid-template-columns:1fr;}
    .summary-grid{grid-template-columns:1fr;}
  }
</style>
</head>

function Toast({msg, onDone}){
  useEffect(() => { const t = setTimeout(onDone, 2200); return () => clearTimeout(t); }, []);

function Topbar({title, crumb, onUpload}){
  const [q, setQ] = useState('');

      <div className="breadcrumb">{crumb} <i className="ph ph-caret-right" style={{fontSize:11}}></i> <strong>{title}</strong></div>

        <div className="topbar-search"><i className="ph ph-magnifying-glass"></i><input placeholder="검색..." value={q} onChange={e=>setQ(e.target.value)} /></div>

      </div>
    </div>
  );
}

function UploadModal({onClose, onConfirm}){
  const [progress, setProgress] = useState(0);
  const [running, setRunning] = useState(false);
  const [fileName, setFileName] = useState('');
  const start = () => {
    setRunning(true);
    let p = 0;
    const iv = setInterval(() => {
      p += 20;
      setProgress(p);
      if (p >= 100) { clearInterval(iv); setTimeout(() => onConfirm(), 400); }

  };
  return (
    <div className="modal-overlay" onClick={onClose}>
      <div className="modal-box" onClick={e=>e.stopPropagation()}>
        <div className="modal-title">80개 투자사 계정 일괄 생성</div>
        <div className="dropzone" onClick={() => setFileName('portfolio-companies-80.csv')}>
          <i className="ph ph-file-csv"></i>
          {fileName ? fileName : 'CSV 파일을 선택하거나 드래그하세요'}
        </div>
        {running && (
          <div>
            <div style={{fontSize:12, color:'#8a8f98', marginBottom:6}}>계정 생성 중... {progress}%</div>
            <div className="invite-progress-bar"><div className="invite-progress-fill" style={{'--target-w': progress + '%', width: progress + '%'}}></div></div>
          </div>
        )}
        <div className="modal-actions">
          <button className="btn-ghost" onClick={onClose} style={{flex:1}}>취소</button>
          <button className="btn-lime" onClick={start} disabled={!fileName || running} style={{flex:1, opacity:(!fileName||running)?0.5:1}}>생성 시작</button>
        </div>
      </div>
    </div>
  );
}

function AccountsView({onUploadDone}){

      {id:102, name:'신규 투자사 C', email:'admin@newco-c.demo', role:'투자사 관리자', status:'초대대기', last:'-', onboard:[true,false,false]},

    <div>

            <defs>
              <radialGradient id="glowGrad" cx="50%" cy="50%" r="50%">
                <stop offset="0%" stopColor="#e4f222" stopOpacity="0.45" />
                <stop offset="55%" stopColor="#4893f4" stopOpacity="0.18" />

              </radialGradient>
            </defs>
            <circle cx="140" cy="140" r="140" fill="url(#glowGrad)" />
            <circle cx="140" cy="140" r="90" fill="none" stroke="#e4f222" strokeOpacity="0.18" strokeWidth="1" />
            <circle cx="140" cy="140" r="60" fill="none" stroke="#4893f4" strokeOpacity="0.22" strokeWidth="1" />
          </svg>
          <div className="console-hero-content">
            <div>
              <div className="console-hero-title">계정 관리</div>
              <p className="console-hero-sub">최고관리자가 80개 투자사 계정을 일괄 생성하고, 상태·권한·온보딩 진행을 한 화면에서 관리합니다.</p>
            </div>
            <div className="console-hero-stats">
              <div><div className="console-hero-stat-num">{accounts.filter(a=>a.status==='활성').length}</div><div className="console-hero-stat-label">활성 계정</div></div>
              <div><div className="console-hero-stat-num">{accounts.filter(a=>a.status!=='활성').length}</div><div className="console-hero-stat-label">대기/조치 필요</div></div>
            </div>
          </div>
        </div>
        <div className="master-detail">
          <div className="list-rail">
            <div className="list-rail-head">
              <div className="list-search"><i className="ph ph-magnifying-glass"></i><input placeholder="투자사 검색" value={query} onChange={e=>setQuery(e.target.value)} /></div>
              <div className="status-filters">
                {['전체','활성','초대대기','비밀번호변경필요','발송실패'].map(st => (
                  <button key={st} className={'pill-filter' + (statusFilter===st ? ' active' : '')} onClick={() => setStatusFilter(st)}>{st}</button>
                ))}
              </div>
            </div>
            <div className="list-rows">
              {filtered.map((a,i) => (
                <div key={a.id} className={'list-row' + (selected && selected.id===a.id ? ' selected' : '')} style={{animationDelay:(i%10)*0.03+'s'}} onClick={() => setSelectedId(a.id)}>
                  <div className="row-avatar" style={{background:avColor(a.id)}}>{a.name.slice(0,1)}</div>
                  <div className="row-main">
                    <div className="row-name">{a.name}</div>
                    <div className="row-meta"><span className="status-dot live" style={{background:STATUS_COLOR[a.status]}}></span>{a.status}</div>

          <div className="detail-panel">
            {selected && (

                <div className="panel-card">
                  <div className="panel-card-head">
                    <div className="panel-card-title"><i className="ph ph-identification-badge"></i>계정 요약</div>
                    <span className="badge" style={{background:STATUS_COLOR[selected.status]+'22', color:STATUS_COLOR[selected.status]}}>{selected.status}</span>
                  </div>
                  <div className="summary-grid">
                    <div className="summary-item"><div className="meta-label">투자사</div><div className="meta-value">{selected.name}</div></div>
                    <div className="summary-item"><div className="meta-label">계정 이메일</div><div className="meta-value">{selected.email}</div></div>
                    <div className="summary-item"><div className="meta-label">역할</div><div className="meta-value">{selected.role}</div></div>
                    <div className="summary-item"><div className="meta-label">마지막 로그인</div><div className="meta-value">{selected.last}</div></div>
                  </div>
                </div>
                <div className="panel-card">
                  <div className="panel-card-head"><div className="panel-card-title"><i className="ph ph-link"></i>연결 항목</div></div>
                  <div className="linked-item"><span>공개 포트폴리오 페이지</span><a className="btn-blue-link" onClick={() => setToast('공개 페이지 미리보기로 이동합니다 (데모)')}>보기<i className="ph ph-arrow-square-out"></i></a></div>
                  <div className="linked-item"><span>연동된 관리자 그룹</span><span style={{color:'#8a8f98', fontSize:12}}>투자사 관리자 1명</span></div>
                </div>
                <div className="panel-card">
                  <div className="panel-card-head"><div className="panel-card-title"><i className="ph ph-list-checks"></i>온보딩 체크리스트</div></div>
                  {['이메일 인증 완료','최초 로그인 완료','자사 정보 입력 완료'].map((c,i) => (
                    <div key={i} className="checklist-item" onClick={() => toggleChecklist(i)} style={{cursor:'pointer'}}>
                      <div className={'checkbox' + (selected.onboard[i] ? ' done' : '')}>{selected.onboard[i] && <i className="ph ph-check" style={{fontSize:12}}></i>}</div>
                      <span style={{fontSize:13, color: selected.onboard[i] ? '#e5e5e6' : '#8a8f98'}}>{c}</span>
                    </div>
                  ))}
                </div>
                <div className="panel-card">
                  <div className="panel-card-head"><div className="panel-card-title"><i className="ph ph-file-text"></i>발급 문서</div></div>
                  <div className="doc-row"><i className="ph ph-file-lock"></i>임시 비밀번호 발급 안내 메일 — 2026.07.15</div>
                  <div className="doc-row"><i className="ph ph-file-lock"></i>계정 이용약관 동의 로그 — 2026.07.15</div>
                </div>
              </React.Fragment>
            )}
          </div>
        </div>
      </div>
      {uploadOpen && <UploadModal onClose={() => setUploadOpen(false)} onConfirm={confirmUpload} />}
      {toast && <Toast msg={toast} onDone={() => setToast(null)} />}
    </div>
  );
}

function TenantEditorView(){
  const [tenant, setTenant] = useState('핀브릿지');
  const [intro, setIntro] = useState('동남아 8개국 대상 초저수수료 해외송금 인프라를 운영하는 핀테크 기업입니다.');
  const [website, setWebsite] = useState('https://finbridge.demo');
  const [uploading, setUploading] = useState(false);
  const [toast, setToast] = useState(null);

  const handleUpload = () => {
    setUploading(true);
    setTimeout(() => { setUploading(false); setToast('이미지가 업로드되었습니다'); }, 1200);
  };
  const handleSave = () => setToast('저장되었습니다 — 공개 포트폴리오 페이지에 즉시 반영됩니다');

  return (
    <div>
      <Topbar title="투자사 정보" crumb="셀프 서비스" onUpload={() => {}} />
      <div className="content">
        <div className="page-head">
          <div className="page-title">투자사 정보 셀프 등록·수정</div>
          <div className="page-sub">투자사 관리자가 로그인 후 자사 정보를 직접 수정하는 화면입니다.</div>
        </div>
        <div className="isolation-note" style={{marginBottom:20}}>
          <i className="ph ph-lock-key" style={{fontSize:16, flexShrink:0, marginTop:1}}></i>
          현재 <strong style={{color:'#e5e5e6'}}>{tenant}</strong> 계정으로 접근 중입니다. tenantId 기준으로 격리되어 다른 투자사의 정보에는 접근할 수 없습니다.
        </div>
        <div className="editor-grid">
          <div className="panel-card">
            <div className="panel-card-head"><div className="panel-card-title"><i className="ph ph-note-pencil"></i>기본 정보</div></div>
            <label className="field-label">테스트용 계정 전환 (데모)</label>
            <select className="field-select" value={tenant} onChange={e=>setTenant(e.target.value)}>
              {['핀브릿지','헬시온랩','클라우드스퀘어','그린루프'].map(t => <option key={t}>{t}</option>)}
            </select>
            <label className="field-label">회사명</label>
            <input className="field-input" value={tenant} onChange={e=>setTenant(e.target.value)} />
            <label className="field-label">웹사이트</label>
            <input className="field-input" value={website} onChange={e=>setWebsite(e.target.value)} />
            <label className="field-label">회사 소개</label>
            <textarea className="field-textarea" value={intro} onChange={e=>setIntro(e.target.value)}></textarea>
            <button className="btn-lime" onClick={handleSave}><i className="ph ph-floppy-disk"></i>저장</button>
          </div>
          <div className="panel-card">
            <div className="panel-card-head"><div className="panel-card-title"><i className="ph ph-image"></i>대표 이미지</div></div>
            <div className="dropzone" onClick={handleUpload}>
              <i className="ph ph-cloud-arrow-up"></i>
              {uploading ? '업로드 중...' : 'S3 presigned URL로 직접 업로드 (클릭)'}
            </div>
            {uploading && <div className="invite-progress-bar"><div className="invite-progress-fill" style={{'--target-w':'100%'}}></div></div>}
            <img src={`https://picsum.photos/seed/${SLUG}-${tenant}/500/280`} style={{width:'100%', borderRadius:12, marginTop:14}} alt={tenant} />
          </div>
        </div>
      </div>
      {toast && <Toast msg={toast} onDone={() => setToast(null)} />}
    </div>
  );
}

function AccessControlView(){
  const [perms, setPerms] = useState({
    '전체 투자사 목록 조회':[true,false], '전체 계정 생성/삭제':[true,false], '자사 정보 수정':[true,true],
    '권한 변경':[true,false], '감사 로그 조회':[true,false], '초대 메일 재발송':[true,true],
  });
  const [toast, setToast] = useState(null);
  const togglePerm = (key, col) => {
    setPerms(prev => ({...prev, [key]: prev[key].map((v,i)=> i===col ? !v : v)}));
    setToast('권한 변경이 감사 로그에 기록되었습니다');
  };
  return (
    <div>
      <Topbar title="권한 제어" crumb="보안" onUpload={() => {}} />
      <div className="content">
        <div className="page-head">
          <div className="page-title">권한 계층별 접근 제어</div>
          <div className="page-sub">라우트·API·UI 3중 권한 검증과 변경 이력을 감사 로그로 관리합니다.</div>
        </div>
        <div className="panel-card" style={{marginBottom:20}}>
          <div className="panel-card-head"><div className="panel-card-title"><i className="ph ph-shield-check"></i>역할별 권한 매트릭스</div></div>
          <table className="perm-table">
            <thead><tr><th>권한 항목</th><th>최고관리자</th><th>투자사 관리자</th></tr></thead>
            <tbody>
              {Object.entries(perms).map(([key, cols]) => (
                <tr key={key}>
                  <td>{key}</td>
                  {cols.map((v,i) => (
                    <td key={i}>
                      <div className={'perm-toggle' + (v ? ' on' : '')} onClick={() => togglePerm(key, i)}><div className="perm-toggle-dot"></div></div>
                    </td>
                  ))}
                </tr>
              ))}
            </tbody>
          </table>
        </div>
        <div className="panel-card">
          <div className="panel-card-head"><div className="panel-card-title"><i className="ph ph-clock-counter-clockwise"></i>감사 로그</div></div>
          {AUDIT_LOG.map((a,i) => (
            <div key={i} className="audit-row">
              <div className="audit-icon"><i className={'ph ph-' + a.icon} style={{fontSize:14}}></i></div>
              <div style={{flex:1}}>
                <div style={{color:'#d0d6e0'}}>{a.text}</div>
                <div style={{color:'#62666d', marginTop:2}}>{a.time}</div>
              </div>
            </div>
          ))}
        </div>
      </div>
      {toast && <Toast msg={toast} onDone={() => setToast(null)} />}
    </div>
  );
}

function InviteFlowView(){
  const [invites, setInvites] = useState(INVITES);
  const [toast, setToast] = useState(null);
  const resend = (id) => {
    setInvites(prev => prev.map(iv => iv.id===id ? {...iv, status:'재시도중'} : iv));
    setToast('재발송 큐에 등록되었습니다 (최대 3회 재시도)');
    setTimeout(() => setInvites(prev => prev.map(iv => iv.id===id ? {...iv, status:'발송완료'} : iv)), 1400);
  };
  const resendAll = () => {
    setInvites(prev => prev.map(iv => iv.status==='실패' ? {...iv, status:'재시도중'} : iv));
    setToast('실패 건 전체가 재발송 큐에 등록되었습니다');
  };
  const counts = {대기: invites.filter(i=>i.status==='대기').length, 발송완료: invites.filter(i=>i.status==='발송완료').length, 실패: invites.filter(i=>i.status==='실패' || i.status==='재시도중').length};
  const STATUS_C = {'발송완료':'#27a644','대기':'#8a8f98','실패':'#eb5757','재시도중':'#e4f222'};
  return (
    <div>
      <Topbar title="계정 발급" crumb="자동화" onUpload={() => {}} />
      <div className="content">
        <div className="page-head">
          <div className="page-title">일괄 계정 발급 및 초대 메일 자동화</div>
          <div className="page-sub">Bull Queue 기반 비동기 발송 상태를 실시간으로 추적합니다.</div>
        </div>
        <div className="invite-stats">
          <div className="invite-stat"><div className="invite-stat-num" style={{color:'#8a8f98'}}>{counts.대기}</div><div className="invite-stat-label">대기</div></div>
          <div className="invite-stat"><div className="invite-stat-num" style={{color:'#27a644'}}>{counts.발송완료}</div><div className="invite-stat-label">발송완료</div></div>
          <div className="invite-stat"><div className="invite-stat-num" style={{color:'#eb5757'}}>{counts.실패}</div><div className="invite-stat-label">실패/재시도</div></div>
        </div>
        <div className="panel-card">
          <div className="panel-card-head">
            <div className="panel-card-title"><i className="ph ph-paper-plane-tilt"></i>초대 메일 발송 상태</div>
            <button className="btn-ghost" onClick={resendAll}><i className="ph ph-arrow-clockwise"></i>실패 건 전체 재발송</button>
          </div>
          {invites.map(iv => (
            <div key={iv.id} className="invite-row">
              <div className="row-avatar" style={{background:avColor(iv.id), width:30, height:30}}>{iv.name.slice(0,1)}</div>
              <div style={{flex:1}}>
                <div style={{fontSize:13, fontWeight:600, color:'#e5e5e6'}}>{iv.name}</div>
                <div style={{fontSize:11, color:'#8a8f98'}}>{iv.email}</div>
              </div>
              <span className="badge" style={{background:STATUS_C[iv.status]+'22', color:STATUS_C[iv.status]}}>{iv.status}</span>
              {(iv.status==='실패') && <button className="btn-ghost" onClick={() => resend(iv.id)} style={{padding:'6px 12px', fontSize:12}}><i className="ph ph-arrow-clockwise"></i>재시도</button>}
            </div>
          ))}
        </div>
      </div>
      {toast && <Toast msg={toast} onDone={() => setToast(null)} />}
    </div>
  );
}

function App(){
  const [view, setView] = useState('main');
  return (
    <div className="app-shell">
      <Sidebar view={view} setView={setView} />
      <div className="main-wrap">
        {view === 'main' && <AccountsView />}
        {view === 'tenant-editor' && <TenantEditorView />}
        {view === 'access-control' && <AccessControlView />}
        {view === 'invite-flow' && <InviteFlowView />}
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
