<html lang="ko">
<head>

<style>
  :root{
    --primary:#fa5d00; --secondary:#c0bbb6; --accent:#1ef6da;
    --bg:#fff8f1; --surface:#ffffff; --text:#1d1e1c; --text2:#615f5c;

  *{box-sizing:border-box;}
  html,body{width:100%;margin:0;padding:0;}
  body{
    font-family:'Pretendard',ui-sans-serif,system-ui,sans-serif;
    background:var(--bg); color:var(--text);

  #root{width:100%;}
  ::-webkit-scrollbar{width:8px;height:8px;}
  ::-webkit-scrollbar-thumb{background:var(--secondary);border-radius:8px;}

  @keyframes pulseDot{0%,100%{box-shadow:0 0 0 0 rgba(31,157,107,.5);}50%{box-shadow:0 0 0 6px rgba(31,157,107,0);}}

  @keyframes toastIn{from{opacity:0;transform:translateY(16px);}to{opacity:1;transform:translateY(0);}}

  .skeleton{background:linear-gradient(90deg,#f3ece2 25%,#fbeee0 37%,#f3ece2 63%);background-size:800px 100%;animation:shimmerLoad 1.4s infinite linear;}

  .curve-path{animation:sweepIn 1s ease both;}

  .sidebar-link{display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:10px;color:var(--text2);

  .btn-secondary{background:#fff;color:var(--text);border:1px solid var(--secondary);border-radius:16px;padding:10px 18px;

<script type="text/babel" data-presets="react">
const {useState, useEffect, useMemo, useRef} = React;

/* ---------- 유틸: 시드 기반 결정적 의사난수 ---------- */
function seededRandom(seed){
  let s = seed % 2147483647; if (s <= 0) s += 2147483646;
  return function(){ s = (s * 16807) % 2147483647; return (s - 1) / 2147483646; };
}
function hashStr(str){ let h=0; for(let i=0;i<str.length;i++){ h=(h*31+str.charCodeAt(i))|0; } return Math.abs(h); }

function Icon({name, size=18, style}){
  return <i data-lucide={name} style={{width:size, height:size, ...style}}></i>;
}

  {id:'v2', name:'8K 프리미엄 30초 인필', store:STORES[1], campaign:CAMPAIGNS[1], overall:74, saliency:69, visibility:80, vlm:73, status:'완료', date:'2026.07.05'},

  {id:'v7', name:'겨울 신제품 매장 루프컷', store:STORES[2], campaign:CAMPAIGNS[2], overall:84, saliency:81, visibility:86, vlm:85, status:'완료', date:'2026.07.14'},

const QUALITY_METRICS = [

  {key:'saturation', label:'Saturation', unit:'점', base:82},
  {key:'luminance', label:'평균 휘도', unit:'점', base:90},
  {key:'rms', label:'RMS Contrast', unit:'점', base:79},
  {key:'michelson', label:'Michelson Contrast', unit:'점', base:85},
  {key:'laplacian', label:'Laplacian 선명도', unit:'점', base:76},
];

const IP_CANDIDATES = [
  {name:'프리미엄 라이프스타일 모델', conf:94},
  {name:'스튜디오 배경 그래픽 IP', conf:71},
  {name:'시즌 캐릭터 콜라보 요소', conf:58},
];

/* ---------- 스파크라인 ---------- */
function Sparkline({seed, color, width=76, height=28}){
  const rnd = seededRandom(seed);
  const pts = Array.from({length:10}, () => 30 + rnd()*40);
  const max = Math.max(...pts), min = Math.min(...pts);
  const norm = pts.map((v,i) => {
    const x = (i/(pts.length-1))*width;
    const y = height - ((v-min)/(max-min || 1))*height;
    return `${x.toFixed(1)},${y.toFixed(1)}`;
  }).join(' ');
  return (
    <svg width={width} height={height} viewBox={`0 0 ${width} ${height}`}>
      <polyline points={norm} fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/>
    </svg>
  );
}

/* ---------- 히트맵 그리드 (절차적 saliency 시각화) ---------- */
function HeatmapGrid({seed, cols=16, rows=7}){
  const rnd = seededRandom(seed);
  const cells = Array.from({length:cols*rows}, () => rnd());
  return (
    <div style={{display:'grid', gridTemplateColumns:`repeat(${cols},1fr)`, gap:'2px', width:'100%', height:'160px'}}>
      {cells.map((v,i) => {
        const intensity = Math.pow(v, 1.6);
        const bg = intensity > 0.72
          ? `rgba(250,93,0,${0.45+intensity*0.55})`
          : intensity > 0.4
            ? `rgba(250,166,0,${0.25+intensity*0.4})`
            : `rgba(30,246,218,${0.08+intensity*0.25})`;
        return <div key={i} className="heat-cell" style={{background:bg}} />;
      })}
    </div>
  );
}

/* ---------- 주목도 곡선 ---------- */
function AttentionCurve({seed, cursor}){
  const rnd = seededRandom(seed);
  const w=600,h=140;
  const pts = Array.from({length:24}, () => 20 + rnd()*90);
  const path = pts.map((v,i) => {
    const x = (i/(pts.length-1))*w;
    const y = h - (v/110)*h;
    return `${i===0?'M':'L'}${x.toFixed(1)},${y.toFixed(1)}`;
  }).join(' ');
  const cursorX = (cursor/100)*w;
  return (
    <svg width="100%" viewBox={`0 0 ${w} ${h}`} preserveAspectRatio="none" style={{overflow:'visible'}}>
      <defs>
        <linearGradient id="curveFill" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stopColor="#fa5d00" stopOpacity="0.28"/>
          <stop offset="100%" stopColor="#fa5d00" stopOpacity="0"/>
        </linearGradient>
      </defs>
      <path d={`${path} L${w},${h} L0,${h} Z`} fill="url(#curveFill)" />
      <path className="curve-path" d={path} fill="none" stroke="#fa5d00" strokeWidth="2.5" strokeDasharray="340" />
      <line x1={cursorX} y1="0" x2={cursorX} y2={h} stroke="#1ef6da" strokeWidth="2" strokeDasharray="3,3"/>
      <circle cx={cursorX} cy={h - ((pts[Math.round(cursor/100*(pts.length-1))]||40)/110)*h} r="5" fill="#1ef6da" stroke="#fff" strokeWidth="2"/>
    </svg>
  );
}

/* ---------- 레이더 차트 ---------- */
function RadarChart({values, size=220}){
  const c = size/2, r = size/2 - 30;
  const n = values.length;
  const pts = values.map((v,i) => {
    const angle = (Math.PI*2*i/n) - Math.PI/2;
    const rad = (v.value/100)*r;
    return [c + rad*Math.cos(angle), c + rad*Math.sin(angle)];
  });
  const poly = pts.map(p => p.join(',')).join(' ');
  const rings = [0.25,0.5,0.75,1];
  return (
    <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`}>
      {rings.map((f,idx) => {
        const ringPts = Array.from({length:n}, (_,i) => {
          const angle = (Math.PI*2*i/n) - Math.PI/2;
          return [c + r*f*Math.cos(angle), c + r*f*Math.sin(angle)].join(',');
        }).join(' ');
        return <polygon key={idx} points={ringPts} fill="none" stroke="#e3d6c5" strokeWidth="1"/>;
      })}
      <polygon points={poly} fill="rgba(250,93,0,0.22)" stroke="#fa5d00" strokeWidth="2"/>
      {pts.map((p,i) => <circle key={i} cx={p[0]} cy={p[1]} r="3.5" fill="#fa5d00"/>)}
      {values.map((v,i) => {
        const angle = (Math.PI*2*i/n) - Math.PI/2;
        const lx = c + (r+22)*Math.cos(angle), ly = c + (r+22)*Math.sin(angle);
        return <text key={i} x={lx} y={ly} fontSize="10" fill="#615f5c" textAnchor="middle">{v.short}</text>;
      })}
    </svg>
  );
}

/* ---------- 도넛 차트 ---------- */
function Donut({segments, size=150}){
  const total = segments.reduce((s,x)=>s+x.value,0);
  let acc = 0;
  const r = size/2 - 14, c = size/2;
  const circ = 2*Math.PI*r;
  return (
    <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`}>
      <circle cx={c} cy={c} r={r} fill="none" stroke="#f1e7da" strokeWidth="16"/>
      {segments.map((s,i) => {
        const frac = s.value/total;
        const dash = frac*circ;
        const el = <circle key={i} cx={c} cy={c} r={r} fill="none" stroke={s.color} strokeWidth="16"
          strokeDasharray={`${dash} ${circ-dash}`} strokeDashoffset={-acc} transform={`rotate(-90 ${c} ${c})`} strokeLinecap="butt"/>;
        acc += dash;
        return el;
      })}
      <text x={c} y={c-2} textAnchor="middle" fontSize="20" fontWeight="700" fill="#1d1e1c">{total}</text>
      <text x={c} y={c+16} textAnchor="middle" fontSize="10" fill="#615f5c">감지 요소</text>
    </svg>
  );
}

/* ---------- 토스트 ---------- */

/* ---------- 업로드 모달 ---------- */

  const startUpload = () => {
    if(!fileName){ setFileName('신규_인필_영상_' + (Math.floor(Math.random()*90)+10) + '.mp4'); }
    setUploading(true);
    setProgress(0);
    let p = 0;
    const timer = setInterval(() => {
      p += 20;
      setProgress(p);
      if(p >= 100){
        clearInterval(timer);
        setTimeout(() => { onUploaded(store, campaign); }, 400);
      }
    }, 260);
  };

  return (
    <div className="modal-overlay" onClick={onClose}>
      <div className="modal-box" onClick={e=>e.stopPropagation()}>
        <div style={{display:'flex', justifyContent:'space-between', marginBottom:'16px'}}>
          <h3 style={{margin:0}}>영상 업로드 및 분석 시작</h3>
          <button className="btn-secondary" style={{padding:'8px'}} onClick={onClose}><Icon name="x" size={16}/></button>
        </div>

        <div style={{border:'2px dashed #c0bbb6', borderRadius:'14px', padding:'26px', textAlign:'center', marginBottom:'16px'}}>
          <Icon name="upload-cloud" size={28} style={{stroke:'#fa5d00'}}/>
          <div style={{marginTop:'8px', fontSize:'13.5px', color:'#615f5c'}}>
            {fileName ? fileName : '완성된 인필 영상 파일을 드래그하거나 선택하세요'}
          </div>
          <button className="btn-secondary" style={{marginTop:'10px'}} onClick={()=>setFileName('시그니처_인필_최종본.mp4')}>
            파일 선택
          </button>
        </div>

        <div style={{display:'grid', gridTemplateColumns:'1fr 1fr', gap:'12px', marginBottom:'16px'}}>
          <div>
            <label style={{fontSize:'12px', color:'#615f5c'}}>매장</label>
            <select value={store} onChange={e=>setStore(e.target.value)}
              style={{width:'100%', padding:'9px 10px', borderRadius:'10px', border:'1px solid #c0bbb6', marginTop:'4px'}}>
              {STORES.map(s => <option key={s}>{s}</option>)}
            </select>
          </div>
          <div>
            <label style={{fontSize:'12px', color:'#615f5c'}}>캠페인</label>
            <select value={campaign} onChange={e=>setCampaign(e.target.value)}
              style={{width:'100%', padding:'9px 10px', borderRadius:'10px', border:'1px solid #c0bbb6', marginTop:'4px'}}>
              {CAMPAIGNS.map(c => <option key={c}>{c}</option>)}
            </select>
          </div>
        </div>

        {uploading && (
          <div style={{marginBottom:'16px'}}>
            <div style={{height:'8px', borderRadius:'999px', background:'#f1e7da', overflow:'hidden'}}>
              <div style={{height:'100%', width:`${progress}%`, background:'#fa5d00', transition:'width .25s ease'}}/>
            </div>
            <div style={{fontSize:'11.5px', color:'#615f5c', marginTop:'6px'}}>업로드 중 {progress}% — 완료 시 3개 엔진 순차 실행</div>
          </div>
        )}

        <button className="btn-primary" style={{width:'100%', justifyContent:'center'}} onClick={startUpload} disabled={uploading}>
          <Icon name="play" size={15}/>{uploading ? '업로드 중...' : '업로드 시작'}
        </button>
      </div>
    </div>
  );
}

/* ================= Visibility 화질 화면 ================= */
function QualityScreen({videos}){
  const [videoId, setVideoId] = useState(videos[0].id);
  const [weights, setWeights] = useState(QUALITY_METRICS.map(()=>Math.round(100/QUALITY_METRICS.length)));
  const video = videos.find(v=>v.id===videoId);

  const values = QUALITY_METRICS.map((m,i)=> Math.max(30, Math.min(99, m.base + (hashStr(video.id+m.key)%14) - 7)));
  const totalWeight = weights.reduce((a,b)=>a+b,0) || 1;
  const composite = Math.round(values.reduce((sum,v,i)=> sum + v*(weights[i]/totalWeight), 0));

  const setWeight = (i, val) => {
    const next = [...weights]; next[i] = val; setWeights(next);
  };

  return (
    <div className="fade-in">
      <header style={{marginBottom:'20px'}}>
        <h1 style={{margin:0, fontSize:'24px'}}>Visibility 화질 물리지표 분석</h1>
        <div style={{fontSize:'12.5px', color:'#615f5c', marginTop:'4px'}}>OpenCV 결정적 알고리즘으로 6종 물리지표를 추출하고 가중 합산합니다.</div>
      </header>

      <div style={{display:'flex', gap:'10px', marginBottom:'16px', flexWrap:'wrap'}}>
        {videos.filter(v=>v.status==='완료').map(v => (
          <button key={v.id} className={`chip ${videoId===v.id?'active':''}`} onClick={()=>setVideoId(v.id)}>{v.name}</button>
        ))}
      </div>

      <div style={{display:'grid', gridTemplateColumns:'1fr 1fr 1.1fr', gap:'18px'}}>
        <div className="stat-card" style={{textAlign:'center'}}>
          <div style={{fontSize:'12px', color:'#615f5c'}}>Visibility 종합 점수 (가중치 반영)</div>
          <div style={{fontSize:'46px', fontWeight:700, margin:'8px 0', color:'#fa5d00'}}>{composite}</div>
          <div style={{fontSize:'11.5px', color:'#615f5c'}}>가중치를 조정하면 즉시 재계산됩니다</div>
        </div>
        <div className="stat-card">
          <div style={{fontWeight:700, fontSize:'13.5px', marginBottom:'8px'}}>물리지표 레이더</div>
          <RadarChart values={QUALITY_METRICS.map((m,i)=>({short:m.label.split(' ')[0].slice(0,5), value:values[i]}))}/>
        </div>
        <div className="stat-card">
          <div style={{fontWeight:700, fontSize:'13.5px', marginBottom:'8px'}}>대형 TV 송출 선명도 체크</div>
          <div style={{fontSize:'12px', color:'#615f5c', lineHeight:1.7}}>
            85인치 기준 외곽선 뭉개짐 위험도<br/>
            <span style={{fontWeight:700, color: values[5] > 70 ? '#1f9d6b' : '#d94f4f'}}>
              {values[5] > 70 ? '낮음 — 송출 안전' : '주의 — 선명도 보정 권장'}
            </span>
          </div>
        </div>
      </div>

      <div className="stat-card" style={{marginTop:'18px'}}>
        <div style={{display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:'14px'}}>
          <div style={{fontWeight:700}}>지표별 값 · 가중치 조정</div>
          <button className="btn-secondary" onClick={()=>setWeights(QUALITY_METRICS.map(()=>Math.round(100/QUALITY_METRICS.length)))}>
            <Icon name="rotate-ccw" size={14}/>가중치 초기화
          </button>
        </div>
        {QUALITY_METRICS.map((m,i) => (
          <div key={m.key} style={{display:'grid', gridTemplateColumns:'160px 1fr 60px 140px', alignItems:'center', gap:'14px', padding:'10px 0', borderBottom: i<QUALITY_METRICS.length-1 ? '1px solid #f1e7da' : 'none'}}>
            <div style={{fontSize:'13px', fontWeight:600}}>{m.label}</div>
            <div style={{height:'8px', borderRadius:'999px', background:'#f1e7da', overflow:'hidden'}}>
              <div style={{height:'100%', width:`${values[i]}%`, background:'#fa5d00', transition:'width .3s'}}/>
            </div>
            <div style={{fontSize:'13px', textAlign:'right'}}>{values[i]}점</div>
            <div style={{display:'flex', alignItems:'center', gap:'6px'}}>
              <input type="range" min="0" max="100" value={weights[i]} className="range-input"
                onChange={e=>setWeight(i, Number(e.target.value))}/>
              <span style={{fontSize:'11px', color:'#615f5c', width:'26px'}}>{weights[i]}</span>
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}

/* ================= VLM 화면 ================= */
function VlmScreen({videos, pushToast}){
  const [videoId, setVideoId] = useState(videos[0].id);
  const [purpose, setPurpose] = useState('신제품 기술력 소구');
  const [target, setTarget] = useState('매장 방문 고관여 구매자');
  const [tone, setTone] = useState('프리미엄·신뢰감');
  const [loading, setLoading] = useState(false);
  const [result, setResult] = useState({fit:81, ips: IP_CANDIDATES});
  const video = videos.find(v=>v.id===videoId);

  const runVlm = () => {
    setLoading(true);
    setTimeout(() => {
      const seed = hashStr(video.id + purpose + target + tone);
      const rnd = seededRandom(seed);
      setResult({
        fit: 60 + Math.round(rnd()*38),
        ips: IP_CANDIDATES.map(ip => ({...ip, conf: Math.max(30, Math.min(97, ip.conf + Math.round((rnd()-0.5)*20)))}))
      });
      setLoading(false);
      pushToast('VLM 의도 적합성 평가가 완료되었습니다');
    }, 1500);
  };

  return (
    <div className="fade-in">
      <header style={{marginBottom:'20px'}}>
        <h1 style={{margin:0, fontSize:'24px'}}>VLM 의도 적합성 및 IP·셀럽 인지도 평가</h1>
        <div style={{fontSize:'12.5px', color:'#615f5c', marginTop:'4px'}}>표준 입력 템플릿과 VLM 프롬프트를 결합해 의도 적합성·인지도를 정량화합니다.</div>
      </header>

      <div style={{display:'grid', gridTemplateColumns:'1fr 1.2fr', gap:'18px'}}>
        <div className="stat-card">
          <div style={{fontWeight:700, marginBottom:'14px'}}>의도 입력 표준 템플릿</div>
          <label style={{fontSize:'12px', color:'#615f5c'}}>분석 대상 영상</label>
          <select value={videoId} onChange={e=>setVideoId(e.target.value)}
            style={{width:'100%', padding:'9px 10px', borderRadius:'10px', border:'1px solid #c0bbb6', margin:'4px 0 12px'}}>
            {videos.filter(v=>v.status==='완료').map(v => <option key={v.id} value={v.id}>{v.name}</option>)}
          </select>

          <label style={{fontSize:'12px', color:'#615f5c'}}>제작 목적</label>
          <select value={purpose} onChange={e=>setPurpose(e.target.value)}
            style={{width:'100%', padding:'9px 10px', borderRadius:'10px', border:'1px solid #c0bbb6', margin:'4px 0 12px'}}>
            <option>신제품 기술력 소구</option><option>브랜드 이미지 각인</option><option>매장 체류시간 확보</option>
          </select>

          <label style={{fontSize:'12px', color:'#615f5c'}}>타깃</label>
          <select value={target} onChange={e=>setTarget(e.target.value)}
            style={{width:'100%', padding:'9px 10px', borderRadius:'10px', border:'1px solid #c0bbb6', margin:'4px 0 12px'}}>
            <option>매장 방문 고관여 구매자</option><option>동행 비구매 관람객</option><option>재방문 잠재고객</option>
          </select>

          <label style={{fontSize:'12px', color:'#615f5c'}}>톤 앤 매너</label>
          <select value={tone} onChange={e=>setTone(e.target.value)}
            style={{width:'100%', padding:'9px 10px', borderRadius:'10px', border:'1px solid #c0bbb6', margin:'4px 0 16px'}}>
            <option>프리미엄·신뢰감</option><option>역동적·젊은 감각</option><option>따뜻함·일상 밀착</option>
          </select>

          <button className="btn-primary" style={{width:'100%', justifyContent:'center'}} onClick={runVlm} disabled={loading}>
            <Icon name="sparkles" size={15}/>{loading ? 'VLM 평가 실행 중...' : 'VLM 평가 실행'}
          </button>
        </div>

        <div>
          {loading ? (
            <div className="stat-card">
              <div className="skeleton" style={{height:'22px', borderRadius:'6px', marginBottom:'10px'}}/>
              <div className="skeleton" style={{height:'80px', borderRadius:'10px', marginBottom:'10px'}}/>
              <div className="skeleton" style={{height:'22px', width:'60%', borderRadius:'6px'}}/>
            </div>
          ) : (
            <div className="fade-in">
              <div className="stat-card" style={{marginBottom:'14px', display:'flex', alignItems:'center', gap:'20px'}}>
                <div style={{textAlign:'center'}}>
                  <div style={{fontSize:'34px', fontWeight:700, color:'#fa5d00'}}>{result.fit}</div>
                  <div style={{fontSize:'11px', color:'#615f5c'}}>의도 적합성 점수</div>
                </div>
                <div style={{flex:1, fontSize:'12.5px', color:'#615f5c', lineHeight:1.6}}>
                  선택된 목적·타깃·톤 기준으로 VLM이 영상 프레임을 질의·평가한 결과입니다.
                  {result.fit >= 75 ? ' 제작 의도와 콘텐츠 표현이 높은 수준으로 일치합니다.' : ' 일부 구간에서 의도와 표현 간 괴리가 감지됩니다.'}
                </div>
              </div>

              <div className="stat-card">
                <div style={{fontWeight:700, fontSize:'13.5px', marginBottom:'10px'}}>IP·셀럽 인지도 감지 결과</div>
                {result.ips.map((ip,i) => (
                  <div key={i} style={{display:'flex', alignItems:'center', gap:'12px', padding:'10px 0', borderBottom: i<result.ips.length-1 ? '1px solid #f1e7da' : 'none'}}>
                    <img src={`https://source.boringavatars.com/marble/40/${encodeURIComponent(ip.name)}`} width="36" height="36" style={{borderRadius:'10px'}}/>
                    <div style={{flex:1}}>
                      <div style={{fontSize:'13px', fontWeight:600}}>{ip.name}</div>
                      <div style={{height:'5px', borderRadius:'999px', background:'#f1e7da', marginTop:'5px', width:'160px'}}>
                        <div style={{height:'100%', width:`${ip.conf}%`, background:'#1ef6da', borderRadius:'999px'}}/>
                      </div>
                    </div>
                    <div style={{fontSize:'13px', fontWeight:700}}>{ip.conf}%</div>
                  </div>
                ))}
              </div>
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

/* ================= 리포트 화면 ================= */
function ReportScreen({videos, pushToast}){
  const [history, setHistory] = useState([
    {id:'r1', video:'시그니처 라인업 인필 A컷', date:'2026.07.02 18:20', format:'PDF'},
    {id:'r2', video:'겨울 신제품 소구 15초컷', date:'2026.07.08 11:04', format:'JSON'},
    {id:'r3', video:'겨울 신제품 매장 루프컷', date:'2026.07.14 15:47', format:'CSV'},
  ]);
  const [generating, setGenerating] = useState(false);
  const [format, setFormat] = useState('JSON');

  const generate = () => {
    setGenerating(true);
    setTimeout(() => {
      setHistory([{id:'r'+Date.now()%1000, video: videos[Math.floor(Math.random()*4)].name, date:'2026.07.16 방금 전', format}, ...history]);
      setGenerating(false);
      pushToast(`${format} 형식 리포트가 생성되었습니다`);
    }, 1200);
  };

  return (
    <div className="fade-in">
      <header style={{marginBottom:'20px'}}>
        <h1 style={{margin:0, fontSize:'24px'}}>정량 평가 리포트 내보내기</h1>
        <div style={{fontSize:'12.5px', color:'#615f5c', marginTop:'4px'}}>종합 점수·세부 지표·정성 코멘트를 표준 포맷으로 산출합니다.</div>
      </header>

      <div className="stat-card" style={{marginBottom:'18px'}}>
        <div style={{display:'flex', gap:'10px', alignItems:'center', flexWrap:'wrap'}}>
          <div style={{fontWeight:700, marginRight:'8px'}}>출력 포맷</div>
          {['JSON','CSV','PDF'].map(f => (
            <button key={f} className={`chip ${format===f?'active':''}`} onClick={()=>setFormat(f)}>{f}</button>
          ))}
          <button className="btn-primary" style={{marginLeft:'auto'}} onClick={generate} disabled={generating}>
            <Icon name="file-down" size={15}/>{generating ? '생성 중...' : '리포트 생성'}
          </button>
        </div>
      </div>

      <div className="stat-card">
        <div style={{fontWeight:700, marginBottom:'12px'}}>리포트 생성 이력</div>
        <table className="data-table">
          <thead><tr><th>영상명</th><th>생성일시</th><th>포맷</th><th></th></tr></thead>
          <tbody>
            {generating && (
              <tr><td colSpan="4"><div className="skeleton" style={{height:'20px', borderRadius:'6px'}}/></td></tr>
            )}
            {history.map(h => (
              <tr key={h.id}>
                <td style={{fontWeight:600}}>{h.video}</td>
                <td>{h.date}</td>
                <td><span className="badge badge-queue">{h.format}</span></td>
                <td style={{textAlign:'right'}}>
                  <button className="btn-secondary" style={{padding:'6px 12px'}} onClick={()=>pushToast(`${h.video} 리포트를 다시 다운로드했습니다`)}>
                    <Icon name="download" size={13}/>재다운로드
                  </button>
                </td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>
    </div>
  );
}

/* ================= App ================= */
function App(){
  const [screen, setScreen] = useState('main');
  const [videos, setVideos] = useState(VIDEOS);
  const [selectedVideo, setSelectedVideo] = useState(null);
  const [uploadOpen, setUploadOpen] = useState(false);
  const [statusFilter, setStatusFilter] = useState('전체');
  const [search, setSearch] = useState('');
  const [toasts, setToasts] = useState([]);

  useEffect(() => { if(window.lucide) window.lucide.createIcons(); });

  const pushToast = (msg) => {
    const id = Date.now();
    setToasts(t => [...t, {id, msg}]);
    setTimeout(() => setToasts(t => t.filter(x=>x.id!==id)), 3000);
  };

  const handleUploaded = (store, campaign) => {
    setVideos(v => [{id:'v'+Date.now(), name:'신규 업로드 영상 · '+campaign, store, campaign, overall:0, saliency:0, visibility:0, vlm:0, status:'대기', date:'2026.07.16'}, ...v]);
    setUploadOpen(false);
    pushToast('업로드가 완료되어 분석 대기열에 등록되었습니다');
  };

  return (
    <div data-archetype="stripe-multipane" style={{width:'100%', minHeight:'100vh', display:'flex'}}>
      <Sidebar active={screen} onNav={setScreen} />
      <main className="main-wrap" style={{marginLeft:'240px', flex:1, minWidth:0, width:'calc(100% - 240px)', padding:'26px 32px', minHeight:'100vh'}}>
        {screen==='main' && <MainScreen videos={videos} onSelectVideo={setSelectedVideo} onOpenUpload={()=>setUploadOpen(true)}
          statusFilter={statusFilter} setStatusFilter={setStatusFilter} search={search} setSearch={setSearch} pushToast={pushToast} />}
        {screen==='saliency' && <SaliencyScreen videos={videos} />}
        {screen==='quality' && <QualityScreen videos={videos} />}
        {screen==='vlm' && <VlmScreen videos={videos} pushToast={pushToast} />}
        {screen==='report' && <ReportScreen videos={videos} pushToast={pushToast} />}
      </main>

      {selectedVideo && <VideoModal video={selectedVideo} onClose={()=>setSelectedVideo(null)} />}
      {uploadOpen && <UploadModal onClose={()=>setUploadOpen(false)} onUploaded={handleUploaded} />}
      <ToastStack toasts={toasts} />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
