<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>매장 캠페인 영상 효과 통합 분석 플랫폼</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/pretendard@1.3.9/dist/web/static/pretendard.css">
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone@7.27.3/babel.min.js"></script>
<link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/regular/style.css">
<style>
  :root{
    --primary:#e6e6e6; --secondary:#363739; --accent:#ff6363;
    --bg:#040506; --surface:#07080a; --recessed:#111214; --text:#ffffff; --text2:#9c9c9d; --text3:#6a6b6c;
    --success:#59d499; --warn:#ffb84d; --danger:#ff6363;
  }
  *{box-sizing:border-box;}
  html,body{width:100%;margin:0;padding:0;}
  body{
    font-family:'Pretendard',ui-sans-serif,system-ui,sans-serif;
    background:var(--bg); color:var(--text);
    -webkit-font-smoothing:antialiased;
  }
  #root{width:100%;}
  ::-webkit-scrollbar{width:8px;height:8px;}
  ::-webkit-scrollbar-thumb{background:#363739;border-radius:8px;}

  @keyframes fadeInUp{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}
  @keyframes livePulse{0%,100%{opacity:1;}50%{opacity:.35;}}
  @keyframes shimmerLoadDark{0%{background-position:-400px 0;}100%{background-position:400px 0;}}
  @keyframes toastInDark{from{opacity:0;transform:translateY(16px);}to{opacity:1;transform:translateY(0);}}
  @keyframes barGrow{from{transform:scaleX(0);}to{transform:scaleX(1);}}
  @keyframes glowPulse{0%,100%{box-shadow:0 0 0 0 rgba(255,99,99,.35);}50%{box-shadow:0 0 0 8px rgba(255,99,99,0);}}

  .fade-in{animation:fadeInUp .4s ease both;}
  .live-dot{width:7px;height:7px;border-radius:50%;background:var(--danger);animation:livePulse 1.6s infinite;}
  .skeleton{background:linear-gradient(90deg,#111214 25%,#1b1c1e 37%,#111214 63%);background-size:800px 100%;
    animation:shimmerLoadDark 1.4s infinite linear;}
  .toast-pop{animation:toastInDark .3s ease both;}
  .bar-fill{transform-origin:left;animation:barGrow .7s ease both;}
  .glow-badge{animation:glowPulse 2.2s infinite;}

  .app-header{position:sticky; top:0; z-index:50; height:60px; display:flex; align-items:center; gap:22px;
    padding:0 26px; background:rgba(4,5,6,.82); backdrop-filter:blur(20px); border-bottom:1px solid var(--secondary);}
  .brand{display:flex; align-items:center; gap:10px; font-weight:700; font-size:14px;}
  .project-switcher{font-size:13px; color:var(--text2); padding:6px 12px; border:1px solid var(--secondary); border-radius:8px; cursor:pointer;}
  .global-nav{display:flex; gap:4px; margin-left:8px;}
  .nav-link{background:none; border:none; color:var(--text2); font-size:13.5px; font-weight:500; padding:8px 12px;
    border-radius:8px; cursor:pointer; transition:all .15s;}
  .nav-link:hover{color:var(--text); background:rgba(255,255,255,.05);}
  .nav-link.active{color:var(--text); background:rgba(255,255,255,.08);}
  .header-actions{margin-left:auto; display:flex; align-items:center; gap:12px;}

  .tab-bar{display:flex; gap:26px; padding:0 26px; border-bottom:1px solid var(--secondary); background:rgba(255,255,255,.01);}
  .tab{background:none; border:none; color:var(--text2); font-size:13.5px; font-weight:500; padding:12px 2px;
    cursor:pointer; position:relative;}
  .tab.active, .tab[data-active="true"]{color:var(--text);}
  .tab.active::after, .tab[data-active="true"]::after{content:'';position:absolute;left:0;right:0;bottom:-1px;height:2px;background:var(--accent);border-radius:2px;}

  .card{background:var(--surface); border:1px solid var(--secondary); border-radius:10px; padding:20px;
    box-shadow: rgba(255,255,255,0.04) 0px 1px 0px 0px inset;
    transition:transform .15s ease, border-color .15s ease;}
  .card:hover{transform:translateY(-2px); border-color:#4a4b4d;}

  .btn-primary{background:var(--primary); color:var(--secondary); border:none; border-radius:8px; padding:10px 18px;
    font-weight:600; font-size:13.5px; cursor:pointer; display:inline-flex; align-items:center; gap:8px;
    transition:background .15s, transform .1s;}
  .btn-primary:hover{background:#f2f2f2; transform:translateY(-1px);}
  .btn-secondary{background:rgba(255,255,255,.04); color:var(--text); border:1px solid var(--secondary); border-radius:8px;
    padding:9px 16px; font-weight:500; font-size:13.5px; cursor:pointer; display:inline-flex; align-items:center; gap:8px;
    transition:border-color .15s, background .15s;}
  .btn-secondary:hover{border-color:var(--accent); background:rgba(255,99,99,.06);}
  .chip{border:1px solid var(--secondary); background:transparent; color:var(--text2); border-radius:999px;
    padding:6px 14px; font-size:12.5px; cursor:pointer; transition:all .15s;}
  .chip.active{background:rgba(255,99,99,.14); border-color:var(--accent); color:var(--accent);}

  table.data-table{width:100%; border-collapse:collapse; font-size:13.5px;}
  table.data-table th{text-align:left; padding:9px 12px; color:var(--text3); font-weight:600; font-size:11px;
    text-transform:uppercase; letter-spacing:.04em; border-bottom:1px solid var(--secondary);}
  table.data-table td{padding:11px 12px; border-bottom:1px solid #1b1c1e;}
  table.data-table tbody tr{cursor:pointer; transition:background .12s;}
  table.data-table tbody tr:hover{background:rgba(255,255,255,.03);}

  .badge{display:inline-flex; align-items:center; gap:5px; padding:3px 10px; border-radius:6px; font-size:11.5px; font-weight:600;}
  .badge-done{background:rgba(89,212,153,.12); color:var(--success);}
  .badge-progress{background:rgba(255,184,77,.12); color:var(--warn);}
  .badge-queue{background:rgba(156,156,157,.12); color:var(--text2);}
  .badge-risk{background:rgba(255,99,99,.14); color:var(--accent);}

  .modal-overlay{position:fixed; inset:0; background:rgba(0,0,0,.6); display:flex; align-items:center; justify-content:center;
    z-index:100; animation:fadeInUp .2s ease both;}
  .modal-box{background:var(--surface); border:1px solid var(--secondary); border-radius:14px; width:600px; max-width:92vw;
    max-height:86vh; overflow-y:auto; padding:26px; box-shadow:rgba(0,0,0,.4) 0px 30px 50px 0px;}

  .drawer{position:fixed; top:0; right:0; bottom:0; width:420px; max-width:92vw; background:var(--surface);
    border-left:1px solid var(--secondary); z-index:110; padding:24px; overflow-y:auto;
    animation:slideDrawer .25s ease both;}
  @keyframes slideDrawer{from{transform:translateX(100%);}to{transform:translateX(0);}}
  .drawer-overlay{position:fixed; inset:0; background:rgba(0,0,0,.5); z-index:105;}

  .toast-wrap{position:fixed; bottom:24px; right:24px; z-index:200; display:flex; flex-direction:column; gap:10px;}
  .toast{background:#e6e6e6; color:#111214; padding:11px 16px; border-radius:8px; font-size:13px; display:flex;
    align-items:center; gap:8px; box-shadow:0 8px 24px rgba(0,0,0,.5);}

  .range-input{width:100%; accent-color:var(--accent);}
  input,select,textarea{font-family:inherit; background:var(--recessed); color:var(--text); border:1px solid var(--secondary);}
  .status-bar-strip{display:flex; align-items:center; gap:22px; padding:12px 20px; background:var(--surface);
    border:1px solid var(--secondary); border-radius:10px; flex-wrap:wrap;}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" data-presets="react">
const {useState, useEffect} = React;

function seededRandom(seed){
  let s = seed % 2147483647; if (s <= 0) s += 2147483646;
  return function(){ s = (s * 16807) % 2147483647; return (s - 1) / 2147483646; };
}
function hashStr(str){ let h=0; for(let i=0;i<str.length;i++){ h=(h*31+str.charCodeAt(i))|0; } return Math.abs(h); }
function Icon({name, size=17, weight='regular', style}){
  return <i className={`ph ph-${name}`} style={{fontSize:size, lineHeight:1, ...style}}></i>;
}

/* ---------- mock data ---------- */
const STORES = ['강남 플래그십','해운대 프리미엄관','수원 광교점','대구 동성로점','부천 테크몰점'];
const CAMPAIGNS = ['시그니처 라인업 런칭','8K 프리미엄 캠페인','겨울 신제품 소구','프리미엄 리퍼브 캠페인'];

const VIDEOS = [
  {id:'v1', name:'시그니처 라인업 인필 A컷', store:STORES[0], campaign:CAMPAIGNS[0], overall:87, status:'완료', date:'2026.07.02'},
  {id:'v2', name:'8K 프리미엄 30초 인필', store:STORES[1], campaign:CAMPAIGNS[1], overall:74, status:'완료', date:'2026.07.05'},
  {id:'v3', name:'겨울 신제품 소구 15초컷', store:STORES[2], campaign:CAMPAIGNS[2], overall:91, status:'완료', date:'2026.07.08'},
  {id:'v4', name:'리퍼브 캠페인 인필 B컷', store:STORES[3], campaign:CAMPAIGNS[3], overall:58, status:'완료', date:'2026.07.09'},
  {id:'v5', name:'시그니처 라인업 인필 C컷', store:STORES[4], campaign:CAMPAIGNS[0], overall:79, status:'분석중', date:'2026.07.12'},
  {id:'v6', name:'8K 프리미엄 60초 풀버전', store:STORES[1], campaign:CAMPAIGNS[1], overall:0, status:'대기', date:'2026.07.13'},
  {id:'v7', name:'겨울 신제품 매장 루프컷', store:STORES[2], campaign:CAMPAIGNS[2], overall:84, status:'완료', date:'2026.07.14'},
  {id:'v8', name:'프리미엄 라인업 확장판', store:STORES[3], campaign:CAMPAIGNS[3], overall:52, status:'완료', date:'2026.07.15'},
];

const WEIGHT_VERSIONS = [
  {v:'v3.2 (현재)', date:'2026.07.10', desc:'Saliency 비중 상향, IP 인지도 세부 반영'},
  {v:'v3.1', date:'2026.06.22', desc:'Visibility 선명도 가중치 조정'},
  {v:'v3.0', date:'2026.05.30', desc:'초기 3지표 균등 가중치'},
];

function Sparkline({seed, color, width=70, height=26}){
  const rnd = seededRandom(seed);
  const pts = Array.from({length:9}, () => 25 + rnd()*45);
  const max = Math.max(...pts), min = Math.min(...pts);
  const norm = pts.map((v,i) => {
    const x = (i/(pts.length-1))*width;
    const y = height - ((v-min)/(max-min||1))*height;
    return `${x.toFixed(1)},${y.toFixed(1)}`;
  }).join(' ');
  return (
    <svg width={width} height={height} viewBox={`0 0 ${width} ${height}`}>
      <polyline points={norm} fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/>
    </svg>
  );
}

function ScoreTimeline({videos}){
  const w=760, h=180;
  const done = videos.filter(v=>v.status!=='대기');
  const pts = done.map((v,i) => {
    const x = (i/(done.length-1||1))*w;
    const y = h - (v.overall/100)*h;
    return {x, y, v};
  });
  const path = pts.map((p,i)=> `${i===0?'M':'L'}${p.x.toFixed(1)},${p.y.toFixed(1)}`).join(' ');
  return (
    <svg width="100%" viewBox={`0 0 ${w} ${h}`} preserveAspectRatio="none" style={{overflow:'visible'}}>
      <defs>
        <linearGradient id="tlFill" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stopColor="#ff6363" stopOpacity="0.25"/>
          <stop offset="100%" stopColor="#ff6363" stopOpacity="0"/>
        </linearGradient>
      </defs>
      {[25,50,75].map(f => <line key={f} x1="0" x2={w} y1={h-(f/100)*h} y2={h-(f/100)*h} stroke="#1b1c1e" strokeWidth="1"/>)}
      <path d={`${path} L${w},${h} L0,${h} Z`} fill="url(#tlFill)"/>
      <path d={path} fill="none" stroke="#ff6363" strokeWidth="2.5"/>
      {pts.map((p,i) => (
        <circle key={i} cx={p.x} cy={p.y} r={p.v.overall < 65 ? 6:4} fill={p.v.overall < 65 ? '#ff6363':'#e6e6e6'} stroke="#040506" strokeWidth="2"/>
      ))}
    </svg>
  );
}

function MatrixHeat({stores, campaigns}){
  return (
    <div style={{display:'grid', gridTemplateColumns:`120px repeat(${campaigns.length},1fr)`, gap:'4px'}}>
      <div></div>
      {campaigns.map(c => <div key={c} style={{fontSize:'10.5px', color:'#9c9c9d', textAlign:'center', padding:'4px 2px'}}>{c.slice(0,6)}</div>)}
      {stores.map(s => (
        <React.Fragment key={s}>
          <div style={{fontSize:'11.5px', color:'#9c9c9d', display:'flex', alignItems:'center'}}>{s}</div>
          {campaigns.map(c => {
            const seed = hashStr(s+c);
            const rnd = seededRandom(seed);
            const val = Math.round(45 + rnd()*50);
            const bg = val > 80 ? 'rgba(89,212,153,.55)' : val > 60 ? 'rgba(255,184,77,.5)' : 'rgba(255,99,99,.5)';
            return (
              <div key={c} style={{height:'34px', borderRadius:'6px', background:bg, display:'flex', alignItems:'center',
                justifyContent:'center', fontSize:'11.5px', fontWeight:700, color:'#040506'}}>{val}</div>
            );
          })}
        </React.Fragment>
      ))}
    </div>
  );
}

function ToastStack({toasts}){
  return (
    <div className="toast-wrap">
      {toasts.map(t => <div key={t.id} className="toast toast-pop"><Icon name="check-circle" size={16}/>{t.msg}</div>)}
    </div>
  );
}

/* ---------- 상세 Drawer ---------- */
function VideoDrawer({video, onClose}){
  if(!video) return null;
  return (
    <React.Fragment>
      <div className="drawer-overlay" onClick={onClose}/>
      <div className="drawer">
        <div style={{display:'flex', justifyContent:'space-between', alignItems:'flex-start', marginBottom:'18px'}}>
          <div>
            <div style={{fontSize:'11.5px', color:'#9c9c9d'}}>{video.store} · {video.campaign}</div>
            <h3 style={{margin:'4px 0 0', fontSize:'18px'}}>{video.name}</h3>
          </div>
          <button className="btn-secondary" style={{padding:'8px'}} onClick={onClose}><Icon name="x" size={15}/></button>
        </div>
        <div style={{display:'flex', alignItems:'center', gap:'14px', marginBottom:'18px'}}>
          <div style={{fontSize:'36px', fontWeight:700, color:'#ff6363'}}>{video.overall || '—'}</div>
          <span className={`badge ${video.status==='완료'?'badge-done':video.status==='분석중'?'badge-progress':'badge-queue'}`}>{video.status}</span>
        </div>
        <div className="card" style={{marginBottom:'14px'}}>
          <div style={{fontSize:'12px', color:'#9c9c9d', marginBottom:'8px'}}>매장·캠페인 상대 순위</div>
          <div style={{fontSize:'13px'}}>동일 캠페인 내 <b style={{color:'#e6e6e6'}}>상위 {Math.max(5, 100-video.overall)}%</b></div>
        </div>
        <div className="card">
          <div style={{fontSize:'12px', color:'#9c9c9d', marginBottom:'8px'}}>메모</div>
          <div style={{fontSize:'12.5px', color:'#9c9c9d', lineHeight:1.6}}>배치 분석 큐에서 우선순위 조정 없이 정상 처리된 항목입니다. 재검토가 필요하면 우선 검토 큐에 수동 등록하세요.</div>
        </div>
        <button className="btn-primary" style={{width:'100%', justifyContent:'center', marginTop:'18px'}} onClick={onClose}>
          <Icon name="file-text" size={15}/>전체 리포트 열기
        </button>
      </div>
    </React.Fragment>
  );
}

/* ================= 메인: 배치 분석 관제 ================= */
function MainScreen({videos, onSelectVideo, pushToast}){
  const total = videos.length;
  const done = videos.filter(v=>v.status==='완료').length;
  const inProgress = videos.filter(v=>v.status==='분석중').length;
  const queued = videos.filter(v=>v.status==='대기').length;
  const priorityQueue = [...videos].filter(v=>v.status==='완료').sort((a,b)=>a.overall-b.overall).slice(0,4);

  return (
    <div className="fade-in" style={{padding:'24px 26px'}}>
      <div className="status-bar-strip" style={{marginBottom:'18px'}}>
        <div style={{display:'flex', alignItems:'center', gap:'8px'}}>
          <span className="live-dot"></span><span style={{fontSize:'13px', fontWeight:600}}>배치 진행 상태</span>
        </div>
        <div style={{fontSize:'12.5px', color:'#9c9c9d'}}>전체 {total}건</div>
        <div style={{fontSize:'12.5px', color:'#59d499'}}>완료 {done}건</div>
        <div style={{fontSize:'12.5px', color:'#ffb84d'}}>분석중 {inProgress}건</div>
        <div style={{fontSize:'12.5px', color:'#9c9c9d'}}>대기 {queued}건</div>
        <div style={{marginLeft:'auto', fontSize:'11.5px', color:'#6a6b6c'}}>최근 갱신 2026.07.16 09:40</div>
        <button className="btn-secondary" onClick={()=>pushToast('배치 큐를 새로고침했습니다')}><Icon name="arrows-clockwise" size={14}/>새로고침</button>
      </div>

      <div style={{display:'grid', gridTemplateColumns:'2.1fr 1fr', gap:'18px', marginBottom:'18px'}}>
        <div className="card">
          <div style={{fontWeight:700, fontSize:'14px', marginBottom:'4px'}}>영상별 종합 점수 타임라인</div>
          <div style={{fontSize:'11.5px', color:'#6a6b6c', marginBottom:'10px'}}>붉은 점 = 임계값(65점) 미달 영상 — 클릭 시 우선 검토 큐로 이동</div>
          <ScoreTimeline videos={videos}/>
        </div>
        <div className="card">
          <div style={{fontWeight:700, fontSize:'14px', marginBottom:'12px', display:'flex', alignItems:'center', gap:'6px'}}>
            <Icon name="warning-circle" size={16} style={{color:'#ff6363'}}/>우선 검토 큐
          </div>
          {priorityQueue.map((v,i) => (
            <div key={v.id} onClick={()=>onSelectVideo(v)} style={{display:'flex', alignItems:'center', gap:'10px',
              padding:'9px 0', borderBottom: i<priorityQueue.length-1 ? '1px solid #1b1c1e':'none', cursor:'pointer'}}>
              <span className="badge badge-risk glow-badge">{v.overall}</span>
              <div style={{flex:1, minWidth:0}}>
                <div style={{fontSize:'12.5px', fontWeight:600, whiteSpace:'nowrap', overflow:'hidden', textOverflow:'ellipsis'}}>{v.name}</div>
                <div style={{fontSize:'11px', color:'#6a6b6c'}}>{v.store}</div>
              </div>
              <Icon name="caret-right" size={14} style={{color:'#6a6b6c'}}/>
            </div>
          ))}
        </div>
      </div>

      <div style={{display:'grid', gridTemplateColumns:'repeat(4,1fr)', gap:'14px', marginBottom:'18px'}}>
        <div className="card stat-card" style={{display:'flex', justifyContent:'space-between', alignItems:'center'}}>
          <div>
            <div className="stat-label" style={{fontSize:'11px', color:'#9c9c9d'}}>배치 처리 완료율</div>
            <div className="stat-value" style={{fontSize:'24px', fontWeight:700, marginTop:'2px', color:'#59d499'}}>{Math.round(done/total*100)}%</div>
          </div>
          <Sparkline seed={30} color="#59d499"/>
        </div>
        <div className="card stat-card" style={{display:'flex', justifyContent:'space-between', alignItems:'center'}}>
          <div>
            <div className="stat-label" style={{fontSize:'11px', color:'#9c9c9d'}}>평균 종합 점수</div>
            <div className="stat-value" style={{fontSize:'24px', fontWeight:700, marginTop:'2px', color:'#e6e6e6'}}>
              {Math.round(videos.filter(v=>v.overall>0).reduce((s,v)=>s+v.overall,0)/videos.filter(v=>v.overall>0).length)}
            </div>
          </div>
          <Sparkline seed={53} color="#e6e6e6"/>
        </div>
        <div className="card stat-card" style={{display:'flex', justifyContent:'space-between', alignItems:'center'}}>
          <div>
            <div className="stat-label" style={{fontSize:'11px', color:'#9c9c9d'}}>임계값 미달 건수</div>
            <div className="stat-value" style={{fontSize:'24px', fontWeight:700, marginTop:'2px', color:'#ff6363'}}>
              {videos.filter(v=>v.overall>0 && v.overall<65).length}
            </div>
          </div>
          <Sparkline seed={76} color="#ff6363"/>
        </div>
        <div className="card stat-card" style={{display:'flex', justifyContent:'space-between', alignItems:'center'}}>
          <div>
            <div className="stat-label" style={{fontSize:'11px', color:'#9c9c9d'}}>가중치 버전</div>
            <div className="stat-value" style={{fontSize:'24px', fontWeight:700, marginTop:'2px', color:'#ffb84d'}}>v3.2</div>
          </div>
          <Sparkline seed={99} color="#ffb84d"/>

      <div className="card">
        <div style={{fontWeight:700, fontSize:'14px', marginBottom:'12px'}}>보조 위젯 — 매장·캠페인 점수 분포</div>
        <MatrixHeat stores={STORES.slice(0,4)} campaigns={CAMPAIGNS}/>
      </div>
    </div>
  );
}

/* ================= 영상 라이브러리 화면 ================= */
function LibraryScreen({videos, setVideos, pushToast}){
  const [search, setSearch] = useState('');
  const [uploading, setUploading] = useState(false);
  const [progressMap, setProgressMap] = useState({});
  const [activeFilters, setActiveFilters] = useState({매장:false, 캠페인:false, 촬영일:false});
  const toggleFilter = (k) => { setActiveFilters(f => ({...f, [k]: !f[k]})); pushToast(`${k} 필터를 ${activeFilters[k] ? '해제' : '적용'}했습니다`); };

  const filtered = videos.filter(v => v.name.includes(search) || v.store.includes(search) || v.campaign.includes(search));

  const startBatchUpload = () => {
    const ids = ['u1','u2','u3'];
    setUploading(true);
    ids.forEach((id,i) => {
      let p = 0;
      const timer = setInterval(() => {
        p += 25 + i*3;
        setProgressMap(m => ({...m, [id]: Math.min(p,100)}));
        if(p >= 100){
          clearInterval(timer);
          if(i === ids.length-1){
            setTimeout(() => {
              setVideos(v => [{id:'v'+Date.now(), name:'배치 업로드 영상 #'+(v.length+1), store:STORES[0], campaign:CAMPAIGNS[0], overall:0, status:'대기', date:'2026.07.16'}, ...v]);
              setUploading(false);
              pushToast('배치 업로드 3건이 완료되어 분석 대기열에 등록되었습니다');
            }, 300);
          }
        }
      }, 300+i*120);
    });
  };

  return (
    <div className="fade-in" style={{padding:'24px 26px'}}>
      <div style={{display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:'18px', flexWrap:'wrap', gap:'12px'}}>
        <div>
          <h1 style={{margin:0, fontSize:'22px'}}>영상 라이브러리 및 배치 업로드 관리</h1>
          <div style={{fontSize:'12px', color:'#9c9c9d', marginTop:'4px'}}>매장·캠페인 메타데이터로 태깅된 인필 영상 저장소</div>
        </div>
        <button className="btn-primary" onClick={startBatchUpload} disabled={uploading}>
          <Icon name="upload-simple" size={15}/>{uploading ? '배치 업로드 중...' : '배치 업로드'}
        </button>
      </div>

      {uploading && (
        <div className="card" style={{marginBottom:'16px'}}>
          {['u1','u2','u3'].map((id,i) => (
            <div key={id} style={{marginBottom: i<2 ? '10px':'0'}}>
              <div style={{display:'flex', justifyContent:'space-between', fontSize:'11.5px', color:'#9c9c9d', marginBottom:'4px'}}>
                <span>신규_인필_{i+1}.mp4</span><span>{progressMap[id]||0}%</span>
              </div>
              <div style={{height:'6px', borderRadius:'999px', background:'#1b1c1e', overflow:'hidden'}}>
                <div style={{height:'100%', width:`${progressMap[id]||0}%`, background:'#ff6363', transition:'width .25s'}}/>
              </div>
            </div>
          ))}
        </div>
      )}

      <div style={{display:'flex', gap:'10px', marginBottom:'14px'}}>
        <div style={{position:'relative', flex:1}}>
          <Icon name="magnifying-glass" size={15} style={{position:'absolute', left:'12px', top:'10px', color:'#6a6b6c'}}/>
          <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="영상명·매장·캠페인 검색"
            style={{width:'100%', padding:'9px 12px 9px 34px', borderRadius:'8px'}}/>
        </div>
        <button className={`chip ${activeFilters.매장?'active':''}`} onClick={()=>toggleFilter('매장')}>매장</button>
        <button className={`chip ${activeFilters.캠페인?'active':''}`} onClick={()=>toggleFilter('캠페인')}>캠페인</button>
        <button className={`chip ${activeFilters.촬영일?'active':''}`} onClick={()=>toggleFilter('촬영일')}>촬영일</button>
      </div>

      <div style={{display:'grid', gridTemplateColumns:'repeat(4,1fr)', gap:'14px'}}>
        {filtered.map(v => (
          <div key={v.id} className="card" style={{padding:'14px'}}>
            <div style={{height:'86px', borderRadius:'8px', marginBottom:'10px',
              background:`linear-gradient(135deg, rgba(255,99,99,${0.15+(hashStr(v.id)%40)/100}), rgba(4,5,6,0.9))`,
              display:'flex', alignItems:'center', justifyContent:'center'}}>
              <Icon name="film-strip" size={22} style={{color:'#9c9c9d'}}/>
            </div>
            <div style={{fontSize:'12.5px', fontWeight:600, marginBottom:'4px', whiteSpace:'nowrap', overflow:'hidden', textOverflow:'ellipsis'}}>{v.name}</div>
            <div style={{fontSize:'11px', color:'#6a6b6c'}}>{v.store}</div>
            <div style={{display:'flex', justifyContent:'space-between', alignItems:'center', marginTop:'8px'}}>
              <span className={`badge ${v.status==='완료'?'badge-done':v.status==='분석중'?'badge-progress':'badge-queue'}`}>{v.status}</span>
              <span style={{fontSize:'11px', color:'#6a6b6c'}}>{v.date.slice(5)}</span>
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}

/* ================= 프레임워크 가중치 화면 ================= */
function FrameworkScreen({pushToast}){
  const [weights, setWeights] = useState({saliency:38, visibility:34, vlm:28});
  const [threshold, setThreshold] = useState(65);
  const [versions, setVersions] = useState(WEIGHT_VERSIONS);
  const [saved, setSaved] = useState(false);

  const total = weights.saliency+weights.visibility+weights.vlm;
  const previewScore = Math.round((82*weights.saliency + 88*weights.visibility + 79*weights.vlm)/total);

  const setW = (k,v) => setWeights(w => ({...w, [k]:v}));

  const saveVersion = () => {
    setVersions(vs => [{v:`v3.3 (신규)`, date:'2026.07.16 방금 전', desc:`임계값 ${threshold}점, Saliency ${weights.saliency}% 반영`}, ...vs]);
    setSaved(true);
    pushToast('가중치 버전이 저장되어 이후 리포트에 적용됩니다');
    setTimeout(()=>setSaved(false), 1600);
  };

  return (
    <div className="fade-in" style={{padding:'24px 26px'}}>
      <h1 style={{margin:'0 0 4px', fontSize:'22px'}}>평가 프레임워크 가중치 설정 관리</h1>
      <div style={{fontSize:'12px', color:'#9c9c9d', marginBottom:'20px'}}>지표별 가중치·임계값을 버전으로 관리해 과거 리포트의 재현성을 보장합니다.</div>

      <div style={{display:'grid', gridTemplateColumns:'1.3fr 1fr', gap:'18px'}}>
        <div className="card">
          <div style={{fontWeight:700, marginBottom:'16px'}}>지표별 가중치 슬라이더</div>
          {[
            {key:'saliency', label:'Saliency (시각적 타격력)'},
            {key:'visibility', label:'Visibility (화질 물리지표)'},
            {key:'vlm', label:'VLM (의도 적합성)'},
          ].map(m => (
            <div key={m.key} style={{marginBottom:'16px'}}>
              <div style={{display:'flex', justifyContent:'space-between', fontSize:'12.5px', marginBottom:'6px'}}>
                <span>{m.label}</span><span style={{fontWeight:700}}>{weights[m.key]}%</span>
              </div>
              <input type="range" min="10" max="70" value={weights[m.key]} className="range-input"
                onChange={e=>setW(m.key, Number(e.target.value))}/>
            </div>
          ))}
          <div style={{marginTop:'8px', marginBottom:'16px'}}>
            <div style={{display:'flex', justifyContent:'space-between', fontSize:'12.5px', marginBottom:'6px'}}>
              <span>우선 검토 임계값</span><span style={{fontWeight:700}}>{threshold}점</span>
            </div>
            <input type="range" min="40" max="85" value={threshold} className="range-input"
              onChange={e=>setThreshold(Number(e.target.value))}/>
          </div>
          <button className="btn-primary" onClick={saveVersion}>
            <Icon name={saved?'check':'floppy-disk'} size={15}/>{saved ? '저장됨' : '새 버전으로 저장'}
          </button>
        </div>

        <div>
          <div className="card" style={{marginBottom:'14px', textAlign:'center'}}>
            <div style={{fontSize:'12px', color:'#9c9c9d'}}>샘플 영상 기준 미리보기 점수</div>
            <div style={{fontSize:'40px', fontWeight:700, margin:'8px 0', color:'#ff6363'}}>{previewScore}</div>
            <div style={{fontSize:'11.5px', color:'#6a6b6c'}}>가중치 합계 {total}% 기준 정규화</div>
          </div>
          <div className="card">
            <div style={{fontWeight:700, fontSize:'13px', marginBottom:'10px'}}>가중치 버전 이력</div>
            {versions.map((v,i) => (
              <div key={i} style={{padding:'10px 0', borderBottom: i<versions.length-1 ? '1px solid #1b1c1e':'none'}}>
                <div style={{display:'flex', justifyContent:'space-between'}}>
                  <span style={{fontSize:'12.5px', fontWeight:600}}>{v.v}</span>
                  <span style={{fontSize:'11px', color:'#6a6b6c'}}>{v.date}</span>
                </div>
                <div style={{fontSize:'11.5px', color:'#9c9c9d', marginTop:'2px'}}>{v.desc}</div>
              </div>
            ))}
          </div>
        </div>
      </div>
    </div>
  );
}

/* ================= 리포트 이력 화면 ================= */

    {id:'h1', video:'시그니처 라인업 인필 A컷', store:STORES[0], date:'2026.07.02', format:'PDF'},
    {id:'h2', video:'겨울 신제품 소구 15초컷', store:STORES[2], date:'2026.07.08', format:'JSON'},
    {id:'h3', video:'겨울 신제품 매장 루프컷', store:STORES[2], date:'2026.07.14', format:'CSV'},

          <option>전체</option>{STORES.map(s => <option key={s}>{s}</option>)}
        </select>
        <select value={formatFilter} onChange={e=>setFormatFilter(e.target.value)} style={{padding:'8px 12px', borderRadius:'8px'}}>
          <option>전체</option><option>JSON</option><option>CSV</option><option>PDF</option>
        </select>
      </div>

      <div className="card">
        <table className="data-table">
          <thead><tr><th>영상명</th><th>매장</th><th>생성일</th><th>포맷</th><th></th></tr></thead>
          <tbody>
            {filtered.map(h => (
              <tr key={h.id}>
                <td style={{fontWeight:600}}>{h.video}</td>

                <td style={{textAlign:'right'}}>

                  </button>
                </td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>
    </div>
  );

/* ================= 매장·캠페인 비교 분석 화면 ================= */
function CompareScreen(){
  const [metric, setMetric] = useState('종합점수');
  return (
    <div className="fade-in" style={{padding:'24px 26px'}}>
      <h1 style={{margin:'0 0 4px', fontSize:'22px'}}>매장·캠페인 비교 분석</h1>
      <div style={{fontSize:'12px', color:'#9c9c9d', marginBottom:'20px'}}>매장 × 캠페인 조합별 점수를 매트릭스로 비교합니다.</div>

      <div style={{display:'flex', gap:'8px', marginBottom:'16px'}}>
        {['종합점수','Saliency','Visibility','VLM'].map(m => (
          <button key={m} className={`chip ${metric===m?'active':''}`} onClick={()=>setMetric(m)}>{m}</button>
        ))}
      </div>

      <div className="card" style={{marginBottom:'18px'}}>
        <div style={{fontWeight:700, fontSize:'14px', marginBottom:'14px'}}>{metric} — 매장 × 캠페인 매트릭스</div>
        <MatrixHeat stores={STORES} campaigns={CAMPAIGNS}/>
      </div>

      <div className="card">
        <div style={{fontWeight:700, fontSize:'14px', marginBottom:'14px'}}>매장별 평균 점수 막대</div>
        {STORES.map((s,i) => {
          const val = 55 + (hashStr(s+metric)%40);
          return (
            <div key={s} style={{display:'flex', alignItems:'center', gap:'12px', marginBottom:'10px'}}>
              <div style={{width:'120px', fontSize:'12px', color:'#9c9c9d'}}>{s}</div>
              <div style={{flex:1, height:'10px', borderRadius:'999px', background:'#1b1c1e', overflow:'hidden'}}>

              </div>
              <div style={{width:'30px', fontSize:'12px', textAlign:'right'}}>{val}</div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

/* ================= App ================= */
function App(){
  const [screen, setScreen] = useState('main');
  const [videos, setVideos] = useState(VIDEOS);
  const [selectedVideo, setSelectedVideo] = useState(null);
  const [toasts, setToasts] = useState([]);

  const pushToast = (msg) => {
    const id = Date.now();
    setToasts(t => [...t, {id, msg}]);
    setTimeout(() => setToasts(t => t.filter(x=>x.id!==id)), 3000);
  };

  const navItems = [
    {key:'main', label:'매장·캠페인별 배치 분석 관제'},
    {key:'library', label:'영상 라이브러리 및 배치 업로드 관리'},
    {key:'framework', label:'평가 프레임워크 가중치 설정 관리'},
    {key:'history', label:'정량 평가 리포트 이력 및 내보내기'},
    {key:'compare', label:'매장·캠페인 비교 분석'},
  ];

  return (
    <div data-archetype="topbar-analytics" style={{width:'100%', minHeight:'100vh', display:'flex', flexDirection:'column'}}>
      <header className="app-header">
        <div className="brand">
          <div style={{width:26,height:26,borderRadius:'7px',background:'#ff6363',display:'flex',alignItems:'center',justifyContent:'center'}}>
            <Icon name="chart-line-up" size={15} style={{color:'#040506'}}/>
          </div>
          인필 배치 콘솔
        </div>
        <div className="project-switcher">샘플 매장 세트 A ▾</div>
        <nav className="global-nav">
          {navItems.slice(0,3).map(n => (
            <button key={n.key} className={`nav-link ${screen===n.key?'active':''}`} onClick={()=>setScreen(n.key)}>
              {n.key==='main' ? '개요' : n.label.length>10 ? n.label.slice(0,8)+'…' : n.label}
            </button>
          ))}
        </nav>
        <div className="header-actions">
          <Icon name="bell-simple" size={18} style={{color:'#9c9c9d', cursor:'pointer'}}/>
          <img src="https://source.boringavatars.com/beam/30/analyst-ops?colors=ff6363,e6e6e6,363739,07080a" width="28" height="28" style={{borderRadius:'50%'}}/>
        </div>
      </header>

      <nav className="tab-bar">
        <button className="tab" style={screen==='main' ? {color:'#ffffff'} : {}} data-active={screen==='main'} onClick={()=>setScreen('main')}>{navItems[0].label}</button>
        <button className="tab" style={screen==='library' ? {color:'#ffffff'} : {}} data-active={screen==='library'} onClick={()=>setScreen('library')}>{navItems[1].label}</button>
        <button className="tab" style={screen==='framework' ? {color:'#ffffff'} : {}} data-active={screen==='framework'} onClick={()=>setScreen('framework')}>{navItems[2].label}</button>
        <button className="tab" style={screen==='history' ? {color:'#ffffff'} : {}} data-active={screen==='history'} onClick={()=>setScreen('history')}>{navItems[3].label}</button>
        <button className="tab" style={screen==='compare' ? {color:'#ffffff'} : {}} data-active={screen==='compare'} onClick={()=>setScreen('compare')}>{navItems[4].label}</button>
      </nav>

      <main style={{flex:1, width:'100%', maxWidth:'1320px', margin:'0 auto'}}>
        {screen==='main' && <MainScreen videos={videos} onSelectVideo={setSelectedVideo} pushToast={pushToast} />}
        {screen==='library' && <LibraryScreen videos={videos} setVideos={setVideos} pushToast={pushToast} />}
        {screen==='framework' && <FrameworkScreen pushToast={pushToast} />}
        {screen==='history' && <HistoryScreen pushToast={pushToast} />}
        {screen==='compare' && <CompareScreen />}
      </main>

      {selectedVideo && <VideoDrawer video={selectedVideo} onClose={()=>setSelectedVideo(null)} />}
      <ToastStack toasts={toasts} />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
