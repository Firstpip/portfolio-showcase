<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>

<style>

    --obsidian: #09090b;
    --graphite: #18181b;
    --cloud: #ececee;
    --paper: #f4f4f5;
    --snow: #ffffff;
    --ember: #ff5a00;
    --fog: #71717a;
    --ash: #a1a1aa;
    --mist: #d4d4d8;
    --radius-card: 32px;
    --radius-ctrl: 14px;
    --radius-pill: 999px;
  }
  * { box-sizing: border-box; }
  html, body { width: 100%; margin: 0; padding: 0; }
  body {
    font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, sans-serif;
    background: var(--paper);
    color: var(--obsidian);
    -webkit-font-smoothing: antialiased;
  }
  #app-root { width: 100%; }
  button { font-family: inherit; cursor: pointer; border: none; background: none; color: inherit; }
  input, textarea, select { font-family: inherit; }
  a { text-decoration: none; color: inherit; }
  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-thumb { background: var(--mist); border-radius: 8px; }

  @keyframes fadeInUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes ripple { from { transform: scale(0); opacity: 0.4; } to { transform: scale(2.8); opacity: 0; } }
  @keyframes drawerIn { from { transform: translateX(100%); } to { transform: translateX(0); } }
  @keyframes bannerSlide { 0%, 30% { transform: translateX(0); } 33%, 63% { transform: translateX(-100%); } 66%, 96% { transform: translateX(-200%); } 100% { transform: translateX(0); } }
  @keyframes pulseDot { 0%, 100% { box-shadow: 0 0 0 0 rgba(255,90,0,0.45); } 70% { box-shadow: 0 0 0 6px rgba(255,90,0,0); } }
  @keyframes toastPop { from { opacity: 0; transform: translateY(10px) scale(0.98); } to { opacity: 1; transform: translateY(0) scale(1); } }

  .icon { width: 18px; height: 18px; stroke-width: 1.8; flex-shrink: 0; }

  /* ── search-header (archetype signature) ── */
  .search-header { position: sticky; top: 0; z-index: 40; background: rgba(244,244,245,0.92); backdrop-filter: blur(14px); border-bottom: 1px solid var(--cloud); }
  .header-row { max-width: 1280px; margin: 0 auto; display: flex; align-items: center; gap: 20px; padding: 14px 28px; }
  .brand { display: flex; align-items: center; gap: 8px; font-size: 18px; font-weight: 700; color: var(--obsidian); flex-shrink: 0; }
  .brand-mark { width: 30px; height: 30px; border-radius: 10px; background: var(--obsidian); display: flex; align-items: center; justify-content: center; color: var(--ember); }
  .search-bar { flex: 1; display: flex; align-items: center; background: var(--snow); border: 1px solid var(--cloud); border-radius: var(--radius-pill); box-shadow: 0 1px 2px rgba(0,0,0,0.03); max-width: 640px; }
  .search-segment { flex: 1; display: flex; flex-direction: column; align-items: flex-start; padding: 8px 20px; border-radius: var(--radius-pill); transition: background .15s; text-align: left; }
  .search-segment:hover { background: var(--paper); }
  .segment-label { font-size: 11px; font-weight: 700; color: var(--obsidian); }
  .segment-value { font-size: 12px; color: var(--fog); margin-top: 1px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 140px; }
  .search-divider { width: 1px; height: 24px; background: var(--cloud); }
  .search-submit { width: 40px; height: 40px; border-radius: 50%; background: var(--ember); color: #fff; display: flex; align-items: center; justify-content: center; margin: 6px; flex-shrink: 0; transition: transform .15s; }
  .search-submit:hover { transform: scale(1.06); }
  .header-nav { display: flex; align-items: center; gap: 6px; flex-shrink: 0; }
  .nav-btn { padding: 10px 16px; border-radius: var(--radius-pill); font-size: 13px; font-weight: 600; color: var(--fog); white-space: nowrap; transition: all .15s; position: relative; }
  .nav-btn:hover { background: var(--snow); color: var(--obsidian); }
  .nav-btn.active { background: var(--obsidian); color: #fff; }
  .nav-badge { position: absolute; top: 4px; right: 6px; width: 8px; height: 8px; border-radius: 50%; background: var(--ember); animation: pulseDot 2s infinite; }
  .user-menu { width: 40px; height: 40px; border-radius: 50%; background: var(--snow); border: 1px solid var(--cloud); display: flex; align-items: center; justify-content: center; flex-shrink: 0; }

  .filter-chips { max-width: 1280px; margin: 0 auto; display: flex; gap: 8px; padding: 0 28px 14px; overflow-x: auto; scrollbar-width: none; }
  .filter-chips::-webkit-scrollbar { display: none; }
  .chip { flex-shrink: 0; display: flex; align-items: center; gap: 6px; padding: 8px 16px; border-radius: var(--radius-pill); background: var(--snow); border: 1px solid var(--cloud); font-size: 13px; font-weight: 600; color: var(--graphite); transition: all .15s; }
  .chip:hover { border-color: var(--obsidian); }
  .chip.active { background: var(--obsidian); color: #fff; border-color: var(--obsidian); }
  .chip-icon { font-size: 14px; }

  .main { max-width: 1280px; margin: 0 auto; padding: 28px; width: 100%; }
  .hero-band { position: relative; border-radius: var(--radius-card); overflow: hidden; margin-bottom: 28px; min-height: 220px; display: flex; align-items: flex-end; }
  .network-hero { position: absolute; inset: 0; z-index: 0; }
  @keyframes nodePulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.45; } }
  @keyframes edgeDraw { from { opacity: 0; } to { opacity: 0.55; } }
  .hero-node { animation: nodePulse 2.6s ease-in-out infinite; }
  .hero-edge { animation: edgeDraw 1s ease forwards; }
  .hero-line { position: relative; z-index: 1; font-size: clamp(32px, 4.4vw, 56px); font-weight: 600; letter-spacing: -0.02em; line-height: 1.14; margin: 0; padding: 32px; color: #fff; }
  .section-head { display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 18px; }
  .section-title { font-size: 22px; font-weight: 700; }
  .section-sub { font-size: 13px; color: var(--fog); margin-top: 4px; }
  .result-count { font-size: 13px; color: var(--fog); }

  .card-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 22px; }
  .listing-card { background: var(--snow); border: 1px solid var(--cloud); border-radius: var(--radius-card); overflow: hidden; cursor: pointer; animation: fadeInUp .4s ease both; transition: transform .18s, box-shadow .18s; }
  .listing-card:hover { transform: scale(1.015); border-color: var(--obsidian); }
  .card-image-wrap { position: relative; aspect-ratio: 4/3; overflow: hidden; }
  .card-image { width: 100%; height: 100%; }
  .card-favorite { position: absolute; top: 12px; right: 12px; width: 32px; height: 32px; border-radius: 50%; background: rgba(255,255,255,0.9); display: flex; align-items: center; justify-content: center; z-index: 2; transition: transform .15s; }
  .card-favorite:hover { transform: scale(1.1); }
  .card-favorite.active .icon { fill: var(--ember); stroke: var(--ember); }
  .verified-badge { position: absolute; top: 12px; left: 12px; background: var(--obsidian); color: #fff; font-size: 11px; font-weight: 700; padding: 4px 10px; border-radius: var(--radius-pill); display: flex; align-items: center; gap: 4px; z-index: 2; }
  .card-body { padding: 20px; }
  .card-row-1 { display: flex; align-items: flex-start; justify-content: space-between; gap: 8px; }
  .card-title { font-size: 16px; font-weight: 700; margin: 0; line-height: 1.3; }
  .card-rating { display: flex; align-items: center; gap: 3px; font-size: 13px; font-weight: 700; flex-shrink: 0; }
  .card-row-2, .card-row-3 { font-size: 13px; color: var(--fog); margin-top: 4px; display: flex; align-items: center; gap: 5px; }
  .card-row-4 { display: flex; align-items: center; gap: 6px; margin-top: 12px; }
  .card-price { font-size: 14px; font-weight: 700; color: var(--obsidian); }
  .price-unit { font-size: 12px; color: var(--fog); }
  .tag-pill { border: 1px solid var(--cloud); border-radius: 12px; padding: 3px 9px; font-size: 11px; font-weight: 600; color: var(--graphite); }

  /* ── quick-view drawer ── */
  .drawer-overlay { position: fixed; inset: 0; background: rgba(9,9,11,0.4); z-index: 60; }
  .quick-view { position: fixed; top: 0; right: 0; bottom: 0; width: min(440px, 92vw); background: var(--snow); z-index: 61; overflow-y: auto; animation: drawerIn .3s cubic-bezier(.2,.9,.3,1); box-shadow: -12px 0 40px rgba(0,0,0,0.15); }
  .drawer-close { position: absolute; top: 18px; right: 18px; width: 36px; height: 36px; border-radius: 50%; background: var(--paper); display: flex; align-items: center; justify-content: center; z-index: 2; }
  .drawer-hero { aspect-ratio: 16/9; }
  .drawer-body { padding: 24px; }
  .drawer-title { font-size: 22px; font-weight: 700; margin: 0 0 6px; }
  .drawer-meta-row { display: flex; align-items: center; gap: 6px; font-size: 13px; color: var(--fog); margin-bottom: 18px; }
  .drawer-section { padding: 16px 0; border-top: 1px solid var(--cloud); }
  .drawer-section h4 { font-size: 13px; text-transform: uppercase; letter-spacing: 0.4px; color: var(--fog); margin: 0 0 10px; }
  .contact-row { display: flex; align-items: center; gap: 10px; font-size: 14px; padding: 8px 0; }
  .contact-row .icon { color: var(--fog); }
  .btn { display: inline-flex; align-items: center; justify-content: center; gap: 8px; height: 46px; border-radius: var(--radius-ctrl); font-size: 14px; font-weight: 700; position: relative; overflow: hidden; width: 100%; }
  .btn-fill { background: var(--obsidian); color: #fff; }
  .btn-ghost { background: var(--paper); color: var(--obsidian); border: 1px solid var(--cloud); }
  .ripple-el { position: absolute; border-radius: 50%; background: rgba(255,255,255,0.5); pointer-events: none; animation: ripple .6s ease-out; }

  /* ── chat view ── */
  .chat-shell { display: grid; grid-template-columns: 300px 1fr; gap: 0; border: 1px solid var(--cloud); border-radius: var(--radius-card); overflow: hidden; background: var(--snow); height: 640px; }
  .chat-list { border-right: 1px solid var(--cloud); overflow-y: auto; }
  .chat-list-item { display: flex; align-items: center; gap: 12px; padding: 14px 18px; border-bottom: 1px solid var(--paper); transition: background .12s; }
  .chat-list-item:hover, .chat-list-item.active { background: var(--paper); }
  .chat-avatar { width: 42px; height: 42px; border-radius: 50%; background: var(--obsidian); color: #fff; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 700; flex-shrink: 0; }
  .chat-list-name { font-size: 13.5px; font-weight: 700; }
  .chat-list-preview { font-size: 12px; color: var(--fog); margin-top: 2px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 170px; }
  .chat-unread { width: 18px; height: 18px; border-radius: 50%; background: var(--ember); color: #fff; font-size: 10px; font-weight: 700; display: flex; align-items: center; justify-content: center; margin-left: auto; }
  .chat-main { display: flex; flex-direction: column; }
  .chat-header { padding: 16px 22px; border-bottom: 1px solid var(--cloud); display: flex; align-items: center; gap: 12px; }
  .chat-body { flex: 1; overflow-y: auto; padding: 22px; display: flex; flex-direction: column; gap: 14px; }
  .msg-bubble { max-width: 68%; padding: 11px 15px; border-radius: 18px; font-size: 13.5px; line-height: 1.5; animation: fadeInUp .3s ease both; }
  .msg-bubble.them { background: var(--paper); align-self: flex-start; border-bottom-left-radius: 4px; }
  .msg-bubble.me { background: var(--obsidian); color: #fff; align-self: flex-end; border-bottom-right-radius: 4px; }
  .msg-time { font-size: 10.5px; color: var(--ash); margin-top: 4px; }
  .chat-input-row { padding: 14px 18px; border-top: 1px solid var(--cloud); display: flex; gap: 10px; align-items: center; }
  .chat-input-row input { flex: 1; border: 1px solid var(--cloud); border-radius: var(--radius-pill); padding: 12px 18px; font-size: 13.5px; background: var(--paper); }
  .send-btn { width: 42px; height: 42px; border-radius: 50%; background: var(--ember); color: #fff; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }

  .promo-grid { display: grid; grid-template-columns: 1.1fr 0.9fr; gap: 24px; align-items: start; }
  .promo-card { background: var(--snow); border: 1px solid var(--cloud); border-radius: var(--radius-card); padding: 26px; }

  .field-label { font-size: 12.5px; font-weight: 700; margin-bottom: 6px; display: block; }
  .field-input, .field-textarea { width: 100%; border: 1px solid var(--cloud); border-radius: var(--radius-ctrl); padding: 11px 14px; font-size: 13.5px; background: var(--paper); }
  .field-textarea { resize: vertical; min-height: 90px; }
  .upload-drop { border: 1.5px dashed var(--mist); border-radius: var(--radius-ctrl); padding: 22px; text-align: center; color: var(--fog); font-size: 12.5px; transition: border-color .15s; }
  .upload-drop:hover { border-color: var(--obsidian); }
  .promo-list-item { display: flex; align-items: center; gap: 12px; padding: 14px; border: 1px solid var(--cloud); border-radius: 18px; margin-bottom: 10px; background: var(--snow); }
  .promo-thumb { width: 44px; height: 44px; border-radius: 10px; flex-shrink: 0; }
  .promo-list-name { font-size: 13.5px; font-weight: 700; }
  .promo-list-meta { font-size: 11.5px; color: var(--fog); }
  .status-badge { font-size: 11px; font-weight: 700; padding: 4px 10px; border-radius: var(--radius-pill); margin-left: auto; flex-shrink: 0; }
  .status-badge.pending { background: #fef3e2; color: #a9600a; }
  .status-badge.approved { background: #e6f6ec; color: #1a7f45; }
  .status-badge.rejected { background: #fdecec; color: #c1352b; }
  .banner-preview { position: relative; height: 130px; border-radius: var(--radius-ctrl); overflow: hidden; margin-top: 16px; background: var(--obsidian); }
  .banner-track { display: flex; width: 300%; height: 100%; animation: bannerSlide 9s infinite ease-in-out; }
  .banner-slide { width: 33.333%; height: 100%; display: flex; align-items: center; justify-content: center; color: #fff; font-size: 14px; font-weight: 700; flex-direction: column; gap: 4px; }
  .banner-dots { position: absolute; bottom: 10px; left: 50%; transform: translateX(-50%); display: flex; gap: 5px; }
  .banner-dot { width: 6px; height: 6px; border-radius: 50%; background: rgba(255,255,255,0.4); }

  /* ── account view ── */
  .account-grid { display: grid; grid-template-columns: 320px 1fr; gap: 24px; align-items: start; }
  .profile-card { background: var(--snow); border: 1px solid var(--cloud); border-radius: var(--radius-card); padding: 26px; text-align: center; }
  .profile-avatar { width: 76px; height: 76px; border-radius: 50%; background: var(--obsidian); color: var(--ember); display: flex; align-items: center; justify-content: center; margin: 0 auto 14px; }
  .role-switch { display: flex; gap: 6px; background: var(--paper); border-radius: var(--radius-pill); padding: 4px; margin-top: 16px; }
  .role-opt { flex: 1; padding: 8px 0; border-radius: var(--radius-pill); font-size: 12px; font-weight: 700; color: var(--fog); }
  .role-opt.active { background: var(--obsidian); color: #fff; }
  .dues-banner { display: flex; align-items: center; gap: 14px; padding: 18px 22px; border-radius: 20px; margin-bottom: 18px; }
  .dues-banner.ok { background: #e6f6ec; color: #1a7f45; }
  .dues-banner.due { background: #fdecec; color: #c1352b; }
  .dues-banner-text { font-size: 13.5px; font-weight: 700; flex: 1; }
  .dues-banner-sub { font-size: 12px; font-weight: 500; opacity: .85; margin-top: 2px; }
  .menu-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
  .menu-item { background: var(--snow); border: 1px solid var(--cloud); border-radius: 20px; padding: 18px; display: flex; flex-direction: column; gap: 10px; text-align: left; transition: all .15s; }
  .menu-item:not(.locked):hover { border-color: var(--obsidian); transform: translateY(-2px); }
  .menu-item.locked { opacity: .45; cursor: not-allowed; }
  .menu-icon-wrap { width: 38px; height: 38px; border-radius: 12px; background: var(--paper); display: flex; align-items: center; justify-content: center; }
  .menu-item-title { font-size: 13.5px; font-weight: 700; }
  .menu-item-sub { font-size: 11.5px; color: var(--fog); }

  .toast { position: fixed; bottom: 26px; left: 50%; transform: translateX(-50%); background: var(--obsidian); color: #fff; padding: 13px 22px; border-radius: var(--radius-pill); font-size: 13px; font-weight: 600; z-index: 80; display: flex; align-items: center; gap: 8px; animation: toastPop .3s ease; }

  .footer { max-width: 1280px; margin: 40px auto 0; padding: 28px; border-top: 1px solid var(--cloud); }
  .footer-cols { display: grid; grid-template-columns: repeat(4, 1fr); gap: 24px; }
  .footer-col h4 { font-size: 12px; font-weight: 700; margin: 0 0 10px; color: var(--fog); text-transform: uppercase; letter-spacing: .3px; }
  .footer-col a { display: block; font-size: 13px; color: var(--graphite); padding: 4px 0; }
  .footer-bottom { font-size: 11.5px; color: var(--ash); margin-top: 24px; }

  .mobile-search-btn { display: none; width: 40px; height: 40px; border-radius: 50%; background: var(--obsidian); color: #fff; align-items: center; justify-content: center; flex-shrink: 0; }

  @media (max-width: 860px) {
    .promo-grid, .account-grid { grid-template-columns: 1fr; }
    .chat-shell { grid-template-columns: 1fr; height: auto; }
    .chat-list { display: none; }
    .header-nav { display: none; }
  }
  @media (max-width: 640px) {
    .header-row { padding: 12px 16px; gap: 10px; }
    .search-bar { display: none; }
    .mobile-search-btn { display: flex; margin-left: auto; }
    .card-grid { grid-template-columns: 1fr; }
    .promo-grid { gap: 16px; }
  }
</style>
</head>

// zinc-toned procedural card art — restrained monochrome register, ember accent reserved for verified badge only
function Swatch({ hue, label, verified, size = "100%" }) {
  const seed = (hue % 7) + 1;
  const nodes = [
    [14, 20], [42, 12], [68, 26], [88, 14],
    [22, 52], [54, 46], [80, 58], [36, 66],
  ];
  const links = [[0, 1], [1, 2], [2, 3], [0, 4], [1, 5], [2, 5], [5, 6], [4, 7], [5, 7]];
  return (
    <svg viewBox="0 0 100 75" width={size} height={size} preserveAspectRatio="none" style={{ display: "block", background: "#f4f4f5" }}>
      <defs>
        <linearGradient id={`g${hue}${label}`} x1="0" y1="0" x2="1" y2="1">
          <stop offset="0%" stopColor="#f4f4f5" />
          <stop offset="100%" stopColor="#e4e4e7" />
        </linearGradient>
      </defs>
      <rect width="100" height="75" fill={`url(#g${hue}${label})`} />
      {links.map(([a, b], i) => (
        <line key={i} x1={nodes[a][0]} y1={nodes[a][1]} x2={nodes[b][0]} y2={nodes[b][1]} stroke="#a1a1aa" strokeWidth="0.6" opacity="0.55" />
      ))}
      {nodes.map(([x, y], i) => (
        <circle key={i} cx={x} cy={y} r={i === seed % nodes.length ? 4.2 : 2.4}
          fill={i === seed % nodes.length ? "#ff5a00" : "#3f3f46"}
          opacity={i === seed % nodes.length ? 1 : 0.75} />
      ))}
    </svg>
  );
}

function NetworkHero() {
  const pts = [[6, 30], [22, 10], [42, 34], [58, 8], [76, 28], [94, 14], [30, 56], [66, 58]];
  const edges = [[0, 1], [1, 2], [2, 3], [3, 4], [4, 5], [1, 6], [2, 6], [3, 7], [4, 7], [6, 7]];
  return (
    <div className="network-hero">
      <svg viewBox="0 0 100 64" preserveAspectRatio="none" style={{ width: "100%", height: "100%", display: "block" }}>
        <defs>
          <linearGradient id="heroFade" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0%" stopColor="#18181b" />
            <stop offset="100%" stopColor="#09090b" />
          </linearGradient>
        </defs>
        <rect width="100" height="64" fill="url(#heroFade)" />
        {edges.map(([a, b], i) => (
          <line key={i} x1={pts[a][0]} y1={pts[a][1]} x2={pts[b][0]} y2={pts[b][1]} stroke="#52525b" strokeWidth="0.5" className="hero-edge" style={{ animationDelay: (i * 0.12) + "s" }} />
        ))}
        {pts.map(([x, y], i) => (
          <circle key={i} cx={x} cy={y} r={i % 3 === 0 ? 2.6 : 1.6} fill={i % 3 === 0 ? "#ff5a00" : "#d4d4d8"} className="hero-node" style={{ animationDelay: (i * 0.09) + "s" }} />
        ))}
      </svg>
    </div>
  );
}

function RippleButton({ className, onClick, children, ...rest }) {
  const ref = useRef(null);
  const handle = (e) => {
    const btn = ref.current;
    if (btn) {
      const r = document.createElement("span");
      r.className = "ripple-el";
      const rect = btn.getBoundingClientRect();
      r.style.left = (e.clientX - rect.left - 10) + "px";
      r.style.top = (e.clientY - rect.top - 10) + "px";
      r.style.width = r.style.height = "20px";
      btn.appendChild(r);
      setTimeout(() => r.remove(), 600);
    }
    onClick && onClick(e);
  };
  return <button ref={ref} className={className} onClick={handle} {...rest}>{children}</button>;
}

function ChatView({ activeThread, setActiveThread }) {
  const [draft, setDraft] = useState("");

  useEffect(() => { setMsgs(CHAT_MSGS[activeThread.id] || []); }, [activeThread]);

          <div style={{ fontWeight: 700, fontSize: 15 }}>박지훈 팀장</div>
          <div style={{ fontSize: 12.5, color: "#71717a", marginTop: 2 }}>청담전자산업 · {role}</div>
          <div className="role-switch">
            {["개인회원", "법인회원", "관리자"].map(r => (
              <button key={r} className={"role-opt" + (role === r ? " active" : "")} onClick={() => setRole(r)}>{r}</button>
            ))}
          </div>
          <button className="btn btn-ghost" style={{ marginTop: 16 }} onClick={toggleDues}>
            <i data-lucide="refresh-ccw" className="icon" style={{ width: 15, height: 15 }}></i>연회비 상태 전환 (데모)
          </button>
        </div>
        <div>
          <div className={"dues-banner " + (duesOk ? "ok" : "due")}>
            <i data-lucide={duesOk ? "shield-check" : "alert-triangle"} className="icon" style={{ width: 22, height: 22 }}></i>
            <div>
              <div className="dues-banner-text">{duesOk ? "연회비 납부 정상 회원입니다" : "연회비가 미납 상태입니다"}</div>
              <div className="dues-banner-sub">{duesOk ? "모든 네트워킹 기능을 이용하실 수 있습니다" : "일부 기능 접근이 제한됩니다. 납부 후 자동으로 해제됩니다"}</div>
            </div>
            {!duesOk && <button className="btn btn-fill" style={{ width: "auto", padding: "0 16px" }} onClick={() => onLocked()}>납부 안내</button>}
          </div>
          <div className="menu-grid">
            {[
              { icon: "book-user", title: "모바일 수첩 디렉토리", sub: "회원사 검색 및 프로필", locked: false },
              { icon: "message-circle", title: "1:1 네트워킹 채팅", sub: "실시간 메시지", locked: !duesOk },
              { icon: "megaphone", title: "홍보물 등록", sub: "배너 신청 및 승인 현황", locked: !duesOk },
              { icon: "settings", title: "계정 설정", sub: "비밀번호·알림 관리", locked: false },
            ].map((m, i) => (
              <button key={i} className={"menu-item" + (m.locked ? " locked" : "")} onClick={() => m.locked ? onLocked() : onLocked("이동합니다: " + m.title)}>
                <div className="menu-icon-wrap"><i data-lucide={m.locked ? "lock" : m.icon} className="icon"></i></div>
                <div className="menu-item-title">{m.title}</div>
                <div className="menu-item-sub">{m.sub}</div>
              </button>
            ))}
          </div>
        </div>
      </div>
    </div>
  );
}

function App() {
  const [view, setView] = useState("main");
  const [chip, setChip] = useState("전체");
  const [selectedCompany, setSelectedCompany] = useState(null);
  const [favorites, setFavorites] = useState([1, 4]);
  const [activeThread, setActiveThread] = useState(CHAT_THREADS[0]);
  const [role, setRole] = useState("법인회원");
  const [duesOk, setDuesOk] = useState(true);
  const [toast, setToast] = useState({ show: false, msg: "" });

  useIcons([view, selectedCompany, favorites, role, duesOk]);

  const notify = (msg) => {
    setToast({ show: true, msg: msg || "처리되었습니다" });
    setTimeout(() => setToast({ show: false, msg: "" }), 2200);
  };
  const toggleFav = (id) => setFavorites(f => f.includes(id) ? f.filter(x => x !== id) : [...f, id]);
  const startChat = (company) => {
    setSelectedCompany(null);
    const thread = CHAT_THREADS.find(t => t.name.includes(company.name)) || CHAT_THREADS[0];
    setActiveThread(thread);
    setView("chat");
  };

  const NAV = [
    { key: "main", label: "회원사 디렉토리" },
    { key: "chat", label: "1:1 네트워킹 채팅", badge: true },
    { key: "promotion", label: "홍보물 등록 신청" },
    { key: "account", label: "회원 계정 및 연회비 관리" },
  ];

  return (
    <div data-archetype="airbnb-search-grid">
      <header className="search-header" data-search-header>
        <div className="header-row">
          <div className="brand"><span className="brand-mark"><i data-lucide="link-2" style={{ width: 16, height: 16 }}></i></span>이음넷</div>
          <div className="search-bar">
            <button className="search-segment" onClick={() => notify("기업명 검색창에 포커스했습니다")}>
              <span className="segment-label">기업명</span>
              <span className="segment-value">회사명으로 검색</span>
            </button>
            <div className="search-divider"></div>
            <button className="search-segment" onClick={() => notify("산업군 필터를 열었습니다")}>
              <span className="segment-label">산업군</span>
              <span className="segment-value">{chip}</span>
            </button>
            <div className="search-divider"></div>
            <button className="search-segment" onClick={() => notify("담당자명 검색창에 포커스했습니다")}>
              <span className="segment-label">담당자</span>
              <span className="segment-value">이름으로 검색</span>
            </button>
            <button className="search-submit" onClick={() => { setView("main"); notify("검색 결과를 갱신했습니다"); }}><i data-lucide="search" className="icon" style={{ color: "#fff" }}></i></button>
          </div>
          <nav className="header-nav">
            {NAV.map(n => (
              <button key={n.key} className={"nav-btn" + (view === n.key ? " active" : "")} onClick={() => setView(n.key)}>
                {n.label}
                {n.badge && <span className="nav-badge"></span>}
              </button>
            ))}
          </nav>
          <button className="mobile-search-btn" onClick={() => notify("검색창을 열었습니다")}><i data-lucide="search" className="icon" style={{ width: 17, height: 17 }}></i></button>
          <button className="user-menu" onClick={() => setView("account")}><i data-lucide="user-round" className="icon" style={{ width: 17, height: 17 }}></i></button>
        </div>
      </header>

      {view === "main" && <DirectoryView onOpenCard={setSelectedCompany} favorites={favorites} toggleFav={toggleFav} chip={chip} setChip={setChip} />}
      {view === "chat" && <ChatView activeThread={activeThread} setActiveThread={setActiveThread} />}
      {view === "promotion" && <PromotionView onSubmit={notify} />}
      {view === "account" && <AccountView role={role} setRole={setRole} duesOk={duesOk} toggleDues={() => { setDuesOk(d => !d); notify("연회비 상태를 전환했습니다"); }} onLocked={(msg) => notify(msg || "연회비 납부 후 이용 가능합니다")} />}

      <QuickView company={selectedCompany} onClose={() => setSelectedCompany(null)} onStartChat={startChat} />
      <Toast msg={toast.msg} show={toast.show} />

      <footer className="footer">
        <div className="footer-cols">
          <div className="footer-col">
            <h4>이음넷</h4>
            <a>회원사 디렉토리</a>
            <a>네트워킹 채팅</a>
          </div>
          <div className="footer-col">
            <h4>홍보</h4>
            <a>배너 신청</a>
            <a>승인 정책</a>
          </div>
          <div className="footer-col">
            <h4>지원</h4>
            <a>이용 안내</a>
            <a>문의하기</a>
          </div>
          <div className="footer-col">
            <h4>협회</h4>
            <a>정관 안내</a>
            <a>연회비 규정</a>
          </div>
        </div>
        <div className="footer-bottom">© 2026 이음넷 — 자체 개발 프로젝트 (데모 데이터)</div>
      </footer>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("app-root")).render(<App />);
</script>
</body>
</html>
