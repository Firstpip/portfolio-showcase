<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>이음넷 운영 콘솔 — 협회 운영 통합 관리</title>
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/regular/style.css">
<style>
  :root {
    --ink: #111111;
    --charcoal: #272625;
    --cream: #f6f5f3;
    --canvas: #ffffff;
    --stone: #b1b1af;
    --ash: #6d6c6b;
    --pearl: #ecebea;
    --orange: #e8400d;
    --pink: #ffd7f0;
    --mint: #b7efb2;
    --violet: #e2ddfd;
    --yellow: #ffef99;
    --radius-card: 12px;
    --radius-btn: 8px;
  }
  * { box-sizing: border-box; }
  html, body { width: 100%; height: 100%; margin: 0; padding: 0; }
  body {
    font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, sans-serif;
    background: var(--canvas);
    color: var(--ink);
    -webkit-font-smoothing: antialiased;
  }
  #app-root { width: 100%; height: 100%; }
  button { font-family: inherit; cursor: pointer; border: none; background: none; color: inherit; }
  input, textarea, select { font-family: inherit; }
  a { text-decoration: none; color: inherit; }
  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-thumb { background: var(--pearl); border-radius: 8px; }

  @keyframes fadeInUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes slideInPane { from { transform: translateX(24px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
  @keyframes toastPop { from { opacity: 0; transform: translateY(10px) scale(0.97); } to { opacity: 1; transform: translateY(0) scale(1); } }
  @keyframes barGrow { from { width: 0%; } to { width: var(--w); } }
  @keyframes ripple { from { transform: scale(0); opacity: 0.35; } to { transform: scale(2.6); opacity: 0; } }
  @keyframes pulseRing { 0%, 100% { box-shadow: 0 0 0 0 rgba(232,64,13,0.35); } 70% { box-shadow: 0 0 0 6px rgba(232,64,13,0); } }

  .icon { font-size: 17px; line-height: 1; }

  .shell { width: 100%; height: 100vh; display: flex; overflow: hidden; }

  /* ── workspace strip (archetype signature, <=80px) ── */
  .workspace-strip { width: 64px; flex-shrink: 0; height: 100%; background: var(--charcoal); display: flex; flex-direction: column; align-items: center; padding: 16px 0; gap: 10px; }
  .ws-item { width: 40px; height: 40px; border-radius: var(--radius-card); display: flex; align-items: center; justify-content: center; color: rgba(255,255,255,0.55); transition: all .15s; }
  .ws-item:hover { background: rgba(255,255,255,0.08); color: #fff; }
  .ws-item.active { background: var(--pink); color: var(--ink); }
  .ws-divider { width: 28px; height: 1px; background: rgba(255,255,255,0.14); margin: 4px 0; }

  /* ── channel list ── */
  .channel-list { width: 280px; flex-shrink: 0; height: 100%; background: var(--cream); border-right: 1px solid var(--pearl); display: flex; flex-direction: column; }
  .channel-header { padding: 18px 16px 10px; }
  .ws-name { font-size: 14px; font-weight: 700; margin: 0 0 12px; }
  .module-tabs { display: flex; flex-direction: column; gap: 4px; }
  .module-tab { width: 100%; text-align: left; padding: 9px 10px; border-radius: var(--radius-btn); font-size: 12.5px; font-weight: 600; color: var(--ash); display: flex; align-items: center; gap: 8px; }
  .module-tab:hover { background: var(--pearl); }
  .module-tab.active { background: var(--ink); color: #fff; }
  .channel-search { padding: 8px 16px 10px; }
  .channel-search-box { display: flex; align-items: center; gap: 8px; background: #fff; border: 1px solid var(--pearl); border-radius: var(--radius-btn); padding: 8px 12px; }
  .channel-search-box input { border: none; outline: none; background: none; font-size: 12.5px; width: 100%; }
  .channel-section { flex: 1; overflow-y: auto; padding: 4px 10px 16px; }
  .section-toggle { padding: 8px 8px 4px; font-size: 10.5px; color: var(--ash); text-transform: uppercase; letter-spacing: .4px; font-weight: 700; }
  .channel-item { width: 100%; display: flex; align-items: center; gap: 10px; padding: 10px 8px; border-radius: var(--radius-btn); text-align: left; animation: fadeInUp .3s ease both; }
  .channel-item:hover { background: var(--pearl); }
  .channel-item.active { background: #fff; box-shadow: inset 2px 0 0 var(--orange); }
  .ch-icon { width: 30px; height: 30px; border-radius: 8px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; font-size: 14px; }
  .ch-body { flex: 1; min-width: 0; }
  .ch-name { font-size: 12.5px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .ch-meta { font-size: 11px; color: var(--ash); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .ch-badge { font-size: 10px; font-weight: 700; padding: 2px 7px; border-radius: 20px; flex-shrink: 0; }
  .ch-badge.pending { background: #fef0e7; color: var(--orange); }
  .ch-badge.ok { background: #e6f6ec; color: #1a7f45; }
  .ch-badge.due { background: #fdecec; color: #c1352b; }
  .ch-check { width: 16px; height: 16px; border-radius: 4px; border: 1.5px solid var(--stone); flex-shrink: 0; display: flex; align-items: center; justify-content: center; }
  .ch-check.checked { background: var(--ink); border-color: var(--ink); color: #fff; }

  /* ── main conv area ── */
  .conv-main { flex: 1; min-width: 0; height: 100%; display: flex; flex-direction: column; }
  .conv-header { padding: 18px 26px; border-bottom: 1px solid var(--pearl); display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
  .conv-title-row { display: flex; align-items: center; gap: 10px; }
  .conv-title { font-size: 16px; font-weight: 700; margin: 0; }
  .member-count { font-size: 11.5px; color: var(--ash); background: var(--pearl); padding: 3px 9px; border-radius: 20px; }
  .conv-actions { display: flex; gap: 8px; }
  .conv-action { width: 34px; height: 34px; border-radius: var(--radius-btn); background: var(--cream); display: flex; align-items: center; justify-content: center; }
  .conv-body { flex: 1; overflow-y: auto; padding: 22px 26px; }
  .hero-line { font-size: clamp(42px, 4.2vw, 56px); font-weight: 400; letter-spacing: -0.02em; line-height: 1.08; color: var(--ink); }
  .console-hero { border-radius: var(--radius-card); padding: 44px 36px; background: radial-gradient(140% 120% at 8% -10%, rgba(232,64,13,0.16) 0%, rgba(255,238,216,0.5) 32%, rgba(208,178,255,0.22) 78%), var(--cream); display: flex; flex-direction: column; gap: 26px; animation: fadeInUp .35s ease both; }
  .console-hero-stats { display: flex; gap: 14px; flex-wrap: wrap; }
  .console-hero-stats .stat-mini { background: #fff; border-radius: var(--radius-btn); padding: 12px 18px; display: flex; flex-direction: column; gap: 4px; min-width: 140px; }
  .console-hero-stats .stat-mini span { font-size: 11.5px; color: var(--ash); font-weight: 700; text-transform: uppercase; letter-spacing: .3px; }
  .console-hero-stats .stat-mini strong { font-size: 20px; }

  .btn { display: inline-flex; align-items: center; gap: 8px; padding: 0 16px; height: 38px; border-radius: var(--radius-btn); font-size: 13px; font-weight: 700; position: relative; overflow: hidden; transition: transform .12s ease; }
  .btn:active { transform: scale(.97); }
  .btn-fill { background: var(--ink); color: #fff; }
  .btn-orange { background: var(--orange); color: #fff; }
  .btn-ghost { background: var(--pearl); color: var(--ink); }
  .btn-danger-o { background: #fff; color: #c1352b; border: 1px solid #f3c9c5; }
  .ripple-el { position: absolute; border-radius: 50%; background: rgba(255,255,255,.45); pointer-events: none; animation: ripple .55s ease-out; }

  .detail-card { background: var(--cream); border-radius: var(--radius-card); padding: 22px; margin-bottom: 18px; animation: fadeInUp .3s ease both; }
  .detail-row { display: flex; align-items: center; gap: 14px; margin-bottom: 14px; }
  .detail-avatar { width: 44px; height: 44px; border-radius: var(--radius-card); display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 14px; flex-shrink: 0; }
  .detail-name { font-size: 15px; font-weight: 700; }
  .detail-sub { font-size: 12px; color: var(--ash); margin-top: 2px; }
  .detail-body { font-size: 13px; color: #3a3937; line-height: 1.6; margin-bottom: 14px; }
  .detail-actions { display: flex; gap: 8px; flex-wrap: wrap; }
  .reason-box { width: 100%; border: 1px solid var(--pearl); border-radius: var(--radius-btn); padding: 10px 12px; font-size: 12.5px; margin-top: 10px; min-height: 60px; resize: vertical; background: #fff; }

  .queue-table { width: 100%; }
  .queue-item { display: flex; align-items: center; gap: 12px; padding: 12px 14px; border: 1px solid var(--pearl); border-radius: var(--radius-card); margin-bottom: 8px; background: #fff; animation: fadeInUp .3s ease both; }
  .queue-item:hover { border-color: var(--stone); }
  .queue-tile { width: 34px; height: 34px; border-radius: 9px; flex-shrink: 0; }
  .queue-main { flex: 1; min-width: 0; }
  .queue-title { font-size: 13px; font-weight: 700; }
  .queue-sub { font-size: 11.5px; color: var(--ash); }

  .upload-zone { border: 1.5px dashed var(--stone); border-radius: var(--radius-card); padding: 32px; text-align: center; color: var(--ash); font-size: 12.5px; margin-bottom: 18px; transition: border-color .15s; }
  .upload-zone:hover { border-color: var(--orange); color: var(--orange); }
  .progress-track { height: 6px; background: var(--pearl); border-radius: 4px; overflow: hidden; margin: 12px 0; }
  .progress-fill { height: 100%; background: var(--orange); border-radius: 4px; animation: barGrow 1.1s ease forwards; }
  .parse-table { width: 100%; border-collapse: collapse; font-size: 12.5px; }
  .parse-table th { text-align: left; padding: 8px 10px; color: var(--ash); font-weight: 700; border-bottom: 1px solid var(--pearl); font-size: 11px; text-transform: uppercase; }
  .parse-table td { padding: 9px 10px; border-bottom: 1px solid var(--pearl); }
  .row-ok { color: #1a7f45; }
  .row-err { color: #c1352b; }

  .tab-switch { display: inline-flex; background: var(--pearl); border-radius: 20px; padding: 4px; margin-bottom: 16px; }
  .tab-opt { padding: 7px 16px; border-radius: 16px; font-size: 12.5px; font-weight: 700; color: var(--ash); }
  .tab-opt.active { background: #fff; color: var(--ink); box-shadow: 0 1px 3px rgba(0,0,0,.08); }

  .status-filter-row { display: flex; gap: 6px; margin-bottom: 14px; flex-wrap: wrap; }
  .status-chip { padding: 6px 13px; border-radius: 20px; font-size: 12px; font-weight: 700; background: var(--pearl); color: var(--ash); }
  .status-chip.active { background: var(--ink); color: #fff; }

  .conv-input { padding: 14px 26px 18px; border-top: 1px solid var(--pearl); display: flex; gap: 10px; flex-shrink: 0; }
  .conv-input input { flex: 1; background: var(--cream); border: 1px solid var(--pearl); border-radius: var(--radius-btn); padding: 11px 14px; font-size: 13px; }

  /* ── info panel ── */
  .info-panel { width: 320px; flex-shrink: 0; height: 100%; background: var(--cream); border-left: 1px solid var(--pearl); overflow-y: auto; animation: slideInPane .3s ease; }
  .info-header { padding: 18px 18px 10px; display: flex; align-items: center; justify-content: space-between; }
  .info-header h3 { font-size: 13.5px; margin: 0; }
  .close-info { width: 28px; height: 28px; border-radius: 8px; display: flex; align-items: center; justify-content: center; background: var(--pearl); }
  .info-section { padding: 14px 18px; border-top: 1px solid var(--pearl); }
  .info-label { font-size: 10.5px; color: var(--ash); text-transform: uppercase; letter-spacing: .3px; font-weight: 700; margin-bottom: 6px; }
  .info-value { font-size: 13px; font-weight: 600; }
  .member-item { display: flex; align-items: center; gap: 8px; padding: 6px 0; font-size: 12.5px; }
  .member-avatar { width: 26px; height: 26px; border-radius: 50%; background: var(--pink); display: flex; align-items: center; justify-content: center; font-size: 10.5px; font-weight: 700; flex-shrink: 0; }
  .stat-mini { display: flex; align-items: center; justify-content: space-between; padding: 6px 0; font-size: 12.5px; }
  .stat-mini strong { font-size: 15px; }
  .info-panel-toggle-btn { position: fixed; bottom: 20px; right: 20px; width: 46px; height: 46px; border-radius: 50%; background: var(--ink); color: #fff; display: flex; align-items: center; justify-content: center; box-shadow: 0 6px 18px rgba(0,0,0,.2); z-index: 30; }

  .toast { position: fixed; bottom: 26px; left: 50%; transform: translateX(-50%); background: var(--ink); color: #fff; padding: 12px 22px; border-radius: 24px; font-size: 13px; font-weight: 600; z-index: 80; display: flex; align-items: center; gap: 8px; animation: toastPop .3s ease; }

  @media (max-width: 980px) {
    .info-panel { position: fixed; right: 0; top: 0; z-index: 40; box-shadow: -8px 0 24px rgba(0,0,0,.15); }
    .channel-list { width: 240px; }
  }
  @media (max-width: 600px) {
    .workspace-strip { display: none; }
    .channel-list { display: none; }
    .member-count { display: none; }
    .conv-header { padding: 14px 16px; }
    .conv-title { font-size: 14px; }
    .conv-body { padding: 16px; }
    .conv-input { padding: 12px 16px 16px; }
  }
</style>
</head>
<body>
<div id="app-root"></div>
<script type="text/babel">
const { useState, useEffect, useRef } = React;

const MEMBERS = [
  { id: 1, name: "청담전자산업", initial: "청", status: "정상", hue: 210 },
  { id: 2, name: "한빛물류시스템", initial: "한", status: "미납", hue: 25 },
  { id: 3, name: "서라벌푸드", initial: "서", status: "정상", hue: 45 },
  { id: 4, name: "다온헬스케어", initial: "다", status: "유예", hue: 155 },
  { id: 5, name: "그린테크솔루션", initial: "그", status: "정상", hue: 190 },
  { id: 6, name: "예그리나디자인", initial: "예", status: "미납", hue: 330 },
  { id: 7, name: "미래정밀기계", initial: "미", status: "정상", hue: 260 },
  { id: 8, name: "온새미로교육", initial: "온", status: "정상", hue: 15 },
];

const QUEUE_ALL = [
  { id: "b1", type: "banner", title: "청담전자산업 신제품 런칭전", member: "청담전자산업", status: "승인대기", tile: "pink", time: "10분 전" },
  { id: "f1", type: "fund", title: "한빛물류시스템 공제금 신청", member: "한빛물류시스템", status: "검토중", tile: "mint", time: "32분 전" },
  { id: "q1", type: "inquiry", title: "연회비 자동이체 문의", member: "서라벌푸드", status: "미답변", tile: "violet", time: "1시간 전" },
  { id: "b2", type: "banner", title: "다온헬스케어 건강검진 제휴전", member: "다온헬스케어", status: "승인대기", tile: "pink", time: "2시간 전" },
  { id: "f2", type: "fund", title: "그린테크솔루션 납입내역 정정", member: "그린테크솔루션", status: "검토중", tile: "mint", time: "3시간 전" },
  { id: "q2", type: "inquiry", title: "홍보 배너 노출 기간 문의", member: "예그리나디자인", status: "답변완료", tile: "violet", time: "어제" },
];

const BANNERS = QUEUE_ALL.filter(q => q.type === "banner");
const FUNDS = QUEUE_ALL.filter(q => q.type === "fund");

const PARSE_ROWS = [
  { name: "청담전자산업", amount: "1,200,000원", ok: true },
  { name: "한빛물류시스템", amount: "형식 오류", ok: false },
  { name: "서라벌푸드", amount: "800,000원", ok: true },
  { name: "다온헬스케어", amount: "1,500,000원", ok: true },
  { name: "그린테크솔루션", amount: "회원번호 없음", ok: false },
];

const CHANGE_LOG = [
  { text: "한빛물류시스템 → 미납 처리", time: "어제 14:20" },
  { text: "다온헬스케어 → 유예 처리", time: "2일 전" },
  { text: "청담전자산업 → 정상 처리", time: "5일 전" },
];

const MODULES = [
  { key: "console", label: "관리자 통합 처리 콘솔", icon: "squares-four" },
  { key: "approval", label: "홍보물 승인/반려 워크플로우", icon: "megaphone" },
  { key: "fund", label: "공제조합 신청 엑셀 일괄 처리", icon: "file-xls" },
  { key: "members", label: "회원사 연회비 및 상태 관리", icon: "users-three" },
];

const tileColor = { pink: "var(--pink)", mint: "var(--mint)", violet: "var(--violet)", yellow: "var(--yellow)" };
const typeIcon = { banner: "megaphone", fund: "file-xls", inquiry: "chat-circle-dots" };
const typeLabel = { banner: "배너승인", fund: "공제조합", inquiry: "회원문의" };

function Toast({ msg, show }) {
  if (!show) return null;
  return <div className="toast"><i className="ph ph-check-circle" style={{ fontSize: 16 }}></i>{msg}</div>;
}

function RippleBtn({ className, onClick, children, ...rest }) {
  const ref = useRef(null);
  const handle = (e) => {
    const btn = ref.current;
    if (btn) {
      const r = document.createElement("span");
      r.className = "ripple-el";
      const rect = btn.getBoundingClientRect();
      r.style.left = (e.clientX - rect.left - 10) + "px";
      r.style.top = (e.clientY - rect.top - 10) + "px";
      r.style.width = r.style.height = "20px";
      btn.appendChild(r);
      setTimeout(() => r.remove(), 550);
    }
    onClick && onClick(e);
  };
  return <button ref={ref} className={className} onClick={handle} {...rest}>{children}</button>;
}

function WorkspaceStrip({ notify }) {
  const [active, setActive] = useState(0);
  const items = [
    { icon: "link", label: "이음넷" },
    { icon: "bell", label: "알림" },
    { icon: "gear", label: "설정" },
  ];
  return (
    <nav className="workspace-strip">
      {items.map((it, i) => (
        <div key={i} className={"ws-item" + (active === i ? " active" : "")} title={it.label}
          onClick={() => { setActive(i); notify(it.label + " 메뉴를 열었습니다"); }}>
          <i className={"ph ph-" + it.icon} style={{ fontSize: 19 }}></i>
        </div>
      ))}
      <div className="ws-divider"></div>
      <div className="ws-item" onClick={() => notify("새 워크스페이스 추가는 준비 중입니다")}><i className="ph ph-plus" style={{ fontSize: 19 }}></i></div>
    </nav>
  );
}

function ChannelList({ activeModule, setActiveModule, selected, setSelected, checkedIds, toggleCheck, memberFilter, setMemberFilter }) {
  const listForModule = () => {
    if (activeModule === "approval") return BANNERS;
    if (activeModule === "fund") return FUNDS;
    if (activeModule === "members") return memberFilter === "전체" ? MEMBERS : MEMBERS.filter(m => m.status === memberFilter);
    return QUEUE_ALL;
  };
  const items = listForModule();

  return (
    <aside className="channel-list" data-channel-list>
      <div className="channel-header">
        <h2 className="ws-name">협회 운영 콘솔</h2>
        <div className="module-tabs">
          {MODULES.map(m => (
            <button key={m.key} className={"module-tab" + (activeModule === m.key ? " active" : "")}
              onClick={() => {
                setActiveModule(m.key);
                const list = m.key === "approval" ? BANNERS : m.key === "fund" ? FUNDS : m.key === "members" ? MEMBERS : QUEUE_ALL;
                setSelected(list[0] || null);
              }}>
              <i className={"ph ph-" + m.icon}></i>{m.label}
            </button>
          ))}
        </div>
      </div>
      <div className="channel-search">
        <div className="channel-search-box">
          <i className="ph ph-magnifying-glass" style={{ fontSize: 14 }}></i>
          <input placeholder="처리함 검색…" />
        </div>
      </div>
      {activeModule === "members" && (
        <div style={{ padding: "0 16px 8px" }}>
          <div className="status-filter-row">
            {["전체", "정상", "미납", "유예"].map(s => (
              <button key={s} className={"status-chip" + (memberFilter === s ? " active" : "")} onClick={() => setMemberFilter(s)}>{s}</button>
            ))}
          </div>
        </div>
      )}
      <div className="channel-section">

            <button className={"ch-check" + (checkedIds.includes(m.id) ? " checked" : "")} onClick={(e) => { e.stopPropagation(); toggleCheck(m.id); }}>

            </button>

            <div className="ch-body">

              <div className="ch-meta">회원사</div>

              <div className="ch-meta">{typeLabel[q.type]} · {q.time}</div>

    </aside>
  );
}

      )}

  );
}

function App() {
  const [activeModule, setActiveModule] = useState("console");
  const [selected, setSelected] = useState(null);
  const [checkedIds, setCheckedIds] = useState([]);
  const [memberFilter, setMemberFilter] = useState("전체");
  const [infoOpen, setInfoOpen] = useState(true);
  const [note, setNote] = useState("");
  const [toast, setToast] = useState({ show: false, msg: "" });

  const notify = (msg) => {
    setToast({ show: true, msg });
    setTimeout(() => setToast({ show: false, msg: "" }), 2200);
  };
  const toggleCheck = (id) => setCheckedIds(c => c.includes(id) ? c.filter(x => x !== id) : [...c, id]);
  const clearChecks = () => setCheckedIds([]);

  const sendNote = () => {
    if (!note.trim()) return;
    notify("메모를 저장했습니다: " + note.slice(0, 20));
    setNote("");
  };

  return (
    <div className="shell" data-archetype="slack-3pane">
      <WorkspaceStrip notify={notify} />
      <ChannelList
        activeModule={activeModule} setActiveModule={setActiveModule}
        selected={selected} setSelected={setSelected}
        checkedIds={checkedIds} toggleCheck={toggleCheck}
        memberFilter={memberFilter} setMemberFilter={setMemberFilter}
      />
      <main className="conv-main">
        {activeModule === "console" && <ConsoleMain selected={selected} setSelected={setSelected} notify={notify} />}
        {activeModule === "approval" && <ApprovalMain selected={selected} setSelected={setSelected} checkedIds={checkedIds} notify={notify} clearChecks={clearChecks} />}
        {activeModule === "fund" && <FundMain notify={notify} />}
        {activeModule === "members" && <MembersMain checkedIds={checkedIds} notify={notify} clearChecks={clearChecks} />}
        <footer className="conv-input">
          <input placeholder="처리 메모를 남기고 Enter" value={note} onChange={e => setNote(e.target.value)} onKeyDown={e => e.key === "Enter" && sendNote()} />
          <button className="conv-action" onClick={sendNote}><i className="ph ph-paper-plane-tilt"></i></button>
        </footer>
      </main>
      <InfoPanel activeModule={activeModule} selected={selected} checkedIds={checkedIds} open={infoOpen} onClose={() => setInfoOpen(false)} />
      {!infoOpen && (
        <button className="info-panel-toggle-btn" onClick={() => setInfoOpen(true)}><i className="ph ph-sidebar-simple" style={{ fontSize: 20 }}></i></button>
      )}
      <Toast msg={toast.msg} show={toast.show} />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("app-root")).render(<App />);
</script>
</body>
</html>
