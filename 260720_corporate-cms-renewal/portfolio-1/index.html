<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>테라링크 — 기업 홈페이지 & 프로젝트 지도</title>
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<style>
  :root{
    --onyx:#171721; --graphite:#1e1e2a; --obsidian:#272735;
    --slate:#70707d; --mist:#e2e3ed; --ash:#c3c3cc; --ivory:#ededf3;
    --cobalt:#5266eb; --cobalt-soft:rgba(82,102,235,.18); --white:#ffffff;
  }
  *{box-sizing:border-box;}
  html,body,#root{width:100%;min-height:100vh;margin:0;padding:0;}
  body{
    background:var(--onyx); color:var(--ivory);
    font-family:'Pretendard', ui-sans-serif, system-ui, -apple-system, sans-serif;
    -webkit-font-smoothing:antialiased;
  }
  button, input, select, textarea{font-family:inherit;}
  a{color:inherit;text-decoration:none;}
  ::selection{background:var(--cobalt);color:#fff;}

  @keyframes fadeInUp{ from{opacity:0; transform:translateY(18px);} to{opacity:1; transform:translateY(0);} }
  @keyframes pulseMarker{ 0%{box-shadow:0 0 0 0 rgba(82,102,235,.55);} 70%{box-shadow:0 0 0 14px rgba(82,102,235,0);} 100%{box-shadow:0 0 0 0 rgba(82,102,235,0);} }
  @keyframes spin{ to{transform:rotate(360deg);} }
  @keyframes slideInDrawer{ from{transform:translateX(100%);opacity:.4;} to{transform:translateX(0);opacity:1;} }
  @keyframes toastIn{ from{opacity:0; transform:translateY(10px) scale(.96);} to{opacity:1; transform:translateY(0) scale(1);} }

  .navbar{position:sticky;top:0;z-index:40;width:100%;transition:background .25s ease, box-shadow .25s ease, backdrop-filter .25s ease;}
  .navbar.transparent{background:linear-gradient(180deg, rgba(23,23,33,.65), rgba(23,23,33,0));}
  .navbar.solid{background:rgba(23,23,33,.92);backdrop-filter:blur(14px);border-bottom:1px solid rgba(226,227,237,.08);}
  .nav-inner{max-width:1200px;margin:0 auto;padding:0 24px;height:72px;display:flex;align-items:center;justify-content:space-between;gap:24px;}
  .brand{display:flex;align-items:center;gap:10px;font-size:18px;font-weight:600;letter-spacing:.2px;color:var(--ivory);cursor:pointer;background:none;border:none;}
  .brand-mark{width:30px;height:30px;border-radius:9px;background:linear-gradient(135deg,var(--cobalt),#8892f0);display:flex;align-items:center;justify-content:center;flex:0 0 auto;}
  .nav-links{display:flex;align-items:center;gap:4px;}
  .nav-link{padding:10px 20px;border-radius:40px;font-size:15px;font-weight:500;color:var(--ivory);background:transparent;border:none;cursor:pointer;transition:background .18s ease,color .18s ease;}
  .nav-link:hover{background:var(--obsidian);}
  .nav-link.active{background:var(--graphite);color:var(--white);}
  .lang-pill{display:flex;background:var(--obsidian);border-radius:40px;padding:3px;gap:2px;}
  .lang-btn{border:none;background:transparent;color:var(--ash);font-size:12px;font-weight:600;padding:7px 13px;border-radius:32px;cursor:pointer;transition:.18s;}
  .lang-btn.active{background:var(--cobalt);color:#fff;}

  .btn-primary{background:var(--cobalt);color:#fff;border:none;border-radius:32px;padding:14px 28px;font-size:16px;font-weight:600;cursor:pointer;transition:transform .15s ease, filter .15s ease;display:inline-flex;align-items:center;gap:8px;}
  .btn-primary:hover{filter:brightness(1.08);transform:translateY(-1px);}
  .btn-ghost{background:transparent;color:var(--ivory);border:1px solid var(--mist);border-radius:32px;padding:13px 26px;font-size:16px;font-weight:500;cursor:pointer;display:inline-flex;align-items:center;gap:8px;transition:background .15s ease;}
  .btn-ghost:hover{background:rgba(226,227,237,.08);}
  .btn-sm{padding:9px 18px;font-size:13px;border-radius:32px;}

  .hero{position:relative;min-height:640px;display:flex;align-items:center;justify-content:center;overflow:hidden;width:100%;}
  .hero-bg{position:absolute;inset:0;background-size:cover;background-position:center;filter:saturate(.55) brightness(.55) contrast(1.05);transform:scale(1.02);}
  .hero-overlay{position:absolute;inset:0;background:linear-gradient(180deg, rgba(23,23,33,.35) 0%, rgba(23,23,33,.85) 82%, rgba(23,23,33,1) 100%);}
  .hero-content{position:relative;z-index:2;max-width:680px;text-align:center;padding:120px 24px 64px;animation:fadeInUp .7s ease both;}
  .hero-eyebrow{font-size:14px;font-weight:600;color:var(--ash);letter-spacing:.14em;text-transform:uppercase;margin-bottom:18px;}
  .hero-title{font-size:52px;line-height:1.16;font-weight:700;letter-spacing:.2px;margin:0 0 20px;color:#fff;}
  .hero-sub{font-size:18px;line-height:1.55;color:var(--ivory);font-weight:480;margin:0 0 34px;}
  .hero-ctas{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;}

  .slide-wrap{position:relative;max-width:1200px;margin:-64px auto 0;padding:0 24px 80px;z-index:3;}
  .slide-card{position:relative;border-radius:20px;overflow:hidden;height:340px;box-shadow:0 24px 60px rgba(0,0,0,.45);}
  .slide-img{position:absolute;inset:0;background-size:cover;background-position:center;transition:opacity .5s ease;}
  .slide-meta{position:absolute;left:0;right:0;bottom:0;padding:28px 32px;background:linear-gradient(0deg, rgba(10,10,16,.9), rgba(10,10,16,0));}
  .slide-tag{display:inline-block;font-size:12px;font-weight:700;background:var(--cobalt);color:#fff;padding:5px 12px;border-radius:20px;margin-bottom:10px;}
  .slide-title{font-size:26px;font-weight:700;color:#fff;margin:0;}
  .slide-nav{position:absolute;top:50%;transform:translateY(-50%);width:42px;height:42px;border-radius:50%;background:rgba(23,23,33,.6);border:1px solid rgba(226,227,237,.25);color:#fff;display:flex;align-items:center;justify-content:center;cursor:pointer;z-index:4;backdrop-filter:blur(6px);}
  .slide-nav:hover{background:rgba(82,102,235,.85);}
  .slide-nav.prev{left:16px;} .slide-nav.next{right:16px;}
  .slide-dots{position:absolute;bottom:20px;right:28px;display:flex;gap:6px;z-index:4;}
  .dot{width:7px;height:7px;border-radius:50%;background:rgba(255,255,255,.35);cursor:pointer;border:none;padding:0;}
  .dot.active{background:#fff;width:18px;border-radius:5px;}

  .section{max-width:1200px;margin:0 auto;padding:72px 24px;}
  .section-head{margin-bottom:36px;}
  .section-eyebrow{font-size:13px;font-weight:700;color:var(--cobalt);letter-spacing:.1em;text-transform:uppercase;margin-bottom:10px;}
  .section-title{font-size:32px;font-weight:700;margin:0;color:#fff;letter-spacing:.2px;}
  .grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:20px;}
  .card{background:var(--graphite);border-radius:12px;padding:32px;transition:transform .2s ease, border-color .2s ease;border:1px solid transparent;cursor:pointer;}
  .card:hover{transform:translateY(-4px);border-color:rgba(82,102,235,.4);}
  .card-icon{width:44px;height:44px;border-radius:12px;background:var(--cobalt-soft);color:var(--cobalt);display:flex;align-items:center;justify-content:center;margin-bottom:18px;}
  .card h3{font-size:19px;margin:0 0 10px;color:#fff;font-weight:700;}
  .card p{font-size:14px;color:var(--ash);line-height:1.6;margin:0;}
  .quick-card{background:var(--graphite);border-radius:12px;padding:28px;display:flex;flex-direction:column;gap:14px;border:1px solid rgba(226,227,237,.06);transition:transform .2s ease, border-color .2s ease;cursor:pointer;}
  .quick-card:hover{transform:translateY(-4px);border-color:var(--cobalt);}
  .quick-card .go{margin-left:auto;color:var(--cobalt);}

  footer{border-top:1px solid rgba(226,227,237,.08);padding:48px 24px 32px;}
  .footer-inner{max-width:1200px;margin:0 auto;display:flex;justify-content:space-between;flex-wrap:wrap;gap:24px;font-size:13px;color:var(--ash);}
  .footer-links{display:flex;gap:18px;flex-wrap:wrap;}

  /* Map-canvas screen */
  .map-screen{position:relative;width:100%;height:calc(100vh - 72px);overflow:hidden;background:#101018;}
  .map-canvas{position:absolute;inset:0;background:
      radial-gradient(circle at 20% 30%, rgba(82,102,235,.14), transparent 40%),
      radial-gradient(circle at 75% 65%, rgba(82,102,235,.10), transparent 45%),
      linear-gradient(180deg,#14141d,#0d0d13);
      background-size:100% 100%;
  }
  .map-grid{position:absolute;inset:0;background-image:linear-gradient(rgba(226,227,237,.05) 1px, transparent 1px), linear-gradient(90deg, rgba(226,227,237,.05) 1px, transparent 1px);background-size:40px 40px;}
  .region-blob{position:absolute;border-radius:48% 52% 58% 42% / 45% 48% 52% 55%;filter:blur(2px);}
  .marker{position:absolute;width:16px;height:16px;border-radius:50%;transform:translate(-50%,-50%);cursor:pointer;border:2px solid rgba(23,23,33,.9);z-index:5;transition:transform .15s ease;}
  .marker:hover{transform:translate(-50%,-50%) scale(1.3);}
  .marker.done{background:var(--cobalt);}
  .marker.progress{background:#8892f0;animation:pulseMarker 2s infinite;}
  .marker.design{background:var(--slate);}
  .marker.selected{outline:3px solid #fff;outline-offset:2px;}
  .marker.legend-marker{position:static;width:9px;height:9px;transform:none;cursor:default;border-width:1px;}
  .marker.legend-marker:hover{transform:none;}

  .drawer{position:absolute;left:16px;top:16px;bottom:16px;width:320px;background:rgba(30,30,42,.92);backdrop-filter:blur(10px);border-radius:16px;box-shadow:0 12px 40px rgba(0,0,0,.5);border:1px solid rgba(226,227,237,.08);display:flex;flex-direction:column;overflow:hidden;z-index:10;animation:fadeInUp .4s ease both;}
  .drawer-head{padding:18px 18px 12px;border-bottom:1px solid rgba(226,227,237,.08);}
  .drawer-search{display:flex;align-items:center;gap:8px;background:var(--obsidian);border-radius:32px;padding:10px 16px;margin-top:12px;}
  .drawer-search input{background:none;border:none;outline:none;color:var(--ivory);font-size:13px;width:100%;}
  .chip-row{display:flex;flex-wrap:wrap;gap:6px;padding:12px 18px;border-bottom:1px solid rgba(226,227,237,.08);}
  .chip{font-size:12px;padding:6px 12px;border-radius:40px;border:1px solid rgba(226,227,237,.2);background:transparent;color:var(--ash);cursor:pointer;}
  .chip.active{background:var(--cobalt);color:#fff;border-color:var(--cobalt);}
  .list-panel{flex:1;overflow-y:auto;padding:8px 10px;}
  .proj-row{padding:12px 10px;border-radius:10px;cursor:pointer;display:flex;flex-direction:column;gap:3px;}
  .proj-row:hover, .proj-row.active{background:var(--obsidian);}
  .proj-row .pname{font-size:13.5px;font-weight:600;color:#fff;}
  .proj-row .pmeta{font-size:11.5px;color:var(--ash);}
  .drawer-foot{padding:12px 16px;border-top:1px solid rgba(226,227,237,.08);display:flex;gap:8px;}

  .detail-card{position:absolute;right:16px;bottom:16px;width:340px;background:rgba(30,30,42,.94);backdrop-filter:blur(10px);border-radius:16px;box-shadow:0 12px 40px rgba(0,0,0,.5);border:1px solid rgba(226,227,237,.08);padding:22px;z-index:10;animation:fadeInUp .35s ease both;}
  .detail-badges{display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap;}
  .badge{font-size:11px;font-weight:700;padding:4px 10px;border-radius:20px;background:var(--obsidian);color:var(--ash);}
  .badge.on{background:var(--cobalt-soft);color:#a9b3f5;}

  .map-control{position:absolute;right:16px;top:16px;display:flex;flex-direction:column;background:rgba(30,30,42,.9);border-radius:12px;overflow:hidden;box-shadow:0 8px 24px rgba(0,0,0,.4);z-index:10;}
  .map-control button{width:38px;height:38px;background:none;border:none;color:var(--ivory);cursor:pointer;display:flex;align-items:center;justify-content:center;border-bottom:1px solid rgba(226,227,237,.1);}
  .map-control button:last-child{border-bottom:none;}
  .legend{position:absolute;left:352px;bottom:16px;background:rgba(30,30,42,.9);border-radius:12px;padding:14px 16px;box-shadow:0 8px 24px rgba(0,0,0,.4);z-index:9;font-size:12px;display:flex;flex-direction:column;gap:8px;}
  .legend-item{display:flex;align-items:center;gap:8px;color:var(--ash);}
  .legend-dot{width:9px;height:9px;border-radius:50%;}

  /* generic page (contact/recruit) */
  .page-header{padding:64px 24px 32px;max-width:1200px;margin:0 auto;}
  .page-eyebrow{font-size:13px;font-weight:700;color:var(--cobalt);letter-spacing:.1em;text-transform:uppercase;}
  .page-title{font-size:38px;font-weight:700;color:#fff;margin:10px 0 0;}
  .loc-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:20px;margin-bottom:40px;}
  .loc-card{background:var(--graphite);border-radius:12px;padding:28px;}
  .pin-art{width:38px;height:38px;border-radius:11px;background:var(--cobalt-soft);color:var(--cobalt);display:flex;align-items:center;justify-content:center;margin-bottom:16px;}
  .loc-card h4{margin:0 0 6px;font-size:17px;color:#fff;}
  .loc-card p{margin:2px 0;font-size:13.5px;color:var(--ash);line-height:1.6;}
  .doc-row{display:flex;gap:12px;margin-bottom:48px;flex-wrap:wrap;}
  .form-card{background:var(--graphite);border-radius:12px;padding:36px;max-width:720px;}
  .field{margin-bottom:20px;}
  .field label{display:block;font-size:13px;font-weight:600;color:var(--ivory);margin-bottom:8px;}
  .field input, .field select, .field textarea{width:100%;background:var(--obsidian);border:1px solid rgba(226,227,237,.12);border-radius:12px;padding:12px 16px;color:var(--ivory);font-size:14px;outline:none;transition:border-color .15s ease;}
  .field input:focus, .field select:focus, .field textarea:focus{border-color:var(--cobalt);}
  .field .err{color:#ff9a9a;font-size:12px;margin-top:6px;}
  .field-row{display:grid;grid-template-columns:1fr 1fr;gap:16px;}

  .job-list{display:flex;flex-direction:column;gap:12px;max-width:820px;margin-bottom:56px;}
  .job-row{background:var(--graphite);border-radius:12px;padding:20px 24px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;transition:border-color .15s ease;border:1px solid transparent;}
  .job-row:hover{border-color:rgba(82,102,235,.4);}
  .job-left h4{margin:0 0 4px;font-size:16px;color:#fff;}
  .job-left span{font-size:12.5px;color:var(--ash);}
  .job-status{display:flex;align-items:center;gap:8px;font-size:12.5px;font-weight:700;padding:6px 14px;border-radius:20px;}
  .job-status.open{background:var(--cobalt-soft);color:#a9b3f5;}
  .job-status.closed{background:var(--obsidian);color:var(--slate);}
  .status-dot{width:7px;height:7px;border-radius:50%;background:currentColor;}

  /* Modal / Drawer overlays */
  .overlay{position:fixed;inset:0;background:rgba(10,10,16,.6);z-index:100;display:flex;align-items:center;justify-content:center;animation:fadeInUp .18s ease both;}
  .modal{background:var(--graphite);border-radius:16px;padding:32px;width:460px;max-width:92vw;box-shadow:0 30px 80px rgba(0,0,0,.55);}
  .modal-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;}
  .modal-head h3{margin:0;font-size:19px;color:#fff;}
  .icon-btn{background:none;border:none;color:var(--ash);cursor:pointer;padding:6px;border-radius:8px;}
  .icon-btn:hover{background:var(--obsidian);color:#fff;}
  .dropzone{border:1.5px dashed rgba(226,227,237,.25);border-radius:12px;padding:26px;text-align:center;cursor:pointer;transition:border-color .15s ease,background .15s ease;}
  .dropzone:hover, .dropzone.drag{border-color:var(--cobalt);background:var(--cobalt-soft);}
  .captcha-row{display:flex;align-items:center;gap:10px;background:var(--obsidian);border-radius:12px;padding:12px 16px;margin:16px 0;}
  .spin{animation:spin .8s linear infinite;}

  .apply-drawer-wrap{position:fixed;inset:0;z-index:100;display:flex;justify-content:flex-end;}
  .apply-drawer-backdrop{position:absolute;inset:0;background:rgba(10,10,16,.6);}
  .apply-drawer{position:relative;width:420px;max-width:92vw;height:100%;background:var(--graphite);box-shadow:-20px 0 60px rgba(0,0,0,.5);padding:32px;overflow-y:auto;animation:slideInDrawer .3s cubic-bezier(.16,1,.3,1) both;}

  .toast-host{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);z-index:200;display:flex;flex-direction:column;gap:10px;align-items:center;}
  .toast{background:#20202e;border:1px solid rgba(226,227,237,.14);color:#fff;padding:13px 22px;border-radius:32px;font-size:13.5px;box-shadow:0 12px 30px rgba(0,0,0,.5);display:flex;align-items:center;gap:8px;animation:toastIn .25s ease both;}

  @media (max-width:900px){
    .grid-3, .loc-grid{grid-template-columns:1fr;}
    .drawer{width:calc(100% - 32px);}
    .legend{left:16px;bottom:210px;}
    .hero-title{font-size:36px;}
  }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef, useMemo } = React;

const LANG_TEXT = {
  ko: {
    navMain: '메인 홈페이지', navMap: '프로젝트 지도', navContact: '회사소개 및 문의', navRecruit: '채용 지원',
    heroEyebrow: '전국 현장 네트워크',
    heroTitle: '전국 현장의 데이터를, 하나의 지도로',
    heroSub: '테라링크는 전국에서 진행한 준공·진행 프로젝트를 지도 위에서 투명하게 공개하고, 관심 있는 모든 분들과 현장의 기록을 나눕니다.',
    ctaMap: '프로젝트 지도 보기', ctaContact: '문의하기',
  },
  en: {
    navMain: '메인 홈페이지', navMap: '프로젝트 지도', navContact: '회사소개 및 문의', navRecruit: '채용 지원',
    heroEyebrow: 'Nationwide Site Network',
    heroTitle: 'Every site, connected on one map',
    heroSub: 'TerraLink transparently shares completed and ongoing projects nationwide through an interactive map, open to everyone who wants to see the work.',
    ctaMap: 'View Project Map', ctaContact: 'Contact Us',
  },
  zh: {
    navMain: '메인 홈페이지', navMap: '프로젝트 지도', navContact: '회사소개 및 문의', navRecruit: '채용 지원',
    heroEyebrow: '全国现场网络',
    heroTitle: '将全国现场数据，汇聚于一张地图',

    ctaMap: '查看项目地图', ctaContact: '联系我们',
  },
};

const SLIDES = [
  { seed: 'terra-slide-bridge', tag: '준공 소식', title: '동남권 광역대교 3공구 준공 — 안전 최우선 시공' },
  { seed: 'terra-slide-plant', tag: '프로젝트', title: '스마트 산업단지 플랜트 구조물 골조 완료' },
  { seed: 'terra-slide-road', tag: '기술 리포트', title: '특허공법 적용 연약지반 보강 현장 리포트' },
  { seed: 'terra-slide-office', tag: '채용', title: '2026 하반기 현장관리·설계 직군 채용 공고' },

const PROJECTS = [
  { id: 1, name: '동남권 광역대교 3공구', region: '영남', year: '2025', patent: true, design: '일반설계', status: 'done', left: 62, top: 30 },
  { id: 2, name: '수도권 순환도로 확장', region: '수도권', year: '2026', patent: false, design: 'VE', status: 'progress', left: 34, top: 22 },
  { id: 3, name: '스마트 산업단지 플랜트', region: '충청', year: '2025', patent: true, design: '일반설계', status: 'progress', left: 44, top: 46 },
  { id: 4, name: '호남 관개용 저수로 정비', region: '호남', year: '2023', patent: false, design: '일반설계', status: 'done', left: 22, top: 62 },
  { id: 5, name: '해안 방재 옹벽 보강', region: '영남', year: '2024', patent: true, design: 'VE', status: 'done', left: 70, top: 58 },
  { id: 6, name: '충청 복합물류센터 기초', region: '충청', year: '2026', patent: false, design: '일반설계', status: 'design', left: 50, top: 68 },

function useToasts(){
  const [toasts, setToasts] = useState([]);
  const push = (msg) => {
    const id = Date.now() + Math.random();
    setToasts(t => [...t, { id, msg }]);
    setTimeout(() => setToasts(t => t.filter(x => x.id !== id)), 2600);
  };
  return { toasts, push };
}

function ToastHost({ toasts }){
  return (
    <div className="toast-host">
      {toasts.map(t => (
        <div className="toast" key={t.id}><i data-lucide="check-circle-2" style={{width:16,height:16,color:'#8892f0'}}></i>{t.msg}</div>
      ))}
    </div>
  );
}

function ProjectMapScreen({ push }){
  const [selected, setSelected] = useState(PROJECTS[0]);
  const [region, setRegion] = useState('전체');
  const [year, setYear] = useState('전체');
  const [query, setQuery] = useState('');
  const [zoom, setZoom] = useState(1);
  const [showCsv, setShowCsv] = useState(false);
  const [csvState, setCsvState] = useState('idle');
  const [roadview, setRoadview] = useState(false);
  const [rvAngle, setRvAngle] = useState(0);

  useEffect(() => {
    const params = new URLSearchParams();
    if (region !== '전체') params.set('region', region);
    if (year !== '전체') params.set('year', year);
    if (selected) params.set('project', selected.id);
    const qs = params.toString();
    window.history.replaceState(null, '', qs ? ('?' + qs) : window.location.pathname);
  }, [region, year, selected]);

  const filtered = useMemo(() => PROJECTS.filter(p =>
    (region === '전체' || p.region === region) &&
    (year === '전체' || p.year === year) &&
    (query.trim() === '' || p.name.includes(query.trim()))
  ), [region, year, query]);

  const statusLabel = { done:'준공', progress:'진행중', design:'설계중' };

  const runCsv = () => {
    setCsvState('parsing');
    setTimeout(() => { setCsvState('done'); push('CSV 42건 파싱 완료 — 지도에 반영되었습니다.'); }, 1400);
  };

  const copyLink = () => {
    const url = window.location.href;
    if (navigator.clipboard) navigator.clipboard.writeText(url).catch(() => {});
    push('필터 조건이 반영된 링크가 복사되었습니다.');
  };

  return (
    <div className="map-screen">
      <div className="map-canvas" style={{transform:`scale(${zoom})`, transition:'transform .25s ease'}}>
        <div className="map-grid"></div>
        <div className="region-blob" style={{left:'8%',top:'10%',width:220,height:180,background:'rgba(82,102,235,.10)'}}></div>
        <div className="region-blob" style={{left:'55%',top:'8%',width:260,height:200,background:'rgba(82,102,235,.07)'}}></div>
        <div className="region-blob" style={{left:'20%',top:'55%',width:300,height:220,background:'rgba(82,102,235,.09)'}}></div>
        <div className="region-blob" style={{left:'60%',top:'50%',width:240,height:210,background:'rgba(82,102,235,.06)'}}></div>
        {filtered.map(p => (
          <div
            key={p.id}
            className={"marker " + p.status + (selected && selected.id === p.id ? ' selected' : '')}
            style={{ left: p.left + '%', top: p.top + '%' }}
            title={p.name}
            onClick={() => setSelected(p)}
          ></div>
        ))}
      </div>

      <div className="drawer">
        <div className="drawer-head">
          <div style={{display:'flex',alignItems:'center',justifyContent:'space-between'}}>
            <strong style={{fontSize:14}}>프로젝트 탐색</strong>
            <button className="icon-btn" onClick={() => setShowCsv(true)} title="CSV 업로드"><i data-lucide="upload" style={{width:16,height:16}}></i></button>
          </div>
          <div className="drawer-search">
            <i data-lucide="search" style={{width:14,height:14,color:'var(--ash)'}}></i>
            <input placeholder="현장명 검색" value={query} onChange={e => setQuery(e.target.value)} />
          </div>
        </div>
        <div className="chip-row">
          {REGIONS.map(r => (
            <button key={r} className={"chip " + (region===r?'active':'')} onClick={() => setRegion(r)}>{r}</button>
          ))}
        </div>
        <div className="chip-row">
          {YEARS.map(y => (
            <button key={y} className={"chip " + (year===y?'active':'')} onClick={() => setYear(y)}>{y}</button>
          ))}
        </div>
        <div className="list-panel">
          {filtered.length === 0 && <div style={{padding:16,fontSize:12.5,color:'var(--ash)'}}>조건에 맞는 프로젝트가 없습니다.</div>}
          {filtered.map(p => (
            <div key={p.id} className={"proj-row " + (selected && selected.id===p.id ? 'active':'')} onClick={() => setSelected(p)}>
              <span className="pname">{p.name}</span>
              <span className="pmeta">{p.region} · {p.year}년 준공연도 · {statusLabel[p.status]}</span>

          ))}
        </div>
        <div className="drawer-foot">
          <button className="btn-ghost btn-sm" style={{flex:1,justifyContent:'center'}} onClick={copyLink}><i data-lucide="link-2" style={{width:14,height:14}}></i>링크 복사</button>
        </div>
      </div>

      {selected && (
        <div className="detail-card">
          <div className="detail-badges">
            <span className={"badge " + (selected.status==='progress'?'on':'')}>{statusLabel[selected.status]}</span>
            <span className={"badge " + (selected.patent?'on':'')}>{selected.patent ? '특허공법 적용' : '일반공법'}</span>
            <span className="badge">{selected.design}</span>
          </div>

          <p style={{margin:'0 0 16px',fontSize:12.5,color:'var(--ash)'}}>{selected.region} 권역 · 준공연도 {selected.year}년</p>
          <button className="btn-primary btn-sm" style={{width:'100%',justifyContent:'center'}} onClick={() => setRoadview(true)}>
            <i data-lucide="video" style={{width:15,height:15}}></i>로드뷰 보기
          </button>
        </div>
      )}

      <div className="map-control">
        <button onClick={() => setZoom(z => Math.min(1.4, z + 0.1))}><i data-lucide="plus" style={{width:16,height:16}}></i></button>
        <button onClick={() => setZoom(z => Math.max(0.8, z - 0.1))}><i data-lucide="minus" style={{width:16,height:16}}></i></button>
      </div>
      <div className="legend">
        <div className="legend-item"><span className="marker legend-marker done"></span>준공</div>
        <div className="legend-item"><span className="marker legend-marker progress"></span>진행중</div>
        <div className="legend-item"><span className="marker legend-marker design"></span>설계중</div>
      </div>

      {showCsv && (
        <div className="overlay" onClick={() => setShowCsv(false)}>
          <div className="modal" onClick={e => e.stopPropagation()}>
            <div className="modal-head">
              <h3>CSV 프로젝트 일괄 업로드</h3>
              <button className="icon-btn" onClick={() => setShowCsv(false)}><i data-lucide="x" style={{width:18,height:18}}></i></button>
            </div>
            <div className="dropzone" onClick={runCsv}>
              {csvState === 'idle' && (<><i data-lucide="file-spreadsheet" style={{width:26,height:26,color:'var(--cobalt)'}}></i><p style={{fontSize:13,color:'var(--ash)',margin:'10px 0 0'}}>좌표·로드뷰 파라미터가 포함된 CSV 파일을 클릭하여 업로드합니다.</p></>)}
              {csvState === 'parsing' && (<><i data-lucide="loader-2" className="spin" style={{width:26,height:26,color:'var(--cobalt)'}}></i><p style={{fontSize:13,color:'var(--ash)',margin:'10px 0 0'}}>파싱 중입니다...</p></>)}
              {csvState === 'done' && (<><i data-lucide="check-circle-2" style={{width:26,height:26,color:'#8892f0'}}></i><p style={{fontSize:13,color:'var(--ash)',margin:'10px 0 0'}}>42건이 반영되었습니다. 다시 업로드하려면 클릭하세요.</p></>)}
            </div>
          </div>
        </div>
      )}

      {roadview && (
        <div className="overlay" onClick={() => setRoadview(false)}>
          <div className="modal" style={{width:520}} onClick={e => e.stopPropagation()}>
            <div className="modal-head">
              <h3>{selected.name} — 로드뷰</h3>
              <button className="icon-btn" onClick={() => setRoadview(false)}><i data-lucide="x" style={{width:18,height:18}}></i></button>
            </div>
            <div style={{height:260,borderRadius:12,background:'linear-gradient(135deg,#20202e,#12121a)',display:'flex',alignItems:'center',justifyContent:'center',position:'relative'}}>
              <i data-lucide="compass" style={{width:40,height:40,color:'var(--cobalt)',transform:`rotate(${rvAngle}deg)`,transition:'transform .3s ease'}}></i>
              <button className="icon-btn" style={{position:'absolute',left:14,top:'50%',transform:'translateY(-50%)'}} onClick={() => setRvAngle(a => a - 45)}><i data-lucide="rotate-ccw" style={{width:18,height:18}}></i></button>
              <button className="icon-btn" style={{position:'absolute',right:14,top:'50%',transform:'translateY(-50%)'}} onClick={() => setRvAngle(a => a + 45)}><i data-lucide="rotate-cw" style={{width:18,height:18}}></i></button>
            </div>
            <p style={{fontSize:12,color:'var(--ash)',marginTop:14}}>로드뷰 파라미터(좌표·각도)가 CSV로부터 자동 연동되는 영역입니다.</p>
          </div>
        </div>
      )}
    </div>
  );
}

function ContactScreen({ push }){
  const [dlCount, setDlCount] = useState(128);
  const [form, setForm] = useState({ name:'', company:'', email:'', phone:'', type:'일반문의', message:'' });
  const [errors, setErrors] = useState({});
  const [submitting, setSubmitting] = useState(false);

  const locations = [
    { icon:'building-2', name:'본사', addr:'서울특별시 강남구 테헤란로 411, 8층', phone:'02-6123-4500' },
    { icon:'landmark', name:'남부지사', addr:'부산광역시 해운대구 센텀중앙로 90, 3층', phone:'051-742-1188' },
    { icon:'factory', name:'충청 공장', addr:'충청남도 아산시 인주면 산업로 213', phone:'041-533-7700' },
  ];

  const update = (k, v) => setForm(f => ({ ...f, [k]: v }));

  const validate = () => {
    const e = {};
    if (!form.name.trim()) e.name = '이름을 입력해 주세요.';
    if (!form.email.trim()) e.email = '이메일을 입력해 주세요.';
    else if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(form.email)) e.email = '올바른 이메일 형식이 아닙니다.';
    if (!form.message.trim()) e.message = '문의 내용을 입력해 주세요.';
    setErrors(e);
    return Object.keys(e).length === 0;
  };

  const submit = (ev) => {
    ev.preventDefault();
    if (!validate()) return;
    setSubmitting(true);
    setTimeout(() => {
      setSubmitting(false);
      push('문의가 접수되었습니다. 담당자 이메일로 전달됩니다.');
      setForm({ name:'', company:'', email:'', phone:'', type:'일반문의', message:'' });
      setErrors({});
    }, 1000);
  };

  const download = (label) => {
    setDlCount(c => c + 1);
    push(label + ' 다운로드가 시작됩니다.');
  };

  return (
    <div>
      <div className="page-header">
        <div className="page-eyebrow">Contact Us</div>
        <h1 className="page-title">회사소개 및 문의</h1>
      </div>
      <div className="section" style={{paddingTop:0}}>
        <div className="loc-grid">
          {locations.map(l => (
            <div className="loc-card" key={l.name}>
              <div className="pin-art"><i data-lucide={l.icon} style={{width:19,height:19}}></i></div>
              <h4>{l.name}</h4>
              <p>{l.addr}</p>
              <p>{l.phone}</p>
            </div>
          ))}
        </div>

        <div className="doc-row">
          <button className="btn-ghost" onClick={() => download('회사소개서')}><i data-lucide="file-down" style={{width:16,height:16}}></i>회사소개서 PDF 다운로드</button>
          <button className="btn-ghost" onClick={() => download('특허공법 소개서')}><i data-lucide="file-down" style={{width:16,height:16}}></i>특허공법 소개서 PDF 다운로드</button>
          <span style={{alignSelf:'center',fontSize:12.5,color:'var(--ash)'}}>누적 다운로드 {dlCount}회</span>
        </div>

        <div className="form-card">
          <h3 style={{margin:'0 0 22px',fontSize:20,color:'#fff'}}>문의하기</h3>
          <form onSubmit={submit}>
            <div className="field-row">
              <div className="field">
                <label>이름 *</label>
                <input value={form.name} onChange={e => update('name', e.target.value)} placeholder="김민수" />
                {errors.name && <div className="err">{errors.name}</div>}
              </div>
              <div className="field">
                <label>회사명</label>
                <input value={form.company} onChange={e => update('company', e.target.value)} placeholder="(주)샘플기업" />
              </div>
            </div>
            <div className="field-row">
              <div className="field">
                <label>이메일 *</label>
                <input value={form.email} onChange={e => update('email', e.target.value)} placeholder="contact@example.com" />
                {errors.email && <div className="err">{errors.email}</div>}
              </div>
              <div className="field">
                <label>연락처</label>
                <input value={form.phone} onChange={e => update('phone', e.target.value)} placeholder="010-0000-0000" />
              </div>
            </div>
            <div className="field">
              <label>문의 유형</label>
              <select value={form.type} onChange={e => update('type', e.target.value)}>
                <option>일반문의</option><option>견적문의</option><option>제휴문의</option><option>채용문의</option>
              </select>
            </div>
            <div className="field">
              <label>문의 내용 *</label>
              <textarea rows="4" value={form.message} onChange={e => update('message', e.target.value)} placeholder="문의하실 내용을 입력해 주세요."></textarea>
              {errors.message && <div className="err">{errors.message}</div>}
            </div>
            <button className="btn-primary" type="submit" disabled={submitting}>
              {submitting ? <i data-lucide="loader-2" className="spin" style={{width:16,height:16}}></i> : <i data-lucide="send" style={{width:16,height:16}}></i>}
              {submitting ? '전송 중...' : '문의 보내기'}
            </button>
          </form>
        </div>
      </div>
    </div>
  );
}

function RecruitScreen({ push }){
  const jobs = [
    { id:1, title:'현장관리 담당자 (토목)', tag:'정규직 · 영남권', status:'open' },
    { id:2, title:'구조 설계 엔지니어', tag:'정규직 · 본사', status:'open' },
    { id:3, title:'안전관리자 (산업안전기사)', tag:'계약직 · 충청권', status:'open' },
    { id:4, title:'플랜트 시공 감리', tag:'정규직 · 본사', status:'closed' },
  ];
  const [applyJob, setApplyJob] = useState(null);
  const [name, setName] = useState('');
  const [affil, setAffil] = useState('');
  const [file, setFile] = useState(null);
  const [fileErr, setFileErr] = useState('');
  const [captcha, setCaptcha] = useState('idle');
  const [submitting, setSubmitting] = useState(false);

  const openJob = (job) => {
    if (job.status === 'closed') { push('현재 마감된 공고입니다.'); return; }
    setApplyJob(job); setName(''); setAffil(''); setFile(null); setFileErr(''); setCaptcha('idle');
  };

  const onFile = (f) => {
    if (!f) return;
    if (!f.name.toLowerCase().endsWith('.pdf')) { setFileErr('PDF 파일만 업로드할 수 있습니다.'); setFile(null); return; }
    setFileErr(''); setFile(f);
  };

  const runCaptcha = () => {
    if (captcha === 'verified') return;
    setCaptcha('checking');
    setTimeout(() => setCaptcha('verified'), 700);
  };

  const canSubmit = name.trim() && file && captcha === 'verified' && !submitting;

  const submitApply = () => {
    if (!canSubmit) return;
    setSubmitting(true);
    setTimeout(() => {
      setSubmitting(false);
      push(applyJob.title + ' 지원이 접수되었습니다.');
      setApplyJob(null);
    }, 1000);
  };

  return (
    <div>
      <div className="page-header">
        <div className="page-eyebrow">Recruit</div>
        <h1 className="page-title">채용 지원</h1>
      </div>
      <div className="section" style={{paddingTop:0}}>
        <div className="job-list">
          {jobs.map(j => (
            <div className="job-row" key={j.id} onClick={() => openJob(j)}>
              <div className="job-left">
                <h4>{j.title}</h4>
                <span>{j.tag}</span>
              </div>
              <span className={"job-status " + j.status}>
                <span className="status-dot"></span>{j.status === 'open' ? '모집중' : '마감'}
              </span>
            </div>
          ))}
        </div>
      </div>

      {applyJob && (
        <div className="apply-drawer-wrap">
          <div className="apply-drawer-backdrop" onClick={() => setApplyJob(null)}></div>
          <div className="apply-drawer">
            <div className="modal-head">
              <h3>{applyJob.title} 지원</h3>
              <button className="icon-btn" onClick={() => setApplyJob(null)}><i data-lucide="x" style={{width:18,height:18}}></i></button>
            </div>
            <div className="field">
              <label>이름 *</label>
              <input value={name} onChange={e => setName(e.target.value)} placeholder="이지은" />
            </div>
            <div className="field">
              <label>소속 (선택)</label>
              <input value={affil} onChange={e => setAffil(e.target.value)} placeholder="현 소속 회사명" />
            </div>
            <div className="field">
              <label>이력서 (PDF) *</label>
              <label className="dropzone" style={{display:'block'}}>
                <input type="file" accept="application/pdf" style={{display:'none'}} onChange={e => onFile(e.target.files[0])} />
                {!file && (<><i data-lucide="upload-cloud" style={{width:22,height:22,color:'var(--cobalt)'}}></i><p style={{fontSize:12.5,color:'var(--ash)',margin:'8px 0 0'}}>PDF 이력서를 드래그하거나 클릭하여 업로드</p></>)}
                {file && (<><i data-lucide="file-check-2" style={{width:22,height:22,color:'#8892f0'}}></i><p style={{fontSize:12.5,color:'var(--ivory)',margin:'8px 0 0'}}>{file.name}</p></>)}
              </label>
              {fileErr && <div className="err">{fileErr}</div>}
            </div>
            <div className="captcha-row">
              <button className="icon-btn" onClick={runCaptcha} style={{background:'var(--graphite)'}}>
                {captcha === 'checking' && <i data-lucide="loader-2" className="spin" style={{width:18,height:18}}></i>}
                {captcha === 'verified' && <i data-lucide="check-square" style={{width:18,height:18,color:'#8892f0'}}></i>}
                {captcha === 'idle' && <i data-lucide="square" style={{width:18,height:18}}></i>}
              </button>
              <span style={{fontSize:12.5,color:'var(--ash)'}}>{captcha === 'verified' ? '로봇이 아님을 확인했습니다.' : '로봇이 아닙니다 확인'}</span>
            </div>
            <button className="btn-primary" style={{width:'100%',justifyContent:'center'}} disabled={!canSubmit} onClick={submitApply}>
              {submitting ? <i data-lucide="loader-2" className="spin" style={{width:16,height:16}}></i> : <i data-lucide="send" style={{width:16,height:16}}></i>}
              {submitting ? '제출 중...' : '지원하기'}
            </button>
          </div>
        </div>
      )}
    </div>
  );
}

function Footer(){
  return (
    <footer>
      <div className="footer-inner">
        <div>© 2026 테라링크 — 자체 개발 프로젝트</div>
        <div className="footer-links">
          <span>서울특별시 강남구 테헤란로 411</span>
          <span>사업자등록번호 000-00-00000</span>
        </div>
      </div>
    </footer>
  );
}

function App(){
  const [screen, setScreen] = useState('main');
  const [lang, setLang] = useState('ko');
  const { toasts, push } = useToasts();

  useEffect(() => { window.scrollTo(0, 0); }, [screen]);
  useEffect(() => { if (window.lucide) window.lucide.createIcons(); });

  return (
    <div className="app" data-archetype="map-canvas" style={{width:'100%',minHeight:'100vh'}}>
      <TopNav screen={screen} setScreen={setScreen} lang={lang} setLang={setLang} solid={screen !== 'main'} />
      {screen === 'main' && <MainScreen lang={lang} setScreen={setScreen} push={push} />}
      {screen === 'project-map' && <ProjectMapScreen push={push} />}
      {screen === 'contact' && <ContactScreen push={push} />}
      {screen === 'recruit' && <RecruitScreen push={push} />}
      {screen !== 'project-map' && <Footer />}
      <ToastHost toasts={toasts} />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
