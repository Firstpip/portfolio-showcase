<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>다국어 CMS 관리자 콘솔</title>
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
<link rel="stylesheet" href="https://unpkg.com/@tabler/icons-webfont@2.47.0/dist/tabler-icons.min.css" />
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
  :root{
    --paper:#ffffff; --obsidian:#000000; --inkstone:#181818; --felt:#6d6d6d;
    --slate-pill:#636363; --ash-mist:#9a9a9a; --pewter:#808080; --oxblood:#a02d25;
    --hair:rgba(0,0,0,.12); --hair-soft:rgba(0,0,0,.07);
  }
  *{box-sizing:border-box;}
  html,body,#root{width:100%;min-height:100vh;margin:0;padding:0;}
  body{background:var(--paper);color:var(--obsidian);font-family:'Pretendard', ui-sans-serif, system-ui, -apple-system, sans-serif;-webkit-font-smoothing:antialiased;}
  button,input,select,textarea{font-family:inherit;}
  a{color:inherit;text-decoration:none;}

  @keyframes fadeInUp{ from{opacity:0; transform:translateY(14px);} to{opacity:1; transform:translateY(0);} }
  @keyframes toastIn{ from{opacity:0; transform:translateY(10px);} to{opacity:1; transform:translateY(0);} }
  @keyframes spin{ to{transform:rotate(360deg);} }
  @keyframes growBar{ from{transform:scaleX(0);} to{transform:scaleX(1);} }
  @keyframes blink{ 0%,100%{opacity:1;} 50%{opacity:.25;} }

  .shell{display:flex;width:100%;min-height:100vh;}

  /* ── tree sidebar (notion-blocks-tree signature) ── */
  .tree-sidebar{position:fixed;left:0;top:0;bottom:0;width:252px;border-right:1px solid var(--hair);background:#fbfbfb;display:flex;flex-direction:column;z-index:20;}
  .sidebar-brand{display:flex;align-items:center;gap:10px;padding:18px 16px 14px;border-bottom:1px solid var(--hair-soft);}
  .brand-mark{width:26px;height:26px;background:var(--obsidian);color:#fff;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;}
  .brand-name{font-size:14px;font-weight:600;}
  .brand-chev{margin-left:auto;color:var(--felt);}
  .sidebar-search{padding:10px 12px;display:flex;flex-direction:column;gap:6px;border-bottom:1px solid var(--hair-soft);}
  .search-btn, .quick-add{display:flex;align-items:center;gap:8px;font-size:12.5px;color:var(--felt);background:none;border:none;padding:7px 8px;cursor:pointer;text-align:left;width:100%;}
  .search-btn:hover, .quick-add:hover{background:var(--hair-soft);}
  .tree-nav{flex:1;overflow-y:auto;padding:10px 8px;}
  .tree-item{display:flex;align-items:center;gap:6px;padding:7px 8px;font-size:13px;cursor:pointer;color:var(--inkstone);border:1px solid transparent;}
  .tree-item:hover{background:var(--hair-soft);}
  .tree-item.active{background:var(--obsidian);color:#fff;}
  .tree-item.active .tree-toggle{color:#fff;}
  .tree-toggle{width:14px;color:var(--pewter);background:none;border:none;cursor:pointer;font-size:11px;flex:0 0 auto;}
  .tree-toggle-placeholder{width:14px;flex:0 0 auto;}
  .sidebar-footer{padding:10px 12px;border-top:1px solid var(--hair-soft);display:flex;flex-direction:column;gap:2px;}
  .footer-link{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--felt);padding:7px 8px;background:none;border:none;cursor:pointer;width:100%;text-align:left;}
  .footer-link:hover{background:var(--hair-soft);}

  /* ── main content ── */
  .main-wrap{margin-left:252px;flex:1;min-width:0;width:calc(100% - 252px);min-height:100vh;background:#fff;}
  .page-breadcrumb{display:flex;align-items:center;gap:8px;padding:20px 40px 0;font-size:12.5px;color:var(--felt);}
  .page-breadcrumb .sep{color:var(--ash-mist);}
  .page-icon-row{display:flex;align-items:center;gap:16px;padding:24px 40px 0;}
  .page-icon-large{width:56px;height:56px;background:var(--paper);border:1.5px solid var(--obsidian);display:flex;align-items:center;justify-content:center;font-size:24px;}
  .page-meta{display:flex;gap:6px;margin-left:auto;}
  .meta-action{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--felt);background:none;border:1px solid var(--hair);border-radius:75px;padding:6px 14px;cursor:pointer;}
  .meta-action:hover{border-color:var(--obsidian);color:var(--obsidian);}
  .page-body{max-width:840px;margin:0 auto;padding:14px 40px 96px;animation:fadeInUp .35s ease both;}
  .live-dot{width:7px;height:7px;border-radius:50%;background:var(--oxblood);display:inline-block;animation:blink 1.6s ease-in-out infinite;margin-right:6px;}
  .stat-bar-track{height:3px;background:var(--hair);margin-top:12px;overflow:hidden;}
  .stat-bar-fill{height:100%;background:var(--obsidian);transform-origin:left;animation:growBar .8s cubic-bezier(.16,1,.3,1) both;}
  .page-title-input{width:100%;border:none;outline:none;font-size:40px;font-weight:700;color:var(--obsidian);padding:6px 0 18px;background:transparent;}
  .page-title{font-size:48px;font-weight:700;margin:6px 0 24px;line-height:1.1;}
  .page-title-input{font-size:48px;}
  .pipeline-art{width:100%;margin:8px 0 28px;}

  .block-list{display:flex;flex-direction:column;gap:2px;}
  .block{position:relative;padding:6px 4px;border-radius:0;}
  .block:hover{background:var(--hair-soft);}
  .block-handle, .block-add{display:inline-flex;width:20px;color:var(--ash-mist);font-size:13px;}
  .block-text p{font-size:16px;line-height:1.7;margin:0;color:var(--inkstone);}
  .block-heading h2{font-size:26px;font-weight:700;margin:14px 0 4px;}
  .block-heading h3{font-size:20px;font-weight:700;margin:12px 0 4px;}
  .block-callout{display:flex;gap:12px;border:1px solid var(--hair);padding:16px 18px;background:#faf8f7;}
  .block-callout .ti{font-size:18px;color:var(--oxblood);flex:0 0 auto;margin-top:2px;}
  .block-callout p{margin:0;font-size:14.5px;line-height:1.6;color:var(--inkstone);}
  .block-divider hr{border:none;border-top:1px solid var(--hair);margin:18px 0;}
  .block-table table{width:100%;border-collapse:collapse;font-size:13.5px;}
  .block-table th, .block-table td{border:1px solid var(--hair);padding:9px 12px;text-align:left;}
  .block-table th{background:#fafafa;font-weight:600;}
  .block-list-ul{font-size:15px;line-height:1.9;color:var(--inkstone);padding-left:22px;margin:6px 0;}
  .block-toggle{border:1px solid var(--hair);}
  .toggle-summary-row{display:flex;align-items:center;gap:10px;padding:14px 16px;cursor:pointer;}
  .toggle-arrow{background:none;border:none;color:var(--felt);cursor:pointer;font-size:13px;transition:transform .15s ease;}
  .toggle-arrow.open{transform:rotate(90deg);}
  .toggle-content{padding:0 16px 16px 40px;}
  .block-image{border:1px dashed var(--hair);padding:22px;text-align:center;cursor:pointer;transition:border-color .15s ease,background .15s ease;}
  .block-image.drag{border-color:var(--oxblood);background:#fdf3f2;}
  .block-image img{max-width:100%;display:block;margin:0 auto;}

  .tag-editor{display:flex;flex-wrap:wrap;gap:8px;align-items:center;margin:10px 0 20px;}
  .tag-chip{display:flex;align-items:center;gap:6px;font-size:12px;border:1px solid var(--obsidian);border-radius:75px;padding:5px 6px 5px 14px;}
  .tag-chip button{background:none;border:none;cursor:pointer;color:var(--felt);display:flex;padding:2px;}
  .tag-input{border:1px dashed var(--hair);border-radius:75px;padding:6px 16px;font-size:12px;outline:none;min-width:120px;}

  .btn{display:inline-flex;align-items:center;gap:8px;font-size:14px;font-weight:600;border-radius:75px;padding:11px 24px;cursor:pointer;transition:opacity .15s ease, background .15s ease;}
  .btn-solid{background:var(--obsidian);color:#fff;border:none;}
  .btn-solid:hover{opacity:.85;}
  .btn-solid:disabled{background:var(--ash-mist);cursor:not-allowed;}
  .btn-accent{background:var(--oxblood);color:#fff;border:none;}
  .btn-accent:hover{opacity:.85;}
  .btn-accent:disabled{background:var(--ash-mist);cursor:not-allowed;}
  .btn-outline{background:transparent;color:var(--obsidian);border:1px solid var(--obsidian);}
  .btn-outline:hover{background:var(--hair-soft);}
  .btn-sm{padding:8px 18px;font-size:12.5px;}

  /* dashboard */
  .stat-row{display:grid;grid-template-columns:repeat(3,1fr);gap:0;border:1px solid var(--hair);margin:8px 0 32px;}
  .stat-box{padding:22px 24px;border-right:1px solid var(--hair);}
  .stat-box:last-child{border-right:none;}
  .stat-label{font-size:12px;color:var(--felt);margin-bottom:8px;display:flex;align-items:center;gap:6px;}
  .stat-value{font-size:34px;font-weight:700;}
  .donut-row{display:grid;grid-template-columns:repeat(3,1fr);gap:24px;margin-bottom:36px;}
  .donut-box{border:1px solid var(--hair);padding:22px;text-align:center;}
  .donut{width:96px;height:96px;border-radius:50%;margin:0 auto 14px;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:700;}
  .donut-label{font-size:12.5px;color:var(--felt);}
  .timeline-item{display:flex;gap:12px;padding:12px 0;border-bottom:1px solid var(--hair-soft);font-size:13px;}
  .timeline-item:last-child{border-bottom:none;}
  .timeline-dot{width:7px;height:7px;border-radius:50%;background:var(--obsidian);margin-top:6px;flex:0 0 auto;}
  .timeline-time{color:var(--ash-mist);font-size:11.5px;margin-left:auto;white-space:nowrap;}

  /* translation review */
  .review-card{border:1px solid var(--hair);margin-bottom:2px;}
  .review-head{display:flex;align-items:center;gap:12px;padding:16px 18px;}
  .review-head h4{margin:0;font-size:15.5px;flex:1;}
  .lang-badges{display:flex;gap:6px;}
  .lang-badge{font-size:11px;font-weight:700;padding:4px 10px;border-radius:75px;border:1px solid var(--hair);color:var(--felt);}
  .lang-badge.review{background:var(--obsidian);color:#fff;border-color:var(--obsidian);}
  .lang-badge.published{background:var(--oxblood);color:#fff;border-color:var(--oxblood);}
  .review-body{padding:0 18px 18px;display:grid;grid-template-columns:1fr 1fr;gap:18px;}
  .review-col label{font-size:11px;font-weight:700;color:var(--felt);text-transform:uppercase;letter-spacing:.05em;display:block;margin-bottom:8px;}
  .review-col textarea{width:100%;border:1px solid var(--hair);padding:10px 12px;font-size:13px;line-height:1.6;resize:vertical;min-height:78px;}
  .review-actions{display:flex;gap:8px;margin-top:10px;}

  /* applicants */
  .filter-row{display:flex;gap:8px;flex-wrap:wrap;margin:8px 0 20px;}
  .pill-filter{font-size:12.5px;border:1px solid var(--hair);border-radius:75px;padding:7px 16px;background:none;cursor:pointer;}
  .pill-filter.active{background:var(--obsidian);color:#fff;border-color:var(--obsidian);}
  .app-row{border:1px solid var(--hair);border-top:none;}
  .app-row:first-child{border-top:1px solid var(--hair);}
  .app-row-head{display:flex;align-items:center;gap:16px;padding:16px 18px;cursor:pointer;}
  .app-avatar{width:34px;height:34px;border-radius:50%;background:var(--inkstone);color:#fff;display:flex;align-items:center;justify-content:center;font-size:12.5px;font-weight:700;flex:0 0 auto;}
  .app-name{font-size:14px;font-weight:600;}
  .app-sub{font-size:11.5px;color:var(--felt);}
  .stage-badge{font-size:11px;font-weight:700;padding:5px 12px;border-radius:75px;border:1px solid var(--hair);margin-left:auto;}
  .app-detail{padding:0 18px 20px;display:grid;grid-template-columns:180px 1fr;gap:20px;}
  .pdf-box{border:1px solid var(--hair);height:150px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;color:var(--felt);font-size:11.5px;}
  .stage-btns{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px;}
  .audit-log{font-size:12px;color:var(--felt);border-top:1px dashed var(--hair);padding-top:10px;display:flex;flex-direction:column;gap:4px;}

  .toast-host{position:fixed;bottom:24px;left:50%;transform:translateX(calc(-50% + 126px));z-index:200;display:flex;flex-direction:column;gap:10px;align-items:center;}
  .toast{background:var(--obsidian);color:#fff;padding:12px 22px;border-radius:75px;font-size:13px;box-shadow:0 12px 30px rgba(0,0,0,.25);display:flex;align-items:center;gap:8px;animation:toastIn .2s ease both;}

  @media (max-width:960px){
    .stat-row, .donut-row, .review-body{grid-template-columns:1fr;}
    .tree-sidebar{width:220px;}
    .main-wrap{margin-left:220px;width:calc(100% - 220px);}
  }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef } = React;

function useToasts(){
  const [toasts, setToasts] = useState([]);
  const push = (msg) => {
    const id = Date.now() + Math.random();
    setToasts(t => [...t, { id, msg }]);
    setTimeout(() => setToasts(t => t.filter(x => x.id !== id)), 2600);
  };
  return { toasts, push };
}
function ToastHost({ toasts }){
  return (
    <div className="toast-host">
      {toasts.map(t => (<div className="toast" key={t.id}><i className="ti ti-circle-check" style={{fontSize:15}}></i>{t.msg}</div>))}
    </div>
  );
}

const NAV_TREE = [
  { id:'main', label:'콘텐츠 관리 대시보드', icon:'ti-layout-dashboard', level:0 },
  { id:'group-content', label:'콘텐츠', icon:'ti-folder', level:0, group:true },
  { id:'editor', label:'게시글 에디터', icon:'ti-article', level:1 },
  { id:'translation-review', label:'번역 검수 워크플로우', icon:'ti-language', level:1 },
  { id:'group-recruit', label:'채용', icon:'ti-folder', level:0, group:true },
  { id:'applicants', label:'지원자 관리', icon:'ti-users', level:1 },
];

const BREADCRUMB = {
  main: ['워크스페이스', '대시보드'],
  editor: ['콘텐츠', '게시글 에디터'],
  'translation-review': ['콘텐츠', '번역 검수 워크플로우'],
  applicants: ['채용', '지원자 관리'],
};

function Sidebar({ screen, setScreen, push }){
  const [expanded, setExpanded] = useState({ 'group-content': true, 'group-recruit': true });
  const toggle = (id) => setExpanded(e => ({ ...e, [id]: !e[id] }));
  return (
    <aside className="tree-sidebar" data-tree-sidebar>
      <div className="sidebar-brand">
        <div className="brand-mark">CM</div>
        <div className="brand-name">다국어 CMS</div>
        <i className="ti ti-chevron-down brand-chev" style={{fontSize:14}}></i>
      </div>
      <div className="sidebar-search">
        <button className="search-btn" onClick={() => push('통합 검색은 준비 중입니다.')}><i className="ti ti-search" style={{fontSize:14}}></i>검색</button>
        <button className="quick-add" onClick={() => { setScreen('editor'); push('새 게시글이 생성되었습니다.'); }}><i className="ti ti-plus" style={{fontSize:14}}></i>새 페이지</button>
      </div>
      <nav className="tree-nav">
        {NAV_TREE.map(item => {
          if (item.group) {
            return (
              <div className="tree-item" key={item.id} onClick={() => toggle(item.id)} style={{paddingLeft:8}}>
                <button className="tree-toggle" onClick={(e) => { e.stopPropagation(); toggle(item.id); }}>{expanded[item.id] ? '▾' : '▸'}</button>
                <i className={"ti " + item.icon} style={{fontSize:14}}></i>
                <span>{item.label}</span>
              </div>
            );
          }
          if (item.level === 1) {
            const parentId = item.id === 'applicants' ? 'group-recruit' : 'group-content';
            if (!expanded[parentId]) return null;
            return (
              <div key={item.id} className={"tree-item " + (screen===item.id?'active':'')} style={{paddingLeft:28}} onClick={() => setScreen(item.id)}>
                <span className="tree-toggle-placeholder"></span>
                <i className={"ti " + item.icon} style={{fontSize:14}}></i>
                <span>{item.label}</span>
              </div>
            );
          }
          return (
            <div key={item.id} className={"tree-item " + (screen===item.id?'active':'')} style={{paddingLeft:8}} onClick={() => setScreen(item.id)}>
              <span className="tree-toggle-placeholder"></span>
              <i className={"ti " + item.icon} style={{fontSize:14}}></i>
              <span>{item.label}</span>
            </div>
          );
        })}
      </nav>
      <div className="sidebar-footer">
        <button className="footer-link" onClick={() => push('휴지통이 비어 있습니다.')}><i className="ti ti-trash" style={{fontSize:14}}></i>휴지통</button>
        <button className="footer-link" onClick={() => push('설정 화면은 준비 중입니다.')}><i className="ti ti-settings" style={{fontSize:14}}></i>설정</button>
      </div>
    </aside>
  );
}

function Breadcrumb({ screen }){
  const parts = BREADCRUMB[screen] || [];
  return (
    <div className="page-breadcrumb">
      {parts.map((p, i) => (
        <React.Fragment key={p}>
          {i > 0 && <span className="sep">›</span>}
          <span>{p}</span>
        </React.Fragment>
      ))}
    </div>
  );
}

function Toggle({ title, badge, children, defaultOpen }){
  const [open, setOpen] = useState(!!defaultOpen);
  return (
    <div className="block block-toggle" data-block-type="toggle">
      <div className="toggle-summary-row" onClick={() => setOpen(o => !o)}>
        <button className={"toggle-arrow " + (open ? 'open' : '')} onClick={(e) => { e.stopPropagation(); setOpen(o => !o); }}>▸</button>
        <strong style={{fontSize:14}}>{title}</strong>
        {badge}
      </div>
      {open && <div className="toggle-content">{children}</div>}
    </div>
  );
}

function DashboardScreen({ push }){
  const stats = [
    { label:'초안', value:12, icon:'ti-file-pencil' },
    { label:'검수대기', value:5, icon:'ti-clock-hour-4' },
    { label:'발행', value:84, icon:'ti-circle-check' },
  ];
  const langs = [
    { code:'국문', pct:100 }, { code:'영문', pct:74 }, { code:'중문', pct:58 },
  ];
  const activity = [
    { text:'김민수 — "2026 하반기 채용 공고" 발행 완료', time:'12분 전' },
    { text:'이지은 — "동남권 광역대교 준공" 영문 초안 승인', time:'41분 전' },
    { text:'박서준 — "스마트 산업단지 리포트" 국문 게시글 작성', time:'2시간 전' },
    { text:'최유나 — "연약지반 보강 공법" 중문 번역 검수중으로 전환', time:'5시간 전' },
  ];
  return (
    <div className="page-body">
      <h1 className="page-title">콘텐츠 관리 대시보드</h1>
      <p style={{fontSize:14.5,color:'var(--felt)',margin:'0 0 8px',lineHeight:1.7}}><span className="live-dot"></span>실시간 동기화 · 초안·검수·발행 파이프라인과 언어별 번역 진행률을 한 화면에서 확인합니다.</p>

      <svg className="pipeline-art" viewBox="0 0 640 90" fill="none">
        <line x1="60" y1="45" x2="290" y2="45" stroke="#000000" strokeWidth="1" strokeDasharray="2 6" />
        <line x1="350" y1="45" x2="580" y2="45" stroke="#000000" strokeWidth="1" strokeDasharray="2 6" />
        <line x1="290" y1="45" x2="350" y2="45" stroke="var(--oxblood)" strokeWidth="1.5" />
        <circle cx="60" cy="45" r="26" fill="none" stroke="#000000" strokeWidth="1.5" />
        <circle cx="320" cy="45" r="30" fill="var(--oxblood)" opacity="0.08" stroke="var(--oxblood)" strokeWidth="1.5" />
        <circle cx="580" cy="45" r="26" fill="none" stroke="#000000" strokeWidth="1.5" />
        <text x="60" y="49" textAnchor="middle" fontSize="12" fontWeight="700" fill="#000000">국문</text>
        <text x="320" y="49" textAnchor="middle" fontSize="12" fontWeight="700" fill="var(--oxblood)">AI 번역</text>
        <text x="580" y="49" textAnchor="middle" fontSize="12" fontWeight="700" fill="#000000">발행</text>
      </svg>

      <div className="stat-row">
        {stats.map(s => (
          <div className="stat-box" key={s.label}>
            <div className="stat-label"><i className={"ti " + s.icon} style={{fontSize:14}}></i>{s.label}</div>
            <div className="stat-value">{s.value}</div>
            <div className="stat-bar-track"><div className="stat-bar-fill" style={{width:Math.min(100, s.value * 1.1) + '%'}}></div></div>
          </div>
        ))}
      </div>

      <div className="donut-row">
        {langs.map(l => (
          <div className="donut-box" key={l.code}>
            <div className="donut" style={{background:`conic-gradient(var(--oxblood) ${l.pct * 3.6}deg, #eee 0deg)`}}>
              <span>{l.pct}%</span>
            </div>
            <div className="donut-label">{l.code} 번역 완료율</div>
          </div>
        ))}
      </div>

      <div className="block block-callout" data-block-type="callout">
        <i className="ti ti-bulb"></i>
        <p>중문 번역 완료율이 가장 낮습니다 — 번역 검수 워크플로우에서 대기 중인 항목을 우선 처리하는 것을 권장합니다.</p>
      </div>

      <h3 style={{fontSize:16,margin:'28px 0 4px'}}>최근 활동</h3>
      <div>
        {activity.map((a, i) => (
          <div className="timeline-item" key={i}>
            <span className="timeline-dot"></span>
            <span>{a.text}</span>
            <span className="timeline-time">{a.time}</span>
          </div>
        ))}
      </div>

      <div style={{marginTop:28}}>
        <button className="btn btn-solid" onClick={() => push('게시글 에디터로 이동합니다.')}><i className="ti ti-pencil-plus" style={{fontSize:15}}></i>새 게시글 작성</button>
      </div>
    </div>
  );
}

function EditorScreen({ push }){
  const [title, setTitle] = useState('연약지반 보강 공법 현장 리포트');
  const [tags, setTags] = useState(['특허공법', '토목', '현장리포트']);

  const [dragOver, setDragOver] = useState(false);
  const [image, setImage] = useState(null);

  const addTag = (e) => {
    if (e.key === 'Enter' && tagInput.trim()) {
      setTags(t => [...t, tagInput.trim()]);
      setTagInput('');
    }
  };
  const removeTag = (t) => setTags(tags.filter(x => x !== t));

  const onDrop = (e) => {
    e.preventDefault(); setDragOver(false);
    const f = e.dataTransfer.files && e.dataTransfer.files[0];
    if (f) setImage(URL.createObjectURL(f));
    else setImage('https://picsum.photos/seed/cms-editor-drop/640/360');
  };

  return (
    <div>
      <div className="page-icon-row" style={{maxWidth:840,margin:'0 auto',padding:'24px 40px 0'}}>
        <div className="page-icon-large"><i className="ti ti-article" style={{fontSize:24}}></i></div>
        <div className="page-meta">
          <button className="meta-action" onClick={() => push('커버 이미지가 추가되었습니다.')}><i className="ti ti-photo" style={{fontSize:13}}></i>커버 추가</button>
          <button className="meta-action" onClick={() => push('댓글 패널은 준비 중입니다.')}><i className="ti ti-message-circle" style={{fontSize:13}}></i>댓글</button>
        </div>
      </div>
      <div className="page-body" style={{paddingTop:6}}>
        <input className="page-title-input" value={title} onChange={e => setTitle(e.target.value)} />

        <div className="tag-editor">
          {tags.map(t => (
            <span className="tag-chip" key={t}>#{t}<button onClick={() => removeTag(t)}><i className="ti ti-x" style={{fontSize:11}}></i></button></span>
          ))}
          <input className="tag-input" placeholder="+ 해시태그" value={tagInput} onChange={e => setTagInput(e.target.value)} onKeyDown={addTag} />
        </div>

        <div className="block-list">
          <div className="block block-heading" data-block-type="heading-2">
            <span className="block-handle">⋮⋮</span>
            <h2>공법 개요</h2>
          </div>
          <div className="block block-text" data-block-type="text">
            <span className="block-handle">⋮⋮</span>
            <p>본 현장은 연약지반 구간에 특허공법을 적용하여 침하량을 사전 계측 기준치 이내로 관리합니다. 시공 전 지반조사 결과와 보강 단계별 계측 데이터를 함께 기록합니다.</p>
          </div>

          <div
            className={"block block-image " + (dragOver ? 'drag' : '')}
            data-block-type="image"
            onDragOver={e => { e.preventDefault(); setDragOver(true); }}
            onDragLeave={() => setDragOver(false)}
            onDrop={onDrop}
            onClick={() => setImage('https://picsum.photos/seed/cms-editor-click/640/360')}
          >
            {!image && (<><i className="ti ti-cloud-upload" style={{fontSize:24,color:'var(--oxblood)'}}></i><p style={{fontSize:12.5,color:'var(--felt)',margin:'8px 0 0'}}>이미지를 이 영역으로 드래그하거나 클릭하여 삽입합니다.</p></>)}
            {image && <img src={image} alt="첨부 이미지" />}
          </div>

          <div className="block block-callout" data-block-type="callout">
            <i className="ti ti-alert-triangle"></i>
            <p>계측값이 관리기준치의 80%를 초과하면 즉시 현장 담당자에게 알림이 전송됩니다.</p>
          </div>

          <div className="block block-divider" data-block-type="divider"><hr /></div>

          <div className="block" data-block-type="list">
            <span className="block-handle">⋮⋮</span>
            <ul className="block-list-ul">
              <li>1단계 — 지반조사 및 계측기 설치</li>
              <li>2단계 — 보강재 시공 및 1차 계측</li>
              <li>3단계 — 침하 안정화 확인 및 준공 보고</li>
            </ul>
          </div>

          <div className="block block-table" data-block-type="table">
            <span className="block-handle">⋮⋮</span>
            <table>
              <thead><tr><th>구간</th><th>계획 침하량</th><th>실측 침하량</th></tr></thead>
              <tbody>
                <tr><td>A구간</td><td>28mm</td><td>24mm</td></tr>
                <tr><td>B구간</td><td>32mm</td><td>29mm</td></tr>
              </tbody>
            </table>
          </div>

          <Toggle title="시공 안전 체크리스트" badge={<span style={{fontSize:11,color:'var(--felt)'}}>8개 항목</span>}>
            <ul className="block-list-ul" style={{margin:0}}>
              <li>안전관리자 상주 여부 확인</li>
              <li>계측장비 캘리브레이션 이력 확인</li>
              <li>인접 구조물 균열 모니터링</li>
            </ul>
          </Toggle>
        </div>

        <div style={{display:'flex',gap:10,marginTop:28}}>
          <button className="btn btn-outline" onClick={() => push('임시 저장되었습니다.')}><i className="ti ti-device-floppy" style={{fontSize:15}}></i>임시 저장</button>
          <button className="btn btn-solid" onClick={() => push('번역 검수 워크플로우로 전송되었습니다.')}><i className="ti ti-send" style={{fontSize:15}}></i>번역 검수로 보내기</button>
        </div>
      </div>
    </div>
  );
}

function ReviewItem({ post, push }){
  const [status, setStatus] = useState(post.status);
  const [en, setEn] = useState(post.en || '');
  const [zh, setZh] = useState(post.zh || '');
  const [loading, setLoading] = useState(false);

  const runTranslate = () => {
    setLoading(true);
    setTimeout(() => {
      setEn('(EN draft) ' + post.ko.slice(0, 40) + '...');
      setZh('(中文 초안) ' + post.ko.slice(0, 40) + '...');
      setStatus('review');
      setLoading(false);
      push(post.title + ' 자동번역 초안이 생성되었습니다.');
    }, 1200);
  };
  const approve = (lang) => {
    setStatus('published');
    push(post.title + ' (' + lang + ') 발행 상태로 전환되었습니다.');
  };

  return (
    <div className="review-card">
      <div className="review-head">
        <h4>{post.title}</h4>
        <div className="lang-badges">
          <span className="lang-badge published">국문 발행</span>
          <span className={"lang-badge " + (status !== 'draft' ? (status === 'published' ? 'published' : 'review') : '')}>영문 {status === 'draft' ? '대기' : status === 'published' ? '발행' : '검수중'}</span>
          <span className={"lang-badge " + (status !== 'draft' ? (status === 'published' ? 'published' : 'review') : '')}>중문 {status === 'draft' ? '대기' : status === 'published' ? '발행' : '검수중'}</span>
        </div>
      </div>
      <div className="review-body">
        <div className="review-col">
          <label>국문 원문</label>
          <textarea readOnly value={post.ko}></textarea>
        </div>
        <div className="review-col">
          <label>영문 / 중문 초안</label>
          {status === 'draft' && (
            <button className="btn btn-outline btn-sm" onClick={runTranslate} disabled={loading}>
              {loading ? <i className="ti ti-loader-2" style={{fontSize:14,animation:'spin .8s linear infinite'}}></i> : <i className="ti ti-wand" style={{fontSize:14}}></i>}
              {loading ? '생성 중...' : 'AI 자동번역 생성'}
            </button>
          )}
          {status !== 'draft' && (
            <>
              <textarea value={en} onChange={e => setEn(e.target.value)} style={{marginBottom:8}}></textarea>
              <textarea value={zh} onChange={e => setZh(e.target.value)}></textarea>
              <div className="review-actions">
                <button className="btn btn-accent btn-sm" onClick={() => approve('영문')} disabled={status==='published'}><i className="ti ti-check" style={{fontSize:13}}></i>영문 승인</button>
                <button className="btn btn-accent btn-sm" onClick={() => approve('중문')} disabled={status==='published'}><i className="ti ti-check" style={{fontSize:13}}></i>중문 승인</button>
              </div>
            </>
          )}
        </div>
      </div>
    </div>
  );
}

  const posts = [
    { id:1, title:'연약지반 보강 공법 현장 리포트', ko:'본 현장은 연약지반 구간에 특허공법을 적용하여 침하량을 관리 기준치 이내로 유지합니다.', status:'draft' },
    { id:2, title:'동남권 광역대교 3공구 준공 소식', ko:'동남권 광역대교 3공구가 무재해 준공을 달성했습니다. 안전관리 체계와 시공 과정을 소개합니다.', status:'draft' },
    { id:3, title:'2026 하반기 채용 공고 안내', ko:'현장관리·설계·안전관리 직군을 중심으로 2026년 하반기 채용을 진행합니다.', status:'draft' },

  return (

      <h1 className="page-title">번역 검수 워크플로우</h1>

function ApplicantsScreen({ push }){
  const jobs = ['전체', '현장관리 담당자', '구조 설계 엔지니어', '안전관리자'];
  const [jobFilter, setJobFilter] = useState('전체');
  const [applicants, setApplicants] = useState([
    { id:1, name:'김도윤', job:'현장관리 담당자', stage:'서류', file:'resume_kim.pdf', open:false, log:['2026.07.14 지원서 접수'] },
    { id:2, name:'이서연', job:'구조 설계 엔지니어', stage:'면접', file:'resume_lee.pdf', open:false, log:['2026.07.10 지원서 접수', '2026.07.15 서류 통과'] },
    { id:3, name:'박지훈', job:'안전관리자', stage:'합격', file:'resume_park.pdf', open:false, log:['2026.07.02 지원서 접수', '2026.07.06 서류 통과', '2026.07.12 최종 합격'] },
    { id:4, name:'최하윤', job:'현장관리 담당자', stage:'서류', file:'resume_choi.pdf', open:false, log:['2026.07.17 지원서 접수'] },
  ]);

  const filtered = applicants.filter(a => jobFilter === '전체' || a.job === jobFilter);
  const toggleOpen = (id) => setApplicants(as => as.map(a => a.id === id ? { ...a, open: !a.open } : a));
  const changeStage = (id, stage) => {
    setApplicants(as => as.map(a => a.id === id ? { ...a, stage, log:[...a.log, new Date().toLocaleDateString('ko-KR') + ' ' + stage + '(으)로 변경'] } : a));
    push('단계가 ' + stage + '(으)로 변경되었습니다.');
  };

  return (
    <div className="page-body">
      <h1 className="page-title">지원자 관리</h1>
      <div className="filter-row">
        {jobs.map(j => (
          <button key={j} className={"pill-filter " + (jobFilter===j?'active':'')} onClick={() => setJobFilter(j)}>{j}</button>
        ))}
      </div>
      <div>
        {filtered.map(a => (
          <div className="app-row" key={a.id}>
            <div className="app-row-head" onClick={() => toggleOpen(a.id)}>
              <div className="app-avatar">{a.name.slice(0,1)}</div>
              <div>
                <div className="app-name">{a.name}</div>
                <div className="app-sub">{a.job} · {a.file}</div>
              </div>
              <span className="stage-badge">{a.stage}</span>
              <i className={"ti " + (a.open ? 'ti-chevron-up' : 'ti-chevron-down')} style={{fontSize:15,color:'var(--felt)'}}></i>
            </div>
            {a.open && (
              <div className="app-detail">
                <div className="pdf-box"><i className="ti ti-file-type-pdf" style={{fontSize:26}}></i>{a.file}<span>다운로드 없이 인라인 미리보기</span></div>
                <div>
                  <div className="stage-btns">
                    {['서류','면접','합격','불합격'].map(s => (
                      <button key={s} className={"btn btn-sm " + (a.stage===s ? 'btn-accent' : 'btn-outline')} onClick={() => changeStage(a.id, s)}>{s}</button>
                    ))}
                  </div>
                  <div className="audit-log">
                    {a.log.map((l, i) => <div key={i}><i className="ti ti-point" style={{fontSize:10}}></i> {l}</div>)}
                  </div>
                </div>
              </div>
            )}
          </div>
        ))}
      </div>
    </div>
  );
}

function App(){
  const [screen, setScreen] = useState('main');
  const { toasts, push } = useToasts();

  return (
    <div className="shell" data-archetype="notion-blocks-tree" style={{width:'100%'}}>
      <Sidebar screen={screen} setScreen={setScreen} push={push} />
      <main className="main-wrap">
        <Breadcrumb screen={screen} />
        {screen === 'main' && <DashboardScreen push={push} />}
        {screen === 'editor' && <EditorScreen push={push} />}
        {screen === 'translation-review' && <TranslationReviewScreen push={push} />}
        {screen === 'applicants' && <ApplicantsScreen push={push} />}
      </main>
      <ToastHost toasts={toasts} />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
