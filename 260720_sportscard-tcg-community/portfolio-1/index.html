<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>카드아카이브 — 콜렉터 커뮤니티</title>
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<style>
  :root {
    --ink: #171717;
    --ink-strong: #0a0a0a;
    --ink-soft: #262626;
    --muted: #737373;
    --silver: #a3a3a3;
    --border: #e5e5e5;
    --border-strong: #d4d4d4;
    --canvas: #ffffff;
    --paper: #f5f5f5;
    --accent: #2563eb;
    --accent-deep: #1e40af;
    --mint: #dcfce7;
    --mint-ink: #16a34a;
    --tangerine: #ea580c;
    --tangerine-bg: #ffedd5;
    --lavender: #7c3aed;
    --lavender-bg: #ede9fe;
    --blue-bg: #dbeafe;
  }
  * { box-sizing: border-box; }
  html, body { width: 100%; margin: 0; padding: 0; }
  body {
    font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, sans-serif;
    background: var(--canvas);
    color: var(--ink);
    -webkit-font-smoothing: antialiased;
    width: 100%;
  }
  #app-root { width: 100%; }
  button { font-family: inherit; cursor: pointer; }
  input, select, textarea { font-family: inherit; }
  a { text-decoration: none; color: inherit; }
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 999px; }

  @keyframes fadeInUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes heartPop { 0% { transform: scale(1); } 45% { transform: scale(1.4); } 100% { transform: scale(1); } }
  @keyframes toastSlide { from { opacity: 0; transform: translateY(14px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes modalPop { from { opacity: 0; transform: scale(0.97); } to { opacity: 1; transform: scale(1); } }
  @keyframes skeletonShine { 0% { background-position: -200px 0; } 100% { background-position: 200px 0; } }
  @keyframes ringPulse { 0%,100% { box-shadow: 0 0 0 0 rgba(37,99,235,0.35); } 50% { box-shadow: 0 0 0 5px rgba(37,99,235,0); } }

  .topbar { position: sticky; top: 0; z-index: 50; background: rgba(255,255,255,0.92); backdrop-filter: blur(14px); border-bottom: 1px solid var(--border); }
  .topbar-inner { max-width: 1200px; margin: 0 auto; display: flex; align-items: center; height: 60px; padding: 0 24px; gap: 20px; }
  .brand { display: flex; align-items: center; gap: 8px; font-size: 18px; font-weight: 500; letter-spacing: -0.02em; color: var(--ink); flex-shrink: 0; }
  .brand-mark { width: 28px; height: 28px; border-radius: 8px; background: var(--ink-strong); display: flex; align-items: center; justify-content: center; color: #fff; }
  .top-search { flex: 1; max-width: 360px; position: relative; }
  .top-search input { width: 100%; border: 1px solid var(--ink-strong); border-radius: 6px; padding: 8px 12px 8px 34px; font-size: 13px; outline: none; background: var(--canvas); }
  .top-search svg { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); color: var(--muted); }
  .global-nav { display: flex; align-items: center; gap: 4px; flex-shrink: 0; }
  .nav-btn { border: none; background: transparent; padding: 8px 12px; border-radius: 8px; font-size: 13px; color: var(--ink-soft); font-weight: 500; display: flex; align-items: center; gap: 6px; white-space: nowrap; }
  .nav-btn:hover { background: var(--paper); color: var(--ink); }
  .nav-btn.active { background: var(--ink-strong); color: #fff; }
  .header-actions { display: flex; align-items: center; gap: 8px; flex-shrink: 0; margin-left: 4px; }
  .icon-btn { border: 1px solid var(--border); background: var(--canvas); width: 34px; height: 34px; border-radius: 999px; display: flex; align-items: center; justify-content: center; color: var(--ink); position: relative; }
  .icon-btn:hover { background: var(--paper); }
  .avatar-btn { border: none; padding: 0; background: none; border-radius: 999px; overflow: hidden; width: 34px; height: 34px; }
  .avatar-btn img { width: 100%; height: 100%; display: block; }
  .notif-dot { position: absolute; top: -1px; right: -1px; width: 8px; height: 8px; border-radius: 999px; background: var(--accent); border: 2px solid #fff; }

  .layout-wrap { max-width: 1200px; margin: 0 auto; display: flex; justify-content: center; gap: 24px; padding: 24px; align-items: flex-start; width: 100%; }
  .feed-main { max-width: 620px; width: 100%; flex: 1; min-width: 0; }
  .right-rail { width: 288px; flex-shrink: 0; position: sticky; top: 84px; display: flex; flex-direction: column; gap: 12px; }

  .composer { position: sticky; top: 60px; z-index: 20; background: rgba(255,255,255,0.96); backdrop-filter: blur(10px); padding: 12px 0 10px; border-bottom: 1px solid var(--border); margin-bottom: 12px; }
  .composer-row { display: flex; align-items: center; gap: 8px; }
  .chip-scroll { display: flex; gap: 6px; overflow-x: auto; flex: 1; padding-bottom: 2px; }
  .filter-chip { border: 1px solid var(--border); background: var(--canvas); padding: 6px 12px; border-radius: 9999px; font-size: 12px; font-weight: 500; color: var(--ink-soft); white-space: nowrap; flex-shrink: 0; }
  .filter-chip.active { background: var(--ink-strong); color: #fff; border-color: var(--ink-strong); }
  .write-btn { flex-shrink: 0; border: none; background: var(--accent-deep); color: #fff; padding: 8px 14px; border-radius: 8px; font-size: 12px; font-weight: 600; display: flex; align-items: center; gap: 6px; }
  .write-btn:hover { background: #163278; }

  .post { background: #fff; border: 1px solid var(--border); border-radius: 12px; padding: 16px; margin-bottom: 10px; animation: fadeInUp 0.4s ease both; }
  .post-head { display: flex; align-items: center; gap: 9px; margin-bottom: 8px; }
  .post-head img { width: 32px; height: 32px; border-radius: 999px; }
  .author { font-size: 13px; font-weight: 600; color: var(--ink); }
  .board-tag { font-size: 10.5px; font-weight: 600; padding: 2px 8px; border-radius: 9999px; }
  .board-tag.free { background: var(--lavender-bg); color: var(--lavender); }
  .board-tag.showcase { background: var(--tangerine-bg); color: var(--tangerine); }
  .board-tag.question { background: var(--mint); color: var(--mint-ink); }
  .board-tag.info { background: var(--blue-bg); color: var(--accent); }
  .topic-tag { font-size: 10.5px; color: var(--muted); border: 1px solid var(--border); padding: 2px 8px; border-radius: 9999px; }
  .post-title { font-size: 15px; font-weight: 600; color: var(--ink); margin: 0 0 4px; cursor: pointer; }
  .post-body { font-size: 13.5px; line-height: 1.55; color: var(--ink-soft); cursor: pointer; margin: 0; }
  .post-body img { width: 100%; border-radius: 8px; margin-top: 10px; display: block; border: 1px solid var(--border); }
  .post-actions { display: flex; gap: 2px; margin-top: 10px; border-top: 1px solid var(--border); padding-top: 8px; }
  .action-btn { border: none; background: none; display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--muted); padding: 6px 10px; border-radius: 8px; }
  .action-btn:hover { background: var(--paper); }
  .action-btn.liked { color: var(--accent); }
  .action-btn.liked svg { animation: heartPop 0.35s ease; }

  .rail-card { background: var(--paper); border-radius: 12px; padding: 14px; border: 1px solid var(--border); }
  .rail-title { font-size: 12.5px; font-weight: 600; color: var(--ink); margin: 0 0 10px; display: flex; align-items: center; gap: 6px; }
  .rail-item { display: flex; align-items: center; gap: 8px; width: 100%; border: none; background: none; text-align: left; padding: 6px 0; font-size: 12.5px; color: var(--ink); border-bottom: 1px solid var(--border); }
  .rail-item:last-child { border-bottom: none; }
  .rail-rank { font-size: 11px; font-weight: 700; color: var(--accent); width: 14px; flex-shrink: 0; }
  .rail-item .txt { flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .rail-item .cnt { font-size: 10.5px; color: var(--muted); flex-shrink: 0; }
  .pinned-card { background: linear-gradient(135deg, var(--ink-strong) 0%, #262626 60%, #1a2b4d 130%); border-radius: 12px; padding: 14px; color: #fff; position: relative; overflow: hidden; }
  .pinned-card::after { content: ''; position: absolute; right: -30px; top: -30px; width: 110px; height: 110px; border-radius: 999px; background: radial-gradient(circle, rgba(37,99,235,0.45), transparent 70%); pointer-events: none; }
  .pinned-card h4 { margin: 0 0 6px; font-size: 13px; display: flex; align-items: center; gap: 6px; }
  .pinned-card p { margin: 0; font-size: 11.5px; color: rgba(255,255,255,0.7); line-height: 1.5; }

  .view-fade { animation: fadeInUp 0.35s ease both; }

  /* onboarding */
  .onboard-wrap { max-width: 480px; margin: 40px auto; padding: 0 24px; position: relative; }
  .onboard-wrap::before { content: ''; position: absolute; left: 50%; top: -60px; width: 360px; height: 260px; transform: translateX(-50%); background: radial-gradient(ellipse at center, rgba(37,99,235,0.12), transparent 70%); pointer-events: none; z-index: 0; }
  .onboard-card { border: 1px solid var(--border); border-radius: 16px; padding: 32px 28px; position: relative; z-index: 1; background: #fff; }
  .onboard-step-label { font-size: 11px; font-weight: 600; color: var(--accent); text-transform: uppercase; letter-spacing: 0.04em; margin-bottom: 8px; }
  .onboard-title { font-size: 32px; font-weight: 500; letter-spacing: -0.015em; margin: 0 0 6px; line-height: 1.15; }
  .onboard-desc { font-size: 13.5px; color: var(--muted); margin: 0 0 24px; line-height: 1.5; }
  .social-btn { width: 100%; display: flex; align-items: center; gap: 10px; padding: 12px 16px; border-radius: 8px; border: 1px solid var(--border); background: #fff; font-size: 14px; font-weight: 500; margin-bottom: 10px; color: var(--ink); }
  .social-btn:hover { background: var(--paper); }
  .social-btn .dot { width: 20px; height: 20px; border-radius: 6px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 700; color: #fff; }
  .social-btn.kakao .dot { background: #fddc3f; color: #191919; }
  .social-btn.naver .dot { background: #03c75a; }
  .social-btn.google .dot { background: #4285f4; }
  .interest-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; margin-bottom: 20px; }
  .interest-tile { border: 1px solid var(--border); border-radius: 10px; padding: 14px 12px; text-align: left; background: #fff; font-size: 13px; font-weight: 600; color: var(--ink); display: flex; align-items: center; justify-content: space-between; }
  .interest-tile.on { border-color: var(--ink-strong); background: var(--paper); }
  .interest-tile.on svg { color: var(--accent); }
  .onboard-cta { width: 100%; border: none; background: var(--ink-strong); color: #fff; padding: 12px; border-radius: 8px; font-size: 14px; font-weight: 600; }
  .onboard-cta:disabled { background: var(--silver); cursor: not-allowed; }
  .persisted-note { display: flex; align-items: center; gap: 6px; font-size: 11.5px; color: var(--muted); margin-top: 14px; justify-content: center; }
  .persisted-note .live-dot { width: 6px; height: 6px; border-radius: 999px; background: var(--accent); animation: ringPulse 1.8s infinite; }

  /* board */
  .board-wrap { max-width: 900px; margin: 0 auto; padding: 24px; }
  .board-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; flex-wrap: wrap; gap: 12px; }
  .board-head h2 { font-size: 32px; font-weight: 500; margin: 0; letter-spacing: -0.015em; line-height: 1.15; }
  .kind-tabs { display: flex; gap: 4px; border-bottom: 1px solid var(--border); margin-bottom: 14px; }
  .kind-tab { border: none; background: none; padding: 10px 4px; margin-right: 20px; font-size: 13.5px; font-weight: 500; color: var(--muted); border-bottom: 2px solid transparent; }
  .kind-tab.active { color: var(--ink); border-color: var(--ink-strong); font-weight: 600; }
  .board-toolbar { display: flex; align-items: center; gap: 8px; margin-bottom: 14px; flex-wrap: wrap; }
  .board-search { flex: 1; min-width: 180px; position: relative; }
  .board-search input { width: 100%; border: 1px solid var(--border); border-radius: 6px; padding: 8px 12px 8px 32px; font-size: 13px; outline: none; }
  .board-search svg { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); color: var(--muted); }
  .board-list { border: 1px solid var(--border); border-radius: 12px; overflow: hidden; }
  .board-row { display: flex; align-items: center; gap: 10px; padding: 12px 16px; border-bottom: 1px solid var(--border); background: #fff; }
  .board-row:last-child { border-bottom: none; }
  .board-row:hover { background: var(--paper); }
  .board-row .row-title { flex: 1; min-width: 0; font-size: 13.5px; color: var(--ink); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; cursor: pointer; }
  .board-row .row-meta { font-size: 11.5px; color: var(--muted); display: flex; align-items: center; gap: 4px; flex-shrink: 0; }
  .showcase-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(210px, 1fr)); gap: 12px; }
  .showcase-card { border: 1px solid var(--border); border-radius: 12px; overflow: hidden; background: #fff; cursor: pointer; }
  .showcase-card img { width: 100%; aspect-ratio: 4/3; object-fit: cover; display: block; }
  .showcase-card .sc-body { padding: 10px 12px; }
  .showcase-card .sc-title { font-size: 13px; font-weight: 600; margin: 0 0 4px; }
  .showcase-card .sc-meta { font-size: 11px; color: var(--muted); }

  /* market */
  .market-wrap { max-width: 1000px; margin: 0 auto; padding: 24px; }
  .market-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; flex-wrap: wrap; gap: 12px; }
  .market-head h2 { font-size: 32px; font-weight: 500; margin: 0; letter-spacing: -0.015em; line-height: 1.15; }
  .market-toolbar { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
  .market-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 14px; }
  .listing-card { border: 1px solid var(--border); border-radius: 12px; overflow: hidden; background: #fff; cursor: pointer; transition: box-shadow 0.15s, transform 0.15s; }
  .listing-card:hover { box-shadow: 0 4px 14px rgba(0,0,0,0.08); transform: translateY(-2px); }
  .listing-card .lc-img-wrap { position: relative; }
  .listing-card img { width: 100%; aspect-ratio: 4/3; object-fit: cover; display: block; }
  .status-badge { position: absolute; top: 8px; left: 8px; font-size: 10.5px; font-weight: 700; padding: 3px 9px; border-radius: 9999px; color: #fff; }
  .status-badge.selling { background: var(--accent-deep); }
  .status-badge.reserved { background: var(--tangerine); }
  .status-badge.done { background: var(--silver); }
  .kind-badge { position: absolute; top: 8px; right: 8px; font-size: 10.5px; font-weight: 700; padding: 3px 9px; border-radius: 9999px; background: rgba(255,255,255,0.92); color: var(--ink); }
  .lc-body { padding: 12px; }
  .lc-title { font-size: 13px; font-weight: 600; margin: 0 0 6px; line-height: 1.35; }
  .lc-price { font-size: 15px; font-weight: 700; color: var(--ink); }
  .lc-meta { font-size: 11px; color: var(--muted); margin-top: 4px; }

  /* modal */
  .modal-overlay { position: fixed; inset: 0; background: rgba(10,10,10,0.45); display: flex; align-items: center; justify-content: center; z-index: 100; padding: 20px; }
  .modal-box { background: #fff; border-radius: 16px; width: 100%; max-width: 520px; max-height: 86vh; overflow-y: auto; padding: 24px; animation: modalPop 0.18s ease; }
  .modal-box.wide { max-width: 620px; }
  .modal-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
  .modal-head h3 { margin: 0; font-size: 18px; font-weight: 600; }
  .modal-close { border: none; background: var(--paper); width: 30px; height: 30px; border-radius: 999px; display: flex; align-items: center; justify-content: center; }
  .form-group { margin-bottom: 14px; }
  .form-label { font-size: 12.5px; font-weight: 600; color: var(--ink-soft); margin-bottom: 6px; display: block; }
  .form-row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .form-input, .form-select, .form-textarea { width: 100%; border: 1px solid var(--ink-strong); border-radius: 6px; padding: 9px 12px; font-size: 13.5px; outline: none; background: #fff; }
  .form-textarea { resize: vertical; min-height: 90px; }
  .dropzone { border: 1.5px dashed var(--border-strong); border-radius: 10px; padding: 20px; text-align: center; color: var(--muted); font-size: 12.5px; }
  .modal-submit { width: 100%; border: none; background: var(--ink-strong); color: #fff; padding: 11px; border-radius: 8px; font-size: 14px; font-weight: 600; margin-top: 6px; }
  .status-flow { display: flex; align-items: center; gap: 6px; margin: 6px 0 16px; flex-wrap: wrap; }
  .status-step { font-size: 12px; padding: 6px 10px; border-radius: 9999px; border: 1px solid var(--border); color: var(--muted); }
  .status-step.current { border-color: var(--ink-strong); background: var(--ink-strong); color: #fff; font-weight: 600; }
  .status-step.done { border-color: var(--border); color: var(--silver); text-decoration: line-through; }
  .status-advance-btn { border: none; background: var(--accent-deep); color: #fff; padding: 9px 14px; border-radius: 8px; font-size: 12.5px; font-weight: 600; }
  .comment-item { padding: 10px 0; border-bottom: 1px solid var(--border); font-size: 13px; }
  .comment-item.reply { margin-left: 20px; border-left: 2px solid var(--border); padding-left: 12px; }
  .comment-author { font-weight: 600; font-size: 12.5px; margin-right: 6px; }
  .report-note { font-size: 12px; color: var(--muted); background: var(--paper); padding: 10px 12px; border-radius: 8px; margin-bottom: 14px; }

  .toast-stack { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); z-index: 200; display: flex; flex-direction: column; gap: 8px; align-items: center; }
  .toast { background: var(--ink-strong); color: #fff; padding: 11px 18px; border-radius: 9999px; font-size: 12.5px; font-weight: 500; display: flex; align-items: center; gap: 8px; animation: toastSlide 0.25s ease; box-shadow: 0 8px 24px rgba(0,0,0,0.18); }

  @media (max-width: 880px) {
    .right-rail { display: none; }
    .layout-wrap { padding: 16px; }
    .top-search { display: none; }
  }
</style>
</head>

<div id="app-root"></div>
<script type="text/babel">
const { useState, useEffect, useRef } = React;

const AVATAR = (seed) => `https://source.boringavatars.com/marble/64/${encodeURIComponent(seed)}`;
const PIC = (seed, w, h) => `https://picsum.photos/seed/card-archive-${seed}/${w}/${h}`;

const TOPICS = ['스포츠카드', '원피스', '포켓몬', '기타'];

  { key: 'free', label: '자유', cls: 'free' },

    { author: '지우', text: '레인보우 각도 실화입니까 부럽습니다', reply: false },
    { author: '민카드', text: '@지우 감사합니다 3개월 찾아다녔어요', reply: true },

  { id: 2, kind: 'free', topic: '스포츠카드', author: '루키헌터', time: '5시간 전', title: '국내 스포츠카드 시장 요즘 어떤가요', body: '요즘 국내 커뮤니티 활동이 예전만 못한 느낌인데 다들 어떠신가요.', likes: 8, comments: [
    { author: '베이스볼킹', text: '오히려 직거래 쪽은 활발한 편이에요', reply: false },

    { author: '콜렉터노트', text: '장마철엔 제습제랑 같이 탑로더 추천드려요', reply: false },

function useToast() {
  const [toasts, setToasts] = useState([]);
  const push = (msg) => {
    const id = Math.random().toString(36).slice(2);
    setToasts(t => [...t, { id, msg }]);
    setTimeout(() => setToasts(t => t.filter(x => x.id !== id)), 2400);
  };
  return { toasts, push };
}

function Toast({ toasts }) {
  return (
    <div className="toast-stack">
      {toasts.map(t => (
        <div className="toast" key={t.id}>
          <i data-lucide="check-circle-2" style={{width:14,height:14}}></i>{t.msg}
        </div>
      ))}
    </div>
  );
}

            </div>
            <button className="onboard-cta" disabled={interests.length === 0} onClick={applyInterests}>적용하기</button>
            <div className="persisted-note"><span className="live-dot"></span>선택한 관심사는 로컬 스토리지에 저장되어 유지됩니다</div>
          </React.Fragment>
        )}
      </div>
    </div>
  );
}

function BoardView({ posts, activeKind, setActiveKind, activeTopic, setActiveTopic, query, setQuery, openWrite, openDetail, openReport }) {
  const filtered = posts.filter(p =>
    p.kind === activeKind &&
    (activeTopic === '전체' || p.topic === activeTopic) &&
    (query.trim() === '' || (p.title + p.body).toLowerCase().includes(query.toLowerCase()))
  );
  const km = kindMeta(activeKind);
  return (
    <div className="board-wrap view-fade">
      <div className="board-head">
        <h2>이중 말머리 게시판</h2>
        <button className="write-btn" onClick={openWrite}><i data-lucide="pencil-line" style={{width:13,height:13}}></i>글쓰기</button>
      </div>
      <div className="kind-tabs">
        {BOARD_KINDS.map(k => (
          <button key={k.key} className={`kind-tab ${activeKind === k.key ? 'active' : ''}`} onClick={() => setActiveKind(k.key)}>{k.label}</button>
        ))}
      </div>
      <div className="board-toolbar">
        <div className="chip-scroll" style={{flex:'0 0 auto'}}>
          {['전체', ...TOPICS].map(t => (
            <button key={t} className={`filter-chip ${activeTopic === t ? 'active' : ''}`} onClick={() => setActiveTopic(t)}>{t}</button>
          ))}
        </div>
        <div className="board-search">
          <i data-lucide="search" style={{width:14,height:14}}></i>
          <input placeholder="제목·본문 키워드 검색" value={query} onChange={e => setQuery(e.target.value)} />
        </div>
      </div>
      {activeKind === 'showcase' ? (
        <div className="showcase-grid">
          {filtered.map(p => (
            <div className="showcase-card" key={p.id} onClick={() => openDetail(p)}>
              <img src={PIC('board-' + p.id, 300, 225)} alt="" />
              <div className="sc-body">
                <div className="sc-title">{p.title}</div>
                <div className="sc-meta">{p.author} · {p.time} · 댓글 {p.comments.length}</div>
              </div>
            </div>
          ))}
        </div>
      ) : (
        <div className="board-list">
          {filtered.map(p => (
            <div className="board-row" key={p.id}>
              <span className={`board-tag ${km.cls}`}>{km.label}</span>
              <span className="row-title" onClick={() => openDetail(p)}>{p.title}</span>
              <span className="row-meta"><i data-lucide="message-circle" style={{width:11,height:11}}></i>{p.comments.length}</span>
              <span className="row-meta">{p.time}</span>
              <button className="icon-btn" style={{width:26,height:26}} onClick={() => openReport(p)} title="신고"><i data-lucide="flag" style={{width:11,height:11}}></i></button>
            </div>
          ))}
        </div>
      )}
      {filtered.length === 0 && <div style={{textAlign:'center',color:'var(--muted)',fontSize:13,padding:'40px 0'}}>조건에 맞는 게시글이 없습니다.</div>}
    </div>
  );
}

function MarketView({ items, activeKind, setActiveKind, activeTopic, setActiveTopic, activeStatus, setActiveStatus, openWrite, openDetail }) {
  const filtered = items.filter(m =>
    (activeKind === '전체' || m.kind === activeKind) &&
    (activeTopic === '전체' || m.topic === activeTopic) &&
    (activeStatus === '전체' || STATUS_LABEL[m.status] === activeStatus)
  );
  return (
    <div className="market-wrap view-fade">
      <div className="market-head">
        <h2>직거래 장터</h2>
        <button className="write-btn" onClick={openWrite}><i data-lucide="tag" style={{width:13,height:13}}></i>장터 등록</button>
      </div>
      <div className="market-toolbar">
        {['전체', '팝니다', '삽니다'].map(k => (
          <button key={k} className={`filter-chip ${activeKind === k ? 'active' : ''}`} onClick={() => setActiveKind(k)}>{k}</button>
        ))}
        <span style={{width:1,background:'var(--border)',margin:'0 4px'}}></span>
        {['전체', ...TOPICS].map(t => (
          <button key={t} className={`filter-chip ${activeTopic === t ? 'active' : ''}`} onClick={() => setActiveTopic(t)}>{t}</button>
        ))}
        <span style={{width:1,background:'var(--border)',margin:'0 4px'}}></span>
        {['전체', '판매중', '예약중', '거래완료'].map(s => (
          <button key={s} className={`filter-chip ${activeStatus === s ? 'active' : ''}`} onClick={() => setActiveStatus(s)}>{s}</button>
        ))}
      </div>
      <div className="market-grid">
        {filtered.map(m => (
          <div className="listing-card" key={m.id} onClick={() => openDetail(m)}>
            <div className="lc-img-wrap">
              <img src={PIC('market-' + m.id, 320, 240)} alt="" />
              <span className={`status-badge ${m.status}`}>{STATUS_LABEL[m.status]}</span>
              <span className="kind-badge">{m.kind}</span>
            </div>
            <div className="lc-body">
              <p className="lc-title">{m.title}</p>
              <div className="lc-price">{m.price}</div>
              <div className="lc-meta">{m.topic} · {m.time}</div>
            </div>
          </div>
        ))}
      </div>
      {filtered.length === 0 && <div style={{textAlign:'center',color:'var(--muted)',fontSize:13,padding:'40px 0'}}>조건에 맞는 매물이 없습니다.</div>}
    </div>
  );
}

function App() {
  const [view, setView] = useState('home');
  const [posts, setPosts] = useState(POSTS_SEED);
  const [market, setMarket] = useState(MARKET_SEED);
  const [likedMap, setLikedMap] = useState({});
  const [homeTopic, setHomeTopic] = useState('전체');
  const [boardKind, setBoardKind] = useState('free');
  const [boardTopic, setBoardTopic] = useState('전체');
  const [boardQuery, setBoardQuery] = useState('');
  const [marketKind, setMarketKind] = useState('전체');
  const [marketTopic, setMarketTopic] = useState('전체');
  const [marketStatus, setMarketStatus] = useState('전체');
  const [loggedIn, setLoggedIn] = useState(false);
  const [interests, setInterests] = useState([]);
  const [writeOpen, setWriteOpen] = useState(false);
  const [marketWriteOpen, setMarketWriteOpen] = useState(false);
  const [detailPost, setDetailPost] = useState(null);
  const [reportPost, setReportPost] = useState(null);
  const [detailMarket, setDetailMarket] = useState(null);
  const { toasts, push } = useToast();

  useEffect(() => { lucide.createIcons(); });

  const toggleLike = (id) => setLikedMap(m => ({ ...m, [id]: !m[id] }));
  const addPost = (p) => setPosts(list => [{ id: Date.now(), kind: p.kind, topic: p.topic, author: '나', time: '방금', title: p.title, body: p.body, likes: 0, comments: [] }, ...list]);
  const addMarket = (m) => setMarket(list => [{ id: Date.now(), ...m }, ...list]);
  const advanceStatus = (id) => {
    setMarket(list => list.map(m => {
      if (m.id !== id) return m;
      const idx = STATUS_ORDER.indexOf(m.status);
      const next = STATUS_ORDER[Math.min(idx + 1, STATUS_ORDER.length - 1)];
      return { ...m, status: next };
    }));
    setDetailMarket(cur => {
      if (!cur || cur.id !== id) return cur;
      const idx = STATUS_ORDER.indexOf(cur.status);
      const next = STATUS_ORDER[Math.min(idx + 1, STATUS_ORDER.length - 1)];
      return { ...cur, status: next };
    });
    push('거래 상태가 변경되었습니다');
  };
  const toggleInterest = (t) => setInterests(cur => cur.includes(t) ? cur.filter(x => x !== t) : [...cur, t]);
  const applyInterests = () => { push('관심사가 저장되어 앱 전체에 적용됩니다'); setHomeTopic(interests[0] || '전체'); setView('home'); };

  return (
    <div data-archetype="feed-timeline" style={{width:'100%', minHeight:'100vh', display:'flex', flexDirection:'column'}}>
      <TopBar view={view} setView={setView} toast={push} />
      {view === 'home' && (
        <HomeView posts={posts} likedMap={likedMap} toggleLike={toggleLike}
          activeTopic={homeTopic} setActiveTopic={setHomeTopic}
          openWrite={() => setWriteOpen(true)}
          openDetail={(p, share) => share ? push('게시글 링크가 복사되었습니다') : setDetailPost(p)} />
      )}
      {view === 'onboarding' && (
        <OnboardingView loggedIn={loggedIn} setLoggedIn={setLoggedIn} interests={interests}
          toggleInterest={toggleInterest} applyInterests={applyInterests} toast={push} />
      )}
      {view === 'board' && (
        <BoardView posts={posts} activeKind={boardKind} setActiveKind={setBoardKind}
          activeTopic={boardTopic} setActiveTopic={setBoardTopic} query={boardQuery} setQuery={setBoardQuery}
          openWrite={() => setWriteOpen(true)} openDetail={setDetailPost} openReport={setReportPost} />
      )}
      {view === 'market' && (
        <MarketView items={market} activeKind={marketKind} setActiveKind={setMarketKind}
          activeTopic={marketTopic} setActiveTopic={setMarketTopic} activeStatus={marketStatus} setActiveStatus={setMarketStatus}
          openWrite={() => setMarketWriteOpen(true)} openDetail={setDetailMarket} />
      )}

      {writeOpen && <WriteModal onClose={() => setWriteOpen(false)} onSubmit={(p) => { addPost(p); push('게시글이 등록되었습니다'); }} defaultTopic={homeTopic !== '전체' ? homeTopic : undefined} />}
      {marketWriteOpen && <MarketWriteModal onClose={() => setMarketWriteOpen(false)} onSubmit={(m) => { addMarket(m); push('장터에 매물이 등록되었습니다'); }} />}
      {detailPost && <PostDetailModal post={detailPost} liked={!!likedMap[detailPost.id]} onToggleLike={() => toggleLike(detailPost.id)} onClose={() => setDetailPost(null)} toast={push} />}
      {reportPost && <ReportModal onClose={() => setReportPost(null)} onConfirm={() => push('신고가 접수되었습니다')} />}
      {detailMarket && <MarketDetailModal item={market.find(m => m.id === detailMarket.id) || detailMarket} onClose={() => setDetailMarket(null)} onAdvance={advanceStatus} toast={push} />}

      <Toast toasts={toasts} />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('app-root')).render(<App />);
</script>
</body>
</html>
