    --violet: #714cb6;
    --lilac: #d4c7ff;
    --lagoon: #0c4243;

    --mist: #e3e3e2;
    --ink: #292827;
    --stone: #666666;
    --paper: #ffffff;
    --gold: #f6bc1e;
    --gold-deep: #b8790a;

  * { box-sizing: border-box; }
  html, body { width: 100%; margin: 0; padding: 0; }
  body {
    font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, sans-serif;

  button { font-family: inherit; cursor: pointer; }
  input, select, textarea { font-family: inherit; }
  a { text-decoration: none; color: inherit; }
  ::-webkit-scrollbar { width: 6px; height: 6px; }

  @keyframes floatIn { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes goldPulse { 0%,100% { box-shadow: 0 0 0 0 rgba(246,188,30,0.45); } 50% { box-shadow: 0 0 0 7px rgba(246,188,30,0); } }
  @keyframes drawerSlide { from { transform: translateX(100%); } to { transform: translateX(0); } }

  .search-header { position: sticky; top: 0; z-index: 50; background: rgba(242,240,235,0.9); backdrop-filter: blur(14px); border-bottom: 1px solid var(--mist); }
  .header-row { max-width: 1240px; margin: 0 auto; display: flex; align-items: center; gap: 20px; padding: 14px 24px 10px; }
  .brand { display: flex; align-items: center; gap: 9px; font-size: 19px; font-weight: 600; color: var(--ink); flex-shrink: 0; cursor: pointer; }
  .brand-mark { width: 30px; height: 30px; border-radius: 9px; background: var(--wine); display: flex; align-items: center; justify-content: center; color: var(--gold); }
  .search-bar { flex: 1; display: flex; align-items: center; background: var(--paper); border-radius: 9999px; padding: 4px; box-shadow: 0 6px 18px rgba(41,40,39,0.08); max-width: 620px; }
  .search-segment { flex: 1; border: none; background: transparent; padding: 8px 16px; border-radius: 9999px; text-align: left; }
  .search-segment:hover { background: var(--parchment); }
  .segment-label { font-size: 10.5px; font-weight: 700; color: var(--stone); }
  .segment-value { font-size: 13px; color: var(--ink); margin-top: 1px; }
  .search-divider { width: 1px; height: 22px; background: var(--mist); }
  .search-submit { border: none; background: var(--wine); color: #fff; width: 38px; height: 38px; border-radius: 999px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; margin-left: 4px; }
  .header-nav { display: flex; align-items: center; gap: 4px; flex-shrink: 0; }
  .header-nav a, .header-nav button { border: none; background: transparent; padding: 8px 12px; border-radius: 9999px; font-size: 12.5px; font-weight: 600; color: var(--stone); white-space: nowrap; }
  .header-nav a:hover, .header-nav button:hover { background: var(--paper); color: var(--ink); }
  .header-nav .active { background: var(--ink); color: #fff; }

  .filter-chips { max-width: 1240px; margin: 0 auto; display: flex; gap: 8px; padding: 0 24px 14px; overflow-x: auto; align-items: center; }
  .chip { border: 1px solid var(--mist); background: var(--paper); padding: 7px 14px; border-radius: 9999px; font-size: 12.5px; font-weight: 600; color: var(--ink); display: flex; align-items: center; gap: 6px; white-space: nowrap; flex-shrink: 0; }
  .chip.active { background: var(--ink); color: var(--gold); border-color: var(--ink); }
  .chip-sep { width: 1px; height: 18px; background: var(--mist); flex-shrink: 0; margin: 0 2px; }

  .hero-band { max-width: 1240px; margin: 0 auto; padding: 4px 24px 20px; }
  .hero-card { background: linear-gradient(120deg, var(--wine), #612e3b); border-radius: 20px; padding: 28px 32px; color: #fff; display: flex; align-items: center; justify-content: space-between; gap: 24px; overflow: hidden; position: relative; }
  .hero-card::after { content: ''; position: absolute; right: -40px; top: -60px; width: 220px; height: 220px; border-radius: 999px; background: radial-gradient(circle, rgba(246,188,30,0.35), transparent 70%); }
  .hero-title { font-size: 36px; font-weight: 600; margin: 0 0 8px; letter-spacing: -0.015em; line-height: 1.15; }
  .hero-sub { font-size: 13px; color: rgba(255,255,255,0.75); margin: 0; max-width: 460px; line-height: 1.55; }
  .hero-stat { text-align: right; position: relative; z-index: 1; }
  .hero-stat b { font-size: 28px; display: block; color: var(--gold); }
  .hero-stat span { font-size: 11.5px; color: rgba(255,255,255,0.7); }

  .main-wrap { max-width: 1240px; margin: 0 auto; padding: 0 24px 60px; width: 100%; }
  .card-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(230px, 1fr)); gap: 18px; }
  .listing-card { background: var(--paper); border-radius: 16px; overflow: hidden; box-shadow: 0 8px 22px rgba(41,40,39,0.08); border: 1px solid rgba(41,40,39,0.05); cursor: pointer; animation: cardPop 0.4s ease both; transition: transform 0.2s, box-shadow 0.2s; }
  .listing-card:hover { transform: scale(1.025); box-shadow: 0 18px 36px rgba(41,40,39,0.16); }
  .card-image-wrap { position: relative; aspect-ratio: 4/3; }
  .card-image { width: 100%; height: 100%; object-fit: cover; display: block; }
  .card-favorite { position: absolute; top: 10px; right: 10px; border: none; background: rgba(255,255,255,0.85); width: 30px; height: 30px; border-radius: 999px; display: flex; align-items: center; justify-content: center; color: var(--wine); }

  .card-topic-badge { position: absolute; top: 10px; left: 10px; background: rgba(41,40,39,0.72); color: #fff; font-size: 10.5px; font-weight: 600; padding: 3px 10px; border-radius: 9999px; }

  .card-row-1 { display: flex; align-items: center; justify-content: space-between; gap: 8px; }

  .card-rating { font-size: 12px; color: var(--gold-deep); font-weight: 700; flex-shrink: 0; display: flex; align-items: center; gap: 2px; }
  .card-meta { font-size: 11.5px; color: var(--stone); display: block; margin-top: 3px; }
  .card-row-4 { display: flex; align-items: baseline; gap: 4px; margin-top: 8px; }
  .card-price { font-size: 16.5px; font-weight: 700; color: var(--ink); }

  .section-sub { font-size: 12.5px; color: var(--stone); margin: 0 0 16px; }

  /* admin */
  .stat-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; margin-bottom: 22px; }
  .stat-card { background: var(--paper); border-radius: 16px; padding: 18px 20px; box-shadow: 0 8px 22px rgba(41,40,39,0.07); }

  .stat-card .val { font-size: 26px; font-weight: 700; }
  .stat-card .delta { font-size: 11.5px; color: var(--gold-deep); margin-top: 4px; }

  .badge-ok { background: #eaf7ea; color: #1a7a35; font-size: 10.5px; font-weight: 700; padding: 2px 8px; border-radius: 9999px; }

  .trend-toolbar { display: flex; align-items: center; gap: 10px; margin-bottom: 16px; flex-wrap: wrap; }

  .trend-stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }

  /* quick view drawer */
  .drawer-overlay { position: fixed; inset: 0; background: rgba(41,40,39,0.4); z-index: 100; animation: overlayFade 0.2s ease; }
  .drawer { position: fixed; top: 0; right: 0; bottom: 0; width: 420px; max-width: 92vw; background: var(--paper); z-index: 101; padding: 22px; overflow-y: auto; animation: drawerSlide 0.28s cubic-bezier(.2,.8,.3,1); box-shadow: -12px 0 32px rgba(0,0,0,0.15); }
  .drawer-close { border: none; background: var(--parchment); width: 30px; height: 30px; border-radius: 999px; display: flex; align-items: center; justify-content: center; float: right; }
  .drawer img { width: 100%; border-radius: 14px; margin: 8px 0 14px; }
  .drawer-cta { width: 100%; border: none; background: var(--gold); color: var(--ink); padding: 12px; border-radius: 9999px; font-size: 14px; font-weight: 700; margin-top: 14px; animation: goldPulse 2.4s infinite; }
  .drawer-cta.ghost { background: var(--lilac); animation: none; margin-top: 8px; }

  /* modal (ads register) */
  .modal-overlay { position: fixed; inset: 0; background: rgba(41,40,39,0.42); display: flex; align-items: center; justify-content: center; z-index: 100; padding: 20px; }
  .modal-box { background: var(--paper); border-radius: 20px; width: 100%; max-width: 480px; padding: 24px; animation: cardPop 0.2s ease; }
  .modal-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
  .modal-head h3 { margin: 0; font-size: 18px; font-weight: 600; }
  .modal-close { border: none; background: var(--parchment); width: 30px; height: 30px; border-radius: 999px; display: flex; align-items: center; justify-content: center; }
  .form-group { margin-bottom: 14px; }
  .form-label { font-size: 12px; font-weight: 600; color: var(--stone); margin-bottom: 6px; display: block; }
  .form-row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .form-input, .form-select { width: 100%; border: 1px solid var(--mist); border-radius: 10px; padding: 10px 13px; font-size: 13.5px; outline: none; background: #fff; }
  .form-input:focus, .form-select:focus { border-color: var(--wine); }
  .modal-submit { width: 100%; border: none; background: var(--wine); color: #fff; padding: 12px; border-radius: 9999px; font-size: 14px; font-weight: 700; margin-top: 4px; }

  .toast-stack { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); z-index: 200; display: flex; flex-direction: column; gap: 8px; align-items: center; }
  .toast { background: var(--wine); color: #fff; padding: 11px 18px; border-radius: 9999px; font-size: 12.5px; font-weight: 600; display: flex; align-items: center; gap: 8px; box-shadow: 0 10px 26px rgba(0,0,0,0.2); }

  .empty-state { text-align: center; color: var(--stone); font-size: 13px; padding: 50px 0; }

  @media (max-width: 860px) {
    .search-bar { display: none; }
    .stat-row, .trend-stats { grid-template-columns: 1fr; }
    .hero-card { flex-direction: column; align-items: flex-start; }
    .hero-stat { text-align: left; }
  }
</style>

  { id: 4, pos: '홈 상단 배너', name: '카드샵 오프라인 이벤트', period: '06.20 ~ 07.05', status: 'ended' },
];

const TREND_CARDS = ['리자몽 GX SSR', '오타니 다이아몬드 오토', '루피 갱 방패 알트아트'];
function genTrend(seedIdx, unit) {
  const base = 300000 + seedIdx * 240000;
  const points = unit === 'daily' ? 14 : 8;
  const out = [];
  let v = base;
  for (let i = 0; i < points; i++) {
    v = v + Math.round(Math.sin(i / 2 + seedIdx) * base * 0.05) + (i * base * 0.01);
    out.push({ label: unit === 'daily' ? `${i + 1}일` : `${i + 1}주`, price: Math.round(v / 1000) * 1000, deals: 2 + (i % 4) });
  }
  return out;
}

function useToast() {
  const [toasts, setToasts] = useState([]);
  const push = (msg) => {
    const id = Math.random().toString(36).slice(2);
    setToasts(t => [...t, { id, msg }]);
    setTimeout(() => setToasts(t => t.filter(x => x.id !== id)), 2400);
  };
  return { toasts, push };
}
function Toast({ toasts }) {
  return (
    <div className="toast-stack">
      {toasts.map(t => <div className="toast" key={t.id}><i className="ph ph-check-circle"></i>{t.msg}</div>)}
    </div>
  );
}

function AdsView({ toast }) {
  const [slots, setSlots] = useState(ADS_SEED);
  const [modalOpen, setModalOpen] = useState(false);
  const move = (id, dir) => {
    setSlots(list => {
      const idx = list.findIndex(s => s.id === id);
      const swapIdx = idx + dir;
      if (swapIdx < 0 || swapIdx >= list.length) return list;
      const copy = [...list];
      [copy[idx], copy[swapIdx]] = [copy[swapIdx], copy[idx]];
      return copy;
    });
    toast('슬롯 노출 순서가 변경되었습니다');
  };
  return (
    <div className="main-wrap page-view">
      <div className="panel-head" style={{marginBottom:6}}>
        <div>
          <h2 className="section-title" style={{marginBottom:2}}>광고 슬롯 관리 시스템</h2>
          <p className="section-sub" style={{marginBottom:0}}>노출 위치·기간을 지정해 슬롯을 수동 등록하고 순서를 관리합니다.</p>
        </div>
        <button className="modal-submit" style={{width:'auto',padding:'10px 18px'}} onClick={() => setModalOpen(true)}><i className="ph ph-plus" style={{marginRight:6}}></i>슬롯 등록</button>
      </div>
      <div className="slot-list" style={{marginTop:16}}>
        {slots.map((s, i) => (
          <div className="slot-row" key={s.id}>
            <div className="slot-priority">
              <button className="prio-btn" disabled={i === 0} onClick={() => move(s.id, -1)}><i className="ph ph-caret-up" style={{fontSize:11}}></i></button>
              <button className="prio-btn" disabled={i === slots.length - 1} onClick={() => move(s.id, 1)}><i className="ph ph-caret-down" style={{fontSize:11}}></i></button>
            </div>
            <div className="slot-pos">{s.pos}</div>
            <div className="slot-info"><div className="name">{s.name}</div><div className="period">{s.period}</div></div>
            <span className={`slot-status ${s.status}`}>{s.status === 'live' ? '노출중' : s.status === 'waiting' ? '대기' : '종료'}</span>
          </div>
        ))}
      </div>
      {modalOpen && (
        <div className="modal-overlay" onClick={() => setModalOpen(false)}>
          <div className="modal-box" onClick={e => e.stopPropagation()}>
            <div className="modal-head"><h3>광고 슬롯 등록</h3><button className="modal-close" onClick={() => setModalOpen(false)}><i className="ph ph-x"></i></button></div>
            <div className="form-group"><label className="form-label">노출 위치</label>
              <select className="form-select" defaultValue="홈 상단 배너"><option>홈 상단 배너</option><option>게시판 사이드</option><option>장터 상단</option></select>
            </div>
            <div className="form-row2">
              <div className="form-group"><label className="form-label">시작일</label><input className="form-input" type="date" /></div>
              <div className="form-group"><label className="form-label">종료일</label><input className="form-input" type="date" /></div>
            </div>
            <div className="form-group"><label className="form-label">광고주명</label><input className="form-input" placeholder="예: 카드케어 보호필름" /></div>
            <button className="modal-submit" onClick={() => { setSlots(list => [...list, { id: Date.now(), pos: '홈 상단 배너', name: '신규 등록 광고', period: '대기중', status: 'waiting' }]); toast('광고 슬롯이 등록되었습니다'); setModalOpen(false); }}>등록하기</button>
          </div>
        </div>
      )}
    </div>
  );
}

function TrendsView() {
  const [cardIdx, setCardIdx] = useState(0);
  const [unit, setUnit] = useState('daily');
  const data = useMemo(() => genTrend(cardIdx, unit), [cardIdx, unit]);
  const avg = Math.round(data.reduce((a, b) => a + b.price, 0) / data.length);
  const deals = data.reduce((a, b) => a + b.deals, 0);
  return (
    <div className="main-wrap page-view">
      <h2 className="section-title">카드 시세 트렌드 통계</h2>
      <p className="section-sub">장터 등록·거래완료 이력을 기반으로 카드별 평균가 추이를 확인합니다.</p>

          <button className={unit === 'weekly' ? 'active' : ''} onClick={() => setUnit('weekly')}>주별</button>
        </div>
      </div>
      <div className="chart-wrap">
        <ResponsiveContainer width="100%" height="100%">
          <LineChart data={data} margin={{ top: 10, right: 16, left: 0, bottom: 0 }}>
            <CartesianGrid strokeDasharray="3 3" stroke="var(--mist)" />
            <XAxis dataKey="label" tick={{ fontSize: 11, fill: 'var(--stone)' }} />
            <YAxis tick={{ fontSize: 11, fill: 'var(--stone)' }} tickFormatter={v => `${Math.round(v/10000)}만`} width={44} />
            <Tooltip formatter={v => `${Number(v).toLocaleString()}원`} />
            <Line type="monotone" dataKey="price" stroke="#421d24" strokeWidth={2.5} dot={{ r: 3, fill: '#f6bc1e' }} />
          </LineChart>
        </ResponsiveContainer>
      </div>
      <div className="trend-stats">
        <div className="stat-card"><div className="lbl">평균가</div><div className="val">{avg.toLocaleString()}원</div></div>
        <div className="stat-card"><div className="lbl">거래 건수</div><div className="val">{deals}건</div></div>
        <div className="stat-card"><div className="lbl">데이터 없는 카드</div><div className="val" style={{fontSize:15,color:'var(--stone)'}}>등록 이력 없음 표시</div></div>
      </div>
    </div>
  );
}

function App() {
  const [view, setView] = useState('market');
  const [listings] = useState(LISTINGS_SEED);
  const [favSet, setFavSet] = useState(new Set());
  const [activeTopic, setActiveTopic] = useState('전체');
  const [activeBand, setActiveBand] = useState('all');
  const [activeStatus, setActiveStatus] = useState('전체');
  const [sortKey, setSortKey] = useState('recent');
  const [keyword, setKeyword] = useState('');
  const [detailItem, setDetailItem] = useState(null);
  const { toasts, push } = useToast();

  const toggleFav = (id) => setFavSet(s => { const n = new Set(s); n.has(id) ? n.delete(id) : n.add(id); return n; });

  return (
    <div data-archetype="airbnb-search-grid" style={{width:'100%', minHeight:'100vh', display:'flex', flexDirection:'column'}}>
      <Header view={view} setView={setView} favCount={favSet.size} keyword={keyword} setKeyword={setKeyword} toast={push} />
      {view === 'market' && (
        <MarketView listings={listings} favSet={favSet} toggleFav={toggleFav}
          activeTopic={activeTopic} setActiveTopic={setActiveTopic}
          activeBand={activeBand} setActiveBand={setActiveBand}
          activeStatus={activeStatus} setActiveStatus={setActiveStatus}
          sortKey={sortKey} setSortKey={setSortKey}
          keyword={keyword} openDetail={setDetailItem} />
      )}
      {view === 'admin' && <AdminView toast={push} />}
      {view === 'ads' && <AdsView toast={push} />}
      {view === 'trends' && <TrendsView />}
      {detailItem && <QuickViewDrawer item={detailItem} onClose={() => setDetailItem(null)} toast={push} />}
      <Toast toasts={toasts} />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('app-root2')).render(<App />);
