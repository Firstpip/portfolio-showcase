<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>모아라이프 — 라이프스타일 콘텐츠 커뮤니티</title>
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<style>
  :root{
    --bg:#ffffff;
    --surface:#f6f5f3;
    --ink:#111111;
    --ash:#6d6c6b;
    --stone:#b1b1af;
    --charcoal:#272625;
    --accent:#e8400d;
    --pearl:#ecebea;
    --petal:#ffd7f0;
    --mint:#b7efb2;
    --canary:#ffef99;
    --violet:#e2ddfd;
    --r-card:12px;
    --r-btn:8px;
    --r-input:12px;
    --r-badge:9999px;
  }
  *{box-sizing:border-box;}
  html,body{width:100%;margin:0;padding:0;}
  body{
    font-family:'Pretendard',ui-sans-serif,system-ui,-apple-system,sans-serif;
    background:var(--bg);
    color:var(--ink);
    -webkit-font-smoothing:antialiased;
  }
  #root{width:100%;}
  button{font-family:inherit;cursor:pointer;}
  input,textarea{font-family:inherit;}
  ::selection{background:var(--petal);}

  @keyframes fadeInUp{
    from{opacity:0;transform:translateY(14px);}
    to{opacity:1;transform:translateY(0);}
  }
  @keyframes heartPop{
    0%{transform:scale(1);}
    35%{transform:scale(1.35);}
    60%{transform:scale(0.92);}
    100%{transform:scale(1);}
  }
  @keyframes shimmer{
    0%{background-position:-400px 0;}
    100%{background-position:400px 0;}
  }
  @keyframes slideInRight{
    from{opacity:0;transform:translateX(24px);}
    to{opacity:1;transform:translateX(0);}
  }
  @keyframes toastUp{
    from{opacity:0;transform:translate(-50%,16px);}
    to{opacity:1;transform:translate(-50%,0);}
  }
  @keyframes modalIn{
    from{opacity:0;transform:scale(0.96);}
    to{opacity:1;transform:scale(1);}
  }
  @keyframes spinRing{
    to{transform:rotate(360deg);}
  }

  .topbar{
    position:sticky;top:0;z-index:40;width:100%;height:64px;
    display:flex;align-items:center;justify-content:center;
    background:rgba(255,255,255,0.72);
    backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
    border-bottom:1px solid rgba(17,17,17,0.06);
    transition:background .25s ease;
  }
  .topbar-inner{
    width:100%;max-width:1200px;padding:0 24px;
    display:flex;align-items:center;justify-content:space-between;gap:16px;
  }
  .brand{display:flex;align-items:center;gap:8px;font-weight:700;font-size:19px;letter-spacing:-0.4px;}
  .brand .dot{width:9px;height:9px;border-radius:50%;background:var(--accent);display:inline-block;}
  .search-wrap{
    flex:1;max-width:360px;display:flex;align-items:center;gap:8px;
    background:var(--pearl);border-radius:var(--r-input);padding:9px 14px;color:var(--ash);
  }
  .search-wrap input{border:none;background:transparent;outline:none;width:100%;font-size:14px;color:var(--ink);}
  .topbar-actions{display:flex;align-items:center;gap:10px;}
  .icon-btn{
    width:38px;height:38px;border-radius:50%;border:none;background:transparent;
    display:flex;align-items:center;justify-content:center;color:var(--ink);
    transition:background .15s ease;position:relative;
  }
  .icon-btn:hover{background:var(--pearl);}
  .notif-dot{position:absolute;top:8px;right:9px;width:7px;height:7px;border-radius:50%;background:var(--accent);}
  .mypage-btn{
    background:transparent;border:1px solid rgba(17,17,17,0.14);border-radius:var(--r-btn);
    padding:8px 14px;font-size:14px;color:var(--ink);font-weight:500;
    display:flex;align-items:center;gap:6px;transition:all .15s ease;
  }
  .mypage-btn:hover{background:var(--ink);color:#fff;border-color:var(--ink);}
  .avatar-img{width:34px;height:34px;border-radius:50%;object-fit:cover;flex-shrink:0;}

  .layout{
    display:flex;justify-content:center;gap:28px;
    width:100%;max-width:1200px;margin:0 auto;
    padding:28px 24px 80px;
  }
  .feed-col{max-width:600px;width:100%;flex:1;min-width:0;}
  .right-rail{width:300px;flex-shrink:0;}
  @media (max-width:920px){ .right-rail{display:none;} }

  .greeting{
    font-size:clamp(28px,4vw,42px);font-weight:400;letter-spacing:-1.2px;line-height:1.15;
    margin:4px 0 20px;color:var(--ink);
  }
  .greeting span{color:var(--accent);}

  .composer{
    position:sticky;top:76px;z-index:20;
    background:#fff;border-radius:var(--r-card);
    box-shadow:inset 0 0 0 1px rgba(17,17,17,0.08);
    padding:14px 16px;margin-bottom:18px;
  }
  .composer-row{display:flex;align-items:center;gap:10px;}
  .composer-trigger{
    flex:1;background:var(--surface);border-radius:var(--r-input);padding:11px 16px;
    color:var(--ash);font-size:15px;border:none;text-align:left;
  }
  .composer-actions{display:flex;justify-content:flex-end;gap:8px;margin-top:10px;}
  .btn-primary{
    background:var(--ink);color:#fff;border:none;border-radius:var(--r-btn);
    padding:10px 18px;font-size:14px;font-weight:500;display:flex;align-items:center;gap:6px;
    transition:transform .15s ease, opacity .15s ease;
  }
  .btn-primary:hover{opacity:0.88;transform:translateY(-1px);}
  .btn-primary:disabled{opacity:0.4;cursor:not-allowed;transform:none;}
  .btn-ghost{
    background:transparent;color:var(--ink);border:1px solid rgba(17,17,17,0.14);border-radius:var(--r-btn);
    padding:10px 16px;font-size:14px;font-weight:500;display:flex;align-items:center;gap:6px;
  }
  .btn-ghost:hover{background:var(--pearl);}

  .chip-row{display:flex;gap:8px;overflow-x:auto;margin-bottom:20px;padding-bottom:4px;}
  .chip{
    flex-shrink:0;border:none;border-radius:var(--r-badge);padding:8px 16px;font-size:13px;font-weight:500;
    background:var(--pearl);color:var(--ink);transition:transform .15s ease, box-shadow .15s ease;
  }
  .chip:hover{transform:translateY(-1px);}
  .chip.active{box-shadow:inset 0 0 0 2px var(--ink);}

  .post{
    background:#fff;border-radius:var(--r-card);padding:18px 20px;margin-bottom:14px;
    box-shadow:inset 0 0 0 1px rgba(17,17,17,0.08);
    animation:fadeInUp .45s ease both;
  }
  .post-head{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
  .post-author{font-weight:600;font-size:14px;color:var(--ink);}
  .post-time{font-size:12px;color:var(--ash);}
  .post-badge{
    margin-left:auto;font-size:11px;font-weight:600;padding:4px 10px;border-radius:var(--r-badge);
    white-space:nowrap;
  }
  .post-body{font-size:15px;line-height:1.55;color:var(--ink);margin-bottom:12px;white-space:pre-line;}
  .post-img{width:100%;border-radius:var(--r-card);margin-bottom:12px;display:block;object-fit:cover;max-height:320px;}
  .post-actions{display:flex;align-items:center;gap:4px;border-top:1px solid rgba(17,17,17,0.06);padding-top:10px;}
  .action-btn{
    display:flex;align-items:center;gap:6px;background:transparent;border:none;border-radius:var(--r-btn);
    padding:7px 12px;font-size:13px;color:var(--ash);transition:background .15s ease,color .15s ease;
  }
  .action-btn:hover{background:var(--surface);color:var(--ink);}
  .action-btn.liked{color:var(--accent);}
  .action-btn.liked .heart-ic{animation:heartPop .35s ease;}
  .detail-link{margin-left:auto;font-size:13px;color:var(--ink);font-weight:600;background:transparent;border:none;padding:7px 4px;}
  .detail-link:hover{color:var(--accent);}

  .skeleton-row{background:linear-gradient(90deg,var(--surface) 0%,#efeeec 40%,var(--surface) 80%);
    background-size:800px 100%;animation:shimmer 1.3s infinite linear;border-radius:var(--r-card);height:140px;margin-bottom:14px;}

  .load-more{
    width:100%;padding:12px;border-radius:var(--r-btn);border:1px solid rgba(17,17,17,0.14);
    background:#fff;color:var(--ink);font-size:14px;font-weight:500;margin-top:6px;
  }
  .load-more:hover{background:var(--pearl);}
  .sentinel{height:1px;}

  .rail-card{
    background:#fff;border-radius:var(--r-card);padding:18px;margin-bottom:16px;
    box-shadow:inset 0 0 0 1px rgba(17,17,17,0.08);
    animation:slideInRight .4s ease both;
  }
  .rail-card h4{font-size:14px;font-weight:700;margin:0 0 12px;letter-spacing:-0.2px;}
  .rail-cat{display:flex;align-items:center;justify-content:space-between;padding:9px 10px;border-radius:8px;margin-bottom:6px;font-size:13px;font-weight:500;}
  .rail-follow{display:flex;align-items:center;gap:10px;margin-bottom:14px;}
  .rail-follow img{width:36px;height:36px;border-radius:50%;}
  .rail-follow-name{font-size:13px;font-weight:600;flex:1;}
  .rail-follow-btn{font-size:12px;font-weight:600;border:1px solid rgba(17,17,17,0.16);border-radius:var(--r-badge);padding:6px 12px;background:#fff;}
  .rail-follow-btn.following{background:var(--ink);color:#fff;border-color:var(--ink);}
  .rail-dark{background:var(--charcoal);color:#fff;}
  .rail-dark .ash-text{color:#a6a5a3;}

  .modal-overlay{
    position:fixed;inset:0;background:rgba(17,17,17,0.45);z-index:100;
    display:flex;align-items:center;justify-content:center;padding:20px;
  }
  .modal-box{
    background:#fff;border-radius:16px;width:100%;max-width:560px;max-height:86vh;overflow-y:auto;
    animation:modalIn .22s cubic-bezier(0.23,1,0.32,1);
  }
  .modal-head{display:flex;align-items:center;justify-content:space-between;padding:18px 22px;border-bottom:1px solid rgba(17,17,17,0.07);position:sticky;top:0;background:#fff;}
  .modal-head h3{font-size:17px;font-weight:700;margin:0;}
  .modal-close{background:transparent;border:none;color:var(--ash);width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;}
  .modal-close:hover{background:var(--surface);}
  .modal-body{padding:22px;}
  .field-label{font-size:13px;font-weight:600;margin-bottom:6px;display:block;}
  .field-input,.field-textarea{
    width:100%;border-radius:var(--r-input);border:1px solid rgba(17,17,17,0.14);
    padding:11px 14px;font-size:14px;margin-bottom:16px;outline:none;color:var(--ink);
  }
  .field-textarea{resize:vertical;min-height:110px;}
  .field-input:focus,.field-textarea:focus{border-color:var(--ink);}
  .upload-zone{
    border:1.5px dashed rgba(17,17,17,0.18);border-radius:var(--r-card);padding:22px;text-align:center;
    color:var(--ash);font-size:13px;margin-bottom:16px;transition:border-color .15s ease;
  }
  .upload-zone.active{border-color:var(--accent);color:var(--accent);}

  .comment-item{display:flex;gap:10px;margin-bottom:14px;}
  .comment-item img{width:30px;height:30px;border-radius:50%;flex-shrink:0;}
  .comment-bubble{background:var(--surface);border-radius:12px;padding:9px 13px;font-size:13px;line-height:1.5;}
  .comment-author{font-weight:700;font-size:12.5px;margin-right:6px;}
  .comment-input-row{display:flex;gap:8px;margin-top:14px;}
  .comment-input-row input{flex:1;border-radius:var(--r-badge);border:1px solid rgba(17,17,17,0.14);padding:10px 16px;font-size:13px;outline:none;}
  .comment-input-row input:focus{border-color:var(--ink);}
  .comment-send{background:var(--ink);color:#fff;border:none;border-radius:50%;width:36px;height:36px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}

  .toast{
    position:fixed;left:50%;bottom:32px;transform:translateX(-50%);z-index:200;
    background:var(--charcoal);color:#fff;padding:12px 20px;border-radius:var(--r-badge);
    font-size:13px;font-weight:500;display:flex;align-items:center;gap:8px;
    animation:toastUp .25s ease;box-shadow:0 12px 32px rgba(0,0,0,0.2);
  }

  .mypage-wrap{width:100%;}
  .mypage-hero{
    background:var(--charcoal);color:#fff;border-radius:16px;padding:28px 24px;margin-bottom:20px;
    display:flex;align-items:center;gap:16px;
  }
  .mypage-hero img{width:60px;height:60px;border-radius:50%;}
  .mypage-tabs{display:flex;gap:6px;margin-bottom:16px;background:var(--surface);border-radius:var(--r-btn);padding:4px;}
  .mypage-tab{flex:1;padding:9px;border:none;background:transparent;border-radius:6px;font-size:13px;font-weight:600;color:var(--ash);}
  .mypage-tab.active{background:#fff;color:var(--ink);box-shadow:inset 0 0 0 1px rgba(17,17,17,0.08);}
  .empty-state{padding:52px 20px;text-align:center;color:var(--ash);}
  .spin-ic{animation:spinRing 0.9s linear infinite;display:inline-flex;}
</style>
</head>
<body data-archetype="feed-timeline">
<div id="root"></div>
<script type="text/babel">
const {useState, useEffect, useRef, useCallback} = React;

const CATEGORY_COLOR = {
  '뷰티': 'var(--petal)', '다이어트':'var(--mint)', '위킬리':'var(--canary)', '홈카페':'var(--violet)'
};
const CATEGORY_TEXT = {
  '뷰티':'#8a2456', '다이어트':'#265c1f', '위킬리':'#7a6300', '홈카페':'#4b3d8f'
};

const AVATAR = (name) => `https://source.boringavatars.com/beam/64/${encodeURIComponent(name)}?colors=e8400d,272625,ffd7f0,b7efb2,e2ddfd`;
const CARD_IMG = (i) => `https://picsum.photos/seed/crawling-community-feed-demo-card-${i}/640/400`;

const SEED_POSTS = [
  {id:1, author:'김민지', time:'12분 전', source:'회원 게시글', category:'홈카페', body:'주말에 원두 새로 내려서 마셔봤는데 산미가 딱 제 취향이에요. 다들 어떤 원두 쓰시나요?', img: CARD_IMG(1), likes:24, liked:false, comments:[{author:'박서연', text:'저도 그 원두 궁금했어요 어디 거예요?'},{author:'이하늘', text:'산미 있는 원두 추천 감사합니다!'}]},
  {id:2, author:'출처: 라이프스타일 매거진', time:'38분 전', source:'크롤링 콘텐츠', category:'뷰티', body:'환절기 피부 관리 루틴, 각질 케어부터 순서대로 정리했습니다. 저자극 성분 위주로 소개할게요.', img: CARD_IMG(2), likes:112, liked:false, comments:[{author:'최윤아','text':'스크랩 해뒀어요 감사합니다'}]},
  {id:3, author:'이서윤', time:'1시간 전', source:'회원 게시글', category:'다이어트', body:'식단 3주차 기록 남깁니다. 저녁은 가볍게, 아침은 든든하게가 저한테는 잘 맞는 것 같아요.', img:null, likes:9, liked:false, comments:[]},
  {id:4, author:'출처: 위클리 큐레이션', time:'2시간 전', source:'크롤링 콘텐츠', category:'위킬리', body:'이번 주 화제가 된 인테리어 소품 5가지를 모아봤어요. 소형 원룸에도 잘 어울리는 아이템 위주입니다.', img: CARD_IMG(3), likes:67, liked:false, comments:[{author:'정하은','text':'3번 조명 어디서 사는지 아시는 분?'}]},
  {id:5, author:'박서연', time:'3시간 전', source:'회원 게시글', category:'홈카페', body:'집에서 라떼아트 연습 중인데 하트 모양이 자꾸 퍼져요... 팁 있으신 분 계신가요?', img: CARD_IMG(4), likes:15, liked:false, comments:[]},
  {id:6, author:'출처: 뷰티 커뮤니티', time:'5시간 전', source:'크롤링 콘텐츠', category:'뷰티', body:'요즘 인기 있는 저자극 선크림 비교 후기를 모아 정리했습니다. 백탁 현상 기준으로 비교해봤어요.', img:null, likes:203, liked:false, comments:[{author:'김민지','text':'백탁 고민이었는데 도움됐어요'},{author:'이서윤','text':'저도 하나 사려던 참이었어요'}]},
  {id:7, author:'정하은', time:'어제', source:'회원 게시글', category:'다이어트', body:'홈트 6개월차 기록. 처음보다 확실히 체력이 좋아진 게 느껴져요. 같이 하시는 분들 화이팅!', img: CARD_IMG(5), likes:31, liked:false, comments:[]},
];

function Toast({message, onDone}){
  useEffect(()=>{ const t=setTimeout(onDone, 2200); return ()=>clearTimeout(t); },[]);
  return (
    <div className="toast">
      <i data-lucide="check-circle-2" style={{width:16,height:16}}></i>
      {message}
    </div>
  );
}

function ComposeModal({onClose, onSubmit}){
  const [text, setText] = useState('');
  const [imgOn, setImgOn] = useState(false);
  return (
    <div className="modal-overlay" onClick={onClose}>
      <div className="modal-box" onClick={e=>e.stopPropagation()}>
        <div className="modal-head">
          <h3>게시글 작성</h3>
          <button className="modal-close" onClick={onClose}><i data-lucide="x" style={{width:18,height:18}}></i></button>
        </div>
        <div className="modal-body">
          <label className="field-label">내용</label>
          <textarea className="field-textarea" placeholder="무슨 이야기를 나누고 싶으신가요?" value={text} onChange={e=>setText(e.target.value)}></textarea>
          <div className={"upload-zone" + (imgOn ? " active":"")} onClick={()=>setImgOn(v=>!v)}>
            <i data-lucide="image-plus" style={{width:20,height:20}}></i>
            <div style={{marginTop:6}}>{imgOn ? '이미지 1장이 첨부되었습니다' : '클릭해서 이미지를 첨부하세요'}</div>
          </div>
          <div style={{display:'flex',justifyContent:'flex-end',gap:8}}>
            <button className="btn-ghost" onClick={onClose}>취소</button>
            <button className="btn-primary" disabled={!text.trim()} onClick={()=>{onSubmit(text, imgOn); }}>
              <i data-lucide="send" style={{width:14,height:14}}></i>게시하기
            </button>
          </div>
        </div>
      </div>
    </div>
  );
}

function DetailModal({post, onClose, onLike, onComment}){
  const [commentText, setCommentText] = useState('');
  const commentInputRef = useRef(null);
  return (
    <div className="modal-overlay" onClick={onClose}>
      <div className="modal-box" onClick={e=>e.stopPropagation()}>
        <div className="modal-head">
          <h3>게시글 상세</h3>
          <button className="modal-close" onClick={onClose}><i data-lucide="x" style={{width:18,height:18}}></i></button>
        </div>
        <div className="modal-body">
          <div className="post-head">
            <img className="avatar-img" src={AVATAR(post.author)} />
            <div>
              <div className="post-author">{post.author}</div>
              <div className="post-time">{post.time}</div>
            </div>
            <span className="post-badge" style={{background:post.source==='회원 게시글' ? 'var(--pearl)' : CATEGORY_COLOR[post.category], color:post.source==='회원 게시글' ? 'var(--ink)' : CATEGORY_TEXT[post.category]}}>{post.source}</span>
          </div>
          <p className="post-body">{post.body}</p>
          {post.img && <img className="post-img" src={post.img} style={{maxHeight:360}} />}
          <div className="post-actions">
            <button className={"action-btn" + (post.liked ? " liked":"")} onClick={onLike}>
              <i data-lucide="heart" className="heart-ic" style={{width:16,height:16}} fill={post.liked ? 'currentColor':'none'}></i>{post.likes}
            </button>
            <button className="action-btn" onClick={()=>commentInputRef.current && commentInputRef.current.focus()}><i data-lucide="message-circle" style={{width:16,height:16}}></i>{post.comments.length}</button>
          </div>
          <div style={{marginTop:18,borderTop:'1px solid rgba(17,17,17,0.06)',paddingTop:14}}>
            {post.comments.length === 0 && <div style={{fontSize:13,color:'var(--ash)'}}>아직 댓글이 없습니다. 첫 댓글을 남겨보세요.</div>}
            {post.comments.map((c,i)=>(
              <div className="comment-item" key={i}>
                <img src={AVATAR(c.author)} />
                <div className="comment-bubble"><span className="comment-author">{c.author}</span>{c.text}</div>
              </div>
            ))}
            <div className="comment-input-row">
              <input ref={commentInputRef} placeholder="댓글을 입력하세요" value={commentText} onChange={e=>setCommentText(e.target.value)}
                onKeyDown={e=>{ if(e.key==='Enter' && commentText.trim()){ onComment(commentText); setCommentText(''); } }} />
              <button className="comment-send" onClick={()=>{ if(commentText.trim()){ onComment(commentText); setCommentText(''); } }}>
                <i data-lucide="arrow-up" style={{width:15,height:15}}></i>
              </button>
            </div>
          </div>
        </div>
      </div>
    </div>
  );
}

function AuthModal({onClose}){
  const [mode, setMode] = useState('login');
  const [email, setEmail] = useState('');
  const [err, setErr] = useState('');
  const submit = () => {
    if(!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)){ setErr('이메일 형식을 다시 확인해주세요'); return; }
    setErr(''); onClose();
  };
  return (
    <div className="modal-overlay" onClick={onClose}>
      <div className="modal-box" style={{maxWidth:420}} onClick={e=>e.stopPropagation()}>
        <div className="modal-head">
          <h3>{mode==='login' ? '로그인' : '회원가입'}</h3>
          <button className="modal-close" onClick={onClose}><i data-lucide="x" style={{width:18,height:18}}></i></button>
        </div>
        <div className="modal-body">
          <div className="mypage-tabs" style={{marginBottom:18}}>
            <button className={"mypage-tab"+(mode==='login'?' active':'')} onClick={()=>setMode('login')}>로그인</button>
            <button className={"mypage-tab"+(mode==='signup'?' active':'')} onClick={()=>setMode('signup')}>회원가입</button>
          </div>
          <label className="field-label">이메일</label>
          <input className="field-input" placeholder="you@example.com" value={email} onChange={e=>setEmail(e.target.value)} />
          {err && <div style={{color:'var(--accent)',fontSize:12,marginTop:-10,marginBottom:14}}>{err}</div>}
          <label className="field-label">비밀번호</label>
          <input className="field-input" type="password" placeholder="********" />
          <button className="btn-primary" style={{width:'100%',justifyContent:'center'}} onClick={submit}>
            {mode==='login' ? '로그인' : '회원가입'}
          </button>
        </div>
      </div>
    </div>
  );
}

function App(){
  const [posts, setPosts] = useState(SEED_POSTS);
  const [view, setView] = useState('feed');
  const [filter, setFilter] = useState('전체');
  const [composeOpen, setComposeOpen] = useState(false);
  const [detailPost, setDetailPost] = useState(null);
  const [authOpen, setAuthOpen] = useState(false);
  const [toast, setToast] = useState(null);
  const [loadingMore, setLoadingMore] = useState(false);
  const [pageSize, setPageSize] = useState(6);
  const sentinelRef = useRef(null);

  useEffect(()=>{ if(window.lucide) window.lucide.createIcons(); });

  useEffect(()=>{
    const el = sentinelRef.current;
    if(!el) return;
    const io = new IntersectionObserver((entries)=>{
      if(entries[0].isIntersecting && !loadingMore && pageSize < posts.length){
        setLoadingMore(true);
        setTimeout(()=>{ setPageSize(p=>Math.min(p+3, posts.length)); setLoadingMore(false); }, 700);
      }
    }, {threshold:0.2});
    io.observe(el);
    return ()=>io.disconnect();
  }, [loadingMore, pageSize, posts.length]);

  const toggleLike = (id) => {
    setPosts(ps => ps.map(p => p.id===id ? {...p, liked:!p.liked, likes: p.liked ? p.likes-1 : p.likes+1} : p));
    setDetailPost(dp => dp && dp.id===id ? {...dp, liked:!dp.liked, likes: dp.liked ? dp.likes-1 : dp.likes+1} : dp);
  };
  const addComment = (id, text) => {
    setPosts(ps => ps.map(p => p.id===id ? {...p, comments:[...p.comments, {author:'나', text}]} : p));
    setDetailPost(dp => dp && dp.id===id ? {...dp, comments:[...dp.comments, {author:'나', text}]} : dp);
  };
  const submitPost = (text, hasImg) => {
    const np = {id:Date.now(), author:'나', time:'방금', source:'회원 게시글', category:'홈카페', body:text, img: hasImg ? CARD_IMG(9) : null, likes:0, liked:false, comments:[]};
    setPosts(ps => [np, ...ps]);
    setPageSize(p=>p+1);
    setComposeOpen(false);
    setToast('게시글이 등록되었습니다');
  };
  const shareIt = () => setToast('링크가 복사되었습니다');

  const visible = posts.filter(p => filter==='전체' ? true : (filter==='회원 게시글' ? p.source==='회원 게시글' : (filter==='크롤링 콘텐츠' ? p.source==='크롤링 콘텐츠' : p.category===filter))).slice(0, pageSize);

  const chips = ['전체','회원 게시글','크롤링 콘텐츠','뷰티','다이어트','위킬리','홈카페'];

  return (
    <div style={{width:'100%',minHeight:'100vh',display:'flex',flexDirection:'column'}}>
      <header className="topbar">
        <div className="topbar-inner">
          <div className="brand" onClick={()=>setView('feed')} style={{cursor:'pointer'}}><span className="dot"></span>모아라이프</div>
          <div className="search-wrap">
            <i data-lucide="search" style={{width:16,height:16}}></i>
            <input placeholder="관심 있는 이야기를 검색해보세요" />
          </div>
          <div className="topbar-actions">
            <button className="icon-btn" onClick={()=>setToast('새로운 알림이 없습니다')}><i data-lucide="bell" style={{width:19,height:19}}></i><span className="notif-dot"></span></button>
            <button className="mypage-btn" onClick={()=>setView('mypage')}><i data-lucide="user-round" style={{width:15,height:15}}></i>마이페이지</button>
            <img className="avatar-img" src={AVATAR('나')} onClick={()=>setAuthOpen(true)} style={{cursor:'pointer'}} />
          </div>
        </div>
      </header>

      <div className="layout">
        <main className="feed-col">
          {view === 'feed' && (
            <React.Fragment>
              <div style={{
                background:'radial-gradient(140% 160% at 8% -20%, rgba(232,64,13,0.16) 0%, rgba(255,238,216,0.5) 34%, rgba(208,178,255,0.28) 82%)',
                borderRadius:16, padding:'24px 22px 6px', marginBottom:6
              }}>
                <div className="greeting">민지님, 오늘은 어떤 <span>이야기</span>를 나누고 싶으신가요?</div>
                <div style={{display:'flex',gap:8,marginBottom:16}}>
                  {['뷰티','다이어트','위킬리','홈카페'].map(c => (
                    <span key={c} style={{fontSize:11,fontWeight:700,padding:'4px 11px',borderRadius:999,background:CATEGORY_COLOR[c],color:CATEGORY_TEXT[c]}}>#{c}</span>
                  ))}
                </div>
              </div>
              <div className="composer">
                <div className="composer-row">
                  <img className="avatar-img" src={AVATAR('나')} />
                  <button className="composer-trigger" onClick={()=>setComposeOpen(true)}>무슨 이야기를 나누고 싶으신가요?</button>
                </div>
                <div className="composer-actions">
                  <button className="btn-primary" onClick={()=>setComposeOpen(true)}><i data-lucide="pencil-line" style={{width:14,height:14}}></i>게시글 작성</button>
                </div>
              </div>

              <div className="chip-row">
                {chips.map(c => (
                  <button key={c} className={"chip"+(filter===c?" active":"")} onClick={()=>setFilter(c)}>{c}</button>
                ))}
              </div>

              {visible.map(p => (
                <article className="post" key={p.id} style={{borderRadius:12, boxShadow:'inset 0 0 0 1px rgba(17,17,17,0.08)'}}>
                  <div className="post-head">
                    <img className="avatar-img" src={AVATAR(p.author)} />
                    <div>
                      <div className="post-author">{p.author}</div>
                      <div className="post-time">{p.time}</div>
                    </div>
                    <span className="post-badge" style={{background:p.source==='회원 게시글' ? 'var(--pearl)' : CATEGORY_COLOR[p.category], color:p.source==='회원 게시글' ? 'var(--ink)' : CATEGORY_TEXT[p.category]}}>
                      {p.source==='회원 게시글' ? '회원 게시글' : `크롤링 · ${p.category}`}
                    </span>
                  </div>
                  <p className="post-body">{p.body}</p>
                  {p.img && <img className="post-img" src={p.img} />}
                  <div className="post-actions">
                    <button className={"action-btn"+(p.liked?" liked":"")} onClick={()=>toggleLike(p.id)}>
                      <i data-lucide="heart" className="heart-ic" style={{width:15,height:15}} fill={p.liked?'currentColor':'none'}></i>{p.likes}
                    </button>
                    <button className="action-btn" onClick={()=>setDetailPost(p)}><i data-lucide="message-circle" style={{width:15,height:15}}></i>{p.comments.length}</button>
                    <button className="action-btn" onClick={shareIt}><i data-lucide="share-2" style={{width:15,height:15}}></i>공유</button>
                    <button className="detail-link" onClick={()=>setDetailPost(p)}>게시글 상세</button>
                  </div>
                </article>
              ))}

              {loadingMore && <div className="skeleton-row"></div>}
              {pageSize < posts.length ? (
                <div ref={sentinelRef} className="sentinel"></div>
              ) : (
                <div style={{textAlign:'center',color:'var(--ash)',fontSize:13,padding:'16px 0'}}>모든 게시글을 확인했습니다</div>
              )}
            </React.Fragment>
          )}

          {view === 'mypage' && (
            <MyPage posts={posts} onBack={()=>setView('feed')} onOpenDetail={setDetailPost} />
          )}
        </main>

        <aside className="right-rail">
          <div className="rail-card">
            <h4>카테고리 인기</h4>
            {Object.keys(CATEGORY_COLOR).map(cat => (
              <div className="rail-cat" key={cat} style={{background:CATEGORY_COLOR[cat], color:CATEGORY_TEXT[cat], cursor:'pointer'}} onClick={()=>{setView('feed'); setFilter(cat);}}>
                <span>{cat}</span><i data-lucide="chevron-right" style={{width:14,height:14}}></i>
              </div>
            ))}
          </div>
          <div className="rail-card">
            <h4>회원 추천</h4>
            {['이서윤','정하은','최윤아'].map(n => (
              <FollowRow key={n} name={n} />
            ))}
          </div>
          <div className="rail-card rail-dark">
            <h4 style={{color:'#fff'}}>오늘의 활동</h4>
            <div className="ash-text" style={{fontSize:13,lineHeight:1.7}}>
              새 게시글 {posts.length}건<br/>
              누적 좋아요 {posts.reduce((a,p)=>a+p.likes,0)}회<br/>
              활성 카테고리 {Object.keys(CATEGORY_COLOR).length}개
            </div>
          </div>
        </aside>
      </div>

      {composeOpen && <ComposeModal onClose={()=>setComposeOpen(false)} onSubmit={submitPost} />}
      {detailPost && <DetailModal post={detailPost} onClose={()=>setDetailPost(null)} onLike={()=>toggleLike(detailPost.id)} onComment={(t)=>addComment(detailPost.id, t)} />}
      {authOpen && <AuthModal onClose={()=>setAuthOpen(false)} />}
      {toast && <Toast message={toast} onDone={()=>setToast(null)} />}
    </div>
  );
}

function FollowRow({name}){
  const [following, setFollowing] = useState(false);
  return (
    <div className="rail-follow">
      <img src={AVATAR(name)} />
      <div className="rail-follow-name">{name}</div>
      <button className={"rail-follow-btn"+(following?" following":"")} onClick={()=>setFollowing(v=>!v)}>{following ? '팔로잉' : '팔로우'}</button>
    </div>
  );
}

function MyPage({posts, onBack, onOpenDetail}){
  const [tab, setTab] = useState('작성 게시글');
  const mine = posts.filter(p => p.author === '나' || p.author==='김민지');
  const liked = posts.filter(p => p.liked);
  const list = tab === '작성 게시글' ? mine : liked;
  return (
    <div className="mypage-wrap">
      <div className="mypage-hero">
        <img src={AVATAR('나')} />
        <div>
          <div style={{fontWeight:700,fontSize:18}}>김민지님</div>
          <div style={{fontSize:13,color:'#c9c8c6',marginTop:2}}>2026년 7월 가입 · 홈카페 · 뷰티 관심</div>
        </div>
        <button className="btn-ghost" style={{marginLeft:'auto',borderColor:'rgba(255,255,255,0.3)',color:'#fff'}} onClick={onBack}>
          <i data-lucide="arrow-left" style={{width:14,height:14}}></i>피드로 돌아가기
        </button>
      </div>
      <div className="mypage-tabs">
        <button className={"mypage-tab"+(tab==='작성 게시글'?' active':'')} onClick={()=>setTab('작성 게시글')}>작성 게시글</button>
        <button className={"mypage-tab"+(tab==='좋아요'?' active':'')} onClick={()=>setTab('좋아요')}>좋아요</button>
      </div>
      {list.length === 0 && (
        <div className="empty-state">
          <i data-lucide="inbox" style={{width:32,height:32,color:'var(--stone)'}}></i>
          <div style={{marginTop:10}}>{tab==='좋아요' ? '아직 좋아요를 누른 게시글이 없습니다' : '아직 작성한 게시글이 없습니다'}</div>
        </div>
      )}
      {list.map(p => (
        <article className="post" key={p.id} onClick={()=>onOpenDetail(p)} style={{cursor:'pointer'}}>
          <div className="post-head">
            <img className="avatar-img" src={AVATAR(p.author)} />
            <div><div className="post-author">{p.author}</div><div className="post-time">{p.time}</div></div>
          </div>
          <p className="post-body">{p.body}</p>
        </article>
      ))}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
