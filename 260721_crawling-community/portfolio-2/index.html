<style>
  :root{
    --bg:#f2f0eb;
    --surface:#ffffff;
    --border:#e3e3e2;
    --ink:#292827;
    --ash:#666666;
    --lilac:#d4c7ff;
    --yellow:#f6bc1e;
    --maroon:#421d24;
    --r-card:10px;
    --r-btn:8px;
    --r-pill:999px;
  }
  *{box-sizing:border-box;}
  html,body{width:100%;margin:0;padding:0;}
  body{
    font-family:'Pretendard',ui-sans-serif,system-ui,-apple-system,sans-serif;
    background:var(--bg);color:var(--ink);
    -webkit-font-smoothing:antialiased;
  }
  #root{width:100%;}
  button{font-family:inherit;cursor:pointer;}
  input,textarea,select{font-family:inherit;}

  @keyframes fadeIn{ from{opacity:0;transform:translateY(6px);} to{opacity:1;transform:translateY(0);} }
  @keyframes barGrow{ from{transform:scaleX(0);} to{transform:scaleX(1);} }
  @keyframes spinIc{ to{transform:rotate(360deg);} }
  @keyframes rowFlash{ 0%{background:rgba(246,188,30,0.35);} 100%{background:transparent;} }
  @keyframes cmdkIn{ from{opacity:0;transform:translateY(-8px);} to{opacity:1;transform:translateY(0);} }

  .app-shell{display:flex;width:100%;min-height:100vh;}

  .sidebar{
    position:fixed;left:0;top:0;bottom:0;width:264px;background:var(--surface);
    border-right:1px solid var(--border);display:flex;flex-direction:column;z-index:30;
  }
  .sidebar-brand{height:60px;display:flex;align-items:center;gap:9px;padding:0 18px;border-bottom:1px solid var(--border);font-weight:700;font-size:15px;}
  .sidebar-brand .mark{width:22px;height:22px;border-radius:6px;background:var(--maroon);display:flex;align-items:center;justify-content:center;color:#fff;font-size:11px;font-weight:800;}
  .sidebar-cmdk-hint{
    margin:12px 14px;padding:8px 10px;border:1px solid var(--border);border-radius:var(--r-btn);
    display:flex;align-items:center;justify-content:space-between;font-size:12px;color:var(--ash);background:var(--bg);
  }
  .kbd{font-size:11px;border:1px solid var(--border);border-radius:4px;padding:1px 6px;background:#fff;color:var(--ink);font-weight:600;}
  .sidebar-section-title{font-size:11px;font-weight:700;color:var(--ash);text-transform:uppercase;letter-spacing:0.4px;padding:14px 18px 6px;}
  .sidebar-nav{padding:0 10px;}
  .sidebar-link{
    display:flex;align-items:center;gap:10px;padding:9px 10px;border-radius:7px;font-size:13.5px;font-weight:500;
    color:var(--ink);text-decoration:none;margin-bottom:2px;border:none;background:transparent;width:100%;text-align:left;
    transition:background .12s ease;position:relative;
  }
  .sidebar-link:hover{background:var(--bg);}
  .sidebar-link.active{background:#faf5e6;color:var(--ink);font-weight:700;}
  .sidebar-link.active::before{content:'';position:absolute;left:-10px;top:6px;bottom:6px;width:3px;border-radius:2px;background:var(--yellow);}
  .sidebar-badge{margin-left:auto;font-size:10.5px;background:var(--maroon);color:#fff;border-radius:var(--r-pill);padding:1px 7px;font-weight:700;}
  .sidebar-user{margin-top:auto;padding:14px 18px;border-top:1px solid var(--border);display:flex;align-items:center;gap:9px;font-size:12.5px;}
  .sidebar-user img{width:28px;height:28px;border-radius:50%;}

  .main-wrap{margin-left:264px;flex:1;min-width:0;width:calc(100% - 264px);display:flex;flex-direction:column;min-height:100vh;}
  .topbar{
    height:56px;display:flex;align-items:center;justify-content:space-between;padding:0 24px;
    border-bottom:1px solid var(--border);background:var(--surface);position:sticky;top:0;z-index:20;
  }
  .breadcrumb{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--ash);}
  .breadcrumb .current{color:var(--ink);font-weight:700;}
  .breadcrumb .divider{color:var(--border);}
  .topbar-actions{display:flex;align-items:center;gap:8px;}
  .btn-cmdk{
    display:flex;align-items:center;gap:6px;border:1px solid var(--border);background:var(--bg);
    border-radius:var(--r-btn);padding:7px 12px;font-size:12.5px;color:var(--ash);font-weight:600;
  }
  .btn-primary{
    background:var(--yellow);color:var(--ink);border:none;border-radius:var(--r-btn);
    padding:8px 15px;font-size:13px;font-weight:700;display:flex;align-items:center;gap:6px;
    transition:filter .15s ease;
  }
  .btn-primary:hover{filter:brightness(0.94);}
  .btn-danger{background:var(--maroon);color:#fff;border:none;border-radius:var(--r-btn);padding:8px 14px;font-size:12.5px;font-weight:700;display:flex;align-items:center;gap:6px;}
  .btn-outline{background:#fff;border:1px solid var(--border);color:var(--ink);border-radius:var(--r-btn);padding:7px 13px;font-size:12.5px;font-weight:600;display:flex;align-items:center;gap:6px;}
  .btn-outline:hover{background:var(--bg);}
  .btn-lilac{background:var(--lilac);color:var(--ink);border:none;border-radius:var(--r-btn);padding:7px 13px;font-size:12.5px;font-weight:700;}

  .content{padding:22px 24px;flex:1;animation:fadeIn .3s ease;}
  .page-title{font-size:clamp(22px,3vw,32px);font-weight:700;letter-spacing:-0.5px;margin:0 0 4px;}
  .page-sub{font-size:13px;color:var(--ash);margin-bottom:18px;}

  .md-grid{display:grid;grid-template-columns:360px 1fr;gap:16px;align-items:flex-start;}
  @media (max-width:1080px){ .md-grid{grid-template-columns:1fr;} }

  .panel{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-card);}
  .panel-head{padding:13px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;}
  .panel-head h3{font-size:13.5px;font-weight:700;margin:0;flex:1;}
  .filter-chip-row{display:flex;gap:6px;padding:10px 12px;border-bottom:1px solid var(--border);overflow-x:auto;}
  .fchip{border:1px solid var(--border);background:#fff;border-radius:var(--r-pill);padding:5px 11px;font-size:11.5px;font-weight:600;color:var(--ash);flex-shrink:0;}
  .fchip.active{background:var(--ink);color:#fff;border-color:var(--ink);}

  .list-rail{max-height:640px;overflow-y:auto;}
  .list-item{
    display:flex;align-items:center;gap:10px;padding:12px 16px;border-bottom:1px solid var(--border);
    cursor:pointer;transition:background .12s ease;
  }
  .list-item:hover{background:var(--bg);transform:scale(1.01);}
  .list-item.selected{background:#faf5e6;}
  .list-item.flash{animation:rowFlash .8s ease;}
  .li-title{font-size:13px;font-weight:600;color:var(--ink);}
  .li-sub{font-size:11.5px;color:var(--ash);margin-top:2px;}
  .status-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
  .status-badge{font-size:10.5px;font-weight:700;padding:2px 8px;border-radius:var(--r-pill);white-space:nowrap;}

  .detail-panel{padding:18px;min-height:400px;}
  .detail-empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:400px;color:var(--ash);gap:10px;font-size:13px;}
  .kv-row{display:flex;justify-content:space-between;font-size:12.5px;padding:8px 0;border-bottom:1px dashed var(--border);}
  .kv-row .k{color:var(--ash);}
  .kv-row .v{font-weight:600;}

  .chart-wrap{position:relative;height:220px;width:100%;margin:14px 0;}
  .checkbox{width:16px;height:16px;accent-color:var(--yellow);}
  .bulk-bar{
    display:flex;align-items:center;gap:10px;background:#faf5e6;border:1px solid var(--yellow);border-radius:var(--r-btn);
    padding:9px 14px;margin-bottom:10px;font-size:12.5px;font-weight:600;
  }

  .log-row{font-size:11.5px;font-family:ui-monospace,monospace;padding:6px 0;border-bottom:1px dashed var(--border);color:var(--ash);display:flex;gap:8px;}
  .log-row .tag{color:var(--maroon);font-weight:700;}

  .slider-row{margin:16px 0;}
  .slider-row label{font-size:12.5px;font-weight:600;display:block;margin-bottom:6px;}
  .slider-row input[type=range]{width:100%;accent-color:var(--yellow);}
  .slider-val{font-size:11.5px;color:var(--ash);margin-top:4px;}
  .field-input{width:100%;border:1px solid var(--border);border-radius:var(--r-btn);padding:9px 12px;font-size:13px;margin-bottom:10px;outline:none;}
  .field-input:focus{border-color:var(--yellow);}
  .url-tag{display:inline-flex;align-items:center;gap:6px;background:var(--bg);border:1px solid var(--border);border-radius:var(--r-pill);padding:5px 10px;font-size:11.5px;margin:0 6px 6px 0;}
  .url-tag button{border:none;background:transparent;color:var(--ash);display:flex;}

  .modal-overlay{position:fixed;inset:0;background:rgba(41,40,39,0.45);z-index:100;display:flex;align-items:center;justify-content:center;padding:20px;}
  .modal-box{background:#fff;border-radius:12px;width:100%;max-width:480px;padding:0;animation:fadeIn .2s ease;}
  .modal-head{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;}
  .modal-head h3{font-size:15px;font-weight:700;margin:0;}
  .modal-body{padding:20px;}
  .modal-close{border:none;background:transparent;color:var(--ash);}

  .toast{
    position:fixed;right:24px;bottom:24px;z-index:200;background:var(--ink);color:#fff;
    padding:11px 18px;border-radius:var(--r-btn);font-size:12.5px;font-weight:600;
    display:flex;align-items:center;gap:8px;animation:fadeIn .2s ease;box-shadow:0 12px 28px rgba(0,0,0,0.18);
  }

  .cmdk-overlay{
    position:fixed;inset:0;background:rgba(41,40,39,0.4);z-index:150;
    display:flex;align-items:flex-start;justify-content:center;padding-top:14vh;
  }
  .cmdk-modal{width:100%;max-width:520px;background:#fff;border-radius:12px;overflow:hidden;animation:cmdkIn .18s ease;box-shadow:0 24px 60px rgba(0,0,0,0.25);}
  .cmdk-input{width:100%;border:none;padding:16px 18px;font-size:15px;outline:none;border-bottom:1px solid var(--border);}
  .cmdk-results{max-height:320px;overflow-y:auto;padding:8px;}
  .cmdk-group-title{font-size:11px;color:var(--ash);font-weight:700;padding:8px 10px 4px;text-transform:uppercase;}
  .cmdk-item{display:flex;align-items:center;gap:10px;padding:9px 10px;border-radius:7px;font-size:13px;cursor:pointer;border:none;background:transparent;width:100%;text-align:left;color:var(--ink);}
  .cmdk-item:hover{background:var(--bg);}

  .spin{animation:spinIc .9s linear infinite;display:inline-flex;}
</style>
</head>

function CmdK({open, onClose, onNavigate}){
  if(!open) return null;
  const go = (screen) => { onNavigate(screen); onClose(); };
  return (
    <div className="cmdk-overlay" onClick={onClose}>
      <div className="cmdk-modal" onClick={e=>e.stopPropagation()}>
        <input className="cmdk-input" autoFocus placeholder="명령 또는 검색..." />
        <div className="cmdk-results">
          <div className="cmdk-group-title">최근</div>
          <button className="cmdk-item" onClick={()=>go('main')}><span className="kbd">⏎</span>뷰티 매거진 수집 작업 열기</button>
          <button className="cmdk-item" onClick={()=>go('members')}><span className="kbd">⏎</span>회원 이하늘 상세 보기</button>
          <div className="cmdk-group-title">바로가기</div>
          <button className="cmdk-item" onClick={()=>go('main')}><i className="ph ph-gauge"></i>대시보드로 이동</button>
          <button className="cmdk-item" onClick={()=>go('schedule')}><i className="ph ph-clock-counter-clockwise"></i>수집 스케줄 설정 열기</button>
        </div>
      </div>
    </div>
  );
}

function StatusBadge({status, color}){
  return <span className="status-badge" style={{background:color+'1c', color:color}}>{status}</span>;
}

function Toast({message, onDone}){
  useEffect(()=>{ const t=setTimeout(onDone, 2200); return ()=>clearTimeout(t); },[]);
  return <div className="toast"><i className="ph ph-check-circle"></i>{message}</div>;
}

function Dashboard({toast}){
  const [selected, setSelected] = useState(JOBS[0]);
  const [flashId, setFlashId] = useState(null);
  const [running, setRunning] = useState(false);

  const rerun = () => {
    setRunning(true);
    setTimeout(()=>{ setRunning(false); toast('크롤링 작업이 재실행되었습니다'); }, 1400);

  const pick = (j) => { setSelected(j); setFlashId(j.id); setTimeout(()=>setFlashId(null), 800); };

              <span className="status-dot" style={{background:j.statusColor}}></span>
              <div style={{flex:1}}>
                <div className="li-title">{j.name}</div>
                <div className="li-sub">최근 실행 {j.lastRun} · 주기 {j.interval}</div>
              </div>
              <StatusBadge status={j.status} color={j.statusColor} />
            </div>
          ))}
        </div>
        <div className="panel" style={{borderRadius:10}}>
          <div className="panel-head"><h3>{selected.name} — 상세</h3>
            <button className="btn-outline" onClick={rerun}>{running ? <i className="ph ph-spinner spin"></i> : <i className="ph ph-arrow-clockwise"></i>}재실행</button>
          </div>
          <div className="detail-panel">
            <div className="kv-row"><span className="k">카테고리</span><span className="v">{selected.category}</span></div>
            <div className="kv-row"><span className="k">수집 주기</span><span className="v">{selected.interval}</span></div>
            <div className="kv-row"><span className="k">최근 성공률</span><span className="v">{selected.success}%</span></div>
            <div style={{height:6,borderRadius:999,background:'var(--border)',overflow:'hidden',margin:'4px 0 10px'}}>
              <div key={selected.id} style={{height:'100%',width:selected.success+'%',background:'var(--maroon)',borderRadius:999,transformOrigin:'left',animation:'barGrow .6s ease both'}}></div>
            </div>
            <div className="kv-row"><span className="k">최근 실패 건수</span><span className="v">{selected.fail}건</span></div>
            <div className="chart-wrap">
              <ResponsiveContainer width="100%" height="100%">
                <LineChart data={selected.trend}>
                  <CartesianGrid strokeDasharray="3 3" stroke="#e3e3e2" />
                  <XAxis dataKey="t" tick={{fontSize:11, fill:'#666'}} />
                  <YAxis tick={{fontSize:11, fill:'#666'}} domain={[70,100]} />
                  <Tooltip />
                  <Line type="monotone" dataKey="v" stroke="#421d24" strokeWidth={2} dot={{r:3}} />
                </LineChart>
              </ResponsiveContainer>
            </div>
            <div style={{fontSize:12.5,fontWeight:700,margin:'12px 0 6px'}}>최근 로그</div>
            {selected.logs.map((l,i)=>(
              <div className="log-row" key={i}><span>{l.time}</span><span className="tag">{l.level}</span><span>{l.text}</span></div>
            ))}
          </div>
        </div>
      </div>
    </div>
  );
}

function ContentManage({toast}){
  const [posts, setPosts] = useState(POSTS);
  const [filter, setFilter] = useState('전체');
  const [selected, setSelected] = useState(POSTS[0]);
  const [checked, setChecked] = useState([]);

  const filtered = posts.filter(p => filter==='전체' ? true : filter==='자동 플래깅' ? p.flagged : p.status==='검수 대기');

  const toggleCheck = (id) => setChecked(c => c.includes(id) ? c.filter(x=>x!==id) : [...c, id]);
  const bulkHide = () => {
    setPosts(ps => ps.map(p => checked.includes(p.id) ? {...p, status:'숨김'} : p));
    toast(`${checked.length}건이 일괄 숨김 처리되었습니다`);
    setChecked([]);
  };
  const del = (id) => {
    setPosts(ps => ps.map(p => p.id===id ? {...p, status:'삭제됨'} : p));
    toast('게시글이 삭제 처리되었습니다 (소프트 삭제)');
  };

  return (
    <div>
      <div className="page-title">콘텐츠 관리</div>
      <div className="page-sub">수집된 게시글과 회원 게시글의 신고·플래깅 현황을 검토합니다</div>
      <div className="md-grid">
        <div className="panel list-rail" style={{borderRadius:10}}>
          <div className="filter-chip-row">
            {['전체','자동 플래깅','검수 대기'].map(f => (
              <button key={f} className={"fchip"+(filter===f?" active":"")} onClick={()=>setFilter(f)}>{f}</button>
            ))}
          </div>
          {checked.length > 0 && (
            <div className="bulk-bar" style={{margin:'10px 12px'}}>
              <span>{checked.length}건 선택됨</span>
              <button className="btn-danger" style={{marginLeft:'auto'}} onClick={bulkHide}><i className="ph ph-eye-slash"></i>일괄 숨김</button>
            </div>
          )}
          {filtered.map(p => (
            <div key={p.id} className={"list-item"+(selected.id===p.id?" selected":"")} onClick={()=>setSelected(p)}>
              <input type="checkbox" className="checkbox" checked={checked.includes(p.id)} onClick={e=>e.stopPropagation()} onChange={()=>toggleCheck(p.id)} />
              <div style={{flex:1}}>
                <div className="li-title">{p.title}</div>
                <div className="li-sub">{p.author}{p.reports>0 ? ` · 신고 ${p.reports}건` : ''}</div>
              </div>
              <StatusBadge status={p.status} color={p.status==='검수 대기' ? '#421d24' : p.status==='숨김'||p.status==='삭제됨' ? '#8a6d00' : '#0c4243'} />
            </div>
          ))}
        </div>
        <div className="panel" style={{borderRadius:10}}>
          <div className="panel-head"><h3>게시글 상세</h3></div>
          <div className="detail-panel">
            <div className="kv-row"><span className="k">제목</span><span className="v">{selected.title}</span></div>
            <div className="kv-row"><span className="k">작성자</span><span className="v">{selected.author}</span></div>
            <div className="kv-row"><span className="k">신고 사유</span><span className="v">{selected.reason || '해당 없음'}</span></div>
            <div className="kv-row"><span className="k">현재 상태</span><span className="v">{selected.status}</span></div>
            <p style={{fontSize:13,lineHeight:1.6,color:'var(--ink)',margin:'14px 0'}}>{selected.body}</p>
            <div style={{display:'flex',gap:8}}>
              <button className="btn-outline" onClick={()=>{setPosts(ps=>ps.map(p=>p.id===selected.id?{...p,status:'숨김'}:p)); toast('게시글이 숨김 처리되었습니다');}}>
                <i className="ph ph-eye-slash"></i>숨김
              </button>
              <button className="btn-danger" onClick={()=>del(selected.id)}><i className="ph ph-trash"></i>삭제</button>
            </div>
          </div>
        </div>
      </div>
    </div>
  );
}

function MemberDetail({m, onStatus}){
  return (
    <div className="detail-panel">
      <div className="kv-row"><span className="k">이메일</span><span className="v">{m.email}</span></div>
      <div className="kv-row"><span className="k">가입일</span><span className="v">{m.joined}</span></div>
      <div className="kv-row"><span className="k">작성 게시글</span><span className="v">{m.posts}건</span></div>
      <div className="kv-row"><span className="k">경고 누적</span><span className="v">{m.warn}회</span></div>
      <div style={{display:'flex',gap:8,margin:'14px 0'}}>
        <button className="btn-outline" onClick={()=>onStatus(m.id,'정상')}><i className="ph ph-check-circle"></i>정상</button>
        <button className="btn-lilac" onClick={()=>onStatus(m.id,'경고')}><i className="ph ph-warning"></i>경고</button>
        <button className="btn-danger" onClick={()=>onStatus(m.id,'차단')}><i className="ph ph-prohibit"></i>차단</button>
      </div>
      <div style={{fontSize:12.5,fontWeight:700,margin:'14px 0 6px'}}>처리 이력</div>
      {m.history.length === 0 && <div style={{fontSize:12.5,color:'var(--ash)'}}>처리 이력이 없습니다</div>}
      {m.history.map((h,i)=>(
        <div className="log-row" key={i}><span>{h.date}</span><span className="tag">{h.by}</span><span>{h.reason}</span></div>
      ))}
    </div>
  );
}

function MemberManage({toast}){
  const [members, setMembers] = useState(MEMBERS);
  const [q, setQ] = useState('');
  const [statusFilter, setStatusFilter] = useState('전체');
  const [selected, setSelected] = useState(MEMBERS[0]);

  const filtered = members.filter(m =>
    (statusFilter==='전체' || m.status===statusFilter) &&
    (q==='' || m.name.includes(q) || m.email.includes(q))
  );

  const setStatus = (id, status) => {
    setMembers(ms => ms.map(m => m.id===id ? {...m, status, history: status!=='정상' ? [{date:'2026.07.21', reason:`관리자 처리 — ${status} 전환`, by:'관리자A'}, ...m.history] : m.history} : m));
    setSelected(s => s.id===id ? {...s, status} : s);
    toast(`${status === '차단' ? '회원이 차단 처리되었습니다' : status === '경고' ? '경고 처리되었습니다' : '정상 상태로 복구되었습니다'}`);
  };

  return (
    <div>
      <div className="page-title">회원 관리</div>
      <div className="page-sub">전체 회원 현황을 조회하고 신고 누적 회원을 관리합니다</div>
      <div className="md-grid">
        <div className="panel list-rail" style={{borderRadius:10}}>
          <div style={{padding:'10px 12px',borderBottom:'1px solid var(--border)'}}>
            <input className="field-input" style={{marginBottom:8}} placeholder="이메일 또는 닉네임 검색" value={q} onChange={e=>setQ(e.target.value)} />
            <div className="filter-chip-row" style={{border:'none',padding:0}}>
              {['전체','정상','경고','차단'].map(f => (
                <button key={f} className={"fchip"+(statusFilter===f?" active":"")} onClick={()=>setStatusFilter(f)}>{f}</button>
              ))}
            </div>
          </div>
          {filtered.map(m => (
            <div key={m.id} className={"list-item"+(selected.id===m.id?" selected":"")} onClick={()=>setSelected(m)}>
              <img src={AVATAR(m.name)} style={{width:30,height:30,borderRadius:'50%'}} />
              <div style={{flex:1}}>
                <div className="li-title">{m.name}</div>
                <div className="li-sub">{m.email}</div>
              </div>
              <StatusBadge status={m.status} color={m.status==='정상'?'#0c4243':m.status==='경고'?'#8a6d00':'#421d24'} />
            </div>
          ))}
          {filtered.length===0 && <div style={{padding:20,fontSize:12.5,color:'var(--ash)',textAlign:'center'}}>검색 결과가 없습니다</div>}
        </div>
        <div className="panel" style={{borderRadius:10}}>
          <div className="panel-head"><h3>{selected.name} — 회원 상세</h3></div>
          <MemberDetail m={selected} onStatus={setStatus} />
        </div>
      </div>
    </div>
  );
}

function ScheduleSettings({toast}){
  const [targets, setTargets] = useState(TARGETS);
  const [selected, setSelected] = useState(TARGETS[0]);
  const [interval, setInterval_] = useState(selected.interval);
  const [delay, setDelay] = useState(selected.delay);
  const [newUrl, setNewUrl] = useState('');
  const [rollback, setRollback] = useState(false);

  useEffect(()=>{ setInterval_(selected.interval); setDelay(selected.delay); }, [selected]);

  const save = () => {
    setTargets(ts => ts.map(t => t.id===selected.id ? {...t, interval, delay, version:'v'+(parseInt(t.version.slice(1))+1)} : t));
    toast('설정이 저장되어 다음 실행부터 새 주기가 적용됩니다');
  };
  const addUrl = () => {
    if(!newUrl.trim()) return;
    const nt = {id:Date.now(), name:newUrl.replace(/^https?:\/\//,'').split('/')[0], url:newUrl, interval:6, delay:1000, version:'v1'};
    setTargets(ts => [...ts, nt]);
    setNewUrl('');
    toast('수집 대상이 추가되었습니다');
  };
  const removeUrl = (id) => {
    setTargets(ts => ts.filter(t=>t.id!==id));
    if(selected.id===id) setSelected(targets[0]);
    toast('수집 대상이 삭제되었습니다');
  };

  return (
    <div>
      <div className="page-title">수집 스케줄 설정</div>
      <div className="page-sub">크롤링 대상 URL, 수집 주기, 요청 딜레이를 조정합니다</div>
      <div className="md-grid">
        <div className="panel list-rail" style={{borderRadius:10}}>
          <div className="panel-head"><h3>수집 대상 ({targets.length})</h3></div>
          {targets.map(t => (
            <div key={t.id} className={"list-item"+(selected.id===t.id?" selected":"")} onClick={()=>setSelected(t)}>
              <i className="ph ph-globe" style={{color:'var(--ash)'}}></i>
              <div style={{flex:1}}>
                <div className="li-title">{t.name}</div>
                <div className="li-sub">{t.version} · 주기 {t.interval}시간</div>
              </div>
              <button className="btn-outline" style={{padding:'4px 8px'}} onClick={(e)=>{e.stopPropagation(); removeUrl(t.id);}}><i className="ph ph-x"></i></button>
            </div>
          ))}
          <div style={{padding:12}}>
            <div style={{display:'flex',gap:6}}>
              <input className="field-input" style={{marginBottom:0}} placeholder="https://example.com/feed" value={newUrl} onChange={e=>setNewUrl(e.target.value)} />
              <button className="btn-outline" onClick={addUrl}><i className="ph ph-plus"></i></button>
            </div>
          </div>
        </div>
        <div className="panel" style={{borderRadius:10}}>
          <div className="panel-head"><h3>{selected.name} — 설정</h3><span className="url-tag">{selected.version}</span></div>
          <div className="detail-panel">
            <div className="kv-row"><span className="k">대상 URL</span><span className="v" style={{maxWidth:220,overflow:'hidden',textOverflow:'ellipsis'}}>{selected.url}</span></div>
            <div className="slider-row">
              <label>수집 주기 ({interval}시간마다)</label>
              <input type="range" min="1" max="24" value={interval} onChange={e=>setInterval_(parseInt(e.target.value))} />
              <div className="slider-val">변경 시 다음 실행부터 즉시 반영, 진행 중 작업에는 영향 없음</div>
            </div>
            <div className="slider-row">
              <label>요청 간 딜레이 ({delay}ms)</label>
              <input type="range" min="200" max="3000" step="100" value={delay} onChange={e=>setDelay(parseInt(e.target.value))} />
              <div className="slider-val">대상 서버 부하 방지를 위한 요청 간격</div>
            </div>
            <div style={{display:'flex',gap:8,marginTop:16}}>
              <button className="btn-primary" onClick={save}><i className="ph ph-floppy-disk"></i>저장</button>
              <button className="btn-outline" onClick={()=>setRollback(true)}><i className="ph ph-clock-counter-clockwise"></i>이전 설정 이력</button>
            </div>
          </div>
        </div>
      </div>
      {rollback && (
        <div className="modal-overlay" onClick={()=>setRollback(false)}>
          <div className="modal-box" onClick={e=>e.stopPropagation()}>
            <div className="modal-head"><h3>설정 변경 이력</h3><button className="modal-close" onClick={()=>setRollback(false)}><i className="ph ph-x"></i></button></div>
            <div className="modal-body">
              <div className="log-row"><span>07.20 14:02</span><span className="tag">v{parseInt(selected.version.slice(1))}</span><span>주기 {selected.interval}시간, 딜레이 {selected.delay}ms로 변경</span></div>
              <div className="log-row"><span>07.15 09:30</span><span className="tag">이전</span><span>주기 12시간, 딜레이 2000ms</span></div>
              <button className="btn-outline" style={{marginTop:14,width:'100%',justifyContent:'center'}} onClick={()=>{setRollback(false); toast('이전 설정으로 되돌렸습니다');}}>
                이전 설정으로 되돌리기
              </button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

function App(){
  const [screen, setScreen] = useState('main');
  const [cmdkOpen, setCmdkOpen] = useState(false);
  const [toastMsg, setToastMsg] = useState(null);
  const toast = (m) => setToastMsg(m);

  useEffect(()=>{
    const handler = (e) => {
      if((e.metaKey || e.ctrlKey) && e.key.toLowerCase()==='k'){ e.preventDefault(); setCmdkOpen(v=>!v); }
      if(e.key === 'Escape') setCmdkOpen(false);
    };
    window.addEventListener('keydown', handler);
    return ()=>window.removeEventListener('keydown', handler);
  }, []);

  const NAV = [
    {key:'main', label:'대시보드', icon:'ph-gauge'},
    {key:'content', label:'콘텐츠 관리', icon:'ph-files'},
    {key:'members', label:'회원 관리', icon:'ph-users'},
    {key:'schedule', label:'수집 스케줄 설정', icon:'ph-clock-counter-clockwise'},
  ];
  const crumbLabel = NAV.find(n=>n.key===screen)?.label || '대시보드';

  return (
    <div className="app-shell">
      <aside className="sidebar">
        <div className="sidebar-brand"><span className="mark">CC</span>크롤 컨트롤</div>
        <div className="sidebar-cmdk-hint" onClick={()=>setCmdkOpen(true)} style={{cursor:'pointer'}}>
          <span>빠른 검색</span><span className="kbd">⌘K</span>
        </div>
        <div className="sidebar-section-title">모니터링</div>
        <nav className="sidebar-nav">
          <a href="#" className={"sidebar-link"+(screen==='main'?' active':'')} onClick={(e)=>{e.preventDefault(); setScreen('main');}}>
            <i className="ph ph-gauge"></i>대시보드
          </a>
        </nav>
        <div className="sidebar-section-title">운영 관리</div>
        <nav className="sidebar-nav">
          <a href="#" className={"sidebar-link"+(screen==='content'?' active':'')} onClick={(e)=>{e.preventDefault(); setScreen('content');}}>
            <i className="ph ph-files"></i>콘텐츠 관리<span className="sidebar-badge">2</span>
          </a>
          <a href="#" className={"sidebar-link"+(screen==='members'?' active':'')} onClick={(e)=>{e.preventDefault(); setScreen('members');}}>
            <i className="ph ph-users"></i>회원 관리
          </a>
          <a href="#" className={"sidebar-link"+(screen==='schedule'?' active':'')} onClick={(e)=>{e.preventDefault(); setScreen('schedule');}}>
            <i className="ph ph-clock-counter-clockwise"></i>수집 스케줄 설정
          </a>
        </nav>
        <div className="sidebar-user">
          <img src={AVATAR('관리자A')} />
          <div>운영관리자A</div>
        </div>
      </aside>

      <div className="main-wrap">
        <header className="topbar">
          <nav className="breadcrumb">
            <span>크롤 컨트롤</span><span className="divider">/</span><span className="current">{crumbLabel}</span>
          </nav>
          <div className="topbar-actions">
            <button className="btn-cmdk" onClick={()=>setCmdkOpen(true)}><i className="ph ph-magnifying-glass"></i>⌘ K</button>
            <button className="btn-primary" onClick={()=>toast('알림 설정이 저장되었습니다')}><i className="ph ph-bell-ringing"></i>알림 설정</button>
          </div>
        </header>
        <div className="content">
          {screen==='main' && <Dashboard toast={toast} />}
          {screen==='content' && <ContentManage toast={toast} />}
          {screen==='members' && <MemberManage toast={toast} />}
          {screen==='schedule' && <ScheduleSettings toast={toast} />}
        </div>
      </div>

      <CmdK open={cmdkOpen} onClose={()=>setCmdkOpen(false)} onNavigate={setScreen} />
      {toastMsg && <Toast message={toastMsg} onDone={()=>setToastMsg(null)} />}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
