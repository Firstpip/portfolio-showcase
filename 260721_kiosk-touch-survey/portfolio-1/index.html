<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TouchPoll — 터치 키오스크 설문조사 시스템</title>
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" rel="stylesheet">
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="https://unpkg.com/lucide@latest"></script>
<style>
  :root{
    --primary:#101010;
    --primary-ink:#000000;
    --secondary:#0099ff;
    --accent:#3ad98a;
    --bg:#f4f4f4;
    --surface:#ffffff;
    --text:#101010;
    --text-2:#6b7280;
    --radius:20px;
    --radius-pill:200px;
    --shadow-elevated:0 20px 44px -14px rgba(40,46,62,.22), 0 6px 16px rgba(40,46,62,.08);
    --shadow-soft:0 8px 22px rgba(40,46,62,.08);
  }
  *{box-sizing:border-box;}
  html,body{width:100%;margin:0;padding:0;background:var(--bg);color:var(--text);font-family:'Pretendard',-apple-system,sans-serif;-webkit-font-smoothing:antialiased;}
  #root{width:100%;}
  button{font-family:inherit;cursor:pointer;border:none;background:none;}
  ::-webkit-scrollbar{width:8px;height:8px;}
  ::-webkit-scrollbar-thumb{background:#c7cce0;border-radius:8px;}

  @keyframes cardEnter{from{opacity:0;transform:translateY(18px);}to{opacity:1;transform:translateY(0);}}
  @keyframes pulseLive{0%{box-shadow:0 0 0 0 rgba(58,217,138,.5);}70%{box-shadow:0 0 0 9px rgba(58,217,138,0);}100%{box-shadow:0 0 0 0 rgba(58,217,138,0);}}
  @keyframes rippleTouch{from{transform:scale(0);opacity:.55;}to{transform:scale(2.6);opacity:0;}}
  @keyframes progressFill{from{width:var(--from,0%);}to{width:var(--to,0%);}}
  @keyframes toastSlide{from{opacity:0;transform:translate(-50%,14px);}to{opacity:1;transform:translate(-50%,0);}}
  @keyframes fadeIn{from{opacity:0;}to{opacity:1;}}
  @keyframes spinSlow{from{transform:rotate(0deg);}to{transform:rotate(360deg);}}

  .app-shell{width:100%;min-height:100vh;display:flex;flex-direction:column;}

  /* ---- topnav ---- */
  .topnav{width:100%;background:var(--surface);border-bottom:1px solid #ebedf5;position:sticky;top:0;z-index:40;}
  .topnav-inner{max-width:1360px;margin:0 auto;padding:0 32px;display:flex;align-items:center;justify-content:space-between;height:72px;gap:24px;}
  .brand{display:flex;align-items:center;gap:10px;font-weight:800;font-size:19px;letter-spacing:-.02em;flex:none;}
  .brand-badge{width:34px;height:34px;border-radius:11px;background:linear-gradient(135deg,var(--primary),var(--secondary));display:flex;align-items:center;justify-content:center;color:#fff;}
  .nav-tabs{display:flex;gap:6px;flex-wrap:wrap;justify-content:flex-end;flex:1;}
  .nav-tab{display:flex;align-items:center;gap:7px;padding:10px 16px;border-radius:var(--radius-pill);font-size:13.5px;font-weight:600;color:var(--text-2);transition:all .18s;white-space:nowrap;}
  .nav-tab:hover{background:#f0f1f9;color:var(--text);}
  .nav-tab.active{background:var(--primary);color:#fff;box-shadow:0 8px 18px -6px rgba(16,16,16,.55);}
  .nav-tab svg{width:16px;height:16px;}

  main{width:100%;flex:1;}

  /* ---- bento main dashboard ---- */
  .dash-wrap{max-width:1360px;margin:0 auto;padding:36px 32px 64px;}
  .dash-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;flex-wrap:wrap;gap:14px;}
  .dash-title{font-size:26px;font-weight:800;letter-spacing:-.02em;}
  .dash-sub{color:var(--text-2);font-size:14px;margin-top:4px;}
  .live-badge{display:flex;align-items:center;gap:8px;background:#e8fbef;color:var(--accent);font-weight:700;font-size:12.5px;padding:8px 14px;border-radius:var(--radius-pill);border:1px solid #bdeed0;}
  .live-dot{width:8px;height:8px;border-radius:50%;background:var(--accent);animation:pulseLive 1.8s infinite;}

  .bento{display:grid;grid-template-columns:repeat(4,1fr);gap:18px;}
  .tile{background:var(--surface);border-radius:20px;padding:26px;box-shadow:0 20px 44px -14px rgba(40,46,62,.22), 0 6px 16px rgba(40,46,62,.08);border:1px solid #eef0f8;animation:cardEnter .5s ease both;transition:transform .22s, box-shadow .22s;}
  .tile:hover{transform:translateY(-4px);box-shadow:var(--shadow-elevated);}
  .tile.feature{grid-column:span 2;grid-row:span 2;display:flex;flex-direction:column;}
  .tile.wide{grid-column:span 2;}
  .tile-label{font-size:12.5px;font-weight:700;color:var(--text-2);text-transform:uppercase;letter-spacing:.04em;display:flex;align-items:center;gap:6px;margin-bottom:14px;}
  .tile-label svg{width:15px;height:15px;color:var(--primary);}
  .tile-num{font-size:38px;font-weight:800;letter-spacing:-.02em;}
  .tile-num.small{font-size:30px;}
  .tile-delta{font-size:12.5px;font-weight:700;margin-top:8px;display:inline-flex;align-items:center;gap:4px;}
  .tile-delta.up{color:#1f9d55;}
  .sparkline{width:100%;height:34px;margin-top:12px;}
  .chart-box{position:relative;flex:1;min-height:210px;margin-top:6px;}
  .kiosk-status-row{display:flex;gap:14px;margin-top:4px;}
  .kiosk-status-card{flex:1;border:1px solid #eef0f8;border-radius:14px;padding:16px;background:#fbfbfe;}
  .kiosk-status-card .ks-name{font-size:13px;font-weight:700;display:flex;align-items:center;gap:8px;}
  .status-dot{width:8px;height:8px;border-radius:50%;background:#1f9d55;display:inline-block;animation:pulseLive 2s infinite;}
  .status-dot.off{background:#c7cce0;animation:none;}
  .ks-detail{font-size:12px;color:var(--text-2);margin-top:6px;}
  .top-answer-row{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px dashed #eef0f8;font-size:13px;}
  .top-answer-row:last-child{border-bottom:none;}
  .top-answer-bar{height:6px;border-radius:4px;background:#eef0f8;flex:1;margin:0 12px;overflow:hidden;}
  .top-answer-bar-fill{height:100%;border-radius:4px;background:var(--primary);}
  .donut-wrap{display:flex;align-items:center;gap:16px;margin-top:6px;}
  .donut-legend{font-size:12.5px;color:var(--text-2);display:flex;flex-direction:column;gap:6px;}
  .legend-dot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:6px;}

  /* ---- kiosk device frame ---- */
  .kiosk-page{max-width:1360px;margin:0 auto;padding:40px 32px 72px;display:flex;flex-direction:column;align-items:center;}
  .kiosk-page-head{width:100%;max-width:920px;margin-bottom:22px;}
  .kiosk-page-title{font-size:22px;font-weight:800;display:flex;align-items:center;gap:10px;}
  .kiosk-page-desc{color:var(--text-2);font-size:13.5px;margin-top:6px;}
  .monitor-frame{width:100%;max-width:920px;background:#1c1e27;border-radius:28px;padding:20px 20px 34px;box-shadow:0 30px 60px -20px rgba(20,20,30,.45);}
  .monitor-bezel-label{display:flex;justify-content:space-between;align-items:center;color:#8b8f9e;font-size:11px;font-weight:700;letter-spacing:.06em;padding:0 4px 12px;text-transform:uppercase;}
  .monitor-screen{width:100%;aspect-ratio:16/9;background:var(--surface);border-radius:14px;overflow:hidden;position:relative;display:flex;flex-direction:column;}
  .monitor-stand{width:120px;height:10px;background:#2b2e3a;margin:10px auto 0;border-radius:0 0 8px 8px;}

  .k-screen{flex:1;display:flex;flex-direction:column;padding:36px 40px;animation:fadeIn .35s ease;}
  .k-idle{align-items:center;justify-content:center;text-align:center;background:linear-gradient(160deg,#eef0ef 0%,#e8f7ee 100%);}
  .k-idle h2{font-size:30px;font-weight:800;margin:0 0 10px;}
  .k-idle p{color:var(--text-2);font-size:14px;margin:0 0 26px;}
  .touch-cta{position:relative;overflow:hidden;background:var(--primary);color:#fff;font-weight:700;font-size:16px;padding:18px 44px;border-radius:var(--radius-pill);box-shadow:0 14px 30px -10px rgba(16,16,16,.6);}
  .touch-cta:active{transform:scale(.97);}
  .ripple{position:absolute;border-radius:50%;background:#fff;pointer-events:none;animation:rippleTouch .6s ease-out;}

  .k-progress{display:flex;gap:8px;margin-bottom:22px;}
  .k-progress-seg{flex:1;height:6px;border-radius:4px;background:#eef0f8;overflow:hidden;}
  .k-progress-seg-fill{height:100%;background:var(--primary);border-radius:4px;animation:progressFill .5s ease forwards;}
  .k-qtext{font-size:24px;font-weight:800;margin-bottom:22px;letter-spacing:-.01em;}
  .k-options{display:grid;grid-template-columns:1fr 1fr;gap:16px;flex:1;}
  .k-option{position:relative;overflow:hidden;background:#fbfbfe;border:2px solid #eef0f8;border-radius:18px;padding:22px;font-size:15.5px;font-weight:700;text-align:left;transition:all .16s;}
  .k-option:hover{border-color:var(--secondary);}
  .k-option.selected{border-color:var(--primary);background:#f0f2ff;color:var(--primary);}
  .k-hint{text-align:center;color:var(--text-2);font-size:12px;margin-top:18px;}

  .k-done{align-items:center;justify-content:center;text-align:center;}
  .k-done-icon{width:64px;height:64px;border-radius:50%;background:#e8fbef;color:#1f9d55;display:flex;align-items:center;justify-content:center;margin-bottom:18px;}
  .k-done h2{font-size:26px;font-weight:800;margin:0 0 8px;}
  .k-done p{color:var(--text-2);font-size:13.5px;margin:0 0 20px;}
  .k-countdown{font-size:12.5px;color:var(--text-2);font-weight:600;}

  .k2-tabs{display:flex;gap:8px;margin-bottom:20px;overflow-x:auto;padding-bottom:4px;}
  .k2-tab{flex:none;padding:9px 16px;border-radius:var(--radius-pill);font-size:12.5px;font-weight:700;background:#f0f1f9;color:var(--text-2);}
  .k2-tab.active{background:var(--accent);color:#fff;}
  .k2-carousel{flex:1;display:flex;align-items:center;gap:14px;}
  .k2-arrow{flex:none;width:44px;height:44px;border-radius:50%;background:#f0f1f9;display:flex;align-items:center;justify-content:center;}
  .k2-arrow:hover{background:var(--secondary);}
  .k2-card{flex:1;display:flex;gap:24px;align-items:center;background:#fbfbfe;border-radius:18px;padding:22px;border:1px solid #eef0f8;height:100%;}
  .k2-card img{width:170px;height:170px;object-fit:cover;border-radius:14px;flex:none;}
  .k2-card-body h3{font-size:20px;font-weight:800;margin:0 0 8px;}
  .k2-card-body p{font-size:13.5px;color:var(--text-2);line-height:1.6;margin:0;}
  .k2-dots{display:flex;justify-content:center;gap:6px;margin-top:16px;}
  .k2-dot{width:7px;height:7px;border-radius:50%;background:#dfe2f0;}
  .k2-dot.active{background:var(--accent);width:20px;border-radius:4px;}
  .k2-footer{display:flex;justify-content:center;margin-top:20px;}

  .k2-result-bars{display:flex;flex-direction:column;gap:14px;width:100%;max-width:520px;margin:0 auto;}
  .k2-result-row{display:flex;align-items:center;gap:12px;font-size:13.5px;}
  .k2-result-label{width:120px;font-weight:700;flex:none;}
  .k2-result-track{flex:1;height:14px;background:#eef0f8;border-radius:8px;overflow:hidden;}
  .k2-result-fill{height:100%;border-radius:8px;background:var(--primary);animation:progressFill .8s ease forwards;}
  .k2-result-pct{width:44px;text-align:right;font-weight:700;flex:none;}

  /* ---- admin ---- */
  .admin-wrap{max-width:1360px;margin:0 auto;padding:36px 32px 72px;}
  .admin-head{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:22px;flex-wrap:wrap;gap:14px;}
  .admin-title{font-size:24px;font-weight:800;}
  .btn-primary{background:var(--primary);color:#fff;font-weight:700;font-size:13.5px;padding:12px 22px;border-radius:var(--radius-pill);display:inline-flex;align-items:center;gap:8px;box-shadow:0 10px 22px -8px rgba(16,16,16,.55);}
  .btn-primary svg{width:16px;height:16px;}
  .btn-ghost{background:#f0f1f9;color:var(--text);font-weight:700;font-size:13px;padding:10px 16px;border-radius:var(--radius-pill);display:inline-flex;align-items:center;gap:6px;}
  .btn-ghost.active{background:var(--primary);color:#fff;}
  .admin-toolbar{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-bottom:18px;}
  .search-box{display:flex;align-items:center;gap:8px;background:#fff;border:1px solid #eef0f8;border-radius:var(--radius-pill);padding:10px 16px;min-width:240px;}
  .search-box input{border:none;outline:none;font-size:13.5px;width:100%;background:transparent;}
  .admin-table-card{background:#fff;border-radius:var(--radius);border:1px solid #eef0f8;overflow:hidden;box-shadow:var(--shadow-soft);}
  table{width:100%;border-collapse:collapse;}
  thead th{text-align:left;font-size:11.5px;color:var(--text-2);text-transform:uppercase;letter-spacing:.04em;padding:14px 20px;border-bottom:1px solid #eef0f8;}
  tbody td{padding:14px 20px;font-size:13.5px;border-bottom:1px solid #f3f4fa;}
  tbody tr{transition:background .15s;cursor:pointer;}
  tbody tr:hover{background:#fafaff;}
  .badge{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:var(--radius-pill);font-size:11.5px;font-weight:700;}
  .badge.k1{background:#eef0ef;color:var(--primary);}
  .badge.k2{background:#fff1e6;color:var(--accent);}

  /* modal */
  .modal-overlay{position:fixed;inset:0;background:rgba(30,32,45,.5);display:flex;align-items:center;justify-content:center;z-index:100;animation:fadeIn .2s ease;}
  .modal-box{background:#fff;border-radius:22px;width:460px;max-width:92vw;padding:28px;box-shadow:0 30px 60px rgba(0,0,0,.25);}
  .modal-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px;}
  .modal-head h3{font-size:18px;font-weight:800;margin:0;}
  .modal-close{width:32px;height:32px;border-radius:50%;background:#f0f1f9;display:flex;align-items:center;justify-content:center;}
  .modal-field{display:flex;justify-content:space-between;padding:9px 0;border-bottom:1px dashed #eef0f8;font-size:13.5px;}
  .modal-actions{display:flex;gap:10px;margin-top:20px;}
  .modal-actions button{flex:1;padding:12px;border-radius:var(--radius-pill);font-weight:700;font-size:13.5px;}
  .modal-actions .cancel{background:#f0f1f9;}
  .modal-actions .confirm{background:var(--primary);color:#fff;}

  .toast{position:fixed;left:50%;bottom:32px;transform:translateX(-50%);background:#1c1e27;color:#fff;padding:14px 24px;border-radius:var(--radius-pill);font-size:13.5px;font-weight:600;box-shadow:0 14px 30px rgba(0,0,0,.3);animation:toastSlide .3s ease;z-index:200;display:flex;align-items:center;gap:10px;}
  .toast svg{width:16px;height:16px;color:#3ad98a;}
  .spin{animation:spinSlow 1s linear infinite;}

  @media (max-width:920px){
    .bento{grid-template-columns:repeat(2,1fr);}
    .tile.feature{grid-column:span 2;grid-row:span 1;}
  }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef } = React;

const TREND_LABELS = ['10시','11시','12시','13시','14시','15시','16시'];
const K1_TREND = [12,19,26,31,40,52,61];
const K2_TREND = [8,14,18,27,33,44,58];

const K1_QUESTIONS = [
  { q: '오늘 부스를 방문하신 목적은 무엇인가요?', opts: ['신제품 체험', '기술 상담', '전시 관람', '파트너십 문의'] },
  { q: '가장 관심 있는 제품 카테고리는 무엇인가요?', opts: ['웨어러블', '스마트홈', '모빌리티', '헬스케어'] },
  { q: '오늘 부스 안내는 어느 정도 만족스러우셨나요?', opts: ['매우 만족', '만족', '보통', '아쉬움'] },
  { q: '향후 신제품 소식을 받아보고 싶으신가요?', opts: ['이메일 구독', 'SMS 알림', '앱 푸시', '괜찮습니다'] },
];

const K2_TAGS = [
  { title: '초경량 프레임', desc: '항공 소재 합금으로 기존 대비 무게를 크게 낮춘 프레임 구조를 적용했습니다.', seed:'kiosk-touch-survey-tag-1' },
  { title: '9시간 연속 사용', desc: '고밀도 배터리 셀과 저전력 회로 설계로 하루 종일 충전 없이 사용 가능합니다.', seed:'kiosk-touch-survey-tag-2' },
  { title: '방수 방진 등급', desc: 'IP67 등급 설계로 야외 전시 환경에서도 안정적으로 동작합니다.', seed:'kiosk-touch-survey-tag-3' },
  { title: 'AI 맞춤 추천', desc: '사용 패턴을 학습해 개인화된 설정값을 자동으로 제안합니다.', seed:'kiosk-touch-survey-tag-4' },
  { title: '원터치 페어링', desc: 'NFC 태그 한 번으로 주변 기기와 즉시 연결됩니다.', seed:'kiosk-touch-survey-tag-5' },
  { title: '모듈형 액세서리', desc: '용도에 맞춰 탈부착 가능한 액세서리 라인업을 제공합니다.', seed:'kiosk-touch-survey-tag-6' },
];

function Icon({ name, className }) {
  return <i data-lucide={name} className={className}></i>;
}

function useIcons(deps) {
  useEffect(() => { if (window.lucide) window.lucide.createIcons(); }, deps);
}

function TopNav({ view, setView }) {
  useIcons([]);
  const tabs = [
    { id: 'main', icon: 'layout-grid', label: '실시간 통계 허브 대시보드' },
    { id: 'kiosk1', icon: 'monitor', label: '키오스크 1 순차 설문 진행' },
    { id: 'kiosk2', icon: 'layers', label: '키오스크 2 정보 제공 + 즉시 통계 설문' },
    { id: 'admin', icon: 'sheet', label: '관리자 데이터 관리 · 엑셀 다운로드' },
  ];
  return (
    <header className="topnav">
      <div className="topnav-inner">
        <div className="brand">
          <span className="brand-badge"><Icon name="hand" /></span>
          TouchPoll
        </div>
        <nav className="nav-tabs">
          {tabs.map(t => (
            <button key={t.id} className={'nav-tab' + (view === t.id ? ' active' : '')} onClick={() => setView(t.id)}>
              <Icon name={t.icon} />{t.label}
            </button>
          ))}
        </nav>
      </div>
    </header>
  );
}

function TrendChart() {
  const canvasRef = useRef(null);
  useEffect(() => {
    const ctx = canvasRef.current.getContext('2d');
    const chart = new Chart(ctx, {
      type: 'line',
      data: {
        labels: TREND_LABELS,
        datasets: [
          { label: '키오스크 1', data: K1_TREND, borderColor: '#101010', backgroundColor: 'rgba(16,16,16,.12)', tension: .4, fill: true, pointRadius: 0, borderWidth: 3 },
          { label: '키오스크 2', data: K2_TREND, borderColor: '#3ad98a', backgroundColor: 'rgba(58,217,138,.10)', tension: .4, fill: true, pointRadius: 0, borderWidth: 3 },
        ],
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        plugins: { legend: { position: 'bottom', labels: { usePointStyle: true, boxWidth: 8, font: { family: 'Pretendard', size: 12 } } } },
        scales: { y: { beginAtZero: true, grid: { color: '#f0f1f9' } }, x: { grid: { display: false } } },
      },
    });
    return () => chart.destroy();
  }, []);
  return <div className="chart-box"><canvas ref={canvasRef}></canvas></div>;
}

function Sparkline({ points, color }) {
  const w = 120, h = 34;
  const max = Math.max(...points), min = Math.min(...points);
  const norm = points.map((p, i) => {
    const x = (i / (points.length - 1)) * w;
    const y = h - ((p - min) / (max - min || 1)) * h;
    return x + ',' + y;
  }).join(' ');
  return (
    <svg className="sparkline" viewBox={'0 0 ' + w + ' ' + h} preserveAspectRatio="none">
      <polyline points={norm} fill="none" stroke={color} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" />
    </svg>
  );
}

function Kiosk1Demo() {
  const [stage, setStage] = useState(0); // idle | 0..3 | done — 캡처 시 설문 화면이 바로 보이도록 Q1에서 시작
  const [selected, setSelected] = useState({});
  const [countdown, setCountdown] = useState(6);
  const [ripples, setRipples] = useState([]);

  useEffect(() => {
    if (stage !== 'done') return;
    setCountdown(6);
    const iv = setInterval(() => {
      setCountdown(c => {
        if (c <= 1) { clearInterval(iv); setStage('idle'); setSelected({}); return 6; }
        return c - 1;
      });
    }, 1000);
    return () => clearInterval(iv);
  }, [stage]);

  function fireRipple(e) {
    const id = Date.now();
    const rect = e.currentTarget.getBoundingClientRect();
    setRipples(r => [...r, { id, x: e.clientX - rect.left, y: e.clientY - rect.top }]);
    setTimeout(() => setRipples(r => r.filter(x => x.id !== id)), 600);
  }

  function selectOption(qIndex, opt, e) {
    fireRipple(e);
    setSelected(s => ({ ...s, [qIndex]: opt }));
    setTimeout(() => {
      if (qIndex < K1_QUESTIONS.length - 1) setStage(qIndex + 1);
      else setStage('done');
    }, 420);
  }

  return (
    <div className="kiosk-page">
      <div className="kiosk-page-head">
        <div className="kiosk-page-title"><Icon name="monitor" style={{width:20,height:20,color:'#101010'}} />키오스크 1 순차 설문 진행</div>
        <div className="kiosk-page-desc">22인치 터치 모니터 고정 해상도 화면입니다. 옵션을 터치하면 다음 질문으로 자동 전환됩니다.</div>
      </div>
      <div className="monitor-frame">
        <div className="monitor-bezel-label"><span>22" TOUCH DISPLAY · 1920×1080</span><span>KIOSK-01</span></div>
        <div className="monitor-screen">
          {stage === 'idle' && (
            <div className="k-screen k-idle">
              <h2>제품 만족도 설문에 참여해주세요</h2>
              <p>화면을 터치하면 4개의 간단한 질문이 시작됩니다</p>
              <button className="touch-cta" onClick={(e) => { fireRipple(e); setStage(0); }}>
                {ripples.map(r => <span key={r.id} className="ripple" style={{left:r.x-40,top:r.y-40,width:80,height:80}}></span>)}
                터치하여 시작하기
              </button>
            </div>
          )}
          {typeof stage === 'number' && (
            <div className="k-screen">
              <div className="k-progress">
                {K1_QUESTIONS.map((_, i) => (
                  <div className="k-progress-seg" key={i}>
                    {i <= stage && <div className="k-progress-seg-fill" style={{ '--from': i === stage ? '0%' : '100%', '--to': '100%' }}></div>}
                  </div>
                ))}
              </div>
              <div className="k-qtext">Q{stage + 1}. {K1_QUESTIONS[stage].q}</div>
              <div className="k-options">
                {K1_QUESTIONS[stage].opts.map(opt => (
                  <button key={opt} className={'k-option' + (selected[stage] === opt ? ' selected' : '')} onClick={(e) => selectOption(stage, opt, e)}>
                    {opt}
                  </button>
                ))}
              </div>
              <div className="k-hint">터치하여 항목을 선택하세요 · {stage + 1} / {K1_QUESTIONS.length}</div>
            </div>
          )}
          {stage === 'done' && (
            <div className="k-screen k-done">
              <div className="k-done-icon"><Icon name="check" style={{width:32,height:32}} /></div>
              <h2>설문에 참여해주셔서 감사합니다</h2>
              <p>소중한 의견이 안전하게 저장되었습니다</p>
              <div className="k-countdown">{countdown}초 후 처음 화면으로 자동 복귀합니다</div>
            </div>
          )}
        </div>
      </div>
      <div className="monitor-stand"></div>
    </div>
  );
}

              <div className="k2-dots">
                {K2_TAGS.map((_, i) => <span key={i} className={'k2-dot' + (i === tagIdx ? ' active' : '')}></span>)}
              </div>
              <div className="k2-footer">
                <button className="touch-cta" style={{background:'#3ad98a', boxShadow:'0 14px 30px -10px rgba(58,217,138,.6)'}} onClick={() => setStage('survey')}>설문 참여하기</button>

          )}
          {stage === 'survey' && (
            <div className="k-screen">
              <div className="k-qtext">오늘 살펴본 특장점에 얼마나 만족하시나요?</div>
              <div className="k-options">
                {results.map(r => (
                  <button key={r.label} className="k-option" onClick={() => submitAnswer(r.label)}>{r.label}</button>
                ))}
              </div>
              <div className="k-hint">터치 즉시 실시간 통계 화면으로 이동합니다</div>
            </div>
          )}
          {stage === 'result' && (
            <div className="k-screen">
              <div className="k-qtext" style={{textAlign:'center', fontSize:20}}>실시간 설문 통계</div>
              <div className="k2-result-bars">
                {results.map(r => (
                  <div className="k2-result-row" key={r.label}>
                    <span className="k2-result-label">{r.label}</span>
                    <span className="k2-result-track"><span className="k2-result-fill" style={{ '--to': r.pct + '%', background: r.label === answer ? '#3ad98a' : '#101010' }}></span></span>
                    <span className="k2-result-pct">{r.pct}%</span>

              </div>
              <div className="k2-footer" style={{marginTop:26}}>

              </div>
            </div>
          )}
        </div>
      </div>
      <div className="monitor-stand"></div>
    </div>
  );
}

function AdminPanel({ showToast }) {

  function handleExport() {
    setExporting(true);

        </div>

function App() {

  }

  return (
    <div className="app-shell" data-archetype="bento-grid">
      <TopNav view={view} setView={setView} />
      <main>
        {view === 'main' && <MainDashboard />}
        {view === 'kiosk1' && <Kiosk1Demo />}
        {view === 'kiosk2' && <Kiosk2Demo />}

      </main>
      {toast && (
        <div className="toast"><Icon name="check-circle" />{toast}</div>
      )}
    </div>
  );
}
