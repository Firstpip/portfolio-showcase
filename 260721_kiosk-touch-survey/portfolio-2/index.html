<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PollOps Console — 다중 행사 설문 캠페인 통합 관리 플랫폼</title>
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" rel="stylesheet">
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/regular/style.css">
<style>
  :root{
    --primary:#4255ff;
    --secondary:#d9dde8;
    --accent:#f6741e;
    --bg:#f6f7fb;
    --surface:#ffffff;
    --text:#282e3e;
    --text-2:#586380;
    --radius:8px;
    --shadow-subtle:0 1px 3px rgba(16,16,16,.06), 0 1px 2px rgba(16,16,16,.04);
  }
  *{box-sizing:border-box;}
  html,body{width:100%;margin:0;padding:0;background:var(--bg);color:var(--text);font-family:'Pretendard',-apple-system,sans-serif;-webkit-font-smoothing:antialiased;font-size:13.5px;}
  #root{width:100%;}
  button{font-family:inherit;cursor:pointer;border:none;background:none;}
  input{font-family:inherit;}
  ::-webkit-scrollbar{width:8px;height:8px;}
  ::-webkit-scrollbar-thumb{background:#d5d7dc;border-radius:8px;}

  @keyframes rowFadeIn{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);}}
  @keyframes sparklineDraw{from{stroke-dashoffset:140;}to{stroke-dashoffset:0;}}
  @keyframes badgePulse{0%{box-shadow:0 0 0 0 rgba(224,62,62,.45);}70%{box-shadow:0 0 0 7px rgba(224,62,62,0);}100%{box-shadow:0 0 0 0 rgba(224,62,62,0);}}
  @keyframes drawerSlide{from{transform:translateX(100%);}to{transform:translateX(0);}}
  @keyframes toastSlide{from{opacity:0;transform:translate(-50%,14px);}to{opacity:1;transform:translate(-50%,0);}}
  @keyframes fadeIn{from{opacity:0;}to{opacity:1;}}
  @keyframes spinSlow{from{transform:rotate(0deg);}to{transform:rotate(360deg);}}

  .app-shell{display:flex;width:100%;min-height:100vh;}

  /* ---- sidebar ---- */
  .sidebar{position:fixed;left:0;top:0;bottom:0;width:240px;background:#141414;color:#e8e8e8;display:flex;flex-direction:column;z-index:30;}
  .sidebar-brand{display:flex;align-items:center;gap:10px;padding:20px 20px 16px;font-weight:800;font-size:15px;border-bottom:1px solid #262626;}
  .sidebar-brand i{font-size:19px;color:var(--accent);}
  .env-pill{margin:14px 20px 6px;padding:8px 10px;background:#1f1f1f;border-radius:6px;font-size:11px;color:#9a9a9a;display:flex;align-items:center;justify-content:space-between;}
  .env-pill span.dot{width:6px;height:6px;border-radius:50%;background:var(--accent);display:inline-block;margin-right:6px;}
  .sidebar-section{padding:14px 12px 4px;}
  .sidebar-section-title{font-size:10.5px;color:#7a7a7a;text-transform:uppercase;letter-spacing:.06em;padding:0 10px 8px;font-weight:700;}
  .sidebar-link{display:flex;align-items:center;gap:10px;padding:10px 10px;border-radius:6px;color:#c7c7c7;font-size:12.5px;font-weight:600;width:100%;text-align:left;line-height:1.4;}
  .sidebar-link i{font-size:15px;flex:none;}
  .sidebar-link:hover{background:#1f1f1f;color:#fff;}
  .sidebar-link.active{background:var(--accent);color:#fff;}
  .sidebar-foot{margin-top:auto;padding:16px 20px;font-size:11px;color:#6b6b6b;border-top:1px solid #262626;}

  .main-wrap{margin-left:240px;flex:1;min-width:0;width:calc(100% - 240px);min-height:100vh;background:var(--bg);}
  .content{padding:28px 32px 64px;max-width:1440px;}

  .page-header{margin-bottom:20px;}
  .page-title-row{display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:14px;}
  .page-title{font-size:21px;font-weight:800;letter-spacing:-.01em;}
  .page-meta{color:var(--text-2);font-size:12px;margin-top:6px;}
  .page-actions{display:flex;gap:8px;}
  .btn-secondary{background:#fff;border:1px solid #e2e2e2;color:var(--text);font-weight:600;font-size:12.5px;padding:9px 14px;border-radius:var(--radius);display:inline-flex;align-items:center;gap:6px;}
  .btn-secondary:hover{border-color:#c7c7c7;}
  .btn-primary{background:var(--primary);color:#fff;font-weight:700;font-size:12.5px;padding:9px 16px;border-radius:var(--radius);display:inline-flex;align-items:center;gap:6px;}
  .btn-primary:hover{background:#2b2b2b;}
  .btn-accent{background:var(--accent);color:#fff;font-weight:700;font-size:12.5px;padding:9px 16px;border-radius:var(--radius);display:inline-flex;align-items:center;gap:6px;}

  .control-hero{position:relative;overflow:hidden;background:var(--primary);border-radius:var(--radius);padding:22px 26px;margin-bottom:16px;color:#fff;}
  .control-hero-glow{position:absolute;top:-60px;right:-40px;width:260px;height:260px;border-radius:50%;background:radial-gradient(circle, rgba(58,217,138,.35), transparent 70%);pointer-events:none;}
  .control-hero-label{position:relative;font-size:11px;letter-spacing:.08em;color:#c8cbe6;font-weight:700;display:flex;align-items:center;gap:6px;}
  .control-hero-num{position:relative;font-size:36px;font-weight:800;margin-top:8px;letter-spacing:-.01em;}
  .control-hero-num span{font-size:16px;font-weight:600;margin-left:4px;color:#c8cbe6;}
  .control-hero-sub{position:relative;font-size:12px;color:#c8cbe6;margin-top:6px;max-width:560px;}

  /* KPI stat row */
  .stat-row{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin:18px 0 22px;}
  .stat-card{background:var(--surface);border:1px solid #e8e8e8;border-radius:8px;padding:16px 18px;box-shadow:0 1px 3px rgba(16,16,16,.06), 0 1px 2px rgba(16,16,16,.04);animation:rowFadeIn .4s ease both;}
  .stat-label{font-size:11.5px;color:var(--text-2);font-weight:600;}
  .stat-value{font-size:28px;font-weight:800;margin-top:6px;letter-spacing:-.01em;}
  .stat-delta{font-size:11.5px;font-weight:700;margin-top:4px;display:inline-flex;align-items:center;gap:3px;}
  .stat-delta.positive{color:#178a4c;}
  .stat-delta.negative{color:#c0392b;}
  .stat-sparkline{width:100%;height:26px;margin-top:8px;}
  .stat-sparkline path{stroke-dasharray:140;animation:sparklineDraw 1s ease forwards;}

  .live-split{display:grid;grid-template-columns:1.3fr 1fr;gap:14px;margin-bottom:20px;}
  .live-panel{background:var(--surface);border:1px solid #e8e8e8;border-radius:10px;padding:16px 18px;box-shadow:0 1px 3px rgba(16,16,16,.06), 0 1px 2px rgba(16,16,16,.04);}
  .live-panel-title{font-size:12px;font-weight:700;color:var(--text-2);margin-bottom:12px;display:flex;align-items:center;gap:6px;}
  .live-panel .chart-box{height:200px;}
  .feed-list{display:flex;flex-direction:column;gap:12px;max-height:200px;overflow-y:auto;}
  .feed-item{display:flex;gap:10px;align-items:flex-start;animation:rowFadeIn .35s ease both;}
  .feed-dot{width:8px;height:8px;border-radius:50%;margin-top:5px;flex:none;}
  .feed-dot.info{background:#0099ff;}
  .feed-dot.warn{background:#c98a1c;}
  .feed-dot.danger{background:#e03e3e;animation:badgePulse 1.8s infinite;}
  .feed-dot.ok{background:var(--accent);}
  .feed-text{font-size:12.5px;font-weight:600;}
  .feed-time{font-size:10.5px;color:var(--text-2);margin-top:2px;}

  .layout-2col{display:flex;gap:18px;align-items:flex-start;}
  .data-section{flex:1;min-width:0;}
  .priority-rail{width:270px;flex:none;}
  .rail-card{background:linear-gradient(165deg,#ffffff 0%,#fff4ea 100%);border:1px solid #f0ded0;border-radius:14px;padding:16px;margin-bottom:12px;box-shadow:var(--shadow-subtle);}
  .rail-title{font-size:12px;font-weight:700;color:var(--text-2);text-transform:uppercase;letter-spacing:.04em;margin-bottom:10px;display:flex;align-items:center;gap:6px;}
  .rail-item{padding:10px 0;border-bottom:1px solid #f0f0f0;}
  .rail-item:last-child{border-bottom:none;}
  .rail-item-head{display:flex;justify-content:space-between;align-items:center;font-size:12.5px;font-weight:700;}
  .rail-item-desc{font-size:11.5px;color:var(--text-2);margin:4px 0 8px;}
  .rail-item button{font-size:11px;font-weight:700;color:var(--primary);}
  .sev-dot{width:7px;height:7px;border-radius:50%;background:#e03e3e;display:inline-block;animation:badgePulse 1.8s infinite;}

  .tab-bar{display:flex;gap:4px;border-bottom:1px solid #e2e2e2;margin-bottom:14px;}
  .tab{padding:9px 4px;margin-right:18px;font-size:12.5px;font-weight:700;color:var(--text-2);border-bottom:2px solid transparent;}
  .tab.active{color:var(--text);border-bottom-color:var(--accent);}

  .data-toolbar{display:flex;gap:8px;align-items:center;margin-bottom:14px;flex-wrap:wrap;}
  .search{border:1px solid #e2e2e2;border-radius:var(--radius);padding:8px 12px;font-size:12.5px;min-width:220px;background:#fff;}
  .filter-chip{background:#fff;border:1px solid #e2e2e2;border-radius:var(--radius);padding:8px 12px;font-size:12px;font-weight:600;display:inline-flex;align-items:center;gap:6px;}
  .filter-chip.active{background:#4255ff;color:#fff;border-color:#4255ff;}
  .export-btn{margin-left:auto;background:var(--primary);color:#fff;border-radius:var(--radius);padding:8px 14px;font-size:12px;font-weight:700;display:inline-flex;align-items:center;gap:6px;}

  .data-table-wrap{background:var(--surface);border:1px solid #e8e8e8;border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow-subtle);}
  table{width:100%;border-collapse:collapse;}
  thead th{text-align:left;font-size:10.5px;color:var(--text-2);text-transform:uppercase;letter-spacing:.04em;padding:11px 16px;border-bottom:1px solid #eee;background:#fafafa;}
  tbody td{padding:11px 16px;font-size:12.5px;border-bottom:1px solid #f2f2f2;}
  tbody tr{cursor:pointer;transition:background .12s;animation:rowFadeIn .35s ease both;}
  tbody tr:hover{background:#fafafa;}
  .badge{display:inline-flex;align-items:center;gap:5px;padding:3px 9px;border-radius:20px;font-size:10.5px;font-weight:700;}
  .badge.ok{background:#e6f8ee;color:#178a4c;}
  .badge.warn{background:#fff4e0;color:#a3660b;}
  .badge.danger{background:#fdecec;color:#c0392b;}

  /* drawer */
  .drawer-overlay{position:fixed;inset:0;background:rgba(16,16,16,.35);z-index:100;animation:fadeIn .2s ease;}
  .drawer{position:fixed;top:0;right:0;bottom:0;width:400px;max-width:92vw;background:#fff;box-shadow:-16px 0 40px rgba(0,0,0,.18);z-index:101;animation:drawerSlide .28s ease;padding:24px;overflow-y:auto;}
  .drawer-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px;}
  .drawer-head h3{font-size:16px;font-weight:800;margin:0;}
  .drawer-close{width:30px;height:30px;border-radius:50%;background:#f2f2f2;display:flex;align-items:center;justify-content:center;}
  .drawer-field{display:flex;justify-content:space-between;padding:9px 0;border-bottom:1px dashed #eee;font-size:12.5px;}
  .drawer-actions{display:flex;gap:8px;margin-top:20px;}
  .drawer-actions button{flex:1;padding:10px;border-radius:var(--radius);font-weight:700;font-size:12.5px;}
  .drawer-actions .cancel{background:#f2f2f2;}
  .drawer-actions .confirm{background:var(--accent);color:#fff;}

  /* analytics */
  .compare-head{display:flex;gap:14px;margin-bottom:18px;}
  .compare-select{flex:1;background:#fff;border:1px solid #e2e2e2;border-radius:var(--radius);padding:14px 16px;}
  .compare-select label{font-size:11px;color:var(--text-2);font-weight:700;display:block;margin-bottom:6px;}
  .compare-select select{width:100%;border:none;font-size:13px;font-weight:700;font-family:inherit;background:transparent;}
  .compare-charts{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:20px;}
  .chart-card{background:#fff;border:1px solid #e8e8e8;border-radius:var(--radius);padding:16px;box-shadow:var(--shadow-subtle);}
  .chart-card-title{font-size:12px;font-weight:700;color:var(--text-2);margin-bottom:10px;}
  .chart-box{position:relative;height:220px;}

  /* alerts */
  .alert-list{display:flex;flex-direction:column;gap:10px;}
  .alert-card{background:#fff;border:1px solid #e8e8e8;border-left:3px solid #e03e3e;border-radius:var(--radius);padding:16px 18px;display:flex;justify-content:space-between;align-items:center;box-shadow:var(--shadow-subtle);animation:rowFadeIn .35s ease both;}
  .alert-card.medium{border-left-color:#c98a1c;}
  .alert-card.low{border-left-color:#0099ff;}
  .alert-info h4{margin:0 0 4px;font-size:13.5px;font-weight:700;}
  .alert-info p{margin:0;font-size:11.5px;color:var(--text-2);}
  .rules-panel{background:#fff;border:1px solid #e8e8e8;border-radius:var(--radius);padding:18px;margin-top:22px;box-shadow:var(--shadow-subtle);}
  .rule-row{display:flex;justify-content:space-between;align-items:center;padding:11px 0;border-bottom:1px solid #f0f0f0;}
  .rule-row:last-child{border-bottom:none;}
  .toggle{width:38px;height:22px;border-radius:20px;background:#e2e2e2;position:relative;transition:background .2s;flex:none;}
  .toggle.on{background:var(--accent);}
  .toggle-knob{width:16px;height:16px;border-radius:50%;background:#fff;position:absolute;top:3px;left:3px;transition:left .2s;box-shadow:0 1px 3px rgba(0,0,0,.3);}
  .toggle.on .toggle-knob{left:19px;}

  /* archive */
  .archive-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;}
  .archive-card{background:#fff;border:1px solid #e8e8e8;border-radius:var(--radius);padding:16px;box-shadow:var(--shadow-subtle);animation:rowFadeIn .35s ease both;}
  .archive-card h4{margin:0 0 6px;font-size:13.5px;font-weight:700;}
  .archive-card p{margin:0 0 12px;font-size:11.5px;color:var(--text-2);}
  .archive-actions{display:flex;gap:8px;}
  .archive-actions button{flex:1;font-size:11.5px;font-weight:700;padding:8px;border-radius:var(--radius);background:#f2f2f2;}

  /* modal (format select) */
  .modal-overlay{position:fixed;inset:0;background:rgba(16,16,16,.4);display:flex;align-items:center;justify-content:center;z-index:110;animation:fadeIn .2s ease;}
  .modal-box{background:#fff;border-radius:12px;width:380px;max-width:92vw;padding:24px;box-shadow:0 24px 50px rgba(0,0,0,.25);}
  .modal-box h3{margin:0 0 14px;font-size:15px;font-weight:800;}
  .format-opt{display:flex;align-items:center;gap:10px;border:1px solid #e2e2e2;border-radius:var(--radius);padding:12px 14px;margin-bottom:8px;font-size:12.5px;font-weight:600;}
  .format-opt.selected{border-color:var(--accent);background:#fff4ea;}
  .modal-actions{display:flex;gap:8px;margin-top:16px;}
  .modal-actions button{flex:1;padding:10px;border-radius:var(--radius);font-weight:700;font-size:12.5px;}
  .modal-actions .cancel{background:#f2f2f2;}
  .modal-actions .confirm{background:var(--primary);color:#fff;}

  .toast{position:fixed;left:calc(240px + (100% - 240px)/2);bottom:28px;transform:translateX(-50%);background:#101010;color:#fff;padding:12px 20px;border-radius:8px;font-size:12.5px;font-weight:600;box-shadow:0 14px 30px rgba(0,0,0,.3);animation:toastSlide .3s ease;z-index:200;display:flex;align-items:center;gap:8px;}
  .toast i{color:var(--accent);}
  .spin{animation:spinSlow 1s linear infinite;display:inline-block;}

  @media (max-width:1100px){
    .stat-row{grid-template-columns:repeat(2,1fr);}
    .compare-charts{grid-template-columns:1fr;}
    .layout-2col{flex-direction:column;}
    .priority-rail{width:100%;}
    .archive-grid{grid-template-columns:repeat(2,1fr);}
  }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef } = React;

function Spark({ points, color }) {
  const w = 100, h = 26;
  const max = Math.max(...points), min = Math.min(...points);
  const d = points.map((p, i) => {
    const x = (i / (points.length - 1)) * w;
    const y = h - ((p - min) / (max - min || 1)) * (h - 4) - 2;
    return (i === 0 ? 'M' : 'L') + x + ',' + y;
  }).join(' ');
  return (
    <svg className="stat-sparkline" viewBox={'0 0 ' + w + ' ' + h} preserveAspectRatio="none">
      <path d={d} fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" />
    </svg>
  );
}

const RULES = [

  { id: 2, type: 'ok', text: 'EV-24 · KIOSK-24-C 응답 1,000건 돌파', time: '2분 전' },
  { id: 3, type: 'info', text: 'EV-22 · 신규 키오스크 온라인 전환', time: '5분 전' },

const ARCHIVES = [
  { id: 'AR-11', name: '2025 리빙테크 박람회', period: '2025.11.02 ~ 2025.11.05', total: '3,214건' },

            <p>{a.period} · 누적 {a.total}</p>
            <div className="archive-actions">
              <button onClick={() => showToast(a.name + ' 상세 리포트를 열었습니다')}>상세 보기</button>
              <button onClick={() => setExportTarget(a)}>내보내기</button>
            </div>
          </div>
        ))}
      </div>

      {exportTarget && (
        <div className="modal-overlay" onClick={() => setExportTarget(null)}>
          <div className="modal-box" onClick={e => e.stopPropagation()}>
            <h3>{exportTarget.name} 리포트 내보내기</h3>
            <div className={'format-opt' + (format === 'xlsx' ? ' selected' : '')} onClick={() => setFormat('xlsx')}>
              <i className="ph ph-file-xls"></i>엑셀(.xlsx) 형식으로 내보내기
            </div>
            <div className={'format-opt' + (format === 'pdf' ? ' selected' : '')} onClick={() => setFormat('pdf')}>
              <i className="ph ph-file-pdf"></i>PDF 형식으로 내보내기
            </div>
            <div className="modal-actions">
              <button className="cancel" onClick={() => setExportTarget(null)}>취소</button>
              <button className="confirm" onClick={confirmExport}>생성하기</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

function App() {
  const [view, setView] = useState('main');
  const [toast, setToast] = useState(null);

  function showToast(msg) {
    setToast(msg);
    setTimeout(() => setToast(null), 2600);
  }

  return (
    <div className="app-shell" data-archetype="stripe-multipane">
      <Sidebar view={view} setView={setView} />
      <div className="main-wrap">
        {view === 'main' && <MainConsole showToast={showToast} />}
        {view === 'analytics' && <AnalyticsView showToast={showToast} />}
        {view === 'alerts' && <AlertsView showToast={showToast} />}
        {view === 'archive' && <ArchiveView showToast={showToast} />}
      </div>
      {toast && <div className="toast"><i className="ph ph-check-circle"></i>{toast}</div>}
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
