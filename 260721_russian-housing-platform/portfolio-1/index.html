<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>미르하우징 — 이주민 다국어 부동산 매물 플랫폼</title>
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
<link rel="stylesheet" href="https://unpkg.com/@tabler/icons-webfont@2.47.0/dist/tabler-icons.min.css" />
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
:root{
  --ink:#17191c; --paper:#ffffff; --mist:#f2f2f3; --fog:#fafafb;
  --slate:#777b86; --ash:#979799; --smoke:#a3a6af; --peach:#fbe1d1; --sienna:#5d2a1a;
  --hairline:#ececec;
  --shadow-artifact:0 0 0 1px rgba(4,23,43,.05),0 20px 25px -5px rgba(0,0,0,.1),0 8px 10px -6px rgba(0,0,0,.1);
  --shadow-soft:0 1px 3px rgba(0,0,0,.06);
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{width:100%;min-height:100vh;}
body{font-family:'Pretendard',-apple-system,BlinkMacSystemFont,sans-serif;background:var(--paper);color:var(--ink);-webkit-font-smoothing:antialiased;}
button{font-family:inherit;cursor:pointer;background:none;border:none;}
input{font-family:inherit;}
::-webkit-scrollbar{height:6px;width:6px;}
::-webkit-scrollbar-thumb{background:var(--smoke);border-radius:9999px;}

@keyframes fadeInUp{from{opacity:0;transform:translateY(14px);}to{opacity:1;transform:translateY(0);}}
@keyframes shimmer{0%{background-position:-200px 0;}100%{background-position:200px 0;}}
@keyframes pulseDot{0%,100%{opacity:1;transform:scale(1);}50%{opacity:.55;transform:scale(1.25);}}
@keyframes floatArtifact{0%,100%{transform:translateY(0);}50%{transform:translateY(-6px);}}
@keyframes ripple{from{transform:scale(0);opacity:.5;}to{transform:scale(2.6);opacity:0;}}

.app{min-height:100vh;display:flex;flex-direction:column;animation:fadeInUp .5s ease both;}

/* ---- search header (archetype signature) ---- */
.search-header{position:sticky;top:0;z-index:50;background:rgba(255,255,255,.92);backdrop-filter:blur(10px);border-bottom:1px solid var(--hairline);}
.header-row{max-width:1240px;margin:0 auto;display:flex;align-items:center;gap:24px;padding:14px 24px;}
.brand{display:flex;flex-direction:column;line-height:1.1;flex-shrink:0;}
.brand-name{font-size:20px;font-weight:700;letter-spacing:-.02em;color:var(--ink);}
.brand-sub{font-size:10px;letter-spacing:.14em;color:var(--ash);font-weight:500;}
.search-bar{flex:1;display:flex;align-items:stretch;background:var(--paper);border:1px solid var(--hairline);border-radius:9999px;box-shadow:var(--shadow-soft);max-width:560px;}
.search-segment{flex:1;display:flex;flex-direction:column;align-items:flex-start;gap:2px;padding:8px 20px;border-radius:9999px;transition:background .2s;text-align:left;}
.search-segment:hover{background:var(--mist);}
.search-segment.active{background:var(--mist);}
.segment-label{font-size:11px;font-weight:600;color:var(--ink);}
.segment-value{font-size:12px;color:var(--slate);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:120px;}
.search-divider{width:1px;background:var(--hairline);margin:8px 0;}
.search-submit{width:40px;height:40px;border-radius:9999px;background:var(--ink);color:#fff;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin:6px 6px 6px 0;transition:transform .15s;}
.search-submit:hover{transform:scale(1.06);}
.header-nav{display:flex;align-items:center;gap:8px;flex-shrink:0;}
.lang-toggle{display:flex;border:1px solid var(--hairline);border-radius:9999px;overflow:hidden;}
.lang-btn{padding:8px 14px;font-size:12px;font-weight:600;color:var(--slate);}
.lang-btn.active{background:var(--ink);color:#fff;}
.nav-link{padding:8px 14px;font-size:14px;font-weight:500;color:var(--ink);border-radius:9999px;}
.nav-link:hover{background:var(--mist);}
.btn-pill-filled{background:var(--ink);color:#fff;border-radius:9999px;padding:10px 20px;font-size:14px;font-weight:500;position:relative;overflow:hidden;}
.btn-pill-ghost{background:transparent;color:var(--ink);border:1px solid var(--ink);border-radius:9999px;padding:9px 19px;font-size:14px;font-weight:500;}

.filter-chips{max-width:1240px;margin:0 auto;display:flex;gap:8px;padding:0 24px 14px;overflow-x:auto;}
.chip{display:flex;align-items:center;gap:6px;padding:8px 16px;border:1px solid var(--hairline);border-radius:9999px;font-size:13px;font-weight:500;color:var(--slate);white-space:nowrap;flex-shrink:0;transition:all .15s;}
.chip:hover{background:var(--mist);}
.chip.active{background:var(--ink);color:#fff;border-color:var(--ink);}

/* ---- main ---- */
.main{flex:1;max-width:1240px;margin:0 auto;width:100%;padding:28px 24px 80px;}
.promo-card{background:var(--peach);color:var(--sienna);border-radius:24px;padding:28px 32px;display:flex;align-items:center;justify-content:space-between;gap:24px;margin-bottom:32px;animation:fadeInUp .6s ease both;}
.promo-title{font-size:20px;font-weight:600;margin-bottom:6px;}
.promo-desc{font-size:14px;opacity:.85;max-width:520px;}
.promo-tags{display:flex;gap:8px;flex-wrap:wrap;}
.promo-tag{background:rgba(93,42,26,.1);padding:6px 12px;border-radius:9999px;font-size:12px;font-weight:600;}

.section-toolbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;}
.section-title{font-size:18px;font-weight:700;}
.section-count{font-size:13px;color:var(--slate);font-weight:400;margin-left:8px;}
.map-toggle{display:flex;align-items:center;gap:6px;border:1px solid var(--hairline);border-radius:9999px;padding:9px 16px;font-size:13px;font-weight:600;}
.map-toggle:hover{background:var(--mist);}

.grid-map-split{display:grid;grid-template-columns:1fr 420px;gap:24px;align-items:start;}
.card-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(272px,1fr));gap:22px;}
.listing-card{border-radius:24px;overflow:hidden;background:var(--paper);border:1px solid var(--hairline);cursor:pointer;transition:transform .2s,box-shadow .2s;animation:fadeInUp .5s ease both;}
.listing-card:hover{transform:translateY(-4px) scale(1.01);box-shadow:var(--shadow-artifact);}
.card-image-wrap{position:relative;aspect-ratio:4/3;overflow:hidden;}
.card-image{width:100%;height:100%;display:flex;align-items:center;justify-content:center;position:relative;}
.card-image::after{content:'';position:absolute;inset:0;background:linear-gradient(120deg,transparent 35%,rgba(255,255,255,.35) 50%,transparent 65%);background-size:200px 100%;animation:shimmer 3.6s ease-in-out infinite;}
.card-image i{font-size:46px;color:rgba(23,25,28,.16);}
.card-favorite{position:absolute;top:12px;right:12px;width:32px;height:32px;border-radius:9999px;background:rgba(255,255,255,.85);display:flex;align-items:center;justify-content:center;font-size:16px;color:var(--ink);transition:transform .15s;}
.card-favorite:hover{transform:scale(1.12);}
.card-favorite.active{color:#c0392b;}
.card-badge{position:absolute;top:12px;left:12px;background:var(--ink);color:#fff;font-size:11px;font-weight:600;padding:4px 10px;border-radius:9999px;}
.card-body{padding:14px 16px 18px;}
.card-row-1{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;margin-bottom:4px;}
.card-title{font-size:15px;font-weight:600;line-height:1.35;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.card-rating{font-size:13px;font-weight:600;color:var(--ink);flex-shrink:0;display:flex;align-items:center;gap:3px;}
.card-meta{font-size:12.5px;color:var(--slate);display:block;margin-bottom:2px;}
.card-tags{display:flex;gap:6px;margin:8px 0 6px;flex-wrap:wrap;}
.card-tag{font-size:11px;color:var(--ash);background:var(--mist);padding:3px 8px;border-radius:9999px;}
.card-row-4{display:flex;align-items:baseline;gap:6px;margin-top:6px;}
.card-price{font-size:16px;font-weight:700;}
.price-unit{font-size:12px;color:var(--slate);}

.map-pane{position:sticky;top:100px;border-radius:24px;border:1px solid var(--hairline);background:var(--fog);overflow:hidden;height:560px;}
.map-canvas{position:relative;width:100%;height:100%;background:
  radial-gradient(circle at 20% 30%, rgba(251,225,209,.6), transparent 40%),
  radial-gradient(circle at 75% 65%, rgba(151,151,153,.14), transparent 45%),
  var(--fog);}
.map-grid-line{position:absolute;background:rgba(23,25,28,.05);}
.map-pin{position:absolute;width:30px;height:30px;border-radius:9999px 9999px 9999px 0;background:var(--ink);transform:translate(-50%,-100%) rotate(45deg);display:flex;align-items:center;justify-content:center;transition:all .2s;box-shadow:0 4px 10px rgba(0,0,0,.2);}
.map-pin span{transform:rotate(-45deg);color:#fff;font-size:10px;font-weight:700;}
.map-pin:hover,.map-pin.active{background:var(--sienna);transform:translate(-50%,-100%) rotate(45deg) scale(1.18);}
.map-toggle-close{position:absolute;bottom:16px;left:16px;background:var(--paper);border:1px solid var(--hairline);border-radius:9999px;padding:9px 16px;font-size:13px;font-weight:600;box-shadow:var(--shadow-soft);}

/* ---- generic screen shell ---- */
.screen-header{margin-bottom:28px;}
.screen-title{font-size:26px;font-weight:700;letter-spacing:-.01em;margin-bottom:6px;}
.screen-desc{font-size:14.5px;color:var(--slate);max-width:640px;line-height:1.5;}

/* ---- listing register (wizard) ---- */
.register-layout{display:grid;grid-template-columns:1.4fr 1fr;gap:32px;align-items:start;}
.stepper{display:flex;gap:0;margin-bottom:28px;}
.step-item{flex:1;display:flex;align-items:center;gap:10px;}
.step-num{width:30px;height:30px;border-radius:9999px;background:var(--mist);color:var(--slate);font-size:13px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .2s;}
.step-item.done .step-num{background:var(--ink);color:#fff;}
.step-item.active .step-num{background:var(--ink);color:#fff;animation:pulseDot 1.6s ease-in-out infinite;}
.step-label{font-size:13px;font-weight:600;color:var(--slate);}
.step-item.active .step-label,.step-item.done .step-label{color:var(--ink);}
.step-line{flex:1;height:1px;background:var(--hairline);margin:0 8px;}
.form-card{background:var(--paper);border:1px solid var(--hairline);border-radius:24px;padding:28px;}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
.form-field{display:flex;flex-direction:column;gap:6px;}
.form-field.full{grid-column:1/-1;}
.form-field label{font-size:12.5px;font-weight:600;color:var(--slate);}
.form-field input,.form-field select,.form-field textarea{border:1px solid var(--hairline);border-radius:16px;padding:12px 14px;font-size:14px;color:var(--ink);background:var(--fog);}
.form-field input:focus,.form-field select:focus,.form-field textarea:focus{outline:2px solid var(--ink);outline-offset:1px;background:var(--paper);}
.form-field.error input{outline:1.5px solid #c0392b;}
.field-error{font-size:11.5px;color:#c0392b;}
.upload-zone{border:1.5px dashed var(--smoke);border-radius:16px;padding:28px;text-align:center;color:var(--slate);font-size:13px;background:var(--fog);}
.upload-thumbs{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap;}
.upload-thumb{width:64px;height:64px;border-radius:12px;background:var(--mist);display:flex;align-items:center;justify-content:center;color:var(--ash);position:relative;}
.upload-thumb button{position:absolute;top:-6px;right:-6px;width:18px;height:18px;background:var(--ink);color:#fff;border-radius:9999px;font-size:10px;display:flex;align-items:center;justify-content:center;}
.form-actions{display:flex;justify-content:flex-end;gap:10px;margin-top:24px;}
.status-list{display:flex;flex-direction:column;gap:12px;}
.status-card{background:var(--fog);border:1px solid var(--hairline);border-radius:16px;padding:14px 16px;}
.status-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;}
.status-title{font-size:13.5px;font-weight:600;}
.status-badge{font-size:11px;font-weight:700;padding:4px 10px;border-radius:9999px;}
.status-badge.pending{background:#fef3c7;color:#92400e;}
.status-badge.approved{background:#dcfce7;color:#166534;}
.status-badge.rejected{background:#fee2e2;color:#991b1b;}
.status-meta{font-size:12px;color:var(--slate);}
.confirm-banner{margin-top:18px;background:var(--peach);color:var(--sienna);border-radius:16px;padding:14px 18px;font-size:13.5px;font-weight:600;display:flex;align-items:center;gap:8px;animation:fadeInUp .4s ease both;}

/* ---- signup ---- */
.role-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:28px;}
.role-card{border:1.5px solid var(--hairline);border-radius:20px;padding:22px 18px;text-align:left;transition:all .15s;background:var(--paper);}
.role-card:hover{border-color:var(--ash);}
.role-card.active{border-color:var(--ink);background:var(--fog);box-shadow:var(--shadow-artifact);}
.role-icon{width:40px;height:40px;border-radius:9999px;background:var(--mist);display:flex;align-items:center;justify-content:center;margin-bottom:12px;font-size:19px;}
.role-card.active .role-icon{background:var(--ink);color:#fff;}
.role-title{font-size:14.5px;font-weight:700;margin-bottom:4px;}
.role-desc{font-size:12.5px;color:var(--slate);line-height:1.4;}

/* ---- board ---- */
.board-layout{display:grid;grid-template-columns:1fr;gap:12px;}
.post-card{border:1px solid var(--hairline);border-radius:16px;padding:18px 20px;background:var(--paper);cursor:pointer;transition:box-shadow .15s;}
.post-card:hover{box-shadow:var(--shadow-soft);}
.post-top{display:flex;justify-content:space-between;align-items:flex-start;gap:12px;}
.post-cat{font-size:11px;font-weight:700;color:var(--sienna);background:var(--peach);padding:3px 10px;border-radius:9999px;display:inline-block;margin-bottom:8px;}
.post-title{font-size:15.5px;font-weight:700;margin-bottom:4px;}
.post-excerpt{font-size:13px;color:var(--slate);line-height:1.5;}
.post-lang-badge{font-size:10.5px;font-weight:700;color:var(--slate);border:1px solid var(--hairline);padding:3px 8px;border-radius:9999px;flex-shrink:0;white-space:nowrap;}
.post-date{font-size:11.5px;color:var(--ash);margin-top:10px;}
.post-detail{margin-top:14px;padding-top:14px;border-top:1px solid var(--hairline);font-size:13.5px;line-height:1.7;color:var(--ink);animation:fadeInUp .3s ease both;}

.footer{border-top:1px solid var(--hairline);padding:32px 24px;}
.footer-cols{max-width:1240px;margin:0 auto;display:flex;gap:64px;flex-wrap:wrap;}
.footer-col h4{font-size:12px;color:var(--ash);margin-bottom:10px;font-weight:600;}
.footer-col a{display:block;font-size:13px;color:var(--slate);margin-bottom:6px;}
.footer-copy{max-width:1240px;margin:24px auto 0;font-size:11.5px;color:var(--smoke);padding-top:16px;border-top:1px solid var(--hairline);}

@media (max-width:860px){
  .header-row{flex-wrap:wrap;}
  .search-bar{order:3;max-width:none;width:100%;}
  .register-layout{grid-template-columns:1fr;}
  .grid-map-split{grid-template-columns:1fr;}
  .role-grid{grid-template-columns:1fr;}
  .form-grid{grid-template-columns:1fr;}
}
</style>
</head>
<body data-archetype="airbnb-search-grid">
<div id="root"></div>
<script type="text/babel">
const {useState} = React;

const T = {
  ko:{brand:'미르하우징', brandSub:'MIR HOUSING', navRegister:'매물 등록', navBoard:'생활정보', navLogin:'로그인', navSignup:'회원가입',

  },

    segLoc:'Район', segLocVal:'Ансан · Инчхон · Кимпхо', segPrice:'Цена', segPriceVal:'Залог · аренда', segType:'Тип', segTypeVal:'Все типы',

  }
};

const AREAS = ['안산 원곡동','인천 부평','김포 장기동','화성 향남','평택 신장동','수원 권선','파주 문산','남양주 마석','시흥 정왕동','안양 안양동'];
const AREAS_RU = ['Вонгок-дон, Ансан','Пупхён, Инчхон','Чангидон, Кимпхо','Хянгнам, Хвасон','Синчжан-дон, Пхёнтхэк','Квонсон, Сувон','Мунсан, Пхаджу','Масок, Намьянджу','Чонвандон, Сихын','Анъяндон, Аньян'];
const TYPES = ['원룸','투룸','오피스텔','아파트','상가'];
const ICONS = ['ti-home','ti-building-skyscraper','ti-building-estate','ti-home-2','ti-building-store'];

function makeListings(){
  const arr = [];
  for(let i=0;i<10;i++){
    arr.push({
      id:i+1,
      titleKo:`${AREAS[i]} ${TYPES[i%TYPES.length]} 매물`,
      titleRu:`${AREAS_RU[i]} — ${TYPES[i%TYPES.length]}`,
      area:AREAS[i], areaRu:AREAS_RU[i],
      type:TYPES[i%TYPES.length],
      price:`보증금 ${300+i*80} · 월 ${35+i*4}`,
      priceRu:`Залог ${300+i*80} · аренда ${35+i*4}`,
      rating:(4.4+((i%5)*0.1)).toFixed(1),
      tags: i%3===0 ? ['즉시입주','반려동물가능'] : (i%3===1? ['즉시입주']:['반려동물가능']),
      icon:ICONS[i%ICONS.length],
      top: 12+((i*8)%70), left: 10+((i*13)%75)
    });
  }
  return arr;
}

    <header className="search-header">
      <div className="header-row">
        <div className="brand" onClick={()=>setScreen('main')} style={{cursor:'pointer'}}>
          <span className="brand-name">{t.brand}</span>
          <span className="brand-sub">{t.brandSub}</span>
        </div>
        <div className="search-bar">
          <button className={"search-segment"+(activeSeg===0?' active':'')} onClick={()=>setActiveSeg(activeSeg===0?-1:0)}>
            <span className="segment-label">{t.segLoc}</span><span className="segment-value">{t.segLocVal}</span>
          </button>
          <div className="search-divider"></div>
          <button className={"search-segment"+(activeSeg===1?' active':'')} onClick={()=>setActiveSeg(activeSeg===1?-1:1)}>
            <span className="segment-label">{t.segPrice}</span><span className="segment-value">{t.segPriceVal}</span>
          </button>
          <div className="search-divider"></div>
          <button className={"search-segment"+(activeSeg===2?' active':'')} onClick={()=>setActiveSeg(activeSeg===2?-1:2)}>
            <span className="segment-label">{t.segType}</span><span className="segment-value">{t.segTypeVal}</span>
          </button>
          <button className="search-submit" onClick={()=>setScreen('main')} title="검색"><i className="ti ti-search" style={{fontSize:16}}></i></button>
        </div>
        <div className="header-nav">

            <button className={"lang-btn"+(lang==='ko'?' active':'')} onClick={()=>setLang('ko')}>KO</button>
            <button className={"lang-btn"+(lang==='ru'?' active':'')} onClick={()=>setLang('ru')}>RU</button>

function RegisterScreen({lang}){
  const t = T[lang];
  const [step,setStep] = useState(0);
  const [form,setForm] = useState({title:'',area:'',price:'',desc:''});
  const [errors,setErrors] = useState({});
  const [photos,setPhotos] = useState([]);
  const [submitted,setSubmitted] = useState(false);

  const existing = [
    {title:'인천 부평 오피스텔', status:'approved', when:'2026.07.15 승인'},
    {title:'김포 장기동 투룸', status:'pending', when:'2026.07.19 접수'},
    {title:'화성 향남 원룸', status:'rejected', when:'2026.07.10 반려 · 사진 누락'}
  ];

  function validateStep0(){
    const e = {};
    if(!form.title) e.title = lang==='ko'?'제목을 입력해 주세요':'Введите название';
    if(!form.area) e.area = lang==='ko'?'지역을 입력해 주세요':'Введите район';
    if(!form.price) e.price = lang==='ko'?'가격을 입력해 주세요':'Введите цену';
    setErrors(e);
    return Object.keys(e).length===0;
  }

  function next(){
    if(step===0 && !validateStep0()) return;
    if(step<2) setStep(step+1);
    else { setSubmitted(true); }
  }

  return (
    <div className="main">
      <div className="screen-header">
        <div className="screen-title">{t.registerTitle}</div>
        <div className="screen-desc">{t.registerDesc}</div>
      </div>
      <div className="register-layout">
        <div>
          <div className="stepper">
            {t.steps.map((s,i)=>(
              <React.Fragment key={i}>
                <div className={"step-item"+(i<step?' done':'')+(i===step?' active':'')}>
                  <div className="step-num">{i<step?<i className="ti ti-check" style={{fontSize:14}}></i>:i+1}</div>
                  <span className="step-label">{s}</span>
                </div>
                {i<2 && <div className="step-line"></div>}
              </React.Fragment>
            ))}
          </div>
          <div className="form-card">
            {step===0 && (
              <div className="form-grid">
                <div className={"form-field full"+(errors.title?' error':'')}>
                  <label>{lang==='ko'?'매물 제목':'Название'}</label>
                  <input value={form.title} onChange={e=>setForm({...form,title:e.target.value})} placeholder={lang==='ko'?'예: 안산 원곡동 리모델링 원룸':'напр. Студия в Ансане'}/>
                  {errors.title && <span className="field-error">{errors.title}</span>}
                </div>
                <div className={"form-field"+(errors.area?' error':'')}>
                  <label>{lang==='ko'?'지역':'Район'}</label>
                  <input value={form.area} onChange={e=>setForm({...form,area:e.target.value})} placeholder={lang==='ko'?'예: 안산 원곡동':'напр. Ансан'}/>
                  {errors.area && <span className="field-error">{errors.area}</span>}
                </div>
                <div className="form-field">
                  <label>{lang==='ko'?'매물 유형':'Тип'}</label>
                  <select value={form.type} onChange={e=>setForm({...form,type:e.target.value})}>
                    {TYPES.map(tp=>(<option key={tp}>{tp}</option>))}
                  </select>
                </div>
                <div className={"form-field full"+(errors.price?' error':'')}>
                  <label>{lang==='ko'?'보증금 / 월세':'Залог / аренда'}</label>
                  <input value={form.price} onChange={e=>setForm({...form,price:e.target.value})} placeholder="보증금 500 · 월 45"/>
                  {errors.price && <span className="field-error">{errors.price}</span>}
                </div>
              </div>
            )}
            {step===1 && (
              <div>
                <div className="form-field full" style={{marginBottom:16}}>
                  <label>{lang==='ko'?'상세 설명':'Описание'}</label>
                  <textarea rows="4" value={form.desc} onChange={e=>setForm({...form,desc:e.target.value})} placeholder={lang==='ko'?'매물 특징을 입력해 주세요':'Опишите объект'}></textarea>
                </div>
                <div className="upload-zone" onClick={()=>setPhotos([...photos, photos.length+1])}>
                  <i className="ti ti-photo-plus" style={{fontSize:22,marginBottom:6,display:'block',margin:'0 auto 6px'}}></i>
                  {lang==='ko'?'클릭하여 사진을 추가합니다 (최대 10장)':'Нажмите, чтобы добавить фото'}
                </div>
                {photos.length>0 && (
                  <div className="upload-thumbs">
                    {photos.map((p,i)=>(
                      <div key={i} className="upload-thumb">
                        <i className="ti ti-photo"></i>
                        <button onClick={(e)=>{e.stopPropagation();setPhotos(photos.filter((_,pi)=>pi!==i));}}>✕</button>
                      </div>
                    ))}
                  </div>
                )}
              </div>
            )}
            {step===2 && (
              <div>
                <div className="status-card" style={{marginBottom:0}}>
                  <div className="status-row"><span className="status-title">{form.title || (lang==='ko'?'(제목 미입력)':'(без названия)')}</span></div>
                  <span className="status-meta">{form.area} · {form.price} · {photos.length}{lang==='ko'?'장 첨부':' фото'}</span>
                </div>
              </div>
            )}
            <div className="form-actions">
              {step>0 && <button className="btn-pill-ghost" onClick={()=>setStep(step-1)}>{lang==='ko'?'이전':'Назад'}</button>}
              <button className="btn-pill-filled" onClick={next}>{step<2? (lang==='ko'?'다음':'Далее') : (lang==='ko'?'제출':'Отправить')}</button>
            </div>
            {submitted && (
              <div className="confirm-banner"><i className="ti ti-circle-check-filled"></i>{lang==='ko'?'매물 등록이 접수되어 승인 대기 상태로 전환됩니다.':'Заявка принята и переведена в статус ожидания.'}</div>
            )}
          </div>
        </div>
        <div>
          <div className="section-title" style={{marginBottom:14,fontSize:15}}>{lang==='ko'?'내 등록 현황':'Мои заявки'}</div>
          <div className="status-list">
            {existing.map((s,i)=>(
              <div key={i} className="status-card">
                <div className="status-row">
                  <span className="status-title">{s.title}</span>
                  <span className={"status-badge "+s.status}>{s.status==='approved'?(lang==='ko'?'승인':'Одобрено'):s.status==='pending'?(lang==='ko'?'대기':'Ожидание'):(lang==='ko'?'반려':'Отказ')}</span>
                </div>
                <span className="status-meta">{s.when}</span>
              </div>
            ))}
          </div>
        </div>
      </div>
    </div>
  );
}

function SignupScreen({lang}){
  const t = T[lang];
  const roles = [
    {id:'user', icon:'ti-user', titleKo:'일반회원', titleRu:'Пользователь', descKo:'매물을 검색하고 생활정보를 열람합니다.', descRu:'Поиск объектов и просмотр информации.'},
    {id:'agent', icon:'ti-building-bank', titleKo:'공인중개사', titleRu:'Агент', descKo:'매물을 직접 등록하고 광고 상품을 구매합니다.', descRu:'Регистрация объектов и покупка рекламы.'},
    {id:'landlord', icon:'ti-key', titleKo:'임대인', titleRu:'Арендодатель', descKo:'보유 매물을 등록하고 문의를 관리합니다.', descRu:'Регистрация объектов и обработка запросов.'}
  ];
  const [role,setRole] = useState('user');
  const [form,setForm] = useState({name:'',email:'',bizNo:''});
  const [done,setDone] = useState(false);

  return (
    <div className="main" style={{maxWidth:760}}>
      <div className="screen-header">
        <div className="screen-title">{t.signupTitle}</div>
        <div className="screen-desc">{t.signupDesc}</div>
      </div>
      <div className="role-grid">
        {roles.map(r=>(
          <button key={r.id} className={"role-card"+(role===r.id?' active':'')} onClick={()=>setRole(r.id)}>
            <div className="role-icon"><i className={"ti "+r.icon}></i></div>
            <div className="role-title">{lang==='ko'?r.titleKo:r.titleRu}</div>
            <div className="role-desc">{lang==='ko'?r.descKo:r.descRu}</div>
          </button>
        ))}
      </div>
      <div className="form-card">
        <div className="form-grid">
          <div className="form-field">
            <label>{lang==='ko'?'이름':'Имя'}</label>
            <input value={form.name} onChange={e=>setForm({...form,name:e.target.value})} placeholder={lang==='ko'?'홍길동':'Имя Фамилия'}/>
          </div>
          <div className="form-field">
            <label>{lang==='ko'?'이메일':'Email'}</label>
            <input value={form.email} onChange={e=>setForm({...form,email:e.target.value})} placeholder="name@example.com"/>
          </div>
          {role!=='user' && (
            <div className="form-field full">
              <label>{lang==='ko'?'사업자등록번호':'Регистрационный номер'}</label>
              <input value={form.bizNo} onChange={e=>setForm({...form,bizNo:e.target.value})} placeholder="000-00-00000"/>
            </div>
          )}
        </div>
        <div className="form-actions">
          <button className="btn-pill-filled" onClick={()=>setDone(true)}>{lang==='ko'?'가입 신청':'Зарегистрироваться'}</button>
        </div>
        {done && (
          <div className="confirm-banner"><i className="ti ti-circle-check-filled"></i>
            {lang==='ko'?`${roles.find(r=>r.id===role).titleKo} 역할로 가입 신청이 접수되었습니다.`:`Заявка на роль «${roles.find(r=>r.id===role).titleRu}» принята.`}
          </div>
        )}
      </div>
    </div>
  );
}

function BoardScreen({lang}){

            )}

        ))}

  );

function App(){
  const [lang,setLang] = useState('ko');
  const [screen,setScreen] = useState('main');
  const [activeSeg,setActiveSeg] = useState(-1);
  const [activeChip,setActiveChip] = useState(0);
  const [favorites,setFavorites] = useState(new Set());
  const [mapOpen,setMapOpen] = useState(false);
  const [activePin,setActivePin] = useState(null);

  function toggleFav(id){
    const next = new Set(favorites);
    next.has(id)? next.delete(id) : next.add(id);
    setFavorites(next);
  }

  return (
    <div className="app">
      <Header lang={lang} setLang={setLang} screen={screen} setScreen={setScreen} activeSeg={activeSeg} setActiveSeg={setActiveSeg}/>
      {screen==='main' && <MainScreen lang={lang} favorites={favorites} toggleFav={toggleFav} mapOpen={mapOpen} setMapOpen={setMapOpen} activePin={activePin} setActivePin={setActivePin} activeChip={activeChip} setActiveChip={setActiveChip}/>}
      {screen==='register' && <RegisterScreen lang={lang}/>}
      {screen==='signup' && <SignupScreen lang={lang}/>}
      {screen==='board' && <BoardScreen lang={lang}/>}
      <Footer lang={lang}/>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
