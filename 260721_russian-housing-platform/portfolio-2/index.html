<style>
:root{
  --lime:#beff50; --ink:#14140f; --parchment:#f5f5eb; --white:#ffffff;
  --ash:#d2d2c8; --graphite:#6e6e64; --charcoal:#30302a; --stone:#919183; --smoke:#b9b9b7;
  --blue:#1e3af6;
  --shadow-card:0 1px 3px rgba(20,20,15,.08),0 6px 16px rgba(20,20,15,.06);
  --shadow-elevated:0 8px 24px rgba(20,20,15,.12);
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{width:100%;min-height:100vh;}
body{font-family:'Pretendard',-apple-system,BlinkMacSystemFont,sans-serif;background:var(--white);color:var(--ink);-webkit-font-smoothing:antialiased;font-size:14px;}
button{font-family:inherit;cursor:pointer;background:none;border:none;}
input,select{font-family:inherit;}
table{border-collapse:collapse;width:100%;}

@keyframes fadeInUp{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}
@keyframes pulseBadge{0%,100%{box-shadow:0 0 0 0 rgba(190,255,80,.5);}50%{box-shadow:0 0 0 5px rgba(190,255,80,0);}}
@keyframes drawLine{from{stroke-dashoffset:340;}to{stroke-dashoffset:0;}}
@keyframes rowFlash{0%{background:rgba(190,255,80,.35);}100%{background:transparent;}}
@keyframes spinIcon{from{transform:rotate(0);}to{transform:rotate(360deg);}}

.shell{display:flex;min-height:100vh;animation:fadeInUp .4s ease both;}

/* ---- sidebar (archetype signature) ---- */
.sidebar{width:240px;flex-shrink:0;background:var(--charcoal);color:#fff;display:flex;flex-direction:column;padding:18px 14px;}
.sidebar-brand{display:flex;align-items:center;gap:10px;padding:8px 8px 18px;border-bottom:1px solid rgba(255,255,255,.1);margin-bottom:14px;}
.sidebar-logo{width:30px;height:30px;border-radius:8px;background:var(--lime);color:var(--ink);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;flex-shrink:0;}
.sidebar-brand-text{display:flex;flex-direction:column;line-height:1.15;}
.sidebar-brand-name{font-size:13.5px;font-weight:700;}
.sidebar-brand-env{font-size:10.5px;color:var(--smoke);}
.sidebar-section{margin-bottom:18px;}
.sidebar-section-title{font-size:10.5px;letter-spacing:.08em;color:var(--smoke);text-transform:uppercase;padding:0 10px 8px;font-weight:600;}
.sidebar-link{display:flex;align-items:center;gap:10px;padding:9px 10px;border-radius:8px;color:rgba(255,255,255,.72);font-size:13px;font-weight:500;width:100%;text-align:left;transition:background .15s;}
.sidebar-link:hover{background:rgba(255,255,255,.06);color:#fff;}
.sidebar-link.active{background:var(--lime);color:var(--ink);font-weight:700;}
.sidebar-link i{font-size:16px;flex-shrink:0;}
.sidebar-foot{margin-top:auto;padding:10px;font-size:11px;color:var(--smoke);border-top:1px solid rgba(255,255,255,.1);}

.main{flex:1;min-width:0;padding:26px 32px 60px;background:var(--white);}
.page-header{margin-bottom:20px;}
.page-title-row{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px;}
.page-title{font-size:22px;font-weight:700;letter-spacing:-.01em;}
.page-actions{display:flex;gap:8px;}
.btn-secondary{border:1px solid var(--ash);border-radius:10px;padding:9px 14px;font-size:12.5px;font-weight:600;color:var(--ink);display:flex;align-items:center;gap:6px;}
.btn-secondary:hover{background:var(--parchment);}
.btn-primary{background:var(--lime);color:var(--ink);border-radius:10px;padding:9px 16px;font-size:12.5px;font-weight:700;display:flex;align-items:center;gap:6px;}
.btn-primary:hover{filter:brightness(.95);}
.page-meta{font-size:12px;color:var(--graphite);margin-top:6px;}

/* ---- stat row ---- */
.stat-row{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:22px;}
.stat-card{background:var(--white);border:1px solid var(--ash);border-radius:10px;padding:16px 18px;box-shadow:var(--shadow-card);position:relative;overflow:hidden;}
.stat-label{font-size:12px;color:var(--graphite);font-weight:600;margin-bottom:8px;}
.stat-value{font-size:30px;font-weight:700;color:var(--ink);letter-spacing:-.01em;}
.stat-delta{font-size:12px;font-weight:700;margin-top:4px;display:inline-block;}
.stat-delta.positive{color:#1a7f37;}
.stat-delta.negative{color:#c0392b;}
.stat-sparkline{position:absolute;right:14px;bottom:12px;}

/* ---- insight-board composition (hero-viz / kpi-side / widget-grid) ---- */
.insight-board{display:grid;grid-template-columns:1.6fr 1fr;gap:16px;margin-bottom:22px;}
.hero-viz{background:var(--white);border:1px solid var(--ash);border-radius:10px;padding:22px;box-shadow:var(--shadow-card);}
.hero-viz-title{font-size:13.5px;font-weight:700;margin-bottom:14px;}
.kpi-side{background:var(--parchment);border-radius:10px;padding:18px;display:flex;flex-direction:column;gap:14px;}
.kpi-side-title{font-size:12px;font-weight:700;color:var(--graphite);text-transform:uppercase;letter-spacing:.06em;}
.kpi-item{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--ash);}
.kpi-item:last-child{border-bottom:none;}
.kpi-item-name{font-size:12.5px;font-weight:600;}
.kpi-item-sub{font-size:11px;color:var(--graphite);}
.kpi-item-val{font-size:13px;font-weight:700;}

.widget-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:26px;}
.widget-card{background:var(--white);border:1px solid var(--ash);border-radius:10px;padding:16px 18px;box-shadow:var(--shadow-card);}
.widget-title{font-size:12px;font-weight:700;color:var(--graphite);margin-bottom:12px;}
.donut-wrap{display:flex;align-items:center;gap:14px;}
.donut{width:76px;height:76px;border-radius:9999px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.donut-center{font-size:15px;font-weight:700;}

.legend-dot{width:8px;height:8px;border-radius:9999px;display:inline-block;margin-right:6px;}
.bar-chart{display:flex;align-items:flex-end;gap:8px;height:80px;}
.bar-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:6px;}
.bar-fill{width:100%;background:var(--lime);border-radius:4px 4px 0 0;}
.bar-label{font-size:10px;color:var(--graphite);}

.timeline-dot{width:7px;height:7px;border-radius:9999px;background:var(--blue);margin-top:4px;flex-shrink:0;}

/* ---- tab bar + table (archetype signature) ---- */

.data-toolbar{display:flex;gap:8px;padding:12px 16px;align-items:center;}
.search-input{flex:1;border:1px solid var(--ash);border-radius:8px;padding:8px 12px;font-size:12.5px;display:flex;align-items:center;gap:6px;color:var(--graphite);}

.filter-chip{border:1px solid var(--ash);border-radius:8px;padding:8px 12px;font-size:12px;font-weight:600;display:flex;align-items:center;gap:6px;}
.filter-chip:hover{background:var(--parchment);}
.export-btn{border:1px solid var(--ash);border-radius:8px;padding:8px 12px;font-size:12px;font-weight:600;display:flex;align-items:center;gap:6px;margin-left:auto;}
.data-table-wrap{overflow-x:auto;}
.data-table thead tr{background:var(--parchment);}
.data-table th{text-align:left;font-size:11px;font-weight:700;color:var(--graphite);text-transform:uppercase;letter-spacing:.04em;padding:10px 16px;}
.data-table td{padding:11px 16px;font-size:12.5px;border-top:1px solid var(--ash);height:46px;}
.data-table tbody tr{transition:background .12s;}
.data-table tbody tr:hover{background:var(--parchment);}
.data-table tbody tr.flash{animation:rowFlash 1s ease;}
.badge{font-size:10.5px;font-weight:700;padding:4px 9px;border-radius:6px;display:inline-block;}
.badge.pending{background:#fef3c7;color:#92400e;}
.badge.approved{background:#dcfce7;color:#166534;}
.badge.rejected{background:#fee2e2;color:#991b1b;}
.badge.paid{background:#dbeafe;color:#1e3a8a;}
.badge.failed{background:#fee2e2;color:#991b1b;}
.badge.refunded{background:#ede9fe;color:#5b21b6;}
.row-check{width:16px;height:16px;accent-color:var(--lime);}

.icon-btn{width:26px;height:26px;border-radius:6px;display:flex;align-items:center;justify-content:center;color:var(--graphite);}
.icon-btn:hover{background:var(--ash);color:var(--ink);}
.bulk-bar{display:flex;align-items:center;gap:10px;padding:10px 16px;background:var(--parchment);border-top:1px solid var(--ash);font-size:12.5px;}

.screen-desc{font-size:12.5px;color:var(--graphite);margin-top:4px;max-width:640px;line-height:1.5;}

/* ---- members master-detail ---- */

.member-role{font-size:11px;color:var(--graphite);}
.member-detail{padding:24px;}
.detail-head{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:18px;}
.detail-name{font-size:17px;font-weight:700;}
.detail-sub{font-size:12px;color:var(--graphite);margin-top:2px;}
.detail-actions{display:flex;gap:8px;}
.detail-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:20px;}
.detail-stat{background:var(--parchment);border-radius:10px;padding:12px 14px;}
.detail-stat-label{font-size:11px;color:var(--graphite);margin-bottom:4px;}
.detail-stat-val{font-size:16px;font-weight:700;}
.content-list{display:flex;flex-direction:column;gap:8px;}
.content-item{display:flex;justify-content:space-between;align-items:center;padding:10px 14px;border:1px solid var(--ash);border-radius:8px;}
.content-item-title{font-size:12.5px;font-weight:600;}
.toggle-switch{width:36px;height:20px;border-radius:9999px;background:var(--ash);position:relative;transition:background .15s;flex-shrink:0;}
.toggle-switch.on{background:var(--lime);}
.toggle-knob{width:16px;height:16px;border-radius:9999px;background:#fff;position:absolute;top:2px;left:2px;transition:left .15s;box-shadow:0 1px 2px rgba(0,0,0,.3);}
.toggle-switch.on .toggle-knob{left:18px;}

@media (max-width:1000px){
  .stat-row{grid-template-columns:repeat(2,1fr);}
  .insight-board{grid-template-columns:1fr;}
  .widget-grid{grid-template-columns:1fr;}
  .master-detail{grid-template-columns:1fr;}
}
</style>
</head>

<script type="text/babel">
const {useState,useEffect,useRef} = React;

function useCountUp(target,duration=900){
  const [val,setVal] = useState(0);
  useEffect(()=>{
    let start=null;
    function step(ts){
      if(!start) start=ts;
      const p = Math.min((ts-start)/duration,1);
      setVal(Math.floor(target*p));
      if(p<1) requestAnimationFrame(step);
    }
    requestAnimationFrame(step);
  },[target]);
  return val;
}

function Sparkline({points,color}){
  const path = points.map((p,i)=>`${i===0?'M':'L'} ${i*10} ${30-p*0.28}`).join(' ');
  return (
    <svg className="stat-sparkline" width="90" height="32" viewBox="0 0 90 32">
      <path d={path} fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeDasharray="200" style={{animation:'drawLine 1.2s ease forwards'}}/>
    </svg>
  );
}

function FocusChart(){
  const pts = [12,18,15,26,22,31,28,36,33,40,38,45];
  const max = 50;
  const w=560,h=180,pad=20;
  const stepX = (w-pad*2)/(pts.length-1);
  const path = pts.map((p,i)=>`${i===0?'M':'L'} ${pad+i*stepX} ${h-pad-(p/max)*(h-pad*2)}`).join(' ');
  const area = path + ` L ${pad+(pts.length-1)*stepX} ${h-pad} L ${pad} ${h-pad} Z`;
  return (
    <svg width="100%" height="200" viewBox={`0 0 ${w} ${h}`} preserveAspectRatio="none">
      <defs>
        <linearGradient id="areaGrad" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stopColor="#beff50" stopOpacity="0.55"/>
          <stop offset="100%" stopColor="#beff50" stopOpacity="0"/>
        </linearGradient>
      </defs>
      <path d={area} fill="url(#areaGrad)" stroke="none"/>
      <path d={path} fill="none" stroke="#14140f" strokeWidth="2.5" strokeDasharray="500" style={{animation:'drawLine 1.4s ease forwards'}}/>
      {pts.map((p,i)=>(<circle key={i} cx={pad+i*stepX} cy={h-pad-(p/max)*(h-pad*2)} r="3" fill="#1e3af6"/>))}
    </svg>
  );
}

function ApprovalScreen({notify}){
  const [rows,setRows] = useState(PENDING_LISTINGS);
  const [checked,setChecked] = useState(new Set());
  const [filter,setFilter] = useState('all');
  const [flashIds,setFlashIds] = useState(new Set());
  const [rejectFor,setRejectFor] = useState(null);
  const [reason,setReason] = useState('');

  function toggleCheck(id){
    const next = new Set(checked);
    next.has(id)?next.delete(id):next.add(id);
    setChecked(next);
  }
  function bulkApprove(){
    const ids = Array.from(checked);
    setRows(rows.map(r=> ids.includes(r.id) ? {...r,status:'approved'} : r));
    setFlashIds(new Set(ids));
    setChecked(new Set());
    setTimeout(()=>setFlashIds(new Set()),1000);
  }
  function reject(id){
    setRows(rows.map(r=> r.id===id ? {...r,status:'rejected',reason:reason || '사유 미입력'} : r));
    setFlashIds(new Set([id]));
    setRejectFor(null); setReason('');
    setTimeout(()=>setFlashIds(new Set()),1000);
  }

  const filtered = filter==='all' ? rows : rows.filter(r=>r.status===filter);
  const tabs = [['all','전체'],['pending','대기'],['approved','승인'],['rejected','반려']];

  return (
    <div>
      <div className="page-header">
        <div className="page-title-row">
          <div className="page-title">매물 승인 · 반려 관리</div>
          <div className="page-actions">
            <button className="btn-secondary" onClick={()=>notify('처리 이력을 불러옵니다.')}><i className="ph ph-clock-counter-clockwise"></i>처리 이력</button>
          </div>
        </div>
        <div className="screen-desc">등록 대기 중인 매물을 검토하고 다중 선택 일괄 승인 또는 반려 사유를 입력해 처리합니다.</div>
      </div>
      <div className="data-section">
        <div className="tab-bar" data-tabs>
          {tabs.map(([id,label])=>(
            <button key={id} className={"tab"+(filter===id?' active':'')} onClick={()=>setFilter(id)}>{label}</button>
          ))}
        </div>
        <div className="data-toolbar">
          <div className="search-input"><i className="ph ph-magnifying-glass"></i><input placeholder="매물명 또는 등록자 검색…"/></div>
          <button className="filter-chip" onClick={()=>notify('지역 필터를 엽니다.')}><i className="ph ph-funnel"></i>지역</button>
          <button className="export-btn" onClick={()=>notify('CSV 파일 다운로드를 시작합니다.')}><i className="ph ph-export"></i>내보내기</button>
        </div>
        <div className="data-table-wrap">
          <table className="data-table">
            <thead><tr><th></th><th>매물명</th><th>등록자</th><th>지역</th><th>접수일시</th><th>상태</th><th>처리</th></tr></thead>
            <tbody>
              {filtered.map(r=>(
                <tr key={r.id} className={flashIds.has(r.id)?'flash':''}>
                  <td>{r.status==='pending' && <input type="checkbox" className="row-check" checked={checked.has(r.id)} onChange={()=>toggleCheck(r.id)}/>}</td>
                  <td>{r.title}</td><td>{r.agent}</td><td>{r.region}</td><td>{r.submitted}</td>
                  <td>
                    <span className={"badge "+r.status}>{r.status==='pending'?'대기':r.status==='approved'?'승인':'반려'}</span>
                    {r.status==='rejected' && r.reason && <div style={{fontSize:11,color:'#6e6e64',marginTop:3}}>{r.reason}</div>}
                  </td>
                  <td>
                    {r.status==='pending' ? (
                      <div className="row-actions">
                        <button className="icon-btn" title="승인" onClick={()=>{setRows(rows.map(x=>x.id===r.id?{...x,status:'approved'}:x));setFlashIds(new Set([r.id]));setTimeout(()=>setFlashIds(new Set()),1000);}}><i className="ph-fill ph-check-circle" style={{color:'#1a7f37'}}></i></button>
                        <button className="icon-btn" title="반려" onClick={()=>setRejectFor(r.id)}><i className="ph-fill ph-x-circle" style={{color:'#c0392b'}}></i></button>
                      </div>
                    ) : <button className="icon-btn" onClick={()=>notify(r.title+' 상세 옵션을 엽니다.')}><i className="ph ph-dots-three"></i></button>}
                  </td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
        {checked.size>0 && (
          <div className="bulk-bar">
            <span>{checked.size}건 선택됨</span>
            <button className="bulk-approve" onClick={bulkApprove}><i className="ph ph-check"></i> 일괄 승인</button>
            <button className="bulk-reject" onClick={()=>setChecked(new Set())}>선택 해제</button>
          </div>
        )}
      </div>
      {rejectFor!==null && (
        <div style={{marginTop:16,background:'#fef2f2',border:'1px solid #fecaca',borderRadius:10,padding:16}}>
          <div style={{fontSize:12.5,fontWeight:700,marginBottom:8}}>반려 사유 입력</div>
          <div style={{display:'flex',gap:8}}>
            <input value={reason} onChange={e=>setReason(e.target.value)} placeholder="예: 매물 사진 누락" style={{flex:1,border:'1px solid #d2d2c8',borderRadius:8,padding:'8px 12px',fontSize:12.5}}/>
            <button className="btn-primary" onClick={()=>reject(rejectFor)}>반려 확정</button>
            <button className="btn-secondary" onClick={()=>setRejectFor(null)}>취소</button>
          </div>
        </div>
      )}
    </div>
  );
}

function MembersScreen({notify}){
  const [selected,setSelected] = useState(MEMBERS[0].id);
  const [statusOverride,setStatusOverride] = useState({});
  const member = {...MEMBERS.find(m=>m.id===selected)};
  if(statusOverride[member.id]) member.status = statusOverride[member.id];
  const [contents,setContents] = useState(member.contents);

  function selectMember(id){
    setSelected(id);
    setContents(MEMBERS.find(m=>m.id===id).contents);
  }
  function toggleContent(idx){
    setContents(contents.map((c,i)=> i===idx? {...c,visible:!c.visible} : c));
  }
  function toggleSuspend(){
    const next = member.status==='active' ? 'suspended' : 'active';
    setStatusOverride({...statusOverride,[member.id]:next});
    notify(member.name+(next==='suspended'?' 계정이 정지되었습니다.':' 계정 정지가 해제되었습니다.'));
  }

  return (
    <div>
      <div className="page-header">
        <div className="page-title-row"><div className="page-title">회원 · 콘텐츠 통합 관리</div></div>
        <div className="screen-desc">회원 역할 변경·계정 정지와 게시판 콘텐츠 노출/비노출 처리를 하나의 마스터-디테일 패널에서 진행합니다.</div>
      </div>
      <div className="master-detail">
        <div className="member-list">
          {MEMBERS.map(m=>{
            const st = statusOverride[m.id] || m.status;
            return (
            <div key={m.id} className={"member-row"+(selected===m.id?' active':'')} onClick={()=>selectMember(m.id)} style={{cursor:'pointer'}}>
              <div className="member-avatar">{m.initials}</div>
              <div><div className="member-name">{m.name}</div><div className="member-role">{m.role} · {st==='active'?'활성':'정지'}</div></div>
            </div>
          );})}
        </div>
        <div className="member-detail">
          <div className="detail-head">
            <div>
              <div className="detail-name">{member.name}</div>
              <div className="detail-sub">{member.role} · 가입일 {member.joined}</div>
            </div>
            <div className="detail-actions">
              <select className="btn-secondary" style={{paddingRight:8}} defaultValue={member.role}>
                <option>일반회원</option><option>공인중개사</option><option>임대인</option>
              </select>
              <button className="btn-secondary" style={{color:'#c0392b'}} onClick={toggleSuspend}>{member.status==='active'?'계정 정지':'정지 해제'}</button>
            </div>
          </div>
          <div className="detail-grid">
            <div className="detail-stat"><div className="detail-stat-label">등록 매물</div><div className="detail-stat-val">{member.listings}건</div></div>
            <div className="detail-stat"><div className="detail-stat-label">역할</div><div className="detail-stat-val">{member.role}</div></div>
            <div className="detail-stat"><div className="detail-stat-label">상태</div><div className="detail-stat-val">{member.status==='active'?'활성':'정지'}</div></div>
          </div>
          <div className="kpi-side-title" style={{marginBottom:10}}>연관 콘텐츠 노출 관리</div>
          <div className="content-list">
            {contents.map((c,i)=>(
              <div className="content-item" key={i}>
                <span className="content-item-title">{c.title}</span>
                <div className={"toggle-switch"+(c.visible?' on':'')} onClick={()=>toggleContent(i)}><div className="toggle-knob"></div></div>
              </div>
            ))}
          </div>
        </div>
      </div>
    </div>
  );
}

function Toast({msg}){
  if(!msg) return null;
  return <div style={{position:'fixed',bottom:24,right:24,background:'#14140f',color:'#fff',padding:'12px 18px',borderRadius:10,fontSize:12.5,fontWeight:600,boxShadow:'0 8px 24px rgba(20,20,15,.25)',zIndex:200,animation:'fadeInUp .25s ease both'}}>{msg}</div>;
}

function App(){
  const [screen,setScreen] = useState('main');
  const [toast,setToast] = useState(null);
  function notify(msg){ setToast(msg); setTimeout(()=>setToast(null),2200); }
  return (
    <div className="shell">
      <Sidebar screen={screen} setScreen={setScreen}/>
      <main className="main">
        {screen==='main' && <DashboardScreen notify={notify}/>}
        {screen==='approval' && <ApprovalScreen notify={notify}/>}
        {screen==='ads-billing' && <BillingScreen notify={notify}/>}
        {screen==='members' && <MembersScreen notify={notify}/>}
      </main>
      <Toast msg={toast}/>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
