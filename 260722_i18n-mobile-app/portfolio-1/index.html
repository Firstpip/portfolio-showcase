<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>이음 — 글로벌 시민서비스 통합 앱</title>
<link rel="preconnect" href="https://cdn.jsdelivr.net">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
<link rel="stylesheet" href="https://unpkg.com/@tabler/icons-webfont@2.47.0/dist/tabler-icons.min.css" />
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
  :root{
    --obsidian:#09090b;
    --graphite:#18181b;
    --slate:#27272a;
    --iron:#3f3f46;
    --fog:#71717a;
    --ash:#a1a1aa;
    --cloud:#ececee;
    --paper:#f4f4f5;
    --snow:#ffffff;
    --ember:#ff5a00;
    --r-tile:24px;
    --r-btn:14px;
    --r-pill:9999px;
  }
  *{box-sizing:border-box;}
  html,body{width:100%;margin:0;padding:0;}
  body{
    font-family:'Pretendard',-apple-system,BlinkMacSystemFont,sans-serif;
    background:var(--paper);
    color:var(--graphite);
    -webkit-font-smoothing:antialiased;
  }
  #root{width:100%;}
  button{font-family:inherit;cursor:pointer;}
  ::selection{background:var(--ember);color:#fff;}

  /* ---- keyframes ---- */
  @keyframes fadeInUp{
    from{opacity:0;transform:translateY(14px);}
    to{opacity:1;transform:translateY(0);}
  }
  @keyframes drawerIn{
    from{transform:translateX(100%);}
    to{transform:translateX(0);}
  }
  @keyframes scrimIn{
    from{opacity:0;}
    to{opacity:1;}
  }
  @keyframes pulseDot{
    0%,100%{transform:scale(1);opacity:1;}
    50%{transform:scale(1.35);opacity:.55;}
  }
  @keyframes shimmer{
    0%{background-position:-300px 0;}
    100%{background-position:300px 0;}
  }
  @keyframes toastIn{
    from{opacity:0;transform:translate(-50%,16px);}
    to{opacity:1;transform:translate(-50%,0);}
  }
  @keyframes barGrow{
    from{transform:scaleY(0);}
    to{transform:scaleY(1);}
  }

  .stagger > *{animation:fadeInUp .5s cubic-bezier(.2,.8,.2,1) both;}

  /* ---- topbar ---- */
  .topbar{
    width:100%;
    background:var(--snow);
    border-bottom:1px solid var(--cloud);
    position:sticky;top:0;z-index:40;
  }
  .topbar-inner{
    max-width:1240px;margin:0 auto;padding:0 32px;
    height:68px;display:flex;align-items:center;justify-content:space-between;gap:24px;
  }
  .brand{display:flex;align-items:center;gap:10px;font-weight:700;font-size:19px;color:var(--obsidian);}
  .brand-mark{
    width:34px;height:34px;border-radius:11px;background:var(--obsidian);
    display:flex;align-items:center;justify-content:center;color:var(--ember);font-size:14px;font-weight:800;
  }
  .nav-links{display:flex;align-items:center;gap:4px;}
  .nav-link{
    border:none;background:transparent;padding:10px 16px;border-radius:var(--r-btn);
    font-size:14px;font-weight:500;color:var(--fog);transition:background .15s,color .15s;
  }
  .nav-link:hover{background:var(--paper);color:var(--graphite);}
  .nav-link.active{background:var(--obsidian);color:#fff;}
  .topbar-actions{display:flex;align-items:center;gap:10px;}
  .lang-switch{
    display:flex;border:1px solid var(--cloud);border-radius:var(--r-pill);padding:3px;background:var(--paper);
  }
  .lang-btn{
    border:none;background:transparent;padding:6px 14px;border-radius:var(--r-pill);font-size:12.5px;font-weight:600;
    color:var(--fog);letter-spacing:.02em;transition:all .15s;
  }
  .lang-btn.active{background:var(--obsidian);color:#fff;}
  .cta-dark{
    background:var(--obsidian);color:#fff;border:1.5px solid #2c2e34;border-radius:var(--r-btn);
    padding:10px 18px;font-size:13.5px;font-weight:600;
    box-shadow:inset 0 .5px 0 0 rgba(255,255,255,.5),0 4px 6px 0 rgba(0,0,0,.14);
    display:flex;align-items:center;gap:6px;position:relative;overflow:hidden;
  }

  /* ---- filter bar (composition: filter-rail -> horizontal) ---- */
  .filterbar{
    max-width:1240px;margin:0 auto;padding:20px 32px 0;
    display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap;
  }
  .chip-row{display:flex;gap:8px;flex-wrap:wrap;}
  .chip{
    border:1px solid var(--cloud);background:var(--snow);padding:8px 16px;border-radius:var(--r-pill);
    font-size:13px;font-weight:500;color:var(--iron);display:flex;align-items:center;gap:6px;transition:all .15s;
  }
  .chip.active{background:var(--obsidian);color:#fff;border-color:var(--obsidian);}
  .chip:hover:not(.active){border-color:var(--ash);}

  /* ---- bento grid ---- */
  .bento-wrap{max-width:1240px;margin:0 auto;padding:24px 32px 80px;}
  .bento{
    display:grid;grid-template-columns:repeat(4,1fr);gap:16px;
  }
  .tile{
    background:var(--snow);border:1px solid var(--cloud);border-radius:var(--r-tile);
    padding:24px;position:relative;overflow:hidden;transition:transform .18s,box-shadow .18s;
  }
  .tile:hover{transform:translateY(-3px);box-shadow:0 12px 24px -12px rgba(9,9,11,.18);}
  .tile.feature{grid-column:span 2;grid-row:span 2;background:var(--obsidian);color:#fff;border:none;display:flex;flex-direction:column;justify-content:space-between;}
  .tile.wide{grid-column:span 2;}
  .tile-label{font-size:12.5px;font-weight:600;color:var(--fog);letter-spacing:.02em;margin-bottom:6px;}
  .tile.feature .tile-label{color:#a1a1aa;}
  .tile-num{font-size:34px;font-weight:700;color:var(--obsidian);line-height:1.1;}
  .tile.feature .tile-num{color:#fff;font-size:40px;}
  .tile-sub{font-size:12.5px;color:var(--fog);margin-top:4px;}
  .tile.feature .tile-sub{color:#d4d4d8;}
  .action-tile{
    display:flex;flex-direction:column;align-items:flex-start;gap:14px;border:none;text-align:left;width:100%;
    background:var(--snow);border:1px solid var(--cloud);
  }
  .action-icon{
    width:44px;height:44px;border-radius:14px;background:var(--paper);display:flex;align-items:center;justify-content:center;
    font-size:20px;color:var(--obsidian);
  }
  .action-title{font-size:16px;font-weight:700;color:var(--obsidian);}
  .action-desc{font-size:12.5px;color:var(--fog);line-height:1.5;}
  .action-arrow{margin-top:auto;display:flex;align-items:center;gap:4px;font-size:12.5px;font-weight:600;color:var(--ember);}

  .mini-bars{display:flex;align-items:flex-end;gap:6px;height:64px;margin:14px 0;}
  .mini-bar{width:14px;background:var(--ember);border-radius:4px 4px 0 0;transform-origin:bottom;animation:barGrow .7s cubic-bezier(.2,.8,.2,1) both;}

  .notice-list{display:flex;flex-direction:column;gap:2px;}
  .notice-item{
    display:flex;align-items:center;gap:12px;padding:12px 8px;border-radius:12px;border:none;background:transparent;width:100%;text-align:left;
    transition:background .15s;
  }
  .notice-item:hover{background:var(--paper);}
  .notice-dot{width:7px;height:7px;border-radius:50%;background:var(--ember);flex-shrink:0;animation:pulseDot 2s infinite;}
  .notice-title{font-size:13.5px;font-weight:500;color:var(--graphite);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .notice-badge{font-size:11px;font-weight:600;color:var(--fog);background:var(--paper);padding:3px 8px;border-radius:8px;}

  .badge-pill{
    display:inline-flex;align-items:center;gap:4px;font-size:11.5px;font-weight:600;padding:4px 10px;border-radius:12px;
    background:var(--paper);color:var(--iron);border:1px solid var(--cloud);
  }
  .badge-ember{background:var(--ember);color:#fff;border:none;}

  /* ---- section screens (apply/survey/board/mypage) ---- */
  .screen{max-width:1000px;margin:0 auto;padding:40px 32px 80px;}
  .screen-head{margin-bottom:32px;}
  .screen-title{font-size:32px;font-weight:700;color:var(--obsidian);letter-spacing:-.02em;}
  .screen-sub{font-size:14.5px;color:var(--fog);margin-top:8px;line-height:1.6;}

  .stepper{display:flex;align-items:center;gap:0;margin-bottom:36px;}
  .step-item{display:flex;align-items:center;gap:10px;flex:1;}
  .step-circle{
    width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;
    font-size:13px;font-weight:700;flex-shrink:0;border:1.5px solid var(--cloud);color:var(--ash);background:var(--snow);
    transition:all .2s;
  }
  .step-circle.done{background:var(--obsidian);border-color:var(--obsidian);color:#fff;}
  .step-circle.current{border-color:var(--ember);color:var(--ember);}
  .step-line{flex:1;height:2px;background:var(--cloud);margin:0 4px;position:relative;}
  .step-line-fill{position:absolute;inset:0;background:var(--obsidian);transform-origin:left;transition:transform .3s;}
  .step-label{font-size:12.5px;font-weight:600;color:var(--ash);}
  .step-label.active{color:var(--obsidian);}

  .card{background:var(--snow);border:1px solid var(--cloud);border-radius:20px;padding:28px;}
  .field{margin-bottom:20px;}
  .field label{display:block;font-size:13px;font-weight:600;color:var(--graphite);margin-bottom:8px;}
  .field input,.field select,.field textarea{
    width:100%;border:1px solid var(--cloud);border-radius:var(--r-btn);padding:12px 14px;font-size:14px;
    font-family:inherit;background:var(--snow);color:var(--graphite);transition:border-color .15s;
  }
  .field input:focus,.field select:focus,.field textarea:focus{outline:none;border-color:var(--obsidian);}
  .field.error input{border-color:#dc2626;}
  .field-error{font-size:12px;color:#dc2626;margin-top:6px;}
  .field-row{display:grid;grid-template-columns:1fr 1fr;gap:16px;}

  .btn{
    border:none;border-radius:var(--r-btn);padding:12px 22px;font-size:14px;font-weight:600;
    display:inline-flex;align-items:center;gap:8px;position:relative;overflow:hidden;transition:opacity .15s;
  }
  .btn:active{opacity:.85;}
  .btn-primary{background:var(--obsidian);color:#fff;box-shadow:inset 0 .5px 0 0 rgba(255,255,255,.5),0 4px 6px 0 rgba(0,0,0,.14);}
  .btn-ghost{background:var(--paper);color:var(--iron);}
  .btn-outline{background:transparent;border:1px solid var(--cloud);color:var(--graphite);}
  .btn-block{width:100%;justify-content:center;}
  .btn[disabled]{opacity:.4;cursor:not-allowed;}
  .btn-row{display:flex;gap:12px;margin-top:28px;justify-content:space-between;}

  .upload-zone{
    border:1.5px dashed var(--cloud);border-radius:16px;padding:32px;text-align:center;background:var(--paper);
    display:flex;flex-direction:column;align-items:center;gap:10px;
  }
  .upload-zone .ti{font-size:28px;color:var(--fog);}
  .file-chip{
    display:flex;align-items:center;gap:8px;background:var(--snow);border:1px solid var(--cloud);border-radius:12px;
    padding:8px 12px;font-size:12.5px;font-weight:500;margin-top:10px;
  }

  .q-block{margin-bottom:26px;}
  .q-title{font-size:15px;font-weight:600;color:var(--graphite);margin-bottom:12px;}
  .opt-row{display:flex;flex-direction:column;gap:8px;}
  .opt{
    border:1.5px solid var(--cloud);border-radius:14px;padding:12px 16px;font-size:13.5px;font-weight:500;
    display:flex;align-items:center;gap:10px;text-align:left;background:var(--snow);color:var(--graphite);transition:all .15s;
  }
  .opt.selected{border-color:var(--obsidian);background:var(--obsidian);color:#fff;}
  .opt-check{width:16px;height:16px;border-radius:5px;border:1.5px solid var(--cloud);flex-shrink:0;}
  .opt.selected .opt-check{background:#fff;border-color:#fff;}

  .progress-track{width:100%;height:6px;background:var(--cloud);border-radius:99px;overflow:hidden;margin-bottom:24px;}
  .progress-fill{height:100%;background:var(--ember);border-radius:99px;transition:width .35s cubic-bezier(.2,.8,.2,1);}

  .post-list{display:flex;flex-direction:column;gap:12px;}
  .post-item{
    background:var(--snow);border:1px solid var(--cloud);border-radius:16px;padding:18px 20px;text-align:left;width:100%;
    display:flex;flex-direction:column;gap:8px;transition:border-color .15s;
  }
  .post-item:hover{border-color:var(--ash);}
  .post-top{display:flex;align-items:center;justify-content:space-between;gap:10px;}
  .post-title-row{display:flex;align-items:center;gap:8px;}
  .post-title{font-size:14.5px;font-weight:700;color:var(--graphite);}
  .post-meta{font-size:12px;color:var(--fog);}
  .post-excerpt{font-size:13px;color:var(--fog);line-height:1.5;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .post-foot{display:flex;gap:14px;font-size:12px;color:var(--ash);}

  .skeleton{
    height:66px;border-radius:16px;background:linear-gradient(90deg,#ececee 0px,#f7f7f8 60px,#ececee 120px);
    background-size:600px;animation:shimmer 1.3s infinite linear;
  }

  /* ---- drawer / quick-view ---- */
  .scrim{position:fixed;inset:0;background:rgba(9,9,11,.4);z-index:60;animation:scrimIn .2s ease both;}
  .drawer{
    position:fixed;top:0;right:0;bottom:0;width:420px;max-width:92vw;background:var(--snow);z-index:61;
    box-shadow:-16px 0 40px rgba(0,0,0,.16);display:flex;flex-direction:column;animation:drawerIn .28s cubic-bezier(.2,.8,.2,1) both;
  }
  .drawer-head{padding:22px 24px;border-bottom:1px solid var(--cloud);display:flex;align-items:center;justify-content:space-between;}
  .drawer-title{font-size:17px;font-weight:700;color:var(--obsidian);}
  .drawer-close{width:32px;height:32px;border-radius:10px;border:1px solid var(--cloud);background:var(--snow);display:flex;align-items:center;justify-content:center;}
  .drawer-body{padding:24px;overflow-y:auto;flex:1;}
  .drawer-foot{padding:20px 24px;border-top:1px solid var(--cloud);display:flex;gap:10px;}

  /* ---- modal (permission / write) ---- */
  .modal-wrap{position:fixed;inset:0;z-index:70;display:flex;align-items:center;justify-content:center;padding:24px;}
  .modal-scrim{position:fixed;inset:0;background:rgba(9,9,11,.45);animation:scrimIn .2s ease both;}
  .modal{
    position:relative;background:var(--snow);border-radius:24px;width:100%;max-width:440px;padding:28px;
    animation:fadeInUp .25s cubic-bezier(.2,.8,.2,1) both;
  }
  .modal-icon{width:52px;height:52px;border-radius:16px;background:var(--paper);display:flex;align-items:center;justify-content:center;color:var(--ember);font-size:24px;margin-bottom:16px;}
  .modal-title{font-size:18px;font-weight:700;color:var(--obsidian);margin-bottom:8px;}
  .modal-desc{font-size:13.5px;color:var(--fog);line-height:1.6;margin-bottom:22px;}

  .toast{
    position:fixed;left:50%;bottom:32px;transform:translateX(-50%);background:var(--obsidian);color:#fff;
    padding:14px 22px;border-radius:14px;font-size:13.5px;font-weight:600;z-index:80;display:flex;align-items:center;gap:10px;
    animation:toastIn .28s cubic-bezier(.2,.8,.2,1) both;box-shadow:0 12px 28px rgba(0,0,0,.22);
  }

  .avatar{
    width:40px;height:40px;border-radius:12px;background:var(--obsidian);color:#fff;display:flex;align-items:center;justify-content:center;
    font-size:14px;font-weight:700;flex-shrink:0;
  }
  .profile-card{display:flex;align-items:center;gap:16px;padding:22px;background:var(--obsidian);border-radius:20px;color:#fff;margin-bottom:24px;}
  .profile-name{font-size:17px;font-weight:700;}
  .profile-sub{font-size:12.5px;color:#d4d4d8;margin-top:2px;}

  .hist-item{display:flex;align-items:center;justify-content:space-between;padding:14px 4px;border-bottom:1px solid var(--cloud);}
  .hist-item:last-child{border-bottom:none;}
  .hist-name{font-size:13.5px;font-weight:600;color:var(--graphite);}
  .hist-date{font-size:12px;color:var(--fog);margin-top:2px;}
  .status-badge{font-size:11.5px;font-weight:700;padding:5px 10px;border-radius:10px;}
  .status-done{background:#dcfce7;color:#15803d;}
  .status-progress{background:#fff7ed;color:#c2410c;}

  @media (max-width:900px){
    .bento{grid-template-columns:repeat(2,1fr);}
    .tile.feature{grid-column:span 2;grid-row:span 1;}
    .field-row{grid-template-columns:1fr;}
  }
</style>
</head>

function Icon({name, className, style}){
  return <i className={`ti ti-${name} ${className||''}`} style={style}></i>;

function Toast({msg, onDone}){
  useEffect(()=>{ const t=setTimeout(onDone, 2200); return ()=>clearTimeout(t); },[]);

}

function ApplyScreen({lang, showToast}){
  const t = T[lang];
  const steps = lang==='ko' ? ["신청 정보 입력","서류 첨부","확인 및 제출"] : ["Applicant Info","Attach Documents","Review & Submit"];
  const [step, setStep] = useState(0);
  const [form, setForm] = useState({type:'', name:'', phone:'', reason:''});
  const [errors, setErrors] = useState({});
  const [files, setFiles] = useState([]);
  const [showPermission, setShowPermission] = useState(false);
  const [permissionGranted, setPermissionGranted] = useState(false);
  const [submitted, setSubmitted] = useState(false);
  const [receiptNo] = useState('APP-'+Math.floor(20240000+Math.random()*9999));

  function validateStep1(){
    const e = {};
    if(!form.type) e.type = lang==='ko'?'신청 종류를 선택해주세요':'Please select a type';
    if(!form.name) e.name = lang==='ko'?'이름을 입력해주세요':'Please enter your name';
    if(!form.phone) e.phone = lang==='ko'?'연락처를 입력해주세요':'Please enter your phone number';
    setErrors(e);
    return Object.keys(e).length===0;
  }

  function handleAttach(){
    if(!permissionGranted){ setShowPermission(true); return; }
    setFiles(f=>[...f, {id:Date.now(), name:`증빙서류_${f.length+1}.jpg`}]);
  }

  function grantPermission(){
    setPermissionGranted(true); setShowPermission(false);
    setFiles(f=>[...f, {id:Date.now(), name:'증빙서류_1.jpg'}]);
  }

  function next(){
    if(step===0 && !validateStep1()) return;
    setStep(s=>Math.min(s+1,2));
  }
  function prev(){ setStep(s=>Math.max(s-1,0)); }

  function submit(){
    setSubmitted(true);
    showToast(lang==='ko'?'신청서가 제출되었습니다':'Application submitted');
  }

  if(submitted){
    return (
      <div className="screen" style={{textAlign:'center', paddingTop:'80px'}}>
        <div className="modal-icon" style={{margin:'0 auto 20px',background:'#dcfce7',color:'#15803d'}}><Icon name="check" style={{fontSize:'26px'}}/></div>
        <div className="screen-title">{lang==='ko'?'제출이 완료되었습니다':'Submission Complete'}</div>
        <div className="screen-sub">{lang==='ko'?`접수번호 ${receiptNo} 로 처리 현황을 확인할 수 있습니다.`:`Track your status with receipt No. ${receiptNo}.`}</div>
        <div className="card" style={{maxWidth:'360px',margin:'28px auto 0',textAlign:'left'}}>
          <div className="hist-item"><span className="hist-name">{lang==='ko'?'접수번호':'Receipt No.'}</span><span style={{fontWeight:700}}>{receiptNo}</span></div>
          <div className="hist-item"><span className="hist-name">{lang==='ko'?'신청 종류':'Type'}</span><span>{form.type}</span></div>
          <div className="hist-item"><span className="hist-name">{lang==='ko'?'첨부 서류':'Attachments'}</span><span>{files.length}{lang==='ko'?'건':''}</span></div>
        </div>
        <button className="btn btn-primary" style={{marginTop:'24px'}} onClick={()=>{setSubmitted(false);setStep(0);setForm({type:'',name:'',phone:'',reason:''});setFiles([]);}}>
          {lang==='ko'?'새 신청서 작성':'New Application'}
        </button>
      </div>
    );
  }

  return (
    <div className="screen">
      <div className="screen-head">
        <div className="screen-title">{t.applyTitle}</div>
        <div className="screen-sub">{t.applyDesc}</div>
      </div>

      <div className="stepper">
        {steps.map((s,i)=>(
          <React.Fragment key={i}>
            <div className="step-item" style={{flex:i<steps.length-1?1:'0 0 auto'}}>
              <div className={`step-circle ${i<step?'done':''} ${i===step?'current':''}`}>
                {i<step ? <Icon name="check" style={{fontSize:'14px'}}/> : i+1}
              </div>
              <span className={`step-label ${i<=step?'active':''}`}>{s}</span>
            </div>
            {i<steps.length-1 && <div className="step-line"><div className="step-line-fill" style={{transform:`scaleX(${i<step?1:0})`}}></div></div>}
          </React.Fragment>
        ))}
      </div>

      <div className="card">
        {step===0 && (
          <div>
            <div className={`field ${errors.type?'error':''}`}>
              <label>{lang==='ko'?'신청 종류':'Application Type'}</label>
              <select value={form.type} onChange={e=>setForm({...form,type:e.target.value})}>
                <option value="">{lang==='ko'?'선택해주세요':'Select'}</option>
                {APPLY_TYPES.map(a=><option key={a} value={a}>{a}</option>)}
              </select>
              {errors.type && <div className="field-error">{errors.type}</div>}
            </div>
            <div className="field-row">
              <div className={`field ${errors.name?'error':''}`}>
                <label>{lang==='ko'?'신청인 이름':'Full Name'}</label>
                <input value={form.name} onChange={e=>setForm({...form,name:e.target.value})} placeholder={lang==='ko'?'김민수':'John Smith'}/>
                {errors.name && <div className="field-error">{errors.name}</div>}
              </div>
              <div className={`field ${errors.phone?'error':''}`}>
                <label>{lang==='ko'?'연락처':'Phone'}</label>
                <input value={form.phone} onChange={e=>setForm({...form,phone:e.target.value})} placeholder="010-0000-0000"/>
                {errors.phone && <div className="field-error">{errors.phone}</div>}
              </div>
            </div>
            <div className="field">
              <label>{lang==='ko'?'신청 사유':'Reason'}</label>
              <textarea rows="3" value={form.reason} onChange={e=>setForm({...form,reason:e.target.value})} placeholder={lang==='ko'?'신청 사유를 간단히 작성해주세요':'Briefly describe your reason'}></textarea>
            </div>
          </div>
        )}

        {step===1 && (
          <div>
            <div className="upload-zone">
              <Icon name="camera" />
              <div style={{fontWeight:600,fontSize:14}}>{lang==='ko'?'카메라 또는 사진첩에서 서류를 첨부하세요':'Attach documents from camera or gallery'}</div>
              <button className="btn btn-outline" onClick={handleAttach}>
                <Icon name="upload" style={{fontSize:'14px'}}/>{lang==='ko'?'서류 첨부하기':'Attach Document'}
              </button>
            </div>
            {files.map(f=>(
              <div key={f.id} className="file-chip">
                <Icon name="photo" style={{fontSize:'14px'}}/>{f.name}
                <button style={{marginLeft:'auto',border:'none',background:'none',color:'#a1a1aa'}} onClick={()=>setFiles(files.filter(x=>x.id!==f.id))}><Icon name="x" style={{fontSize:'14px'}}/></button>
              </div>
            ))}
          </div>
        )}

        {step===2 && (
          <div>
            <div className="hist-item"><span className="hist-name">{lang==='ko'?'신청 종류':'Type'}</span><span>{form.type||'-'}</span></div>
            <div className="hist-item"><span className="hist-name">{lang==='ko'?'신청인':'Name'}</span><span>{form.name||'-'}</span></div>
            <div className="hist-item"><span className="hist-name">{lang==='ko'?'연락처':'Phone'}</span><span>{form.phone||'-'}</span></div>
            <div className="hist-item"><span className="hist-name">{lang==='ko'?'첨부 서류':'Attachments'}</span><span>{files.length}{lang==='ko'?'건':''}</span></div>
          </div>
        )}

        <div className="btn-row">
          <button className="btn btn-ghost" onClick={prev} disabled={step===0}>{lang==='ko'?'이전':'Back'}</button>
          {step<2
            ? <button className="btn btn-primary" onClick={next}>{lang==='ko'?'다음':'Next'}<Icon name="arrow-right" style={{fontSize:'14px'}}/></button>
            : <button className="btn btn-primary" onClick={submit}>{lang==='ko'?'제출하기':'Submit'}<Icon name="send" style={{fontSize:'14px'}}/></button>
          }
        </div>
      </div>

      {showPermission && (
        <div className="modal-wrap">
          <div className="modal-scrim" onClick={()=>setShowPermission(false)}></div>
          <div className="modal">
            <div className="modal-icon"><Icon name="camera" /></div>
            <div className="modal-title">{lang==='ko'?'카메라·사진첩 접근 권한':'Camera & Photo Access'}</div>
            <div className="modal-desc">{lang==='ko'?'서류 촬영 및 첨부를 위해 카메라와 사진첩 접근 권한이 필요합니다.':'Camera and photo library access is required to attach documents.'}</div>
            <div className="btn-row" style={{marginTop:0}}>
              <button className="btn btn-ghost btn-block" onClick={()=>setShowPermission(false)}>{lang==='ko'?'거부':'Deny'}</button>
              <button className="btn btn-primary btn-block" onClick={grantPermission}>{lang==='ko'?'허용':'Allow'}</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

function SurveyScreen({lang, showToast}){
  const t = T[lang];
  const [selected, setSelected] = useState(null);
  const [answers, setAnswers] = useState({});
  const [qi, setQi] = useState(0);
  const [done, setDone] = useState(false);

  function selectOption(qid, opt, type){
    setAnswers(a=>{
      if(type==='multi'){
        const cur = a[qid]||[];
        return {...a, [qid]: cur.includes(opt) ? cur.filter(x=>x!==opt) : [...cur, opt]};
      }
      return {...a, [qid]: opt};
    });
  }

  const q = SURVEY_QUESTIONS[qi];
  const answered = q ? (q.type==='text' ? true : (q.type==='multi' ? (answers[q.id]||[]).length>0 : !!answers[q.id])) : false;
  const progress = selected ? Math.round(((qi)/SURVEY_QUESTIONS.length)*100) : 0;

  if(!selected){
    return (
      <div className="screen">
        <div className="screen-head">
          <div className="screen-title">{t.surveyTitle}</div>
          <div className="screen-sub">{t.surveyDesc}</div>
        </div>
        <div style={{display:'flex',flexDirection:'column',gap:14}}>
          {SURVEYS.map(s=>(
            <button key={s.id} className="card" style={{textAlign:'left',width:'100%',display:'flex',alignItems:'center',justifyContent:'space-between',gap:16}} onClick={()=>{setSelected(s);setQi(0);setAnswers({});setDone(false);}}>
              <div>
                <div style={{fontWeight:700,fontSize:15,color:'#09090b',marginBottom:6}}>{s.title}</div>
                <div style={{fontSize:12.5,color:'#71717a'}}>{lang==='ko'?`문항 ${s.count}개 · 참여 ${s.participants}명`:`${s.count} questions · ${s.participants} participants`}</div>
              </div>
              <span className="badge-pill badge-ember">{s.status}</span>
            </button>
          ))}
        </div>
      </div>
    );
  }

  if(done){
    return (
      <div className="screen" style={{textAlign:'center', paddingTop:'80px'}}>
        <div className="modal-icon" style={{margin:'0 auto 20px',background:'#dcfce7',color:'#15803d'}}><Icon name="check" style={{fontSize:'26px'}}/></div>
        <div className="screen-title">{lang==='ko'?'참여가 완료되었습니다':'Survey Completed'}</div>
        <div className="screen-sub">{lang==='ko'?'응답이 마이페이지 참여 이력에 반영됩니다.':'Your response has been added to My Page history.'}</div>
        <button className="btn btn-primary" style={{marginTop:'24px'}} onClick={()=>setSelected(null)}>{lang==='ko'?'설문 목록으로':'Back to Surveys'}</button>
      </div>
    );
  }

  return (
    <div className="screen">
      <div className="screen-head">
        <div className="screen-title">{selected.title}</div>
        <div className="screen-sub">{lang==='ko'?`문항 ${qi+1} / ${SURVEY_QUESTIONS.length}`:`Question ${qi+1} / ${SURVEY_QUESTIONS.length}`}</div>
      </div>
      <div className="progress-track"><div className="progress-fill" style={{width:`${progress}%`}}></div></div>
      <div className="card">
        <div className="q-block">
          <div className="q-title">{q.title}</div>
          {q.type!=='text' ? (
            <div className="opt-row">
              {q.options.map(o=>{
                const isSel = q.type==='multi' ? (answers[q.id]||[]).includes(o) : answers[q.id]===o;
                return (
                  <button key={o} className={`opt ${isSel?'selected':''}`} onClick={()=>selectOption(q.id,o,q.type)}>
                    <span className="opt-check">{isSel && <Icon name="check" style={{fontSize:'11px',color:'#09090b'}}/>}</span>{o}
                  </button>
                );
              })}
            </div>
          ) : (
            <textarea rows="4" placeholder={lang==='ko'?'의견을 입력해주세요 (선택)':'Optional comments'} onChange={e=>setAnswers({...answers,[q.id]:e.target.value})}></textarea>
          )}
        </div>
        <div className="btn-row">
          <button className="btn btn-ghost" onClick={()=>qi>0?setQi(qi-1):setSelected(null)}>{lang==='ko'?'이전':'Back'}</button>
          <button className="btn btn-primary" disabled={!answered} onClick={()=>{
            if(qi<SURVEY_QUESTIONS.length-1){ setQi(qi+1); } else { setDone(true); showToast(lang==='ko'?'설문 응답이 제출되었습니다':'Survey submitted'); }
          }}>{qi<SURVEY_QUESTIONS.length-1?(lang==='ko'?'다음':'Next'):(lang==='ko'?'제출':'Submit')}<Icon name="arrow-right" style={{fontSize:'14px'}}/></button>
        </div>
      </div>
    </div>
  );
}

function BoardScreen({lang, showToast, openQuickView}){
  const t = T[lang];
  const [posts, setPosts] = useState(POSTS);
  const [loading, setLoading] = useState(false);
  const [showMore, setShowMore] = useState(true);
  const [showWrite, setShowWrite] = useState(false);
  const [draft, setDraft] = useState({title:'', body:''});
  const [bold, setBold] = useState(false);

  function loadMore(){
    setLoading(true);
    setTimeout(()=>{
      setPosts(p=>[...p, {id:Date.now(), title:"영문 게시판 알림 설정은 어디서 하나요?", author:"최유진", date:"2024.03.12", replies:1, tag:"자유"}]);
      setLoading(false);
      setShowMore(false);
    }, 900);
  }

  function publish(){
    if(!draft.title) return;
    setPosts(p=>[{id:Date.now(), title:draft.title, author:'김민수', date:'2024.03.19', replies:0, tag:'자유'}, ...p]);
    setShowWrite(false);
    setDraft({title:'',body:''});
    showToast(lang==='ko'?'게시글이 등록되었습니다':'Post published');
  }

  return (
    <div className="screen">
      <div className="screen-head" style={{display:'flex',alignItems:'flex-end',justifyContent:'space-between'}}>
        <div>
          <div className="screen-title">{t.boardTitle}</div>
          <div className="screen-sub">{t.boardDesc}</div>
        </div>
        <button className="btn btn-primary" onClick={()=>setShowWrite(true)}><Icon name="pencil" style={{fontSize:'14px'}}/>{lang==='ko'?'글쓰기':'Write'}</button>
      </div>

      <div className="post-list">
        {posts.map(p=>(
          <button key={p.id} className="post-item" onClick={()=>openQuickView({type:'post', data:p})}>
            <div className="post-top">
              <div className="post-title-row">
                <span className="badge-pill" style={{fontSize:'10.5px'}}>{p.tag}</span>
                <span className="post-title">{p.title}</span>
              </div>
              <Icon name="chevron-right" style={{color:'#a1a1aa'}}/>
            </div>
            <div className="post-foot">
              <span>{p.author}</span><span>{p.date}</span>
              <span style={{display:'flex',alignItems:'center',gap:4}}><Icon name="message-circle" style={{fontSize:'12px'}}/>{p.replies}</span>
            </div>
          </button>
        ))}
        {loading && <div className="skeleton"></div>}
      </div>

      {showMore && (
        <div style={{textAlign:'center',marginTop:20}}>
          <button className="btn btn-outline" onClick={loadMore} disabled={loading}>
            {loading ? (lang==='ko'?'불러오는 중...':'Loading...') : (lang==='ko'?'더보기':'Load more')}
          </button>
        </div>
      )}

      {showWrite && (
        <div className="modal-wrap">
          <div className="modal-scrim" onClick={()=>setShowWrite(false)}></div>
          <div className="modal" style={{maxWidth:'520px'}}>
            <div className="modal-title" style={{marginBottom:16}}>{lang==='ko'?'새 글 작성':'New Post'}</div>
            <div className="field">
              <label>{lang==='ko'?'제목':'Title'}</label>
              <input value={draft.title} onChange={e=>setDraft({...draft,title:e.target.value})} placeholder={lang==='ko'?'제목을 입력하세요':'Enter a title'}/>
            </div>
            <div className="field">
              <label>{lang==='ko'?'내용':'Content'}</label>
              <div style={{display:'flex',gap:6,marginBottom:8}}>
                <button className={`chip ${bold?'active':''}`} style={{padding:'6px 12px'}} onClick={()=>setBold(!bold)}><b>B</b></button>
                <button className="chip" style={{padding:'6px 12px'}} onClick={()=>setDraft(d=>({...d, body: d.body + (lang==='ko'?'\n[첨부 이미지]':'\n[attached image]')}))}><Icon name="photo" style={{fontSize:'13px'}}/></button>
              </div>
              <textarea rows="4" style={{fontWeight:bold?700:400}} value={draft.body} onChange={e=>setDraft({...draft,body:e.target.value})} placeholder={lang==='ko'?'내용을 입력하세요':'Write your post'}></textarea>
            </div>
            <div className="btn-row" style={{marginTop:0}}>
              <button className="btn btn-ghost btn-block" onClick={()=>setShowWrite(false)}>{lang==='ko'?'취소':'Cancel'}</button>
              <button className="btn btn-primary btn-block" onClick={publish} disabled={!draft.title}>{lang==='ko'?'등록':'Publish'}</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

function MyPageScreen({lang, setLang}){
  const t = T[lang];
  return (
    <div className="screen">
      <div className="screen-head">
        <div className="screen-title">{t.myTitle}</div>
        <div className="screen-sub">{t.myDesc}</div>
      </div>
      <div className="profile-card">
        <div className="avatar" style={{background:'rgba(255,255,255,.14)'}}>김민</div>
        <div>
          <div className="profile-name">김민수</div>
          <div className="profile-sub">minsu.kim@example.com · {lang==='ko'?'국문 사용':'Using Korean'}</div>
        </div>
      </div>

      <div className="card" style={{marginBottom:20}}>
        <div style={{fontWeight:700,fontSize:15,marginBottom:14,color:'#09090b'}}>{lang==='ko'?'언어 설정':'Language'}</div>
        <div className="lang-switch" style={{width:'fit-content'}}>
          <button className={`lang-btn ${lang==='ko'?'active':''}`} onClick={()=>setLang('ko')}>KOR</button>
          <button className={`lang-btn ${lang==='en'?'active':''}`} onClick={()=>setLang('en')}>ENG</button>
        </div>
      </div>

      <div className="card">
        <div style={{fontWeight:700,fontSize:15,marginBottom:6,color:'#09090b'}}>{lang==='ko'?'신청·참여 이력':'Application & Survey History'}</div>
        {MY_HISTORY.map(h=>(
          <div key={h.id} className="hist-item">
            <div>
              <div className="hist-name">{h.name}</div>
              <div className="hist-date">{h.date}</div>
            </div>
            <span className={`status-badge ${h.status==='완료'?'status-done':'status-progress'}`}>{h.status}</span>
          </div>
        ))}
      </div>
    </div>
  );
}

function QuickViewDrawer({data, onClose, lang}){
  if(!data) return null;
  return (
    <React.Fragment>
      <div className="scrim" onClick={onClose}></div>
      <div className="drawer">
        <div className="drawer-head">
          <div className="drawer-title">
            {data.type==='stats' && (lang==='ko'?'접수 현황 상세':'Application Stats')}
            {data.type==='notice' && (lang==='ko'?'공지 상세':'Notice Detail')}
            {data.type==='post' && (lang==='ko'?'게시글 상세':'Post Detail')}
          </div>
          <button className="drawer-close" onClick={onClose}><Icon name="x" style={{fontSize:'15px'}}/></button>
        </div>
        <div className="drawer-body">
          {data.type==='stats' && (
            <div>
              <div className="hist-item"><span className="hist-name">{lang==='ko'?'이번 달 총 접수':'Total this month'}</span><span style={{fontWeight:700}}>1,284{lang==='ko'?'건':''}</span></div>
              <div className="hist-item"><span className="hist-name">{lang==='ko'?'생활지원금':'Living support'}</span><span>512{lang==='ko'?'건':''}</span></div>
              <div className="hist-item"><span className="hist-name">{lang==='ko'?'증명서 발급':'Certificate issuance'}</span><span>430{lang==='ko'?'건':''}</span></div>
              <div className="hist-item"><span className="hist-name">{lang==='ko'?'지역행사 참가':'Local event'}</span><span>342{lang==='ko'?'건':''}</span></div>
            </div>
          )}
          {data.type==='notice' && (
            <div>
              <div style={{fontWeight:700,fontSize:16,marginBottom:12,color:'#09090b'}}>{data.data.title}</div>
              <p style={{fontSize:13.5,color:'#71717a',lineHeight:1.7}}>
                {lang==='ko'
                  ? '해당 공지의 상세 내용은 다국어로 제공되며, 언어 전환 시 본문도 함께 번역되어 표시됩니다.'
                  : 'This notice is available in multiple languages and its body text updates when you switch language.'}
              </p>
            </div>
          )}
          {data.type==='post' && (
            <div>
              <div style={{fontWeight:700,fontSize:16,marginBottom:8,color:'#09090b'}}>{data.data.title}</div>
              <div style={{fontSize:12,color:'#71717a',marginBottom:16}}>{data.data.author} · {data.data.date}</div>
              <p style={{fontSize:13.5,color:'#3f3f46',lineHeight:1.7}}>
                {lang==='ko' ? '게시글 본문 내용이 이 영역에 표시되며, 웹과 앱이 동일한 세션으로 연동되어 어느 쪽에서 작성해도 즉시 동기화됩니다.' : 'The post body appears here, synced instantly across web and app through the shared session.'}
              </p>
            </div>
          )}
        </div>
        <div className="drawer-foot">
          <button className="btn btn-outline btn-block" onClick={onClose}>{lang==='ko'?'닫기':'Close'}</button>
        </div>
      </div>
    </React.Fragment>
  );
}

function App(){
  const [lang, setLang] = useState('ko');
  const [screen, setScreen] = useState('main');
  const [quickView, setQuickView] = useState(null);
  const [toast, setToast] = useState(null);

  function showToast(msg){ setToast(msg); }

  return (
    <div data-archetype="bento-grid" style={{width:'100%',minHeight:'100vh',display:'flex',flexDirection:'column'}}>
      <TopBar lang={lang} setLang={setLang} screen={screen} setScreen={setScreen} showToast={showToast} />
      <main style={{flex:1,width:'100%'}}>
        {screen==='main' && <MainScreen lang={lang} setScreen={setScreen} openQuickView={setQuickView} />}
        {screen==='apply' && <ApplyScreen lang={lang} showToast={showToast} />}
        {screen==='survey' && <SurveyScreen lang={lang} showToast={showToast} />}
        {screen==='board' && <BoardScreen lang={lang} showToast={showToast} openQuickView={setQuickView} />}
        {screen==='mypage' && <MyPageScreen lang={lang} setLang={setLang} />}
      </main>
      <QuickViewDrawer data={quickView} onClose={()=>setQuickView(null)} lang={lang} />
      {toast && <Toast msg={toast} onDone={()=>setToast(null)} />}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('app-root')).render(<App />);
</script>
</body>
</html>
