<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>이음 운영콘솔 — 다국어 콘텐츠 운영 관리 플랫폼</title>
<link rel="preconnect" href="https://cdn.jsdelivr.net">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
<link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/regular/style.css">
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
  :root{
    --lime:#beff50;
    --ink:#14140f;
    --parchment:#f5f5eb;
    --white:#ffffff;
    --ash:#d2d2c8;
    --graphite:#6e6e64;
    --charcoal:#30302a;
    --blue:#1e3af6;
    --r-card:28px;
    --r-inner:18px;
    --r-pill:9999px;
  }
  *{box-sizing:border-box;}
  html,body{width:100%;margin:0;padding:0;}
  body{
    font-family:'Pretendard',-apple-system,BlinkMacSystemFont,sans-serif;
    background:var(--white);
    color:var(--ink);
    -webkit-font-smoothing:antialiased;
  }
  #root{width:100%;}
  button{font-family:inherit;cursor:pointer;}
  ::selection{background:var(--lime);color:var(--ink);}

  @keyframes fadeInUp{from{opacity:0;transform:scale(.96);}to{opacity:1;transform:scale(1);}}
  @keyframes slideInPanel{from{transform:translateX(100%);opacity:0;}to{transform:translateX(0);opacity:1;}}
  @keyframes scrimIn{from{opacity:0;}to{opacity:1;}}
  @keyframes pulseLive{0%,100%{opacity:1;}50%{opacity:.35;}}
  @keyframes shimmer{0%{background-position:-300px 0;}100%{background-position:300px 0;}}
  @keyframes toastIn{from{opacity:0;transform:translate(-50%,16px);}to{opacity:1;transform:translate(-50%,0);}}

  .stagger > *{animation:fadeInUp .45s cubic-bezier(.2,.8,.2,1) both;}

  /* ---- 3-pane shell ---- */
  .shell{display:flex;width:100%;min-height:100vh;}

  .ws-strip{
    width:64px;flex-shrink:0;background:var(--ink);display:flex;flex-direction:column;align-items:center;
    padding:18px 0;gap:10px;
  }
  .ws-item{
    width:40px;height:40px;border-radius:14px;display:flex;align-items:center;justify-content:center;
    color:#d2d2c8;font-size:12px;font-weight:700;background:transparent;border:none;transition:all .15s;
  }
  .ws-item:hover{background:rgba(255,255,255,.08);}
  .ws-item.active{background:var(--lime);color:var(--ink);}
  .ws-divider{width:26px;height:1px;background:rgba(255,255,255,.15);margin:6px 0;}
  .sr-only{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0;}

  .list-rail{
    width:300px;flex-shrink:0;background:var(--parchment);border-right:1px solid var(--ash);display:flex;flex-direction:column;
  }
  .list-head{padding:22px 20px 14px;}
  .ws-name{font-size:17px;font-weight:700;color:var(--ink);display:flex;align-items:center;gap:8px;}
  .ws-name .dot{width:8px;height:8px;border-radius:50%;background:var(--lime);border:2px solid var(--ink);animation:pulseLive 2s infinite;}
  .list-search{padding:0 20px 14px;}
  .list-search input{
    width:100%;border:1px solid var(--ash);background:var(--white);border-radius:10px;padding:9px 12px;font-size:13px;font-family:inherit;
  }
  .list-search input:focus{outline:none;border-color:var(--ink);}
  .section-toggle{
    padding:6px 20px;font-size:11.5px;font-weight:700;color:var(--graphite);letter-spacing:.03em;text-transform:uppercase;
    background:none;border:none;width:100%;text-align:left;
  }
  .rail-scroll{flex:1;overflow-y:auto;padding-bottom:16px;}
  .rail-item{
    width:100%;display:flex;align-items:center;gap:10px;padding:10px 20px;border:none;background:transparent;text-align:left;
    font-size:13.5px;color:var(--ink);transition:background .15s;border-left:3px solid transparent;
  }
  .rail-item:hover{background:rgba(0,0,0,.03);}
  .rail-item.active{background:var(--white);border-left-color:var(--lime);font-weight:700;}
  .rail-item-title{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .rail-badge{font-size:10.5px;font-weight:700;padding:2px 7px;border-radius:8px;background:var(--ash);color:var(--ink);}
  .rail-badge.warn{background:#fde68a;color:#78350f;}
  .rail-badge.done{background:#bbf7d0;color:#14532d;}
  .rail-badge.blue{background:#dbeafe;color:#1e3af6;}

  .main-panel{flex:1;min-width:0;display:flex;flex-direction:column;background:var(--white);}
  .main-header{
    padding:20px 28px;border-bottom:1px solid var(--ash);display:flex;align-items:center;justify-content:space-between;gap:16px;
  }
  .main-title-row{display:flex;align-items:center;gap:10px;}
  .main-title{font-size:19px;font-weight:700;color:var(--ink);letter-spacing:-.01em;}
  .member-count{font-size:12px;color:var(--graphite);background:var(--parchment);padding:4px 10px;border-radius:var(--r-pill);}
  .main-actions{display:flex;gap:8px;}
  .icon-btn{
    width:36px;height:36px;border-radius:12px;border:1px solid var(--ash);background:var(--white);display:flex;align-items:center;justify-content:center;
    color:var(--ink);transition:background .15s;
  }
  .icon-btn:hover{background:var(--parchment);}

  .main-body{flex:1;overflow-y:auto;padding:24px 28px;}

  .btn{
    border:none;border-radius:var(--r-pill);padding:12px 20px;font-size:13.5px;font-weight:500;
    display:inline-flex;align-items:center;gap:8px;transition:opacity .15s,transform .1s;
  }
  .btn:active{transform:scale(.97);}
  .btn-lime{background:var(--lime);color:var(--ink);}
  .btn-ghost{background:transparent;color:var(--ink);border:1px solid var(--ash);}
  .btn-dark{background:var(--ink);color:var(--white);}
  .btn[disabled]{opacity:.4;cursor:not-allowed;}
  .btn-sm{padding:8px 14px;font-size:12.5px;}

  .card{background:var(--parchment);border-radius:var(--r-card);padding:24px;}
  .card-white{background:var(--white);border:1px solid var(--ash);border-radius:var(--r-card);padding:24px;}

  .kpi-row{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:22px;}
  .kpi-tile{background:var(--parchment);border-radius:var(--r-inner);padding:18px;}
  .kpi-num{font-size:46px;font-weight:500;color:var(--ink);letter-spacing:-1.5px;line-height:1;}
  .kpi-label{font-size:12px;color:var(--graphite);margin-top:4px;}

  .lang-progress-row{display:flex;align-items:center;gap:14px;margin-bottom:16px;}
  .lang-ring{position:relative;width:56px;height:56px;flex-shrink:0;}
  .lang-ring svg{transform:rotate(-90deg);}
  .lang-ring-label{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:var(--ink);}

  .content-row{
    display:flex;align-items:center;gap:14px;padding:14px 16px;border-bottom:1px solid var(--ash);background:var(--white);
    width:100%;text-align:left;border-radius:0;transition:background .15s;
  }
  .content-row:hover{background:var(--parchment);}
  .content-row:first-child{border-radius:var(--r-inner) var(--r-inner) 0 0;}
  .content-row:last-child{border-bottom:none;border-radius:0 0 var(--r-inner) var(--r-inner);}
  .content-key{font-size:13px;font-weight:600;color:var(--ink);flex:1;}
  .content-lang{font-size:11px;color:var(--graphite);}

  .status-pill{font-size:11px;font-weight:700;padding:4px 10px;border-radius:var(--r-pill);}
  .status-draft{background:var(--ash);color:var(--ink);}
  .status-review{background:#fde68a;color:#78350f;}
  .status-published{background:#bbf7d0;color:#14532d;}

  .table{width:100%;border-collapse:collapse;}
  .table th{
    text-align:left;font-size:11.5px;font-weight:700;color:var(--graphite);text-transform:uppercase;letter-spacing:.03em;
    padding:10px 14px;border-bottom:1px solid var(--ash);
  }
  .table td{padding:13px 14px;font-size:13.5px;border-bottom:1px solid var(--ash);color:var(--ink);}
  .table tr:last-child td{border-bottom:none;}
  .table tr{transition:background .15s;}
  .table tr.clickable:hover{background:var(--parchment);cursor:pointer;}

  .queue-item{
    display:flex;align-items:center;gap:14px;padding:16px;border-radius:var(--r-inner);background:var(--white);border:1px solid var(--ash);
    margin-bottom:10px;width:100%;text-align:left;transition:border-color .15s;
  }
  .queue-item:hover{border-color:var(--ink);transform:scale(1.02);}
  .queue-priority{width:6px;height:36px;border-radius:4px;flex-shrink:0;}
  .queue-title{font-size:13.5px;font-weight:600;color:var(--ink);}
  .queue-meta{font-size:11.5px;color:var(--graphite);margin-top:3px;}

  .timeline-track{position:relative;padding-left:24px;}
  .timeline-track::before{content:'';position:absolute;left:6px;top:6px;bottom:6px;width:2px;background:var(--ash);}
  .timeline-item{position:relative;padding-bottom:20px;}
  .timeline-item::before{content:'';position:absolute;left:-24px;top:2px;width:12px;height:12px;border-radius:50%;background:var(--lime);border:2px solid var(--ink);}
  .timeline-item.pending::before{background:var(--ash);border-color:var(--ash);}
  .timeline-phase{font-size:13.5px;font-weight:700;color:var(--ink);}
  .timeline-date{font-size:11.5px;color:var(--graphite);margin-top:2px;}

  .field{margin-bottom:18px;}
  .field label{display:block;font-size:12.5px;font-weight:600;color:var(--ink);margin-bottom:7px;}
  .field input,.field select,.field textarea{
    width:100%;border:1px solid var(--ash);border-radius:8px;padding:11px 13px;font-size:13.5px;font-family:inherit;
    background:var(--white);color:var(--ink);
  }
  .field input:focus,.field select:focus,.field textarea:focus{outline:none;border-color:var(--ink);}

  .skeleton{height:52px;border-radius:var(--r-inner);background:linear-gradient(90deg,#e8e8de 0px,#f3f3ea 60px,#e8e8de 120px);background-size:600px;animation:shimmer 1.3s infinite linear;margin-bottom:8px;}

  /* ---- info panel ---- */
  .info-panel{
    width:320px;flex-shrink:0;background:var(--parchment);border-left:1px solid var(--ash);display:flex;flex-direction:column;
    animation:slideInPanel .25s cubic-bezier(.2,.8,.2,1) both;
  }
  .info-header{padding:20px;border-bottom:1px solid var(--ash);display:flex;align-items:center;justify-content:space-between;}
  .info-title{font-size:14.5px;font-weight:700;color:var(--ink);}
  .info-body{padding:20px;overflow-y:auto;flex:1;}
  .info-section{margin-bottom:22px;}
  .info-label{font-size:11px;font-weight:700;color:var(--graphite);text-transform:uppercase;letter-spacing:.03em;margin-bottom:8px;}
  .info-value{font-size:13.5px;color:var(--ink);line-height:1.6;}
  .audit-item{display:flex;gap:10px;padding:10px 0;border-bottom:1px solid var(--ash);}
  .audit-item:last-child{border-bottom:none;}
  .audit-dot{width:7px;height:7px;border-radius:50%;background:var(--lime);margin-top:5px;flex-shrink:0;}
  .audit-text{font-size:12.5px;color:var(--ink);line-height:1.5;}
  .audit-time{font-size:11px;color:var(--graphite);margin-top:2px;}

  /* ---- modal ---- */
  .modal-wrap{position:fixed;inset:0;z-index:70;display:flex;align-items:center;justify-content:center;padding:24px;}
  .modal-scrim{position:fixed;inset:0;background:rgba(20,20,15,.5);animation:scrimIn .2s ease both;}
  .modal{position:relative;background:var(--white);border-radius:var(--r-card);width:100%;max-width:460px;padding:28px;animation:fadeInUp .25s cubic-bezier(.2,.8,.2,1) both;}
  .modal-title{font-size:17px;font-weight:700;color:var(--ink);margin-bottom:8px;}
  .modal-desc{font-size:13px;color:var(--graphite);line-height:1.6;margin-bottom:22px;}

  .toast{
    position:fixed;left:50%;bottom:32px;transform:translateX(-50%);background:var(--ink);color:var(--white);
    padding:13px 20px;border-radius:14px;font-size:13px;font-weight:600;z-index:80;display:flex;align-items:center;gap:9px;
    animation:toastIn .28s cubic-bezier(.2,.8,.2,1) both;box-shadow:0 12px 28px rgba(0,0,0,.24);
  }
  .toast .lime-dot{width:7px;height:7px;border-radius:50%;background:var(--lime);}

  .toggle{width:38px;height:22px;border-radius:99px;background:var(--ash);position:relative;border:none;flex-shrink:0;transition:background .2s;}
  .toggle.on{background:var(--lime);}
  .toggle-knob{position:absolute;top:2px;left:2px;width:18px;height:18px;border-radius:50%;background:var(--white);transition:transform .2s;}
  .toggle.on .toggle-knob{transform:translateX(16px);}

  @media (max-width:1100px){
    .list-rail{width:240px;}
    .info-panel{display:none;}
    .kpi-row{grid-template-columns:repeat(2,1fr);}
  }
</style>
</head>
<body>
<div id="app-root"></div>
<script type="text/babel">
const {useState, useEffect} = React;

const DOMAINS = [
  {key:'content', label:'콘', title:'다국어 콘텐츠 통합 관리'},
  {key:'apps', label:'접', title:'신청·설문 접수 현황 관리'},
  {key:'board', label:'게', title:'게시판 운영 및 모더레이션'},
  {key:'release', label:'배', title:'앱스토어 배포 현황 및 버전 관리'},
];

const CONTENT_ITEMS = [
  {id:1, key:'nav.home', ko:'홈', en:'Home', status:'published'},
  {id:2, key:'nav.apply', ko:'신청서 작성', en:'Apply', status:'published'},
  {id:3, key:'notice.title_02', ko:'생활지원금 2차 접수 안내', en:'', status:'draft'},
  {id:4, key:'survey.q1_option3', ko:'보통', en:'Neutral', status:'review'},
  {id:5, key:'footer.contact', ko:'문의처 안내', en:'Contact Info', status:'published'},
  {id:6, key:'board.write_cta', ko:'글쓰기', en:'', status:'draft'},
  {id:7, key:'mypage.history', ko:'신청·참여 이력', en:'History', status:'published'},
  {id:8, key:'apply.step2_title', ko:'서류 첨부', en:'Attach Documents', status:'review'},
];

const APPLICATIONS = [
  {id:'A-3391', type:'생활지원금 신청', name:'김민수', date:'2024.03.18', status:'접수'},
  {id:'A-3390', type:'여권·증명서 발급', name:'이지은', date:'2024.03.18', status:'검토'},
  {id:'A-3388', type:'지역행사 참가', name:'박서준', date:'2024.03.17', status:'완료'},
  {id:'A-3385', type:'생활지원금 신청', name:'최유진', date:'2024.03.16', status:'반려'},
  {id:'A-3381', type:'설문: 대중교통 개선', name:'정하윤', date:'2024.03.15', status:'완료'},
  {id:'A-3379', type:'여권·증명서 발급', name:'오지훈', date:'2024.03.14', status:'검토'},
];

const REPORT_QUEUE = [
  {id:1, title:"[자유] 부적절한 광고성 게시글", reporter:3, priority:'high', date:'10분 전'},
  {id:2, title:"댓글 내 욕설 신고", reporter:1, priority:'mid', date:'42분 전'},
  {id:3, title:"중복 등록된 공지사항", reporter:2, priority:'low', date:'2시간 전'},
];

const NOTICE_DRAFT_DEFAULT = {ko:'', en:''};

const RELEASES = [
  {id:1, platform:'iOS', version:'1.2.0', build:214, status:'심사중', date:'2024.03.17 제출'},
  {id:2, platform:'Android', version:'1.2.0', build:198, status:'게시됨', date:'2024.03.15 승인'},
  {id:3, platform:'iOS', version:'1.1.4', build:207, status:'반려', date:'2024.03.10 반려'},
];

function Icon({name, className, style}){
  return <i className={`ph ph-${name} ${className||''}`} style={style}></i>;
}

function Toast({msg, onDone}){
  useEffect(()=>{ const t=setTimeout(onDone, 2200); return ()=>clearTimeout(t); },[]);
  return <div className="toast"><span className="lime-dot"></span>{msg}</div>;
}

function LangRing({pct}){
  const r=24, c=2*Math.PI*r, offset=c*(1-pct/100);
  return (
    <div className="lang-ring">
      <svg width="56" height="56" viewBox="0 0 56 56">
        <circle cx="28" cy="28" r={r} fill="none" stroke="#d2d2c8" strokeWidth="6"/>
        <circle cx="28" cy="28" r={r} fill="none" stroke="#beff50" strokeWidth="6" strokeDasharray={c} strokeDashoffset={offset} strokeLinecap="round" style={{transition:'stroke-dashoffset .6s ease'}}/>
      </svg>
      <div className="lang-ring-label">{pct}%</div>
    </div>
  );
}

function InfoPanel({selected, auditLog}){
  if(!selected) return (
    <aside className="info-panel">
      <div className="info-header"><div className="info-title">감사 로그</div></div>
      <div className="info-body">
        <div className="info-section">
          <div className="info-label">최근 활동</div>
          {auditLog.map((a,i)=>(
            <div className="audit-item" key={i}>
              <span className="audit-dot"></span>
              <div>
                <div className="audit-text">{a.text}</div>
                <div className="audit-time">{a.time}</div>
              </div>
            </div>
          ))}
        </div>
      </div>
    </aside>
  );
  return (
    <aside className="info-panel">
      <div className="info-header"><div className="info-title">상세 정보</div></div>
      <div className="info-body">
        {Object.entries(selected).map(([k,v])=>(
          <div className="info-section" key={k}>
            <div className="info-label">{k}</div>
            <div className="info-value">{String(v)}</div>
          </div>
        ))}
        <div className="info-section">
          <div className="info-label">최근 활동</div>
          {auditLog.slice(0,3).map((a,i)=>(
            <div className="audit-item" key={i}>
              <span className="audit-dot"></span>
              <div><div className="audit-text">{a.text}</div><div className="audit-time">{a.time}</div></div>
            </div>
          ))}
        </div>
      </div>
    </aside>
  );
}

function ContentDomain({showToast, pushAudit}){
  const [items, setItems] = useState(CONTENT_ITEMS);
  const [selected, setSelected] = useState(null);
  const [draftEn, setDraftEn] = useState('');
  const [showDashboard, setShowDashboard] = useState(false);

  const missing = items.filter(i=>!i.en).length;
  const coverage = Math.round(((items.length-missing)/items.length)*100);
  const domainCoverage = [
    {name:'홈 · 신청서', pct:96},
    {name:'설문조사', pct:74},
    {name:'게시판', pct:58},
    {name:'마이페이지', pct:88},
  ];

  function openEdit(item){
    setSelected(item);
    setDraftEn(item.en);
  }

  function saveTranslation(){
    setItems(items.map(i=>i.id===selected.id ? {...i, en:draftEn, status: draftEn ? 'review' : i.status} : i));
    pushAudit(`"${selected.key}" 영문 번역이 저장됨`);
    showToast('번역이 저장되었습니다');
    setSelected(null);
  }

  function publish(item){
    setItems(items.map(i=>i.id===item.id ? {...i, status:'published'} : i));
    pushAudit(`"${item.key}" 게시 상태로 전환됨`);
    showToast('게시 완료');
  }

  return (
    <React.Fragment>
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:16}}>
        <div style={{fontSize:13,fontWeight:700,color:'#6e6e64',textTransform:'uppercase',letterSpacing:'.03em'}}>콘텐츠 운영 개요</div>
        <button className="btn btn-ghost btn-sm" onClick={()=>setShowDashboard(true)}><Icon name="chart-donut" style={{fontSize:'14px'}}/>번역 현황 대시보드</button>
      </div>

      <div className="kpi-row stagger">
        <div className="kpi-tile" style={{borderRadius:28}}><div className="kpi-num">{items.length}</div><div className="kpi-label">전체 콘텐츠 키</div></div>
        <div className="kpi-tile" style={{borderRadius:28}}><div className="kpi-num">{missing}</div><div className="kpi-label">미번역 항목</div></div>
        <div className="kpi-tile" style={{borderRadius:28}}><div className="kpi-num">{items.filter(i=>i.status==='review').length}</div><div className="kpi-label">검수 대기</div></div>
        <div className="kpi-tile" style={{borderRadius:28}}><div className="kpi-num">{items.filter(i=>i.status==='published').length}</div><div className="kpi-label">게시됨</div></div>
      </div>

      <div className="card-white" style={{marginBottom:20}}>
        <div className="lang-progress-row">
          <LangRing pct={coverage} />
          <div>
            <div style={{fontSize:14.5,fontWeight:700,color:'#14140f'}}>영문 번역 커버리지</div>
            <div style={{fontSize:12,color:'#6e6e64',marginTop:2}}>미번역 {missing}건은 하단 목록 상단에 자동 배지로 표시됩니다</div>
          </div>
        </div>
      </div>

      {showDashboard && (
        <div className="modal-wrap">
          <div className="modal-scrim" onClick={()=>setShowDashboard(false)}></div>
          <div className="modal" style={{maxWidth:'480px'}}>
            <div className="modal-title">번역 현황 대시보드</div>
            <div className="modal-desc">화면 영역별 영문 번역 커버리지입니다</div>
            <div style={{display:'flex',flexDirection:'column',gap:16,marginBottom:22}}>
              {domainCoverage.map(d=>(
                <div key={d.name}>
                  <div style={{display:'flex',justifyContent:'space-between',fontSize:13,marginBottom:6}}>
                    <span style={{fontWeight:600,color:'#14140f'}}>{d.name}</span>
                    <span style={{color:'#6e6e64'}}>{d.pct}%</span>
                  </div>
                  <div style={{height:8,background:'#f5f5eb',borderRadius:99,overflow:'hidden'}}>
                    <div style={{height:'100%',width:`${d.pct}%`,background:'#beff50',borderRadius:99,transition:'width .5s ease'}}></div>
                  </div>
                </div>
              ))}
            </div>
            <button className="btn btn-ghost" style={{width:'100%',justifyContent:'center'}} onClick={()=>setShowDashboard(false)}>닫기</button>
          </div>
        </div>
      )}

      <div style={{fontSize:13,fontWeight:700,color:'#6e6e64',marginBottom:10,textTransform:'uppercase',letterSpacing:'.03em'}}>콘텐츠 키 목록</div>
      <div className="card-white" style={{padding:0,overflow:'hidden'}}>
        {items.map(item=>(
          <button key={item.id} className="content-row" onClick={()=>openEdit(item)}>
            <div style={{flex:1}}>
              <div className="content-key">{item.key}</div>
              <div className="content-lang">KO: {item.ko}</div>
            </div>
            {!item.en && <span className="rail-badge warn">미번역</span>}
            <span className={`status-pill status-${item.status}`}>{item.status==='draft'?'초안':item.status==='review'?'검수':'게시'}</span>
            {item.status==='review' && (
              <button className="btn btn-sm btn-dark" onClick={(e)=>{e.stopPropagation();publish(item);}}>게시</button>
            )}
          </button>
        ))}
      </div>

      {selected && (
        <div className="modal-wrap">
          <div className="modal-scrim" onClick={()=>setSelected(null)}></div>
          <div className="modal">
            <div className="modal-title">콘텐츠 번역 편집</div>
            <div className="modal-desc">{selected.key}</div>
            <div className="field">
              <label>국문 (KO)</label>
              <input value={selected.ko} disabled/>
            </div>
            <div className="field">
              <label>영문 (EN)</label>
              <textarea rows="3" value={draftEn} onChange={e=>setDraftEn(e.target.value)} placeholder="영문 번역을 입력하세요"></textarea>
            </div>
            <div style={{display:'flex',gap:10}}>
              <button className="btn btn-ghost" style={{flex:1,justifyContent:'center'}} onClick={()=>setSelected(null)}>취소</button>
              <button className="btn btn-lime" style={{flex:1,justifyContent:'center'}} onClick={saveTranslation}>저장</button>
            </div>
          </div>
        </div>
      )}
    </React.Fragment>
  );
}

function ApplicationsDomain({showToast, pushAudit}){
  const [rows, setRows] = useState(APPLICATIONS);
  const [selected, setSelected] = useState(null);
  const [filter, setFilter] = useState('전체');

  const filters = ['전체','접수','검토','완료','반려'];
  const filtered = filter==='전체' ? rows : rows.filter(r=>r.status===filter);

  function changeStatus(row, status){
    setRows(rows.map(r=>r.id===row.id?{...r,status}:r));
    pushAudit(`${row.id} 상태가 "${status}"(으)로 변경됨`);
    showToast('처리 상태가 변경되었습니다');
    setSelected(s=>s?{...s,status}:s);
  }

  function exportCsv(){
    showToast(`${filtered.length}건이 CSV로 내보내기 되었습니다`);
    pushAudit(`접수 목록 ${filtered.length}건 CSV 내보내기`);
  }

  return (
    <React.Fragment>
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:16}}>
        <div style={{display:'flex',gap:8}}>
          {filters.map(f=>(
            <button key={f} className="btn btn-sm" style={{background:filter===f?'#14140f':'#f5f5eb',color:filter===f?'#fff':'#14140f'}} onClick={()=>setFilter(f)}>{f}</button>
          ))}
        </div>
        <button className="btn btn-ghost btn-sm" onClick={exportCsv}><Icon name="export" style={{fontSize:'14px'}}/>CSV 내보내기</button>
      </div>
      <div className="card-white" style={{padding:0,overflow:'hidden'}}>
        <table className="table">
          <thead><tr><th>접수번호</th><th>유형</th><th>신청인</th><th>접수일</th><th>상태</th></tr></thead>
          <tbody>
            {filtered.map(row=>(
              <tr key={row.id} className="clickable" onClick={()=>setSelected(row)}>
                <td style={{fontWeight:700}}>{row.id}</td>
                <td>{row.type}</td>
                <td>{row.name}</td>
                <td>{row.date}</td>
                <td><span className={`status-pill ${row.status==='완료'?'status-published':row.status==='반려'?'status-review':'status-draft'}`}>{row.status}</span></td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>

      {selected && (
        <div className="modal-wrap">
          <div className="modal-scrim" onClick={()=>setSelected(null)}></div>
          <div className="modal">
            <div className="modal-title">{selected.id} 상세</div>
            <div className="modal-desc">{selected.type} · {selected.name} · {selected.date}</div>
            <div style={{fontSize:12.5,fontWeight:700,color:'#6e6e64',marginBottom:10,textTransform:'uppercase'}}>처리 상태 변경</div>
            <div style={{display:'flex',gap:8,marginBottom:22,flexWrap:'wrap'}}>
              {['접수','검토','완료','반려'].map(s=>(
                <button key={s} className="btn btn-sm" style={{background:selected.status===s?'#14140f':'#f5f5eb',color:selected.status===s?'#fff':'#14140f'}} onClick={()=>changeStatus(selected,s)}>{s}</button>
              ))}
            </div>
            <button className="btn btn-ghost" style={{width:'100%',justifyContent:'center'}} onClick={()=>setSelected(null)}>닫기</button>
          </div>
        </div>
      )}
    </React.Fragment>
  );
}

function BoardDomain({showToast, pushAudit}){
  const [queue, setQueue] = useState(REPORT_QUEUE);
  const [showNotice, setShowNotice] = useState(false);
  const [draft, setDraft] = useState(NOTICE_DRAFT_DEFAULT);

  const sorted = [...queue].sort((a,b)=>{
    const order = {high:0, mid:1, low:2};
    return order[a.priority]-order[b.priority];
  });

  function resolve(item){
    setQueue(queue.filter(q=>q.id!==item.id));
    pushAudit(`신고 "${item.title}" 처리 완료`);
    showToast('신고 항목이 처리되었습니다');
  }

  function publishNotice(){
    if(!draft.ko) return;
    pushAudit(`공지 "${draft.ko}" 국/영문 동시 발행됨`);
    showToast('공지사항이 국문/영문으로 발행되었습니다');
    setShowNotice(false);
    setDraft(NOTICE_DRAFT_DEFAULT);
  }

  return (
    <React.Fragment>
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:16}}>
        <div style={{fontSize:14,fontWeight:700,color:'#14140f'}}>신고 처리 큐 · 우선순위순 {sorted.length}건</div>
        <button className="btn btn-lime btn-sm" onClick={()=>setShowNotice(true)}><Icon name="megaphone" style={{fontSize:'14px'}}/>공지 발행</button>
      </div>
      {sorted.map(item=>(
        <div key={item.id} className="queue-item">
          <div className="queue-priority" style={{background: item.priority==='high'?'#ef4444':item.priority==='mid'?'#f59e0b':'#a3a39a'}}></div>
          <div style={{flex:1}}>
            <div className="queue-title">{item.title}</div>
            <div className="queue-meta">신고 {item.reporter}건 · {item.date}</div>
          </div>
          <button className="btn btn-ghost btn-sm" onClick={()=>resolve(item)}>처리 완료</button>
        </div>
      ))}
      {sorted.length===0 && <div className="card" style={{textAlign:'center',color:'#6e6e64',fontSize:13}}>처리할 신고가 없습니다</div>}

      {showNotice && (
        <div className="modal-wrap">
          <div className="modal-scrim" onClick={()=>setShowNotice(false)}></div>
          <div className="modal">
            <div className="modal-title">공지사항 다국어 발행</div>
            <div className="modal-desc">국문/영문 번역본이 하나의 트랜잭션으로 저장됩니다</div>
            <div className="field">
              <label>제목 (KO)</label>
              <input value={draft.ko} onChange={e=>setDraft({...draft,ko:e.target.value})} placeholder="예: 4월 지역행사 일정 안내"/>
            </div>
            <div className="field">
              <label>제목 (EN)</label>
              <input value={draft.en} onChange={e=>setDraft({...draft,en:e.target.value})} placeholder="e.g. April Local Event Schedule"/>
            </div>
            <div style={{display:'flex',gap:10}}>
              <button className="btn btn-ghost" style={{flex:1,justifyContent:'center'}} onClick={()=>setShowNotice(false)}>취소</button>
              <button className="btn btn-lime" style={{flex:1,justifyContent:'center'}} disabled={!draft.ko} onClick={publishNotice}>발행</button>
            </div>
          </div>
        </div>
      )}
    </React.Fragment>
  );
}

function ReleaseDomain({showToast, pushAudit}){
  const [releases, setReleases] = useState(RELEASES);
  const [selected, setSelected] = useState(null);
  const [memo, setMemo] = useState('');

  function refreshStatus(r){
    pushAudit(`${r.platform} ${r.version} 상태 수동 갱신`);
    showToast('심사 상태가 갱신되었습니다 (최종 갱신: 방금 전)');
  }

  function saveMemo(){
    pushAudit(`${selected.platform} ${selected.version} 반려 대응 메모 저장됨`);
    showToast('메모가 저장되었습니다');
    setSelected(null);
    setMemo('');
  }

  return (
    <React.Fragment>
      <div className="timeline-track" style={{marginBottom:24}}>
        {releases.map((r,i)=>(
          <div key={r.id} className={`timeline-item ${r.status==='심사중'?'':''}`}>
            <div className="timeline-phase">{r.platform} {r.version} · build {r.build}</div>
            <div className="timeline-date">{r.date} — <span className={`status-pill ${r.status==='게시됨'?'status-published':r.status==='반려'?'status-review':'status-draft'}`}>{r.status}</span></div>
          </div>
        ))}
      </div>

      <div style={{fontSize:13,fontWeight:700,color:'#6e6e64',marginBottom:10,textTransform:'uppercase',letterSpacing:'.03em'}}>버전별 배포 이력</div>
      <div className="card-white" style={{padding:0,overflow:'hidden'}}>
        <table className="table">
          <thead><tr><th>플랫폼</th><th>버전</th><th>빌드</th><th>상태</th><th>동작</th></tr></thead>
          <tbody>
            {releases.map(r=>(
              <tr key={r.id}>
                <td>{r.platform}</td><td>{r.version}</td><td>{r.build}</td>
                <td><span className={`status-pill ${r.status==='게시됨'?'status-published':r.status==='반려'?'status-review':'status-draft'}`}>{r.status}</span></td>
                <td style={{display:'flex',gap:6}}>
                  <button className="btn btn-sm btn-ghost" onClick={()=>refreshStatus(r)}><Icon name="arrows-clockwise" style={{fontSize:'12px'}}/>갱신</button>
                  {r.status==='반려' && <button className="btn btn-sm btn-dark" onClick={()=>setSelected(r)}>메모 작성</button>}
                </td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>

      {selected && (
        <div className="modal-wrap">
          <div className="modal-scrim" onClick={()=>setSelected(null)}></div>
          <div className="modal">
            <div className="modal-title">반려 대응 메모</div>
            <div className="modal-desc">{selected.platform} {selected.version} (build {selected.build})</div>
            <div className="field">
              <label>대응 메모</label>
              <textarea rows="3" value={memo} onChange={e=>setMemo(e.target.value)} placeholder="반려 사유 및 대응 계획을 기록하세요"></textarea>
            </div>
            <div style={{display:'flex',gap:10}}>
              <button className="btn btn-ghost" style={{flex:1,justifyContent:'center'}} onClick={()=>setSelected(null)}>취소</button>
              <button className="btn btn-lime" style={{flex:1,justifyContent:'center'}} onClick={saveMemo}>저장</button>
            </div>
          </div>
        </div>
      )}
    </React.Fragment>
  );
}

const DOMAIN_META = {
  content: {title:'다국어 콘텐츠 통합 관리', members:'운영자 4명', info:{'도메인':'다국어 콘텐츠','언어':'국문 · 영문','워크플로우':'초안 → 검수 → 게시'}},
  apps: {title:'신청·설문 접수 현황 관리', members:'운영자 6명', info:{'도메인':'접수 처리','연동':'기존 전자정부 API','내보내기':'CSV'}},
  board: {title:'게시판 운영 및 모더레이션', members:'운영자 3명', info:{'도메인':'커뮤니티 운영','정렬 기준':'신고 횟수 · 최신성','발행 언어':'국문 · 영문 동시'}},
  release: {title:'앱스토어 배포 현황 및 버전 관리', members:'운영자 2명', info:{'플랫폼':'iOS · Android','최근 빌드':'214','추적 방식':'이력 테이블 + 타임라인'}},
};

function App(){
  const [domain, setDomain] = useState('content');
  const [toast, setToast] = useState(null);
  const [infoSelected, setInfoSelected] = useState(null);
  const [auditLog, setAuditLog] = useState([
    {text:'"nav.home" 게시 상태로 전환됨', time:'8분 전'},
    {text:'A-3388 상태가 "완료"(으)로 변경됨', time:'22분 전'},
    {text:'iOS 1.1.4 심사 반려 메모 저장됨', time:'1시간 전'},
  ]);

  function showToast(msg){ setToast(msg); }
  function pushAudit(text){ setAuditLog(a=>[{text, time:'방금 전'}, ...a].slice(0,8)); }

  const meta = DOMAIN_META[domain];

  return (
    <div data-archetype="slack-3pane" className="shell">
      <nav className="ws-strip" data-workspace-strip>
        {DOMAINS.map(d=>(
          <button key={d.key} className={`ws-item ${domain===d.key?'active':''}`} title={d.title} onClick={()=>{setDomain(d.key);setInfoSelected(null);}}>
            {d.label}
            <span className="sr-only">{d.title}</span>
          </button>
        ))}
        <div className="ws-divider"></div>
        <button className="ws-item" title="설정" onClick={()=>showToast('운영자 설정 패널을 엽니다')}><Icon name="gear-six"/></button>
      </nav>

      <aside className="list-rail channel-list" data-channel-list>
        <div className="list-head">
          <div className="ws-name"><span className="dot"></span>이음 운영콘솔</div>
        </div>
        <div className="list-search"><input placeholder="검색…" /></div>
        <div className="section-toggle">▾ {meta.title}</div>
        <div className="rail-scroll">
          {domain==='content' && CONTENT_ITEMS.slice(0,6).map(c=>(
            <div key={c.id} className={`rail-item`}>
              <span className="rail-item-title">{c.key}</span>
              {!c.en && <span className="rail-badge warn">미번역</span>}
            </div>
          ))}
          {domain==='apps' && APPLICATIONS.slice(0,6).map(a=>(
            <div key={a.id} className="rail-item">
              <span className="rail-item-title">{a.id} · {a.name}</span>
              <span className={`rail-badge ${a.status==='완료'?'done':a.status==='반려'?'warn':'blue'}`}>{a.status}</span>
            </div>
          ))}
          {domain==='board' && REPORT_QUEUE.map(r=>(
            <div key={r.id} className="rail-item">
              <span className="rail-item-title">{r.title}</span>
              <span className="rail-badge warn">{r.reporter}</span>
            </div>
          ))}
          {domain==='release' && RELEASES.map(r=>(
            <div key={r.id} className="rail-item">
              <span className="rail-item-title">{r.platform} {r.version}</span>
              <span className={`rail-badge ${r.status==='게시됨'?'done':r.status==='반려'?'warn':'blue'}`}>{r.status}</span>
            </div>
          ))}
        </div>
      </aside>

      <main className="main-panel">
        <header className="main-header">
          <div className="main-title-row">
            <div className="main-title">{meta.title}</div>
            <span className="member-count">{meta.members}</span>
          </div>
          <div className="main-actions">
            <button className="icon-btn" onClick={()=>showToast('즐겨찾기에 고정되었습니다')}><Icon name="push-pin"/></button>
            <button className="icon-btn" onClick={()=>showToast('전체 검색을 엽니다')}><Icon name="magnifying-glass"/></button>
            <button className="icon-btn toggle-info" onClick={()=>setInfoSelected(infoSelected?null:{'패널':'열림'})}><Icon name="info"/></button>
          </div>
        </header>
        <div className="main-body">
          {domain==='content' && <ContentDomain showToast={showToast} pushAudit={pushAudit} />}
          {domain==='apps' && <ApplicationsDomain showToast={showToast} pushAudit={pushAudit} />}
          {domain==='board' && <BoardDomain showToast={showToast} pushAudit={pushAudit} />}
          {domain==='release' && <ReleaseDomain showToast={showToast} pushAudit={pushAudit} />}
        </div>
      </main>

      <InfoPanel selected={null} auditLog={auditLog} />

      {toast && <Toast msg={toast} onDone={()=>setToast(null)} />}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('app-root')).render(<App />);
</script>
</body>
</html>
