<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>다시케어 — 재활 선생님 매칭 예약 플랫폼</title>
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<style>
  :root{
    --lime:#beff50;
    --ink:#14140f;
    --parchment:#f5f5eb;
    --white:#ffffff;
    --ash:#d2d2c8;
    --graphite:#6e6e64;
    --charcoal:#30302a;
    --smoke:#b9b9b7;
    --accent:#1e3af6;
    --r-card:28px;
    --r-inner:18px;
    --r-btn:28px;
    --r-pill:9999px;
    --r-input:8px;
  }
  *{box-sizing:border-box;}
  html,body{width:100%;margin:0;padding:0;background:var(--white);}
  body{font-family:'Pretendard',ui-sans-serif,system-ui,sans-serif;color:var(--ink);-webkit-font-smoothing:antialiased;}
  #root{width:100%;}
  button{font-family:inherit;cursor:pointer;border:none;background:none;}
  input,select,textarea{font-family:inherit;}
  a{text-decoration:none;color:inherit;}
  ::-webkit-scrollbar{height:6px;width:6px;}
  ::-webkit-scrollbar-thumb{background:var(--ash);border-radius:99px;}

  @keyframes fadeInUp{from{opacity:0;transform:translateY(14px);}to{opacity:1;transform:translateY(0);}}
  @keyframes drawerSlide{from{transform:translateX(100%);}to{transform:translateX(0);}}
  @keyframes overlayIn{from{opacity:0;}to{opacity:1;}}
  @keyframes pulseDot{0%{box-shadow:0 0 0 0 rgba(30,58,246,0.35);}70%{box-shadow:0 0 0 8px rgba(30,58,246,0);}100%{box-shadow:0 0 0 0 rgba(30,58,246,0);}}
  @keyframes toastIn{from{opacity:0;transform:translate(-50%,12px);}to{opacity:1;transform:translate(-50%,0);}}
  @keyframes blobFloat{0%,100%{transform:translate(0,0) scale(1);}50%{transform:translate(8px,-10px) scale(1.03);}}
  @keyframes spinRing{to{transform:rotate(360deg);}}

  .eyebrow{font-size:10px;letter-spacing:1px;text-transform:uppercase;font-weight:500;color:var(--graphite);}

  /* ===== Header (archetype signature: sticky search header) ===== */
  .search-header{position:sticky;top:0;z-index:40;background:var(--white);border-bottom:1px solid var(--ash);width:100%;}
  .header-row{display:flex;align-items:center;gap:20px;max-width:1200px;margin:0 auto;padding:16px 24px;}
  .brand{font-size:20px;font-weight:500;letter-spacing:-0.02em;color:var(--ink);display:flex;align-items:center;gap:6px;flex-shrink:0;}
  .brand-dot{width:8px;height:8px;border-radius:50%;background:var(--lime);}
  .search-bar{flex:1;display:flex;align-items:stretch;background:var(--parchment);border-radius:var(--r-pill);padding:4px;gap:0;max-width:640px;}
  .search-segment{display:flex;flex-direction:column;justify-content:center;padding:6px 18px;flex:1;min-width:0;border-radius:var(--r-pill);transition:background .15s;}
  .search-segment:hover{background:var(--white);}
  .segment-label{font-size:10px;letter-spacing:0.6px;color:var(--graphite);text-transform:uppercase;font-weight:500;}
  .segment-value{border:none;background:none;font-size:14px;font-weight:500;color:var(--ink);width:100%;padding:0;margin-top:2px;appearance:none;}
  .search-divider{width:1px;background:var(--ash);margin:6px 0;}
  .search-submit{width:40px;height:40px;border-radius:50%;background:var(--ink);color:var(--white);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:transform .15s;}
  .search-submit:hover{transform:scale(1.06);}
  .header-nav{display:flex;align-items:center;gap:8px;flex-shrink:0;}
  .nav-link{font-size:14px;font-weight:500;color:var(--ink);padding:10px 14px;border-radius:var(--r-pill);white-space:nowrap;display:flex;align-items:center;gap:6px;transition:background .15s;}
  .nav-link:hover{background:var(--parchment);}
  .nav-link.is-active{background:var(--ink);color:var(--white);}
  .cta-pill{background:var(--lime);color:var(--ink);font-weight:500;font-size:14px;padding:12px 20px;border-radius:var(--r-btn);white-space:nowrap;display:flex;align-items:center;gap:6px;transition:transform .15s;}
  .cta-pill:hover{transform:translateY(-1px);}

  .filter-chips{display:flex;gap:10px;overflow-x:auto;max-width:1200px;margin:0 auto;padding:14px 24px 16px;scrollbar-width:none;}
  .filter-chips::-webkit-scrollbar{display:none;}
  .chip{display:flex;align-items:center;gap:6px;flex-shrink:0;padding:9px 16px;border-radius:var(--r-pill);border:1px solid var(--ash);font-size:13px;font-weight:500;color:var(--ink);background:var(--white);transition:all .15s;}
  .chip:hover{border-color:var(--ink);}
  .chip.active{background:var(--ink);color:var(--white);border-color:var(--ink);}
  .chip svg{width:15px;height:15px;}

  /* ===== promo band (procedural visual) ===== */
  .promo-band{position:relative;overflow:hidden;max-width:1200px;margin:0 auto;background:var(--parchment);border-radius:var(--r-card);padding:28px 40px;display:flex;align-items:center;justify-content:space-between;margin-top:20px;}
  .promo-band .blob{position:absolute;right:-30px;top:-30px;width:180px;height:180px;border-radius:50%;background:radial-gradient(circle at 30% 30%, var(--lime), transparent 70%);opacity:0.9;animation:blobFloat 7s ease-in-out infinite;}
  .promo-band h2{font-size:32px;font-weight:500;letter-spacing:-0.02em;margin:0 0 4px;position:relative;z-index:1;}
  .promo-band p{font-size:14px;color:var(--graphite);margin:0;position:relative;z-index:1;}

  /* ===== main / card grid ===== */
  .main-wrap{width:100%;max-width:1200px;margin:0 auto;padding:28px 24px 100px;}
  .grid-heading{display:flex;align-items:baseline;justify-content:space-between;margin:28px 0 16px;}
  .grid-heading h3{font-size:22px;font-weight:500;letter-spacing:-0.01em;margin:0;}
  .grid-count{font-size:13px;color:var(--graphite);}
  .card-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:20px;}
  .listing-card{background:var(--white);border-radius:var(--r-card);overflow:hidden;border:1px solid var(--ash);cursor:pointer;transition:transform .2s, box-shadow .2s;animation:fadeInUp .5s ease backwards;}
  .listing-card:hover{transform:translateY(-4px);box-shadow:0 16px 32px -12px rgba(20,20,15,0.18);}
  .card-image-wrap{position:relative;width:100%;aspect-ratio:4/3;overflow:hidden;background:var(--parchment);}
  .card-image-wrap img{width:100%;height:100%;object-fit:cover;}
  .card-favorite{position:absolute;top:10px;right:10px;width:32px;height:32px;border-radius:50%;background:rgba(255,255,255,0.9);display:flex;align-items:center;justify-content:center;transition:transform .15s;}
  .card-favorite:hover{transform:scale(1.1);}
  .card-favorite svg{width:16px;height:16px;color:var(--ink);}
  .card-favorite.active svg{color:var(--accent);fill:var(--accent);}
  .card-badge{position:absolute;left:10px;top:10px;background:var(--lime);color:var(--ink);font-size:11px;font-weight:500;padding:5px 10px;border-radius:var(--r-pill);}
  .card-body{padding:16px;}
  .card-row-1{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;}
  .card-title{font-size:16px;font-weight:500;margin:0;letter-spacing:-0.01em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .card-rating{display:flex;align-items:center;gap:3px;font-size:13px;font-weight:500;flex-shrink:0;}
  .card-rating svg{width:13px;height:13px;color:var(--accent);fill:var(--accent);}
  .card-meta{font-size:13px;color:var(--graphite);display:block;margin-top:4px;}
  .card-tags{display:flex;gap:6px;margin-top:8px;}
  .card-tag{font-size:11px;background:var(--parchment);color:var(--graphite);padding:3px 9px;border-radius:var(--r-pill);}
  .card-row-4{margin-top:12px;display:flex;align-items:baseline;gap:4px;}
  .card-price{font-size:17px;font-weight:500;}
  .price-unit{font-size:12px;color:var(--graphite);}

  /* ===== quick-view drawer ===== */
  .qv-overlay{position:fixed;inset:0;background:rgba(20,20,15,0.35);z-index:60;animation:overlayIn .2s ease;display:flex;justify-content:flex-end;}
  .qv-drawer{width:440px;max-width:92vw;height:100%;background:var(--white);overflow-y:auto;animation:drawerSlide .32s cubic-bezier(.2,.8,.2,1);padding:0;}
  .qv-head-img{width:100%;height:200px;object-fit:cover;}
  .qv-close{position:absolute;top:16px;right:16px;width:36px;height:36px;border-radius:50%;background:rgba(255,255,255,0.92);display:flex;align-items:center;justify-content:center;}
  .qv-body{padding:24px;}
  .qv-name{font-size:24px;font-weight:500;letter-spacing:-0.02em;margin:0 0 6px;display:flex;align-items:center;gap:8px;}
  .verified-badge{display:inline-flex;align-items:center;gap:4px;background:rgba(30,58,246,0.1);color:var(--accent);font-size:12px;font-weight:500;padding:4px 10px;border-radius:var(--r-pill);animation:pulseDot 2.4s infinite;}
  .verified-badge svg{width:12px;height:12px;}
  .qv-meta-row{display:flex;gap:16px;color:var(--graphite);font-size:13px;margin-bottom:16px;}
  .qv-meta-row span{display:flex;align-items:center;gap:4px;}
  .qv-desc{font-size:14px;line-height:1.6;color:var(--ink);margin-bottom:20px;}
  .qv-section-title{font-size:13px;font-weight:500;color:var(--graphite);text-transform:uppercase;letter-spacing:0.6px;margin:20px 0 10px;}
  .cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;}
  .cal-cell{aspect-ratio:1;display:flex;align-items:center;justify-content:center;border-radius:10px;font-size:13px;background:var(--parchment);color:var(--ink);transition:all .15s;}
  .cal-cell.avail:hover{background:var(--lime);}
  .cal-cell.booked{background:var(--white);color:var(--smoke);text-decoration:line-through;cursor:not-allowed;}
  .cal-cell.selected{background:var(--ink);color:var(--white);}
  .cal-cell.pad{background:transparent;}
  .slot-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px;}
  .slot-pill{padding:8px 14px;border-radius:var(--r-pill);border:1px solid var(--ash);font-size:13px;font-weight:500;}
  .slot-pill.active{background:var(--ink);color:var(--white);border-color:var(--ink);}
  .qv-price-row{display:flex;justify-content:space-between;align-items:center;padding:16px 0;border-top:1px solid var(--ash);margin-top:20px;}
  .qv-price{font-size:20px;font-weight:500;}
  .book-btn{width:100%;background:var(--lime);color:var(--ink);font-size:16px;font-weight:500;padding:16px;border-radius:var(--r-btn);margin-top:8px;transition:transform .15s;}
  .book-btn:hover{transform:translateY(-1px);}
  .book-btn:disabled{background:var(--ash);color:var(--smoke);cursor:not-allowed;transform:none;}

  /* ===== generic screen layout ===== */
  .screen{max-width:900px;margin:0 auto;padding:40px 24px 100px;}
  .screen-narrow{max-width:640px;}
  .screen-head{margin-bottom:28px;}
  .screen-head h1{font-size:46px;font-weight:500;letter-spacing:-0.03em;line-height:1.05;margin:0 0 8px;}
  .screen-head p{color:var(--graphite);font-size:15px;margin:0;}
  .card-panel{background:var(--parchment);border-radius:var(--r-card);padding:32px;margin-bottom:20px;}
  .card-panel.white{background:var(--white);border:1px solid var(--ash);}
  .field-row{margin-bottom:16px;}
  .field-row label{display:block;font-size:13px;font-weight:500;color:var(--graphite);margin-bottom:6px;}
  .field-row input,.field-row select{width:100%;padding:14px 16px;border:1px solid var(--ash);border-radius:var(--r-input);font-size:15px;background:var(--white);color:var(--ink);}
  .field-row input:focus,.field-row select:focus{outline:2px solid var(--accent);outline-offset:1px;}
  .btn-primary{background:var(--lime);color:var(--ink);font-weight:500;padding:14px 28px;border-radius:var(--r-btn);font-size:15px;display:inline-flex;align-items:center;gap:8px;transition:transform .15s;}
  .btn-primary:hover{transform:translateY(-1px);}
  .btn-primary:disabled{opacity:0.5;cursor:not-allowed;transform:none;}
  .btn-ghost{background:transparent;color:var(--ink);font-weight:500;padding:14px 24px;border-radius:var(--r-btn);font-size:14px;border:1px solid var(--ash);}
  .btn-dark{background:var(--ink);color:var(--white);font-weight:500;padding:14px 24px;border-radius:var(--r-btn);font-size:14px;}

  .stepper{display:flex;align-items:center;margin-bottom:32px;}
  .step-dot{width:28px;height:28px;border-radius:50%;background:var(--ash);color:var(--graphite);font-size:12px;font-weight:500;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
  .step-dot.done{background:var(--ink);color:var(--white);}
  .step-dot.active{background:var(--lime);color:var(--ink);}
  .step-line{flex:1;height:2px;background:var(--ash);margin:0 8px;}
  .step-line.done{background:var(--ink);}
  .step-label{font-size:12px;color:var(--graphite);margin-top:6px;text-align:center;}

  .status-flow{display:flex;justify-content:space-between;margin-bottom:28px;}
  .status-item{flex:1;text-align:center;position:relative;}
  .status-item:not(:last-child)::after{content:'';position:absolute;top:14px;left:60%;width:80%;height:2px;background:var(--ash);}
  .status-item.reached:not(:last-child)::after{background:var(--ink);}
  .status-circle{width:30px;height:30px;border-radius:50%;background:var(--ash);color:var(--graphite);display:flex;align-items:center;justify-content:center;margin:0 auto 8px;position:relative;z-index:1;font-size:13px;}
  .status-item.reached .status-circle{background:var(--ink);color:var(--white);}
  .status-item.current .status-circle{background:var(--lime);color:var(--ink);}
  .status-item span.lbl{font-size:12px;color:var(--graphite);}
  .status-item.current span.lbl{color:var(--ink);font-weight:500;}

  .bank-info{background:var(--white);border:1px dashed var(--ash);border-radius:var(--r-inner);padding:20px;display:flex;justify-content:space-between;align-items:center;margin:16px 0;}
  .bank-info div span{display:block;font-size:12px;color:var(--graphite);}
  .bank-info div strong{font-size:16px;font-weight:500;}
  .copy-btn{font-size:12px;padding:8px 12px;border-radius:var(--r-pill);border:1px solid var(--ash);display:flex;align-items:center;gap:4px;}
  .badge{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:500;padding:4px 10px;border-radius:var(--r-pill);}
  .badge.wait{background:#fff3cd;color:#8a6d1a;}
  .badge.confirmed{background:rgba(190,255,80,0.35);color:var(--ink);}
  .badge.cancelled{background:#f1d1d1;color:#8a2a2a;}
  .res-row{display:flex;justify-content:space-between;align-items:center;padding:14px 0;border-bottom:1px solid var(--ash);}
  .res-row:last-child{border-bottom:none;}
  .res-row .name{font-weight:500;font-size:14px;}
  .res-row .sub{font-size:12px;color:var(--graphite);}

  .admin-toggle{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--graphite);margin:24px 0 12px;cursor:pointer;}
  .admin-table{width:100%;border-collapse:collapse;font-size:13px;}
  .admin-table th{text-align:left;padding:10px 8px;color:var(--graphite);font-weight:500;border-bottom:1px solid var(--ash);}
  .admin-table td{padding:10px 8px;border-bottom:1px solid var(--ash);}

  .chat-layout{display:flex;height:560px;border:1px solid var(--ash);border-radius:var(--r-card);overflow:hidden;background:var(--white);}
  .chat-list{width:220px;border-right:1px solid var(--ash);overflow-y:auto;flex-shrink:0;}
  .chat-thread{padding:14px 16px;display:flex;gap:10px;align-items:center;border-bottom:1px solid var(--parchment);}
  .chat-thread:hover{background:var(--parchment);}
  .chat-thread.active{background:var(--parchment);}
  .thread-avatar{width:38px;height:38px;border-radius:50%;flex-shrink:0;object-fit:cover;}
  .thread-info{overflow:hidden;}
  .thread-info .n{font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .thread-info .m{font-size:12px;color:var(--graphite);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .unread-dot{width:8px;height:8px;border-radius:50%;background:var(--accent);margin-left:auto;flex-shrink:0;}
  .chat-main{flex:1;display:flex;flex-direction:column;min-width:0;}
  .chat-header{padding:14px 18px;border-bottom:1px solid var(--ash);display:flex;justify-content:space-between;align-items:center;}
  .conn-dot{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--graphite);}
  .conn-dot .d{width:7px;height:7px;border-radius:50%;background:#4caf50;}
  .conn-dot.reconnecting .d{background:#f0a500;animation:pulseDot 1s infinite;}
  .chat-msgs{flex:1;overflow-y:auto;padding:18px;display:flex;flex-direction:column;gap:10px;}
  .msg{max-width:70%;padding:10px 14px;border-radius:16px;font-size:14px;line-height:1.5;animation:fadeInUp .3s ease;}
  .msg.me{align-self:flex-end;background:var(--ink);color:var(--white);}
  .msg.them{align-self:flex-start;background:var(--parchment);color:var(--ink);}
  .chat-input-row{padding:14px;border-top:1px solid var(--ash);display:flex;gap:8px;}
  .chat-input-row input{flex:1;padding:12px 16px;border-radius:var(--r-pill);border:1px solid var(--ash);font-size:14px;}
  .send-btn{width:44px;height:44px;border-radius:50%;background:var(--ink);color:var(--white);display:flex;align-items:center;justify-content:center;flex-shrink:0;}

  .toast{position:fixed;bottom:32px;left:50%;background:var(--ink);color:var(--white);padding:14px 22px;border-radius:var(--r-pill);font-size:14px;font-weight:500;z-index:100;animation:toastIn .25s ease;display:flex;align-items:center;gap:8px;}
  .toast svg{width:16px;height:16px;color:var(--lime);}

  .spinner{width:16px;height:16px;border:2px solid rgba(20,20,15,0.2);border-top-color:var(--ink);border-radius:50%;animation:spinRing .6s linear infinite;}

  .toggle-row{display:flex;justify-content:space-between;align-items:center;padding:14px 0;border-bottom:1px solid var(--ash);}
  .toggle-row:last-child{border-bottom:none;}
  .switch{width:42px;height:24px;border-radius:99px;background:var(--ash);position:relative;transition:background .2s;flex-shrink:0;}
  .switch.on{background:var(--ink);}
  .switch .knob{width:18px;height:18px;border-radius:50%;background:var(--white);position:absolute;top:3px;left:3px;transition:left .2s;}
  .switch.on .knob{left:21px;}

  @media (max-width:1080px){.card-grid{grid-template-columns:repeat(2,1fr);}}
  @media (max-width:640px){.card-grid{grid-template-columns:1fr;}.header-row{flex-wrap:wrap;}.search-bar{order:3;width:100%;}.chat-layout{flex-direction:column;height:auto;}.chat-list{width:100%;max-height:160px;}}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useMemo, useRef } = React;

const CATEGORIES = [
  { id:'all', label:'전체', icon:'layout-grid' },
  { id:'rehab', label:'재활운동', icon:'accessibility' },
  { id:'manual', label:'도수치료', icon:'hand' },
  { id:'sports', label:'스포츠마사지', icon:'dumbbell' },
  { id:'pilates', label:'필라테스', icon:'activity' },
  { id:'postpartum', label:'산후회복', icon:'baby' },
  { id:'senior', label:'어르신재활', icon:'footprints' },
  { id:'football', label:'축구선수케어', icon:'circle-dot' },
  { id:'visit', label:'방문재활', icon:'map-pin' },
];

const TEACHERS = [
  { id:1, name:'김하늘 선생님', tag:'rehab', tagLabel:'재활운동 전문', rating:4.9, reviews:128, region:'강남구', years:7, price:55000, verified:true, seed:'rehab-t1' },
  { id:2, name:'이도윤 선생님', tag:'manual', tagLabel:'도수치료 전문', rating:4.8, reviews:94, region:'서초구', years:9, price:65000, verified:true, seed:'rehab-t2' },
  { id:3, name:'박서연 선생님', tag:'sports', tagLabel:'스포츠마사지', rating:4.7, reviews:71, region:'송파구', years:5, price:48000, verified:false, seed:'rehab-t3' },
  { id:4, name:'최민준 선생님', tag:'pilates', tagLabel:'필라테스 재활', rating:5.0, reviews:156, region:'마포구', years:6, price:60000, verified:true, seed:'rehab-t4' },

function SignupScreen({ onDone }) {
  const [step, setStep] = useState(1);
  const [phone, setPhone] = useState('');
  const [verifying, setVerifying] = useState(false);
  const [verified, setVerified] = useState(false);
  const [code, setCode] = useState('');
  const [failedOnce, setFailedOnce] = useState(false);
  const [form, setForm] = useState({ name:'', role:'회원', email:'' });

  const requestVerify = () => {
    if (!phone) return;
    setVerifying(true);
    setTimeout(() => setVerifying(false), 900);
  };
  const confirmCode = () => {
    if (code === '0000' && !failedOnce) {
      setFailedOnce(true);
      return; // 첫 시도는 의도적으로 실패시켜 재시도 흐름을 보여줌
    }
    setVerified(true);
    setTimeout(() => setStep(2), 500);
  };

  return (
    <div className="screen screen-narrow">
      <div className="screen-head">
        <h1>본인인증 연동 회원가입</h1>
        <p>휴대폰 본인인증을 완료하면 예약과 정산 계좌 등록을 이용할 수 있어요.</p>
      </div>
      <div className="stepper">
        <div style={{textAlign:'center'}}><div className={`step-dot ${step>1?'done':'active'}`}>1</div><div className="step-label">본인인증</div></div>
        <div className={`step-line ${step>1?'done':''}`}></div>
        <div style={{textAlign:'center'}}><div className={`step-dot ${step>2?'done':step===2?'active':''}`}>2</div><div className="step-label">기본정보</div></div>
        <div className={`step-line ${step>2?'done':''}`}></div>
        <div style={{textAlign:'center'}}><div className={`step-dot ${step===3?'active':''}`}>3</div><div className="step-label">완료</div></div>
      </div>

      {step === 1 && (
        <div className="card-panel white">
          <div className="field-row">
            <label>휴대폰 번호</label>
            <input placeholder="010-0000-0000" value={phone} onChange={e => setPhone(e.target.value)} />
          </div>
          {!verified && (
            <button className="btn-primary" onClick={requestVerify} disabled={!phone || verifying}>
              {verifying ? <span className="spinner"></span> : <i data-lucide="shield-check" style={{width:15,height:15}}></i>}
              {verifying ? '인증 요청 중...' : '본인인증 요청'}
            </button>
          )}
          {!verifying && phone && !verified && (
            <div style={{marginTop:20}}>
              <div className="field-row">
                <label>인증번호 4자리</label>
                <input placeholder="숫자 4자리 입력" value={code} onChange={e => setCode(e.target.value)} maxLength="4" />
              </div>
              {failedOnce && <p style={{fontSize:12,color:'#c0392b',marginBottom:12}}>인증에 실패했습니다. 인증번호를 다시 입력해 재시도해주세요.</p>}
              <button className="btn-dark" onClick={confirmCode} disabled={code.length!==4}>인증 확인</button>
            </div>
          )}
        </div>
      )}

      {step === 2 && (
        <div className="card-panel white">
          <div className="field-row">
            <label>이름</label>
            <input value={form.name} onChange={e => setForm({...form, name:e.target.value})} placeholder="홍길동" />
          </div>
          <div className="field-row">
            <label>가입 유형</label>
            <select value={form.role} onChange={e => setForm({...form, role:e.target.value})}>
              <option>회원</option><option>선생님</option>
            </select>
          </div>
          <div className="field-row">
            <label>이메일</label>
            <input value={form.email} onChange={e => setForm({...form, email:e.target.value})} placeholder="example@email.com" />
          </div>
          <button className="btn-primary" style={{borderRadius:28}} disabled={!form.name || !form.email} onClick={() => setStep(3)}>다음</button>
        </div>
      )}

      {step === 3 && (
        <div className="card-panel white" style={{textAlign:'center'}}>
          <i data-lucide="check-circle" style={{width:48,height:48,color:'var(--accent)',marginBottom:12}}></i>
          <h3 style={{fontWeight:500,marginBottom:8}}>가입이 완료되었습니다</h3>
          <p style={{color:'var(--graphite)',fontSize:14,marginBottom:20}}>인증된 휴대폰 번호 {phone}로 마이페이지에서 확인할 수 있어요.</p>
          <button className="btn-primary" onClick={onDone}>선생님 검색하러 가기</button>
        </div>
      )}
    </div>
  );
}

    const next = new Set(checked);
    next.has(id) ? next.delete(id) : next.add(id);

                  <td>김민수</td>
                  <td>{r.teacher.price.toLocaleString()}원</td>
                  <td><span className={`badge ${r.status==='확정'?'confirmed':r.status==='취소'?'cancelled':'wait'}`}>{r.status}</span></td>
                </tr>
              ))}
            </tbody>
          </table>
          <button className="btn-dark" style={{marginTop:14}} disabled={checked.size===0} onClick={() => { onBulkApprove(checked); setChecked(new Set()); }}>
            선택 {checked.size}건 일괄 승인
          </button>
        </div>
      )}
    </div>
  );
}

function ChatScreen() {
  const threads = TEACHERS.slice(0,4);
  const [active, setActive] = useState(threads[0].id);
  const [messages, setMessages] = useState([
    { from:'them', text:'안녕하세요! 예약 확정 감사합니다. 첫 방문 시 편한 복장으로 와주시면 됩니다.' },
    { from:'me', text:'네 감사합니다! 혹시 주차 가능한가요?' },
    { from:'them', text:'네, 센터 지하 1층 방문객 주차장 이용 가능합니다.' },
  ]);
  const [input, setInput] = useState('');
  const [reconnecting, setReconnecting] = useState(false);
  const scrollRef = useRef(null);

  useEffect(() => { if (scrollRef.current) scrollRef.current.scrollTop = scrollRef.current.scrollHeight; }, [messages]);

  const send = () => {
    if (!input.trim()) return;
    setMessages([...messages, { from:'me', text:input }]);
    setInput('');
    setTimeout(() => setMessages(m => [...m, { from:'them', text:'네, 확인했습니다 :)' }]), 1000);
  };

  const testReconnect = () => {
    setReconnecting(true);
    setTimeout(() => setReconnecting(false), 1600);
  };

  const activeTeacher = threads.find(t => t.id === active);

  return (
    <div className="screen" style={{maxWidth:1000}}>
      <div className="screen-head">
        <h1>1:1 실시간 채팅 상담</h1>
        <p>예약이 확정된 선생님과 실시간으로 대화를 나눌 수 있습니다.</p>
      </div>
      <div className="chat-layout">
        <div className="chat-list">
          {threads.map(t => (
            <div key={t.id} className={`chat-thread ${active===t.id?'active':''}`} onClick={() => setActive(t.id)}>
              <img className="thread-avatar" src={`https://source.boringavatars.com/beam/64/${encodeURIComponent(t.name)}?colors=beff50,14140f,d2d2c8,1e3af6,f5f5eb`} alt="" />
              <div className="thread-info">
                <div className="n">{t.name}</div>
                <div className="m">예약 확정 · 채팅 가능</div>
              </div>
              {t.id === threads[1].id && <span className="unread-dot"></span>}
            </div>
          ))}
        </div>
        <div className="chat-main">
          <div className="chat-header">
            <strong style={{fontSize:14}}>{activeTeacher.name}</strong>
            <button className={`conn-dot ${reconnecting?'reconnecting':''}`} onClick={testReconnect} title="네트워크 재연결 테스트">
              <span className="d"></span>{reconnecting ? '재연결 중...' : '연결됨'}
            </button>
          </div>
          <div className="chat-msgs" ref={scrollRef}>
            {messages.map((m,i) => <div key={i} className={`msg ${m.from==='me'?'me':'them'}`}>{m.text}</div>)}
          </div>
          <div className="chat-input-row">
            <input placeholder="메시지를 입력하세요" value={input} onChange={e=>setInput(e.target.value)} onKeyDown={e => e.key==='Enter' && send()} />
            <button className="send-btn" onClick={send}><i data-lucide="send" style={{width:16,height:16}}></i></button>
          </div>
        </div>
      </div>
    </div>
  );
}

function MyPageScreen() {
  const [editing, setEditing] = useState(false);
  const [profile, setProfile] = useState({ name:'김민수', phone:'010-1234-5678' });
  const [account, setAccount] = useState({ bank:'신한은행', number:'', holder:'' });
  const [notif, setNotif] = useState({ push:true, sms:false, email:true });
  const [toastMsg, setToastMsg] = useState(null);

  const save = () => { setToastMsg('저장되었습니다'); setTimeout(() => setToastMsg(null), 2000); setEditing(false); };

  return (
    <div className="screen screen-narrow">
      <div className="screen-head"><h1>마이페이지</h1><p>프로필과 정산 계좌 정보를 관리할 수 있어요.</p></div>

      <div className="card-panel white" style={{display:'flex',gap:16,alignItems:'center'}}>
        <img src={`https://source.boringavatars.com/marble/64/${encodeURIComponent(profile.name)}`} style={{borderRadius:'50%',width:64,height:64}} alt="" />
        <div style={{flex:1}}>
          <div style={{fontWeight:500,fontSize:16}}>{profile.name}</div>
          <div style={{fontSize:13,color:'var(--graphite)'}}><i data-lucide="phone" style={{width:12,height:12}}></i> {profile.phone} · 본인인증 완료</div>
        </div>
        <button className="btn-ghost" onClick={() => setEditing(!editing)}>{editing ? '취소' : '프로필 수정'}</button>
      </div>

      {editing && (
        <div className="card-panel white">
          <div className="field-row"><label>이름</label><input value={profile.name} onChange={e=>setProfile({...profile,name:e.target.value})} /></div>
          <div className="field-row"><label>휴대폰</label><input value={profile.phone} onChange={e=>setProfile({...profile,phone:e.target.value})} /></div>
          <button className="btn-primary" onClick={save}>저장</button>
        </div>
      )}

      <h3 style={{fontSize:16,fontWeight:500,margin:'24px 0 8px'}}>정산/결제용 계좌 정보</h3>
      <div className="card-panel white">
        <div className="field-row">
          <label>은행</label>
          <select value={account.bank} onChange={e=>setAccount({...account,bank:e.target.value})}>
            <option>신한은행</option><option>국민은행</option><option>카카오뱅크</option><option>우리은행</option>
          </select>
        </div>
        <div className="field-row"><label>계좌번호</label><input placeholder="000-000-000000" value={account.number} onChange={e=>setAccount({...account,number:e.target.value})} /></div>
        <div className="field-row"><label>예금주</label><input placeholder="예금주명" value={account.holder} onChange={e=>setAccount({...account,holder:e.target.value})} /></div>
        <button className="btn-primary" disabled={!account.number || !account.holder} onClick={save}>계좌 저장</button>
      </div>

      <h3 style={{fontSize:16,fontWeight:500,margin:'24px 0 8px'}}>알림 설정</h3>
      <div className="card-panel white">
        {[['push','앱 푸시 알림'],['sms','SMS 알림'],['email','이메일 알림']].map(([k,label]) => (
          <div key={k} className="toggle-row">
            <span style={{fontSize:14}}>{label}</span>
            <div className={`switch ${notif[k]?'on':''}`} onClick={() => setNotif({...notif,[k]:!notif[k]})}><span className="knob"></span></div>
          </div>
        ))}
      </div>
      <Toast toast={toastMsg} />
    </div>
  );
}

function App() {
  const [view, setView] = useState('main');
  const [favorites, setFavorites] = useState(new Set());
  const [quickView, setQuickView] = useState(null);
  const [reservations, setReservations] = useState([
    { id:100, teacher:TEACHERS[2], day:11, slot:'15:30', status:'입금대기' },
  ]);
  const [toastMsg, setToastMsg] = useState(null);
  let ridSeq = useRef(101);

  useEffect(() => { if (window.lucide) window.lucide.createIcons(); }, [view, quickView, reservations, favorites]);

  const toggleFav = (id) => {
    const next = new Set(favorites);
    next.has(id) ? next.delete(id) : next.add(id);
    setFavorites(next);
  };

  const showToast = (msg) => { setToastMsg(msg); setTimeout(() => setToastMsg(null), 2200); };

  const handleBook = ({ teacher, day, slot }) => {
    const id = ridSeq.current++;
    setReservations([{ id, teacher, day, slot, status:'입금대기' }, ...reservations]);
    setQuickView(null);
    setView('deposit');
    showToast('예약 신청이 완료되어 입금대기 상태로 등록되었습니다');
  };

  const handleConfirm = (id) => {
    setReservations(reservations.map(r => r.id===id ? {...r, status:'확정'} : r));
    showToast('입금이 확인되어 예약이 확정되었습니다');
  };

  const handleBulkApprove = (ids) => {
    setReservations(reservations.map(r => ids.has(r.id) ? {...r, status:'확정'} : r));
    showToast(`${ids.size}건이 일괄 승인되었습니다`);
  };

  return (
    <div data-archetype="airbnb-search-grid" style={{ width:'100%', minHeight:'100vh', background:'var(--white)' }}>
      <Header view={view} setView={setView} />
      {view === 'main' && <MainScreen favorites={favorites} toggleFav={toggleFav} openQuickView={setQuickView} />}
      {view === 'signup' && <SignupScreen onDone={() => setView('main')} />}
      {view === 'deposit' && <DepositScreen reservations={reservations} onConfirm={handleConfirm} onBulkApprove={handleBulkApprove} />}
      {view === 'chat' && <ChatScreen />}
      {view === 'mypage' && <MyPageScreen />}

      {quickView && <QuickView teacher={quickView} onClose={() => setQuickView(null)} onBook={handleBook} />}
      <Toast toast={toastMsg} />

      <footer style={{background:'var(--charcoal)',color:'var(--parchment)',padding:'40px 24px',marginTop:40}}>
        <div style={{maxWidth:1200,margin:'0 auto',display:'flex',justifyContent:'space-between',flexWrap:'wrap',gap:20}}>
          <div>
            <div className="brand" style={{color:'var(--parchment)',marginBottom:8}}><span className="brand-dot"></span>다시케어</div>
            <p style={{fontSize:12,color:'var(--ash)'}}>재활·운동 선생님 매칭 예약 서비스 — 자체 개발 프로젝트</p>
          </div>
          <div style={{fontSize:12,color:'var(--ash)'}}>© 2026 다시케어 데모 — 실제 서비스가 아닌 구현 데모입니다</div>
        </div>
      </footer>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
