<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>다시케어 파트너 — 재활 정산 통합 관리 플랫폼</title>
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
<link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/regular/style.css">
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
  :root{
    --ink:#141414;
    --charcoal:#292929;
    --slate:#6f6f6e;
    --ash:#8f8f8e;
    --linen:#edede8;
    --white:#ffffff;
    --stone:#dbdbd2;
    --pebble:#c0c0c0;
    --border:#00000014;
    --lime:#4cc02b;
    --r-card:12px;
    --r-tile:6px;
    --r-pill:200px;
  }
  *{box-sizing:border-box;}
  html,body{width:100%;margin:0;padding:0;background:var(--linen);}
  body{font-family:'Pretendard',ui-sans-serif,system-ui,sans-serif;color:var(--charcoal);-webkit-font-smoothing:antialiased;}
  #root{width:100%;}
  button{font-family:inherit;cursor:pointer;border:none;background:none;}
  input,select,textarea{font-family:inherit;}
  a{text-decoration:none;color:inherit;}
  ::-webkit-scrollbar{height:6px;width:6px;}
  ::-webkit-scrollbar-thumb{background:var(--stone);border-radius:99px;}

  @keyframes fadeIn{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
  @keyframes barGrow{from{transform:scaleY(0);}to{transform:scaleY(1);}}
  @keyframes dashDraw{from{stroke-dashoffset:600;}to{stroke-dashoffset:0;}}
  @keyframes spin{to{transform:rotate(360deg);}}
  @keyframes widgetPop{from{opacity:0;transform:scale(.96);}to{opacity:1;transform:scale(1);}}
  @keyframes slideOverIn{from{transform:translateX(100%);}to{transform:translateX(0);}}
  @keyframes toastIn{from{opacity:0;transform:translate(-50%,12px);}to{opacity:1;transform:translate(-50%,0);}}

  /* ===== header (topbar-analytics signature) ===== */
  .app-header{position:sticky;top:0;z-index:40;background:var(--white);border-bottom:1px solid var(--border);width:100%;}
  .header-top{display:flex;align-items:center;gap:16px;padding:14px 24px;flex-wrap:wrap;}
  .brand{font-size:17px;font-weight:500;letter-spacing:-0.01em;display:flex;align-items:center;gap:8px;flex-shrink:0;}
  .brand-mark{width:26px;height:26px;border-radius:7px;background:var(--ink);display:flex;align-items:center;justify-content:center;}
  .brand-mark .dot{width:7px;height:7px;border-radius:50%;background:var(--lime);}
  .project-switcher{position:relative;flex-shrink:0;}
  .switcher-btn{display:flex;align-items:center;gap:6px;font-size:13px;font-weight:500;padding:8px 14px;border-radius:var(--r-pill);background:var(--linen);color:var(--charcoal);}
  .switcher-menu{position:absolute;top:calc(100% + 6px);left:0;background:var(--white);border:1px solid var(--border);border-radius:var(--r-card);box-shadow:rgba(16,24,40,0.12) 0px 18px 40px 0px;padding:6px;min-width:160px;z-index:50;animation:fadeIn .15s ease;}
  .switcher-item{display:block;width:100%;text-align:left;padding:9px 12px;font-size:13px;border-radius:8px;}
  .switcher-item:hover{background:var(--linen);}
  .global-nav{display:flex;align-items:center;gap:6px;flex-wrap:wrap;flex:1;}
  .nav-link{font-size:12.5px;font-weight:500;color:var(--slate);padding:9px 13px;border-radius:var(--r-pill);white-space:nowrap;display:flex;align-items:center;gap:6px;transition:all .15s;}
  .nav-link:hover{background:var(--linen);color:var(--charcoal);}
  .nav-link.is-active{background:var(--ink);color:var(--white);}
  .header-actions{display:flex;align-items:center;gap:10px;flex-shrink:0;}
  .icon-btn{width:36px;height:36px;border-radius:50%;background:var(--linen);display:flex;align-items:center;justify-content:center;transition:background .15s;}
  .icon-btn:hover{background:var(--stone);}
  .avatar-btn img{width:32px;height:32px;border-radius:50%;}

  .tab-bar{display:flex;gap:4px;padding:0 24px;border-bottom:1px solid var(--border);max-width:1320px;margin:0 auto;}
  .tab{padding:12px 4px;margin-right:20px;font-size:13.5px;font-weight:500;color:var(--slate);border-bottom:2px solid transparent;transition:all .15s;}
  .tab.active{color:var(--ink);border-bottom-color:var(--ink);}

  .content{max-width:1320px;margin:0 auto;padding:28px 24px 100px;width:100%;}

  /* insight-board composition */
  .insight-row{display:grid;grid-template-columns:1fr 300px;gap:20px;margin-bottom:20px;}
  .hero-viz{background:var(--white);border-radius:var(--r-card);padding:24px;border:1px solid var(--border);animation:widgetPop .4s ease;}
  .hero-viz-head{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:16px;}
  .hero-viz-head h3{font-size:16px;font-weight:500;margin:0 0 4px;}
  .hero-viz-head .big{font-size:40px;font-weight:500;letter-spacing:-0.02em;}
  .hero-viz-head .delta{font-size:12px;color:var(--lime);font-weight:500;}
  .kpi-side{display:flex;flex-direction:column;gap:12px;}
  .stat-card{background:var(--white);border-radius:var(--r-card);padding:16px 18px;border:1px solid var(--border);animation:widgetPop .4s ease backwards;}
  .stat-label{font-size:12px;color:var(--slate);margin-bottom:6px;}
  .stat-value{font-size:28px;font-weight:500;letter-spacing:-0.01em;}
  .stat-sub{font-size:11px;color:var(--ash);margin-top:4px;}

  .widget-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:20px;}
  .widget-card{background:var(--white);border-radius:var(--r-card);padding:20px;border:1px solid var(--border);animation:widgetPop .45s ease backwards;}
  .widget-card h4{font-size:13px;font-weight:500;color:var(--slate);margin:0 0 14px;}

  .bar-chart{display:flex;align-items:flex-end;gap:8px;height:120px;}
  .bar{flex:1;background:var(--ink);border-radius:4px 4px 0 0;transform-origin:bottom;animation:barGrow .6s cubic-bezier(.2,.8,.2,1) backwards;position:relative;}
  .bar .val{position:absolute;top:-18px;left:0;right:0;text-align:center;font-size:10px;color:var(--slate);}
  .bar.accent{background:var(--lime);}

  .timeline-log{display:flex;flex-direction:column;gap:12px;}
  .log-item{display:flex;gap:10px;align-items:flex-start;font-size:12px;}
  .log-dot{width:8px;height:8px;border-radius:50%;background:var(--lime);margin-top:4px;flex-shrink:0;}
  .log-dot.fail{background:#d97b6c;}
  .log-item .t{color:var(--ash);font-size:11px;}

  .btn-primary{background:var(--ink);color:var(--white);font-weight:500;padding:11px 22px;border-radius:var(--r-pill);font-size:14px;display:inline-flex;align-items:center;gap:8px;transition:transform .15s;}
  .btn-primary:hover{transform:translateY(-1px);}
  .btn-primary:disabled{opacity:0.4;cursor:not-allowed;transform:none;}
  .btn-secondary{background:var(--stone);color:var(--charcoal);font-weight:500;padding:11px 20px;border-radius:var(--r-pill);font-size:13px;}
  .btn-ghost{background:transparent;border:1px solid var(--charcoal);color:var(--charcoal);font-weight:500;padding:9px 16px;border-radius:var(--r-pill);font-size:13px;}

  .screen-head{margin-bottom:22px;}
  .screen-head h1{font-size:40px;font-weight:500;letter-spacing:-0.02em;line-height:1.1;margin:0 0 6px;}
  .screen-head p{color:var(--slate);font-size:13.5px;margin:0;}

  .panel{background:var(--white);border-radius:var(--r-card);padding:20px;border:1px solid var(--border);margin-bottom:16px;}
  .panel-row{display:flex;justify-content:space-between;align-items:center;gap:16px;flex-wrap:wrap;}
  .badge{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:500;padding:4px 10px;border-radius:var(--r-pill);}
  .badge.ok{background:rgba(76,192,43,0.14);color:#2f7a1c;}
  .badge.fail{background:#f4e2df;color:#a7402f;}
  .badge.pending{background:var(--stone);color:var(--slate);}

  .field-row{margin-bottom:14px;}
  .field-row label{display:block;font-size:12px;font-weight:500;color:var(--slate);margin-bottom:6px;}
  .field-row input,.field-row select{width:100%;padding:11px 14px;border:1px solid var(--border);border-radius:8px;font-size:14px;background:var(--white);}
  .field-row input:focus,.field-row select:focus{outline:2px solid var(--ink);outline-offset:1px;}
  .field-inline{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;align-items:end;}

  table.data-table{width:100%;border-collapse:collapse;font-size:13px;}
  table.data-table th{text-align:left;padding:10px 12px;color:var(--slate);font-weight:500;border-bottom:1px solid var(--border);font-size:12px;}
  table.data-table td{padding:12px;border-bottom:1px solid var(--border);}
  table.data-table tr:hover td{background:var(--linen);}

  .toggle-row{display:flex;justify-content:space-between;align-items:center;padding:12px 0;border-bottom:1px solid var(--border);}
  .switch{width:38px;height:22px;border-radius:99px;background:var(--stone);position:relative;transition:background .2s;flex-shrink:0;}
  .switch.on{background:var(--ink);}
  .switch .knob{width:16px;height:16px;border-radius:50%;background:var(--white);position:absolute;top:3px;left:3px;transition:left .2s;}
  .switch.on .knob{left:19px;}

  .board-tabs{display:flex;gap:4px;margin-bottom:16px;}
  .board-tab{padding:9px 16px;border-radius:var(--r-pill);font-size:13px;font-weight:500;color:var(--slate);}
  .board-tab.active{background:var(--ink);color:var(--white);}
  .post-row{display:flex;justify-content:space-between;align-items:center;padding:14px 0;border-bottom:1px solid var(--border);}
  .post-row:last-child{border-bottom:none;}
  .post-title{font-size:14px;font-weight:500;}
  .post-meta{font-size:11.5px;color:var(--ash);margin-top:3px;}
  .row-actions{display:flex;gap:6px;}
  .row-actions button{width:30px;height:30px;border-radius:50%;background:var(--linen);display:flex;align-items:center;justify-content:center;}
  .row-actions button:hover{background:var(--stone);}

  .modal-overlay{position:fixed;inset:0;background:rgba(20,20,20,0.4);z-index:80;display:flex;align-items:center;justify-content:center;animation:fadeIn .18s ease;}
  .modal-box{background:var(--white);border-radius:var(--r-card);padding:24px;width:460px;max-width:92vw;}
  .modal-box h3{margin:0 0 16px;font-size:17px;font-weight:500;}
  .modal-box textarea{width:100%;min-height:100px;padding:12px 14px;border:1px solid var(--border);border-radius:8px;font-family:inherit;font-size:14px;resize:vertical;}
  .modal-actions{display:flex;justify-content:flex-end;gap:8px;margin-top:16px;}

  .drawer-overlay{position:fixed;inset:0;background:rgba(20,20,20,0.35);z-index:80;display:flex;justify-content:flex-end;animation:fadeIn .18s ease;}
  .drawer{width:420px;max-width:92vw;height:100%;background:var(--white);padding:24px;overflow-y:auto;animation:slideOverIn .3s cubic-bezier(.2,.8,.2,1);}

  .spinner{width:14px;height:14px;border:2px solid rgba(255,255,255,0.35);border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite;}
  .spinner.dark{border:2px solid rgba(20,20,20,0.2);border-top-color:var(--ink);}

  .toast{position:fixed;bottom:32px;left:50%;background:var(--ink);color:var(--white);padding:13px 22px;border-radius:var(--r-pill);font-size:13.5px;font-weight:500;z-index:100;animation:toastIn .25s ease;display:flex;align-items:center;gap:8px;}
  .toast i{color:var(--lime);}

  .donut-wrap{display:flex;align-items:center;gap:16px;}
  .donut-legend{display:flex;flex-direction:column;gap:6px;font-size:12px;}
  .donut-legend span.sw{width:8px;height:8px;border-radius:2px;display:inline-block;margin-right:6px;}

  @media (max-width:1080px){.insight-row{grid-template-columns:1fr;}.widget-grid{grid-template-columns:1fr;}.field-inline{grid-template-columns:1fr;}}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef } = React;

const CENTERS = ['강남점','서초점','송파점'];

const TEACHER_STATS = [
  { name:'김하늘', sessions:24, amount:1320000, status:'대기' },
  { name:'이도윤', sessions:31, amount:2015000, status:'확정' },
  { name:'박서연', sessions:18, amount:864000, status:'확정' },

  { name:'정예린', sessions:15, amount:870000, status:'대기' },

const SYNC_LOGS = [
  { time:'08.02 09:14', label:'정산 데이터 42건 동기화 완료', ok:true },
  { time:'08.01 09:12', label:'정산 데이터 38건 동기화 완료', ok:true },

  { time:'07.30 09:11', label:'정산 데이터 40건 동기화 완료', ok:true },
];

const POSTS = [
  { id:1, title:'8월 정산 지급 일정 안내', date:'2026.07.20', pinned:true },
  { id:2, title:'여름 휴가철 예약 정책 변경 안내', date:'2026.07.15' },
  { id:3, title:'앱 업데이트(v2.3) 안내', date:'2026.07.08' },
];

const REVIEWS = [
  { id:1, teacher:'김하늘', rating:5, text:'너무 친절하고 꼼꼼하게 봐주셨어요.', reported:false, visible:true },
  { id:2, teacher:'박서연', rating:2, text:'예약 시간보다 늦게 오셨습니다.', reported:true, visible:true },
  { id:3, teacher:'이도윤', rating:5, text:'전문적인 도수치료 감사합니다.', reported:false, visible:true },
];

const TEACHERS_ADMIN = [
  { id:1, name:'김하늘', specialty:'재활운동', status:'활성', cert:true },
  { id:2, name:'이도윤', specialty:'도수치료', status:'활성', cert:true },
  { id:3, name:'박서연', specialty:'스포츠마사지', status:'휴면', cert:false },
  { id:4, name:'최민준', specialty:'필라테스 재활', status:'활성', cert:true },
  { id:5, name:'정예린', specialty:'산후회복', status:'활성', cert:true },
];

function Toast({ msg }) {
  if (!msg) return null;
  return <div className="toast"><i className="ph ph-check-circle"></i>{msg}</div>;
}

function Header({ view, setView, showToast }) {
  const [center, setCenter] = useState('강남점');
  const [switcherOpen, setSwitcherOpen] = useState(false);
  return (
    <header className="app-header">
      <div className="header-top">
        <button className="brand" onClick={() => setView('main')}>
          <span className="brand-mark"><span className="dot"></span></span>다시케어 파트너
        </button>
        <div className="project-switcher">
          <button className="switcher-btn" onClick={() => setSwitcherOpen(!switcherOpen)}>
            <i className="ph ph-buildings"></i>{center}<i className="ph ph-caret-down"></i>
          </button>
          {switcherOpen && (
            <div className="switcher-menu">
              {CENTERS.map(c => (
                <button key={c} className="switcher-item" onClick={() => { setCenter(c); setSwitcherOpen(false); }}>{c}</button>
              ))}
            </div>
          )}
        </div>
        <nav className="global-nav">
          <button className={`nav-link ${view==='main'?'is-active':''}`} onClick={() => setView('main')}>강사별 정산 자동 계산 대시보드</button>
          <button className={`nav-link ${view==='sheets'?'is-active':''}`} onClick={() => setView('sheets')}>구글 스프레드시트 정산 데이터 연동</button>
          <button className={`nav-link ${view==='excel'?'is-active':''}`} onClick={() => setView('excel')}>정산 내역 엑셀 다운로드 및 관리자 백오피스</button>
          <button className={`nav-link ${view==='board'?'is-active':''}`} onClick={() => setView('board')}>게시판 및 서비스 후기 관리</button>
          <button className={`nav-link ${view==='teachers'?'is-active':''}`} onClick={() => setView('teachers')}>강사 관리</button>
        </nav>
        <div className="header-actions">
          <button className="icon-btn" title="알림" onClick={() => showToast('새로운 알림이 없습니다')}><i className="ph ph-bell"></i></button>
          <button className="icon-btn avatar-btn" title="관리자 계정" onClick={() => showToast('강남점 관리자 계정으로 로그인되어 있습니다')}>
            <img src="https://source.boringavatars.com/beam/32/admin-console?colors=141414,4cc02b,dbdbd2,edede8,292929" alt="" />
          </button>
        </div>
      </div>
    </header>
  );
}

function TabBar({ range, setRange }) {
  const st = (t) => range === t ? { color:'var(--ink)', borderBottomColor:'var(--ink)' } : {};
  return (
    <div className="tab-bar">
      <button className="tab" role="tab" style={st('이번달')} onClick={() => setRange('이번달')}>이번달</button>
      <button className="tab" role="tab" style={st('지난달')} onClick={() => setRange('지난달')}>지난달</button>
      <button className="tab" role="tab" style={st('분기')} onClick={() => setRange('분기')}>분기</button>
      <button className="tab" role="tab" style={st('연간')} onClick={() => setRange('연간')}>연간</button>
    </div>
  );
}

function LineChart() {
  const points = [40,55,48,70,62,80,74,90];
  const w = 560, h = 160, step = w / (points.length - 1);
  const max = 100;
  const path = points.map((p,i) => `${i===0?'M':'L'} ${i*step} ${h - (p/max)*h}`).join(' ');
  const area = `${path} L ${w} ${h} L 0 ${h} Z`;
  return (
    <svg className="chart" viewBox={`0 0 ${w} ${h}`} style={{width:'100%',height:160}}>
      <defs>
        <linearGradient id="areaGrad" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stopColor="#4cc02b" stopOpacity="0.22" />
          <stop offset="100%" stopColor="#4cc02b" stopOpacity="0" />
        </linearGradient>
      </defs>
      <path d={area} fill="url(#areaGrad)" stroke="none" />
      <path d={path} fill="none" stroke="#141414" strokeWidth="2.5" strokeDasharray="600" style={{animation:'dashDraw 1.1s ease forwards'}} />
      {points.map((p,i) => <circle key={i} cx={i*step} cy={h-(p/max)*h} r="3.5" fill="#4cc02b" />)}
    </svg>
  );
}

function Donut() {
  const data = [{l:'김하늘',v:32,c:'#141414'},{l:'이도윤',v:26,c:'#4cc02b'},{l:'박서연',v:18,c:'#8f8f8e'},{l:'기타',v:24,c:'#dbdbd2'}];
  let acc = 0;
  const r = 42, cx = 50, cy = 50, circ = 2*Math.PI*r;
  return (
    <div className="donut-wrap">
      <svg viewBox="0 0 100 100" style={{width:110,height:110,flexShrink:0}}>
        {data.map((d,i) => {
          const dash = (d.v/100)*circ;
          const offset = (acc/100)*circ;
          acc += d.v;
          return <circle key={i} cx={cx} cy={cy} r={r} fill="none" stroke={d.c} strokeWidth="14"
            strokeDasharray={`${dash} ${circ-dash}`} strokeDashoffset={-offset} transform="rotate(-90 50 50)" />;
        })}
      </svg>
      <div className="donut-legend">
        {data.map((d,i) => <div key={i}><span className="sw" style={{background:d.c}}></span>{d.l} {d.v}%</div>)}
      </div>
    </div>
  );
}

function MainScreen() {
  const [range, setRange] = useState('이번달');
  const bars = [
    {l:'재활운동',v:80},{l:'도수치료',v:62},{l:'스포츠마사지',v:44},{l:'필라테스',v:70},{l:'산후회복',v:38}
  ];
  return (
    <React.Fragment>
      <TabBar range={range} setRange={setRange} />
      <div className="content">
        <div className="screen-head">
          <h1>강사별 정산 자동 계산 대시보드</h1>
          <p>확정된 예약을 기준으로 강사별 정산 예상액과 상태를 자동 집계합니다 · {range} 기준</p>
        </div>

        <div className="insight-row">
          <div className="hero-viz">
            <div className="hero-viz-head">
              <div>
                <h3>월별 정산 규모 추이</h3>
                <div className="big">6,690,000원</div>
              </div>
              <span className="delta"><i className="ph ph-trend-up"></i> 전월 대비 반영 완료</span>
            </div>
            <LineChart />
          </div>
          <div className="kpi-side">
            <div className="stat-card"><div className="stat-label">이번달 정산 예정액</div><div className="stat-value">6,690,000원</div><div className="stat-sub">확정 예약 115건 기준</div></div>
            <div className="stat-card" style={{animationDelay:'.05s'}}><div className="stat-label">확정 건수</div><div className="stat-value">115건</div><div className="stat-sub">전체 대비 82%</div></div>
            <div className="stat-card" style={{animationDelay:'.1s'}}><div className="stat-label">대기 건수</div><div className="stat-value">21건</div><div className="stat-sub">입금 확인 대기중</div></div>
            <div className="stat-card" style={{animationDelay:'.15s'}}><div className="stat-label">지급완료</div><div className="stat-value">4,109,000원</div><div className="stat-sub">3개 강사 지급 완료</div></div>
          </div>
        </div>

        <div className="widget-grid">
          <div className="widget-card" style={{borderRadius:12}}>
            <h4>세션 유형별 정산 금액</h4>
            <div className="bar-chart">
              {bars.map((b,i) => (
                <div key={b.l} className="bar" style={{height:`${b.v}%`, animationDelay:`${i*0.08}s`}}>
                  <span className="val">{b.v}</span>
                </div>
              ))}
            </div>
          </div>
          <div className="widget-card" style={{animationDelay:'.08s'}}>
            <h4>강사별 정산 비중</h4>
            <Donut />
          </div>
          <div className="widget-card" style={{animationDelay:'.16s'}}>
            <h4>구글 시트 동기화 로그</h4>
            <div className="timeline-log">
              {SYNC_LOGS.map((l,i) => (
                <div key={i} className="log-item">
                  <span className={`log-dot ${l.ok?'':'fail'}`}></span>
                  <div><div>{l.label}</div><div className="t">{l.time}</div></div>
                </div>
              ))}
            </div>
          </div>
        </div>
      </div>
    </React.Fragment>
  );
}

function SheetsScreen({ showToast }) {
  const [logs, setLogs] = useState(SYNC_LOGS);
  const [syncing, setSyncing] = useState(false);
  const [retryIdx, setRetryIdx] = useState(null);
  const lastOk = logs.find(l => l.ok);

  const runSync = () => {
    setSyncing(true);
    setTimeout(() => {
      setLogs([{ time:'08.02 14:02', label:'정산 데이터 44건 동기화 완료', ok:true }, ...logs]);
      setSyncing(false);
      showToast('구글 스프레드시트 동기화가 완료되었습니다');
    }, 1300);
  };

  const retry = (idx) => {
    setRetryIdx(idx);
    setTimeout(() => {
      setLogs(logs.map((l,i) => i===idx ? { ...l, label: l.label.replace('실패','완료 (재시도)'), ok:true } : l));
      setRetryIdx(null);
      showToast('재시도 동기화에 성공했습니다');
    }, 1000);
  };

  return (
    <div className="content" style={{maxWidth:900}}>
      <div className="screen-head">
        <h1>구글 스프레드시트 정산 데이터 연동</h1>
        <p>정산 데이터를 지정된 구글 스프레드시트로 동기화하고 상태를 확인합니다.</p>
      </div>

      <div className="panel">
        <div className="panel-row">
          <div>
            <div style={{fontSize:13,color:'var(--slate)',marginBottom:4}}>마지막 동기화</div>
            <div style={{fontSize:16,fontWeight:500}}>{lastOk ? lastOk.time : '-'} <span className="badge ok" style={{marginLeft:6}}>성공</span></div>
          </div>
          <button className="btn-primary" style={{borderRadius:12}} onClick={runSync} disabled={syncing}>
            {syncing ? <span className="spinner"></span> : <i className="ph ph-arrows-clockwise"></i>}
            {syncing ? '동기화 중...' : '지금 동기화'}
          </button>
        </div>
      </div>

      <div className="panel">
        <h4 style={{fontSize:13,fontWeight:500,color:'var(--slate)',margin:'0 0 12px'}}>동기화 이력</h4>
        {logs.map((l,i) => (
          <div key={i} className="panel-row" style={{padding:'10px 0',borderBottom: i<logs.length-1 ? '1px solid var(--border)' : 'none'}}>
            <div style={{display:'flex',gap:10,alignItems:'center'}}>
              <span className={`log-dot ${l.ok?'':'fail'}`}></span>
              <div>
                <div style={{fontSize:13.5}}>{l.label}</div>
                <div style={{fontSize:11.5,color:'var(--ash)'}}>{l.time}</div>
              </div>
            </div>
            {!l.ok && (
              <button className="btn-secondary" onClick={() => retry(i)} disabled={retryIdx===i}>
                {retryIdx===i ? <span className="spinner dark"></span> : '재시도'}
              </button>
            )}
          </div>
        ))}
      </div>
    </div>
  );
}

function ExcelScreen({ showToast }) {
  const [role, setRole] = useState('총괄관리자');
  const [downloading, setDownloading] = useState(false);
  const [teacherFilter, setTeacherFilter] = useState('전체');
  const canDownload = role !== '뷰어';

  const download = () => {
    setDownloading(true);
    setTimeout(() => { setDownloading(false); showToast('정산 내역 엑셀 다운로드가 완료되었습니다'); }, 1200);
  };

  const filtered = teacherFilter==='전체' ? TEACHER_STATS : TEACHER_STATS.filter(t => t.name===teacherFilter);

  return (
    <div className="content" style={{maxWidth:960}}>
      <div className="screen-head">
        <h1>정산 내역 엑셀 다운로드 및 관리자 백오피스</h1>
        <p>기간·강사 조건으로 정산 내역을 조회하고 강사별 시트로 분리된 엑셀을 다운로드합니다.</p>
      </div>

      <div className="panel">
        <div className="field-inline">
          <div className="field-row"><label>시작일</label><input type="date" defaultValue="2026-08-01" /></div>
          <div className="field-row"><label>종료일</label><input type="date" defaultValue="2026-08-31" /></div>
          <div className="field-row">
            <label>강사</label>
            <select value={teacherFilter} onChange={e=>setTeacherFilter(e.target.value)}>
              <option>전체</option>
              {TEACHER_STATS.map(t => <option key={t.name}>{t.name}</option>)}
            </select>
          </div>
        </div>
        <div className="field-row" style={{maxWidth:220}}>
          <label>내 권한 (데모 전환)</label>
          <select value={role} onChange={e=>setRole(e.target.value)}>
            <option>총괄관리자</option><option>지점관리자</option><option>뷰어</option>
          </select>
        </div>
        <button className="btn-primary" onClick={download} disabled={!canDownload || downloading}>
          {downloading ? <span className="spinner"></span> : <i className="ph ph-file-xls"></i>}
          {downloading ? '생성 중...' : '엑셀 다운로드'}
        </button>
        {!canDownload && <p style={{fontSize:12,color:'var(--ash)',marginTop:8}}>뷰어 권한은 다운로드할 수 없습니다. 관리자 권한이 필요합니다.</p>}
      </div>

      <div className="panel">
        <table className="data-table">
          <thead><tr><th>강사</th><th>세션수</th><th>정산액</th><th>상태</th></tr></thead>
          <tbody>
            {filtered.map(t => (
              <tr key={t.name}>
                <td>{t.name}</td>
                <td>{t.sessions}건</td>
                <td>{t.amount.toLocaleString()}원</td>
                <td><span className={`badge ${t.status==='지급완료'?'ok':t.status==='대기'?'pending':'ok'}`}>{t.status}</span></td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>
    </div>
  );
}

function BoardScreen({ showToast }) {
  const [tab, setTab] = useState('notice');
  const [posts, setPosts] = useState(POSTS);
  const [reviews, setReviews] = useState(REVIEWS);
  const [modalOpen, setModalOpen] = useState(false);
  const [editingId, setEditingId] = useState(null);
  const [newPost, setNewPost] = useState({ title:'', content:'' });

  const openCreate = () => { setEditingId(null); setNewPost({ title:'', content:'' }); setModalOpen(true); };
  const openEdit = (p) => { setEditingId(p.id); setNewPost({ title:p.title, content:'' }); setModalOpen(true); };

  const submitPost = () => {
    if (editingId) {
      setPosts(posts.map(p => p.id===editingId ? { ...p, title:newPost.title } : p));
      showToast('공지사항이 수정되었습니다');
    } else {
      setPosts([{ id:Date.now(), title:newPost.title, date:'2026.08.02' }, ...posts]);
      showToast('공지사항이 등록되었습니다');
    }
    setNewPost({ title:'', content:'' });
    setEditingId(null);
    setModalOpen(false);
  };

  const toggleVisible = (id) => setReviews(reviews.map(r => r.id===id ? {...r, visible:!r.visible} : r));

  const reported = reviews.filter(r => r.reported);

  return (
    <div className="content" style={{maxWidth:920}}>
      <div className="screen-head">
        <h1>게시판 및 서비스 후기 관리</h1>
        <p>공지·콘텐츠 게시판과 회원 후기를 관리합니다.</p>
      </div>

      <div className="board-tabs">
        <button className={`board-tab ${tab==='notice'?'active':''}`} onClick={() => setTab('notice')}>공지사항</button>
        <button className={`board-tab ${tab==='review'?'active':''}`} onClick={() => setTab('review')}>후기 관리</button>
      </div>

      {tab === 'notice' && (
        <div className="panel">
          <div className="panel-row" style={{marginBottom:8}}>
            <span style={{fontSize:13,color:'var(--slate)'}}>총 {posts.length}건</span>
            <button className="btn-primary" onClick={openCreate}><i className="ph ph-plus"></i>새 공지 작성</button>
          </div>
          {posts.map(p => (
            <div key={p.id} className="post-row">
              <div>
                <div className="post-title">{p.pinned && <i className="ph ph-push-pin" style={{marginRight:4,color:'var(--lime)'}}></i>}{p.title}</div>
                <div className="post-meta">{p.date}</div>
              </div>
              <div className="row-actions">
                <button title="수정" onClick={() => openEdit(p)}><i className="ph ph-pencil-simple"></i></button>
                <button title="삭제" onClick={() => { setPosts(posts.filter(x=>x.id!==p.id)); showToast('공지사항이 삭제되었습니다'); }}><i className="ph ph-trash"></i></button>
              </div>
            </div>
          ))}
        </div>
      )}

      {tab === 'review' && (
        <React.Fragment>
          {reported.length > 0 && (
            <div className="panel" style={{borderColor:'#e6b8ae'}}>
              <h4 style={{fontSize:13,fontWeight:500,color:'#a7402f',margin:'0 0 10px'}}><i className="ph ph-warning-circle"></i> 신고된 후기 모더레이션 큐</h4>
              {reported.map(r => (
                <div key={r.id} className="post-row">
                  <div>
                    <div className="post-title">{r.teacher} · ★{r.rating}</div>
                    <div className="post-meta">{r.text}</div>
                  </div>
                  <div className={`switch ${r.visible?'on':''}`} onClick={() => toggleVisible(r.id)} style={{cursor:'pointer'}}>
                    <span className="knob"></span>
                  </div>
                </div>
              ))}
            </div>
          )}
          <div className="panel">
            <h4 style={{fontSize:13,fontWeight:500,color:'var(--slate)',margin:'0 0 10px'}}>전체 후기</h4>
            {reviews.map(r => (
              <div key={r.id} className="post-row">
                <div>
                  <div className="post-title">{r.teacher} · ★{r.rating} {r.reported && <span className="badge fail" style={{marginLeft:6}}>신고됨</span>}</div>
                  <div className="post-meta">{r.text}</div>
                </div>
                <span style={{fontSize:12,color:r.visible?'var(--lime)':'var(--ash)'}}>{r.visible?'노출중':'숨김'}</span>
              </div>
            ))}
          </div>
        </React.Fragment>
      )}

      {modalOpen && (
        <div className="modal-overlay" onClick={() => setModalOpen(false)}>
          <div className="modal-box" onClick={e=>e.stopPropagation()}>
            <h3>{editingId ? '공지 수정' : '새 공지 작성'}</h3>
            <div className="field-row"><label>제목</label><input value={newPost.title} onChange={e=>setNewPost({...newPost,title:e.target.value})} placeholder="공지 제목을 입력하세요" /></div>
            <div className="field-row"><label>내용</label><textarea value={newPost.content} onChange={e=>setNewPost({...newPost,content:e.target.value})} placeholder="공지 내용을 입력하세요"></textarea></div>
            <div className="modal-actions">
              <button className="btn-ghost" onClick={() => setModalOpen(false)}>취소</button>
              <button className="btn-primary" disabled={!newPost.title} onClick={submitPost}>{editingId ? '저장' : '등록'}</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

function TeachersScreen({ showToast }) {
  const [search, setSearch] = useState('');
  const [selected, setSelected] = useState(null);
  const [teachers, setTeachers] = useState(TEACHERS_ADMIN);
  const list = teachers.filter(t => t.name.includes(search));

  const handleCertAction = () => {
    setTeachers(teachers.map(t => t.id===selected.id ? { ...t, cert:true } : t));
    setSelected({ ...selected, cert:true });
    showToast(selected.cert ? '인증 정보가 갱신되었습니다' : '자격증명이 승인되었습니다');
  };

  return (
    <div className="content" style={{maxWidth:920}}>
      <div className="screen-head">
        <h1>강사 관리</h1>
        <p>등록된 강사의 자격 증명과 활동 상태를 관리합니다.</p>
      </div>
      <div className="panel">
        <div className="field-row" style={{maxWidth:280,marginBottom:0}}>
          <label>강사 검색</label>
          <input placeholder="이름으로 검색" value={search} onChange={e=>setSearch(e.target.value)} />
        </div>
      </div>
      <div className="panel">
        <table className="data-table">
          <thead><tr><th>이름</th><th>전문분야</th><th>자격증명</th><th>상태</th></tr></thead>
          <tbody>
            {list.map(t => (
              <tr key={t.id} style={{cursor:'pointer'}} onClick={() => setSelected(t)}>
                <td>{t.name}</td>
                <td>{t.specialty}</td>
                <td>{t.cert ? <span className="badge ok"><i className="ph ph-seal-check"></i>인증완료</span> : <span className="badge pending">미제출</span>}</td>
                <td><span className={`badge ${t.status==='활성'?'ok':'pending'}`}>{t.status}</span></td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>

      {selected && (
        <div className="drawer-overlay" onClick={() => setSelected(null)}>
          <div className="drawer" onClick={e=>e.stopPropagation()}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16}}>
              <h3 style={{margin:0,fontSize:18,fontWeight:500}}>{selected.name} 강사</h3>
              <button className="icon-btn" onClick={() => setSelected(null)}><i className="ph ph-x"></i></button>
            </div>
            <img src={`https://source.boringavatars.com/marble/72/${encodeURIComponent(selected.name)}`} style={{borderRadius:'50%',marginBottom:16}} alt="" />
            <div className="field-row"><label>전문분야</label><div style={{fontSize:14}}>{selected.specialty}</div></div>
            <div className="field-row"><label>활동 상태</label><span className={`badge ${selected.status==='활성'?'ok':'pending'}`}>{selected.status}</span></div>
            <div className="field-row">
              <label>자격 증명</label>
              {selected.cert ? <span className="badge ok"><i className="ph ph-seal-check"></i>인증완료</span> : <span className="badge pending">미제출 · 서류 대기</span>}
            </div>
            <button className="btn-primary" style={{width:'100%',justifyContent:'center',marginTop:8}} onClick={handleCertAction}>{selected.cert ? '인증 정보 갱신' : '자격증명 승인 처리'}</button>
          </div>
        </div>
      )}
    </div>
  );
}

function App() {
  const [view, setView] = useState('main');
  const [toastMsg, setToastMsg] = useState(null);
  const showToast = (msg) => { setToastMsg(msg); setTimeout(() => setToastMsg(null), 2200); };

  return (
    <div data-archetype="topbar-analytics" style={{ width:'100%', minHeight:'100vh', background:'var(--linen)' }}>
      <Header view={view} setView={setView} showToast={showToast} />
      {view === 'main' && <MainScreen />}
      {view === 'sheets' && <SheetsScreen showToast={showToast} />}
      {view === 'excel' && <ExcelScreen showToast={showToast} />}
      {view === 'board' && <BoardScreen showToast={showToast} />}
      {view === 'teachers' && <TeachersScreen showToast={showToast} />}
      <Toast msg={toastMsg} />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
