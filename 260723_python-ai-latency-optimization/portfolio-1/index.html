<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Velocity Console — AI 응답 레이턴시 관제 대시보드</title>
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
:root{
  --bg:#e1d7c2; --surface:#ffffff; --surface-2:#fdfdf8; --surface-3:#eeefe9; --hover:#e5e7e0;
  --border:#bfc1b7; --border-2:#b3b3af;
  --text:#23251d; --text-2:#4d4f46; --text-3:#65675e; --text-4:#9ea096;
  --amber:#eb9d2a; --amber-dark:#cd8407; --gold:#b17816;
  --blue:#2f80fa; --orange:#f54e00; --green:#6aa84f;
  --radius:4px; --radius-window:6px;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{width:100%;min-height:100vh;}
body{font-family:'Pretendard',-apple-system,BlinkMacSystemFont,sans-serif;background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased;font-size:13.5px;}
button{font-family:inherit;cursor:pointer;background:none;border:none;color:inherit;}
input,select,textarea{font-family:inherit;}
table{border-collapse:collapse;width:100%;}
::-webkit-scrollbar{width:8px;height:8px;}
::-webkit-scrollbar-thumb{background:var(--border-2);border-radius:8px;}

@keyframes fadeInUp{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}
@keyframes pulseWarn{0%{box-shadow:0 0 0 0 rgba(245,78,0,.45);}70%{box-shadow:0 0 0 8px rgba(245,78,0,0);}100%{box-shadow:0 0 0 0 rgba(245,78,0,0);}}
@keyframes drawLine{from{stroke-dashoffset:600;}to{stroke-dashoffset:0;}}
@keyframes barGrow{from{transform:scaleX(0);}to{transform:scaleX(1);}}
@keyframes shimmer{0%{background-position:-200px 0;}100%{background-position:200px 0;}}
@keyframes toastIn{from{opacity:0;transform:translate(-50%,12px);}to{opacity:1;transform:translate(-50%,0);}}

.shell{display:flex;min-height:100vh;animation:fadeInUp .35s ease both;}

/* ---- sidebar (archetype signature) ---- */
.sidebar{width:240px;flex-shrink:0;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;padding:14px 12px;}
.sidebar-brand{display:flex;align-items:center;gap:10px;padding:8px 8px 16px;border-bottom:1px solid var(--border);margin-bottom:14px;}
.sidebar-logo{width:30px;height:30px;border-radius:var(--radius);background:var(--amber);color:var(--text);display:flex;align-items:center;justify-content:center;font-weight:800;font-size:14px;flex-shrink:0;}
.sidebar-brand-text{display:flex;flex-direction:column;line-height:1.2;}
.sidebar-brand-name{font-size:13.5px;font-weight:700;letter-spacing:-.02em;}
.sidebar-brand-env{display:flex;align-items:center;gap:5px;font-size:10.5px;color:var(--text-3);}
.env-dot{width:6px;height:6px;border-radius:9999px;background:var(--green);flex-shrink:0;}
.sidebar-section{margin-bottom:16px;}
.sidebar-section-title{font-size:10.5px;letter-spacing:.07em;color:var(--text-4);text-transform:uppercase;padding:0 8px 8px;font-weight:700;}
.sidebar-link{display:flex;align-items:center;gap:9px;padding:9px 8px;border-radius:var(--radius);color:var(--text-2);font-size:12.5px;font-weight:600;width:100%;text-align:left;transition:background .15s,color .15s;}
.sidebar-link:hover{background:var(--hover);color:var(--text);}
.sidebar-link.active{background:var(--surface-3);color:var(--blue);}
.sidebar-link.active svg{color:var(--blue);}
.sidebar-link svg{width:16px;height:16px;flex-shrink:0;color:var(--text-3);}
.sidebar-foot{margin-top:auto;padding:10px 8px;font-size:10.5px;color:var(--text-4);border-top:1px solid var(--border);}

.main-wrap{flex:1;min-width:0;width:calc(100% - 240px);padding:22px 28px 60px;background:var(--bg);}
.page-header{margin-bottom:18px;}
.page-title-row{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px;}
.page-title{font-size:21px;font-weight:800;letter-spacing:-.02em;color:var(--text);}
.page-actions{display:flex;gap:8px;position:relative;}
.btn-secondary{border:1.5px solid var(--gold);border-radius:var(--radius);padding:7px 12px;font-size:12px;font-weight:600;color:var(--gold);display:flex;align-items:center;gap:6px;background:var(--surface);}
.btn-secondary:hover{background:var(--surface-3);}
.btn-primary{background:var(--amber);color:var(--text);border-radius:var(--radius);padding:7px 14px;font-size:12px;font-weight:700;display:flex;align-items:center;gap:6px;}
.btn-primary:hover{background:var(--amber-dark);}
.page-meta{font-size:11.5px;color:var(--text-3);margin-top:6px;}
.dropdown-panel{position:absolute;top:calc(100% + 6px);right:0;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);box-shadow:0 8px 20px rgba(35,37,29,.12);z-index:50;min-width:160px;overflow:hidden;}
.dropdown-item{display:block;width:100%;text-align:left;padding:9px 12px;font-size:12px;color:var(--text-2);}
.dropdown-item:hover{background:var(--hover);}
.dropdown-item.active{color:var(--blue);font-weight:700;}

/* ---- status strip (composition: slim inline stat row) ---- */
.stat-row{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:16px;}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:12px 14px;position:relative;overflow:hidden;}
.stat-label{font-size:11px;color:var(--text-3);font-weight:600;margin-bottom:6px;}
.stat-value{font-size:28px;font-weight:800;color:var(--text);letter-spacing:-.01em;}
.stat-delta{font-size:11px;font-weight:700;margin-top:3px;display:inline-block;}
.stat-delta.positive{color:var(--green);}
.stat-delta.negative{color:var(--orange);}
.stat-sparkline{position:absolute;right:12px;bottom:10px;}

/* ---- command-tower composition: primary-focus + priority-rail ---- */
.tower-grid{display:grid;grid-template-columns:1.65fr 1fr;gap:14px;margin-bottom:16px;}
.panel{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-window);padding:20px;}
.panel-title{font-size:13px;font-weight:700;margin-bottom:2px;}
.panel-sub{font-size:11.5px;color:var(--text-3);margin-bottom:14px;}
.hero-metric{display:flex;align-items:flex-end;gap:10px;margin-bottom:4px;}
.hero-metric-value{font-size:36px;font-weight:800;letter-spacing:-.02em;color:var(--text);}
.hero-metric-sub{font-size:12px;color:var(--text-3);padding-bottom:8px;}

.waterfall{display:flex;width:100%;height:34px;border-radius:var(--radius);overflow:hidden;border:1px solid var(--border);margin:14px 0 8px;}
.wf-seg{display:flex;align-items:center;justify-content:center;color:#fff;font-size:10.5px;font-weight:700;transform-origin:left;animation:barGrow .7s ease both;white-space:nowrap;overflow:hidden;}
.wf-legend{display:flex;flex-wrap:wrap;gap:12px;font-size:11px;color:var(--text-2);margin-bottom:16px;}
.wf-legend-dot{width:8px;height:8px;border-radius:2px;display:inline-block;margin-right:5px;}

.pctl-track{position:relative;height:6px;background:var(--surface-3);border-radius:9999px;margin:10px 0 22px;}
.pctl-mark{position:absolute;top:-5px;width:2px;height:16px;background:var(--text-2);}
.pctl-mark-label{position:absolute;top:-24px;font-size:10px;font-weight:700;color:var(--text-2);white-space:nowrap;transform:translateX(-50%);}

.priority-rail{display:flex;flex-direction:column;gap:8px;}
.priority-item{border:1px solid var(--border);border-radius:var(--radius);padding:10px 12px;display:flex;align-items:center;gap:10px;transition:background .15s;text-align:left;width:100%;}
.priority-item:hover{background:var(--surface-3);}
.sev-dot{width:9px;height:9px;border-radius:9999px;flex-shrink:0;}
.sev-high{background:var(--orange);animation:pulseWarn 1.8s infinite;}
.sev-mid{background:var(--amber);}
.sev-low{background:var(--green);}
.priority-item-title{font-size:12px;font-weight:700;color:var(--text);}
.priority-item-sub{font-size:10.5px;color:var(--text-3);margin-top:2px;}

/* ---- secondary widget row ---- */
.widget-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:20px;}
.widget-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-window);padding:16px 18px;}
.widget-title{font-size:11.5px;font-weight:700;color:var(--text-3);text-transform:uppercase;letter-spacing:.04em;margin-bottom:12px;}
.donut-wrap{display:flex;align-items:center;gap:14px;}
.donut{width:70px;height:70px;border-radius:9999px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.donut-center{font-size:14px;font-weight:800;}
.donut-legend{display:flex;flex-direction:column;gap:5px;font-size:10.5px;color:var(--text-2);}
.legend-dot{width:7px;height:7px;border-radius:9999px;display:inline-block;margin-right:5px;}
.cb-grid{display:flex;flex-direction:column;gap:8px;}
.cb-row{display:flex;align-items:center;justify-content:space-between;font-size:11.5px;padding:6px 0;border-bottom:1px solid var(--surface-3);}
.cb-row:last-child{border-bottom:none;}
.cb-badge{font-size:10px;font-weight:700;padding:3px 8px;border-radius:9999px;}
.cb-badge.closed{background:#e7f2e0;color:var(--green);}
.cb-badge.half{background:#fdf1de;color:var(--amber-dark);}
.cb-badge.open{background:#fde4d9;color:var(--orange);animation:pulseWarn 1.8s infinite;}
.load-bars{display:flex;align-items:flex-end;gap:10px;height:70px;}
.load-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:6px;}
.load-fill{width:100%;background:var(--blue);border-radius:2px 2px 0 0;transform-origin:bottom;animation:barGrow .8s ease both;}
.load-label{font-size:9.5px;color:var(--text-3);}

/* ---- tab bar + table (archetype signature) ---- */
.data-section{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-window);overflow:hidden;}
.tab-bar{display:flex;gap:2px;padding:10px 14px 0;border-bottom:1px solid var(--border);}
.tab{padding:9px 12px;font-size:12px;font-weight:600;color:var(--text-3);border-bottom:2px solid transparent;border-radius:var(--radius) var(--radius) 0 0;}
.tab.active{color:var(--blue);background:var(--surface);border-bottom-color:var(--blue);}
.data-toolbar{display:flex;gap:8px;padding:10px 14px;align-items:center;}
.search-input{flex:1;border:1px solid var(--border);border-radius:var(--radius);padding:7px 10px;font-size:12px;display:flex;align-items:center;gap:6px;color:var(--text-3);}
.search-input input{border:none;outline:none;background:none;font-size:12px;width:100%;color:var(--text);}
.filter-chip,.export-btn{border:1px solid var(--border);border-radius:var(--radius);padding:7px 11px;font-size:11.5px;font-weight:600;display:flex;align-items:center;gap:6px;color:var(--text-2);}
.filter-chip:hover,.export-btn:hover{background:var(--surface-3);}
.export-btn{margin-left:auto;}
.data-table-wrap{overflow-x:auto;}
.data-table thead tr{background:var(--surface-3);}
.data-table th{text-align:left;font-size:10.5px;font-weight:700;color:var(--text-3);text-transform:uppercase;letter-spacing:.04em;padding:9px 14px;}
.data-table td{padding:10px 14px;font-size:12px;border-top:1px solid var(--surface-3);height:44px;color:var(--text-2);}
.data-table tbody tr:hover{background:var(--surface-3);}
.badge{font-size:10px;font-weight:700;padding:3px 9px;border-radius:9999px;display:inline-block;}
.badge.ok{background:#e7f2e0;color:var(--green);}
.badge.slow{background:#fdf1de;color:var(--amber-dark);}
.badge.err{background:#fde4d9;color:var(--orange);}
.icon-btn{width:26px;height:26px;border-radius:var(--radius);display:flex;align-items:center;justify-content:center;color:var(--text-3);}
.icon-btn:hover{background:var(--hover);color:var(--text);}

.screen-desc{font-size:12px;color:var(--text-3);margin-top:4px;max-width:660px;line-height:1.55;}

/* ---- optimization screen ---- */
.toggle-row{display:flex;align-items:center;gap:12px;margin-bottom:18px;}
.seg-control{display:inline-flex;border:1px solid var(--border);border-radius:9999px;padding:3px;background:var(--surface);}
.seg-btn{padding:7px 16px;font-size:12px;font-weight:700;border-radius:9999px;color:var(--text-3);}
.seg-btn.active{background:var(--text);color:#fff;}
.flow-track{display:flex;flex-direction:column;gap:10px;margin:14px 0 20px;}
.flow-row{display:flex;align-items:center;gap:10px;}
.flow-row-label{width:104px;font-size:11px;color:var(--text-3);flex-shrink:0;}
.flow-row-bar{flex:1;height:22px;background:var(--surface-3);border-radius:var(--radius);position:relative;overflow:hidden;}
.flow-row-fill{position:absolute;top:0;left:0;height:100%;border-radius:var(--radius);animation:barGrow .6s ease both;transform-origin:left;display:flex;align-items:center;padding-left:8px;font-size:10px;font-weight:700;color:#fff;}
.code-diff{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:8px;}
.code-block{background:#1c1c17;border-radius:var(--radius);padding:12px 14px;font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;font-size:11px;line-height:1.7;color:#eeefe9;overflow-x:auto;}
.code-block .cmt{color:#9ea096;}
.code-block .rm{background:rgba(245,78,0,.22);display:block;margin:0 -14px;padding:0 14px;}
.code-block .add{background:rgba(106,168,79,.25);display:block;margin:0 -14px;padding:0 14px;}
.code-label{font-size:11px;font-weight:700;color:var(--text-3);margin-bottom:6px;}
.dedup-list{display:flex;gap:10px;flex-wrap:wrap;margin-top:6px;}
.dedup-chip{border:1px solid var(--border);border-radius:9999px;padding:6px 12px;font-size:11px;font-weight:600;color:var(--text-2);background:var(--surface-3);}

/* ---- streaming screen ---- */
.stream-compare{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-top:16px;}
.stream-col-title{font-size:12.5px;font-weight:700;margin-bottom:10px;display:flex;align-items:center;gap:8px;}
.stream-block{border-radius:var(--radius);padding:12px 14px;margin-bottom:8px;font-size:11.5px;font-weight:600;opacity:0;transition:opacity .3s;}
.stream-block.show{opacity:1;}
.stream-block.core{background:#e7f2e0;color:#3d6b2c;}
.stream-block.aux{background:var(--surface-3);color:var(--text-2);}
.skeleton{height:34px;border-radius:var(--radius);background:linear-gradient(90deg,var(--surface-3) 25%,var(--hover) 37%,var(--surface-3) 63%);background-size:400px 100%;animation:shimmer 1.4s infinite linear;margin-bottom:8px;}
.metric-pair{display:flex;gap:20px;margin-top:16px;}
.metric-box{flex:1;border:1px solid var(--border);border-radius:var(--radius);padding:12px 14px;text-align:center;}
.metric-box-val{font-size:24px;font-weight:800;}
.metric-box-label{font-size:11px;color:var(--text-3);margin-top:4px;}

/* ---- resilience screen ---- */
.cb-diagram{display:flex;align-items:center;justify-content:center;gap:8px;margin:20px 0;}
.cb-node{border:2px solid var(--border);border-radius:9999px;padding:14px 20px;font-size:12px;font-weight:700;text-align:center;transition:all .25s;background:var(--surface);}
.cb-node.current{transform:scale(1.08);}
.cb-node.closed.current{border-color:var(--green);color:var(--green);box-shadow:0 0 0 4px rgba(106,168,79,.15);}
.cb-node.half.current{border-color:var(--amber);color:var(--amber-dark);box-shadow:0 0 0 4px rgba(235,157,42,.18);}
.cb-node.open.current{border-color:var(--orange);color:var(--orange);box-shadow:0 0 0 4px rgba(245,78,0,.18);animation:pulseWarn 1.4s infinite;}
.cb-arrow{color:var(--text-4);font-size:18px;}

/* ---- modal ---- */
.modal-overlay{position:fixed;inset:0;background:rgba(35,37,29,.45);display:flex;align-items:center;justify-content:center;z-index:100;animation:fadeInUp .2s ease both;}
.modal-body{background:var(--surface);border-radius:var(--radius-window);border:1px solid var(--border);box-shadow:0 25px 50px -12px rgba(0,0,0,.25);width:460px;max-width:90vw;padding:22px;max-height:80vh;overflow-y:auto;}
.modal-head{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:14px;}
.modal-title{font-size:16px;font-weight:800;}
.modal-close{width:26px;height:26px;border-radius:var(--radius);display:flex;align-items:center;justify-content:center;color:var(--text-3);}
.modal-close:hover{background:var(--hover);}
.field-row{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--surface-3);font-size:12px;}
.field-row .k{color:var(--text-3);}
.field-row .v{font-weight:700;color:var(--text);}
.modal-actions{display:flex;gap:8px;margin-top:16px;}

.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--text);color:#fff;padding:11px 18px;border-radius:var(--radius);font-size:12px;font-weight:600;z-index:200;animation:toastIn .25s ease both;white-space:nowrap;}

@media (max-width:1080px){
  .tower-grid{grid-template-columns:1fr;}
  .widget-grid{grid-template-columns:1fr;}
  .stat-row{grid-template-columns:repeat(2,1fr);}
  .code-diff{grid-template-columns:1fr;}
  .stream-compare{grid-template-columns:1fr;}
}
</style>
</head>
<body data-archetype="stripe-multipane">
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useRef} = React;

function useCountUp(target,decimals=0,duration=800){
  const [val,setVal] = useState(0);
  useEffect(()=>{
    let start=null;
    function step(ts){
      if(!start) start=ts;
      const p = Math.min((ts-start)/duration,1);
      setVal(target*p);
      if(p<1) requestAnimationFrame(step);
    }
    requestAnimationFrame(step);
  },[target]);
  return decimals>0 ? val.toFixed(decimals) : Math.floor(val);
}

function Sparkline({points,color}){
  const max = Math.max(...points), min = Math.min(...points);
  const path = points.map((p,i)=>`${i===0?'M':'L'} ${i*13} ${28-((p-min)/(max-min||1))*24}`).join(' ');
  return (
    <svg className="stat-sparkline" width="90" height="30" viewBox="0 0 90 30">
      <path d={path} fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeDasharray="300" style={{animation:'drawLine 1.1s ease forwards'}}/>
    </svg>
  );
}

function Donut({segs,size=70,label}){
  let acc=0;
  const stops = segs.map(s=>{
    const start=acc; acc+=s.pct;
    return `${s.color} ${start}% ${acc}%`;
  }).join(', ');
  return (
    <div className="donut" style={{width:size,height:size,background:`conic-gradient(${stops})`}}>
      <div style={{width:size*0.62,height:size*0.62,borderRadius:'9999px',background:'#fff',display:'flex',alignItems:'center',justifyContent:'center'}}>
        <span className="donut-center">{label}</span>
      </div>
    </div>
  );
}

const STAGES = [
  {key:'parse', label:'파싱', dur:0.1, color:'#9ea096'},
  {key:'db', label:'DB 조회', dur:1.8, color:'#2f80fa'},
  {key:'ext', label:'외부 API 호출', dur:2.6, color:'#f54e00'},
  {key:'ser', label:'직렬화', dur:0.3, color:'#6aa84f'},
];
const TOTAL = STAGES.reduce((a,s)=>a+s.dur,0);

function Waterfall(){
  return (
    <React.Fragment>
      <div className="waterfall">
        {STAGES.map(s=>(
          <div key={s.key} className="wf-seg" style={{width:(s.dur/TOTAL*100)+'%',background:s.color}} title={`${s.label} · ${s.dur}s`}>
            {s.dur>=0.3 ? s.dur+'s' : ''}
          </div>
        ))}
      </div>
      <div className="wf-legend">
        {STAGES.map(s=>(
          <span key={s.key}><span className="wf-legend-dot" style={{background:s.color}}></span>{s.label} {s.dur}s</span>
        ))}
      </div>
    </React.Fragment>
  );
}

function PercentileTrack(){
  const marks = [{v:'p50',pos:22,val:'1.2초'},{v:'p95',pos:64,val:'4.8초'},{v:'p99',pos:92,val:'9.4초'}];
  return (
    <div className="pctl-track">
      {marks.map(m=>(
        <div key={m.v} className="pctl-mark" style={{left:m.pos+'%'}}>
          <span className="pctl-mark-label" style={{left:'1px'}}>{m.v} {m.val}</span>
        </div>
      ))}
    </div>
  );
}

const PRIORITY_ISSUES = [

function OptimizationScreen({notify}){
  const [mode,setMode] = useState('parallel');
  const [runId,setRunId] = useState(0);
  const [dedupHits,setDedupHits] = useState(0);

  useEffect(()=>{
    let n=0;
    const iv = setInterval(()=>{ n+=37; setDedupHits(n); if(n>=482){setDedupHits(482);clearInterval(iv);} },80);
    return ()=>clearInterval(iv);
  },[runId]);

  const serial = [
    {label:'DB 조회',dur:1.8,color:'#2f80fa'},
    {label:'외부 API 호출',dur:2.6,color:'#f54e00'},
    {label:'후처리',dur:0.5,color:'#9ea096'},
  ];
  const parallel = [
    {label:'DB + 외부 API (동시 실행)',dur:2.6,color:'#6aa84f'},
    {label:'후처리',dur:0.5,color:'#9ea096'},
  ];
  const rows = mode==='serial' ? serial : parallel;
  const totalMax = 4.9;

  return (
    <div key={runId}>
      <div className="page-header">
        <div className="page-title-row">
          <div className="page-title">구조 최적화 시연</div>
          <div className="page-actions">
            <button className="btn-primary" onClick={()=>{setRunId(runId+1);notify('최적화 시뮬레이션을 재실행했습니다.');}}><i data-lucide="refresh-cw"></i>시뮬레이션 재실행</button>
          </div>
        </div>
        <div className="screen-desc">직렬 처리되던 DB 조회·외부 API 호출을 병렬화하여 전체 처리 흐름을 재구성하는 과정을 비교합니다</div>
      </div>

      <div className="toggle-row">
        <div className="seg-control">
          <button className={"seg-btn"+(mode==='serial'?' active':'')} onClick={()=>setMode('serial')}>직렬 처리 (Before)</button>
          <button className={"seg-btn"+(mode==='parallel'?' active':'')} onClick={()=>setMode('parallel')}>병렬 처리 (After)</button>
        </div>
        <span style={{fontSize:12,color:'var(--text-3)'}}>전체 소요: <b style={{color:'var(--text)'}}>{mode==='serial'?'4.9초':'3.1초'}</b></span>
      </div>

      <div className="panel">
        <div className="panel-title">처리 흐름도</div>
        <div className="panel-sub">막대 길이는 절대 소요시간, 병렬 구간은 동시 실행되는 호출을 하나의 막대로 표시합니다</div>
        <div className="flow-track">
          {rows.map((r,i)=>(
            <div className="flow-row" key={i}>
              <div className="flow-row-label">{r.label}</div>
              <div className="flow-row-bar">
                <div className="flow-row-fill" style={{width:(r.dur/totalMax*100)+'%',background:r.color}}>{r.dur}s</div>
              </div>
            </div>
          ))}
        </div>

        <div className="code-diff">
          <div>
            <div className="code-label">Before — 순차 await</div>
            <div className="code-block">
              <span className="rm">result_db = await fetch_db(req)</span>
              <span className="rm">result_ext = await call_external_api(req)</span>
              <span>merged = merge(result_db, result_ext)</span>
              <span className="cmt"># 총 대기 ≈ 1.8s + 2.6s</span>
            </div>
          </div>
          <div>
            <div className="code-label">After — asyncio.gather</div>
            <div className="code-block">
              <span className="add">result_db, result_ext = await asyncio.gather(</span>
              <span className="add">&nbsp;&nbsp;fetch_db(req), call_external_api(req)</span>
              <span className="add">)</span>
              <span className="cmt"># 총 대기 ≈ max(1.8s, 2.6s)</span>
            </div>
          </div>
        </div>

        <div className="panel-sub" style={{marginTop:16,marginBottom:6}}>중복 연산 제거 — 메모이제이션 히트</div>
        <div className="hero-metric" style={{marginBottom:4}}>
          <span className="hero-metric-value" style={{fontSize:28}}>{dedupHits}</span>
          <span className="hero-metric-sub">건 / 최근 1시간</span>
        </div>
        <div className="dedup-list">
          <span className="dedup-chip">동일 사용자 프로필 조회</span>
          <span className="dedup-chip">환율 변환 계수</span>
          <span className="dedup-chip">약관 버전 조회</span>
        </div>
      </div>
    </div>
  );
}

function StreamingScreen({notify}){
  const [mode,setMode] = useState('stream');
  const [stage,setStage] = useState(0);
  const [running,setRunning] = useState(false);

  function run(){
    setRunning(true); setStage(0);
    const delays = mode==='stream' ? [300,900,1600,2400] : [3100,3100,3100,3100];
    delays.forEach((d,i)=> setTimeout(()=>setStage(i+1), d));
    setTimeout(()=>{setRunning(false); notify('시뮬레이션이 완료되었습니다.');}, delays[delays.length-1]+200);
  }

  return (
    <div>
      <div className="page-header">
        <div className="page-title-row">
          <div className="page-title">우선순위 스트리밍</div>
          <div className="page-actions">
            <button className="btn-primary" onClick={run} disabled={running}><i data-lucide="play"></i>{running?'실행 중…':'시뮬레이션 시작'}</button>
          </div>
        </div>
        <div className="screen-desc">핵심 결과를 우선 반환하고 부가 콘텐츠는 후속 청크로 전달하는 응답 전략을 일괄 응답과 비교합니다</div>
      </div>

      <div className="seg-control">
        <button className={"seg-btn"+(mode==='batch'?' active':'')} onClick={()=>{setMode('batch');setStage(0);}}>일괄 응답</button>
        <button className={"seg-btn"+(mode==='stream'?' active':'')} onClick={()=>{setMode('stream');setStage(0);}}>스트리밍 응답</button>
      </div>

      <div className="stream-compare">
        <div className="panel">
          <div className="stream-col-title"><i data-lucide="database" style={{width:15,height:15,color:'var(--text-3)'}}></i>{mode==='batch'?'일괄 응답 (Before)':'스트리밍 응답 (After)'}</div>
          {mode==='stream' ? (
            <React.Fragment>
              <div className={"stream-block core"+(stage>=1?' show':'')}>핵심 결과 데이터 (요약 카드)</div>
              <div className={"stream-block aux"+(stage>=2?' show':'')}>세부 근거 데이터</div>
              <div className={"stream-block aux"+(stage>=3?' show':'')}>관련 추천 항목</div>
              <div className={"stream-block aux"+(stage>=4?' show':'')}>참고 각주 · 메타데이터</div>
              {stage<4 && stage>0 && <div className="skeleton"></div>}
            </React.Fragment>
          ) : (
            <React.Fragment>
              {stage<4 && running && <div className="skeleton" style={{height:120}}></div>}
              <div className={"stream-block core"+(stage>=4?' show':'')}>핵심 결과 + 세부 근거 + 추천 + 메타데이터 (전체 동시 반환)</div>
            </React.Fragment>
          )}
        </div>
        <div className="panel">
          <div className="panel-title">체감 타임라인</div>
          <div className="panel-sub">첫 유의미 콘텐츠가 표시되는 시점 비교</div>
          <div className="flow-track">
            <div className="flow-row"><div className="flow-row-label">배치 모드</div><div className="flow-row-bar"><div className="flow-row-fill" style={{width:'100%',background:'#9ea096'}}>3.1초</div></div></div>
            <div className="flow-row"><div className="flow-row-label">스트리밍 모드</div><div className="flow-row-bar"><div className="flow-row-fill" style={{width:'29%',background:'#6aa84f'}}>0.9초</div></div></div>
          </div>
          <div className="metric-pair">
            <div className="metric-box"><div className="metric-box-val">3.1초</div><div className="metric-box-label">일괄 응답 대기</div></div>
            <div className="metric-box"><div className="metric-box-val" style={{color:'var(--green)'}}>0.9초</div><div className="metric-box-label">스트리밍 첫 콘텐츠</div></div>
          </div>
        </div>
      </div>
    </div>
  );
}

function ResilienceScreen({notify}){
  const [cbState,setCbState] = useState('closed');
  const [simRunning,setSimRunning] = useState(false);

  function runSim(){
    if(simRunning) return;
    setSimRunning(true);
    setCbState('open');
    notify('외부 서비스 장애를 시뮬레이션합니다 — 서킷을 엽니다.');
    setTimeout(()=>{
      notify('폴백 응답으로 전환되어 핵심 결과를 반환했습니다.');
    },900);
    setTimeout(()=>{ setCbState('half'); notify('반열림 상태 — 시험 요청을 전송합니다.'); },2200);
    setTimeout(()=>{ setCbState('closed'); notify('시험 요청 성공 — 닫힘 상태로 복귀했습니다.'); setSimRunning(false); },3600);
  }

  return (
    <div>
      <div className="page-header">
        <div className="page-title-row">
          <div className="page-title">캐시·장애 대응</div>
          <div className="page-actions">
            <button className="btn-primary" onClick={runSim} disabled={simRunning}><i data-lucide="alert-triangle"></i>{simRunning?'진행 중…':'장애 시뮬레이션 실행'}</button>
          </div>
        </div>
        <div className="screen-desc">캐시 히트율과 서킷브레이커 상태 전이를 모니터링하고 장애 격리 흐름을 시연합니다</div>
      </div>

      <div className="tower-grid">
        <div className="panel">
          <div className="panel-title">캐시 히트율 추이 (24시간)</div>
          <Sparkline points={[58,61,65,63,68,70,66,72,71,74,72,72]} color="#2f80fa"/>
          <div style={{height:70}}></div>
          <div className="hero-metric" style={{marginTop:8}}>
            <span className="hero-metric-value" style={{fontSize:28}}>72%</span>
            <span className="hero-metric-sub">현재 캐시 히트율 · TTL 300초</span>
          </div>
        </div>
        <div className="panel">
          <div className="panel-title">서킷브레이커 상태 전이</div>
          <div className="panel-sub">닫힘 → 열림 → 반열림 → 닫힘</div>
          <div className="cb-diagram">
            <div className={"cb-node closed"+(cbState==='closed'?' current':'')}>닫힘</div>
            <span className="cb-arrow">→</span>
            <div className={"cb-node open"+(cbState==='open'?' current':'')}>열림</div>
            <span className="cb-arrow">→</span>
            <div className={"cb-node half"+(cbState==='half'?' current':'')}>반열림</div>
          </div>
          <div className="cb-grid">
            <div className="cb-row"><span>결제 API</span><span className="cb-badge closed">닫힘</span></div>
            <div className="cb-row"><span>지도 API</span><span className={"cb-badge "+(cbState==='half'?'half':'closed')}>{cbState==='half'?'반열림':'닫힘'}</span></div>
            <div className="cb-row"><span>알림 API</span><span className={"cb-badge "+(cbState==='open'?'open':cbState==='half'?'half':'closed')}>{cbState==='open'?'열림':cbState==='half'?'반열림':'닫힘'}</span></div>
          </div>
        </div>
      </div>
    </div>
  );
}

function Toast({msg}){
  if(!msg) return null;
  return <div className="toast">{msg}</div>;
}

function App(){
  const [screen,setScreen] = useState('main');
  const [toast,setToast] = useState(null);
  function notify(msg){ setToast(msg); setTimeout(()=>setToast(null),2400); }
  useEffect(()=>{ if(window.lucide) window.lucide.createIcons(); });
  return (
    <div className="shell">
      <Sidebar screen={screen} setScreen={setScreen}/>
      <main className="main-wrap">
        {screen==='main' && <MainScreen notify={notify}/>}
        {screen==='optimization' && <OptimizationScreen notify={notify}/>}
        {screen==='streaming' && <StreamingScreen notify={notify}/>}
        {screen==='resilience' && <ResilienceScreen notify={notify}/>}
      </main>
      <Toast msg={toast}/>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
