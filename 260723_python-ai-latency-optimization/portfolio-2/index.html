<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PulseGrid — 통합 서비스 성능 인사이트 플랫폼</title>
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
<link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/regular/style.css">
<link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/fill/style.css">
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
:root{
  --void:#000000; --ground:#181818; --carbon:#212525; --blueblack:#1f2a33; --rust:#231c1c;
  --border:#485346; --border-2:#1f2a33;
  --text:#ddffdc; --text-2:#8cab87; --text-3:#677d64; --text-4:#9cbf93; --text-5:#aed2a4;
  --lime:#7fee64; --link:#859984;
  --radius-card:8px; --radius-btn:12px;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{width:100%;min-height:100vh;}
body{font-family:'Pretendard',-apple-system,BlinkMacSystemFont,sans-serif;background:var(--void);color:var(--text);-webkit-font-smoothing:antialiased;font-size:14px;}
button{font-family:inherit;cursor:pointer;background:none;border:none;color:inherit;}
input,select,textarea{font-family:inherit;}
table{border-collapse:collapse;width:100%;}
::-webkit-scrollbar{width:8px;height:8px;}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:8px;}

@keyframes fadeInUp{from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:translateY(0);}}
@keyframes pulseLime{0%{box-shadow:0 0 0 0 rgba(127,238,100,.5);}70%{box-shadow:0 0 0 9px rgba(127,238,100,0);}100%{box-shadow:0 0 0 0 rgba(127,238,100,0);}}
@keyframes glowPulse{0%,100%{box-shadow:0 0 0 0 rgba(255,90,90,.4);}50%{box-shadow:0 0 0 7px rgba(255,90,90,0);}}
@keyframes rotateCube{from{transform:rotateX(-18deg) rotateY(0deg);}to{transform:rotateX(-18deg) rotateY(360deg);}}
@keyframes barRise{from{transform:scaleY(0);}to{transform:scaleY(1);}}
@keyframes drawPath{from{stroke-dashoffset:900;}to{stroke-dashoffset:0;}}

#root{width:100%;animation:fadeInUp .35s ease both;}

/* ---- topbar-analytics header (archetype signature, no sidebar) ---- */
.app-header{position:sticky;top:0;z-index:60;width:100%;height:64px;background:rgba(33,37,37,.9);backdrop-filter:blur(10px);border-bottom:1px solid var(--border-2);display:flex;align-items:center;padding:0 24px;gap:20px;}
.cube-scene{perspective:400px;width:30px;height:30px;flex-shrink:0;}
.cube{width:30px;height:30px;position:relative;transform-style:preserve-3d;animation:rotateCube 9s linear infinite;}
.cube .face{position:absolute;width:30px;height:30px;background:linear-gradient(135deg,#7fee64,#18b759);opacity:.92;border:1px solid rgba(127,238,100,.5);border-radius:3px;}
.face.f1{transform:translateZ(15px);} .face.f2{transform:rotateY(90deg) translateZ(15px);}
.face.f3{transform:rotateY(180deg) translateZ(15px);} .face.f4{transform:rotateY(-90deg) translateZ(15px);}
.face.f5{transform:rotateX(90deg) translateZ(15px);} .face.f6{transform:rotateX(-90deg) translateZ(15px);}
.brand-word{font-size:16px;font-weight:700;letter-spacing:-.02em;color:var(--text);flex-shrink:0;}
.project-switcher{position:relative;}
.switcher-btn{display:flex;align-items:center;gap:6px;font-size:12.5px;font-weight:500;color:var(--link);padding:6px 10px;border-radius:8px;border:1px solid transparent;}
.switcher-btn:hover{background:var(--carbon);border-color:var(--border);}
.global-nav{display:flex;gap:4px;flex:1;overflow-x:auto;}
.nav-link{font-size:12.5px;font-weight:500;color:var(--text-2);padding:8px 12px;border-radius:8px;white-space:nowrap;}
.nav-link:hover{background:var(--carbon);color:var(--text);}
.nav-link.active{background:var(--carbon);color:var(--text);}
.header-actions{display:flex;align-items:center;gap:6px;flex-shrink:0;position:relative;}
.icon-btn{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;color:var(--text-2);position:relative;}
.icon-btn:hover{background:var(--carbon);color:var(--text);}
.notif-dot{position:absolute;top:6px;right:6px;width:7px;height:7px;border-radius:9999px;background:var(--lime);animation:pulseLime 2s infinite;}
.avatar-btn{width:30px;height:30px;border-radius:9999px;background:linear-gradient(135deg,#3e4a3c,#181818);color:var(--text);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;border:1px solid var(--border);}
.dropdown-panel{position:absolute;top:calc(100% + 8px);right:0;background:var(--carbon);border:1px solid var(--border);border-radius:8px;box-shadow:0 20px 40px rgba(0,0,0,.5);z-index:80;min-width:190px;overflow:hidden;padding:6px;}
.dropdown-item{display:block;width:100%;text-align:left;padding:9px 10px;font-size:12.5px;color:var(--text-2);border-radius:6px;}
.dropdown-item:hover{background:rgba(127,238,100,.08);color:var(--text);}
.dropdown-item.active{color:var(--lime);font-weight:600;}
.notif-item{padding:9px 10px;font-size:12px;color:var(--text-2);border-bottom:1px solid var(--border-2);}
.notif-item:last-child{border-bottom:none;}
.notif-item b{color:var(--text);}

/* ---- secondary tab-bar (archetype signature #4) ---- */
.aux-tabbar{width:100%;background:var(--void);border-bottom:1px solid var(--border-2);padding:0 24px;}
.aux-tabbar-inner{max-width:1280px;margin:0 auto;display:flex;gap:22px;overflow-x:auto;}
.tab{padding:11px 2px;font-size:12.5px;font-weight:500;color:var(--text-3);border-bottom:2px solid transparent;white-space:nowrap;}
.tab.active{color:var(--lime);border-bottom-color:var(--lime);}

.content{max-width:1280px;margin:0 auto;padding:28px 24px 72px;}
.page-header{margin-bottom:20px;}
.eyebrow{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:var(--text-4);margin-bottom:6px;}
.page-title-row{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px;}
.page-title{font-size:24px;font-weight:700;letter-spacing:-.015em;color:var(--text);}
.page-actions{display:flex;gap:10px;align-items:center;}
.btn-ghost{border:1px solid var(--text);color:var(--text);border-radius:var(--radius-btn);padding:8px 16px;font-size:12.5px;font-weight:500;display:flex;align-items:center;gap:7px;}
.btn-ghost:hover{background:rgba(221,255,220,.06);}
.btn-fill{background:var(--ground);color:var(--text);border:1px solid var(--text);border-radius:var(--radius-btn);padding:8px 16px;font-size:12.5px;font-weight:500;display:flex;align-items:center;gap:7px;}
.btn-fill:hover{background:#222;}
.btn-lime{background:var(--lime);color:#0e1a0c;border-radius:9999px;padding:8px 18px;font-size:12.5px;font-weight:700;display:flex;align-items:center;gap:7px;}
.btn-lime:hover{filter:brightness(1.08);}
.page-desc{font-size:12.5px;color:var(--text-2);margin-top:6px;max-width:680px;line-height:1.6;}

/* ---- stat row ---- */
.stat-row{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:20px;}
.stat-card{background:var(--ground);border:1px solid var(--border);border-radius:var(--radius-card);padding:18px 20px;position:relative;overflow:hidden;}
.stat-label{font-size:11.5px;color:var(--text-3);font-weight:500;margin-bottom:8px;}
.stat-value{font-size:28px;font-weight:700;color:var(--text);letter-spacing:-.01em;}
.stat-delta{font-size:11.5px;font-weight:600;margin-top:4px;display:inline-block;}
.stat-delta.positive{color:var(--lime);}
.stat-delta.negative{color:#ff8a6b;}
.stat-sparkline{position:absolute;right:16px;bottom:14px;}

/* ---- insight-board composition ---- */
.insight-board{display:grid;grid-template-columns:1.7fr 1fr;gap:16px;margin-bottom:20px;}
.hero-viz{background:var(--ground);border:1px solid var(--border);border-radius:var(--radius-card);padding:24px;position:relative;}
.hero-viz-head{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:16px;}
.hero-metric-value{font-size:40px;font-weight:700;letter-spacing:-.015em;color:var(--text);}
.hero-metric-sub{font-size:12px;color:var(--text-2);margin-top:2px;}
.chart-legend{display:flex;gap:14px;font-size:11px;color:var(--text-2);margin-top:10px;flex-wrap:wrap;}
.legend-dot{width:8px;height:8px;border-radius:9999px;display:inline-block;margin-right:5px;}
.kpi-side{background:var(--carbon);border:1px solid var(--border-2);border-radius:var(--radius-card);padding:18px;display:flex;flex-direction:column;gap:6px;}
.kpi-side-title{font-size:11px;font-weight:600;color:var(--text-4);text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px;}
.kpi-item{display:flex;flex-direction:column;gap:6px;padding:10px 8px;border-radius:6px;text-align:left;width:100%;}
.kpi-item:hover{background:rgba(127,238,100,.06);}
.kpi-item.active{background:rgba(127,238,100,.1);}
.kpi-item-top{display:flex;justify-content:space-between;font-size:12px;}
.kpi-item-name{font-weight:600;color:var(--text);}
.kpi-item-score{font-weight:700;color:var(--lime);}
.kpi-bar-track{width:100%;height:5px;background:var(--border-2);border-radius:9999px;overflow:hidden;}
.kpi-bar-fill{height:100%;background:var(--lime);border-radius:9999px;transform-origin:left;animation:barRise .7s ease both;}

/* ---- widget grid ---- */
.widget-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:24px;}
.widget-card{background:var(--ground);border:1px solid var(--border);border-radius:var(--radius-card);padding:18px 20px;}
.widget-title{font-size:11px;font-weight:600;color:var(--text-3);text-transform:uppercase;letter-spacing:.05em;margin-bottom:14px;}
.donut-wrap{display:flex;align-items:center;gap:14px;}
.donut{width:72px;height:72px;border-radius:9999px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.donut-center{font-size:13px;font-weight:700;color:var(--void);}
.donut-legend{display:flex;flex-direction:column;gap:6px;font-size:11px;color:var(--text-2);}
.bar-chart{display:flex;align-items:flex-end;gap:10px;height:80px;}
.bar-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:6px;}
.bar-fill{width:100%;background:var(--lime);border-radius:3px 3px 0 0;transform-origin:bottom;animation:barRise .8s ease both;}
.bar-label{font-size:9.5px;color:var(--text-3);}
.timeline-mini{display:flex;flex-direction:column;gap:11px;}
.timeline-row{display:flex;gap:9px;align-items:flex-start;font-size:11.5px;color:var(--text-2);}
.timeline-dot{width:7px;height:7px;border-radius:9999px;background:var(--lime);margin-top:4px;flex-shrink:0;}

/* ---- panel generic ---- */
.panel{background:var(--ground);border:1px solid var(--border);border-radius:var(--radius-card);padding:24px;}
.panel-title{font-size:14px;font-weight:600;margin-bottom:4px;color:var(--text);}
.panel-sub{font-size:12px;color:var(--text-3);margin-bottom:16px;}

/* ---- loadtest ---- */
.scenario-row{display:flex;gap:8px;margin-bottom:18px;}
.scenario-btn{border:1px solid var(--border);border-radius:9999px;padding:8px 16px;font-size:12px;font-weight:500;color:var(--text-2);}
.scenario-btn.active{background:var(--lime);color:#0e1a0c;border-color:var(--lime);font-weight:700;}
.hist-chart{display:flex;align-items:flex-end;gap:8px;height:120px;margin:16px 0;}
.hist-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:6px;}
.hist-fill{width:100%;border-radius:3px 3px 0 0;transform-origin:bottom;animation:barRise .7s ease both;}
.hist-label{font-size:9.5px;color:var(--text-3);}
.reg-table{width:100%;margin-top:8px;}
.reg-table th{text-align:left;font-size:10.5px;font-weight:600;color:var(--text-3);text-transform:uppercase;letter-spacing:.04em;padding:9px 12px;border-bottom:1px solid var(--border-2);}
.reg-table td{padding:10px 12px;font-size:12px;color:var(--text-2);border-bottom:1px solid var(--border-2);}
.progress-track{width:100%;height:8px;background:var(--border-2);border-radius:9999px;overflow:hidden;margin:14px 0;}
.progress-fill{height:100%;background:var(--lime);border-radius:9999px;transition:width .05s linear;}
.badge{font-size:10.5px;font-weight:600;padding:3px 9px;border-radius:9999px;display:inline-block;}
.badge.pass{background:rgba(127,238,100,.15);color:var(--lime);}
.badge.fail{background:rgba(255,90,90,.15);color:#ff8a6b;}

/* ---- recommendation ---- */
.rec-list{display:flex;flex-direction:column;gap:10px;}
.rec-item{border:1px solid var(--border);border-radius:var(--radius-card);padding:14px 16px;display:flex;justify-content:space-between;align-items:center;gap:14px;text-align:left;width:100%;}
.rec-item:hover{background:rgba(127,238,100,.05);}
.rec-item-title{font-size:13px;font-weight:600;color:var(--text);}
.rec-item-sub{font-size:11.5px;color:var(--text-3);margin-top:3px;}
.rec-score{font-size:18px;font-weight:700;color:var(--lime);flex-shrink:0;text-align:right;}
.rec-score-label{font-size:10px;color:var(--text-3);font-weight:500;}

/* ---- alerting ---- */
.toggle-switch{width:38px;height:21px;border-radius:9999px;background:var(--border);position:relative;transition:background .15s;flex-shrink:0;}
.toggle-switch.on{background:var(--lime);}
.toggle-knob{width:17px;height:17px;border-radius:9999px;background:#0e1a0c;position:absolute;top:2px;left:2px;transition:left .15s;}
.toggle-switch.on .toggle-knob{left:19px;background:#0e1a0c;}
.rule-table th{text-align:left;font-size:10.5px;font-weight:600;color:var(--text-3);text-transform:uppercase;letter-spacing:.04em;padding:9px 12px;border-bottom:1px solid var(--border-2);}
.rule-table td{padding:11px 12px;font-size:12px;color:var(--text-2);border-bottom:1px solid var(--border-2);}
.scale-timeline{display:flex;flex-direction:column;gap:12px;margin-top:14px;}
.scale-row{display:flex;gap:12px;align-items:flex-start;font-size:12px;color:var(--text-2);}
.scale-dot{width:8px;height:8px;border-radius:9999px;background:var(--lime);margin-top:4px;flex-shrink:0;}
.scale-chip{font-size:10px;font-weight:600;padding:2px 8px;border-radius:9999px;background:rgba(127,238,100,.12);color:var(--lime);margin-left:8px;}

/* ---- modal / drawer ---- */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.65);display:flex;align-items:center;justify-content:center;z-index:120;animation:fadeInUp .2s ease both;}
.modal-body{background:var(--carbon);border:1px solid var(--border);border-radius:16px;width:480px;max-width:90vw;padding:24px;max-height:82vh;overflow-y:auto;}
.modal-head{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:16px;}
.modal-title{font-size:17px;font-weight:700;color:var(--text);}
.modal-close{width:28px;height:28px;border-radius:8px;display:flex;align-items:center;justify-content:center;color:var(--text-3);}
.modal-close:hover{background:rgba(255,255,255,.06);color:var(--text);}
.field-row{display:flex;justify-content:space-between;padding:9px 0;border-bottom:1px solid var(--border-2);font-size:12.5px;}
.field-row .k{color:var(--text-3);}
.field-row .v{font-weight:600;color:var(--text);}
.form-row{margin-bottom:14px;}
.form-row label{display:block;font-size:11.5px;color:var(--text-3);margin-bottom:6px;}
.form-row select,.form-row input{width:100%;background:var(--ground);border:1px solid var(--border);border-radius:8px;padding:9px 11px;font-size:12.5px;color:var(--text);}
.modal-actions{display:flex;gap:8px;margin-top:18px;}

.toast{position:fixed;bottom:26px;left:50%;transform:translateX(-50%);background:var(--carbon);border:1px solid var(--lime);color:var(--text);padding:11px 18px;border-radius:10px;font-size:12.5px;font-weight:500;z-index:200;animation:fadeInUp .25s ease both;white-space:nowrap;}

@media (max-width:1080px){
  .insight-board{grid-template-columns:1fr;}
  .widget-grid{grid-template-columns:1fr;}
  .stat-row{grid-template-columns:repeat(2,1fr);}
  .global-nav{display:none;}
}
</style>
</head>
<body>
<div id="root" data-archetype="topbar-analytics"></div>
<script type="text/babel">
const {useState,useEffect} = React;

function useCountUp(target,decimals=0,duration=800){
  const [val,setVal] = useState(0);
  useEffect(()=>{
    let start=null;
    function step(ts){
      if(!start) start=ts;
      const p = Math.min((ts-start)/duration,1);
      setVal(target*p);
      if(p<1) requestAnimationFrame(step);
    }
    requestAnimationFrame(step);
  },[target]);
  return decimals>0 ? val.toFixed(decimals) : Math.floor(val);
}

function Sparkline({points,color,w=90,h=30}){
  const max=Math.max(...points), min=Math.min(...points);
  const path = points.map((p,i)=>`${i===0?'M':'L'} ${i*(w/(points.length-1))} ${h-2-((p-min)/(max-min||1))*(h-6)}`).join(' ');
  return (
    <svg className="stat-sparkline" width={w} height={h} viewBox={`0 0 ${w} ${h}`}>
      <path d={path} fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeDasharray="400" style={{animation:'drawPath 1.1s ease forwards'}}/>
    </svg>
  );
}

function Donut({segs,size=72,label}){
  let acc=0;
  const stops = segs.map(s=>{ const start=acc; acc+=s.pct; return `${s.color} ${start}% ${acc}%`; }).join(', ');
  return (
    <div className="donut" style={{width:size,height:size,background:`conic-gradient(${stops})`}}>
      <div style={{width:size*0.6,height:size*0.6,borderRadius:'9999px',background:'var(--lime)',display:'flex',alignItems:'center',justifyContent:'center'}}>
        <span className="donut-center">{label}</span>
      </div>
    </div>
  );
}

function Cube(){
  return (
    <div className="cube-scene">
      <div className="cube">
        <div className="face f1"></div><div className="face f2"></div><div className="face f3"></div>
        <div className="face f4"></div><div className="face f5"></div><div className="face f6"></div>
      </div>
    </div>
  );
}

const SERVICES = [
  {id:'pay', name:'결제 API', score:82, data:[3.1,3.4,3.0,4.2,4.8,4.1,4.6], color:'#7fee64'},
  {id:'ai', name:'AI 추론 서비스', score:64, data:[5.2,5.0,4.8,4.6,4.4,4.2,4.1], color:'#5fb8ff'},
  {id:'noti', name:'알림 발송', score:31, data:[1.2,1.3,1.1,1.4,1.2,1.3,1.2], color:'#e0c96b'},
];

function MultiLineChart({active}){
  const w=640,h=200,pad=24; const max=6;
  return (
    <svg width="100%" height="220" viewBox={`0 0 ${w} ${h}`} preserveAspectRatio="none">
      {[0,1,2,3].map(i=>(<line key={i} x1={pad} x2={w-pad} y1={pad+i*(h-pad*2)/3} y2={pad+i*(h-pad*2)/3} stroke="#1f2a33" strokeWidth="1"/>))}
      {SERVICES.map(s=>{
        const dim = active && active!==s.id;
        const stepX=(w-pad*2)/(s.data.length-1);
        const path = s.data.map((v,i)=>`${i===0?'M':'L'} ${pad+i*stepX} ${h-pad-(v/max)*(h-pad*2)}`).join(' ');
        return <path key={s.id} d={path} fill="none" stroke={s.color} strokeWidth={dim?1.5:2.5} opacity={dim?0.25:1} strokeLinecap="round" strokeDasharray="900" style={{animation:'drawPath 1.3s ease forwards'}}/>;
      })}
    </svg>
  );
}

function App(){
  const [screen,setScreen] = useState('main');
  const [toast,setToast] = useState(null);
  const [switcherOpen,setSwitcherOpen] = useState(false);
  const [env,setEnv] = useState('프로덕션 클러스터');
  const [notifOpen,setNotifOpen] = useState(false);
  const [profileOpen,setProfileOpen] = useState(false);
  const [activeService,setActiveService] = useState(null);

  function notify(msg){ setToast(msg); setTimeout(()=>setToast(null),2400); }

  const NAV = [
    {id:'main', label:'통합 서비스 관제 대시보드'},
    {id:'loadtest', label:'부하·회귀 테스트 리포트'},
    {id:'recommendation', label:'최적화 권장 리포트'},
    {id:'alerting', label:'알림·스케일링 권고'},
  ];

  const [auxTab,setAuxTab] = useState({main:'all',loadtest:'300',recommendation:'all',alerting:'all'});
  function setAux(v){ setAuxTab({...auxTab,[screen]:v}); }

  return (
    <div>
      <header className="app-header">
        <Cube/>
        <span className="brand-word">PulseGrid</span>
        <div className="project-switcher">
          <button className="switcher-btn" onClick={()=>setSwitcherOpen(!switcherOpen)}>{env}<i className="ph ph-caret-down"></i></button>
          {switcherOpen && (

function LoadTestScreen({notify,scenario}){
  const d = HIST_DATA[scenario];
  const [running,setRunning] = useState(false);
  const [progress,setProgress] = useState(0);

  function rerun(){
    if(running) return;
    setRunning(true); setProgress(0);
    const iv = setInterval(()=>{
      setProgress(p=>{
        if(p>=100){ clearInterval(iv); setRunning(false); notify('부하 테스트가 완료되었습니다.'); return 100; }
        return p+4;
      });
    },60);
  }

  return (
    <div>
      <div className="page-header">
        <div className="page-title-row">
          <div className="page-title">부하·회귀 테스트 리포트</div>
          <div className="page-actions">
            <button className="btn-lime" onClick={rerun}><i className="ph ph-play"></i>{running?'실행 중…':'부하 테스트 재실행'}</button>
          </div>
        </div>
        <div className="page-desc">동시 사용자 시뮬레이션 부하 테스트 결과와 최적화 전후 회귀 검증 결과를 비교합니다</div>
      </div>

      {running && <div className="progress-track"><div className="progress-fill" style={{width:progress+'%'}}></div></div>}

      <div className="stat-row" style={{gridTemplateColumns:'repeat(3,1fr)'}}>
        <div className="stat-card"><div className="stat-label">처리량</div><div className="stat-value" style={{fontSize:20}}>{d.tp}</div></div>
        <div className="stat-card"><div className="stat-label">오류율</div><div className="stat-value" style={{fontSize:20}}>{d.err}</div></div>
        <div className="stat-card"><div className="stat-label">평균 응답시간</div><div className="stat-value" style={{fontSize:20}}>{d.rt}</div></div>
      </div>

      <div className="panel" style={{marginBottom:16}}>
        <div className="panel-title">응답시간 분포 히스토그램</div>
        <div className="panel-sub">동시사용자 {scenario}명 시나리오 기준</div>
        <div className="hist-chart">
          {d.buckets.map((b,i)=>(
            <div className="hist-col" key={i}>
              <div className="hist-fill" style={{height:b[0]+'%',background: i<2 ? '#7fee64' : i===2 ? '#e0c96b' : '#ff8a6b'}}></div>
              <div className="hist-label">{b[1]}</div>
            </div>
          ))}
        </div>
      </div>

      <div className="panel">
        <div className="panel-title">회귀 테스트 결과 — 최적화 전/후 비교</div>
        <table className="reg-table">
          <thead><tr><th>테스트 케이스</th><th>최적화 전</th><th>최적화 후</th><th>상태</th></tr></thead>
          <tbody>
            {REGRESSION_ROWS.map((r,i)=>(
              <tr key={i}><td>{r.name}</td><td>{r.before}</td><td>{r.after}</td><td><span className={"badge "+r.status}>{r.status==='pass'?'통과':'실패'}</span></td></tr>
            ))}
          </tbody>
        </table>
      </div>
    </div>
  );
}

function AlertingScreen({notify,filter}){
  const [rules,setRules] = useState(INIT_RULES);
  const [autoScale,setAutoScale] = useState(true);
  const [formOpen,setFormOpen] = useState(false);
  const [form,setForm] = useState({service:'결제 API',metric:'p95 레이턴시',threshold:'',channel:'웹훅'});

  const visible = filter==='all' ? rules : rules.filter(r=> filter==='on' ? r.on : !r.on);

  function toggleRule(id){ setRules(rules.map(r=> r.id===id ? {...r,on:!r.on} : r)); }
  function addRule(){
    if(!form.threshold){ notify('임계값을 입력해주세요.'); return; }
    setRules([...rules,{id:Date.now(),service:form.service,metric:form.metric,threshold:form.threshold,channel:form.channel,on:true}]);
    setFormOpen(false); setForm({...form,threshold:''});
    notify('알림 규칙이 추가되었습니다.');
  }

  return (
    <div>
      <div className="page-header">
        <div className="page-title-row">
          <div className="page-title">알림·스케일링 권고</div>
          <div className="page-actions">
            <span style={{display:'flex',alignItems:'center',gap:8,fontSize:12,color:'var(--text-2)'}}>
              자동 스케일링
              <div className={"toggle-switch"+(autoScale?' on':'')} onClick={()=>{setAutoScale(!autoScale);notify(!autoScale?'자동 스케일링을 활성화했습니다.':'자동 스케일링을 비활성화했습니다.');}}><div className="toggle-knob"></div></div>
            </span>
            <button className="btn-lime" onClick={()=>setFormOpen(true)}><i className="ph ph-plus"></i>규칙 추가</button>
          </div>
        </div>
        <div className="page-desc">서비스별 임계값 알림 규칙을 관리하고 이동평균 기반 자동 스케일링 권고안을 확인합니다</div>
      </div>

      <div className="panel" style={{marginBottom:16}}>
        <div className="panel-title">알림 규칙</div>
        <table className="rule-table">
          <thead><tr><th>서비스</th><th>지표</th><th>임계값</th><th>채널</th><th>사용</th></tr></thead>
          <tbody>
            {visible.map(r=>(
              <tr key={r.id}>
                <td>{r.service}</td><td>{r.metric}</td><td>{r.threshold}</td><td>{r.channel}</td>
                <td><div className={"toggle-switch"+(r.on?' on':'')} onClick={()=>toggleRule(r.id)}><div className="toggle-knob"></div></div></td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>

      <div className="panel">
        <div className="panel-title">이동평균 기반 트래픽 추세</div>
        <div className="panel-sub">순간 스파이크는 무시하고 추세 지속 시에만 스케일링 권고를 발행합니다</div>
        <Sparkline points={[40,42,55,44,46,80,48,50,52,54]} color="#7fee64" w={600} h={100}/>
        <div className="scale-timeline">
          <div className="scale-row"><span className="scale-dot"></span>결제 API 트래픽 추세 상승 지속 감지 — 스케일 아웃 권고<span className="scale-chip">실행됨</span></div>
          <div className="scale-row"><span className="scale-dot" style={{background:'#485346'}}></span>순간 스파이크 감지되었으나 이동평균 기준 미달 — 권고 제외<span className="scale-chip" style={{background:'rgba(139,139,139,.15)',color:'var(--text-3)'}}>무시됨</span></div>
          <div className="scale-row"><span className="scale-dot"></span>야간 트래픽 감소 추세 — 스케일 인 권고<span className="scale-chip">예정</span></div>
        </div>
      </div>

      {formOpen && (
        <div className="modal-overlay" onClick={()=>setFormOpen(false)}>
          <div className="modal-body" onClick={e=>e.stopPropagation()}>
            <div className="modal-head">
              <div className="modal-title">알림 규칙 추가</div>
              <button className="modal-close" onClick={()=>setFormOpen(false)}><i className="ph ph-x"></i></button>
            </div>
            <div className="form-row">
              <label>서비스</label>
              <select value={form.service} onChange={e=>setForm({...form,service:e.target.value})}>
                <option>결제 API</option><option>AI 추론 서비스</option><option>알림 발송</option>
              </select>
            </div>
            <div className="form-row">
              <label>지표</label>
              <select value={form.metric} onChange={e=>setForm({...form,metric:e.target.value})}>
                <option>p95 레이턴시</option><option>오류율</option><option>처리량 급락</option>
              </select>
            </div>
            <div className="form-row">
              <label>임계값</label>
              <input value={form.threshold} onChange={e=>setForm({...form,threshold:e.target.value})} placeholder="예: 5.0초 또는 1.0%"/>
            </div>
            <div className="form-row">
              <label>알림 채널</label>
              <select value={form.channel} onChange={e=>setForm({...form,channel:e.target.value})}>
                <option>웹훅</option><option>이메일</option>
              </select>
            </div>
            <div className="modal-actions">
              <button className="btn-lime" onClick={addRule}><i className="ph ph-check"></i>규칙 추가</button>
              <button className="btn-ghost" onClick={()=>setFormOpen(false)}>취소</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
