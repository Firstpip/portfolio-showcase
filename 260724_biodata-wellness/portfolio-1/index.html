<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>웰밸런스 통합 리포트 플랫폼 — 바이오데이터 웰니스 관리</title>
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://unpkg.com/prop-types@15/prop-types.min.js"></script>
<script src="https://unpkg.com/react-is@18/umd/react-is.production.min.js"></script>
<script src="https://unpkg.com/recharts@2/umd/Recharts.js"></script>
<style>
:root{
  --bg:#f9f4f2; --surface:#ffffff; --text:#2d2c2b; --text-2:#44423f; --text-3:#63605d;
  --border:#e2ded9; --border-strong:#d0d0d0;
  --primary:#0061ef; --primary-dark:#0050c9; --accent:#ffce00; --dark:#2d2c2b;
  --good:#1f9d55; --good-bg:#e5f5ec; --normal:#c98a12; --normal-bg:#fdf1da; --caution:#d1503a; --caution-bg:#fbe6e1;
  --radius-card:20px; --radius-sm:12px; --radius-btn:9999px; --radius-input:8px;
  --shadow-card:0 1px 2px rgba(45,44,43,.05), 0 14px 28px -18px rgba(45,44,43,.22);
  --shadow-card-hover:0 4px 10px rgba(45,44,43,.08), 0 22px 40px -18px rgba(45,44,43,.28);
  --shadow-pill:0 2px 0 0 rgba(65,61,69,.2);
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{width:100%;min-height:100vh;}
body{font-family:'Pretendard',-apple-system,BlinkMacSystemFont,sans-serif;background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased;font-size:14.5px;}
#root{width:100%;}
button{font-family:inherit;cursor:pointer;background:none;border:none;color:inherit;font-size:inherit;}
input,select,textarea{font-family:inherit;}
table{border-collapse:collapse;width:100%;}
::-webkit-scrollbar{width:8px;height:8px;}
::-webkit-scrollbar-thumb{background:var(--border-strong);border-radius:8px;}

@keyframes fadeInUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulseBadge{0%{box-shadow:0 0 0 0 rgba(209,80,58,.35)}70%{box-shadow:0 0 0 8px rgba(209,80,58,0)}100%{box-shadow:0 0 0 0 rgba(209,80,58,0)}}
@keyframes toastIn{from{opacity:0;transform:translate(-50%,14px)}to{opacity:1;transform:translate(-50%,0)}}
@keyframes drawerIn{from{transform:translateX(100%)}to{transform:translateX(0)}}
@keyframes blobFloat{0%,100%{transform:translate(0,0)}50%{transform:translate(10px,-14px)}}
@keyframes spin{to{transform:rotate(360deg)}}

.app{width:100%;min-height:100vh;background:var(--bg);color:var(--text);}

.app-header{position:sticky;top:0;z-index:40;display:flex;align-items:center;gap:18px;height:64px;padding:0 28px;background:var(--surface);border-bottom:1px solid var(--border);}
.brand{display:flex;align-items:center;gap:9px;font-weight:700;font-size:17px;letter-spacing:-.02em;flex-shrink:0;}
.brand-mark{width:32px;height:32px;border-radius:10px;background:linear-gradient(135deg,var(--primary),#4b8dff);display:flex;align-items:center;justify-content:center;color:#fff;}
.brand-mark svg{width:16px;height:16px;}
.project-switcher{display:flex;align-items:center;gap:6px;padding:8px 12px;border:1px solid var(--border);border-radius:var(--radius-btn);font-size:12.5px;font-weight:600;color:var(--text-2);background:var(--bg);position:relative;flex-shrink:0;}
.project-switcher svg{width:13px;height:13px;}
.switcher-menu{position:absolute;top:calc(100% + 6px);left:0;background:var(--surface);border:1px solid var(--border);border-radius:12px;box-shadow:var(--shadow-card);min-width:190px;overflow:hidden;z-index:50;}
.switcher-item{display:block;width:100%;text-align:left;padding:10px 14px;font-size:12.5px;color:var(--text-2);}
.switcher-item:hover{background:var(--bg);}
.global-nav{display:flex;align-items:center;gap:4px;flex:1;min-width:0;overflow-x:auto;}
.nav-link{padding:10px 14px;border-radius:10px;font-size:13px;font-weight:600;color:var(--text-3);white-space:nowrap;}
.nav-link:hover{color:var(--text);background:var(--bg);}
.nav-link.active{color:var(--primary);background:#eaf1ff;}
.header-actions{display:flex;align-items:center;gap:8px;flex-shrink:0;position:relative;}
.icon-btn{width:36px;height:36px;border-radius:var(--radius-btn);display:flex;align-items:center;justify-content:center;color:var(--text-2);position:relative;flex-shrink:0;}
.icon-btn:hover{background:var(--bg);}
.icon-btn svg{width:18px;height:18px;}
.dot-badge{position:absolute;top:6px;right:6px;width:7px;height:7px;border-radius:50%;background:var(--caution);}
.csv-btn{display:flex;align-items:center;gap:6px;padding:9px 16px;border-radius:var(--radius-btn);background:var(--dark);color:#fff;font-size:12.5px;font-weight:700;box-shadow:var(--shadow-pill);flex-shrink:0;}
.csv-btn:hover{background:#000;}
.csv-btn svg{width:14px;height:14px;}
.avatar{width:32px;height:32px;border-radius:50%;background:var(--accent);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:12px;color:var(--text);flex-shrink:0;}
.dropdown{position:absolute;top:calc(100% + 8px);right:0;background:var(--surface);border:1px solid var(--border);border-radius:12px;box-shadow:var(--shadow-card);min-width:210px;z-index:60;overflow:hidden;}
.dropdown-item{width:100%;text-align:left;padding:11px 14px;font-size:12.5px;color:var(--text-2);display:flex;gap:8px;align-items:center;}
.dropdown-item:hover{background:var(--bg);}
.dropdown-item svg{width:14px;height:14px;flex-shrink:0;}
.search-overlay{position:absolute;top:calc(100% + 8px);right:0;background:var(--surface);border:1px solid var(--border);border-radius:12px;box-shadow:var(--shadow-card);padding:10px;width:280px;z-index:60;}
.search-overlay input{width:100%;padding:9px 12px;border:1px solid var(--border-strong);border-radius:var(--radius-input);font-size:13px;}

.tab-bar{display:flex;gap:6px;padding:14px 28px 0;max-width:1280px;margin:0 auto;flex-wrap:wrap;}
.tab{padding:8px 16px;border-radius:var(--radius-btn);font-size:12.5px;font-weight:600;color:var(--text-3);border:1px solid transparent;}
.tab:hover{color:var(--text);}
.tab.active{background:var(--surface);color:var(--text);border-color:var(--border);box-shadow:0 1px 2px rgba(45,44,43,.06);}

.content{max-width:1280px;margin:0 auto;padding:20px 28px 80px;}
.page-title{font-size:36px;font-weight:700;letter-spacing:-.02em;margin-bottom:4px;}
.page-sub{font-size:13px;color:var(--text-3);margin-bottom:20px;}

.toolbar{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;margin-bottom:18px;}
.participant-select{padding:9px 14px;border:1px solid var(--border-strong);border-radius:var(--radius-input);font-size:13px;background:var(--surface);font-weight:600;color:var(--text);}
.search-input-inline{padding:9px 14px;border:1px solid var(--border-strong);border-radius:var(--radius-input);font-size:13px;min-width:240px;background:var(--surface);}

.dash-grid{display:grid;grid-template-columns:2fr 1fr;gap:18px;margin-bottom:18px;}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-card);padding:28px;box-shadow:var(--shadow-card);animation:fadeInUp .4s ease both;position:relative;overflow:hidden;transition:box-shadow .2s,transform .2s;}
.card:hover{box-shadow:var(--shadow-card-hover);transform:translateY(-3px);}
.card-title{font-size:16px;font-weight:700;margin-bottom:4px;}
.card-sub{font-size:12.5px;color:var(--text-3);margin-bottom:16px;}

.hero-blob{position:absolute;top:-60px;right:-60px;width:220px;height:220px;background:radial-gradient(circle at 30% 30%, rgba(255,206,0,.35), rgba(0,97,239,.18) 60%, transparent 75%);border-radius:48% 52% 60% 40% / 45% 40% 60% 55%;animation:blobFloat 7s ease-in-out infinite;pointer-events:none;}

.gauge-row{display:flex;align-items:center;gap:24px;flex-wrap:wrap;}
.gauge{position:relative;width:140px;height:140px;flex-shrink:0;}
.gauge-arc{transition:stroke-dashoffset .4s;}
.gauge-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.gauge-value{font-size:40px;font-weight:700;letter-spacing:-.02em;color:var(--text);}
.gauge-status{margin-top:4px;padding:3px 10px;border-radius:var(--radius-btn);font-size:11px;font-weight:700;}
.gauge-status.good{color:var(--good);background:var(--good-bg);}
.gauge-status.normal{color:var(--normal);background:var(--normal-bg);}
.gauge-status.caution{color:var(--caution);background:var(--caution-bg);}
.gauge-legend{flex:1;min-width:200px;font-size:12.5px;color:var(--text-2);line-height:1.6;}

.kpi-list{display:flex;flex-direction:column;gap:10px;}
.stat-card{border:1px solid var(--border);border-radius:14px;padding:14px 16px;background:var(--bg);cursor:pointer;transition:border-color .2s,background .2s;}
.stat-card:hover, .stat-card.active{border-color:var(--primary);background:#fff;}
.stat-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;gap:8px;}
.stat-label{font-size:12.5px;font-weight:600;color:var(--text-2);}
.stat-badge{font-size:10.5px;font-weight:700;padding:2px 8px;border-radius:var(--radius-btn);white-space:nowrap;}
.stat-badge.good{color:var(--good);background:var(--good-bg);}
.stat-badge.normal{color:var(--normal);background:var(--normal-bg);}
.stat-badge.caution{color:var(--caution);background:var(--caution-bg);animation:pulseBadge 2.4s infinite;}
.stat-value{font-size:22px;font-weight:700;color:var(--text);margin-bottom:6px;}
.stat-bar-track{height:6px;border-radius:4px;background:var(--border);overflow:hidden;}
.stat-bar-fill{height:100%;border-radius:4px;background:var(--primary);transition:width .5s ease;}
.highlight-note{margin-top:10px;font-size:12px;color:var(--text-2);background:var(--bg);border-radius:10px;padding:10px 12px;}

.widget-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:18px;}
.history-list{display:flex;flex-direction:column;gap:2px;}
.history-row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--border);font-size:12.5px;}
.history-row:last-child{border-bottom:none;}
.trend-up{color:var(--good);font-weight:700;display:flex;align-items:center;gap:3px;}
.trend-down{color:var(--caution);font-weight:700;display:flex;align-items:center;gap:3px;}
.trend-up svg,.trend-down svg{width:12px;height:12px;}

.program-item{display:flex;flex-direction:column;gap:2px;padding:12px 0;border-bottom:1px solid var(--border);}
.program-item:last-child{border-bottom:none;}
.program-name{font-size:13px;font-weight:700;}
.program-tag{display:inline-block;margin-top:4px;font-size:11px;font-weight:600;color:var(--primary);background:#eaf1ff;padding:2px 8px;border-radius:var(--radius-btn);width:fit-content;}
.program-meta{font-size:11.5px;color:var(--text-3);}
.disclaimer{margin-top:14px;font-size:11px;color:var(--text-3);background:var(--bg);border-radius:10px;padding:10px 12px;line-height:1.5;}

.btn{display:inline-flex;align-items:center;gap:6px;padding:10px 18px;border-radius:var(--radius-btn);font-size:12.5px;font-weight:700;}
.btn-primary{background:var(--primary);color:#fff;}
.btn-primary:hover{background:var(--primary-dark);}
.btn-dark{background:var(--dark);color:#fff;box-shadow:var(--shadow-pill);}
.btn-dark:hover{background:#000;}
.btn-ghost{background:var(--surface);border:1px solid var(--border);color:var(--text-2);}
.btn-ghost:hover{background:var(--bg);}
.btn:disabled{opacity:.45;cursor:not-allowed;}
.btn-sm{padding:7px 12px;font-size:11.5px;}
.btn svg{width:15px;height:15px;}

.table-wrap{border:1px solid var(--border);border-radius:16px;overflow:hidden;background:var(--surface);}
th{text-align:left;padding:12px 16px;background:var(--bg);color:var(--text-3);font-weight:600;font-size:11px;text-transform:uppercase;letter-spacing:.03em;border-bottom:1px solid var(--border);}
td{padding:12px 16px;border-bottom:1px solid var(--border);color:var(--text-2);font-size:13px;}
tr:last-child td{border-bottom:none;}
tbody tr{cursor:pointer;transition:background .15s;}
tbody tr:hover{background:var(--bg);}
.badge-consent{font-size:11px;font-weight:700;padding:3px 9px;border-radius:var(--radius-btn);}
.badge-consent.yes{color:var(--good);background:var(--good-bg);}
.badge-consent.no{color:var(--caution);background:var(--caution-bg);}

.field{margin-bottom:14px;}
.field label{display:block;font-size:12px;font-weight:600;color:var(--text-2);margin-bottom:6px;}
.field input, .field select, .field textarea{width:100%;padding:10px 12px;border:1px solid var(--border-strong);border-radius:var(--radius-input);font-size:13px;font-family:inherit;color:var(--text);}
.field input.error{border-color:var(--caution);background:var(--caution-bg);}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.checkbox-row{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--text-2);}

.modal-overlay{position:fixed;inset:0;background:rgba(45,44,43,.45);display:flex;align-items:center;justify-content:center;z-index:100;padding:20px;}
.modal{background:var(--surface);border-radius:20px;max-width:520px;width:100%;max-height:86vh;overflow-y:auto;animation:fadeInUp .25s ease both;}
.modal-wide{max-width:680px;}
.modal-head{display:flex;justify-content:space-between;align-items:center;padding:20px 24px;border-bottom:1px solid var(--border);}
.modal-head h3{font-size:16px;font-weight:700;}
.modal-head svg{width:18px;height:18px;}
.modal-body{padding:22px 24px;}
.modal-foot{display:flex;justify-content:flex-end;gap:8px;padding:16px 24px;border-top:1px solid var(--border);}

.drawer-overlay{position:fixed;inset:0;background:rgba(45,44,43,.4);z-index:100;}
.drawer{position:fixed;top:0;right:0;bottom:0;width:420px;max-width:92vw;background:var(--surface);box-shadow:-8px 0 30px rgba(0,0,0,.12);z-index:101;animation:drawerIn .3s ease both;display:flex;flex-direction:column;}
.drawer-head{display:flex;justify-content:space-between;align-items:center;padding:20px 24px;border-bottom:1px solid var(--border);}
.drawer-body{padding:22px 24px;overflow-y:auto;flex:1;}

.toast{position:fixed;left:50%;bottom:28px;transform:translateX(-50%);background:var(--dark);color:#fff;padding:13px 22px;border-radius:var(--radius-btn);font-size:12.5px;font-weight:600;z-index:200;display:flex;align-items:center;gap:8px;animation:toastIn .3s ease both;box-shadow:0 10px 30px rgba(0,0,0,.25);}
.toast svg{width:15px;height:15px;}

.spin{animation:spin .9s linear infinite;display:inline-flex;}

.dropzone{border:2px dashed var(--border-strong);border-radius:16px;padding:32px;text-align:center;color:var(--text-3);font-size:12.5px;background:var(--bg);cursor:pointer;}
.dropzone svg{width:26px;height:26px;margin-bottom:8px;}
.csv-file-row{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border);font-size:12px;}
.csv-file-row.invalid{color:var(--caution);}
.progress-track{height:8px;background:var(--border);border-radius:4px;overflow:hidden;margin-top:12px;}
.progress-fill{height:100%;background:var(--primary);border-radius:4px;transition:width .3s;}

.switch{width:40px;height:22px;border-radius:999px;background:var(--border-strong);position:relative;flex-shrink:0;transition:background .2s;}
.switch.on{background:var(--primary);}
.switch-knob{position:absolute;top:2px;left:2px;width:18px;height:18px;border-radius:50%;background:#fff;transition:left .2s;box-shadow:0 1px 3px rgba(0,0,0,.3);}
.switch.on .switch-knob{left:20px;}

.survey-toolbar{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px;flex-wrap:wrap;gap:10px;}
.survey-card{margin-bottom:14px;}
.survey-cat{font-size:11px;font-weight:700;color:var(--primary);text-transform:uppercase;letter-spacing:.03em;margin-bottom:6px;}
.option-row{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px;}
.option-pill{padding:8px 14px;border:1px solid var(--border);border-radius:var(--radius-btn);font-size:12.5px;color:var(--text-2);}
.option-pill.selected{background:var(--dark);color:#fff;border-color:var(--dark);}
.large-text .survey-card .card-title{font-size:19px;}
.large-text .option-pill{font-size:15px;padding:12px 18px;}
.large-text .survey-card{padding:34px;}

.admin-topbar{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:18px;flex-wrap:wrap;gap:10px;}
.admin-account-mini{font-size:12px;color:var(--text-3);}
.log-filter{display:flex;gap:8px;margin-bottom:12px;}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState, useEffect} = React;
const {ResponsiveContainer, RadarChart, PolarGrid, PolarAngleAxis, PolarRadiusAxis, Radar, AreaChart, Area, XAxis, YAxis, CartesianGrid, Tooltip} = Recharts;

function statusOf(score){
  if(score>=80) return {label:'양호', cls:'good'};
  if(score>=60) return {label:'보통', cls:'normal'};
  return {label:'관리필요', cls:'caution'};
}
function avgScore(p){ return Math.round(AREAS.reduce((s,a)=>s+p.scores[a.key],0)/AREAS.length); }
const CARD_DNA = {borderRadius:20, boxShadow:'0 14px 28px rgba(45,44,43,0.14)'};

];

const PROGRAMS = [
  {name:'아침 호흡 명상 클래스', tag:'스트레스 완화', duration:'주 3회 · 20분'},
  {name:'저강도 순환 운동 프로그램', tag:'심혈관 개선', duration:'주 2회 · 40분'},
  {name:'수면 리듬 코칭', tag:'생활습관', duration:'격주 1회 · 30분'},
];

const SURVEY_QUESTIONS_SEED = [

function Gauge({value}){
  const [display,setDisplay] = useState(0);
  useEffect(()=>{
    let raf, start=null; const duration=900;
    function step(ts){
      if(!start) start=ts;
      const p=Math.min((ts-start)/duration,1);
      setDisplay(Math.round(value*p));
      if(p<1) raf=requestAnimationFrame(step);
    }
    raf=requestAnimationFrame(step);
    return ()=>cancelAnimationFrame(raf);
  },[value]);
  const r=54, c=2*Math.PI*r, offset=c-(value/100)*c;
  const st=statusOf(value);
  return (
    <div className="gauge">
      <svg width="140" height="140" viewBox="0 0 140 140">
        <circle cx="70" cy="70" r={r} fill="none" stroke="#e2ded9" strokeWidth="12" />
        <circle cx="70" cy="70" r={r} fill="none" stroke="#0061ef" strokeWidth="12" strokeLinecap="round"
          strokeDasharray={c} strokeDashoffset={offset} transform="rotate(-90 70 70)" className="gauge-arc" />
      </svg>
      <div className="gauge-center">
        <div className="gauge-value">{display}</div>
        <div className={"gauge-status "+st.cls}>{st.label}</div>
      </div>
    </div>
  );
}

    </div>
  );
}

function CsvModal({onClose, showToast}){
  const [stage,setStage]=useState('idle');
  const [progress,setProgress]=useState(0);
  function selectFile(){ setStage('selected'); }
  function upload(){
    setStage('uploading'); setProgress(0);
    let p=0;
    const iv=setInterval(()=>{ p+=20; setProgress(p); if(p>=100){ clearInterval(iv); setStage('done'); } },200);
  }
  const rows=[{row:1,name:'오지훈',status:'ok'},{row:2,name:'배수아',status:'ok'},{row:3,name:'—',status:'missing'},{row:4,name:'문가영',status:'ok'}];
  return (
    <Modal title="CSV 일괄 업로드" onClose={onClose}>
      {stage==='idle' && (
        <div className="dropzone" onClick={selectFile}>
          <i data-lucide="upload"></i>
          <div>CSV 파일을 드래그하거나 클릭해서 선택하세요</div>
          <div style={{fontSize:11,marginTop:6,color:'var(--text-3)'}}>체중·BMI·체지방률 등 12개 필드 형식을 지원합니다</div>
        </div>
      )}
      {stage!=='idle' && (
        <div>
          <div style={{fontSize:12.5,fontWeight:600,marginBottom:10}}>biodata_20260724.csv · 4건 인식, 1건 필드 누락</div>
          {rows.map(r=>(
            <div key={r.row} className={"csv-file-row"+(r.status==='missing'?' invalid':'')}>
              <span>{r.row}행 · {r.name}</span><span>{r.status==='missing'?'필드 누락':'정상'}</span>
            </div>
          ))}
          {stage==='uploading' && <div className="progress-track"><div className="progress-fill" style={{width:progress+'%'}}></div></div>}
          {stage==='done' && <div style={{marginTop:12,color:'var(--good)',fontSize:12.5,fontWeight:700}}>3건 저장 완료, 1건은 확인이 필요합니다.</div>}
        </div>
      )}
      <div className="modal-foot" style={{marginTop:20,padding:0,borderTop:'none'}}>
        <button className="btn btn-ghost" onClick={onClose}>닫기</button>
        {stage==='selected' && <button className="btn btn-primary" onClick={upload}>일괄 저장</button>}
        {stage==='done' && <button className="btn btn-primary" onClick={()=>{onClose(); showToast('CSV 업로드가 완료되었습니다.');}}>확인</button>}
      </div>
    </Modal>
  );
}

function QuestionModal({question, onClose, onSave}){
  const [text,setText]=useState(question.text);
  const [category,setCategory]=useState(question.category);
  const [type,setType]=useState(question.type);
  const [options,setOptions]=useState(question.options);
  function updateOpt(i,v){ setOptions(o=>o.map((x,idx)=>idx===i?v:x)); }
  function addOpt(){ setOptions(o=>[...o,'']); }
  function removeOpt(i){ setOptions(o=>o.filter((_,idx)=>idx!==i)); }
  return (
    <Modal title={question.text?'문항 수정':'새 문항 추가'} onClose={onClose}>
      <div className="field"><label>카테고리</label><input value={category} onChange={e=>setCategory(e.target.value)} placeholder="예: 수면상태" /></div>
      <div className="field"><label>응답 유형</label>
        <select value={type} onChange={e=>setType(e.target.value)}><option>단일선택</option><option>다중선택</option><option>척도</option></select>
      </div>
      <div className="field"><label>문항 내용</label><textarea rows="2" value={text} onChange={e=>setText(e.target.value)}></textarea></div>
      <div className="field"><label>선택지</label>
        {options.map((o,i)=>(
          <div key={i} style={{display:'flex',gap:6,marginBottom:6}}>
            <input value={o} onChange={e=>updateOpt(i,e.target.value)} />
            <button className="icon-btn" onClick={()=>removeOpt(i)}><i data-lucide="trash-2"></i></button>
          </div>
        ))}
        <button className="btn btn-ghost btn-sm" onClick={addOpt}><i data-lucide="plus"></i>선택지 추가</button>
      </div>
      <div className="modal-foot" style={{marginTop:16,padding:0,borderTop:'none'}}>
        <button className="btn btn-ghost" onClick={onClose}>취소</button>
        <button className="btn btn-primary" onClick={()=>onSave({...question,text,category,type,options})}>저장</button>
      </div>
    </Modal>
  );
}

function SurveyScreen({showToast}){
  const [tab,setTab]=useState('respond');
  const [largeText,setLargeText]=useState(false);
  const [answers,setAnswers]=useState({});
  const [questions,setQuestions]=useState(SURVEY_QUESTIONS_SEED);
  const [editing,setEditing]=useState(null);
  const [adding,setAdding]=useState(false);

  function toggleOption(qid,opt,multi){
    setAnswers(a=>{
      const cur=a[qid];
      if(multi){
        const arr=cur?[...cur]:[];
        const idx=arr.indexOf(opt);
        if(idx>=0) arr.splice(idx,1); else arr.push(opt);
        return {...a,[qid]:arr};
      }
      return {...a,[qid]:opt};
    });
  }
  const answeredCount = questions.filter(q=>{
    const v=answers[q.id];
    return q.type==='다중선택' ? (v&&v.length>0) : !!v;
  }).length;

  return (
    <div className={"content"+(largeText?' large-text':'')}>
      <div className="survey-toolbar">
        <div>
          <h1 className="page-title">웰니스 설문 관리</h1>
          <p className="page-sub" style={{marginBottom:0}}>스트레스·피로·수면·운동·생활습관·프로그램 선호도 문항을 관리합니다.</p>
        </div>
        <div style={{display:'flex',alignItems:'center',gap:8}}>
          <span style={{fontSize:12.5,color:'var(--text-3)'}}>큰 글씨 모드</span>
          <div className={"switch"+(largeText?' on':'')} onClick={()=>setLargeText(!largeText)}><div className="switch-knob"></div></div>
        </div>
      </div>
      <div className="tab-bar" style={{padding:'14px 0'}}>
        {SURVEY_TABS.map(t=>(<button key={t.key} className={"tab"+(tab===t.key?" active":"")} onClick={()=>setTab(t.key)}>{t.label}</button>))}
      </div>

      {tab==='respond' && (
        <div>
          {questions.map(q=>(
            <div key={q.id} className="card survey-card" style={CARD_DNA}>
              <div className="survey-cat">{q.category}</div>
              <div className="card-title" style={{marginBottom:0}}>{q.text}</div>
              <div className="option-row">
                {q.options.map(opt=>{
                  const v=answers[q.id];
                  const sel = q.type==='다중선택' ? (v&&v.includes(opt)) : v===opt;
                  return <button key={opt} className={"option-pill"+(sel?' selected':'')} onClick={()=>toggleOption(q.id,opt,q.type==='다중선택')}>{opt}</button>;
                })}
              </div>
            </div>
          ))}
          <button className="btn btn-primary" disabled={answeredCount<questions.length} style={{marginTop:8}} onClick={()=>showToast('설문이 제출되었습니다.')}>
            <i data-lucide="check"></i>제출 ({answeredCount}/{questions.length})
          </button>
        </div>
      )}

      {tab==='manage' && (
        <div>
          <div style={{display:'flex',justifyContent:'flex-end',marginBottom:12}}>
            <button className="btn btn-primary" onClick={()=>setAdding(true)}><i data-lucide="plus"></i>새 문항 추가</button>
          </div>
          {questions.map(q=>(
            <div key={q.id} className="card" style={CARD_DNA} style={{marginBottom:12,display:'flex',justifyContent:'space-between',alignItems:'center'}}>
              <div>
                <div className="survey-cat">{q.category} · {q.type}</div>
                <div style={{fontSize:13,fontWeight:600}}>{q.text}</div>
                <div style={{fontSize:11.5,color:'var(--text-3)',marginTop:4}}>선택지 {q.options.length}개</div>
              </div>
              <button className="icon-btn" onClick={()=>setEditing(q)}><i data-lucide="edit-3"></i></button>
            </div>
          ))}
        </div>
      )}

      {editing && <QuestionModal question={editing} onClose={()=>setEditing(null)} onSave={(upd)=>{setQuestions(qs=>qs.map(q=>q.id===editing.id?upd:q)); setEditing(null); showToast('문항이 수정되었습니다.');}} />}
      {adding && <QuestionModal question={{id:'q'+(questions.length+1),category:'',type:'단일선택',text:'',options:['']}} onClose={()=>setAdding(false)} onSave={(nq)=>{setQuestions(qs=>[...qs,nq]); setAdding(false); showToast('새 문항이 추가되었습니다.');}} />}
    </div>
  );
}

function PdfDrawer({participant, onClose, onGenerate}){
  const [generating,setGenerating]=useState(false);
  const [done,setDone]=useState(false);
  return (
    <div className="drawer-overlay" onClick={onClose}>
      <div className="drawer" onClick={e=>e.stopPropagation()}>
        <div className="drawer-head">
          <div><div style={{fontWeight:700,fontSize:16}}>{participant.name}</div><div style={{fontSize:12,color:'var(--text-3)'}}>{participant.id} · 최근 측정 {participant.lastMeasure}</div></div>
          <button className="icon-btn" onClick={onClose}><i data-lucide="x"></i></button>
        </div>
        <div className="drawer-body">
          <div className="card-title" style={{fontSize:14,marginBottom:10}}>영역별 점수</div>
          <div className="kpi-list" style={{marginBottom:20}}>
            {AREAS.map(a=>{
              const s=participant.scores[a.key]; const st=statusOf(s);
              return (
                <div key={a.key} className="stat-card">
                  <div className="stat-top"><span className="stat-label">{a.label}</span><span className={"stat-badge "+st.cls}>{st.label}</span></div>
                  <div className="stat-value">{s}점</div>
                </div>
              );
            })}
          </div>
          <button className="btn btn-dark" style={{width:'100%',justifyContent:'center'}} disabled={generating} onClick={()=>{
            setGenerating(true);
            setTimeout(()=>{ setGenerating(false); setDone(true); onGenerate(participant); },1500);
          }}>
            {generating ? <React.Fragment><i data-lucide="loader-2" className="spin"></i>생성 중...</React.Fragment> : <React.Fragment><i data-lucide="file-text"></i>PDF 리포트 생성</React.Fragment>}
          </button>
          {done && <div style={{marginTop:10,fontSize:12.5,color:'var(--good)',fontWeight:700}}>wellbalance_{participant.id}.pdf 생성 완료</div>}
        </div>
      </div>
    </div>
  );
}

function AdminScreen({participants, onGeneratePdf, showToast}){
  const [tab,setTab]=useState('data');
  const [query,setQuery]=useState('');
  const [downloadOpen,setDownloadOpen]=useState(false);
  const [downloading,setDownloading]=useState(false);
  const [drawerP,setDrawerP]=useState(null);
  const [accountModal,setAccountModal]=useState(false);
  const [accounts,setAccounts]=useState(ADMIN_ACCOUNTS_SEED);

    setDownloading(true);

    <div className="content">
      <div className="admin-topbar">

      {tab==='data' && (
        <div>
          <div className="toolbar">
            <input className="search-input-inline" placeholder="이름 또는 참가자 코드 검색" value={query} onChange={e=>setQuery(e.target.value)} />

              <button className="btn btn-primary" onClick={()=>setDownloadOpen(!downloadOpen)}><i data-lucide="download"></i>전체 데이터 다운로드</button>

              )}
            </div>
          </div>
          <div className="table-wrap">
            <table>
              <thead><tr><th>이름</th><th>코드</th><th>종합 점수</th><th>최근 측정일</th><th>동의</th></tr></thead>

    </div>
  );
}

function App(){
  const [participants,setParticipants]=useState(PARTICIPANTS_SEED);
  const [screen,setScreen]=useState('main');
  const [selectedId,setSelectedId]=useState(PARTICIPANTS_SEED[0].id);
  const [highlightArea,setHighlightArea]=useState(null);
  const [dashTab,setDashTab]=useState('all');
  const [csvOpen,setCsvOpen]=useState(false);
  const [toast,setToast]=useState(null);

  useEffect(()=>{ if(window.lucide) window.lucide.createIcons(); });

  function showToast(msg){ setToast(msg); setTimeout(()=>setToast(null),2600); }
  function addParticipant(p){ setParticipants(ps=>[p,...ps]); }
  function generatePdf(p){ showToast(p.name+' 님의 PDF 리포트가 생성되었습니다.'); }

  return (
    <div className="app" data-archetype="topbar-analytics">
      <Header screen={screen} setScreen={setScreen} openCsv={()=>setCsvOpen(true)} />
      {screen==='main' && <MainDashboard participants={participants} selectedId={selectedId} setSelectedId={setSelectedId} onGeneratePdf={generatePdf} highlightArea={highlightArea} setHighlightArea={setHighlightArea} dashTab={dashTab} setDashTab={setDashTab} />}
      {screen==='participant-input' && <ParticipantInputScreen participants={participants} addParticipant={addParticipant} openCsv={()=>setCsvOpen(true)} showToast={showToast} />}
      {screen==='survey' && <SurveyScreen showToast={showToast} />}
      {screen==='admin' && <AdminScreen participants={participants} onGeneratePdf={generatePdf} showToast={showToast} />}
      {csvOpen && <CsvModal onClose={()=>setCsvOpen(false)} showToast={showToast} />}
      {toast && <div className="toast"><i data-lucide="check-circle"></i>{toast}</div>}
    </div>
  );
}
