<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>웰니스센터 통합 운영 허브 — 다지점 관제 대시보드</title>
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
<link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/regular/style.css">
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
:root{
  --bg:#ffffff; --surface:#e5e5e7; --card:#ffffff; --text:#090a0c; --text-2:#95979e;
  --border:#d1d1d1; --primary:#da56ce; --primary-dark:#c23fb7; --accent:#97ff64;
  --good:#2f9e57; --good-bg:#e6f6ec; --warn:#c98a2c; --warn-bg:#fbf1de; --danger:#d1435f; --danger-bg:#fbe6ec;
  --radius:14px; --radius-pill:9999px;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{width:100%;min-height:100vh;}
body{font-family:'Pretendard',-apple-system,BlinkMacSystemFont,sans-serif;background:#f6f6f6;color:var(--text);-webkit-font-smoothing:antialiased;font-size:14px;}
#root{width:100%;}
button{font-family:inherit;cursor:pointer;background:none;border:none;color:inherit;font-size:inherit;}
input,select,textarea{font-family:inherit;}
table{border-collapse:collapse;width:100%;}
::-webkit-scrollbar{width:8px;height:8px;}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:8px;}

@keyframes tileFadeIn{from{opacity:0}to{opacity:1}}
@keyframes glowPulse{0%{box-shadow:0 0 0 0 rgba(209,67,95,.4)}70%{box-shadow:0 0 0 7px rgba(209,67,95,0)}100%{box-shadow:0 0 0 0 rgba(209,67,95,0)}}
@keyframes toastIn{from{opacity:0;transform:translate(-50%,14px)}to{opacity:1;transform:translate(-50%,0)}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes auroraPulse{0%,100%{opacity:.55;transform:scale(1)}50%{opacity:1;transform:scale(1.08)}}

.app{width:100%;min-height:100vh;background:#f6f6f6;color:var(--text);}

.topbar{position:sticky;top:0;z-index:40;display:flex;align-items:center;gap:16px;height:60px;padding:0 28px;background:var(--bg);border-bottom:1px solid var(--border);}
.tb-brand{display:flex;align-items:center;gap:8px;font-weight:700;font-size:15.5px;color:var(--text);flex-shrink:0;}
.tb-mark{width:28px;height:28px;border-radius:8px;background:linear-gradient(135deg,var(--primary),#7c6fe0);color:#fff;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;}
.tb-title{font-size:12.5px;color:var(--text-2);font-weight:600;flex:1;}
.tb-actions{display:flex;gap:8px;flex-shrink:0;}
.icon-btn{width:34px;height:34px;border-radius:var(--radius-pill);display:flex;align-items:center;justify-content:center;color:var(--text-2);font-size:16px;flex-shrink:0;}
.icon-btn:hover{background:var(--surface);}
.avatar{width:30px;height:30px;border-radius:50%;background:var(--accent);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:12px;color:var(--text);flex-shrink:0;}
.dropdown{position:absolute;top:calc(100% + 8px);right:0;background:var(--card);border:1px solid var(--border);border-radius:12px;box-shadow:0 12px 30px rgba(9,10,12,.14);min-width:220px;z-index:60;overflow:hidden;}
.dropdown-item{width:100%;text-align:left;padding:11px 14px;font-size:12.5px;color:var(--text);display:flex;gap:9px;align-items:center;}
.dropdown-item:hover{background:var(--surface);}
.dropdown-item i{font-size:15px;color:var(--text-2);}

.ops-nav{display:flex;gap:6px;padding:12px 28px;max-width:1280px;margin:0 auto;overflow-x:auto;}
.ops-tab{padding:9px 16px;border-radius:var(--radius-pill);font-size:12.5px;font-weight:600;color:var(--text-2);border:1px solid var(--border);white-space:nowrap;background:var(--card);}
.ops-tab:hover{color:var(--text);}
.ops-tab.active{background:var(--primary);color:#fff;border-color:var(--primary);}

.content{max-width:1280px;margin:0 auto;padding:8px 28px 80px;}
.page-title{font-size:40px;font-weight:700;letter-spacing:-.02em;margin-bottom:6px;}
.page-sub{font-size:12.5px;color:var(--text-2);margin-bottom:20px;}

.card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:20px;animation:tileFadeIn .35s ease both;}
.card-title{font-size:14.5px;font-weight:700;margin-bottom:4px;}
.card-sub{font-size:12px;color:var(--text-2);margin-bottom:14px;}

.bento{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;}
.tile{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px;position:relative;animation:tileFadeIn .4s ease both;transition:transform .18s,border-color .18s;}
.tile:hover{transform:scale(1.015);border-color:var(--primary);}
.status-tile{grid-column:span 4;display:flex;flex-wrap:wrap;gap:12px;align-items:center;padding:16px 20px;background:var(--card);}
.feature{grid-column:span 2;grid-row:span 2;background:var(--card);overflow:hidden;position:relative;}
.feature::before{content:'';position:absolute;top:-50px;right:-50px;width:220px;height:220px;background:radial-gradient(circle, rgba(151,255,100,.35), rgba(218,86,206,.2) 55%, transparent 75%);border-radius:50%;animation:auroraPulse 5s ease-in-out infinite;pointer-events:none;}
.priority{grid-column:span 2;background:var(--card);}
.widget{grid-column:span 1;text-align:center;cursor:pointer;background:var(--card);}
.tile-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;gap:8px;}
.tile-head h2{font-size:15px;font-weight:700;}
.tile-num{font-size:28px;font-weight:700;color:var(--primary);}
.tile-num small{font-size:13px;font-weight:600;color:var(--text-2);margin-left:2px;}
.tile-foot{font-size:11px;color:var(--text-2);margin-top:8px;}
.tile-chart-wrap{position:relative;z-index:1;}

.ops-hero{position:relative;overflow:hidden;background:#111114;border-radius:20px;padding:36px 32px;margin-bottom:20px;color:#fff;}
.ops-hero::before{content:'';position:absolute;top:-30%;left:36%;width:150px;height:170%;background:linear-gradient(180deg, rgba(218,86,206,.6), rgba(151,255,100,.4) 55%, transparent 85%);filter:blur(34px);transform:rotate(8deg);pointer-events:none;}
.ops-hero-inner{position:relative;z-index:1;}
.ops-hero-title{font-size:40px;font-weight:700;letter-spacing:-.02em;}
.ops-hero-sub{font-size:13px;color:#c7c8cc;margin-top:8px;max-width:480px;line-height:1.5;}
.ops-hero-badge{display:inline-flex;align-items:center;gap:7px;margin-top:18px;padding:7px 15px;border-radius:9999px;background:rgba(255,255,255,.09);font-size:11.5px;font-weight:600;color:#fff;}
.ops-hero-badge .status-dot{width:7px;height:7px;}

.status-chip{display:flex;align-items:center;gap:8px;font-size:12px;font-weight:600;color:var(--text-2);padding:7px 13px;border-radius:var(--radius-pill);background:var(--surface);}
.status-dot{width:8px;height:8px;border-radius:50%;background:var(--good);flex-shrink:0;}
.status-dot.warn{background:var(--danger);animation:glowPulse 1.8s infinite;}
.status-chip-name{font-weight:700;color:var(--text);}
.status-chip.sync{margin-left:auto;color:var(--text-2);font-weight:500;}
.status-chip.sync i{font-size:13px;}

.priority-list{display:flex;flex-direction:column;}
.priority-item{padding:10px 0;border-bottom:1px solid var(--border);}
.priority-item:last-child{border-bottom:none;}
.priority-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;}
.priority-badge{font-size:10px;font-weight:700;padding:2px 9px;border-radius:var(--radius-pill);}
.lv-high .priority-badge{color:var(--danger);background:var(--danger-bg);}
.lv-medium .priority-badge{color:var(--warn);background:var(--warn-bg);}
.lv-low .priority-badge{color:var(--good);background:var(--good-bg);}
.priority-title{font-size:12.5px;font-weight:700;margin-bottom:2px;}
.priority-desc{font-size:11px;color:var(--text-2);line-height:1.5;}
.priority-time{font-size:10.5px;color:var(--text-2);}

.widget-icon{width:42px;height:42px;border-radius:50%;background:#f7e9f6;color:var(--primary);display:flex;align-items:center;justify-content:center;margin:0 auto 10px;font-size:19px;}
.widget-num{font-size:24px;font-weight:700;}
.widget-label{font-size:11px;color:var(--text-2);margin-top:4px;}

.btn{display:inline-flex;align-items:center;gap:7px;padding:10px 18px;border-radius:var(--radius-pill);font-size:12.5px;font-weight:700;}
.btn i{font-size:15px;}
.btn-primary{background:var(--primary);color:#fff;}
.btn-primary:hover{background:var(--primary-dark);}
.btn-ghost{background:var(--card);border:1px solid var(--border);color:var(--text);}
.btn-ghost:hover{background:var(--surface);}
.btn:disabled{opacity:.45;cursor:not-allowed;}
.spin{animation:spin .9s linear infinite;display:inline-flex;}

.tab-bar.seg{display:flex;gap:6px;flex-wrap:wrap;}
.tab{padding:8px 16px;border-radius:var(--radius-pill);font-size:12px;font-weight:600;color:var(--text-2);border:1px solid var(--border);background:var(--card);}
.tab.active{background:var(--text);color:#fff;border-color:var(--text);}

.chip-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px;}
.branch-chip{display:flex;align-items:center;gap:6px;padding:8px 14px;border-radius:var(--radius-pill);border:1px solid var(--border);font-size:12px;font-weight:600;color:var(--text-2);background:var(--card);opacity:.5;}
.branch-chip.on{opacity:1;color:var(--text);}
.chip-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}

.multi-spark-row{margin-bottom:14px;}
.multi-spark-label{font-size:11.5px;font-weight:700;color:var(--text-2);display:block;margin-bottom:4px;}
.tile-grid-2{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-top:16px;}
.big-num{font-size:32px;font-weight:700;color:var(--primary);}
.big-num small{font-size:14px;color:var(--text-2);margin-left:2px;font-weight:600;}

.field{margin-bottom:14px;}
.field label{display:block;font-size:11.5px;font-weight:600;color:var(--text-2);margin-bottom:6px;}
.field input, .field select{width:100%;padding:10px 12px;border:1px solid var(--border);border-radius:8px;font-size:12.5px;font-family:inherit;color:var(--text);background:var(--card);}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;}

.table-wrap{border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;background:var(--card);}
th{text-align:left;padding:12px 16px;background:var(--surface);color:var(--text-2);font-weight:700;font-size:10.5px;text-transform:uppercase;letter-spacing:.03em;border-bottom:1px solid var(--border);}
td{padding:12px 16px;border-bottom:1px solid var(--border);color:var(--text);font-size:12.5px;}
tr:last-child td{border-bottom:none;}
tbody tr:hover{background:var(--surface);}
.role-badge{font-size:10.5px;font-weight:700;padding:3px 10px;border-radius:var(--radius-pill);background:rgba(218,86,206,.12);color:var(--primary);}

.history-list{display:flex;flex-direction:column;gap:2px;}
.history-row{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid var(--border);font-size:12px;color:var(--text-2);}
.history-row:last-child{border-bottom:none;}

.modal-overlay{position:fixed;inset:0;background:rgba(9,10,12,.5);display:flex;align-items:center;justify-content:center;z-index:100;padding:20px;}
.modal{background:var(--card);border-radius:18px;max-width:480px;width:100%;max-height:86vh;overflow-y:auto;animation:tileFadeIn .25s ease both;}
.modal-head{display:flex;justify-content:space-between;align-items:center;padding:20px 22px;border-bottom:1px solid var(--border);}
.modal-head h3{font-size:15px;font-weight:700;}
.modal-head i{font-size:17px;}
.modal-body{padding:20px 22px;}
.modal-foot{display:flex;justify-content:flex-end;gap:8px;padding:16px 22px;border-top:1px solid var(--border);}

.toast{position:fixed;left:50%;bottom:28px;transform:translateX(-50%);background:var(--text);color:#fff;padding:13px 22px;border-radius:var(--radius-pill);font-size:12.5px;font-weight:600;z-index:200;display:flex;align-items:center;gap:8px;animation:toastIn .3s ease both;box-shadow:0 10px 30px rgba(0,0,0,.3);}
.toast i{font-size:15px;}
</style>
</head>
<body>

const CARD_DNA = {borderRadius:12};

function MiniAreaSpark({data, color, height}){
  const w=240, h=height||80;
  const max=Math.max(...data), min=Math.min(...data);
  const stepX = w/(data.length-1);
  const points = data.map((d,i)=>{
    const x=i*stepX;
    const y=h-((d-min)/((max-min)||1))*h*0.85-h*0.05;
    return [x,y];
  });
  const linePath = points.map((p,i)=>(i===0?'M':'L')+p[0].toFixed(1)+','+p[1].toFixed(1)).join(' ');
  const areaPath = linePath+' L'+w+','+h+' L0,'+h+' Z';
  const gid = 'grad-'+color.replace('#','');
  return (
    <svg width="100%" height={h} viewBox={"0 0 "+w+" "+h} preserveAspectRatio="none">
      <defs>
        <linearGradient id={gid} x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stopColor={color} stopOpacity="0.45" />
          <stop offset="100%" stopColor={color} stopOpacity="0" />
        </linearGradient>
      </defs>
      <path d={areaPath} fill={"url(#"+gid+")"} />
      <path d={linePath} fill="none" stroke={color} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" />
    </svg>
  );
}

function Modal({title, onClose, children}){
  return (
    <div className="modal-overlay" onClick={onClose}>

        <div className="modal-body">{children}</div>
      </div>
    </div>
  );
}

          )}
        </div>

          {profileOpen && (

              <div className="dropdown-item"><i className="ph ph-sign-out"></i>로그아웃</div>
            </div>
          )}
        </div>
      </div>
    </header>
  );
}

function OpsHub({setScreen}){
  return (
    <div className="content">
      <div className="ops-hero">
        <div className="ops-hero-inner">
          <div className="ops-hero-title">웰니스센터 통합 운영 허브</div>

              <div key={i} className={"priority-item lv-"+q.level}>
                <div className="priority-top">
                  <span className="priority-badge">{q.level==='high'?'긴급':q.level==='medium'?'주의':'정상'}</span>
                  <span className="priority-time">{q.time}</span>
                </div>
                <div className="priority-title">{q.title}</div>
                <div className="priority-desc">{q.desc}</div>
              </div>
            ))}
          </div>
        </section>

        <section className="tile widget" onClick={()=>setScreen('export')}>
          <div className="widget-icon"><i className="ph ph-file-text"></i></div>
          <div className="widget-num">2건</div>
          <div className="widget-label">이번 달 엑셀 내보내기</div>
        </section>
        <section className="tile widget" onClick={()=>setScreen('export')}>
          <div className="widget-icon"><i className="ph ph-shield-check"></i></div>
          <div className="widget-num">{ACCOUNTS_SEED.length}명</div>
          <div className="widget-label">다권한 관리자 계정</div>
        </section>
        <section className="tile widget" onClick={()=>setScreen('audit')}>
          <div className="widget-icon"><i className="ph ph-clock-counter-clockwise"></i></div>
          <div className="widget-num">{AUDIT_LOGS.length}건</div>
          <div className="widget-label">최근 24시간 접속 로그</div>
        </section>
      </div>
    </div>
  );
}

function TrendsScreen(){
  const [period,setPeriod]=useState('week');
  const [selectedBranches,setSelectedBranches]=useState(['gangnam','bundang','pangyo']);
  const branchColors={gangnam:'#da56ce', bundang:'#7c6fe0', pangyo:'#95979e'};
  function toggleBranch(id){
    setSelectedBranches(s=> s.includes(id) ? s.filter(x=>x!==id) : [...s,id]);
  }
  return (
    <div className="content">
      <h1 className="page-title">측정 데이터 트렌드/통계 분석</h1>
      <p className="page-sub">기간별 평균 웰니스 스코어 추이와 지점 간 분포를 비교합니다.</p>
      <div className="tab-bar seg" style={{marginBottom:16}}>
        {PERIOD_TABS.map(t=>(<button key={t.key} className={"tab"+(period===t.key?' active':'')} onClick={()=>setPeriod(t.key)}>{t.label}</button>))}
      </div>
      <div className="chip-row">
        {BRANCHES.map(b=>(
          <button key={b.id} className={"branch-chip"+(selectedBranches.includes(b.id)?' on':'')} onClick={()=>toggleBranch(b.id)}>
            <span className="chip-dot" style={{background:branchColors[b.id]}}></span>{b.name}
          </button>
        ))}
      </div>
      <div className="card" style={CARD_DNA}>
        <div className="card-title">지점별 평균 스코어 추이</div>
        <div className="card-sub">{period==='week'?'최근 8주':period==='month'?'최근 6개월':'최근 4분기'} 기준</div>
        <div>
          {selectedBranches.map(id=>(
            <div key={id} className="multi-spark-row">
              <span className="multi-spark-label">{BRANCHES.find(b=>b.id===id).name}</span>
              <MiniAreaSpark data={TREND_BY_BRANCH[id]} color={branchColors[id]} height={60} />
            </div>
          ))}
        </div>
      </div>
      <div className="tile-grid-2">
        {BRANCHES.map(b=>(
          <div key={b.id} className="card" style={CARD_DNA}>
            <div className="card-title">{b.name}</div>
            <div className="card-sub">참가자 {b.participants}명</div>
            <div className="big-num">{b.avgScore}<small>점</small></div>
          </div>
        ))}
      </div>
    </div>
  );
}

function AuditScreen({showToast}){
  const [freq,setFreq]=useState('daily');
  const [running,setRunning]=useState(false);
  const [logQuery,setLogQuery]=useState('');
  function runNow(){
    setRunning(true);
    setTimeout(()=>{ setRunning(false); showToast('백업이 완료되었습니다.'); },1500);
  }
  return (
    <div className="content">
      <h1 className="page-title">데이터 백업 스케줄링 및 접속 로그 감사</h1>
      <p className="page-sub">자동 백업 일정을 관리하고 관리자 접속 이력을 감사합니다.</p>
      <div className="tile-grid-2" style={{gridTemplateColumns:'1fr 1fr',marginTop:0}}>
        <div className="card" style={CARD_DNA}>
          <div className="card-title">백업 스케줄</div>
          <div className="field"><label>백업 주기</label>
            <select value={freq} onChange={e=>setFreq(e.target.value)}>
              <option value="daily">매일 03:00</option>
              <option value="weekly">매주 일요일 03:00</option>
            </select>
          </div>
          <div className="card-sub">다음 백업: {freq==='daily'?'내일 03:00':'이번 주 일요일 03:00'}</div>
          <div className="history-list" style={{marginTop:12}}>
            {BACKUP_HISTORY.map((h,i)=>(<div key={i} className="history-row"><span>{h.date}</span><span>{h.type}</span><span>{h.requester}</span></div>))}
          </div>
          <button className="btn btn-primary" style={{marginTop:14}} disabled={running} onClick={runNow}>
            {running ? <React.Fragment><i className="ph ph-arrow-clockwise spin"></i>백업 실행 중...</React.Fragment> : <React.Fragment><i className="ph ph-database"></i>지금 백업 실행</React.Fragment>}
          </button>
        </div>
        <div className="card" style={CARD_DNA}>
          <div className="card-title">접속 로그 감사</div>
          <input placeholder="관리자 이름 검색" value={logQuery} onChange={e=>setLogQuery(e.target.value)} style={{width:'100%',padding:'9px 12px',border:'1px solid var(--border)',borderRadius:8,fontSize:12.5,marginBottom:12}} />
          <div className="history-list">
            {AUDIT_LOGS.filter(l=>!logQuery||l.account.includes(logQuery)).map((l,i)=>(
              <div key={i} className="history-row" style={{flexDirection:'column',alignItems:'flex-start',gap:2}}>
                <span style={{fontWeight:700,fontSize:12,color:'var(--text)'}}>{l.account} · {l.action}</span>
                <span style={{fontSize:11}}>{l.time} · {l.ip}</span>
              </div>
            ))}
          </div>
        </div>
      </div>
    </div>
  );
}

function AccountModal2({onClose, onSave}){
  const [name,setName]=useState('');
  const [email,setEmail]=useState('');
  const [role,setRole]=useState('지점관리자');
  const [scope,setScope]=useState('강남점');
  const valid=name.trim()&&email.trim();
  return (
    <Modal title="관리자 계정 추가" onClose={onClose}>
      <div className="field"><label>이름</label><input value={name} onChange={e=>setName(e.target.value)} /></div>
      <div className="field"><label>이메일</label><input value={email} onChange={e=>setEmail(e.target.value)} placeholder="admin@wellbalance.center" /></div>
      <div className="field-row">
        <div className="field"><label>권한</label>
          <select value={role} onChange={e=>setRole(e.target.value)}><option>최고관리자</option><option>지점관리자</option><option>뷰어</option></select>
        </div>
        <div className="field"><label>접근 지점</label>
          <select value={scope} onChange={e=>setScope(e.target.value)} disabled={role==='최고관리자'}>
            <option>강남점</option><option>분당점</option><option>판교점</option>
          </select>
        </div>
      </div>
      <div className="modal-foot" style={{marginTop:16,padding:0,borderTop:'none'}}>
        <button className="btn btn-ghost" onClick={onClose}>취소</button>
        <button className="btn btn-primary" disabled={!valid} onClick={()=>onSave({name,email,role,scope:role==='최고관리자'?'전체 지점':scope})}>추가</button>
      </div>
    </Modal>
  );
}

function ExportScreen({showToast, accounts, setAccounts}){
  const [tab,setTab]=useState('export');
  const [format,setFormat]=useState('엑셀');
  const [range,setRange]=useState('week');
  const [downloading,setDownloading]=useState(false);
  const [addOpen,setAddOpen]=useState(false);
  function download(){
    setDownloading(true);
    setTimeout(()=>{ setDownloading(false); showToast(format+' 파일 다운로드가 시작되었습니다.'); },1300);
  }
  return (
    <div className="content">
      <h1 className="page-title">엑셀/BI 내보내기 및 다권한 관리자 계정</h1>
      <p className="page-sub">통계 리포트를 내보내고 지점별 관리자 권한을 관리합니다.</p>
      <div className="tab-bar seg" style={{marginBottom:16}}>
        {EXPORT_TABS.map(t=>(<button key={t.key} className={"tab"+(tab===t.key?' active':'')} onClick={()=>setTab(t.key)}>{t.label}</button>))}
      </div>

      {tab==='export' && (
        <div className="card" style={CARD_DNA}>
          <div className="card-title">회원 건강 데이터 통계 리포트 내보내기</div>
          <div className="card-sub">체성분·HRV·혈압·설문 응답과 BMI·체지방률·칼로리 소비 추정치를 지점별로 집계해 내보냅니다.</div>
          <div className="field-row">
            <div className="field"><label>형식</label><select value={format} onChange={e=>setFormat(e.target.value)}><option>엑셀</option><option>CSV</option></select></div>
            <div className="field"><label>기간</label>
              <select value={range} onChange={e=>setRange(e.target.value)}>
                <option value="week">최근 1주</option><option value="month">최근 1개월</option><option value="quarter">최근 분기</option>
              </select>
            </div>
          </div>
          <div className="field"><label>포함 데이터</label>
            <div className="chip-row" style={{marginBottom:0}}>
              <span className="branch-chip on"><span className="chip-dot" style={{background:'#da56ce'}}></span>체성분·BMI</span>
              <span className="branch-chip on"><span className="chip-dot" style={{background:'#7c6fe0'}}></span>HRV·심혈관</span>
              <span className="branch-chip on"><span className="chip-dot" style={{background:'#97ff64'}}></span>생활습관 설문</span>
            </div>
          </div>
          <button className="btn btn-primary" disabled={downloading} onClick={download}>
            {downloading ? <React.Fragment><i className="ph ph-arrow-clockwise spin"></i>생성 중...</React.Fragment> : <React.Fragment><i className="ph ph-download-simple"></i>다운로드</React.Fragment>}
          </button>
          <div className="card-title" style={{fontSize:13,marginTop:22}}>최근 내보내기 이력</div>
          <div className="history-list">
            {EXPORT_HISTORY.map((h,i)=>(<div key={i} className="history-row"><span>{h.date}</span><span>{h.type}</span><span>{h.requester}</span></div>))}
          </div>
        </div>
      )}

      {tab==='accounts' && (
        <div>
          <div style={{display:'flex',justifyContent:'flex-end',marginBottom:12}}>
            <button className="btn btn-primary" onClick={()=>setAddOpen(true)}><i className="ph ph-user-plus"></i>관리자 계정 추가</button>
          </div>
          <div className="table-wrap">
            <table>
              <thead><tr><th>이름</th><th>이메일</th><th>권한</th><th>접근 범위</th></tr></thead>
              <tbody>
                {accounts.map((a,i)=>(
                  <tr key={i}><td style={{fontWeight:700,color:'var(--text)'}}>{a.name}</td><td>{a.email}</td><td><span className="role-badge">{a.role}</span></td><td>{a.scope}</td></tr>
                ))}
              </tbody>
            </table>
          </div>
        </div>
      )}
      {addOpen && <AccountModal2 onClose={()=>setAddOpen(false)} onSave={(a)=>{setAccounts(acc=>[...acc,a]); setAddOpen(false); showToast('관리자 계정이 추가되었습니다.');}} />}
    </div>
  );
}

function App(){
  const [screen,setScreen]=useState('main');
  const [accounts,setAccounts]=useState(ACCOUNTS_SEED);
  const [toast,setToast]=useState(null);
  function showToast(msg){ setToast(msg); setTimeout(()=>setToast(null),2600); }
  return (
    <div className="app" data-archetype="bento-grid">
      <TopBar />
      <nav className="ops-nav">
        {NAV_ITEMS2.map(n=>(<button key={n.key} className={"ops-tab"+(screen===n.key?' active':'')} onClick={()=>setScreen(n.key)}>{n.label}</button>))}
      </nav>
      {screen==='main' && <OpsHub setScreen={setScreen} />}
      {screen==='trends' && <TrendsScreen />}
      {screen==='audit' && <AuditScreen showToast={showToast} />}
      {screen==='export' && <ExportScreen showToast={showToast} accounts={accounts} setAccounts={setAccounts} />}
      {toast && <div className="toast"><i className="ph ph-check-circle"></i>{toast}</div>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
