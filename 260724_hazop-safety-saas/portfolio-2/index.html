<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>공정안전 위험성평가 통합 관제 플랫폼 — 구현 데모</title>

<style>
:root{
  --wine:#421d24;
  --lilac:#d4c7ff;
  --gold:#f6bc1e;
  --lagoon:#0c4243;
  --parchment:#f2f0eb;
  --mist:#e3e3e2;
  --ink:#292827;
  --stone:#666666;
  --paper:#ffffff;
  --hairline:#e3e3e2;
  --low-fg:#2f6b48; --low-bg:#e2efe6;
  --mid-fg:#93641c; --mid-bg:#f7e9cc;
  --high-fg:#7a2436; --high-bg:#f6dbe0;
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;width:100%;}
body{
  font-family:'Pretendard',ui-sans-serif,system-ui,-apple-system,sans-serif;
  background:var(--parchment);
  color:var(--ink);
  -webkit-font-smoothing:antialiased;
}
#root{width:100%;min-height:100vh;}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit;}
input,select,textarea{font-family:inherit;}
::-webkit-scrollbar{height:8px;width:8px;}
::-webkit-scrollbar-thumb{background:#d8d6cf;border-radius:8px;}

@keyframes fadeIn{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
@keyframes pulseLive{0%,100%{opacity:1;}50%{opacity:.35;}}
@keyframes shimmer2{0%{background-position:-360px 0;}100%{background-position:360px 0;}}
@keyframes slideUp2{from{opacity:0;transform:translateY(16px);}to{opacity:1;transform:translateY(0);}}
@keyframes dashRotate{from{stroke-dashoffset:0;}to{stroke-dashoffset:-56;}}
@keyframes floatIn{from{opacity:0;transform:scale(.97);}to{opacity:1;transform:scale(1);}}

.screen{animation:fadeIn .3s ease both;}

.app-header{
  position:sticky;top:0;z-index:40;display:flex;align-items:center;gap:22px;
  padding:0 26px;height:60px;background:rgba(242,240,235,.9);backdrop-filter:blur(10px);
  border-bottom:1px solid var(--hairline);
}
.brand{display:flex;align-items:center;gap:9px;font-weight:700;font-size:16px;letter-spacing:-.3px;}
.brand .mark{width:26px;height:26px;border-radius:10px;background:var(--wine);color:#fff;display:flex;align-items:center;justify-content:center;font-size:13px;}
.proj-switch{display:flex;align-items:center;gap:6px;padding:7px 12px;border-radius:10px;background:var(--paper);border:1px solid var(--hairline);font-size:12.5px;font-weight:600;}
.global-nav{display:flex;gap:2px;margin-left:8px;}
.gnav-link{padding:8px 12px;border-radius:8px;font-size:13px;color:var(--stone);}
.gnav-link:hover{background:var(--paper);color:var(--ink);}
.gnav-link.active{color:var(--wine);font-weight:700;}
.header-actions{display:flex;align-items:center;gap:8px;margin-left:auto;flex-shrink:0;}
@media (max-width:480px){ .global-nav{display:none;} .app-header{padding:0 14px;gap:10px;} .proj-switch span{display:none;} }
.icon-btn{width:34px;height:34px;border-radius:10px;display:flex;align-items:center;justify-content:center;color:var(--stone);}
.icon-btn:hover{background:var(--paper);color:var(--ink);}
.avatar{width:30px;height:30px;border-radius:999px;overflow:hidden;border:1px solid var(--hairline);}
.avatar img{width:100%;height:100%;object-fit:cover;}

.tab-bar{display:flex;gap:4px;padding:10px 26px;background:var(--paper);border-bottom:1px solid var(--hairline);overflow-x:auto;}
.tab{padding:9px 16px;border-radius:8px;font-size:13.5px;font-weight:600;color:var(--stone);white-space:nowrap;border-bottom:2px solid transparent;}
.tab.active{color:var(--wine);border-bottom:2px solid var(--wine);}
.tab:hover{background:var(--parchment);}

.content{max-width:1280px;margin:0 auto;padding:24px 26px 50px;}
.page-title{font-size:22px;font-weight:700;letter-spacing:-.4px;margin:0 0 4px;}
.page-sub{font-size:13.5px;color:var(--stone);margin:0 0 18px;}

.hero-band{position:relative;border-radius:16px;overflow:hidden;padding:36px 40px 56px;margin-bottom:44px;min-height:200px;display:flex;flex-direction:column;justify-content:center;animation:floatIn .35s ease both;}
.hero-art{position:absolute;inset:0;width:100%;height:100%;z-index:0;}
.hero-copy{position:relative;z-index:1;max-width:520px;}
.hero-eyebrow{font-size:12px;font-weight:700;letter-spacing:.6px;text-transform:uppercase;color:var(--gold);margin-bottom:10px;}
.hero-heading{font-size:40px;font-weight:460;line-height:1.22;letter-spacing:-.8px;color:#ffffff;margin-bottom:12px;}
.hero-desc{font-size:14px;line-height:1.6;color:rgba(255,255,255,.82);max-width:440px;}
.hero-float-card{position:absolute;right:40px;bottom:28px;z-index:1;background:rgba(255,255,255,.85);backdrop-filter:blur(6px);border:1px solid rgba(255,255,255,.3);border-radius:16px;padding:16px 20px;min-width:180px;}

.hero-float-value{font-size:28px;font-weight:700;color:var(--wine);margin-bottom:6px;}
.hero-float-sub{font-size:11px;color:var(--low-fg);display:flex;align-items:center;gap:5px;}

/* status-strip: slim inline metrics, NOT a big KPI card row */
.status-strip{
  display:flex;align-items:center;gap:0;background:var(--paper);border:1px solid var(--hairline);
  border-radius:10px;padding:10px 4px;margin-bottom:20px;overflow-x:auto;position:relative;
}
.status-strip::before{
  content:'';position:absolute;inset:0;border-radius:10px;pointer-events:none;
  background:radial-gradient(circle at 12% 30%, rgba(212,199,255,.35) 0%, transparent 45%),
             radial-gradient(circle at 85% 70%, rgba(246,188,30,.22) 0%, transparent 50%);
}
.status-item{display:flex;align-items:center;gap:9px;padding:6px 22px;border-right:1px solid var(--hairline);white-space:nowrap;position:relative;z-index:1;}
.status-item:last-child{border-right:none;}
.status-dot{width:7px;height:7px;border-radius:999px;background:var(--low-fg);animation:pulseLive 1.6s ease-in-out infinite;}
.status-label{font-size:11px;color:var(--stone);}
.status-value{font-size:17px;font-weight:700;}

.tower-grid{display:grid;grid-template-columns:1.5fr 1fr;gap:16px;}
.card{background:var(--paper);border:1px solid var(--hairline);border-radius:10px;}
.card.elevated{box-shadow:0 14px 30px -18px rgba(66,29,36,.28);}
.panel-head{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;border-bottom:1px solid var(--hairline);}
.panel-title{font-size:14px;font-weight:700;}

.timeline{padding:16px;display:flex;flex-direction:column;gap:0;max-height:420px;overflow-y:auto;}
.tl-item{display:flex;gap:12px;padding:12px 0;border-left:2px solid var(--hairline);margin-left:9px;padding-left:18px;position:relative;}
.tl-item::before{content:'';position:absolute;left:-7px;top:16px;width:12px;height:12px;border-radius:999px;background:var(--paper);border:2px solid var(--wine);}
.tl-item:last-child{border-left-color:transparent;}
.tl-time{font-size:11px;color:var(--stone);min-width:80px;}
.tl-body{font-size:13px;line-height:1.5;}
.tl-org{font-size:11px;color:var(--stone);}

.rail{padding:12px;display:flex;flex-direction:column;gap:8px;max-height:420px;overflow-y:auto;}
.rail-item{border:1px solid var(--hairline);border-radius:8px;padding:11px 12px;transition:.15s;}
.rail-item:hover{transform:scale(1.02);border-color:var(--wine);}
.rail-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;}
.rail-node{font-size:12px;font-weight:700;}
.rail-title{font-size:12.5px;color:var(--ink);margin-bottom:8px;}
.rail-foot{display:flex;justify-content:space-between;align-items:center;}
.badge{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:6px;font-size:11px;font-weight:700;}
.badge-low{color:var(--low-fg);background:var(--low-bg);}
.badge-mid{color:var(--mid-fg);background:var(--mid-bg);}
.badge-high{color:var(--high-fg);background:var(--high-bg);}
.badge-urgent{color:var(--wine);background:var(--lilac);}

.secondary-row{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-top:16px;}
.mini-chart-card{padding:16px;}
.mini-chart-title{font-size:12px;color:var(--stone);margin-bottom:10px;font-weight:600;}
.big-num{font-size:34px;font-weight:700;letter-spacing:-.6px;}
.trend-projection{animation:dashRotate 1.4s linear infinite;}
.skeleton2{height:38px;border-radius:8px;background:linear-gradient(90deg,#f2f0eb 0px,#ffffff 90px,#f2f0eb 180px);background-size:720px 100%;animation:shimmer2 1.2s linear infinite;}

.btn{display:inline-flex;align-items:center;gap:7px;padding:8px 16px;border-radius:10px;font-size:13px;font-weight:600;white-space:nowrap;transition:.15s;}
.btn-wine{background:var(--wine);color:#fff;}
.btn-wine:hover{background:#5a2732;}
.btn-lilac{background:var(--lilac);color:var(--ink);border:1px solid var(--ink);}
.btn-lilac:hover{background:#c6b6f7;}
.btn-ghost{color:var(--ink);border:1px solid var(--hairline);}
.btn-ghost:hover{background:var(--parchment);}
.btn-sm{padding:6px 12px;font-size:12px;border-radius:8px;}
.btn:disabled{opacity:.45;cursor:not-allowed;}

/* priority queue screen */
.pq-toolbar{display:flex;gap:10px;margin-bottom:14px;flex-wrap:wrap;align-items:center;}
.select-mini{border:1px solid var(--hairline);border-radius:8px;padding:8px 10px;font-size:12.5px;background:var(--paper);color:var(--ink);}
.pq-list{display:flex;flex-direction:column;gap:8px;}
.pq-row{display:flex;align-items:center;gap:14px;background:var(--paper);border:1px solid var(--hairline);border-radius:10px;padding:12px 16px;}
.pq-score{width:44px;height:44px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:15px;flex-shrink:0;}
.pq-main{flex:1;min-width:0;}
.pq-title{font-size:13.5px;font-weight:600;}
.pq-meta{font-size:11.5px;color:var(--stone);margin-top:3px;}

/* reports */
.filters-row{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap;}
table.rep{width:100%;border-collapse:collapse;}
table.rep th{text-align:left;font-size:11.5px;color:var(--stone);font-weight:700;padding:9px 12px;border-bottom:1px solid var(--hairline);}
table.rep td{padding:10px 12px;font-size:13px;border-bottom:1px solid var(--hairline);}

/* desktop packaging */
.pack-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
.field-row{display:flex;justify-content:space-between;align-items:center;padding:12px 0;border-bottom:1px solid var(--hairline);font-size:13px;}
.field-row:last-child{border-bottom:none;}
.toggle{width:38px;height:22px;border-radius:999px;background:var(--mist);position:relative;transition:.15s;flex-shrink:0;}
.toggle.on{background:var(--wine);}
.toggle .knob{position:absolute;top:2px;left:2px;width:18px;height:18px;border-radius:999px;background:#fff;transition:.15s;box-shadow:0 1px 3px rgba(0,0,0,.3);}
.toggle.on .knob{left:18px;}
.queue-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border:1px solid var(--hairline);border-radius:8px;margin-bottom:8px;font-size:12.5px;}
.sync-dot{width:8px;height:8px;border-radius:999px;flex-shrink:0;}

.field-in{width:100%;border:1px solid var(--hairline);border-radius:8px;padding:9px 11px;font-size:13px;color:var(--ink);}
.field-in:focus{outline:none;border-color:var(--wine);}
.field-label{font-size:11.5px;color:var(--stone);margin:0 0 6px;font-weight:600;}

.modal-back{position:fixed;inset:0;background:rgba(41,40,39,.35);z-index:70;display:flex;align-items:center;justify-content:center;animation:fadeIn .18s ease;}
.modal{width:420px;max-width:92vw;background:var(--paper);border-radius:14px;padding:22px;animation:floatIn .2s ease;}

.toast-wrap{position:fixed;bottom:22px;right:22px;z-index:80;display:flex;flex-direction:column;gap:8px;}
.toast{display:flex;align-items:center;gap:9px;background:var(--wine);color:#fff;padding:12px 16px;border-radius:10px;font-size:13px;animation:slideUp2 .22s ease;box-shadow:0 14px 34px rgba(66,29,36,.3);}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" data-presets="react">
const { useState, useEffect, useMemo } = React;

function Icon({ name, size = 16, style }) {
  return <i className={`ti ti-${name}`} style={{ fontSize: size, lineHeight: 1, ...style }}></i>;
}
function Avatar({ seed, size = 30 }) {
  return (
    <div className="avatar" style={{ width: size, height: size }}>
      <img src={`https://source.boringavatars.com/beam/${size * 2}/${encodeURIComponent(seed)}?colors=421d24,714cb6,d4c7ff,f6bc1e,292827`} alt="" />
    </div>
  );
}

function riskLevel(score) {
  if (score >= 16) return 'high';
  if (score >= 7) return 'mid';
  return 'low';
}
const RISK_LABEL = { low: '낮음', mid: '중간', high: '높음' };

function Sparkline({ points, color = '#421d24', width = 120, height = 34 }) {
  const max = Math.max(...points), min = Math.min(...points);
  const norm = points.map((p, i) => {
    const x = (i / (points.length - 1)) * width;
    const y = height - ((p - min) / (max - min || 1)) * (height - 6) - 3;
    return `${x},${y}`;
  }).join(' ');
  return (
    <svg width={width} height={height} viewBox={`0 0 ${width} ${height}`}>
      <polyline points={norm} fill="none" stroke="var(--lilac)" strokeWidth="2" strokeDasharray="5 4" className="trend-projection" strokeLinecap="round" />
      <polyline points={norm} fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" />
      <circle cx={width} cy={norm.split(' ').pop().split(',')[1]} r="3" fill={color} />
    </svg>
  );
}

function Donut({ segments, size = 96 }) {
  const total = segments.reduce((s, x) => s + x.value, 0);
  let acc = 0;
  const r = size / 2 - 8, c = 2 * Math.PI * r;
  return (
    <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`}>
      {segments.map((s, i) => {
        const frac = s.value / total;
        const dash = `${frac * c} ${c - frac * c}`;
        const offset = -acc * c;
        acc += frac;
        return <circle key={i} cx={size / 2} cy={size / 2} r={r} fill="none" stroke={s.color} strokeWidth="12"
          strokeDasharray={dash} strokeDashoffset={offset} transform={`rotate(-90 ${size / 2} ${size / 2})`} />;
      })}
      <text x="50%" y="50%" textAnchor="middle" dy="6" fontSize="16" fontWeight="700" fill="var(--ink)">{total}</text>
    </svg>
  );
}

/* ---------------- domain data ---------------- */
const ORGS = ['전체 조직 통합', '동해에너지 제2공장', '서한화학 여수사업장', '대성정유 안전기획팀'];

const TIMELINE = [

  { t: '12분 전', org: '서한화학 여수사업장', body: 'N-21 배관 P-450 — AI 분석 초안 생성 완료, 검증 대기 전환' },
  { t: '38분 전', org: '대성정유 안전기획팀', body: 'N-06 펌프 P-306 — 예비 펌프 자동 절체 로직 승인' },
  { t: '1시간 전', org: '동해에너지 제2공장', body: 'N-13 저장탱크 T-104 — 질소 블랭킷 압력 유지 조건 승인' },
  { t: '2시간 전', org: '서한화학 여수사업장', body: 'N-18 배관 P-330 — 드레인 밸브 역류 시나리오 재검토 요청' },
  { t: '3시간 전', org: '대성정유 안전기획팀', body: 'N-09 열교환기 E-410 — 냉각수 유량 저유량 알람 검증 대기' },
];
const PQUEUE = [
  { id: 1, node: 'N-02 저장탱크 T-101', org: '동해에너지 제2공장', title: '벤트 라인 막힘 시 압력 초과 시나리오', likelihood: 3, severity: 5, due: 'D-1', owner: '박서준' },
  { id: 2, node: 'N-01 저장탱크 T-100', org: '동해에너지 제2공장', title: '레벨 센서 오작동 시 과충전 리스크', likelihood: 3, severity: 5, due: 'D-2', owner: '정도현' },
  { id: 3, node: 'N-04 반응기 R-201', org: '서한화학 여수사업장', title: '교반 정지에 따른 국부 발열 편차', likelihood: 3, severity: 4, due: 'D-1', owner: '이하윤' },
  { id: 4, node: 'N-07 펌프 P-305', org: '대성정유 안전기획팀', title: '캐비테이션 발생에 따른 펌프 손상', likelihood: 4, severity: 3, due: 'D-3', owner: '박서준' },
  { id: 5, node: 'N-15 배관 P-221', org: '서한화학 여수사업장', title: '조성 편차로 인한 제품 품질 이탈', likelihood: 2, severity: 4, due: 'D-5', owner: '정도현' },
  { id: 6, node: 'N-09 열교환기 E-410', org: '대성정유 안전기획팀', title: '냉각수 유량 저하에 따른 온도 초과', likelihood: 2, severity: 3, due: 'D-6', owner: '이하윤' },
  { id: 7, node: 'N-18 배관 P-330', org: '서한화학 여수사업장', title: '드레인 밸브 오조작 역류 시나리오', likelihood: 2, severity: 2, due: 'D-8', owner: '박서준' },
];

function TopBar({ screen, setScreen, section, setSection, org, setOrg, notify }) {
  const [orgOpen, setOrgOpen] = useState(false);
  const tabs = [
    { id: 'main', label: '조직 통합 안전관리 관제' },
    { id: 'priority-queue', label: '위험도 기반 우선 대응 큐' },
    { id: 'reports', label: '위험성평가 보고서 자동화' },
    { id: 'desktop-packaging', label: 'Windows 데스크톱 패키징 인터페이스' },
  ];
  return (
    <React.Fragment>
      <header className="app-header">
        <div className="brand"><span className="mark">P</span>ProSafe 콘솔</div>
        <div style={{ position: 'relative' }}>
          <button className="proj-switch" onClick={() => setOrgOpen(!orgOpen)}>
            <Icon name="building-factory-2" size={14} />{org}<Icon name="chevron-down" size={13} />
          </button>
          {orgOpen && (
            <div className="card elevated" style={{ position: 'absolute', top: 40, left: 0, width: 220, padding: 6, zIndex: 50 }}>
              {ORGS.map(o => (
                <button key={o} className="gnav-link" style={{ display: 'block', width: '100%', textAlign: 'left' }}
                  onClick={() => { setOrg(o); setOrgOpen(false); }}>{o}</button>
              ))}
            </div>
          )}
        </div>
        <nav className="global-nav">
          <button className={`gnav-link ${section === 'ops' ? 'active' : ''}`} onClick={() => { setSection('ops'); setScreen('main'); }}>관제</button>
          <button className={`gnav-link ${section === 'analysis' ? 'active' : ''}`} onClick={() => { setSection('analysis'); setScreen('priority-queue'); }}>분석</button>
          <button className={`gnav-link ${section === 'docs' ? 'active' : ''}`} onClick={() => { setSection('docs'); setScreen('reports'); }}>문서</button>
        </nav>

function PriorityQueueScreen({ notify }) {
  const [rows, setRows] = useState(PQUEUE);
  const [sortBy, setSortBy] = useState('risk');
  const [orgFilter, setOrgFilter] = useState('전체 조직');
  const [visible, setVisible] = useState(5);

  const sorted = useMemo(() => {
    let list = rows.filter(r => orgFilter === '전체 조직' || r.org === orgFilter);
    list = [...list].sort((a, b) => sortBy === 'risk' ? (b.likelihood * b.severity) - (a.likelihood * a.severity) : parseInt(a.due.slice(2)) - parseInt(b.due.slice(2)));
    return list;
  }, [rows, sortBy, orgFilter]);

  const reassign = (id) => { notify('담당자 배정 알림이 큐 작업으로 발송되었습니다'); };

  return (
    <div className="screen content">
      <div className="page-title">위험도 기반 우선 대응 큐</div>
      <div className="page-sub">Risk Ranking이 높거나 마감일이 임박한 항목을 조직 구분 없이 통합 정렬합니다.</div>
      <div className="pq-toolbar">
        <select className="select-mini" value={orgFilter} onChange={e => setOrgFilter(e.target.value)}>
          {['전체 조직', ...ORGS.slice(1)].map(o => <option key={o}>{o}</option>)}
        </select>
        <select className="select-mini" value={sortBy} onChange={e => setSortBy(e.target.value)}>
          <option value="risk">Risk Ranking 순</option>
          <option value="due">마감일 순</option>
        </select>
        <span style={{ marginLeft: 'auto', fontSize: 12, color: 'var(--stone)' }}>{sorted.length}건 대기 중</span>
      </div>
      <div className="pq-list">
        {sorted.slice(0, visible).map(p => {
          const score = p.likelihood * p.severity, lvl = riskLevel(score);
          const urgent = p.due === 'D-1' || p.due === 'D-2';
          return (
            <div className="pq-row" key={p.id}>
              <div className={`pq-score badge-${lvl}`} style={{ background: lvl === 'high' ? 'var(--high-bg)' : lvl === 'mid' ? 'var(--mid-bg)' : 'var(--low-bg)', color: lvl === 'high' ? 'var(--high-fg)' : lvl === 'mid' ? 'var(--mid-fg)' : 'var(--low-fg)' }}>{score}</div>
              <div className="pq-main">
                <div className="pq-title">{p.node} · {p.title}</div>
                <div className="pq-meta">{p.org} · 담당 {p.owner}</div>
              </div>
              {urgent && <span className="badge badge-urgent"><Icon name="clock" size={11} />마감 {p.due}</span>}
              <button className="btn btn-lilac btn-sm" onClick={() => reassign(p.id)}>재배정</button>
            </div>
          );
        })}
      </div>
      {visible < sorted.length && (
        <div style={{ textAlign: 'center', marginTop: 14 }}>
          <button className="btn btn-ghost btn-sm" onClick={() => setVisible(v => v + 10)}><Icon name="chevron-down" size={13} />더 보기</button>
        </div>
      )}
    </div>
  );
}

function DesktopPackagingScreen({ notify }) {
  const [version, setVersion] = useState('1.4.0');
  const [autoUpdate, setAutoUpdate] = useState(true);
  const [online, setOnline] = useState(true);
  const [queue, setQueue] = useState([
    { id: 1, desc: 'N-04 워크시트 Likelihood 값 변경', synced: true },
    { id: 2, desc: 'N-11 Cause 필드 수정', synced: true },
  ]);

  const toggleNetwork = () => {
    const next = !online;
    setOnline(next);
    if (!next) notify('네트워크 연결이 끊겼습니다 — 변경분이 로컬 큐에 적재됩니다');
    else {
      setQueue(prev => prev.map(q => ({ ...q, synced: true })));
      notify('네트워크가 복구되어 로컬 큐가 서버와 동기화되었습니다');
    }
  };
  const editOffline = () => {
    if (online) { notify('온라인 상태입니다 — 먼저 네트워크를 끊어 오프라인 상태를 시뮬레이션하세요'); return; }
    const id = Math.max(...queue.map(q => q.id)) + 1;
    setQueue(prev => [...prev, { id, desc: `N-${(20 + id)} 워크시트 값 변경 (오프라인)`, synced: false }]);
    notify('오프라인 상태에서 변경분이 로컬 큐에 쌓였습니다');
  };
  const rebuild = () => notify(`버전 ${version} 빌드가 큐에 등록되었습니다`);

  return (
    <div className="screen content">
      <div className="page-title">Windows 데스크톱 패키징 인터페이스</div>
      <div className="page-sub">현장 PC에서 오프라인으로도 워크시트를 조회·입력할 수 있도록 빌드 설정과 동기화 큐를 관리합니다.</div>
      <div className="pack-grid">
        <div className="card" style={{ padding: 18 }}>
          <div className="panel-title" style={{ marginBottom: 10 }}>Tauri 빌드 설정</div>
          <div className="field-row"><span>앱 버전</span><input className="field-in" style={{ width: 110 }} value={version} onChange={e => setVersion(e.target.value)} /></div>
          <div className="field-row"><span>자동 업데이트</span><div className={`toggle ${autoUpdate ? 'on' : ''}`} onClick={() => setAutoUpdate(!autoUpdate)}><div className="knob"></div></div></div>
          <div className="field-row"><span>로컬 파일 저장 경로</span><span style={{ color: 'var(--stone)', fontSize: 12 }}>C:\ProSafe\workspace</span></div>
          <button className="btn btn-wine btn-sm" style={{ marginTop: 10 }} onClick={rebuild}><Icon name="package" size={13} />설치 파일 재빌드</button>
        </div>
        <div className="card" style={{ padding: 18 }}>
          <div className="panel-head" style={{ padding: 0, border: 'none', marginBottom: 10 }}>
            <span className="panel-title">네트워크 상태 · 오프라인 동기화 큐</span>
            <button className={`btn btn-sm ${online ? 'btn-ghost' : 'btn-wine'}`} onClick={toggleNetwork}>
              <Icon name={online ? 'wifi' : 'wifi-off'} size={13} />{online ? '온라인' : '오프라인'}
            </button>
          </div>
          {queue.map(q => (
            <div className="queue-item" key={q.id}>
              <span className="sync-dot" style={{ background: q.synced ? 'var(--low-fg)' : 'var(--high-fg)' }}></span>
              <span style={{ flex: 1 }}>{q.desc}</span>
              <span style={{ color: q.synced ? 'var(--low-fg)' : 'var(--high-fg)', fontWeight: 700 }}>{q.synced ? '동기화됨' : '대기중'}</span>
            </div>
          ))}
          <div style={{ display: 'flex', gap: 8, marginTop: 8 }}>
            <button className="btn btn-ghost btn-sm" onClick={editOffline}><Icon name="edit" size={13} />오프라인 상태에서 워크시트 수정</button>
            <button className="btn btn-lilac btn-sm" onClick={() => notify('로컬 큐를 서버와 즉시 동기화합니다')}><Icon name="refresh" size={13} />지금 동기화</button>
          </div>
        </div>
      </div>
    </div>
  );
}

function App() {
  const [screen, setScreen] = useState('main');
  const [section, setSection] = useState('ops');
  const [org, setOrg] = useState('전체 조직 통합');
  const [toasts, setToasts] = useState([]);
  const notify = (msg) => {
    const id = Math.random().toString(36).slice(2);
    setToasts(prev => [...prev, { id, msg }]);
    setTimeout(() => setToasts(prev => prev.filter(t => t.id !== id)), 2800);
  };
  return (
    <div data-archetype="topbar-analytics">
      <TopBar screen={screen} setScreen={setScreen} section={section} setSection={setSection} org={org} setOrg={setOrg} notify={notify} />
      {screen === 'main' && <MainScreen org={org} notify={notify} />}
      {screen === 'priority-queue' && <PriorityQueueScreen notify={notify} />}
      {screen === 'reports' && <ReportsScreen notify={notify} />}
      {screen === 'desktop-packaging' && <DesktopPackagingScreen notify={notify} />}
      <div className="toast-wrap">
        {toasts.map(t => <div className="toast" key={t.id}><Icon name="circle-check" size={15} />{t.msg}</div>)}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
