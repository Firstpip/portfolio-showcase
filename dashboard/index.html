<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>위시켓 현황 대시보드</title>
<link rel="preconnect" href="https://cdn.jsdelivr.net" />
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" rel="stylesheet" />
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://unpkg.com/prop-types@15/prop-types.min.js"></script>
<script src="https://unpkg.com/recharts@2.15.3/umd/Recharts.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0f1117; --surface: #1a1d27; --surface2: #242836;
    --border: #2e3348; --text: #e4e6f0; --text2: #8b8fa8;
    --accent: #6c5ce7; --accent2: #a29bfe;
    --green: #00b894; --yellow: #fdcb6e; --red: #e17055; --blue: #74b9ff;
    --generated: #636e72; --applied: #6c5ce7; --interview: #fdcb6e;
    --won: #00b894; --lost: #e17055; --cancelled: #636e72;
  }
  html { font-size: 14px; }
  body {
    font-family: 'Pretendard', -apple-system, sans-serif;
    background: var(--bg); color: var(--text);
    min-height: 100vh; line-height: 1.5;
  }
  #root { max-width: 1280px; margin: 0 auto; padding: 2rem 1.5rem; }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: var(--surface); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  /* Animations */
  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  .fade-in { animation: fadeIn 0.4s ease-out forwards; }
  .delay-1 { animation-delay: 0.05s; opacity: 0; }
  .delay-2 { animation-delay: 0.1s; opacity: 0; }
  .delay-3 { animation-delay: 0.15s; opacity: 0; }
  .delay-4 { animation-delay: 0.2s; opacity: 0; }
</style>
<script type="text/babel" data-type="module">
const { useState, useEffect, useMemo } = React;
const {
  BarChart, Bar, XAxis, YAxis, CartesianGrid, Tooltip, ResponsiveContainer,
  PieChart, Pie, Cell, Legend, AreaChart, Area
} = Recharts;

const STATUS_META = {
  generated:  { label: '생성완료', emoji: '📦', color: '#636e72' },
  applied:    { label: '지원완료', emoji: '📤', color: '#6c5ce7' },
  interview:  { label: '면접/미팅', emoji: '🤝', color: '#fdcb6e' },
  won:        { label: '수주 성공', emoji: '🎉', color: '#00b894' },
  lost:       { label: '미선정',   emoji: '❌', color: '#e17055' },
  cancelled:  { label: '취소/철회', emoji: '⏸️', color: '#636e72' },
};

const STATUS_ORDER = ['generated', 'applied', 'interview', 'won', 'lost', 'cancelled'];

// ─── Loading ───
function Loading() {
  return (
    <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'center', minHeight: '60vh', gap: '1rem' }}>
      <div style={{
        width: 32, height: 32, border: '3px solid var(--border)',
        borderTopColor: 'var(--accent)', borderRadius: '50%',
        animation: 'spin 0.8s linear infinite',
      }} />
      <span style={{ color: 'var(--text2)' }}>데이터 로딩 중...</span>
      <style>{`@keyframes spin { to { transform: rotate(360deg); } }`}</style>
    </div>
  );
}

// ─── Stats Card ───
function StatCard({ title, value, sub, color, delay }) {
  return (
    <div className={`fade-in delay-${delay}`} style={{
      background: 'var(--surface)', borderRadius: 12, padding: '1.25rem 1.5rem',
      border: '1px solid var(--border)', flex: '1 1 200px', minWidth: 180,
    }}>
      <div style={{ fontSize: '0.85rem', color: 'var(--text2)', marginBottom: 4 }}>{title}</div>
      <div style={{ fontSize: '2rem', fontWeight: 700, color: color || 'var(--text)', lineHeight: 1.2 }}>{value}</div>
      {sub && <div style={{ fontSize: '0.8rem', color: 'var(--text2)', marginTop: 4 }}>{sub}</div>}
    </div>
  );
}

// ─── Funnel ───
function Funnel({ data }) {
  const stages = [
    { key: 'generated', label: '생성', color: '#636e72' },
    { key: 'applied',   label: '지원', color: '#6c5ce7' },
    { key: 'interview', label: '면접', color: '#fdcb6e' },
    { key: 'won',       label: '수주', color: '#00b894' },
  ];

  // 각 단계를 거쳐간 누적 수 계산 (현재 상태가 해당 단계 이상인 프로젝트 수)
  const ORDER = ['generated', 'applied', 'interview', 'won'];
  const counts = stages.map(s => {
    const idx = ORDER.indexOf(s.key);
    return {
      ...s,
      count: data.filter(d => {
        const dIdx = ORDER.indexOf(d.current_status);
        // lost/cancelled도 해당 단계까지는 거쳐간 것으로 카운트
        if (d.current_status === 'lost' || d.current_status === 'cancelled') {
          // history에서 최대 도달 단계 확인
          const maxIdx = Math.max(...d.history.map(h => ORDER.indexOf(h.status)).filter(i => i >= 0), -1);
          return maxIdx >= idx;
        }
        return dIdx >= idx;
      }).length,
    };
  });

  const maxCount = Math.max(...counts.map(c => c.count), 1);

  return (
    <div style={{
      background: 'var(--surface)', borderRadius: 12, padding: '1.5rem',
      border: '1px solid var(--border)',
    }}>
      <h3 style={{ fontSize: '1rem', fontWeight: 600, marginBottom: '1.25rem' }}>📊 수주 퍼널</h3>
      <div style={{ display: 'flex', flexDirection: 'column', gap: 10 }}>
        {counts.map((s, i) => {
          const pct = maxCount > 0 ? (s.count / maxCount) * 100 : 0;
          const convRate = i > 0 && counts[i - 1].count > 0
            ? ((s.count / counts[i - 1].count) * 100).toFixed(0) + '%'
            : null;
          return (
            <div key={s.key} style={{ display: 'flex', alignItems: 'center', gap: 12 }}>
              <div style={{ width: 50, fontSize: '0.85rem', color: 'var(--text2)', textAlign: 'right', flexShrink: 0 }}>
                {s.label}
              </div>
              <div style={{ flex: 1, background: 'var(--surface2)', borderRadius: 6, height: 32, position: 'relative', overflow: 'hidden' }}>
                <div style={{
                  width: `${Math.max(pct, 3)}%`, height: '100%', background: s.color,
                  borderRadius: 6, transition: 'width 0.8s ease-out',
                  display: 'flex', alignItems: 'center', paddingLeft: 10,
                }}>
                  <span style={{ fontSize: '0.85rem', fontWeight: 600, color: '#fff', textShadow: '0 1px 2px rgba(0,0,0,0.3)' }}>
                    {s.count}
                  </span>
                </div>
              </div>
              {convRate && (
                <div style={{ width: 40, fontSize: '0.75rem', color: 'var(--text2)', flexShrink: 0 }}>
                  →{convRate}
                </div>
              )}
            </div>
          );
        })}
      </div>
    </div>
  );
}

// ─── Status Pie ───
function StatusPie({ data }) {
  const counts = STATUS_ORDER.map(s => ({
    name: STATUS_META[s].label,
    value: data.filter(d => d.current_status === s).length,
    color: STATUS_META[s].color,
  })).filter(c => c.value > 0);

  return (
    <div style={{
      background: 'var(--surface)', borderRadius: 12, padding: '1.5rem',
      border: '1px solid var(--border)',
    }}>
      <h3 style={{ fontSize: '1rem', fontWeight: 600, marginBottom: '0.5rem' }}>🔵 상태 분포</h3>
      <ResponsiveContainer width="100%" height={220}>
        <PieChart>
          <Pie data={counts} dataKey="value" nameKey="name" cx="50%" cy="50%"
            innerRadius={50} outerRadius={80} paddingAngle={2} strokeWidth={0}>
            {counts.map((c, i) => <Cell key={i} fill={c.color} />)}
          </Pie>
          <Tooltip contentStyle={{ background: '#1a1d27', border: '1px solid #2e3348', borderRadius: 8, fontSize: '0.85rem' }}
            itemStyle={{ color: '#e4e6f0' }} />
          <Legend wrapperStyle={{ fontSize: '0.8rem', color: '#8b8fa8' }} />
        </PieChart>
      </ResponsiveContainer>
    </div>
  );
}

// ─── Monthly Trend ───
function MonthlyTrend({ data }) {
  const monthly = {};
  data.forEach(d => {
    const month = (d.created_at || '').slice(0, 7);
    if (!month) return;
    if (!monthly[month]) monthly[month] = { month, generated: 0, applied: 0, won: 0 };
    monthly[month].generated++;
    if (['applied', 'interview', 'won', 'lost', 'cancelled'].includes(d.current_status)) {
      monthly[month].applied++;
    }
    if (d.current_status === 'won') monthly[month].won++;
  });

  const chartData = Object.values(monthly).sort((a, b) => a.month.localeCompare(b.month));

  if (chartData.length < 2) return null;

  return (
    <div style={{
      background: 'var(--surface)', borderRadius: 12, padding: '1.5rem',
      border: '1px solid var(--border)',
    }}>
      <h3 style={{ fontSize: '1rem', fontWeight: 600, marginBottom: '0.5rem' }}>📈 월별 추이</h3>
      <ResponsiveContainer width="100%" height={220}>
        <AreaChart data={chartData}>
          <CartesianGrid strokeDasharray="3 3" stroke="#2e3348" />
          <XAxis dataKey="month" tick={{ fontSize: 11, fill: '#8b8fa8' }} tickFormatter={v => v.slice(5)} />
          <YAxis tick={{ fontSize: 11, fill: '#8b8fa8' }} />
          <Tooltip contentStyle={{ background: '#1a1d27', border: '1px solid #2e3348', borderRadius: 8, fontSize: '0.85rem' }}
            itemStyle={{ color: '#e4e6f0' }} />
          <Area type="monotone" dataKey="generated" name="생성" stroke="#636e72" fill="#636e72" fillOpacity={0.15} />
          <Area type="monotone" dataKey="applied" name="지원" stroke="#6c5ce7" fill="#6c5ce7" fillOpacity={0.15} />
          <Area type="monotone" dataKey="won" name="수주" stroke="#00b894" fill="#00b894" fillOpacity={0.2} />
        </AreaChart>
      </ResponsiveContainer>
    </div>
  );
}

// ─── Filter Tabs ───
function FilterTabs({ active, onChange, counts }) {
  const tabs = [
    { key: 'all', label: '전체' },
    ...STATUS_ORDER.map(s => ({ key: s, label: STATUS_META[s].label })),
  ];

  return (
    <div style={{ display: 'flex', gap: 6, flexWrap: 'wrap' }}>
      {tabs.map(t => {
        const count = t.key === 'all' ? counts.total : (counts[t.key] || 0);
        if (t.key !== 'all' && count === 0) return null;
        const isActive = active === t.key;
        return (
          <button key={t.key} onClick={() => onChange(t.key)} style={{
            padding: '0.4rem 0.85rem', borderRadius: 8, border: 'none', cursor: 'pointer',
            fontSize: '0.8rem', fontWeight: isActive ? 600 : 400, transition: 'all 0.15s',
            background: isActive ? 'var(--accent)' : 'var(--surface2)',
            color: isActive ? '#fff' : 'var(--text2)',
          }}>
            {t.key !== 'all' && STATUS_META[t.key]?.emoji + ' '}{t.label} {count}
          </button>
        );
      })}
    </div>
  );
}

// ─── Project Table ───
function ProjectTable({ data, filter, search }) {
  const filtered = useMemo(() => {
    let list = filter === 'all' ? data : data.filter(d => d.current_status === filter);
    if (search.trim()) {
      const q = search.toLowerCase();
      list = list.filter(d =>
        (d.title || '').toLowerCase().includes(q) ||
        (d.slug || '').toLowerCase().includes(q)
      );
    }
    return list.sort((a, b) => (b.created_at || '').localeCompare(a.created_at || ''));
  }, [data, filter, search]);

  return (
    <div style={{
      background: 'var(--surface)', borderRadius: 12, border: '1px solid var(--border)',
      overflow: 'hidden',
    }}>
      <div style={{ overflowX: 'auto' }}>
        <table style={{ width: '100%', borderCollapse: 'collapse', fontSize: '0.85rem' }}>
          <thead>
            <tr style={{ borderBottom: '1px solid var(--border)' }}>
              {['상태', '프로젝트', '예산', '기간', '포트폴리오', '생성일', '최근 이력'].map(h => (
                <th key={h} style={{
                  padding: '0.75rem 1rem', textAlign: 'left', fontWeight: 600,
                  color: 'var(--text2)', fontSize: '0.8rem', whiteSpace: 'nowrap',
                }}>{h}</th>
              ))}
            </tr>
          </thead>
          <tbody>
            {filtered.length === 0 ? (
              <tr>
                <td colSpan={7} style={{ padding: '2rem', textAlign: 'center', color: 'var(--text2)' }}>
                  결과 없음
                </td>
              </tr>
            ) : filtered.map((r, i) => {
              const meta = STATUS_META[r.current_status] || {};
              const lastHistory = r.history?.[r.history.length - 1];
              return (
                <tr key={r.slug} style={{
                  borderBottom: '1px solid var(--border)',
                  transition: 'background 0.1s',
                }}
                onMouseEnter={e => e.currentTarget.style.background = 'var(--surface2)'}
                onMouseLeave={e => e.currentTarget.style.background = 'transparent'}
                >
                  <td style={{ padding: '0.65rem 1rem', whiteSpace: 'nowrap' }}>
                    <span style={{
                      display: 'inline-block', padding: '0.2rem 0.6rem', borderRadius: 6,
                      fontSize: '0.75rem', fontWeight: 500,
                      background: meta.color + '22', color: meta.color, border: `1px solid ${meta.color}44`,
                    }}>
                      {meta.emoji} {meta.label}
                    </span>
                  </td>
                  <td style={{ padding: '0.65rem 1rem', maxWidth: 320 }}>
                    <div style={{ fontWeight: 500, whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis' }}>
                      {r.title || r.slug}
                    </div>
                    <div style={{ fontSize: '0.75rem', color: 'var(--text2)', fontFamily: 'monospace' }}>{r.slug}</div>
                  </td>
                  <td style={{ padding: '0.65rem 1rem', whiteSpace: 'nowrap', color: r.budget ? 'var(--text)' : 'var(--text2)' }}>
                    {r.budget || '—'}
                  </td>
                  <td style={{ padding: '0.65rem 1rem', whiteSpace: 'nowrap', color: r.timeline ? 'var(--text)' : 'var(--text2)' }}>
                    {r.timeline || '—'}
                  </td>
                  <td style={{ padding: '0.65rem 1rem', textAlign: 'center' }}>
                    {r.portfolio_count || 0}개
                  </td>
                  <td style={{ padding: '0.65rem 1rem', whiteSpace: 'nowrap', fontSize: '0.8rem', color: 'var(--text2)' }}>
                    {r.created_at || '—'}
                  </td>
                  <td style={{ padding: '0.65rem 1rem', fontSize: '0.8rem', color: 'var(--text2)', maxWidth: 200 }}>
                    {lastHistory ? (
                      <span>{lastHistory.date} {lastHistory.note ? `— ${lastHistory.note}` : ''}</span>
                    ) : '—'}
                  </td>
                </tr>
              );
            })}
          </tbody>
        </table>
      </div>
      <div style={{ padding: '0.65rem 1rem', borderTop: '1px solid var(--border)', fontSize: '0.8rem', color: 'var(--text2)' }}>
        {filtered.length}건 표시 중
      </div>
    </div>
  );
}

// ─── App ───
function App() {
  const [data, setData] = useState(null);
  const [filter, setFilter] = useState('all');
  const [search, setSearch] = useState('');
  const [lastUpdated, setLastUpdated] = useState(null);

  useEffect(() => {
    fetch('./data.json')
      .then(r => r.json())
      .then(d => {
        setData(d);
        const latest = d.reduce((max, r) => r.updated_at > max ? r.updated_at : max, '');
        setLastUpdated(latest);
      })
      .catch(() => setData([]));
  }, []);

  if (!data) return <Loading />;

  const counts = { total: data.length };
  STATUS_ORDER.forEach(s => counts[s] = data.filter(d => d.current_status === s).length);

  const appliedOrBeyond = data.filter(d => d.current_status !== 'generated').length;
  const wonCount = counts.won || 0;
  const winRate = appliedOrBeyond > 0 ? ((wonCount / appliedOrBeyond) * 100).toFixed(1) : '0.0';
  const interviewCount = data.filter(d =>
    d.history?.some(h => h.status === 'interview')
  ).length;
  const interviewRate = appliedOrBeyond > 0 ? ((interviewCount / appliedOrBeyond) * 100).toFixed(1) : '0.0';

  return (
    <div>
      {/* Header */}
      <div className="fade-in" style={{ marginBottom: '2rem' }}>
        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', flexWrap: 'wrap', gap: '1rem' }}>
          <div>
            <h1 style={{ fontSize: '1.5rem', fontWeight: 700, letterSpacing: '-0.02em' }}>
              📋 위시켓 현황 대시보드
            </h1>
            <p style={{ color: 'var(--text2)', fontSize: '0.85rem', marginTop: 4 }}>
              프로젝트 지원 현황 및 수주 통계
            </p>
          </div>
          {lastUpdated && (
            <div style={{ fontSize: '0.8rem', color: 'var(--text2)', padding: '0.4rem 0.8rem', background: 'var(--surface)', borderRadius: 8 }}>
              최종 업데이트: {lastUpdated}
            </div>
          )}
        </div>
      </div>

      {/* Stats Cards */}
      <div style={{ display: 'flex', gap: '1rem', flexWrap: 'wrap', marginBottom: '1.5rem' }}>
        <StatCard title="총 프로젝트" value={data.length} sub={`생성 ${counts.generated} / 지원 ${appliedOrBeyond}`} delay={1} />
        <StatCard title="수주율" value={`${winRate}%`} sub={`${wonCount} / ${appliedOrBeyond} (지원 기준)`} color="var(--green)" delay={2} />
        <StatCard title="면접 전환율" value={`${interviewRate}%`} sub={`${interviewCount} / ${appliedOrBeyond}`} color="var(--yellow)" delay={3} />
        <StatCard title="진행 중" value={counts.applied + counts.interview}
          sub={`지원 ${counts.applied} + 면접 ${counts.interview}`} color="var(--accent2)" delay={4} />
      </div>

      {/* Charts */}
      <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(340px, 1fr))', gap: '1rem', marginBottom: '1.5rem' }}>
        <div className="fade-in delay-2"><Funnel data={data} /></div>
        <div className="fade-in delay-3"><StatusPie data={data} /></div>
      </div>

      <div className="fade-in delay-4" style={{ marginBottom: '1.5rem' }}>
        <MonthlyTrend data={data} />
      </div>

      {/* Project List */}
      <div className="fade-in delay-4">
        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '1rem', flexWrap: 'wrap', gap: '0.75rem' }}>
          <h2 style={{ fontSize: '1.1rem', fontWeight: 600 }}>📁 프로젝트 목록</h2>
          <input
            type="text" placeholder="프로젝트 검색..."
            value={search} onChange={e => setSearch(e.target.value)}
            style={{
              padding: '0.45rem 0.85rem', borderRadius: 8, border: '1px solid var(--border)',
              background: 'var(--surface2)', color: 'var(--text)', fontSize: '0.85rem',
              width: 240, outline: 'none',
            }}
            onFocus={e => e.target.style.borderColor = 'var(--accent)'}
            onBlur={e => e.target.style.borderColor = 'var(--border)'}
          />
        </div>
        <div style={{ marginBottom: '1rem' }}>
          <FilterTabs active={filter} onChange={setFilter} counts={counts} />
        </div>
        <ProjectTable data={data} filter={filter} search={search} />
      </div>

      {/* Footer */}
      <div style={{ textAlign: 'center', padding: '2rem 0 1rem', color: 'var(--text2)', fontSize: '0.75rem' }}>
        Wishket Portfolio Tracker — Firstpip
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</head>
<body>
<div id="root"></div>
</body>
</html>
