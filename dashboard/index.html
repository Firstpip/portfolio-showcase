                          <div style={{ flex:'0 0 80px', height:5, background:'var(--bg)', borderRadius:3, overflow:'hidden' }}>
                            <div style={{ width:pct+'%', height:'100%', background:blocked?'#e17055':'var(--green)', transition:'width 0.3s' }} />
                          </div>
                          <span style={{ color:'var(--text2)' }}>{doneCount}/{sorted.length}</span>
                          {current && <span style={{ color: blocked?'#e17055':(MILESTONE_STAGES[current.status]?.color||'var(--text2)') }}>· {blocked?'🔴 ':''}{current.phase_label}</span>}
                          <span style={{ color:'var(--accent2)', fontSize:'0.8rem', marginLeft:'auto', opacity:0.6 }}>→</span>
                        </div>
                      );
                    })()}
                  </td>
                  <td style={{ padding:'0.7rem 1rem', whiteSpace:'nowrap', fontSize:'0.8rem', color:r.budget?'var(--text)':'var(--text2)' }}>{r.budget||'—'}</td>
                  <td style={{ padding:'0.7rem 1rem', whiteSpace:'nowrap', fontSize:'0.8rem', color:'var(--text2)' }}>{r.created_at||'—'}</td>
                  <td style={{ padding:'0.7rem 1rem', whiteSpace:'nowrap', fontSize:'0.8rem' }}>
                    {meetingStr ? (() => {
                      const ms = getMeetingStatus(r.meeting_at);
                      const mt = MEETING_TYPES.find(t => t.key===r.meeting_type);
                      const isDone = ms==='done';
                      const urgLabel = urgency==='today'?'오늘':urgency==='tomorrow'?'내일':null;
                      return (
                        <span style={{ display:'flex', alignItems:'center', gap:4 }}>
                          {urgLabel ? (
                            <span style={{ padding:'0.1rem 0.35rem', borderRadius:4, fontSize:'0.8rem', fontWeight:700, background:urgency==='today'?'#fdcb6e33':'#74b9ff30', color:urgency==='today'?'#fdcb6e':'#74b9ff', animation:urgency==='today'?'pulse 2s infinite':'none' }}>{urgLabel}</span>
                          ) : (
                            <span style={{ padding:'0.1rem 0.35rem', borderRadius:4, fontSize:'0.8rem', fontWeight:600, background:isDone?'#00b89430':'#fdcb6e30', color:isDone?'#00b894':'#fdcb6e' }}>{isDone?'완료':'예정'}</span>
                          )}
                          {mt && <span>{mt.emoji}</span>}
                          <span style={{ color:isDone?'var(--text2)':'var(--yellow)' }}>{meetingStr}</span>
                        </span>
                      );
                    })() : <span style={{ color:'var(--text2)' }}>—</span>}
                  </td>
                  {/* 담당 컬럼 */}
                  <td style={{ padding:'0.7rem 1rem', whiteSpace:'nowrap' }}>
                    {r.current_status === 'won' ? (
                      mgrM ? (
                        <span style={{ display:'inline-flex', alignItems:'center', gap:3 }}>
                          <MemberAvatar member={mgrM} size={16} />
                          <span style={{ fontSize:'0.8rem', color:mgrM.color, fontWeight:600 }}>{mgrM.name}</span>
                          <span style={{ fontSize:'0.8rem', color:'var(--text2)' }}>PM</span>
                        </span>
                      ) : <span style={{ color:'var(--text2)', fontSize:'0.8rem' }}>—</span>
                    ) : (mainM||subM) ? (
                      <div style={{ display:'flex', flexDirection:'column', gap:3 }}>
                        {mainM && (
                          <span style={{ display:'inline-flex', alignItems:'center', gap:3 }}>
                            <MemberAvatar member={mainM} size={16} />
                            <span style={{ fontSize:'0.8rem', color:mainM.color, fontWeight:600 }}>{mainM.name}</span>
                            <span style={{ fontSize:'0.8rem', color:'var(--text2)' }}>주</span>
                          </span>
                        )}
                        {subM && (
                          <span style={{ display:'inline-flex', alignItems:'center', gap:3 }}>
                            <MemberAvatar member={subM} size={14} />
                            <span style={{ fontSize:'0.8rem', color:subM.color }}>{subM.name}</span>
                            <span style={{ fontSize:'0.8rem', color:'var(--text2)' }}>부</span>
                          </span>
                        )}
                      </div>
                    ) : <span style={{ color:'var(--text2)', fontSize:'0.8rem' }}>—</span>}
                  </td>
                  <td style={{ padding:'0.7rem 1rem', fontSize:'0.8rem', color:'var(--text2)', maxWidth:200, overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap' }}>
                    <InlineMemo value={r.memo} onSave={val => onMemoSave(r,val)} />
                  </td>
                </tr>
              );
            })}
          </tbody>
        </table>
      </div>
      <div style={{ padding:'0.7rem 1rem', borderTop:'1px solid var(--border)', fontSize:'0.8rem', color:'var(--text2)' }}>
        {filtered.length}건 표시 중
      </div>
    </div>
  );
}

// ─── App ───
function App({ session }) {
  const { theme, toggle: toggleTheme } = useTheme();
  const [data, setData]                   = useState(null);
  const [teamMembers, setTeamMembers]     = useState([]);
  const [teamSetupNeeded, setTeamSetupNeeded] = useState(false);
  const [milestones, setMilestones]       = useState({}); // { [slug]: Milestone[] }
  const [milestonesSetupNeeded, setMilestonesSetupNeeded] = useState(false);
  const [route, setRoute]                 = useState(() => parseHash());
  useEffect(() => {
    const h = () => setRoute(parseHash());
    window.addEventListener('hashchange', h);
    return () => window.removeEventListener('hashchange', h);
  }, []);
  const [showTeamMgr, setShowTeamMgr]     = useState(false);
  const [showQuickAdd, setShowQuickAdd]   = useState(false);
  const [memberFilter, setMemberFilter]   = useState('');

  // ─── 로그인 사용자 ↔ 팀원 매칭 ───
  const isAdmin = session?.user?.user_metadata?.role === 'admin';
  const currentMember = useMemo(() => {
    if (!session?.user?.id || !teamMembers.length) return null;
    return teamMembers.find(m => m.user_id === session.user.id) || null;
  }, [session?.user?.id, teamMembers]);
  const displayName = currentMember?.name || session?.user?.user_metadata?.display_name || session?.user?.email;
  const [filter, setFilter]               = useState('all');
  const [search, setSearch]               = useState('');
  const [selectedProject, setSelectedProject] = useState(null);
  const [saving, setSaving]               = useState(false);
  const [connected, setConnected]         = useState(false);
  const [sortKey, setSortKey]             = useState('created_at');
  const [sortOrder, setSortOrder]         = useState('desc');
  const [dateRange, setDateRange]         = useState('all');
  const [showStats, setShowStats]         = useState(false);
  const [showShortcuts, setShowShortcuts] = useState(false);
  const { toasts, toast } = useToast();
  const [confirmState, setConfirmState] = useState(null); // { title, message, confirmLabel, destructive, onConfirm }
  const searchRef = useRef(null);

  useEffect(() => {
    const handler = e => {
      const tag = document.activeElement?.tagName;
      if (tag === 'INPUT' || tag === 'TEXTAREA' || tag === 'SELECT') return;
      if (e.key==='/' && !e.ctrlKey && !e.metaKey) {
        e.preventDefault(); searchRef.current?.focus();
      }
      if (e.key==='?' && !e.ctrlKey && !e.metaKey) {
        e.preventDefault(); setShowShortcuts(prev => !prev);
      }
    };
    window.addEventListener('keydown', handler);
    return () => window.removeEventListener('keydown', handler);
  }, []);

  const checkMeetingNotifications = useCallback((rows) => {
    if (!('Notification' in window) || Notification.permission !== 'granted') return;
    const todayStr = new Date().toISOString().split('T')[0];
    const key = `notified_${todayStr}`;
    const notified = JSON.parse(localStorage.getItem(key)||'[]');
    const now = new Date();
    rows.forEach(p => {
      if (!p.meeting_at) return;
      const m = new Date(p.meeting_at);
      const diffH = (m - now) / 3600000;
      if (diffH >= 0 && diffH <= 24 && !notified.includes(p.slug)) {
        new Notification('📅 미팅 알림', {
          body: `${p.title||p.slug}\n${formatMeetingAt(p.meeting_at)}`,
          icon: 'https://firstpip.github.io/portfolio-showcase/dashboard/icon.png',
        });
        notified.push(p.slug);
      }
    });
    localStorage.setItem(key, JSON.stringify(notified));
  }, []);

  const loadMilestones = useCallback(async () => {
    const { data:rows, error } = await supabase.from(MILESTONES_TABLE).select('*').order('order_idx', { ascending:true });
    if (error) {
      if (error.code==='42P01' || error.message?.includes('does not exist') || error.message?.includes('relation')) {
        setMilestonesSetupNeeded(true);
        setMilestones({});
      } else {
        toast('작업 티켓 로드 실패: '+friendlyError(error),'error');
      }
      return;
    }
    const grouped = {};
    (rows||[]).forEach(m => {
      if (!grouped[m.project_slug]) grouped[m.project_slug] = [];
      grouped[m.project_slug].push(m);
    });
    setMilestones(grouped);
    setMilestonesSetupNeeded(false);
  }, []);

  const loadTeamMembers = useCallback(async () => {
    const { data:rows, error } = await supabase.from(TEAM_TABLE).select('*').order('created_at', { ascending:true });
    if (error) {
      if (error.code==='42P01' || error.message?.includes('does not exist') || error.message?.includes('relation')) {
        setTeamSetupNeeded(true);
      } else {
        toast('팀원 정보 로드 실패: '+friendlyError(error),'error');
      }
    } else {
      setTeamMembers(rows||[]);
      setTeamSetupNeeded(false);
    }
  }, [toast]);

  const loadData = useCallback(async () => {
    const { data:rows, error } = await supabase.from(TABLE).select('*').order('created_at', { ascending:false });
    if (error) { toast('데이터 로드 실패: '+friendlyError(error),'error'); setData([]); return; }
    const nowTs = Date.now();
    // 마이그레이션: portfolio_count만 있고 portfolio_links가 없는 프로젝트에 links 자동 생성 (세션당 1회)
    const migrateCooldown = 24 * 3600 * 1000;
    const lastMigrate = parseInt(localStorage.getItem('last_portfolio_migrate')||'0', 10);
    if (nowTs - lastMigrate > migrateCooldown) {
      const migrateTargets = rows.filter(r => (r.portfolio_count||0) > 0 && !(r.portfolio_links?.length > 0));
      if (migrateTargets.length > 0) {
        for (const r of migrateTargets) {
          const links = Array.from({ length: r.portfolio_count }, (_, i) => ({ label:`P${i+1}`, url:`https://Firstpip.github.io/portfolio-showcase/${r.slug}/portfolio-${i+1}/` }));
          r.portfolio_links = links;
          supabase.from(TABLE).update({ portfolio_links: links }).eq('slug', r.slug).then(({ error:e }) => { if (e) console.warn('portfolio_links 마이그레이션 실패:', r.slug, e.message); }).catch(err => console.warn('portfolio_links 마이그레이션 네트워크 오류:', r.slug, err.message));
        }
        localStorage.setItem('last_portfolio_migrate', String(nowTs));
      }
    }
    // 자동 삭제: 생성일 기준 30일 경과한 미선정 프로젝트 제거 (DB + GitHub Pages) — 24시간 쿨다운
    const deleteCooldown = 24 * 3600 * 1000;
    const lastAutoDelete = parseInt(localStorage.getItem('last_auto_delete')||'0', 10);
    let finalRows = rows;
    if (nowTs - lastAutoDelete > deleteCooldown) {
      const now = new Date();
      const autoDeleteTargets = rows.filter(r => r.current_status === 'lost' && daysBetween(r.created_at, now) >= 30);
      if (autoDeleteTargets.length > 0) {
        const slugs = autoDeleteTargets.map(r => r.slug);
        supabase.from(TABLE).delete().in('slug', slugs)
          .then(({ error:e }) => { if (e) console.warn('자동 삭제 실패:', e.message); });
        supabase.functions.invoke('delete-portfolios', { body: { slugs, all: true } })
          .catch(err => console.warn('자동 삭제 파일 정리 실패:', err.message));
        toast(`🗑️ 미선정 30일+ 경과 ${autoDeleteTargets.length}건 자동 삭제`, 'info');
        finalRows = rows.filter(r => !autoDeleteTargets.some(t => t.slug === r.slug));
        localStorage.setItem('last_auto_delete', String(nowTs));
      }
    }
    setData(finalRows); setConnected(true);
    checkMeetingNotifications(finalRows);
  }, [toast, checkMeetingNotifications]);

  useEffect(() => {
    loadData();
    loadTeamMembers();
    loadMilestones();
    const channel = supabase.channel(`wishket-realtime-${Math.random().toString(36).slice(2, 10)}`)
      .on('postgres_changes',{ event:'*', schema:'public', table:MILESTONES_TABLE },(payload) => {
        setMilestones(prev => {
          const next = { ...prev };
          if (payload.eventType==='DELETE') {
            const slug = payload.old?.project_slug;
            if (slug && next[slug]) next[slug] = next[slug].filter(m => m.id!==payload.old.id);
          } else {
            const row = payload.new;
            const slug = row.project_slug;
            const list = (next[slug]||[]).filter(m => m.id!==row.id);
            list.push(row);
            list.sort((a,b) => (a.order_idx||0)-(b.order_idx||0));
            next[slug] = list;
          }
          return next;
        });
      })
      .on('postgres_changes',{ event:'*', schema:'public', table:TABLE },(payload) => {
        if (payload.eventType==='UPDATE') setData(prev => prev?prev.map(d => d.slug===payload.new.slug?payload.new:d):prev);
        else if (payload.eventType==='INSERT') setData(prev => prev?[payload.new,...prev]:[payload.new]);
        else if (payload.eventType==='DELETE') setData(prev => prev?prev.filter(d => d.id!==payload.old.id):prev);
      })
      .on('postgres_changes',{ event:'*', schema:'public', table:TEAM_TABLE },(payload) => {
        if (payload.eventType === 'INSERT') {
          setTeamMembers(prev => {
            const newItem = payload.new;
            const newTime = new Date(newItem.created_at).getTime();
            const idx = prev.findIndex(m => new Date(m.created_at).getTime() > newTime);
            if (idx === -1) return [...prev, newItem];
            const next = prev.slice(); next.splice(idx, 0, newItem); return next;
          });
        } else if (payload.eventType === 'UPDATE') {
          setTeamMembers(prev => prev.map(m => m.id === payload.new.id ? payload.new : m));
        } else if (payload.eventType === 'DELETE') {
          setTeamMembers(prev => prev.filter(m => m.id !== payload.old.id));
        } else {
          loadTeamMembers(); // 알 수 없는 이벤트는 전체 리로드 fallback
        }
      })
      .subscribe();
    return () => { supabase.removeChannel(channel); };
  }, [loadData, loadTeamMembers, loadMilestones]);

  // Team CRUD
  const handleAddMember = useCallback(async (fields) => {
    const { data:newM, error } = await supabase.from(TEAM_TABLE).insert([fields]).select().single();
    if (error) { toast('팀원 추가 실패: '+friendlyError(error),'error'); return; }
    setTeamMembers(prev => [...prev,newM]);
    toast(`${fields.name} 추가 완료`,'success');
  }, [toast]);

  const handleUpdateMember = useCallback(async (id, fields) => {
    const { error } = await supabase.from(TEAM_TABLE).update(fields).eq('id',id);
    if (error) { toast('수정 실패: '+friendlyError(error),'error'); return; }
    setTeamMembers(prev => prev.map(m => m.id===id?{...m,...fields}:m));
    toast('수정 완료','success');
  }, [toast]);

  const handleDeactivateMember = useCallback(async (id) => {
    const { error } = await supabase.from(TEAM_TABLE).update({ is_active:false }).eq('id',id);
    if (error) { toast('비활성화 실패: '+friendlyError(error),'error'); return; }
    setTeamMembers(prev => prev.map(m => m.id===id?{...m,is_active:false}:m));
    toast('비활성화 완료','success');
  }, [toast]);

  // Default ticket assignee: main → sub (active members only).
  // assigned_manager는 "미팅 담당자(영업)"로 티켓 소유와 의미가 달라 폴백에서 제외.
  const defaultAssigneeFor = useCallback((slug) => {
    const project = data?.find(d => d.slug === slug);
    if (!project) return null;
    const isActive = (id) => !!id && !!teamMembers?.find(tm => tm.id === id && tm.is_active);
    if (isActive(project.assigned_main)) return project.assigned_main;
    if (isActive(project.assigned_sub))  return project.assigned_sub;
    return null;
  }, [data, teamMembers]);

  // Milestone CRUD
  const handleCreateMilestonesFromTemplate = useCallback(async (slug, templateKey) => {
    const tpl = MILESTONE_TEMPLATES[templateKey];
    if (!tpl) return;
    const assignee = defaultAssigneeFor(slug);
    // Cumulative planned dates from today, using phase default_days
    const toISODate = (d) => d.toISOString().split('T')[0];
    let cursor = new Date(); cursor.setHours(0,0,0,0);
    const rows = tpl.phases.map((p,i) => {
      const start = new Date(cursor);
      const end = new Date(cursor); end.setDate(end.getDate() + (p.default_days||1));
      cursor = new Date(end);
      return {
        project_slug: slug,
        phase_key: p.key,
        phase_label: p.label,
        order_idx: i,
        status: 'planned',
        blocked: false,
        planned_start: toISODate(start),
        planned_end: toISODate(end),
        assignee,
      };
    });
    const { data:inserted, error } = await supabase.from(MILESTONES_TABLE).insert(rows).select();
    if (error) {
      if (error.code==='42P01' || error.message?.includes('does not exist') || error.message?.includes('relation')) {
        setMilestonesSetupNeeded(true);
      }

  const handleMilestoneUpdate = useCallback(async (milestone, fields) => {
    setSaving(true);
    try {
    const payload = { ...fields, updated_at:new Date().toISOString() };
    // auto-set timestamps when status changes
    if (fields.status && fields.status !== milestone.status) {
      if (fields.status === 'in_progress' && !milestone.actual_start) payload.actual_start = new Date().toISOString();
      if (fields.status === 'done' && !milestone.actual_end) payload.actual_end = new Date().toISOString();
      // actual_end 는 done → 다른 상태로 되돌릴 때만 초기화 (진행 중 전환 시 날짜 보존)
      if (milestone.status === 'done' && fields.status !== 'done') payload.actual_end = null;
    }
    const { data:updated, error } = await supabase.from(MILESTONES_TABLE).update(payload).eq('id',milestone.id).select().single();
    if (error) { toast('저장 실패: '+friendlyError(error),'error'); return; }
    setMilestones(prev => {
      const next = { ...prev };
      const list = (next[milestone.project_slug]||[]).map(m => m.id===milestone.id?updated:m);
      next[milestone.project_slug] = list;
      return next;
    });
    // append milestone completion to project history (race-safe: read from latest state)
    if (fields.status === 'done' && milestone.status !== 'done') {
      const today = new Date().toISOString().split('T')[0];
      setData(prev => {
        if (!prev) return prev;
        const idx = prev.findIndex(d => d.slug === milestone.project_slug);
        if (idx < 0) return prev;
        const project = prev[idx];
        const entry = { status: project.current_status, date: today, note: `✅ ${milestone.phase_label} 완료` };
        const newHistory = [...(project.history||[]), entry];
        supabase.from(TABLE).update({ history:newHistory, updated_at:today }).eq('slug',project.slug).then(({ error:he }) => {
          if (he) toast('이력 저장 실패: '+he.message,'error');
        });
        const next = prev.slice();
        next[idx] = { ...project, history:newHistory, updated_at:today };
        return next;

    }

  }, [toast]);

  const handleMilestoneReorder = useCallback(async (milestone, direction) => {
    const list = [...(milestones[milestone.project_slug]||[])].sort((a,b)=>(a.order_idx||0)-(b.order_idx||0));
    const idx = list.findIndex(m => m.id === milestone.id);
    const nIdx = direction === 'up' ? idx - 1 : idx + 1;
    if (idx < 0 || nIdx < 0 || nIdx >= list.length) return;
    const neighbor = list[nIdx];
    const aOrder = milestone.order_idx;
    const bOrder = neighbor.order_idx;
    // Optimistic swap
    setMilestones(prev => {
      const next = { ...prev };
      next[milestone.project_slug] = (next[milestone.project_slug]||[]).map(m => {
        if (m.id === milestone.id) return { ...m, order_idx: bOrder };
        if (m.id === neighbor.id) return { ...m, order_idx: aOrder };
        return m;
      }).sort((a,b)=>(a.order_idx||0)-(b.order_idx||0));
      return next;
    });
    // Two-step persist; temporarily park milestone at sentinel to avoid unique-order conflicts if ever enforced
    const [r1, r2] = await Promise.all([
      supabase.from(MILESTONES_TABLE).update({ order_idx: bOrder }).eq('id', milestone.id),
      supabase.from(MILESTONES_TABLE).update({ order_idx: aOrder }).eq('id', neighbor.id),
    ]);
    if (r1.error || r2.error) toast('순서 변경 실패: '+(r1.error||r2.error).message,'error');
  }, [milestones, toast]);

  const backfillInFlightRef = useRef(new Set()); // slug 단위로 중복 방지
  const handleBackfillAssignees = useCallback(async (slug) => {

    const targets = (milestones[slug] || []).filter(m => !isActive(m.assignee));
    if (targets.length === 0) { toast('백필할 티켓이 없습니다','info'); return 0; }

    try {
      const ids = targets.map(m => m.id);

      description: Array.isArray(w.description) ? w.description : [],
    }));
    // Orphan detection: weeks that existed in the prior plan (or were referenced by tickets) but are missing from the new plan
    const project = data?.find(d => d.slug === slug);
    const prevPlan = Array.isArray(project?.weekly_plan) ? project.weekly_plan : [];
    const newWeekSet = new Set(weeklyPlan.map(w => w.week));
    const ticketList = milestones[slug] || [];
    const orphanGroups = {};
    ticketList.forEach(t => {
      if (t.week_number != null && !newWeekSet.has(t.week_number)) {
        if (!orphanGroups[t.week_number]) orphanGroups[t.week_number] = [];
        orphanGroups[t.week_number].push(t);
      }
    });
    const totalOrphan = Object.values(orphanGroups).reduce((s, arr) => s + arr.length, 0);

    const doSave = async () => {
      const prevPlan = project.weekly_plan ?? null;
      const { error } = await supabase.from(TABLE).update({ weekly_plan: weeklyPlan, updated_at:new Date().toISOString().split('T')[0] }).eq('slug', slug);
      if (error) {

        } else {
          toast('주차별 계획 저장 실패: '+friendlyError(error),'error');
        }
        return;
      }
      let orphanIds = [];
      if (totalOrphan > 0) {
        orphanIds = Object.values(orphanGroups).flat().map(t => t.id);
        const { error: mErr } = await supabase.from(MILESTONES_TABLE).update({ week_number: null }).in('id', orphanIds);
        if (mErr) {
          const { error: rollbackErr } = await supabase.from(TABLE).update({ weekly_plan: prevPlan }).eq('slug', slug);
          if (rollbackErr) {
            toast('고아 티켓 주차 해제 실패 + 롤백도 실패 — 페이지를 새로고침하고 주차 계획을 다시 확인하세요','error');
          } else {
            toast('고아 티켓 주차 해제 실패: '+mErr.message+' · 계획 저장 롤백됨','error');
          }
          return;

      setData(prev => prev.map(d => d.slug===slug ? { ...d, weekly_plan: weeklyPlan } : d));
      setSelectedProject(prev => prev && prev.slug===slug ? { ...prev, weekly_plan: weeklyPlan } : prev);
      if (orphanIds.length > 0) {
        setMilestones(prev => ({
          ...prev,
          [slug]: (prev[slug]||[]).map(m => orphanIds.includes(m.id) ? { ...m, week_number: null } : m),
        }));
      }
      toast(`📅 ${weeks.length}주차 계획 저장 완료${totalOrphan>0 ? ` · ${totalOrphan}개 티켓 주차 해제` : ''}`,'success');
    };

    if (totalOrphan > 0) {
      const weekList = Object.keys(orphanGroups).map(Number).sort((a,b)=>a-b).join(', ');
      setConfirmState({
        title: '사라지는 주차가 있습니다',
        message: `${weekList}주차가 새 계획에 포함되지 않습니다.\n해당 주차에 배정된 ${totalOrphan}개 티켓의 주차 연결이 해제됩니다.\n\n계속할까요?`,
        confirmLabel: '저장하고 주차 해제',
        destructive: true,
        onConfirm: () => { doSave(); },

      await doSave();
    }

    setSaving(true);
    try {
      const { data:newRow, error } = await supabase.from(TABLE).insert([fields]).select().single();
      if (error) throw error;
      setData(prev => [newRow, ...prev]);
      toast(`✅ ${fields.title} 등록 완료`, 'success');
    } catch(err) { toast('등록 실패: '+err.message, 'error'); } finally { setSaving(false); }
  }, [toast]);

  const handleSort = useCallback((key) => {
    if (sortKey===key) setSortOrder(prev => prev==='desc'?'asc':'desc');
    else { setSortKey(key); setSortOrder('desc'); }
  }, [sortKey]);

  const milestoneStats = useMemo(() => {
    const stats = {};
    Object.entries(milestones).forEach(([slug, ms]) => {
      const list = ms || [];
      let done = 0;
      const weekSet = new Set();
      for (const m of list) {
        if (m.status === 'done') done++;
        if (m.week_number != null) weekSet.add(m.week_number);
      }
      stats[slug] = { total: list.length, done, uniqueWeeks: weekSet.size };
    });
    return stats;
  }, [milestones]);

  const avgWonDays = useMemo(() => {
    if (!data) return null;
    const samples = [];
    data.forEach(d => {
      if (d.current_status !== 'won' || !d.created_at) return;
      const wonDate = (d.history||[]).filter(h => h.status==='won').pop()?.date;
      if (!wonDate) return;
      samples.push(daysBetween(d.created_at, wonDate));
    });
    if (samples.length === 0) return null;
    return Math.round(samples.reduce((a,b) => a+b, 0) / samples.length);
  }, [data]);

  if (!data) return <Loading />;

  // Project view route
  if (route.name === 'project') {
    const proj = data.find(d => d.slug === route.slug);
    return (
      <div>
        <ToastContainer toasts={toasts} />
        <ConfirmModal state={confirmState} onCancel={() => setConfirmState(null)} />
        <ProjectView
          project={proj}
          milestones={milestones[route.slug] || []}
          setupNeeded={milestonesSetupNeeded}
          teamMembers={teamMembers}
          saving={saving}
          onUpdate={handleMilestoneUpdate}
          onDelete={handleMilestoneDelete}
          onAdd={handleMilestoneAdd}
          onBulkAdd={handleMilestoneBulkAdd}
          onReorder={handleMilestoneReorder}
          onCreateFromTemplate={handleCreateMilestonesFromTemplate}
          onBulkCreateWeekly={handleBulkCreateWeekly}
          onClearWeeklyPlan={handleClearWeeklyPlan}
          onBackfillAssignees={handleBackfillAssignees}
          onRequestConfirm={setConfirmState}
          onFieldSave={handleFieldSave}
          onBack={() => navigate({ name:'table' })}
        />
      </div>
    );
  }

  const counts = { total:data.length };
  STATUS_ORDER.forEach(s => counts[s]=data.filter(d=>d.current_status===s).length);
  const appliedOrBeyond = data.filter(d=>d.current_status!=='generated').length;
  const wonCount = counts.won||0;
  const winRate  = appliedOrBeyond > 0 ? ((wonCount/appliedOrBeyond)*100).toFixed(1) : '0.0';

  const now = new Date();
  const weekStart = new Date(now); weekStart.setDate(now.getDate()-now.getDay());
  const weekEnd   = new Date(weekStart); weekEnd.setDate(weekStart.getDate()+7);
  const thisWeekMeetings = data.filter(d => d.meeting_at && new Date(d.meeting_at)>=weekStart && new Date(d.meeting_at)<weekEnd);
  const staleCount = data.filter(d => d.current_status==='applied' && d.created_at && daysBetween(d.created_at,now)>=30).length;
  const activeMembers = teamMembers.filter(m => m.is_active);

  return (
    <div>
      <ToastContainer toasts={toasts} />
      <ConfirmModal state={confirmState} onCancel={() => setConfirmState(null)} />
      {showShortcuts && <ShortcutHelp onClose={() => setShowShortcuts(false)} />}
      {selectedProject && (
        <StatusModal
          key={selectedProject.slug+'-'+selectedProject.current_status}
          project={selectedProject}
          onClose={() => setSelectedProject(null)}
          onSave={handleSave}
          onFieldSave={handleFieldSave}
          onDelete={handleDelete}
          saving={saving}
          teamMembers={teamMembers}
          milestones={milestones[selectedProject.slug]||[]}
          milestonesSetupNeeded={milestonesSetupNeeded}
          onMilestoneUpdate={handleMilestoneUpdate}
          onMilestoneDelete={handleMilestoneDelete}
          onMilestoneAdd={handleMilestoneAdd}
          onMilestoneReorder={handleMilestoneReorder}
          onCreateFromTemplate={handleCreateMilestonesFromTemplate}
          onBulkCreateWeekly={handleBulkCreateWeekly}
          onClearWeeklyPlan={handleClearWeeklyPlan}
          onOpenProjectView={(slug) => navigate({ name:'project', slug })}
          onRequestConfirm={setConfirmState}
          onBackfillAssignees={handleBackfillAssignees}
        />
      )}
      {showQuickAdd && (
        <QuickAddModal
          onClose={() => setShowQuickAdd(false)}
          onAdd={handleQuickAdd}
          saving={saving}
        />
      )}
      {showTeamMgr && (
        <TeamMgrModal
          members={teamMembers}
          projects={data}
          onClose={() => setShowTeamMgr(false)}
          onAdd={handleAddMember}
          onUpdate={handleUpdateMember}
          onDeactivate={handleDeactivateMember}
        />
      )}

      {/* Header */}
      <div className="fade-in" style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:'1.25rem', flexWrap:'wrap', gap:'0.75rem' }}>
        <h1 style={{ fontSize:'1.3rem', fontWeight:700, letterSpacing:'-0.02em' }}>위시켓 현황 대시보드</h1>
        <div style={{ display:'flex', gap:8, alignItems:'center', flexWrap:'wrap' }}>
          <button onClick={() => setShowQuickAdd(true)} style={{
            padding:'0.3rem 0.7rem', borderRadius:6, border:'none',
            background:'var(--accent)', color:'#fff', cursor:'pointer', fontSize:'0.8rem', fontWeight:600,
            display:'flex', alignItems:'center', gap:4,
          }}>＋ 등록</button>
          {isAdmin && <button onClick={() => setShowTeamMgr(true)} style={{
            padding:'0.3rem 0.7rem', borderRadius:6, border:'1px solid var(--border)',
            background:'transparent', color:'var(--text2)', cursor:'pointer', fontSize:'0.8rem',
            display:'flex', alignItems:'center', gap:5,
          }}>
            👥 팀원{activeMembers.length>0?` ${activeMembers.length}명`:''}
          </button>}
          <span style={{ fontSize:'0.8rem', color:'var(--text2)' }}>{data.length}건</span>
          <div style={{ padding:'0.3rem 0.6rem', borderRadius:6, fontSize:'0.8rem', fontWeight:500, background:connected?'#00b89430':'#e1705530', color:connected?'#00b894':'#e17055', display:'flex', alignItems:'center', gap:5 }}>
            <span style={{ width:6, height:6, borderRadius:'50%', background:connected?'#00b894':'#e17055', animation:connected?'pulse 2s infinite':'none' }} />
            {connected?'Live':'Offline'}
          </div>
          <div style={{ display:'flex', gap:4, alignItems:'center' }}>
            <button onClick={() => exportCSV(data)} title="CSV 내보내기"
              style={{ padding:'0.3rem 0.5rem', borderRadius:6, border:'1px solid var(--border)', background:'transparent', color:'var(--text2)', cursor:'pointer', fontSize:'0.8rem', lineHeight:1 }}>
              CSV
            </button>
            <button onClick={toggleTheme} title={theme === 'dark' ? '라이트 모드로 전환' : '다크 모드로 전환'}
              style={{ padding:'0.3rem 0.5rem', borderRadius:6, border:'1px solid var(--border)', background:'transparent', color:'var(--text2)', cursor:'pointer', fontSize:'0.8rem', lineHeight:1 }}>
              {theme === 'dark' ? '☀️' : '🌙'}
            </button>
          </div>
          <div style={{ width:1, height:16, background:'var(--border)' }} />
          <div style={{ display:'flex', alignItems:'center', gap:6 }}>
            {currentMember && <MemberAvatar member={currentMember} size={20} />}
            <span style={{ fontSize:'0.8rem', color:'var(--text)', fontWeight:500 }}>{displayName}</span>
            {isAdmin && <span style={{ fontSize:'0.65rem', padding:'0.1rem 0.35rem', borderRadius:4, background:'var(--accent)30', color:'var(--accent)', fontWeight:600 }}>관리자</span>}
            <button onClick={() => supabase.auth.signOut()} title={session?.user?.email}
              style={{ padding:'0.2rem 0.5rem', borderRadius:5, border:'1px solid var(--border)', background:'transparent', color:'var(--text2)', cursor:'pointer', fontSize:'0.75rem', lineHeight:1 }}>
              로그아웃
            </button>
          </div>
        </div>
      </div>

      {/* DB 설정 배너 */}
      {teamSetupNeeded && <DBSetupBanner sql={SETUP_SQL} />}

      {/* 내 담당 프로젝트 — 수주 후 작업 페이지 바로가기 */}
      {currentMember && (() => {
        const myProjects = data.filter(d =>
          HAS_MILESTONES.includes(d.current_status) && d.assigned_manager === currentMember.id
        );
        if (myProjects.length === 0) return null;
        return (
          <div className="fade-in" style={{ marginBottom:'1rem' }}>
            <div style={{ fontSize:'0.8rem', color:'var(--text2)', marginBottom:6, fontWeight:500 }}>
              내 담당 프로젝트
            </div>
            <div style={{ display:'flex', gap:8, overflowX:'auto', paddingBottom:4 }}>
              {myProjects.map(p => {
                const meta = STATUS_META[p.current_status]||{};
                const stat = milestoneStats[p.slug] || { total:0, done:0, uniqueWeeks:0 };
                const doneCount = stat.done;
                const totalCount = stat.total;
                const ticketPct = totalCount > 0 ? Math.round((doneCount/totalCount)*100) : -1;
                const totalWeeks = Array.isArray(p.weekly_plan) && p.weekly_plan.length > 0
                  ? p.weekly_plan.length
                  : stat.uniqueWeeks;
                const curWeek = getCurrentWeek(p.start_date);
                const hasSchedule = totalWeeks > 0 && p.start_date;
                const weekPct = hasSchedule ? (curWeek != null ? Math.min(Math.round((curWeek / totalWeeks) * 100), 100) : 0) : -1;
                const overdue = hasSchedule && curWeek != null && curWeek > totalWeeks;
                const isBeforeStartDate = hasSchedule && curWeek == null;
                return (
                  <div key={p.slug} role="button" tabIndex={0}
                    aria-label={`${meta.label} - ${p.title||p.slug}${hasSchedule && curWeek != null ? `, ${overdue ? '일정 초과' : `${curWeek}/${totalWeeks}주차`}` : ''}${ticketPct >= 0 ? `, 티켓 ${doneCount}/${totalCount}` : ''}`}
                    onClick={() => navigate({ name:'project', slug:p.slug })}
                    onKeyDown={e => { if (e.key==='Enter' || e.key===' ') { e.preventDefault(); navigate({ name:'project', slug:p.slug }); } }}
                    style={{
                      flex:'1 1 180px', minWidth:180, maxWidth:320, padding:'0.6rem 0.8rem', borderRadius:10,
                      background:'var(--surface)', border:`1px solid ${meta.color}33`,
                      cursor:'pointer', transition:'all 0.15s',
                    }}
                    onMouseEnter={e => { e.currentTarget.style.borderColor=meta.color+'88'; e.currentTarget.style.transform='translateY(-1px)'; }}
                    onMouseLeave={e => { e.currentTarget.style.borderColor=meta.color+'33'; e.currentTarget.style.transform='none'; }}>
                    <div style={{ display:'flex', alignItems:'center', gap:6, marginBottom:4 }}>
                      <span style={{ padding:'0.1rem 0.4rem', borderRadius:4, fontSize:'0.7rem', fontWeight:600, background:meta.color+'25', color:meta.color }}>{meta.emoji} {meta.label}</span>
                    </div>
                    <div style={{ fontSize:'0.8rem', fontWeight:600, color:'var(--text)', whiteSpace:'nowrap', overflow:'hidden', textOverflow:'ellipsis' }}>{p.title||p.slug}</div>
                    {(weekPct >= 0 || ticketPct >= 0) && (
                      <div style={{ marginTop:6, display:'flex', flexDirection:'column', gap:4 }}>
                        {weekPct >= 0 && (
                          <div style={{ display:'flex', alignItems:'center', gap:6 }}>
                            <span style={{ fontSize:'0.65rem', color:'var(--text2)', width:14, flexShrink:0 }} aria-hidden="true">📅</span>
                            <div role="progressbar" aria-label="주차 진행률" aria-valuenow={weekPct} aria-valuemin={0} aria-valuemax={100} style={{ flex:1, height:4, borderRadius:2, background:'var(--surface2)', overflow:'hidden' }}>
                              <div style={{ width:weekPct+'%', height:'100%', borderRadius:2, background:overdue?'#e17055':weekPct===100?'var(--green)':meta.color, transition:'width 0.3s' }} />
                            </div>
                            <span style={{ fontSize:'0.65rem', color:overdue?'#e17055':'var(--text2)', flexShrink:0, fontWeight:overdue?600:400 }}>{isBeforeStartDate ? '착수 전' : overdue ? `⚠ ${curWeek}/${totalWeeks}주` : `${curWeek}/${totalWeeks}주`}</span>
                          </div>
                        )}
                        {ticketPct >= 0 && (
                          <div style={{ display:'flex', alignItems:'center', gap:6 }}>
                            <span style={{ fontSize:'0.65rem', color:'var(--text2)', width:14, flexShrink:0 }} aria-hidden="true">🎫</span>
                            <div role="progressbar" aria-label="티켓 완료율" aria-valuenow={ticketPct} aria-valuemin={0} aria-valuemax={100} style={{ flex:1, height:4, borderRadius:2, background:'var(--surface2)', overflow:'hidden' }}>
                              <div style={{ width:ticketPct+'%', height:'100%', borderRadius:2, background:ticketPct===100?'var(--green)':'var(--green)', opacity:0.6, transition:'width 0.3s' }} />
                            </div>
                            <span style={{ fontSize:'0.65rem', color:'var(--text2)', flexShrink:0 }}>{doneCount}/{totalCount}</span>
                          </div>
                        )}
                      </div>
                    )}
                  </div>
                );
              })}
            </div>
          </div>
        );
      })()}

      {/* 주간 알림 */}
      {(thisWeekMeetings.length>0||staleCount>0) && (
        <div className="fade-in" style={{ display:'flex', gap:'0.6rem', marginBottom:'1rem', flexWrap:'wrap' }}>
          {thisWeekMeetings.length>0 && (
            <div style={{ flex:'1 1 0', minWidth:0, padding:'0.5rem 0.8rem', borderRadius:8, background:'#fdcb6e1a', border:'1px solid #fdcb6e33', fontSize:'0.8rem', color:'var(--yellow)', display:'flex', alignItems:'center', gap:6, flexWrap:'wrap' }}>
              <span style={{ fontWeight:600, flexShrink:0 }}>📅 이번 주 미팅 {thisWeekMeetings.length}건</span>
              <span style={{ fontSize:'0.8rem', color:'var(--text2)', overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap', minWidth:0, flex:1 }}>{thisWeekMeetings.map(m=>(m.title||m.slug).substring(0,15)).join(', ')}</span>
              {'Notification' in window && Notification.permission === 'default' && (
                <button onClick={() => Notification.requestPermission()}
                  style={{ padding:'0.15rem 0.5rem', borderRadius:4, border:'1px solid #fdcb6e55', background:'transparent', color:'var(--yellow)', cursor:'pointer', fontSize:'0.8rem', fontWeight:600, flexShrink:0 }}>
                  🔔 알림 허용
                </button>
              )}
            </div>
          )}
          {staleCount>0 && (
            <div onClick={() => setFilter('applied')} style={{ flexShrink:0, padding:'0.5rem 0.8rem', borderRadius:8, background:'#e1705518', border:'1px solid #e1705533', fontSize:'0.8rem', color:'#e17055', cursor:'pointer', display:'flex', alignItems:'center', gap:6 }}>
              ⏰ 30일+ 무응답 {staleCount}건
            </div>
          )}
        </div>
      )}

      {/* 검색 + 상태 필터 */}
      <div className="fade-in delay-1" style={{ display:'flex', gap:'0.6rem', marginBottom:'0.75rem', flexWrap:'wrap', alignItems:'center' }}>
        <input ref={searchRef} type="text" placeholder="검색... ( / )" value={search} onChange={e => setSearch(e.target.value)}
          style={{ padding:'0.4rem 0.75rem', borderRadius:8, border:'1px solid var(--border)', background:'var(--surface2)', color:'var(--text)', fontSize:'0.8rem', flex:'1 1 180px', minWidth:180, maxWidth:280, outline:'none' }}
          onFocus={e => e.target.style.borderColor='var(--accent)'}
          onBlur={e  => e.target.style.borderColor='var(--border)'} />
        <FilterTabs active={filter} onChange={setFilter} counts={counts} />
        <div style={{ marginLeft:'auto', display:'flex', gap:3 }}>
          {[{key:'all',label:'전체'},{key:'7d',label:'7일'},{key:'30d',label:'30일'},{key:'90d',label:'90일'}].map(d => (
            <button key={d.key} onClick={() => setDateRange(d.key)} style={{
              padding:'0.3rem 0.55rem', borderRadius:6, border:'none', cursor:'pointer',
              fontSize:'0.8rem', fontWeight:dateRange===d.key?600:400,
              background:dateRange===d.key?'var(--surface2)':'transparent',
              color:dateRange===d.key?'var(--text)':'var(--text2)',
            }}>{d.label}</button>
          ))}
        </div>
      </div>

      {/* 담당자 필터 (팀원이 있을 때만 표시) */}
      {activeMembers.length > 0 && (
        <div style={{ display:'flex', gap:8, marginBottom:'1rem', flexWrap:'wrap', alignItems:'center' }}>
          <span style={{ fontSize:'0.8rem', color:'var(--text2)', flexShrink:0 }}>담당:</span>
          <button onClick={() => setMemberFilter('')} style={{
            padding:'0.25rem 0.65rem', borderRadius:20, cursor:'pointer',
            border:!memberFilter?'1px solid var(--accent)':'1px solid transparent',
            background:!memberFilter?'var(--accent)30':'var(--surface2)',
            color:!memberFilter?'var(--accent)':'var(--text2)',
            fontSize:'0.8rem', fontWeight:!memberFilter?600:400,
          }}>전체</button>
          {activeMembers.map(m => {
            const sel = memberFilter===m.id;
            const cnt = data.filter(d => (d.assigned_manager===m.id||d.assigned_main===m.id||d.assigned_sub===m.id) && ['interview','meeting_done'].includes(d.current_status)).length;
            return (
              <button key={m.id} onClick={() => setMemberFilter(sel?'':m.id)} style={{
                padding:'0.25rem 0.6rem 0.25rem 0.3rem', borderRadius:20, cursor:'pointer',
                border:sel?`1px solid ${m.color}`:'1px solid transparent',
                background:sel?m.color+'30':'var(--surface2)',
                display:'inline-flex', alignItems:'center', gap:5,
              }}>
                <MemberAvatar member={m} size={16} />
                <span style={{ fontSize:'0.8rem', fontWeight:sel?600:400, color:sel?m.color:'var(--text2)' }}>{m.name}</span>
                {cnt>0 && <span style={{ fontSize:'0.8rem', color:sel?m.color:'var(--text2)', opacity:0.8 }}>{cnt}</span>}
              </button>
            );
          })}
        </div>
      )}

      {/* 테이블 */}
      <div className="fade-in delay-2" style={{ marginBottom:'1.75rem' }}>
        <ProjectTable
          data={data} filter={filter} search={search} dateRange={dateRange}
          onRowClick={handleRowClick} sortKey={sortKey} sortOrder={sortOrder} onSort={handleSort}
          onBatchLost={handleBatchLost} onMemoSave={handleMemoSave}
          memberFilter={memberFilter} teamMembers={teamMembers}
          milestones={milestones}
          milestonesSetupNeeded={milestonesSetupNeeded}
          onQuickApplyTemplate={handleCreateMilestonesFromTemplate}
          onOpenProject={(slug) => navigate({ name:'project', slug })}
        />
      </div>

      {/* KPI 바 (상시 노출) */}
      {(() => {
        const wonBudgetTotal = data.filter(d=>d.current_status==='won').reduce((sum,d)=>sum+parseBudgetNum(d.budget),0);
        const activeMeetings = (counts.interview||0) + (counts.meeting_done||0);
        const inProg = POST_WON.reduce((s,k)=>s+(counts[k]||0),0);
        const kpiStyle = { flex:'1 1 0', minWidth:'fit-content', display:'flex', alignItems:'center', justifyContent:'center', gap:6, padding:'0.45rem 0.85rem', borderRadius:8, background:'var(--surface)', border:'1px solid var(--border)', fontSize:'0.8rem', whiteSpace:'nowrap' };
        const numStyle = (color) => ({ fontWeight:700, fontSize:'0.95rem', color });
        return (
          <div className="fade-in delay-2" style={{ display:'flex', gap:8, flexWrap:'wrap', marginBottom:'1rem' }}>
            <div style={kpiStyle}>
              <span style={{ color:'var(--text2)' }}>수주율</span>
              <span style={numStyle('var(--green)')}>{winRate}%</span>
              <span style={{ color:'var(--text2)', fontSize:'0.8rem' }}>({wonCount}/{appliedOrBeyond})</span>
            </div>
            {wonBudgetTotal > 0 && (
              <div style={kpiStyle}>
                <span style={{ color:'var(--text2)' }}>수주 금액</span>
                <span style={numStyle('var(--green)')}>{wonBudgetTotal.toLocaleString()}만원</span>
              </div>
            )}
            {activeMeetings > 0 && (
              <div style={kpiStyle}>
                <span style={{ color:'var(--text2)' }}>활성 미팅</span>
                <span style={numStyle('var(--yellow)')}>{activeMeetings}건</span>
              </div>
            )}
            {inProg > 0 && (
              <div style={kpiStyle}>
                <span style={{ color:'var(--text2)' }}>진행 중</span>
                <span style={numStyle('var(--accent2)')}>{inProg}건</span>
              </div>
            )}
            {avgWonDays !== null && (
              <div style={kpiStyle}>
                <span style={{ color:'var(--text2)' }}>평균 수주</span>
                <span style={numStyle('var(--blue)')}>{avgWonDays}일</span>
              </div>
            )}
          </div>
        );
      })()}

      {/* 통계 상세 */}
      <div style={{ marginBottom:'1.5rem' }}>
        <button onClick={() => setShowStats(prev=>!prev)} style={{
          display:'flex', alignItems:'center', gap:6, background:'none', border:'none',
          color:'var(--text2)', cursor:'pointer', fontSize:'0.85rem', fontWeight:500, padding:'0.4rem 0',
        }}>
          <span style={{ transition:'transform 0.2s', transform:showStats?'rotate(90deg)':'rotate(0)', display:'inline-block' }}>&#9654;</span>
          상세 통계 {showStats?'':'(퍼널 · 월별 추이 · 예산 분석)'}
        </button>
        {showStats && (
          <div style={{ animation:'fadeIn 0.25s ease-out' }}>
            {(() => {
              const wonBudgetTotal = data.filter(d=>d.current_status==='won').reduce((sum,d)=>sum+parseBudgetNum(d.budget),0);
              const wonBudgetStr = wonBudgetTotal>0?wonBudgetTotal.toLocaleString()+'만원':'—';
              return (
                <div style={{ display:'flex', gap:'0.75rem', flexWrap:'wrap', marginTop:'0.75rem', marginBottom:'1rem' }}>
                  <StatCard title="총 프로젝트" value={data.length} sub={`생성 ${counts.generated||0} / 지원 ${appliedOrBeyond}`} delay={1} />
                  <StatCard title="수주율" value={`${winRate}%`} sub={`${wonCount} / ${appliedOrBeyond} (지원 기준)`} color="var(--green)" delay={1} />
                  <StatCard title="수주 금액" value={wonBudgetStr} sub={`${wonCount}건 합산`} color="var(--green)" delay={1} />
                  <StatCard title="수주 후 진행" value={POST_WON.reduce((s,k)=>s+(counts[k]||0),0)}
                    sub={POST_WON.map(k=>counts[k]>0?`${STATUS_META[k].label} ${counts[k]}`:'').filter(Boolean).join(' · ')||'없음'} color="var(--accent2)" delay={1} />
                  {avgWonDays!==null && <StatCard title="평균 수주 소요" value={`${avgWonDays}일`} sub={`${wonCount}건 평균`} color="var(--blue)" delay={1} />}
                </div>
              );
            })()}
            <Funnel data={data} />
            <MonthlyChart data={data} />
            <BudgetAnalysis data={data} />
          </div>
        )}
      </div>

      <div style={{ textAlign:'center', padding:'1rem 0', color:'var(--text2)', fontSize:'0.8rem' }}>
        Wishket Portfolio Tracker — Firstpip · <span style={{ cursor:'pointer' }} onClick={() => setShowShortcuts(true)} title="키보드 단축키">단축키 <kbd style={{ padding:'0.1rem 0.35rem', borderRadius:3, background:'var(--surface2)', border:'1px solid var(--border)', fontSize:'0.8rem' }}>?</kbd></span>
      </div>
    </div>
  );
}

// ─── QuickAddModal ───
function QuickAddModal({ onClose, onAdd, saving }) {
  const [url, setUrl]     = useState('');
  const [title, setTitle] = useState('');
  const [budget, setBudget] = useState('');
  const [slug, setSlug]   = useState('');
  const [slugEdited, setSlugEdited] = useState(false);

  useEffect(() => {
    const handler = e => { if (e.key === 'Escape') onClose(); };
    window.addEventListener('keydown', handler);
    return () => window.removeEventListener('keydown', handler);
  }, [onClose]);

  const extractSlug = (inputUrl) => {
    const match = inputUrl.match(/\/project\/(\d+)/);
    if (match && !slugEdited) {
      const d = new Date();
      const pad = n => String(n).padStart(2,'0');
      const prefix = `${String(d.getFullYear()).slice(2)}${pad(d.getMonth()+1)}${pad(d.getDate())}`;
      setSlug(`${prefix}_${match[1]}`);
    }
  };

  const handleUrlChange = (val) => {
    setUrl(val);
    extractSlug(val);
  };

  const handleBudgetChange = (val) => {
    const digits = val.replace(/[^0-9]/g,'');
    setBudget(digits ? Number(digits).toLocaleString() : '');
  };

  const handleSubmit = async () => {
    if (!slug.trim() || !title.trim()) return;
    const today = new Date().toISOString().split('T')[0];
    const budgetVal = budget ? budget.replace(/,/g,'')+'만원' : null;
    await onAdd({
      slug: slug.trim(),
      title: title.trim(),
      budget: budgetVal,
      wishket_url: url||null,
      current_status: 'applied',
      created_at: today,
      updated_at: today,
      history: [{ status:'applied', date:today, note:'대시보드에서 등록' }],
    });
    onClose();
  };

  const inputS = { width:'100%', padding:'0.55rem 0.75rem', borderRadius:8, border:'1px solid var(--border)', background:'var(--surface2)', color:'var(--text)', fontSize:'0.85rem', outline:'none' };
  const canSubmit = slug.trim() && title.trim() && !saving;

  return (
    <div onClick={onClose} style={{ position:'fixed', inset:0, background:'var(--overlay)', backdropFilter:'blur(4px)', display:'flex', alignItems:'center', justifyContent:'center', zIndex:1100 }}>
      <div onClick={e => e.stopPropagation()} style={{
        background:'var(--surface)', borderRadius:16, width:'100%', maxWidth:440,
        border:'1px solid var(--border)', animation:'slideUp 0.25s ease-out',
        boxShadow:'0 20px 60px var(--shadow)',
      }}>
        <div style={{ padding:'1.25rem 1.5rem', borderBottom:'1px solid var(--border)', display:'flex', justifyContent:'space-between', alignItems:'center' }}>
          <div style={{ fontWeight:700, fontSize:'1rem' }}>프로젝트 빠른 등록</div>
          <button onClick={onClose} style={{ background:'none', border:'none', color:'var(--text2)', cursor:'pointer', fontSize:'1.1rem' }}>✕</button>
        </div>
        <div style={{ padding:'1.25rem 1.5rem', display:'flex', flexDirection:'column', gap:12 }}>
          <div>
            <div style={{ fontSize:'0.8rem', color:'var(--text2)', marginBottom:5, fontWeight:500 }}>위시켓 공고 URL</div>
            <input type="url" value={url} onChange={e => handleUrlChange(e.target.value)}
              placeholder="https://www.wishket.com/project/123456/"
              style={inputS}
              onFocus={e => e.target.style.borderColor='var(--accent)'}
              onBlur={e  => e.target.style.borderColor='var(--border)'} />
            {slug && <div style={{ fontSize:'0.8rem', color:'var(--accent2)', marginTop:4 }}>슬러그 자동 생성: <code>{slug}</code></div>}
          </div>
          <div>
            <div style={{ fontSize:'0.8rem', color:'var(--text2)', marginBottom:5, fontWeight:500 }}>슬러그 <span style={{ color:'#e17055' }}>*</span></div>
            <input type="text" value={slug} onChange={e => { setSlug(e.target.value); setSlugEdited(true); }}
              placeholder="260409_project-name"
              style={inputS}
              onFocus={e => e.target.style.borderColor='var(--accent)'}
              onBlur={e  => e.target.style.borderColor='var(--border)'} />
          </div>
          <div>
            <div style={{ fontSize:'0.8rem', color:'var(--text2)', marginBottom:5, fontWeight:500 }}>프로젝트명 <span style={{ color:'#e17055' }}>*</span></div>
            <input type="text" value={title} onChange={e => setTitle(e.target.value)}
              placeholder="AI 챗봇 개발"
              onKeyDown={e => e.key==='Enter' && canSubmit && handleSubmit()}
              style={inputS}
              onFocus={e => e.target.style.borderColor='var(--accent)'}
              onBlur={e  => e.target.style.borderColor='var(--border)'} />
          </div>
          <div>
            <div style={{ fontSize:'0.8rem', color:'var(--text2)', marginBottom:5, fontWeight:500 }}>예산 (선택)</div>
            <div style={{ display:'flex', alignItems:'center' }}>
              <input type="text" value={budget} onChange={e => handleBudgetChange(e.target.value)}
                placeholder="2,000"
                style={{ ...inputS, borderTopRightRadius:0, borderBottomRightRadius:0, borderRight:'none' }}
                onFocus={e => e.target.style.borderColor='var(--accent)'}
                onBlur={e  => e.target.style.borderColor='var(--border)'} />
              <span style={{ padding:'0.55rem 0.7rem', borderRadius:'0 8px 8px 0', fontSize:'0.85rem', background:'var(--border)', color:'var(--text2)', border:'1px solid var(--border)', whiteSpace:'nowrap' }}>만원</span>
            </div>
          </div>
          <button onClick={handleSubmit} disabled={!canSubmit} style={{
            marginTop:4, padding:'0.65rem', borderRadius:10, border:'none',
            cursor:canSubmit?'pointer':'not-allowed',
            background:canSubmit?'var(--accent)':'var(--surface2)',
            color:canSubmit?'#fff':'var(--text2)',
            fontSize:'0.9rem', fontWeight:700, opacity:saving?0.7:1,
          }}>
            {saving?'등록 중...':'등록 (지원완료 상태로 시작)'}
          </button>
        </div>
      </div>
    </div>
  );
}

// ─── LoginScreen ───
const MAX_ATTEMPTS = 5;
const LOCKOUT_SEC  = 30;
const LS_KEY = 'dashboard_login_lock';

function readLockState() {
  try {
    const raw = localStorage.getItem(LS_KEY);
    if (!raw) return { attempts: 0, lockedUntil: null };
    return JSON.parse(raw);
  } catch { return { attempts: 0, lockedUntil: null }; }
}

function writeLockState(state) {
  try { localStorage.setItem(LS_KEY, JSON.stringify(state)); } catch {}
}

function clearLockState() {
  try { localStorage.removeItem(LS_KEY); } catch {}
}

function LoginScreen() {
  const { theme, toggle: toggleTheme } = useTheme();
  const [email, setEmail]       = useState('');
  const [password, setPassword] = useState('');
  const [loading, setLoading]   = useState(false);
  const [error, setError]       = useState('');
  const [lockState, setLockState] = useState(() => readLockState());
  const [countdown, setCountdown] = useState(0);

  const { attempts, lockedUntil } = lockState;
  const isLocked = !!lockedUntil && Date.now() < lockedUntil;

  // 잠금 카운트다운 (새로고침 후에도 localStorage에서 복원)
  useEffect(() => {
    if (!lockedUntil) return;
    const tick = () => {
      const rem = Math.ceil((lockedUntil - Date.now()) / 1000);
      if (rem <= 0) {
        const next = { attempts: 0, lockedUntil: null };
        clearLockState();
        setLockState(next);
        setCountdown(0);
      } else {
        setCountdown(rem);
      }
    };
    tick();
    const id = setInterval(tick, 500);
    return () => clearInterval(id);
  }, [lockedUntil]);

  const handleLogin = async (e) => {
    e.preventDefault();
    if (isLocked) return;
    setLoading(true); setError('');
    const { error } = await supabase.auth.signInWithPassword({ email, password });
    if (error) {
      const msg = error.message === 'Invalid login credentials' ? '이메일 또는 비밀번호가 올바르지 않습니다.' : error.message;
      const next = attempts + 1;
      const newState = next >= MAX_ATTEMPTS
        ? { attempts: next, lockedUntil: Date.now() + LOCKOUT_SEC * 1000 }
        : { attempts: next, lockedUntil: null };
      writeLockState(newState);
      setLockState(newState);
      if (next >= MAX_ATTEMPTS) {
        setError(`로그인 ${MAX_ATTEMPTS}회 실패 — ${LOCKOUT_SEC}초 후 다시 시도하세요.`);
      } else {
        setError(`${msg} (${next}/${MAX_ATTEMPTS}회)`);
      }
    } else {
      clearLockState();
    }
    setLoading(false);
  };

  return (
    <div style={{ minHeight:'100vh', display:'flex', alignItems:'center', justifyContent:'center', background:'var(--bg)', position:'relative' }}>
      <div style={{ width:'100%', maxWidth:360, padding:'0 1.5rem' }}>
        <div style={{ textAlign:'center', marginBottom:'2rem' }}>
          <div style={{ fontSize:'1.5rem', fontWeight:700, letterSpacing:'-0.02em', marginBottom:6 }}>위시켓 대시보드</div>
          <div style={{ fontSize:'0.85rem', color:'var(--text2)' }}>Firstpip 내부 전용</div>
        </div>
        <button onClick={toggleTheme} title={theme === 'dark' ? '라이트 모드' : '다크 모드'}
          style={{ position:'absolute', top:'1.5rem', right:'1.5rem', padding:'0.4rem 0.6rem', borderRadius:8, border:'1px solid var(--border)', background:'transparent', color:'var(--text2)', cursor:'pointer', fontSize:'0.85rem' }}>
          {theme === 'dark' ? '☀️' : '🌙'}
        </button>
        <form onSubmit={handleLogin} style={{ display:'flex', flexDirection:'column', gap:12 }}>
          <div>
            <div style={{ fontSize:'0.8rem', color:'var(--text2)', marginBottom:5, fontWeight:500 }}>이메일</div>
            <input type="email" value={email} onChange={e => setEmail(e.target.value)} required autoFocus
              placeholder="name@firstpip.com"
              style={{ width:'100%', padding:'0.65rem 0.85rem', borderRadius:10, border:'1px solid var(--border)', background:'var(--surface)', color:'var(--text)', fontSize:'0.9rem', outline:'none' }}
              onFocus={e => e.target.style.borderColor='var(--accent)'}
              onBlur={e  => e.target.style.borderColor='var(--border)'} />
          </div>
          <div>
            <div style={{ fontSize:'0.8rem', color:'var(--text2)', marginBottom:5, fontWeight:500 }}>비밀번호</div>
            <input type="password" value={password} onChange={e => setPassword(e.target.value)} required
              placeholder="••••••••"
              style={{ width:'100%', padding:'0.65rem 0.85rem', borderRadius:10, border:'1px solid var(--border)', background:'var(--surface)', color:'var(--text)', fontSize:'0.9rem', outline:'none' }}
              onFocus={e => e.target.style.borderColor='var(--accent)'}
              onBlur={e  => e.target.style.borderColor='var(--border)'} />
          </div>
          {error && (
            <div style={{ padding:'0.6rem 0.85rem', borderRadius:8, background:'#e1705518', border:'1px solid #e1705544', fontSize:'0.8rem', color:'#e17055' }}>
              {error}
            </div>
          )}
          <button type="submit" disabled={loading || isLocked} style={{
            marginTop:4, padding:'0.7rem', borderRadius:10, border:'none', cursor:(loading||isLocked)?'not-allowed':'pointer',
            background: isLocked ? 'var(--surface2)' : 'var(--accent)', color: isLocked ? 'var(--text2)' : '#fff',
            fontSize:'0.95rem', fontWeight:700, opacity:(loading||isLocked)?0.7:1, transition:'background 0.15s, opacity 0.15s',
          }}>
            {loading ? '로그인 중...' : isLocked ? `잠금 (${countdown}초)` : '로그인'}
          </button>
        </form>
      </div>
    </div>
  );
}

// ─── Root (Auth Gate) ───
function Root() {
  const [session, setSession] = useState(undefined);

  useEffect(() => {
    supabase.auth.getSession().then(({ data: { session } }) => setSession(session));
    const { data: { subscription } } = supabase.auth.onAuthStateChange((_e, s) => setSession(s));
    return () => subscription.unsubscribe();
  }, []);

  if (session === undefined) return <Loading />;
  if (!session) return <LoginScreen />;
  return <App session={session} />;
}

ReactDOM.createRoot(document.getElementById('root')).render(<Root />);
</script>
