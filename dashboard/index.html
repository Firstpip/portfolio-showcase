// в”Җв”Җв”Җ QuickAddModal в”Җв”Җв”Җ
function QuickAddModal({ onClose, onAdd, saving }) {
  const [url, setUrl]     = useState('');
  const [title, setTitle] = useState('');
  const [budget, setBudget] = useState('');
  const [slug, setSlug]   = useState('');
  const [slugEdited, setSlugEdited] = useState(false);

  useEffect(() => {
    const handler = e => { if (e.key === 'Escape') onClose(); };
    window.addEventListener('keydown', handler);
    return () => window.removeEventListener('keydown', handler);
  }, [onClose]);

  const extractSlug = (inputUrl) => {
    const match = inputUrl.match(/\/project\/(\d+)/);
    if (match && !slugEdited) {
      const d = new Date();
      const pad = n => String(n).padStart(2,'0');
      const prefix = `${String(d.getFullYear()).slice(2)}${pad(d.getMonth()+1)}${pad(d.getDate())}`;
      setSlug(`${prefix}_${match[1]}`);
    }
  };

  const handleUrlChange = (val) => {
    setUrl(val);
    extractSlug(val);
  };

  const handleBudgetChange = (val) => {
    const digits = val.replace(/[^0-9]/g,'');
    setBudget(digits ? Number(digits).toLocaleString() : '');
  };

  const handleSubmit = async () => {
    if (!slug.trim() || !title.trim()) return;
    const today = new Date().toISOString().split('T')[0];
    const budgetVal = budget ? budget.replace(/,/g,'')+'л§Ңмӣҗ' : null;
    await onAdd({
      slug: slug.trim(),
      title: title.trim(),
      budget: budgetVal,
      wishket_url: url||null,
      current_status: 'applied',
      // created_atмқҖ DB DEFAULT now()лЎң мӢңк°Ғк№Ңм§Җ мһҗлҸҷ кё°лЎқ (мҳӨлІ„лқјмқҙл“ң кёҲм§Җ вҖ” м •л ¬ м •л°ҖлҸ„ ліҙмЎҙ)
      updated_at: today,
      history: [{ status:'applied', date:today, note:'лҢҖмӢңліҙл“ңм—җм„ң л“ұлЎқ' }],
    });
    onClose();
  };

  const inputS = { width:'100%', padding:'0.55rem 0.75rem', borderRadius:8, border:'1px solid var(--border)', background:'var(--surface2)', color:'var(--text)', fontSize:'0.85rem', outline:'none' };
  const canSubmit = slug.trim() && title.trim() && !saving;

  return (
    <div onClick={onClose} style={{ position:'fixed', inset:0, background:'var(--overlay)', backdropFilter:'blur(4px)', display:'flex', alignItems:'center', justifyContent:'center', zIndex:1100 }}>
      <div onClick={e => e.stopPropagation()} style={{
        background:'var(--surface)', borderRadius:16, width:'100%', maxWidth:440,
        border:'1px solid var(--border)', animation:'slideUp 0.25s ease-out',
        boxShadow:'0 20px 60px var(--shadow)',
      }}>
        <div style={{ padding:'1.25rem 1.5rem', borderBottom:'1px solid var(--border)', display:'flex', justifyContent:'space-between', alignItems:'center' }}>
          <div style={{ fontWeight:700, fontSize:'1rem' }}>н”„лЎңм қнҠё л№ лҘё л“ұлЎқ</div>
          <button onClick={onClose} style={{ background:'none', border:'none', color:'var(--text2)', cursor:'pointer', fontSize:'1.1rem' }}>вң•</button>
        </div>
        <div style={{ padding:'1.25rem 1.5rem', display:'flex', flexDirection:'column', gap:12 }}>
          <div>
            <div style={{ fontSize:'0.8rem', color:'var(--text2)', marginBottom:5, fontWeight:500 }}>мң„мӢңмј“ кіөкі  URL</div>
            <input type="url" value={url} onChange={e => handleUrlChange(e.target.value)}
              placeholder="https://www.wishket.com/project/123456/"
              style={inputS}
              onFocus={e => e.target.style.borderColor='var(--accent)'}
              onBlur={e  => e.target.style.borderColor='var(--border)'} />
            {slug && <div style={{ fontSize:'0.8rem', color:'var(--accent2)', marginTop:4 }}>мҠ¬лҹ¬к·ё мһҗлҸҷ мғқм„ұ: <code>{slug}</code></div>}
          </div>
          <div>
            <div style={{ fontSize:'0.8rem', color:'var(--text2)', marginBottom:5, fontWeight:500 }}>мҠ¬лҹ¬к·ё <span style={{ color:'#e17055' }}>*</span></div>
            <input type="text" value={slug} onChange={e => { setSlug(e.target.value); setSlugEdited(true); }}
              placeholder="260409_project-name"
              style={inputS}
              onFocus={e => e.target.style.borderColor='var(--accent)'}
              onBlur={e  => e.target.style.borderColor='var(--border)'} />
          </div>
          <div>
            <div style={{ fontSize:'0.8rem', color:'var(--text2)', marginBottom:5, fontWeight:500 }}>н”„лЎңм қнҠёлӘ… <span style={{ color:'#e17055' }}>*</span></div>
            <input type="text" value={title} onChange={e => setTitle(e.target.value)}
              placeholder="AI мұ—лҙҮ к°ңл°ң"
              onKeyDown={e => e.key==='Enter' && canSubmit && handleSubmit()}
              style={inputS}
              onFocus={e => e.target.style.borderColor='var(--accent)'}
              onBlur={e  => e.target.style.borderColor='var(--border)'} />
          </div>
          <div>
            <div style={{ fontSize:'0.8rem', color:'var(--text2)', marginBottom:5, fontWeight:500 }}>мҳҲмӮ° (м„ нғқ)</div>
            <div style={{ display:'flex', alignItems:'center' }}>
              <input type="text" value={budget} onChange={e => handleBudgetChange(e.target.value)}
                placeholder="2,000"
                style={{ ...inputS, borderTopRightRadius:0, borderBottomRightRadius:0, borderRight:'none' }}
                onFocus={e => e.target.style.borderColor='var(--accent)'}
                onBlur={e  => e.target.style.borderColor='var(--border)'} />
              <span style={{ padding:'0.55rem 0.7rem', borderRadius:'0 8px 8px 0', fontSize:'0.85rem', background:'var(--border)', color:'var(--text2)', border:'1px solid var(--border)', whiteSpace:'nowrap' }}>л§Ңмӣҗ</span>
            </div>
          </div>
          <button onClick={handleSubmit} disabled={!canSubmit} style={{
            marginTop:4, padding:'0.65rem', borderRadius:10, border:'none',
            cursor:canSubmit?'pointer':'not-allowed',
            background:canSubmit?'var(--accent)':'var(--surface2)',
            color:canSubmit?'#fff':'var(--text2)',
            fontSize:'0.9rem', fontWeight:700, opacity:saving?0.7:1,
          }}>
            {saving?'л“ұлЎқ мӨ‘...':'л“ұлЎқ (м§Җмӣҗмҷ„лЈҢ мғҒнғңлЎң мӢңмһ‘)'}
          </button>
        </div>
      </div>
    </div>
  );
}

// в”Җв”Җв”Җ LoginScreen в”Җв”Җв”Җ
const MAX_ATTEMPTS = 5;
const LOCKOUT_SEC  = 30;
const LS_KEY = 'dashboard_login_lock';

function readLockState() {
  try {
    const raw = localStorage.getItem(LS_KEY);
    if (!raw) return { attempts: 0, lockedUntil: null };
    return JSON.parse(raw);
  } catch { return { attempts: 0, lockedUntil: null }; }
}

function writeLockState(state) {
  try { localStorage.setItem(LS_KEY, JSON.stringify(state)); } catch {}
}

function clearLockState() {
  try { localStorage.removeItem(LS_KEY); } catch {}
}

function LoginScreen() {
  const { theme, toggle: toggleTheme } = useTheme();
  const [email, setEmail]       = useState('');
  const [password, setPassword] = useState('');
  const [loading, setLoading]   = useState(false);
  const [error, setError]       = useState('');
  const [lockState, setLockState] = useState(() => readLockState());
  const [countdown, setCountdown] = useState(0);

  const { attempts, lockedUntil } = lockState;
  const isLocked = !!lockedUntil && Date.now() < lockedUntil;

  // мһ кёҲ м№ҙмҡҙнҠёлӢӨмҡҙ (мғҲлЎңкі м№Ё нӣ„м—җлҸ„ localStorageм—җм„ң ліөмӣҗ)
  useEffect(() => {
    if (!lockedUntil) return;
    const tick = () => {
      const rem = Math.ceil((lockedUntil - Date.now()) / 1000);
      if (rem <= 0) {
        const next = { attempts: 0, lockedUntil: null };
        clearLockState();
        setLockState(next);
        setCountdown(0);
      } else {
        setCountdown(rem);
      }
    };
    tick();
    const id = setInterval(tick, 500);
    return () => clearInterval(id);
  }, [lockedUntil]);

  const handleLogin = async (e) => {
    e.preventDefault();
    if (isLocked) return;
    setLoading(true); setError('');
    const { error } = await supabase.auth.signInWithPassword({ email, password });
    if (error) {
      const msg = error.message === 'Invalid login credentials' ? 'мқҙл©”мқј лҳҗлҠ” л№„л°ҖлІҲнҳёк°Җ мҳ¬л°”лҘҙм§Җ м•ҠмҠөлӢҲлӢӨ.' : error.message;
      const next = attempts + 1;
      const newState = next >= MAX_ATTEMPTS
        ? { attempts: next, lockedUntil: Date.now() + LOCKOUT_SEC * 1000 }
        : { attempts: next, lockedUntil: null };
      writeLockState(newState);
      setLockState(newState);
      if (next >= MAX_ATTEMPTS) {
        setError(`лЎңк·ёмқё ${MAX_ATTEMPTS}нҡҢ мӢӨнҢЁ вҖ” ${LOCKOUT_SEC}мҙҲ нӣ„ лӢӨмӢң мӢңлҸ„н•ҳм„ёмҡ”.`);
      } else {
        setError(`${msg} (${next}/${MAX_ATTEMPTS}нҡҢ)`);
      }
    } else {
      clearLockState();
    }
    setLoading(false);
  };

  return (
    <div style={{ minHeight:'100vh', display:'flex', alignItems:'center', justifyContent:'center', background:'var(--bg)', position:'relative' }}>
      <div style={{ width:'100%', maxWidth:360, padding:'0 1.5rem' }}>
        <div style={{ textAlign:'center', marginBottom:'2rem' }}>
          <div style={{ fontSize:'1.5rem', fontWeight:700, letterSpacing:'-0.02em', marginBottom:6 }}>мң„мӢңмј“ лҢҖмӢңліҙл“ң</div>
          <div style={{ fontSize:'0.85rem', color:'var(--text2)' }}>Firstpip лӮҙл¶Җ м „мҡ©</div>
        </div>
        <button onClick={toggleTheme} title={theme === 'dark' ? 'лқјмқҙнҠё лӘЁл“ң' : 'лӢӨнҒ¬ лӘЁл“ң'}
          style={{ position:'absolute', top:'1.5rem', right:'1.5rem', padding:'0.4rem 0.6rem', borderRadius:8, border:'1px solid var(--border)', background:'transparent', color:'var(--text2)', cursor:'pointer', fontSize:'0.85rem' }}>
          {theme === 'dark' ? 'вҳҖпёҸ' : 'рҹҢҷ'}
        </button>
        <form onSubmit={handleLogin} style={{ display:'flex', flexDirection:'column', gap:12 }}>
          <div>
            <div style={{ fontSize:'0.8rem', color:'var(--text2)', marginBottom:5, fontWeight:500 }}>мқҙл©”мқј</div>
            <input type="email" value={email} onChange={e => setEmail(e.target.value)} required autoFocus
              placeholder="name@firstpip.com"
              style={{ width:'100%', padding:'0.65rem 0.85rem', borderRadius:10, border:'1px solid var(--border)', background:'var(--surface)', color:'var(--text)', fontSize:'0.9rem', outline:'none' }}
              onFocus={e => e.target.style.borderColor='var(--accent)'}
              onBlur={e  => e.target.style.borderColor='var(--border)'} />
          </div>
          <div>
            <div style={{ fontSize:'0.8rem', color:'var(--text2)', marginBottom:5, fontWeight:500 }}>л№„л°ҖлІҲнҳё</div>
            <input type="password" value={password} onChange={e => setPassword(e.target.value)} required
              placeholder="вҖўвҖўвҖўвҖўвҖўвҖўвҖўвҖў"
              style={{ width:'100%', padding:'0.65rem 0.85rem', borderRadius:10, border:'1px solid var(--border)', background:'var(--surface)', color:'var(--text)', fontSize:'0.9rem', outline:'none' }}
              onFocus={e => e.target.style.borderColor='var(--accent)'}
              onBlur={e  => e.target.style.borderColor='var(--border)'} />
          </div>
          {error && (
            <div style={{ padding:'0.6rem 0.85rem', borderRadius:8, background:'#e1705518', border:'1px solid #e1705544', fontSize:'0.8rem', color:'#e17055' }}>
              {error}
            </div>
          )}
          <button type="submit" disabled={loading || isLocked} style={{
            marginTop:4, padding:'0.7rem', borderRadius:10, border:'none', cursor:(loading||isLocked)?'not-allowed':'pointer',
            background: isLocked ? 'var(--surface2)' : 'var(--accent)', color: isLocked ? 'var(--text2)' : '#fff',
            fontSize:'0.95rem', fontWeight:700, opacity:(loading||isLocked)?0.7:1, transition:'background 0.15s, opacity 0.15s',
          }}>
            {loading ? 'лЎңк·ёмқё мӨ‘...' : isLocked ? `мһ кёҲ (${countdown}мҙҲ)` : 'лЎңк·ёмқё'}
          </button>
        </form>
      </div>
    </div>
  );
}

// в”Җв”Җв”Җ Root (Auth Gate) в”Җв”Җв”Җ
function Root() {
  const [session, setSession] = useState(undefined);

  useEffect(() => {
    supabase.auth.getSession().then(({ data: { session } }) => setSession(session));
    const { data: { subscription } } = supabase.auth.onAuthStateChange((_e, s) => setSession(s));
    return () => subscription.unsubscribe();
  }, []);

  if (session === undefined) return <Loading />;
  if (!session) return <LoginScreen />;
  return <App session={session} />;
}

ReactDOM.createRoot(document.getElementById('root')).render(<Root />);
</script>

<body>
<div id="root"></div>
</body>
