      {/* Week filter bar */}
      {weekOptions.length > 0 && sortedAll.length > 0 && (
        <div style={{ display:'flex', alignItems:'center', gap:6, marginBottom:12, flexWrap:'wrap' }}>
          <span style={{ fontSize:'0.8rem', color:'var(--text2)', marginRight:4 }}>мЈјм°Ё н•„н„°</span>
          {(() => {
            const chipStyle = (active) => ({
              padding:'0.25rem 0.65rem', borderRadius:14, fontSize:'0.8rem', fontWeight:500,
              border: active ? '1px solid var(--accent)' : '1px solid var(--border)',
              background: active ? 'var(--accent)30' : 'var(--surface)',
              color: active ? 'var(--accent2)' : 'var(--text2)',
              cursor:'pointer',
            });
            const chips = [
              <button key="all" onClick={() => setWeekFilter('all')} style={chipStyle(weekFilter==='all')}>м „мІҙ ({sortedAll.length})</button>,
              ...weekOptions.map(w => {
                const count = sortedAll.filter(m => m.week_number === w.week).length;
                return (
                  <button key={w.week} onClick={() => setWeekFilter(w.week)} title={w.title} style={chipStyle(weekFilter===w.week)}>
                    {w.week}мЈјм°Ё ({count})
                  </button>
                );
              }),
            ];
            const noneCount = sortedAll.filter(m => m.week_number == null).length;
            if (noneCount > 0) chips.push(
              <button key="none" onClick={() => setWeekFilter('none')} style={chipStyle(weekFilter==='none')}>лҜём§Җм • ({noneCount})</button>
            );
            return chips;
          })()}
        </div>
      )}

      {/* Active filter banner вҖ” makes the hidden context obvious */}
      {weekFilter !== 'all' && sortedAll.length > 0 && (() => {
        const activeLabel = weekFilter === 'none' ? 'мЈјм°Ё лҜём§Җм •' :
          (() => {
            const w = weekOptions.find(o => o.week === weekFilter);
            return w ? `${w.week}мЈјм°Ё${w.title ? ` В· ${w.title}` : ''}` : `${weekFilter}мЈјм°Ё`;
          })();
        const hidden = sortedAll.length - sorted.length;
        // prev/next: weekOptions мҲңм„ң кё°л°ҳ. 'none'мқҖ л§Ҳм§Җл§үм—җ мң„м№ҳн•ңлӢӨкі  к°„мЈј.
        const filterOrder = [...weekOptions.map(w => w.week)];
        const noneCount = sortedAll.filter(m => m.week_number == null).length;
        if (noneCount > 0) filterOrder.push('none');
        const idx = filterOrder.indexOf(weekFilter);
        const prevFilter = idx > 0 ? filterOrder[idx - 1] : null;
        const nextFilter = idx >= 0 && idx < filterOrder.length - 1 ? filterOrder[idx + 1] : null;
        const navBtn = (enabled) => ({
          padding:'0.25rem 0.55rem', borderRadius:6, border:'1px solid var(--accent)44',
          background: enabled ? 'var(--surface)' : 'transparent', color: enabled ? 'var(--accent2)' : 'var(--text2)',
          cursor: enabled ? 'pointer' : 'not-allowed', fontSize:'0.8rem', fontWeight:600, opacity: enabled ? 1 : 0.4,
        });
        return (
          <div style={{ display:'flex', alignItems:'center', gap:10, padding:'0.5rem 0.8rem', marginBottom:10, borderRadius:8, background:'var(--accent)20', border:'1px solid var(--accent)44' }}>
            <span style={{ fontSize:'0.8rem', color:'var(--accent2)', fontWeight:600 }}>рҹ”Қ {activeLabel} н•„н„°л§Ғ мӨ‘</span>
            <span style={{ fontSize:'0.8rem', color:'var(--text2)' }}>{sorted.length}к°ң н‘ңмӢң В· {hidden}к°ң мҲЁк№Җ</span>
            <div style={{ flex:1 }} />
            <button onClick={() => prevFilter != null && setWeekFilter(prevFilter)} disabled={prevFilter == null}
              title="мқҙм „ мЈјм°Ё (лӢЁм¶•нӮӨ: [)" style={navBtn(prevFilter != null)}>вҶҗ мқҙм „</button>
            <button onClick={() => nextFilter != null && setWeekFilter(nextFilter)} disabled={nextFilter == null}
              title="лӢӨмқҢ мЈјм°Ё (лӢЁм¶•нӮӨ: ])" style={navBtn(nextFilter != null)}>лӢӨмқҢ вҶ’</button>
            <button onClick={() => setWeekFilter('all')}
              style={{ padding:'0.25rem 0.7rem', borderRadius:6, border:'1px solid var(--accent)44', background:'var(--surface)', color:'var(--accent2)', cursor:'pointer', fontSize:'0.8rem', fontWeight:600 }}>
              вң• н•ҙм ң
            </button>
          </div>
        );
      })()}

      {sortedAll.length === 0 ? (
        <div style={{ padding:'3rem 1.5rem', textAlign:'center', background:'var(--surface)', borderRadius:12, border:'1px solid var(--border)' }}>
          <div style={{ fontSize:'3rem', marginBottom:12 }}>рҹ“Ӣ</div>
          <div style={{ fontSize:'1rem', marginBottom:6, color:'var(--text)' }}>л“ұлЎқлҗң мһ‘м—…мқҙ м—ҶмҠөлӢҲлӢӨ</div>
          <div style={{ fontSize:'0.85rem', color:'var(--text2)', marginBottom:24 }}>
            {(() => {
              const planItems = (project?.weekly_plan || []).reduce((s, w) => s + (Array.isArray(w.description) ? w.description.length : 0), 0);
              return planItems > 0
                ? `л“ұлЎқлҗң мЈјм°Ё кі„нҡҚм—җ ${planItems}к°ңмқҳ н•ӯлӘ©мқҙ мһҲмҠөлӢҲлӢӨ вҖ” н•ң лІҲм—җ нӢ°мј“мңјлЎң л§Ңл“Ө мҲҳ мһҲм–ҙмҡ”`
                : 'н…ңн”ҢлҰҝмңјлЎң мӢңмһ‘н•ҳкұ°лӮҳ м§Ғм ‘ м¶”к°Җн•  мҲҳ мһҲм–ҙмҡ”';
            })()}
          </div>
          <div style={{ display:'flex', flexDirection:'column', gap:8, maxWidth:360, margin:'0 auto' }}>
            {(() => {
              const plan = project?.weekly_plan || [];
              const allItems = plan.flatMap(w => (w.description || []).map(label => ({ label, week: w.week })));
              if (allItems.length === 0) return null;
              return (
                <button onClick={() => {
                  const doBulk = () => {
                    if (onBulkAdd) onBulkAdd(project.slug, allItems);
                    else allItems.forEach(it => onAdd(project.slug, it.label, it.week));
                  };
                  if (onRequestConfirm) {
                    onRequestConfirm({
                      title: 'мЈјм°Ё кі„нҡҚм—җм„ң нӢ°мј“ мғқм„ұ',
                      message: `${allItems.length}к°ңмқҳ н•ӯлӘ©мқ„ нӢ°мј“мңјлЎң мғқм„ұн•©лӢҲлӢӨ.\nк°Ғ нӢ°мј“мқҖ н•ҙлӢ№ мЈјм°Ём—җ мһҗлҸҷ л°°м •лҗ©лӢҲлӢӨ.`,
                      confirmLabel: 'мғқм„ұ',
                      onConfirm: doBulk,
                    });
                  } else {
                    doBulk();
                  }
                }} disabled={saving}
                  style={{ padding:'0.8rem', borderRadius:10, border:'1px solid var(--accent2)', background:'var(--accent2)22', color:'var(--accent2)', cursor:'pointer', fontSize:'0.9rem', fontWeight:600 }}>
                  вңЁ мЈјм°Ё кі„нҡҚм—җм„ң {allItems.length}к°ң нӢ°мј“ мқјкҙ„ мғқм„ұ
                </button>
              );
            })()}
            <button onClick={() => setShowWeeklyInput(true)} disabled={saving}
              style={{ padding:'0.8rem', borderRadius:10, border:'1px solid var(--accent)', background:'var(--accent)20', color:'var(--accent2)', cursor:'pointer', fontSize:'0.9rem', fontWeight:600 }}>
              рҹ“… мЈјм°Ё кі„нҡҚ (Epic) {(project?.weekly_plan || []).length > 0 ? 'мҲҳм •' : 'л“ұлЎқ'}
            </button>
            {Object.entries(MILESTONE_TEMPLATES).map(([key,tpl]) => (
              <button key={key} onClick={() => onCreateFromTemplate(project.slug, key)} disabled={saving}
                style={{ padding:'0.8rem', borderRadius:10, border:'none', background:'var(--accent)', color:'#fff', cursor:'pointer', fontSize:'0.9rem', fontWeight:600 }}>
                рҹ“Ӣ {tpl.label} н…ңн”ҢлҰҝ ({tpl.phases.length}к°ң мһ‘м—…)
              </button>
            ))}
          </div>
          <div style={{ marginTop:20, maxWidth:360, margin:'20px auto 0', display:'flex', gap:6 }}>
            <input type="text" placeholder="лҳҗлҠ” м§Ғм ‘ мһ‘м—… мқҙлҰ„ мһ…л Ҙ" value={newLabel} onChange={e=>setNewLabel(e.target.value)}
              onKeyDown={e=>{ if(e.key==='Enter' && newLabel.trim()){ onAdd(project.slug,newLabel); setNewLabel(''); } }}
              style={{ flex:1, padding:'0.6rem 0.8rem', borderRadius:8, border:'1px solid var(--border)', background:'var(--surface2)', color:'var(--text)', fontSize:'0.85rem', outline:'none' }} />
            <button onClick={()=>{ if(newLabel.trim()){ onAdd(project.slug,newLabel); setNewLabel(''); } }} disabled={!newLabel.trim()} style={{ padding:'0.6rem 1rem', borderRadius:8, border:'none', background:newLabel.trim()?'var(--surface2)':'var(--border)', color:'var(--text)', cursor:newLabel.trim()?'pointer':'not-allowed', fontSize:'0.85rem' }}>+ м¶”к°Җ</button>
          </div>
        </div>
      ) : (
        <div style={{ display:'grid', gridTemplateColumns:'repeat(3, minmax(0, 1fr))', gap:14 }}>
          {MILESTONE_STAGE_ORDER.map(stageKey => {
            const stage = MILESTONE_STAGES[stageKey];
            const cards = sorted.filter(m => m.status === stageKey);
            const isPlannedCol = stageKey === 'planned';
            const isDragOver = dragOverCol === stageKey && draggingId && sorted.find(x=>x.id===draggingId)?.status !== stageKey;
            return (
              <div key={stageKey}
                onDragOver={(e) => handleColDragOver(e, stageKey)}
                onDrop={(e) => handleColDrop(e, stageKey)}
                style={{
                  background: isDragOver ? stage.color+'10' : 'var(--surface)',
                  border: `${isDragOver ? '2px dashed ' + stage.color : '1px solid var(--border)'}`,
                  borderRadius:12,
                  padding: isDragOver ? '0.88rem 0.78rem' : '0.95rem 0.85rem', // compensate border width change
                  display:'flex', flexDirection:'column', minHeight:320,
                  transition:'background 0.12s',
                }}>
                {/* Column header */}
                <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', padding:'0.15rem 0.35rem 0.7rem', borderBottom:`2px solid ${stage.color}33`, marginBottom:10, flexShrink:0 }}>
                  <div style={{ display:'flex', alignItems:'center', gap:7, minWidth:0 }}>
                    <span style={{ fontSize:'0.95rem' }}>{stage.emoji}</span>
                    <span style={{ fontSize:'0.8rem', fontWeight:700, color:stage.color, textTransform:'uppercase', letterSpacing:'0.05em', whiteSpace:'nowrap' }}>{stage.label}</span>
                  </div>
                  <span style={{ fontSize:'0.8rem', fontWeight:700, color:stage.color, padding:'0.12rem 0.55rem', borderRadius:10, background:stage.color+'30', flexShrink:0 }}>{cards.length}</span>
                </div>
                {/* Cards */}
                <div style={{ display:'flex', flexDirection:'column', gap:8, overflowY:'auto', maxHeight:'65vh', paddingRight:2, flex:1 }}>
                  {cards.length === 0 ? (
                    <div style={{ padding:'1.1rem 0.5rem', textAlign:'center', color:'var(--text2)', fontSize:'0.8rem', opacity:0.4, border:'1px dashed var(--border)', borderRadius:6 }}>
                      {weekFilter !== 'all' && sortedAll.filter(m => m.status === stageKey).length > 0 ? 'н•„н„°м—җ н•ҙлӢ№ м—ҶмқҢ' : 'л№„м–ҙ мһҲмқҢ'}
                    </div>
                  ) : cards.map((m, ci) => {
                    const prev = ci > 0 ? cards[ci - 1] : null;
                    const showWeekDivider = weekFilter === 'all' && (!prev || prev.week_number !== m.week_number);
                    const assignee = teamMembers?.find(tm => tm.id === m.assignee);
                    const nextStageLabel = m.status==='planned'?'м§„н–үмӨ‘':m.status==='in_progress'?'мҷ„лЈҢ':'мҳҲм •';
                    const noteHasSub = m.note && m.note.includes('- [');
                    const isDragging = draggingId === m.id;
                    return (
                      <React.Fragment key={m.id}>
                      {showWeekDivider && (
                        <div style={{ display:'flex', alignItems:'center', gap:6, padding:'2px 2px', marginTop: ci === 0 ? 0 : 4 }}>
                          <span style={{ fontSize:'0.8rem', fontWeight:600, color:'var(--text2)', letterSpacing:'0.04em', textTransform:'uppercase', opacity:0.6 }}>
                            {m.week_number != null ? `${m.week_number}мЈјм°Ё` : 'мЈјм°Ё лҜём§Җм •'}
                          </span>
                          <div style={{ flex:1, height:1, background:'var(--border)', opacity:0.5 }} />
                        </div>
                      )}
                      <div
                        draggable
                        onDragStart={(e)=>handleDragStart(e, m)}
                        onDragEnd={handleDragEnd}
                        onClick={()=>setEditingId(m.id)}
                        style={{
                          borderRadius:8,
                          border: m.blocked?'1px solid #e1705555':'1px solid var(--border)',
                          background: m.blocked?'#e1705518':'var(--surface2)',
                          cursor: isDragging ? 'grabbing' : 'grab',
                          padding:'0.75rem 0.85rem',
                          transition:'transform 0.1s, box-shadow 0.1s, border-color 0.1s, opacity 0.1s',
                          display:'flex', flexDirection:'column', gap:6,
                          opacity: isDragging ? 0.4 : 1,
                        }}
                        onMouseEnter={e=>{ if(!isDragging){ e.currentTarget.style.transform='translateY(-1px)'; e.currentTarget.style.boxShadow='0 4px 10px var(--shadow)'; e.currentTarget.style.borderColor=m.blocked?'#e17055aa':'var(--accent)88'; } }}
                        onMouseLeave={e=>{ e.currentTarget.style.transform='none'; e.currentTarget.style.boxShadow='none'; e.currentTarget.style.borderColor=m.blocked?'#e1705555':'var(--border)'; }}
                        title="л“ңлһҳк·ёлЎң м»¬лҹј мқҙлҸҷ В· нҒҙлҰӯмңјлЎң мғҒм„ё нҺём§‘">
                        {/* Line 1: emoji + label + delete */}
                        <div style={{ display:'flex', alignItems:'flex-start', gap:8 }}>
                          <button onClick={(e)=>{ e.stopPropagation(); cycleStatus(m); }} disabled={saving}
                            title={`вҶ’ ${nextStageLabel}(мңј)лЎң мқҙлҸҷ`}
                            style={{ background:'transparent', border:'none', cursor:'pointer', padding:0, fontSize:'1.1rem', lineHeight:1.2, flexShrink:0 }}>
                            {m.blocked ? 'рҹ”ҙ' : stage.emoji}
                          </button>
                          <div style={{ flex:1, minWidth:0, fontSize:'0.9rem', fontWeight:500, color:m.status==='done'?'var(--text2)':'var(--text)', textDecoration:m.status==='done'?'line-through':'none', lineHeight:1.45, wordBreak:'break-word' }}>
                            {m.phase_label}
                          </div>
                          <button onClick={(e)=>{ e.stopPropagation(); onDelete(m); }}
                            style={{ background:'transparent', border:'none', cursor:'pointer', padding:'0 3px', color:'var(--text2)', fontSize:'0.8rem', lineHeight:1, flexShrink:0, opacity:0.4 }}
                            onMouseEnter={e=>{ e.stopPropagation(); e.currentTarget.style.opacity='1'; e.currentTarget.style.color='#e17055'; }}
                            onMouseLeave={e=>{ e.currentTarget.style.opacity='0.4'; e.currentTarget.style.color='var(--text2)'; }}
                            title="мӮӯм ң">вң•</button>
                        </div>
                        {/* Line 2: badges */}
                        {(assignee || noteHasSub || m.week_number != null) && (
                          <div style={{ display:'flex', alignItems:'center', gap:6, flexWrap:'wrap', paddingLeft:23 }}>
                            {m.week_number != null && <span style={{ padding:'0.08rem 0.4rem', borderRadius:4, background:'var(--accent)30', color:'var(--accent2)', fontWeight:600, fontSize:'0.8rem' }}>{m.week_number}W</span>}
                            {assignee && <MemberAvatar member={assignee} size={14} />}
                            {noteHasSub && <span title="м„ңлёҢнғңмҠӨнҒ¬ мһҲмқҢ" style={{ fontSize:'0.8rem', color:'var(--text2)', opacity:0.7 }}>рҹ“қ</span>}
                          </div>
                        )}
                        {/* Blocked reason */}
                        {m.blocked && m.blocked_reason && (
                          <div style={{ fontSize:'0.8rem', color:'#e17055', paddingLeft:23, whiteSpace:'nowrap', overflow:'hidden', textOverflow:'ellipsis' }} title={m.blocked_reason}>{m.blocked_reason}</div>
                        )}
                        {/* actual dates (auto-stamped on status change) */}
                        {(m.actual_start || m.actual_end) && (
                          <div style={{ fontSize:'0.8rem', color:'var(--text2)', opacity:0.65, paddingLeft:23, lineHeight:1.4, display:'flex', gap:8 }}>
                            {m.actual_start && <span>м°©мҲҳ {m.actual_start.split('T')[0].slice(5)}</span>}
                            {m.actual_end && <span>мҷ„лЈҢ {m.actual_end.split('T')[0].slice(5)}</span>}
                          </div>
                        )}
                      </div>
                      </React.Fragment>
                    );
                  })}
                </div>
                {/* Add card (only in planned column) */}
                {isPlannedCol && (
                  <div style={{ marginTop:10, padding:'0.45rem 0.55rem', borderRadius:6, border:'1px dashed var(--border)', display:'flex', flexDirection:'column', gap:4, flexShrink:0, transition:'border-color 0.15s' }}
                    onMouseEnter={e=>e.currentTarget.style.borderColor='var(--accent)66'}
                    onMouseLeave={e=>e.currentTarget.style.borderColor='var(--border)'}>
                    <div style={{ display:'flex', gap:6, alignItems:'center' }}>
                      <span style={{ fontSize:'0.95rem', color:'var(--text2)', lineHeight:1, flexShrink:0 }}>пјӢ</span>
                      <input type="text" placeholder="мһ‘м—… м¶”к°Җ (Enter)" value={newLabel} onChange={e=>setNewLabel(e.target.value)}
                        onKeyDown={e=>{ if(e.key==='Enter' && newLabel.trim()){ onAdd(project.slug,newLabel,newWeek?parseInt(newWeek):null); setNewLabel(''); setNewWeek(''); } }}
                        style={{ flex:1, minWidth:0, padding:'0.28rem 0.4rem', borderRadius:4, border:'none', background:'transparent', color:'var(--text)', fontSize:'0.8rem', outline:'none', fontFamily:'inherit' }} />
                      {weekOptions.length > 0 && (
                        <select value={newWeek} onChange={e=>setNewWeek(e.target.value)}
                          style={{ padding:'0.2rem 0.3rem', borderRadius:4, border:'1px solid var(--border)', background:'var(--surface2)', color:'var(--text2)', fontSize:'0.8rem', outline:'none', flexShrink:0 }}>
                          <option value="">мЈјм°Ё</option>
                          {weekOptions.map(w => <option key={w.week} value={w.week} title={w.title}>{w.week}W</option>)}
                        </select>
                      )}
                    </div>
                  </div>
                )}
              </div>
            );
          })}
        </div>
      )}

      {/* Card edit modal */}
      {editing && (
        <MilestoneEditModal
          milestone={editing}
          teamMembers={teamMembers}
          saving={saving}
          onUpdate={onUpdate}
          onDelete={onDelete}
          onClose={() => setEditingId(null)}
          weekOptions={weekOptions}
        />
      )}
    </div>
  );
}

// в”Җв”Җв”Җ StatusModal в”Җв”Җв”Җ
function StatusModal({ project, onClose, onSave, onFieldSave, onDelete, saving, teamMembers, milestones, milestonesSetupNeeded, onMilestoneUpdate, onMilestoneDelete, onMilestoneAdd, onMilestoneReorder, onCreateFromTemplate, onOpenProjectView, onBulkCreateWeekly, onClearWeeklyPlan, onRequestConfirm, onBackfillAssignees }) {
  const isPostWon = HAS_MILESTONES.includes(project?.current_status);
  const [tab, setTab] = useState(
    project?.current_status === 'meeting_done' ? 'meeting' : isPostWon ? 'tasks' : 'info'
  );
  const [newStatus, setNewStatus] = useState('');
  const [note, setNote] = useState('');
  const [editTitle, setEditTitle] = useState(project?.title||'');
  const [editBudget, setEditBudget] = useState(project?.budget||'');
  const [editTimeline, setEditTimeline] = useState(project?.timeline||'');
  const [editDate, setEditDate] = useState(project?.created_at||'');
  const [editStartDate, setEditStartDate] = useState(project?.start_date||'');
  const [startDateChanged, setStartDateChanged] = useState(false);
  const [editDeadline, setEditDeadline] = useState(project?.deadline||'');
  const [deadlineChanged, setDeadlineChanged] = useState(false);
  const [editMeeting, setEditMeeting] = useState(toLocalInput(project?.meeting_at));
  const [editMeetingType, setEditMeetingType] = useState(project?.meeting_type||'');
  const [editMemo, setEditMemo] = useState(project?.memo||'');
  const [memoChanged, setMemoChanged] = useState(false);
  const [editUrl, setEditUrl] = useState(project?.wishket_url||'');
  const [urlChanged, setUrlChanged] = useState(false);
  const [editLinks, setEditLinks] = useState(() => {
    const saved = project?.portfolio_links || [];
    return saved.map(l => ({...l}));
  });
  const [linksChanged, setLinksChanged] = useState(false);
  const [newLinkLabel, setNewLinkLabel] = useState('');
  const [newLinkUrl, setNewLinkUrl] = useState('');
  const [editingLinkIdx, setEditingLinkIdx] = useState(-1);
  const [infoChanged, setInfoChanged] = useState(false);
  const [dateChanged, setDateChanged] = useState(false);
  const [meetingChanged, setMeetingChanged] = useState(false);
  const [editMeetingMemo, setEditMeetingMemo] = useState('');

  const parseBN = (v) => { const d=(v||'').replace(/[^0-9]/g,''); return d ? Number(d).toLocaleString() : ''; };
  const [budgetNum, setBudgetNum] = useState(() => parseBN(project?.budget));
  // Assignment
  const [assignManager, setAssignManager] = useState(project?.assigned_manager||null);
  const [assignMain,    setAssignMain]    = useState(project?.assigned_main||null);
  const [assignSub,     setAssignSub]     = useState(project?.assigned_sub ||null);
  const [assignChanged, setAssignChanged] = useState(false);

  useEffect(() => {
    const handler = e => { if (e.key === 'Escape') onClose(); };
    window.addEventListener('keydown', handler);
    return () => window.removeEventListener('keydown', handler);
  }, [onClose]);

  if (!project) return null;
  const targets = TRANSITION_TARGETS[project.current_status]||[];
  const meta    = STATUS_META[project.current_status]||{};

  const inputS  = { width:'100%', padding:'0.5rem 0.7rem', borderRadius:8, fontSize:'0.85rem', border:'1px solid var(--border)', background:'var(--surface2)', color:'var(--text)', outline:'none' };
  const labelS  = { fontSize:'0.8rem', color:'var(--text2)', marginBottom:6, fontWeight:500 };
  const saveBtnS = (act) => ({ padding:'0.5rem 0.85rem', borderRadius:8, border:'none', cursor:'pointer', fontSize:'0.8rem', fontWeight:600, background:act?'var(--blue)':'var(--surface2)', color:act?'#fff':'var(--text2)', opacity:saving?0.7:1 });
  const checkInfo = (t,b,tl) => setInfoChanged(t!==(project.title||'') || b!==(project.budget||'') || tl!==(project.timeline||''));

  const handleBudgetChange = (val) => {
    const digits = val.replace(/[^0-9]/g,'');
    const formatted = digits ? Number(digits).toLocaleString() : '';

              </div>

                <button onClick={() => {

                      вң… лҜёлһҳ мқјм • вҖ” м ҖмһҘ мӢң 'лҜёнҢ… мҳҲм •' мғҒнғңлЎң мһҗлҸҷ м „нҷҳлҗ©лӢҲлӢӨ
                    </div>
                  );
                  if (isPast) return (
                    <div style={{ padding:'0.5rem 0.7rem', borderRadius:8, background:'#636e721a', border:'1px solid #636e7233', marginBottom:'0.75rem', fontSize:'0.8rem', color:'var(--text2)' }}>
                      в„№пёҸ кіјкұ° мқјм • вҖ” мғҒнғң м „нҷҳ м—Ҷмқҙ лҜёнҢ… кё°лЎқл§Ң м ҖмһҘлҗ©лӢҲлӢӨ

                  return (
                    <div style={{ padding:'0.5rem 0.7rem', borderRadius:8, background:'#fdcb6e1a', border:'1px solid #fdcb6e30', marginBottom:'0.75rem', fontSize:'0.8rem', color:'var(--yellow)' }}>
                      рҹ’Ў лҜёлһҳ мқјм •мқ„ л“ұлЎқн•ҳл©ҙ мһҗлҸҷмңјлЎң 'лҜёнҢ… мҳҲм •'мңјлЎң м „нҷҳлҗ©лӢҲлӢӨ
                    </div>
                  );
                })()}
                <div style={{ display:'flex', flexDirection:'column', gap:10 }}>
                  <div>
                    <div style={labelS}>лҜёнҢ… мқјмӢң</div>
                    <input type="datetime-local" value={editMeeting} onChange={e => { setEditMeeting(e.target.value); setMeetingChanged(true); }} style={inputS} />
                  </div>
                  <div>
                    <div style={labelS}>лҜёнҢ… мў…лҘҳ</div>
                    <div style={{ display:'flex', gap:6 }}>
                      {MEETING_TYPES.map(mt => {
                        const sel = editMeetingType===mt.key;
                        return (<button key={mt.key} onClick={() => { setEditMeetingType(mt.key); setMeetingChanged(true); }} style={{ flex:1, padding:'0.5rem', borderRadius:8, fontSize:'0.85rem', cursor:'pointer', border:sel?'2px solid var(--yellow)':'2px solid transparent', transition:'all 0.15s', background:sel?'var(--yellow)30':'var(--surface2)', color:sel?'var(--yellow)':'var(--text2)', fontWeight:sel?600:400 }}>{mt.emoji} {mt.label}</button>);
                      })}
                    </div>
                  </div>
                  <div>
                    <div style={labelS}>лҜёнҢ… л©”лӘЁ</div>
                    <textarea value={editMeetingMemo} placeholder="л…јмқҳ лӮҙмҡ©, лӢӨмқҢ м•Ўм…ҳ л“ұ..."
                      onChange={e => { setEditMeetingMemo(e.target.value); setMeetingChanged(true); }}
                      style={{ ...inputS, minHeight:72, resize:'vertical', fontFamily:'inherit', lineHeight:1.5 }} />
                  </div>
                </div>
                {meetingChanged && (() => {
                  const iso = editMeeting ? new Date(editMeeting).toISOString() : null;
                  const willTransition = project.current_status==='meeting_done' && iso && new Date(iso)>new Date();
                  const shouldArchive = willTransition && currentMeeting;
                  return (
                    <button onClick={() => {
                      const today = new Date().toISOString().split('T')[0];
                      let newHistory = [...(project.history||[])];
                      if (shouldArchive) newHistory.push({ status:'meeting_done', date:today, note:'лҜёнҢ… мҷ„лЈҢ (м•„м№ҙмқҙлёҢ)', meeting_at:currentMeeting.meeting_at, meeting_type:currentMeeting.meeting_type, meeting_memo:editMeetingMemo||null });
                      if (willTransition) {
                        newHistory.push({ status:'interview', date:today, note:'м¶”к°Җ лҜёнҢ… мҳҲм •', meeting_at:iso, meeting_type:editMeetingType||null, meeting_memo:editMeetingMemo||null });
                        onFieldSave(project, { meeting_at:iso, meeting_type:editMeetingType||null, current_status:'interview', history:newHistory });
                      } else {
                        const isChange = !!currentMeeting;
                        const changeNote = isChange
                          ? `лҜёнҢ… ліҖкІҪ (${currentMeeting.meeting_at?.slice(0,10)} вҶ’ ${iso?.slice(0,10)||'мӮӯм ң'})`
                          : 'лҜёнҢ… л“ұлЎқ';
                        onFieldSave(project, { meeting_at:iso, meeting_type:editMeetingType||null, history:[...(project.history||[]), { status:project.current_status, date:today, note:changeNote, meeting_at:iso, meeting_type:editMeetingType||null, meeting_memo:editMeetingMemo||null }] });
                      }
                      setEditMeetingMemo('');
                      setMeetingChanged(false);
                    }} disabled={saving} style={{ ...saveBtnS(true), width:'100%', marginTop:12 }}>
                      {saving?'м ҖмһҘ мӨ‘...':willTransition?'рҹ“… лҜёнҢ… л“ұлЎқ + лҜёнҢ… мҳҲм • м „нҷҳ':'лҜёнҢ… м ҖмһҘ'}
                    </button>
                  );
                })()}

                {/* лӢҙлӢ№мһҗ м§Җм • */}
                <div style={{ marginTop:'1.25rem', borderTop:'1px solid var(--border)', paddingTop:'1.25rem' }}>
                  <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:12 }}>
                    <div style={{ fontSize:'0.85rem', fontWeight:600 }}>лӢҙлӢ№мһҗ м§Җм •</div>
                    {!hasTeam && (
                      <span style={{ fontSize:'0.8rem', color:'var(--text2)' }}>нҢҖмӣҗ кҙҖлҰ¬м—җм„ң нҢҖмӣҗмқ„ лЁјм Җ м¶”к°Җн•ҳм„ёмҡ”</span>
                    )}
                  </div>
                  <div style={{ display:'flex', flexDirection:'column', gap:12 }}>
                    <AssignPicker
                      label="мЈј лӢҙлӢ№мһҗ (Main)"
                      members={teamMembers||[]}
                      value={assignMain}
                      onChange={id => { setAssignMain(id); setAssignChanged(id!==(project.assigned_main||null) || assignSub!==(project.assigned_sub||null) || assignManager!==(project.assigned_manager||null)); }}
                      exclude={assignSub}
                    />
                    <AssignPicker
                      label="ліҙмЎ° лӢҙлӢ№мһҗ (Sub)"
                      members={teamMembers||[]}
                      value={assignSub}
                      onChange={id => { setAssignSub(id); setAssignChanged(assignMain!==(project.assigned_main||null) || id!==(project.assigned_sub||null) || assignManager!==(project.assigned_manager||null)); }}
                      exclude={assignMain}
                    />
                  </div>
                  {assignChanged && (assignMain!==(project.assigned_main||null) || assignSub!==(project.assigned_sub||null)) && (
                    <button onClick={() => {
                      const today = new Date().toISOString().split('T')[0];
                      const mName = (teamMembers||[]).find(m => m.id===assignMain)?.name;
                      const sName = (teamMembers||[]).find(m => m.id===assignSub)?.name;
                      const parts = [];
                      if (mName) parts.push(`мЈјлӢҙлӢ№: ${mName}`);
                      if (sName) parts.push(`ліҙмЎ°: ${sName}`);
                      const noteStr = parts.length ? `лҜёнҢ… лӢҙлӢ№ л°°м • вҖ” ${parts.join(', ')}` : 'лҜёнҢ… лӢҙлӢ№мһҗ н•ҙм ң';
                      const newHistory = [...(project.history||[]), { status:project.current_status, date:today, note:noteStr }];
                      onFieldSave(project, { assigned_main:assignMain||null, assigned_sub:assignSub||null, history:newHistory });
                      setAssignChanged(false);
                    }} disabled={saving} style={{ ...saveBtnS(true), width:'100%', marginTop:10, background:'var(--accent)' }}>
                      {saving?'м ҖмһҘ мӨ‘...':'лӢҙлӢ№мһҗ м ҖмһҘ'}
                    </button>
                  )}
                </div>

                {(project.current_status==='applied'||project.current_status==='interview'||project.current_status==='meeting_done') && (
                  <div style={{ marginTop:'1.5rem', borderTop:'1px solid var(--border)', paddingTop:'1rem' }}>
                    <div style={{ fontSize:'0.8rem', color:'var(--text2)', marginBottom:8 }}>л№ лҘё мғҒнғң ліҖкІҪ</div>
                    <div style={{ display:'flex', gap:8 }}>
                      {project.current_status==='applied' && <button onClick={() => onSave(project,'interview','лҜёнҢ… мҳҲм •')} disabled={saving} style={{ flex:1, padding:'0.5rem', borderRadius:8, border:'none', fontSize:'0.85rem', fontWeight:600, cursor:'pointer', background:'#fdcb6e30', color:'#fdcb6e' }}>рҹ“… лҜёнҢ… мҳҲм •мңјлЎң ліҖкІҪ</button>}
                      {project.current_status==='interview' && <button onClick={() => onSave(project,'meeting_done','лҜёнҢ… мҷ„лЈҢ')} disabled={saving} style={{ flex:1, padding:'0.5rem', borderRadius:8, border:'none', fontSize:'0.85rem', fontWeight:600, cursor:'pointer', background:'#74b9ff30', color:'#74b9ff' }}>рҹӨқ кі„м•Ҫ л…јмқҳ мӨ‘мңјлЎң ліҖкІҪ</button>}
                      {project.current_status==='meeting_done' && <button onClick={() => onSave(project,'interview','м¶”к°Җ лҜёнҢ… мҳҲм •')} disabled={saving} style={{ flex:1, padding:'0.5rem', borderRadius:8, border:'none', fontSize:'0.85rem', fontWeight:600, cursor:'pointer', background:'#fdcb6e30', color:'#fdcb6e' }}>рҹ“… м¶”к°Җ лҜёнҢ… мҳҲм •мңјлЎң ліҖкІҪ</button>}
                    </div>
                  </div>
                )}
              </>
            );
          })()}

          {/* мһ‘м—… нғӯ - мҡ”м•Ҫ + м „мІҙ нҷ”л©ҙ л§ҒнҒ¬ */}
          {tab === 'tasks' && (() => {
            const list = [...(milestones||[])].sort((a,b)=>(a.order_idx||0)-(b.order_idx||0));
            const doneCount = list.filter(m => m.status==='done').length;
            const pct = list.length ? Math.round((doneCount/list.length)*100) : 0;
            const hasBlocked = list.some(m => m.blocked);
            const current = list.find(m => m.status==='in_progress') || list.find(m => m.status!=='done');
            const openFull = () => { onOpenProjectView(project.slug); onClose(); };
            if (milestonesSetupNeeded) {
              return (
                <div>
                  <div style={{ padding:'0.7rem 0.9rem', borderRadius:8, background:'#fdcb6e1a', border:'1px solid #fdcb6e33', marginBottom:'0.75rem' }}>
                    <div style={{ fontSize:'0.85rem', fontWeight:600, color:'var(--yellow)', marginBottom:4 }}>вҡ пёҸ DB м„Өм • н•„мҡ”</div>
                    <div style={{ fontSize:'0.8rem', color:'var(--text2)', lineHeight:1.5 }}>м „мІҙ нҷ”л©ҙм—җм„ң м„Өм • SQLмқ„ ліөмӮ¬н•  мҲҳ мһҲмҠөлӢҲлӢӨ.</div>
                  </div>
                  <button onClick={openFull} style={{ width:'100%', padding:'0.75rem', borderRadius:10, border:'none', background:'var(--accent)', color:'#fff', cursor:'pointer', fontSize:'0.9rem', fontWeight:600 }}>рҹҺҜ м „мІҙ нҷ”л©ҙм—җм„ң м—ҙкё°</button>
                </div>
              );
            }
            return (
              <div style={{ display:'flex', flexDirection:'column', gap:12 }}>
                {list.length > 0 ? (
                  <>
                    <div style={{ padding:'0.9rem 1rem', borderRadius:10, background:'var(--surface2)', border:'1px solid var(--border)' }}>
                      <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:8 }}>
                        <div style={{ fontSize:'0.85rem', fontWeight:600 }}>м§„н–үлҘ  {doneCount}/{list.length}</div>
                        <div style={{ fontSize:'0.95rem', fontWeight:700, color:hasBlocked?'#e17055':'var(--green)' }}>{pct}%</div>
                      </div>
                      <div style={{ height:6, background:'var(--bg)', borderRadius:3, overflow:'hidden' }}>
                        <div style={{ width:pct+'%', height:'100%', background:hasBlocked?'#e17055':'var(--green)', transition:'width 0.3s' }} />
                      </div>
                      {current && (
                        <div style={{ marginTop:10, fontSize:'0.8rem', color:'var(--text2)' }}>
                          нҳ„мһ¬ мһ‘м—…: <b style={{ color: hasBlocked&&current.blocked?'#e17055':MILESTONE_STAGES[current.status]?.color }}>
                            {current.blocked?'рҹ”ҙ ':''}{current.phase_label}
                          </b>
                        </div>
                      )}
                      {hasBlocked && <div style={{ marginTop:6, fontSize:'0.8rem', color:'#e17055' }}>рҹ”ҙ лё”лЎңнӮ№лҗң мһ‘м—…мқҙ мһҲмҠөлӢҲлӢӨ</div>}
                      {/* Weekly progress in summary */}
                      {(() => {
                        const hasPlan = Array.isArray(project?.weekly_plan) && project.weekly_plan.length > 0;
                        const hasWeeks = hasPlan || list.some(m => m.week_number != null);
                        if (!hasWeeks) return null;
                        return (
                          <div style={{ marginTop:8, paddingTop:6, borderTop:'1px solid var(--border)' }}>
                            <div style={{ fontSize:'0.8rem', color:'var(--text2)', fontWeight:600, marginBottom:4 }}>мЈјм°Ёлі„ (Epic)</div>
                            <WeeklyProgressBars weeklyPlan={project?.weekly_plan} milestones={list} startDate={project?.start_date} />
                          </div>
                        );
                      })()}
                      {/* л°ұн•„ лІ„нҠј */}
                      {(() => {
                        if (!onBackfillAssignees || !teamMembers) return null;
                        const isActive = (id) => !!id && !!teamMembers.find(tm => tm.id === id && tm.is_active);
                        const needsFill = list.filter(m => !isActive(m.assignee)).length;
                        const hasDefault = isActive(project?.assigned_main) || isActive(project?.assigned_sub);
                        if (needsFill === 0 || !hasDefault) return null;
                        return (
                          <button
                            onClick={() => {
                              if (onRequestConfirm) {
                                onRequestConfirm({
                                  title: 'лӢҙлӢ№мһҗ мқјкҙ„ л°°м •',
                                  message: `лҜём§Җм •В·мң нҡЁн•ҳм§Җ м•ҠмқҖ нӢ°мј“ ${needsFill}к°ңлҘј н”„лЎңм қнҠё лӢҙлӢ№мһҗлЎң л°°м •н•©лӢҲлӢӨ.\n\nкі„мҶҚн• к№Ңмҡ”?`,
                                  confirmLabel: 'л°°м •',
                                  onConfirm: () => onBackfillAssignees(project.slug),
                                });
                              } else {
                                onBackfillAssignees(project.slug);
                              }
                            }}
                            style={{ marginTop:8, width:'100%', padding:'0.4rem', borderRadius:6, border:'1px solid var(--accent2)44', background:'var(--accent2)11', color:'var(--accent2)', cursor:'pointer', fontSize:'0.8rem', fontWeight:600 }}>
                            рҹ‘Ө лӢҙлӢ№мһҗ л°ұн•„ ({needsFill})
                          </button>
                        );
                      })()}
                    </div>
                  </>
                ) : (
                  <div style={{ padding:'1.25rem', borderRadius:10, background:'var(--surface2)', border:'1px solid var(--border)', textAlign:'center', color:'var(--text2)' }}>
                    <div style={{ fontSize:'1.8rem', marginBottom:6 }}>рҹ“Ӣ</div>
                    <div style={{ fontSize:'0.85rem' }}>л“ұлЎқлҗң мһ‘м—…мқҙ м—ҶмҠөлӢҲлӢӨ</div>
                  </div>
                )}
                <button onClick={openFull} style={{ width:'100%', padding:'0.85rem', borderRadius:10, border:'none', background:'var(--accent)', color:'#fff', cursor:'pointer', fontSize:'0.9rem', fontWeight:600 }}>
                  рҹҺҜ м „мІҙ нҷ”л©ҙм—җм„ң {list.length > 0 ? 'мһ‘м—… кҙҖлҰ¬' : 'мӢңмһ‘н•ҳкё°'} вҶ’
                </button>
                <div style={{ fontSize:'0.8rem', color:'var(--text2)', textAlign:'center', opacity:0.7 }}>
                  мғҒм„ё нҺём§‘, л©”лӘЁ, м„ңлёҢнғңмҠӨнҒ¬лҠ” м „мІҙ нҷ”л©ҙм—җм„ң лҚ” нҺёлҰ¬н•©лӢҲлӢӨ
                </div>
              </div>
            );
          })()}

          {/* мғҒнғң нғӯ */}
          {tab === 'status' && (
            <>
              {project.history && project.history.length > 0 && (
                <div style={{ marginBottom:'1.25rem' }}>
                  <div style={{ fontSize:'0.8rem', color:'var(--text2)', marginBottom:8, fontWeight:600 }}>ліҖкІҪ мқҙл Ҙ</div>
                  <div style={{ maxHeight:160, overflowY:'auto', display:'flex', flexDirection:'column', gap:6 }}>
                    {[...(project.history||[])].reverse().map((h,i) => {
                      const hm = STATUS_META[h.status]||{};
                      return (
                        <div key={i} style={{ fontSize:'0.8rem', color:'var(--text2)', display:'flex', gap:8, padding:'0.3rem 0', borderBottom:'1px solid var(--surface2)' }}>
                          <span style={{ color:hm.color }}>{hm.emoji||'В·'}</span>
                          <span style={{ flexShrink:0 }}>{h.date}</span>
                          <span style={{ color:'var(--text)', fontWeight:500 }}>{hm.label||'вҖ”'}</span>
                          {h.note && <span style={{ opacity:0.6, overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap' }}>вҖ” {h.note}</span>}
                        </div>
                      );
                    })}
                  </div>
                </div>
              )}
              {targets.length > 0 ? (
                <>
                  <div style={{ fontSize:'0.85rem', fontWeight:600, marginBottom:8 }}>мғҒнғң ліҖкІҪ</div>
                  <div style={{ display:'flex', gap:8, marginBottom:'1rem', flexWrap:'wrap' }}>
                    {targets.map(s => {
                      const sm = STATUS_META[s]; const selected = newStatus===s;
                      return (<button key={s} onClick={() => setNewStatus(s)} style={{ padding:'0.5rem 1rem', borderRadius:10, cursor:'pointer', transition:'all 0.15s', fontSize:'0.85rem', fontWeight:selected?600:400, background:selected?sm.color+'33':'var(--surface2)', color:selected?sm.color:'var(--text2)', border:selected?`2px solid ${sm.color}`:'2px solid transparent' }}>{sm.emoji} {sm.label}</button>);
                    })}
                  </div>
                  {(() => {
                    // 'won'мқҖ л§ҲмқјмҠӨнҶӨ н…ңн”ҢлҰҝ мһҗлҸҷ мғқм„ұмқҙ мқјм–ҙлӮҳлҜҖлЎң confirm.
                    const triggerSave = () => {
                      if (!newStatus) return;
                      if (newStatus==='won' && onRequestConfirm) {
                        const sm = STATUS_META[newStatus];
                        onRequestConfirm({
                          title: `${sm.emoji} ${sm.label}мңјлЎң м „нҷҳ`,
                          message: 'мҲҳмЈј м„ұкіөмңјлЎң м „нҷҳн•ҳл©ҙ л§ҲмқјмҠӨнҶӨ н…ңн”ҢлҰҝмқҙ мһҗлҸҷ мғқм„ұлҗ©лӢҲлӢӨ.\nкі„мҶҚн• к№Ңмҡ”?',
                          confirmLabel: `${sm.label} м „нҷҳ`,
                          destructive: false,
                          onConfirm: () => onSave(project, newStatus, note),
                        });
                      } else {
                        onSave(project, newStatus, note);
                      }
                    };
                    return (
                      <>
                        <input type="text" placeholder="л©”лӘЁ (м„ нғқ)" value={note} onChange={e => setNote(e.target.value)} style={{ ...inputS, marginBottom:'0.75rem' }}
                          onKeyDown={e => { if (e.key==='Enter') triggerSave(); }} />
                        <button onClick={triggerSave} disabled={!newStatus||saving}
                          style={{ width:'100%', padding:'0.65rem', borderRadius:10, border:'none', cursor:newStatus&&!saving?'pointer':'not-allowed', fontSize:'0.9rem', fontWeight:600, background:newStatus&&!saving?'var(--accent)':'var(--surface2)', color:newStatus&&!saving?'#fff':'var(--text2)', opacity:saving?0.7:1 }}>
                          {saving?'м ҖмһҘ мӨ‘...':'мғҒнғң ліҖкІҪ'}
                        </button>
                      </>
                    );
                  })()}
                </>
              ) : (
                <div style={{ textAlign:'center', padding:'1rem', color:'var(--text2)', fontSize:'0.85rem', background:'var(--surface2)', borderRadius:8 }}>нҳ„мһ¬ м „нҷҳ к°ҖлҠҘн•ң мғҒнғңк°Җ м—ҶмҠөлӢҲлӢӨ</div>
              )}
            </>
          )}
        </div>
      </div>
    </div>
  );
}

// в”Җв”Җв”Җ ProjectTable в”Җв”Җв”Җ
const PAGE_SIZE = 30;
function ProjectTable({ data, filter, search, dateRange, onRowClick, sortKey, sortOrder, onSort, onBatchDelete, onMemoSave, memberFilter, teamMembers, milestones, milestonesSetupNeeded, onQuickApplyTemplate, onOpenProject }) {
  const [selected, setSelected] = useState(new Set());
  const [page, setPage] = useState(1);
  const toggleSelect = (slug, e) => { e.stopPropagation(); setSelected(prev => { const s=new Set(prev); s.has(slug)?s.delete(slug):s.add(slug); return s; }); };
  // н•„н„°/кІҖмғү/м •л ¬ ліҖкІҪ мӢң 1нҺҳмқҙм§ҖлЎң мһҗлҸҷ лҰ¬м…Ӣ (л№Ҳ нҺҳмқҙм§Җ л…ём¶ң л°©м§Җ)
  useEffect(() => { setPage(1); }, [filter, search, dateRange, memberFilter, sortKey, sortOrder]);

  // 1) н•„н„°л§Ғл§Ң
  const filteredOnly = useMemo(() => {
    let list = filter==='all' ? data : data.filter(d => d.current_status===filter);
    if (search.trim()) {
      const q = search.toLowerCase();
      list = list.filter(d => (d.title||'').toLowerCase().includes(q) || (d.slug||'').toLowerCase().includes(q) || (d.memo||'').toLowerCase().includes(q));
    }
    if (dateRange && dateRange !== 'all') {
      const days = parseInt(dateRange);
      if (days > 0) {
        const cutoff = new Date(); cutoff.setDate(cutoff.getDate()-days);
        const cutoffStr = cutoff.toISOString().split('T')[0];
        list = list.filter(d => (d.created_at||'') >= cutoffStr);
      }
    }
    if (memberFilter) {
      list = list.filter(d => d.assigned_manager===memberFilter || d.assigned_main===memberFilter || d.assigned_sub===memberFilter);
    }
    return list;
  }, [data, filter, search, dateRange, memberFilter]);

  // 2) urgency/stale л§ҲнӮ№ (н•„н„° кІ°кіјл§Ң ліҖн•  л•Ң мһ¬кі„мӮ°)
  const enriched = useMemo(() => {
    const now = new Date();
    const urgent=[]; const rest=[];
    for (const r of filteredOnly) {
      const _stale = r.current_status==='applied' && r.created_at && daysBetween(r.created_at, now)>=30;
      const urg = getMeetingUrgency(r.meeting_at);
      if (urg) urgent.push({ ...r, _stale, _urgency:urg });
      else rest.push({ ...r, _stale });
    }
    urgent.sort((a,b) => new Date(a.meeting_at)-new Date(b.meeting_at));
    return { urgent, rest };
  }, [filteredOnly]);

  // 3) м •л ¬ (м •л ¬ нӮӨл§Ң л°”лҖ” л•Ң мһ¬кі„мӮ°)
  const filtered = useMemo(() => {
    const sortFn = (a,b) => {
      let va, vb;
      if (sortKey==='budget')     { va=parseBudgetNum(a.budget);  vb=parseBudgetNum(b.budget); }
      else if (sortKey==='meeting_at') { va=a.meeting_at||''; vb=b.meeting_at||''; }
      else { va=a.created_at||''; vb=b.created_at||''; }
      let cmp;
      if (typeof va === 'number') cmp = sortOrder==='desc' ? vb-va : va-vb;
      else cmp = sortOrder==='desc' ? vb.localeCompare(va) : va.localeCompare(vb);
      if (cmp !== 0) return cmp;
      // лҸҷлҘ  мӢң id descлЎң tie-break (DB INSERT мҲңм„ң ліҙмЎҙ вҖ” к°ҷмқҖ created_at лӮ м§ң м•Ҳм—җм„ң мөңмӢ  л“ұлЎқмқҙ мң„лЎң)
      const ia = a.id||0, ib = b.id||0;
      return ib - ia;
    };
    const sortedRest = enriched.rest.slice().sort(sortFn);
    return [...enriched.urgent, ...sortedRest];
  }, [enriched, sortKey, sortOrder]);

  const toggleAll = () => { setSelected(prev => prev.size===filtered.length ? new Set() : new Set(filtered.map(r=>r.slug))); };

  // нҺҳмқҙм§Җл„Өмқҙм…ҳ: 50к°ң лӢЁмң„. н•„н„° кІ°кіјк°Җ 50к°ң мқҙн•ҳл©ҙ м»ЁнҠёлЎӨ мһҗлҸҷ мҲЁк№Җ (л°©н•ҙ м•Ҳ лҗЁ)
  const totalPages = Math.max(1, Math.ceil(filtered.length / PAGE_SIZE));
  const safePage = Math.min(page, totalPages);
  const pageStart = (safePage - 1) * PAGE_SIZE;
  const pagedRows = filtered.slice(pageStart, pageStart + PAGE_SIZE);
  const isPmFilter = ['won','contracted','in_progress','delivered','settled'].includes(filter);
  // лҜёнҢ… мҳҲм • мқҙм „ лӢЁкі„(generated/applied)м—” лҜёнҢ…мқјВ·лӢҙлӢ№мқҙ лӘЁл‘җ мқҳлҜё м—ҶмқҢ вҶ’ м»¬лҹј мһҗмІҙ мҲЁк№Җ
  const preMeeting = filter === 'generated' || filter === 'applied';
  const hideMeeting  = preMeeting;
  const hideAssigned = preMeeting;
  const cols = [
    { key:'status',     label:'мғҒнғң',  sortable:false, width:'120px' },
    { key:'title',      label:'н”„лЎңм қнҠё', sortable:false, width:'' },
    { key:'budget',     label:'мҳҲмӮ°',  sortable:true,  width:'110px' },
    { key:'created_at', label:'мғқм„ұмқј', sortable:true,  width:'100px' },
    ...(hideMeeting  ? [] : [{ key:'meeting_at', label:'лҜёнҢ…мқј', sortable:true,  width:'175px' }]),
    ...(hideAssigned ? [] : [{ key:'assigned',   label:isPmFilter?'лӢҙлӢ№ (PM)':'лӢҙлӢ№ (лҜёнҢ…)', sortable:false, width:'130px' }]),
    { key:'note',       label:'л©”лӘЁ',  sortable:false, width:'160px' },
  ];

  return (
    <div style={{ background:'var(--surface)', borderRadius:12, border:'1px solid var(--border)', overflow:'hidden' }}>
      {selected.size > 0 && (
        <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', padding:'0.6rem 1rem', background:'#e1705522', borderBottom:'1px solid #e1705533' }}>
          <span style={{ fontSize:'0.85rem', color:'var(--text)' }}>{selected.size}кұҙ м„ нғқлҗЁ</span>
          <div style={{ display:'flex', gap:8 }}>
            <button onClick={() => setSelected(new Set())} style={{ padding:'0.35rem 0.7rem', borderRadius:6, border:'1px solid var(--border)', background:'transparent', color:'var(--text2)', cursor:'pointer', fontSize:'0.8rem' }}>м„ нғқ н•ҙм ң</button>
            <button onClick={() => { onBatchDelete([...selected]); setSelected(new Set()); }} style={{ padding:'0.35rem 0.7rem', borderRadius:6, border:'none', background:'#e17055', color:'#fff', cursor:'pointer', fontSize:'0.8rem', fontWeight:600 }}>мқјкҙ„ мӮӯм ң</button>
          </div>
        </div>
      )}
      <div style={{ overflowX:'auto' }}>
        <table style={{ width:'100%', borderCollapse:'collapse', fontSize:'0.85rem', tableLayout:'fixed' }}>
          <thead>
            <tr style={{ borderBottom:'1px solid var(--border)', background:'var(--surface)' }}>
              <th style={{ padding:'0.75rem 0.5rem 0.75rem 1rem', width:'36px', position:'sticky', top:0, background:'var(--surface)', zIndex:1 }}>
                <input type="checkbox" checked={filtered.length>0 && selected.size===filtered.length} onChange={toggleAll} style={{ cursor:'pointer', accentColor:'var(--accent)' }} />
              </th>
              {cols.map(c => (
                <th key={c.key} onClick={c.sortable?()=>onSort(c.key):undefined}
                  style={{ padding:'0.75rem 1rem', textAlign:'left', fontWeight:600, color:'var(--text2)', fontSize:'0.8rem', whiteSpace:'nowrap', width:c.width||'auto', cursor:c.sortable?'pointer':'default', userSelect:c.sortable?'none':'auto', position:'sticky', top:0, background:'var(--surface)', zIndex:1 }}>
                  {c.label}{c.sortable&&sortKey===c.key&&(sortOrder==='desc'?' в–ј':' в–І')}
                </th>
              ))}
            </tr>
          </thead>
          <tbody>
            {filtered.length === 0 ? (
              <tr><td colSpan={cols.length+1} style={{ padding:'2rem', textAlign:'center', color:'var(--text2)' }}>
                {data.length === 0
                  ? 'л“ұлЎқлҗң н”„лЎңм қнҠёк°Җ м—ҶмҠөлӢҲлӢӨ. мҡ°мёЎ мғҒлӢЁ пјӢ л“ұлЎқ лІ„нҠјмңјлЎң м¶”к°Җн•ҙмЈјм„ёмҡ”.'
                  : (search.trim() || memberFilter || (dateRange && dateRange !== 'all') || filter !== 'all')
                    ? 'мЎ°кұҙм—җ мқјм№ҳн•ҳлҠ” н”„лЎңм қнҠёк°Җ м—ҶмҠөлӢҲлӢӨ. н•„н„°лҘј мЎ°м •н•ҙліҙм„ёмҡ”.'
                    : 'н‘ңмӢңн•  н”„лЎңм қнҠёк°Җ м—ҶмҠөлӢҲлӢӨ.'}
              </td></tr>
            ) : pagedRows.map(r => {
              const meta = STATUS_META[r.current_status]||{};
              const meetingStr = formatMeetingAt(r.meeting_at);
              const urgency = r._urgency||getMeetingUrgency(r.meeting_at);
              const urgBg  = urgency==='today'?'#fdcb6e18':urgency==='tomorrow'?'#74b9ff1a':r._stale?'#e1705518':'transparent';
              const urgBdr = urgency==='today'?'#fdcb6e44':urgency==='tomorrow'?'#74b9ff33':r._stale?'#e1705530':'var(--border)';
              const mgrM  = teamMembers?.find(m => m.id===r.assigned_manager);
              const mainM = teamMembers?.find(m => m.id===r.assigned_main);
              const subM  = teamMembers?.find(m => m.id===r.assigned_sub);
              return (
                <tr key={r.slug} onClick={() => onRowClick(r)}
                  style={{ borderBottom:`1px solid ${urgBdr}`, cursor:'pointer', transition:'background 0.1s', background:urgBg }}
                  onMouseEnter={e => e.currentTarget.style.background=urgency?(urgency==='today'?'#fdcb6e25':'#74b9ff20'):'var(--surface2)'}
                  onMouseLeave={e => e.currentTarget.style.background=urgBg}>
                  <td style={{ padding:'0.7rem 0.5rem 0.7rem 1rem', width:32 }} onClick={e => e.stopPropagation()}>
                    <input type="checkbox" checked={selected.has(r.slug)} onChange={e => toggleSelect(r.slug,e)} style={{ cursor:'pointer', accentColor:'var(--accent)' }} />
                  </td>
                  <td style={{ padding:'0.7rem 0.75rem 0.7rem 1rem', whiteSpace:'nowrap' }}>
                    <span style={{ display:'inline-flex', alignItems:'center', gap:5, padding:'0.3rem 0.7rem', borderRadius:6, fontSize:'0.8rem', fontWeight:500, background:meta.color+'30', color:meta.color, border:`1px solid ${meta.color}44` }}>
                      {meta.emoji} {meta.label}
                      {r._stale && <span title={`м§Җмӣҗ нӣ„ ${daysBetween(r.created_at,new Date())}мқј кІҪкіј`} style={{ marginLeft:2, width:6, height:6, borderRadius:'50%', background:'#e17055', animation:'pulse 2s infinite' }} />}
                    </span>
                  </td>
                  <td style={{ padding:'0.7rem 1rem', maxWidth:360 }}>
                    <div style={{ fontWeight:500, whiteSpace:'nowrap', overflow:'hidden', textOverflow:'ellipsis' }}>{r.title||r.slug}</div>
                    <div style={{ display:'flex', alignItems:'center', gap:6 }}>
                      <span style={{ fontSize:'0.8rem', color:'var(--text2)', fontFamily:'monospace' }}>{r.slug}</span>
                      {(r.portfolio_links||[]).length > 0 && <span style={{ fontSize:'0.7rem', color:'var(--green)', fontWeight:500 }} title={`нҸ¬нҠёнҸҙлҰ¬мҳӨ л§ҒнҒ¬ ${r.portfolio_links.length}к°ң`}>рҹ”—{r.portfolio_links.length}</span>}
                    </div>
                    {HAS_MILESTONES.includes(r.current_status) && (() => {
                      const ms = (milestones?.[r.slug])||[];
                      const goToProject = (e) => { e.stopPropagation(); onOpenProject(r.slug); };
                      if (ms.length === 0) {
                        if (milestonesSetupNeeded) {
                          return <div style={{ fontSize:'0.8rem', color:'var(--text2)', marginTop:4, opacity:0.7 }}>рҹ“Ӣ мһ‘м—… нҠёлһҳм»Ө DB лҜём„Өм •</div>;
                        }
                        return (
                          <div style={{ display:'flex', alignItems:'center', gap:6, marginTop:4, fontSize:'0.8rem' }}>
                            <span onClick={goToProject} title="нҒҙлҰӯ: мһ‘м—… нҺҳмқҙм§Җ м—ҙкё°"
                              style={{ color:'var(--text2)', cursor:'pointer', textDecoration:'underline', textDecorationColor:'var(--border)', textUnderlineOffset:2 }}>рҹ“Ӣ мһ‘м—… м„Өм • м•Ҳ лҗЁ</span>
                            <button onClick={e=>{ e.stopPropagation(); onQuickApplyTemplate(r.slug,'web_standard'); }}
                              style={{ padding:'0.1rem 0.45rem', borderRadius:4, border:'1px solid var(--accent)44', background:'var(--accent)20', color:'var(--accent)', cursor:'pointer', fontSize:'0.8rem', fontWeight:600 }}>
                              мӣ№ н‘ңмӨҖ м Ғмҡ©
                            </button>
                          </div>
                        );
                      }
                      const sorted = [...ms].sort((a,b)=>(a.order_idx||0)-(b.order_idx||0));
                      const doneCount = sorted.filter(m => m.status==='done').length;
                      const pct = Math.round((doneCount/sorted.length)*100);
                      const current = sorted.find(m => m.status==='in_progress') || sorted.find(m => m.status!=='done');
                      const blocked = sorted.some(m => m.blocked);
                      return (
                        <div onClick={goToProject} title="нҒҙлҰӯ: мһ‘м—… нҺҳмқҙм§Җ м—ҙкё°"
                          style={{ display:'flex', alignItems:'center', gap:6, marginTop:4, fontSize:'0.8rem', cursor:'pointer', padding:'2px 4px', marginLeft:-4, borderRadius:4, transition:'background 0.12s' }}
                          onMouseEnter={e=>e.currentTarget.style.background='var(--surface2)'}
                          onMouseLeave={e=>e.currentTarget.style.background='transparent'}>
                          <div style={{ flex:'0 0 80px', height:5, background:'var(--bg)', borderRadius:3, overflow:'hidden' }}>
                            <div style={{ width:pct+'%', height:'100%', background:blocked?'#e17055':'var(--green)', transition:'width 0.3s' }} />
                          </div>
                          <span style={{ color:'var(--text2)' }}>{doneCount}/{sorted.length}</span>
                          {current && <span style={{ color: blocked?'#e17055':(MILESTONE_STAGES[current.status]?.color||'var(--text2)') }}>В· {blocked?'рҹ”ҙ ':''}{current.phase_label}</span>}
                          <span style={{ color:'var(--accent2)', fontSize:'0.8rem', marginLeft:'auto', opacity:0.6 }}>вҶ’</span>
                        </div>
                      );
                    })()}
                  </td>
                  <td style={{ padding:'0.7rem 1rem', whiteSpace:'nowrap', fontSize:'0.8rem', color:r.budget?'var(--text)':'var(--text2)' }}>{r.budget||'вҖ”'}</td>
                  <td title={r.created_at ? formatMeetingAt(r.created_at) || r.created_at : ''} style={{ padding:'0.7rem 1rem', whiteSpace:'nowrap', fontSize:'0.8rem', color:'var(--text2)' }}>{r.created_at ? (r.created_at.length >= 10 ? r.created_at.slice(0,10) : r.created_at) : 'вҖ”'}</td>
                  {!hideMeeting && (
                  <td style={{ padding:'0.7rem 1rem', whiteSpace:'nowrap', fontSize:'0.8rem' }}>
                    {meetingStr ? (() => {
                      const ms = getMeetingStatus(r.meeting_at);
                      const mt = MEETING_TYPES.find(t => t.key===r.meeting_type);
                      const isDone = ms==='done';
                      const urgLabel = urgency==='today'?'мҳӨлҠҳ':urgency==='tomorrow'?'лӮҙмқј':null;
                      return (
                        <span style={{ display:'flex', alignItems:'center', gap:4 }}>
                          {urgLabel ? (
                            <span style={{ padding:'0.1rem 0.35rem', borderRadius:4, fontSize:'0.8rem', fontWeight:700, background:urgency==='today'?'#fdcb6e33':'#74b9ff30', color:urgency==='today'?'#fdcb6e':'#74b9ff', animation:urgency==='today'?'pulse 2s infinite':'none' }}>{urgLabel}</span>
                          ) : (
                            <span style={{ padding:'0.1rem 0.35rem', borderRadius:4, fontSize:'0.8rem', fontWeight:600, background:isDone?'#00b89430':'#fdcb6e30', color:isDone?'#00b894':'#fdcb6e' }}>{isDone?'мҷ„лЈҢ':'мҳҲм •'}</span>
                          )}
                          {mt && <span>{mt.emoji}</span>}
                          <span style={{ color:isDone?'var(--text2)':'var(--yellow)' }}>{meetingStr}</span>
                        </span>
                      );
                    })() : <span style={{ color:'var(--text2)' }}>вҖ”</span>}
                  </td>
                  )}
                  {/* лӢҙлӢ№ м»¬лҹј: н•„н„°к°Җ won мқҙнӣ„ лӢЁкі„мқј л•ҢлҠ” PM(assigned_manager), к·ё мҷём—” лҜёнҢ… л©”мқё/ліҙмЎ°(main/sub).
                      лҜёнҢ… мҳҲм • мқҙм „(generated/applied) н•„н„°мқј л•җ м»¬лҹј мһҗмІҙлҘј мҲЁк№Җ */}
                  {!hideAssigned && (
                  <td style={{ padding:'0.7rem 1rem', whiteSpace:'nowrap' }}>
                    {isPmFilter ? (
                      mgrM ? (
                        <span style={{ display:'inline-flex', alignItems:'center', gap:3 }}>
                          <MemberAvatar member={mgrM} size={16} />
                          <span style={{ fontSize:'0.8rem', color:mgrM.color, fontWeight:600 }}>{mgrM.name}</span>
                          <span style={{ fontSize:'0.8rem', color:'var(--text2)' }}>PM</span>
                        </span>
                      ) : (
                        <span title="мҲҳмЈј нӣ„ PM лҜёл°°м • вҖ” л°°м • н•„мҡ”" style={{ display:'inline-flex', alignItems:'center', gap:4, padding:'0.15rem 0.5rem', borderRadius:6, background:'#fdcb6e22', color:'#fdcb6e', fontSize:'0.75rem', fontWeight:600, border:'1px solid #fdcb6e44' }}>
                          вҡ  PM лҜёл°°м •
                        </span>
                      )
                    ) : (mainM||subM) ? (
                      <div style={{ display:'flex', flexDirection:'column', gap:3 }}>
                        {mainM && (
                          <span style={{ display:'inline-flex', alignItems:'center', gap:3 }}>
                            <MemberAvatar member={mainM} size={16} />
                            <span style={{ fontSize:'0.8rem', color:mainM.color, fontWeight:600 }}>{mainM.name}</span>
                            <span style={{ fontSize:'0.8rem', color:'var(--text2)' }}>мЈј</span>
                          </span>
                        )}
                        {subM && (
                          <span style={{ display:'inline-flex', alignItems:'center', gap:3 }}>
                            <MemberAvatar member={subM} size={14} />
                            <span style={{ fontSize:'0.8rem', color:subM.color }}>{subM.name}</span>
                            <span style={{ fontSize:'0.8rem', color:'var(--text2)' }}>л¶Җ</span>
                          </span>
                        )}
                      </div>
                    ) : <span style={{ color:'var(--text2)', fontSize:'0.8rem' }}>вҖ”</span>}
                  </td>
                  )}
                  <td style={{ padding:'0.7rem 1rem', fontSize:'0.8rem', color:'var(--text2)', maxWidth:200, overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap' }}>
                    <InlineMemo value={r.memo} onSave={val => onMemoSave(r,val)} />
                  </td>
                </tr>
              );
            })}
          </tbody>
        </table>
      </div>
      <div style={{ padding:'0.7rem 1rem', borderTop:'1px solid var(--border)', fontSize:'0.8rem', color:'var(--text2)', display:'flex', alignItems:'center', justifyContent:'space-between', gap:8, flexWrap:'wrap' }}>
        <span>
          {filtered.length === 0
            ? '0кұҙ'
            : totalPages > 1
              ? `${pageStart+1}вҖ“${Math.min(pageStart+PAGE_SIZE, filtered.length)} / м „мІҙ ${filtered.length}кұҙ`
              : `${filtered.length}кұҙ н‘ңмӢң мӨ‘`}
        </span>
        {totalPages > 1 && (() => {
          // нҺҳмқҙм§Җ лІҲнҳё мңҲлҸ„мҡ°: нҳ„мһ¬ нҺҳмқҙм§Җ Вұ2, мІҳмқҢВ·лҒқ н•ӯмғҒ н‘ңмӢң
          const window = new Set([1, totalPages, safePage-2, safePage-1, safePage, safePage+1, safePage+2].filter(p => p >= 1 && p <= totalPages));
          const sorted = [...window].sort((a,b) => a-b);
          const items = [];
          let prev = 0;
          for (const p of sorted) {
            if (p - prev > 1) items.push('вҖҰ');
            items.push(p);
            prev = p;
          }
          const btn = (label, onClick, disabled, active) => (
            <button key={label+(active?'-a':'')} onClick={onClick} disabled={disabled}
              style={{ padding:'0.25rem 0.55rem', borderRadius:6, border:'1px solid '+(active?'var(--accent)':'var(--border)'), background:active?'var(--accent)':'transparent', color:active?'#fff':disabled?'var(--text2)':'var(--text)', cursor:disabled?'not-allowed':'pointer', fontSize:'0.75rem', fontWeight:active?600:400, opacity:disabled?0.4:1, minWidth:28 }}>
              {label}
            </button>
          );
          return (
            <div style={{ display:'flex', gap:4, alignItems:'center' }}>
              {btn('вҖ№', () => setPage(p => Math.max(1, p-1)), safePage===1, false)}
              {items.map((it, i) => it === 'вҖҰ'
                ? <span key={'e'+i} style={{ padding:'0 4px', color:'var(--text2)' }}>вҖҰ</span>
                : btn(String(it), () => setPage(it), false, it===safePage))}
              {btn('вҖә', () => setPage(p => Math.min(totalPages, p+1)), safePage===totalPages, false)}
            </div>
          );
        })()}
      </div>
    </div>
  );
}

// в”Җв”Җв”Җ App в”Җв”Җв”Җ
function App({ session }) {
  const { theme, toggle: toggleTheme } = useTheme();
  const [data, setData]                   = useState(null);
  const [teamMembers, setTeamMembers]     = useState([]);
  const [teamSetupNeeded, setTeamSetupNeeded] = useState(false);
  const [milestones, setMilestones]       = useState({}); // { [slug]: Milestone[] }
  const [milestonesSetupNeeded, setMilestonesSetupNeeded] = useState(false);
  const [route, setRoute]                 = useState(() => parseHash());
  useEffect(() => {
    const h = () => setRoute(parseHash());
    window.addEventListener('hashchange', h);
    return () => window.removeEventListener('hashchange', h);
  }, []);
  const [showTeamMgr, setShowTeamMgr]     = useState(false);
  const [showQuickAdd, setShowQuickAdd]   = useState(false);
  const [memberFilter, setMemberFilter]   = useState('');

  // в”Җв”Җв”Җ лЎңк·ёмқё мӮ¬мҡ©мһҗ вҶ” нҢҖмӣҗ л§Өм№ӯ в”Җв”Җв”Җ
  const isAdmin = session?.user?.user_metadata?.role === 'admin';
  const currentMember = useMemo(() => {
    if (!session?.user?.id || !teamMembers.length) return null;
    return teamMembers.find(m => m.user_id === session.user.id) || null;
  }, [session?.user?.id, teamMembers]);
  const displayName = currentMember?.name || session?.user?.user_metadata?.display_name || session?.user?.email;
  const [filter, setFilter]               = useState('all');
  const [search, setSearch]               = useState('');
  const [selectedProject, setSelectedProject] = useState(null);
  const [saving, setSaving]               = useState(false);
  const [connected, setConnected]         = useState(false);
  const [sortKey, setSortKey]             = useState('created_at');
  const [sortOrder, setSortOrder]         = useState('desc');
  const [dateRange, setDateRange]         = useState('all');
  const [showStats, setShowStats]         = useState(false);
  const [showShortcuts, setShowShortcuts] = useState(false);
  const { toasts, toast } = useToast();
  const [confirmState, setConfirmState] = useState(null); // { title, message, confirmLabel, destructive, onConfirm }
  const searchRef = useRef(null);

  useEffect(() => {
    const handler = e => {
      const tag = document.activeElement?.tagName;
      if (tag === 'INPUT' || tag === 'TEXTAREA' || tag === 'SELECT') return;
      if (e.key==='/' && !e.ctrlKey && !e.metaKey) {
        e.preventDefault(); searchRef.current?.focus();

  const handleMilestoneUpdate = useCallback(async (milestone, fields) => {
    setSaving(true);
    try {
    const payload = { ...fields, updated_at:new Date().toISOString() };
    // auto-set timestamps when status changes
    if (fields.status && fields.status !== milestone.status) {
      if (fields.status === 'in_progress' && !milestone.actual_start) payload.actual_start = new Date().toISOString();
      if (fields.status === 'done' && !milestone.actual_end) payload.actual_end = new Date().toISOString();
      // actual_end лҠ” done вҶ’ лӢӨлҘё мғҒнғңлЎң лҗҳлҸҢлҰҙ л•Ңл§Ң мҙҲкё°нҷ” (м§„н–ү мӨ‘ м „нҷҳ мӢң лӮ м§ң ліҙмЎҙ)
      if (milestone.status === 'done' && fields.status !== 'done') payload.actual_end = null;

    const { data:updated, error } = await supabase.from(MILESTONES_TABLE).update(payload).eq('id',milestone.id).select().single();

      next[milestone.project_slug] = list;
      return next;
    });
    // append milestone completion to project history (race-safe: read from latest state)
    if (fields.status === 'done' && milestone.status !== 'done') {
      const today = new Date().toISOString().split('T')[0];
      setData(prev => {
        if (!prev) return prev;

        const next = prev.slice();
        next[idx] = { ...project, history:newHistory, updated_at:today };

  const handleMilestoneReorder = useCallback(async (milestone, direction) => {
    const list = [...(milestones[milestone.project_slug]||[])].sort((a,b)=>(a.order_idx||0)-(b.order_idx||0));
    const idx = list.findIndex(m => m.id === milestone.id);
    const nIdx = direction === 'up' ? idx - 1 : idx + 1;
    if (idx < 0 || nIdx < 0 || nIdx >= list.length) return;
    const neighbor = list[nIdx];
    const aOrder = milestone.order_idx;
    const bOrder = neighbor.order_idx;
    // Optimistic swap
    setMilestones(prev => {
      const next = { ...prev };
      next[milestone.project_slug] = (next[milestone.project_slug]||[]).map(m => {
        if (m.id === milestone.id) return { ...m, order_idx: bOrder };
        if (m.id === neighbor.id) return { ...m, order_idx: aOrder };
        return m;
      }).sort((a,b)=>(a.order_idx||0)-(b.order_idx||0));
      return next;
    });
    // Two-step persist; temporarily park milestone at sentinel to avoid unique-order conflicts if ever enforced
    const [r1, r2] = await Promise.all([
      supabase.from(MILESTONES_TABLE).update({ order_idx: bOrder }).eq('id', milestone.id),
      supabase.from(MILESTONES_TABLE).update({ order_idx: aOrder }).eq('id', neighbor.id),
    ]);
    if (r1.error || r2.error) toast('мҲңм„ң ліҖкІҪ мӢӨнҢЁ: '+(r1.error||r2.error).message,'error');
  }, [milestones, toast]);

  const handleBulkCreateWeekly = useCallback(async (slug, weeks) => {
    if (!weeks || weeks.length === 0) return;
    const weeklyPlan = weeks.map(w => ({
      week: w.week,
      title: w.title || '',
      description: Array.isArray(w.description) ? w.description : [],
    }));
    // Orphan detection: weeks that existed in the prior plan (or were referenced by tickets) but are missing from the new plan
    const project = data?.find(d => d.slug === slug);
    const prevPlan = Array.isArray(project?.weekly_plan) ? project.weekly_plan : [];
    const newWeekSet = new Set(weeklyPlan.map(w => w.week));
    const ticketList = milestones[slug] || [];
    const orphanGroups = {};
    ticketList.forEach(t => {
      if (t.week_number != null && !newWeekSet.has(t.week_number)) {
        if (!orphanGroups[t.week_number]) orphanGroups[t.week_number] = [];
        orphanGroups[t.week_number].push(t);
      }
    });
    const totalOrphan = Object.values(orphanGroups).reduce((s, arr) => s + arr.length, 0);

    const doSave = async () => {
      const prevPlan = project.weekly_plan ?? null;
      const { error } = await supabase.from(TABLE).update({ weekly_plan: weeklyPlan, updated_at:new Date().toISOString().split('T')[0] }).eq('slug', slug);
