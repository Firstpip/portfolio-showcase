<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {

    --border: #2e3348; --text: #e4e6f0; --text2: #8b8fa8;
    --accent: #6c5ce7; --accent2: #a29bfe;
    --green: #00b894; --yellow: #fdcb6e; --red: #e17055; --blue: #74b9ff;
  }
  html { font-size: 14px; }
  body {
    font-family: 'Pretendard', -apple-system, sans-serif;
    background: var(--bg); color: var(--text);
    min-height: 100vh; line-height: 1.5;
  }
  #root { max-width: 1280px; margin: 0 auto; padding: 2rem 1.5rem; }
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: var(--surface); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

  .delay-1 { animation-delay: 0.05s; opacity: 0; }

  .delay-3 { animation-delay: 0.15s; opacity: 0; }

  @keyframes spin { to { transform: rotate(360deg); } }
  @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes toastIn { from { opacity: 0; transform: translateY(16px) scale(0.95); } to { opacity: 1; transform: translateY(0) scale(1); } }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.5; } }
</style>

// ─── Constants ───
const STATUS_META = {
  generated:    { label: '생성완료', emoji: '📦', color: '#636e72' },
  applied:      { label: '지원완료', emoji: '📤', color: '#6c5ce7' },
  interview:    { label: '미팅 예정', emoji: '📅', color: '#fdcb6e' },
  meeting_done: { label: '미팅 완료', emoji: '🤝', color: '#74b9ff' },
  won:          { label: '수주 성공', emoji: '🎉', color: '#00b894' },
  lost:         { label: '미선정',   emoji: '❌', color: '#e17055' },
};
const STATUS_ORDER = ['generated', 'applied', 'interview', 'meeting_done', 'won', 'lost'];
const TRANSITION_TARGETS = {
  generated:    ['applied'],
  applied:      ['interview', 'lost'],
  interview:    ['meeting_done', 'lost'],
  meeting_done: ['won', 'lost'],
  won:          [],
  lost:         [],

const MEETING_TYPES = [
  { key: 'video', label: '화상', emoji: '💻' },
  { key: 'inperson', label: '대면', emoji: '🏢' },
  { key: 'phone', label: '전화', emoji: '📞' },
];

// 미팅 상태: 예정/완료 자동 판별
function getMeetingStatus(meetingAt) {
  if (!meetingAt) return null;
  const d = new Date(meetingAt);
  if (isNaN(d)) return null;
  return d > new Date() ? 'upcoming' : 'done';
}

// ─── Toast ───
function ToastContainer({ toasts }) {
  return (
    <div style={{ position: 'fixed', bottom: 24, right: 24, zIndex: 9999, display: 'flex', flexDirection: 'column', gap: 8 }}>
      {toasts.map(t => (
        <div key={t.id} style={{
          padding: '0.7rem 1.2rem', borderRadius: 10,
          background: t.type === 'error' ? '#e17055' : t.type === 'success' ? '#00b894' : 'var(--surface2)',
          color: '#fff', fontSize: '0.85rem', fontWeight: 500,
          boxShadow: '0 4px 20px rgba(0,0,0,0.4)', animation: 'toastIn 0.25s ease-out',
        }}>{t.message}</div>
      ))}
    </div>
  );
}

function useToast() {
  const [toasts, setToasts] = useState([]);
  const add = useCallback((message, type = 'info') => {
    const id = Date.now();
    setToasts(prev => [...prev, { id, message, type }]);
    setTimeout(() => setToasts(prev => prev.filter(t => t.id !== id)), 3000);
  }, []);
  return { toasts, toast: add };
}

// ─── Loading ───
function Loading() {
  return (
    <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'center', minHeight: '60vh', gap: '1rem' }}>
      <div style={{ width: 32, height: 32, border: '3px solid var(--border)', borderTopColor: 'var(--accent)', borderRadius: '50%', animation: 'spin 0.8s linear infinite' }} />
      <span style={{ color: 'var(--text2)' }}>Supabase 연결 중...</span>
    </div>
  );
}

// ─── Stats Card ───
function StatCard({ title, value, sub, color, delay }) {
  return (
    <div className={`fade-in delay-${delay}`} style={{
      background: 'var(--surface)', borderRadius: 12, padding: '1.25rem 1.5rem',
      border: '1px solid var(--border)', flex: '1 1 200px', minWidth: 180,
    }}>
      <div style={{ fontSize: '0.85rem', color: 'var(--text2)', marginBottom: 4 }}>{title}</div>
      <div style={{ fontSize: '2rem', fontWeight: 700, color: color || 'var(--text)', lineHeight: 1.2 }}>{value}</div>
      {sub && <div style={{ fontSize: '0.8rem', color: 'var(--text2)', marginTop: 4 }}>{sub}</div>}
    </div>
  );
}

// ─── Funnel ───
function Funnel({ data }) {
  const stages = [
    { key: 'generated',    label: '생성', color: '#636e72' },
    { key: 'applied',      label: '지원', color: '#6c5ce7' },
    { key: 'interview',    label: '미팅', color: '#fdcb6e' },
    { key: 'meeting_done', label: '완료', color: '#74b9ff' },
    { key: 'won',          label: '수주', color: '#00b894' },
  ];
  const ORDER = ['generated', 'applied', 'interview', 'meeting_done', 'won'];
  const counts = stages.map(s => {
    const idx = ORDER.indexOf(s.key);
    return {
      ...s,
      count: data.filter(d => {
        const dIdx = ORDER.indexOf(d.current_status);
        if (d.current_status === 'lost') {
          const maxIdx = Math.max(...(d.history || []).map(h => ORDER.indexOf(h.status)).filter(i => i >= 0), -1);
          return maxIdx >= idx;
        }
        return dIdx >= idx;
      }).length,
    };
  });
  const maxCount = Math.max(...counts.map(c => c.count), 1);

  return (
    <div style={{ background: 'var(--surface)', borderRadius: 12, padding: '1.5rem', border: '1px solid var(--border)' }}>
      <h3 style={{ fontSize: '1rem', fontWeight: 600, marginBottom: '1.25rem' }}>수주 퍼널</h3>
      <div style={{ display: 'flex', flexDirection: 'column', gap: 10 }}>
        {counts.map((s, i) => {
          const pct = maxCount > 0 ? (s.count / maxCount) * 100 : 0;
          const convRate = i > 0 && counts[i - 1].count > 0 ? ((s.count / counts[i - 1].count) * 100).toFixed(0) + '%' : null;
          return (
            <div key={s.key} style={{ display: 'flex', alignItems: 'center', gap: 12 }}>
              <div style={{ width: 50, fontSize: '0.85rem', color: 'var(--text2)', textAlign: 'right', flexShrink: 0 }}>{s.label}</div>
              <div style={{ flex: 1, background: 'var(--surface2)', borderRadius: 6, height: 32, overflow: 'hidden' }}>
                <div style={{
                  width: `${Math.max(pct, 3)}%`, height: '100%', background: s.color, borderRadius: 6,
                  transition: 'width 0.8s ease-out', display: 'flex', alignItems: 'center', paddingLeft: 10,
                }}>
                  <span style={{ fontSize: '0.85rem', fontWeight: 600, color: '#fff', textShadow: '0 1px 2px rgba(0,0,0,0.3)' }}>{s.count}</span>
                </div>
              </div>
              {convRate && <div style={{ width: 40, fontSize: '0.75rem', color: 'var(--text2)', flexShrink: 0 }}>{convRate}</div>}
            </div>
          );
        })}
      </div>
    </div>
  );
}

// ─── Filter Tabs ───
function FilterTabs({ active, onChange, counts }) {
  const tabs = [{ key: 'all', label: '전체' }, ...STATUS_ORDER.map(s => ({ key: s, label: STATUS_META[s].label }))];
  return (
    <div style={{ display: 'flex', gap: 6, flexWrap: 'wrap' }}>
      {tabs.map(t => {
        const count = t.key === 'all' ? counts.total : (counts[t.key] || 0);
        if (t.key !== 'all' && count === 0) return null;
        const isActive = active === t.key;
        return (
          <button key={t.key} onClick={() => onChange(t.key)} style={{
            padding: '0.4rem 0.85rem', borderRadius: 8, border: 'none', cursor: 'pointer',
            fontSize: '0.8rem', fontWeight: isActive ? 600 : 400, transition: 'all 0.15s',
            background: isActive ? 'var(--accent)' : 'var(--surface2)', color: isActive ? '#fff' : 'var(--text2)',
          }}>
            {t.key !== 'all' && STATUS_META[t.key]?.emoji + ' '}{t.label} {count}
          </button>
        );
      })}
    </div>
  );
}

// ─── datetime-local 변환 유틸 ───
function toLocalInput(iso) {
  if (!iso) return '';
  const d = new Date(iso);
  if (isNaN(d)) return '';
  const pad = n => String(n).padStart(2, '0');
  return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}T${pad(d.getHours())}:${pad(d.getMinutes())}`;
}
function formatMeetingAt(iso) {
  if (!iso) return null;
  const d = new Date(iso);
  if (isNaN(d)) return null;
  const pad = n => String(n).padStart(2, '0');
  return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}`;
}

// ─── Project Edit Modal ───
function StatusModal({ project, onClose, onSave, onFieldSave, onDelete, saving }) {
  const [newStatus, setNewStatus] = useState('');
  const [note, setNote] = useState('');
  // 편집 필드
  const [editTitle, setEditTitle] = useState(project?.title || '');
  const [editBudget, setEditBudget] = useState(project?.budget || '');
  const [editTimeline, setEditTimeline] = useState(project?.timeline || '');
  const [editDate, setEditDate] = useState(project?.created_at || '');
  const [editMeeting, setEditMeeting] = useState(toLocalInput(project?.meeting_at));
  const [editMeetingType, setEditMeetingType] = useState(project?.meeting_type || '');
  // 변경 감지
  const [infoChanged, setInfoChanged] = useState(false);
  const [dateChanged, setDateChanged] = useState(false);
  const [meetingChanged, setMeetingChanged] = useState(false);
  const [showDeleteConfirm, setShowDeleteConfirm] = useState(false);

  const targets = TRANSITION_TARGETS[project.current_status] || [];
  const meta = STATUS_META[project.current_status] || {};

  const inputStyle = {
    width: '100%', padding: '0.5rem 0.7rem', borderRadius: 8, fontSize: '0.85rem',
    border: '1px solid var(--border)', background: 'var(--surface2)', color: 'var(--text)',
    outline: 'none', colorScheme: 'dark',
  };
  const labelStyle = { fontSize: '0.8rem', color: 'var(--text2)', marginBottom: 4, fontWeight: 500 };
  const saveBtnStyle = (active) => ({
    padding: '0.5rem 0.85rem', borderRadius: 8, border: 'none', cursor: 'pointer',
    fontSize: '0.8rem', fontWeight: 600, background: active ? 'var(--blue)' : 'var(--surface2)',
    color: active ? '#fff' : 'var(--text2)', opacity: saving ? 0.7 : 1,
  });

  const checkInfoChanged = (t, b, tl) => {
    setInfoChanged(t !== (project.title || '') || b !== (project.budget || '') || tl !== (project.timeline || ''));
  };

  return (
    <div onClick={onClose} style={{
      position: 'fixed', inset: 0, background: 'rgba(0,0,0,0.6)', backdropFilter: 'blur(4px)',
      display: 'flex', alignItems: 'center', justifyContent: 'center', zIndex: 1000,
    }}>
      <div onClick={e => e.stopPropagation()} style={{
        background: 'var(--surface)', borderRadius: 16, padding: '2rem', width: '100%', maxWidth: 520,
        border: '1px solid var(--border)', animation: 'slideUp 0.25s ease-out',
        boxShadow: '0 20px 60px rgba(0,0,0,0.5)', maxHeight: '90vh', overflowY: 'auto',
      }}>
        {/* Header */}
        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', marginBottom: '1.25rem' }}>
          <div>
            <h3 style={{ fontSize: '1.1rem', fontWeight: 600, marginBottom: 4 }}>프로젝트 관리</h3>
            <div style={{ fontSize: '0.8rem', color: 'var(--text2)', fontFamily: 'monospace' }}>{project.slug}</div>
          </div>
          <button onClick={onClose} style={{ background: 'none', border: 'none', color: 'var(--text2)', cursor: 'pointer', fontSize: '1.2rem', padding: 4 }}>&#x2715;</button>
        </div>

        {/* 현재 상태 */}
        <div style={{ marginBottom: '1.25rem' }}>
          <span style={{
            display: 'inline-block', padding: '0.2rem 0.6rem', borderRadius: 6, fontSize: '0.75rem', fontWeight: 500,
            background: meta.color + '22', color: meta.color, border: `1px solid ${meta.color}44`,
          }}>{meta.emoji} {meta.label}</span>
        </div>

        {/* 프로젝트 정보 편집 */}
        <div style={{ marginBottom: '1.25rem' }}>
          <div style={{ fontSize: '0.85rem', fontWeight: 600, marginBottom: 8 }}>프로젝트 정보</div>
          <div style={{ display: 'flex', flexDirection: 'column', gap: 8 }}>
            <div>
              <div style={labelStyle}>프로젝트명</div>
              <input type="text" value={editTitle} onChange={e => { setEditTitle(e.target.value); checkInfoChanged(e.target.value, editBudget, editTimeline); }} style={inputStyle} />
            </div>
            <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 8 }}>
              <div>
                <div style={labelStyle}>예산</div>
                <input type="text" value={editBudget} placeholder="예: 2,000만원" onChange={e => { setEditBudget(e.target.value); checkInfoChanged(editTitle, e.target.value, editTimeline); }} style={inputStyle} />
              </div>
              <div>
                <div style={labelStyle}>기간</div>
                <input type="text" value={editTimeline} placeholder="예: 90일" onChange={e => { setEditTimeline(e.target.value); checkInfoChanged(editTitle, editBudget, e.target.value); }} style={inputStyle} />
              </div>
            </div>
          </div>
          {infoChanged && (
            <button onClick={() => { onFieldSave(project, { title: editTitle, budget: editBudget, timeline: editTimeline }); setInfoChanged(false); }} disabled={saving}
              style={{ ...saveBtnStyle(true), width: '100%', marginTop: 8 }}>
              {saving ? '...' : '정보 저장'}
            </button>
          )}
        </div>

        {/* 생성일 + 미팅일 */}
        <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '0.75rem', marginBottom: '1.25rem' }}>
          <div>
            <div style={{ fontSize: '0.85rem', fontWeight: 600, marginBottom: 6 }}>생성일</div>
            <input type="date" value={editDate}
              onChange={e => { setEditDate(e.target.value); setDateChanged(e.target.value !== (project.created_at || '')); }}

            {dateChanged && (

          </div>
          <div>
            <div style={{ fontSize: '0.85rem', fontWeight: 600, marginBottom: 6, color: 'var(--yellow)' }}>미팅 일시</div>

              {MEETING_TYPES.map(mt => {
                const sel = editMeetingType === mt.key;

                      color: sel ? 'var(--yellow)' : 'var(--text2)', fontWeight: sel ? 600 : 400,
                    }}>{mt.emoji} {mt.label}</button>
                );
              })}
            </div>
            {meetingChanged && (
              <button onClick={() => {
                const iso = editMeeting ? new Date(editMeeting).toISOString() : null;
                onFieldSave(project, { meeting_at: iso, meeting_type: editMeetingType || null }); setMeetingChanged(false);

                style={{ ...saveBtnStyle(true), width: '100%', marginTop: 6 }}>
                {saving ? '...' : '미팅 저장'}
              </button>
            )}
          </div>
        </div>

        {/* 이력 */}
        {project.history && project.history.length > 0 && (
          <div style={{ marginBottom: '1.25rem' }}>
            <div style={{ fontSize: '0.8rem', color: 'var(--text2)', marginBottom: 6, fontWeight: 600 }}>이력</div>
            <div style={{ maxHeight: 120, overflowY: 'auto', display: 'flex', flexDirection: 'column', gap: 4 }}>

                const hm = STATUS_META[h.status] || {};
                return (
                  <div key={i} style={{ fontSize: '0.8rem', color: 'var(--text2)', display: 'flex', gap: 8 }}>

                    <span>{h.date}</span>
                    <span style={{ color: 'var(--text)' }}>{hm.label}</span>
                    {h.note && <span style={{ opacity: 0.7 }}>— {h.note}</span>}
                  </div>
                );
              })}
            </div>
          </div>
        )}

        {/* 상태 변경 */}
        {targets.length > 0 ? (
          <>
            <div style={{ fontSize: '0.85rem', fontWeight: 600, marginBottom: 8 }}>상태 변경</div>
            <div style={{ display: 'flex', gap: 8, marginBottom: '1rem', flexWrap: 'wrap' }}>
              {targets.map(s => {
                const sm = STATUS_META[s];
                const selected = newStatus === s;
                return (
                  <button key={s} onClick={() => setNewStatus(s)} style={{
                    padding: '0.5rem 1rem', borderRadius: 10, cursor: 'pointer', transition: 'all 0.15s',

                    background: selected ? sm.color + '33' : 'var(--surface2)',
                    color: selected ? sm.color : 'var(--text2)',
                    border: selected ? `2px solid ${sm.color}` : '2px solid transparent',

            <div style={{ marginBottom: '1.25rem' }}>

                  width: '100%', padding: '0.6rem 0.85rem', borderRadius: 8, fontSize: '0.85rem',

                onBlur={e => e.target.style.borderColor = 'var(--border)'}
                onKeyDown={e => { if (e.key === 'Enter' && newStatus) onSave(project, newStatus, note); }}
              />
            </div>
            <button onClick={() => onSave(project, newStatus, note)} disabled={!newStatus || saving}
              style={{
                width: '100%', padding: '0.7rem', borderRadius: 10, border: 'none',
                cursor: newStatus && !saving ? 'pointer' : 'not-allowed',
                fontSize: '0.9rem', fontWeight: 600, transition: 'all 0.15s',

                color: newStatus && !saving ? '#fff' : 'var(--text2)', opacity: saving ? 0.7 : 1,
              }}>

          <div style={{ textAlign: 'center', padding: '0.5rem', color: 'var(--text2)', fontSize: '0.85rem', background: 'var(--surface2)', borderRadius: 8 }}>

        {/* 삭제 */}
        <div style={{ marginTop: '1.5rem', borderTop: '1px solid var(--border)', paddingTop: '1rem' }}>
          {!showDeleteConfirm ? (
            <button onClick={() => setShowDeleteConfirm(true)} style={{
              width: '100%', padding: '0.5rem', borderRadius: 8, border: '1px solid #e1705544',
              background: 'transparent', color: '#e17055', cursor: 'pointer', fontSize: '0.8rem',
            }}>프로젝트 삭제</button>
          ) : (
            <div style={{ display: 'flex', flexDirection: 'column', gap: 8 }}>
              <div style={{ fontSize: '0.8rem', color: '#e17055', textAlign: 'center' }}>
                "{project.title || project.slug}" 을(를) 삭제하시겠습니까?
              </div>
              <div style={{ display: 'flex', gap: 8 }}>
                <button onClick={() => setShowDeleteConfirm(false)} style={{
                  flex: 1, padding: '0.5rem', borderRadius: 8, border: '1px solid var(--border)',
                  background: 'transparent', color: 'var(--text2)', cursor: 'pointer', fontSize: '0.8rem',
                }}>취소</button>
                <button onClick={() => onDelete(project)} disabled={saving} style={{
                  flex: 1, padding: '0.5rem', borderRadius: 8, border: 'none',
                  background: '#e17055', color: '#fff', cursor: 'pointer', fontSize: '0.8rem', fontWeight: 600,
                  opacity: saving ? 0.7 : 1,
                }}>{saving ? '...' : '삭제 확인'}</button>
              </div>
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

// ─── Project Table ───
function ProjectTable({ data, filter, search, onRowClick, sortOrder, onToggleSort }) {
  const filtered = useMemo(() => {
    let list = filter === 'all' ? data : data.filter(d => d.current_status === filter);
    if (search.trim()) {
      const q = search.toLowerCase();
      list = list.filter(d => (d.title || '').toLowerCase().includes(q) || (d.slug || '').toLowerCase().includes(q));
    }
    return list.sort((a, b) => {
      const dateA = a.created_at || ''; const dateB = b.created_at || '';
      return sortOrder === 'desc' ? dateB.localeCompare(dateA) : dateA.localeCompare(dateB);
    });
  }, [data, filter, search, sortOrder]);

  const cols = [
    { key: 'status', label: '상태', sortable: false },
    { key: 'title', label: '프로젝트', sortable: false },
    { key: 'budget', label: '예산', sortable: false },
    { key: 'created_at', label: '생성일', sortable: true },
    { key: 'interview', label: '미팅일', sortable: false },
    { key: 'note', label: '메모', sortable: false },
  ];

  return (
    <div style={{ background: 'var(--surface)', borderRadius: 12, border: '1px solid var(--border)', overflow: 'hidden' }}>
      <div style={{ overflowX: 'auto' }}>
        <table style={{ width: '100%', borderCollapse: 'collapse', fontSize: '0.85rem' }}>
          <thead>
            <tr style={{ borderBottom: '1px solid var(--border)' }}>
              {cols.map(c => (
                <th key={c.key}
                  onClick={c.sortable ? onToggleSort : undefined}
                  style={{
                    padding: '0.75rem 1rem', textAlign: 'left', fontWeight: 600, color: 'var(--text2)',
                    fontSize: '0.8rem', whiteSpace: 'nowrap',
                    cursor: c.sortable ? 'pointer' : 'default', userSelect: c.sortable ? 'none' : 'auto',
                  }}
                >
                  {c.label}{c.sortable && (sortOrder === 'desc' ? ' ▼' : ' ▲')}
                </th>
              ))}
            </tr>
          </thead>
          <tbody>
            {filtered.length === 0 ? (
              <tr><td colSpan={cols.length} style={{ padding: '2rem', textAlign: 'center', color: 'var(--text2)' }}>결과 없음</td></tr>
            ) : filtered.map(r => {
              const meta = STATUS_META[r.current_status] || {};
              const history = r.history || [];
              const lastH = history[history.length - 1];
              const meetingStr = formatMeetingAt(r.meeting_at);
              return (
                <tr key={r.slug}
                  onClick={() => onRowClick(r)}
                  style={{ borderBottom: '1px solid var(--border)', cursor: 'pointer', transition: 'background 0.1s' }}
                  onMouseEnter={e => e.currentTarget.style.background = 'var(--surface2)'}
                  onMouseLeave={e => e.currentTarget.style.background = 'transparent'}
                >
                  <td style={{ padding: '0.65rem 1rem', whiteSpace: 'nowrap' }}>
                    <span style={{
                      display: 'inline-block', padding: '0.2rem 0.6rem', borderRadius: 6, fontSize: '0.75rem', fontWeight: 500,
                      background: meta.color + '22', color: meta.color, border: `1px solid ${meta.color}44`,
                    }}>{meta.emoji} {meta.label}</span>
                  </td>
                  <td style={{ padding: '0.65rem 1rem', maxWidth: 320 }}>
                    <div style={{ fontWeight: 500, whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis' }}>{r.title || r.slug}</div>
                    <div style={{ fontSize: '0.75rem', color: 'var(--text2)', fontFamily: 'monospace' }}>{r.slug}</div>
                  </td>
                  <td style={{ padding: '0.65rem 1rem', whiteSpace: 'nowrap', fontSize: '0.8rem', color: r.budget ? 'var(--text)' : 'var(--text2)' }}>{r.budget || '—'}</td>
                  <td style={{ padding: '0.65rem 1rem', whiteSpace: 'nowrap', fontSize: '0.8rem', color: 'var(--text2)' }}>{r.created_at || '—'}</td>
                  <td style={{ padding: '0.65rem 1rem', whiteSpace: 'nowrap', fontSize: '0.8rem' }}>
                    {meetingStr ? (() => {
                      const ms = getMeetingStatus(r.meeting_at);
                      const mt = MEETING_TYPES.find(t => t.key === r.meeting_type);
                      const isDone = ms === 'done';
                      return (
                        <span style={{ display: 'flex', alignItems: 'center', gap: 4 }}>
                          <span style={{
                            padding: '0.1rem 0.35rem', borderRadius: 4, fontSize: '0.7rem', fontWeight: 600,
                            background: isDone ? '#00b89422' : '#fdcb6e22',
                            color: isDone ? '#00b894' : '#fdcb6e',
                          }}>{isDone ? '완료' : '예정'}</span>
                          {mt && <span>{mt.emoji}</span>}
                          <span style={{ color: isDone ? 'var(--text2)' : 'var(--yellow)' }}>{meetingStr}</span>
                        </span>
                      );
                    })() : (
                      <span style={{ color: 'var(--text2)' }}>—</span>
                    )}
                  </td>
                  <td style={{ padding: '0.65rem 1rem', fontSize: '0.8rem', color: 'var(--text2)', maxWidth: 200, overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>
                    {lastH?.note || '—'}
                  </td>
                </tr>
              );
            })}
          </tbody>
        </table>
      </div>
      <div style={{ padding: '0.65rem 1rem', borderTop: '1px solid var(--border)', fontSize: '0.8rem', color: 'var(--text2)' }}>
        {filtered.length}건 표시 중
      </div>
    </div>
  );
}

// ─── App ───
function App() {
  const [data, setData] = useState(null);
  const [filter, setFilter] = useState('all');
  const [search, setSearch] = useState('');
  const [selectedProject, setSelectedProject] = useState(null);
  const [saving, setSaving] = useState(false);
  const [connected, setConnected] = useState(false);
  const [sortOrder, setSortOrder] = useState('desc');
  const { toasts, toast } = useToast();

  // Supabase에서 전체 데이터 로드
  const loadData = useCallback(async () => {
    const { data: rows, error } = await supabase
      .from(TABLE)
      .select('*')
      .order('created_at', { ascending: false });

    if (error) {
      toast('데이터 로드 실패: ' + error.message, 'error');
      setData([]);
    } else {
      setData(rows);
      setConnected(true);

      // 자동 전환: interview + meeting_at이 과거 → meeting_done
      const now = new Date();
      const toTransition = rows.filter(r =>
        r.current_status === 'interview' && r.meeting_at && new Date(r.meeting_at) < now
      );
      if (toTransition.length > 0) {
        const today = now.toISOString().split('T')[0];
        for (const r of toTransition) {
          const newHistory = [...(r.history || []), { status: 'meeting_done', date: today, note: '미팅 일시 경과 — 자동 전환' }];
          supabase.from(TABLE).update({ current_status: 'meeting_done', history: newHistory, updated_at: today }).eq('slug', r.slug).then(() => {});
        }
        // 로컬 state도 즉시 반영
        setData(prev => prev.map(d => {
          const match = toTransition.find(t => t.slug === d.slug);
          if (!match) return d;
          return { ...d, current_status: 'meeting_done', history: [...(d.history || []), { status: 'meeting_done', date: today, note: '미팅 일시 경과 — 자동 전환' }], updated_at: today };
        }));
        console.log(`자동 전환: ${toTransition.length}건 interview → meeting_done`);
      }
    }
  }, [toast]);

  // 초기 로드 + Realtime 구독
  useEffect(() => {
    loadData();

    const channel = supabase
      .channel('wishket-realtime')
      .on('postgres_changes', { event: '*', schema: 'public', table: TABLE }, (payload) => {
        // UPDATE 이벤트: 로컬 state 즉시 반영
        if (payload.eventType === 'UPDATE') {
          setData(prev => prev ? prev.map(d => d.slug === payload.new.slug ? payload.new : d) : prev);
        } else if (payload.eventType === 'INSERT') {
          setData(prev => prev ? [payload.new, ...prev] : [payload.new]);
        } else if (payload.eventType === 'DELETE') {
          setData(prev => prev ? prev.filter(d => d.id !== payload.old.id) : prev);
        }
      })
      .subscribe();

    return () => { supabase.removeChannel(channel); };
  }, [loadData]);

  const handleRowClick = useCallback((project) => {
    setSelectedProject(project);
  }, []);

  // Supabase에 필드 업데이트 (생성일, 미팅일 등)
  const handleFieldSave = useCallback(async (project, fields) => {
    setSaving(true);
    try {
      const { error } = await supabase
        .from(TABLE)
        .update({ ...fields, updated_at: new Date().toISOString().split('T')[0] })
        .eq('slug', project.slug);
      if (error) throw error;
      setData(prev => prev.map(d => d.slug === project.slug ? { ...d, ...fields } : d));
      setSelectedProject(prev => prev ? { ...prev, ...fields } : prev);
      const label = Object.keys(fields).map(k => k === 'created_at' ? '생성일' : k === 'meeting_at' ? '미팅일' : k).join(', ');
      toast(`${label} 저장 완료`, 'success');
    } catch (err) {
      toast('저장 실패: ' + err.message, 'error');
    } finally {
      setSaving(false);
    }
  }, [toast]);

  // Supabase에서 프로젝트 삭제
  const handleDelete = useCallback(async (project) => {
    setSaving(true);
    try {
      const { error } = await supabase.from(TABLE).delete().eq('slug', project.slug);
      if (error) throw error;
      setData(prev => prev.filter(d => d.slug !== project.slug));
      setSelectedProject(null);
      toast(`삭제 완료: ${project.slug}`, 'success');
    } catch (err) {
      toast('삭제 실패: ' + err.message, 'error');
    } finally {
      setSaving(false);
    }
  }, [toast]);

  // Supabase에 상태 업데이트
  const handleSave = useCallback(async (project, newStatus, note) => {
    setSaving(true);
    try {
      const today = new Date().toISOString().split('T')[0];
      const newHistory = [...(project.history || []), { status: newStatus, date: today, note: note || '' }];

      const { error } = await supabase
        .from(TABLE)
        .update({
          current_status: newStatus,
          history: newHistory,
          updated_at: today,
        })
        .eq('slug', project.slug);

      if (error) throw error;

      // 로컬 state 즉시 반영 (Realtime 도착 전)
      setData(prev => prev.map(d => d.slug === project.slug ? {
        ...d, current_status: newStatus, history: newHistory, updated_at: today,
      } : d));

      setSelectedProject(null);
      const sm = STATUS_META[newStatus];
      toast(`${sm.emoji} ${project.slug} → ${sm.label}`, 'success');
    } catch (err) {
      toast('저장 실패: ' + err.message, 'error');
    } finally {
      setSaving(false);
    }
  }, [toast]);

  if (!data) return <Loading />;

  const counts = { total: data.length };
  STATUS_ORDER.forEach(s => counts[s] = data.filter(d => d.current_status === s).length);
  const appliedOrBeyond = data.filter(d => d.current_status !== 'generated').length;
  const wonCount = counts.won || 0;
  const winRate = appliedOrBeyond > 0 ? ((wonCount / appliedOrBeyond) * 100).toFixed(1) : '0.0';
  const interviewCount = data.filter(d => (d.history || []).some(h => h.status === 'interview' || h.status === 'meeting_done')).length;
  const interviewRate = appliedOrBeyond > 0 ? ((interviewCount / appliedOrBeyond) * 100).toFixed(1) : '0.0';
  const lastUpdated = data.reduce((max, r) => (r.updated_at || '') > max ? r.updated_at : max, '');

  return (
    <div>
      <ToastContainer toasts={toasts} />
      {selectedProject && <StatusModal project={selectedProject} onClose={() => setSelectedProject(null)} onSave={handleSave} onFieldSave={handleFieldSave} onDelete={handleDelete} saving={saving} />}

      {/* Header */}
      <div className="fade-in" style={{ marginBottom: '2rem' }}>
        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', flexWrap: 'wrap', gap: '1rem' }}>
          <div>
            <h1 style={{ fontSize: '1.5rem', fontWeight: 700, letterSpacing: '-0.02em' }}>위시켓 현황 대시보드</h1>
            <p style={{ color: 'var(--text2)', fontSize: '0.85rem', marginTop: 4 }}>프로젝트 지원 현황 및 수주 통계</p>
          </div>
          <div style={{ display: 'flex', gap: 8, alignItems: 'center' }}>
            {lastUpdated && (
              <div style={{ fontSize: '0.8rem', color: 'var(--text2)', padding: '0.4rem 0.8rem', background: 'var(--surface)', borderRadius: 8 }}>
                {lastUpdated}
              </div>
            )}
            <div style={{
              padding: '0.4rem 0.8rem', borderRadius: 8, fontSize: '0.8rem', fontWeight: 500,
              background: connected ? '#00b89422' : '#e1705522',
              color: connected ? '#00b894' : '#e17055',
              display: 'flex', alignItems: 'center', gap: 6,
            }}>
              <span style={{
                width: 7, height: 7, borderRadius: '50%',
                background: connected ? '#00b894' : '#e17055',
                animation: connected ? 'pulse 2s infinite' : 'none',
              }} />
              {connected ? 'Live' : 'Offline'}
            </div>
          </div>
        </div>
      </div>

      {/* Stats */}
      <div style={{ display: 'flex', gap: '1rem', flexWrap: 'wrap', marginBottom: '1.5rem' }}>
        <StatCard title="총 프로젝트" value={data.length} sub={`생성 ${counts.generated || 0} / 지원 ${appliedOrBeyond}`} delay={1} />
        <StatCard title="수주율" value={`${winRate}%`} sub={`${wonCount} / ${appliedOrBeyond} (지원 기준)`} color="var(--green)" delay={2} />
        <StatCard title="면접 전환율" value={`${interviewRate}%`} sub={`${interviewCount} / ${appliedOrBeyond}`} color="var(--yellow)" delay={3} />
        <StatCard title="진행 중" value={(counts.applied || 0) + (counts.interview || 0) + (counts.meeting_done || 0)}
          sub={`지원 ${counts.applied || 0} + 미팅 ${(counts.interview || 0) + (counts.meeting_done || 0)}`} color="var(--accent2)" delay={4} />
      </div>

      {/* Funnel */}
      <div className="fade-in delay-2" style={{ marginBottom: '1.5rem' }}><Funnel data={data} /></div>

      {/* Project List */}
      <div className="fade-in delay-4">
        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '1rem', flexWrap: 'wrap', gap: '0.75rem' }}>
          <h2 style={{ fontSize: '1.1rem', fontWeight: 600 }}>프로젝트 목록 <span style={{ fontSize: '0.8rem', color: 'var(--text2)', fontWeight: 400 }}>클릭하여 상태 변경</span></h2>
          <input type="text" placeholder="프로젝트 검색..." value={search} onChange={e => setSearch(e.target.value)}
            style={{ padding: '0.45rem 0.85rem', borderRadius: 8, border: '1px solid var(--border)', background: 'var(--surface2)', color: 'var(--text)', fontSize: '0.85rem', width: 240, outline: 'none' }}
            onFocus={e => e.target.style.borderColor = 'var(--accent)'}
            onBlur={e => e.target.style.borderColor = 'var(--border)'}
          />
        </div>
        <div style={{ marginBottom: '1rem' }}><FilterTabs active={filter} onChange={setFilter} counts={counts} /></div>
        <ProjectTable data={data} filter={filter} search={search} onRowClick={handleRowClick} sortOrder={sortOrder} onToggleSort={() => setSortOrder(prev => prev === 'desc' ? 'asc' : 'desc')} />
      </div>

      <div style={{ textAlign: 'center', padding: '2rem 0 1rem', color: 'var(--text2)', fontSize: '0.75rem' }}>
        Wishket Portfolio Tracker — Firstpip &middot; Powered by Supabase
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</head>
<body>
<div id="root"></div>
</body>
</html>
