                {focusWeek != null && (
                  <button onClick={() => setWeekFilter(weekFilter === focusWeek ? 'all' : focusWeek)}
                    title="이 주차로 칸반 필터링"
                    style={{ marginLeft:8, padding:'1px 6px', borderRadius:4, border:'1px solid var(--accent)44', background: weekFilter===focusWeek ? 'var(--accent)30' : 'transparent', color:'var(--accent2)', cursor:'pointer', fontSize:'0.8rem', fontWeight:600, textTransform:'none', letterSpacing:0 }}>
                    👉 다음 {focusWeek}주차
                  </button>
                )}
              </div>
              {(() => { const cw = getCurrentWeek(project?.start_date); const timePct = cw != null ? Math.min(Math.round((cw/totalWeeks)*100),100) : 0; const overdue = cw != null && cw > totalWeeks; return <div style={{ fontSize:'1.2rem', fontWeight:700, color:overdue?'#e17055':'var(--accent2)' }}>{timePct}%</div>; })()}
            </div>
            {(() => { const cw = getCurrentWeek(project?.start_date); const timePct = cw != null ? Math.min(Math.round((cw/totalWeeks)*100),100) : 0; const overdue = cw != null && cw > totalWeeks; return (
              <div style={{ height:10, background:'var(--bg)', borderRadius:5, overflow:'hidden' }}>
                <div style={{ width:timePct+'%', height:'100%', background:overdue?'#e17055':'var(--accent2)', transition:'width 0.3s' }} />
              </div>
            ); })()}
            {staleWeeks.length > 0 && (
              <div style={{ marginTop:6, fontSize:'0.8rem', color:'var(--yellow)', opacity:0.85 }}>
                ⚠️ {staleWeeks.join(', ')}주차가 미완료인데 이후 주차 작업이 진행됨 — 작업 순서 점검 필요
              </div>
            )}
          </div>
        )}
        {/* Ticket completion (secondary) */}
        <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:8 }}>
          <div style={{ fontSize:'0.8rem', fontWeight:500, color:'var(--text2)' }}>
            🎫 티켓 완료 {sortedAll.length === 0 ? <span style={{ fontWeight:400, fontSize:'0.8rem' }}>없음</span> : `${doneCount}/${sortedAll.length}`}
          </div>
          <div style={{ display:'flex', alignItems:'center', gap:8 }}>
            {(() => {
              const isActive = (id) => !!id && !!teamMembers?.find(tm => tm.id === id && tm.is_active);
              const needsFill = sortedAll.filter(m => !isActive(m.assignee)).length;
              const hasDefault = isActive(project?.assigned_main) || isActive(project?.assigned_sub);
              if (needsFill === 0 || !hasDefault || !onBackfillAssignees) return null;
              return (
                <button
                  onClick={() => {
                    if (onRequestConfirm) {
                      onRequestConfirm({
                        title: '담당자 일괄 배정',
                        message: `담당자 미지정/유효하지 않은 티켓 ${needsFill}개를 프로젝트 담당자로 배정합니다.\n(프로젝트 전체 기준 — 주차 필터와 무관)\n\n계속할까요?`,
                        confirmLabel: '배정',
                        onConfirm: () => onBackfillAssignees(project.slug),
                      });
                    } else {
                      onBackfillAssignees(project.slug);
                    }
                  }}
                  disabled={saving}
                  title={`미지정·고아 담당 ${needsFill}개를 프로젝트 담당자로 일괄 배정 (전체 기준)`}
                  style={{ padding:'0.3rem 0.65rem', borderRadius:6, border:'1px solid var(--accent2)44', background:'var(--accent2)11', color:'var(--accent2)', cursor:'pointer', fontSize:'0.8rem', fontWeight:600 }}>
                  👤 담당자 백필 ({needsFill})
                </button>
              );
            })()}
            {weekOptions.length === 0 && (
              <button onClick={() => setShowWeeklyInput(true)} style={{ padding:'0.3rem 0.65rem', borderRadius:6, border:'1px solid var(--accent)44', background:'transparent', color:'var(--accent2)', cursor:'pointer', fontSize:'0.8rem', fontWeight:500 }}>📅 주차 계획 등록</button>
            )}
            {sortedAll.length > 0 && <div style={{ fontSize:'0.8rem', fontWeight:600, color:hasBlocked?'#e17055':'var(--text2)' }}>{pct}%</div>}
          </div>
        </div>
        <div style={{ height:4, background:'var(--bg)', borderRadius:2, overflow:'hidden' }}>
          <div style={{ width:pct+'%', height:'100%', background:hasBlocked?'#e17055':'var(--green)', opacity:0.6, transition:'width 0.3s' }} />
        </div>
        {hasBlocked && <div style={{ marginTop:8, fontSize:'0.8rem', color:'#e17055' }}>🔴 블로킹된 작업이 있습니다</div>}
        {/* Per-week breakdown (detail of the timeline shown above) */}
        {weekOptions.length > 0 && (
          <div style={{ marginTop:12, paddingTop:10, borderTop:'1px dashed var(--border)' }}>
            <div style={{ display:'flex', justifyContent:'flex-end', marginBottom:6 }}>
              <button onClick={() => setShowWeeklyInput(true)} style={{ padding:'0.2rem 0.55rem', borderRadius:5, border:'1px solid var(--border)', background:'transparent', color:'var(--text2)', cursor:'pointer', fontSize:'0.8rem' }}>주차 계획 수정</button>
            </div>
            <WeeklyProgressBars weeklyPlan={project?.weekly_plan} milestones={sortedAll} focusWeek={focusWeek} activeFilter={weekFilter} onFilterWeek={setWeekFilter} onAddTicket={(label, week) => onAdd(project.slug, label, week)} startDate={project?.start_date} />
          </div>
        )}
      </div>

      {/* Week filter bar */}
      {weekOptions.length > 0 && sortedAll.length > 0 && (
        <div style={{ display:'flex', alignItems:'center', gap:6, marginBottom:12, flexWrap:'wrap' }}>
          <span style={{ fontSize:'0.8rem', color:'var(--text2)', marginRight:4 }}>주차 필터</span>
          {(() => {
            const chipStyle = (active) => ({
              padding:'0.25rem 0.65rem', borderRadius:14, fontSize:'0.8rem', fontWeight:500,
              border: active ? '1px solid var(--accent)' : '1px solid var(--border)',
              background: active ? 'var(--accent)30' : 'var(--surface)',
              color: active ? 'var(--accent2)' : 'var(--text2)',
              cursor:'pointer',
            });
            const chips = [
              <button key="all" onClick={() => setWeekFilter('all')} style={chipStyle(weekFilter==='all')}>전체 ({sortedAll.length})</button>,
              ...weekOptions.map(w => {
                const count = sortedAll.filter(m => m.week_number === w.week).length;
                return (
                  <button key={w.week} onClick={() => setWeekFilter(w.week)} title={w.title} style={chipStyle(weekFilter===w.week)}>
                    {w.week}주차 ({count})
                  </button>
                );
              }),
            ];
            const noneCount = sortedAll.filter(m => m.week_number == null).length;
            if (noneCount > 0) chips.push(
              <button key="none" onClick={() => setWeekFilter('none')} style={chipStyle(weekFilter==='none')}>미지정 ({noneCount})</button>
            );
            return chips;
          })()}
        </div>
      )}

      {/* Active filter banner — makes the hidden context obvious */}
      {weekFilter !== 'all' && sortedAll.length > 0 && (() => {
        const activeLabel = weekFilter === 'none' ? '주차 미지정' :
          (() => {
            const w = weekOptions.find(o => o.week === weekFilter);
            return w ? `${w.week}주차${w.title ? ` · ${w.title}` : ''}` : `${weekFilter}주차`;
          })();
        const hidden = sortedAll.length - sorted.length;
        // prev/next: weekOptions 순서 기반. 'none'은 마지막에 위치한다고 간주.
        const filterOrder = [...weekOptions.map(w => w.week)];
        const noneCount = sortedAll.filter(m => m.week_number == null).length;
        if (noneCount > 0) filterOrder.push('none');
        const idx = filterOrder.indexOf(weekFilter);
        const prevFilter = idx > 0 ? filterOrder[idx - 1] : null;
        const nextFilter = idx >= 0 && idx < filterOrder.length - 1 ? filterOrder[idx + 1] : null;
        const navBtn = (enabled) => ({
          padding:'0.25rem 0.55rem', borderRadius:6, border:'1px solid var(--accent)44',
          background: enabled ? 'var(--surface)' : 'transparent', color: enabled ? 'var(--accent2)' : 'var(--text2)',
          cursor: enabled ? 'pointer' : 'not-allowed', fontSize:'0.8rem', fontWeight:600, opacity: enabled ? 1 : 0.4,
        });
        return (
          <div style={{ display:'flex', alignItems:'center', gap:10, padding:'0.5rem 0.8rem', marginBottom:10, borderRadius:8, background:'var(--accent)20', border:'1px solid var(--accent)44' }}>
            <span style={{ fontSize:'0.8rem', color:'var(--accent2)', fontWeight:600 }}>🔍 {activeLabel} 필터링 중</span>
            <span style={{ fontSize:'0.8rem', color:'var(--text2)' }}>{sorted.length}개 표시 · {hidden}개 숨김</span>
            <div style={{ flex:1 }} />
            <button onClick={() => prevFilter != null && setWeekFilter(prevFilter)} disabled={prevFilter == null}
              title="이전 주차 (단축키: [)" style={navBtn(prevFilter != null)}>← 이전</button>
            <button onClick={() => nextFilter != null && setWeekFilter(nextFilter)} disabled={nextFilter == null}
              title="다음 주차 (단축키: ])" style={navBtn(nextFilter != null)}>다음 →</button>
            <button onClick={() => setWeekFilter('all')}
              style={{ padding:'0.25rem 0.7rem', borderRadius:6, border:'1px solid var(--accent)44', background:'var(--surface)', color:'var(--accent2)', cursor:'pointer', fontSize:'0.8rem', fontWeight:600 }}>
              ✕ 해제
            </button>
          </div>
        );
      })()}

      {sortedAll.length === 0 ? (
        <div style={{ padding:'3rem 1.5rem', textAlign:'center', background:'var(--surface)', borderRadius:12, border:'1px solid var(--border)' }}>
          <div style={{ fontSize:'3rem', marginBottom:12 }}>📋</div>
          <div style={{ fontSize:'1rem', marginBottom:6, color:'var(--text)' }}>등록된 작업이 없습니다</div>
          <div style={{ fontSize:'0.85rem', color:'var(--text2)', marginBottom:24 }}>
            {(() => {
              const planItems = (project?.weekly_plan || []).reduce((s, w) => s + (Array.isArray(w.description) ? w.description.length : 0), 0);
              return planItems > 0
                ? `등록된 주차 계획에 ${planItems}개의 항목이 있습니다 — 한 번에 티켓으로 만들 수 있어요`
                : '템플릿으로 시작하거나 직접 추가할 수 있어요';
            })()}
          </div>
          <div style={{ display:'flex', flexDirection:'column', gap:8, maxWidth:360, margin:'0 auto' }}>
            {(() => {
              const plan = project?.weekly_plan || [];
              const allItems = plan.flatMap(w => (w.description || []).map(label => ({ label, week: w.week })));
              if (allItems.length === 0) return null;
              return (
                <button onClick={() => {
                  const doBulk = () => {
                    if (onBulkAdd) onBulkAdd(project.slug, allItems);
                    else allItems.forEach(it => onAdd(project.slug, it.label, it.week));
                  };
                  if (onRequestConfirm) {
                    onRequestConfirm({
                      title: '주차 계획에서 티켓 생성',
                      message: `${allItems.length}개의 항목을 티켓으로 생성합니다.\n각 티켓은 해당 주차에 자동 배정됩니다.`,
                      confirmLabel: '생성',
                      onConfirm: doBulk,
                    });
                  } else {
                    doBulk();
                  }
                }} disabled={saving}
                  style={{ padding:'0.8rem', borderRadius:10, border:'1px solid var(--accent2)', background:'var(--accent2)22', color:'var(--accent2)', cursor:'pointer', fontSize:'0.9rem', fontWeight:600 }}>
                  ✨ 주차 계획에서 {allItems.length}개 티켓 일괄 생성
                </button>
              );
            })()}
            <button onClick={() => setShowWeeklyInput(true)} disabled={saving}
              style={{ padding:'0.8rem', borderRadius:10, border:'1px solid var(--accent)', background:'var(--accent)20', color:'var(--accent2)', cursor:'pointer', fontSize:'0.9rem', fontWeight:600 }}>
              📅 주차 계획 (Epic) {(project?.weekly_plan || []).length > 0 ? '수정' : '등록'}
            </button>
            {Object.entries(MILESTONE_TEMPLATES).map(([key,tpl]) => (
              <button key={key} onClick={() => onCreateFromTemplate(project.slug, key)} disabled={saving}
                style={{ padding:'0.8rem', borderRadius:10, border:'none', background:'var(--accent)', color:'#fff', cursor:'pointer', fontSize:'0.9rem', fontWeight:600 }}>
                📋 {tpl.label} 템플릿 ({tpl.phases.length}개 작업)
              </button>
            ))}
          </div>
          <div style={{ marginTop:20, maxWidth:360, margin:'20px auto 0', display:'flex', gap:6 }}>
            <input type="text" placeholder="또는 직접 작업 이름 입력" value={newLabel} onChange={e=>setNewLabel(e.target.value)}
              onKeyDown={e=>{ if(e.key==='Enter' && newLabel.trim()){ onAdd(project.slug,newLabel); setNewLabel(''); } }}
              style={{ flex:1, padding:'0.6rem 0.8rem', borderRadius:8, border:'1px solid var(--border)', background:'var(--surface2)', color:'var(--text)', fontSize:'0.85rem', outline:'none' }} />
            <button onClick={()=>{ if(newLabel.trim()){ onAdd(project.slug,newLabel); setNewLabel(''); } }} disabled={!newLabel.trim()} style={{ padding:'0.6rem 1rem', borderRadius:8, border:'none', background:newLabel.trim()?'var(--surface2)':'var(--border)', color:'var(--text)', cursor:newLabel.trim()?'pointer':'not-allowed', fontSize:'0.85rem' }}>+ 추가</button>
          </div>
        </div>
      ) : (
        <div style={{ display:'grid', gridTemplateColumns:'repeat(3, minmax(0, 1fr))', gap:14 }}>
          {MILESTONE_STAGE_ORDER.map(stageKey => {
            const stage = MILESTONE_STAGES[stageKey];
            const cards = sorted.filter(m => m.status === stageKey);
            const isPlannedCol = stageKey === 'planned';
            const isDragOver = dragOverCol === stageKey && draggingId && sorted.find(x=>x.id===draggingId)?.status !== stageKey;
            return (
              <div key={stageKey}
                onDragOver={(e) => handleColDragOver(e, stageKey)}
                onDrop={(e) => handleColDrop(e, stageKey)}
                style={{
                  background: isDragOver ? stage.color+'10' : 'var(--surface)',
                  border: `${isDragOver ? '2px dashed ' + stage.color : '1px solid var(--border)'}`,
                  borderRadius:12,
                  padding: isDragOver ? '0.88rem 0.78rem' : '0.95rem 0.85rem', // compensate border width change
                  display:'flex', flexDirection:'column', minHeight:320,
                  transition:'background 0.12s',
                }}>
                {/* Column header */}
                <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', padding:'0.15rem 0.35rem 0.7rem', borderBottom:`2px solid ${stage.color}33`, marginBottom:10, flexShrink:0 }}>
                  <div style={{ display:'flex', alignItems:'center', gap:7, minWidth:0 }}>
                    <span style={{ fontSize:'0.95rem' }}>{stage.emoji}</span>
                    <span style={{ fontSize:'0.8rem', fontWeight:700, color:stage.color, textTransform:'uppercase', letterSpacing:'0.05em', whiteSpace:'nowrap' }}>{stage.label}</span>
                  </div>
                  <span style={{ fontSize:'0.8rem', fontWeight:700, color:stage.color, padding:'0.12rem 0.55rem', borderRadius:10, background:stage.color+'30', flexShrink:0 }}>{cards.length}</span>
                </div>
                {/* Cards */}
                <div style={{ display:'flex', flexDirection:'column', gap:8, overflowY:'auto', maxHeight:'65vh', paddingRight:2, flex:1 }}>
                  {cards.length === 0 ? (
                    <div style={{ padding:'1.1rem 0.5rem', textAlign:'center', color:'var(--text2)', fontSize:'0.8rem', opacity:0.4, border:'1px dashed var(--border)', borderRadius:6 }}>
                      {weekFilter !== 'all' && sortedAll.filter(m => m.status === stageKey).length > 0 ? '필터에 해당 없음' : '비어 있음'}
                    </div>
                  ) : cards.map((m, ci) => {
                    const prev = ci > 0 ? cards[ci - 1] : null;
                    const showWeekDivider = weekFilter === 'all' && (!prev || prev.week_number !== m.week_number);
                    const assignee = teamMembers?.find(tm => tm.id === m.assignee);
                    const nextStageLabel = m.status==='planned'?'진행중':m.status==='in_progress'?'완료':'예정';
                    const noteHasSub = m.note && m.note.includes('- [');
                    const isDragging = draggingId === m.id;
                    return (
                      <React.Fragment key={m.id}>
                      {showWeekDivider && (
                        <div style={{ display:'flex', alignItems:'center', gap:6, padding:'2px 2px', marginTop: ci === 0 ? 0 : 4 }}>
                          <span style={{ fontSize:'0.8rem', fontWeight:600, color:'var(--text2)', letterSpacing:'0.04em', textTransform:'uppercase', opacity:0.6 }}>
                            {m.week_number != null ? `${m.week_number}주차` : '주차 미지정'}
                          </span>
                          <div style={{ flex:1, height:1, background:'var(--border)', opacity:0.5 }} />
                        </div>
                      )}
                      <div
                        draggable
                        onDragStart={(e)=>handleDragStart(e, m)}
                        onDragEnd={handleDragEnd}
                        onClick={()=>setEditingId(m.id)}
                        style={{
                          borderRadius:8,
                          border: m.blocked?'1px solid #e1705555':'1px solid var(--border)',
                          background: m.blocked?'#e1705518':'var(--surface2)',
                          cursor: isDragging ? 'grabbing' : 'grab',
                          padding:'0.75rem 0.85rem',
                          transition:'transform 0.1s, box-shadow 0.1s, border-color 0.1s, opacity 0.1s',
                          display:'flex', flexDirection:'column', gap:6,
                          opacity: isDragging ? 0.4 : 1,
                        }}
                        onMouseEnter={e=>{ if(!isDragging){ e.currentTarget.style.transform='translateY(-1px)'; e.currentTarget.style.boxShadow='0 4px 10px var(--shadow)'; e.currentTarget.style.borderColor=m.blocked?'#e17055aa':'var(--accent)88'; } }}
                        onMouseLeave={e=>{ e.currentTarget.style.transform='none'; e.currentTarget.style.boxShadow='none'; e.currentTarget.style.borderColor=m.blocked?'#e1705555':'var(--border)'; }}
                        title="드래그로 컬럼 이동 · 클릭으로 상세 편집">
                        {/* Line 1: emoji + label + delete */}
                        <div style={{ display:'flex', alignItems:'flex-start', gap:8 }}>
                          <button onClick={(e)=>{ e.stopPropagation(); cycleStatus(m); }} disabled={saving}
                            title={`→ ${nextStageLabel}(으)로 이동`}
                            style={{ background:'transparent', border:'none', cursor:'pointer', padding:0, fontSize:'1.1rem', lineHeight:1.2, flexShrink:0 }}>
                            {m.blocked ? '🔴' : stage.emoji}
                          </button>
                          <div style={{ flex:1, minWidth:0, fontSize:'0.9rem', fontWeight:500, color:m.status==='done'?'var(--text2)':'var(--text)', textDecoration:m.status==='done'?'line-through':'none', lineHeight:1.45, wordBreak:'break-word' }}>
                            {m.phase_label}
                          </div>
                          <button onClick={(e)=>{ e.stopPropagation(); onDelete(m); }}
                            style={{ background:'transparent', border:'none', cursor:'pointer', padding:'0 3px', color:'var(--text2)', fontSize:'0.8rem', lineHeight:1, flexShrink:0, opacity:0.4 }}
                            onMouseEnter={e=>{ e.stopPropagation(); e.currentTarget.style.opacity='1'; e.currentTarget.style.color='#e17055'; }}
                            onMouseLeave={e=>{ e.currentTarget.style.opacity='0.4'; e.currentTarget.style.color='var(--text2)'; }}
                            title="삭제">✕</button>
                        </div>
                        {/* Line 2: badges */}
                        {(assignee || noteHasSub || m.week_number != null) && (
                          <div style={{ display:'flex', alignItems:'center', gap:6, flexWrap:'wrap', paddingLeft:23 }}>
                            {m.week_number != null && <span style={{ padding:'0.08rem 0.4rem', borderRadius:4, background:'var(--accent)30', color:'var(--accent2)', fontWeight:600, fontSize:'0.8rem' }}>{m.week_number}W</span>}
                            {assignee && <MemberAvatar member={assignee} size={14} />}
                            {noteHasSub && <span title="서브태스크 있음" style={{ fontSize:'0.8rem', color:'var(--text2)', opacity:0.7 }}>📝</span>}
                          </div>
                        )}
                        {/* Blocked reason */}
                        {m.blocked && m.blocked_reason && (
                          <div style={{ fontSize:'0.8rem', color:'#e17055', paddingLeft:23, whiteSpace:'nowrap', overflow:'hidden', textOverflow:'ellipsis' }} title={m.blocked_reason}>{m.blocked_reason}</div>
                        )}
                        {/* actual dates (auto-stamped on status change) */}
                        {(m.actual_start || m.actual_end) && (
                          <div style={{ fontSize:'0.8rem', color:'var(--text2)', opacity:0.65, paddingLeft:23, lineHeight:1.4, display:'flex', gap:8 }}>
                            {m.actual_start && <span>착수 {m.actual_start.split('T')[0].slice(5)}</span>}
                            {m.actual_end && <span>완료 {m.actual_end.split('T')[0].slice(5)}</span>}
                          </div>
                        )}
                      </div>
                      </React.Fragment>
                    );
                  })}
                </div>
                {/* Add card (only in planned column) */}
                {isPlannedCol && (
                  <div style={{ marginTop:10, padding:'0.45rem 0.55rem', borderRadius:6, border:'1px dashed var(--border)', display:'flex', flexDirection:'column', gap:4, flexShrink:0, transition:'border-color 0.15s' }}
                    onMouseEnter={e=>e.currentTarget.style.borderColor='var(--accent)66'}
                    onMouseLeave={e=>e.currentTarget.style.borderColor='var(--border)'}>
                    <div style={{ display:'flex', gap:6, alignItems:'center' }}>
                      <span style={{ fontSize:'0.95rem', color:'var(--text2)', lineHeight:1, flexShrink:0 }}>＋</span>
                      <input type="text" placeholder="작업 추가 (Enter)" value={newLabel} onChange={e=>setNewLabel(e.target.value)}
                        onKeyDown={e=>{ if(e.key==='Enter' && newLabel.trim()){ onAdd(project.slug,newLabel,newWeek?parseInt(newWeek):null); setNewLabel(''); setNewWeek(''); } }}
                        style={{ flex:1, minWidth:0, padding:'0.28rem 0.4rem', borderRadius:4, border:'none', background:'transparent', color:'var(--text)', fontSize:'0.8rem', outline:'none', fontFamily:'inherit' }} />
                      {weekOptions.length > 0 && (
                        <select value={newWeek} onChange={e=>setNewWeek(e.target.value)}
                          style={{ padding:'0.2rem 0.3rem', borderRadius:4, border:'1px solid var(--border)', background:'var(--surface2)', color:'var(--text2)', fontSize:'0.8rem', outline:'none', flexShrink:0 }}>
                          <option value="">주차</option>
                          {weekOptions.map(w => <option key={w.week} value={w.week} title={w.title}>{w.week}W</option>)}
                        </select>
                      )}
                    </div>
                  </div>
                )}
              </div>
            );
          })}
        </div>
      )}

      {/* Card edit modal */}
      {editing && (
        <MilestoneEditModal
          milestone={editing}
          teamMembers={teamMembers}
          saving={saving}
          onUpdate={onUpdate}
          onDelete={onDelete}
          onClose={() => setEditingId(null)}
          weekOptions={weekOptions}
        />
      )}
    </div>
  );
}

// ─── StatusModal ───
function StatusModal({ project, onClose, onSave, onFieldSave, onDelete, saving, teamMembers, milestones, milestonesSetupNeeded, onMilestoneUpdate, onMilestoneDelete, onMilestoneAdd, onMilestoneReorder, onCreateFromTemplate, onOpenProjectView, onBulkCreateWeekly, onClearWeeklyPlan, onRequestConfirm, onBackfillAssignees }) {
  const isPostWon = HAS_MILESTONES.includes(project?.current_status);
  const [tab, setTab] = useState(
    project?.current_status === 'meeting_done' ? 'meeting' : isPostWon ? 'tasks' : 'info'
  );
  const [newStatus, setNewStatus] = useState('');
  const [note, setNote] = useState('');
  const [editTitle, setEditTitle] = useState(project?.title||'');
  const [editBudget, setEditBudget] = useState(project?.budget||'');
  const [editTimeline, setEditTimeline] = useState(project?.timeline||'');
  const [editDate, setEditDate] = useState(project?.created_at||'');
  const [editStartDate, setEditStartDate] = useState(project?.start_date||'');
  const [startDateChanged, setStartDateChanged] = useState(false);
  const [editDeadline, setEditDeadline] = useState(project?.deadline||'');
  const [deadlineChanged, setDeadlineChanged] = useState(false);
  const [editMeeting, setEditMeeting] = useState(toLocalInput(project?.meeting_at));
  const [editMeetingType, setEditMeetingType] = useState(project?.meeting_type||'');
  const [editMemo, setEditMemo] = useState(project?.memo||'');
  const [memoChanged, setMemoChanged] = useState(false);
  const [editUrl, setEditUrl] = useState(project?.wishket_url||'');
  const [urlChanged, setUrlChanged] = useState(false);
  const [editLinks, setEditLinks] = useState(() => {
    const saved = project?.portfolio_links || [];
    return saved.map(l => ({...l}));
  });
  const [linksChanged, setLinksChanged] = useState(false);
  const [newLinkLabel, setNewLinkLabel] = useState('');
  const [newLinkUrl, setNewLinkUrl] = useState('');
  const [editingLinkIdx, setEditingLinkIdx] = useState(-1);
  const [infoChanged, setInfoChanged] = useState(false);
  const [dateChanged, setDateChanged] = useState(false);
  const [meetingChanged, setMeetingChanged] = useState(false);
  const [editMeetingMemo, setEditMeetingMemo] = useState('');

  const parseBN = (v) => { const d=(v||'').replace(/[^0-9]/g,''); return d ? Number(d).toLocaleString() : ''; };
  const [budgetNum, setBudgetNum] = useState(() => parseBN(project?.budget));
  // Assignment
  const [assignManager, setAssignManager] = useState(project?.assigned_manager||null);
  const [assignMain,    setAssignMain]    = useState(project?.assigned_main||null);
  const [assignSub,     setAssignSub]     = useState(project?.assigned_sub ||null);
  const [assignChanged, setAssignChanged] = useState(false);

  useEffect(() => {
    const handler = e => { if (e.key === 'Escape') onClose(); };
    window.addEventListener('keydown', handler);
    return () => window.removeEventListener('keydown', handler);
  }, [onClose]);

  if (!project) return null;
  const targets = TRANSITION_TARGETS[project.current_status]||[];
  const meta    = STATUS_META[project.current_status]||{};

  const inputS  = { width:'100%', padding:'0.5rem 0.7rem', borderRadius:8, fontSize:'0.85rem', border:'1px solid var(--border)', background:'var(--surface2)', color:'var(--text)', outline:'none' };
  const labelS  = { fontSize:'0.8rem', color:'var(--text2)', marginBottom:6, fontWeight:500 };
  const saveBtnS = (act) => ({ padding:'0.5rem 0.85rem', borderRadius:8, border:'none', cursor:'pointer', fontSize:'0.8rem', fontWeight:600, background:act?'var(--blue)':'var(--surface2)', color:act?'#fff':'var(--text2)', opacity:saving?0.7:1 });
  const checkInfo = (t,b,tl) => setInfoChanged(t!==(project.title||'') || b!==(project.budget||'') || tl!==(project.timeline||''));

  const handleBudgetChange = (val) => {
    const digits = val.replace(/[^0-9]/g,'');
    const formatted = digits ? Number(digits).toLocaleString() : '';
    setBudgetNum(formatted);
    const full = formatted ? formatted+'만원' : '';
    setEditBudget(full);
    checkInfo(editTitle, full, editTimeline);
  };

  const managerMember = teamMembers?.find(m => m.id === project.assigned_manager);
  const mainMember    = teamMembers?.find(m => m.id === project.assigned_main);
  const subMember     = teamMembers?.find(m => m.id === project.assigned_sub);
  const hasTeam = teamMembers && teamMembers.length > 0;

  const tabs = [
    { key:'info', label:'정보' },
    { key:'meeting', label:'미팅' },
    ...(isPostWon ? [{ key:'tasks', label:'작업' }] : []),
    { key:'status', label:'상태' },
  ];

  return (
    <div onClick={onClose} style={{ position:'fixed', inset:0, background:'var(--overlay)', backdropFilter:'blur(4px)', display:'flex', alignItems:'center', justifyContent:'center', zIndex:1000 }}>
      <div onClick={e => e.stopPropagation()} style={{
        background:'var(--surface)', borderRadius:16, width:'100%', maxWidth:500,
        border:'1px solid var(--border)', animation:'slideUp 0.25s ease-out',
        boxShadow:'0 20px 60px var(--shadow)', maxHeight:'88vh', display:'flex', flexDirection:'column',
      }}>
        {/* Header */}
        <div style={{ padding:'1.25rem 1.5rem 0', flexShrink:0 }}>
          <div style={{ display:'flex', justifyContent:'space-between', alignItems:'flex-start', marginBottom:'0.75rem' }}>
            <div style={{ flex:1, minWidth:0 }}>
              <div style={{ fontWeight:600, fontSize:'1rem', whiteSpace:'nowrap', overflow:'hidden', textOverflow:'ellipsis' }}>{project.title||project.slug}</div>
              <div style={{ display:'flex', gap:6, alignItems:'center', marginTop:4, flexWrap:'wrap' }}>
                <span style={{ fontSize:'0.8rem', color:'var(--text2)', fontFamily:'monospace' }}>{project.slug}</span>
                <span style={{ display:'inline-block', padding:'0.1rem 0.45rem', borderRadius:5, fontSize:'0.8rem', fontWeight:500, background:meta.color+'30', color:meta.color }}>{meta.emoji} {meta.label}</span>
                {project.current_status === 'won'
                  ? (managerMember && <MemberBadge member={managerMember} role="mgr" />)
                  : (<>{mainMember && <MemberBadge member={mainMember} role="main" />}{subMember && <MemberBadge member={subMember} role="sub" />}</>)
                }
              </div>
            </div>
            <button onClick={onClose} style={{ background:'none', border:'none', color:'var(--text2)', cursor:'pointer', fontSize:'1.1rem', padding:'2px 4px', flexShrink:0 }}>&#x2715;</button>
          </div>

          {project.wishket_url && (
            <a href={project.wishket_url} target="_blank" rel="noopener" onClick={e => e.stopPropagation()}
              style={{ display:'flex', alignItems:'center', gap:6, padding:'0.5rem 0.75rem', borderRadius:8, fontSize:'0.8rem', fontWeight:500, background:'#fdcb6e22', color:'var(--yellow)', textDecoration:'none', border:'1px solid #fdcb6e33', marginBottom:'0.5rem' }}
            >📋 위시켓 공고 보기 <span style={{ fontSize:'0.8rem', color:'var(--text2)', marginLeft:'auto' }}>{project.wishket_url.split('/project/')[1]?.replace('/','')}</span></a>
          )}

          {((project.portfolio_links||[]).length > 0) && (
            <div style={{ display:'flex', gap:4, marginBottom:'0.75rem', flexWrap:'wrap' }}>
              {(project.portfolio_links||[]).map((link, i) => (
                <a key={`cl-${i}`} href={link.url} target="_blank" rel="noopener" onClick={e => e.stopPropagation()}
                  title={link.url}
                  style={{ flex:1, padding:'0.3rem', borderRadius:6, fontSize:'0.8rem', fontWeight:500, background:'var(--surface2)', color:'var(--accent2)', textDecoration:'none', textAlign:'center', border:'1px solid var(--border)', overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap' }}
                >{link.label}</a>
              ))}
            </div>
          )}

          <div style={{ display:'flex', borderBottom:'1px solid var(--border)' }}>
            {tabs.map(t => (
              <button key={t.key} onClick={() => setTab(t.key)} style={{
                flex:1, padding:'0.55rem', background:'none', border:'none',
                borderBottom: tab===t.key ? '2px solid var(--accent)' : '2px solid transparent',
                color: tab===t.key ? 'var(--text)' : 'var(--text2)',
                fontSize:'0.85rem', fontWeight:tab===t.key?600:400, cursor:'pointer',
              }}>{t.label}</button>
            ))}
          </div>
        </div>

        {/* Tab Content */}
        <div style={{ padding:'1.25rem 1.5rem', overflowY:'auto', flex:1 }}>

          {/* 정보 탭 */}
          {tab === 'info' && (
            <>
              <div style={{ display:'flex', flexDirection:'column', gap:10 }}>
                <div>
                  <div style={labelS}>프로젝트명</div>
                  <input type="text" value={editTitle} onChange={e => { setEditTitle(e.target.value); checkInfo(e.target.value,editBudget,editTimeline); }} style={inputS} />
                </div>
                <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:8 }}>
                  <div>
                    <div style={labelS}>예산</div>
                    <div style={{ display:'flex', alignItems:'center' }}>
                      <input type="text" value={budgetNum} placeholder="2,000" onChange={e => { handleBudgetChange(e.target.value); }}
                        style={{ ...inputS, borderTopRightRadius:0, borderBottomRightRadius:0, borderRight:'none' }} />
                      <span style={{ padding:'0.5rem 0.6rem', borderRadius:'0 8px 8px 0', fontSize:'0.85rem', background:'var(--border)', color:'var(--text2)', border:'1px solid var(--border)', lineHeight:1.5, whiteSpace:'nowrap' }}>만원</span>
                    </div>
                  </div>
                  <div>
                    <div style={labelS}>기간</div>
                    <input type="text" value={editTimeline} placeholder="90일" onChange={e => { setEditTimeline(e.target.value); checkInfo(editTitle,editBudget,e.target.value); }} style={inputS} />
                  </div>
                </div>
                <div>
                  <div style={labelS}>생성일</div>
                  <input type="date" value={editDate} onChange={e => { setEditDate(e.target.value); setDateChanged(e.target.value!==(project.created_at||'')); }} style={inputS} />
                </div>
                {HAS_MILESTONES.includes(project.current_status) && (
                  <div style={{ display:'flex', gap:10 }}>
                    <div style={{ flex:1 }}>
                      <div style={{ ...labelS, display:'flex', alignItems:'center', gap:5 }}>
                        착수일
                        <span style={{ fontSize:'0.8rem', color:'var(--text2)', fontWeight:400, opacity:0.8 }}>주차 자동 계산 기준</span>
                      </div>
                      <input type="date" value={editStartDate} onChange={e => { setEditStartDate(e.target.value); setStartDateChanged(e.target.value!==(project.start_date||'')); }} style={inputS} />
                      {editStartDate && (() => { const cw = getCurrentWeek(editStartDate); return cw != null ? (
                        <div style={{ marginTop:4, fontSize:'0.8rem', color:'var(--green)', opacity:0.9 }}>→ 오늘 기준 {cw}주차 진행 중</div>
                      ) : (
                        <div style={{ marginTop:4, fontSize:'0.8rem', color:'var(--text2)', opacity:0.7 }}>→ 아직 착수 전 날짜</div>
                      ); })()}
                    </div>
                    <div style={{ flex:1 }}>
                      <div style={{ ...labelS }}>마감일</div>
                      <input type="date" value={editDeadline} onChange={e => { setEditDeadline(e.target.value); setDeadlineChanged(e.target.value!==(project.deadline||'')); }} style={inputS} />
                      {editDeadline && (() => {
                        const today = new Date(); today.setHours(0,0,0,0);
                        const dl = new Date(editDeadline); dl.setHours(0,0,0,0);
                        const diff = Math.round((dl - today) / 86400000);
                        if (diff < 0) return <div style={{ marginTop:4, fontSize:'0.8rem', color:'#e17055', opacity:0.9 }}>→ {-diff}일 초과</div>;
                        if (diff === 0) return <div style={{ marginTop:4, fontSize:'0.8rem', color:'#fdcb6e', opacity:0.9 }}>→ 오늘 마감</div>;
                        return <div style={{ marginTop:4, fontSize:'0.8rem', color:'var(--text2)', opacity:0.7 }}>→ D-{diff}</div>;
                      })()}
                    </div>
                  </div>
                )}
                <div>
                  <div style={labelS}>위시켓 공고 URL</div>
                  <input type="url" value={editUrl} placeholder="https://www.wishket.com/project/..." onChange={e => { setEditUrl(e.target.value); setUrlChanged(e.target.value!==(project.wishket_url||'')); }} style={inputS} />
                </div>
                <div>
                  <div style={labelS}>메모</div>
                  <textarea value={editMemo} placeholder="자유롭게 메모..." onChange={e => { setEditMemo(e.target.value); setMemoChanged(e.target.value!==(project.memo||'')); }}
                    style={{ ...inputS, minHeight:56, resize:'vertical', fontFamily:'inherit', lineHeight:1.5 }} />
                </div>
                {/* 포트폴리오 링크 관리 */}
                <div>
                  <div style={{ ...labelS, display:'flex', alignItems:'center', justifyContent:'space-between' }}>
                    <span>포트폴리오 링크</span>
                    <span style={{ fontSize:'0.75rem', color:'var(--text2)', fontWeight:400 }}>{editLinks.length}개</span>
                  </div>
                  {editLinks.length > 0 && (
                    <div style={{ display:'flex', flexDirection:'column', gap:6, marginBottom:8 }}>
                      {editLinks.map((link, idx) => (
                        <div key={idx} style={{ display:'flex', alignItems:'center', gap:6, padding:'0.4rem 0.6rem', borderRadius:8, background:'var(--surface2)', border:'1px solid var(--border)' }}>
                          {editingLinkIdx === idx ? (
                            <>
                              <div style={{ flex:1, display:'flex', flexDirection:'column', gap:4 }}>
                                <input type="text" value={link.label} placeholder="라벨" onChange={e => {
                                  const next = [...editLinks]; next[idx] = { ...next[idx], label: e.target.value };
                                  setEditLinks(next); setLinksChanged(true);
                                }} style={{ ...inputS, fontSize:'0.8rem', padding:'0.3rem 0.5rem' }} />
                                <input type="url" value={link.url} placeholder="https://..." onChange={e => {
                                  const next = [...editLinks]; next[idx] = { ...next[idx], url: e.target.value };
                                  setEditLinks(next); setLinksChanged(true);
                                }} style={{ ...inputS, fontSize:'0.8rem', padding:'0.3rem 0.5rem' }} />
                              </div>
                              <button onClick={() => setEditingLinkIdx(-1)} style={{ background:'none', border:'none', color:'var(--green)', cursor:'pointer', fontSize:'0.9rem', padding:'4px', flexShrink:0 }} title="완료">&#x2714;</button>
                            </>
                          ) : (
                            <>
                              <a href={link.url} target="_blank" rel="noopener" onClick={e => e.stopPropagation()}
                                style={{ flex:1, minWidth:0, textDecoration:'none', color:'var(--accent2)', fontSize:'0.8rem', fontWeight:500, overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap' }}
                                title={link.url}
                              >{link.label || link.url}</a>
                              <button onClick={() => setEditingLinkIdx(idx)} style={{ background:'none', border:'none', color:'var(--text2)', cursor:'pointer', fontSize:'0.75rem', padding:'2px 4px', flexShrink:0 }} title="수정">&#x270E;</button>
                              <button onClick={() => {
                                const next = editLinks.filter((_, i) => i !== idx);
                                setEditLinks(next); setLinksChanged(true); setEditingLinkIdx(-1);
                              }} style={{ background:'none', border:'none', color:'var(--red)', cursor:'pointer', fontSize:'0.8rem', padding:'2px 4px', flexShrink:0 }} title="삭제">&#x2715;</button>
                            </>
                          )}
                        </div>
                      ))}
                    </div>
                  )}
                  <div style={{ display:'flex', gap:6 }}>
                    <input type="text" value={newLinkLabel} placeholder="라벨 (예: P1 데모)" onChange={e => setNewLinkLabel(e.target.value)}
                      style={{ ...inputS, flex:'0 0 35%', fontSize:'0.8rem', padding:'0.4rem 0.6rem' }} />
                    <input type="url" value={newLinkUrl} placeholder="https://..." onChange={e => setNewLinkUrl(e.target.value)}
                      onKeyDown={e => {
                        if (e.key === 'Enter' && newLinkUrl.trim()) {
                          setEditLinks([...editLinks, { label: newLinkLabel.trim() || newLinkUrl.trim(), url: newLinkUrl.trim() }]);
                          setLinksChanged(true); setNewLinkLabel(''); setNewLinkUrl('');
                        }
                      }}
                      style={{ ...inputS, flex:1, fontSize:'0.8rem', padding:'0.4rem 0.6rem' }} />
                    <button onClick={() => {
                      if (!newLinkUrl.trim()) return;
                      setEditLinks([...editLinks, { label: newLinkLabel.trim() || newLinkUrl.trim(), url: newLinkUrl.trim() }]);
                      setLinksChanged(true); setNewLinkLabel(''); setNewLinkUrl('');
                    }} disabled={!newLinkUrl.trim()} style={{
                      padding:'0.4rem 0.7rem', borderRadius:8, border:'1px solid var(--accent)',
                      background: newLinkUrl.trim() ? 'var(--accent)' : 'var(--surface2)',
                      color: newLinkUrl.trim() ? '#fff' : 'var(--text2)',
                      cursor: newLinkUrl.trim() ? 'pointer' : 'default',
                      fontSize:'0.8rem', fontWeight:600, flexShrink:0,
                    }}>+</button>
                  </div>
                </div>
              </div>
              {(infoChanged||dateChanged||startDateChanged||deadlineChanged||urlChanged||memoChanged||linksChanged) && (
                <button onClick={() => {
                  const fields = {};
                  if (infoChanged) { fields.title=editTitle; fields.budget=editBudget; fields.timeline=editTimeline; }
                  if (dateChanged) fields.created_at = editDate;
                  if (startDateChanged) fields.start_date = editStartDate || null;
                  if (deadlineChanged) fields.deadline = editDeadline || null;
                  if (urlChanged)  fields.wishket_url = editUrl;
                  if (memoChanged) fields.memo = editMemo;
                  if (linksChanged) fields.portfolio_links = editLinks;
                  onFieldSave(project, fields);
                  setInfoChanged(false); setDateChanged(false); setStartDateChanged(false); setDeadlineChanged(false); setUrlChanged(false); setMemoChanged(false); setLinksChanged(false);
                }} disabled={saving} style={{ ...saveBtnS(true), width:'100%', marginTop:10 }}>
                  {saving ? '저장 중...' : '저장'}
                </button>
              )}
              {/* 매니저 지정 */}
              {hasTeam && (
                <div style={{ marginTop:'1.25rem', borderTop:'1px solid var(--border)', paddingTop:'1.25rem' }}>
                  <div style={{ fontSize:'0.85rem', fontWeight:600, marginBottom:10 }}>프로젝트 매니저</div>
                  <AssignPicker
                    label="Manager (프로젝트 총괄)"
                    members={teamMembers||[]}
                    value={assignManager}
                    onChange={id => { setAssignManager(id); setAssignChanged(id!==(project.assigned_manager||null) || assignMain!==(project.assigned_main||null) || assignSub!==(project.assigned_sub||null)); }}
                    exclude={null}
                  />
                  {assignChanged && assignManager !== (project.assigned_manager||null) && (
                    <button onClick={() => {
                      const today = new Date().toISOString().split('T')[0];
                      const mgrName = (teamMembers||[]).find(m => m.id===assignManager)?.name;
                      const noteStr = mgrName ? `매니저 배정 — ${mgrName}` : '매니저 해제';
                      const newHistory = [...(project.history||[]), { status:project.current_status, date:today, note:noteStr }];
                      onFieldSave(project, { assigned_manager:assignManager||null, history:newHistory });
                      setAssignChanged(false);
                    }} disabled={saving} style={{ ...saveBtnS(true), width:'100%', marginTop:10, background:'var(--accent)' }}>
                      {saving?'저장 중...':'매니저 저장'}
                    </button>
                  )}
                </div>
              )}
              <div style={{ marginTop:'1.5rem', borderTop:'1px solid var(--border)', paddingTop:'1rem' }}>
                <button onClick={() => {
                  if (onRequestConfirm) {
                    onRequestConfirm({
                      title: '프로젝트 삭제',
                      message: `이 작업은 되돌릴 수 없습니다.\n연결된 모든 티켓과 데이터가 영구 삭제됩니다.\n\n확인하려면 아래에 프로젝트 슬러그를 입력하세요.`,
                      confirmLabel: '영구 삭제',
                      destructive: true,
                      confirmInput: { label: `슬러그 입력: ${project.slug}`, match: project.slug },
                      onConfirm: () => onDelete(project),
                    });
                  } else {
                    onDelete(project);
                  }
                }} disabled={saving} style={{ width:'100%', padding:'0.45rem', borderRadius:8, border:'1px solid #e1705544', background:'transparent', color:'#e17055', cursor:'pointer', fontSize:'0.8rem' }}>
                  프로젝트 삭제
                </button>
              </div>
            </>
          )}

          {/* 미팅 탭 */}
          {tab === 'meeting' && (() => {
            const meetingHistory = (project.history||[]).filter(h => h.meeting_at).sort((a,b) => new Date(b.meeting_at)-new Date(a.meeting_at));
            const currentMeeting = project.meeting_at ? { meeting_at:project.meeting_at, meeting_type:project.meeting_type } : null;
            return (
              <>
                {currentMeeting && (() => {
                  const ms = getMeetingStatus(currentMeeting.meeting_at);
                  const mt = MEETING_TYPES.find(t => t.key===currentMeeting.meeting_type);
                  const mStr = formatMeetingAt(currentMeeting.meeting_at);
                  const isDone = ms === 'done';
                  return (
                    <div style={{ padding:'0.7rem 0.9rem', borderRadius:8, background:isDone?'#74b9ff1a':'#fdcb6e1a', border:`1px solid ${isDone?'#74b9ff33':'#fdcb6e33'}`, marginBottom:'1rem', display:'flex', alignItems:'center', justifyContent:'space-between' }}>
                      <div>
                        <div style={{ fontSize:'0.8rem', color:'var(--text2)', marginBottom:2 }}>{isDone?'최근 미팅':'다음 미팅'}</div>
                        <div style={{ fontSize:'0.9rem', fontWeight:600, color:isDone?'#74b9ff':'#fdcb6e' }}>{mt&&mt.emoji+' '}{mStr}</div>
                      </div>
                      <span style={{ padding:'0.15rem 0.45rem', borderRadius:5, fontSize:'0.8rem', fontWeight:600, background:isDone?'#74b9ff30':'#fdcb6e30', color:isDone?'#74b9ff':'#fdcb6e' }}>{isDone?'완료':'예정'}</span>
                    </div>
                  );
                })()}

                {meetingHistory.length > 0 && (
                  <div style={{ marginBottom:'1rem' }}>
                    <div style={{ fontSize:'0.8rem', color:'var(--text2)', marginBottom:6, fontWeight:600 }}>미팅 이력</div>
                    <div style={{ display:'flex', flexDirection:'column', gap:4 }}>
                      {meetingHistory.map((h,i) => {
                        const mt = MEETING_TYPES.find(t => t.key===h.meeting_type);
                        return (
                          <div key={i} style={{ padding:'0.45rem 0.6rem', borderRadius:6, background:'var(--surface2)', fontSize:'0.8rem' }}>
                            <div style={{ display:'flex', alignItems:'center', gap:8 }}>
                              <span>{mt?mt.emoji:'📅'}</span>
                              <span style={{ color:'var(--text2)' }}>{formatMeetingAt(h.meeting_at)}</span>
                              {h.note && <span style={{ color:'var(--text2)', opacity:0.6, fontSize:'0.8rem' }}>— {h.note}</span>}
                            </div>
                            {h.meeting_memo && <div style={{ marginTop:4, fontSize:'0.8rem', color:'var(--text2)', lineHeight:1.5, paddingLeft:22, whiteSpace:'pre-wrap' }}>{h.meeting_memo}</div>}
                          </div>
                        );
                      })}
                    </div>
                  </div>
                )}

                <div style={{ fontSize:'0.85rem', fontWeight:600, marginBottom:8 }}>{currentMeeting?(project.current_status==='meeting_done'?'추가 미팅 등록':'미팅 수정'):'미팅 등록'}</div>
                {project.current_status === 'meeting_done' && (() => {
                  const selectedIso = editMeeting ? new Date(editMeeting) : null;
                  const isFuture = selectedIso && selectedIso > new Date();
                  const isPast   = selectedIso && selectedIso <= new Date();
                  if (isFuture) return (
                    <div style={{ padding:'0.5rem 0.7rem', borderRadius:8, background:'#00b8941a', border:'1px solid #00b89433', marginBottom:'0.75rem', fontSize:'0.8rem', color:'var(--green)' }}>
                      ✅ 미래 일정 — 저장 시 '미팅 예정' 상태로 자동 전환됩니다
                    </div>
                  );
                  if (isPast) return (
                    <div style={{ padding:'0.5rem 0.7rem', borderRadius:8, background:'#636e721a', border:'1px solid #636e7233', marginBottom:'0.75rem', fontSize:'0.8rem', color:'var(--text2)' }}>
                      ℹ️ 과거 일정 — 상태 전환 없이 미팅 기록만 저장됩니다
                    </div>
                  );
                  return (
                    <div style={{ padding:'0.5rem 0.7rem', borderRadius:8, background:'#fdcb6e1a', border:'1px solid #fdcb6e30', marginBottom:'0.75rem', fontSize:'0.8rem', color:'var(--yellow)' }}>
                      💡 미래 일정을 등록하면 자동으로 '미팅 예정'으로 전환됩니다
                    </div>
                  );
                })()}
                <div style={{ display:'flex', flexDirection:'column', gap:10 }}>
                  <div>
                    <div style={labelS}>미팅 일시</div>
                    <input type="datetime-local" value={editMeeting} onChange={e => { setEditMeeting(e.target.value); setMeetingChanged(true); }} style={inputS} />
                  </div>
                  <div>
                    <div style={labelS}>미팅 종류</div>
                    <div style={{ display:'flex', gap:6 }}>
                      {MEETING_TYPES.map(mt => {
                        const sel = editMeetingType===mt.key;
                        return (<button key={mt.key} onClick={() => { setEditMeetingType(mt.key); setMeetingChanged(true); }} style={{ flex:1, padding:'0.5rem', borderRadius:8, fontSize:'0.85rem', cursor:'pointer', border:sel?'2px solid var(--yellow)':'2px solid transparent', transition:'all 0.15s', background:sel?'var(--yellow)30':'var(--surface2)', color:sel?'var(--yellow)':'var(--text2)', fontWeight:sel?600:400 }}>{mt.emoji} {mt.label}</button>);
                      })}
                    </div>
                  </div>
                  <div>
                    <div style={labelS}>미팅 메모</div>
                    <textarea value={editMeetingMemo} placeholder="논의 내용, 다음 액션 등..."
                      onChange={e => { setEditMeetingMemo(e.target.value); setMeetingChanged(true); }}
                      style={{ ...inputS, minHeight:72, resize:'vertical', fontFamily:'inherit', lineHeight:1.5 }} />
                  </div>
                </div>
                {meetingChanged && (() => {
                  const iso = editMeeting ? new Date(editMeeting).toISOString() : null;
                  const willTransition = project.current_status==='meeting_done' && iso && new Date(iso)>new Date();
                  const shouldArchive = willTransition && currentMeeting;
                  return (
                    <button onClick={() => {
                      const today = new Date().toISOString().split('T')[0];
                      let newHistory = [...(project.history||[])];
                      if (shouldArchive) newHistory.push({ status:'meeting_done', date:today, note:'미팅 완료 (아카이브)', meeting_at:currentMeeting.meeting_at, meeting_type:currentMeeting.meeting_type, meeting_memo:editMeetingMemo||null });
                      if (willTransition) {
                        newHistory.push({ status:'interview', date:today, note:'추가 미팅 예정', meeting_at:iso, meeting_type:editMeetingType||null, meeting_memo:editMeetingMemo||null });
                        onFieldSave(project, { meeting_at:iso, meeting_type:editMeetingType||null, current_status:'interview', history:newHistory });
                      } else {
                        const isChange = !!currentMeeting;
                        const changeNote = isChange
                          ? `미팅 변경 (${currentMeeting.meeting_at?.slice(0,10)} → ${iso?.slice(0,10)||'삭제'})`
                          : '미팅 등록';
                        onFieldSave(project, { meeting_at:iso, meeting_type:editMeetingType||null, history:[...(project.history||[]), { status:project.current_status, date:today, note:changeNote, meeting_at:iso, meeting_type:editMeetingType||null, meeting_memo:editMeetingMemo||null }] });
                      }
                      setEditMeetingMemo('');
                      setMeetingChanged(false);
                    }} disabled={saving} style={{ ...saveBtnS(true), width:'100%', marginTop:12 }}>
                      {saving?'저장 중...':willTransition?'📅 미팅 등록 + 미팅 예정 전환':'미팅 저장'}
                    </button>
                  );
                })()}

                {/* 담당자 지정 */}
                <div style={{ marginTop:'1.25rem', borderTop:'1px solid var(--border)', paddingTop:'1.25rem' }}>
                  <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:12 }}>
                    <div style={{ fontSize:'0.85rem', fontWeight:600 }}>담당자 지정</div>
                    {!hasTeam && (
                      <span style={{ fontSize:'0.8rem', color:'var(--text2)' }}>팀원 관리에서 팀원을 먼저 추가하세요</span>
                    )}
                  </div>
                  <div style={{ display:'flex', flexDirection:'column', gap:12 }}>
                    <AssignPicker
                      label="주 담당자 (Main)"
                      members={teamMembers||[]}
                      value={assignMain}
                      onChange={id => { setAssignMain(id); setAssignChanged(id!==(project.assigned_main||null) || assignSub!==(project.assigned_sub||null) || assignManager!==(project.assigned_manager||null)); }}
                      exclude={assignSub}
                    />
                    <AssignPicker
                      label="보조 담당자 (Sub)"
                      members={teamMembers||[]}
                      value={assignSub}
                      onChange={id => { setAssignSub(id); setAssignChanged(assignMain!==(project.assigned_main||null) || id!==(project.assigned_sub||null) || assignManager!==(project.assigned_manager||null)); }}
                      exclude={assignMain}
                    />
                  </div>
                  {assignChanged && (assignMain!==(project.assigned_main||null) || assignSub!==(project.assigned_sub||null)) && (
                    <button onClick={() => {
                      const today = new Date().toISOString().split('T')[0];
                      const mName = (teamMembers||[]).find(m => m.id===assignMain)?.name;
                      const sName = (teamMembers||[]).find(m => m.id===assignSub)?.name;
                      const parts = [];
                      if (mName) parts.push(`주담당: ${mName}`);
                      if (sName) parts.push(`보조: ${sName}`);
                      const noteStr = parts.length ? `미팅 담당 배정 — ${parts.join(', ')}` : '미팅 담당자 해제';
                      const newHistory = [...(project.history||[]), { status:project.current_status, date:today, note:noteStr }];
                      onFieldSave(project, { assigned_main:assignMain||null, assigned_sub:assignSub||null, history:newHistory });
                      setAssignChanged(false);
                    }} disabled={saving} style={{ ...saveBtnS(true), width:'100%', marginTop:10, background:'var(--accent)' }}>
                      {saving?'저장 중...':'담당자 저장'}
                    </button>
                  )}
                </div>

                {(project.current_status==='applied'||project.current_status==='interview'||project.current_status==='meeting_done') && (
                  <div style={{ marginTop:'1.5rem', borderTop:'1px solid var(--border)', paddingTop:'1rem' }}>
                    <div style={{ fontSize:'0.8rem', color:'var(--text2)', marginBottom:8 }}>빠른 상태 변경</div>
                    <div style={{ display:'flex', gap:8 }}>
                      {project.current_status==='applied' && <button onClick={() => onSave(project,'interview','미팅 예정')} disabled={saving} style={{ flex:1, padding:'0.5rem', borderRadius:8, border:'none', fontSize:'0.85rem', fontWeight:600, cursor:'pointer', background:'#fdcb6e30', color:'#fdcb6e' }}>📅 미팅 예정으로 변경</button>}
                      {project.current_status==='interview' && <button onClick={() => onSave(project,'meeting_done','미팅 완료')} disabled={saving} style={{ flex:1, padding:'0.5rem', borderRadius:8, border:'none', fontSize:'0.85rem', fontWeight:600, cursor:'pointer', background:'#74b9ff30', color:'#74b9ff' }}>🤝 계약 논의 중으로 변경</button>}
                      {project.current_status==='meeting_done' && <button onClick={() => onSave(project,'interview','추가 미팅 예정')} disabled={saving} style={{ flex:1, padding:'0.5rem', borderRadius:8, border:'none', fontSize:'0.85rem', fontWeight:600, cursor:'pointer', background:'#fdcb6e30', color:'#fdcb6e' }}>📅 추가 미팅 예정으로 변경</button>}
                    </div>
                  </div>
                )}
              </>
            );
          })()}

          {/* 작업 탭 - 요약 + 전체 화면 링크 */}
          {tab === 'tasks' && (() => {
            const list = [...(milestones||[])].sort((a,b)=>(a.order_idx||0)-(b.order_idx||0));
            const doneCount = list.filter(m => m.status==='done').length;
            const pct = list.length ? Math.round((doneCount/list.length)*100) : 0;
            const hasBlocked = list.some(m => m.blocked);
            const current = list.find(m => m.status==='in_progress') || list.find(m => m.status!=='done');
            const openFull = () => { onOpenProjectView(project.slug); onClose(); };
            if (milestonesSetupNeeded) {
              return (
                <div>
                  <div style={{ padding:'0.7rem 0.9rem', borderRadius:8, background:'#fdcb6e1a', border:'1px solid #fdcb6e33', marginBottom:'0.75rem' }}>
                    <div style={{ fontSize:'0.85rem', fontWeight:600, color:'var(--yellow)', marginBottom:4 }}>⚠️ DB 설정 필요</div>
                    <div style={{ fontSize:'0.8rem', color:'var(--text2)', lineHeight:1.5 }}>전체 화면에서 설정 SQL을 복사할 수 있습니다.</div>
                  </div>
                  <button onClick={openFull} style={{ width:'100%', padding:'0.75rem', borderRadius:10, border:'none', background:'var(--accent)', color:'#fff', cursor:'pointer', fontSize:'0.9rem', fontWeight:600 }}>🎯 전체 화면에서 열기</button>
                </div>
              );
            }
            return (
              <div style={{ display:'flex', flexDirection:'column', gap:12 }}>
                {list.length > 0 ? (
                  <>
                    <div style={{ padding:'0.9rem 1rem', borderRadius:10, background:'var(--surface2)', border:'1px solid var(--border)' }}>
                      <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:8 }}>
                        <div style={{ fontSize:'0.85rem', fontWeight:600 }}>진행률 {doneCount}/{list.length}</div>
                        <div style={{ fontSize:'0.95rem', fontWeight:700, color:hasBlocked?'#e17055':'var(--green)' }}>{pct}%</div>
                      </div>
                      <div style={{ height:6, background:'var(--bg)', borderRadius:3, overflow:'hidden' }}>
                        <div style={{ width:pct+'%', height:'100%', background:hasBlocked?'#e17055':'var(--green)', transition:'width 0.3s' }} />
                      </div>
                      {current && (
                        <div style={{ marginTop:10, fontSize:'0.8rem', color:'var(--text2)' }}>
                          현재 작업: <b style={{ color: hasBlocked&&current.blocked?'#e17055':MILESTONE_STAGES[current.status]?.color }}>
                            {current.blocked?'🔴 ':''}{current.phase_label}
                          </b>
                        </div>
                      )}
                      {hasBlocked && <div style={{ marginTop:6, fontSize:'0.8rem', color:'#e17055' }}>🔴 블로킹된 작업이 있습니다</div>}
                      {/* Weekly progress in summary */}
                      {(() => {
                        const hasPlan = Array.isArray(project?.weekly_plan) && project.weekly_plan.length > 0;
                        const hasWeeks = hasPlan || list.some(m => m.week_number != null);
                        if (!hasWeeks) return null;
                        return (
                          <div style={{ marginTop:8, paddingTop:6, borderTop:'1px solid var(--border)' }}>
                            <div style={{ fontSize:'0.8rem', color:'var(--text2)', fontWeight:600, marginBottom:4 }}>주차별 (Epic)</div>
                            <WeeklyProgressBars weeklyPlan={project?.weekly_plan} milestones={list} startDate={project?.start_date} />
                          </div>
                        );
                      })()}
                      {/* 백필 버튼 */}
                      {(() => {
                        if (!onBackfillAssignees || !teamMembers) return null;
                        const isActive = (id) => !!id && !!teamMembers.find(tm => tm.id === id && tm.is_active);
                        const needsFill = list.filter(m => !isActive(m.assignee)).length;
                        const hasDefault = isActive(project?.assigned_main) || isActive(project?.assigned_sub);
                        if (needsFill === 0 || !hasDefault) return null;
                        return (
                          <button
                            onClick={() => {
                              if (onRequestConfirm) {
                                onRequestConfirm({
                                  title: '담당자 일괄 배정',
                                  message: `미지정·유효하지 않은 티켓 ${needsFill}개를 프로젝트 담당자로 배정합니다.\n\n계속할까요?`,
                                  confirmLabel: '배정',
                                  onConfirm: () => onBackfillAssignees(project.slug),
                                });
                              } else {
                                onBackfillAssignees(project.slug);
                              }
                            }}
                            style={{ marginTop:8, width:'100%', padding:'0.4rem', borderRadius:6, border:'1px solid var(--accent2)44', background:'var(--accent2)11', color:'var(--accent2)', cursor:'pointer', fontSize:'0.8rem', fontWeight:600 }}>
                            👤 담당자 백필 ({needsFill})
                          </button>
                        );
                      })()}
                    </div>
                  </>
                ) : (
                  <div style={{ padding:'1.25rem', borderRadius:10, background:'var(--surface2)', border:'1px solid var(--border)', textAlign:'center', color:'var(--text2)' }}>
                    <div style={{ fontSize:'1.8rem', marginBottom:6 }}>📋</div>
                    <div style={{ fontSize:'0.85rem' }}>등록된 작업이 없습니다</div>
                  </div>
                )}
                <button onClick={openFull} style={{ width:'100%', padding:'0.85rem', borderRadius:10, border:'none', background:'var(--accent)', color:'#fff', cursor:'pointer', fontSize:'0.9rem', fontWeight:600 }}>
                  🎯 전체 화면에서 {list.length > 0 ? '작업 관리' : '시작하기'} →
                </button>
                <div style={{ fontSize:'0.8rem', color:'var(--text2)', textAlign:'center', opacity:0.7 }}>
                  상세 편집, 메모, 서브태스크는 전체 화면에서 더 편리합니다
                </div>
              </div>
            );
          })()}

          {/* 상태 탭 */}
          {tab === 'status' && (
            <>
              {project.history && project.history.length > 0 && (
                <div style={{ marginBottom:'1.25rem' }}>
                  <div style={{ fontSize:'0.8rem', color:'var(--text2)', marginBottom:8, fontWeight:600 }}>변경 이력</div>
                  <div style={{ maxHeight:160, overflowY:'auto', display:'flex', flexDirection:'column', gap:6 }}>
                    {[...(project.history||[])].reverse().map((h,i) => {
                      const hm = STATUS_META[h.status]||{};
                      return (
                        <div key={i} style={{ fontSize:'0.8rem', color:'var(--text2)', display:'flex', gap:8, padding:'0.3rem 0', borderBottom:'1px solid var(--surface2)' }}>
                          <span style={{ color:hm.color }}>{hm.emoji||'·'}</span>
                          <span style={{ flexShrink:0 }}>{h.date}</span>
                          <span style={{ color:'var(--text)', fontWeight:500 }}>{hm.label||'—'}</span>
                          {h.note && <span style={{ opacity:0.6, overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap' }}>— {h.note}</span>}
                        </div>
                      );
                    })}
                  </div>
                </div>
              )}
              {targets.length > 0 ? (
                <>
                  <div style={{ fontSize:'0.85rem', fontWeight:600, marginBottom:8 }}>상태 변경</div>
                  <div style={{ display:'flex', gap:8, marginBottom:'1rem', flexWrap:'wrap' }}>
                    {targets.map(s => {
                      const sm = STATUS_META[s]; const selected = newStatus===s;
                      return (<button key={s} onClick={() => setNewStatus(s)} style={{ padding:'0.5rem 1rem', borderRadius:10, cursor:'pointer', transition:'all 0.15s', fontSize:'0.85rem', fontWeight:selected?600:400, background:selected?sm.color+'33':'var(--surface2)', color:selected?sm.color:'var(--text2)', border:selected?`2px solid ${sm.color}`:'2px solid transparent' }}>{sm.emoji} {sm.label}</button>);
                    })}
                  </div>
                  <input type="text" placeholder="메모 (선택)" value={note} onChange={e => setNote(e.target.value)} style={{ ...inputS, marginBottom:'0.75rem' }}
                    onKeyDown={e => { if (e.key==='Enter' && newStatus) onSave(project,newStatus,note); }} />
                  <button onClick={() => onSave(project,newStatus,note)} disabled={!newStatus||saving}
                    style={{ width:'100%', padding:'0.65rem', borderRadius:10, border:'none', cursor:newStatus&&!saving?'pointer':'not-allowed', fontSize:'0.9rem', fontWeight:600, background:newStatus&&!saving?'var(--accent)':'var(--surface2)', color:newStatus&&!saving?'#fff':'var(--text2)', opacity:saving?0.7:1 }}>
                    {saving?'저장 중...':'상태 변경'}
                  </button>
                </>
              ) : (
                <div style={{ textAlign:'center', padding:'1rem', color:'var(--text2)', fontSize:'0.85rem', background:'var(--surface2)', borderRadius:8 }}>현재 전환 가능한 상태가 없습니다</div>
              )}
            </>
          )}
        </div>
      </div>
    </div>
  );
}

// ─── ProjectTable ───
function ProjectTable({ data, filter, search, dateRange, onRowClick, sortKey, sortOrder, onSort, onBatchLost, onMemoSave, memberFilter, teamMembers, milestones, milestonesSetupNeeded, onQuickApplyTemplate, onOpenProject }) {
  const [selected, setSelected] = useState(new Set());
  const toggleSelect = (slug, e) => { e.stopPropagation(); setSelected(prev => { const s=new Set(prev); s.has(slug)?s.delete(slug):s.add(slug); return s; }); };

  // 1) 필터링만
  const filteredOnly = useMemo(() => {
    let list = filter==='all' ? data : data.filter(d => d.current_status===filter);
    if (search.trim()) {
      const q = search.toLowerCase();
      list = list.filter(d => (d.title||'').toLowerCase().includes(q) || (d.slug||'').toLowerCase().includes(q) || (d.memo||'').toLowerCase().includes(q));
    }
    if (dateRange && dateRange !== 'all') {
      const days = parseInt(dateRange);
      if (days > 0) {
        const cutoff = new Date(); cutoff.setDate(cutoff.getDate()-days);
        const cutoffStr = cutoff.toISOString().split('T')[0];
        list = list.filter(d => (d.created_at||'') >= cutoffStr);
      }
    }
    if (memberFilter) {
      list = list.filter(d => d.assigned_manager===memberFilter || d.assigned_main===memberFilter || d.assigned_sub===memberFilter);
    }
    return list;
  }, [data, filter, search, dateRange, memberFilter]);

  // 2) urgency/stale 마킹 (필터 결과만 변할 때 재계산)
  const enriched = useMemo(() => {
    const now = new Date();
    const urgent=[]; const rest=[];
    for (const r of filteredOnly) {
      const _stale = r.current_status==='applied' && r.created_at && daysBetween(r.created_at, now)>=30;
      const urg = getMeetingUrgency(r.meeting_at);
      if (urg) urgent.push({ ...r, _stale, _urgency:urg });
      else rest.push({ ...r, _stale });
    }
    urgent.sort((a,b) => new Date(a.meeting_at)-new Date(b.meeting_at));
    return { urgent, rest };
  }, [filteredOnly]);

  // 3) 정렬 (정렬 키만 바뀔 때 재계산)
  const filtered = useMemo(() => {
    const sortFn = (a,b) => {
      let va, vb;
      if (sortKey==='budget')     { va=parseBudgetNum(a.budget);  vb=parseBudgetNum(b.budget); }
      else if (sortKey==='meeting_at') { va=a.meeting_at||''; vb=b.meeting_at||''; }
      else { va=a.created_at||''; vb=b.created_at||''; }
      if (typeof va === 'number') return sortOrder==='desc'?vb-va:va-vb;
      return sortOrder==='desc'?vb.localeCompare(va):va.localeCompare(vb);
    };
    const sortedRest = enriched.rest.slice().sort(sortFn);
    return [...enriched.urgent, ...sortedRest];
  }, [enriched, sortKey, sortOrder]);

  const toggleAll = () => { setSelected(prev => prev.size===filtered.length ? new Set() : new Set(filtered.map(r=>r.slug))); };

  const cols = [
    { key:'status',     label:'상태',  sortable:false, width:'120px' },
    { key:'title',      label:'프로젝트', sortable:false, width:'' },
    { key:'budget',     label:'예산',  sortable:true,  width:'110px' },
    { key:'created_at', label:'생성일', sortable:true,  width:'100px' },
    { key:'meeting_at', label:'미팅일', sortable:true,  width:'175px' },
    { key:'assigned',   label:'담당',  sortable:false, width:'130px' },
    { key:'note',       label:'메모',  sortable:false, width:'160px' },
  ];

  return (
    <div style={{ background:'var(--surface)', borderRadius:12, border:'1px solid var(--border)', overflow:'hidden' }}>
      {selected.size > 0 && (
        <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', padding:'0.6rem 1rem', background:'#e1705522', borderBottom:'1px solid #e1705533' }}>
          <span style={{ fontSize:'0.85rem', color:'var(--text)' }}>{selected.size}건 선택됨</span>
          <div style={{ display:'flex', gap:8 }}>
            <button onClick={() => setSelected(new Set())} style={{ padding:'0.35rem 0.7rem', borderRadius:6, border:'1px solid var(--border)', background:'transparent', color:'var(--text2)', cursor:'pointer', fontSize:'0.8rem' }}>선택 해제</button>
            <button onClick={() => { onBatchLost([...selected]); setSelected(new Set()); }} style={{ padding:'0.35rem 0.7rem', borderRadius:6, border:'none', background:'#e17055', color:'#fff', cursor:'pointer', fontSize:'0.8rem', fontWeight:600 }}>일괄 미선정</button>
          </div>
        </div>
      )}
      <div style={{ overflowX:'auto' }}>
        <table style={{ width:'100%', borderCollapse:'collapse', fontSize:'0.85rem', tableLayout:'fixed' }}>
          <thead>
            <tr style={{ borderBottom:'1px solid var(--border)', background:'var(--surface)' }}>
              <th style={{ padding:'0.75rem 0.5rem 0.75rem 1rem', width:'36px', position:'sticky', top:0, background:'var(--surface)', zIndex:1 }}>
                <input type="checkbox" checked={filtered.length>0 && selected.size===filtered.length} onChange={toggleAll} style={{ cursor:'pointer', accentColor:'var(--accent)' }} />
              </th>
              {cols.map(c => (
                <th key={c.key} onClick={c.sortable?()=>onSort(c.key):undefined}
                  style={{ padding:'0.75rem 1rem', textAlign:'left', fontWeight:600, color:'var(--text2)', fontSize:'0.8rem', whiteSpace:'nowrap', width:c.width||'auto', cursor:c.sortable?'pointer':'default', userSelect:c.sortable?'none':'auto', position:'sticky', top:0, background:'var(--surface)', zIndex:1 }}>
                  {c.label}{c.sortable&&sortKey===c.key&&(sortOrder==='desc'?' ▼':' ▲')}
                </th>
              ))}
            </tr>
          </thead>
          <tbody>
            {filtered.length === 0 ? (
              <tr><td colSpan={cols.length+1} style={{ padding:'2rem', textAlign:'center', color:'var(--text2)' }}>
                {data.length === 0
                  ? '등록된 프로젝트가 없습니다. 우측 상단 ＋ 등록 버튼으로 추가해주세요.'
                  : (search.trim() || memberFilter || (dateRange && dateRange !== 'all') || filter !== 'all')
                    ? '조건에 일치하는 프로젝트가 없습니다. 필터를 조정해보세요.'
                    : '표시할 프로젝트가 없습니다.'}
              </td></tr>
            ) : filtered.map(r => {
              const meta = STATUS_META[r.current_status]||{};
              const meetingStr = formatMeetingAt(r.meeting_at);
              const urgency = r._urgency||getMeetingUrgency(r.meeting_at);
              const urgBg  = urgency==='today'?'#fdcb6e18':urgency==='tomorrow'?'#74b9ff1a':r._stale?'#e1705518':'transparent';
              const urgBdr = urgency==='today'?'#fdcb6e44':urgency==='tomorrow'?'#74b9ff33':r._stale?'#e1705530':'var(--border)';
              const mgrM  = teamMembers?.find(m => m.id===r.assigned_manager);
              const mainM = teamMembers?.find(m => m.id===r.assigned_main);
              const subM  = teamMembers?.find(m => m.id===r.assigned_sub);
              return (
                <tr key={r.slug} onClick={() => onRowClick(r)}
                  style={{ borderBottom:`1px solid ${urgBdr}`, cursor:'pointer', transition:'background 0.1s', background:urgBg }}
                  onMouseEnter={e => e.currentTarget.style.background=urgency?(urgency==='today'?'#fdcb6e25':'#74b9ff20'):'var(--surface2)'}
                  onMouseLeave={e => e.currentTarget.style.background=urgBg}>
                  <td style={{ padding:'0.7rem 0.5rem 0.7rem 1rem', width:32 }} onClick={e => e.stopPropagation()}>
                    <input type="checkbox" checked={selected.has(r.slug)} onChange={e => toggleSelect(r.slug,e)} style={{ cursor:'pointer', accentColor:'var(--accent)' }} />
                  </td>
                  <td style={{ padding:'0.7rem 0.75rem 0.7rem 1rem', whiteSpace:'nowrap' }}>
                    <span style={{ display:'inline-flex', alignItems:'center', gap:5, padding:'0.3rem 0.7rem', borderRadius:6, fontSize:'0.8rem', fontWeight:500, background:meta.color+'30', color:meta.color, border:`1px solid ${meta.color}44` }}>
                      {meta.emoji} {meta.label}
                      {r._stale && <span title={`지원 후 ${daysBetween(r.created_at,new Date())}일 경과`} style={{ marginLeft:2, width:6, height:6, borderRadius:'50%', background:'#e17055', animation:'pulse 2s infinite' }} />}
                    </span>
                  </td>
                  <td style={{ padding:'0.7rem 1rem', maxWidth:360 }}>
                    <div style={{ fontWeight:500, whiteSpace:'nowrap', overflow:'hidden', textOverflow:'ellipsis' }}>{r.title||r.slug}</div>
                    <div style={{ display:'flex', alignItems:'center', gap:6 }}>
                      <span style={{ fontSize:'0.8rem', color:'var(--text2)', fontFamily:'monospace' }}>{r.slug}</span>
                      {(r.portfolio_links||[]).length > 0 && <span style={{ fontSize:'0.7rem', color:'var(--green)', fontWeight:500 }} title={`포트폴리오 링크 ${r.portfolio_links.length}개`}>🔗{r.portfolio_links.length}</span>}
                    </div>
                    {HAS_MILESTONES.includes(r.current_status) && (() => {
                      const ms = (milestones?.[r.slug])||[];
                      const goToProject = (e) => { e.stopPropagation(); onOpenProject(r.slug); };
                      if (ms.length === 0) {
                        if (milestonesSetupNeeded) {
                          return <div style={{ fontSize:'0.8rem', color:'var(--text2)', marginTop:4, opacity:0.7 }}>📋 작업 트래커 DB 미설정</div>;
                        }
                        return (
                          <div style={{ display:'flex', alignItems:'center', gap:6, marginTop:4, fontSize:'0.8rem' }}>
                            <span onClick={goToProject} title="클릭: 작업 페이지 열기"
                              style={{ color:'var(--text2)', cursor:'pointer', textDecoration:'underline', textDecorationColor:'var(--border)', textUnderlineOffset:2 }}>📋 작업 설정 안 됨</span>
                            <button onClick={e=>{ e.stopPropagation(); onQuickApplyTemplate(r.slug,'web_standard'); }}
                              style={{ padding:'0.1rem 0.45rem', borderRadius:4, border:'1px solid var(--accent)44', background:'var(--accent)20', color:'var(--accent)', cursor:'pointer', fontSize:'0.8rem', fontWeight:600 }}>
                              웹 표준 적용
                            </button>
                          </div>
                        );
                      }
                      const sorted = [...ms].sort((a,b)=>(a.order_idx||0)-(b.order_idx||0));
                      const doneCount = sorted.filter(m => m.status==='done').length;
                      const pct = Math.round((doneCount/sorted.length)*100);
                      const current = sorted.find(m => m.status==='in_progress') || sorted.find(m => m.status!=='done');
                      const blocked = sorted.some(m => m.blocked);
                      return (
                        <div onClick={goToProject} title="클릭: 작업 페이지 열기"
                          style={{ display:'flex', alignItems:'center', gap:6, marginTop:4, fontSize:'0.8rem', cursor:'pointer', padding:'2px 4px', marginLeft:-4, borderRadius:4, transition:'background 0.12s' }}
                          onMouseEnter={e=>e.currentTarget.style.background='var(--surface2)'}
                          onMouseLeave={e=>e.currentTarget.style.background='transparent'}>
