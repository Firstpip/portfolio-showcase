-- лҜёнҢ… мӢңк°Ғ кІҪкіј мӢң interview вҶ’ meeting_done мһҗлҸҷ м „нҷҳ (Atomic, race-safe)
-- нҒҙлқјмқҙм–ёнҠёк°Җ loadDataм—җм„ң RPCлЎң нҳём¶ң. м„ңлІ„м—җм„ң лӢЁмқј SQL UPDATEлЎң мІҳлҰ¬лҗҳм–ҙ
-- history append race / мӢңкі„ л¶Ҳмқјм№ҳ / мӨ‘ліө PATCH л¬ём ң лӘЁл‘җ н•ҙкІ°.
CREATE OR REPLACE FUNCTION transition_passed_meetings()
RETURNS int LANGUAGE plpgsql SECURITY DEFINER AS $$
DECLARE n int;
BEGIN
  UPDATE wishket_projects
  SET current_status = 'meeting_done',
      history = COALESCE(history, '[]'::jsonb) || jsonb_build_array(jsonb_build_object(
        'status', 'meeting_done',
        'date', to_char(now() AT TIME ZONE 'Asia/Seoul', 'YYYY-MM-DD'),
        'note', 'лҜёнҢ… мӢңк°Ғ кІҪкіј мһҗлҸҷ м „нҷҳ',
        'meeting_at', meeting_at,
        'meeting_type', meeting_type
      )),
      updated_at = (now() AT TIME ZONE 'Asia/Seoul')::date
  WHERE current_status = 'interview'
    AND meeting_at IS NOT NULL
    AND meeting_at < now();
  GET DIAGNOSTICS n = ROW_COUNT;
  RETURN n;
END $$;
GRANT EXECUTE ON FUNCTION transition_passed_meetings() TO authenticated, anon;

// м°©мҲҳмқј кё°мӨҖ нҳ„мһ¬ лӘҮ мЈјм°Ёмқём§Җ кі„мӮ° (1-based, м°©мҲҳ м „мқҙл©ҙ null)
function getCurrentWeek(startDate) {
  if (!startDate) return null;
  const start = new Date(startDate);
  if (isNaN(start.getTime())) return null;
  const today = new Date();
  today.setHours(0, 0, 0, 0);
  start.setHours(0, 0, 0, 0);
  const diffDays = Math.floor((today - start) / (1000 * 60 * 60 * 24));
  if (diffDays < 0) return null;
  return Math.floor(diffDays / 7) + 1;
}

// в”Җв”Җв”Җ Theme в”Җв”Җв”Җ
function useTheme() {
  const [theme, setThemeState] = useState(() => document.documentElement.getAttribute('data-theme') || 'dark');
  const setTheme = useCallback((t) => {
    document.documentElement.setAttribute('data-theme', t);
    localStorage.setItem('dashboard_theme', t);
    setThemeState(t);
  }, []);
  const toggle = useCallback(() => setTheme(theme === 'dark' ? 'light' : 'dark'), [theme, setTheme]);
  return { theme, toggle };
}

// в”Җв”Җв”Җ Utils в”Җв”Җв”Җ
function getMeetingStatus(meetingAt) {
  if (!meetingAt) return null;
  const d = new Date(meetingAt);
  return isNaN(d) ? null : d > new Date() ? 'upcoming' : 'done';
}
function getMeetingUrgency(meetingAt) {
  if (!meetingAt) return null;
  const m = new Date(meetingAt);
  if (isNaN(m)) return null;
  const now = new Date();
  const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
  const tomorrow = new Date(today); tomorrow.setDate(today.getDate() + 1);
  const dayAfter  = new Date(today); dayAfter.setDate(today.getDate() + 2);
  if (m >= today    && m < tomorrow) return 'today';
  if (m >= tomorrow && m < dayAfter) return 'tomorrow';
  return null;
}
function toLocalInput(iso) {
  if (!iso) return '';
  const d = new Date(iso);
  if (isNaN(d)) return '';
  const pad = n => String(n).padStart(2,'0');
  return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}T${pad(d.getHours())}:${pad(d.getMinutes())}`;
}
function formatMeetingAt(iso) {
  if (!iso) return null;
  const d = new Date(iso);
  if (isNaN(d)) return null;
  const pad = n => String(n).padStart(2,'0');
  return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}`;
}
function parseBudgetNum(v) {
  // лІ”мң„ н‘ңкё°("1000-3000л§Ңмӣҗ")лҠ” мІ« мҲ«мһҗ к·ёлЈ№л§Ң, лӢЁмқј н‘ңкё°лҠ” м „мІҙ мҲ«мһҗ мӮ¬мҡ©
  const s = String(v||'');
  const groups = s.match(/\d+/g);
  if (!groups || groups.length === 0) return 0;
  if (/[~\-вҖ“]/.test(s)) return Number(groups[0]);
  return Number(groups.join(''));
}

function friendlyError(error) {

  const code = error.code || '';
  const msg = error.message || '';
  if (code === '42P01' || /does not exist|relation/.test(msg)) return 'лҚ°мқҙн„°лІ мқҙмҠӨ н…Ңмқҙлё”мқҙ мӨҖл№„лҗҳм§Җ м•Ҡм•ҳмҠөлӢҲлӢӨ. кҙҖлҰ¬мһҗм—җкІҢ л¬ёмқҳн•ҳм„ёмҡ”.';
  if (code === '42703') return 'лҚ°мқҙн„°лІ мқҙмҠӨ мҠӨнӮӨл§Ҳк°Җ мөңмӢ  мғҒнғңк°Җ м•„лӢҷлӢҲлӢӨ. кҙҖлҰ¬мһҗм—җкІҢ л¬ёмқҳн•ҳм„ёмҡ”.';
  if (code === '23505') return 'мқҙлҜё мЎҙмһ¬н•ҳлҠ” к°’мһ…лӢҲлӢӨ. мӨ‘ліөлҗҳм§Җ м•ҠлҠ” к°’мңјлЎң лӢӨмӢң мӢңлҸ„н•ҙмЈјм„ёмҡ”.';
  if (code === '23503') return 'м°ёмЎ° мӨ‘мқё лҚ°мқҙн„°к°Җ мһҲм–ҙ мІҳлҰ¬н•  мҲҳ м—ҶмҠөлӢҲлӢӨ.';
  if (code === '23502') return 'н•„мҲҳ мһ…л Ҙ н•ӯлӘ©мқҙ лҲ„лқҪлҗҳм—ҲмҠөлӢҲлӢӨ.';
  if (code === 'PGRST116') return 'лҢҖмғҒ лҚ°мқҙн„°лҘј м°ҫмқ„ мҲҳ м—ҶмҠөлӢҲлӢӨ.';
  if (code === '42501' || /permission|policy/i.test(msg)) return 'к¶Ңн•ңмқҙ м—ҶмҠөлӢҲлӢӨ. лЎңк·ёмқё мғҒнғңлҘј нҷ•мқён•ҙмЈјм„ёмҡ”.';
  if (/network|fetch|Failed to fetch/i.test(msg)) return 'л„ӨнҠёмӣҢнҒ¬ м—°кІ°мқҙ л¶Ҳм•Ҳм •н•©лӢҲлӢӨ. мһ мӢң нӣ„ лӢӨмӢң мӢңлҸ„н•ҙмЈјм„ёмҡ”.';
  if (/JWT|token|auth/i.test(msg)) return 'мқёмҰқмқҙ л§ҢлЈҢлҗҳм—ҲмҠөлӢҲлӢӨ. лӢӨмӢң лЎңк·ёмқён•ҙмЈјм„ёмҡ”.';
  return msg || 'мҡ”мІӯмқ„ мІҳлҰ¬н•  мҲҳ м—ҶмҠөлӢҲлӢӨ.';
}
function daysBetween(d1, d2) {
  const a = new Date(d1), b = new Date(d2);
  if (isNaN(a) || isNaN(b)) return 0;
  const ua = Date.UTC(a.getFullYear(), a.getMonth(), a.getDate());
  const ub = Date.UTC(b.getFullYear(), b.getMonth(), b.getDate());
  return Math.floor((ub - ua) / 86400000);
}

// в”Җв”Җв”Җ Hash routing в”Җв”Җв”Җ
function parseHash() {
  const h = (window.location.hash || '').replace(/^#/, '');
  const m = h.match(/^project\/([^/]+)\/tasks$/);
  if (m) {
    let slug;
    try { slug = decodeURIComponent(m[1]); } catch { return { name: 'table' }; }
    if (!/^[a-zA-Z0-9_-]+$/.test(slug)) return { name: 'table' };
    return { name: 'project', slug };
  }
  return { name: 'table' };
}
function navigate(route) {
  if (route.name === 'project') window.location.hash = `project/${encodeURIComponent(route.slug)}/tasks`;
  else window.location.hash = '';
}

// в”Җв”Җв”Җ CSV в”Җв”Җв”Җ
function exportCSV(data) {
  const headers = ['slug','title','current_status','budget','timeline','created_at','meeting_at','meeting_type','memo','wishket_url','portfolio_links'];
  const rows = data.map(d => headers.map(h => {
    let v = h === 'portfolio_links' ? (d[h]||[]).map(l => l.url).join(' | ') : (d[h] || '');
    if (typeof v === 'string' && (v.includes(',') || v.includes('"') || v.includes('\n'))) v = '"' + v.replace(/"/g,'""') + '"';
    return v;
  }).join(','));
  const csv = '\uFEFF' + [headers.join(','),...rows].join('\n');
  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = `wishket-dashboard-${new Date().toISOString().split('T')[0]}.csv`;
  a.click(); URL.revokeObjectURL(url);
}

  const [inputVal, setInputVal] = useState('');

    const h = e => { if (e.key === 'Escape') onCancel(); };
    window.addEventListener('keydown', h);

  }, [state, onCancel]);

  const { title, message, confirmLabel = 'нҷ•мқё', cancelLabel = 'м·ЁмҶҢ', destructive, onConfirm, confirmInput } = state;
  const accent = destructive ? '#e17055' : 'var(--accent)';
  const inputMatch = !confirmInput || inputVal === confirmInput.match;
  return (
    <div onClick={onCancel} style={{ position:'fixed', inset:0, background:'var(--overlay)', backdropFilter:'blur(3px)', display:'flex', alignItems:'center', justifyContent:'center', zIndex:2000, padding:'1rem' }}>

          {confirmInput && (
            <div style={{ marginTop:12 }}>
              <div style={{ fontSize:'0.8rem', color:'var(--text2)', marginBottom:6 }}>{confirmInput.label}</div>
              <input
                autoFocus
                type="text"
                value={inputVal}
                onChange={e => setInputVal(e.target.value)}
                onKeyDown={e => { if (e.key === 'Enter' && inputMatch) { onConfirm && onConfirm(); onCancel(); } }}
                placeholder={confirmInput.match}
                style={{ width:'100%', padding:'0.5rem 0.7rem', borderRadius:8, border:`1px solid ${inputMatch && inputVal ? '#e17055' : 'var(--border)'}`, background:'var(--surface2)', color:'var(--text)', fontSize:'0.85rem', outline:'none', fontFamily:'inherit' }}
              />
            </div>
          )}

          <button onClick={() => { onConfirm && onConfirm(); onCancel(); }} disabled={!inputMatch}
            style={{ padding:'0.55rem 1.2rem', borderRadius:8, border:'none', background: inputMatch ? accent : 'var(--border)', color: inputMatch ? '#fff' : 'var(--text2)', cursor: inputMatch ? 'pointer' : 'not-allowed', fontSize:'0.85rem', fontWeight:600, transition:'background 0.15s' }}>
            {confirmLabel}

        </div>

function useToast() {
  const [toasts, setToasts] = useState([]);
  const add = useCallback((message, type='info') => {
    const id = Date.now();
    setToasts(prev => [...prev, { id, message, type }]);
    setTimeout(() => setToasts(prev => prev.filter(t => t.id !== id)), 3000);
  }, []);
  return { toasts, toast: add };
}

    { key:'won',          label:'мҲҳмЈј', color:'#00b894' },
  ];
  const ORDER = ['interview','meeting_done','won'];
  const counts = stages.map(s => {
    const idx = ORDER.indexOf(s.key);
    return { ...s, count: data.filter(d => {
      // post-won лӢЁкі„лҸ„ мҲҳмЈј м„ұкіөмңјлЎң м№ҙмҡҙнҠё
      const effectiveStatus = POST_WON.includes(d.current_status) ? 'won' : d.current_status;
      return ORDER.indexOf(effectiveStatus) >= idx;
    }).length };
  });
  const maxCount = Math.max(...counts.map(c => c.count), 1);
  return (
    <div style={{ background:'var(--surface)', borderRadius:12, padding:'1.5rem', border:'1px solid var(--border)' }}>

      </div>
      <div style={{ display:'flex', flexDirection:'column', gap:10 }}>
        {counts.map((s,i) => {

          const convRate = i > 0 && counts[i-1].count > 0 ? ((s.count/counts[i-1].count)*100).toFixed(0)+'%' : null;

            <div key={s.key} style={{ display:'flex', alignItems:'center', gap:12 }}>

  const [val, setVal] = useState(value||'');
  const inputRef = useRef(null);
  useEffect(() => { if (editing && inputRef.current) inputRef.current.focus(); }, [editing]);
  if (!editing) {
    return (
      <span onClick={e => { e.stopPropagation(); setVal(value||''); setEditing(true); }}
        style={{ cursor:'text', minWidth:40, display:'inline-block' }}
        title="нҒҙлҰӯн•ҳм—¬ л©”лӘЁ нҺём§‘">{value||'вҖ”'}</span>
    );
  }
  return (
    <input ref={inputRef} type="text" value={val}
      onClick={e => e.stopPropagation()}
      onChange={e => setVal(e.target.value)}
      onBlur={() => { if (val !== (value||'')) onSave(val); setEditing(false); }}
      onKeyDown={e => { if (e.key==='Enter') { if (val !== (value||'')) onSave(val); setEditing(false); } if (e.key==='Escape') setEditing(false); }}
      style={{ width:'100%', padding:'0.2rem 0.4rem', borderRadius:4, border:'1px solid var(--accent)', background:'var(--surface2)', color:'var(--text)', fontSize:'0.8rem', outline:'none' }}
    />
  );
}

// в”Җв”Җв”Җ MilestonePanel в”Җв”Җв”Җ
// в”Җв”Җв”Җ StructureWeekRow в”Җв”Җв”Җ
// в”Җв”Җв”Җ WeeklyMilestoneInput в”Җв”Җв”Җ
// нҳ•мӢқ: "NмЈјм°Ё: м ңлӘ©" н•ң мӨ„м”© вҖ” AIм—җкІҢ мқҙ нҳ•мӢқмңјлЎң мғқм„ұ мҡ”мІӯ нӣ„ л¶ҷм—¬л„Јкё°
const WEEKLY_MILESTONE_EXAMPLE = `1мЈјм°Ё: кё°нҡҚ л°Ҹ м„Өкі„
2мЈјм°Ё: л””мһҗмқё
3мЈјм°Ё: н”„лЎ нҠём—”л“ң к°ңл°ң
4мЈјм°Ё: л°ұм—”л“ң к°ңл°ң
5мЈјм°Ё: QA л°Ҹ л°°нҸ¬`;

function WeeklyMilestoneInput({ project, saving, milestones, onBulkCreate, onClearPlan, onClose, onRequestConfirm }) {
  const existingPlan = Array.isArray(project?.weekly_plan) && project.weekly_plan.length > 0
    ? project.weekly_plan : null;
  const isEdit = !!existingPlan;

  const getInitialText = () => {
    if (!existingPlan) return WEEKLY_MILESTONE_EXAMPLE;
    return existingPlan.map(w => `${w.week != null ? w.week : '?'}мЈјм°Ё: ${w.title || ''}`).join('\n');
  };

  const [text, setText] = useState(getInitialText);
  const baselineRef = useRef(text);
  const isDirty = text.trim() !== baselineRef.current.trim();

  const parsed = useMemo(() => {
    const lines = text.split('\n');
    const weeks = [];
    for (const line of lines) {
      const m = line.trim().match(/^(\d+)мЈјм°Ё\s*[:пјҡ]?\s*(.*)$/);
      if (m) weeks.push({ week: parseInt(m[1]), title: (m[2] || '').trim() });
    }
    return weeks;
  }, [text]);

  const hasPlan = parsed.length > 0;

  const duplicateWeeks = useMemo(() => {
    const seen = new Set(), dups = new Set();
    parsed.forEach(w => { if (seen.has(w.week)) dups.add(w.week); else seen.add(w.week); });
    return [...dups].sort((a,b)=>a-b);
  }, [parsed]);

  const canSave = hasPlan && duplicateWeeks.length === 0;

  const safeClose = useCallback(() => {
    if (!isDirty) { onClose(); return; }
    if (onRequestConfirm) {
      onRequestConfirm({
        title: 'м ҖмһҘн•ҳм§Җ м•ҠмқҖ ліҖкІҪмӮ¬н•ӯ',
        message: 'нҺём§‘ мӨ‘мқё лӮҙмҡ©мқҙ мһҲмҠөлӢҲлӢӨ.\nм ҖмһҘн•ҳм§Җ м•Ҡкі  лӢ«мқ„к№Ңмҡ”?',
        confirmLabel: 'лӢ«кё°',
        destructive: true,
        onConfirm: () => onClose(),
      });
    } else {
      onClose();
    }
  }, [isDirty, onClose, onRequestConfirm]);

  const handleSubmit = useCallback(() => {
    if (saving || !canSave) return;
    baselineRef.current = text;
    onBulkCreate(project.slug, parsed);
  }, [saving, canSave, text, parsed, onBulkCreate, project?.slug]);

  // Cmd+Enter вҶ’ м ҖмһҘ, Escape вҶ’ лӢ«кё° вҖ” textareaм—җ м§Ғм ‘ л¶ҷм—¬м„ң м „м—ӯ мҳӨм—ј м—ҶмқҢ
  const handleTextareaKeyDown = useCallback((e) => {
    if (e.key === 'Escape') { e.stopPropagation(); safeClose(); return; }
    if ((e.metaKey || e.ctrlKey) && e.key === 'Enter') { e.preventDefault(); handleSubmit(); }
  }, [safeClose, handleSubmit]);

  const textareaRef = useRef(null);
  useEffect(() => {
    if (textareaRef.current) { textareaRef.current.focus(); if (!isEdit) textareaRef.current.select(); }
  }, [isEdit]);

  const macKey = typeof navigator !== 'undefined' && navigator.platform?.includes('Mac') ? 'вҢҳ' : 'Ctrl';

  return (
    <div style={{ padding:'1rem', borderRadius:12, background:'var(--surface)', border:'1px solid var(--border)', marginBottom:16 }}>
      <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:8 }}>
        <div style={{ fontSize:'0.9rem', fontWeight:600 }}>
          рҹ“… мЈјм°Ёлі„ л§ҲмқјмҠӨнҶӨ {isEdit ? 'мҲҳм •' : 'л“ұлЎқ'}
          {isDirty && <span style={{ marginLeft:6, color:'var(--yellow)', fontSize:'0.8rem' }}>в—Ҹ нҺём§‘ мӨ‘</span>}
        </div>
        <button onClick={safeClose} style={{ background:'transparent', border:'none', color:'var(--text2)', cursor:'pointer', fontSize:'0.85rem' }}>вң•</button>
      </div>
      <div style={{ fontSize:'0.8rem', color:'var(--text2)', marginBottom:8, lineHeight:1.6 }}>
        Claudeм—җкІҢ <b>"мқҙ н”„лЎңм қнҠё нҠ№м„ұм—җ л§һм¶° м•„лһҳ нҳ•мӢқмңјлЎң мЈјм°Ёлі„ л§ҲмқјмҠӨнҶӨ л§Ңл“Өм–ҙмӨҳ"</b> мҡ”мІӯ нӣ„ л¶ҷм—¬л„Јмңјм„ёмҡ”.
      </div>
      <div style={{ marginBottom:8, padding:'0.45rem 0.7rem', borderRadius:6, background:'var(--surface2)', border:'1px solid var(--border)', fontSize:'0.8rem', color:'var(--text2)', fontFamily:'monospace', lineHeight:1.7 }}>
        1мЈјм°Ё: кё°нҡҚ л°Ҹ м„Өкі„<br/>2мЈјм°Ё: л””мһҗмқё<br/>3мЈјм°Ё: к°ңл°ң<br/><span style={{ opacity:0.5 }}>вҖҰ</span>
      </div>
      <textarea ref={textareaRef} value={text} onChange={e => setText(e.target.value)}
        onKeyDown={handleTextareaKeyDown}
        style={{ width:'100%', minHeight:180, padding:'0.75rem 0.9rem', borderRadius:8, border:'1px solid var(--border)', background:'var(--bg)', color:'var(--text)', fontSize:'0.85rem', resize:'vertical', fontFamily:'monospace', lineHeight:1.9, outline:'none' }} />
      {duplicateWeeks.length > 0 && (
        <div style={{ marginTop:8, padding:'0.45rem 0.7rem', borderRadius:6, background:'#e1705518', border:'1px solid #e1705544', fontSize:'0.8rem', color:'#e17055' }}>
          вҡ пёҸ мӨ‘ліөлҗң мЈјм°Ё лІҲнҳё: {duplicateWeeks.join(', ')}мЈјм°Ё
        </div>
      )}
      {hasPlan && (
        <div style={{ marginTop:8, padding:'0.55rem 0.8rem', borderRadius:8, background:'var(--surface2)', border:'1px solid var(--border)' }}>
          <div style={{ fontSize:'0.8rem', fontWeight:600, marginBottom:5 }}>лҜёлҰ¬ліҙкё°: мҙқ {parsed.length}мЈјм°Ё</div>
          <div style={{ display:'flex', flexWrap:'wrap', gap:'4px 10px' }}>
            {parsed.map(w => (
              <div key={w.week} style={{ fontSize:'0.8rem', color:'var(--text2)' }}>
                <span style={{ fontWeight:700, color:'var(--accent2)' }}>{w.week}мЈјм°Ё</span> {w.title || <span style={{ opacity:0.4 }}>м ңлӘ© м—ҶмқҢ</span>}
              </div>
            ))}
          </div>
        </div>
      )}
      <div style={{ display:'flex', gap:8, marginTop:12, justifyContent:'flex-end', alignItems:'center' }}>
        {isEdit && onClearPlan && (
          <button onClick={() => onClearPlan(project.slug)} disabled={saving}
            style={{ padding:'0.5rem 0.9rem', borderRadius:8, border:'1px solid #e1705544', background:'transparent', color:'#e17055', cursor:'pointer', fontSize:'0.8rem', marginRight:'auto' }}>
            рҹ—‘пёҸ кі„нҡҚ м „мІҙ мӮӯм ң
          </button>
        )}
        <button onClick={safeClose} style={{ padding:'0.5rem 1rem', borderRadius:8, border:'1px solid var(--border)', background:'transparent', color:'var(--text2)', cursor:'pointer', fontSize:'0.85rem' }}>м·ЁмҶҢ</button>
        <button onClick={handleSubmit} disabled={saving || !canSave}
          title={duplicateWeeks.length > 0 ? `мӨ‘ліөлҗң мЈјм°Ё: ${duplicateWeeks.join(', ')}мЈјм°Ё` : !hasPlan ? 'мЈјм°Ё кі„нҡҚмқ„ мһ…л Ҙн•ҳм„ёмҡ”' : `${macKey}+EnterлЎң м ҖмһҘ`}
          style={{ padding:'0.5rem 1.2rem', borderRadius:8, border:'none', background: canSave ? 'var(--accent)' : 'var(--border)', color:'#fff', cursor: canSave ? 'pointer' : 'not-allowed', fontSize:'0.85rem', fontWeight:600 }}>
          рҹ“… {parsed.length}мЈјм°Ё кі„нҡҚ {isEdit ? 'м—…лҚ°мқҙнҠё' : 'м ҖмһҘ'}
        </button>
      </div>
    </div>
  );
}

// в”Җв”Җв”Җ WeeklyProgressBars в”Җв”Җв”Җ
// weeklyPlan: [{week, title, description}] вҖ” epics defined on project.weekly_plan
// milestones: individual task tickets; progress = done tickets / tickets assigned to the week
// onAddTicket(label, weekNumber): optional вҖ” shows "+ нӢ°мј“" action on description items
function WeeklyProgressBars({ weeklyPlan, milestones, onAddTicket, onFilterWeek, activeFilter, focusWeek, startDate }) {
  const [expandedWeek, setExpandedWeek] = useState(null);
  const calWeek = getCurrentWeek(startDate); // м°©мҲҳмқј кё°мӨҖ мҳӨлҠҳмқҙ лӘҮ мЈјм°Ёмқём§Җ
  const planWeeks = Array.isArray(weeklyPlan) && weeklyPlan.length > 0 ? weeklyPlan : null;
  const weeks = useMemo(() => {
    if (planWeeks) {
      return [...planWeeks].sort((a,b) => (a.week||0) - (b.week||0)).map(w => ({
        week: w.week,
        title: w.title || '',
        description: Array.isArray(w.description) ? w.description : [],
      }));
    }
    const nums = new Set();
    (milestones||[]).forEach(m => { if (m.week_number != null) nums.add(m.week_number); });
    return [...nums].sort((a,b)=>a-b).map(w => ({ week:w, title:'', description:[] }));
  }, [planWeeks, milestones]);

  if (weeks.length === 0) return null;

  const counts = {};
  const labelsByWeek = {};
  const blockedByWeek = {};
  const norm = (s) => (s||'').trim().toLowerCase();
  (milestones||[]).forEach(m => {
    if (m.week_number == null) return;
    if (!counts[m.week_number]) counts[m.week_number] = { total:0, done:0 };
    counts[m.week_number].total++;
    if (m.status === 'done') counts[m.week_number].done++;
    if (m.blocked) blockedByWeek[m.week_number] = (blockedByWeek[m.week_number] || 0) + 1;
    if (!labelsByWeek[m.week_number]) labelsByWeek[m.week_number] = new Set();
    labelsByWeek[m.week_number].add(norm(m.phase_label));
  });

  return (
    <div style={{ display:'flex', flexDirection:'column', gap:3 }}>
      {weeks.map(({ week, title, description }) => {
        const c = counts[week] || { total:0, done:0 };
        const pct = c.total > 0 ? Math.round((c.done/c.total)*100) : 0;
        const allDone = c.total > 0 && c.done === c.total;
        const empty = c.total === 0;
        const blockedCount = blockedByWeek[week] || 0;
        const isExpanded = expandedWeek === week;
        const isFocus = focusWeek === week;
        const isToday = calWeek === week;
        const isActive = activeFilter === week;
        const barColor = blockedCount > 0 ? '#e17055' : allDone ? 'var(--green)' : isFocus ? 'var(--accent)' : 'var(--text2)';
        const rowBg = isToday ? 'var(--green)18' : isFocus ? 'var(--accent)18' : 'transparent';
        const rowBorderColor = isToday ? 'var(--green)' : isFocus ? 'var(--accent)' : 'transparent';
        return (
          <div key={week} style={{ borderRadius:7, border:`1px solid ${isToday ? 'var(--green)33' : isFocus ? 'var(--accent)30' : 'transparent'}`, background: rowBg, overflow:'hidden' }}>
            {/* мЈјм°Ё н—ӨлҚ” н–ү */}
            <div style={{ display:'flex', alignItems:'center', gap:8, padding:'6px 8px', borderLeft:`3px solid ${rowBorderColor}` }}>
              {/* мЈјм°Ё л°°м§Җ */}
              <div style={{ flexShrink:0, display:'flex', alignItems:'center', gap:4 }}>
                <span style={{
                  display:'inline-block', padding:'1px 7px', borderRadius:10,
                  fontSize:'0.8rem', fontWeight:700, letterSpacing:'0.01em',
                  background: allDone ? 'var(--green)30' : isToday ? 'var(--green)30' : isFocus ? 'var(--accent)30' : 'var(--surface2)',
                  color: allDone ? 'var(--green)' : isToday ? 'var(--green)' : isFocus ? 'var(--accent2)' : 'var(--text2)',
                  border: `1px solid ${allDone ? 'var(--green)33' : isToday ? 'var(--green)44' : isFocus ? 'var(--accent)33' : 'var(--border)'}`,
                }}>
                  {allDone ? 'вң“' : isToday ? 'рҹ“Қ' : isFocus ? 'в–¶' : ''}{week}мЈј
                </span>
              </div>
              {/* л§ҲмқјмҠӨнҶӨ м ңлӘ© */}
              <div style={{ flex:1, minWidth:0 }}>
                {title
                  ? <div style={{ fontSize:'0.8rem', fontWeight:500, color: allDone ? 'var(--text2)' : 'var(--text)', overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap', opacity: allDone ? 0.55 : 1, textDecoration: allDone ? 'line-through' : 'none' }}>{title}</div>
                  : <div style={{ fontSize:'0.8rem', color:'var(--text2)', opacity:0.4 }}>л§ҲмқјмҠӨнҶӨ м—ҶмқҢ</div>
                }
              </div>
              {/* м§„н–үлҘ  мҲ«мһҗ */}
              <div style={{ flexShrink:0, fontSize:'0.8rem', fontWeight:600, color: allDone ? 'var(--green)' : blockedCount > 0 ? '#e17055' : 'var(--text2)', minWidth:36, textAlign:'right', opacity: empty ? 0.35 : 1 }}>
                {empty ? 'вҖ”' : allDone ? 'мҷ„лЈҢ' : `${c.done}/${c.total}`}
              </div>
              {blockedCount > 0 && <span title={`${blockedCount}к°ң лё”лЎңнӮ№лҗЁ`} style={{ fontSize:'0.8rem', color:'#e17055', flexShrink:0 }}>рҹ”ҙ</span>}
              {onFilterWeek && !empty && (
                <button onClick={(e) => { e.stopPropagation(); onFilterWeek(isActive ? 'all' : week); }}
                  title={isActive ? 'н•„н„° н•ҙм ң' : 'мқҙ мЈјм°Ёл§Ң ліҙкё°'}
                  style={{ padding:'2px 7px', borderRadius:4, border:`1px solid ${isActive ? 'var(--accent)' : 'var(--border)'}`, background: isActive ? 'var(--accent)30' : 'transparent', color: isActive ? 'var(--accent2)' : 'var(--text2)', cursor:'pointer', fontSize:'0.8rem', flexShrink:0, fontWeight: isActive ? 600 : 400 }}>
                  {isActive ? 'н•ҙм ң' : 'н•„н„°'}
                </button>
              )}
            </div>
            {/* н”„лЎңк·ёл ҲмҠӨ л°” */}
            {!empty && (
              <div style={{ height:5, background:'var(--bg)', margin:'0 8px 7px' }}>
                <div style={{ width:pct+'%', height:'100%', background: barColor, borderRadius:3, transition:'width 0.4s ease' }} />
              </div>
            )}
          </div>
        );
      })}
    </div>
  );
}

function MilestonePanel({ project, milestones, setupNeeded, teamMembers, saving, onUpdate, onDelete, onAdd, onReorder, onCreateFromTemplate, weeklyMilestones, onBulkCreateWeekly, onClearWeeklyPlan }) {
  const [expandedId, setExpandedId] = useState(null);
  const [editingLabelId, setEditingLabelId] = useState(null);
  const [editingLabelVal, setEditingLabelVal] = useState('');
  const [newLabel, setNewLabel] = useState('');
  const [showWeeklyInput, setShowWeeklyInput] = useState(false);

  const cycleStatus = (m) => {
    const next = m.status === 'planned' ? 'in_progress' : m.status === 'in_progress' ? 'done' : 'planned';
    onUpdate(m, { status: next });
  };
  const beginEditLabel = (m) => { setEditingLabelId(m.id); setEditingLabelVal(m.phase_label); };
  const commitLabel = (m) => {
    const v = editingLabelVal.trim();
    if (v && v !== m.phase_label) onUpdate(m, { phase_label: v });
    setEditingLabelId(null); setEditingLabelVal('');
  };
  const cancelEditLabel = () => { setEditingLabelId(null); setEditingLabelVal(''); };

  // Weeks are defined on project.weekly_plan (epics). Fallback to milestones for legacy projects.
  const weekOptions = useMemo(() => {
    if (Array.isArray(project?.weekly_plan) && project.weekly_plan.length > 0) {
      return [...project.weekly_plan].sort((a,b)=>(a.week||0)-(b.week||0)).map(w => ({ week:w.week, title:w.title||'' }));
    }
    const nums = new Set();
    (milestones||[]).forEach(m => { if (m.week_number != null) nums.add(m.week_number); });
    return [...nums].sort((a,b)=>a-b).map(w => ({ week:w, title:'' }));
  }, [project?.weekly_plan, milestones]);

  if (setupNeeded) {
    return (
      <div>
        <div style={{ padding:'0.7rem 0.9rem', borderRadius:8, background:'#fdcb6e1a', border:'1px solid #fdcb6e33', marginBottom:'0.75rem' }}>
          <div style={{ fontSize:'0.85rem', fontWeight:600, color:'var(--yellow)', marginBottom:4 }}>вҡ пёҸ DB м„Өм • н•„мҡ”</div>
          <div style={{ fontSize:'0.8rem', color:'var(--text2)', lineHeight:1.5 }}>мһ‘м—… нҠёлһҳм»ӨлҘј мӮ¬мҡ©н•ҳл Өл©ҙ project_milestones н…Ңмқҙлё”мқ„ лЁјм Җ мғқм„ұн•ҳм„ёмҡ”.</div>
        </div>
        <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:6 }}>
          <div style={{ fontSize:'0.8rem', color:'var(--text2)' }}>Supabase SQL м—җл””н„°м—җм„ң мӢӨн–ү</div>
          <button onClick={() => { navigator.clipboard.writeText(MILESTONE_SETUP_SQL); }} style={{ padding:'0.3rem 0.6rem', borderRadius:6, border:'1px solid var(--border)', background:'var(--surface2)', color:'var(--text)', cursor:'pointer', fontSize:'0.8rem' }}>рҹ“Ӣ SQL ліөмӮ¬</button>
        </div>
        <pre style={{ background:'var(--bg)', padding:'0.75rem', borderRadius:8, fontSize:'0.8rem', color:'var(--text2)', overflow:'auto', maxHeight:280, border:'1px solid var(--border)', lineHeight:1.5 }}>{MILESTONE_SETUP_SQL}</pre>
      </div>
    );
  }

  const sorted = [...(milestones||[])].sort((a,b)=>(a.order_idx||0)-(b.order_idx||0));
  const doneCount = sorted.filter(m => m.status==='done').length;
  const pct = sorted.length ? Math.round((doneCount/sorted.length)*100) : 0;
  const hasBlocked = sorted.some(m => m.blocked);

  if (sorted.length === 0) {
    return (
      <div>
        {showWeeklyInput && (
          <WeeklyMilestoneInput project={project} saving={saving} milestones={milestones} onBulkCreate={(slug, weeks) => { onBulkCreateWeekly(slug, weeks); setShowWeeklyInput(false); }} onClearPlan={(slug) => { onClearWeeklyPlan && onClearWeeklyPlan(slug); setShowWeeklyInput(false); }} onClose={() => setShowWeeklyInput(false)} onRequestConfirm={onRequestConfirm} />
        )}
        <div style={{ textAlign:'center', padding:'1.5rem 0.5rem', color:'var(--text2)' }}>
          <div style={{ fontSize:'2rem', marginBottom:8 }}>рҹ“Ӣ</div>
          <div style={{ fontSize:'0.85rem', marginBottom:4 }}>л“ұлЎқлҗң мһ‘м—…мқҙ м—ҶмҠөлӢҲлӢӨ</div>
          <div style={{ fontSize:'0.8rem', opacity:0.7, marginBottom:16 }}>н…ңн”ҢлҰҝмқ„ м Ғмҡ©н•ҳкұ°лӮҳ м§Ғм ‘ м¶”к°Җн•  мҲҳ мһҲм–ҙмҡ”</div>
          <div style={{ display:'flex', flexDirection:'column', gap:8 }}>
            <button onClick={() => setShowWeeklyInput(true)} disabled={saving} style={{ padding:'0.65rem', borderRadius:10, border:'1px solid var(--accent)', background:'var(--accent)20', color:'var(--accent2)', cursor:'pointer', fontSize:'0.85rem', fontWeight:600 }}>
              рҹ“… мЈјм°Ёлі„ л§ҲмқјмҠӨнҶӨ л“ұлЎқ
            </button>
            {Object.entries(MILESTONE_TEMPLATES).map(([key,tpl]) => (
              <button key={key} onClick={() => onCreateFromTemplate(project.slug, key)} disabled={saving} style={{ padding:'0.65rem', borderRadius:10, border:'none', background:'var(--accent)', color:'#fff', cursor:'pointer', fontSize:'0.85rem', fontWeight:600 }}>
                рҹ“Ӣ {tpl.label} н…ңн”ҢлҰҝ ({tpl.phases.length}к°ң мһ‘м—…)

          </div>
          <div style={{ marginTop:16, display:'flex', gap:6 }}>
            <input type="text" placeholder="м»ӨмҠӨн…Җ мһ‘м—… мқҙлҰ„" value={newLabel} onChange={e=>setNewLabel(e.target.value)}
              onKeyDown={e=>{ if(e.key==='Enter' && newLabel.trim()){ onAdd(project.slug,newLabel); setNewLabel(''); } }}
              style={{ flex:1, padding:'0.5rem 0.7rem', borderRadius:8, border:'1px solid var(--border)', background:'var(--surface2)', color:'var(--text)', fontSize:'0.85rem', outline:'none' }} />
            <button onClick={()=>{ if(newLabel.trim()){ onAdd(project.slug,newLabel); setNewLabel(''); } }} disabled={!newLabel.trim()} style={{ padding:'0.5rem 0.9rem', borderRadius:8, border:'none', background:newLabel.trim()?'var(--surface2)':'var(--border)', color:'var(--text)', cursor:newLabel.trim()?'pointer':'not-allowed', fontSize:'0.8rem' }}>+ м¶”к°Җ</button>
          </div>
        </div>
      </div>
    );
  }

  return (
    <div>
      {showWeeklyInput && (
        <WeeklyMilestoneInput project={project} saving={saving} onBulkCreate={(slug, weeks) => { onBulkCreateWeekly(slug, weeks); setShowWeeklyInput(false); }} onClearPlan={(slug) => { onClearWeeklyPlan && onClearWeeklyPlan(slug); setShowWeeklyInput(false); }} onClose={() => setShowWeeklyInput(false)} />

          <div style={{ fontSize:'0.85rem', fontWeight:600 }}>м§„н–үлҘ  {doneCount}/{sorted.length}</div>
          <div style={{ fontSize:'0.9rem', fontWeight:700, color:hasBlocked?'#e17055':'var(--green)' }}>{pct}%</div>
        </div>
        <div style={{ height:6, background:'var(--bg)', borderRadius:3, overflow:'hidden' }}>
          <div style={{ width:pct+'%', height:'100%', background:hasBlocked?'#e17055':'var(--green)', transition:'width 0.3s' }} />

              {expanded && (

                  <div>
                    <label style={{ display:'flex', alignItems:'center', gap:6, fontSize:'0.8rem', color:'var(--text2)', cursor:'pointer' }}>
                      <input type="checkbox" checked={!!m.blocked} onChange={e=>onUpdate(m,{blocked:e.target.checked, blocked_reason:e.target.checked?m.blocked_reason:null})} style={{ accentColor:'#e17055' }} />
                      рҹ”ҙ лё”лЎңнӮ№ н‘ңмӢң
                    </label>
                    {m.blocked && (
                      <input type="text" placeholder="лё”лЎңнӮ№ мӮ¬мң " defaultValue={m.blocked_reason||''}
                        onBlur={e=>{ if(e.target.value!==(m.blocked_reason||'')) onUpdate(m,{blocked_reason:e.target.value||null}); }}
                        style={{ width:'100%', marginTop:6, padding:'0.4rem 0.6rem', borderRadius:6, border:'1px solid #e1705544', background:'var(--surface2)', color:'var(--text)', fontSize:'0.8rem', outline:'none' }} />
                    )}
                  </div>
                  {/* Assignee */}
                  {teamMembers && teamMembers.length > 0 && (
                    <div>
                      <div style={{ fontSize:'0.8rem', color:'var(--text2)', marginBottom:4 }}>лӢҙлӢ№</div>
                      <select value={m.assignee||''} onChange={e=>onUpdate(m,{assignee:e.target.value||null})}
                        style={{ width:'100%', padding:'0.4rem 0.6rem', borderRadius:6, border:'1px solid var(--border)', background:'var(--surface2)', color:'var(--text)', fontSize:'0.8rem', outline:'none' }}>
                        <option value="">вҖ” лҜём§Җм • вҖ”</option>
                        {teamMembers.filter(tm=>tm.is_active).map(tm => <option key={tm.id} value={tm.id}>{tm.name}</option>)}
                      </select>
                    </div>
                  )}
                  {/* Week number */}
                  {weekOptions.length > 0 && (
                    <div>
                      <div style={{ fontSize:'0.8rem', color:'var(--text2)', marginBottom:4 }}>мЈјм°Ё (Epic)</div>
                      <select value={m.week_number==null?'':m.week_number} onChange={e=>onUpdate(m,{week_number:e.target.value?parseInt(e.target.value):null})}
                        style={{ width:'100%', padding:'0.4rem 0.6rem', borderRadius:6, border:'1px solid var(--border)', background:'var(--surface2)', color:'var(--text)', fontSize:'0.8rem', outline:'none' }}>
                        <option value="">вҖ” лҜём§Җм • вҖ”</option>
                        {weekOptions.map(w => <option key={w.week} value={w.week}>{w.week}мЈјм°Ё{w.title?` вҖ” ${w.title}`:''}</option>)}
                      </select>
                    </div>
                  )}
                  {/* Note */}
                  <div>
                    <div style={{ fontSize:'0.8rem', color:'var(--text2)', marginBottom:4 }}>л©”лӘЁ / м„ңлёҢнғңмҠӨнҒ¬</div>
                    <textarea placeholder="- [ ] м„ңлёҢнғңмҠӨнҒ¬ 1&#10;- [ ] м„ңлёҢнғңмҠӨнҒ¬ 2" defaultValue={m.note||''}
                      onBlur={e=>{ if(e.target.value!==(m.note||'')) onUpdate(m,{note:e.target.value||null}); }}
                      style={{ width:'100%', minHeight:60, padding:'0.45rem 0.6rem', borderRadius:6, border:'1px solid var(--border)', background:'var(--surface2)', color:'var(--text)', fontSize:'0.8rem', resize:'vertical', fontFamily:'inherit', lineHeight:1.5, outline:'none' }} />
                  </div>
                  {/* Actual dates */}
                  <div style={{ display:'flex', gap:10 }}>
                    <div style={{ flex:1 }}>
                      <div style={{ fontSize:'0.8rem', color:'var(--text2)', marginBottom:3 }}>м°©мҲҳмқј</div>
                      <div style={{ display:'flex', alignItems:'center', gap:4 }}>
                        <input type="date" defaultValue={m.actual_start ? m.actual_start.split('T')[0] : ''}
                          onBlur={e => { const v = e.target.value; const cur = m.actual_start ? m.actual_start.split('T')[0] : ''; if (v !== cur) onUpdate(m, { actual_start: v ? v + 'T00:00:00.000Z' : null }); }}
                          style={{ flex:1, padding:'0.25rem 0.4rem', borderRadius:5, border:'1px solid var(--border)', background:'var(--surface2)', color:'var(--text)', fontSize:'0.8rem', outline:'none', minWidth:0 }} />
                        {m.actual_start && <button onClick={() => onUpdate(m, { actual_start: null })} title="м°©мҲҳмқј мӮӯм ң" style={{ background:'transparent', border:'none', color:'var(--text2)', cursor:'pointer', fontSize:'0.8rem', padding:'2px 3px', opacity:0.5, flexShrink:0 }}>вң•</button>}
                      </div>
                    </div>
                    <div style={{ flex:1 }}>
                      <div style={{ fontSize:'0.8rem', color:'var(--text2)', marginBottom:3 }}>мҷ„лЈҢмқј</div>
                      <div style={{ display:'flex', alignItems:'center', gap:4 }}>
                        <input type="date" defaultValue={m.actual_end ? m.actual_end.split('T')[0] : ''}
                          onBlur={e => { const v = e.target.value; const cur = m.actual_end ? m.actual_end.split('T')[0] : ''; if (v !== cur) onUpdate(m, { actual_end: v ? v + 'T00:00:00.000Z' : null }); }}
                          style={{ flex:1, padding:'0.25rem 0.4rem', borderRadius:5, border:'1px solid var(--border)', background:'var(--surface2)', color:'var(--text)', fontSize:'0.8rem', outline:'none', minWidth:0 }} />
                        {m.actual_end && <button onClick={() => onUpdate(m, { actual_end: null })} title="мҷ„лЈҢмқј мӮӯм ң" style={{ background:'transparent', border:'none', color:'var(--text2)', cursor:'pointer', fontSize:'0.8rem', padding:'2px 3px', opacity:0.5, flexShrink:0 }}>вң•</button>}
                      </div>
                    </div>
                    {m.actual_start && m.actual_end && (
                      <div style={{ flexShrink:0, alignSelf:'flex-end', fontSize:'0.8rem', color:'var(--accent2)', paddingBottom:2 }}>
                        {daysBetween(m.actual_start, m.actual_end)}мқј
                      </div>
                    )}
                  </div>
                </div>
              )}
            </div>
          );
        })}
      </div>

      {/* Add new вҖ” prominent dashed row */}
      <div style={{ marginTop:12, padding:'0.45rem 0.55rem', borderRadius:8, border:'1px dashed var(--border)', display:'flex', gap:6, alignItems:'center', transition:'border-color 0.15s' }}>
        <span style={{ fontSize:'1rem', color:'var(--text2)', lineHeight:1, paddingLeft:2, flexShrink:0 }}>пјӢ</span>
        <input type="text" placeholder="мһ‘м—… м¶”к°Җ (Enter)" value={newLabel} onChange={e=>setNewLabel(e.target.value)}
          onKeyDown={e=>{ if(e.key==='Enter' && newLabel.trim()){ onAdd(project.slug,newLabel); setNewLabel(''); } }}
          style={{ flex:1, padding:'0.3rem 0.4rem', borderRadius:6, border:'none', background:'transparent', color:'var(--text)', fontSize:'0.85rem', outline:'none', fontFamily:'inherit' }} />
        {newLabel.trim() && (
          <button onClick={()=>{ onAdd(project.slug,newLabel); setNewLabel(''); }}
            style={{ padding:'0.3rem 0.75rem', borderRadius:6, border:'none', background:'var(--accent)', color:'#fff', cursor:'pointer', fontSize:'0.8rem', fontWeight:600, flexShrink:0 }}>м¶”к°Җ</button>
        )}
      </div>
    </div>
  );
}

// в”Җв”Җв”Җ PhaseDetail (right panel in ProjectView) в”Җв”Җв”Җ
function PhaseDetail({ milestone, teamMembers, saving, onUpdate, onDelete, weekOptions }) {
  const m = milestone;

  const initDraft = (m) => ({
    phase_label: m.phase_label,
    status: m.status,
    blocked: !!m.blocked,
    blocked_reason: m.blocked_reason || '',
    assignee: m.assignee || '',
    week_number: m.week_number == null ? '' : m.week_number,
    note: m.note || '',
    actual_start: m.actual_start ? m.actual_start.split('T')[0] : '',
    actual_end: m.actual_end ? m.actual_end.split('T')[0] : '',
  });

  const [draft, setDraft] = useState(() => initDraft(m));
  // нӢ°мј“мқ„ мІҳмқҢ м—ҙм—Ҳмқ„ л•Ң(лҳҗлҠ” м ҖмһҘ м§Ғнӣ„) мқҳ мӣҗліё мҠӨлғ…мғ· вҖ” мӮ¬мҡ©мһҗ мҲҳм • м—¬л¶Җ нҢҗлӢЁ кё°мӨҖ
  const baseRef = useRef(initDraft(m));

  useEffect(() => {
    const fresh = initDraft(m);
    // лӢӨлҘё нӢ°мј“мңјлЎң м „нҷҳ: м „л©ҙ мҙҲкё°нҷ”
    baseRef.current = fresh;
    setDraft(fresh);
  }, [m.id]);

  useEffect(() => {
    // к°ҷмқҖ нӢ°мј“м—җ мҷёл¶Җ(Realtime) м—…лҚ°мқҙнҠёк°Җ л“Өм–ҙмҷ”мқ„ л•Ң
    // мӮ¬мҡ©мһҗк°Җ м§Ғм ‘ мҲҳм •н•ҳм§Җ м•ҠмқҖ н•„л“ңл§Ң мөңмӢ к°’мңјлЎң к°ұмӢ 
    const fresh = initDraft(m);
    setDraft(prev => {
      const merged = { ...fresh };
      Object.keys(prev).forEach(k => {
        const userEdited = String(prev[k]) !== String(baseRef.current[k]);
        if (userEdited) merged[k] = prev[k]; // мӮ¬мҡ©мһҗ нҺём§‘к°’ ліҙмЎҙ
      });
      return merged;
    });
  }, [m.phase_label, m.status, m.blocked, m.blocked_reason, m.assignee, m.week_number, m.note, m.actual_start, m.actual_end]);

  const set = (key, val) => setDraft(prev => ({ ...prev, [key]: val }));

  const orig = {
    phase_label: m.phase_label,
    status: m.status,
    blocked: !!m.blocked,
    blocked_reason: m.blocked_reason || '',
    assignee: m.assignee || '',
    week_number: m.week_number == null ? '' : m.week_number,
    note: m.note || '',
    actual_start: m.actual_start ? m.actual_start.split('T')[0] : '',
    actual_end: m.actual_end ? m.actual_end.split('T')[0] : '',
  };

  const changedFields = Object.keys(draft).filter(k => {
    if (k === 'week_number') return String(draft[k]) !== String(orig[k]);
    return draft[k] !== orig[k];
  });
  const hasPending = changedFields.length > 0;

  const handleSave = () => {
    if (!draft.phase_label.trim()) return;
    const fields = {};
    if (draft.phase_label !== orig.phase_label) fields.phase_label = draft.phase_label.trim();
    if (draft.status !== orig.status) fields.status = draft.status;
    if (draft.blocked !== orig.blocked) { fields.blocked = draft.blocked; if (!draft.blocked) fields.blocked_reason = null; }
    if (draft.blocked && draft.blocked_reason !== orig.blocked_reason) fields.blocked_reason = draft.blocked_reason || null;
    if (draft.assignee !== orig.assignee) fields.assignee = draft.assignee || null;
    if (String(draft.week_number) !== String(orig.week_number)) fields.week_number = draft.week_number === '' ? null : parseInt(draft.week_number);
    if (draft.note !== orig.note) fields.note = draft.note || null;
    if (draft.actual_start !== orig.actual_start) fields.actual_start = draft.actual_start ? draft.actual_start + 'T00:00:00.000Z' : null;
    if (draft.actual_end !== orig.actual_end) fields.actual_end = draft.actual_end ? draft.actual_end + 'T00:00:00.000Z' : null;
    if (Object.keys(fields).length > 0) {
      onUpdate(m, fields);
      // м ҖмһҘ кё°мӨҖм җ к°ұмӢ  вҖ” мқҙнӣ„ Realtime м—…лҚ°мқҙнҠёмҷҖ мӮ¬мҡ©мһҗ нҺём§‘ нҢҗлі„м—җ мӮ¬мҡ©
      baseRef.current = { ...draft, phase_label: draft.phase_label.trim() };
    }
  };

  const inputS = { width:'100%', padding:'0.55rem 0.75rem', borderRadius:8, border:'1px solid var(--border)', background:'var(--bg)', color:'var(--text)', fontSize:'0.85rem', outline:'none', fontFamily:'inherit' };
  const labelS = { fontSize:'0.8rem', color:'var(--text2)', fontWeight:600, marginBottom:6, textTransform:'uppercase', letterSpacing:'0.04em' };

  return (
    <div style={{ display:'flex', flexDirection:'column', gap:18 }}>
      <input type="text" value={draft.phase_label} onChange={e => set('phase_label', e.target.value)}
        onKeyDown={e => { if (e.key === 'Enter') e.target.blur(); }}
        style={{ ...inputS, padding:'0.7rem 0.9rem', fontSize:'1.15rem', fontWeight:600, border: draft.phase_label !== orig.phase_label ? '1px solid var(--accent)' : '1px solid var(--border)' }} />

      <div>
        <div style={labelS}>мғҒнғң</div>
        <div style={{ display:'flex', gap:6 }}>
          {MILESTONE_STAGE_ORDER.map(s => {
            const st = MILESTONE_STAGES[s];
            const sel = draft.status === s;
            const changed = s === draft.status && draft.status !== orig.status;
            return (
              <button key={s} onClick={() => set('status', s)}
                style={{ flex:1, padding:'0.75rem', borderRadius:8, border: sel ? `2px solid ${st.color}` : '2px solid var(--border)', background: sel ? st.color+'30' : 'transparent', color: sel ? st.color : 'var(--text2)', cursor:'pointer', fontSize:'0.9rem', fontWeight: sel ? 700 : 500, transition:'all 0.1s', position:'relative' }}>
                {st.emoji} {st.label}
                {changed && <span style={{ position:'absolute', top:4, right:4, width:6, height:6, borderRadius:'50%', background:'var(--accent)' }} />}
              </button>
            );
          })}
        </div>
      </div>

      <div>
        <label style={{ display:'flex', alignItems:'center', gap:6, fontSize:'0.85rem', color:'var(--text2)', cursor:'pointer' }}>
          <input type="checkbox" checked={draft.blocked} onChange={e => set('blocked', e.target.checked)} style={{ accentColor:'#e17055' }} />
          рҹ”ҙ лё”лЎңнӮ№ н‘ңмӢң
        </label>
        {draft.blocked && (
          <input type="text" placeholder="лё”лЎңнӮ№ мӮ¬мң " value={draft.blocked_reason} onChange={e => set('blocked_reason', e.target.value)}
            style={{ ...inputS, marginTop:6, border:'1px solid #e1705544' }} />
        )}
      </div>

      {teamMembers && teamMembers.length > 0 && (
        <div>
          <div style={labelS}>лӢҙлӢ№</div>
          <select value={draft.assignee} onChange={e => set('assignee', e.target.value)}
            style={{ ...inputS, border: draft.assignee !== orig.assignee ? '1px solid var(--accent)' : '1px solid var(--border)' }}>
            <option value="">вҖ” лҜём§Җм • вҖ”</option>
            {teamMembers.filter(tm => tm.is_active).map(tm => <option key={tm.id} value={tm.id}>{tm.name}</option>)}
          </select>
        </div>
      )}

      {weekOptions && weekOptions.length > 0 && (
        <div>
          <div style={labelS}>мЈјм°Ё (Epic)</div>
          <select value={draft.week_number} onChange={e => set('week_number', e.target.value)}
            style={{ ...inputS, border: String(draft.week_number) !== String(orig.week_number) ? '1px solid var(--accent)' : '1px solid var(--border)' }}>
            <option value="">вҖ” лҜём§Җм • вҖ”</option>
            {weekOptions.map(w => <option key={w.week} value={w.week}>{w.week}мЈјм°Ё{w.title ? ` вҖ” ${w.title}` : ''}</option>)}
          </select>
        </div>
      )}

      <div>
        <div style={labelS}>л©”лӘЁ / м„ңлёҢнғңмҠӨнҒ¬</div>
        <textarea value={draft.note} onChange={e => set('note', e.target.value)}
          placeholder={"- [ ] м„ңлёҢнғңмҠӨнҒ¬ 1\n- [ ] м„ңлёҢнғңмҠӨнҒ¬ 2\n\nмһҗмң лЎӯкІҢ л©”лӘЁ..."}
          style={{ ...inputS, minHeight:200, resize:'vertical', lineHeight:1.6, border: draft.note !== orig.note ? '1px solid var(--accent)' : '1px solid var(--border)' }} />
      </div>

      <div style={{ display:'flex', gap:10 }}>
        <div style={{ flex:1 }}>
          <div style={labelS}>м°©мҲҳмқј</div>
          <div style={{ display:'flex', gap:6, alignItems:'center' }}>
            <input type="date" value={draft.actual_start} onChange={e => set('actual_start', e.target.value)}
              style={{ ...inputS, border: draft.actual_start !== orig.actual_start ? '1px solid var(--accent)' : '1px solid var(--border)' }} />
            {draft.actual_start && <button onClick={() => set('actual_start', '')} title="м°©мҲҳмқј мӮӯм ң"
              style={{ padding:'0.45rem 0.6rem', borderRadius:8, border:'1px solid var(--border)', background:'transparent', color:'var(--text2)', cursor:'pointer', fontSize:'0.8rem', flexShrink:0 }}>вң•</button>}
          </div>
          {!draft.actual_start && <div style={{ marginTop:4, fontSize:'0.8rem', color:'var(--text2)', opacity:0.5 }}>м§„н–үмӨ‘мңјлЎң ліҖкІҪ мӢң мһҗлҸҷ кё°лЎқ</div>}
        </div>
        <div style={{ flex:1 }}>
          <div style={labelS}>мҷ„лЈҢмқј</div>
          <div style={{ display:'flex', gap:6, alignItems:'center' }}>
            <input type="date" value={draft.actual_end} onChange={e => set('actual_end', e.target.value)}
              style={{ ...inputS, border: draft.actual_end !== orig.actual_end ? '1px solid var(--accent)' : '1px solid var(--border)' }} />
            {draft.actual_end && <button onClick={() => set('actual_end', '')} title="мҷ„лЈҢмқј мӮӯм ң"
              style={{ padding:'0.45rem 0.6rem', borderRadius:8, border:'1px solid var(--border)', background:'transparent', color:'var(--text2)', cursor:'pointer', fontSize:'0.8rem', flexShrink:0 }}>вң•</button>}
          </div>
          {!draft.actual_end && <div style={{ marginTop:4, fontSize:'0.8rem', color:'var(--text2)', opacity:0.5 }}>мҷ„лЈҢлЎң ліҖкІҪ мӢң мһҗлҸҷ кё°лЎқ</div>}
        </div>
      </div>
      {draft.actual_start && draft.actual_end && (
        <div style={{ fontSize:'0.8rem', color:'var(--accent2)', fontWeight:600, textAlign:'right' }}>
          {daysBetween(draft.actual_start + 'T00:00:00', draft.actual_end + 'T00:00:00')}мқј мҶҢмҡ”
        </div>
      )}

      <div style={{ borderTop:'1px solid var(--border)', paddingTop:16, display:'flex', gap:8, alignItems:'center' }}>
        {hasPending && (
          <button onClick={handleSave} disabled={saving || !draft.phase_label.trim()}
            style={{ flex:1, padding:'0.65rem 1rem', borderRadius:8, border:'none', background:'var(--accent)', color:'#fff', cursor:'pointer', fontSize:'0.9rem', fontWeight:700, opacity: saving ? 0.6 : 1 }}>
            {saving ? 'м ҖмһҘ мӨ‘...' : `м ҖмһҘ (${changedFields.length}к°ң мҲҳм •)`}
          </button>
        )}
        {hasPending && (
          <button onClick={() => setDraft(initDraft(m))} disabled={saving}
            style={{ padding:'0.65rem 0.8rem', borderRadius:8, border:'1px solid var(--border)', background:'transparent', color:'var(--text2)', cursor:'pointer', fontSize:'0.85rem' }}>
            лҗҳлҸҢлҰ¬кё°
          </button>
        )}
        <button onClick={() => onDelete(m)}
          style={{ padding:'0.6rem 1rem', borderRadius:8, border:'1px solid #e1705544', background:'transparent', color:'#e17055', cursor:'pointer', fontSize:'0.85rem', fontWeight:500, marginLeft: hasPending ? 0 : 'auto' }}>
          мһ‘м—… мӮӯм ң
        </button>
      </div>
    </div>
  );
}

// в”Җв”Җв”Җ MilestoneEditModal в”Җв”Җв”Җ
function MilestoneEditModal({ milestone, teamMembers, saving, onUpdate, onDelete, onClose, weekOptions }) {
  useEffect(() => {
    const h = e => { if (e.key === 'Escape') onClose(); };
    window.addEventListener('keydown', h);
    return () => window.removeEventListener('keydown', h);
  }, [onClose]);

  if (!milestone) return null;
  const stage = MILESTONE_STAGES[milestone.status] || MILESTONE_STAGES.planned;

  const wrappedDelete = (m) => { onDelete(m); onClose(); };

  return (
    <div onClick={onClose} style={{ position:'fixed', inset:0, background:'var(--overlay)', backdropFilter:'blur(4px)', display:'flex', alignItems:'center', justifyContent:'center', zIndex:1500, padding:'2rem 1rem' }}>
      <div onClick={e=>e.stopPropagation()} style={{
        background:'var(--surface)', borderRadius:16, width:'100%', maxWidth:640,
        border:'1px solid var(--border)', animation:'slideUp 0.25s ease-out',
        boxShadow:'0 20px 60px var(--shadow)', maxHeight:'90vh', display:'flex', flexDirection:'column',
      }}>
        <div style={{ padding:'0.95rem 1.25rem', borderBottom:'1px solid var(--border)', display:'flex', alignItems:'center', gap:10, flexShrink:0 }}>
          <span style={{ fontSize:'1.2rem' }}>{milestone.blocked?'рҹ”ҙ':stage.emoji}</span>
          <span style={{ fontSize:'0.8rem', fontWeight:700, color:stage.color, textTransform:'uppercase', letterSpacing:'0.05em', padding:'0.22rem 0.6rem', borderRadius:12, background:stage.color+'30', flexShrink:0 }}>{stage.label}</span>
          <div style={{ flex:1 }} />
          <button onClick={onClose} title="лӢ«кё° (Esc)" style={{ background:'none', border:'none', color:'var(--text2)', cursor:'pointer', fontSize:'1.1rem', padding:'4px 8px', lineHeight:1 }}>вң•</button>
        </div>
        <div style={{ padding:'1.3rem 1.4rem', overflowY:'auto', flex:1 }}>
          <PhaseDetail milestone={milestone} teamMembers={teamMembers} saving={saving} onUpdate={onUpdate} onDelete={wrappedDelete} weekOptions={weekOptions} />
        </div>
      </div>
    </div>
  );
}

// в”Җв”Җв”Җ ProjectView (Jira-style full-screen project page) в”Җв”Җв”Җ
function ProjectView({ project, milestones, setupNeeded, teamMembers, saving, onUpdate, onDelete, onAdd, onBulkAdd, onReorder, onCreateFromTemplate, onBack, onBulkCreateWeekly, onClearWeeklyPlan, onBackfillAssignees, onRequestConfirm, onFieldSave }) {
  // Sort: by week_number asc (unassigned last), then by order_idx asc.
  // к°ҷмқҖ м»¬лҹј м•Ҳм—җм„ң мЈјм°Ёлі„лЎң мһҗлҸҷ нҒҙлҹ¬мҠӨн„°л§Ғлҗҳм–ҙ мӢңк°Ғм ҒмңјлЎң л¬¶мһ„.
  const sortedAll = useMemo(() => {
    const wkKey = (m) => (m.week_number == null ? Number.POSITIVE_INFINITY : m.week_number);
    return [...(milestones||[])].sort((a,b) => {
      const wa = wkKey(a), wb = wkKey(b);
      if (wa !== wb) return wa - wb;
      return (a.order_idx||0) - (b.order_idx||0);
    });
  }, [milestones]);
  const [editingId, setEditingId] = useState(null);
  const [newLabel, setNewLabel] = useState('');
  const [newWeek, setNewWeek] = useState('');
  const [draggingId, setDraggingId] = useState(null);
  const [dragOverCol, setDragOverCol] = useState(null);
  const [showWeeklyInput, setShowWeeklyInput] = useState(false);
  const [weekFilter, setWeekFilter] = useState('all'); // 'all' | number | 'none'
  const [editStart, setEditStart] = useState(project?.start_date || '');
  const [editDeadline, setEditDeadline] = useState(project?.deadline || '');

  const sorted = useMemo(() => {
    if (weekFilter === 'all') return sortedAll;
    if (weekFilter === 'none') return sortedAll.filter(m => m.week_number == null);
    return sortedAll.filter(m => m.week_number === weekFilter);
  }, [sortedAll, weekFilter]);

  const weekOptions = useMemo(() => {
    if (Array.isArray(project?.weekly_plan) && project.weekly_plan.length > 0) {
      return [...project.weekly_plan].sort((a,b)=>(a.week||0)-(b.week||0)).map(w => ({ week:w.week, title:w.title||'' }));
    }
    const nums = new Set();
    (milestones||[]).forEach(m => { if (m.week_number != null) nums.add(m.week_number); });
    return [...nums].sort((a,b)=>a-b).map(w => ({ week:w, title:'' }));
  }, [project?.weekly_plan, milestones]);

  const handleDragStart = (e, m) => {
    setDraggingId(m.id);
    e.dataTransfer.effectAllowed = 'move';
    try { e.dataTransfer.setData('text/plain', m.id); } catch (err) {}
  };
  const handleDragEnd = () => { setDraggingId(null); setDragOverCol(null); };
  const handleColDragOver = (e, stageKey) => {
    e.preventDefault();
    e.dataTransfer.dropEffect = 'move';
    if (dragOverCol !== stageKey) setDragOverCol(stageKey);
  };
  const handleColDrop = (e, stageKey) => {
    e.preventDefault();
    const id = draggingId;
    setDraggingId(null); setDragOverCol(null);
    if (!id) return;
    // sortedлҠ” мЈјм°Ё н•„н„°к°Җ м Ғмҡ©лҗң л°°м—ҙмқҙлҜҖлЎң н•„н„° л°– м№ҙл“ңлҘј лӘ» м°ҫмқҢ вҶ’ sortedAll мӮ¬мҡ©
    const m = sortedAll.find(x => x.id === id);
    if (m && m.status !== stageKey) onUpdate(m, { status: stageKey });
  };

  // If the currently-edited milestone is deleted elsewhere, close modal
  useEffect(() => {
    if (editingId && !sortedAll.find(m => m.id === editingId)) setEditingId(null);
  }, [sortedAll, editingId]);

  // Keyboard navigation: [ / ] to step through week filter (skips when typing or modal open)
  useEffect(() => {
    const handler = (e) => {
      if (e.key !== '[' && e.key !== ']') return;
      if (editingId || showWeeklyInput) return;
      const tag = (e.target?.tagName || '').toUpperCase();
      if (tag === 'INPUT' || tag === 'TEXTAREA' || tag === 'SELECT' || e.target?.isContentEditable) return;
      if (weekOptions.length === 0) return;
      const order = weekOptions.map(w => w.week);
      const noneCount = sortedAll.filter(m => m.week_number == null).length;
      if (noneCount > 0) order.push('none');
      const idx = weekFilter === 'all' ? -1 : order.indexOf(weekFilter);
      if (e.key === ']') {
        const next = idx < 0 ? order[0] : (idx < order.length - 1 ? order[idx + 1] : null);
        if (next != null) { e.preventDefault(); setWeekFilter(next); }
      } else {
        if (idx > 0) { e.preventDefault(); setWeekFilter(order[idx - 1]); }
        else if (idx === 0) { e.preventDefault(); setWeekFilter('all'); }
      }
    };
    window.addEventListener('keydown', handler);
    return () => window.removeEventListener('keydown', handler);
  }, [weekFilter, weekOptions, sortedAll, editingId, showWeeklyInput]);

  const editing = sortedAll.find(m => m.id === editingId);
  const doneCount = sortedAll.filter(m => m.status==='done').length;
  const pct = sortedAll.length ? Math.round((doneCount/sortedAll.length)*100) : 0;
  const hasBlocked = sortedAll.some(m => m.blocked);

  // Week progress: мҷ„лЈҢлҗң мЈјм°Ё мҲҳ / м „мІҙ мЈјм°Ё
  // н•ң мЈјм°Ёк°Җ "мҷ„лЈҢ"лҗҳл Өл©ҙ к·ё мЈјм°Ём—җ нӢ°мј“мқҙ мһҲкі  лӘЁл‘җ doneмқҙм–ҙм•ј н•Ё.
  // кі м•„ нӢ°мј“(weekOptionsм—җ м—ҶлҠ” week_number)мқҖ л¬ҙмӢң.
  const totalWeeks = weekOptions.length;
  const { completedWeeks, focusWeek, staleWeeks } = (() => {
    if (totalWeeks === 0) return { completedWeeks: 0, focusWeek: null, staleWeeks: [] };
    const tally = {};
    weekOptions.forEach(w => { tally[w.week] = { total: 0, done: 0 }; });
    sortedAll.forEach(m => {
      if (m.week_number != null && tally[m.week_number]) {
        tally[m.week_number].total++;
        if (m.status === 'done') tally[m.week_number].done++;
      }
    });
    let completed = 0;
    let focus = null;
    const sortedWeekNums = weekOptions.map(w => w.week);
    sortedWeekNums.forEach(wn => {
      const t = tally[wn];
      if (t.total > 0 && t.done === t.total) completed++;
      else if (focus == null) focus = wn;
    });
    // Stale: мқҙ мЈјм°Ёк°Җ лҜёмҷ„лЈҢмқёлҚ°, мқҙнӣ„ мЈјм°Ём—җ done нӢ°мј“мқҙ мЎҙмһ¬н•ҳлҠ” кІҪмҡ°
    const stale = [];
    sortedWeekNums.forEach((wn, i) => {
      const t = tally[wn];
      const isUnfinished = !(t.total > 0 && t.done === t.total);
      if (!isUnfinished) return;
      const laterHasDone = sortedWeekNums.slice(i+1).some(wn2 => tally[wn2].done > 0);
      if (laterHasDone) stale.push(wn);
    });
    return { completedWeeks: completed, focusWeek: focus, staleWeeks: stale };
  })();
  const weekPct = totalWeeks > 0 ? Math.round((completedWeeks / totalWeeks) * 100) : 0;

  const cycleStatus = (m) => {
    const next = m.status === 'planned' ? 'in_progress' : m.status === 'in_progress' ? 'done' : 'planned';
    onUpdate(m, { status: next });
  };

  const meta = STATUS_META[project?.current_status] || {};
  const mgrM  = teamMembers?.find(tm => tm.id===project?.assigned_manager);
  const mainM = teamMembers?.find(tm => tm.id===project?.assigned_main);
  const subM  = teamMembers?.find(tm => tm.id===project?.assigned_sub);

  const backBtn = (
    <button onClick={onBack} style={{ padding:'0.5rem 0.85rem', borderRadius:8, border:'1px solid var(--border)', background:'var(--surface)', color:'var(--text)', cursor:'pointer', fontSize:'0.85rem', fontWeight:500, flexShrink:0 }}>вҶҗ лҢҖмӢңліҙл“ңлЎң</button>
  );

  if (!project) {
    return (
      <div style={{ maxWidth:800, margin:'0 auto', padding:'2rem 1rem' }}>
        {backBtn}
        <div style={{ marginTop:24, padding:'2rem', textAlign:'center', color:'var(--text2)', background:'var(--surface)', borderRadius:12, border:'1px solid var(--border)' }}>н”„лЎңм қнҠёлҘј м°ҫмқ„ мҲҳ м—ҶмҠөлӢҲлӢӨ</div>
      </div>
    );
  }

  if (setupNeeded) {
    return (
      <div style={{ maxWidth:900, margin:'0 auto', padding:'1.5rem 1rem' }}>
        <div style={{ display:'flex', gap:12, alignItems:'center', marginBottom:16 }}>
          {backBtn}
          <h1 style={{ fontSize:'1.15rem', fontWeight:600, margin:0 }}>{project.title||project.slug}</h1>
        </div>
        <div style={{ padding:'0.9rem 1.1rem', borderRadius:10, background:'#fdcb6e1a', border:'1px solid #fdcb6e33', marginBottom:'0.75rem' }}>
          <div style={{ fontSize:'0.9rem', fontWeight:600, color:'var(--yellow)', marginBottom:4 }}>вҡ пёҸ DB м„Өм • н•„мҡ”</div>
          <div style={{ fontSize:'0.8rem', color:'var(--text2)', lineHeight:1.5 }}>мһ‘м—… нҠёлһҳм»ӨлҘј мӮ¬мҡ©н•ҳл Өл©ҙ project_milestones н…Ңмқҙлё”мқ„ лЁјм Җ мғқм„ұн•ҳм„ёмҡ”.</div>
        </div>
        <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:6 }}>
          <div style={{ fontSize:'0.8rem', color:'var(--text2)' }}>Supabase SQL м—җл””н„°м—җм„ң мӢӨн–ү</div>

        </div>
        <pre style={{ background:'var(--bg)', padding:'0.9rem', borderRadius:8, fontSize:'0.8rem', color:'var(--text2)', overflow:'auto', maxHeight:360, border:'1px solid var(--border)', lineHeight:1.5 }}>{MILESTONE_SETUP_SQL}</pre>
      </div>
    );

    <div style={{ maxWidth:1400, margin:'0 auto', padding:'1rem 1.25rem' }}>

      <div style={{ display:'flex', alignItems:'center', gap:12, marginBottom:10, flexWrap:'wrap' }}>
        {backBtn}
        <h1 style={{ fontSize:'1.2rem', fontWeight:600, margin:0, flex:1, minWidth:200, overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap' }}>{project.title || project.slug}</h1>
        <span style={{ padding:'0.3rem 0.7rem', borderRadius:6, fontSize:'0.8rem', fontWeight:500, background:meta.color+'30', color:meta.color, border:`1px solid ${meta.color}44`, flexShrink:0 }}>
          {meta.emoji} {meta.label}
        </span>
        {mgrM && <MemberBadge member={mgrM} role="mgr" />}
        {mainM && <MemberBadge member={mainM} role="main" />}
        {subM && <MemberBadge member={subM} role="sub" />}
        {project.start_date && (() => {
          const cw = getCurrentWeek(project.start_date);
          if (cw == null) return null;
          const totalW = weekOptions.length;

          return (
            <span title={`м°©мҲҳмқј: ${project.start_date} кё°мӨҖ`}
              style={{ padding:'0.25rem 0.6rem', borderRadius:6, fontSize:'0.8rem', fontWeight:600, background: overdue ? '#e1705530' : 'var(--green)30', color: overdue ? '#e17055' : 'var(--green)', border:`1px solid ${overdue ? '#e1705544' : 'var(--green)44'}`, flexShrink:0, whiteSpace:'nowrap' }}>
              рҹ“Қ {cw}мЈјм°Ё м§„н–ү мӨ‘{overdue && ` (мҙқ ${totalW}мЈј мҙҲкіј)`}
            </span>
          );
        })()}
      </div>
      <div style={{ fontSize:'0.8rem', color:'var(--text2)', fontFamily:'monospace', marginBottom:14, paddingLeft:2, display:'flex', alignItems:'center', gap:6, flexWrap:'wrap' }}>
        {project.slug}
        {project.wishket_url && <> В· <a href={project.wishket_url} target="_blank" rel="noopener" style={{ color:'var(--yellow)', textDecoration:'none' }}>мң„мӢңмј“ кіөкі  вҶ—</a></>}
      </div>
      {/* м°©мҲҳмқј / л§Ҳк°җмқј */}
      {onFieldSave && (() => {
        const changed = editStart !== (project?.start_date || '') || editDeadline !== (project?.deadline || '');
        const computeDeadline = (startVal) => {
          if (!startVal || totalWeeks === 0) return '';
          const d = new Date(startVal);
          if (isNaN(d.getTime())) return '';
          d.setDate(d.getDate() + totalWeeks * 7);
          return d.toISOString().split('T')[0];
        };
        const handleStartChange = (val) => {
          setEditStart(val);
          if (val && totalWeeks > 0) setEditDeadline(computeDeadline(val));
        };
        const dlDiff = (() => {
          if (!editDeadline) return null;
          const today = new Date(); today.setHours(0,0,0,0);
          const dl = new Date(editDeadline); dl.setHours(0,0,0,0);

        })();
        const dlColor = dlDiff != null ? (dlDiff < 0 ? '#e17055' : dlDiff <= 7 ? '#fdcb6e' : 'var(--text2)') : null;

        return (
          <div style={{ display:'flex', gap:10, alignItems:'center', marginBottom:14, padding:'0.6rem 0.9rem', borderRadius:10, background:'var(--surface)', border:'1px solid var(--border)', flexWrap:'wrap' }}>
            <div style={{ display:'flex', alignItems:'center', gap:6 }}>
              <span style={{ fontSize:'0.75rem', color:'var(--text2)', fontWeight:500, whiteSpace:'nowrap' }}>м°©мҲҳ</span>
              <input type="date" value={editStart} onChange={e => handleStartChange(e.target.value)}
                style={{ padding:'0.3rem 0.5rem', borderRadius:6, border:'1px solid var(--border)', background:'var(--surface2)', color:'var(--text)', fontSize:'0.8rem', outline:'none', fontFamily:'inherit' }} />
            </div>
            <span style={{ color:'var(--border)', fontSize:'0.8rem' }}>вҶ’</span>
            <div style={{ display:'flex', alignItems:'center', gap:6 }}>
              <span style={{ fontSize:'0.75rem', color:'var(--text2)', fontWeight:500, whiteSpace:'nowrap' }}>л§Ҳк°җ</span>
              <input type="date" value={editDeadline} onChange={e => setEditDeadline(e.target.value)}
                style={{ padding:'0.3rem 0.5rem', borderRadius:6, border:'1px solid var(--border)', background:'var(--surface2)', color:'var(--text)', fontSize:'0.8rem', outline:'none', fontFamily:'inherit' }} />
              {dlLabel && <span style={{ fontSize:'0.7rem', fontWeight:600, color:dlColor, whiteSpace:'nowrap' }}>{dlLabel}</span>}
            </div>
            {totalWeeks > 0 && editStart && <span style={{ fontSize:'0.7rem', color:'var(--accent2)', opacity:0.8, whiteSpace:'nowrap' }}>{totalWeeks}мЈј кё°мӨҖ</span>}
            {changed && (
              <button onClick={() => {
                const fields = {};
                if (editStart !== (project?.start_date || '')) fields.start_date = editStart || null;
                if (editDeadline !== (project?.deadline || '')) fields.deadline = editDeadline || null;
                onFieldSave(project, fields);
              }} disabled={saving} style={{ padding:'0.3rem 0.7rem', borderRadius:6, border:'none', background:'var(--accent)', color:'#fff', cursor:'pointer', fontSize:'0.8rem', fontWeight:600, whiteSpace:'nowrap', marginLeft:'auto' }}>
                {saving ? 'м ҖмһҘ мӨ‘...' : 'м ҖмһҘ'}
              </button>
            )}
          </div>
        );
      })()}

      {/* Weekly milestone input */}
      {showWeeklyInput && (
        <div style={{ marginBottom:14 }}>
          <WeeklyMilestoneInput project={project} saving={saving} milestones={milestones} onBulkCreate={(slug, weeks) => { onBulkCreateWeekly(slug, weeks); setShowWeeklyInput(false); }} onClearPlan={(slug) => { onClearWeeklyPlan && onClearWeeklyPlan(slug); setShowWeeklyInput(false); }} onClose={() => { console.trace('[WeeklyMilestoneInput] onClose called'); setShowWeeklyInput(false); }} onRequestConfirm={onRequestConfirm} />
        </div>
      )}

      {/* Progress summary */}
      <div style={{ padding:'0.9rem 1.1rem', borderRadius:12, background:'var(--surface)', border:'1px solid var(--border)', marginBottom:14 }}>
        {/* Week timeline (primary) */}
        {totalWeeks > 0 && (
          <div style={{ marginBottom:12 }}>
            <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:8 }}>
              <div style={{ fontSize:'0.95rem', fontWeight:700 }}>
                рҹ“… нғҖмһ„лқјмқё {(() => { const cw = getCurrentWeek(project?.start_date); return cw != null ? `${cw}/${totalWeeks}мЈјм°Ё` : `0/${totalWeeks}мЈјм°Ё`; })()}
                {focusWeek != null && (
                  <button onClick={() => setWeekFilter(weekFilter === focusWeek ? 'all' : focusWeek)}
                    title="мқҙ мЈјм°ЁлЎң м№ёл°ҳ н•„н„°л§Ғ"
                    style={{ marginLeft:8, padding:'1px 6px', borderRadius:4, border:'1px solid var(--accent)44', background: weekFilter===focusWeek ? 'var(--accent)30' : 'transparent', color:'var(--accent2)', cursor:'pointer', fontSize:'0.8rem', fontWeight:600, textTransform:'none', letterSpacing:0 }}>
                    рҹ‘ү лӢӨмқҢ {focusWeek}мЈјм°Ё
                  </button>
                )}
              </div>
              {(() => { const cw = getCurrentWeek(project?.start_date); const timePct = cw != null ? Math.min(Math.round((cw/totalWeeks)*100),100) : 0; const overdue = cw != null && cw > totalWeeks; return <div style={{ fontSize:'1.2rem', fontWeight:700, color:overdue?'#e17055':'var(--accent2)' }}>{timePct}%</div>; })()}
            </div>
            {(() => { const cw = getCurrentWeek(project?.start_date); const timePct = cw != null ? Math.min(Math.round((cw/totalWeeks)*100),100) : 0; const overdue = cw != null && cw > totalWeeks; return (
              <div style={{ height:10, background:'var(--bg)', borderRadius:5, overflow:'hidden' }}>
                <div style={{ width:timePct+'%', height:'100%', background:overdue?'#e17055':'var(--accent2)', transition:'width 0.3s' }} />
              </div>
            ); })()}
            {staleWeeks.length > 0 && (
              <div style={{ marginTop:6, fontSize:'0.8rem', color:'var(--yellow)', opacity:0.85 }}>
                вҡ пёҸ {staleWeeks.join(', ')}мЈјм°Ёк°Җ лҜёмҷ„лЈҢмқёлҚ° мқҙнӣ„ мЈјм°Ё мһ‘м—…мқҙ м§„н–үлҗЁ вҖ” мһ‘м—… мҲңм„ң м җкІҖ н•„мҡ”
              </div>
            )}
          </div>
        )}
        {/* Ticket completion (secondary) */}
        <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:8 }}>
          <div style={{ fontSize:'0.8rem', fontWeight:500, color:'var(--text2)' }}>
            рҹҺ« нӢ°мј“ мҷ„лЈҢ {sortedAll.length === 0 ? <span style={{ fontWeight:400, fontSize:'0.8rem' }}>м—ҶмқҢ</span> : `${doneCount}/${sortedAll.length}`}
          </div>
          <div style={{ display:'flex', alignItems:'center', gap:8 }}>
            {(() => {
              const isActive = (id) => !!id && !!teamMembers?.find(tm => tm.id === id && tm.is_active);
              const needsFill = sortedAll.filter(m => !isActive(m.assignee)).length;
              const hasDefault = isActive(project?.assigned_main) || isActive(project?.assigned_sub);
              if (needsFill === 0 || !hasDefault || !onBackfillAssignees) return null;
              return (
                <button
                  onClick={() => {
                    if (onRequestConfirm) {
                      onRequestConfirm({
                        title: 'лӢҙлӢ№мһҗ мқјкҙ„ л°°м •',
                        message: `лӢҙлӢ№мһҗ лҜём§Җм •/мң нҡЁн•ҳм§Җ м•ҠмқҖ нӢ°мј“ ${needsFill}к°ңлҘј н”„лЎңм қнҠё лӢҙлӢ№мһҗлЎң л°°м •н•©лӢҲлӢӨ.\n(н”„лЎңм қнҠё м „мІҙ кё°мӨҖ вҖ” мЈјм°Ё н•„н„°мҷҖ л¬ҙкҙҖ)\n\nкі„мҶҚн• к№Ңмҡ”?`,
                        confirmLabel: 'л°°м •',
                        onConfirm: () => onBackfillAssignees(project.slug),
                      });
                    } else {
                      onBackfillAssignees(project.slug);
                    }
                  }}
                  disabled={saving}
                  title={`лҜём§Җм •В·кі м•„ лӢҙлӢ№ ${needsFill}к°ңлҘј н”„лЎңм қнҠё лӢҙлӢ№мһҗлЎң мқјкҙ„ л°°м • (м „мІҙ кё°мӨҖ)`}
                  style={{ padding:'0.3rem 0.65rem', borderRadius:6, border:'1px solid var(--accent2)44', background:'var(--accent2)11', color:'var(--accent2)', cursor:'pointer', fontSize:'0.8rem', fontWeight:600 }}>

            })()}
            {weekOptions.length === 0 && (
