<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>퍼스트핍 워크룸</title>
<link rel="preconnect" href="https://cdn.jsdelivr.net" />
<link rel="preconnect" href="https://ucwtmheysdrgrmeaubuy.supabase.co" crossorigin />
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" rel="stylesheet" />
<script defer src="vendor/react.production.min.js" crossorigin></script>
<script defer src="vendor/react-dom.production.min.js" crossorigin></script>
<script defer src="vendor/supabase.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --space-1: 0.25rem; --space-2: 0.4rem;  --space-3: 0.5rem;
    --space-4: 0.75rem; --space-5: 1rem;    --space-6: 1.5rem;
    --radius-sm: 4px;   --radius-md: 6px;   --radius-lg: 8px;
    --radius-xl: 12px;  --radius-pill: 20px;
    --text-xs: 0.7rem;  --text-sm: 0.8rem;  --text-base: 0.85rem;
    --text-md: 0.9rem;  --text-lg: 1rem;    --text-xl: 1.15rem; --text-2xl: 1.45rem;
    /* surface tier: soft(10%) · mid(20%) · strong(33%) — color-mix 알파 표면 */
    --surface-danger-soft:    color-mix(in srgb, var(--red)    10%, transparent);
    --surface-danger-mid:     color-mix(in srgb, var(--red)    20%, transparent);
    --surface-danger-strong:  color-mix(in srgb, var(--red)    33%, transparent);
    --surface-warning-soft:   color-mix(in srgb, var(--yellow) 10%, transparent);
    --surface-warning-mid:    color-mix(in srgb, var(--yellow) 20%, transparent);
    --surface-warning-strong: color-mix(in srgb, var(--yellow) 33%, transparent);
    --surface-success-soft:   color-mix(in srgb, var(--green)  10%, transparent);
    --surface-success-mid:    color-mix(in srgb, var(--green)  20%, transparent);
    --surface-success-strong: color-mix(in srgb, var(--green)  33%, transparent);
    --surface-info-soft:      color-mix(in srgb, var(--blue)   10%, transparent);
    --surface-info-mid:       color-mix(in srgb, var(--blue)   20%, transparent);
    --surface-info-strong:    color-mix(in srgb, var(--blue)   33%, transparent);
    --surface-accent-soft:    color-mix(in srgb, var(--accent) 10%, transparent);
    --surface-accent-mid:     color-mix(in srgb, var(--accent) 20%, transparent);
    --surface-accent-strong:  color-mix(in srgb, var(--accent) 33%, transparent);
    --surface-neutral-soft:   color-mix(in srgb, #636e72        10%, transparent);
    --surface-neutral-mid:    color-mix(in srgb, #636e72        20%, transparent);
  }
  :root, [data-theme="dark"] {
    --bg: #0f1117; --surface: #1a1d27; --surface2: #242836;
    --border: #2e3348; --text: #e4e6f0; --text2: #8b8fa8;
    --accent: #6c5ce7; --accent2: #a29bfe;
    --green: #00b894; --yellow: #fdcb6e; --red: #e17055; --blue: #74b9ff;
    --shadow: rgba(0,0,0,0.4); --overlay: rgba(0,0,0,0.6); --color-scheme: dark;
  }
  [data-theme="light"] {
    --bg: #f0f1f6; --surface: #ffffff; --surface2: #e9eaf1;
    --border: #d0d2dc; --text: #1a1d2e; --text2: #4b5068;
    --accent: #6c5ce7; --accent2: #5040c8;
    --green: #059669; --yellow: #c47a10; --red: #dc2626; --blue: #2563eb;
    --shadow: rgba(0,0,0,0.12); --overlay: rgba(0,0,0,0.35); --color-scheme: light;
  }
  html { font-size: 15px; color-scheme: var(--color-scheme); }
  body { font-family: 'Pretendard', -apple-system, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; line-height: 1.5; }
  #root { max-width: 1280px; margin: 0 auto; padding: 2rem 1.5rem; }
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: var(--surface); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  /* input/select 의 color-scheme은 CSS 변수로 자동 적용 */
  input, select, textarea { color-scheme: var(--color-scheme); }
  /* 라이트 모드: 구분선 강화 + 반투명 배경 보정 */
  [data-theme="light"] table tr { border-bottom-color: #c8cbda !important; }
  [data-theme="light"] table thead tr { border-bottom: 2px solid #b8bcd0 !important; }
  [data-theme="light"] table tr:hover { background: #e4e5ee !important; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  .fade-in { animation: fadeIn 0.4s ease-out forwards; }
  .delay-1 { animation-delay: 0.05s; opacity: 0; }
  .delay-2 { animation-delay: 0.1s; opacity: 0; }
  .delay-3 { animation-delay: 0.15s; opacity: 0; }
  .delay-4 { animation-delay: 0.2s; opacity: 0; }
  @keyframes spin { to { transform: rotate(360deg); } }
  @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes toastIn { from { opacity: 0; transform: translateY(16px) scale(0.95); } to { opacity: 1; transform: translateY(0) scale(1); } }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.5; } }
  @media (max-width: 768px) {
    html { font-size: 14px; }
    #root { padding: 1rem 0.75rem; }
    table th, table td { padding: 0.5rem 0.5rem !important; }
    /* 768px: 예산(4), 생성일(5), 메모(8) 숨김 — 미팅일·담당은 유지 */
    table td:nth-child(4), table th:nth-child(4),
    table td:nth-child(5), table th:nth-child(5),
    table td:nth-child(8), table th:nth-child(8) { display: none; }
  }
  @media (max-width: 480px) {
    /* 480px: 체크박스(1), 담당(7)도 추가 숨김 */
    table td:nth-child(1), table th:nth-child(1),
    table td:nth-child(7), table th:nth-child(7) { display: none; }
  }
</style>
<script>
// 테마 초기화 (FOUC 방지 — 앱 스크립트보다 먼저 동기 실행)
(function() {
  var saved = localStorage.getItem('dashboard_theme');
  var prefer = window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', saved || prefer);
})();
</script>
<!-- app.js 는 src/app.jsx 를 esbuild로 빌드한 산출물. 코드 수정은 src/app.jsx 에서 → `npm run build` (또는 `npm run watch`) → app.js 커밋. -->
<script src="app.js" defer></script>
</head>
<body>
<div id="root"></div>
</body>
</html>
