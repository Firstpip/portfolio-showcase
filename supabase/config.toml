
[functions.delete-portfolios]
enabled = true
# 게이트웨이에서 JWT 서명 검증(미인증/위조 토큰 차단). 함수 내부에서 role==='authenticated'도 추가 확인.
# 대시보드는 supabase.functions.invoke()로 로그인 세션 JWT를 자동 첨부하므로 정상 동작.
verify_jwt = true
import_map = "./functions/delete-portfolios/deno.json"
# Uncomment to specify a custom file path to the entrypoint.
# Supported file extensions are: .ts, .js, .mjs, .jsx, .tsx
entrypoint = "./functions/delete-portfolios/index.ts"
# Specifies static files to be bundled with the function. Supports glob patterns.
# For example, if you want to serve static HTML pages in your function:
# static_files = [ "./functions/delete-portfolios/*.html" ]
